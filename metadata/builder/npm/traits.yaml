# Build System - NPM
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === npm/yarn micro-behaviors ===
  - id: package-json
    desc: package.json file
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: "package.json"
      section: .text
  - id: node-modules
    desc: node_modules directory
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "node_modules"
      section: .text
  - id: package-lock-json
    desc: package-lock.json file
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "package-lock.json"
      section: .text
  - id: yarn-lock
    desc: yarn.lock file
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "yarn.lock"
      section: .text
composite_rules:
  # npm/yarn composite (migrated from YARA)
  - id: npm
    desc: Built with npm/yarn (Node.js)
    crit: notable
    conf: 0.85
    any:
      - id: package-json
      - id: node-modules
      - id: package-lock-json
      - id: yarn-lock
