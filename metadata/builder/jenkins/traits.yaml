# Build System - JENKINS
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === Jenkins micro-behaviors ===
  - id: jenkins-url
    desc: JENKINS_URL variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "JENKINS_URL"
      section: .text
  - id: build-number
    desc: BUILD_NUMBER variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "BUILD_NUMBER"
      section: .text
  - id: job-name
    desc: JOB_NAME variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "JOB_NAME"
      section: .text
  - id: jenkinsfile
    desc: Jenkinsfile
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "Jenkinsfile"
      section: .text
composite_rules:
  # Jenkins composite (migrated from YARA)
  - id: jenkins
    desc: Jenkins CI artifacts
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: jenkins-url
      - id: build-number
      - id: job-name
      - id: jenkinsfile
