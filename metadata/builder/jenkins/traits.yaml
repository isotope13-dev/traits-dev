# Build System - JENKINS
defaults:
  for: [elf, macho, pe, so, dylib, dll, shell]
traits:
  # === Jenkins micro-behaviors ===
  - id: jenkins-url
    desc: JENKINS_URL variable
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "JENKINS_URL"
      section: .text
  - id: build-number
    desc: BUILD_NUMBER variable
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "BUILD_NUMBER"
      section: .text
  - id: job-name
    desc: JOB_NAME variable
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "JOB_NAME"
      section: .text
  - id: jenkinsfile
    desc: Jenkinsfile
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "Jenkinsfile"
      section: .text
composite_rules:
  # Jenkins composite (migrated from YARA)
  - id: jenkins
    desc: Jenkins CI artifacts
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: jenkins-url
      - id: build-number
      - id: job-name
      - id: jenkinsfile
