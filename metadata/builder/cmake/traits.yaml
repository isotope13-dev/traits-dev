# Build System - CMAKE
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === CMake micro-behaviors ===
  - id: cmakefiles
    desc: CMakeFiles directory
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "CMakeFiles"
      section: .text
  - id: cmake-min-required
    desc: cmake_minimum_required directive
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "cmake_minimum_required"
      section: .text
  - id: cmake-prefix
    desc: CMAKE_ variable prefix
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: "CMAKE_"
      section: .text
  - id: cmakelists
    desc: CMakeLists.txt file
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "CMakeLists.txt"
      section: .text
composite_rules:
  # CMake composite (migrated from YARA)
  - id: cmake
    desc: Built with CMake
    crit: notable
    conf: 0.85
    any:
      - id: cmakefiles
      - id: cmake-min-required
      - id: cmake-prefix
      - id: cmakelists
