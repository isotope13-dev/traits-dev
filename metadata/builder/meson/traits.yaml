# Build System - MESON
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === Meson micro-behaviors ===
  - id: meson-build
    desc: meson.build file
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "meson.build"
      section: .text
  - id: meson-options
    desc: meson_options file
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "meson_options"
      section: .text
  - id: meson-private
    desc: meson-private directory
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "meson-private"
      section: .text
composite_rules:
  # Meson composite (migrated from YARA)
  - id: meson
    desc: Built with Meson
    crit: notable
    conf: 0.85
    any:
      - id: meson-build
      - id: meson-options
      - id: meson-private
