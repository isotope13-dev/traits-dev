# Build System - GITLAB CI
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === GitLab CI micro-behaviors ===
  - id: ci-pipeline-id
    desc: CI_PIPELINE_ID variable
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "CI_PIPELINE_ID"
      section: .text
  - id: ci-job-id
    desc: CI_JOB_ID variable
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "CI_JOB_ID"
      section: .text
  - id: gitlab-ci-env
    desc: GITLAB_CI variable
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "GITLAB_CI"
      section: .text
  - id: gitlab-ci-yml
    desc: .gitlab-ci.yml file
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: ".gitlab-ci.yml"
      section: .text
composite_rules:
  # GitLab CI composite (migrated from YARA)
  - id: gitlab-ci
    desc: GitLab CI artifacts
    crit: notable
    conf: 0.9
    any:
      - id: ci-pipeline-id
      - id: ci-job-id
      - id: gitlab-ci-env
      - id: gitlab-ci-yml
