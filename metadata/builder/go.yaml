# Build System - GO
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [go, binaries]
traits:
  # === Go modules micro-behaviors ===
  - id: go-mod
    desc: go.mod file
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "go.mod"
      section: .text
  - id: go-sum
    desc: go.sum file
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "go.sum"
      section: .text
  - id: go-pkg-mod
    desc: go/pkg/mod directory
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "go/pkg/mod"
      section: .text
  - id: gopath-env
    desc: GOPATH environment variable
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "GOPATH"
      section: .text
composite_rules:
  # Go modules composite (migrated from YARA)
  - id: go-modules
    desc: Built with Go modules
    crit: notable
    conf: 0.9
    any:
      - id: go-mod
      - id: go-sum
      - id: go-pkg-mod
      - id: gopath-env
