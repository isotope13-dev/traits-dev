# Build System - CIRCLECI
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === CircleCI micro-behaviors ===
  - id: circleci-env
    desc: CIRCLECI variable
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "CIRCLECI"
      section: .text
  - id: circle-build-num
    desc: CIRCLE_BUILD_NUM variable
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "CIRCLE_BUILD_NUM"
      section: .text
  - id: circleci-config
    desc: .circleci/config file
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: ".circleci/config"
      section: .text
composite_rules:
  # CircleCI composite (migrated from YARA)
  - id: circleci
    desc: CircleCI artifacts
    crit: notable
    conf: 0.9
    any:
      - id: circleci-env
      - id: circle-build-num
      - id: circleci-config
