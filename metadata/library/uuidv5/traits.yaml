defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.9

traits:
  - id: php-uuidv5-function
    desc: PHP UUIDv5 function declaration
    if:
      type: text
      regex: function\s+uuid_v5\s*\(

  - id: php-uuidv5-pack
    desc: PHP UUIDv5 namespace packing
    if:
      type: text
      regex: uuid_v5[\s\S]{0,700}pack\s*\(\s*["']H\*["']

  - id: php-uuidv5-sha1
    desc: PHP UUIDv5 SHA1 hashing
    if:
      type: text
      regex: uuid_v5[\s\S]{0,700}sha1\s*\(

  - id: php-uuidv5-version
    desc: PHP UUIDv5 version marker
    if:
      type: text
      regex: uuid_v5[\s\S]{0,900}version\s+5

composite_rules:
  - id: php-uuidv5-implementation
    desc: Recognized PHP UUIDv5 implementation
    crit: exception
    conf: 0.99
    all:
      - id: php-uuidv5-function
      - id: php-uuidv5-pack
      - id: php-uuidv5-sha1
      - id: php-uuidv5-version
