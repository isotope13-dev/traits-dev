defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: baseline
  conf: 0.99

traits:
  - id: google-auth-library-package
    desc: Google Auth Library package
    if:
      type: value
      path: name
      exact: google-auth-library
  - id: gcp-metadata-package
    desc: Google Cloud metadata package
    if:
      type: value
      path: name
      exact: gcp-metadata
  - id: gaxios-dependency
    desc: Declares gaxios HTTP client dependency
    crit: notable
    if:
      type: value
      path: dependencies.gaxios
      exists: true
  - id: gaxios-dev-dependency
    desc: Declares gaxios dev dependency
    crit: notable
    if:
      type: value
      path: devDependencies.gaxios
      exists: true
  - id: gaxios-package
    desc: gaxios HTTP client package
    crit: notable
    if:
      type: value
      path: name
      exact: gaxios

composite_rules:
  - id: google-client-gaxios-dependency
    desc: Google client uses gaxios
    crit: notable
    all:
      - id: gaxios-dependency
    any:
      - id: google-auth-library-package
      - id: gcp-metadata-package
