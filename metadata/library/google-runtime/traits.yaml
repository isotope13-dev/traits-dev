defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
- id: google-cse-search-marker
  desc: Google CSE search runtime marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "google.search."
- id: google-loader-marker
  desc: Google loader runtime marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "google.loader."
- id: google-uds-message-marker
  desc: Google UDS message marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "_UDS_MSG_"
- id: google-afs-csa-marker
  desc: Google AFS CSA runtime marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "_googCsa"
- id: google-afs-host-marker
  desc: Google AFS host marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "afs.googlesyndication.com"
- id: google-afs-path-marker
  desc: Google AFS ads path marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "/afs/ads"
- id: gcp-metadata-js-bundle
  desc: gcp-metadata JS library bundle
  crit: baseline
  conf: 0.96
  if:
    type: text
    substr: GCE_LINUX_BIOS_PATHS
