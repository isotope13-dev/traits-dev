# Microsoft Foundation Class (MFC) runtime library identity.
#
# mfc140u.dll and friends are the Microsoft C++ GUI framework redistributable,
# shipped inside pywin32 (Pythonwin) and countless desktop apps. As a general
# UI/network framework it carries the *whole* Win32 surface — GDI bitmap/DIB
# capture, WinINet HTTP and cookie wrappers, clipboard, etc. — so capability
# composites (screenshot-exfil, cookie-manipulation) fire on the framework's API
# wrappers even though the DLL does nothing on its own. Referenced as benign
# context so those composites do not treat the framework for the app using it.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
traits:
  - id: mfc-feature-pack-class
    desc: MFC feature-pack framework class symbol
    conf: 0.92
    if:
      type: text
      substr: CMFCVisualManager
      section: rdata
  - id: mfc-runtime-basename
    desc: MFC runtime DLL filename (mfc140u etc.)
    conf: 0.9
    if:
      type: basename
      regex: '(?i)^mfc[0-9]{2,3}u?d?\.dll$'
  - id: mfc-runtime-version-info
    desc: MFC runtime version metadata
    conf: 0.97
    if:
      type: value
      path: pe.version.internal_name
      regex: '(?i)^MFC[0-9]{2,3}U?D?\.DLL$'
composite_rules:
  - id: mfc-runtime-library
    desc: Microsoft Foundation Class runtime library
    conf: 0.92
    any:
      - id: mfc-feature-pack-class
      - id: mfc-runtime-basename
      - id: mfc-runtime-version-info
