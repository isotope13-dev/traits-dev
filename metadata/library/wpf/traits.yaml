# .NET WPF (Windows Presentation Foundation) framework markers.
# Present in any managed PE that links the WPF GUI assemblies.
defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.9

traits:
- id: wpf-namespace-ref
  desc: .NET WPF namespace reference
  if:
    type: text
    section: .text
    regex: "System\\.(Windows|WindowsBase|PresentationCore|PresentationFramework)"

- id: wpf-window-method-names--mainwindow
  desc: .NET WPF window method names (MainWindow)
  if:
    type: text
    section: .text
    word: MainWindow
- id: wpf-window-method-names--wigglewindow
  desc: .NET WPF window method names (WiggleWindow)
  if:
    type: text
    section: .text
    word: WiggleWindow
- id: wpf-window-method-names--minimizewindow
  desc: .NET WPF window method names (MinimizeWindow)
  if:
    type: text
    section: .text
    word: MinimizeWindow
- id: wpf-window-method-names--dragwindow
  desc: .NET WPF window method names (DragWindow)
  if:
    type: text
    section: .text
    word: DragWindow
composite_rules:
- id: wpf-window-method-names
  desc: .NET WPF window method names
  any:
  - id: wpf-window-method-names--mainwindow
  - id: wpf-window-method-names--wigglewindow
  - id: wpf-window-method-names--minimizewindow
  - id: wpf-window-method-names--dragwindow
