defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: version-string
    desc: jQuery version string
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: jQuery v[0-9]\.[0-9]+\.[0-9]+
      not:
        - substr: "Bootstrap's JavaScript requires at least jQuery"
        - substr: "Bootstrap\\'s JavaScript requires at least jQuery"
  - id: header-prefix
    desc: jQuery header prefix
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: '/*! jQuery v'
  - id: domain
    desc: jquery.org domain reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: jquery.org
  - id: copyright
    desc: jQuery copyright notice
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: jQuery JavaScript Library
  - id: fn-extend
    desc: jQuery.fn.extend signature
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: jQuery.fn.extend

  # Some packaged extensions run jQuery through a renamer/hex-escape pass,
  # removing the normal banner and global names.  These three independent
  # library markers identify that transformed copy without treating its
  # compatibility code as an attacker behavior.
  - id: obfuscated-version-marker
    desc: Obfuscated jQuery version marker
    crit: baseline
    conf: 0.98
    if:
      type: literal
      kind: string
      exact: '1.11.1'
  - id: obfuscated-sizzle-marker
    desc: Obfuscated jQuery Sizzle marker
    crit: baseline
    conf: 0.98
    if:
      type: literal
      kind: string
      exact: sizzle
      case_insensitive: true
  - id: obfuscated-ajax-settings-marker
    desc: Obfuscated jQuery AJAX settings marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      word: ajaxSettings

composite_rules:
  - id: obfuscated-jquery-source
    desc: Obfuscated jQuery source bundle
    crit: baseline
    conf: 0.99
    all:
      - id: obfuscated-version-marker
      - id: obfuscated-sizzle-marker
      - id: obfuscated-ajax-settings-marker
