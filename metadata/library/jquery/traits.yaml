defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: version-string
    desc: jQuery version string
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: jQuery v[0-9]\.[0-9]+\.[0-9]+
      not:
        - substr: "Bootstrap's JavaScript requires at least jQuery"
        - substr: "Bootstrap\\'s JavaScript requires at least jQuery"
  - id: header-prefix
    desc: jQuery header prefix
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: '/*! jQuery v'
  - id: domain
    desc: jquery.org domain reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: jquery.org
  - id: copyright
    desc: jQuery copyright notice
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: jQuery JavaScript Library
  - id: fn-extend
    desc: jQuery.fn.extend signature
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: jQuery.fn.extend
