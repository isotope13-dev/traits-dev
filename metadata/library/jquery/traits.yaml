defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: version-string
    desc: jQuery version string
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: jQuery v[0-9]\.[0-9]+\.[0-9]+
  - id: domain
    desc: jquery.org domain reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: jquery.org
  - id: copyright
    desc: jQuery copyright notice
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: jQuery JavaScript Library
  - id: fn-extend
    desc: jQuery.fn.extend signature
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: jQuery.fn.extend
composite_rules:
  - id: library
    desc: File contains jQuery library
    crit: notable
    conf: 0.9
    any:
      - id: version-string
      - id: domain
      - id: copyright
      - id: fn-extend
