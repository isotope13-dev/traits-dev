defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: jspdf-version-string
    desc: jsPDF library version string
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: jsPDF v?\d+\.\d+\.\d+
  - id: jspdf-banner
    desc: jsPDF library banner
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: yWorks/jsPDF
  - id: jspdf-namespace
    desc: jsPDF namespace assignment
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \(t=t\|\|self\)\.jspdf=\{\}
  - id: html2pdf-bundle
    desc: html2pdf bundled library
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'html2pdf\.js v\d+\.\d+\.\d+|root\["html2pdf"\]\s*=\s*factory\(\)'
  - id: jspdf-standard-font-data
    desc: jsPDF bundled font data
    crit: baseline
    conf: 0.92
    if:
      type: text
      substr: StandardFontDataFactory
