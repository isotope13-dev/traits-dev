defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: mozilla-readability-library
    desc: Mozilla Readability library
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: 'function\s+Readability\s*\(|Readability\.prototype|FLAG_STRIP_UNLIKELYS'
  - id: turndown-htmlfile-fallback
    desc: Turndown htmlfile parser fallback
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: 'function\s+TurndownService\s*\(|new\s+window\.ActiveXObject\([''"]htmlfile[''"]\)'
