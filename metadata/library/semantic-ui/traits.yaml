defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: semantic-ui-js
    desc: Semantic UI JavaScript library
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "Semantic UI - 2.4."
  - id: semantic-ui-min-js-path
    desc: Semantic UI minified JavaScript filename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: '(^|[\\/])semantic\.min\.js$'
composite_rules:
  - id: semantic-ui-library
    desc: Semantic UI JavaScript library bundle
    crit: baseline
    conf: 0.99
    all:
      - id: semantic-ui-js
      - id: semantic-ui-min-js-path
