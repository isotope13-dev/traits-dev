defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.7

traits:
  - id: require-vscode
    desc: require('vscode') statement
    if:
      type: text
      regex: require\(['"]vscode['"]\)
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: import-vscode
    desc: import from 'vscode' statement
    if:
      type: text
      regex: from\s+['"]vscode['"]
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: namespace
    desc: VS Code namespace reference
    crit: baseline
    if:
      type: string_literal
      regex: vscode\.\w+
  - id: activate-function
    desc: VS Code extension activate function
    if:
      type: string_literal
      regex: ^function\s+activate\b|activate\s*[:=]\s*function
  - id: global-state
    desc: VS Code globalState access
    crit: notable
    if:
      type: symbol
      kind: member
      exact: context.globalState
  - id: workspace-state
    desc: VS Code workspaceState access
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: workspaceState
  - id: machine-id
    desc: VS Code machine identifier access
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: member
      exact: vscode.env.machineId
  - id: workspace-folders
    desc: VS Code workspace folder access
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: member
      exact: vscode.workspace.workspaceFolders
  - id: remote-name
    desc: VS Code remote environment access
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: member
      exact: vscode.env.remoteName
  - id: app-identity
    desc: VS Code editor identity access
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: member
      exact: vscode.env.appName

composite_rules:
  - id: vscode-extension-marker
    desc: VS Code extension identification markers
    crit: notable
    conf: 0.95
    any:
      - id: require-vscode
      - id: import-vscode
      - id: namespace
      - id: activate-function
