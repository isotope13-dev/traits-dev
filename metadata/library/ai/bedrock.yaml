defaults:
  platforms: [windows, unix]
  for: [python, pkginfo]
  crit: baseline
  conf: 0.9

traits:
  - id: llama-index-bedrock-integration
    desc: LlamaIndex Bedrock Converse integration
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: llama-index-llms-bedrock-converse
  - id: llama-index-bedrock-import
    desc: LlamaIndex Bedrock import
    for: [python]
    if:
      type: import
      exact: llama_index.llms.bedrock_converse.utils
  - id: boto3-session-call
    desc: boto3 Session constructor call
    for: [python]
    if:
      type: text
      substr: boto3.Session(
  - id: aioboto3-session-call
    desc: aioboto3 Session constructor call
    for: [python]
    if:
      type: text
      substr: aioboto3.Session(
  - id: session-client-call
    desc: boto session client call
    for: [python]
    crit: component
    if:
      type: text
      substr: session.client(
  - id: bedrock-runtime-literal
    desc: Bedrock runtime service literal
    for: [python]
    crit: component
    if:
      type: literal
      exact: bedrock-runtime
  - id: bedrock-converse-call
    desc: Bedrock converse API call
    for: [python]
    if:
      type: text
      regex: '\b(client|c)\.converse\('
  - id: bedrock-converse-stream-call
    desc: Bedrock converse stream call
    for: [python]
    if:
      type: text
      regex: '\b(client|c)\.converse_stream\('

composite_rules:
  - id: bedrock-runtime-client-call
    desc: Bedrock runtime client call
    crit: baseline
    conf: 0.94
    all:
      - id: session-client-call
      - id: bedrock-runtime-literal
  - id: boto3-bedrock-runtime-client
    desc: boto3 Bedrock runtime client
    crit: baseline
    conf: 0.94
    all:
      - id: boto3-session-call
      - id: bedrock-runtime-client-call
  - id: aioboto3-bedrock-runtime-client
    desc: aioboto3 Bedrock runtime client
    crit: baseline
    conf: 0.94
    all:
      - id: aioboto3-session-call
      - id: bedrock-runtime-client-call
  - id: bedrock-converse-client
    desc: AWS Bedrock Converse client
    crit: baseline
    conf: 0.95
    all:
      - id: bedrock-runtime-client-call
    any:
      - id: bedrock-converse-call
      - id: bedrock-converse-stream-call
  - id: llama-index-bedrock-client
    desc: LlamaIndex Bedrock client code
    crit: baseline
    conf: 0.96
    all:
      - id: llama-index-bedrock-import
      - id: bedrock-converse-client
