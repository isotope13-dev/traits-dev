# AI-agent / MCP tooling packages, identified from package.json keyword and
# description metadata. Relocated from metadata/package/tooling (these detect an
# AI library/agent package, not generic build tooling).
defaults:
  platforms: [windows, unix]
  for:
    - package.json
traits:
  - id: keyword-mcp
    desc: Package keyword mentions MCP
    crit: component
    conf: 0.9
    if:
      type: value
      path: keywords
      regex: '(?i)\bmcp\b'
  - id: keyword-agent-tooling
    desc: Package keyword mentions agent tooling
    crit: component
    conf: 0.85
    if:
      type: value
      path: keywords
      regex: '(?i)\b(agent|llm|codex|claude)\b'
  - id: description-agent-tooling
    desc: Description mentions AI agent tooling
    crit: component
    conf: 0.85
    if:
      type: value
      path: description
      regex: '(?i)\b(agent|Claude|Codex)\b'
composite_rules:
  - id: mcp-agent-tool-package
    desc: MCP AI agent tooling package
    crit: baseline
    conf: 0.9
    all:
      - id: keyword-mcp
    any:
      - id: keyword-agent-tooling
      - id: description-agent-tooling
