defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.96

traits:
  - id: mediapipe-selfie-package
    desc: MediaPipe selfie package metadata
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@mediapipe/selfie_segmentation'
  - id: mediapipe-selfie-basename
    desc: MediaPipe selfie segmentation basename
    crit: component
    for: [javascript, typescript]
    if:
      type: basename
      regex: '(^|[\\/])(selfie_segmentation|selfieSegmentation)(\.min)?\.js$'
  - id: mediapipe-selfie-runtime-marker
    desc: MediaPipe selfie segmentation runtime
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      regex: 'selfie_segmentation(_landscape)?\.tflite|selfie_segmentation_solution'
  - id: mediapipe-wasm-loader-basename
    desc: MediaPipe WASM loader basename
    for: [javascript, typescript]
    if:
      type: basename
      regex: '(^|[\\/])selfie_segmentation_solution(_simd)?_wasm_bin\.js$'
  - id: tfjs-bodypix-model-url
    desc: TensorFlow JS BodyPix model URL
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      substr: storage.googleapis.com/tfjs-models/savedmodel/bodypix
  - id: tfhub-mediapipe-model-url
    desc: TFHub MediaPipe model URL
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      substr: tfhub.dev/mediapipe/tfjs-model

composite_rules:
  - id: mediapipe-selfie-distribution-js
    desc: MediaPipe selfie segmentation distribution JavaScript
    crit: baseline
    conf: 0.98
    all:
      - id: mediapipe-selfie-basename
      - id: mediapipe-selfie-runtime-marker
  - id: mediapipe-selfie-segmentation-bundle
    desc: MediaPipe selfie segmentation bundle
    crit: baseline
    conf: 0.98
    any:
      - id: mediapipe-selfie-package
      - id: mediapipe-wasm-loader-basename
      - id: mediapipe-selfie-distribution-js
  - id: tensorflow-js-vision-model-bundle
    desc: TensorFlow JS vision model bundle
    crit: baseline
    conf: 0.96
    any:
      - id: tfjs-bodypix-model-url
      - id: tfhub-mediapipe-model-url
