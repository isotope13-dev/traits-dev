defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, markdown, package.json, powershell]
  crit: baseline
  conf: 0.9

traits:
- id: roocode-runtime-string
  desc: RooCode runtime string
  crit: component
  if:
    type: text
    substr: RooCode
- id: cline-runtime-string
  desc: Cline runtime string
  crit: component
  if:
    type: text
    substr: Cline
- id: cline-messages-runtime-string
  desc: Cline messages runtime string
  crit: component
  if:
    type: text
    substr: clineMessages
- id: cline-extension-api-host
  desc: Cline extension API host
  crit: baseline
  conf: 0.98
  for: [javascript]
  if:
    type: text
    substr: https://api.cline.bot/v1/mcp
- id: roo-ignore-runtime-string
  desc: Roo ignore runtime string
  crit: component
  if:
    type: text
    substr: rooIgnoreController
- id: agent-mcp-tool-runtime
  desc: Agent MCP tool-use runtime
  crit: component
  if:
    type: text
    substr: mcp_tool_use
- id: agent-auto-approval-setting
  desc: Agent auto-approval setting
  crit: component
  if:
    type: text
    substr: autoApprovalEnabled
- id: agent-allowed-commands-setting
  desc: Agent allowed commands setting
  crit: component
  if:
    type: text
    substr: allowedCommands
- id: bonecode-package-path
  desc: BoneCode package path
  crit: component
  if:
    type: path
    regex: '(?i)(^|[\\/])bonecode-[0-9][^\\/]*\.tgz'
- id: bonecode-runtime-bonecode
  desc: BoneCode runtime string
  crit: component
  if:
    type: text
    word: BoneCode
- id: bonecode-runtime-bonescript
  desc: BoneScript runtime string
  crit: component
  if:
    type: text
    word: BoneScript
- id: opencode-ai-import
  desc: OpenCode AI package import
  crit: component
  if:
    type: text
    substr: "@opencode-ai"
- id: ai-coding-assistant-readme
  desc: AI coding assistant documentation
  if:
    type: text
    regex: 'AI Programmer Mode|autonomous coding agent|AI coding assistant'
    case_insensitive: true
- id: github-copilot-cli-session-manager
  desc: GitHub Copilot CLI session manager
  crit: baseline
  conf: 0.92
  for: [python]
  if:
    type: text
    substr: GitHub Copilot CLI session management
- id: code-reviewer-phrase
  desc: Code reviewer phrase
  crit: component
  conf: 0.86
  ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
  for: [scripts]
  if:
    type: text
    substr: code reviewer
    case_insensitive: true
- id: pull-request-diff-phrase
  desc: Pull request diff phrase
  crit: component
  conf: 0.84
  ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
  for: [scripts]
  if:
    type: text
    substr: pull-request diff
    case_insensitive: true
- id: llm-call-phrase
  desc: LLM call phrase
  crit: component
  conf: 0.84
  ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
  for: [scripts]
  if:
    type: text
    regex: '(?i)\b(LLM|model) call\b'
- id: llm-review-lens-runtime
  desc: LLM review lens runtime
  crit: baseline
  conf: 0.88
  ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
  for: [scripts]
  if:
    type: text
    substr: review lens
    case_insensitive: true
- id: llm-review-triage-runtime
  desc: LLM review triage runtime
  crit: baseline
  conf: 0.9
  ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
  for: [scripts]
  if:
    type: text
    substr: pull-request triage filter
    case_insensitive: true
- id: auto-approval-ui-warning
  desc: Auto-approval safety warning
  crit: component
  if:
    type: text
    regex: 'Auto-approve|auto-approval'
    case_insensitive: true
- id: auto-approval-permission-warning
  desc: Auto-approval permission warning
  crit: component
  if:
    type: text
    substr: without asking for permission
    case_insensitive: true
- id: auto-approval-risk-warning
  desc: Auto-approval security risk warning
  crit: component
  if:
    type: text
    substr: security risks
    case_insensitive: true

- id: package-ai-keyword--ai
  desc: Package AI keyword (ai)
  crit: component
  conf: 0.9
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    exact: ai
- id: package-ai-keyword--gpt
  desc: Package AI keyword (gpt)
  crit: component
  conf: 0.9
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    exact: gpt
- id: package-ai-keyword--chatgpt
  desc: Package AI keyword (chatgpt)
  crit: component
  conf: 0.9
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    case_insensitive: true
    exact: chatgpt
- id: package-ai-keyword--llm
  desc: Package AI keyword (llm)
  crit: component
  conf: 0.9
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    exact: llm
- id: package-agent-keyword--agent
  desc: Package agent keyword (agent)
  crit: component
  conf: 0.9
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    case_insensitive: true
    exact: agent
- id: package-agent-keyword--assistant
  desc: Package agent keyword (assistant)
  crit: component
  conf: 0.9
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    case_insensitive: true
    exact: assistant
- id: package-agent-keyword--coding
  desc: Package agent keyword (coding)
  crit: component
  conf: 0.9
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    case_insensitive: true
    exact: coding
- id: package-ai-model-keyword--claude
  desc: Package AI model keyword (claude)
  crit: component
  conf: 0.88
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    case_insensitive: true
    exact: claude
- id: package-ai-model-keyword--opencode
  desc: Package AI model keyword (opencode)
  crit: component
  conf: 0.88
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    case_insensitive: true
    exact: opencode
- id: package-ai-model-keyword--groq
  desc: Package AI model keyword (groq)
  crit: component
  conf: 0.88
  for: [package.json]
  if:
    type: value
    path: keywords[*]
    exact: groq
composite_rules:
- id: package-ai-keyword
  desc: Package AI keyword
  crit: component
  conf: 0.9
  for: [package.json]
  any:
  - id: package-ai-keyword--ai
  - id: package-ai-keyword--gpt
  - id: package-ai-keyword--chatgpt
  - id: package-ai-keyword--llm
- id: package-agent-keyword
  desc: Package agent keyword
  crit: component
  conf: 0.9
  for: [package.json]
  any:
  - id: package-agent-keyword--agent
  - id: package-agent-keyword--assistant
  - id: package-agent-keyword--coding
- id: package-ai-model-keyword
  desc: Package AI model keyword
  crit: component
  conf: 0.88
  for: [package.json]
  any:
  - id: package-ai-model-keyword--claude
  - id: package-ai-model-keyword--opencode
  - id: package-ai-model-keyword--groq
- id: roo-cline-agent-runtime
  desc: Roo/Cline agent runtime
  crit: component
  conf: 0.94
  any:
  - id: roocode-runtime-string
  - id: cline-runtime-string
  - id: cline-messages-runtime-string
  - id: roo-ignore-runtime-string
- id: ai-coding-assistant-runtime
  desc: AI coding assistant runtime
  crit: baseline
  conf: 0.96
  any:
  - id: roo-cline-agent-runtime
  - id: agent-mcp-tool-runtime
  - id: agent-auto-approval-setting
  - id: agent-allowed-commands-setting
  - id: ai-coding-assistant-readme
  - id: ai-coding-assistant-package
  - id: bonecode-package-path
  - id: bonecode-runtime-bonecode
  - id: bonecode-runtime-bonescript
  - id: opencode-ai-import
  - id: llm-code-reviewer-runtime
  - id: llm-review-lens-runtime
  - id: llm-review-triage-runtime
  - id: micro-behaviors/process/create/hcom::opencode-cli-agent-session
- id: llm-code-reviewer-runtime
  desc: LLM code reviewer runtime
  crit: baseline
  conf: 0.92
  ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
  for: [scripts]
  any:
  - id: code-reviewer-phrase
  - id: pull-request-diff-phrase
  all:
  - id: llm-call-phrase
  near_bytes: 5000
- id: ai-coding-assistant-package
  desc: AI coding assistant package
  crit: baseline
  conf: 0.94
  all:
  - id: package-ai-keyword
  - id: package-agent-keyword
  any:
  - id: package-ai-model-keyword
  - id: ai-coding-assistant-readme
- id: ai-coding-assistant-extension-context
  desc: AI coding assistant VSCode extension
  crit: baseline
  conf: 0.97
  all:
  - id: ai-coding-assistant-runtime
  any:
  - id: metadata/library/vscode::vscode-extension-marker
  - id: metadata/package/manifest/runtime::vscode-extension
  - id: metadata/package/files/included::vsix-package-json-entry
- id: ai-agent-auto-approval-ui
  desc: AI agent auto-approval UI
  crit: baseline
  conf: 0.96
  all:
  - id: ai-coding-assistant-runtime
  - id: auto-approval-ui-warning
  - id: auto-approval-permission-warning
  - id: auto-approval-risk-warning
