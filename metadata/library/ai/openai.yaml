defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: azure-ai-openai
    desc: Azure.AI.OpenAI library reference
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: Azure.AI.OpenAI
      section: .rdata
  - id: openai-ref
    desc: OpenAI reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      substr: OpenAI
      section: .rdata
composite_rules:
  - id: client-comp
    desc: Integration with OpenAI/Azure AI libraries
    crit: component
    conf: 0.8
    any:
      - id: azure-ai-openai
      - id: openai-ref
