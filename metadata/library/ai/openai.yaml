defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: azure-ai-openai
    desc: Azure.AI.OpenAI library reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: Azure.AI.OpenAI
      section: .rdata
  - id: openai-ref
    desc: OpenAI reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: OpenAI
      section: .rdata
  - id: openai-dotnet-client-library
    desc: OpenAI .NET product name
    crit: baseline
    conf: 0.99
    for: [pe, dll]
    if:
      type: value
      path: pe.version.product_name
      exact: The official .NET library for OpenAI
  - id: openai-dotnet-company
    desc: OpenAI version company
    crit: baseline
    conf: 0.99
    for: [pe, dll]
    if:
      type: value
      path: pe.version.company
      exact: OpenAI
  - id: openai-dotnet-internal-name
    desc: OpenAI DLL internal name
    crit: baseline
    conf: 0.99
    for: [pe, dll]
    if:
      type: value
      path: pe.version.internal_name
      exact: OpenAI.dll

composite_rules:
  - id: openai-dotnet-official-library
    desc: Official OpenAI .NET library
    crit: baseline
    conf: 0.99
    for: [pe, dll]
    all:
      - id: openai-dotnet-client-library
      - id: openai-dotnet-company
      - id: openai-dotnet-internal-name
