defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.97

traits:
- id: microsoft-live-auth-disabled-endpoint
  desc: Microsoft Live sign-in disabled-script endpoint
  crit: notable
  for: [javascript, html]
  if:
    type: text
    substr: login.live.com/jsDisabled.srf
- id: microsoft-live-auth-domain
  desc: Microsoft Live authentication domain
  crit: notable
  for: [javascript, html]
  if:
    type: text
    substr: login.live.com
- id: microsoft-live-auth-service-marker
  desc: Microsoft Live authentication service marker
  crit: notable
  for: [javascript, html]
  if:
    type: text
    substr: 'service:"MSA"'
- id: microsoft-rewards-oidc-post-form
  desc: Microsoft Rewards OIDC POST form
  crit: notable
  for: [javascript, html]
  if:
    type: text
    regex: 'action=["'']https://rewards\.bing\.com/signin-oidc["''][^>]{0,180}\bmethod=["'']post["'']'
- id: microsoft-oauth-denied-response
  desc: Microsoft OAuth denied-response message
  crit: notable
  for: [javascript, html]
  if:
    type: text
    substr: Silent authentication was denied
- id: ests-error-code-catalog
  desc: Microsoft ESTS error code catalog
  if:
    type: text
    substr: ESTSErrorCodes
- id: ests-string-repository
  desc: Microsoft ESTS string repository
  if:
    type: text
    substr: StringRepository
- id: ests-footer-string-id
  desc: Microsoft ESTS footer string ID
  if:
    type: text
    substr: MOBILE_STR_Footer_Microsoft

composite_rules:
  - id: microsoft-live-auth-runtime-context
    desc: Microsoft Live authentication runtime
    crit: exception
    conf: 0.98
    all:
      - id: microsoft-live-auth-domain
      - id: microsoft-live-auth-service-marker
  - id: microsoft-oauth-error-relay-context
    desc: Microsoft OAuth error relay
    crit: exception
    conf: 0.98
    all:
      - id: microsoft-live-auth-disabled-endpoint
      - id: microsoft-rewards-oidc-post-form
      - id: microsoft-oauth-denied-response
  - id: ests-login-runtime
    desc: Microsoft ESTS login runtime bundle
    all:
      - id: ests-error-code-catalog
      - id: ests-string-repository
      - id: ests-footer-string-id
