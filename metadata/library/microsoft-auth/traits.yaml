defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.97

traits:
  - id: ests-error-code-catalog
    desc: Microsoft ESTS error code catalog
    if:
      type: text
      substr: ESTSErrorCodes
  - id: ests-string-repository
    desc: Microsoft ESTS string repository
    if:
      type: text
      substr: StringRepository
  - id: ests-footer-string-id
    desc: Microsoft ESTS footer string ID
    if:
      type: text
      substr: MOBILE_STR_Footer_Microsoft

composite_rules:
  - id: ests-login-runtime
    desc: Microsoft ESTS login runtime bundle
    all:
      - id: ests-error-code-catalog
      - id: ests-string-repository
      - id: ests-footer-string-id
