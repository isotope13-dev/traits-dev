defaults:
  platforms: [unix, windows]
  for: [python]
  crit: baseline
  conf: 0.98
traits:
  - id: embedded-source-wrapper-marker
    desc: Versioneer embedded source marker
    if:
      type: text
      substr: VERSIONEER_b64
  - id: upstream-project-url
    desc: Versioneer upstream project token
    if:
      type: encoded
      encoding: base64
      substr: python-versioneer
  - id: vendor-write-target
    desc: Versioneer vendor file target
    if:
      type: text
      substr: open("versioneer.py", "wb")
  - id: source-file-name
    desc: Versioneer source filename
    if:
      type: path
      basename: true
      exact: versioneer.py
  - id: source-docstring
    desc: Versioneer source docstring
    if:
      type: text
      substr: "The Versioneer"
composite_rules:
  - id: embedded-source-wrapper
    desc: Versioneer embedded source wrapper
    all:
      - id: embedded-source-wrapper-marker
      - id: upstream-project-url
  - id: source-file
    desc: Versioneer source file
    crit: baseline
    conf: 0.98
    all:
      - id: source-file-name
      - id: source-docstring
