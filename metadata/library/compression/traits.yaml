# Compression Library Detection
# Detects markers indicating this binary is a compression library
# Used for context in supply chain attack detection (e.g., XZ backdoor)
defaults:
  crit: notable
  conf: 0.8
  for: [elf, macho, pe]
traits:
  # === LZMA/XZ markers ===
  - id: lzma-marker
    desc: LZMA library marker
    if:
      type: string
      regex: "\\blzma_(stream|code|end|easy_encoder)\\b"
  - id: xz-marker
    desc: XZ Utils marker
    if:
      type: string
      regex: "\\bxz_(crc32|crc64)\\b"
  # === zlib markers ===
  # NOTE: Removed - compression function usage is a capability (micro-behavior), not metadata
  # See: micro-behaviors/data/compression/library/traits.yaml

  # === bzip2 markers ===
  - id: bzip2-marker
    desc: bzip2 library marker
    if:
      type: string
      regex: "\\bBZ2_(bz|compress|decompress)\\b"
  # === zstd markers ===
  # NOTE: Removed - compression function usage is a capability (micro-behavior), not metadata
  # See: micro-behaviors/data/compression/library/traits.yaml

  # === Archive library markers ===
  # Archive libraries (libarchive) handle multiple archive formats and
  # naturally contain format magic bytes as detection constants
  - id: archive-read-marker
    desc: Archive reader API marker
    if:
      type: symbol
      regex: "\\barchive_read_(open|support_format)"
  - id: archive-write-marker
    desc: Archive writer API marker
    if:
      type: symbol
      regex: "\\barchive_write_(open|set_format)"
composite_rules:
  - id: compression-lib
    desc: "File is a compression library"
    crit: notable
    conf: 0.85
    any:
      - id: lzma-marker
      - id: xz-marker
      - id: bzip2-marker
    # Note: zlib and zstd removed - use micro-behaviors/data/compression/library instead
  - id: archive-lib
    desc: "File is an archive library"
    crit: notable
    conf: 0.9
    any:
      - id: archive-read-marker
      - id: archive-write-marker
