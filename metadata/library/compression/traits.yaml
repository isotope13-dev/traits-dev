defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  crit: notable
  conf: 0.8
  for: [binaries]
traits:
  - id: lzma-marker
    desc: LZMA library marker
    if:
      type: string_value
      regex: \blzma_(stream|code|end|easy_encoder)\b
      section: .text
  - id: xz-marker
    desc: XZ Utils marker
    if:
      type: string_value
      regex: \bxz_(crc32|crc64)\b
      section: .text
  - id: bzip2-marker
    desc: bzip2 library marker
    if:
      type: string_value
      regex: \bBZ2_(bz|compress|decompress)\b
      section: .text
  - id: archive-read-marker
    desc: Archive reader API marker
    if:
      type: symbol
      substr: archive_read_
  - id: archive-write-marker
    desc: Archive writer API marker
    if:
      type: symbol
      substr: archive_write_
  - id: 7zip-sdk-marker
    desc: 7-Zip SDK archive namespace
    if:
      type: symbol
      regex: NArchive::(NZip|N7z|NRar|NCab)
composite_rules:
  - id: compression-lib
    desc: File is a compression library
    crit: notable
    conf: 0.85
    any:
      - id: lzma-marker
      - id: xz-marker
      - id: bzip2-marker
  - id: archive-lib
    desc: File is an archive library
    crit: notable
    conf: 0.9
    any:
      - id: archive-read-marker
      - id: archive-write-marker
      - id: 7zip-sdk-marker
