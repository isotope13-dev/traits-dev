# CrashRpt crash-reporting library markers
# https://github.com/CrashRpt/CrashRpt
# Resource-table strings present in any application that bundles CrashRpt.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.95

traits:
  - id: resource-about
    desc: CrashRpt About dialog resource string
    if:
      type: text
      substr: "About CrashRpt"
      section: ".rsrc"

  - id: resource-version
    desc: CrashRpt version resource string
    if:
      type: text
      substr: "CrashRpt, Version 1.0"
      section: ".rsrc"

  - id: resource-name
    desc: CrashRpt resource name string
    if:
      type: text
      substr: "\\bCrashRpt"
      section: ".rsrc"

  - id: resource-name-upper
    desc: CrashRpt uppercase resource name string
    if:
      type: text
      substr: "\\bCRASHRPT"
      section: ".rsrc"

composite_rules:
  - id: resource-pin
    desc: CrashRpt library resource table
    crit: baseline
    conf: 0.99
    all:
      - id: resource-about
      - id: resource-version
      - id: resource-name
      - id: resource-name-upper
