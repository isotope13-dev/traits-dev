# Python standard library modules shipped with CPython.
# These are legitimate stdlib files that use patterns like compile/exec,
# marshal.loads, atexit.register, and threading — all benign in this context.
defaults:
  platforms: [linux, macos, windows]
  for: [python]
traits:
  - id: python-stdlib-module
    desc: Python standard library module
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '^(uuid|__init__|_base|shlex|multicall|subprocess|os|sys|test_utils|regression|libpython|test_typing|test_bytes|test_os|test_subprocess|test_future|window|test_asyncgen|dbapi|test_fixers|test_util)\.py$'
