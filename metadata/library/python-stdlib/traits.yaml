defaults:
  platforms: [linux, macos, windows]
  for: [python]
traits:
  - id: asyncio-reference
    desc: Python asyncio library reference
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: asyncio
  - id: p-1
    desc: Python standard library module group 1
    crit: baseline
    if: { type: basename, regex: '^(uuid|_base)\.py$' }
  - id: p-2
    desc: Python standard library module group 2
    crit: baseline
    if: { type: basename, regex: '^(shlex|multicall|subprocess)\.py$' }
  - id: p-3
