defaults:
  platforms: [linux, macos, windows]
  for: [python]
traits:
  - id: asyncio-reference
    desc: Python asyncio library reference
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: asyncio
  - id: p-1
    desc: Python standard library module group 1
    crit: baseline
    if: { type: basename, regex: '^(uuid|_base)\.py$' }
  - id: p-2
    desc: Python standard library module group 2
    crit: baseline
    if: { type: basename, regex: '^(shlex|multicall|subprocess)\.py$' }
  - id: p-3
    desc: Python standard library module group 3
    crit: baseline
    if: { type: basename, regex: '^(os|sys|test_utils)\.py$' }
  - id: p-4
    desc: Python standard library module group 4
    crit: baseline
    if: { type: basename, regex: '^(regression|libpython|test_typing)\.py$' }
  - id: p-5
    desc: Python standard library module group 5
    crit: baseline
    if: { type: basename, regex: '^(test_bytes|test_os|test_subprocess)\.py$' }
  - id: p-6
    desc: Python standard library module group 6
    crit: baseline
    if: { type: basename, regex: '^(test_future|window|test_asyncgen)\.py$' }
  - id: p-7
    desc: Python standard library module group 7
    crit: baseline
    if: { type: basename, regex: '^(dbapi|test_fixers|test_util)\.py$' }
  - id: p-8
    desc: Python standard library module group 8
    crit: baseline
    if: { type: basename, regex: '^(modulefinder|_bootstrap_external|_bootstrap)\.py$' }
  - id: p-9
    desc: Python standard library module group 9
    crit: baseline
    if: { type: basename, regex: '^(importlib|runpy|optparse)\.py$' }
  - id: p-10
    desc: Python standard library module group 10
    crit: baseline
    if: { type: basename, regex: '^(shutil|zipimport)\.py$' }
  - id: python-stdlib-test-file
    desc: Python standard library test file
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'Lib[\\/]test[\\/]'
  - id: python-stdlib-idlelib
    desc: Python idlelib standard library source
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'idlelib[\\/]'
  - id: python-stdlib-test-support
    desc: Python standard library test support source
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'test[\\/]support[\\/]'
  - id: python-stdlib-fixture-wheel
    desc: Python stdlib packaged test fixture wheel
    crit: baseline
    conf: 0.98
    for: [whl]
    if:
      type: basename
      exact: example2-1.0.0-py3-none-any.whl
  - id: python-stdlib-example2-fixture-pkginfo
    desc: Python stdlib example2 test fixture
    crit: baseline
    conf: 0.98
    for: [pkginfo]
    if:
      type: text
      regex: '(?m)^Name:\s*example2\s*$[\s\S]{0,120}^Version:\s*1\.0\.0\s*$'
