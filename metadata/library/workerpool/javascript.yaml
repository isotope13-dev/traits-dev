defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.96

traits:
  - id: workerpool-runtime-bundle
    desc: workerpool JavaScript runtime bundle
    if:
      type: text
      substr: "__workerpool-terminate__"
  - id: workerpool-fork-options
    desc: workerpool fork options table
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "forkOptsNames"

composite_rules:
  - id: workerpool-js-bundle
    desc: workerpool JavaScript bundle
    crit: baseline
    conf: 0.98
    all:
      - id: workerpool-runtime-bundle
      - id: workerpool-fork-options
