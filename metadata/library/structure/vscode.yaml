defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: vscode-source-map-file
    desc: VS Code extension source map file
    crit: baseline
    conf: 0.98
    for: [javascript, vbs, json]
    if:
      type: basename
      regex: '\.js\.map$'
  - id: vscode-webview-output-path
    desc: VS Code extension webview output path
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'out/webview|dist/webview|webview'
  - id: vscode-vendor-output-path
    desc: VS Code extension vendor output path
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'out/vendor|dist/vendor|vendor'
  - id: vscode-js-output-path
    desc: VS Code extension JS output path
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: '(^|/)(out|dist)(/|$)'
  - id: vscode-root-js-bundle
    desc: VS Code root JavaScript bundle
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '(_vscode|bundle|extension)\.js$'
  - id: vscode-source-entrypoint
    desc: VS Code source extension entrypoint
    crit: baseline
    conf: 0.94
    if:
      type: path
      regex: 'src/extension\.js$'
  - id: vscode-generated-escape-fragment
    desc: VS Code generated escape fragment
    crit: baseline
    conf: 0.95
    for: [shell]
    if:
      type: path
      regex: 'unicode-escape@'
  - id: vscode-standalone-webapp-output
    desc: VS Code standalone webapp output
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: '(^|/)(standalone|\.next)(/|$)'
  - id: vscode-notebook-renderer-output
    desc: VS Code extension notebook renderer bundle
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: '(^|/)notebook_renderers(/|$)'
  - id: vscode-language-server-library
    desc: VS Code language-server library dependency
    crit: baseline
    conf: 0.97
    for: [jar, class, java_class]
    if:
      type: path
      regex: 'language-server/lib'
  - id: vscode-language-server-js
    desc: VS Code packaged language server JS
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'out/langserver|langserver|node/.*lsp$'
  - id: vscode-packaged-native-tool
    desc: VS Code extension packaged native tool
    crit: baseline
    conf: 0.96
    for: [elf, macho, pe]
    if:
      type: path
      regex: 'extension/tools|cmsis-toolbox'
  - id: vscode-documentation-media
    desc: VS Code extension packaged documentation media
    crit: baseline
    conf: 0.94
    for: [ooxml]
    if:
      type: path
      regex: '(^|/)images(/|$)'
  - id: vscode-icon-theme-icon-definitions
    desc: VS Code icon theme iconDefinitions catalog
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?iconDefinitions["'']?\s*:'
  - id: vscode-icon-theme-file-names
    desc: VS Code icon theme fileNames associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?fileNames["'']?\s*:'
  - id: vscode-icon-theme-file-extensions
    desc: VS Code icon theme fileExtensions associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?fileExtensions["'']?\s*:'
  - id: vscode-icon-theme-folder-names
    desc: VS Code icon theme folderNames associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?folderNames["'']?\s*:'
  - id: vscode-icon-theme-language-ids
    desc: VS Code icon theme languageIds associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?languageIds["'']?\s*:'
  - id: vscode-material-icon-map-bundle
    desc: VS Code Material Icons map bundle
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '"\.node_modules":"folder-node"|"\.npmrc":"npm"|"\.aws":"folder-aws"'

composite_rules:
  - id: vscode-large-minified-extension-bundle
    desc: Large minified VS Code extension bundle
    crit: baseline
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: metadata/library/structure::js-large-minified-bundle
  - id: vscode-js-distribution-bundle
    desc: VS Code extension JavaScript distribution bundle
    crit: baseline
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    any:
      - id: metadata/library/structure/
      - id: metadata/build/bundler/
  - id: vscode-extension-generated-asset
    desc: VS Code generated extension asset
    crit: baseline
    conf: 0.96
    any:
      - id: vscode-source-map-file
      - id: vscode-webview-output-path
      - id: vscode-vendor-output-path
      - id: vscode-js-output-path
      - id: vscode-root-js-bundle
      - id: vscode-source-entrypoint
      - id: vscode-generated-escape-fragment
      - id: vscode-standalone-webapp-output
      - id: vscode-notebook-renderer-output
      - id: vscode-language-server-library
      - id: vscode-language-server-js
      - id: vscode-packaged-native-tool
      - id: vscode-documentation-media
      - id: vscode-js-distribution-bundle
  - id: vscode-icon-theme-catalog
    desc: VS Code icon theme association catalog
    crit: baseline
    conf: 0.96
    all:
      - id: vscode-icon-theme-icon-definitions
    needs: 3
    any:
      - id: vscode-icon-theme-file-names
      - id: vscode-icon-theme-file-extensions
      - id: vscode-icon-theme-folder-names
      - id: vscode-icon-theme-language-ids
