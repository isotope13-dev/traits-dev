defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: vscode-icon-theme-icon-definitions
    desc: VS Code icon theme iconDefinitions catalog
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?iconDefinitions["'']?\s*:'
  - id: vscode-icon-theme-file-names
    desc: VS Code icon theme fileNames associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?fileNames["'']?\s*:'
  - id: vscode-icon-theme-file-extensions
    desc: VS Code icon theme fileExtensions associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?fileExtensions["'']?\s*:'
  - id: vscode-icon-theme-folder-names
    desc: VS Code icon theme folderNames associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?folderNames["'']?\s*:'
  - id: vscode-icon-theme-language-ids
    desc: VS Code icon theme languageIds associations
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '["'']?languageIds["'']?\s*:'
  - id: vscode-material-icon-map-bundle
    desc: VS Code Material Icons map bundle
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '"\.node_modules":"folder-node"|"\.npmrc":"npm"|"\.aws":"folder-aws"'

composite_rules:
  - id: vscode-large-minified-extension-bundle
    desc: Large minified VS Code extension bundle
    crit: baseline
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: metadata/library/structure::js-large-minified-bundle
  - id: vscode-icon-theme-catalog
    desc: VS Code icon theme association catalog
    crit: baseline
    conf: 0.96
    all:
      - id: vscode-icon-theme-icon-definitions
    needs: 3
    any:
      - id: vscode-icon-theme-file-names
      - id: vscode-icon-theme-file-extensions
      - id: vscode-icon-theme-folder-names
      - id: vscode-icon-theme-language-ids
