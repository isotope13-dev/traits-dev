defaults:
  platforms: [unix, windows]
traits:
  - id: js-umd-wrapper
    desc: Universal Module Definition (UMD) wrapper
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: typeof\s*exports\s*={2,3}\s*["']object["']
  - id: js-umd-wrapper-minified
    desc: Minified UMD wrapper (reversed comparison)
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']object["'']\s*={2,3}\s*typeof\s*exports'
  - id: js-umd-wrapper-amd
    desc: UMD AMD branch marker
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: typeof\s*define\s*={2,3}\s*["']function["']\s*&&\s*define\.amd
  - id: js-umd-wrapper-amd-minified
    desc: Minified UMD AMD branch (reversed comparison)
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']function["'']\s*={2,3}\s*typeof\s*define\s*&&\s*define\.amd'
  - id: js-webpack-bundle
    desc: Webpack bundled JavaScript module
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: __webpack_require__
  - id: js-webpack-import-markers
    desc: Webpack imported module markers
    crit: baseline
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: __WEBPACK_IMPORTED_MODULE_
  - id: js-rollup-bundle
    desc: Rollup bundled JavaScript module
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: "rollup-plugin-commonjs"
  - id: js-closure-compiled-bundle
    desc: Google Closure compiled JavaScript bundle
    crit: baseline
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: "var COMPILED = !0, goog = goog || {}"
  - id: js-closure-provide-call
    desc: Google Closure Library source file
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.provide('
  - id: js-closure-require-call
    desc: Google Closure require call
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.require('
  - id: js-closure-module-call
    desc: Google Closure module call
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.module('
  - id: js-large-module-bundle
    desc: Large bundled JavaScript graph
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 200
  - id: js-large-minified-bundle
    desc: Large minified JavaScript bundle
    crit: baseline
    conf: 0.92
    for: [javascript, typescript]
    size_min: 131072
    if:
      type: metrics
      field: text.max_line_length
      min: 50000
  - id: js-litepicker-library-token
    desc: Litepicker datepicker library token
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: Litepicker.prototype
  - id: js-datepicker-basename
    desc: Datepicker JavaScript basename
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: basename
      regex: '(^|[\\/])datepicker(\.min)?\.js$'
  - id: js-frontend-route-bundle-path
    desc: Frontend route bundle path
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    size_min: 32768
    if:
      type: basename
      regex: '[\\/]assets[\\/].{0,80}pages[\\/][^\\/]+\.js$'
  - id: js-medium-minified-line
    desc: Medium minified JavaScript line
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    size_min: 32768
    if:
      type: metrics
      field: text.max_line_length
      min: 20000
  - id: js-minified-relative-chunk-imports
    desc: Minified frontend chunk imports
    crit: component
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'from"\.{1,2}/(chunks/)?(shared|vendor-react)\.js'
  - id: js-dist-asset-bundle
    desc: Generated dist JavaScript asset
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^[A-Za-z0-9_.-]+-[A-Za-z0-9_-]{6,}\.js$'
  - id: js-hashed-asset-bundle
    desc: Hashed generated JavaScript asset
    crit: baseline
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^[A-Za-z0-9_.-]+-[a-f0-9]{12,}\.js$'
  - id: js-esbuild-helper-commonjs
    desc: esbuild __commonJS helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__commonJS\s*='
  - id: js-esbuild-helper-tomodule
    desc: esbuild __toModule helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__toModule\s*='
  - id: js-esbuild-helper-markasmodule
    desc: esbuild __markAsModule helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__markAsModule\s*='
  - id: js-esbuild-helper-reexport
    desc: esbuild __reExport helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__reExport\s*='
  - id: js-esbuild-bundle-defprop
    desc: esbuild __defProp helper
    crit: component
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__defProp\s*=\s*Object\.defineProperty\b'
  - id: js-vite-rollup-vendor-chunk
    desc: Vite/Rollup vendor chunk basename
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^chunk-[A-Za-z0-9_-]{6,}\.[cm]?js$'
  - id: js-custom-element-define-call
    desc: JavaScript custom element definition
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bcustomElements\.define\s*\('
  - id: js-shadow-dom-attach-call
    desc: JavaScript shadow DOM attachment
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.attachShadow\s*\('
  - id: js-css-template-comment
    desc: JavaScript CSS template marker
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      substr: "/* css */"
  - id: js-mermaid-bundle
    desc: Mermaid diagram library bundle
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^mermaid(-bundle)?\.[cm]?js$'
  - id: google-tag-manager-bundle
    desc: Google Tag Manager bundle
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: 'www\.googletagmanager\.com|\b(gtag\.config|gtm\.js|GoogleAnalyticsObject)\b'
  - id: dart-flutter-js-bundle
    desc: Dart Flutter JavaScript bundle
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '^\(function dartProgram\(\)|\bdev\.flutter/channel-buffers\b|\bflutterCanvasKit\b'
  - id: js-emscripten-asm-marker
    desc: Emscripten asm.js marker
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: EMSCRIPTEN_START_ASM
  - id: js-emscripten-module-marker
    desc: Emscripten module wrapper marker
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: '[Emscripten Module object]'
  - id: js-emscripten-wasm-marker
    desc: Emscripten WebAssembly support marker
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: no native wasm support detected
  - id: js-emscripten-preamble-marker
    desc: Emscripten runtime preamble marker
    crit: baseline
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: Auto-generated preamble library stuff
  - id: js-wxt-storage-runtime-marker
    desc: WXT web extension storage runtime marker
    crit: component
    conf: 0.97
    for: [javascript, typescript]
    if:
      type: text
      substr: "'wxt/storage' must be loaded in a web extension environment"
  - id: js-wxt-storage-package-marker
    desc: WXT storage package marker
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: "[@wxt-dev/storage]"
  - id: js-webextension-polyfill-runtime-marker
    desc: WebExtension polyfill runtime marker
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: __mozWebExtensionPolyfillReject__
composite_rules:
  - id: js-datepicker-library-context
    desc: JavaScript datepicker library bundle
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: js-litepicker-library-token
      - id: js-datepicker-basename
  - id: js-esbuild-bundle-helpers
    desc: Any esbuild emitter helper present
    crit: component
    conf: 0.98
    for: [javascript]
    any:
      - id: js-esbuild-helper-commonjs
      - id: js-esbuild-helper-tomodule
      - id: js-esbuild-helper-markasmodule
      - id: js-esbuild-helper-reexport
  - id: js-esbuild-bundle
    desc: esbuild-bundled JavaScript module
    crit: baseline
    conf: 0.97
    for: [javascript]
    all:
      - id: js-esbuild-bundle-helpers
      - id: js-esbuild-bundle-defprop
    near_bytes: 4096
  - id: js-closure-library-source
    desc: Google Closure Library source file
    crit: baseline
    conf: 0.96
    for: [javascript]
    any:
      - id: js-closure-library-source-provide
      - id: js-closure-library-source-module
    near_bytes: 2000
  - id: js-closure-library-source-provide
    desc: Google Closure provide-style source file
    crit: component
    conf: 0.96
    all:
      - id: js-closure-provide-call
      - id: js-closure-require-call
  - id: js-closure-library-source-module
    desc: Google Closure module-style source file
    crit: component
    conf: 0.96
    all:
      - id: js-closure-module-call
      - id: js-closure-require-call
  - id: js-umd-wrapper-any
    desc: Universal Module Definition (UMD) wrapper
    crit: baseline
    conf: 0.9
    any:
      - id: js-umd-wrapper
      - id: js-umd-wrapper-minified
      - id: js-umd-wrapper-amd
      - id: js-umd-wrapper-amd-minified
  - id: js-shadow-dom-style-template
    desc: Shadow DOM style template
    crit: baseline
    conf: 0.94
    for: [javascript, typescript]
    all:
      - id: js-custom-element-define-call
      - id: js-shadow-dom-attach-call
      - id: js-css-template-comment
  - id: js-emscripten-generated-bundle
    desc: Emscripten generated JavaScript bundle
    crit: baseline
    conf: 0.98
    any:
      - id: js-emscripten-asm-marker
      - id: js-emscripten-module-marker
      - id: js-emscripten-wasm-marker
      - id: js-emscripten-preamble-marker
  - id: js-wxt-webextension-bundle
    desc: WXT/WebExtension generated JavaScript bundle
    crit: baseline
    conf: 0.97
    for: [javascript, typescript]
    any:
      - id: js-wxt-storage-runtime-marker
      - id: js-wxt-storage-package-marker
      - id: js-webextension-polyfill-runtime-marker
  # Single reference point for "this file is bundled output, not source".
  # Used by hostile-payload detectors to suppress per-bundle-format
  # false positives without exploding their unless: lists.
  - id: js-known-bundler-output
    desc: File is known bundler/wrapper output
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: js-esbuild-bundle
      - id: js-webpack-bundle
      - id: js-rollup-bundle
      - id: js-closure-compiled-bundle
      - id: js-large-module-bundle
      - id: js-large-minified-bundle
      - id: js-minified-frontend-route-bundle
      - id: js-umd-wrapper-any
      - id: js-emscripten-generated-bundle
      - id: js-wxt-webextension-bundle
      - id: metadata/library/web-frameworks::wordpress-block-build-asset
  - id: js-minified-frontend-route-bundle
    desc: Minified frontend route bundle
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: js-medium-minified-line
    any:
      - id: js-frontend-route-bundle-path
      - id: js-minified-relative-chunk-imports
