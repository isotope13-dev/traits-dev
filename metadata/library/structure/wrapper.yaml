defaults:
  platforms: [unix, windows]
traits:
  - id: js-umd-wrapper
    desc: Universal Module Definition (UMD) wrapper
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: typeof\s*exports\s*={2,3}\s*["']object["']
  - id: js-umd-wrapper-minified
    desc: Contains a minified UMD CommonJS branch
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']object["'']\s*={2,3}\s*typeof\s*exports'
  - id: js-umd-wrapper-amd
    desc: Contains a UMD wrapper's AMD branch
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: typeof\s*define\s*={2,3}\s*["']function["']\s*&&\s*define\.amd
  - id: js-umd-wrapper-amd-minified
    desc: Contains a minified UMD AMD branch
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']function["'']\s*={2,3}\s*typeof\s*define\s*&&\s*define\.amd'
  - id: js-webpack-bundle
    desc: Webpack bundled JavaScript module
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: __webpack_require__
  - id: js-amd-define
    desc: AMD define wrapper
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: "define(function("
  # Production webpack minifies __webpack_require__ away and a single-chunk
  # build has no webpackChunk global, but the require-cache module descriptor
  # ({i:r,l:!1,exports:{}} / webpack5 {id:r,loaded:!1,exports:{}}) survives
  # minification verbatim and reliably marks webpack runtime output.
  - id: js-webpack-bundle-minified
    desc: Minified webpack runtime module descriptor
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: \{id?:\w{1,3},l(oaded)?:!1,exports:\{\}\}
  # Webpack module-factory invocation: `modules[id].call(module.exports, module,
  # module.exports, require)` minifies to `.call(<v>.exports,<v>,<v>.exports,<v>)`.
  # The doubled `.exports` 4-arg shape is the webpack module wrapper signature and
  # survives webpack 5's mangled-runtime IIFE form (`(()=>{var e,t,r={340:(e,t)=>…`)
  # where the `__webpack_require__`/`l:!1` markers above are absent. `\w+` (not `\w`)
  # so multi-char minified identifiers (e.g. `.call(nn.exports,nn,nn.exports,`) match.
  - id: js-webpack-minified-module-call
    desc: Minified webpack module-factory invocation
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '\.call\(\w+\.exports,\w+,\w+\.exports,'
  - id: js-webpack-import-markers
    desc: Webpack imported module markers
    crit: baseline
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: __WEBPACK_IMPORTED_MODULE_
  - id: js-webpack-chunk-global
    desc: Webpack JSONP chunk-loading global
    crit: baseline
    conf: 0.95
    for: [documents, data, javascript]
    # Production webpack minifies `__webpack_require__` away but keeps the
    # `webpackChunk<uniqueName>` global verbatim — it is a cross-chunk
    # JSONP array name that cannot be renamed, so it reliably marks
    # code-split webpack output that the `__webpack_require__` marker misses.
    if:
      type: text
      substr: webpackChunk
  - id: js-rollup-bundle
    desc: Rollup bundled JavaScript module
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: "rollup-plugin-commonjs"
  - id: js-rollup-wrapper-minified-start
    desc: Minified Rollup wrapper start
    crit: component
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '^var\s+[A-Za-z_$][\w$]*\s*=\s*function\([A-Za-z_$][\w$]*\)\s*\{\s*["'']use strict["''];'
  - id: js-esm-symbol-tostringtag
    desc: ESM Symbol.toStringTag marker
    crit: component
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: 'Object\.defineProperty\([^)]{1,200}Symbol\.toStringTag'
  - id: js-vite-modulepreload-polyfill
    desc: Contains Vite/Rollup module-preload polyfill
    crit: baseline
    conf: 0.96
    for: [javascript, typescript]
    # Vite injects this modulepreload-polyfill into the entry chunk: it
    # feature-detects `<link>.relList.supports("modulepreload")` and falls
    # back to a MutationObserver that preloads link tags. The `relList` +
    # `supports("modulepreload")` pair is unique to that polyfill and marks
    # the file as clean Vite/Rollup ESM bundler output (no webpack/UMD
    # string markers, so the size-gated large-bundle traits miss it).
    if:
      type: text
      regex: 'relList[\s\S]{0,80}supports\(["''`]modulepreload["''`]\)'
  - id: js-closure-compiled-bundle
    desc: Google Closure compiled JavaScript bundle
    crit: baseline
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: "var COMPILED = !0, goog = goog || {}"
  - id: js-node-modules-source-comment-bundle
    desc: 'js node modules source comment bundle'
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '//\s+\.\./(\.\./)?node_modules/'
  - id: js-browserify-module-wrapper
    desc: Browserify module wrapper
    crit: component
    conf: 0.94
    for: [javascript]
    if:
      type: text
      substr: 'function(require,module,exports)'
  - id: js-browserify-dependency-map
    desc: Browserify dependency map
    crit: component
    conf: 0.94
    for: [javascript]
    if:
      type: text
      regex: '\},\{["''][^"'']{1,80}["'']:\d+'
  - id: js-closure-provide-call
    desc: Google Closure Library source file
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.provide('
  - id: js-closure-require-call
    desc: Google Closure require call
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.require('
  - id: js-closure-module-call
    desc: Google Closure module call
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.module('
  - id: js-large-module-bundle
    desc: Large bundled JavaScript graph
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 200
  - id: js-large-minified-bundle
    desc: Large minified JavaScript bundle
    crit: baseline
    conf: 0.92
    for: [javascript, typescript]
    size_min: 131072
    if:
      type: metrics
      field: text.max_line_length
      min: 50000
  - id: js-litepicker-library-token
    desc: Litepicker datepicker library token
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: Litepicker.prototype
  - id: js-datepicker-basename
    desc: Datepicker JavaScript basename
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|[\\/])datepicker(\.min)?\.js$'
  - id: js-frontend-route-bundle-path
    desc: Frontend route bundle path
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    size_min: 32768
    if:
      type: path
      regex: 'assets[\\/].{0,80}pages[\\/].{0,80}\.js$'
  - id: js-medium-minified-line
    desc: JavaScript contains a long minified line
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    size_min: 32768
    if:
      type: metrics
      field: text.max_line_length
      min: 20000
  - id: js-minified-relative-chunk-imports
    desc: Minified frontend chunk imports
    crit: component
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'from"\.{1,2}/(chunks/)?(shared|vendor-react)\.js'
  - id: js-minified-esm-import-list
    desc: Minified ESM import list
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '^import\{.{20,600}\}from"\.{1,2}/.{1,200}\.js";'
  - id: js-default-reexport
    desc: JavaScript default re-export
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'export\{[A-Za-z0-9_$]+ as default\};?'
  - id: js-dist-asset-bundle
    desc: JavaScript dist asset basename
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    unless:
      - id: metadata/package/testing/presence/harness::test-spec-path-benign-context
    if:
      type: path
      basename: true
      regex: '^dist[-.][A-Za-z0-9_-]{6,}\.js$'
  - id: next-static-js-chunk
    desc: Next.js static JavaScript chunk
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '(^[0-9][A-Za-z0-9_.~-]{5,40}|^turbopack-[A-Za-z0-9_-]{6,})\.js$'
  - id: next-static-page-chunk
    desc: Next.js static page chunk
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '^_[A-Za-z0-9_.~-]+-[A-Fa-f0-9]{12,}\.js$'
  - id: js-image-data-url
    desc: JavaScript image data URL literal
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'data:image/[A-Za-z0-9.+-]+;base64,'
  - id: js-hashed-asset-bundle
    desc: Hashed generated JavaScript asset
    crit: baseline
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '^[A-Za-z0-9_.-]+[-.][A-Za-z0-9_-]{8,}\.js$'
  - id: js-esbuild-helper-commonjs
    desc: esbuild __commonJS helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__commonJS\s*='
  - id: js-esbuild-helper-tomodule
    desc: esbuild __toModule helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__toModule\s*='
  - id: js-esbuild-helper-markasmodule
    desc: esbuild __markAsModule helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__markAsModule\s*='
  - id: js-esbuild-helper-reexport
    desc: esbuild __reExport helper
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__reExport\s*='
  - id: js-esbuild-bundle-defprop
    desc: esbuild __defProp helper
    crit: component
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '\bvar\s+__defProp\s*=\s*Object\.defineProperty\b'
  - id: js-vite-rollup-vendor-chunk
    desc: Vite/Rollup vendor chunk filename
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '^chunk-[A-Za-z0-9_-]{6,}\.[cm]?js$'
  - id: js-custom-element-define-call
    desc: JavaScript custom element definition
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bcustomElements\.define\s*\('
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: js-shadow-dom-attach-call
    desc: JavaScript shadow DOM attachment
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.attachShadow\s*\('
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: js-css-template-comment
    desc: JavaScript CSS template marker
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      substr: "/* css */"
  - id: js-mermaid-bundle
    desc: Mermaid diagram library bundle
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '^mermaid(-bundle)?\.[cm]?js$'
  - id: google-tag-manager-bundle
    desc: Google Tag Manager bundle
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: 'www\.googletagmanager\.com|\b(gtag\.config|gtm\.js|GoogleAnalyticsObject)\b'
  - id: dart-flutter-js-bundle
    desc: Dart Flutter JavaScript bundle
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '^\(function dartProgram\(\)|\bdev\.flutter/channel-buffers\b|\bflutterCanvasKit\b'
  - id: js-emscripten-asm-marker
    desc: Emscripten asm.js marker
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: EMSCRIPTEN_START_ASM
  - id: js-emscripten-module-marker
    desc: Contains an Emscripten module wrapper identifier
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: '[Emscripten Module object]'
  - id: js-emscripten-wasm-marker
    desc: Contains Emscripten WebAssembly support text
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: no native wasm support detected
  - id: js-emscripten-preamble-marker
    desc: Emscripten runtime preamble marker
    crit: baseline
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: Auto-generated preamble library stuff
  - id: js-emscripten-embind-val-marker
    desc: Emscripten embind val binding marker
    crit: baseline
    conf: 0.98
    for: [javascript]
    # `emscripten::val` is embind's C++ namespace name, emitted verbatim
    # into the JS glue. Survives minification (it is a string literal in
    # the binding table), so it identifies production emscripten output
    # that has had the verbose dev-build comment markers stripped.
    if:
      type: text
      substr: 'emscripten::val'
  - id: js-emscripten-pthread-worker-marker
    desc: Emscripten pthread worker name marker
    crit: baseline
    conf: 0.97
    for: [javascript]
    # The "em-pthread" worker name is set by emscripten's pthread runtime
    # (self.name === "em-pthread") and checked against workerData; it is a
    # string literal that survives minification.
    if:
      type: text
      substr: '"em-pthread"'
  - id: js-wxt-storage-runtime-marker
    desc: WXT web extension storage runtime marker
    crit: component
    conf: 0.97
    for: [javascript, typescript]
    if:
      type: text
      substr: "'wxt/storage' must be loaded in a web extension environment"
  - id: js-wxt-storage-package-marker
    desc: WXT storage package marker
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: "[@wxt-dev/storage]"
  - id: js-webextension-polyfill-runtime-marker
    desc: Contains WebExtension polyfill runtime code
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: __mozWebExtensionPolyfillReject__
  - id: js-tsc-reexport-getter
    desc: Transpiled re-export getter (tsc/babel barrel)
    crit: component
    conf: 0.97
    for: [javascript, typescript]
    # tsc/babel compile `export { x } from "./mod"` into this
    # getter-on-exports idiom. Hand-written source never emits it; >=2
    # occurrences mark a re-export barrel (generated API-client index files,
    # OpenAPI/axios-codegen output, etc.).
    count_min: 2
    if:
      type: text
      substr: 'enumerable: true, get: function'
  - id: js-tslib-reexport-helper
    desc: Calls a tslib/TypeScript re-export helper
    crit: component
    conf: 0.97
    for: [javascript, typescript]
    # `__exportStar` / `__createBinding` are the tslib/tsc helpers emitted for
    # `export * from "./mod"`; they appear only in transpiled barrels, so a
    # single occurrence reliably marks generated (not authored) output.
    if:
      type: text
      regex: '__(exportStar|createBinding)\b'
  - id: node-module-empty-object
    desc: Node Module empty object stub
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bconst\s+Module\s*=\s*\{\}\s*;'
  - id: node-module-load-local-stub
    desc: Node Module._load local stub
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bModule\._load\s*=\s*_load\s*;'
  - id: node-module-default-export
    desc: Node Module default export
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: 'export default Module'
composite_rules:
  - id: js-data-url-image-asset-bundle
    desc: Generated JS image data URL asset bundle
    crit: baseline
    conf: 0.94
    for: [javascript, typescript]
    all:
      - id: js-dist-asset-bundle
      - id: js-image-data-url
  - id: js-large-minified-dist-bundle
    desc: Large minified dist JavaScript bundle
    crit: baseline
    conf: 0.94
    for: [javascript, typescript]
    all:
      - id: js-dist-asset-bundle
      - id: js-large-minified-bundle
  - id: js-rollup-module-wrapper-minified
    desc: Minified Rollup module wrapper
    crit: baseline
    conf: 0.94
    for: [javascript, typescript]
    all:
      - id: js-rollup-wrapper-minified-start
      - id: js-esm-symbol-tostringtag
  - id: js-minified-esm-route-chunk
    desc: Minified ESM route chunk
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: js-minified-esm-import-list
      - id: js-default-reexport
  - id: js-datepicker-library-context
    desc: JavaScript datepicker library bundle
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: js-litepicker-library-token
      - id: js-datepicker-basename
  - id: js-esbuild-bundle-helpers
    desc: Any esbuild emitter helper present
    crit: component
    conf: 0.98
    for: [javascript]
    any:
      - id: js-esbuild-helper-commonjs
      - id: js-esbuild-helper-tomodule
      - id: js-esbuild-helper-markasmodule
      - id: js-esbuild-helper-reexport
  - id: js-esbuild-bundle
    desc: esbuild-bundled JavaScript module
    crit: baseline
    conf: 0.97
    for: [javascript]
    all:
      - id: js-esbuild-bundle-helpers
      - id: js-esbuild-bundle-defprop
    near_bytes: 4096
  - id: js-tsc-reexport-barrel
    desc: Transpiled CommonJS re-export barrel
    crit: baseline
    conf: 0.96
    for: [javascript, typescript]
    # Generated client index files (`var X_1 = require("./X"); Object.define
    # Property(exports, ...)` re-export plumbing). Pure transpiler output with
    # no authored logic — a single reference point for the per-endpoint and
    # barrel false positives across every codegen'd npm client.
    any:
      - id: js-tsc-reexport-getter
      - id: js-tslib-reexport-helper
  - id: js-closure-library-source
    desc: Google Closure Library source file
    crit: baseline
    conf: 0.96
    for: [javascript]
    any:
      - id: js-closure-library-source-provide
      - id: js-closure-library-source-module
    near_bytes: 2000
  - id: js-closure-library-source-provide
    desc: Google Closure provide-style source file
    crit: component
    conf: 0.96
    all:
      - id: js-closure-provide-call
      - id: js-closure-require-call
  - id: js-closure-library-source-module
    desc: Google Closure module-style source file
    crit: component
    conf: 0.96
    all:
      - id: js-closure-module-call
      - id: js-closure-require-call
  - id: js-browserify-bundle
    desc: Browserify bundled JavaScript module
    crit: baseline
    conf: 0.96
    for: [javascript]
    all:
      - id: js-browserify-module-wrapper
      - id: js-browserify-dependency-map
  - id: js-shadow-dom-style-template
    desc: Shadow DOM style template
    crit: baseline
    conf: 0.94
    for: [javascript, typescript]
    all:
      - id: js-custom-element-define-call
      - id: js-shadow-dom-attach-call
      - id: js-css-template-comment
  - id: js-emscripten-generated-bundle
    desc: Emscripten generated JavaScript bundle
    crit: baseline
    conf: 0.98
    any:
      - id: js-emscripten-asm-marker
      - id: js-emscripten-module-marker
      - id: js-emscripten-wasm-marker
      - id: js-emscripten-preamble-marker
      - id: js-emscripten-embind-val-marker
      - id: js-emscripten-pthread-worker-marker
  - id: js-wxt-webextension-bundle
    desc: Contains a generated WXT/WebExtension bundle
    crit: baseline
    conf: 0.97
    for: [javascript, typescript]
    any:
      - id: js-wxt-storage-runtime-marker
      - id: js-wxt-storage-package-marker
      - id: js-webextension-polyfill-runtime-marker
  # Single reference point for "this file is bundled output, not source".
  # Used by hostile-payload detectors to suppress per-bundle-format
  # false positives without exploding their unless: lists.
  - id: js-known-bundler-output
    desc: File is known bundler/wrapper output
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: js-esbuild-bundle
      - id: js-webpack-bundle
      - id: js-webpack-bundle-minified
      - id: js-webpack-minified-module-call
      - id: js-webpack-chunk-global
      - id: js-rollup-bundle
      - id: js-rollup-module-wrapper-minified
      - id: js-vite-modulepreload-polyfill
      - id: js-browserify-bundle
      - id: js-closure-compiled-bundle
      - id: js-node-modules-source-comment-bundle
      - id: js-large-module-bundle
  # Some minifiers (and jQuery-plugin style libraries like elFinder) emit one
  # statement per line, so max_line_length stays well under the medium/large
  # bundle line-length thresholds. A large file with minifier-renamed
  # sequential identifiers and near-zero whitespace is still generated bundle
  # output, not hand-obfuscated code.
  - id: js-newline-minified-library-bundle
    desc: Statement-per-line minified JavaScript bundle
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    size_min: 65536
    all:
      - id: metadata/file/metrics::file-has-30-plus-lines
      - id: metadata/file/metrics::low-whitespace
      - id: metadata/file/profile/identity::sequential-identifiers
  # Broadest "this file is a JS bundle / minified asset" umbrella: the bundler
  # runtime markers above plus the dist/hashed/large-minified asset-bundle
  # forms. Lets FP-exclusion contexts reference one id instead of listing every
  # bundle variant.
  - id: js-any-bundle-output
    desc: Contains bundled or minified JavaScript
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: js-known-bundler-output
      - id: js-dist-asset-bundle
      - id: js-hashed-asset-bundle
      - id: next-static-js-chunk
      - id: js-large-minified-bundle
