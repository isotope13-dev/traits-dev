defaults:
  platforms: [unix, windows]
traits:
  - id: js-umd-wrapper
    desc: Universal Module Definition (UMD) wrapper
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: typeof\s*exports\s*={2,3}\s*["']object["']
  - id: js-umd-wrapper-minified
    desc: Minified UMD wrapper (reversed comparison)
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']object["'']\s*={2,3}\s*typeof\s*exports'
  - id: js-umd-wrapper-amd
    desc: UMD AMD branch marker
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: typeof\s*define\s*={2,3}\s*["']function["']\s*&&\s*define\.amd
  - id: js-umd-wrapper-amd-minified
    desc: Minified UMD AMD branch (reversed comparison)
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']function["'']\s*={2,3}\s*typeof\s*define\s*&&\s*define\.amd'
  - id: js-webpack-bundle
    desc: Webpack bundled JavaScript module
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: __webpack_require__
  - id: js-webpack-import-markers
    desc: Webpack imported module markers
    crit: baseline
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: __WEBPACK_IMPORTED_MODULE_
  - id: js-rollup-bundle
    desc: Rollup bundled JavaScript module
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: "rollup-plugin-commonjs"
  - id: js-closure-compiled-bundle
    desc: Google Closure compiled JavaScript bundle
    crit: baseline
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: "var COMPILED = !0, goog = goog || {}"
  - id: js-closure-provide-call
    desc: Google Closure Library source file
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.provide('
  - id: js-closure-require-call
    desc: Google Closure require call
    crit: component
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: 'goog.require('
  - id: js-large-module-bundle
    desc: Large bundled JavaScript graph
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 200
  - id: js-vite-rollup-vendor-chunk
    desc: Vite/Rollup vendor chunk basename
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^chunk-[A-Za-z0-9_-]{6,}\.[cm]?js$'
  - id: js-mermaid-bundle
    desc: Mermaid diagram library bundle
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^mermaid(-bundle)?\.[cm]?js$'
  - id: google-tag-manager-bundle
    desc: Google Tag Manager bundle
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: 'www\.googletagmanager\.com|\b(gtag\.config|gtm\.js|GoogleAnalyticsObject)\b'
  - id: dart-flutter-js-bundle
    desc: Dart Flutter JavaScript bundle
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '^\(function dartProgram\(\)|\bdev\.flutter/channel-buffers\b|\bflutterCanvasKit\b'
  - id: js-emscripten-asm-marker
    desc: Emscripten asm.js marker
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: EMSCRIPTEN_START_ASM
  - id: js-emscripten-module-marker
    desc: Emscripten module wrapper marker
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: '[Emscripten Module object]'
  - id: js-emscripten-wasm-marker
    desc: Emscripten WebAssembly support marker
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: no native wasm support detected
  - id: js-emscripten-preamble-marker
    desc: Emscripten runtime preamble marker
    crit: baseline
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: Auto-generated preamble library stuff
composite_rules:
  - id: js-closure-library-source
    desc: Google Closure Library source file
    crit: baseline
    conf: 0.96
    for: [javascript]
    all:
      - id: js-closure-provide-call
      - id: js-closure-require-call
    near_bytes: 2000
  - id: js-umd-wrapper-any
    desc: Universal Module Definition (UMD) wrapper
    crit: baseline
    conf: 0.9
    any:
      - id: js-umd-wrapper
      - id: js-umd-wrapper-minified
      - id: js-umd-wrapper-amd
      - id: js-umd-wrapper-amd-minified
  - id: js-emscripten-generated-bundle
    desc: Emscripten generated JavaScript bundle
    crit: baseline
    conf: 0.98
    any:
      - id: js-emscripten-asm-marker
      - id: js-emscripten-module-marker
      - id: js-emscripten-wasm-marker
      - id: js-emscripten-preamble-marker
