# Box extraction progress is a benign UI/reporting helper. It is separately
# identified so generic obfuscation rules can suppress only this known module.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: box-extract-progress-class
    desc: Defines a Box extraction progress reporter
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '\bclass\s+BoxExtractProgress\b'

  - id: box-extract-progress-factory
    desc: Creates a Box extraction progress reporter
    crit: notable
    conf: 0.98
    if:
      type: symbol
      exact: createBoxExtractProgress

composite_rules:
  - id: box-extract-progress-context
    desc: Box extraction progress reporting module
    crit: exception
    conf: 0.99
    all:
      - id: box-extract-progress-class
      - id: box-extract-progress-factory
