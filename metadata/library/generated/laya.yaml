defaults:
  platforms: [windows, unix]
  for: [javascript]

traits:
- id: laya-engine-runtime-marker-a
  desc: Laya engine runtime API marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '\bLaya\.(stage|loader|timer)\b'

- id: laya-engine-runtime-marker-b
  desc: Laya engine runtime API marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '\bLaya\.(Handler|Scene|Browser)\b'

- id: laya-engine-runtime-marker-c
  desc: Laya engine runtime API marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '\bLaya\.(LocalStorage|HttpRequest)\b'

composite_rules:
- id: laya-engine-runtime-marker
  desc: Laya engine runtime API marker
  crit: notable
  conf: 0.96
  any:
  - id: laya-engine-runtime-marker-a
  - id: laya-engine-runtime-marker-b
  - id: laya-engine-runtime-marker-c
