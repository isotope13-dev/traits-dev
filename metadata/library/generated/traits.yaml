defaults:
  platforms: [unix]
  for: [shell]
traits:
- id: dotenv-doc-marker
  desc: Generated dotenv doc marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: automatically generated from dotenv.md
- id: dotenv-command-var
  desc: Generated dotenv command variable
  crit: component
  conf: 0.95
  if:
    type: text
    substr: __dotenv_cmd=.env
- id: dotenv-argv-forward
  desc: Generated dotenv argv forwarder
  crit: component
  conf: 0.95
  if:
    type: text
    substr: '.env."$@"'
composite_rules:
- id: dotenv-shell-helper
  desc: Generated dotenv shell helper
  crit: baseline
  conf: 0.95
  all:
  - id: dotenv-doc-marker
  - id: dotenv-command-var
  - id: dotenv-argv-forward
