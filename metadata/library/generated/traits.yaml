defaults:
  platforms: [unix]
traits:
- id: dotenv-doc-marker
  desc: Generated dotenv doc marker
  for: [shell]
  crit: component
  conf: 0.95
  if:
    type: text
    substr: automatically generated from dotenv.md
- id: dotenv-command-var
  desc: Generated dotenv command variable
  for: [shell]
  crit: component
  conf: 0.95
  if:
    type: text
    substr: __dotenv_cmd=.env
- id: dotenv-argv-forward
  desc: Generated dotenv argv forwarder
  for: [shell]
  crit: component
  conf: 0.95
  if:
    type: text
    substr: '.env."$@"'
- id: sphinx-searchindex-js
  desc: Sphinx generated search index
  for: [javascript]
  crit: baseline
  conf: 0.98
  if:
    type: text
    regex: '^Search\.setIndex\(\{"(docnames|alltitles)":'
- id: kubernetes-python-openapi-client-source
  desc: Generated Kubernetes Python client source
  for: [python, pyc]
  crit: baseline
  conf: 0.97
  if:
    type: text
    substr: 'Generated by: https://openapi-generator.tech'
composite_rules:
- id: dotenv-shell-helper
  desc: Generated dotenv shell helper
  for: [shell]
  crit: baseline
  conf: 0.95
  all:
  - id: dotenv-doc-marker
  - id: dotenv-command-var
  - id: dotenv-argv-forward
