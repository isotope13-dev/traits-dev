defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - package.json
traits:
  - id: babel-core-package
    desc: Official Babel core package manifest
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@babel/core'
  - id: babel-core-api
    desc: Babel core API
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: require\("\.\./transformation"\)
  - id: babel-bundle-marker
    desc: Babel compiler bundle marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: 'name:"transform-react-jsx"'
