defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: babel-core-api
    desc: Babel core API
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: require\("\.\./transformation"\)
  - id: babel-bundle-marker
    desc: Babel compiler bundle marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: 'name:"transform-react-jsx"'
