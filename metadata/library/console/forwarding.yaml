defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  # Worker runtimes commonly retain the original console methods before
  # replacing them with a forwarding wrapper.
  - id: js-console-method-preservation
    desc: Preserves original JavaScript console methods
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'console\.(log|error|warn)\.bind\(console\)'

  - id: js-console-forwarding-call
    desc: Invokes preserved console method with arguments
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\w+\.(log|error|warn)\.apply\(null,\s*arguments\)'

composite_rules:
  # Exception context for console suppression rules: the wrapper preserves
  # the real console methods and forwards output instead of hiding it.
  - id: js-console-forwarder-context
    desc: Console forwarding wrapper context
    crit: exception
    conf: 0.98
    all:
      - id: js-console-method-preservation
      - id: js-console-forwarding-call
    near_bytes: 2000
