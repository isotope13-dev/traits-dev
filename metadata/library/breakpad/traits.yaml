# Google Breakpad crash-reporting library markers
# https://chromium.googlesource.com/breakpad/breakpad
# Present in any application that links the Breakpad crash reporter.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.9

traits:
  - id: crashreportsender-symbol
    desc: Breakpad CrashReportSender::SendCrashReport C++ symbol
    if:
      type: text
      substr: "google_breakpad::CrashReportSender::SendCrashReport"
      section: ".rdata"

  - id: crashreportsender-file
    desc: Breakpad crash_report_sender.cc source path
    if:
      type: text
      substr: "crash_report_sender.cc"
      section: ".rdata"

  - id: crash-context-string
    desc: Breakpad crash_context handoff string
    if:
      type: text
      exact: "crash_context"
      section: ".rdata"

  - id: dump-file-string
    desc: Breakpad dump_file handoff string
    if:
      type: text
      exact: "dump_file"
      section: ".rdata"

composite_rules:
  - id: crashreportsender
    desc: Google Breakpad CrashReportSender uploader
    crit: baseline
    conf: 0.99
    all:
      - id: crashreportsender-symbol
      - id: crashreportsender-file
