defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: hotwired-turbo-marker
    desc: Hotwired Turbo JavaScript marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "@hotwired/turbo"

  - id: has-stream-require
    desc: Node.js stream module usage
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: require\(['"]stream['"]\)\s*[;,)]
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: has-stream-classes-b
    desc: Node.js stream class references
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      exact: Duplex
  - id: has-middleware
    desc: Code uses middleware pattern
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: (app|router)\.use\(|middleware\s*[=:]
  - id: has-routes-app-a
    desc: Code defines HTTP routes
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: app\.(get|post|put|delete)\s*\(['"]/
  - id: has-routes-app-patch
    desc: Code defines HTTP routes
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: app\.patch\s*\(['"]/
  - id: has-routes-router-a
    desc: Code defines HTTP routes
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: router\.(get|post|put|delete)\s*\(['"]/
  - id: has-routes-router-patch
    desc: Code defines HTTP routes
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: router\.patch\s*\(['"]/
  - id: has-di-pattern-a
    desc: Code uses dependency injection
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    if:
      type: string_literal
      regex: (@Inject|container\.resolve|inversify)
  - id: has-di-pattern-b
    desc: Code uses dependency injection
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: \.(inject|provide)\s*\(
  - id: uses-web-framework-b
    desc: Code uses established web framework
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (require\(['"]|from ['"])(next|nuxt)['"]
  - id: has-frontend-framework-core
    desc: Uses React/Vue component primitives
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/documentation/
    if:
      type: string_literal
      regex: (React|Vue|Component)\.(createElement|defineComponent)
  - id: has-frontend-framework-hooks
    desc: Uses component decorators or hooks
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/documentation/
    if:
      type: string_literal
      regex: '@Component\(|useEffect\(|useState\('
composite_rules:
  - id: has-stream
    desc: Node.js stream usage markers
    crit: baseline
    conf: 0.75
    any:
      - id: has-stream-require
      - id: has-stream-classes-b
  - id: has-routes
    desc: Code defines HTTP routes
    crit: notable
    conf: 0.8
    any:
      - id: has-routes-app-a
      - id: has-routes-app-patch
      - id: has-routes-router-a
      - id: has-routes-router-patch
  - id: has-di-pattern
    desc: Code uses dependency injection
    crit: notable
    conf: 0.85
    any:
      - id: has-di-pattern-a
      - id: has-di-pattern-b
  - id: has-frontend-framework
    desc: Uses React or Vue component patterns
    crit: notable
    conf: 0.9
    any:
      - id: has-frontend-framework-core
      - id: has-frontend-framework-hooks
