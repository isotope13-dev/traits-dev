defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: uses-express
    desc: Uses Express framework
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: (require\(['"]|from ['"])express['"]
  - id: uses-koa
    desc: Uses Koa framework
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: (require\(['"]|from ['"])koa['"]
  - id: uses-fastify
    desc: Uses Fastify framework
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: (require\(['"]|from ['"])fastify['"]
  - id: uses-hapi
    desc: Uses Hapi framework
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: (require\(['"]|from ['"])hapi['"]
  - id: uses-nextjs
    desc: Uses Next.js framework
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: (require\(['"]|from ['"])next(/server)?['"]
  - id: stream-readable
    desc: Code uses Node.js Readable stream
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      word: Readable
  - id: stream-writable
    desc: Code uses Node.js Writable stream
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      word: Writable
  - id: stream-transform
    desc: Code uses Node.js Transform stream
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      word: Transform
composite_rules:
  - id: uses-web-framework
    desc: Code uses established web framework
    crit: notable
    conf: 0.85
    any:
      - id: uses-express
      - id: uses-koa
      - id: uses-fastify
      - id: uses-hapi
      - id: uses-nextjs
  - id: stream-classes
    desc: Code uses Node.js stream classes
    crit: notable
    conf: 0.75
    any:
      - id: stream-readable
      - id: stream-writable
      - id: stream-transform
