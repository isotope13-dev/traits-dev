defaults:
  platforms: [unix, windows]
  for: [php, javascript]
  crit: baseline
  conf: 0.9
traits:
  - id: craftcms-set-settings-html
    desc: CraftCMS setSettingsHtml asset marker
    for: [javascript]
    if:
      type: text
      substr: "setSettingsHtml"
  - id: craftcms-settings-js
    desc: CraftCMS settingsJs asset marker
    for: [javascript]
    if:
      type: text
      substr: "settingsJs"
composite_rules:
  - id: craftcms-dashboard-settings-asset
    desc: CraftCMS dashboard settings asset
    crit: baseline
    conf: 0.9
    all:
      - id: craftcms-set-settings-html
      - id: craftcms-settings-js
