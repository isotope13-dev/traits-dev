# Symfony framework context markers.
#
# Symfony provides Console, DI, Routing, HttpFoundation, Process, Filesystem,
# Form, EventDispatcher, etc. PHP source that imports `Symfony\…` namespaces or
# extends Symfony base classes is running inside Symfony — useful both as
# benign-context evidence (mutes generic-PHP suspicious traits) and as the
# entry point for Symfony-specific malware/supply-chain detection.
defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.93

traits:
  - id: symfony-component-import
    desc: Imports a Symfony Component namespace
    if:
      type: text
      regex: 'use\s+Symfony\\Component\\'

  - id: symfony-bundle-import
    desc: Imports a Symfony Bundle namespace
    if:
      type: text
      regex: 'use\s+Symfony\\Bundle\\'

  - id: symfony-contracts-import
    desc: Imports a Symfony Contracts namespace
    if:
      type: text
      regex: 'use\s+Symfony\\Contracts\\'

  - id: symfony-bridge-import
    desc: Imports a Symfony Bridge namespace
    if:
      type: text
      regex: 'use\s+Symfony\\Bridge\\'

  - id: symfony-console-command-extends
    desc: Extends Symfony Console Command base class
    if:
      type: text
      regex: 'extends\s+(\\?Symfony\\Component\\Console\\Command\\)?Command\b'

  - id: symfony-console-attribute
    desc: Uses Symfony AsCommand attribute
    if:
      type: text
      regex: '#\[AsCommand\b'

  - id: symfony-route-attribute
    desc: Uses Symfony Route attribute
    if:
      type: text
      regex: '#\[Route\b'

  - id: symfony-kernel-class
    desc: Symfony Kernel class reference
    if:
      type: text
      regex: '\b(Symfony\\Component\\HttpKernel\\Kernel|extends\s+BaseKernel)\b'

  - id: symfony-container-builder
    desc: Symfony ContainerBuilder reference
    if:
      type: text
      word: ContainerBuilder

composite_rules:
  - id: symfony-context
    desc: File runs inside the Symfony framework
    any:
      - id: symfony-component-import
      - id: symfony-bundle-import
      - id: symfony-contracts-import
      - id: symfony-bridge-import
      - id: symfony-console-command-extends
      - id: symfony-console-attribute
      - id: symfony-route-attribute
      - id: symfony-kernel-class
      - id: symfony-container-builder
