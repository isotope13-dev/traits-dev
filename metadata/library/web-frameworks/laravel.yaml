defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.9

composite_rules:
  - id: laravel-context
    desc: File runs inside the Laravel framework
    any:
      - id: micro-behaviors/communications/http/server/route::laravel-route-definition
      - id: micro-behaviors/fs/path/application/webapp::laravel-base-path
      - id: micro-behaviors/communications/http/server/middleware::push-web-middleware-group
