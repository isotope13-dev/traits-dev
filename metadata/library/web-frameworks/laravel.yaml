defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.9

traits:
  - id: laravel-illuminate-namespace
    desc: Imports an Illuminate\... Laravel namespace
    if:
      type: text
      regex: 'use\s+Illuminate\\'
  - id: laravel-artisan-command-class
    desc: "Extends Laravel Console\\Command"
    if:
      type: text
      regex: 'extends\s+(Illuminate\\Console\\)?Command\b'
  - id: laravel-stub-publisher
    desc: "Laravel stubPath/getStub publisher"
    if:
      type: text
      regex: '(stubPath|getStub|publishesStub|loadStub)\s*\('

composite_rules:
  - id: laravel-context
    desc: File runs inside the Laravel framework
    any:
      - id: laravel-illuminate-namespace
      - id: laravel-artisan-command-class
      - id: laravel-stub-publisher
      - id: micro-behaviors/communications/http/server/route::laravel-route-definition
      - id: micro-behaviors/fs/path/application/webapp::laravel-base-path
      - id: micro-behaviors/communications/http/server/middleware::push-web-middleware-group
