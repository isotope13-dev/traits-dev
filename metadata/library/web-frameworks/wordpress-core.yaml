defaults:
  platforms: [unix, windows]
  for: [php, javascript]
  crit: baseline
  conf: 0.9
traits:
- id: wordpress-core-package-doc
  desc: WordPress core package docblock
  if:
    type: text
    substr: "@package WordPress"
- id: wordpress-core-include-bootstrap
  desc: WordPress core include/bootstrap context
  if:
    type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
- id: wordpress-bootstrap-loader-reference
  desc: WordPress bootstrap loader reference
  for: [php]
  if:
    type: text
    regex: 'dirname\\s*\\(__FILE__\\).{0,50}wp-load\\.php'
- id: wordpress-phpunit-test-case
  desc: WordPress PHPUnit test case context
  for: [php]
  if:
    type: text
    regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
- id: wordpress-core-api-symbols
  desc: WordPress core API context
  for: [php]
  count_min: 4
  if:
    type: symbol
    regex: "^(wp_|WP_)"
- id: wordpress-upload-dir-function
  desc: WordPress upload directory function
  for: [php]
  if:
    type: text
    substr: 'wp_upload_dir'
- id: wordpress-cli-class-reference
  desc: WordPress CLI API reference
  for: [php]
  if:
    type: text
    word: WP_CLI
- id: wordpress-cli-command-registration
  desc: Registers a WordPress CLI command
  for: [php]
  crit: notable
  conf: 0.98
  if:
    type: text
    regex: 'WP_CLI::add_command\s*\('
- id: wordpress-imagely-ngg-context
  desc: Imagely NextGEN Gallery namespace context
  for: [php]
  if:
    type: text
    substr: 'Imagely\NGG'
- id: wordpress-gutenberg-hook-filter
  desc: WordPress Gutenberg hook filter
  for: [javascript]
  if:
    type: text
    substr: "wp.hooks.addFilter"
- id: wordpress-gutenberg-block-registration
  desc: WordPress Gutenberg block registration
  for: [javascript]
  if:
    type: text
    substr: "blocks.registerBlockType"
- id: wordpress-gutenberg-global
  desc: WordPress Gutenberg global
  for: [javascript]
  if:
    type: text
    substr: "window.React"
- id: wordpress-block-build-asset-path
  desc: WordPress block build asset path
  for: [javascript]
  if:
    type: path
    regex: 'blocks[\\/].{1,100}[\\/].{1,100}\.js$'
- id: wordpress-elementor-vendored-asset-path
  desc: Vendored Elementor WordPress asset path
  for: [javascript]
  if:
    type: path
    regex: 'elementor[\\/]wp-one-package'
- id: wordpress-blocks-global
  desc: WordPress blocks global
  for: [javascript]
  if:
    type: text
    substr: "window.wp.blocks"
- id: wordpress-block-editor-global
  desc: WordPress block editor global
  for: [javascript]
  if:
    type: text
    substr: "window.wp.blockEditor"
- id: wordpress-interactivity-import
  desc: WordPress interactivity import
  for: [javascript]
  if:
    type: text
    substr: "@wordpress/interactivity"
- id: wordpress-block-class-prefix
  desc: WordPress block class prefix
  for: [javascript, text]
  if:
    type: text
    substr: "wp-block-"
- id: wordpress-customizer-control-class
  desc: WordPress Customizer control class
  for: [javascript, text]
  if:
    type: text
    substr: "customize-control-"
- id: wordpress-schema-manifest
  desc: WordPress block/theme JSON manifest schema
  for: [json, text]
  if:
    type: text
    substr: "schemas.wp.org"
- id: woocommerce-block-class-prefix
  desc: WooCommerce block class prefix
  for: [javascript]
  if:
    type: text
    substr: "wc-block-"
- id: wordpress-block-pattern-header
  desc: WordPress block pattern header
  for: [php]
  if:
    type: text
    regex: '^\s*\*\s*Slug:\s+[A-Za-z0-9_-]+/[A-Za-z0-9_-]+'
- id: wordpress-block-comment-marker
  desc: WordPress block comment marker
  for: [php, html]
  if:
    type: text
    substr: "<!-- wp:"
- id: wordpress-plugin-dir-constants--wp-plugin-dir
  desc: WordPress plugin directory (WP_PLUGIN_DIR)
  for: [php]
  if:
    type: text
    word: WP_PLUGIN_DIR
- id: wordpress-plugin-dir-constants--wp-content-dir
  desc: WordPress plugin directory (WP_CONTENT_DIR)
  for: [php]
  if:
    type: text
    word: WP_CONTENT_DIR
- id: wordpress-plugin-dir-constants--abspath
  desc: WordPress plugin directory constants (ABSPATH)
  for: [php]
  if:
    type: text
    word: ABSPATH
composite_rules:
- id: wordpress-plugin-dir-constants
  desc: WordPress plugin directory constants
  for: [php]
  any:
  - id: wordpress-plugin-dir-constants--wp-plugin-dir
  - id: wordpress-plugin-dir-constants--wp-content-dir
  - id: wordpress-plugin-dir-constants--abspath
- id: wordpress-context
  desc: File runs inside the WordPress core or test bootstrap
  for: [php]
  any:
  - id: wordpress-core-package-doc
  - id: wordpress-core-include-bootstrap
  - id: wordpress-phpunit-test-case
  - id: wordpress-core-api-symbols
  - id: wordpress-plugin-filesystem-context
- id: wordpress-plugin-filesystem-context
  desc: WordPress plugin filesystem context
  for: [php]
  any:
  - id: wordpress-plugin-dir-constants
  - id: wordpress-upload-dir-function
  - id: wordpress-imagely-ngg-context
- id: wordpress-cli-command-context
  desc: WordPress CLI command implementation context
  for: [php]
  crit: notable
  conf: 0.98
  all:
  - id: wordpress-cli-class-reference
  - id: wordpress-cli-command-registration
- id: wordpress-gutenberg-editor-bundle
  desc: WordPress Gutenberg editor bundle
  for: [javascript]
  all:
  - id: wordpress-gutenberg-hook-filter
  - id: wordpress-gutenberg-block-registration
  any:
  - id: wordpress-gutenberg-global
  - id: metadata/build/bundler::webpack-bundled
  - id: metadata/library/structure::js-webpack-chunk-global
- id: wordpress-block-runtime-marker
  desc: WordPress block runtime marker
  for: [javascript]
  any:
  - id: wordpress-gutenberg-block-registration
  - id: wordpress-gutenberg-hook-filter
  - id: wordpress-blocks-global
  - id: wordpress-block-editor-global
  - id: wordpress-interactivity-import
  - id: wordpress-block-class-prefix
  - id: woocommerce-block-class-prefix
- id: javascript-built-bundle-marker
  desc: JavaScript built bundle marker
  for: [javascript]
  any:
  - id: metadata/build/bundler::webpack-bundled
  - id: metadata/library/structure::js-webpack-chunk-global
- id: wordpress-block-build-asset
  desc: WordPress block build asset
  for: [javascript]
  all:
  - id: wordpress-block-runtime-marker
  - id: javascript-built-bundle-marker
- id: wordpress-block-pattern-file
  desc: WordPress block pattern file
  for: [php]
  all:
  - id: wordpress-block-pattern-header
  - id: wordpress-block-comment-marker
