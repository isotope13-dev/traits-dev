defaults:
  platforms: [unix, windows]
  for: [php, javascript]
  crit: baseline
  conf: 0.9
traits:
  - id: wordpress-core-package-doc
    desc: WordPress core package docblock
    if:
      type: text
      substr: "@package WordPress"
  - id: wordpress-core-include-bootstrap
    desc: WordPress core include/bootstrap context
    if:
      type: text
      regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  - id: wordpress-phpunit-test-case
    desc: WordPress PHPUnit test case context
    for: [php]
    if:
      type: text
      regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
  - id: wordpress-core-api-symbols
    desc: WordPress core API context
    for: [php]
    count_min: 4
    if:
      type: symbol
      regex: "^(wp_|WP_)"
  - id: wordpress-plugin-dir-constants
    desc: WordPress plugin directory constants
    for: [php]
    if:
      type: text
      regex: '\b(WP_PLUGIN_DIR|WP_CONTENT_DIR|ABSPATH)\b'
  - id: wordpress-upload-dir-function
    desc: WordPress upload directory function
    for: [php]
    if:
      type: text
      substr: 'wp_upload_dir'
  - id: wordpress-imagely-ngg-context
    desc: Imagely NextGEN Gallery namespace context
    for: [php]
    if:
      type: text
      substr: 'Imagely\NGG'
  - id: wordpress-gutenberg-hook-filter
    desc: WordPress Gutenberg hook filter
    for: [javascript]
    if:
      type: text
      substr: "wp.hooks.addFilter"
  - id: wordpress-gutenberg-block-registration
    desc: WordPress Gutenberg block registration
    for: [javascript]
    if:
      type: text
      substr: "blocks.registerBlockType"
  - id: wordpress-gutenberg-global
    desc: WordPress Gutenberg global
    for: [javascript]
    if:
      type: text
      substr: "window.React"
  - id: wordpress-block-build-asset-path
    desc: WordPress block build asset path
    for: [javascript]
    if:
      type: basename
      regex: '(^|[\\/!])build[\\/!]blocks[\\/!][^\\/!]{1,100}[\\/!][^\\/!]{1,100}\.js$'
  - id: wordpress-blocks-global
    desc: WordPress blocks global
    for: [javascript]
    if:
      type: text
      substr: "window.wp.blocks"
  - id: wordpress-block-editor-global
    desc: WordPress block editor global
    for: [javascript]
    if:
      type: text
      substr: "window.wp.blockEditor"
  - id: wordpress-interactivity-import
    desc: WordPress interactivity import
    for: [javascript]
    if:
      type: text
      substr: "@wordpress/interactivity"
  - id: wordpress-block-class-prefix
    desc: WordPress block class prefix
    for: [javascript]
    if:
      type: text
      substr: "wp-block-"
  - id: woocommerce-block-class-prefix
    desc: WooCommerce block class prefix
    for: [javascript]
    if:
      type: text
      substr: "wc-block-"
  - id: wordpress-block-pattern-header
    desc: WordPress block pattern header
    for: [php]
    if:
      type: text
      regex: '^\s*\*\s*Slug:\s+[A-Za-z0-9_-]+/[A-Za-z0-9_-]+'
  - id: wordpress-block-comment-marker
    desc: WordPress block comment marker
    for: [php, html]
    if:
      type: text
      substr: "<!-- wp:"
composite_rules:
  - id: wordpress-context
    desc: File runs inside the WordPress core or test bootstrap
    for: [php]
    any:
      - id: wordpress-core-package-doc
      - id: wordpress-core-include-bootstrap
      - id: wordpress-phpunit-test-case
      - id: wordpress-core-api-symbols
      - id: wordpress-plugin-filesystem-context
  - id: wordpress-plugin-filesystem-context
    desc: WordPress plugin filesystem context
    for: [php]
    any:
      - id: wordpress-plugin-dir-constants
      - id: wordpress-upload-dir-function
      - id: wordpress-imagely-ngg-context
  - id: wordpress-gutenberg-editor-bundle
    desc: WordPress Gutenberg editor bundle
    for: [javascript]
    all:
      - id: wordpress-gutenberg-hook-filter
      - id: wordpress-gutenberg-block-registration
    any:
      - id: wordpress-gutenberg-global
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/lang/encoded/unicode-escape::webpack-chunk-marker
  - id: wordpress-block-runtime-marker
    desc: WordPress block runtime marker
    for: [javascript]
    any:
      - id: wordpress-gutenberg-block-registration
      - id: wordpress-gutenberg-hook-filter
      - id: wordpress-blocks-global
      - id: wordpress-block-editor-global
      - id: wordpress-interactivity-import
      - id: wordpress-block-class-prefix
      - id: woocommerce-block-class-prefix
  - id: javascript-built-bundle-marker
    desc: JavaScript built bundle marker
    for: [javascript]
    any:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/lang/encoded/unicode-escape::webpack-chunk-marker
      - id: metadata/file/text/metrics::file-one-liner
      - id: metadata/file/text/metrics::single-long-line
  - id: wordpress-block-build-asset
    desc: WordPress block build asset
    for: [javascript]
    all:
      - id: wordpress-block-runtime-marker
      - id: javascript-built-bundle-marker
  - id: wordpress-block-pattern-file
    desc: WordPress block pattern file
    for: [php]
    all:
      - id: wordpress-block-pattern-header
      - id: wordpress-block-comment-marker
