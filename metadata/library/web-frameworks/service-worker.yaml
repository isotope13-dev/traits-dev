defaults:
  platforms: [unix, windows]
  for: [php, javascript, typescript]
traits:
  - id: response-body-getreader-call
    desc: Response body getReader call
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'response\.body\.getReader\s*\('
  - id: reader-read-call
    desc: Reader read call
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'reader\.read\s*\('
  - id: done-break-guard
    desc: Done break guard
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'if\s*\(\s*done\s*\)\s*break'
composite_rules:
  - id: service-worker-stream-drain-loop
    desc: Service worker stream drain loop
    crit: baseline
    conf: 0.9
    near_lines: 12
    all:
      - id: response-body-getreader-call
      - id: reader-read-call
      - id: done-break-guard
