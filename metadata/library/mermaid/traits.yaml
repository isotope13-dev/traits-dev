defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: architecture-fixture
    desc: Mermaid architecture fixture text
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: mermaid-architecture
  - id: mermaid-bundle-marker
    desc: Mermaid bundled library marker
    crit: baseline
    conf: 0.99
    for: [javascript]
    if:
      type: text
      substr: 'Unknown stretchy delimiter.'
