defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: version-banner
    desc: React version banner
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: React (v)?[0-9]+\.[0-9]+\.[0-9]+
  - id: react-license-banner
    desc: React license banner
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '@license React v[0-9]+\.[0-9]+\.[0-9]+'
  - id: react-dom-development-bundle
    desc: ReactDOM development bundle
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: react-dom.development.js
  - id: react-devtools-text
    desc: React DevTools compatibility text
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: React DevTools
  - id: react-dom-renderer-package
    desc: ReactDOM renderer package marker
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "rendererPackageName: 'react-dom'"
  - id: copyright-dup
    desc: React copyright notice
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: \* React (\(with addons\) )?v[0-9]
  - id: package-name
    desc: React package identifier
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: '@license React|React \(c\) (Facebook|Meta)'
  - id: react-object
    desc: React object initialization
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: \bReact\.__SECRET_INTERNALS_DO_NOT_USE_OR_YOU_WILL_BE_FIRED\b
  - id: react-dom
    desc: ReactDOM object reference
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: \bReactDOM\.(render|createRoot|hydrate)
  - id: jsx-pragma
    desc: React JSX transformation signature
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: React\.createElement\(
composite_rules:
  - id: library-comp
    desc: File contains React library
    crit: notable
    conf: 0.9
    any:
      - id: version-banner
      - id: react-license-banner
      - id: react-dom-development-bundle
      - id: react-dom-renderer-package
      - id: metadata/library/react::copyright-dup
      - id: package-name
      - id: react-object
