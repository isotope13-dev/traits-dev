defaults:
  platforms: [linux, macos, windows]
traits:
  - id: python-runtime
    desc: Python runtime environment
    crit: baseline
    conf: 0.95
    for: [pe, dll, so, dylib]
    if:
      type: symbol
      exact: "PyGILState_Ensure"
  - id: python-stable-abi-forwarder-basename
    desc: CPython stable-ABI forwarder DLL filename
    crit: component
    conf: 0.99
    for: [pe, dll]
    if:
      type: basename
      regex: '^python[0-9]*(_d)?\.dll$'
      case_insensitive: true
