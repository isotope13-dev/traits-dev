defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.9

traits:
  - id: config-validation
    desc: Sandbox runtime config validation
    if:
      type: text
      substr: SandboxRuntimeConfigSchema.safeParse

  - id: protected-path-denylist
    desc: Sandbox protected path denylist
    if:
      type: text
      regex: 'DANGEROUS_FILES[\s\S]{0,260}\.(bashrc|zshrc|profile)[\s\S]{0,260}DANGEROUS_DIRECTORIES'

  - id: node-http-proxy-server
    desc: Node HTTP proxy server
    if:
      type: text
      regex: 'createHttpProxyServer[\s\S]{0,600}(httpRequest|httpsRequest)'
