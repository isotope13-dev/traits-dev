# Web3 contract codegen and ABI declarations.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
- id: contract-abi-const
  desc: Web3 contract ABI constant
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: '\b(export\s+)?(declare\s+)?const\s+[A-Za-z0-9_$]+Abi\b'

- id: contract-abi-function-entry
  desc: Web3 contract ABI function entry
  crit: baseline
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: '\btype:\s*["'']function["'']'

- id: contract-abi-typed-name-field
  desc: Web3 contract ABI typed name field
  crit: baseline
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: '\breadonly\s+name:\s*["''][A-Za-z0-9_]+["'']'

- id: contract-address-field
  desc: Web3 contract address field
  crit: baseline
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: '\breadonly\s+address:\s*["'']0x[a-fA-F0-9]{40}["'']'

- id: contract-address-const
  desc: Web3 contract address constant
  crit: baseline
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: '\bconst\s+[A-Za-z0-9_$]+Address\s*=\s*["'']0x[a-fA-F0-9]{40}["'']'

- id: wagmi-read-write-action--readcontract
  desc: Wagmi contract read or write (readContract)
  crit: baseline
  conf: 0.9
  if:
    type: text
    word: readContract
- id: wagmi-read-write-action--writecontract
  desc: Wagmi contract read or write (writeContract)
  crit: baseline
  conf: 0.9
  if:
    type: text
    word: writeContract
- id: wagmi-read-write-action--simulatecontract
  desc: Wagmi contract read or write (simulateContract)
  crit: baseline
  conf: 0.9
  if:
    type: text
    word: simulateContract
- id: wagmi-watch-get-action--watchcontractevent
  desc: Wagmi contract watch or get (watchContractEvent)
  crit: baseline
  conf: 0.9
  if:
    type: text
    word: watchContractEvent
- id: wagmi-watch-get-action--getcontract
  desc: Wagmi contract watch or get (getContract)
  crit: baseline
  conf: 0.9
  if:
    type: text
    word: getContract
composite_rules:
- id: wagmi-read-write-action
  desc: Wagmi contract read or write wrapper
  crit: baseline
  conf: 0.9
  any:
  - id: wagmi-read-write-action--readcontract
  - id: wagmi-read-write-action--writecontract
  - id: wagmi-read-write-action--simulatecontract
- id: wagmi-watch-get-action
  desc: Wagmi contract watch or get wrapper
  crit: baseline
  conf: 0.9
  any:
  - id: wagmi-watch-get-action--watchcontractevent
  - id: wagmi-watch-get-action--getcontract
- id: generated-contract-abi
  desc: Generated Web3 contract ABI and type declarations
  crit: baseline
  conf: 0.93
  needs: 2
  any:
  - id: metadata/library/web3::contract-abi-const
  - id: metadata/library/web3::contract-abi-function-entry
  - id: metadata/library/web3::contract-abi-typed-name-field
  - id: metadata/library/web3::contract-address-const
  - id: metadata/library/web3::contract-address-field
  - id: metadata/library/web3::wagmi-read-write-action--readcontract
  - id: metadata/library/web3::wagmi-read-write-action--simulatecontract
  - id: metadata/library/web3::wagmi-read-write-action--writecontract
  - id: metadata/library/web3::wagmi-watch-get-action--getcontract
  - id: metadata/library/web3::wagmi-watch-get-action--watchcontractevent
