# Web3 contract codegen and ABI declarations.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: contract-abi-const
    desc: Web3 contract ABI constant
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '\b(export\s+)?(declare\s+)?const\s+[A-Za-z0-9_$]+Abi\b'

  - id: contract-abi-function-entry
    desc: Web3 contract ABI function entry
    crit: baseline
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\btype:\s*["'']function["'']'

  - id: contract-abi-typed-name-field
    desc: Web3 contract ABI typed name field
    crit: baseline
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: '\breadonly\s+name:\s*["''][A-Za-z0-9_]+["'']'

  - id: contract-address-field
    desc: Web3 contract address field
    crit: baseline
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\breadonly\s+address:\s*["'']0x[a-fA-F0-9]{40}["'']'

  - id: contract-address-const
    desc: Web3 contract address constant
    crit: baseline
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\bconst\s+[A-Za-z0-9_$]+Address\s*=\s*["'']0x[a-fA-F0-9]{40}["'']'

  - id: wagmi-read-write-action
    desc: Wagmi contract read or write wrapper
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '\b(readContract|writeContract|simulateContract)\b'

  - id: wagmi-watch-get-action
    desc: Wagmi contract watch or get wrapper
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '\b(watchContractEvent|getContract)\b'

composite_rules:
  - id: generated-contract-abi
    desc: Generated Web3 contract ABI and type declarations
    crit: baseline
    conf: 0.93
    needs: 2
    any:
      - id: metadata/library/web3
