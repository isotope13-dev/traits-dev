defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: nodeunit-exports-modulepaths
    desc: Nodeunit exports.modulePaths
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.modulePaths'
  - id: nodeunit-exports-sandbox
    desc: Nodeunit exports.sandbox
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.sandbox'
  - id: nodeunit-exports-httputil
    desc: Nodeunit exports.httputil
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.httputil'
  - id: nodeunit-exports-bettererrors
    desc: Nodeunit exports.betterErrors
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.betterErrors'
  - id: nodeunit-require
    desc: Requires nodeunit library
    crit: baseline
    if:
      type: text
      regex: "require\\(['\"]([^'\"]{1,120}/)?nodeunit(/[^'\"]{1,120})?['\"]\\)"
  - id: nodeunit-assert-strict-equal
    desc: Nodeunit assert.strictEqual usage
    crit: baseline
    count_min: 3
    if:
      type: text
      regex: "assert\\.strictEqual\\s*\\("
  - id: nodeunit-assert-done
    desc: Nodeunit assert.done callback
    crit: baseline
    count_min: 2
    if:
      type: text
      regex: "assert\\.done\\s*\\("
  - id: nodeunit-module-exports-tests
    desc: Exports object of test cases
    crit: baseline
    if:
      type: text
      regex: "module\\.exports\\s*=\\s*\\{"
composite_rules:
  - id: nodeunit-assert-pattern
    desc: Nodeunit assertion-style test file
    crit: baseline
    all:
      - id: nodeunit-assert-strict-equal
      - id: nodeunit-assert-done
      - id: nodeunit-module-exports-tests
  - id: nodeunit
    desc: Nodeunit test framework
    crit: notable
    any:
      - id: nodeunit-exports-modulepaths
      - id: nodeunit-exports-sandbox
      - id: nodeunit-exports-httputil
      - id: nodeunit-exports-bettererrors
      - id: nodeunit-require
      - id: nodeunit-assert-pattern
