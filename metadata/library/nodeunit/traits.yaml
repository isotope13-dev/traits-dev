defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: nodeunit-exports-modulepaths
    desc: Nodeunit exports.modulePaths
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.modulePaths'
  - id: nodeunit-exports-sandbox
    desc: Nodeunit exports.sandbox
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.sandbox'
  - id: nodeunit-exports-httputil
    desc: Nodeunit exports.httputil
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.httputil'
  - id: nodeunit-exports-bettererrors
    desc: Nodeunit exports.betterErrors
    crit: baseline
    if:
      type: symbol
      regex: 'exports\.betterErrors'
  - id: nodeunit-require
    desc: Requires nodeunit library
    crit: baseline
    if:
      type: raw
      regex: "require\\(['\"]([^'\"]{1,120}/)?nodeunit(/[^'\"]{1,120})?['\"]\\)"
composite_rules:
  - id: nodeunit
    desc: Nodeunit test framework
    crit: notable
    any:
      - id: nodeunit-exports-modulepaths
      - id: nodeunit-exports-sandbox
      - id: nodeunit-exports-httputil
      - id: nodeunit-exports-bettererrors
      - id: nodeunit-require
