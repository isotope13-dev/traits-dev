defaults:
  platforms: [macos]
  for: [macho, dylib]
  crit: baseline
  conf: 0.96
  size_max: 200000000

traits:
  - id: sage-math-libpari-gmp-tls
    desc: SageMath PARI/GMP native library
    if:
      type: basename
      exact: libpari-gmp-tls.dylib
  - id: sage-math-libgmp
    desc: SageMath GMP native library
    if:
      type: basename
      exact: libgmp.10.dylib
  - id: sage-math-libmpfr
    desc: SageMath MPFR native library
    if:
      type: basename
      exact: libmpfr.6.dylib
  - id: sage-math-libntl
    desc: SageMath NTL native library
    if:
      type: basename
      exact: libntl.45.dylib
  - id: sage-math-libgf2x
    desc: SageMath GF2X native library
    if:
      type: basename
      exact: libgf2x.3.dylib
  - id: sage-math-liblfunction
    desc: SageMath L-function native library
    if:
      type: basename
      exact: libLfunction.2.0.0.dylib
  - id: sage-math-lcalc-tool
    desc: SageMath lcalc native tool
    if:
      type: basename
      exact: lcalc
