defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.99

traits:
  - id: jsonata-import
    desc: Imports jsonata query library
    if:
      type: text
      regex: '(?m)^import\s+jsonata\s+from\s+["'']jsonata["'']'
  - id: jsonata-require
    desc: Requires jsonata query library
    if:
      type: text
      regex: 'require\s*\(\s*["'']jsonata["'']\s*\)'
  - id: jsonata-evaluate-call
    desc: jsonata query evaluate call
    if:
      type: text
      regex: 'jsonata\s*\([^)]{0,120}\)\s*\.\s*evaluate\s*\('

composite_rules:
  - id: jsonata-query-evaluate
    desc: jsonata library query evaluation
    crit: notable
    conf: 0.99
    all:
      - id: jsonata-evaluate-call
    any:
      - id: jsonata-import
      - id: jsonata-require
