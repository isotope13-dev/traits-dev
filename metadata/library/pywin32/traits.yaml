# pywin32 Windows API binding modules (win32api, win32com, win32file, ...).
#
# pywin32's compiled extensions are thin Python bindings that re-export the
# entire Win32 API surface, so by design they reference clusters of powerful
# native calls (SetSystemTime, SetComputerName, CreateHardLink, registry/COM
# CLSIDs, ...) that backdoor/tamper composites key on. The module is a binding
# layer, not the program that calls those APIs — referenced as benign context so
# the API-cluster composites do not fire on the binding library itself.
defaults:
  platforms: [windows]
  for: [pe, dll, pyc, python]
  crit: baseline
traits:
  - id: pywin32-init-export
    desc: pywin32 module init export (PyInit_win32*)
    conf: 0.9
    if:
      type: text
      regex: 'PyInit_win32[a-z]'
  - id: pywin32-module-basename
    desc: pywin32 extension module filename
    conf: 0.9
    if:
      type: basename
      regex: '(?i)^win32[a-z_]*\.(pyd|pyc)$'
  - id: pywintypes-runtime-ref
    desc: pywintypes runtime DLL reference
    conf: 0.85
    if:
      type: text
      regex: 'pywintypes[0-9]{2,3}\.dll'
composite_rules:
  - id: pywin32-binding-module
    desc: pywin32 Windows API binding module
    conf: 0.92
    any:
      - id: pywin32-init-export
      - id: pywin32-module-basename
      - id: pywintypes-runtime-ref
