defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: actions-sdk
    desc: GitHub Actions SDK import
    crit: baseline
    conf: 0.95
    if:
      type: string_literal
      substr: '@actions/'
  - id: action-dist-directory
    desc: GitHub Action dist directory path
    crit: baseline
    conf: 0.94
    if:
      type: path
      regex: '(^|[\\/])dist([\\/]|$)'
  - id: action-bundle-js-basename
    desc: GitHub Action bundled JavaScript basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: '^(index|[^\\/]+)\.[cm]?[jt]s$'
  - id: action-testdata-path
    desc: GitHub Action testdata fixture path
    crit: baseline
    conf: 0.94
    for: [javascript, typescript, package.json, github-actions]
    if:
      type: path
      regex: '(^|[\\/])testdata[\\/]'
  - id: action-bundle-region-marker
    desc: GitHub Action bundled @actions module marker
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: "//#region node_modules/@actions/"
  - id: action-runtime-env-docs
    desc: GitHub Actions runtime env docs
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: default-environment-variables
  - id: octokit-openapi-types-path
    desc: Octokit OpenAPI package path
    crit: baseline
    conf: 0.94
    if:
      type: path
      substr: '@octokit/openapi-types'
  - id: types-dts-basename
    desc: TypeScript declaration basename
    crit: baseline
    conf: 0.94
    if:
      type: basename
      exact: types.d.ts
composite_rules:
  - id: action-dist-bundle-path
    desc: GitHub Action bundled dist JavaScript
    crit: baseline
    conf: 0.94
    all:
      - id: action-dist-directory
      - id: action-bundle-js-basename
  - id: action-bundle-context
    desc: GitHub Action bundled JavaScript context
    crit: baseline
    conf: 0.94
    any:
      - id: actions-sdk
      - id: action-dist-bundle-path
      - id: action-bundle-region-marker
      - id: action-runtime-env-docs
  - id: octokit-openapi-types
    desc: Octokit OpenAPI generated type definitions
    crit: component
    conf: 0.94
    all:
      - id: octokit-openapi-types-path
      - id: types-dts-basename
