defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: prettier-api
    desc: Prettier code formatter API usage
    crit: baseline
    conf: 0.95
    if:
      type: raw
      regex: 'prettier\.(format|__debug|version|formatWithCursor)'
  - id: prettier-config
    desc: Prettier configuration via cosmiconfig
    crit: baseline
    conf: 0.95
    if:
      type: raw
      substr: 'cosmiconfig("prettier")'
  - id: prettier-ignore-symbols
    desc: Prettier ignore handling symbols
    crit: baseline
    conf: 0.95
    count_min: 3
    if:
      type: symbol
      regex: "(isPrettierIgnore|PrettierIgnore)"
  - id: prettier-language-js
    desc: Prettier language-js parser bundle
    crit: baseline
    conf: 0.95
    count_min: 2
    if:
      type: string_value
      regex: 'src/language-js/(pragma|parse/utils/create-parser)\.js'
composite_rules:
  - id: prettier-detection
    desc: Prettier code formatter bundle
    crit: baseline
    conf: 0.95
    any:
      - id: prettier-api
      - id: prettier-config
      - id: prettier-ignore-symbols
      - id: prettier-language-js
