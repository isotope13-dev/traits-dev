defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.98

traits:
  - id: msvc-runtime-basename
    desc: Microsoft C++ runtime DLL filename
    if:
      type: basename
      regex: '(?i)(MSVCP|MSVCR|VCRUNTIME)[0-9]{2,3}D?\.DLL'
  - id: msvc-runtime-version-info
    desc: MSVC runtime version metadata
    if:
      type: value
      path: pe.version.internal_name
      regex: '(?i)^(MSVCP|MSVCR|VCRUNTIME)[0-9]{2,3}D?\.DLL$'
  - id: msvc-runtime-import-marker
    desc: MSVC runtime DLL import marker
    if:
      type: text
      section: .rdata
      regex: '(?i)(MSVCP|MSVCR|VCRUNTIME)[0-9]{2,3}D?\.DLL'
  - id: msvc-runtime-resource-marker
    desc: MSVC runtime version resource marker
    if:
      type: text
      section: .rsrc
      regex: '(?i)(MSVCP|MSVCR|VCRUNTIME)[0-9]{2,3}D?\.DLL'
  - id: msvc-runtime-path-marker
    desc: Embedded MSVC runtime DLL path
    if:
      type: path
      regex: '(?i)(^|[/\\:])(MSVCP|MSVCR|VCRUNTIME)[0-9]{2,3}D?\.DLL(@|$)'

composite_rules:
  - id: msvc-runtime-library
    desc: Microsoft C++ runtime library
    conf: 0.98
    any:
      - id: msvc-runtime-basename
      - id: msvc-runtime-version-info
      - id: msvc-runtime-import-marker
      - id: msvc-runtime-resource-marker
      - id: msvc-runtime-path-marker
