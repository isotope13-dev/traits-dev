defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [source, binaries]
traits:
  - id: d3-interpolate
    desc: D3 interpolate API marker
    crit: notable
    conf: 1.0
    if:
      type: string_value
      regex: d3\.interpolate[a-zA-Z]+
      section: .text
  - id: d3-scale-linear
    desc: D3 linear scale API marker
    crit: notable
    conf: 1.0
    if:
      type: string_value
      substr: d3.scale.linear
      section: .text
  - id: d3-layout-force
    desc: D3 force layout API marker
    crit: notable
    conf: 1.0
    if:
      type: string_value
      substr: d3.layout.force
      section: .text
  - id: d3-version-bo-object
    desc: D3-style version object marker (Bo)
    crit: notable
    conf: 1.0
    if:
      type: string_value
      regex: Bo=\{version:"[0-9.]+"\}
      section: .text
  - id: d3-version-object
    desc: D3 version object marker
    crit: notable
    conf: 1.0
    if:
      type: string_value
      regex: d3\s*=\s*\{version:"[0-9.]+"\}
      section: .text
  - id: rickshaw-graph
    desc: Rickshaw graph marker
    crit: notable
    conf: 1.0
    if:
      type: string_value
      substr: Rickshaw.Graph
      section: .text
  - id: rickshaw-time-fixtures
    desc: Rickshaw time fixtures marker
    crit: notable
    conf: 1.0
    if:
      type: string_value
      substr: Rickshaw.Fixtures.Time
      section: .text
composite_rules:
  - id: d3-detection-all
    desc: D3.js data visualization library
    crit: notable
    conf: 1.0
    any:
      - id: d3-interpolate
      - id: d3-scale-linear
      - id: d3-layout-force
      - id: d3-version-bo-object
      - id: d3-version-object
      - id: rickshaw-graph
      - id: rickshaw-time-fixtures
