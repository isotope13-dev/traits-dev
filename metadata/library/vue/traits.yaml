defaults:
  platforms: [unix, windows, macos]
  for:
    - javascript
traits:
  - id: version-string-dup
    desc: Vue version string
    crit: notable
    conf: 0.95
    if:
      type: string
      regex: Vue\.js v[0-9]+\.[0-9]+\.[0-9]+
  - id: copyright-dup
    desc: Vue copyright notice
    crit: notable
    conf: 0.95
    if:
      type: string
      regex: \* Vue\.js v[0-9]|\(c\) [0-9]+-[0-9]+ Evan You
  - id: vue-global
    desc: Vue global object signature
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: \bVue\.version\b|\bVue\.config\b
  - id: vue-component
    desc: Vue component registration
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: Vue\.(component|directive|filter|mixin)
  - id: vue-instance
    desc: Vue instance constructor
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: new Vue\(\{|Vue\.extend\(
  - id: vue-reactivity
    desc: Vue reactivity signature
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: \bVue\.observable\b|\bVue\.set\b|\bVue\.delete\b
composite_rules:
  - id: library-comp
    desc: File contains Vue.js library
    crit: notable
    conf: 0.9
    any:
      - id: metadata/library/vue::version-string-dup
      - id: metadata/library/react::copyright-dup
      - id: vue-global
      - id: vue-component
