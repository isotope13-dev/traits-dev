# Lodash Library Detection
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: version-string
    desc: Lodash version string
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'lodash v[0-9]+\.[0-9]+\.[0-9]+'
  - id: domain
    desc: lodash.com domain reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "lodash.com"
  - id: run-in-context
    desc: lodash.runInContext API method
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "lodash.runInContext"
  - id: lodash-module-memberof
    desc: Lodash modular source member marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: '@memberOf _'
  - id: lodash-internal-module-require-a
    desc: Lodash internal module require
    crit: baseline
    conf: 0.86
    if:
      type: text
      regex: "require\\('./_(base|create|array)"
  - id: lodash-internal-module-require-b
    desc: Lodash internal module require
    crit: baseline
    conf: 0.86
    if:
      type: text
      regex: "require\\('./_(assign|native|free)"
composite_rules:
  - id: library
    desc: File contains lodash library
    crit: notable
    conf: 0.9
    any:
      - id: version-string
      - id: domain
  - id: modular-source
    desc: Lodash modular source file
    crit: baseline
    conf: 0.9
    any:
      - id: lodash-module-memberof
      - id: lodash-internal-module-require-a
      - id: lodash-internal-module-require-b
