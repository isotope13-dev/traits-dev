# Lodash Library Detection
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: version-string
    desc: Lodash version string
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'lodash v[0-9]+\.[0-9]+\.[0-9]+'
  - id: domain
    desc: lodash.com domain reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "lodash.com"
  - id: run-in-context
    desc: lodash.runInContext API method
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "lodash.runInContext"
composite_rules:
  - id: library
    desc: File contains lodash library
    crit: notable
    conf: 0.9
    any:
      - id: version-string
      - id: domain
