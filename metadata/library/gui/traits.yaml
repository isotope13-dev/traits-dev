defaults:
  platforms: [windows, unix]
  for: [binaries]
  crit: baseline
  conf: 0.95
traits:
  - id: openfl-lime-cpp-rtti
    desc: OpenFL/Lime C++ RTTI symbols
    if:
      type: text
      substr: "@display@openfl@@"
  - id: juce-cpp-rtti
    desc: JUCE C++ RTTI symbols
    if:
      type: text
      substr: "@juce@@"
