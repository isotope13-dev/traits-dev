defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline

traits:
  - id: apache-asf-source-header
    desc: Apache ASF source header
    conf: 0.9
    if:
      type: text
      substr: 'Licensed to the Apache Software Foundation (ASF)'

  - id: cassandra-namespace-import
    desc: Cassandra namespace import
    conf: 0.9
    if:
      type: import
      exact: cassandra

composite_rules:
  - id: apache-cassandra-driver-source
    desc: Apache Cassandra driver source
    conf: 0.96
    all:
      - id: apache-asf-source-header
      - id: cassandra-namespace-import

