defaults:
  platforms: [unix, windows]
  for: [documents, data]
traits:
  - id: bootstrap-css-source-map
    desc: Bootstrap CSS source-map marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: 'sourceMappingURL=bootstrap.min.css.map'
  - id: bootstrap-utility-css
    desc: Bootstrap utility CSS classes
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '\\.container-xxl|\\.d-print-inline|\\.text-xl-center'
