defaults:
  platforms: [unix, windows]
  # Stylesheet sources are classified as plain `text`, including Sass partials
  # and minified CSS. Keep the library markers available for those assets too.
  for: [documents, data, text]
traits:
  - id: bootstrap-css-source-map
    desc: Bootstrap CSS source-map marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: 'sourceMappingURL=bootstrap.min.css.map'
  - id: bootstrap-utility-css
    desc: Bootstrap utility CSS classes
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '\\.container-xxl|\\.d-print-inline|\\.text-xl-center'
  - id: bootstrap-sass-core-imports
    desc: Bootstrap Sass core import set
    crit: baseline
    conf: 0.98
    for: [text]
    count_min: 5
    if:
      type: text
      regex: '(?m)^\s*@import\s+["\x27](functions|variables|mixins|grid|utilities)["\x27]\s*;'
  - id: bootstrap-sass-utility-imports-core
    desc: Bootstrap Sass core utility imports
    crit: baseline
    conf: 0.98
    for: [text]
    count_min: 3
    if:
      type: text
      regex: '@import\s+["\x27]utilities/(align|clearfix|display|flex|float)["\x27]'
  - id: bootstrap-sass-utility-imports-layout
    desc: Bootstrap Sass layout utility imports
    crit: baseline
    conf: 0.98
    for: [text]
    count_min: 3
    if:
      type: text
      regex: '@import\s+["\x27]utilities/(position|screenreaders|sizing|spacing|text|visibility)["\x27]'

composite_rules:
  - id: bootstrap-sass-utility-imports
    desc: Bootstrap Sass utility import set
    crit: baseline
    conf: 0.98
    for: [text]
    all:
      - id: bootstrap-sass-utility-imports-core
      - id: bootstrap-sass-utility-imports-layout
