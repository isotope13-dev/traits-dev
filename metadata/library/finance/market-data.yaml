defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, java, csharp, go, php, markdown]
traits:
  - id: dartlab-finance-context
    desc: DartLab finance package context
    crit: component
    conf: 0.97
    for: [archive, whl, python]
    if:
      type: path
      regex: '(^|[^A-Za-z0-9_])dartlab([\\/]|-|$)'
  - id: chinese-stock-market-term
    desc: Chinese stock market term
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '通达信|行情|证券'
  - id: chinese-stock-endpoint-term
    desc: Chinese stock endpoint term
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '主站|电信|联通|双线'

  - id: hamuna-stock-sdk-context
    desc: Hamuna stock SDK context
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'HamunaStockApi|HAMUNA_API_URL|stock\.ai\.hamuna\.club'

composite_rules:
  - id: chinese-stock-endpoint-table
    desc: Chinese stock market endpoint table
    crit: component
    conf: 0.92
    all:
      - id: chinese-stock-market-term
      - id: chinese-stock-endpoint-term
