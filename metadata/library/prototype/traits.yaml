defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: baseline
  conf: 1.0
  for:
    - javascript
traits:
  - id: copyright
    desc: Prototype.js copyright header
    if:
      type: string_value
      substr: Prototype JavaScript framework
      case_insensitive: true
  - id: version-string
    desc: Prototype.js version definition
    if:
      type: raw
      substr: var Prototype = {
  - id: header-x
    desc: X-Prototype-Version header
    if:
      type: string_value
      substr: X-Prototype-Version
