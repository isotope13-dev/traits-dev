defaults:
  platforms: [windows, unix]
  crit: baseline
  for:
    - javascript
traits:
  - id: syntaxhighlighter-core
    desc: SyntaxHighlighter core library
    if:
      type: symbol
      regex: SyntaxHighlighter
  - id: ace-editor-core
    desc: Ace editor core library
    if:
      type: text
      substr: 'define("ace/mode/text_highlight_rules"'
  - id: syntaxhighlighter-brush
    desc: SyntaxHighlighter brush definition
    if:
      type: symbol
      regex: SyntaxHighlighter\.brushes|SyntaxHighlighter\.Highlighter
  - id: syntaxhighlighter-brush-export
    desc: SyntaxHighlighter brush export
    if:
      type: symbol
      regex: exports\.Brush
  - id: syntaxhighlighter-header-url
    desc: SyntaxHighlighter project URL
    if:
      type: string_literal
      regex: alexgorbatchev\.com/SyntaxHighlighter
  - id: prismjs-core
    desc: PrismJS syntax highlighter core
    if:
      type: text
      substr: Prism.languages
  - id: prismjs-file-highlight-plugin
    desc: PrismJS file highlight plugin
    if:
      type: text
      substr: before-highlightall
  - id: prismjs-package-reference
    desc: PrismJS package reference
    if:
      type: text
      substr: prismjs
composite_rules:
  - id: prismjs-syntax-highlighter
    desc: PrismJS syntax highlighter bundle
    crit: baseline
    conf: 0.95
    any:
      - id: prismjs-core
      - id: prismjs-file-highlight-plugin
      - id: prismjs-package-reference
    needs: 2
