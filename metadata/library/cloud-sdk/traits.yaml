defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  conf: 0.95

traits:
- id: huaweicloud-model-docstring
  desc: Huawei Cloud SDK model docstring
  crit: component
  if:
    type: text
    substr: The model defined in huaweicloud sdk
- id: openapi-types-model-map
  desc: OpenAPI model type map
  crit: component
  if:
    type: text
    regex: 'openapi_types\s*=\s*\{'

composite_rules:
- id: huaweicloud-python-model
  desc: Huawei Cloud Python SDK model
  crit: baseline
  conf: 0.95
  all:
  - id: huaweicloud-model-docstring
  - id: openapi-types-model-map
