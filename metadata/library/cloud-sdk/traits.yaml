defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  conf: 0.95

traits:
- id: tencentcloud-python-sdk
  desc: Tencent Cloud Python service SDK
  crit: baseline
  conf: 0.98
  if:
    type: import
    regex: '^tencentcloud\.[A-Za-z0-9_]+\.v[0-9]+$'
- id: azure-identity-js-sdk
  desc: Azure Identity JavaScript SDK marker
  for: [javascript, typescript]
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: '@azure/identity'
- id: huaweicloud-model-docstring
  desc: Huawei Cloud SDK model docstring
  crit: component
  if:
    type: text
    substr: The model defined in huaweicloud sdk
- id: openapi-types-model-map
  desc: OpenAPI model type map
  crit: component
  if:
    type: text
    regex: 'openapi_types\s*=\s*\{'
- id: huaweicloud-dotnet-aad-internal-name
  desc: Huawei Cloud AAD assembly name
  for: [pe, dll]
  platforms: [windows]
  crit: component
  if:
    type: value
    path: pe.version.internal_name
    exact: HuaweiCloud.SDK.Aad.dll
- id: huaweicloud-dotnet-aad-namespace
  desc: Huawei Cloud AAD namespace
  for: [pe, dll]
  platforms: [windows]
  crit: component
  if:
    type: text
    section: .text
    substr: HuaweiCloud.SDK.Aad.

composite_rules:
- id: huaweicloud-python-model
  desc: Huawei Cloud Python SDK model
  crit: baseline
  conf: 0.95
  all:
  - id: huaweicloud-model-docstring
  - id: openapi-types-model-map
- id: huaweicloud-dotnet-aad-sdk
  desc: Huawei Cloud AAD .NET SDK
  for: [pe, dll]
  platforms: [windows]
  crit: baseline
  conf: 0.95
  all:
  - id: huaweicloud-dotnet-aad-internal-name
  - id: huaweicloud-dotnet-aad-namespace
