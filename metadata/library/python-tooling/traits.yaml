defaults:
  platforms: [linux, macos, windows]
  for: [python]
  crit: baseline
  conf: 0.96

traits:
  - id: pytype-write-pyc-function
    desc: Pytype write_pyc function
    if:
      type: symbol
      exact: write_pyc
  - id: pytype-compile-to-pyc-function
    desc: Pytype compile_to_pyc function
    if:
      type: symbol
      exact: compile_to_pyc
  - id: pytype-compile-src-to-pyc-function
    desc: Pytype compile_src_to_pyc function
    if:
      type: symbol
      exact: compile_src_to_pyc
  - id: importlib-magic-number
    desc: Python importlib magic number
    if:
      type: text
      substr: importlib.util.MAGIC_NUMBER
  - id: cpython-marshal-comment
    desc: CPython marshal source comment
    if:
      type: text
      substr: Adapted from marshal.c
  - id: cpython-marshal-reader-class
    desc: CPython marshal Reader class
    if:
      type: symbol
      exact: Reader
  - id: cpython-marshal-loads-function
    desc: CPython marshal loads function
    if:
      type: symbol
      exact: loads
  - id: cpython-marshal-r-object-function
    desc: CPython marshal object reader
    if:
      type: symbol
      exact: r_object
  - id: python-storage-backend-interface
    desc: Python storage backend interface
    conf: 0.92
    if:
      type: text
      regex: 'Base storage backend interface|Azure Blob Storage|storage backend'

composite_rules:
  - id: pytype-bytecode-compiler-helper
    desc: Pytype bytecode compiler helper
    all:
      - id: pytype-write-pyc-function
      - id: pytype-compile-to-pyc-function
      - id: pytype-compile-src-to-pyc-function
      - id: importlib-magic-number

  - id: cpython-marshal-reader-source
    desc: CPython marshal reader source
    all:
      - id: cpython-marshal-comment
      - id: cpython-marshal-reader-class
      - id: cpython-marshal-loads-function
      - id: cpython-marshal-r-object-function
