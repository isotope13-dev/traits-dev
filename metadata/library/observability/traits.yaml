defaults:
  platforms: [unix, windows]
  for: [binaries, go]
  crit: baseline
  conf: 0.9

traits:
  - id: datadog-go-package-text
    desc: Datadog Go package marker
    for: [elf, go]
    if:
      type: text
      regex: '(?i)github\.com/DataDog'

  - id: php-ddtrace-extension-name
    desc: Datadog PHP tracing extension basename
    crit: notable
    conf: 0.99
    for: [so]
    if:
      type: basename
      exact: ddtrace.so

  - id: php-ddtrace-datadog-export
    desc: Datadog PHP tracing extension export
    crit: notable
    conf: 0.99
    for: [so]
    if:
      type: export
      exact: ddog_library_configurator_with_detect_process_info

  - id: php-ddtrace-sidecar-export
    desc: Datadog sidecar transport export
    crit: notable
    conf: 0.99
    for: [so]
    if:
      type: export
      exact: ddog_sidecar_connect

composite_rules:
  - id: php-ddtrace-extension
    desc: Datadog ddtrace PHP extension
    crit: notable
    conf: 0.99
    all:
      - id: php-ddtrace-extension-name
      - id: php-ddtrace-datadog-export

  # Datadog's PHP extension legitimately starts a sidecar, uses LD_PRELOAD
  # integration, and resolves symbols for tracing.  Keep that identity as a
  # narrowly scoped benign context for intent rules; the notable identity
  # above remains visible to analysts.
  - id: php-ddtrace-benign-loader-context
    desc: Datadog PHP extension loader context
    crit: exception
    conf: 0.99
    all:
      - id: php-ddtrace-extension-name
      - id: php-ddtrace-datadog-export
      - id: php-ddtrace-sidecar-export
