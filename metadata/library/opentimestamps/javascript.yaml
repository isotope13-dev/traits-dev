defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: opentimestamps-global-marker
    desc: OpenTimestamps browser library identifier
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: OpenTimestamps
  - id: bitcore-lib-browser-marker
    desc: bitcore-lib browser dependency marker
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: bitcore-lib
composite_rules:
  - id: opentimestamps-browser-bundle-context
    desc: OpenTimestamps browser bundle context
    crit: exception
    conf: 0.99
    all:
      - id: opentimestamps-global-marker
      - id: bitcore-lib-browser-marker
