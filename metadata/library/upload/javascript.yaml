defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
- id: tus-resumable-header
  desc: tus resumable upload protocol header
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "Tus-Resumable"
- id: tus-upload-offset-header
  desc: tus upload offset protocol header
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "Upload-Offset"
- id: tus-upload-metadata-header
  desc: tus upload metadata protocol header
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "Upload-Metadata"
- id: tus-js-client-name
  desc: tus-js-client package marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "tus-js-client"
- id: uppy-locale-export
  desc: Uppy locale export
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "window.Uppy.locales"
- id: uppy-upload-strings
  desc: Uppy upload locale strings
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "dropPasteImportFiles"
- id: uppy-browser-bundle-marker
  desc: Uppy browser bundle marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "socket.io-client"
- id: uppy-global-export
  desc: Uppy browser global export
  crit: component
  conf: 0.98
  if:
    type: text
    substr: ".Uppy=e()"

composite_rules:
- id: tus-js-client-bundle
  desc: tus-js-client resumable upload runtime
  crit: baseline
  conf: 0.98
  all:
  - id: tus-resumable-header
  - id: tus-upload-offset-header
  any:
  - id: tus-upload-metadata-header
  - id: tus-js-client-name
- id: uppy-i18n-bundle
  desc: Uppy internationalization bundle
  crit: baseline
  conf: 0.98
  all:
  - id: uppy-locale-export
  - id: uppy-upload-strings
- id: uppy-browser-bundle
  desc: Uppy browser bundle
  crit: baseline
  conf: 0.96
  all:
  - id: uppy-browser-bundle-marker
  - id: uppy-global-export
