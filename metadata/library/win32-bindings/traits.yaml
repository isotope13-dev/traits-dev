defaults:
  platforms: [windows]
  for: [python]
  crit: notable
  conf: 0.96
  size_min: 1
  size_max: 2000000

traits:
  - id: win32more-generated-binding-path
    desc: win32more generated Win32 binding path
    if:
      type: path
      regex: 'win32more[\\/]Windows[\\/]Win32'

  - id: win32more-generated-module
    desc: win32more generated Win32 binding module
    if:
      type: text
      substr: _win32more.Windows.Win32

composite_rules:
  - id: win32more-generated-bindings
    desc: win32more generated Win32 API bindings
    crit: notable
    conf: 0.96
    any:
      - id: win32more-generated-binding-path
      - id: win32more-generated-module
