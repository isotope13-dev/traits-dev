defaults:
  platforms: [windows, unix]
  for: [pe, dll, macho, dylib, elf, so]
  crit: baseline
  conf: 0.95

traits:
  - id: qt5-core-binary
    desc: Qt5 Core runtime binary
    if:
      type: basename
      regex: '(?i)^Qt5Core\.(dll|so|dylib)$'

  - id: qt5-network-binary
    desc: Qt5 Network runtime binary
    if:
      type: basename
      regex: '(?i)^Qt5Network\.(dll|so|dylib)$'

  - id: qt5-gui-binary
    desc: Qt5 GUI runtime binary
    if:
      type: basename
      regex: '(?i)^Qt5Gui\.(dll|so|dylib)$'

  - id: qt5-widgets-binary
    desc: Qt5 Widgets runtime binary
    if:
      type: basename
      regex: '(?i)^Qt5Widgets\.(dll|so|dylib)$'

  - id: qt-plugin-path
    desc: Qt plugin path marker
    if:
      type: text
      section: .rdata
      regex: 'plugins[\\/](platforms|imageformats|styles)[\\/]q[a-z0-9_-]+\.dll'

  - id: qt-platform-plugin-binary
    desc: Qt platform plugin binary
    if:
      type: basename
      regex: '(?i)^q(windows|windowsvistastyle)\.dll$'

  - id: qt-vector-plugin-binary
    desc: Qt vector image plugin binary
    if:
      type: basename
      regex: '(?i)^q(svgicon|svg)\.dll$'

  - id: qt-raster-plugin-binary
    desc: Qt raster image plugin binary
    if:
      type: basename
      regex: '(?i)^q(gif|icns|ico|jpeg)\.dll$'

  - id: qt-extra-image-plugin-binary
    desc: Qt extra image plugin binary
    if:
      type: basename
      regex: '(?i)^q(tga|tiff|wbmp|webp)\.dll$'
