defaults:
  platforms: [windows, unix]
  for: [pe, dll, macho, dylib, elf, so]
  crit: baseline
  conf: 0.95

traits:
  - id: pyqt-binding-path
    desc: PyQt binding package member
    if:
      type: path
      regex: '(^|[\\/])PyQt[56][\\/]'
  - id: qt-framework-bundle-id-core
    desc: 'Qt framework bundle ID'
    if:
      type: text
      regex: 'org\.qt-project\.Qt(Core|Gui|Network|PrintSupport)'
      section: .text
  - id: qt-framework-bundle-id-extra
    desc: "Qt framework bundle ID (Svg/Widgets/Xml)"
    if:
      type: text
      regex: 'org\.qt-project\.Qt(Svg|Widgets|Xml)'
      section: .text
  - id: qt-qmake-generator
    desc: Qt/QMake generator string
    if:
      type: text
      substr: "Created by Qt/QMake"
      section: .text
  - id: qt5-core-binary
    desc: Qt5 Core runtime binary
    if:
      type: path
      basename: true
      regex: '(?i)^Qt5Core\.(dll|so|dylib)$'

  - id: qt5-network-binary
    desc: Qt5 Network runtime binary
    if:
      type: path
      basename: true
      regex: '(?i)^Qt5Network\.(dll|so|dylib)$'

  - id: qt5-gui-binary
    desc: Qt5 GUI runtime binary
    if:
      type: path
      basename: true
      regex: '(?i)^Qt5Gui\.(dll|so|dylib)$'

  - id: qt5-widgets-binary
    desc: Qt5 Widgets runtime binary
    if:
      type: path
      basename: true
      regex: '(?i)^Qt5Widgets\.(dll|so|dylib)$'

  - id: qt-plugin-path
    desc: Qt plugin path marker
    if:
      type: text
      section: .rdata
      regex: 'plugins[\\/](platforms|imageformats|styles)[\\/]q[a-z0-9_-]+\.dll'

  - id: qt-platform-plugin-binary
    desc: Qt platform plugin binary
    if:
      type: path
      basename: true
      regex: '(?i)^q(windows|windowsvistastyle)\.dll$'

  - id: qt-vector-plugin-binary
    desc: Qt vector image plugin binary
    if:
      type: path
      basename: true
      regex: '(?i)^q(svgicon|svg)\.dll$'

  - id: qt-raster-plugin-binary
    desc: Qt raster image plugin binary
    if:
      type: path
      basename: true
      regex: '(?i)^q(gif|icns|ico|jpeg)\.dll$'

  - id: qt-extra-image-plugin-binary
    desc: Qt extra image plugin binary
    if:
      type: path
      basename: true
      regex: '(?i)^q(tga|tiff|wbmp|webp)\.dll$'
  - id: qt-cpp-rtti-symbols
    desc: Qt MSVC RTTI symbols
    for: [pe, dll]
    if:
      type: text
      regex: '(@QV4@@|AVQQml[A-Za-z_]+@@)'
      section: .rdata
