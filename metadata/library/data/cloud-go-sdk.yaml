defaults:
  platforms: [windows, unix]
  for: [go, python, javascript, pe, elf]
traits:
  - id: aws-go-sdk
    desc: AWS Go SDK marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: github.com/aws/aws-sdk-go
  - id: aws-go-sdk-v2
    desc: AWS Go SDK v2 marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: github.com/aws/aws-sdk-go-v2/
  - id: smithy-go-sdk
    desc: Smithy Go marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: github.com/aws/smithy-go
  - id: gcp-go-sdk
    desc: GCP Go SDK marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: cloud.google.com/go/
  - id: azure-go-sdk
    desc: Azure Go SDK marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: github.com/Azure/azure-sdk-for-go/
composite_rules:
  - id: go-cloud-sdk-marker
    desc: Go cloud SDK marker
    crit: baseline
    conf: 0.95
    any:
      - id: aws-go-sdk
      - id: aws-go-sdk-v2
      - id: smithy-go-sdk
      - id: gcp-go-sdk
      - id: azure-go-sdk
  - id: gcp-oauth-client-marker
    desc: GCP OAuth client library marker
    crit: baseline
    conf: 0.92
    all:
      - id: metadata/file/string/cloud::gcp-default-credentials
      - id: micro-behaviors/communications/http/oauth::oauth-protocol-reference
      - id: micro-behaviors/communications/http/oauth::refresh-token
