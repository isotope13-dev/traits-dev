defaults:
  platforms: [unix, windows]
traits:
  - id: rust-object-store-crate
    desc: Rust object_store crate
    crit: baseline
    conf: 0.95
    for: [binaries]
    if:
      type: text
      regex: '[/\\]object_store-\d+\.\d+\.\d+[/\\]src[/\\]'
  - id: rust-object-store-cloud-provider
    desc: Rust object_store cloud provider
    crit: baseline
    conf: 0.95
    for: [binaries]
    if:
      type: text
      regex: '[/\\]object_store-\d+\.\d+\.\d+[/\\]src[/\\](aws|azure|gcp)[/\\]'
  - id: rust-aws-config-crate
    desc: Rust aws-config crate
    crit: baseline
    conf: 0.95
    for: [binaries]
    if:
      type: text
      regex: '[/\\]aws-config-\d+\.\d+\.\d+[/\\]src[/\\]'
  - id: rust-keyring-secret-service
    desc: Rust keyring Secret Service backend
    crit: baseline
    conf: 0.96
    for: [binaries]
    if:
      type: text
      regex: '[/\\]keyring-\d+\.\d+\.\d+[/\\]src[/\\]secret_service\.rs'
  - id: lance-language-model-downloader-title
    desc: Lance language model downloader title
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: literal
      exact: Lance tokenizer language model downloader
  - id: lance-language-model-home
    desc: Lance language model home marker
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: literal
      substr: LANCE_LANGUAGE_MODEL_HOME=
  - id: lance-lindera-build-command
    desc: Lance Lindera build command
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: literal
      substr: --dictionary-kind=
  - id: lance-jieba-dictionary-url
    desc: Lance Jieba dictionary URL
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: literal
      exact: https://github.com/messense/jieba-rs/raw/refs/heads/main/src/data/dict.txt
  - id: js-varint-codec-preencode
    desc: JavaScript varint preencode helper
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: function preencode(state, num)
  - id: js-varint-codec-bounds
    desc: JavaScript varint bounds checks
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: Out of bounds
  - id: js-varint-codec-byte-mask
    desc: JavaScript varint byte mask constants
    crit: component
    conf: 0.85
    for: [javascript]
    if:
      type: text
      regex: '0x10000[\s\S]{0,999}0xff'
  - id: aws-sdk-js-v3-bundle
    desc: AWS SDK JS v3 bundle
    crit: baseline
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '@aws-sdk/(client-sts|credential-provider|signature-v4)'
  - id: parcel-watcher-native-loader
    desc: Parcel watcher native loader
    crit: baseline
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: '@parcel/watcher-${process.platform}-${process.arch}'
composite_rules:
  - id: rust-cloud-object-store-sdk
    desc: Rust cloud object store SDK context
    crit: baseline
    conf: 0.98
    for: [binaries]
    all:
      - id: rust-object-store-crate
    any:
      - id: rust-object-store-cloud-provider
      - id: rust-aws-config-crate
  - id: lance-language-model-downloader
    desc: Lance tokenizer model downloader
    crit: baseline
    conf: 0.99
    for: [python]
    all:
      - id: lance-language-model-downloader-title
      - id: lance-language-model-home
    any:
      - id: lance-lindera-build-command
      - id: lance-jieba-dictionary-url
  - id: js-varint-codec
    desc: JavaScript varint codec implementation
    crit: baseline
    conf: 0.95
    for: [javascript]
    all:
      - id: js-varint-codec-preencode
      - id: js-varint-codec-bounds
      - id: js-varint-codec-byte-mask
