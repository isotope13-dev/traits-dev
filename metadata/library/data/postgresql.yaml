# PostgreSQL library and tool detection
defaults:
  for: [ruby, shell, python, javascript]
  platforms: [unix, windows]
traits:
  - id: wal-shipper-header
    desc: PostgreSQL WAL shipper script header
    crit: baseline
    if:
      type: text
      substr: "PostgreSQL WAL files shipping"
  - id: wal-shipper-config
    desc: PostgreSQL WAL shipper configuration
    crit: baseline
    if:
      type: text
      substr: "archive_command = '/path/to/postgres_home/bin/wal_shipper.rb %p'"
  - id: psql-implementation-path
    desc: Embedded psql implementation path
    crit: component
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|[\\/!])package[\\/]psql[\\/]'
  - id: psql-sql-help-table
    desc: PostgreSQL psql SQL help table
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: "SQL command help data for `\\h`"
  - id: postgresql-libpq-tls-client
    desc: PostgreSQL libpq TLS client implementation
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?s)\blibpq\b.{0,400}\b(sslmode|sslrootcert|SSLRequest|checkServerIdentity)\b'
