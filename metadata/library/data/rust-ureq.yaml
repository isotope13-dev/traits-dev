# Source-path markers for the benign Rust `ureq` HTTP client crate (v2.12.1).
# These strings appear in any Rust binary that statically links ureq; they are
# library provenance, not malicious indicators. Family composites reference
# them cross-dir alongside a malicious anchor.
defaults:
  platforms: [windows, unix]
  for: [binaries]
  size_min: 512
  size_max: 500000000
traits:
  - id: ureq-body-rs
    desc: ureq-2.12.1/src/body.rs source path
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: ureq-2.12.1/src/body.rs
      section: .text
  - id: ureq-chunked-decoder-rs
    desc: ureq-2.12.1/src/chunked/decoder.rs source path
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: ureq-2.12.1/src/chunked/decoder.rs
      section: .text
  - id: ureq-pool-rs
    desc: ureq-2.12.1/src/pool.rs source path
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: ureq-2.12.1/src/pool.rs
      section: .text
