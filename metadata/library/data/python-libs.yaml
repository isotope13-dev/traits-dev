defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: tqdm-progress-import
    desc: tqdm progress library import
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(from tqdm[. ]|import tqdm[. \n])'
  - id: git-module-import
    desc: GitPython module import
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: \b(from|import)\s+git\b
  - id: vendored-python-library-source
    desc: Vendored Python library source
    crit: baseline
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/])(static_dependencies|_vendor|vendor)[\\/]'
