defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: tqdm-progress-import
    desc: tqdm progress library import
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(from tqdm[. ]|import tqdm[. \n])'
  - id: git-module-import
    desc: GitPython module import
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: \b(from|import)\s+git\b
  - id: vendored-python-library-source
    desc: Vendored Python library source
    crit: baseline
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/])(static_dependencies|_vendor|vendor)[\\/]'
  - id: distlib-package-index
    desc: Python distlib package index
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: 'class\s+PackageIndex\(Environment\)'
  - id: pycryptodome-source
    desc: PyCryptodome library source
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'site-packages[\\/](Crypto|Cryptodome)[\\/]'
  - id: pycryptodome-selftest
    desc: PyCryptodome self-test source
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(Crypto|Cryptodome)[\\/]SelfTest[\\/]'
  - id: paramiko-source
    desc: Paramiko SSH library source
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'site-packages[\\/]paramiko[\\/]'
  - id: pillow-source
    desc: Pillow imaging library source
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'site-packages[\\/]PIL[\\/]'
  - id: websocket-client-source
    desc: websocket-client library source
    crit: baseline
    conf: 0.96
    if:
      type: path
      regex: 'site-packages[\\/]websocket[\\/]'
  - id: cryptography-binding
    desc: Python cryptography native binding
    crit: baseline
    conf: 0.96
    for: [python, pe, dll]
    if:
      type: path
      regex: 'cryptography[\\/]hazmat[\\/]bindings'
  - id: idna-generated-data
    desc: idna generated data table
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: This file is automatically generated by tools/idna-data
  - id: pycparser-generated-yacctab
    desc: pycparser generated parser table
    crit: baseline
    conf: 0.98
    if:
      type: basename
      exact: yacctab.py
  - id: jaraco-text-foldedcase
    desc: jaraco.text FoldedCase source
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: 'class FoldedCase(str):'
  - id: charset-encoding-table-json-a
    desc: Character encoding table JSON
    crit: baseline
    conf: 0.9
    for: [json]
    if:
      type: basename
      regex: '^(big5-added|cp936|cp949|cp950|eucjp)\\.json$'
  - id: charset-encoding-table-json-b
    desc: Character encoding table JSON
    crit: baseline
    conf: 0.9
    for: [json]
    if:
      type: basename
      regex: '^(gb18030-ranges|gbk-added|shiftjis|empty-inline-table)\\.json$'
  - id: codec-test-data-text-a
    desc: Codec conversion test data
    crit: baseline
    conf: 0.9
    for: [text]
    if:
      type: basename
      regex: '^(big5|big5hkscs|cp949|euc_jp|euc_kr)(-utf8)?\\.txt$'
  - id: codec-test-data-text-b
    desc: Codec conversion test data
    crit: baseline
    conf: 0.9
    for: [text]
    if:
      type: basename
      regex: '^(gb18030|gb2312|gbk|hz|johab)(-utf8)?\\.txt$'
  - id: codec-test-data-text-c
    desc: Codec conversion test data
    crit: baseline
    conf: 0.9
    for: [text]
    if:
      type: basename
      regex: '^(iso2022_jp|iso2022_kr|shift_jis)(-utf8)?\\.txt$'
  - id: codec-test-data-text-d
    desc: Codec conversion test data
    crit: baseline
    conf: 0.9
    for: [text]
    if:
      type: basename
      regex: '^(euc_jisx0213|shift_jisx0213)(-utf8)?\\.txt$'
