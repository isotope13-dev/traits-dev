defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: botocore-lib
    desc: botocore library detected
    crit: baseline
    if:
      type: text
      substr: botocore
      section: .text
  # Python-source identification (the wheel/sdist, not a compiled binary).
  # botocore/boto3 source files carry the Amazon Apache per-file copyright
  # header AND import from the botocore/boto3 namespace. Requiring BOTH
  # identifies SDK-internal files — a credential stealer that merely imports
  # botocore would not also ship Amazon's per-file copyright header — so the
  # composite is a safe `unless:` context for the official AWS Python SDK's
  # legitimate `.aws` / credential-file references.
  - id: amazon-sdk-copyright
    desc: Amazon source copyright header
    crit: baseline
    for: [python]
    if:
      type: text
      substr: 'Amazon.com, Inc. or its affiliates'
  - id: botocore-namespace-import
    desc: botocore/boto3 namespace import
    crit: baseline
    for: [python]
    if:
      type: text
      regex: '(?m)^\s*(from|import)\s+(botocore|boto3)\b'
  - id: botocore-internal-import
    # Dot-qualified internal submodule import (`from botocore.compat import`,
    # `import botocore.awsrequest`). Characteristic of SDK-internal files —
    # several botocore modules (e.g. httpsession.py) carry no copyright
    # header, so the header+import composite alone misses them.
    desc: botocore internal submodule import
    crit: baseline
    for: [python]
    if:
      type: text
      regex: '(?m)^\s*(from|import)\s+botocore\.[a-z_]'
composite_rules:
  - id: aws-sdk-header-and-import
    desc: AWS SDK source header and namespace import
    crit: baseline
    for: [python]
    all:
      - id: amazon-sdk-copyright
      - id: botocore-namespace-import
  - id: aws-python-sdk-source
    desc: Official AWS Python SDK source (botocore/boto3)
    crit: baseline
    for: [python]
    any:
      - id: aws-sdk-header-and-import
      - id: botocore-internal-import
