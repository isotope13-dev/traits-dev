# Embedded Public Suffix List / effective-TLD data (psl, tldts, tough-cookie,
# publicsuffix, browser eTLD tables). Bundled by browsers, cookie libraries,
# URL parsers, and password managers to compute the registrable domain. It
# contains EVERY hosting, tunnel, IPFS-gateway, and dynamic-DNS suffix, so
# single-domain C2/tunnel substring matchers false-positive on it. Used as an
# `unless:` context. Requires several PSL-only suffixes co-occurring so it only
# fires on a genuine embedded list, not an incidental mention.
defaults:
  platforms: [unix, windows]
  for: [javascript, python, ruby, php]
  size_min: 16384
traits:
  - id: mozilla-public-suffix-list-path
    desc: Mozilla public suffix list path
    crit: component
    conf: 0.95
    for: [text, data]
    if:
      type: path
      basename: true
      exact: 'public-suffix-list.txt'
  - id: publicsuffix-org-list-header
    desc: Publicsuffix.org list header
    crit: component
    conf: 0.95
    for: [text, data]
    if:
      type: text
      substr: publicsuffix.org/list/public_suffix_list.dat
  - id: psl-herokuapp
    desc: Public suffix herokuapp.com
    crit: component
    conf: 0.9
    if:
      type: text
      substr: herokuapp.com
  - id: psl-github-io
    desc: Public suffix github.io
    crit: component
    conf: 0.9
    if:
      type: text
      substr: github.io
  - id: psl-netlify-app
    desc: Public suffix netlify.app
    crit: component
    conf: 0.9
    if:
      type: text
      substr: netlify.app
  - id: psl-nfshost
    desc: Public suffix nfshost.com
    crit: component
    conf: 0.9
    if:
      type: text
      substr: nfshost.com
  - id: psl-readthedocs
    desc: Public suffix readthedocs.io
    crit: component
    conf: 0.9
    if:
      type: text
      substr: readthedocs.io
  - id: psl-cloudfront
    desc: Public suffix cloudfront.net
    crit: component
    conf: 0.9
    if:
      type: text
      substr: cloudfront.net
  - id: psl-azurewebsites
    desc: Public suffix azurewebsites.net
    crit: component
    conf: 0.9
    if:
      type: text
      substr: azurewebsites.net
composite_rules:
  - id: public-suffix-list-content
    desc: Embedded public suffix list content
    crit: component
    conf: 0.95
    needs: 4
    any:
      - id: psl-herokuapp
      - id: psl-github-io
      - id: psl-netlify-app
      - id: psl-nfshost
      - id: psl-readthedocs
      - id: psl-cloudfront
      - id: psl-azurewebsites
  - id: public-suffix-list
    desc: Embedded public suffix list
    crit: component
    conf: 0.95
    any:
      - id: mozilla-public-suffix-list-path
      - id: publicsuffix-org-list-header
      - id: public-suffix-list-content
