# Neutral benign-app / vendor identity strings embedded in binaries, used as
# FP-suppression context by other rules (referenced cross-directory).
defaults:
  platforms: [windows, unix]
  for: [binaries]
  size_min: 512
  size_max: 500000000
  crit: baseline
traits:
  - id: overwolf-vendor-string
    desc: Overwolf Ltd vendor string (Overwolf gaming-overlay platform)
    if:
      type: text
      substr: Overwolf Ltd
