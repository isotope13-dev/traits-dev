defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: msys2-runtime-basename
    desc: MSYS2 POSIX runtime DLL basename
    crit: notable
    conf: 0.99
    if:
      type: basename
      exact: msys-2.0.dll

  - id: msys2-runtime-description
    desc: MSYS2 POSIX emulation description
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.description
      exact: Cygwin POSIX Emulation DLL

  - id: msys2-runtime-product
    desc: MSYS2 product version identity
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.product_name
      exact: MSYS2

composite_rules:
  - id: msys2-runtime
    desc: MSYS2 POSIX emulation runtime
    crit: notable
    conf: 0.99
    all:
      - id: msys2-runtime-basename
      - id: msys2-runtime-description
      - id: msys2-runtime-product
