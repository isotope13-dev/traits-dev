defaults:
  platforms: [unix, windows]
  for: [pe, elf, macho]
traits:
  - id: polars-plugin
    desc: Polars data analysis plugin
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: polars-io
      section: .rdata
  - id: polars-basename
    desc: Polars basename
    crit: baseline
    if:
      type: basename
      regex: polars
