defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: axios-class
    desc: Axios class identifiers
    crit: baseline
    conf: 0.95
    if:
      type: string_literal
      substr: AxiosError
  - id: axios-version
    desc: Axios version string
    crit: baseline
    conf: 0.95
    if:
      type: string_literal
      regex: \[Axios v[0-9]
