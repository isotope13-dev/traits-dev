defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]

traits:
  - id: vscode-webview-bundle
    desc: VS Code webview runtime bundle
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "vscode-webview"
  - id: acquire-vscode-api
    desc: VS Code webview acquireVsCodeApi handle
    crit: baseline
    conf: 0.97
    if:
      type: text
      substr: "acquireVsCodeApi"
