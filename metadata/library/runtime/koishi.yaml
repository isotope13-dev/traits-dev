defaults:
  platforms: [windows, unix]
traits:
  - id: koishi-runtime-import
    desc: Imports Koishi runtime library
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: 'require\(["'']koishi["'']\)|from\s+["'']koishi["'']'
  - id: koishi-peer-dependency
    desc: Declares Koishi peer dependency
    crit: baseline
    conf: 0.95
    for: [package.json]
    if:
      type: value
      path: peerDependencies.koishi
      regex: '^[\^~><=]*4\.'
  - id: koishi-preview-flag
    desc: Marks package as Koishi preview
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: text
      regex: '"koishi"\s*:\s*\{[^}]{0,80}"preview"\s*:\s*true'
  - id: koishi-plugin-entry-layout
    desc: Uses standard Koishi plugin entrypoints
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: text
      regex: '"main"\s*:\s*"lib/index\.js".{0,160}"typings"\s*:\s*"lib/index\.d\.ts"'
  - id: package-empty-scripts-object
    desc: Declares empty npm scripts object
    crit: notable
    conf: 0.85
    for: [package.json]
    if:
      type: text
      regex: '"scripts"\s*:\s*\{\s*\}'
composite_rules:
  - id: koishi-plugin-package-shape
    desc: Package has standard Koishi plugin shape
    crit: notable
    conf: 0.93
    all:
      - id: koishi-peer-dependency
      - id: koishi-plugin-entry-layout
    any:
      - id: koishi-preview-flag
      - id: package-empty-scripts-object
