defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.94

traits:
  - id: jabswitch-cli-banner
    desc: Java Access Bridge switch command banner
    if:
      type: text
      substr: jabswitch [/enable | /disable | /version | /?]
      section: .rdata

  - id: access-bridge-config-line
    desc: Java Access Bridge assistive technology config
    if:
      type: text
      substr: assistive_technologies=com.sun.java.accessibility.AccessBridge
      section: .rdata

  - id: oracle-javaaccessbridge-key
    desc: Oracle Java Access Bridge registry key
    if:
      type: text
      exact: oracle_javaaccessbridge
      section: .rdata

  - id: accessbridge-pdb-path
    desc: Java Access Bridge switch PDB path
    crit: component
    if:
      type: text
      substr: jabswitch\jabswitch.pdb
      section: .rdata
