defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: cmd-proto-command
    desc: Command.prototype.command symbol
    if:
      type: symbol
      exact: "Command.prototype.command"
  - id: cmd-proto-option
    desc: Command.prototype.option symbol
    if:
      type: symbol
      exact: "Command.prototype.option"
  - id: cmd-proto-parse
    desc: Command.prototype.parse symbol
    if:
      type: symbol
      exact: "Command.prototype.parse"
  - id: cmd-class-def-regex
    desc: Command class definition
    if:
      type: text
      regex: 'class\s+Command\s+extends\s+EventEmitter'
  - id: cmd-exports-regex
    desc: exports.Command assignment
    if:
      type: text
      regex: 'exports\.Command\s*=\s*Command'
  - id: commander-require
    desc: Requires commander library
    if:
      # require('commander') — match the module-name string arg, else this is a
      # bare-`require` duplicate of every other require-* trait.
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        substr: commander
composite_rules:
  - id: commander-legacy
    desc: Commander.js legacy prototype pattern
    crit: notable
    conf: 0.95
    all:
      - id: cmd-proto-command
      - id: cmd-proto-option
      - id: cmd-proto-parse
  - id: commander-modern
    desc: Commander.js class pattern
    crit: notable
    conf: 0.95
    all:
      - id: cmd-class-def-regex
      - id: cmd-exports-regex
  - id: commander
    desc: Commander.js CLI framework
    crit: notable
    conf: 0.95
    any:
      - id: commander-legacy
      - id: commander-modern
