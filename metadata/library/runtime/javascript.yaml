defaults:
  platforms: [windows, unix]
traits:
- id: js-module-exports
  desc: "JavaScript module exports"
  crit: baseline
  for: [javascript, typescript]
  if:
    type: text
    regex: 'module\.exports\s*=\s*(function|class|\{)'
- id: core-js-runtime-bundle
  desc: core-js runtime bundle
  crit: baseline
  conf: 0.98
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: literal
    kind: string
    exact: "__core-js_shared__"
- id: core-js-ie-proto-marker
  desc: core-js IE proto marker
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: "IE_PROTO"
- id: core-js-htmlfile-activex
  desc: core-js htmlfile fallback
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: 'ActiveXObject("htmlfile")'
- id: lean-intl-runtime-bundle
  desc: lean-intl runtime bundle
  crit: baseline
  conf: 0.98
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: "lean-intl"
- id: intl-polyfill-locale-data
  desc: Intl polyfill locale data
  crit: baseline
  conf: 0.96
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    regex: '(Intl\.DateTimeFormat|DateTimeFormat).{0,200}(timeZone|numberingSystem|localeData)'
- id: next-edge-runtime-marker
  desc: Next Edge Runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b(EdgeRuntime|edge-runtime)\b'
- id: ncc-webpack-runtime-marker--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: __nccwpck_require__
  count_max: 1002393
- id: ncc-webpack-runtime-marker--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: __webpack_modules__
  count_max: 1002394
composite_rules:
- id: core-js-htmlfile-fallback
  desc: core-js htmlfile fallback
  crit: baseline
  conf: 0.96
  all:
  - id: core-js-ie-proto-marker
  - id: core-js-htmlfile-activex
- id: next-edge-runtime-bundle
  desc: Bundled Next Edge Runtime
  crit: baseline
  conf: 0.98
  all:
  - id: next-edge-runtime-marker
  - id: ncc-webpack-runtime-marker
- id: ncc-webpack-runtime-marker
  desc: ncc webpack runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  any:
  - id: ncc-webpack-runtime-marker--rx-1
  - id: ncc-webpack-runtime-marker--rx-2
