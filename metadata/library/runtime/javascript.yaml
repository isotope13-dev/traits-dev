defaults:
  platforms: [windows, unix]
traits:
- id: js-module-exports
  desc: "JavaScript module exports"
  crit: baseline
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b(module\.exports\s*=\s*(function|class|\{)|exports\.[A-Za-z_$][A-Za-z0-9_$]*\s*=)'
- id: core-js-runtime-bundle
  desc: core-js runtime bundle
  crit: baseline
  conf: 0.98
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: literal
    kind: string
    exact: "__core-js_shared__"
- id: core-js-ie-proto-marker
  desc: core-js IE proto marker
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: "IE_PROTO"
- id: core-js-htmlfile-activex
  desc: core-js htmlfile fallback
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: 'ActiveXObject("htmlfile")'
- id: lean-intl-runtime-bundle
  desc: lean-intl runtime bundle
  crit: baseline
  conf: 0.98
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: "lean-intl"
- id: intl-polyfill-locale-data
  desc: Intl polyfill locale data
  crit: baseline
  conf: 0.96
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    regex: '(Intl\.DateTimeFormat|DateTimeFormat).{0,200}(timeZone|numberingSystem|localeData)'
- id: next-edge-runtime-marker
  desc: Next Edge Runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b(EdgeRuntime|edge-runtime)\b'
- id: browserify-crypto-bundle
  desc: Browserify crypto polyfill bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: 'crypto-browserify|browserify-aes|browserify-sign|public-encrypt'
- id: crypto-js-bundled-library
  desc: Bundled CryptoJS library
  crit: baseline
  conf: 0.97
  for: [javascript, typescript]
  if:
    type: text
    regex: '["'']crypto-js["'']|CryptoJS|\.AES\.encrypt\('
- id: libphonenumber-js-bundle
  desc: Bundled libphonenumber-js library
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "libphonenumber-js"
- id: js-base64-header
  desc: js-base64 library header
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "base64.js"
- id: js-base64-global-export
  desc: js-base64 global export
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "global.Base64"
- id: js-base64-version-marker
  desc: js-base64 version marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: 'version="2.4.9"'
- id: tus-resumable-header
  desc: tus resumable upload protocol header
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "Tus-Resumable"
- id: tus-upload-offset-header
  desc: tus upload offset protocol header
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "Upload-Offset"
- id: tus-upload-metadata-header
  desc: tus upload metadata protocol header
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "Upload-Metadata"
- id: tus-js-client-name
  desc: tus-js-client package marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "tus-js-client"
- id: uppy-locale-export
  desc: Uppy locale export
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "window.Uppy.locales"
- id: uppy-upload-strings
  desc: Uppy upload locale strings
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "dropPasteImportFiles"
- id: uppy-browser-bundle-marker
  desc: Uppy browser bundle marker
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "socket.io-client"
- id: socketio-client-import
  desc: socket.io-client library reference
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: string_literal
    exact: socket.io-client
- id: uppy-global-export
  desc: Uppy browser global export
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: ".Uppy=e()"
- id: fontawesome-free-header
  desc: Font Awesome Free header
  crit: baseline
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: text
    substr: "Font Awesome Free"
- id: shutter-reloaded-lightbox
  desc: Shutter Reloaded lightbox library
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "shutterReloaded"
- id: google-cse-search-marker
  desc: Google CSE search runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "google.search."
- id: google-loader-marker
  desc: Google loader runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "google.loader."
- id: google-uds-message-marker
  desc: Google UDS message marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "_UDS_MSG_"
- id: google-afs-csa-marker
  desc: Google AFS CSA runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "_googCsa"
- id: google-afs-host-marker
  desc: Google AFS host marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "afs.googlesyndication.com"
- id: google-afs-path-marker
  desc: Google AFS ads path marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "/afs/ads"
- id: ncc-webpack-runtime-marker--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: __nccwpck_require__
  count_max: 1002393
- id: ncc-webpack-runtime-marker--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: __webpack_modules__
  count_max: 1002394
- id: bootstrap-iconpicker-iconset
  desc: bootstrap-iconpicker iconset glyph-name list
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: 'iconClassFix:'
composite_rules:
- id: core-js-htmlfile-fallback
  desc: core-js htmlfile fallback
  crit: baseline
  conf: 0.96
  all:
  - id: core-js-ie-proto-marker
  - id: core-js-htmlfile-activex
- id: next-edge-runtime-bundle
  desc: Bundled Next Edge Runtime
  crit: baseline
  conf: 0.98
  all:
  - id: next-edge-runtime-marker
  - id: ncc-webpack-runtime-marker
- id: ncc-webpack-runtime-marker
  desc: ncc webpack runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  any:
  - id: ncc-webpack-runtime-marker--rx-1
  - id: ncc-webpack-runtime-marker--rx-2
- id: js-base64-library
  desc: js-base64 runtime library
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  any:
  - id: js-base64-header
  - id: js-base64-global-export
  - id: js-base64-version-marker
  needs: 2
- id: tus-js-client-bundle
  desc: tus-js-client resumable upload runtime
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: tus-resumable-header
  - id: tus-upload-offset-header
  any:
  - id: tus-upload-metadata-header
  - id: tus-js-client-name
- id: uppy-i18n-bundle
  desc: Uppy internationalization bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: uppy-locale-export
  - id: uppy-upload-strings
- id: uppy-browser-bundle
  desc: Uppy browser bundle
  crit: baseline
  conf: 0.96
  for: [javascript, typescript]
  all:
  - id: uppy-browser-bundle-marker
  - id: uppy-global-export
- id: google-cse-runtime-bundle
  desc: Google CSE runtime bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: google-cse-search-marker
  - id: google-loader-marker
  - id: google-uds-message-marker
- id: google-afs-runtime-bundle
  desc: Google AFS ads runtime bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: google-afs-csa-marker
  - id: google-afs-host-marker
  - id: google-afs-path-marker
- id: google-web-runtime-bundle
  desc: Google web runtime bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  any:
  - id: google-cse-runtime-bundle
  - id: google-afs-runtime-bundle
