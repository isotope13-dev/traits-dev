defaults:
  platforms: [windows, unix]
traits:
- id: js-module-exports
  desc: Exports a JavaScript module
  crit: baseline
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b(module\.exports\s*=\s*(function|class|\{)|exports\.[A-Za-z_$][A-Za-z0-9_$]*\s*=)'
- id: has-eventemitter
  desc: Code uses EventEmitter pattern
  crit: baseline
  conf: 0.8
  for: [javascript, typescript]
  unless:
  - type: text
    substr: this._internalee = new EventEmitter();
  - type: text
    substr: process.stdin = new EventEmitter()
  - type: text
    substr: extends EventEmitter
  - type: text
    substr: '@Output()'
  - type: text
    substr: new EventEmitter<
  if:
    type: text
    regex: extends\s+EventEmitter|new\s+EventEmitter\b
- id: core-js-runtime-bundle
  desc: core-js runtime bundle
  crit: baseline
  conf: 0.98
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: literal
    kind: string
    exact: "__core-js_shared__"
- id: core-js-ie-proto-marker
  desc: core-js legacy IE prototype fallback
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: "IE_PROTO"
- id: core-js-htmlfile-activex
  desc: core-js htmlfile fallback
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: 'ActiveXObject("htmlfile")'
- id: lean-intl-runtime-bundle
  desc: lean-intl runtime bundle
  crit: baseline
  conf: 0.98
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    substr: "lean-intl"
- id: intl-polyfill-locale-data
  desc: Intl polyfill locale data
  crit: baseline
  conf: 0.96
  platforms: [windows, linux, macos]
  for: [javascript, typescript]
  if:
    type: text
    regex: '(Intl\.DateTimeFormat|DateTimeFormat).{0,200}(timeZone|numberingSystem|localeData)'
- id: next-edge-runtime-marker
  desc: Next Edge Runtime marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b(EdgeRuntime|edge-runtime)\b'
- id: browserify-crypto-bundle
  desc: Browserify crypto polyfill bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: 'crypto-browserify|browserify-aes|browserify-sign|public-encrypt'
- id: crypto-js-bundled-library
  desc: Bundled CryptoJS library
  crit: baseline
  conf: 0.97
  for: [javascript, typescript]
  if:
    type: text
    regex: '["'']crypto-js["'']|CryptoJS|\.AES\.encrypt\('
- id: msal-browser-oauth-runtime
  desc: MSAL browser OAuth runtime bundle
  crit: baseline
  conf: 0.97
  for: [javascript, typescript]
  if:
    type: text
    substr: msal.db
- id: websharper-runtime-marker
  desc: WebSharper JavaScript runtime marker
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: globalThis.WebSharperRuntime
- id: capacitor-runtime-import
  desc: Capacitor runtime import
  crit: baseline
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: text
    substr: "@capacitor/"
- id: okta-auth-library-import
  desc: Okta auth library import
  crit: baseline
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: literal
    kind: string
    regex: '^@okta/okta-(angular|auth-js)$'
- id: stripe-js-library-import
  desc: Stripe JS library import
  crit: baseline
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: literal
    kind: string
    exact: "@stripe/stripe-js"
- id: keycloak-url-reference
  desc: Keycloak URL reference
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: 'https?://.{1,120}/realms/[A-Za-z0-9_.-]+'
- id: openremote-runtime-name
  desc: OpenRemote runtime identifier
  crit: notable
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: literal
    kind: string
    exact: openremote
- id: openremote-keycloak-mode
  desc: OpenRemote Keycloak auth mode
  crit: notable
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: literal
    kind: string
    exact: KEYCLOAK
- id: libphonenumber-js-bundle
  desc: Bundled libphonenumber-js library
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "libphonenumber-js"
- id: js-base64-header
  desc: js-base64 library header
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "base64.js"
- id: js-base64-global-export
  desc: js-base64 global export
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "global.Base64"
- id: js-base64-version-marker
  desc: js-base64 version marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: 'version="2.4.9"'
- id: socketio-client-import
  desc: socket.io-client library reference
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: string_literal
    exact: socket.io-client
- id: fontawesome-free-header
  desc: Font Awesome Free header
  crit: baseline
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: text
    substr: "Font Awesome Free"
- id: shutter-reloaded-lightbox
  desc: Shutter Reloaded lightbox library
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "shutterReloaded"
- id: bootstrap-iconpicker-iconset
  desc: bootstrap-iconpicker iconset glyph-name list
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: 'iconClassFix:'
- id: bootstrap-transition-plugin
  desc: Bootstrap transition plugin JavaScript
  crit: baseline
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: '$.fn.emulateTransitionEnd'
composite_rules:
- id: core-js-htmlfile-fallback
  desc: core-js htmlfile fallback
  crit: baseline
  conf: 0.96
  all:
  - id: core-js-ie-proto-marker
  - id: core-js-htmlfile-activex
- id: next-edge-runtime-bundle
  desc: Bundled Next Edge Runtime
  crit: baseline
  conf: 0.98
  all:
  - id: next-edge-runtime-marker
  - id: metadata/build/bundler::ncc-runtime-loader-identifier
- id: js-base64-library
  desc: js-base64 runtime library
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  any:
  - id: js-base64-header
  - id: js-base64-global-export
  - id: js-base64-version-marker
  needs: 2
- id: google-cse-runtime-bundle
  desc: Google CSE runtime bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: metadata/library/google-runtime::google-cse-search-marker
  - id: metadata/library/google-runtime::google-loader-marker
  - id: metadata/library/google-runtime::google-uds-message-marker
- id: google-afs-runtime-bundle
  desc: Google AFS ads runtime bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: metadata/library/google-runtime::google-afs-csa-marker
  - id: metadata/library/google-runtime::google-afs-host-marker
  - id: metadata/library/google-runtime::google-afs-path-marker
- id: google-web-runtime-bundle
  desc: Google web runtime bundle
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  any:
  - id: google-cse-runtime-bundle
  - id: google-afs-runtime-bundle
