defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: ajax-observable
    desc: RxJS AjaxObservable
    crit: baseline
    conf: 1.0
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: AjaxObservable
  - id: generic
    desc: RxJS library
    crit: baseline
    conf: 1.0
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: 'RxJS: Back to a better error behavior'
  - id: rxjs-websocket-constructor-error
    desc: RxJS WebSocket constructor error marker
    crit: baseline
    conf: 1.0
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: no WebSocket constructor can be found
  - id: rxjs-cold-observable-offset-error
    desc: RxJS cold observable offset error marker
    crit: baseline
    conf: 1.0
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: cold observable cannot have subscription offset
composite_rules:
  - id: generic-rxjs
    desc: RxJS library
    crit: baseline
    conf: 1.0
    any:
      - id: generic
      - id: rxjs-websocket-constructor-error
      - id: rxjs-cold-observable-offset-error
