defaults:
  platforms: [windows, linux, macos]

traits:
  - id: embedded-signature-bootstrap
    desc: Shiboken embedded signature bootstrap
    crit: baseline
    conf: 0.95
    for: [python]
    if:
      type: text
      substr: "signature_bootstrap.py"
  - id: embeddable-zip-importer
    desc: Shiboken embeddable ZIP importer
    crit: baseline
    conf: 0.95
    for: [python]
    if:
      type: text
      substr: "EmbeddableZipImporter"
composite_rules:
  - id: shiboken-embedded-support-loader
    desc: Shiboken embedded support loader
    crit: baseline
    conf: 0.95
    all:
      - id: embedded-signature-bootstrap
      - id: embeddable-zip-importer
