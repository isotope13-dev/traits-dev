# Self-contained Python scripts that bundle their dependencies inline as
# base64+zlib blobs and decode them at startup (e.g. stickytape, pymolcas).
# The bundler scaffolds each decoded module into sys.modules via
# types.ModuleType — a malicious packer typically exec()s a single blob
# without registering it as a real module.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
- id: bundled-modules-list-marker
  desc: Top-level "modules = [" bundle list
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?m)^modules\s*=\s*\['
- id: bundled-types-moduletype
  desc: types.ModuleType module construction
  crit: component
  conf: 0.95
  if:
    type: text
    substr: types.ModuleType(
- id: bundled-sys-modules-register
  desc: Decoded module registered in sys.modules
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'sys\.modules\[\w+\]\s*=\s*module\b'
composite_rules:
- id: python-bundled-modules-loader
  desc: Self-contained Python script with bundled modules
  crit: baseline
  conf: 0.95
  all:
  - id: bundled-modules-list-marker
  - id: bundled-types-moduletype
  - id: bundled-sys-modules-register
- id: python-benign-loader-context
  desc: Known benign Python loader context
  crit: baseline
  conf: 0.95
  any:
  - id: metadata/file/extension/identity::python-type-stub-extension
  - id: metadata/library/python-stdlib
  - id: metadata/library/runtime::shiboken-embedded-support-loader
  - id: python-bundled-modules-loader
  - id: python-bundler-exporter-template
  - id: metadata/library/versioneer::embedded-source-wrapper
- id: python-bundler-exporter-template
  desc: exec/zlib/base64 loader as string template
  crit: component
  conf: 0.92
  all:
  - id: micro-behaviors/data/decode/base64::b64decode-call
  - id: micro-behaviors/data/compress/library::zlib-decompress-symbol
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  near_bytes: 4096
