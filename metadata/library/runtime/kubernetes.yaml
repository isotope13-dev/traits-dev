defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: kubernetes-example-or-operator-path
    desc: Kubernetes example or operator path
    crit: baseline
    conf: 0.9
    for: [shell, go]
    if:
      type: path
      regex: '(^|[\\/])(examples?|samples?|helmchart-samples|operator)[\\/]'
  - id: kubernetes-incluster-client-text
    desc: Kubernetes in-cluster client text
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: 'kubernetes\.default\.svc|KUBERNETES_SERVICE_HOST'
composite_rules:
  - id: legitimate-kubernetes-incluster-client-marker
    desc: Kubernetes in-cluster client context
    crit: baseline
    conf: 0.93
    any:
      - id: kubernetes-example-or-operator-path
      - id: kubernetes-incluster-client-text
