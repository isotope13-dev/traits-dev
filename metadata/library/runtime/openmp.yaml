defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: openmp-runtime
    desc: OpenMP runtime marker string
    crit: component
    if:
      type: text
      substr: OpenMP Runtime
      section: .rdata
  - id: microsoft-openmp-runtime
    desc: Microsoft C/C++ OpenMP Runtime
    crit: notable
    conf: 1.0
    for: [pe, dll]
    if:
      type: text
      substr: Microsoft C/C++ OpenMP Runtime
      section: .text
