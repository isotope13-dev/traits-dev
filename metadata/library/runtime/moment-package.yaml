defaults:
  platforms: [windows, unix]
  for: [binaries, javascript]
traits:
  - id: moment-locale
    desc: Moment.js locale file
    crit: baseline
    if:
      type: text
      regex: moment\.js (language|locale) configuration
  - id: moment-library
    desc: Moment.js date library banner
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '//! moment\.js|momentjs\.com'
