defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: angularjs-bundle
    desc: AngularJS library bundle markers
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: 'AngularJS v[0-9]+\.[0-9]+\.[0-9]+|angularjs\.org'
  - id: react-production
    desc: React production build markers
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: react\\.production\\.min|ReactDOM\\.production
  - id: vue-production
    desc: Vue production build markers
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: vue\\.runtime\\.esm|vue\\.esm-bundler|__VUE_PROD
  - id: angular-production
    desc: Angular compiled production markers
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: "ngDevMode|ɵɵdefineComponent"
  - id: update-notifier-config-key
    desc: update-notifier config key
    crit: component
    conf: 0.95
    if:
      type: text
      substr: update-notifier-
  - id: npm-registry-metadata-client
    desc: npm registry metadata client
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'PackageNotFoundError|VersionNotFoundError|application/vnd\.npm\.install-v1\+json'
  - id: npmrc-auth-parser-context
    desc: npmrc auth parser context
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'npmrc[\s\S]{0,240}(_auth|authorization|registry)'
composite_rules:
  - id: update-notifier-npm-client
    desc: update-notifier npm registry client
    crit: baseline
    conf: 0.96
    all:
      - id: update-notifier-config-key
      - id: npm-registry-metadata-client
  - id: update-notifier-npmrc-context
    desc: update-notifier npmrc auth lookup
    crit: baseline
    conf: 0.94
    all:
      - id: update-notifier-npm-client
      - id: npmrc-auth-parser-context
