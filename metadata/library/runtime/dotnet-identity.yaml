defaults:
  platforms:
    - windows
    - linux
    - macos
  for:
    - pe
    - dll
traits:
  - id: msal-namespace
    desc: Microsoft.Identity.Client namespace
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: Microsoft.Identity.Client
      section: text
  - id: azure-identity-namespace
    desc: Azure.Identity namespace
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: Azure.Identity
      section: text
composite_rules:
  - id: dotnet-identity-lib
    desc: .NET identity/authentication library
    crit: baseline
    any:
      - id: msal-namespace
      - id: azure-identity-namespace
