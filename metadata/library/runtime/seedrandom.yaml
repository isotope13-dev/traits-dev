defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.96

traits:
  - id: seedrandom-xorwow-export
    desc: seedrandom xorwow PRNG export
    crit: component
    if:
      type: text
      substr: this.xorwow
  - id: seedrandom-xor128-export
    desc: seedrandom xor128 PRNG export
    crit: component
    if:
      type: text
      substr: this.xor128
  - id: seedrandom-tychei-export
    desc: seedrandom tychei PRNG export
    crit: component
    if:
      type: text
      substr: this.tychei

composite_rules:
  - id: seedrandom-prng-bundle
    desc: seedrandom PRNG bundle
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: seedrandom-xorwow-export
      - id: seedrandom-xor128-export
      - id: seedrandom-tychei-export
