defaults:
  platforms: [windows, unix]
  for: [php, c, cpp, shell]
  crit: baseline
traits:
- id: upstream-php-source-tree-path
  desc: Upstream PHP source tree path
  conf: 0.98
  if:
    type: path
    regex: '(^|[\\/])php-[0-9]+\.[0-9]+\.[0-9]+([\\/]|$)'
- id: upstream-php-source-archive-path
  desc: Upstream PHP source archive path
  for: [tar]
  conf: 0.98
  if:
    type: path
    regex: '(^|[\\/])php\.tar\.xz$'
- id: htmlpurifier-library
  desc: HTMLPurifier library source
  conf: 0.98
  if:
    type: text
    substr: "HTMLPurifier_"
- id: pel-exif-library
  desc: PEL PHP Exif library
  conf: 0.98
  if:
    type: text
    substr: "PEL: PHP Exif Library"
- id: pope-framework-library
  desc: Imagely POPE framework source
  conf: 0.96
  if:
    type: text
    substr: "Pope"
composite_rules:
- id: upstream-php-source
  desc: Upstream PHP source distribution
  crit: component
  any:
  - id: upstream-php-source-tree-path
  - id: upstream-php-source-archive-path
