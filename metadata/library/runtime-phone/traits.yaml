defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: intl-tel-input-bundle
    desc: Bundled intl-tel-input phone metadata library
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(^|[\\/])intl-tel-input[\\/]'
  - id: intl-tel-input-symbols
    desc: intl-tel-input JavaScript symbols
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: '\bintlTelInput(UtilsTemp)?\b'
