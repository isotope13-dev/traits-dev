# Unity IL2CPP build artifacts
# GameAssembly.dll is the native IL2CPP module present in every Unity
# IL2CPP build; these reference it across binary sections.
defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.95

traits:
  - id: gameassembly-text
    desc: Unity IL2CPP GameAssembly module reference (text section)
    if:
      type: text
      section: .text
      regex: "\\b(GameAssembly|Gameplay\\.Beyond)\\.dll\\b"

  - id: gameassembly-rdata
    desc: Unity IL2CPP GameAssembly module reference (rdata section)
    if:
      type: text
      section: .rdata
      regex: "\\b(GameAssembly|Gameplay\\.Beyond)\\.dll\\b"

  - id: gameassembly-data
    desc: Unity IL2CPP GameAssembly module reference (data section)
    if:
      type: text
      section: .data
      substr: "GameAssembly"

  - id: windowsplayer-il2cpp-pdb
    desc: Unity WindowsPlayer IL2CPP PDB path
    conf: 0.99
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)WindowsPlayer.*il2cpp'
