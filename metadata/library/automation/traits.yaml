defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: cypress-require
    desc: require('cypress')
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: require('cypress')
  - id: cypress-import
    desc: from 'cypress'
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: from 'cypress'
  - id: playwright-require
    desc: require('playwright')
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: require('playwright')
  - id: playwright-import
    desc: from 'playwright'
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: from 'playwright'
  - id: playwright-scoped-import
    desc: from '@playwright
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: from '@playwright
  - id: playwright-browser-install-script
    desc: Playwright browser runtime install script
    crit: baseline
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: scripts[*]
      regex: '\bnpx\s+playwright\s+install\s+(chromium|chrome|firefox|webkit)\b'
  - id: baoyu-chrome-cdp-import
    desc: baoyu Chrome CDP automation import
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: baoyu-chrome-cdp
  - id: patchright-python-import
    desc: Python Patchright browser automation import
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      substr: patchright.async_api
  - id: patchright-pypi-dependency
    desc: PyPI Patchright browser automation dependency
    crit: notable
    conf: 0.85
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)Requires-Dist:\s*patchright\b'
  - id: cloakbrowser-pypi-dependency
    desc: "PyPI CloakBrowser stealth dependency"
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)Requires-Dist:\s*cloakbrowser\b'
  - id: puppeteer-require
    desc: require('puppeteer')
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: require('puppeteer')
  - id: puppeteer-import
    desc: from 'puppeteer'
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: from 'puppeteer'
  - id: selenium-require
    desc: require('selenium import
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: require('selenium
  - id: selenium-import
    desc: from 'selenium import
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: from 'selenium
  - id: selenium-ie-driver-doc-marker
    desc: Selenium IE driver documentation marker
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'IEDriverServer|Internet Explorer\. Before using the IEDriver'
  - id: selenium-ie-driver-path-link
    desc: Selenium IE driver PATH doc link
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'http://en\.wikipedia\.org/wiki/PATH_|goo\.gl/eH0Yi3'
  - id: selenium-ie-driver-wiki-link
    desc: Selenium IE driver wiki link
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'Selenium project|selenium/wiki/InternetExplorerDriver'
  - id: selenium-ie-driver-binary-name
    desc: Selenium IE driver binary basename
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: path
      basename: true
      regex: '^(IEDriverServer\.exe|IEDriver\.dll)(@0x[0-9A-Fa-f]+)?$'
  - id: selenium-ie-driver-launcher-text
    desc: Selenium IE driver launcher text
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: encoded
      encoding: wide
      exact: Launches the WebDriver server for the Internet Explorer driver
      section: .rdata
  - id: selenium-ie-driver-product-text
    desc: Selenium WebDriver product text
    crit: component
    conf: 0.98
    platforms: [windows]
    for: [pe, dll]
    if:
      type: encoded
      encoding: wide
      exact: Selenium WebDriver
      section: .rsrc
  - id: selenium-ie-driver-product-text-rdata
    desc: Selenium WebDriver product text rdata
    crit: component
    conf: 0.98
    platforms: [windows]
    for: [pe, dll]
    if:
      type: encoded
      encoding: wide
      exact: Selenium WebDriver
      section: .rdata
  - id: selenium-ie-driver-library-text
    desc: Selenium IE driver library text
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: encoded
      encoding: wide
      exact: Driver library for the IE driver
      section: .rsrc
  - id: selenium-ie-driver-library-text-rdata
    desc: Selenium IE library text rdata
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: encoded
      encoding: wide
      exact: Driver library for the IE driver
      section: .rdata
  - id: selenium-ie-driver-dll-text
    desc: Selenium IE driver DLL text
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: encoded
      encoding: wide
      exact: IEDriver.dll
      section: .rsrc
  - id: selenium-ie-driver-dll-text-rdata
    desc: Selenium IE DLL text rdata
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: encoded
      encoding: wide
      exact: IEDriver.dll
      section: .rdata
  - id: selenium-ie-driver-product-versioninfo
    desc: Selenium WebDriver product version info
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: value
      path: pe.version.product_name
      exact: Selenium WebDriver
  - id: selenium-ie-driver-description-versioninfo
    desc: Selenium IE driver description version info
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: value
      path: pe.version.description
      exact: Driver library for the IE driver
  - id: selenium-ie-driver-internal-name-versioninfo
    desc: Selenium IE internal name version info
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: value
      path: pe.version.internal_name
      exact: IEDriver.dll
  - id: selenium-ie-driver-browser-class
    desc: IE server window class marker
    crit: component
    conf: 0.98
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: Internet Explorer_Server
      section: .rsrc
  - id: selenium-ie-driver-browser-class-rdata
    desc: IE server window class rdata
    crit: component
    conf: 0.98
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: Internet Explorer_Server
      section: .rdata
  - id: selenium-ie-driver-screenshot-text
    desc: Selenium IE screenshot diagnostic text
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: PrintWindow API is not able to get content window screenshot
      section: .rsrc
  - id: selenium-ie-driver-screenshot-text-rdata
    desc: Selenium IE screenshot text rdata
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: PrintWindow API is not able to get content window screenshot
      section: .rdata
  - id: selenium-ie-driver-command-handler
    desc: Selenium IE screenshot handler symbol text
    crit: component
    conf: 0.98
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      substr: ScreenshotCommandHandler@webdriver@@
      section: .rsrc
  - id: selenium-ie-driver-command-handler-rdata
    desc: Selenium IE command handler rdata
    crit: component
    conf: 0.98
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      substr: ScreenshotCommandHandler@webdriver@@
      section: .rdata
  - id: webdriver-require
    desc: require('webdriver import
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: require('webdriver
  - id: webdriver-import
    desc: from 'webdriver import
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: from 'webdriver
  - id: nightwatch-require
    desc: require('nightwatch')
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: require('nightwatch')
  - id: nightwatch-import
    desc: from 'nightwatch'
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: from 'nightwatch'
  - id: testing-library-import
    desc: '@testing-library import'
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: '@testing-library'
  - id: testing-library-require
    desc: require('@testing-library
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: require('@testing-library
  - id: testing-library-react-umd-bundle
    desc: Testing Library React UMD bundle
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: TestingLibraryReact
  - id: testing-library-dom-umd-bundle
    desc: Testing Library DOM UMD bundle
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: TestingLibraryDom
  - id: testing-library-react-dom-utils-dependency
    desc: Testing Library ReactDOM test-utils dependency
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: react-dom/test-utils
  - id: python-chrome-args-constant
    desc: Python Chrome args constant
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'CHROME_(DEFAULT|HEADLESS|DOCKER)_ARGS'
  - id: python-playwright-defaults-comment
    desc: Python Playwright defaults marker
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: 'Playwright defaults:'
  - id: python-browser-session-reference
    desc: Python BrowserSession reference
    crit: component
    conf: 0.82
    for: [python]
    if:
      type: text
      substr: 'BrowserSession'
  - id: pyproject-browser-use-script
    desc: pyproject browser-use script
    crit: component
    conf: 0.95
    for: [pyproject.toml]
    if:
      type: value
      path: "project.scripts.browser-use"
      exists: true
  - id: pkginfo-playwright-dependency
    desc: pkginfo Playwright dependency
    crit: component
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)Requires-Dist:\s*(playwright|patchright)\b'
  - id: pkginfo-browser-cdp-dependency
    desc: pkginfo browser CDP dependency
    crit: component
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)Requires-Dist:\s*(cdp-use|browser-use-sdk)\b'
  - id: pyproject-browser-cdp-dependency
    desc: pyproject browser CDP dependency
    crit: component
    conf: 0.88
    for: [pyproject.toml]
    if:
      type: text
      regex: '"(cdp-use|browser-use-sdk)=='
  - id: python-interactive-session-doc
    desc: Python interactive session doc
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'Jupyter-like|REPL-like|persistent Python execution'
  - id: python-compile-input-session
    desc: Python compile input session
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: "compile\\(code,\\s*['\"]<input>['\"],\\s*['\"](eval|exec)['\"]"
composite_rules:
  - id: selenium-ie-driver-doc-context
    desc: Selenium IE driver documentation context
    crit: component
    conf: 0.99
    all:
      - id: selenium-ie-driver-doc-marker
    any:
      - id: selenium-ie-driver-path-link
      - id: selenium-ie-driver-wiki-link
  - id: selenium-ie-driver-binary-identity
    desc: Selenium IE driver binary identity
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    any:
      - id: selenium-ie-driver-binary-name
      - id: selenium-ie-driver-launcher-text
      - id: selenium-ie-driver-product-text
      - id: selenium-ie-driver-product-text-rdata
      - id: selenium-ie-driver-library-text
      - id: selenium-ie-driver-library-text-rdata
      - id: selenium-ie-driver-dll-text
      - id: selenium-ie-driver-dll-text-rdata
  - id: selenium-ie-driver-ie-window-context
    desc: Selenium IE driver window context
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    any:
      - id: selenium-ie-driver-browser-class
      - id: selenium-ie-driver-browser-class-rdata
      - id: selenium-ie-driver-screenshot-text
      - id: selenium-ie-driver-screenshot-text-rdata
      - id: selenium-ie-driver-command-handler
      - id: selenium-ie-driver-command-handler-rdata
  - id: selenium-ie-driver-versioninfo-identity
    desc: Selenium IE driver version info identity
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    any:
      - id: selenium-ie-driver-binary-name
      - id: selenium-ie-driver-product-versioninfo
      - id: selenium-ie-driver-description-versioninfo
      - id: selenium-ie-driver-internal-name-versioninfo
  - id: selenium-ie-driver-embedded-context
    desc: Selenium IE driver embedded DLL context
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: selenium-ie-driver-versioninfo-identity
      - id: selenium-ie-driver-ie-window-context
  - id: selenium-ie-driver-binary-context
    desc: Selenium IE driver automation binary
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: selenium-ie-driver-binary-identity
      - id: selenium-ie-driver-ie-window-context
  - id: selenium-ie-driver-benign-binary
    desc: Selenium IE driver benign binary marker
    crit: component
    conf: 0.99
    platforms: [windows]
    for: [pe, dll]
    any:
      - id: selenium-ie-driver-binary-context
      - id: selenium-ie-driver-embedded-context
      - id: selenium-ie-driver-binary-identity
      - id: selenium-ie-driver-ie-window-context
  - id: testing-library-imports
    desc: Testing Library import patterns
    any:
      - id: testing-library-import
      - id: testing-library-require
      - id: testing-library-react-umd-bundle
      - id: testing-library-dom-umd-bundle
      - id: testing-library-react-dom-utils-dependency
    crit: baseline
  - id: python-browser-automation-profile
    desc: Python browser automation profile
    crit: component
    conf: 0.92
    for: [python]
    any:
      - id: python-chrome-args-constant
      - id: python-playwright-defaults-comment
      - id: python-browser-session-reference
  - id: python-browser-automation-package
    desc: Python browser automation package
    crit: notable
    conf: 0.9
    for: [pyproject.toml, pkginfo]
    any:
      - id: pyproject-browser-use-script
      - id: pkginfo-playwright-dependency
      - id: pkginfo-browser-cdp-dependency
      - id: pyproject-browser-cdp-dependency
  - id: python-interactive-exec-session
    desc: Python interactive execution session
    crit: component
    conf: 0.93
    for: [python]
    all:
      - id: python-interactive-session-doc
      - id: python-compile-input-session
