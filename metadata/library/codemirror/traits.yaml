defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  # CodeMirror is a widely embedded in-browser code-editor library. Code that
  # references the editor instance touches `element.CodeMirror` / `this.CodeMirror`,
  # and the library's own UMD boilerplate assigns `this.CodeMirror = mod()`.
  # This is a neutral library-identity marker, not a database/SQL operation.
  - id: editor-object-reference
    desc: References the CodeMirror editor object
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: .CodeMirror
