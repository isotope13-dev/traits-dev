# Meta - Apple System Component Identification
# Identifies legitimate Apple system binaries and frameworks
# These traits help contextualize findings for known-good system components
defaults:
  crit: baseline
  platforms: [macos]
  for: [macho, dylib]
traits:
  # === Bundle Identifiers ===
  - id: bundle-id
    desc: Apple bundle identifier (com.apple.* with minimum length)
    crit: baseline
    conf: 0.95
    if:
      id: metadata/apple/bundle-id::generic-apple
    unless:
      - id: metadata/apple/bundle-id::mail
      - id: metadata/apple/bundle-id::ichat
      - id: metadata/apple/bundle-id::messages
      - id: metadata/apple::dt-runtime
      - id: metadata/apple/bundle-id::quarantine
  - id: system-daemon
    desc: Apple system daemon (libexec)
    crit: baseline
    conf: 0.9
    for: [macho]
    if:
      type: string
      regex: "/usr/libexec/[a-z][a-z0-9_-]+d\\b"
      section: .text
  - id: xpc-service
    desc: Apple XPC service
    crit: baseline
    conf: 0.9
    for: [macho]
    if:
      type: string
      regex: "\\.xpc/Contents/MacOS/"
      # === Project Identifiers ===
      section: .text
  - id: project-marker
    # === Code Signing ===

    desc: Apple internal project marker
    conf: 0.95
    if:
      type: string
      # Apple internal PROJECT: marker in binary
      regex: "@\\(#\\)PROGRAM:[A-Za-z][A-Za-z0-9]*\\s+PROJECT:[A-Za-z]+-[0-9]+"
      # === Ad framework atomic indicators ===
      section: .text
  - id: adcore-framework
    # === Apple Frameworks ===

    desc: AdCore.framework usage
    crit: baseline
    conf: 0.7
    if:
      type: string
      substr: "/AdCore.framework/"
      section: .text
  - id: adid-framework
    desc: AdID.framework usage
    crit: baseline
    conf: 0.7
    if:
      type: string
      substr: "/AdID.framework/"
      section: .text
  - id: limitadtracking-framework
    desc: LimitAdTracking.framework usage
    crit: baseline
    conf: 0.7
    if:
      type: string
      substr: "/LimitAdTracking.framework/"
      # === Privacy framework atomic indicators ===
      section: .text
  - id: apptrackingtransparency-framework
    desc: AppTrackingTransparency.framework usage
    crit: baseline
    conf: 0.7
    if:
      type: string
      substr: "/AppTrackingTransparency.framework/"
      # === Privacycontentprediction framework ===
      section: .text
  - id: privacycontentprediction-framework
    desc: PrivacyContentPrediction.framework usage
    crit: baseline
    conf: 0.7
    if:
      type: string
      substr: "/PrivacyContentPrediction.framework/"
      section: .text
  - id: private-framework
    desc: Apple private framework usage
    conf: 0.85
    if:
      type: string
      substr: "/System/Library/PrivateFrameworks"
      section: .text
  - id: system-framework
    desc: Apple system framework path
    crit: baseline
    conf: 0.85
    if:
      type: string
      substr: "/System/Library/Frameworks"
      section: .text
  - id: launchd-plist
    desc: launchd plist embedding
    crit: baseline
    conf: 0.85
    if:
      type: string
      substr: "launchd.plist"
      section: .text
  - id: cocoa-mainmenu-randomized-title-keys
    desc: Cocoa MainMenu randomized title keys
    crit: baseline
    conf: 0.9
    for: [plist]
    count_min: 40
    if:
      type: raw
      regex: "[A-Za-z0-9]{3}-[A-Za-z0-9]{2}-[A-Za-z0-9]{3}\\.title_?"
      section: .text
  - id: mobiledeviceupdater-ui-strings
    desc: MobileDeviceUpdater localized UI strings
    crit: notable
    conf: 0.9
    for: [plist]
    if:
      type: raw
      regex: "MobileDeviceUpdater"
      # === Dispatch queue atomic indicators ===
      section: .text
  - id: dispatch-queue-create
    # === IPC Mechanisms ===

    # === Dispatch (GCD) ===
    desc: dispatch_queue_create symbol
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      regex: "dispatch_queue_create"
  - id: dispatch-get-global-queue
    desc: dispatch_get_global_queue symbol
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      regex: "dispatch_get_global_queue"
  # === Dispatch async atomic indicators ===
  - id: dispatch-async-symbol
    desc: dispatch_async symbol
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      regex: "dispatch_async"
  - id: dispatch-sync-symbol
    desc: dispatch_sync symbol
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      regex: "dispatch_sync"
  - id: dispatch-source
    desc: Grand Central Dispatch source (event
    conf: 0.85
    if:
      type: symbol
      regex: "dispatch_source_create"
  # === Info.plist Properties ===
  - id: lsuielement-background-agent
    desc: LSUIElement background agent flag
    crit: baseline
    conf: 1.0
    size_max: 10485760
    if:
      type: raw
      regex: '<key>LSUIElement</key>\s*<true/>'
      section: .text
  - id: build-info-xcode
    desc: Apple Build Information (DTPlatformBuild/DTXcode)
    crit: baseline
    conf: 1.0
    if:
      type: raw
      regex: "(DTPlatformBuild|DTXcode)"
      section: .text
  - id: empty-platform-build
    desc: Empty DTPlatformBuild value
    crit: notable
    conf: 1.0
    for: [macho, dylib, plist]
    if:
      type: raw
      regex: <key>DTPlatformBuild</key>\s*<string></string>
      section: .text
composite_rules:
  - id: ad-framework
    desc: Apple advertising framework usage
    crit: notable
    conf: 0.9
    any:
      - id: adcore-framework
      - id: adid-framework
      - id: limitadtracking-framework
  - id: privacy-framework
    desc: Apple privacy framework usage
    crit: notable
    conf: 0.9
    any:
      - id: apptrackingtransparency-framework
      - id: privacycontentprediction-framework
  - id: dispatch-queue
    desc: Grand Central Dispatch queue usage
    conf: 0.8
    any:
      - id: dispatch-queue-create
      - id: dispatch-get-global-queue
  - id: dispatch-async
    desc: Grand Central Dispatch async execution
    conf: 0.8
    any:
      - id: dispatch-async-symbol
      - id: dispatch-sync-symbol
  # Helper: Any Apple framework path detected
  - id: any-framework
    desc: Any Apple framework path (system
    crit: baseline
    conf: 0.85
    for: [macho]
    any:
      - id: system-framework
      - id: private-framework
  # Bundle + Project combination
  - id: bundle-and-project
    desc: Apple bundle identifier with project
    crit: baseline
    conf: 0.95
    for: [macho]
    all:
      - id: bundle-id
      - id: project-marker
  # Bundle + Framework combination
  - id: bundle-and-framework
    desc: Apple bundle identifier with framework
    crit: baseline
    conf: 0.95
    for: [macho]
    all:
      - id: bundle-id
      - id: any-framework
  # Project + Framework combination
  - id: project-and-framework
    desc: Apple project marker with framework
    crit: baseline
    conf: 0.95
    for: [macho]
    all:
      - id: project-marker
      - id: any-framework
  # Valid structure combinations (helper)
  - id: system-component-indicators
    desc: Apple system component structure
    crit: baseline
    conf: 0.95
    for: [macho]
    any:
      - id: bundle-and-project
      - id: bundle-and-framework
      - id: project-and-framework
      - id: project-marker
  - id: mobiledeviceupdater-localized-mainmenu
    desc: Apple MobileDeviceUpdater MainMenu strings
    crit: notable
    conf: 0.95
    for: [plist]
    all:
      - id: cocoa-mainmenu-randomized-title-keys
      - id: mobiledeviceupdater-ui-strings
  # Main composite: Requires structure AND platform signature
  - id: system-component
    desc: Apple system component (legitimate macOS)
    crit: baseline
    conf: 0.95
    for: [macho]
    all:
      - id: metadata/signed/platform::apple
      - id: system-component-indicators
