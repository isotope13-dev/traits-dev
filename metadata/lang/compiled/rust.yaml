defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: rustc-compiler
    desc: rustc Rust compiler reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: rustc
      section: .text
  - id: static-pie
    desc: Rust static-pie build type
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: static-pie
      section: .text
  - id: gimli-crate
    desc: Rust gimli crate (DWARF parsing)
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: gimli
      section: .text
  - id: object-crate
    desc: Rust object crate (binary format parsing)
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: rust/deps/object-
      section: .text
