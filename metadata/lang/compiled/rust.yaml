defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: rustc-compiler
    desc: rustc Rust compiler reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: rustc
      section: .text
  - id: static-pie
    desc: Rust static-pie build type
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: static-pie
      section: .text
  - id: gimli-crate
    desc: Rust gimli crate (DWARF parsing)
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: gimli
      section: .text
  - id: object-crate
    desc: Rust object crate (binary format parsing)
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: rust/deps/object-
      section: .text
  - id: symbolic-debuginfo-crate
    desc: Rust symbolic debuginfo crate
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: symbolic-debuginfo
      section: .text
  - id: rust-zip-parser-errors
    desc: Rust ZIP parser error catalog
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: invalid Zip archive
      section: .text
  - id: rust-zstd-library-marker
    desc: Rust zstd library marker
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: zstd-safe
      section: .text
  - id: rust-utils-source-path
    desc: Rust src/utils.rs panic/source path
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: src/utils.rs
      section: .text
composite_rules:
  - id: rust-debug-symbol-parser-library
    desc: Rust debug symbol parser library
    crit: baseline
    conf: 0.92
    all:
      - id: gimli-crate
      - id: object-crate
    any:
      - id: symbolic-debuginfo-crate
      - id: rust-zip-parser-errors
      - id: rust-zstd-library-marker
