# Go cmd/cobra source markers, used as FP-suppression context by other rules
# (a Command struct's UsageLine field).
defaults:
  platforms: [windows, unix]
  for: [go]
  size_min: 1
  size_max: 500000000
  crit: baseline
traits:
  - id: go-command-usage-line
    desc: Go Command struct UsageLine field
    if:
      type: text
      substr: 'UsageLine:'
