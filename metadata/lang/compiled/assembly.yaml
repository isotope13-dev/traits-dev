defaults:
  platforms: [windows, unix]
  for: [source]
traits:
- id: fasm-format-pe
  desc: FASM PE format directive
  crit: baseline
  if:
    type: text
    regex: format\s+PE\s+GUI
    section: .text
- id: fasm-include-import
  desc: FASM import macro include
  crit: baseline
  if:
    type: text
    regex: include\s+'include[\/]+macro[\/]+import\.inc'
    section: .text
- id: asm-push-register
  desc: Assembly push register
  crit: baseline
  if:
    type: text
    regex: \bpush\s+(e?[abcd]x|r[0-9]{1,2})\b
    section: .text
- id: asm-push-pointer
  desc: Assembly push pointer
  crit: baseline
  if:
    type: text
    regex: \bpush\s+\[[^\]\n]{1,32}\]
    section: .text
- id: asm-label
  desc: Assembly label pattern
  crit: baseline
  if:
    type: text
    regex: ^\s{0,2}[a-zA-Z0-9_$]{1,20}:\s*$
    section: .text
- id: asm-mnemonics-core--pushad
  desc: Assembly mnemonics (pushad)
  crit: baseline
  if:
    type: text
    section: .text
    word: pushad
- id: asm-mnemonics-core--popad
  desc: Assembly mnemonics (popad)
  crit: baseline
  if:
    type: text
    section: .text
    word: popad
- id: asm-mnemonics-core--lea
  desc: Assembly mnemonics (lea)
  crit: baseline
  if:
    type: text
    section: .text
    word: lea
composite_rules:
- id: asm-mnemonics-core
  desc: Assembly mnemonics
  crit: baseline
  any:
  - id: asm-mnemonics-core--pushad
  - id: asm-mnemonics-core--popad
  - id: asm-mnemonics-core--lea
- id: fasm-source
  desc: FASM assembly source code
  crit: baseline
  conf: 1.0
  all:
  - id: metadata/lang/compiled::fasm-format-pe
  - id: metadata/lang/compiled::fasm-include-import
- id: generic-asm-source
  desc: Generic assembly source code
  crit: baseline
  conf: 0.9
  all:
  - id: metadata/lang/compiled::asm-mnemonics
  - id: metadata/lang/compiled::asm-label
  unless:
  - id: metadata/lang/shebang::perl
  - id: metadata/lang/shebang::sh
- id: asm-mnemonics
  desc: Assembly mnemonics
  crit: baseline
  any:
  - id: metadata/lang/compiled::asm-mnemonics-core
  - id: metadata/lang/compiled::asm-push-register
  - id: metadata/lang/compiled::asm-push-pointer
