defaults:
  platforms: [unix]
  for: [elf]

traits:
  - id: objc-msg-lookup-runtime-symbol
    desc: ObjC msg lookup runtime symbol
    crit: component
    conf: 0.9
    if:
      type: text
      substr: objc_msg_lookup
      section: .dynstr

  - id: objc-lookup-runtime-symbol
    desc: ObjC lookup runtime symbol
    crit: component
    conf: 0.9
    if:
      type: text
      substr: objc_lookUpClass
      section: .dynstr

  - id: objc-get-class-runtime-symbol
    desc: ObjC get class runtime symbol
    crit: component
    conf: 0.9
    if:
      type: text
      substr: objc_get_class
      section: .dynstr

  - id: objc-class-runtime-symbol
    desc: ObjC class runtime symbol
    crit: component
    conf: 0.9
    if:
      type: text
      substr: __objc_class
      section: .dynstr

composite_rules:
  - id: objc-runtime-marker
    desc: ObjC runtime symbol marker
    crit: component
    conf: 0.92
    any:
      - id: objc-msg-lookup-runtime-symbol
      - id: objc-lookup-runtime-symbol
      - id: objc-get-class-runtime-symbol
      - id: objc-class-runtime-symbol
