# WebAssembly toolchain fingerprint from the module's export surface.
#
# The compiler that produced a `.wasm` leaves a recognizable export signature
# (filefacts parses the export section into `wasm.exports`):
#   - TinyGo: a `go_scheduler` export (standard Go GOOS=js exports run/resume/
#     getsp, never go_scheduler) plus Binaryen asyncify unwind/rewind exports.
#   - Rust/wasm-bindgen: the `__wbindgen_malloc`/`__wbindgen_free` allocator pair.
#   - Emscripten: `_emscripten_*` helpers plus `stackSave`/`stackRestore`.
# Neutral build metadata — surfaced for triage and usable as a leg by objective
# composites (e.g. a stripped TinyGo payload with no `producers` section).
defaults:
  platforms: [windows, unix]
  for: [wasm]
  crit: component
  conf: 0.9
traits:
  - id: wasm-tinygo-scheduler-export
    desc: TinyGo runtime scheduler export
    if:
      type: value
      path: wasm.exports[*]
      exact: "go_scheduler"
  - id: wasm-asyncify-transform
    desc: Binaryen asyncify coroutine transform
    conf: 0.85
    if:
      type: value
      path: wasm.exports[*]
      substr: "asyncify_"
  - id: wasm-wbindgen-malloc
    desc: Rust wasm-bindgen malloc export
    if:
      type: value
      path: wasm.exports[*]
      exact: "__wbindgen_malloc"
  - id: wasm-wbindgen-free
    desc: Rust wasm-bindgen free export
    if:
      type: value
      path: wasm.exports[*]
      exact: "__wbindgen_free"
  - id: wasm-emscripten-runtime-export
    desc: Emscripten runtime helper export
    conf: 0.85
    if:
      type: value
      path: wasm.exports[*]
      substr: "_emscripten_"
  - id: wasm-emscripten-stack-export
    desc: Emscripten stack helper export
    conf: 0.85
    if:
      type: value
      path: wasm.exports[*]
      exact: "stackSave"
  - id: wasm-producers-section
    desc: WASM declares a producers toolchain
    crit: baseline
    if:
      type: value
      path: wasm.producers
      exists: true
composite_rules:
  # all:[anchor] + any: — value matches over the same export array carry no
  # byte offsets, so a multi-leg all: trips the proximity gate on large
  # modules; a single anchor leg plus any: corroboration avoids it.
  - id: tinygo-wasm-toolchain
    desc: TinyGo-compiled WebAssembly module
    crit: baseline
    conf: 0.92
    all:
      - id: wasm-tinygo-scheduler-export
    any:
      - id: wasm-asyncify-transform
  - id: rust-wasm-toolchain
    desc: Rust wasm-bindgen WebAssembly module
    crit: baseline
    conf: 0.92
    all:
      - id: wasm-wbindgen-malloc
    any:
      - id: wasm-wbindgen-free
  - id: emscripten-wasm-toolchain
    desc: Emscripten-compiled WebAssembly module
    crit: baseline
    conf: 0.9
    all:
      - id: wasm-emscripten-runtime-export
    any:
      - id: wasm-emscripten-stack-export
