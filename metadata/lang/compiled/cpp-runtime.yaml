# libc++ / C++ runtime markers. Symbols and RTTI/iostream type strings emitted
# by any C++ program compiled against libc++ (Clang/Apple). Component-only
# building blocks — they identify the toolchain, not behavior.
defaults:
  platforms: [macos, linux, windows]
  for: [macho, elf, pe]
  crit: component
  conf: 0.5
traits:
  - id: cxa-atexit-symbol
    desc: __cxa_atexit runtime registration symbol
    if:
      type: symbol
      substr: cxa_atexit
  - id: main-entry-symbol
    desc: _main program entry symbol
    if:
      type: symbol
      exact: _main
  - id: unwind-resume-symbol
    desc: _Unwind_Resume exception-unwinding symbol
    if:
      type: symbol
      substr: Unwind_Resume
  - id: operator-delete-symbol
    desc: C++ operator delete symbol
    if:
      type: symbol
      substr: operator delete
  - id: libcxx-basic-string-symbol
    desc: C++ std basic_string symbol
    if:
      type: symbol
      substr: basic_string
  - id: stl-vector-symbol
    desc: C++ std vector symbol
    if:
      type: symbol
      substr: vector
  - id: libcxx-rtti-namespace
    desc: libc++ RTTI namespace marker (NSt3__1)
    for: [macho]
    if:
      type: text
      substr: NSt3__1
      section: __cstring
  - id: libcxx-istringstream
    desc: C++ basic_istringstream type string
    for: [macho]
    if:
      type: text
      substr: basic_istringstream
      section: __cstring
  - id: libcxx-stringbuf
    desc: C++ basic_stringbuf type string
    for: [macho]
    if:
      type: text
      substr: basic_stringbuf
      section: __cstring
