defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: autoit-compiled-script
    desc: Compiled AutoIt script marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '(/AutoIt3(?:ExecuteLine|ExecuteScript)|third-party compiled AutoIt|AU3!EA06)'
  - id: autoit-resource-magic
    desc: AutoIt script resource magic
    crit: baseline
    conf: 0.98
    if:
      type: raw
      substr: AU3!EA06
      section: .rsrc
