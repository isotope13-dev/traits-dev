defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: autoit-compiled-script
    desc: Compiled AutoIt script marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '(/AutoIt3(ExecuteLine|ExecuteScript)|third-party compiled AutoIt|AU3!EA06)'
      section: rdata
  - id: autoit-resource-magic
    desc: AutoIt script resource magic
    crit: baseline
    conf: 0.98
    if:
      type: raw
      substr: AU3!EA06
      section: .rsrc
  - id: autoit-syntax-checker-runtime
    desc: AutoIt syntax checker runtime
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: AutoIt3 Syntax Checker v%s  Copyright (c) 2007-2013 Tylo & AutoIt Team
      section: rdata
  - id: autoit-pdb-path
    desc: AutoIt build PDB path
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: pe.pdb_path
      regex: '(?i)[\\/]autoit[\\/]'
composite_rules:
  - id: autoit-binary
    desc: AutoIt interpreter or bundled AutoIt runtime DLL
    crit: baseline
    conf: 0.98
    any:
      - id: autoit-compiled-script
      - id: autoit-resource-magic
      - id: autoit-syntax-checker-runtime
      - id: autoit-pdb-path
      - id: metadata/signed/leaf::autoit-consulting-ltd
