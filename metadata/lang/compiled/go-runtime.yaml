defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
- id: go-runtime-marker--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (^|\b)runtime\.(main|goexit)(\.|\b)
- id: go-runtime-marker--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (^|\b)runtime\.(main|goexit)($)
- id: go-runtime-marker--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (^|\b)runtime\.(mstart)(\.|\b|$)
composite_rules:
- id: go-runtime-marker
  desc: Go runtime markers
  crit: baseline
  conf: 0.5
  any:
  - id: go-runtime-marker--rx-1
  - id: go-runtime-marker--rx-2
  - id: go-runtime-marker--rx-3
  needs: 1
