defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
- id: go-runtime-marker--rx-1
  desc: Go runtime main/goexit marker
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (^|\b)runtime\.(main|goexit)(\.|\b)
    section: rdata
  count_max: 1001680
- id: go-runtime-marker--rx-2
  desc: Go runtime terminal main/goexit marker
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (^|\b)runtime\.(main|goexit)($)
    section: rdata
  count_max: 1001681
- id: go-runtime-marker--rx-3
  desc: Go runtime mstart marker
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (^|\b)runtime\.(mstart)(\.|\b|$)
    section: rdata
  count_max: 1001682
composite_rules:
- id: go-runtime-marker
  desc: Go runtime markers
  crit: baseline
  conf: 0.5
  any:
  - id: go-runtime-marker--rx-1
  - id: go-runtime-marker--rx-2
  - id: go-runtime-marker--rx-3
  - id: metadata/lang/compiler/systems::go-binary-macho
