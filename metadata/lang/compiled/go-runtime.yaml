defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: go-runtime-marker
    desc: Go runtime markers
    crit: baseline
    conf: 0.5
    # Match strings (not symbols) so this also fires on stripped Go binaries,
    # whose runtime function names live in gopclntab and surface via cleave's
    # Go-aware string extraction.
    if:
      type: text
      regex: (^|\b)runtime\.(main|goexit|mstart)(\.|\b|$)
