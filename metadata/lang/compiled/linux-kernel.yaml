defaults:
  platforms: [linux, windows]
  for: [pe, elf]
  size_min: 1048576
traits:
  - id: linux-kernel-banner
    desc: Linux kernel version banner
    crit: baseline
    conf: 0.99
    if:
      type: text
      regex: '^Linux version [0-9]+\.[0-9]+\.[0-9]+'
      section: .text
  - id: dual-bsd-gpl-license
    desc: Linux module declares a dual BSD/GPL license
    crit: notable
    conf: 0.9
    for: [c]
    platforms: [linux]
    size_min: 0
    if:
      type: string_literal
      exact: Dual BSD/GPL
