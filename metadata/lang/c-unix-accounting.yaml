defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [c]
  crit: baseline
  conf: 0.75
traits:
  - id: utmp-header
    desc: C source includes utmp header
    if:
      type: string_value
      exact: "#include <utmp.h>"
  - id: lastlog-header
    desc: C source includes lastlog header
    if:
      type: string_value
      exact: "#include <lastlog.h>"
  - id: acct-header
    desc: C source includes process accounting header
    if:
      type: string_value
      exact: "#include <sys/acct.h>"
  - id: utmpx-header
    desc: C source includes utmpx header
    if:
      type: string_value
      exact: "#include <utmpx.h>"
  - id: have-lastlog-macro
    desc: Conditional lastlog portability macro
    if:
      type: string_value
      exact: "#ifdef HAVE_LASTLOG_H"
  - id: have-utmpx-macro
    desc: Conditional utmpx portability macro
    if:
      type: string_value
      exact: "#ifdef HAVE_UTMPX"
  - id: no-acct-macro
    desc: Conditional acct portability macro
    if:
      type: string_value
      exact: "#ifndef NO_ACCT"
  - id: path-macro
    desc: Uses libc path accounting macros
    if:
      type: string_value
      regex: "_PATH_(UTMP|WTMP|LASTLOG)"
  - id: fixed-record-structs
    desc: Fixed-size Unix accounting record structs
    if:
      type: string_value
      regex: "struct (utmpx?|lastlog|acct)\\b"
composite_rules:
  - id: unix-accounting-source
    desc: Unix accounting C source structure
    crit: baseline
    conf: 0.8
    needs: 2
    any:
      - id: utmp-header
      - id: lastlog-header
      - id: acct-header
      - id: utmpx-header
      - id: fixed-record-structs
  - id: unix-accounting-portability
    desc: Cross-platform Unix accounting portability
    crit: baseline
    conf: 0.8
    all:
      - id: unix-accounting-source
    needs: 2
    any:
      - id: have-lastlog-macro
      - id: have-utmpx-macro
      - id: no-acct-macro
      - id: path-macro
