defaults:
  platforms: [unix]
  for: [scripts]
# Shebang line detection — always at file offset 0.
#
# These traits detect interpreter directives at the start of script files,
# not embedded strings or comments mentioning interpreter paths.
#
# Normal shebangs are language metadata; file-type detection already captures
# the interpreter family. Suspicious shebang locations (/tmp, /dev/shm, ...)
# get their own bump below.
traits:
  # Shell interpreters
  - id: sh
    desc: POSIX shell shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*/bin/sh"
  - id: bash
    desc: Bash shell shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*((/usr)?/bin/(env\\s+)?|\\./)bash"
  - id: zsh
    desc: Zsh shell shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/zsh"
  - id: dash
    desc: Dash shell shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*/bin/dash"
  # Python interpreters
  - id: python
    desc: Python shebang line (unversioned)
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?python\\s*$"
  - id: python2
    desc: Python 2 shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?python2"
  - id: python3
    desc: Python 3 shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?python3"
  # Other scripting languages
  - id: perl
    desc: Perl shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*((/usr)?/bin/(env\\s+)?|\\./)perl"
  - id: ruby
    desc: Ruby shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?ruby"
  - id: php
    desc: PHP shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?php"
  - id: node
    desc: Node.js shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?node"
  - id: lua
    desc: Lua shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?lua"
  - id: awk
    desc: AWK shebang line
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?(g|m|n)?awk"
  - id: osascript
    desc: AppleScript/JXA shebang line
    crit: baseline
    conf: 1.0
    platforms: [macos]
    if:
      type: text
      regex: "^#!\\s*(/usr)?/bin/(env\\s+)?osascript"
  # Generic env-based shebang — baseline so it doesn't double-count when
  # a more specific interpreter trait above already fires at notable.
  # Acts as informational metadata for analysts plus an ML feature for
  # uncommon interpreters not covered by the specific traits.
  - id: env-interpreter
    desc: Generic env-based shebang line
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: "^#!\\s*/usr/bin/env\\s+\\w+"
  # Suspicious shebangs
  - id: hidden-interpreter
    desc: Shebang with path traversal or unusual location
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "^#!\\s*(/tmp|/var/tmp|/dev/shm|\\.\\./)"
