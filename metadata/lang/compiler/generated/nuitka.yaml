defaults:
  platforms: [unix, windows]
  for: [binaries]
  crit: baseline
  conf: 0.97

traits:
  - id: nuitka-version-symbol
    desc: Nuitka compiled Python version symbol
    if:
      type: text
      substr: __nuitka_version__
  - id: nuitka-compiled-symbol
    desc: Nuitka compiled Python marker
    if:
      type: text
      substr: __compiled__
  - id: nuitka-module-loader-symbol
    desc: Nuitka module loader symbol
    if:
      type: text
      substr: nuitka_module_loader

composite_rules:
  - id: nuitka-compiled-python
    desc: Nuitka compiled Python module
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: nuitka-version-symbol
      - id: nuitka-compiled-symbol
      - id: nuitka-module-loader-symbol
  - id: nuitka-cpython-extension
    desc: Nuitka compiled CPython native extension
    crit: baseline
    conf: 0.99
    all:
      - id: nuitka-compiled-python
      - id: metadata/file/extension::cpython-native-extension-module
