defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: wasm-bindgen-allocator-marker
    desc: wasm-bindgen allocator marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "__wbindgen_malloc"

  - id: wasm-bindgen-string-helper
    desc: wasm-bindgen string helper
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "getStringFromWasm0"

  - id: wasm-bindgen-wbg-import
    desc: wasm-bindgen import shim
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "__wbg_[A-Za-z0-9_]+:"

composite_rules:
  - id: wasm-bindgen-js-glue
    desc: wasm-bindgen JavaScript glue
    crit: baseline
    conf: 0.94
    all:
      - id: wasm-bindgen-allocator-marker
      - id: wasm-bindgen-string-helper
      - id: wasm-bindgen-wbg-import
