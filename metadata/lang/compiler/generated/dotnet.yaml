defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

traits:
  - id: dotnet-private-implementation-details-guid
    desc: PrivateImplementationDetails compiler GUID
    crit: baseline
    conf: 0.98
    if:
      type: hex
      section: .text
      pattern: "3C 50 72 69 76 61 74 65 49 6D 70 6C 65 6D 65 6E 74 61 74 69 6F 6E 44 65 74 61 69 6C 73 3E 7B [8] 2D [4] 2D [4] 2D [4] 2D [12] 7D"

  - id: dotnet-xmlserializer-generated-assembly
    desc: .NET generated XML serializer assembly marker
    if:
      type: text
      exact: Microsoft.Xml.Serialization.GeneratedAssembly
      section: .text

  - id: dotnet-xmlserializer-implementation
    desc: .NET XML serializer implementation marker
    if:
      type: text
      exact: XmlSerializerImplementation
      section: .text

  - id: dotnet-xmlserializer-reader-writer
    desc: ".NET XML serializer reader/writer"
    if:
      type: text
      regex: XmlSerialization(Reader|Writer)
      section: .text

  - id: sharepoint-profile-import-export-service
    desc: "SharePoint profile import/export ns"
    if:
      type: text
      substr: SharePointPortalServer/ProfileImportExportService
      section: .text

  - id: sharepoint-userprofiles-managementagent
    desc: 'sharepoint userprofiles managementagent'
    if:
      type: text
      exact: Microsoft.Office.Server.UserProfiles.ManagementAgent
      section: .text

  - id: sharepoint-profile-change-data
    desc: SharePoint ProfileChangeData serializer type
    if:
      type: text
      exact: ProfileChangeData
      section: .text

  - id: sharepoint-property-change-data
    desc: SharePoint PropertyChangeData serializer type
    if:
      type: text
      exact: PropertyChangeData
      section: .text

  - id: dotnet-generated-dll-original-filename
    desc: Opaque generated DLL original filename
    crit: component
    conf: 0.82
    if:
      type: value
      path: pe.version.original_filename
      regex: '^[a-z0-9]{8,12}\.dll$'

  - id: dotnet-generated-dll-internal-name
    desc: Opaque generated DLL internal name
    crit: component
    conf: 0.82
    if:
      type: value
      path: pe.version.internal_name
      regex: '^[a-z0-9]{8,12}\.dll$'

composite_rules:
  - id: dotnet-generated-xmlserializer
    desc: .NET generated XML serializer assembly
    crit: baseline
    conf: 0.98
    all:
      - id: dotnet-xmlserializer-generated-assembly
      - id: dotnet-xmlserializer-implementation
      - id: dotnet-xmlserializer-reader-writer

  - id: dotnet-sharepoint-profile-xmlserializer
    desc: Generated SharePoint profile XML serializer
    crit: notable
    conf: 0.98
    all:
      - id: dotnet-generated-xmlserializer
      - id: sharepoint-profile-import-export-service
      - id: sharepoint-userprofiles-managementagent
    any:
      - id: sharepoint-profile-change-data
      - id: sharepoint-property-change-data

  - id: dotnet-generated-serializer-opaque-dll-name
    desc: Generated .NET serializer with opaque DLL identity
    crit: notable
    conf: 0.9
    all:
      - id: dotnet-generated-xmlserializer
      - id: dotnet-generated-dll-original-filename
      - id: dotnet-generated-dll-internal-name
