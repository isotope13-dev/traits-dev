defaults:
  platforms: [unix]
  for: [elf]
  crit: baseline
  conf: 0.95
traits:
  - id: f2py-numpy-version-symbol
    desc: f2py generated NumPy extension marker
    if:
      type: text
      substr: __f2py_numpy_version__
      section: .rodata
  - id: f2py-generated-docstring
    desc: f2py generated module docstring
    if:
      type: text
      substr: "auto-generated with f2py"
      section: .rodata
  - id: fortran-module-docstring
    desc: Fortran module docstring in Python extension
    if:
      type: text
      substr: "Fortran 90/95 modules"
      section: .rodata
  - id: cpython-extension-basename
    desc: CPython native extension basename
    if:
      type: path
      basename: true
      regex: '\.cpython-\d+[^\\/]*\.so$'
composite_rules:
  - id: f2py-python-extension
    desc: f2py generated Python native extension
    crit: baseline
    conf: 0.98
    all:
      - id: f2py-numpy-version-symbol
    any:
      - id: f2py-generated-docstring
      - id: fortran-module-docstring
      - id: cpython-extension-basename
