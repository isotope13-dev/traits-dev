defaults:
  platforms:
    - linux
    - unix
    - android
  for:
    - elf
traits:
  - id: gcc-compiler
    desc: GCC compiler signature
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: 'GCC: (GNU)'
      section: .text
  - id: gcc-ancient
    desc: Ancient GCC version (pre-4.0, embedded/IoT cross-compile)
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: 'GCC: \(GNU\) [23]\.[0-9]+\.[0-9]'
      section: .text
  - id: gcc-debian-prerelease
    desc: GCC Debian prerelease build (early IoT cross-compilers)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'GCC: \(GNU\) [0-9.]+.{0,30}Debian prerelease'
      section: .text
