# Traits derived from Go's runtime/debug.BuildInfo block.
# Real Go binaries expose a module path like "github.com/owner/repo",
# "golang.org/x/foo", or one of the standard sentinels
# ("main", "std", "cmd/...", "command-line-arguments"). Mass-produced
# loader/dropper builders (Amadey-Go, several Kryptik variants) leave the
# build path as a single random alphanumeric token — a structural anomaly
# that survives -trimpath.
defaults:
  platforms: [windows, unix]
  for: [pe, elf, macho]
  size_min: 65536
traits:
  - id: go-opaque-module-path
    desc: Go module path is opaque random
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: pe.go.module.path
      regex: '^[A-Za-z0-9]{7,40}$'
    not:
      - regex: '^(main|std|cmd|test|command-line-arguments|tool)$'
      - regex: '^v[0-9]+$'
  - id: go-opaque-build-path
    desc: Go build path is opaque random
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: pe.go.path
      regex: '^[A-Za-z0-9]{7,40}$'
    not:
      - regex: '^(main|std|cmd|test|command-line-arguments|tool)$'
      - regex: '^v[0-9]+$'
