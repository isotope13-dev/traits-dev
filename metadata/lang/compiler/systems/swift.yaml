defaults:
  platforms: [macos]
  for: [macho]
  crit: baseline
  conf: 0.92

traits:
  - id: swift-argument-parser-symbols
    desc: Swift ArgumentParser symbols
    if:
      type: symbol
      substr: ArgumentParser

  - id: swift-argument-parser-completions-source
    desc: Swift ArgumentParser completions source
    if:
      type: text
      substr: ArgumentParser/CompletionsGenerator.swift
      section: __TEXT,__cstring

  - id: swift-argument-parser-bash-completion-prologue
    desc: Swift ArgumentParser bash completion prologue
    if:
      type: text
      substr: 'trap "$(shopt -p);$(shopt -po)" RETURN'
      section: __TEXT,__cstring

composite_rules:
  - id: swift-argument-parser-shell-completion-artifacts
    desc: Swift ArgumentParser shell completion artifacts
    all:
      - id: swift-argument-parser-symbols
      - id: swift-argument-parser-completions-source
      - id: swift-argument-parser-bash-completion-prologue
