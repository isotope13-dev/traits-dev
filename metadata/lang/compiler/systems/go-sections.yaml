# Identifies Go-compiled binaries
defaults:
  platforms: [linux, unix, android, windows]
traits:
  - id: go-binary
    desc: Go-compiled binary (identified by .gopclntab section)
    crit: notable
    for: [elf, pe, dll]
    if:
      type: section
      exact: ".gopclntab"
  - id: go-binary-macho
    desc: Go-compiled MachO binary (identified by gopclntab section)
    crit: baseline
    platforms: [macos]
    for: [macho]
    if:
      type: section
      substr: "gopclntab"
  - id: go-buildinfo
    desc: Go build info marker string
    crit: notable
    conf: 0.95
    for: [pe, dll]
    if:
      type: string_value
      exact: "go:buildinfo"
      section: .symtab
  - id: go-pe-symtab
    desc: Go PE retains .symtab section
    crit: baseline
    conf: 0.88
    for: [pe, dll]
    if:
      type: section
      exact: .symtab
composite_rules:
  - id: go-pe-rich-symbols
    desc: Go PE with retained symbol metadata
    crit: notable
    conf: 0.94
    all:
      - id: go-buildinfo
      - id: go-pe-symtab
