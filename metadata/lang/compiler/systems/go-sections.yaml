# Identifies Go-compiled binaries
defaults:
  platforms: [unix, android, windows]
traits:
  - id: go-binary
    desc: Go-compiled binary (identified by .gopclntab section)
    # Metadata claim ("this is a Go binary") — baseline is the right tier.
    # Consumers who want to gate on "Go binary" can still reference this ID.
    crit: baseline
    conf: 1.0
    for: [elf, pe]
    if:
      type: section
      exact: ".gopclntab"
  - id: go-buildinfo-elf
    desc: Go ELF build info section
    crit: baseline
    conf: 0.95
    for: [elf]
    if:
      type: section
      exact: ".go.buildinfo"
  - id: go-fipsinfo-elf
    desc: Go ELF FIPS info section
    crit: component
    conf: 0.9
    for: [elf]
    if:
      type: section
      exact: ".go.fipsinfo"
  - id: go-noptrdata-elf
    desc: Go ELF noptrdata section
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: section
      exact: ".noptrdata"
  - id: go-note-buildid-elf
    desc: Go ELF build ID note
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: section
      exact: ".note.go.buildid"
  - id: go-binary-macho
    desc: Go-compiled MachO binary (identified by gopclntab section)
    crit: baseline
    platforms: [macos]
    for: [macho]
    if:
      type: section
      substr: "gopclntab"
  - id: go-buildinfo
    desc: Go build info marker string
    crit: notable
    conf: 0.95
    for: [pe]
    if:
      type: text
      exact: "go:buildinfo"
      section: .symtab
  - id: go-pe-symtab
    desc: Go PE retains .symtab section
    crit: baseline
    conf: 0.88
    for: [pe]
    if:
      type: section
      exact: .symtab
  - id: go-pe-rwx-symtab-payload
    desc: Go PE uses large RWX .symtab payload
    crit: suspicious
    conf: 0.98
    for: [pe]
    if:
      type: section
      exact: .symtab
      writable: true
      executable: true
      entropy_min: 7.7
      length_min: 262144
composite_rules:
  - id: go-elf-rich-runtime-metadata
    desc: Go ELF retains rich runtime metadata
    # Component: "unstripped Go ELF" is a metadata fact for composites, not a behavior signal.
    crit: component
    conf: 0.94
    for: [elf]
    needs: 3
    any:
      - id: go-buildinfo-elf
      - id: go-fipsinfo-elf
      - id: go-noptrdata-elf
      - id: go-note-buildid-elf
  - id: go-pe-rich-symbols
    desc: Go PE with retained symbol metadata
    crit: notable
    conf: 0.94
    all:
      - id: go-buildinfo
      - id: go-pe-symtab
  - id: go-runtime-context
    desc: Go runtime metadata context
    crit: baseline
    conf: 0.95
    platforms: [unix, android, windows, macos]
    for: [pe, elf, macho]
    any:
      - id: go-binary
      - id: go-binary-macho
      - id: go-buildinfo
      - id: go-buildinfo-elf
      - id: metadata/lang/compiler/systems::go-version-string
