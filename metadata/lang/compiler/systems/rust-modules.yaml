# Source paths retained by Rust builds are provenance observations. A module
# filename alone does not establish that a program implements the capability.
defaults:
  for: [pe, elf, macho]
  platforms: [windows, linux, macos]
  crit: baseline
  conf: 0.85

traits:
  - id: rust-source-module-shell
    desc: Rust source path names a shell module
    if:
      type: text
      section: __TEXT,__cstring
      regex: 'src[\\/]shell\.rs'

  - id: rust-source-module-keylogging
    desc: Rust source path names a keylogging module
    if:
      type: text
      section: __TEXT,__cstring
      regex: '(^|[\\/_-])src[\\/](keylog(ger)?|keystroke(s)?)\.rs$'

  - id: rust-source-module-port-scanning
    desc: Rust source path names a port-scanning module
    if:
      type: text
      section: __TEXT,__cstring
      regex: 'src[\\/]port_?scan(ner)?\.rs'

  - id: rust-source-module-download
    desc: Rust source path names a download module
    if:
      type: text
      section: __TEXT,__cstring
      regex: 'src[\\/]download\.rs'

  - id: rust-source-module-upload
    desc: Rust source path names an upload module
    if:
      type: text
      section: __TEXT,__cstring
      regex: 'src[\\/]upload\.rs'

  - id: rust-source-module-screenshot
    desc: Rust source path names a screenshot module
    if:
      type: text
      section: __TEXT,__cstring
      regex: '(^|[\\/_-])src[\\/](screenshot|capture_screen)\.rs$'

  - id: rust-source-module-injection
    desc: Rust source path names an injection module
    if:
      type: text
      section: __TEXT,__cstring
      regex: 'src[\\/]inject(or)?\.rs'
