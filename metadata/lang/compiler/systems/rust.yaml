defaults:
  platforms:
    - linux
    - unix
    - android
    - windows
    - macos
    - ios
  for: [binaries]
traits:
  - id: std-panic
    desc: Rust std panic handler symbol
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      regex: ^_?rust_panic
  - id: std-alloc
    desc: Rust allocator symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^_?__rust_alloc
  - id: std-dealloc
    desc: Rust deallocator symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^_?__rust_dealloc
  - id: core-fmt
    desc: Rust core::fmt symbols
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: core..fmt..
  - id: std-io
    desc: Rust std::io symbols
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: std..io..
  - id: rustc-path
    desc: Rust compiler path in binary
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: /rustc/[0-9a-f]{40}/
      section: .text
  - id: cargo-registry-path
    desc: Cargo registry path in binary
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: .cargo/registry/src/
      section: .text
  - id: rust-src-path
    desc: Rust source file path (.rs)
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: '/[a-z_]+\.rs:'
      section: .text
  - id: panic-message
    desc: Rust panic message format
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: 'panicked at ''.{1,80}'', .{1,80}\.rs:'
      section: .text
  - id: unwrap-failed
    desc: Rust unwrap failure message
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: called `Option::unwrap()` on a `None` value
      section: .text
  - id: expect-failed
    desc: Rust expect failure message
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: called `Result::unwrap()` on an `Err` value
      section: .text
composite_rules:
  - id: rust-binary
    desc: Rust-compiled binary
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: std-panic
      - id: std-alloc
      - id: core-fmt
      - id: rustc-path
      - id: cargo-registry-path
      - id: panic-message
