defaults:
  platforms:
    - linux
    - unix
    - android
    - windows
    - macos
    - ios
  for: [source, binaries]
traits:
  - id: runtime-newproc
    desc: Go runtime goroutine creation
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: runtime.newproc
  - id: runtime-gopanic
    desc: Go runtime panic handler
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: runtime.gopanic
  - id: go-src-path
    desc: Go source file path
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: /go/src/[a-z_/]{1,60}\.go
      section: .text
  - id: goroot-path
    desc: GOROOT path in binary
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: /usr/local/go/src/
      section: .text
  - id: gopath-path
    desc: GOPATH-style module path
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: go/pkg/mod/
      section: .text
  - id: go-version-string
    desc: Go version string
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: go1\.[0-9]{1,2}(\.[0-9]{1,2})?
      section: rodata
  - id: main-main
    desc: Go main.main entry point
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: main.main
  - id: net-http-pkg
    desc: Go net/http package
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: net/http.
  - id: crypto-aes-pkg
    desc: Go crypto/aes package
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: crypto/aes.
  - id: crypto-cipher-pkg
    desc: Go crypto/cipher package
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: crypto/cipher.
  - id: crypto-tls-pkg
    desc: Go crypto/tls package
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: crypto/tls.
  - id: go-src-path-windows
    desc: Go Windows source path
    crit: notable
    conf: 0.9
    platforms:
      - windows
    for:
      - pe
      - pe
    if:
      type: text
      regex: '[A-Z]:/Program Files/Go/src/[A-Za-z0-9_./-]+'
      section: .rdata
  - id: go-main-init
    desc: Go main init routine
    crit: notable
    conf: 0.88
    platforms:
      - windows
    for:
      - pe
      - pe
    if:
      type: symbol
      exact: main.init.0
  - id: certenum-source-path
    desc: CertEnum callback source filename
    crit: component
    conf: 0.97
    platforms:
      - windows
    for:
      - pe
      - pe
    if:
      type: text
      exact: exe/result/CertEnumSystemStoreLocation.go
      section: .rdata
composite_rules:
  - id: go-binary-comp
    desc: Go-compiled binary
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: runtime-gopanic
      - id: main-main
      - id: go-version-string
      - id: go-src-path
      - id: goroot-path
