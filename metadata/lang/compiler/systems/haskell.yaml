defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
  crit: baseline
  conf: 0.9

traits:
  - id: ghc-runtime-string
    desc: GHC runtime string
    if:
      type: text
      regex: '\b(GHC|ghc)-[0-9]+\.[0-9]+|rts_[a-z_]+'

  - id: haskell-module-path
    desc: Haskell module path
    if:
      type: text
      regex: '[A-Z][A-Za-z0-9_]+(/[A-Z][A-Za-z0-9_]+)+\.hs'

composite_rules:
  - id: haskell-binary
    desc: Haskell-compiled binary
    crit: baseline
    conf: 0.9
    any:
      - id: ghc-runtime-string
      - id: haskell-module-path
