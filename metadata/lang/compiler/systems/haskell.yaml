defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
  crit: baseline
  conf: 0.9

traits:
  - id: ghc-version-string
    desc: GHC version string
    if:
      type: text
      section: rdata
      regex: '\b(GHC|ghc)-[0-9]+\.[0-9]+'

  - id: ghc-rts-symbol
    desc: GHC RTS symbol string
    count_min: 2
    if:
      type: text
      section: rdata
      regex: '\brts_[a-z_]{4,}\b'

  - id: haskell-module-path
    desc: Haskell module path
    if:
      type: text
      section: rdata
      regex: '[A-Z][A-Za-z0-9_]{1,80}(/[A-Z][A-Za-z0-9_]{1,80}){1,10}\.hs'

composite_rules:
  - id: haskell-binary
    desc: Haskell-compiled binary
    crit: baseline
    conf: 0.9
    any:
      - id: ghc-version-string
      - id: ghc-rts-symbol
      - id: haskell-module-path
    needs: 2
