defaults:
  platforms:
    - windows
  for:
    - pe

traits:
  - id: cpp-unknown-exception-string
    desc: MSVC C++ runtime "Unknown exception" string
    crit: baseline
    conf: 0.7
    if:
      type: text
      exact: Unknown exception
      section: .rdata
  - id: gcc-comment
    desc: "GCC: comment string"
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: "GCC:"
      section: .text

  - id: gcc-prefix
    desc: gcc- prefix
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: gcc-
      section: .text

  - id: gnu-c
    desc: GNU C string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GNU C
      section: .text

  - id: gnuc-macro
    desc: __GNUC__ macro
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: __GNUC__
      section: .text

  - id: libgcc
    desc: libgcc library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: libgcc
      section: .text

  - id: clang-string
    desc: clang string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: clang
      section: .text
    not:
      - substr: clang_rt.

  - id: llvm-string
    desc: LLVM string
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: LLVM
      section: .text

  - id: lld-pdb-marker
    desc: LLD PDB debug marker
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "@LLD PDB."
      section: .rdata

  - id: clang-macro
    desc: __clang__ macro
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: __clang__
      section: .text

  - id: libllvm
    desc: libLLVM library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: libLLVM
      section: .text

  - id: msvc-string
    desc: MSVC string
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: MSVC
      section: .text

  - id: msc-ver
    desc: _MSC_VER macro
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: _MSC_VER
      section: .text

  - id: vcruntime
    desc: vcruntime library
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: (?i)vcruntime
      section: .text

  - id: vcruntime-import
    desc: vcruntime DLL import
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: (?i)vcruntime
      section: .rdata
  - id: vcruntime-dll-import
    desc: VCRUNTIME DLL import
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: VCRUNTIME140.dll
      section: rdata

  - id: msvcrt
    desc: msvcrt library (MSVC C runtime)
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: (?i)msvcr
      section: .text
  - id: msvcr90-import
    desc: MSVCR90 DLL import
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: MSVCR90.dll
      case_insensitive: true
      section: .rdata
  - id: python3-dll-import
    desc: Imports the Python runtime DLL
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: python3\d*\.dll
      section: .rdata
  - id: python-capi-symbol
    desc: References a Python C API runtime symbol
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: _Py_NoneStruct
      section: .rdata
  - id: python-pyinit-export
    desc: Exports a CPython PyInit entry point
    crit: baseline
    conf: 0.95
    platforms: [windows, linux, macos]
    for: [pe, dll, elf, macho]
    # Every CPython C extension exports PyInit_<module>. The export-name table is
    # not always surfaced as scannable text on small modules, so match the export
    # symbol directly — reliably identifies self-contained extensions
    # (PyCryptodome) that do not link python3X.dll or use _Py_NoneStruct.
    if:
      type: export
      substr: PyInit_

  - id: ms-visual
    desc: Microsoft Visual string
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: Microsoft Visual
      section: .text

  - id: intel-compiler
    desc: __INTEL_COMPILER macro
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: __INTEL_COMPILER
      section: .text

  - id: libiomp
    desc: libiomp OpenMP library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: libiomp
      section: .text

  - id: musl-libc
    desc: musl libc string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: musl libc
      section: .text

  - id: musl-prefix
    desc: musl- prefix
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: musl-
      section: .text

  - id: musl-macro
    desc: __musl__ macro
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: __musl__
      section: .text

  - id: arm-linux-gnu
    desc: arm-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: arm-linux-gnu
      section: .text

  - id: aarch64-linux-gnu
    desc: aarch64-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: aarch64-linux-gnu
      section: .text

  - id: mips-linux-gnu
    desc: mips-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: mips-linux-gnu
      section: .text

  - id: powerpc-linux-gnu
    desc: powerpc-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: powerpc-linux-gnu
      section: .text

  - id: x86-64-linux-musl
    desc: x86_64-linux-musl cross compiler
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: x86_64-linux-musl
      section: .text

  - id: cross-suffix
    desc: Linux cross-compiler target triple
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\b[a-z0-9_]+-linux-(gnu|musl)\b'
      section: .text
    not:
      - substr: -crossover
      - substr: -crossing
      - substr: -crossplatform

  - id: watcom-runtime
    desc: Watcom C/C++ runtime marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: WATCOM C/C
      section: rdata

  - id: crtdll-legacy-runtime
    desc: CRTDLL.DLL legacy NT C runtime
    crit: baseline
    conf: 0.96
    if:
      type: text
      regex: ^CRTDLL\.DLL$
      case_insensitive: true
      section: rdata

composite_rules:
  - id: clang-lld-toolchain
    desc: Compiled with Clang LLD toolchain
    crit: notable
    conf: 0.94
    all:
      - id: lld-pdb-marker
    any:
      - id: clang-string
      - id: llvm-string
      - id: clang-macro
      - id: libllvm

  - id: gcc
    desc: Compiled with GCC
    crit: notable
    conf: 0.9
    any:
      - id: gcc-comment
      - id: gcc-prefix
      - id: gnu-c
      - id: gnuc-macro
      - id: libgcc

  - id: clang
    desc: Compiled with Clang/LLVM
    crit: notable
    conf: 0.9
    any:
      - id: clang-string
      - id: llvm-string
      - id: clang-macro
      - id: libllvm

  - id: msvc
    desc: Compiled with Microsoft Visual C++
    crit: notable
    conf: 0.9
    any:
      - id: msvc-string
      - id: msc-ver
      - id: vcruntime
      - id: msvcrt
      - id: ms-visual
  - id: python-msvc-extension
    desc: Links a native Python extension to CPython
    crit: baseline
    conf: 0.95
    any:
      - id: python3-dll-import
      - id: python-capi-symbol
      - id: python-pyinit-export


  - id: intel
    desc: Compiled with Intel compiler
    crit: notable
    conf: 0.9
    any:
      - id: intel-compiler
      - id: libiomp

  - id: musl
    desc: Linked with musl libc
    crit: notable
    conf: 0.9
    any:
      - id: musl-libc
      - id: musl-prefix
      - id: musl-macro

  - id: cross-compiled
    desc: Cross-compiled binary (different target arch)
    crit: notable
    conf: 0.75
    any:
      - id: arm-linux-gnu
      - id: aarch64-linux-gnu
      - id: mips-linux-gnu
      - id: powerpc-linux-gnu
      - id: x86-64-linux-musl
      - id: cross-suffix
