defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: gcc-compiler
    desc: GCC compiler signature
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: 'GCC: (GNU)'
      section: .text
  - id: gcc-ancient
    desc: 'Ancient GCC version'
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'GCC: \(GNU\) [23]\.[0-9]+\.[0-9]'
      section: .text
  - id: gcc-debian-prerelease
    desc: 'GCC Debian prerelease build'
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'GCC: \(GNU\) [0-9.]+.{0,30}Debian prerelease'
      section: .text
