defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: borland-rtl-regkey
    desc: Borland Delphi RTL registry key
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: SOFTWARE\Borland\Delphi\RTL
      section: .text
  - id: borland-locales-regkey
    desc: Borland locales registry key
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Software\Borland\Locales
      section: .text
  - id: dvclal-resource
    desc: DVCLAL Delphi VCL resource marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: DVCLAL
      section: .text
  - id: embarcadero-delphi-compiler-banner
    desc: Embarcadero Delphi compiler banner
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: (?i)Embarcadero Delphi for Win32 compiler version
  - id: borland-section-code
    desc: Borland CODE section name
    crit: component
    conf: 0.8
    if:
      type: section
      exact: CODE
      executable: true
  - id: svkp-section
    desc: SVKP section name
    crit: component
    conf: 0.9
    if:
      type: section
      regex: ^SVKP
composite_rules:
  - id: delphi
    desc: Compiled with Borland Delphi
    crit: baseline
    conf: 0.95
    any:
      - id: borland-rtl-regkey
      - id: dvclal-resource
      - id: embarcadero-delphi-compiler-banner
      - id: borland-locales-regkey
      - id: borland-section-code
  - id: svkp-delphi-layout
    desc: Delphi binary using SVKP packed-stub layout
    crit: component
    conf: 0.95
    all:
      - id: dvclal-resource
      - id: svkp-section
