defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: borland-rtl-regkey
    desc: Borland Delphi RTL registry key
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: SOFTWARE\Borland\Delphi\RTL
      section: .text
  - id: borland-locales-regkey
    desc: Borland locales registry key
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Software\Borland\Locales
      section: .text
  - id: dvclal-resource
    desc: DVCLAL Delphi VCL resource marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: DVCLAL
      section: .text
  - id: vcl-style-resource
    desc: Delphi VCL style resource marker
    crit: component
    conf: 0.95
    if:
      type: raw
      exact: VCLSTYLE
      section: .rsrc
  - id: borland-section-code
    desc: Borland CODE section name
    crit: component
    conf: 0.8
    if:
      type: section
      exact: CODE
      executable: true
  - id: svkp-section
    desc: SVKP section name
    crit: component
    conf: 0.9
    if:
      type: section
      regex: ^SVKP
composite_rules:
  - id: delphi
    desc: Compiled with Borland Delphi
    crit: baseline
    conf: 0.95
    any:
      - id: borland-rtl-regkey
      - id: dvclal-resource
      - id: borland-locales-regkey
      - id: borland-section-code
  - id: svkp-delphi-layout
    desc: Delphi binary using SVKP packed-stub layout
    crit: component
    conf: 0.95
    all:
      - id: dvclal-resource
      - id: svkp-section
  - id: versioned-vcl-app
    desc: Versioned Delphi VCL application profile
    crit: component
    conf: 0.85
    all:
      - id: dvclal-resource
      - id: vcl-style-resource
      - id: metadata/package/versioning::pe-version-resource
