# Yi Yuyan / E-Language (易语言, EPL) compiler fingerprint.
#
# Yi Yuyan is a Chinese-language visual-programming language whose compiler
# auto-injects its project URL into the produced PE's VS_VERSION_INFO
# `Comments` resource. The runtime is an MFC-skinned C++ host and is
# heavily over-represented in Chinese-origin RATs, stealers, droppers,
# and packers. The marker itself is neutral metadata — composites in
# objectives/* infer intent.
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: eyuyan-comments-url
    desc: Yi Yuyan compiler URL
    crit: baseline
    conf: 0.97
    if:
      type: text
      substr: "(http://www.eyuyan.com)"
      section: rdata

  - id: eyuyan-comments-url-https
    desc: Yi Yuyan compiler HTTPS URL
    crit: baseline
    conf: 0.97
    if:
      type: text
      substr: "(https://www.eyuyan.com)"
      section: rdata

composite_rules:
  - id: eyuyan
    desc: Compiled with Yi Yuyan / E-Language (EPL)
    crit: baseline
    conf: 0.97
    any:
      - id: eyuyan-comments-url
      - id: eyuyan-comments-url-https
