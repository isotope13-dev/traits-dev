# Compiler Detection Traits
# Detects GCC, Clang, MSVC, Intel, musl and other compiler toolchains
defaults:
  platforms: [windows]
  for: [pe]
traits:
  # === GCC micro-behaviors ===
  - id: gcc-comment
    desc: "GCC: comment string"
    crit: notable
    conf: 0.9
    if:
      type: string
      exact: "GCC:"
      section: .text
  - id: gcc-prefix
    desc: gcc- prefix
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "gcc-"
      section: .text
  - id: gnu-c
    desc: GNU C string
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "GNU C"
      section: .text
  - id: gnuc-macro
    desc: __GNUC__ macro
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "__GNUC__"
      section: .text
  - id: libgcc
    desc: libgcc library
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "libgcc"
      # === Clang micro-behaviors ===
      section: .text
  - id: clang-string
    desc: clang string
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "clang"
      section: .text
    not:
      - substr: "clang_rt."
  - id: llvm-string
    desc: LLVM string
    crit: notable
    conf: 0.9
    if:
      type: string
      exact: "LLVM"
      section: .text
  - id: clang-macro
    desc: __clang__ macro
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "__clang__"
      section: .text
  - id: libllvm
    desc: libLLVM library
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "libLLVM"
      # === MSVC micro-behaviors ===
      section: .text
  - id: msvc-string
    desc: MSVC string
    crit: notable
    conf: 0.9
    if:
      type: string
      exact: "MSVC"
      section: .text
  - id: msc-ver
    desc: _MSC_VER macro
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "_MSC_VER"
      section: .text
  - id: vcruntime
    desc: vcruntime library
    crit: baseline
    conf: 0.9
    if:
      type: string
      regex: "(?i)vcruntime"
      section: .text
  - id: msvcrt
    desc: msvcrt library (MSVC C runtime)
    crit: baseline
    conf: 0.9
    if:
      type: string
      regex: "(?i)msvcr"
      section: .text
  - id: ms-visual
    desc: Microsoft Visual string
    crit: baseline
    conf: 0.9
    if:
      type: string
      substr: "Microsoft Visual"
      # === Intel micro-behaviors ===
      section: .text
  - id: intel-r
    desc: Intel(R) branded string
    crit: baseline
    conf: 0.9
    if:
      type: string
      substr: "Intel(R)"
      section: .text
  - id: intel-compiler
    desc: __INTEL_COMPILER macro
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "__INTEL_COMPILER"
      section: .text
  - id: icc-string
    desc: icc compiler string
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "icc"
      section: .text
  - id: libiomp
    desc: libiomp OpenMP library
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "libiomp"
      # === musl micro-behaviors ===
      section: .text
  - id: musl-libc
    desc: musl libc string
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "musl libc"
      section: .text
  - id: musl-prefix
    desc: musl- prefix
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "musl-"
      section: .text
  - id: musl-macro
    desc: __musl__ macro
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "__musl__"
      # === Cross-compilation micro-behaviors ===
      section: .text
  - id: arm-linux-gnu
    desc: arm-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "arm-linux-gnu"
      section: .text
  - id: aarch64-linux-gnu
    desc: aarch64-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "aarch64-linux-gnu"
      section: .text
  - id: mips-linux-gnu
    desc: mips-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "mips-linux-gnu"
      section: .text
  - id: powerpc-linux-gnu
    desc: powerpc-linux-gnu cross compiler
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "powerpc-linux-gnu"
      section: .text
  - id: x86-64-linux-musl
    desc: x86_64-linux-musl cross compiler
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "x86_64-linux-musl"
      section: .text
  - id: cross-suffix
    desc: -cross suffix
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "-cross"
      section: .text
    not:
      - substr: "-crossover"
      - substr: "-crossing"
      - substr: "-crossplatform"
  # === Watcom C/C++ ===
  # Watcom C/C++ compiler (Sybase/Open Watcom) produces PE binaries with
  # unnamed RWX sections, minimal imports (runtime API resolution), and
  # single dominant section - all normal for this toolchain.
  - id: watcom-runtime
    desc: Watcom C/C++ runtime marker
    crit: baseline
    conf: 0.95
    if:
      type: string
      substr: "WATCOM C/C"
      section: rdata
composite_rules:
  # GCC composite
  - id: gcc
    desc: Compiled with GCC
    crit: notable
    conf: 0.9
    any:
      - id: gcc-comment
      - id: gcc-prefix
      - id: gnu-c
      - id: gnuc-macro
      - id: libgcc
  # Clang composite
  - id: clang
    desc: Compiled with Clang/LLVM
    crit: notable
    conf: 0.9
    any:
      - id: clang-string
      - id: llvm-string
      - id: clang-macro
      - id: libllvm
  # MSVC composite
  - id: msvc
    desc: Compiled with Microsoft Visual C++
    crit: notable
    conf: 0.9
    any:
      - id: msvc-string
      - id: msc-ver
      - id: vcruntime
      - id: msvcrt
      - id: ms-visual
  # Intel composite
  - id: intel
    desc: Compiled with Intel compiler
    crit: notable
    conf: 0.9
    any:
      - id: intel-r
      - id: intel-compiler
      - id: icc-string
      - id: libiomp
  # musl composite
  - id: musl
    desc: Linked with musl libc
    crit: notable
    conf: 0.9
    any:
      - id: musl-libc
      - id: musl-prefix
      - id: musl-macro
  # Cross-compilation composite
  - id: cross-compiled
    desc: Cross-compiled binary (different target arch)
    crit: notable
    conf: 0.75
    any:
      - id: arm-linux-gnu
      - id: aarch64-linux-gnu
      - id: mips-linux-gnu
      - id: powerpc-linux-gnu
      - id: x86-64-linux-musl
      - id: cross-suffix
