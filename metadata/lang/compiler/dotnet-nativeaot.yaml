defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: system-private-corelib
    desc: System.Private.CoreLib runtime marker
    crit: baseline
    conf: 0.95
    if:
      type: string
      substr: "System.Private.CoreLib"
      section: .rdata
  - id: readytorun-section-type
    desc: ReadyToRun section type marker
    crit: baseline
    conf: 0.95
    if:
      type: string
      substr: "ReadyToRunSectionType"
      section: .rdata
  - id: rhp-runtime-helper
    desc: NativeAOT Rhp runtime helper
    crit: baseline
    conf: 0.93
    if:
      type: string
      regex: '\bRhp[A-Za-z0-9_]{6,}\b'
      section: .rdata
  - id: aot-compat-warning
    desc: NativeAOT compatibility warning text
    crit: baseline
    conf: 0.95
    if:
      type: string
      regex: '(?i)(nativeaot-compatibilit|AOT compiler|compatible with AOT)'
      section: .rdata
  - id: huge-runtime-function-count
    desc: Native runtime has many functions
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: binary.function_count
      min: 2000
  - id: huge-runtime-average-function
    desc: Native runtime has huge functions
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: binary.avg_function_size
      min: 10000
  - id: native-runtime-large-file
    desc: Native runtime binary is large
    crit: baseline
    conf: 0.88
    if:
      type: metrics
      field: binary.file_size
      min: 1000000
composite_rules:
  - id: nativeaot-runtime-markers
    desc: NativeAOT runtime markers present
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: system-private-corelib
      - id: readytorun-section-type
      - id: rhp-runtime-helper
      - id: aot-compat-warning
  - id: nativeaot-large-runtime
    desc: Large NativeAOT runtime binary
    crit: baseline
    conf: 0.93
    all:
      - id: nativeaot-runtime-markers
      - id: huge-runtime-function-count
      - id: huge-runtime-average-function
      - id: native-runtime-large-file
