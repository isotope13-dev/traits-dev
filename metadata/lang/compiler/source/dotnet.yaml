defaults:
  for:
    - csharp
  platforms:
    - windows
traits:
  - id: decompiled-module-class
    desc: Decompiled synthetic .NET module class
    crit: baseline
    conf: 0.85
    if:
      type: raw
      regex: (?i)(static\s+<Module>\s*\(|\\u003CModule\\u003E|^\??<Module>::)
  - id: visual-basic-runtime-source
    desc: Visual Basic runtime references
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: Microsoft.VisualBasic
  - id: standard-module-attribute
    desc: Visual Basic standard module attribute
    crit: baseline
    conf: 0.9
    if:
      type: raw
      substr: '[StandardModule]'
  - id: hide-module-name-attribute
    desc: Visual Basic hidden module attribute
    crit: baseline
    conf: 0.9
    if:
      type: raw
      substr: '[HideModuleName]'
  - id: strongly-typed-resource-builder-source
    desc: StronglyTypedResourceBuilder source marker
    crit: baseline
    conf: 0.88
    if:
      type: raw
      substr: System.Resources.Tools.StronglyTypedResourceBuilder
  - id: jetbrains-decompiler-comment
    desc: JetBrains decompiler source comment
    crit: baseline
    conf: 0.85
    if:
      type: raw
      substr: Decompiled with JetBrains decompiler
  - id: vb-my-namespace-source
    desc: Visual Basic My namespace usage
    crit: baseline
    conf: 0.88
    if:
      type: raw
      regex: \b[A-Za-z_][A-Za-z0-9_]*\.My\b
  - id: winforms-timer-source
    desc: WinForms timer component usage
    crit: baseline
    conf: 0.82
    if:
      type: raw
      regex: \bSystem\.Windows\.Forms\.Timer\b
composite_rules:
  - id: vb-generated-resource-module
    desc: Generated Visual Basic resource module
    crit: notable
    conf: 0.9
    all:
      - id: standard-module-attribute
      - id: hide-module-name-attribute
      - id: strongly-typed-resource-builder-source
