defaults:
  platforms: [windows]
  crit: baseline
  conf: 0.9
  for: [vbs, data]
traits:
  - id: vbp-basename
    desc: VB6 project file name
    if:
      type: path
      basename: true
      regex: (?i)\.vbp$
  - id: frm-basename
    desc: VB6 form source name
    if:
      type: path
      basename: true
      regex: (?i)\.frm$
  - id: bas-basename
    desc: VB6 module source name
    if:
      type: path
      basename: true
      regex: (?i)\.bas$
  - id: vb6-project-type-exe
    desc: VB6 executable project type
    if:
      type: text
      regex: (?im)^Type=Exe\b
  - id: vb6-project-form-entry
    desc: VB6 form project entry
    if:
      type: text
      regex: (?i)^Form=.{0,50}\.frm$
  - id: vb6-project-module-entry
    desc: VB6 module project entry
    if:
      type: text
      regex: (?i)^Module=.{0,50}\.bas$
  - id: vb6-form-designer
    desc: VB6 form designer block
    if:
      type: text
      regex: (?m)^Begin VB\.Form\b
  - id: vb6-attribute-name
    desc: VB6 attribute module name
    if:
      type: text
      regex: (?m)^Attribute VB_Name =
composite_rules:
  - id: vb6-project-file
    desc: Visual Basic 6 project
    crit: baseline
    conf: 0.94
    all:
      - id: vbp-basename
      - id: vb6-project-type-exe
    any:
      - id: vb6-project-form-entry
      - id: vb6-project-module-entry
  - id: vb6-form-source
    desc: Visual Basic 6 form source
    crit: baseline
    conf: 0.95
    all:
      - id: frm-basename
      - id: vb6-form-designer
      - id: vb6-attribute-name
  - id: vb6-module-source
    desc: Visual Basic 6 module source
    crit: baseline
    conf: 0.93
    all:
      - id: bas-basename
      - id: vb6-attribute-name
