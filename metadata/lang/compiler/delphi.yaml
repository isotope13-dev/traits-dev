# Delphi/Borland Compiler Detection
# Detects Borland Delphi and C++ Builder compiled binaries
# Delphi is commonly used for malware droppers due to its
# large VCL framework providing legitimate appearance
defaults:
  for: [pe, dll]
traits:
  - id: borland-rtl-regkey
    desc: Borland Delphi RTL registry key
    crit: notable
    conf: 0.95
    if:
      type: string
      substr: "SOFTWARE\\Borland\\Delphi\\RTL"
  - id: borland-locales-regkey
    desc: Borland locales registry key
    crit: component
    conf: 0.9
    if:
      type: string
      substr: "Software\\Borland\\Locales"
  - id: dvclal-resource
    desc: DVCLAL Delphi VCL resource marker
    crit: notable
    conf: 0.95
    if:
      type: string
      exact: "DVCLAL"
  - id: borland-section-code
    desc: Borland CODE section name
    crit: component
    conf: 0.8
    if:
      type: section
      exact: "CODE"
      executable: true
composite_rules:
  - id: delphi
    desc: Compiled with Borland Delphi
    crit: notable
    conf: 0.95
    any:
      - id: borland-rtl-regkey
      - id: dvclal-resource
      - id: borland-locales-regkey
      - id: borland-section-code
