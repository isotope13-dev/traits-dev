# .NET source-language framework markers
defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: visual-basic-runtime-source
    desc: Visual Basic runtime references
    crit: baseline
    conf: 0.9
    if:
      type: string
      substr: "Microsoft.VisualBasic"
  - id: standard-module-attribute
    desc: Visual Basic standard module attribute
    crit: baseline
    conf: 0.9
    if:
      type: raw
      substr: "[StandardModule]"
  - id: vb-my-namespace-source
    desc: Visual Basic My namespace usage
    crit: baseline
    conf: 0.88
    if:
      type: raw
      regex: '\b[A-Za-z_][A-Za-z0-9_]*\.My\b'
  - id: winforms-timer-source
    desc: WinForms timer component usage
    crit: baseline
    conf: 0.82
    if:
      type: raw
      regex: '\bSystem\.Windows\.Forms\.Timer\b'
