defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [source, binaries]
traits:
  - id: fasm-format-pe
    desc: FASM PE format directive
    crit: baseline
    if:
      type: raw
      regex: format\s+PE\s+GUI
      section: .text
  - id: fasm-include-import
    desc: FASM import macro include
    crit: baseline
    if:
      type: raw
      regex: include\s+'include[\/]+macro[\/]+import\.inc'
      section: .text
  - id: asm-mnemonics-core
    desc: Assembly mnemonics
    crit: baseline
    if:
      type: raw
      regex: \b(pushad|popad|lea)\b
      section: .text
  - id: asm-push-register
    desc: Assembly push register
    crit: baseline
    if:
      type: raw
      regex: \bpush\s+(e?[abcd]x|r[0-9]{1,2})\b
      section: .text
  - id: asm-push-pointer
    desc: Assembly push pointer
    crit: baseline
    if:
      type: raw
      regex: \bpush\s+\[[^\]\n]{1,32}\]
      section: .text
  - id: asm-label
    desc: Assembly label pattern
    crit: baseline
    if:
      type: raw
      regex: ^\s{0,2}[a-zA-Z0-9_$]{1,20}:\s*$
      section: .text
composite_rules:
  - id: fasm-source
    desc: FASM assembly source code
    crit: baseline
    conf: 1.0
    all:
      - id: metadata/lang::fasm-format-pe
      - id: metadata/lang::fasm-include-import
  - id: generic-asm-source
    desc: Generic assembly source code
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/lang::asm-mnemonics
      - id: metadata/lang::asm-label
    unless:
      - id: metadata/lang/shebang::perl
      - id: metadata/lang/shebang::sh
  - id: asm-mnemonics
    desc: Assembly mnemonics
    crit: baseline
    any:
      - id: metadata/lang::asm-mnemonics-core
      - id: metadata/lang::asm-push-register
      - id: metadata/lang::asm-push-pointer
