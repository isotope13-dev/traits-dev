# Linking and Static Compilation Detection
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === Static linking micro-behaviors ===
  - id: statically-linked
    desc: statically linked string
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "statically linked"
      section: .text
  - id: ld-linux-interp
    desc: /lib/ld-linux interpreter
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "/lib6?4?/ld-linux"
      section: .text
