defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: go-cshared-dll
    desc: Go DLL compiled as c-shared library
    crit: notable
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      substr: -buildmode=c-shared
      section: .data
  - id: go-trimpath
    desc: Go binary built with trimpath flag
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: -trimpath=true
      section: .data
  - id: go-trimpath-build-setting
    desc: Go build metadata records trimpath
    crit: baseline
    conf: 0.95
    for: [pe, dll]
    platforms: [windows]
    if:
      type: value
      path: pe.go.build_settings.-trimpath
      exact: 'true'
