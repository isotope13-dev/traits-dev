# Go Build Flags
# Detects Go build configuration flags embedded in binaries.
# Go embeds build metadata in the binary's .data section via "Go buildinf:".
defaults:
  platforms: [linux, unix, android, windows, macos, ios]
  for: [elf, pe, macho, dll]
traits:
  - id: go-cshared-dll
    desc: Go DLL compiled as c-shared library
    crit: notable
    conf: 0.95
    for: [pe, dll]
    platforms: [windows]
    if:
      type: string_value
      substr: '-buildmode=c-shared'
      section: .data
  - id: go-trimpath
    desc: Go binary built with trimpath flag
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: '-trimpath=true'
      section: .data
