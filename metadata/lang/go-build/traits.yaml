defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: go-cshared-dll
    desc: Go DLL compiled as c-shared library
    crit: notable
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      substr: -buildmode=c-shared
      section: .data
  - id: go-trimpath
    desc: Go binary built with trimpath flag
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: -trimpath=true
      section: .data
