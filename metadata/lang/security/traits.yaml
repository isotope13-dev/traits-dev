defaults:
  platforms: [unix, windows]
  for: [source, -c]
traits:
  - id: stack-chk-fail
    desc: __stack_chk_fail function
    crit: baseline
    conf: 0.9
    for: [cpp, go, java, rust]
    size_min: 1
    if:
      id: metadata/hardening/build::stack-chk-fail
  - id: fortify-fail
    desc: __fortify_fail function
    crit: notable
    conf: 0.85
    for: [cpp, go, java, rust]
    size_min: 1
    if:
      id: metadata/hardening/build::fortify-fail
  - id: chk-fail
    desc: __chk_fail function
    crit: notable
    conf: 0.85
    for: [cpp, go, java, rust]
    size_min: 1
    if:
      id: metadata/hardening/build::chk-fail
  - id: chk-suffix
    desc: _chk@ function suffix
    crit: notable
    conf: 0.85
    for: [cpp, go, java, rust]
    size_min: 1
    if:
      id: metadata/hardening/build::chk-suffix
  - id: memcpy-chk
    desc: __memcpy_chk function
    crit: notable
    conf: 0.85
    for: [cpp, go, java, rust]
    size_min: 1
    if:
      id: metadata/hardening/build::memcpy-chk
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: strcpy-chk
    desc: __strcpy_chk function
    crit: notable
    conf: 0.85
    for: [cpp, go, java, rust]
    size_min: 1
    if:
      id: metadata/hardening/build::strcpy-chk
composite_rules:
  - id: pie
    desc: Position Independent Executable (PIE)
    crit: notable
    conf: 0.85
    any:
      - id: metadata/hardening/build::pie-macro
      - id: metadata/hardening/build::fpie-flag
  - id: stack-protector
    desc: Stack protector/canary enabled
    crit: notable
    conf: 0.9
    any:
      - id: stack-chk-fail
      - id: metadata/hardening/build::stack-chk-guard
      - id: metadata/hardening/build::fstack-protector
  - id: fortify
    desc: FORTIFY_SOURCE hardening enabled
    crit: notable
    conf: 0.85
    any:
      - id: fortify-fail
      - id: chk-fail
      - id: chk-suffix
      - id: memcpy-chk
      - id: strcpy-chk
  - id: relro
    desc: RELRO hardening enabled
    crit: notable
    conf: 0.8
    any:
      - id: metadata/hardening/build::gnu-relro
      - id: metadata/hardening/build::got-section
