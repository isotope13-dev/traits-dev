defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: js-comma-sequence-count-5
    desc: 5+ comma sequence expressions
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: 'ast.sequence_count'
      min: 5
    downgrade:
      any:
        - type: string_literal
          regex: BinaryParser
        - type: text
          regex: typeof\s+module\s*!=\s*['"]undefined['"]
        - type: text
          regex: typeof\s+window\s*!=\s*['"]undefined['"]
    unless:
      - id: metadata/library/structure/
      - id: metadata/library/web-frameworks/
      - id: metadata/lang/compiled::erlang-module-marker
    not:
      - substr: __webpack_module_cache__
  - id: shuffling-mdy-swapper
    desc: "Custom character shuffling swapper (MDy-style)"
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: "function\\s+\\w{3}\\(f\\)\\{var\\s+r=\\d+;var\\s+w=f\\.length;var\\s+h=\\[\\];"
  - id: shuffling-alphabet-scaffold
    desc: "Shuffled alphabet string for deobfuscation"
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: "['\"]\\w{25,}['\"]\\.substr\\(0,"
  - id: global-alias-require
    desc: "Aliasing require to a global variable"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "global\\[['\"]r['\"]\\]\\s*=\\s*require"
  - id: global-campaign-tag
    desc: "Global campaign identifier assignment"
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "global\\[['\"]_V['\"]\\]\\s*="
  - id: js-obfuscator-while-loop
    desc: "javascript-obfuscator while(!![]) loop"
    crit: component
    conf: 0.9
    for: [data, javascript, typescript, shell]
    if:
      type: text
      substr: "while(!![])"
composite_rules:
  - id: dprk-shuffling-stager
    desc: "DPRK-style shuffled stager scaffold"
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/lang/javascript-features::shuffling-mdy-swapper
      - id: metadata/lang/javascript-features::global-alias-require
      - id: metadata/lang/javascript-features::global-campaign-tag
