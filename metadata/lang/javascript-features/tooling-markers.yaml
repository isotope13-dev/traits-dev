# Neutral JS/TS build-tooling content markers, used as FP-suppression context by
# other rules (Closure Compiler externs, embedded source-map sourcesContent).
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  size_min: 1
  size_max: 500000000
  crit: baseline
traits:
  - id: closure-externs-annotation
    desc: Closure Compiler @externs annotation
    if:
      type: text
      substr: '@externs'
  - id: sourcemap-sources-content
    desc: Embedded source-map sourcesContent array
    if:
      type: text
      substr: '"sourcesContent":['
