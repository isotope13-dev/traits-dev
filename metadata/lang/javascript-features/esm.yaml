defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: export-const-func-class
    desc: Exports an ES module declaration
    crit: baseline
    conf: 0.75
    unless:
      - id: metadata/file/format::sourcemap
    if:
      type: string_literal
      regex: ^export (const|function|class)
  - id: export-let-var-async
    desc: Exports an ES module variable or function
    crit: baseline
    conf: 0.75
    unless:
      - id: metadata/file/format::sourcemap
    if:
      type: string_literal
      regex: ^export (let|var|async)
  - id: export-default-const-func-class
    desc: Exports an ES module declaration
    crit: baseline
    conf: 0.8
    unless:
      - id: metadata/file/format::sourcemap
    if:
      type: string_literal
      regex: ^export\s+(default|const|function|class)
  - id: export-async-let-var-brace
    desc: Exports an ES module variable or binding
    crit: baseline
    conf: 0.8
    unless:
      - id: metadata/file/format::sourcemap
    if:
      type: string_literal
      regex: ^export\s+(async|let|var|\{)
composite_rules:
  - id: esm-export-keyword
    desc: Uses ES module exports
    crit: notable
    conf: 0.75
    any:
      - id: export-const-func-class
      - id: export-let-var-async
  - id: esm-export
    desc: Uses ES module exports
    crit: notable
    conf: 0.85
    any:
      - id: export-default-const-func-class
      - id: export-async-let-var-brace
