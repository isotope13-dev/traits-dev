defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: module-exports-object
    desc: Assigns a CommonJS default export
    crit: baseline
    conf: 0.6
    unless:
      - id: metadata/package/documentation/
      - id: metadata/file/format::sourcemap
      - type: text
        substr: "0 && (module.exports = {"
    if:
      type: text
      regex: (^|[^\w$.])module\.exports = \{

  - id: cjs-exports-pattern
    desc: Defines CommonJS named exports
    crit: notable
    conf: 0.6
    count_min: 2
    not:
      - substr: exports.mode =
      - substr: exports.getWorkingDirectoryFrom =
      - substr: exports.getWorkingDirectoryFrom
      - substr: exports.get = function
      - substr: exports.matchScript =
      - substr: exports.WindowsPtyAgent =
      - substr: exports.spawn =
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,220}\.(js|ts)$
      - type: text
        substr: 'Object.defineProperty(exports, "__esModule"'
      - id: metadata/package/documentation/
      - id: metadata/file/format::sourcemap
    if:
      type: text
      regex: (^|[^\w$.])exports\.[a-zA-Z]+ =
