defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: global-this-alias-assignment
    desc: JavaScript assigns global this alias
    crit: baseline
    conf: 0.7
    size_max: 500000
    count_min: 2
    if:
      type: text
      regex: '\b\w+\s*=\s*this\b([^\.]|$)'
    not:
      - substr: '"version":3,"file":'
      - substr: '"sourcesContent":['
      - substr: "f=this,"
      - regex: '\b(var|let|const)\s+\w+\s*=\s*this\b'
      - regex: '\b__import[A-Za-z]+\s*=\s*this\b'
      - regex: '\b\w+\s*=\s*this\s*\['
      - regex: '\b_?this\s*=\s*this\b'
      - regex: '\b(that|self|parent|root|global|window|globalThis|me)\s*=\s*this\b'
  - id: has-class-basic
    desc: Code defines JavaScript/TypeScript classes
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: (^|\n)(export\s+)?class\s+[A-Z][a-zA-Z0-9_]*\s*\{
  - id: has-class-extends
    desc: Code defines classes with inheritance
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: class\s+[A-Z][a-zA-Z0-9_]*\s+extends\s+
  - id: has-async-await
    desc: Code uses async/await patterns
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      regex: async\s+function|async\s*\(|await\s+
  - id: has-promise-new
    desc: Constructs a JavaScript Promise
    if:
      type: text
      substr: new Promise(
  - id: has-promise-then
    desc: Code uses .then/catch
    if:
      type: string_literal
      regex: \.(then|catch)\(
  - id: has-promise-methods-1
    desc: Code uses Promise.all/race
    if:
      type: string_literal
      regex: Promise\.(all|race)
  - id: has-promise-methods-2
    desc: Code uses Promise.resolve/reject
    if:
      type: string_literal
      regex: Promise\.(resolve|reject)
  - id: has-decorators-1
    desc: 'uses TS/ES decorators'
    if:
      type: string_literal
      regex: '@(Controller|Injectable|Service)'
  - id: has-decorators-2
    desc: 'uses TS/ES decorators'
    if:
      type: string_literal
      regex: '@(Module|Component|Prop|Watch)'
  - id: has-error-class
    desc: Code defines custom error classes
    crit: baseline
    conf: 0.85
    if:
      type: string_literal
      regex: class\s+\w+Error\s+extends\s+Error
  - id: has-accessors
    desc: Code uses getters/setters
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: \bget\s+\w+\s*\(\)|\bset\s+\w+\s*\(
  - id: has-symbols-base
    desc: Symbol constructor usage marker
    if:
      type: symbol
      exact: Symbol
  - id: has-symbols-iter
    desc: Code uses Symbol iterators
    if:
      type: string_literal
      regex: Symbol\.(for|iterator|asyncIterator)
  - id: has-weak-collections-map
    desc: Code uses WeakMap
    if:
      type: string_literal
      substr: new WeakMap
  - id: has-weak-collections-set
    desc: Code uses WeakSet
    if:
      type: string_literal
      substr: new WeakSet
  - id: object-define-property
    desc: Object.defineProperty call marker
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: Object.defineProperty
  - id: has-proxy
    desc: Code uses Proxy for metaprogramming
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: new\s+Proxy\s*\(
  - id: has-generators
    desc: Code uses generator functions
    crit: baseline
    conf: 0.85
    if:
      type: string_literal
      regex: function\s*\*|yield\s+
  - id: promise-test-call
    desc: promise_test() WPT call
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      exact: promise_test
  - id: async-test-call
    desc: async_test() WPT call
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      exact: async_test
  - id: js-self-compare-count-2
    desc: JavaScript self-comparison count
    crit: notable
    conf: 0.8
    for: [javascript]
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/library/structure/
      - id: metadata/file/extension/identity::c3-source-basename
      - id: metadata/file/extension/identity::haskell-source-basename
    if:
      type: metrics
      field: 'ast.self_compare_count'
      min: 2
composite_rules:
  - id: has-class
    desc: Code defines JavaScript/TypeScript classes
    crit: baseline
    conf: 0.8
    any:
      - id: has-class-basic
      - id: has-class-extends
  - id: has-promise
    desc: Promise usage markers
    crit: baseline
    conf: 0.7
    any:
      - id: has-promise-new
      - id: has-promise-then
      - id: has-promise-methods-1
      - id: has-promise-methods-2
  - id: has-decorators
    desc: Code uses TypeScript/ES decorators
    crit: baseline
    conf: 0.85
    any:
      - id: has-decorators-1
      - id: has-decorators-2
  - id: has-symbols
    desc: Symbol-based private field marker
    crit: baseline
    conf: 0.85
    any:
      - id: has-symbols-base
      - id: has-symbols-iter
  - id: has-weak-collections
    desc: Code uses WeakMap/WeakSet patterns
    crit: baseline
    conf: 0.85
    any:
      - id: has-weak-collections-map
      - id: has-weak-collections-set
