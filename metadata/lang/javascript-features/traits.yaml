# Modern JavaScript Language Features
# Classes, async/await, generators, proxies, etc.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: has-class-basic
    desc: Code defines JavaScript/TypeScript classes
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "(^|\\n)(export\\s+)?class\\s+[A-Z][a-zA-Z0-9_]*\\s*\\{"
  - id: has-class-extends
    desc: Code defines classes with inheritance
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "class\\s+[A-Z][a-zA-Z0-9_]*\\s+extends\\s+"
  # Has JSDoc comments
  - id: has-async-await
    desc: Code uses async/await patterns
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: "async\\s+function|async\\s*\\(|await\\s+"
  - id: has-promise-new
    desc: Code uses new Promise
    if: { type: raw, substr: "new Promise(" }
  - id: has-promise-then
    desc: Code uses .then/catch
    if: { type: string_value, regex: "\\.(then|catch)\\(" }
  - id: has-promise-methods-1
    desc: Code uses Promise.all/race
    if: { type: string_value, regex: "Promise\\.(all|race)" }
  - id: has-promise-methods-2
    desc: Code uses Promise.resolve/reject
    if: { type: string_value, regex: "Promise\\.(resolve|reject)" }
  - id: has-decorators-1
    desc: uses TS/ES decorators (Controller/Injectable/Service)
    if: { type: string_value, regex: "@(Controller|Injectable|Service)" }
  - id: has-decorators-2
    desc: uses TS/ES decorators (Module/Component/Prop/Watch)
    if: { type: string_value, regex: "@(Module|Component|Prop|Watch)" }
  # Has dependency injection
  - id: has-error-class
    desc: Code defines custom error classes
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      regex: "class\\s+\\w+Error\\s+extends\\s+Error"
  # Has getter/setter
  - id: has-accessors
    desc: Code uses getters/setters
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "\\bget\\s+\\w+\\s*\\(\\)|\\bset\\s+\\w+\\s*\\("
  - id: has-symbols-base
    desc: Code uses Symbol constructor
    if: { type: raw, substr: "Symbol(" }
  - id: has-symbols-iter
    desc: Code uses Symbol iterators
    if: { type: string_value, regex: "Symbol\\.(for|iterator|asyncIterator)" }
  - id: has-weak-collections-map
    desc: Code uses WeakMap
    if: { type: string_value, substr: "new WeakMap" }
  - id: has-weak-collections-set
    desc: Code uses WeakSet
    if: { type: string_value, substr: "new WeakSet" }
  - id: object-define-property
    desc: Object.defineProperty call
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: "Object.defineProperty"
  # Has Proxy usage
  - id: has-proxy
    desc: Code uses Proxy for metaprogramming
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "new\\s+Proxy\\s*\\("
  # Has generator functions
  - id: has-generators
    desc: Code uses generator functions
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      regex: "function\\s*\\*|yield\\s+"
  # Multiple export patterns
  - id: promise-test-call
    desc: promise_test() WPT call
    crit: baseline
    conf: 0.95
    if:
      type: raw
      substr: "promise_test("
  - id: async-test-call
    desc: async_test() WPT call
    crit: baseline
    conf: 0.95
    if:
      type: raw
      substr: "async_test("
composite_rules:
  - id: has-class
    desc: Code defines JavaScript/TypeScript classes
    crit: baseline
    conf: 0.8
    any:
      - id: has-class-basic
      - id: has-class-extends
  - id: has-promise
    desc: Code uses Promises
    crit: baseline
    conf: 0.7
    any:
      - id: has-promise-new
      - id: has-promise-then
      - id: has-promise-methods-1
      - id: has-promise-methods-2
  - id: has-decorators
    desc: Code uses TypeScript/ES decorators
    crit: baseline
    conf: 0.85
    any:
      - id: has-decorators-1
      - id: has-decorators-2
  - id: has-symbols
    desc: Code uses Symbol for private
    crit: baseline
    conf: 0.85
    any:
      - id: has-symbols-base
      - id: has-symbols-iter
  - id: has-weak-collections
    desc: Code uses WeakMap/WeakSet patterns
    crit: baseline
    conf: 0.85
    any:
      - id: has-weak-collections-map
      - id: has-weak-collections-set
