defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: arrow-function
    desc: ES6 arrow function syntax
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: =>\s*[{(]
  - id: async-await
    desc: ES2017 async/await syntax
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: \b(async\s+function|await\s+)
  - id: es6-class
    desc: ES6 class declaration
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: \bclass\s+[A-Z][a-zA-Z0-9_]*\s*(extends\s+[A-Z][a-zA-Z0-9_]*\s*)?\{
  - id: template-literal
    desc: ES6 template literal syntax
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: '`[^`]{0,120}\$\{'
  - id: const-let
    desc: ES6 const/let declarations
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: \b(const|let)\s+[a-zA-Z_]
  - id: destructuring
    desc: ES6 destructuring assignment
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: (const|let|var)\s*\{[^}]{1,120}\}\s*=
  - id: spread-operator
    desc: ES6 spread operator (in array/object context)
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: '[\[{,]\s*\.\.\.\w+|function\s*\([^)]{0,100}\.\.\.\w+'
composite_rules:
  - id: modern-javascript
    desc: Code uses modern JavaScript (ES6+)
    crit: baseline
    conf: 0.9
    needs: 2
    any:
      - id: arrow-function
      - id: async-await
      - id: es6-class
      - id: template-literal
      - id: const-let
      - id: destructuring
      - id: spread-operator
