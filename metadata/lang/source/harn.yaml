defaults:
  platforms: [unix, windows]
  for: [text]
traits:
  - id: harn-source-basename
    desc: Harn source basename
    crit: baseline
    conf: 0.96
    if:
      type: path
      basename: true
      regex: '\.harn(\.prompt)?$'
  - id: harn-stdlib-catalog-source
    desc: Harn stdlib source catalog
    crit: baseline
    conf: 0.98
    for: [rust]
    if:
      type: text
      substr: "Canonical embedded Harn standard library source catalog"
  - id: harn-function-signature
    desc: Harn function signature
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '(?m)^fn\s+[A-Za-z_]\w*\(.{0,90}\)\s*->\s*\w+\s*\{'

composite_rules:
  - id: harn-source-context
    desc: Harn source context
    crit: baseline
    conf: 0.96
    any:
      - id: harn-source-basename
      - id: harn-stdlib-catalog-source
      - id: harn-function-signature
