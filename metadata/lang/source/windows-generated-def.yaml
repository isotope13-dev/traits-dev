defaults:
  for: [python]
  platforms: [windows, unix]
  crit: component
  conf: 0.95
traits:
  - id: windows-generated-def-path
    desc: Generated Windows definitions source
    if:
      type: text
      regex: '(?m)^(from \.(flag|windef) import|import windows # Allow extended-struct)'
  - id: windows-def-windef-table
    desc: Large generated string table
    if:
      type: metrics
      field: strings.total
      min: 10000
  - id: windows-def-walker
    desc: Generated definition table walker
    if:
      type: symbol
      exact: generate_walker
composite_rules:
  - id: windows-generated-def-table
    desc: Generated Windows definition table
    crit: baseline
    all:
      - id: windows-def-windef-table
      - id: windows-def-walker
