defaults:
  platforms: [unix, windows]
  for: [source]
  crit: baseline
  conf: 0.96

traits:
  - id: yara-rule-keyword
    desc: YARA rule declaration
    if:
      type: text
      regex: 'rule\s+[A-Za-z0-9_]+\s*\{'
  - id: yara-strings-section
    desc: YARA strings section
    if:
      type: text
      substr: 'strings:'
  - id: yara-condition-section
    desc: YARA condition section
    if:
      type: text
      substr: 'condition:'

composite_rules:
  - id: yara-rule-source
    desc: YARA detection rule source
    crit: component
    all:
      - id: metadata/file/extension/identity::yara-extension
      - id: yara-rule-keyword
      - id: yara-strings-section
      - id: yara-condition-section
