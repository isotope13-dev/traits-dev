# Atomic source-import detection traits.  Read directly from
# cleave's `source.imports` kv subtree (sorted distinct list of
# import symbols extracted by the unified analyzer's tree-sitter
# walk). These are component / baseline atoms — composites in
# `objectives/` reference them to express dropper / exfil intent.
#
# More precise than `type: text, substr: "subprocess"` because the
# kv source is the AST's import-statement extraction, not raw text:
# false-positives on the same string in comments / docstrings /
# unrelated arguments don't fire.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  conf: 0.95
  size_min: 16
  size_max: 50000000
traits:
  - id: imports-subprocess
    desc: Source imports subprocess module
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^subprocess(\\.|$)"
  - id: imports-os-system
    desc: Source uses os.system shell exec
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^os\\.system$"
  - id: imports-base64
    desc: Source references base64 (import or shell command)
    crit: baseline
    if:
      type: kv
      path: source.imports
      regex: "^base64(\\.|$)"
  - id: imports-requests
    desc: Source imports requests library
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^requests(\\.|$)"
  - id: imports-urllib-request
    desc: Source imports urllib.request
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^urllib\\.request(\\.|$)"
  - id: imports-pickle
    desc: Source imports pickle module
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^c?pickle(\\.|$)"
  - id: imports-cryptography
    desc: Source imports cryptography library
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^cryptography\\."
  - id: imports-marshal
    desc: Source imports marshal module
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^marshal(\\.|$)"
  - id: imports-ctypes
    desc: Source imports ctypes module
    crit: notable
    if:
      type: kv
      path: source.imports
      regex: "^ctypes(\\.|$)"
composite_rules:
  # Helper atoms — fire when any of a family is present.  Composites
  # below reference these to express "X AND (Y OR Z)" cleanly given
  # the flat composite DSL.
  - id: imports-http-fetch
    desc: Source uses HTTP fetch library
    crit: component
    any:
      - id: imports-requests
      - id: imports-urllib-request
  - id: imports-encoding-or-marshal
    desc: Source references base64 or marshal (encoding/serialization)
    crit: component
    any:
      - id: imports-base64
      - id: imports-marshal
  - id: dropper-import-pattern
    desc: Imports encoding and HTTP client modules
    crit: baseline
    all:
      - id: imports-base64
      - id: imports-http-fetch
  - id: serialized-payload-pattern
    desc: Imports both pickle and HTTP fetch
    crit: suspicious
    all:
      - id: imports-pickle
      - id: imports-http-fetch
  - id: shellcode-loader-pattern
    desc: Imports ctypes plus encoding family
    crit: suspicious
    all:
      - id: imports-ctypes
      - id: imports-encoding-or-marshal
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/harness/unit::python-stdlib-test-support
