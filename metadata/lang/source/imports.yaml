# Atomic source-import detection traits. Read from filefacts-backed
# import symbols extracted by cleave's unified analyzer/tree-sitter
# path. These are component / baseline atoms — composites in
# `objectives/` reference them to express dropper / exfil intent.
#
# More precise than `type: text, substr: "subprocess"` because the
# import source is the AST's import-statement extraction, not raw text:
# false-positives on the same string in comments / docstrings /
# unrelated arguments don't fire.
defaults:
  platforms: [unix, windows]
  for: [python]
  conf: 0.95
  size_min: 16
  size_max: 50000000
traits:
  - id: imports-subprocess
    desc: Imports subprocess module
    crit: notable
    if:
      type: text
      regex: '(?m)^\s*(import\s+subprocess\b|from\s+subprocess\s+import\b)'
  - id: imports-os-system
    desc: Source uses os.system shell exec
    crit: notable
    if:
      type: import
      regex: "^os\\.system$"
  # base64 (encode/decode) and pickle (deserialization) are capability
  # observations, not file metadata — they live in micro-behaviors/data/
  # (encode/base64::import-base64, serialize/unsafe/python::import-pickle).
  # The engine also emits a neutral import node at metadata/import/python/<mod>,
  # which the composites below reference so the dropper/serializer patterns
  # stay expressible from this metadata tier.
  - id: imports-requests
    desc: Source references requests library
    crit: notable
    if:
      type: import
      regex: "^requests(\\.|$)"
  - id: imports-urllib-request
    desc: Source imports urllib.request
    crit: notable
    if:
      type: import
      regex: "^urllib\\.request(\\.|$)"
  - id: imports-cryptography
    desc: Source imports cryptography library
    crit: notable
    if:
      type: import
      regex: "^cryptography\\."
  - id: imports-marshal
    desc: Source imports marshal module
    crit: notable
    if:
      type: import
      regex: "^marshal(\\.|$)"
  - id: imports-ctypes
    desc: Source imports ctypes module
    crit: notable
    if:
      type: import
      regex: "^ctypes(\\.|$)"
composite_rules:
  # Helper atoms — fire when any of a family is present.  Composites
  # below reference these to express "X AND (Y OR Z)" cleanly given
  # the flat composite DSL.
  - id: imports-http-fetch
    desc: Source uses HTTP fetch library
    crit: component
    any:
      - id: imports-requests
      - id: imports-urllib-request
  - id: imports-encoding-or-marshal
    desc: Source references base64 or marshal (encoding/serialization)
    crit: component
    any:
      - id: metadata/import/python/base64
      - id: imports-marshal
  - id: dropper-import-pattern
    desc: Imports encoding and HTTP client modules
    crit: baseline
    all:
      - id: metadata/import/python/base64
      - id: imports-http-fetch
  - id: serialized-payload-pattern
    desc: Imports both pickle and HTTP fetch
    crit: suspicious
    all:
      - id: metadata/import/python/pickle
      - id: imports-http-fetch
  - id: shellcode-loader-pattern
    desc: Imports ctypes plus encoding family
    crit: baseline
    all:
      - id: imports-ctypes
      - id: imports-encoding-or-marshal
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/harness/unit::python-stdlib-test-support
