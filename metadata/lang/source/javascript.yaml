defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: js-ts-source-basename
    desc: JavaScript or TypeScript basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: \.([cm]?js|jsx|[cm]?ts|tsx)$
  - id: c-or-template-basename
    desc: C-family template basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: \.(h|hpp)\.in$|\.cu$
  - id: js-test-or-spec-basename
    desc: JavaScript test spec basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: '(^|[-_.])(test|tests|spec)\.[cm]?[jt]sx?$'
