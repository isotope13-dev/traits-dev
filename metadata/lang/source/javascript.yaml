defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: js-ts-source-basename
    desc: JavaScript or TypeScript basename
    crit: baseline
    conf: 0.95
    if:
      type: path
      basename: true
      regex: \.([cm]?js|jsx|[cm]?ts|tsx)$
  - id: c-or-template-basename
    desc: C-family template basename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: \.(h|hpp)\.in$|\.cu$
  - id: js-test-or-spec-basename
    desc: JavaScript test spec basename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(^|[-_.])(test|tests|spec)\.[cm]?[jt]sx?$'
  - id: interface-only-source
    desc: TypeScript interface declaration in source
    crit: component
    conf: 1.0
    for: [typescript]
    if:
      type: text
      regex: '^\s*(export\s+)?interface\s+[A-Za-z_][A-Za-z0-9_]*'
