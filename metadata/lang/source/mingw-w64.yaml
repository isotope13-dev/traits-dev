defaults:
  for: [c, cpp]
  platforms: [windows]
  crit: baseline
  conf: 0.95
traits:
  - id: mingw-pseudo-reloc-source
    desc: MinGW pseudo-relocation source code
    if:
      type: text
      substr: 'runtime_pseudo_reloc version 2'
  - id: reactos-crt-pseudo-reloc
    desc: ReactOS CRT pseudo-relocation source from MinGW
    if:
      type: text
      substr: 'Contributed by Egor Duda'
