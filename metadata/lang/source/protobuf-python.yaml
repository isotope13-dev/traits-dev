defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  conf: 0.98

traits:
  - id: python-protobuf-generated
    desc: Generated Python protobuf source
    if:
      type: text
      substr: "Generated by the protocol buffer compiler.  DO NOT EDIT!"
  - id: python-mypy-protobuf-generated
    desc: Generated mypy-protobuf source
    if:
      type: text
      substr: "@generated by mypy-protobuf.  Do not edit manually!"
  - id: python-protobuf-stub
    desc: Generated Python protobuf type stub
    if:
      type: path
      regex: '(^|[\\/!]).*_pb2(_grpc)?\.pyi$'
  - id: python-generated-basename
    desc: Generated Python source basename
    conf: 0.9
    if:
      type: path
      regex: '(^|[\\/!])_generated[^\\/!]*\.py$'
  - id: python-generated-reexport
    desc: Generated Python API re-export module
    conf: 0.9
    if:
      type: text
      regex: 'from \._generated import [\s\S]{0,600}\b[A-Za-z0-9_]+ as [A-Za-z0-9_]+'
