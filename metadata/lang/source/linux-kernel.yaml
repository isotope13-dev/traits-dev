defaults:
  platforms: [unix]
  for: [shell, c, cpp, text, archive]
  crit: baseline
  conf: 0.98

traits:
  - id: linux-kernel-arch-source-path
    desc: Linux kernel architecture source path
    crit: baseline
    if:
      type: path
      regex: '\barch/[A-Za-z0-9_-]+/kernel\b'
  - id: linux-kernel-header-source-path
    desc: Linux kernel header source path
    if:
      type: path
      regex: 'usr/src|asm-generic|include/(asm|linux|drm|mtd|rdma|xen)'
  - id: linux-kernel-build-script-path
    desc: Linux kernel rustc LLVM helper
    for: [shell]
    if:
      type: basename
      exact: rustc-llvm-version.sh
