defaults:
  platforms: [unix]
  for: [shell, c, cpp, text, archive]
  crit: baseline
  conf: 0.98

traits:
  - id: linux-kernel-arch-source-path
    desc: Linux kernel architecture source path
    crit: baseline
    if:
      type: path
      regex: '(^|[\/])arch([\/]|$)'
  - id: linux-kernel-header-source-path
    desc: Linux kernel header source path
    if:
      type: path
      regex: 'usr/src|asm-generic|include/(asm|linux|drm|mtd|rdma|xen)'
  - id: linux-kernel-primary-tree-path
    desc: Linux kernel primary source tree path
    crit: baseline
    for: [c, elf, shell, python]
    if:
      type: path
      regex: '(^|[\\/])(arch|drivers|include|kernel)([\\/]|$)'
  - id: linux-kernel-secondary-tree-path
    desc: Linux kernel secondary source tree path
    crit: baseline
    for: [c, elf, shell, python]
    if:
      type: path
      regex: '(^|[\\/])(net|rust|security|Documentation)([\\/]|$)'
  - id: linux-kernel-build-script-path
    desc: Linux kernel rustc LLVM helper script
    for: [shell]
    if:
      type: basename
      exact: rustc-llvm-version.sh

composite_rules:
  - id: linux-kernel-source-tree-path
    desc: Linux kernel source tree path
    crit: baseline
    for: [c, elf, shell, python]
    any:
      - id: linux-kernel-primary-tree-path
      - id: linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
