defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, rust, python]
  crit: baseline
  conf: 0.9

traits:
  - id: codegen-source-path
    desc: Code generation source path
    if:
      type: path
      regex: '(^|[\\/])(codegen|_?generated|templates?|yarr)([\\/]|$)'
  - id: hare-source-path
    desc: Hare source file path
    crit: baseline
    conf: 0.99
    for: [shell]
    if:
      type: path
      basename: true
      regex: '^[A-Za-z0-9_.+ -]{1,120}\.ha$'
