defaults:
  platforms: [windows, unix]
  for: [javascript, text]

traits:
  - id: haxe-source-basename
    desc: Haxe source basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '\.hx$'

  - id: haxe-package-line
    desc: Haxe package declaration
    crit: baseline
    conf: 0.92
    if:
      type: text
      regex: '^package\s+[A-Za-z0-9_.]*;'

composite_rules:
  - id: haxe-source
    desc: Haxe source context
    crit: baseline
    conf: 0.95
    any:
      - id: haxe-source-basename
      - id: haxe-package-line
