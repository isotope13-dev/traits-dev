defaults:
  platforms: [windows, unix]
  crit: component
  conf: 0.85

traits:
  - id: generated-code-do-not-edit-text
    desc: Generated code do-not-edit warning
    for: [source, scripts]
    if:
      type: text
      regex: '(code generated|generated code).{0,50}do not edit'
      case_insensitive: true
  - id: do-not-edit-generated-text
    desc: Do-not-edit generated source warning
    for: [source, scripts]
    if:
      type: text
      regex: 'do not edit.{0,80}generated'
      case_insensitive: true
  - id: do-not-modify-by-hand-text
    desc: Do-not-modify-by-hand warning
    for: [source, scripts]
    if:
      type: text
      substr: do not modify by hand
      case_insensitive: true
  - id: python-datamodel-codegen-generated
    desc: datamodel-codegen generated Python source
    for: [python]
    conf: 0.95
    if:
      type: text
      substr: "# generated by datamodel-codegen:"
  - id: jsii-rtti-symbol
    desc: JSII runtime type metadata symbol
    for: [javascript, typescript]
    if:
      type: text
      substr: JSII_RTTI_SYMBOL
  - id: jsii-deprecation-warnings-helper
    desc: JSII deprecation warnings helper
    for: [javascript, typescript]
    if:
      type: text
      substr: jsiiDeprecationWarnings
composite_rules:
  - id: generated-do-not-edit-text
    desc: Generated source warning text
    crit: component
    conf: 0.85
    any:
      - id: generated-code-do-not-edit-text
      - id: do-not-edit-generated-text
      - id: do-not-modify-by-hand-text
  - id: jsii-generated-source
    desc: JSII generated source file
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: jsii-rtti-symbol
      - id: jsii-deprecation-warnings-helper
