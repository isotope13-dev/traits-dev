defaults:
  platforms: [windows, unix]
  crit: component
  conf: 0.85

traits:
  - id: generated-api-banner
    desc: Generated API source banner
    crit: baseline
    conf: 0.95
    for: [powershell, source, scripts]
    if:
      type: text
      substr: 'API AUTOGENERATED'
  - id: generated-code-do-not-edit-text
    desc: Generated code do-not-edit warning
    for: [source, scripts]
    if:
      type: text
      regex: '(code generated|generated code).{0,50}do not edit'
      case_insensitive: true
  - id: do-not-edit-generated-text
    desc: Do-not-edit generated source warning
    for: [source, scripts]
    if:
      type: text
      regex: 'do not edit.{0,80}generated'
      case_insensitive: true
  - id: do-not-modify-by-hand-text
    desc: Do-not-modify-by-hand warning
    for: [source, scripts]
    if:
      type: text
      substr: do not modify by hand
      case_insensitive: true
  - id: python-datamodel-codegen-generated
    desc: datamodel-codegen generated Python source
    for: [python]
    conf: 0.95
    if:
      type: text
      substr: "# generated by datamodel-codegen:"
  - id: openapi-generator-source-banner
    desc: OpenAPI Generator source banner
    for: [source, scripts]
    conf: 0.95
    if:
      type: text
      regex: 'Generated by( OpenAPI Generator)?: https://openapi-generator\.tech'
  - id: jsii-rtti-symbol
    desc: JSII runtime type metadata symbol
    for: [javascript, typescript]
    if:
      type: text
      substr: JSII_RTTI_SYMBOL
  - id: jsii-deprecation-warnings-helper
    desc: JSII deprecation warnings helper
    for: [javascript, typescript]
    if:
      type: text
      substr: jsiiDeprecationWarnings
  - id: protobuf-ts-package-export
    desc: TypeScript protobuf package export
    for: [javascript, typescript]
    conf: 0.9
    if:
      type: text
      substr: 'export const protobufPackage ='
  - id: protobufjs-minimal-import
    desc: protobufjs minimal runtime import
    for: [javascript, typescript]
    conf: 0.9
    if:
      type: text
      substr: 'from "protobufjs/minimal"'
composite_rules:
  - id: generated-do-not-edit-text
    desc: Generated source warning text
    crit: component
    conf: 0.85
    any:
      - id: generated-code-do-not-edit-text
      - id: do-not-edit-generated-text
      - id: do-not-modify-by-hand-text
      - id: openapi-generator-source-banner
  - id: jsii-generated-source
    desc: JSII generated source file
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: jsii-rtti-symbol
      - id: jsii-deprecation-warnings-helper
  - id: typescript-protobuf-generated
    desc: Generated TypeScript protobuf source
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: protobuf-ts-package-export
      - id: protobufjs-minimal-import
