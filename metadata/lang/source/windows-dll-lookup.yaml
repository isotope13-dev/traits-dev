defaults:
  for: [c, cpp]
  platforms: [windows]
  crit: baseline
  conf: 0.95
traits:
  - id: windows-dll-ordinal-lookup-source
    desc: Generated Windows DLL ordinal lookup
    if:
      type: text
      regex: '(?m)^inline const char\* [A-Za-z0-9_]+_dll_lookup\(uint32_t i\) \{\n\s*switch\(i\) \{'
