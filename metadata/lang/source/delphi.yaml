# Delphi Source Detection
# Detects Delphi/Object Pascal source files from language syntax.
defaults:
  for: [text]
  platforms: [windows]
traits:
  - id: program-header
    desc: Delphi program declaration
    crit: baseline
    conf: 0.85
    if:
      type: raw
      regex: '(?im)^\s*program\s+[A-Za-z_][A-Za-z0-9_]*\s*;'
  - id: uses-clause
    desc: Delphi uses clause
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '(?im)^\s*uses\s+[A-Za-z0-9_,\s]+\s*;'
  - id: procedure-declaration
    desc: Delphi procedure declaration
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '(?im)^\s*procedure\s+[A-Za-z_][A-Za-z0-9_]*\s*\('
  - id: assignfile-pattern
    desc: Delphi assign file pattern
    crit: baseline
    conf: 0.75
    if:
      type: raw
      regex: '(?i)\bassign\s*\('
composite_rules:
  - id: delphi-source
    desc: Delphi source file
    crit: baseline
    conf: 0.9
    all:
      - id: program-header
      - id: uses-clause
    any:
      - id: procedure-declaration
      - id: assignfile-pattern
