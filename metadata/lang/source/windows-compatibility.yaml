defaults:
  platforms: [windows]
  for: [c, cpp]
  crit: baseline
  conf: 0.95
traits:
  - id: wine-debug-include
    desc: Wine debug header include
    if:
      type: text
      regex: '#\s*include\s+["<]wine/debug\.h[">]'
  - id: wine-test-include
    desc: Wine test header include
    if:
      type: text
      regex: '#\s*include\s+["<]wine/?(test|test\.h)[">]'
  - id: wine-heap-include
    desc: Wine heap header include
    if:
      type: text
      regex: '#\s*include\s+["<]wine/heap\.h[">]'
  - id: ntoskrnl-include
    desc: NT kernel header include
    if:
      type: text
      regex: '#\s*include\s+["<]ntoskrnl\.h[">]'
  - id: ndk-include
    desc: NDK header include
    if:
      type: text
      regex: '#\s*include\s+["<]ndk/'
  - id: reactos-project
    desc: ReactOS project marker
    if:
      type: text
      regex: 'PROJECT:\s+ReactOS'
  - id: reactos-include
    desc: ReactOS header include
    if:
      type: text
      regex: '#\s*include\s+["<]reactos/'
  - id: reactos-define
    desc: ReactOS __REACTOS__ preprocessor define
    if:
      type: text
      regex: '#\s*(ifdef|ifndef|def)\s+__REACTOS__'
  - id: nt-driver-core-include
    desc: NT driver core header include
    if:
      type: text
      regex: '#\s*include\s+["<](ntddk|wdm|ntifs)\.h[">]'
  - id: nt-driver-storage-include
    desc: NT driver storage header include
    if:
      type: text
      regex: '#\s*include\s+["<](ntdddisk|ntddstor)\.h[">]'
  - id: ntstatus-usage
    desc: NTSTATUS usage
    if:
      type: text
      word: "NTSTATUS"
  - id: device-object-usage
    desc: PDEVICE_OBJECT usage
    if:
      type: text
      word: "PDEVICE_OBJECT"
  - id: irp-usage
    desc: PIRP usage
    if:
      type: text
      word: "PIRP"
  - id: io-complete-request-usage
    desc: IoCompleteRequest usage
    if:
      type: text
      word: "IoCompleteRequest"
  - id: winetest-include
    desc: Wine test framework header include
    if:
      type: text
      regex: '#\s*include\s+["<]winetest\.h[">]'
  - id: wine-test-functions
    desc: Wine test harness function usage
    if:
      type: text
      regex: '\b(todo_wine|win_skip|win_ok)\b'
  - id: windows-sdk-network-header-declarations
    desc: Windows SDK network/system header declarations
    if:
      type: basename
      regex: '^win(base|crypt|inet|netwk)\.h$'
      case_insensitive: true
  - id: windows-sdk-storage-header-declarations
    desc: Windows SDK storage header declarations
    if:
      type: basename
      regex: '^(winioctl|ntdddisk|ntddstor)\.h$'
      case_insensitive: true
  - id: windows-sdk-shell-header-declarations
    desc: Windows SDK header declarations
    if:
      type: basename
      regex: '^(shellapi|regstr)\.h$'
      case_insensitive: true
  - id: windows-eventlog-service-implementation
    desc: Windows EventLog service implementation source
    if:
      type: text
      regex: '#\s*include\s+["<](eventlogrpc_c|advapi32)\.h[">]|EVENTLOG_HANDLE_[AW]_(bind|unbind)\s*\('
composite_rules:
  - id: windows-driver-source
    desc: Windows Driver source marker
    crit: baseline
    conf: 0.95
    any:
      - id: nt-driver-core-include
      - id: nt-driver-storage-include
      - id: device-object-usage
      - id: irp-usage
      - id: io-complete-request-usage
  - id: wine-compat-source
    desc: Wine/ReactOS Windows compatibility source
    crit: baseline
    conf: 0.95
    any:
      - id: wine-debug-include
      - id: wine-test-include
      - id: wine-heap-include
      - id: wine-test-functions
      - id: ntoskrnl-include
      - id: ndk-include
      - id: reactos-include
      - id: reactos-define
      - id: reactos-project
  - id: windows-compat-api-source
    desc: Windows API compatibility implementation source
    crit: baseline
    conf: 0.96
    any:
      - id: wine-compat-source
      - id: windows-driver-source
      - id: windows-sdk-network-header-declarations
      - id: windows-sdk-storage-header-declarations
      - id: windows-sdk-shell-header-declarations
      - id: windows-eventlog-service-implementation
