defaults:
  platforms: [windows]
  for: [c, cpp]
  crit: baseline
  conf: 0.95
traits:
  - id: wine-compat-source
    desc: Wine/ReactOS Windows compatibility source
    if:
      type: text
      regex: '#\s*include\s+["<]wine/(debug|test|heap)\.h[">]'
  - id: windows-sdk-network-header-declarations
    desc: Windows SDK network/system header declarations
    if:
      type: basename
      regex: '^win(base|crypt|inet|netwk)\.h$'
      case_insensitive: true
  - id: windows-sdk-shell-header-declarations
    desc: Windows SDK header declarations
    if:
      type: basename
      regex: '^(shellapi|regstr)\.h$'
      case_insensitive: true
  - id: windows-eventlog-service-implementation
    desc: Windows EventLog service implementation source
    if:
      type: text
      regex: '#\s*include\s+["<](eventlogrpc_c|advapi32)\.h[">]|EVENTLOG_HANDLE_[AW]_(bind|unbind)\s*\('
composite_rules:
  - id: windows-compat-api-source
    desc: Windows API compatibility implementation source
    crit: baseline
    conf: 0.96
    any:
      - id: wine-compat-source
      - id: windows-sdk-network-header-declarations
      - id: windows-sdk-shell-header-declarations
      - id: windows-eventlog-service-implementation
