defaults:
  for: [all]
traits:
  - id: rustc-compiler
    desc: rustc Rust compiler reference
    crit: baseline
    conf: 0.6
    for: [elf, macho, pe]
    if:
      type: string
      word: "rustc"
  - id: static-pie
    desc: Rust static-pie build type
    crit: baseline
    conf: 0.7
    for: [elf, macho, pe]
    if:
      type: string
      substr: "static-pie"
  - id: gimli-crate
    desc: "Rust gimli crate (DWARF parsing)"
    crit: baseline
    conf: 0.9
    if:
      type: string
      substr: "gimli"
  - id: object-crate
    desc: "Rust object crate (binary format parsing)"
    crit: baseline
    conf: 0.9
    if:
      type: string
      substr: "rust/deps/object-"
