defaults:
  platforms:
    - windows
  for:
    - vbs
  crit: baseline
traits:
  - id: dim-declaration
    desc: VBScript Dim variable declaration
    conf: 0.7
    if:
      type: text
      regex: (?i)\bDim\s+\w+
  - id: set-object
    desc: VBScript Set object assignment
    conf: 0.8
    if:
      type: text
      regex: (?i)\bSet\s+\w+\s*=
  - id: sub-declaration
    desc: VBScript Sub procedure
    conf: 0.85
    if:
      type: text
      regex: (?i)\bSub\s+\w+\b
  - id: function-declaration
    desc: VBScript Function declaration
    conf: 0.85
    if:
      type: text
      regex: (?i)\bFunction\s+\w+\b
  - id: on-error-resume
    desc: VBScript error suppression
    conf: 0.9
    if:
      type: text
      regex: (?i)\bOn\s+Error\s+Resume\s+Next\b
  - id: createobject
    desc: VBScript CreateObject call
    conf: 0.9
    if:
      type: text
      regex: (?i)\bCreateObject\s*\(
  - id: getobject
    desc: VBScript GetObject call
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)\bGetObject\s*\(
  - id: do-loop
    desc: VBScript Do/Loop construct
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\bDo\b|\bLoop\b
  - id: for-each
    desc: VBScript For Each iteration
    conf: 0.8
    if:
      type: string_literal
      regex: (?i)\bFor\s+Each\b
  - id: select-case
    desc: VBScript Select Case statement
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)\bSelect\s+Case\b
  - id: chr-function
    desc: VBScript Chr() character encoding
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\bchr\s*\(\s*\d+
  - id: asc-function
    desc: VBScript Asc() character code
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\bAsc\s*\(
  - id: adodb-stream
    desc: ADODB.Stream COM object
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)ADODB\.Stream
  - id: msxml-xmlhttp
    desc: MSXML HTTP COM object
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)MSXML2?\.XMLHTTP
  - id: shell-application
    desc: Shell.Application COM object
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)Shell\.Application
  - id: wscript-sleep
    desc: WScript.Sleep timing call
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)wscript\.sleep
  - id: wscript-scriptfullname
    desc: WScript.ScriptFullName self-reference
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: (?i)wscript\.ScriptFullName
  - id: wscript-arguments
    desc: WScript.Arguments access
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)wscript\.Arguments
  - id: end-block-statement
    desc: VBScript End control-flow block
    conf: 0.75
    if:
      type: text
      regex: (?i)\bEnd\s+(If|Sub|Function)\b
composite_rules:
  - id: vbscript-valid
    desc: Valid VBScript code
    conf: 0.9
    needs: 2
    any:
      - id: dim-declaration
      - id: set-object
      - id: sub-declaration
      - id: function-declaration
      - id: on-error-resume
      - id: createobject
      - id: end-block-statement
  - id: com-automation
    desc: VBScript COM automation pattern
    crit: notable
    conf: 0.85
    all:
      - id: createobject
    any:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: adodb-stream
      - id: msxml-xmlhttp
      - id: shell-application
