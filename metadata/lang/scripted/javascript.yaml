defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
traits:
  - id: require-symbol
    desc: CommonJS require symbol
    if:
      type: symbol
      exact: require
  - id: startswith-method
    desc: JavaScript startsWith method
    if:
      type: text
      substr: startsWith
  - id: includes-method
    desc: JavaScript includes method
    if:
      type: text
      substr: includes
  - id: undefined-literal
    desc: JavaScript undefined literal
    if:
      type: text
      substr: undefined
  - id: length-prop
    desc: JavaScript length property
    if:
      type: text
      substr: length
