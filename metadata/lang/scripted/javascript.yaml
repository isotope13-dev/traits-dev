defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
traits:
  - id: require-symbol
    desc: CommonJS require symbol
    if:
      type: symbol
      exact: require
  - id: js-export-boundary
    desc: JS module export syntax
    conf: 0.5
    if:
      type: text
      regex: module\.exports|export\s+default
  - id: startswith-method
    desc: JavaScript startsWith method
    if:
      type: text
      substr: startsWith
  - id: includes-method
    desc: JavaScript includes method
    if:
      type: text
      substr: includes
  - id: undefined-literal
    desc: JavaScript undefined literal
    if:
      type: text
      substr: undefined
  - id: length-prop
    desc: JavaScript length property
    if:
      type: text
      substr: length
  - id: js-require-binding
    desc: CommonJS require() binding declaration
    conf: 0.4
    for: [javascript]
    if:
      type: text
      regex: '\b(const|let|var)\s+[A-Za-z_$][\w$]{0,40}\s*=\s*require\s*\('
  - id: js-key-assignment-declaration
    desc: var/let/const key-like assignment declaration
    crit: component
    conf: 1.0
    if:
      type: text
      regex: '\b(var|let|const)\s+\w*key\s*='
  - id: ts-key-config-field-type-string-number
    desc: key/config string or number field type
    crit: component
    conf: 1.0
    for: [typescript]
    if:
      type: text
      regex: '\b(key|config)\s*:\s*(string|number)\s*;'
  - id: ts-key-config-field-type-bool-buffer
    desc: key/config boolean or Buffer field type
    crit: component
    conf: 1.0
    for: [typescript]
    if:
      type: text
      regex: '\b(key|config)\s*:\s*(boolean|Buffer)\s*;'
  - id: ts-key-config-field-type-any-function
    desc: key/config any or Function field type
    crit: component
    conf: 1.0
    for: [typescript]
    if:
      type: text
      regex: '\b(key|config)\s*:\s*(any|Function)\s*;'
  - id: ts-key-config-field-type-object
    desc: key/config object field type
    crit: component
    conf: 1.0
    for: [typescript]
    if:
      type: text
      regex: '\b(key|config)\s*:\s*(object)\s*;'
  - id: plain-js-identifier-assignment
    desc: Plain JavaScript identifier assignment
    crit: component
    conf: 1.0
    if:
      type: text
      regex: '\b[A-Za-z_][A-Za-z0-9_]*\s*=\s*[A-Za-z_][A-Za-z0-9_]*\s*;'
composite_rules:
  - id: ts-key-config-field-type
    desc: TypeScript key/config field type declaration
    crit: component
    conf: 1.0
    any:
      - id: ts-key-config-field-type-string-number
      - id: ts-key-config-field-type-bool-buffer
      - id: ts-key-config-field-type-any-function
      - id: ts-key-config-field-type-object
