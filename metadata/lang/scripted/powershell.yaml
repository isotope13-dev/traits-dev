# PowerShell Language Detection
# Detects PowerShell code constructs
defaults:
  platforms: [unix, windows]
  for: [powershell]
traits:
  - id: invoke-prefixed-cmdlet-name
    desc: PowerShell Invoke-prefixed cmdlet name
    crit: baseline
    conf: 0.8
    if:
      type: literal
      regex: \bInvoke-[A-Z][a-zA-Z]+
  - id: ps-valid
    desc: "Valid PowerShell code"
    crit: baseline
    if:
      type: text
      # param(...), [Parameter(...)]
      regex: '(?i)(param\s*\(|\[Parameter\()'
