defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: sbcl-runtime
    desc: "SBCL Common Lisp runtime artifact"
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: sbcl_runtime
      section: .text
  - id: sbcl-home
    desc: SBCL_HOME string
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: SBCL_HOME
      section: .text
composite_rules:
  - id: is-sbcl
    desc: Steel Bank Common Lisp (SBCL) binary
    crit: notable
    conf: 0.99
    any:
      - id: sbcl-runtime
      - id: sbcl-home
