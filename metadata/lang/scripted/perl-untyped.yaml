defaults:
  platforms: [unix]
  for: [perl]

traits:
  - id: foreach-sigil-loop
    desc: Untyped Perl foreach sigil loop
    crit: baseline
    conf: 0.88
    if:
      type: text
      regex: '(?m)^\s*foreach\s+\$[A-Za-z_][A-Za-z0-9_]*\s*\('
  - id: env-hash-deref
    desc: Untyped Perl ENV hash dereference
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: $ENV{
  - id: pack-l-scalar
    desc: Untyped Perl pack little-l
    crit: baseline
    conf: 0.84
    if:
      type: text
      substr: "pack('l', $"
composite_rules:
  - id: source-syntax-untyped
    desc: Untyped Perl source syntax
    crit: baseline
    conf: 0.92
    needs: 2
    any:
      - id: foreach-sigil-loop
      - id: env-hash-deref
      - id: pack-l-scalar
