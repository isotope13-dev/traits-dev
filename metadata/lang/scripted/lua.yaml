# Lua Programming Language Traits
# Detects common Lua patterns, capabilities, and obfuscation techniques.
#
# Metadata tier: per TAXONOMY.md these should be baseline (occasionally
# suspicious). Notable means "defines program purpose" — a single symbol
# like `require` or `setmetatable` does not. Obfuscation/exec patterns
# that ARE suspicious on their own stay at their higher crit.
defaults:
  platforms: [windows, unix]
  for: [lua]
  crit: baseline
traits:
  # === Environment and Context manipulation ===
  # Kept notable: environment manipulation is rare in normal Lua libraries
  # and meaningful for supply-chain diffs (a legit library shouldn't start
  # rewriting its global environment between versions).
  - id: env-access-_env
    desc: Lua environment access (_ENV)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "_ENV"
  - id: env-access-getfenv
    desc: Lua environment access (getfenv)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "getfenv"
  - id: env-modify
    desc: Modifies Lua environment (setfenv)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "setfenv"
  # === Code Loading and Execution ===
  # Dynamic code loading and file execution define program purpose and are
  # exactly the kind of thing worth surfacing in a supply-chain diff.
  # `require` is universal in any non-trivial Lua module; baseline.
  - id: module-require
    desc: Loads Lua modules (require)
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: "require"
  # === System and OS Interaction ===
  # Kept notable: running shell commands is not baseline Lua behavior and
  # is a meaningful program-purpose signal when it appears.
  # === Metatable and Proxy patterns ===
  - id: meta-setmetatable-access
    # NOTE: os-file-manipulation removed from metadata/
    # File manipulation is a behavioral capability, not language metadata
    # See: micro-behaviors/fs/file/operations/lua.yaml for behavioral detection
    # os.remove(__file__) is self-deletion (objectives/evasion/self-delete/file/)

    desc: Uses metatables (setmetatable)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: "setmetatable"
  - id: meta-getmetatable-access
    desc: Uses metatables (getmetatable)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: "getmetatable"
  # `newproxy` is rare; surfacing it helps catch unusual introspection.
  - id: meta-proxy-usage
    desc: Uses newproxy for object protection
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "newproxy"
  # === Debug and Reflection ===
  # `debug.*` in production library code defines purpose (reflection,
  # introspection, traceback) — notable for supply-chain diffs.
  # === Obfuscation Patterns ===
  - id: base64-decoder-custom
    desc: Custom Base64 alphabet mapping
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\["\+"\]\s*=\s*\d+[,;]'
  - id: bytecode-interpreter
    desc: Lua bytecode interpreter loop
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'while\s+g\s+do\s+if\s+g\s*<'
composite_rules:
  - id: env-access
    desc: Lua environment access (_ENV)
    crit: notable
    conf: 0.9
    any:
      - id: env-access-_env
      - id: env-access-getfenv
  - id: meta-metatable-access
    desc: Uses metatables (setmetatable, getmetatable)
    crit: baseline
    conf: 0.7
    any:
      - id: meta-setmetatable-access
      - id: meta-getmetatable-access
