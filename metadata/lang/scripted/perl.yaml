defaults:
  platforms: [unix]
  for: [perl]
traits:
  - id: shell-perl-polyglot-launcher
    desc: Shell wrapper reexecutes Perl source
    crit: baseline
    conf: 0.98
    for: [shell]
    if:
      type: text
      regex: '(?m)^exec\s+perl\s+-x\s+-S\s+\$0\s+\$\{1\+"\$@"\}'
  - id: use-module
    desc: Perl module import statement
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: '(?m)^\s*use\s+[A-Za-z_][A-Za-z0-9_:]*\s*;'
  - id: sigil-variable-decl
    desc: Perl sigil variable declaration
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(?m)^\s*(my|our|local)\s+[$@%][A-Za-z_][A-Za-z0-9_]*'
  - id: subroutine-definition
    desc: Perl subroutine definition
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: '(?m)^\s*sub\s+[A-Za-z_][A-Za-z0-9_]*\s*(\{|$)'
composite_rules:
  - id: source-syntax
    desc: Perl source syntax patterns
    crit: baseline
    conf: 0.9
    needs: 2
    any:
      - id: use-module
      - id: sigil-variable-decl
      - id: subroutine-definition
