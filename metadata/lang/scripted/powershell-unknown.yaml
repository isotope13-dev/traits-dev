defaults:
  for: [scripts, source]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: function-blocks
    desc: PowerShell function block syntax
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: '(?m)^\s*function\s+[A-Za-z_][A-Za-z0-9_]*\s*\('
  - id: type-accelerator
    desc: PowerShell type accelerator syntax
    crit: baseline
    conf: 0.78
    if:
      type: text
      regex: '\[[A-Za-z][A-Za-z0-9\._]+\]::'
  - id: add-type-definition
    desc: Add-Type TypeDefinition usage
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: Add-Type -TypeDefinition
composite_rules:
  - id: powershell-like-source
    desc: PowerShell-like source in generic text
    crit: baseline
    conf: 0.9
    any:
      - id: function-blocks
      - id: type-accelerator
      - id: add-type-definition
    needs: 2
