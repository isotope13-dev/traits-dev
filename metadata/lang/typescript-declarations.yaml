defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - typescript
traits:
  - id: dts-declaration-file
    desc: TypeScript declaration file (.d.ts/.d.cts/.d.mts)
    crit: baseline
    conf: 0.99
    if:
      type: basename
      regex: '\.d\.(ts|cts|mts)$'
