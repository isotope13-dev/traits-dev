defaults:
  platforms: [unix, windows]
  for: [documents, data, python, javascript, php, shell]
traits:
  - id: python
    desc: Base64-encoded Python code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.python.base64_count
      min: 1
  - id: javascript
    desc: Base64-encoded JavaScript code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.javascript.base64_count
      min: 1
  - id: php
    desc: Base64-encoded PHP code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.php.base64_count
      min: 1
  - id: shell
    desc: Base64-encoded shell code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.shell.base64_count
      min: 1
