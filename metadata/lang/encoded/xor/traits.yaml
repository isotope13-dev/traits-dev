defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries, documents]
traits:
  - id: quicklook-markdownviewer-resource
    desc: QuickLook markdown resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: QuickLook.Plugin.MarkdownViewer.Resources.
  - id: highlightjs-resource
    desc: highlight.js resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: highlight.js
  - id: markdown-it-resource
    desc: markdown-it resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: markdown-it
  - id: mermaid-resource
    desc: mermaid resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: mermaid.min.js
  - id: shell-interpreter-cmd
    desc: cmd interpreter marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: xor
      regex: (?i)\bcmd(?:\.exe)?\b
  - id: shell-interpreter-powershell
    desc: powershell marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: xor
      regex: (?i)\b(?:powershell|pwsh)(?:\.exe)?\b
  - id: shell-interpreter-script-host
    desc: script host marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: xor
      regex: (?i)\b(?:wscript|cscript)(?:\.exe)?\b
  - id: shell-shebang
    desc: shell shebang encoded in string
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: "#!/bin/(?:sh|bash|zsh)\\b"
  - id: shell-batch-prologue
    desc: batch prologue encoded in string
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      regex: (?i)(@echo off\b|\bsetlocal\b)
composite_rules:
  - id: shell
    desc: Encoded shell content (xor)
    crit: notable
    conf: 0.8
    any:
      - id: shell-shebang
      - id: shell-batch-prologue
      - id: shell-interpreter-encoded
    unless:
      - id: metadata/lang/compiler/managed::mscorlib
      - id: metadata/lang/compiler/aot::native-runtime-large-file
      - id: quicklook-markdownviewer-resource
      - id: highlightjs-resource
      - id: markdown-it-resource
      - id: mermaid-resource
  - id: shell-interpreter-encoded
    desc: Encoded shell interpreter (xor)
    crit: notable
    conf: 0.9
    any:
      - id: shell-interpreter-cmd
      - id: shell-interpreter-powershell
      - id: shell-interpreter-script-host
