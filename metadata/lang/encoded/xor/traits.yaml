defaults:
  platforms: [windows, unix]
  for: [pe, elf, macho, oledoc, ooxml, rtf]
traits:
  - id: quicklook-markdownviewer-resource
    desc: QuickLook markdown resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: QuickLook.Plugin.MarkdownViewer.Resources.
  - id: highlightjs-resource
    desc: highlight.js resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: highlight.js
  - id: markdown-it-resource
    desc: markdown-it resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: markdown-it
  - id: mermaid-resource
    desc: mermaid resource marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: mermaid.min.js
  - id: shell-interpreter-cmd
    desc: cmd interpreter marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\bcmd(\.exe)?\b'
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: shell-interpreter-powershell
    desc: powershell marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(powershell|pwsh)(\.exe)?\b'
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: shell-interpreter-script-host
    desc: script host marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(wscript|cscript)(\.exe)?\b'
  - id: shell-shebang
    desc: shell shebang encoded in string
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: "#!/bin/(sh|bash|zsh)\\b"
  - id: shell-batch-prologue
    desc: batch prologue encoded in string
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      regex: '(?i)(@echo off\b|\bsetlocal\b)'
  - id: python
    desc: XOR-encoded Python code
    crit: suspicious
    conf: 1.0
    for: [binaries, documents, data, python]
    if:
      type: metrics
      field: encoded.python.xor_count
      min: 1
  - id: javascript
    desc: XOR-encoded JavaScript code
    crit: suspicious
    conf: 1.0
    for: [binaries, documents, data, javascript]
    if:
      type: metrics
      field: encoded.javascript.xor_count
      min: 1
  - id: php
    desc: XOR-encoded PHP code
    crit: suspicious
    conf: 1.0
    for: [binaries, documents, data, php]
    if:
      type: metrics
      field: encoded.php.xor_count
      min: 1
composite_rules:
  - id: shell
    desc: Encoded shell content (xor)
    crit: notable
    conf: 0.8
    any:
      - id: shell-shebang
      - id: shell-batch-prologue
      - id: shell-interpreter-encoded
    unless:
      - id: metadata/lang/compiler/managed::mscorlib
      - id: metadata/lang/compiler/aot::native-runtime-large-file
      - id: quicklook-markdownviewer-resource
      - id: highlightjs-resource
      - id: markdown-it-resource
      - id: mermaid-resource
  - id: shell-interpreter-encoded
    desc: Encoded shell interpreter (xor)
    crit: notable
    conf: 0.9
    any:
      - id: shell-interpreter-cmd
      - id: shell-interpreter-powershell
      - id: shell-interpreter-script-host
