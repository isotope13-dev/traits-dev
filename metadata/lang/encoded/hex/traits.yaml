defaults:
  platforms: [unix, windows]
  for: [documents, data, python, javascript, php, shell]
traits:
  - id: python
    desc: Hex-encoded Python code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.python.hex_count
      min: 1
  - id: javascript
    desc: Hex-encoded JavaScript code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.javascript.hex_count
      min: 1
  - id: php
    desc: Hex-encoded PHP code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.php.hex_count
      min: 1
  - id: shell
    desc: Hex-encoded shell code
    crit: suspicious
    conf: 1.0
    if:
      type: metrics
      field: encoded.shell.hex_count
      min: 1
