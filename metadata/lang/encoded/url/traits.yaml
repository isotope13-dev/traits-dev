defaults:
  platforms: [unix, windows]
  for: [documents, data, python, javascript, php, shell]
traits:
  - id: python
    desc: URL-encoded Python code
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: encoded.python.url_count
      min: 1
  - id: javascript
    desc: URL-encoded JavaScript code
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: encoded.javascript.url_count
      min: 1
  - id: php
    desc: URL-encoded PHP code
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: encoded.php.url_count
      min: 1
  - id: shell
    desc: URL-encoded shell code
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: encoded.shell.url_count
      min: 1
