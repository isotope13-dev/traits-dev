defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [manifests, documents, data, -javascript]
traits:
  - id: html-angle-escape
    desc: HTML angle bracket unicode escapes
    crit: baseline
    conf: 0.98
    if:
      type: encoded
      encoding: unicode-escape
      substr: \u003c
  - id: ansi-escape-sequence
    desc: ANSI color escape sequence encoded
    crit: baseline
    conf: 0.98
    if:
      type: encoded
      encoding: unicode-escape
      regex: '(?:\\x1b|\x1b|\\u001b)\[[0-9;]{1,12}m'
  - id: bundled-web-asset-path
    desc: Bundled web asset path string
    crit: baseline
    conf: 0.98
    if:
      type: raw
      section: .rodata
      substr: dist/assets/
  - id: javascript-embedded
    desc: javascript code encoded in non-js file
    crit: notable
    conf: 1.0
    for: [binaries, documents]
    size_min: 20000
    count_min: 5
    if:
      type: encoded
      encoding: unicode-escape
      offset_range: [1, null]
      regex: (function\s+\w+\s*\(|var\s+\w+\s*=)
    not:
      - substr: .defineLocale(
      - substr: var __webpack_modules__={
      - substr: process._linkedBinding("electron_
      - substr: electron_browser_app
      - substr: electron_common_
      - substr: Electron Framework.framework/Versions/A/Electron Framework
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - type: basename
        exact: Electron Framework
      - type: basename
        regex: \.js$
      - type: basename
        regex: .*\.js##unicode-escape@\d+$
      - id: bundled-web-asset-path
      - id: html-angle-escape
      - id: ansi-escape-sequence
  - id: shell-interpreter-cmd
    desc: cmd interpreter marker encoded
    crit: component
    conf: 0.95
    for: [binaries, documents]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)\bcmd(?:\.exe)?\b
  - id: shell-interpreter-powershell
    desc: powershell marker encoded
    crit: component
    conf: 0.95
    for: [binaries, documents]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)\b(?:powershell|pwsh)(?:\.exe)?\b
    unless:
      - type: text
        substr: minikube completion powershell
      - type: text
        substr: shell (bash, zsh, fish or powershell)
  - id: shell-interpreter-script-host
    desc: script host marker encoded
    crit: component
    conf: 0.95
    for: [binaries, documents]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)\b(?:wscript|cscript)(?:\.exe)?\b
  - id: shell-shebang
    desc: shell shebang encoded in string
    crit: suspicious
    conf: 0.98
    for: [binaries, documents]
    if:
      type: encoded
      encoding: unicode-escape
      regex: "#!/bin/(?:sh|bash|zsh)\\b"
  - id: shell-batch-prologue
    desc: batch prologue encoded in string
    crit: suspicious
    conf: 0.96
    for: [binaries, documents]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)(@echo off\b|\bsetlocal\b)
  - id: shell-completion-help
    desc: shell completion help text
    crit: component
    conf: 1.0
    for: [binaries, documents]
    if:
      type: encoded
      encoding: unicode-escape
      section: .rodata
      substr: Outputs minikube shell completion
  - id: powershell-completion-example
    desc: powershell completion example text
    crit: component
    conf: 1.0
    for: [binaries, documents]
    if:
      type: encoded
      encoding: unicode-escape
      section: .rodata
      substr: minikube completion powershell

composite_rules:
  - id: shell
    desc: Encoded shell content (unicode escapes)
    crit: notable
    conf: 0.8
    for: [binaries, documents]
    any:
      - id: shell-shebang
      - id: shell-batch-prologue
      - id: shell-interpreter-encoded
    unless:
      - id: shell-completion-help
      - id: powershell-completion-example
  - id: shell-interpreter-encoded
    desc: Encoded shell interpreter (unicode escapes)
    crit: notable
    conf: 0.9
    for: [binaries, documents]
    any:
      - id: shell-interpreter-cmd
      - id: shell-interpreter-powershell
      - id: shell-interpreter-script-host
