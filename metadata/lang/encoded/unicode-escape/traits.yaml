defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries]
traits:
  - id: javascript
    desc: javascript code encoded in string
    crit: notable
    conf: 1.0
    size_min: 20000
    if:
      type: encoded
      encoding: unicode-escape
      regex: (function\s+\w+\s*\(|var\s+\w+\s*=)
    unless:
      - type: basename
        regex: \.js$
      - type: raw
        substr: dist/assets/
      - type: encoded
        encoding: unicode-escape
        regex: \x1b\[[0-9;]{1,12}m
      - type: encoded
        encoding: unicode-escape
        regex: \\x1b\[[0-9;]{1,12}m
      - type: encoded
        encoding: unicode-escape
        regex: \\u001b\[[0-9;]{1,12}m
