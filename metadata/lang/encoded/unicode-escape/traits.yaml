# Unicode-escape encoded language detection
# Note: The auto-generated embedded-code-detection trait
# (metadata/lang/encoded/unicode-escape::javascript)
# fires independently and cannot be overridden by YAML.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries]
traits:
  - id: javascript
    desc: javascript code encoded in string
    crit: notable
    conf: 1.0
    size_min: 10000
    if:
      type: encoded
      encoding: unicode-escape
      regex: '(function\s+\w+\s*\(|var\s+\w+\s*=)'
