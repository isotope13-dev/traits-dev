defaults:
  platforms: [unix, windows]
  for: [documents, data, javascript]
traits:
  - id: html-angle-escape
    desc: HTML angle bracket unicode escapes
    crit: baseline
    conf: 0.98
    if:
      type: encoded
      encoding: unicode-escape
      substr: \u003c
  - id: ansi-escape-sequence
    desc: ANSI color escape sequence encoded
    crit: baseline
    conf: 0.98
    if:
      type: encoded
      encoding: unicode-escape
      regex: '(?:\\x1b|\x1b|\\u001b)\[[0-9;]{1,12}m'
  - id: bundled-web-asset-path
    desc: Bundled web asset path string
    crit: baseline
    conf: 0.98
    if:
      type: raw
      section: .rodata
      substr: dist/assets/
  - id: define-locale-call
    desc: Locale definition function call
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: '(?:^|[^[:alnum:]_])defineLocale\('
  - id: javascript-or-dll-basename
    desc: JavaScript DLL or EXE basename
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: '(?:^|!!).{0,200}\.js(?:##unicode-escape@\d+)?$'
  - id: unicode-escape-js-basename
    desc: Unicode escape JavaScript basename
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: '(?:^|!!).{0,200}\.js##unicode-escape(?:@\d+)?$'
  - id: quarto-editor-index-basename
    desc: Quarto bundled editor asset basename
    crit: baseline
    conf: 0.98
    if:
      type: basename
      regex: '(^|!!).{0,200}/editor/index\.js(##unicode-escape(@\d+)?)?$'
  - id: duplicati-ngclient-chunk-basename
    desc: Duplicati ngclient chunk basename
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: '(^|!!).{0,200}chunk-[A-Z0-9]{8}\.js(?:##unicode-escape(?:@\d+)?|$)'
  - id: blazor-endpoints-dll-basename
    desc: Blazor endpoints DLL basename
    crit: component
    conf: 0.98
    for: [documents, data, csharp]
    if:
      type: basename
      regex: '(^|!!).{0,200}Microsoft\.AspNetCore\.Components\.Endpoints\.dll'
  - id: chunk-basename
    desc: Chunk basename marker
    crit: component
    conf: 0.98
    if:
      type: basename
      substr: chunk-
  - id: chunk-import-path
    desc: Chunk import path string
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '\./chunk-[A-Z0-9]{8}\.js'
  - id: moment-relative-path
    desc: Relative moment asset path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: ../moment
  - id: blazor-web-path
    desc: Blazor web asset path
    crit: component
    conf: 0.98
    for: [documents, data, csharp]
    if:
      type: text
      substr: /_framework/blazor.web.js
  - id: dotnet-object-marker
    desc: Dotnet object bridge marker
    crit: component
    conf: 0.98
    for: [documents, data, csharp]
    if:
      type: text
      substr: __dotNetObject
  - id: webpack-chunk-marker
    desc: Webpack chunk marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: webpackChunk
  - id: electron-env-marker
    desc: Electron env marker
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'ELECTRON_(?:RUN_AS_NODE|NO_ATTACH_CONSOLE|NO_ASAR)\b'
  - id: relative-chunk-import
    desc: Relative chunk import statement
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'import\{.{1,60}from"\./chunk-[A-Z0-9]{8}\.js"'
  - id: webpack-module-map
    desc: Webpack module map marker
    crit: component
    conf: 0.98
    for: [documents, data, javascript, csharp]
    if:
      type: text
      regex: 'var __webpack_modules__=\{|static \\u0275fac=function'
  - id: commonjs-wrapper-marker
    desc: CommonJS wrapper helper
    crit: component
    conf: 0.98
    if:
      type: text
      substr: var __commonJS = (cb, mod) => function __require() {
  - id: to-esm-wrapper-marker
    desc: ESM wrapper helper
    crit: component
    conf: 0.98
    if:
      type: text
      substr: var __toESM = (mod, isNodeMode, target) =>
  - id: electron-js2c-marker
    desc: Electron js2c marker
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'electron/js2c/|process\._linkedBinding\("electron_'
  - id: electron-framework-marker
    desc: Electron framework marker
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'electron_(?:browser_app|common_)|Electron Framework\.framework/Versions/A/Electron Framework'
  - id: app-asar-path
    desc: Electron app asar path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: app.asar
  - id: javascript
    desc: javascript code encoded in non-js file
    crit: notable
    conf: 1.0
    for: [documents, data, csharp]
    if:
      type: encoded
      encoding: unicode-escape
      offset_range: [1, null]
      regex: '(function\s+\w+\s*\(|var\s+\w+\s*=\s*function\b)'
    not:
      - substr: Microsoft.AspNetCore.Components.Endpoints.dll
      - substr: app.asar
      - substr: cannot override language handler %s
      - substr: window.PR_SHOULD_USE_CONTINUATION
      - substr: ELECTRON_RUN_AS_NODE
      - substr: electron/js2c/
      - substr: ELECTRON_
      - substr: ./chunk-AS6Z56AD.js
      - substr: chunk-MRY5WXEL.js##unicode-escape
      - substr: /usr/lib/duplicati/webroot/ngclient/chunk-
      - substr: /_framework/blazor.web.js
      - substr: extension/assets/www/editor/index.js##
      - substr: transformPastedText
      - substr: clipboard.js v2.0.11
      - substr: XRegExp.matchRecursive 5.1.1
      - substr: /editor/index.js
    unless:
      - type: basename
        regex: '(^|!!).{0,200}\.(?:js|ts)(?:##unicode-escape(@\d+)?)?$'
      - type: basename
        regex: '(^|!!).{0,200}chunk-[A-Z0-9]{8}\.js##unicode-escape(@\d+)?$'
      - type: basename
        substr: Microsoft.AspNetCore.Components.Endpoints.dll##unicode-escape
      - type: basename
        regex: '(^|!!).{0,200}Microsoft\.AspNetCore\.Components\.Endpoints\.dll'
      - id: "metadata/lang/encoded/unicode-escape::unicode-escape-js-basename"
      - id: "metadata/lang/encoded/unicode-escape::javascript-benign-context"
  - id: shell-interpreter-cmd
    desc: cmd interpreter marker encoded
    crit: component
    conf: 0.95
    for: [documents, data]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)\bcmd(?:\.exe)?\b
  - id: shell-interpreter-powershell
    desc: powershell marker encoded
    crit: component
    conf: 0.95
    for: [documents, data]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)\b(?:powershell|pwsh)(?:\.exe)?\b
  - id: shell-interpreter-script-host
    desc: script host marker encoded
    crit: component
    conf: 0.95
    for: [documents, data]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)\b(?:wscript|cscript)(?:\.exe)?\b
  - id: shell-shebang
    desc: shell shebang encoded in string
    crit: suspicious
    conf: 0.98
    for: [documents, data]
    if:
      type: encoded
      encoding: unicode-escape
      regex: "#!/bin/(?:sh|bash|zsh)\\b"
  - id: shell-batch-prologue
    desc: batch prologue encoded in string
    crit: suspicious
    conf: 0.96
    for: [documents, data]
    if:
      type: encoded
      encoding: unicode-escape
      regex: (?i)(@echo off\b|\bsetlocal\b)
composite_rules:
  - id: electron-benign-context
    desc: Electron bundle context markers
    crit: component
    conf: 0.98
    any:
      - id: electron-env-marker
      - id: electron-js2c-marker
      - id: electron-framework-marker
      - id: app-asar-path
  - id: javascript-benign-context
    desc: Benign encoded JavaScript context
    crit: baseline
    conf: 1.0
    for: [documents, data, javascript, csharp]
    any:
      - id: unicode-escape-js-basename
      - id: quarto-editor-index-basename
      - id: metadata/binary/framework::dotnet-assembly
      - id: define-locale-call
      - id: metadata/binary/framework::electron-framework-binary
      - id: javascript-or-dll-basename
      - id: duplicati-ngclient-chunk-basename
      - id: blazor-endpoints-dll-basename
      - id: chunk-basename
      - id: bundled-web-asset-path
      - id: html-angle-escape
      - id: ansi-escape-sequence
      - id: javascript-benign-bundle-text
  - id: javascript-benign-bundle-text
    desc: Encoded JavaScript bundle context
    crit: component
    conf: 0.95
    for: [documents, data, javascript, csharp]
    any:
      - id: chunk-import-path
      - id: moment-relative-path
      - id: blazor-web-path
      - id: dotnet-object-marker
      - id: metadata/library/structure::js-webpack-bundle
      - id: webpack-chunk-marker
      - id: electron-env-marker
      - id: relative-chunk-import
      - id: webpack-module-map
      - id: commonjs-wrapper-marker
      - id: to-esm-wrapper-marker
      - id: electron-js2c-marker
      - id: electron-framework-marker
      - id: app-asar-path
  - id: shell
    desc: Encoded shell content (unicode escapes)
    crit: notable
    conf: 0.8
    for: [documents, data]
    any:
      - id: shell-shebang
      - id: shell-batch-prologue
      - id: shell-interpreter-encoded
  - id: shell-interpreter-encoded
    desc: Encoded shell interpreter (unicode escapes)
    crit: notable
    conf: 0.9
    for: [documents, data]
    any:
      - id: shell-interpreter-cmd
      - id: shell-interpreter-powershell
      - id: shell-interpreter-script-host
