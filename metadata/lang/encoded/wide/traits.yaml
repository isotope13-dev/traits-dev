defaults:
  platforms: [windows, unix]
  for: [binaries, documents]
traits:
  - id: javascript-function
    desc: javascript function encoded in string
    crit: component
    conf: 1.0
    size_min: 10000
    if:
      type: text
      regex: "function\\s+[A-Za-z_$][A-Za-z0-9_$]{0,63}\\s*\\("
      section: rsrc
  - id: javascript-dom-create
    desc: javascript DOM create encoded in string
    crit: component
    conf: 1.0
    size_min: 10000
    if:
      type: text
      regex: "document\\.createElement\\s*\\("
      section: rsrc
  - id: javascript-window-assign
    desc: javascript window assignment encoded
    crit: component
    conf: 1.0
    size_min: 10000
    if:
      type: text
      regex: "window\\.[A-Za-z_$][A-Za-z0-9_$]{0,63}\\s*="
      section: rsrc
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
        - type: text
          substr: "window.chrome.webview"
  - id: shell-interpreter-cmd
    desc: cmd interpreter marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: "(?i)\\bcmd(?:\\.exe)?\\b"
  - id: shell-interpreter-powershell
    desc: powershell marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: "(?i)\\b(?:powershell|pwsh)(?:\\.exe)?\\b"
  - id: shell-interpreter-script-host
    desc: script host marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: "(?i)\\b(?:wscript|cscript)(?:\\.exe)?\\b"
  - id: shell-shebang
    desc: shell shebang encoded in string
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: wide
      regex: "#!/bin/(?:sh|bash|zsh)\\b"
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler/managed::mscorlib
      - id: metadata/lang/compiler/aot::native-runtime-large-file
  - id: shell-batch-prologue
    desc: batch prologue encoded in string
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: wide
      regex: "(?i)(@echo off\\b|\\bsetlocal\\s+enable)"
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler/managed::mscorlib
      - id: metadata/lang/compiler/aot::native-runtime-large-file
  - id: python-import-encoded
    desc: python import encoded in wide string
    crit: component
    conf: 1.0
    if:
      type: encoded
      encoding: wide
      regex: "(?:^|\\n)\\s*import\\s+[A-Za-z_][\\w.]*\\b"
  - id: python-from-import-encoded
    desc: python from import encoded in wide string
    crit: component
    conf: 1.0
    if:
      type: encoded
      encoding: wide
      regex: "(?:^|\\n)\\s*from\\s+[A-Za-z_][\\w.]*\\s+import\\b"
  - id: python-def-encoded
    desc: python def/class encoded in wide string
    crit: component
    conf: 1.0
    if:
      type: encoded
      encoding: wide
      regex: "(?:^|\\n)\\s*def\\s+[A-Za-z_][A-Za-z0-9_]*\\s*\\("
  - id: python-class-encoded
    desc: python class encoded in wide string
    crit: component
    conf: 1.0
    if:
      type: encoded
      encoding: wide
      regex: "(?:^|\\n)\\s*class\\s+[A-Za-z_][A-Za-z0-9_]*(?:\\([^\\n)]{0,40}\\))?\\s*:"
composite_rules:
  - id: javascript
    desc: javascript code encoded in string
    crit: notable
    conf: 1.0
    any:
      - id: javascript-function
      - id: javascript-dom-create
      - id: javascript-window-assign
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
        - type: text
          substr: "window.chrome.webview"
  - id: python
    desc: python code encoded in string
    crit: notable
    conf: 1.0
    any:
      - id: python-import-encoded
      - id: python-from-import-encoded
      - id: python-def-encoded
      - id: python-class-encoded
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler/managed::mscorlib
      - id: metadata/lang/compiler/aot::native-runtime-large-file
  - id: shell
    desc: Encoded shell content (wide strings)
    crit: notable
    conf: 0.8
    any:
      - id: shell-shebang
      - id: shell-batch-prologue
      - id: shell-interpreter-encoded
    unless:
      - id: metadata/signed/platform::microsoft
  - id: shell-interpreter-encoded
    desc: Encoded shell interpreter (wide strings)
    crit: notable
    conf: 0.9
    any:
      - id: shell-interpreter-cmd
      - id: shell-interpreter-powershell
      - id: shell-interpreter-script-host
