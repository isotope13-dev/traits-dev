defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries, documents]
traits:
  - id: javascript
    desc: javascript code encoded in string
    crit: baseline
    conf: 1.0
    size_min: 10000
    if:
      type: encoded
      encoding: wide
      regex: "(window\\.onload\\s*=|function\\s+[A-Za-z_$][A-Za-z0-9_$]{0,63}\\s*\\()"
    unless:
      - id: metadata/binary/resource::kernel-driver-init
      - id: metadata/binary/resource::kernel-driver-idata
      - id: metadata/package/versioning::pe-version-resource
      - type: string_value
        substr: "window.chrome.webview"
  - id: shell-interpreter-cmd
    desc: cmd interpreter marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: "(?i)\\bcmd(?:\\.exe)?\\b"
  - id: shell-interpreter-powershell
    desc: powershell marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: "(?i)\\b(?:powershell|pwsh)(?:\\.exe)?\\b"
  - id: shell-interpreter-script-host
    desc: script host marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: "(?i)\\b(?:wscript|cscript)(?:\\.exe)?\\b"
  - id: shell-shebang
    desc: shell shebang encoded in string
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: wide
      regex: "#!/bin/(?:sh|bash|zsh)\\b"
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler::mscorlib
      - id: metadata/lang/compiler::native-runtime-large-file
  - id: shell-batch-prologue
    desc: batch prologue encoded in string
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: wide
      regex: "(?i)(@echo off\\b|\\bsetlocal\\b)"
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler::mscorlib
      - id: metadata/lang/compiler::native-runtime-large-file
composite_rules:
  - id: shell
    desc: Encoded shell content (wide strings)
    crit: notable
    conf: 0.8
    any:
      - id: shell-shebang
      - id: shell-batch-prologue
      - id: shell-interpreter-encoded
    unless:
      - id: metadata/signed/platform::microsoft
  - id: shell-interpreter-encoded
    desc: Encoded shell interpreter (wide strings)
    crit: notable
    conf: 0.9
    any:
      - id: shell-interpreter-cmd
      - id: shell-interpreter-powershell
      - id: shell-interpreter-script-host
