defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries, documents]
traits:
  - id: javascript
    desc: javascript code encoded in string
    crit: suspicious
    conf: 1.0
    if:
      type: encoded
      encoding: wide
      regex: '(window\.onload\s*=|function\s+[A-Za-z_$][A-Za-z0-9_$]{0,63}\s*\()'
    downgrade:
      all:
        - type: symbol
          exact: "CreateMdmEnterpriseDiagnosticHTMLReport"
        - type: string
          substr: "function ToggleTableContent("
        - type: string
          substr: "<html"
