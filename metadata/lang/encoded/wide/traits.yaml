defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries, documents]
traits:
  - id: javascript
    desc: javascript code encoded in string
    crit: baseline
    conf: 1.0
    size_min: 10000
    if:
      type: encoded
      encoding: wide
      regex: (window\.onload\s*=|function\s+[A-Za-z_$][A-Za-z0-9_$]{0,63}\s*\()
    unless:
      - id: metadata/format/pe::kernel-driver-init
      - id: metadata/format/pe::kernel-driver-idata
      - id: metadata/quality/versioning::pe-version-resource
  - id: shell-interpreter-cmd
    desc: cmd interpreter marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: (?i)\bcmd(?:\.exe)?\b
  - id: shell-interpreter-powershell
    desc: powershell marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: (?i)\b(?:powershell|pwsh)(?:\.exe)?\b
  - id: shell-interpreter-script-host
    desc: script host marker encoded
    crit: component
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      regex: (?i)\b(?:wscript|cscript)(?:\.exe)?\b
  - id: shell-shebang
    desc: shell shebang encoded in string
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: wide
      regex: '#!/bin/(?:sh|bash|zsh)\b'
  - id: shell-batch-prologue
    desc: batch prologue encoded in string
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: wide
      regex: (?i)(@echo off\b|\bsetlocal\b)
  - id: shell-download-command
    desc: shell download command encoded
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: wide
      regex: (?i)\b(?:curl|wget)\b.{0,40}https?://
    not:
      - substr: curl library
      - substr: curl.se/
    downgrade:
      any:
        - id: micro-behaviors/communications/http/download/curl::curl-easy-init
  - id: shell-admin-command
    desc: shell admin command encoded
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: wide
      regex: (?i)\b(?:chmod|chown|sudo)\b.{0,40}(?:[$%][A-Za-z_]|/[A-Za-z])
  - id: shell-remote-command
    desc: remote shell command encoded
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: wide
      regex: (?i)\b(?:scp|ssh)\b.{0,40}(?:[$%][A-Za-z_]|/[A-Za-z])
composite_rules:
  - id: shell
    desc: shell code encoded in string
    crit: baseline
    conf: 0.98
    any:
      - id: shell-interpreter-cmd
      - id: shell-interpreter-powershell
      - id: shell-interpreter-script-host
      - id: shell-shebang
      - id: shell-batch-prologue
      - id: shell-download-command
      - id: shell-admin-command
      - id: shell-remote-command
