defaults:
  platforms: [unix, windows]
  for: [c, cpp, rust, elf, macho, pe]
traits:
  - id: llvmbc-section
    desc: .llvmbc section
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .llvmbc
      section: .text
  - id: llvmlto-section
    desc: .llvmlto section
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .llvmlto
      section: .text
  - id: lto-string
    desc: "Link-Time Optimization build marker"
    crit: notable
    conf: 0.7
    if:
      type: text
      word: LTO
      section: .text
  - id: flto-flag
    desc: -flto flag
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: -flto
      section: .text
