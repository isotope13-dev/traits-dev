# Compiler Optimization and Link-Time Optimization
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === LTO micro-behaviors ===
  - id: llvmbc-section
    desc: .llvmbc section
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: ".llvmbc"
      section: .text
  - id: llvmlto-section
    desc: .llvmlto section
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: ".llvmlto"
      section: .text
  - id: lto-string
    desc: LTO string
    crit: notable
    conf: 0.7
    if:
      type: string
      exact: "LTO"
      section: .text
  - id: flto-flag
    desc: -flto flag
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: "-flto"
      section: .text
composite_rules:
  # LTO composite
  - id: lto
    desc: Link Time Optimization enabled
    crit: notable
    conf: 0.8
    any:
      - id: llvmbc-section
      - id: llvmlto-section
      - id: lto-string
      - id: flto-flag
