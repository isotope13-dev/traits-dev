defaults:
  platforms: [windows, unix]
  for: [png]
  crit: component
  conf: 0.65

traits:
  - id: low-edge-density
    desc: Low image edge density metric
    size_min: 8192
    if:
      type: metrics
      field: image.edge_density
      max: 0.02

  - id: png-incompressible-pixels
    desc: PNG pixels have low compressibility
    size_min: 65536
    conf: 0.7
    if:
      type: metrics
      field: png.compression_ratio
      min: 0.85
