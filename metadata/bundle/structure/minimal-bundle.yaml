# Minimal Info.plist structure checks (macOS bundles)
# NOTE: Bundle-directory existence checks are not expressible in current trait DSL.
# Keep rules scoped to Info.plist key presence/absence only.
defaults:
  for: [plist]
  platforms: [macos]
traits:
  - id: info-plist-missing-bundle-id
    desc: Info.plist missing bundle identifier
    crit: notable
    conf: 0.7
    for: [plist]
    if:
      type: basename
      exact: "Info.plist"
    unless:
      - type: kv
        path: "CFBundleIdentifier"
