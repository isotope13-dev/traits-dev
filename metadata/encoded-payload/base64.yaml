defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: base64
    desc: Presence of Base64 encoded content.
    crit: notable
    if:
      type: encoded
      encoding: base64
      regex: ".{20,100}"
  - id: pe-dense-base64-like-blobs
    desc: PE with many long base64-like strings
    crit: notable
    count_min: 5
    if:
      type: string_value
      regex: "^[A-Za-z0-9+/]{60,}={0,2}$"
      section: .text
