defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: windows-extension-source-path
    desc: psutil Windows extension source path
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: psutil/arch/windows\

  - id: windows-extension-filename
    desc: psutil Windows extension filename
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: _psutil_windows.pyd

composite_rules:
  - id: windows-extension
    desc: psutil Windows extension binary
    crit: baseline
    conf: 0.98
    any:
      - id: metadata/vendor/psutil::windows-extension-source-path
      - id: metadata/vendor/psutil::windows-extension-filename
