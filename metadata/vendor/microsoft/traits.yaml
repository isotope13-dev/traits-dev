defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: microsoft-corp-marker-rsrc
    desc: Microsoft vendor marker in resource section
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft (Corporation|Code Signing PCA|Time-Stamp PCA)
      section: .rsrc
  - id: microsoft-corp-marker-rdata
    desc: Microsoft vendor marker in read-only data
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft (Corporation|Code Signing PCA|Time-Stamp PCA)
      section: .rdata
  - id: microsoft-corp-marker-cert
    desc: Microsoft vendor marker in certificate data
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: Microsoft (Corporation|Code Signing PCA)
      offset_range: [-16384, null]
  - id: openmp-runtime
    desc: Microsoft C/C++ OpenMP Runtime
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: Microsoft C/C++ OpenMP Runtime
      section: .text
  - id: is-microsoft-named
    desc: File name contains Microsoft
    crit: component
    conf: 0.8
    if:
      type: basename
      substr: microsoft
      case_insensitive: true
  - id: is-windows-named
    desc: File name contains Windows
    crit: component
    conf: 0.8
    if:
      type: basename
      substr: Windows
  - id: diagnostics-hub
    desc: Microsoft DiagnosticsHub component
    crit: notable
    conf: 0.9
    if:
      type: basename
      substr: DiagnosticsHub
  - id: is-defender-named-1
    desc: Defender file name
    crit: notable
    conf: 0.8
    if:
      type: basename
      regex: (?i)(Defender|MpDlp|MpEngine|Sense)
  - id: is-defender-named-2
    desc: Defender Mp service file name
    crit: notable
    conf: 0.8
    if:
      type: basename
      regex: (?i)(MpSvc|MpCmdRun|MsMpEng)
  - id: is-defender-named-3
    desc: WebThreatDef file name
    crit: notable
    conf: 0.8
    if:
      type: basename
      regex: (?i)WebThreatDef
  - id: microsoft-corp-versioninfo
    desc: Claims Microsoft Corp in version resource
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft Corp(oration)?\.?
      section: .rsrc
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: sysinternals-tool
    desc: Sysinternals tool self-identification
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Sysinternals
      section: .rsrc
composite_rules:
  - id: microsoft-corp-marker
    desc: Embedded Microsoft vendor marker
    crit: baseline
    conf: 0.9
    any:
      - id: microsoft-corp-marker-rsrc
      - id: microsoft-corp-marker-rdata
      - id: microsoft-corp-marker-cert
  - id: is-defender-named
    desc: Defender file name
    crit: notable
    conf: 0.8
    any:
      - id: is-defender-named-1
      - id: is-defender-named-2
      - id: is-defender-named-3
