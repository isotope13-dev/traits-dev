defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: microsoft-corp-marker-rsrc
    desc: Microsoft vendor marker in resource section
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft (Corporation|Code Signing PCA|Time-Stamp PCA)
      section: .rsrc
  - id: microsoft-corp-marker-rdata
    desc: Microsoft vendor marker in read-only data
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft (Corporation|Code Signing PCA|Time-Stamp PCA)
      section: .rdata
  - id: microsoft-corp-marker-cert
    desc: Microsoft vendor marker in certificate data
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: Microsoft (Corporation|Code Signing PCA)
      offset_range: [-16384, null]
  - id: openmp-runtime
    desc: Microsoft C/C++ OpenMP Runtime
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: Microsoft C/C++ OpenMP Runtime
      section: .text
  - id: is-microsoft-named
    desc: File name contains Microsoft
    crit: component
    conf: 0.8
    if:
      type: basename
      substr: microsoft
      case_insensitive: true
  - id: is-windows-named
    desc: File name contains Windows
    crit: component
    conf: 0.8
    if:
      type: basename
      substr: Windows
  - id: diagnostics-hub
    desc: Microsoft DiagnosticsHub component
    crit: notable
    conf: 0.9
    if:
      type: basename
      substr: DiagnosticsHub
  - id: is-defender-named-1
    desc: Defender file name
    crit: notable
    conf: 0.8
    if:
      type: basename
      regex: (?i)(Defender|MpDlp|MpEngine|Sense)
  - id: is-defender-named-2
    desc: Defender Mp service file name
    crit: notable
    conf: 0.8
    if:
      type: basename
      regex: (?i)(MpSvc|MpCmdRun|MsMpEng)
  - id: is-defender-named-3
    desc: WebThreatDef file name
    crit: notable
    conf: 0.8
    if:
      type: basename
      regex: (?i)WebThreatDef
  - id: microsoft-corp-versioninfo
    desc: Claims Microsoft Corp in version resource
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft Corp(oration)?\.?
      section: .rsrc
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: ieframe-original-filename
    desc: IE frame original filename
    crit: component
    conf: 0.95
    if:
      type: text
      exact: IEFRAME.DLL
      section: .rsrc
  - id: internet-browser-description
    desc: Internet Browser file description
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Internet Browser
      section: .rsrc
  - id: ieframe-basename
    desc: IE frame DLL basename
    crit: component
    conf: 0.9
    if:
      type: basename
      exact: ieframe.dll
      case_insensitive: true
  - id: wmi-win32-provider-versioninfo
    desc: Microsoft WMI Win32 provider version info
    crit: component
    conf: 0.92
    if:
      type: text
      exact: WMI Win32 Provider
      section: .rsrc
  - id: sysinternals-tool
    desc: Sysinternals tool self-identification
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Sysinternals
      section: .rsrc
  - id: advanced-inf-setup-context
    desc: Microsoft Advanced INF setup component context
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Software\Microsoft\Advanced INF Setup
  - id: win32kfull-system-path
    desc: win32kfull system driver path
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)\\SystemRoot\\System32\\win32kfull\.sys
  - id: win32kfull-api-set-table
    desc: win32kfull API set table
    crit: component
    conf: 0.95
    if:
      type: text
      exact: W32GetWin32kFullApiSetTable
  - id: win32kbase-system-path
    desc: win32kbase system driver path
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)\\SystemRoot\\System32\\win32kbase\.sys
  - id: win32kbase-api-set-table
    desc: win32kbase API set table
    crit: component
    conf: 0.95
    if:
      type: text
      exact: ext_ms_win_core_win32k_base_export_l1_table
  - id: visual-studio-uitesting-namespace
    desc: Visual Studio UI Testing namespace
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Microsoft.VisualStudio.TestTools.UITesting
  - id: visual-studio-uitesting-browserwindow
    desc: Visual Studio UI browser automation
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Microsoft.VisualStudio.TestTools.UITesting::BrowserWindow
composite_rules:
  - id: microsoft-corp-marker
    desc: Embedded Microsoft vendor marker
    crit: baseline
    conf: 0.9
    any:
      - id: microsoft-corp-marker-rsrc
      - id: microsoft-corp-marker-rdata
      - id: microsoft-corp-marker-cert
  - id: internet-explorer-frame-component
    desc: Microsoft Internet Explorer frame DLL
    crit: baseline
    conf: 0.96
    all:
      - id: microsoft-corp-versioninfo
      - id: ieframe-original-filename
      - id: internet-browser-description
    any:
      - id: ieframe-basename
      - id: metadata/package/versioning::pe-version-resource
  - id: is-defender-named
    desc: Defender file name
    crit: notable
    conf: 0.8
    any:
      - id: is-defender-named-1
      - id: is-defender-named-2
      - id: is-defender-named-3
  - id: win32kfull-system-component
    desc: Microsoft win32kfull kernel component
    crit: baseline
    conf: 0.97
    all:
      - id: win32kfull-system-path
      - id: win32kfull-api-set-table
  - id: win32kbase-system-component
    desc: Microsoft win32kbase kernel component
    crit: baseline
    conf: 0.97
    all:
      - id: win32kbase-system-path
      - id: win32kbase-api-set-table
  - id: visual-studio-uitesting-component
    desc: Microsoft Visual Studio UI Testing component
    crit: baseline
    conf: 0.98
    all:
      - id: metadata/signed/platform::microsoft
      - id: visual-studio-uitesting-namespace
    any:
      - id: visual-studio-uitesting-browserwindow
      - id: metadata/package/versioning::pe-productname-field
