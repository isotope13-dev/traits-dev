defaults:
  for: [pe, dll]
traits:
  - id: microsoft-corp-marker
    desc: Embedded Microsoft vendor marker
    crit: baseline
    conf: 0.9
    for: [pe, dll]
    if:
      type: string
      regex: "Microsoft (Corporation|Code Signing PCA|Time-Stamp PCA)"
      case_insensitive: true
      section: .text
  - id: openmp-runtime
    desc: Microsoft C/C++ OpenMP Runtime
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe, dll]
    if:
      type: string
      substr: "Microsoft® C/C++ OpenMP Runtime"
      section: .text
  - id: is-microsoft-named
    desc: File name contains Microsoft
    crit: component
    conf: 0.8
    for: [pe, dll]
    if:
      type: basename
      substr: "microsoft"
      case_insensitive: true
  - id: is-windows-named
    desc: File name contains Windows
    crit: notable
    conf: 0.8
    for: [pe, dll]
    if:
      type: basename
      substr: "Windows"
  - id: diagnostics-hub
    desc: Microsoft DiagnosticsHub component
    crit: notable
    conf: 0.9
    for: [pe, dll]
    if:
      type: basename
      substr: "DiagnosticsHub"
  - id: is-defender-named-1
    desc: Defender file name
    crit: notable
    conf: 0.8
    for: [pe, dll]
    if:
      type: basename
      regex: "(?i)(Defender|MpDlp|MpEngine|Sense)"
  - id: is-defender-named-2
    desc: Defender Mp service file name
    crit: notable
    conf: 0.8
    for: [pe, dll]
    if:
      type: basename
      regex: "(?i)(MpSvc|MpCmdRun|MsMpEng)"
  - id: is-defender-named-3
    desc: WebThreatDef file name
    crit: notable
    conf: 0.8
    for: [pe, dll]
    if:
      type: basename
      regex: "(?i)WebThreatDef"
composite_rules:
  - id: is-defender-named
    desc: Defender file name
    crit: notable
    conf: 0.8
    any:
      - id: metadata/vendor/microsoft::is-defender-named-1
      - id: metadata/vendor/microsoft::is-defender-named-2
      - id: metadata/vendor/microsoft::is-defender-named-3
