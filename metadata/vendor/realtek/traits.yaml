# Realtek device software identification
# Camera and chipset support packages often bundle signed helper drivers,
# temp staging logic, and device-control code paths that resemble droppers.
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: realtek-corp-string
    desc: Realtek corporate string
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: "Realtek Semiconductor Corp."
      section: .rsrc
  - id: librtscam-module
    desc: LibRTSCam module name
    crit: baseline
    conf: 0.98
    if:
      type: string_value
      exact: "LibRTSCam.dll"
      section: .rsrc
  - id: realtek-camera-exports
    desc: Realtek camera control exports
    crit: baseline
    conf: 0.97
    count_min: 10
    if:
      type: symbol
      regex: "^(UVC_|DFU_)"
composite_rules:
  - id: realtek-camera-stack
    desc: Realtek camera support binary
    crit: notable
    conf: 0.99
    any:
      - id: metadata/vendor/realtek::realtek-corp-string
      - id: metadata/vendor/realtek::librtscam-module
      - id: metadata/vendor/realtek::realtek-camera-exports
