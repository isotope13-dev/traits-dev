defaults:
  platforms: [macos, linux]
  for: [shell]
traits:
  - id: ssh-string
    desc: ssh keyword
    crit: baseline
    conf: 0.3
    for: [c, kotlin, swift, zig]
    if:
      type: text
      word: ssh
  - id: rcp-string
    desc: rcp keyword
    crit: baseline
    conf: 0.3
    for: [java, class, kotlin]
    if:
      type: text
      word: rcp
