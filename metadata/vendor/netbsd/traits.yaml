defaults:
  platforms: [unix]
  for: [binaries, scripts, c, cpp]
  crit: baseline
  conf: 0.9

traits:
  - id: rcs-id
    desc: NetBSD RCS identifier
    if:
      type: text
      substr: "$NetBSD:"

  - id: source-tree-path
    desc: NetBSD source tree path
    if:
      type: text
      substr: /usr/src/

  - id: secure-shell-marker
    desc: NetBSD Secure Shell marker
    if:
      type: text
      substr: NetBSD_Secure_Shell

  - id: pam-module-source-path
    desc: NetBSD PAM module source path
    for: [so, elf, c, cpp]
    if:
      type: text
      substr: /usr/src/lib/libpam/modules/

  - id: postfix-source-path
    desc: NetBSD Postfix source path
    for: [elf, c, cpp]
    if:
      type: text
      substr: /usr/src/external/ibm-public/postfix/

composite_rules:
  - id: base-system-artifact
    desc: NetBSD base system artifact
    conf: 0.95
    any:
      - id: rcs-id
      - id: source-tree-path
      - id: secure-shell-marker
      - id: pam-module-source-path
      - id: postfix-source-path
