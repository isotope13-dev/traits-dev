defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [source, binaries]
traits:
  - id: jetbrains-company-string
    desc: JetBrains company string
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: JetBrains s.r.o.
      section: .rsrc
  - id: jetbrains-product-info
    desc: JetBrains product descriptor
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: product-info.json
      section: .text
composite_rules:
  - id: jetbrains-binary
    desc: Binary from JetBrains
    crit: notable
    conf: 0.98
    any:
      - id: metadata/vendor/jetbrains::jetbrains-company-string
      - id: metadata/vendor/jetbrains::jetbrains-product-info
  - id: signed-jetbrains-binary
    desc: Signed JetBrains binary
    crit: baseline
    conf: 0.99
    all:
      - id: metadata/vendor/jetbrains::jetbrains-company-string
      - id: metadata/signed/developer::jetbrains-s.r.o.
