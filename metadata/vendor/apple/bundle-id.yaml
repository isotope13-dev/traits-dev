defaults:
  platforms:
    - macos
    - ios
    - linux
    - windows
    - unix
    - android
  for:
    - macho
    - javascript
    - typescript
  crit: baseline
  conf: 0.7
traits:
  - id: generic-apple
    desc: Apple bundle identifier (com.apple.*)
    if:
      type: text
      regex: com\.apple\.[a-zA-Z][a-zA-Z0-9.-]{3,}
      section: .text
    not:
      - com.apple.mail
      - com.apple.iChat
      - com.apple.Messages
      - com.apple.dt.runtime
      - com.apple.quarantine
      - com.apple.os.config
      - com.apple.notes
  - id: mail
    desc: Apple Mail bundle identifier
    if:
      type: text
      substr: com.apple.mail
      section: .text
  - id: ichat
    desc: Apple iChat bundle identifier
    if:
      type: text
      substr: com.apple.iChat
      section: .text
  - id: messages
    desc: Apple Messages bundle identifier
    if:
      type: text
      substr: com.apple.Messages
      section: .text
  - id: dt-runtime
    desc: Apple DevTools runtime bundle identifier
    if:
      type: text
      substr: com.apple.dt.runtime
      section: .text
  - id: quarantine
    desc: Apple Quarantine bundle identifier
    if:
      type: text
      substr: com.apple.quarantine
      section: .text
  - id: os-config
    desc: Apple OS config bundle identifier
    if:
      type: text
      substr: com.apple.os.config
      section: .text
  - id: notes
    desc: Apple Notes bundle identifier
    if:
      type: text
      substr: com.apple.notes
      section: .text
  - id: short-prefix
    desc: Non-reverse-DNS bundle identifier prefix
    crit: notable
    conf: 0.85
    for:
      - plist
    if:
      type: kv
      path: CFBundleIdentifier
      regex: ^[A-Z]{1,3}\.
composite_rules:
  - id: messaging-app
    desc: Apple messaging application bundle identifier
    any:
      - id: mail
      - id: ichat
      - id: messages
