# Apple CodeResources (Code Signature Resource Manifest)
# Identifies structural features of Apple _CodeSignature/CodeResources plists
#
# CodeResources files are often extensionless XML plists.
defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: coderesources-plist
    desc: Apple code signature resource manifest
    crit: baseline
    conf: 0.95
    if:
      type: basename
      exact: "CodeResources"

  - id: plist-doctype
    desc: Apple plist doctype declaration
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"'
      section: .text

  - id: nested-code-signature-table
    desc: Nested bundle signature table
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: "<key>files2</key>"
      section: .text

  - id: nested-signature-rules
    desc: Nested bundle signing rules
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: "<key>rules2</key>"
      section: .text

  - id: apple-generic-requirement
    desc: Apple generic requirement blob
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: "anchor apple generic and certificate 1["
      section: .text

  # Apple-internal MobileDevice updater component resources.
  # com.apple.mobiledeviceupdater is Apple's private MobileDevice update plist,
  # present in Apple's own iTunesUpdater/device support bundles. Finding it in
  # a code signature indicates Apple's binary was re-bundled by a third party.
  - id: apple-mobiledevice-updater-resource
    desc: Apple MobileDevice updater component in code signature
    crit: notable
    conf: 0.9
    attack: "T1036"
    if:
      type: text
      substr: "com.apple.mobiledeviceupdater"
      section: .text

  # com.apple.iphone-x-1.icns is Apple's internal hardware icon for iPhone X.
  # Its presence in a third-party code signature indicates re-bundled Apple software.
  - id: apple-hardware-icon-resource
    desc: Apple iPhone hardware icon in code signature
    crit: notable
    conf: 0.85
    attack: "T1036"
    if:
      type: text
      substr: "com.apple.iphone-x-1"
      section: .text

composite_rules:
  - id: extensionless-coderesources
    desc: Extensionless Apple CodeResources plist
    crit: baseline
    conf: 0.98
    all:
      - id: coderesources-plist
      - id: plist-doctype
    any:
      - id: nested-code-signature-table
      - id: nested-signature-rules
