defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: sandboxie-product-marker
    desc: Sandboxie product marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Sandboxie
      section: .rsrc
  - id: sbie-component-marker
    desc: Sandboxie component marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: \bSbie(?:Dll|Svc|Drv)\b
composite_rules:
  - id: sandboxie-component
    desc: Sandboxie component marker
    crit: baseline
    conf: 0.95
    any:
      - id: sandboxie-product-marker
      - id: sbie-component-marker
