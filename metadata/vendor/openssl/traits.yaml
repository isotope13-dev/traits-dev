# OpenSSL Project Identification
# Detects files associated with the OpenSSL project
# Useful for downgrading supply-chain findings on legitimate OpenSSL source

traits:
  - id: openssl-project-copyright
    desc: Modern OpenSSL Project copyright
    crit: baseline
    conf: 0.95
    for: [all]
    if:
      type: raw
      substr: "The OpenSSL Project Authors"

  - id: openssl-eric-young-copyright
    desc: OpenSSL copyright and license header
    crit: baseline
    conf: 0.90
    for: [all]
    if:
      type: string
      substr: "Eric Young (eay@cryptsoft.com)"
