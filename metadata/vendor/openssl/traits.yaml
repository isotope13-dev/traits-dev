# OpenSSL Project Identification
# Detects files associated with the OpenSSL project
# Useful for downgrading supply-chain findings on legitimate OpenSSL source/binaries
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: openssl-project-copyright
    desc: Modern OpenSSL Project copyright
    crit: baseline
    conf: 0.95
    for: [source]
    if:
      type: raw
      substr: "The OpenSSL Project Authors"
      section: text
  - id: openssl-eric-young-copyright
    desc: OpenSSL copyright and license header
    crit: baseline
    conf: 0.90
    for: [source]
    if:
      type: string_value
      substr: "Eric Young (eay@cryptsoft.com)"
      section: text
  - id: openssl-version-symbol
    desc: OpenSSL_version export symbol
    crit: baseline
    conf: 0.95
    for: [elf, pe, macho, so, dll, dylib]
    if:
      type: symbol
      exact: "OpenSSL_version"
  - id: openssl-evp-api
    desc: OpenSSL EVP API symbols
    crit: baseline
    conf: 0.95
    for: [elf, pe, macho, so, dll, dylib]
    if:
      type: symbol
      exact: "EVP_EncryptInit"
composite_rules:
  - id: openssl-library
    desc: OpenSSL cryptographic library binary
    crit: baseline
    conf: 0.95
    all:
      - id: openssl-version-symbol
      - id: openssl-evp-api
