defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95
traits:
  - id: pash-corp-string
    desc: Pash Software vendor string
    if:
      type: string_value
      substr: Pash Software Co., Ltd.
      section: .rsrc
  - id: zprotect-plugin-description
    desc: ZProtect plugin resource text
    if:
      type: string_value
      substr: A plugin for Zprotect System.
      section: .rsrc
  - id: zprotect-plugin-import
    desc: ZProtect plugin API import
    if:
      type: symbol
      exact: ZPPC_SetCfgIntValue
  - id: zprotect-plugin-exports
    desc: ZProtect plugin export surface
    crit: component
    conf: 0.98
    count_min: 6
    if:
      type: symbol
      regex: ^ZPCP_
composite_rules:
  - id: zprotect-plugin
    desc: ZProtect plugin metadata
    crit: baseline
    conf: 0.99
    all:
      - id: pash-corp-string
      - id: zprotect-plugin-import
    any:
      - id: zprotect-plugin-description
      - id: zprotect-plugin-exports
