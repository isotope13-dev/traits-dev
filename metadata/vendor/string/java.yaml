defaults:
  platforms:
    - windows
  for:
    - pe
    - csharp
traits:
  - id: java-platform-string
    desc: Java Platform SE string
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: Java(TM) Platform SE binary
      case_insensitive: true
  - id: java-platform-se-binary-resource
    desc: Java Platform SE resource string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Java(TM) Platform SE binary
      section: .rsrc
  - id: oracle-america-string
    desc: Oracle America Inc string
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: Oracle America Inc.
      case_insensitive: true
  - id: oracle-corporation-string
    desc: Oracle Corporation string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Oracle Corporation
      section: .rsrc
