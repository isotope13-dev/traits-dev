defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: adobe-inc-marker-rsrc
    desc: Adobe vendor marker in resource section
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: Adobe Inc
      section: .rsrc
  - id: adobe-inc-marker-rdata
    desc: Adobe vendor marker in read-only data
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: Adobe Inc
      section: .rdata
