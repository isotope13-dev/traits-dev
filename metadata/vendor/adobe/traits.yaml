defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: adobe-inc-marker-rsrc
    desc: Adobe vendor marker in resource section
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: Adobe Inc
      section: .rsrc
  - id: adobe-inc-marker-rdata
    desc: Adobe vendor marker in read-only data
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: Adobe Inc
      section: .rdata
  - id: adobe-systems-inc-marker
    desc: Adobe legacy vendor marker in resource
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Adobe Systems Incorporated
      section: .rsrc
