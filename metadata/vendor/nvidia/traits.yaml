defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.96
traits:
  - id: streamer-product-name
    desc: NVIDIA Streamer product metadata
    if:
      type: text
      exact: NVIDIA Streamer
      section: .rsrc
  - id: rxcore-file-description
    desc: NVIDIA rxcore file description
    if:
      type: text
      exact: NVIDIA rxcore
      section: .rsrc
  - id: rxcore-original-filename
    desc: NVIDIA rxcore original filename
    if:
      type: text
      exact: rxcore.dll
      section: .rsrc
composite_rules:
  - id: nvidia-streamer-rxcore
    desc: NVIDIA Streamer rxcore component
    all:
      - id: metadata/signed/developer::nvidia-corporation
      - id: streamer-product-name
      - id: rxcore-file-description
      - id: rxcore-original-filename
