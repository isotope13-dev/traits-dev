defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: valve-corp-string
    desc: Valve Corporation string
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: Valve Corp.
      section: .text
  - id: steam-path-string
    desc: Steam path reference
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: Software\Valve\Steam
      section: .text
  - id: steam-api-exports
    desc: Steam API exports
    crit: baseline
    conf: 0.95
    count_min: 5
    if:
      type: symbol
      regex: ^(SteamAPI_|Steam_|Breakpad_Steam)
  - id: breakpad-steamid-export
    desc: Steam Breakpad export
    crit: baseline
    conf: 0.98
    if:
      type: symbol
      exact: Breakpad_SetSteamID
  - id: steam-error-reporter-path
    desc: Steam error reporter path
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: /steamerrorreporter.exe
      section: .rdata
composite_rules:
  - id: valve-corp-binary
    desc: Binary from Valve Corporation
    crit: notable
    conf: 0.98
    any:
      - id: metadata/vendor/valve::valve-corp-string
      - id: metadata/vendor/valve::steam-path-string
      - id: metadata/vendor/valve::steam-api-exports
      - id: metadata/vendor/valve::breakpad-steamid-export
      - id: metadata/vendor/valve::steam-error-reporter-path
