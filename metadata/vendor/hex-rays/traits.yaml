defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: ida64-import
    desc: IDA Pro ida64 import
    crit: component
    conf: 0.98
    if:
      type: text
      exact: ida64.dll
  - id: pin-tracer-plugin-string
    desc: IDA PIN tracer plugin string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: PIN tracer plugin.
  - id: ida-pin-tool-string
    desc: IDA PIN tool string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: IDA PIN tool
composite_rules:
  - id: ida-pin-tracer-plugin
    desc: IDA PIN tracer plugin binary
    crit: baseline
    conf: 0.99
    all:
      - id: ida64-import
    any:
      - id: pin-tracer-plugin-string
      - id: ida-pin-tool-string
