# Testing Framework - BENCHMARK
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [source]
traits:
  # === Atomic: Benchmark ===
  - id: benchmark-lower
    desc: benchmark reference (lowercase)
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      word: "benchmark"
      section: .text
  - id: benchmark-title
    desc: Benchmark reference (title case)
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      word: "Benchmark"
      section: .text
  - id: google-benchmark
    desc: google/benchmark library
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: "google/benchmark"
      section: .text
  - id: go-benchmark-type
    desc: Go testing.B benchmark type
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      substr: "func Benchmark"
      section: .text
  - id: criterion-bench
    desc: Criterion benchmark library
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      word: "criterion"
      section: .text
  - id: benchmarkdotnet
    desc: BenchmarkDotNet library
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      word: "BenchmarkDotNet"
      section: .text
composite_rules:
  # Benchmark frameworks
  - id: benchmark
    desc: Benchmark test framework
    crit: notable
    conf: 0.9
    any:
      - {id: benchmark-lower}
      - {id: benchmark-title}
      - {id: google-benchmark}
      - {id: go-benchmark-type}
      - {id: criterion-bench}
      - {id: benchmarkdotnet}
