# Testing Framework - MOCHA
traits:
  # === Atomic: Mocha (JavaScript) ===
  - id: mocha-word
    desc: mocha reference
    crit: baseline
    conf: 0.7
    for: [javascript]
    if:
      type: string
      word: "mocha"
  # describe() and it() shared with Jest above
  - id: mocha-before
    desc: "before() hook"
    crit: baseline
    conf: 0.7
    for: [javascript]
    if:
      type: string
      substr: "before("
  - id: mocha-after
    desc: "after() hook"
    crit: baseline
    conf: 0.7
    for: [javascript]
    if:
      type: string
      substr: "after("
composite_rules:
  # Jest BDD functions - use the one defined in jest/traits.yaml
  # (removed duplicate - use metadata/dev/testing/jest::js-bdd-functions instead)

  # Mocha (JavaScript) - all patterns helper
  - id: mocha-all-patterns
    desc: Mocha test patterns
    crit: baseline
    conf: 0.7
    for: [javascript]
    needs: 3
    any:
      - {id: mocha-word}
      - {id: 'metadata/dev/testing/jest::jest-describe'}
      - {id: 'metadata/quality/npm/test-ctx::it-call'}
      - {id: mocha-before}
      - {id: mocha-after}
  # Mocha (JavaScript)
  - id: mocha
    desc: Mocha test framework
    crit: notable
    conf: 0.95
    for: [javascript]
    any:
      - {id: mocha-word}
      - {id: mocha-all-patterns}
