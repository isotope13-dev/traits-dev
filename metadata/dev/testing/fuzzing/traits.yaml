defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: libfuzzer-word
    desc: libfuzzer reference
    crit: baseline
    conf: 0.8
    for:
      - c
      - cpp
    if:
      type: string_value
      word: libfuzzer
  - id: llvm-fuzzer
    desc: LLVMFuzzer reference
    crit: baseline
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: string_value
      word: LLVMFuzzer
  - id: afl-word
    desc: AFL fuzzer
    crit: baseline
    conf: 0.7
    for:
      - c
      - cpp
    if:
      type: string_value
      word: AFL
  - id: honggfuzz-word
    desc: honggfuzz reference
    crit: baseline
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: string_value
      word: honggfuzz
  - id: go-fuzz
    desc: go-fuzz reference
    crit: baseline
    conf: 0.9
    for:
      - go
    if:
      type: string_value
      word: go-fuzz
  - id: cargo-fuzz
    desc: cargo-fuzz reference
    crit: baseline
    conf: 0.9
    for:
      - rust
    if:
      type: string_value
      word: cargo-fuzz
composite_rules:
  - id: fuzzing
    desc: Fuzzing test framework
    crit: notable
    conf: 0.9
    any:
      - id: libfuzzer-word
      - id: llvm-fuzzer
      - id: afl-word
      - id: honggfuzz-word
      - id: go-fuzz
      - id: cargo-fuzz
