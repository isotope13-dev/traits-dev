# Testing Framework - RSPEC
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
traits:
  # === Atomic: RSpec (Ruby) ===
  - id: rspec-lower
    desc: rspec reference (lowercase)
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: "rspec"
  - id: rspec-title
    desc: RSpec reference (title case)
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: "RSpec"
  - id: rspec-describe
    desc: "describe statement"
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "describe "
  - id: rspec-context
    desc: "context statement"
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "context "
composite_rules:
  # RSpec BDD patterns helper
  - id: rspec-bdd-patterns
    desc: RSpec BDD patterns
    crit: baseline
    conf: 0.7
    needs: 2
    any:
      - { id: rspec-describe }
      - { id: rspec-context }
      - { id: "metadata/quality/testing::jest-expect-call" }
  # RSpec (Ruby)
  - id: rspec
    desc: RSpec test framework
    crit: notable
    conf: 0.95
    any:
      - { id: rspec-lower }
      - { id: rspec-title }
      - { id: rspec-bdd-patterns }
