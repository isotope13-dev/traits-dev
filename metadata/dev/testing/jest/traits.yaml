defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: jest-word
    desc: jest reference
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: string_value
      word: jest
  - id: jest-describe
    desc: describe() function
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: ast
      kind: call
      exact: describe
  - id: jest-expect
    desc: expect() function
    crit: baseline
    conf: 0.5
    for:
      - javascript
    if:
      type: ast
      kind: call
      exact: expect
  - id: jest-to-be
    desc: toBe() matcher
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: raw
      substr: toBe(
  - id: jest-to-equal
    desc: toEqual() matcher
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: raw
      substr: toEqual(
composite_rules:
  - id: js-bdd-functions
    desc: JavaScript BDD test functions
    crit: baseline
    conf: 0.6
    for:
      - javascript
    needs: 3
    any:
      - id: jest-describe
      - id: metadata/quality/npm/test-ctx::it-call
      - id: jest-expect
      - id: jest-to-be
      - id: jest-to-equal
  - id: jest
    desc: Jest test framework
    crit: notable
    conf: 0.95
    for:
      - javascript
    any:
      - id: jest-word
      - id: js-bdd-functions
