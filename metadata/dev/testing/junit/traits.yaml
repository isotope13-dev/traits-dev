# Testing Framework - JUNIT
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [java]
traits:
  # === Atomic: JUnit (Java) ===
  - id: junit-package
    desc: org.junit package
    crit: baseline
    conf: 0.8
    if:
      type: string
      substr: "org.junit"
  - id: junit-test-annotation
    desc: "@Test annotation"
    crit: baseline
    conf: 0.8
    if:
      type: string
      substr: "@Test"
  - id: junit-assert-equals
    desc: assertEquals method
    crit: baseline
    conf: 0.7
    if:
      type: string
      word: "assertEquals"
  - id: junit-assert-true
    desc: assertTrue method
    crit: baseline
    conf: 0.7
    if:
      type: string
      word: "assertTrue"
  - id: junit-assert-not-null
    desc: assertNotNull method
    crit: baseline
    conf: 0.7
    if:
      type: string
      word: "assertNotNull"
composite_rules:
  # JUnit (Java)
  - id: junit
    desc: JUnit test framework
    crit: notable
    conf: 0.95
    any:
      - {id: junit-package}
      - {id: junit-test-annotation}
      - {id: junit-assert-equals}
      - {id: junit-assert-true}
      - {id: junit-assert-not-null}
