defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
  for:
    - shell
traits:
  - id: gnu-coreutils-test
    desc: GNU Coreutils test script
    crit: notable
    if:
      type: string_value
      regex: skip_if_root_|require_gcc_shared_|print_ver_\s+\w+|tests/init\.sh
  - id: autoconf-testsuite
    desc: GNU Autoconf-generated test suite
    crit: notable
    count_min: 3
    if:
      type: raw
      regex: at_fn_group_banner
composite_rules: []
