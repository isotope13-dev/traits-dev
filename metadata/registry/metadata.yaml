# Atomic facts read from a normalized package-registry record (the
# `*.registry.json` document fletch materializes from an upstream provider's
# listing — npm, PyPI, crates.io, Packagist, the AUR, the Chrome Web Store).
#
# These describe what the *registry* says about a release: its ecosystem, age,
# reach, reputation, and the developer's own pitch. Neutral building blocks on
# their own — the risk verdicts live in the objectives/supply-chain/registry/
# composites that combine them. Scoped `for: [all]` and gated by the `registry.*`
# facts themselves, which exist only on a registry record, so they never fire on
# ordinary files.
defaults:
  for: [all]
  platforms: [unix, windows, android, ios]

traits:
- id: browser-extension
  desc: Chrome Web Store browser-extension listing
  crit: component
  if:
    type: value
    path: registry.ecosystem
    regex: '^chrome$'

- id: freshly-published
  desc: Release published within seven days
  crit: notable
  if:
    type: metrics
    field: registry.age_days
    max: 7
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: deprecated
  desc: Registry marks this release deprecated
  crit: notable
  if:
    type: metrics
    field: registry.is_deprecated
    min: 1

- id: low-adoption
  desc: Near-zero recent downloads for registry package
  crit: component
  if:
    type: metrics
    field: registry.downloads_recent
    max: 50

- id: widely-installed
  desc: Large registry install base (10k+ downloads)
  crit: component
  if:
    type: metrics
    field: registry.downloads_recent
    min: 10000

# Release-history facts (the package's cadence, not just this version's age).
# `freshly-published` above is the *version* age; `brand-new-package` is the
# *package* age — a name that itself only just appeared.
- id: brand-new-package
  desc: Package first published within seven days
  crit: notable
  if:
    type: metrics
    field: registry.package_age_days
    max: 7

- id: publish-burst-24h
  desc: Three releases published within 24 hours
  crit: notable
  if:
    type: metrics
    field: registry.releases_24h
    min: 3

- id: dormant-package-reawakened
  desc: Package resumed releases after one year
  crit: notable
  if:
    type: metrics
    field: registry.days_since_previous_release
    min: 365
  unless:
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: registry-install-hook
  desc: Registry flags an install script
  crit: notable
  if:
    type: metrics
    field: registry.has_install_script
    min: 1

# Custody facts — who pushed this release, and whether they belong here.
- id: publisher-not-maintainer
  desc: Publisher absent from package maintainer list
  crit: notable
  if:
    type: metrics
    field: registry.publisher_in_maintainers
    max: 0
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: no-maintainers
  desc: Package lists no maintainers
  crit: notable
  if:
    type: metrics
    field: registry.maintainers
    max: 0

# The registry's own takedown verdict: npm replaces a malicious package with a
# `security holding package` stub. As authoritative a bad signal as exists.
- id: registry-security-hold
  desc: Registry flagged package as malicious
  crit: suspicious
  if:
    type: metrics
    field: registry.security_hold
    min: 1

# The scanned version was unpublished/removed while its metadata still resolves.
# A self-unpublish of a legit release happens, so this stays notable on its own;
# combined with freshness it is a takedown (see objectives/supply-chain/registry).
- id: version-removed
  desc: Version removed from the registry
  crit: notable
  if:
    type: metrics
    field: registry.version_removed
    min: 1

# Release-count shape. Grounded in a 24h sweep of feed-confirmed-malicious npm
# packages: ~56% shipped <=4 versions (throwaway drops) while ~28% churned out
# 20+ (rapid re-publish to chase an install or evade takedown).
- id: few-releases
  desc: Three or fewer releases
  crit: component
  if:
    type: metrics
    field: registry.release_count
    max: 3

- id: many-releases
  desc: Twenty or more releases
  crit: component
  if:
    type: metrics
    field: registry.release_count
    min: 20

- id: recent-package
  desc: Package under two months old
  crit: component
  if:
    type: metrics
    field: registry.package_age_days
    max: 60

# A data-harvesting tool describing itself, split by script so each regex stays
# within the atomic-matcher limits: CJK 采集 (collect), 抓取 (scrape), 爬虫
# (crawler), 批量 (bulk); and the Latin equivalents.
- id: harvesting-claim-cjk
  desc: Listing advertises bulk harvesting (CJK terms)
  crit: notable
  if:
    type: value
    path: registry.description
    regex: '采集|抓取|爬虫|批量'

- id: harvesting-claim-latin
  desc: Listing advertises scraping or bulk export
  crit: notable
  if:
    type: value
    path: registry.description
    regex: 'scrap|crawl|harvest|bulk export'

composite_rules:
# Registry lifecycle properties. These describe release history and custody;
# they do not, by themselves, assert an impersonation or compromise objective.
- id: fresh-package-already-removed
  desc: Fresh registry package already removed
  crit: notable
  conf: 0.78
  all:
    - id: metadata/registry::brand-new-package
    - id: metadata/registry::version-removed

- id: new-package-publish-burst
  desc: Brand-new package with publish burst
  crit: notable
  conf: 0.6
  all:
    - id: metadata/registry::brand-new-package
    - id: metadata/registry::publish-burst-24h

- id: young-package-release-churn
  desc: Young package with release churn
  crit: notable
  conf: 0.6
  all:
    - id: metadata/registry::recent-package
    - id: metadata/registry::many-releases
  unless:
    - id: metadata/registry::widely-installed

# Either-language combiner so downstream rules reference one harvesting-claim
# leg regardless of the listing's script.
- id: harvesting-claim
  desc: Listing advertises bulk data harvesting
  crit: notable
  any:
    - id: metadata/registry::harvesting-claim-cjk
    - id: metadata/registry::harvesting-claim-latin
