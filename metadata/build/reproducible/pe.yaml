# PE deterministic-build attribution.  IMAGE_DEBUG_TYPE_REPRO (type 16)
# in the Debug Directory is the explicit "this binary was produced by
# a deterministic build" marker emitted by MSVC when `/Brepro` is
# passed. Microsoft, .NET runtime, Windows components, and the
# Reproducible-Builds project all enable it.  A vendor that previously
# set it and stops is a strong supply-chain swap signal.
defaults:
  platforms: [windows]
  for: [pe]
  conf: 1.0
traits:
  - id: pe-reproducible-build
    desc: Built with /Brepro (deterministic)
    crit: baseline
    if:
      # Cleave exposes the explicit IMAGE_DEBUG_TYPE_REPRO marker as a
      # typed debug-entry value.  Older metric-only matching missed managed
      # assemblies that carry the marker in their debug directory.
      type: value
      path: pe.debug.entries[*].type
      exact: repro
  - id: pe-pgo-trained
    desc: PGO-trained release build (POGO)
    crit: baseline
    if:
      type: metrics
      field: pe.has_pogo
      min: 1
  - id: pe-incremental-ltcg
    desc: Incremental link-time codegen (ILTCG)
    crit: baseline
    if:
      type: metrics
      field: pe.has_iltcg
      min: 1
