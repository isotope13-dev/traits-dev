defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - macho
traits:
  - id: elf-build-id
    desc: ELF GNU build-id metadata
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: debug.build_id
      exists: true
  - id: macho-uuid
    desc: Mach-O UUID metadata
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: macho.uuid
      exists: true
composite_rules:
  - id: native-provenance
    desc: Native binary reproducible-build provenance metadata
    crit: baseline
    conf: 1.0
    any:
      - id: elf-build-id
      - id: macho-uuid
