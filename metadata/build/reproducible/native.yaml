defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
  for:
    - elf
    - macho
traits:
  - id: elf-build-id
    desc: ELF GNU build-id metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/build/reproducible::elf-build-id
  - id: macho-uuid
    desc: Mach-O UUID metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/build/reproducible::macho-uuid
composite_rules:
  - id: native-provenance
    desc: Native binary reproducible-build provenance metadata
    crit: baseline
    conf: 1.0
    any:
      - id: elf-build-id
      - id: macho-uuid
