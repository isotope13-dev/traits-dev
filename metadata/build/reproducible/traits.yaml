defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: source-date-epoch
    desc: SOURCE_DATE_EPOCH variable
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: SOURCE_DATE_EPOCH
      section: .text
  - id: reproducible-string
    desc: REPRODUCIBLE string
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: REPRODUCIBLE
      section: .text
  - id: build-id-string
    desc: build-id string
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: build-id
      section: .text
  - id: debuglink-string
    desc: debuglink string
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: debuglink
      section: .text
composite_rules:
  - id: reproducible
    desc: Reproducible build markers
    crit: notable
    conf: 0.85
    any:
      - id: source-date-epoch
      - id: reproducible-string
      - id: build-id-string
      - id: debuglink-string
