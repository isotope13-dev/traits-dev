# GitHub Actions workflow permission patterns that are risky in supply-chain
# contexts but do not by themselves prove a trojanized pipeline.
defaults:
  platforms: [unix, windows]
  for: [github-actions]
  attack: T1195.002

composite_rules:
- id: gha-pr-target-oidc-write
  desc: pull_request_target workflow grants OIDC token
  crit: notable
  conf: 0.95
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: metadata/build/github-actions::id-token-write-permission
