# CI runner build attribution.  When cleave's builder-path scan
# recovers a `build.user_home` whose final segment matches a known
# CI runner username (`runner` for GitHub Actions, `gitlab-runner`
# for GitLab, `circleci` for CircleCI, `jenkins` for Jenkins,
# `azureuser` for Azure DevOps, `ec2-user` / `ubuntu` for AWS EC2,
# `builder` for various build farms), the binary was almost
# certainly built by an automated pipeline rather than a developer
# laptop.
#
# This is a *positive* attribution signal — vendor releases come
# from CI; ad-hoc developer builds and adversary-built binaries
# usually don't. Trait stays at baseline criticality.
defaults:
  platforms: [linux, macos]
  for: [elf, macho]
  conf: 0.9
  size_min: 1024
  size_max: 524288000
traits:
  - id: build-host-github-actions
    desc: Built on GitHub Actions runner
    crit: baseline
    if:
      type: value
      path: build.user_home
      regex: "^/(home|Users)/runner$"
  - id: build-host-gitlab-runner
    desc: Built on GitLab Runner
    crit: baseline
    if:
      type: value
      path: build.user_home
      regex: "^/home/gitlab-runner$"
  - id: build-host-circleci
    desc: Built on CircleCI runner
    crit: baseline
    if:
      type: value
      path: build.user_home
      regex: "^/home/circleci$"
  - id: build-host-jenkins
    desc: Built on Jenkins agent
    crit: baseline
    if:
      type: value
      path: build.user_home
      regex: "^/(var/lib/jenkins|home/jenkins)$"
  - id: build-host-azure-pipelines
    desc: Built on Azure Pipelines agent
    crit: baseline
    if:
      type: value
      path: build.user_home
      regex: "^/home/(vsts|azureuser|AzDevOps)$"
  - id: build-host-aws-ec2
    desc: Built on AWS EC2 default account
    crit: baseline
    if:
      type: value
      path: build.user_home
      regex: "^/home/(ec2-user|ubuntu)$"
