defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
traits:
  - id: cargo-toml
    desc: Cargo.toml file
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Cargo.toml
      section: .text
  - id: cargo-namespace
    desc: 'cargo:: namespace'
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'cargo::'
      section: .text
  - id: registry-src
    desc: /registry/src/ path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /registry/src/
      section: .text
  - id: dot-cargo
    desc: .cargo/ directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .cargo/
      section: .text
composite_rules:
  - id: cargo
    desc: Built with Cargo (Rust)
    crit: notable
    conf: 0.9
    any:
      - id: cargo-toml
      - id: cargo-namespace
      - id: registry-src
      - id: dot-cargo
