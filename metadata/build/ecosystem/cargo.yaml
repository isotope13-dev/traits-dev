defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: cargo-cdylib-crate
    desc: Cargo dynamic library crate type
    crit: notable
    conf: 0.9
    for: [cargo.toml]
    if:
      type: text
      regex: 'crate[-_]type\s*=.{0,40}"(cdylib|dylib)"'
      case_insensitive: true
  - id: cargo-toml
    desc: Cargo.toml file
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Cargo.toml
      section: .text
  - id: cargo-namespace
    desc: 'cargo:: namespace'
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'cargo::'
      section: .text
  - id: registry-src
    desc: /registry/src/ path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /registry/src/
      section: .text
  - id: dot-cargo
    desc: .cargo/ directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .cargo/
      section: .text
