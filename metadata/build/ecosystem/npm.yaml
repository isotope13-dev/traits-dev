defaults:
  platforms: [windows, unix]
  for: [binaries, python, scripts]
traits:
  - id: package-json
    desc: package.json file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: package.json
      section: .text
  - id: node-modules
    desc: node_modules directory
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: node_modules
      section: .text
  - id: package-lock-json
    desc: package-lock.json file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: package-lock.json
      section: .text
  - id: yarn-lock
    desc: yarn.lock file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: yarn.lock
      section: .text
  - id: python-cross-language-bootstrap-marker
    desc: Python package references Node/NPM build assets
    crit: baseline
    conf: 0.9
    for: [python]
    ref: sha256:badfffc3c9c89439e736a1e00592a84dfb7235836fc3a6f1410d55c6275f1f23
    if:
      type: text
      regex: 'cross-language dependency orchestration|node_modules|npm install'
