# Cross-format internal-consistency signals.  Cleave's binary kv
# extractor compares fields populated from independent sources within
# the same binary; when they disagree, the binary is internally
# inconsistent — the canonical signature of post-build tampering.
#
# These are derived interpretations (boolean comparisons over kv
# data), so they live on `consistency.*` metrics rather than in the
# kv tree. All flags are conservative: only fire when both compared
# fields are present and obviously incompatible. Absence of either
# side is never a flag.
defaults:
  for: [pe, macho, elf]
  conf: 1.0
traits:
  - id: bundle-identifier-mismatch
    desc: Code-signature bundle id != embedded plist id
    crit: suspicious
    platforms: [macos]
    for: [macho]
    if:
      type: metrics
      field: consistency.bundle_identifier_mismatch
      min: 1
  - id: manifest-version-mismatch
    desc: PE manifest version != VERSIONINFO product version
    crit: suspicious
    platforms: [windows]
    for: [pe]
    if:
      type: metrics
      field: consistency.manifest_product_version_mismatch
      min: 1
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
        - id: metadata/package/tooling::tool-identity-putty
        - id: metadata/package/tooling::tool-identity-7zip
    unless:
      - id: metadata/binary/section/names::upx-section
      - type: kv
        path: pe.version_info.product_name
        regex: (?i)(Sysinternals|7-Zip|PuTTY)
  - id: distro-toolchain-implausible
    desc: Unusual distro compiler string combination
    crit: baseline
    platforms: [linux]
    for: [elf]
    if:
      type: metrics
      field: consistency.distro_toolchain_implausible
      min: 1
  - id: dwarf-mixed-toolchains
    desc: Multiple DWARF producer strings (mixed compilers)
    crit: notable
    platforms: [linux]
    for: [elf]
    if:
      type: metrics
      field: consistency.dwarf_mixed_producers
      min: 1
  - id: dwarf-mixed-comp-dirs
    desc: Multiple DWARF comp_dir directories
    crit: notable
    platforms: [linux]
    for: [elf]
    if:
      type: metrics
      field: consistency.dwarf_mixed_comp_dirs
      min: 1
  - id: macho-slice-signing-divergence
    desc: Some fat-binary slices signed, others not
    crit: suspicious
    platforms: [macos]
    for: [macho]
    if:
      type: metrics
      field: consistency.macho_slice_signing_divergence
      min: 1
  - id: pe-signed-before-built
    desc: Authenticode signing time before COFF timestamp
    crit: suspicious
    platforms: [windows]
    for: [pe]
    if:
      type: metrics
      field: pe.signing_time_before_timestamp
      min: 1
    downgrade:
      any:
        - id: metadata/signed/leaf::google-llc
