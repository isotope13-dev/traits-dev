defaults:
  for: [makefile]
  platforms:
  - unix
  - windows
traits:
- id: makefile-basename
  desc: Canonical Makefile basename
  crit: component
  conf: 0.99
  if:
    type: basename
    regex: ^(GNUmakefile|[Mm]akefile)$
- id: install-target-assignment
  desc: Makefile install target
  crit: component
  if:
    type: text
    substr: 'install:'
- id: all-target-assignment
  desc: Makefile all target
  crit: component
  if:
    type: text
    substr: 'all:'
- id: clean-target-assignment
  desc: Makefile clean target
  crit: component
  if:
    type: text
    substr: 'clean:'
- id: ebpf-target-assignment
  desc: Makefile eBPF build target variable
  crit: component
  conf: 0.85
  if:
    type: text
    regex: ^EBPF\s*[:+?]?=
- id: strip-binary-command
  desc: Makefile strips built binaries
  crit: component
  conf: 0.8
  if:
    type: text
    regex: \tstrip\s
- id: strip-all-symbols-flag
  desc: Makefile strips symbols at link time
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(^|\s)-s(\s|$)'
- id: objcopy-strip-debug-command
  desc: Makefile strips debug symbols
  crit: component
  conf: 0.92
  if:
    type: text
    substr: objcopy --strip-debug
- id: static-link-flag
  desc: Makefile uses static linking
  crit: component
  conf: 0.8
  if:
    type: text
    regex: (^|\\s)-static(\\s|$)
- id: bof-common-include
  desc: Makefile includes bof_common headers
  crit: component
  conf: 0.95
  if:
    type: text
    substr: -I../bof_common
- id: mingw-x64-cross-compiler
  desc: x64 MinGW cross-compiler toolchain
  crit: component
  conf: 0.97
  if:
    type: text
    word: x86_64-w64-mingw32-gcc
- id: mingw-x86-cross-compiler
  desc: x86 MinGW cross-compiler toolchain
  crit: component
  conf: 0.97
  if:
    type: text
    word: i686-w64-mingw32-gcc
- id: no-ntdll-crt-flag
  desc: Makefile disables standard NTDLL CRT
  crit: component
  conf: 0.95
  if:
    type: text
    substr: -D_NO_NTDLL_CRT_
- id: no-stack-protector-flag
  desc: Makefile disables stack protector
  crit: component
  conf: 0.9
  if:
    type: text
    substr: -fno-stack-protector
- id: hidden-visibility-flag
  desc: Makefile hides exported symbols
  crit: component
  conf: 0.9
  if:
    type: text
    substr: -fvisibility=hidden
- id: no-debug-flag
  desc: Makefile disables debug info
  crit: component
  conf: 0.88
  if:
    type: text
    substr: -g0
- id: evasion-target-name-a
  desc: Build target named hider or inject
  crit: component
  conf: 0.7
  if:
    type: text
    regex: :=\s*(hider|inject|hook)
    case_insensitive: true
- id: evasion-target-name-b
  desc: Build target named rootkit or stealth
  crit: component
  conf: 0.7
  if:
    type: text
    regex: :=\s*(rootkit|stealth|backdoor)
    case_insensitive: true
- id: bof-x64-object-target
  desc: x64 BOF object target naming
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.x64\.o\b'
- id: bof-x86-object-target
  desc: x86 BOF object target naming
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.x86\.o\b'
composite_rules:
- id: dummy-makefile-targets
  desc: Makefile with empty targets (install/all/clean)
  crit: suspicious
  conf: 0.9
  size_max: 200
  all:
  - id: makefile-basename
  - id: install-target-assignment
  any:
  - id: all-target-assignment
  - id: clean-target-assignment
- id: makefile-ebpf-target
  desc: Makefile eBPF build target variable
  crit: notable
  conf: 0.85
  all:
  - id: makefile-basename
  - id: ebpf-target-assignment
- id: makefile-evasion-target
  desc: Build target with evasion naming
  crit: notable
  conf: 0.7
  all:
  - id: makefile-basename
  any:
  - id: evasion-target-name-a
  - id: evasion-target-name-b
- id: dual-arch-mingw-cross-compile
  desc: Dual-arch MinGW cross-compilation
  crit: baseline
  conf: 0.97
  all:
  - id: mingw-x64-cross-compiler
  - id: mingw-x86-cross-compiler
- id: dual-arch-bof-object-targets
  desc: Dual-arch BOF object target naming
  crit: baseline
  conf: 0.94
  all:
  - id: bof-x64-object-target
  - id: bof-x86-object-target
- id: hardened-build
  desc: Makefile strips and statically links
  crit: notable
  conf: 0.8
  all:
  - id: makefile-basename
  - id: strip-binary-command
  - id: static-link-flag
