defaults:
  for: [makefile]
  platforms:
  - unix
  - windows
traits:
- id: makefile-basename
  desc: Canonical Makefile basename
  crit: component
  conf: 0.99
  if:
    type: path
    basename: true
    regex: ^(GNUmakefile|[Mm]akefile)$
- id: install-target-assignment
  desc: Makefile install target
  crit: baseline
  if:
    type: text
    substr: 'install:'
- id: all-target-assignment
  desc: Makefile all target
  crit: baseline
  if:
    type: text
    substr: 'all:'
- id: clean-target-assignment
  desc: Makefile clean target
  crit: baseline
  if:
    type: text
    substr: 'clean:'
- id: empty-install-target
  desc: Makefile install target with no recipe
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?m)^install:\s*\n([ \t]*\n){0,3}[^ \t#:\n][^:\n]{0,80}:'
- id: empty-all-target
  desc: Makefile all target with no recipe
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?m)^all:\s*\n([ \t]*\n){0,3}[^ \t#:\n][^:\n]{0,80}:'
- id: empty-clean-target
  desc: Makefile clean target with no recipe
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?m)^clean:\s*\n([ \t]*\n){0,3}[^ \t#:\n][^:\n]{0,80}:'
- id: ebpf-target-assignment
  desc: Makefile eBPF build target variable
  crit: component
  conf: 0.85
  if:
    type: text
    regex: \bEBPF\s*[:+?]?=
- id: ebpf-build-target-label
  desc: Makefile build-ebpf target label
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(?m)^build-ebpf(-[A-Za-z0-9_]+)?:'
- id: llc-bpf-object-pipeline
  desc: Makefile emits LLVM to BPF object
  crit: component
  conf: 0.95
  if:
    type: text
    substr: llc -march=bpf -filetype=obj
- id: go-bindata-command
  desc: Makefile runs go-bindata helper
  crit: component
  conf: 0.92
  if:
    type: text
    substr: go run github.com/shuLhan/go-bindata/cmd/go-bindata
- id: ebpf-bin-object-path
  desc: Makefile references built eBPF object
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'ebpf/bin/[A-Za-z0-9_./-]{1,80}\.o'
- id: strip-binary-command
  desc: Makefile strips built binaries
  crit: component
  conf: 0.8
  if:
    type: text
    regex: \tstrip\s
- id: strip-all-symbols-flag
  desc: Makefile strips symbols at link time
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(^|\s)-s(\s|$)'
- id: install-name-tool-change
  desc: Makefile uses install_name_tool -change
  crit: component
  conf: 0.9
  platforms: [macos]
  if:
    type: text
    regex: 'install_name_tool\s+-change'
- id: rpath-libclang-dylib
  desc: Makefile references @rpath libclang dylib
  crit: component
  conf: 0.9
  platforms: [macos]
  if:
    type: text
    substr: '@rpath/libclang.dylib'
- id: xcode-default-libclang-dylib
  desc: 'Makefile refs Xcode default toolchain libclang'
  crit: component
  conf: 0.9
  platforms: [macos]
  if:
    type: text
    substr: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/libclang.dylib
- id: objcopy-strip-debug-command
  desc: Makefile strips debug symbols
  crit: component
  conf: 0.92
  if:
    type: text
    substr: objcopy --strip-debug
- id: static-link-flag
  desc: Makefile uses static linking
  crit: component
  conf: 0.8
  if:
    type: text
    regex: (^|\\s)-static(\\s|$)
- id: bof-common-include
  desc: Makefile includes bof_common headers
  crit: component
  conf: 0.95
  if:
    type: text
    substr: -I../bof_common
- id: mingw-x64-cross-compiler
  desc: x64 MinGW cross-compiler toolchain
  crit: component
  conf: 0.97
  if:
    type: text
    word: x86_64-w64-mingw32-gcc
- id: mingw-x86-cross-compiler
  desc: x86 MinGW cross-compiler toolchain
  crit: component
  conf: 0.97
  if:
    type: text
    word: i686-w64-mingw32-gcc
- id: no-ntdll-crt-flag
  desc: Makefile disables standard NTDLL CRT
  crit: component
  conf: 0.95
  if:
    type: text
    substr: -D_NO_NTDLL_CRT_
- id: no-stack-protector-flag
  desc: Makefile disables stack protector
  crit: component
  conf: 0.9
  if:
    type: text
    substr: -fno-stack-protector
- id: hidden-visibility-flag
  desc: Makefile hides exported symbols
  crit: component
  conf: 0.9
  if:
    type: text
    substr: -fvisibility=hidden
- id: no-debug-flag
  desc: Makefile disables debug info
  crit: component
  conf: 0.88
  if:
    type: text
    substr: -g0
- id: evasion-target-name-a
  desc: Build target named hider/inject/hook
  crit: component
  conf: 0.7
  if:
    type: text
    regex: ':=\s*([A-Za-z0-9_-]{0,40}[-_])?(hider|inject|hook)([-_][A-Za-z0-9_-]{0,40})?\b'
    case_insensitive: true
- id: evasion-target-name-b
  desc: Build target named rootkit or stealth
  crit: component
  conf: 0.7
  if:
    type: text
    regex: :=\s*(rootkit|stealth|backdoor)
    case_insensitive: true
- id: evasion-target-label-a
  desc: Target label named hider/inject/hook
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(?m)^(build-)?([A-Za-z0-9_-]{0,40}[-_])?(hider|inject|hook)([-_][A-Za-z0-9_-]{0,40})?:'
    case_insensitive: true
- id: evasion-target-label-b
  desc: Target label named rootkit or stealth
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(?m)^(build-)?[A-Za-z0-9_-]*(rootkit|stealth|backdoor)[A-Za-z0-9_-]*:'
    case_insensitive: true
- id: bof-x64-object-target
  desc: x64 BOF object target naming
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.x64\.o\b'
- id: bof-x86-object-target
  desc: x86 BOF object target naming
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.x86\.o\b'
composite_rules:
- id: xcode-libclang-relink
  desc: Makefile relinks developer tool to Xcode libclang
  crit: baseline
  conf: 0.9
  platforms: [macos]
  near_lines: 2
  all:
  - id: install-name-tool-change
  - id: rpath-libclang-dylib
  - id: xcode-default-libclang-dylib
- id: dummy-makefile-targets
  desc: Makefile with empty install and all/clean targets
  crit: suspicious
  conf: 0.9
  size_max: 200
  all:
  - id: makefile-basename
  - id: empty-install-target
  any:
  - id: empty-all-target
  - id: empty-clean-target
- id: makefile-ebpf-target
  desc: Makefile eBPF build target variable
  crit: notable
  conf: 0.85
  all:
  - id: makefile-basename
  any:
  - id: ebpf-target-assignment
  - id: ebpf-build-target-label
- id: makefile-ebpf-object-build
  desc: Makefile builds eBPF object files
  crit: notable
  conf: 0.92
  all:
  - id: makefile-basename
  - id: llc-bpf-object-pipeline
  any:
  - id: ebpf-target-assignment
  - id: ebpf-build-target-label
- id: makefile-evasion-target
  desc: Build target with evasion naming
  crit: notable
  conf: 0.7
  all:
  - id: makefile-basename
  any:
  - id: evasion-target-name-a
  - id: evasion-target-name-b
  - id: evasion-target-label-a
  - id: evasion-target-label-b
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: dual-arch-mingw-cross-compile
  desc: Dual-arch MinGW cross-compilation
  crit: baseline
  conf: 0.97
  all:
  - id: mingw-x64-cross-compiler
  - id: mingw-x86-cross-compiler
- id: dual-arch-bof-object-targets
  desc: Dual-arch BOF object target naming
  crit: baseline
  conf: 0.94
  all:
  - id: bof-x64-object-target
  - id: bof-x86-object-target
- id: go-bindata-ebpf-object-embed
  desc: Makefile embeds built eBPF objects
  crit: component
  conf: 0.95
  all:
  - id: go-bindata-command
  - id: ebpf-bin-object-path
  near_lines: 2
- id: hardened-build
  desc: Makefile strips and statically links
  crit: notable
  conf: 0.8
  all:
  - id: makefile-basename
  - id: strip-binary-command
  - id: static-link-flag
