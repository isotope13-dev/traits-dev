traits:
  - id: wails-build-string
    desc: Wails build string in plist
    crit: baseline
    conf: 0.95
    platforms: [macos]
    for: [plist]
    if:
      type: kv
      path: CFBundleGetInfoString
      substr: Built using Wails
  - id: wails-bundle-id
    desc: Wails reverse-DNS bundle identifier
    crit: baseline
    conf: 0.9
    platforms: [macos]
    for: [plist]
    if:
      type: kv
      path: CFBundleIdentifier
      regex: ^com\.wails\.[a-z0-9][a-z0-9.-]{6,}$
  - id: wails-protocol-handler
    desc: Wails custom protocol handler
    crit: baseline
    conf: 0.9
    platforms: [macos]
    for: [macho]
    if:
      type: symbol
      exact: CustomProtocolSchemeHandler
  - id: wails-protocol-bootstrap
    desc: Wails protocol bootstrap export
    crit: baseline
    conf: 0.9
    platforms: [macos]
    for: [macho]
    if:
      type: symbol
      exact: StartCustomProtocolHandler
  - id: wails-webview-class
    desc: Wails WebView Objective-C class
    crit: baseline
    conf: 0.85
    platforms: [macos]
    for: [macho]
    if:
      type: symbol
      exact: WailsWebView
  - id: wails-frontend-dist
    desc: Embedded Wails frontend assets
    crit: baseline
    conf: 0.85
    platforms: [macos]
    for: [macho]
    if:
      type: text
      section: __TEXT.__cstring
      substr: frontend/dist/index.html
  - id: dual-arch-macho
    desc: Universal Mach-O with two slices
    crit: baseline
    conf: 0.8
    platforms: [macos]
    for: [macho]
    if:
      type: metrics
      field: macho.slice_count
      min: 2
      max: 2
  - id: frontend-heavy-string-bundle
    desc: Large embedded frontend string bundle
    crit: baseline
    conf: 0.8
    platforms: [macos]
    for: [macho]
    if:
      type: metrics
      field: binary.string_count
      min: 15000
  - id: wails-pe-manifest-name
    desc: Wails PE manifest app identifier
    crit: baseline
    conf: 0.97
    platforms: [windows]
    for: [pe]
    if:
      type: kv
      path: pe.manifest.assembly_identity.name
      regex: ^com\.wails\.[A-Za-z0-9][A-Za-z0-9.-]{2,}$
  - id: wails-go-module-path
    desc: Wails Go module source path
    crit: baseline
    conf: 0.96
    platforms: [windows, macos, linux]
    for: [pe, macho, elf]
    if:
      type: kv
      path: build.source_paths
      substr: github.com/wailsapp/wails/v2@
composite_rules:
  - id: wails-compiled-ui
    desc: Wails desktop app framework
    crit: notable
    conf: 0.95
    platforms: [windows, macos, linux]
    any:
      - id: wails-build-string
      - id: wails-bundle-id
      - id: wails-protocol-handler
      - id: wails-protocol-bootstrap
      - id: wails-webview-class
      - id: wails-frontend-dist
      - id: wails-pe-manifest-name
      - id: wails-go-module-path
  - id: fat-wails-go-ui
    desc: Universal Wails Go desktop app
    crit: notable
    conf: 0.95
    platforms: [macos]
    for: [macho]
    all:
      - id: wails-compiled-ui
      - id: dual-arch-macho
      - id: frontend-heavy-string-bundle
      - id: metadata/lang/compiler/systems::go-binary-macho
