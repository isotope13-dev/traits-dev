defaults:
  platforms: [windows, unix]
  for:
    - rust
    - binaries
  crit: notable
  conf: 1.0
traits:
  - id: tauri-runtime
    desc: Tauri framework runtime (Rust/Wry)
    if:
      type: text
      regex: tauri-runtime-wry|tauri_runtime_wry
      section: .text
  - id: tauri-cargo-path
    desc: Tauri cargo registry path
    if:
      type: text
      regex: /tauri-[^/]{1,50}/src/
      section: .text
