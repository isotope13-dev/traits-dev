defaults:
  platforms: [windows, unix]
  for:
    - rust
    - binaries
  crit: notable
  conf: 1.0

traits:
  - id: tauri-window-bridge-marker
    desc: Tauri window bridge symbol
    if:
      type: text
      regex: __tauriWindow.?
      section: rdata

  - id: tauri-version-marker
    desc: Tauri version bridge symbol
    if:
      type: text
      exact: tauri_version
      section: rdata

  - id: tauri-uri-resize
    desc: Tauri resize URI marker
    if:
      type: text
      exact: tauri://resize
      section: rdata

  - id: tauri-uri-move
    desc: Tauri move URI marker
    if:
      type: text
      exact: tauri://move
      section: rdata

  - id: tauri-cargo-path
    desc: Tauri cargo registry path
    if:
      type: text
      regex: /tauri-[^/]{1,50}/src/
      section: rdata

composite_rules:
  - id: tauri-runtime
    desc: Tauri framework runtime (Rust/Wry)
    any:
      - id: metadata/build/framework
    needs: 2
