defaults:
  platforms: [windows, unix]
  for:
    - rust
    - binaries
  crit: notable
  conf: 1.0

traits:
  - id: tauri-runtime
    desc: Tauri framework runtime (Rust/Wry)
    count_min: 1
    if:
      type: text
      regex: __TAURI_INTERNALS__|__tauriWindow.?|tauri://resize|tauri://move

  - id: tauri-cargo-path
    desc: Tauri cargo registry path
    if:
      type: text
      regex: /tauri-[^/]{1,50}/src/
