defaults:
  platforms: [android]
  for: [apk, zip]

traits:
  - id: tasker-resource-icons
    desc: Tasker resource icon set
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^res/drawable[^/]*/zzz_tasker[0-9_].*\.(png|xml)$'

  - id: tasker-loading-resources
    desc: Tasker loading resources
    crit: component
    conf: 0.88
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^res/drawable[^/]*/(taskerloading|zzz_taskerloading)'

  - id: tasker-factory-stub-color
    desc: Tasker factory stub resource
    crit: component
    conf: 0.88
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^res/color/factory_stub_color_[0-9]+\.xml$'

composite_rules:
  - id: tasker-exported-apk
    desc: Tasker exported APK structure
    crit: component
    conf: 0.9
    all:
      - id: tasker-resource-icons
      - id: tasker-loading-resources
      - id: tasker-factory-stub-color
