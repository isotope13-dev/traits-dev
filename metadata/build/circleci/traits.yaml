defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: circleci-env
    desc: CIRCLECI variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CIRCLECI
      section: .text
  - id: circle-build-num
    desc: CIRCLE_BUILD_NUM variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CIRCLE_BUILD_NUM
      section: .text
  - id: circleci-config
    desc: .circleci/config file
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .circleci/config
      section: .text
