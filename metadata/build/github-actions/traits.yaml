defaults:
  platforms: [windows, unix]
  for:
    - github-actions
    - binaries
    - shell
    - python
traits:
  - id: github-actions-env
    desc: GITHUB_ACTIONS environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_ACTIONS
      section: .text
  - id: github-actions-sudo-preserve-env
    desc: GitHub Actions env preserved through sudo
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: 'sudo\s+--preserve-env=[A-Z0-9_,]*GITHUB_ACTIONS'
  - id: github-run-id
    desc: GITHUB_RUN_ID environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_RUN_ID
      section: .text
  - id: github-sha
    desc: GITHUB_SHA environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_SHA
      section: .text
  - id: actions-checkout
    desc: actions/checkout action
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: actions/checkout
      section: .text
  - id: actions-checkout-yaml
    desc: actions/checkout workflow step
    crit: baseline
    conf: 0.92
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].uses
      substr: actions/checkout
  - id: pull-request-head-sha-checkout
    desc: Checkout resolves a pull request head SHA
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].with.ref
      regex: 'pull_request\.head\.sha(\s|\}|$)'
  - id: pull-request-head-ref-checkout
    desc: Checkout resolves a pull request head ref
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].with.ref
      regex: 'pull_request\.head\.ref(\s|\}|$)'
  - id: pull-request-target-trigger
    desc: GitHub pull_request_target workflow trigger
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*pull_request_target\s*:'
  - id: local-authorization-check-action
    desc: Workflow uses a local authorization check action
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].uses
      exact: ./.github/actions/check-authorization
  - id: approval-environment-output
    desc: Job environment comes from an approval output
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: value
      path: jobs.*.environment
      regex: 'needs\.[A-Za-z0-9_-]+\.outputs\.approval-env'
  - id: unsafe-checkout-opt-in
    desc: Checkout explicitly opts into unsafe PR code
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].with.allow-unsafe-pr-checkout
      exact: 'true'
  - id: local-composite-action-secret-input
    desc: Repository-local action receives workflow secret
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: text
      regex: 'uses:\s*\./\.github/actions/[\s\S]{0,240}\$\{\{\s*secrets\.'
  - id: job-environment-secret-reference
    desc: Job environment references an Actions secret
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: value
      path: jobs.*.env.*
      regex: '\$\{\{\s*secrets\.[A-Za-z0-9_]+\s*\}\}'
  - id: step-environment-secret-reference
    desc: Step environment references an Actions secret
    crit: notable
    conf: 0.95
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].env.*
      regex: '\$\{\{\s*secrets\.[A-Za-z0-9_]+\s*\}\}'
  - id: workflow-dispatch-trigger
    # A human-initiated "Run workflow" button is benign and ubiquitous on its
    # own; risk only arises when paired with secret-exfil legs, captured by the
    # gha-*-exfil composites that reference this as a corroborating leg.
    desc: GitHub workflow_dispatch manual trigger
    crit: baseline
    conf: 0.86
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*workflow_dispatch\s*:'
  - id: scheduled-workflow-trigger
    desc: GitHub scheduled workflow trigger
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: value
      path: on.schedule[0].cron
      exists: true
  - id: contents-write-permission
    desc: GitHub Actions contents write permission
    crit: notable
    conf: 0.92
    for: [github-actions]
    if:
      type: value
      path: permissions.contents
      exact: write
  - id: github-token-secret
    # The Actions-provided GITHUB_TOKEN referenced via the secrets context is the
    # canonical, secure idiom present in most workflows — neutral on its own. The
    # concern is what it is paired with (contents:write + push), captured by the
    # workflow-repo-write-token composite. Component, not notable.
    desc: References Actions-provided GITHUB_TOKEN
    crit: component
    conf: 0.88
    for: [github-actions]
    if:
      type: text
      substr: secrets.GITHUB_TOKEN
  - id: multiple-secret-references
    desc: Workflow references multiple Actions secrets
    crit: component
    conf: 0.98
    for: [github-actions]
    count_min: 2
    if:
      type: text
      regex: '\$\{\{\s*secrets\.[A-Za-z0-9_]+\s*\}\}'
  - id: run-secret-reference
    desc: GitHub Actions run step references a secret
    crit: notable
    conf: 0.82
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: '\$\{\{\s*secrets\.[A-Za-z0-9_]+\s*\}\}'
  - id: github-push-action
    desc: GitHub push action step
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].uses
      regex: '(^|/)github-push-action@'
  - id: mutable-main-action-ref
    desc: Workflow action pinned to main
    crit: notable
    conf: 0.88
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].uses
      regex: '@main$'
  - id: mutable-master-action-ref
    desc: Workflow action pinned to master
    crit: notable
    conf: 0.88
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].uses
      regex: '@master$'
  - id: id-token-write-permission
    desc: GitHub Actions OIDC write permission
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*id-token\s*:\s*write\b'
  - id: actions-github-script
    desc: actions/github-script action
    crit: notable
    conf: 0.86
    for: [github-actions]
    if:
      type: text
      substr: actions/github-script
      section: .text
  - id: github-workflows
    desc: .github/workflows directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .github/workflows
      section: .text
  - id: generated-ai-review-workflow
    desc: Generated AI review workflow text
    crit: notable
    conf: 0.9
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    for: [python, javascript, typescript, ruby, shell, github-actions]
    if:
      type: text
      regex: '(?s)(AI code review|AI Review).{0,260}(\.github/workflows|pull_request:)'
  - id: codity-workflow-token-secret
    desc: Codity workflow token secret
    crit: notable
    conf: 0.9
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    for: [python, javascript, typescript, ruby, shell, github-actions]
    if:
      type: text
      substr: CODITY_ACCESS_TOKEN
  - id: ai-review-workflow-token-secret
    desc: AI review workflow token secret
    crit: notable
    conf: 0.86
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    for: [python, javascript, typescript, ruby, shell, github-actions]
    if:
      type: text
      regex: '(?i)(AI|CODE)[_-]?REVIEW.{0,80}(TOKEN|ACCESS_TOKEN)'
  - id: github-runner-worker
    desc: GitHub Actions Runner.Worker process
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Runner.Worker
      section: .text
  - id: github-runner-listener
    desc: GitHub Actions Runner.Listener process
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Runner.Listener
      section: .text
  - id: github-runner-config-cmd
    desc: "GHA self-hosted runner config script"
    crit: component
    if:
      type: text
      substr: ./config.sh
  - id: github-runner-config-args
    desc: "GHA self-hosted runner config args"
    crit: component
    if:
      type: text
      # Require the runner config script with a flag — bare `--token`/`--url`
      # also appear on cloudflared and other CLIs.
      regex: 'config\.sh.{0,120}--(url|token|labels|ephemeral)'
  - id: github-runner-run
    desc: GitHub Actions self-hosted runner execution
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: ./run.sh
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: pull-request-head-checkout
    desc: Checkout resolves a pull request head
    crit: notable
    conf: 0.95
    for: [github-actions]
    any:
      - id: pull-request-head-sha-checkout
      - id: pull-request-head-ref-checkout
  - id: approval-gated-external-pr-checkout
    desc: External PR checkout behind an approval gate
    crit: exception
    conf: 0.99
    all:
      - id: local-authorization-check-action
      - id: approval-environment-output
      - id: unsafe-checkout-opt-in
  - id: mutable-action-ref
    desc: Workflow uses mutable action ref
    crit: notable
    conf: 0.9
    for: [github-actions]
    any:
      - id: mutable-main-action-ref
      - id: mutable-master-action-ref
  - id: workflow-repo-write-token
    desc: Workflow can push repository changes
    crit: notable
    conf: 0.94
    for: [github-actions]
    all:
      - id: contents-write-permission
      - id: github-token-secret
    any:
      - id: github-push-action
  - id: workflow-secret-review-token
    desc: Workflow review token secret
    crit: notable
    conf: 0.9
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    any:
      - id: codity-workflow-token-secret
      - id: ai-review-workflow-token-secret
  - id: github-runner-config
    desc: GitHub Actions self-hosted runner configuration
    crit: notable
    conf: 0.9
    all:
      - id: github-runner-config-cmd
      - id: github-runner-config-args
  - id: github-runner-targeting
    desc: Targets GitHub Actions Runner process
    crit: suspicious
    conf: 0.95
    all:
      - id: github-runner-worker
    any:
      - id: metadata/build/github-actions::actions-checkout
      - id: metadata/build/github-actions::actions-checkout-yaml
      - id: metadata/build/github-actions::actions-github-script
      - id: metadata/build/github-actions::contents-write-permission
      - id: metadata/build/github-actions::github-actions-env
      - id: metadata/build/github-actions::github-push-action
      - id: metadata/build/github-actions::github-run-id
      - id: metadata/build/github-actions::github-runner-config-args
      - id: metadata/build/github-actions::github-runner-config-cmd
      - id: metadata/build/github-actions::github-runner-listener
      - id: metadata/build/github-actions::github-runner-run
      - id: metadata/build/github-actions::github-runner-worker
      - id: metadata/build/github-actions::github-sha
      - id: metadata/build/github-actions::github-token-secret
      - id: metadata/build/github-actions::github-workflows
      - id: metadata/build/github-actions::id-token-write-permission
      - id: metadata/build/github-actions::mutable-main-action-ref
      - id: metadata/build/github-actions::mutable-master-action-ref
      - id: metadata/build/github-actions::pull-request-target-trigger
      - id: metadata/build/github-actions::scheduled-workflow-trigger
      - id: metadata/build/github-actions::workflow-dispatch-trigger
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline
      - id: micro-behaviors/fs/proc/info/path::process-pid-maps
