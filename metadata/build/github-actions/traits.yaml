defaults:
  platforms: [windows, unix]
  for:
    - github-actions
    - binaries
traits:
  - id: github-actions-env
    desc: GITHUB_ACTIONS environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_ACTIONS
      section: .text
  - id: github-run-id
    desc: GITHUB_RUN_ID environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_RUN_ID
      section: .text
  - id: github-sha
    desc: GITHUB_SHA environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_SHA
      section: .text
  - id: actions-checkout
    desc: actions/checkout action
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: actions/checkout
      section: .text
  - id: pull-request-target-trigger
    desc: GitHub pull_request_target workflow trigger
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*pull_request_target\s*:'
  - id: workflow-dispatch-trigger
    desc: GitHub workflow_dispatch manual trigger
    crit: notable
    conf: 0.86
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*workflow_dispatch\s*:'
  - id: actions-github-script
    desc: actions/github-script action
    crit: notable
    conf: 0.86
    for: [github-actions]
    if:
      type: text
      substr: actions/github-script
      section: .text
  - id: github-workflows
    desc: .github/workflows directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .github/workflows
      section: .text
  - id: github-runner-worker
    desc: GitHub Actions Runner.Worker process
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Runner.Worker
      section: .text
  - id: github-runner-listener
    desc: GitHub Actions Runner.Listener process
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Runner.Listener
      section: .text
composite_rules:
  - id: github-actions
    desc: GitHub Actions CI artifacts
    crit: notable
    conf: 0.9
    any:
      - id: github-actions-env
      - id: github-run-id
      - id: github-sha
      - id: actions-checkout
      - id: pull-request-target-trigger
      - id: workflow-dispatch-trigger
      - id: actions-github-script
      - id: github-workflows
      - id: github-runner-worker
      - id: github-runner-listener
  - id: github-runner-targeting
    desc: Targets GitHub Actions Runner process
    crit: suspicious
    conf: 0.95
    all:
      - id: github-runner-worker
    any:
      - id: github-actions
      - id: micro-behaviors/fs/proc/info::process-pid-cmdline
      - id: micro-behaviors/fs/proc/info::process-pid-maps
