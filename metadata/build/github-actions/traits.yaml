defaults:
  platforms: [windows, unix]
  for:
    - github-actions
    - binaries
    - shell
    - python
traits:
  - id: github-actions-env
    desc: GITHUB_ACTIONS environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_ACTIONS
      section: .text
  - id: github-run-id
    desc: GITHUB_RUN_ID environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_RUN_ID
      section: .text
  - id: github-sha
    desc: GITHUB_SHA environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITHUB_SHA
      section: .text
  - id: actions-checkout
    desc: actions/checkout action
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: actions/checkout
      section: .text
  - id: actions-checkout-yaml
    desc: actions/checkout workflow step
    crit: baseline
    conf: 0.92
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].uses
      substr: actions/checkout
  - id: pull-request-target-trigger
    desc: GitHub pull_request_target workflow trigger
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*pull_request_target\s*:'
  - id: workflow-dispatch-trigger
    desc: GitHub workflow_dispatch manual trigger
    crit: notable
    conf: 0.86
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*workflow_dispatch\s*:'
  - id: scheduled-workflow-trigger
    desc: GitHub scheduled workflow trigger
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: value
      path: on.schedule[0].cron
      exists: true
  - id: contents-write-permission
    desc: GitHub Actions contents write permission
    crit: notable
    conf: 0.92
    for: [github-actions]
    if:
      type: value
      path: permissions.contents
      exact: write
  - id: github-token-secret
    # The Actions-provided GITHUB_TOKEN referenced via the secrets context is the
    # canonical, secure idiom present in most workflows — neutral on its own. The
    # concern is what it is paired with (contents:write + push), captured by the
    # workflow-repo-write-token composite. Component, not notable.
    desc: References Actions-provided GITHUB_TOKEN
    crit: component
    conf: 0.88
    for: [github-actions]
    if:
      type: text
      substr: secrets.GITHUB_TOKEN
  - id: github-push-action
    desc: GitHub push action step
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: text
      substr: github-push-action
  - id: mutable-main-action-ref
    desc: Workflow action pinned to main
    crit: notable
    conf: 0.88
    for: [github-actions]
    if:
      type: text
      regex: 'uses:\s*.{1,80}@main\b'
  - id: mutable-master-action-ref
    desc: Workflow action pinned to master
    crit: notable
    conf: 0.88
    for: [github-actions]
    if:
      type: text
      regex: 'uses:\s*.{1,80}@master\b'
  - id: id-token-write-permission
    desc: GitHub Actions OIDC write permission
    crit: notable
    conf: 0.9
    for: [github-actions]
    if:
      type: text
      regex: '(^|\n)\s*id-token\s*:\s*write\b'
  - id: actions-github-script
    desc: actions/github-script action
    crit: notable
    conf: 0.86
    for: [github-actions]
    if:
      type: text
      substr: actions/github-script
      section: .text
  - id: github-workflows
    desc: .github/workflows directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .github/workflows
      section: .text
  - id: github-runner-worker
    desc: GitHub Actions Runner.Worker process
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Runner.Worker
      section: .text
  - id: github-runner-listener
    desc: GitHub Actions Runner.Listener process
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Runner.Listener
      section: .text
  - id: github-runner-config-cmd
    desc: "GHA self-hosted runner config script"
    crit: component
    if:
      type: text
      substr: ./config.sh
  - id: github-runner-config-args
    desc: "GHA self-hosted runner config args"
    crit: component
    if:
      type: text
      regex: --(url|token|labels|ephemeral)
  - id: github-runner-run
    desc: GitHub Actions self-hosted runner execution
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: ./run.sh
composite_rules:
  - id: mutable-action-ref
    desc: Workflow uses mutable action ref
    crit: notable
    conf: 0.9
    for: [github-actions]
    any:
      - id: mutable-main-action-ref
      - id: mutable-master-action-ref
  - id: workflow-repo-write-token
    desc: Workflow can push repository changes
    crit: notable
    conf: 0.94
    for: [github-actions]
    all:
      - id: contents-write-permission
      - id: github-token-secret
    any:
      - id: github-push-action
  - id: github-runner-config
    desc: GitHub Actions self-hosted runner configuration
    crit: notable
    conf: 0.9
    all:
      - id: github-runner-config-cmd
      - id: github-runner-config-args
  - id: github-runner-targeting
    desc: Targets GitHub Actions Runner process
    crit: suspicious
    conf: 0.95
    all:
      - id: github-runner-worker
    any:
      - id: metadata/build/github-actions::actions-checkout
      - id: metadata/build/github-actions::actions-checkout-yaml
      - id: metadata/build/github-actions::actions-github-script
      - id: metadata/build/github-actions::contents-write-permission
      - id: metadata/build/github-actions::github-actions-env
      - id: metadata/build/github-actions::github-push-action
      - id: metadata/build/github-actions::github-run-id
      - id: metadata/build/github-actions::github-runner-config-args
      - id: metadata/build/github-actions::github-runner-config-cmd
      - id: metadata/build/github-actions::github-runner-listener
      - id: metadata/build/github-actions::github-runner-run
      - id: metadata/build/github-actions::github-runner-worker
      - id: metadata/build/github-actions::github-sha
      - id: metadata/build/github-actions::github-token-secret
      - id: metadata/build/github-actions::github-workflows
      - id: metadata/build/github-actions::id-token-write-permission
      - id: metadata/build/github-actions::mutable-main-action-ref
      - id: metadata/build/github-actions::mutable-master-action-ref
      - id: metadata/build/github-actions::pull-request-target-trigger
      - id: metadata/build/github-actions::scheduled-workflow-trigger
      - id: metadata/build/github-actions::workflow-dispatch-trigger
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline
      - id: micro-behaviors/fs/proc/info/path::process-pid-maps
