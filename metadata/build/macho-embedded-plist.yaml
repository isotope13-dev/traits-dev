# Mach-O embedded-plist signals.  Cleave's binary kv extractor parses
# the `__TEXT,__info_plist` and `__TEXT,__launchd_plist` sections (when
# present) into the kv tree at `macho.info_plist.*` /
# `macho.launchd_plist.*` with PascalCase keys preserved.
#
# Embedded Info.plist is normal for command-line helpers (codesign,
# git, etc.) — they carry their bundle metadata directly in __TEXT
# instead of having a surrounding .app.
#
# Embedded launchd_plist is less common but legitimate (some Apple
# daemons + the auto-launch helper pattern). When it appears in
# third-party binaries it's frequently a persistence mechanism: the
# binary registers itself with launchd on first run via `launchctl
# load -`.  Detection here is a *capability* signal, not malicious
# per se.
defaults:
  platforms: [macos]
  for: [macho]
  conf: 1.0
traits:
  - id: macho-embedded-info-plist
    desc: Mach-O carries embedded Info.plist
    crit: baseline
    if:
      type: kv
      path: macho.info_plist
      exists: true
  - id: macho-embedded-launchd-plist
    desc: Self-installing launchd daemon (embedded plist)
    crit: notable
    if:
      type: kv
      path: macho.launchd_plist
      exists: true
  - id: macho-launchd-keep-alive
    desc: Embedded launchd plist requests KeepAlive (auto-restart)
    crit: notable
    if:
      type: kv
      path: macho.launchd_plist.KeepAlive
      exists: true
  - id: macho-launchd-run-at-load
    desc: Embedded launchd plist requests RunAtLoad (boot persistence)
    crit: notable
    if:
      type: kv
      path: macho.launchd_plist.RunAtLoad
      exact: "true"
  - id: macho-launchd-program-arguments
    desc: Embedded launchd plist sets ProgramArguments
    crit: notable
    if:
      type: kv
      path: macho.launchd_plist.ProgramArguments
      exists: true
