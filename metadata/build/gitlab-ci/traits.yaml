defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: ci-pipeline-id
    desc: CI_PIPELINE_ID variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CI_PIPELINE_ID
      section: .text
  - id: ci-job-id
    desc: CI_JOB_ID variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CI_JOB_ID
      section: .text
  - id: gitlab-ci-env
    desc: GITLAB_CI variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GITLAB_CI
      section: .text
  - id: gitlab-ci-yml
    desc: .gitlab-ci.yml file
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .gitlab-ci.yml
      section: .text
