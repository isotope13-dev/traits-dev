defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: package-json
    desc: package.json file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: package.json
      section: .text
  - id: node-modules
    desc: node_modules directory
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: node_modules
      section: .text
  - id: package-lock-json
    desc: package-lock.json file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: package-lock.json
      section: .text
  - id: yarn-lock
    desc: yarn.lock file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: yarn.lock
      section: .text
