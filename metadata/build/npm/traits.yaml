defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
traits:
  - id: package-json
    desc: package.json file
    crit: component
    conf: 0.85
    if:
      type: text
      substr: package.json
      section: .text
  - id: node-modules
    desc: node_modules directory
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: node_modules
      section: .text
  - id: package-lock-json
    desc: package-lock.json file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: package-lock.json
      section: .text
  - id: yarn-lock
    desc: yarn.lock file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: yarn.lock
      section: .text
composite_rules:
  - id: npm
    desc: Built with npm/yarn (Node.js)
    crit: notable
    conf: 0.85
    any:
      - id: package-json
      - id: node-modules
      - id: package-lock-json
      - id: yarn-lock
