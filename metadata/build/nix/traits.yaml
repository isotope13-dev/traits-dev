defaults:
  platforms: [windows, unix]
  for: [shell]
  crit: baseline
  conf: 0.95

traits:
  - id: nix-package-expression
    desc: Nix package expression
    if:
      type: path
      basename: true
      exact: package.nix
  - id: nix-stdenv-derivation
    desc: Nix stdenv package derivation
    if:
      type: text
      regex: 'stdenv\.mkDerivation|craneLib\.buildPackage|mkShell'

composite_rules:
  - id: nix-package-build-expression
    desc: Nix package build expression
    crit: baseline
    conf: 0.96
    any:
      - id: nix-package-expression
      - id: nix-stdenv-derivation
