defaults:
  platforms: [windows, unix]
  for:
  - javascript
traits:
- id: vite-bundled
  desc: Code bundled with Vite
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    regex: (__vite__|import\.meta\.hot)
- id: rolldown-bundled
  desc: Code bundled with Rolldown
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: rolldown/runtime.js
- id: turbopack-bundled
  desc: Code bundled with Turbopack
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: globalThis.TURBOPACK
- id: source-region-bundled
  desc: Bundled source region markers
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: '//#region extensions/'
- id: typescript-compiled
  desc: TypeScript compile output markers
  crit: baseline
  conf: 0.9
  if:
    type: string_literal
    regex: Object\.defineProperty.exports|tslib
- id: babel-transpiled
  desc: Code transpiled with Babel
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '@babel/(runtime|helpers)|_classCallCheck|_defineProperty\b'
- id: has-sourcemap
  desc: Code has source map reference
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: sourceMappingURL=
- id: cjs2-export
  desc: CommonJS2 module export pattern
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    regex: module\\.exports\\.default|exports\\.default\\s*=
- id: umd-pattern
  desc: Universal Module Definition pattern
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    regex: typeof exports.{0,20}object.{0,20}typeof module.{0,20}undefined
- id: umd-module-object-check
  desc: "UMD CommonJS guard"
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "typeof module=== ?['\"]object['\"]"
- id: esmodule-bundled
  desc: ES module bundle output markers
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: import\*as\s+\w+\s+from
- id: webpack-bundled--webpackchunk
  desc: Code bundled with webpack (webpackChunk)
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    word: webpackChunk
- id: webpack-bundled--webpack-modules
  desc: Code bundled with webpack (__webpack_modules__)
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    word: __webpack_modules__
- id: rollup-bundled--interopdefaultlegacy
  desc: Code bundled with rollup (_interopDefaultLegacy)
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    word: _interopDefaultLegacy
- id: rollup-bundled--interopnamespace
  desc: Code bundled with rollup (_interopNamespace)
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    word: _interopNamespace
- id: rollup-bundled--rolluppluginbabel
  desc: Code bundled with rollup (rollupPluginBabel)
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    word: rollupPluginBabel
- id: esbuild-bundled--toesm
  desc: esbuild bundle output markers (__toESM)
  crit: baseline
  conf: 0.95
  if:
    type: string_literal
    word: __toESM
- id: esbuild-bundled--tocommonjs
  desc: esbuild bundle output markers (__toCommonJS)
  crit: baseline
  conf: 0.95
  if:
    type: string_literal
    word: __toCommonJS
- id: esbuild-bundled--export
  desc: esbuild bundle output markers (__export)
  crit: baseline
  conf: 0.95
  if:
    type: string_literal
    word: __export
- id: esbuild-bundled--copyprops
  desc: esbuild bundle output markers (__copyProps)
  crit: baseline
  conf: 0.95
  if:
    type: string_literal
    word: __copyProps
- id: parcel-bundled--parcelrequire
  desc: Code bundled with Parcel (parcelRequire)
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    word: parcelRequire
- id: parcel-bundled--parcel
  desc: Code bundled with Parcel (__parcel__)
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    word: __parcel__
composite_rules:
- id: webpack-bundled
  desc: Code bundled with webpack
  crit: notable
  conf: 0.95
  any:
  - id: webpack-bundled--webpackchunk
  - id: webpack-bundled--webpack-modules
- id: rollup-bundled
  desc: Code bundled with rollup
  crit: notable
  conf: 0.95
  any:
  - id: rollup-bundled--interopdefaultlegacy
  - id: rollup-bundled--interopnamespace
  - id: rollup-bundled--rolluppluginbabel
- id: esbuild-bundled
  desc: esbuild bundle output markers
  crit: baseline
  conf: 0.95
  any:
  - id: esbuild-bundled--toesm
  - id: esbuild-bundled--tocommonjs
  - id: esbuild-bundled--export
  - id: esbuild-bundled--copyprops
- id: parcel-bundled
  desc: Code bundled with Parcel
  crit: notable
  conf: 0.95
  any:
  - id: parcel-bundled--parcelrequire
  - id: parcel-bundled--parcel
