defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: bazel-out
    desc: bazel-out directory
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: bazel-out
      section: .text
  - id: workspace-file
    desc: WORKSPACE file
    crit: notable
    conf: 0.85
    for: [makefile, data]
    if:
      type: path
      basename: true
      regex: ^WORKSPACE(\.bazel)?$
  - id: build-bazel
    desc: BUILD.bazel file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: BUILD.bazel
      section: .text
  - id: bazel-tools
    desc: '@bazel_tools reference'
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: '@bazel_tools'
      section: .text
