defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [source, binaries]
traits:
  - id: bazel-out
    desc: bazel-out directory
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: bazel-out
      section: .text
  - id: workspace-file
    desc: WORKSPACE file
    crit: notable
    conf: 0.85
    if:
      type: basename
      regex: ^WORKSPACE(\.bazel)?$
  - id: build-bazel
    desc: BUILD.bazel file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: BUILD.bazel
      section: .text
  - id: bazel-tools
    desc: '@bazel_tools reference'
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: '@bazel_tools'
      section: .text
composite_rules:
  - id: bazel
    desc: Built with Bazel
    crit: notable
    conf: 0.85
    any:
      - id: bazel-out
      - id: workspace-file
      - id: build-bazel
      - id: bazel-tools
