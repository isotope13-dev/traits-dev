defaults:
  platforms: [unix, windows]
  for: [elf, pe, shell, python, c, scripts, binaries]
traits:
  - id: compiler-feature-probe
    desc: Compiler feature probe command
    crit: notable
    conf: 0.94
    for: [shell]
    if:
      type: text
      regex: '(?s)if\s+!defined.{0,220}\$cc.{0,120}-target'
  - id: objcopy-word
    desc: GNU objcopy tool name
    crit: component
    if:
      type: text
      word: objcopy
  - id: binutils-word
    desc: GNU binutils toolchain name
    crit: component
    if:
      type: text
      word: binutils
  - id: flex-word
    desc: flex lexer-generator invocation
    crit: component
    if:
      type: text
      regex: '\bflex\s+(-[A-Za-z][A-Za-z-]*|[^ \t\r\n]{1,80}\.(l|lex)\b)'
  - id: lex-word
    desc: lex lexer-generator tool name
    crit: component
    if:
      type: text
      substr: ' lex '
      case_insensitive: true
  - id: yacc-word
    desc: yacc parser-generator tool name
    crit: component
    if:
      type: text
      word: yacc
  - id: bison-word
    desc: GNU Bison parser-generator name
    crit: component
    if:
      type: text
      word: bison
  - id: uefi-export-format-reference
    desc: UEFI PE export format reference in source
    crit: notable
    conf: 0.95
    for: [c, cpp]
    if:
      type: text
      word: EFI_IMAGE_EXPORT_DIRECTORY
  - id: elf64-conversion-reference
    desc: ELF64 image conversion structure reference
    crit: notable
    conf: 0.95
    for: [c, cpp]
    if:
      type: text
      regex: '\bElf64_(Ehdr|Shdr|Phdr|Sym)\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: coff-image-conversion-reference
    desc: COFF image conversion routine reference
    crit: notable
    conf: 0.95
    for: [c, cpp]
    if:
      type: text
      regex: '\bCoff[A-Za-z_]+'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: development-toolchain-indicators
    desc: Development toolchain indicators
    crit: notable
    any:
      - id: objcopy-word
      - id: binutils-word
      - id: flex-word
      - id: lex-word
      - id: yacc-word
      - id: bison-word
  - id: uefi-image-converter-source
    desc: UEFI ELF-to-PE image conversion source
    crit: notable
    conf: 0.98
    all:
      - id: uefi-export-format-reference
      - id: elf64-conversion-reference
      - id: coff-image-conversion-reference
