defaults:
  platforms: [unix, windows]
  for: [elf, pe, shell, python, c, scripts, binaries]
traits:
  - id: compiler-feature-probe
    desc: Compiler feature probe command
    crit: notable
    conf: 0.94
    for: [shell]
    if:
      type: text
      regex: '(?s)if\s+!defined.{0,220}\$cc.{0,120}-target'
  - id: objcopy-word
    desc: GNU objcopy tool name
    crit: component
    if:
      type: text
      word: objcopy
  - id: binutils-word
    desc: GNU binutils toolchain name
    crit: component
    if:
      type: text
      word: binutils
  - id: flex-word
    desc: flex lexer-generator tool name
    crit: component
    if:
      type: text
      word: flex
  - id: lex-word
    desc: lex lexer-generator tool name
    crit: component
    if:
      type: text
      substr: ' lex '
      case_insensitive: true
  - id: yacc-word
    desc: yacc parser-generator tool name
    crit: component
    if:
      type: text
      word: yacc
  - id: bison-word
    desc: GNU Bison parser-generator name
    crit: component
    if:
      type: text
      word: bison
composite_rules:
  - id: development-toolchain-indicators
    desc: Development toolchain indicators
    crit: notable
    any:
      - id: objcopy-word
      - id: binutils-word
      - id: flex-word
      - id: lex-word
      - id: yacc-word
      - id: bison-word
