# Package build metadata (maintainer scripts and debhelper boilerplate)
defaults:
  platforms: [linux]
  for: [elf, shell, python, javascript, typescript, go]
traits:
  - id: debhelper-dh-installinit-marker
    desc: Debhelper dh_installinit marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Automatically added by dh_installinit/"
  - id: debhelper-auto-section-end
    desc: Debhelper section end marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "End automatically added section"
  - id: debian-postinst-path
    desc: Debian postinst maintainer script path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: path
      basename: true
      exact: postinst.in
  - id: rpm-postinst-script-path
    desc: RPM post-install maintainer script path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: path
      basename: true
      exact: postinst.sh.in
  - id: arch-install-script-path
    desc: Arch package install script path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: path
      basename: true
      exact: .INSTALL
composite_rules:
  - id: package-service-maintainer-script
    desc: Package service maintainer script
    crit: baseline
    conf: 0.9
    any:
      - id: debian-postinst-path
      - id: rpm-postinst-script-path
      - id: arch-install-script-path
      - id: debhelper-dh-installinit-marker
