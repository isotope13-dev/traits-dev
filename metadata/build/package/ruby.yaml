# Ruby build system metadata
defaults:
  platforms: [windows, unix]
  for: [ruby]
  crit: notable
  conf: 1.0
traits:
  - id: filename-extconf
    desc: File is named extconf.rb
    if:
      type: path
      basename: true
      exact: extconf.rb
      case_insensitive: true
  - id: ruby-extension-dir
    desc: Ruby native extension directory path
    if:
      type: path
      regex: 'ext/[a-zA-Z0-9_-]+/'
  - id: ruby-version-file
    desc: Ruby package version filename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      exact: version.rb
      case_insensitive: true
  - id: extconf-create-makefile-call
    desc: Ruby extconf create_makefile call
    if:
      type: symbol
      exact: create_makefile
  - id: extconf-create-header-call
    desc: Ruby extconf create_header call
    if:
      type: symbol
      exact: create_header
  - id: extconf-mkmf-require
    desc: Ruby mkmf native extension helper
    if:
      type: symbol
      exact: mkmf
  - id: gemspec-git-file-list
    desc: Gemspec enumerates git-tracked files
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: 'spec\.(files|test_files)\s*=.{0,160}(IO\.popen\([^)]{0,80}git\s+ls-files|`git ls-files)'
  - id: gemspec-find-file-list
    desc: Gemspec enumerates files with find
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: 's\.(files|test_files)\s*=.{0,120}`find\s+[^`\r\n]{1,80}`'

composite_rules:
  - id: ruby-package-reference-context
    desc: Ruby package version or spec context
    crit: baseline
    conf: 0.9
    any:
      - id: ruby-version-file
      - id: metadata/package/testing/presence/harness::ruby-test-file
      - id: metadata/package/testing/presence/harness::ruby-spec-helper-file
      - id: metadata/package/testing/presence/harness::ruby-spec-file
  - id: extconf-native-build-helper
    desc: Ruby extconf native build helper
    crit: notable
    conf: 0.9
    any:
      - id: extconf-create-makefile-call
      - id: extconf-create-header-call
      - id: extconf-mkmf-require
