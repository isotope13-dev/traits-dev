# Neutral structural facts about an Arch/AUR PKGBUILD: which lifecycle
# functions it defines. These are honest "this function exists" observations
# (component building blocks); the supply-chain intent comes from composites in
# objectives/ that pair an anchor with an anomalous behavior on a nearby line.
# pkgver()/prepare()/build() run on the *builder's* machine (build()/prepare()
# during makepkg; pkgver() even during AUR-helper update checks), so code there
# executes before — and independent of — the package being installed.
defaults:
  platforms: [linux]
  for: [shell]

traits:
  - id: pkgbuild-pkgver-fn
    desc: PKGBUILD defines a pkgver() function
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*pkgver\s*\(\s*\)'

  - id: pkgbuild-build-fn
    desc: PKGBUILD defines a build() function
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*build\s*\(\s*\)'

  - id: pkgbuild-prepare-fn
    desc: PKGBUILD defines a prepare() function
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*prepare\s*\(\s*\)'

  - id: pkgbuild-noextract-nonempty
    # noextract=() with at least one entry tells makepkg NOT to extract that
    # source; build() then handles the raw downloaded file directly, bypassing
    # the normal extract-then-inspect flow. Neutral alone (some packages handle
    # their own extraction); the composite pairs it with execution of the file.
    desc: PKGBUILD declares a non-empty noextract list
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'noextract=\(\s*["'']'
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-kernel-repackage-pkgbuild

  - id: pkgbuild-github-tag-api-fetch
    desc: PKGBUILD fetches GitHub tag metadata
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'https://api\.github\.com/repos/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/git/ref/tags/'

  - id: pkgbuild-js-runtime-dependency
    # Neutral package metadata: the objective rule decides whether this becomes
    # suspicious by pairing it with an install scriptlet bootstrap.
    desc: PKGBUILD declares a JS runtime dependency
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?m)^\s*(make)?depends=\([^)\n]{0,400}[''"](bun|deno|nodejs|npm)[''"]'
