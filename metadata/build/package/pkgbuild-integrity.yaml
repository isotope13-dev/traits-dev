# Neutral PKGBUILD source-integrity facts. These are structural observations
# about how an Arch/AUR PKGBUILD fetches and verifies its sources; the
# supply-chain *intent* (an unverified, swappable remote source) is inferred by
# the composite in objectives/supply-chain/metadata-anomaly/integrity/.
defaults:
  platforms: [linux]
  for: [shell]

traits:
  - id: pkgbuild-checksum-skip
    # `*sums=(... SKIP ...)` disables integrity verification for a source.
    # Legitimate for VCS sources and PGP-verified ones (see the benign-context
    # atoms below); on a fixed downloadable archive it means the maintainer can
    # swap the fetched bytes after review (content-swap / moving-target).
    desc: PKGBUILD skips source checksum verification
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(sha\d+|md5|b2|ck)sums=\([^)]{0,400}\bSKIP\b'

  - id: pkgbuild-remote-archive-source
    desc: PKGBUILD fetches a remote source archive
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: 'source=[^)]{0,400}https?://[^)]{0,200}\.(tar|zip|tgz)'

  - id: pkgbuild-validpgpkeys
    # Declaring validpgpkeys means the source is verified by detached PGP
    # signature, so SKIP checksums are expected and benign.
    desc: PKGBUILD declares validpgpkeys for PGP verify
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: 'validpgpkeys=\('

  - id: pkgbuild-vcs-source
    # git+/svn+/hg+/bzr+ sources are version-controlled; SKIP checksums are the
    # norm because the integrity comes from the pinned revision, not a digest.
    desc: PKGBUILD uses a VCS (git/svn/hg) source
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: '\b(git|svn|hg|bzr)\+'
