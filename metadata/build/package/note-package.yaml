# `.note.package` self-attestation traits.  Modern Linux distros
# (Wolfi/Chainguard, Fedora 36+, recent systemd builds, some Debian
# packages) embed an FDO Package Metadata note at link time —
# n_type=0xCAFE1A7E, vendor "FDO", desc=JSON document with package
# identity. Cleave parses this into the `package.*` kv subtree.
#
# This is the strongest "what package am I from" attestation any
# binary format offers — it's the package manager's own metadata
# baked into the binary at build time, not a heuristic.
defaults:
  platforms: [linux]
  for: [elf]
  conf: 1.0
traits:
  - id: has-note-package
    desc: Binary carries FDO package-metadata note
    crit: baseline
    if:
      type: value
      path: package
      exists: true
  - id: package-type-apk
    desc: Self-attests as Alpine/Wolfi apk package
    crit: baseline
    if:
      type: value
      path: package.type
      exact: apk
  - id: package-type-rpm
    desc: Self-attests as RPM package
    crit: baseline
    if:
      type: value
      path: package.type
      exact: rpm
  - id: package-type-deb
    desc: Self-attests as Debian package
    crit: baseline
    if:
      type: value
      path: package.type
      exact: deb
  - id: package-type-pacman
    desc: Self-attests as pacman package
    crit: baseline
    if:
      type: value
      path: package.type
      exact: pacman
  - id: package-attests-wolfi
    desc: Self-attests as Wolfi-built (CPE)
    crit: baseline
    if:
      type: value
      path: package.cpe
      regex: "cpe:.{1,40}:o:wolfi:"
  - id: package-attests-chainguard
    desc: Self-attests as Chainguard build
    crit: baseline
    if:
      type: value
      path: package.cpe
      regex: "cpe:.{1,40}:o:chainguard:"
