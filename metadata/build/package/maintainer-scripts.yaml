# Distro package maintainer-script markers: Debian postinst/debhelper, RPM
# %post, Arch .INSTALL, and pacman lifecycle hook functions. Neutral build
# metadata; supply-chain intent is layered on in objectives/.
defaults:
  platforms: [linux]
  for: [elf, shell, python, javascript, typescript, go]
traits:
  # A self-contained server provisioning script may deliberately install
  # packages, establish a service, and set a default-deny UFW policy. That is
  # deployment hardening context, not firewall degradation.
  - id: server-hardening-package-install
    desc: Server provisioning installs system packages
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '\bapt(-get)?\s+install\b'
  - id: server-hardening-firewall-policy
    desc: Server sets default-deny inbound policy
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '\bufw\s+default\s+deny\s+incoming\b'
  - id: server-hardening-service-control
    desc: Server provisioning enables or starts a service
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '\bsystemctl\s+(enable|start)\b'

  - id: cloud-marketplace-path
    desc: Cloud marketplace path
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: path
      regex: '(^|[\\/])marketplace([\\/]|$)'
  - id: cloud-marketplace-text
    desc: Cloud marketplace text
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '(DigitalOcean|Vultr) Marketplace|one-click-droplet|cloud-init'
  - id: cloud-marketplace-do-marker
    desc: DigitalOcean image cleanup marker
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: DO Directory
  - id: cloud-marketplace-cleanup-path
    desc: Cloud marketplace cleanup path
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: path
      basename: true
      regex: '(^|[0-9_-]*cleanup(\.sh)?$|vultr-helper\.sh$)'
  - id: cloud-marketplace-clean-functions
    desc: Cloud marketplace cleanup functions
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: 'clean_(logs|history|system)\b'
  - id: cloud-marketplace-cloud-instance-clean
    desc: Cloud marketplace instance cleanup
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: /var/lib/cloud/instances
  - id: cloud-marketplace-free-space-erase
    desc: Cloud marketplace free-space erase
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: securely erase the unused
  - id: bsd-rc-subr-source
    desc: BSD rc.subr source
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    ref: sha256:068c2d889835418e0eed167360e1dc5016197a207896199425a11cf41b9ca24e
    if:
      type: text
      regex: '/etc/(rc\.d/)?rc\.subr'
  - id: openbsd-rc-cmd-dispatch
    desc: OpenBSD rc_cmd dispatch
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '(?m)^\s*rc_cmd\s+\$1\b'
  - id: debhelper-dh-installinit-marker
    desc: Debhelper dh_installinit marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Automatically added by dh_installinit/"
  - id: debhelper-auto-section-end
    desc: Debhelper section end marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "End automatically added section"
  - id: debian-postinst-path
    desc: Debian postinst maintainer script path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: path
      basename: true
      exact: postinst.in
  - id: rpm-postinst-script-path
    desc: RPM post-install maintainer script path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: path
      basename: true
      exact: postinst.sh.in
  - id: arch-install-script-path
    desc: Arch package install script path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: path
      basename: true
      exact: .INSTALL
  # arch-install-script-path only matches the built package's `.INSTALL` member.
  # In a PKGBUILD source tree the active scriptlet is a `<pkgname>.install`
  # file referenced by `install=...`. A lifecycle-named function inside the
  # literal PKGBUILD is only hook-like text, so the active scriptlet atom below
  # excludes PKGBUILD while preserving a separate notable hook-like marker.
  - id: pacman-lifecycle-hook-fn
    desc: Pacman lifecycle hook function declaration
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: (?m)^\s*(pre|post)_(install|upgrade|remove)\s*\(\s*\)\s*\{
  - id: pacman-scriptlet-hook-fn
    desc: Defines a pacman lifecycle hook function
    crit: component
    conf: 0.9
    for: [shell]
    if:
      id: pacman-lifecycle-hook-fn
    unless:
      - type: basename
        exact: PKGBUILD
  # Pacman executes lifecycle functions from a package-specific .install
  # script.  Other shell programs (including Sage's package manager) also
  # use names such as post_install, so the filename is part of the identity
  # of this package-scriptlet observation.
  - id: pacman-install-scriptlet-file
    desc: Pacman install scriptlet file
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: path
      regex: '\\.install$'
  - id: apparmor-profile-removal-command
    desc: AppArmor profile removal command
    crit: baseline
    conf: 0.95
    for: [shell]
    if:
      type: text
      regex: 'apparmor_parser\s+-R\b'
  - id: package-post-remove-hook
    desc: Defines a package post-remove hook
    crit: notable
    conf: 0.95
    for: [shell]
    if:
      type: text
      regex: '(?m)^\s*post_remove\s*\(\s*\)\s*\{'
  - id: debian-postrm-script-path
    desc: Debian post-remove script path
    crit: notable
    conf: 0.95
    for: [shell]
    if:
      type: path
      regex: '(^|/)postrm$'
  - id: debian-postrm-debhelper-marker
    desc: Debhelper marker in post-remove script
    crit: notable
    conf: 0.95
    for: [shell]
    if:
      type: text
      substr: '#DEBHELPER#'
composite_rules:
  - id: server-hardening-deployment-script
    desc: Server hardening deployment script
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    all:
      - id: server-hardening-package-install
      - id: server-hardening-firewall-policy
      - id: server-hardening-service-control
  - id: apparmor-profile-removal-post-remove
    desc: AppArmor removal in uninstall hook
    crit: baseline
    conf: 0.95
    all:
      - id: apparmor-profile-removal-command
      - id: package-post-remove-hook
  - id: cloud-marketplace-image-script
    desc: Cloud marketplace image script
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    any:
      - id: cloud-marketplace-path
      - id: cloud-marketplace-text
      - id: cloud-marketplace-do-marker
  - id: cloud-marketplace-cleanup-script
    desc: Cloud marketplace cleanup script
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    all:
      - id: cloud-marketplace-image-script
    any:
      - id: cloud-marketplace-cleanup-path
      - id: cloud-marketplace-clean-functions
      - id: cloud-marketplace-cloud-instance-clean
      - id: cloud-marketplace-free-space-erase
  - id: openbsd-rc-service-script
    desc: OpenBSD rc service script
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [shell]
    all:
      - id: bsd-rc-subr-source
      - id: openbsd-rc-cmd-dispatch
  - id: package-service-maintainer-script
    desc: Package service maintainer script
    crit: baseline
    conf: 0.9
    any:
      - id: debian-postinst-path
      - id: rpm-postinst-script-path
      - id: arch-install-script-path
      - id: pacman-scriptlet-hook-fn
      - id: debhelper-dh-installinit-marker
  - id: pacman-post-remove-cron-cleanup
    desc: Pacman uninstall hook removes cron schedules
    crit: exception
    conf: 0.98
    for: [shell]
    all:
      - id: pacman-lifecycle-hook-fn
      - id: package-post-remove-hook
  - id: debian-postrm-cron-cleanup
    desc: Debian post-remove script removes cron schedules
    crit: exception
    conf: 0.98
    for: [shell]
    all:
      - id: debian-postrm-script-path
      - id: debian-postrm-debhelper-marker
