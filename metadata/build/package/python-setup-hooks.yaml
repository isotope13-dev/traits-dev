# Python setup.py Install Hooks
# Neutral observations about setup.py customization patterns.
# These are legitimate packaging capabilities — intent comes from
# composites in lateral-movement/supply-chain/ that combine them
# with execution/network evidence.
# References: https://docs.python.org/3/distutils/apiref.html
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  # `setup(... cmdclass={'install': ...})` — a custom command class wired into
  # the dict. The `cmdclass` keyword near the quoted command-name key is the
  # distinctive shape; a source-text match avoids the per-node query.
  - id: setup-cmdclass-install
    desc: setup() defines custom install command
    conf: 0.9
    if:
      type: text
      regex: 'cmdclass[\s\S]{0,200}[''"]install[''"]\s*:'
  - id: setup-cmdclass-develop
    desc: setup() defines custom develop command
    conf: 0.9
    if:
      type: text
      regex: 'cmdclass[\s\S]{0,200}[''"]develop[''"]\s*:'
  - id: setup-cmdclass-build-py
    desc: setup() defines custom build_py command
    conf: 0.9
    if:
      type: text
      regex: 'cmdclass[\s\S]{0,200}[''"]build_py[''"]\s*:'
  - id: setup-cmdclass-egg-info
    desc: setup() defines custom egg_info command
    conf: 0.9
    if:
      type: text
      regex: 'cmdclass[\s\S]{0,200}[''"]egg_info[''"]\s*:'
  - id: setuptools-install-class
    desc: Class inherits from setuptools.command.install
    conf: 0.9
    if:
      type: text
      regex: 'class\s+\w+\s*\(\s*(setuptools\.command\.install\.)?install\s*\)'
  - id: setuptools-run-override
    desc: Overrides run() method in install class
    conf: 0.8
    # `class X(install): ... def run(...)` — a command subclass overriding run().
    # The `(install)` base plus a `def run` within the class body is distinctive
    # enough as source text.
    if:
      type: text
      regex: 'class\s+\w+\s*\(\s*install\s*\)[\s\S]{0,400}def\s+run\b'
  - id: setuptools-build-py-class
    desc: Class inherits from setuptools.command.build_py
    conf: 0.9
    if:
      # Migrated from a tree-sitter query to a lenient `type: text`
      # match (no per-member cursor walk). Approximates the query's
      # structural intent via its distinctive token(s).
      type: text
      regex: 'build_py$|^setuptools.command.build_py.build_py'
  - id: setuptools-build-py-run-override
    desc: Overrides run() method in build_py class
    conf: 0.8
    # `class X(build_py): ... def run(...)` — command subclass overriding run().
    if:
      type: text
      regex: 'class\s+\w+\s*\(\s*build_py\s*\)[\s\S]{0,400}def\s+run\b'
  - id: run-override-calls-helper
    desc: run() override calls helper before super
    conf: 0.85
    if:
      type: text
      regex: 'def\s+run\(self\):[\s\S]{0,160}\b[A-Za-z_][A-Za-z0-9_]*\(\)[\s\S]{0,80}super\(\)\.run\(\)'
