# Python setup.py Install Hooks
# Neutral observations about setup.py customization patterns.
# These are legitimate packaging capabilities — intent comes from
# composites in lateral-movement/supply-chain/ that combine them
# with execution/network evidence.
# References: https://docs.python.org/3/distutils/apiref.html
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: setup-cmdclass-install
    desc: setup() defines custom install command
    conf: 0.9
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "setup")
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @arg_name (#eq? @arg_name "cmdclass")
              value: (dictionary
                (pair
                  key: (string) @key (#match? @key "['']install['']")
                )
              )
            )
          )
        )
  - id: setup-cmdclass-develop
    desc: setup() defines custom develop command
    conf: 0.9
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "setup")
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @arg_name (#eq? @arg_name "cmdclass")
              value: (dictionary
                (pair
                  key: (string) @key (#match? @key "['']develop['']")
                )
              )
            )
          )
        )
  - id: setup-cmdclass-build-py
    desc: setup() defines custom build_py command
    conf: 0.9
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "setup")
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @arg_name (#eq? @arg_name "cmdclass")
              value: (dictionary
                (pair
                  key: (string) @key (#match? @key "['']build_py['']")
                )
              )
            )
          )
        )
  - id: setup-cmdclass-egg-info
    desc: setup() defines custom egg_info command
    conf: 0.9
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "setup")
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @arg_name (#eq? @arg_name "cmdclass")
              value: (dictionary
                (pair
                  key: (string) @key (#match? @key "['']egg_info['']")
                )
              )
            )
          )
        )
  - id: setuptools-install-class
    desc: Class inherits from setuptools.command.install
    conf: 0.9
    if:
      type: ast
      query: |
        (class_definition
          superclasses: (argument_list
            (identifier) @parent (#match? @parent "^install$|^setuptools.command.install.install$")
          )
        )
  - id: setuptools-run-override
    desc: Overrides run() method in install class
    conf: 0.8
    if:
      type: ast
      query: |
        (class_definition
          superclasses: (argument_list (identifier) @parent (#eq? @parent "install"))
          body: (block
            (function_definition
              name: (identifier) @func (#eq? @func "run")
            )
          )
        )
  - id: setuptools-build-py-class
    desc: Class inherits from setuptools.command.build_py
    conf: 0.9
    if:
      type: ast
      query: |
        (class_definition
          superclasses: (argument_list
            (identifier) @parent (#match? @parent "^build_py$|^setuptools.command.build_py.build_py$")
          )
        )
  - id: setuptools-build-py-run-override
    desc: Overrides run() method in build_py class
    conf: 0.8
    if:
      type: ast
      query: |
        (class_definition
          superclasses: (argument_list (identifier) @parent (#eq? @parent "build_py"))
          body: (block
            (function_definition
              name: (identifier) @func (#eq? @func "run")
            )
          )
        )
  - id: run-override-calls-helper
    desc: run() override calls helper before super
    conf: 0.85
    if:
      type: text
      regex: 'def\s+run\(self\):[\s\S]{0,160}\b[A-Za-z_][A-Za-z0-9_]*\(\)[\s\S]{0,80}super\(\)\.run\(\)'
