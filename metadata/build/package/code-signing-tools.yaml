defaults:
  platforms: [unix, windows]
  for: [go, scripts, binaries]
  crit: baseline
  conf: 0.84

traits:
  - id: codesign-cli-tool-literal
    desc: Apple codesign CLI tool reference
    if:
      type: string_literal
      exact: codesign

  - id: codesign-verbose-flag-literal
    desc: Apple codesign verbose flag reference
    if:
      type: string_literal
      exact: --verbose=4

composite_rules:
  # SwiftPM app packaging legitimately clears extended attributes as part of
  # code sealing, then signs the resulting bundle. Keep this context available
  # only as a Gatekeeper false-positive suppressor.
  - id: swift-app-bundle-code-sealing-context
    desc: Swift app bundle code-sealing build context
    crit: exception
    conf: 0.96
    platforms: [macos]
    for: [shell]
    all:
      - id: micro-behaviors/process/create/shell/build::swift-build-command
      - id: micro-behaviors/fs/attributes/xattr::xattr-clear-local-file
      - id: micro-behaviors/os/security/gatekeeper::codesign-command
