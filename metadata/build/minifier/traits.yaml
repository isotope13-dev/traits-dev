defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: use-strict-quote
    desc: Contains a JavaScript use strict directive
    crit: component
    conf: 0.6
    if:
      type: string_literal
      substr: use strict
  - id: void-zero
    desc: Uses minifier-style void 0 for undefined
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: void 0
  - id: esmodule-export
    desc: Defines the CommonJS __esModule flag
    crit: component
    conf: 0.6
    if:
      type: string_literal
      substr: __esModule
