defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: ocaml-shell-polyglot-launcher
    desc: OCaml program launched from shell polyglot
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?s)^#!\s*/bin/sh[\s\S]{0,160}\bexec\s+ocaml\s+["'']\$0["'']\s+["'']\$@["''][\s\S]{0,160}\(\*'
