# PE manifest assembly identity name matches a Visual Studio default
# project template (`MyApplication.app`, `WindowsForm1`, `App1`,
# `Form1`, `WindowsApplication1`, etc.). Real vendor binaries
# customize this; an unedited template name signals the developer
# didn't bother — strong correlate with hobbyist / adversary builds.
#
# Real-world: SSCMDataset's `runtime.exe` (Mythic Apollo C2 dropper)
# carried `MyApplication.app` here — the Apollo build script's stock
# template name, never customized.
defaults:
  platforms: [windows]
  for: [pe]
  conf: 0.9
  crit: notable
  size_min: 1024
  size_max: 524288000
traits:
  - id: pe-manifest-myapplication-template
    desc: Manifest is MyApplication template name
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      regex: "^MyApplication(\\.app)?$"
  - id: pe-manifest-windowsform-template
    desc: Manifest is WindowsForm template name
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      regex: "^WindowsForm[0-9]{0,3}$"
  - id: pe-manifest-app-template
    desc: Manifest is App1 / WpfApp template
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      regex: "^(App|WpfApp|MAUIApp)[0-9]{1,3}$"
  - id: pe-manifest-form-template
    desc: Manifest is bare Form template
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      regex: "^Form[0-9]{1,3}$"
  - id: pe-manifest-console-template
    desc: Manifest is ConsoleApplication template
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      regex: "^ConsoleApplication[0-9]{0,3}$"
  - id: pe-manifest-classlibrary-template
    desc: Manifest is ClassLibrary template
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      regex: "^ClassLibrary[0-9]{0,3}$"
