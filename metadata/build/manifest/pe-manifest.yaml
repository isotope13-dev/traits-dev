# PE side-by-side assembly manifest signals.  Cleave's binary kv
# extractor parses the embedded RT_MANIFEST resource into the kv
# tree at `pe.manifest.*`.
#
# These are the highest-leverage swap-detection signals on Windows
# binaries: vendors typically ship the same manifest across releases,
# so a version drift, escalation in requestedExecutionLevel, or a
# previously-absent autoElevate is unambiguous tampering.
defaults:
  platforms: [windows]
  for: [pe]
  conf: 1.0
traits:
  - id: pe-has-manifest
    desc: PE carries side-by-side assembly manifest
    crit: baseline
    if:
      type: kv
      path: pe.manifest
      exists: true
  - id: pe-requires-admin
    desc: requestedExecutionLevel is requireAdministrator
    crit: notable
    if:
      type: kv
      path: pe.manifest.requested_execution_level
      exact: requireAdministrator
  - id: pe-highest-available
    desc: requestedExecutionLevel is highestAvailable
    crit: notable
    if:
      type: kv
      path: pe.manifest.requested_execution_level
      exact: highestAvailable
  - id: pe-as-invoker
    desc: requestedExecutionLevel is asInvoker
    crit: baseline
    if:
      type: kv
      path: pe.manifest.requested_execution_level
      exact: asInvoker

  - id: pe-auto-elevate
    desc: Manifest sets autoElevate (UAC-bypass tooling)
    crit: suspicious
    if:
      type: kv
      path: pe.manifest.auto_elevate
      exact: "true"
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/build/manifest::pe-requires-admin
  - id: pe-ui-access
    desc: Manifest requests uiAccess privilege
    crit: notable
    if:
      type: kv
      path: pe.manifest.ui_access
      exact: "true"
  - id: pe-dpi-aware
    desc: GUI binary declares DPI awareness
    crit: baseline
    if:
      type: kv
      path: pe.manifest.dpi_aware
      exact: "true"
  - id: pe-long-path-aware
    desc: Manifest declares long-path awareness
    crit: baseline
    if:
      type: kv
      path: pe.manifest.long_path_aware
      exact: "true"
  - id: pe-common-controls-v6
    desc: Depends on Common-Controls v6
    crit: baseline
    if:
      type: kv
      path: pe.manifest.dependencies
      regex: "Microsoft.Windows.Common-Controls"
  - id: pe-supports-win10
    desc: Manifest opts into Windows 10+ behavior
    crit: baseline
    if:
      type: kv
      path: pe.manifest.supported_os
      regex: '"name":"win10"'
  - id: pe-vista-only-manifest
    desc: Manifest declares only Vista support
    crit: notable
    if:
      type: kv
      path: pe.manifest.supported_os
      regex: '"name":"vista"'
    unless:
      - id: pe-supports-win10
  - id: pe-oracle-java-manifest-identity
    desc: Manifest claims Oracle Java identity
    crit: component
    conf: 0.95
    if:
      type: kv
      path: pe.manifest
      regex: 'Oracle Corporation|Java\(TM\) SE javaw process|Java\(tm\) 2 Standard Edition'
