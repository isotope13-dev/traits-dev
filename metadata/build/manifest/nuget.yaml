# NuGet .nuspec package manifest file identity (a neutral file property).
# Relocated from metadata/package/files (which was at its 80-trait cap);
# supply-chain composites reference it cross-directory.
defaults:
  platforms: [windows, unix]
  for: [xml, data]
traits:
  - id: nuspec-file
    desc: NuGet nuspec manifest file
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '\.nuspec$'
  - id: msbuild-targets-file
    desc: MSBuild targets manifest file
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '\.targets$'
