defaults:
  platforms: [windows, unix]
  for:
    - package.json
  crit: notable
  conf: 0.88

traits:
  - id: bun-run-server-entry
    desc: Bun runs TypeScript server entry
    if:
      type: kv
      path: scripts.start
      regex: '(^|&&\s*)bun\s+run\s+src/index\.ts(\s|$)'
  - id: bun-dev-watch-server
    desc: Bun watches TypeScript server
    if:
      type: kv
      path: scripts.dev
      substr: "bun --watch src/index.ts"
  - id: bun-production-bundle
    desc: Bun production bundle script
    if:
      type: kv
      path: scripts.build
      substr: "bun build --production --minify"
  - id: bun-compile-windows-x64
    desc: Bun compiles Windows executable
    if:
      type: kv
      path: scripts.build:prod:win
      substr: "--target bun-windows-x64"
  - id: bun-compile-linux-x64
    desc: Bun compiles Linux executable
    if:
      type: kv
      path: scripts.build:prod:linux
      substr: "--target bun-linux-x64"

composite_rules:
  - id: bun-typescript-server
    desc: Bun TypeScript server package
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: bun-run-server-entry
      - id: bun-dev-watch-server
      - id: bun-production-bundle
  - id: bun-cross-platform-compiled-server
    desc: Bun cross-platform compiled server
    crit: suspicious
    conf: 0.92
    all:
      - id: bun-compile-windows-x64
      - id: bun-compile-linux-x64
