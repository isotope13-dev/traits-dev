# Detects AP-Compiler artifacts
# AP-Compiler is a tool to bundle PowerShell dependencies
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [powershell]
traits:
  - id: ap-compiler-header
    desc: "AP-Compiler header"
    crit: baseline
    count_min: 1
    if:
      type: raw
      substr: "AP-Compiler Version"
