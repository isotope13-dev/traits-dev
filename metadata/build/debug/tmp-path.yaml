# Build artifact references a path under /tmp/.  Real CI pipelines
# (GitHub Actions, GitLab Runner, CircleCI) and distro builders use
# stable paths like /home/runner/, /builddir/build/BUILD/, /work/.
# Building under /tmp/ is characteristic of:
#   - ad-hoc adversary build environments (sandbox containers)
#   - C2 framework auto-build scripts (e.g. Mythic Apollo's
#     /tmp/tmp<rand>/Apollo/obj/Release/...)
#   - rapid-iteration test builds that escaped to release
#
# Conservative: matches /tmp/ at start, plus an additional
# segment so we don't false-positive on traits where the value
# is literally "/tmp" with no path.
defaults:
  platforms: [windows]
  for: [pe]
  conf: 0.85
  size_min: 1024
  size_max: 524288000
traits:
  - id: pe-pdb-tmp-path
    desc: PE PDB path under /tmp/
    crit: notable
    if:
      type: kv
      path: debug.pdb_path
      regex: "^/tmp/[a-zA-Z0-9._-]{1,80}/"
  - id: pe-pdb-tmp-random-prefix
    desc: PE PDB path uses tmpdir random prefix
    crit: notable
    if:
      type: kv
      path: debug.pdb_path
      regex: "/tmp/tmp[a-zA-Z0-9]{6,16}"
