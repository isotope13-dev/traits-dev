# DWARF debug-info attribution traits.  Read directly from cleave's
# `dwarf.*` kv subtree, populated by `dwarf_extractors::extract` for
# unstripped ELF binaries.  These signals are absent from stripped
# binaries (most malware) but present on virtually every legitimate
# vendor release that ships with debug info — making them ideal for
# supply-chain swap detection (a vendor's previous releases have a
# stable producer string + comp_dir; a swapped build will diverge).
defaults:
  platforms: [linux]
  for: [elf]
  conf: 1.0
traits:
  - id: has-dwarf-debug-info
    desc: Binary retains DWARF debug info (unstripped)
    crit: baseline
    if:
      type: value
      path: dwarf.cu_count
      exists: true
  - id: dwarf-multiple-producers
    desc: "Many DWARF producer strings (mixed toolchains)"
    crit: notable
    if:
      type: value
      path: dwarf.producers
      size_min: 2
  - id: dwarf-multiple-comp-dirs
    desc: Multiple DWARF comp_dirs (mixed source roots)
    crit: notable
    if:
      type: value
      path: dwarf.comp_dirs
      size_min: 2
  - id: dwarf-rust-buildbot
    desc: Built by Rust buildbot infrastructure
    crit: baseline
    if:
      type: value
      path: dwarf.comp_dirs
      regex: "/buildslave/rust-buildbot/"
  - id: dwarf-fedora-mock
    desc: Built by Fedora mock (/builddir/build/BUILD/)
    crit: baseline
    if:
      type: value
      path: dwarf.comp_dirs
      regex: "^/builddir/build/BUILD/"
  - id: dwarf-debian-buildd
    desc: Built by Debian buildd (/build/<pkg>-*)
    crit: baseline
    if:
      type: value
      path: dwarf.comp_dirs
      regex: "^/build/[^/]{1,80}-[0-9]"
  - id: dwarf-yocto-build
    desc: Built by Yocto / OpenEmbedded
    crit: baseline
    if:
      type: value
      path: dwarf.comp_dirs
      regex: "/work/[^/]{1,80}-(linux|poky|oe)"
  - id: dwarf-nix-store
    desc: Built in Nix store (/nix/store/...)
    crit: baseline
    if:
      type: value
      path: dwarf.comp_dirs
      regex: "^/nix/store/"
  - id: dwarf-builddir-leak
    desc: "DWARF leaks builder home dir (/home/<user>)"
    crit: notable
    if:
      type: value
      path: dwarf.comp_dirs
      regex: "^/home/[^/]{1,80}/"
  - id: dwarf-tmp-comp-dir
    desc: DWARF compile dir under /tmp/
    crit: notable
    if:
      type: value
      path: dwarf.comp_dirs
      regex: "^/tmp/"
