defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
traits:
  - id: setup-py
    desc: setup.py file
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      substr: setup.py
  - id: pyproject-toml
    desc: pyproject.toml reference
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      substr: pyproject.toml
  - id: requirements-txt
    desc: requirements.txt reference
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: requirements.txt
  - id: site-packages
    desc: site-packages directory
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: site-packages
  - id: setuptools-package-index
    desc: setuptools PackageIndex class
    crit: baseline
    conf: 1.0
    if:
      type: string_value
      substr: class PackageIndex
composite_rules:
  - id: pip
    desc: Built with pip/setuptools (Python)
    crit: notable
    conf: 0.85
    any:
      - id: setup-py
      - id: pyproject-toml
      - id: requirements-txt
      - id: site-packages
