defaults:
  platforms: [windows, unix]

traits:
  - id: setup-py
    desc: Python setup.py or setup.cfg file
    crit: baseline
    conf: 1.0
    for: [python, pkginfo]
    if:
      type: path
      basename: true
      regex: '^setup\.(py|cfg)$'

  - id: root-setup-py
    desc: Root Python setup.py packaging file
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: path
      # Install-time setup.py conclusions should come from a packaging script at
      # the filesystem/archive root, or the conventional single top directory
      # used by sdists. Do not treat runtime modules named setup.py as pip hooks.
      regex: '^setup\.py$|^.*!!([^\/!]+[\/])?setup\.py$'
    unless:
      - type: path
        regex: '[\\/](_vendor|vendor|site-packages)[\\/]'

  - id: pyproject-toml
    desc: Python project manifest (pyproject.toml)
    crit: baseline
    conf: 1.0
    for: [pyproject.toml]
    if:
      type: path
      basename: true
      exact: pyproject.toml

  - id: requirements-txt
    desc: Python requirements (requirements.txt)
    crit: baseline
    conf: 1.0
    for: [text, data]
    if:
      type: path
      basename: true
      exact: requirements.txt

  - id: site-packages-binary
    desc: site-packages directory reference (binary)
    crit: component
    conf: 0.85
    for: [binaries]
    if:
      type: text
      substr: site-packages
      section: .data

  - id: site-packages-script
    desc: site-packages directory reference (script)
    crit: component
    conf: 0.85
    for: [scripts]
    if:
      type: text
      substr: site-packages

  - id: setuptools-package-index
    desc: setuptools PackageIndex class
    crit: baseline
    conf: 1.0
    for: [python]
    if:
      type: text
      regex: 'class PackageIndex\(Environment\)'

composite_rules:
  - id: site-packages
    desc: site-packages directory reference
    crit: notable
    any:
      - id: site-packages-binary
      - id: site-packages-script

  - id: pip
    desc: Built with pip/setuptools (Python)
    crit: notable
    conf: 0.85
    any:
      - id: setup-py
      - id: root-setup-py
      - id: pyproject-toml
      - id: requirements-txt
      - id: site-packages
