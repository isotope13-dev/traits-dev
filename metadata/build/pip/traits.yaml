defaults:
  platforms: [windows, unix]

traits:
  - id: pyproject-is-pyproject
    # Neutral file-identity property ("this is a pyproject.toml"): a build-system
    # table is present in essentially every modern Python package. Relocated here
    # from objectives/supply-chain/metadata-anomaly; supply-chain composites
    # reference it cross-directory as positive context.
    desc: pyproject.toml build configuration file
    crit: component
    conf: 1.0
    for: [pyproject.toml]
    if:
      type: value
      path: "build-system.requires"
      exists: true
  - id: setup-py
    desc: Python setup.py or setup.cfg file
    crit: baseline
    conf: 1.0
    for: [python, pkginfo]
    if:
      type: path
      basename: true
      regex: '^setup\.(py|cfg)$'

  - id: root-setup-py
    desc: Root Python setup.py packaging file
    crit: component
    conf: 0.98
    for: [python]
    # Reference the canonical setup.py basename matcher and exclude vendored
    # copies — install-time setup.py conclusions should come from a packaging
    # script at the archive root, not a runtime module named setup.py.
    if:
      id: metadata/package/files/included::setup-py-basename
    unless:
      - type: path
        regex: '[\\/](_vendor|vendor|site-packages)[\\/]'

  - id: pyproject-toml
    desc: Python project manifest (pyproject.toml)
    crit: baseline
    conf: 1.0
    for: [pyproject.toml]
    if:
      type: path
      basename: true
      exact: pyproject.toml

  - id: requirements-txt
    desc: Python requirements (requirements.txt)
    crit: baseline
    conf: 1.0
    for: [text, data]
    if:
      type: path
      basename: true
      exact: requirements.txt

  - id: site-packages-binary
    desc: site-packages directory reference (binary)
    crit: component
    conf: 0.85
    for: [binaries]
    if:
      type: text
      substr: site-packages
      section: .data

  - id: site-packages-script
    desc: site-packages directory reference (script)
    crit: component
    conf: 0.85
    for: [scripts]
    if:
      type: text
      substr: site-packages

  - id: setuptools-package-index
    desc: setuptools PackageIndex class
    crit: baseline
    conf: 1.0
    for: [python]
    if:
      type: text
      regex: 'class PackageIndex\(Environment\)'

  - id: setuptools-easy-install-source
    desc: setuptools easy_install implementation source
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      regex: 'command[\\/]easy_install\.py$'

  - id: pip-wheel-installer-source
    desc: pip wheel installer implementation source
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      regex: 'operations[\\/]install[\\/]wheel\.py$'

  - id: virtualenv-periodic-update-source
    desc: virtualenv periodic wheel update source
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      regex: 'wheels[\\/]periodic_update\.py$'

  - id: python-packaging-vendored-source
    desc: Vendored Python packaging tool source
    crit: baseline
    conf: 0.95
    for: [python]
    if:
      type: path
      regex: '(pip|setuptools|wheel)[\\/]_vendor[\\/]'

  - id: python-packaging-tool-tests
    desc: Python packaging tool test source
    crit: baseline
    conf: 0.95
    for: [python]
    if:
      type: path
      regex: '(pip|setuptools|wheel)[\\/].{0,80}tests?[\\/]'

  - id: setuptools-launcher-stub
    desc: setuptools Windows launcher stub
    crit: baseline
    conf: 0.98
    for: [pe, whl, zip]
    if:
      type: path
      regex: '(^|[\\/])setuptools[\\/](cli|gui)(-32|-64)?\.exe$'

  - id: setuptools-windows-msvc-helper
    desc: setuptools Windows MSVC helper source
    crit: baseline
    conf: 0.95
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])setuptools[\\/]msvc\.py$'

  - id: virtualenv-macos-launcher-patcher
    desc: virtualenv macOS launcher patching source
    crit: baseline
    conf: 0.95
    for: [python]
    if:
      type: path
      regex: 'cpython[\\/]mac_os\.py$'

composite_rules:
  - id: site-packages
    desc: site-packages directory reference
    crit: notable
    any:
      - id: site-packages-binary
      - id: site-packages-script

  - id: pip
    desc: Built with pip/setuptools (Python)
    crit: notable
    conf: 0.85
    any:
      - id: setup-py
      - id: root-setup-py
      - id: pyproject-toml
      - id: requirements-txt
      - id: site-packages
