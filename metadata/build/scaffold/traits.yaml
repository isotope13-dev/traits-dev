defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
  conf: 0.9
traits:
  - id: node-project-scaffolder-file-writer
    desc: Node project scaffolder writes files
    if:
      type: text
      regex: '\b(FileGenerator\.writeFile|Scaffolder\b|scaffold\(|generate[A-Z][A-Za-z0-9_]{0,80})'

  - id: template-package-json-path
    desc: Template package.json path
    if:
      type: text
      substr: /templates/package.json
  - id: template-package-json-file-path
    desc: Template package.json file path
    if:
      type: path
      regex: '(templates?|scaffold|skeleton).*package\.json(\.tpl)?$'
  - id: template-js-build-config-path
    desc: Template JavaScript build config path
    if:
      type: text
      regex: /templates/(vite|webpack|playwright)\.config\.(m?js|ts)
  - id: template-css-build-config-path
    desc: Template CSS build config path
    if:
      type: text
      regex: /templates/(tailwind|postcss|eslint)\.config\.(m?js|ts)
  - id: node-template-copy-call
    desc: Node template copy call
    if:
      type: text
      regex: fs\.(copyFileSync|cpSync)\s*\(
composite_rules:
  - id: node-project-scaffold-template-writer
    desc: Node project scaffolder writes template files
    conf: 0.95
    all:
      - id: template-package-json-path
      - id: micro-behaviors/fs/file/read::require-cwd-package-json--rx-1
      - id: node-template-copy-call
    any:
      - id: template-js-build-config-path
      - id: template-css-build-config-path
      - id: micro-behaviors/fs/path/application/config::claude-config-directory
