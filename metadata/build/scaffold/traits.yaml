defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python]
  crit: component
  conf: 0.9
traits:
  # The `generate[A-Z]\w*` branch was dropped: it matched every camelCase
  # `generateFoo` identifier in existence (generateSessionKey, generateId,
  # generateSystemdUnit, ...), so this claimed "project scaffolder writes
  # files" for any file defining a generate* function. The remaining branches
  # each name a real scaffolder surface.
  - id: node-project-scaffolder-file-writer
    desc: Node project scaffolder writes files
    if:
      type: text
      regex: '\b(FileGenerator\.writeFile|Scaffolder\b|scaffold\()'

  - id: template-package-json-path
    desc: Template package.json path
    if:
      type: text
      substr: /templates/package.json
  - id: template-package-json-file-path
    desc: Template package.json file path
    if:
      type: path
      regex: '(templates?|scaffold|skeleton).*package\.json(\.tpl)?$'
  - id: template-js-build-config-path
    desc: Template JavaScript build config path
    if:
      type: text
      regex: /templates/(vite|webpack|playwright)\.config\.(m?js|ts)
  - id: template-css-build-config-path
    desc: Template CSS build config path
    if:
      type: text
      regex: /templates/(tailwind|postcss|eslint)\.config\.(m?js|ts)
  - id: node-template-copy-call
    desc: Node template copy call
    if:
      type: text
      regex: fs\.(copyFileSync|cpSync)\s*\(
  - id: windows-wget-js-bootstrap-helper
    desc: Windows wget.js bootstrap helper
    for: [javascript, typescript]
    if:
      type: text
      substr: "Poor man's wget for Windows"
  - id: python-dev-environment-marker
    desc: Python development environment setup marker
    for: [python]
    crit: baseline
    conf: 0.9
    ref: sha256:badfffc3c9c89439e736a1e00592a84dfb7235836fc3a6f1410d55c6275f1f23
    if:
      type: text
      regex: 'ensure_dev_environment|run_postinstall|self-heal'
composite_rules:
  - id: node-project-scaffold-template-writer
    desc: Node project scaffolder writes template files
    conf: 0.95
    all:
      - id: template-package-json-path
      - id: micro-behaviors/fs/file/read::require-cwd-package-json--rx-1
      - id: node-template-copy-call
    any:
      - id: template-js-build-config-path
      - id: template-css-build-config-path
      - id: micro-behaviors/fs/path/application/config::claude-config-directory
