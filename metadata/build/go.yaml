defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [go, binaries]
traits:
  - id: go-mod
    desc: go.mod file
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: go.mod
      section: .text
  - id: go-sum
    desc: go.sum file
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: go.sum
      section: .text
  - id: go-pkg-mod
    desc: go/pkg/mod directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: go/pkg/mod
      section: .text
  - id: gopath-env
    desc: GOPATH environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GOPATH
      section: .text
composite_rules:
  - id: go-modules
    desc: Built with Go modules
    crit: notable
    conf: 0.9
    any:
      - id: go-mod
      - id: go-sum
      - id: go-pkg-mod
      - id: gopath-env
