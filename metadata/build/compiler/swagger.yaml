defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: codegen-script
    desc: Swagger Codegen git push script
    for: [elf, macho, pe]
    crit: baseline
    if:
      type: raw
      substr: 'Generated by: https://github.com/swagger-api/swagger-codegen.git'
      section: .text
