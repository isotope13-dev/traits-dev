defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: msvc-crt-strerror-diagnostic
    desc: MSVC CRT strerror diagnostic
    conf: 0.99
    if:
      type: text
      substr: "Visual C++ CRT: Not enough memory to complete call to strerror"
      section: .rdata

composite_rules:
  - id: msvc-crt-linked-rich-imports
    desc: MSVC CRT linkage metadata
    conf: 0.95
    all:
      - id: metadata/binary/resource::rich-header-present
      - id: metadata/binary/metrics/structural::many-imports
