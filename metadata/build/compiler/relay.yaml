defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: relay-codegen-directory-source
    desc: Relay codegen directory source
    crit: baseline
    conf: 0.96
    if:
      type: text
      substr: CodegenDirectory.deleteExtraFiles
  - id: relay-codegen-directory-babel
    desc: Relay codegen directory output
    crit: baseline
    conf: 0.96
    if:
      type: text
      substr: _proto.deleteExtraFiles
  - id: relay-codegen-tracked-files
    desc: Relay tracks generated files
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: this._files.has
  - id: relay-codegen-validation-mode
    desc: Relay validation-only mode
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: this.onlyValidate
  - id: relay-codegen-deleted-source
    desc: Relay records deleted outputs
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: this.changes.deleted.push
  - id: relay-codegen-deleted-babel
    desc: Relay records deleted outputs
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: _this3.changes.deleted.push
  - id: relay-buffered-filesystem-marker
    desc: Relay buffered filesystem helper
    crit: baseline
    conf: 0.96
    if:
      type: text
      substr: BufferedFilesystem
  - id: relay-buffered-delete-marker
    desc: Relay buffers deleted files
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: this.buffer.set(path, null)
  - id: relay-buffered-source-control
    desc: Relay source-control update hook
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: sourceControl.addRemove

composite_rules:
  - id: relay-codegen-directory-marker
    desc: Relay codegen directory marker
    crit: baseline
    conf: 0.96
    any:
      - id: relay-codegen-directory-source
      - id: relay-codegen-directory-babel
  - id: relay-codegen-deleted-changes
    desc: Relay records deleted outputs
    crit: baseline
    conf: 0.94
    any:
      - id: relay-codegen-deleted-source
      - id: relay-codegen-deleted-babel
  - id: relay-generated-file-cleanup
    desc: Relay generated-file cleanup helper
    crit: baseline
    conf: 0.96
    any:
      - id: relay-codegen-directory-cleanup
      - id: relay-buffered-filesystem-cleanup
  - id: relay-codegen-directory-cleanup
    desc: Relay codegen directory cleanup
    crit: baseline
    conf: 0.96
    all:
      - id: relay-codegen-directory-marker
      - id: relay-codegen-tracked-files
      - id: relay-codegen-validation-mode
      - id: relay-codegen-deleted-changes
  - id: relay-buffered-filesystem-cleanup
    desc: Relay buffered filesystem cleanup
    crit: baseline
    conf: 0.96
    all:
      - id: relay-buffered-filesystem-marker
      - id: relay-buffered-delete-marker
      - id: relay-buffered-source-control
