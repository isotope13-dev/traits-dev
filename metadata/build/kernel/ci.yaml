defaults:
  platforms: [unix]
  for: [shell]
  crit: baseline
  conf: 0.99

traits:
  - id: linux-kernel-drm-ci-build-path
    desc: Linux kernel DRM CI build script basename
    if:
      type: basename
      exact: build.sh
  - id: linux-kernel-drm-ci-build-marker
    desc: Linux kernel DRM CI build markers
    count_min: 2
    if:
      type: text
      regex: '\b(KERNEL_ARCH|KERNEL_IMAGE_NAME|UPLOAD_TO_MINIO|CI_JOB_NAME)\b'

composite_rules:
  - id: linux-kernel-drm-ci-build-script
    desc: Linux kernel DRM CI build script context
    all:
      - id: linux-kernel-drm-ci-build-path
      - id: linux-kernel-drm-ci-build-marker
