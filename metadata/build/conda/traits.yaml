defaults:
  platforms: [unix, windows]
traits:
- id: conda-env-prefix-vars
  desc: Conda build prefix and recipe dir variables
  crit: component
  conf: 0.95
  for: [shell, batch, powershell]
  count_min: 2
  if:
    type: text
    regex: '\b(SRC_DIR|RECIPE_DIR|PREFIX|LIBRARY_PREFIX)\b'
# conda-build writes activate.d/deactivate.d scripts that save and restore
# environment variables around `conda activate`; CONDA_PREFIX and the
# CONDA_BACKUP_/_CONDA_SET_ save-slot prefixes are that machinery's markers.
- id: conda-activation-prefix-var
  desc: Conda CONDA_PREFIX variable
  crit: component
  conf: 0.95
  for: [shell, batch, powershell]
  if:
    type: text
    substr: CONDA_PREFIX
- id: conda-activation-backup-var
  desc: Conda CONDA_BACKUP_ save slot
  crit: component
  conf: 0.95
  for: [shell, batch, powershell]
  if:
    type: text
    substr: CONDA_BACKUP_
- id: conda-activation-set-var
  desc: Conda _CONDA_SET_ save slot
  crit: component
  conf: 0.95
  for: [shell, batch, powershell]
  if:
    type: text
    substr: _CONDA_SET_
- id: conda-env-cmake-args
  desc: Conda CMAKE_ARGS variable
  crit: component
  conf: 0.95
  for: [shell, batch]
  if:
    type: text
    substr: CMAKE_ARGS
- id: conda-recipe-build-path
  desc: Conda recipe build script path
  crit: component
  conf: 0.95
  for: [shell, batch]
  if:
    type: path
    regex: 'info[\\/]recipe[\\/]build\.(sh|bat)$'
    case_insensitive: true
- id: conda-recipe-tree-build-path
  # conda-build recipe repositories (conda-forge feedstocks, bioconda-recipes)
  # keep one directory per package under `recipes/`, each with a build.sh/bat.
  # This is the source-tree layout; `conda-recipe-build-path` above is the
  # copy conda-build embeds in a built package under info/recipe/.
  desc: Conda recipe tree build script path
  crit: component
  conf: 0.95
  for: [shell, batch]
  if:
    type: path
    regex: 'recipes/.+/build\.(sh|bat)$'
    case_insensitive: true
- id: conda-recipe-tree-setup-py-path
  desc: Conda recipe tree setup.py path
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: path
    regex: 'recipes/.+/setup\.py$'
    case_insensitive: true
- id: conda-recipe-helper-script-path
  desc: Conda recipe helper script path
  crit: component
  conf: 0.95
  for: [shell, powershell]
  if:
    type: path
    regex: 'info[\\/]recipe[\\/].+\.(sh|ps1)$'
    case_insensitive: true
- id: conda-env-platform-vars--target-platform
  desc: Conda build platform variables (target_platform)
  crit: component
  conf: 0.95
  for: [shell, batch]
  if:
    type: text
    word: target_platform
- id: conda-env-platform-vars--cpu-count
  desc: Conda build platform variables (CPU_COUNT)
  crit: component
  conf: 0.95
  for: [shell, batch]
  if:
    type: text
    word: CPU_COUNT
- id: conda-env-platform-vars--py-ver
  desc: Conda build platform variables (PY_VER)
  crit: component
  conf: 0.95
  for: [shell, batch]
  if:
    type: text
    word: PY_VER
- id: conda-env-platform-vars--sp-dir
  desc: Conda build platform variables (SP_DIR)
  crit: component
  conf: 0.95
  for: [shell, batch]
  if:
    type: text
    word: SP_DIR
composite_rules:
- id: conda-env-platform-vars
  desc: Conda build platform variables
  crit: component
  conf: 0.95
  for: [shell, batch]
  any:
  - id: conda-env-platform-vars--target-platform
  - id: conda-env-platform-vars--cpu-count
  - id: conda-env-platform-vars--py-ver
  - id: conda-env-platform-vars--sp-dir
- id: conda-recipe-build-script
  desc: Conda recipe build script context
  crit: baseline
  conf: 0.95
  all:
  - id: conda-env-prefix-vars
  any:
  - id: conda-recipe-build-path
  - id: conda-recipe-tree-build-path
  - id: conda-env-platform-vars
  - id: conda-env-cmake-args
- id: conda-activation-env-vars
  desc: Conda activation script env variables
  crit: component
  conf: 0.95
  for: [shell, batch, powershell]
  any:
  - id: conda-activation-prefix-var
  - id: conda-activation-backup-var
  - id: conda-activation-set-var
- id: conda-recipe-prefix-install-script
  desc: Conda recipe prefix install script context
  crit: baseline
  conf: 0.95
  for: [shell, powershell]
  all:
  - id: conda-recipe-helper-script-path
  - id: conda-env-prefix-vars
