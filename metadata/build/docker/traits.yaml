defaults:
  platforms: [windows, unix]
  for: [manifests, data]
traits:
  - id: dockerfile
    desc: Dockerfile
    crit: notable
    conf: 0.8
    for: [dockerfile, shell]
    if:
      type: text
      substr: Dockerfile
  - id: dockerfile-basename
    desc: Dockerfile by name
    crit: component
    conf: 0.98
    # dockerfile: first-class filetype now; shell kept for unrecognized dialects
    for: [shell, dockerfile]
    if:
      type: path
      regex: '(^|[/\\])(Dockerfile|Containerfile)(\.[\w-]+)?$'
  - id: docker-env-prefix
    desc: DOCKER_ environment prefix
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: DOCKER_
  - id: docker-entrypoint
    desc: /docker-entrypoint path
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: /docker-entrypoint
  - id: cloud-hypervisor-integration-workloads
    desc: Cloud Hypervisor integration workload marker
    crit: baseline
    conf: 0.9
    for: [shell]
    if:
      type: text
      substr: CTR_CLH_INTEGRATION_WORKLOADS
composite_rules:
  - id: docker
    desc: Built in Docker container
    crit: notable
    conf: 0.8
    any:
      - id: dockerfile
      - id: docker-env-prefix
      - id: micro-behaviors/os/container/runtime::dockerenv
      - id: docker-entrypoint
