defaults:
  platforms: [windows, unix]
  for: [manifests, data]
traits:
  - id: dockerfile
    desc: Dockerfile
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Dockerfile
  - id: docker-env-prefix
    desc: DOCKER_ environment prefix
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: DOCKER_
  - id: docker-entrypoint
    desc: /docker-entrypoint path
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: /docker-entrypoint
composite_rules:
  - id: docker
    desc: Built in Docker container
    crit: notable
    conf: 0.8
    any:
      - id: dockerfile
      - id: docker-env-prefix
      - id: micro-behaviors/os/container/runtime::dockerenv
      - id: docker-entrypoint
