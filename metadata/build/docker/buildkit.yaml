# BuildKit-generated image/config markers, used as FP-suppression context by
# other rules (a BuildKit dockerfile-frontend provenance comment).
defaults:
  platforms: [windows, unix]
  for: [json]
  size_min: 1
  size_max: 500000000
  crit: baseline
traits:
  - id: buildkit-dockerfile-frontend
    desc: BuildKit dockerfile.v0 frontend provenance comment
    if:
      type: text
      substr: '"comment":"buildkit.dockerfile.v0"'
