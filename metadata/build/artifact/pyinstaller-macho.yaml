# PyInstaller-built Mach-O signature.  When PyInstaller bundles a
# Python script into a self-contained Mach-O on macOS, it adhoc-signs
# the output with a bundle identifier of the form
# `<basename>-<40-to-48-hex-char-suffix>`. The hex suffix is the
# SHA-1 of the bootloader concatenated with build inputs — unique per
# build, baked in at adhoc-sign time.
#
# This pattern is the cleanest way to identify PyInstaller-frozen
# Mach-Os when other strings/sections have been stripped: the bundle
# identifier itself is the fingerprint.
defaults:
  platforms: [macos]
  for: [macho]
  conf: 0.95
traits:
  - id: pyinstaller-adhoc-bundle-id
    desc: "Mach-O PyInstaller adhoc bundle ID"
    crit: notable
    if:
      type: value
      path: macho.code_signature.identifier
      regex: "-[0-9a-f]{40,48}$"
    unless:
      # Apple-signed system binaries — `com.apple.` identifier prefix.
      - id: metadata/signed/trust-level::platform
      # Developer-ID-signed binaries carry a `team_id` field in the
      # code-signature CodeDirectory. PyInstaller's adhoc output
      # doesn't.
      - type: value
        path: macho.code_signature.team_id
        exists: true
