# PyInstaller-built Mach-O signature. PyInstaller ad-hoc signs its macOS
# bootloader with an identifier ending in a build hash. That identifier shape
# is not unique to PyInstaller, so it must be paired with a bootloader marker.
defaults:
  platforms: [macos]
  for: [macho]
traits:
  - id: adhoc-build-hash-identifier
    desc: Ad-hoc identifier with hex build hash
    crit: component
    conf: 0.8
    if:
      type: value
      path: macho.code_signature.identifier
      regex: "-[0-9a-f]{40,48}$"
    unless:
      - id: metadata/signed/trust-level::platform
      - type: value
        path: macho.code_signature.team_id
        exists: true
  - id: pyinstaller-pkg-archive-error
    desc: PyInstaller PKG archive load error
    crit: component
    conf: 0.99
    if:
      type: text
      exact: Could not load PyInstaller's embedded PKG archive from the executable (%s)
      section: __cstring
composite_rules:
  - id: pyinstaller-adhoc-bundle-id
    desc: PyInstaller ad-hoc Mach-O bootloader
    crit: notable
    conf: 0.99
    all:
      - id: metadata/build/artifact::adhoc-build-hash-identifier
      - id: metadata/build/artifact::pyinstaller-pkg-archive-error
