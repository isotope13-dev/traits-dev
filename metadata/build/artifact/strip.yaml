defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: aggressive-strip
    desc: Strips toolchain banner but retains build-id
    crit: notable
    conf: 1.0
    if:
      type: value
      path: elf.stripped_metadata_sections
      exact: ".comment"
    unless:
      - id: metadata/package/quality/false-positives::frida-carved-runtime-artifact
    downgrade:
      any:
        - id: metadata/build/debug::external-debug-reference
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiled/
