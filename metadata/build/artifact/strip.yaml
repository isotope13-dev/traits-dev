defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: aggressive-strip
    desc: Toolchain banner stripped, build-id retained
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: elf.stripped_metadata_sections
      exact: ".comment"
    downgrade:
      any:
        - id: metadata/build/debug::external-debug-reference
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiled::go-runtime-marker
