defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: stripped-toolchain-comment
    desc: ELF omits compiler metadata (.comment)
    crit: notable
    conf: 1.0
    if:
      type: value
      path: elf.stripped_metadata_sections
      exact: ".comment"
    unless:
      - id: well-known/tool/reverse-engineering/frida::frida-carved-runtime-artifact
    downgrade:
      any:
        - id: metadata/build/debug::external-debug-reference
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiled/
