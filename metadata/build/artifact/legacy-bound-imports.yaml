# PE Bound Import Directory pre-resolves DLL imports against the
# linker host's specific DLL file timestamps.  Bound imports against
# legacy CRTs (`msvcrt.dll`, `crtdll.dll`) and pre-Win2K runtime DLLs
# indicate the binary was linked against a very old Windows SDK or
# embedded Windows / IoT toolchain — uncommon for modern releases
# and a useful build-pipeline fingerprint.
defaults:
  platforms: [windows]
  for: [pe]
  conf: 0.9
  size_min: 1024
  size_max: 524288000
traits:
  - id: pe-bound-imports-present
    desc: PE carries bound import descriptors
    crit: notable
    if:
      type: value
      path: pe.bound_imports
      exists: true
  - id: pe-bound-import-legacy-crt
    desc: PE bound against legacy CRT
    crit: notable
    if:
      type: value
      path: pe.bound_imports
      regex: "(msvcrt|crtdll|msvcr70)\\.dll"
