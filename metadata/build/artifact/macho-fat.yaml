# Universal (fat) Mach-O composition signals. Metaparse walks every
# slice in a fat binary and surfaces a per-slice summary at
# `macho.architectures[]` (`cpu_type`, `cpu_subtype`, `file_type`,
# `libraries`).
#
# Supply-chain swap detection: vendors building universal binaries
# rebuild *all* slices simultaneously from the same source, so it's
# normal for slices to share a build_version timestamp and be signed
# uniformly. A fat binary where one slice carries a signature and
# another doesn't is a strong tampering signal.
defaults:
  platforms: [macos]
  for: [macho]
  conf: 1.0
traits:
  - id: macho-universal-binary
    desc: Universal (fat) Mach-O with multiple slices
    crit: baseline
    if:
      type: metrics
      field: macho.slice_count
      min: 2
  - id: macho-arm64e
    desc: Carries arm64e (Apple Silicon PAC) slice
    crit: baseline
    if:
      type: value
      path: macho.slices[*].cpu_type
      exact: arm64e
