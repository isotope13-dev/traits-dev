defaults:
  platforms: [unix, windows]
  for: [dockerfile]
  conf: 0.9

traits:
  - id: dockerfile-client-server-artifact-output
    desc: Dockerfile copies client/server artifacts
    crit: notable
    if:
      type: text
      regex: '/dist/(client|server)[\s\S]{0,400}/dist/(server|client)'
      case_insensitive: true
