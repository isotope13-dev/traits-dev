defaults:
  platforms: [unix, windows]
  for: [groovy]

traits:
  - id: gradle-proguard-task
    desc: Gradle ProGuard task
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'type:\s*ProGuardTask|ProGuardTask\s*\)'

  - id: gradle-obfuscated-jar-output
    desc: Gradle obfuscated jar output
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "-obfuscated.jar"

  - id: gradle-shadow-plugin
    desc: Gradle Shadow plugin
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "com\\.github\\.johnrengelman\\.shadow|shadowJar\\s*\\{"

  - id: gradle-shadow-relocate
    desc: Gradle Shadow relocation
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\brelocate\s+["''][A-Za-z0-9_.-]+["'']\s*,\s*["''][A-Za-z0-9_.-]+["'']'
