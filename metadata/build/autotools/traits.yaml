defaults:
  platforms: [unix]
  for: [shell]

traits:
- id: autoconf-generated-script
  desc: Autoconf-generated configure script
  crit: component
  conf: 0.95
  if:
    type: text
    substr: generated automatically using autoconf
- id: autotools-config-basename
  desc: "Autotools config.guess/sub path"
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '(^|[\\/])(configure|config\.(guess|sub))$'
- id: libtool-script-basename
  desc: Libtool helper script basename
  crit: component
  conf: 0.98
  if:
    type: basename
    regex: '^(ltconfig|ltmain\.sh)$'
- id: automake-helper-basename
  desc: Automake helper script basename
  crit: component
  conf: 0.98
  if:
    type: basename
    regex: '^(missing|install-sh|mkinstalldirs)$'
- id: xorg-macros-m4
  desc: X.Org autotools macro file
  crit: component
  conf: 0.95
  if:
    type: basename
    exact: xorg-macros.m4
- id: ax-boost-base-macro
  desc: Autoconf Archive AX_BOOST_BASE macro
  crit: baseline
  conf: 0.99
  for: [c, shell]
  if:
    type: text
    word: AX_BOOST_BASE
- id: autoconf-m4-ac-defun
  desc: Autoconf AC_DEFUN macro definition
  crit: baseline
  conf: 0.98
  for: [c, shell]
  if:
    type: text
    substr: AC_DEFUN
- id: autoconf-m4-define
  desc: M4 macro definition
  crit: baseline
  conf: 0.98
  for: [c, shell]
  if:
    type: text
    substr: m4_define
- id: libtool-generated-script--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: GNU Libtool
  count_max: 1000525
- id: libtool-generated-script--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: libtool (GNU libtool)
  count_max: 1000526
- id: libtool-generated-script--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Configure libtool for the host system
  count_max: 1000527
- id: libtool-generated-script--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: generated from ./build-aux/ltmain.in
  count_max: 1000528
composite_rules:
- id: autoconf-m4-macro-definition
  desc: Autoconf M4 macro definition
  crit: baseline
  conf: 0.98
  for: [c, shell]
  any:
  - id: autoconf-m4-ac-defun
  - id: autoconf-m4-define
- id: libtool-generated-script
  desc: GNU Libtool generated or source script
  crit: component
  conf: 0.95
  any:
  - id: libtool-generated-script--rx-1
  - id: libtool-generated-script--rx-2
  - id: libtool-generated-script--rx-3
  - id: libtool-generated-script--rx-4
  - id: libtool-script-basename
  - id: automake-helper-basename
