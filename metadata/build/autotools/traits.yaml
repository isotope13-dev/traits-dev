defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: configure-ac
    desc: configure.ac file
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: configure.ac
      section: .text
  - id: makefile-am
    desc: Makefile.am file
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Makefile.am
      section: .text
  - id: config-h-in
    desc: config.h.in file
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: config.h.in
      section: .text
  - id: package-version
    desc: PACKAGE_VERSION variable
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: PACKAGE_VERSION
  - id: ac-init
    desc: AC_INIT macro
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: AC_INIT
  - id: ac-defun-autoconf-macro
    desc: Autoconf AC_DEFUN macro fragment
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: AC_DEFUN([
  - id: automake-helper-basename
    desc: Automake helper script basename
    crit: component
    conf: 0.95
    for: [shell]
    if:
      type: path
      basename: true
      regex: '^(compile|missing|depcomp|ar-lib|test-driver)$'
