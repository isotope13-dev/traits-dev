defaults:
  platforms: [unix]
  for: [shell]

traits:
- id: autoconf-generated-script
  desc: GNU Autoconf generated script
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'Generated by GNU Autoconf|## M4sh Initialization\. ##|ac_config_headers|exec_prefix='
- id: autotools-config-basename
  desc: "Autotools config.guess/sub path"
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '(^|[\\/])(configure|config\.(guess|sub))$'
- id: libtool-generated-script--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: GNU Libtool
  count_max: 1000525
- id: libtool-generated-script--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: libtool (GNU libtool)
  count_max: 1000526
- id: libtool-generated-script--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Configure libtool for the host system
  count_max: 1000527
- id: libtool-generated-script--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: generated from ./build-aux/ltmain.in
  count_max: 1000528
composite_rules:
- id: libtool-generated-script
  desc: GNU Libtool generated or source script
  crit: component
  conf: 0.95
  any:
  - id: libtool-generated-script--rx-1
  - id: libtool-generated-script--rx-2
  - id: libtool-generated-script--rx-3
  - id: libtool-generated-script--rx-4
