defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [source, binaries]
traits:
  - id: configure-ac
    desc: configure.ac file
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: configure.ac
      section: .text
  - id: makefile-am
    desc: Makefile.am file
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: Makefile.am
      section: .text
  - id: config-h-in
    desc: config.h.in file
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: config.h.in
      section: .text
  - id: package-version
    desc: PACKAGE_VERSION variable
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: PACKAGE_VERSION
  - id: ac-init
    desc: AC_INIT macro
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: AC_INIT
composite_rules:
  - id: autotools
    desc: Built with Autotools (autoconf/automake)
    crit: notable
    conf: 0.8
    any:
      - id: configure-ac
      - id: makefile-am
      - id: config-h-in
      - id: package-version
      - id: ac-init
