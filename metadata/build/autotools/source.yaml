defaults:
  platforms: [unix]
  for: [shell]
  crit: component

traits:
  - id: m4-esyscmd-token
    desc: Autoconf m4_esyscmd token
    conf: 0.9
    if:
      type: text
      substr: m4_esyscmd
  - id: version-mk-reference
    desc: VERSION.mk file reference
    conf: 0.9
    if:
      type: text
      substr: VERSION.mk

composite_rules:
  - id: version-file-m4-esyscmd
    desc: Autoconf version file expansion
    conf: 0.95
    all:
      - id: m4-esyscmd-token
      - id: version-mk-reference
