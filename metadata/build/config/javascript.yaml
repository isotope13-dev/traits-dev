defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.9

traits:
  - id: js-build-config-target--rx-1
    desc: References PostCSS or Tailwind config filename
    if:
      type: text
      regex: (postcss|tailwind)\.config\.(js|mjs|ts)
  - id: js-build-config-target--rx-2
    desc: References ESLint or Next config filename
    if:
      type: text
      regex: (eslint|next)\.config\.(js|mjs|ts)
  - id: js-build-config-target--rx-3
    desc: References Vite or Webpack config filename
    if:
      type: text
      regex: (vite|webpack)\.config\.(js|mjs|ts)
  - id: js-build-config-target--rx-4
    desc: References Astro or Vue config filename
    if:
      type: text
      regex: (astro|vue)\.config\.(js|mjs|ts)
  - id: js-build-config-target--rx-5
    desc: References Vitest or Playwright config filename
    if:
      type: text
      regex: (vitest|playwright)\.config\.(js|mjs|ts)
  - id: js-build-config-target--rx-6
    desc: References Cypress or Docusaurus config filename
    if:
      type: text
      regex: (cypress|docusaurus)\.config\.(js|mjs|ts)
  - id: js-build-config-target--rx-7
    desc: References Remix or Svelte config filename
    if:
      type: text
      regex: (remix|svelte)\.config\.(js|mjs|ts)
  - id: js-build-config-target--rx-8
    desc: References Truffle config filename
    if:
      type: text
      substr: truffle.js
  - id: js-build-config-basename
    desc: Common JavaScript build config basename
    if:
      type: path
      basename: true
      regex: '^(postcss|tailwind)\.config\.(js|mjs|ts)$'
  - id: js-build-config-direct-basename
    desc: Common JavaScript build config basename
    if:
      type: basename
      regex: '^(vite|webpack|postcss|tailwind)\.config\.(js|mjs|ts)$'
  - id: js-build-config-path
    desc: Common JavaScript build config path
    if:
      type: path
      regex: '(^|/)(postcss|tailwind)\.config\.(js|mjs|ts)$'
  - id: js-config-export-default
    desc: JavaScript config exports default object
    if:
      type: text
      regex: 'export\s+default\s*\{'
  - id: js-config-plugins-object
    desc: JavaScript config declares plugins object
    if:
      type: text
      regex: 'plugins\s*:\s*\{'
  - id: postcss-tailwind-plugin-name
    desc: PostCSS or Tailwind plugin config name
    if:
      type: text
      regex: '\b(tailwindcss|autoprefixer)\s*:'

composite_rules:
  - id: js-build-config-target
    desc: JavaScript build config identity
    crit: baseline
    conf: 0.92
    any:
      - id: js-build-config-target--rx-1
      - id: js-build-config-target--rx-2
      - id: js-build-config-target--rx-3
      - id: js-build-config-target--rx-4
      - id: js-build-config-target--rx-5
      - id: js-build-config-target--rx-6
      - id: js-build-config-target--rx-7
      - id: js-build-config-target--rx-8
      - id: js-build-config-basename
      - id: js-build-config-direct-basename
      - id: js-build-config-path
      - id: postcss-config-shape

  - id: postcss-config-shape
    desc: PostCSS or Tailwind config shape
    crit: baseline
    conf: 0.9
    all:
      - id: js-config-export-default
      - id: js-config-plugins-object
      - id: postcss-tailwind-plugin-name
