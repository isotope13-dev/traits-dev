id: jenkins-pdb-path
description: Detects a PDB path that includes "Jenkins" and "WorkSpace", indicating the build was likely performed in a Jenkins CI environment.
author: g-ניר
severity: 5
patterns:
  - id: has-jenkins-pdb
    description: Looks for PDB paths containing Jenkins CI artifacts.
    for: file.pe
    rules:
      - 'regex: (?i)Jenkins.WorkSpace'
condition: has-jenkins-pdb
