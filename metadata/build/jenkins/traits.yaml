defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [source, binaries]
traits:
  - id: jenkins-url
    desc: JENKINS_URL variable
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: JENKINS_URL
      section: .text
  - id: build-number
    desc: BUILD_NUMBER variable
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: BUILD_NUMBER
      section: .text
  - id: job-name
    desc: JOB_NAME variable
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: JOB_NAME
      section: .text
  - id: jenkinsfile
    desc: Jenkinsfile
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: Jenkinsfile
      section: .text
composite_rules:
  - id: jenkins
    desc: Jenkins CI artifacts
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: jenkins-url
      - id: build-number
      - id: job-name
      - id: jenkinsfile
