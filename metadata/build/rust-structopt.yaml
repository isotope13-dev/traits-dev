defaults:
  platforms: [windows, unix]
  for: [rust]
  crit: notable
  conf: 0.8
traits:
  - id: structopt-crate
    desc: uses structopt crate
    if:
      type: text
      substr: "structopt"
  - id: structopt-derive
    desc: derives StructOpt
    if:
      type: text
      substr: "#[derive(StructOpt)]"
composite_rules:
  - id: rust-structopt-cli
    desc: Rust CLI tool using StructOpt
    any:
      - id: structopt-crate
      - id: structopt-derive
