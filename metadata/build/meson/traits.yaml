defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: meson-build
    desc: meson.build file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: meson.build
      section: .text
  - id: meson-options
    desc: meson_options file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: meson_options
      section: .text
  - id: meson-private
    desc: meson-private directory
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: meson-private
      section: .text
