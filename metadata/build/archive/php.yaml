defaults:
  platforms: [windows, unix]
  for: [zip, tar]
  crit: notable
  conf: 0.9

traits:
  - id: php-runtime-binary
    desc: Archive contains PHP runtime binary
    if:
      type: value
      path: archive.members[*].path
      regex: '(?i)(^|/)php[0-9a-z_]*\.(exe|dll)$'
  - id: php-ini-member
    desc: Archive contains php.ini configuration
    if:
      type: value
      path: archive.members[*].path
      regex: '(?i)(^|/)php\.ini(-[a-z]+)?$'

composite_rules:
  - id: php-distribution-member
    desc: Archive contains PHP distribution member
    crit: notable
    any:
      - id: php-runtime-binary
      - id: php-ini-member
