defaults:
  platforms: [unix, windows]
  for: [zip]

traits:
  - id: archive-pgp-config-entry
    desc: Archive carries PGP config member
    crit: notable
    conf: 0.9
    ref: sha256:2b9abb9bb2abc5158ee389aff85055f397ce874a57b5ac9d807fa6c527a949bd
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)config[^/]*\.json\.gpg$'

  - id: archive-multiple-pgp-config-entries
    desc: Archive carries multiple PGP configs
    crit: notable
    conf: 0.92
    ref: sha256:2b9abb9bb2abc5158ee389aff85055f397ce874a57b5ac9d807fa6c527a949bd
    count_min: 2
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)config[^/]*\.json\.gpg$'
