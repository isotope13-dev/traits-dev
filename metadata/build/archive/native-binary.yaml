# Generic archive-member shape facts: an archive (any format that reaches the
# `tar` member-listing group — tar, crate, 7z, …) carrying compiled native
# binaries or staging directories. These are format-agnostic layout facts, NOT
# Cargo-specific — they fire on any archive whose member listing is available,
# including password-protected 7z archives whose plaintext header still exposes
# the file names. They are building blocks for supply-chain and DLL-sideloading
# composites; descriptions intentionally state only what the member path matched.
defaults:
  platforms: [unix, windows]
  for: [tar]

traits:
  - id: archive-windows-native-binary-entry
    desc: Windows PE binary archive member
    crit: component
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)[^/]+\.(exe|dll)$'

  - id: archive-elf-shared-library-entry
    desc: ELF shared library archive member
    crit: component
    conf: 0.84
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]+\.so(\.[0-9]+){0,3}$'

  - id: archive-macho-dylib-entry
    desc: Mach-O dylib archive member
    crit: component
    conf: 0.84
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]+\.dylib$'

  - id: archive-native-bin-dir-entry
    desc: Member under bin/native/prebuilds dir
    crit: component
    conf: 0.84
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)(bin|native|prebuilds)/'

  - id: archive-native-vendor-dir-entry
    desc: Member under vendor/payload/release dir
    crit: component
    conf: 0.8
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)(vendor|payloads?|release)/'

composite_rules:
  - id: archive-native-binary-entry
    desc: Archive bundles a native binary
    crit: component
    conf: 0.86
    any:
      - id: archive-windows-native-binary-entry
      - id: archive-elf-shared-library-entry
      - id: archive-macho-dylib-entry

  - id: archive-platform-native-binary-entry
    desc: Native binary in staging directory
    crit: component
    conf: 0.88
    all:
      - id: archive-native-binary-entry
    any:
      - id: archive-native-bin-dir-entry
      - id: archive-native-vendor-dir-entry
