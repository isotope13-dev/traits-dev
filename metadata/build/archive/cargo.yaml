defaults:
  platforms: [unix, windows]
  for: [tar]

traits:
  - id: archive-cargo-toml-entry
    desc: Archive contains Cargo.toml
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)Cargo\.toml$'

  - id: archive-cargo-build-rs-entry
    desc: Archive contains Cargo build script
    crit: component
    conf: 0.92
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)build\.rs$'

  - id: archive-windows-native-binary-entry
    desc: Cargo archive contains Windows native binary
    crit: component
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)[^/]+\.(exe|dll)$'

  - id: archive-elf-shared-library-entry
    desc: Cargo archive contains ELF shared library
    crit: component
    conf: 0.84
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]+\.so(\.[0-9]+){0,3}$'

  - id: archive-macho-dylib-entry
    desc: Cargo archive contains Mach-O dylib
    crit: component
    conf: 0.84
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]+\.dylib$'

  - id: archive-native-bin-dir-entry
    desc: Cargo archive native binary path
    crit: component
    conf: 0.84
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)(bin|native|prebuilds)/'

  - id: archive-native-vendor-dir-entry
    desc: Cargo archive vendored native path
    crit: component
    conf: 0.8
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(?i)(^|/)(vendor|payloads?|release)/'

composite_rules:
  - id: archive-cargo-crate-build-script
    desc: Cargo archive contains build script
    crit: component
    conf: 0.92
    all:
      - id: archive-cargo-toml-entry
      - id: archive-cargo-build-rs-entry

  - id: archive-native-binary-entry
    desc: Cargo archive contains native binary member
    crit: component
    conf: 0.86
    any:
      - id: archive-windows-native-binary-entry
      - id: archive-elf-shared-library-entry
      - id: archive-macho-dylib-entry

  - id: archive-platform-native-binary-entry
    desc: Cargo archive contains platform native binary member
    crit: component
    conf: 0.88
    all:
      - id: archive-native-binary-entry
    any:
      - id: archive-native-bin-dir-entry
      - id: archive-native-vendor-dir-entry
