defaults:
  platforms: [unix, windows]
  for: [tar, crate]

traits:
  - id: archive-cargo-toml-entry
    desc: Archive contains Cargo.toml
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)Cargo\.toml$'

  - id: archive-cargo-build-rs-entry
    desc: Archive contains Cargo build script
    crit: component
    conf: 0.92
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)build\.rs$'

composite_rules:
  - id: archive-cargo-crate-build-script
    desc: Cargo crate archive build script
    crit: component
    conf: 0.92
    all:
      - id: archive-cargo-toml-entry
      - id: archive-cargo-build-rs-entry
