# ARM64 Architecture Detection
# Informational traits for binary architecture identification
defaults:
  platforms: [linux, unix, android, macos, ios]
  crit: baseline
  conf: 1.0
traits:
  - id: arm64-elf
    desc: "ARM64/AArch64 ELF binary"
    for: [elf]
    arch: [aarch64]
    if:
      type: metrics
      field: binary.file_size
      min: 1
  - id: arm64-macho
    desc: "ARM64/ARM64e Mach-O binary"
    for: [macho]
    arch: [aarch64]
    if:
      type: metrics
      field: binary.file_size
      min: 1
