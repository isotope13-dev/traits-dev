# ARM64 Architecture Detection
# Informational traits for binary architecture identification
defaults:
  crit: baseline
  conf: 1.0
traits:
  - id: arm64-elf
    desc: "ARM64/AArch64 ELF binary"
    for: [elf]
    if:
      type: structure
      feature: "binary/arch/aarch64"
  - id: arm64-macho
    desc: "ARM64 Mach-O binary"
    for: [macho]
    if:
      type: structure
      feature: "binary/arch/arm64"
  - id: arm64e-macho
    desc: "ARM64e Mach-O binary"
    for: [macho]
    if:
      type: structure
      feature: "binary/arch/arm64e"
