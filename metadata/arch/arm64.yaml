# ARM64 Architecture Detection
# Informational traits for binary architecture identification
defaults:
  platforms: [linux, unix, android, macos, ios]
  crit: baseline
  conf: 1.0
traits:
  - id: arm64-binary
    desc: "ARM64/AArch64 binary"
    for: [macho, elf]
    arch: [aarch64]
    if:
      type: structure
      feature: "binary/arch/aarch64"
