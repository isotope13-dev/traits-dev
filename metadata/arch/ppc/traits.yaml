# PowerPC Architecture Detection
# Informational traits for binary architecture identification
defaults:
  platforms: [macos]
  crit: baseline
  conf: 1.0
traits:
  - id: ppc-macho
    desc: Legacy PowerPC Mach-O binary
    for: [macho]
    # cputype 0x12 = 18 (legacy PowerPC — goblin only names the three
    # modern Mach-O cputypes, so this surfaces as "unknown")
    if:
      type: metrics
      field: macho.cpu_type
      min: 18
      max: 18
