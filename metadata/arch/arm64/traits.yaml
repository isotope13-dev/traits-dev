# ARM64 Architecture Detection
# Informational traits for binary architecture identification
defaults:
  platforms: [unix, android, ios]
  crit: baseline
  conf: 1.0
traits:
  - id: arm64-elf
    desc: ARM64/AArch64 ELF binary
    for: [elf]
    if:
      type: metrics
      field: elf.e_machine
      min: 183
      max: 183
  - id: arm64-macho
    desc: ARM64 Mach-O binary
    for: [macho]
    if:
      type: metrics
      field: macho.cpu_type
      min: 16777228
      max: 16777228
composite_rules:
  - id: arm64-binary
    desc: ARM64/AArch64 binary
    crit: baseline
    conf: 1.0
    any:
      - id: arm64-elf
      - id: arm64-macho
