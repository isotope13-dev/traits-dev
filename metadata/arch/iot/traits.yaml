# IoT / Embedded Architecture Detection
# ELF binaries targeting legacy embedded architectures are disproportionately
# represented in IoT malware (Mirai, Gafgyt, Hajime variants).
#
# cleave exposes the normalized architecture name as elf.machine.
defaults:
  for: [elf]
  platforms: [unix]
traits:
  - id: arm
    desc: ARM architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: value
      path: elf.machine
      exact: arm
  - id: m68k
    desc: Motorola 68000 architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: value
      path: elf.machine
      exact: m68k
  - id: superh
    desc: SuperH architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: value
      path: elf.machine
      exact: superh
  - id: sparc
    desc: SPARC architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: value
      path: elf.machine
      exact: sparc
  - id: mips-value
    desc: MIPS architecture (IoT/embedded)
    crit: baseline
    conf: 0.9
    if:
      type: value
      path: elf.machine
      exact: mips
  - id: mips-raw-header
    desc: MIPS machine field in ELF header
    crit: baseline
    conf: 1.0
    if:
      type: hex
      offset: 18
      pattern: "00 08"
  - id: powerpc
    desc: PowerPC architecture
    crit: baseline
    conf: 0.9
    if:
      type: value
      path: elf.machine
      exact: ppc
composite_rules:
  - id: mips
    desc: MIPS architecture (IoT/embedded)
    crit: baseline
    conf: 0.95
    any:
      - id: mips-value
      - id: mips-raw-header
  - id: exotic-arch
    desc: Unusual embedded architecture target
    crit: notable
    conf: 0.85
    any:
      - id: m68k
      - id: superh
      - id: sparc
