# IoT / Embedded Architecture Detection
# ELF binaries targeting legacy embedded architectures are almost
# exclusively IoT malware (Mirai, Gafgyt, Hajime variants)
defaults:
  for: [elf]
  platforms: [linux, unix]
traits:
  - id: m68k
    desc: Motorola 68000 architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: structure
      feature: "binary/arch/m68k"
  - id: superh
    desc: SuperH architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: structure
      feature: "binary/arch/superh"
  - id: sparc
    desc: SPARC architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: structure
      feature: "binary/arch/sparc"
  - id: mips
    desc: MIPS architecture (IoT/embedded)
    crit: baseline
    conf: 0.9
    if:
      type: structure
      feature: "binary/arch/mips"
  - id: powerpc
    desc: PowerPC architecture
    crit: baseline
    conf: 0.9
    if:
      type: structure
      feature: "binary/arch/powerpc"
  - id: s390
    desc: IBM System/390 architecture
    crit: notable
    conf: 0.9
    if:
      type: structure
      feature: "binary/arch/s390"
composite_rules:
  - id: exotic-arch
    desc: Unusual embedded architecture target
    crit: notable
    conf: 0.85
    any:
      - id: m68k
      - id: superh
      - id: sparc
      - id: s390
