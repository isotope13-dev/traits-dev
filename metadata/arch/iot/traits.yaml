# IoT / Embedded Architecture Detection
# ELF binaries targeting legacy embedded architectures are almost
# exclusively IoT malware (Mirai, Gafgyt, Hajime variants)
defaults:
  for: [elf]
  platforms: [linux, unix]
  crit: notable
  conf: 0.9
traits:
  - id: exotic-arch
    desc: Exotic IoT CPU architecture
    if:
      type: structure
      feature: "binary/arch"
    unless:
      - type: structure
        feature: "binary/arch/x86_64"
      - type: structure
        feature: "binary/arch/x86"
      - type: structure
        feature: "binary/arch/aarch64"
      - type: structure
        feature: "binary/arch/arm"
