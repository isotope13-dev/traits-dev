# IoT / Embedded Architecture Detection
# ELF binaries targeting legacy embedded architectures are disproportionately
# represented in IoT malware (Mirai, Gafgyt, Hajime variants).
#
# e_machine constants per the ELF spec; cleave reports them as elf.e_machine.
defaults:
  for: [elf]
  platforms: [unix]
traits:
  - id: m68k
    desc: Motorola 68000 architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.e_machine
      min: 4
      max: 4
  - id: superh
    desc: SuperH architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.e_machine
      min: 42
      max: 42
  - id: sparc
    desc: SPARC architecture (IoT/embedded)
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.e_machine
      min: 2
      max: 2
  - id: mips
    desc: MIPS architecture (IoT/embedded)
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: elf.e_machine
      min: 8
      max: 8
  - id: powerpc
    desc: PowerPC architecture
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: elf.e_machine
      min: 20
      max: 20
composite_rules:
  - id: exotic-arch
    desc: Unusual embedded architecture target
    crit: notable
    conf: 0.85
    any:
      - id: m68k
      - id: superh
      - id: sparc
