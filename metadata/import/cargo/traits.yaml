defaults:
  platforms: [windows, unix]
  for: [cargo.toml]
  crit: baseline
  conf: 0.9

traits:
  - id: dep-reqwest
    desc: Depends on reqwest crate
    if:
      type: kv
      path: dependencies.reqwest
      regex: '.+'

  - id: dep-rdkafka
    desc: Depends on rdkafka crate
    if:
      type: kv
      path: dependencies.rdkafka
      regex: '.+'

  - id: dep-hyper
    desc: Depends on hyper crate
    if:
      type: kv
      path: dependencies.hyper
      regex: '.+'

  - id: dep-ureq
    desc: Depends on ureq crate
    if:
      type: kv
      path: dependencies.ureq
      regex: '.+'

  - id: dep-surf
    desc: Depends on surf crate
    if:
      type: kv
      path: dependencies.surf
      regex: '.+'

  - id: dep-curl
    desc: Depends on curl crate
    if:
      type: kv
      path: dependencies.curl
      regex: '.+'
