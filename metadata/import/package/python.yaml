defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: python-top-level-commands-module-import
    desc: Python imports top-level commands module
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*(from\s+commands\s+import|import\s+commands)\b'
  - id: python-private-relative-import
    desc: Python imports a private relative module
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      kind: import
      regex: '^\._[A-Za-z0-9_]+'
