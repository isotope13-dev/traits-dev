defaults:
  platforms: [windows, unix]
  for:
    - package.json
  crit: baseline
  conf: 0.9

traits:
  - id: preact
    desc: Depends on Preact package
    unless:
      - id: metadata/package/testing/presence/fixture::preact-package-fixture-context
    if:
      type: value
      path: dependencies.preact
      regex: '.+'
  - id: dep-msgpack-js
    desc: Depends on MessagePack package
    if:
      type: import
      exact: "@msgpack/msgpack"
  - id: dep-msgpackr
    desc: Depends on msgpackr package
    if:
      type: import
      exact: msgpackr
  - id: dep-geoip-lite
    desc: Depends on GeoIP package
    if:
      type: import
      exact: geoip-lite
  - id: dep-leaflet
    desc: Depends on Leaflet maps
    if:
      type: import
      exact: leaflet
  - id: dep-flag-icons
    desc: Depends on country flag icons
    if:
      type: import
      exact: flag-icons
  - id: dep-web-push
    desc: Depends on web push library
    if:
      type: import
      exact: web-push
  - id: dep-jose
    desc: Depends on JOSE library
    if:
      type: import
      exact: jose
  - id: dep-ace-builds
    desc: Depends on Ace editor
    if:
      type: import
      exact: ace-builds
  - id: dep-codemirror
    desc: Depends on CodeMirror editor
    if:
      type: import
      exact: codemirror
  - id: dep-ansi-to-html
    desc: Depends on terminal renderer
    if:
      type: import
      exact: ansi-to-html
  - id: dep-adm-zip
    desc: Depends on zip archive library
    if:
      type: import
      exact: adm-zip
  - id: dep-bun-types
    desc: Depends on Bun runtime types
    if:
      type: import
      exact: "@types/bun"
  - id: dep-solana-web3
    desc: Depends on Solana Web3
    if:
      type: import
      exact: "@solana/web3.js"
  - id: dep-winston
    desc: Depends on Winston logger
    if:
      type: import
      exact: winston

composite_rules:
  - id: msgpack-runtime
    desc: MessagePack runtime dependency
    crit: notable
    conf: 0.92
    any:
      - id: dep-msgpack-js
      - id: dep-msgpackr
  - id: dual-msgpack-runtime
    desc: Dual MessagePack runtime dependencies
    crit: notable
    conf: 0.96
    all:
      - id: dep-msgpack-js
      - id: dep-msgpackr
  - id: geoip-map-stack
    desc: GeoIP map dependency stack
    crit: notable
    conf: 0.88
    all:
      - id: dep-geoip-lite
      - id: dep-leaflet
    any:
      - id: dep-flag-icons
  - id: remote-admin-ui-stack
    desc: Remote admin UI dependency stack
    crit: notable
    conf: 0.84
    needs: 2
    any:
      - id: dep-ace-builds
      - id: dep-codemirror
      - id: dep-ansi-to-html
