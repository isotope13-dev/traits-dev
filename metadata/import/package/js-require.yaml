# Node.js source require() of third-party npm packages — distinct from
# builtin/node.yaml (core modules) and npm.yaml (package.json dependency
# declarations). Neutral import markers; supply-chain composites reference them
# cross-tier to assert "this is a real library" or to spot added dependencies.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.8
traits:
  - id: require-scoped-package
    desc: Requires a scoped npm package
    if:
      type: import
      regex: '^@[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'

  - id: require-abitype
    desc: Imports the ABIType npm package
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: abitype

  - id: require-lodash
    desc: require('lodash') import
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: lodash
  - id: require-url-func-registry
    desc: Imports the url-func-registry package
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: require
      arg:
        kind: string
        exact: url-func-registry
