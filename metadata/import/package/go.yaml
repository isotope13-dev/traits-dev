# Direct Go module dependencies are package metadata. A dependency declaration
# does not prove that the package calls the library or has the objective
# associated with that library; objective composites add behavioral context.
defaults:
  platforms: [unix, windows]
  for: [go.mod]
  crit: baseline
  conf: 0.9

traits:
  - id: direct-ssh-dependency
    desc: Direct Go SSH library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/gliderlabs/ssh\s+\S+\s*$'
  - id: direct-sftp-dependency
    desc: Direct Go SFTP library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/pkg/sftp\s+\S+\s*$'
  - id: direct-memfd-dependency
    desc: Direct Go memfd library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/justincormack/go-memfd\s+\S+\s*$'
  - id: direct-quic-dependency
    desc: Direct Go QUIC library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/(quic-go|lucas-clemente)/quic-go\s+\S+\s*$'
  - id: direct-secure-delete-dependency
    desc: Direct Go secure-delete library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/[A-Za-z0-9_.-]+/(shred|securedelete|secure-delete)\s+\S+\s*$'
  - id: direct-screenshot-dependency
    desc: Direct Go screenshot library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/[A-Za-z0-9_.-]+/(screenshot|go-screenshot)\s+\S+\s*$'
  - id: direct-dns-dependency
    desc: Direct Go DNS library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/miekg/dns\s+\S+\s*$'
  - id: direct-clipboard-dependency
    desc: Direct Go clipboard library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/atotto/clipboard\s+\S+\s*$'
  - id: direct-operator-shell-dependency
    desc: Direct Go operator-shell library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/abiosoft/ishell\s+\S+\s*$'
  - id: direct-port-scanner-dependency
    desc: Direct Go port-scanner library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/[A-Za-z0-9_.-]+/(port-scanner|portscanner)\s+\S+\s*$'
  - id: direct-host-info-dependency
    desc: Direct Go host-information library dependency
    if:
      type: text
      regex: '(?im)^\s*github\.com/(matishsiao/goInfo|jaypipes/ghw|JustinTimperio/osinfo)\s+\S+\s*$'
  - id: direct-binary-reader-dependency
    desc: Direct Go binary-reader library dependency
    if:
      type: text
      regex: '(?m)^\s*github\.com/[A-Za-z0-9_.-]+/(elf_reader|pefile|macho)\s+\S+\s*$'
