# Apple framework path strings embedded in binaries (/System/Library/Frameworks
# and /System/Library/PrivateFrameworks). These are framework-usage signals,
# treated as a form of import metadata.
defaults:
  crit: baseline
  platforms:
    - macos
  for:
    - macho
    - dylib
traits:
  - id: adcore-framework
    desc: AdCore.framework usage
    conf: 0.7
    if:
      type: text
      substr: /AdCore.framework/
      section: .text
  - id: adid-framework
    desc: AdID.framework usage
    conf: 0.7
    if:
      type: text
      substr: /AdID.framework/
      section: .text
  - id: limitadtracking-framework
    desc: LimitAdTracking.framework usage
    conf: 0.7
    if:
      type: text
      substr: /LimitAdTracking.framework/
      section: .text
  - id: apptrackingtransparency-framework
    desc: AppTrackingTransparency.framework usage
    conf: 0.7
    if:
      type: text
      substr: /AppTrackingTransparency.framework/
      section: .text
  - id: privacycontentprediction-framework
    desc: PrivacyContentPrediction.framework usage
    conf: 0.7
    if:
      type: text
      substr: /PrivacyContentPrediction.framework/
      section: .text
  - id: private-framework
    desc: Apple private framework usage
    conf: 0.85
    if:
      type: text
      substr: /System/Library/PrivateFrameworks
      section: .text
  - id: system-framework
    desc: Apple system framework path
    conf: 0.85
    if:
      type: text
      substr: /System/Library/Frameworks
      section: .text
composite_rules:
  - id: ad-framework
    desc: Apple advertising framework usage
    crit: notable
    conf: 0.9
    any:
      - id: adcore-framework
      - id: adid-framework
      - id: limitadtracking-framework
  - id: privacy-framework
    desc: Apple privacy framework usage
    crit: notable
    conf: 0.9
    any:
      - id: apptrackingtransparency-framework
      - id: privacycontentprediction-framework
  - id: any-apple-framework
    desc: Any Apple framework path (system or private)
    conf: 0.85
    for: [macho]
    any:
      - id: system-framework
      - id: private-framework
