# Node.js core module imports
# Atomic detection of standard library require() calls
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: require-fs
    desc: Imports the Node.js fs module
    crit: baseline
    conf: 0.7
    if:
      # `require('fs')` — discriminate by the string arg, else this is an
      # identical bare-`require` match shared with every other require-* trait.
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: fs
  - id: require-os
    desc: Imports the Node.js os module
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: os
  # DNS is a communications module — per TAXONOMY.md "Communications and
  # code execution should always be notable or higher." Kept notable even
  # though benign packages may import it; the signal matters most in
  # supply-chain diffs where a non-network library suddenly adds DNS.
  - id: require-dns
    desc: require('dns') import
    crit: notable
    conf: 0.75
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: dns
  - id: require-http
    desc: require('http') import
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: http
  - id: require-https
    desc: require('https') import
    crit: notable
    conf: 0.78
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: https
  - id: require-child-process-benign-script-run-script-os
    desc: run-script-os basename
    crit: component
    conf: 0.8
    if:
      type: path
      basename: true
      exact: run-script-os
  - id: require-child-process-run-script-os-text
    desc: run-script-os usage banner
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "This is meant to be run from within npm script."
  - id: require-child-process
    desc: require('child_process') import
    crit: notable
    conf: 0.8
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/].+
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts|map)$
      - type: basename
        regex: (glasstron[\\/]binding|bindings-cpp[\\/]dist[\\/]load-bindings)\.js$
      - type: basename
        regex: (^|[\\/])(test[\\/].+|.+-test)\.js$
      - id: metadata/import/builtin/
      # Benign text contexts consolidated into two regexes (were six substr
      # clauses) to keep the suppress-clause count under threshold.
      - type: text
        regex: 'webpackLoadOptionalExternalModule|module\.exports = factory\(|builtin-plugins/tabby-'
      - type: text
        regex: 'run-script-os|"integrity":\{"algorithm":"SHA256"|require\$\$1\$1'
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: child_process
  # `require-child-process-inline-member` removed: the plain `require-child-process`
  # above already matches the inline `require('child_process').exec(...)` form
  # (the `require('child_process')` call fact exists regardless of the chained
  # member), so for *import* detection it was redundant. The exec semantics of
  # the inline form live in `micro-behaviors/process/create/shell/bridge::
  # child-process-inline-member-require` (which metadata/ can't reference).
composite_rules:
  - id: runtime-api-import-set
    desc: Three Node runtime API imports
    crit: notable
    conf: 0.8
    needs: 3
    any:
      - id: require-os
      - id: require-child-process
      - id: require-https
      - id: require-fs
  - id: require-child-process-benign-script
    desc: benign child process script basename
    crit: component
    conf: 0.8
    any:
      - id: metadata/file/profile/identity::common-node-lifecycle-script-basename
      - id: require-child-process-benign-script-run-script-os
  - id: require-child-process-benign-context
    desc: benign child process import context
    crit: component
    conf: 0.8
    any:
      - id: require-child-process-benign-script
      - id: require-child-process-run-script-os-text
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
  # `require-child-process-any` removed: it was an `any:` over `require-child-process`
  # and the now-deleted inline-member duplicate. `require-child-process` alone
  # covers both forms, so references point at it directly.
