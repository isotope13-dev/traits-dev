# Node.js core module imports
# Atomic detection of standard library require() calls
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: require-fs
    desc: require('fs') import
    crit: baseline
    conf: 0.7
    if:
      # `require('fs')` — discriminate by the string arg, else this is an
      # identical bare-`require` match shared with every other require-* trait.
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: fs
  # DNS is a communications module — per TAXONOMY.md "Communications and
  # code execution should always be notable or higher." Kept notable even
  # though benign packages may import it; the signal matters most in
  # supply-chain diffs where a non-network library suddenly adds DNS.
  - id: require-dns
    desc: require('dns') import
    crit: notable
    conf: 0.75
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: dns
  - id: require-http
    desc: require('http') import
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: http
  - id: require-https
    desc: require('https') import
    crit: notable
    conf: 0.78
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: https
  - id: require-child-process-benign-script-js
    desc: benign child process JS basename
    crit: component
    conf: 0.8
    if:
      type: basename
      regex: ^(install|publish|windowsPtyAgent|benchclean)\.js$
  - id: require-child-process-benign-script-run-script-os
    desc: run-script-os basename
    crit: component
    conf: 0.8
    if:
      type: basename
      exact: run-script-os
  - id: require-child-process-run-script-os-text
    desc: run-script-os usage banner
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "This is meant to be run from within npm script."
  - id: require-child-process
    desc: require('child_process') import
    crit: notable
    conf: 0.8
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/].+
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts|map)$
      - type: basename
        regex: (glasstron[\\/]binding|bindings-cpp[\\/]dist[\\/]load-bindings)\.js$
      - type: basename
        regex: (^|[\\/])(test[\\/].+|.+-test)\.js$
      - id: require-child-process-benign-context
      # Benign text contexts consolidated into two regexes (were six substr
      # clauses) to keep the suppress-clause count under threshold.
      - type: text
        regex: 'webpackLoadOptionalExternalModule|module\.exports = factory\(|builtin-plugins/tabby-'
      - type: text
        regex: 'run-script-os|"integrity":\{"algorithm":"SHA256"|require\$\$1\$1'
    if:
      type: symbol
      kind: call
      exact: 'require'
      arg:
        kind: string
        exact: child_process
  - id: require-child-process-inline-member
    desc: Inline child_process member require
    crit: notable
    conf: 0.9
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/].+
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts|map)$
      - type: basename
        regex: (glasstron[\\/]binding|bindings-cpp[\\/]dist[\\/]load-bindings)\.js$
      - type: basename
        regex: (^|[\\/])(test[\\/].+|.+-test)\.js$
      - id: require-child-process-benign-context
    if:
      type: tree-sitter
      query: |
        (member_expression
          object: (call_expression
            function: (identifier) @fn
            arguments: (arguments (string) @arg)
          )
          property: (property_identifier) @prop
          (#eq? @fn "require")
          (#match? @arg "'child_process'|\"child_process\"")
          (#match? @prop "^(exec|execSync|spawn|spawnSync|fork)$")
        )
composite_rules:
  - id: require-child-process-benign-script
    desc: benign child process script basename
    crit: component
    conf: 0.8
    any:
      - id: require-child-process-benign-script-js
      - id: require-child-process-benign-script-run-script-os
  - id: require-child-process-benign-context
    desc: benign child process import context
    crit: component
    conf: 0.8
    any:
      - id: require-child-process-benign-script
      - id: require-child-process-run-script-os-text
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
  - id: require-child-process-any
    desc: child_process import in Node.js
    crit: notable
    conf: 0.85
    any:
      - id: require-child-process
      - id: require-child-process-inline-member
