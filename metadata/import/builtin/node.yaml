# Node.js core module imports
# Atomic detection of standard library require() calls
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: require-fs
    desc: require('fs') import
    crit: baseline
    conf: 0.7
    if:
      type: ast
      query: "(call_expression function: (identifier) @fn arguments: (arguments (string) @arg) (#eq? @fn \"require\") (#match? @arg \"'fs'|\\\"fs\\\"\"))"
  - id: require-dns
    desc: require('dns') import
    crit: notable
    conf: 0.75
    if:
      type: ast
      query: "(call_expression function: (identifier) @fn arguments: (arguments (string) @arg) (#eq? @fn \"require\") (#match? @arg \"'node:dns'|\\\"node:dns\\\"|'dns'|\\\"dns\\\"\"))"
  - id: require-child-process
    desc: require('child_process') import
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: ast
      query: "(call_expression function: (identifier) @fn arguments: (arguments (string) @arg) (#eq? @fn \"require\") (#match? @arg \"'child_process'|\\\"child_process\\\"\"))"
