defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]

traits:
  - id: high-average-string-entropy
    desc: High average string entropy metric
    crit: baseline
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.5
      min_size: 4096

  - id: file-has-30-plus-lines
    desc: File has 30 or more lines
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: text.total_lines
      min: 30

  - id: file-one-liner
    desc: File is a one-liner
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: text.total_lines
      max: 1

  - id: single-long-line
    desc: Very long line
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: text.max_line_length
      min: 500

  - id: file-under-12-lines
    desc: Very short file (under 12 lines)
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: text.total_lines
      max: 12

  - id: python-under-120-lines
    desc: Python file under 120 lines
    crit: component
    conf: 0.65
    for: [python]
    if:
      type: metrics
      field: text.total_lines
      max: 120
    unless:
      - type: basename
        regex: '\.rb\.erb$'

  - id: script-many-imports-300
    desc: Source/script file has 300+ imports
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: imports.count
      min: 300

  - id: script-many-imports-10-small
    desc: Small source file (<=10KB) with 10+ imports
    crit: component
    conf: 0.5
    size_max: 10240
    if:
      type: metrics
      field: imports.count
      min: 10

  - id: few-comment-lines
    desc: Five or fewer comment lines in file
    crit: component
    conf: 0.5
    if:
      type: metrics
      field: comments.lines
      max: 5

  - id: javascript-small-file-5k
    desc: JavaScript file under 5KB
    crit: component
    conf: 0.7
    for: [javascript]
    size_max: 5120
    unless:
      - type: basename
        regex: '(?i)^Dockerfile$'
      - id: metadata/package/testing/harness/unit::go-test
  - id: tiny-javascript-file-lines
    desc: Tiny JavaScript file lines
    crit: component
    conf: 0.9
    for: [javascript]
    size_max: 8192
    if:
      type: metrics
      field: text.total_lines
      max: 5
  - id: tiny-javascript-file-size
    desc: Tiny JavaScript file size
    crit: component
    conf: 0.9
    for: [javascript]
    size_max: 256
    if:
      type: path
      basename: true
      regex: ^.{1,120}\.(js|cjs|mjs)$

  - id: imports-unique-modules-50
    desc: Source has many import modules
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 50
  - id: imports-unique-modules-60
    desc: Source has large import graph
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 60
  - id: low-string-density-large-file
    desc: Low string density in source
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    size_min: 4096
    if:
      type: metrics
      field: text.string_density
      max: 0.9
  - id: no-comments-code
    desc: Source has no comments
    crit: component
    conf: 0.6
    for: [scripts, -php, binaries]
    if:
      type: metrics
      field: comments.total
      max: 0
      min_size: 2048
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - type: basename
        regex: \.(Rd|html?|md|xsd)$
      - type: basename
        regex: \.(xml|dart)$
      - id: metadata/package/tooling::esmodule-bundled
      - id: metadata/lang/source::windows-generated-def-path
      - id: metadata/lang/source::windows-generated-def-table
  - id: high-function-density
    desc: High function density
    crit: baseline
    conf: 0.85
    unless:
      - id: metadata/library/structure::js-umd-wrapper-minified
      - id: metadata/library/structure::js-umd-wrapper-amd-minified
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: well-known/lib/influxdb3-js
      - id: well-known/lib/protobuf-ts
      - id: well-known/lib/apache-arrow
    if:
      type: metrics
      field: functions.density_per_100_lines
      min: 20
      min_size: 1024

  - id: high-entropy-identifiers
    desc: High entropy identifiers
    crit: baseline
    conf: 0.85
    if:
      type: metrics
      field: identifiers.avg_entropy
      min: 3.0
      min_size: 2048
    unless:
      - type: metrics
        field: identifiers.total
        max: 64
      - type: metrics
        field: identifiers.avg_length
        min: 12.5
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/quality::has-tests

  - id: high-entropy-identifier-ratio
    desc: High ratio of entropy-heavy identifiers
    crit: baseline
    conf: 0.85
    size_min: 4096
    size_max: 500000
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.35
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/quality::has-tests
      - type: metrics
        field: identifiers.avg_length
        min: 14.0

  - id: many-no-param-functions
    desc: Many no-param functions
    crit: baseline
    conf: 0.75
    size_min: 5000
    if:
      type: metrics
      field: functions.no_params_count
      min: 25
    unless:
      # Bundlers emit dozens of zero-arg helpers by design.
      - id: metadata/library/structure::js-esbuild-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-rollup-bundle
      - id: metadata/library/structure::js-closure-compiled-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::source-region-bundled
  - id: single-char-params
    desc: Many single-char function parameters
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: functions.single_char_params
      min: 10
    unless:
      - type: basename
        regex: '\.jq$'
  - id: low-whitespace
    desc: Very low whitespace ratio (minified/compressed)
    crit: baseline
    conf: 0.7
    unless:
      - id: metadata/file/text/format::i18n-locale-file
      - id: metadata/lang/source::windows-generated-def-path
      - type: metrics
        field: imports.unique_modules
        min: 100
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.1
      min_size: 2048
  - id: js-readable-source-context
    desc: Readable JavaScript source context
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: metrics
      field: text.whitespace_ratio
      min: 0.20
  - id: js-typescript-source-file-context
    desc: TypeScript source file context
    crit: component
    conf: 0.9
    for: [typescript]
    if:
      type: basename
      regex: '\.ts$'
  - id: shell-multiple-local-assignments
    desc: Several local variable assignments
    crit: component
    conf: 0.6
    for: [shell]
    if:
      type: metrics
      field: binds.count
      min: 2
    unless:
      - id: micro-behaviors/os/env/vars/access::shell-export-env-assignments
composite_rules:
  - id: js-assign-common-root-known-benign-context
    desc: Known benign global-object alias context
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    any:
      - id: js-readable-source-context
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/jquery::fn-extend
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/tool/development/vscode-svelte::extension-bundle
      - id: well-known/lib/pathway::python-package
      - id: js-typescript-source-file-context
