defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]

traits:
  - id: file-has-30-plus-lines
    desc: File has 30 or more lines
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: text.total_lines
      min: 30

  - id: file-one-liner
    desc: File is a one-liner
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: text.total_lines
      max: 1

  - id: single-long-line
    desc: Very long line
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: text.max_line_length
      min: 500

  - id: file-under-12-lines
    desc: Very short file (under 12 lines)
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: text.total_lines
      max: 12
