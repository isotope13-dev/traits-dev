defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.99

traits:
  - id: vscode-php-global-functions-export
    desc: VS Code PHP functions export
    if:
      type: text
      substr: "export const globalfunctions: IEntries ="
  - id: vscode-php-globals-import
    desc: VS Code PHP globals import
    if:
      type: text
      substr: "import { IEntries } from './phpGlobals';"
  - id: php-function-signature-catalog
    desc: PHP function signature catalog
    if:
      type: text
      regex: "description:\\s*'.{0,120}',\\s*signature:\\s*'\\("

composite_rules:
  - id: vscode-php-global-functions-catalog
    desc: VS Code PHP globals catalog
    crit: baseline
    conf: 0.99
    all:
      - id: vscode-php-global-functions-export
      - id: vscode-php-globals-import
      - id: php-function-signature-catalog
