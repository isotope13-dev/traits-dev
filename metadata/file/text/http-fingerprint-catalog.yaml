defaults:
  platforms: [unix, windows]
  for: [lua]
  crit: baseline
  conf: 0.98

traits:
  - id: nmap-http-fingerprint-db-path
    desc: Nmap Nikto DB path marker
    crit: component
    if:
      type: text
      substr: http-fingerprints.nikto-db-path
  - id: nmap-http-fingerprint-table
    desc: Nmap HTTP fingerprints table
    crit: component
    if:
      type: text
      regex: 'fingerprints\s*=\s*\{\}'
composite_rules:
  - id: nmap-http-fingerprints-catalog
    desc: Nmap HTTP fingerprint catalog
    crit: baseline
    conf: 0.98
    all:
      - id: nmap-http-fingerprint-db-path
      - id: nmap-http-fingerprint-table
