# Well-known interpreter / helper executable basenames, used as FP-suppression
# context by other rules (e.g. "unless the file is the python3 interpreter").
defaults:
  platforms: [windows, unix]
  size_min: 1
  size_max: 500000000
  crit: baseline
traits:
  - id: python3-interpreter-basename
    desc: python3 interpreter executable basename
    for: [shell, elf, macho]
    if:
      type: path
      basename: true
      exact: python3
  - id: chrome-sandbox-basename
    desc: "Chromium/Electron sandbox helper name"
    for: [elf]
    if:
      type: path
      basename: true
      exact: chrome-sandbox
  - id: node-pty-native-basename
    desc: node-pty native addon basename
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      regex: ^(node-pty|pty)\.node$
  - id: bpf-tool-basename
    desc: bpftool/sched-ext tool basename
    for: [elf]
    if:
      type: path
      basename: true
      regex: ^(bpftool|scx[A-Za-z0-9_]*)$
  - id: kernel-module-basename
    desc: Linux kernel module (.ko) basename
    for: [elf]
    if:
      type: path
      basename: true
      regex: \.ko$
  - id: pkgbuild-basename
    desc: Arch PKGBUILD package recipe basename
    for: [shell]
    if:
      type: path
      basename: true
      exact: PKGBUILD
