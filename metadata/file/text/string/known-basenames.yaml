# Well-known interpreter / helper executable basenames, used as FP-suppression
# context by other rules (e.g. "unless the file is the python3 interpreter").
defaults:
  platforms: [windows, unix]
  size_min: 1
  size_max: 500000000
  crit: baseline
traits:
  - id: python3-interpreter-basename
    desc: python3 interpreter executable basename
    for: [shell, elf, macho]
    if:
      type: path
      basename: true
      exact: python3
  - id: chrome-sandbox-basename
    desc: "Chromium/Electron sandbox helper name"
    for: [elf]
    if:
      type: path
      basename: true
      exact: chrome-sandbox
