# Elastic SIEM detection-rule files carry the very strings they detect
# as data. Mark them so other detectors can suppress findings on the
# pattern catalog rather than on hostile content.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.95

traits:
  - id: elastic-license-v2
    desc: Elastic License v2 marker (Elastic detection rule)
    if:
      type: text
      substr: '"license": "Elastic License v2"'
