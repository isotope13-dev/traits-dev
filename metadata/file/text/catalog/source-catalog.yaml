defaults:
  platforms: [unix, windows]
  for: [lua]
  crit: baseline
  conf: 0.95

traits:
  - id: neovim-filetype-mapping
    desc: Neovim filetype mapping registry
    crit: component
    if:
      type: text
      substr: vim.filetype.mapping
  - id: neovim-extension-table
    desc: Neovim extension filetype table
    crit: component
    if:
      type: text
      substr: 'local extension = {'
  - id: neovim-extension-table-marker
    desc: Neovim generated extension table marker
    crit: component
    if:
      type: text
      substr: BEGIN EXTENSION

composite_rules:
  - id: neovim-filetype-registry
    desc: Neovim filetype mapping registry
    crit: baseline
    conf: 0.95
    all:
      - id: neovim-filetype-mapping
      - id: neovim-extension-table
      - id: neovim-extension-table-marker
    near_bytes: 4096
