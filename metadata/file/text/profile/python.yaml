defaults:
  platforms:
    - unix
    - windows
  for:
    - python
traits:
  - id: tiny-python-file
    desc: Tiny Python source file
    crit: component
    conf: 0.8
    size_max: 100
    if:
      type: basename
      regex: \.py$
    unless:
      - type: text
        regex: ^(from\s+\S+\s+import|import\s+\S+)
      - type: text
        substr: "import *"
  - id: small-no-imports
    desc: Small Python source file with no imports
    crit: component
    conf: 0.75
    size_min: 20
    size_max: 500
    if:
      type: basename
      regex: \.pyw?$
    unless:
      - type: basename
        exact: __init__.py
      - type: text
        substr: 'import '
      - type: text
        substr: 'def '
  - id: init-py-file
    desc: Python package __init__.py file
    crit: component
    conf: 0.3
    if:
      type: basename
      exact: __init__.py
