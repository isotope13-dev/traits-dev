defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: baseline
  conf: 0.8
traits:
  - id: sequential-identifiers
    desc: Sequential source identifier names
    size_min: 1024
    size_max: 1000000
    if:
      type: metrics
      field: identifiers.sequential_names
      min: 6
    unless:
      - type: basename
        exact: CHANGES
      - type: basename
        regex: \.Rd$
      - type: metrics
        field: text.whitespace_ratio
        min: 0.2
      - type: string_literal
        substr: pybind11
      - type: text
        regex: automatically generated|DO NOT MODIFY BY HAND|THIS IS GENERATED FILE\. DO NOT MODIFY
      - type: text
        substr: Code generated by private/model/cli/gen-api/main.go
      - id: metadata/package/tooling::esmodule-bundled
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/file/text/catalog::frequency-list-catalog
