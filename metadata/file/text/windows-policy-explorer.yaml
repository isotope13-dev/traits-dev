defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: policies-explorer-path
    desc: Explorer policies registry path
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
  - id: policies-network-path
    desc: Network policies registry path
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Network
  - id: policies-comdlg32-path
    desc: Common dialog policies registry path
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Comdlg32
  - id: policy-no-drives
    desc: Explorer NoDrives policy value
    crit: component
    conf: 0.9
    if:
      type: text
      exact: NoDrives
  - id: policy-restrict-run
    desc: Explorer RestrictRun policy value
    crit: component
    conf: 0.9
    if:
      type: text
      exact: RestrictRun
  - id: policy-no-net-connect-disconnect
    desc: Explorer network disconnect policy value
    crit: component
    conf: 0.92
    if:
      type: text
      exact: NoNetConnectDisconnect
  - id: policy-no-recent-docs-history
    desc: Explorer recent documents policy value
    crit: component
    conf: 0.9
    if:
      type: text
      exact: NoRecentDocsHistory
  - id: policy-no-close
    desc: Explorer shutdown restriction policy value
    crit: component
    conf: 0.88
    if:
      type: text
      exact: NoClose
  - id: policy-no-entire-network
    desc: Network browsing restriction policy value
    crit: component
    conf: 0.9
    if:
      type: text
      exact: NoEntireNetwork
  - id: policy-no-places-bar
    desc: Common dialog places bar policy value
    crit: component
    conf: 0.9
    if:
      type: text
      exact: NoPlacesBar
  - id: policy-no-back-button
    desc: Common dialog back button policy value
    crit: component
    conf: 0.9
    if:
      type: text
      exact: NoBackButton
