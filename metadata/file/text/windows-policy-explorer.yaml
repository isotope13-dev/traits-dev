defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: policies-explorer-path
    desc: Explorer policies registry path
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
  - id: policies-network-path
    desc: Network policies registry path
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Network
  - id: policies-comdlg32-path
    desc: Common dialog policies registry path
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Comdlg32
