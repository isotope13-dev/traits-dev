defaults:
  platforms: [unix, windows]
  for: [text, html, javascript, typescript]
  crit: component
  conf: 0.85
traits:
  - id: astro-template-basename
    desc: Astro or MDX template source file
    if:
      type: path
      basename: true
      regex: '\.(astro|mdx)$'
  - id: frontmatter-title-or-description
    desc: Markdown-style title or description frontmatter
    if:
      type: text
      regex: '(?m)^---\n(title|description):'
  - id: astrojs-package-reference
    desc: Astro package reference
    if:
      type: text
      substr: '@astrojs/'
  - id: astro-docs-text-reference
    desc: Astro documentation text reference
    if:
      type: text
      substr: 'Astro.'
  - id: starlight-theme-toggle-element
    desc: Starlight theme toggle element
    if:
      type: text
      substr: '<starlight-theme-toggle>'
composite_rules:
  - id: astro-doc-template-context
    desc: Astro documentation template context
    crit: component
    conf: 0.86
    all:
      - id: frontmatter-title-or-description
    any:
      - id: astrojs-package-reference
      - id: astro-docs-text-reference
      - id: starlight-theme-toggle-element
