defaults:
  platforms: [unix]
  for: [scripts]
  crit: baseline
  conf: 0.95
traits:
  - id: roff-heading-macros
    desc: Roff heading prose macros
    crit: component
    count_min: 5
    if:
      type: text
      regex: '(?m)^\.(Sh|PP|IP|Pn)\b'
  - id: roff-block-macros
    desc: Roff block table macros
    crit: component
    count_min: 5
    if:
      type: text
      regex: '(?m)^\.(Xr|DS|DE|TS)\b'
  - id: roff-note-macros
    desc: Roff note table macros
    crit: component
    count_min: 5
    if:
      type: text
      regex: '(?m)^\.(TE|FS|FE)\b'

composite_rules:
  - id: roff-document
    desc: Roff formatted prose document
    crit: baseline
    any:
      - id: metadata/file/text/format::roff-heading-macros
      - id: metadata/file/text/format::roff-block-macros
      - id: metadata/file/text/format::roff-note-macros
