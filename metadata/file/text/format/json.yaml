defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: valid
    desc: JSON data format
    crit: baseline
    conf: 0.6
    if:
      type: basename
      regex: \.json$
  - id: zstd-json
    desc: ZSTD-compressed JSON sidecar
    crit: baseline
    conf: 0.85
    if:
      type: basename
      regex: \.json\.zst(d)?$
  - id: sourcemap
    desc: JavaScript Sourcemap
    crit: notable
    conf: 1.0
    if:
      type: text
      regex: \{\s*"version"\s*:\s*3\s*,\s*"(file|sources)"
      section: .text
  - id: sourcemap-sources-content
    desc: Source map sourcesContent array
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: '"sourcesContent":['
  - id: pypi-metadata
    desc: PyPI package metadata (PKG-INFO JSON)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \{"info":\s*\{"name"
