defaults:
  platforms: [windows, unix]
  for: [php]
  crit: baseline
traits:
  - id: tiny-size
    desc: Tiny PHP script footprint
    conf: 0.85
    if:
      type: metrics
      field: binary.file_size
      min: 40
      max: 96
  - id: sparse-strings
    desc: Sparse string pool in PHP
    conf: 0.82
    size_max: 128
    if:
      type: metrics
      field: strings.total
      max: 6
  - id: single-char-skew
    desc: Single-character variable skew
    conf: 0.8
    size_max: 128
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.6
  - id: single-import
    desc: Single imported capability only
    conf: 0.8
    size_max: 128
    if:
      type: metrics
      field: imports.total
      max: 1
composite_rules:
  - id: tiny-stager-profile
    desc: Tiny PHP stager structure
    crit: suspicious
    conf: 0.92
    needs: 3
    any:
      - id: tiny-size
      - id: sparse-strings
      - id: single-char-skew
      - id: single-import
