defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: policies-system-path
    desc: System policies registry path
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\System
      section: rdata
  - id: policies-system-suffix
    desc: System policies path suffix
    crit: component
    conf: 0.86
    if:
      type: text
      exact: dows\CurrentVersion\Policies\System
      section: rdata
