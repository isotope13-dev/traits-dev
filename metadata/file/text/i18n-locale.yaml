defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, source]
  crit: component
  conf: 0.97

traits:
  - id: i18n-translation-key
    desc: i18n translation default-export shape
    if:
      type: text
      regex: 'export\s+default\s*\{\s*translation\s*:'
  - id: i18n-locales-path
    desc: file under web/src/locales path
    if:
      type: basename
      regex: '/locales/[a-z]{2}([_-][A-Za-z0-9]+)?\.(t|j)sx?$'

composite_rules:
  - id: i18n-locale-file
    desc: JavaScript/TypeScript i18n locale string catalog
    crit: baseline
    conf: 0.97
    any:
      - id: i18n-translation-key
      - id: i18n-locales-path
