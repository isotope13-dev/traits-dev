defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [source]
traits:
  - id: js-a
    desc: Javascript file extension family A
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: (?i)\.(js|mjs|cjs|ts)$
  - id: js-b
    desc: Javascript file extension family B
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: (?i)\.(jsx|tsx)$
  - id: py
    desc: Python file extension
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: (?i)\.(py|pyw|pyc|pyd)$
  - id: shell-a
    desc: Shell script extension family A
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: (?i)\.(sh|shell|zsh|dash)$
  - id: shell-b
    desc: Shell script extension family B
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: (?i)\.(ksh|chain)$
composite_rules:
  - id: js
    desc: Javascript file extension
    conf: 1.0
    crit: baseline
    any:
      - id: metadata/file/extension::js-a
      - id: metadata/file/extension::js-b
  - id: shell
    desc: Shell script file extension
    conf: 1.0
    crit: baseline
    any:
      - id: metadata/file/extension::shell-a
      - id: metadata/file/extension::shell-b
  - id: script-file
    desc: Any script file
    conf: 1.0
    crit: baseline
    any:
      - id: metadata/file/extension::js
      - id: metadata/file/extension::py
      - id: metadata/file/extension::shell
