defaults:
  platforms: [unix, windows, android]
  for: [scripts, binaries, documents, data, source]

traits:
  - id: ext-enc
    desc: Encrypted file extension marker
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: '\b[A-Za-z0-9_.-]+\.enc\b'
    unless:
      - id: well-known/lib/active-support::module
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/crypto/library/blockchain/
      - type: basename
        regex: \.t$

  - id: ext-crypt
    desc: .crypt extension
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      exact: .crypt

  - id: ext-dfcrypt
    desc: .dfcrypt extension
    crit: notable
    conf: 0.92
    if:
      type: literal
      substr: .dfcrypt

  - id: ext-encrypted
    desc: .encrypted extension
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '[A-Za-z0-9_-]{2,}\.encrypted\b'
    not:
      - regex: '\bsocket\.encrypted\b'
    unless:
      - type: text
        regex: 'vnd\.[A-Za-z0-9_.-]*\.encrypted'
      - type: text
        substr: application/encrypted
      - type: text
        substr: x-msg-encrypted

  - id: ext-locked
    desc: .locked extension
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: '(^|[\\/''"`\s])[A-Za-z0-9_-]{2,}\.locked\b'
    unless:
      - type: text
        substr: exithook.locked
      - type: text
        substr: issues.locked
      - type: text
        substr: flow.locked
      - type: text
        substr: runtime.locked
      - type: text
        substr: exec.mutation.locked

composite_rules:
  - id: encrypted-extensions
    desc: Encrypted file extensions
    crit: notable
    conf: 0.6
    any:
      - id: ext-encrypted
      - id: ext-locked
      - id: ext-enc
      - id: ext-crypt
      - id: ext-dfcrypt
