defaults:
  platforms: [unix, windows, android]
  for: [data, text, shell, batch, python]

traits:
  - id: ext-enc
    desc: Basename uses the .enc encrypted extension
    crit: notable
    conf: 0.6
    if:
      type: basename
      regex: '(?i)\.enc$'

  - id: ext-crypt
    desc: Basename uses the .crypt encrypted extension
    crit: notable
    conf: 0.6
    if:
      type: basename
      regex: '(?i)\.crypt$'

  - id: ext-dfcrypt
    desc: Basename uses the .dfcrypt encrypted extension
    crit: notable
    conf: 0.92
    if:
      type: basename
      regex: '(?i)\.dfcrypt$'

  - id: ext-encrypted
    desc: Basename uses the .encrypted extension
    crit: notable
    conf: 0.5
    if:
      type: basename
      regex: '(?i)\.encrypted$'

  - id: ext-locked
    desc: Basename uses the .locked extension
    crit: notable
    conf: 0.5
    if:
      type: basename
      regex: '(?i)\.locked$'

composite_rules:
  - id: encrypted-extensions
    desc: Encrypted file extensions
    crit: notable
    conf: 0.6
    any:
      - id: ext-encrypted
      - id: ext-locked
      - id: ext-enc
      - id: ext-crypt
      - id: ext-dfcrypt
