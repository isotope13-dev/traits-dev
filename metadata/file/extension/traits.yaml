defaults:
  platforms: [windows, unix]
traits:
  - id: cmd-ext
    desc: .cmd extension
    crit: component
    for: [scripts, binaries]
    if:
      type: text
      substr: .cmd
  - id: python-type-stub-extension
    desc: Python type stub file
    crit: baseline
    for: [python]
    if:
      type: path
      basename: true
      regex: (?i)\.pyi$
  - id: edoc-file-extension
    desc: edoc file extension
    crit: component
    for: [javascript, html]
    if:
      type: path
      basename: true
      regex: \.edoc$
