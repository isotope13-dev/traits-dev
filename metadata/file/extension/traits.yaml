defaults:
  platforms: [windows, unix]
traits:
  - id: dll-basename
    desc: DLL filename extension present
    crit: baseline
    for: [pe]
    if:
      type: path
      basename: true
      regex: '(?i)^[A-Za-z0-9_. -]{1,120}\.dll$'
  - id: cmd-ext
    desc: .cmd extension
    crit: component
    for: [scripts, binaries]
    if:
      type: text
      substr: .cmd
  - id: dotenv-config-filename
    desc: .env configuration file
    crit: component
    for: [data, shell]
    if:
      type: path
      basename: true
      exact: .env
  - id: font-file-extension
    desc: Font file extension (ttf/woff/woff2/otf)
    crit: component
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '\.(ttf|woff|woff2|otf)$'
  - id: python-type-stub-extension
    desc: Python type stub file
    crit: baseline
    for: [python]
    if:
      type: path
      basename: true
      regex: (?i)\.pyi$
  - id: edoc-file-extension
    desc: edoc file extension
    crit: component
    for: [javascript, html]
    if:
      type: path
      basename: true
      regex: \.edoc$
  - id: linux-kernel-package-artifact-basename
    desc: Linux kernel package/module artifact basename
    crit: baseline
    conf: 0.95
    platforms: [linux, windows]
    for: [elf, pe, zst, tar]
    if:
      type: basename
      regex: '(^vmlinuz$|\.ko(\.zst)?$|\.pkg\.tar\.zst$)'
