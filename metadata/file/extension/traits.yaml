defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: image-extension-a
    desc: File has common image extension A
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: (?i)^[^/\\\\]{1,260}\.(png|jpe?g|gif)$
  - id: image-extension-b
    desc: File has common image extension B
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: (?i)^[^/\\\\]{1,260}\.(bmp|ico|webp)$
  - id: cmd-ext
    desc: .cmd extension
    crit: component
    for: [scripts, binaries]
    if:
      type: text
      substr: .cmd
  - id: python-type-stub-extension
    desc: Python type stub file
    crit: baseline
    for: [python]
    if:
      type: basename
      regex: (?i)\.pyi$
  - id: edoc-file-extension
    desc: edoc file extension
    crit: component
    for: [javascript, html, source, unknown]
    if:
      type: basename
      regex: \.edoc$
composite_rules:
  - id: image-extension
    desc: File has image extension
    crit: baseline
    conf: 1.0
    any:
      - id: image-extension-a
      - id: image-extension-b
