# Common text-format file extensions used as benign-context gates by
# composites detecting suspicious shell pipelines, regex catalogs, etc.
# These are content-type classifiers, not behavioral signals.
defaults:
  platforms: [windows, unix]
  for: [source]
  crit: baseline
  conf: 1.0
traits:
  - id: web-asset-extension
    desc: Web asset file extension (css/html/js/json)
    crit: component
    if:
      type: basename
      regex: '\.(css|html?|js|json)$'
  - id: doc-or-config-extension
    desc: Document or config file extension (md/php/txt/xml)
    crit: component
    if:
      type: basename
      regex: '\.(md|php|txt|xml)$'
  - id: python-artifact-extension
    desc: Python artifact file extension (py/pyi/pyc)
    crit: component
    if:
      type: basename
      regex: '\.(pyi?|pyc)$'
