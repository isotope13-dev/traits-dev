defaults:
  for: [binaries]
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: macho-so-extension
    desc: Mach-O uses .so extension
    crit: notable
    conf: 0.95
    for:
      - macho
    platforms:
      - macos
      - ios
    if:
      type: basename
      regex: .{0,240}\.so(?:\.[0-9]+){0,3}$
