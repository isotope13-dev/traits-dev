defaults:
  for: [binaries]
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: macho-so-extension
    desc: Mach-O uses .so extension
    crit: baseline
    conf: 0.95
    for:
      - macho
    platforms:
      - macos
      - ios
    if:
      type: basename
      regex: .{0,240}\.so(\.[0-9]+){0,3}$
  - id: cpython-native-extension-module
    desc: CPython native extension module
    crit: component
    conf: 0.95
    platforms: [unix, windows]
    if:
      type: basename
      regex: '\.(cpython-\d+[^\\/]*\.so|cp\d+-[^\\/]*\.pyd)$'
  - id: node-native-addon-extension
    desc: Node.js native addon extension
    crit: component
    conf: 1.0
    platforms: [unix, windows]
    if:
      type: basename
      regex: '(?i)\.node$'
