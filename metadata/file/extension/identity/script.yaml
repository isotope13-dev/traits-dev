defaults:
  platforms: [windows, unix]
traits:
  - id: py
    desc: Python file extension
    crit: baseline
    conf: 1.0
    for: [python]
    if:
      type: path
      basename: true
      regex: '(?i)\.(py|pyw|pyc|pyd)$'
  - id: shell-a
    desc: POSIX shell script extension
    crit: baseline
    conf: 1.0
    for: [shell]
    if:
      type: path
      basename: true
      regex: '(?i)\.(sh|shell|zsh|dash)$'
  - id: shell-b
    desc: Korn shell script extension
    crit: baseline
    conf: 1.0
    for: [shell]
    if:
      type: path
      basename: true
      regex: '(?i)\.ksh$'
  - id: systemd-service
    desc: Systemd service file extension
    crit: baseline
    conf: 1.0
    for: [systemd]
    platforms: [linux]
    if:
      type: path
      basename: true
      regex: '(?i)\.service$'
composite_rules:
  - id: shell
    desc: Shell script file extension
    conf: 1.0
    crit: baseline
    any:
      - id: metadata/file/extension/identity::shell-a
      - id: metadata/file/extension/identity::shell-b
  - id: script-file
    desc: Script file
    conf: 1.0
    crit: baseline
    any:
      - id: metadata/lang/source::js-ts-source-basename
      - id: metadata/file/extension/identity::py
      - id: metadata/file/extension/identity::shell
      - id: metadata/file/extension/identity::systemd-service
