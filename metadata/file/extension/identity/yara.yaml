defaults:
  platforms: [unix, windows]
  # YARA rule files in the scanned package are classified as PHP, Kotlin,
  # Python, or shell-like source. Keep this path matcher bounded to the
  # supported source types rather than applying it to every language.
  for: [php, kotlin, python, shell]
  crit: baseline
  conf: 0.96

traits:
  - id: yara-extension
    desc: YARA rule file extension
    if:
      type: path
      regex: '(?i)\.yar(a)?$'
