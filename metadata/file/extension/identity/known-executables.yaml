# Well-known executable / installer / build-script basenames, used as
# FP-suppression context by other rules.
defaults:
  platforms: [windows, unix]
  size_min: 1
  size_max: 500000000
  crit: baseline
traits:
  # Generic .exe filename fact, distinct from `for: [pe]` (a PE may be .dll/.sys).
  # Used as a positive leg by launcher-masquerade / PE-anomaly composites.
  - id: exe-extension
    desc: PE file uses .exe extension
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: path
      basename: true
      regex: '(?i)\.exe$'
  - id: uac-exe-basename
    desc: 'UAC.exe basename'
    for: [pe]
    if:
      type: path
      basename: true
      exact: UAC.exe
  - id: netstandard-dll-basename
    desc: netstandard.dll reference assembly basename
    for: [pe]
    if:
      type: path
      basename: true
      exact: netstandard.dll
  - id: uninstaller-exe-basename
    desc: "Uninstaller exe basename (Uninstall *.exe)"
    for: [pe]
    if:
      type: path
      basename: true
      regex: '^Uninstall .+\.exe$'
  - id: autotools-configure-basename
    desc: Autotools configure script basename
    for: [shell]
    if:
      type: path
      basename: true
      regex: '^configure'
