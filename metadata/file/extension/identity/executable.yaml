defaults:
  platforms: [windows, unix]
  for: [pe]
traits:
  - id: exe
    desc: Windows executable extension
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      regex: \.exe$
  - id: scr
    desc: Windows screensaver extension
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      regex: \.scr$
  - id: dll
    desc: Windows DLL extension
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      regex: (?i)\.dll(_[0-9a-f]{8})?$
  - id: dotnet-native-image
    desc: .NET native image extension
    crit: baseline
    conf: 1.0
    for:
      - pe
      - dll
    if:
      type: path
      basename: true
      regex: (?i)\.ni\.dll$
  - id: rll
    desc: Windows resource DLL extension
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      regex: \.rll$
  - id: msstyles
    desc: Windows visual style resource extension
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      regex: (?i)\.msstyles$
  - id: com
    desc: DOS executable extension
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      regex: \.com$
  - id: bat
    desc: Batch script extension
    crit: baseline
    conf: 1.0
    for: [batch]
    if:
      type: path
      basename: true
      regex: \.bat$
  - id: cmd
    desc: Windows command script extension
    crit: baseline
    conf: 1.0
    for: [batch]
    if:
      type: path
      basename: true
      regex: \.cmd$
composite_rules:
  - id: windows-executable
    desc: Windows executable file extension
    crit: baseline
    conf: 1.0
    any:
      - id: exe
      - id: scr
      - id: dll
      - id: rll
      - id: msstyles
      - id: com
      - id: bat
      - id: cmd
