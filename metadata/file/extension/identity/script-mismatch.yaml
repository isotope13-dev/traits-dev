defaults:
  platforms: [windows, unix]
  for: [javascript, html, documents]

traits:
  - id: script-content-extension-mismatch
    desc: Script content mismatches extension
    crit: component
    conf: 0.9
    for: [shell, javascript, html]
    ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
    if:
      type: metrics
      field: consistency.extension_content_mismatch
      min: 1
  - id: document-content-extension-mismatch
    desc: Document content mismatches extension
    crit: baseline
    conf: 0.9
    for: [documents]
    if:
      type: metrics
      field: consistency.extension_content_mismatch.document_as_document
      min: 1
