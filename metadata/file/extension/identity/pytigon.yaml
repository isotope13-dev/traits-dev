# Pytigon project containers can embed source templates.  Their extension
# identifies the outer file format, not a Python source file.
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: component
  conf: 0.98

traits:
  - id: pytigon-project-container
    desc: Pytigon project container file extension
    if:
      type: path
      regex: '\.ptigprj'
