defaults:
  platforms: [windows, unix]
traits:
  - id: dll-basename
    desc: DLL filename extension present
    crit: baseline
    for: [pe]
    if:
      type: path
      basename: true
      regex: '(?i)^[A-Za-z0-9_. -]{1,120}\.dll$'
  - id: cmd-ext
    desc: References .cmd filename
    crit: component
    for: [scripts, binaries]
    if:
      type: text
      regex: '(?i)\b[A-Za-z0-9_. -]{1,120}\.cmd\b'
  - id: dotenv-config-filename
    desc: .env configuration file
    crit: component
    for: [data, text, shell]
    if:
      type: path
      basename: true
      exact: .env
  - id: dotenv-backup-filename
    desc: Dotenv backup filename
    crit: component
    for: [data, text, shell]
    if:
      type: path
      basename: true
      regex: '^\.env\.backup([._-].*)?$'
  - id: archive-extension-reference
    desc: Archive file extension (tar.gz/tgz/zip)
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: '\.(tar\.gz|tgz|zip)\b'
  - id: key-extension
    for: [python, javascript, powershell, perl, pe]
    desc: Generic key extension
    crit: component
    conf: 0.5
    attack: T1552.004
    if:
      type: text
      regex: "([\"'][^\"'\\n]{1,120}\\.key[\"']|[\\\\/][^\\\\/\\s\"']{1,120}\\.key\\b)"
    unless:
    - id: metadata/lang/compiler/systems::go-buildinfo
  - id: json-extension
    for: [python, javascript, powershell, perl, pe]
    desc: JSON file extension
    crit: component
    conf: 0.3
    unless:
      - id: metadata/library/structure/
    if:
      type: text
      regex: \.json\b|["']\.json["']
  - id: lnk-endswith-filter
    for: [python, javascript, powershell, perl, pe]
    desc: Filters files by .lnk extension
    crit: component
    conf: 0.8
    if:
      type: text
      substr: .lnk
  - id: python-type-stub-extension
    desc: Python type stub file
    crit: baseline
    for: [python]
    if:
      type: path
      basename: true
      regex: (?i)\.pyi$
  - id: edoc-file-extension
    desc: edoc file extension
    crit: component
    for: [javascript, html]
    if:
      type: path
      basename: true
      regex: \.edoc$
  - id: linux-kernel-image-basename
    desc: Linux kernel image basename
    crit: baseline
    conf: 0.95
    platforms: [linux, windows]
    for: [elf, pe]
    if:
      type: basename
      regex: '^vmlinu[xz]$'
  - id: linux-kernel-vdso-basename
    desc: Linux kernel vDSO basename
    crit: baseline
    conf: 0.95
    platforms: [linux]
    for: [elf]
    if:
      type: basename
      regex: '^vdso(32|64|x32)?\.so$'
  - id: linux-kernel-module-basename
    desc: Linux kernel module basename
    crit: baseline
    conf: 0.95
    platforms: [linux, windows]
    for: [elf, pe, zst]
    if:
      type: basename
      regex: '\.ko(\.zst)?$'
  - id: linux-kernel-pkg-archive-basename
    desc: Linux kernel package archive basename
    crit: baseline
    conf: 0.95
    platforms: [linux, windows]
    for: [zst, tar]
    if:
      type: basename
      regex: '^linux(-lts)?[^/]*\.pkg\.tar\.zst$'
  - id: linux-firmware-blob-basename
    desc: Linux firmware blob artifact basename
    crit: baseline
    conf: 0.9
    platforms: [linux]
    for: [elf, zst]
    if:
      type: basename
      regex: '^([\w.-]+\.(mbn|mdt)|scp\.img|amss\.bin|m3\.bin)(\.zst)?$'
  - id: linux-qcom-firmware-blob-basename
    desc: Linux firmware fragment basename
    crit: baseline
    conf: 0.9
    platforms: [linux]
    for: [elf, zst]
    if:
      type: basename
      regex: '^[\w.-]+\.(mdt|b[0-9]+)(\.zst)?$'
  - id: linux-firmware-embedded-elf-path
    desc: Linux firmware embedded ELF artifact path
    crit: baseline
    conf: 0.9
    platforms: [linux]
    for: [elf]
    if:
      type: path
      dirname: true
      regex: '([\w.-]+\.(mbn|mdt)|scp\.img|amss\.bin|m3\.bin)(\.zst)?'
  - id: linux-gpu-firmware-bin-basename
    desc: Linux GPU firmware blob basename
    crit: baseline
    conf: 0.9
    platforms: [linux]
    for: [data, zst]
    if:
      type: basename
      regex: '^[a-z0-9_]+_guc_[^\\/]+\.bin(\.zst)?$'
  - id: linux-qcom-firmware-embedded-elf-path
    desc: Linux firmware fragment ELF path
    crit: baseline
    conf: 0.9
    platforms: [linux]
    for: [elf]
    if:
      type: path
      dirname: true
      regex: '[\w.-]+\.(mdt|b[0-9]+)(\.zst)?'
  - id: stm32-external-loader-elf
    desc: STM32 external loader ELF artifact
    crit: baseline
    conf: 0.95
    platforms: [unix]
    for: [elf]
    if:
      type: basename
      regex: '(?i)\.stldr$'
  - id: python-wheel-basename
    desc: Python wheel archive basename
    crit: baseline
    conf: 0.95
    for: [jar, zip, whl]
    if:
      type: basename
      regex: '\.whl$'

composite_rules:
  - id: linux-kernel-package-artifact-basename
    desc: Linux kernel package/module artifact basename
    crit: baseline
    conf: 0.95
    any:
      - id: linux-kernel-image-basename
      - id: linux-kernel-vdso-basename
      - id: linux-kernel-module-basename
      - id: linux-kernel-pkg-archive-basename
