defaults:
  platforms: [windows, unix]
traits:
  - id: dll-basename
    desc: DLL filename extension present
    crit: baseline
    for: [pe]
    if:
      type: path
      basename: true
      regex: '(?i)^[A-Za-z0-9_. -]{1,120}\.dll$'
  - id: cmd-ext
    desc: .cmd extension
    crit: component
    for: [scripts, binaries]
    if:
      type: text
      substr: .cmd
  - id: dotenv-config-filename
    desc: .env configuration file
    crit: component
    for: [data, shell]
    if:
      type: path
      basename: true
      exact: .env
  - id: font-file-extension
    desc: Font file extension (ttf/woff/woff2/otf)
    crit: component
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '\.(ttf|woff|woff2|otf)$'
  - id: archive-extension-reference
    desc: Archive file extension (tar.gz/tgz/zip)
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: '\.(tar\.gz|tgz|zip)\b'
  - id: key-extension
    for: [python, javascript, powershell, perl, pe]
    desc: Generic key extension
    crit: component
    conf: 0.5
    attack: T1552.004
    if:
      type: text
      regex: "([\"'][^\"'\\n]{1,120}\\.key[\"']|[\\\\/][^\\\\/\\s\"']{1,120}\\.key\\b)"
    unless:
    - id: metadata/lang/compiler/systems::go-buildinfo
  - id: json-extension
    for: [python, javascript, powershell, perl, pe]
    desc: JSON file extension
    crit: component
    conf: 0.3
    unless:
      - id: metadata/library/structure::vscode-icon-theme-catalog
    if:
      type: text
      regex: \.json\b|["']\.json["']
  - id: lnk-endswith-filter
    for: [python, javascript, powershell, perl, pe]
    desc: Filters files by .lnk extension
    crit: component
    conf: 0.8
    if:
      type: text
      substr: .lnk
  - id: python-type-stub-extension
    desc: Python type stub file
    crit: baseline
    for: [python]
    if:
      type: path
      basename: true
      regex: (?i)\.pyi$
  - id: edoc-file-extension
    desc: edoc file extension
    crit: component
    for: [javascript, html]
    if:
      type: path
      basename: true
      regex: \.edoc$
  - id: linux-kernel-package-artifact-basename
    desc: Linux kernel package/module artifact basename
    crit: baseline
    conf: 0.95
    platforms: [linux, windows]
    for: [elf, pe, zst, tar]
    if:
      type: basename
      regex: '(^vmlinuz$|\.ko(\.zst)?$|\.pkg\.tar\.zst$)'
  - id: python-wheel-basename
    desc: Python wheel archive basename
    crit: baseline
    conf: 0.95
    for: [jar, zip, whl]
    if:
      type: basename
      regex: '\.whl$'
