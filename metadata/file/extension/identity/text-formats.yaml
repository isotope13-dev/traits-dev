# Common text-format file extensions used as benign-context gates by
# composites detecting suspicious shell pipelines, regex catalogs, etc.
# These are content-type classifiers, not behavioral signals.
defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 1.0
traits:
  - id: web-asset-extension
    desc: File has a common web-asset extension
    crit: component
    for: [javascript, html, json]
    if:
      type: path
      basename: true
      regex: '\.(css|html?|js|json)$'
  # CSS preprocessor sources (Sass/SCSS/Less/Stylus) are recognized as plain
  # `text`, so nothing else classifies them. A standalone neutral content-type
  # identity so a stylesheet partial reads as a stylesheet, not an opaque text
  # blob — baseline (not component) because it stands alone, gating no composite.
  - id: css-preprocessor-extension
    desc: CSS preprocessor stylesheet source extension
    crit: baseline
    for: [text]
    if:
      type: path
      basename: true
      regex: '(?i)\.(scss|sass|less|styl)$'
  - id: javascript-source-extension
    desc: JavaScript source filename extension
    crit: component
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '(?i)\.(c|m)?js$'
  - id: doc-or-config-extension
    desc: File uses a document or configuration extension
    crit: component
    for: [markdown, text, xml, data]
    if:
      type: path
      basename: true
      regex: '\.(conf|md|txt|xml)$'
  - id: markdown-file-basename
    desc: "Markdown document file extension"
    crit: component
    for: [markdown]
    if:
      type: path
      basename: true
      regex: '(?i)\.(md|markdown|mdx)$'
  - id: python-artifact-extension
    desc: Python source, stub, or bytecode extension
    crit: component
    for: [python, pyc]
    if:
      type: path
      basename: true
      regex: '\.(pyi?|pyc)$'
  - id: html-basename
    desc: File has an HTML extension
    crit: component
    for: [html]
    if:
      type: path
      basename: true
      regex: '\.html?$'
  - id: python-source-extension
    desc: Python source file extension (.py only)
    crit: component
    for: [python]
    if:
      type: path
      basename: true
      regex: '(?i)\.py$'
  - id: python-wheel-top-level-txt
    desc: Python wheel top_level.txt metadata file
    crit: component
    for: [data]
    if:
      type: path
      basename: true
      exact: top_level.txt
  - id: declaration-file-extension
    desc: File uses a source declaration extension
    crit: component
    for: [typescript, python]
    if:
      type: path
      basename: true
      regex: '\.(d\.[cm]?ts|pxd|pyi)$'
  # Generated/stub source artifacts by filename (type stubs + source maps).
  # Canonical home for this neutral extension classifier; referenced as a
  # benign/generated-file gate by obfuscation and invisible-unicode composites.
  - id: type-stub-or-map-basename
    desc: Type stub or source map filename
    crit: component
    conf: 0.85
    for: [shell, javascript, typescript, python]
    if:
      type: path
      basename: true
      regex: \.(py|pyi|d\.ts|map)$
  - id: flow-declaration-extension
    desc: Flow declaration file extension
    crit: component
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '\.js\.flow$'
  - id: nix-source-extension
    desc: Nix expression file extension
    crit: component
    for: [kotlin, data]
    if:
      type: path
      basename: true
      regex: '\.nix$'
  - id: pug-template-extension
    desc: Pug template file extension
    crit: component
    for: [data]
    if:
      type: path
      basename: true
      regex: '\.pug$'
  - id: seven-zip-archive-extension
    desc: 7-Zip archive file extension
    crit: component
    for: [data]
    if:
      type: path
      basename: true
      regex: '\.7z$'
