# Common text-format file extensions used as benign-context gates by
# composites detecting suspicious shell pipelines, regex catalogs, etc.
# These are content-type classifiers, not behavioral signals.
defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 1.0
traits:
  - id: web-asset-extension
    desc: Web asset file extension (css/html/js/json)
    crit: component
    for: [javascript, html, json]
    if:
      type: path
      basename: true
      regex: '\.(css|html?|js|json)$'
  - id: javascript-source-extension
    desc: JavaScript source filename extension
    crit: component
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '(?i)\.(c|m)?js$'
  - id: doc-or-config-extension
    desc: 'Document or config file extension'
    crit: component
    for: [markdown, text, xml, data]
    if:
      type: path
      basename: true
      regex: '\.(conf|md|txt|xml)$'
  - id: markdown-file-basename
    desc: "Markdown document file extension"
    crit: component
    for: [markdown]
    if:
      type: path
      basename: true
      regex: '(?i)\.(md|markdown|mdx)$'
  - id: python-artifact-extension
    desc: Python artifact file extension (py/pyi/pyc)
    crit: component
    for: [python, pyc]
    if:
      type: path
      basename: true
      regex: '\.(pyi?|pyc)$'
  - id: html-basename
    desc: HTML file extension
    crit: component
    for: [html]
    if:
      type: path
      basename: true
      regex: '\.html?$'
  - id: python-source-extension
    desc: Python source file extension (.py only)
    crit: component
    for: [python]
    if:
      type: path
      basename: true
      regex: '(?i)\.py$'
  - id: python-wheel-top-level-txt
    desc: Python wheel top_level.txt metadata file
    crit: component
    for: [data]
    if:
      type: path
      basename: true
      exact: top_level.txt
  - id: declaration-file-extension
    desc: Source declaration file extension
    crit: component
    for: [typescript, python]
    if:
      type: path
      basename: true
      regex: '\.(d\.[cm]?ts|pxd|pyi)$'
  # Generated/stub source artifacts by filename (type stubs + source maps).
  # Canonical home for this neutral extension classifier; referenced as a
  # benign/generated-file gate by obfuscation and invisible-unicode composites.
  - id: type-stub-or-map-basename
    desc: Type stub or source map filename
    crit: component
    conf: 0.85
    for: [shell, javascript, typescript, python]
    if:
      type: path
      basename: true
      regex: \.(py|pyi|d\.ts|map)$
  - id: typescript-declaration-extension
    desc: TypeScript declaration file extension
    crit: component
    for: [typescript]
    if:
      type: path
      basename: true
      regex: '\.d\.[cm]?ts$'
  - id: flow-declaration-extension
    desc: Flow declaration file extension
    crit: component
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '\.js\.flow$'
  - id: encoded-data-carrier-extension
    desc: Encoded data carrier extension
    crit: component
    for: [typescript, data]
    if:
      type: path
      basename: true
      regex: '\.(d\.ts|pug|7z)$'
