defaults:
  platforms: [macos, ios]
  for: [plist]

traits:
  - id: mobileconfig-profile
    desc: Apple mobileconfig profile format
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.mobileconfig|ConfigurationProfiles'
    unless:
      - id: well-known/app/packetfence::source-tree-path

  - id: profile-identifier-field
    desc: Apple profile identifier field
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: PayloadIdentifier

  - id: profile-type-field
    desc: Apple profile type field
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: PayloadType

  - id: profile-uuid-field
    desc: Apple profile UUID field
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: PayloadUUID

composite_rules:
  - id: configuration-profile
    desc: Apple configuration profile format
    crit: notable
    conf: 0.92
    all:
      - id: profile-identifier-field
      - id: profile-type-field
      - id: profile-uuid-field
