defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, zig, csharp]
traits:
  - id: jinja-template-source
    desc: Jinja template source file
    crit: baseline
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '\.(jinja|jinja2|j2)$'

  - id: generic-template-source
    desc: Generic template source file
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '\.(tpl|mustache)$'
