# freedesktop.org Desktop Entry structural fields.
#
# Neutral facts about a .desktop file (parsed as kv paths under
# `desktop_entry.*`). Every normal launcher carries these, so on their own they
# are not persistence — the autostart/conceal composites in
# objectives/persistence/login/xdg assemble intent from them.
defaults:
  platforms: [linux]
  for: [desktop-entry]
  crit: component
traits:
  - id: desktop-type-application
    desc: Desktop entry Type=Application
    if:
      type: value
      path: desktop_entry.type
      exact: Application

  - id: desktop-type-link
    desc: Desktop entry Type=Link
    if:
      type: value
      path: desktop_entry.type
      exact: Link

  - id: desktop-exec-present
    desc: Desktop entry has Exec directive
    if:
      type: value
      path: desktop_entry.exec
      exists: true

  - id: desktop-terminal-hidden
    desc: Desktop entry Terminal=false
    if:
      type: value
      path: desktop_entry.terminal
      exact: "false"

  - id: desktop-session-definition-path
    # A .desktop under wayland-sessions/ or xsessions/ is a display-manager
    # session definition, not an autostart/launcher entry; the autostart and
    # hidden-launcher composites use this to exclude session files.
    desc: Display-manager session definition path
    if:
      type: path
      regex: '[\\/](wayland-sessions|xsessions)[\\/]'

  - id: desktop-only-show-in
    desc: OnlyShowIn restricts desktop environment
    if:
      type: value
      path: desktop_entry.only_show_in
      exists: true

  - id: desktop-not-show-in
    desc: NotShowIn hides from desktop environment
    if:
      type: value
      path: desktop_entry.not_show_in
      exists: true
