defaults:
  platforms: [unix, windows]
  for: [text]
  crit: baseline
  conf: 0.94

traits:
  - id: agents-md-file
    desc: AI agent instruction file
    if:
      type: basename
      exact: AGENTS.md

  - id: codex-repository-guidance
    desc: Codex repository guidance document
    if:
      type: text
      regex: 'guidance to Codex|working with code in this repository'

composite_rules:
  - id: codex-agents-md-guidance
    desc: Codex AGENTS.md guidance file
    crit: baseline
    conf: 0.96
    all:
      - id: agents-md-file
      - id: codex-repository-guidance
