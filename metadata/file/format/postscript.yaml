defaults:
  platforms: [unix]
  for: [scripts, documents]
  crit: component
  conf: 0.97

traits:
  - id: postscript-adobe-header
    desc: Adobe PostScript document header
    if:
      type: text
      substr: '%!PS-Adobe'

  - id: groff-postscript-creator
    desc: groff PostScript creator marker
    if:
      type: text
      substr: '%%Creator: groff'

composite_rules:
  - id: groff-generated-postscript
    desc: groff generated PostScript document
    crit: baseline
    all:
      - id: postscript-adobe-header
      - id: groff-postscript-creator
