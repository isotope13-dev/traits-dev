# AdBlock Plus / uBlock Origin / EasyList content-blocker filter list.
#
# A filter list (EasyList, EasyPrivacy, Fanboy, AdGuard, etc.) is a benign data
# file whose entire purpose is to ENUMERATE ad / tracker / malware endpoints so
# a content blocker can block them. It therefore legitimately contains
# abused-TLD URLs, raw-IP URLs and shady domains as *rule content* — these are
# indicators being blocked, not infrastructure the file itself talks to.
# Composites under objectives/command-and-control/infrastructure reference this
# marker in their `unless:` so a blocklist does not read as live C2 activity.
#
# Identity is established by the unmistakable Adblock Plus filter grammar:
# `||host^$options` network rules and `domain##selector` / `#@#` / `#?#`
# cosmetic rules. The count thresholds require the file to be *dominated* by
# filter rules (a stray `||x^` or `##y` line is not enough), keeping the marker
# off ordinary text. The cosmetic atom is scoped away from `markdown` so that a
# document full of `### Heading` lines cannot impersonate a filter list.
defaults:
  platforms: [windows, unix]
  for: [text, data]
  crit: component
traits:
  - id: adblock-list-header
    desc: Adblock Plus filter list header
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '(?m)^(\[Adblock|! Title:)'
  - id: urlhaus-malware-blocklist
    desc: URLHaus malware URL blocklist
    crit: baseline
    conf: 0.95
    ref: sha256:642bf3b1f5e895ffcfcd59dde017a495a09312c20da0e4a0564abbbfb7d08eea
    if:
      type: text
      regex: '(?m)^! Source: https://urlhaus\.abuse\.ch/api/'
  - id: adblock-network-rule
    desc: Adblock network filter rules
    conf: 0.9
    count_min: 20
    if:
      type: text
      regex: '(?m)^@{0,2}\|\|[\w.*~-]+\^'
  - id: adblock-cosmetic-rule
    desc: Adblock cosmetic element-hide rules
    conf: 0.9
    count_min: 20
    if:
      type: text
      regex: '(?m)^[\w.,~*|-]*#[@?$%]{0,2}#[\w.#\[*]'
composite_rules:
  - id: adblock-filter-list
    desc: Adblock/EasyList content-blocker filter list
    crit: baseline
    conf: 0.95
    any:
      - id: adblock-list-header
      - id: adblock-network-rule
      - id: adblock-cosmetic-rule
      - id: urlhaus-malware-blocklist
