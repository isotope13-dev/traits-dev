defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: valid
    desc: JSON data format
    crit: baseline
    conf: 0.6
    for: [json]
    if:
      type: path
      basename: true
      regex: \.json$
  - id: zstd-json
    desc: ZSTD-compressed JSON sidecar
    crit: baseline
    conf: 0.85
    for: [zst]
    if:
      type: path
      basename: true
      regex: \.json\.zst(d)?$
  - id: sourcemap
    desc: JavaScript Sourcemap
    crit: notable
    conf: 1.0
    for: [json, javascript, typescript, vbs]
    if:
      type: text
      regex: \{\s*"version"\s*:\s*3\s*,\s*"(file|sources)"
      section: .text
  - id: sourcemap-sources-content
    desc: Source map sourcesContent array
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '"sourcesContent"\s*:\s*\['
  - id: sourcemap-inline-base64
    desc: Inline base64-encoded source map (data URL)
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: 'sourceMappingURL=data:application/json[A-Za-z0-9;=._-]{0,80}base64,'
  - id: pypi-metadata
    desc: PyPI package metadata (PKG-INFO JSON)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \{"info":\s*\{"name"
  - id: benchmark-hostname
    desc: Benchmark atomdrift host
    for: [json]
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: network_host
      regex: '\\.benchmark\\.atomdrift\\.org$'
  - id: generated-sample-name
    desc: Generated malware sample name
    for: [json]
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: name
      regex: '^windows-kotlin-process-login-elevation-control-[0-9a-f]+$'
  - id: discovery-process-trait
    desc: Process discovery trait tag
    for: [json]
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: traits.discovery[0]
      exact: discovery/process
  - id: persistence-login-trait
    desc: Login persistence trait tag
    for: [json]
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: traits.persistence[0]
      exact: persistence/login
  - id: elevation-control-trait
    desc: Elevation control trait tag
    for: [json]
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: traits.privilege-escalation[0]
      exact: privilege-escalation/elevation-control
composite_rules:
  - id: sourcemap-context
    desc: Any source-map context (raw, inline base64, or sourcesContent)
    crit: component
    conf: 0.95
    for: [json, javascript, typescript, vbs]
    any:
      - id: sourcemap
      - id: sourcemap-sources-content
      - id: sourcemap-inline-base64
