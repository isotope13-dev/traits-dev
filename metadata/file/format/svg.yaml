defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.95

traits:
  - id: source-svg-element
    desc: Source contains an SVG element
    if:
      type: text
      regex: '<svg\\b'
  - id: source-svg-namespace
    desc: Source contains the SVG namespace
    if:
      type: text
      substr: http://www.w3.org/2000/svg
  - id: source-svg-path-data
    desc: Source contains SVG path data
    if:
      type: text
      regex: '\\bd=["''][Mm]?-?\\d+(\\.\\d+)?[ ,]'
  - id: source-svg-path-property
    desc: Source contains SVG path property data
    if:
      type: text
      regex: '\\b(icon|pathData)\\s*:\\s*[`"''][Mm]?-?\\d+(\\.\\d+)?[ ,]'
  - id: source-svg-path-array
    desc: Source contains SVG icon-map path data
    if:
      type: text
      regex: '["''][\\w-]{1,40}["'']\\s*:\\s*\\[\\s*[`"''][Mm]-?\\d+(\\.\\d+)?[ ,]'

composite_rules:
  - id: source-svg-path-data-marker
    desc: JavaScript or TypeScript source contains an inline SVG icon
    crit: baseline
    conf: 0.95
    all:
      - id: source-svg-element
      - id: source-svg-namespace
    any:
      - id: source-svg-path-data
      - id: source-svg-path-property
      - id: source-svg-path-array
