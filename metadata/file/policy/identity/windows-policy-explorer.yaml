defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: policies-explorer-path
    desc: Explorer policies registry path
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
      section: rdata
  - id: policies-explorer-path-rsrc
    desc: Explorer policies path in resources
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
      section: rsrc
  - id: policies-network-path
    desc: Network policies registry path
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Network
      section: rdata
  - id: policies-network-path-rsrc
    desc: Network policies path in resources
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Network
      section: rsrc
  - id: policies-comdlg32-path
    desc: Common dialog policies registry path
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Comdlg32
      section: rdata
  - id: policies-comdlg32-path-rsrc
    desc: Common dialog policies path in resources
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Comdlg32
      section: rsrc
composite_rules:
  - id: policies-explorer-path-any
    desc: Explorer policies registry path
    crit: baseline
    conf: 0.95
    any:
      - id: policies-explorer-path
      - id: policies-explorer-path-rsrc
  - id: policies-network-path-any
    desc: Network policies registry path
    crit: baseline
    conf: 0.93
    any:
      - id: policies-network-path
      - id: policies-network-path-rsrc
  - id: policies-comdlg32-path-any
    desc: Common dialog policies registry path
    crit: baseline
    conf: 0.93
    any:
      - id: policies-comdlg32-path
      - id: policies-comdlg32-path-rsrc
