defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: explorer-advanced-path
    desc: Explorer Advanced registry path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      case_insensitive: true
      section: rdata
  - id: explorer-advanced-path-rsrc
    desc: Explorer Advanced registry path in resources
    crit: component
    conf: 0.94
    if:
      type: text
      substr: Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      case_insensitive: true
      section: rsrc
  - id: explorer-cabinet-state-path
    desc: Explorer CabinetState registry path
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: Software\Microsoft\Windows\CurrentVersion\Explorer\CabinetState
      case_insensitive: true
      section: rdata
  - id: explorer-cabinet-state-path-rsrc
    desc: Explorer CabinetState path in resources
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: Software\Microsoft\Windows\CurrentVersion\Explorer\CabinetState
      case_insensitive: true
      section: rsrc
  - id: hide-file-ext-value
    desc: Hide file extension value
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: HideFileExt
      section: rdata
  - id: hide-file-ext-value-rsrc
    desc: Hide file extension value in resources
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: HideFileExt
      section: rsrc
  - id: hidden-files-value
    desc: Hidden files visibility value
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: Hidden
      section: rdata
  - id: hidden-files-value-rsrc
    desc: Hidden files visibility value in resources
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: Hidden
      section: rsrc
composite_rules:
  - id: explorer-advanced-path-any
    desc: Explorer Advanced registry path
    crit: component
    conf: 0.94
    any:
      - id: explorer-advanced-path
      - id: explorer-advanced-path-rsrc
  - id: explorer-cabinet-state-path-any
    desc: Explorer CabinetState registry path
    crit: notable
    conf: 0.88
    any:
      - id: explorer-cabinet-state-path
      - id: explorer-cabinet-state-path-rsrc
  - id: hide-file-ext-value-any
    desc: Hide file extension value
    crit: notable
    conf: 0.94
    any:
      - id: hide-file-ext-value
      - id: hide-file-ext-value-rsrc
  - id: hidden-files-value-any
    desc: Hidden files visibility value
    crit: notable
    conf: 0.94
    any:
      - id: hidden-files-value
      - id: hidden-files-value-rsrc
