defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
traits:
  - id: android-autoverify-link
    desc: Android autoVerify deep link
    if:
      type: text
      substr: "android:autoVerify"
  - id: ios-url-types-config
    desc: iOS URL types config
    if:
      type: text
      substr: "CFBundleURLTypes"
  - id: apple-associated-domains
    desc: Apple associated domains entitlement
    if:
      type: text
      substr: "com.apple.developer.associated-domains"
