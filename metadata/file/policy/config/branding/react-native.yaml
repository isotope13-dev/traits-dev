defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
traits:
  - id: ios-splashscreen-imageset
    desc: iOS splashscreen image set
    if:
      type: text
      substr: "Splashscreen.imageset"
  - id: android-launcher-mipmap-density
    desc: Android launcher mipmap densities
    if:
      type: text
      substr: "mipmap-xxxhdpi"
  - id: react-native-splash-assets
    desc: React Native splash asset update
    if:
      type: symbol
      exact: applySplashScreen
composite_rules:
  - id: mobile-branding-asset-update
    desc: Mobile branding asset update
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: ios-splashscreen-imageset
      - id: android-launcher-mipmap-density
      - id: react-native-splash-assets
