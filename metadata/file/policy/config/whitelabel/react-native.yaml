defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]
  crit: notable
  conf: 0.85
traits:
  - id: react-native-white-label-package
    desc: React Native white-label package
    for: [package.json]
    if:
      type: value
      path: keywords
      regex: ^white-label$
  - id: react-native-white-label-title
    desc: React Native white-label title
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: "RNWL - React Native White Label"
  - id: white-label-apply-command
    desc: White-label apply command
    if:
      type: symbol
      exact: applyWhiteLabel
  - id: white-label-config-loader
    desc: White-label YAML config loader
    crit: component
    if:
      type: symbol
      exact: loadConfig
  - id: rnwl-config-path
    desc: RNWL config path reference
    crit: baseline
    if:
      type: text
      substr: "rnwl-configs"
  - id: rnwl-output-manifest
    desc: RNWL output manifest write
    crit: baseline
    if:
      type: text
      substr: "rnwl.json"
composite_rules:
  - id: react-native-white-label-config-tool
    desc: React Native white-label config tool
    crit: notable
    conf: 0.92
    needs: 2
    any:
      - id: metadata/file/policy/config/whitelabel
