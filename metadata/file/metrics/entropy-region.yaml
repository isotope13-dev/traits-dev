# Windowed Peak-Entropy Region (neutral file-level measurements)
#
# From the filefacts windowed entropy scan (binary.peak_region_*): the file's
# peak 1 KiB-window entropy, the total mass of data at that level, and where its
# largest contiguous block sits. Unlike whole-file or section entropy, these
# survive averaging — a small encrypted stage buried in low-entropy padding (a
# 52 KiB blob at 8.0 inside 76 MiB of zeros) still shows a high peak even though
# the file and its enclosing section both read ~3.1.
#
# Pure measurements, no intent — that is why they live under metadata/. The
# concealment objective composites in
# objectives/anti-static/obfuscation/payload/encrypted/ infer a hidden payload
# by pairing a high peak with a low whole-file entropy.
#
# Binaries and scripts are split deliberately: a compiled payload is raw
# cipher/compressed bytes (~8.0) in section padding, while a script embeds an
# encoded blob (base64 caps at 6.0) in readable source, so both the entropy
# floor and the meaningful payload size differ.
defaults:
  platforms: [windows, unix]
  crit: component
  conf: 0.85
traits:
  - id: peak-region-cipher-entropy
    desc: Peak 1KB region at cipher entropy
    for: [binaries]
    if:
      type: metrics
      field: binary.peak_region_entropy
      min: 7.5
  - id: concealed-payload-mass-8k
    desc: High-entropy region mass over 8KB
    for: [binaries]
    if:
      type: metrics
      field: binary.peak_region_bytes
      min: 8192
  - id: peak-region-encoded-entropy
    desc: Peak region at encoded-blob entropy
    conf: 0.8
    for: [scripts]
    if:
      type: metrics
      field: binary.peak_region_entropy
      min: 6.0
  - id: concealed-payload-mass-1k
    desc: High-entropy region mass over 1KB
    conf: 0.8
    for: [scripts]
    if:
      type: metrics
      field: binary.peak_region_bytes
      min: 1024
  - id: low-overall-entropy-source
    desc: Script overall entropy stays low
    crit: baseline
    conf: 0.9
    for: [scripts]
    if:
      type: metrics
      field: binary.overall_entropy
      max: 5.0
