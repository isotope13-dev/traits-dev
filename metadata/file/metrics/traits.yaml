defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]

traits:
  - id: js-deep-callback-nesting
    desc: Deep callback nesting in script
    crit: baseline
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: metrics
      field: functions.max_nesting_depth
      min: 8
    unless:
      - id: metadata/library/upload/
      - id: metadata/library/structure/

  - id: high-digit-character-ratio
    desc: File has high digit-character ratio
    crit: baseline
    conf: 0.85
    for: [javascript, typescript]
    size_min: 5000
    size_max: 500000
    unless:
      - id: metadata/package/testing/
      - id: metadata/library/structure/
      - id: metadata/file/extension/identity::c3-source-basename
    if:
      type: metrics
      field: text.digit_ratio
      min: 0.25

  - id: js-dense-subtraction-arithmetic
    desc: JavaScript has dense subtraction arithmetic
    crit: baseline
    conf: 0.94
    for: [javascript, typescript]
    size_min: 32768
    if:
      type: metrics
      field: ast.op.sub
      min: 1000

  - id: high-average-string-entropy
    desc: High average string entropy metric
    crit: baseline
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.5
      min_size: 4096

  - id: python-high-entropy-strings
    desc: Python contains 3+ high-entropy strings
    crit: baseline
    conf: 0.85
    for: [python]
    size_min: 4096
    size_max: 50000
    if:
      type: metrics
      field: strings.high_entropy_count
      min: 3

  - id: high-text-entropy
    desc: High overall text entropy
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.char_entropy
      min: 5.7
    unless:
      - type: basename
        regex: '\.(s|S|asm)$'
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/file/extension/identity::markdown-file-basename
      - type: basename
        regex: '\.sh\.in$'
      - type: basename
        regex: '(?i)(i18n|l10n|locale)\.'
      - type: basename
        regex: '(?i)translations?\.'
      - type: path
        regex: '(?i)[\\/](i18n|l10n|locale)[\\/]'

  - id: file-has-30-plus-lines
    desc: File has 30 or more lines
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: text.total_lines
      min: 30

  - id: file-one-liner
    desc: File is a one-liner
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: text.total_lines
      max: 1

  - id: single-long-line
    desc: Very long line
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: text.max_line_length
      min: 500

  # A long line is a neutral structural observation. Generated, compacted, and
  # bootstrap scripts can all contain one without being obfuscated.
  - id: powershell-long-line
    desc: PowerShell contains a line over 1000 characters
    crit: notable
    conf: 0.85
    for: [powershell]
    if:
      type: metrics
      field: text.max_line_length
      min: 1000

  - id: powershell-long-average-line-profile
    desc: PowerShell has long average lines
    crit: notable
    conf: 0.85
    for: [powershell]
    if:
      type: metrics
      field: text.avg_line_length
      min: 140
      min_size: 4096
    unless:
      - type: path
        regex: '(^|[\\/])\.git([\\/]|$)'

  - id: powershell-single-giant-identifier
    desc: PowerShell has an identifier over 100 KB
    crit: notable
    conf: 0.95
    for: [powershell]
    size_min: 100000
    if:
      type: metrics
      field: identifiers.max_length
      min: 100000

  - id: powershell-single-identifier-body
    desc: PowerShell parses as one identifier
    crit: component
    conf: 0.95
    for: [powershell]
    if:
      type: metrics
      field: identifiers.total
      max: 1

  - id: powershell-minimal-ast-body
    desc: PowerShell has a minimal parsed syntax tree
    crit: component
    conf: 0.9
    for: [powershell]
    size_min: 100000
    if:
      type: metrics
      field: ast.node_count
      max: 6

  - id: multiple-lines-over-1000-chars
    desc: Multiple source lines exceed 1000 characters
    # Long generated/minified lines are a useful structural observation, but
    # are common in legitimate browser bundles. Intent-specific obfuscation
    # composites add the suspicious verdict when corroborating evidence exists.
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    size_min: 32768
    size_max: 3145728
    entropy_min: 4.2
    if:
      type: metrics
      field: text.lines_over_1000
      min: 4
    not:
      - regex: \.nib$

  - id: js-many-very-long-strings
    desc: Many long JavaScript strings
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    size_min: 131072
    if:
      type: metrics
      field: strings.very_long_strings
      min: 10

  - id: js-high-encoded-string-ratio
    desc: High encoded-string ratio in JavaScript
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    size_min: 131072
    if:
      type: metrics
      field: text.encoded_string_ratio
      min: 0.6

  - id: many-constant-return-functions
    desc: File has many constant-return functions
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: metrics
      field: ast.const_return_function_count
      min: 100

  - id: constant-return-functions-dominate-file
    desc: Constant-return functions dominate file
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: metrics
      field: ast.const_return_function_ratio
      min: 0.9

  - id: high-comment-to-code-ratio
    desc: High comment-to-code ratio
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: comments.to_code_ratio
      min: 0.35

  # Neutral source-shape measurement. HTML pages can be heuristically
  # classified as JavaScript when they have no extension.
  - id: very-low-comment-ratio
    desc: Very low comment-to-code ratio in script
    crit: notable
    conf: 0.7
    for: [scripts]
    size_min: 32768
    if:
      type: metrics
      field: comments.to_code_ratio
      max: 0.008
    unless:
      - id: metadata/document/html::doctype
      - id: metadata/package/testing/harness/runtime/
      - type: text
        regex: automatically generated|DO NOT MODIFY BY HAND
      - id: metadata/lang/source/

  - id: high-whitespace-ratio
    desc: High whitespace ratio
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: text.whitespace_ratio
      min: 0.6

  - id: many-functions-50-generic
    desc: File has 50 or more functions
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: functions.count
      min: 50

  - id: binary-code-size-50k
    desc: Binary code size is at least 50KB
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: binary.code_size
      min: 50000

  # A source/script file whose parsed AST is degenerate (almost no nodes) despite
  # carrying real byte content — the declared language could not parse the bytes.
  # Neutral structural measurement (truncated or odd-but-valid files can hit it
  # too); it becomes a disguise signal only when an objective composite pairs it
  # with other evidence. Measured baseline: genuine source files parse to >=40
  # nodes; a foreign-language body under the wrong extension stays in single digits.
  - id: source-degenerate-ast
    desc: Source parses to a degenerate AST
    crit: component
    conf: 0.85
    for: [scripts]
    size_min: 64
    if:
      type: metrics
      field: ast.node_count
      max: 5
    unless:
      - id: metadata/file/metrics::comment-led-one-line

  - id: comment-led-one-line
    desc: One-line source begins with comment marker
    crit: component
    conf: 0.99
    for: [scripts]
    size_max: 1024
    if:
      type: text
      regex: '(?s)^# [A-Za-z][^\r\n]{0,510}$'

  - id: python-large-numeric-array-literal
    desc: Python large numeric array literal
    crit: baseline
    conf: 0.9
    for: [python]
    ref: sha256:dac44df17c6c4359112f27d4259c0a49fd4b25f31823f73f90e5e290f85173ec
    if:
      type: metrics
      field: ast.numeric_array_max_length
      min: 200

  - id: file-under-12-lines
    desc: Very short file (under 12 lines)
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: text.total_lines
      max: 12

  - id: python-under-120-lines
    desc: Python file under 120 lines
    crit: component
    conf: 0.65
    for: [python]
    if:
      type: metrics
      field: text.total_lines
      max: 120
    unless:
      - type: basename
        regex: '\.rb\.erb$'

  - id: script-many-imports-300
    desc: Source/script file has 300+ imports
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: imports.count
      min: 300

  - id: script-many-shell-command-strings-100
    desc: Script has 100+ shell-command-like strings
    crit: notable
    conf: 0.88
    # Pure structural measurement of how many string literals resemble shell
    # commands. High on packed loaders, but also on large ML/WASM glue bundles
    # (op names, shader source). Intent + FP suppression belong on the composites
    # that reference it, not on this count.
    if:
      type: metrics
      field: strings.shell_command_strings
      min: 100

  - id: script-many-imports-10-small
    desc: Small source file (<=10KB) with 10+ imports
    crit: component
    conf: 0.5
    size_max: 10240
    if:
      type: metrics
      field: imports.count
      min: 10

  - id: few-comment-lines
    desc: Five or fewer comment lines in file
    crit: component
    conf: 0.5
    if:
      type: metrics
      field: comments.lines
      max: 5

  - id: javascript-small-file-5k
    desc: JavaScript file under 5KB
    crit: component
    conf: 0.7
    for: [javascript]
    size_max: 5120
    unless:
      - type: basename
        regex: '(?i)^Dockerfile$'
      - id: metadata/package/testing/harness/unit/
  - id: tiny-javascript-file-lines
    desc: Tiny JavaScript file lines
    crit: component
    conf: 0.9
    for: [javascript]
    size_max: 8192
    if:
      type: metrics
      field: text.total_lines
      max: 5
  - id: tiny-javascript-file-size
    desc: Tiny JavaScript file size
    crit: component
    conf: 0.9
    for: [javascript]
    size_max: 256
    if:
      type: path
      basename: true
      regex: ^.{1,120}\.(js|cjs|mjs)$

  - id: imports-unique-modules-50
    desc: Source has many import modules
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 50
  - id: imports-unique-modules-60
    desc: Source has large import graph
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 60
  - id: low-string-density-large-file
    desc: Low string density in source
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    size_min: 4096
    if:
      type: metrics
      field: text.string_density
      max: 0.9
  - id: no-comments-code
    desc: Source has no comments
    crit: component
    conf: 0.6
    for: [scripts, -php, binaries]
    if:
      type: metrics
      field: comments.total
      max: 0
      min_size: 2048
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        regex: \.(Rd|html?|md|xsd)$
      - type: basename
        regex: \.(xml|dart)$
      - id: metadata/build/bundler::esmodule-bundled
      - id: metadata/lang/source::windows-generated-def-path
      - id: metadata/lang/source/
  - id: small-source-low-comment-ratio
    desc: Small source file has very few comments
    crit: component
    conf: 0.65
    size_min: 1000
    size_max: 10000
    for: [scripts, -php, binaries]
    if:
      type: metrics
      field: comments.to_code_ratio
      max: 0.02
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/lang/source/
  - id: high-function-density
    desc: High function density
    crit: baseline
    conf: 0.85
    unless:
      - id: metadata/library/structure::js-umd-wrapper-minified
      - id: metadata/library/structure::js-umd-wrapper-amd-minified
      - id: metadata/file/format::sourcemap-sources-content
      - id: well-known/lib/influxdb3-js
      - id: well-known/lib/protobuf-ts
      - id: well-known/lib/apache-arrow
    if:
      type: metrics
      field: functions.density_per_100_lines
      min: 20
      min_size: 1024

  - id: high-entropy-identifiers
    desc: High entropy identifiers
    crit: baseline
    conf: 0.85
    if:
      type: metrics
      field: identifiers.avg_entropy
      min: 3.0
      min_size: 2048
    unless:
      - type: metrics
        field: identifiers.total
        max: 64
      - type: path
        regex: '(^|[\\/])bin[\\/]tests[\\/]system[\\/]'
      - type: metrics
        field: identifiers.avg_length
        min: 12.5
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/

  - id: high-entropy-identifier-ratio
    desc: High ratio of entropy-heavy identifiers
    crit: baseline
    conf: 0.85
    size_min: 4096
    size_max: 500000
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.35
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/
      - type: metrics
        field: identifiers.avg_length
        min: 14.0

  - id: many-no-param-functions
    desc: Many no-param functions
    crit: baseline
    conf: 0.75
    size_min: 5000
    if:
      type: metrics
      field: functions.no_params_count
      min: 25
    unless:
      # Bundlers emit dozens of zero-arg helpers by design.
      - id: metadata/library/structure/
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-rollup-bundle
      - id: metadata/library/structure::js-closure-compiled-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/build/bundler::source-region-bundled
  - id: low-whitespace
    desc: Very low whitespace ratio (minified/compressed)
    crit: baseline
    conf: 0.7
    unless:
      - id: metadata/file/format/
      - id: metadata/lang/source::windows-generated-def-path
      - type: metrics
        field: imports.unique_modules
        min: 100
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.1
      min_size: 2048
  - id: js-readable-source-context
    desc: Readable JavaScript source context
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: metrics
      field: text.whitespace_ratio
      min: 0.20
  - id: js-typescript-source-file-context
    desc: TypeScript source file context
    crit: component
    conf: 0.9
    for: [typescript]
    if:
      type: basename
      regex: '\.ts$'
  - id: shell-multiple-local-assignments
    desc: Several local variable assignments
    crit: baseline
    conf: 0.6
    for: [shell]
    if:
      type: metrics
      field: binds.count
      min: 2
    unless:
      - id: micro-behaviors/os/env/vars/access::shell-export-env-assignments
composite_rules:
  - id: js-assign-common-root-known-benign-context
    desc: Known benign global-object alias context
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    any:
      - id: js-readable-source-context
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/jquery::fn-extend
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/tool/development/vscode-svelte::extension-bundle
      - id: well-known/lib/pathway::python-package
      - id: js-typescript-source-file-context

  - id: constant-return-function-table-layout
    desc: Constant-return function table layout
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: many-constant-return-functions
      - id: constant-return-functions-dominate-file
