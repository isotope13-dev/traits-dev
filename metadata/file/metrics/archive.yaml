defaults:
  platforms: [windows, unix]
  for: [archive]
  crit: baseline
  conf: 0.9

traits:
  - id: archive-parse-error
    desc: Archive parser reported errors
    for: [archives]
    unless:
      - type: basename
        regex: '(?i)\.(tar\.(gz|bz2|xz|zst)|t(gz|bz2|xz|zst))$'
    if:
      type: metrics
      field: parse.error_count
      min: 1

  - id: high-entropy-archive
    desc: Archive has near-maximum entropy
    size_min: 1048576
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.95

  - id: archive-high-compression-expansion
    desc: Archive has extreme compression expansion
    crit: notable
    conf: 0.95
    for: [archive, archives, zip]
    if:
      type: metrics
      field: archive.zip_bomb_ratio
      min: 100

  - id: archive-many-compressed-members
    desc: Archive has many members
    crit: baseline
    conf: 0.9
    for: [archive, archives, zip]
    if:
      type: metrics
      field: archive.file_count
      min: 100

  - id: archive-large-uncompressed-total
    desc: Archive expands to large uncompressed size
    crit: notable
    conf: 0.92
    for: [archive, archives, zip]
    if:
      type: metrics
      field: archive.total_uncompressed
      min: 1073741824
