defaults:
  platforms: [windows, unix]
  for: [archive]
  crit: baseline
  conf: 0.9

traits:
  - id: archive-parse-error
    desc: Archive parser reported errors
    for: [archives]
    if:
      type: metrics
      field: parse.error_count
      min: 1

  - id: high-entropy-archive
    desc: Archive has near-maximum entropy
    size_min: 1048576
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.95
