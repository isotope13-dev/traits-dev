defaults:
  platforms: [windows, unix]
  for: [archive, data]
  crit: component
  conf: 0.9

traits:
  - id: sha256-hex-basename
    desc: SHA256-like hex filename
    if:
      type: basename
      regex: '(?i)^[a-f0-9]{64}(\.(7z|zip|rar|gz|xz|zst|bin|dat))?$'

  - id: near-maximum-entropy-file
    desc: File has near-maximum entropy
    size_min: 262144
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.98

composite_rules:
  - id: sha256-named-high-entropy-file
    desc: SHA256-named high-entropy file
    crit: suspicious
    conf: 0.8
    all:
      - id: sha256-hex-basename
      - id: near-maximum-entropy-file
