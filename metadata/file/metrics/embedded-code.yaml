# Neutral source metrics reported by filefacts. Code-like strings can be
# examples, templates, generated source, or runtime payloads; intent must come
# from a higher-tier composite that combines this count with other behavior.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, powershell]
  crit: baseline

traits:
  - id: embedded-code-candidates-6
    desc: Source has 6+ code-like string candidates
    conf: 0.8
    size_max: 500000
    if:
      type: metrics
      field: strings.embedded_code_candidates
      min: 6

  - id: embedded-code-candidates-10
    desc: Source has 10+ code-like string candidates
    conf: 0.9
    size_max: 500000
    if:
      type: metrics
      field: strings.embedded_code_candidates
      min: 10
