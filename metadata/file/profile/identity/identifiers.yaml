defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: baseline
  conf: 0.8
traits:
  - id: sequential-identifiers
    desc: Sequential source identifier names
    size_min: 1024
    size_max: 1000000
    if:
      type: metrics
      field: identifiers.sequential_names
      min: 6
  - id: py-many-underscore-prefix-identifiers
    desc: 'High count of underscore-prefixed Python IDs'
    for: [python]
    conf: 0.7
    size_max: 50000
    if:
      type: metrics
      field: identifiers.underscore_prefix_count
      min: 8
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - type: raw
        regex: 'class\s+\w+\s*\('
  - id: rust-random-name-module
    desc: Rust random name helper module
    crit: component
    conf: 0.88
    for: [rust]
    if:
      type: text
      substr: random::random_name
