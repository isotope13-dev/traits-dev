defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: baseline
  conf: 0.8
traits:
  - id: generated-attack-map-python
    desc: Generated Python ATT&CK mapping data file
    crit: notable
    conf: 1.0
    for: [python]
    if:
      type: basename
      exact: attack_map.py
      case_insensitive: false

  - id: generated-attack-map-header
    desc: Generated ATT&CK mapping source header
    crit: notable
    conf: 1.0
    for: [python]
    if:
      type: text
      substr: DO NOT EDIT! Re-run the script instead

  - id: hidden-atomic-update-staging-path
    desc: Hidden atomic-update staging path
    crit: notable
    conf: 1.0
    for: [scripts, shell]
    if:
      type: text
      regex: '/usr/local/(bin|libexec)/\.\w[\w-]{2,}\.new\b'

  - id: sequential-identifiers
    desc: Sequential source identifier names
    size_min: 1024
    size_max: 1000000
    if:
      type: metrics
      field: identifiers.sequential_names
      min: 6
  - id: py-many-underscore-prefix-identifiers
    desc: Python has many underscore-prefixed identifiers
    for: [python]
    conf: 0.7
    size_max: 50000
    if:
      type: metrics
      field: identifiers.underscore_prefix_count
      min: 8
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - type: raw
        regex: 'class\s+\w+\s*\('
  - id: rust-random-name-module
    desc: Rust random name helper module
    crit: component
    conf: 0.88
    for: [rust]
    if:
      type: text
      substr: random::random_name
  - id: go-cli-command-basename
    desc: Go source named exec.go or export.go
    crit: component
    conf: 1.0
    for: [go]
    if:
      type: basename
      regex: '^(export|exec)\.go$'
  - id: js-compact-hyphenated-identifier
    desc: Compact hyphenated JavaScript identifier
    crit: component
    conf: 0.7
    for: [javascript]
    if:
      type: string_literal
      regex: '^[0-9]+-[a-z]{3,15}[0-9]{1,4}$'

composite_rules:
  - id: generated-attack-map-context
    desc: Generated Python ATT&CK mapping context
    crit: exception
    conf: 1.0
    for: [python]
    all:
      - id: generated-attack-map-python
      - id: generated-attack-map-header
