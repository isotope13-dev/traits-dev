defaults:
  platforms: [windows, unix]
  for: [text, data, markdown]
traits:
  - id: install-doc-basename
    desc: Installation documentation basename
    crit: component
    conf: 0.85
    if:
      type: path
      basename: true
      regex: '(^|[\\/])(README|REQUIREMENTS|INSTALL)(\.[A-Za-z0-9]+)?$'
  - id: static-doc-html-shell
    desc: Static documentation HTML shell
    crit: component
    conf: 0.88
    # PHP files frequently serve captured static HTML; the leading document
    # shell is still the same benign documentation context.
    for: [html, javascript, php]
    if:
      type: text
      regex: '(?is)^\s*<!doctype html>\s*<html\b'
  - id: documentation-page-term
    desc: Documentation page terminology
    crit: component
    conf: 0.82
    for: [html, javascript]
    if:
      type: text
      regex: '(?i)\b(documentation|docs|reference|manual)\b'
  - id: mkdocs-material-page
    desc: MkDocs Material page marker
    crit: component
    conf: 0.95
    for: [html, javascript]
    if:
      type: text
      regex: 'squidfunk\.github\.io/mkdocs-material|data-md-component=|md-header|md-main'

composite_rules:
  - id: static-documentation-html-page
    desc: Static documentation HTML page
    crit: component
    conf: 0.9
    for: [html, javascript]
    all:
      - id: static-doc-html-shell
      - id: documentation-page-term
  - id: generated-documentation-page
    desc: Generated documentation web page
    crit: component
    conf: 0.92
    for: [html, javascript]
    any:
      - id: static-documentation-html-page
      - id: mkdocs-material-page
