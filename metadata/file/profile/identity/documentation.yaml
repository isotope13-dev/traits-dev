defaults:
  platforms: [windows, unix]
  for: [text, data, markdown]
traits:
  - id: install-doc-basename
    desc: Installation documentation basename
    crit: component
    conf: 0.85
    if:
      type: path
      basename: true
      regex: '(^|[\\/])(README|REQUIREMENTS|INSTALL)(\.[A-Za-z0-9]+)?$'
  - id: documentation-page-term
    desc: Documentation page terminology
    crit: component
    conf: 0.82
    for: [html, javascript]
    if:
      type: text
      regex: '(?i)\b(documentation|docs|reference|manual)\b'
  - id: mkdocs-material-page
    desc: MkDocs Material page marker
    crit: component
    conf: 0.95
    for: [html, javascript]
    if:
      type: text
      regex: 'squidfunk\.github\.io/mkdocs-material|data-md-component=|md-header|md-main'
  - id: docusaurus-docs-source
    desc: Docusaurus documentation source marker
    crit: component
    conf: 0.95
    for: [html, javascript]
    if:
      type: text
      regex: '["'']source["'']\s*:\s*["'']@site/docs/'
  - id: webpack-docs-chunk-global
    desc: Webpack documentation chunk global
    crit: component
    conf: 0.95
    for: [html, javascript]
    if:
      type: text
      regex: 'webpackChunk[A-Za-z0-9_$-]*docs'
  - id: static-html-shell
    desc: Static HTML document shell
    crit: component
    conf: 0.95
    for: [html, javascript, php]
    if:
      type: text
      # Accept both HTML5 and legacy PUBLIC/SYSTEM doctypes.
      regex: '(?is)^\s*<!doctype\s+html(\s+.{0,200})?>\s*<html\b'

composite_rules:
  - id: static-documentation-html-page
    desc: Static documentation HTML page
    crit: component
    conf: 0.9
    for: [html, javascript]
    all:
      - id: static-html-shell
      - id: documentation-page-term
  - id: docusaurus-docs-bundle
    desc: Generated Docusaurus documentation bundle
    crit: component
    conf: 0.95
    for: [html, javascript]
    all:
      - id: docusaurus-docs-source
      - id: webpack-docs-chunk-global
  - id: generated-documentation-page
    desc: Generated documentation web page
    crit: component
    conf: 0.92
    for: [html, javascript]
    any:
      - id: static-documentation-html-page
      - id: mkdocs-material-page
      - id: docusaurus-docs-bundle
