defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: devtools-injected-script-basename
    desc: Chrome DevTools injected script basename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: '^(debugger(Halter)?|consoleInjected|commandLineInjected)\.js$'
      case_insensitive: true
