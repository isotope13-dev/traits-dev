# Text Script Wrapper Structure
defaults:
  crit: baseline
  for: [shell, batch, text]
  platforms: [unix, windows]
traits:
- id: crlf-line-endings
  desc: CRLF-delimited wrapper header
  conf: 0.8
  if:
    type: raw
    exact: "filterword=\"su\"\r\n\r\noriginalps=/bin/.ps"
    section: .text
- id: missing-shebang-shell-wrapper
  desc: Shell-like script without shebang
  conf: 0.88
  if:
    type: raw
    exact: "filterword=\"su\"\r\n\r\noriginalps=/bin/.ps\r\ntempfile=/tmp/.pstmp"
    section: .text
  crit: baseline
  unless:
  - id: metadata/lang/shebang::sh
  - id: metadata/lang/shebang::zsh
  - id: metadata/lang/shebang::dash
- id: tiny-text-script
  desc: Tiny multi-line text script
  conf: 0.75
  size_max: 2048
  if:
    type: metrics
    field: "text.total_lines"
    min: 10
    max: 80
- id: common-node-lifecycle-script-basename
  desc: Common Node.js lifecycle-script filename
  crit: component
  conf: 0.8
  for: [javascript, typescript]
  if:
      type: basename
      regex: ^(install|publish|windowsPtyAgent|benchclean)\.js$
- id: node-post-install-script-basename
  desc: Node.js post-install script filename
  crit: baseline
  conf: 0.8
  for: [javascript, typescript]
  if:
    type: basename
    exact: post-install.js
composite_rules: []
