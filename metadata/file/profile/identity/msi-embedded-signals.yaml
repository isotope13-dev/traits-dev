defaults:
  platforms: [windows]
  for: [all]
traits:
  - id: msi-bytes-enforced-runasadmin
    desc: EnforcedRunAsAdmin elevation marker
    crit: suspicious
    conf: 0.99
    attack: T1548.002
    if:
      type: text
      substr: EnforcedRunAsAdmin
  - id: msi-bytes-advanced-installer-product
    desc: Advanced Installer product identity string
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'Advanced Installer'
