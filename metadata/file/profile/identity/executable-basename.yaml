defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: updater-style-pe-basename
    desc: Updater-style Windows executable basename
    if:
      type: basename
      exact: Update.exe
      case_insensitive: true

  - id: setup-style-pe-basename
    desc: Setup-style Windows executable basename
    if:
      type: basename
      regex: (?i)^(Setup|OneDriveStandaloneUpdater)\.exe$
