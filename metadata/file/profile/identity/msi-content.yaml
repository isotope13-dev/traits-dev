defaults:
  platforms: [windows]
  for: [all]
  crit: baseline
  conf: 0.9
traits:
  - id: msi-format-database-title
    desc: Windows Installer database title
    conf: 0.98
    if:
      type: text
      exact: Installation Database
  - id: msi-delphi-runtime-bundle
    desc: MSI bundles Delphi runtime packages
    crit: notable
    if:
      type: text
      regex: '(rtl|vcl|vclx)[0-9]{2,3}\.bpl'
  - id: msi-disguised-backup-component
    desc: MSI disguises a component as backup
    crit: suspicious
    if:
      type: text
      regex: '[A-Za-z0-9_]{3,40}\.(bak|tmp)\|[A-Za-z0-9_]{3,40}\.(bak|tmp)'
  - id: msi-madcollection-runtime-bundle
    desc: MSI bundles madCollection runtimes
    crit: notable
    if:
      type: text
      regex: 'mad(disAsm|except|basic)_[0-9]*\.bpl'
  - id: msi-runtime-file-table-pair
    desc: MSI File table contains NGenTask entry
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: ngentask.exe
  - id: msi-runtime-launch-action
    desc: MSI custom action launches packaged executable
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: LaunchApp

  - id: msi-memu-runtime-file-family
    desc: MSI File table contains MEmu runtime library
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: libmemu.dll

  - id: msi-launchfile-custom-action
    desc: MSI CustomAction table has LaunchFile
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?is)CustomAction.{0,512}LaunchFile'
