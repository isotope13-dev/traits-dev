defaults:
  platforms: [windows]
  for: [all]
  crit: baseline
  conf: 0.9
traits:
  - id: msi-format-database-title
    desc: Windows Installer database title
    conf: 0.98
    if:
      type: text
      exact: Installation Database
  - id: msi-delphi-runtime-bundle
    desc: MSI bundles Delphi runtime packages
    crit: notable
    if:
      type: text
      regex: '(rtl|vcl|vclx)[0-9]{2,3}\.bpl'
  - id: msi-disguised-backup-component
    desc: MSI disguises a component as backup
    crit: suspicious
    if:
      type: text
      regex: '[A-Za-z0-9_]{3,40}\.(bak|tmp)\|[A-Za-z0-9_]{3,40}\.(bak|tmp)'
  - id: msi-madcollection-runtime-bundle
    desc: MSI bundles madCollection runtimes
    crit: notable
    if:
      type: text
      regex: 'mad(disAsm|except|basic)_[0-9]*\.bpl'
  - id: msi-runtime-file-table-pair
    desc: MSI file table pairs NGenTask with mscorsvc
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?is)ngentask\.exe.{0,80}mscorsvc\.dll'
