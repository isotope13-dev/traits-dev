defaults:
  platforms: [windows]
  # These markers describe Windows PE/IExpress content and Windows Installer
  # databases; keep them out of unrelated source and document files.
  for: [pe, oledoc]
  crit: notable
  conf: 0.99

traits:
  - id: iexpress-autoit-stage
    desc: IExpress package embeds an AutoIt script stage
    if:
      type: text
      regex: '(?i)"?AutoIt3\.exe"?\s+[^\r\n"]{0,80}\.a3x\b'
  - id: iexpress-wextract-manifest
    desc: IExpress extraction-tool manifest marker
    if:
      type: text
      substr: '<description>IExpress extraction tool</description>'
