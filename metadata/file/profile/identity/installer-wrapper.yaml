defaults:
  platforms: [windows]
  for: [all]
  crit: notable
  conf: 0.99

traits:
  - id: msi-wrapper-internet-explorer-title
    desc: MSI Wrapper title claims Internet Explorer
    if:
      type: text
      regex: '(?i)Internet Explorer.{0,80}Wrapped using MSI Wrapper'
  - id: iexpress-autoit-stage
    desc: IExpress package embeds an AutoIt script stage
    if:
      type: text
      regex: '(?i)AutoIt3\.exe.{0,80}\.a3x\b'
  - id: iexpress-wextract-manifest
    desc: IExpress extraction-tool manifest marker
    if:
      type: text
      substr: '<description>IExpress extraction tool</description>'
  - id: msi-wrapper-microsoft-author
    desc: MSI Wrapper package claims Microsoft
    if:
      type: text
      regex: '(?i)Author.{0,32}Microsoft Corporation'
