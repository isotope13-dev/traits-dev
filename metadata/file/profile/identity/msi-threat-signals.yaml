defaults:
  platforms: [windows]
  for: [oledoc]

traits:
  - id: spk2-pack-header
    desc: MSI carries an SPK2 pack header
    crit: notable
    conf: 0.99
    if:
      type: raw
      regex: 'SPK[2]'

  - id: high-entropy-msi-container
    desc: MSI has near-maximum overall entropy
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.9

  - id: native-node-loader-filename
    desc: MSI carries native Node loader boot.node
    crit: notable
    conf: 0.98
    if:
      type: raw
      regex: '(?i)boot\.node'

  - id: wsh-launcher-marker
    desc: WSH launcher marker in MSI
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: '(?i)\bwscript\b'

  - id: command-script-node-layout
    desc: Command launcher and JavaScript entry names
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: '(?i)launch\.cmd.{0,160}main\.js|main\.js.{0,160}launch\.cmd'
