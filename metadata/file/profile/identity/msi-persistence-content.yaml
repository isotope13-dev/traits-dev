defaults:
  platforms: [windows]
  for: [all]
  crit: notable
  conf: 0.97

traits:
  # MSI table text remains visible even when its cabinet is compressed.
  - id: msi-run-value-executable-target
    desc: MSI Run value targets installed executable
    attack: T1547.001
    if:
      type: text
      regex: '(?is)CurrentVersion\\Run.{0,160}(#|\.exe)'
  - id: msi-application-frame-host-alias
    desc: MSI names Application Frame Host executable
    attack: T1036.005
    if:
      type: text
      substr: Application Frame Host.exe
  - id: msi-svchost-alias
    desc: MSI names svchost executable
    attack: T1036.005
    if:
      type: text
      substr: svchost.exe
  - id: msi-runtime-broker-alias
    desc: MSI names Runtime Broker executable
    attack: T1036.005
    if:
      type: text
      substr: Runtime Broker.exe
  - id: msi-search-host-alias
    desc: MSI names Windows search host executable
    attack: T1036.005
    if:
      type: text
      regex: '(?i)(SearchProtocolHost|SearchFilterHost)\.exe'
