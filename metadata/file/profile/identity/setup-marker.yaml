defaults:
  platforms: [windows]
  for: [binaries]
  crit: notable
  conf: 0.99

traits:
  - id: setup-program-text
    desc: Windows installer program-name text marker
    if:
      type: text
      substr: Setup Program

composite_rules:
  - id: installer-marker
    desc: Windows installer identity marker
    crit: notable
    conf: 0.99
    all:
      - id: metadata/file/profile/identity::setup-style-pe-basename
      - id: setup-program-text
