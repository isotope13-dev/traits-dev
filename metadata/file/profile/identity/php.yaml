defaults:
  platforms: [windows, unix]
  for: [php]
  crit: baseline
traits:
  - id: php-fpm-basename
    desc: File named as PHP-FPM utility
    crit: notable
    conf: 0.95
    if:
      type: basename
      regex: '^php-fpm(\.php)?$'
      case_insensitive: true
  - id: tiny-size
    desc: Tiny PHP script footprint
    conf: 0.85
    size_min: 40
    size_max: 96
  - id: sparse-strings
    desc: Sparse string pool in PHP
    conf: 0.82
    size_max: 128
    if:
      type: metrics
      field: strings.total
      max: 6
  - id: single-char-skew
    desc: Single-character variable skew
    conf: 0.8
    size_max: 128
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.6
  - id: single-import
    desc: Single imported capability only
    conf: 0.8
    size_max: 128
    if:
      type: metrics
      field: imports.count
      max: 1
composite_rules:
  - id: tiny-stager-profile
    desc: Tiny sparse PHP script profile
    crit: component
    conf: 0.92
    needs: 3
    any:
      - id: tiny-size
      - id: sparse-strings
      - id: single-char-skew
      - id: single-import
