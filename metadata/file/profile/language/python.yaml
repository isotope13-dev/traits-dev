defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: large-unparsed-source-corpus
    desc: Large Python source corpus without parse facts
    crit: notable
    conf: 0.98
    size_min: 1048576
    if:
      type: metrics
      field: text.ast_parse_errors
      min: 1
  - id: chinese-char-variables
    desc: Chinese character variables
    crit: notable
    conf: 0.9
    count_min: 3
    unless:
      - type: basename
        regex: \.pyz$
      - type: text
        substr: b"Source"
      - type: text
        substr: 羜=
    if:
      type: text
      regex: "(?m)^[ \\t]*[一-鿿]+\\s*="
