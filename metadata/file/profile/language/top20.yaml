defaults:
  platforms: [unix, windows]
  for: [scripts, binaries, documents, source]

traits:
  - id: lang-english
    desc: Contains common English function words
    crit: baseline
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(the|and|that|have|for|with|this)\b'

  - id: script-han
    desc: Contains Han-script text
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\p{Han}{3,}'
    unless:
      # Bundled Unicode identifier tables contain Han code-point ranges; those
      # ranges are not localized prose in the file being scanned.
      - type: text
        regex: '(?s)\bID_Start\b.{0,240}\bID_Continue\b'
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/file/extension/identity::squashfs-container-filename
      # Generated Unicode identifier tables are code-point data, not prose.
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: lang-hindi-marathi
    desc: Contains Devanagari script
    crit: notable
    conf: 0.8
    size_max: 1000000
    if:
      type: text
      regex: '\p{Devanagari}{3,}'
    unless:
      - type: text
        substr: Unicode Character Database
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: lang-spanish
    desc: Spanish language detection
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(pero|como|donde|cuando|quien|mucho|usted)\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: lang-french
    desc: French language detection
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(dans|avec|nous|vous|cette)\b'

  - id: lang-arabic-urdu
    desc: Contains Arabic or Urdu script
    crit: notable
    conf: 0.8
    size_max: 1000000
    if:
      type: text
      regex: '\p{Arabic}{3,}'
    unless:
      # Bundled Unicode identifier tables contain Arabic code-point ranges;
      # those ranges are not localized prose in the file being scanned.
      - type: text
        regex: '(?s)\bID_Start\b.{0,240}\bID_Continue\b'
      - type: text
        substr: Unicode Character Database
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: lang-bengali
    desc: Contains Bengali script
    crit: notable
    conf: 0.8
    size_max: 1000000
    if:
      type: text
      regex: '\p{Bengali}{3,}'
    unless:
      - type: text
        substr: Unicode Character Database
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: script-cyrillic
    desc: Contains a Cyrillic script sequence
    crit: notable
    conf: 0.8
    size_max: 1000000
    if:
      type: text
      regex: '\p{Cyrillic}{3,}'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - type: text
        substr: Unicode Character Database
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-buildinfo
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: lang-portuguese
    desc: Contains probable Portuguese text
    crit: notable
    conf: 0.8
    count_min: 3
    if:
      type: text
      regex: '(?i)\b(não|são|você|vocês|também|estão|será|ações|opções)\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: lang-indonesian
    desc: Contains probable Indonesian text
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(yang|dan|dari|untuk|pada|adalah|dengan)\b'

  - id: lang-german
    desc: Contains probable German text
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(nicht|oder|aber|auch|sich|dass|werden)\b'

  - id: lang-japanese
    desc: Contains Hiragana or Katakana script
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\p{Hiragana}{2,}|\p{Katakana}{2,}'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: lang-telugu
    desc: Telugu script detection
    crit: notable
    conf: 0.8
    size_max: 1000000
    if:
      type: text
      regex: '\p{Telugu}{3,}'
    unless:
      - type: text
        substr: Unicode Character Database
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: lang-turkish
    desc: Turkish language detection
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(için|olarak|gibi)\b'

  - id: lang-tamil
    desc: Contains Tamil script
    crit: notable
    conf: 0.8
    size_max: 1000000
    if:
      type: text
      regex: '\p{Tamil}{3,}'
    unless:
      - type: text
        substr: Unicode Character Database
      - type: text
        regex: '(?m)^\s*(var|let|const)\s+(ID_Start|ID_Continue)\s*=\s*/'
      - type: path
        regex: 'Cython[\\/]Compiler[\\/]Lexicon\.py$'

  - id: lang-vietnamese
    desc: Vietnamese language detection
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(của|và|trong|các|cho|với|những)\b'
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle

  - id: lang-korean
    desc: Korean script detection (Hangul)
    crit: notable
    conf: 0.8
    count_min: 2
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/file/metrics::script-peak-region-over-1k
      - id: metadata/file/metrics::low-whitespace
    if:
      type: text
      regex: '\p{Hangul}{6,}'

  - id: lang-italian
    desc: Frequent Italian function words
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(questo|quello|nella|della)\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: lang-tagalog
    desc: Tagalog language detection
    crit: notable
    conf: 0.8
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(hindi|naman|niya|kaniya|kanila|natin)\b'

  - id: lang-polish-common-words
    desc: Common Polish words
    crit: component
    conf: 0.8
    size_max: 1000000
    count_min: 20
    if:
      type: text
      regex: '(?i)\b(jest|nie|dla|tak|jak|ale|oraz)\b'
  - id: lang-polish-diacritics
    desc: Polish-specific diacritics (ąęłńśźż)
    crit: component
    conf: 0.8
    size_max: 1000000
    count_min: 3
    if:
      type: text
      regex: '(?i)[ąćęłńśźż]'

composite_rules:
  - id: lang-polish
    desc: Polish language detection
    crit: notable
    conf: 0.8
    all:
      - id: lang-polish-common-words
      - id: lang-polish-diacritics
