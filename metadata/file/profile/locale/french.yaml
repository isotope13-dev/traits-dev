defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: french-security-passwords
    desc: French password keywords
    crit: notable
    conf: 0.6
    count_min: 2
    if:
      type: text
      regex: "(?i)\\b(mot[ _-]?de[ _-]?passe)\\b"
  - id: french-security-financial
    desc: French financial keywords
    crit: notable
    conf: 0.6
    count_min: 2
    if:
      type: text
      regex: "(?i)\\b(banque|compte[ _-]?bancaire|carte[ _-]?bancaire|virement|paiement)\\b"
