defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, source]
  crit: component
  conf: 0.97

traits:
  - id: locale-module-basename
    desc: Locale translation module basename
    crit: baseline
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '^locales?\.(js|cjs|mjs|ts|tsx)$'
  - id: i18n-module-basename
    desc: JavaScript internationalization module basename
    crit: baseline
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '(?i)^(i18n|l10n|localization)\.(js|cjs|mjs|ts|tsx)$'
  - id: translation-module-basename
    desc: Translation module basename
    crit: baseline
    conf: 0.9
    for: [javascript, typescript, python, csharp]
    if:
      type: path
      basename: true
      regex: '(?i)translations?\.'
  - id: language-label-table-name
    desc: Contains a UI language-label table
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\b(LANG_LABEL|SUPPORTED)\b\s*[:=]'
  - id: language-label-table-codes-a
    desc: Common UI language-code pair
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    count_min: 2
    if:
      type: text
      regex: '\b(vi|en|zh)\b'
  - id: language-label-table-codes-b
    desc: European UI language-code pair
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    count_min: 2
    if:
      type: text
      regex: '\b(fr|de|ja)\b'
  - id: turkish-sudo-installing
    desc: Turkish "sudo installing" phrase
    crit: baseline
    conf: 0.85
    for: [elf, shell, text]
    if:
      type: text
      substr: sudo kuruluyor
  - id: turkish-privilege-authority
    desc: Turkish "privilege/authority" token
    crit: baseline
    conf: 0.85
    for: [elf, shell, text]
    if:
      type: text
      substr: yetkisi
  - id: turkish-group-membership
    desc: Turkish "added to group" phrase
    crit: baseline
    conf: 0.85
    for: [elf, shell, text]
    if:
      type: text
      substr: grubuna eklendi
  - id: turkish-sudo-privileged
    desc: Turkish "with sudo privileges" phrase
    crit: baseline
    conf: 0.85
    for: [elf, shell, text]
    if:
      type: text
      substr: sudo yetkili
  - id: turkish-cleaning-generic
    desc: Turkish "cleaning" token
    crit: baseline
    conf: 0.8
    for: [elf, shell, text]
    if:
      type: text
      substr: temizleniyor
  - id: japanese-prose-source
    desc: Japanese prose source context
    crit: baseline
    conf: 0.9
    for: [python, source, scripts]
    if:
      type: text
      regex: 'ユーザー|ファイル|レポート'
  - id: cjk-ui-prose-source
    desc: CJK UI prose source context
    crit: baseline
    conf: 0.9
    for: [source, scripts]
    count_min: 5
    if:
      type: literal
      kind: string
      regex: '[\p{Han}]{2,}.{0,80}(任务|配置|目录|会话)'
  - id: han-ideograph-prose
    desc: Dense Han ideograph prose (localized source)
    crit: baseline
    conf: 0.9
    for: [source, scripts]
    count_min: 2
    # A run of 4+ consecutive Han ideographs is meaningful Chinese prose (UI
    # strings, comments), not high-entropy junk padding. A neutral localization
    # property; obfuscation/dead-code composites reference it cross-tier to
    # exclude legitimately-localized source.
    if:
      type: text
      regex: '[\p{Han}]{4,80}'
  - id: box-drawing-banner
    desc: Contains a box-drawing text banner
    crit: baseline
    conf: 0.9
    for: [text, source, scripts]
    if:
      type: text
      regex: '[╔╚╠╣╦╩═║─━┃┌┐└┘]{4,}'
  - id: i18n-translation-key
    desc: i18n translation default-export shape
    if:
      type: text
      regex: 'export\s+default\s*\{\s*translation\s*:'
  - id: i18n-lang-code-js-basename
    desc: JavaScript language code basename
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '^[a-z]{2,3}([_-][A-Za-z0-9]+)?\.(js|cjs)$'
  - id: i18n-lang-code-module-basename
    desc: Module JavaScript language code basename
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '^[a-z]{2,3}([_-][A-Za-z0-9]+)?\.mjs$'
  - id: i18n-lang-code-ts-basename
    desc: TypeScript language code basename
    for: [typescript]
    if:
      type: path
      basename: true
      regex: '^[a-z]{2,3}([_-][A-Za-z0-9]+)?\.(ts|tsx)$'
  - id: i18n-locales-dir-lang-module-path
    desc: Locale directory language module path
    for: [javascript, typescript]
    if:
      type: path
      regex: 'locales[\\/][a-z]{2,3}([_-][A-Za-z0-9]+)?\.(js|cjs|mjs|ts|tsx)$'
  - id: i18n-exported-const-locale-object
    desc: Exported locale string object
    for: [javascript, typescript]
    if:
      type: text
      regex: 'export\s+const\s+[a-z]{2,3}([_-][A-Za-z0-9]+)?\s*=\s*\{'
  - id: i18n-lang-code-dts-basename
    desc: TypeScript declaration language code basename
    for: [typescript]
    if:
      type: path
      basename: true
      regex: '^[a-z]{2,3}([_-][A-Za-z0-9]+)?\.d\.(cts|mts|ts)$'
  - id: angular-locale-bundle-path
    desc: Angular locale bundle path
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '^angular-locale_[A-Za-z0-9_-]+\.js$'
  - id: gettext-catalog
    desc: angular-gettext catalog string table
    if:
      type: text
      substr: "gettextCatalog.setStrings"
  - id: gettext-po-msgid-empty
    desc: GNU gettext empty msgid header
    for: [text, oledoc, ooxml]
    if:
      type: text
      substr: 'msgid ""'
  - id: gettext-po-msgstr-empty
    desc: GNU gettext empty msgstr header
    for: [text, oledoc, ooxml]
    if:
      type: text
      substr: 'msgstr ""'
  - id: gettext-po-project-id
    desc: GNU gettext project id header
    for: [text, oledoc, ooxml]
    if:
      type: text
      substr: "Project-Id-Version:"
  - id: locale-object-en-member
    desc: English locale object member
    if:
      type: text
      regex: '\ben\s*:\s*\{[^{}]{0,600}createNewAccount'
  - id: locale-object-ru-member
    desc: Russian locale object member
    if:
      type: text
      regex: '\bru\s*:\s*\{[^{}]{0,600}createNewAccount'
  - id: ui-locale-create-account-key
    desc: Create-account UI locale key
    if:
      type: text
      substr: createNewAccount
  - id: ui-locale-not-interested-key
    desc: Support-dismiss UI locale key
    if:
      type: text
      substr: notInterested
  - id: zod-locale-error-name
    desc: Zod localeError symbol
    for: [javascript, typescript]
    if:
      type: text
      substr: localeError
  - id: zod-get-locale-name
    desc: Zod getLocale symbol
    for: [javascript, typescript]
    if:
      type: text
      substr: getLocale
  - id: zod-set-locale-name
    desc: Zod setLocale symbol
    for: [javascript, typescript]
    if:
      type: text
      substr: setLocale
  - id: zod-get-message-call
    desc: Zod getMessage call
    for: [javascript, typescript]
    if:
      type: symbol
      exact: getMessage
composite_rules:
  - id: multilingual-ui-language-table
    desc: Multilingual UI language-label table
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: language-label-table-name
    any:
      - id: language-label-table-codes-a
      - id: language-label-table-codes-b
  - id: i18n-locale-file
    desc: JavaScript/TypeScript i18n locale string catalog
    crit: baseline
    conf: 0.97
    any:
      - id: locale-module-basename
      - id: i18n-translation-key
      - id: angular-locale-bundle-path
      - id: gettext-catalog
      - id: gettext-po-catalog
      - id: bundled-ui-locale-object
      - id: i18n-lang-code-locale-module
      - id: i18n-locales-dir-exported-module
      - id: metadata/file/profile/locale::select2-locale-module-name
  - id: gettext-po-catalog
    desc: GNU gettext PO/POT catalog
    crit: baseline
    conf: 0.97
    for: [text, oledoc, ooxml]
    needs: 2
    any:
      - id: gettext-po-msgid-empty
      - id: gettext-po-msgstr-empty
      - id: gettext-po-project-id
  - id: bundled-ui-locale-language-object
    desc: Bundled UI locale object with multiple languages
    crit: component
    conf: 0.9
    all:
      - id: locale-object-en-member
      - id: locale-object-ru-member
    near_bytes: 12000
  - id: bundled-ui-locale-ui-keys
    desc: Bundled UI locale object keys
    crit: component
    conf: 0.9
    any:
      - id: ui-locale-create-account-key
      - id: ui-locale-not-interested-key
  - id: bundled-ui-locale-object
    desc: Bundled UI locale string table
    crit: baseline
    conf: 0.9
    all:
      - id: bundled-ui-locale-language-object
      - id: bundled-ui-locale-ui-keys
  - id: i18n-lang-code-locale-module
    desc: Language-code-named locale module with i18n content
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: i18n-lang-code-basename
    any:
      - id: zod-locale-error-content
  - id: i18n-locales-dir-exported-module
    desc: Locale directory exported string module
    crit: baseline
    conf: 0.9
    all:
      - id: i18n-locales-dir-lang-module-path
      - id: i18n-exported-const-locale-object
  - id: i18n-lang-code-basename
    desc: Two- or three-letter language code basename
    any:
      - id: i18n-lang-code-js-basename
      - id: i18n-lang-code-module-basename
      - id: i18n-lang-code-ts-basename
      - id: i18n-lang-code-dts-basename
  - id: zod-locale-error-content
    desc: zod-style localeError factory export
    for: [javascript, typescript]
    any:
      - id: zod-locale-error-name
      - id: zod-get-locale-name
      - id: zod-set-locale-name
      - id: zod-get-message-call
