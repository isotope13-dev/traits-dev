defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, csharp]

traits:
  - id: locale-basename
    desc: Locale or i18n source filename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)(i18n|l10n|locale)\.'
  - id: select2-locale-module-name
    desc: Select2 locale module name
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: 'select2/i18n/[a-z]{2,3}([_-][A-Za-z0-9]+)?'
  - id: locale-ru-ru-underscore
    desc: Russian locale identifier (ru_RU)
    crit: component
    conf: 0.7
    platforms: [windows, linux, macos]
    for: [javascript, pe, elf, macho, batch, powershell]
    if:
      type: text
      regex: '(?i)navigator\.(language|languages)[^;\n]{0,80}ru_RU|ru_RU[^;\n]{0,80}navigator\.'
    not:
      - substr: LANGS =
      - regex: '(?i)(language|languages|locale|i18n|translation).{0,80}ru_RU|ru_RU.{0,80}(Russian|language|locale)'
      - regex: '(?i)ru_RU.{0,40}\.(mui|pri)(PK)?'
      - substr: /ru_RU/
      - regex: '(?i)ru_RU\s*:\s*["''](Russian|русский)["'']'
  - id: locale-ru-ru-dash
    desc: Russian locale identifier (ru-RU)
    crit: component
    conf: 0.7
    platforms: [windows, linux, macos]
    for: [javascript, pe, elf, macho, batch, powershell]
    if:
      type: text
      regex: '(^|[^A-Za-z0-9/.-])ru-RU([^A-Za-z0-9/.-]|$)'
    not:
      - substr: LANGS =
      - regex: '(?i)(language|languages|locale|i18n|translation).{0,80}ru-RU|ru-RU.{0,80}(Russian|language|locale)'
      - substr: locale/lang/ru-RU
      - regex: '(?i)(import|from).{0,40}ru-RU'
      - regex: '(?i)ru-RU.{0,40}\.(mui|pri)(PK)?'
      - substr: /ru-RU/
      - substr: .ru-RU.
    unless:
      - id: well-known/lib/regula-facesdk/
      - type: path
        regex: '([\\/]dist[\\/]|\.d\.ts$)'

composite_rules:
  - id: russian-locale
    desc: Russian locale identifier
    crit: component
    conf: 0.75
    any:
      - id: locale-ru-ru-underscore
      - id: locale-ru-ru-dash
