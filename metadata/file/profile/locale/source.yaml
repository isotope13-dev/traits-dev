defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, csharp]

traits:
  - id: locale-basename
    desc: Locale or i18n source filename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)(i18n|l10n|locale)\.'
  - id: select2-locale-module-name
    desc: Select2 locale module name
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: 'select2/i18n/[a-z]{2,3}([_-][A-Za-z0-9]+)?'
