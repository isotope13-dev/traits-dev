defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  # `__HALT_COMPILER()` is the marker that terminates a phar / self-contained
  # PHP archive stub. Used as an `unless:` context: source-level file-infector
  # and webshell-recon heuristics match the generic ops in a phar stub, not a
  # live threat, so they should not fire on packed archives.
  - id: php-archive
    desc: Packed PHP archive (phar) marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '__HALT_COMPILER|Phar::webPhar'
