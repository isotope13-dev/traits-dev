# File format magic byte detection at file start (offset 0)
#
# These traits detect file format signatures at the expected location.
# Using offset: 0 or
# file formats, not embedded content or coincidental byte patterns.
defaults:
  platforms: [linux, macos, windows]
traits:
  - id: kdt1-geospatial-tree
    desc: KDT1 geospatial KD-tree data file
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      pattern: "4B 44 54 31" # KDT1
      offset: 0
  # Binary executable formats
  - id: elf-header
    desc: ELF binary magic at file start
    crit: baseline
    conf: 1.0
    for: [elf]
    if:
      type: hex
      section: ".text"
      pattern: "7F 45 4C 46" # \x7fELF
      offset: 0
  - id: macho-32
    desc: Mach-O 32-bit magic at file start
    crit: baseline
    conf: 1.0
    for: [macho]
    if:
      type: hex
      section: ".text"
      pattern: "CE FA ED FE" # feedface (little-endian)
      offset: 0
  - id: macho-64
    desc: Mach-O 64-bit magic at file start
    crit: baseline
    conf: 1.0
    for: [macho]
    if:
      type: hex
      section: ".text"
      pattern: "CF FA ED FE" # feedfacf (little-endian)
      offset: 0
  # NOTE: CAFEBABE is used for both Mach-O fat binaries and Java class files.
  # This ambiguity is handled by file type detection; this trait just notes the magic.
  - id: cafebabe-magic
    desc: CAFEBABE magic at file start
    crit: baseline
    conf: 1.0
    for: [macho, class]
    if:
      type: hex
      pattern: "CA FE BA BE"
      offset: 0
  - id: pe-dos-stub
    desc: PE/DOS MZ header at file start
    crit: baseline
    conf: 1.0
    for: [pe]
    if:
      type: hex
      section: ".text"
      pattern: "4D 5A" # MZ
      offset: 0
  - id: dalvik-dex-magic
    desc: Dalvik DEX magic at file start
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      pattern: "64 65 78 0A 30 33 [1] 00" # dex\n03...
      offset: 0
  # Archive formats
  - id: zip-archive
    desc: ZIP archive magic at file start
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "50 4B 03 04" # PK..
      offset: 0
  - id: zip-empty
    desc: Empty ZIP archive magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "50 4B 05 06" # PK..
      offset: 0
  - id: gzip
    desc: GZIP compressed file magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "1F 8B 08" # gzip magic + deflate
      offset: 0
  - id: bzip2
    desc: BZIP2 compressed file magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "42 5A 68" # BZh
      offset: 0
  - id: xz
    desc: XZ compressed file magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "FD 37 7A 58 5A 00" # XZ magic
      offset: 0
  - id: zstd
    desc: ZSTD compressed file magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "28 B5 2F FD" # Zstandard frame magic
      offset: 0
  - id: 7z
    desc: 7-Zip archive magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "37 7A BC AF 27 1C" # 7z magic
      offset: 0
  - id: rar-v4
    desc: RAR v4 archive magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      pattern: "52 61 72 21 1A 07 00" # Rar!...
      offset: 0
  - id: rar-v5
    desc: RAR v5 archive magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      pattern: "52 61 72 21 1A 07 01 00" # Rar!....
      offset: 0
  - id: tar-ustar
    desc: USTAR tar archive magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "75 73 74 61 72" # ustar
      offset: 257 # USTAR magic is at offset 257
  - id: ar-archive
    desc: AR archive magic (static libraries, .deb)
    crit: baseline
    conf: 1.0
    for: [data, deb]
    if:
      type: raw
      exact: "!<arch>\n"
      offset: 0
  - id: rpm-package
    desc: RPM package magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "ED AB EE DB"
      offset: 0
  - id: bplist
    desc: Binary Plist magic at file start
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "62 70 6C 69 73 74 30 30" # bplist00
      offset: 0
  - id: nib-archive
    desc: NIBArchive magic at file start
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "4E 49 42 41 72 63 68 69 76 65" # NIBArchive
      offset: 0
  # Document/data formats
  - id: pdf
    desc: PDF document magic
    crit: baseline
    conf: 1.0
    for: [pdf]
    if:
      type: text
      substr: "%PDF-"
      offset: 0
      section: .text
  - id: sqlite3
    desc: SQLite3 database magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: raw
      exact: "SQLite format 3\0"
      offset: 0
      # Image formats (useful for polyglot detection)
      section: .text
  - id: png
    desc: PNG image magic
    crit: baseline
    conf: 1.0
    for: [png]
    if:
      type: hex
      section: ".text"
      pattern: "89 50 4E 47 0D 0A 1A 0A"
      offset: 0
  - id: jpeg
    desc: JPEG image magic
    crit: baseline
    conf: 1.0
    for: [jpeg]
    if:
      type: hex
      section: ".text"
      pattern: "FF D8 FF"
      offset: 0
  - id: gif
    desc: GIF image magic
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: text
      regex: "^GIF8[79]a"
      offset: 0
      # Text encoding BOMs
      section: .text
  - id: utf8-bom
    desc: UTF-8 byte order mark
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "EF BB BF"
      offset: 0
  - id: utf16-le-bom
    desc: UTF-16 little-endian BOM
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "FF FE"
      offset: 0
  - id: utf16-be-bom
    desc: UTF-16 big-endian BOM
    crit: baseline
    conf: 1.0
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "FE FF"
      offset: 0
  # Chromium / V8 Formats
  - id: v8-snapshot
    desc: V8 JavaScript engine snapshot
    crit: baseline
    conf: 0.95
    for: [data]
    if:
      type: hex
      section: ".text"
      # V8 snapshot magic (typical for versioned snapshots)
      pattern: "56 38 53 4E 41 50" # V8SNAP
      offset: 0
  - id: chromium-pak
    desc: Chromium resource PAK file
    crit: baseline
    conf: 0.95
    for: [data]
    if:
      type: hex
      section: ".text"
      pattern: "04 00 00 00" # PAK version 4
      offset: 0

# Embedded payload detection is in micro-behaviors/data/embedded/payload/
# See: elf-magic-embedded, pe-magic-embedded, zip-magic
