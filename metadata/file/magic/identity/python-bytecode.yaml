defaults:
  platforms: [windows, unix]
  for: [pyc]
traits:
  - id: pyc-magic
    desc: Python 3.x bytecode magic bytes
    crit: baseline
    conf: 0.95
    for: [python, pyc]
    if:
      type: hex
      section: .text
      pattern: ?? 0D 0D 0A
      offset: 0
  - id: pyc-module-marker
    desc: Python bytecode module marker string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: <module>
      section: .text
composite_rules:
  - id: python-bytecode
    desc: Compiled Python bytecode file (.pyc)
    crit: baseline
    conf: 0.95
    all:
      - id: pyc-magic
      - id: pyc-module-marker
