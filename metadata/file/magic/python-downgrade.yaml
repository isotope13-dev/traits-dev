# Python False Positive Downgrades
defaults:
  platforms: [windows, linux, macos]
  for: [pe, so, dylib]
traits:
  - id: python-encoded-downgrade
    desc: Downgrade encoded Python detection in Python runtimes
    crit: baseline # Changed from notable to baseline
    platforms: [windows] # Explicitly set platforms for this trait
    for: [pe] # Explicitly set for PE/DLL files
    if:
      id: metadata/file/magic::python-bytecode
