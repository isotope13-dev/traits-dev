defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: base64
    desc: Presence of Base64 encoded content.
    crit: notable
    if:
      type: encoded
      encoding: base64
      regex: .{20,100}
      section: rdata
  - id: pe-dense-base64-like-blobs
    desc: PE with many long base64/hex-like strings
    crit: suspicious
    count_min: 5
    if:
      type: text
      regex: ^[A-Za-z0-9+/]{60,}={0,2}$
      section: .text
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/binary/framework::dotnet-assembly
  - id: pe-dense-data-base64-like-blobs
    desc: PE data section with base64-like blobs
    crit: suspicious
    conf: 0.9
    count_min: 5
    if:
      type: text
      regex: ^[A-Za-z0-9+/]{60,}={0,2}$
      section: .data
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: pe-many-sha256-like-hex-blobs
    desc: PE with many SHA256-sized hex blobs
    crit: suspicious
    conf: 0.86
    count_min: 10
    if:
      id: micro-behaviors/data/encode/hex::repeated-upper-hex-blocks
    unless:
      - id: metadata/binary/framework::dotnet-assembly
    downgrade:
      any:
        - id: well-known/lib/dotnet-clientmodel::system-clientmodel-assembly
        - id: metadata/binary/framework::dotnet-assembly
