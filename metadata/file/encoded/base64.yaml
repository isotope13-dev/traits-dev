defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: base64
    desc: Presence of Base64 encoded content.
    crit: notable
    if:
      type: encoded
      encoding: base64
      regex: .{20,100}
    not:
      - substr: Origin SSL Certificate
      - substr: Cloudflare Origin
      - substr: DigiCert Trusted
      - substr: BEGIN CERTIFICATE
  - id: pe-dense-base64-like-blobs
    desc: PE with many long base64-like strings
    crit: notable
    count_min: 5
    if:
      type: text
      regex: ^[A-Za-z0-9+/]{60,}={0,2}$
      section: .text
    not:
      - regex: '^[A-F0-9]{32,}$'
    unless:
      - id: metadata/lang/compiler/aot::native-runtime-large-file
      - id: metadata/lang/compiler/managed::mscorlib
