defaults:
  for: [javascript, typescript, python, rust, go]
  attack: T1027
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: high-non-ascii-ratio
    desc: High non-ASCII ratio in source
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.non_ascii_ratio
      min: 0.85
  # generated-artifact-filename relocated to
  # metadata/file/extension/identity/text-formats.yaml — a .map/.d.ts basename is
  # a file-extension identity property, not an invisible-unicode signal.
  - id: width-assert-or-emoji-list-text
    desc: Width assert or emoji list text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: assert_width!\(|nonASCIIidentifier|emojisList|emoji\.parse\(
  - id: complex-script-joiner-text
    desc: 'Arabic/Persian/Indic script text'
    # ZWNJ (U+200C) and ZWJ (U+200D) are mandatory, meaning-bearing joiners in
    # Arabic-script (Persian/Urdu) and Indic scripts. Source with substantial
    # text in these scripts trips the invisible-Unicode counters for legitimate
    # reasons, not steganography. Require multi-character runs so a lone
    # decorative glyph can't be used to mask a real obfuscation payload.
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '[\p{Arabic}\p{Devanagari}\p{Bengali}\p{Gurmukhi}]{3,}'
  - id: terminal-invisible-color-text
    desc: Terminal invisible color handling text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Turns out that on Windows dimmed gray text becomes invisible
  - id: unicode-trademark-text
    desc: Unicode trademark notice text
    crit: component
    conf: 0.85
    if:
      type: text
      substr: Unicode and the Unicode Logo are registered trademarks
  - id: autogenerated-lockfile-text
    desc: Autogenerated lockfile banner
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "# THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY."
  - id: node-emoji-package-text
    desc: Node emoji package data
    crit: component
    conf: 0.85
    if:
      type: text
      substr: '"node-emoji":"^1.6.1"'
  - id: yarn-registry-text
    desc: Yarn registry or docs text
    crit: component
    conf: 0.9
    if:
      type: text
      regex: registry\.yarnpkg\.com|yarnpkg\.com/en/docs/cli
  - id: yarn-standalone-doc-text
    desc: Yarn standalone bundle docs text
    crit: component
    conf: 0.95
    if:
      type: text
      regex: yarnpkg\.com/en/docs/cli/|nightly\.yarnpkg\.com/latest\.js
  - id: hyper-yarn-standalone-text-fragment
    desc: Hyper yarn standalone text fragment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /opt/Hyper/resources/bin/yarn-standalone.js
  - id: yarn-cli-bundle-filename
    desc: Yarn CLI bundle filename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      exact: cli.js
  - id: yarn-cli-bundle-doc-text
    desc: Yarn CLI bundle docs text
    crit: component
    conf: 0.9
    if:
      type: text
      regex: yarnpkg\.com[/:]
  - id: yarn-standalone-bundle-filename
    desc: Yarn standalone bundle filename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      exact: yarn-standalone.js
  - id: naughty-strings-sample-text
    desc: Naughty strings sample text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: big-list-of-naughty-strings|sampler\(:naughty
  - id: emoji-library-table-text
    desc: Embedded emoji or codec table text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: emojiByName|Emoji\.emojify|Turns out that on Windows dimmed gray
  - id: emoji-logger-icons-text
    desc: Logger emoji icon mapping
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "this.levelIcons = {"
  - id: warning-emoji-log-text
    desc: Warning emoji log text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'SECURITY WARNING|OAuth providers configured'
  - id: webpack-bootstrap-text
    desc: Webpack bootstrap bundle text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: // webpackBootstrap
  - id: rs-resource-pack-text
    desc: Resource pack file table text
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?s)^RS.{0,64}"files"\s*:'
  - id: sourcegraph-amp-filename
    desc: Sourcegraph AMP VSIX filename
    crit: component
    conf: 0.1
    if:
      type: path
      basename: true
      exact: sourcegraph.amp-0.0.1772799397.vsix
  - id: few
    desc: Low invisible Unicode count
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.invisible_chars
      min: 2
      max: 16
    unless:
      - id: metadata/file/invisible-unicode/
      - id: metadata/file/invisible-unicode/
      - id: metadata/file/invisible-unicode/
      - id: metadata/lang/source::codegen-source-path
      - id: metadata/file/catalog/identity/
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: high-non-ascii-ratio
  - id: multiple
    desc: High invisible Unicode count
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: text.invisible_chars
      min: 65
    unless:
      - type: basename
        substr: yarn-standalone.js
      - type: text
        substr: Hyper/resources/bin/yarn-standalone.js
      - type: text
        regex: yarnpkg\.com/en/docs/cli/|nightly\.yarnpkg\.com/latest\.js
      - id: hyper-yarn-standalone-text-fragment
      - id: metadata/file/invisible-unicode/
      - id: metadata/file/invisible-unicode/
      - id: metadata/file/invisible-unicode/
      - id: metadata/lang/source::codegen-source-path
composite_rules:
  - id: test-file-context
    desc: Test, generated, or declaration-file context
    crit: component
    conf: 0.85
    any:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/harness/unit::go-test
      - id: metadata/package/testing/presence/harness::spec-test-filename
      - id: metadata/package/testing/presence/harness::tests-path-filename
      - id: metadata/file/extension/identity::declaration-file-extension
  - id: benign-invisible-unicode-text-context
    desc: Benign invisible Unicode source text
    crit: component
    conf: 0.85
    any:
      - id: complex-script-joiner-text
      - id: test-file-context
      - id: terminal-invisible-color-text
      - id: width-assert-or-emoji-list-text
      - id: unicode-trademark-text
      - id: metadata/lang/source::generated-do-not-edit-text
      - id: metadata/lang/source::codegen-source-path
      - id: autogenerated-lockfile-text
      - id: naughty-strings-sample-text
      - id: emoji-library-table-text
      - id: emoji-logger-icons-text
      - id: warning-emoji-log-text
      - id: node-emoji-package-text
      - id: metadata/file/catalog/identity::uproc-tools-catalog
      - id: metadata/library/runtime::moment-locale
      - id: yarn-registry-text
      - id: yarn-standalone-doc-text
      - id: yarn-standalone-bundle-filename
      - id: yarn-cli-bundle-filename
      - id: yarn-cli-bundle-doc-text
      - id: rs-resource-pack-text
      - id: hyper-yarn-standalone-text-fragment
      - id: sourcegraph-amp-filename
  - id: bundle-or-minified-context
    desc: Bundle or minified source context
    crit: component
    conf: 0.85
    any:
      - id: webpack-bootstrap-text
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/build/bundler::webpack-bundled
      - id: high-non-ascii-ratio
