defaults:
  platforms: [linux, macos, windows]
  for: [typescript]
  crit: component
  conf: 0.99

traits:
  - id: uproc-tools-export
    desc: UProc tools export marker
    if:
      type: text
      substr: "export const tools ="
  - id: uproc-tools-processors
    desc: UProc processors list marker
    if:
      type: text
      substr: "processors: ["
  - id: uproc-creditcard-tools
    desc: UProc credit card tools marker
    if:
      type: text
      substr: "checkCreditcardChecksum"
  - id: uproc-tool-example-params
    desc: UProc example parameter marker
    if:
      type: text
      substr: "p: [{ n:"

composite_rules:
  - id: uproc-tools-catalog
    desc: UProc node tool catalog data
    crit: baseline
    conf: 0.99
    all:
      - id: uproc-tools-export
      - id: uproc-tools-processors
      - id: uproc-creditcard-tools
      - id: uproc-tool-example-params
