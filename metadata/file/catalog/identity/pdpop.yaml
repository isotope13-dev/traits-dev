defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: webhard-registry-path
    desc: PDPOP WebHard registry path
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: Software\pdpop\WebHard
      section: .rdata

  - id: sfpdpop-helper-dll
    desc: PDPOP smartfilter helper DLL
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: sfpdpop.dll
      section: .rdata
