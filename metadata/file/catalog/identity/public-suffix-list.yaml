# The Public Suffix List (psl) is a registry of every public domain suffix on
# the internet (every ccTLD, gTLD, and delegated suffix such as `trycloudflare.com`,
# `dweb.link`, and thousands of `*.ru` entries). It is bundled by tough-cookie,
# request, and many other packages. Domain/TLD literal detectors match its data
# entries, not any usage — mark the catalog so those detectors can suppress on it.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.98

traits:
  - id: public-suffix-list
    desc: Public Suffix List domain-registry data file
    if:
      type: text
      substr: 'g.psl = f()'
