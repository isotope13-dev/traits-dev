# Notepad++ syntax-highlighting keyword catalog (langs.model.xml / langs.xml).
# A static word list of language keywords (shell commands, builtins, etc.) used
# purely for editor syntax coloring. String matches on command names inside this
# catalog are keyword vocabulary, not behavior. Scoped narrowly to the catalog's
# XML structure so it only suppresses matches inside the wordlist itself.
defaults:
  platforms: [unix, windows]
  for: [xml, text]
  crit: component
  conf: 0.98

traits:
  - id: notepadpp-root
    desc: Notepad++ language definition root element
    if:
      type: text
      substr: '<NotepadPlus'
  - id: notepadpp-languages-block
    desc: Notepad++ <Languages> keyword definition block
    if:
      type: text
      substr: '<Languages>'
  - id: notepadpp-instre-keywords
    desc: Notepad++ syntax-highlighting keyword list
    if:
      type: text
      substr: '<Keywords name="instre1"'

composite_rules:
  - id: notepadpp-keyword-catalog
    desc: Notepad++ syntax-highlighting keyword catalog (langs.model.xml)
    crit: baseline
    conf: 0.98
    all:
      - id: notepadpp-root
      - id: notepadpp-languages-block
      - id: notepadpp-instre-keywords
