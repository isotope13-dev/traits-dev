defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: component
  conf: 0.98

traits:
  - id: frequency-lists-passwords-array
    desc: Frequency lists password array
    if:
      type: text
      substr: 'passwords: "123456,password'
  - id: comma-split-frequency-data
    desc: Comma split frequency data
    if:
      type: text
      substr: '".split(","),'

composite_rules:
  - id: frequency-list-catalog
    desc: Generated JavaScript frequency list catalog
    crit: baseline
    conf: 0.98
    all:
      - id: frequency-lists-passwords-array
      - id: comma-split-frequency-data
