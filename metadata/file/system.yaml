defaults:
  platforms: [unix]
  for: [binaries]
traits:
  - id: system-shell-basename
    desc: System shell basename
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: sh

  - id: freedos-program-basename
    desc: FreeDOS program basename
    crit: component
    conf: 0.95
    platforms: [windows]
    for: [pe]
    if:
      type: basename
      regex: '(?i)^(COMMAND\.COM|KEYB\.EXE|DISPLAY\.EXE)$'
