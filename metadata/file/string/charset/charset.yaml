defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: base62-alphanumeric-charset
    desc: "Base62 alphanumeric charset alphabet"
    crit: baseline
    conf: 0.6
    if:
      type: text
      exact: ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
  - id: qwerty-order-alphabet
    desc: QWERTY-order keyboard alphabet string
    crit: baseline
    conf: 0.5
    for: [scripts, source, binaries]
    if:
      type: text
      exact: qwertyuiopasdfghjklzxcvbnm
  - id: lowercase-hex-alphabet
    desc: Lowercase hexadecimal alphabet string
    crit: baseline
    conf: 0.2
    for: [scripts, source, binaries]
    count_min: 2
    if:
      type: text
      substr: 0123456789abcdef
    unless:
      - id: metadata/file/string/identity::system-shell-basename
      - id: well-known/app/drivers/
      - id: well-known/app/drivers::ngx-dll-basename
