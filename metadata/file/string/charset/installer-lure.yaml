# Generic installer lure phrases found in PE resource/version strings of both
# legitimate setup wizards and trojanized installers. Component-only.
defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.5
traits:
  - id: professional-setup-phrase
    desc: "Installer lure phrase: Professional ... Setup"
    size_min: 10240
    size_max: 500000000
    if:
      type: text
      regex: '(?i)Professional.{0,48}Setup'
      section: rdata
