# iOS system service names are neutral identity references.  Masquerade
# composites require a separate process-name/write behavior before inferring
# deception.
defaults:
  platforms: [ios]
  for: [go, c, cpp, objc, rust, swift]
  crit: component
  conf: 0.8

traits:
  - id: mobilestored-daemon
    desc: mobile storage daemon name
    if:
      type: text
      word: mobilestored

  - id: backboardd-daemon
    desc: iOS backboard daemon name
    if:
      type: text
      word: backboardd

  - id: lockdownd-daemon
    desc: iOS lockdown daemon name
    if:
      type: text
      word: lockdownd
