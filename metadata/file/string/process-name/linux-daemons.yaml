# Generic Linux daemon/process names. These bare names appear legitimately in
# countless system binaries; they carry no signal standalone. Process-masquerade
# composites in other directories (e.g. BPFDoor variants) gate on them
# co-occurring with a real masquerade behavior (process rename, BPF filter).
defaults:
  platforms: [linux]
  for: [elf]
  crit: component
  conf: 0.4
traits:
  - id: smartd-name
    desc: smartd daemon name
    if:
      type: text
      exact: smartd
      section: rdata
  - id: qmgr-name
    desc: qmgr (postfix queue manager) daemon name
    if:
      type: text
      exact: qmgr
      section: rdata
  - id: zabbix-agentd-name
    desc: zabbix_agentd daemon name
    if:
      type: text
      exact: zabbix_agentd
      section: rdata
  - id: crond-name
    desc: crond cron scheduler daemon name
    if:
      type: text
      word: crond
      section: rdata
  - id: xinetd-name
    desc: xinetd super-server daemon name
    if:
      type: text
      word: xinetd
      section: rdata
  - id: inetd-name
    desc: inetd super-server daemon name
    if:
      type: text
      word: inetd
      section: rdata
  - id: named-name
    desc: named BIND DNS daemon name
    if:
      type: text
      word: named
      section: rdata

  - id: telnetd-name
    desc: Telnet daemon executable basename
    crit: baseline
    conf: 0.95
    platforms: [unix]
    for: [elf, shell]
    if:
      type: basename
      exact: telnetd

  - id: telnet-client-name
    desc: Telnet client executable basename
    crit: baseline
    conf: 0.95
    platforms: [unix]
    for: [elf, shell]
    if:
      type: basename
      exact: telnet
