defaults:
  platforms: [windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.85

traits:
  - id: search-filter-host-exe-reference
    desc: SearchFilterHost executable name reference
    if:
      type: text
      word: SearchFilterHost.exe

  - id: search-protocol-host-exe-reference
    desc: SearchProtocolHost executable name reference
    if:
      type: text
      word: SearchProtocolHost.exe

  - id: runtime-broker-exe-reference
    desc: RuntimeBroker executable name reference
    if:
      type: text
      word: RuntimeBroker.exe

  - id: svchost-exe-reference
    desc: svchost executable name reference
    if:
      type: text
      word: svchost.exe

composite_rules:
  - id: windows-system-process-name-reference
    desc: Windows system executable filename reference
    crit: component
    conf: 0.85
    any:
      - id: search-filter-host-exe-reference
      - id: search-protocol-host-exe-reference
      - id: runtime-broker-exe-reference
      - id: svchost-exe-reference
