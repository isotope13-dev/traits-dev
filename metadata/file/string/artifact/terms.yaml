---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: demo-prefix-keyword
  desc: DEMO bare word (temp/payload prefix)
  conf: 0.3
  platforms:
  - windows
  for:
  - pe
  if:
    type: text
    exact: DEMO
    section: rdata
- id: vagrant-machine-communicate-marker
  desc: Vagrant machine communicate marker
  crit: component
  conf: 0.9
  platforms:
  - unix
  for:
  - scripts
  - source
  if:
    type: text
    substr: machine.communicate
- id: find-target-phrase
  desc: find target phrase
  crit: component
  conf: 0.5
  if:
    type: text
    regex: find.{0,10}target
    case_insensitive: true
- id: linux-syscall-note-license
  desc: Linux syscall-note license marker
  crit: baseline
  conf: 0.98
  for:
  - c
  if:
    type: text
    substr: Linux-syscall-note
- id: process-word-token
  desc: Standalone Process word token
  crit: component
  conf: 0.6
  platforms:
  - windows
  for:
  - pe
  if:
    type: text
    exact: Process
    section: .text
- id: payload-label
  desc: "Payload: label string"
  crit: baseline
  conf: 0.6
  size_min: 512
  size_max: 500000000
  if:
    type: text
    substr: 'Payload: '
    section: .text
