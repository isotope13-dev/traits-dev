defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  crit: component
  conf: 0.95

traits:
  - id: userinfo-token
    desc: userInfo string literal token
    if:
      type: literal
      kind: string
      word: userInfo

  - id: chunk-token
    desc: Source chunk token
    if:
      type: text
      substr: chunk
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
