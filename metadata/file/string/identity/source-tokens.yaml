defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  crit: component
  conf: 0.95

traits:
  - id: babel-script-mime-type
    desc: Babel script MIME type
    crit: baseline
    conf: 0.85
    for: [javascript, typescript, html]
    if:
      type: string_literal
      regex: text/babel|text/6to5
  - id: userinfo-token
    desc: userInfo string literal token
    if:
      type: literal
      kind: string
      word: userInfo

  - id: chunk-token
    desc: Source contains a chunk-related identifier
    if:
      type: text
      substr: chunk
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/

  - id: source-text-token
    desc: Contains the sourceText identifier
    if:
      type: text
      word: sourceText
