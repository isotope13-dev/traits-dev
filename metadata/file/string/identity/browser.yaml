defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: component
  conf: 0.4

traits:
  - id: chrome-browser-name-literal
    desc: String literal names the Chrome browser
    unless:
      - id: metadata/package/documentation/
      - id: metadata/package/testing/harness/runtime/
    if:
      type: string_literal
      exact: Chrome

  - id: firefox-browser-name-literal
    desc: String literal names the Firefox browser
    unless:
      - id: metadata/package/documentation/
      - id: metadata/package/testing/harness/runtime/
    if:
      type: string_literal
      substr: Firefox
    not:
      - substr: Mozilla\Firefox\Profiles

  - id: safari-browser-name-literal
    desc: String literal names the Safari browser
    unless:
      - id: metadata/package/documentation/
      - id: metadata/file/catalog/identity/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    if:
      type: string_literal
      substr: Safari
    not:
      - substr: "Listener is not patched for Safari"
      - substr: "Safari/"
