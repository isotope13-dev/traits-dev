defaults:
  platforms: [unix, windows]
  for: [documents, scripts, binaries]
traits:
  - id: xmrig-product
    desc: XMRig product name
    crit: notable
    conf: 0.8
    if:
      type: text
      word: xmrig
      case_insensitive: true
    unless:
      - id: metadata/file/format::adblock-filter-list
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - type: text
        regex: '(?is)bad_patterns\s*=\s*re\.compile\([\s\S]{0,400}process_iter'
