defaults:
  platforms: [windows]
  for: [python, javascript, typescript, powershell]
traits:
  - id: microsoft-vcredist-context
    desc: "MS Visual C++ redist installer context"
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: Microsoft Visual C++ Redistributable

  - id: executable-manifest-reference
    desc: Windows executable manifest filename reference
    crit: baseline
    conf: 0.95
    for: [pe, dll, csharp]
    if:
      type: text
      regex: '\b[\w.-]+\.exe\.manifest\b'
