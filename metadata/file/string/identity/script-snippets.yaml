defaults:
  platforms: [macos]
  for: [scripts]

traits:
- id: applescript-hidden-entry-snippet-path
  desc: AppleScript hidden entry snippet path
  crit: component
  conf: 0.94
  for: [applescript]
  if:
    type: path
    regex: '(^|/)Snippets/Prompt with Hidden Entry\.applescript$'
- id: applescript-hidden-entry-secret
  desc: AppleScript hidden entry secret assignment
  crit: component
  conf: 0.94
  for: [applescript]
  if:
    type: text
    substr: set thisPw to "secret"

composite_rules:
- id: applescript-hidden-entry-snippet
  desc: AppleScript hidden entry snippet
  crit: component
  conf: 0.94
  for: [applescript]
  all:
  - id: applescript-hidden-entry-snippet-path
  - id: applescript-hidden-entry-secret
