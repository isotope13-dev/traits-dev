defaults:
  platforms: [windows]
  for: [batch]

traits:
- id: windows-safe-mode-toggle-script
  desc: Windows Safe Mode toggle script
  crit: component
  conf: 0.94
  if:
    type: text
    substr: TITLE ENTER OR EXIT WINDOWS SAFE MODE
- id: microsoft-activation-tool-script-marker
  desc: Microsoft activation tool script marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: PowerShell Multi Activation System
- id: microsoft-activation-tool-domain-marker
  desc: Microsoft activation tool domain marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: massgrave{dot}dev
- id: microsoft-activation-tool-obfuscated-domain-marker
  desc: Activation tool obfuscated domain
  crit: component
  conf: 0.94
  if:
    type: text
    substr: m{}assgrave{dot}dev
- id: microsoft-activation-scripts-title
  desc: Microsoft Activation Scripts title
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Microsoft_Activation_Scripts
- id: windows11-defender-disable-tweak
  desc: Windows 11 Defender disable tweak
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Disable all Windows Defender components
- id: defender-history-clear-title
  desc: Defender history clear title
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Delete Windows Defender History
- id: defender-history-remove-task-default
  desc: Defender history removes task
  crit: component
  conf: 0.94
  if:
    type: text
    substr: $RemoveTask = $true
- id: kms-suite-title
  desc: KMS suite title
  crit: component
  conf: 0.94
  if:
    type: text
    substr: title KMS Suite

composite_rules:
- id: microsoft-activation-tool-script
  desc: Microsoft activation tool script
  crit: component
  conf: 0.94
  any:
  - id: microsoft-activation-tool-script-marker
  - id: microsoft-activation-tool-domain-marker
  - id: microsoft-activation-tool-obfuscated-domain-marker
  - id: microsoft-activation-scripts-title
  - id: kms-suite-title
- id: defender-history-clear-once-script
  desc: Defender history one-shot cleanup
  crit: component
  conf: 0.94
  all:
  - id: defender-history-clear-title
  - id: defender-history-remove-task-default
