defaults:
  platforms: [android, unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9

traits:
  - id: android-aid-platform-marker
    desc: Android AID constant marker
    if:
      type: text
      regex: '\bAID_(ROOT|SYSTEM|SHELL)\b'

  - id: android-system-path-marker
    desc: Android system path marker
    if:
      type: text
      regex: '/system/(bin|etc)/'

  - id: android-property-platform-marker
    desc: Android system property API marker
    if:
      type: text
      substr: __system_property_

  - id: android-getprop-platform-marker
    desc: Android getprop command marker
    if:
      type: text
      word: getprop
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: android-lib-platform-marker
    desc: Android native library marker
    if:
      type: text
      regex: '\blibandroid(\.so)?\b'

  - id: android-java-platform-marker
    desc: Android Java API namespace marker
    if:
      type: text
      regex: '\bandroid\.os\.'
