defaults:
  platforms: [windows, unix]
  crit: component
  conf: 0.8
traits:
  - id: arch-64bit-string
    desc: 64-bit architecture marker string
    for: [python]
    ref: sha256:fd101cfd9512b7c47f658dc36b2db1faef3ea4f1add169ce1c3de26aa72df828
    if:
      type: string_literal
      substr: 64bit
    unless:
      - id: well-known/tool/detection/malware-config-parser
  - id: multi-architecture-name-set
    desc: At least three CPU architecture references
    crit: baseline
    conf: 0.9
    for: [shell]
    platforms: [unix]
    count_min: 3
    if:
      type: text
      regex: '\b(arm[0-9]*|aarch64|mips(el)?|mpsl|arc|x86(_64)?)\b'
