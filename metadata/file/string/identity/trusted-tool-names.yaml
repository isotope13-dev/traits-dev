defaults:
  platforms: [windows, macos, linux]
  for: [binaries]
  crit: component
  conf: 0.9

traits:
- id: tool-identity-cpuid
  desc: Tool identity claims CPUID
  if:
    type: text
    regex: (?i)\b(CPU-Z|CPUID Ltd\.?)\b

- id: tool-identity-hwinfo
  desc: Tool identity claims HWiNFO
  if:
    type: text
    regex: (?i)HWiNFO

- id: tool-identity-putty
  desc: Tool identity claims PuTTY
  if:
    type: text
    word: PuTTY

- id: tool-identity-filezilla
  desc: Tool identity claims FileZilla
  if:
    type: text
    regex: (?i)FileZilla

- id: tool-identity-wireshark
  desc: Tool identity claims Wireshark
  if:
    type: text
    regex: (?i)Wireshark

- id: tool-identity-7zip--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)7-Zip\s+(Setup|Installer)
  count_max: 1000565
- id: tool-identity-7zip--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)7-Zip\s+(File Manager|Standalone)
  count_max: 1000566
- id: tool-identity-7zip--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)7-Zip\s+(Console|Archiver)
  count_max: 1000567
- id: tool-identity-7zip--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)7-Zip\s+(Extension)
  count_max: 1000568
- id: official-7zip-dll-basename
  desc: Official 7-Zip runtime DLL filename
  crit: component
  for: [pe, dll]
  if:
    type: path
    basename: true
    case_insensitive: true
    regex: '^7z\.dll(@|$)'
- id: official-7zip-gui-basename
  desc: Official 7-Zip GUI executable filename
  crit: component
  for: [pe]
  if:
    type: path
    basename: true
    case_insensitive: true
    regex: '^7zg\.exe(@|$)'
- id: official-7zip-console-basename
  desc: Official 7-Zip console executable filename
  crit: component
  for: [pe]
  if:
    type: path
    basename: true
    case_insensitive: true
    regex: '^7z\.exe(@|$)'
- id: official-7zip-standalone-basename
  desc: Official 7-Zip standalone executable filename
  crit: component
  for: [pe]
  if:
    type: path
    basename: true
    case_insensitive: true
    regex: '^7za(\.exe)?(@|$)'
- id: official-7zip-manager-basename
  desc: Official 7-Zip file manager filename
  crit: component
  for: [pe]
  if:
    type: path
    basename: true
    case_insensitive: true
    regex: '^7zfm\.exe(@|$)'
- id: pe-product-name-7zip
  desc: PE version resource identifies 7-Zip
  crit: notable
  conf: 0.95
  for: [pe, dll]
  platforms: [windows]
  if:
    type: value
    path: pe.version.product_name
    regex: (?i)\b7-Zip\b
- id: tool-identity-winrar
  desc: Tool identity claims WinRAR
  if:
    type: text
    regex: (?i)WinRAR

- id: tool-identity-vlc
  desc: Tool identity claims VLC
  if:
    type: text
    regex: (?i)VLC media player

- id: tool-identity-notepadplusplus
  desc: Tool identity claims Notepad++
  if:
    type: text
    regex: (?i)Notepad\+\+
- id: software-catalog-token-list
  desc: Bundled software catalog tokens
  count_min: 8
  if:
    type: text
    regex: '\b[A-Za-z0-9]+_DI\b'

- id: tool-identity-intel
  desc: "Intel Corporation vendor claim"
  platforms: [windows]
  for: [pe]
  if:
    type: text
    exact: Intel Corporation
    section: .rsrc
  unless:
  - id: metadata/signed/platform/
  - type: metrics
    field: imports.count
    min: 100

- id: tool-identity-7zip-cond-0--inline-573
  desc: Regex component marker
  crit: component
  conf: 1.0
  if:
    type: text
    substr: net/sf/sevenzipjbinding

  count_max: 1000574
composite_rules:
- id: trusted-tool-impersonator-context
  desc: Binary mentions high-trust utility
  crit: component
  conf: 0.85
  any:
  - {id: tool-identity-cpuid}
  - {id: tool-identity-hwinfo}
  - {id: tool-identity-putty}
  - {id: tool-identity-filezilla}
  - {id: tool-identity-wireshark}
  - {id: tool-identity-7zip}
  - {id: tool-identity-winrar}
  - {id: tool-identity-vlc}
  - {id: tool-identity-notepadplusplus}
  - {id: tool-identity-intel}
  unless:
  - id: software-catalog-token-list
- id: tool-identity-7zip
  desc: Tool identity claims 7-Zip
  crit: baseline
  conf: 1.0
  any:
  - id: tool-identity-7zip--rx-1
  - id: tool-identity-7zip--rx-2
  - id: tool-identity-7zip--rx-3
  - id: tool-identity-7zip--rx-4
  unless:
  - id: tool-identity-7zip-cond-0--inline-573
- id: official-7zip-component
  desc: Official 7-Zip component filename
  crit: component
  conf: 0.98
  any:
  - id: official-7zip-dll-basename
  - id: official-7zip-gui-basename
  - id: official-7zip-console-basename
  - id: official-7zip-standalone-basename
  - id: official-7zip-manager-basename
