# Generic client telemetry / device-registration JSON field names (device_id,
# os_info). Neutral: these field names appear in legitimate device-registration,
# analytics, crash-reporting and inventory payloads. Malware C2 composites pair
# them with a known C2 domain or implant marker.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
traits:
  - id: device-id-field
    desc: device_id telemetry/registration field
    conf: 0.8
    if:
      type: text
      exact: device_id
      section: .rdata
  - id: device-id-field-python
    desc: Python device_id telemetry field
    crit: component
    conf: 0.8
    platforms: [unix, windows]
    for: [python]
    if:
      type: text
      regex: '["'']device_id["'']\s*:'
  - id: os-info-field
    desc: os_info telemetry/registration field
    conf: 0.7
    if:
      type: text
      exact: os_info
      section: .rdata
  - id: repeated-analytics-term
    desc: Analytics term repeated in read-only data
    conf: 0.95
    count_min: 25
    count_max: 1000621
    if:
      type: text
      substr: analytics
      section: rdata
      case_insensitive: true
    unless:
      - id: well-known/tool/reverse-engineering/frida/
  - id: repeated-counter-term
    desc: Counter term repeated in read-only data
    conf: 0.95
    count_min: 25
    count_max: 1000622
    if:
      type: text
      substr: counter
      section: rdata
      case_insensitive: true
    unless:
      - id: well-known/tool/reverse-engineering/frida/
  - id: repeated-stats-term
    desc: Stats term repeated in read-only data
    conf: 0.95
    count_min: 25
    count_max: 1000623
    if:
      type: text
      substr: stats
      section: rdata
      case_insensitive: true
    unless:
      - id: well-known/tool/reverse-engineering/frida/
  - id: repeated-track-substring
    desc: Track substring repeated in read-only data
    conf: 0.95
    count_min: 25
    count_max: 1000624
    if:
      type: text
      substr: track
      section: rdata
      case_insensitive: true
    unless:
      - id: well-known/tool/reverse-engineering/frida/
  - id: session-id-field-js
    desc: Contains a session identifier field
    platforms: [windows, unix]
    for: [javascript, typescript]
    conf: 0.88
    if:
      type: text
      regex: '\$session_id|\bsessionId\b'
    unless:
      - id: well-known/lib/regula-facesdk/
  - id: device-id-field-js
    desc: Contains a device identifier field
    platforms: [windows, unix]
    for: [javascript, typescript]
    conf: 0.88
    if:
      type: text
      regex: '\$device_id|\bdeviceId\b'
    unless:
      - id: well-known/lib/regula-facesdk/
composite_rules:
  - id: repeated-tracking-vocabulary
    desc: Binary repeats tracking-related vocabulary
    crit: component
    conf: 0.95
    any:
      - id: repeated-analytics-term
      - id: repeated-counter-term
      - id: repeated-stats-term
      - id: repeated-track-substring
