# Generic deceptive-redirect domain patterns used by browser hijackers and
# adware (fake AV vendor homepages, adult-site redirect targets). Component-only
# — a bare domain reference carries no standalone signal; browser-hijack
# composites gate these alongside family or persistence evidence.
defaults:
  platforms: [unix, windows]
  for: [pe, scripts, source]
  crit: component
traits:
  - id: fake-av-vendor-domain
    desc: Fake AV vendor homepage URL
    conf: 0.6
    if:
      type: text
      regex: 'https?://(www\.)?(antivirus|antispyware|freeav)\.com/?'
  - id: adult-redirect-domain
    desc: Adult-site redirect URL
    conf: 0.5
    if:
      type: text
      regex: 'https?://(www\.)?(pinkworld|youporn|redtube|assparade)\.com/?'
