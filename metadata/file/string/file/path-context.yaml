defaults:
  platforms: [unix, android, ios]
  for: [shell]

traits:
  - id: shell-scripts-dir-context
    desc: Shell script under scripts directory
    crit: baseline
    conf: 0.9
    if:
      type: path
      dirname: true
      regex: '(^|[\\/])scripts([\\/]|$)'

  - id: shell-benchmark-script-basename
    desc: Shell benchmark script basename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(^|.*[-_])bench([_-].*)?\.sh$'

  - id: linux-vmlinux-header-basename
    desc: Generated Linux vmlinux.h header basename
    crit: baseline
    conf: 0.98
    platforms: [unix]
    for: [c, cpp, elf]
    if:
      type: path
      basename: true
      exact: vmlinux.h
