defaults:
  platforms: [unix, android, ios]
  for: [shell]

traits:
  - id: shell-scripts-dir-context
    desc: Shell script under scripts directory
    crit: baseline
    conf: 0.9
    if:
      type: path
      dirname: true
      regex: '(^|[\\/])scripts([\\/]|$)'

  - id: shell-benchmark-script-basename
    desc: Shell benchmark script basename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(^|.*[-_])bench([_-].*)?\.sh$'

  - id: linux-vmlinux-header-basename
    desc: Generated Linux vmlinux.h header basename
    crit: baseline
    conf: 0.98
    platforms: [unix]
    for: [c, cpp, elf]
    if:
      type: path
      basename: true
      exact: vmlinux.h

  - id: wine-include-source-path
    desc: Wine include source path
    crit: baseline
    conf: 0.98
    platforms: [windows, unix]
    for: [c, cpp]
    if:
      type: path
      dirname: true
      regex: '(^|[\\/])wine([\\/]|$)'

  - id: wine-lib-archive-member
    desc: Wine library archive member
    crit: baseline
    conf: 0.98
    platforms: [windows, unix]
    for: [archive, tar, 7z, zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)usr/lib/wine/'
