---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: tmp
  desc: tmp keyword
  if:
    type: text
    word: tmp
- id: php-fpm
  desc: php-fpm process name keyword
  crit: component
  conf: 0.4
  for:
  - php
  if:
    type: text
    substr: php-fpm
    case_insensitive: true
- id: manifest-json-filename
  desc: 'Bundled filename: manifest.json'
  crit: component
  conf: 0.3
  for:
  - binaries
  count_min: 3
  if:
    type: text
    substr: manifest.json
    section: rdata
- id: content-js-filename
  desc: 'Bundled filename: content.js'
  crit: component
  conf: 0.3
  for:
  - binaries
  count_min: 3
  if:
    type: text
    substr: content.js
    section: rdata
- id: error-log-filename
  desc: 'Generic artifact filename: error.log'
  crit: component
  conf: 0.3
  if:
    type: text
    exact: error.log
- id: config-header-filename
  desc: 'Generic C header filename: configs.h'
  crit: component
  conf: 0.2
  if:
    type: string_literal
    exact: configs.h
- id: scr-extension-string
  desc: 'Generic extension string: .scr'
  crit: component
  conf: 0.2
  for:
  - javascript
  - scripts
  - source
  if:
    type: string_literal
    exact: ".scr"
- id: tmpfile-tar-filename
  desc: 'Generic temp archive filename: tmpfile.tar'
  crit: component
  conf: 0.2
  if:
    type: text
    substr: tmpfile.tar
- id: configuration-word
  desc: '"configuration" word inside a string literal'
  crit: component
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    word: configuration
    case_insensitive: true
