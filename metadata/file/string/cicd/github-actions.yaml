defaults:
  platforms: [unix, windows]
traits:
  - id: github-workflows-path-string
    desc: GitHub Actions workflow path string
    crit: baseline
    conf: 0.9
    for: [shell, batch, python, javascript, typescript, go, github-actions]
    if:
      type: text
      substr: /.github/

  - id: github-actions-targeting-shell
    desc: Targets GitHub Actions (Shell)
    crit: component
    conf: 0.9
    for:
      - shell
    if:
      type: string_literal
      substr: isSecret":true
