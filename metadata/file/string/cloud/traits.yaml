defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: aws-imds-v2-token-endpoint
    desc: AWS IMDSv2 token endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 169.254.169.254/latest/api/token
  - id: aws-metadata-token-header
    desc: AWS EC2 metadata token header
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: X-aws-ec2-metadata-token
  - id: aws-imds-v2-token-ttl-header
    desc: AWS IMDSv2 token TTL header
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: X-aws-ec2-metadata-token-ttl-seconds
  - id: aws-metadata-endpoint
    desc: AWS EC2 metadata endpoint
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 169\.254\.169\.254/(latest/meta-data|metadata/instance)
    unless:
      - id: metadata/package/testing/
      - id: well-known/app/vscode-marketplace::m365-agents-toolkit-vsix
  - id: aws-instance-metadata-relative-path
    desc: AWS instance metadata relative path
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: instance-data/latest/meta-data
  - id: aws-iam-credentials-metadata-path
    desc: AWS IAM credentials metadata path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /latest/meta-data/iam/security-credentials
    downgrade:
      any:
        - id: metadata/library/data::aws-sdk-dotnet-core
        - id: metadata/binary/metrics/size::massive-executable
  - id: gcp-metadata-endpoint
    desc: GCP metadata service endpoint
    crit: notable
    conf: 0.9
    for: [elf]
    if:
      type: text
      substr: metadata.google.internal
      section: .rodata
  - id: gcp-metadata-endpoint-go-source
    desc: GCP metadata endpoint in Go source
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: text
      substr: metadata.google.internal
  - id: gcp-service-account-token-path
    desc: GCP service account access token path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts/default/token
  - id: gcp-service-accounts-metadata-path
    desc: GCP service accounts metadata path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts
  - id: gcp-default-service-account-email-path
    desc: GCP default service account email metadata path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts/default/email
    downgrade:
      any:
        - id: metadata/file/string/cloud::gcp-default-credentials
  - id: azure-metadata-endpoint
    desc: Azure IMDS endpoint
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: 169.254.169.254/metadata/instance
    downgrade:
      any:
        - id: metadata/library/runtime::msal-namespace
        - id: metadata/library/runtime::azure-identity-namespace
  - id: azure-managed-identity-token-path
    desc: Azure managed identity token endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /metadata/identity/oauth2/token
    downgrade:
      any:
        - id: metadata/library/runtime::msal-namespace
        - id: metadata/library/runtime::azure-identity-namespace
  - id: gcp-default-credentials
    desc: GCP default credential filename
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: application_default_credentials.json
