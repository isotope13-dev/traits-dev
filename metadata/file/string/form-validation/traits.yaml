defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: baseline
  conf: 0.9

traits:
  - id: upgrade-required-message
    desc: Generic upgrade required message
    if:
      type: text
      substr: "Upgrade Required"

  - id: required-keys-update-string
    desc: Generic required_keys.update validation string
    if:
      type: text
      substr: "required_keys.update"

  - id: required-element-string
    desc: Generic required.element validation string
    if:
      type: text
      substr: "required.element"
