defaults:
  for: [binaries, scripts, source]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: large-source-file-1mb
    desc: "Source file larger than 1MB"
    crit: baseline
    for: [scripts, source]
    size_min: 1048576
  - id: large-source-file-4mb
    desc: "Source file larger than 4MB"
    crit: baseline
    for: [scripts, source]
    size_min: 4194304
