defaults:
  platforms:
    - linux
    - unix
    - android
    - windows
    - macos
    - ios
  for: [binaries]
traits:
  - id: indirect-call-reg
    desc: Indirect call via register
    crit: baseline
    conf: 0.3
    count_min: 50
    size_max: 10485760
    if:
      type: hex
      pattern: FF D?
      section: .text
  - id: indirect-call-mem
    desc: Indirect call via memory
    crit: baseline
    conf: 0.3
    count_min: 50
    size_max: 10485760
    if:
      type: hex
      pattern: FF 1?
      section: .text
  - id: cpuid-instr
    desc: CPUID instruction bytes
    crit: baseline
    conf: 0.3
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 0F A2
  - id: xgetbv-instr
    desc: XGETBV instruction bytes
    crit: baseline
    conf: 0.3
    count_min: 1
    size_max: 10485760
    if:
      type: hex
      section: .text
      pattern: 0F 01 D0
composite_rules:
  - id: cpuid-fingerprinting
    desc: CPUID feature detection
    crit: baseline
    conf: 0.4
    all:
      - id: cpuid-instr
      - id: xgetbv-instr
