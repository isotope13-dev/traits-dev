# Text Script Wrapper Structure
defaults:
  crit: baseline
  for: [shell, binaries]
  platforms: [linux, unix, macos, windows, android, ios]
traits:
  - id: crlf-line-endings
    desc: CRLF-delimited wrapper header
    conf: 0.8
    if:
      type: raw
      exact: "filterword=\"su\"\r\n\r\noriginalps=/bin/.ps"
      section: .text
  - id: shell-like-plain-text
    desc: Shell-like plain text script
    conf: 0.82
    if:
      type: raw
      exact: "filterword=\"su\"\r\n\r\noriginalps=/bin/.ps\r\ntempfile=/tmp/.pstmp"
      section: .text
  - id: tiny-text-script
    desc: Tiny multi-line text script
    conf: 0.75
    size_max: 2048
    if:
      type: metrics
      field: "text.total_lines"
      min: 10
      max: 80
composite_rules:
  - id: missing-shebang-shell-wrapper
    desc: Shell-like script without shebang
    crit: baseline
    conf: 0.88
    all:
      - id: shell-like-plain-text
    none:
      - id: metadata/lang/shebang::sh
      - id: metadata/lang/shebang::shell
      - id: metadata/lang/shebang::zsh
      - id: metadata/lang/shebang::dash
