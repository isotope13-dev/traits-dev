# Binary Structural Metrics
# Observational traits for binary organization and characteristics
defaults:
  platforms: [unix, windows, macos]
  for: [binaries]
traits:
  # === Section Entropy ===
  - id: high-entropy-cstring
    desc: High entropy __cstring section (>=4.5)
    crit: baseline
    platforms: [macos]
    for: [macho]
    entropy_min: 4.5
    if:
      type: section
      substr: "__cstring"
  # === Binary Size Metrics ===
  - id: small-elf-binary
    desc: "Small ELF binary (< 50KB)"
    crit: baseline
    conf: 0.6
    for: [elf]
    size_max: 51200
  - id: large-executable
    desc: "Large executable binary (> 1MB)"
    crit: notable
    conf: 0.7
    for: [pe, elf, macho]
    size_min: 1048576
  # === Function Size Metrics ===
  - id: large-functions
    desc: "Binary contains unusually large functions"
    crit: notable
    conf: 0.65
    if:
      type: metrics
      field: binary.huge_functions
      min: 2
  # NOTE: Go and Rust binaries have many linear functions due to compilation
  # patterns (inlining, code generation). Raised threshold significantly -
  # a typical Go binary has 500+ linear functions from runtime alone.
  - id: linear-code-ratio
    # === Linear Code Patterns ===

    desc: "High ratio of linear functions"
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.linear_functions
      min: 1000
  # === Complexity Metrics ===
  - id: low-average-complexity
    desc: "Low average code complexity"
    crit: baseline
    conf: 0.75
    if:
      type: metrics
      field: binary.avg_complexity
      max: 3
    unless:
      - type: metrics
        field: binary.function_count
        max: 0
  # === Sparsity Metrics (Neutral) ===
  - id: few-sections
    desc: "Very few sections (merged/stripped)"
    crit: baseline
    conf: 0.6
    if:
      type: metrics
      field: binary.section_count
      max: 3
  - id: no-functions
    desc: "No detected functions (packed/obfuscated or analysis-limited)"
    crit: baseline
    conf: 0.5
    if:
      type: metrics
      field: binary.function_count
      max: 3
    unless:
      - type: metrics
        field: binary.section_count
        min: 20
      - type: metrics
        field: elf.has_plt
        min: 1
  - id: single-complex-function
    desc: "Single function with high complexity (monolithic stub)"
    crit: notable
    conf: 0.7
    for: [pe, elf, macho]
    if:
      type: metrics
      field: binary.function_count
      min: 1
      max: 1
    unless:
      - type: metrics
        field: binary.avg_basic_blocks
        max: 10
  - id: few-functions
    desc: "Very few functions detected"
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.function_count
      max: 10
    unless:
      - type: metrics
        field: binary.function_count
        max: 3
      - type: metrics
        field: binary.section_count
        min: 40
  - id: few-basic-blocks
    desc: "Very few basic blocks (obfuscated)"
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.total_basic_blocks
      min: 1
      max: 10
  - id: few-leaf-functions
    desc: "Very few leaf functions (deep)"
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.leaf_functions
      min: 1
      max: 5
  - id: no-imports
    desc: "No imported symbols"
    crit: baseline
    conf: 0.7
    for: [pe]
    if:
      type: metrics
      field: binary.import_density
      max: 0
    unless:
      - type: metrics
        field: elf.needed_libs
        min: 1
  - id: many-imports
    desc: "High number of imported symbols (>80)"
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: binary.import_count
      min: 80
  - id: many-functions
    desc: "Binary has many functions (>30)"
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: binary.function_count
      min: 30
  - id: minimal-exports
    desc: "Binary with very few exports (1-2)"
    crit: baseline
    conf: 0.7
    for: [pe, dll]
    if:
      type: exports_count
      min: 1
      max: 2
  - id: many-exports
    desc: "Binary has many exports (>10)"
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: binary.export_count
      min: 10
  - id: elf-no-sections
    desc: "ELF with no section headers"
    crit: baseline
    conf: 0.75
    if:
      type: structure
      feature: "no_sections"
  - id: dominant-section
    desc: "Single section dominates file (packer)"
    crit: baseline
    conf: 0.6
    platforms: [linux, unix, windows, macos]
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.85
