traits:
  - id: load-segment-filesz-exceeds-file
    desc: ELF LOAD segment exceeds file size
    crit: suspicious
    conf: 0.95
    for: [elf]
    size_max: 5000000 # Only flag small files where LOAD > file_size is anomalous
    if:
      type: metrics
      field: "elf.load_segment_max_p_filesz"
      # Detect when LOAD segment claims more than file can contain
      # Combined with size_max, ensures LOAD p_filesz > file_size
      min: 5000000
    mbc: B0001
    attack: T1027
