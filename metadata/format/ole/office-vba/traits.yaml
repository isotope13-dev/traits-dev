defaults:
  platforms: [windows]
  for: [documents]
traits:
  - id: office-word-template
    desc: Office Word template marker
    crit: baseline
    conf: 0.95
    if:
      type: string
      exact: "Normal.dotm"
  - id: vba-runtime-reference
    desc: VBA runtime library reference
    crit: baseline
    conf: 0.95
    if:
      type: string
      substr: "VBA7.1\\VBE7.DLL"
  - id: vba-project-metadata
    desc: VBA project metadata block
    crit: baseline
    conf: 0.94
    if:
      type: raw
      regex: 'CMG="[^"\r\n]{8,}"[\r\n]+DPB="[^"\r\n]{8,}"[\r\n]+GC="[^"\r\n]{8,}"'
  - id: vba-module-descriptors
    desc: Multiple VBA module markers
    crit: baseline
    conf: 0.92
    if:
      type: raw
      regex: 'Module=[A-Za-z0-9]+[\r\n]+Module='
composite_rules:
  - id: word-vba-macro-document
    desc: OLE Word document with VBA
    crit: baseline
    conf: 0.99
    all:
      - id: metadata/format/document/office::ole-compound-file
      - id: metadata/format/document/office::word-document-class
      - id: metadata/format/ole/office-vba::vba-project-metadata
    any:
      - id: metadata/format/ole/office-vba::office-word-template
      - id: metadata/format/ole/office-vba::vba-runtime-reference
      - id: metadata/format/ole/office-vba::vba-module-descriptors
