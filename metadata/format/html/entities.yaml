defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [javascript, typescript]
  crit: component
  conf: 0.95
traits:
  - id: entity-zero-width-space
    desc: HTML entity table contains ZeroWidthSpace
    if:
      type: raw
      substr: 'ZeroWidthSpace:'
  - id: entity-apply-function
    desc: HTML entity table contains ApplyFunction
    if:
      type: raw
      substr: 'ApplyFunction:'
  - id: entity-afr
    desc: HTML entity table contains Afr mathematical entity
    if:
      type: raw
      substr: 'Afr:'
  - id: entity-zwnj
    desc: HTML entity table contains zwnj
    if:
      type: raw
      substr: 'zwnj:'
composite_rules:
  - id: named-unicode-entity-table
    desc: Embedded HTML named Unicode entity lookup table
    crit: baseline
    conf: 0.95
    all:
      - id: entity-zero-width-space
      - id: entity-apply-function
      - id: entity-afr
      - id: entity-zwnj
