# ELF Sections
# ELF section name references (baseline markers)
defaults:
  platforms: [linux, unix, android]
  for: [elf]
traits:
  # === Constructor/Destructor Sections ===
  - id: init-array
    desc: .init_array section reference
    crit: baseline
    conf: 0.4
    if:
      type: string
      substr: ".init_array"
      section: .text
  - id: fini-array
    desc: .fini_array section reference
    crit: baseline
    conf: 0.4
    if:
      type: string
      substr: ".fini_array"
      section: .text
  - id: ctors
    desc: .ctors section reference
    crit: baseline
    conf: 0.4
    if:
      type: string
      substr: ".ctors"
      section: .text
  - id: dtors
    desc: .dtors section reference
    crit: baseline
    conf: 0.4
    if:
      type: string
      substr: ".dtors"
      section: .text
  - id: preinit-array
    desc: .preinit_array section reference
    crit: baseline
    conf: 0.4
    if:
      type: string
      substr: ".preinit_array"
      # === Symbol Versioning ===
      section: .text
  - id: gnu-version
    desc: .gnu.version section reference
    crit: baseline
    conf: 0.4
    if:
      type: string
      substr: ".gnu.version"
      section: .text
  - id: gnu-hash
    desc: .gnu.hash section reference
    crit: baseline
    conf: 0.3
    if:
      type: string
      substr: ".gnu.hash"
      # === DWARF Debug Sections ===
      section: .text
  - id: debug-info
    desc: DWARF .debug_info section (unstripped binary)
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: ".debug_info"
      section: .text
  - id: debug-line
    desc: DWARF .debug_line section (source line info)
    crit: baseline
    conf: 0.6
    if:
      type: raw
      substr: ".debug_line"
      section: .text
  - id: debug-str
    desc: DWARF .debug_str section (debug strings)
    crit: baseline
    conf: 0.6
    if:
      type: raw
      substr: ".debug_str"
      section: .text
  - id: debug-abbrev
    desc: DWARF .debug_abbrev section
    crit: baseline
    conf: 0.5
    if:
      type: raw
      substr: ".debug_abbrev"
      section: .text
composite_rules:
  # NOTE: Constructor/destructor sections are standard for virtually all shared
  # libraries and executables - they're used for library initialization and cleanup.
  # Marked as baseline since presence is not suspicious by itself.
  - id: constructor-destructor
    desc: ELF constructor/destructor functions
    crit: baseline
    conf: 0.5
    needs: 2
    any:
      - id: init-array
      - id: fini-array
      - id: ctors
      - id: dtors
      - id: preinit-array
  # DWARF debug info retained — binary was not stripped before deployment
  - id: dwarf-debug-retained
    desc: DWARF debug info retained in ELF (unstripped)
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: debug-info
      - id: debug-line
      - id: debug-str
      - id: debug-abbrev
