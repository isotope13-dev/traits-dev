defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [data]
traits:
  - id: rar-v4-header
    desc: RAR v4 archive header
    crit: baseline
    conf: 1.0
    if:
      type: hex
      pattern: "52 61 72 21 1A 07 00"
      offset: 0
  - id: rar-v4-locked-encrypted-rr
    desc: Locked encrypted RAR with recovery
    crit: notable
    conf: 0.98
    if:
      type: hex
      pattern: "52 61 72 21 1A 07 00 ?? ?? 73 C4 00 0D 00"
      offset: 0
