# JSON Data Format
# Detects JSON structure to help exclude data files from code analysis

defaults:
  for: [all]

traits:
  - id: valid
    desc: JSON data format
    crit: baseline
    conf: 0.6
    if:
      type: basename
      regex: "\\.json$"

  - id: zstd-json
    desc: ZSTD-compressed JSON sidecar
    crit: baseline
    conf: 0.85
    if:
      type: basename
      regex: "\\.json\\.zst(d)?$"

  - id: sourcemap
    desc: JavaScript Sourcemap
    crit: notable
    conf: 1.0
    if:
      type: raw
      regex: '\{\s{0,32}"version"\s{0,4}:\s{0,4}3\s{0,4},\s{0,32}"(file|sources)"'
