# JSON Data Format
# Detects JSON structure to help exclude data files from code analysis
defaults:
  for: [elf, macho, pe, so, dylib, dll, shell]
traits:
  - id: valid
    desc: JSON data format
    crit: baseline
    conf: 0.6
    if:
      type: basename
      regex: "\\.json$"
  - id: zstd-json
    desc: ZSTD-compressed JSON sidecar
    crit: baseline
    conf: 0.85
    if:
      type: basename
      regex: "\\.json\\.zst(d)?$"
  - id: sourcemap
    desc: JavaScript Sourcemap
    crit: notable
    conf: 1.0
    if:
      type: raw
      regex: '\{\s*"version"\s*:\s*3\s*,\s*"(file|sources)"'
      section: .text
