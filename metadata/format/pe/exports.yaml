defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: export-dll-can-unload-now
    desc: COM unload export present
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllCanUnloadNow
  - id: export-dll-get-class-object
    desc: COM class factory export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllGetClassObject
  - id: export-dll-register-server
    desc: COM registration export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllRegisterServer
  - id: export-dll-unregister-server
    desc: COM unregistration export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllUnregisterServer
composite_rules:
  - id: standard-com-server-exports
    desc: Standard COM server export set
    crit: baseline
    conf: 0.95
    all:
      - id: export-dll-can-unload-now
      - id: export-dll-get-class-object
      - id: export-dll-register-server
      - id: export-dll-unregister-server
    unless:
      - type: metrics
        field: binary.export_count
        min: 9
