defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: single-import-raw
    desc: PE import table has exactly one entry
    crit: component
    conf: 0.7
    if:
      type: import_combination
      max_total: 1
  - id: single-import-count
    desc: PE with single import
    crit: baseline
    conf: 0.7
    if:
      id: single-import-raw
    unless:
      - id: managed-resource-bootstrap-import
      - id: metadata/format/pe::dotnet-assembly
  - id: few-import-count
    desc: PE with very few imports
    crit: baseline
    conf: 0.7
    if:
      type: import_combination
      max_total: 2
    unless:
      - id: managed-resource-bootstrap-import
      - id: metadata/format/pe::dotnet-assembly
composite_rules:
  - id: managed-resource-bootstrap-import
    desc: ".resources.dll with CLR bootstrap-only import"
    crit: component
    conf: 0.95
    all:
      - id: single-import-raw
      - id: metadata/format/pe::resources-dll-extension
      - id: metadata/format/pe::dotnet-assembly
