# .NET Assembly Detection
# Identifies .NET executables via imports and metadata

defaults:
  for: [pe]

traits:
  - id: mscoree-name
    desc: "mscoree name reference"
    if:
      type: raw
      substr: "mscoree"

  - id: dotnet-runtime
    desc: ".NET Runtime Reference"
    crit: baseline
    conf: 1.0
    if:
      type: string
      # _CorExeMain or _CorDllMain
      regex: "_Cor(Exe|Dll)Main"

  - id: dotnet-metadata
    desc: ".NET Metadata Root (BSJB)"
    crit: baseline
    conf: 1.0
    if:
      type: raw
      substr: "BSJB"

composite_rules:
  - id: dotnet-assembly
    desc: ".NET Assembly (mscoree.dll)"
    crit: baseline
    conf: 1.0
    all:
      - id: micro-behaviors/fs/path/extension::dll
      - id: mscoree-name
