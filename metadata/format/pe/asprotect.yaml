defaults:
  platforms: [windows]
  crit: baseline
  for: [pe]
traits:
  - id: asprotect-section
    desc: ASProtect section marker (.aspr)
    if:
      type: section
      substr: '.aspr'
  - id: asprotect-string
    desc: ASProtect registry string in .text
    if:
      type: string_value
      exact: "Software\\ASProtect\\SpecData"
      section: ".text"
  - id: asprotect-string-code
    desc: ASProtect registry string in .CODE
    if:
      type: string_value
      exact: "Software\\ASProtect\\SpecData"
      section: ".CODE"
  - id: asprotect-product-name
    desc: ASProtect product metadata string
    if:
      type: string_value
      exact: "ASProtect Software Protection"
      section: ".data"
  - id: asprotect-vendor-name
    desc: ASPack vendor metadata string
    if:
      type: string_value
      exact: "1999-2010 © ASPack Software"
      section: ".data"
composite_rules:
  - id: asprotect
    desc: File is ASProtect-related software
    any:
      - id: asprotect-section
      - id: asprotect-string
      - id: asprotect-string-code
      - id: asprotect-product-name
      - id: asprotect-vendor-name
