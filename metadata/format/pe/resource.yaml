# Resource-only PE traits
defaults:
  for: [pe]
traits:
  - id: mui-string
    desc: "MUI resource file identifier"
    crit: component
    conf: 0.9
    if:
      type: string
      regex: "(?i)\\.mui\\b"
      section: .text
  - id: large-single-section
    desc: "Single section takes >85% of binary"
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.85
  - id: resources-dll-extension
    desc: ".resources.dll satellite assembly"
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: "(?i)\\.resources\\.dll$"
  - id: rich-header-present
    desc: PE Rich header present (MSVC toolchain)
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: pe.rich_header_present
      min: 1
  - id: low-code-entropy
    desc: "Very low code entropy, minimal code"
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.code_entropy
      max: 2.0
composite_rules:
  - id: resource-only-dll
    desc: "PE file consisting primarily of resources (e.g., .mui, UI localization)"
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/format::no-imports
      - id: metadata/format::no-functions
    any:
      - id: mui-string
      - id: large-single-section
      - id: resources-dll-extension
      - id: low-code-entropy
    none:
      # Not a resource DLL if it has executable code with real entropy
      - id: objectives/anti-static/obfuscation/packer::tiny-executable-obfuscation-section
      # Not a resource DLL if it shows shellcode-like indirect calls
      - id: micro-behaviors/mem/shellcode/transfer::call-rax
