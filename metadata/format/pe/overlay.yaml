# PE Overlay Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: has-overlay
    desc: PE binary has trailing overlay data
    crit: baseline
    conf: 1.0
    if:
      type: structure
      feature: "binary/overlay"
  - id: overlay-size-metrics
    desc: PE binary has overlay bytes
    crit: baseline
    conf: 1.0
    if:
      type: metrics
      field: binary.overlay_size
      min: 1
