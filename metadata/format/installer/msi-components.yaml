# MSI embedded component libraries that indicate capability
defaults:
  platforms: [windows]
  for: [oledoc]
  crit: notable
  conf: 0.88
traits:
  - id: embedded-taskscheduler-dll
    desc: Embedded .NET TaskScheduler library
    attack: T1053.005
    if:
      type: raw
      substr: Microsoft.Win32.TaskScheduler.dll
  - id: embedded-wmi-dll
    desc: Embedded WMI management library
    if:
      type: raw
      substr: WMI.dll
  - id: embedded-newtonsoft-json
    desc: Embedded Newtonsoft JSON library
    crit: baseline
    if:
      type: raw
      substr: Newtonsoft.Json.dll
  - id: embedded-managed-custom-action
    desc: Managed .NET custom action host
    crit: baseline
    if:
      type: raw
      substr: InvokeManagedCustomActionOutOfProcW
  - id: msi-arpnomodify
    desc: MSI disables Add/Remove modify option
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: ARPNOMODIFY
  - id: msi-arpnorepair
    desc: MSI disables Add/Remove repair option
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: ARPNOREPAIR
composite_rules:
  - id: msi-persistence-libraries
    desc: MSI bundles task scheduler and WMI
    crit: suspicious
    conf: 0.93
    attack: T1053.005
    all:
      - id: metadata/format/installer::msi-installer-raw
      - id: embedded-taskscheduler-dll
      - id: embedded-wmi-dll
  - id: msi-anti-tamper
    desc: MSI disables modification and repair
    crit: notable
    conf: 0.87
    all:
      - id: metadata/format/installer::msi-installer-raw
      - id: msi-arpnomodify
      - id: msi-arpnorepair
