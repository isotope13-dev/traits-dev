defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: known-benign-installer
    desc: Known benign installer framework
    crit: component
    conf: 0.95
    any:
      - id: metadata/format/installer::wix-burn-bootstrapper
      - id: metadata/format/installer::nsis
      - id: metadata/format/installer::inno-setup
      - id: metadata/format/installer::7zip-sfx-installer
      - id: metadata/format/installer::winrar-sfx
      - id: metadata/format/installer::iexpress
