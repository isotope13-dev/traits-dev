defaults:
  platforms: [windows]
  for: [oledoc]
  crit: baseline
  conf: 0.85
traits:
  - id: msi-installer
    desc: Windows Installer database package
    conf: 0.98
    if:
      type: string_value
      exact: Installation Database
  - id: wix-toolset-authoring
    desc: WiX Toolset authoring marker
    crit: notable
    conf: 0.98
    if:
      type: string_value
      exact: Windows Installer XML Toolset ()
  - id: embedded-data-cab
    desc: Embedded data cabinet stream
    conf: 0.96
    if:
      type: string_value
      exact: "#data.cab"
  - id: embedded-vbs-payload
    desc: Embedded VBScript payload entry
    conf: 0.95
    if:
      type: string_value
      exact: VbsFile
  - id: embedded-powershell-payload
    desc: Embedded PowerShell payload entry
    conf: 0.95
    if:
      type: string_value
      exact: Ps1File
  - id: embedded-mscf-cabinet
    desc: Embedded Microsoft cabinet header
    conf: 0.92
    if:
      type: raw
      exact: MSCF
  - id: localappdata-installfolder
    desc: LocalAppData install folder property
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: LocalAppDataFolder
composite_rules:
  - id: wix-authored-msi
    desc: WiX-authored MSI package
    crit: notable
    conf: 0.98
    all:
      - id: msi-installer
      - id: wix-toolset-authoring
  - id: script-payload-cabinet
    desc: MSI cabinet with script payloads
    crit: suspicious
    conf: 0.97
    all:
      - id: embedded-data-cab
      - id: embedded-mscf-cabinet
      - id: embedded-vbs-payload
      - id: embedded-powershell-payload
