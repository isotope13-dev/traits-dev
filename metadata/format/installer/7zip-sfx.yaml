defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: 7zip-installer-description
    desc: 7-Zip installer description
    crit: component
    conf: 0.98
    if:
      type: string
      exact: "7-Zip Installer"
      section: .rsrc
  - id: 7zip-installer-setup-banner
    desc: 7-Zip setup banner string
    crit: component
    conf: 0.95
    if:
      type: string
      regex: '7-Zip [0-9]{1,2}\\.[0-9]{2}( \\(x(64|86)\\))? Setup'
      section: .rdata
  - id: 7zip-registry-key
    desc: 7-Zip registry key path
    crit: component
    conf: 0.95
    if:
      type: string
      exact: "Software\\7-Zip"
      section: .rdata
  - id: 7zip-original-filename
    desc: 7-Zip installer filename
    crit: component
    conf: 0.95
    if:
      type: string
      exact: "7zipInstall.exe"
      section: .rsrc
composite_rules:
  - id: 7zip-sfx-installer
    desc: 7-Zip self-extracting installer
    crit: notable
    conf: 0.99
    all:
      - id: metadata/format/installer::7zip-installer-description
    needs: 2
    any:
      - id: metadata/format/installer::7zip-installer-setup-banner
      - id: metadata/format/installer::7zip-registry-key
      - id: metadata/format/installer::7zip-original-filename
