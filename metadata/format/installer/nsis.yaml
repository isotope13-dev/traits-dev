defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: nsis-version-banner-rsrc
    desc: NSIS version banner in resources
    crit: component
    conf: 0.95
    if:
      type: string
      substr: "Nullsoft Install System v2.46-Unicode"
      section: ".rsrc"
  - id: nsis-error-title-rdata
    desc: NSIS runtime error title in rdata
    crit: component
    conf: 1.0
    if:
      type: string
      exact: "NSIS Error"
      section: .rdata
  - id: nsis-error-title-data
    desc: NSIS runtime error title in data
    crit: component
    conf: 1.0
    if:
      type: string
      exact: "NSIS Error"
      section: .data
  - id: nsis-error-url-rdata
    desc: NSIS runtime error URL in rdata
    crit: component
    conf: 1.0
    if:
      type: string
      substr: "nsis.sf.net/NSIS_Error"
      section: .rdata
  - id: nsis-error-url-data
    desc: NSIS runtime error URL in data
    crit: component
    conf: 1.0
    if:
      type: string
      substr: "nsis.sf.net/NSIS_Error"
      section: .data
  - id: nsis-ncrc-switch-data
    desc: NSIS CRC bypass switch string
    crit: component
    conf: 0.95
    if:
      type: string
      substr: "/NCRC"
      section: .data
  - id: nsis-sfx-deadbeef-magic
    desc: NSIS SFX stub DEADBEEF marker in code
    crit: component
    conf: 0.95
    if:
      type: hex
      pattern: "(68|B9|BA|B8) EF BE AD DE"
      section: .text
composite_rules:
  - id: nsis-error-title
    desc: NSIS runtime error title marker
    crit: component
    conf: 1.0
    any:
      - id: metadata/format/installer::nsis-error-title-rdata
      - id: metadata/format/installer::nsis-error-title-data
  - id: nsis-error-url
    desc: NSIS runtime error help URL
    crit: component
    conf: 1.0
    any:
      - id: metadata/format/installer::nsis-error-url-rdata
      - id: metadata/format/installer::nsis-error-url-data
  - id: nsis
    desc: Nullsoft NSIS installer marker
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: metadata/format/installer::nsis-sfx-deadbeef-magic
      - id: metadata/format/installer::nsis-version-banner-rsrc
      - id: metadata/format/installer::nsis-error-title
      - id: metadata/format/installer::nsis-error-url
      - id: metadata/format/installer::nsis-ncrc-switch-data
