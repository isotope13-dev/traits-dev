defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: registry-key
    desc: WinRAR SFX registry key
    crit: component
    conf: 0.98
    if:
      type: string_value
      exact: Software\WinRAR SFX
      section: .rdata
  - id: manifest-name
    desc: WinRAR SFX manifest name
    crit: component
    conf: 0.98
    if:
      type: string_value
      exact: WinRAR SFX
      section: .rsrc
  - id: manifest-description
    desc: WinRAR SFX manifest description
    crit: component
    conf: 0.99
    if:
      type: string_value
      exact: WinRAR SFX module
      section: .rsrc
  - id: dialog-start
    desc: WinRAR SFX start dialog
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: STARTDLG
      section: .rdata
composite_rules:
  - id: winrar-sfx
    desc: WinRAR self-extracting archive
    crit: notable
    conf: 0.99
    all:
      - id: metadata/format/installer::registry-key
    needs: 2
    any:
      - id: metadata/format/installer::manifest-name
      - id: metadata/format/installer::manifest-description
      - id: metadata/format/installer::dialog-start
