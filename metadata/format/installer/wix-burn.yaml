defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: wix-bootstrapper-manifest
    desc: WiX bootstrapper manifest marker
    crit: component
    conf: 1.0
    if:
      type: string_value
      substr: "WiX Toolset Bootstrapper"
      section: .rsrc
  - id: wixburn-section-name
    desc: WiX Burn section name marker
    crit: component
    conf: 1.0
    if:
      type: string_value
      exact: ".wixburn"
      section: .rdata
composite_rules:
  - id: wix-burn-bootstrapper
    desc: WiX Burn bootstrapper marker
    crit: notable
    conf: 0.98
    all:
      - id: metadata/format/installer::wix-bootstrapper-manifest
      - id: metadata/format/installer::wixburn-section-name
