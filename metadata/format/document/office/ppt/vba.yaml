defaults:
  for: [documents]
  platforms: [linux, unix, android, macos, ios, windows]
  crit: baseline
  conf: 0.9
traits:
  - id: ppt-vba-project
    desc: PowerPoint VBA project marker
    conf: 0.95
    if:
      type: string
      exact: "ppt/vbaProject.bin"
  - id: ppt-macroenabled-content
    desc: PowerPoint macro-enabled content
    conf: 0.97
    if:
      type: raw
      substr: "application/vnd.ms-powerpoint.presentation.macroEnabled"
  - id: ppt-presentation-part
    desc: PowerPoint presentation XML part
    conf: 0.98
    if:
      type: string
      exact: "ppt/presentation.xml"
  - id: ppt-slide-part
    desc: PowerPoint slide XML part
    conf: 0.97
    if:
      type: string
      regex: "ppt/slides/slide[0-9]"
  - id: ppt-action-verb
    desc: PowerPoint action verb attribute
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: '(?i)action="ppaction://[a-z]'
  - id: ppt-custom-action-macro
    desc: PowerPoint macro action trigger
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '(?i)ppaction://macro'
composite_rules:
  - id: ppt-vba-document
    desc: OOXML PowerPoint VBA document
    conf: 0.99
    all:
      - id: ppt-presentation-part
      - id: ppt-vba-project
      - id: ppt-macroenabled-content
  - id: ppt-macro-trigger
    desc: PowerPoint macro action trigger
    crit: suspicious
    conf: 0.96
    all:
      - id: ppt-vba-document
      - id: ppt-custom-action-macro
