defaults:
  for: [documents]
  platforms: [linux, unix, android, macos, ios, windows]
  crit: baseline
  conf: 0.9
traits:
  - id: ppt-vba-project
    desc: PowerPoint VBA project marker
    conf: 0.95
    if:
      type: string_value
      exact: "ppt/vbaProject.bin"
  - id: ppt-macroenabled-content
    desc: PowerPoint macro-enabled content
    conf: 0.97
    if:
      type: raw
      substr: "application/vnd.ms-powerpoint.presentation.macroEnabled"
  - id: ppt-presentation-part
    desc: PowerPoint presentation XML part
    conf: 0.98
    if:
      type: string_value
      exact: "ppt/presentation.xml"
  - id: ppt-slide-part
    desc: PowerPoint slide XML part
    conf: 0.97
    if:
      type: string_value
      regex: "ppt/slides/slide[0-9]"
composite_rules:
  - id: ppt-vba-document
    desc: OOXML PowerPoint VBA document
    conf: 0.99
    all:
      - id: ppt-presentation-part
      - id: ppt-vba-project
      - id: ppt-macroenabled-content
