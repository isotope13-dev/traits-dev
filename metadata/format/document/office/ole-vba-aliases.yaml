defaults:
  for: [oledoc, rtf, pdf]
  platforms: [windows]
traits:
  - id: excel-vba-project
    desc: Excel VBA project marker
    crit: baseline
    conf: 0.8
    if:
      type: string
      substr: "VBA"
  - id: msiexec-quiet-install
    desc: Quiet msiexec install string
    crit: notable
    conf: 0.82
    if:
      type: string
      regex: "(?i)msiexec(.{0,32})/q"
  - id: emotet-userform-object-names
    desc: Suspicious VBA userform object names
    crit: component
    conf: 0.8
    if:
      type: string
      regex: "(?i)UserForm|Label[0-9]{1,2}|TextBox[0-9]{1,2}"
  - id: msforms-userform-payload-surface
    desc: MSForms userform surface strings
    crit: component
    conf: 0.82
    if:
      type: string
      regex: "(?i)MSForms\\.(UserForm|Label|TextBox|CommandButton)"
  - id: userform-activate-handler
    desc: VBA UserForm activation handler
    crit: component
    conf: 0.82
    if:
      type: string
      regex: "(?i)UserForm_Activate"
