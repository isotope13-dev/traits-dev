---
defaults:
  platforms:
  - unix
  - windows
  for:
  - chrome-manifest
  crit: notable
  conf: 0.9
traits:
- id: permission-storage
  desc: Extension requests storage permission
  if:
    type: value
    path: permissions
    exact: storage
- id: permission-unlimited-storage
  desc: Extension requests unlimited storage
  if:
    type: value
    path: permissions
    exact: unlimitedStorage
