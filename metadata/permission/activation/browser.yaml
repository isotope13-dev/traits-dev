defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.85

traits:
  - id: content-script-run-at-start
    desc: Content script runs at document_start
    if:
      type: value
      path: 'content_scripts[*].run_at'
      exact: 'document_start'

  - id: content-script-all-frames
    desc: Content script runs in all frames
    if:
      type: value
      path: 'content_scripts[*].all_frames'
      exact: 'true'

  - id: content-script-match-about-blank
    desc: Content script runs in about:blank frames
    if:
      type: value
      path: 'content_scripts[*].match_about_blank'
      exact: 'true'
