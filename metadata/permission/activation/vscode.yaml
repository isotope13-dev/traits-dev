---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: activate-all-events
  desc: VSCode wildcard activation event
  crit: notable
  conf: 0.95
  for:
  - package.json
  if:
    type: value
    path: activationEvents[*]
    exact: "*"
- id: on-uri-activation
  desc: VSCode onUri activation event
  crit: notable
  conf: 0.95
  for:
  - package.json
  if:
    type: value
    path: activationEvents
    regex: onUri
- id: on-startup-finished
  desc: VS Code extension activates after startup
  crit: notable
  conf: 0.9
  for:
  - package.json
  if:
    type: value
    path: activationEvents
    regex: onStartupFinished
- id: main-extension-js
  desc: Main entry points to extension.js
  crit: notable
  conf: 0.9
  for:
  - package.json
  if:
    type: value
    path: main
    exact: "./extension.js"
- id: async-function-activate
  desc: async function activate definition
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: async function activate
- id: export-activate
  desc: export activate pattern
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    regex: export.{0,30}activate
- id: function-deactivate
  desc: function deactivate definition
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: function deactivate
- id: export-deactivate
  desc: export deactivate pattern
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    regex: export.{0,30}deactivate
composite_rules:
- id: vscode-context
  desc: VSCode API context markers
  crit: notable
  conf: 0.9
  any:
  - id: activate-all-events
  - id: on-uri-activation
  - id: on-startup-finished
  - id: main-extension-js
  - id: metadata/permission/extension-api::vscode-commands
  - id: metadata/permission/extension-api::vscode-window
  - id: metadata/permission/workspace::vscode-workspace
  - id: metadata/permission/extension-api::vscode-extensions
  - id: metadata/library/vscode::activate-function
- id: activate-comp
  desc: VSCode extension activate function
  crit: notable
  conf: 1.0
  any:
  - id: metadata/library/vscode::activate-function
  - id: async-function-activate
  - id: export-activate
- id: deactivate
  desc: VSCode extension deactivate function
  crit: notable
  conf: 1.0
  any:
  - id: function-deactivate
  - id: export-deactivate
