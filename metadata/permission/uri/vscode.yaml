---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: register-uri-handler
  desc: VSCode registerUriHandler call
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: vscode.window.registerUriHandler
- id: handle-uri-method
  desc: handleUri method in handler
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: handleUri(uri)
- id: url-search-params
  desc: URLSearchParams parses URI query
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: new URLSearchParams(uri.query)
- id: uri-username-param
  desc: VSCode URI handler reads username parameter
  crit: component
  conf: 0.9
  if:
    type: text
    substr: params.get('username')
- id: uri-password-param
  desc: VSCode URI handler reads password parameter
  crit: component
  conf: 0.95
  if:
    type: text
    substr: params.get('password')
- id: oauth-code-param
  desc: Reads OAuth code query param
  crit: component
  conf: 0.95
  if:
    type: text
    substr: params.get('code')
- id: oauth-state-param
  desc: Reads OAuth state query param
  crit: component
  conf: 0.95
  if:
    type: text
    substr: params.get('state')
- id: oauth-intercept-notice
  desc: Warns OAuth code intercepted
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    substr: OAuth code intercepted
composite_rules:
- id: uri-handler
  desc: VSCode URI handler registration
  crit: notable
  conf: 0.92
  all:
  - id: register-uri-handler
  - id: handle-uri-method
- id: uri-handler-credential-params
  desc: VSCode URI handler accepts credential parameters
  crit: suspicious
  conf: 0.95
  all:
  - id: uri-handler
  - id: url-search-params
  - id: uri-username-param
  - id: uri-password-param
- id: oauth-code-capture
  desc: VSCode URI handler captures OAuth code
  crit: suspicious
  conf: 0.97
  all:
  - id: uri-handler
  - id: url-search-params
  - id: oauth-code-param
  - id: oauth-state-param
