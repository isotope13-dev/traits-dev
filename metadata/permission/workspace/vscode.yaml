---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: workspace-findFiles
  desc: VSCode workspace.findFiles API call (file
  crit: notable
  conf: 0.85
  if:
    type: symbol
    kind: call
    exact: workspace.findFiles
- id: fs-readFile
  desc: VSCode workspace.fs.readFile API call (file
  crit: notable
  conf: 0.85
  if:
    type: symbol
    kind: call
    exact: workspace.fs.readFile
- id: openTextDocument
  desc: VSCode workspace.openTextDocument API call
  crit: notable
  conf: 0.8
  if:
    type: symbol
    kind: call
    exact: openTextDocument
- id: vscode-workspace
  desc: vscode.workspace reference
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: vscode.workspace
composite_rules:
- id: env-access-comp
  desc: Access to process.env in VSCode
  crit: notable
  conf: 0.85
  mbc: E1592
  attack: T1082
  all:
  - id: metadata/permission/activation::vscode-context
  - id: micro-behaviors/os/env/access::javascript
- id: external-request
  desc: HTTP request in VSCode extension
  crit: suspicious
  conf: 0.7
  all:
  - id: metadata/permission/activation::vscode-context
  - id: micro-behaviors/communications/http/request/
  unless:
  - id: metadata/file/format::sourcemap-sources-content
