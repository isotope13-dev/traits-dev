---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: social-comment-generate-endpoint
  desc: Social comment generation API endpoint
  crit: component
  conf: 0.88
  if:
    type: string_literal
    regex: https://[^"'\s]+/comments/generate
- id: social-post-content-field
  desc: Social post content field
  crit: component
  conf: 0.88
  if:
    type: text
    substr: postContent
- id: social-previous-comments-field
  desc: Social previous comments field
  crit: component
  conf: 0.88
  if:
    type: text
    substr: previousComments
- id: social-draft-comment-field
  desc: Social draft comment field
  crit: component
  conf: 0.86
  if:
    type: text
    substr: draftComment
- id: linkedin-comment-dom-selectors
  desc: LinkedIn comment DOM selectors
  crit: component
  conf: 0.88
  if:
    type: text
    regex: feed-shared-update-v2|comments-comment-box
- id: ai-comment-ui-marker
  desc: AI comment UI marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: ai-comment-generate
- id: observe-document-body-call
  desc: ".observe(document.body) call"
  crit: component
  conf: 0.85
  if:
    type: text
    regex: observer\.observe\(document\.body|observe\(document\.body
- id: disable-devtools-lib
  desc: DisableDevtool library marker
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bdisable[-_]?devtool\b'
composite_rules:
- id: mutation-observer-body
  desc: Observes mutations on document body
  crit: notable
  conf: 0.85
  all:
  - id: micro-behaviors/ui/window/manage/dom::browser-mutation-observer
  - id: observe-document-body-call
  - id: metadata/permission/runtime::is-extension
- id: linkedin-ai-comment-ui-injection
  desc: Injects AI comment controls into LinkedIn comments
  crit: notable
  conf: 0.9
  all:
  - id: linkedin-comment-dom-selectors
  - id: ai-comment-ui-marker
- id: social-ai-comment-context-request
  desc: Sends social post context to AI comment endpoint
  crit: notable
  conf: 0.92
  all:
  - id: social-comment-generate-endpoint
  - id: social-post-content-field
  - id: linkedin-comment-dom-selectors
  any:
  - id: social-previous-comments-field
  - id: social-draft-comment-field
