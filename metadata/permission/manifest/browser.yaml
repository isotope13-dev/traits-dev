# Chrome Extension Manifest Properties
# Neutral manifest structure and permission metadata.
defaults:
  platforms: [windows, unix]
  for: [chrome-manifest]
  crit: baseline
  conf: 0.95
traits:
  - id: is-chrome-manifest
    desc: Chrome extension manifest file
    size_min: 128
    if:
      type: value
      path: 'manifest_version'
  - id: manifest-v3
    desc: Chrome extension Manifest V3
    if:
      type: value
      path: manifest_version
      exact: '3'
  - id: manifest-v2
    desc: Chrome extension Manifest V2
    size_min: 128
    not:
      - substr: '"name": "ui-page"'
    if:
      type: value
      path: manifest_version
      exact: '2'
  - id: extension-name-field
    desc: Extension declares name field
    if:
      type: value
      path: name
  - id: extension-description-field
    desc: Extension declares description field
    if:
      type: value
      path: description
  - id: extension-version-field
    desc: Extension declares version field
    if:
      type: value
      path: version
  - id: extension-conventional-version
    desc: Extension uses conventional version
    if:
      type: value
      path: version
      regex: '^[0-9]+(\.[0-9]+){1,3}([.-][A-Za-z0-9]+)?$'
  - id: extension-default-locale
    desc: Extension declares default locale
    if:
      type: value
      path: default_locale
  - id: extension-localized-name-placeholder
    desc: Extension name uses locale placeholder
    if:
      type: value
      path: name
      regex: '^__MSG_[A-Za-z0-9_]+__$'
  - id: extension-localized-description-placeholder
    desc: Extension description uses locale placeholder
    if:
      type: value
      path: description
      regex: '^__MSG_[A-Za-z0-9_]+__$'
  - id: extension-action-icon
    desc: Extension declares action icon
    if:
      type: value
      path: action.default_icon
  - id: extension-icon-128
    desc: Extension declares 128px icon
    if:
      type: value
      path: icons.128
  - id: extension-google-update-url
    desc: Extension uses Google update URL
    if:
      type: value
      path: update_url
      substr: clients2.google.com/service/update2/crx
  - id: host-permission-all-urls
    desc: Extension has all-URL host permission
    crit: notable
    conf: 0.95
    ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
    if:
      type: value
      path: host_permissions
      exact: '<all_urls>'
  - id: chrome-search-provider-override
    desc: Chrome search provider override
    crit: notable
    for: [json, chrome-manifest]
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      exists: true
  - id: chrome-default-search-provider
    desc: Chrome default search provider override
    crit: notable
    for: [json, chrome-manifest]
    if:
      type: value
      path: chrome_settings_overrides.search_provider.is_default
      exact: 'true'
  - id: chrome-search-terms-template
    desc: Chrome search terms template URL
    crit: component
    for: [json, chrome-manifest]
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      substr: "{searchTerms}"
  - id: chrome-newtab-override
    desc: Chrome new tab page override
    crit: notable
    for: [json, chrome-manifest]
    if:
      type: value
      path: chrome_url_overrides.newtab
      exists: true
  - id: extension-edge-update-url
    desc: "Extension uses MS Edge Add-ons update URL"
    if:
      type: value
      path: update_url
      substr: edge.microsoft.com/extensionwebstorebase
  - id: extension-managed-storage-schema
    desc: Extension declares managed storage schema
    if:
      type: value
      path: storage.managed_schema
  - id: extension-wasm-unsafe-eval-csp
    desc: Extension allows WASM unsafe eval
    conf: 0.9
    if:
      type: value
      path: content_security_policy.extension_pages
      substr: wasm-unsafe-eval
  - id: permission-tabs
    desc: Extension requests tabs permission
    conf: 0.9
    if:
      type: value
      path: permissions
      exact: 'tabs'
  - id: permission-identity-email
    desc: Extension requests identity email
    crit: notable
    conf: 0.94
    ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
    if:
      type: value
      path: permissions
      exact: 'identity.email'
  - id: permission-scripting
    desc: Extension requests scripting permission
    if:
      type: value
      path: permissions
      exact: 'scripting'
  - id: background-service-worker
    desc: Extension background service worker
    if:
      type: value
      path: background.service_worker
  - id: web-accessible-resources
    desc: Extension web accessible resources
    if:
      type: value
      path: web_accessible_resources
  - id: externally-connectable
    desc: Extension external connection allowlist
    if:
      type: value
      path: externally_connectable
  - id: externally-connectable-all-sites
    desc: Extension externally connectable all sites
    crit: suspicious
    if:
      type: value
      path: externally_connectable.matches
      regex: '^\*://\*/\*$|^https?://\*/\*$'
    unless:
    - id: well-known/app/browser-extension-known/
  - id: gecko-extension-id
    desc: Firefox extension identifier
    if:
      type: value
      path: browser_specific_settings.gecko.id
  - id: gecko-strict-min-version
    desc: Firefox strict minimum version
    if:
      type: value
      path: browser_specific_settings.gecko.strict_min_version
  - id: gecko-data-collection-permissions
    desc: Firefox data collection permissions
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions
  - id: gecko-collects-pii
    desc: Firefox declares PII collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: personallyIdentifyingInfo
  - id: gecko-collects-website-content
    desc: Firefox declares website content collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: websiteContent
  - id: gecko-collects-financial-info
    desc: Firefox declares financial data collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: financialAndPaymentInfo
  - id: host-opnskin
    desc: Extension targets OpnSkin hosts
    if:
      type: value
      path: host_permissions
      regex: 'opnskin\.com'
  - id: host-steamcommunity
    desc: Extension targets Steam Community
    if:
      type: value
      path: host_permissions
      regex: 'steamcommunity\.com'
  - id: host-steampowered-api
    desc: Extension targets Steam Web API
    if:
      type: value
      path: host_permissions
      regex: 'api\.steampowered\.com'

composite_rules:
  - id: privacy-sensitive-data-permissions
    desc: Privacy-sensitive data access permissions
    crit: notable
    conf: 0.95
    all:
      - id: is-chrome-manifest
    needs: 2
    any:
      - id: metadata/permission/cookie::permission-cookies
      - id: metadata/permission/history::permission-history
      - id: metadata/permission/clipboard::permission-clipboard-read
      - id: metadata/permission/network::network-request-modification
  - id: chrome-extension-basic-metadata
    desc: Chrome extension has basic metadata
    crit: baseline
    conf: 0.95
    all:
      - id: extension-name-field
      - id: extension-description-field
      - id: extension-conventional-version
  - id: chrome-extension-localized-metadata
    desc: Chrome extension has localized metadata
    crit: baseline
    conf: 0.95
    all:
      - id: extension-default-locale
      - id: extension-localized-name-placeholder
      - id: extension-localized-description-placeholder
  - id: chrome-extension-store-quality-metadata
    desc: Chrome extension store metadata quality
    crit: baseline
    conf: 0.95
    needs: 4
    any:
      - id: chrome-extension-basic-metadata
      - id: chrome-extension-localized-metadata
      - id: extension-action-icon
      - id: extension-icon-128
      - id: extension-google-update-url
      - id: metadata/permission/manifest::chrome-webstore-verified-contents
