defaults:
  platforms: [linux, macos, windows]
  for: [chrome-manifest]
traits:
  - id: host-all-urls
    desc: Extension has access to ALL websites
    crit: notable
    conf: 0.95
    if:
      type: value
      path: permissions
      substr: "<all_urls>"
  - id: locale-extension-name-message
    desc: Extension locale name message
    crit: baseline
    conf: 0.95
    for: [json]
    if:
      type: value
      path: extName.message
  - id: locale-extension-description-message
    desc: Extension locale description message
    crit: baseline
    conf: 0.95
    for: [json]
    if:
      type: value
      path: extDesc.message
  - id: locale-name-description-help
    desc: Extension locale name help text
    crit: baseline
    conf: 0.95
    for: [json]
    if:
      type: value
      path: extName.description
      exact: Extension name
  - id: locale-description-help
    desc: Extension locale description help text
    crit: baseline
    conf: 0.95
    for: [json]
    if:
      type: value
      path: extDesc.description
      exact: Extension description

composite_rules:
  - id: chrome-extension-localized-copy
    desc: Chrome extension localized display copy
    crit: baseline
    conf: 0.95
    for: [json]
    all:
      - id: locale-extension-name-message
      - id: locale-extension-description-message
    any:
      - id: locale-name-description-help
      - id: locale-description-help
