---
defaults:
  platforms:
  - unix
  - windows
  for:
  - manifest.json
  crit: baseline
  conf: 0.5
traits:
- id: host-permission-discord
  desc: Extension host permission covers Discord
  crit: notable
  conf: 0.96
  if:
    type: value
    path: host_permissions
    regex: '(^|[^A-Za-z0-9-])discord\.com([^A-Za-z0-9-]|$)'

- id: host-permission-naver-sites
  desc: Extension host permission includes Naver sites
  crit: notable
  conf: 0.94
  for: [chrome-manifest]
  if:
    type: value
    path: host_permissions
    regex: 'naver\.com'
- id: host-permission-kakao-sites
  desc: Extension host permission includes Kakao sites
  crit: notable
  conf: 0.94
  for: [chrome-manifest]
  if:
    type: value
    path: host_permissions
    regex: 'kakao\.com'
- id: host-permission-acmicpc
  desc: Extension host permission includes acmicpc.net
  crit: notable
  conf: 0.94
  for: [chrome-manifest]
  if:
    type: value
    path: host_permissions
    regex: 'acmicpc\.net'
- id: target-user-pages
  desc: Content script targets /user/ pages
  if:
    type: value
    path: content_scripts[*].matches
    substr: "/user/"
- id: target-account-pages
  desc: Content script targets /account/ pages
  if:
    type: value
    path: content_scripts[*].matches
    substr: "/account/"
- id: target-settings-pages
  desc: Content script targets /settings/ pages
  if:
    type: value
    path: content_scripts[*].matches
    substr: "/settings/"
- id: target-profile-pages
  desc: Content script targets /profile/ pages
  if:
    type: value
    path: content_scripts[*].matches
    substr: "/profile/"
- id: target-my-pages
  desc: Content script targets /my/ pages
  unless:
  - id: metadata/permission/manifest::host-steamcommunity
  if:
    type: value
    path: content_scripts[*].matches
    substr: "/my/"
- id: target-crypto-exchange-a1
  desc: Content script targets crypto exchanges
  if:
    type: value
    path: content_scripts[*].matches
    regex: binance\.com|coinbase\.com|kraken\.com
- id: target-crypto-exchange-a2
  desc: Content script targets crypto exchanges
  if:
    type: value
    path: content_scripts[*].matches
    regex: bybit\.com|okx\.com
- id: target-crypto-exchange-b1
  desc: Content script targets crypto exchanges
  if:
    type: value
    path: content_scripts[*].matches
    regex: kucoin\.com|mexc\.com|gate\.io
- id: target-crypto-exchange-b2
  desc: Content script targets crypto exchanges
  if:
    type: value
    path: content_scripts[*].matches
    regex: crypto\.com|bitfinex\.com
- id: target-online-course-pages
  desc: Content script targets online course pages
  crit: notable
  conf: 0.92
  ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
  if:
    type: value
    path: content_scripts[*].matches
    substr: udemy.com
- id: host-permission-online-course
  desc: Extension can access online course host
  crit: notable
  conf: 0.94
  ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
  if:
    type: value
    path: host_permissions
    substr: udemy.com
- id: host-permission-openai-api
  desc: Extension can access OpenAI API
  crit: notable
  conf: 0.96
  ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
  if:
    type: value
    path: host_permissions
    substr: api.openai.com
- id: host-permission-anthropic-api
  desc: Extension can access Anthropic API
  crit: notable
  conf: 0.96
  if:
    type: value
    path: host_permissions
    substr: api.anthropic.com
- id: host-permission-google-generative-language
  desc: Extension can access Google Generative AI API
  crit: notable
  conf: 0.96
  if:
    type: value
    path: host_permissions
    substr: generativelanguage.googleapis.com
- id: host-permission-cloudflare-workers
  desc: Extension can access Cloudflare Workers hosts
  crit: notable
  conf: 0.92
  if:
    type: value
    path: host_permissions
    substr: workers.dev
- id: content-script-twitter
  desc: Content script targets Twitter/X
  crit: notable
  conf: 0.94
  if:
    type: value
    path: content_scripts[*].matches
    regex: 'https://(www\.)?(twitter\.com|x\.com)/\*'
- id: content-script-social-twitter
  desc: Content script targets Twitter or X
  crit: notable
  conf: 0.9
  if:
    type: value
    path: content_scripts[*].matches
    regex: '(^|[/:*.])(twitter|x)\.com'
- id: content-script-social-meta
  desc: Content script targets Meta social sites
  crit: notable
  conf: 0.9
  if:
    type: value
    path: content_scripts[*].matches
    regex: '(^|[/:*.])(facebook|instagram)\.com'
- id: content-script-social-linkedin-reddit
  desc: Content script targets LinkedIn or Reddit
  crit: notable
  conf: 0.9
  if:
    type: value
    path: content_scripts[*].matches
    regex: '(^|[/:*.])(linkedin|reddit)\.com'
- id: content-script-social-tiktok
  desc: Content script targets TikTok
  crit: notable
  conf: 0.9
  if:
    type: value
    path: content_scripts[*].matches
    regex: '(^|[/:*.])tiktok\.com'
- id: content-script-youtube
  desc: Content script targets YouTube
  crit: notable
  conf: 0.94
  if:
    type: value
    path: content_scripts[*].matches
    substr: youtube.com
- id: extension-exam-copilot-identity
  desc: Extension claims exam copilot purpose
  crit: notable
  conf: 0.94
  ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
  if:
    type: value
    path: name
    substr: Exam Copilot
- id: extension-study-ai-description
  desc: Extension describes AI exam assistance
  crit: notable
  conf: 0.9
  ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
  if:
    type: value
    path: description
    substr: AI copilot
- id: content-script-http-all-sites
  desc: Content script matches all HTTP origins
  crit: notable
  conf: 0.92
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [chrome-manifest]
  if:
    type: value
    path: content_scripts[0].matches[0]
    exact: 'http://*/*'
- id: content-script-https-all-sites
  desc: Content script matches all HTTPS origins
  crit: notable
  conf: 0.92
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [chrome-manifest]
  if:
    type: value
    path: content_scripts[0].matches[1]
    exact: 'https://*/*'
- id: content-script-all-urls
  desc: Content script matches all URLs
  crit: notable
  conf: 0.95
  size_min: 320
  for: [chrome-manifest]
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: content_scripts[*].matches
    exact: '<all_urls>'
- id: content-script-all-http
  desc: Content script targets all web origins
  crit: notable
  conf: 0.92
  size_min: 320
  for: [chrome-manifest]
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: content_scripts[*].matches
    regex: '^\*://\*/\*$|^https?://\*/\*$'
- id: host-permission-all-http
  desc: Extension has all-HTTP host permission
  crit: notable
  conf: 0.95
  for: [chrome-manifest]
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: host_permissions
    regex: '^\*://\*/\*$|^https?://\*/\*$'
- id: optional-host-permission-all-http
  desc: Extension optional all HTTP host access
  crit: notable
  conf: 0.9
  for: [chrome-manifest]
  if:
    type: value
    path: optional_host_permissions
    regex: '^\*://\*/\*$|^https?://\*/\*$'

composite_rules:
- id: content-script-social-media
  desc: Content script targets social media sites
  crit: notable
  conf: 0.9
  any:
  - id: content-script-social-twitter
  - id: content-script-social-meta
  - id: content-script-social-linkedin-reddit
  - id: content-script-social-tiktok
- id: content-script-all-sites
  desc: Content script targets all web sites
  crit: notable
  conf: 0.95
  any:
  - id: content-script-all-urls
  - id: content-script-all-http
  - id: content-script-all-http-sites
- id: content-script-all-http-sites
  desc: Content script matches all HTTP/HTTPS origins
  crit: notable
  conf: 0.94
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [chrome-manifest]
  all:
  - id: content-script-http-all-sites
  - id: content-script-https-all-sites
- id: api-key-pages
  desc: Content script targets API/Key management pages
  crit: suspicious
  conf: 0.9
  any:
  - id: target-user-pages
  - id: target-account-pages
  - id: target-settings-pages
  - id: target-profile-pages
  - id: target-my-pages
- id: crypto-exchange-sites-a
  desc: Content script targets crypto exchanges (set A)
  crit: notable
  conf: 0.9
  any:
  - id: target-crypto-exchange-a1
  - id: target-crypto-exchange-a2
- id: crypto-exchange-sites-b
  desc: Content script targets crypto exchanges (set B)
  crit: notable
  conf: 0.9
  any:
  - id: target-crypto-exchange-b1
  - id: target-crypto-exchange-b2
- id: crypto-exchange-sites
  desc: Content script targets crypto exchange sites
  crit: notable
  conf: 0.9
  any:
  - id: crypto-exchange-sites-a
  - id: crypto-exchange-sites-b
- id: online-course-ai-quiz-extension
  desc: Extension combines course quiz access with AI API
  crit: suspicious
  conf: 0.95
  ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
  all:
  - id: target-online-course-pages
  - id: host-permission-online-course
  - id: host-permission-openai-api
  any:
  - id: extension-exam-copilot-identity
  - id: extension-study-ai-description

- id: broad-host-access
  desc: Extension grants broad web host access
  crit: notable
  conf: 0.95
  any:
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/host::host-permission-all-http
