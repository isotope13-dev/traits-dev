defaults:
  platforms: [windows, unix]
  for: [chrome-manifest]

traits:
  - id: host-shopping-sites
    desc: Extension has e-commerce host access
    crit: notable
    conf: 0.9
    if:
      type: value
      path: host_permissions
      regex: 'amazon\.|ebay\.|walmart\.|aliexpress\.'

  - id: content-script-shopping
    desc: Content script targets shopping sites
    crit: notable
    conf: 0.85
    if:
      type: value
      path: 'content_scripts[*].matches'
      regex: 'amazon\.|ebay\.|walmart\.|aliexpress\.'

  - id: host-amazon-global
    desc: Targets many Amazon regional domains
    crit: notable
    conf: 0.9
    count_min: 15
    if:
      type: text
      substr: amazon.

composite_rules:
  - id: ecommerce-targeting
    desc: Extension targets shopping sites
    crit: notable
    conf: 0.85
    any:
      - id: host-shopping-sites
      - id: content-script-shopping
      - id: host-amazon-global
