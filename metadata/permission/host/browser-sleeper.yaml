defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  attack: T1195.002
traits:
  - id: ai-authenticator-name
    desc: Authenticator extension name
    crit: component
    conf: 0.8
    if:
      type: value
      path: name
      regex: (?i)(2fa|two.?factor|authenticator|totp)
  - id: ai-chat-pdf-name-a
    desc: AI PDF extension name
    crit: component
    conf: 0.8
    if:
      type: value
      path: name
      regex: (?i)(ai|chat).{0,40}pdf
  - id: ai-chat-pdf-name-b
    desc: Gemini PDF extension name
    crit: component
    conf: 0.8
    if:
      type: value
      path: name
      regex: (?i)(gemini|deepseek).{0,40}pdf
  - id: file-converter-name-a
    desc: HEIC/JPG converter name
    crit: component
    conf: 0.8
    if:
      type: value
      path: name
      regex: (?i)(heic|jpg).{0,30}(convert|converter)
  - id: file-converter-name-b
    desc: Media converter name
    crit: component
    conf: 0.8
    if:
      type: value
      path: name
      regex: (?i)(mp4|mp3).{0,30}(convert|converter)
composite_rules:
  - id: ai-chat-pdf-name
    desc: AI chat PDF extension name
    crit: component
    conf: 0.8
    any:
      - id: ai-chat-pdf-name-a
      - id: ai-chat-pdf-name-b
  - id: file-converter-name
    desc: File converter extension name
    crit: component
    conf: 0.8
    any:
      - id: file-converter-name-a
      - id: file-converter-name-b
  - id: authenticator-broad-web-access
    desc: Authenticator extension with broad web access
    crit: suspicious
    conf: 0.95
    all:
      - id: ai-authenticator-name
      - id: metadata/permission/manifest::host-all-urls
      - id: metadata/permission/manifest::background-service-worker
  - id: utility-extension-broad-permissions
    desc: Broad browser-control permission cluster
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: metadata/permission/manifest::host-all-urls
      - id: objectives/supply-chain/hidden-payload/extensions/permission::content-script-all-urls
      - id: metadata/permission/manifest::externally-connectable-all-sites
      - id: objectives/supply-chain/hidden-payload/extensions/permission::permission-debugger
      - id: metadata/permission/manifest::permission-scripting
  - id: utility-extension-broad-control
    desc: Utility extension with broad browser control
    crit: suspicious
    conf: 0.94
    all:
      - id: utility-extension-broad-permissions
    any:
      - id: ai-chat-pdf-name
      - id: file-converter-name
