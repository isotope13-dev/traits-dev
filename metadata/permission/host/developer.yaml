defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable

traits:
  - id: host-developer-code-sites
    desc: Host permission covers code hosts
    conf: 0.88
    if:
      type: value
      path: host_permissions
      regex: 'github\.com|gitlab\.com|bitbucket\.org'

  - id: host-developer-package-sites
    desc: Host permission covers package registries
    conf: 0.86
    if:
      type: value
      path: host_permissions
      regex: 'npmjs\.com|pypi\.org'

  - id: content-script-developer-code
    desc: Content script matches code hosts
    conf: 0.88
    if:
      type: value
      path: 'content_scripts[*].matches'
      regex: 'github\.com|gitlab\.com|bitbucket\.org'

  - id: content-script-developer-packages
    desc: Content script matches package registries
    conf: 0.86
    if:
      type: value
      path: 'content_scripts[*].matches'
      regex: 'npmjs\.com|pypi\.org'

composite_rules:
  - id: host-developer-sites
    desc: Host permissions cover developer platforms
    conf: 0.88
    any:
      - id: host-developer-code-sites
      - id: host-developer-package-sites

  - id: content-script-developer-sites
    desc: Content scripts match developer platforms
    conf: 0.88
    any:
      - id: content-script-developer-code
      - id: content-script-developer-packages

  - id: developer-platform-targeting
    desc: Extension authority covers developer platforms
    conf: 0.88
    any:
      - id: host-developer-sites
      - id: content-script-developer-sites
