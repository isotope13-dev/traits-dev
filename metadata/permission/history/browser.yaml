---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: history-search
  desc: Searches browser history
  crit: notable
  conf: 0.95
  if:
    type: symbol
    kind: call
    regex: "(chrome|browser)\\.history\\.search"
- id: bulk-history-search
  desc: Bulk browser history search
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: history\.search\([^)]{0,120}maxResults:\s*([5-9]\d{4,}|[1-9]\d*e[4-9])
- id: history-get-visits
  desc: Gets visit history for URL
  crit: notable
  conf: 0.95
  if:
    type: symbol
    kind: call
    regex: "(chrome|browser)\\.history\\.getVisits"
- id: top-sites-get
  desc: Reads browser top sites
  crit: notable
  conf: 0.9
  if:
    type: symbol
    kind: call
    regex: "(^|\\\\.)((chrome|browser)\\.topSites\\.get|topSites\\.get)$"
- id: browsing-heatmap-ui-marker
  desc: Browsing heatmap dashboard UI marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Browse Heatmap
composite_rules:
- id: data-collection
  desc: Extension can collect sensitive browsing data
  crit: notable
  conf: 0.9
  needs: 2
  any:
  - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all
  - id: history-search
  - id: history-get-visits
  - id: top-sites-get
  - id: metadata/permission/bookmark::bookmarks-get-tree
- id: browsing-history-heatmap-dashboard
  desc: Builds browsing history heatmap dashboard
  crit: notable
  conf: 0.94
  all:
  - id: bulk-history-search
  - id: browsing-heatmap-ui-marker
