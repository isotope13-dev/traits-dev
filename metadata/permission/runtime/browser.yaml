---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: runtime-set-uninstall-url
  desc: Sets uninstall tracking URL
  crit: notable
  conf: 0.9
  if:
    type: symbol
    kind: call
    regex: "(^|\\\\.)(chrome\\.runtime\\.setUninstallURL|setUninstallURL)$"
- id: external-url-io-domain
  desc: URL to .io domain
  crit: component
  conf: 0.8
  if:
    type: string_literal
    regex: https?://[a-zA-Z0-9][-a-zA-Z0-9]*\.io/
- id: chrome-namespace-extra
  desc: Uses extended chrome.* namespace APIs
  crit: notable
  conf: 0.95
  if:
    type: string_literal
    regex: chrome\.(alarms|notifications)
composite_rules:
- id: chrome-namespace-core
  desc: Uses core chrome.* namespace APIs
  crit: notable
  conf: 0.95
  any:
  - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-api
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-api
  - id: micro-behaviors/data/db/web-storage::chrome-storage-api
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-send-message
  - id: objectives/supply-chain/hidden-payload/extensions/permission::permission-cookies
- id: chrome-namespace
  desc: Uses chrome.* namespace
  crit: notable
  conf: 0.95
  any:
  - id: chrome-namespace-core
  - id: chrome-namespace-extra
- id: is-extension
  desc: File is part of a browser extension
  crit: notable
  conf: 0.9
  any:
  - id: chrome-namespace
  - id: micro-behaviors/browser-extension/lifecycle::browser-namespace
  - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
  - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-get-url
  - id: metadata/permission/identity::identity-get-auth-token
- id: uninstall-tracking
  desc: Sets external .io uninstall URL
  crit: notable
  conf: 0.9
  all:
  - id: runtime-set-uninstall-url
  - id: external-url-io-domain
