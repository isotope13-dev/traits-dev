defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.92

composite_rules:
  - id: broad-extension-injection-surface
    desc: Extension exposes broad injection surface
    crit: component
    conf: 0.94
    any:
      - id: objectives/supply-chain/hidden-payload/extensions/permission::host-all-urls
      - id: metadata/permission/host::host-permission-all-http
      - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
  - id: browser-media-capture-permission
    desc: Extension requests browser capture permission
    crit: component
    conf: 0.94
    any:
      - id: metadata/permission/capture::permission-tab-capture
      - id: metadata/permission/capture::permission-desktop-capture
  - id: broad-capture-extension
    desc: Extension combines broad injection and capture
    crit: notable
    conf: 0.94
    all:
      - id: metadata/permission/manifest::is-chrome-manifest
      - id: broad-extension-injection-surface
      - id: browser-media-capture-permission
  - id: broad-capture-cloud-extension
    desc: Extension combines broad capture and cloud identity
    crit: notable
    conf: 0.95
    all:
      - id: broad-capture-extension
      - id: metadata/permission/identity::identity-get-auth-token
    any:
      - id: metadata/permission/manifest::externally-connectable
      - id: metadata/permission/network::permission-declarative-net-request
