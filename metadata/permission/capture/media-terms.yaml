# Neutral UI / web-media vocabulary. A permission-grant verb or a capture-device
# word in text is value-neutral (clinify docs say "allow"); the social-engineering
# intent (a lure asking to grant camera/mic access) is inferred by composites in
# objectives/execution/lure/ that require these terms in proximity + meeting context.
defaults:
  platforms: [unix, windows]
  for: [html, javascript, source]
  crit: component
  conf: 0.86
traits:
  - id: permission-grant-verb
    desc: Permission-grant action verb keyword
    if:
      type: text
      regex: '(?i)\b(allow|enable|grant)\b'
  - id: capture-device-term
    desc: Media capture device term keyword
    if:
      type: text
      regex: '(?i)\b(camera|microphone|webcam|audio)\b'
