# Permission-language fragments used by the video-meeting lure composite. These
# require permission context so generic UI attributes such as SVG "enable" and
# media element names such as "audio" do not masquerade as a capture prompt.
defaults:
  platforms: [unix, windows]
  for: [html, javascript, source]
  crit: component
  conf: 0.86
traits:
  - id: permission-grant-access-verb
    desc: Permission grant followed by access
    if:
      type: text
      regex: '(?i)\b(allow|enable|grant)\b.{0,30}\b(access|permission)\b'
  - id: permission-grant-device-verb
    desc: Permission grant followed by capture device
    if:
      type: text
      regex: '(?i)\b(allow|enable|grant)\b.{0,30}\b(camera|microphone)\b'
  - id: capture-device-term
    desc: Camera or microphone term
    if:
      type: text
      regex: '(?i)\b(camera|microphone|webcam|mic)\b'
