defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.95

traits:
  - id: permission-clipboard-read
    desc: Extension requests clipboard read permission
    if:
      type: value
      path: permissions
      exact: clipboardRead
  - id: permission-clipboard-write
    desc: Extension requests clipboard write permission
    if:
      type: value
      path: permissions
      exact: clipboardWrite

composite_rules:
  - id: all-url-clipboard-early-content-script
    desc: All-URL content script with clipboard read access
    crit: notable
    conf: 0.95
    all:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: permission-clipboard-read
      - id: metadata/permission/activation::content-script-run-at-start
    any:
      - id: metadata/permission/host::content-script-all-urls
      - id: metadata/permission/host::content-script-all-http
