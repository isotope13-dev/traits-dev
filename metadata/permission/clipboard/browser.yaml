defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.95

traits:
  - id: permission-clipboard-read
    desc: Extension requests clipboard read permission
    if:
      type: value
      path: permissions
      exact: clipboardRead
  - id: permission-clipboard-write
    desc: Extension requests clipboard write permission
    if:
      type: value
      path: permissions
      exact: clipboardWrite
