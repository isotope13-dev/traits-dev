---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: cookies-get
  desc: Reads browser cookies
  crit: notable
  conf: 0.9
  if:
    type: symbol
    kind: call
    regex: "(^|\\.)((chrome|browser)\\.cookies\\.get)$"
- id: cookies-set
  desc: Sets browser cookies
  crit: notable
  conf: 0.9
  if:
    type: symbol
    kind: call
    regex: "(^|\\.)((chrome|browser)\\.cookies\\.set)$"
- id: cookies-on-changed-listener
  desc: Watches browser cookie changes
  crit: notable
  conf: 0.92
  if:
    type: symbol
    kind: call
    exact: cookies.onChanged.addListener
