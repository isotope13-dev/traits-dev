---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: permission-cookies
  desc: Extension requests cookies permission
  crit: notable
  conf: 0.9
  for: [chrome-manifest]
  if:
    type: value
    path: permissions
    exact: cookies
- id: permission-cookies-text
  desc: Chrome manifest contains cookies permission
  crit: notable
  conf: 0.9
  for: [chrome-manifest]
  if:
    type: text
    regex: '["'']cookies["'']'
