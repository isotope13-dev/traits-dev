# Firefox extension data-collection declarations.
defaults:
  platforms: [windows, unix]
  for: [chrome-manifest]
  crit: baseline
  conf: 0.95

traits:
  - id: gecko-data-collection-permissions
    desc: Firefox declares data collection permissions
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions
  - id: gecko-collects-pii
    desc: Firefox declares PII collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: personallyIdentifyingInfo
  - id: gecko-collects-auth-info
    desc: Firefox declares authentication data collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: authenticationInfo
  - id: gecko-collects-browsing-activity
    desc: Firefox declares browsing activity collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: browsingActivity
  - id: gecko-collects-website-content
    desc: Firefox declares website content collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: websiteContent
  - id: gecko-collects-financial-info
    desc: Firefox declares financial data collection
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      exact: financialAndPaymentInfo
  - id: gecko-claims-no-user-data-collection
    desc: Claims no user data collection
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.description
      regex: '(?i)(does not|doesn''t|do not) collect.{0,40}(user )?data'
  - id: gecko-required-none-data-collection
    desc: Declares no required data collection
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: browser_specific_settings.gecko.data_collection_permissions.required
      size_max: 0
