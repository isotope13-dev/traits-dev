defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.92

traits:
  - id: permission-declarative-net-request
    desc: Declares declarativeNetRequest permission
    if:
      type: value
      path: permissions
      exact: declarativeNetRequest
  - id: dnr-enabled-ruleset
    desc: Extension enables DNR ruleset
    conf: 0.88
    if:
      type: value
      path: declarative_net_request.rule_resources[*].enabled
      exact: 'true'
