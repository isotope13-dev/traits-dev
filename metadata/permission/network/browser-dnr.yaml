defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.92

traits:
  - id: permission-declarative-net-request
    desc: Declares declarativeNetRequest permission
    if:
      type: value
      path: permissions
      exact: declarativeNetRequest
  - id: dnr-enabled-ruleset
    desc: Extension enables DNR ruleset
    conf: 0.88
    if:
      type: value
      path: declarative_net_request.rule_resources[*].enabled
      exact: 'true'

  - id: dnr-commercial-domain-target
    desc: DNR rule targets a commercial domain
    for: [json]
    if:
      type: value
      path: root[*].domains
      regex: '(amazon|ebay|walmart)\.'
      case_insensitive: true

  - id: dnr-affiliate-param-tag
    desc: DNR redirect adds a tag query parameter
    crit: component
    for: [json]
    if:
      type: value
      path: root[*].action.redirect.transform.queryTransform.addOrReplaceParams[*].key
      exact: tag
  - id: dnr-affiliate-param-affiliate
    desc: DNR redirect adds an affiliate query parameter
    crit: component
    for: [json]
    if:
      type: value
      path: root[*].action.redirect.transform.queryTransform.addOrReplaceParams[*].key
      exact: affiliate
  - id: dnr-affiliate-param-affid
    desc: DNR adds an affiliate ID parameter
    crit: component
    for: [json]
    if:
      type: value
      path: root[*].action.redirect.transform.queryTransform.addOrReplaceParams[*].key
      exact: affid
  - id: dnr-affiliate-param-pubid
    desc: DNR adds a publisher ID parameter
    crit: component
    for: [json]
    if:
      type: value
      path: root[*].action.redirect.transform.queryTransform.addOrReplaceParams[*].key
      exact: pubid
  - id: dnr-affiliate-param-partner
    desc: DNR redirect adds a partner query parameter
    crit: component
    for: [json]
    if:
      type: value
      path: root[*].action.redirect.transform.queryTransform.addOrReplaceParams[*].key
      exact: partner
  - id: dnr-affiliate-param-subid
    desc: DNR redirect adds a sub-ID query parameter
    crit: component
    for: [json]
    if:
      type: value
      path: root[*].action.redirect.transform.queryTransform.addOrReplaceParams[*].key
      exact: subid
  - id: dnr-affiliate-param-ref
    desc: DNR redirect adds a referral query parameter
    crit: component
    for: [json]
    if:
      type: value
      path: root[*].action.redirect.transform.queryTransform.addOrReplaceParams[*].key
      exact: ref

composite_rules:
  - id: dnr-commercial-affiliate-redirect
    desc: DNR adds an affiliate parameter to commercial redirects
    crit: notable
    conf: 0.94
    for: [json]
    all:
      - id: dnr-commercial-domain-target
    any:
      - id: dnr-affiliate-param-tag
      - id: dnr-affiliate-param-affiliate
      - id: dnr-affiliate-param-affid
      - id: dnr-affiliate-param-pubid
      - id: dnr-affiliate-param-partner
      - id: dnr-affiliate-param-subid
      - id: dnr-affiliate-param-ref
