---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: google-calendar-oauth-scope
  desc: References Google Calendar OAuth scope
  crit: notable
  conf: 0.94
  ref: sha256:b1b67c99d61609933fd4b7cc7a7a9fa1cdd193cc290590b3d377ab282aae4488
  for: [chrome-manifest, javascript, typescript]
  if:
    type: text
    substr: https://www.googleapis.com/auth/calendar.events
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: identity-get-auth-token
  desc: Requests browser identity auth token
  crit: notable
  conf: 0.92
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/lang/scripted::dts-declaration-file
  if:
    type: symbol
    kind: call
    regex: "(^|\\\\.)((chrome|browser)\\.identity\\.getAuthToken|identity\\.getAuthToken)$"
