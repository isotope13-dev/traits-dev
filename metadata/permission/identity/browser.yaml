---
defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: identity-get-auth-token
  desc: Requests browser identity auth token
  crit: notable
  conf: 0.92
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/lang/scripted::dts-declaration-file
  if:
    type: symbol
    kind: call
    regex: "(^|\\\\.)((chrome|browser)\\.identity\\.getAuthToken|identity\\.getAuthToken)$"
