defaults:
  platforms: [windows, unix]
  for: [chrome-manifest]
  crit: baseline
  conf: 0.95

traits:
  - id: extension-sandbox-page
    desc: Extension declares sandbox page
    ref: sha256:ae2655e0b8fe54fe47cad7acf24bb405c441e8d0527575c4a3c36bf72cfc1f93
    if:
      type: value
      path: sandbox.pages
      exists: true
  - id: wildcard-resources
    desc: Extension exposes all packaged resources
    crit: notable
    conf: 0.94
    if:
      type: value
      path: 'web_accessible_resources[*].resources'
      exact: '*'
  - id: all-site-resources
    desc: Extension exposes resources to all sites
    crit: notable
    conf: 0.9
    if:
      type: value
      path: 'web_accessible_resources[*].matches'
      regex: '^<all_urls>$|^\*://\*/\*$|^https?://\*/\*$'
