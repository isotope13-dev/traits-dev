defaults:
  platforms:
    - windows
    - unix
  for:
    - documents
traits:
  - id: office-word-template
    desc: Office Word template marker
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: Normal.dotm
  - id: vba-runtime-reference
    desc: VBA runtime library reference
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: VBA7.1\VBE7.DLL
  - id: vba-project-metadata
    desc: VBA project metadata block
    for: [oledoc, ooxml, rtf]
    crit: notable
    conf: 0.94
    if:
      type: raw
      regex: CMG="[^"\r\n]{8,}"[\r\n]+DPB="[^"\r\n]{8,}"[\r\n]+GC="[^"\r\n]{8,}"
  - id: vba-module-descriptors
    desc: Multiple VBA module markers
    for: [oledoc, ooxml, rtf]
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: Module=[A-Za-z0-9]+[\r\n]+Module=
  - id: objectpool-storage
    desc: Embedded OLE object pool
    for: [oledoc, ooxml, rtf]
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ObjectPool
  - id: ole-many-streams
    desc: OLE document has many streams
    for: [msg, oledoc, rtf]
    crit: notable
    conf: 0.9
    if:
      type: value
      path: office.streams
      size_min: 64
  - id: ole-high-entropy
    desc: OLE document has high entropy
    for: [msg, oledoc, rtf]
    crit: notable
    conf: 0.88
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.8
  - id: ole-vba-macro-count
    desc: OLE document contains a VBA macro project
    for: [oledoc]
    crit: notable
    conf: 0.98
    if:
      type: metrics
      field: office.macro_count
      min: 1
  - id: ole-vba-project-stream
    desc: OLE document contains the VBA project stream
    for: [oledoc]
    crit: notable
    conf: 0.98
    if:
      type: value
      path: office.streams[*]
      exact: /_VBA_PROJECT_CUR
  - id: ole-encryption-feature
    desc: OLE document reports encrypted content
    for: [oledoc]
    crit: notable
    conf: 0.9
    if:
      type: value
      path: office.features[*]
      exact: encryption
  - id: ole-html-body
    desc: OLE embeds HTML document body
    for: [msg, oledoc, rtf]
    crit: notable
    conf: 0.86
    if:
      type: raw
      regex: '(?i)<!DOCTYPE HTML><html>|<meta http-equiv="Content-Type" content="text/html'
  - id: large-ole-document-body
    desc: Large OLE compound document body
    for: [oledoc]
    crit: notable
    conf: 0.9
    size_min: 100000
    if:
      id: metadata/document/office/macro::ole-compound-file
composite_rules:
  - id: high-entropy-ole-html-container
    desc: High-entropy OLE HTML container
    crit: suspicious
    conf: 0.92
    all:
      - id: ole-many-streams
      - id: ole-high-entropy
      - id: ole-html-body
  - id: word-vba-macro-document
    desc: OLE Word document with VBA
    crit: notable
    conf: 0.99
    all:
      - id: metadata/document/office/macro::ole-compound-file
      - id: metadata/document/office/macro::word-document-class
      - id: metadata/document/ole::vba-project-metadata
    any:
      - id: metadata/document/ole::office-word-template
      - id: metadata/document/ole::vba-runtime-reference
      - id: metadata/document/ole::vba-module-descriptors
  - id: word-vba-embedded-control
    desc: Word VBA embedded control object
    crit: suspicious
    conf: 0.96
    all:
      - id: word-vba-macro-document
      - id: metadata/document/office/macro::forms-textbox-payload-surface
      - id: metadata/document/ole::objectpool-storage
