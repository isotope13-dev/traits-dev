defaults:
  platforms: [windows, unix]
  for: [html]
  crit: baseline
  conf: 0.9
traits:
  - id: canonical-link
    desc: Canonical link to external site
    if:
      type: text
      regex: (?i)<link\s+rel=["']canonical["']\s+href=["']https?://
  - id: docs-moved-title
    desc: Documentation moved page title
    if:
      type: text
      regex: (?i)<title>[^<]{0,120}\b(documentation|docs)\b[^<]{0,80}\bmoved\b[^<]{0,80}\bto\b
composite_rules:
  - id: docs-site-relocation
    desc: Documentation site relocation page
    conf: 0.94
    all:
      - id: canonical-link
      - id: docs-moved-title
