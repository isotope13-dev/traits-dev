defaults:
  platforms: [windows, unix]
  for: [html]
  crit: baseline
  conf: 0.9
traits:
  - id: doctype
    desc: Document declares the HTML5 doctype
    for: [html, javascript, php]
    if:
      type: text
      regex: '(?i)^\s*<!doctype\s+html\s*>'
  - id: theme-color-meta
    desc: Theme-color application metadata
    if:
      type: text
      substr: <meta name="theme-color"
  - id: icon-link
    desc: Document icon link reference
    if:
      type: text
      substr: <link rel="icon"
  - id: external-font-stylesheet
    desc: External font stylesheet import
    if:
      type: text
      substr: https://fonts.googleapis.com/
  - id: manifest-link
    desc: Web app manifest link
    if:
      type: text
      regex: <link\s+rel=["']manifest["']\s+href=
  - id: root-container
    desc: Single root mount container
    if:
      type: text
      substr: <div id="root"></div>
  - id: module-entrypoint
    desc: ES module entrypoint script
    if:
      type: text
      substr: <script type="module" src=
  - id: inline-service-worker-bootstrap
    desc: Inline Service Worker bootstrap
    if:
      type: text
      regex: <script>\s*navigator\.serviceWorker\.register\(
composite_rules:
  - id: spa-pwa-launcher
    desc: Single-page PWA launcher document
    conf: 0.92
    all:
      - id: doctype
      - id: root-container
      - id: module-entrypoint
  - id: manifest-backed-spa-launcher
    desc: SPA launcher with PWA manifest
    conf: 0.93
    all:
      - id: spa-pwa-launcher
      - id: manifest-link
