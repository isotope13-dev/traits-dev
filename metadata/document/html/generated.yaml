defaults:
  platforms: [windows, unix]
  for: [html]

traits:
  - id: ndoc-generator-meta
    desc: ndoc generator meta tag
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(?i)name=["'']generator["''][^>]{0,80}content=["'']ndoc["'']'
  - id: ndoc-footer-link
    desc: ndoc footer attribution link
    crit: component
    conf: 0.98
    if:
      type: text
      substr: 'Generated by <a href="http://github.com/nodeca/ndoc">ndoc</a>'

composite_rules:
  - id: ndoc-generated-page
    desc: ndoc generated API page
    crit: component
    conf: 0.99
    any:
      - id: ndoc-generator-meta
      - id: ndoc-footer-link
