defaults:
  platforms: [windows, unix]
  for: [html]

traits:
  - id: ndoc-generator-meta
    desc: ndoc generator meta tag
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(?i)name=["'']generator["''][^>]{0,80}content=["'']ndoc["'']'
  - id: ndoc-footer-link
    desc: ndoc footer attribution link
    crit: component
    conf: 0.98
    if:
      type: text
      substr: 'Generated by <a href="http://github.com/nodeca/ndoc">ndoc</a>'
  - id: api-reference-title
    desc: HTML API reference page title
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)<title>[^<]{0,80}reference[^<]{0,80}</title>'
  - id: api-title
    desc: HTML API page title
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)<title>[^<]{0,80}api[^<]{0,80}</title>'
  - id: generated-doc-doxygen
    desc: Doxygen generated documentation marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Doxygen
  - id: generated-doc-help
    desc: Microsoft HTML Help marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Microsoft Help
  - id: generated-doc-footer
    desc: Generated documentation footer
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Generated by
  - id: generated-doc-code-navigation
    desc: Generated documentation code navigation
    crit: component
    conf: 0.9
    if:
      type: text
      substr: codeSnippetLink
  - id: generated-doc-htm-link
    desc: Generated documentation htm navigation link
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'href=".{0,120}\.htm"'
  - id: pywin32-method-title
    desc: PyWin32 method documentation title
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '<TITLE>win32file.'

composite_rules:
  - id: ndoc-generated-page
    desc: ndoc generated API page
    crit: component
    conf: 0.99
    any:
      - id: ndoc-generator-meta
      - id: ndoc-footer-link
  - id: api-reference-page
    desc: HTML API reference documentation page
    crit: component
    conf: 0.92
    any:
      - id: api-reference-title
      - id: api-title
      - id: generated-doc-doxygen
      - id: generated-doc-help
      - id: generated-doc-footer
      - id: generated-doc-code-navigation
      - id: generated-doc-htm-link
      - id: pywin32-method-title
