defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [rtf]
traits:
  - id: word-document-object
    desc: RTF document containing a Word.Document object class.
    crit: notable
    if:
      type: raw
      regex: 'objclass Word\.Document'
  - id: ole-link-class
    desc: RTF with OLE Link object class.
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'objclass oLe2LInk'
      case_insensitive: true
  - id: mathtype-object
    desc: RTF document containing a MathType OLE object
    crit: notable
    if:
      type: raw
      regex: "objclass MathType"
  - id: mathtype-section
    desc: MathType OLE object reported as section
    crit: notable
    if:
      type: section
      regex: "^OLE:MathType"
