defaults:
  platforms: [windows, unix]
  for: [rtf]
traits:
  - id: word-document-object
    desc: RTF document containing a Word.Document object class.
    crit: notable
    if:
      type: text
      regex: 'objclass Word\.Document'
  - id: ole-link-class
    desc: RTF with OLE Link object class.
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'objclass oLe2LInk'
      case_insensitive: true
  - id: mathtype-object
    desc: RTF document containing a MathType OLE object
    crit: notable
    if:
      type: text
      substr: "objclass MathType"
  - id: mathtype-section
    desc: MathType OLE object reported as section
    crit: notable
    if:
      type: section
      regex: "^OLE:MathType"
  - id: null-objclass-placeholder
    desc: RTF OLE class hidden with placeholder zeros
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: text
      regex: 'objclass 0{8,}\.\.'
  - id: multiple-activex-objects
    desc: RTF embeds multiple ActiveX objects
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: text
      substr: '\objocx'
