# PDF generator/producer detection
#
# Identifies the software used to create PDF documents. Useful for
# campaign tracking, clustering similar documents, and identifying
# document provenance. Generator metadata is a strong structural
# pivot for threat intelligence.
defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 0.9
  for: [pdf]
traits:
  # Generic producer tag detection
  - id: has-producer
    desc: PDF contains producer metadata tag
    if:
      type: raw
      regex: "<pdf:Producer>|/Producer \\("
  # mPDF - PHP-based PDF generator (commonly seen in web-generated invoices)
  - id: mpdf
    desc: PDF generated by mPDF library
    if:
      type: raw
      regex: "mPDF \\d+\\.\\d+"
  # wkhtmltopdf - HTML to PDF converter
  - id: wkhtmltopdf
    desc: PDF generated by wkhtmltopdf
    if:
      type: text
      substr: "wkhtmltopdf"
      case_insensitive: true
  # LibreOffice / OpenOffice
  - id: libreoffice
    desc: PDF generated by LibreOffice
    if:
      type: text
      substr: "LibreOffice"
  # Microsoft Office
  - id: microsoft-office
    desc: PDF generated by Microsoft Office
    if:
      type: raw
      regex: "Microsoft. (Word|Excel|PowerPoint)"
  # Adobe Acrobat
  - id: adobe-acrobat
    desc: PDF generated by Adobe Acrobat
    if:
      type: raw
      regex: "Adobe (Acrobat|PDF Library)"
  # FPDF / TCPDF (PHP PDF libraries)
  - id: fpdf
    desc: PDF generated by FPDF library
    if:
      type: text
      substr: "FPDF"
  - id: tcpdf
    desc: PDF generated by TCPDF library
    if:
      type: text
      substr: "TCPDF"
  # ReportLab (Python PDF library)
  - id: reportlab
    desc: PDF generated by ReportLab
    if:
      type: text
      substr: "ReportLab"
  # iText (Java PDF library)
  - id: itext
    desc: PDF generated by iText library
    if:
      type: raw
      regex: "iText.? \\d"
  # Cairo graphics library
  - id: cairo
    desc: PDF generated by Cairo graphics
    if:
      type: text
      substr: "cairo"
      case_insensitive: true
