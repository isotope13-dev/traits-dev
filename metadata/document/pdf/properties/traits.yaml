# PDF document property atomics, keyed on the expose kv tree.
#
# expose's PDF extractor (lenient byte-scan, see
# `expose::formats::pdf`) surfaces facts under `pdf.*`:
#
#   pdf.info.{author, title, creator, producer, subject, keywords,
#             creation_date, mod_date, trapped}
#   pdf.catalog.{has_openaction, has_additional_actions, has_acroform,
#                has_xfa, has_names_javascript, has_richmedia, has_3d}
#   pdf.actions[]: kind, source, snippet
#   pdf.embedded_files[]: filename, size
#   pdf.filter_chains[]: comma-joined filter names per stream
#   pdf.streams[]: object_id, filters, magic_hex, decoded_text
#   pdf.form_fields[]: object_id, name, field_type, rect, value
#   pdf.header.{version, header_count}
#   pdf.shape.{object_count, eof_count, page_count, annotation_count,
#              encrypted, linearized, jbig2_filter_count, three_d_object_count, …}
#
# Atomics here are detection building blocks; composites elsewhere
# combine them into attacker-intent rules.
defaults:
  for: [pdf]
  platforms: [windows, macos, linux]
  crit: notable
  conf: 0.9

traits:
  # --- Locale / script in author / creator ---
- id: pdf-info-author-cyrillic
  desc: PDF info.author contains Cyrillic
  if:
    type: value
    path: pdf.info.author
    regex: '[Ѐ-ӿ]'
- id: pdf-info-author-cjk
  desc: PDF info.author contains CJK
  if:
    type: value
    path: pdf.info.author
    regex: '[一-鿿぀-ゟ゠-ヿ]'
- id: pdf-info-creator-libreoffice
  desc: PDF info.producer claims LibreOffice
  if:
    type: value
    path: pdf.info.producer
    substr: LibreOffice
    case_insensitive: true

  # --- Date sentinels ---
- id: pdf-info-creation-future
  desc: PDF creation_date is in the future
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: pdf.info.creation_date
    regex: 'D:20[3-9][0-9]'

  # --- Catalog / structural flags ---
- id: pdf-has-openaction
  desc: PDF catalog has OpenAction
  if:
    type: value
    path: pdf.catalog.features
    exact: openaction
- id: pdf-has-additional-actions
  desc: PDF catalog has AA additional actions
  if:
    type: value
    path: pdf.catalog.features
    exact: additional_actions
- id: pdf-has-acroform
  desc: PDF has AcroForm
  crit: baseline
  if:
    type: value
    path: pdf.catalog.features
    exact: acroform
- id: pdf-has-xfa
  desc: PDF AcroForm contains XFA
  if:
    type: value
    path: pdf.catalog.features
    exact: xfa
  unless:
  - type: path
    regex: '(^|[\\/])(_{0,2}fixtures?_{0,2}|sample_files|testdata)([\\/]|$)'

  # --- Signature / shadow-attack structural atomics ---
- id: pdf-signature-object
  desc: PDF contains signature object
  crit: notable
  conf: 0.9
  if:
    type: metrics
    field: pdf.signature_object_count
    min: 1
- id: pdf-byte-range
  desc: PDF contains signature ByteRange
  crit: notable
  conf: 0.9
  if:
    type: metrics
    field: pdf.byte_range_count
    min: 1
- id: pdf-signed-post-signature-incremental-update
  desc: "Signed PDF has post-sig incremental update"
  crit: suspicious
  conf: 0.92
  if:
    type: metrics
    field: pdf.signed_incremental_update_count
    min: 2
  unless:
  - id: well-known/app/stirling-pdf::source-tree
  - id: well-known/lib/pdfium::source-tree
- id: pdf-overlapping-form-fields
  desc: PDF has overlapping form fields
  crit: notable
  conf: 0.9
  if:
    type: metrics
    field: pdf.overlapping_form_field_pair_count
    min: 1
- id: pdf-duplicate-form-field-names
  desc: PDF has duplicate form field names
  crit: notable
  conf: 0.86
  if:
    type: metrics
    field: pdf.duplicate_form_name_count
    min: 1
- id: pdf-duplicate-form-field-rects
  desc: PDF has duplicate form field rectangles
  crit: notable
  conf: 0.9
  if:
    type: metrics
    field: pdf.duplicate_form_rect_count
    min: 1
- id: pdf-duplicate-form-name-and-rect
  desc: PDF repeats form name and rectangle
  crit: baseline
  conf: 0.94
  if:
    type: metrics
    field: pdf.duplicate_form_name_rect_count
    min: 1

  # --- Action atomics ---
- id: pdf-action-javascript
  desc: PDF JavaScript action present
  attack: T1059.007
  if:
    type: value
    path: pdf.actions[*].kind
    exact: javascript
  unless:
  - type: path
    regex: '(^|[\\/])tests[\\/]Behat[\\/]fixtures[\\/]malicious-vba\.pdf$'
  - type: path
    regex: '(^|[\\/])(_{0,2}fixtures?_{0,2}|sample_files|testdata)([\\/]|$)'
- id: pdf-action-launch
  desc: PDF Launch action present
  crit: suspicious
  conf: 0.97
  attack: T1204.001
  if:
    type: value
    path: pdf.actions[*].kind
    exact: launch
- id: pdf-action-uri
  desc: PDF URI action present
  if:
    type: value
    path: pdf.actions[*].kind
    exact: uri
- id: pdf-action-submitform
  desc: PDF SubmitForm action present
  if:
    type: value
    path: pdf.actions[*].kind
    exact: submitform
- id: pdf-action-importdata
  desc: PDF ImportData action present
  if:
    type: value
    path: pdf.actions[*].kind
    exact: importdata
- id: pdf-weighted-risk-score-high
  desc: PDF weighted risk score high
  crit: suspicious
  conf: 0.88
  if:
    type: metrics
    field: pdf.risky_feature_score
    min: 70
  unless:
  - id: well-known/lib/pdfium::source-tree

  # --- JavaScript snippet patterns (high-precision payload tells) ---
- id: pdf-js-app-alert
  desc: PDF JS calls app.alert
  crit: notable
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: app.alert
- id: pdf-js-util-printd
  desc: PDF JS calls util.printd
  crit: notable
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: util.printd
- id: pdf-js-this-getfield
  desc: PDF JS calls this.getField
  crit: notable
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: this.getField
- id: pdf-js-fromcharcode
  desc: PDF JS uses String.fromCharCode
  crit: suspicious
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: fromCharCode
  unless:
  - id: well-known/lib/pdfium::source-tree
- id: pdf-js-unescape
  desc: PDF JS uses unescape (heap-spray hint)
  crit: suspicious
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: unescape
  unless:
  - id: well-known/lib/pdfium::source-tree
- id: pdf-js-eval-call
  desc: PDF JS uses eval
  crit: suspicious
  conf: 0.94
  attack: T1059.007
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: eval(
  unless:
  - id: well-known/lib/pdfium::source-tree
- id: pdf-js-atob-decode
  desc: PDF JS uses atob decoder
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: atob(
- id: pdf-js-base64-marker
  desc: PDF JS references base64
  crit: suspicious
  conf: 0.86
  if:
    type: value
    path: pdf.actions[*].snippet
    substr: base64
    case_insensitive: true
- id: pdf-jsfuck-getfield-loader
  desc: PDF JSFuck loader reads form field
  crit: suspicious
  conf: 0.96
  attack: T1059.007
  if:
    type: value
    path: pdf.actions[*].snippet
    regex: 'getField.{0,128}\{\}\+\[\]'

- id: pdf-stream-ole-magic
  desc: PDF stream begins with OLE
  crit: suspicious
  conf: 0.94
  attack: T1204.002
  if:
    type: value
    path: pdf.streams[*].magic_hex
    regex: '^d0cf11e0'

  # --- Decoded hidden-form payloads ---
- id: pdf-hidden-zero-rect-form-field
  desc: PDF has hidden zero-area form field
  crit: suspicious
  conf: 0.92
  attack: T1564
  if:
    type: metrics
    field: pdf.hidden_zero_rect_field_count
    min: 1
  unless:
  - id: well-known/lib/pdfium::source-tree
- id: pdf-large-decoded-form-value
  desc: PDF form field carries large decoded value
  crit: suspicious
  conf: 0.9
  if:
    type: metrics
    field: pdf.decoded_form_value_max_len
    min: 32768
- id: pdf-form-payload-readfileintostream
  desc: PDF form payload reads local file stream
  crit: suspicious
  conf: 0.97
  attack: T1203
  if:
    type: value
    path: pdf.form_fields[*].decoded_value
    substr: readFileIntoStream
- id: pdf-form-payload-trustedfunction
  desc: PDF form payload uses trustedFunction
  crit: suspicious
  conf: 0.97
  attack: T1203
  if:
    type: value
    path: pdf.form_fields[*].decoded_value
    substr: trustedFunction
- id: pdf-form-payload-rss-addfeed
  desc: PDF form payload uses RSS addFeed
  crit: suspicious
  conf: 0.96
  attack: T1203
  if:
    type: value
    path: pdf.form_fields[*].decoded_value
    substr: addFeed
- id: pdf-form-payload-eval-call
  desc: PDF form payload uses eval
  crit: suspicious
  conf: 0.95
  attack: T1059.007
  if:
    type: value
    path: pdf.form_fields[*].decoded_value
    substr: eval(
- id: pdf-form-payload-atob-decode
  desc: PDF form payload uses atob
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: pdf.form_fields[*].decoded_value
    substr: atob(
- id: pdf-form-payload-base64-marker
  desc: PDF form payload references base64
  crit: suspicious
  conf: 0.86
  if:
    type: value
    path: pdf.form_fields[*].decoded_value
    substr: base64
    case_insensitive: true
- id: pdf-form-payload-final-js-eval
  desc: PDF form payload evals final_js
  crit: suspicious
  conf: 0.98
  attack: T1059.007
  if:
    type: value
    path: pdf.form_fields[*].decoded_value
    substr: eval(global.final_js);

  # --- Launch action targets ---
- id: pdf-launch-target-cmd
  desc: PDF Launch target invokes cmd / script
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: pdf.actions[*].snippet
    regex: '(?i)(cmd\.exe|wscript|cscript)'
- id: pdf-launch-target-shell
  desc: PDF Launch target invokes shell / LOLBin
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: pdf.actions[*].snippet
    regex: '(?i)(powershell|mshta|bitsadmin)'

  # --- Embedded file shape (split into native/script/installer
  #     groups so each regex stays under the 3-pipe limit). ---
- id: pdf-embedded-native-executable
  desc: PDF embeds native executable
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: pdf.embedded_files[*].filename
    regex: '(?i)\.(exe|dll|scr|lnk)$'
- id: pdf-embedded-script-payload
  desc: PDF embeds script payload
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: pdf.embedded_files[*].filename
    regex: '(?i)\.(hta|bat|js|vbs)$'
- id: pdf-embedded-jar-payload
  desc: PDF embeds JAR payload
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: pdf.embedded_files[*].filename
    regex: '(?i)\.jar$'
- id: pdf-embedded-office-document
  desc: PDF embeds Office document
  crit: suspicious
  conf: 0.9
  attack: T1204.002
  if:
    type: value
    path: pdf.embedded_files[*].filename
    regex: '(?i)\.(doc|xls|ppt|pps)$'
  unless:
  - type: path
    regex: '(^|[\\/])tests[\\/]Behat[\\/]fixtures[\\/]malicious-vba\.pdf$'
- id: pdf-embedded-rtf-payload
  desc: PDF embeds RTF document
  crit: suspicious
  conf: 0.9
  attack: T1204.002
  if:
    type: value
    path: pdf.embedded_files[*].filename
    regex: '(?i)\.rtf$'
- id: pdf-embedded-html-payload
  desc: PDF embeds HTML document
  crit: suspicious
  conf: 0.88
  attack: T1204.002
  if:
    type: value
    path: pdf.embedded_files[*].filename
    regex: '(?i)\.html?$'

  # --- Filter chain anomalies ---
- id: pdf-filter-chain-multi
  desc: PDF stream uses multi-step filter chain
  if:
    type: value
    path: pdf.filter_chains[*]
    substr: ","
- id: pdf-jbig2-filter
  desc: PDF stream uses JBIG2Decode filter
  crit: notable
  conf: 0.96
  if:
    type: value
    path: pdf.shape.jbig2_filter_count
    regex: '^[1-9]'

  # --- Malformed stream / parser-confusion facts ---
- id: pdf-stream-length-mismatch
  desc: PDF stream length mismatch
  crit: suspicious
  conf: 0.93
  if:
    type: metrics
    field: pdf.stream_length_mismatch_count
    min: 1
  unless:
  - id: well-known/lib/pdfium::source-tree
- id: pdf-stream-missing-length
  desc: PDF stream lacks Length
  if:
    type: metrics
    field: pdf.stream_missing_length_count
    min: 1
  unless:
  - id: well-known/lib/benign-runtime-bundles::node-source-tree
- id: pdf-stream-bad-delimiter
  desc: PDF stream delimiter malformed
  crit: suspicious
  conf: 0.9
  if:
    type: metrics
    field: pdf.stream_bad_delimiter_count
    min: 1
  unless:
  - id: well-known/lib/pdfium::source-tree
- id: pdf-stream-missing-endstream
  desc: PDF stream lacks endstream
  crit: suspicious
  conf: 0.94
  if:
    type: metrics
    field: pdf.stream_missing_endstream_count
    min: 1
  unless:
  - id: well-known/lib/pdfium::source-tree
- id: pdf-leading-garbage-before-header
  desc: PDF has bytes before header
  crit: suspicious
  conf: 0.86
  if:
    type: metrics
    field: pdf.leading_bytes_before_header
    min: 1
  unless:
  - id: well-known/lib/pdfium::source-tree

  # --- Stacked PDF / structural anomalies ---
- id: pdf-multiple-headers-stacked
  desc: PDF contains multiple %PDF- headers
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: pdf.header.header_count
    regex: '^[2-9]'
- id: pdf-many-incremental-updates
  desc: PDF has many %%EOF markers
  # Incremental saves from desktop publishers (InDesign, Acrobat) routinely
  # leave a handful of %%EOF markers; treat that as a structural note, not
  # hostility. Stacked/polyglot abuse is covered by pdf-multiple-headers-stacked.
  crit: notable
  if:
    type: value
    path: pdf.shape.eof_count
    regex: '^[5-9]|^[1-9][0-9]'
- id: pdf-linearized
  desc: PDF is linearized for fast web viewing
  crit: baseline
  conf: 0.98
  if:
    type: value
    path: pdf.shape.flags[*]
    exact: linearized
- id: pdf-multiple-trailers-non-linearized
  desc: Non-linearized PDF contains multiple trailers
  crit: notable
  if:
    type: metrics
    field: pdf.trailer_count
    min: 2
  unless:
  - type: value
    path: pdf.shape.flags[*]
    exact: linearized
- id: pdf-encrypted
  desc: PDF is encrypted
  crit: notable
  if:
    type: value
    path: pdf.shape.encrypted
    exact: "true"
- id: pdf-stream-swf-magic--465753
  desc: PDF stream begins with SWF (465753)
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: pdf.streams[*].magic_hex
    regex: ^465753
- id: pdf-stream-swf-magic--435753
  desc: PDF stream begins with SWF (435753)
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: pdf.streams[*].magic_hex
    regex: ^435753
- id: pdf-stream-swf-magic--5a5753
  desc: PDF stream begins with SWF (5a5753)
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: pdf.streams[*].magic_hex
    regex: ^5a5753
composite_rules:
- id: pdf-stream-swf-magic
  desc: PDF stream begins with SWF
  crit: suspicious
  conf: 0.92
  any:
  - id: pdf-stream-swf-magic--465753
  - id: pdf-stream-swf-magic--435753
  - id: pdf-stream-swf-magic--5a5753
