# CHM structural observations from cleave's CHM analyzer.
defaults:
  for: [chm]
  platforms: [windows]
  crit: notable
  conf: 0.7

traits:
  - id: chm-small-entry-count
    desc: CHM has few user entries
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: chm.html_entry_count
      max: 3
  - id: chm-small-user-entry
    desc: CHM max user entry small
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: chm.max_user_entry_size
      max: 16384
  - id: chm-mostly-overhead
    desc: CHM has low user-content ratio
    crit: notable
    conf: 0.65
    if:
      type: metrics
      field: chm.user_byte_ratio
      max: 0.25
  - id: chm-has-objinst
    desc: CHM bundles OBJINST section
    crit: notable
    conf: 0.6
    if:
      type: value
      path: "chm.features[*]"
      exact: objinst
  - id: chm-title-topic-mismatch
    desc: CHM title and default topic disagree
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: chm.title_topic_mismatch
      min: 1
  - id: chm-no-compiler-version
    desc: CHM omits compiler version
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: chm.no_compiler_version
      min: 1
  - id: chm-default-topic-missing
    desc: CHM default topic missing
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: chm.default_topic_missing
      min: 1
  - id: chm-russian-lcid
    desc: CHM Russian LCID
    crit: notable
    conf: 0.5
    if:
      type: value
      path: chm.itsf.lcid
      exact: "1049"
  - id: chm-korean-lcid
    desc: CHM Korean LCID
    crit: notable
    conf: 0.5
    if:
      type: value
      path: chm.itsf.lcid
      exact: "1042"
  - id: chm-chinese-lcid-2052
    desc: CHM Simplified Chinese LCID
    crit: notable
    conf: 0.5
    if:
      type: value
      path: chm.itsf.lcid
      exact: "2052"
  - id: chm-chinese-lcid-1028
    desc: CHM Traditional Chinese LCID
    crit: notable
    conf: 0.5
    if:
      type: value
      path: chm.itsf.lcid
      exact: "1028"
  - id: chm-chinese-lcid-3076
    desc: CHM Hong Kong Chinese LCID
    crit: notable
    conf: 0.5
    if:
      type: value
      path: chm.itsf.lcid
      exact: "3076"
  - id: chm-data-basename
    desc: CHM with generic data.chm name
    crit: notable
    conf: 0.5
    if:
      type: path
      basename: true
      exact: data.chm

composite_rules:
  - id: chm-chinese-lcid
    desc: CHM Chinese locale marker
    crit: notable
    conf: 0.5
    any:
      - id: chm-chinese-lcid-2052
      - id: chm-chinese-lcid-1028
      - id: chm-chinese-lcid-3076
