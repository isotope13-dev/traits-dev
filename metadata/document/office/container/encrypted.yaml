# Migrated from the office analyzer (office/mod.rs). The analyzer sets the
# office.is_encrypted metric (ORed across the OLE2 and OOXML passes); this
# trait replaces the two hardcoded ole2-encrypted / ooxml-encrypted findings.
defaults:
  for: [oledoc, ooxml]
  platforms: [windows, macos, linux]
traits:
  - id: office-encrypted
    desc: Office document is encrypted
    crit: notable
    conf: 1.0
    attack: T1027
    if:
      type: metrics
      field: office.is_encrypted
      min: 1
