defaults:
  platforms: [windows, unix]
  for: [oledoc]
  crit: baseline
  conf: 0.95

traits:
- id: basename-doc-extension
  desc: Filename has .doc extension
  ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
  if:
    type: path
    basename: true
    regex: '(?i)\.doc$'
- id: basename-xls-extension
  desc: Filename has .xls extension
  ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
  if:
    type: path
    basename: true
    regex: '(?i)\.xls$'
- id: basename-ppt-extension
  desc: Filename has .ppt extension
  ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
  if:
    type: path
    basename: true
    regex: '(?i)\.ppt$'
- id: compobj-claims-word
  desc: CompObj declares Word document
  crit: notable
  ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
  if:
    type: value
    path: office.compobj.app_version
    regex: '^(MSWord|Word\.Document)'
- id: compobj-claims-excel
  desc: CompObj declares Excel sheet
  crit: notable
  ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
  if:
    type: value
    path: office.compobj.app_version
    regex: '^Excel\.'
- id: compobj-claims-powerpoint
  desc: CompObj declares PowerPoint
  crit: notable
  ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
  if:
    type: value
    path: office.compobj.app_version
    regex: '^PowerPoint\.'
