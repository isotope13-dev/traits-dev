defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: hxs-extension
    desc: Compiled help HxS extension
    crit: baseline
    conf: 0.95
    if:
      type: path
      regex: (?i)\\.hxs$
  - id: itsf-header
    desc: Compiled help ITSF container marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: ITSF
      section: .its
  - id: help2-title
    desc: Microsoft Help 2 version title
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: Compiled Microsoft Help 2.0 Title
      section: .rsrc
composite_rules:
  - id: help2-container
    desc: Microsoft Help 2.x container
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: metadata/document/office/container::help2-title
      - id: metadata/document/office/container::hxs-extension
      - id: metadata/document/office/container::itsf-header
      - id: metadata/document/office/container::office-encrypted
