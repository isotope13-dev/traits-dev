defaults:
  for:
    - documents
    - ooxml
    - xlsx
  platforms:
    - unix
    - windows
  crit: baseline
  conf: 0.9
traits:
  - id: office-vba-project-value
    desc: OOXML archive declares an embedded VBA project
    crit: notable
    conf: 0.99
    for: [ooxml]
    if:
      type: value
      path: office.macros[*]
      exact: xl/vbaProject.bin
  - id: excel-vba-project
    desc: Excel VBA project marker
    conf: 0.95
    if:
      type: text
      exact: xl/vbaProject.bin
  - id: excel-macroenabled-content
    desc: Excel macro-enabled content type
    conf: 0.97
    if:
      type: text
      substr: application/vnd.ms-excel.sheet.macroEnabled
  - id: excel-workbook-part
    desc: Excel workbook XML part
    conf: 0.98
    if:
      type: text
      exact: xl/workbook.xml
  - id: excel-sharedstrings-part
    desc: Excel shared strings table
    conf: 0.97
    if:
      type: text
      exact: xl/sharedStrings.xml
  - id: excel4-macrosheet-content
    desc: Excel 4.0 macro sheet content type
    conf: 0.97
    if:
      type: text
      regex: application/vnd\.ms-excel\.(intl)?macrosheet(\+xml)?
  - id: excel4-macrosheet-part
    desc: Excel 4.0 macro sheet part
    conf: 0.97
    if:
      type: text
      exact: xl/macrosheets/sheet1.xml
  - id: excel4-macrosheet-relationship
    desc: Excel macro sheet relationship
    conf: 0.98
    if:
      type: text
      substr: relationships/xlMacrosheet
  - id: excel4-veryhidden-sheet
    desc: VeryHidden worksheet state
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: state="veryHidden"
  - id: excel4-auto-open-name
    desc: Excel auto-open defined name
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: _xlnm.Auto_open
  - id: excel4-style-key-material
    desc: Excel styles key material
    conf: 0.97
    if:
      type: text
      substr: xl/styles.xml
  - id: excel-external-links
    desc: Excel external links directory
    conf: 0.95
    if:
      type: text
      substr: xl/externalLinks/
  - id: raw-excel-activex-control-part
    desc: Raw Excel ActiveX control part
    for: [ooxml]
    crit: notable
    conf: 0.96
    if:
      type: hex
      pattern: "78 6c 2f 61 63 74 69 76 65 58 2f 61 63 74 69 76 65 58 ?? 2e 62 69 6e"
composite_rules:
  - id: excel-vba-document
    desc: OOXML Excel VBA document layout
    crit: notable
    conf: 0.99
    all:
      - id: excel-workbook-part
      - id: excel-vba-project
      - id: excel-macroenabled-content
  - id: excel4-ooxml-macrosheet
    desc: OOXML Excel 4.0 macrosheet
    crit: suspicious
    conf: 0.99
    all:
      - id: excel-workbook-part
      - id: excel-macroenabled-content
      - id: excel4-macrosheet-content
      - id: excel4-macrosheet-part
      - id: excel4-macrosheet-relationship
  - id: raw-excel-macro-capable-document
    desc: Raw Excel macro-capable document
    crit: suspicious
    conf: 0.98
    all:
      - id: excel-workbook-part
    any:
      - id: excel-vba-project
      - id: excel4-macrosheet-part
      - id: raw-excel-activex-control-part
