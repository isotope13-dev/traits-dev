defaults:
  platforms: [windows, unix]
  for: [oledoc]
  crit: baseline
  conf: 0.8
traits:
  - id: ole-compound-file
    desc: OLE compound file header
    conf: 0.95
    if:
      type: hex
      section: .text
      pattern: D0 CF 11 E0 A1 B1 1A E1
  - id: word-document-class
    desc: Legacy Word document class
    conf: 0.95
    if:
      type: text
      exact: Word.Document.8
      section: .text
  - id: vba-project-cmg
    desc: VBA project CMG marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: CMG="
      section: .text
  - id: vba-project-dpb
    desc: VBA project DPB marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: DPB="
      section: .text
  - id: vba-project-gc
    desc: VBA project GC marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: GC="
      section: .text
  - id: vba-document-binding
    desc: VBA document class binding
    conf: 0.9
    if:
      type: raw
      regex: Document=[A-Za-z0-9]+/&H00000000
      section: .text
  - id: forms-textbox-control
    desc: MSForms textbox control marker
    conf: 0.9
    if:
      type: text
      exact: Forms.TextBox.1
      section: .text
  - id: forms-textbox-instance
    desc: MSForms textbox instance record
    conf: 0.92
    if:
      type: text
      exact: TextBox1, 0, 0, MSForms, TextBox
      section: .text
  - id: msforms-exd-cache
    desc: MSForms EXD cache path
    conf: 0.85
    if:
      type: text
      regex: (?i)\\Word8\.0\\MSForms\.exd
      section: .text
  - id: randomized-vba-module-names
    desc: Many randomized VBA names
    conf: 0.92
    count_min: 6
    if:
      type: raw
      regex: (?i)(Module|Class)=[A-Za-z][A-Za-z0-9]{7,}
      section: .text
composite_rules:
  - id: word-vba-project
    desc: Legacy Word VBA project
    conf: 0.96
    all:
      - id: word-document-class
      - id: vba-project-cmg
      - id: vba-project-dpb
      - id: vba-project-gc
      - id: vba-document-binding
  - id: forms-textbox-payload-surface
    desc: Forms textbox payload surface
    conf: 0.94
    all:
      - id: forms-textbox-control
      - id: forms-textbox-instance
  - id: obfuscated-vba-project-layout
    desc: Obfuscated VBA project layout
    conf: 0.95
    all:
      - id: word-vba-project
      - id: randomized-vba-module-names
