defaults:
  for:
  - documents
  platforms:
  - windows
  size_min: 512
  size_max: 26214400
traits:
- id: vba-userform-control-names
  desc: 'Dense VBA UserForm control names'
  crit: component
  conf: 0.8
  count_min: 3
  if:
    type: text
    regex: (?i)UserForm[0-9]{0,2}|Label[0-9]{1,2}|TextBox[0-9]{1,2}
