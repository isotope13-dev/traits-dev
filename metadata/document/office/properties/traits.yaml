# Office document property atomics.
#
# These read the synthesized kv tree the office analyzer attaches to
# every parsed document (`report.kv_tree`). Schema is stable across
# legacy OLE2 and modern OOXML — `summary.*` covers SummaryInformation
# strings; `core.*` covers OOXML `docProps/core.xml`. Each atomic is
# `notable` standalone; composites in `objectives/evasion/decoy/` and
# `objectives/evasion/masquerade/` use these to express intent.
#
# When a trait could plausibly target either OLE2 or OOXML metadata
# we fire two atomics — one per source — rather than try to unify
# the paths. This keeps the schema honest about where the data came
# from, which matters for forensics evidence trails.
defaults:
  for: [oledoc, ooxml]
  platforms: [windows, unix]
  crit: notable
  conf: 0.9

traits:
  # --- Locale / script in author fields (Cyrillic / CJK / Arabic).
  #     Real lures rarely mix scripts in author with English body
  #     text; cyrillic-author-on-english-body is a known Emotet/
  #     IcedID lure pattern. ---
  - id: summary-author-cyrillic
    desc: SummaryInformation author contains Cyrillic
    if:
      type: kv
      path: summary.author
      regex: '[Ѐ-ӿ]'
  - id: summary-last-author-cyrillic
    desc: SummaryInformation last_author contains Cyrillic
    if:
      type: kv
      path: summary.last_author
      regex: '[Ѐ-ӿ]'
  - id: core-creator-cyrillic
    desc: OOXML core.xml creator contains Cyrillic
    if:
      type: kv
      path: core.creator
      regex: '[Ѐ-ӿ]'
  - id: core-last-modified-by-cyrillic
    desc: OOXML core.xml last_modified_by contains Cyrillic
    if:
      type: kv
      path: core.last_modified_by
      regex: '[Ѐ-ӿ]'

  - id: summary-author-cjk
    desc: SummaryInformation author contains CJK
    if:
      type: kv
      path: summary.author
      regex: '[一-鿿぀-ゟ゠-ヿ]'
  - id: core-creator-cjk
    desc: OOXML core.xml creator contains CJK
    if:
      type: kv
      path: core.creator
      regex: '[一-鿿぀-ゟ゠-ヿ]'

  # --- "Just authored" — first revision plus VBA project. The kv
  #     `summary.revision` field is a discrete identifier (not a
  #     metric) — a doc with revision 1 has been saved exactly once,
  #     which is unusual for benign business documents. ---
  - id: summary-revision-one
    desc: First revision document
    crit: baseline   # alone it's just "freshly created"
    conf: 0.85
    if:
      type: kv
      path: summary.revision
      exact: "1"

  # --- Brand impersonation in metadata ---
  - id: summary-author-microsoft
    desc: SummaryInformation author claims Microsoft
    if:
      type: kv
      path: summary.author
      substr: Microsoft
      case_insensitive: true
  - id: core-creator-docusign
    desc: OOXML core.xml creator claims DocuSign
    if:
      type: kv
      path: core.creator
      substr: DocuSign
      case_insensitive: true
  - id: core-application-libreoffice
    desc: OOXML core.xml application is LibreOffice
    if:
      type: kv
      path: core.application
      substr: LibreOffice
      case_insensitive: true
  - id: core-application-wps
    desc: OOXML core.xml application is WPS Office
    if:
      type: kv
      path: core.application
      regex: '(?i)WPS\s+(Office|Spreadsheets|Presentation|Writer)'

  # --- Date sentinels.
  #     Suspicious creation dates: future-dated (impossible) or
  #     suspiciously recent (matches campaign window) or 1970-epoch
  #     (default-clock signature). Trait authors can refine via
  #     composite combinations. ---
  - id: summary-create-future-date
    desc: Future creation date in SummaryInformation
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: summary.create_time
      regex: '^20[3-9][0-9]-'   # 2030+
  - id: core-created-future-date
    desc: Future creation date in OOXML core.xml
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: core.created
      regex: '^20[3-9][0-9]-'   # 2030+
  - id: core-created-epoch
    desc: OOXML core.xml created at unix epoch
    if:
      type: kv
      path: core.created
      regex: '^1970-01-01'

  # --- Identical creator and last_modified_by combined with first
  #     revision is a strong "lure-doc-just-built" signature.
  #     We detect each piece atomically; the composite below combines.
  - id: core-empty-last-modified-by
    desc: OOXML core.xml last_modified_by is empty
    if:
      type: kv
      path: core.last_modified_by
      exists: false

  # --- Empty/single-character keywords or descriptions are normal;
  #     unusually-long keywords stuffed with garbage signal C2-config
  #     storage in metadata. Surfaced via size_min on the keyword
  #     string length isn't possible in kv (size_* applies to
  #     arrays/objects), so we use a regex on length proxy. ---
  - id: core-keywords-very-long
    desc: OOXML core.xml keywords unusually long
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: core.keywords
      regex: '.{200,4096}'   # ≥200 chars in keywords ≈ data smuggling

composite_rules:
  # Locale-mismatch lure: non-Latin author plus a VBA project.
  - id: locale-mismatch-author-with-macros
    desc: Non-Latin author with VBA macros
    crit: suspicious
    conf: 0.94
    attack: T1204.002
    all:
      - id: metadata/document/office/markup::ooxml-vba-project-content
    any:
      - id: summary-author-cyrillic
      - id: summary-last-author-cyrillic
      - id: core-creator-cyrillic
      - id: core-last-modified-by-cyrillic
      - id: summary-author-cjk
      - id: core-creator-cjk
    needs: 1

  # Fresh-doc-with-macros: first revision plus VBA. Common Emotet/
  # IcedID staging signature — the lure is freshly authored and
  # never edited before delivery.
  - id: fresh-doc-with-macros
    desc: First-revision document with VBA macros
    crit: notable
    conf: 0.88
    all:
      - id: metadata/document/office/markup::ooxml-vba-project-content
      - id: summary-revision-one

  # Brand-impersonation in author/creator combined with macros.
  # Stays at suspicious (not hostile) per the metadata/ tier
  # constraint — composites that infer attacker intent at hostile
  # belong in objectives/. This composite signals the masquerade
  # surface; objectives/evasion/decoy can promote with proximity.
  - id: brand-impersonation-author-with-macros
    desc: Brand-impersonation author with VBA macros
    crit: suspicious
    conf: 0.95
    attack: T1204.002
    all:
      - id: metadata/document/office/markup::ooxml-vba-project-content
    any:
      - id: summary-author-microsoft
      - id: core-creator-docusign
    needs: 1
