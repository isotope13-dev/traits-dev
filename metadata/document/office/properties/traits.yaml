# Office document property atomics.
#
# Reads expose's unified `office.*` schema. Both legacy OLE2
# (`.doc`/`.xls`/`.ppt`) SummaryInformation + DocumentSummaryInformation
# property sets AND modern OOXML (`.docx`/`.xlsx`/`.pptx`)
# `docProps/core.xml` + `app.xml` flow into the same field names —
# expose normalizes them on the way out. A trait that previously
# fired one atomic per source now fires one atomic for both.
#
# Format provenance is recoverable from `office.kind` (doc / xls /
# ppt / docx / xlsx / pptx / …) when a downstream composite needs
# the distinction; leaf-atomic-per-source duplication is no longer
# necessary.
defaults:
  for: [oledoc, ooxml]
  platforms: [windows, unix]
  crit: notable
  conf: 0.9

traits:
  # --- Locale / script in author fields (Cyrillic / CJK / Arabic).
  #     Real lures rarely mix scripts in author with English body
  #     text; cyrillic-author-on-english-body is a known Emotet/
  #     IcedID lure pattern. ---
- id: office-creator-cyrillic
  desc: Document creator contains Cyrillic
  if:
    type: value
    path: office.creator
    regex: '[Ѐ-ӿ]'
- id: office-last-modified-by-cyrillic
  desc: Document last_modified_by contains Cyrillic
  if:
    type: value
    path: office.last_modified_by
    regex: '[Ѐ-ӿ]'
- id: office-creator-cjk
  desc: Document creator contains CJK
  if:
    type: value
    path: office.creator
    regex: '[一-鿿぀-ゟ゠-ヿ]'

  # --- "Just authored" — first revision plus VBA project. The kv
  #     `office.revision` field is a discrete identifier (not
  #     a metric) — a doc with revision 1 has been saved exactly
  #     once, which is unusual for benign business documents. ---
- id: office-revision-one
  desc: First revision document
  crit: baseline     # alone it's just "freshly created"
  conf: 0.85
  if:
    type: value
    path: office.revision
    exact: "1"

  # --- Brand impersonation in metadata ---
- id: office-creator-microsoft
  desc: Document creator claims Microsoft
  if:
    type: value
    path: office.creator
    substr: Microsoft
    case_insensitive: true
- id: office-creator-docusign
  desc: Document creator claims DocuSign
  if:
    type: value
    path: office.creator
    substr: DocuSign
    case_insensitive: true
- id: office-application-libreoffice
  desc: Document application is LibreOffice
  if:
    type: value
    path: office.application
    substr: LibreOffice
    case_insensitive: true
- id: office-application-wps
  desc: Document application is WPS Office
  if:
    type: value
    path: office.application
    regex: '(?i)WPS\s+(Office|Spreadsheets|Presentation|Writer)'

  # --- Date sentinels.
  #     Suspicious creation dates: future-dated (impossible) or
  #     suspiciously recent (matches campaign window) or 1970-epoch
  #     (default-clock signature). Trait authors can refine via
  #     composite combinations. ---
- id: office-created-future-date
  desc: Future creation date in document properties
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: office.created
    regex: '^20[3-9][0-9]-'     # 2030+
- id: office-created-epoch
  desc: Document created at unix epoch
  if:
    type: value
    path: office.created
    regex: '^1970-01-01'

  # --- Empty last_modified_by combined with first revision is the
  #     "lure-doc-just-built" signature.
- id: office-empty-last-modified-by
  desc: Document last_modified_by is empty
  if:
    type: value
    path: office.last_modified_by
    exact: ""

  # --- Empty/single-character keywords or descriptions are normal;
  #     unusually-long keywords stuffed with garbage signal C2-config
  #     storage in metadata. Surfaced via regex on length proxy since
  #     kv `size_*` matchers only apply to arrays/objects.
- id: office-keywords-very-long
  desc: Document keywords unusually long
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: office.keywords
    regex: '.{200}'     # >=200 chars in keywords ~= data smuggling (unanchored, so longer values also match)

composite_rules:
  # Locale-mismatch lure: non-Latin author plus a VBA project.
- id: locale-mismatch-author-with-macros
  desc: Non-Latin author with VBA macros
  crit: suspicious
  conf: 0.94
  attack: T1204.002
  all:
  - id: metadata/document/office/markup::ooxml-vba-project-content
  any:
  - id: office-creator-cyrillic
  - id: office-last-modified-by-cyrillic
  - id: office-creator-cjk
- id: fresh-doc-with-macros
  desc: First-revision document with VBA macros
  crit: notable
  conf: 0.88
  all:
  - id: metadata/document/office/markup::ooxml-vba-project-content
  - id: office-revision-one

  # Brand-impersonation in author/creator combined with macros.
  # Stays at suspicious (not hostile) per the metadata/ tier
  # constraint — composites that infer attacker intent at hostile
  # belong in objectives/. This composite signals the masquerade
  # surface; objectives/evasion/decoy can promote with proximity.
- id: brand-impersonation-author-with-macros
  desc: Brand-impersonation author with VBA macros
  crit: suspicious
  conf: 0.95
  attack: T1204.002
  all:
  - id: metadata/document/office/markup::ooxml-vba-project-content
  any:
  - id: office-creator-microsoft
  - id: office-creator-docusign
