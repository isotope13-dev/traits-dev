# Raw-byte OOXML detection for files with wrong extension in non-document content.
defaults:
  for:
    - scripts
    - source
    - manifests
    - media
    - data
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  crit: baseline
  conf: 0.9
traits:
  - id: ooxml-raw-content-types
    desc: OOXML content types in raw bytes
    conf: 0.97
    if:
      type: raw
      substr: '[Content_Types].xml'
  - id: ooxml-raw-word-document
    desc: Word document.xml in raw bytes
    conf: 0.97
    if:
      type: raw
      substr: word/document.xml
  - id: ooxml-raw-vba-project
    desc: Word VBA project in raw bytes
    crit: notable
    conf: 0.97
    if:
      type: raw
      substr: word/vbaProject.bin
  - id: ooxml-raw-vba-data
    desc: Word vbaData.xml in raw bytes
    conf: 0.96
    if:
      type: raw
      substr: word/vbaData.xml
  - id: ooxml-raw-macro-content-type
    desc: Macro-enabled content type raw
    conf: 0.97
    if:
      type: raw
      substr: vnd.ms-word.document.macroEnabled
composite_rules:
  - id: ooxml-raw-word-layout
    desc: OOXML Word document via raw bytes
    conf: 0.98
    all:
      - id: ooxml-raw-content-types
      - id: ooxml-raw-word-document
  - id: ooxml-raw-word-vba
    desc: OOXML Word VBA document raw bytes
    crit: notable
    conf: 0.98
    all:
      - id: ooxml-raw-word-layout
      - id: ooxml-raw-vba-project
      - id: ooxml-raw-vba-data
      - id: ooxml-raw-macro-content-type
