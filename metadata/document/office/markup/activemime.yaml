defaults:
  for: [documents]
  platforms: [unix, windows]
  crit: baseline
  conf: 0.95
traits:
  - id: activemime-magic
    desc: ActiveMime container format header
    crit: suspicious
    if:
      type: raw
      substr: "ActiveMime"
      offset_range: [0, 20]
  - id: mso-encoded-content
    desc: MSO encoded document content
    if:
      type: text
      substr: "ActiveMime"
