defaults:
  for: [documents]
  platforms: [unix, windows]
  crit: baseline
  conf: 0.95
traits:
  - id: activemime-magic
    desc: ActiveMime container format header
    for: [oledoc, ooxml, rtf]
    crit: suspicious
    if:
      type: text
      substr: "ActiveMime"
      offset_range: [0, 20]
  - id: mso-encoded-content
    desc: MSO encoded document content
    for: [documents, '!oledoc', '!ooxml', '!rtf']
    if:
      type: text
      substr: "ActiveMime"
