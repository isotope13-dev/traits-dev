defaults:
  for:
    - documents
  platforms:
    - unix
    - windows
  crit: baseline
  conf: 0.9
traits:
  - id: ooxml-root-relationships
    desc: OOXML root relationships part
    conf: 0.98
    if:
      type: text
      exact: _rels/.rels
  - id: ooxml-word-relationships-part
    desc: Word document relationships part
    conf: 0.98
    if:
      type: text
      exact: word/_rels/document.xml.rels
  - id: ooxml-word-macroenabled-content
    desc: Word macro-enabled content type
    conf: 0.97
    if:
      type: text
      substr: application/vnd.ms-word.document.macroEnabled.main+xml
  - id: ooxml-vba-project-content
    desc: Office VBA project content
    conf: 0.97
    if:
      type: text
      substr: application/vnd.ms-office.vbaProject
  - id: ooxml-embedded-ole-part
    desc: Embedded OLE object part
    conf: 0.97
    if:
      type: text
      regex: word/embeddings/.{0,80}\.bin
  - id: ooxml-embedded-ole-object
    desc: OOXML embeds OLE object relationship
    crit: notable
    conf: 0.95
    for: [ooxml]
    if:
      type: value
      path: office.embedded[*].relationship_type
      exact: oleObject
  - id: ooxml-embedded-ole2-object
    desc: OOXML embeds OLE2 object
    crit: notable
    conf: 0.95
    for: [ooxml]
    if:
      type: value
      path: office.embedded[*].kind
      exact: ole2
  - id: ooxml-large-embedded-ole-object
    desc: Large embedded OLE object
    crit: notable
    conf: 0.95
    for: [ooxml]
    if:
      type: value
      path: office.embedded[*].size_bytes
      regex: '^[1-9][0-9]{5,}$'
  - id: ooxml-external-relationship
    desc: External OOXML relationship target
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: TargetMode="External"
    unless:
      - id: metadata/file/extension/identity::markdown-file-basename
  - id: ooxml-external-image-relationship
    desc: External image relationship target
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: relationships/image" Target="https?://
  - id: ooxml-activex-control-part
    desc: ActiveX control storage part
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: word/activeX/activeX[0-9]+\.bin
  - id: ooxml-activex-control-xml
    desc: ActiveX control definition XML
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: word/activeX/activeX[0-9]+\.xml
  - id: ooxml-activex-relationships-part
    desc: ActiveX relationships part
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: word/activeX/_rels/activeX[0-9]+\.xml\.rels
  - id: ooxml-word-many-media-parts
    desc: Many embedded Word media parts
    crit: notable
    conf: 0.94
    count_min: 6
    if:
      type: text
      regex: word/media/image[0-9]+\.(jpeg|jpg|png|wmf)
  - id: ooxml-flat-package-layout
    desc: Flat OOXML package layout
    crit: component
    conf: 0.86
    for: [ooxml]
    if:
      type: metrics
      field: archive.directory_count
      max: 0
  - id: ooxml-single-timestamp-layout
    desc: Single timestamp OOXML package
    crit: component
    conf: 0.86
    for: [ooxml]
    if:
      type: metrics
      field: archive.timing.mtime_unique_count
      max: 1
  - id: ooxml-sparse-package-layout
    desc: Sparse OOXML package layout
    crit: component
    conf: 0.86
    for: [ooxml]
    if:
      type: metrics
      field: archive.member_count
  - id: ooxml-parse-error
    desc: OOXML parser reported error
    crit: baseline
    conf: 0.95
    for: [ooxml]
    if:
      type: metrics
      field: parse.error_count
      min: 1
      max: 14
  - id: ooxml-long-archive-member-name
    desc: Long OOXML archive member name
    crit: baseline
    conf: 0.9
    for: [ooxml]
    if:
      type: metrics
      field: archive.max_filename_length
      min: 80
  - id: ooxml-hidden-archive-member
    desc: Hidden OOXML archive member
    crit: baseline
    conf: 0.9
    for: [ooxml]
    if:
      type: metrics
      field: archive.hidden_file_count
      min: 1
  - id: ooxml-executable-archive-member
    desc: OOXML archive executable-class member
    crit: notable
    conf: 0.9
    for: [ooxml]
    if:
      type: metrics
      field: archive.executable_count
      min: 1
    unless:
      - id: ooxml-printer-settings-only-bin
  - id: ooxml-printer-settings-path
    desc: OOXML printer settings binary path
    crit: component
    conf: 0.98
    for: [ooxml]
    if:
      type: text
      substr: xl/printerSettings/
  - id: ooxml-single-executable-member
    desc: OOXML has one executable-class member
    crit: component
    conf: 0.95
    for: [ooxml]
    if:
      type: metrics
      field: archive.executable_count
      min: 1
      max: 1
  - id: ooxml-large-archive-member
    desc: Large OOXML archive member
    crit: baseline
    conf: 0.88
    for: [ooxml]
    if:
      type: metrics
      field: office.ooxml.max_entry_size
      min: 50000
  - id: ooxml-compact-package
    desc: OOXML package has at most 24 entries
    crit: baseline
    conf: 0.95
    for: [ooxml]
    if:
      type: metrics
      field: archive.member_count
      min: 1
      max: 24
  - id: ooxml-small-high-entropy-body
    desc: Small high-entropy OOXML body
    crit: baseline
    conf: 0.88
    for: [ooxml]
    size_min: 10240
    size_max: 262144
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.2
  - id: ooxml-very-high-entropy-body
    desc: Very-high-entropy OOXML container
    crit: notable
    conf: 0.9
    for: [ooxml]
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.5
  - id: ooxml-high-zip-bomb-ratio
    desc: High OOXML compression expansion
    crit: component
    conf: 0.88
    for: [ooxml]
    if:
      type: metrics
      field: archive.zip_bomb_ratio
      min: 20
  - id: ooxml-eightfold-compression-expansion
    desc: OOXML archive expands at least eightfold
    crit: notable
    conf: 0.9
    for: [ooxml]
    if:
      type: metrics
      field: archive.zip_bomb_ratio
      min: 8
  - id: office-encryption-descriptor
    desc: Office encryption descriptor XML
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: http://schemas.microsoft.com/office/2006/encryption
  - id: office-encryption-aes
    desc: Office AES encryption marker
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: cipherAlgorithm="AES"
  - id: office-encryption-keybits256
    desc: Office 256-bit encryption
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: keyBits="256"
  - id: office-encryption-sha512
    desc: Office SHA512 hashing marker
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: hashAlgorithm="SHA512"
composite_rules:
  - id: ooxml-printer-settings-only-bin
    desc: Only executable-class member is printer data
    crit: component
    conf: 0.98
    all:
      - id: ooxml-printer-settings-path
      - id: ooxml-single-executable-member
  - id: ooxml-word-document
    desc: OOXML Word document layout
    conf: 0.99
    all:
      - id: ooxml-raw-content-types
      - id: ooxml-root-relationships
      - id: ooxml-raw-word-document
      - id: ooxml-word-relationships-part
  - id: ooxml-word-vba-document
    desc: OOXML Word VBA document
    crit: notable
    conf: 0.99
    all:
      - id: ooxml-word-document
      - id: ooxml-raw-vba-project
      - id: ooxml-raw-vba-data
      - id: ooxml-word-macroenabled-content
      - id: ooxml-vba-project-content
  - id: ooxml-word-vba-embedded-ole
    desc: Word VBA embedded OLE
    crit: suspicious
    conf: 0.98
    all:
      - id: ooxml-word-vba-document
      - id: ooxml-embedded-ole-part
  - id: ooxml-word-external-image-fetch
    desc: Word external image fetch
    crit: suspicious
    conf: 0.98
    all:
      - id: ooxml-word-relationships-part
      - id: ooxml-external-relationship
      - id: ooxml-external-image-relationship
  - id: ooxml-word-encrypted-embedded-payload
    desc: Encrypted embedded Office payload
    crit: suspicious
    conf: 0.98
    all:
      - id: ooxml-embedded-ole-part
      - id: office-encryption-descriptor
      - id: office-encryption-aes
      - id: office-encryption-keybits256
      - id: office-encryption-sha512
  - id: ooxml-word-activex-surface
    desc: Word ActiveX payload surface
    crit: suspicious
    conf: 0.96
    all:
      - id: ooxml-word-vba-document
      - id: ooxml-activex-control-part
      - id: ooxml-activex-control-xml
      - id: ooxml-activex-relationships-part
  - id: ooxml-word-media-payload-surface
    desc: Word multi-image payload surface
    crit: suspicious
    conf: 0.97
    all:
      - id: ooxml-word-activex-surface
      - id: ooxml-word-many-media-parts
