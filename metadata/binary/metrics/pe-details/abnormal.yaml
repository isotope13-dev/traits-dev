defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
traits:
  - id: extremely-large-avg-function
    desc: Average function size over 50KB
    crit: baseline
    conf: 0.9
    for: [pe]
    if:
      type: metrics
      field: binary.avg_func_size
      min: 50000
  - id: high-code-entropy-go
    desc: High code section entropy
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: binary.code_entropy
      min: 7.0
    unless:
    - id: metadata/binary/framework::dotnet-metadata
  - id: dotnet-code-entropy-normal
    desc: .NET code entropy in unpacked range
    crit: component
    conf: 0.7
    for: [pe]
    # Normal .NET `.text` (IL + metadata + strings) tops out around 6.5-7.0.
    # A crypter that embeds an encrypted payload pushes it to 7.8+, so only
    # this normal range should be treated as a high-code-entropy known FP.
    if:
      type: metrics
      field: binary.code_entropy
      max: 7.4
  - id: low-sentence-string-ratio
    desc: Low ratio of sentence-like strings
    # Baseline: Go/Rust/C++ runtimes contain mostly identifiers, enum names,
    # and error tokens — a low sentence ratio is the norm, not a signal.
    # Useful as a feature for ML, but not a standalone finding.
    crit: baseline
    conf: 0.8
    size_min: 1048576
    if:
      type: metrics
      field: binary.sentence_string_ratio
      max: 0.1
composite_rules:
  # Neutral profile: a .NET assembly whose code entropy sits in the normal
  # unpacked range. Used as a high-code-entropy known-FP gate so that only
  # packed/crypted .NET (code_entropy >= 7.4) is flagged, not every assembly.
  - id: dotnet-normal-entropy-profile
    desc: .NET assembly with normal (unpacked) code entropy
    crit: component
    conf: 0.7
    all:
    - id: metadata/binary/framework::dotnet-metadata
    - id: dotnet-code-entropy-normal
