defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
traits:
  - id: extremely-large-avg-function
    desc: Average function size over 50KB
    crit: baseline
    conf: 0.9
    for: [pe]
    if:
      type: metrics
      field: binary.avg_func_size
      min: 50000
  - id: low-sentence-string-ratio
    desc: Low ratio of sentence-like strings
    # Baseline: Go/Rust/C++ runtimes contain mostly identifiers, enum names,
    # and error tokens — a low sentence ratio is the norm, not a signal.
    # Useful as a feature for ML, but not a standalone finding.
    crit: baseline
    conf: 0.8
    size_min: 1048576
    if:
      type: metrics
      field: binary.sentence_string_ratio
      max: 0.1
  - id: medium-pe-short-max-string
    desc: Medium PE has only short strings
    crit: component
    conf: 0.82
    for: [pe]
    size_min: 196608
    size_max: 1048576
    if:
      type: metrics
      field: binary.max_string_length
      max: 40
    ref: sha256:5fcb9d72408d6781741db2da86b7d4675d607f469a731a9786fc96d59a1e9eb6
  - id: medium-pe-noisy-avg-strings
    desc: Medium PE has noisy short strings
    crit: component
    conf: 0.82
    for: [pe]
    size_min: 196608
    size_max: 1048576
    if:
      type: metrics
      field: binary.avg_string_length
      max: 6.0
    ref: sha256:5fcb9d72408d6781741db2da86b7d4675d607f469a731a9786fc96d59a1e9eb6
composite_rules:
  - id: medium-pe-string-concealment-profile
    desc: Medium PE string concealment profile
    crit: component
    conf: 0.86
    for: [pe]
    all:
    - id: medium-pe-short-max-string
    - id: medium-pe-noisy-avg-strings
    ref: sha256:5fcb9d72408d6781741db2da86b7d4675d607f469a731a9786fc96d59a1e9eb6
