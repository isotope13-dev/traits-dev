defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: pe-dll-characteristics
    desc: PE has DLL characteristics
    crit: component
    conf: 0.84
    if:
      type: value
      path: pe.characteristics
      exact: dll
  - id: many-aliased-exports
    desc: Binary has many aliased exports
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: pe.aliased_export_count
      min: 100
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/signed/platform/

composite_rules:
  - id: suspicious-import-combo-massive
    desc: Massive binary with suspicious import combination
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/metrics/size::massive-executable
      - id: metadata/binary/metrics/anomaly::suspicious-import-combo-marker
    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/v8::isolate-symbol
      - id: well-known/lib/ffmpeg/
      - id: metadata/signed/platform/
