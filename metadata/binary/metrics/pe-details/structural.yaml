defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: pe-dll-characteristics
    desc: PE has DLL characteristics
    crit: component
    conf: 0.82
    if:
      type: metrics
      field: pe.characteristics
      min: 8226
      max: 8226
  - id: many-aliased-exports
    desc: Binary has many aliased exports
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: binary.aliased_exports
      min: 100
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/signed/platform::microsoft

composite_rules:
  - id: suspicious-import-combo-massive
    desc: Massive binary with suspicious import combination
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/metrics::massive-executable
      - id: metadata/binary/metrics/markers::suspicious-import-combo-marker
    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: metadata/signed/platform::microsoft
