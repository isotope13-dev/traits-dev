defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: high-complexity-marker
    desc: High code complexity metric
    crit: component
    if:
      type: metrics
      field: binary.avg_complexity
      min: 20
  - id: low-function-count-marker
    desc: Low function count metric
    crit: component
    size_min: 65536
    if:
      type: metrics
      field: binary.func_count
      max: 10
  - id: high-export-count-marker
    desc: High export count metric
    crit: component
    if:
      type: metrics
      field: binary.export_count
      min: 50
  - id: suspicious-import-combo-marker
    desc: Suspicious combination of imported APIs
    crit: component
    if:
      type: metrics
      field: pe.api_hashing_indicator_count
      min: 1
