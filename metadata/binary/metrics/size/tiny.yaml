# Tiny Binary Features
# Detects unusually small or stripped binaries often associated with stagers
defaults:
  for: [elf]
  crit: notable
traits:
  - id: tiny-elf
    desc: "Tiny ELF binary (< 4KB)"
    platforms: [unix, android]
    size_max: 4096
    if:
      type: metrics
      field: elf.bits
      min: 1
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: micro-elf
    desc: "Micro ELF binary (< 1KB)"
    crit: notable
    platforms: [unix, android]
    size_max: 1024
    if:
      type: metrics
      field: elf.bits
      min: 1
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: text-section-ratio-dominant
    desc: ".text section exceeds 75% of binary size"
    platforms: [unix]
    size_max: 51200
    if:
      type: section
      regex: "\\.text"
      compare_to: total
      size_ratio_min: 0.75

  - id: tiny-pe
    desc: "Tiny PE by file size"
    platforms: [windows]
    size_max: 8192
    for: [pe]
    if:
      type: metrics
      field: pe.machine
      min: 1

  - id: tiny-dotnet
    desc: "Tiny .NET assembly (< 8KB)"
    platforms: [windows]
    size_max: 8192
    for: [pe]
    if:
      type: metrics
      field: pe.is_dotnet
      min: 1
