defaults:
  platforms:
    - unix
    - windows
traits:
  - id: large-rdata-section
    desc: PE .rdata section at least 16 MiB
    crit: baseline
    conf: 0.9
    for: [pe]
    platforms: [windows]
    if:
      type: section
      exact: .rdata
      length_min: 16777216

  - id: large-file-1mb
    desc: File larger than 1MB
    crit: baseline
    for: [binaries, c, cpp, rust, go, java, csharp]
    size_min: 1048576
  - id: large-source-file-4mb
    desc: Source file larger than 4MB
    crit: baseline
    for: [source]
    size_min: 4194304
