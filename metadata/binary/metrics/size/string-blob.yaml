# Neutral size metric: a very large embedded string blob. Go binaries embed
# large string tables, so this fires on benign Go PEs; relocated here from
# objectives/impact/wipe. The giant-string-blob wipe composite references it
# cross-directory as one (weak) leg of an actual wipe combination.
defaults:
  platforms: [windows]
  for: [pe]
traits:
- id: giant-string-blob-metric
  desc: Giant embedded string blob metric
  crit: baseline
  conf: 0.9
  if:
    type: metrics
    field: binary.max_string_length
    min: 65536
  unless:
  - id: metadata/lang/compiler/systems/
