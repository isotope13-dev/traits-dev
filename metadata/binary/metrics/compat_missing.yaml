defaults:
  platforms: [unix, windows]
  for: [binaries]

traits:
  - id: large-executable
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: metadata/binary/debug::metadata/binary/metrics::large-executable
  - id: large-source-file-1mb
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_large_source_file_1mb__
