defaults:
  platforms: [unix, windows, macos]
  for: [binaries]
traits:
  - id: high-entropy-cstring
    desc: High entropy __cstring section (>=4.5)
    crit: baseline
    platforms: [macos]
    for: [macho]
    entropy_min: 4.5
    if:
      type: section
      substr: __cstring
  - id: small-elf-binary
    desc: Small ELF binary (< 50KB)
    crit: baseline
    conf: 0.6
    for: [elf]
    size_max: 51200
  - id: large-executable
    desc: Large executable binary (> 1MB)
    crit: baseline
    conf: 1.0
    for: [pe, elf, macho]
    size_min: 1048576
  - id: four-section-pe
    desc: PE with exactly four sections
    crit: component
    conf: 0.8
    for: [pe]
    if:
      type: metrics
      field: binary.section_count
      min: 4
      max: 4
  - id: high-code-to-data-ratio
    desc: High code-to-data ratio
    crit: notable
    conf: 0.75
    for: [elf]
    size_max: 262144
    if:
      type: metrics
      field: binary.code_to_data_ratio
      min: 20
  - id: large-functions
    desc: Binary contains unusually large functions
    crit: notable
    conf: 0.65
    if:
      type: metrics
      field: binary.huge_functions
      min: 2
  - id: linear-code-ratio
    desc: High ratio of linear functions
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.linear_functions
      min: 1000
  - id: low-average-complexity
    desc: Low average code complexity
    crit: baseline
    conf: 0.75
    if:
      type: metrics
      field: binary.avg_complexity
      max: 3
    unless:
      - type: metrics
        field: binary.function_count
        max: 0
      - id: metadata/binary/resource::managed-resource-stub
  - id: few-sections
    desc: Very few sections (merged/stripped)
    crit: baseline
    conf: 0.6
    if:
      type: metrics
      field: binary.section_count
      max: 3
    unless:
      - id: metadata/binary/resource::managed-resource-stub
      - id: metadata/binary/framework::dotnet-assembly
  - id: no-functions
    desc: Few detected functions (stub-like or analysis-limited)
    crit: baseline
    conf: 0.5
    if:
      type: metrics
      field: binary.function_count
      max: 3
    unless:
      - type: metrics
        field: binary.section_count
        min: 20
      - type: metrics
        field: elf.has_plt
        min: 1
  - id: single-complex-function
    desc: Single function with high complexity (monolithic stub)
    crit: notable
    conf: 0.7
    for: [pe, elf, macho]
    size_max: 1048576
    if:
      type: metrics
      field: binary.function_count
      min: 1
      max: 1
    unless:
      - type: metrics
        field: binary.avg_basic_blocks
        max: 10
      - type: metrics
        field: binary.import_count
        min: 15
      - id: metadata/binary/metrics::many-imports
  - id: few-functions
    desc: Very few functions detected
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.function_count
      max: 10
    unless:
      - type: metrics
        field: binary.function_count
        max: 3
      - type: metrics
        field: binary.section_count
        min: 40
  - id: giant-average-function
    desc: Extremely large average function size
    crit: component
    conf: 0.86
    size_min: 65536
    if:
      type: metrics
      field: binary.avg_function_size
      min: 30000
  - id: dense-basic-blocks
    desc: High basic block count in sparse binary
    crit: component
    conf: 0.84
    size_min: 65536
    if:
      type: metrics
      field: binary.total_basic_blocks
      min: 400
  - id: few-basic-blocks
    desc: Very few basic blocks (analysis-limited or sparse)
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.total_basic_blocks
      min: 1
      max: 10
    unless:
      - id: metadata/binary/resource::managed-resource-stub
      - id: metadata/binary/framework::dotnet-assembly
  - id: few-leaf-functions
    desc: Very few leaf functions (deep)
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.leaf_functions
      min: 1
      max: 5
  - id: no-imports
    desc: No imported symbols
    crit: notable
    conf: 0.7
    for: [pe]
    if:
      type: metrics
      field: binary.import_density
      max: 0
    unless:
      - type: metrics
        field: binary.section_count
        max: 0
      - type: metrics
        field: elf.needed_libs
        min: 1
      - type: basename
        regex: "\\.ni\\.dll$"
      - type: metrics
        field: binary.export_count
        min: 50
      - id: metadata/signed/platform::microsoft
  - id: many-imports
    desc: High number of imported symbols (>80)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: binary.import_count
      min: 80
  - id: many-functions
    desc: Binary has many functions (>30)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: binary.function_count
      min: 30
  - id: minimal-exports
    desc: Binary with very few exports (1-2)
    crit: baseline
    conf: 0.7
    for: [pe]
    if:
      type: exports_count
      min: 1
      max: 2
  - id: many-exports
    desc: Binary has many exports (>10)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: binary.export_count
      min: 10
  - id: dominant-section
    desc: Single section dominates file (packer)
    crit: notable
    conf: 0.6
    platforms: [linux, unix, windows, macos]
    for: [pe, elf, macho]
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.85
    unless:
      - type: basename
        regex: \.mun$
      - type: basename
        regex: \.rll$
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/resource::resource-only-dll
      - type: metrics
        field: binary.export_count
        min: 50
      - id: metadata/vendor/pash::zprotect-plugin
      - type: text
        substr: X3DOM Runtime, http://www.x3dom.org/
  - id: high-import-density
    desc: High import density (>3 imports/KB)
    crit: baseline
    conf: 0.8
    for: [pe]
    if:
      type: metrics
      field: binary.import_density
      min: 3.0
  - id: near-zero-strings
    desc: Binary with almost no readable strings
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: binary.string_count
      max: 5
      min_size: 512
composite_rules:
  - id: monolithic-import-heavy-binary
    desc: Sparse binary with one giant imported routine
    crit: suspicious
    conf: 0.9
    for: [pe, elf, macho]
    all:
      - id: no-functions
      - id: giant-average-function
      - id: dense-basic-blocks
    any:
      - id: many-imports
      - id: high-import-density
    downgrade:
      any:
        - id: large-four-section-pe
        - id: massive-executable
  - id: small-pe
    desc: Small PE binary (<100KB)
    crit: baseline
    conf: 0.6
    for: [pe]
    size_max: 102400
  - id: large-four-section-pe
    desc: Large PE with four standard sections
    crit: notable
    conf: 0.82
    for: [pe]
    all:
      - id: large-executable
      - id: four-section-pe
  - id: small-dll-heavy-imports
    desc: Small DLL with disproportionate import surface
    crit: notable
    conf: 0.8
    for: [dll]
    all:
      - id: high-import-density
      - id: many-imports
      - id: minimal-exports
