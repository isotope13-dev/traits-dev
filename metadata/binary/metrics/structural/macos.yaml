defaults:
  for:
    - macho
  platforms:
    - macos
    - ios
traits:
  - id: macho-sparse-cstring-section
    desc: Sparse Mach-O __cstring section
    crit: notable
    conf: 0.8
    size_min: 100000
    size_max: 5242880
    if:
      type: section
      regex: __cstring
      compare_to: total
      size_ratio_min: 0.0000001
      size_ratio_max: 0.002
    not:
      - regex: \.cpython-\d+-darwin\.so$
      - regex: '\.a$'

  - id: minimal-string-count
    desc: Minimal extracted string count
    crit: notable
    conf: 0.75
    size_min: 100000
    if:
      id: metadata/binary/anomaly/format::minimal-string-count
  - id: extreme-minimal-strings
    desc: Extremely minimal string count
    crit: suspicious
    conf: 0.85
    size_min: 100000
    if:
      type: metrics
      field: binary.string_count
      max: 20
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    unless:
      - type: metrics
        field: functions.count
        min: 100
      - type: metrics
        field: exports.count
        min: 4
  - id: text-dominates-cstring
    desc: Code section dominates string section
    crit: suspicious
    conf: 0.8
    if:
      type: section
      regex: __text
      compare_to: __cstring
      size_ratio_min: 500
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: exports.count
        min: 4
      - type: metrics
        field: binary.string_count
        min: 3000
      - type: metrics
        field: exports.count
        min: 20
      - type: metrics
        field: macho.function_starts_count
        min: 100
      - type: basename
        regex: \.cpython-\d+-darwin\.so$
  - id: extreme-text-to-string-ratio
    desc: Extreme code-to-string ratio
    crit: suspicious
    conf: 0.9
    if:
      type: section
      regex: __text
      compare_to: __cstring
      size_ratio_min: 1000
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: exports.count
        min: 4
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: basename
        regex: \.cpython-\d+-darwin\.so$
  - id: data-larger-than-cstring
    desc: Data section larger than strings
    crit: notable
    conf: 0.7
    if:
      id: metadata/binary/anomaly/format::data-larger-than-cstring
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 1000
  - id: large-data-section-ratio
    desc: Large Mach-O data section ratio
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: binary.data_to_file_ratio
      min: 0.03
  - id: data-dominates-cstring
    desc: Data section dominates string section
    crit: suspicious
    conf: 0.85
    if:
      type: section
      regex: __data
      compare_to: __cstring
      size_ratio_min: 200
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: text
        substr: PAR_TEMP
  - id: high-avg-string-entropy
    desc: High average string entropy
    crit: suspicious
    conf: 0.8
    if:
      id: metadata/binary/anomaly/format::high-avg-string-entropy
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: low-function-density
    desc: Low function count for binary size
    crit: notable
    conf: 0.65
    size_min: 100000
    if:
      id: metadata/binary/anomaly/format::low-function-density
    unless:
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: metrics
        field: macho.slice_count
        min: 2
