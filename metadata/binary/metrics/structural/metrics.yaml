defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
traits:
  # ELF type is exposed as the string value `elf.type` ("relocatable"/"exe"/
  # "dyn"/"core"), not a numeric `elf.e_type` metric — the previous metrics query
  # never matched any binary, leaving this (and every benign-context that uses it
  # to exempt eBPF/.o objects) dead. Query the actual value fact.
  - id: elf-relocatable-object
    desc: ELF relocatable object file
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: value
      path: elf.type
      exact: relocatable

  - id: sentence-strings-20-plus
    desc: Binary has 20+ sentence strings
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: binary.sentence_string_count
      min: 20

  - id: sentence-string-dominant
    desc: Strings almost entirely natural-language
    crit: notable
    conf: 0.9
    size_min: 1000000
    if:
      type: metrics
      field: binary.sentence_string_ratio
      min: 0.9

  - id: high-entropy-cstring
    desc: __cstring section entropy at least 4.5
    crit: baseline
    platforms: [macos]
    for: [macho]
    if:
      type: section
      substr: __cstring
      entropy_min: 4.5
    unless:
      - id: metadata/library/sage-math/

  - id: high-code-entropy
    desc: Binary code section entropy at least 7.0
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: binary.code_entropy
      min: 7.0
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/package/files/system-package::jvm-bundled-native-dependency
      - id: metadata/binary/metrics/entropy::dotnet-normal-entropy-profile
  - id: mips-high-overall-entropy
    desc: MIPS binary overall entropy at least 7.8
    crit: notable
    conf: 0.95
    platforms: [linux]
    for: [elf]
    arch: [mips]
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.8
  - id: small-elf-binary
    desc: Small ELF binary (< 50KB)
    crit: baseline
    conf: 0.6
    for: [elf]
    size_max: 51200
  - id: four-section-pe
    desc: PE with exactly four sections
    crit: component
    conf: 0.8
    for: [pe]
    if:
      type: metrics
      field: sections.count
      min: 4
      max: 4
  - id: pe-code-entropy-78
    desc: PE code section entropy at least 7.8
    crit: notable
    conf: 0.95
    for: [pe]
    if:
      type: metrics
      field: binary.code_entropy
      min: 7.8
  - id: pe-overall-entropy-78
    desc: PE overall entropy at least 7.8
    crit: notable
    conf: 0.95
    for: [pe]
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.8
  - id: pe-near-total-code-data
    desc: PE code-to-data ratio at least 0.99
    crit: notable
    conf: 0.94
    for: [pe]
    if:
      type: metrics
      field: binary.code_to_data_ratio
      min: 0.99
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: pe-short-readable-strings
    desc: PE max readable string length <=40
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: metrics
      field: binary.max_string_length
      max: 40
  - id: pe-sparse-import-table
    desc: PE has between one and ten imports
    crit: component
    conf: 0.85
    for: [pe]
    if:
      type: metrics
      field: imports.count
      min: 1
      max: 10
  - id: high-code-to-data-ratio
    desc: High code-to-data ratio
    crit: notable
    conf: 0.75
    for: [elf]
    size_max: 262144
    if:
      type: metrics
      field: binary.code_to_data_ratio
      min: 20
  - id: large-functions
    desc: Function with a 50+ block control-flow graph
    crit: notable
    conf: 0.65
    if:
      type: metrics
      field: binary.huge_func_count
      min: 1
  - id: many-huge-functions
    desc: 4+ functions with 50+ block control-flow graphs
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: binary.huge_func_count
      min: 4
  - id: very-high-section-count
    desc: Binary contains at least 200 sections
    crit: notable
    conf: 0.75
    if:
      type: metrics
      field: sections.count
      min: 200
  - id: linear-code-ratio
    desc: High ratio of linear functions
    crit: baseline
    conf: 0.4
    if:
      type: metrics
      field: binary.linear_func_count
      min: 1000
  - id: low-average-complexity
    desc: Low average code complexity
    crit: baseline
    conf: 0.75
    if:
      type: metrics
      field: binary.avg_complexity
      max: 3
    unless:
      - type: metrics
        field: functions.count
        max: 0
      - id: metadata/binary/resource/
  - id: few-sections
    desc: Very few sections (merged/stripped)
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: sections.count
      max: 3
    unless:
      - id: metadata/binary/resource/
      - id: metadata/binary/framework/
      - id: metadata/binary/framework::dotnet-metadata

  - id: single-section-pe
    desc: PE contains exactly one section
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: metrics
      field: sections.count
      min: 1
      max: 1

  - id: reloc-overhang-ratio-high
    desc: Reloc section mostly padding
    crit: component
    conf: 0.9
    for: [pe, dll]
    if:
      type: metrics
      field: pe.reloc_overhang_ratio
      min: 0.5
    unless:
      # A managed PE normally has one tiny relocation fixup padded to file
      # alignment; the ratio alone is not a packed-payload observation.
      - id: metadata/binary/framework/
  - id: pe-version-identity-nondegenerate-entropy
    desc: High-entropy PE version identity
    crit: component
    conf: 0.6
    for: [pe, dll]
    if:
      type: metrics
      field: pe.version.identity_entropy
      min: 3.5
  - id: no-functions
    desc: Detects no more than three functions
    crit: baseline
    conf: 0.5
    if:
      type: metrics
      field: functions.count
      max: 3
    unless:
      - type: metrics
        field: sections.count
        min: 20
      - type: metrics
        field: elf.has_plt
        min: 1
  - id: single-complex-function
    desc: "Single func with high complexity"
    crit: notable
    conf: 0.7
    for: [pe, elf, macho]
    size_max: 1048576
    if:
      type: metrics
      field: functions.count
      min: 1
      max: 1
    unless:
      - type: metrics
        field: binary.avg_basic_blocks
        max: 10
      - type: metrics
        field: imports.count
        min: 15
      - id: metadata/binary/metrics/structural::many-imports
  - id: few-functions
    desc: Very few functions detected
    crit: notable
    conf: 0.4
    # Function-recovery sparsity is meaningful for native executables and
    # shared objects, but ordinary Java class files commonly have only a few
    # methods.  Keep this heuristic out of JVM bytecode and archive wrappers.
    for: [elf, macho, pe, dll, so, dylib]
    if:
      type: metrics
      field: functions.count
      max: 10
    unless:
      - type: metrics
        field: functions.count
        max: 3
      - type: metrics
        field: sections.count
        min: 40
  - id: giant-average-function
    desc: Extremely large average function size
    crit: component
    conf: 0.86
    size_min: 65536
    if:
      type: metrics
      field: binary.avg_func_size
      min: 30000
  - id: dense-basic-blocks
    desc: High basic block count in sparse binary
    crit: component
    conf: 0.84
    size_min: 65536
    if:
      type: metrics
      field: binary.total_basic_blocks
      min: 400
  - id: few-basic-blocks
    desc: "Very few basic blocks"
    crit: notable
    conf: 0.4
    if:
      type: metrics
      field: binary.total_basic_blocks
      min: 1
      max: 10
    unless:
      - id: metadata/binary/resource/
      - id: metadata/binary/framework/
  - id: few-leaf-functions
    desc: Binary has very few leaf functions
    crit: notable
    conf: 0.4
    if:
      type: metrics
      field: binary.leaf_func_count
      min: 1
      max: 5
  - id: no-imports
    desc: PE has no imported DLL dependencies
    crit: notable
    conf: 0.7
    for: [pe]
    if:
      type: metrics
      field: dependencies.count
      max: 0
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - type: metrics
        field: sections.count
        max: 0
      - type: metrics
        field: dependencies.count
        min: 1
      - type: basename
        regex: "\\.ni\\.dll$"
      - type: metrics
        field: exports.count
        min: 50
      - id: metadata/binary/metrics/structural::section-exceeds-file-size
  - id: many-imports
    desc: High number of imported symbols (>80)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: imports.count
      min: 80
  - id: many-functions
    desc: Binary has many functions (>30)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: functions.count
      min: 30
  - id: minimal-exports
    desc: Binary with very few exports (1-2)
    crit: notable
    conf: 0.7
    for: [pe]
    if:
      type: metrics
      field: exports.count
      min: 1
      max: 2
    unless:
      # A Node-API addon normally exposes only napi_register_module_v*.
      - id: metadata/binary/framework::node-api-addon-export
      # A CPython extension normally exports only its PyInit entry point.
      - id: metadata/lang/compiler/native::python-msvc-extension
  - id: many-exports
    desc: Binary has many exports (>10)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: exports.count
      min: 10
  - id: normal-code-entropy
    desc: Binary code entropy above 5.5
    crit: baseline
    conf: 0.8
    for: [pe]
    if:
      type: metrics
      field: binary.code_entropy
      min: 5.5
  - id: dominant-section
    desc: Single section dominates binary layout
    crit: notable
    conf: 0.6
    for: [pe, elf, macho]
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.95
    unless:
      - type: basename
        regex: \.(mun|rll)$
      # Single-section dominance is structurally normal for a .NET assembly —
      # the IL, metadata, and managed resources all live in one .text section
      # (ratio ~0.997), so this is never a packing signal there. Guard on
      # dotnet-metadata (BSJB in .text), which fires on every real managed
      # assembly; the previous guard dotnet-assembly under-fires on managed PEs
      # (two of its legs match in `section: rdata`, which .NET PEs lack).
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/resource/
      - type: metrics
        field: exports.count
        min: 50
      - id: metadata/binary/metrics/structural/
      - id: metadata/binary/metrics/structural::section-exceeds-file-size
  - id: malformed-pe-structure
    desc: PE with malformed section layout
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: metrics
      field: parse.error_count
      min: 1
    unless:
      - id: metadata/binary/vendor::bitdefender-product-marker
      - id: metadata/binary/installer/family/
      - id: metadata/binary/metrics/structural::section-exceeds-file-size
  - id: section-exceeds-file-size
    desc: 'PE section declared larger than file'
    crit: component
    conf: 0.95
    for: [pe, dll]
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 1.0
    unless:
      - id: metadata/lang/compiler/systems::go-pe-binary-context
  - id: pe-section-overflow-present
    desc: PE section extends beyond file
    crit: notable
    conf: 0.9
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    for: [pe, dll]
    if:
      type: metrics
      field: pe.section_overflow_count
      min: 1
    unless:
      - id: metadata/lang/compiler/systems::go-pe-binary-context
  - id: multiple-pe-section-overflows
    desc: Multiple PE sections extend beyond file
    crit: notable
    conf: 0.9
    for: [pe, dll]
    if:
      type: metrics
      field: pe.section_overflow_count
      min: 2
    unless:
      - id: metadata/lang/compiler/systems::go-pe-binary-context
  - id: pe-relocation-table-overhang
    desc: PE relocation table extends beyond file
    crit: notable
    conf: 0.9
    for: [pe, dll]
    if:
      type: metrics
      field: pe.reloc_overhang_ratio
      min: 1
    unless:
      - id: metadata/lang/compiler/systems::go-pe-binary-context
  - id: embedded-pe-multi
    desc: PE contains 2+ embedded PE binaries
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: metrics
      field: binary.embedded_binary_count
      min: 2
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/sfx/
      - id: metadata/binary/framework/
  - id: embedded-pe-three-plus
    desc: PE contains 3+ embedded PE binaries
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: metrics
      field: binary.embedded_binary_count
      min: 3
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/sfx/
      - id: metadata/binary/framework/
  - id: high-import-density
    desc: Dense PE import table references
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: metrics
      field: binary.import_density
      min: 3.0
  - id: near-zero-strings
    desc: Binary with almost no readable strings
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: binary.string_count
      max: 5
      min_size: 512
  - id: high-max-complexity
    desc: High maximum function complexity
    crit: component
    conf: 0.6
    if:
      type: metrics
      field: binary.max_complexity
      min: 300
    unless:
      - id: metadata/binary/framework/
      - id: objectives/anti-static/obfuscation/binary-metrics/shape/
      - type: metrics
        field: functions.count
        max: 20
      - type: metrics
        field: exports.count
        min: 100
    downgrade:
      any:
        - type: metrics
          field: functions.count
          min: 1000
  - id: extreme-max-complexity
    desc: Extremely high max function complexity
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: binary.max_complexity
      min: 500
    unless:
      - id: metadata/binary/framework/
      - id: objectives/anti-static/obfuscation/binary-metrics/shape/
      - type: metrics
        field: functions.count
        max: 20
      - type: metrics
        field: exports.count
        min: 100
    downgrade:
      any:
        - type: metrics
          field: functions.count
          min: 1000
  - id: help-usage-string
    desc: CLI help or usage text
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: "Try '%s --help'"
  - id: elf64-class
    desc: ELF64 class marker
    crit: component
    conf: 1.0
    platforms: [unix, android]
    for: [elf]
    if:
      type: metrics
      field: elf.class_bits
      min: 64
      max: 64
  - id: high-entropy-data
    desc: High entropy in data section
    crit: component
    conf: 0.6
    for: [elf, pe]
    if:
      type: section
      regex: \.(data|rdata|rodata)
      entropy_min: 7.5
    unless:
      - id: metadata/package/quality/
    downgrade:
      any:
        - type: text
          substr: Qt6Core.dll
        - id: metadata/binary/metrics/structural::many-imports
        - id: objectives/anti-static/pack/detect::aspack-marker
  - id: low-overall-entropy-large-elf
    desc: Large ELF with low overall entropy
    crit: baseline
    conf: 0.9
    for: [elf]
    size_min: 200000
    if:
      type: metrics
      field: binary.overall_entropy
      max: 4.5
  - id: many-strings-large-elf
    desc: Large ELF with 500+ strings
    crit: baseline
    conf: 0.9
    for: [elf]
    size_min: 200000
    if:
      type: metrics
      field: binary.string_count
      min: 500
composite_rules:
  - id: rust-native-export-library
    desc: Large Rust native library with many exports
    crit: notable
    conf: 0.9
    all:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: many-exports
      - id: metadata/lang/compiler/aot::native-runtime-large-file
    unless:
      - id: metadata/binary/section/name::bun-section-name
  - id: dominant-section-benign-build-context
    desc: Benign dominant-section build context
    crit: baseline
    conf: 0.85
    any:
      - id: metadata/package/quality/false-positives::common-fp-context
      - id: metadata/binary/layout::rust-node-api-native-addon
  - id: monolithic-import-heavy-binary
    desc: Sparse binary with one giant imported routine
    crit: suspicious
    conf: 0.9
    for: [pe, elf, macho]
    all:
      - id: no-functions
      - id: giant-average-function
      - id: dense-basic-blocks
    any:
      - id: many-imports
      - id: high-import-density
    downgrade:
      any:
        - id: metadata/binary/metrics/structural/
        - id: metadata/binary/metrics/size::massive-executable
        - id: metadata/binary/installer/family/
        - id: metadata/binary/installer/sfx/
  - id: small-pe
    desc: Small PE binary (<100KB)
    crit: notable
    conf: 0.6
    for: [pe]
    size_max: 102400
  - id: large-four-section-pe
    desc: Large PE with four standard sections
    crit: notable
    conf: 0.82
    for: [pe]
    all:
      - id: metadata/binary/metrics/size::large-file-1mb
      - id: four-section-pe
  - id: small-dll-heavy-imports
    desc: Small DLL with disproportionate import surface
    crit: notable
    conf: 0.8
    for: [dll]
    all:
      - id: high-import-density
      - id: many-imports
      - id: minimal-exports
  - id: sparse-functions
    desc: Very few or no functions detected (<=10)
    crit: notable
    conf: 0.5
    # Few recovered functions is only anomalous in a substantial binary, where it
    # signals packing/obfuscation (the code exists but the disassembler cannot
    # carve functions from it). In a small stub, class, or hand-written program,
    # a handful of functions is normal, so gate the notable promotion by size and
    # leave tiny files to the baseline `no-functions` observation.
    size_min: 65536
    any:
      - id: no-functions
      - id: few-functions
  - id: sparse-logic-base
    desc: Indicators of legitimate sparse code (object files, few functions, etc.)
    crit: baseline
    conf: 0.5
    any:
      - id: sparse-functions
      - id: metadata/binary/layout::macho-object-file
      - id: metadata/binary/metrics/structural::no-imports
