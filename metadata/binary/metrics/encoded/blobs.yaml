# Detection for large contiguous data blobs in scripts
# Indicates likely encoded payload storage
defaults:
  platforms: [windows, unix]
  for: [powershell, javascript, python, shell]
  crit: notable
  conf: 0.9
traits:
  - id: large-embedded-b64-blob
    desc: Very long embedded data line
    size_min: 100000
    if:
      type: metrics
      field: text.max_line_length
      min: 136536
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
