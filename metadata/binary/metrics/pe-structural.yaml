defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: many-aliased-exports
    desc: Binary has many aliased exports
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: binary.aliased_exports
      min: 100
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/signed/platform::microsoft

  - id: many-nonstandard-sections
    desc: Binary has many nonstandard section names
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: binary.nonstandard_section_name_count
      min: 5
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft

  - id: high-sentence-string-ratio
    desc: High ratio of sentence-like strings
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: binary.sentence_string_ratio
      min: 0.2
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime

composite_rules:
  - id: suspicious-import-combo-massive
    desc: Massive binary with suspicious import combination
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/metrics::massive-executable
      - id: metadata/binary/metrics::suspicious-import-combo-marker
    unless:
      - id: metadata/signed/platform::microsoft
