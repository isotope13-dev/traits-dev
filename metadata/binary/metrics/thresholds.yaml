defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: many-exports-200
    desc: Binary has 200+ exports (large library)
    crit: component
    if:
      type: metrics
      field: binary.export_count
      min: 200
  - id: many-exports-100
    desc: Binary has 100+ exports
    crit: component
    if:
      type: metrics
      field: binary.export_count
      min: 100
  - id: many-exports-20
    desc: Binary has 20+ exports
    crit: component
    if:
      type: metrics
      field: binary.export_count
      min: 20
  - id: many-exports-9
    desc: Binary has 9+ exports
    crit: component
    if:
      type: metrics
      field: binary.export_count
      min: 9
  - id: many-imports-100
    desc: Binary has 100+ imports
    crit: component
    if:
      type: metrics
      field: binary.import_count
      min: 100
  - id: many-imports-50
    desc: Binary has 50+ imports
    crit: component
    if:
      type: metrics
      field: binary.import_count
      min: 50
  - id: many-imports-40
    desc: Binary has 40+ imports
    crit: component
    if:
      type: metrics
      field: binary.import_count
      min: 40
  - id: many-imports-30
    desc: Binary has 30+ imports
    crit: component
    if:
      type: metrics
      field: binary.import_count
      min: 30
  - id: many-imports-25
    desc: Binary has 25+ imports
    crit: component
    if:
      type: metrics
      field: binary.import_count
      min: 25
  - id: many-imports-20
    desc: Binary has 20+ imports
    crit: component
    if:
      type: metrics
      field: binary.import_count
      min: 20
  - id: many-sections-20
    desc: Binary has 20+ sections (installer/packer)
    crit: component
    if:
      type: metrics
      field: binary.section_count
      min: 20
  - id: many-strings-2000
    desc: Binary has 2000+ strings
    crit: component
    if:
      type: metrics
      field: binary.string_count
      min: 2000
  - id: many-functions-5000
    desc: Binary has 5000+ functions
    crit: component
    if:
      type: metrics
      field: binary.function_count
      min: 5000
  - id: many-functions-50
    desc: Binary has 50+ functions
    crit: component
    if:
      type: metrics
      field: binary.function_count
      min: 50
  - id: few-functions-3
    desc: Binary has 3+ functions
    crit: component
    if:
      type: metrics
      field: binary.function_count
      min: 3
  - id: large-binary-500k
    desc: Binary is 500KB+
    crit: component
    if:
      type: metrics
      field: binary.file_size
      min: 500000
  - id: avg-complexity-15-max
    desc: Binary has low average complexity
    crit: baseline
    conf: 1.0
    if:
      type: metrics
      field: binary.avg_complexity
      max: 15
  - id: avg-string-entropy-4-max
    desc: Binary has low average string entropy
    crit: baseline
    conf: 1.0
    if:
      type: metrics
      field: binary.avg_string_entropy
      max: 4.0
  - id: string-count-1000-plus
    desc: Binary has 1000 or more strings
    crit: baseline
    conf: 1.0
    if:
      type: metrics
      field: binary.string_count
      min: 1000
  - id: high-function-count-200
    desc: High function count over 200
    crit: baseline
    conf: 0.7
    if:
      type: metrics
      field: binary.function_count
      min: 200
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: high-string-count-1000
    desc: High string count over 1000
    crit: baseline
    conf: 0.7
    if:
      type: metrics
      field: binary.string_count
      min: 1000
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: low-overall-entropy-binary
    desc: Binary has low overall entropy
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.overall_entropy
      max: 5.0
  - id: dotnet-binary
    desc: .NET binary (PE with BSJB metadata)
    crit: component
    if:
      type: metrics
      field: pe.is_dotnet
      min: 1
