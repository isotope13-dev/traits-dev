defaults:
  for:
    - macho
  platforms:
    - macos
    - ios
traits:
  - id: minimal-string-count
    desc: Minimal extracted string count
    crit: notable
    conf: 0.75
    size_min: 100000
    if:
      type: metrics
      field: binary.string_count
      max: 50
  - id: extreme-minimal-strings
    desc: Extremely minimal string count
    crit: suspicious
    conf: 0.85
    size_min: 100000
    if:
      type: metrics
      field: binary.string_count
      max: 20
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    unless:
      - type: metrics
        field: binary.function_count
        min: 100
      - type: metrics
        field: binary.export_count
        min: 4
  - id: text-dominates-cstring
    desc: Code section dominates string section
    crit: suspicious
    conf: 0.8
    if:
      type: section_ratio
      section: __text
      compare_to: __cstring
      min: 500
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.export_count
        min: 4
      - type: metrics
        field: binary.string_count
        min: 3000
      - type: metrics
        field: binary.export_count
        min: 20
      - type: basename
        regex: \.cpython-\d+-darwin\.so$
  - id: extreme-text-to-string-ratio
    desc: Extreme code-to-string ratio
    crit: suspicious
    conf: 0.9
    if:
      type: section_ratio
      section: __text
      compare_to: __cstring
      min: 1000
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.export_count
        min: 4
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: basename
        regex: \.cpython-\d+-darwin\.so$
  - id: data-larger-than-cstring
    desc: Data section larger than strings
    crit: notable
    conf: 0.7
    if:
      type: section_ratio
      section: __data
      compare_to: __cstring
      min: 50
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 1000
  - id: data-dominates-cstring
    desc: Data section dominates string section
    crit: suspicious
    conf: 0.85
    if:
      type: section_ratio
      section: __data
      compare_to: __cstring
      min: 200
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: text
        substr: PAR_TEMP
  - id: high-avg-string-entropy
    desc: High average string entropy
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: binary.avg_string_entropy
      min: 4.5
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: no-sentence-strings
    desc: No sentence-like strings retained
    crit: notable
    conf: 0.75
    if:
      type: metrics
      field: binary.sentence_string_count
      max: 0
  - id: sparse-sentence-string-ratio
    desc: Very low sentence-like string ratio
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: binary.sentence_string_ratio
      max: 0.05
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 500
  - id: high-behavioral-import-ratio
    desc: Operational imports dominate import table
    crit: suspicious
    conf: 0.88
    if:
      type: metrics
      field: binary.behavioral_import_ratio
      min: 0.35
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.import_count
        min: 80
  - id: clustered-string-lengths
    desc: Narrow retained string-length distribution
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: binary.string_length_stddev
      max: 12
    unless:
      - type: metrics
        field: binary.string_count
        max: 5
      - type: metrics
        field: binary.string_count
        min: 500
  - id: nonstandard-section-names
    desc: Nonstandard section names present
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: binary.nonstandard_section_name_count
      min: 2
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: low-function-density
    desc: Low function count for binary size
    crit: notable
    conf: 0.65
    size_min: 100000
    if:
      type: metrics
      field: binary.function_count
      max: 20
    unless:
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: metrics
        field: macho.slice_count
        min: 2
  - id: high-avg-function-complexity
    desc: High average function complexity
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: binary.avg_complexity
      min: 50
