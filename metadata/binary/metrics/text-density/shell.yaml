defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: notable
  conf: 0.8
traits:
  - id: high-suspicious-string-ratio
    desc: High ratio of suspicious strings
    # Ratios from tiny wrappers are unstable: two command strings can make a
    # normal build helper look suspicious. Require enough source for this
    # heuristic to carry meaningful signal.
    size_min: 4096
    unless:
      - type: basename
        regex: '\.typ$'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/files/system-package::shell-completion-script
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
      - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-authors-shell
      - id: metadata/file/format::sourcemap-sources-content
    if:
      type: metrics
      field: "text.suspicious_string_ratio"
      min: 0.3
  - id: shell-high-import-density
    desc: High density of shell commands
    crit: baseline
    size_max: 1048576
    unless:
      - type: text
        substr: CURLOPT
      - id: metadata/library/python-runtime::python-runtime
    if:
      type: metrics
      field: "text.import_density"
      min: 20
