defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: notable
  conf: 0.8
traits:
  - id: high-suspicious-string-ratio
    desc: High ratio of suspicious strings
    size_min: 1024
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/tool/sysadmin/repo-maintenance::git-operations-1
      - id: well-known/tool/sysadmin/repo-maintenance::git-operations-2
    if:
      type: metrics
      field: "text.suspicious_string_ratio"
      min: 0.3
  - id: shell-high-import-density
    desc: High density of shell commands
    crit: baseline
    size_max: 1048576
    unless:
      - type: text
        substr: CURLOPT
      - id: metadata/library/python-runtime::python-runtime
    if:
      type: metrics
      field: "text.import_density"
      min: 20
