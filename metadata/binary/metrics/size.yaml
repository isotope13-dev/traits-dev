defaults:
  for: [source]
  platforms:
    - unix
    - windows
traits:
  - id: large-binary-1mb
    desc: Binary file larger than 1MB
    crit: baseline
    for: [binaries]
    size_min: 1048576
  - id: large-source-file-4mb
    desc: Source file larger than 4MB
    crit: baseline
    size_min: 4194304
