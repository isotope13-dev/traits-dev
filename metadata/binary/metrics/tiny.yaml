# Tiny Binary Features
# Detects unusually small or stripped binaries often associated with stagers
defaults:
  for: [elf]
  crit: notable
traits:
  - id: tiny-elf
    desc: "Tiny ELF binary (< 4KB)"
    platforms: [unix, android]
    size_max: 4096
    if:
      type: metrics
      field: elf.class_bits
      min: 1
  - id: micro-elf
    desc: "Micro ELF binary (< 1KB)"
    crit: notable
    platforms: [unix, android]
    size_max: 1024
    if:
      type: metrics
      field: elf.class_bits
      min: 1
  - id: text-section-ratio-dominant
    desc: ".text section is >75% of"
    platforms: [unix]
    size_max: 51200
    if:
      type: section
      regex: "\\.text"
      compare_to: total
      ratio_min: 0.75

  - id: tiny-pe
    desc: "Tiny PE binary (< 8KB)"
    platforms: [windows]
    size_max: 8192
    for: [pe]
    if:
      type: metrics
      field: pe.machine
      min: 1

  - id: tiny-dotnet
    desc: "Tiny .NET assembly (< 8KB)"
    platforms: [windows]
    size_max: 8192
    for: [pe]
    if:
      type: metrics
      field: pe.is_dotnet
      min: 1
