defaults:
  platforms: [windows, linux, macos]
  for: [binaries]

traits:
  - id: code-entropy-at-most-7-5
    desc: Code entropy is 7.5 or lower
    crit: component
    conf: 0.7
    for: [pe]
    if:
      type: metrics
      field: binary.code_entropy
      max: 7.5

composite_rules:
  - id: dotnet-normal-entropy-profile
    desc: .NET assembly with code entropy below 7.5
    crit: component
    conf: 0.7
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: code-entropy-at-most-7-5
