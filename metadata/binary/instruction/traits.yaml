defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: indirect-call-reg
    desc: Indirect call via register
    crit: baseline
    conf: 0.3
    count_min: 50
    size_max: 10485760
    if:
      type: hex
      pattern: FF D?
      section: .text
  - id: indirect-call-mem
    desc: Indirect call via memory
    crit: baseline
    conf: 0.3
    count_min: 50
    size_max: 10485760
    if:
      type: hex
      pattern: FF 1?
      section: .text
  - id: cpuid-instr
    desc: CPUID instruction bytes
    crit: baseline
    conf: 0.3
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 0F A2
  - id: xgetbv-instr
    desc: XGETBV instruction bytes
    crit: baseline
    conf: 0.3
    count_min: 1
    size_max: 10485760
    if:
      type: hex
      section: .text
      pattern: 0F 01 D0
  - id: nop-padding-run
    desc: Repeated NOP padding in text section
    crit: baseline
    conf: 0.65
    count_min: 4
    size_max: 1000000
    if:
      type: hex
      section: .text
      pattern: 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90
  - id: dense-x86-mul-instructions
    desc: Dense x86 multiplication instructions in code
    crit: notable
    conf: 0.88
    for: [pe, dll]
    platforms: [windows]
    arch: [x86]
    count_min: 12
    if:
      type: hex
      section: .text
      pattern: 'F7 E3 89'
composite_rules:
  - id: cpuid-fingerprinting
    desc: CPUID feature detection
    crit: baseline
    conf: 0.4
    all:
      - id: cpuid-instr
      - id: xgetbv-instr
