defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: linux-kernel-gpl2-spdx-header
    desc: Linux kernel GPL-2.0 SPDX header
    crit: baseline
    conf: 0.99
    for: [c, cpp, elf]
    if:
      type: text
      substr: "SPDX-License-Identifier: GPL-2.0"
  - id: fsf-copyright
    desc: 'Free Software Foundation copyright'
    crit: notable
    if:
      type: text
      substr: Free Software Foundation, Inc.
      section: .text
