defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: export-dll-can-unload-now
    desc: COM unload export present
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllCanUnloadNow
  - id: export-dll-get-class-object
    desc: COM class factory export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllGetClassObject
  - id: export-dll-register-server
    desc: COM registration export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllRegisterServer
  - id: export-dll-unregister-server
    desc: COM unregistration export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllUnregisterServer
  - id: has-exports
    desc: Binary exports symbols
    crit: component
    conf: 0.5
    platforms: [linux]
    for: [elf, so]
    if:
      type: metrics
      field: binary.export_count
      min: 1
  - id: no-exports
    desc: Binary exports no symbols
    crit: component
    conf: 0.75
    if:
      type: metrics
      field: binary.export_count
      max: 0
  - id: single-export
    desc: Binary exports one symbol
    crit: component
    conf: 0.75
    if:
      type: metrics
      field: binary.export_count
      min: 1
      max: 1
  - id: short-lowercase-export-name
    desc: Short lowercase export name
    crit: component
    conf: 0.72
    if:
      type: symbol
      kind: export
      regex: '^[a-z]{5,12}$'
  - id: tc-open-archive-export
    desc: Total Commander archive export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: OpenArchive
  - id: tc-read-header-export
    desc: Total Commander header export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: ReadHeader
  - id: tc-pack-files-export
    desc: Total Commander pack export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: PackFiles
  - id: tc-packer-caps-export
    desc: Total Commander capability export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: GetPackerCaps
  - id: itanium-mangled-export-no-underscore
    desc: Itanium C++ ABI mangled export
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      kind: export
      regex: '^Z[0-9]{1,3}[A-Za-z_][A-Za-z0-9_]*$'
composite_rules:
  - id: standard-com-server-exports
    desc: Standard COM server export set
    crit: baseline
    conf: 0.95
    all:
      - id: export-dll-can-unload-now
      - id: export-dll-get-class-object
      - id: export-dll-register-server
      - id: export-dll-unregister-server
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-9
  - id: total-commander-packer-plugin
    desc: Total Commander packer plugin
    crit: baseline
    conf: 0.98
    all:
      - id: tc-open-archive-export
      - id: tc-read-header-export
      - id: tc-pack-files-export
      - id: tc-packer-caps-export
  - id: single-short-lowercase-export
    desc: Single short lowercase export
    crit: notable
    conf: 0.82
    all:
      - id: single-export
      - id: short-lowercase-export-name
    unless:
      - id: standard-com-server-exports
      - id: total-commander-packer-plugin
