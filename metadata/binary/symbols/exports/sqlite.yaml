defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: sqlite-original-filename
    desc: PE claims sqlite DLL filename
    crit: component
    conf: 0.95
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    if:
      type: value
      path: pe.version.original_filename
      regex: (?i)^sqlite\.dll$

  - id: sqlite3-api-text-surface
    desc: SQLite API export name surface
    crit: component
    conf: 0.9
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    count_min: 24
    if:
      type: text
      section: .edata
      regex: '^sqlite3_[a-z0-9_]+$'

  - id: sqlite-private-prefixed-exports
    desc: Private sqlite-prefixed export surface
    crit: suspicious
    conf: 0.94
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    count_min: 12
    if:
      type: text
      section: .edata
      regex: '^_sqlite_(base|core|do|impl|internal|priv|raw)_[a-z0-9_]+$'

composite_rules:
  - id: sqlite-api-with-private-wrapper-exports
    desc: SQLite export surface includes private wrappers
    crit: suspicious
    conf: 0.95
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    all:
      - id: sqlite-original-filename
      - id: sqlite3-api-text-surface
      - id: sqlite-private-prefixed-exports
    unless:
      - id: well-known/lib/sqlite/
