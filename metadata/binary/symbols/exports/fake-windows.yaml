defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: sideload-export-csrconnectpermissionex
    desc: Fake CsrConnectPermissionEx export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^CsrConnectPermissionEx(@\d+)?$
  - id: sideload-export-dllupdate
    desc: Fake DllUpdate export
    crit: component
    conf: 0.96
    if:
      type: symbol
      kind: export
      regex: ^DllUpdate(@\d+)?$
  - id: sideload-export-iomgetpermissiona
    desc: Fake IomGetPermissionA export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^IomGetPermissionA(@\d+)?$
  - id: sideload-export-ksecinitializenamespaceinfo
    desc: Fake KsecInitializeNamespaceInfo export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: KsecInitializeNamespaceInfo
  - id: sideload-export-pfxsuspendpermission
    desc: Fake PfxSuspendPermission export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: PfxSuspendPermission
composite_rules:
  - id: internal-security-export-masquerade
    desc: Internal security export masquerade
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/binary/symbols::sideload-export-cluster-size-5-10
      - id: metadata/signed::unsigned
    any:
      - id: sideload-export-csrconnectpermissionex
      - id: sideload-export-dllupdate
      - id: sideload-export-iomgetpermissiona
      - id: sideload-export-ksecinitializenamespaceinfo
      - id: sideload-export-pfxsuspendpermission
    needs: 3
    unless:
      - id: metadata/binary/symbols::standard-com-server-exports
