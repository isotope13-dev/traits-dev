# OllyDbg / x64dbg Plugin Detection
# These exports identify legitimate debugger plugins
defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 1000000
traits:
  - id: ollydbg-plugin-export
    desc: OllyDbg plugin exported function
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "ODBG_Plugin"
  - id: x64dbg-plugin-export
    desc: x64dbg plugin exported init function
    crit: notable
    conf: 0.95
    if:
      type: symbol
      substr: pluginit

composite_rules:
  - id: debugger-plugin-export
    desc: OllyDbg or x64dbg plugin export
    crit: component
    conf: 0.95
    any:
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
      - id: metadata/binary/symbols/plugin::x64dbg-plugin-export
