defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: curl-easy-init-export
    desc: Exports curl_easy_init API
    crit: notable
    conf: 0.98
    if:
      type: export
      exact: curl_easy_init
  - id: curl-easy-perform-export
    desc: Exports curl_easy_perform API
    crit: notable
    conf: 0.98
    if:
      type: export
      exact: curl_easy_perform
  - id: curl-easy-cleanup-export
    desc: Exports curl_easy_cleanup API
    crit: notable
    conf: 0.98
    if:
      type: export
      exact: curl_easy_cleanup
  - id: small-curl-export-table
    desc: DLL has a small curl-like export table
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: exports.count
      max: 12

composite_rules:
  - id: curl-api-export-set
    desc: Exports core curl easy-handle APIs
    crit: notable
    conf: 0.99
    all:
      - id: curl-easy-init-export
      - id: curl-easy-perform-export
      - id: curl-easy-cleanup-export
