defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: pe-imports-max-80
    desc: PE has no more than 80 imports
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: imports.count
      max: 80

  - id: single-import-raw
    desc: PE import table has exactly one entry
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: imports.count
      min: 1
      max: 1
  - id: pe-imports-max-six
    desc: PE with six or fewer imports
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: imports.count
      max: 6
  - id: pe-single-import-dll
    desc: PE imports from one DLL
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: pe.import_dll_count
      max: 1
  - id: pe-no-sections
    desc: PE has no parsed sections
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: sections.count
      max: 0
  - id: single-import-count
    desc: PE with single import
    crit: notable
    conf: 0.7
    if:
      id: single-import-raw
    unless:
      - id: metadata/binary/symbols/imports/
  - id: few-import-count
    desc: PE with very few imports
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: imports.count
      max: 2
    unless:
      - id: metadata/binary/symbols/imports::sparse-import-benign-context
composite_rules:
  - id: managed-resource-bootstrap-import
    desc: ".resources.dll with CLR bootstrap-only import"
    crit: component
    conf: 0.95
    all:
      - id: single-import-raw
      - id: metadata/binary/resource::resources-dll-extension
      - id: metadata/binary/framework::dotnet-assembly
  - id: sparse-import-benign-context
    desc: Benign sparse-import context
    crit: component
    conf: 1.0
    any:
      - id: pe-no-sections
      - id: managed-resource-bootstrap-import
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/file/extension/identity::dotnet-native-image
      - id: metadata/binary/metrics/anomaly::high-export-count-marker
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics/structural::section-exceeds-file-size
