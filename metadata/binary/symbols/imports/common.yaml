defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: imports-advapi32-dll
    desc: Binary imports ADVAPI32.dll
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "ADVAPI32.dll"
      case_insensitive: true
      section: rdata

  - id: getfilesizeex-import
    desc: GetFileSizeEx import symbol
    crit: component
    conf: 0.98
    if:
      type: import
      exact: GetFileSizeEx
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/

  - id: bringwindowtotop-import
    desc: BringWindowToTop import symbol
    crit: component
    conf: 0.98
    if:
      type: import
      exact: BringWindowToTop
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/

  - id: getstockobject-import
    desc: GetStockObject import symbol
    crit: component
    conf: 0.98
    if:
      type: import
      exact: GetStockObject

composite_rules:
  - id: getfilesizeex-bringwindowtotop-getstockobject-trio
    desc: Minimal three-import GUI stub trio
    crit: notable
    conf: 0.98
    all:
      - id: getfilesizeex-import
      - id: bringwindowtotop-import
      - id: getstockobject-import
