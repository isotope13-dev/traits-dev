defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: basename-version-dll
    desc: Filename is version.dll
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: version.dll
      case_insensitive: true

  - id: version-export-verqueryvaluew
    desc: Version.dll VerQueryValueW export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: VerQueryValueW

  - id: version-export-getfileversioninfoa
    desc: Version.dll GetFileVersionInfoA export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: GetFileVersionInfoA

  - id: version-export-verfindfilew
    desc: Version.dll VerFindFileW export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: VerFindFileW

  - id: version-export-verinstallfilew
    desc: Version.dll VerInstallFileW export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: VerInstallFileW

  - id: version-export-verlanguagenamew
    desc: Version.dll VerLanguageNameW export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: VerLanguageNameW

  - id: loader-export-zidingyixiugaidaochuhanshu
    desc: Custom loader export name
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: zidingyixiugaidaochuhanshu

  - id: loader-export-load
    desc: Generic loader export name
    crit: component
    conf: 0.95
    if:
      type: symbol
      kind: export
      regex: ^load(@\d+)?$

composite_rules:
  - id: version-proxy-api-export-set
    desc: Version.dll API export set
    crit: component
    conf: 0.99
    any:
      - id: version-export-verqueryvaluew
      - id: version-export-getfileversioninfoa
      - id: version-export-verfindfilew
      - id: version-export-verinstallfilew
      - id: version-export-verlanguagenamew
    needs: 3

  - id: version-proxy-loader-export
    desc: Version proxy extra loader export
    crit: component
    conf: 0.99
    any:
      - id: loader-export-zidingyixiugaidaochuhanshu
      - id: loader-export-load

  - id: version-proxy-extra-loader-exports
    desc: Version proxy with loader exports
    crit: component
    conf: 0.99
    all:
      - id: basename-version-dll
      - id: version-proxy-api-export-set
      - id: version-proxy-loader-export
