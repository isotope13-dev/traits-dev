defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: package-data-extension
    desc: Package data extension context
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: \.(pak|bin|dat|desktop)$
  - id: low-signal-archive-extension
    desc: Archive or map extension context
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: \.(map|deb|gz)$
  - id: framework-runtime-dll
    desc: Common framework runtime DLL
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: ^(netstandard|System\..{1,48}|Microsoft\..{1,45})\.dll$
  - id: node-or-deb-extension
    desc: Node or deb extension context
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: \.(node|deb)$
  - id: clink-binary-name
    desc: Clink binary basename context
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: ^clink_(x64|x86|arm64)\.exe$
  - id: no-import-metadata
    desc: Binary metadata reports zero imports
    crit: component
    conf: 0.99
    if:
      type: metrics
      field: binary.import_count
      max: 0
  - id: no-section-metadata
    desc: Binary metadata reports zero sections
    crit: component
    conf: 0.99
    if:
      type: metrics
      field: binary.section_count
      max: 0
  - id: high-export-count
    desc: Binary exports many symbols
    crit: component
    conf: 0.99
    if:
      type: exports_count
      min: 50
  - id: zero-import-raw
    desc: Binary import table is empty
    crit: component
    conf: 0.82
    size_min: 1024
    if:
      type: import_combination
      max_total: 0
  - id: single-import-raw
    desc: PE import table has exactly one entry
    crit: component
    conf: 0.7
    size_min: 1024
    if:
      type: import_combination
      max_total: 1
    unless:
      - id: metadata/binary/resource::mun-resource-bundle
      - id: node-or-deb-extension
      - id: metadata/binary/metrics::dotnet-binary
      - id: package-data-extension
      - id: low-signal-archive-extension
      - id: clink-binary-name
  - id: few-import-raw
    desc: Binary has very few imports
    crit: component
    conf: 0.7
    size_min: 1024
    if:
      type: import_combination
      max_total: 2
composite_rules:
  - id: zero-import-count
    desc: PE import table is empty
    crit: notable
    conf: 0.82
    all:
      - id: metadata/file/magic::pe-dos-stub
      - id: zero-import-raw
    unless:
      - id: zero-import-count-exception
  - id: single-import-count
    desc: PE with single import
    crit: notable
    conf: 0.7
    all:
      - id: metadata/file/magic::pe-dos-stub
      - id: single-import-raw
    unless:
      - id: low-import-count-total-exception
  - id: few-import-count
    desc: PE with very few imports
    crit: notable
    conf: 0.7
    all:
      - id: metadata/file/magic::pe-dos-stub
      - id: few-import-raw
    unless:
      - id: low-import-count-total-exception
  - id: low-import-runtime-exception
    desc: Low-import runtime-specific exception
    crit: component
    conf: 0.99
    any:
      - id: metadata/binary/resource::mun-resource-bundle
      - id: node-or-deb-extension
      - id: metadata/binary/metrics::dotnet-binary
      - id: clink-binary-name
  - id: low-import-count-exception
    desc: Low-import count-specific exception
    crit: component
    conf: 0.99
    any:
      - id: low-import-runtime-exception
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
  - id: zero-import-count-exception
    desc: Zero-import total exception context
    crit: component
    conf: 0.99
    any:
      - id: low-import-runtime-exception
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: low-import-fp-context
      - id: managed-resource-bootstrap-import
  - id: low-import-count-total-exception
    desc: Low-import total exception context
    crit: component
    conf: 0.99
    any:
      - id: low-import-count-exception
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: low-import-fp-context
      - id: managed-resource-bootstrap-import
  - id: low-import-fp-context
    desc: Low-import false positive context
    crit: baseline
    conf: 0.99
    any:
      - id: package-data-extension
      - id: low-signal-archive-extension
      - id: no-import-metadata
      - id: no-section-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::clr-version
      - id: metadata/lang/compiler/managed::mscorlib
      - id: framework-runtime-dll
      - id: high-export-count
      - id: package-fp-context
  - id: package-fp-context
    desc: Package false positive context
    crit: baseline
    conf: 0.99
    any:
      - id: metadata/package::common-fp-context
      - id: metadata/package::bitdefender-ctc-module
  - id: managed-resource-bootstrap-import
    desc: ".resources.dll with CLR bootstrap-only import"
    crit: component
    conf: 0.95
    all:
      - id: single-import-raw
      - id: metadata/binary/resource::resources-dll-extension
      - id: metadata/binary/framework::dotnet-assembly
