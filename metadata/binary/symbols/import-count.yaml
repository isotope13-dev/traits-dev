defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: package-data-extension
    desc: Package data extension context
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: \.(pak|bin|dat|desktop)$
  - id: low-signal-archive-extension
    desc: Archive or map extension context
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: \.(map|deb|gz)$
  - id: no-import-metadata
    desc: Binary metadata reports zero imports
    crit: component
    conf: 0.99
    if:
      type: metrics
      field: binary.import_count
      max: 0
  - id: no-section-metadata
    desc: Binary metadata reports zero sections
    crit: component
    conf: 0.99
    if:
      type: metrics
      field: binary.section_count
      max: 0
  - id: high-export-count
    desc: Binary exports many symbols
    crit: component
    conf: 0.99
    if:
      type: exports_count
      min: 50
  - id: zero-import-count
    desc: PE import table is empty
    crit: notable
    conf: 0.82
    if:
      type: import_combination
      max_total: 0
    not:
      - regex: \.node$
      - regex: \.deb$
    unless:
      - id: low-import-fp-context
      - id: managed-resource-bootstrap-import
  - id: single-import-raw
    desc: PE import table has exactly one entry
    crit: component
    conf: 0.7
    if:
      type: import_combination
      max_total: 1
    not:
      - regex: \.node$
      - regex: \.deb$
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.(map|deb|gz)$
  - id: single-import-count
    desc: PE with single import
    crit: notable
    conf: 0.7
    if:
      id: single-import-raw
    not:
      - regex: \.node$
      - regex: \.map$
      - regex: \.deb$
    unless:
      - id: low-import-fp-context
      - id: managed-resource-bootstrap-import
  - id: few-import-count
    desc: PE with very few imports
    crit: notable
    conf: 0.7
    if:
      type: import_combination
      max_total: 2
    not:
      - regex: \.node$
      - regex: \.map$
      - regex: \.deb$
    unless:
      - id: low-import-fp-context
      - id: managed-resource-bootstrap-import
composite_rules:
  - id: low-import-fp-context
    desc: Low-import false positive context
    crit: baseline
    conf: 0.99
    any:
      - id: package-data-extension
      - id: low-signal-archive-extension
      - id: no-import-metadata
      - id: no-section-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: high-export-count
      - id: package-fp-context
  - id: package-fp-context
    desc: Package false positive context
    crit: baseline
    conf: 0.99
    any:
      - id: metadata/package::common-fp-context
      - id: metadata/package::bitdefender-ctc-module
  - id: managed-resource-bootstrap-import
    desc: ".resources.dll with CLR bootstrap-only import"
    crit: component
    conf: 0.95
    all:
      - id: single-import-raw
      - id: metadata/binary/resource::resources-dll-extension
      - id: metadata/binary/framework::dotnet-assembly
