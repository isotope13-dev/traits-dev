defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: zero-import-count
    desc: PE import table is empty
    crit: notable
    conf: 0.82
    if:
      type: import_combination
      max_total: 0
    not:
      - regex: \.node$
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.map$
      - type: metrics
        field: binary.section_count
        max: 0
      - id: managed-resource-bootstrap-import
      - type: exports_count
        min: 50
      - id: metadata/package::common-fp-context
      - id: metadata/package::bitdefender-ctc-module
  - id: single-import-raw
    desc: PE import table has exactly one entry
    crit: component
    conf: 0.7
    if:
      type: import_combination
      max_total: 1
    not:
      - regex: \.node$
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.map$
  - id: single-import-count
    desc: PE with single import
    crit: notable
    conf: 0.7
    if:
      id: single-import-raw
    not:
      - regex: \.node$
      - regex: \.map$
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: metrics
        field: binary.section_count
        max: 0
      - id: managed-resource-bootstrap-import
      - id: metadata/binary/framework::dotnet-assembly
      - type: exports_count
        min: 50
      - id: metadata/package::common-fp-context
      - id: metadata/package::bitdefender-ctc-module
  - id: few-import-count
    desc: PE with very few imports
    crit: notable
    conf: 0.7
    if:
      type: import_combination
      max_total: 2
    not:
      - regex: \.node$
      - regex: \.map$
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: metrics
        field: binary.section_count
        max: 0
      - id: managed-resource-bootstrap-import
      - id: metadata/binary/framework::dotnet-assembly
      - type: exports_count
        min: 50
      - id: metadata/package::common-fp-context
      - id: metadata/package::bitdefender-ctc-module
composite_rules:
  - id: managed-resource-bootstrap-import
    desc: ".resources.dll with CLR bootstrap-only import"
    crit: component
    conf: 0.95
    all:
      - id: single-import-raw
      - id: metadata/binary/resource::resources-dll-extension
      - id: metadata/binary/framework::dotnet-assembly
