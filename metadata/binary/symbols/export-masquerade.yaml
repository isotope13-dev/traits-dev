  - id: sideload-export-ksecdisablepermissioninfo
    desc: Fake KsecDisablePermissionInfo export
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: KsecDisablePermissionInfo
  - id: sideload-export-pnpterminatefactory
    desc: Fake PnpTerminateFactory export
    crit: component
    conf: 0.99
    if:
      type: symbol
      regex: ^PnpTerminateFactory(@\d+)?$
  - id: sideload-export-wppinitializecatalogcount
    desc: Fake WppInitializeCatalogCount export
    crit: component
    conf: 0.99
    if:
      type: symbol
      regex: ^WppInitializeCatalogCount(@\d+)?$
  - id: sideload-export-zwrevokehandle
    desc: Fake ZwRevokeHandle export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: ZwRevokeHandle
  - id: sideload-export-dbgunregisterpipelinedata
    desc: Fake DbgUnregisterPipelineData export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: DbgUnregisterPipelineData
  - id: sideload-export-etwresetcomponenta
    desc: Fake EtwResetComponentA export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^EtwResetComponentA(@\d+)?$
  - id: sideload-export-etwunlockpipelineinfo
    desc: Fake EtwUnlockPipelineInfo export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^EtwUnlockPipelineInfo(@\d+)?$
  - id: sideload-export-fltdisableproviderdata
    desc: Fake FltDisableProviderData export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^FltDisableProviderData(@\d+)?$
  - id: sideload-export-ndisstartplugincount
    desc: Fake NdisStartPluginCount export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^NdisStartPluginCount(@\d+)?$
  - id: sideload-export-tpmnotifycacheinfo
    desc: Fake TpmNotifyCacheInfo export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^TpmNotifyCacheInfo(@\d+)?$
  - id: sideload-export-zwdeleteproxyw
    desc: Fake ZwDeleteProxyW export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: ZwDeleteProxyW
  - id: sideload-export-cluster-size-10-25
    desc: DLL exports ten to twenty-five APIs
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.export_count
      min: 10
      max: 25
  - id: sideload-export-halunregistercachecount
    desc: Fake HalUnregisterCacheCount export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^HalUnregisterCacheCount(@\d+)?$
  - id: sideload-export-ksecacceptclusterdata
    desc: Fake KsecAcceptClusterData export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: KsecAcceptClusterData
  - id: sideload-export-ldrstartcontrollerasync
    desc: Fake LdrStartControllerAsync export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: LdrStartControllerAsync
  - id: sideload-export-usbattachmoduleasync
    desc: Fake UsbAttachModuleAsync export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: UsbAttachModuleAsync
  - id: sideload-export-wmiclosepartition
    desc: Fake WmiClosePartition export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: WmiClosePartition
  - id: sideload-export-zwopenbuffercount
    desc: Fake ZwOpenBufferCount export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: ZwOpenBufferCount
  - id: sideload-export-dbgopenbuffercount
    desc: Fake DbgOpenBufferCount export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: DbgOpenBufferCount
  - id: sideload-export-usbenablestate
    desc: Fake UsbEnableState export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^UsbEnableState(@\d+)?$
  - id: sideload-export-wmibindclusterex
    desc: Fake WmiBindClusterEx export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^WmiBindClusterEx(@\d+)?$
  - id: sideload-export-wmitransformvolumew
    desc: Fake WmiTransformVolumeW export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^WmiTransformVolumeW(@\d+)?$
  - id: sideload-export-zwacceptcomponentinfo
    desc: Fake ZwAcceptComponentInfo export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      exact: ZwAcceptComponentInfo
  - id: sideload-export-cluster-size-5-10
    desc: DLL exports five to ten APIs
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.export_count
      min: 5
      max: 10
  - id: gui-import-cluster-beginpaint
    desc: GUI import cluster BeginPaint
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: BeginPaint
  - id: gui-import-cluster-getactivewindow
    desc: GUI import cluster GetActiveWindow
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: GetActiveWindow
  - id: dll-forwarded-export
    desc: Forwarded export detected
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: forward
      regex: '(?i)[a-z0-9_-]{1,64}\.[a-z0-9_-]{1,64}'
  - id: high-forwarder-ratio
    desc: High ratio of forwarded exports (>80%)
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: pe.forward_ratio
      min: 0.8
  - id: self-versioned-forwarder
    desc: Versioned ABI forwarder DLL
    crit: notable
    conf: 0.99
    if:
      type: symbol
      kind: forward
      regex: '(?i)python[a-z0-9_.-]*\d'
  - id: stable-abi-forwarder
    desc: Stable-ABI forwarder DLL (basename→versioned variant, e.g. foo→foo140)
    crit: notable
    conf: 0.99
    if:
      type: metrics
      field: pe.self_versioned_forwarder
      min: 1
  - id: pure-proxy-dll
    desc: Pure proxy DLL (100% forwarded exports)
    crit: baseline
    conf: 0.99
    if:
      type: metrics
      field: pe.forward_ratio
      min: 0.99
    unless:
      - id: self-versioned-forwarder
      - id: stable-abi-forwarder
      - id: metadata/package::apiset-stub
      - id: metadata/package::common-fp-context
      - id: metadata/library/python-runtime::python-stable-abi-forwarder-basename
  - id: basename-libvlc-dll
    desc: VideoLAN libvlc-family DLL filename
    crit: component
    conf: 1.0
    if:
      type: basename
      regex: '^libvlc(core|-core)?\.dll$'
      case_insensitive: true
  - id: vlc-export-compileby
    desc: VLC export VLC_CompileBy
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: VLC_CompileBy
  - id: vlc-export-internalinit
    desc: VLC export libvlc_InternalInit
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: libvlc_InternalInit
  - id: vlc-export-internalcleanup
    desc: VLC export libvlc_InternalCleanup
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: libvlc_InternalCleanup
  - id: vlc-export-input-start
    desc: VLC export input_Start
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: input_Start
  - id: vlc-export-net-connect
    desc: VLC export net_Connect
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: net_Connect
  - id: hnetcfg-export-icfconnect
    desc: hnetcfg export IcfConnect
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: IcfConnect
  - id: hnetcfg-export-firewall-settings-page
    desc: hnetcfg export firewall settings page
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: HNetGetFirewallSettingsPage
  - id: hnetcfg-export-sharedaccess-dialog
    desc: hnetcfg export shared access dialog
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: HNetSharingAndFirewallSettingsDlg
  - id: hnetcfg-export-dynamic-port-nosocket
    desc: hnetcfg export dynamic port without socket
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: IcfOpenDynamicFwPortWithoutSocket
  - id: hnetcfg-export-winbom-firewall
    desc: hnetcfg export WinBom firewall configure
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: WinBomConfigureWindowsFirewall
composite_rules:
  - id: sideload-export-masquerade-cluster
    desc: DLL export set suggests sideload masquerade
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: sideload-export-checklicense
      - id: sideload-export-dllconfigure
      - id: sideload-export-csracceptsegmentw
      - id: sideload-export-halcreatevolumecount
      - id: sideload-export-wdfopenendpointcount
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/symbols::standard-com-server-exports
  - id: sideload-wrapper-gui-padding
    desc: GUI-heavy wrapper imports around fake exports
    crit: suspicious
    conf: 0.94
    any:
      - id: sideload-export-masquerade-cluster
      - id: sideload-export-masquerade-cluster-lite
    all:
      - id: gui-import-cluster-beginpaint
      - id: gui-import-cluster-getactivewindow
  - id: sideload-export-masquerade-cluster-lite
    desc: Small fake export set suggests sideload masquerade
    crit: suspicious
    conf: 0.99
    all:
      - id: sideload-export-cluster-size-5-10
    any:
      - id: sideload-export-dbgenumeratecontrollerasync
      - id: sideload-export-halunregistercachecount
      - id: sideload-export-halsetadaptercount
      - id: sideload-export-ksecacceptclusterdata
      - id: sideload-export-ksecdeletepipeline
      - id: sideload-export-ksecdisablepermissioninfo
      - id: sideload-export-ldrstartcontrollerasync
      - id: sideload-export-ntgetconfiguration
      - id: sideload-export-pnpterminatefactory
      - id: sideload-export-tpmstartnotification
      - id: sideload-export-usbattachmoduleasync
      - id: sideload-export-usbenablestate
      - id: sideload-export-wmiclosepartition
      - id: sideload-export-wmibindclusterex
      - id: sideload-export-wmitransformvolumew
      - id: sideload-export-zwopenbuffercount
      - id: sideload-export-dbgopenbuffercount
      - id: sideload-export-zwacceptcomponentinfo
      - id: sideload-export-wdfallocatesessioncount
      - id: sideload-export-wppinitializecatalogcount
      - id: sideload-export-zwrevokehandle
    needs: 4
    unless:
      - id: metadata/binary/symbols::standard-com-server-exports
  - id: kernel-style-fake-export-surface
    desc: Kernel-style fake export surface
    crit: suspicious
    conf: 0.99
    all:
      - id: sideload-export-cluster-size-10-25
    any:
      - id: sideload-export-dbgunregisterpipelinedata
      - id: sideload-export-etwresetcomponenta
      - id: sideload-export-etwunlockpipelineinfo
      - id: sideload-export-fltdisableproviderdata
      - id: sideload-export-ndisstartplugincount
      - id: sideload-export-tpmnotifycacheinfo
      - id: sideload-export-zwdeleteproxyw
    needs: 5
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/symbols::standard-com-server-exports
  - id: non-libvlc-vlc-export-surface
    desc: Non-libvlc DLL exports broad VLC API set
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: vlc-export-compileby
      - id: vlc-export-internalinit
      - id: vlc-export-internalcleanup
      - id: vlc-export-input-start
      - id: vlc-export-net-connect
    needs: 4
    unless:
      - id: basename-libvlc-dll
  - id: hnetcfg-firewall-export-surface
    desc: DLL exports hnetcfg firewall API surface
    crit: component
    conf: 0.99
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: hnetcfg-export-icfconnect
      - id: hnetcfg-export-firewall-settings-page
      - id: hnetcfg-export-sharedaccess-dialog
      - id: hnetcfg-export-dynamic-port-nosocket
      - id: hnetcfg-export-winbom-firewall
    needs: 4
