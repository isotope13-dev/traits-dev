  - id: sideload-export-wdfallocatesessioncount
    desc: Fake WdfAllocateSessionCount export
    crit: component
    conf: 0.99
    if:
      type: symbol
      kind: export
      regex: ^WdfAllocateSessionCount(@\d+)?$
  - id: sideload-export-dbgenumeratecontrollerasync
    desc: Fake DbgEnumerateControllerAsync export
    crit: component
    conf: 0.99
    if:
      type: symbol
      regex: ^DbgEnumerateControllerAsync(@\d+)?$
  - id: sideload-export-ksecdeletepipeline
    desc: Fake KsecDeletePipeline export
    crit: component
    conf: 0.99
    if:
      type: symbol
