defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: sideload-export-checklicense
    desc: Fake CheckLicense export
    crit: component
    conf: 0.96
    if:
      type: symbol
      exact: CheckLicense
  - id: sideload-export-dllconfigure
    desc: Fake DllConfigure export
    crit: component
    conf: 0.96
    if:
      type: symbol
      exact: DllConfigure
  - id: sideload-export-csracceptsegmentw
    desc: Fake CsrAcceptSegmentW export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: CsrAcceptSegmentW
  - id: sideload-export-halcreatevolumecount
    desc: Fake HalCreateVolumeCount export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: HalCreateVolumeCount
  - id: sideload-export-wdfopenendpointcount
    desc: Fake WdfOpenEndpointCount export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: WdfOpenEndpointCount
  - id: gui-import-cluster-beginpaint
    desc: GUI import cluster BeginPaint
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: BeginPaint
  - id: gui-import-cluster-getactivewindow
    desc: GUI import cluster GetActiveWindow
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: GetActiveWindow
composite_rules:
  - id: sideload-export-masquerade-cluster
    desc: DLL export set suggests sideload masquerade
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: sideload-export-checklicense
      - id: sideload-export-dllconfigure
      - id: sideload-export-csracceptsegmentw
      - id: sideload-export-halcreatevolumecount
      - id: sideload-export-wdfopenendpointcount
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/symbols::standard-com-server-exports
  - id: sideload-wrapper-gui-padding
    desc: GUI-heavy wrapper imports around fake exports
    crit: suspicious
    conf: 0.94
    all:
      - id: sideload-export-masquerade-cluster
      - id: gui-import-cluster-beginpaint
      - id: gui-import-cluster-getactivewindow
