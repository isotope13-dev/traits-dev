defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: sideload-export-checklicense
    desc: Fake CheckLicense export
    crit: component
    conf: 0.96
    if:
      type: symbol
      exact: CheckLicense
  - id: sideload-export-dllconfigure
    desc: Fake DllConfigure export
    crit: component
    conf: 0.96
    if:
      type: symbol
      exact: DllConfigure
  - id: sideload-export-csracceptsegmentw
    desc: Fake CsrAcceptSegmentW export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: CsrAcceptSegmentW
  - id: sideload-export-halcreatevolumecount
    desc: Fake HalCreateVolumeCount export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: HalCreateVolumeCount
  - id: sideload-export-wdfopenendpointcount
    desc: Fake WdfOpenEndpointCount export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: WdfOpenEndpointCount
  - id: sideload-export-dbgenumeratecontrollerasync
    desc: Fake DbgEnumerateControllerAsync export
    crit: component
    conf: 0.99
    if:
      type: symbol
      regex: ^DbgEnumerateControllerAsync(?:@\d+)?$
  - id: sideload-export-ksecdeletepipeline
    desc: Fake KsecDeletePipeline export
    crit: component
    conf: 0.99
    if:
      type: symbol
      regex: ^KsecDeletePipeline(?:@\d+)?$
  - id: sideload-export-ksecdisablepermissioninfo
    desc: Fake KsecDisablePermissionInfo export
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: KsecDisablePermissionInfo
  - id: sideload-export-pnpterminatefactory
    desc: Fake PnpTerminateFactory export
    crit: component
    conf: 0.99
    if:
      type: symbol
      regex: ^PnpTerminateFactory(?:@\d+)?$
  - id: sideload-export-wppinitializecatalogcount
    desc: Fake WppInitializeCatalogCount export
    crit: component
    conf: 0.99
    if:
      type: symbol
      regex: ^WppInitializeCatalogCount(?:@\d+)?$
  - id: sideload-export-zwrevokehandle
    desc: Fake ZwRevokeHandle export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: ZwRevokeHandle
  - id: sideload-export-cluster-size-5-8
    desc: DLL exports five to eight APIs
    crit: component
    conf: 0.92
    if:
      type: exports_count
      min: 5
      max: 8
  - id: gui-import-cluster-beginpaint
    desc: GUI import cluster BeginPaint
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: BeginPaint
  - id: gui-import-cluster-getactivewindow
    desc: GUI import cluster GetActiveWindow
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: GetActiveWindow
  - id: basename-version-dll
    desc: Filename is version.dll
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: version.dll
      case_insensitive: true
  - id: version-export-getfileversioninfoa
    desc: version.dll export GetFileVersionInfoA
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: GetFileVersionInfoA
  - id: version-export-verqueryvaluew
    desc: version.dll export VerQueryValueW
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: VerQueryValueW
  - id: version-export-verfindfilew
    desc: version.dll export VerFindFileW
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: VerFindFileW
  - id: version-export-verinstallfilew
    desc: version.dll export VerInstallFileW
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: VerInstallFileW
  - id: version-export-verlanguagenamew
    desc: version.dll export VerLanguageNameW
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: VerLanguageNameW
  - id: loader-export-load
    desc: Loader export load
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: load
  - id: loader-export-zidingyixiugaidaochuhanshu
    desc: Custom ziding loader export
    crit: component
    conf: 1.0
    if:
      type: symbol
      exact: zidingyixiugaidaochuhanshu
  - id: dll-forwarded-export
    desc: Forwarded export pattern (DLL.function)
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)([a-z0-9_-]{1,64}\.dll\.[a-z0-9_-]{1,64}|[a-z0-9_-]{1,64}_orig[0-9]*\.dll)'
  - id: basename-libvlc-dll
    desc: Filename is libvlc.dll
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: libvlc.dll
      case_insensitive: true
  - id: vlc-export-compileby
    desc: VLC export VLC_CompileBy
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: VLC_CompileBy
  - id: vlc-export-internalinit
    desc: VLC export libvlc_InternalInit
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: libvlc_InternalInit
  - id: vlc-export-internalcleanup
    desc: VLC export libvlc_InternalCleanup
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: libvlc_InternalCleanup
  - id: vlc-export-input-start
    desc: VLC export input_Start
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: input_Start
  - id: vlc-export-net-connect
    desc: VLC export net_Connect
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: net_Connect
composite_rules:
  - id: sideload-export-masquerade-cluster
    desc: DLL export set suggests sideload masquerade
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: sideload-export-checklicense
      - id: sideload-export-dllconfigure
      - id: sideload-export-csracceptsegmentw
      - id: sideload-export-halcreatevolumecount
      - id: sideload-export-wdfopenendpointcount
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/symbols::standard-com-server-exports
  - id: sideload-wrapper-gui-padding
    desc: GUI-heavy wrapper imports around fake exports
    crit: suspicious
    conf: 0.94
    any:
      - id: sideload-export-masquerade-cluster
      - id: sideload-export-masquerade-cluster-lite
    all:
      - id: gui-import-cluster-beginpaint
      - id: gui-import-cluster-getactivewindow
  - id: sideload-export-masquerade-cluster-lite
    desc: Small fake export set suggests sideload masquerade
    crit: suspicious
    conf: 0.99
    all:
      - id: sideload-export-cluster-size-5-8
    any:
      - id: sideload-export-dbgenumeratecontrollerasync
      - id: sideload-export-ksecdeletepipeline
      - id: sideload-export-ksecdisablepermissioninfo
      - id: sideload-export-pnpterminatefactory
      - id: sideload-export-wppinitializecatalogcount
      - id: sideload-export-zwrevokehandle
    needs: 4
    unless:
      - id: metadata/binary/symbols::standard-com-server-exports
  - id: version-proxy-export-cluster
    desc: Non-version DLL exports version API set
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: version-export-getfileversioninfoa
      - id: version-export-verqueryvaluew
      - id: version-export-verfindfilew
      - id: version-export-verinstallfilew
      - id: version-export-verlanguagenamew
    needs: 4
    unless:
      - id: basename-version-dll
  - id: version-proxy-extra-loader-exports
    desc: Version API proxy with extra loader exports
    crit: suspicious
    conf: 0.99
    all:
      - id: version-proxy-export-cluster
      - id: loader-export-load
      - id: loader-export-zidingyixiugaidaochuhanshu
  - id: non-libvlc-vlc-export-surface
    desc: Non-libvlc DLL exports broad VLC API set
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: vlc-export-compileby
      - id: vlc-export-internalinit
      - id: vlc-export-internalcleanup
      - id: vlc-export-input-start
      - id: vlc-export-net-connect
    needs: 4
    unless:
      - id: basename-libvlc-dll
