defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: export-entry-wrapper
    desc: EntryWrapper export present
    crit: component
    conf: 0.96
    if:
      type: symbol
      exact: EntryWrapper
  - id: export-run-main
    desc: RunMain export present
    crit: component
    conf: 0.96
    if:
      type: symbol
      exact: RunMain
  - id: export-dll-can-unload-now
    desc: COM unload export present
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllCanUnloadNow
  - id: export-dll-get-class-object
    desc: COM class factory export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllGetClassObject
  - id: export-dll-register-server
    desc: COM registration export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllRegisterServer
  - id: export-dll-unregister-server
    desc: COM unregistration export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: DllUnregisterServer
composite_rules:
  - id: wrapper-main-export-pair
    desc: Wrapper and RunMain export pair
    crit: notable
    conf: 0.94
    all:
      - id: export-entry-wrapper
      - id: export-run-main
    unless:
      - id: metadata/signed/platform::microsoft
  - id: standard-com-server-exports
    desc: Standard COM server export set
    crit: baseline
    conf: 0.95
    all:
      - id: export-dll-can-unload-now
      - id: export-dll-get-class-object
      - id: export-dll-register-server
      - id: export-dll-unregister-server
    unless:
      - id: metadata/binary/metrics::many-exports-9
