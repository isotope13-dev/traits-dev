defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: imports-advapi32-dll
    desc: Binary imports ADVAPI32.dll
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "ADVAPI32.dll"
      case_insensitive: true

  - id: nt-initialize-registry-symbol
    desc: NtInitializeRegistry symbol present
    crit: component
    conf: 1.0
    if:
      type: symbol
      exact: NtInitializeRegistry
