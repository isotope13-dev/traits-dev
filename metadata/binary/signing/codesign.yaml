# Apple code signing technology detection: LC_CODE_SIGNATURE structures and
# _CodeSignature/CodeResources plists. Includes a few T1036 traits that detect
# Apple-internal resources reused inside third-party bundles.
defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: coderesources-plist
    desc: Apple code signature resource manifest
    crit: baseline
    conf: 0.95
    if:
      type: path
      basename: true
      exact: "CodeResources"

  - id: sha256-named-icns-resource
    desc: SHA256-named icon in code signature
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "Resources/[0-9a-f]{64}\\.icns"

  # Apple-internal MobileDevice updater component resources reused by third parties.
  - id: apple-mobiledevice-updater-resource
    desc: Apple MobileDevice updater component in code signature
    crit: suspicious
    conf: 0.9
    attack: "T1036"
    if:
      type: text
      substr: "com.apple.mobiledeviceupdater"

  # com.apple.iphone-x-1.icns is Apple's internal hardware icon for iPhone X.
  - id: apple-hardware-icon-resource
    desc: Apple iPhone hardware icon in code signature
    crit: suspicious
    conf: 0.85
    attack: "T1036"
    if:
      type: text
      substr: "com.apple.iphone-x-1"

  # MobileDeviceUpdateController is an Apple private framework class.
  - id: apple-mobiledevice-ui-resource
    desc: Apple MobileDevice update controller resource
    crit: suspicious
    conf: 0.85
    attack: "T1036"
    if:
      type: text
      substr: "MobileDeviceUpdateController"

  # Synthetic placeholders emitted when nested code-signature parsing is incomplete.
  - id: nested-code-signature-table
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      word: __cleave_missing_nested_code_signature_table__
  - id: nested-signature-rules
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      word: __cleave_missing_nested_signature_rules__
