defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: pdb-absolute-path
    desc: Embedded absolute PDB path
    crit: baseline
    conf: 0.72
    if:
      type: text
      regex: (?i)^[A-Z]:.{1,120}\.pdb$
      section: .rdata
  - id: pdb-unix-absolute-path
    desc: Embedded Unix absolute PDB path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: ^/.{1,180}\.pdb$
      section: .rdata
  - id: pdb-dependency-confusion-path
    desc: Dependency confusion project PDB
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: /dependency-confusion/
      section: .rdata
  - id: pdb-pentestscripts-path
    desc: Pentest scripts project PDB
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /pentestscripts/
      section: .rdata
  - id: pdb-random-basename
    desc: Lowercase random PDB basename
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: ^[a-z]{8,16}\.pdb$
      section: .rdata
  - id: pdb-temp-path
    desc: PDB path in temp directory
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)\\(temp|tmp)\\.{1,60}\.pdb$
      section: .text
  - id: pdb-users-path
    desc: PDB path with user profile
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\\users\\.{1,30}\\.{0,60}\.pdb$
      section: .text
    not:
      - regex: (?i)\\users\\[^\\]{1,30}\\(source|src|vs projects)\\
  - id: pdb-desktop-path
    desc: PDB path on Desktop
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\\desktop\\.{1,60}\.pdb$
      section: .text
  - id: pdb-downloads-path
    desc: PDB path in Downloads
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (?i)\\downloads\\.{1,60}\.pdb$
      section: .text
  - id: pdb-short-project-name
    desc: PDB with very short project name
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \\[a-zA-Z]{1,3}\.pdb$
      section: .text
  - id: pdb-numbered-path
    desc: PDB in numbered directory (build artifacts)
    crit: baseline
    conf: 0.45
    if:
      type: text
      regex: \\[0-9]+\\.{1,60}\.pdb$
      section: .text
  - id: pdb-cobalt-indicator
    desc: Cobalt Strike related PDB path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)(beacon|cobaltstrike|sleeve).{0,30}\.pdb$
      section: .text
  - id: pdb-metasploit-indicator
    desc: Metasploit related PDB path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)(meterpreter|metasploit|msf).{0,30}\.pdb$
      section: .text
  - id: pdb-visual-studio
    desc: Visual Studio build path
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\\(Release|Debug)\\.{1,60}\.pdb$
      section: .text
  - id: pdb-unc-path
    desc: PDB path on UNC network share
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: ^\\\\.{1,60}\\.{1,80}\.pdb$
      section: .text
  - id: pdb-jenkins-build
    desc: Jenkins CI build path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: \\jenkins\\workspace\\
      section: .text
  - id: pdb-nonstandard-drive
    desc: PDB path on non-standard drive letter
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)^[D-Z]:\\.{1,80}\.pdb$
      section: .text
    not:
      - regex: (?i)^[D-Z]:\\(a|agent|build|bld|src|jenkins|workspace|teamcity)
  - id: venvlauncher-pdb
    desc: Python venvlauncher PDB path
    crit: baseline
    conf: 0.96
    if:
      type: text
      substr: venvlauncher.pdb
      section: .rdata
  - id: pdb-cpython-wininst
    desc: CPython wininst PDB path
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: (?i)\\cpython\\lib\\distutils\\command\\wininst-[0-9.]+-(amd64|win32)\.pdb$
      section: .rdata
  - id: pdb-odesk-installmetrix
    desc: oDesk/InstallMetrix dropper PDB path
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: (?i)oDesk.{0,40}InstallMetrix
      section: .rdata
  - id: office-source-engine-pdb
    desc: Office Source Engine build PDB
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: P:\Target\x64\ship\delivery\x-none\ose.pdb
      section: .rdata
  - id: pdb-installer-numbered
    desc: PDB path with numbered installer build dir
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\\Installer\d+\\Release\\Installer\.pdb$
      section: .rdata
  - id: pdb-cv-gibberish-path
    desc: PDB path with machine-generated CV-gibberish directory name
    crit: suspicious
    conf: 0.88
    attack: T1027
    if:
      type: text
      regex: '^[A-Z]:\\([b-df-hj-np-tv-z][aeiou]){4,}'
      section: .rdata
    not:
      - regex: (?i)\\(release|debug|build|output|publish)\\
  - id: basic-loader-pdb
    desc: basic_loader PDB debug artifact
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: basic_loader.pdb
      section: .rdata
composite_rules:
  - id: suspicious-pdb-location
    desc: PDB in suspicious filesystem location
    crit: suspicious
    conf: 0.85
    any:
      - id: pdb-temp-path
      - id: pdb-downloads-path
      - id: pdb-installer-numbered
      - id: pdb-unix-absolute-path
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics::large-executable
  - id: offensive-tool-pdb
    desc: Offensive security tool PDB indicator
    crit: suspicious
    conf: 0.9
    any:
      - id: pdb-cobalt-indicator
      - id: pdb-metasploit-indicator
  - id: supply-chain-research-pdb
    desc: Supply chain research project PDB
    crit: suspicious
    conf: 0.99
    all:
      - id: pdb-unix-absolute-path
    any:
      - id: pdb-dependency-confusion-path
      - id: pdb-pentestscripts-path
