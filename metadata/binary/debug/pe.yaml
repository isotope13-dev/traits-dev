defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: pdb-absolute-path
  desc: Embedded absolute PDB path
  crit: notable
  conf: 0.72
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)^[A-Z]:.{1,120}\.pdb$
- id: pdb-random-basename
  desc: Lowercase random PDB basename
  crit: component
  conf: 0.78
  if:
    type: value
    path: pe.debug.pdb.path
    regex: ^[a-z]{8,16}\.pdb$
- id: pdb-temp-path
  desc: PDB path in temp directory
  crit: notable
  conf: 0.85
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)\\(temp|tmp)\\.{1,60}\.pdb$
- id: pdb-users-path
  desc: PDB path with user profile
  crit: notable
  conf: 0.7
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)\\users\\.{1,30}\\.{0,60}\.pdb$
- id: pdb-desktop-path
  desc: PDB path on Desktop
  crit: notable
  conf: 0.7
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)\\desktop\\.{1,60}\.pdb$
- id: pdb-downloads-path
  desc: PDB path in Downloads
  crit: suspicious
  conf: 0.8
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)\\downloads\\.{1,60}\.pdb$
- id: pdb-short-project-name
  desc: PDB with very short project name
  crit: notable
  conf: 0.7
  if:
    type: value
    path: pe.debug.pdb.path
    regex: \\[a-zA-Z]{1,3}\.pdb$
- id: pdb-numbered-path
  desc: PDB in numbered directory (build artifacts)
  crit: notable
  conf: 0.45
  if:
    type: value
    path: pe.debug.pdb.path
    regex: \\[0-9]+\\.{1,60}\.pdb$
- id: pdb-multi-numeric-path
  desc: PDB path nests two numeric directories
  crit: notable
  conf: 0.85
  if:
    type: value
    path: pe.debug.pdb.path
    regex: \\[0-9]{2,5}\\[0-9]{2,5}\\.{1,80}\.pdb$
  unless:
  - id: pdb-visual-studio
  - id: metadata/signed/platform/
- id: pdb-cobalt-indicator
  desc: Beacon or Cobalt-themed PDB path
  crit: notable
  conf: 0.9
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)(beacon|cobaltstrike|sleeve).{0,30}\.pdb$
- id: pdb-metasploit-indicator--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: value
    path: pe.debug.pdb.path
    substr: meterpreter
    case_insensitive: true
  count_max: 1001048
- id: pdb-metasploit-indicator--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: value
    path: pe.debug.pdb.path
    substr: metasploit
    case_insensitive: true
  count_max: 1001049
- id: pdb-metasploit-indicator--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)(msfconsole|metasploit.{0,40}console|meterpreter.{0,40}console)
  count_max: 1001050
- id: pdb-metasploit-indicator--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: value
    path: pe.debug.pdb.path
    substr: payload
    case_insensitive: true
  count_max: 1001051
- id: pdb-metasploit-indicator--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: value
    path: pe.debug.pdb.path
    substr: venom
    case_insensitive: true
  count_max: 1001052
- id: pdb-metasploit-indicator--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)(^|[\\/])(msf|metasploit|meterpreter)[^\\/]*\.pdb$
  count_max: 1001053
- id: pdb-visual-studio
  desc: Visual Studio PDB build path
  crit: notable
  conf: 0.5
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)\\(Release|Debug)\\.{1,60}\.pdb$
- id: pdb-driver-installer-basename
  desc: Driver installer PDB basename
  crit: notable
  conf: 0.82
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '(?i)(^|[\\/])driver_installer\.pdb$'
- id: doexeloc-pdb-basename
  desc: DoExeloc PDB basename
  crit: component
  conf: 0.96
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '(?i)(^|[\\/])DoExeloc\.pdb$'
- id: pdb-unc-path
  desc: PDB path on UNC network share
  crit: baseline
  conf: 0.85
  if:
    type: value
    path: pe.debug.pdb.path
    regex: ^\\\\.{1,60}\\.{1,80}\.pdb$
- id: pdb-jenkins-build
  desc: Jenkins CI build path
  crit: notable
  conf: 0.6
  if:
    type: value
    path: pe.debug.pdb.path
    substr: \\jenkins\\workspace\\
- id: pdb-nonstandard-drive
  desc: PDB path on non-standard drive letter
  crit: notable
  conf: 0.5
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)^[D-Z]:\\.{1,80}\.pdb$
  not:
  - regex: (?i)^[D-Z]:\\(a|agent|build|bld|src|jenkins|workspace|teamcity)
  unless:
  - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
- id: venvlauncher-pdb
  desc: Python venvlauncher PDB path
  crit: baseline
  conf: 0.96
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '(?i)(^|[\\/])venvlauncher\.pdb$'
- id: msqry32-pdb-basename
  desc: Office MS Query PDB basename
  crit: baseline
  conf: 0.8
  size_min: 500000
  size_max: 4000000
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '(?i)(^|[\\/])msqry32\.pdb$'
- id: pdb-odesk-installmetrix
  desc: oDesk/InstallMetrix dropper PDB path
  crit: notable
  conf: 0.98
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)oDesk.{0,40}InstallMetrix
- id: pdb-installer-numbered
  desc: PDB path with numbered installer build dir
  crit: component
  conf: 0.7
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)\\Installer\d+\\Release\\Installer\.pdb$
- id: pdb-cv-gibberish-path
  desc: 'pdb cv gibberish path'
  crit: suspicious
  conf: 0.88
  attack: T1027
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '^[A-Z]:\\([b-df-hj-np-tv-z][aeiou]){4,}'
  not:
  - regex: (?i)\\(release|debug|build|output|publish)\\
- id: pdb-webroot-loader-project
  desc: PDB path under webroot loader project
  crit: suspicious
  conf: 0.9
  attack: T1027
  if:
    type: value
    path: pe.debug.pdb.path
    regex: (?i)\\(xampp|htdocs|wwwroot|inetpub)\\.{0,100}\\loader\\.{0,80}\.pdb$
- id: pdb-squirrel-stubexecutable
  desc: Squirrel StubExecutable PDB path
  crit: component
  conf: 0.99
  if:
    type: value
    path: pe.debug.pdb.path
    exact: C:\Users\ani\code\squirrel\squirrel.windows\build\Release\Win32\StubExecutable.pdb
composite_rules:
- id: suspicious-pdb-location
  desc: PDB in suspicious filesystem location
  crit: suspicious
  conf: 0.85
  any:
  - id: pdb-temp-path
  - id: pdb-downloads-path
  - id: pdb-installer-numbered
  - id: pdb-webroot-loader-project
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/metrics/size::large-file-1mb
- id: offensive-tool-pdb
  desc: Offensive security tool PDB indicator
  crit: suspicious
  conf: 0.9
  any:
  - id: pdb-cobalt-indicator
  - id: pdb-metasploit-indicator
- id: pdb-metasploit-indicator
  desc: Metasploit related PDB path
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/app/moonshiner::seed-fixture-tree
  any:
  - id: pdb-metasploit-indicator--rx-1
  - id: pdb-metasploit-indicator--rx-2
  - id: pdb-metasploit-indicator--rx-3
  - id: pdb-metasploit-indicator--rx-4
  - id: pdb-metasploit-indicator--rx-5
  - id: pdb-metasploit-indicator--rx-6
