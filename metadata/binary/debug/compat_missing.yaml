defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: onenotem-pdb
    desc: OneNoteM themed PDB basename
    crit: notable
    conf: 0.96
    if:
      type: kv
      path: debug.pdb_path
      regex: '(?i)(^|[\\/])OneNoteM\.pdb$'
  - id: wow-helper-pdb
    desc: wow_helper themed PDB basename
    crit: notable
    conf: 0.96
    if:
      type: kv
      path: debug.pdb_path
      regex: '(?i)(^|[\\/])wow_helper\.pdb$'
  - id: basic-loader-pdb
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_basic_loader_pdb__
  - id: office-source-engine-pdb
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_office_source_engine_pdb__
  - id: pdb-cpython-wininst
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_pdb_cpython_wininst__
  - id: pdb-unix-absolute-path
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_pdb_unix_absolute_path__
