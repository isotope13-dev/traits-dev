defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: onenotem-pdb
    desc: OneNoteM themed PDB basename
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])OneNoteM\.pdb$'
  - id: wow-helper-pdb
    desc: wow_helper themed PDB basename
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])wow_helper\.pdb$'
  - id: basic-loader-pdb
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_basic_loader_pdb__
  - id: office-source-engine-pdb
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_office_source_engine_pdb__
  - id: pdb-cpython-wininst
    desc: CPython distutils bdist_wininst stub PDB path
    crit: baseline
    conf: 0.98
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)[\\/]cpython[0-9]+[\\/]lib[\\/]distutils[\\/]command[\\/]wininst'
  - id: pdb-unix-absolute-path
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_pdb_unix_absolute_path__
