defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: onenotem-pdb
    desc: OneNoteM themed PDB basename
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])OneNoteM\.pdb$'
  - id: wow-helper-pdb
    desc: wow_helper themed PDB basename
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])wow_helper\.pdb$'
  - id: basic-loader-pdb
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_basic_loader_pdb__
  - id: office-source-engine-pdb
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_office_source_engine_pdb__
  - id: pdb-cpython-wininst
    desc: CPython distutils bdist_wininst stub PDB path
    crit: baseline
    conf: 0.98
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)[\\/]cpython[0-9]+[\\/]lib[\\/]distutils[\\/]command[\\/]wininst'
  - id: cpython-wininst-stub-basename
    desc: CPython wininst installer stub filename
    crit: notable
    conf: 0.98
    if:
      type: basename
      regex: '(?i)^wininst-[0-9]+(\.[0-9]+)+\.exe$'
  - id: cpython-wininst-python-marker
    desc: CPython wininst installer marker
    crit: notable
    conf: 0.98
    if:
      type: text
      section: .data
      regex: '(?i)(python%d%d\.dll|No Python installation found in the registry)'
  - id: pdb-unix-absolute-path
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_pdb_unix_absolute_path__
composite_rules:
  - id: cpython-wininst-stub-context
    desc: Recognized CPython wininst installer stub
    crit: exception
    conf: 1.0
    all:
      - id: cpython-wininst-stub-basename
      - id: cpython-wininst-python-marker
