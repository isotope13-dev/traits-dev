defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: project161-release-pdb
    desc: Project161 Release PDB path
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: (?i)Project161d?\\Release\\Project161\.pdb$
      section: .rdata
  - id: uinistrator-dev-path
    desc: Uinistrator Visual Studio path
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)\\Uinistrator\\source\\repos\\
      section: .rdata
composite_rules:
  - id: project161-visualstudio-pdb
    desc: Project161 Visual Studio debug lineage
    crit: suspicious
    conf: 0.98
    all:
      - id: project161-release-pdb
      - id: uinistrator-dev-path
