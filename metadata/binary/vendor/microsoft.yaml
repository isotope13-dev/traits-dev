defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: microsoft-corporation-author-string
    desc: '"Microsoft Corporation" vendor/author string'
    crit: component
    conf: 0.9
    for: [oledoc, ole, c, cpp]
    if:
      type: text
      substr: Microsoft Corporation
  - id: microsoft-corp-marker-rsrc
    desc: Microsoft vendor marker in resource section
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft (Corporation|Code Signing PCA|Time-Stamp PCA)
      section: .rsrc
  - id: microsoft-corp-marker-rdata
    desc: Microsoft vendor marker in read-only data
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft (Corporation|Code Signing PCA|Time-Stamp PCA)
      section: .rdata
  - id: microsoft-corp-marker-cert
    desc: Microsoft certificate-chain identity marker
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: Microsoft (Corporation|Code Signing PCA)
      offset_range: [-16384, null]
  - id: microsoft-corp-versioninfo
    desc: Claims Microsoft Corp in version resource
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft Corp(oration)?\.?
      section: .rsrc
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: is-microsoft-named
    desc: File name contains Microsoft
    crit: component
    conf: 0.8
    if:
      type: path
      basename: true
      substr: microsoft
      case_insensitive: true

  - id: microsoft-company-string-rdata
    desc: Bare Microsoft company name string in rdata
    crit: component
    conf: 0.7
    if:
      type: text
      exact: Microsoft
      section: rdata

  - id: windows-os-product-name
    desc: Windows OS product name in version resource
    crit: component
    conf: 0.8
    if:
      type: value
      path: pe.version.product_name
      exact: Microsoft® Windows® Operating System

  - id: msse-product-name
    desc: "MS Security Essentials product name"
    crit: component
    conf: 0.92
    if:
      type: text
      exact: Microsoft Security Essentials
      section: rdata

  - id: windows-production-pca-2011-string
    desc: Windows Production PCA 2011 string
    crit: component
    conf: 0.7
    if:
      type: text
      regex: Microsoft Windows( Production PCA 2011)?
      section: rdata

  - id: syncmgr-registry-cluster
    desc: Windows SyncMgr\Handlers registry key string
    crit: component
    conf: 0.9
    size_min: 100000
    size_max: 2000000
    if:
      type: text
      substr: 'SyncMgr\Handlers'
      section: rdata

  - id: syncmgr-handler-clsid
    desc: Windows SyncMgr handler CLSID string
    crit: component
    conf: 0.9
    size_min: 100000
    size_max: 2000000
    if:
      type: text
      exact: "{F897AA24-BDC3-11d1-B85B-00C04FB93981}"
      section: rdata

  - id: mobsync-pdb-path
    desc: Windows mobsync PDB path
    crit: component
    conf: 0.9
    size_min: 100000
    size_max: 2000000
    if:
      type: value
      path: pe.debug.pdb.path
      regex: (?i)(^|[\\/])mobsync\.pdb$

  - id: mobsync-version-name
    desc: Windows mobsync.exe version filename
    crit: component
    conf: 0.9
    size_min: 100000
    size_max: 2000000
    if:
      type: text
      exact: mobsync.exe
      section: rdata
composite_rules:
  - id: benign-unsigned-microsoft-import-heavy-context
    desc: Benign unsigned Microsoft binary with many imports
    crit: component
    all:
    - id: microsoft-corp-versioninfo
    - id: metadata/binary/metrics/structural::many-imports
  - id: microsoft-corp-marker
    desc: Microsoft identity or certificate-chain marker
    crit: notable
    conf: 0.9
    any:
      - id: microsoft-corp-marker-rsrc
      - id: microsoft-corp-marker-rdata
      - id: microsoft-corp-marker-cert
