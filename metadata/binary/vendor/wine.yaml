# Identity of Wine builtin PE DLLs and, more generally, of any binary that
# *implements* (exports) the native Windows API surface rather than calling it.
#
# Wine ships PE reimplementations of the Windows system DLLs (crypt32,
# kernelbase, kernel32, srclient, ntdll, …). These legitimately contain the
# full injection / certificate-store / system-restore API surface because they
# PROVIDE it to the Windows programs running on top. Malware *imports* those
# APIs to abuse them; the implementer *exports* them — that direction is the
# discriminator. Offensive composites reference this as `unless` so the API
# provider DLL is never mistaken for the attacker. Generalizes to genuine
# Windows system DLLs and ReactOS, not just Wine.
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
- id: wine-builtin-dll-marker
  desc: Wine builtin DLL marker string
  crit: component
  conf: 0.96
  if:
    type: text
    substr: Wine builtin DLL
      # Wine writes this marker into the DOS stub (offset 0x40) of every
      # builtin PE, replacing the usual "cannot be run in DOS mode" text.
    offset_range: [0, 256]
- id: exports-cert-add-api
  desc: Exports certificate-add-to-store API
  crit: component
  conf: 0.9
  if:
    type: export
    substr: CertAddEncodedCertificateToStore
- id: exports-thread-inject-api--createremotethread
  desc: Exports thread/APC (CreateRemoteThread)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: CreateRemoteThread
- id: exports-thread-inject-api--ntcreatethreadex
  desc: Exports thread/APC injection (NtCreateThreadEx)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: NtCreateThreadEx
- id: exports-thread-inject-api--queueuserapc
  desc: Exports thread/APC injection API (QueueUserAPC)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: QueueUserAPC
- id: exports-mem-map-inject-api--virtualallocex
  desc: Exports memory/section (VirtualAllocEx)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: VirtualAllocEx
- id: exports-mem-map-inject-api--writeprocessmemory
  desc: Exports memory/section (WriteProcessMemory)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: WriteProcessMemory
- id: exports-mem-map-inject-api--ntmapviewofsection
  desc: Exports memory/section (NtMapViewOfSection)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: NtMapViewOfSection
- id: exports-mem-map-inject-api--rtlcreateuserthread
  desc: Exports memory/section (RtlCreateUserThread)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: RtlCreateUserThread
- id: exports-cert-store-api--certcreateselfsigncertificate
  desc: Exports (CertCreateSelfSignCertificate)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: CertCreateSelfSignCertificate
- id: exports-cert-store-api--certunregisterphysicalstore
  desc: Exports (CertUnregisterPhysicalStore)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: CertUnregisterPhysicalStore
- id: exports-system-restore-api--srremoverestorepoint
  desc: Exports (SRRemoveRestorePoint)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: SRRemoveRestorePoint
- id: exports-system-restore-api--srsetrestorepointw
  desc: Exports (SRSetRestorePointW)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: SRSetRestorePointW
- id: exports-system-restore-api--srsetrestorepointa
  desc: Exports (SRSetRestorePointA)
  crit: component
  conf: 0.9
  if:
    type: export
    exact: SRSetRestorePointA
composite_rules:
  # An OS-implementer DLL exports offensive APIs from multiple categories; a
  # single export is noise, so require at least two categories.
- id: exports-thread-inject-api
  desc: Exports thread/APC injection API
  crit: component
  conf: 0.9
  any:
  - id: exports-thread-inject-api--createremotethread
  - id: exports-thread-inject-api--ntcreatethreadex
  - id: exports-thread-inject-api--queueuserapc
- id: exports-mem-map-inject-api
  desc: Exports memory/section injection API
  crit: component
  conf: 0.9
  any:
  - id: exports-mem-map-inject-api--virtualallocex
  - id: exports-mem-map-inject-api--writeprocessmemory
  - id: exports-mem-map-inject-api--ntmapviewofsection
  - id: exports-mem-map-inject-api--rtlcreateuserthread
- id: exports-cert-store-api
  desc: Exports certificate-store management API
  crit: component
  conf: 0.9
  any:
  - id: exports-cert-store-api--certcreateselfsigncertificate
  - id: exports-cert-store-api--certunregisterphysicalstore
- id: exports-system-restore-api
  desc: Exports system-restore-point API
  crit: component
  conf: 0.9
  any:
  - id: exports-system-restore-api--srremoverestorepoint
  - id: exports-system-restore-api--srsetrestorepointw
  - id: exports-system-restore-api--srsetrestorepointa
- id: exports-native-offensive-api-surface
  desc: Exports native Windows offensive API surface
  crit: component
  conf: 0.9
  needs: 2
  any:
  - id: exports-thread-inject-api
  - id: exports-mem-map-inject-api
  - id: exports-cert-store-api
  - id: exports-cert-add-api
  - id: exports-system-restore-api

- id: windows-system-implementer-dll
  desc: Windows system DLL implementer or API provider
  crit: component
  conf: 0.95
  any:
  - id: wine-builtin-dll-marker
  - id: exports-native-offensive-api-surface
