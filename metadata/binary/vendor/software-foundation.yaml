defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: python-software-foundation-marker
    desc: Python Software Foundation vendor marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Python Software Foundation
      section: rdata
  - id: epic-games-inc-marker
    desc: Epic Games Inc vendor marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Epic Games, Inc.
      section: rdata
  - id: javaw-original-filename
    desc: Original filename is javaw.exe
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.original_filename
      exact: javaw.exe
  - id: oracle-java-versioninfo
    desc: Oracle Java version-resource identity
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version
      regex: 'Oracle Corporation|Java\(TM\) Platform SE binary|Java\(TM\) Platform SE 8'
  - id: oracle-javaw-imphash
    desc: Oracle javaw.exe import hash
    crit: component
    conf: 0.995
    if:
      type: value
      path: pe.imphash
      exact: e8430c833f339cd7cf45c7f2a8132cef
  - id: javaw-pdb-path
    desc: javaw.exe PDB path marker
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])javaw\.pdb$'

composite_rules:
  - id: oracle-javaw-launcher
    desc: Oracle Java javaw launcher identity
    crit: baseline
    conf: 0.99
    all:
      - id: javaw-original-filename
      - id: metadata/build/manifest::pe-oracle-java-manifest-identity
    any:
      - id: oracle-java-versioninfo
      - id: oracle-javaw-imphash
      - id: javaw-pdb-path
