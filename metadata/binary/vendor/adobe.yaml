defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: adobe-inc-marker-rsrc
    desc: Adobe vendor marker in resource section
    crit: component
    conf: 0.92
    if:
      type: text
      substr: Adobe Inc
      section: .rsrc
  - id: adobe-inc-marker-rdata
    desc: Adobe vendor marker in read-only data
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Adobe Inc
      section: .rdata
  - id: adobe-systems-inc-marker
    desc: Adobe legacy vendor marker in resource
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: Adobe Systems Incorporated
      section: .rsrc
  - id: adobe-version-info-company
    desc: Adobe vendor marker in PE version info
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: pe.version.company
      regex: "^Adobe(\\s|\\.|$)"
      case_insensitive: true
  - id: adobe-installer-product
    desc: Adobe Installer product name
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: pe.version.product_name
      substr: Adobe Installer
composite_rules:
  - id: adobe-installer-context
    desc: Adobe installer version-resource context
    crit: baseline
    conf: 0.95
    any:
      - id: adobe-version-info-company
      - id: adobe-installer-product
