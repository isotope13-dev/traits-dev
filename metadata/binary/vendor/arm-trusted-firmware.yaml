defaults:
  platforms: [linux]
  for: [elf]
  crit: baseline

traits:
  - id: arm-trusted-firmware-version-string
    desc: ARM Trusted Firmware version string
    conf: 0.9
    if:
      type: raw
      substr: '(release):lts-'

  - id: arm-trusted-firmware-bl31-main-symbol
    desc: ARM Trusted Firmware BL31 main symbol
    conf: 0.98
    if:
      type: raw
      substr: bl31_main

  - id: arm-trusted-firmware-bl31-entrypoint-symbol
    desc: ARM Trusted Firmware BL31 entrypoint symbol
    conf: 0.98
    if:
      type: raw
      substr: bl31_entrypoint

  - id: arm-trusted-firmware-runtime-service-symbol
    desc: ARM Trusted Firmware runtime service symbol
    conf: 0.98
    if:
      type: raw
      substr: runtime_svc_init

  - id: arm-trusted-firmware-psci-handler-symbol
    desc: ARM Trusted Firmware PSCI handler symbol
    conf: 0.98
    if:
      type: raw
      substr: psci_smc_handler

composite_rules:
  - id: arm-trusted-firmware-bl31-image
    desc: ARM Trusted Firmware BL31 image
    crit: baseline
    conf: 0.99
    any:
      - id: arm-trusted-firmware-version-string
      - id: arm-trusted-firmware-bl31-main-symbol
      - id: arm-trusted-firmware-bl31-entrypoint-symbol
      - id: arm-trusted-firmware-runtime-service-symbol
      - id: arm-trusted-firmware-psci-handler-symbol
    needs: 3
