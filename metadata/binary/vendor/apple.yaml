# Apple-vendor-identity composites. Aggregates bundle-id, framework usage,
# project-marker, and platform code-signature into "is this a legitimate Apple
# system binary" signals.
defaults:
  crit: baseline
  platforms:
    - macos
  for:
    - macho
    - dylib
traits:
  - id: bundle-id
    desc: "Apple bundle ID"
    conf: 0.95
    if:
      id: metadata/binary/bundle::generic-apple
    unless:
      - id: metadata/binary/bundle::mail
      - id: metadata/binary/bundle::ichat
      - id: metadata/binary/bundle::messages
      - id: metadata/binary/bundle::dt-runtime
      - id: metadata/binary/bundle::quarantine
composite_rules:
  - id: bundle-and-project
    desc: Apple bundle identifier with project marker
    conf: 0.95
    for: [macho]
    all:
      - id: bundle-id
      - id: metadata/binary/provenance::project-marker
  - id: bundle-and-framework
    desc: Apple bundle identifier with framework path
    conf: 0.95
    for: [macho]
    all:
      - id: bundle-id
      - id: metadata/import/framework::any-apple-framework
  - id: project-and-framework
    desc: Apple project marker with framework path
    conf: 0.95
    for: [macho]
    all:
      - id: metadata/binary/provenance::project-marker
      - id: metadata/import/framework::any-apple-framework
  - id: system-component-indicators
    desc: Apple system component structure
    conf: 0.95
    for: [macho]
    any:
      - id: bundle-and-project
      - id: bundle-and-framework
      - id: project-and-framework
      - id: metadata/binary/provenance::project-marker
  - id: system-component
    desc: Apple system component (legitimate macOS)
    conf: 0.95
    for: [macho]
    all:
      - id: metadata/signed/platform::apple
      - id: system-component-indicators
