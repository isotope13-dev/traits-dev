defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  crit: baseline
  conf: 0.9
traits:
  - id: realnetworks-company-version
    desc: RealNetworks, Inc. company version text
    if:
      type: text
      exact: RealNetworks, Inc.
      section: .rsrc
  - id: realplayer-32-product-version
    desc: RealPlayer (32-bit) product version text
    if:
      type: text
      exact: RealPlayer (32-bit)
      section: .rsrc
  - id: realplayer-helper-description
    desc: RealPlayer Upgrade Helper file description text
    if:
      type: text
      exact: Upgrade Helper
      section: .rsrc
