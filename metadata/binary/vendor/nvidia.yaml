defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.99

traits:
  - id: nvidia-cuda-cubin-sections
    desc: NVIDIA CUDA CUBIN section set
    crit: notable
    conf: 0.98
    platforms: [linux]
    for: [elf]
    if:
      type: section
      substr: .nv.
  - id: nvidia-nvapi-original-filename
    desc: NVIDIA NVAPI original filename metadata
    if:
      type: value
      path: pe.version.original_filename
      exact: nvapi.dll
  - id: nvidia-nvapi-internal-name
    desc: NVIDIA NVAPI internal name metadata
    if:
      type: value
      path: pe.version.internal_name
      exact: nvapi.dll
  - id: nvidia-nvapi-product-name
    desc: NVIDIA Windows driver product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: NVIDIA Windows drivers
