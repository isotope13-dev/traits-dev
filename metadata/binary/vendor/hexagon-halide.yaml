defaults:
  platforms: [linux]
  for: [elf]
  crit: baseline

traits:
  - id: quic-hexagon-clang-comment
    desc: QuIC Hexagon Clang toolchain comment
    conf: 0.95
    if:
      type: text
      section: .comment
      substr: QuIC LLVM Hexagon Clang version

  - id: halide-hexagon-remote-profiler-symbol
    desc: Halide Hexagon remote profiler symbol
    conf: 0.98
    if:
      type: export
      exact: halide_hexagon_remote_profiler_get_global_instance

  - id: halide-library-loader-symbol
    desc: Halide library loader symbol
    conf: 0.95
    if:
      type: export
      exact: halide_load_library

  - id: qdsp6-start-symbol
    desc: QDSP6 start symbol
    conf: 0.95
    if:
      type: export
      exact: qdsp6_start_main

  - id: hexagon-hvx-lock-symbol
    desc: Hexagon HVX lock symbol
    conf: 0.95
    if:
      type: export
      exact: qurt_hvx_lock

composite_rules:
  - id: halide-hexagon-sim-remote-binary
    desc: Halide Hexagon simulator remote binary
    crit: baseline
    conf: 0.99
    any:
      - id: quic-hexagon-clang-comment
      - id: halide-hexagon-remote-profiler-symbol
      - id: halide-library-loader-symbol
      - id: qdsp6-start-symbol
      - id: hexagon-hvx-lock-symbol
    needs: 3
