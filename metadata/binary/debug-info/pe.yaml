defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: pdb-absolute-path
    desc: Embedded absolute PDB path
    crit: baseline
    conf: 0.72
    if:
      type: string_value
      regex: (?i)^[A-Z]:.{1,120}\.pdb$
      section: .rdata
  - id: pdb-random-basename
    desc: Lowercase random PDB basename
    crit: notable
    conf: 0.78
    if:
      type: string_value
      regex: ^[a-z]{8,16}\.pdb$
      section: .rdata
  - id: pdb-temp-path
    desc: PDB path in temp directory
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: (?i)\\(temp|tmp)\\.{1,60}\.pdb$
      section: .text
  - id: pdb-users-path
    desc: PDB path with user profile
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)\\users\\.{1,30}\\.{0,60}\.pdb$
      section: .text
  - id: pdb-desktop-path
    desc: PDB path on Desktop
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)\\desktop\\.{1,60}\.pdb$
      section: .text
  - id: pdb-downloads-path
    desc: PDB path in Downloads
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: (?i)\\downloads\\.{1,60}\.pdb$
      section: .text
  - id: pdb-short-project-name
    desc: PDB with very short project name
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: \\[a-zA-Z]{1,3}\.pdb$
      section: .text
  - id: pdb-numbered-path
    desc: PDB in numbered directory (build artifacts)
    crit: baseline
    conf: 0.45
    if:
      type: string_value
      regex: \\[0-9]+\\.{1,60}\.pdb$
      section: .text
  - id: pdb-cobalt-indicator
    desc: Cobalt Strike related PDB path
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: (?i)(beacon|cobaltstrike|sleeve).{0,30}\.pdb$
      section: .text
  - id: pdb-metasploit-indicator
    desc: Metasploit related PDB path
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: (?i)(meterpreter|metasploit|msf).{0,30}\.pdb$
      section: .text
  - id: pdb-visual-studio
    desc: Visual Studio build path
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: (?i)\\(Release|Debug)\\.{1,60}\.pdb$
      section: .text
  - id: pdb-unc-path
    desc: PDB path on UNC network share
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: ^\\\\.{1,60}\\.{1,80}\.pdb$
      section: .text
  - id: pdb-jenkins-build
    desc: Jenkins CI build path
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: \\jenkins\\workspace\\
      section: .text
  - id: pdb-nonstandard-drive
    desc: PDB path on non-standard drive letter
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: (?i)^[D-Z]:\\.{1,80}\.pdb$
      section: .text
    not:
      - regex: (?i)^[D-Z]:\\(a|agent|build|bld|src|jenkins|workspace|teamcity)
  - id: venvlauncher-pdb
    desc: Python venvlauncher PDB path
    crit: baseline
    conf: 0.96
    if:
      type: string_value
      substr: venvlauncher.pdb
      section: .rdata
  - id: pdb-odesk-installmetrix
    desc: oDesk/InstallMetrix dropper PDB path
    crit: notable
    conf: 0.98
    if:
      type: string_value
      regex: (?i)oDesk.{0,40}InstallMetrix
      section: .rdata
  - id: pdb-installer-numbered
    desc: PDB path with numbered installer build dir
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (?i)\\Installer\d+\\Release\\Installer\.pdb$
      section: .rdata
composite_rules:
  - id: suspicious-pdb-location
    desc: PDB in suspicious filesystem location
    crit: suspicious
    conf: 0.85
    any:
      - id: pdb-temp-path
      - id: pdb-downloads-path
      - id: pdb-installer-numbered
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format::large-executable
  - id: offensive-tool-pdb
    desc: Offensive security tool PDB indicator
    crit: suspicious
    conf: 0.9
    any:
      - id: pdb-cobalt-indicator
      - id: pdb-metasploit-indicator
