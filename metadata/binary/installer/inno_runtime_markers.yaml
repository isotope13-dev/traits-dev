defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: appmutex-string
    desc: AppMutex string marker
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: AppMutex

  - id: setupmutex-string
    desc: SetupMutex string marker
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: SetupMutex

  - id: winhttp-system32-manifest
    desc: WinHTTP system32 manifest dependency
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: (?i)<file name="winhttp\.dll" loadFrom="%SystemRoot%\\system32\\"

composite_rules:
  - id: inno-mutex-pair
    desc: Inno-style mutex pair marker
    crit: notable
    conf: 0.9
    all:
      - id: appmutex-string
      - id: setupmutex-string
