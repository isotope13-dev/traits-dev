defaults:
  platforms: [windows]
  crit: baseline
  conf: 0.85
  for: [binaries]
traits:
  - id: registry-path-compuserve
    desc: Legacy Compuserve registry path
    if:
      type: text
      regex: (?i)Software\\Compuserve
      section: .text
  - id: simtel-downloader-product
    desc: Simtel Downloader product marker
    crit: component
    conf: 0.96
    size_min: 500000
    size_max: 1500000
    if:
      type: text
      exact: Simtel Downloader
      section: rdata
  - id: getrighttogo-manifest
    desc: GetRightToGo downloader manifest marker
    crit: component
    conf: 0.9
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    size_min: 500000
    size_max: 1500000
    if:
      type: text
      substr: GetRightToGo.com Downloader
      section: rsrc
