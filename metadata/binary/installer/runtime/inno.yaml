defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: appmutex-string
    desc: AppMutex string marker
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: AppMutex
      section: rdata

  - id: setupmutex-string
    desc: SetupMutex string marker
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: SetupMutex
      section: rdata

  - id: winhttp-system32-manifest
    desc: WinHTTP system32 manifest dependency
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: (?i)<file name="winhttp\.dll" loadFrom="%SystemRoot%\\system32\\"
      section: rsrc

  - id: jr-inno-setup-manifest
    desc: JR.Inno.Setup side-by-side manifest identity
    crit: baseline
    conf: 0.85
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      exact: JR.Inno.Setup

  - id: vcl-twizardform-resource
    desc: Inno VCL TWizardForm resource marker
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: TWIZARDFORM
      section: .rsrc

  - id: vcl-tuninstall-progress-resource
    desc: Inno VCL uninstall form resource marker
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: TUNINSTALLPROGRESSFORM
      section: .rsrc

  - id: vcl-tuninst-shared-resource
    desc: Inno VCL shared form resource marker
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: TUNINSTSHAREDFILEFORM
      section: .rsrc

composite_rules:
  - id: inno-mutex-pair
    desc: Inno-style mutex pair marker
    crit: notable
    conf: 0.9
    all:
      - id: appmutex-string
      - id: setupmutex-string
