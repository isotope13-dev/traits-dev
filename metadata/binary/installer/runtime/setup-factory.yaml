defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.99
traits:
  - id: setup-factory-runtime-product
    desc: Setup Factory Runtime product metadata
    crit: notable
    if:
      type: value
      path: pe.version.product_name
      exact: Setup Factory Runtime
  - id: setup-factory-launcher-marker
    desc: Setup Factory self-extracting launcher marker
    crit: notable
    if:
      type: text
      section: .rdata
      regex: '(?i)_ir_sf_temp|Could not find setup size|Failed to read setup engine'
composite_rules:
  - id: setup-factory-runtime
    desc: Indigo Rose Setup Factory self-extracting runtime
    crit: notable
    conf: 0.99
    all:
      - id: setup-factory-runtime-product
      - id: setup-factory-launcher-marker
