defaults:
  platforms: [windows]
  for: [oledoc]

traits:
  - id: msi-runtime-file-table-pair
    desc: MSI file table pairs NGenTask with mscorsvc
    crit: notable
    conf: 0.98
    if:
      type: raw
      regex: '(?is)ngentask\.exe.{0,80}mscorsvc\.dll'

  - id: msi-adobe-acrobat-branding
    desc: MSI metadata claims Adobe Acrobat
    crit: notable
    conf: 0.99
    if:
      type: value
      path: office.creator
      exact: Adobe Acrobat

  - id: msi-wix-toolset-branding
    desc: MSI metadata identifies WiX Toolset
    crit: notable
    conf: 0.99
    if:
      type: value
      path: office.application
      regex: 'WiX Toolset \([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\)'
