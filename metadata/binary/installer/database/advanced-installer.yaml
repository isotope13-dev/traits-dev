defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: packaging-tool-banner
    desc: Advanced Installer packaging banner
    crit: component
    conf: 0.99
    if:
      type: text
      substr: AI_PACKAGING_TOOLAdvanced Installer
      section: .rdata
  - id: bootstrapper-flag
    desc: Advanced Installer bootstrapper flag
    crit: component
    conf: 0.97
    if:
      type: text
      exact: AI_BOOTSTRAPPER
      section: .rdata
  - id: caphyon-registry-root
    desc: Caphyon registry root marker
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Software\Caphyon\Advanced Installer\
      section: .rdata
  - id: prereq-directory-marker
    desc: Advanced Installer prereq path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: AI_PREREQS_DIR
      section: .rdata
  - id: ai-custom-action-dll
    desc: AICustAct.dll custom-action binary
    crit: component
    conf: 0.97
    if:
      type: basename
      regex: (?i)^AICustAct(_x64)?\.dll$
  - id: ai-powershell-launcher-dll
    desc: Advanced Installer PowerShell launcher DLL
    crit: suspicious
    conf: 0.9
    if:
      type: basename
      regex: (?i)^(Binary\.)?PowerShellScriptLauncher\.dll$
  - id: ai-powershell-launcher-dll-raw
    desc: Advanced Installer PowerShell launcher DLL
    crit: suspicious
    conf: 0.92
    for: [oledoc, ole]
    if:
      type: raw
      substr: PowerShellScriptLauncher.dll
  - id: ai-custom-action-dll-raw
    desc: Advanced Installer custom-action DLL
    crit: component
    conf: 0.9
    for: [oledoc, ole]
    if:
      type: raw
      regex: (?i)aicustact\.dll
  - id: packaging-tool-banner-raw
    desc: Advanced Installer packaging banner
    crit: component
    conf: 0.97
    for: [oledoc, ole]
    if:
      type: raw
      substr: AI_PACKAGING_TOOLAdvanced Installer
  - id: ai-software-detector-dll
    desc: Advanced Installer software-detector DLL
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: (?i)^(Binary\.)?SoftwareDetector\.dll$
  - id: ai-no-updater-install-gui
    desc: NoUpdaterInstallGUI flag
    crit: component
    conf: 0.9
    if:
      type: text
      substr: NoUpdaterInstallGUI
      section: rdata
  - id: ai-no-disable-auto-check
    desc: NoDisableAutoCheck flag
    crit: component
    conf: 0.9
    if:
      type: text
      substr: NoDisableAutoCheck
      section: rdata
  - id: ai-check-frequency-one
    desc: Advanced Installer CheckFrequency=1
    crit: component
    conf: 0.9
    if:
      type: text
      regex: \bCheckFrequency\s*=\s*1\b
      section: rdata
composite_rules:
  - id: advanced-installer-bootstrapper
    desc: Advanced Installer bootstrapper marker
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: metadata/binary/installer/database::packaging-tool-banner
      - id: metadata/binary/installer/database::bootstrapper-flag
      - id: metadata/binary/installer/database::caphyon-registry-root
      - id: metadata/binary/installer/database::prereq-directory-marker
  - id: ai-silent-forced-updater
    desc: Advanced Installer silent forced-update config
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: metadata/binary/installer/database::ai-no-updater-install-gui
      - id: metadata/binary/installer/database::ai-no-disable-auto-check
      - id: metadata/binary/installer/database::ai-check-frequency-one
  - id: ai-custom-action-powershell-stager
    desc: Advanced Installer PowerShell stager binary
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/installer/database::advanced-installer-bootstrapper
    any:
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll-raw
      - id: metadata/binary/installer/database::ai-custom-action-dll
      - id: metadata/binary/installer/database::ai-custom-action-dll-raw
      - id: metadata/binary/installer/database::ai-software-detector-dll
