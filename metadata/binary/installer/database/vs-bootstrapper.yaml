defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: vstoee-dll-marker
    desc: VSTO execution engine reference
    crit: component
    conf: 1.0
    if:
      type: text
      exact: vstoee.dll
      section: rdata
  - id: dfshim-dll-marker
    desc: ClickOnce deployment shim reference
    crit: component
    conf: 1.0
    if:
      type: text
      exact: dfshim.dll
      section: rdata
  - id: install-vsto-via-vstoee
    desc: VSTO solution install message
    crit: component
    conf: 1.0
    if:
      type: text
      exact: Installing VSTO solution via vstoee
      section: rdata
  - id: launch-via-dfshim
    desc: ClickOnce launch via dfshim message
    crit: component
    conf: 1.0
    if:
      type: text
      exact: Launching application manifest via dfshim
      section: rdata
  - id: msi-product-check-marker
    desc: VS bootstrapper MsiProductCheck routine
    crit: component
    conf: 1.0
    if:
      type: text
      exact: MsiProductCheck
      section: rdata
  - id: vs-bootstrapper-aversion-prefix
    desc: VS bootstrapper AVersion comparison helpers
    crit: component
    conf: 1.0
    if:
      type: text
      regex: AVersion(EqualTo|LessThan|GreaterThan)
      section: rdata
composite_rules:
  - id: vs-setup-bootstrapper
    desc: Microsoft Visual Studio setup bootstrapper
    crit: notable
    conf: 0.98
    all:
      - id: vstoee-dll-marker
      - id: dfshim-dll-marker
    any:
      - id: install-vsto-via-vstoee
      - id: launch-via-dfshim
      - id: msi-product-check-marker
      - id: vs-bootstrapper-aversion-prefix
