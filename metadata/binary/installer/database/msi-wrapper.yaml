defaults:
  platforms: [windows]
  for: [oledoc]
  crit: component
  conf: 0.98

traits:
  - id: internet-explorer-wrapper-title
    desc: MSI title claims Internet Explorer
    if:
      type: value
      path: office.title
      regex: '(?i)^Internet Explorer.{0,80}Wrapped using MSI Wrapper'

  - id: msi-wrapper-microsoft-author
    desc: MSI author claims Microsoft Corporation
    if:
      type: value
      path: office.creator
      exact: Microsoft Corporation

  - id: msi-wrapper-application
    desc: MSI Wrapper application metadata
    if:
      type: value
      path: office.application
      regex: '^MSI Wrapper \([0-9]+(\.[0-9]+){3}\)$'
