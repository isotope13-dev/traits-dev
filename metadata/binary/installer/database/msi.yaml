defaults:
  platforms: [windows]
  for: [oledoc, ole]
  crit: baseline
  conf: 0.85
traits:
  - id: msi-installer-database-title
    desc: Windows Installer database title
    conf: 0.98
    if:
      type: value
      path: office.title
      exact: Installation Database
  - id: wix-toolset-application-metadata
    desc: WiX Toolset application metadata
    crit: notable
    conf: 0.98
    if:
      type: value
      path: office.application
      regex: '^(WiX Toolset|Windows Installer XML Toolset) \([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\)$'
  - id: embedded-data-cab-raw
    desc: Embedded data cabinet stream
    conf: 0.96
    if:
      type: text
      substr: "#data.cab"
  - id: embedded-disk1-cab-raw
    desc: Embedded disk1 cabinet stream
    conf: 0.96
    if:
      type: text
      substr: "#disk1.cab"
  - id: msi-ntuser-member-raw
    desc: MSI cabinet member named ntuser
    crit: notable
    conf: 0.98
    if:
      type: raw
      regex: '\x00ntuser\x00'
  - id: embedded-vbs-payload-raw
    desc: Embedded VBScript payload entry
    conf: 0.95
    if:
      type: text
      substr: VbsFile
  - id: embedded-powershell-payload-raw
    desc: Embedded PowerShell payload entry
    conf: 0.95
    if:
      type: text
      substr: Ps1File
  - id: embedded-mscf-cabinet
    desc: Embedded Microsoft cabinet header
    conf: 0.92
    if:
      type: raw
      regex: '\x4d\x53\x43\x46'
  - id: msi-filename
    desc: MSI filename extension
    conf: 0.99
    if:
      type: basename
      regex: '(?i)\\.msi$'
  - id: msi-opaque-ole-stream-names
    desc: MSI contains non-ASCII OLE stream names
    crit: baseline
    conf: 0.94
    count_min: 10
    if:
      type: value
      path: office.streams
      regex: '^/.*[^\\x00-\\x7f].*$'
  - id: embedded-pe-stream-0
    desc: Embedded PE stream in MSI
    crit: notable
    conf: 0.94
    if:
      type: value
      path: embedded[0].kind
      exact: pe
  - id: embedded-pe-stream-1
    desc: Second embedded PE stream in MSI
    crit: notable
    conf: 0.94
    if:
      type: value
      path: embedded[1].kind
      exact: pe
  - id: chromeseqx-oooo-pair
    desc: MSI stages ChromeSeqx and OOOO pair
    crit: component
    conf: 0.99
    if:
      type: raw
      regex: 'ChromeSeqx\.exe.{0,64}OOOO\.exe|OOOO\.exe.{0,64}ChromeSeqx\.exe'
  - id: python-msi-library
    desc: Python MSI Library authoring marker
    conf: 0.92
    if:
      type: text
      substr: Python MSI Library
  - id: msi-localappdata-install-root
    desc: MSI installs beneath LocalAppData
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: LocalAppDataFolder
  - id: custom-action-vbs-launcher-raw
    desc: MSI custom action launches VBS
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: \bRun[a-zA-Z0-9_]*Vbs[a-zA-Z0-9_]*\b
  - id: wscript-vbscript-custom-action-raw
    desc: MSI custom action runs VBScript
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(?i)wscript\.exe\s+//B\s+//?E:vbscript'
  - id: embedded-node-runtime-raw
    desc: Embedded Node.js runtime strings
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: NodeRuntime.waitingForDebugger
  - id: random-software-installed-marker-raw
    desc: Randomized software installed marker
    crit: component
    conf: 0.88
    if:
      type: raw
      regex: 'Software\\[A-Za-z]{10,}installed'
  - id: exe2msi-package-title-raw
    desc: exe2msi package title marker
    crit: component
    conf: 0.96
    if:
      type: text
      substr: exe2msiSetupPackage
  - id: exe2msi-qwertylab-author-raw
    desc: exe2msi QwertyLab author marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: QwertyLab
  - id: embedded-winrar-sfx-raw
    desc: Embedded WinRAR SFX marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: WinRAR SFX module
  - id: winrar-sfx-registry-raw
    desc: Embedded WinRAR SFX registry marker
    crit: component
    conf: 0.97
    if:
      type: text
      substr: 'Software\WinRAR SFX'
  - id: sfx-program-files-x86-path-raw
    desc: SFX extracts under Program Files
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: 'Path=C:\Program Files (x86)'
  - id: sfx-multiple-setup-directives-raw
    desc: SFX uses multiple setup directives
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      substr: Setup=
  - id: sfx-silent-directive-raw
    desc: SFX silent execution directive
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: Silent=1
  - id: sfx-overwrite-directive-raw
    desc: SFX overwrite execution directive
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Overwrite=1

  # These content atoms cover MSI children without scanning arbitrary
  # binaries or scripts.
  - id: msi-script-file-table-pair
    desc: MSI carries PowerShell and command scripts
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?is)\bPs1File\b.{0,160}\bCmdFile\b|\bCmdFile\b.{0,160}\bPs1File\b'
  - id: msi-command-script-file-marker
    desc: MSI command-script file table marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: CmdFile
  - id: msi-script-custom-action-table
    desc: MSI invokes packaged script custom action
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\[[A-Z][A-Z0-9_]{2,}\][A-Za-z0-9_.-]+\.(cmd|bat|ps1)\b'
  - id: msi-file-table-source-target-alias
    desc: MSI source-to-installed filename alias
    crit: notable
    conf: 0.94
    if:
      type: raw
      regex: '(?i)\b[A-Za-z0-9_-]{6,}\.[A-Za-z0-9]{1,5}\|[A-Za-z0-9_.-]{2,}\.[A-Za-z0-9]{1,5}\b'
  - id: msi-microsoft-runtime-file-target-pair
    desc: MSI names Microsoft runtime targets
    crit: notable
    conf: 0.98
    if:
      type: raw
      regex: '(?is)FileComponent_FileName.{0,256}\bngentask\.exe\b.{0,96}\bmscorsvc\.dll\b'
  - id: msi-subject-not-memu-runtime
    desc: MSI subject is outside the MEmu family
    crit: baseline
    conf: 0.92
    if:
      type: value
      path: office.subject
      regex: '.+'
      case_insensitive: true
    not:
      - regex: '(?i)memu|microvirt'
  - id: msi-creator-not-memu-vendor
    desc: MSI creator is outside the Microvirt family
    crit: baseline
    conf: 0.92
    if:
      type: value
      path: office.creator
      regex: '.+'
      case_insensitive: true
    not:
      - regex: '(?i)memu|microvirt'
composite_rules:
  - id: msi-userland-script-install-table
    desc: MSI stores scripts under LocalAppData
    crit: notable
    conf: 0.94
    all:
      - id: msi-localappdata-install-root
    any:
      - id: embedded-powershell-payload-raw
      - id: msi-command-script-file-marker
    needs: 1
    near_bytes: 240
  - id: msi-cabinet-script-layout
    desc: MSI embeds scripts in a cabinet
    crit: suspicious
    conf: 0.97
    all:
      - id: msi-script-file-table-pair
      - id: msi-script-custom-action-table
      - id: msi-userland-script-install-table
      - id: embedded-data-cab-raw
  - id: wix-authored-msi
    desc: WiX-authored MSI package
    crit: notable
    conf: 0.98
    all:
      - id: msi-installer-database-title
      - id: wix-toolset-application-metadata
  - id: script-payload-cabinet
    desc: MSI cabinet with script payloads
    crit: suspicious
    conf: 0.97
    all:
      - id: embedded-data-cab-raw
      - id: embedded-mscf-cabinet
      - id: embedded-vbs-payload-raw
      - id: embedded-powershell-payload-raw
  - id: userland-script-installer
    desc: MSI installs scripts to userland
    crit: suspicious
    conf: 0.95
    all:
      - id: script-payload-cabinet
      - id: msi-localappdata-install-root
  - id: dual-embedded-pe-streams
    desc: MSI carries multiple embedded PE streams
    crit: notable
    conf: 0.96
    all:
      - id: embedded-pe-stream-0
      - id: embedded-pe-stream-1
  - id: node-runtime-userland-installer
    desc: MSI stages Node runtime in userland
    crit: suspicious
    conf: 0.94
    all:
      - id: msi-installer-database-title
      - id: embedded-mscf-cabinet
      - id: msi-localappdata-install-root
      - id: embedded-node-runtime-raw
  - id: exe2msi-wrapper-package
    desc: exe2msi-authored MSI wrapper package
    crit: notable
    conf: 0.98
    all:
      - id: exe2msi-package-title-raw
      - id: exe2msi-qwertylab-author-raw
  - id: embedded-winrar-sfx-package
    desc: MSI contains WinRAR self-extractor
    crit: notable
    conf: 0.98
    any:
      - id: embedded-winrar-sfx-raw
      - id: winrar-sfx-registry-raw
  - id: winrar-sfx-silent-setup-script
    desc: WinRAR SFX silent setup script
    crit: suspicious
    conf: 0.97
    all:
      - id: embedded-winrar-sfx-package
      - id: sfx-multiple-setup-directives-raw
      - id: sfx-silent-directive-raw
      - id: sfx-overwrite-directive-raw
