defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: wix-bootstrapper-manifest
    desc: WiX bootstrapper manifest marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: WiX Toolset Bootstrapper
      section: .rsrc
  - id: wixburn-section-name
    desc: WiX Burn section name marker
    crit: component
    conf: 1.0
    if:
      type: text
      exact: .wixburn
      section: .rdata
  - id: wix-bundle-provider-key
    desc: WiX bundle provider key marker
    crit: component
    conf: 1.0
    if:
      type: text
      exact: WixBundleProviderKey
  - id: wix-burn-runonce-token
    desc: WiX Burn runonce marker
    crit: component
    conf: 1.0
    if:
      type: text
      exact: burn.runonce
composite_rules:
  - id: wix-burn-manifest-pair
    desc: WiX Burn manifest marker pair
    crit: component
    conf: 1.0
    all:
      - id: metadata/binary/installer/database::wix-bootstrapper-manifest
      - id: metadata/binary/installer/database::wixburn-section-name
  - id: wix-burn-runonce-pair
    desc: WiX Burn runonce marker pair
    crit: component
    conf: 1.0
    all:
      - id: metadata/binary/installer/database::wix-bundle-provider-key
      - id: metadata/binary/installer/database::wix-burn-runonce-token
  - id: wix-burn-bootstrapper
    desc: WiX Burn bootstrapper marker
    crit: notable
    conf: 0.98
    any:
      - id: metadata/binary/installer/database::wix-burn-manifest-pair
      - id: metadata/binary/installer/database::wix-burn-runonce-pair
