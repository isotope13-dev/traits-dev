# MSI embedded component libraries that indicate capability
defaults:
  platforms: [windows]
  for: [oledoc]
  crit: notable
  conf: 0.88
traits:
  - id: embedded-taskscheduler-dll
    desc: Embedded .NET TaskScheduler library
    crit: suspicious
    attack: T1053.005
    if:
      type: text
      substr: Microsoft.Win32.TaskScheduler.dll
  - id: embedded-wmi-dll
    desc: Embedded WMI management library
    crit: suspicious
    if:
      type: text
      substr: WMI.dll
  - id: embedded-newtonsoft-json
    desc: Embedded Newtonsoft JSON library
    crit: baseline
    if:
      type: text
      substr: Newtonsoft.Json.dll
  - id: embedded-managed-custom-action
    desc: Managed .NET custom action host
    crit: suspicious
    if:
      type: text
      substr: InvokeManagedCustomActionOutOfProcW
  - id: msi-arpnomodify
    desc: MSI disables Add/Remove modify option
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ARPNOMODIFY
  - id: msi-arpnorepair
    desc: MSI disables Add/Remove repair option
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ARPNOREPAIR
  - id: msi-arpnoremove
    desc: MSI disables Add/Remove removal option
    crit: component
    conf: 0.86
    if:
      type: text
      substr: ARPNOREMOVE
  - id: msi-advanced-installer
    desc: MSI built with Advanced Installer
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AI_DETECTED_
composite_rules:
  - id: msi-persistence-libraries
    desc: MSI bundles task scheduler and WMI
    crit: suspicious
    conf: 0.93
    attack: T1053.005
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: embedded-taskscheduler-dll
      - id: embedded-wmi-dll
  - id: msi-anti-tamper
    desc: MSI disables modification and repair
    crit: suspicious
    conf: 0.87
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: msi-arpnomodify
      - id: msi-arpnorepair
  - id: msi-uninstall-hidden
    desc: MSI hides Add/Remove uninstall action
    crit: suspicious
    conf: 0.88
    all:
      - id: msi-arpnomodify
      - id: msi-arpnoremove
  - id: advanced-installer-locked-install
    desc: Advanced Installer MSI with modification disabled
    crit: suspicious
    conf: 0.88
    all:
      - id: msi-advanced-installer
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: msi-arpnomodify
  - id: advanced-installer-shortcut-nomodify
    desc: Advanced Installer MSI with locked shortcut install
    crit: suspicious
    conf: 0.87
    attack: T1547.001
    all:
      - id: msi-advanced-installer
      - id: msi-arpnomodify
      - id: objectives/persistence/login/startup/shortcut::create-shortcut
