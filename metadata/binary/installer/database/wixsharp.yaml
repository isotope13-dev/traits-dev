defaults:
  platforms: [windows]
  for: [oledoc, ole]
  conf: 0.9
traits:
  - id: wixsharp-runtime-dll
    desc: Embedded WixSharp runtime library
    crit: baseline
    if:
      type: text
      substr: WixSharp.dll
  - id: wixsharp-wpf-ui-dll
    desc: Embedded WixSharp WPF UI library
    crit: baseline
    if:
      type: text
      substr: WixSharp.UI.WPF.dll
  - id: wixtoolset-mba-core-dll
    desc: Embedded WiX MBA core library
    crit: baseline
    if:
      type: text
      substr: WixToolset.Mba.Core.dll
  - id: beforeinstall-custom-action
    desc: WixSharp BeforeInstall custom action
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: WixSharp_BeforeInstall_Action
  - id: beforeinstall-handler-binding
    desc: WixSharp BeforeInstall handler binding
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: WixSharp_BeforeInstall_Handlers
  - id: embedded-csharp-source-entry
    desc: Embedded C# source cabinet entry
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: \b[A-Za-z0-9_-]+\.cs_[0-9]{6,}\b
  - id: csharp-source-component
    desc: MSI component for C# source
    crit: notable
    conf: 0.94
    if:
      type: raw
      regex: Component\.[A-Za-z0-9_-]+\.cs_[0-9]{6,}
  - id: user-profile-absolute-install-path
    desc: Absolute install path under user profile
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: Set_DirAbsolutePathC:\Users\
composite_rules:
  - id: wixsharp-managed-ui-msi
    desc: WixSharp managed UI installer
    crit: notable
    conf: 0.96
    all:
      - id: metadata/binary/installer/database::msi-installer-database-title
    any:
      - id: wixsharp-runtime-dll
      - id: wixsharp-wpf-ui-dll
      - id: wixtoolset-mba-core-dll
    needs: 2
  - id: source-backed-beforeinstall-hook
    desc: Source-backed MSI BeforeInstall hook
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::embedded-managed-custom-action
      - id: beforeinstall-custom-action
      - id: beforeinstall-handler-binding
      - id: embedded-csharp-source-entry
      - id: csharp-source-component
  - id: userland-source-hooked-installer
    desc: Userland WixSharp source installer
    crit: suspicious
    conf: 0.98
    all:
      - id: wixsharp-managed-ui-msi
      - id: source-backed-beforeinstall-hook
      - id: user-profile-absolute-install-path
