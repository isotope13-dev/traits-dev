defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: nsis-version-banner-rsrc
    desc: NSIS version banner in resources
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Nullsoft Install System v2.46-Unicode
      section: .rsrc
  - id: nsis-manifest-exehead
    desc: NSIS exehead assembly manifest
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Nullsoft.NSIS.exehead
      section: .rsrc
  - id: nsis-v3-banner-rsrc
    desc: NSIS v3 banner in resources
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Nullsoft Install System v3.
      section: .rsrc
  - id: nsis-error-title-rdata
    desc: NSIS runtime error title in rdata
    crit: component
    conf: 1.0
    if:
      type: text
      exact: NSIS Error
      section: .rdata
  - id: nsis-error-title-data
    desc: NSIS runtime error title in data
    crit: component
    conf: 1.0
    if:
      type: text
      exact: NSIS Error
      section: .data
  - id: nsis-error-url-rdata
    desc: NSIS runtime error URL in rdata
    crit: component
    conf: 1.0
    if:
      type: text
      substr: nsis.sf.net/NSIS_Error
      section: .rdata
  - id: nsis-error-url-data
    desc: NSIS runtime error URL in data
    crit: component
    conf: 1.0
    if:
      type: text
      substr: nsis.sf.net/NSIS_Error
      section: .data
  - id: nsis-ncrc-switch-data
    desc: NSIS CRC bypass switch string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /NCRC
      section: .data
  - id: nullsoftinst-marker
    desc: NullsoftInst archive marker
    crit: component
    conf: 0.98
    if:
      type: text
      exact: NullsoftInst
      section: .rdata
  - id: nsis-system-plugin
    desc: NSIS System plugin payload
    crit: component
    conf: 0.97
    if:
      type: text
      exact: System.dll
      section: .rdata
  - id: nsis-uac-plugin
    desc: NSIS UAC plugin payload
    crit: component
    conf: 0.97
    if:
      type: text
      exact: UAC.dll
      section: .rdata
  - id: nsis-installoptions-plugin
    desc: NSIS InstallOptions plugin payload
    crit: component
    conf: 0.97
    if:
      type: text
      exact: InstallOptions.dll
      section: .rdata
  - id: nsis-uac-ipc
    desc: NSIS UAC IPC marker
    crit: component
    conf: 0.96
    if:
      type: text
      exact: NSISUACIPC
      section: .rdata
  - id: nsis-sfx-deadbeef-magic
    desc: NSIS SFX stub DEADBEEF marker in code
    crit: component
    conf: 0.95
    if:
      type: hex
      pattern: (68|B9|BA|B8) EF BE AD DE
      section: .text
composite_rules:
  - id: nsis-error-title
    desc: NSIS runtime error title marker
    crit: component
    conf: 1.0
    any:
      - id: metadata/binary/installer/script::nsis-error-title-rdata
      - id: metadata/binary/installer/script::nsis-error-title-data
  - id: nsis-error-url
    desc: NSIS runtime error help URL
    crit: component
    conf: 1.0
    any:
      - id: metadata/binary/installer/script::nsis-error-url-rdata
      - id: metadata/binary/installer/script::nsis-error-url-data
  - id: nsis
    desc: Nullsoft NSIS installer marker
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: metadata/binary/installer/script::nullsoftinst-marker
      - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
      - id: metadata/binary/installer/script::nsis-version-banner-rsrc
      - id: metadata/binary/installer/script::nsis-v3-banner-rsrc
      - id: metadata/binary/installer/script::nsis-manifest-exehead
      - id: metadata/binary/installer/script::nsis-error-title
      - id: metadata/binary/installer/script::nsis-error-url
      - id: metadata/binary/installer/script::nsis-ncrc-switch-data
  - id: nsis-plugin-bundle
    desc: NSIS plugin bundle payloads
    crit: notable
    conf: 0.97
    needs: 2
    any:
      - id: metadata/binary/installer/script::nsis-system-plugin
      - id: metadata/binary/installer/script::nsis-uac-plugin
      - id: metadata/binary/installer/script::nsis-installoptions-plugin
  - id: nsis-uac-bridge
    desc: NSIS UAC elevation bridge markers
    crit: notable
    conf: 0.97
    all:
      - id: metadata/binary/installer/script::nsis-uac-plugin
      - id: metadata/binary/installer/script::nsis-uac-ipc
      - id: metadata/binary/installer/script::nsis-system-plugin
