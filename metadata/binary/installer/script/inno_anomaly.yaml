defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: inno-setup-550-data-marker
    desc: Inno Setup 5.5.0 data marker
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Inno Setup Setup Data (5.5.0)
      section: rdata

  - id: inno-setup-header-670
    desc: Inno Setup 6.7.0 Data Header
    crit: baseline
    if:
      type: hex
      pattern: "49 6E 6E 6F 20 53 65 74 75 70 20 53 65 74 75 70 20 44 61 74 61 20 28 36 2E 37 2E 30 29"
      offset: 0
      # "Inno Setup Setup Data (6.7.0)"

  - id: nested-inno-header-670
    desc: Nested Inno Setup 6.7.0 header in overlay
    crit: suspicious
    if:
      type: hex
      pattern: "49 6E 6E 6F 20 53 65 74 75 70 20 53 65 74 75 70 20 44 61 74 61 20 28 36 2E 37 2E 30 29"
      offset_range: [0x100000, null] # Only if deep in the file (overlay)
    unless:
      - id: metadata/binary/installer/script/
    # Legit installers have uninstaller headers at lower offsets.

  - id: inno-password-canary
    desc: 'Inno Setup password-verification canary'
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: sccPasswordTest
      section: rdata
    unless:
      - id: metadata/binary/installer/script/
    # Legitimate installers rarely use passwords. Droppers often do.

  - id: inno-setup-encryption-key-type
    desc: Inno Setup encryption key type
    crit: component
    conf: 0.98
    if:
      type: text
      exact: TSetupEncryptionKey
      section: rdata

  - id: inno-setup-encryption-nonce-type
    desc: Inno Setup encryption nonce type
    crit: component
    conf: 0.98
    if:
      type: text
      exact: TSetupEncryptionNonce
      section: rdata

  - id: inno-setup-encryption-base-nonce
    desc: Inno Setup encryption base nonce
    crit: component
    conf: 0.98
    if:
      type: text
      exact: EncryptionBaseNonce
      section: rdata

  - id: inno-setup-shared-encryption-func
    desc: Inno Setup shared encryption function
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Shared.EncryptionFunc
      section: rdata

  - id: inno-setup-password-test
    desc: Inno Setup password test canary
    crit: component
    conf: 0.98
    if:
      id: metadata/binary/installer/script::inno-password-canary

  - id: inno-bcrypt-random
    desc: 'Dynamic BCryptGenRandom loader'
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: BCryptGenRandom
      section: rdata
    unless:
      - id: metadata/binary/installer/script/
      - type: basename
        regex: (?i)(\.dll($|_)|^Microsoft\.AspNetCore\.Cryptography\.Internal\.dll$)
      - type: symbol
        exact: BCryptGenRandom
      - id: metadata/binary/framework/
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/signed/developer::johannes-schindelin
    # Dynamic loading of crypto APIs is a signal of obfuscation or standalone crypto modules.

composite_rules:
  - id: inno-setup-encryption-markers
    desc: Inno Setup encrypted payload markers
    crit: component
    conf: 0.98
    needs: 3
    any:
      - id: inno-setup-encryption-key-type
      - id: inno-setup-encryption-nonce-type
      - id: inno-setup-encryption-base-nonce
      - id: inno-setup-shared-encryption-func
      - id: inno-setup-password-test
