defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: builtin-file-sfx-inno-setup-extraction-unexpected-loader-revision
    desc: Built-in Inno loader-revision hook
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      exact: __cleave_builtin_inno_unexpected_loader_revision_hook__
    unless:
      - id: metadata/binary/installer/family/
      - id: well-known/app/telegram::telegram-desktop-signed-inno-installer

  - id: builtin-file-sfx-inno-setup-extraction-loader-checksum-mismatch
    desc: Built-in Inno checksum-warning hook
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      exact: __cleave_builtin_inno_loader_checksum_mismatch_hook__
    unless:
      - id: metadata/binary/installer/family/
      - id: well-known/app/telegram::telegram-desktop-signed-inno-installer
