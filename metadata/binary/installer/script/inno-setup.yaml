defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: inno-setup-data-marker
    desc: Inno Setup data marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Inno Setup Setup Data (
      section: rdata

  - id: inno-setup-installer-marker
    desc: Inno Setup installer text marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: This installation was built with Inno Setup.
      section: rdata

  - id: inno-setup-installer-text
    desc: Inno Setup installer string in text
    crit: component
    conf: 1.0
    if:
      type: text
      substr: Inno Setup Setup Data (
      section: .text
  - id: inno-setup-installer-data
    desc: Inno Setup installer string in data
    crit: component
    conf: 1.0
    if:
      type: text
      substr: Inno Setup Setup Data (
      section: .data
  - id: inno-setup-zlb-text
    desc: Inno Setup compressed data in text
    crit: component
    conf: 1.0
    if:
      type: hex
      section: .text
      pattern: 7A 6C 62 1A
  - id: inno-setup-zlb-data
    desc: Inno Setup compressed data in data
    crit: component
    conf: 1.0
    if:
      type: hex
      section: .data
      pattern: 7A 6C 62 1A
  - id: inno-setup-built-with-comment
    desc: Inno Setup build metadata string
    crit: component
    conf: 0.98
    if:
      type: text
      substr: This installation was built with Inno Setup
      section: rdata
composite_rules:
  - id: inno-setup-installer
    desc: Inno Setup installer string indicator
    crit: component
    conf: 1.0
    any:
      - id: inno-setup-data-marker
      - id: inno-setup-installer-marker
      - id: inno-setup-installer-text
      - id: inno-setup-installer-data
      - id: inno-setup-built-with-comment
  - id: inno-setup-zlb
    desc: Inno Setup compressed data block signature
    crit: component
    conf: 1.0
    any:
      - id: inno-setup-zlb-text
      - id: inno-setup-zlb-data
  - id: inno-setup
    desc: Inno Setup installer file
    crit: notable
    all:
      - id: inno-setup-installer
    any:
      - id: inno-setup-zlb
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::has-overlay
