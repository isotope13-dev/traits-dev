defaults:
  platforms: [windows]
  for: [pe]
traits:
- id: steam-drivers-archive-title
  desc: Steam drivers archive title
  crit: baseline
  conf: 0.98
  if:
    type: text
    exact: Steam Drivers Archive
    section: rdata
- id: steam-driver-archive-path
  desc: Steam bundled driver path
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: drivers/Windows10/x64/Steam
    section: rdata
- id: tencent-mobilegamepc-registry
  desc: Tencent MobileGamePC registry path
  crit: baseline
  conf: 0.98
  if:
    type: text
    exact: SOFTWARE\Tencent\MobileGamePC
    section: rdata
- id: tencent-tmarketinst-version
  desc: Tencent TMarketInst version metadata
  crit: baseline
  conf: 0.98
  if:
    type: text
    exact: TMarketInst
    section: rdata
- id: huawei-pcmanager-uninstaller--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: 'Hwa::Uninstall::'
    section: rdata
  count_max: 1001329
- id: huawei-pcmanager-uninstaller--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: C:\Program Files\Huawei\PCManager\UninstallGuide.exe.FriendlyAppName
    section: rdata
  count_max: 1001330
- id: squirrel-windows-setup-marker
  desc: Squirrel Windows setup marker
  crit: component
  conf: 0.96
  if:
    type: text
    exact: SquirrelInstall
    section: rdata
- id: squirrel-temp-marker
  desc: Squirrel temporary directory marker
  crit: component
  conf: 0.94
  if:
    type: text
    exact: SQUIRREL_TEMP
    section: rdata
- id: squirrel-package-artifact
  desc: Squirrel NuGet package artifact
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '[A-Za-z0-9_.-]+-[0-9][A-Za-z0-9_.-]*-(full|delta)\.nupkg'
    section: rdata
composite_rules:
- id: valve-steam-driver-archive
  desc: Valve Steam driver archive
  crit: component
  conf: 0.99
  all:
  - id: metadata/signed/developer::valve-corp.
  any:
  - id: metadata/binary/installer/family::steam-drivers-archive-title
  - id: metadata/binary/installer/family::steam-driver-archive-path
- id: tencent-mobilegamepc-installer
  desc: Tencent MobileGamePC installer
  crit: component
  conf: 0.99
  all:
  - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
  - id: metadata/binary/installer/family::tencent-mobilegamepc-registry
  - id: metadata/binary/installer/family::tencent-tmarketinst-version
- id: known-benign-installer
  desc: Known benign installer framework
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/installer/family::valve-steam-driver-archive
  - id: metadata/binary/installer/family::tencent-mobilegamepc-installer
  - id: metadata/binary/installer/family::huawei-pcmanager-uninstaller
  - id: metadata/binary/installer/database::wix-burn-bootstrapper
  - id: metadata/binary/installer/script::nsis
  - id: metadata/binary/installer/script::nullsoftinst-marker
  - id: metadata/binary/installer/script::nsis-error-title
  - id: metadata/binary/installer/script::inno-setup
  - id: metadata/binary/installer/runtime::inno-mutex-pair
  - id: metadata/binary/installer/sfx::7zip-sfx-installer
  - id: metadata/binary/installer/sfx::winrar-sfx
  - id: metadata/binary/installer/plugin::known-nsis-plugin-basename
  - id: metadata/binary/installer/sfx::iexpress
  - id: metadata/binary/installer/sfx::wextract-tool
  - id: metadata/binary/installer/family::squirrel-windows-installer
  - id: metadata/binary/installer/database::vs-setup-bootstrapper
  - id: metadata/binary/installer/database::advanced-installer-bootstrapper
  - id: well-known/tool/sysadmin/conemu::conemu-setup-signature
- id: squirrel-windows-installer
  desc: Squirrel Windows installer package
  crit: component
  conf: 0.98
  all:
  - id: metadata/binary/installer/family::squirrel-windows-setup-marker
  - id: metadata/binary/installer/family::squirrel-temp-marker
  - id: metadata/binary/installer/family::squirrel-package-artifact
- id: huawei-pcmanager-uninstaller
  desc: Huawei PC Manager uninstaller
  crit: component
  conf: 0.98
  any:
  - id: huawei-pcmanager-uninstaller--rx-1
  - id: huawei-pcmanager-uninstaller--rx-2
