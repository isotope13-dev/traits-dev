defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.93

composite_rules:
  - id: inno-delphi-installer-foundation
    desc: Inno Setup binary with Delphi runtime profile
    all:
      - id: metadata/lang/compiler/managed::delphi
    any:
      - id: metadata/binary/installer/script::inno-manifest-description
      - id: metadata/binary/installer/script::inno-manifest-assembly
      - id: metadata/binary/installer/script::inno-setup-installer-text
      - id: metadata/binary/installer/script::inno-setup-installer-data
      - id: metadata/binary/installer/script::inno-setup-550-data-marker
    unless:
      - id: well-known/tool/sysadmin/sandboxie/
