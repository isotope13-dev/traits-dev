defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: eusing-free-ip-switcher-company
    desc: Eusing Software version company metadata
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: pe.version.company
      exact: Eusing Software

  - id: eusing-free-ip-switcher-description
    desc: Free IP Switcher version description
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: pe.version.description
      exact: Free IP Switcher

composite_rules:
  - id: eusing-free-ip-switcher-installer
    desc: Eusing Free IP Switcher Wise installer identity
    crit: baseline
    conf: 0.99
    all:
      - id: eusing-free-ip-switcher-company
      - id: eusing-free-ip-switcher-description
