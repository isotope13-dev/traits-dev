defaults:
  platforms: [windows]
  for: [pe]

traits:
- id: yinginstall-brand
  desc: YingInstall wrapper brand marker
  crit: component
  conf: 0.96
  size_min: 500000
  if:
    type: text
    word: YingInstall
    section: .rsrc
  count_min: 3
- id: yinginstall-registry-root
  desc: YingSoft YingInstall registry root
  crit: component
  conf: 0.98
  if:
    type: text
    exact: '\SOFTWARE\YingSoft\YingInstall'
    section: .rsrc
- id: yinginstall-stage-binary
  desc: YingInstall staged helper filename
  crit: component
  conf: 0.98
  if:
    type: text
    exact: '\~YingInstall-ProvideForInstall.exe'
    section: .rsrc
- id: yinginstall-version-tag
  desc: YingInstall XML version marker
  crit: component
  conf: 0.97
  if:
    type: text
    exact: '<Version>YingInstall6.0</Version>'
    section: .rsrc
- id: yinginstall-netman-version
  desc: Netman Ultimate version resource
  crit: component
  conf: 0.98
  if:
    type: value
    path: pe.version.description
    exact: Netman_Ultimate
- id: yinginstall-company-name
  desc: Netman company version resource
  crit: component
  conf: 0.98
  if:
    type: value
    path: pe.version.company
    exact: 南宁网络人电脑有限公司

composite_rules:
- id: yinginstall-wrapper
  desc: YingInstall Windows installer wrapper
  crit: component
  conf: 0.99
  needs: 2
  any:
  - id: metadata/binary/installer/family::yinginstall-brand
  - id: metadata/binary/installer/family::yinginstall-registry-root
  - id: metadata/binary/installer/family::yinginstall-stage-binary
  - id: metadata/binary/installer/family::yinginstall-version-tag
  - id: metadata/binary/installer/family::yinginstall-netman-version
  - id: metadata/binary/installer/family::yinginstall-company-name
