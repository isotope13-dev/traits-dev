defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.9

traits:
- id: inetc-plugin-description
  desc: INetC NSIS plugin description
  conf: 0.97
  if:
    type: text
    exact: inetc NSIS plug-in
    section: .rsrc
- id: inetc-user-agent
  desc: INetC NSIS user agent
  conf: 0.92
  if:
    type: text
    exact: NSIS_Inetc (Mozilla)
    section: rdata
- id: inetc-export-get
  desc: INetC get export
  conf: 0.88
  if:
    type: export
    exact: get
- id: inetc-export-head
  desc: INetC head export
  conf: 0.88
  if:
    type: export
    exact: head
- id: inetc-export-post
  desc: INetC post export
  conf: 0.88
  if:
    type: export
    exact: post
- id: inetc-export-put
  desc: INetC put export
  conf: 0.88
  if:
    type: export
    exact: put
- id: system-export-call
  desc: NSIS System Call export
  conf: 0.9
  if:
    type: export
    exact: Call
- id: system-export-stralloc
  desc: NSIS System StrAlloc export
  conf: 0.9
  if:
    type: export
    exact: StrAlloc
- id: system-export-int64op
  desc: NSIS System Int64Op export
  conf: 0.9
  if:
    type: export
    exact: Int64Op
- id: nsis-plugin-init-export
  desc: NSIS plugin init export
  conf: 0.95
  if:
    type: export
    exact: nsis_init
- id: nsis-plugin-done-export
  desc: NSIS plugin done export
  conf: 0.95
  if:
    type: export
    exact: nsis_done
- id: nsis-plugin-dialog-export
  desc: NSIS plugin dialog export
  conf: 0.95
  if:
    type: export
    exact: nsis_dialog

- id: nsis-plugin-name-group-a
  desc: NSIS plugin DLL basename group
  conf: 0.97
  if:
    type: basename
    regex: '(?i)^(nsExec|WinShell|StdUtils|INetC)\.dll$'
- id: nsis-plugin-name-group-b
  desc: NSIS plugin DLL basename group
  conf: 0.97
  if:
    type: basename
    regex: '(?i)^(System|Registry|ShellLink|UAC)\.dll$'
- id: nsis-plugin-name-group-c
  desc: NSIS plugin DLL basename group
  conf: 0.97
  if:
    type: basename
    regex: '(?i)^(NSISdl|AccessControl|ApplicationID|nsisXML)\.dll$'
- id: nsis-plugin-name-group-d
  desc: NSIS plugin DLL basename group
  conf: 0.97
  if:
    type: basename
    regex: '(?i)^(AdvSplash|Banner|Splash|simpleSC)\.dll$'
- id: nsis-plugin-name-group-e
  desc: NSIS plugin DLL basename group
  conf: 0.97
  if:
    type: basename
    regex: '(?i)^(nsDialogs|nsArray|nsProcess|nsRichEdit)\.dll$'
- id: nsis-plugin-name-group-f
  desc: NSIS plugin DLL basename group
  conf: 0.97
  if:
    type: basename
    regex: '(?i)^(TextReplace|VPatch|ZipDLL|Math)\.dll$'

composite_rules:
- id: nsis-inetc-plugin
  desc: NSIS INetC transfer plugin
  crit: notable
  conf: 0.96
  all:
  - id: metadata/binary/installer/plugin::inetc-plugin-description
  - id: metadata/binary/installer/plugin::inetc-export-get
  - id: metadata/binary/installer/plugin::inetc-export-post
  any:
  - id: metadata/binary/installer/plugin::inetc-export-head
  - id: metadata/binary/installer/plugin::inetc-export-put
  - id: metadata/binary/installer/plugin::inetc-user-agent
  needs: 2
- id: nsis-system-plugin
  desc: NSIS arbitrary API plugin
  crit: notable
  conf: 0.95
  all:
  - id: metadata/binary/installer/script::nsis-system-plugin
  - id: metadata/binary/installer/plugin::system-export-call
  any:
  - id: metadata/binary/installer/plugin::system-export-stralloc
  - id: metadata/binary/installer/plugin::system-export-int64op
- id: nsis-plugin
  desc: NSIS plugin DLL by standard exports
  crit: notable
  conf: 0.92
  any:
  - id: nsis-plugin-init-export
  - id: nsis-plugin-done-export
  - id: nsis-plugin-dialog-export
- id: known-nsis-plugin-basename
  desc: Well-known NSIS plugin DLL by basename
  crit: component
  conf: 0.97
  any:
  - id: nsis-plugin-name-group-a
  - id: nsis-plugin-name-group-b
  - id: nsis-plugin-name-group-c
  - id: nsis-plugin-name-group-d
  - id: nsis-plugin-name-group-e
  - id: nsis-plugin-name-group-f
