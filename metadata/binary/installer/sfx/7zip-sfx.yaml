defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: 7zip-installer-description
    desc: 7-Zip installer description
    crit: component
    conf: 0.98
    if:
      type: string_value
      exact: 7-Zip Installer
      section: .rsrc
  - id: 7zip-installer-setup-banner
    desc: 7-Zip setup banner string
    crit: component
    conf: 0.95
    if:
      type: string_value
      regex: 7-Zip [0-9]{1,2}\.[0-9]{2}( \(x(64|86)\))? Setup
      section: .rdata
  - id: 7zip-registry-key
    desc: 7-Zip registry key path
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Software\7-Zip
      section: .rdata
  - id: 7zip-original-filename
    desc: 7-Zip installer filename
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: 7zipInstall.exe
      section: .rsrc
  - id: 7zip-temp-archive-error
    desc: 7-Zip temp archive creation error string
    crit: component
    conf: 0.93
    if:
      type: string_value
      exact: Cannot create temp folder archive
      section: .rdata
      offset_range: [6291456, null]
  - id: 7zsfx-runtime-stub
    desc: 7-Zip SFX stub filename marker
    crit: component
    conf: 0.93
    if:
      type: string_value
      exact: 7zS.sfx.exe
      section: .rdata
      offset_range: [6291456, null]
  - id: 7zip32-runtime-dll
    desc: 7-Zip runtime DLL marker
    crit: component
    conf: 0.93
    if:
      type: string_value
      exact: 7-zip32.dll
      section: .rdata
      offset_range: [6291456, null]
  - id: 7zip-fm-app-path
    desc: 7-Zip file manager app path
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Software\Microsoft\Windows\CurrentVersion\App Paths\7zFM.exe
      section: .rdata
      offset_range: [6291456, null]
composite_rules:
  - id: 7zip-sfx-installer
    desc: 7-Zip self-extracting installer
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: metadata/binary/installer::7zip-installer-description
      - id: metadata/binary/installer::7zip-installer-setup-banner
      - id: metadata/binary/installer::7zip-registry-key
      - id: metadata/binary/installer::7zip-original-filename
  - id: 7zip-sfx-runtime
    desc: 7-Zip self-extracting runtime bundle
    crit: notable
    conf: 0.97
    needs: 2
    any:
      - id: metadata/binary/installer::7zip-temp-archive-error
      - id: metadata/binary/installer::7zsfx-runtime-stub
      - id: metadata/binary/installer::7zip32-runtime-dll
      - id: metadata/binary/installer::7zip-fm-app-path
