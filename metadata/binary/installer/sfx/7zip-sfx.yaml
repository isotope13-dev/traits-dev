defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: 7zsfx-config-marker
    desc: 7z SFX installer config marker
    crit: component
    conf: 0.9
    if:
      type: text
      exact: ;!@Install@!UTF-8!
      section: overlay
  - id: 7zip-self-extracting-archive-banner
    desc: 7-Zip self-extracting archive banner
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 7-Zip self-extracting archive
      section: .rsrc
  - id: 7zip-bcj2-method
    desc: 7-Zip BCJ2 method string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: BCJ2
      section: .data
  - id: 7zip-lzma2-method
    desc: 7-Zip LZMA2 method string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: LZMA2
      section: .data
  - id: 7zip-installer-description
    desc: 7-Zip installer description
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 7-Zip Installer
      section: .rsrc
  - id: 7zip-installer-setup-banner
    desc: 7-Zip setup banner string
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 7-Zip [0-9]{1,2}\.[0-9]{2}( \(x(64|86)\))? Setup
      section: .rdata
  - id: 7zip-registry-key
    desc: 7-Zip registry key path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Software\7-Zip
      section: .rdata
  - id: 7zip-original-filename
    desc: 7-Zip installer filename
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 7zipInstall.exe
      section: .rsrc
  - id: 7zip-temp-archive-error
    desc: 7-Zip temp archive creation error string
    crit: component
    conf: 0.93
    if:
      type: text
      exact: Cannot create temp folder archive
      section: .rdata
      offset_range: [6291456, null]
  - id: 7zsfx-runtime-stub
    desc: 7-Zip SFX stub filename marker
    crit: component
    conf: 0.93
    if:
      type: text
      exact: 7zS.sfx.exe
      section: .rdata
      offset_range: [6291456, null]
  - id: 7zip32-runtime-dll
    desc: 7-Zip runtime DLL marker
    crit: component
    conf: 0.93
    if:
      type: text
      exact: 7-zip32.dll
      section: .rdata
      offset_range: [6291456, null]
  - id: 7zip-fm-app-path
    desc: 7-Zip file manager app path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\App Paths\7zFM.exe
      section: .rdata
      offset_range: [6291456, null]
  - id: 7zip-uninstaller-description
    desc: 7-Zip uninstaller description
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 7-Zip Uninstaller
      section: .rsrc
  - id: 7zip-uninst-exe-name
    desc: 7-Zip uninstaller launcher name
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Uninst.exe
      section: .rdata
  - id: 7zip-uninstall-registry-path
    desc: 7-Zip uninstall registry path
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Uninstall\7-Zip
      section: .rdata
  - id: 7zip-shell-extension-clsid
    desc: 7-Zip shell extension CLSID
    crit: component
    conf: 0.96
    if:
      type: text
      exact: CLSID\{23170F69-40C1-278A-1000-000100020000}
      section: .rdata
  - id: 7zip-overlay-uninstaller-description
    desc: Overlay 7-Zip uninstaller description
    crit: component
    conf: 0.98
    size_min: 1000000
    if:
      type: text
      exact: 7-Zip Uninstaller
      offset_range: [1048576, null]
  - id: 7zip-overlay-uninst-exe-name
    desc: Overlay 7-Zip uninstaller name
    crit: component
    conf: 0.97
    size_min: 1000000
    if:
      type: text
      exact: Uninst.exe
      offset_range: [1048576, null]
  - id: 7zip-overlay-uninstall-registry-path
    desc: Overlay 7-Zip uninstall registry path
    crit: component
    conf: 0.97
    size_min: 1000000
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Uninstall\7-Zip
      offset_range: [1048576, null]
  - id: 7zip-overlay-fm-app-path
    desc: Overlay 7-Zip file manager path
    crit: component
    conf: 0.96
    size_min: 1000000
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\App Paths\7zFM.exe
      offset_range: [1048576, null]
  - id: 7zip-overlay-require-admin-manifest
    desc: Overlay 7-Zip admin manifest
    crit: component
    conf: 0.98
    size_min: 1000000
    if:
      type: text
      exact: <requestedExecutionLevel level="requireAdministrator" uiAccess="false"/>
      offset_range: [1048576, null]
composite_rules:
  - id: 7zip-sfx-archive-profile
    desc: 7-Zip self-extracting archive profile
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: metadata/binary/installer/sfx::7zip-self-extracting-archive-banner
      - id: metadata/binary/installer/sfx::7zip-bcj2-method
      - id: metadata/binary/installer/sfx::7zip-lzma2-method
  - id: 7zip-sfx-installer
    desc: 7-Zip self-extracting installer
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: metadata/binary/installer/sfx::7zip-installer-description
      - id: metadata/binary/installer/sfx::7zip-installer-setup-banner
      - id: metadata/binary/installer/sfx::7zip-registry-key
      - id: metadata/binary/installer/sfx::7zip-original-filename
  - id: 7zip-sfx-runtime
    desc: 7-Zip self-extracting runtime bundle
    crit: notable
    conf: 0.97
    needs: 2
    any:
      - id: metadata/binary/installer/sfx::7zip-temp-archive-error
      - id: metadata/binary/installer/sfx::7zsfx-runtime-stub
      - id: metadata/binary/installer/sfx::7zip32-runtime-dll
      - id: metadata/binary/installer/sfx::7zip-fm-app-path
  - id: 7zip-uninstaller-profile
    desc: 7-Zip uninstaller metadata profile
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: metadata/binary/installer/sfx::7zip-uninstaller-description
      - id: metadata/binary/installer/sfx::7zip-uninst-exe-name
      - id: metadata/binary/installer/sfx::7zip-uninstall-registry-path
      - id: metadata/binary/installer/sfx::7zip-shell-extension-clsid
      - id: metadata/binary/installer/sfx::7zip-fm-app-path
  - id: 7zip-uninstaller-overlay-profile
    desc: 7-Zip uninstaller overlay profile
    crit: notable
    conf: 0.99
    needs: 3
    any:
      - id: metadata/binary/installer/sfx::7zip-overlay-uninstaller-description
      - id: metadata/binary/installer/sfx::7zip-overlay-uninst-exe-name
      - id: metadata/binary/installer/sfx::7zip-overlay-uninstall-registry-path
      - id: metadata/binary/installer/sfx::7zip-overlay-fm-app-path
      - id: metadata/binary/installer/sfx::7zip-overlay-require-admin-manifest
