defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: iexpress-setup-title
    desc: IExpress setup title marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: IExpress Setup
      section: .rsrc
  - id: iexpress-setup-filename
    desc: IExpress setup filename marker
    crit: component
    conf: 0.9
    if:
      type: text
      exact: setup.exe
      section: .rsrc
  - id: wextract-tool-description
    desc: IExpress wextract tool manifest description
    crit: component
    conf: 0.99
    if:
      type: text
      substr: '<description>IExpress extraction tool</description>'
      section: rsrc
  - id: wextract-assembly-name
    desc: Microsoft Wextract assembly name
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'Microsoft.Windows.Wextract'
      section: rsrc
  - id: wextract-pdb-path
    desc: Microsoft Wextract PDB path
    crit: component
    conf: 0.98
    ref: sha256:dc25c03f61ca1ba41a1f6cccad97a8074c2c25158b3ed06e8725101e51e932b6
    if:
      type: value
      path: pe.debug.pdb.path
      regex: (?i)(^|[\\/])wextract\.pdb$
  - id: embedded-iexpress-autoit-stage
    desc: Embedded IExpress AutoIt script stage
    crit: notable
    conf: 0.98
    for: [pe, oledoc, ole]
    if:
      type: raw
      regex: '(?i)"AutoIt3\.exe"\s+[^"\r\n]{1,80}\.a3x\b'
  - id: embedded-iexpress-wextract-manifest
    desc: Embedded IExpress extraction tool manifest
    crit: notable
    conf: 0.99
    for: [pe, oledoc, ole]
    if:
      type: text
      substr: '<description>IExpress extraction tool</description>'
composite_rules:
  - id: iexpress
    desc: Microsoft IExpress installer marker
    crit: notable
    conf: 0.95
    all:
      - id: metadata/binary/installer/sfx::iexpress-setup-title
      - id: metadata/binary/installer/sfx::iexpress-setup-filename
  - id: wextract-tool
    desc: Microsoft IExpress wextract extraction tool
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: metadata/binary/installer/sfx::wextract-tool-description
      - id: metadata/binary/installer/sfx::wextract-assembly-name
      - id: metadata/binary/installer/sfx::wextract-pdb-path
