defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: iexpress-setup-title
    desc: IExpress setup title marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: IExpress Setup
      section: .rsrc
  - id: iexpress-setup-filename
    desc: IExpress setup filename marker
    crit: component
    conf: 0.9
    if:
      type: text
      exact: setup.exe
      section: .rsrc
  - id: wextract-assembly-name
    desc: Microsoft Wextract assembly name
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'Microsoft.Windows.Wextract'
      section: rsrc
  - id: wextract-manifest-description
    desc: IExpress extraction tool manifest marker
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: '<description>IExpress extraction tool</description>'
      section: rsrc
  - id: wextract-product-description
    desc: Win32 Cabinet Self-Extractor marker
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: Win32 Cabinet Self-Extractor
      section: rsrc
  - id: wextract-pdb-path
    desc: Microsoft Wextract PDB path
    crit: component
    conf: 0.98
    ref: sha256:dc25c03f61ca1ba41a1f6cccad97a8074c2c25158b3ed06e8725101e51e932b6
    if:
      type: value
      path: pe.debug.pdb.path
      regex: (?i)(^|[\\/])wextract\.pdb$
composite_rules:
  - id: iexpress
    desc: Microsoft IExpress installer marker
    crit: notable
    conf: 0.95
    all:
      - id: metadata/binary/installer/sfx::iexpress-setup-title
      - id: metadata/binary/installer/sfx::iexpress-setup-filename
  - id: wextract-tool
    desc: Microsoft IExpress wextract extraction tool
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: metadata/file/profile/identity::iexpress-wextract-manifest
      - id: metadata/binary/installer/sfx::wextract-assembly-name
      - id: metadata/binary/installer/sfx::wextract-pdb-path
      - id: metadata/binary/installer/sfx::wextract-manifest-description
      - id: metadata/binary/installer/sfx::wextract-product-description
