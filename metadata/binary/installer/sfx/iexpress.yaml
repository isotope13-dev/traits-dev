defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: iexpress-setup-title
    desc: IExpress setup title marker
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: IExpress Setup
      section: .rsrc
  - id: iexpress-setup-filename
    desc: IExpress setup filename marker
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: setup.exe
      section: .rsrc
composite_rules:
  - id: iexpress
    desc: Microsoft IExpress installer marker
    crit: notable
    conf: 0.95
    all:
      - id: metadata/binary/installer::iexpress-setup-title
      - id: metadata/binary/installer::iexpress-setup-filename
