defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: registry-key
    desc: WinRAR SFX registry key
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Software\WinRAR SFX
      section: .rdata
  # Real WinRAR SFX module stubs carry these strings embedded in the
  # RT_MANIFEST XML (name="WinRAR SFX", <description>WinRAR SFX module</description>)
  # and the dialog resource table ($STARTDLG:CAPTION, ...) — never as the
  # bare tokens an exact match expects, so these use substr.
  - id: manifest-name
    desc: WinRAR SFX manifest name
    crit: component
    conf: 0.98
    if:
      type: text
      substr: name="WinRAR SFX"
      section: .rsrc
  - id: manifest-description
    desc: WinRAR SFX manifest description
    crit: component
    conf: 0.99
    if:
      type: text
      substr: WinRAR SFX module
      section: .rsrc
  - id: dialog-start
    desc: WinRAR SFX start dialog
    crit: component
    conf: 0.95
    if:
      type: text
      substr: STARTDLG
      section: .rdata
composite_rules:
  - id: winrar-sfx-footprint
    desc: WinRAR self-extractor footprint
    crit: component
    conf: 0.97
    all:
      - id: metadata/binary/installer/sfx::registry-key
      - id: metadata/binary/installer/sfx::dialog-start
  - id: winrar-sfx
    desc: WinRAR self-extracting archive
    crit: notable
    conf: 0.99
    # The "WinRAR SFX module" manifest string and the name="WinRAR SFX" assembly
    # identity are unique to genuine WinRAR SFX stubs; a built SFX archive
    # additionally carries the registry key + dialog.
    any:
      - id: metadata/binary/installer/sfx::manifest-description
      - id: metadata/binary/installer/sfx::manifest-name
      - id: metadata/binary/installer/sfx::winrar-sfx-footprint
