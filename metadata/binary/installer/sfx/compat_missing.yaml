defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: iexpress-config-directives
    desc: IExpress configuration directive strings
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: advpack.dll,DelNodeRunDLL32
      section: .rdata
  - id: cabinet-fdi-extraction
    desc: Cabinet FDI extraction imports
    crit: notable
    conf: 0.92
    if:
      type: symbol
      regex: "^FDI(IsCabinet|Create|Copy|Destroy)$"
composite_rules:
  - id: iexpress-resource-heavy-sfx
    desc: IExpress SFX with heavy resource payload
    crit: notable
    conf: 0.9
    all:
      - id: metadata/binary/resource::resource-heavy-png-ui-wrapper
    any:
      - id: metadata/binary/installer/sfx::iexpress
      - id: metadata/binary/installer/sfx::wextract-tool
