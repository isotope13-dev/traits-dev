defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: iexpress-config-directives
    desc: IExpress configuration directive strings
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: advpack.dll,DelNodeRunDLL32
      section: .rdata
  - id: cabinet-fdi-extraction
    desc: Cabinet FDI extraction imports
    crit: notable
    conf: 0.92
    if:
      type: symbol
      regex: "^FDI(IsCabinet|Create|Copy|Destroy)$"
  - id: 7zip-sfx-config-script
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_7zip_sfx_config_script__
composite_rules:
  - id: iexpress-resource-heavy-sfx
    desc: IExpress SFX with heavy resource payload
    crit: notable
    conf: 0.9
    all:
      - id: metadata/binary/installer/sfx::iexpress
      - id: objectives/anti-static/obfuscation/payload/encrypted::major-rsrc-section
