defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: alzip-self-extractor-banner
    desc: ALZip self-extractor banner string
    crit: component
    conf: 0.98
    if:
      type: text
      substr: ALZip Self-Extractor
      section: rsrc
  - id: alzip-self-extractor-banner-packed
    desc: ALZip self-extractor banner in packed section
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ALZip Self-Extractor
      section: UPX1
  - id: alzip-zipsfx-marker
    desc: ALZip ZIPSFX runtime marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: ZIPSFX
      section: UPX1
  - id: alzip-eggsfx-marker
    desc: ALZip EGGSFX runtime marker
    crit: component
    conf: 0.97
    if:
      type: text
      regex: ^EGGSFX(\.sfx)?$
      section: rsrc
  - id: alzip-eggsfx-pdb
    desc: ALZip EGGSFX PDB build path
    crit: component
    conf: 0.99
    if:
      type: kv
      path: debug.pdb_path
      regex: alzip-windows.*EGGSFX\.pdb$
      case_insensitive: true
  - id: alzip-egg-format-class
    desc: ALZip EggFormat C++ RTTI string
    crit: component
    conf: 0.97
    if:
      type: text
      substr: EggFormatImpr
      section: UPX1
  - id: alzip-upgrade-prompt
    desc: ALZip upgrade prompt string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Please upgrade ALZip to the latest version
      section: UPX1
composite_rules:
  - id: alzip-sfx
    desc: ALZip self-extracting archive
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: metadata/binary/installer/sfx::alzip-self-extractor-banner
      - id: metadata/binary/installer/sfx::alzip-self-extractor-banner-packed
      - id: metadata/binary/installer/sfx::alzip-zipsfx-marker
      - id: metadata/binary/installer/sfx::alzip-eggsfx-marker
      - id: metadata/binary/installer/sfx::alzip-eggsfx-pdb
      - id: metadata/binary/installer/sfx::alzip-egg-format-class
      - id: metadata/binary/installer/sfx::alzip-upgrade-prompt
