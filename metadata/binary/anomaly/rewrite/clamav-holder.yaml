defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: clamav-holder-banner
    desc: ClamAV holder DOS stub banner
    crit: component
    conf: 0.99
    if:
      type: hex
      pattern: "21 54 68 69 73 20 66 69 6c 65 20 77 61 73 20 63 72 65 61 74 65 64 20 62 79 20 43 6c 61 6d 41 56"
      offset: 76

  - id: clamav-gpl-banner
    desc: ClamAV scanner banner string
    crit: component
    conf: 0.99
    if:
      type: hex
      pattern: "43 6c 61 6d 41 56 20 2d 20 41 20 47 50 4c 20 76 69 72 75 73 20 73 63 61 6e 6e 65 72"
      offset: 150

  - id: clamav-coff-timestamp
    desc: CLAM COFF timestamp marker
    crit: component
    conf: 0.99
    if:
      type: hex
      pattern: "43 4c 41 4d"
      offset: 216

composite_rules:
  - id: clamav-rewritten-pe-holder
    desc: ClamAV rewritten PE holder artifact
    crit: suspicious
    conf: 0.99
    all:
      - id: clamav-holder-banner
      - id: clamav-gpl-banner
    any:
      - id: clamav-coff-timestamp
      - id: metadata/binary/metrics/structural::no-imports
      - id: metadata/binary/layout::pe-checksum-zeroed
    needs: 2
