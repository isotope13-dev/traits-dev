# ELF Format Anomalies
# Structural issues in ELF binaries that indicate tampering or malware
defaults:
  platforms: [linux, android]
  for: [elf]
  crit: notable
  conf: 0.95
traits:
  - id: elf-parse-failure
    desc: ELF parser reported malformed binary structure
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: parse.error_count
      min: 1
    unless:
      - id: metadata/file/extension/identity::linux-firmware-blob-basename
      - id: metadata/file/extension/identity::linux-firmware-embedded-elf-path
      - id: metadata/package/files/system-package::jvm-bundled-native-dependency
      - id: well-known/tool/sysadmin/unix-benign::snappy-java-sunos
  # Tiny file with oversized LOAD segment: the segment claims far more data
  # than the file actually contains. Common in shellcode stagers and crafted ELFs.
  - id: load-segment-exceeds-tiny-file
    desc: Oversized LOAD segment in tiny ELF
    mbc: B0001
    attack: T1027
    size_max: 10240
    if:
      type: metrics
      field: "elf.load_segment_max_p_filesz"
      min: 32768
  - id: load-segment-exceeds-small-file
    desc: Oversized LOAD segment in small ELF
    mbc: B0001
    attack: T1027
    conf: 0.90
    size_max: 200000
    if:
      type: metrics
      field: "elf.load_segment_max_p_filesz"
      min: 1000000
  - id: compact-large-load-memory-image
    desc: Compact ELF reserves large memory image
    crit: notable
    conf: 0.72
    mbc: F0001
    attack: T1027.002
    size_max: 5000000
    if:
      type: metrics
      field: "elf.load_segment_max_p_memsz"
      min: 33554432
  # === Tier A: segment / EP anomalies ===
  - id: elf-entry-in-writable-segment
    desc: ELF entry point in writable PT_LOAD
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: elf.entry_in_writable_segment
      min: 1
    unless:
      - id: metadata/binary/vendor/
      - id: well-known/tool/sysadmin/unix-benign/
      - id: metadata/file/extension/identity::linux-firmware-blob-basename
      - id: metadata/file/extension/identity::stm32-external-loader-elf
      - id: metadata/package/files/system-package::jvm-bundled-native-dependency
      - id: metadata/binary/anomaly/format::arm-single-program-header-layout
    downgrade:
      any:
        - type: basename
          regex: \.so$
        - id: well-known/lib/jruby/
  - id: elf-entry-in-last-segment
    desc: ELF entry in final PT_LOAD
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: elf.entry_in_last_segment
      min: 1
  - id: elf-single-program-header
    desc: ELF uses a single program header
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.program_header_count
      max: 1
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: elf-wx-segment
    desc: ELF has W+X loadable segment
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.wx_segment_count
      min: 1
    unless:
      - id: well-known/lib/jna::native-dispatch-library
      - id: metadata/file/extension/identity::linux-firmware-blob-basename
      - id: metadata/file/extension/identity::linux-qcom-firmware-blob-basename
      - id: metadata/binary/vendor/
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/tool/sysadmin/unix-benign/
      - id: metadata/file/extension/identity::stm32-external-loader-elf
    downgrade:
      any:
        - type: basename
          regex: \.so$
        - id: well-known/lib/jruby/
  - id: elf-executable-stack
    desc: ELF PT_GNU_STACK has executable bit set
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: elf.executable_stack
      min: 1
  - id: elf-segment-overlap
    desc: "ELF PT_LOAD segments overlap vaddr ranges"
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: elf.segment_overlap_count
      min: 1
    unless:
      - id: metadata/package/testing/presence/harness::binary-test-directory
      - id: metadata/file/extension/identity::linux-firmware-blob-basename
      - id: metadata/file/extension/identity::linux-qcom-firmware-blob-basename
      - id: metadata/file/extension/identity::linux-firmware-embedded-elf-path
      - id: metadata/file/extension/identity::linux-qcom-firmware-embedded-elf-path
      - id: well-known/tool/development/patchelf::patchelf-test-fixture
      - id: metadata/binary/vendor::nvidia-cuda-cubin-sections
  - id: elf-section-header-count-mismatch
    desc: "ELF e_shnum mismatches section count"
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: elf.section_header_count_mismatch
      min: 1
    unless:
      - id: well-known/tool/development/patchelf::patchelf-test-fixture
  - id: elf-multiple-pt-interp
    desc: ELF has more than one PT_INTERP segment
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: elf.multiple_pt_interp
      min: 1

  # === Tier B: dynamic + section anomalies ===
  - id: elf-dt-audit-present
    desc: ELF DT_AUDIT installs LD_AUDIT-style hooks
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.has_dt_audit
      min: 1
  - id: elf-dt-depaudit-present
    desc: "ELF DT_DEPAUDIT sets LD_AUDIT hooks for deps"
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.has_dt_depaudit
      min: 1
  - id: elf-dt-needed-absolute-path
    desc: ELF DT_NEEDED entry contains absolute path
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: elf.dt_needed_abs_path_count
      min: 1
  - id: elf-dt-needed-traversal
    desc: ELF DT_NEEDED entry contains path traversal
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: elf.dt_needed_traversal_count
      min: 1
  - id: elf-gnu-stack-section-absent
    desc: ELF .note.GNU-stack section absent
    crit: baseline
    conf: 0.7
    if:
      type: metrics
      field: elf.gnu_stack_section_absent
      min: 1
  - id: elf-both-hash-and-gnu-hash
    desc: ELF has both .hash and .gnu.hash sections
    # Both tables are a normal compatibility choice in many toolchains; this
    # is useful structural metadata, but not an analyst-significant anomaly by
    # itself.
    crit: baseline
    conf: 0.7
    if:
      type: metrics
      field: elf.has_both_hash_tables
      min: 1
    unless:
      - id: metadata/package/quality/recognized-contexts::frida-server-artifact-path-context
  - id: elf-duplicate-section-name
    desc: ELF section name appears more than once
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: elf.duplicate_section_name_count
      min: 1
    unless:
      - type: basename
        regex: '(?i)\.gox$'
      - id: metadata/package/testing/presence/harness::go-tools-testdata-directory-path
      - id: well-known/lib/golang-x-tools/

  # === Tier A — modern toolchain / hardening posture ===
  - id: elf-dt-relr-present
    desc: 'ELF uses DT_RELR compressed relocations'
    crit: baseline
    if:
      type: metrics
      field: elf.has_dt_relr
      min: 1
  - id: elf-dt-preinit-array
    desc: "ELF declares preinit funcs"
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: elf.dt_preinit_array_count
      min: 1
  - id: elf-dt-debug-nonzero
    desc: ELF DT_DEBUG entry has non-zero value
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: elf.has_dt_debug
      min: 1
  - id: elf-fortify-source-used
    desc: ELF imports FORTIFY_SOURCE __*_chk symbols
    crit: baseline
    if:
      type: metrics
      field: elf.fortify_source_used
      min: 1
  - id: elf-relacount-present
    desc: "ELF declares DT_RELACOUNT"
    crit: baseline
    if:
      type: metrics
      field: elf.relacount
      min: 1
  - id: elf-compressed-debug-sections
    desc: 'ELF carries SHF_COMPRESSED sections'
    crit: baseline
    if:
      type: metrics
      field: elf.compressed_sections_count
      min: 1

composite_rules:
  - id: arm-single-program-header-layout
    desc: ARM ELF single-header embedded layout
    crit: exception
    conf: 0.98
    all:
      - id: metadata/arch/iot::arm
      - id: elf-single-program-header
