defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
traits:
  - id: embedded-sha256-token
    desc: Standalone SHA256 hash string in binary
    crit: notable
    conf: 0.80
    attack: T1027
    if:
      type: text
      regex: '^[a-f0-9]{64}$'
      section: .rdata
    not:
      - regex: (?i)sha256
      - regex: (?i)checksum
    downgrade:
      any:
        - id: well-known/app/swifttunnel_vpn::swifttunnel
