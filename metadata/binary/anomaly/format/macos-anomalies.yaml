defaults:
  for:
    - macho
  platforms:
    - macos
    - ios
traits:
  - id: minimal-string-count
    desc: Minimal extracted string count
    crit: suspicious
    conf: 0.75
    size_min: 100000
    if:
      type: metrics
      field: binary.string_count
      max: 50
  - id: extreme-minimal-strings
    desc: Extremely minimal string count
    crit: suspicious
    conf: 0.85
    size_min: 100000
    if:
      id: metadata/binary/metrics/structural::extreme-minimal-strings
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: text-dominates-cstring
    desc: Code section dominates string section
    crit: suspicious
    conf: 0.8
    if:
      id: metadata/binary/metrics/structural::text-dominates-cstring
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: functions.count
        min: 100
      - type: metrics
        field: exports.count
        min: 4
      - type: metrics
        field: binary.string_count
        min: 50
      - type: metrics
        field: macho.function_starts_count
        min: 100
      - type: basename
        regex: \.cpython-\d+-darwin\.so$
  - id: extreme-text-to-string-ratio
    desc: Extreme code-to-string ratio
    crit: suspicious
    conf: 0.9
    if:
      id: metadata/binary/metrics/structural::extreme-text-to-string-ratio
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: functions.count
        min: 100
      - type: metrics
        field: exports.count
        min: 4
      - type: metrics
        field: binary.string_count
        min: 50
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: basename
        regex: \.cpython-\d+-darwin\.so$
  - id: data-larger-than-cstring
    desc: Data section larger than strings
    crit: suspicious
    conf: 0.7
    if:
      type: section
      regex: __data
      compare_to: __cstring
      size_ratio_min: 50
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/app/macos-benign/
      - type: metrics
        field: binary.string_count
        min: 1000
  - id: data-dominates-cstring
    desc: Data section dominates string section
    crit: suspicious
    conf: 0.85
    if:
      id: metadata/binary/metrics/structural::data-dominates-cstring
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 1000
      - id: metadata/package/quality/
      - type: text
        substr: PAR_TEMP
  - id: high-avg-string-entropy
    desc: High average string entropy
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: binary.avg_string_entropy
      min: 4.6
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/library/polars::polars-plugin
  - id: low-function-density
    desc: Low function count for binary size
    crit: suspicious
    conf: 0.65
    size_min: 100000
    if:
      type: metrics
      field: functions.count
      max: 20
    unless:
      - type: basename
        regex: '\.a$'
      - type: metrics
        field: binary.string_count
        min: 1000
      - type: metrics
        field: macho.slice_count
        min: 2
    downgrade:
      any:
        - id: well-known/app/marktext/
  - id: high-avg-function-complexity
    desc: High average function complexity
    crit: suspicious
    conf: 0.7
    if:
      type: metrics
      field: binary.avg_complexity
      min: 50
    unless:
      - type: basename
        regex: '\.a$'
composite_rules:
  - id: obfuscated-string-pattern
    desc: Obfuscated string storage pattern
    crit: suspicious
    conf: 0.9
    all:
      - id: minimal-string-count
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::many-high-entropy-strings
  - id: encoded-payload-pattern
    desc: Encoded payload storage pattern
    crit: suspicious
    conf: 0.9
    all:
      - id: extreme-minimal-strings
      - id: data-dominates-cstring
  - id: structural-anomaly-pattern
    desc: Multiple structural anomalies
    crit: suspicious
    conf: 0.95
    all:
      - id: extreme-text-to-string-ratio
      - id: data-dominates-cstring
    any:
      - id: high-avg-string-entropy
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::many-high-entropy-strings
