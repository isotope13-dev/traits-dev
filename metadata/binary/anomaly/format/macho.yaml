# Mach-O format anomalies: structural, signing, and dylib-path signs of
# tampering, repackaging, or supply-chain attacks. Mirrors PE and ELF anomaly
# trait sets; metrics live on `macho.*` and `consistency.*`.
defaults:
  platforms: [macos, ios]
  for: [macho]
  crit: notable
  conf: 0.9
traits:
  - id: macho-entry-in-writable-segment
    desc: Mach-O entry point in writable segment
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: macho.entry_in_writable_segment
      min: 1
  - id: macho-entry-outside-segments
    desc: Mach-O entry point outside any segment
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: macho.entry_outside_segments
      min: 1
  - id: macho-entry-in-last-segment
    desc: Mach-O entry in final segment
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: macho.entry_in_last_segment
      min: 1
  - id: macho-wx-segment
    desc: Mach-O has W+X segment
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: macho.wx_segment_count
      min: 1
  - id: macho-encrypted-section-present
    desc: Mach-O LC_ENCRYPTION_INFO with cryptid set
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: macho.has_encrypted_section
      min: 1
  - id: macho-pagezero-size-anomalous
    desc: Mach-O __PAGEZERO size disagrees with arch default
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: macho.pagezero_size
      min: 1
  - id: macho-segment-overlap
    desc: Mach-O segments with overlapping vmaddr ranges
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: macho.segment_overlap_count
      min: 1
  - id: macho-dylib-unrooted
    desc: Mach-O LC_LOAD_DYLIB path not rooted
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: macho.dylib_path_unrooted_count
      min: 1
  - id: macho-executable-path-in-dylib
    desc: Mach-O dylib references @executable_path
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: macho.executable_path_in_dylib
      min: 1
  - id: macho-loader-path-in-executable
    desc: Mach-O executable references @loader_path
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: macho.loader_path_in_executable
      min: 1
  - id: macho-duplicate-dylib
    desc: Mach-O loads the same dylib twice
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: macho.duplicate_dylib_count
      min: 1
  - id: macho-legacy-version-min
    desc: Mach-O uses legacy LC_VERSION_MIN command
    crit: baseline
    if:
      type: metrics
      field: macho.uses_legacy_version_min
      min: 1
  - id: macho-adhoc-on-release-binary
    desc: Mach-O adhoc-signed release binary
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: macho.adhoc_on_release_binary
      min: 1
  - id: binary-signed-with-individual-cert
    desc: Signed binary with personal-name leaf cert
    crit: notable
    conf: 0.85
    for: [pe, dll, macho]
    platforms: [windows, macos, ios]
    if:
      type: metrics
      field: binary.signed_with_individual_cert
      min: 1
  - id: binary-has-executable-stack
    desc: Binary loads with executable stack
    crit: notable
    conf: 0.8
    for: [elf, macho]
    platforms: [unix, android]
    if:
      type: metrics
      field: binary.has_executable_stack
      min: 1

# Composite rules elevating clusters of these anomalies to `hostile`
# live at objectives/anti-static/pack/detect/macho-structural-tampering.yaml.

  # === Tier A — header / CodeDirectory flags + modern hardening ===
  - id: macho-allow-stack-execution
    desc: Mach-O MH_ALLOW_STACK_EXECUTION flag set
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: macho.allow_stack_execution
      min: 1
  - id: macho-no-data-const-segment
    desc: Mach-O missing __DATA_CONST segment
    crit: baseline
    if:
      type: metrics
      field: macho.has_data_const_segment
      max: 0
  - id: macho-cs-runtime-flag
    desc: Mach-O CodeDirectory carries hardened-runtime flag
    crit: baseline
    if:
      type: kv
      path: "macho.cs_flags.runtime"
      regex: "^true$"
  - id: macho-cs-library-validation
    desc: Mach-O CodeDirectory enforces library validation
    crit: baseline
    if:
      type: kv
      path: "macho.cs_flags.library_validation"
      regex: "^true$"
  - id: macho-cs-linker-signed
    desc: Mach-O link-time adhoc signature
    crit: baseline
    if:
      type: kv
      path: "macho.cs_flags.linker_signed"
      regex: "^true$"
  - id: macho-dylib-in-cache
    desc: Mach-O slice marked MH_DYLIB_IN_CACHE on disk (anomalous)
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: macho.dylib_in_cache
      min: 1
