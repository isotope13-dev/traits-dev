defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: repetitive-padding-inflation
    desc: Large binary with repetitive padding
    crit: component
    if:
      type: text
      substr: "UUUU3333"
      section: ".text"
  - id: low-function-count-marker
    desc: Low function count metric
    crit: component
    size_min: 65536
    if:
      id: metadata/binary/metrics/anomaly::low-function-count-marker
  - id: import-padding-system-time
    desc: 'SetSystemTimeAdjustment import'
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: SetSystemTimeAdjustment
  - id: import-padding-timer-queue
    desc: 'CreateTimerQueue import'
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: CreateTimerQueue
  - id: import-padding-write-profile
    desc: 'WriteProfileSectionA import'
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: WriteProfileSectionA
  - id: import-padding-console-alias
    desc: 'AddConsoleAliasW import'
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: AddConsoleAliasW
  - id: vcruntime-dll-basename
    desc: Visual C++ runtime DLL basename
    crit: component
    conf: 0.99
    if:
      type: path
      basename: true
      regex: '(?i)^vcruntime[0-9_]*\.dll$'
  - id: libcrypto-dll-basename
    desc: OpenSSL libcrypto DLL basename
    crit: component
    conf: 0.99
    if:
      type: path
      basename: true
      regex: '(?i)^libcrypto-[0-9]+\.dll$'
  - id: libssl-dll-basename
    desc: OpenSSL libssl DLL basename
    crit: component
    conf: 0.99
    if:
      type: path
      basename: true
      regex: '(?i)^libssl-[0-9]+\.dll$'
  - id: pe-dos-stub-zeroed
    desc: PE DOS stub region zeroed
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: pe.dos_stub_zeroed
      min: 1
  - id: pe-dos-stub-modified
    desc: PE DOS stub region modified
    crit: component
    conf: 0.9
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    if:
      type: metrics
      field: pe.dos_stub_modified
      min: 1
  - id: pe-misaligned-section
    desc: PE section alignment anomaly
    crit: component
    conf: 0.9
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    if:
      type: metrics
      field: pe.misaligned_section_count
      min: 1
  - id: pe-section-count-mismatch
    desc: PE section count disagrees with COFF header
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: pe.section_count_mismatch
      min: 1
  - id: pe-section-overlap
    desc: PE sections with overlapping virtual ranges
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: pe.section_overlap_count
      min: 1
    unless:
      - id: metadata/package/testing/presence/harness::pe-test-fixture-directory-path
      - id: well-known/game/online::moyu-packed-game-context
  - id: pe-entry-in-last-section
    desc: PE entry point in last section
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: pe.entry_in_last_section
      min: 1
    unless:
      - id: well-known/app/cvte-crashrpt/
    downgrade:
      any:
        - id: objectives/anti-static/pack/detect::enigma-protector
  - id: pe-bss-like-sections-multiple
    desc: PE has multiple BSS-style sections
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: pe.bss_like_section_count
      min: 2
    downgrade:
      any:
        - id: objectives/anti-static/pack/detect::enigma-protector
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pe-dotnet-native-entry
    desc: .NET assembly with native entry point
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: pe.dotnet_has_native_entry
      min: 1
  - id: pe-entry-in-header
    desc: PE entry point located in headers
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: pe.entry_in_header
      min: 1
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/resource/
      - id: metadata/signed/platform/
      - id: metadata/package/testing/presence/harness/
  - id: pe-import-dir-outside-section
    desc: PE import directory RVA outside any section
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: pe.import_dir_outside_section
      min: 1
  - id: pe-import-dir-rva-10000000
    desc: PE import directory RVA set to 0x10000000
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: pe.data_directories[0].rva
      regex: '^268435456$'
  - id: pe-export-dir-outside-section
    desc: PE export directory RVA outside any section
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: pe.export_dir_outside_section
      min: 1
  - id: pe-resource-dir-overrun
    desc: PE resource directory overruns its section
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: pe.rsrc_dir_overruns_section
      min: 1
  - id: pe-tls-callbacks-outside-code
    desc: "PE TLS callbacks land outside exe sections"
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: pe.tls_callbacks_outside_code
      min: 1
  - id: version-info-company-name-absent
    desc: CompanyName field absent from PE version info
    crit: component
    conf: 0.8
    if:
      type: value
      path: pe.version.company
      exists: false
composite_rules:
  - id: high-complexity-decoy-dll
    desc: High complexity but very few functions
    crit: suspicious
    for: [dll]
    all:
      - id: metadata/binary/metrics/anomaly::high-complexity-marker
      - id: low-function-count-marker
    unless:
      - id: metadata/file/extension/identity::exe-extension
      - id: metadata/binary/installer/family/
      - id: metadata/binary/layout::efi-pe-subsystem
      - id: metadata/signed/certificate/identity::pe-signature-verified
    downgrade:
      any:
        - id: metadata/binary/section/names::upx-section
        - id: well-known/app/crayens/
        - id: well-known/app/protected-benign-pe/
  - id: import-table-padding
    desc: Rare padding APIs with sparse function count
    crit: suspicious
    conf: 0.85
    attack: T1027.001
    size_max: 2097152
    all:
      - id: low-function-count-marker
      - id: metadata/binary/metrics/structural::many-imports
    any:
      - id: import-padding-system-time
      - id: import-padding-timer-queue
      - id: import-padding-write-profile
      - id: import-padding-console-alias
  - id: mass-export-aliasing
    desc: High export count with low code density
    crit: notable
    for: [dll]
    all:
      - id: metadata/binary/metrics/anomaly::high-export-count-marker
      - id: low-function-count-marker
    unless:
      - id: metadata/binary/anomaly/format/
  - id: mass-export-benign-context
    desc: Benign high-export forwarder context
    crit: component
    conf: 1.0
    any:
      - id: well-known/lib/vulkan::loader-dll
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/v8::isolate-symbol
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: metadata/binary/symbols/exports::self-versioned-forwarder
      - id: metadata/binary/symbols/exports::stable-abi-forwarder
      - id: metadata/library/python-runtime::python-stable-abi-forwarder-basename
      - id: vcruntime-dll-basename
      - id: libcrypto-dll-basename
      - id: libssl-dll-basename
  - id: msvc-rich-header-scrubbed
    desc: MSVC PE with Rich header stripped
    crit: suspicious
    conf: 0.88
    attack: T1070
    size_min: 32768
    all:
      - id: pe-dos-stub-zeroed
      - id: metadata/build/reproducible::pe-pgo-trained
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/
      - id: metadata/signed/platform/
  - id: version-info-string-table-stripped
    desc: PE version info present but string fields stripped
    crit: notable
    conf: 0.85
    attack: T1036
    size_min: 32768
    all:
      - id: metadata/package/versioning::version-info-file-version-present
      - id: version-info-company-name-absent
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: metadata/binary/framework::unity-player-framework
      - id: metadata/package/versioning::pe-product-name-present
      - id: metadata/package/versioning::pe-file-description-present
      - id: metadata/package/versioning::pe-legal-copyright-present
