defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
traits:
  - id: embedded-sha256-token
    desc: Standalone SHA256 hash string in binary
    crit: notable
    conf: 0.80
    attack: T1027
    if:
      type: string_value
      regex: '^[a-f0-9]{64}$'
      section: .rdata
    not:
      - regex: (?i)sha256
      - regex: (?i)checksum
  - id: timestamp-anomaly
    desc: PE timestamp anomaly detected
    conf: 0.7
    attack: "T1070.006"
    if:
      type: metrics
      field: pe.timestamp_anomaly
      min: 1
  - id: invalid-console-api-import
    desc: Invalid console API import name
    crit: suspicious
    conf: 0.96
    if:
      type: string_value
      exact: SetConsoleCursorMode
      section: .text
