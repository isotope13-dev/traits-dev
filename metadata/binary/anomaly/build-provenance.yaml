# Build-provenance contradictions: file-level facts that are individually
# legitimate but mutually inconsistent. These are pure file properties
# (no behavioral inference) so they live in metadata/, not objectives/.
#
# Background: PE compilers can opt into IMAGE_DEBUG_TYPE_REPRODUCIBLE
# (Microsoft's `/Brepro` flag), which sets `pe.timestamp` to a stable
# hash-derived value rather than the wall-clock build time. Compilers
# never produce a far-future timestamp under repro mode. A repro flag
# combined with a year >= 2031 means the timestamp was hand-tampered
# *after* the linker ran — classic timestomp masquerade.
#
# Reference: DAEMON Tools envchk.exe (2026 supply-chain campaign)
# stamps year 2060 yet sets is_reproducible_build=true.
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: pe-far-future-timestamp
    desc: PE compile timestamp far in future
    crit: baseline
    conf: 0.95
    if:
      type: metrics
      field: pe.timestamp_year
      min: 2031

composite_rules:
  - id: pe-reproducible-with-future-timestamp
    desc: Reproducible-build flag set yet PE timestamp is far in the future
    crit: suspicious
    conf: 0.97
    attack: "T1070.006"
    all:
      - id: metadata/build/reproducible::pe-reproducible-build
      - id: pe-far-future-timestamp
