# Junk Data and Entropy Manipulation
defaults:
  for: [binaries]
  platforms: [linux, macos, windows]

traits:
  - id: junk-base64-test-data
    desc: Base64 test data junk code indicator
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "Base64 encoding test data for junk code"

  - id: artificially-low-entropy
    desc: Artificially low entropy from padding
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: binary.overall_entropy
      max: 4.3
    unless:
      - id: metadata/binary/metrics::small-binary-100k
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-binary

  - id: massive-string-count
    desc: Massive string count junk padding
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: binary.string_count
      min: 90000

composite_rules:
  - id: artificial-entropy-reduction
    desc: Artificial entropy reduction via massive junk string padding
    crit: suspicious
    conf: 0.95
    all:
      - id: massive-string-count
      - id: artificially-low-entropy
    any:
      - id: junk-base64-test-data
      - id: metadata/binary/metrics::large-binary-1mb
