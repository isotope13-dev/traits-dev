# ELF Format Anomalies
# Structural issues in ELF binaries that indicate tampering or malware
defaults:
  platforms: [linux, android]
  for: [elf]
  crit: suspicious
  conf: 0.95
traits:
  - id: elf-no-section-headers
    desc: ELF binary without section headers
    if:
      type: metrics
      field: binary.section_count
      max: 0
    unless:
      - id: objectives/anti-static/pack/detection::upx-packer-string
  # Tiny file with oversized LOAD segment: the segment claims far more data
  # than the file actually contains. Common in shellcode stagers and crafted ELFs.
  - id: load-segment-exceeds-tiny-file
    desc: Oversized LOAD segment in tiny ELF
    mbc: B0001
    attack: T1027
    size_max: 10240
    if:
      type: metrics
      field: "elf.load_segment_max_p_filesz"
      min: 32768
  - id: load-segment-exceeds-small-file
    desc: Oversized LOAD segment in small ELF
    mbc: B0001
    attack: T1027
    conf: 0.90
    size_max: 200000
    if:
      type: metrics
      field: "elf.load_segment_max_p_filesz"
      min: 1000000
  - id: compact-large-load-memory-image
    desc: Compact ELF reserves large memory image
    crit: notable
    conf: 0.72
    mbc: F0001
    attack: T1027.002
    size_max: 5000000
    if:
      type: metrics
      field: "elf.load_segment_max_p_memsz"
      min: 33554432
