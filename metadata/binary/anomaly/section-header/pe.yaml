defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85

traits:
  - id: pe-entry-in-punctuated-section
    desc: PE entry point in punctuated section
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: pe.entry_section
      regex: '^\.[^A-Za-z0-9].+$'
