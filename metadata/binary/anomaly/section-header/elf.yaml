defaults:
  platforms: [linux, android]
  for: [elf]
  conf: 0.95

traits:
  - id: elf64-zero-section-header-offset
    desc: ELF64 section header offset is zero
    crit: component
    if:
      type: hex
      offset: 0
      pattern: "7F 45 4C 46 02 ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? 00 00 00 00 00 00 00 00"
  - id: elf32-zero-section-header-offset
    desc: ELF32 section header offset is zero
    crit: component
    if:
      type: hex
      offset: 0
      pattern: "7F 45 4C 46 01 ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? 00 00 00 00"

composite_rules:
  - id: elf-no-section-headers
    desc: ELF binary without section headers
    crit: notable
    any:
      - id: elf64-zero-section-header-offset
      - id: elf32-zero-section-header-offset
    unless:
      - id: objectives/anti-static/pack/detect::upx-packer-string
