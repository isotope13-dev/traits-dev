defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
traits:
  - id: dense-sha256-hex-blobs
    desc: Dense SHA-256-shaped hex blob table
    crit: notable
    conf: 0.85
    # Detects an embedded table of 64-character hex strings packed
    # densely in .rodata. Common shapes: hash-based string allowlist,
    # hash-based rival-process killer (Mirai killer.c style), or a
    # large precomputed lookup table. Single hashes can be embedded
    # for benign reasons (file integrity, cert pin); 10+ together is
    # anomalous for non-crypto applications.
    if:
      type: text
      regex: '^[a-f0-9]{64}$'
    count_min: 10
    per_kb_min: 0.05
