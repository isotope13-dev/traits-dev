# Junk Data and Entropy Manipulation
defaults:
  for: [binaries]
  platforms: [linux, macos, windows]

traits:
  - id: junk-base64-test-data
    desc: Base64 test data junk code indicator
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "Base64 encoding test data for junk code"

  - id: artificially-low-entropy
    desc: Artificially low entropy from padding
    crit: notable
    conf: 0.8
    size_min: 500000
    if:
      type: metrics
      field: binary.overall_entropy
      max: 2.5
    unless:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab

  - id: massive-string-count
    desc: Massive string count junk padding
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: binary.string_count
      min: 90000
    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/electron::electron-app-runtime
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::rust-binary
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime

composite_rules:
  - id: artificial-entropy-reduction
    desc: Artificial entropy reduction via massive junk string padding
    crit: suspicious
    conf: 0.95
    all:
      - id: massive-string-count
      - id: artificially-low-entropy
    any:
      - id: junk-base64-test-data
      - id: metadata/binary/metrics/size::large-file-1mb

    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
