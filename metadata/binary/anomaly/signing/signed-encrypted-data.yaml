# Signed PE carrying a high-entropy embedded data blob.
#
# A digitally-signed Windows binary that ships a small (4 KB - 64 KB)
# .data section at near-max entropy is anomalous — vendor utilities
# rarely embed encrypted assets at that size. This is the structural
# fingerprint of a supply-chain trojanization where an attacker
# inlined an encrypted second-stage payload into a vendor binary
# before the build pipeline signed it.
#
# Atoms here are pure file-property observations (metadata/ tier).
# Composites that reference these atoms live in:
#   - well-known/malware/supply-chain/daemontools-cc (DTProHelper)
#   - objectives/command-and-control/dropper/staging/encrypted (generic)
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: small-high-entropy-data-section
    desc: Small high-entropy writable .data section
    crit: notable
    conf: 0.9
    if:
      type: section
      exact: ".data"
      length_min: 4096
      length_max: 65536
      entropy_min: 6.85
      writable: true

  - id: high-entropy-rdata-section
    desc: High-entropy read-only .rdata section
    crit: notable
    conf: 0.85
    if:
      type: section
      exact: ".rdata"
      length_min: 4096
      length_max: 131072
      entropy_min: 7.2
    unless:
      - id: metadata/binary/metrics/structural::many-functions

composite_rules:
  - id: signed-pe-with-encrypted-data-blob
    desc: Authenticode-signed PE with high-entropy data blob
    crit: suspicious
    conf: 0.93
    all:
      - id: small-high-entropy-data-section
      - id: metadata/signed/platform::authenticode-signed
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/installer/family/
      - id: metadata/binary/framework/
