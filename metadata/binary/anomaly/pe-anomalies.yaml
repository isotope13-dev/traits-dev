defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: export-name-masquerade
    desc: Export table name differs from filename
    if:
      type: string_value
      exact: "cloud.dll"
      section: .rdata
  - id: suffixed-system-dll-core
    desc: Core system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(userenv|xmllite|ntdll|kernel32)[0-9]\\.dll"
  - id: suffixed-system-dll-network
    desc: Network system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(advapi32|ws2_32|wininet|winhttp)[0-9]\\.dll"
  - id: suffixed-system-dll-shell
    desc: Shell system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(urlmon|shell32|shlwapi|ole32)[0-9]\\.dll"
  - id: suffixed-system-dll-crypto
    desc: Crypto system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(oleaut32|crypt32|bcrypt)[0-9]\\.dll"
  - id: repetitive-padding-inflation
    desc: Large binary with repetitive padding
    crit: component
    if:
      type: string_value
      substr: "UUUU3333"
      section: ".text"
  - id: high-complexity-marker
    desc: High code complexity metric
    crit: component
    if:
      type: metrics
      field: binary.avg_complexity
      min: 20
  - id: low-function-count-marker
    desc: Low function count metric
    crit: component
    size_min: 65536
    if:
      type: metrics
      field: binary.function_count
      max: 10
  - id: high-export-count-marker
    desc: High export count metric
    crit: component
    if:
      type: metrics
      field: binary.export_count
      min: 50
composite_rules:
  - id: suffixed-system-dll-masquerade
    desc: System DLL name with digit suffix
    any:
      - id: suffixed-system-dll-core
      - id: suffixed-system-dll-network
      - id: suffixed-system-dll-shell
      - id: suffixed-system-dll-crypto
  - id: high-complexity-decoy-dll
    desc: High complexity but very few functions
    for: [dll]
    all:
      - id: high-complexity-marker
      - id: low-function-count-marker
  - id: mass-export-aliasing
    desc: High export count with low code density
    for: [dll]
    all:
      - id: high-export-count-marker
      - id: low-function-count-marker
