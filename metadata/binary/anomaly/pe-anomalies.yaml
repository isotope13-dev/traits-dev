defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: repetitive-padding-inflation
    desc: Large binary with repetitive padding
    crit: component
    if:
      type: text
      substr: "UUUU3333"
      section: ".text"
  - id: low-function-count-marker
    desc: Low function count metric
    crit: component
    size_min: 65536
    if:
      id: metadata/binary/metrics/markers::low-function-count-marker
  - id: import-padding-system-time
    desc: SetSystemTimeAdjustment import (rare, common padding symbol)
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: SetSystemTimeAdjustment
  - id: import-padding-timer-queue
    desc: CreateTimerQueue import (rare, common padding symbol)
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: CreateTimerQueue
  - id: import-padding-write-profile
    desc: WriteProfileSectionA import (rare, common padding symbol)
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: WriteProfileSectionA
  - id: import-padding-console-alias
    desc: AddConsoleAliasW import (rare, common padding symbol)
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: AddConsoleAliasW
composite_rules:
  - id: high-complexity-decoy-dll
    desc: High complexity but very few functions
    crit: notable
    for: [dll]
    all:
      - id: metadata/binary/metrics/markers::high-complexity-marker
      - id: low-function-count-marker
    unless:
      - id: metadata/binary/framework::exe-extension
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/layout::efi-pe-subsystem
  - id: import-table-padding
    desc: Rare padding APIs with sparse function count
    crit: suspicious
    conf: 0.85
    attack: T1027.001
    size_max: 2097152
    all:
      - id: low-function-count-marker
      - id: metadata/binary/metrics::many-imports
    any:
      - id: import-padding-system-time
      - id: import-padding-timer-queue
      - id: import-padding-write-profile
      - id: import-padding-console-alias
  - id: mass-export-aliasing
    desc: High export count with low code density
    crit: notable
    for: [dll]
    all:
      - id: metadata/binary/metrics/markers::high-export-count-marker
      - id: low-function-count-marker
    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: metadata/binary/symbols::self-versioned-forwarder
      - id: metadata/binary/symbols::stable-abi-forwarder
      - id: metadata/library/python-runtime::python-stable-abi-forwarder-basename
