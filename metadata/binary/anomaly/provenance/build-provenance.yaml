# Build-provenance contradictions: file-level facts that are individually
# legitimate but mutually inconsistent. These are pure file properties
# (no behavioral inference) so they live in metadata/, not objectives/.
#
# Background: PE compilers can opt into IMAGE_DEBUG_TYPE_REPRODUCIBLE
# (Microsoft's `/Brepro` flag), which sets `pe.timestamp` to a stable
# hash-derived value rather than the wall-clock build time. Far-future
# values are therefore anomalous build provenance, but not always enough
# to infer timestomping without additional context.
#
# Reference: DAEMON Tools envchk.exe (2026 supply-chain campaign)
# stamps year 2060 yet sets is_reproducible_build=true.
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: pe-far-future-timestamp
    desc: PE compile timestamp far in future
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: pe.timestamp
      min: 1925068800
    unless:
      - id: well-known/lib/mozilla-nspr::nspr-library
      - id: well-known/lib/subversion::subversion-working-copy-library
    # Microsoft's /Brepro reproducible builds hash source contents into the
    # PE timestamp field; that hash is uniformly distributed and frequently
    # lands in the far-future range. Microsoft-vendor-marked binaries are
    # downgraded to notable so the underlying composite still evaluates.
    # MinGW deterministic builds (--build-id=sha1) also produce far-future
    # timestamps from hash-derived values. Eclipse Foundation projects use
    # this pattern.
    downgrade:
      any:
        - id: metadata/build/reproducible::pe-reproducible-build
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/framework::mingw-pseudoreloc-runtime
        - id: well-known/lib/sqlite::sqlite-tcl-extension-library
        - id: metadata/binary/framework::dotnet-native-image-pdb
  - id: pe-concatenated-env-build-path
    desc: PE build path contains joined env tokens
    crit: suspicious
    conf: 0.88
    if:
      type: kv
      path: build.username
      regex: 'HOMEDRIVEHOMEPATH|LOCKLOGLOG\.oldCURRENT\.bak'

composite_rules:
  - id: future-timestamp-reproducible-context
    desc: Reproducible or vendor context for far-future PE timestamp
    crit: component
    conf: 0.9
    any:
      - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
      - id: metadata/binary/vendor::microsoft-corp-marker-rdata
      - id: metadata/binary/vendor::microsoft-corp-marker-cert
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/signed/platform::microsoft-certificate-chain
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/lang/compiler/native::mingw-built-pe
      - id: metadata/lang/compiler/native::mingw-runtime-marker
      - id: metadata/binary/framework::mingw-pseudoreloc-runtime
      - id: well-known/lib/sqlite::sqlite-tcl-extension-library
      - id: metadata/signed/leaf::eclipse.org-foundation-inc.
      - id: metadata/build/reproducible::pe-reproducible-build
      - id: well-known/lib/mozilla-nspr::nspr-library
      - id: well-known/lib/subversion::subversion-working-copy-library
  - id: pe-reproducible-with-future-timestamp
    desc: Reproducible PE has future timestamp
    crit: notable
    conf: 0.97
    attack: "T1070.006"
    all:
      - id: metadata/build/reproducible::pe-reproducible-build
      - id: pe-far-future-timestamp
