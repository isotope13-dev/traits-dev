# A PE VERSIONINFO filename mismatch is a neutral provenance observation.
# It becomes masquerade evidence only when an objective composite combines it
# with payload-concealment or other attack-specific signals.
defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: pe-basename-differs-from-original-filename
    desc: PE basename differs from OriginalFilename
    crit: notable
    conf: 0.85
    if:
      type: value
      path: file.basename
      ne: pe.version.original_filename
    unless:
      - id: metadata/signed/platform::microsoft
      - type: basename
        regex: '^fil[0-9A-Fa-f]{8,}$'
      - id: metadata/signed/leaf::wix-toolset-.net-foundation
      - type: basename
        regex: '^[0-9a-f]{64}\.(exe|dll)$'
