defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: pe-version-company-sennheiser
    desc: Sennheiser company version claim
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.company
      exact: Sennheiser Electronic
  - id: pe-version-product-resource-processor
    desc: Resource Processor product claim
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.product_name
      exact: Resource Processor
