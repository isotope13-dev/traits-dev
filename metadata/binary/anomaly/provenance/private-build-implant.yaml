defaults:
  platforms: [linux]
  for: [elf]
traits:
  - id: no-stack-canary
    desc: ELF built without stack canary
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: elf.stack_canary
      max: 0
  - id: partial-relro
    desc: ELF built with only partial RELRO
    crit: component
    conf: 0.7
    if:
      type: value
      path: elf.relro
      exact: partial
  - id: stripped-symbol-tables
    desc: ELF symbol tables stripped from binary
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: elf.stripped_metadata_section_count
      min: 2
composite_rules:
  - id: private-build-hardening-profile
    desc: ELF hardening profile suggests private
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: no-stack-canary
      - id: partial-relro
      - id: stripped-symbol-tables
      - id: metadata/build/artifact::distro-toolchain-implausible
    unless:
      - id: metadata/signed/platform
      - id: well-known/lib
