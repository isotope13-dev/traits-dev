defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: token-privilege-api-usage
    desc: Token privilege API usage detected
    crit: baseline
    conf: 0.9
    any:
      - id: micro-behaviors/os/privilege/token::open-process-token
      - id: micro-behaviors/os/privilege/token::open-thread-token
      - id: micro-behaviors/os/privilege/token::get-token-information
