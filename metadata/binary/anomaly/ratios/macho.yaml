# Mach-O Data-to-Code Ratio Anomalies
# Neutral structural measurements; objectives may use these as supporting context.
defaults:
  platforms: [macos]
  for: [macho]
  mbc: "B0032"
traits:
  - id: low-code-to-data-ratio
    desc: "Very low code-to-data ratio"
    crit: notable
    conf: 0.9
    size_min: 32768
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.1 # Code is less than 10% of data size
    unless:
      - id: metadata/signed/platform::apple
      # The ratio metric uses virtual section sizes.  A large zero-fill
      # __bss/__common section can therefore make an ordinary solver or data
      # structure look like an on-disk payload.
      - type: section
        regex: '__(bss|common)$'
      - type: section
        regex: __const$
        entropy_max: 6.2
      - id: metadata/binary/framework/
  - id: high-data-dominance
    desc: "Data section dominates file"
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.80
  - id: python-wheel-member-path
    desc: Python wheel member path
    crit: component
    conf: 0.9
    if:
      type: path
      regex: '\.whl[\\/]'
  - id: einverted-macos-helper-basename
    desc: einverted macOS helper basename
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      exact: einverted_macos_arm64
composite_rules:
  - id: macho-extreme-data-to-code-ratio
    desc: "Mach-O extreme data-to-code ratio"
    crit: suspicious
    conf: 0.9
    # Structural only: keep in metadata so benign media/lib binaries do not
    # become objective findings.
    all:
      - id: low-code-to-data-ratio
    any:
      - id: high-data-dominance
      - id: metadata/binary/anomaly/format::minimal-string-count
    unless:
      - id: python-wheel-member-path
      - id: einverted-macos-helper-basename
