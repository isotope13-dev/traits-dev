defaults:
  for:
    - c
  platforms:
    - windows
traits:
  - id: rar-v4-header
    desc: RAR v4 archive header
    crit: baseline
    conf: 1.0
    size_min: 12000
    size_max: 14000
    if:
      type: hex
      pattern: 52 61 72 21 1A 07 00
      offset: 0
  - id: relock-asm-file
    desc: Relock assembly source file
    crit: baseline
    conf: 0.99
    size_min: 12000
    size_max: 14000
    if:
      type: string_literal
      exact: RELOCK.ASM
  - id: relock-inc-file
    desc: Relock include source file
    crit: baseline
    conf: 0.99
    size_min: 12000
    size_max: 14000
    if:
      type: string_literal
      exact: RELOCK.INC
  - id: relock-29a-note
    desc: Relock 29A note file
    crit: baseline
    conf: 0.99
    size_min: 12000
    size_max: 14000
    if:
      type: string_literal
      exact: 29A.NFO
  - id: relock-defjam-note
    desc: Relock DefJam note file
    crit: baseline
    conf: 0.99
    size_min: 12000
    size_max: 14000
    if:
      type: string_literal
      exact: DEFJAM.NFO
