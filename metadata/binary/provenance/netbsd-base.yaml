# Composite NetBSD base-system identification — aggregates ident-keyword,
# source-tree, and product-string markers into a single "this is a NetBSD
# base-system binary" signal.
defaults:
  platforms: [unix]
  for: [binaries, scripts, c, cpp]
  crit: baseline
  conf: 0.9

traits:
  - id: netbsd-secure-shell-marker
    desc: NetBSD Secure Shell base-system string
    if:
      type: text
      substr: NetBSD_Secure_Shell

composite_rules:
  - id: netbsd-base-system-artifact
    desc: NetBSD base system artifact
    conf: 0.95
    any:
      - id: metadata/binary/provenance::netbsd-rcs-id
      - id: metadata/binary/provenance::netbsd-source-tree-path
      - id: metadata/binary/provenance::netbsd-secure-shell-marker
      - id: metadata/binary/provenance::netbsd-pam-source-path
      - id: metadata/binary/provenance::netbsd-postfix-source-path

  - id: netbsd-runtime-linker-artifact
    desc: NetBSD runtime linker artifact
    conf: 0.97
    all:
      - id: metadata/binary/provenance::netbsd-base-system-artifact
      - id: metadata/binary/provenance::netbsd-rtld-rcs-id
