# Apple's what(1) marker: @(#)PROGRAM:foo PROJECT:bar-N strings emitted by
# xcbuild and surviving in stripped binaries. Provenance, not debug info.
defaults:
  crit: baseline
  platforms:
    - macos
  for:
    - macho
    - dylib
traits:
  - id: project-marker
    desc: Apple internal project marker
    conf: 0.95
    if:
      type: text
      regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
      section: .text
