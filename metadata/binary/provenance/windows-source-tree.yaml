defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.7

traits:
  - id: uefi-driver-ntfs-debug-path
    desc: UEFI NTFS driver debug/source path
    if:
      type: text
      substr: "uefi-driver/uefi_driver/DEBUG/ntfs.dll"
      section: rdata
  - id: dark-eye-vb6-project-path
    desc: Dark Eye VB6 project path
    conf: 0.99
    if:
      type: text
      substr: Malware Writers\Dark EYE\Projects\FRPHNXW.vbp
      section: rdata
