# Embedded source-tree paths from BSD-style /usr/src layouts. These survive
# stripping because they live in .rodata as string literals (e.g., __FILE__).
defaults:
  platforms: [unix]
  for: [binaries, scripts, c, cpp]
  crit: baseline
  conf: 0.9

traits:
  - id: netbsd-source-tree-path
    desc: BSD source-tree subtree under /usr/src
    if:
      # Bare /usr/src/ is generic Unix (Linux kernel sources and DKMS modules
      # live there too), so it must not assert NetBSD provenance on its own.
      # Require a BSD-distinctive source subtree to avoid misattributing Linux
      # artifacts (e.g. DKMS /usr/src/<pkg>-<ver>) as a NetBSD base system.
      type: text
      regex: '/usr/src/(sys|crypto|external|usr\.s?bin)/'

  - id: netbsd-pam-source-path
    desc: NetBSD PAM module source path
    for: [so, elf, c, cpp]
    if:
      type: text
      substr: /usr/src/lib/libpam/modules/

  - id: netbsd-postfix-source-path
    desc: NetBSD Postfix source path
    for: [elf, c, cpp]
    if:
      type: text
      substr: /usr/src/external/ibm-public/postfix/
