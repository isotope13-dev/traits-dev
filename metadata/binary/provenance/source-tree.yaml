# Embedded source-tree paths from BSD-style /usr/src layouts. These survive
# stripping because they live in .rodata as string literals (e.g., __FILE__).
defaults:
  platforms: [unix]
  for: [binaries, scripts, c, cpp]
  crit: baseline
  conf: 0.9

traits:
  - id: netbsd-source-tree-path
    desc: NetBSD-style /usr/src source path
    if:
      type: text
      substr: /usr/src/

  - id: netbsd-pam-source-path
    desc: NetBSD PAM module source path
    for: [so, elf, c, cpp]
    if:
      type: text
      substr: /usr/src/lib/libpam/modules/

  - id: netbsd-postfix-source-path
    desc: NetBSD Postfix source path
    for: [elf, c, cpp]
    if:
      type: text
      substr: /usr/src/external/ibm-public/postfix/
