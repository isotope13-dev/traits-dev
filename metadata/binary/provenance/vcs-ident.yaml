# RCS/CVS ident keyword strings baked into binaries via $Keyword: substitution.
# These are .rodata string literals that survive stripping, so they show up in
# release binaries from BSD source trees and other RCS-using projects.
defaults:
  platforms: [unix]
  for: [binaries, scripts, c, cpp]
  crit: baseline
  conf: 0.9

traits:
  - id: netbsd-rcs-id
    desc: NetBSD RCS ident keyword
    if:
      type: text
      substr: "$NetBSD:"

  - id: netbsd-rtld-rcs-id
    desc: NetBSD runtime linker source ident
    for: [elf, so]
    if:
      type: text
      substr: "$NetBSD: rtld.c"
      section: rdata
