# PE Resource Section Traits
# Resource section (.rsrc) characteristics that indicate binary identity
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: minimal-resources
    desc: Tiny resource section (no version/icon)
    crit: baseline
    conf: 0.8
    size_min: 10000
    if:
      type: section
      exact: ".rsrc"
      length_max: 1024
    unless:
      - id: metadata/quality/versioning::pe-version-resource
  - id: no-resources
    desc: Binary lacks resource section entirely
    crit: baseline
    conf: 0.8
    size_min: 10000
    if:
      type: section_ratio
      section: ".rsrc"
      max: 0.001
  - id: oversized-rsrc
    desc: Oversized PE resource section
    crit: notable
    conf: 0.82
    if:
      type: section
      exact: ".rsrc"
      length_min: 262144
  - id: oversized-low-entropy-rsrc
    desc: Oversized low-entropy PE resources
    crit: notable
    conf: 0.9
    if:
      type: section
      exact: ".rsrc"
      length_min: 262144
      entropy_max: 2.2
  - id: xmp-resource-namespace
    desc: Adobe XMP metadata namespace in resources
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      exact: http://ns.adobe.com/xap/1.0/
      section: .rsrc
  - id: rdf-resource-namespace
    desc: RDF metadata namespace in resources
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      exact: http://www.w3.org/1999/02/22-rdf-syntax-ns#
      section: .rsrc
composite_rules:
  - id: oversized-rich-media-rsrc
    desc: Oversized PE resources with embedded media metadata
    crit: notable
    conf: 0.9
    all:
      - id: oversized-rsrc
    any:
      - id: xmp-resource-namespace
      - id: rdf-resource-namespace
      - id: metadata/quality/versioning::pe-version-resource
    needs: 2
  - id: signed-overlay-resource-heavy-pe
    desc: Signed PE with overlay and heavy resources
    crit: notable
    conf: 0.92
    all:
      - id: oversized-rsrc
    any:
      - id: metadata/format/pe::has-overlay
      - id: metadata/format/pe::overlay-size-metrics
      - id: oversized-rich-media-rsrc
      - id: metadata/signed/developer::comodo-rsa-code-signing-ca
      - id: metadata/signed/developer::rita
      - id: metadata/quality/versioning::version-resource-metadata
    needs: 4
