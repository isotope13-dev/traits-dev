# PE custom section metadata
defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: huan-section
    desc: Custom .huan payload section
    crit: baseline
    conf: 0.98
    if:
      type: section
      exact: ".huan"
  - id: huan-dominant-packed-section
    desc: Dominant high-entropy .huan section
    crit: baseline
    conf: 0.98
    if:
      type: section
      exact: ".huan"
      readable: true
      writable: false
      executable: false
      length_min: 1048576
      entropy_min: 7.8
