defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85

traits:
  - id: oversized-rdata-ratio
    desc: .rdata significantly larger than .text
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 5.0

  - id: high-entropy-resource-small-dll
    desc: Small DLL, high-entropy resource
    conf: 0.9
    size_max: 250000
    if:
      type: section
      substr: '.rsrc'
      entropy_min: 7.5
