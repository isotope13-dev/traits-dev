# PE custom section metadata
defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: huan-section
    desc: Custom .huan payload section
    crit: notable
    conf: 0.98
    if:
      type: section
      exact: ".huan"
  - id: huan-dominant-packed-section
    desc: Dominant high-entropy .huan section
    crit: suspicious
    conf: 0.98
    if:
      type: section
      exact: ".huan"
      readable: true
      writable: false
      executable: false
      length_min: 1048576
      entropy_min: 7.8
  - id: single-letter-custom-section
    desc: Single-letter custom PE section
    crit: notable
    conf: 0.88
    if:
      type: section
      regex: '^\.[A-Z]$'
  - id: uppercase-prefixed-custom-section
    desc: Uppercase-prefixed custom PE section
    crit: notable
    conf: 0.84
    if:
      type: section
      regex: '^\.[A-Z][A-Za-z]{1,5}$'
  - id: lowercase-prefixed-custom-section
    desc: Lowercase-prefixed custom PE section
    crit: notable
    conf: 0.84
    if:
      type: section
      regex: '^\.[a-z][A-Za-z]{0,4}[A-Z][A-Za-z]*$'
composite_rules:
  - id: mixed-case-custom-section
    desc: Mixed-case custom PE section
    crit: notable
    conf: 0.88
    all:
      - id: uppercase-prefixed-custom-section
      - id: lowercase-prefixed-custom-section
