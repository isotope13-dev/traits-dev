defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: rdata-ratio-over-5x
    desc: rdata over five times text size
    crit: component
    conf: 0.8
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 5.0
  - id: low-entropy-rdata-section
    desc: Low-entropy rdata section
    crit: component
    conf: 0.8
    if:
      type: section
      exact: '.rdata'
      entropy_max: 4.2
  - id: tiny-data-section
    desc: Tiny writable data section
    crit: component
    conf: 0.8
    if:
      type: section
      exact: '.data'
      length_max: 16384
  - id: oversized-rdata-ratio
    desc: .rdata significantly larger than .text
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 5.0
    unless:
      - id: benign-large-rdata-layout
      - type: metrics
        field: binary.export_count
        min: 50
  - id: high-entropy-resource-small-dll
    desc: Small DLL, high-entropy resource
    conf: 0.9
    size_max: 250000
    if:
      type: section
      substr: '.rsrc'
      entropy_min: 7.5
composite_rules:
  - id: benign-large-rdata-layout
    desc: Large low-entropy rdata with version metadata
    crit: component
    conf: 0.8
    all:
      - id: rdata-ratio-over-5x
      - id: low-entropy-rdata-section
      - id: tiny-data-section
      - id: metadata/quality/versioning::pe-version-resource
