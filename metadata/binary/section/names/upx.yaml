defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: upx0-section-name
    desc: UPX0 section name
    crit: component
    conf: 1.0
    if:
      type: section
      exact: "UPX0"

  - id: upx1-section-name
    desc: UPX1 section name
    crit: component
    conf: 1.0
    if:
      type: section
      exact: "UPX1"

  - id: upx2-section-name
    desc: UPX2 section name
    crit: component
    conf: 1.0
    if:
      type: section
      exact: "UPX2"

  - id: upx-section
    desc: UPX packed section name
    crit: baseline
    conf: 0.95
    mbc: F0001.008
    if:
      type: section
      regex: (?i)^(\.?UPX\d*)$
    unless:
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export

composite_rules:
  - id: upx-section-pair
    desc: UPX0 and UPX1 section pair
    crit: baseline
    conf: 0.95
    all:
      - id: metadata/binary/section/names::upx0-section-name
      - id: metadata/binary/section/names::upx1-section-name
