# Blank PE section names are unusual in ordinary toolchain output. A cluster
# is a structural anomaly; objective composites add any packer or loader context.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: blank-section-name-cluster
    desc: Multiple PE sections have blank names
    crit: notable
    conf: 0.95
    count_min: 4
    if:
      type: section
      regex: '^\s+$'
