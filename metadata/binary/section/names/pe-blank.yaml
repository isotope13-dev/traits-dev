# Blank PE section names are unusual in ordinary toolchain output. A cluster
# of them is a structural concealment signal; keep the atom neutral enough for
# objective composites to add the packed/elevated context.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: blank-section-name-cluster
    desc: Multiple PE sections have blank names
    crit: suspicious
    conf: 0.95
    count_min: 4
    if:
      type: section
      regex: '^\s+$'
