# Non-standard PE section names using forward-slash followed by digits
# (e.g. /4, /19, /45). These are COFF string table index artifacts from
# custom linker scripts or build tools that add padding sections.
# Legitimate MinGW binaries use standard names (.text, .data, .rdata).
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.92

traits:
  - id: many-slash-numeric-sections
    desc: Many slash-numeric PE sections (padding artifact)
    count_min: 3
    if:
      type: section
      regex: "^/[0-9]+$"
      readable: true
      writable: false
      executable: false
    # Slash-numeric section names are a standard MinGW linker artifact
    # (COFF string table index placeholders). Downgrade for MinGW builds.
    downgrade:
      any:
        - id: metadata/lang/compiler/native::linker-binutils-2x
        - id: metadata/lang/compiler/native::mingw-runtime-marker
