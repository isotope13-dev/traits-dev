# Non-standard PE section names using forward-slash followed by digits
# (e.g. /4, /19, /45). These are COFF string table index artifacts from
# custom linker scripts or build tools that add padding sections.
# Legitimate MinGW binaries use standard names (.text, .data, .rdata).
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.9

traits:
  - id: slash-numeric-section-name
    desc: PE section named with slash-numeric pattern
    if:
      type: section
      regex: "^/[0-9]+$"
      readable: true
      writable: false
      executable: false

composite_rules:
  - id: multiple-slash-numeric-sections
    desc: Multiple slash-numeric PE sections (padding artifact)
    crit: suspicious
    conf: 0.92
    all:
      - id: slash-numeric-section-name
    count_min: 3
