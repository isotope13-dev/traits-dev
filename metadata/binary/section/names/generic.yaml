defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: high-entropy-rdata
    desc: High entropy .rdata section (likely encrypted)
    crit: notable
    conf: 0.8
    entropy_min: 7.9
    if:
      type: section
      substr: ".rdata"
  - id: writable-rdata
    desc: Writable .rdata section permissions
    crit: notable
    conf: 0.72
    if:
      type: section
      exact: ".rdata"
      readable: true
      writable: true
    downgrade:
      any:
        - id: objectives/anti-static/pack/detect::aspack-marker
