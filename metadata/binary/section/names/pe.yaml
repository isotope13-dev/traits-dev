defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.9

traits:
- id: pe-code-data-standard-section
  desc: PE standard code/data section
  crit: component
  if:
    type: section
    regex: "^\\.(text|code|init|data)$"

- id: pe-runtime-standard-section
  desc: PE standard runtime section
  crit: component
  if:
    type: section
    regex: "^\\.(rdata|pdata|xdata|reloc)$"

- id: pe-resource-section
  desc: PE resource section
  crit: component
  if:
    type: section
    exact: .rsrc

- id: pe-tls-section
  desc: PE TLS section
  crit: component
  if:
    type: section
    exact: .tls

- id: executable-textbss-zero-backed
  desc: Executable zero-backed .textbss section
  crit: baseline
  conf: 0.96
  if:
    type: section
    exact: .textbss
    executable: true
    entropy_max: 0.06
    length_max: 0

- id: reloc-section-presence
  desc: PE .reloc section presence
  if:
    type: section
    exact: .reloc

- id: suspicious-reloc-section
  desc: Suspicious .reloc section (high entropy)
  crit: notable
  conf: 0.95
  if:
    type: section
    exact: .reloc
    entropy_min: 6.8
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-assembly
    # .NET assemblies often have higher entropy in relocs due to metadata structure.
  unless:
  - id: metadata/binary/resource::rich-header-present
  - id: metadata/signed/developer::martin-tofall
  - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
- id: cfg2-section
  desc: PE .cfg2 section name
  crit: component
  conf: 0.96
  if:
    type: section
    exact: .cfg2

- id: gfids2-section
  desc: PE .gfids2 section name
  crit: component
  conf: 0.96
  if:
    type: section
    exact: .gfids2

- id: data2-section
  desc: PE .data2 section name
  crit: component
  conf: 0.96
  if:
    type: section
    exact: .data2

- id: idata2-section
  desc: PE .idata2 section name
  crit: component
  conf: 0.96
  if:
    type: section
    exact: .idata2

- id: rdata2-section
  desc: PE .rdata2 section name
  crit: component
  conf: 0.96
  if:
    type: section
    exact: .rdata2

- id: n4w-section
  desc: PE custom .N4w section name
  crit: component
  conf: 0.98
  if:
    type: section
    exact: .N4w
    executable: true
    length_min: 4194304

- id: dot-z-section
  desc: PE custom .__z section name
  crit: component
  conf: 0.98
  if:
    type: section
    exact: .__z
    executable: true
    length_min: 4194304

- id: p60-section
  desc: PE custom .P60 section name
  crit: component
  conf: 0.98
  if:
    type: section
    exact: .P60
    executable: true
    length_min: 4194304

- id: bd-loader-section
  desc: PE custom ._Bd section name
  crit: component
  conf: 0.98
  if:
    type: section
    exact: ._Bd
    executable: true
    length_min: 4194304

- id: h-u-cavity-section
  desc: PE custom .h_U cavity section
  crit: notable
  conf: 0.97
  if:
    type: section
    exact: .h_U
    writable: true
    length_max: 4096

- id: hhz-section
  desc: PE custom .HhZ section name
  crit: component
  conf: 0.99
  if:
    type: section
    exact: .HhZ

- id: pvg-section
  desc: PE custom .PVg section name
  crit: component
  conf: 0.99
  if:
    type: section
    exact: .PVg

- id: pdi-section
  desc: PE custom .pdi section name
  crit: component
  conf: 0.98
  if:
    type: section
    exact: .pdi

- id: entech-section
  desc: PE custom .entech section name
  crit: component
  conf: 0.98
  if:
    type: section
    exact: .entech

- id: z4-slash-section
  desc: PE custom .z4 slash section
  crit: notable
  conf: 0.99
  if:
    type: section
    exact: .z4/
    executable: true
    length_min: 10485760
    entropy_min: 7.5

composite_rules:
- id: pe-standard-loader-section
  desc: PE standard loader section present
  crit: component
  any:
  - id: pe-code-data-standard-section
  - id: pe-runtime-standard-section
  - id: pe-resource-section
  - id: pe-tls-section

- id: pe-resource-or-tls-section
  desc: PE resource or TLS section present
  crit: component
  any:
  - id: pe-resource-section
  - id: pe-tls-section

- id: duplicated-runtime-section-suffixes
  desc: Duplicated PE runtime section suffixes
  crit: suspicious
  conf: 0.97
  all:
  - id: cfg2-section
  - id: gfids2-section
  - id: rdata2-section
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/installer/family::known-benign-installer

- id: duplicated-loader-section-suffixes
  desc: Duplicated PE loader section suffixes
  crit: suspicious
  conf: 0.97
  all:
  - id: data2-section
  - id: gfids2-section
  - id: idata2-section
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/installer/family::known-benign-installer

- id: large-n4w-z-section-pair
  desc: Large .N4w and .__z payload sections
  crit: component
  conf: 0.99
  all:
  - id: n4w-section
  - id: dot-z-section

- id: large-p60-bd-section-pair
  desc: Large .P60 and ._Bd payload sections
  crit: component
  conf: 0.99
  all:
  - id: p60-section
  - id: bd-loader-section

- id: hhz-pvg-z4-section-triple
  desc: .HhZ .PVg and .z4 custom sections
  crit: suspicious
  conf: 0.99
  all:
  - id: hhz-section
  - id: pvg-section
  - id: z4-slash-section
