defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.9

traits:
  - id: pe-code-data-standard-section
    desc: PE standard code/data section
    crit: component
    if:
      type: section
      regex: "^\\.(text|code|init|data)$"

  - id: pe-runtime-standard-section
    desc: PE standard runtime section
    crit: component
    if:
      type: section
      regex: "^\\.(rdata|pdata|xdata|reloc)$"

  - id: pe-resource-section
    desc: PE resource section
    crit: component
    if:
      type: section
      exact: .rsrc

  - id: pe-tls-section
    desc: PE TLS section
    crit: component
    if:
      type: section
      exact: .tls

  - id: reloc-section-presence
    desc: PE .reloc section presence
    if:
      type: section
      exact: .reloc

  - id: reloc-section-high-entropy
    desc: High-entropy .reloc section
    crit: notable
    conf: 0.9
    if:
      type: section
      exact: .reloc
      entropy_min: 6.8
    downgrade:
      any:
        - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
    # Relocation tables are usually 4-5 bits/byte. 
    # 6.8+ avoids common installer/runtime noise around 6.6 bits/byte.

  - id: cfg2-section
    desc: PE .cfg2 section name
    crit: component
    conf: 0.96
    if:
      type: section
      exact: .cfg2

  - id: gfids2-section
    desc: PE .gfids2 section name
    crit: component
    conf: 0.96
    if:
      type: section
      exact: .gfids2

  - id: rdata2-section
    desc: PE .rdata2 section name
    crit: component
    conf: 0.96
    if:
      type: section
      exact: .rdata2

composite_rules:
  - id: pe-standard-loader-section
    desc: PE standard loader section present
    crit: component
    any:
      - id: pe-code-data-standard-section
      - id: pe-runtime-standard-section
      - id: pe-resource-section
      - id: pe-tls-section

  - id: pe-resource-or-tls-section
    desc: PE resource or TLS section present
    crit: component
    any:
      - id: pe-resource-section
      - id: pe-tls-section

  - id: duplicated-runtime-section-suffixes
    desc: Duplicated PE runtime section suffixes
    crit: suspicious
    conf: 0.97
    all:
      - id: cfg2-section
      - id: gfids2-section
      - id: rdata2-section
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer

  - id: suspicious-reloc-section
    desc: Suspicious .reloc section (high entropy)
    crit: suspicious
    conf: 0.95
    all:
      - id: reloc-section-high-entropy
    unless:
      - id: metadata/binary/resource::rich-header-present
      - id: metadata/signed/developer::martin-tofall
      - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-assembly
    # .NET assemblies often have higher entropy in relocs due to metadata structure.
