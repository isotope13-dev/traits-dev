defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.9

traits:
  - id: reloc-section-presence
    desc: PE .reloc section presence
    if:
      type: section
      exact: .reloc

  - id: reloc-section-high-entropy
    desc: High-entropy .reloc section
    crit: notable
    conf: 0.9
    if:
      type: section
      exact: .reloc
      entropy_min: 6.5
    # Relocation tables are usually 4-5 bits/byte. 
    # 6.5+ indicates additional data or obfuscation.

composite_rules:
  - id: suspicious-reloc-section
    desc: Suspicious .reloc section (high entropy)
    crit: suspicious
    conf: 0.95
    all:
      - id: reloc-section-high-entropy
    downgrade:
      all:
        - id: metadata/binary/framework::dotnet-assembly
    # .NET assemblies often have higher entropy in relocs due to metadata structure.
