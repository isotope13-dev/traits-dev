defaults:
  platforms: [windows, linux, macos]
  for: [binaries]

traits:
  - id: bun-section-name
    desc: Bun bundled code section
    crit: notable
    conf: 0.95
    if:
      type: section
      exact: .bun

  - id: bun-macho-section-name
    desc: Bun bundled Mach-O section
    crit: notable
    conf: 0.95
    if:
      type: section
      exact: __BUN,__bun
