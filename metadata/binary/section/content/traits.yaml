defaults:
  platforms:
    - linux
    - unix
    - android
    - windows
    - macos
    - ios
traits:
  - id: executable-pattern-in-data
    desc: Repeated x86 prologue byte pattern
    crit: notable
    conf: 0.55
    for:
      - elf
      - pe
    count_min: 24
    per_kb_min: 1.0
    if:
      type: hex
      pattern: 55 89 E5
      section: data
  - id: nop-sled-in-data
    desc: Repeated NOP-run pattern in executable section
    crit: notable
    conf: 0.65
    for:
      - elf
      - pe
    size_max: 1000000
    count_min: 4
    if:
      type: hex
      section: .text
      pattern: 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90
  - id: shellcode-prologue-data
    desc: Common shellcode start in data section
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - pe
    if:
      type: hex
      pattern: 31 C0 50 68
      section: data
  - id: large-bss-uninitialized
    desc: Large uninitialized data section
    crit: baseline
    conf: 0.9
    for:
      - elf
      - macho
    if:
      type: section_ratio
      section: .bss
      min: 0.3
  - id: high-entropy-rodata
    desc: High entropy content in rodata
    crit: notable
    conf: 0.75
    for:
      - elf
      - macho
      - pe
    entropy_min: 7.0
    if:
      type: section
      exact: .rodata
  - id: go-large-noptrdata
    desc: Large Go noptrdata section
    crit: notable
    conf: 0.9
    for:
      - elf
    if:
      type: section_ratio
      section: .noptrdata
      min: 0.55
  - id: base64-in-rodata
    desc: Base64 data in rodata
    crit: notable
    conf: 0.8
    for:
      - elf
      - macho
      - pe
    count_min: 10
    if:
      type: trait
      id: objectives/anti-static/obfuscation/encoding/base64::dense-base64-encoding
  - id: init-array-hooks
    desc: Non-empty initialization array section
    crit: notable
    conf: 0.95
    for:
      - elf
    if:
      type: metrics
      field: elf.init_array_count
      min: 4
  - id: fini-array-hooks
    desc: Non-empty finalization array section
    crit: notable
    conf: 0.8
    for:
      - elf
    if:
      type: metrics
      field: elf.fini_array_count
      min: 2
  - id: rpath-in-dynamic
    desc: RPATH/RUNPATH in dynamic section
    crit: baseline
    conf: 0.9
    for:
      - elf
    if:
      type: text
      regex: (RPATH|RUNPATH)
      section: .dynamic
  - id: glibc-rtld-diagnostics-cluster
    desc: Clustered glibc runtime linker diagnostics
    crit: baseline
    conf: 0.85
    for:
      - elf
    size_min: 200000
    count_min: 3
    if:
      type: text
      regex: (symbol lookup error|RUNPATH/RPATH copy|static TLS block)
      section: .dynamic
