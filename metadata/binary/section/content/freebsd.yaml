defaults:
  platforms: [unix]
  for: [elf]
  crit: component
  conf: 0.95

traits:
  - id: freebsd-marker
    desc: FreeBSD string marker
    if:
      type: text
      exact: FreeBSD

  - id: freebsd-kern-conf-section
    desc: FreeBSD kernel config section
    if:
      type: section
      exact: kern_conf

  - id: sunw-ctf-section
    desc: Compact C type format section
    if:
      type: section
      exact: .SUNW_ctf

composite_rules:
  - id: freebsd-kernel-image
    desc: FreeBSD kernel image structure
    crit: component
    conf: 0.98
    all:
      - id: freebsd-marker
      - id: freebsd-kern-conf-section
      - id: sunw-ctf-section
