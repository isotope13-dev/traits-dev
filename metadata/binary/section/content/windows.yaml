defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: diagnostic-noise-request-handler
    desc: Verbose diagnostic request-handler string
    crit: component
    conf: 0.94
    if:
      type: text
      substr: Processing request handler for service control notification
      section: .rdata
  - id: diagnostic-noise-checksum-init
    desc: Verbose diagnostic checksum init string
    crit: component
    conf: 0.94
    if:
      type: text
      substr: Initializing system components and verifying checksums now ...
      section: .rdata
  - id: diagnostic-noise-registry-loader
    desc: Verbose diagnostic registry-loading string
    crit: component
    conf: 0.94
    if:
      type: text
      substr: Loading configuration data from registry hive structure keys
      section: .rdata
  - id: diagnostic-noise-resource-error
    desc: Verbose diagnostic resource error string
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "Error: Unable to locate specified resource in module table."
      section: .rdata
  - id: diagnostic-noise-runtime-banner
    desc: Verbose diagnostic runtime banner string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Microsoft Windows Runtime Library Component Version
      section: .rdata
  - id: diagnostic-noise-kernel-banner
    desc: Verbose diagnostic kernel banner string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Windows Kernel Configuration Manager Service Provider Module
      section: .rdata
composite_rules:
  - id: oversized-rdata-diagnostic-noise
    desc: Oversized rdata with diagnostic noise stuffing
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/anti-static/obfuscation/payload/section::oversized-rdata-section
    any:
      - id: diagnostic-noise-request-handler
      - id: diagnostic-noise-checksum-init
      - id: diagnostic-noise-registry-loader
      - id: diagnostic-noise-resource-error
      - id: diagnostic-noise-runtime-banner
      - id: diagnostic-noise-kernel-banner
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-assembly
