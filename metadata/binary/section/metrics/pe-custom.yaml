defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: null-placeholder-section
    desc: Large zero-entropy placeholder section
    crit: component
    conf: 0.85
    if:
      type: section
      regex: '^\.[a-z]{3,8}$'
      entropy_max: 0.05
      length_min: 4096
      readable: true
      writable: false
      executable: false
  - id: random-lowercase-section-name
    desc: Random lowercase PE section name
    crit: component
    conf: 0.8
    if:
      type: section
      regex: '^\.[a-z]{4,6}$'
      length_min: 512
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: many-sections-pe
    desc: PE has many sections
    crit: component
    conf: 0.84
    if:
      type: metrics
      field: binary.section_count
      min: 12
  - id: rdata-ratio-over-5x
    desc: rdata over five times text size
    crit: component
    conf: 0.8
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 5.0
  - id: rdata-ratio-over-2pt5x
    desc: rdata over 2.5 times text size
    crit: component
    conf: 0.82
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 2.5
  - id: low-entropy-rdata-section
    desc: Low-entropy rdata section
    crit: component
    conf: 0.8
    if:
      type: section
      exact: '.rdata'
      entropy_max: 4.2
  - id: medium-entropy-rdata-section
    desc: Medium entropy rdata section
    crit: component
    conf: 0.82
    if:
      type: section
      exact: '.rdata'
      entropy_min: 5.8
      entropy_max: 7.3
  - id: tiny-data-section
    desc: Tiny writable data section
    crit: component
    conf: 0.8
    if:
      type: section
      exact: '.data'
      length_max: 16384
  - id: oversized-rdata-ratio
    desc: .rdata significantly larger than .text
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 5.0
    unless:
      - id: benign-large-rdata-layout
      - type: metrics
        field: binary.export_count
        min: 50
      - id: metadata/signed/platform::microsoft
    downgrade:
      any:
        - type: metrics
          field: binary.overall_entropy
          max: 4.5
        - type: text
          regex: "Qt\\dCore\\.dll"
  - id: high-entropy-resource-small-dll
    desc: Small DLL, high-entropy resource
    conf: 0.9
    size_max: 250000
    if:
      type: section
      substr: '.rsrc'
      entropy_min: 7.5
    downgrade:
      any:
        - id: metadata/signed/developer::jetbrains-s.r.o.
  - id: high-entropy-rdata-section
    desc: High entropy rdata section
    crit: component
    conf: 0.86
    if:
      type: section
      exact: '.rdata'
      entropy_min: 7.2
  - id: elevated-text-entropy-section
    desc: Elevated text section entropy
    crit: component
    conf: 0.82
    if:
      type: section
      exact: '.text'
      entropy_min: 6.3
  - id: extreme-rdata-entropy
    desc: Near-random .rdata section (encrypted payload)
    crit: component
    conf: 0.9
    if:
      type: section
      exact: '.rdata'
      entropy_min: 7.5
      length_min: 4194304
  - id: random-zero-perm-section
    desc: Random zero-permission section name
    crit: notable
    conf: 0.9
    if:
      type: section
      regex: '^[A-Za-z]{8}$'
      readable: false
      writable: false
      executable: false
      length_min: 512
  - id: high-import-count-pe
    desc: High PE import count
    crit: component
    conf: 0.84
    if:
      type: metrics
      field: binary.import_count
      min: 150
  - id: five-section-pe
    desc: Five section PE layout
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.section_count
      min: 5
      max: 5
  - id: resource-over-30pct
    desc: Resource section over thirty percent
    crit: component
    conf: 0.84
    if:
      type: section_ratio
      section: '.rsrc'
      min: 0.3
  - id: htext-rwx-section
    desc: Custom .htext RWX section
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: '.htext'
      writable: true
      executable: true
      length_min: 4096
  - id: medium-overlay-pe
    desc: PE has medium sized overlay
    crit: component
    conf: 0.86
    if:
      type: metrics
      field: binary.overlay_size
      min: 32768
      max: 262144
  - id: large-reloc-section
    desc: Large .reloc section
    crit: notable
    conf: 0.86
    if:
      type: section
      exact: '.reloc'
      length_min: 262144
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiler/aot::native-runtime-large-file
  - id: encrypted-reloc-section
    desc: High entropy .reloc section
    crit: suspicious
    conf: 0.94
    if:
      type: section
      exact: '.reloc'
      entropy_min: 7.85
    downgrade:
      any:
        - id: objectives/anti-static/pack/detect::aspack-marker
        - id: objectives/anti-static/pack/detect::upx-marker
        - id: objectives/anti-static/pack/detect::themida-marker
        - id: objectives/anti-static/pack/detect::vmprotect-marker
        - id: objectives/anti-static/pack/detect::petite-marker
  - id: reloc-near-text-size
    desc: .reloc section nearly as large as .text
    crit: component
    conf: 0.88
    if:
      type: section_ratio
      section: '.reloc'
      compare_to: '.text'
      min: 0.8
  - id: compact-high-entropy-rsrc
    desc: Compact PE with high-entropy resources
    crit: component
    conf: 0.84
    size_max: 262144
    if:
      type: section
      exact: '.rsrc'
      entropy_min: 7.0
      length_max: 12288
composite_rules:
  - id: benign-large-rdata-layout
    desc: Large low-entropy rdata with version metadata
    crit: component
    conf: 0.8
    all:
      - id: rdata-ratio-over-5x
      - id: low-entropy-rdata-section
      - id: tiny-data-section
      - id: metadata/package/versioning::pe-version-resource
  - id: encrypted-rdata-installer-stub-layout
    desc: High-entropy rdata PE installer stub layout
    crit: suspicious
    conf: 0.94
    size_min: 262144
    all:
      - id: rdata-ratio-over-5x
      - id: high-entropy-rdata-section
      - id: tiny-data-section
    any:
      - id: metadata/binary/layout::has-overlay
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/resource::asinvoker-resource-manifest
      - id: metadata/package/versioning::version-resource-metadata
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
  - id: compact-loader-like-layout
    desc: Compact loader-like PE layout
    crit: suspicious
    conf: 0.92
    size_max: 262144
    all:
      - id: tiny-data-section
      - id: elevated-text-entropy-section
      - id: compact-high-entropy-rsrc
      - id: metadata/binary/metrics::no-functions
    any:
      - id: metadata/signed/adhoc::unsigned
      - id: metadata/binary/layout::has-overlay
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/resource::asinvoker-resource-manifest
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer::known-benign-installer
  - id: encoded-rdata-loader-layout
    desc: Five section PE with oversized encoded rdata
    crit: suspicious
    conf: 0.93
    size_min: 65536
    all:
      - id: rdata-ratio-over-2pt5x
      - id: medium-entropy-rdata-section
      - id: tiny-data-section
      - id: five-section-pe
    unless:
      - id: benign-large-rdata-layout
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
  - id: compact-rsrc-loader-layout
    desc: Compact PE with resource payload carrier
    crit: suspicious
    conf: 0.92
    size_max: 131072
    all:
      - id: metadata/binary/metrics::four-section-pe
      - id: resource-over-30pct
      - id: tiny-data-section
      - id: elevated-text-entropy-section
    any:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::no-functions
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
  - id: random-section-packed-layout
    desc: Packed PE with random hidden sections
    crit: suspicious
    conf: 0.95
    size_min: 262144
    all:
      - id: metadata/binary/section/metrics::many-sections-pe
      - id: metadata/binary/section/metrics::random-zero-perm-section
    any:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/section/metrics::high-import-count-pe
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
    unless:
      - id: metadata/signed/platform::microsoft
  - id: reloc-payload-geometry
    desc: Large encrypted .reloc payload geometry
    crit: suspicious
    conf: 0.97
    all:
      - id: large-reloc-section
      - id: encrypted-reloc-section
      - id: reloc-near-text-size
    unless:
      - id: metadata/binary/installer::known-benign-installer
  - id: five-section-overlay-loader-layout
    desc: Five section loader with overlay and RWX tail
    crit: suspicious
    conf: 0.95
    size_min: 262144
    all:
      - id: five-section-pe
      - id: htext-rwx-section
      - id: elevated-text-entropy-section
      - id: medium-overlay-pe
    unless:
      - id: metadata/signed/platform::microsoft
  - id: null-placeholder-layout
    desc: Custom sections with null-filled placeholder data
    crit: notable
    conf: 0.9
    size_min: 131072
    all:
      - id: null-placeholder-section
      - id: random-lowercase-section-name
      - id: metadata/hardening/memory::wx-section
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: sparse-zeroed-loader-layout
    desc: Sparse five section PE loader
    crit: suspicious
    conf: 0.94
    size_min: 65536
    size_max: 262144
    all:
      - id: five-section-pe
      - id: null-placeholder-section
      - id: tiny-data-section
    any:
      - id: metadata/binary/metrics::no-functions
      - id: metadata/binary/symbols::few-import-count
      - id: metadata/binary/symbols::single-import-count
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-largest-section-dominates
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
