defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: null-placeholder-section
    desc: Large zero-entropy placeholder section
    crit: component
    conf: 0.85
    if:
      type: section
      regex: '^\.[a-z]{3,8}$'
      entropy_max: 0.05
      length_min: 4096
      readable: true
      writable: false
      executable: false
  - id: random-lowercase-section-name
    desc: Random lowercase PE section name
    crit: component
    conf: 0.8
    if:
      type: section
      regex: '^\.[a-z]{4,6}$'
      length_min: 512
  - id: pe-nonstandard-entry
    desc: PE entry in nonstandard section
    crit: component
    conf: 0.76
    if:
      type: metrics
      field: binary.entry_in_nonstandard_section
      min: 1
  - id: many-nonstandard-section-names
    desc: Many nonstandard PE section names
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: binary.nonstandard_section_name_count
      min: 7
    unless:
      - type: section
        regex: '^(UPX\d*|\.upx\d*)$'
      - type: section
        regex: '^(memcmp_|memcpy_|memmove_)$'
      - type: section
        regex: '^(memset_|strlen_|_guard_[cd])$'
      - id: metadata/signed/developer::martin-tofall
      - type: text
        substr: SonOyuncu Client
  - id: random-exec-payload-section
    desc: Large high-entropy random executable section
    crit: suspicious
    conf: 0.92
    if:
      type: section
      regex: '^\.[a-z0-9]{4,6}$'
      executable: true
      entropy_min: 7.2
      length_min: 65536
    unless:
      - type: section
        regex: '^(UPX\d*|\.upx\d*)$'
      - type: text
        substr: SonOyuncu Client
      - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
  - id: random-rwx-cavity-section
    desc: Random low-entropy RWX cavity section
    crit: suspicious
    conf: 0.95
    if:
      type: section
      regex: '^\.[a-z0-9]{4,6}$'
      writable: true
      executable: true
      entropy_max: 0.2
      length_min: 4096
      length_max: 65536
    unless:
      - type: section
        regex: '^(UPX\d*|\.upx\d*)$'
  - id: many-sections-pe
    desc: PE has many sections
    crit: component
    conf: 0.84
    if:
      type: metrics
      field: binary.section_count
      min: 12
  - id: rdata-ratio-over-5x
    desc: rdata over five times text size
    crit: component
    conf: 0.8
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 5.0
  - id: rdata-ratio-over-2pt5x
    desc: rdata over 2.5 times text size
    crit: component
    conf: 0.82
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 2.5
  - id: low-entropy-rdata-section
    desc: Low-entropy rdata section
    crit: component
    conf: 0.8
    if:
      type: section
      exact: '.rdata'
      entropy_max: 4.2
  - id: medium-entropy-rdata-section
    desc: Medium entropy rdata section
    crit: component
    conf: 0.82
    if:
      type: section
      exact: '.rdata'
      entropy_min: 5.8
      entropy_max: 7.3
  - id: tiny-data-section
    desc: Tiny writable data section
    crit: component
    conf: 0.8
    if:
      type: section
      exact: '.data'
      length_max: 16384
  - id: oversized-rdata-ratio
    desc: .rdata significantly larger than .text
    size_min: 65536
    if:
      type: section_ratio
      section: '.rdata'
      compare_to: '.text'
      min: 5.0
    unless:
      - id: benign-large-rdata-layout
      - id: bandicam-layer-helper-dll
      - type: metrics
        field: binary.export_count
        min: 50
      - id: metadata/signed/platform::microsoft
    downgrade:
      any:
        - type: metrics
          field: binary.overall_entropy
          max: 4.5
        - type: raw
          regex: "Qt\\dCore\\.dll"
  - id: high-entropy-resource-small-dll
    desc: Small DLL, high-entropy resource
    conf: 0.9
    size_max: 250000
    if:
      type: section
      substr: '.rsrc'
      entropy_min: 7.5
  - id: high-entropy-rdata-section
    desc: High entropy rdata section
    crit: component
    conf: 0.86
    if:
      type: section
      exact: '.rdata'
      entropy_min: 7.2
  - id: elevated-text-entropy-section
    desc: Elevated text section entropy
    crit: component
    conf: 0.82
    if:
      type: section
      exact: '.text'
      entropy_min: 6.3
  - id: extreme-rdata-entropy
    desc: Near-random .rdata section (encrypted payload)
    crit: component
    conf: 0.9
    if:
      type: section
      exact: '.rdata'
      entropy_min: 7.5
      length_min: 4194304
  - id: random-zero-perm-section
    desc: Random zero-permission section name
    crit: notable
    conf: 0.9
    if:
      type: section
      regex: '^[A-Za-z]{8}$'
      readable: false
      writable: false
      executable: false
      length_min: 512
  - id: high-import-count-pe
    desc: High PE import count
    crit: component
    conf: 0.84
    if:
      type: metrics
      field: binary.import_count
      min: 150
  - id: five-section-pe
    desc: Five section PE layout
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.section_count
      min: 5
      max: 5
  - id: htext-rwx-section
    desc: Custom .htext RWX section
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: '.htext'
      writable: true
      executable: true
      length_min: 4096
  - id: medium-overlay-pe
    desc: PE has medium sized overlay
    crit: component
    conf: 0.86
    if:
      type: metrics
      field: binary.overlay_size
      min: 32768
      max: 262144
  - id: large-reloc-section
    desc: Large .reloc section
    crit: notable
    conf: 0.86
    if:
      type: section
      exact: '.reloc'
      length_min: 262144
  - id: encrypted-reloc-section
    desc: High entropy .reloc section
    crit: suspicious
    conf: 0.94
    if:
      type: section
      exact: '.reloc'
      entropy_min: 7.85
    downgrade:
      any:
        - id: objectives/anti-static/pack/detect::aspack-marker
        - id: objectives/anti-static/pack/detect::upx-marker
        - id: objectives/anti-static/pack/detect::themida-marker
        - id: objectives/anti-static/pack/detect::vmprotect-marker
        - id: objectives/anti-static/pack/detect::petite-marker
    unless:
      - id: metadata/signed/developer::martin-tofall
  - id: reloc-near-text-size
    desc: .reloc section nearly as large as .text
    crit: component
    conf: 0.88
    if:
      type: section_ratio
      section: '.reloc'
      compare_to: '.text'
      min: 0.8
  - id: bandicam-layer-helper-dll
    desc: Bandicam Vulkan layer helper DLL
    crit: component
    conf: 0.95
    if:
      type: text
      exact: VK_LAYER_bandicam_helper.dll
composite_rules:
  - id: benign-large-rdata-layout
    desc: Large low-entropy rdata with version metadata
    crit: component
    conf: 0.8
    all:
      - id: rdata-ratio-over-5x
      - id: low-entropy-rdata-section
      - id: tiny-data-section
      - id: metadata/package/versioning::pe-version-resource
  - id: encrypted-rdata-installer-stub-layout
    desc: High-entropy rdata PE installer stub layout
    crit: suspicious
    conf: 0.94
    size_min: 262144
    all:
      - id: high-entropy-rdata-section
      - id: elevated-text-entropy-section
      - id: tiny-data-section
      - id: high-import-count-pe
      - id: five-section-pe
    any:
      - id: metadata/package/versioning::version-resource-metadata
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
  - id: encoded-rdata-loader-layout
    desc: Five section PE with oversized encoded rdata
    crit: suspicious
    conf: 0.93
    size_min: 65536
    all:
      - id: rdata-ratio-over-2pt5x
      - id: medium-entropy-rdata-section
      - id: tiny-data-section
      - id: five-section-pe
    unless:
      - id: benign-large-rdata-layout
      - id: bandicam-layer-helper-dll
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
  - id: random-section-packed-layout
    desc: Packed PE with random hidden sections
    crit: suspicious
    conf: 0.95
    size_min: 262144
    all:
      - id: metadata/binary/section/metrics::many-sections-pe
      - id: metadata/binary/section/metrics::random-zero-perm-section
    any:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/section/metrics::high-import-count-pe
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
    unless:
      - id: metadata/signed/platform::microsoft
  - id: reloc-payload-geometry
    desc: Large encrypted .reloc payload geometry
    crit: suspicious
    conf: 0.97
    all:
      - id: large-reloc-section
      - id: encrypted-reloc-section
      - id: reloc-near-text-size
    unless:
      - id: metadata/binary/installer::known-benign-installer
  - id: five-section-overlay-loader-layout
    desc: Five section loader with overlay and RWX tail
    crit: suspicious
    conf: 0.95
    size_min: 262144
    all:
      - id: five-section-pe
      - id: htext-rwx-section
      - id: elevated-text-entropy-section
      - id: medium-overlay-pe
    unless:
      - id: metadata/signed/platform::microsoft
  - id: null-placeholder-layout
    desc: Custom sections with null-filled placeholder data
    crit: suspicious
    conf: 0.9
    size_min: 131072
    all:
      - id: null-placeholder-section
      - id: random-lowercase-section-name
      - id: metadata/hardening/memory::wx-section
    unless:
      - id: metadata/signed/platform::microsoft
  - id: synthetic-packed-entry-layout
    desc: Packed PE with synthetic sections and RWX cavity
    crit: suspicious
    conf: 0.97
    size_min: 524288
    all:
      - id: pe-nonstandard-entry
      - id: many-nonstandard-section-names
      - id: random-exec-payload-section
      - id: random-rwx-cavity-section
    unless:
      - id: metadata/signed/platform::microsoft
