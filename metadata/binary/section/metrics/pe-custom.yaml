defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
- id: pe-three-sections
  desc: PE contains exactly three sections
  crit: baseline
  conf: 0.85
  if:
    type: metrics
    field: sections.count
    min: 3
    max: 3
- id: null-placeholder-section
  desc: Large zero-entropy placeholder section
  crit: component
  conf: 0.85
  if:
    type: section
    regex: '^\.[a-z]{3,8}$'
    entropy_max: 0.05
    length_min: 4096
    readable: true
    writable: false
    executable: false
- id: pe-large-near-zero-executable-section
  desc: Large near-zero-entropy .itext PE section
  crit: suspicious
  conf: 0.94
  if:
    type: section
    exact: .itext
    executable: true
    entropy_max: 0.1
    length_min: 65536
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
- id: random-lowercase-section-name
  desc: Random lowercase PE section name
  crit: component
  conf: 0.8
  if:
    type: section
    regex: '^\.[a-z]{7,8}$'
    length_min: 512
  unless:
  - type: section
    exact: .taubndl
  - type: section
    exact: .buildid
- id: random-uppercase-rwx-section
  desc: Random uppercase-only RWX PE section name
  crit: notable
  conf: 0.92
  if:
    type: section
    regex: '^[A-Z]{6,10}$'
    writable: true
    executable: true
    length_min: 4096
- id: random-mixed-case-rwx-section
  desc: Random mixed-case RWX PE section name
  crit: component
  conf: 0.92
  if:
    type: section
    regex: '^[A-Za-z]{1,6}[a-z][A-Z][A-Za-z]{1,6}$|^[A-Za-z]{1,6}[A-Z][a-z][A-Za-z]{1,6}$'
    writable: true
    executable: true
    length_min: 4096
- id: pe-nonstandard-entry
  desc: PE entry in an unusually named section
  crit: component
  conf: 0.86
  if:
    type: value
    path: pe.entry_section
    regex: '^\.[A-Za-z0-9_]{2,8}$'
  unless:
  - type: value
    path: pe.entry_section
    exact: .text
  - type: value
    path: pe.entry_section
    exact: .code
  - type: value
    path: pe.entry_section
    exact: __text
  - type: value
    path: pe.entry_section
    exact: CODE
- id: four-nonstandard-sections
  desc: Four nonstandard PE section names
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: sections.nonstandard_count
    min: 4
    max: 4
- id: executable-edata-section
  desc: Executable .edata PE section
  crit: component
  conf: 0.94
  if:
    type: section
    regex: \.edata$
    executable: true
- id: many-nonstandard-section-names
  desc: Many nonstandard PE section names
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: sections.nonstandard_count
    min: 7
  unless:
  - type: section
    regex: '^(UPX\d*|\.upx\d*)$'
  - type: section
    regex: ^memcmp_$
  - type: section
    regex: ^memcpy_$
  - type: section
    regex: ^memmove_$
  - type: section
    regex: '^(memset_|strlen_|_guard_[cd])$'
  - id: metadata/signed/developer::martin-tofall
  - type: text
    substr: SonOyuncu Client
    section: rdata
- id: multiple-nonstandard-section-names
  desc: Multiple nonstandard PE section names
  crit: notable
  conf: 0.9
  if:
    type: metrics
    field: sections.nonstandard_count
    min: 2
  unless:
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: random-exec-payload-section
  desc: Large high-entropy random executable section
  crit: notable
  conf: 0.92
  if:
    type: section
    regex: '^\.[a-z0-9]{4,6}$'
    executable: true
    entropy_min: 7.2
    length_min: 65536
  unless:
  - type: section
    regex: '^(UPX\d*|\.upx\d*)$'
  - id: micro-behaviors/data/encode/pecompact
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/binary/metrics/structural::high-code-entropy
  - id: micro-behaviors/data/embedded/payload/resource::costura-bundle-marker
  - id: objectives/anti-static/pack/detect::enigma-protector
  - id: objectives/anti-static/pack/asprotect/
- id: large-high-entropy-readonly-section
  desc: Large high-entropy read-only PE section
  crit: notable
  conf: 0.94
  if:
    type: section
    regex: '^.+$'
    entropy_min: 7.8
    length_min: 1048576
    readable: true
    writable: false
    executable: false
- id: hex-suffix-rwx-payload-section
  desc: Hex-suffixed RWX payload section
  crit: notable
  conf: 0.94
  ref: sha256:194bef1eb8770c78baf6b4fb42b7866943d15c0cb8d96ca9fbed44171ceab307
  if:
    type: section
    regex: '^\.[a-z]{2,5}[0-9a-f]{3,5}$'
    writable: true
    executable: true
    entropy_min: 7.2
    length_min: 65536
  unless:
  - type: section
    regex: '^(UPX\d*|\.upx\d*)$'
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/installer/family/
- id: random-rwx-cavity-section
  desc: Random low-entropy RWX cavity section
  crit: suspicious
  conf: 0.95
  if:
    type: section
    regex: '^\.[a-z0-9]{4,6}$'
    writable: true
    executable: true
    entropy_max: 0.2
    length_min: 4096
    length_max: 65536
  unless:
  - type: section
    regex: '^(UPX\d*|\.upx\d*)$'
  - id: well-known/lib/divx/
  downgrade:
    any:
    - id: well-known/app/protected-benign-pe/
- id: many-sections-pe
  desc: PE has many sections
  crit: component
  conf: 0.84
  if:
    type: metrics
    field: sections.count
    min: 12
- id: six-plus-writable-sections
  desc: PE has at least six writable sections
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: sections.writable_count
    min: 6
- id: two-section-pe
  desc: PE has exactly two sections
  crit: component
  conf: 0.84
  if:
    type: metrics
    field: sections.count
    min: 2
    max: 2
- id: tiny-rsrc-section
  desc: Minimal resource section footprint
  crit: component
  conf: 0.84
  if:
    type: section
    exact: ".rsrc"
    length_max: 1024
- id: rdata-ratio-over-5x
  desc: rdata over five times text size
  crit: component
  conf: 0.8
  if:
    type: section
    regex: '.rdata'
    compare_to: '.text'
    size_ratio_min: 5.0
- id: rdata-ratio-over-2pt5x
  desc: rdata over 2.5 times text size
  crit: component
  conf: 0.82
  if:
    type: section
    regex: '.rdata'
    compare_to: '.text'
    size_ratio_min: 2.5
- id: low-entropy-rdata-section
  desc: Low-entropy rdata section
  crit: component
  conf: 0.8
  if:
    type: section
    exact: '.rdata'
    entropy_max: 4.2
- id: medium-entropy-rdata-section
  desc: Medium entropy rdata section
  crit: component
  conf: 0.82
  if:
    type: section
    exact: '.rdata'
    entropy_min: 5.8
    entropy_max: 7.3
- id: tiny-data-section
  desc: Tiny writable data section
  crit: component
  conf: 0.8
  if:
    type: section
    exact: '.data'
    length_max: 16384
- id: inflated-data-section
  desc: Inflated PE data section
  crit: component
  conf: 0.86
  if:
    type: metrics
    field: pe.max_section_inflation_ratio
    min: 4.0
- id: oversized-rdata-ratio
  desc: .rdata significantly larger than .text
  size_min: 65536
  if:
    type: section
    regex: '.rdata'
    compare_to: '.text'
    size_ratio_min: 5.0
  unless:
  - id: metadata/binary/section/metrics/
  - id: bandicam-layer-helper-dll
  - id: well-known/lib/gnu-libiconv/
  - type: metrics
    field: exports.count
    min: 50
  - id: metadata/binary/section/metrics/
  downgrade:
    any:
    - type: metrics
      field: binary.overall_entropy
      max: 4.5
    - type: raw
      regex: "Qt\\dCore\\.dll"
- id: high-entropy-resource-small-dll
  desc: Small DLL, high-entropy resource
  crit: suspicious
  conf: 0.9
  for: [dll]
  size_max: 250000
  if:
    type: section
    substr: '.rsrc'
    entropy_min: 7.5
  unless:
  - type: basename
    regex: '(?i)\.exe$'
  - id: well-known/tool/development/jetbrains/
  # Managed .NET resources commonly contain compressed icons, manifests, or
  # embedded assemblies.  High entropy in a small managed DLL is not, by
  # itself, evidence of a packed payload.
  - id: metadata/binary/framework::dotnet-metadata
  downgrade:
    any:
    - id: metadata/signed/developer/
    - id: metadata/lang/compiler/native/
- id: high-entropy-rdata-section
  desc: High-entropy .rdata PE section
  crit: notable
  conf: 0.9
  if:
    type: section
    exact: '.rdata'
    entropy_min: 7.5
- id: elevated-text-entropy-section
  desc: Elevated text section entropy
  crit: component
  conf: 0.82
  if:
    type: section
    exact: '.text'
    entropy_min: 6.3
- id: large-rwx-text-section
  desc: Large writable executable text section
  crit: suspicious
  conf: 0.92
  if:
    type: section
    exact: '.text'
    writable: true
    executable: true
    length_min: 1048576
  unless:
  - id: metadata/signed/platform/
  downgrade:
    any:
    - id: well-known/app/protected-benign-pe/
- id: large-high-entropy-writable-text
  desc: Large high-entropy writable executable text
  crit: suspicious
  conf: 0.95
  if:
    type: section
    exact: '.text'
    writable: true
    executable: true
    entropy_min: 7.0
    length_min: 1048576
  unless:
  - id: metadata/signed/platform/
  downgrade:
    any:
    - id: well-known/app/protected-benign-pe/
- id: pe-entry-in-writable-section
  desc: PE entry point in writable section
  crit: suspicious
  conf: 0.95
  if:
    type: metrics
    field: pe.entry_in_writable_section
    min: 1
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/dual-use/nirsoft::snremove-utility
  - id: well-known/tool/dual-use/kkrunchy::kkrunchy-rwx-packer-context
  - id: objectives/anti-static/pack/mpress::mpress-two-section-loader
  downgrade:
    any:
    - id: well-known/app/protected-benign-pe/
    - id: metadata/binary/resource::kernel-driver-init
    - id: metadata/signed/certificate/identity::pe-whql-hardware-compat-attestation
- id: pe-multiple-executable-writable-sections
  desc: Two or more executable writable sections
  crit: notable
  conf: 0.95
  if:
    type: metrics
    field: sections.executable_writable_count
    min: 2
- id: writable-text-section
  desc: "Writable .text section"
  crit: suspicious
  conf: 0.92
  if:
    type: section
    exact: '.text'
    writable: true
    length_min: 8192
    entropy_min: 5.0
  unless:
  - id: metadata/signed/platform/
  - id: metadata/lang/compiled::autoit-compiled-script
  - id: well-known/tool/sysadmin/oracle-asm::oracle-asm-context-string
  - id: well-known/lib/divx/
  downgrade:
    any:
    - id: metadata/binary/section/metrics/
- id: extreme-rdata-entropy
  desc: Near-random .rdata section (encrypted payload)
  crit: component
  conf: 0.9
  if:
    type: section
    exact: '.rdata'
    entropy_min: 7.5
    length_min: 4194304
- id: npc-zero-perm-payload-section
  desc: NPC high-entropy zero-permission section
  crit: suspicious
  conf: 0.97
  if:
    type: section
    exact: '.npc'
    readable: false
    writable: false
    executable: false
    entropy_min: 7.9
    length_min: 1048576
- id: random-zero-perm-section
  desc: Random zero-permission section name
  crit: suspicious
  conf: 0.9
  if:
    type: section
    regex: '^[A-Za-z]{8}$'
    readable: false
    writable: false
    executable: false
    length_min: 512
- id: multiple-random-zero-perm-sections
  desc: Multiple random zero-permission sections
  crit: suspicious
  conf: 0.95
  count_min: 2
  if:
    type: section
    regex: '^[A-Za-z]{8}$'
    readable: false
    writable: false
    executable: false
    length_min: 512
- id: high-import-count-pe
  desc: High PE import count
  crit: component
  conf: 0.84
  if:
    type: metrics
    field: imports.count
    min: 150
- id: five-section-pe
  desc: Five section PE layout
  crit: component
  conf: 0.8
  if:
    type: metrics
    field: sections.count
    min: 5
    max: 5
- id: htext-rwx-section
  desc: Custom .htext RWX section
  crit: suspicious
  conf: 0.96
  if:
    type: section
    exact: '.htext'
    writable: true
    executable: true
    length_min: 4096
- id: medium-overlay-pe
  desc: PE has medium sized overlay
  crit: component
  conf: 0.86
  if:
    type: metrics
    field: binary.overlay_size
    min: 32768
    max: 262144
- id: large-reloc-section
  desc: Large .reloc section
  crit: notable
  conf: 0.86
  if:
    type: section
    exact: '.reloc'
    length_min: 262144
- id: encrypted-reloc-section
  desc: High entropy .reloc section
  crit: suspicious
  conf: 0.94
  if:
    type: section
    exact: '.reloc'
    entropy_min: 7.85
  downgrade:
    any:
    - id: objectives/anti-static/pack/detect::aspack-marker
    - id: objectives/anti-static/pack/detect::upx-marker
    - id: objectives/anti-static/pack/detect::themida-marker
    - id: objectives/anti-static/pack/detect::vmprotect-marker
    - id: objectives/anti-static/pack/detect::petite-marker
  unless:
  - id: metadata/signed/developer::martin-tofall
- id: reloc-near-text-size
  desc: .reloc section nearly as large as .text
  crit: component
  conf: 0.88
  if:
    type: section
    regex: '.reloc'
    compare_to: '.text'
    size_ratio_min: 0.8
- id: bandicam-layer-helper-dll
  desc: Bandicam Vulkan layer helper DLL
  crit: component
  conf: 0.95
  if:
    type: text
    exact: VK_LAYER_bandicam_helper.dll
    section: rdata
- id: large-high-entropy-writable-data-section
  desc: High-entropy writable .data payload section
  crit: notable
  conf: 0.9
  if:
    type: section
    exact: '.data'
    length_min: 131072
    entropy_min: 6.5
    readable: true
    writable: true

composite_rules:
- id: random-exec-payload-benign-context
  desc: Benign random exec section context
  crit: component
  conf: 0.8
  any:
  - id: well-known/app/crayens::crayens-installer
  - id: well-known/app/crayens::crayens-product-versioninfo
  - id: well-known/app/ipodme::ipodme-media-converter
  - id: well-known/app/ipodme::ipodme-product-versioninfo
  - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
  - id: well-known/lib/gpac::mp4box-tool
  - id: objectives/anti-static/obfuscation/obfuscator/managed::smartassembly
  - id: objectives/anti-static/obfuscation/obfuscator/managed::smartassembly-namespace
  - id: objectives/anti-static/obfuscation/obfuscator/managed::smartassembly-poweredby
  - id: metadata/signed/leaf::crayens
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
- id: writable-text-benign-context
  desc: Benign writable text context
  crit: component
  conf: 0.8
  any:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/section/names::upx-section
  - id: micro-behaviors/data/encode/pecompact
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: metadata/lang/compiler/managed::borland-rtl-regkey
- id: benign-large-rdata-layout
  desc: Large low-entropy rdata with version metadata
  crit: component
  conf: 0.8
  all:
  - id: rdata-ratio-over-5x
  - id: low-entropy-rdata-section
  - id: tiny-data-section
  - id: metadata/package/versioning::pe-version-resource
- id: oversized-rdata-signer-context
  desc: Signed benign rdata layout context
  crit: component
  conf: 0.9
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/signed/leaf::microsoft-corporation
  - id: metadata/signed/leaf::python-software-foundation
  - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-bootstrap
  - id: metadata/signed/platform::shenzhen-goodix-technology-co.
  - id: well-known/app/protected-benign-pe/
      # Native CPython extensions pack large constant tables in .rdata.
  - id: metadata/lang/compiler/native::python-pyinit-export
      # Wine/ReactOS builtins (COM type libs, codecs, resource DLLs) are
      # .rdata-heavy by design — the implementation lives unix-side.
  - id: metadata/binary/vendor::windows-system-implementer-dll
- id: encrypted-rdata-installer-stub-layout
  desc: High-entropy rdata PE installer stub layout
  crit: suspicious
  conf: 0.94
  size_min: 262144
  all:
  - id: high-entropy-rdata-section
  - id: elevated-text-entropy-section
  - id: tiny-data-section
  - id: high-import-count-pe
  - id: five-section-pe
  any:
  - id: metadata/package/versioning::version-resource-metadata
  - id: micro-behaviors/os/privilege/manifest::admin-manifest
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/signed/platform/
- id: encoded-rdata-loader-layout
  desc: Five section PE with oversized encoded rdata
  crit: suspicious
  conf: 0.93
  size_min: 65536
  all:
  - id: rdata-ratio-over-2pt5x
  - id: medium-entropy-rdata-section
  - id: tiny-data-section
  - id: five-section-pe
  unless:
  - id: metadata/binary/section/metrics/
  - id: bandicam-layer-helper-dll
  - id: metadata/binary/installer/family/
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::shenzhen-goodix-technology-co.
- id: random-section-packed-layout
  desc: Packed PE with random hidden sections
  crit: suspicious
  conf: 0.95
  size_min: 262144
  all:
  - id: metadata/binary/section/metrics::many-sections-pe
  - id: metadata/binary/section/metrics::random-zero-perm-section
  any:
  - id: metadata/binary/installer/script::nsis
  - id: metadata/binary/section/metrics::high-import-count-pe
  - id: metadata/binary/section/metrics::elevated-text-entropy-section
  unless:
  - id: metadata/signed/platform/
- id: reloc-payload-geometry
  desc: Large encrypted .reloc payload geometry
  crit: suspicious
  conf: 0.97
  all:
  - id: large-reloc-section
  - id: encrypted-reloc-section
  - id: reloc-near-text-size
  unless:
  - id: metadata/binary/installer/family/
- id: five-section-overlay-loader-layout
  desc: Five section loader with overlay and RWX tail
  crit: suspicious
  conf: 0.95
  size_min: 262144
  all:
  - id: five-section-pe
  - id: htext-rwx-section
  - id: elevated-text-entropy-section
  - id: medium-overlay-pe
  unless:
  - id: metadata/signed/platform/
- id: null-placeholder-layout
  desc: Custom sections with null-filled placeholder data
  crit: suspicious
  conf: 0.9
  size_min: 131072
  all:
  - id: null-placeholder-section
  - id: random-lowercase-section-name
  - id: metadata/hardening/memory::wx-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: well-known/lib/divx/
  - id: well-known/app/hasp-license-manager
- id: synthetic-packed-entry-layout
  desc: Packed PE with synthetic sections and RWX cavity
  crit: suspicious
  conf: 0.97
  size_min: 524288
  all:
  - id: pe-nonstandard-entry
  - id: many-nonstandard-section-names
  - id: random-exec-payload-section
  - id: random-rwx-cavity-section
  unless:
  - id: metadata/signed/platform/
- id: edata-wrapper-entry-layout
  desc: Four section PE with executable .edata entry
  crit: suspicious
  conf: 0.98
  size_min: 262144
  all:
  - id: metadata/binary/metrics/structural::four-section-pe
  - id: four-nonstandard-sections
  - id: executable-edata-section
  - id: pe-nonstandard-entry
  unless:
  - id: metadata/signed/platform/
