defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: uppercase-rdata-section
    desc: Uppercase _RDATA companion section
    crit: baseline
    conf: 0.86
    if:
      type: section
      exact: _RDATA
  - id: tiny-fptable-section
    desc: Tiny .fptable writable section
    crit: baseline
    conf: 0.87
    if:
      type: section
      exact: .fptable
      writable: true
      length_max: 1024
composite_rules:
  - id: fptable-rdata-loader-layout
    desc: fptable plus _RDATA PE layout
    crit: baseline
    conf: 0.9
    all:
      - id: uppercase-rdata-section
      - id: tiny-fptable-section
