defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
traits:
  - id: uppercase-rdata-section
    desc: Uppercase _RDATA companion section
    crit: baseline
    conf: 0.86
    if:
      type: section
      exact: _RDATA
  - id: tiny-fptable-section
    desc: Tiny .fptable writable section
    crit: baseline
    conf: 0.87
    if:
      type: section
      exact: .fptable
      writable: true
      length_max: 1024
composite_rules:
  - id: fptable-rdata-loader-layout
    desc: fptable plus _RDATA PE layout
    crit: baseline
    conf: 0.9
    all:
      - id: uppercase-rdata-section
      - id: tiny-fptable-section
  - id: heap-only-complex-pe
    desc: Large complex PE with heap-only mutable state
    crit: suspicious
    conf: 0.88
    size_min: 200000
    all:
      - id: metadata/binary/section/metrics::tiny-data-section
      - id: metadata/binary/metrics::many-functions-50
      - id: metadata/binary/metrics::many-imports-100
