defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: dominant-rsrc-section
    desc: Resource section dominates PE size
    crit: component
    conf: 0.92
    if:
      type: metrics
      field: binary.rsrc_to_file_ratio
      min: 0.45
  - id: major-rsrc-section
    desc: Resource section is major PE share
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.rsrc_to_file_ratio
      min: 0.30
  - id: c2r-named-section
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_c2r_named_section__
  - id: compact-loader-like-layout
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_compact_loader_like_layout__
