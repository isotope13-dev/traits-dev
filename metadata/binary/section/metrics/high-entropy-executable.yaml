defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  crit: notable
  conf: 0.85
traits:
  - id: high-entropy-exec-section
    desc: High entropy executable section
    if:
      type: section
      regex: '^(\.(text|code)|__text|CODE)'
      executable: true
      entropy_min: 7.5
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
      - id: metadata/signed/platform::microsoft-corporation
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
  - id: high-entropy-nonreadable-exec-section
    desc: High-entropy non-readable executable section
    crit: notable
    conf: 0.97
    for: [pe]
    platforms: [windows]
    if:
      type: section
      regex: '^\.[A-Za-z0-9_]{2,8}$'
      executable: true
      readable: false
      entropy_min: 7.8
      length_min: 16384
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
