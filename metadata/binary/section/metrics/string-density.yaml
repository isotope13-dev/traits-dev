defaults:
  platforms: [unix, windows]
  for: [binaries]
traits:
  # The read-only string section is present but holds under 0.2% of the file —
  # the shape left behind when literals are encrypted or stack-built instead of
  # stored. Two correctness notes:
  #   * ELF names the section plain `.rodata`; the old `^\.rodata\.` required a
  #     suffix and so matched no section on a stock GCC/Clang build.
  #   * `size_ratio_min` is what requires the section to EXIST. With no matching
  #     section the engine computes 0/filesize = 0.0, which satisfies a bare
  #     `size_ratio_max` and made this fire on every binary lacking the section
  #     (e.g. util-linux `script`, insserv `startpar`) rather than on tiny ones.
  - id: tiny-cstring-section
    desc: Read-only string section under 0.2% of file
    crit: component
    conf: 0.9
    if:
      type: section
      regex: (__TEXT\.__cstring|^\.rodata|^\.rdata)
      compare_to: total
      size_ratio_min: 0.00000001
      size_ratio_max: 0.002
    not:
      - regex: \.(mun|o|rll)$
    unless:
      - id: metadata/binary/framework/
      - id: metadata/library/python-runtime::python-runtime
      - id: metadata/binary/framework/
      - id: metadata/binary/metrics/size::tiny-elf
      - id: metadata/binary/resource/
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 200
