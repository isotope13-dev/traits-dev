defaults:
  platforms: [unix, windows]
  for: [binaries]
traits:
  - id: tiny-cstring-section
    desc: Tiny C string section ratio
    crit: component
    conf: 0.9
    if:
      type: section
      regex: (__TEXT\.__cstring|^\.rodata\.|^\.rdata)
      compare_to: total
      size_ratio_max: 0.002
    not:
      - regex: \.(mun|o|rll)$
    unless:
      - id: metadata/binary/framework::macos-framework-or-runtime
      - id: metadata/library/python-runtime::python-runtime
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/metrics/size::tiny-elf
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 200
