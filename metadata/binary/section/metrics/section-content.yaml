defaults:
  platforms:
  - linux
  - macos
  - windows
traits:
- id: executable-section-over-4mb
  desc: Executable section at least 4 MiB
  crit: baseline
  conf: 0.7
  for: [elf, macho, pe]
  if:
    type: section
    executable: true
    length_min: 4194304
- id: oversized-high-entropy-text-section
  desc: Oversized high-entropy text section
  crit: baseline
  conf: 0.85
  for:
  - pe
  entropy_min: 7.5
  if:
    type: section
    regex: '^\.text$'
    length_min: 5242880
- id: mutated-exe-randomizer-string
  desc: Incrementing byte run in .rdata
  crit: component
  for: [pe]
  if:
    type: hex
    pattern: 30 30 30 31 30 32 30 33 30 34
    section: .rdata
- id: large-bss-uninitialized
  desc: Large uninitialized data section
  crit: baseline
  conf: 0.9
  for:
  - elf
  - macho
  if:
    type: section
    regex: .bss
    compare_to: total
    size_ratio_min: 0.3
- id: high-entropy-rodata
  desc: High entropy content in rodata
  crit: notable
  conf: 0.75
  for: [elf, macho, pe]
  entropy_min: 7.0
  if:
    type: section
    exact: .rodata
- id: go-large-noptrdata
  desc: Large Go noptrdata section
  crit: notable
  conf: 0.9
  for:
  - elf
  if:
    type: section
    regex: .noptrdata
    compare_to: total
    size_ratio_min: 0.55
- id: init-array-hooks
  desc: Four or more initialization array entries
  crit: baseline
  conf: 0.95
  for:
  - elf
  if:
    type: metrics
    field: elf.init_array_count
    min: 4
  unless:
  - id: well-known/app/tabby::tabby-basename
- id: fini-array-hooks
  desc: Two or more finalization array entries
  crit: baseline
  conf: 0.8
  for:
  - elf
  if:
    type: metrics
    field: elf.fini_array_count
    min: 2
- id: glibc-rtld-diagnostics-cluster
  desc: Clustered glibc runtime linker diagnostics
  crit: baseline
  conf: 0.85
  for:
  - elf
  size_min: 200000
  count_min: 3
  if:
    type: text
    regex: (symbol lookup error|RUNPATH/RPATH copy|static TLS block)
    section: .dynamic
- id: rpath-in-dynamic--rpath
  desc: RPATH/RUNPATH in dynamic section (RPATH)
  crit: baseline
  conf: 0.9
  for:
  - elf
  if:
    type: text
    section: .dynamic
    word: RPATH
- id: rpath-in-dynamic--runpath
  desc: RPATH/RUNPATH in dynamic section (RUNPATH)
  crit: baseline
  conf: 0.9
  for:
  - elf
  if:
    type: text
    section: .dynamic
    word: RUNPATH
composite_rules:
- id: rpath-in-dynamic
  desc: RPATH/RUNPATH in dynamic section
  crit: baseline
  conf: 0.9
  for:
  - elf
  any:
  - id: rpath-in-dynamic--rpath
  - id: rpath-in-dynamic--runpath
