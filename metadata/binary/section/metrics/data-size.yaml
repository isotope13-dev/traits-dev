defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  crit: baseline
  conf: 0.7
traits:
  - id: large-data-absolute-macos
    desc: Large __DATA section (8KB+)
    for: [macho]
    if:
      type: section
      regex: ^__DATA\.__data$
      length_min: 8192
  - id: large-data-absolute-elf
    desc: Large .data section (64KB+)
    for: [elf]
    size_max: 5242880
    if:
      type: section
      regex: ^\.data$
      length_min: 65536
    unless:
      - type: text
        substr: X3DOM Runtime, http://www.x3dom.org/
      - type: metrics
        field: elf.e_type
        min: 1
        max: 1
      - type: basename
        exact: tabby
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
