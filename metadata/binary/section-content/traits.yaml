# Section-specific content analysis
#
# These traits detect suspicious patterns within specific binary sections.
# Using section constraints allows precise detection of anomalies like:
# - Suspicious strings in code sections
# - Executable patterns in data sections
# - Obfuscated content in specific locations
traits:
  # Byte-pattern indicators (coarse; kept notable to avoid over-alerting)
  - id: executable-pattern-in-data
    desc: Repeated x86 prologue byte pattern
    crit: notable
    conf: 0.55
    for: [elf, pe]
    count_min: 24
    per_kb_min: 1.0
    if:
      type: hex
      pattern: "55 89 E5" # push ebp; mov ebp, esp
      section: data
  - id: nop-sled-in-data
    desc: Repeated NOP-run byte pattern
    crit: notable
    conf: 0.65
    for: [elf, pe]
    size_max: 1000000
    count_min: 2
    if:
      type: hex
      pattern: "90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90" # 16 NOPs
  - id: shellcode-prologue-data
    desc: Common shellcode start in data section
    crit: suspicious
    conf: 0.8
    for: [elf, pe]
    if:
      type: hex
      pattern: "31 C0 50 68" # xor eax,eax; push eax; push ...
      section: data
  # BSS section analysis
  - id: large-bss-uninitialized
    desc: Large uninitialized data section
    crit: baseline
    conf: 0.9
    for: [elf, macho]
    if:
      type: section_ratio
      section: ".bss"
      min: 0.3
  # Obfuscation in specific sections
  - id: high-entropy-rodata
    desc: High entropy content in rodata
    crit: notable
    conf: 0.75
    for: [elf, macho, pe]
    entropy_min: 7.0
    if:
      type: section
      exact: ".rodata"
  - id: base64-in-rodata
    desc: Base64 data in rodata
    crit: baseline
    conf: 0.8
    for: [elf, macho, pe]
    count_min: 10
    if:
      id: objectives/anti-static/obfuscation/encoding/base64::dense-base64-encoding
      section: rodata
  # Init/fini sections (persistence/hooks)
  - id: init-array-hooks
    desc: Non-empty initialization array section
    crit: baseline
    conf: 0.95
    for: [elf]
    if:
      type: section_ratio
      section: ".init_array"
      min: 0.0001
  - id: fini-array-hooks
    desc: Non-empty finalization array section
    crit: baseline
    conf: 0.8
    for: [elf]
    if:
      type: section_ratio
      section: ".fini_array"
      min: 0.0001
  # Dynamic section analysis
  - id: rpath-in-dynamic
    desc: RPATH/RUNPATH in dynamic section
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: string
      regex: "(RPATH|RUNPATH)"
      section: ".dynamic"
  - id: glibc-rtld-diagnostics-cluster
    desc: Clustered glibc runtime linker diagnostics
    crit: baseline
    conf: 0.85
    for: [elf]
    size_min: 200000
    count_min: 3
    if:
      type: string
      regex: "(symbol lookup error|RUNPATH/RPATH copy|static TLS block)"
      section: ".rodata"
