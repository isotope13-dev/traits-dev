defaults:
  crit: baseline
  platforms:
  - macos
  for:
  - macho
  - dylib
traits:
- id: bundle-version-3x
  desc: Plist bundle short-version 3.x string
  conf: 0.9
  if:
    type: text
    substr: <string>3.
    section: .text
- id: xcode-build-number-modern
  desc: Modern Xcode build number in plist
  conf: 0.9
  if:
    type: text
    regex: <string>1[2-9][0-9]{2}</string>
    section: .text
- id: build-info-xcode--dtplatformbuild
  desc: Apple Build Information (DTPlatformBuild)
  conf: 1.0
  if:
    type: raw
    section: .text
    word: DTPlatformBuild
- id: build-info-xcode--dtxcode
  desc: Apple Build Information (DTXcode)
  conf: 1.0
  if:
    type: raw
    section: .text
    word: DTXcode
composite_rules:
- id: build-info-xcode
  desc: "Apple Build Information"
  conf: 1.0
  any:
  - id: build-info-xcode--dtplatformbuild
  - id: build-info-xcode--dtxcode
