defaults:
  crit: baseline
  platforms:
    - macos
  for:
    - macho
    - dylib
traits:
  - id: build-info-xcode
    desc: Apple Build Information (DTPlatformBuild/DTXcode)
    conf: 1.0
    if:
      type: raw
      regex: (DTPlatformBuild|DTXcode)
      section: .text
  - id: bundle-version-3x
    desc: Plist bundle short-version 3.x string
    conf: 0.9
    if:
      type: text
      substr: <string>3.
      section: .text
  - id: xcode-build-number-modern
    desc: Modern Xcode build number in plist
    conf: 0.9
    if:
      type: text
      regex: <string>1[2-9][0-9]{2}</string>
      section: .text
