defaults:
  platforms: [unix, windows]
  for: [binaries]

traits:
  - id: avg-section-under-24k
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_avg_section_under_24k__
  - id: largest-section-under-8pct
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_largest_section_under_8pct__
  - id: zero-largest-section-ratio
    desc: Compatibility placeholder
