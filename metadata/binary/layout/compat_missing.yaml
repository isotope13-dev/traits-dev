defaults:
  platforms: [unix, windows]
  for: [binaries]

traits:
  - id: avg-section-under-24k
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_avg_section_under_24k__
  - id: largest-section-under-8pct
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_largest_section_under_8pct__
  - id: zero-largest-section-ratio
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_zero_largest_section_ratio__
  - id: legacy-watcom-packed-utility
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_legacy_watcom_packed_utility__
  - id: overlay-size-metrics
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_overlay_size_metrics__
  - id: pe-signature-present
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_pe_signature_present__
  - id: many-pe-embedded
    desc: Six or more embedded PE headers
    crit: component
    conf: 0.95
    platforms: [windows]
    for: [pe, dll]
    count_min: 6
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: mavinject-acrobroker-stage-pair
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_mavinject_acrobroker_stage_pair__
  - id: mavinject32-name
    desc: App-V mavinject32.exe binary name reference
    crit: component
    conf: 0.95
    if:
      type: text
      exact: mavinject32.exe
  - id: mavinject32-name-loose
    desc: App-V mavinject32 binary name (loose match)
    crit: component
    conf: 0.92
    if:
      type: text
      substr: mavinject32
  - id: multiple-pe-embedded
    desc: Two or more embedded PE headers
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    count_min: 2
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: multiple-pe-embedded-loose
    desc: Multiple embedded MZ headers
    crit: component
    conf: 0.8
    platforms: [windows]
    for: [pe, dll]
    count_min: 2
    if:
      type: hex
      pattern: "4D 5A"
      offset_range: [4096, null]
  - id: overlay-over-1mb
    desc: PE overlay exceeds 1 MiB
    crit: baseline
    conf: 0.96
    platforms: [windows]
    for: [pe]
    if:
      type: metrics
      field: binary.overlay_size
      min: 1000000
  - id: overlay-over-35pct
    desc: PE overlay exceeds thirty-five percent
    crit: baseline
    conf: 0.94
    platforms: [windows]
    for: [pe]
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.35
  - id: overlay-over-90pct
    desc: PE overlay exceeds ninety percent
    crit: notable
    conf: 0.95
    platforms: [windows]
    for: [pe]
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.9
  - id: tnameserv-name
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: section
      exact: __cleave_missing_tnameserv_name__
