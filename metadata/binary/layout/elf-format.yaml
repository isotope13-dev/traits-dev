# Binary Format Checked
# Fires whenever a file was successfully parsed as ELF. Composites use it as a
# baseline "this is an analyzed ELF binary" gate.
defaults:
  platforms: [unix, android, ios]
  for: [elf]
  crit: baseline
  conf: 1.0
traits:
  - id: binary-format-checked
    desc: Binary format is identified
    if:
      type: metrics
      field: elf.class_bits
      min: 1
  - id: shared-object-type
    desc: ELF uses ET_DYN object type
    if:
      type: value
      path: elf.type
      exact: dynamic
