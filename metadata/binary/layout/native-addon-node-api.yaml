defaults:
  platforms:
  - macos
  - linux
  - windows
  for:
  - macho
  - elf
  - pe
traits:
- id: artifact-token-win32
  desc: win32 token in Node-API addon artifact name
  crit: component
  conf: 0.9
  if:
    type: value
    path: file.stem
    regex: (?i)(^|[._-])win32([._-]|$)
- id: artifact-token-arm64
  desc: arm64 token in Node-API addon artifact name
  crit: component
  conf: 0.9
  if:
    type: value
    path: file.stem
    regex: (?i)(^|[._-])arm64([._-]|$)
- id: artifact-token-msvc
  desc: msvc token in Node-API addon artifact name
  crit: component
  conf: 0.9
  if:
    type: value
    path: file.stem
    regex: (?i)(^|[._-])msvc([._-]|$)
composite_rules:
- id: rust-node-api-native-addon
  desc: Rust Node-API native addon
  crit: baseline
  conf: 0.96
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: metadata/lang/compiler/systems::rust-binary
- id: rust-node-api-platform-artifact
  desc: Rust Node-API platform artifact
  crit: baseline
  conf: 0.94
  all:
  - id: rust-node-api-native-addon
  any:
  - id: artifact-token-win32
  - id: artifact-token-arm64
  - id: artifact-token-msvc
