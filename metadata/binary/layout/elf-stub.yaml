defaults:
  platforms: [linux, android]
  for: [elf]

traits:
  - id: tiny-backed-load-segments
    desc: ELF LOAD segments have minimal file backing
    crit: suspicious
    conf: 0.9
    size_min: 8192
    size_max: 131072
    if:
      type: metrics
      field: elf.load_segment_max_p_filesz
      max: 2048
  - id: small-elf-large-memory-image
    desc: Small ELF reserves large memory image
    crit: suspicious
    conf: 0.92
    size_max: 131072
    if:
      type: metrics
      field: elf.load_segment_max_p_memsz
      min: 524288
  - id: header-adjacent-bang-marker
    desc: ELF header-adjacent stub marker
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: "[A-Za-z0-9]{3}!"
      offset_range: [192, 320]

composite_rules:
  - id: memory-backed-stub-layout
    desc: ELF maps large memory image from tiny file
    crit: suspicious
    conf: 0.96
    all:
      - id: tiny-backed-load-segments
      - id: small-elf-large-memory-image
