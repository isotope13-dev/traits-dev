defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: tiny-single-function-pe
    desc: Tiny PE single-function stub
    crit: notable
    conf: 0.8
    size_max: 65536
    if:
      type: metrics
      field: binary.func_count
      max: 1

  - id: pe-checksum-zeroed
    desc: PE checksum is zeroed (common in malware/tools)
    if:
      type: yara
      source: |
        import "pe"
        rule pe_checksum_zeroed {
          condition:
            uint16(0) == 0x5A4D and pe.checksum == 0
        }
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - type: basename
        regex: '^(uninstall .*|elevate)\.exe$'
        case_insensitive: true
      - type: basename
        regex: '(?i)\.node$'
      - type: metrics
        field: binary.code_size
        max: 65536
    # Tiny tools often omit checksums, but larger installers/signed apps should have them.

  - id: pe-checksum-missing
    desc: PE checksum field is missing or invalid
    if:
      type: yara
      source: |
        rule pe_checksum_missing {
          condition:
            uint16(0) == 0x5A4D and
            uint32(0x3C) + 24 <= filesize and
            uint16(uint32(0x3C) + 20) < 68
        }
    unless:
      - id: pe-checksum-zeroed
      - id: metadata/binary/framework::dotnet-metadata
      - type: basename
        regex: '^(uninstall .*|elevate)\.exe$'
        case_insensitive: true
      - type: basename
        regex: '(?i)\.node$'
      - type: metrics
        field: binary.code_size
        max: 65536

  - id: pe-checksum-mismatch
    desc: PE checksum mismatch (modified binary)
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: pe.checksum_valid
      min: 1
    unless:
      - id: pe-checksum-zeroed
      - id: tiny-single-function-pe
      - id: metadata/binary/framework::dotnet-metadata
      - type: basename
        regex: '^(privoxy\.exe|privoxy\.exe\.gz)$'
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/developer::cisco-systems
        - id: metadata/signed/leaf::cisco-systems-inc.
    # If checksum is non-zero but doesn't match, it's a strong signal of modification.
    # On legit MS-signed binaries it's occasionally stale (downgrade to baseline);
    # on MS-claim-signed loaders this is a key sig-theft tell.

  - id: signed-pe-checksum-mismatch
    desc: Signed PE checksum mismatch
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: pe.checksum_valid
      min: 1
    unless:
      - id: pe-checksum-zeroed
      - id: tiny-single-function-pe
      - id: metadata/binary/framework::dotnet-metadata

  - id: cert-table-present
    desc: PE certificate table entry populated
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: pe.certificate_table_size
      min: 1

  - id: security-dir-out-of-bounds
    desc: PE security directory RVA out of bounds
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: pe.security_directory_out_of_bounds
      min: 1

  - id: pe-checksum-absent
    desc: PE checksum field not set
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: pe.has_checksum
      min: 1

composite_rules:
  - id: cert-data-zeroed-checksum
    desc: Certificate table present but PE checksum zeroed
    crit: suspicious
    conf: 0.90
    attack: T1553.002
    all:
      - id: cert-table-present
      - id: pe-checksum-zeroed
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly

  - id: cert-transplant-indicators
    desc: Certificate transplant indicators (out-of-bounds security dir, claimed cert, zeroed checksum)
    crit: suspicious
    conf: 0.95
    attack: T1553.002
    all:
      - id: cert-table-present
      - id: security-dir-out-of-bounds
      - id: pe-checksum-absent
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
