defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: tiny-single-function-pe
    desc: Tiny PE single-function stub
    crit: notable
    conf: 0.8
    size_max: 65536
    if:
      type: metrics
      field: functions.count
      max: 1

  - id: pe-checksum-zeroed
    desc: "PE checksum is zeroed"
    if:
      type: metrics
      field: pe.checksum
      max: 0
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/native::python-msvc-extension
      - type: basename
        regex: '^(uninstall .*|elevate)\.exe$'
        case_insensitive: true
      - type: basename
        regex: '(?i)\.node$'
      - type: metrics
        field: binary.code_size
        max: 65536

  - id: pe-checksum-missing
    desc: PE checksum field is missing or invalid
    if:
      type: yara
      source: |
        rule pe_checksum_missing {
          condition:
            uint16(0) == 0x5A4D and
            uint32(0x3C) + 24 <= filesize and
            uint16(uint32(0x3C) + 20) < 68
        }
    unless:
      - id: pe-checksum-zeroed
      - id: metadata/binary/framework::dotnet-metadata
      - type: basename
        regex: '^(uninstall .*|elevate)\.exe$'
        case_insensitive: true
      - type: basename
        regex: '(?i)\.node$'
      - type: metrics
        field: binary.code_size
        max: 65536

  # The stored CheckSum field is populated (non-zero). Paired with
  # pe-checksum-content-invalid below to separate "header says nothing" from
  # "header says something that is no longer true".
  - id: pe-checksum-populated
    desc: PE checksum field holds a non-zero value
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: pe.checksum
      min: 1

  # Stored CheckSum != checksum recomputed over the current bytes. Read from
  # cleave's native pe.checksum_valid metric: the previous inline YARA form
  # (pe.checksum != pe.calculate_checksum()) never matched in this build, so
  # every rule that consumed the mismatch below was silently inert.
  - id: pe-checksum-content-invalid
    desc: PE checksum does not match content
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: pe.checksum_valid
      max: 0
    unless:
      - type: basename
        regex: '^(privoxy\.exe|privoxy\.exe\.gz)$'

  - id: cert-table-present
    desc: PE certificate table entry populated
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: pe.cert_table_size
      min: 1

  - id: security-dir-out-of-bounds
    desc: PE security directory RVA out of bounds
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: pe.security_directory_out_of_bounds
      min: 1

  - id: pe-checksum-absent
    desc: PE checksum field not set
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: pe.has_checksum
      max: 0

  - id: pe-checksum-valid
    desc: PE checksum matches computed value
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: pe.checksum_valid
      min: 1

composite_rules:
  # Populated-but-wrong CheckSum: the linker wrote a value and the bytes have
  # changed since. Widely referenced as a "binary was modified after link"
  # building block.
  - id: pe-checksum-mismatch
    desc: PE checksum differs from computed content
    crit: notable
    conf: 0.95
    all:
      - id: pe-checksum-populated
      - id: pe-checksum-content-invalid
    unless:
      - id: pe-checksum-zeroed
      - id: tiny-single-function-pe
      - id: metadata/binary/framework::dotnet-metadata
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/signed/developer::cisco-systems
        - id: metadata/signed/leaf::cisco-systems-inc.

  # Same mismatch, but on a binary that also carries a certificate table — the
  # id has always promised "signed", while the old matcher only re-tested the
  # checksum and never looked at the certificate. signtool rewrites CheckSum
  # when it signs, so a signed image whose checksum no longer matches its bytes
  # was altered after signing (or the certificate came from another file).
  - id: signed-pe-checksum-mismatch
    desc: Signed PE checksum no longer matches its content
    crit: suspicious
    conf: 0.95
    attack: T1553.002
    all:
      - id: cert-table-present
      - id: pe-checksum-mismatch
    unless:
      - id: metadata/binary/layout::embedded-pe-child
      - id: well-known/tool/development/go-toolchain::go-module-source-path

  - id: cert-data-zeroed-checksum
    desc: Certificate table present but PE checksum zeroed
    crit: suspicious
    conf: 0.90
    attack: T1553.002
    all:
      - id: cert-table-present
      - id: pe-checksum-zeroed
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/

  - id: cert-transplant-indicators
    desc: Cert transplant - out-of-bounds security dir, claimed cert, zeroed checksum
    crit: suspicious
    conf: 0.95
    attack: T1553.002
    all:
      - id: cert-table-present
      - id: security-dir-out-of-bounds
      - id: pe-checksum-absent
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/
  - id: cert-table-truncated
    desc: Claimed PE certificate table is truncated
    crit: suspicious
    conf: 0.98
    all:
      - id: cert-table-present
      - id: security-dir-out-of-bounds
    unless:
      # Go's debug/pe parser test suite includes real EFI images (e.g. a Linux
      # vmlinuz) whose PE certificate directory is legitimately unusual.
      - id: well-known/tool/development/go-toolchain::go-toolchain-source-path
      - id: well-known/tool/development/go-toolchain::go-module-source-path
