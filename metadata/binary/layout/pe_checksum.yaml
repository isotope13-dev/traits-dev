defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: tiny-single-function-pe
    desc: Tiny PE single-function stub
    crit: baseline
    conf: 0.8
    size_max: 65536
    if:
      type: metrics
      field: binary.function_count
      max: 1

  - id: pe-checksum-zeroed
    desc: PE checksum is zeroed (common in malware/tools)
    if:
      type: yara
      source: |
        import "pe"
        rule pe_checksum_zeroed {
          condition:
            uint16(0) == 0x5A4D and pe.checksum == 0
        }
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - type: basename
        regex: '^(uninstall .*|elevate)\.exe$'
        case_insensitive: true
      - type: basename
        regex: '(?i)\.node$'
      - type: metrics
        field: binary.file_size
        max: 65536
    # Tiny tools often omit checksums, but larger installers/signed apps should have them.

  - id: pe-checksum-missing
    desc: PE checksum field is missing or invalid
    if:
      type: yara
      source: |
        rule pe_checksum_missing {
          condition:
            uint16(0) == 0x5A4D and
            uint32(0x3C) + 24 <= filesize and
            uint16(uint32(0x3C) + 20) < 68
        }
    unless:
      - id: pe-checksum-zeroed
      - id: metadata/binary/framework::dotnet-metadata
      - type: basename
        regex: '^(uninstall .*|elevate)\.exe$'
        case_insensitive: true
      - type: basename
        regex: '(?i)\.node$'
      - type: metrics
        field: binary.file_size
        max: 65536

  - id: pe-checksum-mismatch
    desc: PE checksum mismatch (modified binary)
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: pe.checksum_mismatch
      min: 1
    unless:
      - id: pe-checksum-zeroed
      - id: tiny-single-function-pe
      - id: metadata/binary/framework::dotnet-metadata
      - type: basename
        regex: '^(privoxy\.exe|privoxy\.exe\.gz)$'
    # If checksum is non-zero but doesn't match, it's a strong signal of modification.
