defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: baseline
traits:
  - id: legacy-few-sections
    desc: PE has few sections
    conf: 0.7
    if:
      id: metadata/binary/metrics/structural::few-sections
  - id: many-readable-strings
    desc: PE has many readable strings
    conf: 0.7
    if:
      type: metrics
      field: binary.string_count
      min: 100
  - id: low-overall-entropy
    desc: PE has low overall entropy
    conf: 0.7
    if:
      type: metrics
      field: binary.overall_entropy
      max: 6.0
  - id: text-section-dominates-file
    desc: Text section dominates file
    conf: 0.75
    if:
      type: metrics
      field: binary.text_to_file_ratio
      min: 0.95
  - id: svk-packed-section
    desc: SVK packed section name
    crit: component
    conf: 0.85
    if:
      type: section
      regex: ^SVK(P|[0-9])
composite_rules:
  - id: rich-imported-low-entropy-layout
    desc: Legacy rich PE with broad imports
    conf: 0.75
    all:
      - id: metadata/binary/resource::rich-header-present
      - id: metadata/binary/metrics/structural::many-imports
      - id: legacy-few-sections
      - id: many-readable-strings
      - id: low-overall-entropy
  - id: import-rich-versioned-pe
    desc: PE with version resource and broad imports
    conf: 0.85
    all:
      - id: metadata/binary/metrics/threshold::many-imports-50
    any:
      - id: metadata/package/versioning::pe-product-name-present
      - id: metadata/package/versioning::pe-file-description-present
      - id: metadata/package/versioning::pe-legal-copyright-present
    needs: 2
  - id: dotnet-low-entropy-text-carrier
    desc: Low entropy .NET text carrier
    crit: component
    conf: 0.85
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: legacy-few-sections
      - id: many-readable-strings
      - id: low-overall-entropy
      - id: text-section-dominates-file
