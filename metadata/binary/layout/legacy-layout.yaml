defaults:
  for: [pe]
  platforms: [windows]
  crit: baseline
traits:
  - id: legacy-few-sections
    desc: PE has few sections
    conf: 0.7
    if:
      type: metrics
      field: binary.section_count
      max: 3
  - id: many-readable-strings
    desc: PE has many readable strings
    conf: 0.7
    if:
      type: metrics
      field: binary.string_count
      min: 100
  - id: low-overall-entropy
    desc: PE has low overall entropy
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: binary.overall_entropy
      max: 6.0
  - id: uharc-string
    desc: UHARC utility string marker
    conf: 0.95
    if:
      type: text
      substr: UHARC 0.4
      section: .rdata
composite_rules:
  - id: rich-imported-low-entropy-layout
    desc: Legacy rich PE with broad imports
    conf: 0.75
    all:
      - id: metadata/binary/resource::rich-header-present
      - id: metadata/binary/metrics::many-imports
      - id: legacy-few-sections
      - id: many-readable-strings
      - id: low-overall-entropy
  - id: legacy-watcom-packed-utility
    desc: Legacy Watcom-packed UHARC utility
    conf: 0.95
    all:
      - id: metadata/lang/compiler/native::watcom-runtime
      - id: legacy-few-sections
    any:
      - id: uharc-string
    needs: 1
