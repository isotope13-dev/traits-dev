# PE Overlay Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: pe-signature-present
    desc: PE has Authenticode signature directory
    crit: baseline
    conf: 1.0
    if:
      type: metrics
      field: pe.has_signature
      min: 1
  - id: has-overlay
    desc: PE binary has trailing overlay data
    crit: baseline
    conf: 1.0
    if:
      type: metrics
      field: binary.has_overlay
      min: 1

  - id: overlay-size-metrics
    desc: Binary has overlay data with measurable size
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: binary.overlay_size
      min: 1
  - id: overlay-over-1mb
    desc: PE has overlay over one megabyte
    crit: baseline
    conf: 0.96
    if:
      type: metrics
      field: binary.overlay_size
      min: 1048576
  - id: overlay-over-35pct
    desc: Overlay exceeds thirty five percent
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.35
  - id: overlay-over-90pct
    desc: Overlay exceeds ninety percent
    crit: notable
    conf: 0.96
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.9
  - id: largest-section-under-8pct
    desc: Largest section occupies under eight percent
    crit: notable
    conf: 0.92
    size_min: 1048576
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.001
      max: 0.08
  - id: avg-section-under-24k
    desc: Average section size under twenty four kilobytes
    crit: baseline
    conf: 0.88
    size_min: 1048576
    if:
      type: metrics
      field: binary.avg_section_size
      max: 24576
