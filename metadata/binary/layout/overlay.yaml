# PE Overlay Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: has-overlay
    desc: PE binary has trailing overlay data
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: binary.has_overlay
      min: 1
  - id: overlay-size-256
    desc: PE overlay is exactly 256 bytes
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: binary.overlay_size
      min: 256
      max: 256
