# PE Overlay Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: has-overlay
    desc: PE binary has trailing overlay data
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: binary.has_overlay
      min: 1
    unless:
      - id: metadata/binary/resource/
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - type: metrics
        field: binary.overlay_size
        max: 16384
  - id: overlay-size-256
    desc: PE overlay is exactly 256 bytes
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: binary.overlay_size
      min: 256
      max: 256
  - id: elf-has-overlay
    desc: ELF binary has trailing overlay data
    crit: notable
    conf: 0.96
    platforms: [linux, android]
    for: [elf]
    if:
      type: metrics
      field: binary.has_overlay
      min: 1
    unless:
      # Small ELF "overlays" are often section-table/string-table material left
      # after the last load segment, not appended payloads.
      - type: metrics
        field: binary.overlay_size
        max: 4096
  - id: elf-overlay-over-512
    desc: ELF overlay exceeds 512 bytes
    crit: notable
    conf: 0.96
    platforms: [linux, android]
    for: [elf]
    if:
      type: metrics
      field: binary.overlay_size
      min: 512
    unless:
      - type: metrics
        field: binary.overlay_size
        max: 4096
