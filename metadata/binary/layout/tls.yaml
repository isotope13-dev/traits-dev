defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9

traits:
  - id: pe-tls-runtime-index-symbol
    desc: PE TLS runtime index symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: _tls_index
  - id: pe-tls-runtime-descriptor-symbol
    desc: PE TLS runtime descriptor symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: _tls_used
  - id: pe-tls-callback-array-symbol
    desc: PE TLS callback array symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: (^|[^A-Za-z0-9])__xl_[A-Za-z]($|[^A-Za-z0-9])
  - id: pe-tls-callback-text-reference
    desc: PE TLS callback text reference
    crit: notable
    conf: 0.85
    if:
      type: text
      section: .text
      regex: \bTlsCallback(_\d+)?\b
      case_insensitive: true
  - id: pe-tls-callback-table
    desc: PE TLS callback table present
    if:
      type: metrics
      field: pe.tls_callback_count
      min: 1
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pe-multiple-tls-callbacks
    desc: PE has multiple TLS callbacks
    if:
      type: metrics
      field: pe.tls_callback_count
      min: 2
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
