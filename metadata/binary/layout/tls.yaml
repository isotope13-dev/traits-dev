defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9

traits:
  - id: pe-tls-callback-table
    desc: PE TLS callback table present
    if:
      type: metrics
      field: pe.tls_callback_count
      min: 1

  - id: pe-multiple-tls-callbacks
    desc: PE has multiple TLS callbacks
    if:
      type: metrics
      field: pe.tls_callback_count
      min: 2
