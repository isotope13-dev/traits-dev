defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: efi-pe-subsystem
    desc: PE subsystem is EFI (application/driver)
    crit: component
    conf: 0.99
    if:
      type: metrics
      field: pe.subsystem
      min: 10
      max: 14
  - id: pe-entry-itext-section
    desc: PE entrypoint is in .itext section
    crit: component
    conf: 0.84
    if:
      type: value
      path: pe.entry_section
      exact: .itext
  - id: pe-entry-debug-section
    desc: PE entrypoint is in .debug section
    crit: component
    conf: 0.9
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    if:
      type: value
      path: pe.entry_section
      exact: .debug
  - id: pe-header-offset-overflow
    desc: PE e_lfanew overflow marker
    crit: suspicious
    conf: 0.95
    if:
      type: hex
      # Offset 0x3C is e_lfanew. 
      # Zhong-Stealer value: F8 FF FF 00 (0x00FFFFF8) or similar 
      # Rule for values > 0x1000 or negative (sign bit set)
      pattern: "?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? f8 ff ff"
      offset: 0
  - id: pe-header-offset-high
    desc: PE e_lfanew unusually high
    crit: notable
    conf: 0.8
    if:
      type: hex
      # Match any value in the 3rd and 4th byte of e_lfanew that isn't 00 00
      pattern: "?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? [2] [!00 00]"
      offset: 0x3C
