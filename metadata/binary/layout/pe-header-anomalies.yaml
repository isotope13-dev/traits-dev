defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: pe-header-offset-overflow
    desc: PE e_lfanew overflow marker
    crit: suspicious
    conf: 0.95
    if:
      type: hex
      # Offset 0x3C is e_lfanew. 
      # Zhong-Stealer value: F8 FF FF 00 (0x00FFFFF8) or similar 
      # Rule for values > 0x1000 or negative (sign bit set)
      pattern: "?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? f8 ff ff"
      offset: 0
  - id: pe-header-offset-high
    desc: PE e_lfanew unusually high
    crit: notable
    conf: 0.8
    if:
      type: hex
      # Match any value in the 3rd and 4th byte of e_lfanew that isn't 00 00
      pattern: "?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? [2] [!00 00]"
      offset: 0x3C
