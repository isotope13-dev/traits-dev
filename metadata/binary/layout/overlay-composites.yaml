defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: jar-manifest-marker
    desc: JAR manifest path marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "META-INF/MANIFEST.MF"
      section: rdata

  - id: file-over-2mb
    desc: PE file larger than 2 MiB
    crit: component
    conf: 0.9
    size_min: 2097152

  - id: image-under-768kb
    desc: PE mapped image under 768 KiB
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: pe.size_of_image
      max: 786432

composite_rules:
  - id: low-entropy-large-overlay
    desc: Large overlay with very low entropy
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/layout::large-overlay-64k
      - id: metadata/binary/layout::low-overlay-entropy
    unless:
      - id: well-known/app/drivers/
      - id: well-known/app/windows-boot/
      - id: well-known/tool/development/jetbrains/
      - id: well-known/tool/development/git-for-windows::mingit-openssl-legacy-provider
  - id: compact-host-large-pe
    desc: Large PE with compact mapped host
    crit: suspicious
    conf: 0.95
    unless:
      - id: jar-manifest-marker
      - id: metadata/binary/installer/script/
      - id: metadata/binary/layout::zero-largest-section-ratio
    all:
      - id: metadata/binary/layout::largest-section-under-8pct
      - id: metadata/binary/layout::avg-section-under-24k

  - id: compact-image-multistage-pe
    desc: Compact mapped image with embedded stages
    crit: suspicious
    conf: 0.96
    all:
      - id: file-over-2mb
      - id: image-under-768kb
      - id: metadata/binary/layout::multiple-pe-embedded
    unless:
      - id: jar-manifest-marker
      - id: metadata/binary/installer/script/
