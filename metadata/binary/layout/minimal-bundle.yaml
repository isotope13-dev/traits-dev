# Minimal Info.plist structure checks (macOS bundles)
# NOTE: Bundle-directory existence checks are not expressible in current trait DSL.
# Keep rules scoped to Info.plist key presence/absence only.
defaults:
  for: [plist]
  platforms: [macos]
traits:
  - id: info-plist-file
    desc: File is Info.plist
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: "Info.plist"
  - id: info-plist-bundle-context
    desc: Info.plist carries bundle executable
    crit: component
    conf: 0.9
    if:
      type: kv
      path: "CFBundleExecutable"
  - id: info-plist-has-bundle-id
    desc: Info.plist has bundle identifier
    crit: component
    conf: 0.9
    if:
      type: kv
      path: "CFBundleIdentifier"
composite_rules:
  - id: info-plist-missing-bundle-id
    desc: Info.plist missing bundle identifier
    crit: notable
    conf: 0.7
    all:
      - id: info-plist-file
      - id: info-plist-bundle-context
    unless:
      - id: info-plist-has-bundle-id
