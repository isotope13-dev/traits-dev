defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: large-overlay-64k
    desc: Overlay size at least 64 KiB
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: binary.overlay_size
      min: 65536
  - id: large-overlay-1mb
    desc: Overlay size at least 1 MiB
    crit: notable
    conf: 0.96
    size_min: 1000000
    if:
      type: metrics
      field: binary.overlay_size
      min: 1000000
  - id: low-overlay-entropy
    desc: Low entropy overlay payload
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: binary.overlay_entropy
      max: 4.2
    unless:
      - type: metrics
        field: binary.overlay_size
        max: 0
  - id: overlay-dominates-third
    desc: Overlay exceeds one-third
    crit: notable
    conf: 0.92
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.33
    unless:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
