defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: large-overlay-64k
    desc: Overlay size at least 64 KiB
    crit: baseline
    conf: 0.95
    if:
      type: metrics
      field: binary.overlay_size
      min: 65536
  - id: low-overlay-entropy
    desc: Low entropy overlay payload
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: binary.overlay_entropy
      max: 4.2
  - id: overlay-dominates-third
    desc: Overlay exceeds one-third
    crit: notable
    conf: 0.92
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.33
