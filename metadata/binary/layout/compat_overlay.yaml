defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: large-overlay-64k
    desc: Overlay size at least 64 KiB
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: binary.overlay_size
      min: 65536
  - id: medium-overlay-size
    desc: Overlay size at least 32 KiB
    crit: component
    conf: 0.72
    for: [pe, macho]
    platforms: [windows, macos]
    if:
      type: metrics
      field: binary.overlay_size
      min: 32768
    unless:
      - id: metadata/document/office/container/
  - id: large-overlay-1mb
    desc: Overlay size at least 1 MiB
    crit: notable
    conf: 0.96
    size_min: 1000000
    if:
      type: metrics
      field: binary.overlay_size
      min: 1000000
  - id: low-overlay-entropy
    desc: Low entropy overlay payload
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: binary.overlay_entropy
      max: 4.2
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - type: metrics
        field: binary.overlay_size
        max: 0
  - id: overlay-dominates-third
    desc: Overlay exceeds one-third
    crit: notable
    conf: 0.92
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.33
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/fs/temp/pyinstaller/
      - id: metadata/binary/layout::cert-table-present
  - id: high-entropy-overlay
    desc: PE overlay has high entropy
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: binary.overlay_entropy
      min: 7.8
  - id: overlay-dominates-80pct
    desc: PE overlay exceeds eighty percent
    crit: notable
    conf: 0.94
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.8
    unless:
      - id: metadata/binary/installer/script::nsis-manifest-exehead
      - id: metadata/binary/installer/script::nsis
      - id: well-known/app/handbrake::handbrake-windows-binary
      - id: metadata/file/string/identity::tool-identity-7zip
  - id: overlay-dominates-90pct
    desc: PE overlay exceeds ninety percent
    crit: notable
    conf: 0.97
    size_min: 1048576
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.9
