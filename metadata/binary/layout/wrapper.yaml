defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: large-dominant-section
    desc: Dominant largest PE section
    crit: component
    conf: 0.94
    size_min: 900000
    size_max: 1300000
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.8
  - id: high-entropy-rsrc-wrapper
    desc: High entropy resource wrapper
    crit: component
    conf: 0.97
    size_min: 900000
    size_max: 1300000
    if:
      type: metrics
      field: pe.rsrc_entropy
      min: 6.8
  - id: signed-pe-wrapper
    desc: Signed PE wrapper marker
    crit: component
    conf: 0.97
    size_min: 900000
    size_max: 1300000
    if:
      type: metrics
      field: pe.has_signature
      min: 1
  - id: tiny-sxdata-section
    desc: Tiny .sxdata helper section
    crit: component
    conf: 0.96
    size_min: 900000
    size_max: 1300000
    if:
      type: section
      exact: .sxdata
      length_max: 1024
  - id: wrapper-file-size-band
    desc: Wrapper file size band
    crit: component
    conf: 0.97
    size_min: 1100000
    size_max: 1200000
    if:
      type: metrics
      field: binary.file_size
      min: 1100000
      max: 1200000
  - id: five-section-wrapper
    desc: Five section wrapper layout
    crit: component
    conf: 0.95
    size_min: 1100000
    size_max: 1200000
    if:
      type: metrics
      field: binary.section_count
      min: 5
      max: 5
