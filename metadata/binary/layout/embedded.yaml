# Embedded PE/MZ Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: embedded-pe-child
    desc: PE extracted from embedded container
    crit: component
    conf: 1.0
    if:
      type: path
      basename: true
      regex: '@0x[0-9a-f]+$'
  - id: pe-embedded
    desc: Valid PE/MZ binary found embedded in file
    crit: notable
    conf: 0.9
    if:
      type: hex
      pattern: "4D 5A 90 00 03 00 00 00 04 00 00 00 FF FF 00 00"
      offset_range: [4096, null]
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sysinternals/
        - id: metadata/binary/installer/sfx/
        - id: metadata/binary/metrics/threshold::dotnet-binary
        - id: metadata/binary/framework::dotnet-metadata
    unless:
      - type: value
        path: pe.version.product_name
        regex: (?i)(Sysinternals|7-Zip)
      - type: value
        path: pe.version.company
        regex: (?i)\bSysinternals\b
      - id: well-known/tool/sysadmin/sysinternals/
  - id: repeated-legacy-pe-images
    desc: Repeated legacy PE images
    crit: suspicious
    conf: 0.98
    ref: sha256:7c1b267db7d698a897d572cd41f2e5746a06bb1a512a69f1c629c7852b99c459
    count_min: 4
    if:
      type: hex
      pattern: "4D 5A 50 00 02 00 00 00 04 00 0F 00 FF FF 00 00"
      offset_range: [0, null]
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/sfx/
  - id: data-file-pe-dos-stub
    desc: Raw data contains PE DOS stub
    crit: suspicious
    conf: 0.9
    for: [data]
    size_min: 1024
    if:
      type: hex
      pattern: "54 68 69 73 20 70 72 6F 67 72 61 6D 20 63 61 6E 6E 6F 74 20 62 65 20 72 75 6E 20 69 6E 20 44 4F 53 20 6D 6F 64 65"
      offset_range: [128, null]
    unless:
      - type: basename
        regex: '\.(txt|md|rst|html?)$'
        case_insensitive: true
      - id: well-known/app/limine::limine-boot-image-context
  - id: data-file-pe-section-name
    desc: Raw data file contains PE section name
    crit: component
    conf: 0.8
    for: [data]
    size_min: 1024
    if:
      type: hex
      pattern: "2E 74 65 78 74 00 00 00"
      offset_range: [128, null]
    unless:
      - id: well-known/app/limine::limine-boot-image-context
  - id: medium-wrapper-many-embedded-pe
    desc: Many embedded PE headers in wrapper
    crit: component
    conf: 0.99
    size_min: 1500000
    size_max: 2500000
    count_min: 6
    if:
      type: hex
      pattern: "4D 5A 90 00 03 00 00 00 04 00 00 00 FF FF 00 00"
      offset_range: [4096, null]
