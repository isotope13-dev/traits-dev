# Embedded PE/MZ Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: pe-embedded
    desc: Valid PE/MZ binary found embedded in file
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: medium-wrapper-many-embedded-pe
    desc: Many embedded PE headers in wrapper
    crit: component
    conf: 0.99
    size_min: 1500000
    size_max: 2500000
    count_min: 6
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
