# Embedded PE/MZ Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: pe-embedded
    desc: Valid PE/MZ binary found embedded in file
    crit: baseline
    conf: 0.9
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: multiple-pe-embedded
    desc: Multiple PE/MZ headers embedded in file
    crit: baseline
    conf: 0.95
    count_min: 3
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: many-pe-embedded
    desc: Many PE/MZ headers embedded in file
    crit: notable
    conf: 0.97
    count_min: 10
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-apphost-bundle
  - id: mavinject32-name
    desc: Embedded mavinject32 stage name
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: mavinject32.exe
      section: .rdata
  - id: tnameserv-name
    desc: Embedded tnameserv stage name
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: tnameserv.exe
      section: .rdata
