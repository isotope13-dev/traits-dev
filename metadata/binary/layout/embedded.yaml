# Embedded PE/MZ Metadata
defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: pe-embedded
    desc: Valid PE/MZ binary found embedded in file
    crit: baseline
    conf: 0.9
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: multiple-pe-embedded
    desc: Multiple PE/MZ headers embedded in file
    crit: baseline
    conf: 0.95
    count_min: 3
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: multiple-pe-embedded-loose
    desc: Multiple embedded PE headers in host
    crit: baseline
    conf: 0.94
    size_min: 1048576
    count_min: 3
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [2048, null]
  - id: many-pe-embedded
    desc: Many PE/MZ headers embedded in file
    crit: notable
    conf: 0.97
    count_min: 10
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-apphost-bundle
  - id: msoxmled-pdb-path
    desc: Embedded msoxmled PDB path marker
    crit: suspicious
    conf: 0.99
    size_min: 1048576
    if:
      type: text
      substr: msoxmled.pdb
  - id: sevenzip-mapi-load-error
    desc: 7-Zip MAPI load failure string
    crit: component
    conf: 0.98
    size_min: 1048576
    if:
      type: text
      exact: cannot load Mapi32.dll
  - id: sevenzip-mapi-symbol
    desc: 7-Zip MAPISendMail symbol string
    crit: component
    conf: 0.98
    size_min: 1048576
    if:
      type: text
      exact: MAPISendMail
  - id: sevenzip-sfx-module-error
    desc: 7-Zip SFX module error string
    crit: component
    conf: 0.97
    size_min: 1048576
    if:
      type: text
      exact: cannot open SFX module
  - id: mavinject32-name
    desc: Embedded mavinject32 stage name
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: mavinject32.exe
      section: .rdata
  - id: mavinject32-name-loose
    desc: Embedded mavinject32 stage name anywhere
    crit: baseline
    conf: 0.94
    if:
      type: text
      exact: mavinject32.exe
  - id: acrobroker-name
    desc: Embedded AcroBroker stage name
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: AcroBroker.exe
  - id: tnameserv-name
    desc: Embedded tnameserv stage name
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: tnameserv.exe
      section: .rdata
composite_rules:
  - id: sevenzip-mapi-sfx-cluster
    desc: 7-Zip SFX MAPI support cluster
    crit: suspicious
    conf: 0.97
    all:
      - id: sevenzip-mapi-load-error
      - id: sevenzip-mapi-symbol
    any:
      - id: sevenzip-sfx-module-error
      - id: metadata/binary/installer/sfx::7zip-registry-key
      - id: metadata/library/compression::lzma-marker
  - id: mavinject-acrobroker-stage-pair
    desc: Embedded mavinject and AcroBroker stages
    crit: suspicious
    conf: 0.98
    all:
      - id: mavinject32-name-loose
      - id: acrobroker-name
