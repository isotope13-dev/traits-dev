# Embedded PE/MZ Metadata
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: pe-embedded
    desc: Valid PE/MZ binary found embedded in file
    crit: baseline
    conf: 0.9
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
  - id: multiple-pe-embedded
    desc: Multiple PE/MZ headers embedded in file
    crit: baseline
    conf: 0.95
    count_min: 3
    if:
      type: hex
      pattern: "4D 5A 90 00"
      offset_range: [4096, null]
