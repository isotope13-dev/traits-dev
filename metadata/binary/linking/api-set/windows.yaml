defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: api-set-forwarder-dll
    desc: Windows API-set forwarder DLL (api-ms-win/ext-ms-win)
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: '^(api|ext)-ms-win-[a-z0-9-]+\.dll$'
  - id: api-set-core-cluster
    desc: Dense api-ms-win-core string cluster
    crit: component
    conf: 0.9
    count_min: 6
    if:
      type: text
      regex: api-ms-win-core-[a-z0-9-]+
      section: .rdata
  - id: api-set-ext-cluster
    desc: ext-ms Windows API-set cluster
    crit: baseline
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: ext-ms-win-[a-z0-9-]+
      section: .rdata
composite_rules:
  - id: compact-api-set-pe
    desc: Compact PE with API-set cluster
    crit: notable
    conf: 0.9
    all:
      - id: api-set-core-cluster
      - id: metadata/binary/resource::rich-header-present
      - id: metadata/binary/metrics/structural::small-pe
