defaults:
  platforms: [unix, android]
  crit: notable
traits:
  - id: elf-interpreter-section-name
    desc: ELF interpreter section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    if:
      type: text
      exact: .interp
      section: .shstrtab
  - id: elf-dynamic-section-name
    desc: ELF dynamic section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    if:
      type: text
      exact: .dynamic
      section: .shstrtab
  - id: elf-dynsym-section-name
    desc: ELF dynsym section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    if:
      type: text
      exact: .dynsym
      section: .shstrtab
  - id: elf-dynstr-section-name
    desc: ELF dynstr section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    if:
      type: text
      exact: .dynstr
      section: .shstrtab
  - id: openbsd-ident-note
    desc: OpenBSD ELF ident note
    crit: baseline
    conf: 0.98
    for:
      - elf
    if:
      type: text
      exact: .note.openbsd.ident
      section: .shstrtab
  - id: openbsd-section-marker
    desc: OpenBSD-specific ELF section
    crit: baseline
    conf: 0.98
    for:
      - elf
    if:
      type: section
      regex: ^\.openbsd\.
  - id: openbsd-boot-section-marker
    desc: OpenBSD boot-specific ELF section
    crit: baseline
    conf: 0.98
    for:
      - elf
    if:
      type: section
      regex: ^\.boot\.
  - id: elf-needed-libs-zero
    desc: ELF imports zero needed libraries
    crit: baseline
    conf: 0.9
    for:
      - elf
    if:
      type: metrics
      field: dependencies.count
      max: 0
composite_rules:
  - id: openbsd-elf-note
    desc: OpenBSD ELF markers
    crit: baseline
    conf: 0.98
    any:
      - id: openbsd-ident-note
      - id: openbsd-section-marker
      - id: openbsd-boot-section-marker
  - id: static-linked-heuristic
    desc: ELF lacks dynamic linker sections
    crit: notable
    conf: 0.75
    all:
      - id: metadata/binary/layout::binary-format-checked
    unless:
      - id: elf-interpreter-section-name
      - id: elf-dynamic-section-name
      - id: elf-dynsym-section-name
      - id: elf-dynstr-section-name
    downgrade:
      # Static linking is the default for Go binaries and common for Rust
      # (`musl` targets); expected behavior, not a signal. A C/other static
      # binary without these markers is still notable.
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiler/systems::rust-binary
  - id: static-linked
    desc: Statically linked binary
    crit: notable
    conf: 0.8
    all:
      - id: static-linked-heuristic
      - id: elf-needed-libs-zero
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiler/systems::rust-binary
