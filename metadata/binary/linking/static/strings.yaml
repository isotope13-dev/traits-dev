defaults:
  platforms: [unix, windows]
  for: [binaries]
traits:
  - id: statically-linked
    desc: statically linked string
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: statically linked
      section: .text
  - id: ld-linux-interp
    desc: ELF needs the Linux dynamic loader
    crit: notable
    conf: 0.7
    for: [elf]
    if:
      type: value
      path: elf.needed
      regex: 'ld-linux[^,\]]*'
