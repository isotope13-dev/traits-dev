defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: libc-start-ref
    desc: __libc_start reference
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: __libc_start
      section: .text
  - id: rtld-default-ref
    desc: RTLD_DEFAULT macro reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: RTLD_DEFAULT
      section: .text
  - id: ifunc-ref
    desc: IFUNC reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: IFUNC
      section: .text
  - id: resolver-suffix
    desc: _resolver function suffix
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: _resolver
      section: .text
  - id: getauxval-ref
    desc: getauxval function reference
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      regex: getauxval
  - id: ifunc
    desc: ELF IFUNC resolver
    crit: notable
    conf: 1.0
    # Matches when any dynsym entry has STT_GNU_IFUNC type (kind
    # field surfaces the canonical "ifunc" string for the union of
    # FUNC + IFUNC entries cleave walks).
    if:
      type: kv
      path: elf.dynsym_funcs[*].kind
      exact: ifunc
  - id: microblaze
    desc: Xilinx MicroBlaze architecture
    crit: notable
    conf: 1.0
    if:
      type: hex
      section: .text
      pattern: 00 BD
      offset: 18
composite_rules:
  - id: resolver-markers
    desc: Resolver function markers
    crit: baseline
    conf: 0.4
    any:
      - id: resolver-suffix
      - id: metadata/binary/section/names::gnu-hash
      - id: libc-start-ref
  - id: ifunc-markers
    desc: IFUNC-related markers
    crit: baseline
    conf: 0.4
    any:
      - id: ifunc-ref
      - id: getauxval-ref
