defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
traits:
  - id: statically-linked
    desc: statically linked string
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: statically linked
      section: .text
  - id: ld-linux-interp
    desc: /lib/ld-linux interpreter
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: /lib6?4?/ld-linux
      section: .text
