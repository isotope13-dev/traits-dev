defaults:
  platforms:
    - macos
    - ios
  for:
    - macho
traits:
  - id: install-name
    desc: Mach-O install name metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::macho-install-name
  - id: dylib
    desc: Mach-O linked dylib metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::macho-dylib
  - id: macho-rpath
    desc: Mach-O runtime search path metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::macho-rpath
composite_rules:
  - id: macho-dynamic-linking-metadata
    desc: Mach-O runtime linking metadata
    crit: baseline
    conf: 1.0
    any:
      - id: install-name
      - id: dylib
      - id: macho-rpath
