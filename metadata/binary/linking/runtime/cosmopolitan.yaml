defaults:
  platforms:
    - windows
    - unix
  for:
    - binaries
traits:
  - id: ape-binary-marker
    desc: Cosmopolitan APE binary marker
    crit: component
    conf: 0.98
    for:
      - pe
      - macho
    if:
      type: hex
      pattern: 5F 5F 41 50 45 31
      offset_range:
        - 0
        - 4096

  - id: cosmopolitan-marker
    desc: Cosmopolitan runtime marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "Cosmopolitan "

  - id: cosmopolitan-ape-runtime
    desc: Cosmopolitan APE runtime marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: "actually portable executable loader version"
