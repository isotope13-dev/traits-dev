# ELF runtime-linking metadata, sourced directly from the binary kv
# tree populated by cleave's ELF analyzer + binary kv extractor.
# Trait IDs are unchanged from the previous (Rust-emitted) generation
# so downstream consumers (composites, unless: clauses) keep working.
defaults:
  platforms:
    - unix
    - android
  for:
    - elf
  crit: baseline
  conf: 1.0
traits:
  - id: interpreter
    desc: ELF program interpreter metadata
    if:
      type: kv
      path: elf.interpreter
      exists: true
  - id: soname
    desc: ELF SONAME metadata
    if:
      type: kv
      path: elf.soname
      exists: true
  - id: needed-lib
    desc: ELF needed library metadata
    if:
      type: kv
      path: elf.needed
      exists: true
      size_min: 1
  - id: elf-rpath
    desc: ELF RPATH metadata
    if:
      type: kv
      path: elf.rpath
      exists: true
      size_min: 1
  - id: runpath
    desc: ELF RUNPATH metadata
    if:
      type: kv
      path: elf.runpath
      exists: true
      size_min: 1
  - id: library-loader-dep
    desc: Shared library binds dynamic loader
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: elf.has_direct_interp_dep
      exact: "true"
composite_rules:
  - id: elf-dynamic-linking-metadata
    desc: ELF runtime linking metadata
    crit: baseline
    conf: 1.0
    any:
      - id: interpreter
      - id: soname
      - id: needed-lib
      - id: elf-rpath
      - id: runpath
