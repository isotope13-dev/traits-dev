defaults:
  platforms:
    - linux
    - unix
    - android
  for:
    - elf
traits:
  - id: interpreter
    desc: ELF program interpreter metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::elf-interpreter
  - id: soname
    desc: ELF SONAME metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::elf-soname
  - id: needed-lib
    desc: ELF needed library metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::elf-needed-lib
  - id: elf-rpath
    desc: ELF RPATH metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::elf-rpath
  - id: runpath
    desc: ELF RUNPATH metadata
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/binary/linking::elf-runpath
composite_rules:
  - id: elf-dynamic-linking-metadata
    desc: ELF runtime linking metadata
    crit: baseline
    conf: 1.0
    any:
      - id: interpreter
      - id: soname
      - id: needed-lib
      - id: elf-rpath
      - id: runpath
