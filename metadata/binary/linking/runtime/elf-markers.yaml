defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: libc-message-marker
    desc: glibc diagnostic message marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      section: .rodata
      substr: __libc_message
  - id: glibc-fatal-error-marker
    desc: glibc fatal error marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      section: .rodata
      substr: Fatal glibc error
  - id: glibc-tunables-marker
    desc: glibc tunables environment marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      section: .rodata
      substr: GLIBC_TUNABLES
  - id: glibc-rtld-tunable-marker
    desc: glibc rtld tunable namespace marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      section: .rodata
      regex: '^glibc\.rtld\.[a-z_]+$'
  - id: libc-start-ref
    desc: __libc_start reference
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: __libc_start
      section: .text
  - id: rtld-default-ref
    desc: RTLD_DEFAULT macro reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: RTLD_DEFAULT
      section: .text
  - id: ifunc-ref
    desc: IFUNC reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: IFUNC
      section: .text
  - id: resolver-suffix
    desc: _resolver function suffix
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: _resolver
      section: .text
  - id: getauxval-ref
    desc: getauxval function reference
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      regex: getauxval
  - id: ifunc
    desc: ELF IFUNC resolver
    crit: notable
    conf: 1.0
    # Matches when any dynsym entry has STT_GNU_IFUNC type (kind
    # field surfaces the canonical "ifunc" string for the union of
    # FUNC + IFUNC entries cleave walks).
    if:
      type: value
      path: elf.dynsym_funcs[*].kind
      exact: ifunc
  - id: imports-tls-get-addr
    desc: Imports __tls_get_addr from the dynamic loader
    crit: baseline
    conf: 1.0
    if:
      type: import
      regex: ^_*tls_get_addr$
  - id: microblaze
    desc: Xilinx MicroBlaze architecture
    crit: notable
    conf: 1.0
    if:
      type: hex
      section: .text
      pattern: 00 BD
      offset: 18
composite_rules:
  - id: glibc-runtime-markers
    desc: glibc runtime marker set
    crit: baseline
    conf: 0.9
    any:
      - id: libc-message-marker
      - id: glibc-fatal-error-marker
      - id: glibc-tunables-marker
      - id: glibc-rtld-tunable-marker
  - id: resolver-markers
    desc: Resolver function markers
    crit: baseline
    conf: 0.4
    any:
      - id: resolver-suffix
      - id: metadata/binary/section/names::gnu-hash
      - id: libc-start-ref
  - id: ifunc-markers
    desc: IFUNC-related markers
    crit: baseline
    conf: 0.4
    any:
      - id: ifunc-ref
      - id: getauxval-ref
