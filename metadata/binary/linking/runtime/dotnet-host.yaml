defaults:
  platforms: [unix]
  for: [elf]
  crit: component
  conf: 0.95

traits:
  - id: dotnet-hostfxr-api
    desc: .NET hostfxr API surface
    if:
      type: text
      substr: hostfxr_main
      section: .rodata

  - id: dotnet-runtime-root-env
    desc: .NET runtime root environment
    if:
      type: text
      substr: DOTNET_ROOT
      section: .rodata

  - id: dotnet-app-launch-url
    desc: .NET app launch help URL
    if:
      type: text
      substr: https://aka.ms/dotnet/app-launch-failed
      section: .rodata

composite_rules:
  - id: dotnet-host-runtime
    desc: .NET host runtime binary
    crit: baseline
    conf: 0.96
    needs: 2
    any:
      - id: dotnet-hostfxr-api
      - id: dotnet-runtime-root-env
      - id: dotnet-app-launch-url
