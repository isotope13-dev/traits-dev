defaults:
  crit: notable
  platforms:
    - macos
  for:
    - macho
    - dylib
    - plist
traits:
  - id: lsuielement-background-agent
    desc: App declares dockless LSUIElement mode
    conf: 1.0
    size_max: 10485760
    if:
      type: value
      path: LSUIElement
      exact: "true"
  - id: lsbackgroundonly-background-app
    desc: App declares LSBackgroundOnly mode
    conf: 1.0
    size_max: 10485760
    if:
      type: value
      path: LSBackgroundOnly
      exact: "true"
