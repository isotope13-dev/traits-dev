defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  size_min: 1000000
  size_max: 200000000
traits:
  - id: node-sea-fuse
    desc: Node.js SEA fuse sentinel
    crit: baseline
    conf: 0.96
    if:
      type: text
      substr: NODE_SEA_FUSE_
      section: rdata
  - id: node-sea-source-path
    desc: Node.js SEA source path
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: node_sea.cc
      section: rdata
  - id: github-actions-runneradmin-path
    desc: GitHub Actions Windows runner path
    crit: baseline
    conf: 0.86
    platforms: [windows]
    for: [pe]
    if:
      type: text
      substr: \Users\runneradmin\
      section: rdata
composite_rules:
  - id: nodejs-sea-runtime
    desc: Node.js Single Executable Application runtime
    crit: baseline
    conf: 0.98
    any:
      - id: node-sea-fuse
      - id: node-sea-source-path
  - id: nodejs-sea-github-actions-build
    desc: Node.js SEA built on GitHub Actions Windows runner
    crit: baseline
    conf: 0.92
    all:
      - id: nodejs-sea-runtime
      - id: github-actions-runneradmin-path
