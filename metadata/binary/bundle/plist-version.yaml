# Generic Info.plist version values. Common bundle version / minimum-OS values
# shared by countless legitimate apps; baseline identity markers only.
defaults:
  platforms: [macos, ios]
  for: [plist]
  crit: baseline
  conf: 0.5
traits:
  - id: bundle-version-1-0
    desc: CFBundleVersion 1.0
    if:
      type: value
      path: CFBundleVersion
      exact: "1.0"
  - id: min-macos-11-5
    desc: LSMinimumSystemVersion 11.5
    if:
      type: value
      path: LSMinimumSystemVersion
      exact: "11.5"
