# Python bytecode (.pyc) format anomalies
defaults:
  platforms: [windows, unix]
  for: [pyc]
traits:
  - id: pyc-zeroed-metadata
    desc: Python bytecode with zeroed timestamp and size
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      pattern: "?? 0D 0D 0A 00 00 00 00 00 00 00 00 00 00 00 00"
      offset: 0
  - id: pyc-magic-misplaced
    desc: Python bytecode magic not at file start
    crit: suspicious
    conf: 0.8
    unless:
      - type: structure
        feature: binary/format/python-zipapp
      - type: hex
        pattern: "23 21 ??"
        offset: 0
    if:
      type: hex
      pattern: "?? 0D 0D 0A"
      offset_range: [1, null]
