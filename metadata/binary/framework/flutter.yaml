defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.94

traits:
  - id: flutter-windows-dll
    desc: Flutter Windows runtime DLL
    if:
      type: text
      exact: flutter_windows.dll
  - id: flutter-desktop-engine-symbols
    desc: Flutter desktop engine imports
    if:
      type: symbol
      regex: ^FlutterDesktop(Engine|ViewController)
  - id: flutter-assets-path
    desc: Flutter assets path reference
    if:
      type: text
      exact: \flutter_assets

composite_rules:
  - id: flutter-windows-desktop-runner
    desc: Flutter Windows desktop runner
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: flutter-windows-dll
      - id: flutter-desktop-engine-symbols
      - id: flutter-assets-path
