defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: jli-launch
    desc: Java launcher export JLI_Launch
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: "JLI_Launch"
  - id: jli-cmd-to-args
    desc: Java launcher export JLI_CmdToArgs
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: "JLI_CmdToArgs"
  - id: jli-get-std-args
    desc: Java launcher export JLI_GetStdArgs
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: "JLI_GetStdArgs"
  - id: jli-init-arg-processing
    desc: Java launcher export JLI_InitArgProcessing
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: "JLI_InitArgProcessing"
  - id: jli-mem-alloc
    desc: Java launcher export JLI_MemAlloc
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: "JLI_MemAlloc"
  - id: jli-report-error
    desc: Java launcher export JLI_ReportErrorMessage
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: "JLI_ReportErrorMessage"
  - id: exe-extension
    desc: PE file uses .exe extension
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: '(?i)\.exe$'
composite_rules:
  - id: java-launcher-proxy-exports
    desc: Java launcher proxy export surface
    crit: baseline
    conf: 0.98
    needs: 4
    any:
      - id: jli-launch
      - id: jli-cmd-to-args
      - id: jli-get-std-args
      - id: jli-init-arg-processing
      - id: jli-mem-alloc
      - id: jli-report-error
  - id: java-launcher-proxy-exe
    desc: Java launcher proxy masked as executable
    crit: baseline
    conf: 0.96
    all:
      - id: java-launcher-proxy-exports
      - id: exe-extension
