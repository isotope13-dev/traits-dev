defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: vb6-runtime-dll
    desc: VB6 runtime DLL reference
    crit: baseline
    conf: 0.94
    if:
      type: text
      exact: MSVBVM60.DLL
      section: .text
  - id: vb6-runtime-library
    desc: VB6 runtime library marker
    crit: baseline
    conf: 0.92
    if:
      type: symbol
      exact: rtcDoEvents
  - id: vb6-runtime-core-helper
    desc: VB6 runtime helper import
    crit: baseline
    conf: 0.92
    if:
      type: text
      regex: (__vbaExceptHandler|ProcCallEngine|MethCallEngine)
      section: .text
  - id: vb6-runtime-event-helper
    desc: VB6 event sink helper
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: (EVENT_SINK_QueryInterface|EVENT_SINK_AddRef|EVENT_SINK_Release)
      section: .text
  - id: vb6-project-reference
    desc: VB6 project library reference
    crit: baseline
    conf: 0.92
    if:
      type: text
      regex: VB98\\\\VB6\.OLB
      section: .rdata
  - id: vb6-runtime-entry
    desc: VB6 runtime entrypoint marker
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: ThunRTMain
  - id: atl-module-rtti
    desc: ATL module RTTI markers
    crit: baseline
    conf: 0.88
    if:
      type: text
      regex: C(AtlModule|ComModule|AtlException)@ATL@@
      section: .data
  - id: wtl-frame-rtti
    desc: WTL frame window RTTI markers
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: C(FrameWindowImpl|AppModule|AboutDlg|MainFrame).{0,50}WTL@@
      section: .data
  - id: mfc-ccmdtarget
    desc: MFC CCmdTarget class string
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: CCmdTarget
      section: .rdata
  - id: mfc-cwinapp
    desc: MFC CWinApp class string
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: CWinApp
      section: .rdata
  - id: mfc-cdialog
    desc: MFC CDialog class string
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: CDialog
      section: .rdata
  - id: mfc-afx-window-classes
    desc: MFC Afx window class strings
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: Afx(ControlBar|MDIFrame|FrameOrView|OleControl)
      section: .rdata
  - id: mfc-symbols
    desc: MFC application symbols
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      regex: AfxWinMain
  - id: chinese-ui-label
    desc: Chinese UI language label
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: Chinese
      section: .rsrc
  - id: english-ui-label
    desc: English UI language label
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: English
      section: .rsrc
  - id: large-rsrc-section
    desc: Large PE resource section
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: pe.rsrc_size
      min: 65536
  - id: unity-player-framework
    desc: Unity Windows player loader
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: UnityPlayer.dll
      section: .rdata
  - id: mingw-libgcc-runtime
    desc: MinGW libgcc runtime dependency
    crit: baseline
    conf: 0.93
    if:
      type: text
      exact: libgcc_s_dw2-1.dll
      section: .rdata
  - id: gcj-runtime-library
    desc: GCJ runtime library dependency
    crit: baseline
    conf: 0.93
    if:
      type: text
      regex: ^libgcj-\d+\.dll$
      section: .rdata
  - id: mingw-pseudoreloc-runtime
    desc: MinGW pseudo relocation runtime
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: Unknown pseudo relocation (protocol version|bit size) %d\.
      section: .rdata
  - id: electron-desktop-runtime
    desc: Electron desktop runtime markers
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: ../../electron/shell/
      section: .rdata
composite_rules:
  - id: vb6-application-framework
    desc: Visual Basic 6 application framework
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: vb6-runtime-dll
      - id: vb6-runtime-core-helper
      - id: vb6-runtime-event-helper
      - id: vb6-runtime-library
      - id: vb6-project-reference
      - id: vb6-runtime-entry
  - id: atl-wtl-application-framework
    desc: ATL or WTL application framework
    crit: baseline
    conf: 0.92
    any:
      - id: atl-module-rtti
      - id: wtl-frame-rtti
  - id: mfc-application-framework
    desc: MFC application framework metadata
    crit: baseline
    conf: 0.9
    needs: 2
    any:
      - id: mfc-ccmdtarget
      - id: mfc-cwinapp
      - id: mfc-cdialog
      - id: mfc-afx-window-classes
      - id: mfc-symbols
  - id: localized-resource-heavy-pe
    desc: PE with large localized UI resources
    crit: baseline
    conf: 0.85
    all:
      - id: chinese-ui-label
      - id: english-ui-label
      - id: large-rsrc-section
  - id: mingw-gcj-native-wrapper
    desc: MinGW native wrapper for GCJ
    crit: notable
    conf: 0.94
    all:
      - id: mingw-libgcc-runtime
      - id: gcj-runtime-library
    any:
      - id: mingw-pseudoreloc-runtime
