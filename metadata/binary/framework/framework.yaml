defaults:
  platforms:
  - windows
  for:
  - pe
traits:
- id: vb6-runtime-dll
  desc: VB6 runtime DLL reference
  crit: baseline
  conf: 0.94
  if:
    type: text
    exact: MSVBVM60.DLL
    section: rdata
- id: vb6-runtime-library
  desc: VB6 runtime library marker
  crit: baseline
  conf: 0.92
  if:
    type: symbol
    exact: rtcDoEvents
- id: vb6-project-reference
  desc: VB6 project library reference
  crit: baseline
  conf: 0.92
  if:
    type: text
    section: .rdata
    substr: VB98\\VB6.OLB
- id: vb6-runtime-entry
  desc: VB6 runtime entrypoint marker
  crit: baseline
  conf: 0.9
  if:
    type: symbol
    exact: ThunRTMain
- id: atl-module-rtti
  desc: ATL module RTTI markers
  crit: baseline
  conf: 0.88
  if:
    type: text
    regex: C(AtlModule|ComModule|AtlException)@ATL@@
    section: .data
- id: wtl-frame-rtti
  desc: WTL frame window RTTI markers
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: C(FrameWindowImpl|AppModule|AboutDlg|MainFrame).{0,50}WTL@@
    section: .data
- id: mfc-ccmdtarget
  desc: MFC CCmdTarget class string
  crit: baseline
  conf: 0.85
  if:
    type: text
    exact: CCmdTarget
    section: .rdata
- id: mfc-cwinapp
  desc: MFC CWinApp class string
  crit: baseline
  conf: 0.85
  if:
    type: text
    exact: CWinApp
    section: .rdata
- id: mfc-cdialog
  desc: MFC CDialog class string
  crit: baseline
  conf: 0.85
  if:
    type: text
    exact: CDialog
    section: .rdata
- id: node-api-addon-export
  desc: Node-API native addon export
  crit: baseline
  conf: 0.98
  platforms:
  - macos
  - linux
  - windows
  for:
  - macho
  - elf
  - pe
  if:
    type: symbol
    regex: ^napi_register_module_v[0-9]+$
- id: neon-rust-node-addon
  desc: Rust Neon Node addon
  crit: baseline
  conf: 0.95
  platforms:
  - macos
  - linux
  - windows
  for:
  - macho
  - elf
  - pe
  if:
    type: text
    substr: /neon-
    section: rdata
- id: node-api-symbol-table-symbols
  desc: Node-API symbol table strings (napi_*)
  crit: component
  conf: 0.9
  for:
  - macho
  - elf
  - pe
  platforms:
  - macos
  - linux
  - windows
  count_min: 8
  if:
    type: text
    regex: napi_(create|get|set|call|throw|queue)_
    section: rdata
- id: mfc-afx-window-classes
  desc: MFC Afx window class strings
  crit: baseline
  conf: 0.85
  if:
    type: text
    regex: Afx(ControlBar|MDIFrame|FrameOrView|OleControl)
    section: .rdata
- id: mfc-symbols
  desc: MFC application symbols
  crit: baseline
  conf: 0.95
  if:
    type: symbol
    substr: AfxWinMain
- id: chinese-ui-label
  desc: Chinese UI language label
  crit: baseline
  conf: 0.8
  if:
    type: text
    exact: Chinese
    section: .rsrc
- id: english-ui-label
  desc: English UI language label
  crit: baseline
  conf: 0.8
  if:
    type: text
    exact: English
    section: .rsrc
- id: large-rsrc-section
  desc: Large PE resource section
  crit: baseline
  conf: 0.8
  if:
    type: metrics
    field: pe.rsrc_size
    min: 65536
- id: unity-player-framework
  desc: Unity Windows player loader
  crit: baseline
  conf: 0.95
  if:
    type: text
    exact: UnityPlayer.dll
    section: .rdata
- id: mingw-libgcc-runtime
  desc: MinGW libgcc runtime dependency
  crit: baseline
  conf: 0.93
  if:
    type: text
    exact: libgcc_s_dw2-1.dll
    section: .rdata
- id: gcj-runtime-library
  desc: GCJ runtime library dependency
  crit: baseline
  conf: 0.93
  if:
    type: text
    regex: ^libgcj-\d+\.dll$
    section: .rdata
- id: mingw-pseudoreloc-runtime
  desc: MinGW pseudo relocation message
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: 'Unknown pseudo relocation|VirtualProtect failed with code'
    section: .rdata
- id: windows-appcompat-shim
  desc: Windows application compatibility shim
  crit: baseline
  conf: 0.95
  if:
    type: text
    exact: ShimLib::GetHookAPIs
    section: .text
- id: vb6-runtime-core-helper--vbaexcepthandler
  desc: VB6 runtime helper import (__vbaExceptHandler)
  crit: baseline
  conf: 0.92
  if:
    type: text
    section: .text
    word: __vbaExceptHandler
- id: vb6-runtime-core-helper--proccallengine
  desc: VB6 runtime helper import (ProcCallEngine)
  crit: baseline
  conf: 0.92
  if:
    type: text
    section: .text
    word: ProcCallEngine
- id: vb6-runtime-core-helper--methcallengine
  desc: VB6 runtime helper import (MethCallEngine)
  crit: baseline
  conf: 0.92
  if:
    type: text
    section: .text
    word: MethCallEngine
- id: vb6-runtime-event-helper--event-sink-queryinterface
  desc: VB6 event sink (EVENT_SINK_QueryInterface)
  crit: baseline
  conf: 0.9
  if:
    type: text
    section: rdata
    word: EVENT_SINK_QueryInterface
- id: vb6-runtime-event-helper--event-sink-addref
  desc: VB6 event sink helper (EVENT_SINK_AddRef)
  crit: baseline
  conf: 0.9
  if:
    type: text
    section: rdata
    word: EVENT_SINK_AddRef
- id: vb6-runtime-event-helper--event-sink-release
  desc: VB6 event sink helper (EVENT_SINK_Release)
  crit: baseline
  conf: 0.9
  if:
    type: text
    section: rdata
    word: EVENT_SINK_Release
composite_rules:
- id: vb6-runtime-core-helper
  desc: VB6 runtime helper import
  crit: baseline
  conf: 0.92
  any:
  - id: vb6-runtime-core-helper--vbaexcepthandler
  - id: vb6-runtime-core-helper--proccallengine
  - id: vb6-runtime-core-helper--methcallengine
- id: vb6-runtime-event-helper
  desc: VB6 event sink helper
  crit: baseline
  conf: 0.9
  any:
  - id: vb6-runtime-event-helper--event-sink-queryinterface
  - id: vb6-runtime-event-helper--event-sink-addref
  - id: vb6-runtime-event-helper--event-sink-release
- id: node-api-native-addon
  desc: Node-API native addon
  crit: baseline
  conf: 0.98
  platforms:
  - macos
  - linux
  - windows
  for:
  - macho
  - elf
  - pe
  all:
  - id: node-api-addon-export
  any:
  - id: neon-rust-node-addon
  - id: node-api-symbol-table-symbols
- id: vb6-application-framework
  desc: Visual Basic 6 application framework
  crit: baseline
  conf: 0.95
  needs: 2
  any:
  - id: vb6-runtime-dll
  - id: vb6-runtime-core-helper
  - id: vb6-runtime-event-helper
  - id: vb6-runtime-library
  - id: vb6-project-reference
  - id: vb6-runtime-entry
- id: atl-wtl-application-framework
  desc: ATL or WTL application framework
  crit: baseline
  conf: 0.92
  any:
  - id: atl-module-rtti
  - id: wtl-frame-rtti
- id: mfc-application-framework
  desc: MFC application framework metadata
  crit: baseline
  conf: 0.9
  needs: 2
  any:
  - id: mfc-ccmdtarget
  - id: mfc-cwinapp
  - id: mfc-cdialog
  - id: mfc-afx-window-classes
  - id: mfc-symbols
- id: localized-resource-heavy-pe
  desc: PE with large localized UI resources
  crit: baseline
  conf: 0.85
  all:
  - id: chinese-ui-label
  - id: english-ui-label
  - id: large-rsrc-section
- id: mingw-gcj-native-wrapper
  desc: MinGW native wrapper for GCJ
  crit: baseline
  conf: 0.94
  all:
  - id: mingw-libgcc-runtime
  - id: gcj-runtime-library
  any:
  - id: mingw-pseudoreloc-runtime
