defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  # `for: [binaries]` already restricts this trait to compiled binary formats.
  # The body is a trivially-true metric so the trait fires on every recognized
  # binary.
  - id: is-binary
    desc: File is a compiled binary
    crit: component
    size_min: 1
