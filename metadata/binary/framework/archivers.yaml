defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.92

traits:
  - id: uharc-linker-major
    desc: UHARC linker major version
    if:
      type: kv
      path: pe.linker_major_version
      regex: '^2$'
  - id: uharc-linker-minor
    desc: UHARC linker minor version
    if:
      type: kv
      path: pe.linker_minor_version
      regex: '^18$'
  - id: uharc-chartooem-import
    desc: UHARC CharToOem import
    if:
      type: symbol
      exact: CharToOemA

composite_rules:
  - id: uharc-version-string
    desc: UHARC archiver executable profile
    crit: component
    conf: 0.9
    all:
      - id: uharc-linker-major
      - id: uharc-linker-minor
      - id: uharc-chartooem-import
