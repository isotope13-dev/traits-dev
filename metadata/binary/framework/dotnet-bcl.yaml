defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: dotnet-system-diagnostics-process-resource
    desc: .NET System.Diagnostics.Process framework resource
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: FxResources.System.Diagnostics.Process
      section: rdata
  - id: dotnet-system-diagnostics-process-pdb
    desc: .NET System.Diagnostics.Process native image PDB
    crit: baseline
    conf: 0.98
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])System\.Diagnostics\.Process\.ni\.pdb$'
  - id: dotnet-native-image-pdb
    desc: .NET native image PDB
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)\.ni\.pdb$'

composite_rules:
  - id: dotnet-system-diagnostics-process-bcl
    desc: .NET System.Diagnostics.Process framework library context
    crit: baseline
    conf: 0.99
    any:
      - id: dotnet-system-diagnostics-process-resource
      - id: dotnet-system-diagnostics-process-pdb
      - id: dotnet-native-image-pdb
