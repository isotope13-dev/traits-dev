defaults:
  platforms: [macos]
  for: [macho, dylib]
traits:
- id: macos-app-framework-binary
  desc: "Mach-O binary inside an app Frameworks dir"
  crit: baseline
  conf: 0.9
  if:
    type: path
    regex: (?i)Contents/Frameworks/
- id: swift-runtime-dylib
  desc: Swift runtime support dylib
  crit: baseline
  conf: 0.95
  if:
    type: path
    regex: '(^|[\\/])libswift[A-Za-z0-9_]+\.dylib$'
- id: darwin-xcframework-path
  desc: Darwin XCFramework path component
  crit: baseline
  conf: 0.9
  if:
    type: path
    regex: '(?i)\.xcframework[\\/]'
- id: darwin-framework-path
  desc: Darwin framework path component
  crit: baseline
  conf: 0.9
  if:
    type: path
    regex: '(?i)\.framework[\\/]'
- id: terminal-emulator-name
  desc: Terminal emulator application name
  crit: baseline
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)(^wezterm(-[a-z0-9-]+)?$|WezTerm\.app)'
- id: terminal-emulator-portable-pty
  desc: Rust portable_pty terminal emulator marker
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: portable_pty
    section: rdata
- id: electron-linked-runtime
  desc: Electron app runtime linkage
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: Electron Framework.framework
    section: .text
- id: macos-updater-helper-framework
  desc: macOS app updater framework marker
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: '(Sparkle\.framework|Squirrel\.framework)'
    section: rdata
- id: macos-updater-helper-name--autoupdate
  desc: macOS app updater helper name (Autoupdate)
  crit: baseline
  conf: 0.9
  if:
    type: path
    basename: true
    exact: Autoupdate
- id: macos-updater-helper-name--fileop
  desc: macOS app updater helper name (fileop)
  crit: baseline
  conf: 0.9
  if:
    type: path
    basename: true
    exact: fileop
- id: macos-updater-helper-name--shipit
  desc: macOS app updater helper name (ShipIt)
  crit: baseline
  conf: 0.9
  if:
    type: path
    basename: true
    exact: ShipIt
- id: macos-updater-helper-name--sparkle
  desc: macOS app updater helper name (Sparkle)
  crit: baseline
  conf: 0.9
  if:
    type: path
    basename: true
    exact: Sparkle
composite_rules:
- id: macos-updater-helper-name
  desc: macOS app updater helper name
  crit: baseline
  conf: 0.9
  any:
  - id: macos-updater-helper-name--autoupdate
  - id: macos-updater-helper-name--fileop
  - id: macos-updater-helper-name--shipit
  - id: macos-updater-helper-name--sparkle
- id: macos-framework-or-runtime
  desc: macOS app framework or Swift runtime binary
  crit: baseline
  conf: 0.95
  any:
  - id: macos-app-framework-binary
  - id: darwin-framework-binary
  - id: swift-runtime-dylib
  - id: electron-linked-runtime
  - id: macos-updater-helper
- id: darwin-framework-binary
  desc: Darwin framework bundle binary
  crit: baseline
  conf: 0.95
  all:
  - id: darwin-framework-path
  any:
  - id: darwin-xcframework-path
  - id: macos-app-framework-binary
- id: macos-updater-helper
  desc: macOS app updater helper binary
  crit: baseline
  conf: 0.95
  any:
  - id: macos-updater-helper-name
  - id: macos-updater-helper-framework
- id: terminal-emulator
  desc: Terminal emulator binary context
  crit: baseline
  conf: 0.95
  any:
  - id: terminal-emulator-name
  - id: terminal-emulator-portable-pty
