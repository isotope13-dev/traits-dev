defaults:
  platforms: [unix, windows]
  for: [binaries]

traits:
  - id: electron-desktop-runtime
    for: [text]
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      type: string_literal
      exact: __cleave_missing_electron_desktop_runtime__
  - id: electron-framework-binary
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: metadata/lang/encoded/unicode-escape::metadata/binary/framework::electron-framework-binary
