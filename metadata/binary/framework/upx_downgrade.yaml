defaults:
  platforms: [windows, unix]
  for: [pe, elf]

traits:
  - id: upx-tool-basename
    desc: UPX tool executable basename
    crit: baseline
    if:
      type: path
      regex: '(?i)(^|/)upx(\.exe)?$'

  - id: upx-tool-marker
    desc: UPX tool version marker
    crit: baseline
    if:
      type: encoded
      encoding: wide
      substr: UPX executable packer
      section: rdata

  - id: upx-tool-396-magic
    desc: UPX 3.96 utility version marker
    crit: baseline
    if:
      type: hex
      offset: 496
      pattern: "33 2E 39 36 00 55 50 58 21"
  - id: malformed-elf-downgrade
    for: [text, elf]
    desc: Downgrade malformed ELF findings in UPX tool
    crit: baseline
    if:
      type: string_literal
      exact: __cleave_missing_elf_header__
    downgrade:
      any:
        - id: upx-tool-marker
        - id: well-known/app/bitwarden::libffmpeg-basename
  - id: upx-packer-downgrade
    for: [text, elf]
    desc: Downgrade standalone UPX packer finding
    crit: baseline
    if:
      type: string_literal
      exact: __cleave_missing_upx__
    downgrade:
      any:
        - id: upx-tool-marker
        - id: metadata/binary/section/names/
        - id: well-known/app/nnn::nnn-icons-static-basename

composite_rules:
  - id: upx-tool-identity
    desc: UPX executable packer utility
    crit: notable
    conf: 0.95
    all:
      - id: metadata/binary/section/names::upx-section
    any:
      - id: upx-tool-basename
      - id: upx-tool-marker
      - id: upx-tool-396-magic
