defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: upx-tool-marker
    desc: UPX tool version marker
    crit: baseline
    if:
      type: encoded
      encoding: wide
      substr: UPX executable packer
      section: rdata
  - id: malformed-elf-downgrade
    for: [text]
    desc: Downgrade malformed ELF findings in UPX tool
    crit: baseline
    if:
      type: string_literal
      exact: __cleave_missing_elf_header__
    downgrade:
      any:
        - id: upx-tool-marker
  - id: upx-packer-downgrade
    for: [text]
    desc: Downgrade standalone UPX packer finding
    crit: baseline
    if:
      type: string_literal
      exact: __cleave_missing_upx__
    downgrade:
      any:
        - id: upx-tool-marker
        - id: metadata/binary/section/names::upx-section-pair
