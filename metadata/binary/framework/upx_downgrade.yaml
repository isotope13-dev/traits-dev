defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: upx-tool-marker
    desc: UPX tool version marker
    crit: baseline
    if:
      type: encoded
      encoding: wide
      substr: UPX executable packer
      section: rdata
  - id: malformed-elf-downgrade
    desc: Downgrade malformed ELF findings in UPX tool
    crit: baseline
    if:
      id: anti-analysis/malformed/elf-header
    downgrade:
      any:
        - id: upx-tool-marker
  - id: upx-packer-downgrade
    desc: Downgrade standalone UPX packer finding
    crit: baseline
    if:
      id: anti-static/packer/upx
    downgrade:
      any:
        - id: upx-tool-marker
        - id: metadata/binary/section/names::upx-section-pair
