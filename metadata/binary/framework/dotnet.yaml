defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: mscoree-name
    desc: mscoree.dll string reference
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      exact: mscoree.dll
      section: .text
  - id: dotnet-runtime
    desc: .NET Runtime Reference
    crit: baseline
    conf: 1.0
    if:
      type: symbol
      regex: _Cor(Exe|Dll)Main
  - id: dotnet-metadata
    desc: .NET Metadata Root (BSJB)
    crit: baseline
    conf: 1.0
    if:
      type: raw
      substr: BSJB
      section: .text
  - id: bsjb-marker
    desc: .NET BSJB metadata marker
    crit: component
    if:
      id: dotnet-metadata
composite_rules:
  - id: dotnet-assembly
    desc: .NET assembly indicators
    crit: baseline
    conf: 1.0
    needs: 2
    any:
      - id: mscoree-name
      - id: dotnet-runtime
      - id: dotnet-metadata
