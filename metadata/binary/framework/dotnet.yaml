defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: mscoree-name
    desc: mscoree name reference
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: mscoree.dll
      section: .text
  - id: dotnet-runtime
    desc: .NET Runtime Reference
    crit: baseline
    conf: 1.0
    if:
      type: symbol
      regex: _Cor(Exe|Dll)Main
  - id: dotnet-metadata
    desc: .NET Metadata Root (BSJB)
    crit: baseline
    conf: 1.0
    if:
      type: raw
      substr: BSJB
      section: .text
  - id: dotnet-metadata-fallback
    desc: .NET metadata detected via framework strings
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: 'mscorlib[,\s]|System\\.(Resources|Drawing|Windows\\.Forms|IO|Net|Security|Collections)\\b'
  - id: bsjb-marker
    desc: .NET BSJB metadata marker
    crit: component
    if:
      id: dotnet-metadata
  - id: dotnet-singlefilehost-pdb
    desc: .NET singlefilehost PDB path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: singlefilehost.pdb
  - id: dotnet-coreclr-runtime-path
    desc: .NET CoreCLR source path
    crit: component
    conf: 0.96
    if:
      type: text
      substr: \src\coreclr\

  - id: managed-boilerplate-attributes
    desc: Standard .NET runtime boilerplate attributes
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: CompilationRelaxationsAttribute
  - id: runtime-compatibility-attribute
    desc: .NET RuntimeCompatibility attribute
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: RuntimeCompatibilityAttribute

  - id: constructor-execution
    desc: Logic executed within .NET constructor
    crit: notable
    conf: 0.8
    if:
      type: symbol
      substr: .ctor
composite_rules:
  - id: dotnet-assembly
    desc: .NET Assembly (mscoree.dll)
    crit: baseline
    conf: 1.0
    needs: 2
    any:
      - id: mscoree-name
      - id: dotnet-runtime
      - id: dotnet-metadata
  - id: dotnet-singlefilehost-runtime
    desc: .NET singlefilehost runtime bundle
    crit: baseline
    conf: 0.98
    all:
      - id: dotnet-singlefilehost-pdb
      - id: dotnet-coreclr-runtime-path
  - id: managed-boilerplate
    desc: Standard .NET runtime boilerplate
    crit: baseline
    conf: 0.9
    any:
      - id: managed-boilerplate-attributes
      - id: runtime-compatibility-attribute
