defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: mscoree-name
    desc: mscoree name reference
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: mscoree.dll
      section: .text
  - id: dotnet-runtime
    desc: .NET Runtime Reference
    crit: baseline
    conf: 1.0
    if:
      type: symbol
      regex: _Cor(Exe|Dll)Main
  - id: dotnet-metadata
    desc: .NET Metadata Root (BSJB)
    crit: baseline
    conf: 1.0
    if:
      type: raw
      substr: BSJB
      section: .text
  - id: bsjb-marker
    desc: .NET BSJB metadata marker
    crit: component
    if:
      id: dotnet-metadata
  - id: dotnet-singlefilehost-pdb
    desc: .NET singlefilehost PDB path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: singlefilehost.pdb
  - id: dotnet-coreclr-runtime-path
    desc: .NET CoreCLR source path
    crit: component
    conf: 0.96
    if:
      type: text
      substr: \src\coreclr\
composite_rules:
  - id: dotnet-assembly
    desc: .NET Assembly (mscoree.dll)
    crit: baseline
    conf: 1.0
    needs: 2
    any:
      - id: mscoree-name
      - id: dotnet-runtime
      - id: dotnet-metadata
  - id: dotnet-singlefilehost-runtime
    desc: .NET singlefilehost runtime bundle
    crit: baseline
    conf: 0.98
    all:
      - id: dotnet-singlefilehost-pdb
      - id: dotnet-coreclr-runtime-path
