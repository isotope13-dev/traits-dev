defaults:
  platforms:
  - windows
  for:
  - pe
traits:
- id: mscoree-name
  desc: References the .NET mscoree loader name
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: mscoree.dll
    section: rdata
- id: dotnet-runtime
  desc: .NET Runtime Reference
  crit: baseline
  conf: 1.0
  if:
    type: symbol
    regex: _Cor(Exe|Dll)Main
- id: dotnet-metadata
  desc: .NET metadata root signature (BSJB)
  crit: baseline
  conf: 1.0
  if:
    type: raw
    substr: BSJB
    section: .text
# The CLR runtime header (COM descriptor data directory) is the authoritative
# .NET marker and is immune to section-merging packers that strip .rdata and
# the import/symbol table. mscoree-name (section: rdata) and dotnet-runtime
# (_CorExeMain symbol) both fail on single-section packed assemblies; this one
# holds because filefacts parses the CLR header regardless of section layout.
- id: clr-runtime-header
  desc: PE CLR header (COM descriptor)
  crit: baseline
  conf: 1.0
  if:
    type: value
    path: pe.clr.runtime_version
    exists: true
- id: dotnet-comhost-version-info
  desc: .NET COM host version identity
  crit: baseline
  conf: 0.99
  if:
    type: value
    path: pe.version.description
    exact: .NET COM Host
- id: dotnet-comhost-company
  desc: Microsoft Corporation PE vendor identity
  crit: baseline
  conf: 0.99
  if:
    type: value
    path: pe.version.company
    exact: Microsoft Corporation
- id: dotnet-comhost-product
  desc: .NET PE product identity
  crit: baseline
  conf: 0.99
  if:
    type: value
    path: pe.version.product_name
    exact: .NET
- id: dotnet-metadata-fallback--rx-1
  desc: References the mscorlib assembly name
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'mscorlib[,\s]'
    section: rdata
  count_max: 1002567
- id: dotnet-metadata-fallback--rx-2
  desc: References System.Resources or System.Drawing
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Resources|Drawing)\\b'
    section: rdata
  count_max: 1002568
- id: dotnet-metadata-fallback--rx-3
  desc: References System.Windows.Forms or System.IO
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Windows\\.Forms|IO)\\b'
    section: rdata
  count_max: 1002569
- id: dotnet-metadata-fallback--rx-4
  desc: References System.Net or System.Security
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Net|Security)\\b'
    section: rdata
  count_max: 1002570
- id: dotnet-metadata-fallback--rx-5
  desc: References the System.Collections namespace
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Collections)\\b'
    section: rdata
  count_max: 1002571
- id: bsjb-marker
  desc: .NET BSJB metadata marker
  crit: component
  if:
    id: dotnet-metadata
- id: dotnet-singlefilehost-pdb
  desc: .NET singlefilehost PDB path
  crit: component
  conf: 0.98
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '(?i)(^|[\\/])singlefilehost\.pdb$'
- id: dotnet-coreclr-runtime-path
  desc: .NET CoreCLR source path
  crit: component
  conf: 0.96
  if:
    type: text
    substr: \src\coreclr\
    section: rdata
- id: dotnet-ilasm-coreclr-binary
  desc: .NET CoreCLR ILASM binary
  crit: baseline
  conf: 0.98
  platforms: [unix, windows]
  for: [elf, macho, pe]
  if:
    type: text
    regex: 'src[/\\]runtime[/\\]src[/\\]coreclr[/\\]ilasm[/\\]main\.cpp|\.NET IL Assembler version'
    section: .rodata

- id: managed-boilerplate-attributes
  desc: Standard .NET runtime boilerplate attributes
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: CompilationRelaxationsAttribute
    section: rdata
- id: runtime-compatibility-attribute
  desc: .NET RuntimeCompatibility attribute
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: RuntimeCompatibilityAttribute
    section: rdata

- id: constructor-execution
  desc: Logic executed within .NET constructor
  crit: notable
  conf: 0.8
  if:
    type: symbol
    substr: .ctor
composite_rules:
- id: dotnet-comhost-runtime
  desc: Microsoft .NET COM host runtime
  crit: baseline
  conf: 0.99
  all:
  - id: dotnet-comhost-version-info
  - id: dotnet-comhost-company
  - id: dotnet-comhost-product
- id: dotnet-assembly
  desc: .NET managed assembly
  crit: baseline
  conf: 1.0
  needs: 2
  any:
  - id: mscoree-name
  - id: dotnet-runtime
  - id: dotnet-metadata
  - id: clr-runtime-header
  - id: dotnet-metadata-fallback
  - id: metadata/binary/metrics/threshold::dotnet-binary
- id: dotnet-singlefilehost-runtime
  desc: .NET singlefilehost runtime bundle
  crit: baseline
  conf: 0.98
  all:
  - id: dotnet-singlefilehost-pdb
  - id: dotnet-coreclr-runtime-path
- id: managed-boilerplate
  desc: Standard .NET runtime boilerplate
  crit: baseline
  conf: 0.9
  any:
  - id: managed-boilerplate-attributes
  - id: runtime-compatibility-attribute
- id: dotnet-metadata-fallback
  desc: .NET metadata detected via framework strings
  crit: baseline
  conf: 0.95
  any:
  - id: dotnet-metadata-fallback--rx-1
  - id: dotnet-metadata-fallback--rx-2
  - id: dotnet-metadata-fallback--rx-3
  - id: dotnet-metadata-fallback--rx-4
  - id: dotnet-metadata-fallback--rx-5
