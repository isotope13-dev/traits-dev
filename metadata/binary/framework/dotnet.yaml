defaults:
  platforms:
  - windows
  for:
  - pe
traits:
- id: mscoree-name
  desc: mscoree name reference
  crit: baseline
  conf: 0.95
  if:
    type: text
    exact: mscoree.dll
    section: .text
- id: dotnet-runtime
  desc: .NET Runtime Reference
  crit: baseline
  conf: 1.0
  if:
    type: symbol
    regex: _Cor(Exe|Dll)Main
- id: dotnet-metadata
  desc: .NET Metadata Root (BSJB)
  crit: baseline
  conf: 1.0
  if:
    type: raw
    substr: BSJB
    section: .text
- id: dotnet-metadata-fallback--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'mscorlib[,\s]'
    section: rdata
  count_max: 1002567
- id: dotnet-metadata-fallback--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Resources|Drawing)\\b'
    section: rdata
  count_max: 1002568
- id: dotnet-metadata-fallback--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Windows\\.Forms|IO)\\b'
    section: rdata
  count_max: 1002569
- id: dotnet-metadata-fallback--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Net|Security)\\b'
    section: rdata
  count_max: 1002570
- id: dotnet-metadata-fallback--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'System\\.(Collections)\\b'
    section: rdata
  count_max: 1002571
- id: bsjb-marker
  desc: .NET BSJB metadata marker
  crit: component
  if:
    id: dotnet-metadata
- id: dotnet-singlefilehost-pdb
  desc: .NET singlefilehost PDB path
  crit: component
  conf: 0.98
  if:
    type: kv
    path: debug.pdb_path
    regex: '(?i)(^|[\\/])singlefilehost\.pdb$'
- id: dotnet-coreclr-runtime-path
  desc: .NET CoreCLR source path
  crit: component
  conf: 0.96
  if:
    type: text
    substr: \src\coreclr\
    section: rdata

- id: managed-boilerplate-attributes
  desc: Standard .NET runtime boilerplate attributes
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: CompilationRelaxationsAttribute
    section: rdata
- id: runtime-compatibility-attribute
  desc: .NET RuntimeCompatibility attribute
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: RuntimeCompatibilityAttribute
    section: rdata

- id: constructor-execution
  desc: Logic executed within .NET constructor
  crit: notable
  conf: 0.8
  if:
    type: symbol
    substr: .ctor
composite_rules:
- id: dotnet-assembly
  desc: .NET Assembly (mscoree.dll)
  crit: baseline
  conf: 1.0
  needs: 2
  any:
  - id: mscoree-name
  - id: dotnet-runtime
  - id: dotnet-metadata
  - id: dotnet-metadata-fallback
- id: dotnet-singlefilehost-runtime
  desc: .NET singlefilehost runtime bundle
  crit: baseline
  conf: 0.98
  all:
  - id: dotnet-singlefilehost-pdb
  - id: dotnet-coreclr-runtime-path
- id: managed-boilerplate
  desc: Standard .NET runtime boilerplate
  crit: baseline
  conf: 0.9
  any:
  - id: managed-boilerplate-attributes
  - id: runtime-compatibility-attribute
- id: dotnet-metadata-fallback
  desc: .NET metadata detected via framework strings
  crit: baseline
  conf: 0.95
  any:
  - id: dotnet-metadata-fallback--rx-1
  - id: dotnet-metadata-fallback--rx-2
  - id: dotnet-metadata-fallback--rx-3
  - id: dotnet-metadata-fallback--rx-4
  - id: dotnet-metadata-fallback--rx-5
