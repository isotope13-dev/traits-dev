defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: mui-string
    desc: MUI resource file identifier
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\.mui\b
      section: .rsrc
  - id: resources-dll-extension
    desc: .resources.dll satellite assembly
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: (?i)\.resources\.dll$
  - id: rich-header-present
    desc: PE Rich header present (MSVC toolchain)
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: pe.has_rich_header
      min: 1
  - id: low-code-entropy
    desc: Very low code entropy, minimal code
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: binary.code_entropy
      max: 2.0
  - id: kernel-driver-init
    desc: Kernel driver ntoskrnl in INIT
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    if:
      type: text
      exact: ntoskrnl.exe
      section: INIT
  - id: kernel-driver-idata
    desc: Kernel driver ntoskrnl import
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    if:
      type: text
      exact: ntoskrnl.exe
      section: .idata
  - id: icon-font-brands-resource-context
    desc: Embedded icon font brands class/resource table
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    count_min: 10
    if:
      type: text
      regex: 'fi-brands-[a-z0-9-]{2,40}'
      section: .text
  - id: icon-font-rr-resource-context
    desc: Embedded icon font regular class/resource table
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    count_min: 10
    if:
      type: text
      regex: 'fi-rr-[a-z0-9-]{2,40}'
      section: .text
  - id: icon-font-sr-resource-context
    desc: Embedded icon font solid-rounded class/resource table
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    count_min: 10
    if:
      type: text
      regex: 'fi-sr-[a-z0-9-]{2,40}'
      section: .text
  - id: icon-font-tr-resource-context
    desc: Embedded icon font thin-rounded class/resource table
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    count_min: 10
    if:
      type: text
      regex: 'fi-tr-[a-z0-9-]{2,40}'
      section: .text
  - id: icon-font-ss-resource-context
    desc: Embedded icon font sharp-solid class/resource table
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    count_min: 10
    if:
      type: text
      regex: 'fi-ss-[a-z0-9-]{2,40}'
      section: .text
composite_rules:
  - id: icon-font-resource-context
    desc: Embedded icon font class/resource table
    crit: baseline
    conf: 0.95
    any:
      - id: icon-font-brands-resource-context
      - id: icon-font-rr-resource-context
      - id: icon-font-sr-resource-context
      - id: icon-font-tr-resource-context
      - id: icon-font-ss-resource-context
  - id: low-code-no-import-resource-stub
    desc: Low-code PE with no imports
    crit: component
    conf: 0.86
    all:
      - id: low-code-entropy
      - id: metadata/binary/metrics/structural::no-imports
  - id: managed-resource-stub
    desc: .NET .resources.dll bootstrap stub
    crit: component
    conf: 0.95
    all:
      - id: resources-dll-extension
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols/imports::managed-resource-bootstrap-import
  - id: microsoft-managed-resource-stub
    desc: Microsoft .NET .resources.dll bootstrap stub
    crit: component
    conf: 0.98
    all:
      - id: managed-resource-stub
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/package/versioning::pe-version-resource
  - id: resource-only-dll
    desc: PE file consisting primarily of resources (e.g., .mui, UI localization)
    crit: baseline
    conf: 0.9
    for:
      - pe
      - dll
    all:
      - id: metadata/binary/metrics/structural::no-functions
    any:
      - id: managed-resource-stub
      - id: mui-string
      - id: low-code-no-import-resource-stub
      - id: resources-dll-extension
    unless:
      - id: objectives/anti-static/pack/section-anomaly::tiny-executable-obfuscation-section
      - id: objectives/evasion/process/injection/shellcode::call-rax
