defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: mui-string
    desc: MUI resource file identifier
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\.mui\b
      section: .rsrc
  - id: resources-dll-extension
    desc: .resources.dll satellite assembly
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: (?i)\.resources\.dll$
  - id: rich-header-present
    desc: PE Rich header present (MSVC toolchain)
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: pe.rich_header_present
      min: 1
  - id: low-code-entropy
    desc: Very low code entropy, minimal code
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.02
  - id: kernel-driver-init
    desc: Kernel driver ntoskrnl in INIT
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    if:
      type: text
      exact: ntoskrnl.exe
      section: INIT
  - id: kernel-driver-idata
    desc: Kernel driver ntoskrnl import
    crit: baseline
    conf: 0.95
    for:
      - pe
      - dll
    if:
      type: text
      exact: ntoskrnl.exe
      section: idata
composite_rules:
  - id: managed-resource-stub
    desc: .NET .resources.dll bootstrap stub
    crit: component
    conf: 0.95
    all:
      - id: resources-dll-extension
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols::managed-resource-bootstrap-import
  - id: microsoft-managed-resource-stub
    desc: Microsoft .NET .resources.dll bootstrap stub
    crit: component
    conf: 0.98
    all:
      - id: managed-resource-stub
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/package/versioning::pe-version-resource
  - id: resource-only-dll
    desc: PE file consisting primarily of resources (e.g., .mui, UI localization)
    crit: baseline
    conf: 0.9
    for:
      - dll
    all:
      - id: metadata/binary/metrics::no-functions
    any:
      - id: managed-resource-stub
      - id: mui-string
      - id: metadata/binary/metrics::no-imports
      - id: metadata/binary/metrics::dominant-section
      - id: resources-dll-extension
      - id: low-code-entropy
    unless:
      - id: objectives/anti-static/pack::tiny-executable-obfuscation-section
      - id: objectives/evasion/process/injection::call-rax
