# PE Resource Section Traits
# Resource section (.rsrc) characteristics that indicate binary identity
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: minimal-resources
    desc: Tiny resource section (no version/icon)
    crit: baseline
    conf: 0.8
    size_min: 10000
    if:
      type: section
      exact: ".rsrc"
      length_max: 1024
    unless:
      - id: metadata/package/versioning::pe-version-resource
  - id: no-resources
    desc: Binary lacks resource section entirely
    crit: baseline
    conf: 0.8
    size_min: 10000
    if:
      type: section_ratio
      section: ".rsrc"
      max: 0.001
  - id: oversized-rsrc
    desc: Oversized PE resource section
    crit: notable
    conf: 0.82
    if:
      type: section
      exact: ".rsrc"
      length_min: 262144
  - id: oversized-low-entropy-rsrc
    desc: Oversized low-entropy PE resources
    crit: notable
    conf: 0.9
    if:
      type: section
      exact: ".rsrc"
      length_min: 262144
      entropy_max: 2.2
  - id: large-anonymous-pe-section
    desc: Large anonymous PE section
    crit: notable
    conf: 0.88
    size_min: 65536
    if:
      type: section
      regex: ^$
      length_min: 65536
  - id: anonymous-pe-section-high-entropy
    desc: Anonymous PE section high entropy
    crit: suspicious
    conf: 0.92
    size_min: 65536
    if:
      type: section
      regex: ^$
      length_min: 65536
      entropy_min: 7.2
  - id: xmp-resource-namespace
    desc: Adobe XMP metadata namespace in resources
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      exact: http://ns.adobe.com/xap/1.0/
      section: .rsrc
  - id: rdf-resource-namespace
    desc: RDF metadata namespace in resources
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      exact: http://www.w3.org/1999/02/22-rdf-syntax-ns#
      section: .rsrc
  - id: png-resource-marker
    desc: PNG image data in PE resources
    crit: baseline
    conf: 0.84
    if:
      type: string_value
      exact: IHDR
      section: .rsrc
  - id: asinvoker-resource-manifest
    desc: asInvoker execution manifest in resources
    crit: baseline
    conf: 0.84
    if:
      type: string_value
      exact: <requestedExecutionLevel level='asInvoker' uiAccess='false' />
      section: .rsrc
composite_rules:
  - id: oversized-rich-media-rsrc
    desc: Oversized PE resources with embedded media metadata
    crit: notable
    conf: 0.9
    all:
      - id: oversized-rsrc
    any:
      - id: xmp-resource-namespace
      - id: rdf-resource-namespace
      - id: metadata/package/versioning::pe-version-resource
    needs: 2
  - id: signed-overlay-resource-heavy-pe
    desc: Signed PE with overlay and heavy resources
    crit: notable
    conf: 0.92
    all:
      - id: oversized-rsrc
    any:
      - id: metadata/binary/layout::has-overlay
      - id: metadata/binary/layout::overlay-size-metrics
      - id: oversized-rich-media-rsrc
      - id: metadata/signed/developer::comodo-rsa-code-signing-ca
      - id: metadata/signed/developer::rita
      - id: metadata/package/versioning::version-resource-metadata
    needs: 4
  - id: versioned-anonymous-resource-carrier
    desc: Versioned PE with anonymous payload
    crit: suspicious
    conf: 0.95
    all:
      - id: large-anonymous-pe-section
      - id: metadata/package/versioning::pe-version-resource
    any:
      - id: anonymous-pe-section-high-entropy
      - id: metadata/binary/layout::legacy-few-sections
      - id: metadata/hardening/binary::binary-format-checked
    needs: 2
  - id: png-and-manifest-rsrc
    desc: PNG and manifest in resources
    crit: baseline
    conf: 0.86
    all:
      - id: png-resource-marker
      - id: asinvoker-resource-manifest
