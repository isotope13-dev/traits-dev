# PE Resource Section Traits
# Resource section (.rsrc) characteristics that indicate binary identity
defaults:
  for: [pe]
  platforms: [windows]
traits:
- id: pe-single-version-resource
  desc: PE contains exactly one resource entry
  crit: baseline
  conf: 1.0
  size_min: 2048
  size_max: 5242880
  if:
    type: metrics
    field: pe.resource_count
    min: 1
    max: 1
- id: pe-few-resource-entries
  desc: PE contains five or fewer resource entries
  crit: baseline
  conf: 0.8
  for: [pe, dll]
  if:
    type: metrics
    field: pe.resource_count
    max: 5
- id: pe-few-icon-resources
  desc: PE contains five or fewer icon resources
  crit: baseline
  conf: 0.85
  for: [pe, dll]
  if:
    type: metrics
    field: pe.icon_count
    max: 5
  unless:
  - id: metadata/binary/resource::no-resources
- id: short-titlecase-resource-words
  desc: Several short title-cased resource strings
  crit: component
  conf: 0.8
  count_min: 3
  if:
    type: text
    regex: \b[A-Z][a-z]{3,9}\b
    section: .rsrc
- id: mun-resource-bundle
  desc: Windows MUN resource bundle
  crit: baseline
  conf: 0.99
  if:
    type: path
    basename: true
    regex: \.mun$
- id: minimal-resources
  desc: Tiny resource section (no version/icon)
  crit: baseline
  conf: 0.8
  size_min: 10000
  if:
    type: section
    exact: ".rsrc"
    length_max: 1024
  unless:
  - id: metadata/package/versioning::pe-version-resource
- id: no-resources
  desc: Binary lacks resource section entirely
  crit: baseline
  conf: 0.8
  size_min: 10000
  if:
    type: metrics
    field: binary.rsrc_to_file_ratio
    max: 0.001
  unless:
  - type: section
    exact: ".rsrc"
  - type: metrics
    field: pe.resource_count
    min: 1
  - id: metadata/binary/framework::large-rsrc-section
- id: small-pe-no-resources
  desc: Small PE lacks resource section
  crit: notable
  conf: 0.82
  size_max: 32768
  if:
    type: metrics
    field: binary.rsrc_to_file_ratio
    max: 0.001
  unless:
  - type: section
    exact: ".rsrc"
  - type: metrics
    field: pe.resource_count
    min: 1
  - id: metadata/package/versioning::pe-version-resource
- id: oversized-rsrc
  desc: Oversized PE resource section
  crit: notable
  conf: 0.82
  if:
    type: section
    exact: ".rsrc"
    length_min: 524288
  unless:
  - id: mun-resource-bundle
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
- id: resource-heavy-rsrc
  desc: Resource-heavy PE with large .rsrc
  crit: notable
  conf: 0.84
  if:
    type: section
    exact: ".rsrc"
    length_min: 393216
  unless:
  - id: mun-resource-bundle
  - id: metadata/binary/framework/
- id: giant-rsrc
  desc: Giant PE resource section
  crit: notable
  conf: 0.9
  if:
    type: section
    exact: ".rsrc"
    length_min: 16777216
  unless:
  - id: metadata/binary/resource/
- id: oversized-low-entropy-rsrc
  desc: Oversized low-entropy PE resources
  crit: notable
  conf: 0.9
  if:
    type: section
    exact: ".rsrc"
    length_min: 262144
    entropy_max: 2.2
  unless:
  - id: mun-resource-bundle
  - id: metadata/binary/vendor::bitdefender-product-marker
- id: resource-heavy-low-entropy-rsrc
  desc: Large low-entropy PE resources
  crit: baseline
  conf: 0.88
  if:
    type: section
    exact: ".rsrc"
    length_min: 98304
    entropy_max: 5.0
  unless:
  - id: mun-resource-bundle
  - id: metadata/binary/installer/script/
- id: large-null-rsrc
  desc: Large null-filled PE resources
  crit: notable
  conf: 0.92
  if:
    type: section
    exact: ".rsrc"
    length_min: 32768
    entropy_max: 0.05
  unless:
  - id: metadata/binary/resource/
  - id: metadata/binary/vendor::bitdefender-product-marker
- id: executable-rsrc-section
  desc: Executable PE resource section
  crit: suspicious
  conf: 0.92
  size_min: 65536
  if:
    type: section
    exact: ".rsrc"
    executable: true
    length_min: 4096
  unless:
  - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
  - id: metadata/lang/compiled::autoit-compiled-script
  - id: objectives/anti-static/pack/detect::enigma-protector
  - id: well-known/lib/divx/
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/script/
    - id: well-known/app/protected-benign-pe/
- id: duplicate-rwx-rsrc-sections
  desc: Duplicate RWX PE resource sections
  crit: suspicious
  conf: 0.94
  size_min: 65536
  count_min: 2
  if:
    type: section
    exact: ".rsrc"
    writable: true
    executable: true
    length_min: 4096
  unless:
  - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/script/
- id: large-anonymous-pe-section
  desc: Large anonymous PE section
  crit: suspicious
  conf: 0.88
  size_min: 65536
  if:
    type: section
    regex: ^$
    length_min: 65536
  unless:
  - id: objectives/anti-static/pack/detect::enigma-protector
  - id: objectives/anti-static/pack/asprotect/
  - id: objectives/anti-static/pack/uharc/
  - id: well-known/app/msi-center::msi-center-terminalserver-memory-image
  downgrade:
    any:
    - id: metadata/binary/section/names::pdi-section
    - id: well-known/app/protected-benign-pe/
- id: anonymous-pe-section-high-entropy
  desc: Anonymous PE section high entropy
  crit: suspicious
  conf: 0.92
  size_min: 65536
  if:
    type: section
    regex: ^$
    length_min: 65536
    entropy_min: 7.2
  unless:
  - type: text
    substr: Enigma Protector
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: objectives/anti-static/pack/uharc/
  downgrade:
    any:
    - id: metadata/binary/layout::legacy-watcom-packed-utility
    - id: metadata/binary/section/names::pdi-section
    - id: well-known/app/protected-benign-pe/
- id: xmp-resource-namespace
  desc: Adobe XMP metadata namespace in resources
  crit: baseline
  conf: 0.82
  if:
    type: text
    exact: http://ns.adobe.com/xap/1.0/
    section: .rsrc
- id: xmpmeta-adobe-resource
  desc: Adobe XMP wrapper tag in resources
  crit: baseline
  conf: 0.86
  if:
    type: text
    substr: <x:xmpmeta xmlns:x="adobe:ns:meta/"
    section: .rsrc
- id: rdf-resource-namespace
  desc: RDF metadata namespace in resources
  crit: baseline
  conf: 0.82
  if:
    type: text
    exact: http://www.w3.org/1999/02/22-rdf-syntax-ns#
    section: .rsrc
- id: png-resource-marker
  desc: PNG image data in PE resources
  crit: baseline
  conf: 0.84
  if:
    type: text
    exact: IHDR
    section: .rsrc
- id: png-magic-in-text
  desc: PNG image magic in text section
  crit: component
  conf: 0.9
  if:
    type: hex
    section: .text
    pattern: 89 50 4E 47 0D 0A 1A 0A
- id: libpng-ihdr-diagnostics
  desc: libpng IHDR diagnostics
  crit: component
  conf: 0.9
  if:
    type: text
    substr: png:IHDR.
    section: rdata
- id: multiple-png-images-in-text
  desc: Multiple PNG images in text
  crit: notable
  conf: 0.96
  count_min: 3
  if:
    type: hex
    section: .text
    pattern: 89 50 4E 47 0D 0A 1A 0A
  unless:
  - id: libpng-ihdr-diagnostics
  - id: metadata/binary/framework/
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/developer::hendrik-leppkes
- id: multiple-png-end-markers-in-text
  desc: Multiple PNG end markers in text
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: hex
    section: .text
    pattern: 49 45 4E 44 AE 42 60 82
- id: electronasar-resource-marker
  desc: ELECTRONASAR resource marker
  crit: baseline
  conf: 0.9
  if:
    type: encoded
    exact: ELECTRONASAR
    encoding: wide
    section: .rsrc
- id: app-asar-sha256-manifest
  desc: Embedded app.asar SHA256 manifest
  crit: baseline
  conf: 0.92
  if:
    type: text
    regex: '\[\{"file":"resources\\\\app\.asar","alg":"SHA256","value":"[0-9a-f]{64}"\}\]PA'
    section: .rsrc
- id: asinvoker-resource-manifest
  desc: asInvoker execution manifest in resources
  crit: baseline
  conf: 0.84
  if:
    type: text
    exact: <requestedExecutionLevel level='asInvoker' uiAccess='false' />
    section: .rsrc
- id: asinvoker-resource-manifest-flex
  desc: PE resource manifest requests asInvoker
  crit: baseline
  conf: 0.86
  if:
    type: text
    regex: <requestedExecutionLevel level=['"]asInvoker['"] uiAccess=['"]false['"]\s*/?>
    section: .rsrc
- id: aspnetcore-components-docs
  desc: ASP.NET Core component XML docs
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Microsoft.AspNetCore.Components.Server
    section: .rsrc
- id: aspnetcore-httpsys-docs
  desc: ASP.NET Core HttpSys XML docs
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Microsoft.AspNetCore.Server.HttpSys
    section: .rsrc
- id: pe-no-version-info-resource
  desc: PE lacks VS_VERSION_INFO resource
  crit: component
  conf: 0.85
  if:
    type: value
    path: pe.version.file_version
    exists: false
  unless:
  - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: pe-adobe-postscript-marker
  desc: Adobe PostScript/PDF marker in PE resource
  crit: component
  conf: 0.95
  for: [pe, dll]
  if:
    type: text
    regex: "%%!PS-Adobe-|Pscript_WinNT_|CIDSystemInfo"
    section: .rsrc
- id: pe-adobe-font-registry-marker
  desc: Adobe font registry marker in PE resource
  crit: component
  conf: 0.95
  for: [pe, dll]
  if:
    type: text
    substr: /Registry(Adobe)
    section: .rsrc
- id: pe-resource-opaque-token
  desc: Long base64-like token in PE resource
  crit: notable
  conf: 0.82
  for: [pe, dll]
  if:
    type: text
    regex: \b[A-Za-z+/]*\d[A-Za-z0-9+/]{27,}={0,2}\b
    section: .rsrc
  not:
    - substr: PADDING
    - substr: MobileDeviceUpdateController
    - substr: developer.mozilla.org/en-US/docs/
    - substr: developer.mozilla.org/en/docs/
    - substr: en-US/docs/Web/JavaScript/Reference/
    - substr: en/docs/Web/JavaScript/Reference/
    - regex: \d+(\.\d+){1,3}\+[0-9a-f]{7,64}
    - regex: \d+\+[0-9a-f]{7,64}
    - regex: \+[0-9a-f]{7,64}
    - regex: ^[A-Za-z0-9]{1,3}\+[A-Za-z0-9]{20,}$
    - regex: ^[A-Za-z0-9]{1,3}(\+[A-Za-z0-9]{1,3}){4,}[A-Za-z0-9]{0,3}$
    - regex: ^[A-Za-z0-9]+$
    - regex: ^[0-9A-Za-z]{1,3}\+[A-Za-z]*(Font|Style|Script|WWW)[A-Za-z]+$
    - regex: ^[A-Za-z][A-Za-z0-9]*(/[A-Za-z][A-Za-z0-9]*)+$
    - regex: ^[A-Za-z]{2,}(/[A-Za-z0-9._-]+){3,}$
    - regex: ^/?/?[A-Za-z0-9._-]+(/[A-Za-z0-9._ -]+){2,}$
- id: large-high-entropy-rsrc-section
  desc: Large PE resource section with high entropy
  crit: baseline
  conf: 0.9
  for: [pe, dll]
  if:
    type: section
    exact: ".rsrc"
    length_min: 140000
    entropy_min: 6.5

composite_rules:
- id: resource-heavy-benign-wrapper-context
  desc: Benign resource-heavy wrapper context
  crit: baseline
  conf: 0.9
  any:
  - id: mun-resource-bundle
  - id: metadata/file/extension/identity::rll
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/script::nsis
  - id: metadata/binary/installer/script::nsis-manifest-exehead
  - id: metadata/binary/resource::resource-only-dll
  - id: metadata/signed/developer::martin-tofall
- id: oversized-rich-media-rsrc
  desc: Oversized PE resources with embedded media metadata
  crit: notable
  conf: 0.9
  all:
  - id: oversized-rsrc
  any:
  - id: xmp-resource-namespace
  - id: xmpmeta-adobe-resource
  - id: rdf-resource-namespace
  - id: metadata/package/versioning::pe-version-resource
  needs: 2
- id: resource-heavy-png-ui-wrapper
  desc: Resource-heavy PE with PNG UI bundle
  crit: notable
  conf: 0.92
  all:
  - id: resource-heavy-rsrc
  - id: png-resource-marker
  any:
  - id: xmp-resource-namespace
  - id: xmpmeta-adobe-resource
  - id: rdf-resource-namespace
  - id: metadata/package/versioning::version-resource-metadata
  unless:
  - id: mun-resource-bundle
  - id: metadata/file/extension/identity::rll
  - id: metadata/binary/installer/family/
  - id: metadata/binary/installer/script/
- id: resource-heavy-low-code-wrapper
  desc: Resource-heavy low-code PE wrapper
  crit: notable
  conf: 0.93
  all:
  - id: resource-heavy-rsrc
  any:
  - id: metadata/binary/metrics/structural::no-functions
  - id: metadata/binary/metrics/anomaly::low-function-count-marker
  - id: metadata/package/metrics::recovered-function-count-under-10
  - id: resource-heavy-low-entropy-rsrc
  - id: metadata/package/versioning::version-resource-metadata
  - id: asinvoker-resource-manifest-flex
  - id: micro-behaviors/os/privilege/manifest::highest-available
  needs: 3
  unless:
  - id: metadata/binary/resource/
- id: signed-overlay-resource-heavy-pe
  desc: Signed PE with overlay and heavy resources
  crit: suspicious
  conf: 0.92
  all:
  - id: oversized-rsrc
  any:
  - id: metadata/binary/layout::has-overlay
  - id: metadata/binary/layout::overlay-size-metrics
  - id: oversized-rich-media-rsrc
  - id: metadata/signed/developer::comodo-rsa-code-signing-ca
  - id: metadata/signed/developer::rita
  - id: metadata/package/versioning::version-resource-metadata
  needs: 4
- id: versioned-anonymous-resource-carrier
  desc: Versioned PE with anonymous payload
  crit: suspicious
  conf: 0.95
  all:
  - id: large-anonymous-pe-section
  - id: metadata/package/versioning::pe-version-resource
  any:
  - id: anonymous-pe-section-high-entropy
  - id: metadata/binary/layout::legacy-few-sections
  - id: metadata/binary/layout::binary-format-checked
  needs: 2
  unless:
  - id: well-known/lib/divx/
  downgrade:
    any:
    - id: well-known/lib/divx/
- id: dominant-executable-rsrc
  desc: Dominant executable resource carrier
  crit: suspicious
  conf: 0.95
  all:
  - id: oversized-rsrc
  - id: executable-rsrc-section
  - id: metadata/binary/metrics/structural::dominant-section
  unless:
  - id: metadata/signed/platform/
- id: giant-versioned-resource-wrapper
  desc: Giant versioned resource wrapper
  crit: suspicious
  conf: 0.94
  all:
  - id: giant-rsrc
  - id: metadata/binary/metrics/structural::dominant-section
  - id: metadata/package/versioning::version-resource-metadata
  unless:
  - id: metadata/binary/resource/
- id: png-and-manifest-rsrc
  desc: PNG and manifest in resources
  crit: baseline
  conf: 0.86
  all:
  - id: png-resource-marker
  any:
  - id: asinvoker-resource-manifest
  - id: asinvoker-resource-manifest-flex
- id: electron-asar-resource-wrapper
  desc: Electron ASAR resource wrapper
  crit: baseline
  conf: 0.93
  all:
  - id: electronasar-resource-marker
  - id: app-asar-sha256-manifest
- id: chunked-png-payloads-in-text
  desc: Multiple embedded PNG payload chunks
  crit: suspicious
  conf: 0.97
  all:
  - id: png-magic-in-text
  - id: multiple-png-images-in-text
  - id: multiple-png-end-markers-in-text
  unless:
  - id: libpng-ihdr-diagnostics
  - id: metadata/binary/framework/
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/developer::hendrik-leppkes
  - id: metadata/signed/developer::certum-code-signing-2021-ca
- id: doc-stuffed-rsrc
  desc: Oversized PE resources stuffed with XML docs
  crit: suspicious
  conf: 0.96
  all:
  - id: oversized-rsrc
  any:
  - id: aspnetcore-components-docs
  - id: aspnetcore-httpsys-docs
  unless:
  - id: metadata/binary/framework/
  - id: metadata/signed/platform/
- id: signed-null-rsrc-wrapper
  desc: Signed PE with null resource wrapper
  crit: suspicious
  conf: 0.96
  all:
  - id: large-null-rsrc
  - id: metadata/binary/layout::pe-signature-present
  - id: metadata/binary/metrics/anomaly::low-function-count-marker
  any:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: metadata/binary/metrics/structural::four-section-pe
  - id: metadata/signed/platform::microsoft
  needs: 2
