# Vendor-utility resource minimalism.
#
# A standalone end-user Windows utility built by a real vendor almost
# always carries an icon (RT_ICON / RT_GROUP_ICON) so it has a face in
# Explorer and the taskbar, plus often a string table, dialog, etc.
#
# Implants and supply-chain stubs that masquerade as a vendor utility
# routinely ship only RT_VERSION and RT_MANIFEST — just enough to look
# legitimate in the Properties dialog without dragging an icon binder
# through the build. Two-resource PEs are common for compiler test
# stubs, CI helpers, and managed unit-test executables, so the atom
# alone is `notable`; supply-chain composites referencing it gate
# additional context (small file size + asInvoker manifest + unsigned).
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: pe-resource-count-two
    desc: PE has exactly two resource entries
    crit: baseline
    conf: 1.0
    size_min: 2048
    size_max: 5242880
    if:
      type: metrics
      field: pe.resource_count
      min: 2
      max: 2

  - id: pe-resource-version-first
    desc: PE first resource is RT_VERSION
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types[0]
      exact: RT_VERSION

  - id: pe-resource-manifest-second
    desc: PE second resource is RT_MANIFEST
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types[1]
      exact: RT_MANIFEST

  - id: pe-resource-icon-list
    desc: PE has RT_ICON in resources list
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types
      substr: RT_ICON

  - id: pe-resource-group-icon-list
    desc: PE has RT_GROUP_ICON in resources list
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types
      substr: RT_GROUP_ICON

  - id: pe-resource-cursor-list
    desc: PE has RT_CURSOR in resources list
    crit: component
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types
      substr: RT_CURSOR

  - id: pe-resource-bitmap-list
    desc: PE has RT_BITMAP in resources list
    crit: component
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types
      substr: RT_BITMAP

  - id: pe-resource-menu-list
    desc: PE has RT_MENU in resources list
    crit: component
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types
      substr: RT_MENU

  - id: pe-resource-dialog-list
    desc: PE has RT_DIALOG in resources list
    crit: component
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types
      substr: RT_DIALOG

  - id: pe-resource-accelerator-list
    desc: PE has RT_ACCELERATOR resources
    crit: component
    conf: 1.0
    if:
      type: kv
      path: pe.resource_types
      substr: RT_ACCELERATOR

composite_rules:
  - id: pe-rich-gui-resource-table
    desc: PE rich GUI resource table
    crit: baseline
    conf: 0.98
    all:
      - id: pe-resource-cursor-list
      - id: pe-resource-bitmap-list
      - id: pe-resource-menu-list
      - id: pe-resource-dialog-list
      - id: pe-resource-accelerator-list
    any:
      - id: pe-resource-icon-list
      - id: pe-resource-group-icon-list

  - id: pe-version-and-manifest-only
    desc: PE ships only RT_VERSION + RT_MANIFEST resources
    crit: notable
    conf: 0.88
    size_min: 2048
    size_max: 5242880
    all:
      - id: pe-resource-count-two
      - id: pe-resource-version-first
      - id: pe-resource-manifest-second
