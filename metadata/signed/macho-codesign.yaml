# Mach-O code-signing signals not already covered by the dynamically-
# emitted `metadata/signed/{platform,developer,adhoc}::*` and
# `metadata/entitlement/*::*` traits (those carry team_id /
# bundle_id / entitlement-key in the trait ID for ML granularity).
#
# This file only adds static signals where the kv path encodes the
# entire useful information (no per-instance suffix needed).
defaults:
  platforms: [macos]
  for: [macho]
  conf: 1.0
traits:
  - id: macho-notarized
    desc: Notarized by Apple
    crit: baseline
    if:
      type: kv
      path: signing.notarized
      exact: "true"
