defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: microsoft-certificate-chain
    desc: Microsoft certificate chain markers
    crit: component
    all:
      - id: micro-behaviors/data/embedded/certificate::microsoft-code-signing-pca
      - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
      - id: metadata/binary/vendor::microsoft-corp-marker
  - id: microsoft
    desc: Microsoft-signed Windows binary
    crit: baseline
    conf: 0.98
    all:
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: metadata/signed/leaf::microsoft-corporation
