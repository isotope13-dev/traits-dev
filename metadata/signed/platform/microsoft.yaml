defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: microsoft-certificate-chain
    desc: Microsoft certificate chain markers
    crit: component
    all:
      - id: micro-behaviors/data/embedded/certificate::microsoft-code-signing-pca
      - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
      - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: microsoft
    desc: Microsoft-signed Windows binary
    crit: baseline
    conf: 0.98
    any:
      - id: microsoft-certificate-chain
      - id: metadata/signed/platform::microsoft-windows
