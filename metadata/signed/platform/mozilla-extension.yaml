defaults:
  platforms: [unix, windows]
  for: [zip, xpi]

traits:
  - id: web-extension-manifest
    desc: Web-extension manifest.json at archive root
    crit: component
    if:
      type: kv
      path: "archive.members[0].path"
      exact: "manifest.json"

  - id: cose-manifest
    desc: META-INF/cose.manifest (Mozilla COSE signing manifest)
    crit: component
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "META-INF/cose.manifest"

  - id: cose-signature
    desc: META-INF/cose.sig (Mozilla COSE signature blob)
    crit: component
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "META-INF/cose.sig"

  - id: pkcs7-signature
    desc: META-INF/mozilla.rsa (Mozilla PKCS#7 signature blob)
    crit: component
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "META-INF/mozilla.rsa"

  - id: pkcs7-signature-file
    desc: META-INF/mozilla.sf (Mozilla PKCS#7 manifest digest)
    crit: component
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "META-INF/mozilla.sf"

composite_rules:
  # File-presence detection of the Mozilla web-extension signing-pipeline
  # artifacts. The structural shape (manifest.json + COSE blob pair + PKCS#7
  # blob pair) implies the archive went through Mozilla's addons.mozilla.org
  # review-and-sign service. Signature validity is NOT verified; an attacker
  # could synthesize these filenames with bogus payloads. The trait is a
  # build-pipeline attestation, not a cryptographic one — useful as a
  # benign-context downgrade signal for behaviors that are normal in a
  # signed-by-AMO extension (cookie reads, tab access, host permissions).
  - id: mozilla-extension
    desc: Archive carries the Mozilla web-extension signing-pipeline artifacts (build-shape, not signature-verified)
    crit: baseline
    conf: 0.95
    all:
      - id: web-extension-manifest
      - id: cose-manifest
      - id: cose-signature
      - id: pkcs7-signature
      - id: pkcs7-signature-file
