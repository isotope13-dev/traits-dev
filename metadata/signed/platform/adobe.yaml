defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
- id: adobe
  desc: Adobe-signed Windows binary
  crit: baseline
  conf: 0.97
  all:
  - id: micro-behaviors/data/embedded/certificate::digicert-timestamp-chain
  - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  any:
  - id: metadata/binary/vendor::adobe-inc-marker-rsrc
  - id: metadata/binary/vendor::adobe-inc-marker-rdata
- id: adobe-systems
  desc: Adobe-signed binary (legacy Symantec/VeriSign chain)
  crit: baseline
  conf: 0.93
  all:
  - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: metadata/binary/vendor::adobe-systems-inc-marker
