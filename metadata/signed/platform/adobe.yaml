defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: adobe
    desc: Adobe-signed Windows binary
    crit: baseline
    conf: 0.97
    all:
      - id: micro-behaviors/data/embedded/certificate::digicert-timestamp-chain
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
    any:
      - id: metadata/vendor/adobe::adobe-inc-marker-rsrc
      - id: metadata/vendor/adobe::adobe-inc-marker-rdata
    needs: 1
  - id: adobe-systems
    desc: Adobe-signed binary (legacy Symantec/VeriSign chain)
    crit: baseline
    conf: 0.93
    all:
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
      - id: metadata/vendor/adobe::adobe-systems-inc-marker
