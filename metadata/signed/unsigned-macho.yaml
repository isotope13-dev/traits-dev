# Unsigned Mach-O detection — kv-driven mirror of `unsigned-pe.yaml`.
# `signing.is_signed` is set by `binary_kv::signing_section` whenever
# the binary carries an LC_CODE_SIGNATURE blob; absent means unsigned.
defaults:
  for: [macho]
  platforms: [macos]
traits:
  - id: unsigned-macho
    desc: Mach-O binary is not digitally signed
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: signing.is_signed
      exists: false
