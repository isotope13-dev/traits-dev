# Unsigned Mach-O detection, metrics-driven to avoid reporting missing
# signing kv fields as evidence.
defaults:
  for: [macho]
  platforms: [macos]
traits:
  - id: unsigned-macho
    desc: Mach-O binary is not digitally signed
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: binary.has_signature
      max: 0
