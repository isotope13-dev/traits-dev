defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: payments-interactive-sl-subject-text
    desc: Payments Interactive SL certificate subject text
    crit: component
    conf: 0.99
    size_min: 300000
    size_max: 900000
    if:
      type: text
      substr: Payments Interactive SL
      section: rdata
  - id: tuguu-israel-ltd-subject-text
    desc: Tuguu Israel Ltd certificate subject text
    crit: component
    conf: 0.99
    size_min: 300000
    size_max: 900000
    if:
      type: text
      substr: Tuguu Israel Ltd
      section: rdata
  - id: sov-it-soft-subject-text
    desc: SOV IT SOFT certificate subject text
    crit: component
    conf: 0.99
    size_min: 3500000
    size_max: 5000000
    if:
      type: text
      substr: LLC "SOV IT SOFT"
      section: rdata
