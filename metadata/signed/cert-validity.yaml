# Cert-validity-window anomaly detection.  Standard code-signing
# certs have 1-3 year validity windows; some EV certs go 3-5 years.
# Validity windows >5 years are unusual — typical sources include:
#   - certificates issued before stricter CA/B Forum baseline
#     requirements tightened, then carried forward
#   - certs intentionally minted with extended validity to outlive
#     compromise detection
#   - test/internal CAs with sloppy lifetime defaults
#
# Cleave computes `pe.cert_validity_days` as the leaf cert's
# (not_after - not_before) window in days.
defaults:
  platforms: [windows]
  for: [pe]
  conf: 0.85
  size_min: 1024
  size_max: 524288000
traits: []
