# .NET strong-name signing state, read from the CLR header
# COMIMAGE_FLAGS_STRONGNAMESIGNED bit (`pe.clr.strong_name_signed`). Strong
# naming is a neutral property that modern .NET frequently omits, so absence is
# a baseline structural fact — not suspicious on its own. Its value is forensic:
# in a supply-chain diff a strong-named release that turns unsigned in the next
# version signals a rebuild by someone without the original signing key, and it
# composes with a vendor-brand identity into a forgery signal.
defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll]

traits:
  - id: dotnet-strong-name-signed
    desc: Managed assembly is strong-name signed
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: pe.clr.strong_name_signed
      min: 1

  - id: dotnet-not-strong-name-signed
    desc: Managed assembly not strong-name signed
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: pe.clr.strong_name_signed
      max: 0
