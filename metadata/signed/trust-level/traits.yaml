# Apple signature classification.  Reads directly from the binary kv
# tree populated by cleave's `binary_extractors`; trait IDs are
# unchanged so downstream consumers keep working.
defaults:
  platforms: [macos]
  for: [macho]
  crit: baseline
  conf: 1.0
traits:
  - id: adhoc
    desc: Ad-hoc code signature
    if:
      type: kv
      path: signing.type
      exact: adhoc
  - id: platform
    desc: Apple platform binary
    if:
      type: kv
      path: signing.type
      exact: platform
  - id: hardened-runtime-dup
    desc: Hardened runtime enabled
    if:
      type: kv
      path: signing.hardened_runtime
      exact: "true"
composite_rules:
  - id: developer-signed
    desc: Developer ID signed application
    any:
      - id: metadata/signed/developer
  - id: app-store-signed
    desc: Mac App Store signed application
    any:
      - id: metadata/signed/app-store
