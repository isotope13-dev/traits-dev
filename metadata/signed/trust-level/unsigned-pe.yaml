defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: signer-evidence-present
    desc: Platform or developer signing evidence
    crit: component
    any:
      - id: metadata/signed/platform
      - id: metadata/signed/certificate
      - id: metadata/signed/developer
  - id: unsigned-pe-common-benign-profile
    desc: Common unsigned PE benign profile
    crit: component
    any:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/metrics/structural::many-functions

traits:
  - id: unsigned
    desc: Binary is not digitally signed
    crit: notable
    conf: 1.0
    if:
      type: metrics
      field: pe.cert_table_size
      max: 0
    unless:
      - id: metadata/signed/trust-level/

  - id: unsigned-missing-signature-record
    desc: PE lacks signature record
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pe.signatures[0].subject
      exists: false
    unless:
      - id: metadata/signed/trust-level/
      - id: metadata/signed/certificate/identity/

  - id: unsigned-pe-executable
    desc: PE executable is unsigned
    crit: notable
    conf: 0.8
    if:
      id: unsigned
    unless:
      - type: trait
        id: metadata/signed/trust-level/
      - type: basename
        regex: '(?i)\.(winmd|node|pyd)$'
      - id: metadata/file/extension/identity::uac-exe-basename
      - type: trait
        id: metadata/signed/trust-level/
      - id: metadata/binary/metrics/structural::section-exceeds-file-size
