# macOS Application Entitlements
# Extracted from code signature entitlements blob
defaults:
  platforms: [macos]
  for: [macho]
traits:
  # cleave emits the raw entitlement as an engine finding before YAML traits
  # are mapped.  This hook lets a recognized Bruno/Electron bundle suppress
  # that engine-level suspicious severity; the entitlement remains observable
  # through the notable derived trait below and in the facts tree.
  - id: builtin-metadata-entitlement-security-com-apple-security-cs-allow-unsigned-executable-memory
    desc: Built-in unsigned-memory entitlement hook
    crit: suspicious
    conf: 1.0
    if:
      type: basename
      exact: __cleave_builtin_metadata_entitlement_security_com_apple_security_cs_allow_unsigned_executable_memory_hook__
    unless:
      - id: well-known/app/bruno::app-bundle
  # === Privacy-Sensitive Entitlements ===
  - id: camera
    desc: Camera access entitlement
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/device::com.apple.security.device.camera
  - id: microphone
    desc: Microphone access entitlement
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/device::com.apple.security.device.audio-input
  - id: location
    desc: Location access entitlement
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/privacy::com.apple.security.personal-information.location
  - id: photos-library
    desc: Photos library access entitlement
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/privacy::com.apple.security.personal-information.photos-library
  - id: contacts
    desc: Contacts access entitlement
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/privacy::com.apple.security.personal-information.addressbook
  - id: calendar
    desc: Calendar access entitlement
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/privacy::com.apple.security.personal-information.calendars
  # === Security-Related Entitlements ===
  - id: disable-library-validation
    desc: Allows libraries without signature checks
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/security::com.apple.security.cs.disable-library-validation
  - id: allow-jit
    desc: Allows JIT-compiled executable memory
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/security::com.apple.security.cs.allow-jit
  - id: allow-unsigned-executable-memory
    desc: Allow unsigned executable memory
    crit: notable
    conf: 1.0
    unless:
      - id: well-known/app/macos-benign::zed-official-signed-member
      - id: well-known/app/mastergo::mastergo-app-path
      - id: well-known/app/codewhale::codewhale-binary-path
      - id: well-known/app/bruno::app-bundle
    if:
      type: trait
      id: metadata/entitlement/security::com.apple.security.cs.allow-unsigned-executable-memory
  - id: debugger
    desc: Allows attaching to other macOS processes
    crit: notable
    conf: 1.0
    unless:
      - id: well-known/lib/jvm::azul-zulu-macos-java-launcher
      - id: well-known/lib/jvm::azul-zulu-macos-keytool
      - id: well-known/tool/development/bazel-diff::bazel-diff-bzlmod-test-fixture
      - id: well-known/app/mastergo::mastergo-application-context
      - id: well-known/app/codewhale::codewhale-application-context
      - id: well-known/lib/eclipse-osgi::eclipse-foundation-team-id
      - id: well-known/tool/development/jetbrains::debugger-worker-binary
      # The macOS .NET runtime pack's createdump helper legitimately carries
      # the debugger entitlement so it can attach to a crashing process.
      - type: path
        regex: '(?i)Microsoft\.NETCore\.App\.Runtime\.osx-x64(?:\.[0-9][^/\\]*)?\.nupkg'
    if:
      type: trait
      id: metadata/entitlement/security::com.apple.security.cs.debugger
  - id: ptrace
    desc: Process tracing entitlement
    crit: suspicious
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/security::com.apple.security.cs.allow-runtime-attributes
  # === Network Entitlements ===
  - id: outbound-connections
    desc: Allow outbound connections
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/network::com.apple.security.network.client
  - id: incoming-connections
    desc: Allow incoming connections
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/network::com.apple.security.network.server
  - id: local-networking
    desc: Local network access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/network::com.apple.security.network.local
  - id: multicast
    desc: Multicast networking
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/network::com.apple.security.network.multicast
  # === Device Entitlements ===
  - id: usb
    desc: USB device access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/device::com.apple.security.device.usb
  - id: bluetooth
    desc: Bluetooth device access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/device::com.apple.security.device.bluetooth
  - id: printer
    desc: Printer device access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/device::com.apple.security.device.print
  - id: serial
    desc: Serial device access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/device::com.apple.security.device.serial
  # === File System Entitlements ===
  - id: file-read-all
    desc: Read all files entitlement
    crit: suspicious
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/filesystem::com.apple.security.files.all
    unless:
      - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
  - id: file-read-downloads
    desc: Downloads folder read access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/filesystem::com.apple.security.files.downloads.read-only
  - id: file-write-downloads
    desc: Downloads folder write access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/filesystem::com.apple.security.files.downloads.read-write
  # === Keychain Entitlements ===
  - id: keychain-access
    desc: Keychain access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/keychain::keychain-access-groups
  - id: get-task-allow
    desc: Allows debugger attachment to this Mach-O
    crit: notable
    conf: 1.0
    if:
      type: value
      path: macho.code_signature.entitlements["com.apple.security.get-task-allow"]
      exact: "true"
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  # === Application Identifier ===
  - id: app-identifier
    desc: Application identifier
    crit: baseline
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/identity::com.apple.application-identifier
  - id: temporary-exception-files-read
    desc: Temporary exception for file read access
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/filesystem::com.apple.security.temporary-exception.files.absolute-path.read-only
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: temporary-exception-mach-lookup
    desc: Temporary exception for mach lookup
    crit: notable
    conf: 1.0
    if:
      type: trait
      id: metadata/entitlement/ipc::com.apple.security.temporary-exception.mach-lookup.global-name
    downgrade:
      any:
        - id: metadata/signed/platform::apple
composite_rules:
  - id: privacy-sensitive-access
    desc: Multiple privacy-sensitive entitlements
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: camera
      - id: microphone
      - id: location
      - id: photos-library
      - id: contacts
      - id: calendar
    # Downgrade for legitimate system components that have multiple entitlements by design
    # (e.g., ReplayKit daemon for screen recording needs camera + microphone)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/vendor/
    unless:
      - id: well-known/app/mastergo::mastergo-application-context
      - id: well-known/app/codewhale::codewhale-application-context
  - id: highly-privileged
    desc: Highly privileged entitlements
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/macos-benign::zed-official-signed-member
      - id: well-known/app/mastergo::mastergo-app-path
      - id: well-known/app/codewhale::codewhale-binary-path
      - id: well-known/lib/jvm::azul-zulu-macos-java-launcher
      - id: well-known/lib/jvm::azul-zulu-macos-keytool
    any:
      - id: disable-library-validation
      - id: allow-unsigned-executable-memory
      - id: ptrace
      - id: debugger
      - id: temporary-exception-files-read
      - id: temporary-exception-mach-lookup
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/vendor/
