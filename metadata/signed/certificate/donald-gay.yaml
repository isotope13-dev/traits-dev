defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: donald-gay-subject-text
    desc: Donald Gay certificate subject
    crit: component
    conf: 0.98
    if:
      type: text
      section: overlay
      substr: Donald Gay
  - id: microsoft-id-verified-aoc-ca02
    desc: Microsoft AOC CA 02 issuer
    crit: component
    conf: 0.98
    if:
      type: text
      section: overlay
      substr: Microsoft ID Verified CS AOC CA 02
  - id: donald-gay-thumbprint
    desc: Donald Gay certificate thumbprint
    crit: notable
    conf: 0.99
    if:
      type: text
      section: overlay
      regex: '(?i)B674578D4BDB24CD58BF2DC884EAA658B7AA250C'

composite_rules:
  - id: donald-gay-subject-issuer
    desc: Donald Gay subject and Microsoft issuer
    crit: component
    conf: 0.98
    all:
      - id: donald-gay-subject-text
      - id: microsoft-id-verified-aoc-ca02

  - id: donald-gay-code-signing-certificate
    desc: Donald Gay code signing certificate
    crit: notable
    conf: 0.99
    any:
      - id: donald-gay-thumbprint
      - id: donald-gay-subject-issuer
