defaults:
  platforms:
    - macos
  for:
    - macho
traits:
  - id: apple-development
    desc: Apple Development certificate
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: Apple Development
      section: .text
  - id: apple-distribution
    desc: Apple Distribution certificate
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: Apple Distribution
      section: .text
  - id: developer-id
    desc: Developer ID certificate
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: Developer ID
      section: .text
  - id: anchor-apple
    desc: anchor apple requirement
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: anchor apple
      section: .text
  - id: certificate-leaf
    desc: certificate leaf requirement
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: certificate leaf
      section: .text
composite_rules:
  - id: signed
    desc: Apple code signature markers
    crit: baseline
    conf: 0.85
    any:
      - id: apple-development
      - id: apple-distribution
      - id: developer-id
  - id: codesign-requirement
    desc: Code signature requirement blob
    crit: baseline
    conf: 0.9
    any:
      - id: anchor-apple
      - id: certificate-leaf
