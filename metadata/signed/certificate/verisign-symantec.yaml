defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: verisign-timestamp-services
    desc: VeriSign timestamping certificate text
    crit: baseline
    conf: 0.88
    if:
      type: string_value
      substr: "VeriSign Time Stamping Services"
      section: .rsrc
  - id: symantec-corporation-cert
    desc: Symantec certificate subject text
    crit: baseline
    conf: 0.86
    if:
      type: string_value
      substr: "Symantec Corporation"
      section: .rsrc
  - id: verisign-ocsp-url
    desc: VeriSign OCSP URL
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      substr: "http://ocsp.verisign.com"
      section: .rsrc
  - id: verisign-crl-url
    desc: VeriSign CRL URL
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      substr: "http://crl.verisign.com/pca3.crl"
      section: .rsrc
  - id: verisign-logo-url
    desc: VeriSign logo URL
    crit: baseline
    conf: 0.84
    if:
      type: string_value
      substr: "http://logo.verisign.com/vslogo.gif"
      section: .rsrc
  - id: bitdefender-brand-text
    desc: Bitdefender brand text in resource
    crit: baseline
    conf: 0.84
    if:
      type: string_value
      regex: "(?i)bitdefender"
      section: .rsrc
composite_rules:
  - id: verisign-symantec-timestamp-chain
    desc: Embedded VeriSign Symantec timestamp chain
    crit: baseline
    conf: 0.92
    all:
      - id: verisign-timestamp-services
      - id: symantec-corporation-cert
    any:
      - id: verisign-ocsp-url
      - id: verisign-crl-url
