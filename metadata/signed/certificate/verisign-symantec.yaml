defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: verisign-timestamp-services
    desc: VeriSign timestamping certificate text
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: VeriSign Time Stamping Services
      section: .rdata
  - id: symantec-corporation-cert
    desc: Symantec certificate subject text
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: Symantec Corporation
      section: .rdata
  - id: thawte-timestamp-services
    desc: Thawte timestamping certificate text
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: Thawte Timestamping CA
      section: .rdata
  - id: thawte-code-signing-ca
    desc: Thawte code signing chain text
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: Thawte Code Signing CA
      section: .rdata
  - id: verisign-ocsp-url
    desc: VeriSign OCSP URL
    crit: baseline
    conf: 0.82
    if:
      type: text
      substr: http://ocsp.verisign.com
      section: .rdata
  - id: verisign-crl-url
    desc: VeriSign CRL URL
    crit: baseline
    conf: 0.82
    if:
      type: text
      substr: http://crl.verisign.com/pca3.crl
      section: .rdata
  - id: verisign-logo-url
    desc: VeriSign logo URL
    crit: baseline
    conf: 0.84
    if:
      type: text
      substr: http://logo.verisign.com/vslogo.gif
      section: .rdata
  - id: bitdefender-brand-text
    desc: Bitdefender brand text in resource
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: (?i)bitdefender
      section: .rdata
  - id: thawte-ocsp-url
    desc: Thawte OCSP URL
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: http://ocsp.thawte.com
      section: .rdata
  - id: thawte-crl-url
    desc: Thawte CRL URL
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: http://crl.thawte.com
      section: .rdata
  - id: symantec-timestamp-ocsp-url
    desc: Symantec timestamp OCSP URL
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: http://ts-ocsp.ws.symantec.com
      section: .rdata
  - id: symantec-thawte-crl-url
    desc: Symantec Thawte CRL URL
    crit: baseline
    conf: 0.84
    if:
      type: text
      substr: http://th.symcb.com
      section: .rdata
composite_rules:
  - id: verisign-symantec-timestamp-chain
    desc: Embedded VeriSign Symantec timestamp chain
    crit: baseline
    conf: 0.92
    all:
      - id: verisign-timestamp-services
      - id: symantec-corporation-cert
    any:
      - id: verisign-ocsp-url
      - id: verisign-crl-url
  - id: thawte-symantec-timestamp-chain
    desc: Embedded Thawte Symantec timestamp chain
    crit: baseline
    conf: 0.93
    needs: 3
    any:
      - id: symantec-corporation-cert
      - id: thawte-timestamp-services
      - id: thawte-code-signing-ca
      - id: thawte-ocsp-url
      - id: thawte-crl-url
      - id: symantec-timestamp-ocsp-url
      - id: symantec-thawte-crl-url
