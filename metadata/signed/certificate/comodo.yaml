defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: comodo-rsa-code-signing-ca
    desc: COMODO RSA code signing chain
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: COMODO RSA Code Signing CA
      section: .rdata
  - id: comodo-rsa-certification-authority
    desc: COMODO RSA root certificate text
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: COMODO RSA Certification Authority
      section: .rdata
  - id: comodo-ocsp-url
    desc: COMODO OCSP URL
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: http://ocsp.comodoca.com
      section: .rdata
  - id: comodo-code-signing-crl
    desc: COMODO code signing CRL URL
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: http://crl.comodoca.com/COMODORSACodeSigningCA.crl
      section: .rdata
  - id: comodo-code-signing-crt
    desc: COMODO code signing certificate URL
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: http://crt.comodoca.com/COMODORSACodeSigningCA.crt
      section: .rdata
  - id: addtrust-external-ca-root
    desc: AddTrust External CA Root certificate text
    crit: baseline
    conf: 0.88
    if:
      type: text
      exact: AddTrust External CA Root
      section: .rdata
  - id: freemium-gmbh-subject
    desc: freemium GmbH certificate subject text
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: freemium GmbH
      section: .rdata
  - id: freemium-support-email
    desc: freemium certificate support email
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: support@freemium.com
      section: .rdata
  - id: rita-tov-subject
    desc: RITA TOV certificate subject text
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: RITA, TOV
      section: .rdata
  - id: installvibes-subject
    desc: InstallVibes certificate subject text
    crit: notable
    conf: 0.97
    if:
      type: text
      exact: InstallVibes
      section: .rdata
  - id: usertrust-utn-object
    desc: UTN USERFirst Object certificate chain
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: UTN-USERFirst-Object
      section: .rdata
composite_rules:
  - id: comodo-authenticode-chain
    desc: Embedded COMODO Authenticode chain
    crit: baseline
    conf: 0.93
    all:
      - id: comodo-rsa-code-signing-ca
      - id: comodo-rsa-certification-authority
    any:
      - id: comodo-ocsp-url
      - id: comodo-code-signing-crl
      - id: comodo-code-signing-crt
  - id: comodo-rita-tov-signed
    desc: COMODO-signed RITA TOV binary
    crit: notable
    conf: 0.97
    all:
      - id: comodo-authenticode-chain
      - id: rita-tov-subject
  - id: freemium-comodo-addtrust-signed
    desc: freemium GmbH binary with COMODO and AddTrust chain
    crit: notable
    conf: 0.98
    all:
      - id: comodo-authenticode-chain
      - id: addtrust-external-ca-root
      - id: freemium-gmbh-subject
    any:
      - id: freemium-support-email
      - id: comodo-code-signing-crt
  - id: installvibes-comodo-usertrust-signed
    desc: InstallVibes binary with COMODO UserTrust chain
    crit: notable
    conf: 0.99
    all:
      - id: comodo-authenticode-chain
      - id: installvibes-subject
      - id: usertrust-utn-object
