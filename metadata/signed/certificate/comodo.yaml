defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: comodo-rsa-code-signing-ca
    desc: COMODO RSA code signing chain
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: COMODO RSA Code Signing CA
      section: .rdata
  - id: comodo-rsa-certification-authority
    desc: COMODO RSA root certificate text
    crit: baseline
    conf: 0.88
    if:
      type: string_value
      substr: COMODO RSA Certification Authority
      section: .rdata
  - id: comodo-ocsp-url
    desc: COMODO OCSP URL
    crit: baseline
    conf: 0.86
    if:
      type: string_value
      substr: http://ocsp.comodoca.com
      section: .rdata
  - id: comodo-code-signing-crl
    desc: COMODO code signing CRL URL
    crit: baseline
    conf: 0.86
    if:
      type: string_value
      substr: http://crl.comodoca.com/COMODORSACodeSigningCA.crl
      section: .rdata
  - id: comodo-code-signing-crt
    desc: COMODO code signing certificate URL
    crit: baseline
    conf: 0.86
    if:
      type: string_value
      substr: http://crt.comodoca.com/COMODORSACodeSigningCA.crt
      section: .rdata
  - id: rita-tov-subject
    desc: RITA TOV certificate subject text
    crit: notable
    conf: 0.95
    if:
      type: string_value
      exact: RITA, TOV
      section: .rdata
composite_rules:
  - id: comodo-authenticode-chain
    desc: Embedded COMODO Authenticode chain
    crit: baseline
    conf: 0.93
    all:
      - id: comodo-rsa-code-signing-ca
      - id: comodo-rsa-certification-authority
    any:
      - id: comodo-ocsp-url
      - id: comodo-code-signing-crl
      - id: comodo-code-signing-crt
  - id: comodo-rita-tov-signed
    desc: COMODO-signed RITA TOV binary
    crit: notable
    conf: 0.97
    all:
      - id: comodo-authenticode-chain
      - id: rita-tov-subject
