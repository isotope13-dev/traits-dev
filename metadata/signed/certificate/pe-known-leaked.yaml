# Known-leaked / known-abused PE Authenticode code-signing certificates.
#
# Each entry matches a SHA-1 thumbprint or a leaked-cert subject CN that
# has been publicly disclosed as compromised — typically a code-signing
# cert whose private key was stolen and subsequently used to sign
# malware. Expose surfaces the leaf cert thumbprint and subject at
# `pe.signatures[0].thumbprint_sha1` and `pe.signatures[0].subject`;
# these traits just match against the known-bad lookup.
#
# This file is intended to be append-only as new disclosures land.
# Each entry MUST include a `# source:` comment naming the public
# disclosure (vendor blog, CVE, ESET/Mandiant/Symantec report, etc.)
# so trait reviewers can verify the thumbprint independently.
#
# CONTRIBUTORS: when adding a new entry —
#   1. Confirm the thumbprint from the original disclosure (not a
#      secondary source).
#   2. Use SHA-1 lowercase hex with no separators (matches expose's
#      `pe.signatures[0].thumbprint_sha1` format).
#   3. Set `crit: suspicious` only if the cert itself is considered
#      compromised; use `crit: suspicious` for "associated with
#      known APT activity but legitimate vendor".
#   4. Include the disclosure date and reference URL in the comment.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 1.0
traits:
  # ─── Realtek Semiconductor leaked code-signing certs ───
  # Realtek's code-signing private key was leaked publicly multiple
  # times; the leaked certs have been observed signing Stuxnet (2010,
  # the original incident), Asus ShadowHammer artifacts, BlackTech
  # Plead samples, and a long tail of unrelated commodity malware.
  # The Realtek subject DN itself is therefore a strong negative
  # signal even when the specific thumbprint isn't on a curated
  # blocklist — a "Realtek Semiconductor"-signed binary that ISN'T
  # an actual Realtek driver is a high-confidence supply-chain swap
  # signal. Match by subject; trait authors with curated thumbprints
  # can layer per-thumbprint traits on top.
  # source: ESET "Plead malware against Asus" (2018-07-09),
  #         https://www.welivesecurity.com/2018/07/09/certificates-stolen-taiwanese-tech-companies-plead-malware-campaign/
  # source: Symantec "Stuxnet 0.5: The Missing Link" (2013), original
  #         Realtek-signed Stuxnet rootkit driver
  - id: pe-cert-subject-realtek-leaked-context
    desc: Realtek leaked signing cert context
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '(?i)Realtek Semiconductor'

  # ─── JMicron Technology leaked code-signing cert ───
  # JMicron's code-signing key was leaked alongside Realtek's during
  # the original Stuxnet incident (2010). Same caveat applies: legit
  # JMicron-signed binaries exist; a JMicron-signed binary that isn't
  # an actual JMicron storage driver is suspect.
  # source: ESET / Symantec joint analysis of Stuxnet,
  #         https://www.symantec.com/content/dam/symantec/docs/security-center/white-papers/security-response-w32-stuxnet-dossier-11-en.pdf
  - id: pe-cert-subject-jmicron-leaked-context
    desc: JMicron leaked signing cert context
    crit: notable
    conf: 0.85
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '(?i)JMicron Technology'

  # ─── D-Link Corporation leaked code-signing cert (2018) ───
  # D-Link's code-signing key was used by the BlackTech APT to sign
  # Plead malware. D-Link revoked the cert in July 2018 after ESET's
  # disclosure. Subject-level match because the specific thumbprint
  # isn't always exposed in secondary sources.
  # source: ESET "Plead malware" (2018-07-09),
  #         https://www.welivesecurity.com/2018/07/09/certificates-stolen-taiwanese-tech-companies-plead-malware-campaign/
  - id: pe-cert-subject-dlink-leaked-2018
    desc: D-Link leaked signing cert context
    crit: notable
    conf: 0.85
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '(?i)D-Link Corporation'

  # ─── ASUS-signed binaries during ShadowHammer window ───
  # Operation ShadowHammer (Kaspersky 2019) involved trojanized
  # ASUS Live Update binaries signed with the legitimate ASUSTeK
  # cert. The cert was not "leaked" in the traditional sense; the
  # build pipeline was compromised. Treat ASUS-signed binaries with
  # heightened scrutiny — this is a pattern signal, not a proof.
  # source: Kaspersky "Operation ShadowHammer" (2019-03-25),
  #         https://www.kaspersky.com/blog/shadow-hammer-teaser/26149/
  - id: pe-cert-subject-asus-shadowhammer-context
    desc: Signed by ASUSTeK Computer cert (ShadowHammer pattern)
    crit: baseline
    conf: 0.7
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '(?i)ASUSTeK Computer'

  # ─── DigiNotar issuer (2011 CA compromise) ───
  # DigiNotar was a Dutch CA whose root was compromised in 2011 and
  # used to issue fraudulent certificates (notably for *.google.com).
  # All major OS vendors revoked the DigiNotar root; any binary with
  # a DigiNotar-issued cert in 2026 is a forensic artifact at best.
  # source: ENISA / Mozilla / Microsoft 2011 disclosures
  - id: pe-cert-issuer-diginotar-revoked
    desc: Issued by DigiNotar (revoked 2011)
    crit: suspicious
    conf: 1.0
    if:
      type: value
      path: pe.signatures[0].issuer
      regex: '(?i)DigiNotar'

  # ─── Specific thumbprint slots (populate with curated intel) ───
  # The patterns above match by subject/issuer because publicly-
  # disclosed thumbprints are inconsistent across secondary sources.
  # Add per-thumbprint traits HERE when you have a confirmed SHA-1
  # from an authoritative source — they carry crit: suspicious / conf: 1.0
  # since a thumbprint match is a precise identification, not a
  # heuristic. Template:
  #
  #   - id: pe-cert-thumbprint-<vendor>-<incident>-<year>
  #     desc: Signed by <leaked cert description>
  #     crit: suspicious
  #     conf: 1.0
  #     if:
  #       type: value
  #       path: pe.signatures[0].thumbprint_sha1
  #       regex: '^<thumbprint-lowercase-hex>$'
  #     # source: <authoritative URL>
  #     # disclosure: <YYYY-MM-DD>
