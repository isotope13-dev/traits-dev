defaults:
  platforms: [windows]
  for: [javascript, vbs]
traits:
  - id: powershell-signature-block
    desc: PowerShell Authenticode signature block
    crit: notable
    conf: 0.95
    for: [powershell]
    if:
      type: text
      substr: "# SIG # Begin signature block"
  - id: sig-comment-signature-block
    desc: Authenticode signature block comment
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "SIG // Begin signature block"
  - id: sig-comment-double-signature-block
    desc: Multiple script signature block markers
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      substr: "SIG // Begin signature block"
