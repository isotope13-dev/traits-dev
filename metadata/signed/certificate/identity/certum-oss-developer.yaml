defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: open-source-developer-leaf-subject
    desc: Open Source Developer leaf subject
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '^Open Source Developer,'

  - id: certum-level-iii-issuer
    desc: Certum Level III CA issuer
    crit: component
    conf: 0.9
    if:
      type: value
      path: pe.signatures[0].issuer
      regex: 'Certum Level III CA'

composite_rules:
  - id: certum-oss-developer-cert
    desc: Certum Open Source Developer certificate
    crit: notable
    conf: 0.95
    all:
      - id: open-source-developer-leaf-subject
      - id: certum-level-iii-issuer
    unless:
      - id: metadata/signed/platform/
