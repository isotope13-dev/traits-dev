defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: roblox-corporation
    desc: Signed by Roblox Corporation
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: signing.cert.subject
      substr: "Roblox Corporation"

composite_rules:
  - id: benign-consumer-leaves
    desc: Consumer-app leaf certs benign for anomaly clusters
    crit: component
    conf: 0.95
    any:
      - id: roblox-corporation
      - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
      - id: metadata/signed/leaf::brave-software-inc.
      - id: metadata/signed/leaf::google-inc
      - id: metadata/signed/leaf::spotify-ab
