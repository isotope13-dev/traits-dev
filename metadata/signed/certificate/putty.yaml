# PuTTY / Simon Tatham certificate detection
# Neutral metadata trait — used as downgrade target by objective-level rules
defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: simon-tatham-cert
    desc: Simon Tatham / PuTTY certificate
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: "Simon Tatham"
      section: .data
