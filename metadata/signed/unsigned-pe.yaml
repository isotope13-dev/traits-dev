defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: signer-evidence-present
    desc: Platform or developer signing evidence
    crit: component
    any:
      - id: metadata/signed/platform
      - id: metadata/signed/certificate
      - id: metadata/signed/developer
traits:
  - id: unsigned-pe-executable
    desc: PE executable is unsigned
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: pe.has_signature
      max: 0
    unless:
      - type: trait
        id: metadata/binary/framework::dotnet-assembly
      - type: trait
        id: metadata/package/versioning::pe-version-resource
      - type: basename
        regex: '(?i)\.(winmd|node|pyd)$'
      - type: basename
        exact: 'UAC.exe'
      - type: trait
        id: metadata/binary/installer/script::nsis
      - type: trait
        id: signer-evidence-present
