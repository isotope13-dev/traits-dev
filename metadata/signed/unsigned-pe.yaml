defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: unsigned-pe-executable
    desc: PE executable is unsigned
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: pe.has_signature
      max: 0
    unless:
      - type: basename
        regex: '(?i)\.winmd$'
      - type: basename
        regex: '(?i)\.node$'
      - type: basename
        regex: '(?i)\.pyd$'
      - type: basename
        exact: 'UAC.exe'
      - type: trait
        id: metadata/binary/installer/script::nsis
      - type: trait
        id: metadata/signed/platform::microsoft-code-signing-pca-2011
      - type: trait
        id: metadata/signed/platform::microsoft-time-stamp-pca-2010
