defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [source, binaries]
  crit: baseline
  conf: 0.5
traits:
  - id: utm-source-medium-campaign
    desc: UTM tracking (source/medium/campaign)
    if:
      type: string_value
      regex: utm_(source|medium|campaign)=
      section: .text
  - id: utm-content-term
    desc: UTM tracking (content/term)
    if:
      type: string_value
      regex: utm_(content|term)=
      section: .text
composite_rules:
  - id: utm-tracking
    desc: Contains UTM tracking parameters
    crit: notable
    conf: 0.7
    any:
      - id: utm-source-medium-campaign
      - id: utm-content-term
