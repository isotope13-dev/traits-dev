# Code Quality Indicators - Metrics
traits:
  # === Atomic: Metrics/Telemetry ===
  - id: prometheus-word
    desc: Prometheus reference
    crit: baseline
    conf: 0.7
    for: [all]
    if:
      type: string
      word: "prometheus"
      section: .text
  - id: metrics-word-lower
    desc: metrics word (lowercase)
    crit: baseline
    conf: 0.4
    for: [all]
    if:
      type: string
      word: "metrics"
      section: .text
  - id: metrics-word-title
    desc: Metrics word (title case)
    crit: baseline
    conf: 0.4
    for: [all]
    if:
      type: string
      word: "Metrics"
      section: .text
  - id: statsd-word
    desc: StatsD reference
    crit: baseline
    conf: 0.7
    for: [all]
    if:
      type: string
      word: "statsd"
      section: .text
  - id: datadog-word
    desc: Datadog reference
    crit: baseline
    conf: 0.7
    for: [all]
    if:
      type: string
      word: "datadog"
      section: .text
  - id: opentelemetry-word
    desc: OpenTelemetry reference
    crit: baseline
    conf: 0.8
    for: [all]
    if:
      type: string
      word: "opentelemetry"
      section: .text
  - id: newrelic-word
    desc: NewRelic reference
    crit: baseline
    conf: 0.7
    for: [all]
    if:
      type: string
      word: "NewRelic"
      section: .text
