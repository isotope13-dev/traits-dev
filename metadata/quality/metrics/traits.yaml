# Code Quality Indicators - Metrics
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [source]
traits:
  # === Atomic: Metrics/Telemetry ===
  - id: prometheus-word
    desc: Prometheus reference
    crit: baseline
    conf: 0.7
    if:
      type: string
      word: "prometheus"
      section: .text
  - id: metrics-word-lower
    desc: metrics word (lowercase)
    crit: baseline
    conf: 0.4
    if:
      type: string
      word: "metrics"
      section: .text
  - id: metrics-word-title
    desc: Metrics word (title case)
    crit: baseline
    conf: 0.4
    if:
      type: string
      word: "Metrics"
      section: .text
  - id: statsd-word
    desc: StatsD reference
    crit: baseline
    conf: 0.7
    if:
      type: string
      word: "statsd"
      section: .text
  - id: datadog-word
    desc: Datadog reference
    crit: baseline
    conf: 0.7
    if:
      type: string
      word: "datadog"
      section: .text
  - id: opentelemetry-word
    desc: OpenTelemetry reference
    crit: baseline
    conf: 0.8
    if:
      type: string
      word: "opentelemetry"
      section: .text
  - id: newrelic-word
    desc: NewRelic reference
    crit: baseline
    conf: 0.7
    if:
      type: string
      word: "NewRelic"
      section: .text
