defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries]
traits:
  - id: prometheus-word
    desc: Prometheus reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: prometheus
      section: .text
  - id: metrics-word-lower
    desc: metrics word (lowercase)
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      word: metrics
      section: .text
  - id: metrics-word-title
    desc: Metrics word (title case)
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      word: Metrics
      section: .text
  - id: statsd-word
    desc: StatsD reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: statsd
      section: .text
  - id: datadog-word
    desc: Datadog reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: datadog
      section: .text
  - id: opentelemetry-word
    desc: OpenTelemetry reference
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      word: opentelemetry
      section: .text
  - id: newrelic-word
    desc: NewRelic reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: NewRelic
      section: .text
