# Code Quality Indicators - License
traits:
  # === Atomic: License Information ===
  - id: mit-license-text
    desc: MIT License text
    crit: baseline
    conf: 0.8
    for: [all]
    if:
      type: string
      substr: "MIT License"
      section: .text
  - id: apache-license-text
    desc: Apache License text
    crit: baseline
    conf: 0.8
    for: [all]
    if:
      type: string
      substr: "Apache License"
      section: .text
  - id: gpl-word
    desc: GPL license reference
    crit: baseline
    conf: 0.7
    for: [all]
    if:
      type: string
      word: "GPL"
      section: .text
  - id: bsd-word
    desc: BSD license reference
    crit: baseline
    conf: 0.7
    for: [all]
    if:
      type: string
      word: "BSD"
      section: .text
  - id: license-upper
    desc: LICENSE file reference
    crit: baseline
    conf: 0.6
    for: [all]
    if:
      type: string
      word: "LICENSE"
      section: .text
  - id: copyright-word
    desc: Copyright notice
    crit: baseline
    conf: 0.6
    for: [all]
    if:
      type: string
      word: "Copyright"
      section: .text
  - id: spdx-identifier
    desc: SPDX license identifier
    crit: baseline
    conf: 0.9
    for: [all]
    if:
      type: string
      substr: "SPDX-License-Identifier"
      section: .text
