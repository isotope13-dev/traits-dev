defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.85

composite_rules:
  - id: complex-dll-registration
    desc: DllRegisterServer performs complex actions (suggests stager/loader)
    all:
      - id: micro-behaviors/process/create/spawn::create-process-w
    any:
      - id: micro-behaviors/fs/file/copy::copy
      - id: micro-behaviors/process/create/shell::cmd-exe
