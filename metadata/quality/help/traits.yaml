# Code Quality Indicators - Help
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [source]
traits:
  # === Atomic: Help/Usage ===
  - id: help-long-flag
    desc: --help flag
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "--help"
      section: .text
  - id: help-short-flag
    desc: -h flag
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      exact: "-h"
      section: .text
  - id: usage-lower
    desc: "usage: label (lowercase)"
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: "usage:"
      section: .text
  - id: usage-title
    desc: "Usage: label (title case)"
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: "Usage:"
      section: .text
  - id: options-title
    desc: "Options: label"
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: "Options:"
      section: .text
  - id: usage-upper
    desc: "USAGE: label (uppercase)"
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: "USAGE:"
      section: .text
  - id: libxslt-configure-js
    desc: libxslt configure.js script
    crit: baseline
    conf: 1.0
    if:
      type: raw
      regex: "Configure script for libxslt, specific for Windows"
      section: .text
