# Package Files Array - Count Analysis
# Detects suspicious file inclusion patterns based on count
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
#
# REQUIRES: size_min/size_max KV feature (see KV_ENHANCEMENT_IMPLEMENTATION_PLAN.md)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
  crit: notable
  conf: 0.60
  attack: "T1195.002"
traits:
  # === npm package.json - files array ===

  # Explicit files array with single entry (minimal package)
  - id: npm-single-file-listed
    desc: npm package explicitly lists single file
    crit: notable
    conf: 0.65
    size_min: 1
    size_max: 1
    if:
      type: kv
      path: "files"
  # Two files listed
  - id: npm-two-files-listed
    desc: npm package explicitly lists two files
    crit: notable
    conf: 0.55
    size_min: 2
    size_max: 2
    if:
      type: kv
      path: "files"
  # Few files (1-3)
  - id: npm-few-files-listed
    desc: npm package lists few files (1-3)
    crit: notable
    conf: 0.50
    size_min: 1
    size_max: 3
    if:
      type: kv
      path: "files"
  # Very large files array (potential bloat or hiding)
  # NOTE: size_min here is the FILE SIZE filter (serde flatten captures it
  # for ConditionWithFilters, not Kv::size_min). 10KB+ package.json files
  # are unusually large and may have extensive explicit file listings.
  - id: npm-many-files-listed
    desc: Very large package.json with files
    crit: notable
    conf: 0.55
    size_min: 10000
    if:
      type: kv
      path: "files"
  # Moderate files array
  # NOTE: size_min here is the FILE SIZE filter (see above).
  - id: npm-moderate-files-listed
    desc: Large package.json with files
    crit: notable
    conf: 0.45
    size_min: 5000
    if:
      type: kv
      path: "files"
  # Single binary
  - id: npm-single-bin
    # === npm bin object ===

    desc: npm package defines single binary
    crit: notable
    conf: 0.50
    if:
      type: kv
      path: "bin"
      size_min: 1
      size_max: 1
  # Multiple binaries
  - id: npm-multiple-bins
    desc: npm package defines multiple binaries (5+)
    crit: notable
    conf: 0.55
    if:
      type: kv
      path: "bin"
      size_min: 5
  # === npm engines object ===
  - id: npm-no-engines
    desc: npm package specifies no engine requirements
    crit: notable
    conf: 0.45
    size_max: 0
    if:
      type: kv
      path: "engines"
composite_rules:
  # Hostile composite (npm-single-file-with-hooks) moved to:
  # objectives/supply-chain/npm/malicious-patterns/low-quality-indicators.yaml

  # NOTE: npm-minimal-package removed - depended on broken count-based trait
  # (metadata/quality/dependencies::npm-single-dependency used size_min/size_max
  # which measures file bytes, not dependency count)

  # NOTE: npm-minimal-package-with-hooks removed - depended on broken
  # npm-minimal-package which used non-functional count-based kv traits

  # === Suspicious: Many files + install hooks (hiding payload) ===
  - id: npm-many-files-with-hooks
    desc: Many files with install hooks (potential payload hiding)
    crit: suspicious
    conf: 0.75
    all:
      - id: npm-many-files-listed
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
