# Code Quality Indicators - Testing
defaults:
  platforms: [unix, windows, macos]
  for: [python, javascript, ruby, go]
traits:
  # === Atomic: Test Code ===
  - id: go-test-main
    desc: Go TestMain function
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "TestMain"
  - id: go-test-file
    desc: Go test file suffix
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "_test.go"
  - id: python-test-file
    desc: Python test file suffix
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "_test.py"
  - id: test-file-shell
    desc: Shell test file suffix (.t)
    crit: baseline
    conf: 0.7
    if:
      type: basename
      regex: "\\.t$"
  - id: test-directory
    desc: File in a test directory
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: "^.{0,200}[\\\\/]tests?[\\\\/].{0,200}$|_tests?\\.py$"
  - id: unittest-module
    desc: unittest module
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: "unittest"
  - id: pytest-module
    desc: pytest module
    crit: baseline
    conf: 0.7
    if:
      type: raw
      regex: "import\\s+pytest|from\\s+pytest\\s+import"
  - id: ruby-test-file
    desc: Ruby test file suffix
    crit: baseline
    conf: 0.7
    if:
      type: basename
      regex: "_test\\.rb$"
  - id: ruby-integration-test
    desc: IntegrationTest usage
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "ActionController::IntegrationTest"
