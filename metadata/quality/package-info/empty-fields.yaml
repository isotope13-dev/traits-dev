# Package Information - Empty Fields
# GuardDog-inspired: Detects packages with missing critical metadata
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: notable
  conf: 0.80
traits:
  # === npm package.json ===

  # GuardDog: Empty description
  # Notable alone; becomes suspicious only in composite combinations
  - id: npm-empty-description
    desc: npm package has empty description
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    for: [package.json]
    if:
      type: kv
      path: "description"
      exact: ""
  - id: npm-no-description
    desc: npm package missing description field
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    for: [package.json]
    if:
      type: kv
      path: "description"
      exists: false
  # GuardDog: Empty author
  - id: npm-empty-author
    desc: npm package has empty author
    crit: notable
    conf: 0.75
    for: [package.json]
    if:
      type: kv
      path: "author"
      exact: ""
  - id: npm-no-author
    desc: npm package missing author field
    crit: notable
    conf: 0.75
    for: [package.json]
    if:
      type: kv
      path: "author"
      exists: false
  # License field
  - id: npm-empty-license
    desc: npm package has empty license
    crit: notable
    conf: 0.70
    for: [package.json]
    if:
      type: kv
      path: "license"
      exact: ""
  # Helper: detects older "licenses" array format (pre-npm 2.x convention)
  - id: npm-has-licenses-array
    desc: npm package uses legacy licenses array
    crit: baseline
    conf: 0.9
    for: [package.json]
    if:
      type: kv
      path: "licenses"
      exists: true
  - id: npm-no-license
    desc: npm package missing license field
    crit: notable
    conf: 0.70
    for: [package.json]
    if:
      type: kv
      path: "license"
      exists: false
    unless:
      - type: kv
        path: "licenses"
        exists: true
  # Homepage field
  - id: npm-empty-homepage
    desc: npm package has empty homepage
    crit: notable
    conf: 0.60
    for: [package.json]
    if:
      type: kv
      path: "homepage"
      exact: ""
  # Keywords field
  - id: npm-no-keywords
    desc: npm package has no keywords
    crit: notable
    conf: 0.50
    for: [package.json]
    if:
      type: kv
      path: "keywords"
      exists: false
  # Helper: detects root package.json (has name field)
  # Monorepo subpackages (e.g. date-fns/getUnixTime/package.json) only have
  # module-resolution fields like sideEffects/typings - missing metadata is expected
  - id: npm-has-name
    desc: npm package has name field
    crit: baseline
    conf: 1.0
    for: [package.json]
    if:
      type: kv
      path: "name"
      exists: true
  # GuardDog: Empty description (PyPI)
  - id: pypi-empty-description
    # === PyPI setup.py / PKG-INFO ===

    desc: PyPI package has empty description
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [python]
    if:
      type: string_value
      regex: 'description\s*=\s*[''"]\s*[''"]'
  - id: pypi-empty-summary
    desc: PyPI package has empty summary
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [python]
    if:
      type: string_value
      regex: 'summary\s*=\s*[''"]\s*[''"]'
  # GuardDog: Empty author
  - id: pypi-empty-author
    desc: PyPI package has empty author
    crit: notable
    conf: 0.75
    for: [python]
    if:
      type: string_value
      regex: 'author\s*=\s*[''"]\s*[''"]'
  - id: pypi-empty-author-email
    desc: PyPI package has empty author_email
    crit: notable
    conf: 0.75
    for: [python]
    if:
      type: string_value
      regex: 'author_email\s*=\s*[''"]\s*[''"]'
  # License
  - id: pypi-empty-license
    desc: PyPI package has empty license
    crit: notable
    conf: 0.70
    for: [python]
    if:
      type: string_value
      regex: 'license\s*=\s*[''"]\s*[''"]'
  # URL
  - id: pypi-empty-url
    desc: PyPI package has empty url
    crit: notable
    conf: 0.65
    for: [python]
    if:
      type: string_value
      regex: 'url\s*=\s*[''"]\s*[''"]'
  # GuardDog: Empty description
  - id: gem-empty-description
    # === RubyGems gemspec ===

    desc: RubyGem has empty description
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [ruby]
    if:
      type: string_value
      regex: '\.description\s*=\s*[''"]\s*[''"]'
  - id: gem-empty-summary
    desc: RubyGem has empty summary
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [ruby]
    if:
      type: string_value
      regex: '\.summary\s*=\s*[''"]\s*[''"]'
  # Author
  - id: gem-empty-author
    desc: RubyGem has empty author
    crit: notable
    conf: 0.75
    for: [ruby]
    if:
      type: string_value
      regex: '\.author\s*=\s*[''"]\s*[''"]'
  # Email
  - id: gem-empty-email
    desc: RubyGem has empty email
    crit: notable
    conf: 0.75
    for: [ruby]
    if:
      type: string_value
      regex: '\.email\s*=\s*[''"]\s*[''"]'
  # License
  - id: gem-empty-license
    desc: RubyGem has empty license
    crit: notable
    conf: 0.70
    for: [ruby]
    if:
      type: string_value
      regex: '\.license\s*=\s*[''"]\s*[''"]'
  # Homepage
  - id: gem-empty-homepage
    desc: RubyGem has empty homepage
    crit: notable
    conf: 0.65
    for: [ruby]
    if:
      type: string_value
      regex: '\.homepage\s*=\s*[''"]\s*[''"]'
composite_rules:
  # === npm Composites ===

  # GuardDog: Empty description (any variant)
  # Requires name field - subpackage package.json files legitimately lack description
  - id: npm-empty-description-any
    desc: npm package has empty or missing description
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [package.json]
    all:
      - id: npm-has-name
      - id: metadata/quality/npm/pkg-meta::npm-has-version
    any:
      - id: npm-empty-description
      - id: npm-no-description
    downgrade:
      any:
        - id: metadata/quality/npm/pkg-meta::pkg-skeleton-small
  # Low-quality package (many empty fields)
  # Requires name field to avoid FP on monorepo subpackage package.json files
  - id: npm-low-quality-metadata
    # Hostile composite (npm-critical-metadata-missing) moved to:
    # objectives/lateral-movement/supply-chain/npm/malicious-patterns/low-quality-indicators.yaml

    desc: npm package with incomplete metadata
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [package.json]
    all:
      - id: npm-has-name
      - id: metadata/quality/npm/pkg-meta::npm-has-version
    needs: 3
    any:
      - id: npm-empty-description
      - id: npm-no-description
      - id: npm-empty-author
      - id: npm-no-author
      - id: npm-empty-license
      - id: npm-no-license
      - id: npm-empty-homepage
      - id: npm-no-keywords
    downgrade:
      any:
        - id: metadata/quality/npm/pkg-meta::pkg-skeleton-small
  # GuardDog: Empty PyPI info
  - id: pypi-empty-info
    # === PyPI Composites ===

    desc: PyPI package with empty metadata
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [python]
    needs: 2
    any:
      - id: pypi-empty-description
      - id: pypi-empty-summary
      - id: pypi-empty-author
      - id: pypi-empty-author-email
      - id: pypi-empty-license
  # GuardDog: Empty gem info
  - id: gem-empty-info
    # === RubyGems Composites ===

    desc: RubyGem with empty metadata
    crit: suspicious
    conf: 0.85
    attack: "T1195.002"
    for: [ruby]
    needs: 2
    any:
      - id: gem-empty-description
      - id: gem-empty-summary
      - id: gem-empty-author
      - id: gem-empty-email
      - id: gem-empty-license
