# Code Quality Indicators - Config
traits:
  # === Atomic: Configuration Management ===
  - id: config-yaml-file
    desc: config.yaml filename
    crit: baseline
    conf: 0.6
    for: [all]
    if:
      type: string
      substr: "config.yaml"
      section: .text
  - id: config-json-file
    desc: config.json filename
    crit: baseline
    conf: 0.6
    for: [all]
    if:
      type: string
      substr: "config.json"
      section: .text
  - id: config-toml-file
    desc: config.toml filename
    crit: baseline
    conf: 0.6
    for: [all]
    if:
      type: string
      substr: "config.toml"
      section: .text
  - id: dotenv-file
    desc: .env file reference
    crit: baseline
    conf: 0.6
    for: [all]
    if:
      type: string
      exact: ".env"
      section: .text
  - id: viper-config-lib
    desc: Viper configuration library
    crit: baseline
    conf: 0.7
    for: [go]
    if:
      type: string
      word: "viper"
      section: .text
  - id: configparser-module
    desc: configparser module
    crit: baseline
    conf: 0.7
    for: [python]
    if:
      type: string
      word: "configparser"
      section: .text
  - id: dotenv-module
    desc: dotenv module reference
    crit: baseline
    conf: 0.7
    for: [javascript, python]
    if:
      type: string
      word: "dotenv"
      section: .text
