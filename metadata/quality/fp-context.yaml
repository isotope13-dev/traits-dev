defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: mad-except
    desc: Delphi madExcept error handling
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: madExcept
      section: .rdata
  - id: apiset-stub
    desc: Windows ApiSet Stub DLL
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: ApiSet Stub DLL
      section: .rdata
composite_rules:
  - id: common-fp-context
    desc: Common false positive indicators (Delphi, ApiSet, etc.)
    crit: baseline
    conf: 0.9
    any:
      - id: mad-except
      - id: apiset-stub
      - id: metadata/lang/compiler::delphi
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/valve::valve-corp-binary
