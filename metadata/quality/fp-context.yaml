defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: mad-except
    desc: Delphi madExcept error handling
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: madExcept
      section: .rdata
  - id: apiset-stub
    desc: Windows ApiSet Stub DLL
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: ApiSet Stub DLL
      section: .rdata
  - id: php-manual-link-density
    desc: Dense PHP manual function links
    crit: component
    conf: 0.95
    for: [php]
    platforms: [linux, macos, windows, unix, android, ios]
    count_min: 5
    if:
      type: raw
      regex: '@link\s+https?://php\.net/manual/en/function\.[a-z0-9._-]+\.php'
  - id: php-empty-function-declarations
    desc: Many empty PHP function declarations
    crit: component
    conf: 0.95
    for: [php]
    platforms: [linux, macos, windows, unix, android, ios]
    count_min: 8
    if:
      type: raw
      regex: 'function\s+\w+\s*\([^)]{0,240}\)\s*(:\s*[^{]{1,120})?\{\s*\}'
composite_rules:
  - id: common-fp-context
    desc: Common false positive indicators (Delphi, ApiSet, etc.)
    crit: baseline
    conf: 0.9
    any:
      - id: mad-except
      - id: apiset-stub
      - id: metadata/lang/compiler::delphi
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/valve::valve-corp-binary
  - id: php-manual-empty-function-stubs
    desc: PHP manual API stub declarations
    crit: baseline
    conf: 0.97
    for: [php]
    platforms: [linux, macos, windows, unix, android, ios]
    all:
      - id: php-manual-link-density
      - id: php-empty-function-declarations
