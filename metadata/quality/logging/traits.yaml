# Code Quality Indicators - Logging
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, javascript, ruby, go]
traits:
  # === Atomic: Logging ===
  - id: log-print
    desc: log.Print function
    crit: baseline
    conf: 0.5
    if:
      type: string
      substr: "log.Print"
      section: .text
  - id: logger-lower
    desc: logger reference (lowercase)
    crit: baseline
    conf: 0.4
    if:
      type: string
      word: "logger"
      section: .text
  - id: logger-title
    desc: Logger reference (title case)
    crit: baseline
    conf: 0.4
    if:
      type: string
      word: "Logger"
      section: .text
  - id: logging-word
    desc: logging module reference
    crit: baseline
    conf: 0.5
    if:
      type: string
      word: "logging"
      section: .text
  - id: syslog-word
    desc: syslog reference
    crit: baseline
    conf: 0.6
    if:
      type: string
      word: "syslog"
      section: .text
  - id: log-info-lower
    desc: log.info method (lowercase)
    crit: baseline
    conf: 0.5
    if:
      type: string
      substr: "log.info"
      section: .text
  - id: log-info-title
    desc: log.Info method (title case)
    crit: baseline
    conf: 0.5
    if:
      type: string
      substr: "log.Info"
      section: .text
  - id: log-debug-lower
    desc: log.debug method (lowercase)
    crit: baseline
    conf: 0.5
    if:
      type: string
      substr: "log.debug"
      section: .text
  - id: log-debug-title
    desc: log.Debug method (title case)
    crit: baseline
    conf: 0.5
    if:
      type: string
      substr: "log.Debug"
      section: .text
  - id: log-error-lower
    desc: log.error method (lowercase)
    crit: baseline
    conf: 0.5
    if:
      type: string
      substr: "log.error"
      section: .text
  - id: log-error-title
    desc: log.Error method (title case)
    crit: baseline
    conf: 0.5
    if:
      type: string
      substr: "log.Error"
      section: .text
