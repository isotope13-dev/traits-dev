---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-version-0-0-1
  desc: npm package declares version 0.0.1
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: version
    exact: 0.0.1
- id: conventional-version-base
  desc: Uses standard version format
  if:
    type: value
    path: version
    regex: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
- id: conventional-version-pre-1
  desc: "Uses pre-release version format"
  if:
    type: value
    path: version
    regex: "^[0-9]+\\.[0-9]+\\.[0-9]+-(alpha|beta|rc)"
- id: conventional-version-pre-2
  desc: Uses pre-release version format (next/canary)
  if:
    type: value
    path: version
    regex: "^[0-9]+\\.[0-9]+\\.[0-9]+-(next|canary)"
- id: mature-version
  desc: Major version is 1 or higher
  crit: baseline
  conf: 0.7
  # Only matches semver versions whose MAJOR component is >= 1. Pre-1.0
  # packages (0.y.z) are developmental per semver/npm convention and should
  # not be considered "mature" regardless of how many patches they have.
  if:
    type: value
    path: version
    regex: "^[1-9][0-9]*\\."
  unless:
  - id: calendar-version-date
- id: npm-has-version
  desc: npm package has version field
  crit: baseline
  conf: 1.0
  if:
    type: value
    path: version
    exists: true
- id: npm-security-holder-version
  desc: npm security holder version
  crit: component
  conf: 0.99
  if:
    type: value
    path: version
    exact: 0.0.1-security
- id: calendar-version-date
  desc: Calendar date version
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: version
    regex: '^(19|20)[0-9]{2}((0[1-9]|1[0-2])\.[0-9]+\.[0-9]+|\.[0-9]{1,2}\.[0-9]{1,2})'
- id: version-marker
  desc: Default initial version marker
  crit: component
  conf: 0.7
  platforms: [unix, windows]
  for: [pkginfo]
  if:
    type: text
    substr: "version: 0.1.0"
- id: npm-unrealistic-major-version
  desc: "suspect major version (90+) for npm package"
  crit: notable
  conf: 0.85
  if:
    type: value
    path: version
    regex: "^(9[0-9]|[1-9][0-9]{2,})\\."
  unless:
  - id: metadata/package/manifest/publishing::is-private
  - id: metadata/package/manifest/freeform::official-react-native-package
  - id: metadata/package/testing/presence/harness::test-fixture-directory
  - id: metadata/package/testing/presence/fixture::component-test-package-json
  - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
  - id: calendar-version-date
