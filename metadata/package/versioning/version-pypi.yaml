defaults:
  platforms:
  - unix
  - windows
  crit: notable
  attack: T1195.002
  mbc: E1195
  for:
  - python
  - pkginfo
traits:
- id: suspicious-version-pattern
  desc: Suspicious version number
  crit: suspicious
  conf: 0.55
  for:
  - pkginfo
  size_max: 50000
  if:
    type: text
    regex: version.{0,50}=.{0,50}['"]0\.[0-9]{1,2}['"]
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::pytest-module
- id: pkginfo-lowest-version
  desc: Package metadata declares 0.0.x version
  crit: notable
  conf: 0.65
  if:
    type: value
    path: version
    regex: ^0\.0(\.[0-9]+)?$
  unless:
  - id: metadata/package/testing/presence/fixture/
- id: setup-py-zero-minor-assignment
  desc: setup.py 0.x version assignment
  crit: component
  conf: 0.72
  if:
    type: text
      # Anchor `version` to a token boundary so it matches a real version
      # assignment, not a substring of another identifier (e.g. a bundled
      # component's `BBBversion = '0.2'`).
    regex: (^|[^A-Za-z0-9_])version\s*=\s*['"]0\.[1-9][0-9]?['"]
- id: pkginfo-zero-minor-version
  desc: PKG-INFO starts at 0.x version
  crit: notable
  conf: 0.72
  if:
    type: value
    path: version
    regex: ^0\.[1-9][0-9]?$
- id: package-version-nonzero-major
  desc: Package version has non-zero major
  crit: component
  conf: 0.85
  if:
    type: value
    path: version
    regex: '^[1-9][0-9]*\.'
- id: depconf-high-version-1
  desc: PKG version (100-999)
  if:
    type: value
    path: version
    regex: ^([1-9][0-9]{2})\.
- id: depconf-high-version-2
  desc: PKG version (1000+)
  if:
    type: value
    path: version
    regex: ^([1-9][0-9]{3,})\.
  unless:
  - type: value
    path: version
    regex: ^20[0-9]{2}\.
- id: setup-py-high-version
  desc: setup.py with abnormally high version number
  crit: notable
  conf: 0.85
  size_max: 50000
  if:
    type: text
    regex: (^|[\s(,])version.{0,30}=.{0,30}['"]([1-9][0-9]{2}|[1-9][0-9]{3,})\.
  not:
  - regex: "['\"]20[12][0-9]\\."
  # A PEP 440 pre-release / dev marker (alpha/beta/rc/dev/post) is normal
  # software-lifecycle metadata, not an anomaly on its own — millions of
  # legitimate packages publish 0.x.0aN / 1.0.0rc1 / x.y.dev0. These are
  # corroborating fragments only: the scoring composites in
  # metadata-anomaly/scoring use `pkginfo-dev-version` as benign context (an
  # `unless:` that excuses sparse metadata on a pre-release), so it must not
  # also surface as a standalone notable anomaly.
- id: pkginfo-dev-version-2
  desc: 'pkginfo dev version 2'
  crit: component
  if:
    type: value
    path: version
    regex: (\brc\d|pre|post)
    case_insensitive: true
- id: pkginfo-dev-version-3
  desc: PKG-INFO short alpha/beta marker
  crit: component
  if:
    type: value
    path: version
    regex: (^|[0-9.])(a|b)[0-9]
    case_insensitive: true
- id: pkginfo-inflated-version
  desc: PKG-INFO with inflated version number
  crit: notable
  conf: 0.75
  if:
    type: value
    path: version
    regex: ^([5-9][0-9]|[1-9][0-9]{2,})\.
  unless:
  - type: value
    path: version
    regex: ^20[0-9]{2}\.
- id: whl-inflated-version
  desc: Wheel filename declares inflated version
  crit: notable
  conf: 0.75
  for: [whl]
  if:
    type: value
    path: whl.version
    regex: ^([5-9][0-9]|[1-9][0-9]{2,})\.
  unless:
  - type: value
    path: whl.version
    regex: ^20[0-9]{2}\.
- id: pkginfo-repeated-nine-version
  desc: PKG-INFO uses repeated-nine sentinel version
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: version
    # Repeated-nine release numbers are commonly used as dependency-confusion
    # sentinels; unlike a merely high major, this requires the same placeholder
    # digit in every semantic-version component.
    regex: ^9{2,}\.9{2,}\.9{2,}$
- id: pkginfo-999-version
  desc: PKG-INFO with 999 version
  crit: suspicious
  conf: 0.88
  if:
    type: value
    path: version
    regex: ^999\.
- id: pyproject-inflated-version
  desc: pyproject.toml with inflated version number
  crit: notable
  conf: 0.75
  if:
    type: value
    path: project.version
    regex: ^([5-9][0-9]|[1-9][0-9]{2,})\.
- id: pkginfo-dev-version-1--dev
  desc: PKG-INFO version has dev/alpha/beta (dev)
  crit: component
  if:
    type: value
    path: version
    case_insensitive: true
    regex: dev
- id: pkginfo-dev-version-1--alpha
  desc: PKG-INFO version has dev/alpha/beta (alpha)
  crit: component
  if:
    type: value
    path: version
    case_insensitive: true
    regex: alpha
- id: pkginfo-dev-version-1--beta
  desc: PKG-INFO version has dev/alpha/beta (beta)
  crit: component
  if:
    type: value
    path: version
    case_insensitive: true
    regex: beta
composite_rules:
- id: pkginfo-dev-version-1
  desc: "PKG-INFO version has dev/alpha/beta segment"
  crit: component
  any:
  - id: pkginfo-dev-version-1--dev
  - id: pkginfo-dev-version-1--alpha
  - id: pkginfo-dev-version-1--beta
- id: setup-py-zero-minor-version
  desc: setup.py starts at 0.x version
  crit: notable
  conf: 0.72
  all:
  - id: metadata/package/files/included::setup-py-basename
  - id: setup-py-zero-minor-assignment
  unless:
      # Don't flag a "0.x" text match when the package's actual parsed version
      # has a non-zero major (the package isn't starting at 0.x at all).
  - id: package-version-nonzero-major
- id: depconf-high-version
  desc: PKG-INFO version with abnormally high major number
  crit: suspicious
  conf: 0.85
  any:
  - id: depconf-high-version-1
  - id: depconf-high-version-2
- id: pkginfo-dev-version
  desc: PKG-INFO declares a pre-release or development version
    # Neutral lifecycle fact, not a standalone anomaly (see atom comment above);
    # consumed by metadata-anomaly/scoring composites as a corroborating /
    # benign-context signal.
  crit: component
  conf: 0.8
  any:
  - id: pkginfo-dev-version-1
  - id: pkginfo-dev-version-2
  - id: pkginfo-dev-version-3
