defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - package.json
    - javascript
    - typescript
traits:
  - id: has-jsdoc-type
    desc: Code has JSDoc @type
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: '@type'
  - id: has-jsdoc-example
    desc: Code has JSDoc @example
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: '@example'
  - id: references-readme
    desc: Package references README file
    crit: notable
    conf: 0.8
    for:
      - package.json
    if:
      type: text
      regex: '"readme":|README\\.md|readme\\.md'
  - id: references-license-1
    desc: Package references LICENSE/LICENCE
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: LICENCE
      case_insensitive: true
  - id: references-license-2
    desc: Package references COPYING
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: COPYING
      case_insensitive: true
  - id: references-changelog-1
    desc: Package references CHANGELOG
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: CHANGELOG
      case_insensitive: true
  - id: references-changelog-history
    desc: Package references HISTORY
    if:
      type: text
      word: HISTORY
      case_insensitive: true
  - id: references-changelog-changes
    desc: Package references CHANGES
    if:
      type: text
      word: CHANGES
      case_insensitive: true
  - id: has-changelog-tooling
    desc: Package uses changelog/versioning tooling
    crit: notable
    conf: 0.9
    for:
      - package.json
    if:
      type: text
      regex: '@changesets/|standard-version|semantic-release|conventional-changelog'
    unless:
      - type: text
        exact: standard-version
      - type: text
        exact: semantic-release
      - type: text
        regex: '"(standard-version|semantic-release)"\s*:'
      - type: text
        regex: '"@changesets/[^"]+"\s*:'
  - id: has-license-1
    desc: Package has license (MIT/ISC/Apache/BSD)
    if:
      type: text
      regex: '"license":\\s*"(MIT|ISC|Apache|BSD)'
  - id: has-license-2
    desc: Package has license (GPL/LGPL/MPL/Unlicense)
    if:
      type: text
      regex: '"license":\\s*"(GPL|LGPL|MPL|Unlicense)'
composite_rules:
  - id: has-jsdoc
    desc: Code has JSDoc documentation
    crit: notable
    conf: 0.85
    any:
      - id: metadata/package/documentation::param-annotation
      - id: metadata/package/documentation::return-annotation
      - id: has-jsdoc-type
      - id: has-jsdoc-example
  - id: references-license
    desc: Package references LICENSE file
    crit: notable
    conf: 0.85
    for:
      - package.json
    any:
      - id: references-license-1
      - id: references-license-2
  - id: references-changelog
    desc: Package references CHANGELOG
    crit: notable
    conf: 0.85
    for:
      - package.json
    any:
      - id: references-changelog-1
      - id: references-changelog-history
      - id: references-changelog-changes
  - id: has-license
    desc: Package has license field
    crit: notable
    conf: 0.8
    for:
      - package.json
    any:
      - id: has-license-1
      - id: has-license-2
