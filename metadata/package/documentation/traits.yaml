defaults:
  platforms: [windows, unix]
  for:
    - source
traits:
  - id: rendered-troubleshooting-page
    desc: Rendered troubleshooting documentation page
    crit: baseline
    conf: 1.0
    for: [javascript]
    if:
      type: basename
      exact: troubleshooting
  - id: cross-platform-install-documentation
    desc: README lists Windows/macOS install paths
    crit: baseline
    conf: 0.95
    for: [markdown]
    if:
      type: text
      regex: '(?is)\bWindows\b.{0,600}\bMacOS\b'
    unless:
      - id: well-known/app/yaklang-hack-skills::yaklang-hack-skills-archive-context

  - id: package-doc-reference-basename
    desc: Package documentation basename
    crit: component
    conf: 0.9
    for: [markdown, javascript, text]
    if:
      type: basename
      case_insensitive: true
      regex: '^(README(\.[A-Za-z0-9_-]+)+|Cargo\.toml\.orig)$'
  - id: documentation-dir-path
    desc: File under documentation directory
    crit: baseline
    conf: 0.9
    for: [javascript, text, python]
    if:
      type: path
      dirname: true
      regex: '(^|[\\/])docs?([\\/]|$)'
      case_insensitive: true
  - id: sonar-rule-key
    desc: Sonar rule key field
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '"ruleKey"\s*:\s*"(javascript|typescript):S\d+"'
  - id: sonar-html-description
    desc: Sonar escaped HTML description
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: '"htmlDescription": "\\u003c'
  - id: sonar-eslint-key
    desc: Sonar eslintKey field
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: '"eslintKey":'
  - id: escaped-pre-block
    desc: Escaped HTML pre block
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: \\u003cpre(\s|\\u003e)
  - id: doc-example-label
    desc: Documentation example label
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: Noncompliant|Compliant solution|data-diff-id|Why is this an issue\?
  - id: md-docs-shell-code-fence
    desc: Markdown shell code-fence marker
    crit: baseline
    conf: 0.9
    for: [shell, javascript]
    if:
      type: text
      substr: '```bash'
  - id: python-docstring-triple-double
    desc: Python docstring (triple double quote)
    crit: baseline
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      exact: '"""'
  - id: python-docstring-triple-single
    desc: Python docstring (triple single quote)
    crit: baseline
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      exact: ''''''''
  - id: python-doctest-prompt
    desc: Python doctest prompt
    crit: baseline
    conf: 0.8
    for:
      - python
    if:
      type: text
      regex: '(^|\n)\s*>>>\s+'
  - id: rust-doc-comment
    desc: Rust documentation comment
    crit: baseline
    conf: 0.6
    for:
      - rust
    if:
      type: string_literal
      exact: ///
  - id: javadoc-comment
    desc: JavaDoc comment start
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: /**
  - id: rust-doc-comment-space
    desc: Rust doc comment with space
    crit: baseline
    conf: 0.6
    for:
      - rust
    if:
      type: string_literal
      exact: '/// '
  - id: param-annotation
    desc: '@param annotation'
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: '@param'
  - id: return-annotation
    desc: '@return annotation'
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: '@return'
  - id: sphinx-param
    desc: 'Sphinx :param: directive'
    crit: baseline
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      substr: :param
  - id: sphinx-returns
    desc: 'Sphinx :returns: directive'
    crit: baseline
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      substr: ':returns:'
composite_rules:
  - id: sonar-rule-metadata-record
    desc: Sonar rule metadata record
    crit: component
    conf: 0.98
    all:
      - id: sonar-rule-key
      - id: sonar-html-description
      - id: sonar-eslint-key
  - id: escaped-doc-example
    desc: Escaped documentation example
    crit: component
    conf: 0.95
    all:
      - id: escaped-pre-block
      - id: doc-example-label
  - id: sonar-rule-metadata-json
    desc: Sonar rule metadata JSON
    crit: component
    conf: 0.98
    any:
      - id: sonar-rule-metadata-record
      - id: escaped-doc-example
