defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: webpack-bundled
    desc: Code bundled with webpack
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (webpackChunk|__webpack_modules__)
  - id: rollup-bundled
    desc: Code bundled with rollup
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (_interopDefaultLegacy|_interopNamespace|rollupPluginBabel)
  - id: esbuild-bundled
    desc: esbuild bundle output markers
    crit: baseline
    conf: 0.95
    if:
      type: string_literal
      regex: (__toESM|__toCommonJS|__export|__copyProps)
  - id: parcel-bundled
    desc: Code bundled with Parcel
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (parcelRequire|__parcel__)
  - id: vite-bundled
    desc: Code bundled with Vite
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (__vite__|import\.meta\.hot)
  - id: rolldown-bundled
    desc: Code bundled with Rolldown
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: rolldown/runtime.js
  - id: source-region-bundled
    desc: Bundled source region markers
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: '//#region extensions/'
  - id: typescript-compiled
    desc: TypeScript compile output markers
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: Object\.defineProperty.exports|tslib
  - id: babel-transpiled
    desc: Code transpiled with Babel
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '@babel/(runtime|helpers)|_classCallCheck|_defineProperty\b'
  - id: has-sourcemap
    desc: Code has source map reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: sourceMappingURL=
  - id: cjs2-export
    desc: CommonJS2 module export pattern
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: module\\.exports\\.default|exports\\.default\\s*=
  - id: umd-pattern
    desc: Universal Module Definition pattern
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: typeof exports.{0,20}object.{0,20}typeof module.{0,20}undefined
  - id: esmodule-bundled
    desc: ES module bundle output markers
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: import\*as\s+\w+\s+from
composite_rules: []
