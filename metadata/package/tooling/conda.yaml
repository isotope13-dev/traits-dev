defaults:
  platforms: [unix, windows]
traits:
  - id: conda-env-prefix-vars
    desc: Conda build prefix variables
    crit: component
    conf: 0.95
    for: [shell, batch]
    count_min: 2
    if:
      type: text
      regex: '\b(SRC_DIR|PREFIX|LIBRARY_PREFIX)\b'
  - id: conda-env-platform-vars
    desc: Conda build platform variables
    crit: component
    conf: 0.95
    for: [shell, batch]
    if:
      type: text
      regex: '\b(target_platform|CPU_COUNT|PY_VER|SP_DIR)\b'
  - id: conda-env-cmake-args
    desc: Conda CMAKE_ARGS variable
    crit: component
    conf: 0.95
    for: [shell, batch]
    if:
      type: text
      substr: CMAKE_ARGS
composite_rules:
  - id: conda-recipe-build-script
    desc: Conda recipe build script context
    crit: baseline
    conf: 0.95
    all:
      - id: conda-env-prefix-vars
    any:
      - id: conda-env-platform-vars
      - id: conda-env-cmake-args
