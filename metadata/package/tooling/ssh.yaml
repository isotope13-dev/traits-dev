defaults:
  platforms: [unix]
  for: [shell]
  crit: component
  conf: 0.98

traits:
  - id: ssh-copy-id-basename
    desc: ssh-copy-id basename
    if:
      type: basename
      exact: ssh-copy-id

  - id: ssh-copy-id-purpose-comment
    desc: ssh-copy-id purpose comment
    if:
      type: text
      substr: Shell script to install your public key(s) on a remote machine

  - id: ssh-copy-id-manpage-reference
    desc: ssh-copy-id manpage reference
    if:
      type: text
      substr: ssh-copy-id(1) man page

  - id: ssh-copy-id-usage
    desc: ssh-copy-id usage string
    if:
      type: text
      substr: 'Usage: %s [-h|-?|-f|-n] [-i [identity_file]]'

  - id: ssh-copy-id-remote-shell
    desc: ssh-copy-id remote shell wrapper
    if:
      type: text
      substr: exec sh -c

  - id: ssh-copy-id-remote-install
    desc: ssh-copy-id remote install command
    if:
      type: text
      substr: cat >> .ssh/authorized_keys

  - id: ssh-copy-id-variable-remote-install
    desc: ssh-copy-id variable install command
    if:
      type: text
      substr: 'cat >> "${AUTH_KEY_FILE}"'

composite_rules:
  - id: ssh-copy-id-utility
    desc: Legitimate ssh-copy-id utility
    all:
      - id: ssh-copy-id-basename
      - id: ssh-copy-id-usage
      - id: ssh-copy-id-remote-shell
    any:
      - id: ssh-copy-id-remote-install
      - id: ssh-copy-id-variable-remote-install
