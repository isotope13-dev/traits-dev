defaults:
  platforms: [unix]
  for: [shell]

traits:
- id: autoconf-generated-script
  desc: GNU Autoconf generated script
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'Generated by GNU Autoconf|## M4sh Initialization\. ##|ac_config_headers|exec_prefix='

- id: libtool-generated-script--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'GNU Libtool'
- id: libtool-generated-script--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'libtool \(GNU libtool\)'
- id: libtool-generated-script--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'Configure libtool for the host system'
- id: libtool-generated-script--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'generated from \./build-aux/ltmain\.in'
composite_rules:
- id: libtool-generated-script
  desc: GNU Libtool generated or source script
  crit: component
  conf: 0.95
  any:
  - id: libtool-generated-script--rx-1
  - id: libtool-generated-script--rx-2
  - id: libtool-generated-script--rx-3
  - id: libtool-generated-script--rx-4
  needs: 1
