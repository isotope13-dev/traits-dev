defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: autoconf-generated-script
    desc: GNU Autoconf generated script
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Generated by GNU Autoconf|## M4sh Initialization\. ##|ac_config_headers|exec_prefix='

  - id: libtool-generated-script
    desc: GNU Libtool generated or source script
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'GNU Libtool|libtool \(GNU libtool\)|Configure libtool for the host system|generated from \./build-aux/ltmain\.in'
