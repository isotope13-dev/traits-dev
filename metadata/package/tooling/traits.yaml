defaults:
  platforms: [windows, unix]
  for:
    - package.json
traits:
  - id: has-docs
    desc: Package has documentation directory
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"docs/"|"doc/"|"documentation"\s*:'
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    not:
      - substr: '":memo: Documentation"'
      - regex: '"repository"\s*:\s*\{[^}]{0,120}github\.com/'
  - id: has-github-config-1
    desc: Package references GitHub (config/workflows)
    if:
      type: text
      regex: \\.github|workflows|CONTRIBUTING
  - id: has-github-config-2
    desc: Package references GitHub (docs/security)
    if:
      type: text
      regex: CODE_OF_CONDUCT|SECURITY\\.md
  - id: has-tsconfig
    desc: Package has TypeScript configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: tsconfig\\.json|tsconfig\\.build\\.json
  - id: has-eslint-config
    desc: Package has ESLint configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\.eslintrc|eslint\\.config|"eslintConfig":'
  - id: has-eslint-config-package
    desc: Package is ESLint configuration
    crit: notable
    conf: 0.9
    if:
      type: value
      path: name
      regex: '(^|[/-])eslint-config($|[/-])'
  - id: has-react-eslint-config-package
    desc: Package depends on React ESLint plugins
    crit: component
    conf: 0.88
    if:
      type: value
      path: dependencies
      regex: 'eslint-plugin-react'
  - id: has-prettier-config
    desc: Package has Prettier configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\.prettierrc|prettier\\.config|"prettier":'
  - id: has-babel-config
    desc: Package has Babel configuration
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\\.babelrc|babel\\.config|"babel":'
  - id: has-editorconfig
    desc: Package has editor configuration
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \\.editorconfig
  - id: has-npmignore-or-files
    desc: Package has publishing configuration
    crit: notable
    conf: 0.85
    if:
      type: value
      path: files
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
      - type: value
        path: repository.url
        regex: github\.com/
    not:
      - substr: '"name": "inflight"'
  - id: keyword-mcp
    desc: Package keyword mentions MCP
    crit: component
    conf: 0.9
    if:
      type: value
      path: keywords
      regex: '(?i)\bmcp\b'
  - id: keyword-agent-tooling
    desc: Package keyword mentions agent tooling
    crit: component
    conf: 0.85
    if:
      type: value
      path: keywords
      regex: '(?i)\b(agent|llm|codex|claude)\b'
  - id: description-agent-tooling
    desc: Description mentions AI agent tooling
    crit: component
    conf: 0.85
    if:
      type: value
      path: description
      regex: '(?i)\b(agent|Claude|Codex)\b'
composite_rules:
  - id: mcp-agent-tool-package
    desc: MCP AI agent tooling package
    crit: baseline
    conf: 0.9
    all:
      - id: keyword-mcp
    any:
      - id: keyword-agent-tooling
      - id: description-agent-tooling
  - id: has-github-config
    desc: Package references GitHub configuration
    crit: notable
    conf: 0.9
    any:
      - id: has-github-config-1
      - id: has-github-config-2
  - id: has-react-eslint-config
    desc: Package is React ESLint config
    crit: notable
    conf: 0.9
    all:
      - id: has-eslint-config-package
      - id: has-react-eslint-config-package
