# Code Quality - Composite Rules
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  # Go error handling helper
  - id: go-error-handling
    desc: Go error handling patterns
    crit: baseline
    conf: 0.7
    for: [go]
    needs: 2
    any:
      - {id: 'metadata/package/error-handling::go-err-nil-check'}
      - {id: 'metadata/package/error-handling::go-errors-new'}
      - {id: 'metadata/package/error-handling::go-fmt-errorf'}
  # Rust error handling helper
  - id: rust-error-handling
    desc: Rust error handling patterns
    crit: baseline
    conf: 0.7
    for: [rust]
    needs: 2
    any:
      - {id: 'metadata/package/error-handling::rust-result-type'}
      - {id: 'metadata/package/error-handling::rust-unwrap-or'}
  # Generic try/catch helper
  - id: try-catch-handling
    desc: Try/catch error handling patterns
    crit: baseline
    conf: 0.7
    for: [javascript, python, java, csharp]
    needs: 2
    any:
      - {id: 'metadata/package/error-handling::try-block-open'}
      - {id: 'metadata/package/error-handling::catch-keyword'}
      - {id: 'metadata/package/error-handling::except-keyword'}
      - {id: 'metadata/package/error-handling::finally-keyword'}
  # Error handling patterns (combines all)
  - id: error-handling
    desc: Error-handling pattern markers
    crit: baseline
    conf: 0.8
    any:
      - {id: go-error-handling}
      - {id: rust-error-handling}
      - {id: try-catch-handling}
  # Logging presence
  - id: has-logging
    desc: Application has logging infrastructure
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - {id: 'metadata/package/logging::log-print'}
      - {id: 'metadata/package/logging::logger-lower'}
      - {id: 'metadata/package/logging::logger-title'}
      - {id: 'metadata/package/logging::logging-word'}
      - {id: 'metadata/package/logging::syslog-word'}
      - {id: 'metadata/package/logging::log-info-lower'}
      - {id: 'metadata/package/logging::log-info-title'}
      - {id: 'metadata/package/logging::log-debug-lower'}
      - {id: 'metadata/package/logging::log-debug-title'}
      - {id: 'metadata/package/logging::log-error-lower'}
      - {id: 'metadata/package/logging::log-error-title'}
  # Configuration management
  - id: config-management
    desc: External configuration management
    crit: notable
    conf: 0.85
    any:
      - {id: 'metadata/package/config::config-yaml-file'}
      - {id: 'metadata/package/config::config-json-file'}
      - {id: 'metadata/package/config::config-toml-file'}
      - {id: 'metadata/package/config::dotenv-file'}
      - {id: 'metadata/package/config::viper-config-lib'}
      - {id: 'metadata/package/config::configparser-module'}
      - {id: 'metadata/package/config::dotenv-module'}
  # Version information
  - id: versioned
    desc: Contains version information
    crit: baseline
    conf: 0.85
    any:
      - {id: 'metadata/package/versioning::version-word-lower'}
      - {id: 'metadata/package/versioning::version-colon'}
      - {id: 'metadata/package/versioning::version-v1'}
      - {id: 'metadata/package/versioning::version-v2'}
      - {id: 'metadata/package/versioning::version-upper'}
      - {id: 'metadata/package/versioning::semver-pattern'}
      - {id: 'metadata/package/versioning::pe-version-resource'}
  # Help/usage information
  - id: has-help
    desc: Contains help or usage information
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - {id: 'metadata/package/help::help-long-flag'}
      - {id: 'metadata/package/help::help-short-flag'}
      - {id: 'metadata/package/help::usage-lower'}
      - {id: 'metadata/package/help::usage-title'}
      - {id: 'metadata/package/help::options-title'}
      - {id: 'metadata/package/help::usage-upper'}
  # License information
  - id: licensed
    desc: Contains license information
    crit: notable
    conf: 0.9
    any:
      - {id: 'metadata/package/license::mit-license-text'}
      - {id: 'metadata/package/license::apache-license-text'}
      - {id: 'metadata/package/license::gpl-word'}
      - {id: 'metadata/package/license::bsd-word'}
      - {id: 'metadata/package/license::license-upper'}
      - {id: 'metadata/package/license::copyright-word'}
      - {id: 'metadata/package/license::spdx-identifier'}
  # Documentation strings
  - id: documented
    desc: Contains documentation strings
    crit: baseline
    conf: 0.8
    any:
      - {id: 'metadata/package/documentation::python-docstring-triple-double'}
      - {id: 'metadata/package/documentation::python-docstring-triple-single'}
      - {id: 'metadata/package/documentation::rust-doc-comment'}
      - {id: 'metadata/package/documentation::javadoc-comment'}
      - {id: 'metadata/package/documentation::rust-doc-comment-space'}
      - {id: 'metadata/package/documentation::param-annotation'}
      - {id: 'metadata/package/documentation::return-annotation'}
      - {id: 'metadata/package/documentation::sphinx-param'}
      - {id: 'metadata/package/documentation::sphinx-returns'}
  # Unit test presence (in production binary)
  - id: has-tests
    desc: Embedded test-code markers present
    crit: baseline
    conf: 0.5
    any:
      - {id: 'metadata/package/testing/presence::go-test-main'}
      - {id: 'metadata/package/testing/presence::go-test-file'}
      - {id: 'metadata/package/testing/presence::python-test-file'}
      - {id: 'metadata/package/testing/presence::c-source-test-directory'}
      - {id: 'metadata/package/testing/presence::c-source-test-file'}
      - {id: 'metadata/package/testing/presence::test-directory'}
      - {id: 'metadata/package/testing/presence::unittest-module'}
      - {id: 'metadata/package/testing/presence::pytest-module'}
      - {id: 'metadata/package/testing/harness::rust-test-attr'}
      - {id: 'metadata/package/testing/harness::go-testing-t'}
      - {id: 'metadata/package/testing/harness::go-test'}
      - {id: 'metadata/package/testing/scripted::jest'}
      - {id: 'metadata/package/testing/scripted::mocha'}
      - {id: 'metadata/package/testing/scripted::pytest'}
      - {id: 'metadata/package/testing/harness::test-basename-pattern'}
      - {id: 'metadata/package/testing/harness::node-common-require'}
      - {id: 'metadata/package/testing/harness::v8-mjsunit-assertions'}
      - {id: 'metadata/package/testing/harness::is-test'}
  # Metrics/telemetry
  - id: has-metrics
    desc: Application has metrics/telemetry
    crit: notable
    conf: 0.85
    any:
      - {id: 'metadata/package/metrics::prometheus-word'}
      - {id: 'metadata/package/metrics::metrics-word-lower'}
      - {id: 'metadata/package/metrics::metrics-word-title'}
      - {id: 'metadata/package/metrics::statsd-word'}
      - {id: 'metadata/package/metrics::datadog-word'}
      - {id: 'metadata/package/metrics::opentelemetry-word'}
      - {id: 'metadata/package/metrics::newrelic-word'}
