# Code Quality - Composite Rules
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: mad-except
    desc: Delphi madExcept error handling
    crit: baseline
    conf: 0.9
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: madExcept
      section: ".text"
  - id: apiset-stub
    desc: Windows ApiSet Stub DLL
    crit: baseline
    conf: 0.95
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: ApiSet Stub DLL
      section: ".rdata"
  - id: virtualbox-build-marker
    desc: VirtualBox platform build marker
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: Oracle VirtualBox
      section: ".rdata"
  - id: virtualbox-source-path
    desc: VirtualBox source path marker
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: \src\VBox\
      section: ".rdata"
  - id: virtualbox-support-driver
    desc: VBox support driver reference
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: VBoxSup.sys
      section: ".rdata"
  - id: virtualbox-doc-link
    desc: VirtualBox documentation link
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: https://www.virtualbox.org/
      section: ".rdata"
  - id: virtualbox-runtime-banner
    desc: VirtualBox runtime banner string
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: "VirtualBox executable built for NT or later.\r\n$"
      section: ".rdata"
  - id: ecnet-product-marker
    desc: Bitdefender EcNet product marker
    crit: baseline
    conf: 0.99
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: (?i)(EcNet for GhostR|libEcNet\.dll|\[ECNET\])
      section: ".rdata"
  - id: ecnet-source-path
    desc: EcNet source path marker
    crit: baseline
    conf: 0.99
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: (?i)src\\ecnet_[a-z0-9_]+\.cpp
      section: ".rdata"
  - id: ecnet-scanner-source-path-low
    desc: EcNet low scanner source path marker
    crit: baseline
    conf: 0.99
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: (?i)src\\scanners\\[017]\d{2}_[a-z0-9_]+(?:\.m)?\.cpp
      section: ".rdata"
  - id: ecnet-scanner-source-path-high
    desc: EcNet high scanner source path marker
    crit: baseline
    conf: 0.99
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: (?i)src\\scanners\\[89]\d{2}_[a-z0-9_]+(?:\.m)?\.cpp
      section: ".rdata"
  - id: ecnet-telemetry-schema
    desc: EcNet telemetry schema marker
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: '"MitreIDs"\s*:\s*\[|"HeurID"\s*:'
      section: ".rdata"
  - id: ctc-source-path
    desc: Bitdefender CTC source path marker
    crit: baseline
    conf: 0.99
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)C:\\build\\CTC\\libctc\\'
      section: ".rdata"
  - id: ctc-module-family
    desc: Bitdefender CTC module family marker
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)libctc_[a-z0-9_]+'
      section: ".rdata"
  - id: playnite-sdk
    desc: Playnite SDK marker
    crit: baseline
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: Playnite.SDK
      section: ".rdata"
  - id: playnite-version-header
    desc: Playnite HTTP header marker
    crit: baseline
    conf: 0.95
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: Playnite-Version
      section: ".rdata"
  - id: playnite-plugin-description
    desc: Playnite plugin description
    crit: baseline
    conf: 0.99
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: plugin for Playnite
      section: ".rdata"
  - id: playnite-steamlibrary-name
    desc: SteamLibrary assembly marker
    crit: baseline
    conf: 0.97
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: SteamLibrary.dll
      section: ".rdata"
  - id: php-manual-link-density
    desc: Dense PHP manual function links
    crit: component
    conf: 0.95
    for: [php]
    if:
      type: text
      regex: '@link\s+https?://php\.net/manual/en/function\.[a-z0-9._-]+\.php'
    count_min: 5
  - id: php-empty-function-declarations
    desc: Many empty PHP function declarations
    crit: component
    conf: 0.95
    for: [php]
    if:
      type: text
      regex: 'function\s+\w+\s*\([^)]{0,240}\)\s*(:\s*[^{]{1,120})?\{\s*\}'
    count_min: 8
composite_rules:
  - id: common-fp-context
    desc: Common false positive indicators (Delphi, ApiSet, etc.)
    crit: baseline
    conf: 0.9
    any:
      - {id: mad-except}
      - {id: apiset-stub}
      - {id: 'metadata/lang/compiler/managed::delphi'}
      - {id: bitdefender-ecnet-telemetry}
      - {id: 'metadata/signed/platform::microsoft'}
      - {id: 'metadata/vendor/valve::valve-corp-binary'}
  - id: virtualbox-platform-component
    desc: VirtualBox platform component context
    crit: baseline
    conf: 0.99
    needs: 2
    any:
      - {id: virtualbox-build-marker}
      - {id: virtualbox-source-path}
      - {id: virtualbox-support-driver}
      - {id: virtualbox-doc-link}
      - {id: virtualbox-runtime-banner}
  - id: bitdefender-ecnet-telemetry
    desc: Bitdefender EcNet telemetry library
    crit: baseline
    conf: 0.99
    needs: 2
    any:
      - {id: ecnet-product-marker}
      - {id: ecnet-source-path}
      - {id: ecnet-scanner-source-path-low}
      - {id: ecnet-scanner-source-path-high}
      - {id: ecnet-telemetry-schema}
      - {id: 'metadata/signed/certificate::bitdefender-brand-text'}
  - id: bitdefender-ctc-module
    desc: Bitdefender CTC module context
    crit: baseline
    conf: 0.99
    needs: 2
    any:
      - {id: ctc-source-path}
      - {id: ctc-module-family}
      - {id: 'metadata/signed/certificate::bitdefender-brand-text'}
  - id: php-manual-empty-function-stubs
    desc: PHP manual API stub declarations
    crit: baseline
    conf: 0.97
    for: [php]
    all:
      - {id: php-manual-link-density}
      - {id: php-empty-function-declarations}
  - id: playnite-steam-plugin
    desc: Playnite Steam plugin context
    crit: baseline
    conf: 0.99
    needs: 2
    any:
      - {id: playnite-sdk}
      - {id: playnite-version-header}
      - {id: playnite-plugin-description}
      - {id: playnite-steamlibrary-name}
  # Go error handling helper
  - id: go-error-handling
    desc: Go error handling patterns
    crit: baseline
    conf: 0.7
    for: [go]
    needs: 2
    any:
      - {id: 'metadata/package/error-handling::go-err-nil-check'}
      - {id: 'metadata/package/error-handling::go-errors-new'}
      - {id: 'metadata/package/error-handling::go-fmt-errorf'}
  # Rust error handling helper
  - id: rust-error-handling
    desc: Rust error handling patterns
    crit: baseline
    conf: 0.7
    for: [rust]
    needs: 2
    any:
      - {id: 'metadata/package/error-handling::rust-result-type'}
      - {id: 'metadata/package/error-handling::rust-unwrap-or'}
  # Generic try/catch helper
  - id: try-catch-handling
    desc: Try/catch error handling patterns
    crit: baseline
    conf: 0.7
    for: [javascript, python, java, csharp]
    needs: 2
    any:
      - {id: 'metadata/package/error-handling::try-block-open'}
      - {id: 'metadata/package/error-handling::catch-keyword'}
      - {id: 'metadata/package/error-handling::except-keyword'}
      - {id: 'metadata/package/error-handling::finally-keyword'}
  # Error handling patterns (combines all)
  - id: error-handling
    desc: Proper error handling patterns
    crit: notable
    conf: 0.8
    any:
      - {id: go-error-handling}
      - {id: rust-error-handling}
      - {id: try-catch-handling}
  # Logging presence
  - id: has-logging
    desc: Application has logging infrastructure
    crit: baseline
    conf: 0.85
    needs: 2
    any:
      - {id: 'metadata/package/logging::log-print'}
      - {id: 'metadata/package/logging::logger-lower'}
      - {id: 'metadata/package/logging::logger-title'}
      - {id: 'metadata/package/logging::logging-word'}
      - {id: 'metadata/package/logging::syslog-word'}
      - {id: 'metadata/package/logging::log-info-lower'}
      - {id: 'metadata/package/logging::log-info-title'}
      - {id: 'metadata/package/logging::log-debug-lower'}
      - {id: 'metadata/package/logging::log-debug-title'}
      - {id: 'metadata/package/logging::log-error-lower'}
      - {id: 'metadata/package/logging::log-error-title'}
  # Configuration management
  - id: config-management
    desc: External configuration management
    crit: notable
    conf: 0.85
    any:
      - {id: 'metadata/package/config::config-yaml-file'}
      - {id: 'metadata/package/config::config-json-file'}
      - {id: 'metadata/package/config::config-toml-file'}
      - {id: 'metadata/package/config::dotenv-file'}
      - {id: 'metadata/package/config::viper-config-lib'}
      - {id: 'metadata/package/config::configparser-module'}
      - {id: 'metadata/package/config::dotenv-module'}
  # Version information
  - id: versioned
    desc: Contains version information
    crit: baseline
    conf: 0.85
    any:
      - {id: 'metadata/package/versioning::version-word-lower'}
      - {id: 'metadata/package/versioning::version-colon'}
      - {id: 'metadata/package/versioning::version-v1'}
      - {id: 'metadata/package/versioning::version-v2'}
      - {id: 'metadata/package/versioning::version-upper'}
      - {id: 'metadata/package/versioning::semver-pattern'}
      - {id: 'metadata/package/versioning::pe-version-resource'}
  # Help/usage information
  - id: has-help
    desc: Contains help or usage information
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - {id: 'metadata/package/help::help-long-flag'}
      - {id: 'metadata/package/help::help-short-flag'}
      - {id: 'metadata/package/help::usage-lower'}
      - {id: 'metadata/package/help::usage-title'}
      - {id: 'metadata/package/help::options-title'}
      - {id: 'metadata/package/help::usage-upper'}
  # License information
  - id: licensed
    desc: Contains license information
    crit: notable
    conf: 0.9
    any:
      - {id: 'metadata/package/license::mit-license-text'}
      - {id: 'metadata/package/license::apache-license-text'}
      - {id: 'metadata/package/license::gpl-word'}
      - {id: 'metadata/package/license::bsd-word'}
      - {id: 'metadata/package/license::license-upper'}
      - {id: 'metadata/package/license::copyright-word'}
      - {id: 'metadata/package/license::spdx-identifier'}
  # Documentation strings
  - id: documented
    desc: Contains documentation strings
    crit: notable
    conf: 0.8
    any:
      - {id: 'metadata/package/documentation::python-docstring-triple-double'}
      - {id: 'metadata/package/documentation::python-docstring-triple-single'}
      - {id: 'metadata/package/documentation::rust-doc-comment'}
      - {id: 'metadata/package/documentation::javadoc-comment'}
      - {id: 'metadata/package/documentation::rust-doc-comment-space'}
      - {id: 'metadata/package/documentation::param-annotation'}
      - {id: 'metadata/package/documentation::return-annotation'}
      - {id: 'metadata/package/documentation::sphinx-param'}
      - {id: 'metadata/package/documentation::sphinx-returns'}
  # Unit test presence (in production binary)
  - id: has-tests
    desc: Binary includes test code (unusual in production)
    crit: baseline
    conf: 0.5
    any:
      - {id: 'metadata/package/testing/presence::go-test-main'}
      - {id: 'metadata/package/testing/presence::go-test-file'}
      - {id: 'metadata/package/testing/presence::python-test-file'}
      - {id: 'metadata/package/testing/presence::unittest-module'}
      - {id: 'metadata/package/testing/presence::pytest-module'}
      - {id: 'metadata/package/testing/harness::rust-test-attr'}
      - {id: 'metadata/package/testing/harness::go-testing-t'}
      - {id: 'metadata/package/testing/harness::go-test'}
      - {id: 'metadata/package/testing/scripted::jest'}
      - {id: 'metadata/package/testing/scripted::mocha'}
      - {id: 'metadata/package/testing/scripted::pytest'}
      - {id: 'metadata/package/testing/harness::test-basename-pattern'}
      - {id: 'metadata/package/testing/harness::node-common-require'}
      - {id: 'metadata/package/testing/harness::v8-mjsunit-assert-majority'}
      - {id: 'metadata/package/testing/harness::is-test'}
  # Metrics/telemetry
  - id: has-metrics
    desc: Application has metrics/telemetry
    crit: notable
    conf: 0.85
    any:
      - {id: 'metadata/package/metrics::prometheus-word'}
      - {id: 'metadata/package/metrics::metrics-word-lower'}
      - {id: 'metadata/package/metrics::metrics-word-title'}
      - {id: 'metadata/package/metrics::statsd-word'}
      - {id: 'metadata/package/metrics::datadog-word'}
      - {id: 'metadata/package/metrics::opentelemetry-word'}
      - {id: 'metadata/package/metrics::newrelic-word'}
