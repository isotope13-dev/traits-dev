---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: pm2-repository-url
  desc: PM2 repository URL
  crit: component
  conf: 1.0
  if:
    type: kv
    path: repository.url
    regex: github\.com[/:]Unitech/pm2
- id: has-repository-url
  desc: Package has repository URL
  crit: component
  conf: 0.85
  if:
    type: kv
    path: repository.url
    exists: true
- id: npm-security-holder-repository
  desc: npm security holder repository
  crit: component
  conf: 0.99
  if:
    type: kv
    path: repository
    exact: npm/security-holder
- id: official-react-native-repo
  desc: Package points to React Native monorepo
  crit: component
  conf: 1.0
  if:
    type: kv
    path: repository.url
    regex: github\.com[/:]facebook/react-native(\.git)?$
composite_rules:
- id: official-react-native-repo-package
  desc: Official React Native monorepo package
  crit: component
  conf: 1.0
  all:
  - id: metadata/package/fields/name::official-react-native-scope
  - id: metadata/package/fields/repository::official-react-native-repo
