---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-homepage-field
  desc: Package has homepage URL
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: homepage
    regex: "^https?://"
# Neutral completeness facts: a PyPI/PKG-INFO manifest or pyproject.toml that
# omits its homepage / project URLs. Extremely common in legitimate packages, so
# these are neutral file properties. Supply-chain composites reference them.
- id: pkginfo-no-homepage
  desc: PKG-INFO missing Home-page field
  crit: component
  conf: 0.70
  for: [pkginfo, pyproject.toml]
  if:
    type: value
    path: metadata-version
  unless:
    - type: value
      path: home-page
    - type: text
      substr: "Project-URL:"
- id: pyproject-no-urls
  desc: pyproject.toml with no project URLs
  crit: component
  conf: 0.65
  for: [pyproject.toml]
  if:
    id: metadata/build/pip::pyproject-is-pyproject
  unless:
    - type: text
      substr: "[project.urls]"
# Removed a duplicate, orphaned pypi-no-homepage (the canonical one lives in
# objectives/supply-chain/metadata-anomaly/manifest/pypi/exe-link.yaml and is
# referenced by its supply-chain composites). This relocated copy had no
# referencer and an over-cap unless: chain.
