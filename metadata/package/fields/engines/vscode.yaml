defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: vscode-extension
    desc: Package is a VSCode extension
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: engines.vscode
  - id: vscode-language-pack-name
    desc: VS Code language pack package name
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: name
      regex: '^vscode-language-pack-[a-z]{2,8}(-[a-z0-9]{2,12})?$'
  - id: vscode-language-pack-category
    desc: VS Code language pack category
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: categories[*]
      exact: Language Packs
  - id: vscode-localizations-contribution
    desc: VS Code localization contribution
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: contributes.localizations
      exists: true

composite_rules:
  - id: vscode-language-pack
    desc: Package is a VS Code language pack
    crit: baseline
    conf: 0.98
    all:
      - id: vscode-extension
      - id: vscode-localizations-contribution
    any:
      - id: vscode-language-pack-name
      - id: vscode-language-pack-category
