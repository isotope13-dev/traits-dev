---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-funding
  desc: Package has funding information
  crit: notable
  conf: 0.85
  size_max: 50000
  if:
    type: kv
    path: funding
    exists: true
  unless:
  - type: basename
    regex: "(^|[\\\\/])node_modules[\\\\/].{0,200}[\\\\/]package\\.json$"
  - type: kv
    path: keywords
    regex: tabby-builtin-plugin
  - type: kv
    path: name
    regex: "^tabby($|-)"
  - type: kv
    path: funding.url
    regex: "^https://github\\.com/sponsors/"
