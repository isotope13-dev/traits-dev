---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: peer-range
  desc: Uses version ranges for peer dependencies
  crit: notable
  conf: 0.85
  unless:
  - type: kv
    path: keywords
    regex: tabby-builtin-plugin
  - id: metadata/package/fields/freeform::openclaw-plugin-package
  if:
    type: text
    regex: '"peerDependencies":\s*\{[^}]{0,120}"[>=<^~]'
- id: has-optional-deps
  desc: Package has optional dependencies
  crit: notable
  conf: 0.8
  if:
    type: kv
    path: optionalDependencies
- id: has-peer-deps
  desc: Package has peerDependencies (framework plugin)
  crit: baseline
  conf: 0.85
  if:
    type: kv
    path: peerDependencies
    exists: true
  unless:
  - id: metadata/package/fields/freeform::official-react-native-package
- id: has-dev-deps
  desc: Package has devDependencies
  crit: baseline
  conf: 0.8
  if:
    type: kv
    path: devDependencies
    exists: true
- id: has-runtime-deps
  desc: Package has runtime dependencies
  crit: baseline
  conf: 0.85
  if:
    type: kv
    path: dependencies
    exists: true
- id: workspace-devdependency
  desc: Workspace protocol devDependency
  crit: baseline
  conf: 0.8
  if:
    type: kv
    path: devDependencies.*
    regex: '^workspace:'
- id: official-react-native-codegen-dependency
  desc: Package depends on official React Native codegen
  crit: baseline
  conf: 1.0
  if:
    type: text
    regex: '"@react-native/babel-plugin-codegen"\s*:'
- id: semver-deps
  desc: Uses semantic versioning for dependencies
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '"dependencies".{0,100}"[\\^~][0-9]'
