# Neutral package publish-metadata field markers, used as FP-suppression context
# by other rules (Python PKG-INFO description content-type, npm lock fields).
defaults:
  platforms: [windows, unix]
  size_min: 1
  size_max: 500000000
  crit: baseline
traits:
  - id: pkg-description-content-type-markdown
    desc: "Python PKG-INFO desc-Content-Type markdown"
    for: [python, text]
    if:
      type: text
      substr: 'Description-Content-Type: text/markdown'
  - id: npm-from-field
    desc: npm package _from metadata field
    for: [javascript, package.json]
    if:
      type: text
      substr: '"_from":'
  - id: npm-resolved-field
    desc: npm package _resolved metadata field
    for: [javascript, package.json]
    if:
      type: text
      substr: '"_resolved":'
