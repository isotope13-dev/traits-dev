defaults:
  platforms: [windows, unix]
  for: [package.json]
  crit: baseline
  conf: 0.95
traits:
  - id: openclaw-package-field
    desc: OpenClaw package metadata field
    if:
      type: kv
      path: openclaw
  - id: openclaw-channel-id-field
    desc: OpenClaw channel package metadata
    if:
      type: kv
      path: openclaw.channel.id
  - id: openclaw-runtime-extensions-field
    desc: OpenClaw runtime extension metadata
    if:
      type: kv
      path: openclaw.runtimeExtensions.*
  - id: openclaw-setup-entry-field
    desc: OpenClaw setup entry metadata
    if:
      type: kv
      path: openclaw.setupEntry
  - id: openclaw-peer-dependency
    desc: OpenClaw peer dependency
    if:
      type: kv
      path: peerDependencies.openclaw
composite_rules:
  - id: openclaw-plugin-package
    desc: OpenClaw plugin package metadata
    crit: baseline
    conf: 0.98
    all:
      - id: openclaw-package-field
      - id: openclaw-peer-dependency
    any:
      - id: openclaw-channel-id-field
      - id: openclaw-runtime-extensions-field
      - id: openclaw-setup-entry-field
