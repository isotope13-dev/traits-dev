---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-security-holder-readme-title
  desc: npm security holder README title
  crit: component
  conf: 0.99
  for:
  - markdown
  if:
    type: text
    substr: Security holding package
- id: npm-security-holder-readme-removal
  desc: npm security holder removal notice
  crit: component
  conf: 0.99
  for:
  - markdown
  if:
    type: text
    substr: removed from the registry by the npm security team
- id: npm-security-holder-readme-advisory
  desc: npm security holder advisory link
  crit: component
  conf: 0.98
  for:
  - markdown
  if:
    type: text
    substr: www.npmjs.com/advisories?search=
- id: pkg-skeleton-small
  desc: Tiny package.json (metadata only)
  crit: notable
  conf: 0.7
  size_max: 2048
  unless:
  - id: metadata/package/fields/freeform::pkg-skeleton-benign-context
  - id: metadata/package/testing/presence/fixture::types-private-fixture-package
  - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
- id: ci-badge-reference-a
  desc: References CI service domains
  crit: notable
  conf: 0.8
  unless:
  - type: text
    substr: '"_from":'
  - type: text
    substr: '"_resolved":'
  - type: text
    substr: '"readmeFilename":'
  if:
    type: text
    regex: travis-ci\.org|circleci\.com|codecov\.io|coveralls\.io
- id: npm-template-manifest-placeholder
  desc: npm package manifest template placeholders
  crit: component
  conf: 0.95
  if:
    type: text
    regex: "<%=\\s*project_name\\s*%>"
- id: npm-n8n-node-manifest
  desc: npm package declares n8n node manifest
  crit: component
  conf: 0.92
  if:
    type: value
    path: n8n.n8nNodesApiVersion
    exists: true
- id: npm-module-type-sidecar-type-field
  desc: npm module-format sidecar type field
  crit: component
  conf: 0.95
  size_max: 512
  if:
    type: value
    path: type
    exists: true
- id: npm-module-type-sidecar-dist-path
  desc: npm dist module-format package.json sidecar path
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '[\\/]dist[\\/](esm|cjs|commonjs|module)[\\/]package\.json$'
- id: npm-module-type-sidecar-build-path
  desc: npm build module-format package.json sidecar path
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '[\\/]build[\\/](esm|cjs|commonjs|module)[\\/]package\.json$'
- id: npm-module-type-sidecar-lib-path
  desc: npm lib module-format package.json sidecar path
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '[\\/]lib[\\/](esm|cjs|commonjs|module)[\\/]package\.json$'
- id: ci-badge-reference-b
  desc: References GitHub Actions
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: github\.com/.{0,50}actions
composite_rules:
- id: pkg-skeleton-benign-context
  desc: Benign tiny package metadata context
  crit: component
  conf: 0.95
  any:
  - id: metadata/package/fields/files::has-files-field
  - id: metadata/package/fields/engines::has-engines
  - id: metadata/package/fields/keywords::has-keywords
  - id: metadata/package/fields/dependencies::has-dev-deps
  - id: metadata/package/fields/funding::has-funding
  - id: metadata/package/fields/homepage::has-homepage-field
  - id: metadata/package/fields/repository::has-repository-url
  - id: metadata/package/fields/freeform::npm-security-holder-package
- id: official-react-native-package
  desc: Official React Native package context
  crit: component
  conf: 1.0
  any:
  - id: metadata/package/fields/repository::official-react-native-repo-package
  - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
- id: minimal-cli-stub
  desc: Tiny package.json with declared CLI binary
  crit: component
  conf: 0.9
  all:
  - id: metadata/package/fields/freeform::pkg-skeleton-small
  - id: metadata/package/fields/bin::has-bin-field
- id: npm-module-type-sidecar
  desc: npm module-format package.json sidecar
  crit: component
  conf: 0.95
  all:
  - id: metadata/package/fields/freeform::npm-module-type-sidecar-type-field
  any:
  - id: metadata/package/fields/freeform::npm-module-type-sidecar-dist-path
  - id: metadata/package/fields/freeform::npm-module-type-sidecar-build-path
  - id: metadata/package/fields/freeform::npm-module-type-sidecar-lib-path
- id: official-react-native-package-with-codegen
  desc: Official React Native package with codegen
  crit: component
  conf: 1.0
  all:
  - id: metadata/package/fields/freeform::official-react-native-package
  - id: metadata/package/fields/dependencies::official-react-native-codegen-dependency
- id: conventional-version
  desc: Uses conventional version format
  crit: notable
  conf: 0.75
  any:
  - id: metadata/package/fields/version::conventional-version-base
  - id: metadata/package/fields/version::conventional-version-pre-1
  - id: metadata/package/fields/version::conventional-version-pre-2
- id: npm-security-holder-package
  desc: Official npm security holding package
  crit: notable
  conf: 0.99
  all:
  - id: metadata/package/fields/version::npm-security-holder-version
  - id: metadata/package/fields/description::npm-security-holder-description
  - id: metadata/package/fields/repository::npm-security-holder-repository
- id: npm-security-holder-readme
  desc: Official npm security holder README
  crit: notable
  conf: 0.99
  for:
  - markdown
  all:
  - id: metadata/package/fields/freeform::npm-security-holder-readme-title
  - id: metadata/package/fields/freeform::npm-security-holder-readme-removal
  - id: metadata/package/fields/freeform::npm-security-holder-readme-advisory
- id: ci-badge-reference
  desc: References CI service (professional project)
  crit: notable
  conf: 0.8
  any:
  - id: metadata/package/fields/freeform::ci-badge-reference-a
  - id: metadata/package/fields/freeform::ci-badge-reference-b
- id: npm-malicious-metadata
  desc: Suspicious npm metadata (unrealistic version + suspicious email)
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/package/fields/version::npm-unrealistic-major-version
  - id: metadata/package/fields/author::suspicious-npm-email
- id: npm-metadata-benign-context
  desc: Benign npm metadata context
  crit: component
  any:
  - id: metadata/package/fields/bin::has-bin-field
  - id: metadata/package/fields/private::is-private
  - id: metadata/package/fields/dependencies::has-dev-deps
  - id: metadata/package/fields/files::has-files-field
  - id: metadata/package/fields/engines::has-engines
  - id: metadata/package/fields/contributors::has-contributors
