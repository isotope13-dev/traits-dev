# Composer package manifest (composer.json) identification.
#
# composer.json is the PHP equivalent of package.json / Cargo.toml. Detecting
# it — and reading its `name`, `type`, `keywords`, `license` — gives cleave
# the same benign-context evidence it already has for npm and Cargo packages.
# Library/framework markers (Symfony, Laravel, etc.) extend this base.
defaults:
  platforms: [unix, windows]
  for: [composer.json]
  crit: baseline
  conf: 0.95

traits:
  - id: composer-has-name
    desc: Composer package declares a name
    if:
      type: kv
      path: name
      regex: '^[a-z0-9][a-z0-9_.-]*/[a-z0-9][a-z0-9_.-]*$'

  - id: composer-type-library
    desc: Composer package type library
    if:
      type: kv
      path: type
      exact: library

  - id: composer-type-symfony-bundle
    desc: Composer package type symfony-bundle
    if:
      type: kv
      path: type
      exact: symfony-bundle

  - id: composer-type-project
    desc: Composer package type project
    if:
      type: kv
      path: type
      exact: project

  - id: composer-license-declared
    desc: Composer package declares a license
    if:
      type: kv
      path: license
      exists: true

  - id: composer-requires-symfony
    desc: Requires a Symfony component
    if:
      type: kv
      path: require
      regex: 'symfony/'

  - id: composer-requires-laravel
    desc: Requires the Laravel framework
    if:
      type: kv
      path: require
      regex: 'laravel/framework'

  - id: composer-keyword-workflow
    desc: Composer keyword workflow
    if:
      type: kv
      path: keywords
      exact: workflow

  - id: composer-keyword-state-machine
    desc: Composer keyword state-machine
    if:
      type: kv
      path: keywords
      regex: '^state[ -]machine$'

  - id: composer-keyword-orchestration
    desc: Composer keyword orchestration
    if:
      type: kv
      path: keywords
      exact: orchestration

  - id: composer-keyword-message-driven
    desc: Composer keyword message-driven
    if:
      type: kv
      path: keywords
      exact: message-driven

composite_rules:
  - id: composer-package-manifest
    desc: PHP project carries a composer.json manifest
    any:
      - id: composer-has-name
      - id: composer-type-library
      - id: composer-type-project
      - id: composer-type-symfony-bundle
      - id: composer-license-declared
      - id: composer-requires-symfony
      - id: composer-requires-laravel
