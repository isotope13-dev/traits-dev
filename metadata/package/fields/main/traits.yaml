---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-index-entry
  desc: Package has standard index entry
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: main
    regex: "^(index\\.js|dist/|lib/|src/)"
  unless:
  - id: metadata/package/fields/freeform::official-react-native-package
- id: pkg-main-field
  desc: '"main": field in package.json'
  crit: notable
  conf: 0.6
  unless:
  - type: basename
    regex: "(^|[\\\\/])node_modules[\\\\/].{0,400}[\\\\/]package\\.json$"
  - type: value
    path: devDependencies
    exists: true
  - type: value
    path: name
    exact: tabby
  - type: value
    path: name
    regex: "^tabby-"
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - type: text
    substr: inflight.js
  - type: value
    path: repository.url
    regex: github\.com/
  if:
    type: value
    path: main
    exists: true
- id: pkg-main-native-node
  desc: Package main is native Node addon
  crit: notable
  conf: 0.85
  if:
    type: value
    path: main
    regex: "\\.node$"
- id: main-js-file-entry
  desc: Package main points to JavaScript
  crit: baseline
  conf: 0.82
  if:
    type: value
    path: main
    regex: ^[^"\n]{1,120}\.js$
  unless:
  - id: metadata/package/fields/main::has-index-entry
  - id: metadata/package/fields/freeform::official-react-native-package
- id: main-dist-entrypoint
  desc: Package main targets dist output
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: main
    substr: dist/
