defaults:
  platforms: [windows]
  for: [manifests]
  crit: component
  conf: 0.95

traits:
  - id: playnite-name
    desc: Playnite package marker
    if:
      type: text
      substr: Playnite

  - id: steam-name
    desc: Steam package marker
    if:
      type: text
      substr: Steam

composite_rules:
  - id: playnite-steam-plugin
    desc: Playnite Steam plugin context
    crit: baseline
    conf: 0.98
    all:
      - id: playnite-name
      - id: steam-name
