defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries, scripts, source, manifests, documents, media, data]
  crit: baseline
  conf: 0.99
traits:
  - id: virtualbox-platform-component
    desc: VirtualBox platform component context
    if:
      type: trait
      id: metadata/package::virtualbox-platform-component
  - id: bitdefender-ecnet-telemetry
    desc: Bitdefender EcNet telemetry library
    if:
      type: trait
      id: metadata/package::bitdefender-ecnet-telemetry
  - id: php-manual-empty-function-stubs
    desc: PHP manual API stub declarations
    if:
      type: trait
      id: metadata/package::php-manual-empty-function-stubs
  - id: playnite-steam-plugin
    desc: Playnite Steam plugin context
    if:
      type: trait
      id: metadata/package::playnite-steam-plugin
