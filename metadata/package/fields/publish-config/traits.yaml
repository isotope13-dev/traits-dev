---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-publish-config
  desc: Has publish configuration
  crit: notable
  conf: 0.85
  unless:
  - type: value
    path: devDependencies
    exists: true
  - type: value
    path: repository.url
    regex: github\.com/
  if:
    type: value
    path: publishConfig
    exists: true
