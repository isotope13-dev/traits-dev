---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-files-field
  desc: Package explicitly lists published files
  crit: notable
  conf: 0.8
  if:
    type: kv
    path: files
  not:
  - substr: inflight.js
  - substr: '"tabby-builtin-plugin"'
  - substr: '"name": "inflight"'
  unless:
  - type: kv
    path: devDependencies
    exists: true
  - id: metadata/package/fields/freeform::official-react-native-package
  - type: kv
    path: name
    regex: "^(node-pty|native-process-working-directory)$"
  - type: kv
    path: keywords
    regex: tabby-builtin-plugin
