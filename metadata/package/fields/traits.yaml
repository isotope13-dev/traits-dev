defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - package.json
traits:
  - id: npm-no-name-field
    desc: Package.json has no name field (sub-package)
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: name
      exists: false
  - id: has-index-entry
    desc: Package has standard index entry
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: main
      regex: ^(index\.js|dist/|lib/|src/)
    unless:
      - id: official-react-native-package
  - id: has-types-entry
    desc: Package has TypeScript types entry
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: '"types":\s*"|"typings":\s*"'
  - id: has-side-effects
    desc: Package declares sideEffects
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: '"sideEffects":\s*(false|\[)'
  - id: has-browserslist
    desc: Package has browser target configuration
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: '"browserslist":'
  - id: pkg-main-field
    desc: '"main": field in package.json'
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: '"main":'
  - id: pkg-main-native-node
    desc: Package main is native Node addon
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: main
      regex: \.node$
  - id: pkg-types-field
    desc: '"types": field in package.json'
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: '"types":'
  - id: has-author-email
    desc: Package has author with email
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: '"author":\\s*"[^"]{0,120}@[^"]{0,120}"|"email":\\s*"[^"]{0,120}@'
  - id: has-keywords
    desc: Package has keywords array
    crit: baseline
    conf: 0.75
    if:
      type: kv
      path: keywords
    unless:
      - id: official-react-native-package
  - id: has-engines
    desc: Package specifies Node.js engine version
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: engines.node
    unless:
      - id: official-react-native-package
  - id: has-funding
    desc: Package has funding information
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: funding
      exists: true
  - id: has-bugs-url-field
    desc: Package has bugs/issues URL
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: bugs
  - id: has-homepage-field
    desc: Package has homepage URL
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: homepage
      regex: ^https?://
  - id: has-contributors
    desc: Package has contributors list
    crit: baseline
    conf: 0.85
    if:
      type: kv
      path: contributors
      exists: true
  - id: has-workspaces
    desc: Package uses workspaces (monorepo pattern)
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: workspaces
      exists: true
  - id: is-private
    desc: Package marked as private
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: private
      exact: 'true'
  - id: conventional-version-base
    desc: Uses standard version format
    if:
      type: string_value
      regex: '"version":\s*"[0-9]+\.[0-9]+\.[0-9]+"'
  - id: conventional-version-pre-1
    desc: Uses pre-release version format (alpha/beta/rc)
    if:
      type: string_value
      regex: '"version":\s*"[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)'
  - id: conventional-version-pre-2
    desc: Uses pre-release version format (next/canary)
    if:
      type: string_value
      regex: '"version":\s*"[0-9]+\.[0-9]+\.[0-9]+-(next|canary)'
  - id: mature-version
    desc: Package has mature version number
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '"version":\\s*"[1-9]\\.[1-9]|"version":\\s*"[0-9]+\\.[1-9]+\\.[1-9]'
  - id: has-description
    desc: Package has meaningful description
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: '"description":\\s*"[^"]{20,}"'
  - id: has-bin-field
    desc: Package provides CLI binary
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: bin
  - id: peer-range
    desc: Uses version ranges for peer dependencies
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: '"peerDependencies":\s*\{[^}]{0,120}"[>=<^~]'
  - id: has-optional-deps
    desc: Package has optional dependencies
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: optionalDependencies
  - id: has-platform-restrictions
    desc: Package specifies platform restrictions
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: '"cpu":\s*\[|"os":\s*\[|"libc":\s*\['
  - id: has-peer-deps
    desc: Package has peerDependencies (framework plugin)
    crit: baseline
    conf: 0.85
    if:
      type: kv
      path: peerDependencies
      exists: true
    unless:
      - id: official-react-native-package
  - id: has-dev-deps
    desc: Package has devDependencies
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: devDependencies
      exists: true
  - id: npm-has-version
    desc: npm package has version field
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: version
      exists: true
  - id: pkg-skeleton-small
    desc: Tiny package.json (metadata only)
    crit: notable
    conf: 0.7
    size_max: 2048
  - id: has-files-field
    desc: Package explicitly lists published files
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: files
    unless:
      - id: official-react-native-package
  - id: official-react-native-scope
    desc: Package uses official React Native scope
    crit: component
    conf: 1.0
    if:
      type: kv
      path: name
      regex: "^@react-native/"
  - id: official-react-native-repo
    desc: Package points to React Native monorepo
    crit: component
    conf: 1.0
    if:
      type: kv
      path: repository.url
      exact: "git+ssh://git@github.com/facebook/react-native.git"
  - id: official-react-native-codegen-dependency
    desc: Package depends on official React Native codegen
    crit: baseline
    conf: 1.0
    if:
      type: raw
      regex: '"@react-native/babel-plugin-codegen"\s*:'
  - id: semver-deps
    desc: Uses semantic versioning for dependencies
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: '"dependencies".{0,100}"[\\^~][0-9]'
  - id: has-publish-config
    desc: Has publish configuration
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: '"publishConfig":'
  - id: ci-badge-reference-a
    desc: References CI service domains
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: travis-ci\.org|circleci\.com|codecov\.io|coveralls\.io
  - id: ci-badge-reference-b
    desc: References GitHub Actions
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: github\.com/.{0,50}actions
  - id: scoped-known-org-1
    desc: Package from known org scope (types/babel/rollup/webpack)
    if:
      type: kv
      path: name
      regex: '^@(types|babel|rollup|webpack)/'
  - id: scoped-known-org-2
    desc: Package from known org scope (eslint/angular/vue)
    if:
      type: kv
      path: name
      regex: '^@(eslint|angular|vue)/'
composite_rules:
  - id: official-react-native-package
    desc: Official React Native monorepo package
    crit: component
    conf: 1.0
    all:
      - id: official-react-native-scope
      - id: official-react-native-repo
  - id: minimal-cli-stub
    desc: Tiny package.json with declared CLI binary
    crit: component
    conf: 0.9
    all:
      - id: pkg-skeleton-small
      - id: has-bin-field
  - id: official-react-native-package-with-codegen
    desc: Official React Native package with codegen
    crit: component
    conf: 1.0
    all:
      - id: official-react-native-package
      - id: official-react-native-codegen-dependency
  - id: conventional-version
    desc: Uses conventional version format
    crit: notable
    conf: 0.75
    any:
      - id: conventional-version-base
      - id: conventional-version-pre-1
      - id: conventional-version-pre-2
  - id: scoped-known-org
    desc: Package from known organization scope
    crit: notable
    conf: 0.85
    any:
      - id: scoped-known-org-1
      - id: scoped-known-org-2
  - id: ci-badge-reference
    desc: References CI service (professional project)
    crit: notable
    conf: 0.8
    any:
      - id: ci-badge-reference-a
      - id: ci-badge-reference-b
