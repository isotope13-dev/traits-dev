defaults:
  platforms: [linux, macos, windows]
  for:
    - package.json
traits:
  - id: npm-no-name-field
    desc: Package.json has no name field (sub-package)
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: name
      exists: false
  - id: has-index-entry
    desc: Package has standard index entry
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: main
      regex: ^(index\.js|dist/|lib/|src/)
    unless:
      - id: official-react-native-package
  - id: has-types-entry
    desc: Package has TypeScript types entry
    crit: notable
    conf: 0.9
    size_min: 900
    unless:
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
      - type: kv
        path: name
        regex: ^tabby($|-)
    if:
      type: text
      regex: '"types":\s*"|"typings":\s*"'
  - id: has-side-effects
    desc: Package declares sideEffects
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"sideEffects":\s*(false|\[)'
  - id: has-browserslist
    desc: Package has browser target configuration
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: '"browserslist":'
  - id: pkg-main-field
    desc: '"main": field in package.json'
    crit: notable
    conf: 0.6
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,400}[\\/]package\.json$
      - type: kv
        path: devDependencies
        exists: true
      - type: kv
        path: name
        exact: tabby
      - type: kv
        path: name
        regex: ^tabby-
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
      - type: text
        substr: inflight.js
      - type: kv
        path: repository.url
        regex: github\.com/
    if:
      type: text
      substr: '"main":'
  - id: pkg-main-native-node
    desc: Package main is native Node addon
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: main
      regex: \.node$
  - id: pkg-types-field
    desc: '"types": field in package.json'
    crit: notable
    conf: 0.6
    size_min: 900
    unless:
      - type: kv
        path: name
        regex: ^tabby($|-)
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: text
      substr: '"types":'
  - id: has-author-email
    desc: Package has author with email
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"author":\\s*"[^"]{0,120}@[^"]{0,120}"|"email":\\s*"[^"]{0,120}@'
  - id: has-keywords
    desc: Package has keywords array
    crit: baseline
    conf: 0.75
    if:
      type: kv
      path: keywords
    unless:
      - id: official-react-native-package
  - id: has-engines
    desc: Package specifies Node.js engine version
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: engines.node
    unless:
      - id: official-react-native-package
  - id: has-funding
    desc: Package has funding information
    crit: notable
    conf: 0.85
    size_max: 50000
    if:
      type: kv
      path: funding
      exists: true
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]package\.json$
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
      - type: kv
        path: name
        regex: ^tabby($|-)
      - type: kv
        path: funding.url
        regex: ^https://github\.com/sponsors/
  - id: has-bugs-url-field
    desc: Package has bugs/issues URL
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: bugs
  - id: has-homepage-field
    desc: Package has homepage URL
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: homepage
      regex: ^https?://
  - id: has-repository-url
    desc: Package has repository URL
    crit: component
    conf: 0.85
    if:
      type: kv
      path: repository.url
      exists: true
  - id: has-contributors
    desc: Package has contributors list
    crit: baseline
    conf: 0.85
    if:
      type: kv
      path: contributors
      exists: true
  - id: has-workspaces
    desc: Package uses workspaces (monorepo pattern)
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: workspaces
      exists: true
  - id: is-private
    desc: Package marked as private
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: private
      exact: 'true'
  - id: conventional-version-base
    desc: Uses standard version format
    if:
      type: text
      regex: '"version":\s*"[0-9]+\.[0-9]+\.[0-9]+"'
  - id: conventional-version-pre-1
    desc: Uses pre-release version format (alpha/beta/rc)
    if:
      type: text
      regex: '"version":\s*"[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)'
  - id: conventional-version-pre-2
    desc: Uses pre-release version format (next/canary)
    if:
      type: text
      regex: '"version":\s*"[0-9]+\.[0-9]+\.[0-9]+-(next|canary)'
  - id: mature-version
    desc: Package has mature version number
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '"version":\\s*"[1-9]\\.[1-9]|"version":\\s*"[0-9]+\\.[1-9]+\\.[1-9]'
  - id: has-description
    desc: Package has meaningful description
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"description":\\s*"[^"]{20,}"'
  - id: has-bin-field
    desc: Package provides CLI binary
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: bin
    unless:
      - id: official-react-native-package
      - type: kv
        path: name
        exact: ipv6
      - type: kv
        path: name
        exact: tabby
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,400}[\\/]package\.json$
      - type: kv
        path: name
        regex: ^tabby-
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
  - id: peer-range
    desc: Uses version ranges for peer dependencies
    crit: notable
    conf: 0.85
    unless:
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: text
      regex: '"peerDependencies":\s*\{[^}]{0,120}"[>=<^~]'
  - id: has-optional-deps
    desc: Package has optional dependencies
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: optionalDependencies
  - id: has-platform-restrictions
    desc: Package specifies platform restrictions
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"cpu":\s*\[|"os":\s*\[|"libc":\s*\['
  - id: has-peer-deps
    desc: Package has peerDependencies (framework plugin)
    crit: baseline
    conf: 0.85
    if:
      type: kv
      path: peerDependencies
      exists: true
    unless:
      - id: official-react-native-package
  - id: has-dev-deps
    desc: Package has devDependencies
    crit: baseline
    conf: 0.8
    if:
      type: kv
      path: devDependencies
      exists: true
  - id: npm-has-version
    desc: npm package has version field
    crit: baseline
    conf: 1.0
    if:
      type: kv
      path: version
      exists: true
  - id: npm-security-holder-version
    desc: npm security holder version
    crit: component
    conf: 0.99
    if:
      type: kv
      path: version
      exact: 0.0.1-security
  - id: npm-security-holder-description
    desc: npm security holder description
    crit: component
    conf: 0.99
    if:
      type: kv
      path: description
      exact: security holding package
  - id: npm-security-holder-repository
    desc: npm security holder repository
    crit: component
    conf: 0.99
    if:
      type: kv
      path: repository
      exact: npm/security-holder
  - id: npm-security-holder-readme-title
    desc: npm security holder README title
    crit: component
    conf: 0.99
    for: [markdown]
    if:
      type: text
      substr: "Security holding package"
  - id: npm-security-holder-readme-removal
    desc: npm security holder removal notice
    crit: component
    conf: 0.99
    for: [markdown]
    if:
      type: text
      substr: "removed from the registry by the npm security team"
  - id: npm-security-holder-readme-advisory
    desc: npm security holder advisory link
    crit: component
    conf: 0.98
    for: [markdown]
    if:
      type: text
      substr: "www.npmjs.com/advisories?search="
  - id: pkg-skeleton-small
    desc: Tiny package.json (metadata only)
    crit: notable
    conf: 0.7
    size_max: 2048
    unless:
      - id: pkg-skeleton-benign-context
      - id: metadata/package/testing/presence::react-native-release-fixture-package
  - id: has-files-field
    desc: Package explicitly lists published files
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: files
    not:
      - substr: "inflight.js"
      - substr: '"tabby-builtin-plugin"'
      - substr: '"name": "inflight"'
    unless:
      - type: kv
        path: devDependencies
        exists: true
      - id: official-react-native-package
      - type: kv
        path: name
        regex: ^(node-pty|native-process-working-directory)$
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
  - id: official-react-native-scope
    desc: Package uses official React Native scope
    crit: component
    conf: 1.0
    if:
      type: kv
      path: name
      regex: "^(@react-native/|react-native$)"
  - id: official-react-native-repo
    desc: Package points to React Native monorepo
    crit: component
    conf: 1.0
    if:
      type: kv
      path: repository.url
      regex: "github\\.com[/:]facebook/react-native(\\.git)?$"
  - id: official-react-native-codegen-dependency
    desc: Package depends on official React Native codegen
    crit: baseline
    conf: 1.0
    if:
      type: text
      regex: '"@react-native/babel-plugin-codegen"\s*:'
  - id: semver-deps
    desc: Uses semantic versioning for dependencies
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"dependencies".{0,100}"[\\^~][0-9]'
  - id: has-publish-config
    desc: Has publish configuration
    crit: notable
    conf: 0.85
    unless:
      - type: kv
        path: devDependencies
        exists: true
      - type: kv
        path: repository.url
        regex: github\.com/
    if:
      type: text
      substr: '"publishConfig":'
  - id: ci-badge-reference-a
    desc: References CI service domains
    crit: notable
    conf: 0.8
    unless:
      - type: text
        substr: '"_from":'
      - type: text
        substr: '"_resolved":'
      - type: text
        substr: '"readmeFilename":'
    if:
      type: text
      regex: travis-ci\.org|circleci\.com|codecov\.io|coveralls\.io
  - id: ci-badge-reference-b
    desc: References GitHub Actions
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: github\.com/.{0,50}actions
  - id: scoped-known-org-1
    desc: Package from known org scope (types/babel/rollup/webpack)
    if:
      type: kv
      path: name
      regex: '^@(types|babel|rollup|webpack)/'
  - id: scoped-known-org-2
    desc: Package from known org scope (eslint/angular/vue)
    if:
      type: kv
      path: name
      regex: '^@(eslint|angular|vue)/'
  - id: has-preinstall-script
    desc: Package has preinstall script
    crit: notable
    conf: 0.95
    unless:
      - type: kv
        path: scripts.preinstall
        exact: "npx only-allow pnpm"
    if:
      type: kv
      path: scripts.preinstall
      exists: true
  - id: preinstall-curl
    desc: curl command in preinstall script
    crit: notable
    conf: 0.95
    if:
      type: kv
      path: scripts.preinstall
      substr: "curl"
  - id: preinstall-curl-data-urlencode
    desc: curl with data-urlencode in preinstall script
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: scripts.preinstall
      substr: "--data-urlencode"
  - id: preinstall-hostname
    desc: hostname in preinstall script
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: scripts.preinstall
      substr: "hostname"
  - id: preinstall-whoami
    desc: whoami in preinstall script
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: scripts.preinstall
      regex: "\\bwhoami\\b"
  - id: preinstall-pwd
    desc: pwd in preinstall script
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: scripts.preinstall
      substr: "pwd"
  - id: preinstall-oast-domain
    desc: OAST domain in preinstall script
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: scripts.preinstall
      substr: ".oast."
  - id: preinstall-http-url
    desc: HTTP URL in preinstall script
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: scripts.preinstall
      substr: "http://"
  - id: preinstall-curl-dynamic-subdomain
    desc: Curl to variable subdomain in preinstall
    crit: suspicious
    conf: 0.96
    if:
      type: kv
      path: scripts.preinstall
      regex: 'curl\s+"?http://\$[a-z_][a-z0-9_]*\.[a-z0-9.-]+/'
  - id: preinstall-xxd-hex-encode
    desc: Preinstall hex encodes with xxd
    crit: suspicious
    conf: 0.94
    if:
      type: kv
      path: scripts.preinstall
      substr: "xxd -p"
  - id: preinstall-path-segment-labels
    desc: Preinstall splits path into DNS labels
    crit: suspicious
    conf: 0.97
    if:
      type: kv
      path: scripts.preinstall
      regex: 'IFS="/".{0,40}read -ra path_segments'
  - id: preinstall-sysinfo-loop
    desc: Preinstall loops over three sysinfo values
    crit: suspicious
    conf: 0.96
    if:
      type: kv
      path: scripts.preinstall
      regex: 'for info in "\$[a-z_]+".{0,24}"\$[a-z_]+".{0,24}"\$[a-z_]+"; do'
  - id: preinstall-path-branch
    desc: Preinstall branches on current path value
    crit: suspicious
    conf: 0.96
    if:
      type: kv
      path: scripts.preinstall
      regex: '\[\s*"\$info"\s*==\s*"\$[a-z_]*path"\s*\]'
  - id: preinstall-hex-label-join
    desc: Preinstall joins hex labels with dots
    crit: suspicious
    conf: 0.96
    if:
      type: kv
      path: scripts.preinstall
      substr: 'hex_data="$hex_data.$encoded"'
  - id: preinstall-dot-trimmed-labels
    desc: Preinstall trims leading dot from labels
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: scripts.preinstall
      substr: "sed 's/^\\.//'"
  - id: preinstall-hex-token
    desc: Hex token in preinstall script
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: scripts.preinstall
      regex: "[0-9a-f]{32}"
  - id: suspicious-npm-email
    desc: Suspicious npm user email pattern
    crit: suspicious
    conf: 0.90
    if:
      type: kv
      path: "_npmUser.email"
      regex: "[a-z0-9]{6,}@gmail\\.com"
  - id: npm-unrealistic-major-version
    desc: Unrealistic major version (90+) for npm package
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: version
      regex: "^(9[0-9]|[1-9][0-9]{2,})\\."
    unless:
      - id: metadata/package/fields::is-private
      - id: official-react-native-package
      - id: metadata/package/testing/presence::test-fixture-directory
      - id: metadata/package/testing/presence::component-test-package-json
      - id: metadata/package/testing/presence::react-native-release-fixture-package
composite_rules:
  - id: pkg-skeleton-benign-context
    desc: Benign tiny package metadata context
    crit: component
    conf: 0.95
    any:
      - id: has-files-field
      - id: has-engines
      - id: has-keywords
      - id: has-dev-deps
      - id: has-funding
      - id: has-homepage-field
      - id: has-repository-url
      - id: npm-security-holder-package
  - id: official-react-native-package
    desc: Official React Native monorepo package
    crit: component
    conf: 1.0
    all:
      - id: official-react-native-scope
      - id: official-react-native-repo
  - id: minimal-cli-stub
    desc: Tiny package.json with declared CLI binary
    crit: component
    conf: 0.9
    all:
      - id: pkg-skeleton-small
      - id: has-bin-field
  - id: official-react-native-package-with-codegen
    desc: Official React Native package with codegen
    crit: component
    conf: 1.0
    all:
      - id: official-react-native-package
      - id: official-react-native-codegen-dependency
  - id: conventional-version
    desc: Uses conventional version format
    crit: notable
    conf: 0.75
    any:
      - id: conventional-version-base
      - id: conventional-version-pre-1
      - id: conventional-version-pre-2
  - id: npm-security-holder-package
    desc: Official npm security holding package
    crit: notable
    conf: 0.99
    all:
      - id: npm-security-holder-version
      - id: npm-security-holder-description
      - id: npm-security-holder-repository
  - id: npm-security-holder-readme
    desc: Official npm security holder README
    crit: notable
    conf: 0.99
    for: [markdown]
    all:
      - id: npm-security-holder-readme-title
      - id: npm-security-holder-readme-removal
      - id: npm-security-holder-readme-advisory
  - id: scoped-known-org
    desc: Package from known organization scope
    crit: notable
    conf: 0.85
    any:
      - id: scoped-known-org-1
      - id: scoped-known-org-2
  - id: ci-badge-reference
    desc: References CI service (professional project)
    crit: notable
    conf: 0.8
    any:
      - id: ci-badge-reference-a
      - id: ci-badge-reference-b
  - id: preinstall-oast-endpoint
    desc: OAST endpoint in preinstall script
    crit: suspicious
    conf: 0.95
    all:
      - id: preinstall-oast-domain
      - id: preinstall-http-url
      - id: preinstall-hex-token
  - id: preinstall-hex-subdomain-exfil
    desc: Preinstall exfil via hex subdomain curl
    crit: suspicious
    conf: 0.98
    all:
      - id: preinstall-http-url
      - id: preinstall-curl-dynamic-subdomain
      - id: preinstall-xxd-hex-encode
  - id: preinstall-path-segment-dns-exfil
    desc: Preinstall path hex split into DNS labels
    crit: suspicious
    conf: 0.99
    all:
      - id: preinstall-hex-subdomain-exfil
      - id: preinstall-path-segment-labels
      - id: preinstall-hex-label-join
      - id: preinstall-dot-trimmed-labels
  - id: preinstall-looped-path-segment-dns-exfil
    desc: Preinstall loops sysinfo into split hex DNS labels
    crit: suspicious
    conf: 0.99
    all:
      - id: preinstall-hostname-whoami-pwd
      - id: preinstall-path-segment-dns-exfil
      - id: preinstall-sysinfo-loop
      - id: preinstall-path-branch
  - id: preinstall-hostname-whoami
    desc: preinstall script reads hostname and whoami
    crit: suspicious
    conf: 0.95
    all:
      - id: preinstall-hostname
      - id: preinstall-whoami
  - id: preinstall-hostname-whoami-pwd
    desc: preinstall script exfiltrates hostname/whoami/pwd
    crit: suspicious
    conf: 0.98
    all:
      - id: preinstall-hostname-whoami
      - id: preinstall-pwd
  - id: npm-preinstall-curl-exfil
    desc: Malicious preinstall script with curl data exfiltration
    crit: suspicious
    conf: 0.95
    all:
      - id: has-preinstall-script
      - id: preinstall-curl
      - id: preinstall-curl-data-urlencode
  - id: npm-preinstall-info-exfil
    desc: preinstall script exfiltrates system info to external endpoint
    crit: suspicious
    conf: 0.98
    all:
      - id: has-preinstall-script
      - id: preinstall-hostname-whoami-pwd
    any:
      - id: preinstall-oast-endpoint
      - id: preinstall-hex-subdomain-exfil
  - id: npm-malicious-metadata
    desc: Suspicious npm metadata (unrealistic version + suspicious email)
    crit: suspicious
    conf: 0.90
    all:
      - id: npm-unrealistic-major-version
      - id: suspicious-npm-email
