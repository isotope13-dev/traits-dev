---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-no-name-field
  desc: Package.json has no name field (sub-package)
  crit: notable
  conf: 0.9
  if:
    type: value
    path: name
    exists: false
  unless:
  - type: text
    substr: '"private": true'
- id: pm2-package-name
  desc: PM2 package name
  crit: component
  conf: 1.0
  if:
    type: value
    path: name
    exact: pm2
- id: official-react-native-scope
  desc: Package uses official React Native scope
  crit: component
  conf: 1.0
  if:
    type: value
    path: name
    regex: "^(@react-native/|react-native$)"
- id: scoped-known-org-1
  desc: 'Package from known org scope'
  if:
    type: value
    path: name
    regex: "^@(types|babel|rollup|webpack)/"
- id: scoped-known-org-2
  desc: "Package from org scope (eslint/angular/vue)"
  if:
    type: value
    path: name
    regex: "^@(eslint|angular|vue)/"
- id: npm-hyphenated-multiword-name
  desc: npm hyphenated multiword name
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: name
    regex: "^[a-z][a-z0-9]{0,60}(-[a-z][a-z0-9]{0,60}){1,8}$"
composite_rules:
- id: official-pm2-package
  desc: Official PM2 package context
  crit: component
  conf: 1.0
  all:
  - id: metadata/package/fields/name::pm2-package-name
  - id: metadata/package/fields/repository::pm2-repository-url
- id: scoped-known-org
  desc: Package from known organization scope
  crit: notable
  conf: 0.85
  any:
  - id: metadata/package/fields/name::scoped-known-org-1
  - id: metadata/package/fields/name::scoped-known-org-2
