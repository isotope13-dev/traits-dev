---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-bin-field
  desc: Package provides CLI binary
  crit: notable
  conf: 0.8
  if:
    type: value
    path: bin
  unless:
  - id: metadata/package/fields/freeform::official-react-native-package
  - type: value
    path: name
    exact: ipv6
  - id: well-known/app/tabby::tabby-basename
  - id: metadata/package/files::node-modules-nested-package-json
  - type: value
    path: name
    regex: "^tabby-"
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
- id: bin-js-entry
  desc: Package bin points to JavaScript
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: bin
    regex: \.js
  unless:
  - type: value
    path: name
    exact: ipv6
- id: bin-dist-entrypoint
  desc: Package bin targets dist output
  crit: baseline
  conf: 0.85
  if:
    type: value
    path: bin
    regex: dist/
