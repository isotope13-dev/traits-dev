---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-bin-field
  desc: Package provides CLI binary
  crit: notable
  conf: 0.8
  if:
    type: kv
    path: bin
  unless:
  - id: metadata/package/fields/freeform::official-react-native-package
  - type: kv
    path: name
    exact: ipv6
  - type: kv
    path: name
    exact: tabby
  - type: basename
    regex: "(^|[\\\\/])node_modules[\\\\/].{0,400}[\\\\/]package\\.json$"
  - type: kv
    path: name
    regex: "^tabby-"
  - type: kv
    path: keywords
    regex: tabby-builtin-plugin
- id: bin-js-entry
  desc: Package bin points to JavaScript
  crit: baseline
  conf: 0.8
  if:
    type: kv
    path: bin
    regex: \.js
  unless:
  - type: kv
    path: name
    exact: ipv6
