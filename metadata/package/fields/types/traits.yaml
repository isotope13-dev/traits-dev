---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-types-entry
  desc: Package has TypeScript types entry
  crit: notable
  conf: 0.9
  size_min: 900
  unless:
  - type: kv
    path: keywords
    regex: tabby-builtin-plugin
  - type: kv
    path: name
    regex: "^tabby($|-)"
  if:
    type: text
    regex: '"types":\s*"|"typings":\s*"'
- id: pkg-types-field
  desc: '"types": field in package.json'
  crit: notable
  conf: 0.6
  size_min: 900
  unless:
  - type: kv
    path: name
    regex: "^tabby($|-)"
  - type: kv
    path: keywords
    regex: tabby-builtin-plugin
  if:
    type: kv
    path: types
    exists: true
