---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: conventional-version-base
  desc: Uses standard version format
  if:
    type: kv
    path: version
    regex: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
- id: conventional-version-pre-1
  desc: Uses pre-release version format (alpha/beta/rc)
  if:
    type: kv
    path: version
    regex: "^[0-9]+\\.[0-9]+\\.[0-9]+-(alpha|beta|rc)"
- id: conventional-version-pre-2
  desc: Uses pre-release version format (next/canary)
  if:
    type: kv
    path: version
    regex: "^[0-9]+\\.[0-9]+\\.[0-9]+-(next|canary)"
- id: mature-version
  desc: Package has mature version number
  crit: notable
  conf: 0.7
  if:
    type: kv
    path: version
    regex: "^([1-9]\\.[1-9]|[0-9]+\\.[1-9]+\\.[1-9])"
- id: npm-has-version
  desc: npm package has version field
  crit: baseline
  conf: 1.0
  if:
    type: kv
    path: version
    exists: true
- id: npm-security-holder-version
  desc: npm security holder version
  crit: component
  conf: 0.99
  if:
    type: kv
    path: version
    exact: 0.0.1-security
- id: npm-unrealistic-major-version
  desc: Unrealistic major version (90+) for npm package
  crit: notable
  conf: 0.85
  if:
    type: kv
    path: version
    regex: "^(9[0-9]|[1-9][0-9]{2,})\\."
  unless:
  - id: metadata/package/fields/private::is-private
  - id: metadata/package/fields/freeform::official-react-native-package
  - id: metadata/package/testing/presence/harness::test-fixture-directory
  - id: metadata/package/testing/presence/fixture::component-test-package-json
  - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
