defaults:
  platforms: [unix, windows]
  for: [json]
  crit: component
  conf: 0.92

# NOTE: top-level `name`/`version` are universal JSON-manifest fields (npm,
# OOMOL skill _meta.json, every package manifest has them), so they are NOT
# conda-distinctive and were removed — tagging them "Conda index ..." mislabeled
# any JSON. The conda-exclusive signal is `build` + `subdir` together, which the
# conda-index-metadata composite below now anchors on. Generic name/version live
# at metadata/package/fields/{name,version}/ (scoped to package.json).
traits:
  - id: conda-index-build
    desc: Conda index build string
    if:
      type: value
      path: build
  - id: conda-index-subdir
    desc: Conda index target subdir
    if:
      type: value
      path: subdir
  - id: conda-index-noarch-python
    desc: Conda index noarch Python
    if:
      type: value
      path: noarch
      exact: python
  - id: conda-about-summary
    desc: Conda about package summary
    if:
      type: value
      path: summary
  - id: conda-about-home
    desc: Conda about homepage URL
    if:
      type: value
      path: home
  # `license` is a universal manifest field (not conda-distinctive); the
  # conda-about-metadata composite anchors on summary + home (the conda
  # about.json field names — npm uses homepage/description) instead.
  - id: conda-about-description-field
    desc: Conda about long description
    if:
      type: value
      path: description
      regex: '.{80,}'
  - id: conda-forge-channel
    desc: Conda-forge channel URL
    if:
      type: value
      path: channels[0]
      regex: 'https://conda\.anaconda\.org/conda-forge/?'
  - id: conda-forge-feedstock-url
    desc: Conda-forge feedstock URL
    if:
      type: value
      path: extra.remote_url
      regex: 'github\.com/conda-forge/[^/]+-feedstock'

composite_rules:
  - id: conda-index-metadata
    desc: Conda index package metadata
    crit: baseline
    conf: 0.95
    # build + subdir together are conda-exclusive (no npm/generic manifest has a
    # top-level `subdir` like "noarch"/"linux-64" alongside a `build` string).
    all:
      - id: conda-index-build
      - id: conda-index-subdir
  - id: conda-noarch-python-package
    desc: Conda noarch Python package
    crit: baseline
    conf: 0.95
    all:
      - id: conda-index-noarch-python
      - id: conda-index-subdir
  - id: conda-about-metadata
    desc: Conda about package metadata
    crit: baseline
    conf: 0.95
    all:
      - id: conda-about-summary
      - id: conda-about-home
  - id: conda-about-description
    desc: Conda about includes description
    crit: baseline
    conf: 0.95
    all:
      - id: conda-about-description-field
      - id: conda-about-summary
  - id: conda-forge-provenance
    desc: Conda-forge feedstock provenance
    crit: baseline
    conf: 0.95
    all:
      - id: conda-forge-channel
      - id: conda-forge-feedstock-url
