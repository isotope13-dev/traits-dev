defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: package-name
    desc: React Native vector-icons fixture package name
    crit: notable
    conf: 1.0
    if:
      type: value
      path: name
      exact: react-native-vector-icons

  - id: fixture-path
    desc: Package manifest under a fixtures directory
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(^|[\\/])__fixtures__[\\/]'

  - id: repository
    desc: React Native vector-icons source repository
    crit: notable
    conf: 1.0
    if:
      type: value
      path: repository.url
      exact: git://github.com/oblador/react-native-vector-icons.git

composite_rules:
  - id: package-context
    desc: React Native vector-icons Android config fixture
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: fixture-path
      - id: repository
