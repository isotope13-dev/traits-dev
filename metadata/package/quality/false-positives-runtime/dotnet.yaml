defaults:
  platforms: [unix, windows]

traits:
  - id: dotnet-runtime-pack-name
    desc: Microsoft .NET runtime pack identity
    crit: notable
    conf: 0.99
    for: [nupkg, macho]
    if:
      type: path
      substr: Microsoft.NETCore.App.Runtime.osx-x64
  - id: dotnet-runtime-createdump-member
    desc: .NET macOS crash-dump helper
    crit: notable
    conf: 0.99
    for: [macho]
    if:
      type: basename
      exact: createdump

composite_rules:
  - id: dotnet-runtime-pack-context
    desc: Microsoft .NET runtime pack context
    crit: exception
    conf: 0.99
    for: [nupkg]
    scope: outer
    all:
      - id: dotnet-runtime-pack-name
      - id: dotnet-runtime-createdump-member
