defaults:
  platforms: [windows, unix]
  for: [pkginfo]
  crit: component
  conf: 0.9

traits:
  - id: pkginfo-core-metadata
    desc: Declares Python Core Metadata version
    conf: 1.0
    if:
      type: text
      regex: '^Metadata-Version:\s*[0-9]+(\.[0-9]+)?$'
  - id: pkginfo-name-field
    desc: Declares Python package name
    if:
      type: text
      regex: '^Name:\s*\S[^\r\n]{0,240}$'
  - id: pkginfo-version-field
    desc: Declares Python package version
    if:
      type: text
      regex: '^Version:\s*\S[^\r\n]{0,120}$'
  - id: pkginfo-summary-field
    desc: Declares Python package summary
    if:
      type: text
      regex: '^Summary:\s*[^\r\n]{12,300}$'
  - id: pkginfo-non-latin-summary
    desc: Python package summary uses Cyrillic or Greek
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: '[Ͱ-ϿА-яЁё]'
  - id: pkginfo-requires-python
    desc: Declares supported Python versions
    if:
      type: text
      regex: '^Requires-Python:\s*\S[^\r\n]{0,120}$'
  - id: pkginfo-requires-dist
    desc: Declares Python runtime dependencies
    if:
      type: text
      regex: '^Requires-Dist:\s*\S[^\r\n]{0,300}$'
  - id: pkginfo-license-expression
    desc: Declares Python license expression
    if:
      type: text
      regex: '^License-Expression:\s*\S[^\r\n]{0,200}$'
  - id: pkginfo-license-file
    desc: Declares Python package license file
    if:
      type: text
      regex: '^License-File:\s*\S[^\r\n]{0,240}$'
  - id: pkginfo-markdown-description
    desc: Declares Markdown package description
    if:
      type: text
      regex: '^Description-Content-Type:\s*text/markdown\s*$'
  - id: wheel-archive-member
    desc: Python wheel archive metadata
    conf: 0.98
    for: [whl]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '\.dist-info/WHEEL$'

composite_rules:
  - id: pypi-basic-metadata
    desc: PyPI package declares name, version, summary
    crit: baseline
    conf: 0.95
    all:
      - id: pkginfo-core-metadata
      - id: pkginfo-name-field
      - id: pkginfo-version-field
      - id: pkginfo-summary-field
  - id: pypi-runtime-metadata
    desc: PyPI package declares Python and dependencies
    crit: baseline
    conf: 0.94
    all:
      - id: pkginfo-core-metadata
      - id: pkginfo-requires-python
      - id: pkginfo-requires-dist
  - id: pypi-license-metadata
    desc: PyPI package declares license information
    crit: baseline
    conf: 0.94
    all:
      - id: pkginfo-core-metadata
    any:
      - id: pkginfo-license-expression
      - id: pkginfo-license-file
  - id: pypi-rich-metadata
    desc: PyPI package declares comprehensive metadata
    crit: baseline
    conf: 0.95
    all:
      - id: pkginfo-core-metadata
    needs: 4
    any:
      - id: pypi-basic-metadata
      - id: pypi-runtime-metadata
      - id: pypi-license-metadata
      - id: pkginfo-markdown-description
