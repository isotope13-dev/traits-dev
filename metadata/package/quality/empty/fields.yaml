defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
traits:
  - id: npm-empty-description
    desc: package.json description field is empty
    crit: baseline
    conf: 0.85
    for:
      - package.json
    if:
      type: value
      path: description
      exact: ''
  - id: npm-no-description
    desc: npm package missing description field
    crit: baseline
    conf: 0.85
    for:
      - package.json
    if:
      type: value
      path: description
      exists: false
    unless:
      - type: text
        substr: '"private": true'
      - type: text
        substr: 'workspace:'
      - type: text
        substr: '"catalog:'
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: npm-empty-author
    desc: package.json author field is empty
    crit: baseline
    conf: 0.75
    for:
      - package.json
    size_max: 50000
    if:
      type: value
      path: author
      exact: ''
    unless:
      - id: metadata/package/manifest/freeform::npm-security-holder-package
      - id: metadata/package/files/dependency::node-modules-nested-package-json
      - type: text
        substr: 'tabby-builtin-plugin'
      - type: value
        path: name
        exact: cycle
      - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
    downgrade:
      any:
        - id: metadata/package/manifest/freeform::official-react-native-package
  - id: npm-no-author
    desc: npm package missing author field
    crit: baseline
    conf: 0.75
    for:
      - package.json
    if:
      type: value
      path: author
      exists: false
    unless:
      - type: value
        path: version
        exact: 0.0.1-security
      - type: value
        path: repository
        exact: npm/security-holder
      - id: metadata/package/manifest/freeform::npm-security-holder-package
      - id: npm-benign-missing-author-context
  - id: npm-empty-license
    desc: npm package has empty license
    crit: baseline
    conf: 0.7
    for:
      - package.json
    if:
      type: value
      path: license
      exact: ''
    unless:
      - id: metadata/package/manifest/freeform::npm-security-holder-package
  # npm-freeform-license lives in metadata/package/license/freeform.yaml
  # alongside the composer/cargo/pyproject variants of the same signal.
  - id: npm-has-licenses-array
    desc: npm package uses legacy licenses array
    crit: notable
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: licenses
      exists: true
  - id: npm-no-license
    desc: npm manifest lacks a license field
    crit: baseline
    conf: 0.7
    for:
      - package.json
    if:
      type: value
      path: license
      exists: false
    unless:
      - id: metadata/package/manifest/freeform::npm-security-holder-package
      - type: text
        substr: '"private": true'
      - type: value
        path: licenses
        exists: true
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
      - type: text
        substr: 'workspace:'
      - type: text
        substr: '"catalog:'
  # Homepage is routinely omitted even by well-formed OSS packages; empty
  # homepage alone is baseline. It still contributes to the
  # `npm-low-quality-metadata` composite when combined with other empties.
  - id: npm-empty-homepage
    desc: npm package has empty homepage
    crit: baseline
    conf: 0.6
    for:
      - package.json
    if:
      type: value
      path: homepage
      exact: ''
  - id: npm-no-keywords
    desc: package.json has no keywords
    crit: baseline
    conf: 0.5
    for:
      - package.json
    if:
      type: value
      path: keywords
      exists: false
    unless:
      - id: metadata/package/manifest/freeform::npm-security-holder-package
      - type: text
        substr: '"private": true'
      - type: text
        substr: 'workspace:'
      - type: text
        substr: '"catalog:'
  - id: npm-has-name
    desc: package.json defines a package name
    crit: baseline
    conf: 1.0
    for:
      - package.json
    if:
      type: value
      path: name
      exists: true
  - id: npm-nameless-dependency-manifest
    desc: Tiny dependency manifest omits name and version
    crit: baseline
    conf: 0.9
    for: [package.json]
    size_max: 1024
    if:
      type: value
      path: dependencies
      exists: true
    unless:
      - id: npm-has-name
      - id: metadata/package/versioning::npm-has-version
  - id: npm-has-maintainers
    desc: npm package has maintainers field
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: value
      path: maintainers
      exists: true
  - id: pypi-empty-description
    desc: PyPI package has empty description
    crit: notable
    conf: 0.85
    attack: T1195.002
    for:
      - python
    unless:
      - type: string_literal
        substr: '```python'
    if:
      type: string_literal
      regex: description\s*=\s*['"]\s*['"]
  - id: pypi-empty-summary
    desc: PyPI package has empty summary
    crit: notable
    conf: 0.85
    attack: T1195.002
    for:
      - python
    if:
      type: string_literal
      regex: summary\s*=\s*['"]\s*['"]
  - id: pypi-empty-author
    desc: PyPI package has empty author
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: string_literal
      regex: author\s*=\s*['"]\s*['"]
  - id: pypi-empty-author-email
    desc: PyPI package has empty author_email
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: string_literal
      regex: author_email\s*=\s*['"]\s*['"]
  - id: pypi-empty-license
    desc: PyPI package has empty license
    crit: notable
    conf: 0.7
    for:
      - python
    if:
      type: string_literal
      regex: license\s*=\s*['"]\s*['"]
  - id: pypi-empty-url
    desc: PyPI package has empty url
    crit: notable
    conf: 0.65
    for:
      - python
    if:
      type: string_literal
      regex: url\s*=\s*['"]\s*['"]
  - id: gem-empty-description
    desc: RubyGem has empty description
    crit: notable
    conf: 0.85
    attack: T1195.002
    for:
      - ruby
    if:
      type: string_literal
      regex: \.description\s*=\s*['"]\s*['"]
  - id: gem-empty-summary
    desc: RubyGem has empty summary
    crit: notable
    conf: 0.85
    attack: T1195.002
    for:
      - ruby
    if:
      type: string_literal
      regex: \.summary\s*=\s*['"]\s*['"]
  - id: gem-empty-author
    desc: RubyGem has empty author
    crit: notable
    conf: 0.75
    for:
      - ruby
    if:
      type: string_literal
      regex: \.author\s*=\s*['"]\s*['"]
  - id: gem-empty-email
    desc: RubyGem has empty email
    crit: notable
    conf: 0.75
    for:
      - ruby
    if:
      type: string_literal
      regex: \.email\s*=\s*['"]\s*['"]
  - id: gem-empty-license
    desc: RubyGem has empty license
    crit: notable
    conf: 0.7
    for:
      - ruby
    if:
      type: string_literal
      regex: \.license\s*=\s*['"]\s*['"]
  - id: gem-empty-homepage
    desc: RubyGem has empty homepage
    crit: notable
    conf: 0.65
    for:
      - ruby
    if:
      type: string_literal
      regex: \.homepage\s*=\s*['"]\s*['"]
composite_rules:
  - id: npm-benign-missing-author-context
    desc: Benign missing-author package context
    crit: component
    conf: 1.0
    for:
      - package.json
    any:
      - id: metadata/package/manifest/freeform::npm-security-holder-package
      - id: metadata/package/manifest/description::npm-security-holder-description
      - id: metadata/package/files/dependency::node-modules-nested-package-json
      - id: npm-has-maintainers
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
      - id: metadata/package/manifest/name::npm-no-name-field
      - id: objectives/supply-chain/install-hook/package/manifest::tabby-builtin-plugin-keyword
      - id: metadata/package/dependencies::npm-monorepo-workspace-dep
      - id: metadata/package/quality/scoring::npm-native-addon-wrapper
      - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
  - id: npm-skeleton-fabricated-license
    desc: Metadata-only npm package with a fabricated non-SPDX license
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    for:
      - package.json
    # A placeholder package that ships nothing but name/version plus a
    # freeform marketing "license" string is the classic namespace-reservation
    # / campaign-staging shape (weaponised in a later version or sibling
    # packages). pkg-skeleton-small already excludes packages with real
    # context (files/repo/deps/keywords/...), keeping false positives low.
    all:
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
      - id: metadata/package/license::manifest-freeform-license
    unless:
      - id: metadata/package/manifest/freeform::pkg-skeleton-benign-context
      # A package.json under node_modules describes an installed dependency,
      # not a public namespace-reservation package being published.
      - id: metadata/package/files/dependency::node-modules-nested-package-json
  - id: npm-empty-description-any
    desc: Package description metadata is empty or absent
    crit: baseline
    conf: 0.85
    for:
      - package.json
    all:
      - id: npm-has-name
      - id: metadata/package/versioning::npm-has-version
    any:
      - id: npm-empty-description
      - id: npm-no-description
    downgrade:
      any:
        - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: npm-low-quality-metadata
    desc: npm package with incomplete metadata
    crit: baseline
    conf: 0.85
    for:
      - package.json
    unless:
      - id: metadata/package/manifest/freeform::npm-security-holder-package
    all:
      - id: npm-has-name
      - id: metadata/package/versioning::npm-has-version
    needs: 3
    any:
      - id: npm-empty-description
      - id: npm-no-description
      - id: npm-empty-author
      - id: npm-no-author
      - id: npm-empty-license
      - id: npm-no-license
      - id: npm-empty-homepage
      - id: npm-no-keywords
    downgrade:
      any:
        - id: metadata/package/manifest/freeform::pkg-skeleton-small
        - id: metadata/package/manifest/homepage::has-homepage-field
  - id: pypi-empty-info
    desc: PyPI package with empty metadata
    crit: notable
    conf: 0.85
    attack: T1195.002
    for:
      - python
    needs: 2
    any:
      - id: pypi-empty-description
      - id: pypi-empty-summary
      - id: pypi-empty-author
      - id: pypi-empty-author-email
      - id: pypi-empty-license
  - id: gem-empty-info
    desc: RubyGem with empty metadata
    crit: notable
    conf: 0.85
    attack: T1195.002
    for:
      - ruby
    needs: 2
    any:
      - id: gem-empty-description
      - id: gem-empty-summary
      - id: gem-empty-author
      - id: gem-empty-email
      - id: gem-empty-license
