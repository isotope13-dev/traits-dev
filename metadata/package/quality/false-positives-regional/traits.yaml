defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.95

traits:
  - id: google-regional-search-domain-list
    desc: Embedded Google regional search list
    if:
      type: text
      regex: 'https://www\.google\.[A-Za-z]{2,3}/search\*'
    count_min: 10
