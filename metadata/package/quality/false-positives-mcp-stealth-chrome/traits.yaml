defaults:
  platforms: [unix, windows]
traits:
- id: package-name
  desc: mcp-stealth-chrome package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: mcp-stealth-chrome
- id: source-tree-path
  desc: mcp-stealth-chrome source tree identity
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: path
    regex: '(?i)(^|[\\/])mcp_stealth_chrome[\\/]'
composite_rules:
- id: benign-automation-context
  desc: Recognized mcp-stealth-chrome browser automation context
  crit: exception
  conf: 0.99
  for: [pkginfo, python, whl]
  any:
    - id: package-name
    - id: source-tree-path
  scope: archive
