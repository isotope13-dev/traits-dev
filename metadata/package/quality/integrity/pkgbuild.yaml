# PKGBUILD source-integrity anomaly (T1195.002).
#
# A fixed remote archive fetched WITHOUT checksum verification and WITHOUT PGP
# signing is the content-swap enabler behind review-clean-then-swap AUR attacks:
# the package passes review, then the maintainer (or a takeover actor) replaces
# the bytes at the source URL with a trojanized archive that pacman fetches
# unverified. Legitimate packaging pins a digest, signs with PGP, or uses a
# revision-pinned VCS source — all excluded below.
defaults:
  platforms: [linux]
  for: [shell]
  attack: T1195.002

composite_rules:
  - id: pkgbuild-unverified-remote-source
    desc: PKGBUILD fetches a remote archive with no integrity check
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/build/package::pkgbuild-checksum-skip
      - id: metadata/build/package::pkgbuild-remote-archive-source
    unless:
      - id: metadata/build/package::pkgbuild-validpgpkeys
      - id: metadata/build/package::pkgbuild-vcs-source
