# Release clients legitimately read CI tokens to authenticate GitLab's API.
# Keep that capability notable, but suppress credential-theft composites only
# for code that also implements the GitLab v4 release workflow.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: gitlab-release-api-v4
    desc: GitLab Release API v4 endpoint
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'gitlab\.com/api/v4'
  - id: gitlab-release-create-method
    desc: GitLab release creation method
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: createRelease
  - id: gitlab-release-update-method
    desc: GitLab release update method
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: updateRelease

composite_rules:
  - id: gitlab-release-client-context
    desc: Recognized GitLab CI release client authentication context
    crit: exception
    conf: 0.98
    all:
      - id: micro-behaviors/os/env/vars/ci-credentials::gitlab-token-env-read
      - id: micro-behaviors/os/env/vars/ci-credentials::ci-job-token-other-read
      - id: gitlab-release-api-v4
    any:
      - id: gitlab-release-create-method
      - id: gitlab-release-update-method
