# The h4-debug wheel is a local application debugger.  Its documented
# dashboard, loopback WebSocket, child-process sitecustomize injection, and
# Python REPL are the intended implementation of that debugger, not a command
# channel added by an installer or a remote agent.
defaults:
  platforms: [unix, windows]

traits:
  - id: h4-debugger-summary
    desc: Debugger package summary
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: summary
      regex: '(?i)^Advanced application proxy debugger and F12-style web console$'

composite_rules:
  - id: h4-debugger-repl-context
    desc: Recognized h4-debug local debugger REPL context
    crit: exception
    conf: 0.99
    for: [whl]
    scope: outer
    all:
      - id: h4-debugger-summary
      - id: micro-behaviors/communications/http/server/framework::fastapi-import
      - id: micro-behaviors/communications/websocket/server::fastapi-websocket-route
      - id: micro-behaviors/process/hook/interception::python-sitecustomize-child-injection
      - id: micro-behaviors/process/interpreter/python::eval-builtin
      - id: micro-behaviors/process/interpreter/python::exec-builtin
