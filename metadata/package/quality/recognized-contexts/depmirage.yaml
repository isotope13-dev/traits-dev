defaults:
  platforms: [unix, windows]
traits:
- id: depmirage-pypi-package
  desc: depmirage PyPI package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: depmirage
- id: depmirage-project-repository
  desc: depmirage project repository identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: project-url[*]
    substr: github.com/AABurmov18/depmirage
- id: depmirage-python-module
  desc: depmirage Python module import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    regex: '^depmirage(\.|$)'
composite_rules:
- id: depmirage-defensive-scanner-context
  desc: Recognized depmirage dependency scanner context
  crit: exception
  conf: 0.99
  for: [pkginfo, python, whl]
  all:
    - id: depmirage-pypi-package
    - id: depmirage-project-repository
  scope: archive
