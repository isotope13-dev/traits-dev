---
defaults:
  platforms: [unix, windows]
  for: [pe, xml]

traits:
  - id: dotnet-reference-pack-name
    desc: Microsoft .NET reference pack name
    crit: notable
    conf: 0.99
    if:
      type: path
      substr: Microsoft.NETCore.App.Ref
  - id: dotnet-reference-pack-ref-directory
    desc: .NET reference assembly directory path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(?i)(^|[\\/])ref[\\/]'

composite_rules:
  - id: dotnet-reference-pack-context
    desc: Microsoft .NET reference pack context
    crit: exception
    conf: 0.99
    all:
      - id: dotnet-reference-pack-name
      - id: dotnet-reference-pack-ref-directory
