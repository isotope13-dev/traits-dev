defaults:
  platforms: [unix, windows]

traits:
  - id: source-tree-path
    desc: StackRox upstream source tree path
    crit: notable
    conf: 1.0
    for: [shell, go, json, python]
    if:
      type: path
      substr: github.com/stackrox/stackrox@

  - id: ci-script-path
    desc: StackRox CI script path
    crit: notable
    conf: 1.0
    for: [shell]
    if:
      type: path
      regex: 'stackrox@[0-9A-Za-z._+-]+[\\/]scripts[\\/]ci'

  - id: release-helper-path
    desc: StackRox release helper script path
    crit: notable
    conf: 1.0
    for: [shell]
    if:
      type: basename
      exact: get-github-release.sh

  - id: package-fixture-basename
    desc: StackRox package fixture filename
    crit: notable
    conf: 1.0
    for: [go]
    if:
      type: basename
      exact: packages_fixture.go

  - id: cluster-ci-script-path
    desc: StackRox cluster CI helper path
    crit: notable
    conf: 1.0
    for: [python]
    if:
      type: basename
      exact: clusters.py

composite_rules:
  - id: ci-source-context
    desc: StackRox upstream CI source context
    crit: exception
    conf: 1.0
    scope: file
    all:
      - id: source-tree-path
      - id: ci-script-path

  - id: release-helper-context
    desc: StackRox upstream release helper source context
    crit: exception
    conf: 1.0
    scope: file
    all:
      - id: source-tree-path
      - id: release-helper-path

  - id: vm-fixture-context
    desc: StackRox defensive VM fixture context
    crit: exception
    conf: 1.0
    scope: file
    all:
      - id: source-tree-path
      - id: package-fixture-basename

  - id: stackrox-cluster-ci-context
    desc: StackRox upstream cluster CI context
    crit: exception
    conf: 1.0
    scope: file
    all:
      - id: source-tree-path
      - id: cluster-ci-script-path
