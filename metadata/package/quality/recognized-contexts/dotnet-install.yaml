defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: dotnet-install-script-url
    desc: Official .NET SDK install script URL
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: 'https://dot\.net/v1/dotnet-install\.sh'

composite_rules:
  - id: dotnet-sdk-bootstrap-context
    desc: Official .NET SDK bootstrap script context
    crit: exception
    conf: 0.99
    all:
      - id: dotnet-install-script-url
      - id: micro-behaviors/communications/http/download/shell::shell-script-url-download
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: micro-behaviors/process/create/script/file::shell-script-relative-execution
