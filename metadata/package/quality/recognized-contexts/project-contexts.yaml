defaults:
  platforms: [unix, windows]

traits:
  - id: shopify-perf-kit-marker
    desc: Shopify performance kit marker
    crit: notable
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: Shopify/perf-kit is not initialized
  - id: shopify-perf-kit-endpoint
    desc: Shopify performance telemetry endpoint
    crit: notable
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: monorail-edge.shopifysvc.com/v1/produce
  - id: mdn-date-reference-title
    desc: MDN JavaScript Date reference title
    crit: notable
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: Date time string format
  - id: mdn-date-reference-api
    desc: References MDN documentation for Date.prototype
    crit: notable
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: Date.prototype

composite_rules:
  - id: shopify-perf-kit-context
    desc: Recognized Shopify performance kit bundle
    crit: exception
    conf: 1.0
    all:
      - id: shopify-perf-kit-marker
      - id: shopify-perf-kit-endpoint
  - id: mdn-date-reference-context
    desc: Recognized MDN JavaScript Date reference
    crit: exception
    conf: 1.0
    all:
      - id: mdn-date-reference-title
      - id: mdn-date-reference-api
  - id: wordpress-w3-ftp-configuration-context
    desc: W3 Total Cache FTP CDN configuration context
    crit: exception
    conf: 0.99
    all:
      - id: well-known/app/wordpress-plugins::wordpress-plugin-path-w3-total-cache
      - id: micro-behaviors/communications/ftp/client::php-ftp-client-session
