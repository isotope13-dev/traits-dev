defaults:
  platforms: [unix, windows]

traits:
- id: es6-shim-package-name
  desc: es6-shim npm package name
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: name
    exact: es6-shim
- id: es6-shim-project-repository
  desc: es6-shim upstream repository identity
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: repository.url
    substr: github.com/paulmillr/es6-shim
- id: es6-shim-sauce-connect-script
  desc: es6-shim Sauce Connect test bootstrap script
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: text
    regex: 'gist\.githubusercontent\.com/henrikhodne/9322897/raw/sauce-connect\.sh'
- id: es6-shim-author
  desc: es6-shim upstream author identity
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: author
    regex: '(?i)^Paul Miller\b'
- id: es6-shim-pipe-script
  desc: es6-shim Sauce Connect shell pipe
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: text
    regex: '\|\s*bash'
- id: aube-external-tools-source-path
  desc: Aube pinned external-tools source path
  crit: notable
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: path
    regex: '(^|[\/])external-tools\.mts$'
- id: aube-external-tools-verifier
  desc: Aube external-tool archive SRI verification
  crit: notable
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: text
    regex: 'createHash\([\x27"]sha512[\x27"]\)'
- id: aube-github-release-auth-gate
  desc: Aube GitHub-only token gate
  crit: notable
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: text
    regex: 'new\s+URL\(url\)\.hostname\s*===\s*[\x27"]github\.com[\x27"]'

composite_rules:
- id: es6-shim-sauce-connect-indicators
  desc: es6-shim package and Sauce Connect indicators
  crit: notable
  conf: 0.99
  for: [package.json]
  all:
  - id: es6-shim-package-name
  - id: es6-shim-project-repository
  - id: es6-shim-sauce-connect-script
  - id: es6-shim-author
- id: es6-shim-sauce-connect-pipe-gate
  desc: es6-shim Sauce Connect pipe-execute gate
  crit: notable
  conf: 0.99
  for: [package.json]
  all:
  - id: es6-shim-sauce-connect-indicators
  - id: es6-shim-pipe-script
- id: aube-external-tools-download-context
  desc: Recognized Aube pinned release downloader
  crit: exception
  conf: 0.99
  for: [javascript, typescript]
  all:
  - id: aube-external-tools-source-path
  - id: aube-external-tools-verifier
  - id: aube-github-release-auth-gate
