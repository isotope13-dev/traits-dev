defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.95

traits:
  - id: frida-server-artifact-path-context
    desc: Frida server artifact path context
    for: [elf, javascript]
    size_min: 1000
    size_max: 50000000
    if:
      type: path
      substr: frida-server-
  - id: frida-artifact-path-context
    desc: Recognized Frida release artifact path
    for: [elf, macho, pe, data]
    size_min: 1000
    size_max: 300000000
    if:
      type: path
      regex: '(^|[\\/])frida-(server|portal|agent|gadget|inject|clr)-'
