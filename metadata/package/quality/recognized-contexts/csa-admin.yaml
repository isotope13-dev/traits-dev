defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

# CSA Admin's administrator code-editor preview intentionally evaluates the
# server-rendered JavaScript returned by its same-origin preview endpoint.
traits:
  - id: code-editor-preview-fetch-context
    desc: Code editor preview fetch workflow
    crit: notable
    conf: 0.97
    if:
      type: text
      word: fetchPreview

  - id: code-editor-preview-response-eval
    desc: Preview evaluates server response
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'response\.text\(\)[\s\S]{0,240}eval\s*\(\s*js\s*\)'

composite_rules:
  - id: code-editor-preview-eval-context
    desc: Code editor preview evaluates server JavaScript
    crit: exception
    conf: 0.98
    all:
      - id: code-editor-preview-fetch-context
      - id: code-editor-preview-response-eval
