defaults:
  platforms: [unix, windows]

# These are documented OpenShift release CI steps.  The context traits are
# deliberately tied to both the upstream source path and the exact helper
# being fetched, so a generic download/execute chain remains visible.
traits:
  - id: openshift-release-source-tree
    desc: OpenShift release source tree
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: path
      substr: github.com/openshift/release@

  - id: openshift-vale-review-step-path
    desc: OpenShift Vale review CI step
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: basename
      exact: validatedpatterns-vale-review-commands.sh

  - id: validatedpatterns-vale-helper-url
    desc: Validated Patterns Vale helper URL
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: text
      substr: https://raw.githubusercontent.com/validatedpatterns/docs/refs/heads/main/utils/vale-pr-comments.sh

  - id: openshift-istio-install-step-path
    desc: OpenShift Istio install CI step
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: basename
      exact: servicemesh-istio-install-commands.sh

  - id: kiali-prometheus-helper-url
    desc: Kiali Prometheus helper URL
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: text
      substr: https://raw.githubusercontent.com/kiali/kiali/master/hack/use-openshift-prometheus.sh

composite_rules:
  - id: openshift-vale-download-context
    desc: Recognized OpenShift Vale download context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: openshift-release-source-tree
      - id: openshift-vale-review-step-path
      - id: validatedpatterns-vale-helper-url

  - id: openshift-istio-download-context
    desc: Recognized OpenShift Istio download context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: openshift-release-source-tree
      - id: openshift-istio-install-step-path
      - id: kiali-prometheus-helper-url
