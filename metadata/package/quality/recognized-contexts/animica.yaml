defaults:
  platforms: [unix, windows]

# The wheel contains two documented, explicitly invoked miner programs and an
# embedded RAG corpus. Their source text is not a hidden miner or a command
# execution hook.
traits:
  - id: rag-corpus-path
    desc: Animica RAG corpus path
    crit: notable
    conf: 0.99
    for: [json, python, shell]
    if:
      type: path
      regex: '(^|[\\/])chunks\.json$'
  - id: rag-corpus-marker
    desc: Animica RAG corpus marker
    crit: notable
    conf: 0.99
    for: [json, python, shell]
    if:
      type: text
      word: AICF
  - id: explicit-miner-basename
    desc: Animica explicit miner basename
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      basename: true
      regex: '^(animica_cpu_miner_repoexact|reference_cpu_miner)\.py$'
  - id: explicit-miner-cli-marker
    desc: Animica miner CLI marker
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: Animica CPU Stratum miner
  - id: package-name
    desc: Animica package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Name:\s*animica\s*$'
  - id: package-repository
    desc: Animica package repository
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: text
      substr: github.com/animicaorg/all
  - id: wheel-basename
    desc: Animica wheel basename identity
    crit: notable
    conf: 0.99
    for: [pkginfo, python, whl]
    if:
      type: basename
      regex: '(?i)^animica-[0-9][^\\/]*\\.whl$'
  - id: package-source-path
    desc: Animica package source tree path
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      regex: '(?i)(animica|agent_runtime|aicf|flagship_agent|mining)[\\/]'
  - id: studio-wrapper-path
    desc: Animica Studio wrapper path
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      basename: true
      exact: _wrapper.py
  - id: studio-call-marker
    desc: Animica Studio call marker
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: ANIMICA_STUDIO_CALL
  - id: ena-web-path
    desc: Animica ENA web path
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      basename: true
      exact: web.py
  - id: ena-ssrf-marker
    desc: Animica ENA SSRF guard marker
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: ip_block_reason
  - id: source-member-path
    desc: Animica source member path
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])(animica|mining)[\\/]'
  - id: source-member-marker
    desc: Animica source member marker
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      regex: '(?i)\bAnimica\b|ANIMICA_'

composite_rules:
  - id: rag-documentation-context
    desc: Animica embedded documentation context
    crit: exception
    conf: 0.99
    all:
      - id: rag-corpus-path
      - id: rag-corpus-marker
  - id: explicit-miner-context
    desc: Animica explicit CLI miner context
    crit: exception
    conf: 0.99
    all:
      - id: explicit-miner-basename
      - id: explicit-miner-cli-marker
  - id: package-context
    desc: Recognized Animica package context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    scope: archive
    all:
      - id: package-name
      - id: package-repository
  - id: studio-wrapper-context
    desc: Animica Studio sandbox wrapper context
    crit: exception
    conf: 0.99
    all:
      - id: studio-wrapper-path
      - id: studio-call-marker
  - id: ena-web-context
    desc: Animica ENA SSRF-safe web context
    crit: exception
    conf: 0.99
    all:
      - id: ena-web-path
      - id: ena-ssrf-marker
  - id: source-member-context
    desc: Recognized Animica source member
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: source-member-path
      - id: source-member-marker
