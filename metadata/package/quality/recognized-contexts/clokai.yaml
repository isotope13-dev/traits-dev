defaults:
  platforms: [unix, windows]

# ClokAI's wheel contains a deliberately opaque fallback PyTorch engine.  The
# context is multi-factor so a package name or a generic model download alone
# cannot suppress an opaque-loader finding.
traits:
  - id: clokai-engine-module-path
    desc: ClokAI compiled engine module path
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      basename: true
      exact: _engine_compiled.py

  - id: clokai-engine-module-name
    desc: ClokAI compiled engine module namespace
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: 'clokai._engine'

  - id: clokai-engine-file-marker
    desc: ClokAI compiled engine file marker
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: 'clokai/_engine'

  - id: clokai-wheel-identity
    desc: ClokAI wheel distribution identity
    crit: notable
    conf: 0.99
    for: [whl]
    if:
      type: value
      path: whl.distribution
      exact: clokai

  - id: clokai-wheel-repository
    desc: ClokAI wheel repository identity
    crit: notable
    conf: 0.99
    for: [whl]
    if:
      type: value
      path: whl.home_page
      exact: https://github.com/ClokAI/clokai

  - id: clokai-engine-member
    desc: ClokAI opaque engine wheel member
    crit: notable
    conf: 0.99
    for: [whl]
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)clokai/_engine_compiled\.py$'

  - id: clokai-model-loader-member
    desc: ClokAI model loader wheel member
    crit: notable
    conf: 0.99
    for: [whl]
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)clokai/auto\.py$'

  - id: clokai-package-name
    desc: ClokAI Python distribution identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Name:\s*clokai\s*$'

  - id: clokai-project-repository
    desc: ClokAI upstream repository identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: home-page
      exact: https://github.com/ClokAI/clokai

  - id: clokai-transformer-engine
    desc: ClokAI transformer engine module marker
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: CiInnerModel

composite_rules:
  - id: clokai-opaque-engine-context
    desc: Recognized ClokAI opaque engine implementation context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: clokai-engine-module-path
      - id: clokai-engine-module-name
      - id: clokai-engine-file-marker

  - id: clokai-model-runtime-context
    desc: Recognized ClokAI transformer runtime context
    crit: exception
    conf: 0.99
    for: [whl]
    # The exception intentionally correlates package metadata with members of
    # the same wheel; outer scope is required when it is used to suppress a
    # member-level objective finding.
    scope: outer
    all:
      - id: clokai-wheel-identity
      - id: clokai-wheel-repository
      - id: clokai-engine-member
      - id: clokai-model-loader-member
