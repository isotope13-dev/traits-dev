defaults:
  platforms: [unix, windows]
  for: [go, shell]
traits:
  - id: vcs-ssh-wrapper-marker
    desc: VCS SSH wrapper exports GIT_SSH
    crit: notable
    conf: 0.92
    if:
      type: text
      word: GIT_SSH
  - id: vcs-ssh-known-hosts-marker
    desc: VCS SSH wrapper scans known hosts
    crit: notable
    conf: 0.92
    if:
      type: text
      word: ssh-keyscan
composite_rules:
  - id: vcs-ssh-wrapper-context
    desc: VCS SSH deployment wrapper context
    crit: exception
    conf: 0.96
    all:
      - id: vcs-ssh-wrapper-marker
      - id: vcs-ssh-known-hosts-marker
