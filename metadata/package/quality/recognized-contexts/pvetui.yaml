defaults:
  platforms: [unix, windows]

traits:
  - id: pvetui-ansible-plugin-path
    desc: pvetui Ansible plugin source path
    crit: notable
    conf: 0.99
    for: [go]
    if:
      type: path
      regex: '(?i)plugins/ansible/plugin\.go$'

  - id: pvetui-ansible-bootstrap-marker
    desc: pvetui Ansible bootstrap workflow marker
    crit: notable
    conf: 0.99
    for: [go, shell]
    if:
      type: text
      substr: buildDirectBootstrapScript

  - id: pvetui-source-member-path
    desc: pvetui upstream source member path
    crit: notable
    conf: 0.99
    for: [go, shell, python, markdown]
    if:
      type: path
      regex: '(?i)pvetui-[0-9][^/]{0,20}/'

  - id: pvetui-workflow-test-script
    desc: pvetui local workflow test script
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: path
      regex: '(?i)scripts/test-workflows\.sh$'

  - id: pvetui-source-archive-name
    desc: pvetui upstream source archive name
    crit: notable
    conf: 0.99
    for: [tar]
    if:
      type: basename
      regex: '(?i)^pvetui-v[0-9]'

composite_rules:
  - id: pvetui-ansible-bootstrap-context
    desc: Recognized pvetui Ansible bootstrap administration context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: pvetui-ansible-plugin-path
      - id: pvetui-ansible-bootstrap-marker

  - id: pvetui-source-archive-context
    desc: Recognized pvetui upstream source archive
    crit: exception
    conf: 0.99
    for: [tar, archives]
    scope: archive
    all:
      - id: pvetui-source-archive-name
      - id: pvetui-source-member-path
