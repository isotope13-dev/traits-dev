defaults:
  platforms: [unix, windows]

traits:
- id: agentic-stealth-browser-package-name
  desc: Agentic Stealth Browser package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: agentic-stealth-browser
- id: agentic-stealth-browser-source-tree-path
  desc: Agentic Stealth Browser source path
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])(stealth|proxy|core)[\\/].*\.py$'
- id: agentic-stealth-browser-stealth-module-marker
  desc: Agentic Stealth Browser module marker
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: text
    regex: '(?i)\bAgentic\b.{0,40}\bStealth\b|\bStealth\b.{0,40}\bAgentic\b'

composite_rules:
- id: agentic-stealth-browser-stealth-module-context
  desc: Recognized Agentic stealth module
  crit: exception
  conf: 0.99
  for: [python]
  all:
  - id: agentic-stealth-browser-source-tree-path
  - id: agentic-stealth-browser-stealth-module-marker
- id: agentic-stealth-browser-benign-automation-context
  desc: Recognized Agentic Stealth Browser context
  crit: exception
  conf: 0.99
  for: [pkginfo, python, whl]
  all:
  - id: agentic-stealth-browser-package-name
  - id: agentic-stealth-browser-source-tree-path
  scope: archive
