defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
- id: pnpm-pre-postinstall-fixture-package
  desc: pnpm lifecycle-script test fixture package
  crit: notable
  conf: 0.99
  if:
    type: value
    path: name
    exact: '@pnpm.e2e/pre-and-postinstall-scripts-example'

- id: pnpm-pre-postinstall-fixture-version
  desc: pnpm lifecycle fixture name-version marker
  crit: notable
  conf: 0.99
  if:
    # Keep the version evidence tied to the distinctive fixture name; a bare
    # 1.0.0/2.0.0 match is common in unrelated packages.
    type: text
    regex: 'pre-and-postinstall-scripts-example[\s\S]{0,16}version[\s\S]{0,8}[12]\.0\.0'

composite_rules:
- id: pnpm-pre-postinstall-fixture-context
  desc: Recognized pnpm lifecycle-script test fixture context
  crit: exception
  conf: 0.99
  all:
  - id: pnpm-pre-postinstall-fixture-package
  - id: pnpm-pre-postinstall-fixture-version
