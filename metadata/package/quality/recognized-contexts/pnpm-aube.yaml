defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
- id: pnpm-pre-postinstall-fixture-package
  desc: pnpm lifecycle-script test fixture package
  crit: notable
  conf: 0.99
  if:
    type: value
    path: name
    exact: '@pnpm.e2e/pre-and-postinstall-scripts-example'

- id: pnpm-pre-postinstall-fixture-version
  desc: pnpm lifecycle fixture package version
  crit: notable
  conf: 0.99
  if:
    type: value
    path: version
    regex: '^[12]\.0\.0$'

composite_rules:
- id: pnpm-pre-postinstall-fixture-context
  desc: Recognized pnpm lifecycle-script test fixture context
  crit: exception
  conf: 0.99
  all:
  - id: pnpm-pre-postinstall-fixture-package
  - id: pnpm-pre-postinstall-fixture-version
