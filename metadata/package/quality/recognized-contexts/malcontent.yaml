defaults:
  for: [elf]
  platforms: [unix]

traits:
  - id: malcontent-project-marker
    desc: malcontent defensive scanner project marker
    crit: notable
    conf: 0.99
    size_max: 70000000
    if:
      type: text
      section: .rodata
      substr: github.com/chainguard-dev/malcontent

  - id: malcontent-yara-catalog
    desc: malcontent embedded YARA rule catalog marker
    crit: notable
    conf: 0.99
    size_max: 70000000
    if:
      type: text
      section: .rodata
      substr: YARAForge

composite_rules:
  - id: malcontent-defensive-scanner-context
    desc: Recognized malcontent defensive scanner executable context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: malcontent-project-marker
      - id: malcontent-yara-catalog
