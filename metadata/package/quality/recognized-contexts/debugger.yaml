defaults:
  platforms: [unix, windows]

composite_rules:
  - id: unix-source-tracerpid-safe-contexts
    desc: Recognized source contexts where a TracerPid check is diagnostic
    crit: exception
    conf: 0.99
    any:
      - id: well-known/lib/ggml::ggml-inference-source
      - id: well-known/lib/sharp-libvips/
      - id: metadata/package/quality/false-positives::c4core-debugger-helper-context
      - id: metadata/package/quality/upstream-source::pipewire-source-tree
      - id: metadata/package/testing/compiled::catch2
      - id: well-known/app/renderdoc/
      - id: well-known/lib/slangpy::slangpy-platform-source-context
      - id: metadata/package/quality/recognized-contexts::aws-lc-abi-unwind-test-context
