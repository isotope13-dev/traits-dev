defaults:
  platforms: [windows, unix]

# Mtrini Studio packages a local llama.cpp application.  These contexts are
# deliberately multi-factor: a generic templates_data.py or a generic DLL
# name is not enough to suppress a security-relevant rule.
traits:
  - id: mtrini-package-name
    desc: Mtrini Studio package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Name:\s*mtrinistudio\s*$'

  - id: mtrini-wheel-basename
    desc: Mtrini Studio wheel basename identity
    crit: notable
    conf: 0.99
    for: [whl]
    if:
      type: basename
      regex: '(?i)^mtrinistudio-[0-9][^\\/]*\\.whl$'

  - id: mtrini-template-module
    desc: Mtrini embedded web-template module
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      basename: true
      exact: templates_data.py

  - id: mtrini-login-template-binding
    desc: Mtrini login template base64 binding
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: LOGIN_TEMPLATE_B64

  - id: mtrini-index-template-binding
    desc: Mtrini index template base64 binding
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: text
      substr: INDEX_TEMPLATE_B64

  - id: mtrini-llama-runtime-module
    desc: Mtrini bundled llama.cpp runtime module
    crit: notable
    conf: 0.99
    for: [pe, dll]
    if:
      type: path
      basename: true
      exact: llama-server-impl.dll

  - id: mtrini-openmp-runtime-module
    desc: Mtrini bundled LLVM OpenMP runtime module
    crit: notable
    conf: 0.99
    for: [pe, dll]
    if:
      type: path
      basename: true
      exact: libomp140.x86_64.dll

  - id: mtrini-llama-runtime-marker
    desc: Bundled llama.cpp runtime source marker
    crit: notable
    conf: 0.99
    for: [pe, dll]
    if:
      type: text
      substr: llama.cpp
      section: .rdata

  - id: mtrini-llama-server-source-marker
    desc: llama.cpp server source-tree marker
    crit: notable
    conf: 0.99
    for: [pe, dll]
    if:
      type: text
      substr: D:/a/llama.cpp/llama.cpp/tools/server/
      section: .rdata

  - id: mtrini-llvm-openmp-marker
    desc: LLVM OpenMP runtime identity marker
    crit: notable
    conf: 0.99
    for: [pe, dll]
    if:
      type: text
      substr: LLVM* OpenMP* Runtime Library
      section: .rdata

composite_rules:
  - id: mtrini-template-context
    desc: Mtrini embedded HTML template decoder context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    scope: archive
    all:
      - id: mtrini-package-name
      - id: mtrini-template-module
      - id: mtrini-login-template-binding
      - id: mtrini-index-template-binding

  - id: mtrini-llama-runtime-context
    desc: Mtrini bundled llama.cpp runtime context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    scope: archive
    all:
      - id: mtrini-package-name
      - id: mtrini-llama-runtime-module
      - id: mtrini-llama-runtime-marker

  - id: mtrini-openmp-runtime-context
    desc: Mtrini bundled LLVM OpenMP runtime context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    scope: archive
    all:
      - id: mtrini-package-name
      - id: mtrini-openmp-runtime-module
