defaults:
  platforms: [unix, windows]
  for: [c, cpp]

traits:
  - id: aws-lc-abi-unwind-test-source
    desc: Crypto ABI unwind test source path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: 'crypto[\\/]test[\\/]abi_test\.cc$'

composite_rules:
  - id: aws-lc-abi-unwind-test-context
    desc: AWS-LC ABI unwind test debugger guard
    crit: exception
    conf: 0.99
    all:
      - id: aws-lc-abi-unwind-test-source
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
      - id: micro-behaviors/fs/proc/info/path::process-self-status
