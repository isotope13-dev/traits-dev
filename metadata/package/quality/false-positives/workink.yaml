# A known key-validation DLL uses anti-tamper checks and direct syscall stubs
# to protect its own integrity.  Together, its endpoint and export pair make
# that protection context recognizable without suppressing generic behavior.
defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: workink-key-validation-anti-tamper
    desc: Work.ink key-validation DLL anti-tamper context
    crit: exception
    conf: 0.99
    all:
      - id: well-known/lib/workink::token-validation-endpoint
      - id: well-known/lib/workink::is-key-valid-export
      - id: well-known/lib/workink::start-security-export
