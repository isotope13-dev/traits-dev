defaults:
  platforms: [unix, windows]
traits:
- id: intune-remediation-template-path
  desc: Intune remediation template path
  crit: baseline
  conf: 0.98
  for: [powershell]
  if:
    type: path
    regex: '(^|[\\/])Create-IntuneRemediation\.ps1$'
- id: msal-win-installer-helper-path
  desc: MSAL Windows installer helper path
  crit: baseline
  conf: 0.98
  for: [powershell]
  if:
    type: path
    regex: '(^|[\\/])build[\\/]win-installer-helper\.psm1$'
- id: container-libs-ci-runner-path
  desc: container-libs CI runner path
  crit: baseline
  conf: 0.98
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|[\\/])ci[\\/]runner\.sh$'
- id: twicc-terminal-path
  desc: Twicc terminal implementation path
  crit: baseline
  conf: 0.98
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])twicc[\\/]terminal\.py$'
- id: twicc-vite-data-asset-path
  desc: Twicc Vite data asset path
  crit: baseline
  conf: 0.98
  for: [javascript]
  if:
    type: path
    regex: '(^|[\\/])assets[\\/]data-[A-Za-z0-9_-]+\.js$'
- id: phpstan-phar-path
  desc: PHPStan PHAR vendor artifact path
  crit: baseline
  conf: 0.98
  for: [php]
  if:
    type: path
    regex: '(^|[\\/])phpstan\.phar$'
- id: bind9-python-setup-path
  desc: BIND9 Python setup path
  crit: baseline
  conf: 0.98
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])python[\\/]setup\.py$'
- id: bind9-idn-ltconfig-path
  desc: BIND9 bundled idnkit ltconfig path
  crit: baseline
  conf: 0.98
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|[\\/])idnkit-1\.0-src[\\/]ltconfig$'
- id: opg-htmltopdf-dockerfile-path
  desc: OPG htmltopdf Dockerfile path
  crit: baseline
  conf: 0.98
  for: [dockerfile]
  if:
    type: path
    regex: '(^|[\\/])htmltopdf[\\/]Dockerfile$'
- id: opg-hardening-script-path
  desc: OPG hardening script path
  crit: baseline
  conf: 0.98
  for: [shell]
  if:
    type: path
    regex: '(^|[\\/])harden(-nginx)?\.sh$'
- id: opg-doctrine-migration-version-path
  desc: OPG Doctrine migration path
  crit: baseline
  conf: 0.98
  for: [php]
  if:
    type: path
    regex: '(^|[\\/])Migrations[\\/]Version[0-9]+\.php$'
- id: php-phinx-migration-path
  desc: PHP Phinx migration path
  crit: baseline
  conf: 0.98
  for: [php]
  if:
    type: path
    regex: '(^|[\\/])migrations[\\/][0-9]{14}_[A-Za-z0-9_]+\.php$'
- id: bind9-dnssec-clean-path
  desc: BIND9 dnssec clean path
  crit: baseline
  conf: 0.98
  for: [shell]
  if:
    type: path
    regex: '(^|[\\/])dnssec[\\/]clean\.sh$'
- id: msal-netcore-listener-test-path
  desc: MSAL NetCore listener dev test path
  crit: baseline
  conf: 0.98
  for: [csharp]
  if:
    type: path
    regex: '(^|[\\/])SingleMessageTcpListener\.cs$'
- id: msal-headless-cache-test-path
  desc: MSAL headless cache integration test path
  crit: baseline
  conf: 0.98
  for: [csharp]
  if:
    type: path
    regex: '(^|[\\/])MsalCacheStorageIntegrationTests\.cs$'
- id: samba-source-path
  desc: Samba source-tree path
  crit: notable
  conf: 0.99
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|/)samba-[0-9][^/]*'
- id: postgresql-source-path
  desc: PostgreSQL source-tree path
  crit: notable
  conf: 0.99
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|/)postgresql-[0-9][^/]*'
- id: browser-use-pypi-package
  desc: Browser Use PyPI package metadata
  crit: notable
  conf: 0.98
  for: [pkginfo]
  if:
    type: text
    regex: '(?im)^Name:\s*browser-use\s*$'
- id: browser-use-python-module
  desc: Browser Use Python module import
  crit: notable
  conf: 0.98
  for: [python]
  if:
    type: import
    regex: '^browser_use(\.|$)'
- id: browser-use-profile-module
  desc: Browser Use profile module import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    exact: browser_use.browser.cloud.views

composite_rules:
  - id: browser-use-library-source-context
    desc: Browser Use library source context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: browser-use-python-module
      - id: browser-use-profile-module
  - id: browser-use-automation-context
    desc: Recognized Browser Use package automation context
    crit: exception
    conf: 0.99
    for: [pkginfo, python]
    all:
      - id: browser-use-pypi-package
      - id: browser-use-python-module
    scope: archive
