defaults:
  platforms: [unix, windows]
traits:
- id: cargo-binstall-github-auth-helper-context
  desc: cargo-binstall GitHub auth helper
  crit: component
  conf: 0.99
  for: [rust]
  if:
    type: text
    regex: '(?is)gh auth token[\s\S]{0,500}git credential fill'
- id: cargo-binstall-release-installer-context
  desc: cargo-binstall release installer
  crit: component
  conf: 0.99
  for: [powershell]
  if:
    type: text
    regex: '(?is)cargo-bins/cargo-binstall[\s\S]{0,700}--self-install'
- id: intune-remediation-template-path
  desc: Intune remediation template path
  crit: baseline
  conf: 0.98
  for: [powershell]
  if:
    type: path
    regex: '(^|[\\/])Create-IntuneRemediation\.ps1$'
- id: msal-win-installer-helper-path
  desc: MSAL Windows installer helper path
  crit: baseline
  conf: 0.98
  for: [powershell]
  if:
    type: path
    regex: '(^|[\\/])build[\\/]win-installer-helper\.psm1$'
- id: container-libs-ci-runner-path
  desc: container-libs CI runner path
  crit: baseline
  conf: 0.98
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|[\\/])ci[\\/]runner\.sh$'
- id: twicc-terminal-path
  desc: Twicc terminal implementation path
  crit: baseline
  conf: 0.98
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])twicc[\\/]terminal\.py$'
- id: twicc-vite-data-asset-path
  desc: Twicc Vite data asset path
  crit: baseline
  conf: 0.98
  for: [javascript]
  if:
    type: path
    regex: '(^|[\\/])assets[\\/]data-[A-Za-z0-9_-]+\.js$'
- id: phpstan-phar-path
  desc: PHPStan PHAR vendor artifact path
  crit: baseline
  conf: 0.98
  for: [php]
  if:
    type: path
    regex: '(^|[\\/])phpstan\.phar$'
- id: rector-preg-replace-migration-rule
  desc: Rector preg_replace /e migration rule
  crit: baseline
  conf: 0.99
  for: [php]
  if:
    type: path
    regex: 'PregReplaceEModifierRector\.php$'
- id: bind9-python-setup-path
  desc: BIND9 Python setup path
  crit: baseline
  conf: 0.98
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])python[\\/]setup\.py$'
- id: bind9-idn-ltconfig-path
  desc: BIND9 bundled idnkit ltconfig path
  crit: baseline
  conf: 0.98
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|[\\/])idnkit-1\.0-src[\\/]ltconfig$'
- id: opg-htmltopdf-dockerfile-path
  desc: OPG htmltopdf Dockerfile path
  crit: baseline
  conf: 0.98
  for: [dockerfile]
  if:
    type: path
    regex: '(^|[\\/])htmltopdf[\\/]Dockerfile$'
- id: opg-hardening-script-path
  desc: OPG hardening script path
  crit: baseline
  conf: 0.98
  for: [shell]
  if:
    type: path
    regex: '(^|[\\/])harden(-nginx)?\.sh$'
- id: opg-doctrine-migration-version-path
  desc: OPG Doctrine migration path
  crit: baseline
  conf: 0.98
  for: [php]
  if:
    type: path
    regex: '(^|[\\/])Migrations[\\/]Version[0-9]+\.php$'
- id: php-phinx-migration-path
  desc: PHP Phinx migration path
  crit: baseline
  conf: 0.98
  for: [php]
  if:
    type: path
    regex: '(^|[\\/])migrations[\\/][0-9]{14}_[A-Za-z0-9_]+\.php$'
- id: bind9-dnssec-clean-path
  desc: BIND9 dnssec clean path
  crit: baseline
  conf: 0.98
  for: [shell]
  if:
    type: path
    regex: '(^|[\\/])dnssec[\\/]clean\.sh$'
- id: msal-netcore-listener-test-path
  desc: MSAL NetCore listener dev test path
  crit: baseline
  conf: 0.98
  for: [csharp]
  if:
    type: path
    regex: '(^|[\\/])SingleMessageTcpListener\.cs$'
- id: msal-headless-cache-test-path
  desc: MSAL headless cache integration test path
  crit: baseline
  conf: 0.98
  for: [csharp]
  if:
    type: path
    regex: '(^|[\\/])MsalCacheStorageIntegrationTests\.cs$'
- id: samba-source-path
  desc: Samba source-tree path
  crit: notable
  conf: 0.99
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|/)samba-[0-9][^/]*'
- id: postgresql-source-path
  desc: PostgreSQL source-tree path
  crit: notable
  conf: 0.99
  for: [shell, vbs]
  if:
    type: path
    regex: '(^|/)postgresql-[0-9][^/]*'
- id: browser-use-pypi-package
  desc: Browser Use PyPI package metadata
  crit: notable
  conf: 0.98
  for: [pkginfo]
  if:
    type: text
    regex: '(?im)^Name:\s*browser-use\s*$'
- id: browser-use-python-module
  desc: Browser Use Python module import
  crit: notable
  conf: 0.98
  for: [python]
  if:
    type: import
    regex: '^browser_use(\.|$)'
- id: browser-use-profile-module
  desc: Browser Use profile module import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    exact: browser_use.browser.cloud.views

- id: mithwire-pypi-package
  desc: Mithwire PyPI package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: mithwire
- id: mithwire-project-repository
  desc: Mithwire project repository identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: project-url[*]
    substr: github.com/codeisalifestyle/mithwire
- id: mithwire-python-module
  desc: Mithwire Python module import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    regex: '^mithwire(\.|$)'

- id: node-curl-package-name
  desc: node-curl npm package identity
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: name
    exact: node-curl
- id: crawlo-pypi-package
  desc: Crawlo PyPI package metadata
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: text
    regex: '(?im)^Name:\s*crawlo\s*$'
- id: crawlo-python-module
  desc: Crawlo Python module import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    regex: '^crawlo(\.|$)'

- id: warn-scraper-package-name
  desc: WARN Scraper PyPI package metadata
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: warn-scraper
- id: warn-scraper-project-repository
  desc: WARN Scraper project repository identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: project-url[*]
    substr: github.com/biglocalnews/warn-scraper
- id: warn-scraper-source-tree-path
  desc: WARN Scraper source-tree path identity
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])warn[\\/]'

- id: wet-mcp-package-name
  desc: WET MCP package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: wet-mcp
- id: wet-mcp-project-repository
  desc: WET MCP project repository identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: project-url[*]
    substr: github.com/n24q02m/wet-mcp

- id: openchamber-package-name
  desc: OpenChamber VS Code package identity
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: name
    exact: openchamber
- id: openchamber-project-repository
  desc: OpenChamber project repository identity
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: repository.url
    exact: https://github.com/btriapitsyn/openchamber.git
- id: wet-mcp-source-tree-path
  desc: WET MCP source-tree path identity
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])wet_mcp[\\/]'
- id: openchamber-extension-tree-path
  desc: OpenChamber extension bundle path identity
  crit: notable
  conf: 0.99
  for: [javascript]
  if:
    type: path
    regex: '(^|[\\/])(openchamber|open-chamber)[\\/]'
- id: openchamber-extension-manager-symbol
  desc: OpenChamber extension manager symbol
  crit: notable
  conf: 0.99
  for: [javascript]
  if:
    type: text
    substr: openCodeManager
- id: assembly-grammar-mnemonic-table
  desc: Assembly syntax grammar mnemonic table
  crit: notable
  conf: 0.99
  for: [javascript]
  if:
    type: literal
    regex: '"mnemonics"\s*:\s*\{\s*"patterns"'
- id: agent-audit-kit-package-name
  desc: AgentAuditKit package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: agent-audit-kit
- id: agent-audit-kit-module
  desc: AgentAuditKit Python module import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    regex: '^agent_audit_kit(\.|$)'
- id: agent-utilities-package-name
  desc: Agent Utilities package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: agent-utilities
- id: agent-utilities-module
  desc: Agent Utilities Python module import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    regex: '^agent_utilities(\.|$)'

- id: kailash-pypi-package
  desc: Kailash Python SDK package identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: name
    exact: kailash
- id: kailash-project-repository
  desc: Kailash SDK project repository identity
  crit: notable
  conf: 0.99
  for: [pkginfo]
  if:
    type: value
    path: project-url[*]
    substr: github.com/terrene-foundation/kailash-py
- id: kailash-wheel-basename
  desc: Kailash wheel archive basename identity
  crit: notable
  conf: 0.99
  for: [whl]
  if:
    type: basename
    regex: '(?i)^kailash-[0-9][^\\/]*\\.whl$'
- id: kailash-source-member-path
  desc: Kailash SDK source member path
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: path
    regex: '(?i)(^|[\\/])kailash[\\/]'
composite_rules:
  - id: mithwire-package-identity-context
    desc: Recognized Mithwire package metadata context
    crit: notable
    conf: 0.99
    for: [pkginfo]
    all:
      - id: mithwire-pypi-package
      - id: mithwire-project-repository
  - id: node-curl-native-addon-context
    desc: Recognized node-curl native addon build context
    crit: notable
    conf: 0.99
    for: [package.json]
    all:
      - id: node-curl-package-name
      - id: metadata/package/scripts::npm-install-native-addon-build
  # cleave emits this finding directly for install scripts whose text contains
  # both a curl-like token and a shell/node build chain.  Matching gates
  # suppress the hostile engine heuristic for known-good packages.
  - id: builtin-command-and-control-dropper-download-execute
    desc: Built-in download-execute finding for known-good package scripts
    crit: notable
    conf: 0.99
    for: [package.json]
    any:
      - id: node-curl-native-addon-context
      - id: metadata/package/quality/recognized-contexts::es6-shim-sauce-connect-indicators
      - id: well-known/app/firebase-dataconnect-vscode::official-package
      - id: metadata/package/quality/false-positives-marp::marp-team-release-context
      - id: metadata/package/quality/react-native-fixture::package-context
    unless:
      # Identical legs to `any:` — matching known-good scripts fully suppresses
      # the hostile engine heuristic (same pattern as the historical node-curl hook).
      - id: metadata/package/quality/false-positives::node-curl-native-addon-context
      - id: metadata/package/quality/recognized-contexts::es6-shim-sauce-connect-indicators
      - id: well-known/app/firebase-dataconnect-vscode::official-package
      - id: metadata/package/quality/false-positives-marp::marp-team-release-context
      - id: metadata/package/quality/react-native-fixture::package-context
  - id: builtin-command-and-control-dropper-pipe-execute
    desc: Built-in pipe-execute finding for known-good package scripts
    crit: notable
    conf: 0.99
    for: [package.json]
    any:
      - id: node-curl-native-addon-context
      - id: metadata/package/quality/recognized-contexts::es6-shim-sauce-connect-pipe-gate
      - id: well-known/app/firebase-dataconnect-vscode::official-package
      - id: metadata/package/quality/false-positives-marp::marp-team-release-context
      - id: well-known/lib/videojs::npm-package
    unless:
      - id: metadata/package/quality/false-positives::node-curl-native-addon-context
      - id: metadata/package/quality/recognized-contexts::es6-shim-sauce-connect-pipe-gate
      - id: well-known/app/firebase-dataconnect-vscode::official-package
      - id: metadata/package/quality/false-positives-marp::marp-team-release-context
      - id: well-known/lib/videojs::npm-package
  - id: browser-use-library-source-context
    desc: Browser Use library source context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: browser-use-python-module
      - id: browser-use-profile-module
  - id: browser-use-automation-context
    desc: Recognized Browser Use package automation context
    crit: exception
    conf: 0.99
    for: [pkginfo, python]
    all:
      - id: browser-use-pypi-package
      - id: browser-use-python-module
    scope: archive
  - id: mithwire-benign-automation-context
    desc: Recognized Mithwire browser automation context
    crit: exception
    conf: 0.99
    for: [pkginfo, python]
    all:
      - id: mithwire-package-identity-context
      - id: mithwire-python-module
    scope: archive
  - id: crawlo-benign-automation-context
    desc: Recognized Crawlo crawler automation context
    crit: exception
    conf: 0.99
    for: [pkginfo, python]
    all:
      - id: crawlo-pypi-package
      - id: crawlo-python-module
    scope: archive
  - id: warn-scraper-benign-automation-context
    desc: Recognized WARN Scraper browser-automation context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    all:
      - id: warn-scraper-package-name
      - id: warn-scraper-project-repository
      - id: warn-scraper-source-tree-path
    scope: archive
  - id: wet-mcp-browser-automation-context
    desc: Recognized WET MCP web-research automation context
    crit: exception
    conf: 0.99
    for: [python, pkginfo, whl]
    all:
      - id: wet-mcp-package-name
      - id: wet-mcp-project-repository
      - id: wet-mcp-source-tree-path
    scope: archive
  - id: openchamber-credential-import-context
    desc: Recognized OpenChamber VS Code credential-import context
    crit: exception
    conf: 0.99
    for: [javascript, package.json, archive]
    all:
      - id: openchamber-package-name
      - id: openchamber-project-repository
      - id: openchamber-extension-tree-path
    scope: archive
  - id: wet-mcp-interact-browser-context
    desc: WET MCP interactive browser source context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: wet-mcp-source-tree-path
      - id: metadata/library/automation::patchright-python-import
      - id: metadata/library/automation::playwright-python-chromium-launch
  - id: openchamber-extension-manager-context
    desc: OpenChamber extension manager source context
    crit: exception
    conf: 0.99
    for: [javascript]
    all:
      - id: openchamber-extension-tree-path
      - id: openchamber-extension-manager-symbol
  - id: openchamber-assembly-grammar-context
    desc: OpenChamber bundled assembly grammar context
    crit: exception
    conf: 0.99
    for: [javascript]
    all:
      - id: openchamber-extension-tree-path
      - id: assembly-grammar-mnemonic-table
  - id: agent-audit-kit-scanner-context
    desc: Recognized AgentAuditKit security scanner context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    any:
      - id: agent-audit-kit-package-name
      - id: agent-audit-kit-module
    scope: archive
  - id: agent-utilities-library-context
    desc: Recognized Agent Utilities library context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    any:
      - id: agent-utilities-package-name
      - id: agent-utilities-module
    scope: archive
  - id: kailash-sdk-context
    desc: Recognized Kailash SDK package context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    all:
      - id: kailash-pypi-package
      - id: kailash-project-repository

    scope: archive
