# Aggregator of benign JS app/library fingerprints whose source resembles
# trojanized-package indicators (credential handling, build droppers, bundled
# obfuscation). Replaces the former benign-context grab-bag directory; supply-chain
# detections reference this once in `unless:`. Legs are directory references so the
# aggregator stays cheap to expand.
defaults:
  platforms: [linux, windows, macos]
composite_rules:
  - id: benign-trojanized-fp-context
    desc: Benign JS app/library source mistaken for a trojanized package
    crit: component
    conf: 0.9
    any:
      - id: well-known/lib/zxcvbn/
      - id: well-known/app/pm2/
      - id: well-known/app/drawio/
      - id: well-known/app/nextchat/
      - id: well-known/lib/hcaptcha/
      - id: well-known/app/atom-editor/
      - id: well-known/lib/selenium-engflow/
      - id: well-known/lib/nextjs/
      - id: well-known/lib/openapi-generated-client/
      - id: well-known/lib/swagger-typescript-api/
      - id: well-known/lib/mcp-github-issue/
      - id: well-known/lib/browser-automation/
      - id: well-known/lib/glide-carousel/
