# Shared benign-app FP-context aggregator. Several detections historically suppressed
# on a grab-bag directory of benign apps; that directory was split per-app, so this
# composite restores the single-reference DRY form (one `unless:` leg instead of four).
defaults:
  platforms: [unix, windows]
composite_rules:
  - id: benign-app-fp-context
    desc: Benign apps that produce automation/monitoring patterns mistaken for malware
    crit: component
    conf: 0.9
    any:
      - id: well-known/app/akm/
      - id: well-known/app/electron-auth/
      - id: well-known/app/netdata/
      - id: well-known/app/observability/
      - id: well-known/app/atlascode/
      - id: well-known/app/teams-vscode-extension/
      - id: well-known/app/vscode-yaml/
      - id: well-known/app/composer-php-vscode/
      - id: well-known/app/lingua-franca-vscode/
      - id: well-known/app/matomo/
      - id: well-known/app/moodle-stubs/
      - id: well-known/app/wireshark/
      - id: well-known/app/aks-engine/
      - id: well-known/app/discord-chat-exporter/
      - id: well-known/app/exr-io/
      - id: well-known/app/openai-codex/
      - id: well-known/app/sidesail/
      - id: well-known/app/macos-benign/
