# Recognized open-source projects whose documented maintenance tooling can
# resemble credential-access behavior.  These are suppressors only: the
# underlying capability traits remain available for triage.
defaults:
  platforms: [unix, windows]

traits:
  - id: ai-web-extensions-bump-host
    desc: ai-web-extensions bump helper host
    crit: notable
    conf: 1.0
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: cdn.jsdelivr.net/gh/adamlui/ai-web-extensions@
  - id: ai-web-extensions-bump-module
    desc: ai-web-extensions bump helper module
    crit: notable
    conf: 1.0
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: 'utils/bump/lib/bump\.min\.mjs'
  - id: ai-web-extensions-remote-runner-file
    desc: ai-web-extensions remote runner source path
    crit: notable
    conf: 1.0
    for: [javascript]
    if:
      type: path
      regex: '(^|[\\/])utils[\\/]remote-run\.js$'
  - id: ai-web-extensions-remote-runner-script
    desc: ai-web-extensions remote runner script
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@adamlui/ai-web-extensions'

composite_rules:
  - id: ai-web-extensions-bump-helper-context
    desc: Recognized ai-web-extensions maintenance helper context
    crit: exception
    conf: 0.99
    all:
      - id: ai-web-extensions-bump-host
      - id: ai-web-extensions-bump-module
  - id: ai-web-extensions-remote-runner-context
    desc: Recognized ai-web-extensions remote maintenance runner context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: ai-web-extensions-remote-runner-file
      - id: ai-web-extensions-remote-runner-script
  - id: hackbar-tool-context
    desc: Recognized HackBar pentesting extension context
    crit: exception
    conf: 0.98
    all:
      - id: well-known/tool/offensive/hackbar::manifest-name
      - id: well-known/tool/offensive/hackbar::homepage
  - id: cadence-update-tool-context
    desc: Recognized Cadence repository updater context
    crit: exception
    conf: 0.98
    all:
      - id: well-known/lib/cadence::updater-marker
      - id: micro-behaviors/process/create/shell/bridge::js-exec
  - id: c4core-debugger-helper-context
    desc: Recognized c4core debugger-aware error helper context
    crit: exception
    conf: 0.98
    all:
      - id: well-known/lib/c4core::c4core-source-tree
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
  - id: opensearch-gce-plugin-context
    desc: Recognized OpenSearch Discovery GCE plugin context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/opensearch::gce-plugin-path
      - id: well-known/app/opensearch::gce-metadata-service-class
  - id: abaplint-core-benchmark-context
    desc: ABAP lint benchmark package context
    crit: exception
    conf: 1.0
    all:
      - id: well-known/lib/abaplint::abaplint-core-package-name
      - id: well-known/lib/abaplint::abaplint-core-repository
      - id: well-known/lib/abaplint::abaplint-benchmark-download
      - id: well-known/lib/abaplint::abaplint-benchmark-local-execution
  - id: dscodegpt-extension-auth-context
    desc: CodeGPT extension authenticated service context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/dscodegpt::archive-name
      - id: well-known/app/dscodegpt::package-name
  - id: dwex-packaging-context
    desc: Recognized DWARF Explorer packaging context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: well-known/app/dwex::project-identity
      - id: metadata/build/package::setuptools-run-override
  - id: acedatacloud-personal-wechat-byoc-context
    desc: AceDataCloud Personal WeChat BYOC connector context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/acedatacloud::skills-package-name
      - id: well-known/app/acedatacloud::personal-wechat-base-url
      - id: well-known/app/acedatacloud::personal-wechat-api-token
      - id: micro-behaviors/communications/http/headers::authorization-header-map-entry
  - id: acedatacloud-personal-wechat-byoc-file-context
    desc: Personal WeChat BYOC connector file context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: well-known/app/acedatacloud::personal-wechat-base-url
      - id: well-known/app/acedatacloud::personal-wechat-api-token
      - id: micro-behaviors/communications/http/headers::authorization-header-map-entry
