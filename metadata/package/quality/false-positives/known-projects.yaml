# Recognized open-source projects whose documented maintenance tooling can
# resemble credential-access behavior.  These are suppressors only: the
# underlying capability traits remain available for triage.
defaults:
  platforms: [unix, windows]

traits:
  - id: clawker-prompt-injection-incident-report
    desc: Clawker prompt injection incident report
    crit: notable
    conf: 1.0
    for: [markdown]
    if:
      type: basename
      exact: 2026-05-16-prompt-injection-via-subagent.md

  - id: ai-web-extensions-bump-host
    desc: ai-web-extensions bump helper host
    crit: notable
    conf: 1.0
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: cdn.jsdelivr.net/gh/adamlui/ai-web-extensions@
  - id: ai-web-extensions-bump-module
    desc: ai-web-extensions bump helper module
    crit: notable
    conf: 1.0
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: 'utils/bump/lib/bump\.min\.mjs'
  - id: ai-web-extensions-remote-runner-file
    desc: ai-web-extensions remote runner source path
    crit: notable
    conf: 1.0
    for: [javascript]
    if:
      type: path
      regex: 'ai-web-extensions@[A-Za-z0-9._-]+/utils/remote-run\.js$'
  - id: ai-web-extensions-remote-runner-script
    desc: ai-web-extensions remote runner script
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@adamlui/ai-web-extensions'
  - id: ios-proxy-template-profile
    desc: Uninstantiated iOS proxy profile template
    crit: notable
    conf: 0.99
    for: [plist]
    if:
      type: text
      substr: '{{SERVER_IP}}'

composite_rules:
  - id: clawker-prompt-injection-incident-context
    desc: Recognized Clawker prompt injection incident report context
    crit: exception
    conf: 1.0
    all:
      - id: well-known/tool/detection/clawker::source-tree
      - id: clawker-prompt-injection-incident-report

  - id: ai-web-extensions-screenshot-path
    desc: ai-web-extensions screenshot asset path
    crit: notable
    conf: 1.0
    scope: archive
    all:
      - id: ai-web-extensions-remote-runner-script
      - id: metadata/package/files/included::screenshot-directory-asset-path
  - id: projen-package-context
    desc: Recognized Projen project-generator package context
    crit: exception
    conf: 0.99
    scope: archive
    any:
      - id: well-known/tool/development/projen::pypi-package
      - id: well-known/tool/development/projen::npm-package
  - id: lavendersim-native-library-context
    desc: Recognized LavenderSim native wheel library context
    crit: notable
    conf: 0.99
    all:
      - id: well-known/lib/lavendersim::native-library-path
      - id: well-known/lib/lavendersim::package-member-path
  - id: benign-native-library-context
    desc: Recognized benign packaged native library context
    crit: notable
    conf: 0.99
    any:
      - id: lavendersim-native-library-context
      - id: metadata/package/files/wheel-sdist::python-wheel-vendored-shlib-dir
      - id: metadata/package/files/system-package::jvm-bundled-native-dependency
  - id: ai-web-extensions-bump-helper-context
    desc: Recognized ai-web-extensions maintenance helper context
    crit: exception
    conf: 0.99
    all:
      - id: ai-web-extensions-bump-host
      - id: ai-web-extensions-bump-module
  - id: ai-web-extensions-remote-runner-context
    desc: Recognized ai-web-extensions remote maintenance runner context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: ai-web-extensions-remote-runner-file
      - id: ai-web-extensions-remote-runner-script

  - id: openadapt-flow-source-context
    desc: Recognized OpenAdapt Flow package source context
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    scope: archive
    all:
      - id: well-known/app/openadapt-flow::package-context
      - id: well-known/app/openadapt-flow::source-module-import

  - id: hackbar-tool-context
    desc: Recognized HackBar pentesting extension context
    crit: exception
    conf: 0.98
    all:
      - id: well-known/tool/offensive/hackbar::manifest-name
      - id: well-known/tool/offensive/hackbar::homepage
  - id: cadence-update-tool-context
    desc: Recognized Cadence repository updater context
    crit: exception
    conf: 0.98
    all:
      - id: well-known/lib/cadence::updater-marker
      - id: micro-behaviors/process/create/shell/bridge::js-exec
  - id: c4core-debugger-helper-context
    desc: Recognized c4core debugger-aware error helper context
    crit: exception
    conf: 0.98
    all:
      - id: well-known/lib/c4core::c4core-source-tree
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
  - id: opensearch-gce-plugin-context
    desc: Recognized OpenSearch Discovery GCE plugin context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/opensearch::gce-plugin-path
      - id: well-known/app/opensearch::gce-metadata-service-class
  - id: abaplint-core-benchmark-context
    desc: ABAP lint benchmark package context
    crit: exception
    conf: 1.0
    all:
      - id: well-known/lib/abaplint::abaplint-core-package-name
      - id: well-known/lib/abaplint::abaplint-core-repository
      - id: well-known/lib/abaplint::abaplint-benchmark-download
      - id: well-known/lib/abaplint::abaplint-benchmark-local-execution
  - id: dscodegpt-extension-auth-context
    desc: CodeGPT extension authenticated service context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/dscodegpt::archive-name
      - id: well-known/app/dscodegpt::package-name
  - id: turborepo-platform-binary-context
    desc: Official Turborepo Windows platform binary context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/turborepo::upstream-repository
    any:
      - id: well-known/app/turborepo::windows-platform-package
      - id: well-known/app/turborepo::windows-arm64-platform-package
  - id: openremote-manager-auth-context
    desc: Recognized OpenRemote manager authentication client context
    crit: exception
    conf: 0.99
    all:
      - id: metadata/library/runtime::openremote-runtime-name
      - id: metadata/library/runtime::openremote-keycloak-mode
  - id: dwex-packaging-context
    desc: Recognized DWARF Explorer packaging context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: well-known/app/dwex::project-identity
      - id: metadata/build/package::setuptools-run-override
  - id: acedatacloud-personal-wechat-byoc-context
    desc: AceDataCloud Personal WeChat BYOC connector context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/acedatacloud::skills-package-name
      - id: well-known/app/acedatacloud::personal-wechat-base-url
      - id: well-known/app/acedatacloud::personal-wechat-api-token
      - id: micro-behaviors/communications/http/headers::authorization-header-map-entry
  - id: acedatacloud-personal-wechat-byoc-file-context
    desc: Personal WeChat BYOC connector file context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: well-known/app/acedatacloud::personal-wechat-base-url
      - id: well-known/app/acedatacloud::personal-wechat-api-token
      - id: micro-behaviors/communications/http/headers::authorization-header-map-entry

  - id: dcc-mcp-core-official-installer-context
    desc: Recognized DCC MCP Core official installer documentation
    crit: exception
    conf: 1.0
    for: [whl, pkginfo, markdown]
    scope: outer
    all:
      - id: well-known/lib/dcc-mcp-core::package-name
      - id: well-known/lib/dcc-mcp-core::repository
      - id: well-known/lib/dcc-mcp-core::readme-heading

  - id: sympozium-official-project-context
    desc: Recognized Sympozium upstream project source tree
    crit: exception
    conf: 1.0
    for: [zip, archives, go, javascript, typescript, shell, markdown]
    scope: archive
    all:
      - id: well-known/app/sympozium::repository
      - id: well-known/app/sympozium::product-description
      - id: well-known/app/sympozium::installer-host
