defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

composite_rules:
  - id: benign-high-entropy-pe-context
    desc: Benign high-entropy PE context
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: objectives/anti-static/pack/entropy::large-function-surface
      - id: metadata/binary/metrics/size::massive-executable
      - id: metadata/binary/installer/
      - id: well-known/tool/sysadmin/winrar/
      - id: well-known/lib/divx/
      - id: well-known/tool/reverse-engineering/frida/
      - id: objectives/anti-static/pack/detect::obsidium-software-marker
      - id: well-known/app/protected-benign-pe/
