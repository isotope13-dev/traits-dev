defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
- id: mad-except
  desc: Delphi madExcept error handling
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: madExcept
    section: ".rdata"
- id: apiset-stub
  desc: Windows ApiSet Stub DLL
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: ApiSet Stub DLL
    section: ".rdata"
- id: virtualbox-build-marker
  desc: VirtualBox platform build marker
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: Oracle VirtualBox
    section: ".rdata"
- id: virtualbox-source-path
  desc: VirtualBox source path marker
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: \src\VBox\
    section: ".rdata"
- id: virtualbox-support-driver
  desc: VBox support driver reference
  crit: baseline
  conf: 0.98
  if:
    type: text
    exact: VBoxSup.sys
    section: ".rdata"
- id: dede-tool-banner
  desc: DeDe reverse engineering context
  crit: baseline
  conf: 0.99
  if:
    type: text
    substr: This file is generated by DeDe
    section: rdata
- id: php-manual-link-density
  desc: Dense PHP manual function links
  crit: component
  conf: 0.95
  for: [php]
  count_min: 5
  if:
    type: text
    regex: '@link\s+https?://php\.net/manual/en/function\.[a-z0-9._-]+\.php'
- id: php-empty-function-declarations
  desc: Many empty PHP function declarations
  crit: component
  conf: 0.95
  for: [php]
  count_min: 8
  if:
    type: text
    regex: 'function\s+\w+\s*\([^)]{0,240}\)\s*(:\s*[^{]{1,120})?\{\s*\}'
- id: high-string-count-pe
  desc: PE contains many extracted strings
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: binary.string_count
    min: 10000
- id: dense-domain-list
  desc: Dense embedded domain list
  crit: component
  conf: 0.95
  count_min: 500
  if:
    type: text
    regex: '\b[a-z0-9][a-z0-9-]{1,63}\.[a-z]{2,}\b'
    section: rdata
  unless:
  - id: metadata/lang/compiler/systems::go-buildinfo
- id: ad-tracker-domain-list--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 25
  if:
    type: text
    case_insensitive: true
    substr: analytics
    section: rdata
  count_max: 1000621
- id: ad-tracker-domain-list--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 25
  if:
    type: text
    case_insensitive: true
    substr: counter
    section: rdata
  count_max: 1000622
- id: ad-tracker-domain-list--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 25
  if:
    type: text
    case_insensitive: true
    substr: stats
    section: rdata
  count_max: 1000623
- id: ad-tracker-domain-list--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 25
  if:
    type: text
    case_insensitive: true
    substr: track
    section: rdata
  count_max: 1000624
- id: n8n-workflow-import
  desc: n8n workflow import marker
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: "n8n-workflow"
- id: n8n-node-properties-schema
  desc: n8n node properties schema
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: "INodeProperties"
- id: stripe-card-token-schema
  desc: Stripe card token schema
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: "cardToken"
- id: quickbms-product-name
  desc: QuickBMS product name
  crit: component
  conf: 0.98
  if:
    type: text
    substr: QuickBMS
    section: rdata
- id: quickbms-author-contact
  desc: QuickBMS author contact metadata
  crit: component
  conf: 0.98
  if:
    type: text
    substr: aluigi.org
    section: rdata
- id: quickbms-original-filename
  desc: QuickBMS original filename
  crit: component
  conf: 0.98
  if:
    type: text
    substr: quickbms.exe
    section: rdata
- id: github-cli-auth-helper-context
  desc: GitHub CLI auth helper context
  crit: component
  conf: 0.9
  platforms: [unix, windows]
  for: [javascript, typescript, shell]
  if:
    type: text
    regex: gh auth login[\s\S]{0,400}(GITHUB_TOKEN|MCP authentication|token found)
composite_rules:
- id: common-fp-context
  desc: Common false positive indicators (Delphi, ApiSet, etc.)
  crit: baseline
  conf: 0.9
  for: [pe, dll, package.json]
  platforms: [windows, unix]
  any:
  - id: mad-except
  - id: apiset-stub
  - id: metadata/lang/compiler/managed::delphi
  - id: metadata/lang/compiler/managed::borland-section-code
  - id: metadata/signed/platform::microsoft
  - id: metadata/package/testing/presence/harness::definitelytyped-helper-manifest
- id: virtualbox-platform-component
  desc: VirtualBox platform component context
  crit: baseline
  conf: 0.99
  needs: 2
  any:
  - id: virtualbox-build-marker
  - id: virtualbox-source-path
  - id: virtualbox-support-driver
- id: benign-token-privilege-context
  desc: Benign token privilege adjustment context
  crit: baseline
  conf: 0.95
  any:
  - id: metadata/signed/developer::vmware
  - id: well-known/tool/reverse-engineering/armnf::marker
  - id: metadata/package/quality/false-positives::common-fp-context
  - id: metadata/binary/framework::dotnet-singlefilehost-runtime
- id: php-manual-empty-function-stubs
  desc: PHP manual API stub declarations
  crit: baseline
  conf: 0.97
  for: [php]
  platforms: [linux, macos, windows, unix, android, ios]
  all:
  - id: php-manual-link-density
  - id: php-empty-function-declarations
- id: embedded-domain-reputation-catalog
  desc: Embedded web reputation domain catalog
  crit: baseline
  conf: 0.97
  all:
  - id: high-string-count-pe
  - id: dense-domain-list
  - id: ad-tracker-domain-list
- id: quickbms-utility-context
  desc: QuickBMS archive utility metadata
  crit: baseline
  conf: 0.98
  all:
  - id: quickbms-product-name
  - id: quickbms-author-contact
  - id: quickbms-original-filename
- id: n8n-stripe-card-token-description
  desc: n8n Stripe card token node description
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: n8n-workflow-import
  - id: n8n-node-properties-schema
  - id: stripe-card-token-schema
- id: ad-tracker-domain-list
  desc: Dense ad tracker domain list
  crit: component
  conf: 0.95
  any:
  - id: ad-tracker-domain-list--rx-1
  - id: ad-tracker-domain-list--rx-2
  - id: ad-tracker-domain-list--rx-3
  - id: ad-tracker-domain-list--rx-4
