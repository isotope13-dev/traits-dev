defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: mpich-libfabric-jenkins-tests
    desc: MPICH libfabric Jenkins test script
    for: [python]
    if:
      type: path
      regex: '(^|/)jenkins/tests\.py$'

  - id: mpich-fabtests-runner
    desc: MPICH libfabric fabtests runner
    for: [shell]
    if:
      type: path
      regex: '(^|/)scripts/runfabtests\.sh$'

  - id: mpich-cross-run-cobalt
    desc: MPICH cross-run Cobalt helper
    for: [shell]
    if:
      type: path
      regex: '(^|/)fcrosscompile/cross_run\.cobalt$'

  - id: mpich-unit-test-runner
    desc: MPICH unit test runner
    for: [python]
    if:
      type: path
      regex: '(^|/)units/run_unit\.py$'

  - id: awscli-s3transfer-module
    desc: AWS CLI s3transfer module
    for: [python]
    if:
      type: path
      regex: '(^|/)s3transfer/__init__\.py$'

  - id: conda-recipe-path
    desc: Conda recipe path
    for: [batch, shell, python, conda]
    if:
      type: path
      regex: 'info/recipe'

  - id: python-ensurepip-bundled-pip
    desc: Python ensurepip bundled pip wheel
    for: [whl]
    if:
      type: path
      basename: true
      regex: '^pip-[^/]+\.whl$'

  - id: pytorch-conda-package
    desc: PyTorch conda package
    for: [conda, tar]
    if:
      type: path
      regex: '(^|/)pytorch-[^/]+\.conda$'

  - id: pytorch-conda-payload
    desc: PyTorch conda payload archive
    for: [tar]
    if:
      type: path
      basename: true
      regex: '^pkg-pytorch-[^/]+\.tar\.zst$'

  - id: inkscape-arch-package
    desc: Inkscape Arch package
    for: [tar]
    if:
      type: path
      basename: true
      regex: '^inkscape-[^/]+\.pkg\.tar\.zst$'

  - id: kubectl-manpage
    desc: kubectl manpage example
    for: [kotlin]
    if:
      type: path
      regex: '(^|/)man1/kubectl-.*\.1$'

  - id: cryptography-hash-test
    desc: cryptography hash test module
    for: [python]
    if:
      type: path
      regex: '(^|/)primitives/test_hashes\.py$'

  - id: wine-include-path
    desc: Wine include source path
    for: [c, cpp, python, javascript]
    if:
      type: path
      regex: 'include/wine'

  - id: vboxdrv-kernel-module
    desc: VirtualBox kernel driver module
    for: [elf]
    if:
      type: path
      regex: '(^|/)vboxdrv\.ko$'

  - id: logfire-ai-tools-config
    desc: Logfire AI tools config helper
    for: [python]
    if:
      type: path
      regex: '(^|/)cli/ai_tools\.py$'

  - id: miosa-route-catalog-path
    desc: miosa route catalog path
    for: [python]
    if:
      type: path
      substr: miosa

  - id: nextcloud-mcp-route-catalog-path
    desc: Nextcloud MCP route catalog path
    for: [python]
    if:
      type: path
      substr: nextcloud_mcp_server

  - id: deno-runtime-path
    desc: Deno runtime path
    for: [elf, javascript, tar, conda]
    if:
      type: path
      basename: true
      regex: '^(deno|pkg-deno-[^/]+\.tar\.zst)$'

composite_rules:
  - id: admin-route-catalog-path
    desc: Benign admin route catalog path
    crit: baseline
    conf: 0.98
    any:
      - id: miosa-route-catalog-path
      - id: nextcloud-mcp-route-catalog-path
