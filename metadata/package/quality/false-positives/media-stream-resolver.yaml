# A media resolver can legitimately use raw PHP endpoints and token
# placeholders while obtaining an HLS playlist.  Keep the individual network
# and token capabilities visible; suppress only the generic PHP-endpoint
# reputation objective when the same source file proves this media workflow.
defaults:
  platforms: [unix, windows]

composite_rules:
  - id: media-stream-resolver-context
    desc: HLS media resolver using tokenized stream endpoints
    crit: exception
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/url/php-endpoint::url-php-endpoint-script
      - id: micro-behaviors/communications/http/media::m3u8-playlist-url-extraction
      - id: micro-behaviors/communications/http/media::stream-token-placeholder-replacement
