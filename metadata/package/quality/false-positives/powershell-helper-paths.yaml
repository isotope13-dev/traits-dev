defaults:
  platforms: [windows]
  for: [powershell]

traits:
  - id: win-installer-helper-module
    desc: Windows installer helper module
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      exact: win-installer-helper.psm1
  - id: intune-remediation-script
    desc: Intune remediation script path
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      exact: Create-IntuneRemediation.ps1
