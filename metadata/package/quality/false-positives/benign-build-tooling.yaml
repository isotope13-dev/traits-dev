# Aggregator of benign build-tooling output (bundled/minified/transpiled/generated
# code, package-manager artifacts). Replaces bare-directory references to the former
# metadata/package/tooling grab-bag, which was split into metadata/build/* and
# metadata/package/manager/. Legs are directory references so expansion stays cheap.
defaults:
  platforms: [linux, windows, macos]
composite_rules:
  - id: benign-build-tooling-context
    desc: Output of a benign build/packaging tool (bundler, minifier, generator)
    crit: component
    conf: 0.9
    any:
      - id: metadata/build/bundler/
      - id: metadata/build/minifier/
      - id: metadata/build/autotools/
      - id: metadata/build/scaffold/
      - id: metadata/build/ci/
      - id: metadata/package/manager/
