defaults:
  for: [shell]
  platforms: [linux, macos]

traits:
  - id: app-version-home-dotfile
    desc: app version home dotfile
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'APP_VER=\$\(cat ~/\.[A-Za-z0-9._-]+\)'
  - id: noop-clear-wrapper
    desc: no-op clear command wrapper
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "> /tmp/.nc/clear; chmod +x /tmp/.nc/clear"
