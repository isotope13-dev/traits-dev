# Microsoft Office support/deployment archives carry signed Microsoft binaries
# and vendor scripts whose registry, WMI, COM, and embedded-code strings can
# resemble malware when the archive is analyzed as one scope.
defaults:
  platforms: [windows]
  for: [zip]

traits:
  - id: microsoft-office-support-bundle-name
    desc: Microsoft Office support bundle archive name
    crit: notable
    conf: 0.98
    if:
      type: basename
      regex: '^(Activate|SaRA|ODT)\.lotp$'

composite_rules:
  - id: microsoft-office-support-bundle-context
    desc: Signed Microsoft Office support bundle context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: microsoft-office-support-bundle-name
      - id: metadata/signed/leaf::microsoft-corporation
