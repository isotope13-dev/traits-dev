# NAPI-RS emits CommonJS loaders that replace the local `require` binding so
# createRequire(__filename) can resolve platform-specific native addons.  This
# is generated loader plumbing, not supply-chain function shadowing.
defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
  - id: napi-rs-generated-binding-loader
    desc: NAPI-RS generated native binding loader
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '@ts-nocheck[\s\S]{0,160}auto-generated by NAPI-RS[\s\S]{0,260}createRequire\(__filename\)'

composite_rules:
  - id: napi-rs-require-reassignment-context
    desc: NAPI-RS generated loader require reassignment context
    crit: exception
    conf: 0.99
    all:
      - id: napi-rs-generated-binding-loader
      - id: objectives/supply-chain/impersonation/shadow::js-require-reassignment
