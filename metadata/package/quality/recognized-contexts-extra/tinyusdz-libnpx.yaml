defaults:
  platforms: [unix, windows]

traits:
  - id: libnpx-package-identity
    desc: Published libnpx package name
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: name
      exact: libnpx
  - id: libnpx-repository-identity
    desc: npm npx repository URL
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: repository.url
      regex: 'github\.com/npm/npx(\.git)?$'
  - id: tinyusdz-project-path
    desc: tinyusdz source-tree path
    crit: notable
    conf: 1.0
    for: [python, c, cpp]
    if:
      type: path
      regex: 'tinyusdz@v[0-9]'
  - id: tinyusdz-cmake-marker
    desc: tinyusdz CMake extension marker
    crit: notable
    conf: 1.0
    for: [python]
    if:
      type: text
      substr: TINYUSDZ_WITH_C_API
  - id: tinyusdz-acutest-marker
    desc: acutest tracer diagnostic marker
    crit: notable
    conf: 1.0
    for: [c]
    if:
      type: text
      substr: acutest_is_tracer_present_

composite_rules:
  - id: libnpx-package-context
    desc: Recognized libnpx package context
    crit: exception
    conf: 1.0
    scope: archive
    all:
      - id: libnpx-package-identity
      - id: libnpx-repository-identity
  - id: tinyusdz-cmake-build-context
    desc: Recognized tinyusdz CMake packaging context
    crit: exception
    conf: 1.0
    scope: archive
    all:
      - id: tinyusdz-project-path
      - id: tinyusdz-cmake-marker
  - id: tinyusdz-acutest-context
    desc: Recognized tinyusdz acutest test context
    crit: exception
    conf: 1.0
    scope: archive
    all:
      - id: tinyusdz-project-path
      - id: tinyusdz-acutest-marker
