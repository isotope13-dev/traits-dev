# The official Astro project adopted these utility names in its 7.x releases.
# Keep supply-chain lookalike rules active for unrelated packages.
defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: astro-upstream-package-name
    desc: Official Astro package name
    crit: notable
    conf: 0.99
    if:
      type: value
      path: name
      exact: astro

  - id: astro-upstream-repository
    desc: Official Astro GitHub repository
    crit: notable
    conf: 0.99
    if:
      type: value
      path: repository.url
      regex: '^(git\+)?https://github\.com/withastro/astro(\.git)?$'

  - id: astro-upstream-author
    desc: Astro upstream publisher identity
    crit: notable
    conf: 0.95
    if:
      type: value
      path: author
      exact: withastro

composite_rules:
  - id: astro-upstream-release-context
    desc: Official Astro upstream release context
    crit: exception
    conf: 0.99
    for: [package.json, javascript, typescript, archives]
    scope: outer
    all:
      - id: astro-upstream-package-name
      - id: astro-upstream-repository
      - id: astro-upstream-author
