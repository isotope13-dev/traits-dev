# A skill/content export is a data corpus, not an executable script.  It can
# legitimately contain security-training examples that must not be treated as
# behaviors of the container file itself.
defaults:
  platforms: [unix, windows]
  for: [scripts, data]

traits:
  - id: hashed-text-record
    desc: Hashed text record in a content corpus
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '"id"\s*:\s*"[^"]{1,200}"\s*,\s*"sha256"\s*:\s*"sha256-[0-9a-f]{64}"\s*,\s*"text"\s*:'
    count_min: 20
    size_min: 1000000
