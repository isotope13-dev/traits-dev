defaults:
  for: [pkginfo]
  platforms: [unix, windows]
  attack: "T1195.002"
traits:
  - id: empty-dependency-spec
    desc: Registry dependency uses empty version spec
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,200}:\s*""'
  - id: multi-empty-dependency-specs
    desc: 'multi empty dependency specs'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,200}:\s*""[^}]{0,200}:\s*""'
composite_rules:
  - id: throwaway-blank-dependency-specs
    desc: Tiny inflated registry package uses blank dependency specs
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
      - id: empty-dependency-spec
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-dist-minimal-filecount
    any:
      - id: multi-empty-dependency-specs
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-dist-tiny-unpacked-size
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-inflated-version-raw
    needs: 2
