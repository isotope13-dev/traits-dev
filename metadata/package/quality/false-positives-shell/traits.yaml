defaults:
  platforms: [unix, windows]
  for: [shell]

traits:
  - id: shell-cmake-definition-marker
    desc: CMake definition assignment in shell text
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(?m)^\s*-D[A-Z][A-Z0-9_]*(:[A-Za-z]+)?='
  - id: shell-benchmark-path-marker
    desc: Benchmark path in shell text
    crit: component
    conf: 0.99
    if:
      type: path
      regex: '(^|[\\/])benchmarks[\\/]'
  - id: shell-pgp-rc-basename-marker
    desc: PGP configuration basename
    crit: component
    conf: 0.99
    if:
      type: basename
      exact: pgp6.rc
  - id: shell-gpg-rc-basename-marker
    desc: GPG configuration basename
    crit: component
    conf: 0.99
    if:
      type: basename
      exact: gpg.rc
  - id: shell-generated-uuid-command-ledger
    desc: Shell UUID ledger from/to args
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(?im)--from\s+[0-9a-f-]{36}\s+--to\s+[0-9a-f-]{36}\b'

  # Python package-management helpers may generate a short-lived Windows
  # script which removes itself after the upgrade completes. These are
  # notable updater mechanics, not evidence that the parent application is
  # evading analysis.
  - id: python-temporary-update-script
    desc: Python writes temporary update script
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: 'update_script\s*=\s*f["'']{3}'
  - id: python-package-upgrade-command
    desc: Python updater invokes package upgrade
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: '["'']install["'']\s*,\s*["'']--upgrade["'']'
  - id: python-windows-update-console
    desc: Python updater opens a new Windows console
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      substr: CREATE_NEW_CONSOLE

composite_rules:
  - id: python-windows-package-updater
    desc: Python temporary Windows package updater
    crit: exception
    conf: 0.96
    for: [python]
    all:
      - id: python-temporary-update-script
      - id: python-package-upgrade-command
      - id: python-windows-update-console

  - id: shell-high-entropy-benign-context
    desc: Known benign context for high-entropy shell identifiers
    crit: component
    conf: 0.99
    any:
      - id: well-known/app/
      - id: metadata/package/quality/false-positives::bind9-dnssec-clean-path
      - id: shell-cmake-definition-marker
      - id: shell-benchmark-path-marker
      - id: shell-pgp-rc-basename-marker
      - id: shell-gpg-rc-basename-marker
      - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-ca-trust-p11-kit-marker
      - id: metadata/package/files/system-package::dpkg-maintainer-script
      - id: shell-generated-uuid-command-ledger
