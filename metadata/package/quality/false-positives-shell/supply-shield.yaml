defaults:
  platforms: [unix, windows]

traits:
  - id: supply-shield-fixture-script
    desc: Supply-shield fixture generator script
    crit: notable
    conf: 1.0
    for: [shell]
    if:
      type: basename
      exact: supply-shield-fixtures.sh
  - id: supply-shield-fixture-markers
    desc: Supply-shield fixture markers
    crit: notable
    conf: 1.0
    for: [shell]
    if:
      type: text
      substr: supply-shield

composite_rules:
  - id: supply-shield-fixture-context
    desc: Recognized supply-chain test fixture generator
    crit: exception
    conf: 1.0
    scope: archive
    all:
      - id: supply-shield-fixture-script
      - id: supply-shield-fixture-markers
