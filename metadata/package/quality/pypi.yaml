defaults:
  platforms: [windows, unix]
  for: [pkginfo]
  crit: component
  conf: 0.9

traits:
  - id: pkginfo-core-metadata
    desc: Python core metadata marker
    conf: 1.0
    if:
      type: value
      path: metadata-version
      regex: '^[0-9]+(\.[0-9]+)?$'
  - id: pkginfo-name-field
    desc: PKG-INFO declares package name
    if:
      type: value
      path: name
  - id: pkginfo-version-field
    desc: PKG-INFO declares package version
    if:
      type: value
      path: version
  - id: pkginfo-summary-field
    desc: PKG-INFO declares package summary
    if:
      type: value
      path: summary
      regex: '.{12,}'
  - id: pkginfo-requires-python
    desc: PKG-INFO declares Python requirement
    if:
      type: value
      path: requires-python
  - id: pkginfo-requires-dist
    desc: PKG-INFO declares runtime dependencies
    if:
      type: value
      path: requires-dist
      size_min: 1
  - id: pkginfo-license-expression
    desc: PKG-INFO declares license expression
    if:
      type: value
      path: license-expression
  - id: pkginfo-license-file
    desc: PKG-INFO declares license file
    if:
      type: value
      path: license-file
  - id: pkginfo-markdown-description
    desc: PKG-INFO declares markdown description
    if:
      type: value
      path: description-content-type
      exact: text/markdown
  - id: wheel-archive-member
    desc: Python wheel archive metadata
    conf: 0.98
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '\.dist-info/WHEEL$'

composite_rules:
  - id: pypi-basic-metadata
    desc: PyPI package has basic metadata
    crit: baseline
    conf: 0.95
    all:
      - id: pkginfo-core-metadata
      - id: pkginfo-name-field
      - id: pkginfo-version-field
      - id: pkginfo-summary-field
  - id: pypi-runtime-metadata
    desc: PyPI package declares runtime metadata
    crit: baseline
    conf: 0.94
    all:
      - id: pkginfo-core-metadata
      - id: pkginfo-requires-python
      - id: pkginfo-requires-dist
  - id: pypi-license-metadata
    desc: PyPI package declares license metadata
    crit: baseline
    conf: 0.94
    all:
      - id: pkginfo-core-metadata
    any:
      - id: pkginfo-license-expression
      - id: pkginfo-license-file
  - id: pypi-rich-metadata
    desc: PyPI package has rich metadata
    crit: baseline
    conf: 0.95
    all:
      - id: pkginfo-core-metadata
    needs: 4
    any:
      - id: pypi-basic-metadata
      - id: pypi-runtime-metadata
      - id: pypi-license-metadata
      - id: pkginfo-markdown-description
