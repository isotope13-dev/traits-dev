defaults:
  platforms: [windows]
  for: [powershell]

traits:
  - id: powershell-release-installer
    desc: PowerShell release installer source
    crit: notable
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: '(?i)function\s+(Get-Installer|Invoke-Installer)|releases/download'
