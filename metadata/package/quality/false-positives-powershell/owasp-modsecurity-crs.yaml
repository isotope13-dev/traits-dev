# The OWASP ModSecurity Core Rule Set ships PowerShell command-name catalogs
# as data files. Cleave may classify these catalogs as PowerShell from their
# contents, but they are signatures consumed by ModSecurity, not scripts.
defaults:
  platforms: [unix, windows]

traits:
  - id: owasp-crs-powershell-catalog-name
    desc: OWASP CRS PowerShell catalog filename
    crit: notable
    conf: 1.0
    for: [powershell]
    if:
      type: basename
      exact: windows-powershell-commands.data

  - id: owasp-crs-rules-directory
    desc: OWASP CRS rule directory path
    crit: notable
    conf: 1.0
    for: [powershell]
    if:
      type: path
      substr: owasp-modsecurity-crs

composite_rules:
  - id: owasp-crs-powershell-catalog-context
    desc: OWASP CRS PowerShell signature-data context
    crit: exception
    conf: 1.0
    all:
      - id: owasp-crs-powershell-catalog-name
      - id: owasp-crs-rules-directory
