defaults:
  platforms: [windows]
  for: [csharp]

traits:
  - id: networkmanager-autostart-manager
    desc: NetworkManager autostart manager class
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: 'class AutostartManager'
  - id: networkmanager-autostart-parameter
    desc: NetworkManager autostart command parameter
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: 'ParameterAutostart'
  - id: networkmanager-application-command
    desc: NetworkManager application command configuration
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: 'ConfigurationManager.Current.ApplicationFullName'

composite_rules:
  - id: networkmanager-autostart-context
    desc: NetworkManager autostart manager context
    crit: exception
    conf: 0.99
    all:
      - id: networkmanager-autostart-manager
      - id: networkmanager-autostart-parameter
      - id: networkmanager-application-command
