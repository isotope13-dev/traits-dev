defaults:
  platforms: [windows, unix]
  for:
    - package.json
traits:
  - id: has-docs
    desc: Package has documentation directory
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"docs/"|"doc/"|"documentation"\s*:'
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    not:
      - substr: '":memo: Documentation"'
      - regex: '"repository"\s*:\s*\{[^}]{0,120}github\.com/'
  - id: has-github-config-1
    desc: Package references GitHub (config/workflows)
    if:
      type: text
      regex: \\.github|workflows|CONTRIBUTING
  - id: has-github-config-2
    desc: Package references GitHub (docs/security)
    if:
      type: text
      regex: CODE_OF_CONDUCT|SECURITY\\.md
  - id: has-tsconfig
    desc: Package has TypeScript configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: tsconfig\\.json|tsconfig\\.build\\.json
  - id: has-typescript
    desc: Package declares TypeScript tooling
    crit: notable
    conf: 0.9
    size_min: 900
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: text
      regex: '"typescript"|"\.d\.ts"|"tsconfig"'
  - id: has-eslint-config
    desc: Package has ESLint configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\.eslintrc|eslint\\.config|"eslintConfig":'
  - id: has-eslint-config-package
    desc: Package is ESLint configuration
    crit: notable
    conf: 0.9
    if:
      type: value
      path: name
      regex: '(^|[/-])eslint-config($|[/-])'
  - id: has-react-eslint-config-package
    desc: Package depends on React ESLint plugins
    crit: component
    conf: 0.88
    if:
      type: value
      path: dependencies
      regex: 'eslint-plugin-react'
  - id: has-prettier-config
    desc: Package has Prettier configuration
    crit: notable
    conf: 0.9
    # Match config files or a package.json `prettier: { ... }` config object —
    # not a `"prettier":` dependency version string.
    if:
      type: text
      regex: '\\.prettierrc|prettier\\.config\\.|"prettier"\s*:\s*\{'
  - id: has-babel-config
    desc: Package has Babel configuration
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\\.babelrc|babel\\.config|"babel":'
  - id: has-editorconfig
    desc: Package has editor configuration
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \\.editorconfig
  - id: has-npmignore-or-files
    desc: Package has publishing configuration
    crit: baseline
    conf: 0.85
    if:
      type: value
      path: files
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
      - type: value
        path: repository.url
        regex: github\.com/
    not:
      - substr: '"name": "inflight"'
  - id: npm-publish-version-field
    desc: npm publish-added _npmVersion field
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: '"_npmVersion"'
  - id: node-publish-version-field
    desc: npm publish-added _nodeVersion field
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: '"_nodeVersion"'
composite_rules:
  - id: has-github-config
    desc: Package references GitHub configuration
    crit: notable
    conf: 0.9
    any:
      - id: has-github-config-1
      - id: has-github-config-2
  - id: has-react-eslint-config
    desc: Package is React ESLint config
    crit: notable
    conf: 0.9
    all:
      - id: has-eslint-config-package
      - id: has-react-eslint-config-package
