# Password-strength blocklists are data used to reject weak credentials, not
# credential-spraying dictionaries.  Keep this context available to neutral
# identity rules and brute-force heuristics that otherwise see individual list
# entries as standalone behavior.
defaults:
  platforms: [unix, windows]
  for: [javascript, php]

traits:
  - id: jelix-browser-password-blocklist
    desc: Jelix browser password-strength blocklist
    crit: notable
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: JelixPasswordEditorPasswords

  - id: jelix-server-password-blocklist
    desc: Jelix server password-strength blocklist
    crit: notable
    conf: 0.98
    for: [php]
    if:
      type: basename
      exact: jAuthMostUsedPasswords.php

composite_rules:
  - id: password-strength-blocklist-context
    desc: Password-strength blocklist source context
    crit: component
    conf: 0.98
    any:
      - id: jelix-browser-password-blocklist
      - id: jelix-server-password-blocklist
