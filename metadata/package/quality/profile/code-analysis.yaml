defaults:
  platforms: [unix, windows]
  for: [whl, pkginfo]
  crit: notable
  conf: 0.86

traits:
  - id: pypi-codegraph-static-analysis-summary
    desc: PyPI metadata advertises code graph analysis
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    if:
      type: text
      regex: '(?i)Language-agnostic code graph.{0,160}source-to-sink call paths'

  - id: pypi-multilanguage-entrypoint-scanner
    desc: PyPI metadata advertises entrypoint scanner
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    if:
      type: text
      regex: '(?i)entrypoints.{0,120}(tree-sitter|serverless|Procfile|Dockerfile)'

  - id: pypi-remote-git-indexing
    desc: PyPI metadata advertises remote git indexing
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    if:
      type: text
      regex: '(?i)positional argument may also be a \*\*git URL\*\*.{0,160}clones it'

  - id: pypi-hidden-clone-workspace
    desc: PyPI metadata documents hidden clone workspace
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    if:
      type: text
      regex: '(?i)reused workspace.{0,80}\.entrygraph/clones'
