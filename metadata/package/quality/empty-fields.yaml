defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  conf: 0.8
traits:
  - id: npm-empty-description
    desc: npm package has empty description
    crit: notable
    conf: 0.85
    attack: T1195.002
    for:
      - package.json
    if:
      type: kv
      path: description
      exact: ''
  - id: npm-no-description
    desc: npm package missing description field
    crit: baseline
    conf: 0.85
    attack: T1195.002
    for:
      - package.json
    if:
      type: kv
      path: description
      exists: false
    unless:
      - type: text
        substr: 'workspace:'
      - type: text
        substr: '"catalog:'
  - id: npm-empty-author
    desc: npm package has empty author
    crit: notable
    conf: 0.75
    for:
      - package.json
    if:
      type: kv
      path: author
      exact: ''
    unless:
      - type: text
        substr: 'tabby-builtin-plugin'
      - type: text
        substr: '"name"        : "cycle"'
    downgrade:
      any:
        - id: metadata/package/fields::official-react-native-package
  - id: npm-no-author
    desc: npm package missing author field
    crit: baseline
    conf: 0.75
    for:
      - package.json
    if:
      type: kv
      path: author
      exists: false
    unless:
      - type: kv
        path: maintainers
        exists: true
      - type: text
        substr: 'tabby-builtin-plugin'
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-monorepo-workspace-dep
      - id: objectives/supply-chain/metadata-anomaly/scoring::npm-native-addon-wrapper
      - id: metadata/package/fields::has-contributors
    downgrade:
      any:
        - id: metadata/package/fields::official-react-native-package
  - id: npm-empty-license
    desc: npm package has empty license
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: kv
      path: license
      exact: ''
  - id: npm-has-licenses-array
    desc: npm package uses legacy licenses array
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: kv
      path: licenses
      exists: true
  - id: npm-no-license
    desc: npm package missing license field
    crit: baseline
    conf: 0.7
    for:
      - package.json
    if:
      type: kv
      path: license
      exists: false
    unless:
      - type: kv
        path: licenses
        exists: true
      - type: text
        substr: 'workspace:'
      - type: text
        substr: '"catalog:'
  - id: npm-empty-homepage
    desc: npm package has empty homepage
    crit: notable
    conf: 0.6
    for:
      - package.json
    if:
      type: kv
      path: homepage
      exact: ''
  - id: npm-no-keywords
    desc: npm package has no keywords
    crit: baseline
    conf: 0.5
    for:
      - package.json
    if:
      type: kv
      path: keywords
      exists: false
    unless:
      - type: text
        substr: 'workspace:'
      - type: text
        substr: '"catalog:'
  - id: npm-has-name
    desc: npm package has name field
    crit: baseline
    conf: 1.0
    for:
      - package.json
    if:
      type: kv
      path: name
      exists: true
  - id: pypi-empty-description
    desc: PyPI package has empty description
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    for:
      - python
    if:
      type: string_literal
      regex: description\s*=\s*['"]\s*['"]
  - id: pypi-empty-summary
    desc: PyPI package has empty summary
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    for:
      - python
    if:
      type: string_literal
      regex: summary\s*=\s*['"]\s*['"]
  - id: pypi-empty-author
    desc: PyPI package has empty author
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: string_literal
      regex: author\s*=\s*['"]\s*['"]
  - id: pypi-empty-author-email
    desc: PyPI package has empty author_email
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: string_literal
      regex: author_email\s*=\s*['"]\s*['"]
  - id: pypi-empty-license
    desc: PyPI package has empty license
    crit: notable
    conf: 0.7
    for:
      - python
    if:
      type: string_literal
      regex: license\s*=\s*['"]\s*['"]
  - id: pypi-empty-url
    desc: PyPI package has empty url
    crit: notable
    conf: 0.65
    for:
      - python
    if:
      type: string_literal
      regex: url\s*=\s*['"]\s*['"]
  - id: gem-empty-description
    desc: RubyGem has empty description
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    for:
      - ruby
    if:
      type: string_literal
      regex: \.description\s*=\s*['"]\s*['"]
  - id: gem-empty-summary
    desc: RubyGem has empty summary
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    for:
      - ruby
    if:
      type: string_literal
      regex: \.summary\s*=\s*['"]\s*['"]
  - id: gem-empty-author
    desc: RubyGem has empty author
    crit: notable
    conf: 0.75
    for:
      - ruby
    if:
      type: string_literal
      regex: \.author\s*=\s*['"]\s*['"]
  - id: gem-empty-email
    desc: RubyGem has empty email
    crit: notable
    conf: 0.75
    for:
      - ruby
    if:
      type: string_literal
      regex: \.email\s*=\s*['"]\s*['"]
  - id: gem-empty-license
    desc: RubyGem has empty license
    crit: notable
    conf: 0.7
    for:
      - ruby
    if:
      type: string_literal
      regex: \.license\s*=\s*['"]\s*['"]
  - id: gem-empty-homepage
    desc: RubyGem has empty homepage
    crit: notable
    conf: 0.65
    for:
      - ruby
    if:
      type: string_literal
      regex: \.homepage\s*=\s*['"]\s*['"]
composite_rules:
  - id: npm-empty-description-any
    desc: npm package has empty or missing description
    crit: baseline
    conf: 0.85
    attack: T1195.002
    for:
      - package.json
    all:
      - id: npm-has-name
      - id: metadata/package/fields::npm-has-version
    any:
      - id: npm-empty-description
      - id: npm-no-description
    downgrade:
      any:
        - id: metadata/package/fields::pkg-skeleton-small
  - id: npm-low-quality-metadata
    desc: npm package with incomplete metadata
    crit: baseline
    conf: 0.85
    attack: T1195.002
    for:
      - package.json
    all:
      - id: npm-has-name
      - id: metadata/package/fields::npm-has-version
    needs: 3
    any:
      - id: npm-empty-description
      - id: npm-no-description
      - id: npm-empty-author
      - id: npm-no-author
      - id: npm-empty-license
      - id: npm-no-license
      - id: npm-empty-homepage
      - id: npm-no-keywords
    downgrade:
      any:
        - id: metadata/package/fields::pkg-skeleton-small
        - id: metadata/package/fields::has-homepage-field
  - id: pypi-empty-info
    desc: PyPI package with empty metadata
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    for:
      - python
    needs: 2
    any:
      - id: pypi-empty-description
      - id: pypi-empty-summary
      - id: pypi-empty-author
      - id: pypi-empty-author-email
      - id: pypi-empty-license
  - id: gem-empty-info
    desc: RubyGem with empty metadata
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    for:
      - ruby
    needs: 2
    any:
      - id: gem-empty-description
      - id: gem-empty-summary
      - id: gem-empty-author
      - id: gem-empty-email
      - id: gem-empty-license
