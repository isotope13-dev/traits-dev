defaults:
  platforms: [unix, windows]

traits:
- id: azion-cli-readme-heading
  desc: Azion CLI README heading
  crit: notable
  conf: 1.0
  for: [markdown]
  if:
    type: text
    regex: '(?m)^# Azion CLI\s*$'

composite_rules:
- id: azion-cli-readme-identity
  desc: Azion CLI README identity
  crit: notable
  conf: 1.0
  for: [markdown]
  all:
  # Generic README basename — not Azion-specific; identity comes from the heading.
  - id: metadata/package/documentation::package-doc-reference-basename
  - id: azion-cli-readme-heading
- id: azion-cli-official-source-context
  desc: Recognized official Azion CLI source archive
  crit: exception
  conf: 1.0
  scope: archive
  all:
  - id: azion-cli-readme-identity
  - id: azion-cli-readme-heading
