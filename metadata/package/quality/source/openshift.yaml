defaults:
  platforms: [unix, windows]

# The release repository's CI steps legitimately stage and execute build and
# test tooling.  Keep this context narrow: it requires the recognized source
# tree and a basename unique to the affected CI step families.
traits:
  - id: openshift-release-ci-step-basename
    desc: OpenShift release CI step basename
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: basename
      regex: '(powervs|istio|microshift|vsphere)-.*-commands\.sh$'

composite_rules:
  - id: openshift-release-ci-download-context
    desc: Recognized OpenShift release CI tooling
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: metadata/package/quality/recognized-contexts::openshift-release-source-tree
      - id: openshift-release-ci-step-basename
