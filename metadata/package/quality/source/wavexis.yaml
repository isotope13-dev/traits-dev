defaults:
  platforms: [unix, windows]

traits:
  - id: wavexis-pypi-package
    desc: wavexis PyPI package
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: wavexis
  - id: wavexis-project-repository
    desc: wavexis project repository
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: project-url[*]
      substr: github.com/MathiasPaulenko/wavexis
  - id: wavexis-python-module
    desc: wavexis Python module
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: import
      regex: '^wavexis(\\.|$)'
  - id: wavexis-source-file-path
    desc: Source file under the wavexis package directory
    crit: notable
    conf: 0.99
    for: [python, javascript, typescript]
    if:
      type: path
      regex: '(^|[\\/])wavexis[\\/]'

composite_rules:
  - id: wavexis-package-identity-context
    desc: Recognized wavexis browser automation package source
    crit: exception
    conf: 0.99
    for: [pkginfo, python, whl]
    scope: archive
    any:
      - id: wavexis-pypi-package
      - id: wavexis-project-repository
      - id: wavexis-source-file-path
