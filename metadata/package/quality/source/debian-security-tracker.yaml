defaults:
  platforms: [linux, windows]
  for: [zip]

traits:
  - id: security-tracker-cve-list
    desc: Debian security tracker CVE database member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'data[/\\]CVE[/\\]list$'
  - id: security-tracker-cve-leaf
    desc: Debian security tracker CVE list file
    crit: notable
    conf: 0.99
    for: [vbs]
    if:
      type: path
      regex: 'CVE[/\\]list$'
  - id: security-tracker-maintenance-script
    desc: Debian security tracker maintenance script
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'security-tracker-team[/\\]security-tracker@[^/\\]+[/\\]bin[/\\]check-new-issues$'
  - id: security-tracker-repo-root
    desc: Debian security tracker repository root member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'security-tracker-team[/\\]security-tracker@[^/\\]+[/\\]Makefile$'
  - id: security-tracker-tracker-script
    desc: Debian security tracker data script member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'security-tracker-team[/\\]security-tracker@[^/\\]+[/\\]bin[/\\]tracker_data\.py$'
