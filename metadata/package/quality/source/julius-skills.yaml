defaults:
  platforms: [unix, windows]

traits:
  - id: julius-skills-package-name
    desc: Julius Skills package name
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: name
      exact: "@juliusbrussee/skills"

  - id: julius-skills-readme-heading
    desc: Julius Skills README heading
    crit: notable
    conf: 1.0
    for: [markdown]
    if:
      type: text
      regex: '(?m)^# Julius Skills\s*$'

  - id: julius-skills-loop-factory-heading
    desc: Loop Factory installation heading
    crit: notable
    conf: 1.0
    for: [markdown]
    if:
      type: text
      substr: "Loop Factory has two pieces:"

  - id: official-claude-installer-command
    desc: Official Claude installer command
    crit: notable
    conf: 1.0
    for: [markdown]
    if:
      type: text
      regex: 'claude\.ai/install\.sh\s*\|\s*bash\b'

composite_rules:
  - id: julius-skills-source-context
    desc: Julius Skills source archive context
    crit: exception
    conf: 1.0
    scope: outer
    all:
      - id: julius-skills-package-name
      - id: julius-skills-readme-heading

  - id: julius-skills-installer-document-context
    desc: Julius Skills installer document context
    crit: exception
    conf: 1.0
    all:
      - id: julius-skills-loop-factory-heading
      - id: official-claude-installer-command
