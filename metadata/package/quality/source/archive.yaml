defaults:
  platforms: [unix, windows]
  for: [go, shell, python, dockerfile]
traits:
  - id: go-module-proxy-source-archive-member
    desc: Go module proxy source archive member
    crit: baseline
    conf: 0.95
    if:
      type: path
      regex: 'github\.com-[^/]+\.zip'
  - id: github-release-source-archive-member
    desc: GitHub release source archive member
    crit: baseline
    conf: 0.92
    if:
      type: path
      regex: 'github\.com-.+-v[0-9].*-source\.tar\.gz'
  - id: go-module-versioned-source-path
    desc: Go module versioned source path
    crit: baseline
    conf: 0.9
    if:
      type: path
      regex: '@v[0-9][0-9A-Za-z_.-]+'
  - id: tbd54566975-case-variant-archive-member
    desc: Case-variant GitHub namespace member
    crit: suspicious
    conf: 0.98
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/Tbd54566975/ftl@v[0-9][0-9A-Za-z_.-]+/'
  - id: tbd54566975-case-variant-go-mod-member
    desc: Case-variant archive contains go.mod
    crit: suspicious
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/Tbd54566975/ftl@v[0-9][0-9A-Za-z_.-]+/go\.mod$'
  - id: tbd54566975-case-variant-bootstrap-member
    desc: Case-variant archive contains bootstrap
    crit: suspicious
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/Tbd54566975/ftl@v[0-9][0-9A-Za-z_.-]+/bin/hermit$'
composite_rules:
  - id: source-archive-member
    desc: Source archive member context
    crit: baseline
    conf: 0.9
    any:
      - id: go-module-proxy-source-archive-member
      - id: github-release-source-archive-member
      - id: go-module-versioned-source-path
