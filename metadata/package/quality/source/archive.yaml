defaults:
  platforms: [unix, windows]
  for: [zip, go, shell, python, dockerfile]
traits:
  - id: go-module-proxy-source-archive-member
    desc: Go module proxy source archive member
    crit: baseline
    conf: 0.95
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip, go]
    if:
      type: path
      regex: 'github\.com-[^/]+\.zip'
  - id: github-release-source-archive-member
    desc: GitHub release source archive member
    crit: baseline
    conf: 0.92
    for: [zip]
    if:
      type: path
      regex: 'github\.com-.+-v[0-9].*-source\.tar\.gz'
  - id: github-versioned-source-archive-member
    desc: GitHub versioned source archive member
    crit: baseline
    conf: 0.95
    for: [zip]
    if:
      type: path
      regex: 'github\.com/[^[:space:]]+@v[0-9]'
  - id: github-versioned-uppercase-namespace-member
    desc: GitHub source path has uppercase namespace
    crit: component
    conf: 0.86
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]*[A-Z][^/]*/[^/]+@v[0-9][0-9A-Za-z_.-]+/'
  - id: github-versioned-uppercase-repo-member
    desc: GitHub source path has uppercase repo
    crit: component
    conf: 0.86
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]+/[^/]*[A-Z][^/]*@v[0-9][0-9A-Za-z_.-]+/'
  - id: github-versioned-go-mod-member
    desc: GitHub source archive contains go.mod
    crit: baseline
    conf: 0.9
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]+/[^/]+@v[0-9][0-9A-Za-z_.-]+/go\.mod$'
  - id: github-versioned-hermit-bootstrap-member
    desc: GitHub source archive contains Hermit bootstrap
    crit: notable
    conf: 0.92
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]+/[^/]+@v[0-9][0-9A-Za-z_.-]+/bin/hermit$'
  - id: github-versioned-block-ftl-mismatched-root
    desc: GitHub source archive mismatches Block FTL
    crit: notable
    conf: 0.93
    ref: sha256:873c0af73230b5aa01416cd0f48fae7f04bb52ddf3b12af42b42ead0b2f81d32
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]+/ftl@v[0-9][0-9A-Za-z_.-]+/go\.mod$'
    not:
      - regex: '^github\.com/block/ftl@'
  - id: wheel-contains-python-source
    desc: Wheel archive contains Python source member
    crit: baseline
    conf: 0.99
    for: [whl]
    if:
      type: value
      path: archive.members[*].path
      regex: '(?i)\.py$'
composite_rules:
  - id: source-archive-member
    desc: Source archive member context
    crit: baseline
    conf: 0.9
    for: [zip]
    any:
      - id: go-module-proxy-source-archive-member
      - id: github-release-source-archive-member
      - id: github-versioned-source-archive-member
