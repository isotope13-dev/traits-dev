defaults:
  platforms: [unix, windows]
  for: [go, shell, python, dockerfile]
traits:
  - id: go-module-proxy-source-archive-member
    desc: Go module proxy source archive member
    crit: baseline
    conf: 0.95
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: path
      regex: 'github\.com-[^/]+\.zip'
  - id: github-release-source-archive-member
    desc: GitHub release source archive member
    crit: baseline
    conf: 0.92
    if:
      type: path
      regex: 'github\.com-.+-v[0-9].*-source\.tar\.gz'
  - id: go-module-versioned-source-path
    desc: Go module versioned source path
    crit: baseline
    conf: 0.9
    if:
      type: path
      regex: '@v[0-9][0-9A-Za-z_.-]+'
  - id: github-versioned-uppercase-namespace-member
    desc: GitHub source path has uppercase namespace
    crit: notable
    conf: 0.86
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]*[A-Z][^/]*/[^/]+@v[0-9][0-9A-Za-z_.-]+/'
  - id: github-versioned-uppercase-repo-member
    desc: GitHub source path has uppercase repo
    crit: notable
    conf: 0.86
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]+/[^/]*[A-Z][^/]*@v[0-9][0-9A-Za-z_.-]+/'
  - id: github-versioned-go-mod-member
    desc: GitHub source archive contains go.mod
    crit: baseline
    conf: 0.9
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]+/[^/]+@v[0-9][0-9A-Za-z_.-]+/go\.mod$'
  - id: github-versioned-hermit-bootstrap-member
    desc: GitHub source archive contains Hermit bootstrap
    crit: notable
    conf: 0.92
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^github\.com/[^/]+/[^/]+@v[0-9][0-9A-Za-z_.-]+/bin/hermit$'
composite_rules:
  - id: source-archive-member
    desc: Source archive member context
    crit: baseline
    conf: 0.9
    any:
      - id: go-module-proxy-source-archive-member
      - id: github-release-source-archive-member
      - id: go-module-versioned-source-path
