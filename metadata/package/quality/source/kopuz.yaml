defaults:
  platforms: [linux, windows, android]
  for: [zip]

traits:
  - id: kopuz-source-readme
    desc: Kopuz music-player source README member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'Kopuz-org[/\\]kopuz@[^/\\]+[/\\]README\.md$'
  - id: kopuz-isolated-cookie-module
    desc: Kopuz isolated-browser cookie module member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'cookies[/\\]windows_native\.rs$'
  - id: kopuz-isolated-cookie-leaf
    desc: Kopuz isolated-browser cookie source file
    crit: notable
    conf: 0.99
    for: [rust]
    if:
      type: path
      regex: 'cookies[/\\]windows_native\.rs$'
  - id: kopuz-youtube-cookie-consumer
    desc: Kopuz YouTube Music cookie consumer member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'ytmusic[/\\]cookies\.rs$'
  - id: kopuz-android-media-activity
    desc: Kopuz Android media activity member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'main[/\\]MainActivity\.kt$'
  - id: kopuz-android-activity-leaf
    desc: Kopuz Android media activity source file
    crit: notable
    conf: 0.99
    for: [kotlin]
    if:
      type: path
      regex: 'main[/\\]MainActivity\.kt$'
  - id: kopuz-android-media-service
    desc: Kopuz Android foreground media service member
    crit: notable
    conf: 0.99
    if:
      type: value
      path: archive.members[*].path
      regex: 'kopuz[/\\]MusicService\.kt$'
  - id: kopuz-aur-recipe-variant
    desc: Multiple PKGBUILD recipe variants
    crit: notable
    conf: 0.99
    count_min: 2
    if:
      type: value
      path: archive.members[*].path
      regex: 'packaging[/\\]aur[/\\]PKGBUILD(-[^/\\]+)?$'
