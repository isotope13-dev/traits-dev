defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: konk-source-tree-path
    desc: Infoblox Konk source tree path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(?i)infobloxopen/konk@v[0-9][^/]*'

  - id: konk-certificate-repair-script
    desc: Konk certificate repair script basename
    crit: notable
    conf: 0.99
    if:
      type: basename
      regex: '(?i)^fix-(missing-certificates|ca-mismatch)\.sh$'

composite_rules:
  - id: konk-certificate-repair-script-context
    desc: Recognized Konk certificate repair script context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: konk-source-tree-path
      - id: konk-certificate-repair-script
