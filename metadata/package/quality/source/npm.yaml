# Code Quality Composite Rules
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: terser-minifier-helpers
    desc: Minifier helper patterns
    for: [javascript]
    any:
      - {id: metadata/build/minifier/}
      - {id: metadata/build/bundler/}
    crit: baseline
  - id: terser-output
    desc: JavaScript transpiler or minifier markers
    crit: baseline
    conf: 0.85
    for: [javascript]
    all:
      - {id: 'metadata/build/minifier::use-strict-quote'}
    any:
      - {id: 'metadata/build/minifier::void-zero'}
      - {id: 'metadata/build/minifier::esmodule-export'}
  - id: has-multiple-entries
    desc: Package has multiple entry points
    crit: notable
    conf: 0.85
    for: [package.json]
    needs: 2
    any:
      - {id: 'metadata/package/manifest/entrypoint::pkg-main-field'}
      - {id: 'metadata/package/manifest/entrypoint::pkg-module-field'}
      - {id: 'metadata/package/manifest/entrypoint::has-exports-field'}
      - {id: 'metadata/package/manifest/entrypoint::pkg-types-field'}
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
