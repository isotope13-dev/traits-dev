defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: marp-team-package-name
    desc: Official Marp Team package identity
    crit: notable
    conf: 0.99
    if:
      type: value
      path: name
      regex: '^(@marp-team/marp-(cli|core)|marp-vscode)$'
  - id: marp-team-repository
    desc: Official Marp Team GitHub repository identity
    crit: notable
    conf: 0.99
    if:
      type: value
      path: repository.url
      regex: '^https://github\.com/marp-team/marp-(cli|core|vscode)$'
  - id: marp-team-release-version-script
    desc: Marp Team release version script
    crit: notable
    conf: 0.99
    if:
      type: value
      path: scripts.version
      substr: 'raw.githubusercontent.com/marp-team/actions/v1/lib/scripts/version.js | node'

composite_rules:
  - id: marp-team-release-context
    desc: Recognized Marp Team release package context
    crit: component
    conf: 0.99
    all:
      - id: marp-team-package-name
      - id: marp-team-repository
      - id: marp-team-release-version-script
