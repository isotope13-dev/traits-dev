defaults:
  platforms: [unix, windows]

traits:
- id: pipewire-source-tree
  desc: PipeWire source tree path
  crit: notable
  conf: 0.99
  for: [c]
  if:
    type: path
    regex: '(^|[\\/])pipewire-[0-9][^\\/]*'
- id: monado-source-tree
  desc: Monado source tree path
  crit: notable
  conf: 0.99
  for: [powershell]
  if:
    type: path
    regex: '(^|[\\/])monado-[0-9][^\\/]*'
