defaults:
  platforms: [unix, windows]

traits:
- id: freerdp-source-tree
  desc: FreeRDP upstream source path
  crit: notable
  conf: 0.99
  for: [c, cpp, objc, shell]
  platforms: [ios, unix, windows]
  if:
    type: path
    regex: '(^|[\\/])FreeRDP-[0-9][^\\/]*'
- id: pipewire-source-tree
  desc: PipeWire source tree path
  crit: notable
  conf: 0.99
  for: [c]
  if:
    type: path
    regex: '(^|[\\/])pipewire-[0-9][^\\/]*'
- id: monado-source-tree
  desc: Monado source tree path
  crit: notable
  conf: 0.99
  for: [powershell]
  if:
    type: path
    regex: '(^|[\\/])monado-[0-9][^\\/]*'
- id: paddleocr-source-tree
  desc: PaddleOCR upstream source tree path
  crit: notable
  conf: 0.99
  for: [python, shell]
  if:
    type: path
    regex: '(^|[\\/])PaddleOCR-[0-9][^\\/]*'
