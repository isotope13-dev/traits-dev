defaults:
  platforms: [unix, windows]

traits:
  - id: installtime-audit-package
    desc: installtime-audit package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: installtime-audit
  - id: installtime-audit-marker-catalog
    desc: installtime-audit marker catalog
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: basename
      exact: _markers.py

composite_rules:
  - id: installtime-audit-defensive-scanner-context
    desc: installtime-audit defensive scanner context
    crit: exception
    conf: 0.99
    for: [whl]
    scope: outer
    all:
      - id: installtime-audit-package
      - id: installtime-audit-marker-catalog
