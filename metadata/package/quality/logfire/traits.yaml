defaults:
  platforms: [unix, windows]
  for: [python]

# Logfire's optional AI Gateway intentionally supplies a proxy endpoint and a
# short-lived local gateway token to supported AI clients. Those settings are
# product configuration, not a package-level credential theft mechanism.
traits:
  - id: ai-gateway-module
    desc: Logfire AI tools module
    crit: notable
    conf: 0.99
    if:
      type: basename
      exact: ai_tools.py

  - id: ai-gateway-implementation
    desc: Logfire gateway implementation marker
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?i)Logfire Gateway|LOGFIRE_MCP_TOML'

composite_rules:
  - id: ai-gateway-benign-context
    desc: Recognized Logfire AI gateway configuration context
    crit: exception
    conf: 0.99
    for: [python, conda, tar, archives]
    scope: outer
    all:
      - id: ai-gateway-module
      - id: ai-gateway-implementation
