defaults:
  platforms: [unix, windows]
  for: [manifests, scripts]

traits:
  - id: npm-ct-fixture-name
    for: [text]
    desc: Compatibility alias
    crit: baseline
    conf: 1.0
    if:
      type: string_literal
      exact: __cleave_missing_npm_ct_fixture_name__
  - id: npm-main-bindings-node
    desc: Package main points to bindings/node
    crit: component
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: main
      exact: bindings/node
  - id: npm-install-node-gyp-build
    desc: npm install hook runs node-gyp-build
    crit: component
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: scripts.install
      regex: '^node-gyp-build($|\s)'
  - id: npm-source-native-paths
    desc: Native addon source paths in npm files
    crit: component
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: files[*]
      regex: '(^|/)(bindings/node|src)(/|$)'
composite_rules:
  - id: npm-native-addon-wrapper
    for: [package.json]
    desc: npm native addon wrapper
    crit: component
    conf: 0.95
    all:
      - id: metadata/package/manifest/entrypoint::pkg-main-native-node
      - id: metadata/package/files/included::npm-platform-native-binary-package
  - id: npm-source-native-addon-wrapper
    desc: npm source package with a node-gyp native addon wrapper
    crit: component
    conf: 0.97
    for: [package.json]
    all:
      - id: npm-main-bindings-node
      - id: npm-install-node-gyp-build
      - id: npm-source-native-paths
