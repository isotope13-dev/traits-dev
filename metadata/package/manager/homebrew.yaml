defaults:
  platforms: [unix]
  for: [shell]
  crit: component
  conf: 0.5

traits:
  - id: homebrew-prefix
    desc: Homebrew prefix variable
    if:
      type: string_literal
      substr: HOMEBREW_PREFIX
  - id: brew-no-install
    desc: Homebrew no-install marker
    if:
      type: string_literal
      substr: brew.no_install
  - id: homebrew-repo
    desc: Homebrew repository URL
    if:
      type: string_literal
      substr: github.com/Homebrew/brew
  - id: homebrew-install-command
    desc: Homebrew install command
    if:
      type: text
      substr: brew install

composite_rules:
  - id: homebrew-context
    desc: Homebrew context markers
    needs: 2
    any:
      - id: homebrew-install-command
      - id: homebrew-prefix
      - id: brew-no-install
      - id: homebrew-repo
