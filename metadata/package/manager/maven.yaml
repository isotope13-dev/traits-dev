defaults:
  platforms: [unix, windows]
  for: [batch, shell]
  crit: component
  conf: 0.95

traits:
  - id: apache-maven-wrapper-startup
    desc: Apache Maven Wrapper startup marker
    if:
      type: text
      substr: Apache Maven Wrapper startup
  - id: maven-wrapper-properties-path
    desc: Maven wrapper properties path
    if:
      type: text
      substr: maven-wrapper.properties

composite_rules:
  - id: maven-wrapper-script
    desc: Apache Maven Wrapper script
    all:
      - id: apache-maven-wrapper-startup
      - id: maven-wrapper-properties-path
