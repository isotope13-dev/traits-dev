defaults:
  platforms: [unix, windows]
  for: [package-lock.json]
  attack: "T1195.002"

traits:
  - id: package-lock-resolved-url
    desc: Lockfile dependency resolved URL
    crit: component
    conf: 0.86
    if:
      type: value
      path: packages.*.resolved
      regex: '^https?://'
  - id: package-lock-off-registry-tarball
    desc: Lockfile resolves dependency off registry
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: packages.*.resolved
      regex: '^https?://[^"]{1,220}\.tgz$'
    unless:
      - type: value
        path: packages.*.resolved
        regex: '^https?://(registry\.npmjs\.org|npm\.pkg\.github\.com|registry\.npmmirror\.com)/'
      - id: well-known/tool/development/vscode-npm::microsoft-vscode-ado-npm-feed
      - type: value
        path: packages.*.resolved
        regex: 'localhost|127\.0\.0\.1|verdaccio'
      - type: value
        path: packages.*.resolved
        substr: 'artifactory'
      - type: value
        path: packages.*.resolved
        substr: 'nexus'
      - type: value
        path: packages.*.resolved
        substr: 'jfrog'
      # Google Artifact Registry npm repositories (<region>-npm.pkg.dev) are a
      # managed registry/mirror like Artifactory/Nexus, not an off-registry drop.
      - type: value
        path: packages.*.resolved
        regex: '^https?://[a-z0-9-]+-npm\.pkg\.dev/'
  - id: package-lock-has-install-script
    desc: Lockfile dependency has install script
    crit: component
    conf: 0.85
    if:
      type: value
      path: packages.*.hasInstallScript
      exact: "true"

composite_rules:
  - id: npm-lock-off-registry-dependency
    desc: npm lockfile off-registry dependency
    crit: suspicious
    conf: 0.95
    all:
      - id: package-lock-resolved-url
      - id: package-lock-off-registry-tarball
  - id: npm-lock-off-registry-install-script
    desc: lockfile off-registry install script
    crit: suspicious
    conf: 0.96
    all:
      - id: package-lock-off-registry-tarball
      - id: package-lock-has-install-script
