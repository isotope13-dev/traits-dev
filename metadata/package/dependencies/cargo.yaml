defaults:
  platforms: [unix, windows]
  for: [cargo.toml]

traits:
  - id: cargo-dep-axum
    desc: Cargo declares Axum dependency
    crit: notable
    conf: 0.8
    if:
      type: value
      path: dependencies.axum
      regex: '.+'
  - id: cargo-dep-jsonwebtoken
    desc: Cargo declares JWT handling dependency
    crit: notable
    conf: 0.82
    if:
      type: value
