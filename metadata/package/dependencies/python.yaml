defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: setup-loads-requirements-file
    desc: setup.py loads dependencies from file
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: 'install_requires\s*=\s*\w+\.read\(|install_requires\s*=\s*read_requirements'

  - id: pypi-http-client-dependency
    desc: PyPI metadata declares an HTTP client dependency
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: value
      path: requires-dist
      regex: '(?i)^(requests|httpx)[<=>~!0-9., -]*'

  - id: numeric-suffixed-runtime-dependency
    desc: Dependency name ending in multiple digits
    crit: notable
    conf: 0.93
    for: [pkginfo]
    if:
      type: value
      path: requires-dist
      regex: '(?i)^[a-z][a-z0-9_-]{3,}[0-9]{2,}([._-][a-z0-9]+)*\s*([<>=!~]|;|$)'
