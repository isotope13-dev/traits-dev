---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-no-dependencies-field
  desc: npm manifest omits dependencies field
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: dependencies
    exists: false
  unless:
  - type: metrics
    field: parse.error_count
    min: 1
- id: npm-no-deps-devdependencies
  desc: npm manifest omits devDependencies field
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: devDependencies
    exists: false
  unless:
  - type: metrics
    field: parse.error_count
    min: 1
- id: npm-empty-dependencies-object
  desc: npm manifest has empty dependencies object
  crit: baseline
  conf: 0.95
  if:
    type: text
    regex: '"dependencies"\s*:\s*\{\s*\}'
- id: npm-scoped-runtime-alias
  desc: Scoped npm alias runtime redirect
  crit: notable
  conf: 0.97
  if:
    type: value
    path: dependencies.*
    regex: '^npm:@[A-Za-z0-9._-]+/[A-Za-z0-9._-]+(@|$)'
- id: npm-phantom-runtime-dependency
  desc: Declared runtime dependency lacks module import
  crit: notable
  conf: 0.82
  for: [npm, tar, zip]
  unless:
  - id: well-known/lib/nextjs::nextjs-build-identity
  - id: well-known/app/nodpy::nodpy-package-context
  - id: metadata/package/quality/source::source-archive-member
  - id: metadata/package/files/included::vsix-package-json-entry
  - id: metadata/build/scaffold::template-package-json-path
  - id: metadata/build/scaffold::template-package-json-file-path
  - id: metadata/library/structure::js-distribution-output-path
  - type: text
    substr: '"next":'
  if:
    type: metrics
    field: consistency.unused_runtime_deps
    min: 1
- id: scoped-wildcard-devdependency
  desc: Scoped npm devDependency uses wildcard version
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '"devDependencies"\s*:\s*\{[^}]{0,1000}"@[A-Za-z0-9._-]+/[A-Za-z0-9._-]+"\s*:\s*"\*"'
- id: peer-range
  desc: Uses version ranges for peer dependencies
  crit: notable
  conf: 0.85
  unless:
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - id: metadata/package/manifest/freeform/
  if:
    type: text
    regex: '"peerDependencies":\s*\{[^}]{0,120}"[>=<^~]'
- id: has-optional-deps
  desc: Package has optional dependencies
  crit: notable
  conf: 0.8
  if:
    type: value
    path: optionalDependencies
- id: node-machine-id-dep
  desc: npm dependency on node-machine-id
  crit: component
  conf: 0.7
  if:
    type: value
    path: dependencies.node-machine-id
- id: npm-dep-lodash
  desc: npm dependency on lodash
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.lodash
- id: npm-dep-express
  desc: npm dependency on express
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.express
- id: npm-dep-react
  desc: npm dependency on react
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.react
- id: npm-dep-discord
  desc: npm dependency on discord package
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.*
    regex: '^(discord|discord\.js|discord\.io)$'
- id: npm-dep-winston
  desc: npm dependency on winston
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.winston
- id: npm-dep-pino
  desc: npm dependency on pino
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.pino
- id: npm-dep-better-sqlite3
  desc: npm dependency on better-sqlite3
  crit: component
  conf: 0.7
  if:
    type: value
    path: dependencies.better-sqlite3
- id: npm-dep-sqlite3
  desc: npm dependency on sqlite3
  crit: component
  conf: 0.7
  if:
    type: value
    path: dependencies.sqlite3
- id: npm-dep-socket-io-client
  desc: npm dependency on socket.io-client
  crit: component
  conf: 0.6
  if:
    type: value
    path: dependencies.socket.io-client
- id: optional-native-linux-dep-name
  desc: Optional Linux native dependency name
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '"[^"]{1,120}-linux-(x64|arm64|arm)'
- id: optional-native-darwin-dep-name
  desc: Optional Darwin native dependency name
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '"[^"]{1,120}-darwin-(x64|arm64|arm)'
- id: optional-native-windows-dep-name
  desc: Optional Windows native dependency name
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '"[^"]{1,120}-win(32|dows)-(x64|arm(64)?|ia32)'
- id: has-peer-deps
  desc: Package has peerDependencies (framework plugin)
  crit: baseline
  conf: 0.85
  if:
    type: value
    path: peerDependencies
    exists: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: npm-peer-dependency-dbconnectify
  desc: npm peer dependency on dbconnectify
  crit: notable
  conf: 0.95
  if:
    type: value
    path: peerDependencies.dbconnectify
    exists: true
- id: has-dev-deps
  desc: Package declares development dependencies
  crit: component
  conf: 0.8
  if:
    type: value
    path: devDependencies
    exists: true
- id: has-runtime-deps
  desc: Package has runtime dependencies
  crit: component
  conf: 0.85
  if:
    type: value
    path: dependencies
    exists: true
- id: many-runtime-deps
  desc: Package has many runtime dependencies
  crit: notable
  conf: 0.75
  if:
    type: value
    path: dependencies
    size_min: 40
- id: workspace-devdependency
  desc: Workspace protocol devDependency
  crit: component
  conf: 0.8
  if:
    type: value
    path: devDependencies.*
    regex: '^workspace:'
- id: official-react-native-codegen-dependency
  desc: Package depends on official React Native codegen
  crit: baseline
  conf: 1.0
  if:
    type: text
    regex: '"@react-native/babel-plugin-codegen"\s*:'

- id: semver-deps
  desc: Uses semantic versioning for dependencies
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '"dependencies".{0,100}"[\\^~][0-9]'
- id: build-related-dependency-name
  desc: Dependency name contains build-related term
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)"dependencies".{0,500}"[^"]{0,40}(lint|builder|build)[^"]{0,40}"\s*:'
# Neutral completeness facts: a PyPI/PKG-INFO manifest or pyproject.toml that
# declares no runtime dependencies. Common in zero-dependency libraries and
# private packages, so these are neutral file properties. Supply-chain
# composites reference them cross-directory.
- id: pypi-no-runtime-deps
  desc: PyPI metadata omits runtime dependencies
  crit: baseline
  conf: 0.7
  for: [pkginfo]
  if:
    type: value
    path: requires-dist
    exists: false
  unless:
  - id: metadata/package/testing/presence/fixture/
  - type: value
    path: requires-python
    exists: true
  - type: basename
    regex: "^(META|meta)\\.json$"
  - type: basename
    exact: metadata.json
  - type: value
    path: "prereqs.runtime.requires"
    exists: true
  - type: text
    substr: '"releases_url"'
  - id: metadata/package/dependencies/
- id: pyproject-no-dependencies
  desc: pyproject.toml with no dependencies declared
  crit: component
  conf: 0.60
  for: [pyproject.toml]
  if:
    type: value
    path: "project.dependencies"
    exists: false
- id: pypi-no-runtime-deps-unless-cond-5--rx-9
  desc: PyPI metadata declares runtime dependencies
  crit: baseline
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Requires-Dist:'
  count_max: 1022222
- id: npm-many-dev-dependencies
  desc: npm manifest has many devDependencies
  crit: component
  conf: 0.7
  if:
    type: value
    path: devDependencies
    size_min: 5
- id: npm-file-dependency
  desc: npm package depends on a local file
  crit: notable
  conf: 0.9
  if:
    type: value
    path: dependencies.*
    regex: '^file:'
- id: npm-workspace-dependency
  desc: npm package uses workspace protocol
  crit: notable
  conf: 0.9
  if:
    type: value
    path: dependencies.*
    regex: '^workspace:'
- id: npm-catalog-dependency
  desc: npm package uses pnpm catalog protocol
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: '"catalog:'
- id: npm-link-dependency
  desc: npm package uses link protocol
  crit: notable
  conf: 0.9
  if:
    type: value
    path: dependencies.*
    regex: '^link:'
- id: npm-portal-dependency
  desc: npm package uses portal protocol
  crit: notable
  conf: 0.9
  if:
    type: value
    path: dependencies.*
    regex: '^portal:'
- id: npm-git-vcs-dependency
  desc: npm Git/VCS dependency URL
  crit: notable
  conf: 0.9
  if:
    type: value
    path: dependencies.*
    regex: '^git(:\/\/|\+(ssh|https?|file):\/\/)'
- id: npm-git-ssh-dependency
  desc: npm runtime dependency uses Git over SSH
  crit: notable
  conf: 0.9
  if:
    type: value
    path: dependencies.*
    regex: '^git\+ssh://'
composite_rules:
- id: npm-local-dependencies
  desc: npm package uses local dependency protocols
  crit: notable
  conf: 0.9
  any:
  - id: npm-file-dependency
  - id: npm-workspace-dependency
  - id: metadata/package/dependencies::workspace-devdependency
  - id: npm-link-dependency
  - id: npm-portal-dependency
- id: npm-monorepo-workspace-dep
  desc: Package has workspace or catalog dependencies
  crit: notable
  conf: 0.9
  any:
  - id: npm-workspace-dependency
  - id: metadata/package/dependencies::workspace-devdependency
  - id: npm-catalog-dependency
- id: npm-no-runtime-dependencies
  desc: npm manifest declares no runtime dependencies
  crit: baseline
  conf: 0.9
  any:
  - id: npm-no-dependencies-field
  - id: npm-empty-dependencies-object
- id: npm-no-deps-at-all
  desc: npm manifest omits both dependencies and devDependencies
  crit: notable
  conf: 0.8
  all:
  - id: npm-no-runtime-dependencies
  - id: npm-no-deps-devdependencies
  unless:
  - id: metadata/package/manifest/name::npm-no-name-field
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/manifest/runtime/
- id: npm-no-runtime-many-devdeps
  desc: npm manifest has only many devDependencies
  crit: baseline
  conf: 0.8
  all:
  - id: npm-no-runtime-dependencies
  - id: npm-many-dev-dependencies
  unless:
  - id: metadata/package/testing/
- id: platform-optional-native-deps
  desc: Platform-specific optional native dependencies
  crit: component
  conf: 0.9
  any:
  - id: optional-native-linux-dep-name
  - id: optional-native-darwin-dep-name
  - id: optional-native-windows-dep-name
- id: platform-optional-native-wrapper
  desc: Native binary wrapper optional deps
  crit: baseline
  conf: 0.9
  all:
  - id: has-optional-deps
  - id: platform-optional-native-deps
  - id: metadata/package/files/count::npm-single-bin
- id: npm-import-time-unused-runtime-dependency
  desc: Package uses dynamic imports while a declared dependency appears unused
  crit: notable
  conf: 0.9
  for: [npm, tar, zip]
  scope: archive
  all:
  - id: npm-phantom-runtime-dependency
  - id: micro-behaviors/os/module/load::dynamic-import-string-literal
