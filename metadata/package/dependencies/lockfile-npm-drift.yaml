# package-lock.json `name` disagrees with package.json `name`.
#
# npm regenerates the lockfile from the manifest, so the two `name`
# fields agree in any unmodified package. Disagreement means one side
# was hand-edited after the other was generated — usually a sign of
# rushed tampering where the attacker swapped package.json identity
# but forgot the lockfile (or vice versa). Very high precision: the
# only realistic false positive is mid-rename WIP that never should
# have been published.
defaults:
  platforms: [unix, windows]
  attack: T1195.002
  for: [tar, archives]
traits:
  - id: npm-lockfile-name-drift
    desc: "package-lock.json name mismatches package.json"
    for: [npm]
    # A mismatch is useful supply-chain metadata, but it is not hostile by
    # itself; nested vendor lockfiles and generated package archives are common.
    crit: notable
    conf: 0.95
    if:
      type: value
      path: package.json::name
      ne: package-lock.json::name
    # Workspace monorepos have one root-named lockfile shared across many
    # differently-named nested packages, so per-package name "drift" is
    # expected there, not tampering.
    unless:
      - id: metadata/package/manifest/workspace::has-workspaces
      - id: metadata/package/files/included::archive-nested-package-json-entry
      - id: metadata/package/manifest/publishing::is-private
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/package/manifest/ecosystem::jsr-package
      - type: value
        path: package.json::name
        regex: '^@jsr/'
      - type: basename
        regex: '^[a-z0-9-]+__[A-Za-z0-9_.-]+-[0-9][^\\/]*\.tgz$'
      - type: basename
        regex: '^v?[0-9][0-9A-Za-z_.-]*\.tar\.(gz|xz|bz2|zst)$'
