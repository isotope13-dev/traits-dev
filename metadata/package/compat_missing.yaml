defaults:
  platforms: [unix, windows]
  for: [manifests, scripts]

traits:
  - id: bitdefender-ecnet-telemetry
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: metadata/package/fields::bitdefender-ecnet-telemetry
  - id: playnite-steam-plugin
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: metadata/package/fields::playnite-steam-plugin
  - id: bitdefender-ctc-module
    desc: Bitdefender CTC event module
    crit: component
    conf: 1.0
    for: [pe, dll]
    if:
      type: text
      substr: CTC::Alert::CTCAlert
