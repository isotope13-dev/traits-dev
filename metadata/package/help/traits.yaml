defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: help-long-flag
    desc: --help flag
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: --help
      section: .text
  - id: help-short-flag
    desc: -h flag
    crit: baseline
    conf: 0.4
    if:
      type: text
      exact: -h
      section: .text
  - id: usage-lower
    desc: 'usage: label (lowercase)'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'usage:'
      section: .text
  - id: usage-title
    desc: 'Usage: label (title case)'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'Usage:'
      section: .text
  - id: options-title
    desc: 'Options: label'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'Options:'
      section: .text
  - id: usage-upper
    desc: 'USAGE: label (uppercase)'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'USAGE:'
      section: .text
  - id: usage-lower-string
    desc: 'usage: label in binary strings'
    crit: component
    conf: 0.5
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'usage:'
  - id: usage-title-string
    desc: 'Usage: label in binary strings'
    crit: component
    conf: 0.5
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'Usage:'
  - id: options-title-string
    desc: 'Options: label in binary strings'
    crit: component
    conf: 0.5
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'Options:'
  - id: libxslt-configure-js
    desc: libxslt configure.js script
    crit: baseline
    conf: 1.0
    if:
      type: raw
      regex: Configure script for libxslt, specific for Windows
      section: .text

composite_rules:
  - id: usage-label
    desc: Command line usage text
    crit: component
    conf: 0.75
    any:
      - id: usage-lower
      - id: usage-title
      - id: usage-upper
      - id: usage-lower-string
      - id: usage-title-string
      - id: options-title
      - id: options-title-string

  - id: documented-cli-binary
    desc: Documented command line program
    crit: component
    conf: 0.85
    all:
      - id: usage-label
    any:
      - id: metadata/binary/metrics::high-string-count-1000
      - id: metadata/binary/metrics::high-function-count-200
      - id: metadata/binary/metrics::many-imports-50
      - id: metadata/binary/metrics::rich-sentence-strings-20pct
