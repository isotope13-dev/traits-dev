defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: usage-help
    desc: Short -h help flag
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: -h[^a-z]
      section: .rdata
  - id: version-text
    desc: Version information string
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: --version|^version [0-9]|^v[0-9]+\.[0-9]
      case_insensitive: true
      section: .rdata
