defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: prometheus-word
    desc: Prometheus reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: prometheus
      section: .text
  - id: metrics-word-lower
    desc: metrics word (lowercase)
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: metrics
      section: .text
  - id: metrics-word-title
    desc: Metrics word (title case)
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: Metrics
      section: .text
  - id: statsd-word
    desc: StatsD reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: statsd
      section: .text
  - id: datadog-word
    desc: Datadog reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: datadog
      section: .text
  - id: opentelemetry-word
    desc: OpenTelemetry reference
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: opentelemetry
      section: .text
  - id: newrelic-word
    desc: NewRelic reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: NewRelic
      section: .text
  - id: import-count-under-80
    desc: Large binary with few DLL dependencies
    crit: baseline
    conf: 0.84
    size_min: 524288
    if:
      type: metrics
      field: dependencies.count
      max: 80
    unless:
      - id: well-known/app/swifttunnel_vpn/
  - id: recovered-function-count-under-10
    desc: Large binary with few functions
    crit: baseline
    conf: 0.92
    size_min: 524288
    if:
      type: metrics
      field: functions.count
      max: 10
  # Neutral package-footprint measurements: an extremely small PKG-INFO file or a
  # tiny wheel archive. Common in stub/placeholder packages, so these are neutral
  # structural measurements. Supply-chain composites reference them cross-directory.
  - id: pkginfo-tiny
    desc: Extremely small PKG-INFO file
    crit: baseline
    conf: 0.7
    for: [pkginfo]
    size_max: 200
    unless:
      - id: metadata/package/testing/presence/fixture/
    if:
      type: value
      path: metadata-version
  - id: tiny-wheel-archive-content
    desc: Tiny wheel uncompressed content
    crit: baseline
    conf: 0.85
    for: [whl]
    unless:
      - type: basename
        regex: '\.(aar|apk|war|ear|epub|nupkg|vsix|xpi|zip|jar|crx|deb|rpm|gem|tgz|tar|crate|conda|egg)$'
    if:
      type: metrics
      field: archive.total_uncompressed
      max: 3072
  - id: small-wheel-file-set
    desc: Wheel has at most five archive files
    crit: baseline
    conf: 0.85
    for: [whl]
    if:
      type: metrics
      field: archive.file_count
      max: 5
composite_rules:
  - id: tiny-wheel-package-footprint
    desc: Wheel package has tiny footprint
    crit: baseline
    conf: 0.82
    for: [whl]
    all:
      - id: metadata/package/quality/ecosystem::wheel-archive-member
      - id: tiny-wheel-archive-content
