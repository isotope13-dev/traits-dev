defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: prometheus-word
    desc: Prometheus reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: prometheus
      section: .text
  - id: metrics-word-lower
    desc: metrics word (lowercase)
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: metrics
      section: .text
  - id: metrics-word-title
    desc: Metrics word (title case)
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: Metrics
      section: .text
  - id: statsd-word
    desc: StatsD reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: statsd
      section: .text
  - id: datadog-word
    desc: Datadog reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: datadog
      section: .text
  - id: opentelemetry-word
    desc: OpenTelemetry reference
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: opentelemetry
      section: .text
  - id: newrelic-word
    desc: NewRelic reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: NewRelic
      section: .text
  - id: import-count-under-80
    desc: Large binary with few imports
    crit: baseline
    conf: 0.84
    size_min: 524288
    if:
      type: metrics
      field: binary.import_count
      max: 80
  - id: recovered-function-count-under-10
    desc: Large binary with few functions
    crit: baseline
    conf: 0.92
    size_min: 524288
    if:
      type: metrics
      field: binary.func_count
      max: 10
