defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries]
traits:
  - id: prometheus-word
    desc: Prometheus reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: prometheus
      section: .text
  - id: metrics-word-lower
    desc: metrics word (lowercase)
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      word: metrics
      section: .text
  - id: metrics-word-title
    desc: Metrics word (title case)
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      word: Metrics
      section: .text
  - id: statsd-word
    desc: StatsD reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: statsd
      section: .text
  - id: datadog-word
    desc: Datadog reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: datadog
      section: .text
  - id: opentelemetry-word
    desc: OpenTelemetry reference
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      word: opentelemetry
      section: .text
  - id: newrelic-word
    desc: NewRelic reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: NewRelic
      section: .text
  - id: import-count-under-80
    desc: Large PE with under eighty imports
    crit: baseline
    conf: 0.84
    size_min: 524288
    if:
      type: metrics
      field: binary.import_count
      max: 80
  - id: recovered-function-count-under-10
    desc: Very few recovered functions in large PE
    crit: baseline
    conf: 0.92
    size_min: 524288
    if:
      type: metrics
      field: binary.function_count
      max: 10
  - id: file-has-30-plus-lines
    desc: File has 30 or more lines
    crit: component
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: metrics
      field: text.total_lines
      min: 30
  - id: file-under-12-lines
    desc: Very short file (under 12 lines)
    crit: component
    conf: 0.8
    for:
      - scripts
      - source
      - manifests
    if:
      type: metrics
      field: text.total_lines
      max: 12
