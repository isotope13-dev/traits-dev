defaults:
  platforms: [unix, windows]
  for: [jar]
traits:
  - id: compact-jar-archive
    desc: Compact JAR archive size
    crit: baseline
    conf: 0.9
    unless:
      - type: basename
        regex: '^selenium-(firefox|ie)-driver-[0-9.]+\.jar$'
      - type: basename
        regex: '\.(zip|pyz|lottie|crx|xpi|nupkg|snupkg|sstg)$'
      - type: basename
        regex: '\.vsix$'
      - id: metadata/file/extension/identity::python-wheel-basename
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.file_count
      min: 10
      max: 20
  - id: jar-thirteen-files
    desc: Thirteen file JAR archive
    crit: baseline
    conf: 0.93
    unless:
      - type: basename
        regex: '\.(zip|lottie|crx|xpi|nupkg|snupkg)$'
      - type: basename
        regex: '\.vsix$'
    if:
      type: metrics
      field: archive.file_count
      min: 13
      max: 13
  - id: six-file-archive
    desc: Six file archive footprint
    crit: baseline
    conf: 0.9
    unless:
      - type: basename
        regex: '\.(zip|lottie|crx|xpi|nupkg|snupkg)$'
      - type: raw
        substr: AndroidManifest.xml
    if:
      type: metrics
      field: archive.file_count
      min: 6
      max: 6
  - id: jar-low-compression-ratio
    desc: Low JAR compression ratio
    crit: baseline
    conf: 0.9
    size_max: 1048576
    unless:
      - type: basename
        regex: '^selenium-(firefox|ie)-driver-[0-9.]+\.jar$'
      - type: basename
        regex: '^(dex-method-counts\.jar|scrcpy-server|gradle-wrapper\.jar)$'
      - type: basename
        regex: '\.(aar|zip|pyz|lottie|crx|xpi|nupkg|snupkg)$'
      - type: basename
        regex: '\.vsix$'
      - type: basename
        regex: '\.(whl|graffle|oramap)$'
    if:
      type: metrics
      field: archive.compression.ratio
      max: 0.6
  - id: jar-mid-compression-ratio
    desc: Mid JAR compression ratio
    crit: baseline
    conf: 0.92
    unless:
      - type: basename
        exact: scrcpy-server
      - type: basename
        regex: '\.(zip|lottie|crx|xpi|nupkg|snupkg)$'
      - type: basename
        regex: '\.vsix$'
      - type: basename
        exact: gradle-wrapper.jar
      - type: basename
        regex: '\.(graffle|whl)$'
    if:
      type: metrics
      field: archive.compression.ratio
      min: 0.45
      max: 0.5
  - id: staged-loader-upper-mid-ratio
    desc: 'Upper-mid JAR compression ratio window'
    crit: baseline
    conf: 0.94
    unless:
      - type: basename
        regex: '\.(zip|lottie)$'
      - type: basename
        regex: '\.graffle$'
      - id: metadata/package/files/mobile-package::apk-secondary-dex
      - type: text
        substr: AndroidManifest.xml
    if:
      type: metrics
      field: archive.compression.ratio
      min: 0.62
      max: 0.64
  - id: jar-mid-uncompressed-span
    desc: Mid JAR uncompressed span
    crit: baseline
    conf: 0.9
    unless:
      - type: basename
        regex: '\.(zip|lottie|crx|xpi|nupkg|snupkg)$'
      - type: basename
        regex: '\.vsix$'
      - type: basename
        regex: '\.graffle$'
      - id: metadata/package/files/mobile-package::archive-android-manifest-member
    if:
      type: metrics
      field: archive.total_uncompressed
      min: 700000
      max: 900000
  - id: jar-tight-uncompressed-span
    desc: Tight JAR uncompressed span
    crit: baseline
    conf: 0.93
    unless:
      - type: basename
        regex: '\.(zip|lottie|crx|xpi|nupkg|snupkg)$'
      - id: metadata/package/files/mobile-package::archive-android-manifest-member
    if:
      type: metrics
      field: archive.total_uncompressed
      min: 780000
      max: 800000
  - id: jar-single-directory-layout
    desc: Single directory JAR layout
    crit: baseline
    conf: 0.91
    unless:
      - type: basename
        regex: '\.(zip|lottie|crx|xpi|nupkg|snupkg)$'
    if:
      type: metrics
      field: archive.directory_count
      min: 1
      max: 1
  - id: jar-many-members
    desc: JAR has many archive members
    crit: component
    conf: 0.98
    unless:
      - type: text
        substr: ".dist-info/WHEEL"
    if:
      type: metrics
      field: archive.file_count
      min: 120
  - id: jar-many-directories
    desc: JAR has many directories
    crit: component
    conf: 0.98
    if:
      type: metrics
      field: archive.directory_count
      min: 25
  - id: jar-tiny-uncompressed-content
    desc: JAR uncompressed content is tiny
    crit: component
    conf: 0.995
    unless:
      - type: basename
        regex: '\.(aar|apk|war|ear|epub|nupkg|vsix|xpi|crx|zip|whl)$'
    if:
      type: metrics
      field: archive.total_uncompressed
      max: 1024
