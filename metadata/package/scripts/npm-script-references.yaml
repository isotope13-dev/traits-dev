# package.json scripts that reference files not commonly shipped in the
# published `files:` allowlist. Examples:
#   "start": "node crypto/lib.min.js"        # crypto/ not in files
#   "test":  "node loader.min.js"            # minified payload
#   "decode": "node bin/run-decoded.js"      # decode runner
# These reference paths suggest a hidden / external payload — a real package
# would point at a documented entry point or a test runner, not a minified
# blob in an undocumented directory.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
  mbc: B0024
traits:
  - id: script-runs-min-js-payload
    desc: Script invokes a minified .min.js file
    crit: notable
    conf: 0.88
    if:
      type: value
      path: scripts
      regex: '"node\s+[^"]{0,80}\.min\.js"'
  - id: script-runs-crypto-runner
    desc: Script invokes a crypto/ subdir runner
    crit: notable
    conf: 0.88
    if:
      type: value
      path: scripts
      regex: '"node\s+[^"]{0,40}crypto/[^"]{0,80}\.js"'
  - id: script-runs-decoded-payload
    desc: Script invokes a decode/decrypt/run helper
    crit: notable
    conf: 0.82
    if:
      type: value
      path: scripts
      regex: '"node\s+[^"]{0,80}(decode|decrypt|run-decoded)[^"]{0,40}\.js"'
composite_rules:
  - id: scripts-point-at-undocumented-payload
    desc: package.json scripts run undocumented payload
    crit: suspicious
    conf: 0.94
    any:
      - id: script-runs-min-js-payload
      - id: script-runs-crypto-runner
      - id: script-runs-decoded-payload
    unless:
      - id: metadata/package/testing/harness/runtime/
