---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-preinstall-script
  desc: Manifest declares npm preinstall lifecycle hook
  crit: notable
  conf: 0.95
  unless:
  - id: metadata/package/scripts::preinstall-only-allow-package-manager
  - id: preinstall-no-op-echo
  - id: metadata/package/manifest/runtime::vscode-extension
  - id: metadata/package/testing/presence/fixture/
  - id: metadata/package/quality/recognized-contexts::pnpm-pre-postinstall-fixture-context
  - id: well-known/tool/development/aube::aube-published-npm-package
  # ADHDev's preinstall is a Node-version/platform guard, not an install payload.
  - id: well-known/app/adhdev::adhdev-daemon-package
  - id: well-known/lib/xmljs::libxmljs-native-addon-context
  if:
    type: value
    path: scripts.preinstall
    exists: true
- id: preinstall-no-op-echo
  desc: Preinstall script only echoes a no-op marker
  crit: notable
  conf: 0.99
  if:
    type: value
    path: scripts.preinstall
    substr: 'preinstall: no-op'
- id: npm-inert-preinstall-script
  desc: Inert preinstall echo/no-op command
  crit: notable
  conf: 0.98
  if:
    type: value
    path: scripts.preinstall
    regex: '^\s*(echo|true|:)\s+[^;&|]{0,200}\s*$'
  not:
  - regex: '\$\(|`'
- id: npm-inert-postinstall-script
  desc: Inert postinstall echo/no-op command
  crit: notable
  conf: 0.98
  if:
    type: value
    path: scripts.postinstall
    regex: '^\s*(echo|true|:)\s+[^;&|]{0,200}\s*$'
  not:
  - regex: '\$\(|`'
- id: raw-preinstall-key
  desc: Raw package metadata has preinstall script key
  crit: component
  conf: 0.88
  for: [package.json, pkginfo]
  if:
    type: text
    regex: "\"preinstall\"\\s*:\\s*\""
- id: postinstall-local-server-path-var
  desc: Postinstall builds local server subpackage
  crit: component
  conf: 0.9
  if:
    type: value
    path: scripts.postinstall
    regex: "const\\s+p\\s*=\\s*['\"][^'\"]+/server['\"]"
- id: postinstall-checks-local-path
  desc: Postinstall checks local package path
  crit: component
  conf: 0.9
  if:
    type: value
    path: scripts.postinstall
    substr: "fs.existsSync(p)"
- id: postinstall-npm-install-tsc
  desc: 'Postinstall runs npm install and TS compiler'
  crit: component
  conf: 0.9
  if:
    type: value
    path: scripts.postinstall
    substr: "npm install && npx tsc"
- id: postinstall-local-prefix-install
  desc: Postinstall uses local npm prefix
  crit: notable
  conf: 0.98
  if:
    type: value
    path: scripts.postinstall
    regex: '(^|&&)\s*npm install --prefix[= ][A-Za-z0-9_.\/-]+\s*(&&|$)'
  not:
  - regex: '\$\(|`'
- id: postinstall-protobuf-codegen-download
  desc: Postinstall runs protoc-gen-js downloader
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: scripts.postinstall
    substr: "@protocolbuffers/protoc-gen-js/download-protoc-gen-js.js"
- id: haxelib-server-package-name
  desc: Haxelib server package name
  crit: baseline
  conf: 0.94
  if:
    type: value
    path: name
    exact: haxelib-server
- id: haxelib-server-postinstall-assets
  desc: Haxelib server asset postinstall
  crit: baseline
  conf: 0.92
  if:
    type: value
    path: scripts.postinstall
    substr: stackpath.bootstrapcdn.com/twitter-bootstrap
- id: preinstall-curl
  desc: curl command in preinstall script
  crit: suspicious
  conf: 0.95
  unless:
  - id: metadata/package/scripts::preinstall-runtime-guard-help
  if:
    type: value
    path: scripts.preinstall
    substr: curl
- id: preinstall-curl-data-urlencode
  desc: curl with data-urlencode in preinstall script
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: scripts.preinstall
    substr: "--data-urlencode"
- id: preinstall-hostname
  desc: hostname in preinstall script
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: scripts.preinstall
    substr: hostname
- id: preinstall-whoami
  desc: whoami in preinstall script
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: scripts.preinstall
    regex: "\\bwhoami\\b"
- id: preinstall-pwd
  desc: pwd in preinstall script
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: scripts.preinstall
    substr: pwd
- id: preinstall-oast-domain
  desc: OAST domain in preinstall script
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: scripts.preinstall
    substr: ".oast."
- id: preinstall-http-url
  desc: HTTP URL in preinstall script
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: scripts.preinstall
    substr: http://
- id: preinstall-curl-dynamic-subdomain
  desc: Curl to variable subdomain in preinstall
  crit: suspicious
  conf: 0.96
  if:
    type: value
    path: scripts.preinstall
    regex: curl\s+"?http://\$[a-z_][a-z0-9_]*\.[a-z0-9.-]+/
- id: preinstall-xxd-hex-encode
  desc: Preinstall hex encodes with xxd
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: scripts.preinstall
    substr: xxd -p
- id: preinstall-path-segment-labels
  desc: Preinstall splits path into DNS labels
  crit: suspicious
  conf: 0.97
  if:
    type: value
    path: scripts.preinstall
    regex: IFS="/".{0,40}read -ra path_segments
- id: preinstall-sysinfo-loop
  desc: Preinstall loops over three sysinfo values
  crit: suspicious
  conf: 0.96
  if:
    type: value
    path: scripts.preinstall
    regex: for info in "\$[a-z_]+".{0,24}"\$[a-z_]+".{0,24}"\$[a-z_]+"; do
- id: preinstall-path-branch
  desc: Preinstall branches on current path value
  crit: suspicious
  conf: 0.96
  if:
    type: value
    path: scripts.preinstall
    regex: \[\s*"\$info"\s*==\s*"\$[a-z_]*path"\s*\]
- id: preinstall-hex-label-join
  desc: Preinstall joins hex labels with dots
  crit: suspicious
  conf: 0.96
  if:
    type: value
    path: scripts.preinstall
    substr: hex_data="$hex_data.$encoded"
- id: preinstall-dot-trimmed-labels
  desc: Preinstall trims leading dot from labels
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: scripts.preinstall
    substr: sed 's/^\.//'
- id: preinstall-hex-token
  desc: Hex token in preinstall script
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: scripts.preinstall
    regex: "[0-9a-f]{32}"
- id: has-build-script-build
  desc: Package declares build script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.build
    exists: true
- id: has-build-script-compile
  desc: Package declares compile script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.compile
    exists: true
- id: has-build-script-prepare
  desc: Package declares prepare script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.prepare
    exists: true
- id: has-build-script-prepack
  desc: Package declares prepack script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.prepack
    exists: true
- id: has-build-script-prepublish
  desc: Package declares prepublish script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.prepublish
    exists: true
- id: has-build-script-prepublish-only
  desc: Package declares prepublishOnly script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.prepublishOnly
    exists: true
- id: has-build-script-package
  desc: Package declares package script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.package
    exists: true
- id: has-build-script-package-web
  desc: Package declares package-web script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.package-web
    exists: true
- id: has-build-script-compile-web
  desc: Package declares compile-web script
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: scripts.compile-web
    exists: true
# Neutral pyproject.toml fact: declares a console-script entry point. Extremely
# common in CLI packages; supply-chain composites reference it cross-directory.
- id: pyproject-has-script-entrypoint
  desc: pyproject.toml with script entry point
  crit: baseline
  conf: 0.80
  for: [pyproject.toml]
  if:
    type: text
    regex: "\\[project\\.scripts\\]"
composite_rules:
- id: npm-inert-pre-postinstall-pair
  desc: Preinstall and postinstall are both inert echo/no-op commands
  crit: exception
  conf: 0.98
  all:
  - id: npm-inert-preinstall-script
  - id: npm-inert-postinstall-script
  unless:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
- id: postinstall-haxelib-server-assets
  desc: Haxelib server static web asset postinstall
  crit: baseline
  conf: 0.92
  all:
  - id: haxelib-server-package-name
  - id: haxelib-server-postinstall-assets
- id: postinstall-local-ts-subpackage-build
  desc: Postinstall builds local TypeScript subpackage
  crit: baseline
  conf: 0.92
  all:
  - id: postinstall-local-server-path-var
  - id: postinstall-checks-local-path
  - id: postinstall-npm-install-tsc
- id: preinstall-oast-endpoint
  desc: OAST endpoint in preinstall script
  crit: suspicious
  conf: 0.95
  all:
  - id: metadata/package/scripts::preinstall-oast-domain
  - id: metadata/package/scripts::preinstall-http-url
  - id: metadata/package/scripts::preinstall-hex-token
- id: preinstall-hex-subdomain-exfil
  desc: Preinstall exfil via hex subdomain curl
  crit: suspicious
  conf: 0.98
  all:
  - id: metadata/package/scripts::preinstall-http-url
  - id: metadata/package/scripts::preinstall-curl-dynamic-subdomain
  - id: metadata/package/scripts::preinstall-xxd-hex-encode
- id: preinstall-path-segment-dns-exfil
  desc: Preinstall path hex split into DNS labels
  crit: suspicious
  conf: 0.99
  all:
  - id: metadata/package/scripts::preinstall-hex-subdomain-exfil
  - id: metadata/package/scripts::preinstall-path-segment-labels
  - id: metadata/package/scripts::preinstall-hex-label-join
  - id: metadata/package/scripts::preinstall-dot-trimmed-labels
- id: preinstall-looped-path-segment-dns-exfil
  desc: Preinstall loops sysinfo into split hex DNS labels
  crit: suspicious
  conf: 0.99
  all:
  - id: metadata/package/scripts::preinstall-hostname-whoami-pwd
  - id: metadata/package/scripts::preinstall-path-segment-dns-exfil
  - id: metadata/package/scripts::preinstall-sysinfo-loop
  - id: metadata/package/scripts::preinstall-path-branch
- id: preinstall-hostname-whoami
  desc: preinstall script reads hostname and whoami
  crit: suspicious
  conf: 0.95
  all:
  - id: metadata/package/scripts::preinstall-hostname
  - id: metadata/package/scripts::preinstall-whoami
- id: preinstall-hostname-whoami-pwd
  desc: preinstall script exfiltrates hostname/whoami/pwd
  crit: suspicious
  conf: 0.98
  all:
  - id: metadata/package/scripts::preinstall-hostname-whoami
  - id: metadata/package/scripts::preinstall-pwd
- id: npm-preinstall-curl-exfil
  desc: Malicious preinstall script with curl data exfiltration
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
  - id: metadata/package/scripts::preinstall-curl
  - id: metadata/package/scripts::preinstall-curl-data-urlencode
- id: npm-preinstall-info-exfil
  desc: preinstall script exfiltrates system info to external endpoint
  crit: suspicious
  conf: 0.98
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
  - id: metadata/package/scripts::preinstall-hostname-whoami-pwd
  any:
  - id: metadata/package/scripts::preinstall-oast-endpoint
  - id: metadata/package/scripts::preinstall-hex-subdomain-exfil
