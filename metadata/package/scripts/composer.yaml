# Composer lifecycle script declarations.
defaults:
  platforms: [unix, windows]
  for: [composer.json]
  crit: notable
  conf: 0.85

traits:
  - id: composer-post-install-cmd
    desc: Composer post-install command hook
    if:
      type: value
      path: scripts.post-install-cmd
      exists: true

  - id: composer-post-update-cmd
    desc: Composer post-update command hook
    if:
      type: value
      path: scripts.post-update-cmd
      exists: true

  - id: composer-post-autoload-dump
    desc: Composer post-autoload command hook
    if:
      type: value
      path: scripts.post-autoload-dump
      exists: true

composite_rules:
  - id: composer-lifecycle-hook
    desc: Composer declares an install-time lifecycle hook
    crit: notable
    conf: 0.9
    any:
      - id: composer-post-install-cmd
      - id: composer-post-update-cmd
      - id: composer-post-autoload-dump
