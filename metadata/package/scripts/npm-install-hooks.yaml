defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.85
  for: [package.json]
traits:
  - id: npm-install-native-addon-build
    desc: Install hook builds a Node native addon
    crit: notable
    conf: 0.95
    if:
      type: value
      path: scripts.install
      regex: '(?i)\b(node-gyp|node-waf)\b'
composite_rules:
  - id: install-hooks
    desc: Package has install hooks
    any:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
