defaults:
  platforms: [unix, windows, macos]
  crit: component
  conf: 0.85
  for: [package.json]
composite_rules:
  - id: install-hooks
    desc: Package has install hooks
    any:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
