defaults:
  platforms: [windows, unix]
  for: [package.json]
  crit: component

traits:
  - id: preinstall-node-runtime-check
    desc: preinstall checks JavaScript runtime
    conf: 0.9
    if:
      type: value
      path: scripts.preinstall
      substr: "process.versions.bun"
  - id: preinstall-error-install-instructions
    desc: preinstall prints install instructions
    conf: 0.9
    if:
      type: value
      path: scripts.preinstall
      substr: "Install options:"
  - id: preinstall-exits-failure
    desc: preinstall exits with failure
    conf: 0.9
    if:
      type: value
      path: scripts.preinstall
      substr: "process.exit(1)"
  - id: preinstall-engine-requirements-script
    desc: preinstall runs engine-requirements script
    conf: 0.9
    if:
      type: value
      path: scripts.preinstall
      regex: "^node\\s+\\./?engine-requirements\\.js$"
  - id: preinstall-incompatible-cli-check
    desc: preinstall checks incompatible CLI
    conf: 0.9
    if:
      type: text
      substr: "please uninstall sfdx-cli first"
  - id: preinstall-version-command-check
    desc: preinstall checks installed version
    conf: 0.9
    if:
      type: text
      regex: "\\b[a-z][a-z0-9_-]*\\s+--version"

composite_rules:
  - id: preinstall-runtime-guard-help
    desc: preinstall runtime guard help text
    conf: 0.95
    all:
      - id: preinstall-node-runtime-check
      - id: preinstall-error-install-instructions
      - id: preinstall-exits-failure
  - id: preinstall-compatibility-guard
    desc: preinstall compatibility guard
    conf: 0.95
    all:
      - id: preinstall-incompatible-cli-check
      - id: preinstall-version-command-check
