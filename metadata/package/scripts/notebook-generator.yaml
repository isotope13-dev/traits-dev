defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  conf: 0.9

traits:
  - id: jupyter-notebook-file
    desc: Jupyter notebook file
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '\.ipynb$'
  - id: jupyter-code-cell-generator
    desc: Generates Jupyter notebook code cells
    if:
      type: text
      regex: '"cell_type"\s*:\s*"code"|["'']cell_type["'']\s*:\s*["'']code["'']'
