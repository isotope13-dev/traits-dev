defaults:
  platforms: [windows, unix]
  for:
    - package.json
traits:
  # Note: use `type: value` with path so evidence includes the script value,
  # not just the bare `"build":` token. A `substr` match on the key hides
  # what the script actually does from the terminal output.
  - id: pkg-build-script-field
    desc: '"build": script in package.json'
    crit: notable
    conf: 0.6
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: value
      path: scripts.build
      exists: true
  - id: pkg-lint-script-field
    desc: '"lint": script in package.json'
    crit: notable
    conf: 0.6
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: value
      path: scripts.lint
      exists: true
  - id: pkg-format-script-field
    desc: '"format": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: value
      path: scripts.format
      exists: true
  - id: pkg-dev-script-field
    desc: '"dev": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: value
      path: scripts.dev
      exists: true
  - id: pkg-start-script-field
    desc: '"start": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: value
      path: scripts.start
      exists: true
  - id: has-release-scripts-1
    desc: Package has release script
    if:
      type: value
      path: scripts.release
      exists: true
  - id: has-publish-script
    desc: Package has publish script
    if:
      type: value
      path: scripts.publish
      exists: true
  - id: has-version-script
    desc: Package has version script
    if:
      type: value
      path: scripts.version
      exists: true
  - id: has-release-scripts-2
    desc: Package has release management scripts (pre/post)
    if:
      type: text
      regex: '"(prepublishOnly|postversion)":'
  - id: has-typescript
    desc: Package has TypeScript support
    crit: notable
    conf: 0.9
    size_min: 900
    unless:
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: text
      regex: '"typescript"|"\.d\.ts"|"tsconfig"'
  - id: has-build-script-1
    desc: Package has build script (tsc/rollup/webpack)
    if:
      type: text
      regex: '"build":\s*"[^"]{0,120}(tsc|rollup|webpack)'
  - id: has-build-script-2
    desc: Package has build script (esbuild/babel/vite)
    if:
      type: text
      regex: '"build":\s*"[^"]{0,120}(esbuild|babel|vite)'
  - id: has-lint-script
    desc: Package has linting configured
    crit: notable
    conf: 0.9
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: text
      regex: '"lint":\s*"|"biome":'
  - id: has-prepublish-only
    desc: Package has prepublishOnly script
    crit: notable
    conf: 0.85
    size_max: 50000
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]package\.json$
    if:
      type: text
      substr: '"prepublishOnly":'
  - id: has-postpublish
    desc: Package has postpublish script
    crit: notable
    conf: 0.85
    size_max: 50000
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]package\.json$
    if:
      type: value
      path: scripts.postpublish
      exists: true
  - id: uses-bin-scripts
    desc: Scripts reference node_modules binaries
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: text
      regex: '".{1,40}":\s*".{0,120}(node_modules/\.bin/|npx |npm run )'
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
      - type: basename
        regex: (^|[\\/])\.bin[\\/]run-script-os$
    not:
      - substr: 'npm run benchclean'
  - id: has-git-hooks
    desc: Package uses git hooks tooling
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"husky"|"lint-staged"|"pre-commit"|"simple-git-hooks"'
composite_rules:
  - id: has-release-scripts
    desc: Package has release management scripts
    crit: notable
    conf: 0.85
    any:
      - id: has-release-scripts-1
      - id: has-publish-script
      - id: has-version-script
      - id: has-release-scripts-2
  - id: has-build-script
    desc: Package has build script (compiled)
    crit: notable
    conf: 0.85
    any:
      - id: has-build-script-1
      - id: has-build-script-2
  - id: has-dev-workflow
    desc: Package has development workflow scripts
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: metadata/package/testing/presence/manifest::pkg-test-script-field
      - id: pkg-build-script-field
      - id: pkg-lint-script-field
      - id: pkg-format-script-field
      - id: pkg-dev-script-field
      - id: pkg-start-script-field
