defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - package.json
traits:
  - id: pkg-build-script-field
    desc: '"build": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: '"build":'
  - id: pkg-lint-script-field
    desc: '"lint": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: '"lint":'
  - id: pkg-format-script-field
    desc: '"format": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: '"format":'
  - id: pkg-dev-script-field
    desc: '"dev": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: '"dev":'
  - id: pkg-start-script-field
    desc: '"start": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: '"start":'
  - id: has-release-scripts-1
    desc: Package has release management scripts (rel/pub/ver)
    if:
      type: string_value
      regex: '"(release|publish|version)":\s*"'
  - id: has-release-scripts-2
    desc: Package has release management scripts (pre/post)
    if:
      type: string_value
      regex: '"(prepublishOnly|postversion)":'
  - id: has-typescript
    desc: Package has TypeScript support
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: '"typescript"|"@types/|"\.d\.ts"|"tsconfig"'
  - id: has-build-script-1
    desc: Package has build script (tsc/rollup/webpack)
    if:
      type: string_value
      regex: '"build":\s*"[^"]{0,120}(tsc|rollup|webpack)'
  - id: has-build-script-2
    desc: Package has build script (esbuild/babel/vite)
    if:
      type: string_value
      regex: '"build":\s*"[^"]{0,120}(esbuild|babel|vite)'
  - id: has-lint-script
    desc: Package has linting configured
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: '"lint":\s*"|"eslint"|"prettier"|"biome"'
  - id: has-prepublish-only
    desc: Package has prepublishOnly script
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: '"prepublishOnly":'
  - id: uses-bin-scripts
    desc: Scripts reference node_modules binaries
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'node_modules/\.bin/|npx |npm run '
  - id: has-git-hooks
    desc: Package uses git hooks tooling
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: '"husky"|"lint-staged"|"pre-commit"|"simple-git-hooks"'
composite_rules:
  - id: has-release-scripts
    desc: Package has release management scripts
    crit: notable
    conf: 0.85
    any:
      - id: has-release-scripts-1
      - id: has-release-scripts-2
  - id: has-build-script
    desc: Package has build script (compiled)
    crit: notable
    conf: 0.85
    any:
      - id: has-build-script-1
      - id: has-build-script-2
  - id: has-dev-workflow
    desc: Package has development workflow scripts
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: metadata/package/testing::pkg-test-script-field
      - id: pkg-build-script-field
      - id: pkg-lint-script-field
      - id: pkg-format-script-field
      - id: pkg-dev-script-field
      - id: pkg-start-script-field
