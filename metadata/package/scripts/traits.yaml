defaults:
  platforms: [windows, unix]
  for:
    - package.json
traits:
  - id: no-op-build-script
    desc: Build script emits no-op marker
    crit: notable
    conf: 0.96
    if:
      type: value
      path: scripts.build
      regex: 'node\s+-e[\s\S]*\b(skip|no.?op|already\s+present|not\s+configured)\b'
      case_insensitive: true
  # Note: use `type: value` with path so evidence includes the script value,
  # not just the bare `"build":` token. A `substr` match on the key hides
  # what the script actually does from the terminal output.
  - id: pkg-build-script-field
    desc: Package declares a build script
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/package/files/dependency::node-modules-path
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: value
      path: scripts.build
      exists: true
  - id: has-test-script
    desc: package.json declares a test script
    # Relocated from objectives/impact/destroy/file-deletion (a neutral
    # "declares a test script" capability is not destroy intent). Kept un-gated
    # (no devDependencies/keywords unless) because the destroy/sudo capability
    # composites need to know a `npm test` hook exists regardless of dev
    # metadata — malware can add devDeps to dodge the anomaly-gated
    # metadata/package/testing/presence/manifest::pkg-test-script-field.
    crit: component
    conf: 1.0
    if:
      type: value
      path: scripts.test
      exists: true
  - id: pkg-prepack-removes-dotgitignore
    desc: prepack removes .gitignore
    crit: component
    conf: 0.85
    if:
      type: value
      path: scripts.prepack
      regex: 'rm\s+-rf\b.{0,220}/\.gitignore\b'
  - id: pkg-lint-script-field
    desc: '"lint": script in package.json'
    crit: notable
    conf: 0.6
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: value
      path: scripts.lint
      exists: true
  - id: pkg-format-script-field
    desc: '"format": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: value
      path: scripts.format
      exists: true
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pkg-dev-script-field
    desc: package.json declares a development script
    crit: notable
    conf: 0.6
    if:
      type: value
      path: scripts.dev
      exists: true
  - id: pkg-start-script-field
    desc: '"start": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: value
      path: scripts.start
      exists: true
  - id: has-release-scripts-1
    desc: Package has release script
    if:
      type: value
      path: scripts.release
      exists: true
  - id: has-publish-script
    desc: Package has publish script
    if:
      type: value
      path: scripts.publish
      exists: true
  - id: has-version-script
    desc: Package has version script
    if:
      type: value
      path: scripts.version
      exists: true
  - id: has-release-scripts-2
    desc: "Package release management scripts (pre/post)"
    if:
      type: text
      regex: '"(prepublishOnly|postversion)":'
  - id: has-build-script-1
    desc: Package has build script (tsc/rollup/webpack)
    if:
      type: text
      regex: '"build":\s*"[^"]{0,120}(tsc|rollup|webpack)'
  - id: has-build-script-2
    desc: Package has build script (esbuild/babel/vite)
    if:
      type: text
      regex: '"build":\s*"[^"]{0,120}(esbuild|babel|vite)'
  - id: has-lint-script
    desc: Package has linting configured
    crit: notable
    conf: 0.9
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
    if:
      type: text
      regex: '"lint":\s*"|"biome":'
  - id: has-prepublish-only
    desc: Package declares a prepublish-only script
    crit: notable
    conf: 0.85
    size_max: 50000
    unless:
      - id: metadata/package/files/dependency::node-modules-nested-package-json
    if:
      type: value
      path: scripts.prepublishOnly
      exists: true
  - id: has-postpublish
    desc: Package has postpublish script
    crit: notable
    conf: 0.85
    size_max: 50000
    unless:
      - id: metadata/package/files/dependency::node-modules-nested-package-json
    if:
      type: value
      path: scripts.postpublish
      exists: true
  - id: uses-bin-scripts
    desc: Scripts reference node_modules binaries
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: value
      path: scripts
      regex: '(node_modules/\.bin/|npx |npm run )'
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
      - type: basename
        regex: (^|[\\/])\.bin[\\/]run-script-os$
    not:
      - substr: 'npm run benchclean'
  - id: has-git-hooks
    desc: Package uses git hooks tooling
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"husky"|"lint-staged"|"pre-commit"|"simple-git-hooks"'
  - id: setup-entry-points-field
    desc: setup.py declares entry_points
    crit: component
    conf: 0.78
    for: [python]
    if:
      type: text
      regex: entry_points\s*=
  - id: setup-scripts-field
    desc: setup.py declares scripts
    crit: component
    conf: 0.78
    for: [python]
    if:
      type: text
      regex: scripts\s*=
  - id: entry-points-file
    desc: Python package contains an entry_points.txt file
    crit: component
    conf: 0.95
    for: [text]
    if:
      type: path
      basename: true
      exact: entry_points.txt
  - id: console-scripts-entry
    desc: Declares Python console-script entry points
    crit: component
    conf: 0.88
    for: [text]
    if:
      type: text
      substr: "[console_scripts]"
composite_rules:
  - id: has-release-scripts
    desc: Package has release management scripts
    crit: notable
    conf: 0.85
    any:
      - id: has-release-scripts-1
      - id: has-publish-script
      - id: has-version-script
      - id: has-release-scripts-2
  - id: has-build-script
    desc: Package has build script (compiled)
    crit: notable
    conf: 0.85
    any:
      - id: has-build-script-1
      - id: has-build-script-2
  - id: has-dev-workflow
    desc: Package has development workflow scripts
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: metadata/package/testing/presence/manifest::pkg-test-script-field
      - id: pkg-build-script-field
      - id: pkg-lint-script-field
      - id: pkg-format-script-field
      - id: pkg-dev-script-field
      - id: pkg-start-script-field
  - id: wheel-console-entrypoint
    desc: Package declares a console-script entry point
    crit: notable
    conf: 0.9
    for: [text]
    all:
      - id: entry-points-file
      - id: console-scripts-entry
