defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: baseline
  conf: 0.95
traits:
  - id: preinstall-package-manager-warning-script
    desc: Preinstall package-manager warning script
    if:
      type: value
      path: scripts.preinstall
      regex: "^node\\s+scripts/preinstall-package-manager-warning\\.mjs$"
  - id: preinstall-only-allow-package-manager
    desc: Preinstall package-manager guard
    if:
      type: value
      path: scripts.preinstall
      regex: "^npx\\s+only-allow\\s+(pnpm|bun|yarn|npm)$"
