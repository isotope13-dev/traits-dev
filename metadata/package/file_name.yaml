defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [source]
traits:
  - id: configure-script
    desc: Build configuration script
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: configure.{0,100}\.py$|configure$
  - id: rubygem-archive
    desc: Rubygem internal archive structure file
    crit: baseline
    conf: 0.98
    for: [binaries, scripts, source, manifests, documents, media, data]
    if:
      type: basename
      regex: \.gem$|^(checksums\.yaml|metadata|data\.tar)\.
