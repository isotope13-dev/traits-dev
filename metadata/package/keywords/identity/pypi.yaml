defaults:
  platforms:
  - unix
  - windows
  crit: notable
  attack: T1036.005
  mbc: F0004
  for: [pkginfo, pyproject.toml]
traits:
- id: empty-keywords
  desc: Empty keywords list
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: keywords.{0,50}=.{0,50}\[\]
- id: typosquatting-keyword
  desc: Package keywords mention typosquatting
  crit: suspicious
  conf: 0.95
  unless:
    - id: metadata/package/quality/recognized-contexts::depmirage-defensive-scanner-context
  if:
    type: value
    path: keywords
    regex: '(?i)\btyposquat(ting)?\b'
- id: pkginfo-single-generic-keyword
  desc: Package metadata contains a lone generic keyword
  crit: notable
  conf: 0.7
  if:
    type: value
    path: keywords
    regex: ^[a-zA-Z]{2,15}$
- id: malware-keyword-in-keywords-1--trojan
  desc: Malware term in keywords (trojan)
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: trojan
- id: malware-keyword-in-keywords-1--backdoor
  desc: Malware term in keywords (backdoor)
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: backdoor
- id: malware-keyword-in-keywords-1--rootkit
  desc: Malware term in keywords (rootkit)
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: rootkit
- id: malware-keyword-in-keywords-1--exploit
  desc: Malware term in keywords (exploit)
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: exploit
- id: malware-keyword-in-keywords-2--payload
  desc: Malware term in keywords (payload)
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: payload
- id: malware-keyword-in-keywords-2--stealer
  desc: Malware term in keywords (stealer)
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: stealer
- id: malware-keyword-in-keywords-2--malware
  desc: Malware term in keywords (malware)
  unless:
  - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: malware
- id: malware-keyword-in-keywords-2--keylog
  desc: Malware term in keywords (keylog)
  if:
    type: value
    path: keywords
    case_insensitive: true
    regex: keylog
composite_rules:
- id: malware-keyword-in-keywords-1
  desc: 'Malware term in keywords'
  unless:
  - id: well-known/tool/offensive/payload-corpus/
  any:
  - id: malware-keyword-in-keywords-1--trojan
  - id: malware-keyword-in-keywords-1--backdoor
  - id: malware-keyword-in-keywords-1--rootkit
  - id: malware-keyword-in-keywords-1--exploit
- id: malware-keyword-in-keywords-2
  desc: 'Malware term in keywords'
  unless:
  - id: well-known/tool/detection/cape-parsers
  - id: well-known/tool/offensive/payload-corpus/
  - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  any:
  - id: malware-keyword-in-keywords-2--payload
  - id: malware-keyword-in-keywords-2--stealer
  - id: malware-keyword-in-keywords-2--malware
  - id: malware-keyword-in-keywords-2--keylog
- id: malware-keyword-in-keywords
  desc: Malware-related term in Keywords field
  crit: suspicious
  conf: 0.9
  any:
  - id: malware-keyword-in-keywords-1
  - id: malware-keyword-in-keywords-2
  unless:
  - id: well-known/tool/offensive/payload-corpus/
