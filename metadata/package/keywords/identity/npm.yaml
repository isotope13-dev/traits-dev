---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-keywords
  desc: Package has keywords array
  crit: baseline
  conf: 0.75
  if:
    type: value
    path: keywords
- id: npm-keyword-jsdelivr
  desc: Package declares jsdelivr keyword
  crit: component
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: jsdelivr
- id: npm-keyword-cdn
  desc: Package declares cdn keyword
  crit: component
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: cdn
- id: npm-keyword-browser
  desc: Package declares browser keyword
  crit: component
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: browser
- id: npm-keyword-html
  desc: Package declares html keyword
  crit: component
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: html
- id: npm-keyword-cloudflare
  desc: Package declares cloudflare keyword
  crit: component
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: cloudflare
- id: npm-keyword-unpkg
  desc: Package declares unpkg keyword
  crit: component
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: unpkg
