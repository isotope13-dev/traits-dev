defaults:
  platforms: [windows, unix]
  for: [package.json, xml]
  crit: baseline
  conf: 0.9

traits:
  # Absence of a `contributes` block. Component on its own and useless
  # unqualified: EVERY ordinary npm package.json lacks this key, so it only
  # carries meaning once paired with the engines.vscode gate in the
  # vscode-no-contributions composite below.
  - id: vscode-contributes-absent
    desc: Manifest has no contributes section
    crit: component
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: contributes
      exists: false

  # A shell task is a neutral VS Code workspace configuration fact.  The
  # supply-chain composite adds the run-on-open and suspicious command
  # context when inferring malicious task persistence.
  - id: vscode-task-shell-command
    desc: VS Code task uses shell execution
    crit: notable
    conf: 0.8
    for: [json]
    if:
      type: text
      regex: '"type":\s*"shell"'
  - id: vscode-webview-contribution
    desc: VS Code webview contribution
    for: [package.json]
    if:
      type: value
      path: contributes.views.*
      regex: webview
  - id: vscode-command-activation
    desc: VS Code command activation
    for: [package.json]
    if:
      type: value
      path: activationEvents[*]
      regex: '^onCommand:'
  - id: vscode-view-activation
    desc: VS Code view activation
    for: [package.json]
    if:
      type: value
      path: activationEvents[*]
      regex: '^onView:'
  - id: vscode-settings-contribution
    desc: VS Code settings contribution
    for: [package.json]
    if:
      type: value
      path: contributes.configuration.properties.*
      exists: true
  - id: vscode-extension-local-workspace-install
    desc: VS Code extension local workspace install script
    for: [package.json]
    if:
      type: value
      path: scripts.*
      regex: '(^|&&|;)\s*cd\s+(\.\./)?[A-Za-z0-9_./-]+\s*&&\s*npm\s+(i|install)\b'
  - id: vscode-workspace-extension-kind
    desc: VS Code workspace extension kind
    for: [xml]
    if:
      type: text
      substr: 'Microsoft.VisualStudio.Code.ExtensionKind" Value="workspace"'
  - id: vscode-executes-code-property
    desc: VSIX manifest declares ExecutesCode=true
    for: [xml]
    if:
      type: text
      substr: 'Microsoft.VisualStudio.Code.ExecutesCode" Value="true"'

composite_rules:
  # A VS Code extension that declares no `contributes` block ships no commands,
  # snippets, languages, themes, views or settings — nothing a user can invoke
  # or see. Neutral on its own: some legitimate extensions register providers
  # purely through the API at runtime. It earns its place in triage because a
  # trojanized or repurposed VSIX is exactly an extension whose only real
  # content is its activation entry point, so pairing this with the
  # wildcard-activation and entry-point facts describes a package that exists
  # solely to run code when the editor starts.
  #
  # MUST stay gated on `engines.vscode`: `contributes` is absent from every
  # ordinary npm package.json, so an ungated absence check fires across the
  # whole npm ecosystem (an earlier draft regressed a benign fixture that way).
  - id: vscode-no-contributions
    desc: VS Code manifest declares no contributions
    crit: notable
    conf: 0.9
    all:
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: vscode-contributes-absent

  - id: vscode-webview-extension
    desc: VS Code webview extension
    crit: baseline
    conf: 0.94
    all:
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: vscode-webview-contribution
  - id: vscode-command-activated-extension
    desc: VS Code command activation extension
    crit: baseline
    conf: 0.94
    all:
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: vscode-command-activation
  - id: vscode-view-activated-extension
    desc: VS Code view activation extension
    crit: baseline
    conf: 0.94
    all:
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: vscode-view-activation
  - id: vscode-configurable-extension
    desc: VS Code configurable extension
    crit: baseline
    conf: 0.94
    all:
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: vscode-settings-contribution
  - id: vscode-workspace-install-extension
    desc: VS Code extension workspace install hook
    crit: baseline
    conf: 0.94
    all:
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: vscode-extension-local-workspace-install
  - id: vscode-workspace-code-extension
    desc: VS Code workspace code extension
    crit: baseline
    conf: 0.94
    for: [xml]
    all:
      - id: vscode-workspace-extension-kind
      - id: vscode-executes-code-property
