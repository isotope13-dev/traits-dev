# All PE traits in this file are .NET-specific (ConfigurationManager,
# AppSettings, Environment class syntax). On a native PE (Go/Rust/C) these
# strings can still appear in .rdata but they describe the import table,
# not .NET config access — suppress when the PE is clearly non-.NET.
defaults:
  platforms:
    - unix
    - windows
  for:
    - pe
    - csharp
traits:
  - id: config-manager
    desc: Application configuration access
    crit: baseline
    conf: 0.75
    if:
      type: text
      substr: ConfigurationManager
      section: .rdata
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: appsettings-pascal
    desc: AppSettings (PascalCase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: AppSettings
      section: .rdata
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: appsettings-lower
    desc: appsettings (lowercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: appsettings
      section: .rdata
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: get-env-var
    desc: GetEnvironmentVariable method
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: GetEnvironmentVariable
      section: .rdata
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: environment-class
    desc: Environment class access
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (^|[^A-Za-z])Environment\.
      section: .rdata
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
composite_rules:
  - id: app-settings
    desc: AppSettings configuration access
    crit: notable
    conf: 0.7
    any:
      - id: appsettings-pascal
      - id: appsettings-lower
  - id: environment-vars
    desc: Environment variable access
    crit: notable
    conf: 0.7
    any:
      - id: get-env-var
      - id: environment-class
