defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - pe
    - dll
    - csharp
traits:
  - id: config-manager
    desc: Application configuration access
    crit: baseline
    conf: 0.75
    if:
      type: text
      substr: ConfigurationManager
      section: .rdata
  - id: appsettings-pascal
    desc: AppSettings (PascalCase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: AppSettings
      section: .rdata
  - id: appsettings-lower
    desc: appsettings (lowercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: appsettings
      section: .rdata
  - id: get-env-var
    desc: GetEnvironmentVariable method
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: GetEnvironmentVariable
      section: .rdata
  - id: environment-class
    desc: Environment class access
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (^|[^A-Za-z])Environment\.
      section: .rdata
composite_rules:
  - id: app-settings
    desc: AppSettings configuration access
    crit: notable
    conf: 0.7
    any:
      - id: appsettings-pascal
      - id: appsettings-lower
  - id: environment-vars
    desc: Environment variable access
    crit: notable
    conf: 0.7
    any:
      - id: get-env-var
      - id: environment-class
