defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: server-host-const
    desc: SERVER_HOST configuration constant
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+SERVER_HOST\s*=
  - id: http-port-const
    desc: HTTP_PORT configuration constant
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+HTTP_PORT\s*=
  - id: https-port-const
    desc: HTTPS_PORT configuration constant
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+HTTPS_PORT\s*=
  - id: upload-path-const
    desc: UPLOAD_PATH configuration constant
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+UPLOAD_PATH\s*=
  - id: small-sidecar-file
    desc: Small sidecar-sized file
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: identifiers.total
      max: 6
  - id: short-sidecar-file
    desc: Short sidecar-sized source
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: text.total_lines
      max: 25
composite_rules:
  - id: network-endpoint-sidecar
    desc: Small network endpoint sidecar configuration
    crit: baseline
    conf: 0.9
    all:
      - id: server-host-const
      - id: http-port-const
      - id: https-port-const
      - id: upload-path-const
      - id: small-sidecar-file
      - id: short-sidecar-file
