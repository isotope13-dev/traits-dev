defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.9

traits:
  - id: wordpress-development-config-file
    desc: WordPress development-mode configuration
    # Anchored on WordPress development-mode markers (the WP_LOCAL_DEV /
    # WP_DEVELOPMENT_MODE constants, the core config-develop.php file, or the
    # env-type sample comment). A bare "develop" substring is avoided -- it
    # matched author URLs and prose such as "developer.example.com".
    if:
      type: text
      regex: '(?i)(WP_LOCAL_DEV|WP_DEVELOPMENT_MODE|config-develop\.php|Allowed values:\s*develop)'
