defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
  crit: notable
traits:
  - id: toml-config-multiple
    desc: Multiple TOML config file references
    crit: notable
    conf: 0.75
    count_min: 2
    if:
      type: text
      regex: \b[a-z_-]+\.toml\b
      section: .text
  - id: toml-config-hidden
    desc: Hidden TOML config file (.config.toml)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \.[a-z_-]+\.toml\b
      section: .text
  - id: asset-toml-literal
    desc: asset.toml file reference
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: asset.toml
      section: .text
composite_rules:
  - id: modular-toml-config
    desc: Modular TOML configuration pattern
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: toml-config-multiple
      - id: toml-config-hidden
      - id: metadata/package/config::config-toml-file
      - id: asset-toml-literal
