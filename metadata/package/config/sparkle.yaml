defaults:
  platforms: [macos]
  for: [plist]
  crit: baseline
  conf: 0.9

traits:
  - id: sparkle-feed-url
    desc: Sparkle appcast feed URL
    if:
      type: text
      regex: '<key>SUFeedURL</key>\s*<string>https?://.{0,200}</string>'
  - id: sparkle-automatic-update
    desc: Sparkle automatic updates enabled
    if:
      type: text
      regex: '<key>SUAutomaticallyUpdate</key>\s*<true\s*/>'
  - id: sparkle-installer-launcher-service
    desc: Sparkle installer launcher service enabled
    if:
      type: text
      regex: '<key>SUEnableInstallerLauncherService</key>\s*<true\s*/>'

composite_rules:
  - id: sparkle-autoupdate-channel
    desc: Sparkle automatic update channel
    crit: baseline
    conf: 0.95
    all:
      - id: sparkle-feed-url
    any:
      - id: sparkle-automatic-update
      - id: sparkle-installer-launcher-service
