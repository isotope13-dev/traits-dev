defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: config-yaml-file
    desc: config.yaml filename
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: config.yaml
      section: .text
  - id: config-json-file
    desc: config.json filename
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: config.json
      section: .text
  - id: stage-config-endpoint-retrieve--manifest-json
    desc: manifest.json filename literal
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: string_literal
      word: manifest.json
  - id: config-toml-file
    desc: config.toml filename
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: config.toml
      section: .text
  - id: dotenv-file
    desc: .env file reference
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      exact: .env
      section: .text
  - id: viper-config-lib
    desc: Viper configuration library
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: viper
      section: .text
  - id: configparser-module
    desc: configparser module
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: configparser
      section: .text
  - id: dotenv-module
    desc: dotenv module reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: dotenv
      section: .text
  - id: default-excludes-identifier
    desc: Default excludes identifier
    crit: component
    conf: 0.8
    for: [python, javascript, typescript, shell]
    if:
      type: text
      word: DEFAULT_EXCLUDES
  - id: should-skip-identifier
    desc: Should-skip identifier
    crit: component
    conf: 0.75
    for: [python, javascript, typescript, shell]
    if:
      type: text
      word: should_skip
  - id: exclude-patterns-identifier
    desc: Exclude patterns identifier
    crit: component
    conf: 0.75
    for: [python, javascript, typescript, shell]
    if:
      type: text
      word: exclude_patterns
  - id: ignore-patterns-identifier
    desc: Uses an ignore-patterns identifier
    crit: component
    conf: 0.75
    for: [python, javascript, typescript, shell]
    if:
      type: text
      word: ignore_patterns
  - id: excludes-identifier
    desc: Uses an excludes identifier
    crit: component
    conf: 0.7
    for: [python, javascript, typescript, shell]
    if:
      type: text
      word: excludes
  - id: skip-extensions-identifier
    desc: Skip extensions identifier
    crit: component
    conf: 0.9
    for: [python, javascript, typescript, shell]
    if:
      type: text
      word: SKIP_EXTENSIONS
  - id: secret-file-classifier-function
    desc: Classifies files as secret-bearing
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: function
      exact: classify_secret_file
  - id: sensitive-key-exclude-pattern
    desc: Excludes sensitive credential extensions
    crit: component
    conf: 0.8
    for: [python, javascript, typescript, shell]
    if:
      type: text
      regex: '(\*\.(pem|key)|["'']\.(pem|key)["''])'
  - id: sensitive-archive-exclude-pattern
    desc: Excludes sensitive credential archives
    crit: component
    conf: 0.8
    for: [python, javascript, typescript, shell]
    if:
      type: text
      regex: '["'']\.(p(12|fx)|jks)["'']'
composite_rules:
  - id: exclusion-list-identifier
    desc: Uses an exclusion-list identifier
    crit: component
    conf: 0.8
    for: [python, javascript, typescript, shell]
    any:
      - id: default-excludes-identifier
      - id: should-skip-identifier
      - id: exclude-patterns-identifier
      - id: ignore-patterns-identifier
      - id: excludes-identifier
      - id: skip-extensions-identifier
      - id: secret-file-classifier-function
  - id: sensitive-file-exclusion-list
    desc: Sensitive file exclusion list
    crit: baseline
    conf: 0.85
    for: [python, javascript, typescript, shell]
    all:
      - id: exclusion-list-identifier
    any:
      - id: sensitive-key-exclude-pattern
      - id: sensitive-archive-exclude-pattern
