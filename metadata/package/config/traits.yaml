defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries]
traits:
  - id: config-yaml-file
    desc: config.yaml filename
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: config.yaml
      section: .text
  - id: config-json-file
    desc: config.json filename
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: config.json
      section: .text
  - id: config-toml-file
    desc: config.toml filename
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: config.toml
      section: .text
  - id: dotenv-file
    desc: .env file reference
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      exact: .env
      section: .text
  - id: viper-config-lib
    desc: Viper configuration library
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: viper
      section: .text
  - id: configparser-module
    desc: configparser module
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: configparser
      section: .text
  - id: dotenv-module
    desc: dotenv module reference
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      word: dotenv
      section: .text
