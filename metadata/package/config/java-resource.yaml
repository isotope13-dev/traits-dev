defaults:
  platforms: [windows, unix]
  for: [jar, zip]
traits:
  - id: java-config-resource
    desc: Presence of config.txt in Java resources
    crit: notable
    if:
      type: path
      basename: true
      exact: "config.txt"
  - id: forge-mcmod-info
    desc: Forge mcmod metadata resource
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      exact: "mcmod.info"
  - id: forge-mods-toml
    desc: Forge mods.toml metadata resource
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      exact: "mods.toml"
