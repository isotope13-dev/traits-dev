defaults:
  platforms: [unix, windows]
  for: [python, markdown]

traits:
  - id: agent-instructions-md-basename
    desc: Agent instructions markdown file name
    crit: component
    conf: 0.95
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: value
      path: file.basename
      regex: '^(AGENTS|CLAUDE|GEMINI)\.md$'

  - id: agent-skill-md-basename
    desc: Agent skill markdown file name
    crit: component
    conf: 0.95
    if:
      type: path
      regex: '(?i)(^|[\\/])SKILLS?\.md(##|$)'

  - id: agent-skill-frontmatter-fields
    desc: Agent skill frontmatter fields
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?m)^name:\s*["'']?[A-Za-z0-9_-]+["'']?[\s\S]{0,300}^description:'

  - id: agent-skill-allowed-tools
    desc: Agent skill allowed-tools declaration
    crit: baseline
    conf: 0.88
    if:
      type: text
      regex: '(?m)^allowed-tools:\s*'

  - id: agent-skill-bash-all-tools
    desc: "Agent skill grants full Bash access"
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?m)^allowed-tools:\s*Bash\(\*\)\s*$'

  - id: agent-skill-archive-member
    desc: Archive contains agent skills
    crit: baseline
    conf: 0.9
    for: [tar, zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)skills/[^/]+/SKILLS?\.md$'

  - id: claude-plugin-manifest-path
    desc: Claude plugin manifest
    crit: baseline
    conf: 0.95
    for: [json]
    if:
      type: path
      regex: '(^|/)\.claude-plugin/plugin\.json$'

  - id: claude-plugin-marketplace-schema
    desc: Claude plugin marketplace schema
    crit: component
    conf: 0.96
    for: [json]
    if:
      type: value
      path: "$schema"
      exact: "https://anthropic.com/claude-code/marketplace.schema.json"

  - id: claude-plugin-marketplace-entry-source
    desc: Claude marketplace plugin source
    crit: component
    conf: 0.86
    for: [json]
    if:
      type: value
      path: "plugins[*].source"
      regex: '^.{1,200}$'

composite_rules:
  - id: agent-skill-frontmatter
    desc: Agent skill manifest frontmatter
    crit: baseline
    conf: 0.9
    all:
      - id: agent-skill-md-basename
      - id: agent-skill-frontmatter-fields

  - id: claude-plugin-marketplace-manifest
    desc: Claude plugin marketplace manifest
    crit: baseline
    conf: 0.95
    for: [json]
    all:
      - id: claude-plugin-marketplace-schema
      - id: claude-plugin-marketplace-entry-source
