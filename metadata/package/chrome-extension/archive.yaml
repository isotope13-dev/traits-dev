defaults:
  platforms: [windows, unix]
  for: [zip, xpi]
  crit: component
  conf: 0.95

traits:
  - id: chrome-webstore-verified-contents
    desc: Chrome Web Store verified contents
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "_metadata/verified_contents.json"

  - id: chrome-theme-frame-image
    desc: Chrome theme frame image
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "images/theme_frame.png"

  - id: chrome-theme-toolbar-image
    desc: Chrome theme toolbar image
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "images/theme_toolbar.png"

  - id: chrome-theme-ntp-background-image
    desc: Chrome theme NTP background
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "images/theme_ntp_background.png"

  - id: chrome-theme-tab-background-image
    desc: Chrome theme tab background
    if:
      type: kv
      path: "archive.members[*].path"
      exact: "images/theme_tab_background.png"

composite_rules:
  - id: chrome-webstore-extension
    desc: Chrome Web Store extension archive
    crit: baseline
    conf: 0.95
    all:
      - id: metadata/signed/platform::web-extension-manifest
      - id: chrome-webstore-verified-contents

  - id: chrome-theme-archive
    desc: Chrome theme asset archive
    crit: baseline
    conf: 0.96
    all:
      - id: metadata/signed/platform::web-extension-manifest
      - id: chrome-theme-frame-image
      - id: chrome-theme-toolbar-image
      - id: chrome-theme-ntp-background-image
      - id: chrome-theme-tab-background-image
