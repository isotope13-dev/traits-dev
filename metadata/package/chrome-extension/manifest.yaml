# Chrome Extension Manifest Properties
# Neutral manifest structure and permission metadata.
defaults:
  platforms: [windows, unix]
  for: [chrome-manifest]
  crit: baseline
  conf: 0.95
traits:
  - id: is-chrome-manifest
    desc: Chrome extension manifest file
    size_min: 128
    if:
      type: kv
      path: 'manifest_version'
  - id: manifest-v3
    desc: Chrome extension Manifest V3
    if:
      type: kv
      path: manifest_version
      exact: '3'
  - id: manifest-v2
    desc: Chrome extension Manifest V2
    size_min: 128
    not:
      - substr: '"name": "ui-page"'
    if:
      type: kv
      path: manifest_version
      exact: '2'
  - id: permission-tabs
    desc: Extension requests tabs permission
    conf: 0.9
    if:
      type: kv
      path: permissions
      exact: 'tabs'
