defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: mit-license-text
    desc: MIT License text
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: MIT License
      section: .text
  - id: apache-license-text
    desc: Apache License text
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: Apache License
      section: .text
  - id: gpl-word
    desc: GPL license reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: GPL
      section: .text
  - id: bsd-word
    desc: BSD license reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: BSD
      section: .text
  - id: license-upper
    desc: LICENSE file reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: LICENSE
      section: .text
  - id: copyright-word
    desc: Copyright notice
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: Copyright
      section: .text
  - id: spdx-identifier
    desc: SPDX license identifier
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: SPDX-License-Identifier
      section: .text
