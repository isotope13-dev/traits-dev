defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
traits:
  - id: mit-license-text
    desc: MIT License text
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: MIT License
  - id: apache-license-text
    desc: Apache License text
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: Apache License
  - id: gpl-word
    desc: GPL license reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: GPL
  - id: bsd-word
    desc: BSD license reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: BSD
  - id: copyright-word
    desc: Copyright notice
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: Copyright
  - id: spdx-identifier
    desc: SPDX license identifier
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: SPDX-License-Identifier
