---
# Non-SPDX freeform license strings across package manifests.
#
# A real license field is an SPDX id/expression (`MIT`, `Apache-2.0`,
# `(MIT OR Apache-2.0)`), the `UNLICENSED`/`SEE LICENSE IN <file>` conventions,
# or a descriptive variant that still names a known family ("BSD License",
# "GNU General Public License v3"). A plain run of capitalised words that names
# no recognised license — e.g. `"Trinity Optima Production"` — is the hallmark
# of an auto-generated / namespace-squatting manifest, and such marketing
# strings recur as a watermark across whole campaign clusters.
#
# Precision comes from the `unless` clauses: the main regex only matches a run
# of pure letter-words, and virtually every legit descriptive license either
# contains the word "license" or names a known family/public-domain phrase, so
# excluding those leaves only fabricated-looking strings. package.json and
# composer.json share a top-level `license` string field, so one trait covers
# both; Cargo/pyproject nest it under `package.`/`project.`.
defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.65
  attack: T1195.002
traits:
  - id: npm-unlicensed-declaration
    desc: npm manifest declares package UNLICENSED
    crit: baseline
    conf: 0.95
    for: [package.json]
    if:
      type: value
      path: license
      exact: UNLICENSED
  - id: manifest-freeform-license
    desc: Package license is a non-SPDX freeform string
    for: [package.json, composer.json]
    if:
      type: value
      path: license
      regex: '^[A-Za-z]+ [A-Za-z]+( [A-Za-z]+)*$'
    unless:
      # npm/composer convention: "SEE LICENSE IN <file>".
      - type: value
        path: license
        regex: '^SEE LICENSE IN '
      # Descriptive "... License" phrases (MIT License, BSD License, …).
      - type: value
        path: license
        regex: '(?i)licen[sc]e'
      # Multi-word license names that omit the word "license".
      - type: value
        path: license
        regex: '(?i)(public domain|creative commons|all rights reserved)'
      - type: value
        path: license
        regex: '(?i)\b(gnu|gpl|lgpl|agpl)\b'
      - type: value
        path: license
        regex: '(?i)\b(mit|bsd|apache|mpl)\b'
      # Vendor terms-of-service / developer-agreement strings (not campaign watermarks).
      - type: value
        path: license
        regex: '(?i)\b(terms|agreement)\b'
  - id: npm-license-key-case-variant
    desc: npm manifest uses capitalized License key
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: License
      exists: true
  - id: cargo-freeform-license
    desc: Cargo license is a non-SPDX freeform string
    for: [cargo.toml]
    if:
      type: value
      path: package.license
      regex: '^[A-Za-z]+ [A-Za-z]+( [A-Za-z]+)*$'
    unless:
      - type: value
        path: package.license
        regex: '(?i)licen[sc]e'
      - type: value
        path: package.license
        regex: '(?i)(public domain|creative commons|all rights reserved)'
      - type: value
        path: package.license
        regex: '(?i)\b(gnu|gpl|lgpl|agpl)\b'
      - type: value
        path: package.license
        regex: '(?i)\b(mit|bsd|apache|mpl)\b'
  - id: pyproject-freeform-license
    desc: "pyproject license is a non-SPDX freeform"
    for: [pyproject.toml]
    if:
      type: value
      path: project.license
      regex: '^[A-Za-z]+ [A-Za-z]+( [A-Za-z]+)*$'
    unless:
      - type: value
        path: project.license
        regex: '(?i)licen[sc]e'
      - type: value
        path: project.license
        regex: '(?i)(public domain|creative commons|all rights reserved)'
      - type: value
        path: project.license
        regex: '(?i)\b(gnu|gpl|lgpl|agpl)\b'
      - type: value
        path: project.license
        regex: '(?i)\b(mit|bsd|apache|mpl)\b'
