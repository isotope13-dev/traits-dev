defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: baseline

traits:
  - id: summary-claims-wrapper
    desc: Package summary describes a wrapper
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bsummary\b[^\n]{0,100}\bwrapper\b'

  - id: summary-claims-push-notifications
    desc: Package summary describes push notifications
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bsummary\b[^\n]{0,100}\bpush\s+notification(s)?\b'
