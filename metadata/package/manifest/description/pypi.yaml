defaults:
  platforms:
    - unix
    - windows
  crit: notable
  attack: T1036.005
  mbc: F0004
  for:
    - pkginfo
    - pyproject.toml
traits:
  - id: pkginfo-security-research-claim
    desc: Package summary claims security-research purpose
    crit: component
    conf: 0.85
    for: [pkginfo]
    if:
      type: value
      path: summary
      regex: '(?i)\b(white\s*hat|security\s+research|bug\s*bounty|pentest)\b'
  - id: pypi-educational-malicious-package-disclosure
    desc: Educational malicious-package summary
    crit: notable
    conf: 0.92
    if:
      type: value
      path: summary
      regex: '(?i)\b(test|demo|demonstrat|educational)\b.{0,50}\bmalicious\s+(pip\s+)?packages?\b'
  - id: terminal-ui-description
    desc: Package description claims a terminal UI library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: A library for creating a terminal user interface
  - id: minimal-description-1
    desc: Minimal package description (Yes/No/Ok/Test)
    if:
      type: text
      regex: description.{0,50}=.{0,50}['"](Yes|No|Ok|Test)['"]
  - id: minimal-description-2
    desc: Minimal package description (Demo/Sample/.)
    if:
      type: text
      regex: \bdescription\s*=\s*['"](Demo|Sample|\.)['"]
  - id: single-word-description
    desc: Single word description
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?m)^\s*description\s*=\s*['"][a-zA-Z]{1,30}['"]
  - id: unknown-description
    desc: PKG-INFO has UNKNOWN description
    crit: notable
    conf: 0.75
    if:
      type: value
      path: description
      exact: UNKNOWN
  - id: pkginfo-no-description-body
    desc: PKG-INFO with no description body
    crit: notable
    conf: 0.75
    if:
      type: value
      path: description
      regex: ^\s*$
  - id: pkginfo-missing-description
    desc: PKG-INFO with no description body at all
    crit: notable
    conf: 0.7
    if:
      type: value
      path: metadata-version
    unless:
      - type: value
        path: description
      - type: value
        path: description-content-type
      - type: value
        path: summary
      - id: metadata/package/testing/presence/fixture/
  - id: desc-mentions-victim
    desc: "Package desc explicitly mentions victims"
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: value
      path: description
      regex: victim
      case_insensitive: true
  - id: desc-stealer-collect-send-server
    desc: Description sends collected data to a server
    crit: suspicious
    conf: 0.97
    attack: T1005
    mbc: B0010
    if:
      type: value
      path: description
      regex: (collect|harvest).{0,80}send.{0,40}server
      case_insensitive: true
  - id: desc-stealer-exfil-host
    desc: "desc describes exfiltration of host info"
    crit: suspicious
    conf: 0.95
    attack: T1005
    mbc: B0010
    if:
      type: value
      path: description
      regex: (send|exfil).{0,60}hostname
      case_insensitive: true
  - id: desc-stealer-exfil-secret
    desc: Description describes exfiltration of secrets
    crit: suspicious
    conf: 0.95
    attack: T1005
    mbc: B0010
    if:
      type: value
      path: description
      regex: (send|exfil).{0,60}(credential|password)
      case_insensitive: true
  - id: desc-poc-research-1
    desc: 'desc poc research 1'
    crit: component
    conf: 0.7
    unless:
      - type: text
        substr: windows.generated_def
      - type: text
        substr: windows.generated_def as gdef
    if:
      type: text
      regex: (proof.of.concept|\bpoc\b|security.research)
      case_insensitive: true
  - id: desc-poc-research-2
    desc: "Text references bug bounty/depconf"
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (bug.bounty|dependency.confusion)
      case_insensitive: true
  - id: desc-confirms-install
    desc: Description mentions confirming installation
    crit: suspicious
    conf: 0.9
    attack: T1195.002 - python
    if:
      type: text
      regex: \bdescription\s*=\s*['"][^'"]{0,120}confirm[^'"]{0,30}install
      case_insensitive: true
  - id: pyproject-placeholder-description-1
    desc: 'pyproject.toml placeholder'
    for: [pyproject.toml]
    if:
      type: text
      regex: description\s*=\s*["'].{0,30}\b(test|example|placeholder)\b
      case_insensitive: true
  - id: pyproject-placeholder-description-2
    desc: pyproject.toml placeholder (todo/fixme/dummy)
    for: [pyproject.toml]
    if:
      type: text
      regex: description\s*=\s*["'].{0,30}\b(todo|fixme|dummy)\b
      case_insensitive: true
  - id: pyproject-boilerplate-description-1
    desc: 'pyproject.toml boilerplate'
    if:
      type: value
      path: project.description
      regex: ^A (library|package|module) for
      case_insensitive: true
  - id: pyproject-boilerplate-description-2
    desc: 'pyproject.toml boilerplate'
    if:
      type: value
      path: project.description
      regex: (creating|building) (terminal|simple)
      case_insensitive: true
composite_rules:
  - id: minimal-description
    desc: Minimal package description
    crit: notable
    conf: 0.65
    any:
      - id: minimal-description-1
      - id: minimal-description-2
  - id: desc-poc-research
    desc: Description claims proof of concept or research
    crit: notable
    conf: 0.65
    attack: T1195.002
    any:
      - id: desc-poc-research-1
      - id: desc-poc-research-2
  - id: pyproject-placeholder-description
    desc: pyproject.toml description contains placeholder text
    crit: notable
    conf: 0.8
    for: [pyproject.toml]
    any:
      - id: pyproject-placeholder-description-1
      - id: pyproject-placeholder-description-2
  - id: pyproject-boilerplate-description
    desc: pyproject.toml with boilerplate library description
    crit: notable
    conf: 0.75
    all:
      - id: pyproject-boilerplate-description-1
      - id: pyproject-boilerplate-description-2
