---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-description
  desc: Package has meaningful description
  crit: baseline
  conf: 0.75
  if:
    type: value
    path: description
    regex: ".{20,}"
- id: npm-security-holder-description
  desc: npm security holder description
  crit: component
  conf: 0.99
  if:
    type: value
    path: description
    exact: security holding package
- id: metadata-description
  desc: description= metadata field
  crit: component
  conf: 0.5
  for: [pyproject.toml, pkginfo]
  size_max: 50000
  if:
    type: string_literal
    regex: description\s*=
