# Package descriptions that openly state the package installs or downloads a
# binary/executable. This is honest self-declaration metadata, not behavior:
# legitimate prebuilt-binary launchers (esbuild, swc, sharp, node-pre-gyp/
# prebuild wrappers) use identical wording, so on its own this wording is only
# a composite fragment (component). It becomes an "honest dropper" signal when a
# content-free skeleton package pairs the wording with an install hook while NOT
# using the standard platform optional-dependency mechanism — see
# npm-skeleton-honest-binary-dropper below.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
traits:
  - id: pkg-description-downloads-windows-binary
    desc: Description declares Windows binary download
    crit: component
    conf: 0.9
    if:
      type: value
      path: description
      regex: '(?i)\bdownloads?\b[^\n]{0,80}\.(exe|dll)\b'
  - id: pkg-description-downloads-unix-binary
    desc: Description declares Unix binary download
    crit: component
    conf: 0.9
    if:
      type: value
      path: description
      regex: '(?i)\bdownloads?\b[^\n]{0,80}\.(bin|so|dylib)\b'
  - id: pkg-description-installs-binary
    desc: Description declares binary install
    crit: component
    conf: 0.9
    if:
      type: value
      path: description
      regex: '(?i)\binstalls?\b[^\n]{0,80}\b(binary|executable)\b'
composite_rules:
  - id: pkg-description-declares-binary-install
    desc: Description declares binary install or download
    crit: component
    conf: 0.9
    any:
      - id: pkg-description-installs-binary
      - id: pkg-description-downloads-windows-binary
      - id: pkg-description-downloads-unix-binary
  # The genuine honest dropper: a tiny content-free package that openly says it
  # installs a binary, runs an install-time hook, and does NOT ship the binary
  # through the standard platform optional-dependency mechanism that legitimate
  # launchers (esbuild/swc/rig) use. The skeleton + hook gate keeps this off
  # real prebuilt-binary wrappers, which carry actual package content.
  - id: npm-skeleton-honest-binary-dropper
    desc: Skeleton package honestly drops a binary
    crit: suspicious
    conf: 0.9
    all:
      - id: pkg-description-declares-binary-install
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
    unless:
      - id: metadata/package/dependencies::platform-optional-native-wrapper
