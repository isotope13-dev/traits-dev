# Cargo crate description-field anomalies.
defaults:
  platforms:
  - unix
  - windows
  for:
  - cargo.toml
traits:
- id: cargo-description-dependency-confusion
  desc: "Cargo description mentions depconf"
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: package.description
    regex: dependency\s+confusion
    case_insensitive: true
- id: cargo-description-security-poc
  desc: Cargo description claims security PoC
  crit: notable
  conf: 0.88
  if:
    type: value
    path: package.description
    regex: (security\s+research|proof.of.concept|\bpoc\b)
    case_insensitive: true
- id: cargo-description-ownership-transfer
  desc: Cargo description offers ownership transfer
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: package.description
    regex: ownership\s+transfer
    case_insensitive: true
- id: cargo-description-malicious-purpose
  desc: Cargo description names malicious purpose
  crit: suspicious
  conf: 0.86
  if:
    type: value
    path: package.description
    regex: malicious\s+purpose
    case_insensitive: true
- id: cargo-description-lazy-importer
  desc: Cargo description references lazy importer
  crit: suspicious
  conf: 0.86
  if:
    type: value
    path: package.description
    regex: lazy_importer
    case_insensitive: true
