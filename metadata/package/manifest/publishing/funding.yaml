---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-funding
  desc: Package has funding information
  crit: notable
  conf: 0.85
  size_max: 50000
  if:
    type: value
    path: funding
    exists: true
  unless:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - type: value
    path: name
    regex: "^tabby($|-)"
  - type: value
    path: funding.url
    regex: "^https://github\\.com/sponsors/"
