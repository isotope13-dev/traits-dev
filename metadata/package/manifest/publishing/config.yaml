---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-public-publish-access
  desc: npm package is configured for public publishing
  crit: notable
  conf: 0.9
  if:
    type: value
    path: publishConfig.access
    exact: public
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: has-publish-config
  desc: npm manifest declares publishConfig
  crit: notable
  conf: 0.85
  unless:
  - type: value
    path: devDependencies
    exists: true
  - type: value
    path: repository.url
    regex: github\.com/
  if:
    type: value
    path: publishConfig
    exists: true
