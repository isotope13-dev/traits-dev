---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-public-publish-access
  desc: npm package allows public publishing
  crit: notable
  conf: 0.9
  if:
    type: value
    path: publishConfig.access
    exact: public
- id: has-publish-config
  desc: npm manifest declares publishConfig
  crit: notable
  conf: 0.85
  unless:
  - type: value
    path: devDependencies
    exists: true
  - type: value
    path: repository.url
    regex: github\.com/
  if:
    type: value
    path: publishConfig
    exists: true
