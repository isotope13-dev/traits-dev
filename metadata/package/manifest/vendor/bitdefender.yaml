defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: bitdefender-ecnet-telemetry
    desc: Bitdefender EcNet telemetry library
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: EcNet
      section: rdata

  - id: bitdefender-ctc-module
    desc: Bitdefender CTC event module
    crit: component
    conf: 1.0
    if:
      type: text
      substr: CTC::Alert::CTCAlert
      section: rdata
