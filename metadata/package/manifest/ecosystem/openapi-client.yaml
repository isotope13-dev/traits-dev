# Generated OpenAPI / UTDK provider clients version the npm package after the
# upstream API major (e.g. Salesforce REST 58.x), which is not version inflation.
defaults:
  platforms: [linux, macos, windows]
  for: [package.json]
  crit: notable

traits:
  - id: utdk-openapi-provider-metadata
    desc: UTDK OpenAPI provider client metadata
    conf: 0.95
    if:
      type: value
      path: utdk.openapi.version
      exists: true

  - id: openapi-generated-keyword
    desc: Package declares openapi generated keywords
    conf: 0.9
    if:
      type: value
      path: keywords
      exact: openapi

composite_rules:
  - id: openapi-api-versioned-client
    desc: OpenAPI-generated API-versioned package client
    conf: 0.94
    any:
      - id: utdk-openapi-provider-metadata
      - id: openapi-generated-keyword
