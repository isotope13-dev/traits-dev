defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: swift-package-description-import
    desc: Swift PackageDescription import
    crit: component
    conf: 0.9
    for: [swift]
    if:
      type: text
      substr: "import PackageDescription"

  - id: swift-executable-target
    desc: SwiftPM executable target
    crit: component
    conf: 0.88
    for: [swift]
    if:
      type: text
      substr: ".executableTarget("

  - id: metadata-packages
    desc: packages= metadata field
    crit: component
    conf: 0.5
    if:
      type: string_literal
      regex: packages\s*=
