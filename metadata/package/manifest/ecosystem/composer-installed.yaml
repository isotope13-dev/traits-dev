defaults:
  platforms: [unix, windows]
  for: [json]
  crit: baseline
  conf: 0.98

traits:
  - id: composer-installed-packages
    desc: Composer installed-package list
    if:
      type: value
      path: packages
      exists: true

  - id: composer-installed-dev-state
    desc: Composer installed manifest dev-state flag
    if:
      type: value
      path: dev
      exists: true

composite_rules:
  - id: composer-installed-manifest
    desc: Composer installed-package manifest
    crit: baseline
    conf: 0.99
    all:
      - id: composer-installed-packages
      - id: composer-installed-dev-state
