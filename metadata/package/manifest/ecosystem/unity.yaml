defaults:
  platforms: [unix, windows]
  for: [package.json, json]
  crit: baseline
  conf: 0.95
traits:
  - id: unity-package-manager-manifest
    desc: Unity Package Manager manifest
    for: [package.json]
    if:
      type: value
      path: unity
      exists: true
  - id: unity-reverse-domain-package-name
    desc: Unity reverse-domain package name
    for: [package.json]
    if:
      type: value
      path: name
      regex: "^com\\.unity\\.[a-z0-9-]+"
  - id: unity-webgl-build-manifest
    desc: Unity WebGL build manifest
    for: [json]
    conf: 0.96
    ref: sha256:ae2655e0b8fe54fe47cad7acf24bb405c441e8d0527575c4a3c36bf72cfc1f93
    if:
      type: value
      path: unityVersion
      regex: '^[0-9]+\.[0-9]+\.[0-9]+[a-z][0-9]+$'
  - id: unity-webgl-wasm-code-url
    desc: Unity WebGL WASM code URL
    for: [json]
    conf: 0.96
    ref: sha256:ae2655e0b8fe54fe47cad7acf24bb405c441e8d0527575c4a3c36bf72cfc1f93
    if:
      type: value
      path: wasmCodeUrl
      regex: '\.wasm\.code\.unityweb$'
composite_rules:
  - id: unity-webgl-wasm-build
    desc: Unity WebGL WASM build manifest
    crit: notable
    conf: 0.96
    ref: sha256:ae2655e0b8fe54fe47cad7acf24bb405c441e8d0527575c4a3c36bf72cfc1f93
    for: [json]
    all:
      - id: unity-webgl-build-manifest
      - id: unity-webgl-wasm-code-url
