defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: baseline
  conf: 0.95
traits:
  - id: unity-package-manager-manifest
    desc: Unity Package Manager manifest
    if:
      type: value
      path: unity
      exists: true
  - id: unity-reverse-domain-package-name
    desc: Unity reverse-domain package name
    if:
      type: value
      path: name
      regex: "^com\\.unity\\.[a-z0-9-]+"
