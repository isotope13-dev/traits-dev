defaults:
  platforms: [unix, windows]
  for: [npm, package.json, package-lock.json]
  crit: notable
  conf: 0.98

traits:
  - id: jsr-foraged-package
    desc: JSR package archive
    for: [npm]
    if:
      type: path
      substr: 'jsr.io/'

  - id: jsr-npm-compat-name
    desc: JSR npm compatibility package name
    for: [npm, package.json]
    if:
      type: value
      path: package.json::name
      regex: '^@jsr/[a-z0-9-]+__'

composite_rules:
  - id: jsr-package
    desc: JSR package
    crit: notable
    conf: 0.99
    any:
      - id: jsr-foraged-package
      - id: jsr-npm-compat-name
