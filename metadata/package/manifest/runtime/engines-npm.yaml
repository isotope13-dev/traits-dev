---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-engines
  desc: Package specifies Node.js engine version
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: engines.node
  unless:
  - id: metadata/package/manifest/freeform::official-react-native-package
