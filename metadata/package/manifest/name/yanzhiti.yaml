# Package identity atom used by the YanZhiTi supply-chain composites. A package
# name is neutral on its own; provenance and outbound behavior establish intent.
defaults:
  platforms: [unix, windows]
  for: [pkginfo]

traits:
  - id: pypi-package-name
    desc: PyPI package is named yanzhiti
    crit: component
    conf: 1.0
    if:
      type: value
      path: name
      exact: yanzhiti
