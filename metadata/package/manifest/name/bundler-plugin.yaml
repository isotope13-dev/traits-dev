# Neutral identity: the package name presents it as a bundler/build-tool plugin
# (rollup/vite/webpack/esbuild -plugin ...). On its own this is just an identity
# fact; objectives/ composites use it as the low-false-positive "cover" leg when a
# build plugin carries runtime dependencies it has no build-time reason to need.
defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  - id: bundler-plugin-name
    desc: Named as a bundler/build-tool plugin
    crit: notable
    conf: 0.9
    if:
      type: value
      path: name
      regex: '(?i)\b(rollup|vite|webpack|esbuild)-plugin'
