defaults:
  platforms: [windows, unix]
  for: [cargo.toml]
  crit: baseline
  conf: 0.85
traits:
  - id: cargo-package-name
    desc: Cargo package has name
    if:
      type: value
      path: package.name
      regex: ".+"

  - id: cargo-package-version
    desc: Cargo package has version
    if:
      type: value
      path: package.version
      regex: ".+"

  - id: cargo-conventional-version
    desc: Cargo package uses conventional version
    if:
      type: value
      path: package.version
      regex: '^[0-9]+(\.[0-9]+){1,3}([+-][A-Za-z0-9._-]+)?$'

  - id: cargo-meaningful-description
    desc: Cargo package has meaningful description
    crit: baseline
    conf: 0.78
    if:
      type: value
      path: package.description
      regex: ".{20,}"

  - id: cargo-license-field
    desc: Cargo package declares license
    if:
      type: value
      path: package.license
      regex: ".+"

  - id: cargo-readme-field
    desc: Cargo package declares readme
    if:
      type: value
      path: package.readme
      regex: ".+"

  - id: cargo-repository-field
    desc: Cargo package declares repository
    if:
      type: value
      path: package.repository
      regex: ".+"

  - id: cargo-repository-git-host
    desc: Cargo repository uses common git host
    if:
      type: value
      path: package.repository
      regex: "github\\.com|gitlab\\.com|bitbucket\\.org"

  # Neutral crate-type facts. These describe what the manifest declares, not an
  # anomaly: cdylib is the standard output for any PyO3/FFI/WASM library and
  # proc-macro for any derive-macro crate. They are building blocks for the
  # rootkit/loader composites in objectives/supply-chain/.../manifest/cargo,
  # which combine them with Windows service/winapi-loader/memory features.
  - id: cargo-lib-proc-macro
    desc: Cargo library is proc macro
    if:
      type: value
      path: lib.proc-macro
      exact: "true"

  - id: cargo-lib-cdylib
    desc: Cargo library builds cdylib
    if:
      type: value
      path: lib.crate-type[0]
      exact: cdylib

composite_rules:
  - id: cargo-package-quality-metadata
    desc: Cargo manifest includes core project metadata
    crit: baseline
    conf: 0.88
    all:
      - id: cargo-package-name
      - id: cargo-package-version
    any:
      - id: cargo-meaningful-description
      - id: cargo-license-field
      - id: cargo-readme-field
      - id: cargo-repository-field
