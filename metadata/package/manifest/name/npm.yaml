---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-client-suffix
  desc: npm package name ends with -client
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: name
    regex: '-client$'
- id: npm-api-suffix
  desc: npm package name ends with -api
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: name
    regex: '-api$'
- id: npm-no-name-field
  desc: package.json omits name field
  crit: notable
  conf: 0.9
  if:
    type: value
    path: name
    exists: false
  unless:
  - type: text
    substr: '"private": true'
  - type: metrics
    field: parse.error_count
    min: 1
- id: pm2-package-name
  desc: PM2 package name
  crit: component
  conf: 1.0
  if:
    type: value
    path: name
    exact: pm2
- id: ts-node-package-name
  desc: Official ts-node package name
  crit: baseline
  conf: 1.0
  if:
    type: value
    path: name
    exact: ts-node
- id: official-react-native-scope
  desc: Package uses official React Native scope
  crit: component
  conf: 1.0
  if:
    type: value
    path: name
    regex: "^(@react-native/|react-native$)"
- id: scoped-package-name
  desc: Package uses npm scope name
  crit: component
  conf: 0.84
  if:
    type: value
    path: name
    regex: "^@[a-z0-9][a-z0-9._-]{1,80}/[a-z0-9][a-z0-9._-]{0,80}$"
- id: mui-package-name
  desc: MUI package name
  crit: notable
  conf: 1.0
  if:
    type: value
    path: name
    regex: "^@mui/"
- id: scoped-known-org-1
  desc: 'Package from known org scope'
  if:
    type: value
    path: name
    regex: "^@(types|babel|rollup|webpack)/"
- id: scoped-known-org-2
  desc: "Package from org scope (eslint/angular/vue)"
  if:
    type: value
    path: name
    regex: "^@(eslint|angular|vue)/"
- id: npm-hyphenated-multiword-name
  desc: npm hyphenated multiword name
  crit: baseline
  conf: 0.7
  if:
    type: value
    path: name
    regex: "^[a-z][a-z0-9]{0,60}(-[a-z][a-z0-9]{0,60}){1,8}$"
composite_rules:
- id: official-pm2-package
  desc: Official PM2 package context
  crit: component
  conf: 1.0
  all:
  - id: metadata/package/manifest/name::pm2-package-name
  - id: metadata/package/manifest/repository::pm2-repository-url
- id: scoped-known-org
  desc: Package from known organization scope
  crit: notable
  conf: 0.85
  any:
  - id: metadata/package/manifest/name::scoped-known-org-1
  - id: metadata/package/manifest/name::scoped-known-org-2
