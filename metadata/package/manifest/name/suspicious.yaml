# Package Naming - Suspicious Patterns
# Detects suspicious, test, or malicious package name patterns
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.75
  attack: "T1195.002"
traits:
  # === npm package.json ===

  # Test/temporary package names
  - id: npm-name-test
    desc: npm package name contains 'test'
    crit: notable
    conf: 0.65
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|[-_/])test($|[-_/])"
      case_insensitive: true
    not:
      # Legitimate test frameworks
      - regex: "^(@types/|@jest/|jest-|mocha-|chai-|tape-|ava-)"
      - exact: "test"
      - exact: "@types/test"
    unless:
      # Private manifest = bundled test/fixture app, not a published-package anomaly.
      - type: value
        path: private
        exact: 'true'
  - id: npm-name-temp
    desc: npm package name contains 'temp' or 'tmp'
    crit: suspicious
    conf: 0.80
    for: [package.json]
    unless:
      - type: text
        substr: "github.com/raszi/node-tmp"
      - type: text
        substr: "github.com/benjamingr/tmp-promise"
      # Established temp-file utility, not a throwaway package name.
      - type: text
        substr: "develar/temp-file"
      # The established `temp` and `tmp` utilities are ordinary dependencies;
      # the name alone is not evidence of a supply-chain anomaly.
      - type: value
        path: "name"
        exact: "temp"
      - type: value
        path: "name"
        exact: "tmp"
      - type: value
        path: "name"
        exact: "tmp-promise"
      - type: value
        path: "name"
        exact: "@types/tmp"
    if:
      type: value
      path: "name"
      regex: "(^|.{0,50}[-_/])(temp|tmp)($|[-_/].{0,50})"
      case_insensitive: true
    not:
      # Legitimate temp utilities
      - regex: "^(tmp|temp|tmp-promise|@types/tmp)$"
    downgrade:
      any:
        - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: npm-name-demo
    desc: npm package name contains 'demo'
    crit: notable
    conf: 0.70
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|.{0,50}[-_/])demo($|[-_/].{0,50})"
      case_insensitive: true
    unless:
      # Private manifest = bundled demo app, not a published-package anomaly.
      - type: value
        path: private
        exact: 'true'
  - id: npm-name-example
    desc: npm package name contains 'example'
    crit: notable
    conf: 0.70
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|.{0,50}[-_./])example($|[-_./].{0,50})"
      case_insensitive: true
    unless:
      # A private manifest is never published (npm blocks it), so a placeholder
      # name is a bundled demo/example app convention (example/, demo/), not a
      # published-package supply-chain anomaly.
      - type: value
        path: private
        exact: 'true'
  - id: npm-name-poc
    desc: npm package name contains 'poc'
    crit: suspicious
    conf: 0.75
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|.{0,50}[-_/])poc($|[-_/].{0,50})"
      case_insensitive: true
  - id: npm-name-proof-of-concept
    desc: npm package name contains 'proof-of-concept'
    crit: suspicious
    conf: 0.75
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "proof[-_]?of[-_]?concept"
      case_insensitive: true
  # Malicious intent indicators
  - id: npm-name-hack
    desc: npm package name contains 'hack'
    crit: suspicious
    conf: 0.80
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|.{0,50}[-_/])hack(er|ing)?($|[-_/].{0,50})"
      case_insensitive: true
    not:
      # Legitimate hackathon/hack day tools
      - regex: "(hackathon|growth-?hack|life-?hack)"
    unless:
      - id: metadata/package/manifest/publishing::is-private
  - id: npm-name-exploit
    desc: npm package name contains 'exploit'
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|.{0,50}[-_/])exploit.{0,50}$"
      case_insensitive: true
  - id: npm-name-backdoor
    desc: npm package name contains 'backdoor'
    crit: suspicious
    conf: 0.90
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|.{0,50}[-_/])backdoor.{0,50}$"
      case_insensitive: true
  - id: npm-name-malware
    desc: npm package name contains 'malware'
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|[-_/])malware($|[-_/])"
      case_insensitive: true
  - id: npm-name-virus
    desc: npm package name contains 'virus'
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|[-_/])virus($|[-_/])"
      case_insensitive: true
    unless:
      - id: metadata/package/manifest/publishing::is-private
  - id: npm-name-trojan
    desc: npm package name contains 'trojan'
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|[-_/])trojan($|[-_/])"
      case_insensitive: true
  - id: npm-name-rat
    desc: npm package name contains 'rat'
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "(^|[-_/])rat($|[-_/])"
      case_insensitive: true
  # Suspicious patterns
  - id: npm-name-all-numbers
    desc: npm package name is only numbers
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "^[0-9]+$"
  - id: npm-name-single-char
    desc: npm package name is single character
    crit: notable
    conf: 0.90
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "^.$"
    not:
      # Some legitimate single-char packages exist
      - exact: "q"
      - exact: "y"
      - exact: "b"
      - exact: "n"
  - id: npm-name-random-chars
    desc: 'npm package name appears random'
    crit: suspicious
    conf: 0.80
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "^[a-z]{1,3}[0-9]{3,}[a-z]{1,3}$"
  - id: npm-name-sfdc-prefix
    desc: npm package uses internal sfdc prefix
    crit: suspicious
    conf: 0.92
    for: [package.json, pkginfo]
    if:
      type: value
      path: "name"
      regex: "^sfdc-[a-z0-9][a-z0-9-]{2,60}$"
  - id: npm-name-excessive-hyphens
    desc: npm package name has excessive hyphens
    crit: notable
    conf: 0.70
    for: [package.json]
    if:
      type: value
      path: "name"
      regex: "^.{0,50}(-.{0,50}){5,}$"

  # === PyPI naming patterns ===
  - id: pypi-name-test-assignment
    desc: PyPI package name contains 'test'
    crit: component
    conf: 0.65
    for: [python]
    if:
      type: text
      regex: "name\\s*=\\s*['\"][^'\"]{0,100}\\btest\\b[^'\"]{0,100}['\"]"
      case_insensitive: true
    not:
      - regex: "name\\s*=\\s*['\"][^'\"]{0,100}(pytest|unittest|testtools)[^'\"]{0,100}['\"]"
  - id: pypi-name-temp
    desc: PyPI package name contains 'temp' or 'tmp'
    crit: suspicious
    conf: 0.80
    for: [python]
    if:
      type: text
      regex: "setup\\s*\\([\\s\\S]{0,500}\\bname\\s*=\\s*['\"][^'\"]{0,100}\\b(temp|tmp)\\b[^'\"]{0,100}['\"]"
      case_insensitive: true
    not:
      - substr: /tmp/
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
  - id: pypi-name-example
    desc: PyPI package name contains 'example'
    crit: notable
    conf: 0.70
    for: [python]
    if:
      type: text
      regex: "\\bsetup\\s*\\([\\s\\S]{0,500}\\bname\\s*=\\s*['\"][^'\"]{0,50}\\bexample\\b"
      case_insensitive: true
  - id: pypi-name-poc
    desc: PyPI package name contains 'poc'
    crit: suspicious
    conf: 0.75
    for: [python]
    if:
      type: text
      regex: "setup\\s*\\([\\s\\S]{0,500}\\bname\\s*=\\s*['\"][^'\"]{0,100}\\bpoc\\b[^'\"]{0,100}['\"]"
      case_insensitive: true
  - id: pypi-name-all-numbers
    desc: PyPI package name is only numbers
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'setup\s*\([\s\S]{0,500}\bname\s*=\s*[''"][0-9]+[''"]'
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
  - id: pypi-pkginfo-name-exploit
    desc: PyPI metadata name contains exploit
    crit: suspicious
    conf: 0.9
    for: [pkginfo]
    if:
      type: value
      path: name
      regex: '(^|[-_])exploit($|[-_])'
      case_insensitive: true
  - id: pypi-pkginfo-name-do-not-install
    desc: PyPI metadata warns not install
    crit: suspicious
    conf: 0.9
    for: [pkginfo]
    if:
      type: value
      path: name
      regex: '(^|[-_])do[-_]?not[-_]?install($|[-_])'
      case_insensitive: true
  - id: pypi-pkginfo-name-test
    desc: PyPI metadata name contains test
    crit: notable
    conf: 0.65
    for: [pkginfo]
    unless:
      - id: metadata/package/files/name::rubygem-archive
      # A RubyGem's gem.name is not PyPI pkginfo metadata. The package
      # engine can expose both views for an archive, so keep this PyPI-only
      # heuristic from firing on legitimate gem names.
      - type: value
        path: gem.name
        exists: true
      # RubyGems store the name in metadata/data members rather than a PyPI
      # pkginfo manifest; those members can still be classified as pkginfo.
      - type: basename
        regex: '\\.gem$|(^|[\\/])(metadata|data\\.tar)(\\.|$)'
    if:
      type: value
      path: name
      regex: '(^|[-_.])test($|[-_.])'
      case_insensitive: true
  - id: pypi-pkginfo-summary-typosquat
    desc: PyPI summary self-identifies typosquat
    crit: suspicious
    conf: 0.95
    for: [pkginfo]
    unless:
      - id: metadata/package/quality/recognized-contexts::depmirage-defensive-scanner-context
    if:
      type: value
      path: summary
      regex: 'typo[- ]?squatt?ing|typosquat'
      case_insensitive: true
  # === RubyGems naming patterns ===
  - id: gem-name-test
    desc: RubyGem name contains 'test'
    crit: notable
    conf: 0.65
    for: [ruby]
    if:
      type: text
      regex: "\\.name\\s*=\\s*['\"][^'\"]{0,100}\\btest\\b[^'\"]{0,100}['\"]"
      case_insensitive: true
  - id: gem-name-temp
    desc: RubyGem name contains 'temp' or 'tmp'
    crit: suspicious
    conf: 0.80
    for: [ruby]
    if:
      type: text
      regex: "\\.name\\s*=\\s*['\"][^'\"]{0,100}\\b(temp|tmp)\\b[^'\"]{0,100}['\"]"
      case_insensitive: true
  - id: gem-name-example
    desc: RubyGem name contains 'example'
    crit: notable
    conf: 0.70
    for: [ruby]
    if:
      type: text
      regex: "\\.name\\s*=\\s*['\"][^'\"]{0,100}\\bexample\\b[^'\"]{0,100}['\"]"
      case_insensitive: true
composite_rules:
  # === npm Suspicious Names ===
  - id: npm-test-or-temp-name
    desc: npm package has test or temporary name
    crit: suspicious
    conf: 0.80
    for: [package.json]
    any:
      - id: npm-name-test
      - id: npm-name-temp
      - id: npm-name-demo
      - id: npm-name-example
      - id: npm-name-poc
      - id: npm-name-proof-of-concept
  - id: npm-malicious-name-indicators
    desc: npm package name suggests malicious intent
    crit: suspicious
    conf: 0.85
    for: [package.json]
    any:
      - id: npm-name-hack
      - id: npm-name-exploit
      - id: npm-name-backdoor
      - id: npm-name-malware
      - id: npm-name-virus
      - id: npm-name-trojan
      - id: npm-name-rat
    unless:
      - id: metadata/package/manifest/publishing::is-private
  - id: npm-random-or-generated-name
    desc: npm package name appears random or generated
    crit: suspicious
    conf: 0.85
    for: [package.json]
    any:
      - id: npm-name-all-numbers
      - id: npm-name-single-char
      - id: npm-name-random-chars
  # === PyPI Composites ===
  - id: pypi-name-test
    desc: PyPI setup name contains test
    crit: notable
    conf: 0.7
    for: [python]
    all:
      - id: pypi-name-test-assignment
      - id: metadata/build/pip::setup-py
  - id: pypi-suspicious-name
    # Hostile composites moved to:
    # objectives/supply-chain/npm/malicious-patterns/low-quality-indicators.yaml

    desc: PyPI package has suspicious name
    crit: suspicious
    conf: 0.80
    for: [python, pkginfo]
    any:
      - id: pypi-name-test
      - id: pypi-name-temp
      - id: pypi-name-example
      - id: pypi-name-poc
      - id: pypi-name-all-numbers
      - id: pypi-pkginfo-name-exploit
      - id: pypi-pkginfo-name-do-not-install
      - id: pypi-pkginfo-summary-typosquat
  - id: pypi-exploit-name-lowest-version
    desc: PyPI exploit-named package at lowest version
    crit: suspicious
    conf: 0.95
    for: [pkginfo]
    all:
      - id: pypi-pkginfo-name-exploit
      - id: metadata/package/versioning::pkginfo-lowest-version
  - id: pypi-typosquat-ipv4-version
    desc: PyPI typosquat package with IPv4-like version
    crit: suspicious
    conf: 0.93
    for: [pkginfo]
    all:
      - id: pypi-pkginfo-summary-typosquat
      - id: metadata/package/versioning::pkginfo-version-ipv4-shape

  # === RubyGems Composites ===
  - id: gem-suspicious-name
    desc: RubyGem has suspicious name
    crit: suspicious
    conf: 0.80
    for: [ruby]
    any:
      - id: gem-name-test
      - id: gem-name-temp
      - id: gem-name-example
