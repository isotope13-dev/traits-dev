defaults:
  platforms: [unix, windows]
  for: [pkginfo]

traits:
  - id: pypi-private-variant-name
    desc: PyPI name has private-distribution suffix
    crit: notable
    conf: 0.88
    if:
      type: value
      path: name
      # A bare name such as "internal" is a valid package identity, not a
      # private variant. Require a package stem and a separating delimiter.
      regex: '(?i)^[a-z0-9][a-z0-9._-]{2,}[-_.](private|internal|inhouse)$'
