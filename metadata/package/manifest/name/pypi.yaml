defaults:
  platforms: [unix, windows]
  for: [pkginfo]

traits:
  - id: pypi-private-variant-name
    desc: PyPI name has private-distribution suffix
    crit: notable
    conf: 0.88
    if:
      type: value
      path: name
      # A bare name such as "internal" is a valid package identity, not a
      # private variant. Require a package stem and a separating delimiter.
      regex: '(?i)^[a-z0-9][a-z0-9._-]{2,}[-_.](private|internal|inhouse)$'
  - id: pypi-development-package-name
    desc: PyPI name uses development suffix
    crit: notable
    conf: 0.82
    if:
      type: value
      path: name
      # Keep this neutral: many legitimate projects publish -dev helpers.
      # Supply-chain intent comes from pairing it with skeleton and sentinel
      # version evidence in an objective composite.
      regex: '[-_]dev$'
      case_insensitive: true
