defaults:
  platforms: [unix, windows]
  for: [cargo.toml]
  crit: component
  conf: 0.98
traits:
  - id: workspace-hack-name
    desc: Cargo workspace-hack package name
    if:
      type: value
      path: package.name
      regex: '(^|-)workspace-hack$'
  - id: generated-comment
    desc: Cargo Hakari generated comment
    if:
      type: text
      substr: 'generated by `cargo hakari`'
composite_rules:
  - id: workspace-hack
    desc: Cargo Hakari workspace-hack manifest
    all:
      - id: workspace-hack-name
      - id: generated-comment
