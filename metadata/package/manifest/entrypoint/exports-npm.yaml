defaults:
  platforms: [windows, unix]
  for:
    - package.json
    - javascript
    - typescript
traits:
  # CommonJS default export. Ubiquitous in any CommonJS module; not notable
  # on its own. Kept as baseline so it still feeds composites/ML without
  # surfacing in terminal output as a finding of interest.
  - id: module-exports-object
    desc: "CommonJS default export"
    crit: baseline
    conf: 0.6
    unless:
      - id: metadata/package/documentation/
      - type: text
        substr: "0 && (module.exports = {"
    if:
      type: text
      regex: (^|[^\w$.])module\.exports = \{
  # `main` / `module` / `exports` are standard npm manifest fields;
  # presence alone is not program-purpose-defining. Baseline so they
  # still feed composites/ML but don't clutter terminal output.
  - id: has-module-entry
    desc: Package has ESM module entry
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: '"module":\s*"'
  - id: pkg-module-field
    desc: '"module": field in package.json'
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: '"module":'
  - id: module-dist-entrypoint
    desc: Package module targets dist output
    crit: baseline
    conf: 0.8
    for: [package.json]
    if:
      type: value
      path: module
      substr: dist/
  - id: pkg-exports-field-entry
    desc: package.json declares an exports entry
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: '"exports":'
  - id: has-exports-field
    desc: Package has modern exports field
    crit: baseline
    conf: 0.85
    if:
      type: value
      path: exports
  - id: pkg-exports-dist-entrypoint
    desc: Package exports dist entrypoint
    crit: baseline
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: exports.*.*
      regex: '^\./dist/'
  - id: pkg-exports-dist-direct
    desc: Package direct exports dist files
    crit: baseline
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: exports.*
      regex: '^\./dist/'
  - id: cjs-exports-pattern
    desc: Defines CommonJS named exports
    crit: notable
    conf: 0.6
    count_min: 2
    not:
      - substr: exports.mode =
      - substr: exports.getWorkingDirectoryFrom =
      - substr: exports.getWorkingDirectoryFrom
      - substr: exports.get = function
      - substr: exports.matchScript =
      - substr: exports.WindowsPtyAgent =
      - substr: exports.spawn =
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,220}\.(js|ts)$
      - type: text
        substr: 'Object.defineProperty(exports, "__esModule"'
      - id: metadata/package/documentation/
    if:
      type: text
      regex: (^|[^\w$.])exports\.[a-zA-Z]+ =
composite_rules:
  - id: has-esm-export
    desc: Code exports functionality via ES
    crit: notable
    conf: 0.85
    any:
      - id: metadata/lang/javascript-features::export-default-const-func-class
      - id: metadata/lang/javascript-features::export-async-let-var-brace
  - id: esm-export-pattern
    desc: Contains an ES module export
    crit: notable
    conf: 0.6
    any:
      - id: metadata/lang/javascript-features::export-const-func-class
      - id: metadata/lang/javascript-features::export-let-var-async
  - id: has-multiple-exports
    desc: Code has multiple named exports
    crit: notable
    conf: 0.85
    any:
      - id: esm-export-pattern
      - id: cjs-exports-pattern
      - id: module-exports-object
