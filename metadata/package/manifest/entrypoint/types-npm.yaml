---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: pkg-types-field
  desc: Package declares TypeScript types entry
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - type: value
    path: name
    regex: "^tabby($|-)"
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  if:
    type: value
    path: types
    exists: true
- id: types-dist-entrypoint
  desc: Package types targets dist output
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: types
    substr: dist/
