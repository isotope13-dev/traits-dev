---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: pkg-types-field
  desc: Package declares TypeScript types entry
  crit: notable
  conf: 0.9
  unless:
  - type: value
    path: name
    regex: "^tabby($|-)"
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  if:
    type: value
    path: types
    exists: true
- id: types-dist-entrypoint
  desc: Package types targets dist output
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: types
    substr: dist/
