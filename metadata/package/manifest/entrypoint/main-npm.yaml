---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-index-entry
  desc: Package has standard index entry
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: main
    regex: "^(index\\.js|dist/|lib/|src/)"
  unless:
  - id: metadata/package/manifest/freeform::official-react-native-package
- id: pkg-main-field
  desc: '"main": field in package.json'
  crit: notable
  conf: 0.6
  unless:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - type: value
    path: devDependencies
    exists: true
  - id: well-known/app/tabby::tabby-basename
  - type: value
    path: name
    regex: "^tabby-"
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - type: text
    substr: inflight.js
  - type: value
    path: repository.url
    regex: github\.com/
  if:
    type: value
    path: main
    exists: true
- id: pkg-main-native-node
  desc: Package main is native Node addon
  crit: notable
  conf: 0.85
  if:
    type: value
    path: main
    regex: "\\.node$"
- id: main-js-file-entry
  desc: Package main points to JavaScript
  crit: baseline
  conf: 0.82
  if:
    type: value
    path: main
    regex: ^[^"\n]{1,120}\.js$
  unless:
  - id: metadata/package/manifest/entrypoint::has-index-entry
  - id: metadata/package/manifest/freeform::official-react-native-package
- id: main-dist-entrypoint
  desc: Package main targets dist output
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: main
    substr: dist/
- id: pkg-main-is-dts
  # A `main` that points at a .d.ts declaration file means the package ships no
  # runtime entry point — it is a pure type-definitions package. Neutral fact on
  # its own (normal for @types-style packages); becomes an anomaly only when
  # combined with an install/lifecycle script, since a types-only package has no
  # code that legitimately runs on install.
  desc: Package main points to a type declaration
  crit: notable
  conf: 0.9
  if:
    type: value
    path: main
    regex: '\.d\.ts$'
