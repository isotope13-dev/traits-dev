# Homepage/URL Field Patterns
# Suspicious or missing homepage/URL fields in PyPI packages
defaults:
  platforms: [unix, windows]
  crit: notable
  for: [pkginfo, pyproject.toml]
traits:
  - id: unknown-homepage
    desc: PKG-INFO has UNKNOWN home page
    crit: baseline
    conf: 0.75
    if:
      type: value
      path: home-page
      exact: "UNKNOWN"
  - id: pkginfo-free-hosting-homepage-1
    desc: PKG-INFO homepage (yolasite/weebly/wixsite)
    if:
      type: value
      path: home-page
      regex: "(yolasite|weebly|wixsite)\\.com"
  - id: pkginfo-free-hosting-homepage-2
    desc: PKG-INFO homepage (000webhostapp/blogspot)
    if:
      type: value
      path: home-page
      regex: "(000webhostapp|blogspot)\\.com"
  - id: pkginfo-source-repo-root-github
    desc: PKG-INFO source repo is bare GitHub
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "(?m)^Project-URL:\\s*Source Repository,\\s*https://github\\.com\\s*$"
  - id: pkginfo-sampleproject-homepage
    desc: PKG-INFO uses sampleproject homepage
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: home-page
      exact: https://github.com/pypa/sampleproject
  - id: pkginfo-doi-homepage
    desc: PKG-INFO homepage is DOI URL
    crit: component
    conf: 0.82
    if:
      type: value
      path: home-page
      regex: '^https?://(dx\.)?doi\.org/10\.'
composite_rules:
  - id: pkginfo-free-hosting-homepage
    desc: PKG-INFO homepage on free hosting service
    crit: notable
    conf: 0.70
    any:
      - id: pkginfo-free-hosting-homepage-1
      - id: pkginfo-free-hosting-homepage-2
