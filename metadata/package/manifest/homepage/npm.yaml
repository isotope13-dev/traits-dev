---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-homepage-field
  desc: Package has homepage URL
  crit: baseline
  conf: 0.8
  if:
    type: value
    path: homepage
    regex: "^https?://"
# Neutral completeness facts: a PyPI/PKG-INFO manifest or pyproject.toml that
# omits its homepage / project URLs. Extremely common in legitimate packages, so
# these are neutral file properties. Supply-chain composites reference them.
- id: pkginfo-no-homepage
  desc: PKG-INFO missing Home-page field
  crit: component
  conf: 0.70
  for: [pkginfo, pyproject.toml]
  if:
    type: value
    path: metadata-version
  unless:
    - type: value
      path: home-page
    - type: text
      substr: "Project-URL:"
- id: pyproject-no-urls
  desc: pyproject.toml with no project URLs
  crit: component
  conf: 0.65
  for: [pyproject.toml]
  if:
    id: metadata/build/pip::pyproject-is-pyproject
  unless:
    - type: text
      substr: "[project.urls]"
# Neutral completeness fact: a PyPI metadata manifest that omits the home-page
# field. Common in legitimate packages that publish project-url instead, so this
# is a neutral file property. Supply-chain composites reference it cross-directory.
- id: pypi-no-homepage
  desc: PyPI metadata omits homepage
  crit: baseline
  conf: 0.7
  for: [pkginfo]
  if:
    type: value
    path: home-page
    exists: false
  unless:
  - type: value
    path: project-url
    exists: true
  - type: value
    path: "resources.homepage"
    exists: true
  - type: text
    substr: '"releases_url"'
  - type: basename
    exact: metadata.json
  - id: metadata/package/manifest/homepage/
  - type: text
    substr: "--- !ruby/object:Gem::Specification"
  - type: text
    regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:"
- id: pypi-no-homepage-unless-cond-4--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Repository-Browse:'
  count_max: 1022215
- id: pypi-no-homepage-unless-cond-4--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Project-URL:'
  count_max: 1022216
- id: pypi-no-homepage-unless-cond-4--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Home-page:'
  count_max: 1022217
- id: pypi-no-homepage-unless-cond-4--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    regex: "https?://(github|gitlab)\\.com/"
  count_max: 1022218
- id: pypi-no-homepage-unless-cond-4--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    regex: "https?://codeberg\\.org/"
  count_max: 1022219
composite_rules:
- id: pypi-no-homepage-unless-cond-4--rx-helper-6
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [pkginfo]
  any:
  - id: pypi-no-homepage-unless-cond-4--rx-1
  - id: pypi-no-homepage-unless-cond-4--rx-2
  - id: pypi-no-homepage-unless-cond-4--rx-3
  - id: pypi-no-homepage-unless-cond-4--rx-4
  - id: pypi-no-homepage-unless-cond-4--rx-5
