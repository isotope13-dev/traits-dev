# The repository URL is an identity claim, not proof of impersonation by itself.
# The objective layer pairs it with package identity and replaced infrastructure.
defaults:
  platforms: [unix, windows]
  for: [pkginfo]

traits:
  - id: claimed-agentscope-repository
    desc: Claims AgentScope YanZhiTi repository
    crit: component
    conf: 1.0
    if:
      type: text
      substr: github.com/agentscope-ai/YanZhiTi
