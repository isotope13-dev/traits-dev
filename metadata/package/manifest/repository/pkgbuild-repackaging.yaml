# Benign packaging context for PKGBUILDs that republish pinned binary release
# artifacts. These are metadata facts; the foreign-owner anomaly remains
# active unless all three facts establish this constrained repackaging shape.
defaults:
  platforms: [linux]
  for: [shell]

traits:
  - id: pkgbuild-binary-package-name
    desc: PKGBUILD names a binary package
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pkg.pkgname
      regex: '-bin$'

  - id: pkgbuild-sha256-source-pins
    desc: PKGBUILD pins SHA-256 source checksums
    crit: notable
    conf: 0.95
    if:
      type: value
      path: pkg.sha256sums
      regex: '^[0-9a-fA-F]{64}$'

composite_rules:
  - id: pkgbuild-pinned-binary-release-repackager
    desc: PKGBUILD repackages pinned binary releases
    crit: exception
    conf: 0.95
    all:
      - id: pkgbuild-binary-package-name
      - id: pkgbuild-sha256-source-pins
      - id: micro-behaviors/communications/url/external/github::github-release-download
