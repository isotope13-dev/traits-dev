# PKGBUILD source-URL provenance anomalies (T1195.002) — the Arch/AUR analog of
# the npm repository-suspicious-urls atoms in this directory. A legitimate AUR
# package fetches from the upstream project's release page or a VCS forge; it
# never sources from a raw IP, an ephemeral file host, or a URL shortener.
# Those hosts point at attacker-controlled, mutable, or destination-hiding
# content and are high-signal that the source is not the genuine upstream.
defaults:
  platforms: [linux]
  for: [shell]
  attack: T1195.002

traits:
  # MangoWM moved from the DreamMaoMao/mangowc repository to the
  # mangowm/mango repository. Keep the migration context explicit so the
  # generic foreign-owner detector does not label the official recipe.
  - id: pkgbuild-mangowm-package-name
    desc: MangoWM package name marker
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pkg.pkgname
      exact: mangowm

  - id: pkgbuild-mangowm-source-owner
    desc: MangoWM source repository owner
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pkg.source_github_owners
      exact: mangowm
      match: any

  - id: pkgbuild-mangowc-legacy-url
    desc: Legacy MangoWC repository URL
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pkg.url
      exact: https://github.com/DreamMaoMao/mangowc

  # GitHub treats account names case-insensitively, and MX Linux's repository
  # is published under the hyphenated `MX-Linux` owner while older package
  # metadata uses the equivalent `mxlinux` owner in `url`. Keep this explicit
  # alias context so the owner-mismatch detector remains useful for unrelated
  # fork impersonation without flagging the official MX Cleanup recipe.
  - id: pkgbuild-mx-cleanup-package-name
    desc: MX Cleanup package name
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pkg.pkgname
      exact: mx-cleanup

  - id: pkgbuild-mxlinux-url-owner
    desc: MX Cleanup package URL owner
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pkg.url_github_owner
      exact: mxlinux

  - id: pkgbuild-mx-linux-source-owner
    desc: MX Cleanup source repository owner
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pkg.source_github_owners
      exact: mx-linux
      match: any

  # Downstream recipes that explicitly advertise an accelerator/backend
  # variant commonly use a maintained fork; that is provenance context rather
  # than a source-replacement impersonation signal.
  - id: pkgbuild-desc-gpu-variant
    desc: PKGBUILD advertises GPU variant
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pkg.pkgdesc
      regex: '(?i)\bwith\b.{0,100}\b(gpu|cuda|vulkan)\b'

  - id: pkgbuild-desc-compute-variant
    desc: PKGBUILD advertises compute variant
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pkg.pkgdesc
      regex: '(?i)\bwith\b.{0,100}\b(sycl|opencl|rocm)\b'

  - id: pkgbuild-desc-acceleration-variant
    desc: PKGBUILD advertises acceleration variant
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pkg.pkgdesc
      regex: '(?i)\bwith\b.{0,100}\b(oneapi|metal|acceleration)\b'

  # The ephemeral-host and shortener atoms read the parsed pkg.source[] array, so
  # a URL outside source=() cannot trip them. The IP atom stays text-based: value
  # conditions can't combine `is: valid_ip` (octet validation) with a host-anchor
  # regex, and `is:` alone would false-positive on version-numbered filenames
  # like foo-1.2.3.4.tar.gz — the source=-anchored regex + is: is more precise.
  - id: pkgbuild-source-ip-address
    desc: PKGBUILD sources from a raw IP address
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?m)^\s*source\s*=\s*\([^)]{0,600}https?://(\d{1,3}\.){3}\d{1,3}'
      is: valid_ip

  - id: pkgbuild-source-ephemeral-host
    # 0x0.st / transfer.sh / file.io / termbin are throwaway upload services —
    # legitimate upstream tarballs never live there.
    desc: PKGBUILD sources from an ephemeral file host
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: pkg.source[*]
      regex: 'https?://[^\s]{0,40}(0x0\.st|transfer\.sh|file\.io|termbin)'

  - id: pkgbuild-source-url-shortener
    desc: PKGBUILD sources via a URL shortener
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: pkg.source[*]
      regex: 'https?://[^\s]{0,30}(bit\.ly|tinyurl|is\.gd|t\.co)/'

  # Fork impersonation: when the declared upstream `url` is a GitHub repo, its
  # source archives should come from the SAME owner. filefacts projects the
  # owner of `url` and of every github.com source into pkg.*_github_owner(s);
  # this fires when a source repo belongs to a DIFFERENT owner — the -bin
  # fork-impersonation vector (an attacker repo posing as the project's release).
  # Owner comparison is high-confidence; a bare cross-domain difference (project
  # site vs CDN vs github) is normal and is not projected, so cannot trip this.
  - id: pkgbuild-source-foreign-github-owner
    desc: PKGBUILD source owner differs upstream
    crit: suspicious
    conf: 0.85
    unless:
      - id: pkgbuild-documented-multi-upstream-source
      - id: pkgbuild-ungoogled-chromium-maintainer
      - id: metadata/package/manifest/repository::pkgbuild-pinned-binary-release-repackager
      - id: pkgbuild-mangowm-repository-migration
      - id: pkgbuild-mxlinux-owner-alias
      # A downstream package may use the upstream archive while its own
      # repository adds a hardware/backend/build variant. That is normal fork
      # provenance, not a source-replacement impersonation signal.
      - id: pkgbuild-accelerated-downstream
      # A VCS recipe commonly follows a maintained fork (for example a
      # downstream feature branch).  The owner mismatch is meaningful for a
      # fixed archive pretending to be upstream, not for a declared git source.
      - id: metadata/build/package::pkgbuild-vcs-source
      - type: value
        path: pkg.source_github_owners
        exact: repos
        match: any
    if:
      type: value
      path: pkg.url_github_owner
      ne: pkg.source_github_owners
      match: all

  - id: pkgbuild-intentional-multi-upstream-source
    desc: PKGBUILD documents path dependency source
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'path[- ]deps'
      case_insensitive: true

  - id: pkgbuild-docs-matching-source-fetch
    desc: PKGBUILD documents matching source fetch
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'matching .{0,40} source is fetched alongside'
      case_insensitive: true

  - id: pkgbuild-docs-pinned-release-tarball
    desc: PKGBUILD documents pinned release tarball
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'pinned upstream .{0,30} release'
      case_insensitive: true

  - id: pkgbuild-ungoogled-chromium-maintainer
    desc: Ungoogled Chromium AUR maintainer marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'Ungoogled Software Contributors'


composite_rules:
  - id: pkgbuild-mangowm-repository-migration
    desc: Official MangoWM repository migration
    crit: exception
    conf: 0.99
    all:
      - id: pkgbuild-mangowm-package-name
      - id: pkgbuild-mangowm-source-owner
      - id: pkgbuild-mangowc-legacy-url

  - id: pkgbuild-mxlinux-owner-alias
    desc: Official MX Cleanup GitHub owner alias
    crit: exception
    conf: 0.99
    all:
      - id: pkgbuild-mx-cleanup-package-name
      - id: pkgbuild-mxlinux-url-owner
      - id: pkgbuild-mx-linux-source-owner

  - id: pkgbuild-accelerated-downstream
    desc: PKGBUILD declares an accelerated downstream variant
    crit: exception
    conf: 0.9
    any:
      - id: pkgbuild-desc-gpu-variant
      - id: pkgbuild-desc-compute-variant
      - id: pkgbuild-desc-acceleration-variant

  - id: pkgbuild-documented-multi-upstream-source
    desc: PKGBUILD documents multi-upstream source
    crit: notable
    conf: 0.85
    any:
      - id: pkgbuild-intentional-multi-upstream-source
      - id: pkgbuild-docs-matching-source-fetch
      - id: pkgbuild-docs-pinned-release-tarball
