---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: npm-security-holder-readme-title
  desc: npm security holder README title
  crit: component
  conf: 0.99
  for:
  - markdown
  if:
    type: text
    substr: Security holding package
- id: npm-security-holder-readme-removal
  desc: npm security holder removal notice
  crit: component
  conf: 0.99
  for:
  - markdown
  if:
    type: text
    substr: removed from the registry by the npm security team
- id: npm-security-holder-readme-advisory
  desc: npm security holder advisory link
  crit: component
  conf: 0.98
  for:
  - markdown
  if:
    type: text
    substr: www.npmjs.com/advisories?search=
- id: pkg-skeleton-small
  desc: Tiny package.json manifest
  crit: notable
  conf: 0.7
  size_max: 2048
  unless:
  # cjs/esm package.json files are module-format sidecars, not package
  # skeletons; they commonly omit name, dependencies, and other metadata.
  - type: path
    regex: '(^|[\\/])(cjs|esm|commonjs|module)[\\/]package\.json$'
  - id: metadata/package/manifest/freeform::pkg-skeleton-benign-context
  - id: metadata/package/testing/presence/fixture::types-private-fixture-package
  - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
- id: ci-badge-reference-a
  desc: References CI service domains
  crit: notable
  conf: 0.8
  unless:
  - id: metadata/package/manifest/freeform::npm-from-field
  - id: metadata/package/manifest/freeform::npm-resolved-field
  - type: text
    substr: '"readmeFilename":'
  if:
    type: text
    regex: travis-ci\.org|circleci\.com|codecov\.io|coveralls\.io
- id: npm-template-manifest-placeholder
  desc: npm package manifest template placeholders
  crit: component
  conf: 0.95
  if:
    type: text
    regex: "<%=\\s*project_name\\s*%>"
- id: npm-n8n-node-manifest
  desc: npm package declares n8n node manifest
  crit: component
  conf: 0.92
  if:
    type: value
    path: n8n.n8nNodesApiVersion
    exists: true
- id: npm-module-type-sidecar-type-field
  desc: npm module-format sidecar type field
  crit: component
  conf: 0.95
  size_max: 512
  if:
    type: value
    path: type
    exists: true
- id: npm-invalid-package-type-field
  desc: npm package type field has invalid value
  crit: notable
  conf: 0.9
  if:
    type: value
    path: type
    regex: '[^A-Za-z0-9_-]'
- id: npm-module-type-sidecar-dist-path
  desc: "npm dist mod-format package.json sidecar path"
  crit: component
  conf: 0.95
  if:
    type: path
    regex: 'dist[\\/](esm|cjs|commonjs|module)[\\/]package\.json$'
- id: npm-module-type-sidecar-build-path
  desc: "npm build mod-format package.json sidecar path"
  crit: component
  conf: 0.95
  if:
    type: path
    regex: 'build[\\/](esm|cjs|commonjs|module)[\\/]package\.json$'
- id: npm-module-type-sidecar-lib-path
  desc: "npm lib mod-format package.json sidecar path"
  crit: component
  conf: 0.95
  if:
    type: path
    regex: 'lib[\\/](esm|cjs|commonjs|module)[\\/]package\.json$'
- id: ci-badge-reference-b
  desc: References GitHub Actions
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: github\.com/.{0,50}actions
  unless:
  - type: metrics
    field: parse.error_count
    min: 1
composite_rules:
- id: pkg-skeleton-benign-context
  desc: Benign tiny package metadata context
  crit: component
  conf: 0.95
  any:
  - id: metadata/package/files/package-json::has-files-field
  - id: metadata/package/manifest/runtime::has-engines
  - id: metadata/package/keywords/identity::has-keywords
  - id: metadata/package/dependencies::has-dev-deps
  - id: metadata/package/manifest/publishing::has-funding
  - id: metadata/package/manifest/homepage::has-homepage-field
  - id: metadata/package/manifest/repository::has-repository-url
  - id: metadata/package/manifest/freeform::npm-security-holder-package
- id: official-react-native-package
  desc: Official React Native package context
  crit: component
  conf: 1.0
  any:
  - id: metadata/package/manifest/repository::official-react-native-repo-package
  - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
- id: minimal-cli-stub
  desc: Tiny package.json with declared CLI binary
  crit: component
  conf: 0.9
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/manifest/entrypoint::has-bin-field
- id: npm-module-type-sidecar
  desc: npm module-format package.json sidecar
  crit: component
  conf: 0.95
  all:
  - id: metadata/package/manifest/freeform::npm-module-type-sidecar-type-field
  any:
  - id: metadata/package/manifest/freeform::npm-module-type-sidecar-dist-path
  - id: metadata/package/manifest/freeform::npm-module-type-sidecar-build-path
  - id: metadata/package/manifest/freeform::npm-module-type-sidecar-lib-path
- id: official-react-native-package-with-codegen
  desc: Official React Native package with codegen
  crit: component
  conf: 1.0
  all:
  - id: metadata/package/manifest/freeform::official-react-native-package
  - id: metadata/package/dependencies::official-react-native-codegen-dependency
- id: conventional-version
  desc: Uses conventional version format
  crit: baseline
  conf: 0.75
  any:
  - id: metadata/package/versioning::conventional-version-base
  - id: metadata/package/versioning::conventional-version-pre-1
  - id: metadata/package/versioning::conventional-version-pre-2
- id: npm-security-holder-package
  desc: Official npm security holding package
  crit: notable
  conf: 0.99
  all:
  - id: metadata/package/versioning::npm-security-holder-version
  - id: metadata/package/manifest/description::npm-security-holder-description
  - id: metadata/package/manifest/repository::npm-security-holder-repository
- id: npm-security-holder-readme
  desc: Official npm security holder README
  crit: notable
  conf: 0.99
  for:
  - markdown
  all:
  - id: metadata/package/manifest/freeform::npm-security-holder-readme-title
  - id: metadata/package/manifest/freeform::npm-security-holder-readme-removal
  - id: metadata/package/manifest/freeform::npm-security-holder-readme-advisory
- id: ci-badge-reference
  desc: References CI service (professional project)
  crit: notable
  conf: 0.8
  any:
  - id: metadata/package/manifest/freeform::ci-badge-reference-a
  - id: metadata/package/manifest/freeform::ci-badge-reference-b
- id: npm-malicious-metadata
  desc: Unrealistic npm version with typosquat email
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/package/versioning::npm-unrealistic-major-version
  - id: metadata/package/manifest/author/identity::npm-typosquat-email
- id: npm-metadata-benign-context
  desc: Benign npm metadata context
  crit: component
  any:
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/manifest/publishing::is-private
  - id: metadata/package/dependencies::has-dev-deps
  - id: metadata/package/files/package-json::has-files-field
  - id: metadata/package/manifest/runtime::has-engines
  - id: metadata/package/manifest/author/identity::has-contributors
