defaults:
  platforms:
  - unix
  - windows
  crit: notable
  attack: T1036.005
  mbc: F0004
  for: [pkginfo]
traits:
- id: placeholder-author-haha
  desc: PKG-INFO author placeholder (haha)
  crit: component
  conf: 0.8
  if:
    type: value
    path: author
    exact: haha
    case_insensitive: true
- id: placeholder-author-lol
  desc: PKG-INFO author placeholder (lol)
  crit: component
  conf: 0.8
  if:
    type: value
    path: author
    exact: lol
    case_insensitive: true
- id: placeholder-author-dev
  desc: PKG-INFO author placeholder (dev)
  crit: component
  conf: 0.8
  if:
    type: value
    path: author
    exact: dev
    case_insensitive: true
- id: placeholder-author-me
  desc: PKG-INFO author placeholder (me)
  crit: component
  conf: 0.8
  if:
    type: value
    path: author
    exact: me
    case_insensitive: true
- id: unknown-author
  desc: PKG-INFO has UNKNOWN author
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    exact: UNKNOWN
- id: placeholder-author-pkginfo-1a
  desc: PKG-INFO author placeholder (Name/Test/Author)
  if:
    type: value
    path: author
    regex: ^(Your Name|Test|Author)$
    case_insensitive: true
- id: placeholder-author-email-pkginfo
  desc: PKG-INFO author email is placeholder
  conf: 0.9
  if:
    type: text
    regex: '(?im)^Author-email:\s*(Your Name\b|[^<\r\n]{0,80}<your\.email@example\.com>)'
- id: placeholder-author-pkginfo-2
  desc: 'PKG-INFO author placeholder'
  if:
    type: value
    path: author
    regex: ^(Example|Change Me|haha|lol)$
    case_insensitive: true
- id: pkginfo-short-author
  desc: PKG-INFO with very short author name
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    regex: ^.{1,3}$
- id: pkginfo-numeric-author
  desc: PKG-INFO author with numeric sequences
  crit: notable
  conf: 0.7
  if:
    type: value
    path: author
    regex: ([a-zA-Z]+[0-9]{3,}|[0-9]{3,}[a-zA-Z]+)
- id: placeholder-author-pkginfo-1b--todo
  desc: PKG-INFO author placeholder (TODO)
  if:
    type: value
    path: author
    exact: TODO
- id: placeholder-author-pkginfo-1b--fixme
  desc: PKG-INFO author placeholder (FIXME)
  if:
    type: value
    path: author
    case_insensitive: true
    exact: FIXME
- id: placeholder-author-pkginfo-3--none
  desc: PKG-INFO author placeholder (none)
  if:
    type: value
    path: author
    exact: none
- id: placeholder-author-pkginfo-3--asdf
  desc: PKG-INFO author placeholder (asdf)
  if:
    type: value
    path: author
    exact: asdf
- id: placeholder-author-pkginfo-3--abc
  desc: PKG-INFO author placeholder (abc)
  if:
    type: value
    path: author
    exact: abc
composite_rules:
- id: placeholder-author-1
  desc: PKG-INFO author placeholder (haha/lol/test)
  crit: notable
  conf: 0.8
  any:
  - id: placeholder-author-haha
  - id: placeholder-author-lol
  - id: metadata/package/manifest/author/risk::pypi-author-test
- id: placeholder-author-2
  desc: PKG-INFO author placeholder (admin/user/dev/me)
  crit: notable
  conf: 0.8
  any:
  - id: metadata/package/manifest/author/risk::pypi-author-admin
  - id: metadata/package/manifest/author/risk::pypi-author-user
  - id: placeholder-author-dev
  - id: placeholder-author-me
- id: placeholder-author-pkginfo-1b
  desc: PKG-INFO author placeholder (TODO/FIXME)
  any:
  - id: placeholder-author-pkginfo-1b--todo
  - id: placeholder-author-pkginfo-1b--fixme
- id: placeholder-author-pkginfo-3
  desc: PKG-INFO author placeholder (none/asdf/abc)
  any:
  - id: placeholder-author-pkginfo-3--none
  - id: placeholder-author-pkginfo-3--asdf
  - id: placeholder-author-pkginfo-3--abc
- id: placeholder-author
  desc: Author field contains placeholder name
  crit: notable
  conf: 0.65
  any:
  - id: placeholder-author-1
  - id: placeholder-author-2
- id: placeholder-author-pkginfo-1
  desc: PKG-INFO author placeholder (Set 1)
  any:
  - id: placeholder-author-pkginfo-1a
  - id: placeholder-author-email-pkginfo
  - id: placeholder-author-pkginfo-1b
- id: placeholder-author-pkginfo
  desc: PKG-INFO author contains placeholder text
  crit: notable
  conf: 0.8
  any:
  - id: placeholder-author-pkginfo-1
  - id: placeholder-author-pkginfo-2
  - id: placeholder-author-pkginfo-3
