---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - package.json
traits:
- id: has-author-email
  desc: Package has author with email
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: '"author":\\s*"[^"]{0,120}@[^"]{0,120}"|"email":\\s*"[^"]{0,120}@'
- id: suspicious-npm-email
  desc: Suspicious npm user email pattern
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: _npmUser.email
    regex: "[a-z0-9]{6,}@gmail\\.com"
- id: metadata-author
  desc: author= metadata field
  crit: component
  conf: 0.5
  for: [python]
  if:
    type: string_literal
    regex: author\s*=
# Neutral completeness facts: a PKG-INFO that omits the Author / Author-email
# field. Common in modern PEP 621 / hatch-built packages, so these are neutral
# file properties, not anomalies on their own. Supply-chain composites reference
# them cross-directory.
- id: pkginfo-no-author
  desc: PKG-INFO missing Author field
  crit: component
  conf: 0.7
  for: [python, pkginfo]
  if:
    type: value
    path: metadata-version
  unless:
    - type: value
      path: author
    - type: value
      path: author-email
    - id: metadata/package/testing/presence/fixture/
- id: pkginfo-no-author-email
  desc: PKG-INFO missing Author-email field
  crit: component
  conf: 0.7
  for: [python, pkginfo, pyproject.toml]
  if:
    type: value
    path: metadata-version
  unless:
    - type: value
      path: author-email
    - type: value
      path: maintainer-email
    - id: metadata/package/testing/presence/fixture/
- id: pypi-no-author-email
  desc: PyPI metadata omits author email
  crit: baseline
  conf: 0.7
  for: [pkginfo]
  if:
    type: value
    path: metadata-version
    exists: true
  unless:
  - type: basename
    regex: "^(META|meta)\\.json$"
  - type: basename
    exact: metadata.json
  - type: text
    substr: conda_pkg_format_version
  - type: text
    regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:|\"maintainers\"\\s*:"
  - type: value
    path: author-email
  - type: value
    path: maintainer-email
