defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.96

traits:
  - id: container-image-tar-name
    desc: Container image tar archive
    for: [tar]
    if:
      type: path
      basename: true
      regex: '^(docker|ghcr|quay)\.io_.+\.(tar|tar\.xz|tar\.gz|tgz)$'

  - id: dpkg-database-path
    desc: dpkg package database path
    for: [text, kotlin]
    if:
      type: path
      regex: 'var/lib/dpkg'

  - id: dpkg-maintainer-script
    desc: dpkg maintainer script
    for: [shell]
    if:
      type: path
      regex: 'dpkg/info/.*\.(preinst|postinst|prerm|postrm)$'

  - id: system-shell-profile
    desc: system shell profile file
    for: [shell]
    if:
      type: path
      regex: '(^|/)(dot\.)?\.?bashrc$'

  - id: shell-completion-script
    desc: Shell completion script
    for: [shell]
    if:
      type: path
      regex: 'vendor_completions\.d|bash-completion|zsh/site-functions'

  - id: zsh-function-script
    desc: Zsh distributed function library script
    for: [shell]
    if:
      type: path
      regex: 'zsh/functions/'

  - id: os-ca-cert-hook-script
    desc: OS CA certificate hook script
    for: [shell]
    if:
      type: path
      regex: 'ca-certificates|ca-legacy|__cacert_entrypoint\.sh'

  - id: debian-account-maintainer-tool
    desc: Debian account maintainer tool
    for: [shell, perl, elf]
    if:
      type: path
      regex: '(^|/)(shadowconfig|deluser|gpasswd)$'

  - id: os-package-manager-tool
    desc: OS package manager command tool
    for: [shell, elf]
    if:
      type: path
      basename: true
      regex: '^(apt-key|alternatives)$'

  - id: os-vendored-perl-module
    desc: OS vendored Perl module
    for: [perl]
    if:
      type: path
      regex: '(perl5|vendor_perl|perl-base).*\.p(erl|m|od)$'

  - id: debian-missing-sources-vendored-crate
    desc: Debian missing-sources vendored crate
    for: [cargo.toml, rust, javascript, shell]
    if:
      type: path
      regex: 'debian[\\/]missing-sources[\\/]'

  - id: os-package-manager-library
    desc: OS package manager library
    for: [elf]
    if:
      type: path
      regex: 'lib(apt-private|apt-pkg|repo|rpm|rpmbuild|auparse)\.so'

  - id: os-bundled-native-library
    desc: OS bundled native library
    for: [elf, macho]
    if:
      type: path
      regex: 'lib64|x86_64-linux-gnu|ossl-modules|lib/server'

  - id: os-bundled-static-library
    desc: OS bundled static library archive
    platforms: [linux]
    for: [deb, jar]
    if:
      type: path
      basename: true
      regex: '^lib[a-z0-9_.+-]+\.a$'

  - id: container-app-native-library
    desc: Container packaged app native library
    for: [elf, macho]
    if:
      type: path
      regex: 'usr/local/.+\.(so|dylib)$'

  - id: java-runtime-native-library
    desc: Java runtime native library
    for: [elf]
    if:
      type: path
      regex: 'openjdk|libjvm\.so'

  - id: os-python-runtime-path
    desc: OS Python runtime path
    for: [python, pyc, whl]
    if:
      type: path
      regex: 'python3|python3-wheels|__pycache__'

  - id: os-info-documentation
    desc: OS info documentation file
    for: [kotlin, text]
    if:
      type: path
      regex: 'usr/share/info|\.info$'

  - id: container-runtime-binary
    desc: Container packaged runtime binary
    for: [elf]
    if:
      type: path
      basename: true
      regex: '^(promtail|python[0-9.]*|alternatives)$'

  - id: container-node-runtime-binary
    desc: Container-packaged Node.js runtime binary
    crit: baseline
    conf: 0.98
    for: [elf]
    if:
      type: path
      basename: true
      exact: node

  - id: container-entrypoint-script
    desc: Container entrypoint script
    for: [shell]
    if:
      type: path
      basename: true
      regex: '^(docker-)?entrypoint\.sh$'

  - id: initrd-format-inspection-script
    desc: Initrd compression-format inspection helper
    crit: notable
    for: [shell]
    if:
      type: path
      regex: '(^|[\\/])module-init-tools[\\/]lsinitrd-quick$'

  - id: jvm-bundled-native-dependency
    desc: JVM bundled native dependency
    for: [jar, elf, macho]
    if:
      type: path
      regex: '(snappy-java|zstd-jni|lz4-java|rocksdbjni)'

  - id: app-vendored-web-asset
    desc: App vendored web asset
    for: [javascript]
    if:
      type: path
      regex: 'public/js|lib-webapp|webapp|WEB-INF/js'

  - id: app-bundled-example-source
    desc: App bundled example source
    for: [java, javascript, python]
    if:
      type: path
      regex: '(^|/)(examples?|samples?)/'

  - id: julia-runtime-path
    desc: Julia runtime path
    for: [javascript, kotlin, lua, elf]
    if:
      type: path
      regex: 'usr/local/julia'

  - id: julia-compiled-cache-path-segment
    desc: Julia compiled package cache path segment
    crit: component
    for: [elf]
    if:
      type: path
      regex: 'compiled/v[0-9][0-9.]*/'

  - id: elf-links-libjulia-runtime
    desc: ELF links the Julia runtime library
    crit: component
    for: [elf]
    if:
      type: value
      path: elf.needed
      regex: '^libjulia(-internal)?\.so\.[0-9]'

  - id: julia-library-path-segment
    desc: Julia library directory path segment
    crit: component
    for: [elf]
    if:
      type: path
      regex: 'lib/julia/'

  - id: julia-system-image-basename
    desc: Julia system image basename
    crit: component
    for: [elf]
    if:
      type: basename
      exact: sys.so

composite_rules:
  - id: julia-precompiled-cache-shared-object
    desc: Julia precompiled package cache shared object
    crit: baseline
    conf: 0.98
    for: [elf]
    all:
      - id: julia-compiled-cache-path-segment
      - id: elf-links-libjulia-runtime

  - id: julia-system-image-shared-object
    desc: Julia system image shared object
    crit: baseline
    conf: 0.98
    for: [elf]
    all:
      - id: julia-system-image-basename
      - id: julia-library-path-segment
      - id: elf-links-libjulia-runtime

  - id: container-rootfs-system-content
    desc: Container rootfs system content
    crit: baseline
    conf: 0.97
    any:
      - id: container-image-tar-name
      - id: dpkg-database-path
      - id: dpkg-maintainer-script
      - id: system-shell-profile
      - id: shell-completion-script
      - id: os-ca-cert-hook-script
      - id: debian-account-maintainer-tool
      - id: os-package-manager-tool
      - id: os-vendored-perl-module
      - id: os-package-manager-library
      - id: os-bundled-native-library
      - id: os-bundled-static-library
      - id: container-app-native-library
      - id: java-runtime-native-library
      - id: os-python-runtime-path
      - id: os-info-documentation
      - id: container-runtime-binary
      - id: container-entrypoint-script
      - id: jvm-bundled-native-dependency
      - id: app-vendored-web-asset
      - id: app-bundled-example-source
      - id: julia-runtime-path
      - id: julia-precompiled-cache-shared-object
      - id: julia-system-image-shared-object
