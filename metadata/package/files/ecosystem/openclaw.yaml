defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 0.97

traits:
  - id: openclaw-evolver-archive-container
    desc: OpenClaw evolver archive container
    for: [zip]
    if:
      type: path
      basename: true
      regex: '^(capability-)?evolver-[^/]+\.zip$'

  - id: openclaw-evolver-archive-path
    desc: OpenClaw evolver archive path
    for: [javascript, typescript, json, markdown, python]
    if:
      type: path
      regex: '(^|/)(capability-)?evolver-[^/]+\.zip'

  - id: openclaw-evolver-env-marker
    desc: OpenClaw evolver environment marker
    for: [javascript, typescript, json, markdown]
    if:
      type: text
      substr: 'EVOLVER_'

  - id: openclaw-evolve-env-marker
    desc: OpenClaw evolve environment marker
    for: [javascript, typescript, json, markdown]
    if:
      type: text
      substr: 'EVOLVE_'

  - id: openclaw-evolve-env-prefix
    desc: OpenClaw evolve env prefix
    for: [javascript, typescript, json, markdown]
    if:
      type: text
      regex: 'EVOLV(E|ER)_'

  - id: openclaw-gep-phrase
    desc: OpenClaw GEP phrase
    for: [javascript, typescript, json, markdown]
    if:
      type: text
      substr: 'Gene Expression Programming'

  - id: openclaw-gep-token
    desc: OpenClaw GEP token
    for: [javascript, typescript, json, markdown]
    if:
      type: text
      word: GEP

  - id: openclaw-evolver-obfuscated-runtime-path
    desc: OpenClaw evolver obfuscated runtime path
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)(gep|trace)/[A-Za-z0-9_.-]+\.js$'

  - id: openclaw-evolver-binary-build-pipeline
    desc: OpenClaw evolver binary build pipeline
    for: [javascript, typescript]
    if:
      type: text
      substr: 'obfuscator -> bun bundle -> bun compile'

  - id: openclaw-evolver-feature-flags-module
    desc: OpenClaw evolver feature-flag persistence module
    for: [javascript, typescript]
    if:
      type: text
      substr: 'Feature flags persistence layer'

  - id: openclaw-evolver-support-module
    desc: OpenClaw evolver support module
    for: [javascript, typescript]
    if:
      type: text
      regex: '(computeAssetId\W|IV_BYTES\W)'

  - id: openclaw-evolver-proxy-inject-path
    desc: OpenClaw evolver proxy injector path
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)proxy/inject\.js$'

  - id: openclaw-evolver-proxy-token-helper
    desc: OpenClaw evolver proxy token helper
    for: [javascript, typescript]
    if:
      type: text
      substr: getProxyToken

  - id: openclaw-evolver-proxy-url-helper
    desc: OpenClaw evolver proxy URL helper
    for: [javascript, typescript]
    if:
      type: text
      substr: getProxyUrl

  - id: openclaw-weiyun-token
    desc: OpenClaw Weiyun token
    for: [python]
    if:
      type: text
      substr: weiyun

  - id: openclaw-weiyun-mcp-url
    desc: OpenClaw Weiyun MCP URL variable
    for: [python]
    if:
      type: text
      substr: mcp_url

  - id: openclaw-weiyun-url-sanitizer
    desc: OpenClaw Weiyun trusted URL sanitizer
    for: [python]
    if:
      type: text
      substr: _TRUSTED_MCP_HOST_SUFFIXES

  - id: openclaw-weiyun-sanitized-post
    desc: OpenClaw Weiyun sanitized MCP POST
    for: [python]
    if:
      type: text
      substr: safe_mcp_url = _validate_mcp_url

  - id: openclaw-security-test-member
    desc: OpenClaw security test member
    for: [javascript, typescript, python]
    if:
      type: path
      basename: true
      regex: '.*(security|abuse|telemetry|dispatch).*\.(js|ts|py)$'

  - id: openclaw-wujie-shell-sdk-package
    desc: OpenClaw Wujie shell SDK package
    for: [javascript, typescript, package.json, markdown]
    if:
      type: text
      regex: '@wujie-shell/sdk|window\.wujieShell|wujie-shell|wujieShe'

composite_rules:
  - id: openclaw-evolver-obfuscated-runtime-module
    desc: OpenClaw evolver obfuscated runtime module
    crit: baseline
    conf: 0.97
    for: [javascript, typescript]
    all:
      - id: openclaw-evolver-obfuscated-runtime-path
      - id: metadata/lang/javascript-features::js-obfuscator-while-loop

  - id: openclaw-evolver-proxy-inject-module
    desc: OpenClaw evolver proxy injector module
    crit: baseline
    conf: 0.97
    for: [javascript, typescript]
    all:
      - id: openclaw-evolver-proxy-inject-path
      - id: openclaw-evolver-proxy-token-helper
      - id: openclaw-evolver-proxy-url-helper

  - id: openclaw-benign-skill-member
    desc: OpenClaw benign skill package member
    crit: baseline
    conf: 0.97
    any:
      - id: openclaw-evolver-package-member
      - id: openclaw-weiyun-skill-member
      - id: openclaw-wujie-shell-sdk-package

  - id: openclaw-evolver-package-member
    desc: OpenClaw evolver package member
    crit: baseline
    conf: 0.97
    any:
      - id: openclaw-evolve-env-prefix
      - id: openclaw-evolver-obfuscated-runtime-module
      - id: openclaw-evolver-binary-build-pipeline
      - id: openclaw-evolver-feature-flags-module
      - id: openclaw-evolver-support-module
      - id: openclaw-evolver-proxy-inject-module

  - id: openclaw-weiyun-skill-member
    desc: OpenClaw Weiyun skill package member
    crit: baseline
    conf: 0.97
    all:
      - id: openclaw-weiyun-token
      - id: openclaw-weiyun-mcp-url

  - id: openclaw-weiyun-safe-uploader
    desc: OpenClaw Weiyun sanitized uploader
    crit: baseline
    conf: 0.97
    for: [python]
    all:
      - id: openclaw-weiyun-skill-member
      - id: openclaw-weiyun-url-sanitizer
      - id: openclaw-weiyun-sanitized-post
