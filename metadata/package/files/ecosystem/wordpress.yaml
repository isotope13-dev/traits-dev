defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.95

traits:
  - id: wordpress-plugin-header-name
    desc: WordPress plugin header name
    if:
      type: text
      regex: '^\s*\*\s*Plugin Name:\s+.{1,160}$'

  - id: wordpress-plugin-text-domain
    desc: WordPress plugin text domain
    if:
      type: text
      regex: '^\s*\*\s*Text Domain:\s+[ \t]*[a-z0-9_-]{2,80}\s*$'

composite_rules:
  - id: wordpress-plugin-header
    desc: WordPress plugin metadata header
    crit: baseline
    conf: 0.98
    all:
      - id: wordpress-plugin-header-name
      - id: wordpress-plugin-text-domain
