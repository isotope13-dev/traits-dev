# Direct MSI-container summary facts. The analyzer exposes MSI files as
# Unknown at rule-routing time, so these value facts use the existing MSI route.
defaults:
  platforms: [windows]
  for: [all]

traits:
  - id: msi-adobe-acrobat-subject
    desc: MSI subject claims Adobe Acrobat
    crit: notable
    conf: 0.98
    if:
      type: value
      path: office.subject
      exact: Adobe

  - id: msi-adobe-acrobat-creator
    desc: MSI creator claims Adobe Acrobat
    crit: notable
    conf: 0.98
    if:
      type: value
      path: office.creator
      exact: Adobe Acrobat
