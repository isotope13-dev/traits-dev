# Runtime payload identity facts from an MSI file table and summary metadata.
defaults:
  platforms: [windows]
  for: [all]

traits:
  - id: msi-wix-toolset-branding
    desc: MSI metadata identifies WiX Toolset
    crit: notable
    conf: 0.99
    if:
      type: value
      path: office.application
      regex: 'WiX Toolset \([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\)'
