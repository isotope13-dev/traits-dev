defaults:
  platforms: [windows]
  for: [all]
traits:
  - id: google-msi-author
    desc: MSI author field claims Google
    crit: component
    conf: 0.96
    if:
      type: value
      path: office.creator
      exact: Google
  - id: msi-office-flashplayer-subject
    desc: Flash Player MSI subject lure
    crit: notable
    conf: 0.95
    if:
      type: value
      path: office.subject
      regex: '(?i)flashplayer'
  - id: msi-office-flashplayer-application
    desc: Flash Player MSI application lure
    crit: notable
    conf: 0.95
    if:
      type: value
      path: office.application
      regex: '(?i)flashplayer'
  - id: msi-office-opaque-product-brand
    desc: Opaque single-token MSI product brand
    crit: notable
    conf: 0.9
    for: [oledoc]
    if:
      type: value
      path: office.application
      regex: '^[a-z]{6,16}$'
  - id: msi-office-opaque-product-subject
    desc: Opaque single-token MSI subject brand
    crit: notable
    conf: 0.9
    for: [oledoc]
    if:
      type: value
      path: office.subject
      regex: '^[a-z]{6,16}$'
  - id: microsoft-vcredist-subject
    desc: MSI subject claims Visual C++ Redistributable
    crit: notable
    conf: 0.98
    if:
      type: value
      path: office.subject
      regex: '(?i)Microsoft Visual C\+\+.{0,120}Redistributable'

  - id: ole-security-flag
    desc: OLE document security flag is set
    crit: notable
    conf: 0.92
    if:
      type: value
      path: office.document_security
      exact: '2'

  # Packed/encrypted MSI containers expose many OLE streams. Under
  # msi→Unknown routing, prefer collection size over non-ASCII regexes
  # (those trip open-ended pattern validation on for:[all]).
  - id: msi-opaque-stream-cluster
    desc: MSI has many OLE container streams
    crit: notable
    conf: 0.94
    if:
      type: value
      path: office.streams
      exists: true
      size_min: 18

  # Value matchers do not honor trait-level not: filters; use unless:.
  - id: msi-nonstandard-subject-identity
    desc: MSI subject is outside known vendor identities
    crit: notable
    conf: 0.88
    if:
      type: value
      path: office.subject
      regex: '.+'
    unless:
      - id: metadata/package/files/msi::msi-adobe-acrobat-subject
      - type: value
        path: office.subject
        regex: '(?i)microsoft|google'
      - type: value
        path: office.subject
        regex: '(?i)memu|microvirt|node'

  - id: msi-nonstandard-creator-identity
    desc: MSI creator is outside known vendor identities
    crit: notable
    conf: 0.88
    if:
      type: value
      path: office.creator
      regex: '.+'
    unless:
      - id: metadata/package/files/msi::msi-adobe-acrobat-creator
      - type: value
        path: office.creator
        regex: '(?i)microsoft|google|adobe'
      - type: value
        path: office.creator
        regex: '(?i)memu|microvirt|node'

  - id: msi-adobe-install-description
    desc: MSI description claims to install Adobe
    crit: notable
    conf: 0.96
    if:
      type: value
      path: office.description
      regex: '(?i)install Adobe'

  - id: msi-single-token-subject
    desc: MSI subject is a single opaque token
    crit: notable
    conf: 0.9
    if:
      type: value
      path: office.subject
      regex: '^[A-Za-z]{6,16}$'
