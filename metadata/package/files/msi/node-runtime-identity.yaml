# Node Runtime / Node.js Foundation WiX MSI identity signals.
# Matched via office.* value paths with for:[all] so they still apply when
# the analyzer labels the container "msi" (trait routing maps that label to
# Unknown, which skips for:[oledoc] rules).
defaults:
  platforms: [windows]
  for: [all]

traits:
  - id: node-runtime-subject
    desc: Installer subject is Node Runtime
    crit: notable
    conf: 0.98
    if:
      type: value
      path: office.subject
      exact: Node Runtime

  - id: nodejs-foundation-creator
    desc: Installer creator is Node.js Foundation
    crit: notable
    conf: 0.98
    if:
      type: value
      path: office.creator
      exact: Node.js Foundation

  - id: node-runtime-description
    desc: Description claims Node Runtime install database
    crit: notable
    conf: 0.95
    if:
      type: value
      path: office.description
      regex: '(?i)install Node Runtime'

  - id: wix-toolset-application
    desc: Built with Windows Installer XML Toolset
    crit: notable
    conf: 0.9
    if:
      type: value
      path: office.application
      regex: '(?i)Windows Installer XML Toolset'

  - id: ole2-installer-kind
    desc: OLE2 compound installer document
    crit: notable
    conf: 0.9
    if:
      type: value
      path: office.kind
      exact: ole2

  - id: oversized-node-runtime-msi
    desc: Multi-megabyte Node Runtime installer container
    crit: notable
    conf: 0.92
    size_min: 15000000
    if:
      type: value
      path: office.subject
      exact: Node Runtime

  - id: installer-keywords
    desc: Summary keywords claim Installer
    crit: notable
    conf: 0.85
    if:
      type: value
      path: office.keywords
      exact: Installer
