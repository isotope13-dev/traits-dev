defaults:
  platforms: [unix]
  for: [text, tar]

traits:
  - id: openbsd-pkg-contents-manifest
    desc: OpenBSD package contents manifest
    crit: baseline
    conf: 0.96
    if:
      type: text
      regex: '(?m)^@name [A-Za-z0-9_.+-]+-.{1,80}\n@version \d+\n@comment pkgpath='

  - id: openbsd-pkg-cwd-prefix
    desc: OpenBSD package cwd prefix
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?m)^@cwd /(usr/local|usr/X11R6|)$'

  - id: openbsd-pkg-rcscript-registration
    desc: OpenBSD package rcscript registration
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?m)^@rcscript /etc/rc\.d/[A-Za-z0-9_.+-]+$'

composite_rules:
  - id: openbsd-pkg-manifest
    desc: OpenBSD package manifest
    crit: baseline
    conf: 0.98
    all:
      - id: openbsd-pkg-contents-manifest
      - id: openbsd-pkg-cwd-prefix

  - id: openbsd-pkg-rcscript-manifest
    desc: OpenBSD package rcscript manifest
    crit: baseline
    conf: 0.98
    all:
      - id: openbsd-pkg-manifest
      - id: openbsd-pkg-rcscript-registration
