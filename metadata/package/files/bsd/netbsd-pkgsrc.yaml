defaults:
  platforms: [unix]
  for: [shell]
  crit: component
  conf: 0.92

traits:
  - id: pkgsrc-contents-member
    desc: NetBSD pkgsrc +CONTENTS member
    for: [tar, archives]
    crit: notable
    conf: 0.98
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)\+CONTENTS$'

  - id: guile-slib-package-archive-basename
    desc: NetBSD Guile SLIB package archive basename
    crit: notable
    conf: 1.0
    for: [all]
    if:
      type: value
      path: file.basename
      regex: '^guile[0-9]*-slib-[0-9][A-Za-z0-9._+-]*\.tgz$'

  - id: pkgsrc-desc-member
    desc: NetBSD pkgsrc +DESC member
    for: [tar, archives]
    crit: notable
    conf: 0.96
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)\+DESC$'

  - id: pkgsrc-size-member
    desc: NetBSD pkgsrc +SIZE member
    for: [tar, archives]
    crit: notable
    conf: 0.96
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)\+SIZE_(PKG|ALL)$'

  - id: pkgsrc-cwd-prefix
    desc: pkgsrc package cwd prefix
    for: [tar, text]
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: '@cwd /usr/pkg'

  - id: pkgsrc-package-name
    desc: pkgsrc package name manifest
    for: [tar, text]
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?m)^@name [A-Za-z0-9_.+-]{1,80}-[0-9][^\n]{0,80}$'

  - id: pkgsrc-plist-ident
    desc: pkgsrc PLIST NetBSD ident
    for: [tar, text]
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: '@comment $NetBSD: PLIST,'

  - id: pkgsrc-maintainer-script-basename
    desc: pkgsrc binary package maintainer script filename
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    if:
      type: path
      basename: true
      regex: '^\+(INSTALL|DEINSTALL)$'

  - id: pkgsrc-maintainer-script-header
    desc: pkgsrc maintainer script NetBSD header
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    if:
      type: text
      substr: '$NetBSD: header,'

  - id: pkgsrc-maintainer-script-vars
    desc: pkgsrc maintainer script lifecycle variables
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    if:
      type: text
      regex: 'PKG_METADATA_DIR|PKGNAME="\$1"[\s\S]{0,80}STAGE="\$2"'

  - id: pkgsrc-ropper-package-member
    desc: Ropper package member path
    for: [python, pyc, tar]
    crit: baseline
    conf: 0.96
    if:
      type: path
      substr: site-packages/ropper/

composite_rules:
  - id: pkgsrc-package-archive-context
    desc: Recognized NetBSD pkgsrc binary package archive
    for: [tar, archives]
    # pkgsrc packages are commonly distributed as .tgz/.tar.xz.  The package
    # metadata lives in the inner tar while archive safety hooks may be
    # attached to the compression wrapper, so correlate the members at the
    # outer input boundary.
    scope: outer
    crit: exception
    conf: 0.98
    all:
      - id: pkgsrc-contents-member
      - id: pkgsrc-desc-member
      - id: pkgsrc-size-member

  - id: pkgsrc-maintainer-script
    desc: pkgsrc binary package maintainer script
    crit: baseline
    conf: 0.98
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    all:
      - id: pkgsrc-maintainer-script-basename
      - id: pkgsrc-maintainer-script-header
      - id: pkgsrc-maintainer-script-vars
