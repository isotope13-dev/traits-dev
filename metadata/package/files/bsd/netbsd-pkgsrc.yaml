defaults:
  platforms: [unix]
  for: [shell]
  crit: component
  conf: 0.92

traits:
  - id: pkgsrc-maintainer-script-basename
    desc: pkgsrc binary package maintainer script filename
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    if:
      type: path
      basename: true
      regex: '^\+(INSTALL|DEINSTALL)$'

  - id: pkgsrc-maintainer-script-header
    desc: pkgsrc maintainer script NetBSD header
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    if:
      type: text
      substr: '$NetBSD: header,'

  - id: pkgsrc-maintainer-script-vars
    desc: pkgsrc maintainer script lifecycle variables
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    if:
      type: text
      regex: 'PKG_METADATA_DIR|PKGNAME="\$1"[\s\S]{0,80}STAGE="\$2"'

composite_rules:
  - id: pkgsrc-maintainer-script
    desc: pkgsrc binary package maintainer script
    crit: baseline
    conf: 0.98
    ref: sha256:2fae4de2a569f817692ac1e2dfacd4a10f02538fea07c5d93625471a1bcac73b
    all:
      - id: pkgsrc-maintainer-script-basename
      - id: pkgsrc-maintainer-script-header
      - id: pkgsrc-maintainer-script-vars
