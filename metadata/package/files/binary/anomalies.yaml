defaults:
  platforms:
    - windows
    - unix
    - android
    - ios
traits:
  - id: benign-brackets-helper-exe
    desc: Brackets app helper executable
    crit: component
    conf: 0.98
    platforms: [windows]
    for:
      - pe
    if:
      type: path
      basename: true
      exact: CodeHelper.exe
  - id: benign-test-invalidphp-exe
    desc: PHP tooling test executable
    crit: component
    conf: 0.98
    platforms: [windows]
    for:
      - pe
    if:
      type: path
      basename: true
      exact: invalidphp.exe
  - id: benign-portable-python-runtime-exe
    desc: Portable Python runtime executable
    crit: component
    conf: 0.98
    platforms: [windows]
    for:
      - pe
    if:
      type: path
      regex: '(?i)(^|[\\/])portable_env[\\/]pythonw?\.exe$'
  - id: platform-native-package-name
    desc: Platform-specific native package name
    crit: component
    conf: 0.8
    platforms: [windows, unix]
    for: [zip, package.json]
    if:
      type: path
      basename: true
      regex: '(?i)(win32|linux|darwin|freebsd|arm64|x64|ia32)'
composite_rules:
  - id: npm-package-with-exe
    desc: NPM package contains Windows executable
    crit: notable
    conf: 0.9
    unless:
      - id: benign-brackets-helper-exe
      - id: benign-test-invalidphp-exe
      - id: metadata/build/manifest::nuspec-file
      - id: well-known/lib/electron/
      - id: metadata/package/files/included::npm-platform-native-binary-package
    all:
      - id: metadata/package/files/included::package-json-basename
      - id: metadata/package/quality/empty::npm-has-name
    any:
      - id: metadata/package/files/included::exe-extension-basename
  - id: npm-package-with-dll
    desc: npm package includes a Windows DLL
    crit: notable
    conf: 0.9
    unless:
      - id: benign-brackets-helper-exe
      - id: benign-test-invalidphp-exe
      - id: metadata/build/manifest::nuspec-file
      - id: well-known/lib/electron/
      - id: metadata/package/files/included::npm-platform-native-binary-package
    all:
      - id: metadata/package/files/included::package-json-basename
      - id: metadata/package/quality/empty::npm-has-name
    any:
      - id: metadata/package/files/included::dll-extension-basename
  - id: npm-package-with-native-binary
    desc: npm package includes a native executable or library
    crit: notable
    conf: 0.85
    unless:
      - id: benign-brackets-helper-exe
      - id: benign-test-invalidphp-exe
      - id: metadata/package/files/included::npm-platform-native-binary-package
    all:
      - id: metadata/package/files/included::package-json-basename
      - id: metadata/package/quality/empty::npm-has-name
    any:
      - id: metadata/package/files/included::exe-extension-basename
      - id: metadata/package/files/included::dll-extension-basename
      - id: metadata/package/files/included::so-extension-basename
      - id: metadata/package/files/included::dylib-extension-basename
  - id: suspicious-npm-platform-native-binary
    desc: Suspicious platform npm native binary
    crit: notable
    conf: 0.86
    all:
      - id: npm-package-with-native-binary
      - id: metadata/package/manifest/runtime::has-platform-restrictions
      - id: platform-native-package-name
  - id: setup-py-package-with-exe
    desc: Package contains setup.py and Windows executable
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/build/manifest::nuspec-file
      - id: metadata/build/pip::setuptools-launcher-stub
      - id: benign-portable-python-runtime-exe
      - id: metadata/library/pywin32::pywin32-binding-module
    all:
      - id: metadata/package/files/included::setup-py-basename
    any:
      - id: metadata/package/files/included::exe-extension-basename
  - id: pyproject-package-with-exe
    desc: Package contains pyproject.toml and Windows executable
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/build/pip::setuptools-launcher-stub
    all:
      - id: metadata/package/files/included::pyproject-toml-basename
    any:
      - id: metadata/package/files/included::exe-extension-basename
  - id: setup-py-package-with-dll
    desc: Package contains setup.py and Windows DLL
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/build/manifest::nuspec-file
    all:
      - id: metadata/package/files/included::setup-py-basename
    any:
      - id: metadata/package/files/included::dll-extension-basename
  - id: pyproject-package-with-dll
    desc: Package contains pyproject.toml and Windows DLL
    crit: notable
    conf: 0.9
    all:
      - id: metadata/package/files/included::pyproject-toml-basename
    any:
      - id: metadata/package/files/included::dll-extension-basename
  - id: python-project-package-with-native-binary
    desc: Python-project package contains native binary
    crit: suspicious
    conf: 0.85
    any:
      - id: setup-py-package-with-exe
      - id: pyproject-package-with-exe
      - id: setup-py-package-with-dll
      - id: pyproject-package-with-dll
  - id: python-package-with-image
    desc: Python project archive contains image asset
    crit: baseline
    conf: 0.7
    all:
      - id: metadata/package/files/included::setup-py-basename
    any:
      - id: metadata/package/files/included::png-extension-basename
      - id: metadata/package/files/included::ico-extension-basename
  - id: script-package-with-windows-binary
    desc: Script-based package contains Windows binary (highly suspicious)
    crit: suspicious
    conf: 0.9
    any:
      - id: npm-package-with-exe
      - id: npm-package-with-dll
      - id: setup-py-package-with-exe
      - id: pyproject-package-with-exe
      - id: setup-py-package-with-dll
      - id: pyproject-package-with-dll
