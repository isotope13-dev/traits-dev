defaults:
  platforms: [unix]
  crit: component
  conf: 0.9

traits:
  - id: alpine-apk-extension
    desc: Alpine/Wolfi apk package filename
    for: [archives]
    if:
      type: value
      path: file.basename
      regex: '\.apk$'
      case_insensitive: true

  - id: tar-gz-archive-format
    desc: Gzip-compressed tar archive
    for: [archives]
    if:
      type: value
      path: archive.format.kind
      exact: tar.gz

  - id: alpine-pkginfo-basename
    desc: Alpine/Wolfi package info file
    for: [kotlin, pkginfo, text, data]
    if:
      type: value
      path: file.basename
      exact: .PKGINFO

  - id: alpine-pkginfo-package-field
    desc: Alpine/Wolfi package name field
    for: [kotlin, pkginfo, text, data]
    size_max: 8192
    if:
      type: raw
      regex: '(?m)^pkgname = [A-Za-z0-9_.+:-]+$'

  - id: alpine-pkginfo-version-field
    desc: Alpine/Wolfi package version field
    for: [kotlin, pkginfo, text, data]
    size_max: 8192
    if:
      type: raw
      regex: '(?m)^pkgver = [A-Za-z0-9_.+:-]+$'

  - id: alpine-pkginfo-origin-field
    desc: Alpine/Wolfi package origin field
    for: [kotlin, pkginfo, text, data]
    size_max: 8192
    if:
      type: raw
      regex: '(?m)^origin = [A-Za-z0-9_.+:-]+$'

  - id: melange-pkginfo-generator
    desc: Melange-generated package metadata
    for: [kotlin, pkginfo, text, data]
    size_max: 8192
    if:
      type: raw
      substr: "# Generated by melange"

  - id: wolfi-pkginfo-maintainer
    desc: Wolfi package maintainer field
    for: [kotlin, pkginfo, text, data]
    size_max: 8192
    if:
      type: raw
      regex: '(?m)^maintainer = wolfi$'

  - id: apk-compat-package-description
    desc: APK compatibility package description
    for: [kotlin, pkginfo, text, data]
    size_max: 8192
    if:
      type: raw
      substr: "pkgdesc = Compat package for upstream Docker image"

  - id: melange-recipe-file-entry
    desc: Melange build recipe archive entry
    for: [archives]
    if:
      type: raw
      substr: ".melange.yaml"

  - id: melange-recipe-package-block
    desc: Melange recipe package block
    for: [archives]
    size_max: 65536
    if:
      type: raw
      substr: "package:"

  - id: melange-recipe-pipeline-block
    desc: Melange recipe pipeline block
    for: [archives]
    size_max: 65536
    if:
      type: raw
      substr: "pipeline:"

  - id: melange-git-checkout-step
    desc: Melange recipe git-checkout step
    for: [archives]
    size_max: 65536
    if:
      type: raw
      substr: "- uses: git-checkout"

  - id: spdx-document-version
    desc: SPDX document version field
    for: [json]
    if:
      type: value
      path: spdxVersion
      regex: '^SPDX-[0-9]+'

  - id: spdx-document-id
    desc: SPDX document identifier
    for: [json]
    if:
      type: value
      path: SPDXID
      exact: SPDXRef-DOCUMENT

  - id: spdx-melange-namespace
    desc: Melange SPDX document namespace
    for: [json]
    if:
      type: value
      path: documentNamespace
      regex: 'spdxdocs/chainguard/melange/'

  - id: spdx-melange-creator
    desc: Melange SPDX creator
    for: [json]
    size_max: 65536
    if:
      type: text
      substr: '"Tool: melange'

  - id: spdx-wolfi-apk-purl
    desc: Wolfi APK package URL in SPDX
    for: [json]
    size_max: 65536
    if:
      type: text
      substr: "pkg:apk/wolfi/"

  - id: spdx-apk-pkginfo-source
    desc: SPDX references APK DB package info
    for: [json]
    size_max: 65536
    if:
      type: text
      substr: "acquired package info from APK DB: /.PKGINFO"

composite_rules:
  - id: alpine-apk-compressed-package
    desc: Alpine/Wolfi apk compressed package
    crit: baseline
    conf: 0.96
    all:
      - id: alpine-apk-extension
      - id: tar-gz-archive-format

  - id: alpine-apk-pkginfo
    desc: Alpine/Wolfi package info metadata
    crit: baseline
    conf: 0.97
    all:
      - id: alpine-pkginfo-basename
      - id: alpine-pkginfo-package-field
      - id: alpine-pkginfo-version-field
      - id: alpine-pkginfo-origin-field

  - id: melange-generated-apk-pkginfo
    desc: Melange-generated APK package info
    crit: baseline
    conf: 0.98
    all:
      - id: alpine-apk-pkginfo
      - id: melange-pkginfo-generator

  - id: wolfi-apk-pkginfo
    desc: Wolfi APK package info metadata
    crit: baseline
    conf: 0.98
    all:
      - id: alpine-apk-pkginfo
      - id: wolfi-pkginfo-maintainer

  - id: apk-compat-package-metadata
    desc: APK compatibility package metadata
    crit: baseline
    conf: 0.96
    all:
      - id: alpine-apk-pkginfo
      - id: apk-compat-package-description

  - id: melange-build-recipe
    desc: Melange build recipe metadata
    crit: baseline
    conf: 0.96
    all:
      - id: melange-recipe-file-entry
      - id: melange-recipe-package-block
      - id: melange-recipe-pipeline-block

  - id: melange-git-checkout-recipe
    desc: Melange build recipe with git checkout
    crit: baseline
    conf: 0.96
    all:
      - id: melange-build-recipe
      - id: melange-git-checkout-step

  - id: spdx-sbom-document
    desc: SPDX SBOM document
    crit: baseline
    conf: 0.98
    all:
      - id: spdx-document-version
      - id: spdx-document-id

  - id: melange-spdx-sbom
    desc: Melange-generated SPDX SBOM
    crit: baseline
    conf: 0.98
    all:
      - id: spdx-sbom-document
      - id: spdx-melange-namespace
      - id: spdx-melange-creator

  - id: wolfi-apk-spdx-sbom
    desc: Wolfi APK SPDX SBOM
    crit: baseline
    conf: 0.98
    all:
      - id: spdx-sbom-document
      - id: spdx-wolfi-apk-purl
      - id: spdx-apk-pkginfo-source
