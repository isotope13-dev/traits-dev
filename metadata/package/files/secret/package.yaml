defaults:
  platforms: [windows, unix]
  for: [zip]
  attack: T1195.002

traits:
  - id: packaged-dotenv-file
    desc: Archive packages dotenv file
    crit: notable
    conf: 0.88
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)\.env$'
    unless:
      - type: value
        path: "archive.members[*].path"
        regex: '(^|/)\.env\.(example|sample|template)$'
  - id: packaged-dotenv-backup-file
    desc: Archive packages dotenv backup
    crit: notable
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)\.env\.backup([._-][^/]*)?$'
  - id: packaged-secretsignore-file
    desc: Archive packages secrets ignore file
    crit: notable
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)\.secretsignore$'
