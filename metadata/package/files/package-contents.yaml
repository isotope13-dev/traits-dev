defaults:
  platforms:
    - unix
    - windows
  for: [source]
traits:
  - id: package-json-basename
    desc: Filename is package.json
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: package.json
  - id: preinstall-js-basename
    desc: Filename is preinstall.js
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: basename
      regex: "^preinstall\\.(js|cjs|mjs)$"
  - id: postinstall-js-basename
    desc: Filename is postinstall.js
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: basename
      regex: "^postinstall\\.(js|cjs|mjs)$"
  - id: install-js-basename
    desc: Filename is install.js
    crit: component
    conf: 0.85
    for: [javascript]
    unless:
      - type: text
        substr: node-gyp-build
      - type: text
        substr: node-gyp.cmd
    if:
      type: basename
      exact: "install.js"
  - id: setup-py-basename
    desc: Filename is setup.py
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: setup.py
  - id: pyproject-toml-basename
    desc: Filename is pyproject.toml
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: ^[p]yproject\.toml$
  - id: exe-extension-basename
    desc: Filename ends with .exe
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.[e]xe$
      case_insensitive: true
  - id: dll-extension-basename
    desc: Filename ends with .dll
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.[d]ll$
      case_insensitive: true
  - id: so-extension-basename
    desc: Filename ends with .so
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.so(\.[0-9]+){0,3}$
  - id: dylib-extension-basename
    desc: Filename ends with .dylib
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.dylib$
  - id: su-basename
    desc: Filename is su
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [elf, shell]
    if:
      type: basename
      exact: su
  - id: png-extension-basename
    desc: Filename ends with .png
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: \.png$
      case_insensitive: true
  - id: empty-javascript-file
    desc: Empty JavaScript file
    crit: baseline
    conf: 0.98
    for:
      - javascript
    size_max: 0
    if:
      type: basename
      regex: \.(c|m)?js$
  - id: ico-extension-basename
    desc: Filename ends with .ico
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: \.ico$
      case_insensitive: true
  - id: archive-vim-swap-member
    desc: Archive contains Vim swap file
    crit: notable
    conf: 0.92
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)\.[^/]+\.sw[nop]$'
  - id: github-module-zip-basename
    desc: GitHub module zip filename
    crit: component
    conf: 0.86
    for: [zip]
    if:
      type: basename
      regex: '^github\.com-.+-v[0-9][A-Za-z0-9._+-]*\.zip$'
  - id: archive-go-mod-entry
    desc: Archive contains go.mod
    crit: component
    conf: 0.98
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)go\.mod$'
  - id: archive-go-source-entry
    desc: Archive contains Go source
    crit: component
    conf: 0.98
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[A-Za-z0-9_.-]{1,120}\.go$'
  - id: archive-swift-package-entry
    desc: Archive contains Package.swift
    crit: baseline
    conf: 0.95
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)Package\.swift$'
  - id: vsix-manifest-entry
    desc: Archive contains VSIX manifest
    crit: baseline
    conf: 0.98
    for: [zip]
    if:
      type: raw
      substr: extension.vsixmanifest
  - id: vsix-package-json-entry
    desc: Archive contains VSIX package manifest
    crit: baseline
    conf: 0.98
    for: [zip]
    if:
      type: raw
      substr: extension/package.json
  - id: vsix-root-extension-js-entry
    desc: Archive contains root extension entrypoint
    crit: baseline
    conf: 0.95
    for: [zip]
    if:
      type: raw
      substr: extension/extension.js
composite_rules:
  - id: github-module-zip-no-go-source
    desc: GitHub module archive lacks Go source
    crit: notable
    conf: 0.92
    for: [zip]
    all:
      - id: github-module-zip-basename
    unless:
      - id: archive-go-source-entry
      - id: archive-go-mod-entry
  - id: npm-package-with-image
    desc: NPM package contains image asset
    crit: baseline
    conf: 0.75
    all:
      - id: package-json-basename
    any:
      - id: png-extension-basename
      - id: ico-extension-basename
