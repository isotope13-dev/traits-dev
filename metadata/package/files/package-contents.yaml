defaults:
  platforms:
    - unix
    - windows
  for: [source]
traits:
  - id: package-json-basename
    desc: Filename is package.json
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: package.json
  - id: setup-py-basename
    desc: Filename is setup.py
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: setup.py
  - id: pyproject-toml-basename
    desc: Filename is pyproject.toml
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: ^[p]yproject\.toml$
  - id: exe-extension-basename
    desc: Filename ends with .exe
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.[e]xe$
      case_insensitive: true
  - id: dll-extension-basename
    desc: Filename ends with .dll
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.[d]ll$
      case_insensitive: true
  - id: so-extension-basename
    desc: Filename ends with .so
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.so(\.[0-9]+){0,3}$
  - id: dylib-extension-basename
    desc: Filename ends with .dylib
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.dylib$
  - id: png-extension-basename
    desc: Filename ends with .png
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: \.png$
      case_insensitive: true
  - id: empty-javascript-file
    desc: Empty JavaScript file
    crit: baseline
    conf: 0.98
    for:
      - javascript
    size_max: 0
    if:
      type: basename
      regex: \.(c|m)?js$
  - id: ico-extension-basename
    desc: Filename ends with .ico
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: \.ico$
      case_insensitive: true
