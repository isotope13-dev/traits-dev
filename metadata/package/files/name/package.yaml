defaults:
  platforms:
    - unix
    - windows
  for: [source]
traits:
  - id: configure-script
    desc: Build configuration script
    crit: baseline
    conf: 1.0
    for: [shell, python]
    if:
      type: path
      basename: true
      regex: configure.{0,100}\.py$|configure$
  - id: rubygem-archive
    desc: Rubygem internal archive structure file
    crit: baseline
    conf: 0.98
    for: [tar, data, text]
    if:
      type: path
      basename: true
      regex: \.gem$|^(checksums\.yaml|metadata|data\.tar)\.
  - id: meta-json-zst
    desc: Compressed package metadata sidecar filename
    crit: baseline
    conf: 0.95
    for: [data, text]
    if:
      type: path
      basename: true
      exact: meta.json.zst
      case_insensitive: true
