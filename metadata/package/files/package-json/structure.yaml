defaults:
  platforms: [windows, unix]
traits:
  - id: has-build-output
    desc: Package has build output directory
    crit: notable
    conf: 0.85
    for:
      - package.json
    if:
      type: text
      regex: '"main":\\s*"(dist/|lib/|build/|out/)'
  - id: has-src-directory
    desc: Package has src directory structure
    crit: notable
    conf: 0.8
    size_min: 900
    for:
      - package.json
    if:
      type: text
      regex: '"[^"]{0,120}src/|"files":[^]]*"src"'
    unless:
      - id: metadata/package/manifest/freeform/
      - type: metrics
        field: parse.error_count
        min: 1
  - id: has-examples
    desc: Package has examples directory
    crit: notable
    conf: 0.85
    for:
      - package.json
    if:
      type: text
      regex: '"(examples?|demos?)"\\s*:|"files":[^]]*"(examples?|demos?)"'
  - id: mocks-directory
    desc: /__mocks__/ directory
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: /__mocks__/
