# Detects accidental developer-environment artifacts bundled in npm releases.
# Empty log files in a published tarball usually mean the attacker wholesale
# bundled their dev directory rather than packaging a release artifact.
defaults:
  platforms: [unix, windows]
  attack: T1195.002
  for: [text, scripts]
traits:
  - id: bundled-empty-log-file
    desc: Empty dev-environment log file bundled
    for: [data, text, json, javascript]
    crit: suspicious
    conf: 0.9
    size_max: 0
    if:
      type: path
      regex: '(?i)log(s)?[/\\][^/\\]+\.log$'
