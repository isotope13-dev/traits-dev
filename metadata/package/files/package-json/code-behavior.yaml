defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
traits:
- id: autogenerated-package-comment
  desc: Package entry file has auto-generated comment
  crit: notable
  conf: 0.82
  attack: T1195.002
  for:
  - javascript
  if:
    type: text
    regex: "//\\s*Auto-generated package"
    case_insensitive: true
- id: require-https-dup
  desc: require('https') import
  crit: notable
  conf: 0.7
  for:
  - javascript
  if:
    type: symbol
    kind: import
    exact: https
- id: null-proxy-module-export
  desc: Module exports null Proxy shim
  crit: suspicious
  conf: 0.96
  attack: T1195.002
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: "module\\.exports\\s*=\\s*new Proxy\\(\\s*\\(\\)\\s*=>\\s*null"
- id: node-modules-write
  desc: Package writes to node_modules directory
  crit: suspicious
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: (writeFile|writeFileSync|appendFile)\s*\(.{0,220}node_modules
- id: npmrc-read
  desc: Reads .npmrc file (token theft)
  crit: suspicious
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: (readFile|readFileSync)\s*\(.{0,220}\.npmrc
- id: package-json-write
  desc: Writes to package.json file
  crit: suspicious
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: writeFileSync\s*\(.{0,220}package\.json|writeFile\s*\(.{0,220}package\.json
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - type: basename
    regex: '\.(test|spec)\.[cm]?[jt]sx?(\.map)?$'
- id: placeholder-author-generic-1a-dup
  desc: 'Author field contains generic placeholder'
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    regex: ^(author|your name)$
    case_insensitive: true
- id: placeholder-author-object-name-1
  desc: Author name field contains generic placeholder
  crit: notable
  conf: 0.86
  if:
    type: value
    path: author.name
    regex: ^(author|your name|name)$
    case_insensitive: true
- id: placeholder-author-object-email-1
  desc: "Author email field has placeholder address"
  crit: notable
  conf: 0.86
  if:
    type: value
    path: author.email
    regex: ^(you|user|name)@example\.com$
    case_insensitive: true
- id: placeholder-author-object-email-2
  desc: 'placeholder author object email 2'
  crit: notable
  conf: 0.86
  if:
    type: value
    path: author.email
    regex: ^(test|example)@example\.com$
    case_insensitive: true
- id: placeholder-your-org-homepage
  desc: Homepage URL contains placeholder organization
  crit: notable
  conf: 0.9
  if:
    type: value
    path: homepage
    regex: github\.com/(your-org|your-name|example)/
    case_insensitive: true
- id: placeholder-your-org-repository
  desc: "Repository URL has placeholder organization"
  crit: notable
  conf: 0.9
  if:
    type: value
    path: repository.url
    regex: github\.com[:/](your-org|your-name|example)/
    case_insensitive: true
- id: placeholder-author-generic-2b-dup
  desc: 'Author field contains generic placeholder'
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    regex: ^(anonymous)$
    case_insensitive: true
- id: author-very-short
  desc: Author name very short (1-4 chars)
  crit: notable
  conf: 0.7
  if:
    type: value
    path: author
    regex: ^.{1,4}$
- id: desc-filler-placeholder
  desc: Description is generic filler text
  crit: notable
  conf: 0.8
  if:
    type: value
    path: description
    regex: \bpack(age)?\s+here\b
    case_insensitive: true
- id: desc-auto-generated
  desc: Description says package is auto-generated
  crit: suspicious
  conf: 0.85
  attack: T1195.002
  if:
    type: value
    path: description
    regex: generated\s+automatically
    case_insensitive: true
- id: pkg-main-resp-path
  desc: Main uses resp/ directory
  crit: notable
  conf: 0.7
  if:
    type: value
    path: main
    substr: resp/
- id: zero-byte-js-entry
  desc: Zero-byte JavaScript main entry file
  crit: suspicious
  conf: 0.90
  attack: T1195.002
  for: [javascript]
  size_max: 0
  if:
    type: path
    basename: true
    regex: ^index\.(js|mjs|cjs)$
- id: author-corp-email-dropbox
  desc: Author uses Dropbox corporate email
  crit: notable
  conf: 0.72
  attack: T1195.002
  if:
    type: value
    path: author
    regex: "@dropbox\\.com"
    case_insensitive: true
- id: placeholder-author-object-name-2--test
  desc: Author name field contains test (test)
  crit: notable
  conf: 0.86
  if:
    type: value
    path: author.name
    exact: test
- id: placeholder-author-object-name-2--user
  desc: Author name field contains test (user)
  crit: notable
  conf: 0.86
  if:
    type: value
    path: author.name
    exact: user
- id: placeholder-author-object-name-2--example
  desc: Author name field contains test (example)
  crit: notable
  conf: 0.86
  if:
    type: value
    path: author.name
    case_insensitive: true
    exact: example
- id: placeholder-author-object-name-2--sample
  desc: Author name field contains test (sample)
  crit: notable
  conf: 0.86
  if:
    type: value
    path: author.name
    case_insensitive: true
    exact: sample
- id: placeholder-author-generic-1b-dup--name
  desc: Author field contains generic placeholder (name)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    exact: name
- id: placeholder-author-generic-1b-dup--test
  desc: Author field contains generic placeholder (test)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    exact: test
- id: placeholder-author-generic-1b-dup--user
  desc: Author field contains generic placeholder (user)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    exact: user
- id: placeholder-author-generic-2a-dup--admin
  desc: Author field contains generic (admin)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    case_insensitive: true
    exact: admin
- id: placeholder-author-generic-2a-dup--example
  desc: Author field contains generic (example)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    case_insensitive: true
    exact: example
- id: placeholder-author-generic-2a-dup--sample
  desc: Author field contains generic (sample)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: author
    case_insensitive: true
    exact: sample
composite_rules:
- id: placeholder-author-object-name-2
  desc: Author name field contains test placeholder
  crit: notable
  conf: 0.86
  any:
  - id: placeholder-author-object-name-2--test
  - id: placeholder-author-object-name-2--user
  - id: placeholder-author-object-name-2--example
  - id: placeholder-author-object-name-2--sample
- id: placeholder-author-generic-1b-dup
  desc: 'Author field contains generic placeholder'
  crit: notable
  conf: 0.75
  any:
  - id: placeholder-author-generic-1b-dup--name
  - id: placeholder-author-generic-1b-dup--test
  - id: placeholder-author-generic-1b-dup--user
- id: placeholder-author-generic-2a-dup
  desc: 'Author field contains generic placeholder'
  crit: notable
  conf: 0.75
  any:
  - id: placeholder-author-generic-2a-dup--admin
  - id: placeholder-author-generic-2a-dup--example
  - id: placeholder-author-generic-2a-dup--sample
