# Dependency-directory path markers, used as FP-suppression context by other
# rules around installed dependency trees and cached dependency archives.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, json]
  size_min: 1
  size_max: 500000000
  crit: component
traits:
  - id: node-modules-path
    desc: File located under a node_modules directory
    if:
      type: path
      regex: '[\\/]node_modules[\\/]'
  - id: node-modules-nested-package-json
    desc: package.json nested under node_modules
    if:
      type: path
      regex: '(^|[\\/])node_modules[\\/].{0,400}[\\/]package\.json$'
  - id: ruby-vendor-bundle-gem-path
    desc: "File under Bundler vendor dependency path"
    for: [ruby, javascript, shell, data]
    if:
      type: path
      regex: 'vendor[\\/]bundle[\\/]ruby[\\/][^\\/]+[\\/](gems|cache)[\\/]'
