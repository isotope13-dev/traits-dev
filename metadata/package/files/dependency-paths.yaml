# Dependency-directory path markers (node_modules), used as FP-suppression
# context by other rules (excluding vendored/installed dependencies).
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, json]
  size_min: 1
  size_max: 500000000
  crit: component
traits:
  - id: node-modules-path
    desc: File located under a node_modules directory
    if:
      type: path
      basename: true
      regex: '[\\/]node_modules[\\/]'
  - id: node-modules-nested-package-json
    desc: package.json nested under node_modules
    if:
      type: path
      basename: true
      regex: '(^|[\\/])node_modules[\\/].{0,400}[\\/]package\.json$'
