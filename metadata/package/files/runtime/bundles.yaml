defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]

traits:
  - id: runtime-bundle-lsp-js
    desc: Runtime bundle named lsp.js
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      exact: lsp.js

  - id: runtime-bundle-main-js
    desc: Runtime bundle named main.js
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      exact: main.js

  - id: runtime-bundle-flowchart-js
    desc: Runtime flowchart bundle filename
    crit: baseline
    conf: 1.0
    if:
      type: path
      basename: true
      regex: '^flowchart-elk-definition-.{1,40}\.js$'

  - id: electron-resources-app-asar
    desc: Electron resources app.asar member
    crit: baseline
    conf: 0.9
    # Native addon source can also live under resources/app.asar.unpacked;
    # recognizing that member context keeps framework code from being treated
    # as a standalone native payload.
    for: [javascript, data, c, cpp]
    size_max: 268435456
    if:
      type: path
      regex: 'resources[\\/]app\.asar'
