# PyPI package metadata anomalies
# Detects suspicious patterns in setup.py / pyproject.toml / PKG-INFO metadata
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms: [unix, windows]
  for: [python, pyproject.toml, pkginfo]
  attack: T1195.002
traits:
  # Version mismatch: setup.py declares a different version than pyproject.toml/PKG-INFO
  - id: setup-py-version-kwarg
    desc: setup.py version differs from package metadata
    crit: component
    conf: 0.82
    for: [python]
    if:
      type: text
      # Matches version='X.YY' in Python kwarg context (after newline, comma, or open-paren).
      # Anchored to setup()-call context so XML attributes like <?xml version="1.0"?>
      # in unrelated Python files do not match.
      regex: '[\n,(]\s*version\s*=\s*[''"]\d+\.\d+[''"]'
    unless:
      - type: text
        # Legitimate version patterns: 0.x, 1.0, 2.0, etc.
        regex: version\s*=\s*['"]0\.\d+['"]
      - type: text
        # Match version that starts with current year (e.g. 2024.x)
        regex: version\s*=\s*['"]20[12]\d\.\d+['"]
  # Missing module: setup.py references packages that don't exist in the source tree
  - id: setup-py-missing-package-dir
    desc: "setup.py references non-existent package dir"
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: text
      # Matches packages=['modlib'] or packages = ['modlib'] in setup.py
      # Single-package references are common in malicious packages
      regex: packages\s*=\s*\[\s*['"][a-z_]+['"]\s*\]
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/quality/profile/
      - id: metadata/package/quality/false-positives::dwex-packaging-context
composite_rules:
  - id: setup-py-version-mismatch
    desc: setup.py version differs from package metadata
    crit: notable
    conf: 0.82
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: setup-py-version-kwarg
    unless:
      - id: metadata/package/quality/false-positives::dwex-packaging-context
  - id: pypi-metadata-inconsistency
    desc: Python package metadata inconsistency
    crit: notable
    conf: 0.90
    all:
      - id: setup-py-version-mismatch
      - id: setup-py-missing-package-dir
    unless:
      - id: metadata/package/quality/false-positives::bind9-python-setup-path
      - id: metadata/package/quality/false-positives::dwex-packaging-context
      - id: metadata/build/conda::conda-recipe-tree-setup-py-path
