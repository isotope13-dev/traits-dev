defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  crit: notable
traits:
  - id: from-setuptools-import
    desc: from setuptools import statement
    crit: component
    conf: 0.7
    if:
      type: text
      regex: from\s+setuptools\s+import
  - id: import-setuptools
    desc: import setuptools statement
    crit: component
    conf: 0.7
    if:
      type: text
      regex: import\s+setuptools
  - id: distutils
    desc: Python package distribution (distutils)
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: import distutils
  - id: distutils-command-import-content
    desc: Python distutils setup or command import
    crit: component
    conf: 0.8
    ref: sha256:98cf2b942c5daa7a4e2e32ed3a4cf83d1b8f86ae6868bfae35392621fca6b5a9
    if:
      type: text
      # Old-style packaging/setup distutils imports. Generic utility submodules
      # such as distutils.spawn/version/util should stay out of this signal.
      regex: from distutils\S{0,6} import[\w,\s]{0,60}\bsetup\b|distutils\.command
    unless:
      - type: basename
        exact: common_ship.py
      - id: metadata/build/autotools::autoconf-generated-script
  - id: setup-call
    desc: Python package setup() definition
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: setup(
  - id: setup-packages-find-packages
    desc: setup() uses find_packages()
    crit: component
    conf: 0.86
    # `packages=find_packages()` keyword argument — distinctive as source text.
    if:
      type: text
      regex: 'packages\s*=\s*find_packages\s*\('
  - id: setup-find-packages-exclude-tests
    desc: find_packages() excludes only tests
    crit: component
    conf: 0.84
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'find_packages'
  - id: setup-zip-safe-false
    desc: setup() sets zip_safe False
    crit: component
    conf: 0.8
    # `zip_safe=False` keyword argument.
    if:
      type: text
      regex: 'zip_safe\s*=\s*False\b'
  - id: directory-masquerade-dup
    desc: Python file path constructed with os.path.join
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: os\.path\.join\(.{0,50}\.py.{0,30}\)
  - id: cmdclass-dict
    desc: cmdclass dict assignment
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: cmdclass\s*=\s*\{
  - id: install-class-inherit
    desc: class inheriting from install
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: class\s+\w+\(install\)
  - id: setup-py-crlf-padding
    desc: setup.py ends with CRLF padding
    crit: component
    conf: 0.72
    size_max: 4096
    if:
      type: text
      regex: '(\r\n[ \t]+){10,}$'
  - id: setup-py-trailing-whitespace
    desc: setup.py has trailing whitespace
    crit: component
    conf: 0.72
    size_max: 4096
    unless:
      - type: basename
        regex: '(^|[\\/])[^\\/]*(TOOL|tool)\.py$'
    if:
      type: metrics
      field: "text.trailing_whitespace_lines"
      min: 10
  - id: python-wheel-vendored-shlib-dir
    desc: Python wheel vendored shared library dir
    crit: component
    conf: 0.9
    for: [python, elf, so, macho]
    if:
      type: path
      regex: '\.dylibs[\\/]|\.libs[\\/]'
  - id: nvidia-cudnn-wheel-library
    desc: NVIDIA cuDNN wheel library
    crit: component
    conf: 0.92
    for: [elf, so]
    if:
      type: path
      regex: 'nvidia[\\/]cudnn|libcudnn_'
composite_rules:
  - id: setuptools
    desc: Python package distribution (setuptools)
    crit: component
    conf: 0.8
    any:
      - id: from-setuptools-import
      - id: import-setuptools
  - id: metadata
    desc: Python package metadata definition
    crit: component
    conf: 0.7
    any:
      - id: metadata/package/manifest/author/identity::metadata-author
      - id: metadata/package/versioning::metadata-version
      - id: metadata/package/manifest/description::metadata-description
      - id: metadata/package/manifest/ecosystem::metadata-packages
  - id: cmdclass-override
    desc: Custom install command class override
    crit: suspicious
    conf: 0.85
    any:
      - id: cmdclass-dict
      - id: install-class-inherit
  - id: minimal-find-packages-setup
    desc: Minimal find_packages setuptools setup
    crit: notable
    conf: 0.82
    all:
      - id: setup-packages-find-packages
      - id: setup-find-packages-exclude-tests
      - id: setup-zip-safe-false
  - id: minimal-placeholder-setup
    desc: Minimal placeholder-style setup.py
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/build/pip::setup-py
      - id: minimal-find-packages-setup
      - id: metadata/file/metrics::file-under-12-lines
    unless:
      - id: objectives/supply-chain/install-hook/dropper/dependency::install-requires-assignment
      - id: metadata/build/package::setup-cmdclass-install
      - id: install-class-inherit
      - id: metadata/package/scripts::setup-entry-points-field
      - id: metadata/package/scripts::setup-scripts-field
  - id: setup-crlf-whitespace-layout
    desc: setup.py has CRLF padded whitespace
    crit: notable
    conf: 0.76
    all:
      - id: metadata/build/pip::setup-py
      - id: setup-py-crlf-padding
      - id: setup-py-trailing-whitespace
