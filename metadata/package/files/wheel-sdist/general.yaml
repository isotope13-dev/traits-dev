defaults:
  platforms:
    - unix
    - windows
  crit: notable
  for: [pkginfo]
traits:
  - id: empty-classifiers
    desc: Empty classifiers list
    crit: notable
    conf: 0.85
    if:
      type: value
      path: classifiers
      size_max: 0
  - id: unknown-license
    desc: PKG-INFO has UNKNOWN license
    crit: notable
    conf: 0.75
    if:
      type: value
      path: license
      exact: UNKNOWN
  - id: unknown-platform
    desc: PKG-INFO has UNKNOWN platform
    crit: baseline
    conf: 0.7
    if:
      type: value
      path: platform
      exact: UNKNOWN
  - id: wheel-hyphenated-top-level-package
    desc: Wheel top_level has hyphenated module
    crit: notable
    conf: 0.86
    for: [whl]
    if:
      type: value
      path: "whl.top_level_packages[*]"
      regex: '[A-Za-z0-9_]-[A-Za-z0-9_]'
  - id: wheel-opaque-pz-payload-member
    desc: Wheel carries opaque .pz payload member
    crit: suspicious
    conf: 0.9
    for: [whl]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]{1,120}\.pz$'
  - id: wheel-dist-info-member
    desc: Wheel contains a distribution-metadata member
    crit: component
    conf: 0.95
    for: [whl]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]+\.dist-info/[^/]+$'
  - id: empty-description
    desc: Package has empty description field
    crit: notable
    conf: 0.8
    if:
      type: value
      path: description
      exact: ""
  - id: suspicious-single-dependency
    desc: "Package w/ suspicious single dependency"
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: requires-dist
      size_min: 1
      size_max: 1
  - id: missing-homepage
    desc: Package missing homepage URL
    crit: notable
    conf: 0.65
    if:
      type: value
      path: home_page
      exact: null
  - id: python-314-classifier
    desc: Python 3.14 classifier
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "Classifier: Programming Language :: Python :: 3.14"
  - id: python-314-not-supported-doc
    desc: Python 3.14 unsupported doc
    crit: component
    conf: 0.84
    if:
      type: text
      substr: 3.14 is **not** supported
  - id: python-314-pinned-out-doc
    desc: Python 3.14 pinned out doc
    crit: component
    conf: 0.8
    if:
      type: text
      substr: 3.14 is not supported yet
  - id: pypi-egg-info-dependency-links
    desc: PyPI sdist includes dependency_links metadata
    crit: component
    conf: 0.86
    for: [tar]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]+\.egg-info/dependency_links\.txt$'
  - id: pypi-sdist-scr-source-layout
    desc: PyPI sdist uses scr source layout
    crit: notable
    conf: 0.78
    for: [tar]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)scr/[^/]+\.egg-info/top_level\.txt$'
composite_rules:
  - id: empty-description-and-classifiers
    desc: Package has empty description and empty classifiers
    crit: suspicious
    conf: 0.85
    all:
      - id: empty-description
      - id: empty-classifiers
  - id: python-314-classifier-conflicts-docs
    desc: Python 3.14 classifier conflicts with docs
    crit: notable
    conf: 0.86
    all:
      - id: python-314-classifier
    any:
      - id: python-314-not-supported-doc
      - id: python-314-pinned-out-doc
    near_lines: 80
