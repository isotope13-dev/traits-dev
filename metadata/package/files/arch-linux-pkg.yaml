defaults:
  platforms: [linux]
  for: [text, kotlin]

traits:
  - id: arch-pkg-tar-extension
    desc: Arch package archive filename
    crit: baseline
    conf: 0.95
    for: [tar]
    if:
      type: basename
      regex: '\.pkg\.tar\.(zst|xz|gz)$'
      case_insensitive: true

  - id: arch-makepkg-generated
    desc: Arch makepkg generated metadata
    crit: component
    conf: 0.96
    if:
      type: text
      substr: '# Generated by makepkg '

  - id: arch-pkgname-field
    desc: Arch pkgname metadata field
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?m)^pkgname = .{1,120}$'

  - id: arch-pkgver-field
    desc: Arch pkgver metadata field
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?m)^pkgver = .{1,80}$'

  - id: arch-package-arch-field
    desc: Arch package architecture field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^arch = (x86_64|aarch64|any)$'

composite_rules:
  - id: arch-pkginfo-manifest
    desc: Arch package metadata manifest
    crit: baseline
    conf: 0.97
    all:
      - id: arch-makepkg-generated
      - id: arch-pkgname-field
      - id: arch-pkgver-field
    any:
      - id: arch-package-arch-field
    needs: 1
