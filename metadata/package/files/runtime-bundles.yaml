defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]

traits:
  - id: runtime-bundle-lsp-js
    desc: Runtime bundle named lsp.js
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: lsp.js

  - id: runtime-bundle-main-js
    desc: Runtime bundle named main.js
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: main.js

  - id: runtime-bundle-flowchart-js
    desc: Runtime flowchart bundle filename
    crit: component
    conf: 1.0
    if:
      type: basename
      regex: '^flowchart-elk-definition-.{1,40}\.js$'

composite_rules:
  - id: extension-runtime-bundle
    desc: Extension runtime chunk bundle
    crit: baseline
    conf: 0.9
    any:
      - id: runtime-bundle-lsp-js
      - id: runtime-bundle-main-js
      - id: runtime-bundle-flowchart-js
