composite_rules:
  - id: extconf-missing-create-makefile
    desc: extconf.rb script missing create_makefile call (suspicious/dropper)
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/build/package::filename-extconf
    any:
      - id: metadata/package/files/rubygems::extconf-file-manipulation
    unless:
      - id: metadata/build/package::extconf-native-build-helper
  - id: extconf-file-manipulation
    desc: extconf.rb performs file manipulation
    crit: notable
    conf: 0.75
    all:
      - id: metadata/build/package::filename-extconf
    any:
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-file-rename
      - id: micro-behaviors/fs/file/delete::ruby-file-delete-call
      - id: micro-behaviors/fs/directory/delete::ruby-fileutils-rm-rf
      - id: micro-behaviors/fs/file/rename::ruby-rename
  - id: suspicious-extension-path-1
    desc: Media file in native extension directory (img/bmp)
    crit: suspicious
    conf: 0.9
    any:
      - id: suspicious-extension-path-img
      - id: suspicious-extension-path-bmp
  - id: suspicious-extension-path-2
    desc: Media file in native extension directory (ico/webp/tiff)
    crit: suspicious
    conf: 0.9
    any:
      - id: suspicious-extension-path-ico
      - id: suspicious-extension-path-webp
      - id: suspicious-extension-path-tiff
  - id: suspicious-extension-path
    desc: Media file in native extension directory
    crit: suspicious
    conf: 0.9
    any:
      - id: suspicious-extension-path-1
      - id: suspicious-extension-path-2
defaults:
  platforms:
    - unix
    - windows
  for:
    - ruby
traits:
  - id: gemspec-file
    desc: RubyGems gemspec file
    crit: baseline
    conf: 0.95
    ref: https://guides.rubygems.org/specification-reference/
    if:
      type: path
      regex: '\.gemspec$'
  - id: hidden-ruby-dotfile-member
    desc: RubyGems contains a hidden Ruby dotfile
    crit: notable
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '^\.[^/]+\.rb$'
  - id: suspicious-extension-path-img
    desc: Image file in native extension
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ext/.{0,100}\.(png|jpg|jpeg|gif)
  - id: suspicious-extension-path-bmp
    desc: BMP file in native extension
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ext/.{0,100}\.bmp
  - id: suspicious-extension-path-ico
    desc: ICO/SVG file in native extension
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ext/.{0,100}\.(ico|svg)
  - id: suspicious-extension-path-webp
    desc: WEBP file in native extension
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ext/.{0,100}\.webp
  - id: suspicious-extension-path-tiff
    desc: TIFF file in native extension
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ext/.{0,100}\.(tiff|tif)
