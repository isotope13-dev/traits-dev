defaults:
  for: [archives]
  platforms: [android]
  crit: component
  conf: 0.86

traits:
  - id: archive-android-manifest-member
    desc: Archive contains AndroidManifest.xml member
    if:
      type: value
      path: "archive.members[*].path"
      exact: AndroidManifest.xml

  - id: archive-primary-dex-member
    desc: Archive contains primary DEX member
    if:
      type: value
      path: "archive.members[*].path"
      exact: classes.dex

  - id: archive-resources-arsc-member
    desc: Archive contains Android resources table
    if:
      type: value
      path: "archive.members[*].path"
      exact: resources.arsc

  - id: archive-bndtool-sf-member
    desc: Bundletool APK signature manifest
    crit: baseline
    conf: 0.94
    if:
      type: value
      path: "archive.members[*].path"
      exact: META-INF/BNDLTOOL.SF

  - id: archive-bndtool-rsa-member
    desc: Bundletool APK signing certificate
    crit: baseline
    conf: 0.94
    if:
      type: value
      path: "archive.members[*].path"
      exact: META-INF/BNDLTOOL.RSA

  - id: archive-stamp-cert-member
    desc: APK signing stamp certificate digest
    crit: baseline
    conf: 0.94
    if:
      type: value
      path: "archive.members[*].path"
      exact: stamp-cert-sha256

  - id: apk-secondary-dex
    desc: APK contains secondary DEX
    if:
      type: value
      path: "archive.members[*].path"
      exact: classes2.dex

  - id: apk-multiple-secondary-dex
    crit: notable
    desc: APK contains many DEX files
    conf: 0.88
    for: [apk]
    count_min: 4
    if:
      type: raw
      regex: "classes([2-9]|[1-9][0-9]+)\\.dex"

  - id: apk-asset-dex-member
    desc: APK contains DEX payload under assets
    crit: notable
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/[^/]+\\.dex$"

  - id: apk-sdk-internal-opaque-assets
    desc: APK has SDK-namespaced opaque assets
    crit: suspicious
    conf: 0.9
    ref: sha256:093c727149837d576d10f843edce933436efe648e74b9008ccd91badf197fc5c
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/com/[a-z0-9]+/internal/[a-f0-9]{16}-$"
    downgrade:
      all:
        - id: micro-behaviors/os/telemetry/activity::appsflyer-event-endpoint
        - id: apk-multiple-secondary-dex
        - id: apk-face-landmarker-model

  - id: apk-face-landmarker-model
    desc: APK includes the MediaPipe face landmarker model
    crit: notable
    conf: 0.98
    for: [apk]
    if:
      type: value
      path: "archive.members[*].path"
      exact: assets/face_landmarker.task

  - id: apk-opaque-consonant-jni-library-member
    desc: Opaque consonant-only JNI library name
    crit: suspicious
    conf: 0.88
    ref: sha256:093c727149837d576d10f843edce933436efe648e74b9008ccd91badf197fc5c
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^lib/(arm64-v8a|armeabi-v7a|x86|x86_64)/lib[b-df-hj-np-tv-z]{10,16}\\.so$"

  - id: xapk-opaque-consonant-jni-split-pair
    desc: Opaque consonant-only JNI split pair
    crit: suspicious
    conf: 0.9
    ref: sha256:093c727149837d576d10f843edce933436efe648e74b9008ccd91badf197fc5c
    if:
      type: text
      regex: "lib/(arm64-v8a|armeabi-v7a)/lib[b-df-hj-np-tv-z]{10,16}\\.so"
    count_min: 2

composite_rules:
  - id: android-bundletool-resource-split
    desc: Bundletool-generated Android resource-only split APK
    crit: baseline
    conf: 0.98
    all:
      - id: archive-android-manifest-member
      - id: archive-resources-arsc-member
      - id: archive-bndtool-sf-member
      - id: archive-bndtool-rsa-member
      - id: archive-stamp-cert-member
    unless:
      - id: archive-primary-dex-member
  - id: android-resource-only-split-apk
    desc: Android resource-only split APK with signing stamp
    crit: baseline
    conf: 0.98
    all:
      - id: archive-android-manifest-member
      - id: archive-resources-arsc-member
      - id: archive-stamp-cert-member
    unless:
      - id: archive-primary-dex-member
  - id: android-apk-archive-layout
    desc: Android APK archive layout
    crit: baseline
    conf: 0.96
    all:
      - id: archive-android-manifest-member
      - id: archive-primary-dex-member
      - id: archive-resources-arsc-member

  - id: android-apk-opaque-loader-layout
    desc: Android APK opaque loader layout
    crit: suspicious
    conf: 0.93
    ref: sha256:093c727149837d576d10f843edce933436efe648e74b9008ccd91badf197fc5c
    all:
      - id: android-apk-archive-layout
      - id: apk-sdk-internal-opaque-assets
    downgrade:
      all:
        - id: micro-behaviors/os/telemetry/activity::appsflyer-event-endpoint
        - id: apk-multiple-secondary-dex
        - id: apk-face-landmarker-model
