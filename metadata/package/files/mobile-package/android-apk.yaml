defaults:
  for: [archives]
  platforms: [android]
  crit: component
  conf: 0.86

traits:
  - id: apk-secondary-dex
    desc: APK contains secondary DEX
    if:
      type: text
      substr: "classes2.dex"

  - id: apk-multiple-secondary-dex
    crit: notable
    desc: APK contains many DEX files
    conf: 0.88
    count_min: 4
    if:
      type: text
      regex: "classes[2-9]\\.dex"
