defaults:
  for: [archives]
  platforms: [android]
  crit: component
  conf: 0.86

traits:
  - id: archive-android-manifest-member
    desc: Archive contains AndroidManifest.xml member
    if:
      type: value
      path: "archive.members[*].path"
      exact: AndroidManifest.xml

  - id: archive-primary-dex-member
    desc: Archive contains primary DEX member
    if:
      type: value
      path: "archive.members[*].path"
      exact: classes.dex

  - id: archive-resources-arsc-member
    desc: Archive contains Android resources table
    if:
      type: value
      path: "archive.members[*].path"
      exact: resources.arsc

  - id: apk-secondary-dex
    desc: APK contains secondary DEX
    if:
      type: value
      path: "archive.members[*].path"
      exact: classes2.dex

  - id: apk-multiple-secondary-dex
    crit: notable
    desc: APK contains many DEX files
    conf: 0.88
    for: [apk]
    count_min: 4
    if:
      type: raw
      regex: "classes([2-9]|[1-9][0-9]+)\\.dex"

  - id: apk-asset-dex-member
    desc: APK contains DEX payload under assets
    crit: notable
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/[^/]+\\.dex$"

composite_rules:
  - id: android-apk-archive-layout
    desc: Android APK archive layout
    crit: baseline
    conf: 0.96
    all:
      - id: archive-android-manifest-member
      - id: archive-primary-dex-member
      - id: archive-resources-arsc-member
