defaults:
  for: [archives]
  platforms: [android]
  crit: baseline
  conf: 0.9

traits:
  - id: archive-xapk-manifest
    desc: XAPK manifest sidecar
    conf: 0.95
    if:
      type: text
      substr: '"xapk_version"'

  - id: archive-android-apk-member
    desc: Archive contains Android APK member
    conf: 0.92
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[^/]+\.apk$'

  - id: archive-android-config-split-apk
    desc: Archive contains Android config split APK
    conf: 0.94
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^config\.(arm64_v8a|armeabi_v7a|x86(_64)?)\.apk$'

  - id: archive-nested-apk-count
    desc: Archive contains multiple nested APKs
    conf: 0.9
    if:
      type: metrics
      field: archive.nested_archive_count
      min: 2

composite_rules:
  - id: android-xapk-bundle
    desc: Android XAPK split bundle
    conf: 0.96
    all:
      - id: archive-android-apk-member
      - id: archive-android-config-split-apk
    any:
      - id: archive-xapk-manifest
      - id: archive-nested-apk-count
