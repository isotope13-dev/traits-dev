defaults:
  platforms: [unix, windows]
  for: [shell, powershell, data, text]
traits:
  - id: conda-shell-activation-layout
    desc: Conda shell activation files
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '(etc/profile\.d/conda\.(sh|csh)|shell/condabin/Conda\.psm1|condabin/conda-hook\.ps1)'
