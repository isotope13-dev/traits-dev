defaults:
  platforms: [windows]
  for: [manifests]
traits:
  - id: nuspec-dependencies
    desc: NuGet package declares dependencies
    crit: baseline
    conf: 0.9
    for: [xml]
    if:
      type: text
      regex: '<package\b[\s\S]{0,800}<metadata\b[\s\S]{0,800}<dependencies>[\s\S]{0,900}<dependency\b'
  - id: nuspec-repository
    desc: NuGet package declares repository
    crit: baseline
    conf: 0.9
    for: [xml]
    if:
      type: text
      regex: '<package\b[\s\S]{0,800}<metadata\b[\s\S]{0,800}<repository\b.{0,240}\b(type|url|commit)='
  - id: empty-title-raw
    desc: Empty NuGet title field
    crit: component
    conf: 0.85
    for: [xml]
    if:
      type: text
      regex: '<metadata\b.{0,50}>[\s\S]{0,900}<title>\s*</title>'
  - id: empty-owners-raw
    desc: Empty NuGet owners field
    crit: component
    conf: 0.85
    for: [xml]
    if:
      type: text
      regex: '<metadata\b.{0,50}>[\s\S]{0,900}<owners>\s*</owners>'
  - id: placeholder-description-raw
    desc: Placeholder NuGet description
    crit: component
    conf: 0.9
    for: [xml]
    if:
      type: text
      regex: '<metadata\b.{0,50}>[\s\S]{0,900}<description>\s*\.\.\.\s*</description>'
composite_rules:
  - id: empty-title
    desc: NuGet package has empty title
    crit: baseline
    conf: 0.86
    all:
      - id: metadata/build/manifest::nuspec-file
      - id: empty-title-raw
  - id: empty-owners
    desc: NuGet package has empty owners
    crit: baseline
    conf: 0.86
    all:
      - id: metadata/build/manifest::nuspec-file
      - id: empty-owners-raw
  - id: placeholder-description
    desc: NuGet package uses placeholder description
    crit: notable
    conf: 0.9
    all:
      - id: metadata/build/manifest::nuspec-file
      - id: placeholder-description-raw
  - id: hollow-nuget-metadata
    desc: NuGet package with hollow metadata
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: empty-title
      - id: empty-owners
      - id: placeholder-description
