defaults:
  platforms: [windows]
  for: [nupkg, archives]
  crit: notable
  conf: 0.9

traits:
  - id: chocolatey-install-script-member
    desc: NuGet contains Chocolatey install script
    ref: sha256:c0b1dd711360b1389cb8e44f2e984d971ba6d3ab8c59da42eb8b12bdc1b4189a
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)tools/chocolateyinstall\.ps1$'
  - id: chocolatey-process-as-admin-helper
    desc: Chocolatey admin process helper
    crit: notable
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: '(?i)Start-ChocolateyProcessAsAdmin'
