defaults:
  platforms: [windows]
composite_rules:
  - id: nuget-package-with-loader-dll
    desc: NuGet package with staged loader DLL
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/build/manifest::nuspec-file
      - id: metadata/package/files/included::dll-extension-basename
    any:
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-resource-zip-stage-loader
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-admin-batch-stage-loader
  - id: nuget-package-hollow-metadata-loader
    desc: NuGet loader with hollow metadata
    crit: suspicious
    conf: 0.95
    all:
      - id: nuget-package-with-loader-dll
      - id: metadata/package/files/nuget::hollow-nuget-metadata
