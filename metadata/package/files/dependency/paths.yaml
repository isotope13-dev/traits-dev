# Dependency-directory path markers, used as FP-suppression context by other
# rules around installed dependency trees and cached dependency archives.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, json, package.json]
  size_min: 1
  size_max: 500000000
  crit: component
traits:
  - id: node-modules-path
    desc: File located under a node_modules directory
    if:
      type: path
      substr: node_modules
  - id: node-modules-nested-package-json
    desc: package.json nested under node_modules
    if:
      type: path
      regex: 'node_modules[\\/].{0,200}[\\/]package\.json$'
  - id: ruby-vendor-bundle-gem-path
    desc: "File under Bundler vendor dependency path"
    for: [ruby, javascript, shell, data]
    if:
      type: path
      regex: 'ruby[\\/].{1,80}(gems|cache)'
  - id: composer-vendor-path
    desc: Composer vendor dependency path
    for: [php, javascript]
    if:
      type: path
      regex: '(^|[\\/])vendor[\\/]'
  - id: native-vendor-dependency-path
    desc: File under vendored native dependency path
    for: [c, cpp, objc, rust]
    if:
      type: path
      regex: '(^|[\\/])(vendor|extern)[\\/]'
