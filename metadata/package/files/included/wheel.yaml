defaults:
  platforms: [unix, windows]
  for: [whl]
  crit: notable
  conf: 0.9

traits:
  - id: wheel-key-container-member
    desc: Wheel includes key container member
    crit: suspicious
    conf: 0.92
    attack: T1552.004
    if:
      type: value
      path: archive.members[*].path
      # PKCS#12/PFX members can carry private keys even when the filename is
      # not literally .key.
      regex: '(^|/)[^/]+\.(key|p12|pfx)$'
  - id: wheel-hidden-secret-path
    desc: Wheel includes hidden secret path
    crit: notable
    conf: 0.92
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)\.duck/secrets/[^/]+$'
