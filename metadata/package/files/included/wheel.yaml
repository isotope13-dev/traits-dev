defaults:
  platforms: [unix, windows]
  for: [whl, npm, python-sdist, gem, egg, nupkg, crate]
  crit: notable
  conf: 0.9

traits:
  - id: package-key-container-member
    desc: Package archive includes key container member
    crit: suspicious
    conf: 0.92
    attack: T1552.004
    if:
      type: value
      path: archive.members[*].path
      # PKCS#12/PFX members can carry private keys even when the filename is
      # not literally .key.
      regex: '(^|/)[^/]+\.(key|p12|pfx)$'
    # Test fixtures are intentionally allowed to carry certificate material;
    # they are not package credentials shipped for runtime use.
    unless:
      - type: value
        path: archive.members[*].path
        regex: '(^|/)[^/]*(tmp|test|spec)[^/]*/'
      - id: well-known/app/bbbike::source-archive
      - id: well-known/app/nss::nss-crypto-test-data
      - id: metadata/package/testing/presence/fixture::certificate-test-corpus
      - type: basename
        exact: PKITS_data.zip
      # Package test trees commonly keep TLS fixtures in tmp/test/spec dirs.
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/package/quality/source::go-module-proxy-source-archive-member
  - id: wheel-hidden-secret-path
    desc: Wheel includes hidden secret path
    crit: notable
    conf: 0.92
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)\.duck/secrets/[^/]+$'
  - id: wheel-lacks-start-shell
    desc: Wheel has no start.sh launcher member
    crit: component
    conf: 0.9
    for: [whl]
    if:
      type: value
      path: archive.members[*].path
      regex: '.+'
    unless:
      - type: value
        path: archive.members[*].path
        regex: '(^|/)start\.sh$'
