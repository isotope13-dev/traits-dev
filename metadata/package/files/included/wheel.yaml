defaults:
  platforms: [unix, windows]
  for: [whl]
  crit: notable
  conf: 0.9

traits:
  - id: wheel-bundles-private-key-or-hidden-secret
    desc: Wheel includes private key or hidden secret
    crit: suspicious
    conf: 0.92
    attack: T1552.004
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)([^/]+\.key|\.duck/secrets/[^/]+)$'
