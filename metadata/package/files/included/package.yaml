defaults:
  platforms:
    - unix
    - windows
  for: [source]
traits:
  - id: package-json-basename
    desc: Filename is package.json
    crit: component
    conf: 0.95
    for: [package.json]
    if:
      type: path
      basename: true
      exact: package.json
  - id: npm-package-scripts-member
    desc: JavaScript under npm package scripts dir
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: path
      regex: 'package[\\/]scripts[\\/]'
  - id: javascript-dist-tree-artifact
    desc: JavaScript file under dist
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)dist/'
  - id: typescript-source-tree-artifact
    desc: Source file under src
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)src/'
  - id: browser-dist-tree-artifact
    desc: Browser file under dist.browser
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)dist\\.browser/'
  - id: jsii-metadata-basename
    desc: JSII package metadata file
    crit: component
    conf: 0.99
    for: [data, json, kotlin, class, java_class, jar]
    if:
      type: path
      basename: true
      exact: .jsii
  - id: archive-nested-package-json-entry
    desc: Archive contains nested package.json
    crit: component
    conf: 0.9
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/[^/]+/package\.json$'
  - id: archive-npm-registry-info-sidecar
    desc: Archive has npm registry info sidecar
    crit: component
    conf: 0.9
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)package_info-[^/]+\.json$'
  - id: preinstall-js-basename
    desc: Filename is preinstall.js
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: path
      basename: true
      regex: "^preinstall\\.(js|cjs|mjs)$"
  - id: postinstall-js-basename
    desc: Filename is postinstall.js
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: path
      basename: true
      regex: "^postinstall\\.(js|cjs|mjs)$"
  - id: install-js-basename
    desc: Filename is install.js
    crit: component
    conf: 0.85
    for: [javascript]
    unless:
      - type: text
        substr: node-gyp-build
      - type: text
        substr: node-gyp.cmd
    if:
      type: path
      basename: true
      exact: "install.js"
  - id: install-uninstall-shell-basename
    desc: Installer or uninstaller shell script basename
    crit: baseline
    conf: 0.95
    for: [shell]
    if:
      type: path
      basename: true
      regex: '(?i)(uninstall|installer|install)([-_][^\\/]*)?\.sh$'
  - id: setup-py-basename
    desc: Filename is setup.py
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: path
      basename: true
      exact: setup.py

  - id: pyproject-toml-basename
    desc: Filename is pyproject.toml
    crit: component
    conf: 0.95
    for: [pyproject.toml]
    if:
      type: path
      basename: true
      regex: ^[p]yproject\.toml$
  - id: exe-extension-basename
    desc: Filename ends with .exe
    crit: component
    conf: 0.95
    for: [pe]
    if:
      type: path
      basename: true
      regex: \.[e]xe$
      case_insensitive: true
  - id: dll-extension-basename
    desc: Filename ends with .dll
    crit: component
    conf: 0.95
    for: [pe]
    if:
      type: path
      basename: true
      regex: \.[d]ll$
      case_insensitive: true
  - id: so-extension-basename
    desc: Filename ends with .so
    crit: component
    conf: 0.95
    for: [elf]
    if:
      type: path
      basename: true
      regex: \.so(\.[0-9]+){0,3}$
  - id: dylib-extension-basename
    desc: Filename ends with .dylib
    crit: component
    conf: 0.95
    for: [macho]
    if:
      type: path
      basename: true
      regex: \.dylib$
  - id: su-basename
    desc: Filename is su
    crit: component
    conf: 0.95
    platforms: [unix]
    for: [elf, shell]
    if:
      type: path
      basename: true
      exact: su
  - id: png-extension-basename
    desc: File has a .png extension
    crit: component
    conf: 0.9
    for: [png]
    if:
      type: path
      basename: true
      regex: \.png$
      case_insensitive: true
  - id: screenshot-directory-asset-path
    desc: Asset path under screenshots directory
    crit: component
    conf: 0.9
    for: [png]
    if:
      type: path
      regex: '(^|[\\/])screenshots[\\/]'
  - id: empty-javascript-file
    desc: Empty JavaScript file
    crit: baseline
    conf: 0.98
    for:
      - javascript
    size_max: 0
    if:
      type: path
      basename: true
      regex: \.(c|m)?js$
  - id: ico-extension-basename
    desc: Filename ends with .ico
    crit: component
    conf: 0.9
    for: [data]
    if:
      type: path
      basename: true
      regex: \.ico$
      case_insensitive: true
  - id: archive-vim-swap-member
    desc: Archive contains Vim swap file
    crit: notable
    conf: 0.92
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)\.[^/]+\.sw[nop]$'
  - id: github-module-zip-basename
    desc: GitHub versioned zip filename
    crit: component
    conf: 0.86
    for: [zip]
    if:
      type: path
      basename: true
      regex: '^github\.com-.+-v[0-9][A-Za-z0-9._+-]*\.zip$'
  - id: archive-container-path
    desc: Archive container path
    crit: baseline
    conf: 0.95
    for: [tar, zip]
    if:
      type: path
      basename: true
      regex: '(?i)\.(tar|tar\.gz|tgz|zip)$'
  - id: archive-go-mod-entry
    desc: Archive contains go.mod
    crit: component
    conf: 0.98
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)go\.mod$'
  - id: archive-go-source-entry
    desc: Archive contains Go source
    crit: component
    conf: 0.98
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[A-Za-z0-9_.-]{1,120}\.go$'
  - id: archive-swift-package-entry
    desc: Archive contains Package.swift
    crit: baseline
    conf: 0.95
    for: [zip, archives]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)Package\.swift$'
  - id: vsix-manifest-entry
    desc: Archive contains VSIX manifest
    crit: baseline
    conf: 0.98
    for: [vsix-archive]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)extension\.vsixmanifest$'
  - id: vsix-package-json-entry
    desc: Archive contains VSIX package manifest
    crit: baseline
    conf: 0.98
    for: [vsix-archive]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)extension/package\.json$'
  - id: vsix-root-extension-js-entry
    desc: Archive contains root extension entrypoint
    crit: baseline
    conf: 0.95
    for: [vsix-archive]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)extension/extension\.js$'
composite_rules:
  - id: github-module-zip-no-go-source
    desc: GitHub module archive lacks Go source
    crit: baseline
    conf: 0.92
    for: [zip]
    all:
      - id: github-module-zip-basename
    unless:
      - id: archive-go-source-entry
      - id: archive-go-mod-entry
      - id: archive-swift-package-entry
  - id: npm-package-with-image
    desc: NPM package contains image asset
    crit: baseline
    conf: 0.75
    all:
      - id: package-json-basename
    any:
      - id: png-extension-basename
      - id: ico-extension-basename
