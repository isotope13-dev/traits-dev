defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 0.8
  attack: T1195.002
traits:
  - id: npm-platform-name-win32
    desc: npm package name includes win32
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])win32[-_/.]'
  - id: npm-platform-name-windows
    desc: npm package name includes windows
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])windows[-_/.]'
  - id: npm-platform-name-linux
    desc: npm package name includes linux
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])linux[-_/.]'
  - id: npm-platform-name-darwin
    desc: npm package name includes darwin
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])darwin[-_/.]'
  - id: npm-platform-name-freebsd
    desc: npm package name includes freebsd
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])freebsd[-_/.]'
  - id: npm-platform-name-mobile
    desc: npm package name includes mobile OS
    crit: component
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])(android|ios)[-_/.]'
  - id: npm-platform-name-x64
    desc: npm package name includes x64
    crit: component
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])x64([-_/.]|$)'
  - id: npm-platform-name-arm64
    desc: npm package name includes arm64
    crit: component
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])arm64([-_/.]|$)'
  - id: npm-platform-name-ia32
    desc: npm package name includes ia32
    crit: component
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])ia32([-_/.]|$)'
  - id: npm-platform-name-arm
    desc: npm package name includes arm
    crit: component
    conf: 0.82
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '(?i)(^|[-_/])arm([-_/.]|$)'
  - id: npm-files-darwin
    desc: npm files include darwin binary path
    crit: component
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: '(^|/)darwin[-_/.]'
  - id: npm-files-linux
    desc: npm files include linux binary path
    crit: component
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: '(^|/)linux[-_/.]'
  - id: npm-files-win32
    desc: npm files include win32 binary path
    crit: component
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: '(^|/)win32[-_/.]'
  - id: npm-includes-exe
    desc: npm package includes .exe files
    crit: suspicious
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.exe$
    unless:
      - id: npm-platform-native-binary-package
      - id: npm-cross-platform-cli-native-package
      - id: well-known/lib/hermes::hermes-runtime
      - id: well-known/lib/ps-list::ps-list-package-name
      - id: well-known/lib/ps-list::ps-list-package-context
      - id: well-known/tool/development/flow-bin::flow-bin-package-context
  - id: npm-includes-dll
    desc: npm package includes .dll files
    crit: suspicious
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.dll$
    unless:
      - id: npm-platform-native-binary-package
      - id: well-known/lib/hermes::hermes-runtime
      - id: well-known/tool/development/flow-bin::flow-bin-package-context
  - id: npm-includes-scr
    desc: "npm package includes .scr files"
    crit: suspicious
    conf: 0.95
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.scr$
  - id: npm-includes-com
    desc: npm package includes .com files
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.com$
  - id: npm-includes-bat
    desc: npm package includes .bat files
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.bat$
  - id: npm-includes-cmd
    desc: npm package includes .cmd files
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.cmd$
  - id: npm-includes-so
    desc: npm package includes .so files
    crit: notable
    conf: 0.75
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.so$
  - id: npm-includes-dylib
    desc: npm package includes .dylib files
    crit: notable
    conf: 0.75
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.dylib$
  - id: npm-includes-pem
    desc: npm package includes .pem certificates/keys
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.pem$
    unless:
      - type: value
        path: files[*]
        exact: keys/public.pem
    not:
      - regex: '(^|/)public\.pem$'
  - id: npm-includes-key
    desc: npm package includes private keys
    crit: suspicious
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.key$
  - id: npm-files-allowlist-npmrc
    desc: npm package publishes an .npmrc file
    crit: notable
    conf: 0.86
    for:
      - package.json
    if:
      type: value
      path: files[*]
      exact: .npmrc
  - id: npm-includes-php
    desc: npm package includes .php files
    crit: notable
    conf: 0.8
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.php$
  - id: npm-includes-pdf
    desc: npm package includes .pdf files
    crit: notable
    conf: 0.65
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.pdf$
  - id: npm-includes-zip
    desc: npm package includes .zip files
    crit: notable
    conf: 0.65
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.zip$
  - id: npm-includes-tar
    desc: npm package includes .tar files
    crit: notable
    conf: 0.65
    for:
      - package.json
    if:
      type: value
      path: files[*]
      regex: \.tar(\.(gz|bz2|xz))?$
  - id: pypi-includes-exe
    desc: PyPI package includes .exe files
    crit: suspicious
    conf: 0.9
    for:
      - python
    if:
      type: string_literal
      regex: package_data.{0,100}['"][^'"]{0,100}\.exe['"]
  - id: pypi-includes-dll
    desc: PyPI package includes .dll files
    crit: suspicious
    conf: 0.9
    for:
      - python
    if:
      type: string_literal
      regex: package_data.{0,100}['"][^'"]{0,100}\.dll['"]
  - id: pypi-includes-so
    desc: PyPI package includes .so files
    crit: notable
    conf: 0.7
    for:
      - python
    if:
      type: string_literal
      regex: package_data.{0,100}['"][^'"]{0,100}\.so['"]
  - id: pypi-includes-dylib
    desc: PyPI package includes .dylib files
    crit: notable
    conf: 0.7
    for:
      - python
    if:
      type: string_literal
      regex: package_data.{0,100}['"][^'"]{0,100}\.dylib['"]
  - id: pypi-includes-wildcard
    desc: PyPI package uses wildcard package_data
    crit: notable
    conf: 0.65
    for:
      - python
    if:
      type: string_literal
      regex: package_data.{0,100}["']\*["']
  - id: gem-includes-exe
    desc: RubyGem includes .exe files
    crit: suspicious
    conf: 0.9
    for:
      - ruby
    if:
      type: string_literal
      regex: \.files.{0,100}['"][^'"]{0,100}\.exe['"]
  - id: gem-includes-dll
    desc: RubyGem includes .dll files
    crit: suspicious
    conf: 0.9
    for:
      - ruby
    if:
      type: string_literal
      regex: \.files.{0,100}['"][^'"]{0,100}\.dll['"]
  - id: gem-includes-so
    desc: RubyGem includes .so files
    crit: notable
    conf: 0.7
    for:
      - ruby
    if:
      type: string_literal
      regex: \.files.{0,100}['"][^'"]{0,100}\.so['"]
composite_rules:
  - id: npm-platform-native-os-name
    desc: npm package name includes target OS
    crit: component
    conf: 0.9
    for:
      - package.json
    any:
      - id: npm-platform-name-win32
      - id: npm-platform-name-windows
      - id: npm-platform-name-linux
      - id: npm-platform-name-darwin
      - id: npm-platform-name-freebsd
      - id: npm-platform-name-mobile
  - id: npm-platform-native-arch-name
    desc: npm package name includes target CPU
    crit: component
    conf: 0.86
    for:
      - package.json
    any:
      - id: npm-platform-name-x64
      - id: npm-platform-name-arm64
      - id: npm-platform-name-ia32
      - id: npm-platform-name-arm
  - id: npm-platform-native-binary-package
    desc: npm platform-native binary package
    crit: component
    conf: 0.92
    for:
      - package.json
    all:
      - id: metadata/package/manifest/runtime::has-platform-restrictions
      - id: npm-platform-native-os-name
      - id: npm-platform-native-arch-name
  - id: npm-windows-executables
    desc: npm package includes Windows executable files
    crit: suspicious
    conf: 0.9
    for:
      - package.json
    any:
      - id: npm-includes-exe
      - id: npm-includes-dll
      - id: npm-includes-scr
      - id: npm-includes-com
      - id: npm-includes-bat
      - id: npm-includes-cmd
    unless:
      - id: npm-platform-native-binary-package
      - id: npm-cross-platform-cli-native-package
      - id: well-known/lib/hermes::hermes-runtime
  - id: npm-cross-platform-cli-native-package
    desc: npm cross-platform CLI native binaries
    crit: component
    conf: 0.9
    for:
      - package.json
    all:
      - id: npm-files-darwin
      - id: npm-files-linux
      - id: npm-files-win32
  - id: npm-native-binaries
    desc: npm package includes native binary files
    crit: notable
    conf: 0.75
    for:
      - package.json
    any:
      - id: npm-includes-so
      - id: npm-includes-dylib
  - id: npm-sensitive-includes
    desc: npm package includes sensitive files (keys/certs)
    crit: suspicious
    conf: 0.85
    attack: T1552.004
    for:
      - package.json
    any:
      - id: npm-includes-pem
      - id: npm-includes-key
  - id: npm-archive-includes
    desc: npm package includes archive files
    crit: notable
    conf: 0.65
    for:
      - package.json
    any:
      - id: npm-includes-zip
      - id: npm-includes-tar
  - id: pypi-any-executable
    desc: PyPI package includes executable files
    for:
      - python
    any:
      - id: pypi-includes-exe
      - id: pypi-includes-dll
