defaults:
  platforms: [unix]
  # Zstd-wrapped FreeBSD pkg tar payloads can currently be misidentified as
  # Kotlin before the inner tar is identified.
  for: [archives, data, kotlin, text]

traits:
  - id: freebsd-pkg-extension
    for: [data, zst]
    desc: FreeBSD package filename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '\.pkg$'
      case_insensitive: true

  - id: freebsd-pkg-compact-manifest
    desc: FreeBSD package compact manifest
    crit: component
    conf: 0.96
    if:
      type: text
      substr: '+COMPACT_MANIFEST'

  - id: freebsd-pkg-manifest-file
    desc: FreeBSD package manifest file
    crit: component
    conf: 0.95
    if:
      type: text
      substr: '+MANIFEST'

  - id: freebsd-pkg-abi-field
    desc: FreeBSD package ABI field
    crit: component
    conf: 0.96
    if:
      type: text
      substr: '"abi":"FreeBSD:'

  - id: freebsd-pkg-origin-field
    desc: FreeBSD package origin field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '"origin":"[A-Za-z0-9_.+-]+/[A-Za-z0-9_.+-]+"'

  - id: freebsd-pkg-poudriere-built
    desc: FreeBSD poudriere build annotation
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: '"built_by":"poudriere'

composite_rules:
  - id: freebsd-pkg-archive
    desc: FreeBSD pkg archive
    crit: baseline
    conf: 0.98
    all:
      - id: freebsd-pkg-compact-manifest
      - id: freebsd-pkg-manifest-file
      - id: freebsd-pkg-abi-field
      - id: freebsd-pkg-origin-field

  - id: freebsd-pkg-extension-zstd
    desc: FreeBSD pkg zstd package
    crit: baseline
    conf: 0.96
    all:
      - id: freebsd-pkg-extension
      - id: freebsd-pkg-archive
