defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: pytest-word
    desc: pytest reference
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      word: pytest
  - id: pytest-test-func
    desc: Python test function
    crit: baseline
    conf: 0.8
    if:
      type: function
      regex: '^test_'
  - id: pytest-decorator
    desc: pytest fixture or mark reference
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      kind: member
      regex: '^pytest\.(fixture|mark(\.[A-Za-z_][A-Za-z0-9_]*)?)$'
  - id: pytest-conftest
    desc: conftest.py file
    crit: baseline
    conf: 0.98
    if:
      type: basename
      exact: conftest.py
composite_rules:
  - id: pytest-markers
    desc: pytest-specific markers
    crit: baseline
    conf: 0.8
    any:
      - id: pytest-word
      - id: pytest-decorator
      - id: pytest-conftest
      - id: metadata/package/testing/presence/harness::pytest-module
  - id: pytest-with-assert
    desc: pytest markers with assert statement
    crit: baseline
    conf: 0.8
    all:
      - id: micro-behaviors/data/control-flow/assert::python-assert-statement
      - id: pytest-markers
  - id: pytest
    desc: pytest test framework
    crit: notable
    conf: 0.95
    any:
      - id: metadata/package/testing/presence/harness::pytest-module
      - id: pytest-decorator
      - id: pytest-conftest
      - id: pytest-with-assert
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
