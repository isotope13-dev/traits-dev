defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: pytest-word
    desc: pytest reference
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      word: pytest
  - id: pytest-test-func
    desc: def test_ function
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      substr: def test_
  - id: pytest-decorator
    desc: '@pytest decorator'
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      substr: '@pytest'
  - id: pytest-conftest
    desc: conftest.py file
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      substr: conftest.py
  - id: python-assert-statement
    desc: assert statement
    crit: baseline
    conf: 0.4
    if:
      type: string_literal
      substr: 'assert '
composite_rules:
  - id: pytest-markers
    desc: pytest-specific markers
    crit: baseline
    conf: 0.8
    any:
      - id: pytest-word
      - id: pytest-test-func
      - id: pytest-decorator
      - id: pytest-conftest
  - id: pytest-with-assert
    desc: pytest markers with assert statement
    crit: baseline
    conf: 0.8
    all:
      - id: python-assert-statement
      - id: pytest-markers
  - id: pytest
    desc: pytest test framework
    crit: notable
    conf: 0.95
    any:
      - id: pytest-markers
      - id: pytest-with-assert
