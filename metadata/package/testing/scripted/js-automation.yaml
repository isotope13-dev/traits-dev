defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: xterm-events-export
    desc: xterm recording events export
    crit: component
    conf: 0.95
    if:
      type: text
      substr: export const events = [
  - id: xterm-prompt-input-change
    desc: xterm prompt input event
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: promptInputChange
  - id: xterm-osc633-envjson
    desc: xterm OSC 633 EnvJson
    crit: component
    conf: 0.95
    if:
      type: string_literal
      substr: "]633;EnvJson;"
  - id: xterm-osc633-envsingle
    desc: xterm OSC 633 EnvSingle
    crit: component
    conf: 0.95
    if:
      type: string_literal
      substr: "]633;EnvSingleStart;"
  - id: coverage-marker-istanbul
    desc: istanbul coverage marker
    if:
      type: string_literal
      word: istanbul
  - id: coverage-marker-nyc
    desc: nyc coverage marker
    if:
      type: string_literal
      word: nyc
  - id: coverage-marker-c8
    desc: c8 coverage tooling marker
    if:
      type: string_literal
      word: c8
  - id: coverage-marker-coverage
    desc: coverage tooling keyword
    if:
      type: string_literal
      word: coverage
  - id: coverage-marker-internal
    desc: __coverage__ marker
    if:
      type: string_literal
      substr: __coverage__
  - id: coverage-marker-lcov
    desc: lcov marker
    if:
      type: string_literal
      word: lcov
composite_rules:
  - id: coverage-markers-a
    desc: Coverage marker family A
    any:
      - id: coverage-marker-istanbul
      - id: coverage-marker-nyc
      - id: coverage-marker-c8
      - id: coverage-marker-coverage
  - id: coverage-markers-b
    desc: Coverage marker family B
    any:
      - id: coverage-marker-internal
      - id: coverage-marker-lcov
  - id: coverage-markers
    desc: Coverage tooling markers
    crit: baseline
    conf: 0.9
    any:
      - id: coverage-markers-a
      - id: coverage-markers-b
  - id: xterm-terminal-recording
    desc: xterm terminal recording fixture
    crit: component
    conf: 0.95
    all:
      - id: xterm-events-export
      - id: xterm-prompt-input-change
    any:
      - id: xterm-osc633-envjson
      - id: xterm-osc633-envsingle
