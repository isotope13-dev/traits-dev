defaults:
  platforms: [windows, unix]
traits:
  - id: jest-word
    desc: jest reference
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: string_literal
      word: jest
  - id: jest-describe
    desc: describe() function
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: ast
      kind: call
      exact: describe
  - id: jest-expect
    desc: expect() function
    crit: baseline
    conf: 0.5
    for:
      - javascript
    if:
      type: ast
      kind: call
      exact: expect
  - id: jest-to-be
    desc: toBe() matcher
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: text
      substr: toBe(
  - id: jest-to-equal
    desc: toEqual() matcher
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: text
      substr: toEqual(
  - id: js-bdd-suite-text
    desc: JavaScript BDD suite text
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    size_max: 524288
    if:
      type: text
      regex: \bdescribe\s*\([^)]{0,4096}\bit\s*\(
composite_rules:
  - id: js-bdd-functions
    desc: JavaScript BDD test functions
    crit: baseline
    conf: 0.6
    for:
      - javascript
    needs: 3
    any:
      - id: jest-describe
      - id: metadata/package/testing/presence::it-call
      - id: jest-expect
      - id: jest-to-be
      - id: jest-to-equal
  - id: js-bdd-suite
    desc: JavaScript BDD test suite
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    all:
      - id: jest-describe
      - id: metadata/package/testing/presence::it-call
  - id: jest
    desc: Jest test framework
    crit: notable
    conf: 0.95
    for:
      - javascript
    any:
      - id: jest-word
      - id: js-bdd-functions
