defaults:
  platforms: [windows, unix]
traits:
  - id: jest-word
    desc: jest module import
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: text
      regex: 'from\s+[''"](@jest/[\w/-]+|jest)[''"]'
  - id: jest-describe
    desc: describe() function
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: symbol
      kind: call
      exact: describe
  - id: jest-to-be
    desc: toBe() matcher
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: symbol
      exact: toBe
  - id: jest-to-equal
    desc: toEqual() matcher
    crit: baseline
    conf: 0.7
    for:
      - javascript
    if:
      type: symbol
      exact: toEqual
  - id: js-bdd-describe-text
    desc: JavaScript describe() test call
    crit: baseline
    conf: 0.75
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: describe
composite_rules:
  - id: js-bdd-suite-text
    desc: JavaScript BDD suite text
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    all:
      - id: js-bdd-describe-text
      - id: metadata/package/testing/presence/scripted::it-call
  - id: js-bdd-functions
    desc: JavaScript BDD test functions
    crit: baseline
    conf: 0.6
    for:
      - javascript
    needs: 3
    any:
      - id: jest-describe
      - id: metadata/package/testing/presence/scripted::it-call
      - id: metadata/package/testing/presence/fixture::jest-expect-call
      - id: jest-to-be
      - id: jest-to-equal
  - id: js-bdd-suite
    desc: JavaScript BDD test suite
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    all:
      - id: jest-describe
      - id: metadata/package/testing/presence/scripted::it-call
  - id: jest
    desc: Jest test framework
    crit: notable
    conf: 0.95
    for:
      - javascript
    any:
      - id: jest-word
      - id: js-bdd-functions
