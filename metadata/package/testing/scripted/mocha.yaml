defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: mocha-word
    desc: mocha package reference
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      word: mocha
  - id: mocha-before
    desc: before() hook
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: before
  - id: mocha-after
    desc: after() hook
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: after
composite_rules:
  - id: mocha-all-patterns
    desc: Mocha test patterns
    crit: baseline
    conf: 0.7
    needs: 3
    any:
      - id: mocha-word
      - id: metadata/package/testing/scripted::jest-describe
      - id: metadata/package/testing/presence/scripted::it-call
      - id: mocha-before
      - id: mocha-after
  - id: mocha
    desc: Mocha test framework markers
    crit: baseline
    conf: 0.95
    any:
      - id: mocha-word
      - id: mocha-all-patterns
