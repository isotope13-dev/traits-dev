defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, go]
traits:
  - id: go-test-main
    desc: Go TestMain function
    crit: baseline
    conf: 0.7
    for: [go]
    if:
      type: symbol
      exact: TestMain
  - id: go-test-file
    desc: Go test file suffix
    crit: baseline
    conf: 0.7
    for: [go]
    if:
      type: basename
      regex: '_test\.go$'
  - id: python-test-file
    desc: Python test file suffix
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: _test.py
  - id: test-file-shell
    desc: Shell test file suffix (.t)
    crit: baseline
    conf: 0.7
    if:
      type: basename
      regex: \.t$
  - id: test-directory
    desc: File in a test directory
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: ^.{0,200}[\\/](?:__?tests?__?|testing)[\\/].{0,200}$|_tests?\.py$
  - id: unittest-module
    desc: unittest module
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      word: unittest
  - id: pytest-module
    desc: pytest module
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: import\s+pytest|from\s+pytest\s+import
  - id: ruby-test-file
    desc: Ruby test file suffix
    crit: baseline
    conf: 0.7
    if:
      type: basename
      regex: _test\.rb$
  - id: ruby-integration-test
    desc: IntegrationTest usage
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: ActionController::IntegrationTest
  - id: wordpress-rest-route
    desc: WordPress REST API route
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: /wp-json/wp/v2/
  - id: wordpress-target-hints
    desc: WordPress target hints field
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: targetHints
  - id: wordpress-allow-methods-array
    desc: WordPress allowed methods array
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: "allow: ['GET', 'POST'"
