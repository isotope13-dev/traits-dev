defaults:
  platforms:
  - unix
  - windows
  for: [scripts]
traits:
- id: go-test-main
  desc: Go TestMain function
  crit: baseline
  conf: 0.7
  for: [go]
  if:
    type: symbol
    exact: TestMain
- id: go-test-file
  desc: Go test file suffix
  crit: baseline
  conf: 0.7
  for: [go]
  if:
    type: basename
    regex: '_test\.go$'
- id: python-test-file
  desc: Python test file suffix
  crit: baseline
  conf: 0.7
  if:
    type: basename
    regex: '(^|[\\/])test_[^\\/]{1,220}\.py$|_test\.py$'
- id: linux-kselftest-shell--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    substr: Kselftest framework requirement
  count_max: 1000218
- id: linux-kselftest-shell--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*ksft_skip=4\b'
  count_max: 1000219
- id: linux-kselftest-shell--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    regex: '\bktap_helpers\.sh\b'
  count_max: 1000220
- id: linux-kselftest-shell--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    regex: '\bKSFT_(PASS|FAIL|SKIP)\b'
  count_max: 1000221
- id: freebsd-atf-shell
  desc: FreeBSD ATF shell test harness
  crit: baseline
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*atf_test_case\s+[A-Za-z0-9_]+|(^|\n)\s*atf_init_test_cases\(\)'
- id: freebsd-pjdfstest-shell--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: 'FreeBSD:.{0,120}pjdfstest/tests/'
  count_max: 1000223
- id: freebsd-pjdfstest-shell--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*\.\s+\$\{dir\}/\.\./misc\.sh\b'
  count_max: 1000224
- id: freebsd-pjdfstest-shell--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*expect\s+(?:0|E[A-Z]+)\s+'
  count_max: 1000225
- id: test-directory
  desc: File in a test directory
  crit: baseline
  conf: 1.0
  for: [scripts, typescript, manifests, package.json, python]
  if:
    type: basename
    regex: ^.{0,500}[\\/](?:_{0,2}tests?_{0,2}|testing|spec)[\\/].{0,500}$|_tests?\.py$
- id: test-utils-directory
  desc: File in a test-utils directory
  crit: baseline
  conf: 1.0
  if:
    type: basename
    regex: '[\\/]test[_-]utils?[\\/]'
- id: c-source-test-directory
  desc: C source in test directory
  crit: baseline
  conf: 1.0
  for: [c, cpp]
  if:
    type: basename
    regex: "[\\\\/]tests?[\\\\/]"
- id: c-source-test-file
  desc: C source test filename
  crit: baseline
  conf: 1.0
  for: [c, cpp]
  if:
    type: basename
    regex: "_test\\.(c|cc|cpp|cxx)$"
- id: test-fixture-directory
  desc: File in test fixture directory
  crit: baseline
  conf: 0.95
  for: [scripts, manifests, package.json]
  if:
    type: basename
    regex: ^.{0,500}[\\/](?:fixtures?|__fixtures__|testdata)[\\/].{0,500}$
- id: pkg-tests-fixture-directory
  desc: File in package test fixture directory
  crit: baseline
  conf: 0.95
  for: [scripts, manifests, package.json]
  if:
    type: basename
    regex: '[\\/]pkg-tests-fixtures[\\/]'
- id: example-directory
  desc: File in example directory
  crit: baseline
  conf: 0.9
  for: [scripts, manifests, package.json]
  if:
    type: basename
    regex: ^.{0,500}[\\/](?:examples?|demo)[\\/].{0,500}$
- id: registry-request-cache-data
  desc: Registry request cache data
  crit: baseline
  conf: 0.95
  for: [data]
  if:
    type: basename
    regex: '[\\/]fixtures[\\/]request-cache[\\/]GET[\\/]'
- id: unittest-module
  desc: unittest module
  crit: baseline
  conf: 0.7
  if:
    type: string_literal
    word: unittest
- id: pytest-module
  desc: pytest module
  crit: baseline
  conf: 0.7
  if:
    type: text
    regex: import\s+pytest|from\s+pytest\s+import
- id: ruby-test-file
  desc: Ruby test file suffix
  crit: baseline
  conf: 0.7
  if:
    type: basename
    regex: _test\.rb$
- id: ruby-integration-test
  desc: IntegrationTest usage
  crit: baseline
  conf: 0.7
  if:
    type: string_literal
    substr: ActionController::IntegrationTest
- id: wordpress-rest-route
  desc: WordPress REST API route
  crit: component
  conf: 0.95
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: /wp-json/wp/v2/
- id: wordpress-target-hints
  desc: WordPress target hints field
  crit: component
  conf: 0.95
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: targetHints
- id: wordpress-allow-methods-array
  desc: WordPress allowed methods array
  crit: component
  conf: 0.95
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: "allow: ['GET', 'POST'"
composite_rules:
- id: linux-kselftest-shell
  desc: Linux kselftest shell harness
  crit: baseline
  conf: 0.95
  for: [shell]
  any:
  - id: linux-kselftest-shell--rx-1
  - id: linux-kselftest-shell--rx-2
  - id: linux-kselftest-shell--rx-3
  - id: linux-kselftest-shell--rx-4
- id: freebsd-pjdfstest-shell
  desc: FreeBSD pjdfstest shell harness
  crit: baseline
  conf: 0.98
  for: [shell]
  any:
  - id: freebsd-pjdfstest-shell--rx-5
  - id: freebsd-pjdfstest-shell--rx-6
  - id: freebsd-pjdfstest-shell--rx-7
