defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - package.json
traits:
  - id: pkg-test-script-field
    desc: '"test": script in package.json'
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: '"test":'
  - id: has-jest
    desc: Package uses Jest testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"jest"|jest\.config\.js'
  - id: has-mocha
    desc: Package uses Mocha testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"mocha"|\.mocharc'
  - id: has-ava
    desc: Package uses Ava testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"ava"|"ava":'
  - id: has-cypress
    desc: Package uses Cypress testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"cypress"|cypress\.config'
  - id: has-playwright
    desc: Package uses Playwright testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"playwright"|playwright\.config'
  - id: has-karma
    desc: Package uses Karma test runner
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"karma"|karma\.conf\.js'
  - id: has-test-dir
    desc: Package has a test directory
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"test"|"tests"|"__tests__"'
  - id: has-assertions
    desc: Code uses common assertion libraries
    crit: notable
    conf: 0.85
    for:
      - javascript
      - typescript
    unless:
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: require\s*\(\s*['"](chai|should|expect|assert)['"]
  - id: test-fixtures
    desc: References to test fixture files
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: fixtures/|testdata/|__fixtures__/
