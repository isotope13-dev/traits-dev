defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
    - package.json
traits:
  - id: component-test-package-json-path
    desc: package.json under component or fixture test path
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: basename
      regex: (__tests__|tests)[\\/](components|_*fixtures?_*).{0,80}package\.json$
  - id: install-fixture-name
    desc: Install fixture package name
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: kv
      path: name
      regex: failing$|^optional-dep$
  - id: install-fixture-zero-version
    desc: Install fixture uses zero version
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: kv
      path: version
      exact: 0.0.0
  - id: install-fixture-install-script
    desc: Install fixture runs local install.js
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: kv
      path: scripts.install
      exact: node install.js
  - id: jest-expect-call
    desc: expect() function call
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: expect(
  - id: mocha-describe-call
    desc: Mocha describe() call
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: describe(
  - id: test-filename-pattern
    desc: Common test filename pattern
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?(?:\.snap)?$'
  - id: wpt-test-title
    desc: Web Platform Test title pattern
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: Web Platform Test
  - id: wpt-security-features-resource
    desc: WPT security-features resource helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - html
    if:
      type: text
      regex: 'web-platform-tests|common/security-features'
  - id: react-native-release-fixture-name
    desc: React Native release fixture package name
    crit: component
    conf: 0.98
    for:
      - package.json
    if:
      type: kv
      path: name
      exact: react-native
  - id: react-native-release-fixture-description
    desc: React Native release fixture description
    crit: component
    conf: 0.98
    for:
      - package.json
    if:
      type: kv
      path: description
      exact: fake react native package
  - id: react-native-release-fixture-metro-config
    desc: React Native fixture metro-config dependency
    crit: component
    conf: 0.95
    for:
      - package.json
    if:
      type: kv
      path: dependencies.metro-config
      regex: '^\^?0\.[0-9]+\.[0-9]+$'
  - id: react-native-release-fixture-metro-runtime
    desc: React Native fixture metro-runtime dependency
    crit: component
    conf: 0.95
    for:
      - package.json
    if:
      type: kv
      path: dependencies.metro-runtime
      regex: '^\^?0\.[0-9]+\.[0-9]+$'
composite_rules:
  - id: component-test-package-json
    desc: package.json under component or fixture test path
    crit: baseline
    conf: 0.9
    for:
      - package.json
    any:
      - id: component-test-package-json-path
      - id: react-native-release-fixture-package
  - id: install-fixture-package-json
    desc: Tiny install-fixture package manifest
    crit: baseline
    conf: 0.9
    for:
      - package.json
    size_max: 200
    all:
      - id: install-fixture-name
      - id: install-fixture-zero-version
      - id: install-fixture-install-script
  - id: jest-test-file
    desc: Jest test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: jest-expect-call
      - id: test-filename-pattern
  - id: mocha-test-file
    desc: Mocha test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: mocha-describe-call
      - id: test-filename-pattern
  - id: wpt-test-file
    desc: Web Platform Test (WPT) file
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - html
    any:
      - id: wpt-test-title
      - id: wpt-security-features-resource
      - id: metadata/lang/javascript-features::promise-test-call
      - id: metadata/lang/javascript-features::async-test-call
  - id: react-native-release-fixture-package
    desc: React Native release fixture package
    crit: baseline
    conf: 0.98
    for:
      - package.json
    size_max: 1024
    all:
      - id: react-native-release-fixture-name
      - id: react-native-release-fixture-description
      - id: react-native-release-fixture-metro-config
      - id: react-native-release-fixture-metro-runtime
