defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
    - package.json
traits:
  - id: jest-expect-call
    desc: expect() function call
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: expect(
  - id: mocha-describe-call
    desc: Mocha describe() call
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: describe(
  - id: test-filename-pattern
    desc: Common test filename pattern
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?$'
  - id: wpt-test-title
    desc: Web Platform Test title pattern
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: Web Platform Test
composite_rules:
  - id: jest-test-file
    desc: Jest test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: jest-expect-call
      - id: test-filename-pattern
  - id: mocha-test-file
    desc: Mocha test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: mocha-describe-call
      - id: test-filename-pattern
  - id: wpt-test-file
    desc: Web Platform Test (WPT) file
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - html
    any:
      - id: wpt-test-title
      - id: metadata/lang/javascript-features::promise-test-call
      - id: metadata/lang/javascript-features::async-test-call
