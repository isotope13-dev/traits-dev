defaults:
  platforms: [unix, android, ios]
  for: [shell]
traits:
- id: exercise-basenc
  desc: "Exercise basenc comment"
  crit: notable
  if:
    type: text
    substr: "Exercise basenc"
- id: coreutils-test-functions--framework-failure
  desc: Coreutils test framework (framework_failure_)
  crit: notable
  if:
    type: symbol
    exact: framework_failure_
- id: coreutils-test-functions--require-root
  desc: Coreutils test framework (require_root_)
  crit: notable
  if:
    type: symbol
    exact: require_root_
- id: coreutils-test-functions--require-selinux
  desc: Coreutils test framework (require_selinux_)
  crit: notable
  if:
    type: symbol
    exact: require_selinux_
- id: coreutils-test-functions--print-ver
  desc: Coreutils test framework functions (print_ver_)
  crit: notable
  if:
    type: symbol
    exact: print_ver_
composite_rules:
- id: coreutils-test-functions
  desc: Coreutils test framework functions
  crit: notable
  any:
  - id: coreutils-test-functions--framework-failure
  - id: coreutils-test-functions--require-root
  - id: coreutils-test-functions--require-selinux
  - id: coreutils-test-functions--print-ver
- id: coreutils-test-script
  desc: Coreutils test script
  crit: notable
  conf: 0.8
  all:
  - id: metadata/lang/shebang::perl
  - id: metadata/binary/license::fsf-copyright
  - id: metadata/package/testing/presence/platform_suites::exercise-basenc
