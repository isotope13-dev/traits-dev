defaults:
  platforms:
    - unix
    - windows
  for: [java]
traits:
  - id: java-test-directory
    desc: Java source in src/test/java
    crit: baseline
    conf: 1.0
    if:
      type: path
      regex: test[\\/]java[\\/]
  - id: java-generic-test-directory
    desc: Java file in a generic test directory
    crit: baseline
    conf: 1.0
    if:
      type: path
      regex: '[\\/](tests?|testing|spec)[\\/].{0,500}\.java$'
  - id: java-test-filename
    desc: Java test filename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(^Test[A-Za-z0-9_$]{1,120}|[A-Za-z0-9_$]{1,120}Test)\.java$'
