defaults:
  platforms: [unix, windows]

traits:
  - id: evidence-scripts-directory-path
    desc: File in package evidence script directory
    crit: baseline
    conf: 0.95
    for: [python, shell]
    if:
      type: path
      dirname: true
      regex: '(^|[\\/])evidence([\\/]|$)'
      case_insensitive: true
