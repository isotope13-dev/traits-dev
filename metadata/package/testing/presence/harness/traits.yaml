defaults:
  platforms:
  - unix
  - windows
  for: [scripts]
traits:
- id: shell-test-prefix-basename
  desc: Shell test_ basename
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: basename
    regex: '^test_'
- id: go-test-main
  desc: Go TestMain function
  crit: baseline
  conf: 0.7
  for: [go]
  if:
    type: symbol
    exact: TestMain
- id: go-test-file
  desc: Go test file suffix
  crit: baseline
  conf: 0.7
  for: [go]
  if:
    type: path
    basename: true
    regex: '_test\.go$'
- id: go-test-helper-file
  desc: Go test helper source file
  crit: baseline
  conf: 0.75
  for: [go]
  if:
    type: path
    basename: true
    regex: '^(test|fake|mock)_.*\.go$|.*_(test|fake|mock)\.go$'
- id: csharp-test-file
  desc: C# test source filename
  crit: baseline
  conf: 0.85
  for: [csharp]
  if:
    type: path
    basename: true
    regex: '.*Test.*\.cs$'
- id: python-test-file
  desc: Python test file suffix
  crit: baseline
  conf: 0.7
  for: [python, pyc]
  if:
    type: path
    basename: true
    regex: '(^|[\\/])test_[^\\/]{1,220}\.py[c]?$|_test\.py[c]?$'
- id: python-info-test-path
  desc: Python package info test path
  crit: baseline
  conf: 0.95
  for: [python]
  if:
    type: path
    dirname: true
    regex: 'info[\\/]test'
- id: python-test-file-content
  desc: Python test source content
  crit: component
  conf: 0.8
  for: [python]
  if:
    type: text
    regex: '(?m)^\s*(def\s+test_|class\s+Test[A-Z_])|pytest'
- id: python-static-path-inventory
  desc: Python static source path inventory
  crit: baseline
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'PATHS(_EXCLUDE)?\s*=\s*(set\s*\(|tuple\[|[\{\(])[\s\S]{0,999}os\.path\.join\(SOURCE_DIR'
- id: perl-test-file
  # Perl's universal test convention: Test::More scripts end in `.t` and live
  # under a `t/` directory (author tests under `xt/`). `prove`/ExtUtils runs
  # exactly these. Recognising it lets the shared test-context unless chains
  # excuse fixtures like Mojolicious t/mojo/cookiejar.t (a pinned example IP).
  desc: Perl test file (.t) or t/ dir
  crit: baseline
  conf: 0.85
  for: [perl]
  if:
    type: path
    regex: '(^|[\\/])x?t[\\/].{1,220}\.t$'
- id: linux-kselftest-shell--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    substr: Kselftest framework requirement
  count_max: 1000218
- id: linux-kselftest-shell--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*ksft_skip=4\b'
  count_max: 1000219
- id: linux-kselftest-shell--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    regex: '\bktap_helpers\.sh\b'
  count_max: 1000220
- id: linux-kselftest-shell--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: text
    regex: '\bKSFT_(PASS|FAIL|SKIP)\b'
  count_max: 1000221
- id: freebsd-atf-shell
  desc: FreeBSD ATF shell test harness
  crit: baseline
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*atf_test_case\s+[A-Za-z0-9_]+|(^|\n)\s*atf_init_test_cases\(\)'
- id: freebsd-pjdfstest-shell--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: 'FreeBSD:.{0,120}pjdfstest/tests/'
  count_max: 1000223
- id: freebsd-pjdfstest-shell--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*\.\s+\$\{dir\}/\.\./misc\.sh\b'
  count_max: 1000224
- id: freebsd-pjdfstest-shell--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [shell]
  if:
    type: text
    regex: '(^|\n)\s*expect\s+(0|E[A-Z]+)\s+'
  count_max: 1000225
- id: test-directory-path
  desc: File is in common test directory
  crit: component
  for: [scripts, source, data, npm, whl, gem, tar, shell, makefile]
  if:
    type: path
    regex: '[\\/](_{0,2}tests?_{0,2}|testing|spec|winetests)[\\/]'
- id: ndctl-nfit-shell-test
  desc: ndctl NFIT shell test harness
  crit: baseline
  conf: 0.95
  for: [shell]
  if:
    type: text
    regex: '\bmodprobe\s+nfit_test\b|\bNDCTL\s+inject-error\b|\binject-error\s+--block='
- id: spec-test-filename
  desc: Spec or test filename markers
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: path
    basename: true
    regex: _spec\.|\.spec\.|\.test\.
- id: tests-path-filename
  for: [python, javascript, ruby, go, powershell]
  desc: File path or name indicates test code
  crit: component
  conf: 0.85
  if:
    type: path
    basename: true
    regex: '(?i)^tests?\.|_tests?\.|\.tests?\.'
- id: go-test-helper-command-path
  desc: Go test helper command path
  crit: component
  conf: 0.9
  for: [go]
  if:
    type: path
    dirname: true
    regex: '[-_]test[-_]'
- id: rust-tests-path-filename
  for: [rust]
  desc: Path or filename indicates Rust tests
  crit: component
  conf: 0.85
  if:
    type: path
    basename: true
    regex: ^tests?\.rs$|_tests?\.rs$
- id: rust-tests-directory-path
  for: [rust]
  desc: Path identifies Rust tests directory
  crit: component
  conf: 0.9
  if:
    type: path
    regex: '(^|[\\/])tests[\\/]'
- id: winetests-directory-path
  desc: File in winetests directory path
  crit: component
  for: [tar, zip]
  if:
    type: path
    dirname: true
    regex: (^|[\\/])winetests([\\/]|$)
- id: rostests-directory-path
  desc: File in rostests directory path
  crit: component
  for: [tar, zip]
  if:
    type: path
    dirname: true
    regex: (^|[\\/])rostests([\\/]|$)
- id: test-utils-directory
  desc: File in a test-utils directory
  crit: baseline
  conf: 1.0
  for: [javascript, typescript, python]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])test[_-]utils?([\\/]|$)'
- id: c-source-test-directory
  desc: C source in test directory
  crit: baseline
  conf: 1.0
  for: [c, cpp]
  if:
    type: path
    regex: "[\\\\/](tests?|winetests)[\\\\/]"
- id: c-source-testsuite-directory
  desc: C source in testsuite directory
  crit: baseline
  conf: 1.0
  for: [c, cpp]
  if:
    type: path
    regex: "[\\\\/]testsuite[\\\\/]"
- id: binary-test-directory
  desc: Binary file in test directory
  crit: baseline
  conf: 1.0
  for: [binaries, pe]
  if:
    type: path
    regex: "[\\\\/](tests?|testing|testdata|fixtures?)[\\\\/]"
- id: builtin-anti-analysis-malformed-elf-header
  desc: Built-in malformed ELF finding hook
  crit: suspicious
  conf: 1.0
  for: [elf]
  if:
    type: basename
    exact: __cleave_builtin_malformed_elf_header_hook__
  unless:
    - id: metadata/package/testing/presence/harness::binary-test-directory
    - id: metadata/package/testing/presence/harness::test-directory-path
- id: c-source-test-file
  desc: C source test filename
  crit: baseline
  conf: 1.0
  for: [c, cpp]
  if:
    type: path
    basename: true
    regex: "_test\\.(c|cc|cpp|cxx)$"
- id: pkg-tests-fixture-directory
  desc: File in package test fixture directory
  crit: baseline
  conf: 0.95
  for: [tar, zip]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])pkg-tests-fixtures([\\/]|$)'
- id: example-directory
  desc: File in example directory
  crit: baseline
  conf: 0.9
  for: [javascript, typescript, python]
  if:
    type: path
    dirname: true
    regex: (^|[\\/])(examples?|demos?)([\\/]|$)
- id: shell-example-directory
  desc: Shell file in example directory
  crit: baseline
  conf: 0.9
  for: [shell]
  if:
    type: path
    regex: '(^|[\\/])(examples?|demos?)[\\/].{1,500}$'
- id: registry-request-cache-data
  desc: Registry request cache data
  crit: baseline
  conf: 0.95
  for: [data]
  if:
    type: path
    regex: 'request-cache[\\/]GET[\\/]'
- id: unittest-module
  desc: References the Python unittest module
  crit: baseline
  conf: 0.7
  if:
    type: string_literal
    word: unittest
- id: pytest-module
  desc: Imports the pytest module
  crit: baseline
  conf: 0.95
  for: [python]
  if:
    type: import
    exact: pytest
- id: ruby-test-file
  desc: Ruby test file name
  crit: baseline
  conf: 0.7
  for: [ruby]
  if:
    type: path
    basename: true
    regex: '(^test_.*|.*_test)\.rb$'
- id: ruby-spec-helper-file
  desc: Ruby spec helper file name
  crit: baseline
  conf: 0.9
  for: [ruby, markdown]
  if:
    type: path
    basename: true
    exact: spec_helper.rb
- id: ruby-spec-file
  desc: Ruby spec file name
  crit: baseline
  conf: 0.9
  for: [ruby]
  if:
    type: path
    basename: true
    regex: '_spec\.rb$'
- id: ruby-integration-test
  desc: IntegrationTest usage
  crit: baseline
  conf: 0.7
  if:
    type: string_literal
    substr: ActionController::IntegrationTest
- id: wordpress-rest-route
  desc: WordPress REST API route
  crit: component
  conf: 0.95
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: /wp-json/wp/v2/
- id: wordpress-target-hints
  desc: WordPress target hints field
  crit: component
  conf: 0.95
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: targetHints
- id: wordpress-allow-methods-array
  desc: WordPress allowed methods array
  crit: component
  conf: 0.95
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: "allow: ['GET', 'POST'"
- id: python-php-test-basename-suffix
  desc: Python/PHP test filename suffix
  crit: component
  conf: 0.95
  for: [python, php]
  if:
    type: path
    basename: true
    regex: (_tests?\.py$|Tests?\.php$|Spec\.php$)
composite_rules:
- id: pkg-build-or-test-helper-script
  desc: Packaging build or test helper script
  crit: baseline
  conf: 0.95
  any:
    - id: test-directory-path
    - id: metadata/build/conda::conda-recipe-helper-script-path
    - id: metadata/build/conda::conda-recipe-build-path
- id: package-tests-with-site-packages-marker
  desc: Package includes tests and site-packages marker
  crit: baseline
  conf: 0.9
  all:
  - id: metadata/build/pip::site-packages
  - id: test-directory
- id: test-fixture-directory
  desc: File in test fixture or helper directory
  crit: baseline
  conf: 0.95
  for: [scripts, manifests, package.json, html]
  any:
    - id: test-fixture-directory-path
    - id: test-resources-directory-path
    - id: tests-data-directory-path
    - id: metadata/package/testing/presence/fixture::definitelytyped-types-helper-package-path
- id: test-directory
  desc: File in a test directory
  crit: baseline
  conf: 1.0
  for: [scripts, typescript, manifests, package.json, python, perl, rust]
  any:
    - id: test-directory-path
    - id: python-test-file
    - id: perl-test-file
    # Loose source files under a tests/ dir (python/js/ruby/go) that don't
    # follow the test_*.py naming convention — e.g. mercurial's
    # tests/heredoctest.py doctest harness.
    - id: tests-path-filename
    - id: go-test-helper-command-path
    - id: rust-tests-path-filename
    - id: rust-tests-directory-path
    - id: python-php-test-basename-suffix
- id: linux-kselftest-shell
  desc: Linux kselftest shell harness
  crit: baseline
  conf: 0.95
  for: [shell]
  any:
  - id: linux-kselftest-shell--rx-1
  - id: linux-kselftest-shell--rx-2
  - id: linux-kselftest-shell--rx-3
  - id: linux-kselftest-shell--rx-4
- id: freebsd-pjdfstest-shell
  desc: FreeBSD pjdfstest shell harness
  crit: baseline
  conf: 0.98
  for: [shell]
  any:
  - id: freebsd-pjdfstest-shell--rx-5
  - id: freebsd-pjdfstest-shell--rx-6
  - id: freebsd-pjdfstest-shell--rx-7
- id: definitelytyped-helper-manifest
  desc: DefinitelyTyped helper package manifest
  crit: baseline
  conf: 0.99
  for: [package.json]
  all:
  - id: metadata/package/manifest/publishing::is-private
  any:
  - id: metadata/package/testing/presence/fixture::definitelytyped-types-helper-package
  - id: metadata/package/testing/presence/fixture::definitelytyped-private-test-package
