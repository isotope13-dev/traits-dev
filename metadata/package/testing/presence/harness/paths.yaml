defaults:
  platforms:
  - unix
  - windows

# The Git source distribution keeps executable-looking examples in its test
# suite. This is a source-location fact, not evidence that the package runs
# those commands during installation.
traits:
- id: git-tests-directory
  desc: File in the Git source test suite
  crit: baseline
  conf: 0.99
  for: [shell, c, cpp, perl, python]
  if:
    type: path
    dirname: true
    regex: 'git[\\/]t([\\/]|$)'

- id: test-fixture-directory-path
  desc: File in test fixture directory
  crit: component
  conf: 0.95
  for: [javascript, typescript, python, ruby, html, tar]
  if:
    type: path
    dirname: true
    regex: (^|[\\/])(_{0,2}fixtures?_{0,2}|sample_files|testdata)([\\/]|$)
    case_insensitive: true
- id: pe-test-fixture-directory-path
  desc: PE file in EFI testdata path
  crit: component
  conf: 0.95
  for: [pe]
  if:
    type: path
    dirname: true
    regex: 'efi[\\/]testdata'
    case_insensitive: true
- id: test-scripts-directory-path
  desc: File in a test scripts directory
  crit: component
  conf: 0.95
  for: [tar]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])testscripts([\\/]|$)'
    case_insensitive: true
- id: perl-distribution-test-data-archive-path
  desc: Perl distribution test data archive
  crit: baseline
  conf: 0.98
  for: [zip, tar]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])t[\\/]data$'
    case_insensitive: true
- id: github-actions-testdata-directory-path
  desc: GitHub Actions testdata path
  crit: component
  conf: 0.95
  for: [github-actions]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])testdata([\\/]|$)'
    case_insensitive: true
- id: test-resources-directory-path
  desc: File in test resources directory
  crit: component
  conf: 0.95
  for: [go, kotlin, java, python, data]
  if:
    type: path
    dirname: true
    substr: test/resources
    case_insensitive: true
- id: test-fixture-directory-name
  desc: Test fixtures directory name
  crit: component
  conf: 0.95
  for: [python, javascript, typescript]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])_{0,2}test[_-]fixtures?_{0,2}([\\/]|$)'
    case_insensitive: true
- id: tests-data-directory-path
  desc: File in tests data directory
  crit: component
  conf: 0.95
  for: [go, python, javascript, typescript, html]
  if:
    type: path
    dirname: true
    substr: /data
    case_insensitive: true
- id: curl-http-testenv-path
  desc: curl HTTP testenv harness
  crit: component
  conf: 0.98
  for: [python]
  if:
    type: text
    exact: from .ports import alloc_ports_and_do
- id: definitelytyped-package-path
  desc: DefinitelyTyped package path
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: path
    regex: 'types[\\/].{0,40}[\\/]'
- id: definitelytyped-test-directory-source-path
  desc: DefinitelyTyped test directory source path
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: path
    regex: 'test[\\/][^\\/]+\\.[cm]?[jt]sx?$'
- id: definitelytyped-test-filename-source-path
  desc: DefinitelyTyped test filename source path
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: path
    basename: true
    regex: '^[^\\/]+[-_.]tests?\\.[cm]?[jt]sx?$'
- id: go-tools-testdata-directory-path
  desc: Go tooling testdata file
  crit: component
  conf: 0.95
  for: [go, kotlin, elf, macho, data, zip, archives]
  if:
    type: path
    regex: ^.{0,500}[\\/]testdata[\\/].{0,500}$
- id: shell-crate-test-path
  desc: Shell crate test path
  crit: component
  conf: 0.95
  for: [shell, rust]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])(tests?|fixtures?)([\\/]|$)'
- id: shell-testsuite-script
  desc: Shell testsuite script filename
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: path
    basename: true
    exact: testsuite
- id: rust-embedded-shell-test-source
  desc: Rust embedded shell test source
  crit: component
  conf: 0.95
  for: [rust]
  if:
    type: text
    regex: '#\s*\[\s*test\s*\][\s\S]{0,400}\blet\s+source\s*=\s*"\\'
- id: rust-crate-bench-path
  desc: Rust crate benchmark path
  crit: component
  conf: 0.95
  for: [rust]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])benches([\\/]|$)'
- id: rust-crate-example-path
  desc: Rust crate example path
  crit: component
  conf: 0.95
  for: [rust]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])examples([\\/]|$)'
- id: shell-tests-testdata-path
  desc: Shell .test.sh fixture source
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: path
    basename: true
    regex: '.*\.test\.sh$'
- id: shell-tests-script-basename
  desc: Shell tests.* script basename
  crit: baseline
  conf: 0.95
  for: [shell]
  if:
    type: path
    basename: true
    regex: '^tests?\.[A-Za-z0-9_.-]+\.sh$'
- id: smoke-test-source-path
  desc: Smoke test source path
  crit: component
  conf: 0.95
  for: [shell, python, javascript, typescript, go]
  if:
    type: path
    basename: true
    regex: '(^|.*[-_.])smoke\.(sh|py|mjs|js|go)$'
- id: atom-ui-gallery-localization-sample
  desc: Atom UI Gallery localization sample
  crit: component
  conf: 0.95
  for: [csharp]
  if:
    type: path
    regex: 'AtomUIGallery[\\/]ShowCases.{0,80}[a-z]{2}_[A-Z]{2}\.cs$'
- id: msal-cache-storage-integration-test
  desc: MSAL cache storage integration test
  crit: component
  conf: 0.95
  for: [csharp]
  if:
    type: path
    basename: true
    exact: MsalCacheStorageIntegrationTests.cs
- id: netcore-testapp-single-message-listener
  desc: NetCore test app TCP listener
  crit: component
  conf: 0.95
  for: [csharp]
  if:
    type: path
    basename: true
    exact: SingleMessageTcpListener.cs
- id: msal-wam-dev-form
  desc: MSAL WAM dev form
  crit: component
  conf: 0.95
  for: [csharp]
  if:
    type: text
    substr: resultTbx.AppendText(message + Environment.NewLine)
- id: atom-ui-gallery-infoflyout-sample
  desc: Atom UI Gallery InfoFlyout sample
  crit: component
  conf: 0.95
  for: [csharp]
  if:
    type: path
    basename: true
    exact: InfoFlyoutViewModel.cs
- id: conformance-test-path
  desc: Conformance test source path
  crit: component
  conf: 0.95
  for: [shell, python, javascript, typescript, go]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])conformance([\\/]|$)'
- id: test-path-basename
  desc: Test path basename
  crit: component
  conf: 1.0
  for: [javascript, typescript, python, pyc, rust]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])test([\\/]|$)'
- id: tests-path-basename
  desc: Tests path basename
  crit: component
  conf: 1.0
  for: [javascript, typescript, python, pyc]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])tests([\\/]|$)'
- id: spec-path-basename
  desc: Spec path basename
  crit: component
  conf: 1.0
  for: [javascript, typescript, python, pyc, ruby]
  if:
    type: path
    dirname: true
    regex: '(^|[\\/])spec([\\/]|$)'
- id: php-test-or-fixture-path
  desc: PHP test, spec, or fixture path
  crit: component
  conf: 0.9
  for: [php]
  ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
  if:
    type: path
    regex: '(^|[\\/])(test|tests|spec|fixtures?)([\\/]|$)'

composite_rules:
- id: test-spec-path-benign-context
  desc: Test or spec path context
  crit: component
  conf: 1.0
  any:
  - id: test-path-basename
  - id: tests-path-basename
  - id: spec-path-basename
  # A `conformance/` directory is the same kind of test-suite path fact as the
  # test/tests/spec basenames above (gRPC, OCI, WebAssembly and Kubernetes all
  # ship one), so it belongs in this benign-test-path context rather than
  # sitting orphaned.
  - id: conformance-test-path
- id: shell-test-fixture-source
  desc: Shell test fixture source
  crit: component
  conf: 0.95
  for: [shell, rust]
  any:
  - id: shell-crate-test-path
  - id: rust-embedded-shell-test-source
  - id: shell-tests-testdata-path
- id: definitelytyped-test-source-path
  desc: DefinitelyTyped test source path
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: definitelytyped-package-path
  any:
  - id: definitelytyped-test-directory-source-path
  - id: definitelytyped-test-filename-source-path
  needs: 1
