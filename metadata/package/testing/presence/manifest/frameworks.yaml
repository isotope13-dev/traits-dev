defaults:
  platforms: [windows, unix]
  for:
    - package.json
traits:
  - id: pkg-test-script-field
    desc: '"test": script in package.json'
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/files/dependency::node-modules-nested-package-json
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
      - type: text
        substr: '"name": "inflight"'
      - type: value
        path: repository.url
        regex: github\.com/
      - type: value
        path: main
        exists: true
    if:
      type: text
      substr: '"test":'
  - id: has-jest
    desc: Package uses Jest testing framework
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '"jest"|jest\.config\.js'
  - id: has-mocha
    desc: Package uses Mocha testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"mocha"|\.mocharc'
    unless:
      - id: metadata/package/files/dependency::node-modules-nested-package-json
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: keywords
        regex: tabby-builtin-plugin
      - type: value
        path: repository.url
        regex: github\.com/
  - id: has-ava
    desc: Package uses Ava testing framework
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/files/dependency::node-modules-nested-package-json
      - type: value
        path: devDependencies
        exists: true
    if:
      type: text
      regex: '"ava"|"ava":'
  - id: has-cypress
    desc: Package uses Cypress testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"cypress"|cypress\.config'
  - id: has-playwright
    desc: Package uses Playwright testing framework
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"playwright"|playwright\.config'
  - id: has-karma
    desc: Package uses Karma test runner
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"karma"|karma\.conf\.js'
  - id: has-test-dir
    desc: Package has a test directory
    crit: notable
    conf: 0.85
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: main
        exists: true
    if:
      type: text
      regex: '"directories"\s*:\s*\{[^}]{0,80}"test"\s*:|"__tests__"'
  - id: has-assertions
    desc: Code uses common assertion libraries
    crit: notable
    conf: 0.85
    for:
      - javascript
      - typescript
    unless:
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    if:
      type: text
      regex: require\s*\(\s*['"](chai|should|expect)['"]
  - id: test-fixtures
    desc: References to test fixture files
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
      - type: text
        substr: tabby-builtin-plugin
    if:
      type: string_literal
      regex: fixtures/|testdata/|__fixtures__/
