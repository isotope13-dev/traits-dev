defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
traits:
- id: js-test-basename-a
  desc: JS test basename pattern
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: path
    basename: true
    regex: test[-_].{0,220}\.[jt]s$|.{0,220}[-_]test\.[jt]s$
  unless:
  - type: basename
    regex: "^test-api\\.[jt]s$"
- id: js-test-basename-b
  desc: JS spec basename pattern
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: path
    basename: true
    regex: ".{0,220}\\.spec\\.[jt]s$"
- id: tabby-builtin-keyword
  desc: Tabby builtin plugin keyword
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: tabby-builtin-plugin
- id: playwright-test-plugin-fixture
  desc: Playwright test plugin package fixture
  crit: baseline
  conf: 0.99
  if:
    type: text
    substr: '"name": "playwright-test-plugin"'
- id: playwright-runtime-dependency
  desc: Playwright runtime dependency
  crit: baseline
  conf: 0.95
  if:
    type: value
    path: dependencies.playwright
    exists: true
- id: playwright-test-dev-dependency
  desc: Playwright test dev dependency
  crit: baseline
  conf: 0.95
  if:
    type: value
    path: devDependencies.@playwright/test
    exists: true
- id: test-fixture-package-json-path
  desc: package.json under test fixture path
  crit: component
  conf: 0.9
  if:
    type: path
    regex: "(fixtures|components).{0,80}package\\.json$"
- id: constants-js-basename
  desc: constants JavaScript module basename
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: path
    regex: "(?i)(^|/)constants\\.[jt]sx?$"
composite_rules:
- id: playwright-test-package-context
  desc: Playwright test package context
  crit: baseline
  conf: 0.99
  any:
  - id: metadata/package/testing/presence/fixture::playwright-runtime-dependency
  - id: metadata/package/testing/presence/fixture::playwright-test-dev-dependency
  - id: metadata/package/testing/presence/fixture::playwright-test-plugin-fixture
