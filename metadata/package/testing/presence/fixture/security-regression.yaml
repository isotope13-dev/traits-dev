defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.99

traits:
  - id: php-security-test-file
    desc: PHP security test filename
    if:
      type: path
      basename: true
      regex: '(SecurityTest|ShellEscapingTest)\.php$'

  - id: php-test-file
    desc: PHP test filename
    crit: notable
    conf: 0.9
    if:
      type: path
      basename: true
      regex: 'Test\.php$'

  - id: php-test-declaration
    desc: PHP test declaration marker
    if:
      type: text
      regex: '\b(test|it|describe)\s*\('

  - id: php-security-regression-language
    desc: PHP security regression test language
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)command injection|security|sanitiz'

composite_rules:
  - id: php-security-test-context
    desc: PHP security test context
    crit: exception
    conf: 0.99
    all:
      - id: php-security-test-file
      - id: php-test-declaration

  - id: php-security-regression-test-context
    desc: PHP security regression test context
    crit: exception
    conf: 0.98
    all:
      - id: php-test-file
      - id: php-test-declaration
      - id: php-security-regression-language
