defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.99

traits:
  - id: php-security-test-file
    desc: PHP security test filename
    if:
      type: path
      basename: true
      regex: '(SecurityTest|ShellEscapingTest)\.php$'

  - id: php-test-file
    desc: PHP test filename
    crit: notable
    conf: 0.9
    if:
      type: path
      basename: true
      regex: 'Test\.php$'

  - id: php-test-declaration
    desc: PHP test declaration marker
    if:
      type: text
      regex: '\b(test|it|describe)\s*\('

  - id: php-security-regression-language
    desc: PHP security regression test language
    crit: notable
    conf: 0.9
    if:
      type: text
      # Require test-oriented phrases — bare "security" FPs on canary/beacon copy.
      regex: '(?i)command injection|sanitiz|security test'
    unless:
      # Generated Composer symbol tables can contain `security` in class names;
      # those are package metadata, not security-test language.
      - type: path
        regex: '(?i)vendor[/\\]composer[/\\]autoload_(classmap|static|real)\.php$'

composite_rules:
  - id: php-security-test-context
    desc: PHP security test context
    crit: exception
    conf: 0.99
    all:
      - id: php-security-test-file
      - id: php-test-declaration

  - id: php-security-regression-test-context
    desc: PHP security regression test context
    crit: exception
    conf: 0.98
    all:
      - id: php-test-file
      - id: php-test-declaration
      - id: php-security-regression-language
