defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
    - package.json
traits:
  - id: test-components-package-json-path
    desc: package.json under tests component path
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: path
      regex: (__tests__|tests).{0,300}(components|_*fixtures?_*)[^\/!]{0,80}[\/]package\.json$
  - id: definitelytyped-package-json-path
    desc: DefinitelyTyped types package manifest
    crit: component
    conf: 0.9
    for:
      - package.json
    if:
      type: path
      regex: (^|[\/!])DefinitelyTyped-[^\/!]+[\/]types[\/!][^\/!]+[^\/!]{0,80}[\/]package\.json$
  - id: types-helper-package-json-path
    desc: Tiny types helper package manifest
    crit: component
    conf: 0.96
    for:
      - package.json
    size_max: 1024
    unless:
      - id: metadata/package/quality/empty::npm-has-name
      - id: metadata/package/versioning::npm-has-version
    if:
      type: value
      path: dependencies
      exists: true
  - id: install-failing-fixture-name
    desc: Install failing fixture name
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: failing$|^optional-dep$|^blocking$
  - id: install-dep-fixture-name
    desc: Install dep fixture name
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: ^dep-([a-d]|optional|incompatible)$|^[a-z0-9-]+-scripted$
  - id: yarn-workspace-fixture-name
    desc: Yarn workspace fixture name
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: ^example-yarn-workspace-[0-9]+$
  - id: yarn-auth-fixture-name
    desc: Yarn auth checksum fixture package name
    crit: baseline
    conf: 0.95
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '^install-update-auth-|^install-update-checksums'
  - id: scoped-test-fixture-package-name
    desc: Scoped test fixture package name
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: name
      regex: '^@(dengorbachev|denotest)/'
  - id: install-fixture-zero-version
    desc: Install fixture uses zero version
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: version
      exact: 0.0.0
  - id: install-fixture-install-script
    desc: Install fixture runs local install.js
    crit: baseline
    conf: 0.9
    for:
      - package.json
    if:
      type: value
      path: scripts.install
      exact: node install.js
  - id: jest-expect-call
    desc: expect() function call
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: expect
  - id: mocha-describe-call
    desc: Mocha describe() call
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: describe(
  - id: test-filename-pattern
    desc: Common test filename pattern
    crit: baseline
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: path
      basename: true
      regex: '(^|[-_.])(tests?|spec)\.[cm]?[jt]sx?(\.snap)?$|[-_.]tests?\.[cm]?[jt]sx?$'
  - id: semgrep-rule-fixture
    desc: Semgrep rule test fixture annotations
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - typescript
    count_min: 2
    if:
      type: text
      regex: '(?i)(/[/\*]|#)\s*(ruleid|ok):\s*[A-Za-z0-9_.-]+'
  - id: wpt-test-title
    desc: Web Platform Test title pattern
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: Web Platform Test
  - id: wpt-security-features-resource
    desc: WPT security-features resource helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - html
    if:
      type: text
      regex: 'web-platform-tests|common/security-features'
  - id: react-native-release-fixture-name
    desc: React Native release fixture package name
    crit: component
    conf: 0.98
    for:
      - package.json
    if:
      type: value
      path: name
      exact: react-native
  - id: react-native-release-fixture-description
    desc: React Native release fixture description
    crit: component
    conf: 0.98
    for:
      - package.json
    if:
      type: value
      path: description
      exact: fake react native package
  - id: react-native-release-fixture-metro-config
    desc: React Native fixture metro-config dependency
    crit: component
    conf: 0.95
    for:
      - package.json
    if:
      type: value
      path: dependencies.metro-config
      regex: '^\^?0\.[0-9]+\.[0-9]+$'
  - id: react-native-release-fixture-metro-runtime
    desc: React Native fixture metro-runtime dependency
    crit: component
    conf: 0.95
    for:
      - package.json
    if:
      type: value
      path: dependencies.metro-runtime
      regex: '^\^?0\.[0-9]+\.[0-9]+$'
  - id: frontend-helper-dependency-present
    desc: Frontend helper dependency is present
    crit: component
    conf: 0.95
    for:
      - package.json
    if:
      type: value
      path: dependencies.preact
      regex: '.+'
  - id: definitelytyped-types-helper-package-path
    desc: DefinitelyTyped helper package manifest path
    crit: component
    conf: 0.98
    for:
      - package.json
    if:
      type: path
      regex: '(^|[\\/!])DefinitelyTyped-[^\\/!]+[\\/]types[\\/!][^\\/!]+[\\/]package\.json$'
  - id: piot-fixture-name
    desc: Put It Out There fixture name
    crit: component
    conf: 0.98
    for:
      - pkginfo
    if:
      type: value
      path: name
      regex: '^piot-fixture-zzz-'
  - id: piot-fixture-summary
    desc: Put It Out There fixture summary
    crit: component
    conf: 0.98
    for:
      - pkginfo
    if:
      type: value
      path: summary
      exact: Put It Out There canary fixture. Safe to ignore.
composite_rules:
  - id: component-test-package-json-path
    desc: package.json under fixture or helper path
    crit: component
    conf: 0.9
    any:
      - id: test-components-package-json-path
      - id: definitelytyped-package-json-path
      - id: types-helper-package-json-path
      - id: definitelytyped-types-helper-package-path


  - id: install-fixture-name
    desc: Install fixture package name
    crit: baseline
    conf: 0.9
    any:
      - id: install-failing-fixture-name
      - id: install-dep-fixture-name
      - id: yarn-workspace-fixture-name
  - id: npm-fixture-package-name
    desc: NPM fixture or helper package
    crit: baseline
    conf: 0.9
    any:
      - id: install-fixture-name
      - id: yarn-auth-fixture-name
      - id: scoped-test-fixture-package-name
      - id: definitelytyped-types-helper-package
  - id: component-test-package-json
    desc: package.json under component or fixture test path
    crit: baseline
    conf: 0.9
    for:
      - package.json
    any:
      - id: component-test-package-json-path
      - id: types-helper-package-json-path
      - id: react-native-release-fixture-package
  - id: preact-package-fixture-context
    desc: Benign fixture package with Preact dependency
    crit: baseline
    conf: 0.98
    for:
      - package.json
    any:
      - id: definitelytyped-private-test-package
      - id: definitelytyped-types-helper-package
      - id: preact-declaration-helper-fixture
      - id: types-private-fixture-package
      - id: types-helper-package-json-path
      - id: component-test-package-json-path
      - id: definitelytyped-types-helper-package-path
      - id: definitelytyped-package-json-path
  - id: install-fixture-package-json
    desc: Tiny install-fixture package manifest
    crit: baseline
    conf: 0.9
    for:
      - package.json
    size_max: 200
    all:
      - id: install-fixture-name
      - id: install-fixture-zero-version
      - id: install-fixture-install-script
  - id: jest-test-file
    desc: Jest test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: jest-expect-call
      - id: test-filename-pattern
  - id: mocha-test-file
    desc: Mocha test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: mocha-describe-call
      - id: test-filename-pattern
  - id: wpt-test-file
    desc: Web Platform Test (WPT) file
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - html
    any:
      - id: wpt-test-title
      - id: wpt-security-features-resource
      - id: metadata/lang/javascript-features::promise-test-call
      - id: metadata/lang/javascript-features::async-test-call
  - id: react-native-release-fixture-package
    desc: React Native release fixture package
    crit: baseline
    conf: 0.98
    for:
      - package.json
    size_max: 1024
    all:
      - id: react-native-release-fixture-name
      - id: react-native-release-fixture-description
      - id: react-native-release-fixture-metro-config
      - id: react-native-release-fixture-metro-runtime
  - id: piot-canary-fixture-package
    desc: Put It Out There canary fixture package
    crit: baseline
    conf: 0.98
    for:
      - pkginfo
    all:
      - id: piot-fixture-name
      - id: piot-fixture-summary
  - id: types-private-fixture-package
    desc: Tiny private helper package manifest
    crit: baseline
    conf: 0.96
    for:
      - package.json
    size_max: 512
    all:
      - id: metadata/package/manifest/publishing::is-private
    unless:
      - id: metadata/package/quality/empty::npm-has-name
      - id: metadata/package/versioning::npm-has-version
  - id: definitelytyped-private-test-package
    desc: DefinitelyTyped private test package manifest
    crit: baseline
    conf: 0.98
    for:
      - package.json
    size_max: 1024
    all:
      - id: metadata/package/testing/presence/fixture::definitelytyped-package-json-path
      - id: metadata/package/manifest/publishing::is-private
      - id: types-private-fixture-package
  - id: preact-declaration-helper-fixture
    desc: Private Preact helper fixture package
    crit: baseline
    conf: 0.95
    for:
      - package.json
    size_max: 1024
    all:
      - id: frontend-helper-dependency-present
      - id: metadata/package/manifest/publishing::is-private
    any:
      - id: component-test-package-json-path
      - id: types-helper-package-json-path
      - id: types-private-fixture-package
      - id: definitelytyped-types-helper-package-path
  - id: definitelytyped-types-helper-package
    desc: DefinitelyTyped private helper package
    crit: baseline
    conf: 0.98
    for:
      - package.json
    size_max: 1024
    all:
      - id: metadata/package/manifest/publishing::is-private
      - id: types-private-fixture-package
      - id: types-helper-package-json-path
    any:
      - id: definitelytyped-types-helper-package-path
      - id: preact-declaration-helper-fixture
      - id: definitelytyped-private-test-package
