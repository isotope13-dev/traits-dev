defaults:
  platforms: [unix]
  for:
    - elixir
traits:
  - id: elixir-test-filename-pattern
    desc: Elixir test filename pattern
    crit: component
    conf: 0.7
    if:
      type: basename
      regex: '(^|[-_.])(tests?|spec)\.exs$|(^|[-_.])test_.*\.exs$|[-_]test\.exs$'
  - id: csv-test-context-name
    desc: Elixir CSV test context name
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b(csvtest|test\s+".{0,80}csv)'
  - id: ip-address-column-literal
    desc: Elixir generated IP address column literal
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'ip_address: ['
composite_rules:
  - id: csv-ip-address-column-fixture
    desc: Elixir CSV parser test with generated IP address column
    crit: baseline
    conf: 0.9
    all:
      - type: trait
        id: metadata/package/testing/presence/fixture::elixir-test-filename-pattern
      - type: trait
        id: metadata/package/testing/presence/fixture::csv-test-context-name
      - type: trait
        id: metadata/package/testing/presence/fixture::ip-address-column-literal
