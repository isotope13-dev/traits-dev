defaults:
  platforms: [unix, windows]
  for: [zip]

traits:
  - id: certificate-pairs-fixture-directory
    desc: Certificate-pairs test corpus directory
    crit: notable
    conf: 0.98
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)certpairs/$'

  - id: certificate-fixture-directory
    desc: Certificate test corpus directory
    crit: notable
    conf: 0.98
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)certs/$'

  - id: pkcs12-fixture-directory
    desc: PKCS#12 test corpus directory
    crit: notable
    conf: 0.98
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)pkcs12/$'

composite_rules:
  - id: certificate-test-corpus
    desc: Certificate validation test corpus archive
    crit: exception
    conf: 0.99
    all:
      - id: certificate-pairs-fixture-directory
      - id: certificate-fixture-directory
      - id: pkcs12-fixture-directory
