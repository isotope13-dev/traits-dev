defaults:
  platforms: [windows, unix]

traits:
- id: testdata-directory-path
  desc: File in a test-data directory
  crit: component
  conf: 0.98
  for: [powershell, csharp, pe]
  if:
    type: path
    dirname: true
    regex: '[\\/]testdata[\\/]'
    case_insensitive: true
- id: xml-testdata-directory-path
  desc: XML file in a test-data directory
  crit: component
  conf: 0.98
  for: [xml]
  if:
    type: path
    dirname: true
    regex: '(^|/)testdata(/|$)'
    case_insensitive: true
- id: test-suite-directory-path
  desc: File in a named test-suite directory
  crit: component
  conf: 0.98
  for: [powershell, csharp, pe]
  if:
    type: path
    dirname: true
    regex: '[/][A-Za-z0-9_.-]{1,50}tests[/]'
    case_insensitive: true
- id: test-harness-directory-path
  desc: File in a named test harness directory
  crit: component
  conf: 0.98
  for: [powershell]
  if:
    type: path
    dirname: true
    regex: '[\\/](correlationtestbed|testbed)[\\/]'
    case_insensitive: true

composite_rules:
- id: test-artifact-context
  desc: Repository test artifact or harness context
  crit: baseline
  conf: 0.99
  for: [powershell, csharp, pe]
  any:
  - id: testdata-directory-path
  - id: test-suite-directory-path
  - id: test-harness-directory-path
