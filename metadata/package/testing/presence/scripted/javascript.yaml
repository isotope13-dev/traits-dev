defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: it-call
    desc: it() function call
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '\bit\s*\(\s*[''"]'
  - id: before-each-call
    desc: beforeEach hook
    crit: notable
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: beforeEach
  - id: after-each-call
    desc: afterEach hook
    crit: notable
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: afterEach
  - id: before-call
    desc: Calls a test-suite before() hook
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?m)^\s*before\s*\('
  - id: after-call
    desc: Calls a test-suite after() hook
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?m)^\s*after\s*\('
  - id: chai-word
    desc: chai keyword
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness/
    if:
      type: text
      regex: 'chai\.|from .chai.|require\(.chai.\)'
  - id: dot-spec-filename
    desc: .spec. test filename marker
    crit: notable
    conf: 0.6
    if:
      type: path
      basename: true
      regex: '\.spec\.[a-z]+$'
  - id: underscore-spec-filename
    desc: _spec. in filename
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: _spec.
  - id: mock-data-ref
    desc: mockData reference
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: mockData
  - id: mocks-ref
    desc: __mocks__ reference
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: __mocks__
  - id: sinon-stub-call
    desc: sinon.stub call
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: sinon.stub
  - id: faker-word
    desc: faker keyword
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: faker
  - id: cypress-cy-command
    desc: cy. Cypress command
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      exact: cy.
  - id: screen-get-by
    desc: screen.getBy query
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: screen.getBy
  - id: screen-find-by
    desc: screen.findBy query
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: screen.findBy
  - id: screen-query-by
    desc: screen.queryBy query
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: screen.queryBy
  - id: screen-get-all-by
    desc: screen.getAllBy query
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: screen.getAllBy
  - id: fire-event-method
    desc: fireEvent. method
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: fireEvent.
  - id: user-event-method
    desc: userEvent. method
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: userEvent.
  - id: wait-for-call
    desc: waitFor() call
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: waitFor
    unless:
      - type: text
        substr: waitFor(selectorOrFunctionOrTimeout,
  - id: karma-conf-ref
    desc: karma.conf config file
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: karma.conf
  - id: quoted-test-case-label
    desc: Quoted test case label
    crit: baseline
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: "[\"']test:\\s[^\"']{1,120}[\"']\\s*:"
