defaults:
  platforms: [unix, windows]
  for: [scripts, source]

traits:
  - id: v8-mjsunit-assertions
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_v8_mjsunit_assertions__
  - id: python-stdlib-test-support
    desc: Python stdlib test harness
    crit: baseline
    conf: 0.9
    for:
      - python
    if:
      type: text
      regex: 'from\s+test[.]support\b'
