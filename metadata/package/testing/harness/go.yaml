defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - go
traits:
  - id: go-testing-t
    desc: testing.T type
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: testing.T
  - id: go-testing-m
    desc: testing.M type
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: testing.M
  - id: go-testing-b
    desc: testing.B type
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: testing.B
  - id: go-func-test
    desc: func Test prefix
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      substr: func Test
  - id: go-t-error
    desc: t.Error method
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: t.Error
  - id: go-t-fatal
    desc: t.Fatal method
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: t.Fatal
composite_rules:
  - id: go-test
    desc: Go testing package
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: go-testing-t
      - id: go-testing-m
      - id: go-testing-b
      - id: go-func-test
      - id: go-t-error
      - id: go-t-fatal
