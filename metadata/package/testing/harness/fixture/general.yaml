defaults:
  platforms: [windows, unix]
  for:
  - scripts
  - source
traits:
- id: nock-mock
  desc: Nock HTTP mock usage
  crit: component
  conf: 0.95
  for:
  - javascript
  - typescript
  if:
    type: symbol
    exact: nock
- id: extension-fixture-manifest-path
  desc: Browser extension manifest under test fixtures
  crit: baseline
  conf: 0.95
  for:
  - chrome-manifest
  if:
    type: path
    regex: (?i)(^|[\\/])(test|tests|spec)[\\/]fixtures[\\/].{0,160}[\\/]manifest\.json$
- id: electron-webrequest-fixture-name
  desc: Electron webRequest fixture manifest name
  crit: component
  conf: 0.95
  for:
  - chrome-manifest
  if:
    type: value
    path: name
    exact: chrome-webRequest
- id: electron-webrequest-fixture-background
  desc: Electron webRequest fixture background script
  crit: component
  conf: 0.9
  for:
  - chrome-manifest
  if:
    type: value
    path: background.scripts
    exact: background.js
- id: electron-chrome-scripting-fixture-name
  desc: Electron chrome scripting fixture name
  crit: component
  conf: 0.95
  for:
  - chrome-manifest
  if:
    type: value
    path: name
    exact: execute-script
- id: electron-chrome-scripting-fixture-main
  desc: Electron chrome scripting fixture script
  crit: component
  conf: 0.95
  for:
  - chrome-manifest
  if:
    type: value
    path: 'content_scripts[*].js'
    exact: main.js
- id: electron-chrome-scripting-fixture-background
  desc: Electron chrome scripting fixture worker
  crit: component
  conf: 0.95
  for:
  - chrome-manifest
  if:
    type: value
    path: background.service_worker
    exact: background.js
- id: electron-chrome-api-extension-fixture--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: manifest_version
- id: electron-chrome-api-extension-fixture--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: content_scripts
- id: electron-chrome-api-extension-fixture--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: background.js
- id: electron-chrome-api-extension-fixture--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: permissions
- id: electron-chrome-api-extension-fixture--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: <all_urls>
- id: electron-chrome-api-extension-fixture--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: chrome-api
- id: electron-chrome-api-extension-fixture--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: main.js
- id: electron-chrome-api-extension-fixture--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - chrome-manifest
  if:
    type: text
    substr: name
- id: embedded-unit-test-fixture
  desc: Embedded code from source unit test fixture
  crit: baseline
  conf: 0.98
  for: [c, cpp]
  if:
    type: path
    basename: true
    regex: (?i)(test|spec).{0,80}\.[ch](c|pp|xx)?##plain@0x[0-9a-f]+$
- id: github-issues-field-repository-url
  desc: GitHub issues fixture repository_url field
  crit: baseline
  conf: 0.95
  for:
  - javascript
  if:
    type: text
    regex: repository_url:\s*['"]https://api\.github\.com/repos/
- id: cjk-long-string-fixture
  desc: CJK long-string fixture text
  crit: baseline
  conf: 0.98
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: 万与丑专业丛东丝丢两严丧个
- id: github-issues-field-timeline-url
  desc: GitHub issues fixture timeline_url field
  crit: baseline
  conf: 0.95
  for:
  - javascript
  if:
    type: text
    regex: timeline_url:.{0,64}/issues/[0-9]+/timeline
- id: github-issues-field-author-association
  desc: GitHub issues fixture author_association field
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: text
    regex: author_association:\s*['"][A-Z_]{3,20}['"]
- id: github-issues-field-performed-via-github-app
  desc: GitHub issues fixture performed_via_github_app field
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: text
    regex: performed_via_github_app:\s*(null|\{)
- id: github-issues-field-reactions
  desc: GitHub issues fixture reactions field
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: text
    regex: reactions:\s*\{
composite_rules:
- id: electron-webrequest-extension-fixture
  desc: Electron webRequest extension fixture
  crit: baseline
  conf: 0.98
  for:
  - chrome-manifest
  all:
  - id: electron-webrequest-fixture-name
  - id: electron-webrequest-fixture-background
- id: electron-chrome-scripting-fixture
  desc: Electron chrome scripting test fixture
  crit: baseline
  conf: 0.95
  for:
  - chrome-manifest
  all:
  - id: electron-chrome-scripting-fixture-name
  - id: electron-chrome-scripting-fixture-main
  - id: electron-chrome-scripting-fixture-background
- id: github-issues-api-fixture
  desc: GitHub issues API fixture data
  crit: baseline
  conf: 0.98
  all:
  - id: github-issues-field-repository-url
  - id: github-issues-field-timeline-url
  - id: github-issues-field-author-association
  any:
  - id: github-issues-field-performed-via-github-app
  - id: github-issues-field-reactions
- id: electron-chrome-api-extension-fixture
  desc: Electron chrome API extension fixture
  crit: baseline
  conf: 0.98
  for:
  - chrome-manifest
  all:
  - id: electron-chrome-api-extension-fixture--rx-1
  - id: electron-chrome-api-extension-fixture--rx-2
  - id: electron-chrome-api-extension-fixture--rx-3
  - id: electron-chrome-api-extension-fixture--rx-4
  - id: electron-chrome-api-extension-fixture--rx-5
  - id: electron-chrome-api-extension-fixture--rx-6
  - id: electron-chrome-api-extension-fixture--rx-7
  - id: electron-chrome-api-extension-fixture--rx-8
  near_bytes: 4096
