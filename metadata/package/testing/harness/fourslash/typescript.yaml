defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript

traits:
  - id: typescript-fourslash-verify
    desc: TypeScript fourslash verification call
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: \bverify\.completions\s*\(
  - id: typescript-fourslash-reference
    desc: TypeScript fourslash harness reference
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: <reference path=['"]fourslash\.ts['"]\s*/>

composite_rules:
  - id: typescript-fourslash-fixture
    desc: TypeScript fourslash test fixture
    crit: baseline
    conf: 0.99
    all:
      - id: typescript-fourslash-reference
      - id: typescript-fourslash-verify
