defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript

traits:
  - id: benchmark-chrome-launcher
    desc: Chrome benchmark launcher marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: chrome-launcher
  - id: benchmark-xvfb-start
    desc: Browser benchmark xvfb launcher
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: xvfb start
  - id: benchmark-lighthouse-config
    desc: Browser benchmark lighthouse config
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: lighthouse/lighthouse-core/config/perf-config
  - id: benchmark-localhost-8080
    desc: Browser benchmark localhost endpoint
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: http://localhost:8080/
