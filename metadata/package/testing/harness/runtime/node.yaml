defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
- id: node-common-require
  desc: Imports Node.js common test helper
  crit: notable
  for:
  - javascript
  - typescript
  size_max: 131072
  count_min: 3
  unless:
  - type: basename
    regex: ^bundle\.(c|m)?js$
  - type: basename
    regex: ^main\.(c|m)?js$
  if:
    type: text
    substr: require('../common')
- id: typescript-harness-import
  desc: Imports TypeScript test Harness namespace
  crit: baseline
  conf: 0.9
  for:
  - typescript
  - javascript
  if:
    type: text
    substr: 'from "./_namespaces/Harness'
- id: test-function-def
  desc: Defines generic test function
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: function test\s*\(\)\s*\{
- id: v8-native-syntax-eval
  desc: Uses V8 native syntax via eval
  for:
  - javascript
  if:
    type: text
    regex: eval\(["']%[A-Z][a-zA-Z]+
- id: v8-js-fuzzer-unicode-fixture-name
  desc: V8 JS fuzzer unicode fixture filename
  crit: component
  conf: 0.98
  for:
  - javascript
  if:
    type: path
    basename: true
    exact: mutate_unicode_string_literal_expected.js
- id: v8-native-intrinsic-call
  desc: V8 native intrinsic call
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: text
    regex: '%(DebugPrint|GetOptimizationStatus|OptimizeFunctionOnNextCall|CollectGarbage)\s*\('
- id: joyent-copyright
  desc: Joyent copyright header Node.js
  if:
    type: text
    substr: Copyright Joyent, Inc. and other Node contributors
- id: test-basename-prefix
  desc: Node.js test filename prefix
  for:
  - javascript
  - typescript
  if:
    type: path
    basename: true
    regex: ^test([A-Z].{0,48}|[-_.].{0,50})\.(c|m)?[jt]sx?(\.snap)?$
- id: test-basename-suffix
  desc: Node.js test filename suffix
  for:
  - javascript
  - typescript
  if:
    type: path
    basename: true
    regex: .{0,50}[-_.]tests?\.(c|m)?[jt]sx?(\.snap)?$
- id: test-basename-spec
  desc: Node.js spec filename suffix
  for:
  - javascript
  - typescript
  if:
    type: path
    basename: true
    regex: .{0,50}[-.]spec\.(c|m)?[jt]sx?(\.snap)?$
- id: correct-incorrect-fixture-comments
  desc: Correct/incorrect fixture comments
  crit: baseline
  conf: 0.85
  for:
  - javascript
  - typescript
  count_min: 2
  if:
    type: text
    regex: //\s*(in)?correct\b
- id: karma-runtime-global
  desc: Karma browser runtime global
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: __karma__
- id: karma-custom-shard-strategy
  desc: Karma custom shard strategy
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: customShardStrategy
- id: karma-shard-index
  desc: Karma shard index field
  crit: baseline
  conf: 0.85
  for:
  - javascript
  if:
    type: symbol
    exact: shardIndex
- id: karma-executors-field
  desc: Karma executors field
  crit: baseline
  conf: 0.85
  for:
  - javascript
  if:
    type: symbol
    exact: executors
- id: test-case-function
  desc: Defines a test-case function
  crit: notable
  conf: 0.96
  for:
  - javascript
  - typescript
  if:
    type: symbol
    kind: function
    exact: test
- id: test-contains-assertion
  desc: Defines a containment assertion
  crit: notable
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: symbol
    kind: function
    exact: assertContains
- id: test-assertion-helper
  desc: Defines a test equality assertion
  crit: notable
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: symbol
    kind: function
    exact: assertEq
composite_rules:
- id: obfuscated-mocked-network-test-harness
  desc: Obfuscated unit-test harness
  crit: exception
  conf: 0.99
  for:
  - javascript
  - typescript
  all:
  - id: test-case-function
  - id: test-assertion-helper
  - id: test-contains-assertion
- id: karma-browser-shard-runtime
  desc: Karma browser shard runtime
  crit: baseline
  conf: 0.92
  for:
  - javascript
  all:
  - id: karma-runtime-global
  - id: karma-custom-shard-strategy
  - id: karma-shard-index
  - id: karma-executors-field
  - id: metadata/package/testing/scripted::js-bdd-describe-text
- id: v8-mjsunit-assert-pair
  desc: V8 mjsunit assertion helper pair
  crit: baseline
  conf: 0.9
  for:
  - javascript
  all:
  - id: metadata/package/testing/harness/v8::v8-mjsunit-assert-equals
  - id: metadata/package/testing/harness/v8::v8-mjsunit-assert-throws
- id: test-basename-pattern
  desc: Node.js test filename pattern
  for:
  - javascript
  - typescript
  any:
  - id: test-basename-prefix
  - id: test-basename-suffix
  - id: test-basename-spec
- id: node-core-test
  desc: Node core-style test file
  crit: baseline
  conf: 0.9
  for:
  - javascript
  - typescript
  all:
  - id: node-common-require
  - id: test-basename-pattern
- id: electron-node-spec-harness
  desc: Electron node spec harness
  crit: baseline
  conf: 0.98
  for:
  - javascript
  - typescript
  all:
  - id: metadata/package/testing/harness/electron::electron-main-import
  - id: metadata/package/testing/harness/electron::electron-spec-helpers-import
  - id: metadata/package/testing/harness/electron::electron-itremote-helper
- id: is-test
  desc: Test, spec, or fixture file
  crit: baseline
  conf: 0.9
  for: [scripts, binaries, manifests, typescript]
  any:
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/presence/harness::test-fixture-directory
  - id: metadata/package/testing/presence/harness::definitelytyped-test-source-path
  - id: metadata/package/testing/presence/harness::linux-kselftest-shell
  - id: metadata/package/testing/presence/harness::freebsd-atf-shell
  - id: metadata/package/testing/harness/fixture::extension-fixture-manifest-path
  - id: metadata/package/testing/harness/fixture::electron-chrome-api-extension-fixture
  - id: metadata/package/testing/harness/fixture::electron-webrequest-extension-fixture
  - id: metadata/package/testing/harness/fixture::electron-chrome-scripting-fixture
  - id: metadata/package/testing/harness/fixture::embedded-unit-test-fixture
  - id: metadata/package/testing/presence/fixture::semgrep-rule-fixture
  - id: v8-js-fuzzer-unicode-fixture-name
  - id: node-core-test
  - id: metadata/package/testing/harness/webkit::webkit-test-helpers
  - id: v8-mjsunit-assert-pair
  - id: metadata/package/testing/harness/v8::v8-mjsunit-assert-majority
  - id: metadata/package/testing/harness/v8::v8-mjsunit-runtime-harness
  - id: node-inspector-harness
  - id: test-basename-pattern
  - id: v8-native-intrinsic-call
  - id: metadata/package/testing/harness/v8::v8-mjsunit-native-test-file
  - id: metadata/package/testing/harness-lua::lua-busted-spec
  - id: metadata/package/testing/harness/v8::v8-mjsunit-flags-assert-file
  - id: metadata/package/testing/harness/v8::v8-regress-test-file
  - id: metadata/package/testing/harness/v8::v8-temporal-api-test-table
  - id: metadata/package/testing/harness/v8::v8-js-perf-test-harness
  - id: metadata/package/testing/harness/v8::v8-mjsunit-embedded-benchmark-harness
  - id: correct-incorrect-fixture-comments
  - id: karma-browser-shard-runtime
  - id: metadata/package/testing/presence/manifest::has-assertions
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  - id: metadata/package/testing/scripted::js-bdd-suite
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/presence/fixture::wpt-security-features-resource
  - id: typescript-harness-import
  - id: metadata/package/testing/harness/v8::v8-mjsunit-assert-harness
  - id: metadata/package/testing/scripted::xterm-terminal-recording
- id: browser-benchmark-harness
  desc: Local browser benchmark harness
  crit: baseline
  conf: 0.95
  all:
  - id: metadata/package/testing/harness/benchmark::benchmark-localhost-8080
  any:
  - id: metadata/package/testing/harness/benchmark::benchmark-chrome-launcher
  - id: metadata/package/testing/harness/benchmark::benchmark-xvfb-start
  - id: metadata/package/testing/harness/benchmark::benchmark-lighthouse-config
- id: node-inspector-harness
  desc: Identifies Node inspector test harness
  crit: baseline
  conf: 0.95
  all:
  - id: node-common-require
  - id: metadata/package/testing/harness/node-inspector::node-inspector-disabled-guard
  - id: metadata/package/testing/harness/node-inspector::node-inspector-helper-require
  any:
  - id: metadata/package/testing/harness/node-inspector::node-inspector-nodeinstance
  - id: metadata/package/testing/harness/node-inspector::node-inspector-session-api
