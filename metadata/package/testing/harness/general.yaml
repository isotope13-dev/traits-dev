defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - scripts
    - source
traits:
  - id: embedded-unit-test-fixture
    desc: Embedded code from source unit test fixture
    crit: baseline
    conf: 0.98
    for:
      - scripts
    if:
      type: basename
      regex: (?i)(test|spec).{0,80}\.[ch](c|pp|xx)?##plain@0x[0-9a-f]+$
  - id: github-issues-field-repository-url
    desc: GitHub issues fixture repository_url field
    crit: baseline
    conf: 0.95
    for:
      - javascript
    if:
      type: text
      regex: repository_url:\s*['"]https://api\.github\.com/repos/
  - id: github-issues-field-timeline-url
    desc: GitHub issues fixture timeline_url field
    crit: baseline
    conf: 0.95
    for:
      - javascript
    if:
      type: text
      regex: timeline_url:.{0,64}/issues/[0-9]+/timeline
  - id: github-issues-field-author-association
    desc: GitHub issues fixture author_association field
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: author_association:\s*['"][A-Z_]{3,20}['"]
  - id: github-issues-field-performed-via-github-app
    desc: GitHub issues fixture performed_via_github_app field
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: performed_via_github_app:\s*(null|\{)
  - id: github-issues-field-reactions
    desc: GitHub issues fixture reactions field
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: reactions:\s*\{
composite_rules:
  - id: github-issues-api-fixture
    desc: GitHub issues API fixture data
    crit: baseline
    conf: 0.98
    all:
      - id: github-issues-field-repository-url
      - id: github-issues-field-timeline-url
      - id: github-issues-field-author-association
    any:
      - id: github-issues-field-performed-via-github-app
      - id: github-issues-field-reactions
