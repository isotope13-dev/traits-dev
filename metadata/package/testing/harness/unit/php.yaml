defaults:
  platforms: [windows, unix]
  for:
    - php
  crit: baseline
traits:
  - id: php-test-runner
    desc: PHP Test Runner script
    conf: 1.0
    if:
      type: string_literal
      regex: php run-tests\.php \[options\]
  - id: php-test-sections
    desc: PHP Test sections (EXPECT/EXPECTF)
    conf: 0.8
    if:
      type: string_literal
      regex: ^={3,}\s*(EXPECT|EXPECTF|FILE|SKIPIF)
  - id: phpunit-ref
    desc: PHPUnit framework reference
    conf: 0.8
    if:
      type: string_literal
      regex: PHPUnit_Framework|phpunit/phpunit
  - id: tester-ref
    desc: Tester framework reference
    conf: 0.8
    if:
      type: string_literal
      regex: Tester\\Runner\\TestHandler

  - id: phpunit-testcase-extends
    desc: Extends PHPUnit TestCase class
    conf: 0.97
    if:
      type: text
      regex: 'extends\s+\\?(PHPUnit\\Framework\\)?TestCase\b'

  - id: symfony-kernel-testcase-extends
    desc: Extends Symfony KernelTestCase class
    conf: 0.95
    if:
      type: text
      regex: 'extends\s+\\?KernelTestCase\b'

  - id: symfony-web-testcase-extends
    desc: Extends Symfony WebTestCase class
    conf: 0.95
    if:
      type: text
      regex: 'extends\s+\\?WebTestCase\b'

  - id: phpunit-test-attribute
    desc: PHPUnit Test attribute declaration
    conf: 0.95
    if:
      type: text
      regex: '#\[Test\b'

  - id: phpunit-data-provider-attribute
    desc: PHPUnit DataProvider attribute
    conf: 0.95
    if:
      type: text
      regex: '#\[DataProvider\b'

  - id: phpunit-covers-attribute
    desc: PHPUnit Covers attribute
    conf: 0.95
    if:
      type: text
      substr: '#[Covers'

  - id: phpunit-lifecycle-attribute
    desc: PHPUnit lifecycle attribute (Before/After family)
    conf: 0.93
    if:
      type: text
      regex: '#\[(Before|After)(Class|Each)?\b'

  - id: phpunit-method-test-prefix
    desc: PHPUnit test_ method prefix
    conf: 0.8
    if:
      type: text
      regex: 'public\s+function\s+test[A-Z][A-Za-z0-9_]*\s*\('

  - id: phpunit-assertion-call
    desc: PHPUnit assertion method call
    conf: 0.9
    if:
      type: text
      regex: '\$this->assert[A-Z][A-Za-z]{2,}\s*\('

  # Test-framework vendor code (PHPUnit, phpspec/prophecy, phar-io, sebastian/*)
  # — framework internals and .phar fixtures, not the consumer's own code.
  # These legitimately contain eval(), self-file ops, and recon tokens that
  # trip webshell/virus matchers. Detected by file header / namespace markers.
  - id: phpunit-framework-header
    desc: PHPUnit framework file header
    conf: 0.97
    if:
      type: text
      substr: 'This file is part of PHPUnit'
  - id: php-test-framework-namespace
    desc: PHPUnit or Prophecy framework namespace
    conf: 0.95
    if:
      type: text
      regex: 'namespace\s+(PHPUnit|Prophecy|PharIo)\\'
  - id: phpunit-eval-stdin-file
    desc: PHPUnit eval-stdin code-coverage helper
    conf: 0.98
    if:
      type: path
      basename: true
      exact: 'eval-stdin.php'

composite_rules:
  # Helper: the "two supporting markers co-occur" branch of the test-context
  # detection. Pulled out because cleave composites don't accept inline `all:`
  # blocks inside an `any:` list.
  - id: phpunit-test-shape
    desc: PHPUnit test method + assertion co-occurrence
    crit: baseline
    conf: 0.9
    all:
      - id: phpunit-method-test-prefix
      - id: phpunit-assertion-call

  - id: phpunit-test-context
    desc: PHP file is PHPUnit test or test-framework vendor code
    crit: baseline
    conf: 0.97
    # Any single high-signal marker — TestCase extends, a PHPUnit attribute,
    # the test-method+assertion shape, or location under a test-framework
    # vendor dir — is enough to mark the file as test/dev-dependency code.
    any:
      - id: phpunit-testcase-extends
      - id: symfony-kernel-testcase-extends
      - id: symfony-web-testcase-extends
      - id: phpunit-test-attribute
      - id: phpunit-data-provider-attribute
      - id: phpunit-covers-attribute
      - id: phpunit-lifecycle-attribute
      - id: phpunit-test-shape
      - id: phpunit-framework-header
      - id: php-test-framework-namespace
      - id: phpunit-eval-stdin-file
