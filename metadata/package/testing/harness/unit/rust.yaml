defaults:
  platforms: [windows, unix]
  for:
    - rust
traits:
  - id: rust-test-attr
    desc: '#[test] attribute'
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      substr: '#[test]'
  - id: rust-cfg-test
    desc: '#[cfg(test)] attribute'
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: '#[cfg(test)]'
  - id: rust-assert-macro
    desc: assert! macro
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: assert!
  - id: rust-assert-eq-macro
    desc: assert_eq! macro
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: assert_eq!
  - id: rust-cargo-test
    desc: cargo test command
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      substr: cargo test
composite_rules:
  - id: rust-test
    desc: Rust test framework
    crit: notable
    conf: 0.95
    any:
      - id: rust-test-attr
      - id: rust-cfg-test
      - id: rust-assert-macro
      - id: rust-assert-eq-macro
      - id: rust-cargo-test
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
