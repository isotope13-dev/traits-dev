defaults:
  platforms: [unix, windows]
  for: [scripts, source]

traits:
  - id: python-stdlib-test-support-import
    desc: Python stdlib test support import
    crit: baseline
    conf: 0.9
    for:
      - python
    if:
      type: text
      regex: 'from\s+test[.]support\b'
  - id: python-stdlib-relative-util-import
    desc: Python stdlib relative util import
    crit: baseline
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: 'from\s+\.\.\s+import\s+util\b'
  - id: python-stdlib-util-test-both
    desc: Python stdlib util.test_both marker
    crit: baseline
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: 'util\.test_both\('

composite_rules:
  - id: python-stdlib-test-support
    desc: Python stdlib test harness
    crit: baseline
    conf: 0.9
    any:
      - id: python-stdlib-test-support-import
      - id: python-stdlib-relative-util-import
      - id: python-stdlib-util-test-both
