defaults:
  platforms: [unix, windows]
  for: [scripts, source]

traits:
  - id: python-unittest-import
    desc: Python unittest import
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(^|\n)\s*import\s+unittest\b|(^|\n)\s*from\s+unittest\s+import\b'
  - id: python-unittest-assert-raises
    desc: Python unittest assertRaises usage
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: symbol
      exact: assertRaises
  - id: python-unittest-testcase-marker
    desc: Python unittest TestCase marker
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '\bunittest\.TestCase\b|(^|\n)\s*class\s+\w+\s*\(\s*unittest\.TestCase\s*\)\s*:'
  - id: python-stdlib-test-support-import
    desc: Python stdlib test support import
    crit: baseline
    conf: 0.9
    for:
      - python
    if:
      type: text
      regex: 'from\s+test[.]support\b'
  - id: python-stdlib-relative-util-import
    desc: Python stdlib relative util import
    crit: baseline
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: 'from\s+\.\.\s+import\s+util\b'
  - id: python-stdlib-util-test-both
    desc: Python stdlib util.test_both marker
    crit: baseline
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: 'util\.test_both\('

composite_rules:
  - id: python-unittest-test-module
    desc: Python unittest-style test module
    crit: component
    conf: 0.95
    for: [python]
    all:
      - id: python-unittest-import
    any:
      - id: python-unittest-assert-raises
      - id: python-unittest-testcase-marker
  - id: python-stdlib-test-support
    desc: Python stdlib test harness
    crit: baseline
    conf: 0.9
    any:
      - id: python-stdlib-test-support-import
      - id: python-stdlib-relative-util-import
      - id: python-stdlib-util-test-both
