defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
- id: v8-flags-comment
  desc: V8 test flags comment
  crit: baseline
  conf: 0.95
  for:
  - javascript
  if:
    type: text
    regex: (?m)^// Flags:\s+--
- id: v8-regress-test-file
  desc: V8 numbered regression test file
  crit: baseline
  conf: 0.85
  for:
  - javascript
  size_max: 131072
  if:
    type: basename
    regex: '^regress-[0-9]+\.js$'
- id: v8-js-fuzzer-original-comment
  desc: V8 JS fuzzer original fixture comment
  crit: component
  conf: 0.95
  for:
  - javascript
  if:
    type: text
    regex: '(?m)^// Original: .{1,80}\.js$'
- id: v8-temporal-api-test-table
  desc: V8 Temporal API test table
  crit: baseline
  conf: 0.93
  for:
  - javascript
  if:
    type: text
    substr: "Temporal.ZonedDateTime.prototype.withTimeZone"
- id: v8-realm-eval-current
  desc: V8 Realm.eval current realm
  crit: baseline
  conf: 0.98
  for:
  - javascript
  if:
    type: text
    regex: Realm\.eval\s*\(\s*Realm\.current\s*\(\s*\)\s*,
- id: v8-mjsunit-native-test-file--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: allow-natives-syntax
  count_max: 1000258
- id: v8-mjsunit-native-test-file--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: stress-runs
  count_max: 1000259
- id: v8-mjsunit-native-test-file--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: expose-gc
  count_max: 1000260
- id: v8-mjsunit-native-test-file--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: NotEquals
  count_max: 1000261
- id: v8-mjsunit-native-test-file--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: assert
  count_max: 1000262
- id: v8-mjsunit-native-test-file--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: Throws
  count_max: 1000263
- id: v8-mjsunit-native-test-file--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: Flags
  count_max: 1000264
- id: v8-mjsunit-flags-assert-file--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  if:
    type: text
    substr: NotEquals
  count_max: 1000266
- id: v8-mjsunit-flags-assert-file--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  if:
    type: text
    substr: assert
  count_max: 1000267
- id: v8-mjsunit-flags-assert-file--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  if:
    type: text
    substr: Throws
  count_max: 1000268
- id: v8-mjsunit-flags-assert-file--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  if:
    type: text
    substr: Flags
  count_max: 1000269
- id: v8-js-perf-test-harness
  desc: V8 JavaScript perf test harness
  crit: baseline
  conf: 0.96
  for:
  - javascript
  if:
    type: text
    substr: "d8.file.execute('../base.js')"
- id: v8-mjsunit-assert-equals
  desc: V8 mjsunit assertEquals helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: assertEquals
- id: v8-mjsunit-assert-not-equals
  desc: V8 mjsunit assertNotEquals helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: assertNotEquals
- id: v8-mjsunit-assert-throws
  desc: V8 mjsunit assertThrows helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: assertThrows
- id: v8-mjsunit-assert-true
  desc: V8 mjsunit assertTrue helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: assertTrue
- id: v8-mjsunit-assert-false
  desc: V8 mjsunit assertFalse helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: assertFalse
- id: v8-mjsunit-assert-unreachable
  desc: V8 mjsunit assertUnreachable helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: symbol
    exact: assertUnreachable
- id: v8-mjsunit-expected-output
  desc: V8 mjsunit expected output assertion
  crit: baseline
  conf: 0.95
  for:
  - javascript
  if:
    type: text
    substr: EXPECTED_OUTPUT
- id: v8-inspector-test
  desc: V8 Inspector test harness usage
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: text
    substr: InspectorTest.
composite_rules:
- id: v8-mjsunit-assert-majority
  desc: V8 mjsunit assertion helper majority
  crit: baseline
  conf: 0.9
  needs: 3
  any:
  - id: v8-mjsunit-assert-equals
  - id: v8-mjsunit-assert-not-equals
  - id: v8-mjsunit-assert-throws
  - id: v8-mjsunit-assert-true
  - id: v8-mjsunit-assert-false
  - id: v8-mjsunit-assert-unreachable
- id: v8-clusterfuzz-js-fuzzer-fixture
  desc: V8 ClusterFuzz JS fuzzer fixture
  crit: baseline
  conf: 0.98
  for:
  - javascript
  all:
  - id: metadata/package/testing/harness/runtime::v8-js-fuzzer-unicode-fixture-name
  - id: v8-js-fuzzer-original-comment
- id: v8-mjsunit-runtime-harness
  desc: V8 mjsunit runtime harness
  crit: baseline
  conf: 0.95
  for:
  - javascript
  all:
  - id: v8-flags-comment
  any:
  - id: v8-realm-eval-current
  - id: metadata/package/testing/harness/runtime::v8-native-intrinsic-call
  - id: metadata/package/testing/harness/runtime::v8-native-syntax-eval
- id: v8-mjsunit-assert-harness
  desc: V8 mjsunit assertion-based test harness
  crit: baseline
  conf: 0.95
  for:
  - javascript
  all:
  - id: v8-flags-comment
  any:
  - id: v8-mjsunit-assert-equals
  - id: v8-mjsunit-assert-not-equals
  - id: v8-mjsunit-assert-throws
  - id: v8-mjsunit-assert-true
  - id: v8-mjsunit-assert-false
  - id: v8-mjsunit-assert-unreachable
- id: v8-mjsunit-embedded-benchmark-harness
  desc: V8 mjsunit embedded benchmark harness
  crit: baseline
  conf: 0.95
  for:
  - javascript
  all:
  - id: v8-mjsunit-assert-equals
  - id: v8-mjsunit-expected-output
- id: v8-mjsunit-native-test-file
  desc: V8 mjsunit native test file
  crit: baseline
  conf: 0.96
  for:
  - javascript
  any:
  - id: v8-mjsunit-native-test-file--rx-1
  - id: v8-mjsunit-native-test-file--rx-2
  - id: v8-mjsunit-native-test-file--rx-3
  - id: v8-mjsunit-native-test-file--rx-4
  - id: v8-mjsunit-native-test-file--rx-5
  - id: v8-mjsunit-native-test-file--rx-6
  - id: v8-mjsunit-native-test-file--rx-7
- id: v8-mjsunit-flags-assert-file
  desc: V8 mjsunit flags assertion file
  crit: baseline
  conf: 0.94
  for:
  - javascript
  any:
  - id: v8-mjsunit-flags-assert-file--rx-9
  - id: v8-mjsunit-flags-assert-file--rx-10
  - id: v8-mjsunit-flags-assert-file--rx-11
  - id: v8-mjsunit-flags-assert-file--rx-12
