defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - scripts
    - source
    - manifests
traits:
  - id: node-common-require
    desc: Imports Node.js common test helper
    crit: notable
    if:
      type: raw
      substr: require('../common')
  - id: typescript-harness-import
    desc: Imports TypeScript test Harness namespace
    crit: baseline
    conf: 0.9
    for:
      - typescript
      - javascript
    if:
      type: raw
      substr: from "./_namespaces/Harness
  - id: test-function-def
    desc: Defines generic test function
    if:
      type: raw
      regex: function test\s*\(\)\s*\{
  - id: v8-native-syntax-eval
    desc: Uses V8 native syntax via eval
    if:
      type: raw
      regex: eval\(["']%[A-Z][a-zA-Z]+
  - id: joyent-copyright
    desc: Joyent copyright header Node.js
    if:
      type: string_value
      substr: Copyright Joyent, Inc. and other Node contributors
  - id: test-basename-prefix
    desc: Node.js test filename prefix
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: test[-_.].{0,50}\.(c|m)?[jt]sx?$
  - id: test-basename-suffix
    desc: Node.js test filename suffix
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: .{0,50}[-_.]test\.(c|m)?[jt]sx?$
  - id: test-basename-spec
    desc: Node.js spec filename suffix
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: .{0,50}[-.]spec\.(c|m)?[jt]sx?$
  - id: webkit-description-call
    desc: WebKit description() test helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: \bdescription\s*\(
  - id: webkit-debug-call
    desc: WebKit debug() test helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: \bdebug\s*\(
  - id: webkit-shouldbe-call
    desc: WebKit shouldBe() test helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: \bshouldBe\s*\(
  - id: webkit-assertion-variant-call
    desc: WebKit shouldBe*/shouldThrow* helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: \bshould(Be|Throw)[A-Z][A-Za-z0-9_]*\s*\(
  - id: v8-mjsunit-assertions
    desc: V8 mjsunit test assertion functions
    crit: baseline
    conf: 0.9
    count_min: 3
    if:
      type: raw
      regex: assertEquals\s*\(
  - id: v8-inspector-test
    desc: V8 Inspector test harness usage
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: raw
      substr: InspectorTest.
  - id: node-inspector-helper-require
    desc: Imports Node inspector test helper
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: raw
      substr: require('../common/inspector-helper.js')
  - id: node-inspector-disabled-guard
    desc: Guards Node inspector-dependent test
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: symbol
      substr: skipIfInspectorDisabled()
  - id: node-inspector-nodeinstance
    desc: Uses NodeInstance inspector harness
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: NodeInstance
  - id: node-inspector-wait-for-break
    desc: Uses inspector waitForBreakOnLine API
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      word: waitForBreakOnLine
  - id: node-inspector-scriptparsed
    desc: Waits for Debugger.scriptParsed event
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      substr: waitForNotification('Debugger.scriptParsed')
  - id: node-inspector-run-if-waiting
    desc: Uses Runtime.runIfWaitingForDebugger API
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      word: Runtime.runIfWaitingForDebugger
composite_rules:
  - id: webkit-test-helpers
    desc: WebKit/JavaScriptCore test helper functions
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: webkit-description-call
      - id: webkit-debug-call
      - id: webkit-shouldbe-call
      - id: webkit-assertion-variant-call
  - id: test-basename-pattern
    desc: Node.js test filename pattern
    for:
      - javascript
      - typescript
    any:
      - id: test-basename-prefix
      - id: test-basename-suffix
      - id: test-basename-spec
  - id: node-inspector-session-api
    desc: Uses inspector session test API
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    any:
      - id: node-inspector-wait-for-break
      - id: node-inspector-scriptparsed
      - id: node-inspector-run-if-waiting
  - id: node-core-test
    desc: Node core-style test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: node-common-require
      - id: test-basename-pattern
  - id: is-test
    desc: Identifies Node.js test files
    crit: baseline
    conf: 0.9
    any:
      - id: node-core-test
      - id: webkit-test-helpers
      - id: v8-mjsunit-assertions
      - id: node-inspector-harness
      - id: test-basename-pattern
      - id: metadata/package/testing/presence::has-assertions
      - id: typescript-harness-import
  - id: node-inspector-harness
    desc: Identifies Node inspector test harness
    crit: baseline
    conf: 0.95
    all:
      - id: node-common-require
      - id: node-inspector-disabled-guard
      - id: node-inspector-helper-require
    any:
      - id: node-inspector-nodeinstance
      - id: node-inspector-session-api
