defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: node-common-require
    desc: Imports Node.js common test helper
    crit: notable
    for:
      - javascript
      - typescript
    size_max: 131072
    count_min: 3
    unless:
      - type: basename
        regex: \.map$
      - type: basename
        regex: ^bundle\.(c|m)?js$
      - type: basename
        regex: ^main\.(c|m)?js$
    if:
      type: text
      substr: require('../common')
  - id: typescript-harness-import
    desc: Imports TypeScript test Harness namespace
    crit: baseline
    conf: 0.9
    for:
      - typescript
      - javascript
    if:
      type: text
      substr: 'from "./_namespaces/Harness'
  - id: electron-remote-control-import
    desc: Electron remote control import
    crit: component
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: "require('electron')"
  - id: electron-remote-control-boot-eval
    desc: Electron boot eval switch
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: "app.commandLine.hasSwitch('boot-eval')"
  - id: electron-remote-control-loopback
    desc: Electron loopback listener fixture
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: "\\.listen\\(0,\\s*['\"]127\\.0\\.0\\.1['\"]"
  - id: electron-main-import
    desc: Electron main module import
    crit: component
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: "from ['\"]electron/main['\"]"
  - id: electron-spec-helpers-import
    desc: Electron spec helper import
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: "./lib/spec-helpers"
  - id: electron-itremote-helper
    desc: Electron itremote test helper
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \bitremote\s*\(
  - id: test-function-def
    desc: Defines generic test function
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: function test\s*\(\)\s*\{
  - id: v8-native-syntax-eval
    desc: Uses V8 native syntax via eval
    for:
      - javascript
    if:
      type: text
      regex: eval\(["']%[A-Z][a-zA-Z]+
  - id: v8-flags-comment
    desc: V8 test flags comment
    crit: baseline
    conf: 0.95
    for:
      - javascript
    if:
      type: text
      regex: (?m)^// Flags:\s+--
  - id: v8-regress-test-file
    desc: V8 numbered regression test file
    crit: baseline
    conf: 0.85
    for:
      - javascript
    size_max: 131072
    if:
      type: basename
      regex: '^regress-[0-9]+\.js$'
  - id: v8-js-fuzzer-unicode-fixture-name
    desc: V8 JS fuzzer unicode fixture filename
    crit: component
    conf: 0.98
    for:
      - javascript
    if:
      type: basename
      exact: mutate_unicode_string_literal_expected.js
  - id: v8-js-fuzzer-original-comment
    desc: V8 JS fuzzer original fixture comment
    crit: component
    conf: 0.95
    for:
      - javascript
    if:
      type: text
      regex: '(?m)^// Original: .{1,80}\.js$'
  - id: v8-temporal-api-test-table
    desc: V8 Temporal API test table
    crit: baseline
    conf: 0.93
    for:
      - javascript
    if:
      type: text
      substr: "Temporal.ZonedDateTime.prototype.withTimeZone"
  - id: v8-realm-eval-current
    desc: V8 Realm.eval current realm
    crit: baseline
    conf: 0.98
    for:
      - javascript
    if:
      type: text
      regex: Realm\.eval\s*\(\s*Realm\.current\s*\(\s*\)\s*,
  - id: v8-native-intrinsic-call
    desc: V8 native intrinsic call
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: (^|[^\w$])%[A-Z][A-Za-z0-9_]*\s*\(
  - id: v8-mjsunit-native-test-file
    desc: V8 mjsunit native test file
    crit: baseline
    conf: 0.96
    for:
      - javascript
    if:
      type: text
      regex: '(?s)// Flags:\s+--.{0,160}(?:allow-natives-syntax|expose-gc|stress-runs).{0,6000}(?:^\s*%[A-Z][A-Za-z0-9_]*\s*\(|assert(?:Equals|True|False|Throws|NotEquals)\s*\()'
  - id: v8-mjsunit-flags-assert-file
    desc: V8 mjsunit flags assertion file
    crit: baseline
    conf: 0.94
    for:
      - javascript
    if:
      type: text
      regex: '(?s)// Flags:\s+--[A-Za-z0-9_-]{2,120}.{0,6000}assert(?:Equals|True|False|Throws|NotEquals)\s*\('
  - id: v8-js-perf-test-harness
    desc: V8 JavaScript perf test harness
    crit: baseline
    conf: 0.96
    for:
      - javascript
    if:
      type: text
      substr: "d8.file.execute('../base.js')"
  - id: joyent-copyright
    desc: Joyent copyright header Node.js
    if:
      type: text
      substr: Copyright Joyent, Inc. and other Node contributors
  - id: test-basename-prefix
    desc: Node.js test filename prefix
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: test([A-Z].{0,48}|[-_.].{0,50})\.(c|m)?[jt]sx?(?:\.snap)?$
  - id: test-basename-suffix
    desc: Node.js test filename suffix
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: .{0,50}[-_.]test\.(c|m)?[jt]sx?(?:\.snap)?$
  - id: test-basename-spec
    desc: Node.js spec filename suffix
    for:
      - javascript
      - typescript
    if:
      type: basename
      regex: .{0,50}[-.]spec\.(c|m)?[jt]sx?(?:\.snap)?$
  - id: webkit-description-call
    desc: WebKit description() test helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \bdescription\s*\(
  - id: webkit-debug-call
    desc: WebKit debug() test helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \bdebug\s*\(
  - id: webkit-shouldbe-call
    desc: WebKit shouldBe() test helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \bshouldBe\s*\(
  - id: webkit-assertion-variant-call
    desc: WebKit shouldBe*/shouldThrow* helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \bshould(Be|Throw)[A-Z][A-Za-z0-9_]*\s*\(
  - id: v8-mjsunit-assert-equals
    desc: V8 mjsunit assertEquals helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: assertEquals\s*\(

  - id: v8-mjsunit-assert-not-equals
    desc: V8 mjsunit assertNotEquals helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: assertNotEquals\s*\(

  - id: v8-mjsunit-assert-throws
    desc: V8 mjsunit assertThrows helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: assertThrows\s*\(

  - id: v8-mjsunit-assert-true
    desc: V8 mjsunit assertTrue helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: assertTrue\s*\(

  - id: v8-mjsunit-assert-false
    desc: V8 mjsunit assertFalse helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: assertFalse\s*\(
  - id: v8-mjsunit-assert-unreachable
    desc: V8 mjsunit assertUnreachable helper
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: assertUnreachable\s*\(
  - id: v8-mjsunit-expected-output
    desc: V8 mjsunit expected output assertion
    crit: baseline
    conf: 0.95
    for:
      - javascript
    if:
      type: text
      substr: EXPECTED_OUTPUT
  - id: v8-inspector-test
    desc: V8 Inspector test harness usage
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      substr: InspectorTest.
  - id: node-inspector-helper-require
    desc: Imports Node inspector test helper
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: require('../common/inspector-helper.js')
  - id: node-inspector-disabled-guard
    desc: Guards Node inspector-dependent test
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: symbol
      substr: skipIfInspectorDisabled()
  - id: node-inspector-nodeinstance
    desc: Uses NodeInstance inspector harness
    crit: baseline
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: NodeInstance
  - id: node-inspector-wait-for-break
    desc: Uses inspector waitForBreakOnLine API
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      word: waitForBreakOnLine
  - id: node-inspector-scriptparsed
    desc: Waits for Debugger.scriptParsed event
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: waitForNotification('Debugger.scriptParsed')
  - id: node-inspector-run-if-waiting
    desc: Uses Runtime.runIfWaitingForDebugger API
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      word: Runtime.runIfWaitingForDebugger
  - id: benchmark-chrome-launcher
    desc: Chrome benchmark launcher marker
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: chrome-launcher
  - id: benchmark-xvfb-start
    desc: Browser benchmark xvfb launcher
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: xvfb start
  - id: benchmark-lighthouse-config
    desc: Browser benchmark lighthouse config
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: lighthouse/lighthouse-core/config/perf-config
  - id: benchmark-localhost-8080
    desc: Browser benchmark localhost endpoint
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: http://localhost:8080/
  - id: correct-incorrect-fixture-comments
    desc: Correct/incorrect fixture comments
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    count_min: 2
    if:
      type: text
      regex: //\s*(?:in)?correct\b
composite_rules:
  - id: v8-mjsunit-assert-pair
    desc: V8 mjsunit assertion helper pair
    crit: baseline
    conf: 0.9
    for:
      - javascript
    all:
      - id: v8-mjsunit-assert-equals
      - id: v8-mjsunit-assert-throws
  - id: v8-mjsunit-assert-majority
    desc: V8 mjsunit assertion helper majority
    crit: baseline
    conf: 0.9
    needs: 3
    any:
      - id: v8-mjsunit-assert-equals
      - id: v8-mjsunit-assert-not-equals
      - id: v8-mjsunit-assert-throws
      - id: v8-mjsunit-assert-true
      - id: v8-mjsunit-assert-false
      - id: v8-mjsunit-assert-unreachable
  - id: v8-clusterfuzz-js-fuzzer-fixture
    desc: V8 ClusterFuzz JS fuzzer fixture
    crit: baseline
    conf: 0.98
    for:
      - javascript
    all:
      - id: v8-js-fuzzer-unicode-fixture-name
      - id: v8-js-fuzzer-original-comment
  - id: webkit-test-helpers
    desc: WebKit/JavaScriptCore test helper functions
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: webkit-description-call
      - id: webkit-debug-call
      - id: webkit-shouldbe-call
      - id: webkit-assertion-variant-call
  - id: test-basename-pattern
    desc: Node.js test filename pattern
    for:
      - javascript
      - typescript
    any:
      - id: test-basename-prefix
      - id: test-basename-suffix
      - id: test-basename-spec
  - id: node-inspector-session-api
    desc: Uses inspector session test API
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    any:
      - id: node-inspector-wait-for-break
      - id: node-inspector-scriptparsed
      - id: node-inspector-run-if-waiting
  - id: node-core-test
    desc: Node core-style test file
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: node-common-require
      - id: test-basename-pattern
  - id: electron-remote-control-fixture
    desc: Electron remote control test fixture
    crit: baseline
    conf: 0.98
    for:
      - javascript
      - typescript
    all:
      - id: electron-remote-control-import
      - id: electron-remote-control-boot-eval
      - id: electron-remote-control-loopback
  - id: electron-node-spec-harness
    desc: Electron node spec harness
    crit: baseline
    conf: 0.98
    for:
      - javascript
      - typescript
    all:
      - id: electron-main-import
      - id: electron-spec-helpers-import
      - id: electron-itremote-helper
  - id: is-test
    desc: Identifies Node.js test files
    crit: baseline
    conf: 0.9
    for: [scripts, binaries, manifests]
    any:
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/presence::test-fixture-directory
      - id: metadata/package/testing/presence::linux-kselftest-shell
      - id: metadata/package/testing/presence::freebsd-atf-shell
      - id: metadata/package/testing/harness::extension-fixture-manifest-path
      - id: metadata/package/testing/harness::electron-chrome-api-extension-fixture
      - id: metadata/package/testing/harness::electron-webrequest-extension-fixture
      - id: metadata/package/testing/harness::electron-chrome-scripting-fixture
      - id: metadata/package/testing/harness::embedded-unit-test-fixture
      - id: v8-js-fuzzer-unicode-fixture-name
      - id: node-core-test
      - id: webkit-test-helpers
      - id: v8-mjsunit-assert-pair
      - id: v8-mjsunit-assert-majority
      - id: v8-mjsunit-runtime-harness
      - id: node-inspector-harness
      - id: test-basename-pattern
      - id: v8-native-intrinsic-call
      - id: v8-mjsunit-native-test-file
      - id: lua-busted-spec
      - id: v8-mjsunit-flags-assert-file
      - id: v8-regress-test-file
      - id: v8-temporal-api-test-table
      - id: v8-js-perf-test-harness
      - id: v8-mjsunit-embedded-benchmark-harness
      - id: correct-incorrect-fixture-comments
      - id: metadata/package/testing/presence::has-assertions
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: metadata/package/testing/scripted::js-bdd-suite
      - id: metadata/package/testing/presence::python-test-file
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/presence::wpt-security-features-resource
      - id: typescript-harness-import
      - id: v8-mjsunit-assert-harness
      - id: metadata/package/testing/presence::xterm-terminal-recording
  - id: browser-benchmark-harness
    desc: Local browser benchmark harness
    crit: baseline
    conf: 0.95
    all:
      - id: benchmark-localhost-8080
    any:
      - id: benchmark-chrome-launcher
      - id: benchmark-xvfb-start
      - id: benchmark-lighthouse-config
  - id: node-inspector-harness
    desc: Identifies Node inspector test harness
    crit: baseline
    conf: 0.95
    all:
      - id: node-common-require
      - id: node-inspector-disabled-guard
      - id: node-inspector-helper-require
    any:
      - id: node-inspector-nodeinstance
      - id: node-inspector-session-api
  - id: v8-mjsunit-runtime-harness
    desc: V8 mjsunit runtime harness
    crit: baseline
    conf: 0.95
    for:
      - javascript
    all:
      - id: v8-flags-comment
    any:
      - id: v8-realm-eval-current
      - id: v8-native-intrinsic-call
      - id: v8-native-syntax-eval
  - id: v8-mjsunit-assert-harness
    desc: V8 mjsunit assertion-based test harness
    crit: baseline
    conf: 0.95
    for:
      - javascript
    all:
      - id: v8-flags-comment
    any:
      - id: v8-mjsunit-assert-equals
      - id: v8-mjsunit-assert-not-equals
      - id: v8-mjsunit-assert-throws
      - id: v8-mjsunit-assert-true
      - id: v8-mjsunit-assert-false
      - id: v8-mjsunit-assert-unreachable
  - id: v8-mjsunit-embedded-benchmark-harness
    desc: V8 mjsunit embedded benchmark harness
    crit: baseline
    conf: 0.95
    for:
      - javascript
    all:
      - id: v8-mjsunit-assert-equals
      - id: v8-mjsunit-expected-output
