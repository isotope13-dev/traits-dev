defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
- id: webkit-description-call
  desc: WebKit description() test helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: symbol
    exact: description
- id: webkit-debug-call
  desc: WebKit debug() test helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: symbol
    exact: debug
- id: webkit-shouldbe-call
  desc: WebKit shouldBe() test helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: symbol
    exact: shouldBe
- id: webkit-assertion-variant-call
  desc: WebKit shouldBe*/shouldThrow* helper
  crit: baseline
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: \bshould(Be|Throw)[A-Z][A-Za-z0-9_]*\s*\(
composite_rules:
- id: webkit-test-helpers
  desc: WebKit/JavaScriptCore test helper functions
  crit: baseline
  conf: 0.9
  for:
  - javascript
  - typescript
  needs: 2
  any:
  - id: metadata/package/testing/harness/webkit::webkit-assertion-variant-call
  - id: metadata/package/testing/harness/webkit::webkit-debug-call
  - id: metadata/package/testing/harness/webkit::webkit-description-call
  - id: metadata/package/testing/harness/webkit::webkit-shouldbe-call
