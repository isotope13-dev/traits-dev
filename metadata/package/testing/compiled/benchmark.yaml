defaults:
  platforms: [windows, unix]
  for: [source]
traits:
  - id: benchmark-lower
    desc: benchmark reference (lowercase)
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: benchmark
      section: .text
  - id: benchmark-title
    desc: Benchmark reference (title case)
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: Benchmark
      section: .text
  - id: google-benchmark
    desc: google/benchmark library
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: google/benchmark
      section: .text
  - id: go-benchmark-type
    desc: Go testing.B benchmark type
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: func Benchmark
      section: .text
  - id: criterion-bench
    desc: Criterion benchmark library
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: criterion
      section: .text
  - id: benchmarkdotnet
    desc: BenchmarkDotNet library
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: BenchmarkDotNet
      section: .text
composite_rules:
  - id: benchmark
    desc: Benchmark test framework
    crit: notable
    conf: 0.9
    any:
      - id: benchmark-lower
      - id: benchmark-title
      - id: google-benchmark
      - id: go-benchmark-type
      - id: criterion-bench
      - id: benchmarkdotnet
