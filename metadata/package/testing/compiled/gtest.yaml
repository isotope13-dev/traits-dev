defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - c
traits:
  - id: gtest-testing-test
    desc: testing::Test class
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: testing::Test
  - id: gtest-macro-prefix
    desc: GTEST_ macro prefix
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: GTEST_
  - id: gtest-test-f
    desc: TEST_F macro
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: TEST_F(
  - id: gtest-expect-prefix
    desc: EXPECT_ macro prefix
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: EXPECT_
  - id: gtest-assert-prefix
    desc: ASSERT_ macro prefix
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: ASSERT_
  - id: gtest-word
    desc: gtest reference
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      word: gtest
composite_rules:
  - id: gtest
    desc: Google Test framework
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: gtest-testing-test
      - id: gtest-macro-prefix
      - id: gtest-test-f
      - id: gtest-expect-prefix
      - id: gtest-assert-prefix
      - id: gtest-word
