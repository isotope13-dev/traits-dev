defaults:
  platforms: [windows, unix]
  for: [c, cpp]

traits:
  - id: c-test-framework-context--assert-sys
    desc: C/C++ unit-test ASSERT_SYS marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: ASSERT_SYS
  - id: c-test-framework-context--assert-eq
    desc: C/C++ unit-test ASSERT_EQ marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: ASSERT_EQ
  - id: c-test-framework-context--expect-eq
    desc: C/C++ unit-test EXPECT_EQ marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: EXPECT_EQ
  - id: c-test-framework-context--expect-true
    desc: C/C++ unit-test EXPECT_TRUE marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: EXPECT_TRUE

composite_rules:
  - id: c-test-framework-marker
    desc: C/C++ unit-test framework marker
    crit: notable
    conf: 0.9
    any:
      - id: c-test-framework-context--assert-sys
      - id: c-test-framework-context--assert-eq
      - id: c-test-framework-context--expect-eq
      - id: c-test-framework-context--expect-true
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
