defaults:
  platforms: [windows, unix]
  for: [lua]
  crit: component
  conf: 0.9

traits:
  - id: lua-spec-basename
    desc: Lua spec filename
    if:
      type: basename
      regex: '_spec\.lua$'

  - id: lua-busted-describe
    desc: Lua describe test block
    if:
      type: symbol
      exact: describe
  - id: lua-busted-it
    desc: Lua it test case
    if:
      type: symbol
      exact: it
composite_rules:
  - id: lua-busted-spec
    desc: Lua Busted-style spec file
    crit: baseline
    conf: 0.95
    all:
      - id: lua-spec-basename
      - id: lua-busted-describe
      - id: lua-busted-it
