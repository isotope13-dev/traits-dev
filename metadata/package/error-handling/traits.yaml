defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: go-err-nil-check
    desc: Go error nil check pattern
    crit: baseline
    conf: 0.6
    for:
      - go
    if:
      type: string_value
      substr: if err != nil
  - id: go-errors-new
    desc: Go errors.New function
    crit: baseline
    conf: 0.6
    for:
      - go
    if:
      type: string_value
      substr: errors.New
  - id: go-fmt-errorf
    desc: Go fmt.Errorf function
    crit: baseline
    conf: 0.6
    for:
      - go
    if:
      type: string_value
      substr: fmt.Errorf
  - id: rust-result-type
    desc: Rust Result<T,E> type
    crit: baseline
    conf: 0.6
    for:
      - rust
    if:
      type: string_value
      substr: Result<
  - id: rust-unwrap-or
    desc: Rust unwrap_or method
    crit: baseline
    conf: 0.6
    for:
      - rust
    if:
      type: string_value
      substr: unwrap_or
  - id: try-block-open
    desc: try block opening
    crit: baseline
    conf: 0.5
    for:
      - javascript
      - python
      - java
      - csharp
    if:
      type: string_value
      substr: try {
  - id: catch-keyword
    desc: catch keyword
    crit: baseline
    conf: 0.5
    for:
      - javascript
      - java
      - csharp
      - php
    if:
      type: string_value
      word: catch
  - id: except-keyword
    desc: except keyword (Python)
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_value
      word: except
  - id: finally-keyword
    desc: finally keyword
    crit: baseline
    conf: 0.5
    for:
      - javascript
      - python
      - java
      - csharp
    if:
      type: string_value
      word: finally
