defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: scylla-plugin-exchange
    desc: Scylla plugin exchange marker
    crit: notable
    conf: 0.98
    if:
      type: string
      substr: "ScyllaPluginExchange"
  - id: scylla-config
    desc: Scylla configuration filename
    crit: notable
    conf: 0.95
    if:
      type: string
      exact: "Scylla.ini"
  - id: scylla-debug-log
    desc: Scylla debug log filename
    crit: notable
    conf: 0.95
    if:
      type: string
      exact: "Scylla_debug.log"
  - id: scylla-iat-rebuilder-ui
    desc: Scylla IAT rebuilder UI label
    crit: notable
    conf: 0.95
    if:
      type: string
      exact: "IAT Rebuilder"
composite_rules:
  - id: scylla-unpacker
    desc: Scylla unpacking and import fixer
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: scylla-plugin-exchange
      - id: scylla-config
      - id: scylla-debug-log
      - id: scylla-iat-rebuilder-ui
