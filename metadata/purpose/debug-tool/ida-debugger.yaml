# IDA Pro Debugger Components
# Hex-Rays IDA debug server binaries (win32_remote, linux_server, etc.)

defaults:
  for: [pe, elf, macho]

traits:
  - id: ida-debugger-server
    desc: IDA Pro remote debug server
    crit: notable
    conf: 0.95
    if:
      type: string
      substr: "IDA_SYSTEMBREAKPOINT"
