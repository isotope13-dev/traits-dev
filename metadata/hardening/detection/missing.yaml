# Missing Security Hardening Detection
# Binaries without standard security features are suspicious
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, unix, android, macos, ios]
  for: [elf]
traits:
  - id: no-pie-struct
    desc: "Binary not position-independent (no ASLR)"
    crit: notable
    conf: 0.6
    if:
      id: metadata/hardening/binary::binary-format-checked
composite_rules:
  - id: minimal
    desc: "Binary lacks security hardening"
    crit: notable
    conf: 0.8
    mbc: "F0001"
    attack: "T1027"
    all:
      - id: metadata/hardening/binary::binary-format-checked
      - id: metadata/hardening::static-linked
