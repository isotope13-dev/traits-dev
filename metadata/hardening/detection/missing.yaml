# Missing Security Hardening Detection
# Binaries without standard security features are suspicious
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [unix, android]
  for: [elf]
traits:
  - id: no-pie-struct
    desc: "Binary not position-independent (no ASLR)"
    crit: suspicious
    conf: 0.6
    if:
      id: metadata/hardening/binary::no-pie
  - id: no-nx-struct
    desc: "Binary lacks NX/DEP protection (executable stack)"
    crit: suspicious
    conf: 0.9
    attack: "T1027"
    count_min: 1
    if:
      id: metadata/hardening/binary::nx-disabled-elf
composite_rules:
  - id: minimal
    desc: "Binary lacks security hardening (stripped + static)"
    crit: suspicious
    conf: 0.8
    mbc: "F0001"
    attack: "T1027"
    all:
      - id: metadata/hardening::stripped-binary
      - id: metadata/hardening::static-linked
