# ELF Hardening Metadata
# Observational traits for ELF binary security features.
# These reflect compiler-applied mitigations.
defaults:
  platforms: [linux, unix, android]
  for: [elf]
  crit: notable
  conf: 0.9
traits:
  - id: no-stack-canary
    desc: No stack canary (stack smashing protection absent)
    if:
      type: metrics
      field: elf.stack_canary
      max: 0

  - id: nx-disabled
    desc: NX/DEP disabled (stack is executable)
    if:
      type: metrics
      field: elf.nx_enabled
      max: 0

  - id: no-relro
    desc: No RELRO (GOT writable after load)
    if:
      type: metrics
      field: elf.relro
      max: 0

  - id: partial-relro
    desc: Partial RELRO (GOT partially protected)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: elf.relro
      min: 1
      max: 1

  - id: full-relro
    desc: Full RELRO (GOT read-only after load)
    crit: baseline
    conf: 1.0
    if:
      type: metrics
      field: elf.relro
      min: 2

  - id: textrel
    desc: Text relocations present (writable code segment)
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: elf.textrel_present
      min: 1

  - id: rpath-set
    desc: RPATH/RUNPATH set (library injection vector)
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: elf.rpath_set
      min: 1

  - id: no-pie-struct
    desc: "Binary not position-independent (no ASLR)"
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: elf.e_type
      max: 2

composite_rules:
  - id: no-mitigations
    desc: ELF lacks key security mitigations (no canary + no NX + no RELRO)
    crit: suspicious
    conf: 0.85
    all:
      - id: no-stack-canary
      - id: nx-disabled
      - id: no-relro
