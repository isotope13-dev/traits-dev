defaults:
  platforms: [unix, android]
  crit: notable
traits:
  - id: stripped-binary
    desc: No full symbol table (likely stripped)
    conf: 0.8
    platforms: [windows, unix, android]
    for:
      - elf
      - macho
      - pe
    count_min: 1
    if:
      id: metadata/hardening/binary::stripped
  - id: static-linked-structure
    desc: Statically linked binary
    conf: 0.8
    for:
      - elf
    count_min: 1
    if:
      id: metadata/hardening/binary::static
  - id: elf-interpreter-section-name
    desc: ELF interpreter section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking::elf-interpreter-section-name
  - id: elf-dynamic-section-name
    desc: ELF dynamic section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking::elf-dynamic-section-name
  - id: elf-dynsym-section-name
    desc: ELF dynsym section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking::elf-dynsym-section-name
  - id: elf-dynstr-section-name
    desc: ELF dynstr section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking::elf-dynstr-section-name
composite_rules:
  - id: static-linked-heuristic
    desc: ELF lacks dynamic linker sections
    crit: notable
    conf: 0.75
    all:
      - id: metadata/binary::binary-format-checked
    unless:
      - id: elf-interpreter-section-name
      - id: elf-dynamic-section-name
      - id: elf-dynsym-section-name
      - id: elf-dynstr-section-name
  - id: static-linked
    desc: Statically linked binary
    crit: notable
    conf: 0.8
    any:
      - id: static-linked-structure
      - id: static-linked-heuristic
  - id: minimal-hardening
    desc: Binary lacks security hardening features
    crit: notable
    conf: 0.8
    all:
      - id: stripped-binary
      - id: static-linked
