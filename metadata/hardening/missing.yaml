# Missing Security Hardening Detection
# Detects binaries lacking standard security features
defaults:
  crit: notable
traits:
  - id: stripped-binary
    desc: No full symbol table (likely stripped)
    conf: 0.8
    for: [elf, macho, pe]
    if:
      type: structure
      feature: "binary/stripped"
  - id: static-linked
    desc: Statically linked binary
    conf: 0.8
    for: [elf]
    if:
      type: structure
      feature: "binary/static"
composite_rules:
  - id: minimal-hardening
    desc: Binary lacks security hardening features
    crit: notable
    conf: 0.8
    all:
      - id: stripped-binary
      - id: static-linked
