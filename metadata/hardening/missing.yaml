# Missing Security Hardening Detection
# Detects binaries lacking standard security features
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  crit: notable
traits:
  - id: stripped-binary
    desc: No full symbol table (likely stripped)
    conf: 0.8
    for: [elf, macho, pe]
    if:
      type: structure
      feature: "binary/stripped"
  - id: static-linked-structure
    desc: Statically linked binary
    conf: 0.8
    for: [elf]
    if:
      type: structure
      feature: "binary/static"
  - id: elf-binary
    desc: ELF binary format
    crit: baseline
    conf: 1.0
    for: [elf]
    if:
      type: structure
      feature: "binary/format/elf"
  - id: elf-interpreter-section-name
    desc: ELF interpreter section name
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: string_value
      exact: ".interp"
      section: .shstrtab
  - id: elf-dynamic-section-name
    desc: ELF dynamic section name
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: string_value
      exact: ".dynamic"
      section: .shstrtab
  - id: elf-dynsym-section-name
    desc: ELF dynsym section name
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: string_value
      exact: ".dynsym"
      section: .shstrtab
  - id: elf-dynstr-section-name
    desc: ELF dynstr section name
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: string_value
      exact: ".dynstr"
      section: .shstrtab
composite_rules:
  - id: static-linked-heuristic
    desc: ELF lacks dynamic linker sections
    crit: notable
    conf: 0.75
    all:
      - id: elf-binary
    none:
      - id: elf-interpreter-section-name
      - id: elf-dynamic-section-name
      - id: elf-dynsym-section-name
      - id: elf-dynstr-section-name
  - id: static-linked
    desc: Statically linked binary
    crit: notable
    conf: 0.8
    any:
      - id: static-linked-structure
      - id: static-linked-heuristic
  - id: minimal-hardening
    desc: Binary lacks security hardening features
    crit: notable
    conf: 0.8
    all:
      - id: stripped-binary
      - id: static-linked
