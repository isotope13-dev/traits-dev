defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  crit: notable
  conf: 1.0
traits:
  - id: wx-section
    desc: Writable and executable section (W^X violation)
    size_min: 32768
    if:
      type: section
      writable: true
      executable: true
      length_min: 32
    unless:
      - id: micro-behaviors/data/encode/pecompact
    downgrade:
      any:
        - id: metadata/binary/layout::rich-imported-low-entropy-layout
        - id: metadata/binary/framework::dotnet-metadata
        - type: section
          regex: (?i)^(\.?UPX\d*)$
        - type: text
          regex: (Enigma Protector|enigmaprotector\.com|ASProtect\\SpecData|ntoskrnl\.exe)
        - id: metadata/lang/compiler/native::watcom-runtime
  - id: three-plus-wx-sections
    desc: Three or more writable executable sections
    crit: notable
    conf: 0.95
    size_min: 32768
    if:
      type: metrics
      field: binary.wx_section_count
      min: 3
    unless:
      - type: metrics
        field: binary.section_count
        max: 1
      - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: metadata/binary/layout::legacy-watcom-packed-utility
      - id: metadata/binary/framework::dotnet-metadata
      - type: section
        regex: (?i)^(\.?UPX\d*)$
