defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  crit: notable
  conf: 1.0
traits:
  - id: wx-section
    desc: Writable and executable section (W^X violation)
    size_min: 32768
    if:
      type: section
      writable: true
      executable: true
      length_min: 32
    unless:
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
    downgrade:
      any:
        - id: metadata/binary/layout::rich-imported-low-entropy-layout
        - id: metadata/binary/framework::dotnet-metadata
        - type: section
          regex: (?i)^(\.?UPX\d*)$
        - type: text
          regex: (Enigma Protector|enigmaprotector\.com|ASProtect\\SpecData|ntoskrnl\.exe)
        - id: metadata/lang/compiler/native::watcom-runtime
