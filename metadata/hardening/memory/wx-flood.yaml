defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
traits:
  - id: extreme-wx-section-count-10
    desc: Ten or more writable executable sections
    crit: suspicious
    conf: 0.97
    size_min: 32768
    if:
      type: metrics
      field: binary.wx_section_count
      min: 10
    unless:
      - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: metadata/binary/framework::asprotect-protector-application
    downgrade:
      any:
        - id: well-known/app/protected-benign-pe/
