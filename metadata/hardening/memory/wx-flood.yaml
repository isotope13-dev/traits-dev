defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
traits:
  - id: extreme-wx-section-count-10
    desc: Ten or more writable executable sections
    crit: suspicious
    conf: 0.97
    # Static archives and relocatable objects do not have final load-segment
    # permissions. Their member sections commonly appear W+X until linked.
    for: [elf, macho, pe, dll, so, dylib]
    size_min: 32768
    if:
      type: metrics
      field: sections.executable_writable_count
      min: 10
    unless:
      # Relocatable Mach-O/COFF objects commonly report every section as
      # writable+executable because final segment permissions do not exist yet.
      - type: basename
        regex: '(?i)\.(a|o|obj)$'
      - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: objectives/anti-static/pack/asprotect/
      - id: well-known/tool/development/go-toolchain::go-toolchain-distribution
    downgrade:
      any:
        - id: well-known/app/protected-benign-pe/
