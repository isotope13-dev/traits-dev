defaults:
  crit: notable
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: sandbox-init
    desc: macOS sandbox initialization
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
      - dylib
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::sandbox-init
  - id: sandbox-init-params
    desc: macOS sandbox initialization with parameters
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
      - dylib
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::sandbox-init-params
  - id: sandbox-extension-consume
    desc: macOS sandbox extension consumption
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
      - dylib
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::sandbox-extension-consume
  - id: sandbox-extension-issue
    desc: macOS sandbox extension issuance
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
      - dylib
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::sandbox-extension-issue
  - id: sandbox-check
    desc: macOS sandbox check function
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
      - dylib
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::sandbox-check
  - id: sandbox-entering
    desc: Sandbox entry log message
    conf: 0.85
    platforms:
      - macos
    for:
      - macho
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::sandbox-entering
  - id: sandbox-failed
    desc: Sandbox entry failure message
    conf: 0.85
    platforms:
      - macos
    for:
      - macho
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::sandbox-failed
  - id: hardened-runtime
    desc: macOS Hardened Runtime enabled
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::hardened-runtime
  - id: seccomp-init
    desc: Linux seccomp sandbox initialization
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::seccomp-init
  - id: seccomp-rule-add
    desc: Linux seccomp rule addition
    conf: 0.9
    platforms:
      - linux
    for:
      - elf
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::seccomp-rule-add
  - id: seccomp-load
    desc: Linux seccomp profile loading
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::seccomp-load
  - id: prctl-seccomp
    desc: Linux prctl seccomp mode
    conf: 0.85
    platforms:
      - linux
    for:
      - elf
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::prctl-seccomp
  - id: seccomp-mode-filter
    desc: Linux seccomp filter mode constant
    conf: 0.85
    platforms:
      - linux
    for:
      - elf
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::seccomp-mode-filter
  - id: pledge
    desc: OpenBSD pledge syscall restriction
    conf: 0.95
    platforms: [unix]
    for: [elf, c]
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::pledge
  - id: unveil
    desc: OpenBSD unveil filesystem restriction
    conf: 0.95
    platforms: [unix]
    for: [elf, c]
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::unveil
  - id: cap-enter
    desc: FreeBSD Capsicum capability mode
    conf: 0.95
    platforms: [unix]
    for: [elf, c]
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::cap-enter
  - id: cap-rights-limit
    desc: FreeBSD Capsicum rights limiting
    conf: 0.9
    platforms: [unix]
    for: [elf, c]
    count_min: 1
    if:
      id: micro-behaviors/os/security/sandbox::cap-rights-limit
composite_rules:
  - id: macos-sandboxed
    desc: macOS App Sandbox enabled
    crit: notable
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
      - dylib
    any:
      - id: sandbox-init
      - id: sandbox-init-params
      - id: sandbox-extension-consume
      - id: sandbox-extension-issue
      - id: sandbox-entering
      - id: sandbox-failed
  - id: linux-seccomp
    desc: Linux seccomp sandbox enabled
    crit: notable
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    needs: 2
    any:
      - id: seccomp-init
      - id: seccomp-load
      - id: seccomp-rule-add
      - id: prctl-seccomp
      - id: seccomp-mode-filter
