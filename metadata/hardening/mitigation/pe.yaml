# PE hardening flags decoded from the DLL Characteristics bitfield in
# the optional header.  Surfaced under `pe.dll_characteristics.*` by
# cleave's binary kv extractor.  These are the canonical "is this
# binary built with modern compiler hardening" signals — vendors
# that ship binaries missing them are common false-negative sources
# in malware classifiers.
defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 1.0
traits:
  - id: pe-aslr
    desc: ASLR enabled (DYNAMIC_BASE)
    if:
      type: kv
      path: pe.dll_characteristics.dynamic_base
      exact: "true"
  - id: pe-high-entropy-va
    desc: High-entropy ASLR (64-bit)
    if:
      type: kv
      path: pe.dll_characteristics.high_entropy_va
      exact: "true"
  - id: pe-dep
    desc: DEP / NX enabled (NX_COMPAT)
    if:
      type: kv
      path: pe.dll_characteristics.nx_compat
      exact: "true"
  - id: pe-cfg
    desc: Control Flow Guard enabled
    if:
      type: kv
      path: pe.dll_characteristics.guard_cf
      exact: "true"
  - id: pe-guard-eh-continuation
    desc: GuardEHContinuationTable present
    if:
      type: metrics
      field: pe.guard_eh_cont_count
      min: 1
  - id: pe-guard-long-jump-target
    desc: GuardLongJumpTargetTable present
    if:
      type: metrics
      field: pe.guard_long_jump_target_count
      min: 1
  - id: pe-dynamic-value-reloc-table
    desc: DynamicValueRelocTable present
    if:
      type: metrics
      field: pe.has_dynamic_value_reloc_table
      min: 1
  - id: pe-force-integrity
    desc: FORCE_INTEGRITY signature check
    if:
      type: kv
      path: pe.dll_characteristics.force_integrity
      exact: "true"
  - id: pe-no-seh
    desc: NO_SEH (SafeSEH not used)
    if:
      type: kv
      path: pe.dll_characteristics.no_seh
      exact: "true"
  - id: pe-appcontainer
    desc: AppContainer-aware
    if:
      type: kv
      path: pe.dll_characteristics.appcontainer
      exact: "true"
  - id: pe-wdm-driver
    desc: WDM driver
    crit: notable
    if:
      type: kv
      path: pe.dll_characteristics.wdm_driver
      exact: "true"
  # Atom for "modern PE missing ASLR" composite below — fires when
  # the PE was built post-2020 (Unix epoch 1577836800) AND the ASLR
  # bit is not set. By then, default MSVC and clang-cl flags enable
  # ASLR; absence is unusual.
  - id: post-2020-pe
    desc: PE built after 2020-01-01
    crit: component
    if:
      type: metrics
      field: pe.timestamp
      min: 1577836800
  - id: no-aslr-bit
    desc: ASLR bit not set in DLL Characteristics
    crit: component
    if:
      type: metrics
      field: pe.dll_characteristics
      min: 1
    unless:
      - id: pe-aslr
composite_rules:
  - id: pe-modern-hardening
    desc: Modern PE hardening (ASLR + DEP + CFG)
    all:
      - id: pe-aslr
      - id: pe-dep
      - id: pe-cfg
  - id: modern-pe-without-aslr
    desc: Modern PE without ASLR enabled
    crit: notable
    all:
      - id: post-2020-pe
      - id: no-aslr-bit
