# NX/DEP Disabled Detection
# Detects binaries without No-Execute protection
# Modern macOS binaries should have NX enabled
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [macos, linux]
  attack: "T1562.001"
  mbc: "F0011"
traits:
  - id: nx-disabled-elf
    desc: "ELF binary with NX/DEP disabled (executable stack)"
    crit: suspicious
    conf: 0.9
    platforms: [linux, unix, android]
    for: [elf]
    if:
      id: metadata/hardening/elf::nx-disabled
  # TODO: macOS NX detection requires MachO header flag parsing (MH_NO_HEAP_EXECUTION)
composite_rules:
  # NX disabled + command execution = shellcode injection risk
  - id: nx-disabled-with-exec
    desc: "NX disabled with exec capability"
    crit: notable
    conf: 0.85
