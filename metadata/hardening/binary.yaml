# Binary Property Metadata
# Observational traits for cross-format binary properties.
# These are directly measurable from binary headers without inference.
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  crit: baseline
  conf: 1.0
traits:
  - id: stripped
    desc: Binary symbol table is stripped
    for: [elf, macho, pe, dll]
    if:
      type: metrics
      field: binary.is_stripped
      min: 1

  - id: pie
    desc: Position-independent executable (ASLR-compatible)
    for: [elf, macho, pe, dll]
    if:
      type: metrics
      field: binary.is_pie
      min: 1

  - id: no-pie
    desc: Binary is not position-independent (fixed load address)
    for: [elf, pe, dll]
    if:
      type: metrics
      field: binary.is_pie
      max: 0

  - id: static
    desc: Statically linked binary (no dynamic linker)
    for: [elf]
    if:
      type: metrics
      field: binary.is_static
      min: 1

  - id: big-endian
    desc: Big-endian byte order
    for: [elf]
    if:
      type: metrics
      field: binary.is_big_endian
      min: 1
