defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, c]
traits:
  - id: pie-macro
    desc: __pie__ macro
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: __pie__
      section: .text
  - id: fpie-flag
    desc: -fPIE flag
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: -fPIE
      section: .text
  - id: got-plt-section
    desc: .got.plt section
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: .got.plt
      section: .text
  - id: stack-chk-fail
    desc: __stack_chk_fail function
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: __stack_chk_fail
  - id: stack-chk-guard
    desc: __stack_chk_guard
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: __stack_chk_guard
      section: .text
  - id: fstack-protector
    desc: -fstack-protector flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: -fstack-protector
      section: .text
  - id: fortify-fail
    desc: FORTIFY_SOURCE runtime abort function
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: __fortify_fail
  - id: chk-fail
    desc: FORTIFY_SOURCE bounds check abort
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: __chk_fail
  - id: chk-suffix
    desc: FORTIFY_SOURCE checked function variant
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: _chk@
      section: .text
  - id: memcpy-chk
    desc: FORTIFY_SOURCE memcpy bounds check
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: __memcpy_chk
  - id: strcpy-chk
    desc: FORTIFY_SOURCE strcpy bounds check
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: __strcpy_chk
  - id: gnu-relro
    desc: GNU_RELRO string
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: GNU_RELRO
      section: .text
  - id: got-section
    desc: .got section
    crit: baseline
    conf: 0.7
    if:
      type: text
      exact: .got
      section: .text
composite_rules:
  - id: pie
    desc: Position Independent Executable (PIE)
    crit: notable
    conf: 0.85
    any:
      - id: pie-macro
      - id: fpie-flag
      - id: got-plt-section
  - id: stack-protector
    desc: Stack protector/canary enabled
    crit: baseline
    conf: 0.9
    any:
      - id: stack-chk-fail
      - id: stack-chk-guard
      - id: fstack-protector
  - id: fortify
    desc: FORTIFY_SOURCE hardening enabled
    crit: notable
    conf: 0.85
    any:
      - id: fortify-fail
      - id: chk-fail
      - id: chk-suffix
      - id: memcpy-chk
      - id: strcpy-chk
  - id: relro
    desc: RELRO hardening enabled
    crit: notable
    conf: 0.8
    any:
      - id: gnu-relro
      - id: got-section
