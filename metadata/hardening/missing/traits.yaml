defaults:
  platforms: [unix, android]
  crit: notable
traits:
  - id: stripped-binary
    desc: No full symbol table (likely stripped)
    conf: 0.8
    platforms: [windows, unix, android]
    for:
      - elf
      - macho
      - pe
    count_min: 1
    if:
      id: metadata/hardening/layout::stripped
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiled::go-runtime-marker
  - id: static-linked-structure
    desc: Statically linked binary
    conf: 0.8
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking/static::static-linked
  - id: elf-interpreter-section-name
    desc: ELF interpreter section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking/static::elf-interpreter-section-name
  - id: elf-dynamic-section-name
    desc: ELF dynamic section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking/static::elf-dynamic-section-name
  - id: elf-dynsym-section-name
    desc: ELF dynsym section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking/static::elf-dynsym-section-name
  - id: elf-dynstr-section-name
    desc: ELF dynstr section name
    crit: baseline
    conf: 0.9
    for:
      - elf
    count_min: 1
    if:
      id: metadata/binary/linking/static::elf-dynstr-section-name
composite_rules:
  - id: static-linked-heuristic
    desc: ELF lacks dynamic linker sections
    crit: notable
    conf: 0.75
    all:
      - id: metadata/binary/layout::binary-format-checked
    unless:
      - id: elf-interpreter-section-name
      - id: elf-dynamic-section-name
      - id: elf-dynsym-section-name
      - id: elf-dynstr-section-name
    downgrade:
      # Static linking is the default for Go and common for Rust's `musl` /
      # `x86_64-unknown-linux-musl` targets — expected behavior, not a signal.
      # Static linking of a C/other binary without these markers is still
      # notable (evasion / easier deployment tradeoff).
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiler/systems::rust-binary
  - id: static-linked
    desc: Statically linked binary
    crit: notable
    conf: 0.8
    any:
      - id: static-linked-structure
      - id: static-linked-heuristic
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiler/systems::rust-binary
  - id: minimal-hardening
    desc: Binary lacks security hardening features
    crit: notable
    conf: 0.8
    all:
      - id: stripped-binary
      - id: static-linked
