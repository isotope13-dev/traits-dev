# .NET Configuration Access Patterns
defaults:
  platforms: [unix, windows, macos]
  for: [pe, dll, csharp]
traits:
  - id: config-manager
    desc: Application configuration access
    crit: baseline
    conf: 0.75
    if:
      type: string_value
      substr: "ConfigurationManager"
  # === AppSettings atomic indicators ===
  - id: appsettings-pascal
    desc: AppSettings (PascalCase)
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "AppSettings"
  - id: appsettings-lower
    desc: appsettings (lowercase)
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "appsettings"
  # === Environment variable atomic indicators ===
  - id: get-env-var
    desc: GetEnvironmentVariable method
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "GetEnvironmentVariable"
  - id: environment-class
    desc: Environment class access
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: "(^|[^A-Za-z])Environment\\."
composite_rules:
  # AppSettings composite
  - id: app-settings
    desc: AppSettings configuration access
    crit: notable
    conf: 0.70
    any:
      - id: appsettings-pascal
      - id: appsettings-lower
  # Environment variable composite
  - id: environment-vars
    desc: Environment variable access
    crit: notable
    conf: 0.70
    any:
      - id: get-env-var
      - id: environment-class
