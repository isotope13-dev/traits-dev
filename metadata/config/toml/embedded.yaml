# Embedded TOML Configuration File Detection
# Detects references to TOML config files in binaries
# Often indicates modular malware with external configuration

defaults:
  for: [elf, macho, pe]
  crit: notable

traits:
  # === Multiple TOML Config References ===
  # NOTE: This intentionally overlaps with pyproject.toml - having multiple .toml
  # files in a binary (even if one is pyproject.toml) indicates modular config
  - id: toml-config-multiple
    desc: Multiple TOML config file references
    crit: notable
    conf: 0.75
    count_min: 2
    if:
      type: string
      regex: '\b[a-z_-]+\.toml\b'

  # === Hidden TOML Config ===
  - id: toml-config-hidden
    desc: Hidden TOML config file (.config.toml)
    crit: suspicious
    conf: 0.8
    if:
      type: string
      regex: '\.[a-z_-]+\.toml\b'

  # === Specific Config Names ===
  - id: asset-toml-literal
    desc: asset.toml file reference
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "asset.toml"

composite_rules:
  # === Modular Config Pattern ===
  - id: modular-toml-config
    desc: Modular TOML configuration pattern
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: toml-config-multiple
      - id: toml-config-hidden
      - id: metadata/quality/config::config-toml-file
      - id: asset-toml-literal
