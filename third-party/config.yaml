# Third-Party YARA Rule Criticality Configuration
#
# This file configures criticality levels for third-party YARA rules.
# Uses the same criticality levels as RULES.md:
#   baseline      - Universal baseline
#   notable    - Defines program purpose
#   suspicious - Hides intent/crosses boundaries
#   hostile    - Attack patterns, no legitimate use
# Default criticality for all third-party rules
default_crit: "suspicious"
# Per-source criticality defaults
sources:
  - name: YARAForge
    url: https://github.com/YARAHQ/yara-forge
    crit: "hostile"
  - name: elastic
    url: https://github.com/elastic/protections-artifacts
    crit: "hostile"
  - name: huntress
    url: https://github.com/huntresslabs/threat-intel
    crit: "hostile"
  - name: bartblaze
    url: https://github.com/bartblaze/Yara-rules
    crit: "suspicious"
  - name: JPCERT
    url: https://github.com/JPCERTCC/jpcert-yara
    crit: "suspicious"
  - name: TTC-CERT
    url: https://github.com/ttc-cert/TTC-CERT-YARA-Rules
    crit: "suspicious"
  - name: RussianPanda95
    url: https://github.com/RussianPanda95/Yara-Rules
    crit: "suspicious"
  - name: local
    crit: "hostile"
# Per-rule overrides (use trait ID format: third_party/vendor/path)
overrides:
  - id: third_party/JPCERT/brc4/brc4_code
    crit: "notable"
    reason: "The upstream BRC4 byte-pattern rule collides with legitimate Mozilla NSPR runtime code; keep it as context unless corroborated by independent Brute Ratel/C2 behavior."
  - id: third_party/ReversingLabs/Cert/Blocklist/5067339614C5Cc219C489D40420F3Bf9
    crit: "notable"
    reason: "D-Link's leaked code-signing certificate is important provenance context, but this exact cert also signs legitimate D-Link WLAN utilities; certificate-only evidence should not imply hostile behavior without corroborating malware indicators."
  - id: third_party/Malpedia/Win/Computrace/Auto
    crit: "suspicious"
    reason: "Computrace/rpcnetp is PUP/riskware; the auto-generated family rule should not imply hostile malware by itself."
  - id: third_party/SigBase/PUP/Computraceagent
    crit: "suspicious"
    reason: "SigBase classifies this as PUP; treat the agent as suspicious riskware, not hostile malware."
  - id: third_party/R3C0NST/ATM/Malware/Atmspitter
    disable: true
    reason: "Slow rule (193ms)"
  - id: third_party/R3C0NST/ATM/Malware/Dispenserxfs
    disable: true
    reason: "Slow rule (153ms)"
  - id: third_party/TTC-CERT/cve_rules/EXPLOIT_cve_2022-30190/html_payload
    disable: true
    reason: "Overly broad patterns ($s6 = '$(') match thousands of times in Go/jQuery files"
  - id: third_party/Sekoia/Ransomware/Lin/Avoslocker/Sections
    disable: true
    reason: "Slow hashing"
  - id: third_party/GODMODERULES/IDDQD/God/Mode/Rule
    disable: true
    reason: "Overbroad third-party god-mode rule with low-quality unnamed strings; matches benign binaries without actionable behavior."
  - id: third_party/SecuInfra/SUSP/Powershell/Base64/Decode
    crit: "notable"
    reason: "High FP rate - detects PowerShell Base64 decoding"
  - id: third_party/SecuInfra/SUSP/Scheduled/Tasks/Create/From/Susp/Dir
    crit: "notable"
    reason: "Low-quality scheduled task heuristic has broad operator precedence and matches legitimate infrastructure scripts that register updater/maintenance tasks."
  - id: third_party/Elceef/BAT/Begin/Substring/Env
    disable: true
    reason: "Broad batch heuristic: @echo off plus early %VAR:~x,y% substring syntax is common in benign launchers and argument parsing; useful only with stronger obfuscation or payload context."
  - id: third_party/RussianPanda95/MetaStealer/metastealer_12-2023_packer/metastealer_net_reactor_packer
    crit: "notable"
    reason: "NET Reactor packer pattern is too broad for family-level confidence"
  - id: third_party/RUSSIANPANDA/Metastealer/NET/Reactor/Packer
    crit: "notable"
    reason: "NET Reactor packer marker alone should not imply MetaStealer family"
  - id: third_party/SigBase/SUSP/NET/NAME/Confuserex
    crit: "notable"
    reason: "ConfuserEx naming pattern detection - matches tool components and legitimate uses, not just packed malware (author score=40)"
  - id: third_party/bartblaze/generic/EnigmaStub/enigmastub
    crit: "notable"
    reason: "Enigma Protector plugin exports match legitimate Enigma ecosystem components, not just packed malware"
  - id: third_party/CAPE/Risepro
    crit: "suspicious"
    reason: "Rule uses 'any of them' with generic byte patterns - single pattern match on large PEs produces false positives (e.g., grepWin, MSVC-compiled utilities)"
  - id: third_party/Malpedia/Win/Sadbridge/Auto
    crit: "notable"
    reason: "Auto-generated yara-signator rule (quality=75) matches generic x86-64 code patterns in large C++/MinGW binaries (e.g., pybind11 .pyd files, optimization libraries)"
  - id: third_party/Malpedia/Win/Deepdata/Auto
    crit: "suspicious"
    reason: "Auto-generated yara-signator rule collides with generic MSVC installer code in signed Tencent MobileGamePC installer binaries; byte-sequence hit alone is not family-level hostile evidence"
  - id: third_party/LolDrivers/Driver/Tonecinc/Idmtdisys/Internetdownloadmanager/2C1B
    crit: "notable"
    reason: "VersionInfo-based rule matches all copies of idmtdi.sys with this version, not just abused hashes - legitimate Internet Download Manager TDI driver"
  - id: third_party/LolDrivers/PUA/VULN/Driver/Iobitinformationtechnology/Iobitunlockersys/Unlocker/F85C
    crit: "notable"
    reason: "VersionInfo-based vulnerable-driver identification matches legitimate IObit Unlocker driver copies; useful inventory context, not hostile behavior by itself."
  - id: third_party/elastic/Windows_VulnDriver_IoBitUnlocker/windows/vulndriver_iobitunlocker
    crit: "notable"
    reason: "Vulnerable-driver rule identifies an IoBitUnlocker driver by name/version/PDB metadata; the driver may be risky, but presence alone is not malicious execution."
  - id: third_party/SigBase/SUSP/PE/Signed/By/Suspicious/Entitiy/Mar23
    crit: "notable"
    reason: "Signer-name heuristic from SUSP category is provenance context; a certificate subject alone should not create a hostile finding."
  - id: third_party/EmbeeResearch/Win/Bruteratel/Syscall/Hashes
    crit: "notable"
    reason: "Short 4-byte hashes of Nt* functions are prone to collisions in legitimate security/system software that performs syscall monitoring."
  - id: third_party/CAPE/Hijackloaderstub
    crit: "suspicious"
    reason: "$app pattern ('\\app-' wide) matches all Electron apps, and $stub1/$stub2 are generic x86 MSVC CRT patterns - quality=70 rule produces FPs on legitimate Electron binaries like GitHub Desktop"
  - id: third_party/SigBase/SUSP/Claude/Redacted/Thinking/Magic/String/Jan26
    disable: true
    reason: "Explicit Anthropic redacted-thinking trigger strings occur in legitimate SDK and integration tests; a bare string hit is not a reliable malware verdict."
  - id: third_party/bartblaze/generic/PyInstaller/pyinstaller
    crit: "notable"
    reason: "PyInstaller is a legitimate Python bundling tool; author categorizes rule as INFO - tool detection alone does not indicate malicious intent"
  - id: third_party/bartblaze/generic/AutoIT/autoit_compiled
    crit: "notable"
    reason: "Compiled AutoIt marker is toolchain metadata; the upstream rule notes this does not imply maliciousness by itself"
  - id: third_party/bartblaze/generic/LNK_Ruleset/long_relativepath_lnk
    disable: true
    reason: "Upstream categorizes long relative paths in LNK files as INFO; benign shortcuts and test fixtures may use deep relative targets, so this should only contribute as context with independent execution or hiding evidence."
  - id: third_party/Ditekshen/INDICATOR/SUSPICIOUS/EXE/Regkeycomb/Disablewindefender
    crit: "component"
    reason: "Quality=33, score=40 rule requires only 1 Defender registry path plus 1 value name substring; legitimate Microsoft Defender components embed these policy names for health/configuration handling, so this is only useful with independent tampering context."
  - id: third_party/Ditekshen/INDICATOR/SUSPICIOUS/EXE/Clearmytracksbyprocess
    crit: "notable"
    reason: "Single ClearMyTracksByProcess string is legitimate in browser automation frameworks such as Microsoft Visual Studio UI Testing; suspicious intent requires additional execution or cleanup context."
  - id: third_party/Ditekshen/Win/EXEPWSH/Dlagent
    crit: "notable"
    reason: "Broad Dlagent PowerShell rule matches signed Bitdefender ATC driver strings; not family-level evidence by itself."
  - id: third_party/DelivrTo/SUSP/SVG/Foreignobject/Nov24
    crit: "suspicious"
    reason: "Rule matches 'svg' + '</foreignObject' anywhere in a file with no SVG file-type constraint — triggers on TypeScript/HTML test files (e.g., Angular template tests) that embed SVG strings; score=40, quality=51; context-free string hit is not a reliable hostile verdict"
  - id: third_party/JPCERT/Emotet
    crit: "notable"
    reason: "Memory-scan rule (rule_usage=memory scan) with single 12-byte pattern ($v5a) causes false positives on large legitimate PEs via coincidental byte collisions"
  - id: third_party/JPCERT/emotet/emotet
    crit: "notable"
    reason: "Memory-scan rule (rule_usage=memory scan) with single 12-byte pattern ($v5a) causes false positives on large legitimate PEs via coincidental byte collisions"
  - id: third_party/JPCERT/shellcode/shellcode_hash
    disable: true
    reason: "Generic API CRC32 hash constants collide with signed Microsoft DLLs; hash-only shellcode indicator is too broad for suspicious output"
  - id: third_party/SigBase/SUSP/ELF/LNX/UPX/Compressed/File
    crit: "suspicious"
    reason: "Generic UPX-compressed ELF detection (score=40, SUSP category); UPX is a legitimate open-source packer used by many benign tools (e.g., Trino launcher); detection of a known packer with an embedded attribution string is not hostile without additional indicators"
  - id: third_party/SigBase/SUSP/Patcher/Keygen/Indicators/Jun15
    crit: "notable"
    reason: "The dup2patcher.dll patching framework is used by legitimate software patchers, not only the CN Honker Pentest Toolset — all three strings (<description>Patch</description>, \\dup2patcher.dll, load_patcher) are present in benign patcher EXEs; score=70 does not warrant hostile when the FP rate is this high for patcher software"
  - id: third_party/SigBase/SUSP/Xored/URL/In/EXE
    crit: "notable"
    reason: "Generic XORed http/https string heuristic (score=50) matches packed or protected legitimate PE tools; an obfuscated URL fragment is useful context but not a standalone hostile verdict without corroborating network or loader behavior"
  - id: third_party/SigBase/SUSP/RANSOMWARE/Indicator/Jul20
    crit: "notable"
    reason: "Generic decrypt/readme filename indicators also appear in benign bundled tool/uninstaller payload listings; this SUSP string rule is not a standalone hostile verdict."
  - id: third_party/SigBase/SUSP/Imphash/Mar23
    crit: "notable"
    reason: "Minimal PE loaders (17 imports, single DLL) share import profiles with malware loaders by coincidence; score=65 imphash collision occurs in legitimate patcher/installer stubs with the same stripped-down kernel32-only import table"
  - id: third_party/COD3NYM/SUSP/NET/Shellcode/Loader/Indicators/Jan24
    crit: "notable"
    reason: "SUSP-category rule (score=65) detecting generic .NET shellcode-loader API names (VirtualProtect, VirtualAlloc, CreateThread) plus a single __StaticArrayInitTypeSize= marker — all three strings appear routinely in legitimate signed .NET DLLs (e.g. JetBrains Platform Interop); hostile verdict is overconfident for this pattern set"
  - id: third_party/COD3NYM/SUSP/OBF/NET/Confuserex/Name/Pattern/Jan24
    crit: "suspicious"
    reason: "ConfuserEx is a legitimate open-source .NET obfuscator used by many benign libraries for IP protection (score=50, SUSP category); the naming pattern alone does not confirm malicious intent — legitimate ad SDKs and commercial components routinely use ConfuserEx obfuscation"
  - id: third_party/COD3NYM/Confuserex/Packer
    crit: "notable"
    reason: "ConfuserEx packer indicators are generic .NET obfuscator/runtime markers (GCHandle/GCHandleType plus IL byte patterns) that appear in legitimate signed commercial installers; tool detection alone is not hostile."
  - id: third_party/COD3NYM/Eazfuscator/String/Encryption
    crit: "notable"
    reason: "Eazfuscator.NET string-encryption markers identify a legitimate commercial .NET obfuscator; this is useful obfuscation/tooling context but not hostile evidence by itself."
  - id: third_party/Ditekshen/INDICATOR/SUSPICIOUS/VM/Evasion/Macaddrcomb
    crit: "notable"
    reason: "Rule matches any binary containing VM vendor MAC address prefixes — triggers on legitimate network scanning and adapter enumeration tools (e.g., Bitdefender networkscan.dll) that embed MAC OUI tables for vendor identification, not VM evasion"
  - id: third_party/Ditekshen/INDICATOR/SUSPICIOUS/EXE/Nonewindowsua
    disable: true
    reason: "Broad non-Windows User-Agent string rule matches legitimate Microsoft URLMon browser compatibility UA tables; UA compatibility strings alone are not threat evidence."
  - id: third_party/Ditekshen/INDICATOR/KB/CERT/C2Cbbd946Bc3Fdb944D522931D61D51A
    crit: "notable"
    reason: "Certificate-only match on Sordum Software also triggers legitimate signed Sordum utilities such as DnsJumper; signer metadata alone is not a hostile verdict"
  - id: third_party/SigBase/Imphash/Mar23
    crit: "suspicious"
    reason: "MAL-category imphash rule (score=75) produces false positives on UPX-packed legitimate binaries — UPX creates a minimal import table (LoadLibraryA+GetProcAddress+VirtualProtect+VirtualAlloc+VirtualFree+ExitProcess) that collides with known-bad imphashes; hostile verdict is overconfident for an imphash-only match"
  - id: third_party/Malpedia/Win/Yokai/Auto
    crit: "suspicious"
    reason: "Auto-generated yara-signator rule (quality=75) uses 7-of-10 short x86 byte sequences that collide with generic MSVC-compiled code — false positives on legitimate Microsoft-signed binaries (e.g., covinstrc32.exe)"
  - id: third_party/Malpedia/Win/Whispergate/Auto
    crit: "suspicious"
    reason: "Auto-generated yara-signator rule matches generic short x86 byte sequences that collide with MinGW/GCJ-compiled utilities (e.g., FSB extractors) linking libgcc/libgcj runtimes; byte-sequence hit alone is not family-level hostile evidence"
  - id: third_party/SigBase/P0Wnedpotato
    disable: true
    reason: "Rule condition is 1-of-5 strings and one string is the generic C# ProcessStartInfo assignment FileName = \"cmd.exe\", which appears in benign Windows utilities such as PowerToys when opening a folder in Command Prompt; without the p0wnedShell/Tater-specific strings this is not reliable threat evidence."
  - id: third_party/Ditekshen/INDICATOR/SUSPICIOUS/EXE/WMI/Enumeratevideodevice
    disable: true
    reason: "WMI video device enumeration strings (Win32_VideoController queries) are standard in legitimate system utilities and WinUI/NativeAOT libraries that inspect hardware; a bare WMI query for video devices is not hostile evidence without additional persistence or exfiltration context."
  - id: third_party/SigBase/Hacktool/Strings/P0Wnedshell
    disable: true
    reason: "Single-string P0Wnedshell rule matches benign vulnerability/fingerprint corpora that mention Metasploit payload names such as windows/meterpreter in comments or signatures; the rule only requires one toolkit string and is not reliable hostile evidence without executable PowerShell/tool context."
  - id: third_party/SigBase/HKTL/NET/GUID/Browserghost
    disable: true
    reason: "GUID-based rule matches Microsoft.mshtml TypeLib GUID (2133c634-4139-466e-8983-9a23ec99e01b) used by any .NET app referencing the IE HTML DOM COM library; fires on benign WinForms apps with WebBrowser controls, not just BrowserGhost."
  - id: third_party/SigBase/HKTL/NET/GUID/Sharpchromium
    disable: true
    reason: "GUID-based rule matches Microsoft.mshtml TypeLib GUID (2133c634-4139-466e-8983-9a23ec99e01b) used by any .NET app referencing the IE HTML DOM COM library; fires on benign WinForms apps with WebBrowser controls, not just SharpChromium."
  - id: third_party/LolDrivers/PUA/VULN/Driver/Iobitinformationtechnology/Iobitunlockersys/Unlocker/F85C
    crit: "notable"
    reason: "VersionInfo-based LolDrivers rule matches all copies of IObit Unlocker.sys, a legitimate third-party driver with a known vulnerability — the driver itself is benign software, not malware. Vulnerable-driver detection is useful context but not a hostile verdict."
  - id: third_party/elastic/Windows_VulnDriver_IoBitUnlocker/windows/vulndriver_iobitunlocker
    crit: "notable"
    reason: "VersionInfo-based rule matches all copies of IObit Unlocker.sys (versions 1.0-1.3), a legitimate third-party driver with a known vulnerability — the driver itself is benign software, not malware. Vulnerable-driver detection is useful context but not a hostile verdict."
  - id: third_party/COD3NYM/Reactor/Indicators
    crit: "notable"
    reason: "Ezriz .NET Reactor is a legitimate commercial .NET obfuscator used by many benign applications (e.g., BugShooting installer); obfuscator detection alone is not hostile evidence without corroborating loader or C2 behavior."
  - id: third_party/SigBase/SUSP/Obfuscated/JS/Obfuscatorio
    crit: "suspicious"
    reason: "obfuscator.io is used by legitimate companies like Tencent for code protection. While still highly suspicious, a hostile verdict produces too many false positives on commercial software."
