defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 1000000
traits:
  - id: nanomite-found
    desc: Nanomite status string
    crit: notable
    conf: 0.99
    if:
      type: string_value
      substr: "No Nanomites Founded"
      section: .data
  - id: nanomite-patch-prompt
    desc: Nanomite patch prompt
    crit: notable
    conf: 0.99
    if:
      type: string_value
      substr: "Correct File To Patch Nanomites"
      section: .data
  - id: armnf-marker
    desc: ArmNF tool name marker
    crit: notable
    conf: 0.99
    if:
      type: string_value
      exact: "ArmNF.dll"
      section: .rdata
  - id: armnf-export
    desc: ArmNF patch export symbol
    crit: notable
    conf: 0.98
    if:
      type: symbol
      exact: "AdvancedPatch@12"
composite_rules:
  - id: nanomite-patcher
    desc: Nanomite analysis and patching tool
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: nanomite-found
      - id: nanomite-patch-prompt
      - id: armnf-marker
      - id: armnf-export
