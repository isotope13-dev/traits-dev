# VB Decompiler plugin traits
defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 1000000
traits:
  - id: fasm-plugin-template
    desc: FASM plugin template marker
    crit: baseline
    conf: 0.98
    if:
      type: string_value
      exact: "FASM Plugin Template"
      section: .dedec
  - id: vbdecompiler-plugin-export-load
    desc: VB Decompiler plugin load export
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: "VBDecompilerPluginLoad"
  - id: vbdecompiler-plugin-export-name
    desc: VB Decompiler plugin name export
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: "VBDecompilerPluginName"
  - id: vbdecompiler-plugin-export-author
    desc: VB Decompiler plugin author export
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: "VBDecompilerPluginAuthor"
composite_rules:
  - id: vbdecompiler-fasm-plugin
    desc: VB Decompiler FASM plugin DLL
    crit: baseline
    conf: 0.99
    all:
      - id: fasm-plugin-template
      - id: vbdecompiler-plugin-export-load
      - id: vbdecompiler-plugin-export-name
      - id: vbdecompiler-plugin-export-author
