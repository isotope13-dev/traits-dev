defaults:
  for:
    - pe
  platforms:
    - windows
  size_max: 1000000
traits:
  - id: lordpe-banner
    desc: LordPE banner string
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: LordPE ]=-  coded by yoda
      section: .text
  - id: lordpe-mailto
    desc: LordPE contact string
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: MailTo:LordPE@gmx.net
      section: .data
  - id: lordpe-ini
    desc: LordPE INI filename
    crit: notable
    conf: 0.98
    if:
      type: text
      exact: LordPE.iNi
      section: .data
  - id: lordpe-dumper-server
    desc: LordPE dumper server banner
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: '[ LordPE Dumper Server ]'
      section: .data
  - id: lordpe-trapdll
    desc: LordPE TrapDll helper name
    crit: notable
    conf: 0.98
    if:
      type: text
      exact: TrapDll.exe
      section: .data
composite_rules:
  - id: lordpe-tool
    desc: LordPE PE editor and dumper
    crit: notable
    conf: 0.995
    needs: 2
    any:
      - id: lordpe-banner
      - id: lordpe-mailto
      - id: lordpe-ini
      - id: lordpe-dumper-server
      - id: lordpe-trapdll
