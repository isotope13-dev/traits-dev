defaults:
  for:
    - pe
  platforms:
    - windows
  size_max: 1000000
traits:
  - id: importrec-banner
    desc: ImportREC product banner
    crit: notable
    conf: 0.99
    if:
      type: string_value
      section: .rdata
      substr: Import REConstructor v1.7d
  - id: importrec-final-banner
    desc: ImportREC final release banner
    crit: notable
    conf: 0.995
    if:
      type: string_value
      section: .rdata
      exact: Import REConstructor v1.7d FINAL (C) 2001-2010 MackT/uCF
  - id: importrec-active-process-ui
    desc: ImportREC active process attach label
    crit: notable
    conf: 0.98
    if:
      type: string_value
      section: .rdata
      exact: Attach to an Active Process
  - id: importrec-rebuild-imports-ui
    desc: ImportREC rebuild imports label
    crit: notable
    conf: 0.98
    if:
      type: string_value
      section: .rdata
      exact: Rebuild Imports
  - id: importrec-apihooks
    desc: ImportREC ApiHooks library marker
    crit: notable
    conf: 0.97
    if:
      type: string_value
      section: .rdata
      exact: ApiHooks 5.6
composite_rules:
  - id: importrec-tool
    desc: ImportREC import reconstruction tool
    crit: notable
    conf: 0.995
    needs: 2
    any:
      - id: importrec-banner
      - id: importrec-final-banner
      - id: importrec-active-process-ui
      - id: importrec-rebuild-imports-ui
      - id: importrec-apihooks
