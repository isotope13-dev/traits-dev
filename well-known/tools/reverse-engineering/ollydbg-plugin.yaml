# OllyDbg / x64dbg Plugin Detection
# These exports identify legitimate debugger plugins
defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 1000000
traits:
  - id: ollydbg-plugin-export
    desc: OllyDbg plugin exported function
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "ODBG_Plugin"
  - id: x64dbg-plugin-export
    desc: x64dbg-style plugin exported init function
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: pluginit
