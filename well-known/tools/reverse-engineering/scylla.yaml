defaults:
  for:
    - pe
  platforms:
    - windows
  size_max: 1000000
traits:
  - id: scylla-plugin-exchange
    desc: Scylla plugin exchange marker
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: ScyllaPluginExchange
      section: .text
  - id: scylla-config
    desc: Scylla configuration filename
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: Scylla.ini
      section: .text
  - id: scylla-debug-log
    desc: Scylla debug log filename
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: Scylla_debug.log
      section: .text
  - id: scylla-iat-rebuilder-ui
    desc: Scylla IAT rebuilder UI label
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: IAT Rebuilder
      section: .text
composite_rules:
  - id: scylla-unpacker
    desc: Scylla unpacking and import fixer
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: scylla-plugin-exchange
      - id: scylla-config
      - id: scylla-debug-log
      - id: scylla-iat-rebuilder-ui
