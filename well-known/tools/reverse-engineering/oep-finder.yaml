defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  size_max: 1000000
traits:
  - id: geta-oep-banner
    desc: GeTaOEP tool banner
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: GeTaOEP by Dilla, tPORt
      section: .rdata
  - id: archer-human-banner
    desc: Archer and Human OEP finder banner
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: OEP Finder by Archer & Human
      section: .rdata
  - id: oepfinders-path
    desc: OEPFinders helper path marker
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: \OEPFinders\
      section: .rdata
  - id: get-oep-export
    desc: OEP getter export symbol
    crit: notable
    conf: 0.97
    if:
      type: symbol
      exact: GetOEPNow
composite_rules:
  - id: human-oep-finder
    desc: Archer Human OEP finder tool
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: geta-oep-banner
      - id: archer-human-banner
      - id: oepfinders-path
      - id: get-oep-export
  - id: unpacker-helper-api-pattern
    desc: Unpacker helper with module enum and exception APIs
    crit: notable
    conf: 0.9
    size_max: 1000000
    all:
      - id: micro-behaviors/process/enumerate/snapshot::module32-first
      - id: micro-behaviors/os/exception/error-handling::add-vectored-exception-handler
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
