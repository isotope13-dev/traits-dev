defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.98
  size_min: 10000
  size_max: 52428800
traits:
  - id: create-instance-export
    desc: QBDL instance creation export
    if:
      type: symbol
      exact: "CreateQBDLInstance"
  - id: module-entry-export
    desc: QBDL module entry export
    if:
      type: symbol
      exact: "QBDLModuleEntry"
  - id: namespace-rtti
    desc: QBDL namespace in RTTI
    if:
      type: text
      substr: "qbdl@@"
      section: any
  - id: crash-domain
    desc: Tencent browser crash domain
    if:
      type: text
      substr: "crash.browser.qq.com"
      section: any
  - id: update-domain
    desc: Tencent browser update domain
    if:
      type: text
      substr: "qbwupacc.imtt.qq.com"
      section: any
composite_rules:
  - id: qbdl-exports
    desc: QBDL exports detected
    crit: component
    all:
      - id: create-instance-export
      - id: module-entry-export
  - id: tencent-qbdl
    desc: Tencent Quick Browser Downloader (QBDL)
    crit: baseline
    conf: 0.99
    any:
      - id: qbdl-exports
      - id: namespace-rtti
      - id: crash-domain
      - id: update-domain
