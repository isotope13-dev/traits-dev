defaults:
  platforms: [linux, unix, macos, windows, android, ios]
traits:
  - id: mercurial-js-id
    size_min: 512
    size_max: 500000000
    desc: "Identifies mercurial.js"
    crit: baseline
    for: [javascript]
    if:
      type: basename # Use basename to match filename
      regex: "mercurial\\.js" # Regex for mercurial.js
