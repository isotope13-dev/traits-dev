# SREP (Super REP) Compression Tool — Dual-Use Packer Detection
# SREP is a legitimate data compression tool commonly repurposed as a malware packer.
# The binary embeds SREP decompression logic and stores payload in .rsrc as SREP-compressed data.
defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 4096

traits:
  - id: srep-version-banner
    desc: SREP compression tool version banner
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'SREP \d+\.\d+[a-z]* (beta|alpha|release)?'
      section: .rdata

  - id: srep-error-string
    desc: SREP format error message string
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "Not an SREP compressed file:"
      section: .rdata

  - id: srep-extension
    desc: SREP compressed file extension reference
    crit: component
    conf: 0.85
    if:
      type: text
      exact: ".srep"
      section: .rdata

  - id: srep-data-tmp
    desc: SREP staging temp file reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "srep-data.tmp"
      section: .rdata

  - id: srep-virtual-memory-tmp
    desc: SREP memory-mapped staging temp file reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "srep-virtual-memory.tmp"
      section: .rdata

  - id: srep-nommap-flag
    desc: SREP no-mmap command-line flag reference
    crit: component
    conf: 0.8
    if:
      type: text
      exact: "-nommap"
      section: .rdata

  - id: srep-delete-flag
    desc: SREP self-delete command-line flag
    crit: component
    conf: 0.85
    if:
      type: text
      exact: "-delete"
      section: .rdata

composite_rules:
  - id: srep-packer
    desc: SREP compression tool used as packer/dropper
    crit: suspicious
    conf: 0.9
    attack: T1027.002
    mbc: F0001
    all:
      - id: srep-version-banner
    any:
      - id: srep-error-string
      - id: srep-data-tmp
      - id: srep-virtual-memory-tmp
      - id: srep-extension
      - id: srep-nommap-flag
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section

  - id: srep-packer-self-delete
    desc: SREP packer with self-delete behavior
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    all:
      - id: srep-packer
      - id: srep-delete-flag
      - id: objectives/evasion/self-delete/file::module-path-delete
