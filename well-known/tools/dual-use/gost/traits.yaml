defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1090
  size_min: 512
  size_max: 500000000
traits:
  - id: repo
    desc: GOST repository path
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      substr: github.com/ginuerzh/gost
  - id: source-root
    desc: GOST source root path
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      substr: /cmd/gost/main.go
  - id: route-stack
    desc: GOST route parser symbols
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      regex: main\.parse(Resolver|Bypass|IPRoutes)
  - id: gosocks4
    desc: GOST SOCKS4 dependency path
    crit: component
    conf: 0.9
    if:
      type: encoded
      substr: github.com/go-gost/gosocks4
  - id: gosocks5
    desc: GOST SOCKS5 dependency path
    crit: component
    conf: 0.9
    if:
      type: encoded
      substr: github.com/go-gost/gosocks5
  - id: relay
    desc: GOST relay dependency path
    crit: component
    conf: 0.9
    if:
      type: encoded
      substr: github.com/go-gost/relay
  - id: tproxy
    desc: GOST transparent proxy path
    crit: component
    conf: 0.9
    if:
      type: encoded
      substr: github.com/LiamHaworth/go-tproxy
  - id: obfs4
    desc: GOST obfs4 transport path
    crit: component
    conf: 0.9
    if:
      type: encoded
      substr: gitlab.com/yawning/obfs4.git
  - id: shadowsocks
    desc: GOST shadowsocks transport path
    crit: component
    conf: 0.9
    if:
      type: encoded
      substr: github.com/shadowsocks/go-shadowsocks2
  - id: quic-go
    desc: GOST QUIC dependency path
    crit: component
    conf: 0.9
    if:
      type: encoded
      substr: github.com/lucas-clemente/quic-go
composite_rules:
  - id: protocol-stack
    desc: GOST protocol stack markers
    crit: suspicious
    conf: 0.92
    any:
      - id: gosocks4
      - id: gosocks5
      - id: relay
      - id: tproxy
      - id: obfs4
      - id: shadowsocks
      - id: quic-go
    needs: 2
  - id: gost-detected
    desc: GOST tunneling framework detected
    crit: suspicious
    conf: 0.98
    any:
      - id: repo
      - id: source-root
      - id: route-stack
      - id: protocol-stack
    needs: 2
