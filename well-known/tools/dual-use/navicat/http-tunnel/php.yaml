defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
  size_min: 8000
  size_max: 40000
composite_rules:
  - id: navicat-http-tunnel-family
    desc: Navicat HTTP tunnel family markers
    crit: suspicious
    conf: 0.99
    all:
      - id: objectives/command-and-control/backdoor/webshell/db-tunnel::binary-http-tunnel-charset
      - id: objectives/command-and-control/backdoor/webshell/db-tunnel::navicat-wire-magic
      - id: objectives/command-and-control/backdoor/webshell/db-tunnel::navicat-tunnel-ui
      - id: objectives/command-and-control/backdoor/webshell/db-tunnel::navicat-wire-helper-vocabulary
  - id: navicat-http-tunnel-my202
    desc: Navicat HTTP tunnel my202 variant
    crit: suspicious
    conf: 0.99
    all:
      - id: navicat-http-tunnel-family
      - id: objectives/command-and-control/backdoor/webshell/db-tunnel::navicat-version-my
