# Malware Family - VNCJew Scanner
defaults:
  attack: T1046
  platforms: [linux, unix, android]
  for: [elf]
# ATT&CK: T1046 (Network Service Scanning)
traits:
  - id: read-vncs
    size_min: 512
    size_max: 500000000
    desc: VNCJew VNC reader function
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: "readVNCs"
      section: .text
composite_rules:
  - id: vncjew-detected
    size_min: 512
    size_max: 500000000
    desc: VNCJew VNC scanner
    crit: suspicious
    conf: 0.95
    mbc: "B0046"
    all:
      - id: read-vncs
      - id: micro-behaviors/os/firewall/iptables::iptables
      - id: well-known/tools/offensive/frameworks::masscan-ref
