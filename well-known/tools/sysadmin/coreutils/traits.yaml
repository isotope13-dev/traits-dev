defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for:
    - c
    - elf
    - so
    - macho
traits:
  - id: stdbuf-header
    size_min: 512
    size_max: 500000000
    desc: stdbuf source header
    crit: notable
    conf: 1.0
    if:
      type: string_value
      substr: stdbuf -- setup the standard streams for a command
      section: .text
  - id: stdbuf-usage
    size_min: 512
    size_max: 500000000
    desc: stdbuf usage strings
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: modified buffering operations for its standard streams
      section: .text
  - id: libstdbuf-so
    size_min: 512
    size_max: 500000000
    desc: libstdbuf shared library reference
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: libstdbuf.so
      section: .text
composite_rules:
  - id: stdbuf-tool
    size_min: 512
    size_max: 500000000
    desc: GNU Coreutils stdbuf tool
    crit: notable
    conf: 1.0
    any:
      - id: stdbuf-header
      - id: stdbuf-usage
      - id: libstdbuf-so
    downgrade:
      any:
        - id: metadata/vendor/fsf::fsf-copyright
