# PAR (Perl Archive) Launcher Detection
# PAR is a legitimate Perl packaging toolkit that creates self-contained executables
# by embedding a Perl interpreter and archived modules into a native binary.
# These binaries legitimately have large data sections, sparse strings, and few imports.
# Common examples: /usr/bin/parl (ships with macOS)
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [binaries]
traits:
  - id: par-env-vars
    size_min: 512
    size_max: 500000000
    desc: PAR environment variable references
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: "PAR_TEMP"
      section: .text
  - id: par-progname
    size_min: 512
    size_max: 500000000
    desc: PAR program name variable
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      substr: "PAR_PROGNAME"
      section: .text
  - id: par-extraction-msg
    size_min: 512
    size_max: 500000000
    desc: PAR extraction failure message
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: "extraction of"
      section: .text
composite_rules:
  - id: par-launcher
    size_min: 512
    size_max: 500000000
    desc: PAR (Perl Archive) launcher binary
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: par-env-vars
      - id: par-progname
      - id: par-extraction-msg
