defaults:
  for: [binaries]
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  crit: baseline
  size_max: 10485760
traits:
  - id: disk-partition-context
    desc: Disk partitioning utility context
    conf: 0.9
    count_min: 5
    if:
      type: string_value
      word: partition
      section: .rodata
