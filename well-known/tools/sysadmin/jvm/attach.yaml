defaults:
  platforms: [windows]
  for: [pe, dll]
  size_max: 1048576
traits:
  - id: attach-provider-export
    desc: JVM attach provider export
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: Java_sun_tools_attach_AttachProviderImpl_enumProcesses
  - id: attach-enqueue-export
    desc: JVM attach enqueue export
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: Java_sun_tools_attach_VirtualMachineImpl_enqueue
  - id: attach-exception-class
    desc: JVM attach exception class
    crit: component
    conf: 0.98
    if:
      type: text
      exact: com/sun/tools/attach/AttachNotSupportedException
      section: .rdata
  - id: attach-operation-string
    desc: JVM attach operation string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: JVM_EnqueueOperation
      section: .rdata
composite_rules:
  - id: jdk-attach-library
    desc: OpenJDK JVM attach helper
    crit: baseline
    conf: 0.99
    needs: 3
    any:
      - id: well-known/tools/sysadmin/jvm::attach-provider-export
      - id: well-known/tools/sysadmin/jvm::attach-enqueue-export
      - id: well-known/tools/sysadmin/jvm::attach-exception-class
      - id: well-known/tools/sysadmin/jvm::attach-operation-string
