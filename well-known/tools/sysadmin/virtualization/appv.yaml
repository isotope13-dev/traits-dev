defaults:
  platforms: [windows]
  for: [pe, dll]
  size_max: 10485760
traits:
  - id: subsystem-controller-name
    desc: App-V subsystem controller symbol text
    crit: component
    conf: 0.95
    if:
      type: string_value
      substr: "AppV::Client::Virtualization::SubsystemController::"
      section: ".rdata"
  - id: subsystem-registry
    desc: App-V subsystem registry path
    crit: component
    conf: 0.95
    if:
      type: string_value
      substr: "SOFTWARE\\Microsoft\\AppV\\Subsystem"
      section: ".rdata"
  - id: subsystem-runtime
    desc: App-V virtual services runtime text
    crit: component
    conf: 0.95
    if:
      type: string_value
      substr: "Virtual Services"
      section: ".rdata"
  - id: mavinject-allowlist
    desc: App-V mavinject allowlist marker
    crit: component
    conf: 0.95
    if:
      type: string_value
      substr: "/INJECTRUNNING"
      section: ".rdata"
composite_rules:
  - id: subsystem-controller
    desc: Microsoft App-V subsystem controller
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: subsystem-controller-name
      - id: subsystem-registry
      - id: subsystem-runtime
      - id: mavinject-allowlist
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
