defaults:
  for: [elf, macho, pe, shell, batch, powershell]
  platforms: [linux, unix, android, macos, ios, windows]
traits:
  - id: metasploit-ref
    size_min: 512
    size_max: 500000000
    desc: Metasploit framework reference
    crit: notable
    conf: 0.8
    attack: T1588.002
    if:
      type: string_value
      substr: metasploit
      case_insensitive: true
      section: .text
  - id: msfpayload
    size_min: 512
    size_max: 500000000
    desc: Metasploit payload generator reference
    crit: suspicious
    conf: 0.9
    attack: T1587.001
    if:
      type: string_value
      substr: msfpayload
      section: .text
  - id: metasploit-url
    size_min: 512
    size_max: 500000000
    desc: Metasploit website reference
    crit: suspicious
    conf: 0.75
    attack: T1588.002
    if:
      type: string_value
      regex: metasploit\.com
      section: .text
  - id: meterpreter
    size_min: 512
    size_max: 500000000
    desc: Meterpreter payload reference
    crit: suspicious
    conf: 0.95
    attack: T1059
    platforms:
      - windows
    for: [pe, batch, powershell]
    if:
      type: string_value
      regex: /meterpreter/
      section: .text
  - id: payload-label
    size_min: 512
    size_max: 500000000
    desc: Payload label string
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "Payload: "
      section: .text
  - id: shh-bin-path
    size_min: 512
    size_max: 500000000
    desc: Suspicious /shh/bin path (typosquat)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /shh/bin
      section: .text
  - id: nmap-ref
    size_min: 512
    size_max: 500000000
    desc: Nmap port scanner reference
    crit: notable
    conf: 0.6
    attack: T1046
    if:
      type: string_value
      word: nmap
      section: .text
  - id: nmap-spoof-source
    size_min: 512
    size_max: 10485760
    desc: Nmap source IP spoofing
    crit: suspicious
    conf: 0.85
    attack: T1046
    if:
      type: raw
      regex: (nmap|scan).{0,50}-S\s+[0-9]|arguments.{0,20}-S\s+[0-9]|'-S\s+[0-9]
      section: .text
  - id: masscan-ref
    size_min: 512
    size_max: 500000000
    desc: Masscan port scanner reference
    crit: notable
    conf: 0.75
    attack: T1046
    if:
      type: string_value
      word: masscan
      section: .text
  # Masscan config component traits
  - id: masscan-adapter-ip
    size_min: 512
    size_max: 500000000
    desc: Masscan adapter-ip option
    crit: component
    if:
      type: string_value
      substr: "adapter-ip"
      section: .text
  - id: masscan-nocapture
    size_min: 512
    size_max: 500000000
    desc: Masscan nocapture option
    crit: component
    if:
      type: string_value
      substr: "nocapture"
      section: .text
  - id: masscan-output-format
    size_min: 512
    size_max: 500000000
    desc: Masscan output-format option
    crit: component
    if:
      type: string_value
      substr: "output-format"
      section: .text
  - id: masscan-randomize-hosts
    size_min: 512
    size_max: 500000000
    desc: Masscan randomize-hosts option
    crit: component
    if:
      type: string_value
      substr: "randomize-hosts"
      section: .text
  - id: execve-symbol
    size_min: 512
    size_max: 500000000
    desc: execve system call symbol
    crit: baseline
    conf: 0.9
    platforms:
      - linux
    for: [elf]
    if:
      type: symbol
      regex: ^_?execve$
  - id: system-symbol
    size_min: 512
    size_max: 500000000
    desc: system() function symbol
    crit: baseline
    conf: 0.9
    platforms:
      - linux
      - macos
    for: [elf, macho]
    if:
      type: symbol
      regex: ^_?system$
  - id: chisel-ref
    size_min: 512
    size_max: 500000000
    desc: Chisel TCP/UDP tunnel tool
    crit: suspicious
    conf: 0.9
    attack: T1572
    if:
      type: string_value
      substr: jpillora/chisel
      # Chisel function component traits
      section: .text
  - id: chisel-tls-letsencrypt
    size_min: 512
    size_max: 500000000
    desc: Chisel tlsLetsEncrypt function
    crit: component
    if:
      type: string_value
      substr: "tlsLetsEncrypt"
      section: .text
  - id: chisel-auth-user
    size_min: 512
    size_max: 500000000
    desc: Chisel authUser function
    crit: component
    if:
      type: string_value
      substr: "authUser"
      section: .text
  - id: chisel-handle-websocket
    size_min: 512
    size_max: 500000000
    desc: Chisel handleWebsocket function
    crit: component
    if:
      type: string_value
      substr: "handleWebsocket"
      section: .text
  - id: chisel-tls-keycert
    size_min: 512
    size_max: 500000000
    desc: Chisel tlsKeyCert function
    crit: component
    if:
      type: string_value
      substr: "tlsKeyCert"
      section: .text
  - id: chisel-tunnel-out-ssh
    size_min: 512
    size_max: 500000000
    desc: Chisel tunnel_out_ssh function
    crit: component
    if:
      type: string_value
      substr: "tunnel_out_ssh"
      section: .text
  - id: venom-dliv3
    size_min: 512
    size_max: 500000000
    desc: Venom Dliv3 GitHub reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: string_value
      substr: Dliv3/Venom
      section: .text
  - id: venom-agent-path
    size_min: 512
    size_max: 500000000
    desc: Venom agent path reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: string_value
      substr: /Venom/agent
      section: .text
  - id: venom-agent-name
    size_min: 512
    size_max: 500000000
    desc: Venom agent name reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: string_value
      substr: venom_agent
      section: .text
  - id: dirbuster
    size_min: 512
    size_max: 500000000
    desc: DirBuster directory brute-force tool
    crit: suspicious
    conf: 0.8
    attack: T1595.003
    if:
      type: string_value
      word: dirbuster
      section: .text
  - id: smbexec-ntlm
    size_min: 512
    size_max: 500000000
    desc: SMBExec NTLM HASH indicator
    crit: suspicious
    conf: 0.85
    attack: T1021.002
    if:
      type: string_value
      substr: NTLM HASH
      section: .text
  - id: smbexec-hashpass
    size_min: 512
    size_max: 500000000
    desc: SMBExec HASH PASS substitution indicator
    crit: suspicious
    conf: 0.85
    attack: T1021.002
    if:
      type: string_value
      substr: "HASH PASS: Substituting"
      section: .text
  - id: pspy-ref
    size_min: 512
    size_max: 500000000
    desc: pspy process snooping tool
    crit: suspicious
    conf: 0.9
    attack: T1057
    platforms:
      - linux
    for: [elf, shell]
    if:
      type: string_value
      substr: dominicbreuker/pspy
      # pspy function component traits
      section: .text
  - id: pspy-start-fsw
    size_min: 512
    size_max: 500000000
    desc: pspy startFSW function
    crit: component
    if:
      type: string_value
      substr: "startFSW"
      section: .text
  - id: pspy-start-pss
    size_min: 512
    size_max: 500000000
    desc: pspy startPSS function
    crit: component
    if:
      type: string_value
      substr: "startPSS"
      section: .text
  - id: pspy-trigger-every
    size_min: 512
    size_max: 500000000
    desc: pspy triggerEvery function
    crit: component
    if:
      type: string_value
      substr: "triggerEvery"
      section: .text
  - id: nmap-decoy-scan
    size_min: 512
    size_max: 500000000
    desc: Nmap decoy scan
    crit: suspicious
    conf: 0.85
    attack: T1046
    if:
      type: raw
      regex: \bnmap(\.exe)?[^\n\r]{0,120}\s-D\s*(ME|RND|[0-9,]+|\d{1,3}(\.\d{1,3}){3})
      section: .text
composite_rules:
  - id: venom-ref
    size_min: 512
    size_max: 500000000
    desc: Venom shellcode generator reference
    crit: notable
    conf: 0.7
    any: null
  - id: smbexec
    size_min: 512
    size_max: 500000000
    desc: SMBExec tool usage
    crit: notable
    conf: 0.7
    any: null
  - id: exec-capability
    size_min: 512
    size_max: 500000000
    desc: Command execution capability
    crit: baseline
    conf: 0.7
    any:
      - id: execve-symbol
      - id: system-symbol
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
  - id: metasploit-payload
    size_min: 512
    size_max: 500000000
    desc: Metasploit payload detected
    crit: suspicious
    conf: 0.95
    attack: T1587.001
    needs: 2
    any:
      - id: msfpayload
      - id: metasploit-url
      - id: payload-label
      - id: shh-bin-path
  - id: masscan-config
    size_min: 512
    size_max: 500000000
    desc: Masscan configuration patterns
    crit: suspicious
    conf: 0.85
    attack: T1046
    needs: 3
    any:
      - id: masscan-adapter-ip
      - id: masscan-nocapture
      - id: masscan-output-format
      - id: masscan-randomize-hosts
  - id: chisel-functions
    size_min: 512
    size_max: 500000000
    desc: Chisel tunnel tool function signatures
    crit: suspicious
    conf: 0.85
    attack: T1572
    needs: 3
    any:
      - id: chisel-tls-letsencrypt
      - id: chisel-auth-user
      - id: chisel-handle-websocket
      - id: chisel-tls-keycert
      - id: chisel-tunnel-out-ssh
  - id: pspy-functions
    size_min: 512
    size_max: 500000000
    desc: pspy tool function signatures
    crit: suspicious
    conf: 0.8
    attack: T1057
    needs: 2
    any:
      - id: pspy-start-fsw
      - id: pspy-start-pss
      - id: pspy-trigger-every
  - id: masscan-execution
    size_min: 512
    size_max: 500000000
    desc: Masscan scanner execution
    crit: suspicious
    conf: 0.9
    attack: T1046
    platforms:
      - linux
    for: [elf]
    all:
      - id: masscan-ref
      - id: exec-capability
