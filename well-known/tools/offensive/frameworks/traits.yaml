defaults:
  for:
    - all
traits:
  - id: metasploit-ref
    desc: Metasploit framework reference
    crit: notable
    conf: 0.8
    attack: T1588.002
    platforms:
      - all
    if:
      type: string
      substr: metasploit
      case_insensitive: true
  - id: msfpayload
    desc: Metasploit payload generator reference
    crit: suspicious
    conf: 0.9
    attack: T1587.001
    platforms:
      - all
    if:
      type: string
      substr: msfpayload
  - id: metasploit-url
    desc: Metasploit website reference
    crit: suspicious
    conf: 0.75
    attack: T1588.002
    platforms:
      - all
    if:
      type: string
      regex: metasploit\.com
  - id: meterpreter
    desc: Meterpreter payload reference
    crit: suspicious
    conf: 0.95
    attack: T1059
    platforms:
      - windows
    if:
      type: string
      regex: /meterpreter/
  - id: payload-label
    desc: Payload label string
    crit: baseline
    conf: 0.6
    platforms:
      - all
    if:
      type: string
      substr: "Payload: "
  - id: shh-bin-path
    desc: Suspicious /shh/bin path (typosquat)
    crit: notable
    conf: 0.7
    platforms:
      - all
    if:
      type: string
      substr: /shh/bin
  - id: nmap-ref
    desc: Nmap port scanner reference
    crit: notable
    conf: 0.6
    attack: T1046
    platforms:
      - all
    if:
      type: string
      word: nmap
  - id: nmap-spoof-source
    desc: Nmap source IP spoofing
    crit: suspicious
    conf: 0.85
    attack: T1046
    platforms:
      - all
    for: [shell, python, ruby, javascript, go, batch, powershell]
    if:
      type: raw
      regex: (nmap|scan).{0,50}-S\s+[0-9]|arguments.{0,20}-S\s+[0-9]|'-S\s+[0-9]
  - id: masscan-ref
    desc: Masscan port scanner reference
    crit: notable
    conf: 0.75
    attack: T1046
    platforms:
      - all
    if:
      type: string
      word: masscan
  # Masscan config component traits
  - id: masscan-adapter-ip
    desc: Masscan adapter-ip option
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "adapter-ip"
  - id: masscan-nocapture
    desc: Masscan nocapture option
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "nocapture"
  - id: masscan-output-format
    desc: Masscan output-format option
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "output-format"
  - id: masscan-randomize-hosts
    desc: Masscan randomize-hosts option
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "randomize-hosts"
  - id: execve-symbol
    desc: execve system call symbol
    crit: baseline
    conf: 0.9
    platforms:
      - linux
    for:
      - elf
    if:
      type: symbol
      regex: ^_?execve$
  - id: system-symbol
    desc: system() function symbol
    crit: baseline
    conf: 0.9
    platforms:
      - linux
      - macos
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: ^_?system$
  - id: chisel-ref
    desc: Chisel TCP/UDP tunnel tool
    crit: suspicious
    conf: 0.9
    attack: T1572
    platforms:
      - all
    if:
      type: string
      substr: jpillora/chisel
  # Chisel function component traits
  - id: chisel-tls-letsencrypt
    desc: Chisel tlsLetsEncrypt function
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "tlsLetsEncrypt"
  - id: chisel-auth-user
    desc: Chisel authUser function
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "authUser"
  - id: chisel-handle-websocket
    desc: Chisel handleWebsocket function
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "handleWebsocket"
  - id: chisel-tls-keycert
    desc: Chisel tlsKeyCert function
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "tlsKeyCert"
  - id: chisel-tunnel-out-ssh
    desc: Chisel tunnel_out_ssh function
    crit: component
    platforms: [all]
    if:
      type: string
      substr: "tunnel_out_ssh"
  - id: venom-dliv3
    desc: Venom Dliv3 GitHub reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    platforms:
      - all
    if:
      type: string
      substr: Dliv3/Venom
  - id: venom-agent-path
    desc: Venom agent path reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    platforms:
      - all
    if:
      type: string
      substr: /Venom/agent
  - id: venom-agent-name
    desc: Venom agent name reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    platforms:
      - all
    if:
      type: string
      substr: venom_agent
  - id: dirbuster
    desc: DirBuster directory brute-force tool
    crit: suspicious
    conf: 0.8
    attack: T1595.003
    platforms:
      - all
    if:
      type: string
      substr: dirbuster
  - id: smbexec-ntlm
    desc: SMBExec NTLM HASH indicator
    crit: suspicious
    conf: 0.85
    attack: T1021.002
    platforms:
      - all
    if:
      type: string
      substr: NTLM HASH
  - id: smbexec-hashpass
    desc: SMBExec HASH PASS substitution indicator
    crit: suspicious
    conf: 0.85
    attack: T1021.002
    platforms:
      - all
    if:
      type: string
      substr: "HASH PASS: Substituting"
  - id: pspy-ref
    desc: pspy process snooping tool
    crit: suspicious
    conf: 0.9
    attack: T1057
    platforms:
      - linux
    if:
      type: string
      substr: dominicbreuker/pspy
  # pspy function component traits
  - id: pspy-start-fsw
    desc: pspy startFSW function
    crit: component
    platforms: [linux]
    if:
      type: string
      substr: "startFSW"
  - id: pspy-start-pss
    desc: pspy startPSS function
    crit: component
    platforms: [linux]
    if:
      type: string
      substr: "startPSS"
  - id: pspy-trigger-every
    desc: pspy triggerEvery function
    crit: component
    platforms: [linux]
    if:
      type: string
      substr: "triggerEvery"
  - id: nmap-decoy-scan
    desc: Nmap decoy scan
    crit: suspicious
    conf: 0.85
    attack: T1046
    platforms:
      - all
    for: [shell, python, ruby, javascript, go, batch, powershell]
    if:
      type: raw
      regex: \bnmap(\.exe)?[^\n\r]{0,120}\s-D\s*(ME|RND|[0-9,]+|\d{1,3}(\.\d{1,3}){3})
composite_rules:
  - id: venom-ref
    desc: Venom shellcode generator reference
    crit: notable
    conf: 0.7
    any: null
  - id: smbexec
    desc: SMBExec tool usage
    crit: notable
    conf: 0.7
    any: null
  - id: exec-capability
    desc: Command execution capability
    crit: baseline
    conf: 0.7
    any:
      - id: execve-symbol
      - id: system-symbol
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
  - id: metasploit-payload
    desc: Metasploit payload detected
    crit: suspicious
    conf: 0.95
    attack: T1587.001
    for:
      - all
    needs: 2
    any:
      - id: msfpayload
      - id: metasploit-url
      - id: payload-label
      - id: shh-bin-path
  - id: masscan-config
    desc: Masscan configuration patterns
    crit: suspicious
    conf: 0.85
    attack: T1046
    platforms: [all]
    needs: 3
    any:
      - id: masscan-adapter-ip
      - id: masscan-nocapture
      - id: masscan-output-format
      - id: masscan-randomize-hosts
  - id: chisel-functions
    desc: Chisel tunnel tool function signatures
    crit: suspicious
    conf: 0.85
    attack: T1572
    platforms: [all]
    needs: 3
    any:
      - id: chisel-tls-letsencrypt
      - id: chisel-auth-user
      - id: chisel-handle-websocket
      - id: chisel-tls-keycert
      - id: chisel-tunnel-out-ssh
  - id: pspy-functions
    desc: pspy tool function signatures
    crit: suspicious
    conf: 0.8
    attack: T1057
    platforms: [linux]
    needs: 2
    any:
      - id: pspy-start-fsw
      - id: pspy-start-pss
      - id: pspy-trigger-every
  - id: masscan-execution
    desc: Masscan scanner execution
    crit: suspicious
    conf: 0.9
    attack: T1046
    platforms:
      - linux
    for:
      - elf
    all:
      - id: masscan-ref
      - id: exec-capability
