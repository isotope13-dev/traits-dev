defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
  for:
    - c
  size_min: 2048
  size_max: 65536
traits:
  - id: banner-string
    desc: Wipelog banner string
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      exact: '* Selectively wipe system logs.'
  - id: usage-string
    desc: Wipelog usage example string
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      exact: '* ex:    wipe l user;wipe u user;wipe w user'
  - id: patching-banner
    desc: Wipelog patching status banner
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      substr: 'Patching %s .... '
  - id: acct-temp-error
    desc: Wipelog temporary acct error string
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      substr: 'ERROR: Opening tmp ACCT file'
  - id: lastlog-time-error
    desc: Wipelog lastlog time error string
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      substr: 'ERROR: Time format is YYMMddhhmm.'
  - id: function-cluster
    desc: Wipelog function name cluster
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      regex: wipe_(utmp|acct|lastlog|wtmp)
composite_rules:
  - id: family-fingerprint
    desc: Wipelog source fingerprint cluster
    crit: suspicious
    conf: 0.99
    needs: 3
    any:
      - id: banner-string
      - id: usage-string
      - id: patching-banner
      - id: acct-temp-error
      - id: lastlog-time-error
  - id: source
    desc: Unix Wipelog source tool signature
    crit: hostile
    conf: 0.99
    attack: T1587.001
    mbc: OB0004
    all:
      - id: family-fingerprint
      - id: banner-string
