defaults:
  for:
    - elf
    - macho
    - pe
  platforms: [windows, linux, macos]
  attack: T1557
traits:
  - id: phishlet-proxy-hosts
    size_min: 512
    size_max: 500000000
    desc: Phishlet proxy_hosts configuration
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      substr: 'proxy_hosts:'
      section: .text
  - id: phishlet-phish-sub
    size_min: 512
    size_max: 500000000
    desc: Phishlet phish_sub directive
    crit: suspicious
    conf: 0.95
    for: [all, -binaries]
    if:
      type: raw
      substr: 'phish_sub:'
      section: .text
  - id: phishlet-orig-sub
    size_min: 512
    size_max: 500000000
    desc: Phishlet orig_sub directive
    crit: suspicious
    conf: 0.95
    for: [all, -binaries]
    if:
      type: raw
      substr: 'orig_sub:'
      section: .text
  - id: phishlet-auth-tokens
    size_min: 512
    size_max: 500000000
    desc: Phishlet auth_tokens section
    crit: suspicious
    conf: 0.95
    for: [all, -binaries]
    if:
      type: raw
      substr: 'auth_tokens:'
      section: .text
  - id: phishlet-sub-filters
    size_min: 512
    size_max: 500000000
    desc: Phishlet sub_filters section
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      substr: 'sub_filters:'
      section: .text
  - id: phishlet-js-inject
    size_min: 512
    size_max: 500000000
    desc: Phishlet js_inject section
    crit: suspicious
    conf: 0.95
    for: [all, -binaries]
    if:
      type: raw
      substr: 'js_inject:'
      section: .text
  - id: phishlet-is-landing
    size_min: 512
    size_max: 500000000
    desc: Phishlet is_landing directive
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      substr: 'is_landing:'
      section: .text
  - id: phishlet-min-ver
    size_min: 512
    size_max: 500000000
    desc: Phishlet min_ver version marker
    crit: notable
    conf: 0.8
    for: [all, -binaries]
    if:
      type: raw
      regex: min_ver:\s*['"]?[0-9]+\.[0-9]+
      section: .text
  - id: phishlet-trigger-domains
    size_min: 512
    size_max: 500000000
    desc: Phishlet trigger_domains directive
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      substr: 'trigger_domains:'
      section: .text
  - id: phishlet-force-post
    size_min: 512
    size_max: 500000000
    desc: Phishlet force_post directive
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      substr: 'force_post:'
      section: .text
  - id: phishlet-auth-urls
    size_min: 512
    size_max: 500000000
    desc: Phishlet auth_urls directive
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      substr: 'auth_urls:'
      section: .text
  - id: config-lures
    size_min: 512
    size_max: 500000000
    desc: Evilginx lures configuration
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      regex: '\blures\s*:'
      section: .text
  - id: config-redirect-url
    size_min: 512
    size_max: 500000000
    desc: Evilginx redirect_url config
    crit: notable
    conf: 0.8
    for: [all, -binaries]
    if:
      type: raw
      substr: 'redirect_url:'
      section: .text
  - id: config-site-domains
    size_min: 512
    size_max: 500000000
    desc: Evilginx site_domains config
    crit: suspicious
    conf: 0.85
    for: [all, -binaries]
    if:
      type: raw
      substr: 'site_domains:'
      section: .text
  - id: config-verification-key
    size_min: 512
    size_max: 500000000
    desc: Evilginx verification_key config
    crit: notable
    conf: 0.8
    for: [all, -binaries]
    if:
      type: raw
      substr: 'verification_key:'
      section: .text
  - id: config-blacklist-mode
    size_min: 512
    size_max: 500000000
    desc: Evilginx blacklist_mode config
    crit: notable
    conf: 0.8
    for: [all, -binaries]
    if:
      type: raw
      substr: 'blacklist_mode:'
      section: .text
  - id: github-ref-dup
    size_min: 512
    size_max: 500000000
    desc: Evilginx2 GitHub path reference
    crit: suspicious
    conf: 0.98
    if:
      type: string
      substr: github.com/kgretzky/evilginx2
      section: .text
  - id: core-package
    size_min: 512
    size_max: 500000000
    desc: Evilginx2 core package reference
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: kgretzky/evilginx2/core
      section: .text
  - id: database-package
    size_min: 512
    size_max: 500000000
    desc: Evilginx2 database package reference
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: kgretzky/evilginx2/database
      section: .text
  - id: log-package
    size_min: 512
    size_max: 500000000
    desc: Evilginx2 log package reference
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: kgretzky/evilginx2/log
      section: .text
  - id: phishlet-string
    size_min: 512
    size_max: 500000000
    desc: Phishlet configuration string
    crit: suspicious
    conf: 0.9
    if:
      type: string
      word: phishlet
      section: .text
  - id: phishlet-hostname
    size_min: 512
    size_max: 500000000
    desc: Phishlet hostname configuration
    crit: suspicious
    conf: 0.85
    if:
      type: string
      substr: phishlet hostname
      section: .text
  - id: phishlet-version
    size_min: 512
    size_max: 500000000
    desc: Phishlet version reference
    crit: suspicious
    conf: 0.85
    if:
      type: string
      substr: PhishletVersion
      section: .text
  - id: lure-functions
    size_min: 512
    size_max: 500000000
    desc: Lure management functions
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: (AddLure|GetLure|DeleteLure|GetLureUrl)
      section: .text
  - id: phish-url
    size_min: 512
    size_max: 500000000
    desc: Phishing URL generation
    crit: suspicious
    conf: 0.85
    if:
      type: string
      substr: createPhishUrl
      section: .text
  - id: phish-domain
    size_min: 512
    size_max: 500000000
    desc: Phishing domain configuration
    crit: suspicious
    conf: 0.85
    if:
      type: string
      substr: getPhishDomain
      section: .text
  - id: auth-token-capture
    size_min: 512
    size_max: 500000000
    desc: Auth token capture patterns
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: (isAuthToken|authTokens)
      section: .text
  - id: evil-root-ca
    size_min: 512
    size_max: 500000000
    desc: Evilginx root CA string
    crit: suspicious
    conf: 0.98
    if:
      type: string
      substr: Evilginx Super-Evil Root CA
      section: .text
  - id: signature-trust
    size_min: 512
    size_max: 500000000
    desc: Evilginx signature trust string
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: Evilginx Signature Trust Co
      section: .text
  - id: proxy-interception
    size_min: 512
    size_max: 500000000
    desc: HTTP proxy interception
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: replaceHostWithPhished
      section: .text
  - id: force-post
    size_min: 512
    size_max: 500000000
    desc: Force POST interception
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: force_post:.{0,50}(body|url matched)
      section: .text
  - id: educational-disclaimer
    size_min: 512
    size_max: 500000000
    desc: Educational purposes disclaimer
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: built for educational purposes only
      section: .text
  - id: config-phishlet-ref-1
    size_min: 512
    size_max: 500000000
    desc: Evilginx phishlet reference (google/outlook/facebook/linkedin)
    if:
      type: raw
      regex: phishlet:\s*(google|outlook|facebook|linkedin)
      section: .text
  - id: config-phishlet-ref-2
    size_min: 512
    size_max: 500000000
    desc: Evilginx phishlet reference (microsoft/office365/o365)
    if:
      type: raw
      regex: phishlet:\s*(microsoft|office365|o365)
      section: .text
  - id: phishlet-credentials
    size_min: 512
    size_max: 500000000
    desc: Phishlet credentials section
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      regex: 'credentials:\s*[\s\S]{0,30}(username|password):[\s\S]{0,30}(key|search):'
      section: .text
composite_rules:
  - id: config-phishlet-ref
    size_min: 512
    size_max: 500000000
    desc: Evilginx phishlet reference
    crit: suspicious
    any:
      - id: config-phishlet-ref-1
      - id: config-phishlet-ref-2
  - id: phishlet-config
    size_min: 512
    size_max: 500000000
    desc: Evilginx phishlet configuration file
    crit: hostile
    conf: 0.95
    attack: T1539
    for: [all, -binaries]
    all:
      - id: phishlet-proxy-hosts
      - id: phishlet-phish-sub
      - id: phishlet-auth-tokens
      - id: phishlet-credentials
  - id: main-config
    size_min: 512
    size_max: 500000000
    desc: Evilginx main configuration file
    crit: hostile
    conf: 0.9
    attack: T1566
    for: [all, -binaries]
    all:
      - id: config-lures
      - id: config-phishlet-ref
      - id: config-site-domains
      - id: config-redirect-url
  - id: phishlet-with-js-inject
    size_min: 512
    size_max: 500000000
    desc: Phishlet with JS injection
    crit: hostile
    conf: 0.95
    attack: T1185
    for: [all, -binaries]
    all:
      - id: phishlet-proxy-hosts
      - id: phishlet-phish-sub
      - id: phishlet-js-inject
      - id: phishlet-trigger-domains
  - id: detected-comp
    size_min: 512
    size_max: 500000000
    desc: Evilginx2 phishing framework detected
    crit: hostile
    conf: 0.98
    attack: T1557
    for:
      - elf
      - macho
      - pe
    all:
      - id: well-known/tools/offensive/evilginx::github-ref-dup
      - id: core-package
      - id: phishlet-string
      - id: lure-functions
  - id: detected-by-ca
    size_min: 512
    size_max: 500000000
    desc: Evilginx2 detected by Root CA
    crit: hostile
    conf: 0.95
    attack: T1557
    for:
      - elf
      - macho
      - pe
    all:
      - id: evil-root-ca
      - id: phishlet-string
      - id: lure-functions
      - id: auth-token-capture
  - id: phishing-toolkit-behavior
    size_min: 512
    size_max: 500000000
    desc: Phishing toolkit behavioral pattern
    crit: hostile
    conf: 0.9
    attack: T1539
    for:
      - elf
      - macho
      - pe
    all:
      - id: phishlet-string
      - id: lure-functions
      - id: auth-token-capture
      - id: proxy-interception
      - id: phish-url
