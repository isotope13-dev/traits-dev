defaults:
  for: [binaries]
  platforms:
    - unix
    - windows
    - macos
  attack: T1557
  size_max: 104857600
traits:
  - id: github-ref-dup
    size_min: 512
    desc: Evilginx2 GitHub path reference
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: github.com/kgretzky/evilginx2
      section: .text
  - id: core-package
    size_min: 512
    desc: Evilginx2 core package reference
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: kgretzky/evilginx2/core
      section: .text
  - id: database-package
    size_min: 512
    desc: Evilginx2 database package reference
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: kgretzky/evilginx2/database
      section: .text
  - id: log-package
    size_min: 512
    desc: Evilginx2 log package reference
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: kgretzky/evilginx2/log
      section: .text
  - id: phishlet-string
    size_min: 512
    desc: Phishlet configuration string
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      word: phishlet
      section: .text
  - id: phishlet-hostname
    size_min: 512
    desc: Phishlet hostname configuration
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: phishlet hostname
      section: .text
  - id: phishlet-version
    size_min: 512
    desc: Phishlet version reference
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: PhishletVersion
      section: .text
  - id: lure-functions
    size_min: 512
    desc: Lure management functions
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: (AddLure|GetLure|DeleteLure|GetLureUrl)
      section: .text
  - id: phish-url
    size_min: 512
    desc: Phishing URL generation
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: createPhishUrl
      section: .text
  - id: phish-domain
    size_min: 512
    desc: Phishing domain configuration
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: getPhishDomain
      section: .text
  - id: auth-token-capture
    size_min: 512
    desc: Auth token capture patterns
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: (isAuthToken|authTokens)
      section: .text
  - id: evil-root-ca
    size_min: 512
    desc: Evilginx root CA string
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: Evilginx Super-Evil Root CA
      section: .text
  - id: signature-trust
    size_min: 512
    desc: Evilginx signature trust string
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: Evilginx Signature Trust Co
      section: .text
  - id: proxy-interception
    size_min: 512
    desc: HTTP proxy interception
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: replaceHostWithPhished
      section: .text
  - id: force-post
    size_min: 512
    desc: Force POST interception
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: force_post:.{0,50}(body|url matched)
      section: .text
  - id: educational-disclaimer
    size_min: 512
    desc: Educational purposes disclaimer
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: built for educational purposes only
      section: .text
composite_rules:
  - id: detected-comp
    size_min: 512
    desc: Evilginx2 phishing framework detected
    crit: hostile
    conf: 0.98
    for:
      - elf
      - macho
      - pe
    all:
      - id: well-known/tools/offensive/evilginx::github-ref-dup
      - id: core-package
      - id: phishlet-string
      - id: lure-functions
  - id: detected-by-ca
    size_min: 512
    desc: Evilginx2 detected by Root CA
    crit: hostile
    conf: 0.95
    for:
      - elf
      - macho
      - pe
    all:
      - id: evil-root-ca
      - id: phishlet-string
      - id: lure-functions
      - id: auth-token-capture
  - id: phishing-toolkit-behavior
    size_min: 512
    desc: Phishing toolkit behavioral pattern
    crit: hostile
    conf: 0.9
    attack: T1539
    for:
      - elf
      - macho
      - pe
    all:
      - id: phishlet-string
      - id: lure-functions
      - id: auth-token-capture
      - id: proxy-interception
      - id: phish-url
