defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, so, dylib, dll, shell]
traits:
  - id: sar-hack-name
    size_min: 512
    size_max: 500000000
    desc: "Super Animal Royale game hack name string"
    crit: component
    if:
      type: string
      regex: 'S\.A\.R\. hack v[0-9]+'
      section: .text
  - id: sar-hack-vision
    size_min: 512
    size_max: 500000000
    desc: "Vision hacks (XRAY)"
    crit: component
    if:
      type: string
      substr: "Toggle Vision Hacks"
      section: .text
  - id: sar-hack-source
    size_min: 512
    size_max: 500000000
    desc: "Hack source code paths"
    crit: component
    if:
      type: string
      regex: 'src\\hacks\\[a-z]+\.rs'
      section: .text
composite_rules:
  - id: sar-hack-api
    size_min: 512
    size_max: 500000000
    desc: "Memory injection/read APIs"
    crit: component
    any:
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: objectives/evasion/process/injection/runtime::read-process-memory
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
  - id: sar-hack-tool
    size_min: 512
    size_max: 500000000
    desc: "Super Animal Royale memory modification tool (Game Cheat)"
    crit: suspicious
    conf: 0.95
    all:
      - id: sar-hack-api
    any:
      - id: sar-hack-name
      - id: sar-hack-vision
      - id: sar-hack-source
