defaults:
  platforms:
    - windows
  for:
    - pe
  crit: suspicious
  conf: 0.85
traits:
  - id: breachcore-framework
    size_min: 512
    size_max: 500000000
    desc: BreachCore game cheat framework
    conf: 0.95
    if:
      type: text
      regex: (?i)breach\s*core
      section: .text
  - id: breachcore-useragent
    size_min: 512
    size_max: 500000000
    desc: BreachCore HTTP user agent
    conf: 0.95
    if:
      type: text
      substr: BreachCore/
      section: .text
  - id: breachcore-pdb
    size_min: 512
    size_max: 500000000
    desc: BreachCore PDB debug path
    conf: 0.95
    if:
      type: text
      regex: (?i)\\BreachCore\\
      section: .text
  - id: cs2-external-mutex
    size_min: 512
    size_max: 500000000
    desc: CS2/CSGO external cheat mutex
    conf: 0.85
    if:
      type: text
      regex: (?i)(CS2|CSGO)[_-]?External[_-]?(Unique)?[_-]?Mutex
      section: .text
  - id: rust-external-mutex
    size_min: 512
    size_max: 500000000
    desc: Rust game external cheat mutex
    conf: 0.85
    if:
      type: text
      regex: (?i)Rust[_-]?External[_-]?(Unique)?[_-]?Mutex
      section: .text
composite_rules:
  - id: breachcore-detected
    size_min: 512
    size_max: 500000000
    desc: BreachCore game cheat framework detected
    crit: suspicious
    conf: 0.95
    any:
      - id: breachcore-framework
      - id: breachcore-useragent
      - id: breachcore-pdb
  - id: external-cheat-mutex
    size_min: 512
    size_max: 500000000
    desc: External cheat mutex pattern
    crit: notable
    conf: 0.85
    any:
      - id: cs2-external-mutex
      - id: rust-external-mutex
