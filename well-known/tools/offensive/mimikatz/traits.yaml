defaults:
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: sekurlsa-logonpasswords-lower
    size_min: 512
    size_max: 500000000
    desc: sekurlsa::logonpasswords command (lowercase)
    crit: notable
    conf: 0.98
    platforms:
      - windows
    for:
      - pe
      - dll
      - batch
      - python
      - javascript
      - powershell
    if:
      type: string_value
      substr: sekurlsa::logonpasswords
      section: .text
  - id: sekurlsa-logonpasswords-mixed
    size_min: 512
    size_max: 500000000
    desc: Sekurlsa::LogonPasswords command (mixed case)
    crit: notable
    conf: 0.98
    platforms:
      - windows
    for:
      - pe
      - dll
      - batch
      - python
      - javascript
      - powershell
    if:
      type: string_value
      regex: (?i)sekurlsa::logonpasswords
      section: .text
  - id: mimikatz-error
    size_min: 512
    size_max: 500000000
    desc: ERROR kuhl Mimikatz error signature
    crit: notable
    conf: 0.98
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: string_value
      substr: ERROR kuhl
      section: .text
  - id: mimikatz-process-string
    size_min: 512
    size_max: 500000000
    desc: mimikatz.exe process string
    crit: notable
    conf: 0.95
    platforms:
      - windows
    for:
      - pe
      - dll
      - batch
      - python
      - javascript
      - powershell
    if:
      type: string_value
      substr: mimikatz
      section: .text
  - id: gentilkiwi-author
    size_min: 512
    size_max: 500000000
    desc: Benjamin Delpy (gentilkiwi) author signature
    crit: notable
    conf: 0.9
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: string_value
      regex: gentilkiwi|Benjamin Delpy
      section: .text
composite_rules:
  - id: sekurlsa-logonpasswords
    size_min: 512
    size_max: 500000000
    desc: Sekurlsa logonpasswords command (case variants)
    platforms:
      - windows
    for:
      - pe
      - dll
      - batch
      - python
      - javascript
      - powershell
    any:
      - id: sekurlsa-logonpasswords-lower
      - id: sekurlsa-logonpasswords-mixed
  - id: mimikatz
    size_min: 512
    size_max: 500000000
    desc: Mimikatz credential extraction tool
    crit: suspicious
    conf: 0.99
    attack: T1003.001
    mbc: E1003
    platforms:
      - windows
    for:
      - pe
      - dll
      - batch
      - python
      - javascript
      - powershell
    none:
      - id: metadata/file/text/security-rule::definition
    any:
      - id: sekurlsa-logonpasswords
      - id: mimikatz-error
      - id: mimikatz-process-string
      - id: gentilkiwi-author
