defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.95
traits:
  - id: package-metadata
    desc: Simba AI package metadata
    for: [text, python]
    if:
      type: text
      substr: "Name: simba-ai"
  - id: cli-docstring
    desc: Simba AI CLI docstring
    for: [python]
    if:
      type: text
      substr: "Simba CLI — unified Claude Code plugin"
  - id: benchmark-temporal-codegen
    desc: Simba temporal-codegen benchmark harness
    for: [python]
    if:
      type: text
      substr: "Temporal codegen reader"
  - id: rlm-engine-path
    desc: Simba RLM engine module path
    for: [python]
    if:
      type: path
      substr: simba/rlm/engine.py
  - id: orchestration-agent-schema
    desc: Simba orchestration agent schema
    for: [python]
    if:
      type: path
      substr: simba/orchestration/agents.py
composite_rules:
  - id: simba-ai-package
    desc: Simba AI agent-memory package
    crit: notable
    conf: 0.95
    scope: archive
    any:
      - id: package-metadata
      - id: cli-docstring
      - id: benchmark-temporal-codegen
      - id: rlm-engine-path
      - id: orchestration-agent-schema
    needs: 2
