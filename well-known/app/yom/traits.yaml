# YOM is a documented Unix micro-shell whose optional core hook deliberately
# exposes a local socket for an interactive command loop.
defaults:
  platforms: [unix]
  crit: notable
  conf: 0.99

traits:
  - id: yom-source-marker
    desc: YOM shell source marker
    for: [rust]
    if:
      type: text
      regex: '(?m)^// Copyright \(C\) 2026 The YOM Contributors$'

  - id: yom-core-hook-socket
    desc: YOM core hook socket path
    for: [rust]
    if:
      type: text
      substr: /tmp/yom_core.sock

  - id: yom-package-name
    desc: YOM Cargo package name
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      exact: yom

  - id: yom-repository
    desc: YOM upstream repository identity
    for: [cargo.toml]
    if:
      type: value
      path: package.repository
      exact: https://github.com/G0o53/yom

composite_rules:
  - id: yom-package-identity
    desc: YOM Cargo package identity
    crit: notable
    for: [cargo.toml]
    all:
      - id: yom-package-name
      - id: yom-repository

  - id: yom-core-hook-context
    desc: Documented YOM core hook context
    crit: exception
    for: [rust]
    all:
      - id: yom-source-marker
      - id: yom-core-hook-socket
      - id: objectives/execution/interpreter/eval/dynamic::rust-evaluator-reentry
