defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  - package.json
  crit: component
  conf: 0.95
  size_max: 5000000
traits:
- id: package-name
  desc: HeroUI Pro package name
  for:
  - package.json
  if:
    type: value
    path: name
    exact: heroui-pro
- id: package-description
  desc: HeroUI Pro CLI description
  for:
  - package.json
  if:
    type: value
    path: description
    substr: HeroUI CLI
- id: auth-token-env
  desc: HeroUI auth token env
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: HEROUI_AUTH_TOKEN
- id: cdn-challenge-path
  desc: HeroUI CDN challenge path
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: "^/(ci|cli)/challenge$"
composite_rules:
- id: package-context
  desc: HeroUI Pro package context
  crit: component
  conf: 0.98
  all:
  - id: package-name
  any:
  - id: package-description
- id: licensed-cdn-token-context
  desc: HeroUI licensed CDN token flow
  crit: component
  conf: 0.96
  all:
  - id: auth-token-env
  - id: cdn-challenge-path
