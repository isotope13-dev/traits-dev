defaults:
  platforms: [unix, windows]
  for: [go, rust, python, shell, powershell, javascript, typescript, markdown, json]
  crit: baseline
  conf: 0.98
  size_min: 0

traits:
  - id: openai-codex-source-path
    desc: OpenAI Codex source archive path
    if:
      type: path
      substr: github.com/openai/codex
  - id: openai-codex-module-path
    desc: OpenAI Codex Go module path
    if:
      type: text
      substr: github.com/openai/codex
  - id: openai-codex-cli-name
    desc: OpenAI Codex CLI source marker
    if:
      type: text
      substr: codex-cli

composite_rules:
  - id: openai-codex-source-context
    desc: OpenAI Codex source context
    crit: notable
    conf: 0.98
    any:
      - id: openai-codex-source-path
      - id: openai-codex-module-path
      - id: openai-codex-cli-name
