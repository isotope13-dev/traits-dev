# Godot's native runtime is a legitimate source of broad socket and process
# APIs.  Those APIs are also used by the engine's multiplayer and platform
# integrations, so they are benign context for generic binary backdoor rules.
defaults:
  platforms: [unix]
  for: [elf]
  size_min: 1000000
  size_max: 500000000
  conf: 0.98

traits:
  - id: godot-engine-runtime-version
    desc: Godot Engine native runtime version
    crit: notable
    unless:
      - id: micro-behaviors/communications/proxy/vless::native-vless-websocket-marker
    if:
      type: text
      section: .rodata
      regex: 'Godot Engine v[0-9]+\.[0-9]+\.[^\r\n]{1,32}'

  - id: godot-engine-project-runtime
    desc: Godot Engine exported project runtime
    crit: notable
    unless:
      - id: micro-behaviors/communications/proxy/vless::native-vless-websocket-marker
    if:
      type: text
      section: .rodata
      substr: Running Godot Engine project

composite_rules:
  - id: godot-native-runtime
    desc: Godot native application runtime context
    crit: exception
    all:
      - id: godot-engine-runtime-version
      - id: godot-engine-project-runtime
