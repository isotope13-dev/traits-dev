defaults:
  platforms: [windows, unix]
  crit: component
  conf: 0.95

traits:
  - id: caddy-go-package
    desc: Caddy Go package path
    for: [pe, elf, macho]
    size_min: 1048576
    size_max: 268435456
    if:
      type: text
      section: .rdata
      substr: github.com/caddyserver/caddy

  - id: caddy-release-archive-name
    desc: Caddy release archive name
    for: [zip]
    size_max: 268435456
    if:
      type: value
      path: file.basename
      regex: 'caddyserver-caddy-v[0-9].*caddy_.*\.(zip|tar\.gz)$'
      case_insensitive: true

composite_rules:
  - id: caddy-release-binary
    desc: Caddy web server release binary
    crit: notable
    conf: 0.95
    for: [pe, elf, macho]
    any:
      - id: caddy-go-package
      - id: micro-behaviors/communications/http/server/listener::caddy-keyword

  - id: caddy-release-archive
    desc: Caddy web server release archive
    crit: notable
    conf: 0.95
    for: [zip]
    all:
      - id: caddy-release-archive-name
    any:
      - id: micro-behaviors/communications/http/server/listener::caddy-keyword
