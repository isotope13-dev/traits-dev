defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: matomo-archive-path
    desc: Matomo archive member path
    for: [php, javascript, html, json, source, scripts]
    size_min: 0
    if:
      type: path
      regex: '(?i)(mpl-)?matomo-[0-9]|[\\/]matomo[\\/]'
  - id: matomo-tagmanager-basename
    desc: Matomo tagmanager JS basename
    crit: notable
    for: [javascript]
    size_max: 200000
    if:
      type: basename
      exact: tagmanager.min.js

composite_rules:
  - id: matomo-release-context
    desc: Matomo release source context
    crit: notable
    conf: 0.98
    any:
      - id: matomo-archive-path
      - id: matomo-tagmanager-basename
