defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: YOLO Jail package metadata identity
    if:
      type: value
      path: name
      exact: yolo-jail

  - id: repository
    desc: YOLO Jail upstream repository marker
    if:
      type: text
      substr: github.com/mschulkind-oss/yolo-jail

  - id: python-source-marker
    desc: YOLO Jail Python source marker
    for: [python]
    if:
      type: text
      substr: YOLO_REPO_ROOT
