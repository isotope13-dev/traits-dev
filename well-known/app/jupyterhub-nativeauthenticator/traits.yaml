defaults:
  platforms: [unix]
  for: [python, text]
  crit: notable
  conf: 0.94

traits:
  - id: nativeauthenticator-class
    desc: JupyterHub NativeAuthenticator class
    if:
      type: text
      substr: class NativeAuthenticator(Authenticator)
  - id: jupyterhub-authenticator-import
    desc: JupyterHub authenticator import
    if:
      type: text
      substr: from jupyterhub.auth import Authenticator
  - id: common-password-policy
    desc: NativeAuthenticator password policy
    if:
      type: text
      substr: check_common_password

composite_rules:
  - id: nativeauthenticator-module
    desc: JupyterHub NativeAuthenticator module
    crit: notable
    conf: 0.98
    all:
      - id: nativeauthenticator-class
      - id: jupyterhub-authenticator-import
      - id: common-password-policy
