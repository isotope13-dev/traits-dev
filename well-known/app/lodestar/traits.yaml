defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, package.json, markdown]
  crit: component
  conf: 0.95

traits:
  - id: package-name
    desc: Lodestar package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@leviyuan/lodestar'

  - id: package-description
    desc: Lodestar package description
    for: [package.json]
    if:
      type: value
      path: description
      substr: IM-native frontend for Codex

  - id: lodestar-daemon-bin
    desc: Lodestar daemon bin entry
    for: [package.json]
    if:
      type: value
      path: bin
      regex: 'lodestar-daemon'

  - id: lodestar-config-path
    desc: Lodestar config path
    if:
      type: text
      regex: '(\.config[\\/]lodestar|Lodestar[\\/]config\.toml|LODESTAR_CONFIG)'

  - id: lodestar-feishu-notify-skill
    desc: Lodestar Feishu notify skill
    if:
      type: text
      substr: feishu-notify

composite_rules:
  - id: package-context
    desc: Lodestar package context
    crit: component
    conf: 0.98
    all:
      - id: package-name
    any:
      - id: package-description
      - id: lodestar-daemon-bin

  - id: runtime-context
    desc: Lodestar runtime context
    crit: component
    conf: 0.96
    any:
      - id: package-context
      - id: lodestar-config-path
      - id: lodestar-feishu-notify-skill
