# Qt Creator — the official Qt IDE (qt-project.org). Its remote-device
# deployment toolchain (RemoteLinux plugin, device-shell bridge, terminal shell
# integration) ships genuinely dual-use behavior — SSH authorized_keys
# installation, a base64 shell-command transport, .ssh/key handling — that is
# legitimate developer tooling, not an implant. These markers are distinctive
# Qt Creator identity strings that malware will not carry, and gate those
# dual-use traits via `unless`.
defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.97
  size_max: 1073741824

traits:
- id: plugin-iid
  desc: Qt Creator plugin interface IID
  for: [elf, macho, pe, binaries]
  if:
    type: text
    substr: org.qt-project.Qt.QtCreatorPlugin

- id: build-source-path
  desc: Qt Creator build source-tree path
  for: [elf, macho, pe, binaries]
  if:
    type: text
    substr: /qtcreator/qt-creator/src/

  # Device-shell bridge (CmdBridge) protocol functions — base64-wrapped remote
  # command transport. Distinctive function names appear in the embedded script.
- id: deviceshell-bridge--executeandmark
  desc: Qt Creator device-shell bridge (executeAndMark)
  for: [shell, elf, macho, binaries]
  if:
    type: text
    word: executeAndMark
- id: deviceshell-bridge--readandmark
  desc: Qt Creator device-shell bridge (readAndMark)
  for: [shell, elf, macho, binaries]
  if:
    type: text
    word: readAndMark
composite_rules:
- id: deviceshell-bridge
  desc: Qt Creator device-shell bridge script
  for: [shell, elf, macho, binaries]
  any:
  - id: deviceshell-bridge--executeandmark
  - id: deviceshell-bridge--readandmark
- id: qtcreator-component
  desc: Qt Creator IDE component
  crit: component
  conf: 0.97
  any:
  - id: plugin-iid
  - id: build-source-path
  - id: deviceshell-bridge
