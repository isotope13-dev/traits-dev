defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: craft-author-toolbar-member
    desc: Craft author toolbar member
    for: [javascript]
    if:
      type: path
      substr: craft-author-toolbar-
  - id: utils-js-basename
    desc: Craft author toolbar utils path
    for: [javascript]
    if:
      type: path
      regex: 'craft-author-toolbar.*utils\.js$'

composite_rules:
  - id: craft-author-toolbar-utils
    desc: Craft author toolbar utils
    crit: notable
    conf: 0.98
    all:
      - id: craft-author-toolbar-member
      - id: utils-js-basename
