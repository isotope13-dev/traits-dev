defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.98
  size_min: 1000000
  size_max: 80000000

traits:
  - id: qbittorrent-artifact-path
    desc: qBittorrent installer artifact path
    size_min: 1000
    if:
      type: path
      substr: qbittorrent
  - id: qbittorrent-company-name
    desc: qBittorrent PE company metadata
    if:
      type: value
      path: pe.version.company
      exact: The qBittorrent project
  - id: qbittorrent-product-name
    desc: qBittorrent PE product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: qBittorrent

composite_rules:
  - id: qbittorrent-official-binary
    desc: Official qBittorrent Windows binary
    crit: notable
    conf: 0.99
    any:
      - id: qbittorrent-artifact-path
      - id: qbittorrent-company-name
      - id: qbittorrent-product-name
