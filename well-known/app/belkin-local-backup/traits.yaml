defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.96
  size_min: 4096
  size_max: 10485760

traits:
  - id: belkin-local-backup-path
    desc: Belkin Local Backup path
    if:
      type: text
      exact: Belkin\Local Backup
      section: .rdata

  - id: belkin-local-backup-service
    desc: Belkin Local Backup service
    if:
      type: text
      exact: Belkin Local Backup Service
      section: .rdata

  - id: belkin-backup-scheduler-log
    desc: Belkin backup scheduler log
    if:
      type: text
      exact: Bkup_Scheduler.log
      section: .rdata

  - id: belkin-backup-options-file
    desc: Belkin backup options file
    if:
      type: text
      exact: BackupOptions.win
      section: .rdata

  - id: belkin-backup-status-file
    desc: Belkin backup status file
    if:
      type: text
      exact: LastBkupStatus.win
      section: .rdata

composite_rules:
  - id: belkin-local-backup
    desc: Belkin Local Backup component
    crit: baseline
    conf: 0.99
    all:
      - id: belkin-local-backup-path
    needs: 2
    any:
      - id: belkin-local-backup-service
      - id: belkin-backup-scheduler-log
      - id: belkin-backup-options-file
      - id: belkin-backup-status-file
