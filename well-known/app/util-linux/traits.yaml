defaults:
  platforms: [unix]
  for: [source, scripts, c, shell, kotlin, documents, archives]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: util-linux-source-tree-path
    desc: util-linux source tree path
    if:
      type: path
      regex: 'util-linux-[0-9][^\\/]*'

  - id: util-linux-translation-path
    desc: util-linux translation file
    for: [kotlin, text, documents]
    if:
      type: path
      regex: 'po-man[\\/].*\.po$'

  - id: util-linux-test-script
    desc: util-linux test script
    for: [shell, scripts]
    if:
      type: path
      regex: 'tests[\\/]ts'

composite_rules:
  - id: util-linux-source-tree
    desc: util-linux source tree
    crit: notable
    conf: 0.99
    any:
      - id: util-linux-source-tree-path
      - id: util-linux-translation-path
      - id: util-linux-test-script
