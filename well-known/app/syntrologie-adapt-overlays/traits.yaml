defaults:
  platforms:
  - windows
  - unix
  for:
  - javascript
  - typescript
  - package.json
  crit: component
  conf: 0.96
  size_max: 5000000
traits:
- id: package-name
  desc: Syntrologie adapt overlays package
  for:
  - package.json
  if:
    type: value
    path: name
    exact: "@syntrologie/adapt-overlays"
- id: package-description
  desc: Syntrologie adapt overlays description
  for:
  - package.json
  if:
    type: value
    path: description
    substr: Visual overlays for tooltips, highlights, badges, and pulses
- id: repository-directory
  desc: Syntrologie adapt overlays repository
  for:
  - package.json
  if:
    type: value
    path: repository.directory
    exact: packages/adaptives/adaptive-overlays
- id: runtime-export
  desc: Syntrologie adapt overlays runtime export
  for:
  - package.json
  if:
    type: value
    path: exports./runtime.import
    exact: "./dist/runtime.js"
- id: tour-storage-key
  desc: Syntrologie active tour storage
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: syntro_active_tour
composite_rules:
- id: package-context
  desc: Syntrologie adapt overlays context
  crit: baseline
  conf: 0.99
  all:
  - id: package-name
  any:
  - id: package-description
  - id: repository-directory
  - id: runtime-export
- id: runtime-context
  desc: Syntrologie adapt overlays runtime
  crit: baseline
  conf: 0.97
  any:
  - id: package-context
  - id: tour-storage-key
