defaults:
  platforms: [windows, unix]
  for: [php, javascript, shell, ole]
  crit: baseline
  conf: 0.96
  size_max: 5000000

traits:
  - id: wordpress-plugin-path-core
    desc: Known WordPress plugin package path
    if:
      type: path
      regex: '(?i)(wp-fastest-cache|backuply|worker|secupress)'
  - id: wordpress-plugin-path-more
    desc: Known WordPress plugin package path
    if:
      type: path
      regex: '(?i)(popup-maker|instawp-connect|iwp-client|duplicator)'
  - id: wordpress-plugin-path-extra
    desc: Known WordPress plugin package path
    if:
      type: path
      regex: '(?i)(updraftplus|file-manager-advanced|post-smtp|widget-options)'
  - id: wordpress-plugin-path-commerce
    desc: Known WordPress commerce plugin package path
    if:
      type: path
      regex: '(?i)(crmlytics|e2pdf|easycommerce|weareplanet)'
  - id: wordpress-plugin-path-payments
    desc: Known WordPress payment plugin package path
    if:
      type: path
      regex: '(?i)(verified-crypto-checkout|videomail-for-ninja-forms)'
  - id: wordpress-plugin-path-builder
    desc: Known WordPress builder plugin package path
    if:
      type: path
      regex: '(?i)nexter-extension'
  - id: wordpress-plugin-path-registration
    desc: Known WordPress registration plugin path
    if:
      type: path
      regex: '(?i)custom-registration-form-builder'
  - id: wordpress-plugin-path-ui
    desc: Known WordPress plugin UI package path
    if:
      type: path
      regex: '(?i)(premium-addons-for-elementor|pixelyoursite)'
  - id: wordpress-plugin-path-ssa
    desc: Simply Schedule Appointments plugin path
    if:
      type: path
      regex: '(?i)simply-schedule-appointments'
  - id: wordpress-security-plugin-path
    desc: WordPress security plugin path
    if:
      type: path
      regex: '(?i)secupress'

composite_rules:
  - id: known-wordpress-plugin
    desc: Known benign WordPress plugin package
    crit: notable
    any:
      - id: wordpress-plugin-path-core
      - id: wordpress-plugin-path-more
      - id: wordpress-plugin-path-extra
      - id: wordpress-plugin-path-commerce
      - id: wordpress-plugin-path-payments
      - id: wordpress-plugin-path-builder
      - id: wordpress-plugin-path-registration
      - id: wordpress-plugin-path-ssa
      - id: wordpress-plugin-path-ui
  - id: wordpress-maintenance-plugin
    desc: Known WordPress backup, migration, or security plugin
    crit: notable
    any:
      - id: wordpress-plugin-path-core
      - id: wordpress-plugin-path-more
      - id: wordpress-plugin-path-extra
      - id: wordpress-plugin-path-commerce
      - id: wordpress-plugin-path-payments
      - id: wordpress-plugin-path-builder
  - id: wordpress-security-plugin
    desc: Known WordPress security plugin
    crit: notable
    all:
      - id: wordpress-security-plugin-path
      - id: wordpress-plugin-path-core
