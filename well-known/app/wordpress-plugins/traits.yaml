defaults:
  platforms: [windows, unix]
  for: [php, javascript, shell, ole]
  crit: baseline
  conf: 0.96
  size_max: 5000000

traits:
  - id: easy-social-feed-instagram-style-prefix
    desc: Easy Social Feed Instagram CSS prefix
    crit: notable
    conf: 0.99
    for: [text]
    if:
      type: text
      substr: '.esf-insta-'

  # Easy Social Feed's Facebook feed uses the `.esf-fb-` class namespace, the
  # sibling of `.esf-insta-` above (esf = Easy Social Feed). This was previously
  # mislabeled "Easy Facebook Likebox"; that is a DIFFERENT plugin whose real
  # prefix is `.efbl-`, detected by easy-facebook-likebox-style-prefix below.
  - id: easy-social-feed-facebook-style-prefix
    desc: Easy Social Feed Facebook CSS prefix
    crit: notable
    conf: 0.99
    for: [text]
    if:
      type: text
      substr: '.esf-fb-'

  # Easy Facebook Likebox (efbl = Easy FaceBook Likebox) namespaces every
  # frontend class with `.efbl-` (e.g. .efbl-container, .efbl-post). Distinct
  # from the Easy Social Feed family above.
  - id: easy-facebook-likebox-style-prefix
    desc: Easy Facebook Likebox CSS prefix
    crit: notable
    conf: 0.99
    for: [text]
    if:
      type: text
      substr: '.efbl-'

  - id: manage-plugin-path
    desc: Manage WordPress plugin package path
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: path
      regex: '(?i)(^|[\\/])manage([\\/]|$)'

  - id: manage-plugin-header
    desc: Manage WordPress plugin header
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: text
      regex: '(?im)^\s*\*\s*Plugin Name:\s*Manage\s*$'

  - id: manage-system-user-marker
    desc: Manage system-user marker
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: text
      regex: '(?i)_manage_system_user|manage-system-user'

  - id: wordpress-plugin-path-ai-engine
    desc: AI Engine WordPress plugin package path
    if:
      type: path
      regex: '(?i)(^|[\\/])ai-engine([\\/]|$)'
  - id: wordpress-plugin-path-core
    desc: Known WordPress plugin package path
    if:
      type: path
      regex: '(?i)(wp-fastest-cache|backuply|secupress|wp-all-import)'
  - id: wordpress-plugin-path-seraphinite-accelerator
    desc: Seraphinite Accelerator plugin path
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: path
      regex: '(?i)(^|[\\/])seraphinite-accelerator([\\/]|$)'
  - id: wordpress-plugin-path-coresocial
    desc: coreSocial WordPress plugin package path
    crit: notable
    conf: 0.99
    for: [php, javascript]
    if:
      type: path
      regex: '(?i)(^|[\\/])coresocial([\\/]|$)'
  - id: wordpress-plugin-path-w3-total-cache
    desc: W3 Total Cache WordPress plugin package path
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: path
      regex: '(?i)(^|[\\/])w3-total-cache([\\/]|$)'
  - id: wordpress-plugin-path-cloudflare-page-cache
    desc: Cloudflare Page Cache plugin path
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: path
      regex: '(?i)(^|[\\/])wp-cloudflare-page-cache([\\/]|$)'
  - id: wordpress-plugin-path-fast-velocity-minify
    desc: Fast Velocity Minify plugin path
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: path
      regex: '(?i)(^|[\\/])fast-velocity-minify([\\/]|$)'
  - id: elementor-plugin
    desc: Elementor Website Builder plugin package path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(?i)(^|[\\/])elementor([\\/]|$)'
  - id: wordpress-plugin-path-worker
    desc: ManageWP Worker plugin directory path
    for: [php]
    if:
      type: path
      regex: '(?i)(^|[\\/])worker([\\/]|$)'
  - id: wordpress-plugin-path-more
    desc: Known WordPress plugin package path
    if:
      type: path
      regex: '(?i)(popup-maker|instawp-connect|iwp-client|duplicator)'
  - id: wordpress-plugin-path-seo
    desc: Known WordPress SEO plugin path
    if:
      type: path
      regex: '(?i)squirrly-seo'
  - id: wordpress-plugin-path-extra
    desc: Known WordPress plugin package path
    if:
      type: path
      regex: '(?i)(updraftplus|file-manager-advanced|post-smtp|widget-options)'
  - id: wordpress-plugin-path-jetpack
    desc: Jetpack WordPress plugin package path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(?i)(^|[\\/])jetpack([\\/]|$)'
  - id: wordpress-plugin-path-stats4wp
    desc: Stats4WP plugin path
    crit: notable
    if:
      type: path
      regex: '(?i)(^|[\\/])stats4wp'
  - id: wordpress-plugin-path-fast-backups
    desc: Fast Backups WordPress plugin package path
    if:
      type: path
      regex: '(?i)(^|[\\/])fast-backups([\\/]|$)'
  - id: wordpress-plugin-path-downloads
    desc: Known WordPress download plugin path
    if:
      type: path
      regex: '(?i)(download-monitor|download-manager)'
  - id: wordpress-plugin-path-commerce
    desc: Known WordPress commerce plugin package path
    if:
      type: path
      regex: '(?i)(crmlytics|e2pdf|easycommerce|weareplanet)'
  - id: wordpress-plugin-path-multiparcels
    desc: MultiParcels WooCommerce plugin path
    crit: notable
    conf: 0.99
    for: [php, javascript, data]
    if:
      type: path
      regex: '(?i)(^|[\\/])multiparcels-shipping-for-woocommerce([\\/]|$)'
  - id: wordpress-plugin-path-payments
    desc: Known WordPress payment plugin package path
    if:
      type: path
      regex: '(?i)(verified-crypto-checkout|videomail-for-ninja-forms)'
  - id: wordpress-plugin-path-rabo-omnikassa
    desc: Rabo Omnikassa WordPress payment plugin path
    crit: notable
    if:
      type: path
      regex: '(?i)(^|[\\/])woo-rabo-omnikassa([\\/]|$)'
  - id: wordpress-plugin-path-woo-razorpay
    desc: WooCommerce Razorpay plugin package path
    crit: notable
    if:
      type: path
      regex: '(?i)(^|[\\/])woo-razorpay([\\/]|$)'
  - id: woo-razorpay-test-bootstrap
    desc: WooCommerce Razorpay PHPUnit bootstrap path
    crit: notable
    for: [php]
    if:
      type: path
      regex: '(?i)woo-razorpay.{0,160}bootstrap\.php$'
  - id: wordpress-plugin-path-builder
    desc: Known WordPress builder plugin package path
    if:
      type: path
      regex: '(?i)nexter-extension'
  - id: wordpress-plugin-path-registration
    desc: Known WordPress registration plugin path
    if:
      type: path
      regex: '(?i)custom-registration-form-builder'
  - id: wordpress-plugin-path-ui
    desc: Known WordPress plugin UI package path
    if:
      type: path
      regex: '(?i)(premium-addons-for-elementor|pixelyoursite)'
  - id: wordpress-plugin-path-tenweb
    desc: TenWeb Speed Optimizer plugin path
    if:
      type: path
      regex: '(?i)tenweb-speed-optimizer'
  - id: wordpress-plugin-path-letsencrypt-ssl
    desc: WP Let's Encrypt plugin package path
    if:
      type: path
      regex: '(?i)(^|[\\/])wp-letsencrypt-ssl([\\/]|$)'
  - id: wordpress-plugin-path-ninjafirewall
    desc: NinjaFirewall WordPress plugin path
    if:
      type: path
      regex: '(?i)(^|[\\/])ninjafirewall([\\/]|$)'
  - id: wordpress-plugin-path-ssa
    desc: Simply Schedule Appointments plugin path
    if:
      type: path
      regex: '(?i)simply-schedule-appointments'
  - id: wordpress-plugin-path-calculated-fields-form
    desc: Calculated Fields Form WordPress plugin path
    if:
      type: path
      regex: '(?i)(^|[\\/])calculated-fields-form([\\/]|$)'
  - id: wordpress-plugin-path-reviews-feed
    desc: Smash Balloon Reviews Feed WordPress plugin path
    if:
      type: path
      regex: '(?i)(^|[\\/])reviews-feed([\\/]|$)'
  - id: wordpress-plugin-path-polldaddy
    desc: Crowdsignal / Polldaddy WordPress plugin path
    if:
      type: path
      regex: '(?i)(^|[\\/])polldaddy([\\/]|$)'
  - id: wordpress-plugin-path-email-subscribers
    desc: Email Subscribers WordPress plugin package path
    crit: notable
    conf: 0.99
    for: [php, javascript]
    if:
      type: path
      regex: '(?i)(^|[\\/])email-subscribers([\\/]|$)'
  - id: wordpress-security-plugin-path
    desc: WordPress security plugin path
    if:
      type: path
      regex: '(?i)secupress'

  - id: bitfire-plugin-path
    desc: BitFire WordPress firewall package path
    crit: notable
    conf: 0.99
    for: [php, javascript, data]
    if:
      type: path
      regex: '(?i)(^|[\\/])bitfire([\\/]|$)'

composite_rules:
  - id: manage-system-user-context
    desc: Manage system-user implementation context
    crit: notable
    conf: 0.99
    for: [php]
    all:
      - id: manage-plugin-path
      - id: manage-system-user-marker

  - id: manage-plugin-context
    desc: Manage WordPress plugin package identity
    crit: notable
    conf: 0.99
    for: [php]
    all:
      - id: manage-plugin-path
      - id: manage-plugin-header
    scope: archive

  - id: woo-razorpay-test-context
    desc: WooCommerce Razorpay PHPUnit test context
    crit: exception
    conf: 0.99
    for: [php]
    scope: archive
    all:
      - id: wordpress-plugin-path-woo-razorpay
      - id: woo-razorpay-test-bootstrap

  - id: known-wordpress-plugin
    desc: Known benign WordPress plugin package
    crit: notable
    any:
      - id: wordpress-plugin-path-ai-engine
      - id: wordpress-plugin-path-core
      - id: wordpress-plugin-path-w3-total-cache
      - id: wordpress-plugin-path-cloudflare-page-cache
      - id: wordpress-plugin-path-fast-velocity-minify
      - id: wordpress-plugin-path-worker
      - id: wordpress-plugin-path-more
      - id: wordpress-plugin-path-seo
      - id: wordpress-plugin-path-extra
      - id: wordpress-plugin-path-jetpack
      - id: wordpress-plugin-path-fast-backups
      - id: wordpress-plugin-path-downloads
      - id: wordpress-plugin-path-commerce
      - id: wordpress-plugin-path-payments
      - id: wordpress-plugin-path-rabo-omnikassa
      - id: wordpress-plugin-path-woo-razorpay
      - id: wordpress-plugin-path-builder
      - id: wordpress-plugin-path-registration
      - id: wordpress-plugin-path-ssa
      - id: wordpress-plugin-path-ui
      - id: wordpress-plugin-path-tenweb
      - id: wordpress-plugin-path-letsencrypt-ssl
      - id: wordpress-plugin-path-ninjafirewall
      - id: wordpress-plugin-path-calculated-fields-form
      - id: wordpress-plugin-path-reviews-feed
      - id: wordpress-plugin-path-polldaddy
  - id: wordpress-maintenance-plugin
    desc: Known WordPress backup, migration, or security plugin
    crit: notable
    any:
      - id: wordpress-plugin-path-core
      - id: wordpress-plugin-path-worker
      - id: wordpress-plugin-path-more
      - id: wordpress-plugin-path-seo
      - id: wordpress-plugin-path-extra
      - id: wordpress-plugin-path-fast-backups
      - id: wordpress-plugin-path-downloads
      - id: wordpress-plugin-path-commerce
      - id: wordpress-plugin-path-payments
      - id: wordpress-plugin-path-builder
  - id: wordpress-security-plugin
    desc: Known WordPress security plugin
    crit: notable
    all:
      - id: wordpress-security-plugin-path
      - id: wordpress-plugin-path-core
