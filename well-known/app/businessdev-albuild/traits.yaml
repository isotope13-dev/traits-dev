defaults:
  platforms: [windows, unix]
  for: [powershell, nupkg]
  crit: baseline
  conf: 0.97

traits:
  - id: powershell-module-path
    desc: businessdev ALbuild module path
    crit: baseline
    if:
      type: path
      regex: '(^|[\\/])businessdev\.ALbuild(\.|[\\/])'
  - id: package-identity
    desc: businessdev ALbuild package identity
    crit: baseline
    if:
      type: text
      substr: businessdev.ALbuild

composite_rules:
  - id: powershell-module
    desc: businessdev ALbuild PowerShell module
    crit: notable
    conf: 0.98
    any:
      - id: powershell-module-path
      - id: package-identity
