defaults:
  platforms: [unix]
  for: [elf]
  size_min: 5000000
  size_max: 700000000

traits:
  - id: opentofu-core-module
    desc: OpenTofu core Go module
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: go.main_module.path
      exact: github.com/opentofu/opentofu

  - id: opentofu-core-elf-module
    desc: OpenTofu core ELF Go module
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: elf.go.module.path
      exact: github.com/opentofu/opentofu

  - id: opentofu-core-command
    desc: OpenTofu tofu command path
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: elf.go.path
      exact: github.com/opentofu/opentofu/cmd/tofu

composite_rules:
  - id: opentofu-core-binary
    desc: OpenTofu core provider binary
    crit: notable
    conf: 0.99
    any:
      - id: opentofu-core-module
      - id: opentofu-core-elf-module
      - id: opentofu-core-command
    all:
      - id: micro-behaviors/communications/grpc::terraform-reattach-providers-env
