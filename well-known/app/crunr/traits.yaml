defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, text]
  crit: component
  conf: 0.95

traits:
  - id: crunr-package-metadata
    desc: crunr package metadata
    for: [pkginfo]
    if:
      type: text
      regex: '^Name:\s*crunr\s*$'

  - id: crunr-key-path
    desc: crunr SSH key path
    for: [python]
    if:
      type: text
      regex: '\.crunr.{0,20}crunr-key\.pem'

  - id: crunr-workspace-path
    desc: crunr remote workspace path
    for: [python]
    if:
      type: string_literal
      substr: crunr-workspace

  - id: crunr-wrapper-marker
    desc: crunr remote wrapper marker
    for: [python]
    if:
      type: string_literal
      substr: crunr autonomous job wrapper

  - id: crunr-s3-writer-role
    desc: crunr S3 writer role
    for: [python, pkginfo]
    if:
      type: text
      substr: crunr-s3-writer

  - id: crunr-managedby-tag
    desc: crunr ManagedBy tag
    for: [python]
    if:
      type: text
      regex: 'ManagedBy.{0,80}crunr'

  - id: crunr-demo-marker
    desc: crunr demo script marker
    for: [python]
    if:
      type: text
      regex: 'crunr demo|crunr Demo'

composite_rules:
  - id: crunr-remote-runner-context
    desc: crunr remote runner context
    crit: component
    conf: 0.95
    any:
      - id: crunr-workspace-path
      - id: crunr-wrapper-marker
      - id: crunr-managedby-tag
