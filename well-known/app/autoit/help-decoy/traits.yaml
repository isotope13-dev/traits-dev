defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: help-media-center-decoy
    desc: AutoIt help/media center bundle token
    crit: component
    conf: 0.995
    size_min: 1500000
    size_max: 2500000
    if:
      type: text
      regex: ehExtHost32\.exe|AutoIt3 Help|AutoIt3Help
      section: rdata
