defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: help-clsid-path
    desc: AutoIt help CLSID path
    crit: component
    conf: 0.99
    size_min: 1500000
    size_max: 2500000
    if:
      type: text
      exact: CLSID\{ADB880A6-D8FF-11CF-9377-00AA003B7A11}\InprocServer32
  - id: help-media-center-decoy
    desc: AutoIt help/media center bundle token
    crit: component
    conf: 0.995
    size_min: 1500000
    size_max: 2500000
    if:
      type: text
      regex: ehExtHost32\.exe|AutoIt3 Help|AutoIt3Help
