defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, elf, macho, pe]
  crit: component
  conf: 0.95
  size_min: 4096
  size_max: 268435456

traits:
  - id: package-name
    desc: Codeplane platform package name
    for: [package.json]
    size_min: 64
    size_max: 65536
    if:
      type: value
      path: name
      regex: '^codeplane(-linux|-darwin|-windows)?'

  - id: repository-url
    desc: Codeplane repository URL
    for: [package.json]
    size_min: 64
    size_max: 65536
    if:
      type: text
      substr: github.com/devinoldenburg/codeplane

  - id: docs-url
    desc: Codeplane documentation URL
    for: [javascript, typescript, elf, macho, pe]
    if:
      type: text
      substr: https://codeplane.cc/docs

  - id: auth-service
    desc: Codeplane auth service identifier
    for: [javascript, typescript, elf, macho, pe]
    if:
      type: text
      substr: '@codeplane/ExperimentalHttpApiAuthorization'

  - id: config-path
    desc: Codeplane config path
    for: [javascript, typescript, elf, macho, pe]
    if:
      type: text
      regex: '(\.codeplane|Codeplane[/\\]|[/\\]codeplane[/\\])'

composite_rules:
  - id: package-context
    desc: Codeplane package context
    crit: component
    conf: 0.98
    all:
      - id: package-name
    any:
      - id: repository-url

  - id: runtime-context
    desc: Codeplane runtime context
    crit: component
    conf: 0.97
    any:
      - id: package-context
      - id: docs-url
      - id: auth-service
      - id: config-path
