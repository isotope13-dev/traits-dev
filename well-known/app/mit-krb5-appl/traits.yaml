defaults:
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.99
  size_min: 512
  size_max: 5000000

traits:
  - id: kerberos-ftp-daemon-basename
    desc: MIT Kerberos FTP daemon basename
    conf: 1.0
    if:
      type: basename
      exact: kftpd
  - id: kerberos-gssapi-ftp-marker
    desc: Kerberos GSSAPI FTP server marker
    if:
      type: text
      section: .rodata
      regex: '(?i)(GSSAPI Authentication succeeded|FTP server \(%s\) ready\.)'
  - id: kerberos-ftp-login-marker
    desc: Kerberos FTP login handling marker
    if:
      type: text
      section: .rodata
      regex: '(?i)FTP LOGIN (FROM|REFUSED FROM)'

composite_rules:
  - id: kerberos-ftp-daemon
    desc: MIT Kerberos FTP daemon binary
    crit: notable
    conf: 1.0
    all:
      - id: kerberos-ftp-daemon-basename
      - id: kerberos-gssapi-ftp-marker
      - id: kerberos-ftp-login-marker
