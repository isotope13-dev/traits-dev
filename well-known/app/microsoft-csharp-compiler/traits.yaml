defaults:
  size_max: 15728640
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

traits:
  - id: visual-csharp-compiler-string
    desc: Visual C# compiler string
    crit: component
    conf: 0.98
    if:
      type: hex
      section: .text
      pattern: "56 00 69 00 73 00 75 00 61 00 6c 00 20 00 43 00 23 00 20 00 32 00 30 00 30 00 38 00 20 00 43 00 6f 00 6d 00 70 00 69 00 6c 00 65 00 72 00"

  - id: cscompui-original-filename
    desc: C# compiler UI original filename
    crit: component
    conf: 0.98
    if:
      type: hex
      section: .text
      pattern: "63 00 73 00 63 00 6f 00 6d 00 70 00 75 00 69 00 2e 00 64 00 6c 00 6c 00"

  - id: microsoft-csharp-compiler-thumbprint
    desc: Microsoft C# compiler signer thumbprint
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.signatures[0].thumbprint_sha256
      regex: '^37a8a01d0cf930dca58e725400ad06dd550970b92f49b0c3a15b321b4e4097da$'

composite_rules:
  - id: microsoft-csharp-compiler-bundle
    desc: Microsoft Visual C# compiler bundle
    crit: notable
    conf: 0.99
    all:
      - id: metadata/signed/platform::microsoft
    any:
      - id: visual-csharp-compiler-string
      - id: cscompui-original-filename
      - id: microsoft-csharp-compiler-thumbprint
