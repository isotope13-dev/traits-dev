defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: actions-batch-archive-member
    desc: actions-batch archive member
    for: [shell]
    if:
      type: path
      substr: actions-batch-
  - id: youtubedl-example-basename
    desc: youtubedl.sh basename
    for: [shell]
    if:
      type: basename
      exact: youtubedl.sh

composite_rules:
  - id: youtubedl-example-script
    desc: actions-batch youtubedl example
    crit: baseline
    conf: 0.98
    all:
      - id: actions-batch-archive-member
      - id: youtubedl-example-basename
