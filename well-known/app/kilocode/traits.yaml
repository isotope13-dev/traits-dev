defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript, package.json, elf, macho]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 150000000

traits:
  - id: kilo-code-package
    desc: Kilo Code package marker
    for: [package.json]
    if:
      type: value
      path: name
      exact: kilo-code
  - id: kilo-code-bundle-marker
    desc: Kilo Code bundle marker
    for: [javascript, typescript]
    if:
      type: text
      substr: Kilo Code
  - id: kiloclaw-bundle-marker
    desc: KiloClaw bundle marker
    for: [javascript, typescript]
    if:
      type: text
      substr: kiloclaw
  - id: kilo-theme-marker
    desc: Kilo theme bundle marker
    for: [javascript, typescript]
    if:
      type: text
      substr: 'theme:"Kilo"'
  - id: kilo-code-js-bundle
    desc: Kilo Code VSCode bundle
    for: [javascript, typescript]
    if:
      type: text
      regex: 'Kilo Code|kiloclaw|theme:"Kilo"'
  - id: kilo-cli-config-marker
    desc: Kilo CLI configuration marker
    for: [elf, macho]
    if:
      type: text
      section: .bun
      substr: Kilo CLI Configuration Reference
  - id: kilo-gateway-package-marker
    desc: Kilo gateway package marker
    for: [elf, macho]
    if:
      type: text
      section: .bun
      substr: '@kilocode/kilo-gateway'
  - id: kilo-cli-binary-name
    desc: Kilo CLI binary name
    for: [elf, macho]
    if:
      type: basename
      exact: kilo

composite_rules:
  - id: kilo-code-identity
    desc: Kilo Code AI coding tool identity
    crit: notable
    conf: 0.98
    any:
      - id: kilo-code-package
      - id: kilo-cli-config-marker
      - id: kilo-gateway-package-marker
      - id: kilo-code-js-bundle
      - id: kilo-code-bundle-marker
      - id: kiloclaw-bundle-marker
      - id: kilo-theme-marker
  - id: kilo-code-native-runtime
    desc: Kilo Code packaged native runtime
    for: [elf, macho]
    crit: baseline
    conf: 0.98
    all:
      - id: kilo-cli-binary-name
    any:
      - id: metadata/binary/section/name::bun-section-name
      - id: metadata/binary/section/name::bun-macho-section-name
