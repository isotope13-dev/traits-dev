defaults:
  platforms: [unix, windows]
  for: [shell, batch, powershell, vbs, kotlin, tar]
  crit: notable
  conf: 0.99

traits:
  - id: source-file-marker
    desc: CFEngine source file marker
    crit: notable
    if:
      type: text
      substr: CFEngine

  - id: masterfiles-archive
    desc: CFEngine masterfiles archive
    crit: notable
    for: [tar]
    if:
      type: basename
      regex: '^cfengine-masterfiles-[0-9]'
