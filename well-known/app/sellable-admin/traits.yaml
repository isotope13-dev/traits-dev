defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Sellable Admin installer package identity
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@sellable/admin-install'

  - id: package-member-context
    desc: Sellable Admin installer package member
    for: [javascript, typescript, python, shell]
    if:
      type: value
      path: package.json::name
      exact: '@sellable/admin-install'
