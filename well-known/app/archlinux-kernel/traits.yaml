defaults:
  platforms: [linux]
  for: [tar, archives, shell, text]
  crit: component
  conf: 0.96

traits:
  - id: lts-versioned-pkgbase-template
    desc: Linux LTS versioned pkgbase template
    if:
      type: text
      substr: 'pkgbase="${_pkgname}-versioned-bin"'

  - id: lts-versioned-pkgdesc
    desc: Linux LTS versioned package desc
    if:
      type: text
      substr: 'repackaged with a unique package name'

  - id: archlinux-archive-kernel-sources
    desc: Arch archive kernel package sources
    if:
      type: text
      substr: 'https://archive.archlinux.org/packages/.all/${_kernpkg}'

  - id: archlinux-archive-headers-sources
    desc: Arch archive headers package source
    if:
      type: text
      substr: 'https://archive.archlinux.org/packages/.all/${_headerspkg}'

  - id: archlinux-archive-docs-sources
    desc: Arch archive docs package source
    if:
      type: text
      substr: 'https://archive.archlinux.org/packages/.all/${_docspkg}'

  - id: versioned-lts-update-helper
    desc: Arch Linux LTS update helper path
    crit: notable
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])linux-lts-versioned-bin[\\/]update\.py$'

composite_rules:
  - id: versioned-lts-kernel-repackage-pkgbuild
    desc: Arch Linux LTS versioned PKGBUILD
    crit: notable
    conf: 0.97
    all:
      - id: lts-versioned-pkgbase-template
      - id: lts-versioned-pkgdesc
      - id: archlinux-archive-kernel-sources
      - id: archlinux-archive-headers-sources
      - id: archlinux-archive-docs-sources
