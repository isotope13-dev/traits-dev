defaults:
  platforms: [unix, windows]
  for: [shell, package.json]
  crit: notable
  conf: 0.96

traits:
  - id: esplora-source-tree
    desc: Blockstream Esplora source-tree context
    if:
      type: text
      regex: '(?i)Blockstream/esplora|/srv/explorer/source'
  - id: blockstream-branding
    desc: Blockstream product branding context
    for: [javascript]
    if:
      type: text
      substr: 'Blockstream App Logo'
