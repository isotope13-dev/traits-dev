defaults:
  platforms:
  - macos
  for:
  - macho
  - python
  - pkginfo
  crit: baseline
  conf: 0.96
  size_max: 5000000
traits:
- id: native-extension-init
  desc: Blockstream Green GDK Python init export
  for:
  - macho
  size_min: 10000
  size_max: 500000000
  if:
    type: export
    exact: PyInit__green_gdk
- id: native-extension-path
  desc: Blockstream Green GDK source path
  for:
  - macho
  size_min: 10000
  size_max: 500000000
  if:
    type: text
    substr: blockstream/green/gdk
    section: __cstring
- id: rust-module-source-path
  desc: Blockstream Green GDK Rust source path
  for:
  - macho
  size_min: 10000
  size_max: 500000000
  if:
    type: text
    substr: gdk_rust/src/lib.rs
    section: __cstring
- id: rust-registry-source-path
  desc: Blockstream Green GDK registry source path
  for:
  - macho
  size_min: 10000
  size_max: 500000000
  if:
    type: text
    substr: gdk_registry/src/cache.rs
    section: __cstring
- id: pkg-name
  desc: Blockstream Green GDK package name
  for:
  - pkginfo
  if:
    type: text
    substr: 'Name: green_gdk'
- id: pkg-summary
  desc: Blockstream Green GDK package summary
  for:
  - pkginfo
  if:
    type: text
    substr: 'Summary: Blockstream Green Development Kit'
composite_rules:
- id: native-extension
  desc: Blockstream Green GDK native extension
  for:
  - macho
  all:
  - id: native-extension-init
  - id: native-extension-path
- id: rust-module
  desc: Blockstream Green GDK Rust module
  for:
  - macho
  all:
  - id: rust-module-source-path
  - id: rust-registry-source-path
- id: pkg-metadata
  desc: Blockstream Green GDK package metadata
  for:
  - pkginfo
  all:
  - id: pkg-name
  - id: pkg-summary
