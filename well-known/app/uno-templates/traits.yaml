defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.95
  size_min: 1
  size_max: 200000000

traits:
  - id: uno-template-package
    desc: Uno Templates package
    for: [nupkg]
    if:
      type: value
      path: nupkg.title
      exact: Uno.Templates
  - id: windows-sdk-iso-installer
    desc: Windows SDK ISO installer template
    for: [powershell]
    if:
      type: path
      substr: Install-WindowsSdkISO.cips

composite_rules:
  - id: uno-templates-context
    desc: Uno templates context
    crit: notable
    conf: 0.95
    any:
      - id: uno-template-package
      - id: windows-sdk-iso-installer
