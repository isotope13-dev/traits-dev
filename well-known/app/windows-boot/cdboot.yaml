defaults:
  size_max: 4194304
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.97

traits:
  - id: windows-os-product
    desc: Windows OS product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: Microsoft® Windows® Operating System

  - id: cd-bootstrap-description
    desc: CD bootstrap file description
    if:
      type: value
      path: pe.version.description
      exact: CD bootstrap application

composite_rules:
  - id: microsoft-cd-bootstrap-application
    desc: Microsoft CD bootstrap application
    crit: notable
    conf: 0.99
    all:
      - id: metadata/signed/leaf::microsoft-corporation
      - id: windows-os-product
      - id: cd-bootstrap-description
