# Official Baidu Comate VS Code extension context.  The extension legitimately
# performs terminal, file, environment, network, and host-diagnostics work as
# part of its coding-assistant workflow.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, json, package.json, vsix-manifest, markdown, python, pe, dll]
  crit: baseline
  conf: 0.98
  size_max: 524288000

traits:
  - id: baidu-comate-marker
    desc: Baidu Comate product marker
    crit: notable
    if:
      type: text
      regex: '(?i)BaiduComate|comate\.baidu\.com|文心快码'
  - id: baidu-comate-publisher
    desc: Baidu Comate extension publisher
    crit: notable
    for: [package.json, vsix-manifest, json]
    if:
      type: value
      path: publisher
      exact: BaiduComate
  - id: baidu-comate-path
    desc: Baidu Comate package path
    crit: notable
    if:
      type: path
      regex: '(?i)(@baidu[\\/]comate|comate-engine|[\\/]BaiduComate\.comate-)'
  - id: baidu-comate-archive-name
    desc: Baidu Comate VSIX archive name
    crit: notable
    for: [archives]
    if:
      type: path
      regex: '(?i)(^|[\\/])BaiduComate\.comate-[^\\/]+\.vsix$'

composite_rules:
  - id: baidu-comate
    desc: Baidu Comate coding-assistant package
    crit: notable
    any:
      - id: baidu-comate-marker
      - id: baidu-comate-publisher
      - id: baidu-comate-path
      - id: baidu-comate-archive-name
