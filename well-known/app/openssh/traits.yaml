defaults:
  platforms: [linux]
  for: [elf, shell, python, systemd_service]
  crit: baseline
  conf: 0.96
  size_max: 1073741824

traits:
  - id: package-context
    desc: OpenSSH package or server artifact context
    if:
      type: text
      regex: 'openssh-server|/usr/share/openssh/sshd_config|OpenBSD "secure shell"|OpenSSH[_ ]'

  - id: sshd-service-dropin
    desc: OpenSSH socket systemd drop-in path
    if:
      type: text
      regex: '/etc/systemd/system/ssh\.socket\.d/[A-Za-z0-9_.-]+\.conf'

composite_rules:
  - id: openssh-package
    desc: OpenSSH package context
    crit: notable
    conf: 0.98
    any:
      - id: package-context
      - id: sshd-service-dropin
