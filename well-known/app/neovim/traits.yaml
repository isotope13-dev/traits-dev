defaults:
  platforms: [unix, windows]
  for: [lua, text, zip]
  crit: notable
  conf: 0.97
  size_max: 536870912

traits:
  - id: runtime-tree
    desc: Neovim runtime tree
    if:
      type: path
      regex: 'nvim[\\/]runtime'

  - id: windows-runtime-archive
    desc: Neovim Windows runtime archive
    if:
      type: path
      basename: true
      regex: '^nvim-win-[^\\/]*\.zip$'

composite_rules:
  - id: runtime-code
    desc: Neovim runtime code
    crit: notable
    conf: 0.98
    any:
      - id: runtime-tree
      - id: windows-runtime-archive
