defaults:
  platforms: [linux, macos, windows]
  for: [binaries, elf, macho, pe, deb]
  crit: baseline
  conf: 0.95
  size_max: 1073741824

traits:
  - id: package-name
    desc: hopenpgp-tools package marker
    if:
      type: basename
      substr: hopenpgp-tools

  - id: command-name
    desc: hopenpgp-tools command name
    if:
      type: basename
      regex: '[\\/]h(op|ot|kt|okey)$'

composite_rules:
  - id: release-path
    desc: hopenpgp-tools release path
    crit: baseline
    any:
      - id: well-known/app/hopenpgp-tools
