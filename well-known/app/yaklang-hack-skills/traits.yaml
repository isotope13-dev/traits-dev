defaults:
  platforms: [unix, windows]
  for: [markdown, javascript, json]
  crit: component
  conf: 0.9
  size_max: 5000000

traits:
  - id: yaklang-hack-skills-repo
    desc: yaklang/hack-skills repository marker
    if:
      type: text
      regex: '(?i)\byaklang/hack-skills\b'
  - id: hack-skills-catalog-site
    desc: HackSkills catalog site
    if:
      type: text
      regex: '(?i)\bskills\.hackbenchmark\.com\b'
  - id: hack-skills-oss-cdn
    desc: HackSkills OSS/CDN distribution host
    if:
      type: text
      regex: '(?i)https?://(oss-qn|aliyun-oss)\.yaklang\.com/hack-skills/'

composite_rules:
  - id: yaklang-hack-skills-docs
    desc: Official yaklang HackSkills documentation
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: yaklang-hack-skills-repo
      - id: hack-skills-catalog-site
      - id: hack-skills-oss-cdn
