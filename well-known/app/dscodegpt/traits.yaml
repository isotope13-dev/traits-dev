defaults:
  platforms: [windows, unix]
  for: [zip, json]
  crit: notable
  conf: 0.98
traits:
  - id: archive-name
    desc: dscodegpt VS Code extension archive
    if:
      type: value
      path: file.stem
      regex: '(?i)dscodegpt'
  - id: package-name
    desc: dscodegpt package name
    for: [json]
    if:
      type: value
      path: name
      exact: dscodegpt
composite_rules:
  - id: extension-context
    desc: dscodegpt VS Code extension context
    scope: archive
    any:
      - id: archive-name
      - id: package-name
