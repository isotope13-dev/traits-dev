defaults:
  platforms: [windows]
  for: [powershell]
  crit: component
  conf: 0.92
traits:
  - id: module-name
    desc: PoSh-oVirt module name
    if:
      type: text
      substr: PoSh-oVirt
  - id: module-description
    desc: PoSh-oVirt OLVM/oVirt module description
    if:
      type: text
      substr: Powershell functions for Managing Oracle Linux Virtualization Manager
  - id: oracle-samples-project-url
    desc: Oracle samples PoSh-oVirt project URL
    crit: baseline
    if:
      type: text
      substr: github.com/oracle-samples/posh-ovirt
  - id: connect-ovirtserver-function
    desc: PoSh-oVirt Connect-oVirtServer function
    if:
      type: text
      substr: Function Connect-oVirtServer
  - id: get-ovirttoken-function
    desc: PoSh-oVirt Get-oVirtToken function
    if:
      type: text
      substr: Function Get-oVirtToken
  - id: ovirt-token-api-path
    desc: oVirt OAuth token API path
    if:
      type: text
      substr: /ovirt-engine/sso/oauth/token
  - id: tightvnc-base64-variable
    desc: Embedded TightVNC viewer base64 variable
    if:
      type: text
      substr: $TightVNCBase64
  - id: tightvnc-viewer-path
    desc: TightVNC viewer executable path reference
    if:
      type: text
      substr: tvnviewer.exe
  - id: tightvnc-version-comment
    desc: TightVNC viewer embedded version comment
    if:
      type: text
      substr: Version 2.8.84.0
  - id: remote-viewer-install-prompt
    desc: oVirt remote-viewer install prompt
    if:
      type: text
      substr: Attempt to Install the oVirt Remote-Viewer Client
  - id: virt-viewer-msi-url
    desc: virt-viewer MSI download URL
    if:
      type: text
      substr: releases.pagure.org/virt-viewer/virt-viewer-x64-11.0-1.0.msi
  - id: ovirt-log-collector-command
    desc: oVirt log collector command
    if:
      type: text
      substr: ovirt-log-collector
  - id: oracle-support-upload-url
    desc: Oracle support upload endpoint
    if:
      type: text
      substr: transport.oracle.com/upload/issue
  - id: sosreport-logcollector-name
    desc: oVirt sosreport log collector archive name
    if:
      type: text
      substr: sosreport-LogCollector
  - id: ovirt-ssh-credential
    desc: PoSh-oVirt SSH credential variable
    if:
      type: text
      substr: oVirtSSHCredential
  - id: ovirt-ssh-command-function
    desc: PoSh-oVirt SSH command function
    if:
      type: text
      substr: Invoke-oVirtSSHCommand
  - id: ssh-auto-host-key-option
    desc: PoSh-oVirt SSH host key acceptance option
    if:
      type: text
      substr: SSHAutoHostKeyAcceptance
  - id: windows-open-file-dialog
    desc: Windows Forms open file dialog helper
    if:
      type: text
      substr: System.Windows.Forms.OpenFileDialog
  - id: windows-folder-browser-dialog
    desc: Windows Forms folder browser dialog helper
    if:
      type: text
      substr: System.Windows.Forms.FolderBrowserDialog
  - id: windows-special-folder-enum
    desc: Windows special folder enum helper
    if:
      type: text
      substr: System.Environment+SpecialFolder

composite_rules:
  - id: module-context
    desc: PoSh-oVirt module context
    crit: baseline
    conf: 0.98
    any:
      - id: module-manifest-context
      - id: module-script-context
  - id: module-manifest-context
    desc: PoSh-oVirt manifest context
    crit: baseline
    conf: 0.98
    all:
      - id: module-name
      - id: module-description
  - id: module-script-context
    desc: PoSh-oVirt script module context
    crit: baseline
    conf: 0.98
    all:
      - id: connect-ovirtserver-function
      - id: get-ovirttoken-function
      - id: ovirt-token-api-path
  - id: tightvnc-viewer-embedded-fallback
    desc: PoSh-oVirt embedded TightVNC viewer fallback
    crit: baseline
    conf: 0.98
    all:
      - id: module-context
      - id: tightvnc-base64-variable
      - id: tightvnc-viewer-path
      - id: tightvnc-version-comment
  - id: remote-viewer-installer-context
    desc: PoSh-oVirt remote-viewer installer workflow
    crit: baseline
    conf: 0.96
    all:
      - id: module-context
      - id: remote-viewer-install-prompt
      - id: virt-viewer-msi-url
  - id: oracle-support-log-upload-context
    desc: PoSh-oVirt Oracle support log upload workflow
    crit: baseline
    conf: 0.97
    all:
      - id: module-context
      - id: ovirt-log-collector-command
      - id: oracle-support-upload-url
      - id: sosreport-logcollector-name
  - id: ssh-admin-command-context
    desc: PoSh-oVirt SSH administration command workflow
    crit: baseline
    conf: 0.96
    all:
      - id: module-context
      - id: ovirt-ssh-credential
      - id: ovirt-ssh-command-function
      - id: ssh-auto-host-key-option
  - id: windows-dialog-helper-context
    desc: PoSh-oVirt Windows file and folder dialog helpers
    crit: baseline
    conf: 0.97
    all:
      - id: module-context
      - id: windows-open-file-dialog
      - id: windows-folder-browser-dialog
      - id: windows-special-folder-enum
