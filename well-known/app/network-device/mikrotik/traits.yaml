defaults:
  platforms:
  - unix
  - android
  - ios
  for:
  - elf
  - macho
  crit: component
  size_max: 5000000
traits:
- id: mikrotik-word
  desc: MikroTik vendor name reference
  conf: 0.85
  if:
    type: text
    word: mikrotik
    case_insensitive: true
    section: ".text"
- id: routeros-word
  desc: RouterOS system name reference
  conf: 0.85
  if:
    type: text
    word: routeros
    case_insensitive: true
    section: ".text"
- id: winbox-word
  desc: WinBox management tool reference
  conf: 0.8
  if:
    type: text
    word: winbox
    case_insensitive: true
    section: ".text"
