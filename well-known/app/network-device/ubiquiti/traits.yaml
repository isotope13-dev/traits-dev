defaults:
  platforms:
  - unix
  - android
  - ios
  for:
  - elf
  - macho
  crit: component
  size_max: 5000000
traits:
- id: ubnt-word
  desc: UBNT vendor abbreviation reference
  conf: 0.8
  if:
    type: text
    word: ubnt
    section: ".text"
- id: unifi-word
  desc: UniFi product name reference
  conf: 0.8
  if:
    type: text
    word: unifi
    case_insensitive: true
    section: ".text"
- id: edgeos-word
  desc: EdgeOS system name reference
  conf: 0.85
  if:
    type: text
    word: edgeos
    case_insensitive: true
    section: ".text"
- id: vyatta-word
  desc: Vyatta system name reference
  conf: 0.85
  if:
    type: text
    word: vyatta
    case_insensitive: true
    section: ".text"
