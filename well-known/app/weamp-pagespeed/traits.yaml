defaults:
  platforms: [windows, unix]
  for: [pe, elf, macho]
  size_min: 65536

traits:
  - id: pagespeed-html-process-export
    desc: PageSpeed HTML process export
    crit: notable
    conf: 0.95
    if:
      type: export
      exact: ps_html_process

  - id: pagespeed-cache-open-export
    desc: PageSpeed cache open export
    crit: notable
    conf: 0.95
    if:
      type: export
      exact: ps_cache_open

  - id: pagespeed-product-version-export
    desc: PageSpeed product version export
    crit: notable
    conf: 0.95
    if:
      type: export
      exact: ps_product_version

  - id: pagespeed-data-attribute-string
    desc: PageSpeed HTML data attribute
    crit: component
    conf: 0.9
    if:
      type: text
      section: .text
      substr: data-pagespeed-

  - id: pagespeed-async-css-loader
    desc: PageSpeed async CSS loader
    crit: component
    conf: 0.9
    if:
      type: text
      section: .text
      substr: /pagespeed_static/async_css.js

composite_rules:
  - id: native-pagespeed-library
    desc: WeAmp PageSpeed native library
    crit: notable
    conf: 0.97
    needs: 3
    any:
      - id: well-known/app/weamp-pagespeed
