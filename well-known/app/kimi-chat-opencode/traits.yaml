# kimi-chat-opencode — an unofficial OpenCode provider plugin for Kimi Chat
# (www.kimi.com, Moonshot AI). MIT, ships source maps, tests and a SECURITY.md.
#
# To talk to Kimi's private web backend it reuses the session the user already
# established in their own Chrome: it copies each profile's cookie DB to a
# 0700 temp file, decrypts it offline with the macOS Safe Storage key, pulls
# the single `kimi-auth` cookie, then deletes the copy. The live profile is
# never launched, attached to, or modified.
#
# That is the same primitive an infostealer uses, so the generic Chromium
# credential-access rules fire on it. The discriminators that separate this
# from theft are first-party scope and destination, both verifiable here:
#   * the SQL selects ONE cookie name on ONE domain
#     (`name='kimi-auth' AND host_key LIKE '%kimi.com%'`) rather than dumping
#     the cookies table;
#   * the recovered token is replayed only to www.kimi.com — as the `kimi-auth`
#     cookie and a Bearer header — and the package contains no third-party
#     endpoint at all (only kimi.com, loopback CDP, opencode.ai, and the
#     RFC-2606 `kimi-chat.invalid` placeholder).
#
# Identity only; behavioural rules stay in objectives/.
defaults:
  platforms: [macos, linux, windows]
  for: [javascript, typescript, package.json]
  crit: notable
  conf: 0.98

traits:
  - id: package-name
    desc: kimi-chat-opencode package name
    conf: 0.99
    if:
      type: text
      regex: '"name"\s*:\s*"kimi-chat-opencode"'

  - id: temp-artifact-prefix
    desc: kimi-chat-opencode temp directory prefix
    conf: 0.99
    if:
      type: text
      substr: 'kimi-chat-opencode-'

  # The narrow first-party scope of the cookie lookup: one cookie name on one
  # host, which is what makes this session reuse rather than harvesting.
  - id: first-party-session-cookie-scope
    desc: Kimi-scoped auth cookie lookup
    conf: 0.99
    for: [javascript, typescript]
    if:
      type: text
      regex: "name='kimi-auth'\\s+AND\\s+host_key\\s+LIKE\\s+'%kimi\\.com%'"

  - id: auth-envelope-error
    desc: kimi-chat-opencode auth envelope error type
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: AuthEnvelopeError

composite_rules:
  # Two independent markers required: a lone `kimi.com` or `kimi-auth` string
  # would also appear in malware that targets this same service, so the
  # exception must key on the package's own identity, not on its target.
  - id: kimi-chat-opencode-context
    desc: Recognized kimi-chat-opencode plugin context
    crit: notable
    conf: 0.99
    scope: archive
    any:
      - id: package-name
      - id: temp-artifact-prefix
      - id: first-party-session-cookie-scope
      - id: auth-envelope-error
    needs: 2
