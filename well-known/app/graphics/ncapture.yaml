defaults:
  for: [pe]
  platforms: [windows]
  size_min: 50000
  size_max: 200000

traits:
  - id: ncapture-pdb
    desc: NCapture PDB path
    crit: component
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)[\\/]NCapture[\\/]Release[\\/]NCapture\.pdb$'

  - id: ncapture-version
    desc: NCapture Version 1.0 string
    crit: component
    if:
      type: text
      substr: "NCapture Version 1.0"
      section: rdata

  - id: ncapture-tmp-file
    desc: NCapture temporary file name
    crit: component
    if:
      type: text
      substr: "NCapturetmp~~.psd"
      section: rdata

composite_rules:
  - id: ncapture-binary
    desc: NCapture screen capture utility
    crit: notable
    conf: 1.0
    all:
      - id: objectives/collection/screenshot/capture::gdi-gdiplus-init-capture
    any:
      - id: well-known/app/graphics::ncapture-pdb
      - id: well-known/app/graphics::ncapture-tmp-file
      - id: well-known/app/graphics::ncapture-version
    needs: 2
