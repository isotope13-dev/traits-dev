defaults:
  for: [pe]
  platforms: [windows]
  size_min: 50000
  size_max: 200000

traits:
  - id: ncapture-pdb
    desc: NCapture PDB path
    crit: component
    if:
      type: text
      substr: "\\NCapture\\Release\\NCapture.pdb"

  - id: ncapture-version
    desc: NCapture Version 1.0 string
    crit: component
    if:
      type: text
      substr: "NCapture Version 1.0"

  - id: ncapture-tmp-file
    desc: NCapture temporary file name
    crit: component
    if:
      type: text
      substr: "NCapturetmp~~.psd"

  - id: ncapture-mspaint
    desc: NCapture launches mspaint
    crit: component
    if:
      type: text
      substr: "mspaint.exe"

  - id: ncapture-explorer
    desc: NCapture launches explorer
    crit: component
    if:
      type: text
      substr: "explorer"

composite_rules:
  - id: ncapture-binary
    desc: NCapture screen capture utility
    crit: notable
    conf: 1.0
    all:
      - id: objectives/collection/screenshot/capture::gdi-gdiplus-init-capture
    any:
      - id: ncapture-pdb
      - id: ncapture-version
      - id: ncapture-tmp-file
      - id: ncapture-mspaint
      - id: ncapture-explorer
    needs: 2
