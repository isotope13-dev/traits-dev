# Entroly is a local-first context-control plane for AI coding agents.  Its
# proxy, MCP, Docker, hashing, prompt-safety, and skill-management code are
# product functionality; these markers provide benign product context without
# suppressing ordinary network, process, or credential-capability findings.
defaults:
  platforms: [unix, windows]
  for: [whl, pkginfo, python, javascript, markdown, npm, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Entroly Python package name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: entroly

  - id: source-tree
    desc: Entroly source-tree member
    for: [python, javascript, markdown]
    if:
      type: path
      regex: '(^|[\\/])entroly([\\/]|$)'

  - id: upstream-repository
    desc: Entroly upstream repository reference
    for: [pkginfo, python, javascript, markdown]
    if:
      type: text
      substr: github.com/juyterman1000/entroly

  - id: product-summary
    desc: Entroly local context-control summary
    for: [pkginfo, markdown]
    if:
      type: text
      regex: '(?i)local context (OS|control plane) for AI coding agents'

composite_rules:
  - id: package-identity
    desc: Entroly context-control product identity
    crit: notable
    conf: 0.99
    any:
      - id: package-name
      - id: upstream-repository

  - id: local-runtime-context
    desc: Recognized Entroly local runtime context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: package-identity
      - id: product-summary
