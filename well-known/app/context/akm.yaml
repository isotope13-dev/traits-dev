defaults:
  platforms:
  - windows
  - unix
  for:
  - javascript
  - typescript
  - markdown
  - package.json
  crit: component
  size_max: 5000000
traits:
- id: akm-bun-runtime-error
  desc: AKM Bun runtime error text
  conf: 0.95
  if:
    type: text
    substr: akm-cli 0.8 requires the Bun runtime
- id: akm-install-options-text
  desc: AKM install options text
  conf: 0.95
  if:
    type: text
    substr: 'Install options:'
- id: akm-cross-runtime-note
  desc: AKM cross-runtime support note
  conf: 0.9
  if:
    type: text
    substr: Cross-runtime support is planned
- id: akm-semantic-search-bun-install-help
  desc: AKM semantic search Bun install help
  conf: 0.94
  if:
    type: text
    substr: To enable semantic search, install akm-cli via Bun
- id: akm-binary-semantic-search-help
  desc: AKM binary semantic-search limitation help
  conf: 0.94
  if:
    type: text
    substr: prebuilt akm binary, which cannot load optional native dependencies
- id: akm-cron-task-comment
  desc: AKM cron task scheduler comment
  conf: 0.9
  platforms:
  - unix
  if:
    type: text
    substr: crontab backend for `akm tasks`
- id: akm-cron-system-out-of-scope
  desc: AKM cron system path scope note
  conf: 0.9
  platforms:
  - unix
  if:
    type: text
    substr: system-wide /etc/cron.d entries
- id: akm-cron-owned-task-marker
  desc: AKM cron owned task marker
  conf: 0.9
  platforms:
  - unix
  if:
    type: text
    substr: akm:task
- id: akm-config-backup-retention
  desc: AKM config backup retention
  conf: 0.92
  if:
    type: text
    substr: Maximum number of timestamped config backups to retain
- id: akm-config-backup-prune-loop
  desc: AKM config backup prune loop
  conf: 0.92
  if:
    type: text
    substr: timestamped.slice(MAX_CONFIG_BACKUPS)
- id: akm-self-update-repo
  desc: AKM self-update GitHub repository
  conf: 0.92
  if:
    type: text
    substr: const REPO = "itlackey/akm"
- id: akm-self-update-checksum
  desc: AKM self-update checksum verification
  conf: 0.9
  if:
    type: text
    substr: Checksum verification failed
- id: akm-self-update-post-upgrade
  desc: AKM self-update post-upgrade task
  conf: 0.9
  if:
    type: text
    substr: 'postUpgrade: runPostUpgradeTasks'
- id: akm-github-token-domain-guard
  desc: AKM GitHub token domain guard
  conf: 0.92
  if:
    type: text
    substr: GITHUB_TOKEN_DOMAINS
- id: akm-github-cli-token-helper
  desc: AKM GitHub CLI token helper
  conf: 0.9
  if:
    type: text
    substr: childProcess.spawnSync("gh", ["auth", "token"]
- id: akm-scheduler-path-supplement
  desc: AKM scheduler PATH supplement helper
  conf: 0.92
  if:
    type: text
    substr: supplementPathForSchedulerContext
- id: akm-scheduler-path-context
  desc: AKM stripped scheduler PATH context
  conf: 0.9
  if:
    type: text
    substr: running in a scheduler context (cron/launchd) where PATH is stripped
- id: akm-stash-safety-sensitive-dirs
  desc: AKM stash safety sensitive-dir denylist
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: User-data dotfile parents
- id: akm-install-audit-changelog
  desc: AKM install audit changelog
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: Install-time security audit
- id: akm-launchd-task-label
  desc: AKM launchd task label
  conf: 0.95
  platforms:
  - macos
  if:
    type: text
    substr: com.akm.task.
- id: akm-launchd-task-comment
  desc: AKM launchd task scheduler comment
  conf: 0.9
  platforms:
  - macos
  if:
    type: text
    substr: launchd backend for `akm tasks`
- id: akm-launchd-bootstrap-call
  desc: AKM launchd bootstrap call
  conf: 0.9
  platforms:
  - macos
  if:
    type: text
    substr: '["launchctl", "bootstrap"'
composite_rules:
- id: akm-bun-runtime-guard
  desc: AKM Bun runtime guard help
  conf: 0.96
  all:
  - id: akm-bun-runtime-error
  - id: akm-install-options-text
  - id: akm-cross-runtime-note
- id: akm-bun-install-help-text
  desc: AKM Bun install help text
  conf: 0.96
  any:
  - id: akm-bun-runtime-guard
  - id: akm-semantic-search-bun-install-help
- id: akm-launchd-user-task-scheduler
  desc: AKM user launchd task scheduler
  crit: notable
  conf: 0.96
  platforms:
  - macos
  all:
  - id: akm-launchd-task-label
  - id: akm-launchd-task-comment
  - id: akm-launchd-bootstrap-call
- id: akm-cron-user-task-scheduler
  desc: AKM user crontab task scheduler
  crit: notable
  conf: 0.96
  platforms:
  - unix
  all:
  - id: akm-cron-task-comment
  - id: akm-cron-system-out-of-scope
  - id: akm-cron-owned-task-marker
- id: akm-config-backup-pruning
  desc: AKM config backup pruning
  crit: baseline
  conf: 0.95
  all:
  - id: akm-config-backup-retention
  - id: akm-config-backup-prune-loop
- id: akm-checksummed-self-update
  desc: AKM checksum-verified self-update
  crit: notable
  conf: 0.95
  all:
  - id: akm-self-update-repo
  - id: akm-self-update-checksum
  - id: akm-self-update-post-upgrade
- id: akm-github-api-token-helper
  desc: AKM GitHub API token helper
  crit: baseline
  conf: 0.95
  all:
  - id: akm-github-token-domain-guard
  - id: akm-github-cli-token-helper
- id: akm-scheduler-path-supplement-context
  desc: AKM scheduler PATH supplementation
  crit: baseline
  conf: 0.95
  all:
  - id: akm-scheduler-path-supplement
  - id: akm-scheduler-path-context
- id: akm-cli
  desc: AKM CLI tool identity
  crit: notable
  conf: 0.96
  needs: 2
  any:
  - id: akm-bun-install-help-text
  - id: akm-config-backup-pruning
  - id: akm-github-api-token-helper
  - id: akm-scheduler-path-supplement-context
  - id: akm-binary-semantic-search-help
  - id: akm-stash-safety-sensitive-dirs
