defaults:
  platforms: [unix]
  for: [elf]

traits:
  - id: delegate-product-description
    desc: DeleGate proxy product description
    crit: notable
    conf: 0.99
    size_max: 20000000
    if:
      type: text
      section: .rodata
      substr: DeleGate is a general purpose application level gateway
  - id: delegate-proxy-telnet-banner
    desc: DeleGate proxy Telnet banner
    crit: notable
    conf: 0.99
    size_max: 20000000
    if:
      type: text
      section: .rodata
      substr: PROXY-telnet server DeleGate/

composite_rules:
  - id: delegate-proxy-identity
    desc: DeleGate proxy server identity
    crit: notable
    conf: 0.99
    any:
      - id: delegate-product-description
      - id: delegate-proxy-telnet-banner
  - id: delegate-known-proxy-context
    desc: DeleGate proxy terminal and SUDO context
    crit: exception
    conf: 0.99
    all:
      - id: delegate-proxy-identity
      - id: micro-behaviors/process/tty/pty::tcgetattr
      - id: micro-behaviors/process/tty/pty::tcsetattr
      - id: objectives/exfiltration/stealer/credential/sudo-log::credential-log-filename
