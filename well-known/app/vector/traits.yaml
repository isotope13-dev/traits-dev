defaults:
  platforms: [linux]
  for: [elf]
  size_min: 1048576

traits:
  - id: vector-executable-basename
    desc: Vector executable basename
    crit: component
    conf: 0.9
    if:
      type: value
      path: file.basename
      exact: vector
  - id: vector-rust-module-symbol
    desc: Vector Rust module symbol
    crit: component
    conf: 0.95
    if:
      type: text
      substr: src/sinks/aws_cloudwatch_logs/request.rs
      section: .rodata
  - id: vector-aws-cloudwatch-logs-sink
    desc: Vector AWS CloudWatch Logs sink
    crit: component
    conf: 0.95
    if:
      type: text
      substr: src/sinks/aws_cloudwatch_logs/config.rs
      section: .rodata
  - id: vector-kubernetes-logs-source
    desc: Vector Kubernetes logs source
    crit: component
    conf: 0.95
    if:
      type: text
      substr: src/sources/kubernetes_logs/mod.rs
      section: .rodata
composite_rules:
  - id: vector-observability-agent
    desc: Vector observability agent
    crit: baseline
    conf: 0.98
    all:
      - id: vector-executable-basename
      - id: vector-rust-module-symbol
      - id: vector-aws-cloudwatch-logs-sink
      - id: vector-kubernetes-logs-source
