# OpenSearch plugin member identities used to recognize documented cloud
# integrations when they carry generic cloud-library strings.
defaults:
  platforms: [unix, windows]
  for: [jar, class, binaries]
  crit: notable
  conf: 0.98
  size_min: 100
  size_max: 100000000

traits:
  - id: security-dashboards-plugin-path
    desc: OpenSearch Security Dashboards member path
    for: [javascript, typescript]
    if:
      type: path
      substr: securityDashboards
  - id: crypto-kms-plugin-path
    desc: OpenSearch Crypto KMS plugin member path
    for: [jar]
    if:
      type: path
      substr: crypto-kms-
  - id: gce-plugin-path
    desc: OpenSearch Discovery GCE plugin member path
    for: [jar]
    if:
      type: path
      substr: discovery-gce-
  - id: gce-metadata-service-class
    desc: OpenSearch GCE metadata service class path
    for: [class]
    if:
      type: path
      basename: true
      exact: GceMetadataService.class
  - id: reports-dashboards-plugin-path
    desc: OpenSearch Reports Dashboards plugin path
    for: [javascript, typescript]
    if:
      type: path
      substr: reportsDashboards
  - id: tesseract-model-download-url
    desc: Tesseract OCR model download URL
    for: [javascript]
    if:
      type: string_literal
      exact: https://raw.githubusercontent.com/naptha/tessdata/gh-pages/4.0.0_best/eng.traineddata.gz
