defaults:
  platforms: [macos]
  for: [macho, binaries]

traits:
  - id: apple-assetcache-identity
    desc: Apple AssetCache system binary
    crit: notable
    conf: 0.98
    size_min: 100000
    size_max: 200000000
    if:
      type: text
      substr: com.apple.AssetCache

  - id: apple-mdworker-identity
    desc: Apple mdworker system binary
    crit: notable
    conf: 0.98
    size_min: 100000
    size_max: 200000000
    if:
      type: text
      substr: mdworker
