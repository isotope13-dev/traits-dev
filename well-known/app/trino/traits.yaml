defaults:
  platforms: [linux]
  crit: notable
  conf: 0.96

traits:
  - id: wolfi-trino-plugin-package
    desc: Wolfi Trino plugin package
    for: [archive]
    if:
      type: basename
      regex: '^trino-plugin-[^\\/]+-[0-9][^\\/]*\.apk$'
  - id: trino-library-path
    desc: Trino library path
    size_max: 536870912
    for: [jar, class, java_class]
    if:
      type: path
      regex: 'trino-[^\\/]+\.jar$'
