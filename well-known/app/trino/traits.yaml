defaults:
  platforms: [linux]
  crit: notable
  conf: 0.96

traits:
  - id: wolfi-trino-plugin-package
    desc: Wolfi Trino plugin package
    for: [archive]
    if:
      type: basename
      regex: '^trino-plugin-[^\\/]+-[0-9][^\\/]*\.apk$'
  - id: trino-library-path
    desc: Trino library path
    size_max: 536870912
    for: [jar, class, java_class]
    if:
      type: path
      regex: '(trino-[^\\/]+|io\.trino\.[^\\/]+)\.jar$'

  - id: trino-openai-client-module
    desc: Trino OpenAI client module
    for: [jar, zip]
    if:
      type: hex
      pattern: 69 6F 2F 74 72 69 6E 6F 2F 70 6C 75 67 69 6E 2F 61 69 2F 66 75 6E 63 74 69 6F 6E 73 2F 4F 70 65 6E 41 69 43 6C 69 65 6E 74 2E 63 6C 61 73 73

  - id: trino-anthropic-client-module
    desc: Trino Anthropic client module
    for: [jar, zip]
    if:
      type: hex
      pattern: 69 6F 2F 74 72 69 6E 6F 2F 70 6C 75 67 69 6E 2F 61 69 2F 66 75 6E 63 74 69 6F 6E 73 2F 41 6E 74 68 72 6F 70 69 63 43 6C 69 65 6E 74 2E 63 6C 61 73 73
