# Roblox application/platform brand reference. Neutral on its own: appears in
# countless legitimate Roblox-related files, games, and tools. Exploit
# composites combine it with executor/script-injection capability.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  size_min: 512
traits:
  - id: roblox-ref
    desc: Roblox brand reference
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (?i)roblox
      section: .text
    not:
      - regex: roblox\.com/(users|games|catalog)
