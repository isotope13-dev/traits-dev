defaults:
  crit: baseline
  conf: 0.94
traits:
  - id: apk-package-name
    desc: Amazon CloudWatch Agent APK package
    platforms: [unix]
    for: [pkginfo, text]
    if:
      type: text
      substr: pkgname = amazon-cloudwatch-agent
  - id: control-script-name
    desc: Amazon CloudWatch Agent control script
    platforms: [unix]
    for: [shell]
    if:
      type: basename
      exact: amazon-cloudwatch-agent-ctl
  - id: control-script-usage
    desc: Amazon CloudWatch Agent control usage
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: amazon-cloudwatch-agent-ctl -a
  - id: systemd-unit-description
    desc: Amazon CloudWatch Agent service unit
    platforms: [linux]
    for: [systemd-service]
    if:
      type: text
      substr: Description=Amazon CloudWatch Agent
  - id: systemd-unit-execstart
    desc: Amazon CloudWatch Agent service launcher
    platforms: [linux]
    for: [systemd-service]
    if:
      type: text
      substr: ExecStart=/usr/bin/start-amazon-cloudwatch-agent
  - id: ssm-config-source
    desc: CloudWatch Agent SSM config source
    crit: notable
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: ssm:<parameter-store-name>
  - id: local-file-config-source
    desc: CloudWatch Agent file config source
    crit: notable
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: file:<file-path>
  - id: config-management-actions
    desc: CloudWatch Agent config management actions
    crit: notable
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: fetch-config|append-config|remove-config|set-log-level
  - id: workload-status-action
    desc: CloudWatch Agent workload status action
    crit: notable
    platforms: [unix]
    for: [shell]
    if:
      type: text
      substr: status-with-workloads
