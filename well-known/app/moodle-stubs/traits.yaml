defaults:
  platforms: [unix, windows]
  for: [php, json]
  crit: baseline
  conf: 0.98

traits:
  - id: moodle-stubs-archive-name
    desc: Moodle stubs archive name
    size_min: 0
    if:
      type: path
      regex: '(?i)moodle-stubs-v[0-9]'
  - id: moodle-stubs-namespace
    desc: Moodle stubs PHP namespace
    if:
      type: text
      substr: Moodle

composite_rules:
  - id: moodle-stubs-package
    desc: Moodle stubs package
    crit: notable
    conf: 0.98
    any:
      - id: moodle-stubs-archive-name
      - id: moodle-stubs-namespace
