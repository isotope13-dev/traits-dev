# CoinGecko public price API — benign market-data endpoint.
# Used as a false-positive exclusion for curl download-pattern composites.
defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: benign-coingecko-price-api
    desc: Benign CoinGecko price API fetch
    crit: component
    conf: 0.9
    if:
      type: text
      substr: api.coingecko.com/api/v3/simple/price
