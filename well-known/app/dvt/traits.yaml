# DVT is a database federation and transformation CLI. Its serve-registry
# command can terminate its own suspended workers as an emergency brake; the
# identifier is not a ransomware service-kill configuration.
defaults:
  platforms: [macos]
  for: [macho, pkginfo, text]
  crit: notable
  conf: 0.99

traits:
  - id: serve-registry-kill-handler
    desc: DVT serve registry kill handler
    for: [macho]
    size_min: 1000
    if:
      type: text
      section: __cstring
      substr: 'dvt.cli.serve_registry.kill_processes'

  - id: serve-registry-emergency-brake
    desc: DVT serve registry emergency brake
    for: [macho]
    size_min: 1000
    if:
      type: text
      section: __const
      regex: '(?i)emergency brake:\s+reap suspended dvt processes'

composite_rules:
  - id: benign-process-control-context
    desc: DVT worker-process emergency brake context
    crit: exception
    conf: 0.99
    all:
      - id: serve-registry-kill-handler
      - id: serve-registry-emergency-brake
