defaults:
  platforms: [linux]
  for: [elf, archive]
  crit: notable
  conf: 0.98
  size_min: 1000
  size_max: 100000000

traits:
  - id: renderdoc-capture-library
    desc: RenderDoc capture shared library
    for: [elf]
    if:
      type: value
      path: elf.soname
      exact: librenderdoc.so

  - id: renderdoc-arch-package
    desc: RenderDoc Arch package artifact
    for: [archive]
    if:
      type: path
      basename: true
      regex: '^lib32-renderdoc-'

composite_rules:
  - id: renderdoc-package-or-library
    desc: RenderDoc graphics debugging software
    crit: notable
    conf: 0.99
    any:
      - id: renderdoc-capture-library
      - id: renderdoc-arch-package
