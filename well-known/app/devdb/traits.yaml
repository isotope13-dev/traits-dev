# DevDb (publisher damms005) — VS Code / Open VSX database viewer.
# Identity is used to keep large extension bundles from being scored as
# install-hook / encoded-payload malware when they embed SQL drivers and
# compressed assets.
defaults:
  platforms: [windows, unix]
  for: [javascript, json, zip]
  crit: notable
  conf: 0.98

traits:
  - id: vsix-member
    desc: DevDb VS Code extension path
    if:
      type: path
      substr: damms005.devdb
  - id: package-name
    desc: DevDb extension package name
    for: [json]
    if:
      type: value
      path: name
      exact: devdb
  - id: publisher
    desc: DevDb publisher id
    for: [json]
    if:
      type: value
      path: publisher
      exact: damms005
  - id: display-name
    desc: DevDb display name
    for: [json]
    if:
      type: value
      path: displayName
      exact: DevDb
  - id: config-marker
    desc: DevDb workspace config filename
    if:
      type: text
      substr: .devdbrc

composite_rules:
  - id: extension-context
    desc: DevDb VS Code extension context
    any:
      - id: vsix-member
      - id: package-name
      - id: publisher
      - id: display-name
      - id: config-marker
