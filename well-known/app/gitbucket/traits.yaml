defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.95

traits:
  - id: gitbucket-service-script
    desc: GitBucket service script
    for: [shell]
    if:
      type: text
      substr: GITBUCKET_SERVICE
  - id: gitbucket-service-text
    desc: GitBucket service text
    for: [shell, scala]
    if:
      type: text
      word: GitBucket
  - id: gitbucket-sbt-build
    desc: GitBucket SBT build
    for: [scala]
    if:
      type: text
      substr: org.apache.sshd

composite_rules:
  - id: gitbucket-server
    desc: GitBucket Git server
    crit: notable
    conf: 0.97
    any:
      - id: gitbucket-service-script
      - id: gitbucket-service-text
  - id: gitbucket-sbt-project
    desc: GitBucket SBT build project
    crit: notable
    conf: 0.97
    all:
      - id: gitbucket-service-text
      - id: gitbucket-sbt-build
