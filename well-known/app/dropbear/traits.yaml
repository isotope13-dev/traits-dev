defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.96
  size_max: 1073741824

traits:
  - id: source-tree
    desc: Dropbear SSH source tree
    for: [c, cpp, shell, makefile]
    if:
      type: path
      basename: true
      regex: '^dropbear-[0-9][^:/\\]{0,80}$'

  - id: package-host-key-path
    desc: Dropbear package host-key path
    for: [shell]
    if:
      type: text
      substr: /etc/dropbear/dropbear_rsa_host_key

composite_rules:
  - id: dropbear-ssh
    desc: Dropbear SSH server
    crit: notable
    conf: 0.98
    any:
      - id: source-tree
      - id: package-host-key-path
