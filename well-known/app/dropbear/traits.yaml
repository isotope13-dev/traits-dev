defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.96
  size_max: 1073741824

traits:
  - id: source-tree
    desc: Dropbear SSH source tree
    for: [shell, python, c, cpp, makefile, github-actions]
    if:
      type: basename
      regex: '(^|[!:/\\])dropbear-[0-9][^!:/\\]{0,80}([!:/\\]|$)'

  - id: package-host-key-path
    desc: Dropbear package host-key path
    for: [shell]
    if:
      type: text
      substr: /etc/dropbear/dropbear_rsa_host_key
