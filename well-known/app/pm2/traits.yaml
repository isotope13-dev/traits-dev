# PM2 — Node.js process manager. Env-divergence display strings, used as benign
# FP-suppression context (its `pm2 env` output resembles credential harvesting).
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]
traits:
  - id: pm2-divergent-env-text
    desc: PM2 divergent env text
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Divergent env variables from local env
  - id: pm2-env-command-hint
    desc: PM2 env command hint
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Use `pm2 env %s`
composite_rules:
  - id: pm2-env-display-context
    desc: PM2 describe command displays environment differences
    crit: notable
    conf: 0.98
    all:
      - id: pm2-divergent-env-text
      - id: pm2-env-command-hint
    near_bytes: 3000
