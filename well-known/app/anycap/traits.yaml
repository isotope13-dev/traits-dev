defaults:
  platforms:
  - windows
  - unix
  for:
  - markdown
  crit: component
  conf: 0.9
  size_max: 5000000
traits:
- id: anycap-website
  desc: AnyCap product website marker
  if:
    type: text
    regex: '(?i)https?://(www\.)?anycap\.ai\b'
- id: anycap-product-name
  desc: AnyCap product name marker
  if:
    type: text
    regex: '(?i)\bAnyCap\b'
- id: anycap-official-skill-install
  desc: Official AnyCap skill package install command
  if:
    type: text
    regex: '\bnpx[ \t]+.{0,24}[ \t]+skills[ \t]+add[ \t]+anycap-ai/anycap\b'

composite_rules:
- id: anycap-skill-text
  desc: Official AnyCap skill documentation
  crit: notable
  conf: 0.95
  needs: 2
  any:
  - id: anycap-website
  - id: anycap-product-name
  - id: anycap-official-skill-install
