defaults:
  platforms: [linux, macos, windows]
  for: [binaries]

traits:
  - id: nx-native-source-marker
    desc: Nx native source path marker
    crit: notable
    conf: 0.97
    size_min: 1000000
    if:
      type: text
      substr: packages/nx/src/native/

composite_rules:
  - id: nx-native-addon
    desc: Nx native Node addon
    crit: notable
    conf: 0.98
    all:
      - id: metadata/binary/framework::node-api-addon-export
      - id: nx-native-source-marker
