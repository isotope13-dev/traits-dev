# ImageMagick — benign image-manipulation suite native DLL basename.
# Used as a false-positive exclusion for Windows stealer-recon composites.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1
  size_max: 104857600
traits:
  - id: magick-native-dll-basename
    desc: ImageMagick native DLL basename
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '^Magick\.Native-.{1,32}\.dll$'
