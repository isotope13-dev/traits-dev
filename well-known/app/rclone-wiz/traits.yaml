defaults:
  platforms: [linux]
  for: [tar, python, shell]
  crit: component
  conf: 0.95

traits:
  - id: rclone-wiz-source-path
    desc: Rclone-WIZ source archive path
    size_max: 10485760
    if:
      type: path
      substr: rclone-wiz/
      case_insensitive: true

  - id: rclone-wiz-generated-script-text
    desc: Rclone-WIZ generated mount script text
    size_max: 10485760
    if:
      type: text
      substr: Automatically generated by Rclone-WIZ

  - id: rclone-wiz-application-marker
    desc: Rclone-WIZ GUI rclone mount manager
    size_max: 10485760
    if:
      type: text
      substr: Rclone-WIZ

composite_rules:
  - id: rclone-wiz-application
    desc: Rclone-WIZ GUI rclone mount manager
    crit: notable
    conf: 0.95
    all:
      - id: rclone-wiz-application-marker
    any:
      - id: rclone-wiz-source-path
      - id: rclone-wiz-generated-script-text
