defaults:
  platforms: [windows]
  for: [powershell, nupkg]
  crit: notable
  conf: 0.92

traits:
  - id: spswakeup-name
    desc: SPSWakeUP app name
    if:
      type: text
      exact: SPSWakeUP

  - id: task-scheduler-service-text
    desc: Task Scheduler service text
    if:
      type: text
      exact: Task Scheduler Service

composite_rules:
  - id: sharepoint-warmup-scheduled-task
    desc: SPSWakeUP SharePoint scheduled warmup
    crit: notable
    conf: 0.94
    all:
      - id: spswakeup-name
      - id: task-scheduler-service-text
      - id: well-known/app/sharepoint::product-name
