defaults:
  platforms: [unix, windows]
  for: [zip, javascript]
  crit: notable
  conf: 0.97

traits:
  - id: studio-plugin-archive
    desc: OrientDB Studio plugin archive
    for: [zip]
    if:
      type: basename
      regex: '^orientdb-studio-[0-9][A-Za-z0-9._-]*\.zip$'

  - id: studio-wiki-url
    desc: OrientDB Studio wiki URL
    crit: component
    for: [javascript]
    if:
      type: text
      substr: 'https://github.com/orientechnologies/orientdb-studio/wiki/Functions'

  - id: studio-simpleauth-storage
    desc: OrientDB Studio SimpleAuth storage
    crit: component
    for: [javascript]
    if:
      type: text
      substr: localStorage.getItem("SimpleAuth")

composite_rules:
  - id: studio-web-ui-markers
    desc: OrientDB Studio web UI markers
    crit: notable
    conf: 0.98
    for: [javascript]
    all:
      - id: studio-wiki-url
      - id: studio-simpleauth-storage

  - id: studio-bundled-web-asset
    desc: OrientDB Studio bundled web asset
    crit: notable
    conf: 0.98
    for: [javascript]
    all:
      - id: metadata/package/files/runtime::runtime-bundle-main-js
      - id: studio-web-ui-markers
