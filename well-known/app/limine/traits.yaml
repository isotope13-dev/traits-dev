defaults:
  platforms: [unix]
  for: [data]
traits:
  - id: limine-bios-boot-image
    desc: Limine BIOS boot image asset
    crit: notable
    conf: 0.98
    if:
      type: basename
      regex: '^limine-bios-(pxe|cd)\.bin$'
  - id: limine-uefi-boot-image
    desc: Limine UEFI boot image asset
    crit: notable
    conf: 0.98
    if:
      type: basename
      regex: '^limine-uefi-(pxe|cd)\.bin$'
composite_rules:
  - id: limine-boot-image-context
    desc: Limine boot image asset context
    crit: exception
    any:
      - id: limine-bios-boot-image
      - id: limine-uefi-boot-image
