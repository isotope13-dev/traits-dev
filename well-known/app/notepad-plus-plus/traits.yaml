defaults:
  platforms: [windows]
  for: [pe, dll, archive]
  crit: component
  conf: 0.98
  size_max: 200000000
traits:
  - id: notepad-plus-plus-portable-archive
    desc: Notepad++ portable archive
    if:
      type: path
      regex: '(?i)(^|[\\/])npp\.[0-9][A-Za-z0-9._-]*portable.*\.7z($|[\\/])'
  - id: notepad-plus-plus-plugin-list
    desc: Notepad++ plugin list DLL
    if:
      type: path
      basename: true
      exact: nppPluginList.dll
      case_insensitive: true
  - id: notepad-plus-plus-gup-updater
    desc: Notepad++ GUP updater
    if:
      type: path
      basename: true
      exact: GUP.exe
      case_insensitive: true
  - id: notepad-plus-plus-nppexport-plugin
    desc: Notepad++ NppExport plugin
    for: [dll]
    if:
      type: path
      basename: true
      exact: NppExport.dll
      case_insensitive: true
  - id: notepad-plus-plus-nppconverter-plugin
    desc: Notepad++ NppConverter plugin
    for: [dll]
    if:
      type: path
      basename: true
      exact: NppConverter.dll
      case_insensitive: true
composite_rules:
  - id: notepad-plus-plus-portable-component
    desc: Notepad++ portable component
    any:
      - id: well-known/app/notepad-plus-plus::notepad-plus-plus-gup-updater
      - id: well-known/app/notepad-plus-plus::notepad-plus-plus-nppconverter-plugin
      - id: well-known/app/notepad-plus-plus::notepad-plus-plus-nppexport-plugin
      - id: well-known/app/notepad-plus-plus::notepad-plus-plus-plugin-list
      - id: well-known/app/notepad-plus-plus::notepad-plus-plus-portable-archive
