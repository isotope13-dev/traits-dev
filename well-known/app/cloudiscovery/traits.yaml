defaults:
  platforms: [unix, windows]
  for: [pkginfo]

traits:
  - id: pypi-package-name
    desc: Cloudiscovery Python package identity
    crit: notable
    conf: 1.0
    if:
      type: value
      path: name
      exact: cloudiscovery

  - id: project-homepage
    desc: Cloudiscovery project homepage
    crit: notable
    conf: 0.99
    if:
      type: value
      path: home-page
      exact: https://github.com/Cloud-Architects/cloudiscovery

composite_rules:
  - id: cloudiscovery-package
    desc: Cloudiscovery cloud inventory application
    crit: notable
    conf: 1.0
    all:
      - id: pypi-package-name
      - id: project-homepage
