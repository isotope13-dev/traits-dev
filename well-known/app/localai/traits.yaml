defaults:
  platforms: [unix, windows]
  for: [source, scripts, manifests, data, shell, makefile, javascript, typescript, go]
  size_max: 50000000
traits:
  - id: localai-source-path
    desc: LocalAI source release path
    crit: component
    conf: 0.97
    if:
      type: path
      regex: '(^|[\\/!])LocalAI-[0-9][^\\/!]*[\\/]'
  - id: localai-backend-build-path
    desc: LocalAI backend build path
    crit: component
    conf: 0.95
    if:
      type: path
      regex: 'LocalAI-[0-9][^\\/!]*[\\/](backend|\.github|Makefile|scripts)'
  - id: localai-react-ui-path
    desc: LocalAI React UI path
    crit: component
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/!])LocalAI-[0-9][^\\/!]*[\\/]core[\\/]http[\\/]react-ui[\\/]'
  - id: localai-ui-build-path
    desc: LocalAI UI build/test path
    crit: component
    conf: 0.95
    if:
      type: path
      regex: 'LocalAI-[0-9][^\\/!]*[\\/](Makefile|scripts|core[\\/]http[\\/]react-ui)'
  - id: localai-ui-build-command
    desc: LocalAI UI build/test command
    crit: component
    conf: 0.9
    for: [shell, makefile, javascript, typescript]
    if:
      type: text
      regex: '(core/http/react-ui|bunx\s+playwright|npx\s+playwright|npm\s+run\s+build)'
  - id: localai-xsysinfo-path
    desc: LocalAI system capability detector path
    crit: component
    conf: 0.96
    if:
      type: path
      regex: '(^|[\\/!])LocalAI-[0-9][^\\/!]*[\\/]pkg[\\/]xsysinfo[\\/]'
  - id: localai-translation-helper-path
    desc: LocalAI locale translation helper path
    crit: component
    conf: 0.96
    if:
      type: path
      substr: translate-locales.mjs
  - id: localai-go-module
    desc: LocalAI Go module declaration
    crit: component
    conf: 0.99
    for: [go]
    if:
      type: text
      substr: module github.com/mudler/LocalAI
composite_rules:
  - id: localai-source-context
    desc: LocalAI source tree context
    crit: baseline
    conf: 0.97
    any:
      - id: localai-source-path
      - id: localai-go-module
  - id: localai-backend-build-context
    desc: LocalAI backend build context
    crit: baseline
    conf: 0.95
    all:
      - id: localai-source-context
      - id: localai-backend-build-path
  - id: localai-ui-build-context
    desc: LocalAI UI build context
    crit: baseline
    conf: 0.95
    all:
      - id: localai-source-context
      - id: localai-ui-build-command
    any:
      - id: localai-react-ui-path
      - id: localai-ui-build-path
  - id: localai-system-capability-context
    desc: LocalAI hardware capability detection context
    crit: baseline
    conf: 0.96
    all:
      - id: localai-source-context
      - id: localai-xsysinfo-path
  - id: localai-locale-translation-context
    desc: LocalAI locale translation helper context
    crit: baseline
    conf: 0.96
    all:
      - id: localai-source-context
      - id: localai-translation-helper-path
