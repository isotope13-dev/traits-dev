# iBB8 is an open-source browser agent extension.  Its debugger/CDP bridge,
# WebSocket transport, and webdriver compatibility code are expected parts of
# its user-facing automation feature; the product identity is kept specific so
# unrelated browser automation is not suppressed.
defaults:
  platforms: [unix, windows]
  for: [javascript, json, chrome-manifest, crx, archives]

traits:
  - id: product-name
    desc: iBB8 browser automation product name
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?i)\biBB8\s*:\s*(AI\s+)?(Web\s+Agent|AI\s+Web)'

  - id: official-store-domain
    desc: iBB8 official store domain
    crit: notable
    conf: 0.99
    if:
      type: literal
      substr: https://ibb8.store

  - id: official-integration-domain
    desc: iBB8 official integration host
    crit: notable
    conf: 0.99
    if:
      type: literal
      substr: hzgm.tech

composite_rules:
  - id: ibb8-browser-extension-context
    desc: Recognized iBB8 browser automation extension
    crit: exception
    conf: 0.99
    scope: outer
    for: [javascript, crx, archives]
    all:
      - id: official-store-domain
      - id: official-integration-domain
