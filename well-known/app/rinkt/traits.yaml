defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.98
  size_max: 120000000

traits:
  - id: manifest-name
    desc: Rinkt browser automation extension name
    if:
      type: value
      path: name
      exact: Rinkt recorder and player
  - id: manifest-description
    desc: Rinkt browser automation extension description
    if:
      type: value
      path: description
      regex: 'Records and plays browser actions\\b'
  - id: native-host-id
    desc: Rinkt native automation host identifier
    for: [javascript]
    if:
      type: string_literal
      exact: rinkt.rpa

composite_rules:
  - id: rpa-extension
    desc: Rinkt browser automation extension
    crit: notable
    conf: 0.99
    for: [javascript, chrome-manifest, crx, archives]
    scope: archive
    all:
      - id: manifest-name
      - id: manifest-description
      - id: native-host-id
