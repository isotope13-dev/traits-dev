defaults:
  platforms: [unix, windows]
  for: [scripts, source, package.json]
  crit: baseline
  conf: 0.95

traits:
  - id: calvyn-package-name
    desc: Calvyn Code package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: calvyn-code
  - id: hermes-agent-installer-url
    desc: Hermes agent installer URL
    for: [python, shell, powershell, javascript, typescript]
    if:
      type: text
      substr: github.com/NousResearch/hermes-agent
  - id: calvyn-security-audit-text
    desc: Calvyn security audit text
    for: [python, shell, powershell, javascript, typescript]
    if:
      type: text
      regex: 'Audit ~/.npmrc|Calvyn|Hermes'
  - id: calvyn-hermes-cli-path
    desc: Calvyn Hermes CLI source path
    for: [scripts, source, python, shell, powershell, javascript, typescript]
    if:
      type: path
      substr: package/hermes_cli
  - id: calvyn-agent-path
    desc: Calvyn agent source path
    for: [scripts, source, python, shell, powershell, javascript, typescript]
    if:
      type: path
      substr: package/agent
  - id: calvyn-gateway-path
    desc: Calvyn gateway source path
    for: [scripts, source, python, shell, powershell, javascript, typescript]
    if:
      type: path
      substr: package/gateway
  - id: calvyn-skills-path
    desc: Calvyn skills source path
    for: [scripts, source, python, shell, powershell, javascript, typescript]
    if:
      type: path
      substr: package/skills
  - id: calvyn-optional-skills-path
    desc: Calvyn optional skills source path
    for: [scripts, source, python, shell, powershell, javascript, typescript]
    if:
      type: path
      substr: package/optional-skills
  - id: calvyn-tools-path
    desc: Calvyn tool source path
    for: [scripts, source, python, shell, powershell, javascript, typescript]
    if:
      type: path
      substr: package/tools
  - id: calvyn-package-scripts-path
    desc: Calvyn package scripts path
    for: [scripts, source, python, shell, powershell, javascript, typescript]
    if:
      type: path
      substr: package/scripts
