defaults:
  platforms: [linux, macos, windows]
  for: [binaries, zip, json]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 200000000
traits:
  - id: vsix-member
    desc: Arm CMSIS csolution extension
    if:
      type: path
      substr: arm.cmsis-csolution
  - id: toolbox-packchk
    desc: CMSIS toolbox packchk binary
    for: [elf, macho, pe]
    if:
      type: basename
      exact: packchk
composite_rules:
  - id: extension-tooling-context
    desc: Arm CMSIS csolution tooling context
    any:
      - id: toolbox-packchk
      - id: vsix-member
