defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, markdown, package.json]
  crit: baseline
  conf: 0.98
  size_min: 0

traits:
  - id: guangnao-agent-cli-package-name
    desc: Guangnao Agent CLI package name
    ref: sha256:e237a3c472ecb02dc4952e7abff4aed07f31d72db7cef2fd13c265843dc65d71
    if:
      type: text
      substr: "@guangnao/agent-cli"
  - id: guangnao-agent-cli-readme-title
    desc: Guangnao Agent CLI README title
    ref: sha256:e237a3c472ecb02dc4952e7abff4aed07f31d72db7cef2fd13c265843dc65d71
    if:
      type: text
      substr: "Agent-cli（`gcli`）"
  - id: guangnao-agent-cli-agentos-marker
    desc: Guangnao Agent CLI AgentOS marker
    ref: sha256:e237a3c472ecb02dc4952e7abff4aed07f31d72db7cef2fd13c265843dc65d71
    if:
      type: text
      substr: "AgentOS terminal CLI"
  - id: guangnao-agent-cli-bundled-cli-marker
    desc: Guangnao Agent CLI bundled command marker
    ref: sha256:e237a3c472ecb02dc4952e7abff4aed07f31d72db7cef2fd13c265843dc65d71
    if:
      type: text
      substr: "agent-cli (gcli)"

composite_rules:
  - id: guangnao-agent-cli-context
    desc: Guangnao Agent CLI application context
    crit: notable
    conf: 0.98
    ref: sha256:e237a3c472ecb02dc4952e7abff4aed07f31d72db7cef2fd13c265843dc65d71
    any:
      - id: guangnao-agent-cli-package-name
      - id: guangnao-agent-cli-readme-title
      - id: guangnao-agent-cli-agentos-marker
      - id: guangnao-agent-cli-bundled-cli-marker
