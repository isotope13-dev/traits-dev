defaults:
  platforms: [windows, unix]
traits:
  - id: pypi-package-name
    desc: AuraPL Python package metadata
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: text
      regex: '(?mi)^Name:\s*aurapl\s*$'

  - id: command-banner
    desc: AuraPL command interface banner
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: '------AURAPL------'
