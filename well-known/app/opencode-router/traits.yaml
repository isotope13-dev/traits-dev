defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, shell]
  crit: component
  conf: 0.95

traits:
  - id: package-name
    desc: opencode-router package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: opencode-router

  - id: package-description
    desc: opencode-router package description
    for: [package.json]
    if:
      type: value
      path: description
      substr: "Slack + Telegram bridge"

  - id: repository-directory
    desc: opencode-router repository directory
    for: [package.json]
    if:
      type: value
      path: repository.directory
      exact: apps/opencode-router

  - id: config-directory
    desc: opencode-router config directory
    if:
      type: text
      substr: ".openwork/opencode-router"

  - id: env-prefix
    desc: opencode-router env prefix
    if:
      type: text
      substr: OPENCODE_ROUTER_

  - id: installer-url
    desc: opencode-router installer URL
    if:
      type: text
      substr: raw.githubusercontent.com/different-ai/openwork/dev/apps/opencode-router/install.sh

  - id: telegram-adapter
    desc: opencode-router Telegram adapter
    for: [javascript, typescript]
    if:
      type: symbol
      exact: createTelegramAdapter

  - id: slack-adapter
    desc: opencode-router Slack adapter
    for: [javascript, typescript]
    if:
      type: symbol
      exact: createSlackAdapter

  - id: agent-path
    desc: opencode-router agent path
    for: [javascript, typescript]
    if:
      type: text
      substr: .opencode/agents/opencode-router.md

  - id: cli-name
    desc: opencode-router CLI name
    for: [javascript, typescript]
    if:
      type: text
      substr: '.name("opencode-router")'

composite_rules:
  - id: package-context
    desc: opencode-router package context
    crit: component
    conf: 0.98
    all:
      - id: package-name
    any:
      - id: package-description
      - id: repository-directory

  - id: runtime-context
    desc: opencode-router runtime context
    crit: component
    conf: 0.95
    any:
      - id: package-context
      - id: config-directory
      - id: env-prefix
      - id: installer-url
      - id: telegram-adapter
      - id: slack-adapter
      - id: agent-path
      - id: cli-name
