defaults:
  platforms: [windows]
  crit: notable
  conf: 0.96
  size_max: 2147483648

traits:
  - id: windows-portable-archive
    desc: VLC Windows portable archive
    for: [archive, pe, javascript]
    if:
      type: path
      regex: '(?i)vlc-[0-9][^\\/]*win(32|64)[^\\/]*\.7z$'
  - id: nsis-vlc-exe-name
    desc: VLC executable name inside NSIS installer
    crit: component
    for: [pe]
    if:
      type: text
      substr: vlc.exe
      section: .rdata
  - id: nsis-libvlc-name
    desc: VLC library name inside NSIS installer
    crit: component
    for: [pe]
    if:
      type: text
      substr: libvlc.dll
      section: .rdata
  - id: nsis-access-plugin-path
    desc: VLC access plugin path inside NSIS installer
    crit: component
    for: [pe]
    if:
      type: text
      substr: plugins/access/libaccess_
      section: .rdata

composite_rules:
  - id: windows-nsis-bundle
    desc: VLC Windows NSIS installer bundle
    for: [pe]
    all:
      - id: metadata/binary/installer/script::nsis-manifest-exehead
    any:
      - id: nsis-vlc-exe-name
      - id: nsis-libvlc-name
      - id: nsis-access-plugin-path
    needs: 2
