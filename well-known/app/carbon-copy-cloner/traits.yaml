defaults:
  platforms: [macos]
  for: [macho, plist, shell, scripts, data, archives, zip]
  crit: component
  conf: 0.99

traits:
  - id: bombich-signing-team
    desc: Bombich Apple signing team
    for: [macho]
    size_min: 4096
    size_max: 600000000
    if:
      type: value
      path: macho.code_signature.team_id
      exact: L4F2DED5Q7

  - id: carbon-copy-cloner-bundle-path
    desc: Carbon Copy Cloner bundle path
    for: [macho, plist, shell, data]
    size_min: 128
    size_max: 600000000
    if:
      type: path
      substr: Carbon Copy Cloner.app

  - id: carbon-copy-cloner-bundle-marker
    desc: Carbon Copy Cloner bundle marker
    for: [macho, plist, shell, data]
    size_min: 128
    size_max: 600000000
    if:
      type: text
      substr: com.bombich.ccc

composite_rules:
  - id: official-carbon-copy-cloner-member
    desc: Official Carbon Copy Cloner member
    crit: notable
    any:
      - id: bombich-signing-team
      - id: carbon-copy-cloner-bundle-path
      - id: carbon-copy-cloner-bundle-marker
