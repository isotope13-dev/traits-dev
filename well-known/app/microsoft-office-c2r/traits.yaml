defaults:
  size_max: 2097152
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: office-c2r-common-name
    desc: Office C2R common component
    crit: component
    conf: 0.98
    if:
      type: hex
      section: .text
      pattern: "4D 69 63 72 6F 73 6F 66 74 2E 54 6F 6F 6C 73 2E 4F 66 66 69 63 65 2E 43 32 52"

  - id: office-deployment-component-string
    desc: Microsoft Office deployment component
    crit: component
    conf: 0.98
    if:
      type: hex
      section: .text
      pattern: "4D 69 63 72 6F 73 6F 66 74 20 4F 66 66 69 63 65 20 44 65 70 6C 6F 79 6D 65 6E 74 20 43 6F 6D 70 6F 6E 65 6E 74"

composite_rules:
  - id: microsoft-office-c2r-common
    desc: Microsoft Office C2R common component
    crit: notable
    conf: 0.99
    all:
      - id: office-c2r-common-name
      - id: office-deployment-component-string
