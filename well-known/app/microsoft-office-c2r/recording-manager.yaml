defaults:
  size_max: 4194304
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.98

traits:
  - id: skype-recording-manager-description
    desc: Skype Recording Manager description
    if:
      type: value
      path: pe.version.description
      exact: Skype for Business Recording Manager 2015

  - id: ocpubmgr-original-filename
    desc: Recording Manager original filename
    if:
      type: value
      path: pe.version.original_filename
      exact: OcPubMgr.exe

  - id: office-2016-product-name
    desc: Microsoft Office 2016 product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: Microsoft Office 2016

  - id: ocrec-delay-load-library
    desc: Office recording engine dependency
    if:
      type: text
      exact: ocrec.dll
      section: .rdata

composite_rules:
  - id: skype-business-recording-manager
    desc: Skype for Business Recording Manager
    crit: notable
    conf: 0.995
    all:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: skype-recording-manager-description
      - id: ocpubmgr-original-filename
      - id: office-2016-product-name
      - id: ocrec-delay-load-library
