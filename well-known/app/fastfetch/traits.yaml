defaults:
  platforms: [windows]
  for: [pe, dll, archive]
  crit: component
  conf: 0.98
  size_max: 200000000
traits:
  - id: fastfetch-windows-archive
    desc: fastfetch Windows archive
    if:
      type: path
      basename: true
      regex: '(?i)^fastfetch.*windows.*amd64.*\.7z$'
  - id: fastfetch-windows-executable
    desc: fastfetch Windows executable
    if:
      type: path
      basename: true
      regex: '(?i)^f(ast|lash)fetch\.exe$'
      case_insensitive: true
  - id: fastfetch-vulkan-loader
    desc: fastfetch bundled Vulkan loader
    if:
      type: path
      regex: '(?i)fastfetch.*vulkan-1\.dll$'
composite_rules:
  - id: fastfetch-windows-component
    desc: fastfetch Windows component
    any:
      - id: well-known/app/fastfetch
