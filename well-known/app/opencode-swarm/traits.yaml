defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, markdown]
  crit: baseline
  conf: 0.99

traits:
  - id: package-name
    desc: OpenCode Swarm package identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: opencode-swarm

  - id: restricted-executor-marker
    desc: OpenCode Swarm restricted-executor marker
    crit: notable
    for: [javascript, typescript]
    if:
      type: text
      substr: src/sandbox/win32/restricted-environment-executor.ts

  - id: guardrail-declaration-marker
    desc: OpenCode Swarm guardrail declaration marker
    crit: notable
    for: [javascript, typescript]
    if:
      type: text
      substr: Destructive Command Protection Subsystem

  - id: archive-evidence-marker
    desc: OpenCode Swarm evidence-retention archive marker
    crit: notable
    for: [javascript, typescript]
    if:
      type: symbol
      exact: archiveEvidence

  - id: package-config-marker
    desc: OpenCode Swarm config filename marker
    crit: notable
    for: [javascript, typescript, markdown]
    if:
      type: text
      substr: opencode-swarm.json
