defaults:
  size_max: 3145728
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

traits:
  - id: clickyes-product-versioninfo
    desc: ClickYes Pro product version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.product_name
      exact: ClickYes Pro 2010

  - id: contextmagic-company-versioninfo
    desc: ContextMagic company version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.company
      exact: ContextMagic.com Software

  - id: clickyes-outlook-security-description
    desc: ClickYes Outlook security tool description
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.description
      exact: Security configuration tool for Microsoft Outlook

  - id: clickyes-original-filename
    desc: ClickYes Pro original filename
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.original_filename
      exact: ClickYesPro.exe

composite_rules:
  - id: contextmagic-clickyes-pro
    desc: ContextMagic ClickYes Pro application
    crit: notable
    conf: 0.99
    all:
      - id: clickyes-product-versioninfo
      - id: contextmagic-company-versioninfo
    any:
      - id: clickyes-outlook-security-description
      - id: clickyes-original-filename
