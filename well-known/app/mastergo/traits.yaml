defaults:
  platforms: [unix]
  for: [javascript, typescript, macho, dylib, binaries, scripts]
  crit: notable
  conf: 0.98
  size_min: 1024
  size_max: 600000000

traits:
  - id: mastergo-app-path
    desc: MasterGo application bundle path
    if:
      type: path
      regex: '(^|[/\\])MasterGo\.app([/\\]|$)'
  - id: mastergo-brand-text
    desc: MasterGo product identity in file content
    if:
      type: text
      substr: MasterGo
  - id: mastergo-resources-path
    desc: MasterGo resources bundle path
    if:
      type: path
      regex: 'MasterGo\.app[/\\]Contents[/\\]Resources\b'
  - id: mastergo-frameworks-path
    desc: MasterGo framework bundle path
    if:
      type: path
      regex: 'MasterGo\.app[/\\]Contents[/\\]Frameworks\b'
composite_rules:
  - id: mastergo-application-context
    desc: Recognized MasterGo application context
    crit: exception
    scope: archive
    all:
      - id: mastergo-app-path
    any:
      - id: mastergo-resources-path
      - id: mastergo-frameworks-path
