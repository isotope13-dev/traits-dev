defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: human-security-copyright
    desc: HUMAN Security client copyright marker
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: 'Copyright \(C\) 20\d{2}-20\d{2} HUMAN Security, Inc'

  - id: px-cloud-endpoint
    desc: HUMAN Security px-cloud endpoint
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(collector|captcha|ift)\.px-(cloud|cdn)\.net'

composite_rules:
  - id: human-security-antibot-client
    desc: HUMAN Security anti-bot client
    crit: exception
    conf: 0.99
    any:
      - id: human-security-copyright
      - id: px-cloud-endpoint
