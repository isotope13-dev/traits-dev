defaults:
  platforms: [windows]
  for: [pe]
  size_max: 10485760
  crit: notable
  conf: 0.99

traits:
  - id: verified-goto-signer
    desc: Verified GoTo Technologies USA code signer
    if:
      type: value
      path: pe.signatures[0].subject
      regex: 'GoTo Technologies USA\\, LLC'

  - id: product-version
    desc: LogMeIn Rescue PE product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: LogMeIn Rescue

  - id: original-filename
    desc: LogMeIn Rescue executable filename metadata
    if:
      type: value
      path: pe.version.original_filename
      exact: LMIRescue.exe

composite_rules:
  - id: logmein-rescue
    desc: Verified LogMeIn Rescue application identity
    crit: notable
    conf: 0.99
    all:
      - id: verified-goto-signer
      - id: product-version
    any:
      - id: original-filename
