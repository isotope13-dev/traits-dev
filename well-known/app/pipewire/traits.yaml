defaults:
  platforms: [linux]
  for: [elf]
  crit: notable
  conf: 0.99
  size_max: 10485760

traits:
  - id: pw-container-source-path
    desc: PipeWire pw-container source path
    if:
      type: text
      section: .rodata
      exact: ../src/tools/pw-container.c

  - id: pipewire-security-context-interface
    desc: PipeWire security context interface marker
    if:
      type: text
      section: .rodata
      exact: PipeWire:Interface:SecurityContext

composite_rules:
  - id: pw-container-binary
    desc: PipeWire pw-container utility identity
    all:
      - id: pw-container-source-path
      - id: pipewire-security-context-interface
