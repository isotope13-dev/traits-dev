defaults:
  platforms: [unix, windows]
  for: [gem]
  crit: notable
  conf: 0.99

traits:
  - id: gem-name
    desc: RubyEverywhere gem package name
    if:
      type: value
      path: gem.name
      exact: ruby_everywhere

  - id: gem-homepage
    desc: RubyEverywhere project homepage
    if:
      type: value
      path: gem.homepage
      exact: https://rubyeverywhere.com

  - id: hosted-runner-class
    desc: RubyEverywhere hosted runner class
    for: [ruby]
    if:
      type: text
      substr: 'class PlatformRunner'

  - id: hosted-runner-api-path
    desc: RubyEverywhere hosted runner API path
    for: [ruby]
    if:
      type: text
      substr: 'runner/artifacts/'

  - id: release-command-reference
    desc: RubyEverywhere release command reference
    for: [ruby]
    if:
      type: text
      substr: 'every release'

composite_rules:
  - id: hosted-build-runner-source
    desc: RubyEverywhere hosted build runner source
    crit: notable
    conf: 0.99
    for: [ruby]
    all:
      - id: hosted-runner-class
      - id: hosted-runner-api-path
      - id: release-command-reference

  - id: ruby-everywhere-package-context
    desc: RubyEverywhere package with hosted build runner
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: gem-name
      - id: gem-homepage
      - id: hosted-build-runner-source
