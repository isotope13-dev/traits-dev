defaults:
  platforms: [unix]
  for: [source, python, pyc, shell, text, zip, tar]
  size_max: 268435456
  crit: notable
  conf: 0.96

traits:
  - id: source-tree
    desc: Azure Linux Agent source tree
    if:
      type: path
      regex: 'WALinuxAgent-[0-9]|azurelinuxagent'

  - id: python-shim-script
    desc: Azure Linux Agent Python shim
    for: [shell]
    if:
      type: text
      substr: "Executes its arguments using the 'python' command"
