defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json, package.json, archives]
  crit: notable
  conf: 0.99

traits:
  - id: canopy-wallet-source-tree
    desc: Canopy wallet source-tree context
    if:
      type: path
      substr: canopy-network/canopy

  - id: canopy-wallet-package-identity
    desc: Canopy wallet package identity
    if:
      type: text
      substr: '"name": "canopy-wallet"'

composite_rules:
  - id: canopy-wallet-app-context
    desc: Canopy wallet application context
    crit: exception
    conf: 0.99
    any:
      - id: canopy-wallet-source-tree
      - id: canopy-wallet-package-identity
