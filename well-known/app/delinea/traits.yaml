defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.98
  size_min: 50000
  size_max: 1000000

traits:
  - id: centrify-management-services-description
    desc: Centrify Management Services product description
    if:
      type: value
      path: pe.version.description
      exact: Centrify Management Services

  - id: centrify-management-services-company
    desc: Delinea Centrify version company
    if:
      type: value
      path: pe.version.company
      exact: Delinea Inc.

  - id: centrify-management-services-version
    desc: Centrify Management Services version 5.4.3.815
    if:
      type: value
      path: pe.version.file_version
      exact: 5.4.3.815

composite_rules:
  - id: centrify-management-services-benign-context
    desc: Known-good Centrify Management Services helper context
    crit: exception
    all:
      - id: centrify-management-services-description
      - id: centrify-management-services-company
      - id: centrify-management-services-version
    # Version-resource claims alone are spoofable; AutoIt-compiled images that
    # wear Centrify identity are not the known-good helper.
    unless:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: metadata/lang/compiled::autoit-resource-magic
