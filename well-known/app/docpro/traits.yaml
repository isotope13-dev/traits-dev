defaults:
  platforms: [unix, windows]
  for: [javascript, chrome-manifest, xpi, archives]
  crit: notable
  conf: 0.99
  size_min: 1
  size_max: 200000000

traits:
  - id: manifest-name
    desc: DocPro clinical documentation extension name
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: DocPro

  - id: mdland-api-domain
    desc: DocPro MDLand API service domain
    for: [javascript]
    if:
      type: text
      regex: 'https://.{0,80}docpro\.health\b'

  - id: mdland-api-xor-helper
    desc: DocPro MDLand API reversible token codec
    for: [javascript]
    if:
      type: text
      regex: '\bdocpro(Encrypt|Decrypt)\s*:'
