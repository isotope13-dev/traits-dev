defaults:
  platforms: [android]
  crit: notable
  conf: 0.96

traits:
  - id: android-apk
    desc: NekoBox for Android APK
    for: [archive, apk]
    size_min: 10485760
    size_max: 209715200
    if:
      type: basename
      regex: '(?i).*?(NekoBoxForAndroid|NekoBox)-[0-9][^\\/]*\.apk$'
  - id: sing-box-runtime-text
    desc: NekoBox sing-box runtime text
    for: [elf]
    size_min: 1048576
    size_max: 104857600
    if:
      type: text
      substr: NewSingBoxInstance
      section: .rodata
