defaults:
  platforms: [unix, windows]
  for: [python, pyc, whl, archives]
  crit: notable
  conf: 0.98

traits:
  - id: source-header
    desc: Keeper Commander source header
    if:
      type: text
      substr: "# Keeper Commander"

  - id: package-module-path
    desc: Keeper Commander package module path
    if:
      type: path
      regex: '(?i)(^|[/\\])keepercommander([/\\]|$)'

composite_rules:
  - id: official-package-source
    desc: Keeper Commander package source
    crit: notable
    conf: 0.99
    all:
      - id: source-header
      - id: package-module-path
