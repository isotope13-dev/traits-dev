# FreeAct is a user-facing browser automation CLI. Its package metadata and
# browser-agent modules identify a coherent automation tool, so its deliberate
# anti-bot compatibility code is benign product functionality rather than a
# covert security-bypass payload.
defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl, archives]
  crit: notable
  conf: 0.99
  size_max: 100000000

traits:
  - id: freeact-package-name
    desc: FreeAct CLI package name
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Name:\s*freeact-cli\s*$'

  - id: freeact-package-summary
    desc: FreeAct browser-agent package summary
    for: [pkginfo]
    if:
      type: text
      substr: Free Browser Agent CLI

  - id: freeact-browser-agent-module
    desc: FreeAct browser-agent module path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])freeact[\\/](browser|live|stealth)\.py$'

composite_rules:
  - id: freeact-browser-agent-context
    desc: Recognized FreeAct browser automation package
    crit: exception
    conf: 0.99
    for: [whl, archives]
    scope: archive
    all:
      - id: freeact-package-name
      - id: freeact-package-summary
