# FreeAct identifies itself as undetectable browser automation, includes
# fingerprint/automation masking, and solves multiple anti-bot challenges.
# Those are tool identity and behavior signals, not a benign suppression
# context: the package's stated purpose is to defeat site anti-bot controls.
defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl, archives]
  crit: notable
  conf: 0.99
  size_max: 100000000

traits:
  - id: freeact-package-name
    desc: FreeAct CLI package name
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Name:\s*freeact-cli\s*$'

  - id: freeact-package-summary
    desc: FreeAct browser-agent package summary
    for: [pkginfo]
    if:
      type: text
      substr: Free Browser Agent CLI

  - id: freeact-browser-agent-module
    desc: FreeAct browser-agent module path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])freeact[\\/](browser|live|stealth)\.py$'

composite_rules:
  - id: freeact-package-identity
    desc: FreeAct undetectable browser automation package
    crit: notable
    conf: 0.99
    for: [whl, archives]
    scope: archive
    all:
      - id: freeact-package-name
      - id: freeact-package-summary
