defaults:
  platforms: [windows]
  for: [pe]
  size_max: 209715200
  crit: notable
  conf: 0.96
traits:
  - id: logitech-signer
    crit: notable
    desc: Logitech Authenticode signer
    if:
      type: value
      path: pe.signatures[0].subject
      regex: 'Logitech'
  - id: logitech-ghub-library-name
    crit: notable
    desc: Logitech G HUB library name
    if:
      type: path
      regex: '(^|[\\/])Logitech_(G_HUB_Install|Codecs)_Library([\\/]|$)'
composite_rules:
  - id: logitech-ghub-installer-bundle
    crit: notable
    desc: Logitech G HUB installer bundle
    any:
      - id: logitech-signer
      - id: logitech-ghub-library-name
