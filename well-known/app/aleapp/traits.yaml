# ALEAPP (Android Logs, Events, and Artifacts Parser) forensic application.
# This identity is used only to suppress malware-intent composites when they
# match ALEAPP's legitimate artifact-decryption and database-parsing code.
defaults:
  platforms: [unix, windows]
  for: [python, javascript, text]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 268435456

traits:
  - id: aleapp-source-tree
    desc: ALEAPP forensic source tree path
    if:
      type: path
      substr: abrignoni/ALEAPP@
