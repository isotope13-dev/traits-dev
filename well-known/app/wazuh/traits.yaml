# Wazuh's upstream source tree contains legitimate installers, SELinux policy
# setup, boot integration, and active-response route management.
defaults:
  platforms: [unix, windows]
  for: [scripts, source, documents, data, zip]
  crit: notable
  conf: 0.99

traits:
  - id: source-tree
    desc: Wazuh ossec source-tree path
    if:
      type: path
      substr: ossec-wazuh@v
  - id: source-archive
    desc: Wazuh ossec source archive
    for: [zip]
    if:
      type: basename
      regex: '^github\.com-wazuh-ossec-wazuh-v[0-9][0-9.]*\+incompatible\.zip$'

composite_rules:
  - id: source-context
    desc: Wazuh upstream source context
    any:
      - id: source-tree
      - id: source-archive
