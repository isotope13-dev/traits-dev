# p1c2u Docker Compose VS Code extension
defaults:
  platforms: [windows, unix]
  for: [javascript, package.json, vsix-manifest, json]
  crit: notable
  conf: 0.98
  size_max: 5000000

traits:
  - id: publisher-p1c2u
    desc: p1c2u VS Code extension publisher
    if:
      type: text
      regex: '"publisher"\s*:\s*"p1c2u"'

  - id: github-repo-url
    desc: vscode-docker-compose GitHub repository URL
    if:
      type: text
      substr: github.com/p1c2u/vscode-docker-compose

  - id: display-name
    desc: Docker Compose VS Code displayName
    if:
      type: text
      regex: '"displayName"\s*:\s*"Docker Compose"'

composite_rules:
  - id: extension-context
    desc: p1c2u Docker Compose VS Code extension
    all:
      - id: publisher-p1c2u
      - id: github-repo-url
