defaults:
  platforms: [unix, windows]

traits:
  - id: pypi-package-name
    desc: Nodpy Python package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: nodpy
  - id: jupyter-extension-package-name
    desc: Nod JupyterLab extension package identity
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: nod
  - id: upstream-repository
    desc: Nod upstream repository reference
    crit: notable
    conf: 0.99
    for: [pkginfo, package.json, python, javascript, typescript, markdown]
    if:
      type: text
      substr: github.com/erawn/nod
  - id: jupyter-nod-runtime-marker
    desc: Nod Jupyter runtime marker
    crit: notable
    conf: 0.99
    for: [python, javascript, typescript, package.json]
    if:
      type: text
      regex: 'NodProvisioner|nodpy|Put a Notebook Anywhere'

composite_rules:
  - id: nodpy-package-context
    desc: Recognized Nodpy Jupyter debugger package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: pypi-package-name
    any:
      - id: upstream-repository
      - id: jupyter-nod-runtime-marker
