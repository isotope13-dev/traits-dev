defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: litellm-package-path
    desc: LiteLLM package path
    crit: notable
    for: [python, javascript, typescript, text]
    if:
      type: path
      regex: '(^|[\\/])litellm([\\/]|-|$)'
