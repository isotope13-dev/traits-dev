defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, npm, tar, markdown]
  crit: notable
  conf: 0.99

traits:
  - id: package-member-context
    desc: Freddie package member
    for: [javascript, typescript, package.json, markdown]
    if:
      type: value
      path: package.json::name
      exact: freddie
  - id: archive-package-context
    desc: Freddie npm archive package identity
    for: [npm, tar]
    if:
      type: value
      path: npm.name
      exact: freddie
  - id: archive-repository-context
    desc: Freddie npm archive repository
    for: [npm, tar]
    if:
      type: value
      path: npm.repository.url
      exact: git+https://github.com/AnEntrypoint/freddie.git
  - id: gateway-name-marker
    desc: Freddie gateway name marker
    for: [javascript, typescript]
    if:
      type: text
      substr: freddie-gateway

composite_rules:
  - id: benign-archive-context
    desc: Recognized Freddie npm archive
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: archive-package-context
      - id: archive-repository-context
  - id: gateway-service-context
    desc: Recognized Freddie gateway service
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: gateway-name-marker
      - id: micro-behaviors/os/service/config::systemd-keyword
