defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl, text]
  crit: baseline
  conf: 0.95

traits:
  - id: package-metadata
    desc: 2B agent package metadata
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: 2b-agent
  - id: python-package-path
    desc: 2B agent Python package path
    for: [python]
    if:
      type: path
      substr: two_b/

composite_rules:
  - id: package-context
    desc: 2B agent package context
    crit: notable
    conf: 0.98
    any:
      - id: package-metadata
      - id: python-package-path
