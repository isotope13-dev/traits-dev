defaults:
  platforms: [unix, windows]
  for: [pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-metadata
    desc: spotify_monitor package metadata
    for: [pkginfo]
    if:
      type: text
      regex: '(?m)^Name:\s*spotify_monitor\s*$'
  - id: debug-secret-extractor
    desc: Spotify Web Player TOTP secret extractor
    for: [python]
    if:
      type: text
      substr: Automatic extractor for secret keys used for TOTP generation in Spotify Web Player JavaScript bundles
  - id: secret-grabber-script
    desc: spotify_monitor secret grabber debug script
    for: [python]
    if:
      type: path
      basename: true
      exact: spotify_monitor_secret_grabber.py
  - id: totp-test-script
    desc: spotify_monitor TOTP test script
    for: [python]
    if:
      type: path
      basename: true
      exact: spotify_monitor_totp_test.py
