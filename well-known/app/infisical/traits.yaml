# Identity for the official Infisical CLI source/npm package.  The PAM
# handlers intentionally terminate one authenticated protocol and initiate
# another with configured credentials; this is a benign broker pattern, not a
# backdoor.  The identity is archive-scoped and is used only by exclusions.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.99

traits:
  - id: infisical-cli-package-name
    desc: Infisical CLI npm package name
    if:
      type: value
      path: name
      exact: '@infisical/cli'

  - id: infisical-cli-repository
    desc: Infisical CLI source repository
    if:
      type: value
      path: repository.url
      regex: '(?i)github\.com/Infisical/cli(\.git)?$'

composite_rules:
  - id: infisical-cli-pam-context
    desc: Official Infisical CLI PAM broker context
    crit: exception
    conf: 0.99
    for: [go, package.json]
    scope: archive
    all:
      - id: infisical-cli-package-name
      - id: infisical-cli-repository
