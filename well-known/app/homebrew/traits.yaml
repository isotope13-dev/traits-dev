defaults:
  platforms: [unix]
  for: [ruby, shell, text, source, archives]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: source-tree
    desc: Homebrew source tree
    if:
      type: path
      regex: '(?i)(linuxbrew|homebrew-core)(@|[/\\])'

  - id: cask-source-tree
    desc: Homebrew cask source tree
    if:
      type: path
      regex: 'Homebrew[\\/]cask'

  - id: source-tree-macos
    desc: Homebrew source tree on macOS rule surfaces
    platforms: [macos]
    if:
      type: path
      regex: 'Library[\\/]Homebrew'
