# Identity markers for the published RemotePower fleet-management project.
# These are specific to the source release and are used only to avoid treating
# its documented management features and test fixtures as RAT or stealer code.
defaults:
  platforms: [unix, windows]
  for: [python, javascript]
  crit: notable
  conf: 0.99

traits:
  - id: api-backend-identity
    desc: RemotePower API backend source identity
    if:
      type: text
      substr: "RemotePower API backend - v1.9.0"

  - id: windows-agent-identity
    desc: RemotePower Windows agent source identity
    for: [python]
    if:
      type: text
      substr: "RemotePower — Windows agent."

  - id: release-tree-member-path
    desc: RemotePower 6.2.2 release-tree member
    if:
      type: path
      regex: '(^|/)remotepower-6\.2\.2/'

  - id: release-product-marker
    desc: RemotePower product source marker
    if:
      type: text
      regex: '(?i)RemotePower|remotepower'

  - id: release-test-fixture-path
    desc: RemotePower release test fixture path
    if:
      type: path
      regex: '(^|/)tests?/'

  - id: archive-api-member
    desc: RemotePower API member in release archive
    for: [tar]
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)server/cgi-bin/api\.py$'

  - id: archive-windows-agent-member
    desc: RemotePower Windows agent archive member
    for: [tar]
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)client/remotepower-agent-win\.py$'

composite_rules:
  - id: documented-rmm-release-context
    desc: Published RemotePower release member context
    crit: exception
    conf: 0.99
    for: [tar]
    scope: archive
    all:
      - id: well-known/app/remotepower::archive-api-member
      - id: well-known/app/remotepower::archive-windows-agent-member
