# Benign John the Ripper source context.  The source intentionally loads
# password databases and runs cryptographic benchmarks as part of its
# password-cracking tool functionality.
defaults:
  platforms: [unix, windows]
  for: [c, cpp, shell, zip]
  crit: notable
  conf: 0.98

traits:
  - id: repository-path-identity
    desc: John the Ripper repository path
    if:
      type: path
      regex: '(?i)johntheripper'

  - id: source-banner
    desc: John the Ripper source banner
    if:
      type: text
      substr: John the Ripper password cracker

composite_rules:
  - id: john-source-context
    desc: Recognized John the Ripper source context
    crit: exception
    conf: 0.99
    all:
      - id: repository-path-identity
      - id: source-banner
