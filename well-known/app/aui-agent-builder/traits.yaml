defaults:
  platforms: [unix, windows]
  for: [scripts, source, manifests, data]
  crit: notable
  conf: 0.98
  size_min: 1

traits:
  - id: package-name
    desc: AUI Agent Builder package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: aui-agent-builder

  - id: package-member-context
    desc: AUI Agent Builder package member
    for: [javascript, typescript, package.json, markdown]
    if:
      type: value
      path: package.json::name
      exact: aui-agent-builder

  - id: backend-api-client
    desc: AUI backend API client source
    for: [javascript, typescript]
    if:
      type: text
      substr: AUI Backend API Client

  - id: rag-api-client
    desc: AUI RAG API client source
    for: [javascript, typescript]
    if:
      type: text
      substr: "'x-aui-client': 'AUI'"

  - id: update-notifier
    desc: AUI update notifier source
    for: [javascript, typescript]
    if:
      type: text
      substr: https://registry.npmjs.org/aui-agent-builder/latest

  - id: generated-web-ui-bundle
    desc: AUI generated web UI bundle
    for: [javascript]
    size_min: 1000000
    if:
      type: text
      substr: aui-frontend-hub

  - id: source-archive-path
    desc: AUI Agent Builder archive path
    if:
      type: path
      substr: aui-agent-builder-
