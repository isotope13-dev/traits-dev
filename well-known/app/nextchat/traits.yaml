# NextChat — LLM chat UI. Prompt-fetch script + mirror URL, benign FP context.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript]
traits:
  - id: nextchat-prompt-fetch-basename
    desc: NextChat prompt fetch basename
    crit: component
    conf: 0.95
    if:
      type: value
      path: file.basename
      exact: fetch-prompts.mjs
  - id: nextchat-prompt-mirror-url
    desc: NextChat prompt mirror URL
    crit: component
    conf: 0.95
    if:
      type: text
      substr: raw.fgit.ml
composite_rules:
  - id: nextchat-prompt-fetch-script
    desc: NextChat prompt fetch script
    crit: notable
    conf: 0.98
    all:
      - id: nextchat-prompt-fetch-basename
      - id: nextchat-prompt-mirror-url
