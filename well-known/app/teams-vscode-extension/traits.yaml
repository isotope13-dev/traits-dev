defaults:
  platforms: [unix, windows]
  for: [vsix-manifest, javascript, json]
  crit: baseline
  conf: 0.98

traits:
  - id: teams-vscode-extension-id
    desc: Microsoft Teams VS Code extension
    if:
      type: text
      substr: TeamsDevApp.ms-teams-vscode-extension
  - id: teams-vscode-package-name
    desc: Teams toolkit package name
    if:
      type: value
      path: name
      regex: '(?i)teams'

composite_rules:
  - id: teams-vscode-extension
    desc: Microsoft Teams VS Code extension
    crit: notable
    conf: 0.98
    any:
      - id: teams-vscode-extension-id
      - id: teams-vscode-package-name
