# reStylist is a browser extension that sends selected person/product images
# to the named Hugging Face virtual try-on service. Its fetch of the service's
# queue endpoint is application traffic, not payload delivery.
defaults:
  platforms: [unix, windows]
  for: [chrome-manifest, crx, javascript]
  crit: notable
  conf: 0.99

traits:
  - id: manifest-name
    desc: reStylist virtual try-on manifest name
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: reStylist – Free AI Virtual Try On 👗

  - id: virtual-try-on-service
    desc: reStylist Hugging Face virtual try-on service
    for: [javascript]
    if:
      type: text
      substr: https://kwai-kolors-kolors-virtual-try-on.hf.space

  - id: virtual-try-on-workflow
    desc: reStylist virtual try-on workflow marker
    for: [javascript]
    if:
      type: symbol
      kind: function
      exact: performVirtualTryOn

  - id: virtual-try-on-session
    desc: reStylist virtual try-on session marker
    for: [javascript]
    if:
      type: symbol
      kind: identifier
      exact: session_hash

composite_rules:
  - id: extension-context
    desc: Recognized reStylist virtual try-on extension
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: manifest-name
      - id: virtual-try-on-service

  - id: workflow-script-context
    desc: Recognized reStylist virtual try-on script
    crit: exception
    conf: 0.99
    for: [javascript]
    all:
      - id: virtual-try-on-service
      - id: virtual-try-on-workflow
      - id: virtual-try-on-session
