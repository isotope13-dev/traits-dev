defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.99
  size_min: 50000
  size_max: 5000000

traits:
  - id: product-name
    desc: NVDA screen reader product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: NVDA (NonVisual Desktop Access)

  - id: company-name
    desc: NV Access product vendor metadata
    if:
      type: value
      path: pe.version.company
      exact: NV Access

composite_rules:
  - id: nvda-windows-binary
    desc: NVDA Windows executable identity
    crit: notable
    conf: 0.995
    all:
      - id: product-name
      - id: company-name
