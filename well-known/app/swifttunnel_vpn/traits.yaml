defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.95
  size_min: 100000
  size_max: 50000000

traits:
  - id: swifttunnel-brand
    desc: SwiftTunnel - Roblox brand string
    if:
      type: text
      substr: "SwiftTunnel - Roblox"
      section: .rdata

  - id: core-path-optimizer
    desc: SwiftTunnel core path roblox_optimizer
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\roblox_optimizer.rs"
      section: .rdata

  - id: core-path-auto-routing
    desc: SwiftTunnel core path auto_routing
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\auto_routing.rs"
      section: .rdata

  - id: core-path-split-tunnel
    desc: SwiftTunnel core path split_tunnel
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\split_tunnel.rs"
      section: .rdata

  - id: core-path-udp-relay
    desc: SwiftTunnel core path udp_relay
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\udp_relay.rs"
      section: .rdata

  - id: core-path-parallel-interceptor
    desc: SwiftTunnel core path parallel_interceptor
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\parallel_interceptor.rs"
      section: .rdata

  - id: core-path-wfp-block
    desc: SwiftTunnel core path wfp_block
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\wfp_block.rs"
      section: .rdata

  - id: core-path-discord-rpc
    desc: SwiftTunnel core path discord_rpc
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\discord_rpc\\manager.rs"
      section: .rdata

  - id: core-path-geolocation
    desc: SwiftTunnel core path geolocation
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\geolocation.rs"
      section: .rdata

  - id: core-path-process-watcher
    desc: SwiftTunnel core path process_watcher
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\process_watcher.rs"
      section: .rdata

  - id: core-path-process-performance
    desc: SwiftTunnel core path process_performance
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\process_performance.rs"
      section: .rdata

  - id: core-path-utils
    desc: SwiftTunnel core path utils
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\utils.rs"
      section: .rdata

  - id: core-path-auth-http-client
    desc: SwiftTunnel core path auth_http_client
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\auth\\http_client.rs"
      section: .rdata

  - id: core-path-vpn-servers
    desc: SwiftTunnel core path vpn_servers
    crit: component
    if:
      type: text
      substr: "swifttunnel-core\\src\\vpn\\servers.rs"
      section: .rdata

  - id: swifttunnel-msi-filename
    desc: wiresock NDIS driver MSI filename
    crit: component
    if:
      type: text
      substr: "Windows.Packet.Filter.3.6.2.1.x64.msi"
      section: .rdata

  - id: swifttunnel-wiresock-url-x64
    desc: wiresock NDIS x64 MSI URL
    crit: component
    if:
      type: text
      exact: "https://github.com/wiresock/ndisapi/releases/download/v3.6.2/Windows.Packet.Filter.3.6.2.1.x64.msi"
      section: .rdata

  - id: swifttunnel-wiresock-url-arm64
    desc: wiresock NDIS ARM64 MSI URL
    crit: component
    if:
      type: text
      exact: "https://github.com/wiresock/ndisapi/releases/download/v3.6.2/Windows.Packet.Filter.3.6.2.1.ARM64.msi"
      section: .rdata

  - id: swifttunnel-version-info
    desc: SwiftTunnel VersionInfo CompanyName
    if:
      type: kv
      path: pe.version_info.company_name
      exact: swifttunnel

  - id: swifttunnel-file-version
    desc: SwiftTunnel VersionInfo FileVersion
    crit: component
    if:
      type: kv
      path: pe.version_info.file_version
      exact: 1.22.14

  - id: swifttunnel-product-name
    desc: SwiftTunnel VersionInfo ProductName
    crit: component
    if:
      type: kv
      path: pe.version_info.product_name
      exact: SwiftTunnel

  - id: swifttunnel-file-description
    desc: SwiftTunnel VersionInfo FileDescription
    crit: component
    if:
      type: kv
      path: pe.version_info.file_description
      exact: SwiftTunnel

  - id: ndisapi-crate
    desc: ndisapi Rust crate reference
    crit: component
    if:
      type: text
      substr: "ndisapi-0.6.5"
      section: .rdata

  - id: swifttunnel-auth-domain
    desc: SwiftTunnel auth control-plane domain
    crit: component
    if:
      type: text
      exact: "https://auth.swifttunnel.net"
      section: .rdata

  - id: swifttunnel-site-domain
    desc: SwiftTunnel primary website domain
    crit: component
    if:
      type: text
      exact: "https://swifttunnel.net"
      section: .rdata

  - id: swifttunnel-api-endpoint
    desc: SwiftTunnel VPN servers API endpoint
    crit: component
    if:
      type: text
      exact: "https://swifttunnel.net/api/vpn/servers"
      section: .rdata

  - id: swifttunnel-roblox-processes
    desc: SwiftTunnel Roblox process targeting cluster
    crit: component
    count_min: 3
    if:
      type: text
      regex: '(?i)roblox(player(beta|launcher)?|studio(beta|launcher(beta)?)?)\.exe'
      section: .rdata

  - id: swifttunnel-split-tunnel-flag
    desc: SwiftTunnel split tunnel state literal
    crit: component
    if:
      type: text
      exact: split_tunnel_active
      section: .rdata

  - id: swifttunnel-exe-name
    desc: SwiftTunnel executable name literal
    crit: component
    if:
      type: text
      regex: '(?i)swifttunnel(-desktop)?\.exe'
      section: .rdata

composite_rules:
  - id: swifttunnel-version-quintet
    desc: SwiftTunnel version info quintet
    all:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-brand
      - id: well-known/app/swifttunnel_vpn::swifttunnel-version-info
      - id: well-known/app/swifttunnel_vpn::swifttunnel-file-version
      - id: well-known/app/swifttunnel_vpn::swifttunnel-product-name
      - id: well-known/app/swifttunnel_vpn::swifttunnel-file-description

  - id: swifttunnel-source-tree
    desc: SwiftTunnel source tree path cluster
    needs: 4
    any:
      - id: well-known/app/swifttunnel_vpn::core-path-optimizer
      - id: well-known/app/swifttunnel_vpn::core-path-auto-routing
      - id: well-known/app/swifttunnel_vpn::core-path-split-tunnel
      - id: well-known/app/swifttunnel_vpn::core-path-udp-relay
      - id: well-known/app/swifttunnel_vpn::core-path-parallel-interceptor
      - id: well-known/app/swifttunnel_vpn::core-path-wfp-block
      - id: well-known/app/swifttunnel_vpn::core-path-discord-rpc
      - id: well-known/app/swifttunnel_vpn::core-path-geolocation
      - id: well-known/app/swifttunnel_vpn::core-path-process-watcher
      - id: well-known/app/swifttunnel_vpn::core-path-process-performance
      - id: well-known/app/swifttunnel_vpn::core-path-utils
      - id: well-known/app/swifttunnel_vpn::core-path-auth-http-client
      - id: well-known/app/swifttunnel_vpn::core-path-vpn-servers

  - id: swifttunnel-build-1-22-14
    desc: SwiftTunnel 1.22.14 product build
    all:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-version-quintet
      - id: well-known/app/swifttunnel_vpn::swifttunnel-source-tree
    any:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-exe-name
      - id: well-known/app/swifttunnel_vpn::ndisapi-crate
      - id: well-known/app/swifttunnel_vpn::swifttunnel-roblox-processes

  - id: swifttunnel
    desc: SwiftTunnel legitimate VPN application
    any:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-version-quintet
      - id: well-known/app/swifttunnel_vpn::swifttunnel-source-tree
      - id: well-known/app/swifttunnel_vpn::swifttunnel-build-1-22-14
      - id: well-known/app/swifttunnel_vpn::swifttunnel-brand
      - id: well-known/app/swifttunnel_vpn::core-path-optimizer
      - id: well-known/app/swifttunnel_vpn::core-path-auto-routing
      - id: well-known/app/swifttunnel_vpn::core-path-split-tunnel
      - id: well-known/app/swifttunnel_vpn::core-path-udp-relay
      - id: well-known/app/swifttunnel_vpn::core-path-parallel-interceptor
      - id: well-known/app/swifttunnel_vpn::core-path-wfp-block
      - id: well-known/app/swifttunnel_vpn::core-path-discord-rpc
      - id: well-known/app/swifttunnel_vpn::core-path-geolocation
      - id: well-known/app/swifttunnel_vpn::core-path-process-watcher
      - id: well-known/app/swifttunnel_vpn::core-path-process-performance
      - id: well-known/app/swifttunnel_vpn::core-path-utils
      - id: well-known/app/swifttunnel_vpn::core-path-auth-http-client
      - id: well-known/app/swifttunnel_vpn::core-path-vpn-servers
      - id: well-known/app/swifttunnel_vpn::swifttunnel-version-info
      - id: well-known/app/swifttunnel_vpn::swifttunnel-file-version
      - id: well-known/app/swifttunnel_vpn::swifttunnel-product-name
      - id: well-known/app/swifttunnel_vpn::swifttunnel-file-description
      - id: well-known/app/swifttunnel_vpn::ndisapi-crate
      - id: well-known/app/swifttunnel_vpn::swifttunnel-exe-name
      - id: well-known/app/swifttunnel_vpn::swifttunnel-auth-domain
      - id: well-known/app/swifttunnel_vpn::swifttunnel-api-endpoint
      - id: well-known/app/swifttunnel_vpn::swifttunnel-roblox-processes
      - id: well-known/app/swifttunnel_vpn::swifttunnel-split-tunnel-flag
      - id: well-known/app/swifttunnel_vpn::swifttunnel-wiresock-url-x64
      - id: well-known/app/swifttunnel_vpn::swifttunnel-wiresock-url-arm64
    needs: 3

  - id: swifttunnel-msi-downloader
    desc: Downloads wiresock NDIS driver MSI from GitHub
    all:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-msi-filename
      - id: well-known/app/swifttunnel_vpn::swifttunnel-wiresock-url-x64
      - id: well-known/app/swifttunnel_vpn::swifttunnel-wiresock-url-arm64

  - id: swifttunnel-control-plane
    desc: SwiftTunnel HTTPS control-plane endpoints
    all:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-auth-domain
      - id: well-known/app/swifttunnel_vpn::swifttunnel-api-endpoint
    any:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-site-domain
      - id: micro-behaviors/communications/http/lib/crate::reqwest-crate
      - id: micro-behaviors/communications/http/lib/crate::hyper-crate

  - id: swifttunnel-traffic-interceptor
    desc: SwiftTunnel traffic interception stack
    all:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-msi-downloader
      - id: well-known/app/swifttunnel_vpn::ndisapi-crate
      - id: well-known/app/swifttunnel_vpn::core-path-wfp-block

  - id: swifttunnel-process-routing
    desc: SwiftTunnel per-process VPN routing
    all:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-roblox-processes
      - id: well-known/app/swifttunnel_vpn::swifttunnel-split-tunnel-flag
    any:
      - id: well-known/app/swifttunnel_vpn::core-path-process-watcher
      - id: well-known/app/swifttunnel_vpn::core-path-auto-routing
      - id: well-known/app/swifttunnel_vpn::core-path-split-tunnel
      - id: micro-behaviors/os/network/connections::get-tcp-table-ex
      - id: micro-behaviors/os/network/connections::get-udp-table-ex
