defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.96

traits:
  - id: mcafee-company
    desc: McAfee company metadata
    if:
      type: value
      path: pe.version.company
      substr: McAfee, Inc.

  - id: epolicy-migration-description
    desc: McAfee ePO policy migration description
    if:
      type: value
      path: pe.version.description
      substr: ePO Policy Migration

  - id: epolicy-orchestrator-registry
    desc: McAfee ePolicy Orchestrator registry path
    if:
      type: text
      substr: SOFTWARE\Network Associates\ePolicy Orchestrator
      section: .rdata

  - id: epolicy-migration-cab
    desc: McAfee ePO policy migration CAB resource
    if:
      type: text
      exact: ePOPolicyMigration.cab
      section: .rdata

  - id: epolicy-migration-script
    desc: McAfee ePO policy migration upgrade script
    if:
      type: text
      substr: Policy_Upgrade_Script_For_ePO
      section: .rdata

composite_rules:
  - id: mcafee-epolicy-migration
    desc: McAfee ePO policy migration utility
    crit: notable
    conf: 0.99
    all:
      - id: mcafee-company
      - id: epolicy-migration-description
    any:
      - id: epolicy-orchestrator-registry
      - id: epolicy-migration-cab
      - id: epolicy-migration-script
    needs: 2
