defaults:
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.98
  size_min: 1000000
  size_max: 200000000

traits:
  - id: go-module-path
    desc: GitLab KAS Go module path
    if:
      type: value
      path: elf.go.module.path
      exact: gitlab.com/gitlab-org/cluster-integration/gitlab-agent/v18
