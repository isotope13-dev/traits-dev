defaults:
  platforms: [unix, windows]
  for: [zip, javascript, html, text]

traits:
  - id: containarium-archive-basename
    desc: Containarium source archive name
    crit: notable
    conf: 1.0
    if:
      type: path
      basename: true
      regex: '^github\.com-footprintai-containarium-v[^\\/]+\.zip$'

  - id: containarium-source-directory
    desc: Containarium source directory
    crit: notable
    conf: 1.0
    if:
      type: path
      regex: 'containarium@v[^\\/]+'

composite_rules:
  - id: containarium-security-demo-context
    desc: Recognized Containarium security-dashboard source context
    crit: exception
    conf: 1.0
    any:
      - id: containarium-archive-basename
      - id: containarium-source-directory
