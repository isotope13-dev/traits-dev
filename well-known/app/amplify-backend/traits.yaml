defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: amplify-backend-member
    desc: Amplify backend archive member
    for: [javascript]
    if:
      type: path
      substr: amplify-plugin-backend-
  - id: amplify-public-js-path
    desc: Amplify public JS asset path
    for: [javascript]
    if:
      type: path
      regex: 'public[\\/]js[\\/][0-9]+\.js$'

composite_rules:
  - id: amplify-public-js-asset
    desc: Amplify public JS asset
    crit: baseline
    conf: 0.98
    all:
      - id: amplify-backend-member
      - id: amplify-public-js-path
