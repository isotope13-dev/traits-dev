# Zolo Media's zOS application framework.  The package intentionally provisions
# its optional closed-core zguard runtime and repairs unsupported Python ABIs.
defaults:
  platforms: [unix, windows]
  for: [pkginfo]

traits:
  - id: package-name
    desc: Zolo OS package metadata name
    crit: notable
    conf: 0.99
    if:
      type: value
      path: name
      exact: zolo-os

  - id: publisher-domain
    desc: Zolo Media publisher email domain
    crit: notable
    conf: 0.99
    if:
      type: value
      path: author-email
      regex: '(?i)@zolo\.media(>|\s|$)'

  - id: upstream-repository
    desc: Zolo OS upstream GitHub repository
    crit: notable
    conf: 0.99
    if:
      type: value
      path: project-url
      regex: '(?i)github\.com/ZoloAi/zOS([/#]|$)'

composite_rules:
  - id: official-package-context
    desc: Official Zolo OS package metadata context
    crit: exception
    conf: 0.99
    all:
      - id: package-name
      - id: publisher-domain
      - id: upstream-repository
