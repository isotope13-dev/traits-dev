defaults:
  platforms: [windows, unix]
  for: [javascript, json, zip]
  crit: notable
  conf: 0.98
traits:
  - id: vsix-member
    desc: DBCode VS Code extension
    if:
      type: path
      substr: dbcode.dbcode
  - id: package-name
    desc: DBCode extension package name
    for: [json]
    if:
      type: value
      path: name
      exact: dbcode
  - id: table-edit-bundle
    desc: DBCode table editor bundle
    for: [javascript]
    if:
      type: text
      substr: data-dbcod
  - id: role-editor-bundle
    desc: DBCode role editor bundle
    for: [javascript]
    if:
      type: basename
      exact: roleEditor.js
  - id: snowflake-sdk-bundle
    desc: DBCode bundled Snowflake SDK
    for: [javascript]
    if:
      type: basename
      exact: snowflake-sdk.js
  - id: firebase-admin-bundle
    desc: DBCode bundled Firebase Admin SDK
    for: [javascript]
    if:
      type: basename
      exact: firebase-admin.js
  - id: mongodb-bundle
    desc: DBCode bundled MongoDB SDK
    for: [javascript]
    if:
      type: basename
      exact: mongodb.js
  - id: mssql-bundle
    desc: DBCode bundled MSSQL SDK
    for: [javascript]
    if:
      type: basename
      exact: mssql.js
  - id: dbcode-string
    desc: DBCode string marker
    for: [javascript]
    if:
      type: text
      substr: dbcode
composite_rules:
  - id: extension-main-bundle
    desc: DBCode main extension bundle
    for: [javascript]
    all:
      - id: metadata/build/bundler::vscode-extension-bundle-basename
      - id: dbcode-string
  - id: extension-context
    desc: DBCode VS Code extension context
    any:
      - id: vsix-member
      - id: package-name
      - id: table-edit-bundle
      - id: role-editor-bundle
      - id: snowflake-sdk-bundle
      - id: firebase-admin-bundle
      - id: mongodb-bundle
      - id: mssql-bundle
      - id: extension-main-bundle
