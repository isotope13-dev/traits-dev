defaults:
  platforms: [windows]
  crit: notable
  conf: 0.96
  size_max: 2147483648

traits:
  - id: hyper-release-path
    desc: Hyper terminal release artifact
    for: [pe, javascript, archive]
    if:
      type: path
      regex: '(?i)Hyper[^\\/]*[0-9][^\\/]*\.exe$'

  - id: hyper-plugin-loader
    desc: Hyper documented plugin loader
    for: [javascript]
    if:
      type: text
      substr: 'https://github.com/vercel/hyper/issues/619'

  - id: lx-music-release-path
    desc: LX Music desktop release artifact
    for: [pe, javascript, archive]
    if:
      type: path
      regex: '(?i)lx-music-desktop-[0-9][^\\/]*'

  - id: lx-music-main-executable
    desc: LX Music desktop main executable
    for: [pe]
    if:
      type: path
      basename: true
      exact: lx-music-desktop.exe
      case_insensitive: true

  - id: motrix-release-path
    desc: Motrix desktop release artifact
    for: [pe, javascript, archive]
    if:
      type: path
      regex: '(?i)Motrix-[0-9][^\\/]*\.exe$'

  - id: another-redis-desktop-manager-path
    desc: Another Redis Desktop Manager release artifact
    for: [pe, javascript, archive]
    if:
      type: path
      regex: '(?i)Another-Redis-Desktop-Manager[^\\/]*\.exe$'

  - id: quicklook-release-path
    desc: QuickLook release archive or component
    for: [archive, pe, powershell, csharp]
    if:
      type: path
      regex: '(?i)(QuickLook|QL-Win-QuickLook)[^\\/]*'

  - id: edex-ui-release-path
    desc: eDEX-UI release artifact
    for: [pe, javascript, archive]
    if:
      type: path
      regex: '(?i)eDEX-UI-Windows[^\\/]*\.exe$'

  - id: steamtools-release-path
    desc: SteamTools release artifact
    for: [archive, pe, csharp]
    if:
      type: path
      regex: '(?i)(SteamTools|Steam\\+\\+)[^\\/]*'

  - id: steamtools-source-pdb
    desc: SteamTools source PDB path
    for: [pe]
    if:
      type: text
      regex: '(?i)(C:\\\\Repos\\\\SteamTools\\\\|[\\/]SteamTools[\\/])'
      section: rdata

  - id: steamtools-vendor-company
    desc: SteamTools vendor company string
    for: [pe]
    if:
      type: text
      regex: '(长沙次元超越科技有限公司|江苏蒸汽凡星科技有限公司)'
      section: rdata

  - id: steamtools-accelerator-apphost
    desc: SteamTools accelerator apphost
    for: [pe]
    if:
      type: text
      substr: 'Steam++.Accelerator.dll'
      section: rdata

  - id: steamtools-accelerator-basename
    desc: SteamTools accelerator executable
    for: [pe]
    if:
      type: path
      regex: '(?i)(^|[\\/])Steam\+\+\.Accelerator\.exe$'

  - id: steamtools-accelerator-embedded
    desc: SteamTools embedded accelerator assembly
    for: [pe]
    if:
      type: path
      regex: '(?i)Steam\.Accelerator\.dll@'

  - id: steamtools-bd-steamclient-assembly
    desc: SteamTools Steam client assembly
    for: [pe]
    if:
      type: basename
      exact: BD.SteamClient.dll

  - id: steamtools-wtts-client-assembly
    desc: SteamTools WTTS client assembly
    for: [pe]
    if:
      type: basename
      exact: BD.WTTS.Client.dll

  - id: steamtools-wtts-avalonia-assembly
    desc: SteamTools WTTS Avalonia assembly
    for: [pe]
    if:
      type: basename
      exact: BD.WTTS.Client.Avalonia.dll

  - id: steamtools-accelerator-plugin
    desc: SteamTools accelerator plugin assembly
    for: [pe]
    if:
      type: basename
      exact: BD.WTTS.Client.Plugins.Accelerator.dll

  - id: steamtools-gamelist-plugin
    desc: SteamTools game list plugin assembly
    for: [pe]
    if:
      type: basename
      exact: BD.WTTS.Client.Plugins.GameList.dll

  - id: steamtools-gameaccount-plugin
    desc: SteamTools game account plugin
    for: [pe]
    if:
      type: path
      basename: true
      exact: BD.WTTS.Client.Plugins.GameAccount.dll

  - id: steamkit2-library
    desc: SteamKit2 client library
    for: [pe]
    if:
      type: path
      basename: true
      exact: SteamKit2.dll

  - id: bouncycastle-crypto-library
    desc: BouncyCastle Crypto library
    for: [pe]
    if:
      type: path
      basename: true
      exact: BouncyCastle.Crypto.dll

  - id: playnite-source-path
    desc: Playnite source tree path
    platforms: [windows, unix]
    for: [archive, csharp, xml, powershell, scripts]
    if:
      type: path
      regex: '(?i)Playnite-[0-9][^\\/]*'

  - id: playnite-source-file
    desc: Playnite source file
    for: [csharp, xml]
    if:
      type: path
      regex: '(?i)Playnite'

  - id: mullvad-vpn-installer-path
    desc: Mullvad VPN Windows installer
    for: [pe, javascript]
    if:
      type: path
      regex: '(?i)MullvadVPN[^\\/]*[0-9][^\\/]*\.exe$'

  - id: cmder-release-path
    desc: Cmder release archive or script
    for: [archive, batch, powershell]
    if:
      type: path
      regex: '(?i)(^|[\\/])cmder\.7z$'

  - id: cmder-vendor-member
    desc: Cmder bundled vendor member
    platforms: [windows, unix]
    for: [scripts, source, lua, perl, python, shell, batch, powershell, javascript]
    if:
      type: path
      regex: '(?i)(^|[\\/])vendor[\\/]'

composite_rules:
  - id: steamtools-member
    desc: SteamTools release member
    crit: notable
    conf: 0.96
    any:
      - id: steamtools-release-path
      - id: steamtools-source-pdb
      - id: steamtools-vendor-company
      - id: steamtools-accelerator-apphost
      - id: steamtools-accelerator-basename
      - id: steamtools-accelerator-embedded
      - id: steamtools-bd-steamclient-assembly
      - id: steamtools-wtts-client-assembly
      - id: steamtools-wtts-avalonia-assembly
      - id: steamtools-accelerator-plugin
      - id: steamtools-gamelist-plugin
      - id: steamtools-gameaccount-plugin
      - id: steamkit2-library
