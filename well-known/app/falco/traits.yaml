defaults:
  platforms: [linux]
  for: [elf]
  crit: notable
  conf: 0.99
  size_min: 1000000
  size_max: 30000000

traits:
  - id: falco-basename
    desc: Falco executable basename
    if:
      type: value
      path: file.basename
      exact: falco

  - id: falco-config-path
    desc: Falco configuration path
    if:
      type: text
      section: .rodata
      substr: /etc/falco/falco.yaml

  - id: falco-project-marker
    desc: Falco project identifier
    if:
      type: text
      section: .rodata
      substr: falcosecurity/falco

composite_rules:
  - id: falco-runtime
    desc: Falco Linux runtime monitor
    crit: notable
    conf: 0.99
    all:
      - id: falco-basename
    any:
      - id: falco-config-path
      - id: falco-project-marker

  - id: falco-monitoring-context
    desc: Falco monitoring application context
    crit: exception
    conf: 0.99
    all:
      - id: falco-basename
      - id: falco-config-path
