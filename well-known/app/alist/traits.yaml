defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - elf
  - macho
  - pe
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: release-path
  desc: Alist release package path marker
  crit: notable
  size_min: 1
