defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - elf
  - macho
  - pe
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: release-path
  desc: Alist release package path marker
  size_min: 1
  size_max: 1073741824
  if:
    type: path
    basename: true
    regex: "(?i)(^|[\\\\/!])alist([._ -]|$)"
