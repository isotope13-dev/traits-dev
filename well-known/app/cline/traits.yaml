defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, shell, vsix-manifest]
  crit: baseline
  conf: 0.99

traits:
  - id: package-name
    desc: Cline VS Code package name
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: claude-dev

  - id: display-name
    desc: Cline VS Code display name
    crit: notable
    for: [package.json]
    if:
      type: value
      path: displayName
      exact: Cline

  - id: publisher
    desc: Cline VS Code publisher identifier
    crit: notable
    for: [package.json]
    if:
      type: value
      path: publisher
      exact: saoudrizwan

  - id: source-repository
    desc: Cline official source repository
    crit: notable
    for: [package.json]
    if:
      type: value
      path: repository.url
      substr: github.com/cline/cline

  - id: development-script
    desc: Cline extension development script
    crit: notable
    for: [javascript, shell]
    if:
      type: basename
      regex: '^(run-extension-host\.sh|publish-marketplace\.mjs)$'
      case_insensitive: true

  # Cline's parser is an application integration, not the @cline/llms
  # provider catalog.  Keep that marker in the application namespace.
  - id: cline-parser-model-marker
    desc: Cline integration parser reads model identifiers
    crit: notable
    for: [javascript]
    if:
      type: text
      regex: '\bCline\b.{0,60}\bmodel\b|\bmodel\b.{0,60}\bCline\b'
