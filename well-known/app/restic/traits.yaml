defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  size_max: 80000000
traits:
  - id: restic-binary-name
    desc: Restic backup binary name
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      exact: restic-restic-v0.18.1-restic_0.18.1_linux_arm64
  - id: restic-backup-strings
    desc: Restic backup tool strings
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: AZURE_CLIENT_ID
      section: .rodata
composite_rules:
  - id: restic-backup-binary
    desc: Restic backup tool binary
    crit: baseline
    conf: 0.98
    all:
      - id: restic-binary-name
      - id: restic-backup-strings
