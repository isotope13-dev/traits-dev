defaults:
  size_max: 2097152
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

traits:
  - id: neoux-copyright-aspack
    desc: neoux copyright in ASPack section
    crit: component
    conf: 0.95
    if:
      type: text
      section: .aspack
      substr: Copyright(c) by neoux

  - id: neoux-aspack-section
    desc: neoux ASPack protected section layout
    crit: component
    conf: 0.9
    if:
      type: section
      exact: .aspack

composite_rules:
  - id: neoux-aspack-packed-binary
    desc: neoux ASPack packed binary
    crit: notable
    conf: 0.98
    all:
      - id: neoux-copyright-aspack
      - id: objectives/anti-static/pack/detect::aspack-marker
    any:
      - id: neoux-aspack-section
