defaults:
  size_max: 5242880
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

traits:
  - id: beyondtrust-copyright-rsrc
    desc: BeyondTrust copyright resource
    crit: notable
    if:
      type: text
      section: .rsrc
      substr: BeyondTrust, Inc.

composite_rules:
  - id: beyondtrust-pecompact-packed-binary
    desc: BeyondTrust PECompact packed binary
    crit: notable
    conf: 0.98
    all:
      - id: well-known/app/protected-benign-pe::beyondtrust-software-signer
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
