defaults:
  platforms: [unix, windows]
  for: [json, javascript, chrome-manifest, crx]

traits:
  - id: extension-id
    desc: OneKeyPass Chrome Web Store extension identifier
    crit: notable
    conf: 0.99
    for: [chrome-manifest, crx]
    if:
      type: path
      regex: 'khfakjpfkipjmnnhgohbdhcikppbdlea'
  - id: extension-name
    desc: OneKeyPass extension name
    crit: notable
    conf: 0.99
    for: [json]
    if:
      type: value
      path: extName.message
      exact: OneKeyPass
  - id: service-api-host
    desc: OneKeyPass service API host
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: text
      substr: api.onekeypass.me

  - id: manifest-google-update
    desc: Manifest uses Chrome Web Store updater
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: update_url
      exact: https://clients2.google.com/service/update2/crx
  - id: manifest-naver-host
    desc: Manifest targets Naver sites
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: host_permissions
      regex: 'naver\.com'
  - id: manifest-kakao-host
    desc: Manifest targets Kakao sites
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: host_permissions
      regex: 'kakao\.com'
  - id: manifest-acmicpc-host
    desc: Manifest targets acmicpc.net
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: host_permissions
      regex: 'acmicpc\.net'
composite_rules:
  - id: manifest-identity
    desc: OneKeyPass manifest identity
    crit: notable
    conf: 0.99
    all:
      - id: manifest-google-update
      - id: manifest-naver-host
      - id: manifest-kakao-host
      - id: manifest-acmicpc-host
      - id: metadata/permission/activation::content-script-all-frames
