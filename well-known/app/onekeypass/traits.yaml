defaults:
  platforms: [unix, windows]
  for: [json, javascript, chrome-manifest, crx]

traits:
  - id: extension-id
    desc: OneKeyPass Chrome Web Store extension identifier
    crit: notable
    conf: 0.99
    for: [chrome-manifest, crx]
    if:
      type: path
      regex: 'khfakjpfkipjmnnhgohbdhcikppbdlea'
  - id: extension-name
    desc: OneKeyPass extension name
    crit: notable
    conf: 0.99
    for: [json]
    if:
      type: value
      path: extName.message
      exact: OneKeyPass
  - id: service-api-host
    desc: OneKeyPass service API host
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: text
      substr: api.onekeypass.me

composite_rules:
  - id: manifest-identity
    desc: OneKeyPass manifest identity
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: extension-id
      - id: metadata/permission/host::host-permission-naver-sites
      - id: metadata/permission/host::host-permission-kakao-sites
      - id: metadata/permission/host::host-permission-acmicpc
      - id: metadata/permission/activation::content-script-all-frames
