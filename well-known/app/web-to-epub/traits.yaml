defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: wte-dev-archive-path
    desc: WTE Dev extension archive path
    for: [archives, manifests, scripts, source, data]
    if:
      type: path
      substr: wte_dev-
  - id: wte-dev-manifest-name
    desc: WTE Dev extension manifest name
    for: [chrome-manifest, json]
    if:
      type: value
      path: name
      exact: WTE-Dev
  - id: webtoepub-parser-module
    desc: WebToEpub parser module
    for: [javascript]
    if:
      type: path
      substr: js/parsers/
composite_rules:
  - id: wte-extension-context
    desc: WTE web fiction extension context
    crit: notable
    conf: 0.98
    any:
      - id: wte-dev-archive-path
      - id: wte-dev-manifest-name
      - id: webtoepub-parser-module
