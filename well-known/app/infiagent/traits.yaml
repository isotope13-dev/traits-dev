# infiAgent is a disclosed AI research/browser-agent framework. Its browser
# tool intentionally masks Playwright automation and humanizes input, but the
# reviewed package contains no credential harvesting or covert exfiltration.
defaults:
  platforms: [unix, windows]
  for: [pkginfo, whl, python]

traits:
  - id: package-name
    desc: infiAgent package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: infiagent
  - id: project-homepage
    desc: infiAgent project homepage marker
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: text
      substr: github.com/ChenglinPoly/Multi-Level-Agent

composite_rules:
  - id: infiagent-browser-automation-context
    desc: Recognized infiAgent browser automation context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: project-homepage
