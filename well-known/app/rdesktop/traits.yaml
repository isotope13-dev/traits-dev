defaults:
  platforms: [unix, windows]
  for: [source, c, cpp, shell, archives, zip]
  crit: notable
  conf: 0.99
  size_min: 1
  size_max: 300000000

traits:
  - id: rdesktop-source-tree
    desc: rdesktop open-source client source tree
    if:
      type: path
      substr: github.com/rdesktop/rdesktop@

  - id: rdesktop-source-archive
    desc: rdesktop release source archive
    for: [archives, zip]
    if:
      type: path
      regex: 'github\.com-rdesktop-rdesktop-v[0-9]'

composite_rules:
  - id: rdesktop-client-source
    desc: rdesktop client source context
    any:
      - id: rdesktop-source-tree
      - id: rdesktop-source-archive
