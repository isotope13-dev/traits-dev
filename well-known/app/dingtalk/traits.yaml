defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.99
  size_min: 500000
  size_max: 15000000
traits:
  - id: dingtalk-downloader-product
    desc: DingTalk Downloader module product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: DingTalkDownloader Module
  - id: dingtalk-signer
    desc: Verified DingTalk Technology code signer
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '(?i)DingTalk Technology Co\.?\\,?Ltd\.'
composite_rules:
  - id: official-downloader-module
    desc: Verified DingTalk Downloader module
    crit: notable
    conf: 0.99
    all:
      - id: dingtalk-downloader-product
      - id: dingtalk-signer
