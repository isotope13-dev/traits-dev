defaults:
  platforms: [android]
  for: [apk, class, java_class, jar]
  crit: notable
  conf: 0.96

traits:
  - id: tiktok-domain-marker
    desc: TikTok service domain marker
    if:
      type: text
      regex: '\.tiktok(cdn|v)?\.com'

  - id: tiktok-font-marker
    desc: TikTok display font marker
    if:
      type: text
      substr: tiktokdisplayfont

composite_rules:
  - id: package-member
    desc: TikTok app package member
    crit: exception
    scope: archive
    all:
      - id: tiktok-domain-marker
      - id: tiktok-font-marker
