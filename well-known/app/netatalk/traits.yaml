# Netatalk — open-source AFP (Apple Filing Protocol) file server. Its UAM
# (User Authentication Module) sources implement standard PAM conversation
# callbacks (the app supplies its own password to PAM), and its distro packaging
# installs an SELinux policy module via semodule — both trip credential-access
# and anti-av heuristics on legitimate source. Identify the source tree by path.
defaults:
  platforms: [unix]
traits:
  - id: netatalk-source-tree
    desc: Netatalk source-tree path
    crit: notable
    conf: 0.99
    size_min: 100
    size_max: 100000000
    for: [binaries, scripts, source, shell]
    if:
      type: path
      regex: '(^|[\\/])netatalk-[0-9][^\\/]*'
