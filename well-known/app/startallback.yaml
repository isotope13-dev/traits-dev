defaults:
  platforms: [windows]
  for: [pe, dll]
  size_max: 52428800

traits:
  - id: startallback-basename
    desc: StartAllBack binary filename
    crit: baseline
    conf: 0.98
    if:
      type: basename
      regex: '(?i)^StartAllBack(?:_[0-9][A-Za-z0-9_.-]*_setup|[AX][0-9]{2})?\.(exe|dll)$'
  - id: darkmagic-basename
    desc: StartAllBack DarkMagic helper filename
    crit: baseline
    conf: 0.98
    if:
      type: basename
      regex: '(?i)^DarkMagic[AX][0-9]{2}\.dll$'
  - id: startisback-installer-title
    desc: StartIsBack installer title
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: StartIsBack installation utility
      section: rdata

composite_rules:
  - id: startallback-component
    desc: StartAllBack component
    crit: baseline
    conf: 0.99
    any:
      - id: startallback-basename
      - id: darkmagic-basename
      - id: startisback-installer-title
      - id: metadata/signed/leaf::ip-zinukhov-stanislav-igorevich
