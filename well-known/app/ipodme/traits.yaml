defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95
  size_min: 512
  size_max: 52428800

traits:
  - id: ipodme-product-versioninfo
    desc: iPodME ProductName version info
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.product_name
      exact: iPodME

  - id: ipodme-original-filename
    desc: iPodME original filename
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.original_filename
      exact: iPodME.exe

  - id: ipodme-company-versioninfo
    desc: iPodME Noda CompanyName version info
    crit: component
    conf: 0.95
    if:
      type: kv
      path: pe.version.company
      exact: Noda

composite_rules:
  - id: ipodme-media-converter
    desc: iPodME media converter
    crit: baseline
    conf: 0.99
    all:
      - id: ipodme-product-versioninfo
    any:
      - id: ipodme-original-filename
      - id: ipodme-company-versioninfo
