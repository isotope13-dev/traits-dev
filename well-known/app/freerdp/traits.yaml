# Identity and legitimate client context for the FreeRDP remote-desktop client.
defaults:
  platforms: [linux]
  for: [elf, so]

traits:
  - id: client-api-import
    desc: FreeRDP client API import
    crit: notable
    conf: 0.98
    size_min: 1024
    if:
      type: import
      exact: freerdp_client_start

  - id: client-input-api-import
    desc: FreeRDP client keyboard-input API import
    crit: notable
    conf: 0.98
    size_min: 1024
    if:
      type: import
      exact: freerdp_input_send_keyboard_event_ex

composite_rules:
  - id: client-context
    desc: Recognized FreeRDP remote-desktop client context
    crit: exception
    conf: 0.99
    all:
      - id: client-api-import
      - id: client-input-api-import
