# draw.io (diagrams.net) — shape resource scripts (mxShape). Benign FP-suppression
# context: bundled shape libraries resemble obfuscated JS payloads.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript]
traits:
  - id: drawio-shape-resource-script-text
    desc: draw.io shape resource script text
    crit: component
    conf: 0.95
    if:
      type: text
      substr: mxShape
  - id: drawio-shape-resource-script-path
    desc: draw.io shape resource script path
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: 'mx[A-Za-z0-9]+\.js$'
composite_rules:
  - id: drawio-shape-resource-script
    desc: draw.io shape resource script
    crit: notable
    conf: 0.95
    all:
      - id: drawio-shape-resource-script-text
      - id: drawio-shape-resource-script-path
