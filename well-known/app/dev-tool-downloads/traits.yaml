# Official vendor download URLs for common developer tools (ChromeDriver,
# Flutter, llamafile). Benign release endpoints used as false-positive
# exclusions for download-and-chmod / download-and-execute composites.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: official-llamafile-github-release
    desc: Official llamafile GitHub release URL
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "github.com/Mozilla-Ocho/llamafile/releases/download/"
  - id: official-flutter-linux-release-url
    desc: Official Flutter Linux release URL
    crit: component
    conf: 0.95
    platforms: [unix]
    if:
      type: text
      regex: "flutter_infra_release/releases/stable/.{1,80}/flutter_linux_[0-9._-]+-stable\\.tar\\.xz"
  - id: official-chromedriver-url
    desc: Official ChromeDriver URL
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "chromedriver.storage.googleapis.com"
