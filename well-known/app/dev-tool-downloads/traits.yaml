defaults:
  platforms:
  - unix
  - windows
  for:
  - python
  size_max: 5000000
traits:
- id: official-llamafile-github-release
  desc: Official llamafile GitHub release URL
  crit: component
  conf: 0.95
  if:
    type: text
    substr: github.com/Mozilla-Ocho/llamafile/releases/download/
- id: official-flutter-linux-release-url
  desc: Official Flutter Linux release URL
  crit: component
  conf: 0.95
  platforms:
  - unix
  if:
    type: text
    regex: flutter_infra_release/releases/stable/.{1,80}/flutter_linux_[0-9._-]+-stable\.tar\.xz
- id: official-chromedriver-url
  desc: Official ChromeDriver URL
  crit: component
  conf: 0.95
  if:
    type: text
    substr: chromedriver.storage.googleapis.com
- id: official-totvs-tds-vscode-marketplace-api-path
  desc: VSCode Marketplace gallery package API path
  crit: component
  conf: 0.95
  if:
    type: text
    substr: marketplace.visualstudio.com/_apis/public/gallery/publishers/
- id: official-totvs-tds-vscode-extension-path
  desc: TOTVS TDS VSCode extension package path
  crit: component
  conf: 0.95
  if:
    type: text
    substr: TOTVS/vsextensions/tds-vscode/latest/vspackage
composite_rules:
- id: official-totvs-tds-vscode-marketplace-url
  desc: Official TOTVS TDS VSCode Marketplace package URL
  crit: notable
  conf: 0.95
  all:
  - id: official-totvs-tds-vscode-marketplace-api-path
  - id: official-totvs-tds-vscode-extension-path
  near_bytes: 256
