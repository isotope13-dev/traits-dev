defaults:
  platforms: [linux]
  for: [elf]
  size_min: 1048576

traits:
  - id: jan-executable-basename
    desc: Jan executable basename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      exact: Jan
  - id: jan-config-directory
    desc: Jan config directory
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /.config/jan
      section: .rodata
  - id: jan-update-endpoint
    desc: Jan update endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: https://apps.jan.ai/update-check
      section: .rodata

composite_rules:
  - id: jan-desktop-app
    desc: Jan desktop application
    crit: baseline
    conf: 0.98
    all:
      - id: jan-executable-basename
      - id: jan-config-directory
      - id: jan-update-endpoint
