defaults:
  platforms: [windows, unix]
  for: [javascript, chrome-manifest]
  size_max: 10000000
  crit: baseline
  conf: 0.98

traits:
  - id: avast-antitrack-xpi-path
    desc: Avast AntiTrack extension path
    if:
      type: path
      regex: '(?i)avast[_-]antitrack.*\.xpi[\\/]'
  - id: avast-antitrack-extension-marker
    desc: Avast AntiTrack extension marker
    if:
      type: text
      substr: AntiTrack

composite_rules:
  - id: avast-antitrack-extension
    desc: Avast AntiTrack browser extension
    crit: baseline
    conf: 0.98
    any:
      - id: avast-antitrack-xpi-path
      - id: avast-antitrack-extension-marker
