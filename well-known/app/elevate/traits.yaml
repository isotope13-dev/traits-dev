defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.96
  size_min: 50000
  size_max: 250000

traits:
  - id: elevate-original-filename
    desc: Elevate utility original filename
    if:
      type: value
      path: pe.version.original_filename
      exact: Elevate.exe
      case_insensitive: true

  - id: elevate-product-name
    desc: Elevate utility product name
    if:
      type: value
      path: pe.version.product_name
      exact: Elevate Application

  - id: elevate-original-author
    desc: Elevate utility original author
    if:
      type: value
      path: pe.version.company
      exact: Johannes Passing

  - id: elevate-command-line-help
    desc: Elevate utility Windows-version help text
    if:
      type: text
      exact: This tool is for Windows Vista and above only.
      section: .rdata

  - id: elevate-source-pdb-path
    desc: Elevate utility source PDB path
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)\\elevate\\bin\\(x86|x64)\\release\\elevate\.pdb$'

composite_rules:
  - id: elevate-tool-context
    desc: Elevate command-line utility identity
    crit: notable
    all:
      - id: elevate-original-filename
      - id: elevate-product-name
      - id: elevate-original-author
      - id: elevate-command-line-help

  # This is a benign-context suppressor for generic debugger/environment
  # heuristics. The identity, source-build path, and the documented runas
  # launcher behavior must all be present; none is sufficient by itself.
  - id: elevate-benign-context
    desc: Known-good Elevate utility launcher context
    crit: exception
    all:
      - id: elevate-tool-context
      - id: elevate-source-pdb-path
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/os/privilege/elevation::runas-string
