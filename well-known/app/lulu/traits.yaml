defaults:
  platforms: [macos]
  for: [macho, binaries]

traits:
  - id: lulu-firewall-marker
    desc: LuLu firewall binary marker
    crit: baseline
    conf: 0.96
    size_min: 10000
    size_max: 100000000
    if:
      type: text
      regex: 'Objective-See[\s\S]{0,160}LuLu|LuLu[\s\S]{0,160}Objective-See'
