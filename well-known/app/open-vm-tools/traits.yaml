defaults:
  platforms: [unix]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 100000000

traits:
  - id: debian-packaging
    desc: open-vm-tools Debian packaging member
    for: [shell, makefile, text, data]
    if:
      type: text
      regex: '\b(open-vm-tools|vmware-rpctool|vmware-tools|vmtoolsd)\b'
