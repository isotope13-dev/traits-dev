# DWARF Explorer project identity.
# These markers identify the upstream open-source debugger GUI so packaging
# and crash-reporting code can be interpreted in its documented context.
defaults:
  platforms: [unix, windows]
  for: [python, pkginfo]

traits:
  - id: package-name
    desc: DWARF Explorer package name
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?im)(^Name:\s*dwex\s*$|\bname\s*=\s*["'']dwex["''])'
  - id: upstream-repository
    desc: DWARF Explorer upstream repository
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: https://github.com/sevaa/dwex/
  - id: product-name
    desc: DWARF Explorer product name
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: DWARF Explorer

composite_rules:
  - id: project-identity
    desc: DWARF Explorer project identity
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: product-name
