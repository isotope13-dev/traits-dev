defaults:
  platforms: [unix, windows]
  for: [javascript, chrome-manifest]

traits:
  - id: pinboard-extension-name
    desc: Pinboard browser extension name
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: Pinboard Extension

  - id: pinboard-service-domain
    desc: Pinboard service endpoint reference
    crit: notable
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: '(usepinboard\.com|pinboard-backend-[a-z0-9-]+\.us-central1\.run\.app)'
