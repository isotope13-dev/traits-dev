defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.95
  size_min: 32768
  size_max: 10485760

traits:
  - id: bible-converter-product-versioninfo
    desc: Bible Converter product version info
    if:
      type: kv
      path: pe.version.product_name
      exact: Bible Converter
  - id: church-software-company-versioninfo
    desc: Church Software company version info
    if:
      type: kv
      path: pe.version.company
      exact: Church Software
composite_rules:
  - id: bible-converter-application
    desc: Bible Converter application
    crit: notable
    conf: 0.98
    all:
      - id: bible-converter-product-versioninfo
      - id: church-software-company-versioninfo
