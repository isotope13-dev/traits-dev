defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.99
  size_min: 100000
  size_max: 10000000
traits:
  - id: coremail-signer
    desc: Verified Coremail Windows binary signer
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '(?i)广东盈世计算机科技有限公司|Coremail'
  - id: coremail-product-metadata
    desc: Coremail desktop mail product metadata
    if:
      type: value
      path: pe.version.company
      exact: Coremail
  - id: coremail-export-marker
    desc: Coremail mail export component marker
    if:
      type: text
      section: .rdata
      regex: '(?i)Coremail\s+(pst\s+export|论客邮箱)'
composite_rules:
  - id: coremail-signed-application
    desc: Signed Coremail desktop application component
    crit: notable
    conf: 0.99
    all:
      - id: coremail-signer
    any:
      - id: coremail-product-metadata
      - id: coremail-export-marker
