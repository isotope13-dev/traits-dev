defaults:
  platforms: [unix, windows]
  for: [javascript, github-actions]
traits:
  - id: pulumi-source-tree
    desc: Pulumi source archive member
    crit: notable
    conf: 0.99
    for: [javascript, python, markdown, shell, github-actions, package.json]
    if:
      type: path
      regex: 'pulumi@v[0-9]'
  - id: github-secrets-export-action
    desc: Pulumi GitHub secrets export action
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: pulumi/esc-export-secrets-action
  - id: github-action-retry-wrapper
    desc: Pulumi GitHub Action retry wrapper
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'Retry wrapper for GitHub Actions|pulumi/retry-action'
