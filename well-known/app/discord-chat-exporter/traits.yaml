defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  crit: baseline
  conf: 0.98
  size_min: 100000
  size_max: 200000000

traits:
  - id: discord-chat-exporter-path
    desc: DiscordChatExporter release path
    size_min: 0
    size_max: 200000000
    if:
      type: path
      regex: '(?i)DiscordChatExporter'
  - id: discord-chat-exporter-product
    desc: DiscordChatExporter product metadata
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)DiscordChatExporter'

composite_rules:
  - id: discord-chat-exporter-release
    desc: DiscordChatExporter release binary
    crit: notable
    conf: 0.98
    any:
      - id: discord-chat-exporter-path
      - id: discord-chat-exporter-product
