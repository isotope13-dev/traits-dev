defaults:
  platforms: [windows]
  crit: notable
  conf: 0.99

traits:
  - id: defender-helper-script-basename
    desc: DBeaver Defender helper basename
    ref: sha256:c1ec4978244ad1305c90a99e2b74741749066e105038c3621ad319de988ece74
    for: [powershell]
    size_min: 900
    size_max: 1000
    if:
      type: basename
      exact: add-windows-defender-exclusion.ps1
  - id: defender-helper-exclusion-cmdlet
    desc: DBeaver Defender exclusion cmdlet
    ref: sha256:c1ec4978244ad1305c90a99e2b74741749066e105038c3621ad319de988ece74
    for: [powershell]
    size_min: 900
    size_max: 1000
    if:
      type: text
      regex: '\bAdd-MpPreference\b.{0,32}-ExclusionPath\b'
      case_insensitive: true

composite_rules:
  - id: windows-defender-exclusion-helper-script
    desc: DBeaver Defender exclusion helper
    crit: notable
    conf: 0.99
    all:
      - id: defender-helper-script-basename
      - id: defender-helper-exclusion-cmdlet
