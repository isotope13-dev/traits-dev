defaults:
  platforms: [unix, windows]
  for: [source, scripts, manifests, data]

traits:
  - id: source-tree
    desc: Kube-OVN source tree member
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: 'github\.com[\\/]kubeovn[\\/]kube-ovn@'

  - id: fastpath-module-source
    desc: Kube-OVN fast-path module source
    crit: notable
    conf: 0.99
    for: [c]
    if:
      type: text
      regex: 'kube_ovn_fast[_-]path|kube_ovn_fastpath'
