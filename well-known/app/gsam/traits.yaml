defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: python-injection-strategy-basename
    desc: GSAM Python material loader filename
    crit: notable
    for: [python]
    if:
      type: basename
      exact: python_injection.py

  - id: python-injection-strategy-class
    desc: GSAM Python injection strategy class
    crit: notable
    for: [python]
    if:
      type: text
      substr: 'class PythonInjectionStrategy'

  - id: package-name
    desc: GSAM Python package name
    crit: notable
    for: [whl]
    if:
      type: text
      regex: '(?m)^Name:\s*gsam\s*$'

composite_rules:
  - id: python-injection-strategy
    desc: GSAM Python material loader
    crit: notable
    conf: 0.99
    for: [python]
    all:
      - id: python-injection-strategy-basename
      - id: python-injection-strategy-class
