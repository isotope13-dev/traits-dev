# The Inference Gateway CLI is a legitimate agent UI that includes PTY,
# screenshot, and SSH features for user-directed computer interaction.
defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts, source, manifests, zip]

traits:
  - id: source-tree
    desc: Inference Gateway CLI source tree
    crit: notable
    conf: 0.99
    size_max: 100000000
    if:
      type: path
      regex: '(?i)inference-gateway[/_-]cli'
