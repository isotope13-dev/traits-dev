# ColorScripts-Enhanced is a PowerShell terminal ANSI-art module.  Its
# renderer intentionally starts a child PowerShell with an encoded command so
# generated control sequences survive command-line parsing; that is benign
# package context, not a hidden payload.
defaults:
  platforms: [windows]
  for: [powershell, xml, nupkg]
  crit: notable
  conf: 0.99

traits:
  - id: package-id
    desc: ColorScripts-Enhanced NuGet package identity
    for: [xml]
    if:
      type: text
      substr: '<id>ColorScripts-Enhanced</id>'

  - id: module-marker
    desc: ColorScripts-Enhanced module marker
    for: [powershell, xml]
    if:
      type: text
      regex: '(?i)ColorScripts-Enhanced|ps-color-scripts-enhanced'

composite_rules:
  - id: package-context
    desc: Recognized ColorScripts-Enhanced ANSI-art module context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-id
      - id: module-marker
