defaults:
  platforms: [unix, windows]
  for: [whl, python, javascript, text, markdown, json, wasm]
  crit: notable
  conf: 0.99

traits:
  - id: cptr-package-name
    desc: Open WebUI Computer package name
    for: [whl]
    if:
      type: text
      regex: '(?m)^Name:\s*cptr\s*$'

  - id: cptr-package-member
    desc: Open WebUI Computer package member
    if:
      type: path
      regex: '(^|/)cptr(-|/)'

composite_rules:
  - id: open-webui-computer
    desc: Open WebUI Computer package
    all:
      - id: cptr-package-name
      - id: cptr-package-member
