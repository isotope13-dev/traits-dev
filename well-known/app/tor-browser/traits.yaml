defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: tor-project-publisher-string
    desc: Tor Project publisher string
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 150000000
    if:
      type: text
      substr: "THE TOR PROJECT, INC."
      section: .rdata

  - id: tor-browser-executable-name
    desc: Tor Browser executable name
    crit: component
    conf: 0.92
    size_min: 1000000
    size_max: 150000000
    if:
      type: text
      exact: torbrowser.exe
      section: .rdata

composite_rules:
  - id: tor-browser-signed-installer-context
    desc: Tor Browser signed installer context
    crit: notable
    conf: 0.96
    all:
      - id: tor-project-publisher-string
      - id: tor-browser-executable-name
