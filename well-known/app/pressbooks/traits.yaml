defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.95

traits:
  - id: pressbooks-background-stream
    desc: Pressbooks background stream handler
    if:
      type: text
      substr: pb_set_time_limit
  - id: pressbooks-eventstreams-class
    desc: Pressbooks event streams class
    if:
      type: path
      basename: true
      exact: class-eventstreams.php

composite_rules:
  - id: pressbooks-software
    desc: Pressbooks publishing platform
    crit: notable
    conf: 0.95
    any:
      - id: pressbooks-background-stream
      - id: pressbooks-eventstreams-class
