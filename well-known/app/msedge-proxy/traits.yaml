defaults:
  platforms:
  - windows
  for:
  - pe
  size_max: 5000000
traits:
- id: sideload-target-msedge-proxy
  desc: msedge_proxy.exe sideloading host
  crit: component
  conf: 0.9
  size_min: 1
  size_max: 52428800
  if:
    type: text
    substr: msedge_proxy.exe
    section: rdata
- id: msedge-proxy-application-path
  desc: Edge Application install path for msedge_proxy
  crit: component
  conf: 0.95
  size_min: 1
  size_max: 52428800
  if:
    type: text
    substr: "\\Microsoft\\Edge\\Application\\msedge_proxy.exe"
    section: rdata
