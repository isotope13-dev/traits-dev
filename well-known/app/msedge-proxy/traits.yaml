# Microsoft Edge `msedge_proxy.exe` as a DLL-sideloading host /
# signed-binary-abuse launcher. Threat actors bundle this Microsoft-
# signed binary alongside a malicious DLL so that running the proxy
# loads attacker code through a trusted, valid-signature process.
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: sideload-target-msedge-proxy
    desc: msedge_proxy.exe sideloading host
    crit: component
    conf: 0.9
    size_min: 1
    size_max: 52428800
    if:
      type: text
      substr: msedge_proxy.exe
      section: rdata

  - id: msedge-proxy-application-path
    desc: Edge Application install path for msedge_proxy
    crit: component
    conf: 0.95
    size_min: 1
    size_max: 52428800
    if:
      type: text
      substr: \Microsoft\Edge\Application\msedge_proxy.exe
      section: rdata
