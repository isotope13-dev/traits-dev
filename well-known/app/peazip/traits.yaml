defaults:
  platforms: [windows]
  for: [pe, lnk]
  crit: notable
  conf: 0.96

traits:
  - id: peazip-main-basename
    desc: PeaZip main executable basename
    for: [pe]
    size_min: 1000000
    size_max: 20000000
    if:
      type: value
      path: file.basename
      exact: peazip.exe
  - id: peazip-product-name
    desc: PeaZip product metadata
    for: [pe]
    size_min: 1000000
    size_max: 20000000
    if:
      type: value
      path: pe.version.product_name
      exact: PeaZip
  - id: peazip-company
    desc: PeaZip developer metadata
    for: [pe]
    size_min: 1000000
    size_max: 20000000
    if:
      type: value
      path: pe.version.company
      exact: Giorgio Tani
  - id: peazip-description
    desc: PeaZip file manager metadata
    for: [pe]
    size_min: 1000000
    size_max: 20000000
    if:
      type: value
      path: pe.version.description
      exact: PeaZip, file and archive manager
  - id: peazip-shortcut-target
    desc: LNK targets PeaZip in Program Files
    for: [lnk]
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)(^|[\\/])(PROGRA~[12]|Program Files( \(x86\))?)[\\/]PeaZip[\\/]peazip\.exe$'
  - id: peazip-web-shortcut
    desc: PeaZip web shortcut target
    crit: notable
    conf: 0.96
    for: [lnk]
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)(^|[\\/])(PROGRA~[12]|Program Files( \(x86\))?)[\\/]PeaZip[\\/]peazip\.url$'
  - id: peazip-linux-basename
    desc: PeaZip Linux frontend basename
    platforms: [linux]
    for: [elf]
    size_min: 5000000
    size_max: 20000000
    if:
      type: value
      path: file.basename
      exact: peazip
  - id: peazip-linux-product-text
    desc: PeaZip Linux frontend identity text
    platforms: [linux]
    for: [elf]
    size_min: 5000000
    size_max: 20000000
    if:
      type: text
      section: .rodata
      regex: '(?i)PeaZip([[:space:]]+[0-9]+(\.[0-9]+){1,3})?'
  - id: peazip-linux-pea-basename
    desc: PeaZip PEA helper basename
    platforms: [linux]
    for: [elf]
    size_min: 5000000
    size_max: 15000000
    if:
      type: value
      path: file.basename
      exact: pea
  - id: peazip-linux-pea-text
    desc: PeaZip PEA helper identity text
    platforms: [linux]
    for: [elf]
    size_min: 5000000
    size_max: 15000000
    if:
      type: text
      section: .rodata
      substr: PEA 1.32 / specs
  - id: peazip-macos-basename
    desc: PeaZip macOS frontend basename
    platforms: [macos]
    for: [macho]
    size_min: 5000000
    size_max: 25000000
    if:
      type: value
      path: file.basename
      exact: peazip
  - id: peazip-macos-pea-basename
    desc: PeaZip macOS PEA helper basename
    platforms: [macos]
    for: [macho]
    size_min: 10000000
    size_max: 20000000
    if:
      type: value
      path: file.basename
      exact: pea
  - id: peazip-macos-fpc-section
    desc: PeaZip macOS Free Pascal section
    platforms: [macos]
    for: [macho]
    size_min: 5000000
    size_max: 25000000
    if:
      type: section
      exact: __TEXT,.fpc
  - id: peazip-debian-package-name
    desc: PeaZip Debian package name
    platforms: [linux]
    for: [deb]
    if:
      type: value
      path: deb.package
      exact: peazip
  - id: peazip-debian-package-summary
    desc: PeaZip Debian package summary
    platforms: [linux]
    for: [deb]
    if:
      type: value
      path: deb.summary
      regex: '^PeaZip free file archiver utility, (Qt6|GTK2) build$'
  - id: peazip-debian-package-maintainer
    desc: PeaZip Debian package maintainer
    platforms: [linux]
    for: [deb]
    if:
      type: value
      path: deb.maintainer
      exact: Giorgio Tani <giorgio.tani.software@gmail.com>
  - id: peazip-rpm-package-name
    desc: PeaZip RPM package name
    platforms: [linux]
    for: [rpm]
    if:
      type: value
      path: rpm.name
      exact: peazip
  - id: peazip-rpm-package-packager
    desc: PeaZip RPM package packager
    platforms: [linux]
    for: [rpm]
    if:
      type: value
      path: rpm.packager
      exact: Giorgio Tani
  - id: peazip-rpm-package-url
    desc: PeaZip RPM project URL
    platforms: [linux]
    for: [rpm]
    if:
      type: value
      path: rpm.url
      exact: https://peazip.github.io
  - id: peazip-zpaq-helper
    crit: notable
    desc: PeaZip bundled ZPAQ helper
    size_min: 1000000
    size_max: 8000000
    if:
      type: path
      substr: zpaq/zpaq.exe
  - id: peazip-freearc-sfx-helper
    crit: notable
    desc: PeaZip bundled FreeArc SFX helper
    size_min: 50000
    size_max: 600000
    if:
      type: path
      regex: '(?i)(^|[\\/])arc[\\/]freearc(-tiny|-installer)?\.sfx$'
  - id: peazip-inno-uninstaller
    crit: notable
    desc: PeaZip Inno Setup uninstaller
    size_min: 500000
    size_max: 3000000
    if:
      type: path
      substr: PeaZip/unins000.exe

composite_rules:
  - id: peazip-main-executable
    desc: PeaZip main executable identity
    for: [pe]
    all:
      - id: peazip-main-basename
      - id: peazip-product-name
      - id: peazip-company
      - id: peazip-description
  - id: peazip-linux-main-executable
    desc: PeaZip Linux frontend identity
    platforms: [linux]
    for: [elf]
    all:
      - id: peazip-linux-basename
      - id: peazip-linux-product-text
  - id: peazip-linux-pea-helper
    desc: PeaZip PEA helper identity
    platforms: [linux]
    for: [elf]
    all:
      - id: peazip-linux-pea-basename
      - id: peazip-linux-pea-text
  - id: peazip-macos-main-executable
    desc: PeaZip macOS frontend identity
    platforms: [macos]
    for: [macho]
    all:
      - id: peazip-macos-basename
      - id: peazip-macos-fpc-section
  - id: peazip-macos-pea-helper
    desc: PeaZip macOS PEA helper identity
    platforms: [macos]
    for: [macho]
    all:
      - id: peazip-macos-pea-basename
      - id: peazip-macos-fpc-section
  - id: peazip-debian-package
    desc: PeaZip Debian package identity
    platforms: [linux]
    for: [deb]
    all:
      - id: peazip-debian-package-name
      - id: peazip-debian-package-summary
      - id: peazip-debian-package-maintainer
  - id: peazip-rpm-package
    desc: PeaZip RPM package identity
    platforms: [linux]
    for: [rpm]
    all:
      - id: peazip-rpm-package-name
      - id: peazip-rpm-package-packager
      - id: peazip-rpm-package-url
  - id: peazip-linux-package-context
    desc: Recognized PeaZip Linux package context
    crit: exception
    platforms: [linux]
    for: [deb, rpm]
    any:
      - id: peazip-debian-package
      - id: peazip-rpm-package
  - id: peazip-macos-context
    desc: Recognized PeaZip macOS executable context
    crit: exception
    platforms: [macos]
    for: [macho]
    any:
      - id: peazip-macos-main-executable
      - id: peazip-macos-pea-helper
