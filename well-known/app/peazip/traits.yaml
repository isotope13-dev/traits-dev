defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.96

traits:
  - id: peazip-main-executable
    desc: PeaZip main executable
    size_min: 1000000
    size_max: 20000000
    if:
      type: path
      substr: PeaZip/peazip.exe
  - id: peazip-zpaq-helper
    desc: PeaZip bundled ZPAQ helper
    size_min: 1000000
    size_max: 8000000
    if:
      type: path
      substr: zpaq/zpaq.exe
  - id: peazip-freearc-sfx-helper
    desc: PeaZip bundled FreeArc SFX helper
    size_min: 50000
    size_max: 300000
    if:
      type: path
      substr: arc/freearc.sfx
  - id: peazip-inno-uninstaller
    desc: PeaZip Inno Setup uninstaller
    size_min: 500000
    size_max: 3000000
    if:
      type: path
      substr: PeaZip/unins000.exe
