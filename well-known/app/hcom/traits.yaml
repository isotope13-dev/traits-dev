defaults:
  platforms: [macos]
  for: [macho]
  size_min: 1000000
  size_max: 25000000
  crit: component
  conf: 0.96

traits:
  - id: hcom-basename
    desc: hcom executable basename
    if:
      type: path
      basename: true
      exact: hcom

composite_rules:
  - id: hcom-terminal-relay-binary
    desc: hcom terminal and relay binary
    crit: notable
    conf: 0.97
    all:
      - id: hcom-basename
      - id: micro-behaviors/process/create/hcom::hcom-pty-wrapper
      - id: micro-behaviors/process/create/hcom::hcom-relay-cli
    any:
      - id: micro-behaviors/process/create/hcom::hcom-pty-source-path
      - id: micro-behaviors/process/create/hcom::hcom-relay-source-path
      - id: micro-behaviors/process/create/hcom::hcom-launch-source-path
