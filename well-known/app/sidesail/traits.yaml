defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json]
  crit: baseline
  conf: 0.98
  size_min: 0

traits:
  - id: sidesail-source-path
    desc: Sidesail source archive path
    if:
      type: path
      substr: github.com/LayerTwo-Labs/sidesail
  - id: sidesail-wallet-ui-text
    desc: Sidesail wallet UI text
    if:
      type: text
      substr: BitAssetsService

composite_rules:
  - id: sidesail-wallet-app-context
    desc: Sidesail wallet app context
    crit: notable
    conf: 0.98
    any:
      - id: sidesail-source-path
      - id: sidesail-wallet-ui-text
