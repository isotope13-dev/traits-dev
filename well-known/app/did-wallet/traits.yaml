defaults:
  platforms: [unix, windows]
  for: [chrome-manifest, javascript]

traits:
  - id: did-wallet-manifest-name
    desc: DID Wallet extension manifest name
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: DID Wallet

  - id: did-wallet-official-service
    desc: DID Wallet official service URL
    crit: notable
    conf: 0.98
    for: [javascript]
    if:
      type: text
      regex: 'https://(www\.didwallet\.io|main\.abtnetwork\.io|explore\.didwallet\.io)/'

  - id: did-wallet-secret-safety-warning
    desc: DID Wallet secret-phrase safety warning
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: string_literal
      substr: Never enter your Secret Phrase into a form or application.

composite_rules:
  - id: did-wallet-extension-context
    desc: Official DID Wallet extension context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: did-wallet-manifest-name
      - id: did-wallet-official-service
      - id: did-wallet-secret-safety-warning
