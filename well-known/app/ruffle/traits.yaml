defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.99

traits:
  - id: manifest-name
    desc: Ruffle Flash emulator manifest name
    if:
      type: value
      path: name
      exact: Ruffle - Flash Emulator

  - id: official-homepage
    desc: Ruffle official project homepage
    if:
      type: value
      path: homepage_url
      exact: https://ruffle.rs/

composite_rules:
  - id: ruffle-extension-context
    desc: Recognized Ruffle browser extension context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: manifest-name
      - id: official-homepage
