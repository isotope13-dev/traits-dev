# Benign SQL Server Desired State Configuration PowerShell module identity.
# This context is used only to suppress generic anti-static/discovery/loader
# heuristics that match normal DSC implementation code.
defaults:
  platforms: [windows]
  for: [powershell, nupkg]
  crit: notable
  conf: 0.98

traits:
  - id: module-path-identity
    desc: SQL Server DSC module path identity
    if:
      type: path
      regex: '(?i)SqlServerDsc'

  - id: module-name-identity
    desc: SQL Server DSC module name
    if:
      type: text
      substr: SqlServerDsc

  - id: dsc-resource-implementation-marker
    desc: SQL DSC resource implementation marker
    if:
      type: text
      regex: '(?i)DSC_Sql[A-Za-z]+'

composite_rules:
  - id: benign-module-context
    desc: Recognized SQL Server DSC module context
    crit: exception
    conf: 0.99
    all:
      - id: module-path-identity
    any:
      - id: module-name-identity
      - id: dsc-resource-implementation-marker
