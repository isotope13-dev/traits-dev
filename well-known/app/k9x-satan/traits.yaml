# K9X Satan is an adversarial red-team harness for the K9-AIF pipeline.  Its
# attack payloads intentionally contain destructive and exfiltration examples,
# but the package sends them to a configured test target instead of executing
# them locally.
defaults:
  platforms: [unix, windows]
  for: [whl, pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: K9X Satan PyPI package name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: k9x-satan

  - id: wheel-distribution
    desc: K9X Satan wheel distribution name
    for: [whl]
    if:
      type: value
      path: whl.distribution
      exact: k9x_satan

  - id: package-summary
    desc: K9X Satan adversarial harness summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      exact: K9X Satan — adversarial red-team harness for K9-AIF. Fires structured attacks at a live K9-AIF pipeline and proves K9X Shield containment.

  - id: source-tree
    desc: K9X Satan Python source tree
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])k9x_satan([\\/]|$)'

  - id: red-team-harness-marker
    desc: K9X Shield red-team harness marker
    for: [python]
    if:
      type: text
      substr: BaseAttack

  - id: attack-source-file
    desc: K9X Satan attack-suite source file
    for: [python]
    if:
      type: basename
      regex: '.*_attack\.py$'

composite_rules:
  - id: package-identity
    desc: K9X Satan adversarial testing harness identity
    crit: notable
    conf: 0.99
    scope: outer
    all:
      - id: package-name
      - id: package-summary

  - id: attack-fixture-context
    desc: Recognized K9X Satan inert attack-fixture context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: source-tree
      - id: attack-source-file
