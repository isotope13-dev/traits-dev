defaults:
  platforms: [unix]
  for: [elf, shell]
  crit: baseline
  conf: 0.96
  size_min: 4096
  size_max: 3000000

traits:
  - id: x11vnc-basename
    desc: x11vnc executable basename
    if:
      type: value
      path: file.basename
      exact: x11vnc

  - id: x11vnc-vnc-server-identity
    desc: x11vnc VNC server identity
    for: [elf]
    if:
      type: text
      section: .rodata
      substr: "x11vnc: allow VNC connections to real X11 displays"

  - id: x11vnc-http-server-header
    desc: x11vnc HTTP server header
    for: [elf]
    if:
      type: text
      section: .rodata
      substr: "VNC-Server: x11vnc"

  - id: xdummy-basename
    desc: Xdummy helper basename
    for: [shell]
    if:
      type: value
      path: file.basename
      exact: Xdummy

  - id: xdummy-helper-identity
    desc: Xdummy virtual display helper
    for: [shell]
    if:
      type: text
      substr: "The primary motivation for the Xdummy script is to provide a virtual X"

composite_rules:
  - id: x11vnc-binary
    desc: x11vnc remote display server
    crit: notable
    conf: 0.98
    for: [elf]
    all:
      - id: x11vnc-basename
    any:
      - id: x11vnc-vnc-server-identity
      - id: x11vnc-http-server-header

  - id: xdummy-helper-script
    desc: Xdummy virtual display helper
    crit: notable
    conf: 0.98
    for: [shell]
    all:
      - id: xdummy-basename
      - id: xdummy-helper-identity
