defaults:
  platforms:
  - windows
  for:
  - powershell
  - nupkg
  crit: component
  conf: 0.95
  size_max: 5000000
traits:
- id: package-description
  desc: Maester package description
  if:
    type: text
    substr: Maester is an automation framework to assess and monitor your Microsoft
      365 security configuration
- id: docs-url
  desc: Maester command documentation URL
  if:
    type: text
    substr: maester.dev/docs/commands/
- id: invoke-maester-function
  desc: Maester Invoke-Maester function
  if:
    type: text
    substr: Invoke-Maester
- id: mt-graph-function
  desc: Maester Microsoft Graph function
  if:
    type: text
    regex: "\\bInvoke-MtGraph(Request|SecurityQuery)\\b"
- id: mt-test-result-function
  desc: Maester test result detail function
  if:
    type: text
    substr: Add-MtTestResultDetail
- id: mt-common-function-prefix
  desc: Maester Get/Test/Send function prefix
  if:
    type: text
    regex: "\\b(Get|Test|Send)-Mt[A-Za-z0-9]+\\b"
- id: maester-tests-path
  desc: Maester bundled tests path
  if:
    type: path
    regex: "maester-tests[\\\\/]"
- id: maester-public-check-path
  desc: Maester public check path
  if:
    type: path
    regex: "public[\\\\/](maester|orca|cis|cisa)[\\\\/]"
- id: maester-internal-check-path
  desc: Maester internal check path
  if:
    type: path
    regex: "internal[\\\\/](orca|xspm|eidsca)[\\\\/]"
- id: maester-test-dir
  desc: Maester test directory path
  if:
    type: path
    regex: "tests[\\\\/]"
- id: telemetry-event
  desc: Maester telemetry event name
  if:
    type: text
    substr: InvokeMaester
- id: microsoft-graph-api-text
  desc: Maester Microsoft Graph API text
  if:
    type: text
    substr: Microsoft Graph API
- id: get-mg-context-text
  desc: Maester Get-MgContext text
  if:
    type: text
    substr: Get-MgContext
- id: markdown-report-text
  desc: Maester markdown report text
  if:
    type: text
    substr: Get-MtMarkdownReport
- id: maester-results-text
  desc: Maester results object text
  if:
    type: text
    substr: MaesterResults
- id: test-result-markdown-text
  desc: Maester test result markdown text
  if:
    type: text
    substr: testResultMarkdown
- id: adaptive-card-template-text
  desc: Maester adaptive card template text
  if:
    type: text
    substr: AdaptiveCardPayloadTemplate
- id: report-template-name-text
  desc: Maester report template name text
  if:
    type: text
    substr: ReportTemplate
composite_rules:
- id: module-context
  desc: Maester PowerShell module context
  crit: baseline
  conf: 0.98
  any:
  - id: package-description
  - id: docs-url
  - id: invoke-maester-function
  - id: mt-graph-function
  - id: mt-test-result-function
  - id: mt-common-function-prefix
  - id: maester-tests-path
  - id: maester-public-check-path
  - id: maester-internal-check-path
  - id: maester-test-dir
  - id: telemetry-event
- id: graph-request-context
  desc: Maester Microsoft Graph request context
  crit: notable
  conf: 0.98
  all:
  - id: module-context
  any:
  - id: mt-graph-function
  - id: microsoft-graph-api-text
  - id: get-mg-context-text
- id: report-rendering-context
  desc: Maester report and check rendering context
  crit: notable
  conf: 0.98
  all:
  - id: module-context
  any:
  - id: markdown-report-text
  - id: maester-results-text
  - id: test-result-markdown-text
  - id: mt-test-result-function
  - id: report-template-text
- id: report-template-text
  desc: Maester report template text
  crit: component
  conf: 0.95
  any:
  - id: adaptive-card-template-text
  - id: report-template-name-text
