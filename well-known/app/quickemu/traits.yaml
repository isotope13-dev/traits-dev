defaults:
  platforms: [unix]
  for: [shell, deb, archives]
traits:
- id: quickemu-script-path
  desc: Quickemu script path
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '(/|^)(quickemu|quickget|quickreport)($|/)'
- id: quickemu-package-path
  desc: Quickemu package path
  crit: component
  conf: 0.95
  if:
    type: path
    regex: 'quickemu[^/]*\.deb'

composite_rules:
- id: quickemu-software
  desc: Quickemu VM launcher
  crit: notable
  conf: 0.95
  any:
  - id: quickemu-script-path
  - id: quickemu-package-path
