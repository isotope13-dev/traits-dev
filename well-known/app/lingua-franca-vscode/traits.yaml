defaults:
  platforms: [unix, windows]
  for: [vsix-manifest, javascript, json]
  crit: baseline
  conf: 0.98

traits:
  - id: lingua-franca-vscode-id
    desc: Lingua Franca VS Code extension
    if:
      type: text
      substr: lf-lang.vscode-lingua-franca
  - id: lingua-franca-vscode-package-name
    desc: Lingua Franca VS Code package name
    for: [vsix-manifest, json]
    if:
      type: value
      path: name
      exact: vscode-lingua-franca
  - id: lingua-franca-language-server-jar
    desc: Lingua language-server JAR member
    for: [jar, class, java_class]
    crit: notable
    if:
      type: path
      regex: '(?i)(^|[/\\])lflang(-[^/\\]*)?\\.jar'
  - id: lingua-franca-language-server-namespace
    desc: Lingua Franca language-server JVM namespace
    for: [jar, class, java_class]
    crit: notable
    if:
      type: text
      substr: org/lflang/

composite_rules:
  - id: lingua-franca-vscode-extension
    desc: Lingua Franca VS Code extension
    crit: notable
    conf: 0.98
    any:
      - id: lingua-franca-vscode-id
      - id: lingua-franca-vscode-package-name
