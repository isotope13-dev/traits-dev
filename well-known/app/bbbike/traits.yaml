defaults:
  platforms: [unix, windows]
  for: [scripts, source, manifests, data]

traits:
  - id: source-archive
    desc: BBBike GitHub source archive
    crit: notable
    conf: 0.99
    for: [zip]
    if:
      type: basename
      regex: '^github\.com-eserte-bbbike-v[0-9A-Za-z_.-]+\.zip$'

  - id: source-tree
    desc: BBBike upstream source tree member
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: 'eserte[\\/]bbbike@v[0-9A-Za-z_.-]+[\\/]'
