# Lyric is a .NET-distributed programming-language tool.  Its package ships
# compiler/runtime libraries and a Maven dependency resolver; those are
# benign toolchain identity markers, not evidence of a backdoor.
defaults:
  platforms: [windows, unix]
  for: [csharp, pe, dll, jar, nupkg, json, data]
  crit: notable
  conf: 0.97

traits:
  - id: lyric-dotnet-tool-manifest
    desc: Lyric .NET tool manifest
    for: [nupkg, data]
    size_min: 100
    size_max: 300000000
    if:
      type: basename
      regex: '(?i)^(lyric\.nuspec|DotnetToolSettings\.xml)$'

  - id: lyric-package-name
    desc: Lyric NuGet package name
    for: [nupkg]
    size_min: 100
    size_max: 300000000
    if:
      type: basename
      regex: '(?i)^lyric\.[0-9][A-Za-z0-9.-]*\.nupkg$'

  - id: lyric-managed-assembly
    desc: Lyric managed compiler assembly
    for: [csharp, pe, dll]
    size_min: 1000
    size_max: 300000000
    if:
      type: basename
      regex: '(?i)^Lyric\.(Stdlib|Jvm|Msil|Lyric)\.[A-Za-z0-9]+$'

  - id: lyric-maven-resolver
    desc: Lyric embedded Maven resolver
    for: [jar]
    size_min: 1000
    size_max: 30000000
    if:
      type: basename
      exact: lyric-resolver.jar

composite_rules:
  - id: lyric-toolchain
    desc: Lyric compiler and resolver toolchain
    crit: notable
    any:
      - id: lyric-dotnet-tool-manifest
      - id: lyric-managed-assembly
      - id: lyric-maven-resolver

  # The toolchain legitimately combines reflection, process-launch references,
  # archive handling, and symmetric crypto in its Maven resolver. Keep this
  # benign context explicit so those generic capabilities remain useful for
  # unrelated JVM loaders.
  - id: lyric-toolchain-context
    desc: Lyric compiler resolver context
    crit: exception
    all:
      - id: lyric-toolchain
      - id: lyric-maven-resolver
