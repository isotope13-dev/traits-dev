defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98
  size_max: 200000000

traits:
  - id: mysql-router-package-context
    desc: MySQL Router package context
    for: [archives, binaries]
    if:
      type: path
      substr: mysql-router
  - id: mysql-router-library-context
    desc: MySQL Router shared library
    for: [elf, so, dll, dylib]
    if:
      type: path
      substr: mysqlrouter
