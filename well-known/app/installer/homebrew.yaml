defaults:
  platforms: [unix]
  for: [shell]
  crit: component
  conf: 0.5

traits:
  - id: homebrew-install-command
    desc: Homebrew install command
    if:
      type: text
      substr: brew install

composite_rules:
  - id: homebrew-context
    desc: Homebrew context markers
    needs: 2
    any:
      - id: homebrew-install-command
      - id: metadata/package/tooling::homebrew-prefix
      - id: metadata/package/tooling::brew-no-install
      - id: metadata/package/tooling::homebrew-repo
