defaults:
  platforms: [windows]
  for: [binaries]
  size_min: 1024
  size_max: 524288000

traits:
  - id: startallback-installer
    desc: StartAllBack installer basename
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)^StartAllBack_.{1,80}_setup\.exe($|!!)'
  - id: uniextract-installer
    desc: Universal Extractor installer basename
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)^UniExtract(Updater)?\.exe($|!!)'
  - id: idman-installer
    desc: Internet Download Manager basename
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)^IDMan\.exe($|!!)'
  - id: openra-installer
    desc: OpenRA installer basename
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)^OpenRA-.{1,120}\.exe($|!!)'

