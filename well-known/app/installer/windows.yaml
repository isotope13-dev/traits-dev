defaults:
  platforms: [windows]
  for: [binaries]
  size_min: 1024
  size_max: 524288000

traits:
  - id: startallback-installer
    desc: StartAllBack installer basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)^StartAllBack_.{1,80}_setup\.exe$'
  - id: uniextract-installer
    desc: Universal Extractor installer basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)^UniExtract(Updater)?(_NoAdmin)?\.exe$'
  - id: idman-installer
    desc: Internet Download Manager basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      exact: 'IDMan.exe'
      case_insensitive: true
  - id: openra-installer
    desc: OpenRA installer basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)^OpenRA-.{1,120}\.exe$'
