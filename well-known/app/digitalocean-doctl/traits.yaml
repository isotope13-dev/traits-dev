defaults:
  platforms: [windows, linux, macos]
  for: [binaries, pe, elf, macho]
  crit: component
  conf: 0.96
  size_min: 1000000
  size_max: 500000000

traits:
  - id: doctl-go-module
    desc: DigitalOcean doctl Go module
    if:
      type: value
      path: pe.go.deps[*].path
      exact: github.com/digitalocean/doctl

  - id: godo-go-module
    desc: DigitalOcean godo Go SDK module
    if:
      type: value
      path: pe.go.deps[*].path
      exact: github.com/digitalocean/godo

  - id: doctl-executable-name
    desc: DigitalOcean doctl executable name
    conf: 0.9
    if:
      type: basename
      regex: '(?i)(^|[\\/!])doctl(\.exe)?$'

composite_rules:
  - id: go-cli-context
    desc: DigitalOcean doctl Go CLI context
    crit: baseline
    conf: 0.98
    all:
      - id: doctl-go-module
    any:
      - id: godo-go-module
      - id: doctl-executable-name
