defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 600000000

traits:
  - id: vscode-extension-member
    desc: PlantUML VS Code extension member
    for: [java, class, java_class, jar, data, javascript, json]
    if:
      type: path
      substr: jebbs.plantuml-

  - id: jar-member
    desc: PlantUML jar member
    for: [java, class, java_class, jar, data]
    if:
      type: path
      substr: plantuml.jar

  - id: clipboard-loop-class
    desc: PlantUML clipboard loop class
    for: [java, class, java_class]
    if:
      type: basename
      exact: ClipboardLoop.class

composite_rules:
  - id: package-member
    desc: PlantUML packaged extension member
    crit: notable
    conf: 0.98
    any:
      - id: vscode-extension-member
      - id: jar-member
      - id: clipboard-loop-class
