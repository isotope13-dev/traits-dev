defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, markdown, json, package.json, vsix-manifest]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 524288000

traits:
  - id: qwen-code-vsix-name
    desc: Qwen Code VSIX archive name
    if:
      type: path
      substr: qwen-code-vscode-ide-companion
  - id: qwen-code-vsix-manifest
    desc: Qwen Code VSIX manifest
    if:
      type: text
      substr: qwen-code-vscode-ide-companion
  - id: qwen-code-cli-bundle-path
    desc: Qwen Code bundled CLI path
    if:
      type: path
      substr: extension/dist/qwen-cli
  - id: qwen-code-bundle-text
    desc: Qwen Code bundled text
    if:
      type: text
      substr: Qwen Code

composite_rules:
  - id: qwen-code-vscode-extension
    desc: Qwen Code VS Code extension
    crit: notable
    conf: 0.98
    any:
      - id: qwen-code-vsix-name
      - id: qwen-code-vsix-manifest
      - id: qwen-code-cli-bundle-path
      - id: qwen-code-bundle-text
