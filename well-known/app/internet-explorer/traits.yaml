defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: ieframe-original-filename
    desc: IE frame original filename
    crit: component
    conf: 0.95
    if:
      type: text
      exact: IEFRAME.DLL
      section: .rsrc
  - id: ieframe-original-filename-versioninfo
    desc: IE frame original filename version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.original_filename
      exact: IEFRAME.DLL
  - id: internet-browser-description
    desc: Internet Browser file description
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Internet Browser
      section: .rsrc
  - id: internet-browser-description-versioninfo
    desc: Internet Browser file description version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.description
      exact: Internet Browser
  - id: internet-explorer-product-versioninfo
    desc: Internet Explorer ProductName version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.product_name
      exact: Internet Explorer
  - id: ieframe-basename
    desc: IE frame DLL basename
    crit: component
    conf: 0.9
    if:
      type: basename
      exact: ieframe.dll
      case_insensitive: true
composite_rules:
  - id: internet-explorer-frame-component
    desc: Microsoft Internet Explorer frame DLL
    crit: baseline
    conf: 0.96
    all:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: internet-explorer-product-versioninfo
    any:
      - id: ieframe-original-filename-versioninfo
      - id: internet-browser-description-versioninfo
      - id: ieframe-original-filename
      - id: internet-browser-description
      - id: ieframe-basename
      - id: metadata/package/versioning::pe-version-resource
    needs: 2
