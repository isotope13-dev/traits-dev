defaults:
  platforms: [windows, unix]
  for: [javascript, chrome-manifest, crx]
  size_max: 120000000
traits:
  - id: metamask-crx-member
    desc: MetaMask extension archive member
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: 'nkbihfbeogaeaoehlefnkodbefgpgknn\.crx([\\/]|$)'
  - id: metamask-lavamoat-webpack
    desc: MetaMask LavaMoat webpack bundle
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: with(this.ST)with(this.RH)with(this.G)
  - id: metamask-package-scope
    desc: MetaMask scoped package bundle
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: '@metamask'
  - id: metamask-network-bundle
    desc: MetaMask network constants bundle
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'MetaMask[\s\S]{0,40}metamask'
  - id: metamask-official-manifest
    desc: MetaMask official extension manifest
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: https://metamask.io
  - id: metamask-ledger-token
    desc: MetaMask Ledger integration marker
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bMetaMask\b[\s\S]{0,80}\bLedger\b|\bLedger\b[\s\S]{0,80}\bMetaMask\b'
      case_insensitive: true
  - id: metamask-bscscan-api-host
    desc: MetaMask BSCScan API host
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: api.bscscan.com
  - id: metamask-signature-import-token
    desc: MetaMask signature import token
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: signatureImport
  - id: lastpass-crx-member
    desc: LastPass extension archive member
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: 'hdokiejnpimakedhajhdlcegeplioahd\.crx([\\/]|$)'
  - id: lastpass-webclient-webpack
    desc: LastPass web client webpack bundle
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: webpackChunkwebClient
  - id: lastpass-webclient-var
    desc: LastPass web client bundle variable
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: var webClient;
  - id: lastpass-zxcvbn-language
    desc: LastPass zxcvbn language dictionary
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: this.zxcvbnts
  - id: servicenow-web-automation-name
    desc: ServiceNow Web Automation manifest name
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: ServiceNow Web Automation
  - id: servicenow-web-automation-description
    desc: ServiceNow RPA extension description
    crit: notable
    conf: 0.98
    for: [chrome-manifest]
    if:
      type: value
      path: description
      substr: Integrates NowAssist AI, RPA Attended & Unattended robots
composite_rules:
  - id: known-wallet-password-manager-extension
    desc: Known wallet or password-manager browser extension
    crit: notable
    conf: 0.98
    any:
      - id: metamask-crx-member
      - id: metamask-lavamoat-webpack
      - id: metamask-package-scope
      - id: metamask-network-bundle
      - id: metamask-official-manifest
      - id: metamask-ledger-webpack
      - id: metamask-bscscan-signature-bundle
      - id: lastpass-crx-member
      - id: lastpass-webclient-webpack
      - id: lastpass-webclient-var
      - id: well-known/app/browser-extension::password-manager-marker-lastpass
      - id: lastpass-zxcvbn-language
  - id: metamask-ledger-webpack
    desc: MetaMask Ledger webpack chunk
    crit: notable
    conf: 0.95
    all:
      - id: metadata/library/structure::js-webpack-chunk-global
      - id: metamask-ledger-token
  - id: metamask-bscscan-signature-bundle
    desc: MetaMask BSCScan signature helper bundle
    crit: notable
    conf: 0.95
    all:
      - id: metamask-bscscan-api-host
      - id: metamask-signature-import-token
  - id: servicenow-web-automation
    desc: ServiceNow Web Automation extension
    crit: notable
    conf: 0.99
    for: [javascript, chrome-manifest, crx, archives]
    scope: archive
    all:
      - id: servicenow-web-automation-name
      - id: servicenow-web-automation-description
