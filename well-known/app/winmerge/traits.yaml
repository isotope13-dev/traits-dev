defaults:
  platforms: [windows]
  for: [javascript, c, cpp, pe]
  size_max: 5000000
traits:
  - id: winmerge-installer-path
    desc: WinMerge signed installer path
    crit: baseline
    conf: 0.98
    size_max: 20000000
    if:
      type: path
      regex: '(?i)WinMerge-[0-9][^\\/]{0,80}-Setup\.exe([\\/]|$)'
  - id: winmerge-main-exe-path
    desc: WinMerge main executable path
    crit: baseline
    conf: 0.98
    size_max: 10000000
    if:
      type: path
      regex: '(?i)(^|[\\/])WinMergeU\.exe$'
  - id: winmerge-full-source-archive-path
    desc: WinMerge full source archive path
    crit: component
    conf: 0.98
    if:
      type: path
      regex: '(?i)winmerge-[0-9][^\\/]{0,80}-full-src\.7z[\\/]'
  - id: winmerge-plugin-script-path
    desc: WinMerge plugin script path
    crit: component
    conf: 0.98
    if:
      type: path
      regex: '(?i)dlls[\\/][^\\/]{1,80}\.sct$'
  - id: winmerge-known-plugin-script-name
    desc: Known WinMerge plugin scriptlet basename
    crit: baseline
    conf: 0.97
    if:
      type: path
      basename: true
      regex: '(?i)^(CompareMSExcelFiles|AI)\.sct$'
  - id: winmerge-poco-testsuite-path
    desc: WinMerge bundled POCO testsuite source path
    crit: component
    conf: 0.98
    if:
      type: path
      regex: '(?i)poco.{0,160}testsuite[\\/]src[\\/]'
  - id: winmerge-shell-extension-register
    desc: WinMerge shell extension registration
    crit: notable
    conf: 0.9
    for: [batch]
    if:
      type: text
      regex: '(?is)WinMerge.{0,300}ShellExtension\.dll|ShellExtension\.dll.{0,300}WinMerge'
composite_rules:
  - id: winmerge-signed-installer-binary
    desc: WinMerge signed installer binary
    crit: notable
    conf: 0.99
    all:
      - id: winmerge-installer-path
      - id: metadata/signed/certificate/identity::pe-signature-verified
  - id: winmerge-signed-main-binary
    desc: WinMerge signed main executable
    crit: notable
    conf: 0.99
    all:
      - id: winmerge-main-exe-path
      - id: metadata/signed/certificate/identity::pe-signature-verified
  - id: winmerge-source-plugin-script
    desc: WinMerge full-source bundled plugin script
    crit: notable
    conf: 0.98
    any:
      - id: winmerge-known-plugin-script-name
      - id: winmerge-plugin-script-path
  - id: winmerge-bundled-testsuite-source
    desc: WinMerge full-source bundled C/C++ testsuite source
    crit: notable
    conf: 0.98
    all:
      - id: winmerge-full-source-archive-path
      - id: winmerge-poco-testsuite-path
