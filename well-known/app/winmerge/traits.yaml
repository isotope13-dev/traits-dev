defaults:
  platforms: [windows]
  for: [javascript, c, cpp]
  size_max: 5000000
traits:
  - id: winmerge-full-source-archive-path
    desc: WinMerge full source archive path
    crit: component
    conf: 0.98
    if:
      type: path
      regex: '(?i)winmerge-[0-9][^\\/]{0,80}-full-src\.7z[\\/]'
  - id: winmerge-plugin-script-path
    desc: WinMerge plugin script path
    crit: component
    conf: 0.98
    if:
      type: path
      regex: '(?i)dlls[\\/][^\\/]{1,80}\.sct$'
  - id: winmerge-known-plugin-script-name
    desc: Known WinMerge plugin scriptlet basename
    crit: baseline
    conf: 0.97
    if:
      type: path
      basename: true
      regex: '(?i)^(CompareMSExcelFiles|AI)\.sct$'
  - id: winmerge-poco-testsuite-path
    desc: WinMerge bundled POCO testsuite source path
    crit: component
    conf: 0.98
    if:
      type: path
      regex: '(?i)poco.{0,160}testsuite[\\/]src[\\/]'
composite_rules:
  - id: winmerge-source-plugin-script
    desc: WinMerge full-source bundled plugin script
    crit: baseline
    conf: 0.98
    any:
      - id: winmerge-known-plugin-script-name
      - id: winmerge-plugin-script-path
  - id: winmerge-bundled-testsuite-source
    desc: WinMerge full-source bundled C/C++ testsuite source
    crit: baseline
    conf: 0.98
    all:
      - id: winmerge-full-source-archive-path
      - id: winmerge-poco-testsuite-path
