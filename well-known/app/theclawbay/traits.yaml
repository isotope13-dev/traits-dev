defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

# The Claw Bay's Zo client intentionally reads the Zo desktop application's
# own session cookie so it can configure that same application's BYOK entry.
# These markers are narrowly scoped to that documented integration; they are
# used only to suppress the generic browser-cookie theft detection below.
traits:
  - id: theclawbay-config-prefix
    desc: Claw Bay Zo configuration prefix
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: The Claw Bay

  - id: theclawbay-zo-byok-api
    desc: Claw Bay Zo BYOK API markers
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'https://api\.zo\.computer'

  - id: theclawbay-zo-byok-path
    desc: Claw Bay Zo BYOK endpoint marker
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'pathname:\s*["'']/byok/["'']'

  - id: theclawbay-zo-cookie-marker
    desc: Claw Bay Zo access-token cookie markers
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'ZO_(COOKIE_HOST|ACCESS_TOKEN_COOKIE)[\s\S]{0,220}ZO_(COOKIE_HOST|ACCESS_TOKEN_COOKIE)'

composite_rules:
  - id: theclawbay-zo-byok-cookie-configuration
    desc: The Claw Bay Zo BYOK cookie configuration flow
    crit: exception
    conf: 0.99
    all:
      - id: theclawbay-config-prefix
      - id: theclawbay-zo-byok-api
      - id: theclawbay-zo-byok-path
      - id: theclawbay-zo-cookie-marker
