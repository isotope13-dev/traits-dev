defaults:
  platforms: [unix, windows]
  for: [scripts, source, markdown, text, plist, json, package.json, archives, elf]

traits:
- id: package-name
  desc: Claude Code VS Code extension package name
  crit: notable
  for: [package.json]
  if:
    type: value
    path: name
    exact: claude-code
- id: publisher
  desc: Anthropic Claude Code publisher
  crit: notable
  for: [package.json]
  if:
    type: value
    path: publisher
    exact: Anthropic
- id: native-product
  desc: Claude Code native product
  crit: notable
  for: [pe, dll]
  size_min: 1000000
  size_max: 300000000
  if:
    type: value
    path: pe.version.product_name
    exact: Claude Code
- id: native-publisher
  desc: Anthropic Claude Code publisher
  crit: notable
  for: [pe, dll]
  size_min: 1000000
  size_max: 300000000
  if:
    type: value
    path: pe.version.company
    exact: Anthropic PBC
- id: native-cli-member
  desc: Claude Code native CLI member
  crit: notable
  conf: 0.99
  for: [pe]
  size_max: 300000000
  if:
    type: path
    regex: '(^|[\\/])native-binary[\\/]claude\.exe$'
- id: native-linux-cli-member
  desc: Official Claude Code bundled Linux CLI member
  crit: notable
  conf: 0.99
  for: [elf]
  platforms: [unix]
  size_min: 1000000
  size_max: 300000000
  if:
    type: basename
    exact: claude
- id: native-linux-audio-member
  desc: Official Claude Code Linux audio addon member
  crit: notable
  conf: 0.99
  for: [elf]
  platforms: [unix]
  size_max: 5000000
  if:
    type: basename
    exact: audio-capture.node
- id: native-audio-member
  desc: Claude Code audio addon member
  crit: notable
  conf: 0.99
  for: [pe, dll]
  size_max: 5000000
  if:
    type: path
    regex: 'audio-capture[\\/]x64-win32[\\/]audio-capture\.node$'
- id: package-member-path
  desc: Claude Code versioned package member
  crit: notable
  conf: 0.99
  for: [scripts, source, markdown, text, plist, json, package.json, archives, javascript, pe, dll]
  size_max: 300000000
  if:
    type: path
    substr: claude-code-
- id: source-archive
  desc: Anthropic Claude Code source archive
  crit: baseline
  conf: 0.99
  for: [archive, tar, zip]
  if:
    type: path
    basename: true
    substr: claude-code
composite_rules:
- id: package-identity
  desc: Official Anthropic Claude Code VS Code extension identity
  crit: notable
  conf: 0.99
  scope: outer
  all:
  - id: package-name
  - id: publisher
- id: source-release
  desc: Anthropic Claude Code source release
  crit: notable
  conf: 0.99
  any:
  - id: package-member-path
  - id: source-archive
