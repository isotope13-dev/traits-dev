defaults:
  platforms: [unix, windows]
  for: [scripts, source, markdown, text, plist, json, package.json, archives]

traits:
- id: source-tree
  desc: Anthropic Claude Code source tree
  crit: baseline
  conf: 0.99
  if:
    type: path
    substr: claude-code-
- id: source-archive
  desc: Anthropic Claude Code source archive
  crit: baseline
  conf: 0.99
  for: [archive, tar, zip]
  if:
    type: path
    basename: true
    substr: claude-code
