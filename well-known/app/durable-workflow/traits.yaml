defaults:
  platforms: [unix, windows]
  for: [php, json]
  crit: baseline
  conf: 0.98

traits:
  - id: durable-workflow-archive-name
    desc: Durable workflow archive name
    if:
      type: path
      regex: '(?i)durable-workflow'
  - id: durable-workflow-namespace
    desc: Durable workflow PHP namespace
    if:
      type: text
      substr: Durable

composite_rules:
  - id: durable-workflow-package
    desc: Durable workflow package
    crit: notable
    conf: 0.98
    any:
      - id: durable-workflow-archive-name
      - id: durable-workflow-namespace
