defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.96

traits:
  - id: mojo-auth-client-marker
    desc: django-mojo browser authentication client
    if:
      type: text
      regex: '(MojoAuth\.init|var\s+MojoAuth\s*=|DEFAULT_ENDPOINTS[\s\S]{0,160}access_token)'
