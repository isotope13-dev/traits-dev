# LetsVPN — a legitimate consumer VPN client. Its installer carries this
# product-name identity; family composites reference it cross-dir alongside a
# malicious anchor (abused signing identity) to flag trojanized builds.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 512
  size_max: 500000000
traits:
  - id: letsvpn-product-identity
    desc: LetsVPN installer version identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)^LetsVPN\s*$'
