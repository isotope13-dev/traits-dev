defaults:
  platforms: [unix, windows]
  for: [python, pyc, archives, binaries, scripts]
  crit: notable
  conf: 0.98
  size_max: 300000000

composite_rules:
  - id: gns3-remote-install-context
    desc: Recognized GNS3 server remote installer
    conf: 0.99
    all:
      - id: gns3-server-source-path
      - id: gns3-remote-install-script

traits:
  - id: gns3-gui-package-member
    desc: GNS3 GUI package member
    if:
      type: path
      regex: 'gns3-gui-[0-9][^\\/]*|site-packages[\\/]gns3'
  - id: gns3-server-source-path
    desc: GNS3 server source tree path
    conf: 0.99
    if:
      type: path
      regex: 'github\.com[/\\]gns3[/\\]gns3-server@'
  - id: gns3-remote-install-script
    desc: GNS3 remote installer script path
    conf: 0.99
    for: [shell]
    if:
      type: path
      regex: '[/\\]scripts[/\\]remote-install\.sh$'
