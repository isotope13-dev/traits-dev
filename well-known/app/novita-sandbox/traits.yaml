defaults:
  platforms: [unix, windows]
  for: [python, pkginfo]
  crit: component
  conf: 0.95

traits:
  - id: novita-sandbox-python-package-path
    desc: Novita Sandbox Python package path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])novita_sandbox[\\/]'

  - id: novita-sandbox-python-source-marker
    desc: Novita Sandbox Python source marker
    for: [python]
    if:
      type: text
      substr: novita_sandbox

  - id: novita-sandbox-package-metadata
    desc: Novita Sandbox package metadata name
    for: [pkginfo]
    crit: notable
    if:
      type: value
      path: name
      exact: novita-sandbox

composite_rules:
  - id: sdk-package-context
    desc: Novita Sandbox SDK package context
    crit: notable
    conf: 0.98
    all:
      - id: novita-sandbox-python-package-path
      - id: novita-sandbox-python-source-marker
