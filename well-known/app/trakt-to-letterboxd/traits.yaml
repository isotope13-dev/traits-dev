# Trakt-to-Letterboxd is a documented Selenium application that imports a
# user's Trakt watch history into the user's Letterboxd account. Its browser
# automation context explains the webdriver masking used during that flow.
defaults:
  platforms: [linux, macos, windows]
  for: [pkginfo, python, whl]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Trakt-to-Letterboxd package identity
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: trakt-to-letterboxd

  - id: project-repository
    desc: Trakt-to-Letterboxd project repository
    for: [pkginfo]
    if:
      type: value
      path: project-url[*]
      substr: github.com/louiscrc/trakt-to-letterboxd

  - id: source-tree-path
    desc: Trakt-to-Letterboxd Python source-tree path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])trakt_to_letterboxd[\\/]'

composite_rules:
  - id: selenium-source-context
    desc: Trakt-to-Letterboxd Selenium source context
    crit: exception
    conf: 0.99
    all:
      - id: source-tree-path
      - id: metadata/library/automation::selenium-python-webdriver-import
