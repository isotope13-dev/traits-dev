# JiniCode is a VS Code coding assistant. Its provider API-key use and
# read-only database helpers are product behavior, not credential theft or
# database pivoting. These narrow identities are used only as benign context.
defaults:
  platforms: [unix, windows]
  for: [package.json, vsix-manifest, javascript, markdown, text]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: JiniCode package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: jinicode

  - id: package-publisher
    desc: JiniCode package publisher
    for: [package.json]
    if:
      type: value
      path: publisher
      exact: jiniai

  - id: upstream-repository
    desc: JiniCode upstream repository
    for: [package.json, markdown, text]
    if:
      type: text
      regex: 'github\.com/GioMelik11/JiniAI([./\s"''`?#]|$)'

  - id: provider-user-agent
    desc: JiniCode provider user agent
    for: [javascript]
    if:
      type: text
      substr: 'JiniCode/1.0 (+https://jiniai.app)'

composite_rules:
  - id: redis-helper-command-context
    desc: Redis helper command and key-enumeration context
    crit: notable
    conf: 0.99
    all:
      - id: objectives/lateral-movement/delivery/database::redis-cli-marker
      - id: objectives/lateral-movement/delivery/database::redis-keys-glob

  - id: benign-read-only-database-tool-context
    desc: JiniCode read-only database helper context
    crit: exception
    conf: 0.99
    all:
      - id: provider-user-agent
      - id: redis-helper-command-context
