# Blastbox is a defensive malware-detonation and artifact-isolation service.
# The source intentionally discusses malware, grabbers, egress, and encrypted
# result archives; those words are product documentation, not attack intent.
defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: blastbox-source-path
    desc: Blastbox package source path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(^|[\\/])blastbox([\\/]|$)'

  - id: blastbox-defensive-source-marker
    desc: Blastbox sandbox or detonation source marker
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?is)\bblastbox\b.{0,240}\b(sandbox|detonat\w*|egress|artifact)\b'

composite_rules:
  - id: blastbox-defensive-source-context
    desc: Blastbox defensive analysis source context
    crit: exception
    conf: 0.99
    all:
      - id: blastbox-source-path
      - id: blastbox-defensive-source-marker
