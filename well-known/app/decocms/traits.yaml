defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  size_max: 5000000
traits:
- id: visual-editor-activate-message
  desc: Visual editor activation message
  crit: component
  conf: 0.93
  if:
    type: text
    substr: visual-editor::activate
- id: iframe-bootstrap-script-constant
  desc: Iframe bootstrap script constant
  crit: component
  conf: 0.9
  if:
    type: text
    substr: IFRAME_BOOTSTRAP_SCRIPT
- id: local-service-manager-context
  desc: Local service manager context
  crit: component
  conf: 0.9
  if:
    type: text
    regex: PostgreSQL[\s\S]{0,120}NATS[\s\S]{0,120}running
composite_rules:
- id: visual-editor-iframe-bootstrap
  desc: Visual editor iframe bootstrap
  crit: baseline
  all:
  - id: visual-editor-activate-message
  - id: iframe-bootstrap-script-constant
