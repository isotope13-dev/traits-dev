defaults:
  platforms: [windows, unix]
  for: [javascript, text, chrome-manifest, crx]
  size_max: 120000000
traits:
  - id: crx-path
    desc: Browser extension archive member path
    crit: notable
    conf: 0.95
    if:
      type: path
      regex: '\.crx[\\/]'
  - id: adblock-id-gighm
    desc: AdBlock extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: gighmmpiobklfepjocnamgkkbiglidom.crx
  - id: adblock-id-ndc
    desc: AdBlock Edge extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: ndcileolkflehcjpmjnfbnaibdcgglog.crx
  - id: ublock-id-ddk
    desc: uBlock Origin extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: ddkjiahejlhfcafbddmgiahcphecmpfh.crx
  - id: ublock-id-cim
    desc: uBlock Origin Edge ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: cimighlppcgcoapaliogpjjdehbnofhn.crx
  - id: ublock-id-odf
    desc: uBlock Origin Edge ID path
    crit: baseline
    conf: 0.98
    ref: sha256:642bf3b1f5e895ffcfcd59dde017a495a09312c20da0e4a0564abbbfb7d08eea
    if:
      type: path
      substr: odfafepnkmbhccpbejgmiehpchacaeak.crx
  - id: adblock-id-jia
    desc: Adblock rules extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: jiaopkfkampgnnkckajcbdgannoipcne.crx
  - id: extension-id-oof
    desc: Browser extension ID path
    crit: notable
    conf: 0.98
    if:
      type: path
      substr: oofgbpoabipfcfjapgnbbjjaenockbdp.crx
  - id: adblock-id-epc
    desc: uBlock package extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: epcnnfbjfcgphgdmggkamkmgojdagdnn.crx
  - id: adblock-resource-abp
    desc: Adblock background bundle path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: abp-background.js
  - id: adblock-resource-rulesets
    desc: Adblock rulesets resource path
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: 'rulesets[\\/](main|scripting)[\\/]'
  - id: adblock-resource-easylist
    desc: EasyList resource path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: easylist.js
  - id: adblock-marker-eyeo
    desc: Eyeo filter engine marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: webext-ad-filtering-solution
  - id: adblock-marker-easylist
    desc: EasyList bundle marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: easylist
  - id: adblock-marker-ublock
    desc: uBlock filter bundle marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: ublock-filters
  - id: wallet-id-metamask
    desc: MetaMask extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: nkbihfbeogaeaoehlefnkodbefgpgknn.crx
  - id: wallet-id-rabby
    desc: Rabby extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: acmacodkjbdgmoleebolmdjonilkdbch.crx
  - id: wallet-id-coinbase
    desc: Coinbase Wallet extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: hnfanknocfeofbddgcijnmhnfnkdnaad.crx
  - id: wallet-id-iconex
    desc: ICONex extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: flpiciilemghbmfalicajoolhkkenfel.crx
  - id: wallet-id-slush
    desc: Slush wallet extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: opcgpfmipidbgpenhmajoajpbobppdil.crx
  - id: wallet-id-trust
    desc: Trust Wallet extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: egjidjbpglichdcondbcbdnbeeppgdph.crx
  - id: wallet-marker-metamask
    desc: MetaMask extension marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: MetaMask
  - id: wallet-marker-rabby
    desc: Rabby extension marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: Rabby
  - id: wallet-marker-coinbase
    desc: Coinbase Wallet marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: Coinbase Wallet extension
  - id: wallet-marker-iconex
    desc: ICONex extension marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: wallet.icon.foundation
  - id: wallet-marker-slush
    desc: Slush wallet marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: useSuiLedgerClient
  - id: wallet-marker-trust
    desc: Trust Wallet marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: Trust Wallet
  - id: wallet-marker-lavamoat
    desc: LavaMoat policy loader marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: LavaMoat
  - id: wallet-marker-ledger-policy
    desc: Ledger policy package marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: '@ledgerhq/hw-transport'
  - id: wallet-marker-zxcvbn
    desc: Wallet password strength marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      word: zxcvbn
  - id: password-manager-id-lastpass
    desc: LastPass extension ID path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: hdokiejnpimakedhajhdlcegeplioahd.crx
  - id: password-manager-marker-lastpass
    desc: LastPass extension marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: LastPass
  - id: wallet-marker-rn-stylesheet
    desc: React Native Web stylesheet marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: react-native-stylesheet
  - id: evernote-extension-path
    desc: Evernote Web Clipper path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: pioclpoplcdbaefihamjohnefbikjilc.crx
  - id: evernote-extension-marker
    desc: Evernote Web Clipper marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: '(Evernote|ServiceWorkerExtension\.js)'
  - id: localcdn-angular-ui-path
    desc: LocalCDN Angular UI library path
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: 'resources[\\/]angular-ui-bootstrap[\\/]'
  - id: localcdn-angular-ui-marker
    desc: Angular UI Bootstrap datepicker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: datepickerMode
  - id: localcdn-jquery-ui-datepicker
    desc: LocalCDN jQuery UI datepicker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: Datepicker.prototype
  - id: localcdn-semantic-ui-api
    desc: LocalCDN Semantic UI API component
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: 'semantic.{0,40}loadingDuration|loadingDuration.{0,80}apiSettings'
      case_insensitive: true
  - id: equatio-web-bundle-path
    desc: Equatio web bundle path
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '\.crx[\\/]content[\\/]webBundle\.js$'
  - id: equatio-extension-marker
    desc: Equatio browser extension marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: Equatio
  - id: honey-popover-wallet-bundle
    desc: Honey browser extension popover wallet bundle
    crit: notable
    conf: 0.98
    for: [javascript]
    if:
      type: value
      path: file.basename
      exact: h1-vendors-main-popover-wallet.js
composite_rules:
  - id: adblock-extension-id
    desc: Known ad blocker extension ID
    crit: baseline
    conf: 0.98
    any:
      - id: adblock-id-gighm
      - id: adblock-id-ndc
      - id: ublock-id-ddk
      - id: ublock-id-cim
      - id: ublock-id-odf
      - id: adblock-id-jia
      - id: adblock-id-epc
  - id: adblock-filter-resource
    desc: Known ad blocker filter resource
    crit: baseline
    conf: 0.98
    any:
      - id: adblock-resource-abp
      - id: adblock-resource-rulesets
      - id: adblock-resource-easylist
      - id: adblock-marker-eyeo
      - id: adblock-marker-easylist
      - id: adblock-marker-ublock
  - id: wallet-extension-id
    desc: Known wallet extension ID
    crit: baseline
    conf: 0.98
    any:
      - id: wallet-id-metamask
      - id: wallet-id-rabby
      - id: wallet-id-coinbase
      - id: wallet-id-iconex
      - id: wallet-id-slush
      - id: wallet-id-trust
  - id: wallet-extension-marker
    desc: Known wallet extension marker
    crit: baseline
    conf: 0.98
    any:
      - id: wallet-marker-metamask
      - id: wallet-marker-rabby
      - id: wallet-marker-coinbase
      - id: wallet-marker-iconex
      - id: wallet-marker-slush
      - id: wallet-marker-trust
      - id: wallet-marker-lavamoat
      - id: wallet-marker-ledger-policy
      - id: wallet-marker-zxcvbn
      - id: wallet-marker-rn-stylesheet
  - id: localcdn-angular-ui-library
    desc: LocalCDN Angular UI library
    crit: notable
    conf: 0.98
    any:
      - id: localcdn-angular-ui-path
      - id: localcdn-angular-ui-marker
      - id: localcdn-jquery-ui-datepicker
      - id: localcdn-semantic-ui-api
  - id: adblock-extension-bundle
    desc: Known ad blocker extension bundle
    crit: notable
    conf: 0.98
    any:
      - id: adblock-filter-resource
      - id: adblock-extension-id
  - id: known-wallet-extension-bundle
    desc: Known benign wallet extension
    crit: notable
    conf: 0.98
    any:
      - id: wallet-extension-id
      - id: wallet-extension-marker
  - id: lastpass-extension-bundle
    desc: Known LastPass password-manager extension
    crit: notable
    conf: 0.98
    any:
      - id: password-manager-id-lastpass
      - id: password-manager-marker-lastpass
  - id: evernote-web-clipper-extension
    desc: Evernote Web Clipper extension
    crit: baseline
    conf: 0.98
    any:
      - id: evernote-extension-path
      - id: evernote-extension-marker
  - id: equatio-browser-extension-bundle
    desc: Equatio browser extension bundle
    crit: notable
    conf: 0.98
    any:
      - id: equatio-web-bundle-path
      - id: equatio-extension-marker
