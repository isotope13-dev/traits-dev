defaults:
  platforms: [linux]
  for: [elf, deb]
  crit: notable
  conf: 0.97

traits:
  - id: cryptographic-triangles-identity
    desc: Cryptographic Triangles wallet identity
    size_min: 1000000
    size_max: 500000000
    if:
      type: text
      regex: '(?i)Cryptographic Triangles|cryptographic-triangles\.org|triangles_v5'

  - id: cryptographic-triangles-wallet-network
    desc: Cryptographic Triangles Tor wallet context
    size_min: 1000000
    size_max: 500000000
    if:
      type: text
      regex: '(?i)(Triangles-(onion|wallet)|24112|Tri(angles)?-json-rpc)'

composite_rules:
  - id: cryptographic-triangles-tor-wallet-context
    desc: Cryptographic Triangles Tor wallet context
    crit: notable
    conf: 0.99
    all:
      - id: cryptographic-triangles-identity
      - id: cryptographic-triangles-wallet-network
