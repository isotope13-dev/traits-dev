defaults:
  platforms: [unix, windows]
  conf: 0.95

traits:
  - id: go-module-path
    desc: Concrnt Go module path
    crit: notable
    for: [go.mod]
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    if:
      type: text
      regex: '(?m)^module\s+github\.com/concrnt/concrnt\s*$'

  - id: go-source-import-path
    desc: Concrnt Go source import
    crit: notable
    for: [go]
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    if:
      type: import
      regex: '^github\.com/concrnt/concrnt(/|$)'

  - id: protocol-well-known-path
    desc: Concrnt well-known endpoint
    crit: notable
    for: [go, json, shell, python, javascript, typescript]
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    if:
      type: text
      substr: .well-known/concrnt

composite_rules:
  - id: go-project-identity
    desc: Concrnt Go project identity
    crit: notable
    for: [zip, go.mod, go]
    scope: archive
    conf: 0.96
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    all:
      - id: go-module-path
    any:
      - id: go-source-import-path
      - id: protocol-well-known-path
