defaults:
  platforms: [linux, macos, windows]
  for: [zip]
  crit: baseline
  conf: 0.98

traits:
  - id: firefox-omni-root-manifest
    desc: Firefox omni root chrome manifest
    if:
      type: value
      path: "archive.members[*].path"
      exact: chrome.manifest

  - id: firefox-omni-components-manifest
    desc: Firefox omni components manifest
    if:
      type: value
      path: "archive.members[*].path"
      exact: components/components.manifest

  - id: firefox-omni-aboutlogins-ui
    desc: Firefox omni about logins UI
    if:
      type: value
      path: "archive.members[*].path"
      exact: chrome/browser/content/browser/aboutlogins/components/input-field/login-password-field.mjs

  - id: firefox-omni-devtools-netmonitor
    desc: Firefox omni DevTools netmonitor module
    if:
      type: value
      path: "archive.members[*].path"
      exact: chrome/devtools/modules/devtools/client/netmonitor/src/connector/firefox-data-provider.js

  - id: firefox-chrome-migration-utils-module
    desc: Firefox Chrome migration utility module
    for: [javascript]
    if:
      type: basename
      exact: ChromeMigrationUtils.sys.mjs

  - id: firefox-chrome-profile-migrator-module
    desc: Firefox Chrome profile migrator module
    for: [javascript]
    if:
      type: basename
      exact: ChromeProfileMigrator.sys.mjs

composite_rules:
  - id: firefox-omni-runtime-archive
    desc: Firefox omni runtime archive
    crit: baseline
    conf: 0.99
    all:
      - id: well-known/lib/deb-package::firefox-omni-basename
      - id: firefox-omni-root-manifest
      - id: firefox-omni-components-manifest
    any:
      - id: firefox-omni-aboutlogins-ui
      - id: firefox-omni-devtools-netmonitor
