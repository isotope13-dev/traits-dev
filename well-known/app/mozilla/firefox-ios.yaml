defaults:
  platforms: [linux, windows, macos]
  for: [package.json, javascript, typescript]

traits:
  - id: firefox-ios-package-name
    desc: Mozilla Firefox iOS package name
    crit: component
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@mozilla/firefox-ios'

  - id: firefox-ios-repository
    desc: Mozilla Firefox iOS repository
    crit: component
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: repository.url
      substr: github.com/mozilla-mobile/firefox-ios

  - id: firefox-ios-description
    desc: Firefox for iOS package description
    crit: component
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: description
      exact: Firefox for iOS

composite_rules:
  - id: firefox-ios-package
    desc: Mozilla Firefox iOS package identity
    crit: notable
    conf: 0.99
    all:
      - id: firefox-ios-package-name
      - id: firefox-ios-repository
      - id: firefox-ios-description
