defaults:
  platforms: [windows]
  for: [pe]
  size_max: 52428800
traits:
  - id: firefox-pdb-path
    desc: Firefox browser app PDB path
    crit: component
    conf: 0.98
    size_min: 500000
    size_max: 4000000
    if:
      type: value
      path: pe.debug.pdb.path
      exact: c:\builds\moz2_slave\rel-m-rel-w32_bld-000000000000\build\obj-firefox\browser\app\firefox.pdb
  - id: legacy-firefox-pdb-path
    desc: Legacy Firefox browser app PDB
    crit: component
    conf: 0.99
    size_min: 250000
    size_max: 1500000
    if:
      type: value
      path: pe.debug.pdb.path
      exact: e:\fx19rel\WINNT_5.2_Depend\mozilla\obj-fx-trunk\browser\app\firefox.pdb
  - id: xulrunner-string
    desc: Firefox XULRunner bootstrap string
    crit: component
    conf: 0.97
    size_min: 250000
    size_max: 1500000
    if:
      type: text
      exact: XULRunner
      section: .rdata
  - id: firefox-application-ini
    desc: Firefox application.ini bootstrap marker
    crit: component
    conf: 0.97
    size_min: 250000
    size_max: 1500000
    if:
      type: text
      exact: application.ini
      section: .rdata
  - id: firefox-xul-dll
    desc: Firefox xul DLL dependency
    crit: component
    conf: 0.97
    size_min: 250000
    size_max: 1500000
    if:
      type: text
      exact: xul.dll
      section: .rdata
  - id: firefox-xpcom-dll
    desc: Firefox xpcom DLL dependency
    crit: component
    conf: 0.97
    size_min: 250000
    size_max: 1500000
    if:
      type: text
      exact: xpcom.dll
      section: .rdata
  - id: firefox-plugin-hang-ui-pdb-path
    desc: Firefox hang UI PDB path
    crit: component
    conf: 0.99
    size_min: 500000
    size_max: 4000000
    if:
      type: value
      path: pe.debug.pdb.path
      exact: c:\builds\moz2_slave\rel-m-rel-w32_bld-000000000000\build\obj-firefox\dom\plugins\ipc\hangui\plugin-hang-ui.pdb
  - id: webapprt-stub-pdb-path
    desc: Mozilla WebAppRT PDB path
    crit: component
    conf: 0.995
    size_min: 2500000
    size_max: 4500000
    if:
      type: value
      path: pe.debug.pdb.path
      exact: c:\builds\moz2_slave\rel-m-rel-w32_bld-000000000000\build\obj-firefox\webapprt\win\webapprt-stub.pdb
  - id: mozilla-updater-pdb-path
    desc: Mozilla updater PDB path
    crit: component
    conf: 0.99
    size_min: 500000
    size_max: 4000000
    if:
      type: value
      path: pe.debug.pdb.path
      exact: 'e:\fx19rel\WINNT_5.2_Depend\mozilla\obj-fx-trunk\toolkit\mozapps\update\src\updater\updater.pdb'
  - id: mozilla-update-manifest-name
    desc: Mozilla updater manifest marker
    crit: component
    conf: 0.96
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: update.manifest
      section: rdata
  - id: mozilla-update-mar-path
    desc: Mozilla MAR update path
    crit: component
    conf: 0.96
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: '%s/update.mar'
      section: rdata
  - id: firefox-launcher-regkey
    desc: Firefox launcher registry key marker
    crit: component
    conf: 0.98
    if:
      type: text
      exact: SOFTWARE\Mozilla\Firefox\Launcher
      section: .rdata
  - id: firefox-launcher-telemetry-url
    desc: Firefox launcher telemetry URL
    crit: component
    conf: 0.97
    if:
      type: text
      substr: incoming.telemetry.mozilla.org/submit/firefox-launcher-process
      section: .rdata
  - id: firefox-launcher-update-url
    desc: Firefox launcher update URL
    crit: component
    conf: 0.96
    if:
      type: text
      substr: https://aus5.mozilla.org/update/6/
      section: .rdata
  - id: firefox-winlauncher-source-path
    desc: Firefox winlauncher source path
    crit: component
    conf: 0.98
    if:
      type: text
      exact: /builds/worker/checkouts/gecko/browser/app/winlauncher/LauncherProcessWin.cpp
      section: .rdata
  - id: firefox-procthread-source-path
    desc: Firefox ProcThreadAttributes source path
    crit: component
    conf: 0.98
    if:
      type: text
      exact: /builds/worker/checkouts/gecko/browser/app/winlauncher/ProcThreadAttributes.h
      section: .rdata
  - id: firefox-mozglue-dll
    desc: Mozilla mozglue DLL reference
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: mozglue.dll
      section: .idata
composite_rules:
  - id: firefox-launcher-facade
    desc: Firefox launcher identity strings
    crit: component
    conf: 0.98
    all:
      - id: firefox-launcher-regkey
    any:
      - id: firefox-launcher-telemetry-url
      - id: firefox-launcher-update-url
      - id: firefox-winlauncher-source-path
      - id: firefox-procthread-source-path
    needs: 2
  - id: legacy-firefox-bootstrap
    desc: Legacy Firefox XUL bootstrap strings
    crit: component
    conf: 0.99
    size_min: 250000
    size_max: 1500000
    all:
      - id: legacy-firefox-pdb-path
      - id: firefox-application-ini
    any:
      - id: xulrunner-string
      - id: firefox-xul-dll
      - id: firefox-xpcom-dll
    needs: 2
