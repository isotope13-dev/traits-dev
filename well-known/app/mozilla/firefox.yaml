defaults:
  platforms: [windows]
  for: [pe]
  size_max: 52428800
traits:
  - id: firefox-pdb-path
    desc: Firefox browser app PDB path
    crit: component
    conf: 0.98
    size_min: 500000
    size_max: 4000000
    if:
      type: kv
      path: debug.pdb_path
      exact: c:\builds\moz2_slave\rel-m-rel-w32_bld-000000000000\build\obj-firefox\browser\app\firefox.pdb
  - id: firefox-plugin-hang-ui-pdb-path
    desc: Firefox hang UI PDB path
    crit: component
    conf: 0.99
    size_min: 500000
    size_max: 4000000
    if:
      type: kv
      path: debug.pdb_path
      exact: c:\builds\moz2_slave\rel-m-rel-w32_bld-000000000000\build\obj-firefox\dom\plugins\ipc\hangui\plugin-hang-ui.pdb
  - id: webapprt-stub-pdb-path
    desc: Mozilla WebAppRT PDB path
    crit: component
    conf: 0.995
    size_min: 2500000
    size_max: 4500000
    if:
      type: kv
      path: debug.pdb_path
      exact: c:\builds\moz2_slave\rel-m-rel-w32_bld-000000000000\build\obj-firefox\webapprt\win\webapprt-stub.pdb
  - id: mozilla-updater-pdb-path
    desc: Mozilla updater PDB path
    crit: component
    conf: 0.99
    size_min: 500000
    size_max: 4000000
    if:
      type: kv
      path: debug.pdb_path
      exact: 'e:\fx19rel\WINNT_5.2_Depend\mozilla\obj-fx-trunk\toolkit\mozapps\update\src\updater\updater.pdb'
  - id: mozilla-update-manifest-name
    desc: Mozilla updater manifest marker
    crit: component
    conf: 0.96
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: update.manifest
      section: rdata
  - id: mozilla-update-mar-path
    desc: Mozilla MAR update path
    crit: component
    conf: 0.96
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: '%s/update.mar'
      section: rdata
