defaults:
  platforms: [windows]
  for: [pe]
  size_max: 52428800
traits:
  - id: maintenance-service-pdb-path
    desc: Mozilla Maintenance Service PDB path
    crit: component
    conf: 0.99
    size_max: 2000000
    if:
      type: value
      path: pe.debug.pdb.path
      exact: c:\builds\moz2_slave\rel-m-rel-w32_bld-000000000000\build\obj-firefox\toolkit\components\maintenanceservice\maintenanceservice.pdb
  - id: maintenance-service-name
    desc: Mozilla Maintenance Service name
    crit: component
    conf: 0.98
    size_max: 2000000
    if:
      type: text
      exact: MozillaMaintenance
      section: rdata
  - id: maintenance-service-install-log
    desc: Mozilla Maintenance Service install log marker
    crit: component
    conf: 0.97
    size_max: 2000000
    if:
      type: text
      exact: maintenanceservice-install.log
      section: rdata
  - id: maintenance-service-uninstall-log
    desc: "Mozilla maint Service uninstall log artifact"
    crit: component
    conf: 0.97
    size_max: 2000000
    if:
      type: text
      exact: maintenanceservice-uninstall.log
      section: rdata
  - id: maintenance-service-key
    desc: Mozilla Maintenance Service key
    crit: component
    conf: 0.93
    size_min: 524288
    if:
      type: text
      regex: 'Software\\+Mozilla\\+MaintenanceService'
      section: rdata
  - id: maintenance-service-uninstall-key
    desc: Mozilla Maintenance Service uninstall key
    crit: component
    conf: 0.98
    size_min: 524288
    if:
      type: text
      regex: 'Software\\+Microsoft\\+Windows\\+CurrentVersion\\+Uninstall\\+MozillaMaintenanceService'
      section: rdata
  - id: crashreporter-host
    desc: Mozilla crashreporter host marker
    crit: component
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: crashreporter.exe
      section: rdata
  - id: crash-reporter-key
    desc: Mozilla Crash Reporter key
    crit: component
    conf: 0.95
    size_min: 524288
    if:
      type: text
      regex: 'Software\\+Mozilla\\+Crash Reporter'
      section: rdata
composite_rules:
  - id: maintenance-service
    desc: Mozilla Maintenance Service marker cluster
    crit: component
    conf: 0.98
    any:
      - id: maintenance-service-pdb-path
      - id: maintenance-service-name
      - id: maintenance-service-install-log
      - id: maintenance-service-uninstall-log
      - id: maintenance-service-key
      - id: maintenance-service-uninstall-key
    needs: 2
  - id: crash-reporter
    desc: Mozilla Crash Reporter marker cluster
    crit: notable
    conf: 0.97
    all:
      - id: crashreporter-host
      - id: crash-reporter-key
