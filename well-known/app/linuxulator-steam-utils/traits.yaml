defaults:
  platforms: [unix, freebsd]
  for: [c, cpp, source, shell, ruby, makefile]
  crit: notable
  conf: 0.97
traits:
  - id: source-tree-path
    desc: linuxulator-steam-utils source tree path
    if:
      type: path
      regex: 'linuxulator-steam-utils'

  - id: path-redirect-comment
    desc: LSU path-rewrite preload commentary
    for: [c, cpp]
    if:
      type: text
      substr: "Let's rewrite some paths"

  - id: steam-ca-bundle-redirect
    desc: LSU Steam CA bundle path redirect
    for: [c, cpp]
    if:
      type: text
      substr: /etc/ssl/certs/ca-certificates.crt
