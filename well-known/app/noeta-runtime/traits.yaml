defaults:
  platforms: [unix, windows]
  for: [python, whl, pkginfo]
  crit: component
  conf: 0.94

traits:
  - id: package-metadata-name
    desc: noeta-runtime package metadata
    for: [pkginfo, whl]
    if:
      type: text
      regex: '^Name:\s+noeta-runtime$'

  - id: package-module-path
    desc: Noeta runtime module path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])noeta[\\/]'

  - id: tool-runtime-protocol-import
    desc: Noeta tool protocol import
    for: [python]
    if:
      type: import
      regex: '^noeta\.protocols\.tool$'

  - id: mcp-client-module-path
    desc: Noeta MCP client module
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])mcp[\\/]_http_client\.py$'

composite_rules:
  - id: noeta-runtime-package
    desc: Noeta runtime package context
    crit: notable
    conf: 0.98
    any:
      - id: package-metadata-name
      - id: package-module-path
      - id: tool-runtime-protocol-import
      - id: mcp-client-module-path
