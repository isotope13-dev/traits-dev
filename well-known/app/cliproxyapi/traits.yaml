defaults:
  platforms: [windows, linux, macos]
  crit: notable
  conf: 0.96
  size_max: 2147483648

traits:
  - id: go-module-path
    desc: CLIProxyAPI Go module path
    crit: component
    for: [pe, elf, macho, archive]
    if:
      type: text
      substr: github.com/router-for-me/CLIProxyAPI/v7
  - id: readme-title
    desc: CLIProxyAPI package README title
    crit: component
    for: [archive, scripts]
    if:
      type: text
      substr: CLIProxyAPI

composite_rules:
  - id: cliproxyapi-package
    desc: Router-for-me CLIProxyAPI package or binary
    for: [pe, elf, macho, archive, scripts]
    any:
      - id: go-module-path
      - id: readme-title
