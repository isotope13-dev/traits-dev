defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 0.96
  size_max: 268435456

traits:
  - id: windows-release-bundle
    desc: mpv Windows release bundle
    for: [pe, dll]
    if:
      type: path
      regex: '(^|[\\/])mpv-v[0-9.]+-x86_64-pc-windows-msvc[\\/]'
  - id: app-name-string
    desc: mpv media player string
    for: [pe, dll, elf, macho]
    if:
      type: text
      exact: mpv
      section: rdata

composite_rules:
  - id: application-bundle
    desc: mpv media player bundle
    any:
      - id: well-known/app/mpv::app-name-string
      - id: well-known/app/mpv::windows-release-bundle
