# Official Salesforce DX / Lightning VS Code extensions and bundled Aura client code.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, json, package.json, vsix-manifest, archives, jar]
  crit: baseline
  conf: 0.98
  size_max: 524288000

traits:
  - id: salesforce-vscode-publisher
    desc: Salesforce VS Code extension publisher
    crit: notable
    for: [package.json, vsix-manifest, json]
    if:
      type: value
      path: publisher
      exact: salesforce
  - id: salesforce-vscode-package-name
    desc: Salesforce DX VS Code extension package name
    crit: notable
    for: [package.json, vsix-manifest, json]
    if:
      type: value
      path: name
      regex: '(?i)^salesforcedx-vscode'
  - id: salesforce-vscode-archive-name
    desc: Salesforce DX VS Code extension archive name
    crit: notable
    for: [archives]
    if:
      type: path
      regex: '(?i)(^|[\\/])salesforce\.salesforcedx-vscode-[^\\/]+\.vsix$'
  - id: salesforce-vscode-path
    desc: Salesforce DX VS Code extension path
    crit: notable
    if:
      type: path
      regex: '(?i)salesforcedx-vscode|apex-jorje-lsp'
  - id: salesforce-aura-client-marker
    desc: Salesforce Aura client service marker
    crit: notable
    for: [javascript]
    if:
      type: text
      regex: 'AuraClientService\.prototype\.handleNoAccessException|markup://aura:noAccess'

composite_rules:
  - id: salesforce-vscode
    desc: Official Salesforce VS Code extension package
    crit: notable
    any:
      - id: salesforce-vscode-publisher
      - id: salesforce-vscode-package-name
      - id: salesforce-vscode-archive-name
      - id: salesforce-vscode-path
      - id: salesforce-aura-client-marker
