defaults:
  platforms: [windows, linux, macos]
  for: [binaries, archives, text, json]
  size_min: 64
  size_max: 700000000
traits:
  - id: terraform-plugin-framework-module
    desc: Terraform plugin framework module
    for: [go, elf, macho, pe, text]
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: github.com/hashicorp/terraform-plugin-framework
  - id: ibm-cloud-provider-module
    desc: IBM Cloud Terraform provider module
    for: [go, elf, macho, pe, text]
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: github.com/IBM-Cloud/terraform-provider-ibm
composite_rules:
  - id: terraform-provider-binary
    desc: Terraform provider binary
    crit: baseline
    conf: 0.98
    any:
      - id: terraform-plugin-framework-module
      - id: micro-behaviors/communications/grpc::terraform-plugin-go-import
      - id: micro-behaviors/communications/grpc::terraform-grpc-provider-server
      - id: micro-behaviors/communications/grpc::terraform-go-plugin-serve
  - id: ibm-cloud-terraform-provider
    desc: IBM Cloud Terraform provider
    crit: baseline
    conf: 0.99
    all:
      - id: ibm-cloud-provider-module
    any:
      - id: terraform-plugin-framework-module
      - id: micro-behaviors/communications/grpc::terraform-plugin-go-import
