defaults:
  platforms: [unix, windows]
  for: [chrome-manifest, json, javascript]
  crit: baseline
  conf: 0.99

traits:
  - id: action-title
    desc: Online OCR browser-extension action title
    crit: notable
    for: [chrome-manifest]
    if:
      type: value
      path: action.default_title
      exact: Extract text from image
  - id: localized-name
    desc: Online OCR browser-extension localized name
    crit: notable
    for: [json]
    if:
      type: value
      path: appName.message
      exact: Online OCR
  - id: service-domain
    desc: Online OCR extension service domain
    crit: notable
    for: [chrome-manifest, javascript]
    if:
      type: string_literal
      substr: online-ocr.com

composite_rules:
  - id: extension-identity
    desc: Online OCR browser-extension identity
    crit: notable
    scope: archive
    any:
      - id: action-title
      - id: localized-name
      - id: service-domain
