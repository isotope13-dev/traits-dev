defaults:
  platforms: [android, unix, windows]
  for: [apk, jar, java, class, javascript, archives]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: ankidroid-case-path
    desc: AnkiDroid package path marker
    if:
      type: path
      substr: AnkiDroid

  - id: ankidroid-package-path
    desc: AnkiDroid package identifier path marker
    if:
      type: path
      substr: ankiandroid

  - id: ankidroid-package-string
    desc: AnkiDroid package identifier string
    if:
      type: text
      substr: com/ichi2/anki

  - id: ankidroid-backend-asset
    desc: AnkiDroid backend web asset
    if:
      type: path
      regex: 'assets[\\/]backend'

composite_rules:
  - id: package-member
    desc: AnkiDroid package member
    any:
      - id: ankidroid-case-path
      - id: ankidroid-package-path
      - id: ankidroid-package-string
      - id: ankidroid-backend-asset
