defaults:
  platforms: [linux, windows, macos]
  crit: notable
  conf: 0.95

traits:
  - id: libffmpeg-basename
    crit: notable
    for: [elf]
    platforms: [linux]
    desc: FFmpeg shared library basename
    size_min: 262144
    size_max: 10485760
    if:
      type: basename
      exact: libffmpeg.so
  - id: windows-publisher
    desc: Bitwarden Authenticode publisher
    crit: component
    for: [pe, dll]
    size_min: 1048576
    size_max: 536870912
    if:
      type: value
      path: pe.signatures[0].subject
      regex: 'Bitwarden Inc\.'
  - id: windows-executable
    desc: Bitwarden Windows executable
    crit: component
    for: [pe]
    size_min: 1048576
    if:
      type: path
      basename: true
      regex: 'Bitwarden(-Portable)?\.exe$'
      case_insensitive: true
  - id: chromium-import-helper
    desc: Bitwarden Chromium import helper
    crit: component
    for: [pe]
    size_min: 1048576
    size_max: 20971520
    if:
      type: path
      basename: true
      exact: bitwarden_chromium_import_helper.exe
      case_insensitive: true
  - id: desktop-napi-module
    desc: Bitwarden desktop native module
    crit: component
    for: [pe, dll]
    size_min: 1048576
    if:
      type: path
      basename: true
      regex: 'desktop_napi\.win32-(x64|ia32|arm64)-msvc\.node$'
      case_insensitive: true
  - id: desktop-napi-path-fragment
    desc: Bitwarden desktop native module path
    crit: component
    for: [pe, dll]
    size_min: 1048576
    if:
      type: path
      regex: 'desktop_napi\.win32'
      case_insensitive: true
  - id: electron-resource-path
    desc: Bitwarden Electron resource path
    crit: component
    for: [javascript, data, pe, dll]
    size_max: 268435456
    if:
      type: path
      regex: '@bitwarden[\\/]desktop-napi'
      case_insensitive: true
  - id: bitwarden-name-string
    desc: Bitwarden name string
    crit: component
    for: [javascript, data, pe]
    size_max: 268435456
    if:
      type: text
      word: Bitwarden
      case_insensitive: true
  - id: bitwarden-text-marker
    desc: Bitwarden text marker
    crit: component
    for: [javascript, data, pe]
    size_max: 268435456
    if:
      type: text
      substr: bitwarden
      case_insensitive: true
  - id: browser-extension-author
    desc: Bitwarden extension manifest author
    crit: component
    ref: sha256:4ae73a096b8766d860eb33ef6b6a9f6244e83dcbd316a8b16c6dfc9da7395d7d
    for: [chrome-manifest]
    if:
      type: value
      path: author
      exact: Bitwarden Inc.
  - id: browser-extension-homepage
    desc: Bitwarden extension homepage URL
    crit: component
    ref: sha256:4ae73a096b8766d860eb33ef6b6a9f6244e83dcbd316a8b16c6dfc9da7395d7d
    for: [chrome-manifest]
    if:
      type: value
      path: homepage_url
      exact: https://bitwarden.com
  - id: browser-extension-short-name
    desc: Bitwarden extension short name
    crit: component
    ref: sha256:4ae73a096b8766d860eb33ef6b6a9f6244e83dcbd316a8b16c6dfc9da7395d7d
    for: [chrome-manifest]
    if:
      type: value
      path: short_name
      exact: Bitwarden
  - id: desktop-native-host-name
    desc: Bitwarden desktop native host
    crit: component
    ref: sha256:4ae73a096b8766d860eb33ef6b6a9f6244e83dcbd316a8b16c6dfc9da7395d7d
    for: [javascript, typescript]
    if:
      type: string_literal
      exact: com.bitwarden.desktop

composite_rules:
  - id: bitwarden-windows-binary
    desc: Signed Bitwarden Windows binary
    crit: notable
    for: [pe, dll]
    all:
      - id: windows-publisher
    any:
      - id: windows-executable
      - id: chromium-import-helper
      - id: desktop-napi-module
      - id: desktop-napi-path-fragment
  - id: bitwarden-electron-resource
    desc: Bitwarden Electron app resource
    crit: notable
    for: [javascript, data]
    all:
      - id: metadata/package/files/runtime::electron-resources-app-asar
    any:
      - id: bitwarden-name-string
      - id: bitwarden-text-marker
  - id: bitwarden-app
    desc: Bitwarden password manager app
    crit: notable
    for: [pe, dll, javascript, data]
    any:
      - id: bitwarden-windows-binary
      - id: electron-resource-path
      - id: bitwarden-electron-resource
  - id: bitwarden-extension-manifest
    desc: Bitwarden extension manifest identity
    crit: notable
    ref: sha256:4ae73a096b8766d860eb33ef6b6a9f6244e83dcbd316a8b16c6dfc9da7395d7d
    for: [chrome-manifest]
    all:
      - id: browser-extension-author
      - id: browser-extension-homepage
      - id: browser-extension-short-name
  - id: bitwarden-extension-script
    desc: Bitwarden extension script
    crit: notable
    ref: sha256:4ae73a096b8766d860eb33ef6b6a9f6244e83dcbd316a8b16c6dfc9da7395d7d
    for: [javascript, typescript]
    all:
      - id: bitwarden-text-marker
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-api
  - id: bitwarden-browser-extension
    desc: Bitwarden browser extension
    crit: notable
    ref: sha256:4ae73a096b8766d860eb33ef6b6a9f6244e83dcbd316a8b16c6dfc9da7395d7d
    for: [javascript, typescript, chrome-manifest]
    any:
      - id: desktop-native-host-name
      - id: bitwarden-extension-manifest
      - id: bitwarden-extension-script
