defaults:
  platforms: [unix, windows]
  for: [elf, shell, batch, text, pe, archives]
  crit: notable
  conf: 0.98
  size_max: 600000000

traits:
  - id: virtualbox-path
    desc: VirtualBox package path marker
    if:
      type: path
      substr: virtualbox

  - id: virtualbox-case-path
    desc: VirtualBox mixed-case package path marker
    if:
      type: path
      substr: VirtualBox

  - id: vbox-path
    desc: VBox package path marker
    if:
      type: path
      substr: VBox

  - id: unattended-template
    desc: VirtualBox unattended install template
    if:
      type: path
      regex: 'UnattendedTemplates'

composite_rules:
  - id: package-member
    desc: VirtualBox package member
    any:
      - id: virtualbox-path
      - id: virtualbox-case-path
      - id: vbox-path
