# Ukelele is a macOS keyboard-layout editor.  These markers identify members
# of its source/release tree so the generic privileged-helper surface rules do
# not mistake its uninstall helper for malware persistence.
defaults:
  platforms: [macos]
  for: [shell, source, binaries, data]
  crit: notable
  conf: 0.97

traits:
  - id: ukelele-bundle-tree
    desc: Ukelele application tree member
    size_min: 128
    size_max: 600000000
    if:
      type: path
      regex: '(?i)(^|[\\/])Ukelele Cocoa([\\/]|$)'

  - id: ukelele-organization-marker
    desc: Ukelele organization identifier
    for: [shell, macho, dylib, c, cpp, objc, swift, plist]
    size_min: 128
    size_max: 600000000
    if:
      type: text
      regex: '(?i)org\.sil\.Ukelele|sillsdev/Ukelele'

composite_rules:
  - id: ukelele-release-member
    desc: Ukelele release or source member
    crit: notable
    any:
      - id: ukelele-bundle-tree
      - id: ukelele-organization-marker
