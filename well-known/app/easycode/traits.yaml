defaults:
  for: [macho]
  platforms: [macos]
  crit: baseline
  conf: 0.99
  size_min: 50000
  size_max: 500000

traits:
  - id: easycode-window-info-source-marker
    desc: EasyCode window helper source marker
    crit: component
    if:
      type: text
      section: __TEXT,__cstring
      substr: win_info/main.swift

composite_rules:
  - id: easycode-window-info-utility
    desc: EasyCode macOS window information helper
    crit: notable
    conf: 0.99
    all:
      - id: easycode-window-info-source-marker
      - id: micro-behaviors/ui/window/manage/enumerate::get-frontmost-application
