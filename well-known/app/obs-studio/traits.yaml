defaults:
  platforms: [windows, unix]
  for: [c, cpp, batch, text]

traits:
  - id: obs-source-path
    desc: OBS Studio source tree path
    crit: baseline
    conf: 0.95
    if:
      type: path
      regex: 'obs-studio-.{0,40}sources'

  - id: obs-project-string
    desc: OBS Studio project string
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: OBS Studio

composite_rules:
  - id: obs-studio-identity
    desc: OBS Studio source distribution
    crit: notable
    conf: 0.95
    any:
      - id: obs-source-path
      - id: obs-project-string
