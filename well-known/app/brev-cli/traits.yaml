defaults:
  platforms: [unix, windows]
  for: [shell, go]
  crit: notable
  conf: 0.98
traits:
  - id: source-tree-marker
    desc: Brev CLI source-tree path marker
    if:
      type: path
      regex: '(^|[/\\])brev-cli-[0-9]{1,4}(\.[0-9]{1,4}){1,4}([/\\]|$)'
      case_insensitive: true
  - id: github-repository-marker
    desc: Brev CLI GitHub repository marker
    if:
      type: text
      regex: '(?i)github\.com/brevdev/brev-cli\b'
