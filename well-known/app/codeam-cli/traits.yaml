defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json, package.json, npm]
  size_min: 1
  size_max: 10000000

traits:
  - id: codeam-cli-package-identity
    desc: CodeAM CLI package identity
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: codeam-cli

  - id: codeagent-mobile-api-identity
    desc: CodeAgent Mobile API identity
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: api.codeagent-mobile.com

  - id: codeagent-mobile-source-identity
    desc: CodeAgent Mobile source repository identity
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: github.com/edgar-durand/codeagent-mobile-clients

  - id: codeagent-mobile-extension-identity
    desc: CodeAgent Mobile VS Code extension identity
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: codeagent-mobile

  - id: codeagent-mobile-runtime-identity
    desc: CodeAgent Mobile extension runtime identity
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: text
      substr: CodeAgentMobile.codeagent-mobile

composite_rules:
  - id: codeam-cli-benign-remote-agent
    desc: CodeAM CLI documented remote-agent context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: codeam-cli-package-identity
      - id: codeagent-mobile-source-identity

  - id: codeagent-mobile-benign-remote-agent
    desc: CodeAgent Mobile documented remote-agent context
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: codeagent-mobile-api-identity
      - id: codeagent-mobile-runtime-identity
