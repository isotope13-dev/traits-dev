defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

traits:
  - id: core-package-import
    desc: Gemini CLI core package import
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: "@google/gemini-cli-core"
  - id: sandbox-env-selector
    desc: Gemini sandbox environment selector
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: "GEMINI_SANDBOX"

composite_rules:
  - id: sandbox-env-launcher
    desc: Gemini CLI sandbox command selector
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/fs/path/config/environment::dotenv-config-path
    any:
      - id: core-package-import
      - id: sandbox-env-selector
