defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: npcap-installer
    desc: Npcap Windows installer identity
    crit: notable
    conf: 0.95
    size_min: 200000
    size_max: 2000000
    if:
      type: value
      path: pe.version.description
      regex: '(?i)\bnpcap\b'

  - id: npcap-product-name
    desc: Npcap PE product name
    crit: notable
    conf: 0.99
    size_min: 200000
    size_max: 2000000
    if:
      type: value
      path: pe.version.product_name
      exact: Npcap
  - id: npcap-watchdog-script
    desc: Npcap watchdog PowerShell script
    crit: notable
    conf: 1.0
    for: [powershell]
    size_min: 1
    size_max: 65536
    if:
      type: path
      basename: true
      exact: npcapwatchdog.ps1
      case_insensitive: true


composite_rules:
  - id: npcap-installer-context
    desc: Recognized Npcap installer context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: npcap-installer
      - id: npcap-product-name
