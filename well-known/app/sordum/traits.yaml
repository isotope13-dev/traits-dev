defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.96
  size_min: 100000
  size_max: 3000000

traits:
  - id: sordum-utility
    desc: Sordum utility binary
    if:
      type: value
      path: pe.version.company
      exact: Sordum Software
  - id: sordum-dnsjumper
    desc: Sordum DNS Jumper binary
    if:
      type: basename
      exact: DnsJumper.exe
      case_insensitive: true
  - id: sordum-hedit
    desc: Sordum hEdit binary
    if:
      type: basename
      exact: hEdit.exe
      case_insensitive: true
