defaults:
  platforms: [unix, windows]
  for: [go, go.mod, shell, batch, powershell, zip]
  crit: notable
  conf: 0.94

traits:
  - id: sagernet-tailscale-module
    desc: SagerNet Tailscale module path
    if:
      type: text
      substr: github.com/sagernet/tailscale

  - id: tailscale-source-token
    desc: Tailscale source token
    if:
      type: text
      substr: tailscale.com/

  - id: install-script-url
    desc: Tailscale installation script URL
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: tailscale.com/install.sh

  - id: tailscale-init-script-name
    desc: Tailscale SysV init script basename
    crit: notable
    conf: 0.98
    for: [shell]
    if:
      type: basename
      exact: tailscale.init

  - id: tailscale-init-script-marker
    desc: Tailscale VPN init marker
    crit: notable
    conf: 0.98
    for: [shell]
    if:
      type: text
      substr: Tailscale VPN

composite_rules:
  - id: sagernet-source-tree
    desc: SagerNet Tailscale source tree
    crit: notable
    conf: 0.96
    all:
      - id: sagernet-tailscale-module
    any:
      - id: tailscale-source-token

  - id: tailscale-init-script-context
    desc: Tailscale SysV service script context
    crit: exception
    conf: 0.99
    for: [shell]
    all:
      - id: tailscale-init-script-name
      - id: tailscale-init-script-marker
