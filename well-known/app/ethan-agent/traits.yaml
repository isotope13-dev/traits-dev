defaults:
  platforms: [unix]
  for: [whl, python]
  crit: notable
  conf: 0.98

traits:
  - id: ethan-agent-package-name
    desc: Ethan personal AI agent package
    for: [whl]
    if:
      type: value
      path: 'whl.distribution'
      exact: ethan_agent

  - id: ethan-agent-watchdog-module
    desc: Ethan server watchdog module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)ethan/watchdog\.py$'
  - id: ethan-agent-browser-protocol-module
    desc: Ethan browser-control protocol module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)ethan/browser/protocol\.py$'

  - id: ethan-agent-wechat-channel-module
    desc: Ethan WeChat channel integration module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)ethan/interface/wechat_ilink\.py$'

  - id: ethan-agent-shell-tool-module
    desc: Ethan shell tool module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)ethan/tools/builtin/shell\.py$'

  - id: ethan-agent-computer-use-module
    desc: Ethan desktop-control integration module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)ethan/tools/builtin/computer_use\.py$'

  - id: ethan-agent-cua-driver-installer
    desc: Ethan optional cua-driver installer reference
    for: [python]
    if:
      type: text
      regex: 'trycua/cua/.{0,120}(install\.sh|cua-driver)'

  - id: ethan-agent-server-module-path
    desc: Ethan launchd server module path
    for: [python]
    if:
      type: path
      regex: 'ethan/.{0,40}/server\.py$'

  - id: ethan-agent-launchd-service-marker
    desc: Ethan launchd service identifier
    for: [python]
    if:
      type: text
      regex: 'com\.ethan\.agent|cua-driver'

  - id: ethan-agent-skill-installer
    desc: Ethan GitHub skill installer
    for: [python]
    if:
      type: text
      regex: '(?i)git(hub)?\.com.{0,120}SKILL\.md'

  - id: ethan-agent-xiaohongshu-stealth
    desc: Ethan Xiaohongshu browser stealth module
    for: [python, javascript]
    if:
      type: path
      regex: '(?i)xiaohongshu.{0,40}stealth\.py$'

  - id: ethan-agent-config-module
    desc: Ethan agent config module path
    for: [python]
    if:
      type: path
      regex: '(?i)(^|/)ethan/.{0,20}config\.py$'

composite_rules:
  - id: ethan-agent-package
    desc: Ethan personal AI agent distribution
    crit: notable
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: ethan-agent-package-name
    any:
      - id: ethan-agent-watchdog-module
      - id: ethan-agent-browser-protocol-module
      - id: ethan-agent-wechat-channel-module
      - id: ethan-agent-shell-tool-module
      - id: ethan-agent-computer-use-module
      - id: ethan-agent-skill-installer
      - id: ethan-agent-xiaohongshu-stealth
      - id: ethan-agent-config-module
    needs: 1

  - id: ethan-agent-server-module-context
    desc: Recognized Ethan launchd server context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: ethan-agent-server-module-path
      - id: ethan-agent-launchd-service-marker
