defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
  size_min: 5000000
  size_max: 700000000

traits:
  - id: terraform-core-module
    desc: Terraform core Go module
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: go.main_module.path
      exact: github.com/hashicorp/terraform

composite_rules:
  - id: terraform-core-binary
    desc: Terraform core binary
    crit: notable
    conf: 0.99
    all:
      - id: terraform-core-module
      - id: micro-behaviors/communications/grpc::terraform-reattach-providers-env
