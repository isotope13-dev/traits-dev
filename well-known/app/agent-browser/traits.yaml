defaults:
  platforms: [unix]
  for: [typescript, javascript, source, archives]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: agent-browser-source-tree
    desc: agent-browser source tree
    if:
      type: path
      regex: 'agent-browser-[0-9][^\\/]*'

  - id: agent-browser-benchmark
    desc: agent-browser benchmark source
    if:
      type: path
      regex: 'benchmarks[\\/]bench\.ts$'
