# Benign source-hosting and OS-project domains (GitHub, Google, *BSD, kernel.org)
# that routinely appear in legitimate download/install commands. These are pure
# false-positive exclusions for the curl/wget download-and-execute composites in
# objectives/command-and-control/dropper/execution/pipe — a benign domain
# reference is not itself C2/dropper behavior, so it lives here (a neutral
# well-known tier) and the objective references it cross-tier in `unless:`.
defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: component
traits:
  - id: platform-domain
    desc: GitHub or Google platform domain
    conf: 0.9
    if:
      type: text
      regex: (?i)(github|google)\.com
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
  - id: os-project-domain-bsd
    desc: NetBSD/FreeBSD/kernel.org project domain
    conf: 0.9
    if:
      type: text
      regex: (?i)((net|free)bsd|kernel)\.org
  - id: os-project-domain-bsd-alt
    desc: OpenBSD/DragonFlyBSD/kernel.org project domain
    conf: 0.9
    if:
      type: text
      regex: (?i)((open|dragonfly)bsd|kernel)\.org
composite_rules:
  - id: os-project-domain
    desc: Benign BSD or kernel.org OS project domain
    crit: component
    conf: 1.0
    any:
      - id: os-project-domain-bsd
      - id: os-project-domain-bsd-alt
