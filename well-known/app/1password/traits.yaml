defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.99

traits:
  - id: onepassword-runtime-path
    desc: 1Password packaged runtime path
    for: [tar, elf, data]
    size_min: 1000
    size_max: 500000000
    if:
      type: basename
      regex: '(?i)^1password-[0-9]'

  - id: onepassword-runtime-marker
    desc: 1Password application runtime marker
    for: [binaries, data]
    size_min: 100000
    size_max: 500000000
    if:
      type: text
      regex: '(?i)(1Password for Linux|@ext\.agilebits\.com|1password\.com)'

  - id: onepassword-source-package
    desc: Official 1Password Linux package source
    for: [text, shell, archives]
    if:
      type: text
      substr: downloads.1password.com/linux/tar/

  - id: onepassword-native-module-name
    desc: 1Password native module filename
    for: [elf, data]
    size_min: 100000
    size_max: 500000000
    if:
      type: basename
      exact: index.node
      case_insensitive: true

  - id: onepassword-v8-snapshot-name
    desc: 1Password V8 context snapshot filename
    for: [data]
    size_min: 100000
    size_max: 5000000
    if:
      type: basename
      exact: v8_context_snapshot.bin
      case_insensitive: true

composite_rules:
  - id: onepassword-runtime-context
    desc: Recognized 1Password packaged runtime context
    crit: exception
    conf: 0.99
    for: [tar, elf, data]
    scope: archive
    all:
      - id: onepassword-runtime-path
      - id: onepassword-runtime-marker

  - id: onepassword-native-module-context
    desc: Recognized 1Password native module context
    crit: exception
    conf: 0.99
    for: [elf, data]
    all:
      - id: onepassword-native-module-name
      - id: onepassword-runtime-marker
