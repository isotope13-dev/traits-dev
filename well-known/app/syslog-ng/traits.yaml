defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.95

traits:
  - id: syslog-ng-debun-name
    desc: syslog-ng debug bundle name
    if:
      type: basename
      exact: syslog-ng-debun

  - id: syslog-ng-debug-bundle-header
    desc: syslog-ng debug bundle header
    if:
      type: text
      substr: 'syslog-ng-debun: syslog debug bundle generator'

composite_rules:
  - id: syslog-ng-debun
    desc: syslog-ng debug bundle generator
    crit: exception
    conf: 0.99
    all:
      - id: syslog-ng-debun-name
      - id: syslog-ng-debug-bundle-header
