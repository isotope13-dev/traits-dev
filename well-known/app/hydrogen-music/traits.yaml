# Hydrogen — advanced drum machine (https://www.hydrogen-music.org/)
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.96
  size_min: 64
  size_max: 50000000

traits:
  - id: hydrogen-core-soname
    desc: Hydrogen core shared library soname
    for: [elf, so]
    size_min: 10000
    size_max: 20000000
    if:
      type: text
      regex: 'libhydrogen-core-[0-9]+\.[0-9]+\.[0-9]+\.so'
      section: .dynstr

  - id: hydrogen-music-org-url
    desc: Hydrogen Music project URL
    for: [elf, so]
    size_min: 10000
    size_max: 20000000
    if:
      type: text
      substr: hydrogen-music.org
      section: .rodata

  - id: hydrogen-music-org-url-pkginfo
    desc: Hydrogen Music URL in package metadata
    for: [pkginfo, text]
    size_max: 100000
    if:
      type: text
      substr: hydrogen-music.org

  - id: hydrogen-h2core-namespace
    desc: Hydrogen H2Core C++ namespace marker
    for: [elf, so]
    size_min: 10000
    size_max: 20000000
    if:
      type: text
      # Itanium mangling for namespace H2Core lives in the dynamic string table.
      substr: 'N6H2Core'
      section: .dynstr

  - id: hydrogen-pkginfo-name
    desc: Arch package name hydrogen
    for: [pkginfo]
    size_max: 100000
    if:
      type: text
      regex: '(?m)^pkgname = hydrogen$'

composite_rules:
  - id: hydrogen-drum-machine
    desc: Hydrogen drum machine application
    crit: notable
    conf: 0.98
    for: [elf, so]
    size_min: 10000
    size_max: 20000000
    all:
      - id: hydrogen-h2core-namespace
    any:
      - id: hydrogen-core-soname
      - id: hydrogen-music-org-url
    needs: 1
