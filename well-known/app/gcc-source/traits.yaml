defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: gcc-source-archive-member
    desc: GCC source archive member
    for: [shell, c, text]
    if:
      type: path
      substr: gcc-
  - id: gcc-configure-path
    desc: GCC configure script path
    for: [shell]
    if:
      type: path
      regex: 'gcc[\\/]configure$'
  - id: gcc-reghunt-test-path
    desc: GCC reghunt test path
    for: [shell]
    if:
      type: basename
      regex: '^[0-9]+\.test$'

composite_rules:
  - id: gcc-configure-script
    desc: GCC configure script
    crit: baseline
    conf: 0.98
    all:
      - id: gcc-source-archive-member
      - id: gcc-configure-path
  - id: gcc-reghunt-test-script
    desc: GCC reghunt test script
    crit: baseline
    conf: 0.98
    all:
      - id: gcc-source-archive-member
      - id: gcc-reghunt-test-path
