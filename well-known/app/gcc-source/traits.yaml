defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: gcc-source-archive-member
    desc: GCC source archive member
    for: [shell, c, text]
    if:
      type: path
      substr: gcc-
  - id: gcc-reghunt-test-path
    desc: GCC reghunt test path
    for: [shell]
    if:
      type: basename
      regex: '^[0-9]+\.test$'
  - id: gcc-reghunt-helper-basename
    desc: GCC reghunt helper basename
    for: [shell]
    if:
      type: basename
      regex: '^gcc-svn-(record|check)fail$'
  - id: gcc-progtest-m4-basename
    desc: GCC progtest.m4 basename
    for: [shell]
    if:
      type: basename
      exact: progtest.m4

composite_rules:
  - id: gcc-configure-script
    desc: GCC configure script
    crit: baseline
    conf: 0.98
    all:
      - id: gcc-source-archive-member
      - id: metadata/file/extension/identity::autotools-configure-basename
  - id: gcc-reghunt-test-script
    desc: GCC reghunt test script
    crit: baseline
    conf: 0.98
    all:
      - id: gcc-source-archive-member
      - id: gcc-reghunt-test-path
  - id: gcc-reghunt-helper-script
    desc: GCC reghunt helper script
    crit: baseline
    conf: 0.98
    all:
      - id: gcc-source-archive-member
      - id: gcc-reghunt-helper-basename
  - id: gcc-progtest-m4-script
    desc: GCC progtest m4 script
    crit: baseline
    conf: 0.98
    all:
      - id: gcc-source-archive-member
      - id: gcc-progtest-m4-basename
