defaults:
  platforms: [windows]
  for: [pe]
  size_min: 32768
  size_max: 131072

traits:
  - id: infineon-cyusb3-driver-description
    desc: Infineon CyUSB3 driver product description
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: Infineon Generic USB3.0 Driver
      section: .text
  - id: infineon-cyusb3-original-filename
    desc: CyUSB3 driver original filename
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: CyUsb3.sys
      section: .rsrc

composite_rules:
  - id: infineon-cyusb3-driver
    desc: Infineon CyUSB3 USB 3.0 driver
    crit: notable
    conf: 0.99
    all:
      - id: infineon-cyusb3-driver-description
      - id: infineon-cyusb3-original-filename
