defaults:
  platforms: [unix, windows]
  for: [source, c, cpp, shell, powershell, text, tar]
  size_max: 268435456
  crit: component
  conf: 0.94

traits:
  - id: mesa-source-tree-path
    desc: Mesa graphics driver source tree
    if:
      type: path
      regex: 'mesa-[0-9][^\\/]*'

  - id: mesa-drm-shim-source-path
    desc: Mesa DRM shim source path
    if:
      type: path
      regex: 'drm-shim'

composite_rules:
  - id: mesa-driver-source-tree
    desc: Mesa graphics driver source tree
    crit: notable
    conf: 0.98
    any:
      - id: mesa-source-tree-path
      - id: mesa-drm-shim-source-path
