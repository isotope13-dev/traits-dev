defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.96

traits:
  - id: epson-company
    desc: Epson company metadata
    if:
      type: kv
      path: pe.version.company
      substr: SEIKO EPSON CORPORATION

  - id: epson-printer-driver-product
    desc: Epson printer driver product metadata
    if:
      type: kv
      path: pe.version.product_name
      substr: Epson Printer Driver

  - id: epson-printer-driver-description
    desc: Epson printer driver file description
    if:
      type: kv
      path: pe.version.description
      substr: Epson Printer Driver

  - id: epson-download-char-glyph-export
    desc: Epson printer glyph download export
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: export
      exact: DownloadCharGlyph

  - id: epson-download-font-header-export
    desc: Epson printer font header download export
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: export
      exact: DownloadFontHeader

  - id: epson-send-font-command-export
    desc: Epson printer font command export
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: export
      exact: SendFontCmd

  - id: epson-tt-download-method-export
    desc: Epson TrueType download method export
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: export
      exact: TTDownloadMethod

  - id: epson-write-printer-export
    desc: Epson printer write export
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: export
      exact: WritePrinter

composite_rules:
  - id: epson-printer-driver-exports
    desc: Epson printer driver print callback exports
    crit: component
    conf: 0.95
    any:
      - id: epson-download-char-glyph-export
      - id: epson-download-font-header-export
      - id: epson-send-font-command-export
      - id: epson-tt-download-method-export
      - id: epson-write-printer-export
    needs: 2

  - id: epson-printer-driver-binary
    desc: Epson printer driver binary
    crit: notable
    conf: 0.99
    all:
      - id: epson-company
    any:
      - id: epson-printer-driver-product
      - id: epson-printer-driver-description
      - id: epson-printer-driver-exports
    needs: 2
