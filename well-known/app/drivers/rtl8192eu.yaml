defaults:
  platforms: [linux]
  for: [c]
  crit: notable
  conf: 0.98

traits:
  - id: realtek-copyright-marker
    desc: Realtek WLAN driver copyright marker
    if:
      type: text
      substr: Realtek Corporation
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

  - id: rtw-wlan-util-marker
    desc: Realtek WLAN utility source marker
    if:
      type: text
      substr: _RTW_WLAN_UTIL_C_

composite_rules:
  - id: rtl8192eu-wlan-util-source
    desc: Realtek RTL8192EU WLAN utility source context
    crit: exception
    conf: 0.99
    all:
      - id: realtek-copyright-marker
      - id: rtw-wlan-util-marker
