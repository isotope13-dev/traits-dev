defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
traits:
  - id: realtek-corp-string
    desc: Realtek corporate string
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: Realtek Semiconductor Corp.
      section: .rsrc
  - id: librtscam-module
    desc: LibRTSCam module name
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: LibRTSCam.dll
      section: .rsrc
  - id: realtek-rmbchange-module
    desc: Realtek RmbChange module
    crit: component
    conf: 0.98
    if:
      type: text
      section: .rdata
      substr: RmbChange
  - id: realtek-card-reader-string
    desc: Realtek card reader string
    crit: component
    conf: 0.98
    if:
      type: text
      section: .rdata
      substr: Realtek Card Reader
composite_rules:
  - id: realtek-camera-stack
    desc: Realtek camera support binary
    crit: notable
    conf: 0.99
    any:
      - id: well-known/app/drivers::realtek-corp-string
      - id: well-known/app/drivers::librtscam-module
      - id: micro-behaviors/hardware/display/camera::uvc-dfu-export-cluster
  - id: realtek-rmbchange-tool
    desc: Realtek RmbChange card reader tool
    crit: notable
    conf: 0.99
    all:
      - id: well-known/app/protected-benign-pe::realtek-signer
      - id: realtek-rmbchange-module
    any:
      - id: realtek-card-reader-string
