defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: data-retriever-description
    desc: Data Retriever file description
    if:
      type: kv
      path: pe.version.description
      exact: Data Retriever

  - id: drs-export-create-instance
    desc: DRS create instance export
    crit: component
    conf: 0.92
    if:
      type: symbol
      kind: export
      exact: CreateDRSInstance

  - id: drs-export-scan
    desc: DRS scanner export
    crit: component
    conf: 0.92
    if:
      type: symbol
      kind: export
      exact: Scan

  - id: drs-module-name
    desc: DRS module filename string
    crit: component
    conf: 0.9
    if:
      type: text
      section: .rdata
      exact: gn__drs.dll

composite_rules:
  - id: data-retriever-scanner-component
    desc: Data Retriever scanner driver component
    crit: notable
    conf: 0.98
    all:
      - id: data-retriever-description
      - id: drs-export-create-instance
      - id: drs-export-scan
    any:
      - id: drs-module-name
      - id: micro-behaviors/os/service/config::scanner-printer-device-integration
