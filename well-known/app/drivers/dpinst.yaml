defaults:
  size_max: 10485760
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.96

traits:
  - id: dpinst-product-name
    desc: DPInst product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: Driver Package Installer (DPInst)

  - id: dpinst-description
    desc: DPInst file description
    if:
      type: value
      path: pe.version.description
      substr: Driver Package Installer

  - id: dpinst-manifest-name
    desc: DPInst manifest identity
    if:
      type: text
      exact: name="Microsoft.Windows.DPInst"
      section: rdata

composite_rules:
  - id: microsoft-dpinst-driver-installer
    desc: Microsoft DPInst driver installer
    crit: notable
    conf: 0.99
    all:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
    any:
      - id: dpinst-product-name
      - id: dpinst-description
      - id: dpinst-manifest-name
