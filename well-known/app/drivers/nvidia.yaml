defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.96
traits:
  - id: streamer-product-name
    desc: NVIDIA Streamer product metadata
    if:
      type: text
      exact: NVIDIA Streamer
      section: .rsrc
  - id: rxcore-file-description
    desc: NVIDIA rxcore file description
    if:
      type: text
      exact: NVIDIA rxcore
      section: .rsrc
  - id: rxcore-original-filename
    desc: NVIDIA rxcore original filename
    if:
      type: text
      exact: rxcore.dll
      section: .rsrc
  - id: ngx-dll-basename
    desc: NVIDIA NGX DLL basename
    crit: component
    conf: 0.96
    if:
      type: basename
      regex: '^(_?nvngx|nvngx_dlssg)\.dll$'
  - id: linux-driver-core-library-basename
    desc: NVIDIA Linux core driver library basename
    crit: component
    conf: 0.96
    platforms: [linux]
    for: [elf, so]
    size_max: 134217728
    if:
      type: basename
      regex: '^lib(nvidia|nvcuvid|nvoptix|cuda|cudadebugger)'
  - id: linux-driver-gl-library-basename
    desc: NVIDIA Linux GL driver library basename
    crit: component
    conf: 0.96
    platforms: [linux]
    for: [elf, so]
    size_max: 134217728
    if:
      type: basename
      regex: '^lib(EGL_nvidia|GLESv[12]_CM_nvidia|GLESv2_nvidia|GLX_nvidia)'
  - id: linux-driver-cli-basename
    desc: NVIDIA Linux driver CLI basename
    crit: component
    conf: 0.94
    platforms: [linux]
    for: [elf, shell]
    if:
      type: basename
      regex: '^nvidia-(debug|modp|ngx|pcc|persist|power|smi|xconf)'
  - id: linux-driver-script-basename
    desc: NVIDIA Linux driver script basename
    crit: component
    conf: 0.94
    platforms: [linux]
    for: [shell]
    if:
      type: basename
      regex: '^nvidia-(bug-report|sleep)\.sh$'
  - id: linux-driver-mps-utility-basename
    desc: NVIDIA MPS utility basename
    crit: component
    conf: 0.94
    platforms: [linux]
    for: [elf]
    if:
      type: basename
      regex: '^nvidia-cuda-mps-(control|server)$'
  - id: linux-driver-xorg-module-basename
    desc: NVIDIA Linux Xorg driver module basename
    crit: component
    conf: 0.94
    platforms: [unix]
    for: [elf, so]
    if:
      type: basename
      regex: '^(nvidia_drv|libglxserver_nvidia)\.so'
  - id: linux-driver-systemd-unit-path
    desc: NVIDIA Linux driver systemd unit path
    crit: component
    conf: 0.94
    platforms: [linux]
    for: [systemd, text]
    if:
      type: path
      regex: 'system[\\/]nvidia-[^\\/]+\.service$'
  - id: linux-driver-systemd-dropin-path
    desc: NVIDIA Linux driver systemd drop-in path
    crit: component
    conf: 0.94
    platforms: [linux]
    for: [systemd, text]
    if:
      type: path
      regex: 'service\.d[\\/]10-nvidia-[^\\/]+\.conf$'
  - id: linux-driver-systemd-sleep-hook-path
    desc: NVIDIA Linux driver systemd sleep hook path
    crit: component
    conf: 0.94
    platforms: [linux]
    for: [shell, text]
    if:
      type: path
      regex: 'system-sleep[\\/]nvidia$'
  - id: arch-nvidia-utils-package
    desc: Arch NVIDIA utils package basename
    crit: component
    conf: 0.94
    platforms: [unix, windows]
    size_max: 419430400
    if:
      type: value
      path: file.basename
      regex: '^nvidia-utils-[0-9][^/]*\.pkg\.tar\.(zst|xz|gz)$'
  - id: gsp-firmware-embedded-elf-path
    desc: NVIDIA GSP firmware embedded ELF path
    crit: component
    conf: 0.94
    platforms: [linux]
    for: [elf]
    if:
      type: path
      basename: true
      regex: '^gsp_(ga|tu)10x\.bin$'
  - id: gsp-firmware-binary-path
    desc: NVIDIA GSP firmware binary path
    crit: component
    conf: 0.94
    platforms: [unix, windows]
    size_max: 134217728
    if:
      type: value
      path: file.basename
      regex: '^gsp_(ga|tu)10x\.bin$'
composite_rules:
  - id: nvidia-streamer-rxcore
    desc: NVIDIA Streamer rxcore component
    crit: notable
    conf: 0.99
    all:
      - id: metadata/signed/developer::nvidia-corporation
      - id: streamer-product-name
      - id: rxcore-file-description
      - id: rxcore-original-filename
  - id: nvidia-windows-nvapi-context
    desc: Signed NVIDIA NVAPI Windows driver
    crit: exception
    conf: 0.99
    all:
      - id: metadata/signed/leaf::nvidia-corporation
      - id: metadata/binary/vendor::nvidia-nvapi-original-filename
      - id: metadata/binary/vendor::nvidia-nvapi-internal-name
      - id: metadata/binary/vendor::nvidia-nvapi-product-name
  - id: nvidia-linux-driver-component
    desc: NVIDIA Linux driver component
    crit: component
    conf: 0.96
    platforms: [linux]
    for: [elf, so, shell, systemd, text, tar]
    size_max: 134217728
    any:
      - id: linux-driver-core-library-basename
      - id: linux-driver-gl-library-basename
      - id: linux-driver-cli-basename
      - id: linux-driver-script-basename
      - id: linux-driver-mps-utility-basename
      - id: linux-driver-xorg-module-basename
      - id: linux-driver-systemd-unit-path
      - id: linux-driver-systemd-dropin-path
      - id: linux-driver-systemd-sleep-hook-path
      - id: arch-nvidia-utils-package
      - id: gsp-firmware-embedded-elf-path
      - id: gsp-firmware-binary-path
      - id: micro-behaviors/fs/proc/hardware::hardware-nvidia
      - id: micro-behaviors/hardware/display/screen::nvml-symbol-cluster
