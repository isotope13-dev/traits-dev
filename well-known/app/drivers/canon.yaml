defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.96

traits:
  - id: canon-company
    desc: Canon company metadata
    if:
      type: value
      path: pe.version.company
      substr: CANON INC.

  - id: canon-inkjet-printer-driver
    desc: Canon inkjet printer driver product metadata
    if:
      type: value
      path: pe.version.product_name
      substr: Canon Inkjet Printer Driver

  - id: canon-printer-driver-description
    desc: Canon printer driver file description
    if:
      type: value
      path: pe.version.description
      substr: Canon Inkjet Printer Driver

composite_rules:
  - id: canon-inkjet-printer-driver-binary
    desc: Canon inkjet printer driver binary
    crit: notable
    conf: 0.99
    all:
      - id: canon-company
    any:
      - id: canon-inkjet-printer-driver
      - id: canon-printer-driver-description
