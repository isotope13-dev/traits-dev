defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: aws-vault-archive-member
    desc: aws-vault archive member
    for: [go]
    if:
      type: path
      substr: aws-vault-
  - id: cli-command-basename
    desc: aws-vault CLI Go basename
    for: [go]
    if:
      type: basename
      regex: '^(export|exec)\.go$'

composite_rules:
  - id: aws-vault-cli-export
    desc: aws-vault CLI command source
    crit: baseline
    conf: 0.98
    all:
      - id: aws-vault-archive-member
      - id: cli-command-basename
