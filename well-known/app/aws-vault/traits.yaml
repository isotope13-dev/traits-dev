defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98
  size_max: 104857600

traits:
  - id: aws-vault-archive-member
    desc: aws-vault archive member
    for: [archives, binaries, go]
    if:
      type: path
      substr: aws-vault-
  - id: aws-vault-package-basename
    desc: aws-vault package basename
    for: [archive, tar]
    if:
      type: basename
      regex: '^aws-vault-[0-9].*\.(conda|tar\.zst|tar\.gz|zip)$'
  - id: aws-vault-binary-basename
    desc: aws-vault binary basename
    for: [elf, macho, pe]
    if:
      type: basename
      exact: aws-vault
  - id: aws-vault-binary-marker
    desc: aws-vault binary marker
    for: [elf, macho, pe]
    if:
      type: text
      section: .rodata
      substr: AWS_VAULT_OP
  - id: cli-command-basename
    desc: aws-vault CLI Go basename
    for: [go]
    if:
      type: basename
      regex: '^(export|exec)\.go$'

composite_rules:
  - id: aws-vault-cli-export
    desc: aws-vault CLI command source
    crit: baseline
    conf: 0.98
    all:
      - id: aws-vault-archive-member
      - id: cli-command-basename
  - id: aws-vault-package-context
    desc: aws-vault packaged CLI context
    crit: baseline
    conf: 0.98
    any:
      - id: aws-vault-archive-member
      - id: aws-vault-package-basename
      - id: aws-vault-binary-context
  - id: aws-vault-binary-context
    desc: aws-vault binary context
    crit: baseline
    conf: 0.98
    all:
      - id: aws-vault-binary-basename
      - id: aws-vault-binary-marker
