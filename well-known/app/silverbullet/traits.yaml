defaults:
  platforms: [unix]
  for: [elf]

traits:
  - id: silverbullet-module-path
    desc: SilverBullet Go module path
    crit: notable
    conf: 0.99
    size_min: 10000000
    size_max: 50000000
    if:
      type: symbol
      substr: github.com/silverbulletmd/silverbullet/

  - id: silverbullet-user-facing-marker
    desc: SilverBullet user-facing binary marker
    crit: notable
    conf: 0.99
    size_min: 10000000
    size_max: 50000000
    if:
      type: text
      regex: 'SilverBullet (CLI|is now running)'
      section: .rodata

composite_rules:
  - id: official-silverbullet-context
    desc: Official SilverBullet application context
    crit: exception
    conf: 0.99
    all:
      - id: silverbullet-module-path
      - id: silverbullet-user-facing-marker
