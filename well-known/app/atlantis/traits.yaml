defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.94
  size_min: 100000
  size_max: 5000000

traits:
  - id: atlantis-ini-marker
    desc: Atlantis configuration marker
    if:
      type: text
      exact: Atlantis.ini
      section: DATA

  - id: atlantis-awp-setup-marker
    desc: Atlantis AWP setup marker
    if:
      type: text
      exact: awp_setup
      section: .rsrc

composite_rules:
  - id: atlantis-word-processor-installer
    desc: Atlantis Word Processor installer
    all:
      - id: atlantis-ini-marker
      - id: atlantis-awp-setup-marker
