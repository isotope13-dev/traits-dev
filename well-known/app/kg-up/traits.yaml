defaults:
  platforms: [windows, unix]
  for: [javascript, html, pe]

traits:
  - id: kg-up-youtube-community-link
    desc: KG UP community YouTube link
    crit: notable
    conf: 0.99
    size_max: 1000000
    if:
      type: text
      exact: https://www.youtube.com/@kaio-kgup

  - id: kg-up-discord-community-link
    desc: KG UP community Discord link
    crit: notable
    conf: 0.99
    size_max: 1000000
    if:
      type: text
      exact: https://discord.com/invite/fTfamzmsHC

composite_rules:
  - id: kg-up-community-context
    desc: KG UP community documentation links
    crit: exception
    conf: 0.99
    all:
      - id: kg-up-youtube-community-link
      - id: kg-up-discord-community-link
