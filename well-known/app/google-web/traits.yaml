defaults:
  platforms: [unix, windows]
  for: [javascript, html]
  crit: component
  conf: 0.95

traits:
  - id: youtube-help-page-marker
    desc: YouTube Help Center page
    if:
      type: text
      regex: '<title>[^<]{0,120}YouTube Help</title>|support\.google\.com/youtube/(answer/)?'

  - id: google-helpcenter-shell-marker
    desc: Google Help Center shell
    if:
      type: text
      regex: 'class="hcfe"|data-page-type="(HOMEPAGE|ANSWER)"'

  - id: google-closure-copyright
    desc: Google Closure copyright marker
    if:
      type: text
      substr: "Copyright The Closure Library Authors."

  - id: google-llc-copyright
    desc: Google LLC copyright marker
    if:
      type: text
      substr: "Copyright Google LLC"

  - id: youtube-embed-player-marker
    desc: YouTube embedded player marker
    if:
      type: text
      regex: 'youtube-nocookie\.com/embed/|WEB_EMBEDDED_PLAYER|ytembeds'

  - id: youtube-watch-url-marker
    desc: YouTube watch URL marker
    if:
      type: text
      substr: "www.youtube.com/watch"

  - id: google-recaptcha-api-path
    desc: Google reCAPTCHA API path
    if:
      type: text
      substr: "https://www.google.com/recaptcha/api2/"

  - id: google-recaptcha-release-loader
    desc: Google reCAPTCHA release loader
    if:
      type: text
      substr: "https://www.gstatic.com/recaptcha/releases/"

  - id: google-recaptcha-client-marker
    desc: Google reCAPTCHA client marker
    if:
      type: text
      substr: "__google_recaptcha_client"

  - id: google-ads-prefetch-loader
    desc: Google Ads prefetch loader
    if:
      type: text
      substr: "https://ads.google.com/aw/google_ads_prefetch.js"

  - id: google-ads-bgc-site-marker
    desc: Google Ads BGC site marker
    if:
      type: text
      regex: 'site_id:"agc"|is-bgc|bgc_subid'

  - id: google-payments-integrator-callback-type
    desc: Google Payments integrator callback type symbol
    if:
      type: text
      word: IntegratorCallbackType

  - id: google-payments-integrator-encrypted-params
    desc: Google Payments encrypted params symbol
    if:
      type: text
      word: withEncryptedParameters

  - id: google-payments-integrator-frame-index
    desc: Google Payments integrator frame index symbol
    if:
      type: text
      word: paymentsFrameIndex

composite_rules:
  - id: google-payments-integrator-marker
    desc: Google Payments integrator API symbols
    crit: component
    conf: 0.95
    any:
      - id: google-payments-integrator-callback-type
      - id: google-payments-integrator-encrypted-params
      - id: google-payments-integrator-frame-index

  - id: youtube-help-center-page
    desc: Official YouTube Help page
    crit: notable
    conf: 0.97
    all:
      - id: youtube-help-page-marker
      - id: google-helpcenter-shell-marker

  - id: google-payments-integrator-bundle
    desc: Official Google Payments integrator bundle
    crit: notable
    conf: 0.97
    all:
      - id: google-closure-copyright
      - id: google-llc-copyright
      - id: google-payments-integrator-marker

  - id: youtube-embed-player-page
    desc: Official YouTube embedded player
    crit: notable
    conf: 0.97
    all:
      - id: youtube-embed-player-marker
      - id: youtube-watch-url-marker

  - id: google-recaptcha-api-loader
    desc: Official Google reCAPTCHA loader
    crit: notable
    conf: 0.98
    all:
      - id: google-recaptcha-api-path
      - id: google-recaptcha-release-loader
      - id: google-recaptcha-client-marker

  - id: google-ads-bgc-bootstrapper
    desc: Official Google Ads bootstrapper
    crit: notable
    conf: 0.98
    all:
      - id: google-closure-copyright
      - id: google-llc-copyright
      - id: google-ads-prefetch-loader
      - id: google-ads-bgc-site-marker

  - id: official-google-web-asset
    desc: Official Google web asset
    crit: notable
    conf: 0.97
    any:
      - id: youtube-help-center-page
      - id: youtube-embed-player-page
      - id: google-recaptcha-api-loader
      - id: google-ads-bgc-bootstrapper
      - id: google-payments-integrator-bundle
