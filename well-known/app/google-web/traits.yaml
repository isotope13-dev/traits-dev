defaults:
  platforms: [unix, windows]
  for: [javascript, html]
  crit: component
  conf: 0.95

traits:
  - id: youtube-help-page-marker
    desc: YouTube Help Center page
    if:
      type: text
      regex: '<title>[^<]{0,120}YouTube Help</title>|support\.google\.com/youtube/(answer/)?'

  - id: google-helpcenter-shell-marker
    desc: Google Help Center shell
    if:
      type: text
      regex: 'class="hcfe"|data-page-type="(HOMEPAGE|ANSWER)"'

  - id: google-support-canonical-url
    desc: Google Support canonical URL
    if:
      type: text
      regex: '<link href="https://support\.google\.com/.{1,160}" rel="canonical"'

  - id: google-closure-copyright
    desc: Google Closure copyright marker
    if:
      type: text
      substr: "Copyright The Closure Library Authors."

  - id: google-search-homepage-title
    desc: Google Search homepage title
    if:
      type: text
      substr: "<title>Google</title>"

  - id: google-search-description
    desc: Google Search description text
    if:
      type: text
      substr: "Search the world's information"

  - id: google-llc-copyright
    desc: Google LLC copyright marker
    if:
      type: text
      substr: "Copyright Google LLC"

  - id: google-platform-js-basename
    desc: Google platform.js asset basename
    if:
      type: path
      basename: true
      exact: platform.js

  - id: google-platform-js-domain
    desc: Google platform.js API domain marker
    if:
      type: text
      substr: apis.google.com

  - id: youtube-embed-player-marker
    desc: YouTube embedded player marker
    if:
      type: text
      regex: 'youtube-nocookie\.com/embed/|WEB_EMBEDDED_PLAYER|ytembeds'

  - id: youtube-watch-url-marker
    desc: YouTube watch URL marker
    if:
      type: text
      substr: "www.youtube.com/watch"

  - id: google-recaptcha-api-path
    desc: Google reCAPTCHA API root path
    if:
      type: text
      regex: 'https://www\.google\.com/recaptcha/(api2|enterprise)/'

  - id: google-recaptcha-url-fragment
    desc: Google reCAPTCHA URL reference
    if:
      type: text
      substr: "google.com/recaptcha"

  - id: google-recaptcha-checkbox-element
    desc: Google reCAPTCHA checkbox element
    if:
      type: text
      substr: recaptcha-checkbox

  - id: google-recaptcha-release-loader
    desc: Google reCAPTCHA release loader
    if:
      type: text
      substr: "https://www.gstatic.com/recaptcha/releases/"

  - id: google-recaptcha-client-marker
    desc: Google reCAPTCHA client marker
    if:
      type: text
      substr: "__google_recaptcha_client"

  - id: google-recaptcha-jserror-endpoint
    desc: Google reCAPTCHA JavaScript error endpoint
    if:
      type: literal
      substr: "/recaptcha/api2/jserrorlogging"

  - id: google-recaptcha-frame-main-entrypoint
    desc: Google reCAPTCHA frame main entrypoint
    if:
      type: literal
      exact: "recaptcha.frame.Main.init"

  - id: google-recaptcha-api-script
    desc: Google reCAPTCHA API script
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "https://www.google.com/recaptcha/api.js"

  - id: google-ads-prefetch-loader
    desc: Google Ads prefetch loader
    if:
      type: text
      substr: "https://ads.google.com/aw/google_ads_prefetch.js"

  - id: google-ads-bgc-site-marker
    desc: Google Ads BGC site marker
    if:
      type: text
      regex: 'site_id:"agc"|is-bgc|bgc_subid'

  - id: google-payments-integrator-callback-type
    desc: Google Payments integrator callback type symbol
    if:
      type: text
      word: IntegratorCallbackType

  - id: google-payments-integrator-encrypted-params
    desc: Google Payments encrypted params symbol
    if:
      type: text
      word: withEncryptedParameters

  - id: google-payments-integrator-frame-index
    desc: Google Payments integrator frame index symbol
    if:
      type: text
      word: paymentsFrameIndex

  - id: chrome-webstore-base-marker
    desc: Chrome Web Store base URL marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: 'https://chromewebstore.google.com/'

  - id: chrome-webstore-product-marker
    desc: Chrome Web Store product shell marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: ChromeWebStoreConsumerFeUi

composite_rules:
  - id: google-payments-integrator-marker
    desc: Google Payments integrator API symbols
    crit: component
    conf: 0.95
    any:
      - id: google-payments-integrator-callback-type
      - id: google-payments-integrator-encrypted-params
      - id: google-payments-integrator-frame-index

  - id: google-search-homepage
    desc: Official Google Search homepage
    crit: notable
    conf: 0.97
    all:
      - id: google-search-homepage-title
      - id: google-search-description

  - id: youtube-help-center-page
    desc: Official YouTube Help page
    crit: notable
    conf: 0.97
    all:
      - id: youtube-help-page-marker
      - id: google-helpcenter-shell-marker

  - id: google-help-center-page
    desc: Official Google Help page
    crit: notable
    conf: 0.99
    all:
      - id: google-helpcenter-shell-marker
      - id: google-support-canonical-url

  - id: google-payments-integrator-bundle
    desc: Official Google Payments integrator bundle
    crit: notable
    conf: 0.97
    all:
      - id: google-closure-copyright
      - id: google-llc-copyright
      - id: google-payments-integrator-marker

  - id: chrome-webstore-page
    desc: Official Chrome Web Store page
    crit: notable
    conf: 0.99
    all:
      - id: chrome-webstore-base-marker
      - id: chrome-webstore-product-marker

  - id: youtube-embed-player-page
    desc: Official YouTube embedded player
    crit: notable
    conf: 0.97
    all:
      - id: youtube-embed-player-marker
      - id: youtube-watch-url-marker

  - id: google-recaptcha-api-loader
    desc: Official Google reCAPTCHA loader
    crit: notable
    conf: 0.98
    all:
      - id: google-recaptcha-api-path
      - id: google-recaptcha-release-loader
      - id: google-recaptcha-client-marker

  - id: google-recaptcha-runtime
    desc: Official Google reCAPTCHA runtime
    crit: notable
    conf: 0.99
    all:
      - id: google-recaptcha-api-path
      - id: google-recaptcha-checkbox-element
      - id: google-recaptcha-jserror-endpoint
      - id: google-recaptcha-frame-main-entrypoint

  - id: google-ads-bgc-bootstrapper
    desc: Official Google Ads bootstrapper
    crit: notable
    conf: 0.98
    all:
      - id: google-closure-copyright
      - id: google-llc-copyright
      - id: google-ads-prefetch-loader
      - id: google-ads-bgc-site-marker

  - id: official-google-web-asset
    desc: Official Google web asset
    crit: notable
    conf: 0.97
    any:
      - id: google-search-homepage
      - id: youtube-help-center-page
      - id: youtube-embed-player-page
      - id: google-recaptcha-api-loader
      - id: google-ads-bgc-bootstrapper
      - id: google-payments-integrator-bundle
      - id: google-platform-js-asset

  - id: google-platform-js-asset
    desc: Official Google platform.js web asset
    crit: notable
    conf: 0.99
    all:
      - id: google-platform-js-basename
      - id: google-platform-js-domain
      - id: google-llc-copyright
