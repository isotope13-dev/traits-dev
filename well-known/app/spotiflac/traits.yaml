defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl]
  crit: baseline
  conf: 0.99

traits:
- id: package-name
  desc: SpotiFLAC package name
  crit: notable
  for: [pkginfo]
  if:
    type: text
    regex: '(?im)^Name:\s*SpotiFLAC\s*$'

- id: package-version
  desc: SpotiFLAC release version
  crit: notable
  for: [pkginfo]
  if:
    type: text
    regex: '(?im)^Version:\s*1\.4\.0\s*$'

- id: extension-registry-url
  desc: SpotiFLAC extension registry URL
  crit: notable
  if:
    type: text
    regex: 'raw\.githubusercontent\.com/zarzet/SpotiFLAC-Extension/'

- id: extension-runtime-member
  desc: SpotiFLAC extensions directory member
  crit: notable
  if:
    type: path
    regex: 'SpotiFLAC[\\/]extensions[\\/]'

- id: source-tree-member
  desc: SpotiFLAC source-tree member
  crit: notable
  if:
    type: path
    regex: '(^|[\\/])SpotiFLAC[\\/]'

- id: core-source-member
  desc: SpotiFLAC core source member
  crit: notable
  if:
    type: path
    regex: 'SpotiFLAC[\\/]core[\\/]'

- id: docker-turnstile-auth-fallback
  desc: SpotiFLAC Docker Turnstile auth fallback
  crit: notable
  if:
    type: text
    regex: 'running_in_docker[\s\S]{0,500}browser reale non disponibile'

composite_rules:
- id: package-identity
  desc: Recognized SpotiFLAC package context
  crit: exception
  conf: 0.99
  for: [whl]
  scope: archive
  all:
  - id: package-name
  - id: extension-runtime-member

- id: recognized-extension-file-context
  desc: Recognized SpotiFLAC extension file
  crit: exception
  conf: 0.99
  scope: file
  all:
  - id: source-tree-member
  - id: extension-runtime-member

- id: recognized-core-file-context
  desc: Recognized SpotiFLAC core file
  crit: exception
  conf: 0.99
  scope: file
  all:
  - id: source-tree-member
  - id: core-source-member
