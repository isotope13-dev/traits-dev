defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: civicrm-archive-member
    desc: CiviCRM source archive member
    for: [php, javascript, shell, json, package.json, source, data]
    size_min: 1
    size_max: 200000000
    if:
      type: path
      substr: civicrm-civicrm-core-
  - id: upgrade-form-basename
    desc: CiviCRM Form.php basename
    for: [php]
    if:
      type: basename
      exact: Form.php
  - id: schema-basename
    desc: CiviCRM Schema.php basename
    for: [php]
    if:
      type: basename
      exact: Schema.php
  - id: map-tpl-basename
    desc: CiviCRM map tpl basename
    for: [javascript]
    if:
      type: basename
      regex: '^(Google|OpenStreetMaps)\.tpl$'

composite_rules:
  - id: civicrm-upgrade-form
    desc: CiviCRM upgrade form source
    crit: baseline
    conf: 0.98
    all:
      - id: civicrm-archive-member
      - id: upgrade-form-basename
  - id: civicrm-test-schema
    desc: CiviCRM test schema fixture
    crit: baseline
    conf: 0.98
    all:
      - id: civicrm-archive-member
      - id: schema-basename
  - id: civicrm-google-map-template
    desc: CiviCRM Google map template
    crit: baseline
    conf: 0.98
    all:
      - id: civicrm-archive-member
      - id: map-tpl-basename
  - id: civicrm-source-identity
    desc: CiviCRM source tree identity
    crit: notable
    conf: 0.98
    any:
      - id: civicrm-upgrade-form
      - id: civicrm-test-schema
      - id: civicrm-google-map-template
      - id: civicrm-archive-member
