# Telegram Desktop — the legitimate Telegram desktop client. Its installer
# carries this product-name identity; family composites reference it cross-dir
# alongside a malicious anchor to flag trojanized/impersonating builds.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 512
  size_max: 500000000
traits:
  - id: telegram-desktop-product-identity
    desc: Telegram Desktop installer version identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)^Telegram Desktop\s*$'
  - id: telegram-desktop-company-identity
    desc: Telegram Desktop company identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.company_name
      regex: '(?i)^Telegram FZ-LLC\s*$'
  - id: telegram-desktop-authenticode-signer
    desc: Telegram Desktop Authenticode signer
    crit: notable
    conf: 0.98
    if:
      type: value
      path: pe.signatures[0].subject
      regex: 'CN=Telegram FZ-LLC\b.*O=Telegram FZ-LLC\b'
  - id: telegram-desktop-binary-path
    desc: Telegram Desktop packaged binary path
    crit: notable
    conf: 0.94
    platforms: [windows, unix]
    for: [pe, elf]
    if:
      type: path
      regex: '(^|[\\/])Telegram[\\/]Telegram(\.exe)?$'
  - id: telegram-desktop-source-header
    desc: Telegram Desktop source header
    crit: component
    conf: 0.96
    platforms: [unix, windows]
    for: [python, batch, c, cpp, objc]
    if:
      type: text
      substr: This file is part of Telegram Desktop
  - id: telegram-desktop-source-official-app
    desc: Telegram Desktop official app source header
    crit: component
    conf: 0.96
    platforms: [unix, windows]
    for: [python, batch, c, cpp, objc]
    if:
      type: text
      substr: official desktop application for the Telegram messaging service
  - id: telegram-desktop-source-tree-path
    desc: Telegram Desktop source root token
    crit: component
    conf: 0.96
    platforms: [unix, windows]
    for: [source]
    size_max: 2000000
    if:
      type: path
      regex: 'tdesktop-[0-9][^\\/]{0,64}'
  - id: telegram-desktop-build-prepare-path
    desc: Telegram Desktop build prepare script path
    crit: component
    conf: 0.98
    platforms: [unix, windows]
    for: [python]
    size_max: 200000
    if:
      type: basename
      exact: prepare.py
  - id: telegram-desktop-build-stage-helper
    desc: Telegram Desktop staged dependency builder
    crit: component
    conf: 0.98
    platforms: [unix, windows]
    for: [python]
    size_max: 200000
    if:
      type: text
      substr: "stage('msys64'"
  - id: desktop-app-toolkit-source-header
    desc: Desktop App Toolkit source header
    crit: component
    conf: 0.96
    platforms: [unix, windows]
    for: [c, cpp, objc]
    size_max: 500000
    if:
      type: text
      substr: This file is part of Desktop App Toolkit
  - id: telegram-desktop-third-party-path
    desc: Telegram Desktop third-party source path
    crit: component
    conf: 0.96
    platforms: [unix, windows]
    for: [source, shell]
    size_max: 2000000
    if:
      type: path
      regex: '(^|[\\/])ThirdParty[\\/]'
  - id: telegram-desktop-update-dictionaries-path
    desc: Telegram Desktop dictionary updater basename
    crit: component
    conf: 0.98
    platforms: [unix, windows]
    for: [python]
    size_max: 200000
    if:
      type: basename
      exact: update_dictionaries.py
  - id: telegram-desktop-bot-api-dictionary-upload
    desc: Telegram Desktop dictionary Bot API upload
    crit: component
    conf: 0.98
    platforms: [unix, windows]
    for: [python]
    size_max: 200000
    if:
      type: text
      substr: sendDocument
composite_rules:
  - id: telegram-desktop-source-identity
    desc: Telegram Desktop source file identity
    crit: notable
    conf: 0.96
    platforms: [unix, windows]
    for: [source]
    any:
      - id: telegram-desktop-source-header-identity
      - id: telegram-desktop-build-prepare-script
      - id: desktop-app-toolkit-telegram-source
      - id: telegram-desktop-third-party-source
      - id: telegram-desktop-dictionary-updater
  - id: telegram-desktop-source-header-identity
    desc: Telegram Desktop source header identity
    crit: notable
    conf: 0.96
    platforms: [unix, windows]
    for: [source]
    near_lines: 3
    all:
      - id: telegram-desktop-source-header
      - id: telegram-desktop-source-official-app
  - id: desktop-app-toolkit-telegram-source
    desc: Desktop App Toolkit in Telegram source tree
    crit: notable
    conf: 0.96
    platforms: [unix, windows]
    for: [source]
    all:
      - id: telegram-desktop-source-tree-path
      - id: desktop-app-toolkit-source-header
  - id: telegram-desktop-third-party-source
    desc: Telegram Desktop third-party source tree
    crit: notable
    conf: 0.96
    platforms: [unix, windows]
    for: [source, shell]
    all:
      - id: telegram-desktop-source-tree-path
      - id: telegram-desktop-third-party-path
  - id: telegram-desktop-dictionary-updater
    desc: Telegram Desktop dictionary updater script
    crit: notable
    conf: 0.98
    platforms: [unix, windows]
    for: [python]
    all:
      - id: telegram-desktop-update-dictionaries-path
      - id: telegram-desktop-bot-api-dictionary-upload
  - id: telegram-desktop-build-prepare-script
    desc: Telegram Desktop build prepare script
    crit: notable
    conf: 0.98
    platforms: [unix, windows]
    for: [python]
    all:
      - id: telegram-desktop-build-prepare-path
      - id: telegram-desktop-build-stage-helper
  - id: telegram-desktop-official-client
    desc: Telegram Desktop official client identity
    crit: notable
    conf: 0.97
    platforms: [unix, windows]
    for: [pe, elf, source]
    any:
      - id: telegram-desktop-product-identity
      - id: telegram-desktop-company-identity
      - id: telegram-desktop-source-identity
      - id: telegram-desktop-binary-path
  - id: telegram-desktop-inno-installer
    desc: Telegram Desktop Inno installer identity
    crit: notable
    conf: 0.98
    all:
      - id: telegram-desktop-official-client
      - id: metadata/binary/installer/script::inno-setup-installer
  - id: telegram-desktop-signed-inno-installer
    desc: Signed Telegram Desktop Inno installer context
    crit: exception
    conf: 0.98
    all:
      - id: telegram-desktop-inno-installer
      - id: telegram-desktop-authenticode-signer
