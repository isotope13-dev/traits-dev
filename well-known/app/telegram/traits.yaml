# Telegram Desktop — the legitimate Telegram desktop client. Its installer
# carries this product-name identity; family composites reference it cross-dir
# alongside a malicious anchor to flag trojanized/impersonating builds.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 512
  size_max: 500000000
traits:
  - id: telegram-desktop-product-identity
    desc: Telegram Desktop installer version identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)^Telegram Desktop\s*$'
