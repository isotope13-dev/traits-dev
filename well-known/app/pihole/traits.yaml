defaults:
  platforms: [linux]
  crit: baseline
  conf: 0.98

traits:
  - id: pihole-container-archive
    desc: Pi-hole container archive
    for: [tar]
    size_min: 1000000
    size_max: 2000000000
    if:
      type: path
      basename: true
      regex: '^docker\.io_pihole_pihole_.*\.tar\.xz$'
  - id: pihole-source-path
    desc: Pi-hole source or install path
    for: [shell, python]
    if:
      type: path
      regex: '(^|[\\/])(\.pihole|pihole)([\\/]|$)'
  - id: pihole-padd-path
    desc: Pi-hole PADD helper path
    for: [shell]
    if:
      type: path
      basename: true
      exact: padd

composite_rules:
  - id: pihole-artifact
    desc: Pi-hole application artifact
    crit: notable
    conf: 0.98
    any:
      - id: pihole-container-archive
      - id: pihole-source-path
      - id: pihole-padd-path
      - id: well-known/lib/benign-runtime-bundles::pihole-ftl-binary
