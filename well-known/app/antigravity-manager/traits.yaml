defaults:
  platforms: [unix]
  for: [dockerfile]
  crit: component
  conf: 0.96

traits:
  - id: antigravity-localdist-dockerfile-path
    desc: Antigravity Manager localdist Dockerfile path
    if:
      type: path
      regex: 'docker/Dockerfile\.backend\.localdist$'
  - id: antigravity-localdist-mirror-probe
    desc: Antigravity Manager localdist mirror probe
    if:
      type: text
      substr: USE_MIRROR

composite_rules:
  - id: antigravity-localdist-dockerfile
    desc: Antigravity Manager local distribution Dockerfile
    crit: notable
    conf: 0.98
    all:
      - id: antigravity-localdist-dockerfile-path
      - id: antigravity-localdist-mirror-probe
