defaults:
  platforms: [windows, linux, macos]
  for: [whl, python, pyc, pe]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 150000000

traits:
  - id: package-name
    desc: TurboADB package name metadata
    for: [whl]
    if:
      type: text
      regex: '(?m)^Name:\s*turboadb\s*$'
  - id: source-repository
    desc: TurboADB official source repository
    for: [whl]
    if:
      type: text
      substr: github.com/NVNKENNEDY/turboadb
  - id: gui-basename
    desc: TurboADB GUI executable basename
    for: [pe]
    if:
      type: basename
      exact: turboadb-gui.exe
  - id: gui-module-marker
    desc: TurboADB GUI module marker
    for: [pe]
    if:
      type: text
      section: overlay
      substr: turboadb.remote_deploy
  - id: gui-winrm-marker
    desc: TurboADB GUI WinRM dependency marker
    for: [pe]
    if:
      type: text
      section: overlay
      substr: winrm.tests.conftest
  - id: shared-adb-server
    desc: TurboADB shared ADB server behavior
    for: [python, pyc, pe]
    if:
      type: text
      regex: 'start_shared_server|0\.0\.0\.0.{0,80}5037|adb_server_args'
  - id: remote-winrm-deployment
    desc: TurboADB WinRM deployment behavior
    for: [python, pyc, pe]
    if:
      type: text
      regex: 'pywinrm|transport\s*=\s*.{0,20}ntlm|remote_deploy'
  - id: startup-task-install
    desc: TurboADB Windows startup task behavior
    for: [python, pyc, pe]
    if:
      type: text
      substr: TurboADBSharedADB
  - id: official-tool-download
    desc: TurboADB official tool download behavior
    for: [python, pyc, pe]
    if:
      type: text
      regex: 'platform-tools|Genymobile/scrcpy|download_tools'

composite_rules:
  - id: official-turboadb-gui
    desc: Official TurboADB GUI bundle context
    crit: exception
    conf: 0.99
    for: [pe]
    all:
      - id: gui-basename
      - id: gui-module-marker
      - id: gui-winrm-marker
