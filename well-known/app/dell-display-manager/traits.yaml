defaults:
  size_max: 2097152
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

traits:
  - id: dell-display-manager-name
    desc: Dell Display Manager version string
    if:
      type: text
      section: .entech
      exact: Dell Display Manager

  - id: entech-taiwan-string
    desc: EnTech Taiwan vendor string
    if:
      type: text
      section: .entech
      exact: EnTech Taiwan

  - id: entech-user-manifest
    desc: EnTech User application manifest
    if:
      type: text
      section: .entech
      substr: 'name="EnTech.User"'

  - id: mcontrol-original-filename
    desc: mControl original filename
    crit: component
    conf: 0.9
    if:
      type: text
      section: .entech
      exact: mControl.exe

composite_rules:
  - id: dell-display-manager-packed-binary
    desc: Dell Display Manager packed binary
    crit: notable
    conf: 0.98
    all:
      - id: well-known/app/protected-benign-pe::entech-taiwan-signer
      - id: metadata/binary/section/names::entech-section
    any:
      - id: dell-display-manager-name
      - id: entech-taiwan-string
      - id: entech-user-manifest
      - id: mcontrol-original-filename
      - id: metadata/binary/section/names::entech-section
