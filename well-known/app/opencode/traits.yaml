defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho]
  crit: baseline
  conf: 0.98
  size_min: 1000000
  size_max: 300000000

traits:
  - id: opencode-native-binary-name
    desc: OpenCode native binary name
    if:
      type: basename
      exact: opencode

composite_rules:
  - id: opencode-bun-runtime
    desc: OpenCode packaged Bun runtime
    crit: notable
    conf: 0.99
    all:
      - id: opencode-native-binary-name
      - id: metadata/binary/section/name::bun-section-name
