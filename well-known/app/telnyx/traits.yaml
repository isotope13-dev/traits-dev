defaults:
  platforms: [windows, unix]
  for: [python, pkginfo]
  crit: component
  conf: 0.98

traits:
  - id: package-name
    desc: Telnyx package name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: telnyx

  - id: package-summary
    desc: Telnyx official SDK summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      exact: The official Python library for the telnyx API

  - id: team-telnyx-repo
    desc: Team Telnyx repository reference
    if:
      type: text
      substr: "github.com/team-telnyx/telnyx-python"

  - id: stainless-generated-banner
    desc: Stainless generated SDK banner
    for: [python]
    if:
      type: text
      substr: "File generated from our OpenAPI spec by Stainless"

composite_rules:
  - id: official-python-sdk-package
    desc: Official Telnyx Python SDK package
    crit: baseline
    conf: 0.99
    all:
      - id: package-name
      - id: package-summary

  - id: official-generated-python-sdk
    desc: Official generated Telnyx Python SDK
    crit: baseline
    conf: 0.98
    all:
      - id: stainless-generated-banner
      - id: team-telnyx-repo
      - id: well-known/tool/development/stainless::stainless-generated-sdk
