defaults:
  platforms: [unix]
  for: [shell, text]
  crit: notable
  conf: 0.94

traits:
  - id: cisofy-lynis-banner
    desc: Lynis CISOfy script banner
    if:
      type: text
      regex: 'Lynis[\s\S]{0,220}CISOfy'
  - id: lynis-github-source
    desc: Lynis GitHub source URL
    if:
      type: text
      substr: https://github.com/CISOfy/lynis
  - id: audit-framework-functions
    desc: Lynis audit framework functions
    if:
      type: text
      regex: 'Register --test-no[\s\S]{0,400}(LogText|ReportSuggestion|Display --indent)'

composite_rules:
  - id: lynis-project-script
    desc: Lynis project script
    crit: notable
    conf: 0.98
    all:
      - id: cisofy-lynis-banner
      - id: lynis-github-source
  - id: lynis-audit-script
    desc: Lynis audit script
    crit: notable
    conf: 0.98
    all:
      - id: lynis-project-script
      - id: audit-framework-functions
