# Vellum's published CLI legitimately bootstraps Bun and starts local daemon
# processes. This package identity is used only as a scoped benign context for
# generic downloader/hidden-spawn detections; capabilities remain visible.
defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, shell, batch]

traits:
  - id: cli-package-name
    desc: Vellum CLI package name
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: name
      exact: "@vellumai/cli"
  - id: cli-bin-entrypoint
    desc: Vellum CLI package bin entrypoint
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: bin.vellum
      exact: "./src/index.ts"

composite_rules:
  - id: cli-package-context
    desc: Recognized Vellum CLI package context
    crit: exception
    conf: 1.0
    scope: archive
    any:
      - id: cli-package-name
      - id: cli-bin-entrypoint
