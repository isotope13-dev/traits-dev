defaults:
  platforms: [unix, windows]
  for: [source, scripts, documents, manifests, data]
  size_max: 52428800
traits:
  - id: stargate-tunnel-source
    desc: NVIDIA NVCF Stargate tunnel source
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: 'rust[\\/]stargate[\\/]crates'

  - id: multi-node-sample-container
    desc: NVIDIA NVCF multi-node sample container
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: 'multi-node-helm-[^\\/]+[\\/]container'

  - id: openbao-migration-script
    desc: NVIDIA NVCF OpenBao migration script
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: 'openbao[\\/]migrations'

  - id: ci-dependency-tooling
    desc: NVIDIA NVCF CI dependency tooling
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: 'ci[\\/]check-dependency-licenses$'

  - id: developer-setup-script
    desc: NVIDIA NVCF developer setup script
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: 'nvcf@[^\\/]+[\\/]setup\.sh$'
