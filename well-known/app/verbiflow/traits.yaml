# Verbiflow is a growth/outbound SDK whose local host adapter intentionally
# captures provider-scoped browser sessions for LinkedIn and Crunchbase.
defaults:
  platforms: [unix, windows]
  for: [python, whl]
  crit: notable
  conf: 0.99

traits:
  - id: package-identity
    desc: Verbiflow Python SDK package identity
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: verbiflow

  - id: package-summary
    desc: Verbiflow growth workflow SDK summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      exact: Python SDK for Verbiflow Growth workflows

  - id: host-browser-session-source
    desc: Verbiflow provider browser-session source
    for: [python]
    if:
      type: text
      regex: 'host_secrets|_extract_linkedin_cookie_session|host\.sessions\.capture'

  - id: host-secrets-module
    desc: Verbiflow host-secrets module path
    for: [python]
    if:
      type: path
      regex: '(^|/)verbiflow/host_secrets\.py$'

  - id: provider-cookie-capture-source
    desc: Verbiflow provider-cookie capture function
    for: [python]
    if:
      type: text
      substr: find_chrome_cookies_across_profiles

composite_rules:
  - id: verbiflow-host-browser-context
    desc: Recognized Verbiflow host-browser session context
    crit: exception
    conf: 0.99
    for: [python]
    all:
      - id: host-secrets-module
      - id: provider-cookie-capture-source
