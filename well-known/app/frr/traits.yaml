defaults:
  platforms: [linux]
  for: [elf, so, shell]
  crit: notable
  conf: 0.99
  size_min: 10000
  size_max: 50000000

traits:
  - id: frr-library-name
    desc: FRRouting shared library basename
    for: [so]
    if:
      type: value
      path: file.basename
      regex: '^libfrr\.so\.[0-9.]+$'

  - id: frr-library-dependency
    desc: FRRouting shared library dependency
    for: [elf]
    if:
      type: value
      path: elf.needed
      regex: '^libfrr\.so\.[0-9]+$'

  - id: frr-routing-marker
    desc: FRRouting routing implementation marker
    for: [elf, so]
    if:
      type: text
      section: .rodata
      regex: '(?i)FRRouting/|\bldpd daemon\b|\bfrr_config\b'

  - id: frr-init-header
    desc: FRRouting SysV init header
    for: [shell]
    if:
      type: text
      substr: 'Short-Description: start and stop the Frr routing suite'
    size_min: 100
    size_max: 100000

  - id: frr-init-layout
    desc: FRRouting daemon and configuration layout
    for: [shell]
    if:
      type: text
      regex: '/usr/lib/frr.{0,80}/etc/frr'
    size_min: 100
    size_max: 100000

composite_rules:
  - id: frr-runtime
    desc: FRRouting native component
    crit: notable
    conf: 0.99
    all:
      - id: frr-routing-marker
    any:
      - id: frr-library-name
      - id: frr-library-dependency

  - id: frr-native-routing-context
    desc: FRRouting native routing context
    crit: exception
    conf: 0.99
    all:
      - id: frr-runtime
      - id: frr-routing-marker
    any:
      - id: frr-library-name
      - id: frr-library-dependency

  - id: frr-init-script-context
    desc: FRRouting service init context
    crit: exception
    conf: 0.99
    all:
      - id: frr-init-header
      - id: frr-init-layout
