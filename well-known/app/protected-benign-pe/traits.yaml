defaults:
  size_max: 10485760
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95

traits:
  - id: entech-taiwan-signer
    desc: EnTech Taiwan signed protected PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=EnTech Taiwan\b'

  - id: beyondtrust-software-signer
    desc: BeyondTrust signed protected PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=BeyondTrust Software Inc\b'

  - id: contextmagic-clickyes-signer
    desc: ContextMagic ClickYes signed protected PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bLeonid Dmytriiev\b'

  - id: neoux-signer-thumbprint
    desc: neoux signed protected PE thumbprint
    conf: 0.98
    if:
      type: value
      path: pe.signatures[0].thumbprint_sha256
      exact: 2b0afb9406012c895f4539958ba015cd2032da310bd8092b78a4c9dac6174f2d

  - id: battleye-signer
    desc: BattlEye signed protected PE
    if:
      type: value
      path: pe.signatures[0].thumbprint_sha256
      regex: '^44995f1eef55c0eb11c4c0bde2628e195cfce9afd48aa69e4f174f9ac5c23787$'

  - id: realtek-signer
    desc: Realtek signed protected PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=Realtek Semiconductor Corp\b'

  - id: evgeny-suslikov-signer
    desc: Evgeny Suslikov signed utility PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bEvgeny Suslikov\b'

  - id: gen-digital-signer
    desc: Gen Digital signed utility PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=Gen Digital Inc\.?\b'

  - id: maksim-moisiuk-signer
    desc: Maksim Moisiuk signed utility PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bMaksim Moisiuk\b'

  - id: tailscale-signer
    desc: Tailscale signed installer PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=Tailscale Inc\.?\b'

  - id: cpuid-signer
    desc: CPUID signed installer PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bCN=CPUID\b'

  - id: wix-toolset-signer
    desc: WiX Toolset signed installer PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=WiX Toolset\b'

  - id: droidmonkey-apps-signer
    desc: DroidMonkey Apps signed PE
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bDroidMonkey Apps\b'
