# Recognized first-party VPN Browser extension context. The extension's broad
# host access, proxy authentication, token storage, and analytics are expected
# mechanics of this disclosed VPN product; they are not browsing-history theft
# unless separate page-data collection is present.
defaults:
  platforms: [windows, unix]
  for: [javascript, chrome-manifest]
  crit: notable
  conf: 0.98

traits:
  - id: vpn-browser-manifest-name
    desc: VPN Browser extension identity
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: VPN Browser

  - id: vpn-browser-service-domain
    desc: VPN Browser first-party service domain
    for: [javascript]
    if:
      type: text
      regex: 'https?://[A-Za-z0-9.-]{0,120}vpn-browser\.com\b'

composite_rules:
  - id: vpn-browser-extension-context
    desc: Recognized VPN Browser extension architecture
    crit: exception
    conf: 0.98
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: vpn-browser-manifest-name
      - id: vpn-browser-service-domain
      - id: micro-behaviors/os/network/webextension::chrome-proxy-settings-set
