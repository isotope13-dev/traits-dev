defaults:
  platforms: [windows]
  crit: notable
  conf: 0.95
  size_min: 1
  size_max: 200000000

traits:
  - id: parlem-driver-namespace
    desc: Parlem provisioning driver namespace
    for: [binaries, pe, dll]
    if:
      type: text
      substr: Parlem.Provisioning.Drivers
  - id: masstack-signups-service
    desc: MasStack signups WCF service
    for: [binaries, pe, dll]
    if:
      type: text
      substr: /mbsignups/services/Signups

composite_rules:
  - id: parlem-driver-context
    desc: Parlem provisioning drivers
    crit: notable
    conf: 0.95
    any:
      - id: parlem-driver-namespace
      - id: masstack-signups-service
