# Atom editor — GitHub credential helper. Benign FP context: its GraphQL viewer
# query + credential-helper banner resemble token theft.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript]
traits:
  - id: atom-github-credential-helper-context--rx-1
    desc: Atom git credential helper banner
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Atom git credential helper/1.0.0
    count_max: 1028184
  - id: atom-github-credential-helper-context--rx-2
    desc: GitHub viewer login GraphQL query
    crit: component
    conf: 0.98
    if:
      type: text
      substr: query { viewer { login } }
    count_max: 1028185
  - id: atom-github-credential-helper-context--rx-3
    desc: atom-github-git user agent
    crit: component
    conf: 0.98
    if:
      type: text
      substr: atom-github-git @
    count_max: 1028186
  - id: atom-github-credential-helper-context--rx-4
    desc: Atom credential helper timeout constant
    crit: component
    conf: 0.98
    if:
      type: text
      substr: '1600'
    count_max: 1028187
composite_rules:
  - id: atom-github-credential-helper-context
    desc: Atom GitHub credential helper context
    crit: notable
    conf: 0.98
    all:
      - id: atom-github-credential-helper-context--rx-1
      - id: atom-github-credential-helper-context--rx-2
      - id: atom-github-credential-helper-context--rx-3
      - id: atom-github-credential-helper-context--rx-4
    near_bytes: 4096
