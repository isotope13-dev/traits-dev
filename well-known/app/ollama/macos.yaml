defaults:
  platforms: [macos]
  for: [macho]
  size_max: 500000000
  crit: notable
  conf: 0.99

traits:
- id: ollama-macos-signing-identity
  desc: Ollama macOS code-signing identity
  if:
    type: value
    path: macho.code_signature.identifier
    regex: '^(ai\.ollama\.ollama|com\.electron\.ollama)$'
- id: ollama-macos-signing-team
  desc: Ollama macOS signing team identifier
  if:
    type: value
    path: macho.code_signature.team_id
    exact: 3MU9H2V9Y9

composite_rules:
- id: ollama-macos-signed-app-context
  desc: Signed Ollama macOS application context
  crit: exception
  all:
  - id: ollama-macos-signing-identity
  - id: ollama-macos-signing-team
