defaults:
  platforms:
  - windows
  - unix
  size_max: 5000000
traits:
- id: official-download-url
  desc: Official Ollama installer download URL
  crit: notable
  conf: 0.98
  for:
  - python
  - shell
  - text
  if:
    type: text
    regex: https://ollama\.com/(download/(OllamaSetup\.exe|Ollama-darwin\.zip)|install\.sh)\b

- id: ollama-api-tags-path
  desc: Ollama model-list API path
  crit: notable
  conf: 0.98
  for: [python]
  if:
    type: text
    substr: /api/tags
