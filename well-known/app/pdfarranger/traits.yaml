defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.99
  size_min: 50000
  size_max: 50000000

traits:
  - id: product-name
    desc: PDF Arranger product name
    if:
      type: value
      path: pe.version.product_name
      exact: PDF Arranger

  - id: company-name
    desc: PDF Arranger contributor company
    if:
      type: value
      path: pe.version.company
      exact: PDF Arranger Contributors

  - id: original-filename
    desc: PDF Arranger executable filename
    if:
      type: value
      path: pe.version.original_filename
      exact: pdfarranger.exe
      case_insensitive: true

composite_rules:
  - id: pdf-arranger-identity
    desc: PDF Arranger Windows executable identity
    crit: notable
    conf: 0.995
    all:
      - id: product-name
      - id: company-name
      - id: original-filename
