defaults:
  platforms: [unix]
  for: [python-sdist, python, shell, tar]
  crit: notable
  conf: 0.98

traits:
  - id: kiwi-package-name
    desc: KIWI appliance builder package
    for: [python-sdist]
    if:
      type: value
      path: 'python.name'
      exact: kiwi

  - id: kiwi-project-source-tree
    desc: KIWI appliance builder source tree
    for: [python-sdist]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)kiwi/'

  - id: kiwi-vagrant-image-bootstrap
    desc: KIWI Vagrant image bootstrap helper
    for: [shell]
    if:
      type: text
      regex: '(?i)vagrant insecure public key|vagrant ALL=\(ALL\) NOPASSWD: ALL'

  - id: kiwi-build-helper-context
    desc: KIWI system image build helper context
    for: [shell]
    if:
      type: text
      regex: '(?i)SUSE Software Solutions Germany|suseImportBuildKey'

  - id: kiwi-defaults-module
    desc: KIWI runtime defaults module
    for: [python]
    if:
      type: text
      substr: "/usr/share/kiwi/kiwi.yml.d"

  - id: kiwi-grub2-config-module
    desc: KIWI GRUB2 bootloader configuration module
    for: [python]
    if:
      type: text
      substr: "from kiwi.bootloader.template.grub2 import BootLoaderTemplateGrub2"

  - id: kiwi-grub2-test-fixture
    desc: KIWI GRUB2 test fixture
    for: [python]
    if:
      type: basename
      exact: grub2_test.py

  - id: kiwi-live-image-loader
    desc: KIWI live image fetch and mount logic
    for: [shell]
    if:
      type: text
      regex: '(?i)fetch_file\s*\([^\n]{0,80}\)|mount.{0,80}squashfs'

composite_rules:
  - id: kiwi-appliance-builder-package
    desc: KIWI operating-system image builder distribution
    crit: notable
    conf: 0.99
    for: [python-sdist]
    scope: archive
    all:
      - id: kiwi-package-name
    any:
      - id: kiwi-project-source-tree
      - id: kiwi-vagrant-image-bootstrap
      - id: kiwi-live-image-loader
    needs: 1
