# Dokku is an open-source container deployment platform. Its source tree
# contains privileged container initialization, SSH test setup, image cleanup,
# and build-time download helpers; those are benign project context, not an
# attacker objective when the tree is analyzed as a whole.
defaults:
  platforms: [unix]
  for: [scripts, source, archives, shell]
  crit: notable
  conf: 0.99
  size_max: 500000000

traits:
  - id: dokku-source-tree
    desc: Dokku source-tree path
    if:
      type: path
      regex: 'dokku@v[0-9]'
