defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json, html, shell, batch, elf, pe, macho, archives, data]
  crit: notable
  conf: 0.98
  size_max: 600000000

traits:
  - id: bruno-path
    desc: Bruno app path marker
    if:
      type: path
      substr: Bruno

  - id: usebruno-path
    desc: usebruno app path marker
    if:
      type: path
      substr: usebruno

  - id: v8-context-snapshot-name
    desc: Bruno Electron V8 context snapshot file
    crit: notable
    conf: 0.99
    for: [data]
    if:
      type: basename
      exact: v8_context_snapshot.x86_64.bin
      case_insensitive: true

composite_rules:
  - id: app-bundle
    desc: Bruno app bundle member
    any:
      - id: bruno-path
      - id: usebruno-path

  - id: v8-context-snapshot
    desc: Bruno Electron V8 context snapshot
    crit: exception
    conf: 0.99
    for: [data]
    all:
      - id: app-bundle
      - id: v8-context-snapshot-name
