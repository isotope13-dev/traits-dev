# Aitherium Agent Development Kit (aither-adk) — open-core Python toolkit for
# building AI agents with local/cloud LLM backends (Ollama, llama.cpp, etc.).
defaults:
  platforms: [unix, windows]
  for: [python, pyproject.toml, archives]
  crit: baseline
  conf: 0.98
  size_max: 524288000

traits:
  - id: aither-adk-package-name
    desc: aither-adk package metadata name
    crit: notable
    for: [archives]
    if:
      type: path
      regex: '(?i)(^|[\\/])aither[_-]adk-[^\\/]+\.whl$'
  - id: aither-adk-marker
    desc: Aither ADK product marker
    crit: notable
    for: [python]
    if:
      type: text
      regex: '(?i)Aitherium|aither-adk|portal\.aitherium\.com|~/\.aither/'
  - id: aither-adk-path
    desc: Aither ADK package path
    crit: notable
    if:
      type: path
      regex: '(^|[\\/])adk[\\/](cli|ollama_setup|setup_cli|addon_quadlet)\.py$'
      case_insensitive: true

composite_rules:
  - id: aither-adk
    desc: Aitherium Agent Development Kit package
    crit: notable
    any:
      - id: aither-adk-package-name
      - id: aither-adk-marker
      - id: aither-adk-path
