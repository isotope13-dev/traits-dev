defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.98

traits:
  - id: patch-validator-script
    desc: ungoogled-chromium patch validator script
    if:
      type: path
      regex: '(^|[\\/])devutils[\\/]validate_patches\.py$'
  - id: deps-var-marker
    desc: Patch validator dependency helper marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: _deps_var
  - id: chromium-version-marker
    desc: Patch validator Chromium version helper
    crit: component
    conf: 0.95
    if:
      type: text
      substr: get_chromium_version

composite_rules:
  - id: ungoogled-chromium-patch-validator
    desc: ungoogled-chromium patch validation tooling
    crit: notable
    conf: 0.99
    all:
      - id: patch-validator-script
    any:
      - id: deps-var-marker
      - id: chromium-version-marker
