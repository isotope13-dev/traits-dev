defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.99

traits:
  - id: package-metadata-name
    desc: EDB Debugger MCP package metadata identity
    for: [whl]
    if:
      type: text
      regex: '^Name:\s+edb-debugger-mcp$'

  - id: package-member-context
    desc: EDB Debugger MCP package member
    for: [python, markdown]
    if:
      type: path
      regex: '(^|[\\/])edb_debugger_mcp([\\/]|$)'

