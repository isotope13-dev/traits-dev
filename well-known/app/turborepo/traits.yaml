defaults:
  platforms: [unix, windows]
  for: [package.json, pe]
  crit: notable
  conf: 0.96

traits:
  - id: windows-platform-package
    desc: Turborepo Windows platform package
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@turbo/windows-64'

  - id: windows-arm64-platform-package
    desc: Turborepo Windows ARM64 platform package
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@turbo/windows-arm64'

  - id: upstream-repository
    desc: Turborepo upstream repository metadata
    for: [package.json]
    if:
      type: value
      path: repository
      exact: 'https://github.com/vercel/turborepo'
