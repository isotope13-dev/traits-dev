# Lightdash's CLI installer sends a documented anonymous install event to its
# own analytics endpoint. This identity only suppresses supply-chain
# exfiltration composites for this exact telemetry script; curl and host/OS
# discovery capabilities remain visible as notable traits.
defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: notable
  conf: 1.0

traits:
  - id: lightdash-track-script
    desc: Lightdash CLI install tracking script
    if:
      type: basename
      exact: track.sh

  - id: lightdash-install-event
    desc: Lightdash anonymous CLI install event marker
    if:
      type: text
      regex: 'lightdash_cli\.install\.'

  - id: lightdash-analytics-endpoint
    desc: Lightdash first-party install analytics endpoint
    if:
      type: text
      substr: analytics.lightdash.com/v1/track

composite_rules:
  - id: lightdash-anonymous-install-tracking
    desc: Recognized Lightdash anonymous install telemetry script
    crit: exception
    conf: 1.0
    all:
      - id: lightdash-track-script
      - id: lightdash-install-event
      - id: lightdash-analytics-endpoint
