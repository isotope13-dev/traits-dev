defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, markdown]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Vibe Usage npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@vibe-cafe/vibe-usage'

  - id: upstream-repository
    desc: Vibe Usage upstream repository reference
    for: [package.json, markdown]
    if:
      type: text
      regex: 'github\.com/vibe-cafe/vibe-usage([./\s"''`?#]|$)'

  - id: cursor-parser-source
    desc: Vibe Usage Cursor parser source marker
    for: [javascript]
    if:
      type: text
      substr: vibe-usage-cursor-

  - id: cursor-usage-export-endpoint
    desc: Vibe Usage Cursor usage export endpoint
    for: [javascript]
    if:
      type: text
      substr: export-usage-events-csv

composite_rules:
  - id: vibe-usage-archive-context
    desc: Recognized Vibe Usage package context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: package-name
      - id: upstream-repository

  - id: vibe-usage-cursor-source-context
    desc: Recognized Vibe Usage Cursor parser context
    crit: exception
    conf: 0.99
    all:
      - id: cursor-parser-source
      - id: cursor-usage-export-endpoint
