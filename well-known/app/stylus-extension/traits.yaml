defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.95
  size_min: 1
  size_max: 200000000

traits:
  - id: stylus-oauth-callback
    desc: Stylus OAuth callback URL
    for: [javascript]
    if:
      type: text
      substr: https://gusted.xyz/callback_helper/
  - id: stylus-userstyles-host
    desc: Stylus userstyles host
    for: [javascript, chrome-manifest]
    if:
      type: text
      substr: userstyles.org

composite_rules:
  - id: stylus-extension-context
    desc: Stylus extension context
    crit: notable
    conf: 0.95
    any:
      - id: stylus-oauth-callback
      - id: stylus-userstyles-host
