defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  - shell
  - python
  attack: T1105
  mbc: B0023
  size_max: 5000000
traits:
- id: nezha-disable-command-execute
  desc: Nezha agent config with cmd exec enabled
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: 'disable_command_execute: false'
- id: nezha-client-secret
  desc: Nezha agent client_secret config key
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'client_secret:'
- id: nezha-disable-force-update
  desc: Nezha agent config with force update disabled
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: 'disable_force_update: true'
- id: nezha-skip-connection-count
  desc: nezha skip connection count
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: skip_connection_count
- id: nezha-skip-procs-count
  desc: Nezha agent config suppressing proc reporting
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: skip_procs_count
- id: nezha-report-delay
  desc: Nezha agent report-delay flag
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: "--report-delay"
- id: nezha-skip-procs-flag
  desc: Nezha agent --skip-procs stealth flag
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: "--skip-procs"
- id: nezha-skip-conn-flag
  desc: Nezha agent --skip-conn stealth flag
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: "--skip-conn"
composite_rules:
- id: nezha-v1-config-template
  desc: Nezha v1 agent YAML config template in source code
  crit: suspicious
  conf: 0.95
  any:
  - id: nezha-disable-command-execute
  - id: nezha-client-secret
  - id: nezha-disable-force-update
  - id: nezha-skip-connection-count
  - id: nezha-skip-procs-count
  needs: 2
- id: nezha-v0-stealth-flags
  desc: Nezha v0 agent stealth CLI flags
  crit: suspicious
  conf: 0.92
  all:
  - id: nezha-skip-procs-flag
  - id: nezha-skip-conn-flag
