# The Competitive Programming Helper VS Code extension submits user-entered
# feedback to its documented Google Apps Script form.
defaults:
  platforms: [linux, macos, windows]
  for: [package.json, javascript, archives]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: CPH extension package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: competitive-programming-helper

  - id: publisher
    desc: CPH VS Code publisher identity
    for: [package.json]
    if:
      type: value
      path: publisher
      exact: DivyanshuAgrawal

  - id: repository
    desc: CPH public source repository
    for: [package.json, javascript]
    if:
      type: text
      substr: github.com/agrawal-d/competitive-programming-helper

  - id: feedback-form
    desc: CPH feedback form marker
    for: [javascript]
    if:
      type: text
      substr: feedbackSent

  - id: marketplace-item
    desc: CPH VS Marketplace item identity
    for: [javascript, package.json]
    if:
      type: text
      substr: DivyanshuAgrawal.competitive-programming-helper

composite_rules:
  # File-scoped: both markers sit in the same bundled frontend that POSTs
  # feedback to Apps Script. Avoid scope: outer — it evaluates against the
  # VSIX root (wrong type) and breaks unless: on nested JS.
  - id: cph-extension-context
    desc: Recognized CPH extension feedback context
    crit: exception
    conf: 0.99
    all:
      - id: feedback-form
      - id: marketplace-item

  # Archive-scoped identity for other members of the same VSIX.
  - id: cph-package-identity
    desc: Recognized CPH extension package identity
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: publisher
