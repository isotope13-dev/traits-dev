defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.98
  size_min: 1000000
  size_max: 200000000

traits:
  - id: deno-product-name
    desc: Deno PE product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: Deno
  - id: deno-runtime-description
    desc: Deno runtime PE description
    if:
      type: value
      path: pe.version.description
      exact: "Deno: A secure runtime for JavaScript and TypeScript"
  - id: deno-original-filename
    desc: Deno PE original filename
    if:
      type: value
      path: pe.version.original_filename
      exact: deno.exe

  - id: denort-runtime-basename
    desc: Deno compiled runtime basename
    if:
      type: value
      path: file.basename
      exact: denort.exe

  - id: denort-runtime-marker
    desc: Deno compiled runtime RDATA marker
    if:
      type: text
      exact: "deno_core::"
      section: .rdata

composite_rules:
  - id: deno-runtime-binary
    desc: Deno JavaScript runtime binary
    crit: notable
    conf: 0.99
    all:
      - id: deno-product-name
      - id: deno-runtime-description
    any:
      - id: deno-original-filename

  - id: denort-runtime-binary
    desc: Deno compiled runtime binary
    crit: notable
    conf: 0.99
    all:
      - id: denort-runtime-basename
      - id: denort-runtime-marker
