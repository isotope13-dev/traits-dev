defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, pkginfo, package.json, whl, archives, zip, markdown, text]
  crit: notable
  conf: 0.99
  size_min: 1
  size_max: 300000000

traits:
  - id: bobi-package-path
    desc: Bobi agent package artifact
    if:
      type: path
      regex: '(^|[\\/])bobi-[0-9][^\\/]*\.whl'

  - id: bobi-package-member-path
    desc: Bobi package member path
    if:
      type: path
      regex: '(^|[\\/])bobi[\\/]'

  - id: bobi-repository-reference
    desc: Moda Labs Bobi agent repository reference
    for: [python, javascript, typescript, pkginfo, whl, markdown, text]
    if:
      type: text
      substr: github.com/moda-labs/bobi-agent

  - id: bobi-package-name
    desc: Bobi Python package name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: bobi

composite_rules:
  - id: bobi-agent
    desc: Bobi event-driven AI-agent framework context
    all:
      - id: bobi-package-name
      - id: bobi-repository-reference
