defaults:
  platforms: [unix]
  crit: notable
  conf: 0.99
  size_min: 100000
  size_max: 268435456

traits:
  - id: env-marker
    desc: Cursor sandbox environment marker
    for: [elf]
    if:
      type: text
      substr: CURSOR_SANDBOX
      section: rodata
  - id: helper-source-path
    desc: Cursor sandbox-helper source path
    for: [elf]
    if:
      type: text
      substr: packages/sandbox-helper/native/sandbox/
      section: rodata
  - id: basename
    desc: cursorsandbox executable basename
    for: [elf]
    if:
      type: basename
      exact: cursorsandbox

composite_rules:
  - id: linux-sandbox-context
    desc: Cursor Linux agent sandbox helper
    any:
      - id: env-marker
      - id: helper-source-path
      - id: basename
