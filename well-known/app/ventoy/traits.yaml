defaults:
  size_max: 10485760
  platforms: [windows]
  for: [pe]

traits:
  - id: ventoyjump-marker
    desc: Ventoy jump helper marker
    crit: component
    conf: 0.99
    if:
      type: text
      substr: VentoyJump
      section: .rdata

  - id: vtlri-service-marker
    desc: Ventoy VTLRI service marker
    crit: component
    conf: 0.99
    if:
      type: text
      exact: VTLRI_SRV
      section: .rdata

  - id: ventoy-imdisk-sys-marker
    desc: Ventoy ImDisk sys path
    crit: component
    conf: 0.99
    if:
      type: text
      substr: ventoy\\imdisk.sys
      section: .rdata

  - id: ventoy-imdisk-exe-marker
    desc: Ventoy ImDisk exe path
    crit: component
    conf: 0.99
    if:
      type: text
      substr: ventoy\\imdisk.exe
      section: .rdata

  - id: plugson-log-marker
    desc: Ventoy Plugson log marker
    crit: component
    conf: 0.99
    if:
      type: text
      exact: VentoyPlugson.log
      section: .rdata

  - id: plugson-app-name
    desc: Ventoy Plugson app name
    crit: component
    conf: 0.99
    if:
      type: text
      exact: "====================== Ventoy Plugson ========================="
      section: .rdata

  - id: ventoy-json-path-marker
    desc: Ventoy JSON path marker
    crit: component
    conf: 0.99
    if:
      type: text
      exact: "%C:\\ventoy\\ventoy.json"
      section: .rdata

  - id: plugson-name-marker
    desc: VentoyPlugson name marker
    crit: component
    conf: 0.99
    if:
      type: text
      exact: VentoyPlugson
      section: .rdata
  - id: ventoy2disk-basename
    desc: Ventoy2Disk binary basename
    crit: component
    conf: 0.99
    if:
      type: path
      basename: true
      regex: '^Ventoy2Disk(_ARM)?\.exe$'

composite_rules:
  - id: ventoy-disk-tool
    desc: Ventoy disk imaging utility
    crit: baseline
    conf: 0.99
    any:
      - id: ventoy2disk-basename
      - id: ventoy-imdisk-helper
  - id: ventoy-imdisk-helper
    desc: Ventoy ImDisk service helper
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: ventoyjump-marker
      - id: vtlri-service-marker
      - id: ventoy-imdisk-sys-marker
      - id: ventoy-imdisk-exe-marker

  - id: plugson-binary
    desc: Ventoy Plugson binary markers
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: plugson-log-marker
      - id: plugson-app-name
      - id: plugson-name-marker
      - id: ventoy-json-path-marker
