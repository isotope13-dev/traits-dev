defaults:
  size_max: 10485760
  platforms: [windows]
  for: [pe]

traits:
  - id: ventoyjump-marker
    desc: Ventoy jump helper marker
    crit: component
    conf: 0.99
    if:
      type: text
      substr: VentoyJump
      section: .rdata

  - id: vtlri-service-marker
    desc: Ventoy VTLRI service marker
    crit: component
    conf: 0.99
    if:
      type: text
      exact: VTLRI_SRV
      section: .rdata

  - id: ventoy-imdisk-sys-marker
    desc: Ventoy ImDisk sys path
    crit: component
    conf: 0.99
    if:
      type: text
      substr: ventoy\\imdisk.sys
      section: .rdata

  - id: ventoy-imdisk-exe-marker
    desc: Ventoy ImDisk exe path
    crit: component
    conf: 0.99
    if:
      type: text
      substr: ventoy\\imdisk.exe
      section: .rdata

composite_rules:
  - id: ventoy-imdisk-helper
    desc: Ventoy ImDisk service helper
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: ventoyjump-marker
      - id: vtlri-service-marker
      - id: ventoy-imdisk-sys-marker
      - id: ventoy-imdisk-exe-marker
