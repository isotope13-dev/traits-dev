defaults:
  platforms: [unix]
  for: [shell]
  crit: component
  conf: 0.99

traits:
  - id: ventoyweb-basename
    desc: VentoyWeb script basename
    if:
      type: path
      basename: true
      exact: VentoyWeb.sh

  - id: ventoyplugson-basename
    desc: VentoyPlugson script basename
    if:
      type: path
      basename: true
      exact: VentoyPlugson.sh

  - id: ventoyvlnk-basename
    desc: VentoyVlnk script basename
    if:
      type: path
      basename: true
      exact: VentoyVlnk.sh

  - id: v2dserver-launch
    desc: Ventoy V2DServer launch line
    if:
      type: text
      substr: 'V2DServer "$HOST" "$PORT" &'

  - id: plugson-launch
    desc: Ventoy Plugson launch line
    if:
      type: text
      substr: '"$OLDDIR/tool/$TOOLDIR/Plugson" "$HOST" "$PORT"'

  - id: vlnk-tool-cache
    desc: Ventoy vlnk tool cache path
    if:
      type: text
      substr: '"$vtoydir/tool/$TOOLDIR/vlnk.xz"'

  - id: vlnk-usage-banner
    desc: Ventoy vlnk usage banner
    if:
      type: text
      substr: 'Usage:  sudo sh VentoyVlnk.sh CMD FILE'

  - id: busybox-shebang
    desc: Ventoy busybox shell shebang
    if:
      type: text
      exact: '#!/ventoy/busybox/sh'

  - id: runtime-root-path
    desc: Ventoy runtime root path
    if:
      type: text
      substr: 'VTOY_PATH=/ventoy'

  - id: udev-rule-marker
    desc: Ventoy udev rule filename
    if:
      type: text
      substr: '99-ventoy.rules'

  - id: buildgrub-basename
    desc: Ventoy GRUB build script basename
    if:
      type: path
      basename: true
      exact: buildgrub.sh

  - id: grub-build-banner
    desc: Ventoy GRUB build banner
    if:
      type: text
      substr: 'build grub2 for x86_64-efi'

  - id: grub-source-tar
    desc: Ventoy GRUB source tarball
    if:
      type: text
      substr: 'grub-2.04.tar.xz'

  - id: grub-install-script
    desc: Ventoy GRUB install helper
    if:
      type: text
      substr: 'sh install.sh'

  - id: livegui-banner
    desc: Ventoy Live GUI startup banner
    if:
      type: text
      substr: 'Starting Ventoy Live GUI <https://www.ventoy.net>'

  - id: livegui-background
    desc: Ventoy Live GUI background asset
    if:
      type: text
      substr: '/VTOY/background.png'

  - id: livegui-autostart
    desc: Ventoy Live GUI autostart path
    if:
      type: text
      substr: 'cp -a /VTOY/autostart /union/etc/xdg/openbox/autostart'

  - id: livecd-init-basename
    desc: Ventoy LiveCD init basename
    if:
      type: path
      basename: true
      exact: init.sh

  - id: livecd-init-driver-path
    desc: Ventoy LiveCD driver path
    if:
      type: text
      substr: /ventoy/drivers/

  - id: livecd-init-modlist
    desc: Ventoy LiveCD modlist path
    if:
      type: text
      substr: /ventoy/modlist

  - id: livecd-init-profile-hook
    desc: Ventoy LiveCD profile hook
    if:
      type: text
      substr: 'sh /ventoy/profile.sh'

composite_rules:
  - id: installer-script
    desc: Ventoy installer script context
    needs: 2
    any:
      - id: ventoyweb-basename
      - id: ventoyplugson-basename
      - id: ventoyvlnk-basename
      - id: v2dserver-launch
      - id: plugson-launch
      - id: vlnk-tool-cache
      - id: vlnk-usage-banner

  - id: runtime-hook-script
    desc: Ventoy runtime hook script context
    needs: 2
    any:
      - id: busybox-shebang
      - id: runtime-root-path
      - id: udev-rule-marker

  - id: grub-build-script
    desc: Ventoy GRUB source build script
    needs: 2
    any:
      - id: buildgrub-basename
      - id: grub-build-banner
      - id: grub-source-tar
      - id: grub-install-script

  - id: livecd-gui-init-script
    desc: Ventoy LiveCD GUI init script
    needs: 2
    any:
      - id: livegui-banner
      - id: livegui-background
      - id: livegui-autostart

  - id: livecd-init-script
    desc: Ventoy LiveCD init script
    needs: 2
    any:
      - id: livecd-init-basename
      - id: livecd-init-driver-path
      - id: livecd-init-modlist
      - id: livecd-init-profile-hook
