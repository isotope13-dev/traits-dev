defaults:
  platforms:
  - windows
  for:
  - c
  crit: component
  conf: 0.99
  size_max: 5000000
traits:
- id: vtoyjump-basename
  desc: vtoyjump source basename
  if:
    type: path
    basename: true
    exact: vtoyjump.c
- id: ventoyjump-symbol
  desc: VentoyJump source symbol
  if:
    type: text
    word: VentoyJump
- id: ventoy-imdisk-source-path
  desc: Ventoy imdisk source path
  if:
    type: text
    substr: ventoy\\imdisk.sys
- id: vtlri-service-source
  desc: VTLRI service source marker
  if:
    type: text
    word: VTLRI_SRV
composite_rules:
- id: ventoy-imdisk-source-helper
  desc: Ventoy ImDisk source helper
  needs: 2
  any:
  - id: vtoyjump-basename
  - id: ventoyjump-symbol
  - id: ventoy-imdisk-source-path
  - id: vtlri-service-source
