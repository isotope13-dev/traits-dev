defaults:
  platforms: [unix, windows]

traits:
  - id: skills-package-name
    desc: AceDataCloud skills package name
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: "@acedatacloud/skills"
  - id: personal-wechat-base-url
    desc: Personal WeChat configurable API base URL
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: PERSONALWECHAT_BASE_URL
  - id: personal-wechat-api-token
    desc: Personal WeChat API token environment input
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: PERSONALWECHAT_API_TOKEN
