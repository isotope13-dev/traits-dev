# Recognized cowork-flow workflow tooling. Its hooks intentionally prepend the
# package's bundled .cowork-flow/scripts directory so the hook can import the
# workflow runtime that ships with the template.
defaults:
  platforms: [unix, windows]
  for: [python, javascript]

traits:
  - id: cowork-flow-template-marker
    desc: cowork-flow workflow template marker
    crit: notable
    conf: 0.98
    if:
      type: literal
      kind: string
      substr: .cowork-flow

composite_rules:
  - id: cowork-flow-hook-context
    desc: cowork-flow bundled workflow hook context
    crit: exception
    conf: 0.98
    all:
      - id: well-known/app/cowork-flow::cowork-flow-template-marker
      - id: micro-behaviors/os/module/search-path::sys-path-mutate
      - id: micro-behaviors/communications/ipc/agent-hook::agent-userpromptsubmit-hook
