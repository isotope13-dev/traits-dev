defaults:
  platforms: [unix]
  for: [elf]
  crit: component
  conf: 0.98
  size_min: 1000000
  size_max: 200000000
traits:
  - id: go-module-path
    desc: GitHub CLI Go module path
    if:
      type: value
      path: elf.go.module.path
      exact: github.com/cli/cli/v2
  - id: executable-name
    desc: GitHub CLI executable name
    conf: 0.9
    if:
      type: path
      regex: '(^|[\\/!])gh(\.exe)?$'
  - id: codespaces-ssh-template
    desc: GitHub CLI Codespaces SSH template
    if:
      type: text
      substr: AutomaticIdentityFilePath
      section: .rodata
composite_rules:
  - id: github-cli-binary
    desc: GitHub CLI binary
    crit: baseline
    conf: 0.99
    all:
      - id: go-module-path
    any:
      - id: executable-name
      - id: codespaces-ssh-template
