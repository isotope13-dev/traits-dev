# Pixcode is a self-hosted AI coding-agent control room. Its authenticated
# updater, daemon manager, and platform autostart support are legitimate
# product behavior; this identity supplies benign context for composites that
# otherwise describe those behaviors as attacker objectives.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, markdown, npm, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Pixcode npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@pixelbyte-software/pixcode'

  - id: upstream-repository
    desc: Pixcode upstream repository reference
    for: [package.json, javascript, typescript, markdown]
    if:
      type: text
      substr: github.com/alicomert/pixcode

  - id: product-summary
    desc: Pixcode coding-agent product summary
    for: [package.json, markdown]
    if:
      type: text
      regex: '(?i)Self-hosted AI coding agent control room'

  - id: package-member-context
    desc: Pixcode package member identity
    for: [javascript, typescript, markdown]
    if:
      type: value
      path: package.json::name
      exact: '@pixelbyte-software/pixcode'

  - id: package-member-summary
    desc: Pixcode package member product summary
    for: [javascript, typescript, markdown]
    if:
      type: value
      path: package.json::description
      regex: '(?i)Self-hosted AI coding agent control room'

  - id: archive-member-context
    desc: Pixcode npm archive member path
    if:
      type: path
      regex: '@pixelbyte-software-pixcode-[0-9]'

  - id: daemon-manager-source
    desc: Pixcode daemon manager source marker
    for: [javascript, typescript]
    if:
      type: text
      substr: ai.pixcode.daemon

composite_rules:
  - id: package-identity
    desc: Pixcode coding-agent package identity
    crit: notable
    conf: 0.99
    any:
      - id: package-name
      - id: upstream-repository
      - id: package-member-context
      - id: archive-member-context

  - id: benign-runtime-context
    desc: Recognized Pixcode application runtime context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: package-member-context
      - id: package-member-summary

  - id: benign-archive-context
    desc: Recognized Pixcode npm archive context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: archive-member-context
      - id: upstream-repository
