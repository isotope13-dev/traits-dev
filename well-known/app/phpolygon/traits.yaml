defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.95

traits:
  - id: phpolygon-composer-name
    desc: PHPolygon Composer package
    for: [composer.json]
    if:
      type: value
      path: name
      exact: phpolygon/phpolygon
  - id: phpolygon-cache-path
    desc: PHPolygon cache path
    if:
      type: text
      substr: .phpolygon/mesh-cache
  - id: phpolygon-build-cli
    desc: PHPolygon build CLI
    if:
      type: text
      substr: phpolygon build

composite_rules:
  - id: phpolygon-software
    desc: PHPolygon software
    for: [php, composer.json]
    crit: notable
    conf: 0.95
    any:
      - id: phpolygon-composer-name
      - id: phpolygon-cache-path
      - id: phpolygon-build-cli
