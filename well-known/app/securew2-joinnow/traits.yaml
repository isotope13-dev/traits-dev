defaults:
  platforms: [macos]
  for: [macho]
  crit: notable
  conf: 0.99

traits:
  - id: bundle-identifier
    desc: SecureW2 JoinNow bundle identifier
    size_min: 50000
    size_max: 10000000
    if:
      type: value
      path: macho.code_signature.identifier
      exact: com.paladin.SecureW2-JoinNow
  - id: signing-team
    desc: SecureW2 JoinNow signing team identifier
    size_min: 50000
    size_max: 10000000
    if:
      type: value
      path: macho.code_signature.team_id
      exact: FKJ5JJ23X7

composite_rules:
  - id: recognized-securew2-joinnow
    desc: Recognized signed SecureW2 JoinNow app
    crit: exception
    all:
      - id: bundle-identifier
      - id: signing-team
