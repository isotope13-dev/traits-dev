defaults:
  platforms: [linux]
  for: [c, source]
  size_min: 1
  size_max: 500000000

traits:
  - id: onload-source-tree-path
    desc: Xilinx Onload source tree path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: 'onload@'

  - id: onload-xilinx-copyright
    desc: Xilinx Onload source marker
    crit: notable
    conf: 0.99
    for: [c]
    if:
      type: text
      regex: '(?i)(Xilinx|Solarflare)'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

composite_rules:
  - id: onload-kernel-source-context
    desc: Xilinx Onload kernel source context
    crit: exception
    conf: 0.99
    all:
      - id: onload-source-tree-path
      - id: onload-xilinx-copyright
