defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: baseline
  conf: 0.99

traits:
  - id: package-name
    desc: OpenAdapt Flow package metadata name
    crit: notable
    if:
      type: value
      path: name
      exact: openadapt-flow

  - id: package-author
    desc: OpenAdapt.AI package author metadata
    if:
      type: value
      path: author
      exact: OpenAdapt.AI

  - id: package-summary
    desc: OpenAdapt Flow deterministic workflow package
    crit: notable
    if:
      type: value
      path: summary
      exact: Compile demonstrated GUI workflows into deterministic local replay with governed repair and refusal

  - id: repository
    desc: OpenAdapt Flow GitHub repository
    crit: notable
    if:
      type: text
      substr: https://github.com/OpenAdaptAI/openadapt-flow

  - id: hosted-control-plane
    desc: OpenAdapt hosted control-plane endpoint
    crit: notable
    for: [python]
    if:
      type: literal
      exact: https://app.openadapt.ai

  - id: source-module-import
    desc: OpenAdapt Flow source-module import
    crit: notable
    for: [python]
    if:
      type: import
      regex: '^openadapt_flow(\\.|$)'

  - id: windows-agent-execute-route
    desc: OpenAdapt Windows agent Python-command route
    crit: notable
    for: [python]
    if:
      type: literal
      exact: /execute_windows

  - id: windows-agent-screenshot-route
    desc: OpenAdapt Windows agent screenshot route
    crit: notable
    for: [python]
    if:
      type: literal
      exact: /screenshot

  - id: legacy-exec-opt-in
    desc: OpenAdapt legacy arbitrary-exec opt-in
    crit: notable
    for: [python]
    if:
      type: text
      substr: --allow-legacy-exec

  - id: parallels-vm-control
    desc: OpenAdapt Parallels VM control backend
    crit: notable
    for: [python]
    if:
      type: text
      regex: '(?s)parallels_vm\.py.{0,160}prlctl|prlctl.{0,160}ParallelsVM'

composite_rules:
  - id: package-context
    desc: OpenAdapt Flow package identity
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: package-author
      - id: package-summary

  - id: windows-agent-control-server
    desc: OpenAdapt Windows agent desktop control server
    crit: notable
    conf: 0.98
    for: [python]
    all:
      - id: micro-behaviors/process/interpreter/python::exec-command-argument
      - id: windows-agent-execute-route
      - id: windows-agent-screenshot-route
