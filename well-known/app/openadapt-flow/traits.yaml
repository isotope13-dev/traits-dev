defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: baseline
  conf: 0.99

traits:
  - id: package-name
    desc: OpenAdapt Flow package metadata name
    crit: notable
    if:
      type: value
      path: name
      exact: openadapt-flow

  - id: package-author
    desc: OpenAdapt.AI package author metadata
    if:
      type: value
      path: author
      exact: OpenAdapt.AI

composite_rules:
  - id: package-context
    desc: OpenAdapt Flow package identity
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: package-author
