defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: tabby-basename
    desc: Tabby binary basename
    for: [elf, pe, macho, javascript]
    size_max: 200000000
    if:
      type: basename
      exact: tabby
  - id: tabby-builtin-plugin-path
    desc: Tabby builtin plugin path
    for: [javascript, json]
    size_max: 10000000
    if:
      type: path
      substr: builtin-plugin
  - id: tabby-builtin-plugin-dist-path
    desc: Tabby builtin plugin dist path
    for: [javascript, json]
    size_max: 10000000
    if:
      type: path
      substr: builtin-plugin/dist
  - id: tabby-source-member
    desc: Tabby source archive member
    for: [javascript]
    if:
      type: path
      substr: tabby-nightly
  - id: codegen-js-basename
    desc: codegen.js basename
    for: [javascript]
    if:
      type: basename
      exact: codegen.js

composite_rules:
  - id: tabby-openapi-codegen
    desc: Tabby OpenAPI codegen script
    crit: baseline
    conf: 0.98
    all:
      - id: tabby-source-member
      - id: codegen-js-basename
