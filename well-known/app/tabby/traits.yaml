# Tabby — cross-platform terminal emulator (https://tabby.sh). Benign app whose
# basename / built-in plugin paths are used as FP-suppression context by other
# rules. Referenced cross-directory from those traits' `unless:` blocks.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  size_min: 512
  size_max: 500000000
  crit: component
traits:
  - id: tabby-builtin-plugin-path
    desc: Tabby built-in plugin path
    if:
      type: path
      regex: 'builtin-plugins[\\/]tabby-[^\\/]{1,80}'
  - id: tabby-builtin-plugin-dist-path
    desc: Tabby built-in plugin dist path
    if:
      type: path
      regex: 'tabby-[^\\/]{1,80}[\\/]dist'
  - id: tabby-basename
    desc: Tabby basename marker
    if:
      type: path
      basename: true
      exact: tabby
