defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.95
  size_min: 1
  size_max: 200000000

traits:
  - id: package-name
    desc: Node-RED Hik media buffer package
    for: [package.json]
    if:
      type: value
      path: name
      exact: node-red-contrib-hik-media-buffer
  - id: hik-ffmpeg-remux
    desc: Hikvision ffmpeg remux helper
    for: [javascript]
    if:
      type: text
      substr: ffmpeg -y -i
  - id: hik-digest-auth-client
    desc: Hikvision digest auth client
    for: [javascript]
    if:
      type: text
      substr: '@mhoc/axios-digest-auth'

composite_rules:
  - id: hik-media-buffer-context
    desc: Hikvision Node-RED media buffer
    crit: notable
    conf: 0.95
    any:
      - id: package-name
      - id: hik-ffmpeg-remux
      - id: hik-digest-auth-client
