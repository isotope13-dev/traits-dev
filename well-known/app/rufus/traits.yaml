defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.98
  size_min: 100000
  size_max: 20000000

traits:
  - id: rufus-product-name
    desc: Rufus PE product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: Rufus
  - id: rufus-company-name
    desc: Rufus PE company metadata
    if:
      type: value
      path: pe.version.company
      exact: Akeo Consulting
  - id: rufus-signer
    desc: Rufus Akeo Consulting signer
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=Akeo Consulting\b'

composite_rules:
  - id: rufus-official-binary
    desc: Official Rufus Windows binary
    crit: notable
    conf: 0.99
    all:
      - id: rufus-product-name
      - id: rufus-company-name
    any:
      - id: rufus-signer
      - id: metadata/signed/certificate/identity::pe-signature-verified
