# ExifTool (Phil Harvey's Perl metadata tool) and WebPerl (Perl compiled to
# WebAssembly via Emscripten, webperl.zero-g.net) are legitimate engines often
# bundled by metadata-viewer browser extensions. ExifTool's Perl modules use
# string eval, and WebPerl's emperl.js loader fetches + evals its own bundled
# .wasm/.data blob — both trip perl-eval / fetch-eval / opaque-payload heuristics
# on legitimate code. Identify the bundled engines by path.
defaults:
  platforms: [unix, windows]
traits:
  - id: exiftool-perl-tree
    desc: ExifTool Perl distribution path
    crit: notable
    conf: 0.98
    for: [perl, text, data, scripts, source]
    if:
      type: path
      regex: '(^|[\\/])ExifTool[\\/]'
  - id: webperl-emscripten-engine
    desc: WebPerl Emscripten engine file
    crit: notable
    conf: 0.98
    # emperl.data is a multi-MB blob whose embedded Perl filesystem makes cleave
    # classify it as `perl`; emperl.js is javascript.
    for: [javascript, data, text, perl]
    if:
      type: path
      regex: '(^|[\\/])(webperl[\\/])?emperl\.(js|data)$'
