defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: openssl-source-member
    desc: OpenSSL source archive member
    for: [c, shell, perl, text, javascript, source, data]
    if:
      type: path
      substr: openssl-
  - id: http-server-c-basename
    desc: http_server.c basename
    for: [c]
    if:
      type: basename
      exact: http_server.c
  - id: shlib-wrap-basename
    desc: OpenSSL shared-library wrapper script
    for: [shell]
    if:
      type: basename
      exact: shlib_wrap.sh.in

composite_rules:
  - id: openssl-http-server-source
    desc: OpenSSL HTTP server source
    crit: notable
    conf: 0.98
    all:
      - id: openssl-source-member
      - id: http-server-c-basename
  - id: openssl-source-identity
    desc: OpenSSL source tree identity
    crit: notable
    conf: 0.98
    any:
      - id: openssl-source-member
      - id: openssl-http-server-source
      - id: shlib-wrap-basename
