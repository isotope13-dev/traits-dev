defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: openssl-source-member
    desc: OpenSSL source archive member
    for: [c]
    if:
      type: path
      substr: openssl-
  - id: http-server-c-basename
    desc: http_server.c basename
    for: [c]
    if:
      type: basename
      exact: http_server.c

composite_rules:
  - id: openssl-http-server-source
    desc: OpenSSL HTTP server source
    crit: notable
    conf: 0.98
    all:
      - id: openssl-source-member
      - id: http-server-c-basename
