defaults:
  platforms: [linux, windows, android]
  crit: notable
  conf: 0.99
  size_min: 1000000
  size_max: 268435456

traits:
  - id: binary-toast-ui
    desc: Kopuz toast UI element marker
    for: [elf, pe]
    if:
      type: text
      substr: kopuz-toast
      section: rodata
  - id: package-id
    desc: Kopuz Android package identifier
    for: [kotlin, java]
    if:
      type: text
      substr: com.temidaradev.kopuz

composite_rules:
  - id: music-player-context
    desc: Kopuz open-source music player
    any:
      - id: binary-toast-ui
      - id: package-id
      - id: metadata/package/quality/source::kopuz-source-readme
      - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
      - id: metadata/package/quality/source::kopuz-youtube-cookie-consumer
