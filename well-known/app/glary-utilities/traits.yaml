defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: product-identity
    desc: Glary Utilities PE product identity
    crit: notable
    conf: 0.99
    size_min: 10000
    size_max: 536870912
    for: [pe]
    if:
      type: value
      path: pe.version.product_name
      exact: Glary Utilities

  - id: installer-product-identity
    desc: Glary Utilities installer PE product identity
    crit: notable
    conf: 0.99
    size_min: 10000
    size_max: 536870912
    for: [pe]
    if:
      type: value
      path: pe.version.product_name
      exact: Glary Utilities Installer

  - id: glary-brand-marker
    desc: Glary Utilities or Glarysoft product marker
    crit: notable
    conf: 0.95
    size_min: 10000
    size_max: 536870912
    if:
      type: text
      regex: '(?i)Glary Utilities|Glarysoft'
      section: .rsrc

  - id: statistics-plugin-library
    desc: Glary Utilities statistics plugin library
    crit: notable
    conf: 0.99
    size_min: 10000
    size_max: 10485760
    if:
      type: path
      basename: true
      exact: xtInfoPlugin.dll
      case_insensitive: true

composite_rules:
  - id: glarysoft-signed-component-context
    desc: Recognized Glarysoft-signed Glary Utilities component
    crit: exception
    conf: 0.99
    all:
      - id: metadata/binary/vendor::glarysoft-ltd
      - id: glary-brand-marker
  - id: glary-statistics-plugin-context
    desc: Recognized Glary Utilities statistics input plugin
    crit: exception
    conf: 0.99
    all:
      - id: statistics-plugin-library
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
