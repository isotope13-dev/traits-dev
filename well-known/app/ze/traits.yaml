defaults:
  platforms: [unix, windows]
  for: [zip, go, python, text, shell]

traits:
  - id: ze-archive-basename
    desc: Ze network-router source archive name
    crit: notable
    conf: 1.0
    if:
      type: path
      basename: true
      regex: '^codeberg\.org-thomas-mangin-ze-v[^\\/]+\.zip$'

  - id: ze-source-directory
    desc: Ze network-router source directory
    crit: notable
    conf: 1.0
    if:
      type: path
      regex: 'ze@v[^\\/]+'

composite_rules:
  - id: ze-source-tree
    desc: Recognized Ze network-router source tree
    crit: exception
    conf: 1.0
    any:
      - id: ze-archive-basename
      - id: ze-source-directory
