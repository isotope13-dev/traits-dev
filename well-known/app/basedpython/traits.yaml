defaults:
  platforms: [unix]
  for: [whl]
  crit: notable
  conf: 0.99

traits:
  - id: basedpython-package-name
    desc: Basedpython Python transpiler package
    if:
      type: value
      path: 'whl.distribution'
      exact: basedpython

  - id: basedpython-by-executable
    desc: Basedpython by transpiler executable
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)basedpython-[^/]+\.data/scripts/by$'

  - id: basedpython-buff-executable
    desc: Basedpython buff linter and formatter executable
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)basedpython-[^/]+\.data/scripts/buff$'

composite_rules:
  - id: basedpython-package
    desc: Basedpython transpiler and tooling distribution
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: basedpython-package-name
    any:
      - id: basedpython-by-executable
      - id: basedpython-buff-executable
    needs: 1
