defaults:
  platforms: [unix, windows]
  for: [python, text, pkginfo]
  crit: baseline
  conf: 0.95
traits:
  - id: package-name
    desc: svtplay-dl package marker
    if:
      type: text
      regex: 'svtplay[-_]dl'
  - id: import-marker
    desc: svtplay_dl package import marker
    for: [python]
    if:
      type: import
      regex: '(^|\.)svtplay_dl(\.|$)'
  - id: hls-media-code
    desc: HLS media downloader marker
    for: [python]
    if:
      type: literal
      kind: string
      regex: 'M3U8|EXT-X-KEY|playbackItem'
