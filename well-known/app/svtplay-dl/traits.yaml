defaults:
  platforms:
  - unix
  - windows
  for:
  - python
  - text
  - pkginfo
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: package-name
  desc: svtplay-dl package marker
  if:
    type: text
    regex: svtplay[-_]dl
- id: import-marker
  desc: svtplay_dl package import marker
  for:
  - python
  if:
    type: import
    regex: "(^|\\.)svtplay_dl(\\.|$)"

composite_rules:
- id: svtplay-dl-software
  desc: svtplay-dl video downloader
  crit: notable
  conf: 0.95
  any:
  - id: package-name
  - id: import-marker
