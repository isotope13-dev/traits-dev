# Official PhantomJS 2.x Windows binaries carry this stable version metadata.
# The identity is used only to keep unpacked UPX analysis artifacts from being
# mistaken for a second, malicious packed file.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1000000
  size_max: 100000000

traits:
  - id: phantomjs-product-identity
    desc: PhantomJS product metadata
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.product_name
      exact: PhantomJS
  - id: phantomjs-company-identity
    desc: PhantomJS company metadata
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.company
      exact: PhantomJS
  - id: phantomjs-description-identity
    desc: PhantomJS headless WebKit description
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.description
      exact: PhantomJS is a headless WebKit with JavaScript API

composite_rules:
  - id: phantomjs-official-binary
    desc: Official PhantomJS binary version identity
    crit: notable
    conf: 0.99
    all:
      - id: phantomjs-product-identity
      - id: phantomjs-company-identity
      - id: phantomjs-description-identity
