defaults:
  platforms: [unix, windows]
  for: [javascript, chrome-manifest]
  crit: baseline
  conf: 0.99

traits:
  - id: manifest-name
    desc: Prizm Prompt browser-extension manifest identity
    crit: notable
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: Prizm Prompt

  - id: prompt-catalog-marker
    desc: Prizm Prompt bundled prompt-catalog marker
    crit: notable
    for: [javascript]
    if:
      type: literal
      exact: Prizm Prompt Extension

composite_rules:
  # Archive-level: manifest identity plus catalog marker. Prompt catalog
  # embeds <system_prompt> tags as example template text, not injection.
  - id: prizm-prompt-extension-context
    desc: Recognized Prizm Prompt extension prompt-tool context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: manifest-name
      - id: prompt-catalog-marker
