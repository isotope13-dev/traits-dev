defaults:
  platforms: [linux]
  for: [python, elf, deb]
  crit: baseline
  conf: 0.95

traits:
  - id: package-path
    desc: Piglit test suite package path
    size_min: 1
    size_max: 1073741824
    if:
      type: basename
      regex: '(?i)(^|[!:/\\])piglit(_[^!:/\\]{1,120}|[!:/\\]|$)'
  - id: python-framework-path
    desc: Piglit Python framework path marker
    for: [python]
    if:
      type: basename
      regex: '(?i)(^|[!:/\\])piglit[!:/\\].{0,180}[!:/\\](framework|tests)[!:/\\]'

composite_rules:
  - id: package
    desc: Piglit graphics test suite package
    any:
      - id: package-path
      - id: python-framework-path
