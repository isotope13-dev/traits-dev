defaults:
  platforms: [windows]
  for: [powershell, nupkg, xml]
  crit: notable
  conf: 0.99

traits:
  - id: package-identity
    desc: OpenEndpointEvents NuGet package identity
    for: [nupkg]
    if:
      type: value
      path: nupkg.id
      exact: OpenEndpointEvents

  - id: source-repository
    desc: OpenEndpointEvents GitHub repository reference
    for: [xml, powershell]
    if:
      type: text
      substr: github.com/OpenEndpointEvents/OpenEndpointEvents

  - id: member-path
    desc: OpenEndpointEvents package member path
    for: [powershell, xml]
    if:
      type: path
      substr: OpenEndpointEvents

  - id: package-name-reference
    desc: OpenEndpointEvents module or task name reference
    for: [powershell, xml]
    if:
      type: text
      substr: OpenEndpointEvents

composite_rules:
  - id: administration-uploader-context
    desc: OpenEndpointEvents telemetry uploader package context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: member-path
      - id: package-name-reference
