defaults:
  platforms: [unix, windows]
  for: [vsix-manifest, javascript, json]
  crit: baseline
  conf: 0.98

traits:
  - id: redhat-yaml-extension-id
    desc: Red Hat YAML VS Code extension
    size_min: 0
    if:
      type: text
      substr: redhat.vscode-yaml
  - id: redhat-yaml-extension-path
    desc: Red Hat YAML VS Code extension path
    size_min: 0
    if:
      type: path
      substr: redhat.vscode-yaml
  - id: vscode-yaml-package-name
    desc: VS Code YAML package name
    if:
      type: value
      path: name
      exact: vscode-yaml

composite_rules:
  - id: redhat-vscode-yaml-extension
    desc: Red Hat YAML VS Code extension
    crit: notable
    conf: 0.98
    any:
      - id: redhat-yaml-extension-id
      - id: vscode-yaml-package-name
      - id: redhat-yaml-extension-path
