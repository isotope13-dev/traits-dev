defaults:
  platforms: [windows]
  crit: baseline
  conf: 0.98

traits:
  - id: aks-engine-archive-member
    desc: AKS Engine archive member
    for: [pe, csharp]
    size_min: 0
    size_max: 100000000
    if:
      type: path
      substr: aks-engine-
  - id: aks-engine-basename
    desc: aks-engine.exe basename
    for: [pe, csharp]
    size_min: 1000000
    size_max: 100000000
    if:
      type: basename
      exact: aks-engine.exe

composite_rules:
  - id: aks-engine-release-binary
    desc: AKS Engine release binary
    crit: notable
    conf: 0.98
    all:
      - id: aks-engine-archive-member
      - id: aks-engine-basename
  - id: aks-engine-release-context
    desc: AKS Engine release context
    crit: notable
    conf: 0.98
    any:
      - id: aks-engine-archive-member
      - id: aks-engine-basename
