defaults:
  platforms: [unix, windows]
  for: [vsix-manifest, javascript, json]
  crit: baseline
  conf: 0.98

traits:
  - id: composer-php-vscode-id
    desc: DEVSENSE Composer PHP VS Code extension
    if:
      type: text
      substr: devsense.composer-php-vscode
  - id: composer-php-vscode-package-name
    desc: Composer PHP VS Code package name
    if:
      type: value
      path: name
      exact: composer-php-vscode

composite_rules:
  - id: composer-php-vscode-extension
    desc: DEVSENSE Composer PHP VS Code extension
    crit: notable
    conf: 0.98
    any:
      - id: composer-php-vscode-id
      - id: composer-php-vscode-package-name
