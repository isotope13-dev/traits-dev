defaults:
  platforms: [windows]
  for: [pe, dll, zip]
traits:
  - id: subtitleedit-archive-name
    desc: Subtitle Edit release archive name
    crit: notable
    conf: 0.98
    size_min: 1000000
    size_max: 250000000
    if:
      type: path
      regex: 'SubtitleEdit-[^/]+-Windows-x64\.zip'
  - id: subtitleedit-exe-basename
    desc: SubtitleEdit executable basename
    crit: notable
    conf: 0.95
    size_min: 1000000
    size_max: 250000000
    if:
      type: path
      basename: true
      exact: SubtitleEdit.exe
composite_rules:
  - id: subtitleedit-windows-release
    desc: Subtitle Edit Windows release
    crit: notable
    conf: 0.98
    any:
      - id: subtitleedit-archive-name
      - id: subtitleedit-exe-basename
