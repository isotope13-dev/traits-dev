defaults:
  platforms: [unix, windows]
  for: [c, cpp, shell, perl, python]

traits:
  - id: postgresql-source-tree
    desc: PostgreSQL source-tree path
    crit: notable
    conf: 0.99
    size_min: 100
    size_max: 100000000
    for: [binaries, scripts, source]
    if:
      type: path
      regex: '(^|[\\/])postgresql-[0-9][^\\/]*'
