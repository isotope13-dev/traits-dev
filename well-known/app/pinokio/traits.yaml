defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json, html, shell, batch, elf, pe, macho, archives]
  crit: notable
  conf: 0.98
  size_max: 600000000

traits:
  - id: app-bundle
    desc: Pinokio app bundle member
    if:
      type: path
      regex: 'Pinokio|pinokio\.computer|pinokiod'
  - id: pinokio-client-runtime
    desc: Pinokio browser client runtime
    for: [javascript, typescript]
    if:
      type: text
      substr: PinokioPathRemoval
