defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.95
  size_min: 1
  size_max: 200000000

traits:
  - id: carta-agent-draft-flow
    desc: Carta agent draft extension flow
    for: [javascript]
    if:
      type: text
      substr: Creating Carta agent draft
  - id: carta-rsa-public-key-resource
    desc: Carta RSA public key resource
    for: [javascript]
    if:
      type: text
      substr: rsaPublicKey.txt

composite_rules:
  - id: carta-extension-context
    desc: Carta staging extension context
    crit: notable
    conf: 0.95
    any:
      - id: carta-agent-draft-flow
      - id: carta-rsa-public-key-resource
