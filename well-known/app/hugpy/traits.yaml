# Hugpy is a self-hosted LLM console with an optional GPU worker fleet.
# Identify the published distribution so its documented worker/control-plane
# mechanics remain useful triage context without suppressing hostile rules.
defaults:
  platforms: [unix, windows]
  for: [whl, python, markdown]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Hugpy Python distribution name
    for: [whl]
    if:
      type: text
      regex: '(?m)^Name:\s*abstract_hugpy_dev\s*$'

  - id: upstream-repository
    desc: Hugpy upstream repository URL
    for: [whl, markdown]
    if:
      type: text
      regex: 'github\.com/AbstractEndeavors/abstract_hugpy_dev([./\s"''`?#]|$)'

  - id: worker-module-member
    desc: Hugpy GPU worker directory member
    if:
      type: path
      regex: '(^|/)worker_agent([/]|$)'

composite_rules:
  - id: package-identity
    desc: Recognized Hugpy distribution
    crit: notable
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: package-name
    any:
      - id: upstream-repository
      - id: worker-module-member
    needs: 1
