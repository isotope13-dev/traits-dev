defaults:
  platforms: [unix, windows]
  for: [pkginfo, whl, python]

traits:
  - id: package-name
    desc: Agentic Stealth Browser package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: agentic-stealth-browser
  - id: wheel-distribution
    desc: Agentic Stealth Browser wheel identity
    crit: notable
    conf: 0.99
    for: [whl]
    if:
      type: value
      path: whl.distribution
      exact: agentic_stealth_browser
composite_rules:
  - id: anti-bot-evasion-framework
    desc: Agentic Stealth Browser anti-bot evasion framework
    crit: hostile
    conf: 0.99
    for: [pkginfo, whl]
    scope: outer
    all:
      - id: package-name
      - id: objectives/evasion/security-bypass/anti-bot::anti-detection-fingerprint-browser-claim
      - id: objectives/evasion/security-bypass/anti-bot::stealth-fingerprint-spoofing-browser
