defaults:
  platforms:
  - unix
  - windows
  for:
  - php
  - javascript
  - typescript
  crit: component
  conf: 0.96
  size_max: 5000000
traits:
- id: plugin-name
  desc: Google Site Kit plugin name
  for:
  - php
  if:
    type: text
    substr: 'Plugin Name:       Site Kit by Google'
- id: text-domain
  desc: Google Site Kit text domain
  for:
  - php
  if:
    type: text
    substr: 'Text Domain:       google-site-kit'
- id: runtime-prefix
  desc: Google Site Kit runtime prefix
  if:
    type: text
    substr: googlesitekit
composite_rules:
- id: plugin-context
  desc: Google Site Kit plugin context
  crit: baseline
  conf: 0.99
  all:
  - id: plugin-name
  - id: text-domain
- id: runtime-context
  desc: Google Site Kit runtime context
  crit: baseline
  conf: 0.96
  any:
  - id: plugin-context
  - id: runtime-prefix
