defaults:
  platforms: [windows, unix]
  for: [scripts, json, zip]
  crit: notable
  conf: 0.98
traits:
  - id: vsix-member
    desc: VS Code Demo Time extension
    if:
      type: path
      substr: eliostruyf.vscode-demo-time
  - id: package-id
    desc: VS Code Demo Time identifier
    if:
      type: text
      substr: eliostruyf.vscode-demo-time
composite_rules:
  - id: extension-context
    desc: VS Code Demo Time extension context
    any:
      - id: vsix-member
      - id: package-id
