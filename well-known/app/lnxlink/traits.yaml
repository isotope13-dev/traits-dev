defaults:
  platforms: [linux]
  crit: notable
  conf: 0.99
  size_min: 1
  size_max: 10000000

traits:
  - id: lnxlink-package-distribution
    desc: LNXlink Python package distribution identity
    for: [whl]
    if:
      type: value
      path: whl.distribution
      exact: lnxlink
  - id: lnxlink-project-marker
    desc: LNXlink upstream project marker
    for: [whl, pkginfo, python]
    if:
      type: text
      substr: github.com/bkbilly/lnxlink
  - id: lnxlink-source-module
    desc: LNXlink Python module import marker
    for: [python]
    if:
      type: text
      regex: '(?m)^(from|import)\s+lnxlink\b|logging\.getLogger\("lnxlink"\)'

composite_rules:
  - id: lnxlink-application
    desc: LNXlink Home Assistant Linux integration
    crit: notable
    conf: 0.99
    any:
      - id: lnxlink-package-distribution
      - id: lnxlink-project-marker
      - id: lnxlink-source-module
