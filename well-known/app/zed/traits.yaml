defaults:
  platforms: [linux]
  for: [elf]

traits:
  - id: linux-cli-bundle-path
    desc: Zed Linux CLI bundle path
    crit: notable
    conf: 1.0
    size_min: 1000000
    size_max: 10000000
    if:
      type: path
      regex: 'zed\.app/bin/zed$'

  - id: linux-uninstall-script-marker
    desc: Zed Linux uninstall script marker
    crit: notable
    conf: 1.0
    size_min: 1000000
    size_max: 10000000
    if:
      type: text
      substr: Zed has been uninstalled
      section: .rodata

composite_rules:
  - id: official-linux-cli
    desc: Recognized official Zed Linux CLI
    crit: exception
    conf: 1.0
    all:
      - id: linux-cli-bundle-path
      - id: linux-uninstall-script-marker
