defaults:
  platforms: [unix, windows]
  for: [python, manifests]
  crit: component
  conf: 0.96

traits:
  - id: pypi-name
    desc: aws-bootstrap-g4dn package name
    if:
      type: text
      substr: "Name: aws-bootstrap-g4dn"

  - id: project-url
    desc: aws-bootstrap-g4dn project URL
    if:
      type: text
      substr: github.com/promptromp/aws-bootstrap-g4dn

composite_rules:
  - id: package-context
    desc: aws-bootstrap-g4dn package context
    crit: baseline
    conf: 0.99
    all:
      - id: pypi-name
      - id: project-url
