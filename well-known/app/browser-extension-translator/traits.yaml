defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.9
traits:
  - id: archive-name
    desc: Translator extension archive name
    for: [xpi, crx, zip]
    if:
      type: value
      path: file.stem
      regex: '(?i)\b(translator|translate)\b'
  - id: translator-member-path
    desc: Translator extension member path
    for: [javascript, typescript, json, chrome-manifest, scripts, manifests, data]
    if:
      type: path
      substr: _translator-
  - id: locale-name
    desc: Translator localized display name
    for: [json]
    if:
      type: value
      path: "*.message"
      regex: '(?i)\b(translator|translation)\b'
  - id: locale-action
    desc: Translator localized action copy
    for: [json]
    if:
      type: value
      path: "*.message"
      regex: '(?i)\b(translate|toggle translation)\b'
  - id: host-google
    desc: Google translation host permission
    for: [chrome-manifest]
    if:
      type: value
      path: host_permissions
      substr: translation.googleapis.com
  - id: host-deepl
    desc: DeepL translation host permission
    for: [chrome-manifest]
    if:
      type: value
      path: host_permissions
      substr: deepl.com
  - id: host-microsoft
    desc: Microsoft translation host permission
    for: [chrome-manifest]
    if:
      type: value
      path: host_permissions
      substr: microsofttranslator.com
  - id: provider-asset-deepl
    desc: DeepL provider asset
    for: [xpi, crx, zip]
    if:
      type: value
      path: "archive.members[*].path"
      exact: api/DeepL.svg
  - id: provider-asset-openai
    desc: OpenAI provider asset
    for: [xpi, crx, zip]
    if:
      type: value
      path: "archive.members[*].path"
      exact: api/OpenAI.svg
  - id: provider-asset-google
    desc: Google provider asset
    for: [xpi, crx, zip]
    if:
      type: value
      path: "archive.members[*].path"
      exact: api/Google.svg
  - id: subtitle-injector
    desc: Translator subtitle injector resource
    for: [xpi, crx, zip]
    if:
      type: value
      path: "archive.members[*].path"
      exact: injector-subtitle.js
  - id: js-toggle-translate-command
    desc: Translator extension toggle command
    for: [javascript]
    if:
      type: text
      substr: toggleTranslate
  - id: tencent-translation-api-auth
    desc: Tencent translation API auth
    for: [javascript, typescript]
    if:
      type: text
      substr: Missing Tencent SecretId or SecretKey.
composite_rules:
  - id: provider-hosts
    desc: Translator provider host permissions
    crit: component
    conf: 0.9
    any:
      - id: host-google
      - id: host-deepl
      - id: host-microsoft
  - id: provider-assets
    desc: Translator provider assets
    crit: component
    conf: 0.9
    any:
      - id: provider-asset-deepl
      - id: provider-asset-openai
      - id: provider-asset-google
  - id: extension-context
    desc: Browser extension translator
    crit: notable
    conf: 0.92
    scope: archive
    all:
      - id: metadata/signed/platform::web-extension-manifest
    any:
      - id: archive-name
      - id: translator-member-path
      - id: locale-name
      - id: locale-action
      - id: provider-hosts
      - id: provider-assets
      - id: subtitle-injector
      - id: js-toggle-translate-command
      - id: tencent-translation-api-auth
    needs: 2
