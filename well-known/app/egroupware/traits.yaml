defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: egroupware-archive-member
    desc: EGroupware source archive member
    for: [php, javascript, shell, text]
    if:
      type: path
      substr: EGroupware-egroupware-
  - id: asyncservice-basename
    desc: Asyncservice.php basename
    for: [php]
    if:
      type: basename
      exact: Asyncservice.php
  - id: db-backup-basename
    desc: Backup.php basename
    for: [php]
    if:
      type: basename
      exact: Backup.php
  - id: vfs-basename
    desc: Vfs.php basename
    for: [php]
    if:
      type: basename
      exact: Vfs.php
  - id: dhtmlx-test-basename
    desc: dhtmlx test JavaScript basename
    for: [javascript]
    if:
      type: basename
      regex: '^dhtmlx[a-z_]*\.js$'
  - id: egw-json-basename
    desc: egw_json.js basename
    for: [javascript]
    if:
      type: basename
      exact: egw_json.js
  - id: filemanager-cli-path
    desc: EGroupware filemanager CLI path
    for: [php]
    if:
      type: path
      regex: 'filemanager[\\/]cli\.php$'

composite_rules:
  - id: egroupware-asyncservice
    desc: EGroupware Asyncservice scheduler
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: asyncservice-basename
  - id: egroupware-db-backup-helper
    desc: EGroupware database backup helper
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: db-backup-basename
  - id: egroupware-vfs-helper
    desc: EGroupware VFS helper
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: vfs-basename
  - id: egroupware-dhtmlx-test-js
    desc: EGroupware dhtmlx test JS
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: dhtmlx-test-basename
  - id: egroupware-json-websocket-client
    desc: EGroupware JSON WebSocket client
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: egw-json-basename
  - id: egroupware-filemanager-cli
    desc: EGroupware filemanager CLI
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: filemanager-cli-path
