defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: egroupware-archive-member
    desc: EGroupware source archive member
    for: [php, javascript, java, shell, text, source, data]
    if:
      type: path
      substr: EGroupware-egroupware-
  - id: asyncservice-basename
    desc: Asyncservice.php basename
    for: [php]
    if:
      type: basename
      exact: Asyncservice.php
  - id: db-backup-basename
    desc: Backup.php basename
    for: [php]
    if:
      type: basename
      exact: Backup.php
  - id: vfs-basename
    desc: Vfs.php basename
    for: [php]
    if:
      type: basename
      exact: Vfs.php
  - id: dhtmlx-test-basename
    desc: dhtmlx test JavaScript basename
    for: [javascript]
    if:
      type: basename
      regex: '^dhtmlx[a-z_]*\.js$'
  - id: egw-json-basename
    desc: egw_json.js basename
    for: [javascript]
    if:
      type: basename
      exact: egw_json.js
  - id: filemanager-cli-path
    desc: EGroupware filemanager CLI path
    for: [php]
    if:
      type: path
      regex: 'filemanager[\\/]cli\.php$'
  - id: rpm-build-checkout-path
    desc: EGroupware RPM build checkout helper
    for: [php]
    if:
      type: basename
      exact: checkout-build-archives.php
  - id: setup-showheader-path
    desc: EGroupware setup header helper
    for: [php]
    if:
      type: basename
      exact: class.setup_cmd_showheader.inc.php

composite_rules:
  - id: egroupware-asyncservice
    desc: EGroupware Asyncservice scheduler
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: asyncservice-basename
  - id: egroupware-db-backup-helper
    desc: EGroupware database backup helper
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: db-backup-basename
  - id: egroupware-vfs-helper
    desc: EGroupware VFS helper
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: vfs-basename
  - id: egroupware-dhtmlx-test-js
    desc: EGroupware dhtmlx test JS
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: dhtmlx-test-basename
  - id: egroupware-json-websocket-client
    desc: EGroupware JSON WebSocket client
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: egw-json-basename
  - id: egroupware-filemanager-cli
    desc: EGroupware filemanager CLI
    crit: notable
    conf: 0.98
    all:
      - id: egroupware-archive-member
      - id: filemanager-cli-path
  - id: egroupware-source-identity
    desc: EGroupware source tree identity
    crit: notable
    conf: 0.98
    any:
      - id: egroupware-archive-member
      - id: egroupware-asyncservice
      - id: egroupware-db-backup-helper
      - id: egroupware-vfs-helper
      - id: egroupware-dhtmlx-test-js
      - id: egroupware-json-websocket-client
      - id: egroupware-filemanager-cli
      - id: rpm-build-checkout-path
      - id: setup-showheader-path
