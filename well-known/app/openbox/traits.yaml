defaults:
  platforms: [linux]
  for: [shell, text, tar, zst]
  crit: notable
  conf: 0.96
  size_max: 268435456

traits:
  - id: autostart-helper
    desc: Openbox autostart helper
    if:
      type: path
      regex: '(^|[\\/])openbox-autostart$'

  - id: package-archive
    desc: Openbox package archive
    if:
      type: path
      basename: true
      regex: '^openbox-[0-9][^\\/]*\.pkg\.tar\.zst$'

composite_rules:
  - id: package-code
    desc: Openbox package code
    crit: notable
    conf: 0.98
    any:
      - id: autostart-helper
      - id: package-archive
