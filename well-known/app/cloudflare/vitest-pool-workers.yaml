# Cloudflare's Vitest pool worker contains a legitimate dynamic constructor
# in its generated test helper source map.  This identity is used only to
# suppress the generic anti-static `new this[...]` heuristic for that helper.
defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
  crit: notable
  conf: 0.98

traits:
  - id: vitest-test-internal-map-file
    desc: Cloudflare Vitest test helper source map
    if:
      type: path
      basename: true
      exact: test-internal.mjs.map

  - id: vitest-cloudflare-worker-marker
    desc: Cloudflare worker test helper marker
    if:
      type: text
      substr: 'cloudflare:workers'

composite_rules:
  - id: vitest-test-internal-source-map
    desc: Cloudflare Vitest test helper source map context
    crit: exception
    conf: 0.99
    all:
      - id: vitest-test-internal-map-file
      - id: vitest-cloudflare-worker-marker
