defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.95
  size_max: 5000000
traits:
- id: package-name
  desc: Cloudflare Wrangler npm package name
  for:
  - package.json
  if:
    type: value
    path: name
    exact: wrangler
- id: package-description
  desc: Cloudflare Wrangler package description
  for:
  - package.json
  if:
    type: value
    path: description
    exact: Command-line interface for all things Cloudflare Workers
- id: package-repository
  desc: Cloudflare workers-sdk repository
  for:
  - package.json
  if:
    type: value
    path: repository.url
    regex: github\.com[/:]cloudflare/workers-sdk(\.git)?
- id: package-directory
  desc: Wrangler monorepo package directory
  for:
  - package.json
  if:
    type: value
    path: repository.directory
    exact: packages/wrangler
- id: cloudflared-managed-download
  desc: Wrangler managed cloudflared dl/cache path
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: Downloading cloudflared[\s\S]{0,400}User-Agent["']?\s*:\s*["']wrangler["']
- id: container-ssh-config-validator
  desc: Wrangler container SSH config validator
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: authorized_keys[\s\S]{0,800}trusted_user_ca_keys[\s\S]{0,800}public_key
- id: ssh-public-key-cli
  desc: Wrangler container SSH public-key CLI
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: src/cloudchamber/ssh/validate\.ts[\s\S]{0,900}SshPublicKeysService
- id: framework-autoconfig
  desc: Wrangler fwk autoconfig package-manager flow
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: src/autoconfig/frameworks/[\s\S]{0,900}(installPackages|runCommand2)
- id: source-map-frameworks-path
  desc: Wrangler frameworks source-map path
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: src/autoconfig/frameworks
- id: source-map-cloudchamber-path
  desc: Wrangler Cloudchamber source-map path
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: src/cloudchamber
- id: source-map-containers-client-path
  desc: Wrangler containers source-map path
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: containers-shared/src/client
- id: source-map-wrangler-user-agent
  desc: Wrangler User-Agent source-map marker
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: User-Agent["']?\s*:\s*["']wrangler["']
- id: source-map-ssh-service
  desc: Wrangler SSH service source-map marker
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: SshPublicKeysService
- id: source-map-install-packages
  desc: Wrangler installPackages source-map marker
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: installPackages
composite_rules:
- id: package-context
  desc: Cloudflare Wrangler npm package context
  crit: baseline
  conf: 0.99
  all:
  - id: package-name
  any:
  - id: package-description
  - id: package-repository
  - id: package-directory
- id: cli-context
  desc: Cloudflare Wrangler CLI bundle context
  crit: baseline
  conf: 0.97
  any:
  - id: cloudflared-managed-download
  - id: container-ssh-config-validator
  - id: ssh-public-key-cli
  - id: framework-autoconfig
  - id: bundled-cli-source-map
- id: bundled-cli-source-map
  desc: Wrangler bundled CLI source-map comments
  crit: baseline
  conf: 0.95
  all:
  - id: bundled-cli-source-map-path
  - id: bundled-cli-source-map-marker
- id: bundled-cli-source-map-path
  desc: Wrangler source-map path marker
  crit: component
  conf: 0.95
  any:
  - id: source-map-frameworks-path
  - id: source-map-cloudchamber-path
  - id: source-map-containers-client-path
- id: bundled-cli-source-map-marker
  desc: Wrangler source-map content marker
  crit: component
  conf: 0.95
  any:
  - id: source-map-wrangler-user-agent
  - id: source-map-ssh-service
  - id: source-map-install-packages
