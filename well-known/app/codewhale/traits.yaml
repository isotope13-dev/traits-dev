defaults:
  platforms: [unix]
  for: [macho, dylib, binaries, javascript, typescript]
  crit: notable
  conf: 0.98
  size_min: 65536
  size_max: 600000000

traits:
  - id: codewhale-binary-path
    desc: CodeWhale application binary path
    if:
      type: path
      regex: '(?i)(^|[/\\])codewhale(-tui)?$'
  - id: codewhale-brand-text
    desc: CodeWhale product identity in file content
    if:
      type: text
      substr: codewhale
      case_insensitive: true
composite_rules:
  - id: codewhale-application-context
    desc: Recognized CodeWhale application context
    crit: exception
    all:
      - id: codewhale-binary-path
      - id: codewhale-brand-text
