defaults:
  platforms: [linux]
  crit: notable
  conf: 0.96

traits:
  - id: wolfi-gitea-package
    desc: Wolfi Gitea package
    for: [archive]
    if:
      type: basename
      regex: '^gitea-[0-9][^\\/]*\.apk$'

  - id: gitea-server-binary
    desc: Gitea server binary
    for: [elf]
    size_min: 10485760
    size_max: 536870912
    if:
      type: basename
      exact: gitea
