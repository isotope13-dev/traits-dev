defaults:
  platforms: [unix, windows]
  for: [go, go.mod, shell, makefile, tar, zip]
  crit: notable
  conf: 0.94

traits:
  - id: sagernet-sing-box-source
    desc: SagerNet sing-box source tree
    if:
      type: text
      substr: github.com/sagernet/sing-box

  - id: universal-proxy-platform
    desc: sing-box proxy platform text
    if:
      type: text
      exact: The universal proxy platform.

composite_rules:
  - id: source-tree
    desc: SagerNet sing-box source tree
    crit: notable
    conf: 0.96
    any:
      - id: sagernet-sing-box-source
      - id: universal-proxy-platform
