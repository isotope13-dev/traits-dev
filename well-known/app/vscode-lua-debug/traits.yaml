defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 600000000

traits:
  - id: extension-member
    desc: VS Code Lua Debug extension member
    for: [macho, elf, pe, lua, javascript, json, data]
    if:
      type: path
      substr: actboy168.lua-debug-

  - id: luajit-runtime-member
    desc: Lua Debug bundled LuaJIT runtime member
    for: [macho, elf, pe, data]
    if:
      type: path
      regex: 'luajit[\\/]'
