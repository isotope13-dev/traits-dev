defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.95
traits:
  - id: zealphp-asset-version
    desc: ZealPHP asset version constant
    if:
      type: text
      substr: ZEALPHP_ASSET_VERSION
  - id: zealphp-namespace
    desc: ZealPHP namespace
    if:
      type: text
      substr: namespace ZealPHP;
  - id: zealphp-composer-package
    desc: ZealPHP composer package
    if:
      type: text
      substr: sibidharan/zealphp
