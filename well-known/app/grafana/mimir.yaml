defaults:
  platforms: [linux]
  crit: baseline
  conf: 0.98

traits:
  - id: grafana-mimir-binary-name
    desc: Grafana Mimir executable basename
    for: [elf]
    size_min: 1000000
    size_max: 500000000
    if:
      type: path
      basename: true
      exact: mimir
  - id: grafana-mimir-container-archive
    desc: Grafana Mimir container archive
    for: [tar]
    size_min: 1000000
    size_max: 2000000000
    if:
      type: path
      basename: true
      regex: 'docker\.io_grafana_mimir_.*\.tar\.xz$'

composite_rules:
  - id: grafana-mimir-runtime
    desc: Grafana Mimir runtime artifact
    crit: notable
    conf: 0.98
    any:
      - id: grafana-mimir-binary-name
      - id: grafana-mimir-container-archive
