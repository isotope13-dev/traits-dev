defaults:
  platforms: [macos]
  for: [macho]
  crit: baseline
  conf: 0.96

traits:
  - id: maccy
    desc: Maccy clipboard manager
    size_min: 500000
    size_max: 5000000
    if: {type: basename, exact: Maccy}
  - id: easydict
    desc: Easydict translator app
    size_min: 10000000
    size_max: 60000000
    if: {type: basename, exact: Easydict}
  - id: ice-menu-bar-manager
    desc: Ice menu bar manager
    size_min: 500000
    size_max: 8000000
    if: {type: basename, exact: Ice}
  - id: appcleaner
    desc: AppCleaner cleanup utility
    size_min: 100000
    size_max: 2000000
    if: {type: basename, exact: AppCleaner}
  - id: handy
    desc: Handy desktop utility
    size_min: 10000000
    size_max: 80000000
    if: {type: basename, exact: handy}
  - id: apple-tccd
    desc: Apple TCC daemon
    size_min: 100000
    size_max: 2000000
    if: {type: basename, exact: tccd}
  - id: ish-app
    desc: iSH app binary
    size_min: 1000000
    size_max: 10000000
    if: {type: basename, exact: iSH}
  - id: ish-file-provider
    desc: iSH file provider extension
    size_min: 100000
    size_max: 3000000
    if: {type: basename, exact: iSHFileProvider}
  - id: sparkle-binarydelta
    desc: Sparkle BinaryDelta helper
    size_min: 50000
    size_max: 1000000
    if: {type: basename, exact: BinaryDelta}
  - id: mac-mouse-fix-helper
    desc: Mac Mouse Fix helper
    size_min: 1000000
    size_max: 10000000
    if: {type: basename, exact: Mac Mouse Fix Helper}
  - id: libsnappyjava-jni
    desc: Snappy Java JNI library
    size_min: 10000
    size_max: 200000
    if: {type: basename, exact: libsnappyjava.jnilib}
  - id: opencore-amrwb-dylib
    desc: OpenCORE AMR-WB codec library
    size_min: 50000
    size_max: 300000
    if: {type: basename, exact: libopencore-amrwb.0.dylib}
  - id: go-race-darwin-syso
    desc: Go race detector Darwin object
    size_min: 100000
    size_max: 2000000
    if: {type: basename, exact: race_darwin.syso}
  - id: go-race-darwin-arm64-syso
    desc: Go race detector Darwin ARM64 object
    size_min: 100000
    size_max: 2000000
    if: {type: basename, exact: race_darwin_arm64.syso}
  - id: macos-dsym-debug-symbol
    desc: macOS dSYM debug symbol
    size_min: 1000
    size_max: 200000000
    if:
      type: path
      regex: '\.dSYM([\\/]|$)'
  - id: raylib-static-archive-member
    desc: raylib macOS archive member
    size_min: 10000
    size_max: 10000000
    if: {type: basename, exact: libraylib.a}
  - id: jnlua-darwin-library
    desc: JNLua Darwin native library
    size_min: 100000
    size_max: 2000000
    if: {type: basename, exact: libjnlua54-darwin-x86_64.dylib}
  - id: xctool-otest-query
    desc: xctool otest query helper
    size_min: 10000
    size_max: 2000000
    if: {type: basename, exact: otest-query-osx}
  - id: crashpad-handler
    desc: Crashpad handler binary
    size_min: 100000
    size_max: 10000000
    if: {type: basename, exact: crashpad_handler}
  - id: sevenzip-mac-helper
    desc: 7-Zip macOS helper
    size_min: 100000
    size_max: 5000000
    if: {type: basename, exact: 7z-mac}
  - id: mysqlclient-dylib
    desc: MySQL client dylib
    size_min: 1000000
    size_max: 20000000
    if: {type: basename, exact: libmysqlclient.24.dylib}
  - id: agent-browser-darwin
    desc: Agent Browser Darwin binary
    size_min: 1000000
    size_max: 100000000
    if: {type: basename, exact: agent-browser-darwin-arm64}
  - id: raspberry-pi-imager-bundle
    desc: Raspberry Pi Imager app bundle
    for: [macho, binaries]
    size_min: 10000
    size_max: 200000000
    if:
      type: path
      regex: 'Raspberry Pi Imager\.app[\\/]'
  - id: qt-macos-platform-plugin
    desc: Qt macOS platform plugin
    for: [macho, dylib]
    size_min: 10000
    size_max: 10000000
    if: {type: basename, exact: libqcocoa.dylib}
  - id: qt-macos-style-plugin
    desc: Qt macOS style or image plugin
    for: [macho, dylib]
    size_min: 10000
    size_max: 10000000
    if:
      type: basename
      regex: '^lib(qsvg|qsvgicon|qmacstyle|qminimal)\.dylib$'
  - id: qt-quickcontrols-style-plugin
    desc: Qt Quick Controls style plugin
    for: [macho, dylib]
    size_min: 10000
    size_max: 10000000
    if:
      type: basename
      regex: '^libqtquickcontrols2[^\\/]*styleplugin\.dylib$'
  - id: qt-quick-tooling-plugin
    desc: Qt Quick tooling plugin
    for: [macho, dylib]
    size_min: 10000
    size_max: 10000000
    if: {type: basename, exact: libquicktoolingplugin.dylib}
  - id: obs-studio-bundle
    desc: OBS Studio app bundle
    for: [macho, binaries, plist]
    size_min: 10000
    size_max: 300000000
    if:
      type: path
      regex: 'OBS\.app[\\/]'
  - id: chromium-embedded-framework
    desc: Chromium Embedded Framework
    for: [macho, binaries]
    size_min: 1000000
    size_max: 300000000
    if:
      type: path
      regex: 'Chromium Embedded Framework\.framework[\\/]'
  - id: electron-framework
    desc: Electron Framework
    for: [macho, binaries]
    size_min: 1000000
    size_max: 300000000
    if:
      type: path
      regex: 'Electron Framework\.framework[\\/]'
  - id: sparkle-framework
    desc: Sparkle updater framework
    for: [macho, binaries]
    size_min: 100000
    size_max: 50000000
    if:
      type: path
      regex: 'Sparkle\.framework[\\/]'
  - id: dbeaver-app-bundle
    desc: DBeaver Community app bundle
    for: [macho, binaries, jar, zip, java_class, class]
    platforms: [unix, android]
    size_min: 1000
    size_max: 600000000
    if:
      type: path
      regex: 'DBeaver\.app[\\/]'
  - id: dbeaver-plugin-jar
    desc: DBeaver plugin JAR
    for: [jar, zip, java_class, class]
    platforms: [unix, android]
    size_min: 1000
    size_max: 100000000
    if:
      type: path
      regex: 'org\.jkiss\.dbeaver\.[^\\/]+\.jar'
  - id: dbeaver-java-package
    desc: DBeaver Java package class
    for: [java_class, class]
    platforms: [unix, android]
    size_min: 100
    size_max: 5000000
    if:
      type: path
      regex: 'jkiss[\\/]dbeaver'
  - id: eclipse-swt-cocoa-library
    desc: Eclipse SWT Cocoa native library
    size_min: 10000
    size_max: 20000000
    if:
      type: basename
      regex: '^libswt-cocoa-[^\\/]+\.jnilib$'
  - id: mattermost-desktop-bundle
    desc: Mattermost Desktop app bundle
    for: [macho, binaries, javascript, archives, zip]
    platforms: [unix, windows]
    size_min: 1000
    size_max: 600000000
    if:
      type: path
      regex: 'Mattermost\.app[\\/]'
  - id: mattermost-asar-resource
    desc: Mattermost Desktop asar resource
    for: [javascript, shell]
    platforms: [unix, windows]
    size_min: 100
    size_max: 50000000
    if:
      type: basename
      regex: '^(create_desktop_file\.sh|[0-9]+_bundle\.js)$'
  - id: podman-desktop-bundle
    desc: Podman Desktop app bundle
    for: [macho, binaries, javascript, typescript, c, archives, zip]
    platforms: [unix, windows]
    size_min: 1000
    size_max: 600000000
    if:
      type: path
      regex: 'Podman Desktop\.app[\\/]'
  - id: podman-desktop-resource
    desc: Podman Desktop bundled resource
    for: [javascript, typescript, c]
    platforms: [unix, windows]
    size_min: 100
    size_max: 50000000
    if:
      type: basename
      regex: '^(image-registry-[A-Za-z0-9_-]+\.cjs|extension\.(js|cjs|ts))$'
  - id: codeedit-bundle
    desc: CodeEdit app bundle
    for: [macho, binaries]
    size_min: 10000
    size_max: 200000000
    if:
      type: path
      regex: 'CodeEdit\.app[\\/]'
  - id: lite-xl-bundle
    desc: Lite XL app bundle
    for: [macho, binaries, lua]
    size_min: 1000
    size_max: 100000000
    if:
      type: path
      regex: 'Lite XL\.app[\\/]'
  - id: localai-bundle
    desc: LocalAI app bundle
    for: [macho, binaries]
    size_min: 10000
    size_max: 300000000
    if:
      type: path
      regex: 'LocalAI\.app[\\/]'
