defaults:
  platforms: [unix, windows]
  for: [python, package.json, markdown]
  crit: baseline
  conf: 0.98

traits:
  - id: eeg-security-module-marker
    desc: EEG security package module marker
    if:
      type: text
      substr: "EEG -"
  - id: eeg-security-gateway-marker
    desc: EEG security gateway marker
    if:
      type: text
      substr: "eeg-gateway-wrap"
  - id: eeg-security-package-marker
    desc: EEG security package identity
    if:
      type: text
      substr: "eeg-security"
  - id: eeg-security-ember-module
    desc: EEG security embedded classifier module
    if:
      type: path
      regex: 'eeg[\\/]runtime[\\/]ember_pulse\.py$'

composite_rules:
  - id: eeg-security-context
    desc: EEG security scanner application context
    crit: notable
    conf: 0.98
    any:
      - id: eeg-security-module-marker
      - id: eeg-security-gateway-marker
      - id: eeg-security-package-marker
      - id: eeg-security-ember-module
