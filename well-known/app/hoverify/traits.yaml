# Hoverify is a legitimate web-development WebExtension.  Its background
# worker records request metadata and site-stack results in extension storage
# while analyzing the current site; these markers provide product context for
# the generic extension-surveillance composites.
defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: notable
  conf: 0.99

traits:
  - id: first-party-api-endpoint
    desc: Hoverify first-party application API endpoint
    if:
      type: literal
      exact: "https://api.tryhoverify.com/app"

  - id: site-stack-cache-key
    desc: Hoverify site-stack analysis cache key
    if:
      type: literal
      exact: "site_stack.tech.headers"

composite_rules:
  - id: site-stack-benign-context
    desc: Hoverify site-stack technology-analysis context
    crit: exception
    conf: 0.99
    all:
      - id: first-party-api-endpoint
      - id: site-stack-cache-key
