defaults:
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.95
  size_min: 512
  size_max: 524288000

traits:
  - id: dlink-wlan-product-versioninfo
    desc: D-Link WLAN Application ProductName version info
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.product_name
      exact: D-Link WLAN Application

  - id: dlink-wlan-description-versioninfo
    desc: D-Link WLAN Application FileDescription version info
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.description
      exact: D-Link WLAN Application

  - id: dlink-wlan-original-filename
    desc: D-Link WLAN monitor original filename
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.original_filename
      exact: WlanMon.exe

  - id: dlink-company-versioninfo
    desc: D-Link CompanyName version info
    crit: component
    conf: 0.95
    if:
      type: kv
      path: pe.version.company
      regex: '(?i)^D-?Link Corp\.?$'

composite_rules:
  - id: dlink-wlan-application
    desc: D-Link WLAN utility
    crit: baseline
    conf: 0.99
    all:
      - id: dlink-wlan-product-versioninfo
      - id: dlink-wlan-description-versioninfo
    any:
      - id: dlink-wlan-original-filename
      - id: dlink-company-versioninfo
      - id: metadata/signed/leaf::d-link-corporation
