# RunPane is a user-invoked installer and remote-control CLI for the Pane
# desktop application. Its generated contract documents download/install
# operations, while the runtime performs those operations on explicit commands.
defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.98
  size_max: 5000000

traits:
  - id: package-name
    desc: RunPane package metadata name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: runpane

  - id: package-summary
    desc: RunPane Pane installer package summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      regex: '(?i)thin PyPI installer and remote setup CLI for Pane'

  - id: upstream-repository
    desc: RunPane upstream Pane repository
    for: [pkginfo]
    if:
      type: text
      regex: 'github\.com/dcouple/Pane([/#?]|$)'

  - id: source-package-path
    desc: RunPane Python package source path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])runpane[\\/]'

  - id: generated-contract
    desc: RunPane generated command contract
    for: [python]
    if:
      type: text
      substr: RUNPANE_CONTRACT

  - id: wrapper-runtime
    desc: RunPane wrapper runtime marker
    for: [python]
    if:
      type: text
      regex: '\brunpane_wrapper_(command|download)_[a-z_]+' 

composite_rules:
  - id: package-context
    desc: RunPane package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    all:
      - id: package-name
      - id: package-summary
      - id: upstream-repository

  - id: source-context
    desc: RunPane installer and remote-control source context
    crit: notable
    conf: 0.99
    for: [python]
    all:
      - id: source-package-path
    any:
      - id: generated-contract
      - id: wrapper-runtime
