# Dism++ is a Windows servicing and cleanup utility. Its Frog plugins use
# low-level process APIs for legitimate system inspection and integration.
defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 4096
  size_max: 250000000

traits:
  - id: publisher
    desc: Dism++ publisher metadata
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.company
      exact: 初雨团队

  - id: product
    desc: Dism++ product metadata
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.product_name
      regex: '^(Dism\+\+|青蛙插件)$'

  - id: frog-plugin-marker
    desc: Dism++ Frog plugin marker
    crit: notable
    conf: 0.98
    if:
      type: text
      section: .rdata
      word: FrogPlugins

composite_rules:
  - id: dism-plus-plus-main-context
    desc: Dism++ executable context
    crit: exception
    conf: 0.99
    all:
      - id: publisher
      - id: product

  - id: dism-plus-plus-plugin-context
    desc: Dism++ Frog plugin context
    crit: exception
    conf: 0.99
    all:
      - id: publisher
      - id: product
      - id: frog-plugin-marker
