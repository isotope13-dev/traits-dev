defaults:
  platforms: [linux]
  for: [whl, python]
  crit: notable
  conf: 0.98

traits:
  - id: postern-package-name
    desc: Postern Python sandbox package
    for: [whl]
    if:
      type: value
      path: 'whl.distribution'
      exact: postern

  - id: postern-sandbox-module
    desc: Postern bubblewrap sandbox module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)postern/_sandbox\.py$'

  - id: postern-seccomp-module
    desc: Postern seccomp policy module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)postern/_seccomp\.py$'

  - id: postern-grpc-module
    desc: Postern gRPC hatch module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)postern/grpc\.py$'

composite_rules:
  - id: postern-package
    desc: Postern fail-closed Python sandbox distribution
    crit: notable
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: postern-package-name
    any:
      - id: postern-sandbox-module
      - id: postern-seccomp-module
      - id: postern-grpc-module
    needs: 1
