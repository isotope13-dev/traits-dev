defaults:
  platforms: [unix]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: kpango-dotfiles-source-path
    desc: kpango dotfiles source path
    for: [archives, source, scripts, manifests, documents, data, shell, markdown, systemd, systemd-service, systemd_service, plist, dockerfile, github-actions, desktop_entry, applescript]
    if:
      type: path
      substr: github.com/kpango/dotfiles@
  - id: kpango-dotfiles-systemd-path
    desc: kpango dotfiles systemd path
    platforms: [linux]
    for: [systemd, systemd-service, systemd_service]
    if:
      type: path
      regex: 'arch[\\/]service[\\/]irqbalance\.service$'
  - id: kpango-claude-security-gate
    desc: kpango Claude security gate hook
    for: [shell]
    if:
      type: path
      substr: claude/hooks/security-gate.sh
  - id: kpango-arch-bootstrap
    desc: kpango Arch bootstrap script
    for: [shell]
    if:
      type: path
      substr: arch/chroot.sh
