defaults:
  platforms: [linux, macos, windows]
  for: [archive, java, javascript, shell, github-actions, json, text]
  crit: notable
  conf: 0.98
  size_max: 524288000

traits:
  - id: wrongsecrets-source-path
    desc: OWASP WrongSecrets source archive path
    if:
      type: path
      substr: github.com-owasp-wrongsecrets-
  - id: wrongsecrets-java-package
    desc: OWASP WrongSecrets Java package
    if:
      type: text
      substr: org.owasp.wrongsecrets
  - id: wrongsecrets-project-text
    desc: OWASP WrongSecrets project text
    if:
      type: text
      substr: OWASP WrongSecrets

composite_rules:
  - id: wrongsecrets-security-training-app
    desc: OWASP WrongSecrets security training app
    crit: notable
    conf: 0.99
    any:
      - id: wrongsecrets-source-path
      - id: wrongsecrets-java-package
      - id: wrongsecrets-project-text
