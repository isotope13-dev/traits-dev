defaults:
  platforms: [macos]
  for: [shell, zip]

traits:
  - id: nix-darwin-source-path
    desc: nix-darwin GitHub source path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(^|[/\\])nix-darwin@|github\.com-LnL7-nix-darwin'

  - id: nix-darwin-project-marker
    desc: nix-darwin project marker
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(?i)nix-darwin'

composite_rules:
  - id: nix-darwin-source-context
    desc: Recognized nix-darwin source tree or release archive
    crit: exception
    conf: 0.99
    all:
      - id: nix-darwin-source-path
      - id: nix-darwin-project-marker
