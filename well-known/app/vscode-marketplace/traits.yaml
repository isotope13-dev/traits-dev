defaults:
  platforms: [windows, unix]
  for: [scripts, package.json, vsix-manifest]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: m365-agents-toolkit-vsix
    desc: Microsoft 365 Agents Toolkit bundle
    crit: notable
    if:
      type: text
      substr: TeamsFx
  - id: openchamber-vsix
    desc: OpenChamber VSCode webview bundle
    crit: notable
    if:
      type: text
      substr: window.__OPENCHAMBER_ELECTRON__
  - id: devsense-composer-vsix
    desc: DevSense Composer VSCode extension bundled code
    crit: notable
    if:
      type: text
      substr: parseComposerJson
  - id: deque-axe-linter-vsix
    desc: Deque axe linter VSCode extension bundled code
    crit: notable
    if:
      type: text
      substr: '"name":"vscode-axe-linter"'
  - id: sql-database-projects-vsix
    desc: Microsoft SQL Database Projects VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: ms-mssql.sql-database-projects-vscode.vsix
  - id: oxc-vscode-vsix
    desc: OXC VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: oxc.oxc-vscode-1.58.0.vsix
  - id: oxc-vscode-package-name
    desc: OXC VSCode extension package manifest
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: oxc-vscode
  - id: unity-debug-vsix
    desc: Unity Debug VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: Unity.unity-debug.vsix
