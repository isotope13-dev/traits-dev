defaults:
  platforms: [windows, unix]
  for: [scripts, package.json, vsix-manifest]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: m365-agents-toolkit-vsix
    desc: Microsoft 365 Agents Toolkit bundle
    crit: notable
    if:
      type: text
      substr: TeamsFx
  - id: openchamber-vsix
    desc: OpenChamber VSCode webview bundle
    crit: notable
    if:
      type: text
      substr: window.__OPENCHAMBER_ELECTRON__
  - id: devsense-composer-vsix
    desc: DevSense Composer VSCode extension bundled code
    crit: notable
    if:
      type: text
      substr: parseComposerJson
  - id: devsense-profiler-vsix
    desc: DevSense Profiler VSCode extension bundled code
    crit: notable
    if:
      type: text
      substr: '"name":"profiler-php-vscode"'
  - id: devsense-profiler-bundled-js
    desc: DevSense Profiler bundled JavaScript
    crit: notable
    for: [javascript]
    if:
      type: text
      substr: phpprofiler.cachegrind
  - id: wakatime-bundled-js
    desc: WakaTime VSCode extension bundled JavaScript
    crit: notable
    for: [javascript]
    if:
      type: text
      substr: WakaTime Api Key
  - id: deque-axe-linter-vsix
    desc: Deque axe linter VSCode extension bundled code
    crit: notable
    if:
      type: text
      substr: '"name":"vscode-axe-linter"'
  - id: sql-database-projects-vsix
    desc: Microsoft SQL Database Projects VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: ms-mssql.sql-database-projects-vscode.vsix
  - id: oxc-vscode-vsix
    desc: OXC VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: oxc.oxc-vscode-1.58.0.vsix
  - id: oxc-vscode-package-name
    desc: OXC VSCode extension package manifest
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: oxc-vscode
  - id: unity-debug-vsix
    desc: Unity Debug VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: Unity.unity-debug.vsix
  - id: bwat-dev-vsix
    desc: Bwat Dev VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: CasaManagementSolutions.bwat-dev-3.22.0.vsix
  - id: bwat-dev-member-path
    desc: Bwat Dev VSCode extension member
    crit: notable
    for: [javascript, package.json, vsix-manifest]
    size_max: 1000000
    if:
      type: text
      regex: 'Bwat|BashTool|PowerShellTool|\.bwat/'
  - id: microi-v8-engine-vsix
    desc: Microi V8 Engine VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: Microi.v8-engine-2.2.5.vsix
  - id: microi-v8-engine-member-path
    desc: Microi V8 Engine VSCode extension member
    crit: notable
    for: [javascript, package.json, vsix-manifest]
    if:
      type: text
      # Require the product token or a member separator; do not match the
      # ordinary English word "Microinjection" in web pages.
      regex: '(?i)\bmicroi([._][a-z0-9_-]+)?\b'
  - id: claude-code-gauge-member-path
    desc: Claude Code Gauge VSCode extension member
    crit: notable
    for: [javascript, json, package.json, vsix-manifest]
    if:
      type: text
      regex: 'claude-code-gauge|Claude Code Gauge'
  - id: dev-session-canvas-vsix
    desc: Dev Session Canvas VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: devsessioncanvas.dev-session-canvas-0.16.1.vsix
  - id: dev-session-canvas-member-path
    desc: Dev Session Canvas VSCode extension member
    crit: notable
    for: [javascript, package.json, vsix-manifest]
    if:
      type: text
      regex: 'Dev Session Canvas|devSessionCanvas'
  - id: abap-remote-fs-vsix
    desc: ABAP Remote FS VSCode extension
    crit: notable
    for: [archive]
    if:
      type: path
      basename: true
      exact: murbani.vscode-abap-remote-fs-2.4.10.vsix
  - id: abap-remote-fs-member-path
    desc: ABAP Remote FS VSCode extension member
    crit: notable
    for: [javascript, package.json, vsix-manifest]
    if:
      type: text
      regex: 'vscode-abap-remote-fs|ADTClient|/sap/bc/adt'

composite_rules:
  - id: devsense-vsix
    desc: DevSense VSCode extension bundled code
    crit: notable
    any:
      - id: devsense-composer-vsix
      - id: devsense-profiler-vsix
      - id: devsense-profiler-bundled-js
