defaults:
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.94
  size_min: 200000

traits:
  - id: executable-basename
    desc: pgBackRest executable basename
    if:
      type: basename
      exact: pgbackrest
  - id: product-name-string
    desc: pgBackRest product string
    if:
      type: text
      substr: pgBackRest
      section: .rodata
  - id: backup-command-path
    desc: pgBackRest backup command path
    if:
      type: text
      substr: command/backup/
      section: .rodata
  - id: stanza-command-path
    desc: pgBackRest stanza command path
    if:
      type: text
      substr: command/stanza/
      section: .rodata

composite_rules:
  - id: pgbackrest-backup-tool
    desc: pgBackRest backup tool
    crit: notable
    conf: 0.98
    all:
      - id: executable-basename
      - id: product-name-string
      - id: backup-command-path
      - id: stanza-command-path
