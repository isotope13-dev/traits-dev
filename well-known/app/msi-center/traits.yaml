# MSI Center's TerminalServer process can leave a PE-shaped memory image in
# collections. Its updater/task XML and .NET runtime strings resemble
# persistence and environment-fingerprinting evidence without being executable
# behavior in the collected image.
defaults:
  platforms: [windows]
  for: [pe, dll]
  conf: 0.98

traits:
  - id: msi-terminalserver-executable
    desc: MSI Center TerminalServer executable identity
    crit: notable
    size_min: 500000
    size_max: 2000000
    if:
      type: text
      section: ""
      regex: '(?i)\bMSI\.TerminalServer\.exe\b'

  - id: msi-mystic-light-updater
    desc: MSI Center Mystic Light updater identity
    crit: notable
    size_min: 500000
    size_max: 2000000
    if:
      type: text
      section: ""
      regex: '(?i)\bMystic Light_[0-9]+(\.[0-9]+){1,8}\.exe\b'

  - id: msi-task-host-base
    desc: MSI Task Host base task identity
    crit: notable
    size_min: 500000
    size_max: 2000000
    if:
      type: text
      section: ""
      regex: '(?i)<Description>MSI Task Host - Base</Description>'

composite_rules:
  - id: msi-center-terminalserver-memory-image
    desc: MSI Center TerminalServer image with Mystic Light task content
    crit: exception
    all:
      - id: msi-terminalserver-executable
      - id: msi-mystic-light-updater
      - id: msi-task-host-base
