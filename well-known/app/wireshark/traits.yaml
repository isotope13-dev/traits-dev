defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.98
  size_min: 1000
  size_max: 120000000

traits:
  - id: wireshark-artifact-path
    desc: Wireshark installer artifact path
    for: [pe, dll, batch, scripts, binaries]
    size_min: 0
    if:
      type: path
      substr: Wireshark-
  - id: usbpcap-installer-artifact-path
    desc: USBPcap installer artifact path
    if:
      type: path
      substr: USBPcapSetup-
  - id: wireshark-product-name
    desc: Wireshark PE product metadata
    for: [pe]
    size_min: 1000000
    if:
      type: value
      path: pe.version.product_name
      exact: Wireshark
  - id: wireshark-signer
    desc: Wireshark Foundation signer
    for: [pe]
    size_min: 1000000
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '\bO=Wireshark Foundation\b'

composite_rules:
  - id: wireshark-official-installer-context
    desc: Official Wireshark installer context
    crit: notable
    conf: 0.99
    any:
      - id: wireshark-artifact-path
      - id: usbpcap-installer-artifact-path
      - id: wireshark-product-name
      - id: wireshark-signer
