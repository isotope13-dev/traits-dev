defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: product-identity
    desc: TXTconverter product identity
    crit: notable
    conf: 0.98
    size_min: 500000
    size_max: 10000000
    if:
      type: text
      regex: '(?i)\bTXTconverter\b'
      section: .text

  - id: installer-identity
    desc: TXTconverter installer identity
    crit: notable
    conf: 0.98
    size_min: 500000
    size_max: 10000000
    if:
      type: text
      exact: TXTconverterSetup.exe
      section: .text

composite_rules:
  - id: kalim-signed-product
    desc: TXTconverter signed by KALIM LIMITED
    crit: notable
    conf: 0.99
    all:
      - id: product-identity
      - id: metadata/signed/leaf::kalim-limited
  - id: signed-installer-context
    desc: Signed TXTconverter installer context
    crit: exception
    conf: 0.99
    all:
      - id: kalim-signed-product
      - id: installer-identity
