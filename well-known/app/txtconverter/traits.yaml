defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: product-identity
    desc: TXTconverter product identity
    crit: notable
    conf: 0.98
    size_min: 500000
    size_max: 10000000
    if:
      type: value
      path: pe.version.product_name
      exact: TXTConverter

  - id: installer-identity
    desc: TXTconverter installer identity
    crit: notable
    conf: 0.98
    size_min: 500000
    size_max: 10000000
    if:
      type: value
      path: pe.version.internal_name
      exact: TXTconverterSetup.exe

composite_rules:
  - id: kalim-signed-product
    desc: TXTconverter signed by KALIM LIMITED
    crit: notable
    conf: 0.99
    all:
      - id: product-identity
      - id: metadata/signed/certificate/identity::pe-signer-kalim-limited
  - id: signed-installer-context
    desc: Signed TXTconverter installer context
    crit: exception
    conf: 0.99
    all:
      - id: kalim-signed-product
      - id: installer-identity
