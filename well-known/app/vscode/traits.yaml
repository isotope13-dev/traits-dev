defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  size_max: 200000000
traits:
  - id: vscode-name
    desc: VS Code application name
    crit: baseline
    conf: 0.8
    for: [pe, elf, python, javascript, typescript, powershell]
    if:
      type: text
      word: vscode
      case_insensitive: true

  - id: remote-ssh-resolver-basename
    desc: VS Code Remote SSH resolver basename
    crit: component
    conf: 0.95
    if:
      type: value
      path: file.basename
      exact: resolver.js
  - id: remote-ssh-agent-folder
    desc: VS Code Remote SSH agent folder marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: vscodeAgentFolder
  - id: remote-ssh-install-options
    desc: VS Code Remote SSH install options marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: useCurlAndWgetConfigurationFiles
  - id: remote-ssh-authorized-keys-doc
    desc: VS Code Remote SSH authorized_keys doc marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: VSCODE_INJECTION

composite_rules:
  - id: remote-ssh-resolver-bundle
    desc: VS Code Remote SSH resolver bundle
    crit: baseline
    conf: 0.98
    all:
      - id: remote-ssh-resolver-basename
      - id: remote-ssh-agent-folder
      - id: remote-ssh-install-options
  - id: remote-ssh-doc-bundle
    desc: VS Code Remote SSH doc resolver bundle
    crit: notable
    conf: 0.98
    all:
      - id: remote-ssh-resolver-bundle
      - id: remote-ssh-authorized-keys-doc
