defaults:
  platforms: [linux, macos, windows]
  for: [binaries, elf, macho, pe, shell, tar, javascript]
  crit: baseline
  conf: 0.95

traits:
  - id: release-path
    desc: AdGuardHome release package path marker
    size_min: 1
    size_max: 1073741824
    if:
      type: basename
      substr: AdGuardHome
      case_insensitive: true
