# IvoryOS is an open-source Flask/Socket.IO orchestrator for self-driving
# laboratory workflows.  Dynamic imports, generated workflow execution,
# database serialization, and optional LLM calls are application features.
defaults:
  platforms: [unix, windows]
  for: [whl, pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: IvoryOS PyPI package name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: ivoryos

  - id: wheel-distribution
    desc: IvoryOS wheel distribution name
    for: [whl]
    if:
      type: value
      path: whl.distribution
      exact: ivoryos

  - id: package-summary
    desc: IvoryOS self-driving-lab package summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      exact: an open-source Python package enabling Self-Driving Labs (SDLs)

  - id: upstream-project
    desc: IvoryOS upstream GitLab project
    for: [pkginfo, python]
    if:
      type: text
      substr: https://gitlab.com/heingroup/ivoryos

  - id: source-tree
    desc: IvoryOS Python source tree
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])ivoryos([\\/]|$)'

  - id: self-driving-lab-marker
    desc: IvoryOS self-driving-lab orchestrator marker
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)(Self-Driving Labs|self-driving laboratories|IvoryOS)'

composite_rules:
  - id: package-identity
    desc: IvoryOS self-driving-lab orchestrator identity
    crit: notable
    conf: 0.99
    scope: outer
    all:
      - id: package-name
      - id: package-summary

  - id: project-context
    desc: Recognized IvoryOS open-source lab orchestrator context
    crit: notable
    conf: 0.99
    scope: outer
    all:
      - id: package-identity
      - id: upstream-project
      - id: self-driving-lab-marker
