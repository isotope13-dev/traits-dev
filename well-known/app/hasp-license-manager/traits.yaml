defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.96

traits:
  - id: hasp-company
    desc: Aladdin HASP company metadata
    if:
      type: value
      path: pe.version.company
      substr: Aladdin Knowledge Systems Ltd.

  - id: hasp-service-description
    desc: HASP License Manager service description
    if:
      type: value
      path: pe.version.description
      substr: HASP License Manager Service

  - id: hasp-service-product
    desc: HASP License Manager service product metadata
    if:
      type: value
      path: pe.version.product_name
      substr: HASP License Manager Service

  - id: hasp-service-original-filename
    desc: HASP License Manager service executable name
    if:
      type: value
      path: pe.version.original_filename
      exact: nhsrvice.exe

  - id: hasp-trademark-metadata
    desc: HASP trademark metadata
    crit: component
    conf: 0.9
    if:
      type: value
      path: pe.version.trademarks
      substr: HASP

composite_rules:
  - id: hasp-license-manager-service
    desc: HASP License Manager service binary
    crit: notable
    conf: 0.99
    all:
      - id: hasp-company
    any:
      - id: hasp-service-description
      - id: hasp-service-product
      - id: hasp-service-original-filename
      - id: hasp-trademark-metadata
      - id: metadata/binary/section/names::protect-section
    needs: 3
