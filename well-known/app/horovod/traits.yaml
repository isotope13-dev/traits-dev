defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: horovod-conda-member
    desc: Horovod conda package member
    for: [shell]
    if:
      type: path
      substr: horovod-
  - id: horovodrun-basename
    desc: horovodrun basename
    for: [shell]
    if:
      type: basename
      exact: horovodrun

composite_rules:
  - id: horovodrun-shim
    desc: Horovod runner shell shim
    crit: notable
    conf: 0.98
    all:
      - id: horovod-conda-member
      - id: horovodrun-basename
