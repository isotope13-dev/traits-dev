# NeuroLink is a published TypeScript AI SDK. Its provider credential handling,
# developer tooling, and opt-in local proxy integration are expected product
# behavior; these identity checks provide narrow benign context for objective
# rules that would otherwise misclassify those features.
defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, github-actions, markdown, json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: NeuroLink npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@juspay/neurolink'

  - id: upstream-repository
    desc: NeuroLink upstream repository reference
    if:
      type: text
      regex: 'github\.com/juspay/neurolink(\.git)?([/\\s"''`?#]|$)'

  - id: product-summary
    desc: NeuroLink TypeScript AI SDK product summary
    for: [package.json, markdown]
    if:
      type: text
      regex: '(?i)TypeScript AI SDK with .{0,80}LLM providers'

  - id: archive-member-context
    desc: NeuroLink npm archive member path
    if:
      type: path
      regex: '(^|[\\/])neurolink@v[0-9][0-9A-Za-z.-]*([\\/]|$)'

  - id: bedrock-provider-class
    desc: NeuroLink Bedrock provider implementation
    for: [typescript]
    if:
      type: text
      substr: 'class AmazonBedrockProvider extends BaseProvider'

  - id: bedrock-runtime-import
    desc: AWS Bedrock runtime SDK import
    for: [typescript]
    if:
      type: text
      substr: '@aws-sdk/client-bedrock-runtime'

  - id: proxy-launchd-label
    desc: NeuroLink proxy LaunchAgent label
    for: [typescript]
    if:
      type: text
      substr: 'com.neurolink.proxy'

  - id: proxy-claude-settings-path
    desc: NeuroLink Claude settings path
    for: [typescript]
    if:
      type: text
      substr: 'CLAUDE_SETTINGS_PATH'

  - id: action-dist-bedrock-marker
    desc: NeuroLink bundled Bedrock model table
    for: [javascript]
    if:
      type: text
      substr: 'AIProviderName["BEDROCK"] = "bedrock"'

composite_rules:
  - id: benign-archive-context
    desc: Recognized NeuroLink npm archive context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: package-name
      - id: upstream-repository

  - id: bedrock-provider-context
    desc: Recognized NeuroLink Bedrock provider source
    crit: exception
    conf: 0.99
    all:
      - id: bedrock-provider-class
      - id: bedrock-runtime-import

  - id: proxy-launchd-context
    desc: Recognized NeuroLink proxy LaunchAgent source
    crit: exception
    conf: 0.99
    all:
      - id: proxy-launchd-label
      - id: proxy-claude-settings-path
