defaults:
  platforms: [unix]
  crit: notable
  conf: 0.96

traits:
  - id: passmenu-helper-basename
    desc: password-store passmenu helper basename
    ref: sha256:ec443d189bcec5a95238b1ecf9cdcbb293b7f07fd485c1876ec35f04435ba4ee
    crit: component
    for: [shell]
    if:
      type: path
      basename: true
      exact: passmenu

  - id: passmenu-password-store-body
    desc: password-store passmenu helper body
    ref: sha256:ec443d189bcec5a95238b1ecf9cdcbb293b7f07fd485c1876ec35f04435ba4ee
    crit: component
    for: [shell]
    if:
      type: text
      substr: 'pass show "$password"'

  - id: applescript-helper-basename
    desc: password-store AppleScript helper basename
    ref: sha256:ec443d189bcec5a95238b1ecf9cdcbb293b7f07fd485c1876ec35f04435ba4ee
    crit: component
    for: [applescript]
    if:
      type: path
      basename: true
      exact: pass.applescript

  - id: applescript-password-store-body
    desc: password-store AppleScript helper body
    ref: sha256:ec443d189bcec5a95238b1ecf9cdcbb293b7f07fd485c1876ec35f04435ba4ee
    crit: component
    for: [applescript]
    if:
      type: text
      substr: "Applescript for easy invocation of 'pass'"

composite_rules:
  - id: passmenu-example-helper
    desc: password-store passmenu example helper
    ref: sha256:ec443d189bcec5a95238b1ecf9cdcbb293b7f07fd485c1876ec35f04435ba4ee
    for: [shell]
    all:
      - id: passmenu-helper-basename
      - id: passmenu-password-store-body

  - id: applescript-example-helper
    desc: password-store AppleScript example helper
    ref: sha256:ec443d189bcec5a95238b1ecf9cdcbb293b7f07fd485c1876ec35f04435ba4ee
    for: [applescript]
    all:
      - id: applescript-helper-basename
      - id: applescript-password-store-body
