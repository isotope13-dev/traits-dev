defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.96

traits:
  - id: portrait-displays-company
    desc: Portrait Displays company metadata
    if:
      type: kv
      path: pe.version.company
      substr: Portrait Displays, Inc

  - id: display-tune-product
    desc: Display Tune product metadata
    if:
      type: kv
      path: pe.version.product_name
      exact: Display Tune

  - id: display-tune-description
    desc: Display Tune file description
    if:
      type: kv
      path: pe.version.description
      substr: Display Tune

  - id: display-tune-original-filename
    desc: Display Tune original filename
    if:
      type: kv
      path: pe.version.original_filename
      exact: DTHtml.exe

composite_rules:
  - id: display-tune-binary
    desc: Portrait Displays Display Tune binary
    crit: notable
    conf: 0.99
    all:
      - id: portrait-displays-company
      - id: display-tune-product
    any:
      - id: display-tune-description
      - id: display-tune-original-filename
      - id: metadata/binary/section/names::pdi-section
    needs: 2
