# First-party identity for the Copy Text From Picture OCR extension.  The
# extension's diagnostic replay and local-data reset are documented product
# controls, not an injected destructive or surveillance objective.
defaults:
  platforms: [unix, windows]
  for: [chrome-manifest, json, javascript]
  crit: notable
  conf: 0.98

traits:
  - id: localized-app-name
    desc: Copy Text From Picture localized extension name
    for: [json]
    if:
      type: value
      path: appName.message
      exact: Copy Text from Picture

  - id: ocr-host-permission
    desc: Copy Text From Picture OCR service host
    for: [chrome-manifest]
    if:
      type: value
      path: host_permissions
      exact: https://copytextfrompicture.xyz/*

  - id: ocr-service-endpoint
    desc: Copy Text From Picture OCR endpoint
    for: [javascript]
    if:
      type: string_literal
      exact: https://copytextfrompicture.xyz/ocr/

  - id: product-sentry-dsn
    desc: Copy Text From Picture Sentry DSN
    for: [javascript]
    if:
      type: string_literal
      exact: https://3ab729f21efb3f825cb6be13f71e2f3@copytextfrompicture.xyz/0

  - id: local-data-clear-control
    desc: OCR panel local-data clear control
    for: [javascript]
    if:
      type: text
      substr: clear local data

  - id: indexeddb-clear-message
    desc: OCR panel IndexedDB clear message
    for: [javascript]
    if:
      type: text
      substr: remove-indexeddb

composite_rules:
  - id: extension-identity
    desc: Copy Text From Picture OCR extension identity
    crit: notable
    conf: 0.99
    for: [crx, xpi, zip]
    scope: archive
    all:
      - id: localized-app-name
      - id: ocr-host-permission
      - id: ocr-service-endpoint
      - id: product-sentry-dsn

  - id: documented-ocr-extension-context
    desc: Documented OCR extension capture and local-data controls
    crit: exception
    conf: 0.99
    for: [crx, xpi, zip]
    scope: archive
    all:
      - id: extension-identity
      - id: local-data-clear-control
      - id: indexeddb-clear-message

  - id: documented-local-data-reset-context
    desc: OCR worker handles a user-requested local-data reset
    crit: exception
    conf: 0.99
    scope: file
    all:
      - id: micro-behaviors/data/db/web-storage::indexeddb-databases-enumerate
      - id: indexeddb-clear-message
