defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: package-name
    desc: Firebase Data Connect VS Code package name
    crit: notable
    conf: 0.99
    if:
      type: value
      path: name
      exact: firebase-dataconnect-vscode
  - id: publisher
    desc: Google Cloud Tools VS Code publisher
    crit: notable
    conf: 0.99
    if:
      type: value
      path: publisher
      exact: GoogleCloudTools
  - id: source-repository
    desc: Firebase Tools source repository
    crit: notable
    conf: 0.99
    if:
      type: value
      path: repository
      regex: 'github\.com[/:]firebase/firebase-tools(\.git)?([/#?]|$)'

composite_rules:
  - id: official-package
    desc: Official Firebase Data Connect VS Code package
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: publisher
      - id: source-repository
