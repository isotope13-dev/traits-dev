defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.99
  size_min: 512
  size_max: 524288000

traits:
  - id: portableapps-chrome-product
    desc: PortableApps Google Chrome product identity
    if:
      type: value
      path: pe.version.product_name
      exact: Google Chrome Portable

  - id: portableapps-company-identity
    desc: PortableApps.com Chrome publisher identity
    if:
      type: value
      path: pe.version.company
      exact: PortableApps.com

  # NSIS online installer embeds KillProc.dll under $PLUGINSDIR. Path may be a
  # nested archive member (…GoogleChromePortable.exe!!$PLUGINSDIR/KillProc.dll)
  # without the outer .paf.exe prefix, so match the PLUGINSDIR leaf only.
  - id: nsis-pluginsdir-killproc
    desc: NSIS PLUGINSDIR KillProc helper DLL
    if:
      type: path
      regex: '(?i)\$PLUGINSDIR[/\\]KillProc\.dll$'

composite_rules:
  - id: portableapps-chrome-killproc-helper
    desc: PortableApps Chrome NSIS KillProc helper context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: portableapps-chrome-product
      - id: nsis-pluginsdir-killproc
