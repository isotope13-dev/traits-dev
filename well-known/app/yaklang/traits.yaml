# Yaklang ships a serialized gob documentation index containing API examples.
# The examples intentionally cover offensive/security operations, but the gob
# is data and is not itself an executable script.
defaults:
  platforms: [unix, windows]
  for: [vbs, data]
  size_max: 20000000

traits:
  - id: yakdoc-document-helper
    desc: Yaklang serialized documentation helper
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: DocumentHelper

  - id: yakdoc-script-library-type
    desc: Yaklang serialized script library type
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: yakdoc.ScriptLib

  # The HTTP-template package is a legitimate Yaklang scanner component.
  # Keep the package declaration as a weak fragment and require both stable
  # Yaklang imports before asserting the source identity.
  - id: httptpl-package-declaration
    desc: Declares the Yaklang HTTP template package
    crit: component
    conf: 0.98
    for: [go]
    if:
      type: text
      substr: 'package httptpl'

  - id: httptpl-lowhttp-import
    desc: Imports Yaklang raw HTTP support
    crit: notable
    conf: 0.99
    for: [go]
    if:
      type: import
      exact: github.com/yaklang/yaklang/common/utils/lowhttp

  - id: httptpl-codec-import
    desc: Imports Yaklang template codec support
    crit: notable
    conf: 0.99
    for: [go]
    if:
      type: import
      exact: github.com/yaklang/yaklang/common/yak/yaklib/codec

composite_rules:
  - id: yaklang-documentation-index-context
    desc: Yaklang serialized API documentation index
    crit: exception
    conf: 0.99
    all:
      - id: yakdoc-document-helper
      - id: yakdoc-script-library-type

  - id: yaklang-httptpl-source
    desc: Yaklang HTTP template implementation source
    crit: notable
    conf: 0.99
    for: [go]
    all:
      - id: httptpl-package-declaration
      - id: httptpl-lowhttp-import
      - id: httptpl-codec-import
