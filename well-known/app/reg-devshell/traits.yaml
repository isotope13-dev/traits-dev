defaults:
  platforms: [windows]
  for: [pe]
  conf: 0.99

traits:
  - id: product-version-title
    desc: REG DevShell versioned product title
    crit: notable
    size_min: 524288
    size_max: 3145728
    if:
      type: text
      regex: 'REG DevShell v[0-9]+\.[0-9]+'
      section: .rdata

  - id: developer-shell-purpose
    desc: REG DevShell developer-shell purpose text
    crit: notable
    size_min: 524288
    size_max: 3145728
    if:
      type: text
      substr: multi-tool developer shell
      section: .rdata

composite_rules:
  - id: developer-shell-application
    desc: REG DevShell developer utility
    crit: exception
    all:
      - id: product-version-title
      - id: developer-shell-purpose
