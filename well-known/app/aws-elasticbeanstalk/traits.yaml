defaults:
  platforms: [unix, windows]
  for: [python, powershell, shell, scripts, archives]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: awsebcli-source-tree
    desc: AWS Elastic Beanstalk CLI source tree
    if:
      type: path
      regex: 'awsebcli-[0-9][^\\/]*|ebcli[\\/]'

  - id: awsebcli-migration-script
    desc: AWS EB CLI migration script
    for: [powershell, scripts]
    if:
      type: path
      regex: 'migrate_scripts[\\/].*\.ps1$'
