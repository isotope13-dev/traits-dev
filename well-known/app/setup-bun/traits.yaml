defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: setup-bun-archive-member
    desc: setup-bun archive member
    for: [javascript]
    if:
      type: path
      substr: setup-bun-
  - id: setup-dist-index-path
    desc: setup-bun dist index path
    for: [javascript]
    if:
      type: path
      regex: 'dist[\\/]setup[\\/]index\.js$'
composite_rules:
  - id: setup-bun-action-bundle
    desc: setup-bun action bundle
    crit: notable
    conf: 0.98
    all:
      - id: setup-bun-archive-member
      - id: setup-dist-index-path
