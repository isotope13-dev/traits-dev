defaults:
  platforms: [macos]
  for: [macho]

traits:
  - id: askhuman-code-signing-identity
    desc: AskHuman macOS code-signing identity
    crit: notable
    conf: 1.0
    size_min: 1000000
    size_max: 20000000
    if:
      type: value
      path: macho.code_signature.identifier
      exact: com.naituw.humaninloop

composite_rules:
  - id: askhuman-launchd-management-context
    desc: Signed AskHuman launchd management context
    crit: exception
    conf: 1.0
    all:
      - id: askhuman-code-signing-identity
      - id: metadata/signed/developer::DMJXDB9H6Q
