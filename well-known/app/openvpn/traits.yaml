defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.96
  size_max: 5000000

traits:
  - id: source-path
    desc: OpenVPN source tree path
    crit: notable
    for: [source, scripts, data, c, cpp]
    if:
      type: path
      regex: 'github\.com[\\/]OpenVPN[\\/]openvpn@'

  - id: openvpn-source-token
    desc: OpenVPN source token
    for: [c, cpp, shell, python]
    if:
      type: text
      word: openvpn
      case_insensitive: true

composite_rules:
  - id: openvpn-source-tree
    desc: OpenVPN source tree
    crit: notable
    conf: 0.96
    any:
      - id: source-path
      - id: openvpn-source-token
