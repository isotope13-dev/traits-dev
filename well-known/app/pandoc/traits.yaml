defaults:
  platforms: [linux, macos, windows]
  for: [zip, tar, docx, rtf]
  crit: baseline
  conf: 0.95

traits:
  - id: package-path
    desc: Pandoc release or fixture path
    size_min: 1
    size_max: 2147483648
    if:
      type: basename
      regex: '(?i)(^|[!:/\\])pandoc-[0-9][^!:/\\]{0,80}([!:/\\]|$)'
  - id: haskell-module
    desc: Pandoc Haskell source module path
    for: [source]
    if:
      type: text
      regex: 'module\s+Text\.Pandoc\.'

