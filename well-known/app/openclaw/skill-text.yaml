defaults:
  platforms:
  - windows
  - unix
  for:
  - markdown
  crit: component
  conf: 0.9
  size_max: 5000000
traits:
- id: openclaw-product-name
  desc: OpenClaw product name marker
  if:
    type: text
    regex: "(?i)\\b(OpenClaw|Clawdbot|Moltbot|Molty)\\b"
- id: openclaw-ecosystem-phrase
  desc: OpenClaw ecosystem phrase marker
  if:
    type: text
    regex: "(?i)open agent skills ecosystem|\\bnpx skills\\b"

composite_rules:
- id: openclaw-skill-text
  desc: OpenClaw skill text marker
  any:
  - id: openclaw-product-name
  - id: openclaw-ecosystem-phrase
