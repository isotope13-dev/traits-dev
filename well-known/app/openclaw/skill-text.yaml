# OpenClaw agent-platform skill marker. Neutral platform identifier: legitimate
# OpenClaw skills reference the platform (and its Molty/Moltbot/Clawdbot
# assistant personas) in their SKILL.md / skill text. Detecting the name does
# NOT indicate trojanization — the trojanized-skill composites in
# objectives/supply-chain/trojanized/ reference this cross-tier purely as
# platform context, paired with the actual malicious behavior (e.g. a remote
# MSI install instruction).
defaults:
  platforms: [windows, unix]
  for: [markdown]
  crit: component
  conf: 0.9
traits:
  - id: openclaw-skill-text
    desc: OpenClaw skill text marker
    if:
      type: text
      regex: '(?i)\b(OpenClaw|Clawdbot|Moltbot|Molty)\b'
