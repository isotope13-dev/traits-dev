defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: samba-source-tree
    desc: Samba source-tree path
    crit: notable
    conf: 0.99
    size_min: 100
    size_max: 100000000
    for: [binaries, scripts, source]
    if:
      type: path
      regex: '(^|[\\/])samba-[0-9][^\\/]*'
  - id: samba-registry-import-regression-test
    desc: Samba registry import regression test
    crit: notable
    conf: 0.99
    size_min: 100
    size_max: 100000000
    if:
      type: text
      regex: '\bsamba_net\s+rpc\s+registry\s+import\b'
