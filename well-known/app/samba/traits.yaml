defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: samba-md4-hash-export
    desc: Samba MD4 password-hash export
    crit: notable
    conf: 0.99
    for: [elf, so]
    size_min: 100
    size_max: 20000000
    if:
      type: export
      exact: E_md4hash
  - id: samba-des-hash-export
    desc: Samba DES password-hash export
    crit: notable
    conf: 0.99
    for: [elf, so]
    size_min: 100
    size_max: 20000000
    if:
      type: export
      exact: E_deshash
  - id: samba-configuration-library
    desc: Samba configuration shared library
    crit: notable
    conf: 0.99
    for: [elf, so]
    size_min: 100000
    size_max: 20000000
    if:
      type: basename
      regex: '^libsmbconf\.so(\.[0-9.]+)?$'
  - id: samba-source-tree
    desc: Samba source-tree path
    crit: notable
    conf: 0.99
    size_min: 100
    size_max: 100000000
    for: [binaries, scripts, source, c, cpp, python]
    if:
      type: path
      regex: 'samba-[0-9][^\\/]*|samba-team.samba@v'
  - id: samba-registry-import-regression-test
    desc: Samba registry import regression test
    crit: notable
    conf: 0.99
    size_min: 100
    size_max: 100000000
    if:
      type: text
      regex: '\bsamba_net\s+rpc\s+registry\s+import\b'
