# YuJa Verity is a disclosed browser-based assessment-proctoring extension.
# These exact product markers provide benign context for generic browser
# surveillance heuristics; the underlying capability traits remain visible.
defaults:
  platforms: [unix, windows]
  for: [javascript, json]
  crit: notable
  conf: 0.99

traits:
  - id: verity-first-party-endpoint
    desc: YuJa Verity first-party service endpoint
    if:
      type: text
      substr: https://zone1.verity.yuja.com

  - id: verity-keyboard-logger-client
    desc: YuJa Verity proctoring keyboard logger client
    if:
      type: text
      substr: KeyboardLoggerClient

  - id: verity-manifest-name
    desc: YuJa Verity browser extension manifest identity
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: YuJa Verity Browser Extension

composite_rules:
  - id: verity-proctoring-code-context
    desc: YuJa Verity disclosed proctoring code context
    crit: exception
    conf: 0.99
    all:
      - id: verity-first-party-endpoint
      - id: verity-keyboard-logger-client

  - id: verity-proctoring-extension-context
    desc: YuJa Verity disclosed proctoring extension context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: verity-manifest-name
      - id: verity-first-party-endpoint
