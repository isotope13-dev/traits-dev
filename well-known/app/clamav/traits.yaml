defaults:
  platforms: [linux]
  for: [elf]
  crit: notable
  conf: 0.99
  size_min: 100000
  size_max: 50000000

traits:
  - id: clamd-basename
    desc: ClamAV daemon executable basename
    if:
      type: value
      path: file.basename
      exact: clamd

  - id: clamav-brand-marker
    desc: ClamAV name reference
    crit: notable
    conf: 0.9
    if:
      type: text
      section: .rodata
      word: ClamAV
    unless:
      - id: well-known/app/peazip/

  - id: clamav-library-dependency
    desc: ClamAV scanning library dependency
    if:
      type: value
      path: elf.needed
      regex: '^libclamav\.so\.[0-9]+$'

  - id: clamav-milter-basename
    desc: ClamAV milter executable basename
    if:
      type: value
      path: file.basename
      exact: clamav-milter

composite_rules:
  - id: clamd-runtime
    desc: ClamAV scanning daemon
    crit: notable
    conf: 0.99
    all:
      - id: clamd-basename
      - id: clamav-brand-marker
      - id: clamav-library-dependency

  - id: clamd-service-context
    desc: ClamAV daemon service context
    crit: exception
    conf: 0.99
    all:
      - id: clamd-runtime
      - id: clamd-basename

  - id: clamav-milter-service-context
    desc: ClamAV milter service context
    crit: exception
    conf: 0.99
    all:
      - id: clamav-brand-marker
      - id: clamav-milter-basename
