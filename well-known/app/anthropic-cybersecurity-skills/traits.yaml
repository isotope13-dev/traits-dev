# This repository is a defensive cybersecurity training corpus. Its source
# intentionally contains examples of offensive techniques and tool names.
defaults:
  platforms: [unix, windows]
  for: [markdown, text, json, archives]

traits:
  - id: repository-member-path
    desc: Anthropic skills repository member path
    crit: notable
    conf: 0.99
    for: [scripts, source, markdown, text, json, archives, python, shell, batch, powershell]
    if:
      type: path
      regex: '(^|[\\/])Anthropic-Cybersecurity-Skills-[0-9a-f]{40}([\\/]|$)'
  - id: repository-url
    desc: Anthropic Cybersecurity Skills repository URL
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: github.com/mukul975/Anthropic-Cybersecurity-Skills
  - id: authorized-lawful-security-disclaimer
    desc: Authorized lawful security-use disclaimer
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?is)authorized.{0,80}lawful.{0,500}(penetration testing|security research|defense)'
  - id: authorized-lawful-education-disclaimer
    desc: Authorized lawful education disclaimer
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?is)authorized.{0,80}lawful.{0,500}education'
  - id: lawful-authorized-security-disclaimer
    desc: Lawful authorized security-use disclaimer
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?is)lawful.{0,80}authorized.{0,500}(penetration testing|security research|defense)'
  - id: lawful-authorized-education-disclaimer
    desc: Lawful authorized education disclaimer
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?is)lawful.{0,80}authorized.{0,500}education'

composite_rules:
  - id: defensive-use-disclaimer
    desc: Authorized defensive use disclaimer
    crit: notable
    conf: 0.99
    any:
      - id: authorized-lawful-security-disclaimer
      - id: authorized-lawful-education-disclaimer
      - id: lawful-authorized-security-disclaimer
      - id: lawful-authorized-education-disclaimer
  - id: defensive-cybersecurity-skills-repository
    desc: Recognized defensive cybersecurity skills repository context
    crit: exception
    conf: 0.99
    scope: outer
    for: [scripts, source, markdown, text, json, archives, python, shell, batch, powershell]
    all:
      - id: repository-member-path
      - id: defensive-use-disclaimer
