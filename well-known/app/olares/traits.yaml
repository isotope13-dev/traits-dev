defaults:
  platforms: [unix, windows]
  for: [source, scripts, documents, manifests, data, archives]
  size_max: 52428800
traits:
  - id: cli-source-tree
    desc: Olares CLI source tree
    crit: baseline
    conf: 0.99
    if:
      type: path
      substr: olares/cli@
  - id: cli-source-archive
    desc: Olares CLI source archive
    crit: baseline
    conf: 0.99
    for: [zip]
    if:
      type: path
      basename: true
      substr: github.com-beclab-olares-cli

composite_rules:
  - id: olares-cli-identity
    desc: Olares CLI source distribution
    crit: notable
    conf: 0.99
    any:
      - id: cli-source-tree
      - id: cli-source-archive
