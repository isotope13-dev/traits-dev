defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: brave-update-sideload-candidate
    desc: Identifies BraveUpdate.exe, a known benign binary often used in DLL side-loading attacks
    crit: notable
    conf: 0.95
    attack: T1574.002
    size_min: 290000
    size_max: 300000
    all:
      - id: metadata/signed/leaf::brave-software-inc.
      - id: brave-crash-handler-pdb
      - id: brave-update-filename

traits:
  - id: brave-crash-handler-pdb
    desc: PDB path for Brave Crash Handler
    crit: component
    conf: 1.0
    size_min: 290000
    size_max: 300000
    if:
      type: text
      substr: "BraveCrashHandler_unsigned.pdb"
  - id: brave-update-filename
    desc: Original filename is BraveUpdate.exe
    crit: component
    conf: 1.0
    size_min: 290000
    size_max: 300000
    if:
      type: kv
      path: pe.version_info.original_filename
      exact: BraveUpdate.exe
