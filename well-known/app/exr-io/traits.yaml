defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.98
  size_min: 100000
  size_max: 200000000

traits:
  - id: exr-io-installer-path
    desc: Exr-IO installer path
    if:
      type: path
      regex: '(?i)Exr-IO'
  - id: exr-io-pdb-path
    desc: Exr-IO plugin PDB path
    if:
      type: text
      substr: plugins_adobe
      section: .rdata

composite_rules:
  - id: exr-io-installer
    desc: Exr-IO installer package
    crit: notable
    conf: 0.98
    any:
      - id: exr-io-installer-path
      - id: exr-io-pdb-path
