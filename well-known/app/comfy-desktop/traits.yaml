defaults:
  platforms: [unix, windows]
traits:
- id: comfy-desktop-package-name
  desc: Comfy Desktop npm package identity
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: name
    exact: comfyui-desktop-2
- id: comfy-desktop-project-repository
  desc: Comfy Desktop upstream repository identity
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: repository
    substr: Comfy-Org/Comfy-Desktop
- id: comfy-reset-mac-path
  desc: Reset script path
  crit: notable
  conf: 0.99
  for: [shell]
  if:
    type: path
    basename: true
    exact: reset-mac.sh
- id: comfy-bootstrap-fetch-path
  desc: Bootstrap fetch script path
  crit: notable
  conf: 0.99
  for: [javascript]
  if:
    type: path
    basename: true
    exact: fetch-bootstrap-python.mjs
- id: comfy-file-lock-path
  desc: File-lock helper path
  crit: notable
  conf: 0.99
  for: [typescript]
  if:
    type: path
    basename: true
    exact: file-lock-info.ts
- id: comfy-pii-scrub-test-path
  desc: PII scrub test path
  crit: notable
  conf: 0.99
  for: [typescript]
  if:
    type: path
    basename: true
    exact: piiScrub.test.ts
- id: comfy-content-script-test-path
  desc: Content script test path
  crit: notable
  conf: 0.99
  for: [typescript]
  if:
    type: path
    basename: true
    exact: comfyContentScript.test.ts
- id: comfy-firebase-test-path
  desc: Firebase test path
  crit: notable
  conf: 0.99
  for: [typescript]
  if:
    type: path
    basename: true
    exact: server.test.ts
- id: comfy-firebase-oauth-path
  desc: Firebase OAuth path
  crit: notable
  conf: 0.99
  for: [typescript]
  if:
    type: path
    basename: true
    exact: oauth.ts
