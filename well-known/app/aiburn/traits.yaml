defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.99
  size_min: 1000000
  size_max: 5000000

traits:
  - id: aiburn-product-name
    desc: AI Burn optical-media utility product identity
    if:
      type: value
      path: pe.version.product_name
      exact: AIBurn
  - id: aiburn-company-name
    desc: Innostor Technology Corporation AI Burn identity
    if:
      type: value
      path: pe.version.company
      exact: Innostor technology corporation
  - id: aiburn-interface-marker
    desc: AI Burn optical-media interface marker
    if:
      type: text
      regex: '(?i)AI-Burn|Burn Image|AIBURNUI'
      section: .rsrc

composite_rules:
  - id: aiburn-application
    desc: Innostor AI Burn optical-media application
    crit: notable
    conf: 0.99
    all:
      - id: aiburn-product-name
      - id: aiburn-company-name
