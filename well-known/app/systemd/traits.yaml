# systemd — Linux init/service manager. Legitimate systemd-* helper binary
# basenames (systemd-journald, systemd-logind, ...). Used as a false-positive
# exclusion for system-service masquerade composites.
defaults:
  platforms: [unix]
  for: [elf]
  size_min: 1
  size_max: 104857600
traits:
  - id: legitimate-systemd-helper-basename
    desc: Legitimate systemd-* helper basename
    crit: component
    conf: 1.0
    if:
      type: path
      basename: true
      regex: '^systemd-[a-z0-9-]+$'

  - id: systemd-container-helper-basename-a
    desc: systemd container helper basename
    crit: component
    conf: 1.0
    for: [elf, so]
    if:
      type: path
      basename: true
      regex: '^systemd-(nspawn|vmspawn)$'
  - id: systemd-container-helper-basename-b
    desc: systemd machine helper basename
    crit: component
    conf: 1.0
    for: [elf, so]
    if:
      type: path
      basename: true
      regex: '^systemd-(machined|importd)$'
  - id: systemd-container-helper-basename-c
    desc: systemd portable helper basename
    crit: component
    conf: 1.0
    for: [elf, so]
    if:
      type: path
      basename: true
      regex: '^systemd-(portabled|pull)$'
  - id: systemd-container-helper-basename-d
    desc: systemd image helper basename
    crit: component
    conf: 1.0
    for: [elf, so]
    if:
      type: path
      basename: true
      regex: '^systemd-(dissect|import)$'
  - id: systemd-container-helper-basename-e
    desc: systemd export helper basename
    crit: component
    conf: 1.0
    for: [elf, so]
    if:
      type: path
      basename: true
      regex: '^systemd-(export|import-fs)$'
  - id: systemd-nss-mymachines-basename
    desc: systemd nss mymachines basename
    crit: component
    conf: 1.0
    for: [elf, so]
    if:
      type: path
      basename: true
      regex: '^libnss_mymachines\.so'

composite_rules:
  - id: container-runtime-component-basename
    desc: systemd container runtime component basename
    crit: component
    conf: 1.0
    any:
      - id: systemd-container-helper-basename-a
      - id: systemd-container-helper-basename-b
      - id: systemd-container-helper-basename-c
      - id: systemd-container-helper-basename-d
      - id: systemd-container-helper-basename-e
      - id: systemd-nss-mymachines-basename
