defaults:
  platforms: [windows, unix]
  for: [python, manifests]
  crit: component
  conf: 0.96

traits:
  - id: pypi-name
    desc: Doover package name
    if:
      type: text
      substr: "Name: doover"

  - id: homepage
    desc: Doover project homepage
    if:
      type: text
      substr: "Project-URL: Homepage, https://doover.com"

  - id: api-base-url
    desc: Doover API base URL
    if:
      type: text
      substr: "https://api.doover.com"

  - id: data-base-url
    desc: Doover data API URL
    if:
      type: text
      substr: "https://data.doover.com/api"

  - id: auth-base-url
    desc: Doover auth API URL
    if:
      type: text
      substr: "https://auth.doover.com"

composite_rules:
  - id: package-context
    desc: Doover package context
    crit: baseline
    conf: 0.99
    all:
      - id: pypi-name
      - id: homepage

  - id: api-client-context
    desc: Doover API client context
    crit: baseline
    conf: 0.97
    needs: 2
    any:
      - id: api-base-url
      - id: data-base-url
      - id: auth-base-url
