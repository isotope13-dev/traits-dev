defaults:
  platforms: [linux, macos, windows]
  crit: component
  conf: 0.96

traits:
  - id: extension-main-js-marker
    desc: MCU-AI-Debug extension MCP documentation generator
    for: [javascript]
    size_min: 100000
    size_max: 2000000
    if:
      type: text
      substr: "MCU-Debug MCP Tool Reference"

  - id: extension-mcp-port-file
    desc: MCU-AI-Debug MCP port file path
    for: [javascript]
    size_min: 100000
    size_max: 2000000
    if:
      type: text
      substr: ".vscode/mcu-debug-mcp-port.json"

  - id: helper-basename
    desc: MCU-AI-Debug helper executable basename
    for: [elf, macho, pe]
    size_min: 1000000
    size_max: 8000000
    if:
      type: basename
      regex: '^mcu-debug-helper(\.exe)?$'
      case_insensitive: true

  - id: helper-proxy-role-elf
    desc: MCU-AI-Debug helper proxy role text in ELF
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 8000000
    if:
      type: raw
      section: .rodata
      substr: "Probe Agent"

  - id: helper-proxy-role-macho
    desc: MCU-AI-Debug helper cstring section
    platforms: [unix]
    for: [macho]
    size_min: 1000000
    size_max: 8000000
    if:
      type: section
      exact: __TEXT,__cstring
      length_min: 30000

  - id: helper-proxy-role-pe
    desc: MCU-AI-Debug helper proxy role text in PE
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 8000000
    if:
      type: raw
      section: .rdata
      substr: "Probe Agent"

  - id: helper-da-role-elf
    desc: MCU-AI-Debug helper adapter text in ELF
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 8000000
    if:
      type: raw
      section: .rodata
      substr: "Debug Adapter helper"

  - id: helper-da-role-macho
    desc: MCU-AI-Debug helper const section
    platforms: [unix]
    for: [macho]
    size_min: 1000000
    size_max: 8000000
    if:
      type: section
      exact: __TEXT,__const
      length_min: 300000

  - id: helper-da-role-pe
    desc: MCU-AI-Debug helper adapter text in PE
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 8000000
    if:
      type: raw
      section: .rdata
      substr: "Debug Adapter helper"

composite_rules:
  - id: extension-main-js
    desc: MCU-AI-Debug extension main bundle
    for: [javascript]
    all:
      - id: extension-main-js-marker
      - id: extension-mcp-port-file

  - id: helper-binary
    desc: MCU-AI-Debug helper binary
    for: [elf, macho, pe]
    all:
      - id: helper-basename
    any:
      - id: helper-proxy-role-elf
      - id: helper-proxy-role-macho
      - id: helper-proxy-role-pe
      - id: helper-da-role-elf
      - id: helper-da-role-macho
      - id: helper-da-role-pe
