defaults:
  platforms:
  - linux
  - macos
  - windows
  crit: component
  conf: 0.96
  size_max: 5000000
traits:
- id: extension-main-js-marker
  desc: MCU-AI-Debug MCP doc generator
  for:
  - javascript
  size_min: 100000
  size_max: 2000000
  if:
    type: text
    substr: MCU-Debug MCP Tool Reference
- id: extension-mcp-port-file
  desc: MCU-AI-Debug MCP port file path
  for:
  - javascript
  size_min: 100000
  size_max: 2000000
  if:
    type: text
    substr: ".vscode/mcu-debug-mcp-port.json"
- id: helper-basename
  desc: MCU-AI-Debug helper executable basename
  for:
  - elf
  - macho
  - pe
  size_min: 1000000
  size_max: 8000000
  if:
    type: path
    basename: true
    regex: "^mcu-debug-helper(\\.exe)?$"
    case_insensitive: true
- id: helper-proxy-role-elf
  desc: MCU-AI-Debug helper proxy role text in ELF
  platforms:
  - linux
  for:
  - elf
  size_min: 1000000
  size_max: 8000000
  if:
    type: text
    section: ".rodata"
    substr: Probe Agent
- id: helper-proxy-role-pe
  desc: MCU-AI-Debug helper proxy role text in PE
  platforms:
  - windows
  for:
  - pe
  size_min: 1000000
  size_max: 8000000
  if:
    type: text
    section: ".rdata"
    substr: Probe Agent
- id: helper-da-role-elf
  desc: MCU-AI-Debug helper adapter text in ELF
  platforms:
  - linux
  for:
  - elf
  size_min: 1000000
  size_max: 8000000
  if:
    type: text
    section: ".rodata"
    substr: Debug Adapter helper
- id: helper-da-role-pe
  desc: MCU-AI-Debug helper adapter text in PE
  platforms:
  - windows
  for:
  - pe
  size_min: 1000000
  size_max: 8000000
  if:
    type: text
    section: ".rdata"
    substr: Debug Adapter helper
composite_rules:
- id: extension-main-js
  desc: MCU-AI-Debug extension main bundle
  crit: notable
  for:
  - javascript
  all:
  - id: extension-main-js-marker
  - id: extension-mcp-port-file
- id: helper-binary
  desc: MCU-AI-Debug helper binary
  for:
  - elf
  - macho
  - pe
  all:
  - id: helper-basename
  any:
  - id: helper-proxy-role-elf
  - id: metadata/binary/section/metrics::macho-large-cstring-section
  - id: helper-proxy-role-pe
  - id: helper-da-role-elf
  - id: metadata/binary/section/metrics::macho-large-const-section
  - id: helper-da-role-pe
