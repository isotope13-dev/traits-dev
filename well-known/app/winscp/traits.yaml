defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.95
  size_min: 10000000
  size_max: 50000000
traits:
  - id: exe-basename
    desc: WinSCP executable filename
    if:
      type: path
      basename: true
      exact: WinSCP.exe
      case_insensitive: true
  - id: product-string
    desc: WinSCP product string
    if:
      type: text
      word: WinSCP
      section: .rsrc
composite_rules:
  - id: app
    desc: WinSCP file transfer client
    crit: notable
    conf: 0.98
    all:
      - id: exe-basename
      - id: product-string
