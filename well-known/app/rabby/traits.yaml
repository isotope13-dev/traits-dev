defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: rabby-webpack-bundle
    desc: Rabby Wallet webpack bundle
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: webpackChunkrabby

  - id: rabby-chrome-store-link
    desc: Rabby Wallet official store link
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: chromewebstore.google.com/detail/rabby-wallet/acmacodkjbdgmoleebolmdjonilkdbch

  - id: rabby-ui-store-links
    desc: Rabby Wallet UI store and review links
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'chromeStoreUrl:[^,]{0,220},chromeStoreReviewsUrl:'

composite_rules:
  - id: rabby-wallet-extension-context
    desc: Rabby Wallet bundle with official store identity
    crit: exception
    conf: 0.99
    all:
      - id: rabby-chrome-store-link
      - id: rabby-ui-store-links
