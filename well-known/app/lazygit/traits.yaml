defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  crit: notable
  conf: 0.96
  size_min: 1048576
  size_max: 104857600

traits:
  - id: lazygit-binary-name
    desc: lazygit binary name
    ref: sha256:94deade3381a89b73d0946de7d5e229cdcdd0ff16173daced43c659f7b02c2db
    if:
      type: basename
      exact: lazygit

  - id: lazygit-go-module
    desc: lazygit Go module path
    ref: sha256:94deade3381a89b73d0946de7d5e229cdcdd0ff16173daced43c659f7b02c2db
    if:
      type: symbol
      regex: github\.com_jesseduffield_lazygit_

composite_rules:
  - id: lazygit-app-binary
    desc: lazygit application binary
    ref: sha256:94deade3381a89b73d0946de7d5e229cdcdd0ff16173daced43c659f7b02c2db
    all:
      - id: lazygit-binary-name
      - id: lazygit-go-module
