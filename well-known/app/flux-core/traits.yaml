defaults:
  platforms: [unix]
  for: [whl, python]
  crit: notable
  conf: 0.99

traits:
  - id: flux-core-package-name
    desc: Flux distributed workflow orchestration package
    for: [whl]
    if:
      type: value
      path: 'whl.distribution'
      exact: flux_core

  - id: flux-core-worker-routes-module
    desc: Flux worker API routes module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)flux/api/worker_routes\.py$'

  - id: flux-core-workflow-summary
    desc: Flux distributed workflow orchestration summary
    for: [whl]
    if:
      type: text
      regex: '(?i)distributed workflow orchestration engine.{0,120}(stateful|fault-tolerant|workflow)'

composite_rules:
  - id: flux-core-package
    desc: Flux distributed workflow orchestration distribution
    crit: notable
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: flux-core-package-name
    any:
      - id: flux-core-worker-routes-module
      - id: flux-core-workflow-summary
    needs: 1
