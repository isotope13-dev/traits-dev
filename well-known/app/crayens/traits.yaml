defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.95
  size_min: 512
  size_max: 524288000

traits:
  - id: crayens-product-string
    desc: Crayens product string
    if:
      type: text
      exact: Crayens
      section: .rsrc
  - id: crayens-application-namespace
    desc: Crayens application namespace
    if:
      type: text
      exact: CrayensApplication
      section: .rsrc
  - id: crayens-installer-name
    desc: Crayens installer name
    if:
      type: text
      exact: Crayens Installer
      section: .rsrc
  - id: kids-painter-pdb
    desc: KidsPainter build path
    if:
      type: text
      substr: KidsPainterII_Iterational
      section: .rdata
  - id: crayens-product-versioninfo
    desc: Crayens ProductName version info
    if:
      type: value
      path: pe.version.product_name
      regex: '^Crayens( Installer)?$'
  - id: crayens-description-versioninfo
    desc: Crayens FileDescription version info
    if:
      type: value
      path: pe.version.description
      regex: '^Crayens( Installer)?$'

composite_rules:
  - id: crayens-installer
    desc: Crayens KidsPainter installer
    conf: 0.98
    needs: 2
    any:
      - id: well-known/app/crayens::crayens-application-namespace
      - id: well-known/app/crayens::crayens-description-versioninfo
      - id: well-known/app/crayens::crayens-installer-name
      - id: well-known/app/crayens::crayens-product-string
      - id: well-known/app/crayens::crayens-product-versioninfo
      - id: well-known/app/crayens::kids-painter-pdb
      - id: metadata/signed/leaf::crayens
      - id: metadata/signed/platform::crayens
