defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: component
  conf: 0.96

traits:
  - id: rundeck-legacy-package-manager-path
    desc: Rundeck legacy package-manager manifest path
    if:
      type: path
      regex: '_package-manager/package\.json$'
  - id: rundeck-legacy-package-manager-name
    desc: Rundeck legacy package-manager package name
    if:
      type: value
      path: name
      exact: rundeck-legacy-package-manager

composite_rules:
  - id: rundeck-legacy-package-manager-manifest
    desc: Rundeck legacy package-manager manifest
    crit: notable
    conf: 0.98
    all:
      - id: rundeck-legacy-package-manager-path
      - id: rundeck-legacy-package-manager-name
