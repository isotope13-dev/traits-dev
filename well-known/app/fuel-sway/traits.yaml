defaults:
  platforms: [linux, macos, windows]
  for: [binaries, elf, macho, pe, shell, tar]
  crit: baseline
  conf: 0.95
  size_max: 1073741824

traits:
  - id: release-path
    for: [elf, macho, pe, rust]
    desc: Fuel Sway release package
    if:
      type: path
      regex: 'FuelLabs-sway|forc-binaries|[\\/]forc(-[a-z]+)?$'
