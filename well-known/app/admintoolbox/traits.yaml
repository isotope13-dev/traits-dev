defaults:
  platforms: [windows]
  for: [powershell, nupkg]
  crit: notable
  conf: 0.99

traits:
  - id: endpoint-management-package
    desc: AdminToolbox EndpointManagement package identity
    if:
      type: value
      path: nupkg.id
      exact: AdminToolbox.EndpointManagement

  - id: endpoint-management-member-path
    desc: AdminToolbox EndpointManagement member path
    if:
      type: path
      substr: AdminToolbox.EndpointManagement

  - id: endpoint-management-source-repository
    desc: AdminToolbox source repository URL
    if:
      type: text
      substr: github.com/TheTaylorLee/AdminToolbox

  - id: endpoint-management-elevation-helper
    desc: AdminToolbox elevation helper reference
    if:
      type: text
      substr: Get-Elevation

composite_rules:
  - id: endpoint-management-benign-context
    desc: AdminToolbox EndpointManagement administration context
    crit: exception
    conf: 0.99
    all:
      - id: endpoint-management-source-repository
      - id: endpoint-management-elevation-helper
