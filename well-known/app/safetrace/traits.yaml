defaults:
  platforms: [unix, windows]
  for: [chrome-manifest, crx, archives, javascript]
  crit: notable
  conf: 0.99

traits:
  - id: safetrace-extension-name
    desc: SafeTrace Shadow AI extension name
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: SafeTrace - Shadow AI
  - id: safetrace-policy-api
    desc: SafeTrace policy API endpoint
    for: [javascript]
    if:
      type: text
      substr: https://api.safetrace.ai
  - id: safetrace-pii-mask-api
    desc: SafeTrace PII masking API endpoint
    for: [javascript]
    if:
      type: text
      substr: https://api.pii-mask.com/api/v1/anonymize

composite_rules:
  - id: safetrace-extension-context
    desc: SafeTrace DLP extension context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: safetrace-extension-name
      - id: safetrace-policy-api
      - id: safetrace-pii-mask-api
