defaults:
  platforms: [windows, unix]
  crit: component
  conf: 0.95

traits:
  - id: archive-root
    desc: KeePassXC archive root
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^KeePassXC-[0-9][^/]*Win64/'

  - id: portable-marker
    desc: KeePassXC portable marker
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^KeePassXC-[^/]+/\.portable$'

  - id: main-executable
    desc: KeePassXC main executable
    for: [pe]
    size_min: 4000000
    size_max: 8000000
    if:
      type: path
      basename: true
      exact: KeePassXC.exe
      case_insensitive: true

  - id: cli-executable
    desc: KeePassXC CLI executable
    for: [pe]
    size_min: 4000000
    size_max: 8000000
    if:
      type: path
      basename: true
      exact: keepassxc-cli.exe
      case_insensitive: true

  - id: proxy-executable
    desc: KeePassXC browser proxy executable
    for: [pe]
    size_min: 10000
    size_max: 200000
    if:
      type: path
      basename: true
      exact: keepassxc-proxy.exe
      case_insensitive: true

  - id: autotype-library
    desc: KeePassXC autotype library
    for: [dll]
    size_min: 4000000
    size_max: 8000000
    if:
      type: path
      basename: true
      exact: keepassxc-autotype-windows.dll
      case_insensitive: true

  - id: droidmonkey-signer
    desc: KeePassXC DroidMonkey signer
    for: [pe, dll]
    size_min: 10000
    size_max: 10000000
    if:
      type: value
      path: pe.signatures[0].subject
      regex: 'DroidMonkey Apps'

composite_rules:
  - id: archive-context
    desc: KeePassXC portable archive
    crit: baseline
    conf: 0.98
    all:
      - id: archive-root
    any:
      - id: portable-marker

  - id: binary-context
    desc: KeePassXC signed binary
    crit: baseline
    conf: 0.96
    all:
      - id: droidmonkey-signer
    any:
      - id: main-executable
      - id: cli-executable
      - id: proxy-executable
      - id: autotype-library
