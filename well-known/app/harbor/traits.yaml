# Harbor is a framework for evaluating AI agents in sandboxed environments.
# Its browser flags and container execution helpers are expected test-harness
# behavior, but ordinary capabilities remain useful to analysts.
defaults:
  platforms: [unix, windows]
  for: [whl, pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Harbor Python package name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: harbor

  - id: source-tree
    desc: Harbor Python source tree
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])harbor([\\/]|$)'

  - id: computer-runtime-marker
    desc: Harbor computer-environment runtime marker
    for: [python]
    if:
      type: text
      substr: Computer1Session

  - id: framework-summary
    desc: Harbor agent-evaluation framework summary
    for: [pkginfo]
    if:
      type: text
      substr: A framework for evaluating and optimizing agents and models

composite_rules:
  - id: package-identity
    desc: Harbor agent-evaluation framework identity
    crit: notable
    conf: 0.99
    scope: outer
    all:
      - id: package-name
      - id: framework-summary

  - id: harbor-framework-context
    desc: Harbor browser automation framework context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: source-tree
      - id: computer-runtime-marker
