# Quantomate by Sudvid Automate is a user-facing AI browser automation
# extension. Its debugger/CDP bridge, broad host access, and Puppeteer
# webdriver compatibility code are expected parts of that feature.
defaults:
  platforms: [unix, windows]
  for: [javascript, json, chrome-manifest, crx, archives]

traits:
  - id: product-name
    desc: Quantomate browser automation product name
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?i)\bQuantomate\b'

  - id: vendor-brand
    desc: Sudvid Automate product brand or service domain
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: sudvid

  - id: ai-service-endpoint
    desc: Quantomate AI service endpoint
    crit: notable
    conf: 0.98
    if:
      type: literal
      exact: https://text.pollinations.ai/openai

composite_rules:
  - id: quantomate-browser-extension-context
    desc: Recognized Quantomate by Sudvid Automate browser-agent extension
    crit: exception
    conf: 0.99
    for: [javascript, chrome-manifest, crx, archives]
    all:
      - id: product-name
      - id: vendor-brand

  - id: quantomate-cdp-runtime-context
    desc: Quantomate AI endpoint bundled with its Chrome debugger runtime
    crit: exception
    conf: 0.98
    for: [javascript, crx, archives]
    all:
      - id: ai-service-endpoint
      - id: micro-behaviors/process/attach/webextension::chrome-debugger-api
