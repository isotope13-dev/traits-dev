defaults:
  for: [binaries]
  platforms: [windows]
  size_min: 1024
  size_max: 524288000

traits:
  - id: cvte-crashrpt-upload-endpoint
    desc: "CVTE CrashRpt corporate upload endpoint"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "myou.cvte.com/api/v1/crashdumps/collect/more"
      section: ".rdata"

  - id: cvte-crashrpt-company-name
    desc: "CVTE CrashRpt CompanyName field"
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: "pe.version.company"
      exact: "Guangzhou Shirui Electronics"

  - id: cvte-crashrpt-original-filename
    desc: "CVTE CrashRpt OriginalFilename field"
    crit: baseline
    conf: 0.99
    if:
      type: value
      path: "pe.version.original_filename"
      exact: "CrashRpt.exe"

  - id: cvte-crashrpt-pdb-path
    desc: "CVTE CrashRpt PDB path"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "D:\\CrashSolution\\build\\v140\\CrashRpt.pdb"
      section: ".rdata"

  - id: cvte-crashrpt-log-path
    desc: "CrashRpt diagnostic log path"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "\\CrashRpt.log"

  - id: cvte-crashrpt-generate-dump-success
    desc: "CrashRpt dump completion string"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "GenerateDump Success!"

composite_rules:
  - id: cvte-crashrpt-versioninfo
    desc: "CVTE CrashRpt VERSIONINFO fields"
    crit: baseline
    conf: 0.99
    all:
      - id: cvte-crashrpt-company-name
    any:
      - id: cvte-crashrpt-original-filename

  - id: cvte-crashrpt-strong-pin
    desc: "CVTE CrashRpt Breakpad uploader build"
    crit: baseline
    conf: 0.995
    all:
      - id: cvte-crashrpt-versioninfo
      - id: cvte-crashrpt-upload-endpoint
      - id: metadata/library/breakpad::crashreportsender

  - id: cvte-crashrpt-minidump-runtime
    desc: "CVTE CrashRpt sibling-process minidump flow"
    crit: baseline
    conf: 0.995
    all:
      - id: micro-behaviors/fs/file/pe-inspect::dbghelp-dll-reference
      - id: objectives/credential-access/dump/process::minidump-write-dump
      - id: metadata/library/breakpad::crash-context-string
      - id: metadata/library/breakpad::dump-file-string
    any:
      - id: cvte-crashrpt-log-path
      - id: cvte-crashrpt-generate-dump-success
