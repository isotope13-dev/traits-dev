defaults:
  for: [pe]
  platforms: [windows]
  size_min: 10000
  size_max: 5000000
traits:
  - id: cvte-crashrpt-upload-endpoint
    desc: CVTE CrashRpt corporate upload endpoint
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .data
      substr: "myou.cvte.com/api/v1/crashdumps/collect/more"

  - id: cvte-crashrpt-company-name
    desc: CVTE CrashRpt CompanyName field
    crit: baseline
    conf: 0.99
    if:
      type: kv
      path: pe.version_info.company_name
      exact: "Guangzhou Shirui Electronics"

  - id: cvte-crashrpt-original-filename
    desc: CVTE CrashRpt OriginalFilename field
    crit: baseline
    conf: 0.99
    if:
      type: kv
      path: pe.version_info.original_filename
      exact: "CrashRpt.exe"

  - id: google-breakpad-crashreportsender-symbol
    desc: Google Breakpad CrashReportSender C++ symbol
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .rdata
      substr: "google_breakpad::CrashReportSender::SendCrashReport"

  - id: google-breakpad-crashreportsender-file
    desc: Google Breakpad CrashReportSender source file
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .rdata
      substr: "crash_report_sender.cc"

  - id: cvte-crashrpt-pdb-path
    desc: CVTE CrashRpt PDB path
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .rdata
      substr: "D:\\CrashSolution\\build\\v140\\CrashRpt.pdb"

  - id: cvte-crashrpt-resource-about
    desc: CVTE CrashRpt resource table strings
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .rsrc
      substr: "About CrashRpt"

  - id: cvte-crashrpt-resource-version
    desc: CVTE CrashRpt resource table strings
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .rsrc
      substr: "CrashRpt, Version 1.0"

  - id: cvte-crashrpt-resource-bcrashrpt
    desc: CVTE CrashRpt resource table strings
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .rsrc
      substr: "\\bCrashRpt"

  - id: cvte-crashrpt-resource-bcrashrpt-upper
    desc: CVTE CrashRpt resource table strings
    crit: baseline
    conf: 0.99
    if:
      type: text
      section: .rsrc
      substr: "\\bCRASHRPT"

composite_rules:
  - id: cvte-crashrpt-versioninfo
    desc: CVTE CrashRpt VERSIONINFO fields
    crit: baseline
    conf: 0.99
    all:
      - id: cvte-crashrpt-company-name
    any:
      - id: cvte-crashrpt-original-filename

  - id: google-breakpad-crashreportsender
    desc: Google Breakpad CrashReportSender C++ symbol
    crit: baseline
    conf: 0.99
    all:
      - id: google-breakpad-crashreportsender-symbol
      - id: google-breakpad-crashreportsender-file

  - id: cvte-crashrpt-resource-pin
    desc: CVTE CrashRpt resource table strings
    crit: baseline
    conf: 0.99
    all:
      - id: cvte-crashrpt-resource-about
      - id: cvte-crashrpt-resource-version
      - id: cvte-crashrpt-resource-bcrashrpt
      - id: cvte-crashrpt-resource-bcrashrpt-upper