defaults:
  for: [binaries]
  platforms: [windows]
  size_min: 1024
  size_max: 524288000

traits:
  - id: cvte-crashrpt-upload-endpoint
    desc: "CVTE CrashRpt corporate upload endpoint"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "myou.cvte.com/api/v1/crashdumps/collect/more"
      section: ".rdata"

  - id: cvte-crashrpt-company-name
    desc: "CVTE CrashRpt CompanyName field"
    crit: baseline
    conf: 0.99
    if:
      type: kv
      path: "pe.version_info.company_name"
      exact: "Guangzhou Shirui Electronics"

  - id: cvte-crashrpt-original-filename
    desc: "CVTE CrashRpt OriginalFilename field"
    crit: baseline
    conf: 0.99
    if:
      type: kv
      path: "pe.version_info.original_filename"
      exact: "CrashRpt.exe"

  - id: google-breakpad-crashreportsender-symbol
    desc: "Google Breakpad CrashReportSender C++ symbol"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "google_breakpad::CrashReportSender::SendCrashReport"
      section: ".rdata"

  - id: google-breakpad-crashreportsender-file
    desc: "Google Breakpad CrashReportSender source file"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "crash_report_sender.cc"
      section: ".rdata"

  - id: cvte-crashrpt-pdb-path
    desc: "CVTE CrashRpt PDB path"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "D:\\CrashSolution\\build\\v140\\CrashRpt.pdb"
      section: ".rdata"

  - id: cvte-crashrpt-dbghelp-name
    desc: "CrashRpt dbghelp library reference"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "dbghelp.dll"

  - id: cvte-crashrpt-minidump-api
    desc: "CrashRpt MiniDumpWriteDump reference"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "MiniDumpWriteDump"

  - id: cvte-crashrpt-crash-context
    desc: "CrashRpt crash context handoff string"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "crash_context"

  - id: cvte-crashrpt-dump-file
    desc: "CrashRpt dump file handoff string"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "dump_file"

  - id: cvte-crashrpt-log-path
    desc: "CrashRpt diagnostic log path"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "\\CrashRpt.log"

  - id: cvte-crashrpt-generate-dump-success
    desc: "CrashRpt dump completion string"
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: "GenerateDump Success!"

  - id: cvte-crashrpt-resource-about
    desc: "CVTE CrashRpt resource table strings"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "About CrashRpt"
      section: ".rsrc"

  - id: cvte-crashrpt-resource-version
    desc: "CVTE CrashRpt resource table strings"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "CrashRpt, Version 1.0"
      section: ".rsrc"

  - id: cvte-crashrpt-resource-bcrashrpt
    desc: "CVTE CrashRpt resource table strings"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "\\bCrashRpt"
      section: ".rsrc"

  - id: cvte-crashrpt-resource-bcrashrpt-upper
    desc: "CVTE CrashRpt resource table strings"
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "\\bCRASHRPT"
      section: ".rsrc"

composite_rules:
  - id: cvte-crashrpt-versioninfo
    desc: "CVTE CrashRpt VERSIONINFO fields"
    crit: baseline
    conf: 0.99
    all:
      - id: cvte-crashrpt-company-name
    any:
      - id: cvte-crashrpt-original-filename

  - id: google-breakpad-crashreportsender
    desc: "Google Breakpad CrashReportSender C++ symbol"
    crit: baseline
    conf: 0.99
    all:
      - id: google-breakpad-crashreportsender-symbol
      - id: google-breakpad-crashreportsender-file

  - id: cvte-crashrpt-resource-pin
    desc: "CVTE CrashRpt resource table strings"
    crit: baseline
    conf: 0.99
    all:
      - id: cvte-crashrpt-resource-about
      - id: cvte-crashrpt-resource-version
      - id: cvte-crashrpt-resource-bcrashrpt
      - id: cvte-crashrpt-resource-bcrashrpt-upper

  - id: cvte-crashrpt-strong-pin
    desc: "CVTE CrashRpt Breakpad uploader build"
    crit: baseline
    conf: 0.995
    all:
      - id: cvte-crashrpt-versioninfo
      - id: cvte-crashrpt-upload-endpoint
      - id: google-breakpad-crashreportsender

  - id: cvte-crashrpt-minidump-runtime
    desc: "CVTE CrashRpt sibling-process minidump flow"
    crit: baseline
    conf: 0.995
    all:
      - id: cvte-crashrpt-dbghelp-name
      - id: cvte-crashrpt-minidump-api
      - id: cvte-crashrpt-crash-context
      - id: cvte-crashrpt-dump-file
    any:
      - id: cvte-crashrpt-log-path
      - id: cvte-crashrpt-generate-dump-success
