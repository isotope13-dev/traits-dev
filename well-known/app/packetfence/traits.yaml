defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.96
  size_max: 2147483648

traits:
  - id: source-tree-path
    desc: PacketFence source tree path
    for: [source, scripts, javascript, perl, php, go, plist, pe, archives]
    if:
      type: path
      regex: 'packetfence-[0-9][^\\/]*[\\/]'
  - id: packetfence-windows-agent-path
    desc: PacketFence Windows agent path
    for: [pe]
    if:
      type: path
      regex: 'packetfence-windows-agent\.exe$'
