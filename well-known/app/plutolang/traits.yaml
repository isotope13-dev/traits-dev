defaults:
  platforms: [windows]
  for: [pe]
  size_min: 100000
  size_max: 50000000

traits:
  - id: standard-library-string
    desc: Pluto standard library string
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rdata
      substr: "Pluto Standard Library"
  - id: github-issues-string
    desc: Pluto GitHub issues string
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rdata
      substr: "Report this at: https://github.com/PlutoLang/Pluto/issues"
  - id: pluto-use-keyword
    desc: Pluto use keyword
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rdata
      substr: "pluto_use"
  - id: ffi-library-string
    desc: Pluto FFI library string
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rdata
      substr: "pluto:ffi-library"
  - id: pluto-copyright-string
    desc: Pluto copyright string
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rdata
      substr: "Copyright (C) 2022-2025 PlutoLang.org"
  - id: pluto-compiler-name
    desc: Pluto compiler name
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rdata
      substr: "plutoc"

composite_rules:
  - id: runtime-compiler
    desc: Pluto language runtime/compiler
    crit: baseline
    conf: 0.95
    needs: 3
    any:
      - id: well-known/app/plutolang
