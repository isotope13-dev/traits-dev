defaults:
  platforms: [unix]
  for: [elf, macho]
  crit: baseline
  conf: 0.98
  size_min: 1000000
  size_max: 30000000

traits:
  - id: luau-lsp-vsix-member
    desc: Luau LSP VSIX member
    for: [javascript, macho, elf]
    size_min: 0
    size_max: 50000000
    if:
      type: path
      substr: JohnnyMorganz.luau-lsp
  - id: luau-lsp-server-basename
    desc: Luau LSP server basename
    if:
      type: basename
      exact: server
  - id: luau-lsp-language-server-symbol
    desc: Luau LSP language-server symbol
    if:
      type: symbol
      substr: Luau14LanguageServer

composite_rules:
  - id: luau-lsp-server-context
    desc: Luau LSP server binary context
    crit: notable
    conf: 0.99
    all:
      - id: luau-lsp-server-basename
      - id: luau-lsp-language-server-symbol
    any:
      - id: luau-lsp-vsix-member
      - id: luau-lsp-language-server-symbol
  - id: luau-lsp-vsix-context
    desc: Luau LSP VSIX package context
    crit: notable
    conf: 0.99
    any:
      - id: luau-lsp-vsix-member
      - id: luau-lsp-server-context
