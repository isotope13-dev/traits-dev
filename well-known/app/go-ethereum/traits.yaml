defaults:
  platforms: [unix, windows]
  for: [elf, pe, go]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: go-ethereum-module-path
    desc: go-ethereum module path
    if:
      type: text
      substr: github.com/ethereum/go-ethereum
  - id: go-ethereum-package-path
    desc: go-ethereum package path
    for: [elf, pe, apk]
    if:
      type: basename
      regex: '^(op-geth[^\\/]*\.apk|geth|devp2p|evm)$'

composite_rules:
  - id: go-ethereum-tool
    desc: go-ethereum command-line tool
    crit: notable
    conf: 0.99
    any:
      - id: go-ethereum-module-path
      - id: go-ethereum-package-path
