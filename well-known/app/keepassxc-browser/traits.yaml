defaults:
  platforms: [unix, windows]
  for: [chrome-manifest, javascript, crx, source]
  size_max: 52428800
  crit: notable
  conf: 0.99

traits:
  - id: source-extension
    desc: KeePassXC browser extension
    if:
      type: text
      regex: 'KeePassXC-Browser|org\.keepassxc\.keepassxc_browser'
