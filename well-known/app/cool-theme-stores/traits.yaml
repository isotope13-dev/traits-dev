defaults:
  platforms: [windows, unix]
  for: [javascript, html, chrome-manifest, crx]

traits:
  - id: vendor-host
    desc: CoolThemeStores extension vendor host
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: coolthemestores.com
      case_insensitive: true
  - id: valorant-wallpaper-name
    desc: Valorant Wallpaper extension name
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: Valorant Wallpaper
      case_insensitive: true

composite_rules:
  - id: valorant-wallpaper-extension
    desc: CoolThemeStores Valorant Wallpaper extension
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: vendor-host
      - id: valorant-wallpaper-name
