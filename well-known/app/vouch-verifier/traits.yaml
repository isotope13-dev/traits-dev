# Vouch Verifier is vlayer's browser extension for producing privacy-preserving
# web proofs from user-authorized, cookie-authenticated requests. Its request
# interception, page automation, and selective transcript/attachment upload
# resemble browser collection in isolation. Keep positive product context tied
# to both store identities, the exact manifest description, and the Vouch
# service host; generic capabilities remain notable for analyst review.
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.99

traits:
  - id: manifest-name
    desc: Vouch Verifier manifest name
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: Vouch Verifier

  - id: firefox-extension-id
    desc: Official Vouch Firefox extension ID
    for: [chrome-manifest]
    if:
      type: value
      path: browser_specific_settings.gecko.id
      exact: vouch_verifier@vlayer.xyz

  - id: manifest-description
    desc: Vouch Verifier privacy description
    for: [chrome-manifest]
    if:
      type: value
      path: description
      exact: Verify your data privately - no documents, no passwords shared.

  - id: chrome-extension-id
    desc: Known Vouch Chrome Web Store extension ID
    for: [javascript]
    if:
      type: string_literal
      exact: jbchhcgphfokabmfacnkafoeeeppjmpl

  - id: service-host
    desc: Vouch hosted verification service URL
    for: [javascript, typescript]
    if:
      type: text
      regex: 'https://app\.getvouch\.io\b'

  - id: prover-service-host
    desc: vlayer proof service URL
    for: [javascript, typescript]
    if:
      type: text
      regex: 'https://lotr-api\.vlayer\.vercel\.app\b'

  - id: proof-request-message
    desc: Vouch proof request message type
    for: [javascript, typescript]
    if:
      type: literal
      kind: string
      exact: RequestWebProof

composite_rules:
  - id: official-extension-context
    desc: Archive matches Vouch Verifier identities, proof protocol, and service hosts
    crit: exception
    conf: 0.99
    for: [javascript, chrome-manifest, xpi, crx, archives]
    scope: archive
    all:
      - id: manifest-name
      - id: firefox-extension-id
      - id: manifest-description
      - id: chrome-extension-id
      - id: service-host
      - id: prover-service-host
      - id: proof-request-message
