# Vouch is vlayer's browser extension for producing privacy-preserving web
# proofs from user-authorized, cookie-authenticated requests.  Its request
# interception and selective transcript upload resemble browser collection in
# isolation, so require its name and both store-specific extension IDs before
# supplying product context.
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.99

traits:
  - id: manifest-name
    desc: Vouch Verifier manifest name
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: Vouch Verifier

  - id: firefox-extension-id
    desc: Official Vouch Firefox extension ID
    for: [chrome-manifest]
    if:
      type: value
      path: browser_specific_settings.gecko.id
      exact: vouch_verifier@vlayer.xyz

  - id: chrome-extension-id
    desc: Official Vouch Chrome extension ID
    for: [javascript]
    if:
      type: string_literal
      exact: jbchhcgphfokabmfacnkafoeeeppjmpl

composite_rules:
  - id: official-extension-context
    desc: Recognized official Vouch extension context
    crit: notable
    conf: 0.99
    for: [javascript, chrome-manifest, xpi, crx, archives]
    scope: outer
    all:
      - id: manifest-name
      - id: firefox-extension-id
      - id: chrome-extension-id
