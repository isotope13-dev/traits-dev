defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: pearl-wallet-source-tree
    desc: Pearl desktop wallet source tree
    if:
      type: path
      substr: pearl-desktop-wallet

  - id: pearl-wallet-package-identity
    desc: Pearl desktop wallet package identity
    if:
      type: text
      substr: '@pearl/pearl-desktop-wallet'

composite_rules:
  - id: pearl-wallet-app-context
    desc: Pearl desktop wallet application context
    any:
      - id: pearl-wallet-source-tree
      - id: pearl-wallet-package-identity
