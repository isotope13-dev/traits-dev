defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]
  crit: component
  conf: 0.95

traits:
  - id: package-name
    desc: nitin-ai package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: nitin-ai

  - id: package-description
    desc: nitin-ai package description
    for: [package.json]
    if:
      type: value
      path: description
      substr: Autonomous AI software developer agent

  - id: cli-name
    desc: nitin CLI name
    for: [javascript, typescript]
    if:
      type: text
      substr: ".name('nitin')"

  - id: cli-description
    desc: NITIN AI CLI description
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: Autonomous AI Developer

  - id: global-env-path
    desc: nitin-ai global dotenv path
    for: [javascript, typescript]
    if:
      type: text
      regex: "\\.nitin-ai.{0,40}\\.env"

  - id: project-config-path
    desc: nitin project config path
    for: [javascript, typescript]
    if:
      type: text
      substr: ".nitin/config.json"

  - id: llm-router
    desc: nitin Gemini Groq router
    for: [javascript, typescript]
    if:
      type: text
      substr: "Smart LLM router: Gemini primary, Groq fallback"

  - id: tool-registry
    desc: nitin tool registry
    for: [javascript, typescript]
    if:
      type: text
      substr: "Central tool registry and dispatch layer"

composite_rules:
  - id: package-context
    desc: nitin-ai package context
    crit: component
    conf: 0.98
    all:
      - id: package-name
    any:
      - id: package-description

  - id: runtime-context
    desc: nitin-ai runtime context
    crit: component
    conf: 0.96
    any:
      - id: package-context
      - id: cli-name
      - id: cli-description
      - id: global-env-path
      - id: project-config-path
      - id: llm-router
      - id: tool-registry
      - id: micro-behaviors/process/create/shell/guard::command-filter-blocklist
