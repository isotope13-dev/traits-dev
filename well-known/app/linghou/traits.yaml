# Linghou (灵猴) by loock.vip is a user-facing AI browser-automation extension
# ("AI浏览器"). Its chrome.debugger / CDP bridge, WebSocket transport to its own
# first-party backend (wss://linghou.loock.vip/ws), visible-tab screenshots, and
# native-messaging host are the expected mechanics of that automation feature —
# the same shape as any AI browser agent. Identity is anchored on its self-owned
# first-party domain plus product brand (both must be present) so that unrelated
# or attacker browser automation is NOT suppressed.
defaults:
  platforms: [unix, windows]
  for: [javascript, json, chrome-manifest, crx, archives]

traits:
  - id: product-name
    desc: Linghou AI browser automation product name
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '灵猴|\bLinghou\b'

  - id: official-integration-domain
    desc: Linghou self-owned first-party backend host
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: linghou.loock.vip

composite_rules:
  - id: linghou-browser-extension-context
    desc: Recognized Linghou (灵猴) AI browser-agent extension
    crit: exception
    conf: 0.99
    scope: outer
    for: [javascript, chrome-manifest, crx, archives]
    all:
      - id: product-name
      - id: official-integration-domain
