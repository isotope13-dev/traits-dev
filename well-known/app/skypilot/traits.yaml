defaults:
  platforms: [linux, macos, windows]
  for: [python, shell, javascript, whl]
traits:
  - id: python-module-path
    desc: SkyPilot Python module path
    crit: component
    conf: 0.9
    for: [python, shell, javascript]
    if:
      type: path
      regex: '(^|[\\/])sky[\\/]'
  - id: skypilot-name-marker
    desc: SkyPilot name marker
    crit: component
    conf: 0.9
    if:
      type: text
      word: SkyPilot
  - id: skypilot-lowercase-name-marker
    desc: SkyPilot lowercase name marker
    crit: component
    conf: 0.9
    if:
      type: text
      word: skypilot
  - id: skypilot-env-prefix-marker
    desc: SkyPilot environment prefix
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SKYPILOT_
  - id: skypilot-module-import
    desc: SkyPilot module import
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?m)^\s*(from|import)\s+sky(\.|\s|$)'
  - id: skypilot-kubeconfig-helper-name
    desc: SkyPilot kubeconfig helper name
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: basename
      exact: generate_kubeconfig.sh
composite_rules:
  - id: skypilot-source-file
    desc: SkyPilot cloud orchestration source file
    crit: notable
    conf: 0.95
    all:
      - id: python-module-path
    any:
      - id: skypilot-name-marker
      - id: skypilot-lowercase-name-marker
      - id: skypilot-env-prefix-marker
      - id: skypilot-module-import
  - id: skypilot-kubeconfig-helper
    desc: SkyPilot kubeconfig helper script
    crit: notable
    conf: 0.95
    all:
      - id: skypilot-kubeconfig-helper-name
      - id: skypilot-env-prefix-marker
