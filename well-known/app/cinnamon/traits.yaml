defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Cinnamon CLI package metadata name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: cinnamon-cli

  - id: vidsrc-scraper-source
    desc: Cinnamon VidSrc media scraper source
    for: [python]
    if:
      type: path
      basename: true
      exact: vidsrc.py

composite_rules:
  - id: vidsrc-playwright-scraper-context
    desc: Recognized Cinnamon VidSrc Playwright scraper context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: vidsrc-scraper-source
