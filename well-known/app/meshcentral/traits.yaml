defaults:
  platforms: [unix, windows]
  for: [powershell]

traits:
  - id: meshcentral-installer-banner
    desc: MeshCentral Windows agent installer banner
    crit: notable
    conf: 0.99
    size_min: 1
    size_max: 10000000
    if:
      type: text
      substr: MeshCentral Agent Installer for Windows systems

  - id: meshcentral-agent-download-route
    desc: MeshCentral agent download route
    crit: notable
    conf: 0.99
    size_min: 1
    size_max: 10000000
    if:
      type: text
      substr: /meshagents?id=

  - id: meshcentral-agent-config-route
    desc: MeshCentral agent configuration route
    crit: notable
    conf: 0.99
    size_min: 1
    size_max: 10000000
    if:
      type: text
      substr: /openframe_public/meshagent.msh

  # These markers identify the upstream MeshCentral distribution and its
  # bundled agents.  They are deliberately paired below; a lone product word
  # is not enough to suppress an intent detection.
  - id: meshcentral-package-name
    desc: MeshCentral npm package name
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: meshcentral

  - id: meshcentral-package-description
    desc: MeshCentral remote package description
    crit: notable
    conf: 0.99
    for: [package.json]
    size_min: 1
    size_max: 100000
    if:
      type: value
      path: description
      exact: Web based remote computer management server

  - id: meshcentral-agent-upstream-marker
    desc: MeshCentral agent upstream identity marker
    crit: notable
    conf: 0.99
    for: [binaries]
    size_min: 100000
    size_max: 10000000
    if:
      type: text
      regex: '(?i)MeshCentral MeshAgent: Copyright 2006 - 2022 Intel Corporation'

  - id: meshcentral-agent-channel-marker
    desc: MeshCentral agent channel marker
    crit: notable
    conf: 0.99
    for: [binaries]
    size_min: 100000
    size_max: 10000000
    if:
      type: text
      regex: '(?i)wss://(swarm\.)?meshcentral\.com:443/agent\.ashx'

  - id: meshcentral-companion-marker
    desc: MeshCentral companion application marker
    crit: notable
    conf: 0.99
    for: [pe]
    platforms: [windows]
    size_min: 100000
    size_max: 10000000
    if:
      type: text
      section: .rdata
      regex: '(?i)Companion application for the MeshCentral agent'

composite_rules:
  - id: meshcentral-windows-agent-installer-context
    desc: Recognized MeshCentral agent installer context
    crit: exception
    conf: 0.99
    all:
      - id: meshcentral-installer-banner
      - id: meshcentral-agent-download-route
      - id: meshcentral-agent-config-route

  - id: meshcentral-package-context
    desc: Recognized MeshCentral npm distribution context
    crit: exception
    conf: 0.99
    for: [archives, package.json, binaries, javascript, typescript]
    scope: archive
    all:
      - id: meshcentral-package-name
      - id: meshcentral-package-description
      - id: meshcentral-agent-upstream-marker
      - id: meshcentral-agent-channel-marker

  - id: meshcentral-agent-binary-context
    desc: Recognized MeshCentral agent binary context
    crit: exception
    conf: 0.99
    for: [binaries]
    any:
      - id: meshcentral-agent-upstream-marker
      - id: meshcentral-agent-channel-marker
      - id: meshcentral-companion-marker
