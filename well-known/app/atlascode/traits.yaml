defaults:
  platforms: [unix, windows]
  for: [javascript, json]
  crit: baseline
  conf: 0.98
  size_max: 10000000

traits:
  - id: atlascode-extension-path
    desc: Atlassian Atlascode VS Code extension path
    if:
      type: path
      regex: 'build[\\/]extension[\\/]uninstall\.js$'

  - id: atlascode-package-name
    desc: Atlassian Atlascode package name
    if:
      type: text
      substr: atlassian.atlascode

composite_rules:
  - id: atlascode-vscode-extension
    desc: Atlassian Atlascode VS Code extension
    crit: baseline
    conf: 0.98
    any:
      - id: atlascode-extension-path
      - id: atlascode-package-name
