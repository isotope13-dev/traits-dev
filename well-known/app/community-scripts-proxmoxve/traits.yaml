# Community Scripts ProxmoxVE installer and helper source context.
defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.99

traits:
  - id: repository-marker
    desc: Community Scripts ProxmoxVE repository
    if:
      type: text
      substr: github.com/community-scripts/ProxmoxVE

  - id: mirror-array-marker
    desc: Package mirror array marker
    if:
      type: text
      regex: '(?i)\b[A-Za-z0-9_-]+_mirrors\b'

  - id: mirror-tcp-probe
    desc: Shell TCP mirror connectivity probe
    if:
      type: text
      regex: '(?i)/dev/tcp/\$[A-Za-z_][A-Za-z0-9_]*/80\b'

  - id: bitmagnet-source-marker
    desc: Bitmagnet source repository marker
    if:
      type: text
      substr: github.com/bitmagnet-io/bitmagnet

  - id: bitmagnet-database-backup
    desc: Bitmagnet PostgreSQL backup operation
    if:
      type: text
      regex: '(?i)pg_dump[\s\S]{0,500}bitmagnet|bitmagnet[\s\S]{0,500}pg_dump'

  - id: ddns-updater-source-marker
    desc: DDNS-Updater source repository marker
    if:
      type: text
      substr: github.com/qdm12/ddns-updater

  - id: ddns-updater-service-unit
    desc: DDNS-Updater systemd service unit
    if:
      type: text
      substr: /etc/systemd/system/ddns-updater.service

composite_rules:
  - id: mirror-connectivity-context
    desc: ProxmoxVE mirror connectivity context
    crit: exception
    conf: 0.99
    all:
      - id: repository-marker
      - id: mirror-array-marker
      - id: mirror-tcp-probe

  - id: bitmagnet-installer-context
    desc: ProxmoxVE Bitmagnet updater context
    crit: exception
    conf: 0.99
    all:
      - id: repository-marker
      - id: bitmagnet-source-marker
      - id: bitmagnet-database-backup

  - id: ddns-updater-installer-context
    desc: ProxmoxVE DDNS-Updater installer context
    crit: exception
    conf: 0.99
    all:
      - id: repository-marker
      - id: ddns-updater-source-marker
      - id: ddns-updater-service-unit
