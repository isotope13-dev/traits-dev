# ADHDev (@adhdev/*, author "vilmire") is a local AI-dev-tool daemon: an
# embedded HTTP/WS server for a local dashboard, an MCP server, and a web
# terminal (node-pty over WebSocket). It binds 127.0.0.1 by default (0.0.0.0
# only when the user sets standaloneBindHost) and gates the API behind a Bearer
# token. Its web terminal, command execution, and a Node-version-guard preinstall
# trip reverse-shell / npm-lifecycle heuristics; identify the vendor to clear
# them, mirroring codeam-cli / codeplane / qwen-code.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, json, package.json, npm, text]
traits:
  - id: adhdev-npm-scope
    desc: ADHDev npm package name
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      regex: '^@adhdev/'
  - id: adhdev-bind-host-marker
    desc: ADHDev daemon bind-host config
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: standaloneBindHost
  - id: adhdev-scope-text
    desc: ADHDev package scope reference
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: '@adhdev/'
  - id: adhdev-brand-marker
    desc: ADHDev product brand marker
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: ADHDev
composite_rules:
  - id: adhdev-daemon-package
    desc: ADHDev local-dashboard daemon
    crit: exception
    conf: 0.99
    all:
      - id: adhdev-scope-text
      - id: adhdev-brand-marker
