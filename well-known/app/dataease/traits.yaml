# DataEase Community Edition's published Linux online installer.
defaults:
  platforms: [linux]
  crit: notable
  conf: 0.99

traits:
  - id: installer-archive-name
    desc: DataEase official installer archive path
    for: [tar, shell]
    if:
      type: path
      regex: '(?i)dataease-dataease-v[0-9]+[^/]*-ce\.tar\.gz'

  - id: installer-script-marker
    desc: DataEase installer script marker
    for: [shell]
    if:
      type: text
      regex: '(?i)dataease-online-installer|DataEase'

  - id: release-source-marker
    desc: DataEase release source marker
    for: [shell]
    if:
      type: text
      regex: '(?i)(github\.com/dataease/dataease|fit2cloud\.com|resource\.fit2cloud\.com)'

composite_rules:
  - id: official-installer-context
    desc: DataEase official Linux installer context
    crit: notable
    conf: 0.99
    for: [tar, shell]
    scope: outer
    all:
      - id: installer-archive-name
      - id: installer-script-marker
      - id: release-source-marker
