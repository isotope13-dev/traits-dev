defaults:
  for: [javascript, typescript]
  platforms: [linux, macos, windows]
  size_min: 1024
  size_max: 524288000
traits:
  - id: codebuddy-marker
    desc: Tencent Cloud CodeBuddy assistant marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: CodeBuddy
  - id: codebuddy-archive-path
    desc: Tencent CodeBuddy VSIX archive path
    crit: baseline
    conf: 0.95
    if:
      type: path
      substr: "Tencent-Cloud.coding-copilot"
  - id: tencent-cloud-sdk-bundle-marker
    desc: Tencent Cloud SDK bundled module marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: TENCENTCLOUD_SECRETID
  - id: codebuddy-decoded-vendor-library-bundle
    desc: CodeBuddy decoded vendor library bundle
    crit: baseline
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: 'CookieJar|SIG_ZIP64|zodPatterns|defineLocale'
    count_min: 3

composite_rules:
  - id: tencent-codebuddy-sdk-bundle
    desc: Tencent CodeBuddy bundled Tencent Cloud SDK
    crit: baseline
    conf: 0.98
    any:
      - id: codebuddy-marker
      - id: tencent-cloud-sdk-bundle-marker
