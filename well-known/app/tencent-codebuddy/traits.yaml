defaults:
  for: [javascript, typescript]
  platforms: [linux, macos, windows]
  size_min: 1024
  size_max: 524288000
traits:
  - id: codebuddy-marker
    desc: Tencent Cloud CodeBuddy assistant marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: CodeBuddy
  - id: codebuddy-archive-path
    desc: Tencent CodeBuddy VSIX archive path
    crit: baseline
    conf: 0.95
    if:
      type: path
      basename: true
      substr: "Tencent-Cloud.coding-copilot"
