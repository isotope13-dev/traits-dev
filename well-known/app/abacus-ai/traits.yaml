defaults:
  platforms: [windows, unix]
  for: [javascript, package.json]
traits:
  - id: abacus-ai-product-name
    desc: Abacus AI product name
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Abacus AI
  - id: abacus-ai-vscode-user-agent
    desc: Abacus AI VSCode user agent
    crit: component
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: AbacusAI-VSCode-Extension
  - id: abacus-ai-telemetry-host
    desc: Abacus AI telemetry host
    crit: component
    conf: 0.95
    if:
      type: text
      substr: station-all-apps.abacusitbd.com
composite_rules:
  - id: abacus-ai-vscode-extension
    desc: Abacus AI VSCode extension
    crit: notable
    conf: 0.95
    any:
      - id: abacus-ai-vscode-user-agent
      - id: abacus-ai-telemetry-host
    all:
      - id: abacus-ai-product-name
