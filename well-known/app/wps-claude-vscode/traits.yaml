defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: baseline
  conf: 0.99

traits:
  - id: package-name
    desc: WPS Claude VS Code package metadata name
    crit: notable
    if:
      type: value
      path: name
      exact: wps-claude-vscode

  - id: publisher
    desc: WPS Claude VS Code publisher identifier
    crit: notable
    if:
      type: value
      path: publisher
      exact: KsWpsClaude

composite_rules:
  - id: package-context
    desc: WPS Claude VS Code extension identity
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: publisher
