# WebBrain is an AI browser agent. Its broad page access and remote-LLM
# requests are documented product behavior, so identify the app before
# evaluating generic extension exfiltration composites.
defaults:
  platforms: [unix, windows]
  for: [javascript, chrome-manifest, xpi, crx, archives]

traits:
  - id: webbrain-manifest-name
    desc: WebBrain browser-agent manifest name
    crit: notable
    conf: 0.99
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: WebBrain

  - id: webbrain-cloud-endpoint
    desc: WebBrain Cloud API endpoint
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: text
      regex: 'api\.webbrain\.one/v1'

  - id: webbrain-cloud-provider-name
    desc: WebBrain Cloud provider identifier
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: text
      regex: "providerName\\s*:\\s*['\"]webbrain-cloud['\"]"

composite_rules:
  - id: webbrain-ai-agent-context
    desc: WebBrain Cloud provider context
    crit: exception
    conf: 0.99
    for: [javascript]
    all:
      - id: webbrain-cloud-endpoint
      - id: webbrain-cloud-provider-name
