defaults:
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.99
  size_min: 100000
  size_max: 250000

traits:
  - id: catgirl-executable-basename
    desc: catgirl executable basename
    crit: component
    if:
      type: value
      path: file.basename
      exact: catgirl

  - id: catgirl-project-homepage
    desc: catgirl project homepage reference
    crit: component
    if:
      type: text
      section: .rodata
      substr: 'git.causal.agency/catgirl'

composite_rules:
  - id: catgirl-client
    desc: catgirl TLS-only terminal IRC client
    conf: 1.0
    all:
      - id: catgirl-executable-basename
      - id: catgirl-project-homepage
