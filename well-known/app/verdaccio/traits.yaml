defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, npm]
  crit: notable
  conf: 0.97

traits:
  - id: verdaccio-ui-theme-package
    desc: Verdaccio UI theme package identity
    if:
      type: value
      path: name
      exact: '@verdaccio/ui-theme'

  - id: verdaccio-runtime-marker
    desc: Verdaccio application runtime marker
    for: [javascript]
    if:
      type: text
      word: Verdaccio

composite_rules:
  - id: verdaccio-ui-theme
    desc: Verdaccio UI theme application bundle
    any:
      - id: verdaccio-ui-theme-package
      - id: verdaccio-runtime-marker
