defaults:
  platforms: [unix, windows]
  for: [javascript, json, xpi]
traits:
  - id: modrinth-extras-name
    desc: Modrinth Extras extension name
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: Modrinth Extras
  - id: modrinth-extras-gecko-id
    desc: Modrinth Extras Firefox extension id
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: contact@creeperkatze.de
composite_rules:
  - id: modrinth-extras-extension
    desc: Modrinth Extras browser extension
    crit: notable
    conf: 0.98
    any:
      - id: modrinth-extras-name
      - id: modrinth-extras-gecko-id
