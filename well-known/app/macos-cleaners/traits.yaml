defaults:
  platforms: [macos]
  for: [macho, plist, archives, binaries]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: appcleaner-bundle-member
    desc: AppCleaner bundle member
    if:
      type: path
      regex: 'AppCleaner(_[0-9][^\\/]*)?\.zip|AppCleaner\.app'

  - id: dmcleaner-bundle-member
    desc: DMcleaner bundle member
    if:
      type: path
      regex: '(^|[\\/])DMcleaner\.dmg|DMcleaner\.app[\\/]'

composite_rules:
  - id: macos-cleaner-app
    desc: macOS cleaner application bundle
    crit: notable
    conf: 0.99
    any:
      - id: appcleaner-bundle-member
      - id: dmcleaner-bundle-member
