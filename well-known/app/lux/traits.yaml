defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: douyin-extractor-sign-basename
    desc: Lux Douyin extractor signer basename
    crit: component
    conf: 0.95
    if:
      type: value
      path: file.basename
      exact: sign.js
  - id: douyin-ttwid-field
    desc: Douyin ttwid field
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ttwid
  - id: douyin-webid-field
    desc: Douyin webid field
    crit: component
    conf: 0.95
    if:
      type: text
      substr: tt_webid
composite_rules:
  - id: douyin-extractor-tracking-fields
    desc: Douyin web signer tracking fields
    crit: component
    conf: 0.95
    all:
      - id: douyin-ttwid-field
      - id: douyin-webid-field
  - id: lux-douyin-sign-extractor
    desc: Lux Douyin extractor signer
    crit: notable
    conf: 0.98
    all:
      - id: douyin-extractor-sign-basename
      - id: douyin-extractor-tracking-fields
