defaults:
  platforms: [unix, windows]
  for: [source, scripts, c, cpp, shell, npm, archives, data]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: nss-source-tree-path
    desc: NSS source tree path
    if:
      type: path
      regex: 'nss-[0-9][^\\/]*'

  - id: nss-bltest-path
    desc: NSS bltest path
    if:
      type: path
      substr: bltest

  - id: nss-gtests-path
    desc: NSS gtests path
    if:
      type: path
      substr: gtests

  - id: nss-pkits-path
    desc: NSS pkits path
    if:
      type: path
      substr: pkits

  - id: nss-taskcluster-automation
    desc: NSS taskcluster automation
    for: [shell, npm, scripts, manifests]
    if:
      type: path
      regex: 'taskcluster[\\/]'

composite_rules:
  - id: nss-source-tree
    desc: Mozilla NSS source tree
    crit: notable
    conf: 0.99
    any:
      - id: nss-source-tree-path
      - id: nss-crypto-test-data
      - id: nss-taskcluster-automation
  - id: nss-crypto-test-data
    desc: NSS crypto test data
    crit: notable
    conf: 0.99
    any:
      - id: nss-bltest-path
      - id: nss-gtests-path
      - id: nss-pkits-path
