defaults:
  platforms: [unix]
  for: [shell, perl, text, archives]
  crit: notable
  conf: 0.99

traits:
  - id: package-manifest
    desc: Clonezilla package manifest identity
    if:
      type: text
      regex: '(?im)^pkgname\s*=\s*clonezilla\s*$'

  - id: package-purpose
    desc: Clonezilla disk-imaging package description
    if:
      type: text
      regex: '(?i)partition and disk imaging/cloning program'

  - id: archive-name
    desc: Clonezilla package archive name
    for: [tar]
    if:
      type: basename
      regex: '(?i)^clonezilla-[0-9][^/]*\.pkg\.tar\.zst$'

  - id: clonezilla-script-name
    desc: Clonezilla OCS script filename
    for: [shell, perl, text]
    if:
      type: basename
      regex: '(?i)^ocs-[^/]+$'

  - id: clonezilla-script-marker
    desc: Clonezilla OCS script project marker
    for: [shell, perl, text]
    if:
      type: text
      regex: '(?i)clonezilla'

composite_rules:
  - id: clonezilla-script-context
    desc: Recognized Clonezilla OCS disk-imaging script context
    crit: exception
    conf: 0.99
    all:
      - id: clonezilla-script-name
      - id: clonezilla-script-marker

  - id: package-context
    desc: Recognized Clonezilla disk-imaging package context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: package-manifest
      - id: package-purpose
