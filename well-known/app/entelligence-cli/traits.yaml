defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.95

traits:
  - id: entelligence-branding
    desc: Entelligence router branding marker
    if:
      type: text
      regex: '(?i)\bEntelligence\b'

  - id: claude-router-settings
    desc: Claude router settings variables marker
    if:
      type: text
      regex: 'ANTHROPIC_BASE_URL[\s\S]{0,220}ANTHROPIC_AUTH_TOKEN'

composite_rules:
  - id: router-settings-implementation
    desc: Entelligence Claude router settings implementation
    crit: notable
    conf: 0.98
    all:
      - id: entelligence-branding
      - id: claude-router-settings
