# Kombai's published VS Code extension. The browser-profile importer is a
# user-invoked feature that imports a selected Chrome profile into Kombai's
# managed Playwright browser; it is not evidence of credential theft by itself.
defaults:
  platforms: [windows, linux, macos]
  for: [javascript, package.json, vsix-manifest]

traits:
  - id: package-name
    desc: Kombai extension package name
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '"name"\s*:\s*"kombai"'
  - id: publisher-id
    desc: Kombai VS Code publisher identity
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?i)("publisher"\s*:\s*"kombai"|Publisher="kombai")'
  - id: official-service-domain
    desc: Official Kombai service host
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?i)\b(assistant\.app|agent|reflect)\.kombai\.com\b'
  - id: browser-profile-import-api
    desc: Kombai browser profile import API
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)(import/chromeProfileCookies|extractAndSaveCookies|injectCookies)'
  - id: vendor-runtime-filename
    desc: Kombai vendor runtime bundle filename
    crit: notable
    conf: 0.99
    if:
      type: path
      exact: kombai-vendor-runtime.js
      case_insensitive: true
      basename: true
  - id: vendor-runtime-brand-marker
    desc: Kombai vendor runtime brand marker
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: kombai

composite_rules:
  - id: kombai-browser-profile-import-context
    desc: Recognized Kombai extension browser-profile import context
    crit: exception
    conf: 0.99
    scope: outer
    for: [javascript, package.json, vsix-manifest, archives]
    all:
      - id: official-service-domain
      - id: browser-profile-import-api
  - id: kombai-vendor-runtime-context
    desc: Recognized Kombai vendor runtime bundle
    crit: exception
    conf: 0.99
    for: [javascript]
    all:
      - id: vendor-runtime-filename
      - id: vendor-runtime-brand-marker
  - id: kombai-extension-runtime-context
    desc: Recognized Kombai VS Code extension runtime
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: package-name
      - id: publisher-id
      - id: official-service-domain
