# AgentGem is a published local coding-agent configuration and workflow tool.
# Its optional warm service and Claude/Codex introspection are product features,
# not covert persistence or credential theft.
defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, markdown, json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: AgentGem npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@ninemind/agentgem'

  - id: upstream-repository
    desc: AgentGem upstream repository reference
    if:
      type: text
      regex: 'github\.com/ninemindai/agentgem(\.git)?([/\\s"''`?#]|$)'

  - id: warm-service-label
    desc: AgentGem warm service label
    for: [javascript, typescript]
    if:
      type: text
      substr: 'ai.ninemind.agentgem.warm'

  - id: local-ui-marker
    desc: AgentGem local web UI marker
    for: [javascript, typescript, markdown]
    if:
      type: text
      substr: 'agentgem listening at http://127.0.0.1:4317'

composite_rules:
  - id: benign-archive-context
    desc: Recognized AgentGem npm archive context
    crit: exception
    scope: outer
    all:
      - id: package-name
      - id: upstream-repository
