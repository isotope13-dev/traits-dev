defaults:
  platforms: [linux, macos]
  crit: baseline
  conf: 0.96
  size_max: 268435456

traits:
  - id: electron-app-bundle
    desc: MarkText Electron app bundle
    for: [macho, elf, plist, javascript]
    if:
      type: path
      regex: '.{0,160}(MarkText\.app|opt[\\/]MarkText|marktext$)'
      case_insensitive: true
  - id: app-name-string
    desc: MarkText app name string
    for: [macho, elf, data, javascript, plist]
    if:
      type: text
      word: MarkText

composite_rules:
  - id: application-bundle
    desc: MarkText application bundle
    any:
      - id: well-known/app/marktext
