defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.95
  size_min: 1
  size_max: 200000000

traits:
  - id: mysqltuner-source-path
    desc: MySQLTuner source tree path
    for: [archives, source, scripts, shell, perl, python, package.json, markdown, github-actions]
    if:
      type: path
      substr: MySQLTuner-perl-2.8.45/
