# Sympozium is an open-source, Kubernetes-native agent control plane. These
# markers identify its upstream source tree so generic UI/provider signals are
# not mistaken for lead-data collection.
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.99

traits:
  - id: repository
    desc: Sympozium upstream repository marker
    for: [go, javascript, typescript, shell, markdown]
    if:
      type: text
      substr: github.com/sympozium-ai/sympozium

  - id: product-description
    desc: Sympozium agent control-plane description
    for: [markdown]
    if:
      type: text
      substr: agentic control plane, K8s-native

  - id: installer-host
    desc: Sympozium official installer host
    for: [shell, markdown]
    if:
      type: text
      substr: deploy.sympozium.ai/install.sh
