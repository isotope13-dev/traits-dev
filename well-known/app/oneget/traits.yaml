defaults:
  platforms: [windows, unix]
  for: [binaries, source, scripts, manifests, documents, data, archives, xml]
  size_min: 1
  size_max: 500000000

traits:
  - id: oneget-repository-path
    desc: OneGet source repository path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: 'github\.com[\\/]oneget[\\/]oneget@'

  - id: oneget-detours-shim-path
    desc: OneGet Detours DNS shim test path
    crit: notable
    conf: 0.99
    for: [pe, dll]
    if:
      type: path
      basename: true
      regex: '^Shim(32|64)\.dll$'

  - id: oneget-primary-msbuild-file-path
    desc: OneGet primary MSBuild file path
    crit: notable
    conf: 0.99
    for: [xml]
    if:
      type: path
      basename: true
      regex: '^(NuGet\.targets|PackageManagement\.csproj)$'

  - id: oneget-test-provider-project-path
    desc: OneGet test provider project path
    crit: notable
    conf: 0.99
    for: [xml]
    if:
      type: path
      basename: true
      exact: OneGetTestProvider.csproj

  - id: oneget-msi-source-file-path
    desc: OneGet MSI provider source file path
    crit: notable
    conf: 0.99
    for: [csharp]
    if:
      type: path
      basename: true
      regex: '^(Database|CustomActionProxy)\.cs$'

composite_rules:
  - id: oneget-detours-dns-shim-context
    desc: OneGet Detours DNS shim test context
    crit: exception
    conf: 0.99
    all:
      - id: oneget-repository-path
      - id: oneget-detours-shim-path
      - id: objectives/evasion/process/injection/callback::detours-section-marker

  - id: oneget-msbuild-build-context
    desc: OneGet MSBuild build file context
    crit: exception
    conf: 0.99
    all:
      - id: oneget-repository-path
    any:
      - id: oneget-primary-msbuild-file-path
      - id: oneget-test-provider-project-path

  - id: oneget-msi-source-context
    desc: OneGet MSI provider source context
    crit: exception
    conf: 0.99
    all:
      - id: oneget-repository-path
      - id: oneget-msi-source-file-path
