defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1048576

traits:
  - id: plooto-stylized-version-identity
    desc: Stylized Plooto identity in version resource
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.product_name
      regex: '𝖯loo𝗍o Inc\.'

composite_rules:
  - id: plooto-signed-inno-bundle-installer
    desc: Plooto-signed Inno bundle installer
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/signed/leaf::plooto-inc
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/layout::large-overlay-1mb
      - id: metadata/binary/layout::overlay-dominates-third

  - id: offercore-plooto-pua-installer
    desc: OfferCore/BundleInstaller PUA signed as Plooto
    crit: suspicious
    conf: 0.98
    all:
      - id: plooto-signed-inno-bundle-installer
      - id: plooto-stylized-version-identity

  - id: offercore-reboot-capable-installer
    desc: OfferCore PUA installer can initiate Windows reboot
    crit: notable
    conf: 0.94
    all:
      - id: offercore-plooto-pua-installer
      - id: micro-behaviors/ui/window/manage/control::exit-windows-ex
      - id: micro-behaviors/os/privilege/token::shutdown-privilege-name
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
      - id: micro-behaviors/os/privilege/token::lookup-privilege-value

  - id: offercore-opaque-inno-overlay
    desc: OfferCore PUA carries opaque high-entropy Inno overlay
    crit: suspicious
    conf: 0.96
    all:
      - id: offercore-plooto-pua-installer
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: metadata/binary/layout::large-overlay-1mb
      - id: metadata/binary/layout::overlay-dominates-third
