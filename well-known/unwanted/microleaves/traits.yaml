defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 300000
  size_max: 10000000

traits:
  - id: aw-manager-product-name
    desc: Windows Manager product identity
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: pe.version.product_name
      exact: Windows Manager

  - id: aw-manager-company-name
    desc: AW Manager company identity
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.company
      exact: AW Manager

  - id: aw-manager-installer-description
    desc: Windows Manager installer description
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: pe.version.description
      exact: Windows Manager Installer

composite_rules:
  - id: aw-manager-identity
    desc: AW Manager Windows Manager identity
    crit: hostile
    conf: 0.99
    all:
      - id: aw-manager-product-name
      - id: aw-manager-company-name
      - id: aw-manager-installer-description
