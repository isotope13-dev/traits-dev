defaults:
  for: [pe]
  platforms: [windows]
  attack: T1105

traits:
  - id: reinstallvault-download-domain
    desc: ReinstallVault download domain
    crit: component
    conf: 0.96
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    size_min: 500000
    size_max: 1500000
    if:
      type: text
      regex: '(^|\.)reinstallvault\.com\b'
      section: rdata

  - id: getrighttogo-trial-builder-notice
    desc: GetRightToGo trial builder notice
    crit: component
    conf: 0.95
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    size_min: 500000
    size_max: 1500000
    if:
      type: text
      substr: Built by the Trial version of GetRightToGo
      section: rdata

composite_rules:
  - id: getrighttogo-runafterdownloader
    desc: GetRightToGo run-after-download wrapper
    crit: suspicious
    conf: 0.95
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    all:
      - id: metadata/binary/installer/legacy::getrighttogo-manifest
      - id: micro-behaviors/process/create/launch::run-when-done-control
    any:
      - id: reinstallvault-download-domain
      - id: getrighttogo-trial-builder-notice
      - id: micro-behaviors/communications/http/download/manager::url-intake-and-extraction
