defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: team-vr-authenticode-subject
    desc: Team V.R Authenticode subject
    crit: suspicious
    conf: 0.96
    size_min: 4096
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    if:
      type: value
      path: pe.signatures[0].subject
      exact: CN=Team V.R

composite_rules:
  - id: team-vr-self-issued-authenticode
    desc: Team V.R self-issued Authenticode
    crit: suspicious
    conf: 0.98
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    all:
      - id: team-vr-authenticode-subject
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
  - id: team-vr-packed-license-crack
    desc: Team V.R packed license crack
    crit: hostile
    conf: 0.98
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    all:
      - id: team-vr-self-issued-authenticode
      - id: objectives/anti-static/pack/mpress::mpress-versioned-stub
      - id: objectives/evasion/masquerade/version-resource/licensing::steinberg-elicenser-version-identity
