defaults:
  platforms: [windows]
  for: [batch]

traits:
  - id: crack-dll-copy-to-program-files
    desc: Crack DLL copied into Program Files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)xcopy.{0,80}"crack\\[^"]{1,80}\.dll"\s+"C:\\Program Files'

  - id: crack-attribution-text
    desc: Software crack attribution text
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bcrack by\b'

composite_rules:
  - id: batch-software-crack-installer
    desc: Batch software crack installer
    crit: hostile
    conf: 0.96
    all:
      - id: crack-dll-copy-to-program-files
      - id: crack-attribution-text
