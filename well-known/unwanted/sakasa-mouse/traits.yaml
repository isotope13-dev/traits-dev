defaults:
  platforms: [windows]
  for: [pe, dll, text]
  attack: T1056
traits:
  - id: sakasa-mouse-name
    desc: SakasaMouse utility marker
    crit: component
    conf: 0.95
    size_max: 131072
    if:
      type: text
      exact: SakasaMouse
  - id: sakasa-mouse-author-url
    desc: SakasaMouse author URL
    crit: component
    conf: 0.92
    size_max: 4096
    if:
      type: text
      substr: hp.vector.co.jp/authors/VA026826
  - id: sakasa-dll-name
    desc: Sakasa hook DLL name
    crit: component
    conf: 0.9
    size_max: 131072
    if:
      type: text
      exact: sakasa.dll
composite_rules:
  - id: sakasa-mouse-hook-utility
    desc: SakasaMouse global-hook prank utility
    crit: suspicious
    conf: 0.92
    all:
      - id: sakasa-mouse-name
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
      - id: sakasa-mouse-author-url
  - id: sakasa-mouse-hook-dll
    desc: SakasaMouse global-hook DLL
    crit: suspicious
    conf: 0.92
    all:
      - id: sakasa-dll-name
      - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
