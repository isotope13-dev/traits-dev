defaults:
  platforms: [windows]
  for: [pe]
  size_min: 4096
  size_max: 131072

traits:
  - id: rpcnetp-export
    desc: rpcnetp export symbol
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: rpcnetp

  - id: rpcnetp-service-path
    desc: rpcnetp service registry path
    crit: component
    conf: 0.98
    if:
      type: text
      exact: System\CurrentControlSet\Services\rpcnetp
      section: .text

  - id: rpcnetp-executable-name
    desc: rpcnetp executable name
    crit: component
    conf: 0.98
    if:
      type: text
      exact: rpcnetp.exe
      section: .text

  - id: computrace-tagid-field
    desc: Computrace TagId field name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: TagId
      section: .text

composite_rules:
  - id: computrace-rpcnetp-agent
    desc: Absolute Computrace rpcnetp PUP agent
    crit: suspicious
    conf: 0.99
    all:
      - id: rpcnetp-export
    any:
      - id: rpcnetp-service-path
      - id: rpcnetp-executable-name
      - id: computrace-tagid-field
