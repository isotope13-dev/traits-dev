# Named new-tab wallpaper adware publishers (extsentry / Chrome Web Store PUP).
# Identity only — behavioral hostiles live under objectives/.
#
# Corroboration for this PUP/adware family: Socket / The Hacker News (2026-06)
# documented a 152-extension live-wallpaper campaign (backends tabplugins.com,
# yowgames.com, chromewallpaper.com, owhit.com) that ships NTP-override video
# wallpapers with forced UTM install/uninstall promo tabs, remote-controlled
# promo/tile catalogs, undisclosed telemetry, and a shared anti-forensic
# IndexedDB enumerate-and-delete routine on every service-worker start. The
# Gameograf artifacts carry that exact anti-forensic wipe (see
# objectives/evasion/indicator-removal/cleanup::monetized-extension-indexeddb-wipe)
# alongside the newtab + UTM lifecycle, placing them in this family.
defaults:
  platforms: [windows, unix]
  for: [json, chrome-manifest, javascript, crx]
  crit: component
  conf: 0.92

traits:
  - id: gameograf-manifest-author
    desc: Gameograf Chrome extension author
    for: [json, chrome-manifest]
    if:
      type: value
      path: author
      exact: Gameograf
  - id: gameograf-promo-host
    desc: Gameograf promotional host URL
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: 'https?://([^/"''\s]+\.)?gameograf\.com\b'
      case_insensitive: true
  - id: owhit-manifest-author
    desc: Owhit Chrome extension author
    for: [json, chrome-manifest]
    if:
      type: value
      path: author
      exact: Owhit
  # This publisher ships under two promo domains: owhit.com and yowgames.com.
  # The link is direct rather than inferred — the yowgames.com extensions carry
  # `"author": "Owhit"` in the manifest, and the catalog that yowgames.com
  # serves at /api/extensions.php returns card images hosted on owhit.com.
  # Matching only owhit.com silently missed the yowgames-branded half.
  - id: owhit-promo-host
    desc: Owhit promotional host URL
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: 'https?://([^/"''\s]+\.)?(owhit|yowgames)\.com\b'
      case_insensitive: true

composite_rules:
  # These are curated PUP-publisher signatures (extsentry / Chrome Web Store),
  # independent of the behavioral rules. The Gameograf combination is hostile:
  # it pairs a forced new-tab override and campaign navigation with the
  # publisher identity and the archive-wide anti-forensic IndexedDB wipe.
  - id: gameograf-newtab-wallpaper-adware
    desc: Gameograf new-tab wallpaper adware publisher
    crit: hostile
    conf: 0.95
    attack: T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: gameograf-manifest-author
      - id: gameograf-promo-host
      - id: objectives/evasion/indicator-removal/cleanup::monetized-extension-indexeddb-wipe
  - id: owhit-newtab-wallpaper-adware
    desc: Owhit new-tab wallpaper adware publisher
    crit: suspicious
    conf: 0.95
    attack: T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: owhit-manifest-author
      - id: owhit-promo-host
