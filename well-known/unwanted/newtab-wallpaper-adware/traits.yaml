# Named new-tab wallpaper adware publishers (extsentry / Chrome Web Store PUP).
# Identity only — behavioral hostiles live under objectives/.
defaults:
  platforms: [windows, unix]
  for: [json, chrome-manifest, javascript, crx]
  crit: component
  conf: 0.92

traits:
  - id: gameograf-manifest-author
    desc: Gameograf Chrome extension author
    for: [json, chrome-manifest]
    if:
      type: value
      path: author
      exact: Gameograf
  - id: gameograf-promo-host
    desc: Gameograf promotional host URL
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: 'https?://([^/"''\s]+\.)?gameograf\.com\b'
      case_insensitive: true
  - id: owhit-manifest-author
    desc: Owhit Chrome extension author
    for: [json, chrome-manifest]
    if:
      type: value
      path: author
      exact: Owhit
  # This publisher ships under two promo domains: owhit.com and yowgames.com.
  # The link is direct rather than inferred — the yowgames.com extensions carry
  # `"author": "Owhit"` in the manifest, and the catalog that yowgames.com
  # serves at /api/extensions.php returns card images hosted on owhit.com.
  # Matching only owhit.com silently missed the yowgames-branded half.
  - id: owhit-promo-host
    desc: Owhit promotional host URL
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: 'https?://([^/"''\s]+\.)?(owhit|yowgames)\.com\b'
      case_insensitive: true

composite_rules:
  # DO NOT DOWNGRADE THESE TO notable — this has now been reverted five times.
  #
  # These are *curated* PUP-publisher signatures (extsentry / Chrome Web Store),
  # not a restatement of the behavioural rule. They assert "this artifact comes
  # from a publisher already catalogued as a new-tab adware distributor", which
  # is independent evidence from impact/ui::newtab-override-promo-lifecycle
  # (which only observes campaign-tracked lifecycle navigation and fires on
  # uncurated publishers too). Matching a curated adware publisher is squarely
  # "rarely legitimate" — suspicious.
  #
  # Keep the curated publisher identity at one suspicious finding: it is useful
  # unwanted-software context, but an honest promotional new-tab extension is
  # still benign under the triage policy. The lifecycle behavior itself remains
  # notable in the objective rule, not a second suspicious conviction.
  - id: gameograf-newtab-wallpaper-adware
    desc: Gameograf new-tab wallpaper adware publisher
    crit: suspicious
    conf: 0.95
    attack: T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: gameograf-manifest-author
      - id: gameograf-promo-host
  - id: owhit-newtab-wallpaper-adware
    desc: Owhit new-tab wallpaper adware publisher
    crit: suspicious
    conf: 0.95
    attack: T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: owhit-manifest-author
      - id: owhit-promo-host
