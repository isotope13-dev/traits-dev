# ADIOS2 is an open-source scientific data transport library.  Its vendored
# third-party CI setup scripts install compilers and CMake as part of a build;
# that project context is distinct from an unowned download-and-execute script.
defaults:
  platforms: [unix, windows]
  for: [shell, powershell, archives]

traits:
  - id: source-tree-member
    desc: ADIOS2 GitHub organization/project path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: 'ornladios[\\/]adios2@[0-9A-Za-z._+-]+'

  - id: linux-setup-file
    desc: setup/linux.sh path component
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(^|[\\/])setup[\\/]linux\.sh$'

  - id: windows-ci-setup-file
    desc: ADIOS2 Windows GitHub Actions setup script
    crit: notable
    conf: 0.99
    platforms: [windows]
    for: [powershell]
    if:
      type: path
      regex: 'gh-actions[\\/]windows-setup\.ps1$'

composite_rules:
  - id: adios2-ci-setup-context
    desc: Recognized ADIOS2 vendored CI setup script context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: source-tree-member
      - id: linux-setup-file

  - id: adios2-windows-ci-setup-context
    desc: Recognized ADIOS2 Windows CI setup script context
    crit: exception
    conf: 0.99
    platforms: [windows]
    scope: outer
    all:
      - id: source-tree-member
      - id: windows-ci-setup-file
