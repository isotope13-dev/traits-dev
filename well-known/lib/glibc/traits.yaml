defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98
  size_max: 104857600

traits:
  - id: source-archive-basename
    desc: GNU C Library source archive
    for: [archive]
    if:
      type: path
      regex: '(^|[\\/!])glibc[-_][0-9][^\\/!]*$'

  - id: source-tree-path
    desc: GNU C Library source tree path
    for: [c, cpp, makefile, shell]
    if:
      type: path
      regex: '(^|[\\/!])glibc-[0-9][^\\/!]*[\\/]'

  - id: source-file-marker
    desc: GNU C Library source marker

    for: [c, cpp, elf, macho]
    if:
      type: text
      substr: GNU C Library
