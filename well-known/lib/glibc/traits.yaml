defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98
  size_max: 104857600

traits:
  - id: source-archive-basename
    desc: GNU C Library source archive
    for: [archive]
    if:
      type: basename
      regex: '(^|[\\/!])glibc[-_][0-9][^\\/!]*$'

  - id: source-tree-path
    desc: GNU C Library source tree path
    for: [source]
    if:
      type: basename
      regex: '(^|[\\/!])glibc-[0-9][^\\/!]*[\\/]'

  - id: source-file-marker
    desc: GNU C Library source marker
    for: [source, scripts, c, cpp, shell, python]
    if:
      type: text
      substr: GNU C Library
