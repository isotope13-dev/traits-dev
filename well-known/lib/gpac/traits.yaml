defaults:
  size_max: 52428800
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  crit: baseline
  conf: 0.9

traits:
  - id: mp4box-product-versioninfo
    desc: MP4Box ProductName version info
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.product_name
      regex: '^\s*MP4Box$'

  - id: mp4box-original-filename
    desc: MP4Box original filename
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.original_filename
      exact: MP4Box.exe

  - id: gpac-company-versioninfo
    desc: GPAC project CompanyName version info
    crit: component
    conf: 0.96
    if:
      type: kv
      path: pe.version.company
      substr: gpac.sourceforge.net

composite_rules:
  - id: mp4box-tool
    desc: GPAC MP4Box media packaging tool
    crit: baseline
    conf: 0.99
    all:
      - id: mp4box-product-versioninfo
    any:
      - id: mp4box-original-filename
      - id: gpac-company-versioninfo
