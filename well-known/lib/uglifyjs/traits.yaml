defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: uglify-js npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: uglify-js
  - id: compressor-source
    desc: UglifyJS compressor source header
    for: [javascript]
    if:
      type: text
      substr: 'A JavaScript tokenizer / parser / beautifier / compressor.'
