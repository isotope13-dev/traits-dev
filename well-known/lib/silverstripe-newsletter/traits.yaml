defaults:
  platforms: [unix, windows]
  for: [php, composer.json, javascript, text]
  crit: component
  conf: 0.9

traits:
  - id: silverstripe-newsletter-composer-name
    desc: SilverStripe newsletter composer package
    for: [composer.json]
    conf: 0.98
    if:
      type: value
      path: name
      exact: mspacemedia/silverstripe-newsletter

  - id: silverstripe-newsletter-namespace
    desc: SilverStripe newsletter PHP namespace
    for: [php]
    conf: 0.94
    if:
      type: text
      substr: 'namespace MSpaceMedia\Newsletter'

  - id: silverstripe-newsletter-preview-js
    desc: SilverStripe newsletter preview script
    for: [javascript]
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: newsletter-preview.js

  - id: silverstripe-mergefield-builder-js
    desc: SilverStripe merge-field builder script
    for: [javascript]
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: js-mergefield-input

composite_rules:
  - id: silverstripe-newsletter-module
    desc: SilverStripe newsletter vendor module
    crit: notable
    conf: 0.98
    any:
      - id: silverstripe-newsletter-composer-name
      - id: silverstripe-newsletter-namespace
