# RequireJS/r.js browser loader.
#
# The browser loader intentionally fetches a module with XMLHttpRequest and
# evaluates it so AMD anonymous modules can register with the active context.
defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: notable

traits:
  - id: requirejs-load-hook
    desc: RequireJS load hook
    conf: 0.94
    if:
      type: text
      substr: require.load = function (context, moduleName, url)

  - id: requirejs-complete-load
    desc: RequireJS completeLoad callback
    conf: 0.94
    if:
      type: text
      substr: context.completeLoad(moduleName)

  - id: requirejs-loader-jslint-evil
    desc: RequireJS loader eval annotation
    conf: 0.9
    if:
      type: text
      exact: '/*jslint sloppy: true, evil: true */'

composite_rules:
  - id: requirejs-browser-xhr-loader
    desc: RequireJS browser XHR loader
    crit: notable
    conf: 0.97
    all:
      - id: requirejs-load-hook
      - id: requirejs-complete-load
      - id: requirejs-loader-jslint-evil
