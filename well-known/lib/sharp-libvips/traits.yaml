defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll, elf, so, macho, dylib]
  crit: baseline
  conf: 0.98
  size_min: 4096
  size_max: 52428800

traits:
  - id: sharp-bundled-libvips
    desc: sharp bundled libvips binary
    if:
      type: path
      basename: true
      regex: '^libvips(-[^\\/]+(\.dll)?|-cpp\.so(\.[0-9]+)*)$'
  - id: libvips-runtime-strings
    desc: libvips runtime string markers
    if:
      type: text
      section: .rodata
      regex: 'VIPS_STALL|libvips|Cannot write more than [0-9]+ PPS into avcC box'

composite_rules:
  - id: sharp-libvips-binary
    desc: sharp bundled libvips image library
    crit: notable
    conf: 0.98
    any:
      - id: sharp-bundled-libvips
      - id: libvips-runtime-strings
