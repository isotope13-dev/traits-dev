defaults:
  for:
  - javascript
  platforms:
  - unix
  - windows
  size_max: 5000000
traits:
- id: pdfjs-version-const
  desc: pdf.js version constant declaration
  crit: component
  conf: 0.99
  if:
    type: text
    regex: pdfjsVersion\s*=\s*['"]\d
- id: pdfjs-globalthis-export
  desc: pdf.js globalThis.pdfjsLib/pdfjsWorker export
  crit: component
  conf: 0.99
  if:
    type: text
    regex: globalThis\.pdfjs(Lib|Worker)\b
- id: pdfjs-pdfworker-class
  desc: pdf.js PDFWorker class binding
  crit: component
  conf: 0.95
  if:
    type: text
    substr: class PDFWorker
- id: pdfjs-license-notice
  desc: pdf.js Mozilla Foundation license header
  crit: component
  conf: 0.97
  if:
    type: text
    regex: Copyright \d+ Mozilla Foundation
    offset_range:
    - 0
    - 4096
- id: pdfjs-sandbox-basename
  desc: pdf.js sandbox distribution file
  crit: component
  conf: 0.98
  if:
    type: path
    regex: "pdfjs-dist[\\\\/].*[\\\\/]pdf\\.sandbox(\\.min)?\\.mjs$"
composite_rules:
- id: pdfjs-bundle
  desc: Mozilla pdf.js library bundle
  crit: baseline
  conf: 0.98
  any:
  - id: pdfjs-version-const
  - id: pdfjs-globalthis-export
  - id: pdfjs-pdfworker-class
  - id: pdfjs-sandbox-basename
  all:
  - id: pdfjs-license-notice
