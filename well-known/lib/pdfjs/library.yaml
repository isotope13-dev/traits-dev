# Recognises the upstream Mozilla pdf.js library bundle and worker.
# pdf.js is a large (~1.5 MB) widely-bundled PDF renderer that contains
# code patterns commonly flagged by obfuscation/payload heuristics:
# RC4 KSA loops (legacy PDF crypto), `new Function(...)` for string
# evaluation, Unicode glyph tables with consonant-vowel runs, IPv4-style
# coordinate arrays, and high non-ASCII content in font/CMap data.
#
# Use these traits as positive `unless:` evidence in `objectives/` rules
# that are prone to misfire on legitimate pdf.js bundles.
defaults:
  for: [javascript]
  platforms: [unix, windows]

traits:
  - id: pdfjs-version-const
    desc: pdf.js version constant declaration
    crit: component
    conf: 0.99
    if:
      type: text
      regex: "pdfjsVersion\\s*=\\s*['\"]\\d"

  - id: pdfjs-globalthis-export
    desc: pdf.js globalThis.pdfjsLib/pdfjsWorker export
    crit: component
    conf: 0.99
    if:
      type: text
      regex: "globalThis\\.pdfjs(Lib|Worker)\\b"

  - id: pdfjs-pdfworker-class
    desc: pdf.js PDFWorker class binding
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "class PDFWorker"

  - id: pdfjs-license-notice
    desc: pdf.js Mozilla Foundation license header
    crit: component
    conf: 0.97
    if:
      type: text
      regex: "Copyright \\d+ Mozilla Foundation"
      offset_range: [0, 4096]

composite_rules:
  - id: pdfjs-bundle
    desc: Mozilla pdf.js library bundle
    crit: baseline
    conf: 0.98
    any:
      - id: pdfjs-version-const
      - id: pdfjs-globalthis-export
      - id: pdfjs-pdfworker-class
    all:
      - id: pdfjs-license-notice
