# swagger-typescript-api generated client. Benign FP context.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]
  crit: component
  conf: 0.98
traits:
  - id: swagger-typescript-api-banner
    desc: swagger-typescript-api generated file banner
    if:
      type: text
      substr: "THIS FILE WAS GENERATED VIA SWAGGER-TYPESCRIPT-API"
  - id: swagger-typescript-api-source-url
    desc: swagger-typescript-api source URL
    if:
      type: text
      substr: "github.com/acacode/swagger-typescript-api"
  - id: swagger-typescript-api-content-formatters
    desc: swagger-typescript-api content formatters
    conf: 0.95
    if:
      type: text
      substr: "private contentFormatters: Record<ContentType"
composite_rules:
  - id: generated-swagger-typescript-api-client
    desc: Generated swagger-typescript-api client
    crit: notable
    conf: 0.98
    all:
      - id: swagger-typescript-api-banner
      - id: swagger-typescript-api-source-url
      - id: swagger-typescript-api-content-formatters
