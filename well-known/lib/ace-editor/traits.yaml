defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  size_max: 5000000
traits:
- id: ace-amd-module
  desc: Ace editor AMD module
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: define("ace/ace"
- id: ace-range-list-module
  desc: Ace editor range-list module
  crit: component
  conf: 0.9
  if:
    type: text
    substr: define("ace/range_list"
- id: ace-editor-module-single-quote
  desc: Ace editor module
  crit: component
  conf: 0.9
  if:
    type: text
    substr: define('ace/editor'
- id: ace-vim-keyboard-module
  desc: Ace Vim keyboard module
  crit: component
  conf: 0.9
  if:
    type: text
    substr: define('ace/keyboard/vim'
- id: ace-cpp-highlight-rules
  desc: Ace C/C++ highlight rules
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: c_cppHighlightRules
- id: ace-cpp-keyword-table
  desc: Ace C/C++ keyword table
  crit: component
  conf: 0.9
  if:
    type: text
    substr: asm|else|or|try|auto|enum|or_eq|typedef
- id: ace-markdown-highlight-rules
  desc: Ace Markdown highlight rules
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: mode/markdown_highlight_rules
- id: ace-markdown-heading-rule
  desc: Ace Markdown heading rule
  crit: component
  conf: 0.9
  if:
    type: text
    substr: h1 with equals
- id: ace-snippets-module
  desc: Ace snippets module
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: 'define("ace/snippets/'
- id: ace-mode-module
  desc: Ace mode module
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: 'define("ace/mode/'
- id: ace-mode-worker-module
  desc: Ace editor mode worker module
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'define\(["'']ace/mode/.{0,40}_worker'
- id: ace-worker-module
  desc: Ace editor worker module
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'define\(["'']ace/worker/'
composite_rules:
- id: ace-editor-bundle
  desc: Ace editor JavaScript bundle
  crit: notable
  conf: 0.95
  all:
  - id: ace-amd-module
  - id: ace-range-list-module
- id: ace-editor-modules
  desc: Ace editor module bundle
  crit: notable
  conf: 0.95
  needs: 2
  any:
  - id: ace-amd-module
  - id: ace-snippets-module
  - id: ace-mode-module
- id: ace-uncompressed-editor-bundle
  desc: Ace uncompressed editor JavaScript bundle
  crit: notable
  conf: 0.95
  all:
  - id: ace-editor-module-single-quote
  - id: ace-vim-keyboard-module
- id: ace-cpp-mode
  desc: Ace C/C++ syntax mode
  crit: notable
  conf: 0.95
  all:
  - id: ace-cpp-highlight-rules
  - id: ace-cpp-keyword-table
- id: ace-markdown-mode
  desc: Ace Markdown syntax mode
  crit: notable
  conf: 0.95
  all:
  - id: ace-markdown-highlight-rules
  - id: ace-markdown-heading-rule
- id: ace-worker-bundle
  desc: Ace editor worker bundle
  crit: notable
  conf: 0.95
  any:
  - id: ace-mode-worker-module
  - id: ace-worker-module
