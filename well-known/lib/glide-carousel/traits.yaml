# Glide.js carousel (Nick Pettit). Benign FP context: attribution comment in
# bundled UI code.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]
traits:
  - id: semantic-ui-glide-comment-context
    desc: Glide carousel attribution comment
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: "by Nick Pettit - https://github.com/nickpettit/glide"
