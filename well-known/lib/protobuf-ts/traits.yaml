defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: protobuf-ts-runtime-module
    desc: protobuf-ts runtime module
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: '@protobuf-ts/runtime'
  - id: protobuf-ts-unknown-symbol
    desc: protobuf-ts unknown field symbol
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: Symbol.for("protobuf-ts/unknown")
  - id: protobuf-ts-message-type
    desc: protobuf-ts MessageType class
    crit: baseline
    conf: 0.97
    if:
      type: text
      substr: MessageType
  - id: google-protobuf-timestamp
    desc: Google protobuf Timestamp type
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: google.protobuf.Timestamp
composite_rules:
  - id: protobuf-ts-js
    desc: protobuf-ts JavaScript library
    crit: baseline
    conf: 0.99
    any:
      - id: protobuf-ts-runtime-module
      - id: protobuf-ts-unknown-symbol
      - id: google-protobuf-timestamp
