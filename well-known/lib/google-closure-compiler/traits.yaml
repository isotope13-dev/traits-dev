defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - jar
  - zip
  - class
  - javascript
  size_max: 5000000
traits:
- id: jscomp-command-line-runner
  desc: Google Closure Compiler CommandLineRunner
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: com/google/javascript/jscomp/CommandLineRunner
- id: jscomp-package-path
  desc: Google Closure Compiler package path
  crit: component
  conf: 0.9
  if:
    type: text
    substr: com/google/javascript/jscomp/
- id: closure-externs-zip
  desc: Google Closure Compiler externs archive
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: externs.zip
- id: closure-webkit-dom-externs
  desc: Google Closure WebKit DOM externs
  crit: component
  conf: 0.9
  if:
    type: path
    basename: true
    exact: webkit_dom.js
composite_rules:
- id: closure-compiler-jar
  desc: Google Closure Compiler jar
  crit: baseline
  conf: 0.95
  all:
  - id: jscomp-command-line-runner
  - id: jscomp-package-path
- id: closure-compiler-externs
  desc: Google Closure Compiler externs
  crit: baseline
  conf: 0.95
  any:
  - id: closure-externs-zip
  - id: closure-webkit-dom-externs
