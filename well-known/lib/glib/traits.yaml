defaults:
  platforms: [windows]
  for: [dll]
  size_min: 4096
  size_max: 4194304

traits:
  - id: glib-company-version
    desc: GLib developer version info
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version.company
      exact: The GLib developer community

  - id: gthread-original-filename
    desc: GThread original DLL filename
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version.original_filename
      exact: libgthread-2.0-0.dll

  - id: gthread-export
    desc: GThread initialization export
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: g_thread_init

composite_rules:
  - id: glib-gthread-library
    desc: GLib GThread runtime library
    crit: baseline
    conf: 0.99
    all:
      - id: glib-company-version
    any:
      - id: gthread-original-filename
      - id: gthread-export
