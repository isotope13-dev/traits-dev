defaults:
  platforms: [unix, windows]
  for: [php]

traits:
  - id: nette-framework-comment
    desc: Nette framework source comment
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "This file is part of the Nette Framework"

  - id: nette-namespace
    desc: Nette PHP namespace
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'namespace\s+Nette([\\;]|$)'

composite_rules:
  - id: nette-framework-source
    desc: Nette framework source
    crit: notable
    conf: 0.95
    all:
      - id: nette-framework-comment
      - id: nette-namespace
