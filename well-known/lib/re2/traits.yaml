defaults:
  platforms: [unix, windows]
  conf: 0.95

traits:
  - id: node-re2-native-addon-require
    desc: node-re2 native addon require
    crit: notable
    for: [javascript]
    if:
      type: text
      substr: "build/Release/re2.node"

  - id: abseil-vendored-ci-script
    desc: Vendored Abseil CI script
    crit: notable
    for: [shell]
    if:
      type: path
      basename: true
      exact: macos_xcode_bazel.sh
