defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 65536
traits:
  - id: libegl-basename
    desc: Chromium/ANGLE libEGL.dll basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      exact: libEGL.dll
      case_insensitive: true
  - id: libglesv2-basename
    desc: Chromium/ANGLE libGLESv2.dll basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      exact: libGLESv2.dll
      case_insensitive: true
  - id: vk-swiftshader-basename
    desc: Chromium SwiftShader Vulkan ICD basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      exact: vk_swiftshader.dll
      case_insensitive: true
  - id: d3dcompiler-basename
    desc: DirectX D3D compiler runtime basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '^d3dcompiler_\d+\.dll$'
      case_insensitive: true
composite_rules:
  - id: chromium-angle-graphics-lib
    desc: Chromium/ANGLE/SwiftShader graphics DLL
    crit: notable
    conf: 0.95
    any:
      - id: libegl-basename
      - id: libglesv2-basename
      - id: vk-swiftshader-basename
      - id: d3dcompiler-basename
