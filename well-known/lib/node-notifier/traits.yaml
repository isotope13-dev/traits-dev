defaults:
  platforms: [macos, windows]
  for: [binaries, plist]
  crit: baseline
  conf: 0.98
  size_min: 100
  size_max: 5000000

traits:
  - id: terminal-notifier-path
    desc: node-notifier terminal-notifier path
    crit: component
    platforms: [macos]
    for: [macho]
    if:
      type: path
      basename: true
      exact: terminal-notifier

  - id: snoretoast-path
    desc: node-notifier SnoreToast path
    crit: component
    platforms: [windows]
    for: [pe]
    if:
      type: path
      basename: true
      regex: '^snoretoast-x(64|86)\.exe$'

  - id: terminal-notifier-plist
    desc: terminal-notifier bundle plist
    platforms: [macos]
    for: [plist]
    if:
      type: value
      path: CFBundleIdentifier
      exact: nl.superalloy.oss.terminal-notifier
  - id: terminal-notifier-executable
    desc: terminal-notifier helper executable name
    crit: notable
    platforms: [macos]
    for: [plist]
    if:
      type: value
      path: CFBundleExecutable
      exact: terminal-notifier
  - id: terminal-notifier-plist-path
    desc: terminal-notifier bundle plist path
    platforms: [macos]
    for: [plist]
    if:
      type: path
      regex: 'terminal-notifier\.app[\\/]Contents[\\/]Info\.plist$'

composite_rules:
  - id: terminal-notifier-helper
    desc: node-notifier terminal-notifier helper
    crit: notable
    all:
      - id: terminal-notifier-path
      - id: micro-behaviors/ui/window/notify/message::nsusernotificationcenter-class

  - id: snoretoast-helper
    desc: node-notifier SnoreToast helper
    crit: notable
    all:
      - id: snoretoast-path
      - id: metadata/signed/developer::k-desktop-environment-e.v.

  - id: node-notifier-bundled-helper
    desc: node-notifier bundled platform notifier helper
    crit: notable
    conf: 0.98
    any:
      - id: terminal-notifier-plist
      - id: terminal-notifier-executable
      - id: terminal-notifier-plist-path
      - id: terminal-notifier-helper
      - id: snoretoast-helper
