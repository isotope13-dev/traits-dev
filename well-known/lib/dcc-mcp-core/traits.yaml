defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: DCC MCP Core package metadata identity
    if:
      type: value
      path: name
      exact: dcc-mcp-core

  - id: repository
    desc: DCC MCP Core upstream repository marker
    if:
      type: text
      substr: github.com/dcc-mcp/dcc-mcp-core
