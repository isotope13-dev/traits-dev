defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: DCC MCP Core package metadata identity
    if:
      type: value
      path: name
      exact: dcc-mcp-core

  - id: repository
    desc: DCC MCP Core upstream repository marker
    if:
      type: text
      substr: github.com/dcc-mcp/dcc-mcp-core

  - id: readme-heading
    desc: DCC MCP Core README heading
    for: [markdown]
    if:
      type: text
      regex: '(?m)^# dcc-mcp-core\s*$'

  - id: official-vx-installer-url
    desc: DCC MCP official vx installer URL
    crit: notable
    conf: 1.0
    for: [markdown, python]
    if:
      type: text
      substr: raw.githubusercontent.com/loonghao/vx/main/install.sh
