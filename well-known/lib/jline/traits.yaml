defaults:
  platforms: [windows, unix, macos]
  for: [jar, zip, class, pe, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: maven-coordinates
    desc: JLine Maven package marker
    if:
      type: text
      substr: META-INF/maven/jline/jline/pom.properties

  - id: windows-terminal-class
    desc: JLine Windows terminal class
    if:
      type: text
      substr: jline/WindowsTerminal.class

  - id: jansi-kernel32-bridge
    desc: Jansi Kernel32 bridge symbol
    if:
      type: text
      substr: Java_org_fusesource_jansi_internal_Kernel32_

composite_rules:
  - id: console-library
    desc: JLine console support library
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: maven-coordinates
      - id: windows-terminal-class
      - id: jansi-kernel32-bridge
