defaults:
  platforms: [windows, unix]
  for: [binaries]
  size_max: 67108864
traits:
  - id: jline-jar-basename
    desc: JLine bundled jar basename
    crit: baseline
    conf: 0.99
    if:
      type: basename
      regex: '(^|[\\/!])jline-\d+\.\d+\.\d+\.jar$'
  - id: console-reader-class
    desc: JLine ConsoleReader class path
    crit: baseline
    conf: 0.99
    if:
      type: basename
      regex: '(^|[\\/!])jline[\\/]console[\\/]ConsoleReader\.class$|(^|[\\/!])ConsoleReader\.class$'
  - id: console-reader-path
    desc: JLine ConsoleReader path marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      regex: '(^|[\\/!])jline[\\/]console[\\/]ConsoleReader\.class$'
  - id: jansi-kernel32-bridge
    desc: JLine Jansi Kernel32 bridge
    crit: baseline
    conf: 0.99
    for: [class, pe]
    if:
      type: text
      regex: 'org/fusesource/jansi/internal/Kernel32|jline/WindowsTerminal|AnsiConsole'
  - id: console-reader-keystroke-downgrade
    desc: Downgrade JLine keystroke string
    crit: baseline
    conf: 0.99
    if:
      id: credential/keylogger
    downgrade:
      any:
        - id: jline-jar-basename
        - id: console-reader-class
        - id: console-reader-path
