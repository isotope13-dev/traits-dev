defaults:
  platforms: [windows, unix]
  for: [class, java, jar, pe]
  size_max: 67108864
traits:
  - id: jline-jar-basename
    desc: JLine bundled jar basename
    crit: baseline
    conf: 0.99
    for: [class, java, jar]
    if:
      type: path
      basename: true
      regex: '^jline-\d+\.\d+\.\d+\.jar$'
  - id: console-reader-class
    desc: JLine ConsoleReader class path
    crit: baseline
    conf: 0.99
    for: [class, java, jar]
    if:
      type: path
      basename: true
      exact: 'ConsoleReader.class'
  - id: console-reader-path
    desc: JLine ConsoleReader path marker
    crit: baseline
    conf: 0.99
    for: [class, java, jar]
    if:
      type: text
      regex: '(^|[\\/!])jline[\\/]console[\\/]ConsoleReader\.class$'
  - id: console-reader-binary-marker
    desc: JLine ConsoleReader binary marker
    crit: baseline
    conf: 0.99
    for: [class, java, jar]
    if:
      type: text
      substr: jline/console/ConsoleReader
  - id: console-reader-descriptor
    desc: JLine ConsoleReader descriptor marker
    crit: baseline
    conf: 0.99
    for: [class, java, jar]
    if:
      type: text
      substr: Ljline/console/ConsoleReader;
  - id: console-reader-source-marker
    desc: JLine ConsoleReader source marker
    crit: baseline
    conf: 0.99
    for: [class, java, jar]
    if:
      type: text
      substr: ConsoleReader.java
  - id: stdlib-archive-path
    desc: JLine stdlib archive path marker
    crit: baseline
    conf: 0.99
    for: [class, java, jar]
    if:
      type: text
      substr: META-INF/jruby.home/lib/ruby/stdlib/jline/jline/
  - id: jansi-kernel32-bridge
    desc: JLine Jansi Kernel32 bridge
    crit: baseline
    conf: 0.99
    for: [class, jar, pe]
    if:
      type: text
      regex: 'org/fusesource/jansi/internal/Kernel32|jline/WindowsTerminal|AnsiConsole'
  - id: jansi-native-dll
    desc: JLine Jansi native DLL
    crit: baseline
    conf: 0.99
    for: [pe]
    if:
      type: path
      basename: true
      exact: 'jansi.dll'
  - id: jline-native-dll-basename
    desc: JLine native console bridge DLL
    crit: baseline
    conf: 0.99
    for: [pe]
    if:
      type: path
      basename: true
      regex: '^jline(32|64)\.dll$'
  - id: jline-native-jni-exports
    desc: JLine WindowsTerminal JNI exports
    crit: baseline
    conf: 0.99
    for: [pe]
    if:
      type: symbol
      regex: '^Java_jline_WindowsTerminal_'
composite_rules:
  - id: console-reader-context
    desc: JLine ConsoleReader context
    crit: notable
    conf: 0.99
    any:
      - id: jline-jar-basename
      - id: stdlib-archive-path
      - id: console-reader-class
      - id: console-reader-path
      - id: console-reader-binary-marker
      - id: console-reader-descriptor
      - id: console-reader-source-marker
  - id: jansi-runtime-context
    desc: JLine Jansi runtime context
    crit: baseline
    conf: 0.99
    any:
      - id: jansi-kernel32-bridge
      - id: jansi-native-dll
  - id: jline-native-context
    desc: JLine native console runtime context
    crit: notable
    conf: 0.99
    all:
      - id: jline-native-dll-basename
      - id: jline-native-jni-exports
