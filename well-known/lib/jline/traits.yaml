defaults:
  platforms: [windows, unix]
  for: [class, java, pe]
  size_max: 67108864
traits:
  - id: jline-jar-basename
    desc: JLine bundled jar basename
    crit: baseline
    conf: 0.99
    for: [class, java]
    if:
      type: basename
      regex: '(^|[\\/!])jline-\d+\.\d+\.\d+\.jar$'
  - id: console-reader-class
    desc: JLine ConsoleReader class path
    crit: baseline
    conf: 0.99
    for: [class, java]
    if:
      type: basename
      regex: '(^|[\\/!])jline[\\/]console[\\/]ConsoleReader\.class$|(^|[\\/!])ConsoleReader\.class$'
  - id: console-reader-path
    desc: JLine ConsoleReader path marker
    crit: baseline
    conf: 0.99
    for: [class, java]
    if:
      type: text
      regex: '(^|[\\/!])jline[\\/]console[\\/]ConsoleReader\.class$'
  - id: console-reader-binary-marker
    desc: JLine ConsoleReader binary marker
    crit: baseline
    conf: 0.99
    for: [class, java]
    if:
      type: text
      substr: jline/console/ConsoleReader
  - id: console-reader-descriptor
    desc: JLine ConsoleReader descriptor marker
    crit: baseline
    conf: 0.99
    for: [class, java]
    if:
      type: text
      substr: Ljline/console/ConsoleReader;
  - id: console-reader-source-marker
    desc: JLine ConsoleReader source marker
    crit: baseline
    conf: 0.99
    for: [class, java]
    if:
      type: text
      substr: ConsoleReader.java
  - id: nested-member-path
    desc: JLine nested archive member path
    crit: baseline
    conf: 0.99
    for: [class, java]
    if:
      type: basename
      regex: '(^|[\\/!]).*jline-\d+\.\d+\.\d+\.jar![^\\n]*'
  - id: jansi-kernel32-bridge
    desc: JLine Jansi Kernel32 bridge
    crit: baseline
    conf: 0.99
    for: [class, pe]
    if:
      type: text
      regex: 'org/fusesource/jansi/internal/Kernel32|jline/WindowsTerminal|AnsiConsole'
  - id: console-reader-keystroke-downgrade
    desc: Downgrade JLine keystroke string
    crit: baseline
    conf: 0.99
    if:
      id: credential/keylogger
    downgrade:
      any:
        - id: console-reader-context
composite_rules:
  - id: console-reader-context
    desc: JLine ConsoleReader context
    crit: baseline
    conf: 0.99
    any:
      - id: jline-jar-basename
      - id: console-reader-class
      - id: console-reader-path
      - id: console-reader-binary-marker
      - id: console-reader-descriptor
      - id: console-reader-source-marker
      - id: nested-member-path
