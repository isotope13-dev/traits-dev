defaults:
  platforms: [windows, unix]
  for:
    - pe
    - dll
    - elf
  size_max: 104857600
traits:
  - id: wine-builtin-dll
    desc: Wine builtin DLL marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Wine builtin DLL
  - id: wine-debug-symbols
    desc: Wine debug/runtime symbols
    crit: component
    conf: 0.95
    if:
      type: text
      substr: __wine_dbg_
  - id: winecrt0-path
    desc: Wine CRT source path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: dlls/winecrt0
composite_rules:
  - id: wine-runtime-component
    desc: Wine runtime component
    crit: component
    conf: 0.98
    any:
      - id: wine-builtin-dll
      - id: wine-debug-symbols
      - id: winecrt0-path
