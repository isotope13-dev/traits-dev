defaults:
  platforms: [windows, unix]
  for:
    - pe
    - dll
    - elf
  size_max: 104857600
traits:
  - id: wine-builtin-dll
    desc: Wine builtin DLL marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Wine builtin DLL
      section: rdata
  - id: wine-debug-symbols
    desc: Wine debug/runtime symbols
    crit: component
    conf: 0.95
    if:
      type: text
      substr: __wine_dbg_
      section: rdata
  - id: winecrt0-path
    desc: Wine CRT source path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: dlls/winecrt0
      section: rdata
  - id: wine-debug-channel
    desc: Wine debug channel marker
    crit: baseline
    conf: 0.95
    for: [elf, c, cpp]
    platforms: [linux]
    if:
      type: text
      substr: WINE_DEFAULT_DEBUG_CHANNEL
  - id: wine-rwx-loader-benign-marker
    desc: Wine runtime/source marker
    crit: notable
    conf: 0.95
    for: [pe, dll, elf, c, cpp]
    if:
      type: text
      regex: 'Wine builtin DLL|__wine_dbg_|WINE_DEFAULT_DEBUG_CHANNEL'
  - id: wine-source-tree
    desc: Wine source tree member
    crit: notable
    conf: 0.98
    for: [source, scripts, manifests, documents, data, archives, binaries]
    size_max: 300000000
    if:
      type: path
      substr: wine-10.0/
composite_rules:
  - id: wine-runtime-component
    desc: Wine runtime component
    crit: component
    conf: 0.98
    any:
      - id: well-known/lib/wine::wine-builtin-dll
      - id: well-known/lib/wine::wine-debug-channel
      - id: well-known/lib/wine::wine-debug-symbols
      - id: well-known/lib/wine::winecrt0-path
      - id: well-known/lib/wine::wine-source-tree
