defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.97

traits:
  - id: tcpdf-library-source
    desc: TCPDF-family PDF library source marker
    if:
      type: text
      regex: '(?i)This file is part of (Estitofo_)?TCPDF software library|@package com\.tecnick\.tcpdf'

  - id: tcpdf-font-file
    desc: TCPDF generated font-data source file
    if:
      type: text
      regex: '(?i)File name\s*:\s*tcpdf_font_data\.php'
