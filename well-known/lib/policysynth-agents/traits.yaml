# PolicySynth Agents is a published TypeScript agent and connector library.
# Its provider credential selection is expected library behavior; this narrow
# archive identity supplies benign context for objective credential rules.
defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: PolicySynth Agents npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@policysynth/agents'

  - id: upstream-repository
    desc: PolicySynth upstream repository reference
    if:
      type: text
      regex: 'github\.com/CitizensFoundation/policy-synth([/\\s"''`?#]|$)'

composite_rules:
  - id: benign-archive-context
    desc: Recognized PolicySynth Agents library archive
    crit: exception
    scope: archive
    all:
      - id: package-name
      - id: upstream-repository
