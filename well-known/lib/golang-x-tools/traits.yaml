defaults:
  platforms: [unix, windows]
  for: [go, javascript, kotlin, elf, macho, zip]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 104857600

traits:
  - id: source-archive-path
    for: [go, text]
    desc: golang.org/x/tools archive path
    if:
      type: path
      regex: 'golang\.org[\\/]x[\\/]tools@v'

  - id: module-path
    desc: golang.org/x/tools module path
    if:
      type: text
      substr: 'golang.org/x/tools'
