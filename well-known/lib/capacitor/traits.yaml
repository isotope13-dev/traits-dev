defaults:
  platforms: [windows, unix]
  for: [javascript, package.json]

traits:
  - id: core-package-name
    desc: Capacitor core package identity
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: text
      regex: '"name"\s*:\s*"@capacitor/core"'
  - id: official-homepage
    desc: Capacitor official package homepage
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: text
      substr: 'https://capacitorjs.com'
  - id: cordova-runtime-file
    desc: Capacitor Cordova runtime filename
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: path
      basename: true
      exact: cordova.js
      case_insensitive: true

composite_rules:
  - id: capacitor-cordova-runtime-context
    desc: Recognized Capacitor Cordova runtime
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: core-package-name
      - id: official-homepage
      - id: cordova-runtime-file
