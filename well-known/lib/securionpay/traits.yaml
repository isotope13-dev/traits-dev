defaults:
  platforms: [unix, windows]
  for: [php, composer.json]
  crit: component
  conf: 0.95
  size_min: 256
  size_max: 5242880

traits:
  - id: composer-package-name
    desc: SecurionPay PHP composer package
    for: [composer.json]
    if:
      type: value
      path: name
      exact: securionpay/securionpay-php
  - id: php-namespace
    desc: SecurionPay PHP namespace
    for: [php]
    if:
      type: text
      substr: namespace SecurionPay
  - id: php-gateway-class
    desc: SecurionPay gateway class
    for: [php]
    if:
      type: text
      regex: '\bclass\s+SecurionPayGateway\b'
  - id: php-curl-connection-class
    desc: SecurionPay cURL connection class
    for: [php]
    if:
      type: text
      regex: '\bclass\s+CurlConnection\s+extends\s+Connection\b'

composite_rules:
  - id: php-curl-connection
    desc: SecurionPay PHP SDK cURL connection
    crit: notable
    conf: 0.96
    for: [php]
    all:
      - id: php-namespace
      - id: php-curl-connection-class
  - id: php-sdk
    desc: SecurionPay PHP SDK
    crit: notable
    conf: 0.96
    any:
      - id: composer-package-name
      - id: php-gateway-class
      - id: php-curl-connection
