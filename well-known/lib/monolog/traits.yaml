defaults:
  platforms:
  - unix
  - windows
  for:
  - php
  crit: component
  conf: 0.96
  size_max: 5000000
traits:
- id: namespace
  desc: Monolog namespace marker
  if:
    type: text
    regex: namespace\s+.{0,80}Monolog\\
- id: package-doc
  desc: Monolog package doc marker
  if:
    type: text
    substr: part of the Monolog package
- id: handler-class
  desc: Monolog handler class marker
  if:
    type: text
    regex: class\s+(FirePHPHandler|TelegramBotHandler|ErrorHandler)\b
composite_rules:
- id: library-context
  desc: Monolog library context
  crit: baseline
  conf: 0.98
  any:
  - id: namespace
  - id: package-doc
- id: handler-context
  desc: Monolog handler context
  crit: baseline
  conf: 0.98
  all:
  - id: library-context
  - id: handler-class
