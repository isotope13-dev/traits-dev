# @bobfrankston/mailx-types is a shared, dependency-free library for the
# mailx email client's types and pure helper functions.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: '@bobfrankston/mailx-types package metadata name'
    if:
      type: value
      path: name
      exact: '@bobfrankston/mailx-types'

  - id: source-marker
    desc: mailx-types shared-library source marker
    for: [javascript, typescript]
    if:
      type: text
      substr: '@bobfrankston/mailx-types'

composite_rules:
  - id: package-identity
    desc: Recognized mailx-types library package context
    crit: notable
    conf: 0.99
    for: [package.json, javascript, typescript]
    scope: archive
    any:
      - id: package-name
      - id: source-marker
