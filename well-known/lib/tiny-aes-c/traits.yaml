# tiny-AES-c (https://github.com/kokke/tiny-AES-c) — small portable AES library
# in pure C. Frequently embedded in malware for in-binary payload encryption
# (Cobalt Strike beacon stagers, emp3r0r shellcode stagers, embedded firmware).
defaults:
  size_max: 52428800
  platforms: [unix, windows]
  for: [c, cpp]

traits:
- id: tiny-aes-c-github-url
  desc: tiny-AES-c GitHub URL in source
  crit: baseline
  conf: 0.97
  if:
    type: text
    regex: 'github\.com/kokke/tiny-AES-[Cc]'

- id: tiny-aes-c-xtime-symbol
  desc: tiny-AES-c xtime helper
  crit: component
  conf: 0.85
  if:
    type: symbol
    exact: xtime

- id: tiny-aes-c-xorwithiv-symbol
  desc: tiny-AES-c XorWithIv helper
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: XorWithIv

- id: tiny-aes-c-getsboxvalue-symbol
  desc: tiny-AES-c getSBoxValue helper
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: getSBoxValue

- id: tiny-aes-c-public-api--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '\bAES_(init_ctx|ctx_set_iv)\b'

  count_max: 1003659
- id: tiny-aes-c-public-api--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '\bAES_(ECB_encrypt|ECB_decrypt)\b'

  count_max: 1003660
- id: tiny-aes-c-public-api--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '\bAES_(CBC_encrypt_buffer|CBC_decrypt_buffer)\b'

  count_max: 1003661
- id: tiny-aes-c-public-api--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '\bAES_(CTR_xcrypt_buffer)\b'

  count_max: 1003662
composite_rules:
- id: tiny-aes-c-source
  desc: tiny-AES-c library bundled in C source
  crit: notable
  conf: 0.97
  all:
  - id: tiny-aes-c-xtime-symbol
  - id: tiny-aes-c-xorwithiv-symbol
  - id: tiny-aes-c-getsboxvalue-symbol
  - id: tiny-aes-c-public-api
- id: tiny-aes-c-public-api
  desc: tiny-AES-c public API name
  crit: component
  conf: 0.9
  any:
  - id: tiny-aes-c-public-api--rx-1
  - id: tiny-aes-c-public-api--rx-2
  - id: tiny-aes-c-public-api--rx-3
  - id: tiny-aes-c-public-api--rx-4
