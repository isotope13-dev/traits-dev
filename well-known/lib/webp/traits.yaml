defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 10000
  size_max: 2000000

traits:
  - id: libwebp-google-company
    desc: libwebp Google company metadata
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.company
      exact: Google, Inc.

  - id: libwebp-product-name
    desc: libwebp product name metadata
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.product_name
      regex: '^WebP Image (Demuxer|Library)$'

  - id: libwebp-file-description
    desc: libwebp DLL description metadata
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.description
      regex: '^libwebp(demux)? DLL$'

composite_rules:
  - id: libwebp-version-info
    desc: libwebp DLL version metadata
    crit: component
    conf: 0.97
    all:
      - id: libwebp-google-company
      - id: libwebp-product-name
      - id: libwebp-file-description
