# Twitch Helix API client (github.com/nicklaw5/helix).
#
# Strong third-party-API marker. The `nicklaw5/helix` Go package is the
# canonical Helix client; outside of Twitch-bot ecosystems almost nothing
# imports it. Detecting it gives the analyst clear attribution ("this
# binary talks to Twitch") which radically changes how downstream findings
# read — chat-moderation method names (BanUser, TimeoutUser, DeleteMessage)
# are mod-tool primitives in this context, not abuse signals.
defaults:
  platforms: [unix, windows]
  for: [go]
  size_min: 1024
  size_max: 524288000

traits:
  - id: helix-go-import
    desc: Imports nicklaw5/helix Twitch API client
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: 'github\.com/nicklaw5/helix(/v\d)?'

  - id: helix-new-client
    desc: helix.NewClient constructor call
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bhelix\.NewClient\s*\('

  - id: helix-options-struct
    desc: helix.Options literal initializer
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bhelix\.Options\s*\{'

  # Twitch moderation primitives — method names from the Helix client that
  # represent broadcaster/mod tooling. Detected as atoms here so a higher-
  # level composite can read them as "chat moderation tooling" alongside the
  # helix-context evidence. In a non-helix context the same names might be
  # custom; but with helix-context they're definitively Twitch mod actions.
  - id: twitch-mod-ban-user
    desc: Twitch BanUser moderation call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bBanUser(s)?\s*\('

  - id: twitch-mod-timeout-user
    desc: Twitch TimeoutUser moderation call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bTimeoutUser(s)?\s*\('

  - id: twitch-mod-delete-message
    desc: Twitch DeleteMessage moderation call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bDeleteMessage(s)?\s*\('

composite_rules:
  - id: helix-context
    desc: Go process is a Twitch Helix API client
    crit: notable
    conf: 0.97
    all:
      - id: helix-go-import
    any:
      - id: helix-new-client
      - id: helix-options-struct

  - id: twitch-moderation-tooling
    desc: Twitch chat moderation tool (ban / timeout / delete)
    crit: notable
    conf: 0.9
    # Requires Helix context — these method names alone could be a custom
    # implementation; paired with the helix client they unambiguously mean
    # Twitch mod actions.
    all:
      - id: helix-context
    any:
      - id: twitch-mod-ban-user
      - id: twitch-mod-timeout-user
      - id: twitch-mod-delete-message
