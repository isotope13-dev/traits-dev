# Prometheus client for Go (github.com/prometheus/client_golang).
#
# Production-metrics marker. Apps that register Prometheus metrics and
# expose a `/metrics` HTTP handler are part of a monitoring stack — clear
# benign-context signal.
defaults:
  platforms: [unix, windows]
  for: [go]
  crit: baseline
  conf: 0.95
  size_min: 1024
  size_max: 524288000

traits:
  - id: prometheus-go-import
    desc: Imports prometheus/client_golang
    if:
      type: text
      substr: 'github.com/prometheus/client_golang'

  - id: prometheus-promhttp-handler
    desc: Exposes promhttp.Handler /metrics endpoint
    if:
      type: text
      regex: '\bpromhttp\.Handler\s*\('

  - id: prometheus-register-call
    desc: prometheus.MustRegister metric registration
    if:
      type: text
      regex: '\bprometheus\.(MustRegister|Register)\s*\('

composite_rules:
  - id: prometheus-instrumentation
    desc: Go process exposes Prometheus metrics
    all:
      - id: prometheus-go-import
    any:
      - id: prometheus-promhttp-handler
      - id: prometheus-register-call
