defaults:
  platforms:
    - unix
    - windows
  for:
    - python
    - pkginfo
  size_max: 200000

traits:
  - id: pysocks-socksocket-class
    desc: PySocks socksocket class
    crit: component
    conf: 0.96
    for:
      - python
    if:
      type: text
      substr: "class socksocket"

  - id: pysocks-default-proxy-function
    desc: PySocks default proxy function
    crit: component
    conf: 0.96
    for:
      - python
    if:
      type: text
      substr: "def set_default_proxy"

  - id: pysocks-socks5-constant
    desc: PySocks SOCKS5 constant
    crit: component
    conf: 0.96
    for:
      - python
    if:
      type: text
      substr: "PROXY_TYPE_SOCKS5"

  - id: pysocks-metadata-name
    desc: PySocks metadata name
    crit: component
    conf: 0.96
    for:
      - pkginfo
    if:
      type: text
      substr: "Name: PySocks"

  - id: pysocks-metadata-summary
    desc: PySocks metadata summary
    crit: component
    conf: 0.96
    for:
      - pkginfo
    if:
      type: text
      substr: "A Python SOCKS client module"

composite_rules:
  - id: pysocks-socks-module
    desc: PySocks socks module implementation
    crit: notable
    conf: 0.96
    all:
      - id: pysocks-socksocket-class
      - id: pysocks-default-proxy-function
      - id: pysocks-socks5-constant

  - id: pysocks-package-metadata
    desc: PySocks package metadata
    crit: notable
    conf: 0.96
    all:
      - id: pysocks-metadata-name
      - id: pysocks-metadata-summary
