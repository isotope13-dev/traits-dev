defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  crit: notable
  conf: 0.96

traits:
  - id: twilio-sms-workflow-block
    desc: Roboflow Twilio SMS workflow block
    crit: notable
    if:
      type: text
      substr: roboflow_core/twilio_sms_notification@v2

composite_rules:
  - id: twilio-mms-ephemeral-upload
    desc: Roboflow workflow uploads image for Twilio MMS
    crit: exception
    conf: 0.98
    all:
      - id: twilio-sms-workflow-block
      - id: micro-behaviors/communications/http/services/file-hosting::public-file-or-payload-hosting
      - id: micro-behaviors/communications/http/upload::requests-post-files-parameter
      - id: micro-behaviors/data/encode/image/jpeg::helper-jpeg-encode-call
