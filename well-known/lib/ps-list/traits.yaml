defaults:
  platforms: [windows, unix]
  for: [package.json]
  crit: notable
  conf: 0.99
  size_max: 524288000

traits:
  - id: ps-list-package-name
    desc: ps-list process enumeration library package
    if:
      type: value
      path: name
      exact: ps-list

  - id: ps-list-fastlist-helper
    desc: ps-list bundled Fastlist process helper
    for: [pe, dll]
    if:
      type: path
      basename: true
      regex: '(?i)^fastlist(-[0-9]+\.[0-9]+\.[0-9]+)?-(x86|x64)\.exe$'

composite_rules:
  - id: ps-list-package-context
    desc: Recognized ps-list package with bundled process helper
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: ps-list-package-name
      - id: ps-list-fastlist-helper
