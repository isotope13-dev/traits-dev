defaults:
  platforms: [unix, windows]
  for: [shell, javascript, c, xml]
  crit: baseline
  conf: 0.97
  size_max: 268435456

traits:
- id: source-path-marker
  desc: libxslt source distribution path
  if:
    type: path
    regex: '(^|[\\/])libxslt-[0-9].{0,120}'
- id: source-text-marker--libxslt
  desc: libxslt source distribution text (libxslt)
  if:
    type: text
    word: libxslt
- id: source-text-marker--libxslt-2
  desc: libxslt source distribution text (LIBXSLT_)
  if:
    type: text
    word: LIBXSLT_
composite_rules:
- id: source-text-marker
  desc: libxslt source distribution text
  any:
  - id: source-text-marker--libxslt
  - id: source-text-marker--libxslt-2
- id: source-bundle
  desc: libxslt source distribution bundle
  crit: baseline
  conf: 0.97
  any:
  - id: well-known/lib/xslt::source-path-marker
  - id: well-known/lib/xslt::source-text-marker--libxslt
  - id: well-known/lib/xslt::source-text-marker--libxslt-2
