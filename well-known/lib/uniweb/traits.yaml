defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, npm, tar]
  crit: component
  conf: 0.98

traits:
  - id: package-name
    desc: Uniweb build package name
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@uniweb/build'

  - id: package-member-context
    desc: Uniweb build package member
    crit: notable
    for: [javascript, typescript]
    if:
      type: value
      path: package.json::name
      exact: '@uniweb/build'

  - id: s3-cloudfront-adapter
    desc: Uniweb S3 CloudFront adapter source
    crit: notable
    for: [javascript]
    if:
      type: text
      substr: S3 + CloudFront host adapter
