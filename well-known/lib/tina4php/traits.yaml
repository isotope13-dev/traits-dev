defaults:
  platforms: [unix, windows]
  for: [php, composer.json, javascript]
  crit: baseline
  conf: 0.95

traits:
  - id: tina4php-composer-name
    desc: Tina4PHP Composer package
    for: [composer.json]
    if:
      type: value
      path: name
      exact: tina4stack/tina4php
  - id: tina4php-namespace
    desc: Tina4PHP namespace
    for: [php]
    if:
      type: text
      regex: 'namespace\s+Tina4\\|use\s+Tina4\\'
  - id: tina4php-cli
    desc: Tina4PHP CLI command
    for: [php]
    if:
      type: text
      substr: bin/tina4php

composite_rules:
  - id: tina4php-framework
    desc: Tina4PHP framework component
    crit: notable
    conf: 0.95
    any:
      - id: tina4php-composer-name
      - id: tina4php-namespace
      - id: tina4php-cli
