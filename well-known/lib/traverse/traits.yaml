defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: traverse npm package name
    if:
      type: value
      path: name
      exact: traverse
  - id: expresso-dev-dependency
    desc: traverse declares expresso test dependency
    if:
      type: value
      path: devDependencies.expresso
      exists: true

composite_rules:
  - id: traverse-expresso-test-dependency
    desc: traverse package uses expresso for tests
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: expresso-dev-dependency
