# SheetJS xlsx is a spreadsheet parser/writer.  Its browser bundle contains
# compatibility code for old Internet Explorer and deliberately minified
# conversion routines; those strings are not registry persistence or malware
# obfuscation.
defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, crx]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: SheetJS xlsx package identity
    for: [package.json]
    if:
      type: value
      path: name
      exact: xlsx

  - id: package-author
    desc: SheetJS xlsx package author
    for: [package.json]
    if:
      type: value
      path: author
      exact: sheetjs

  - id: package-member-path
    desc: SheetJS xlsx package member path
    for: [javascript]
    if:
      type: path
      regex: '(?i)(^|[/\\])xlsx[/\\]'

  - id: sheetjs-source-marker
    desc: SheetJS source attribution marker
    for: [javascript]
    if:
      type: text
      regex: '(?i)xlsx\.js\s+\(C\)\s+2013-present\s+SheetJS|SheetJS Spreadsheet data parser'

  - id: vendor-bundle-path
    desc: SheetJS xlsx vendor bundle path
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '^xlsx(\.(full|mini))?\.min\.js$'

composite_rules:
  - id: bundled-source-context
    desc: Recognized SheetJS xlsx source bundle
    crit: exception
    conf: 0.99
    all:
      - id: package-member-path
      - id: sheetjs-source-marker

  - id: vendor-bundle-context
    desc: Recognized vendored SheetJS xlsx bundle
    crit: exception
    conf: 0.99
    all:
      - id: vendor-bundle-path
      - id: sheetjs-source-marker

  - id: package-context
    desc: Recognized SheetJS xlsx dependency context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: package-author
      - id: package-member-path
      - id: sheetjs-source-marker
