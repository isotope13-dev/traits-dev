defaults:
  platforms: [linux, macos, windows]
  for: [binaries, jar, javascript, ruby, python, vbs, c, lua, archives, zip]
  crit: notable
  conf: 0.96
  size_max: 600000000

traits:
  - id: deltalake-native-extension
    crit: notable
    desc: Delta Lake native Python extension
    for: [elf, macho, pe]
    if:
      type: basename
      exact: _internal.abi3.so

  - id: telegram-desktop-binary
    crit: notable
    desc: Telegram Desktop executable basename
    for: [pe]
    if:
      type: basename
      exact: Telegram.exe

  - id: ffprobe-binary
    crit: notable
    desc: FFprobe executable basename
    for: [pe, elf, macho]
    if:
      type: basename
      regex: '^(ffprobe|ffprobe\.exe)$'

  - id: sdl2-runtime-library
    crit: notable
    desc: SDL2 runtime library
    for: [pe, dll]
    if:
      type: basename
      regex: '^SDL2(-[0-9]+)?\.dll$'

  - id: mpv-runtime-library
    crit: notable
    desc: mpv runtime library
    for: [pe, dll]
    if:
      type: basename
      regex: '^libmpv(-[0-9]+)?\.dll$'

  - id: handbrake-core-dll
    crit: notable
    desc: HandBrake core library basename
    for: [pe, dll]
    if:
      type: basename
      exact: hb.dll

  - id: tauri-frame-app
    desc: Frame Tauri desktop app
    for: [pe]
    if:
      type: basename
      exact: frame.exe

  - id: aws-iam-authenticator-binary
    crit: notable
    desc: AWS IAM Authenticator binary
    for: [pe, elf, macho]
    if:
      type: basename
      regex: '^aws-iam-authenticator(_.*)?(\.exe)?$'

  - id: tabby-release-runtime-path
    crit: notable
    desc: Tabby release runtime path
    for: [elf, macho, pe]
    if:
      type: path
      regex: 'tabby_x86_64[^\\/]*[\\/]tabby$'

  - id: firefox-libxul
    crit: notable
    desc: Firefox libxul runtime library
    for: [elf, macho, pe]
    if:
      type: basename
      regex: '^libxul\.(so|dylib|dll)$'

  - id: firefox-xul-dll
    crit: notable
    desc: Firefox XUL Windows runtime library
    for: [pe, dll]
    if:
      type: basename
      exact: xul.dll

  - id: dotnet-aspnetcore-dataprotection
    crit: notable
    desc: ASP.NET Core DataProtection runtime library
    for: [pe, dll]
    if:
      type: basename
      exact: Microsoft.AspNetCore.DataProtection.dll

  - id: dotnet-aspnetcore-keyderivation
    crit: notable
    desc: ASP.NET Core KeyDerivation runtime library
    for: [pe, dll]
    if:
      type: basename
      exact: Microsoft.AspNetCore.Cryptography.KeyDerivation.dll

  - id: dotnet-aspnetcore-crypto-internal
    crit: notable
    desc: ASP.NET Core crypto internal runtime
    for: [pe, dll]
    if:
      type: basename
      exact: Microsoft.AspNetCore.Cryptography.Internal.dll

  - id: pinvoke-kernel32-library
    crit: notable
    desc: PInvoke.Kernel32 reference library
    for: [pe, dll]
    if:
      type: basename
      regex: '^(Vanara\.)?PInvoke\.Kernel32\.dll$'

  - id: pihole-ftl-binary
    crit: notable
    desc: Pi-hole FTL binary
    for: [elf]
    if:
      type: basename
      exact: pihole-FTL

  - id: deno-runtime-basename
    crit: component
    desc: Deno runtime basename
    for: [elf]
    if:
      type: basename
      regex: '^deno(rt)?$'

  - id: deno-runtime-marker
    crit: component
    desc: Deno runtime embedded marker
    for: [elf]
    if:
      type: text
      section: .rodata
      substr: "deno_runtime::"

  - id: openjdk-fontmanager
    crit: notable
    desc: OpenJDK fontmanager library
    for: [macho, elf, pe]
    if:
      type: basename
      regex: '^libfontmanager\.(dylib|so|dll)$'

  - id: openjdk-source-archive-path
    crit: notable
    desc: JDK source archive path
    for: [zip, java]
    if:
      type: path
      regex: '(^|[\\/])src\.zip'

  - id: rt-jar-basename
    crit: component
    desc: Java runtime archive basename
    for: [jar]
    if:
      type: basename
      exact: rt.jar

  - id: large-java-runtime-jar
    crit: component
    desc: Large Java runtime jar
    for: [jar]
    size_min: 10485760
    if:
      type: metrics
      field: archive.file_count
      min: 10000

  - id: pinokio-bin
    crit: notable
    desc: Pinokio packaged native runtime
    for: [elf, macho, pe]
    if:
      type: basename
      exact: pinokio-bin

  - id: node-windows-utils-addon
    crit: notable
    desc: windows-utils Node addon
    for: [pe, dll]
    if:
      type: path
      regex: 'windows-utils[\\/]dist[\\/]'

  - id: rocksdbjni-native-library
    crit: notable
    desc: RocksDB JNI native library
    for: [elf, macho, pe]
    if:
      type: basename
      regex: '^librocksdbjni.*\.(so|dylib|jnilib|dll)$'

  - id: xalan-library-jar
    crit: notable
    desc: Apache Xalan library jar
    for: [jar]
    if:
      type: basename
      regex: '^xalan-[0-9][A-Za-z0-9._-]*\.jar$'

  - id: groovy-runtime-jar
    crit: notable
    desc: Apache Groovy runtime jar
    for: [jar]
    if:
      type: basename
      regex: '^groovy-[0-9][A-Za-z0-9._-]*\.jar$'

  - id: pywin32-scriptutils
    crit: notable
    desc: pywin32 scriptutils helper
    for: [python]
    if:
      type: path
      regex: 'framework[\\/]scriptutils\.py$'

  - id: pidgin-source-file
    crit: notable
    desc: Pidgin source file
    for: [c]
    if:
      type: basename
      exact: gntpounce.c

  - id: pidgin-gntclipboard-source-file
    crit: notable
    desc: Pidgin Finch clipboard source file
    for: [c]
    if:
      type: basename
      exact: gntclipboard.c

  - id: pidgin-gtkpounce-source-file
    crit: notable
    desc: Pidgin GTK pounce source file
    for: [c]
    if:
      type: basename
      exact: gtkpounce.c

  - id: spandsp-msvc-helper
    crit: notable
    desc: SpanDSP MSVC helper script
    for: [vbs]
    if:
      type: basename
      exact: util.vbs

  - id: deno-source-archive
    crit: notable
    desc: Deno source archive
    for: [tar]
    if:
      type: basename
      regex: '^[0-9a-f]{64}-deno_src\.tar\.gz$'

  - id: node-source-tree
    crit: notable
    desc: Node.js source tree path
    for: [source, scripts, javascript, typescript, c, cpp, rust, python, perl, makefile, json, package.json, pdf, zip, archives]
    if:
      type: path
      regex: 'node-v[0-9][^\\/]*[\\/]'

  - id: node-windows-distribution-archive
    crit: notable
    desc: Node.js Windows distribution archive
    for: [archive, zip, 7z]
    if:
      type: basename
      regex: '(?i)node-v[0-9][^-]*-win-(x64|x86|arm64)\.(zip|7z)$'

  - id: node-windows-runtime-binary
    crit: notable
    desc: Node.js Windows runtime binary
    for: [pe]
    size_min: 1048576
    size_max: 209715200
    if:
      type: basename
      exact: node.exe

  - id: bundled-npm-source
    crit: notable
    desc: Bundled npm source path
    for: [javascript, markdown, batch]
    size_max: 2097152
    if:
      type: path
      regex: 'node_modules[\\/]npm[\\/]'

  - id: node-install-tools-batch
    crit: notable
    desc: Node.js Windows install_tools helper
    for: [batch]
    size_max: 65536
    if:
      type: basename
      exact: install_tools.bat

  - id: openjdk-testimage-archive
    crit: notable
    desc: OpenJDK test image archive
    for: [archive, zip]
    if:
      type: basename
      regex: '(?i)OpenJDK[0-9A-Za-z_-]*-testimage_[^\\/]+\.zip$'

  - id: php-source-archive-basename
    crit: notable
    desc: PHP source archive basename
    for: [archive, tar, zst]
    if:
      type: basename
      exact: php.tar.xz

  - id: php-version-source-dir
    crit: notable
    desc: PHP version source directory
    for: [binaries, scripts, source, github-actions, jpeg, zip, php, javascript]
    if:
      type: path
      regex: 'php-[0-9][^\\/]*[\\/]'

  - id: php-core-subtree-path
    crit: notable
    desc: PHP core source subtree
    for: [binaries, scripts, source, github-actions, jpeg, zip, php, javascript]
    if:
      type: path
      # Generic ext/ and win32/ directory names occur in many ecosystems.
      # Zend/ and sapi/ are the shallow PHP-specific subtree markers.
      regex: '(^|[\\/])(Zend|sapi)[\\/]'

  - id: php-runtime-lib-path
    crit: notable
    desc: PHP runtime library path
    for: [binaries, scripts, source, php]
    if:
      type: path
      regex: 'lib[\\/]php[\\/]'

  - id: php-pear-share-path
    crit: notable
    desc: PEAR library share path
    for: [binaries, scripts, source, php]
    if:
      type: path
      # Keep ≤2 path separators for archive/extract portability.
      regex: 'php[\\/]pear([\\/]|$)'

  - id: php-runtime-include-path
    crit: notable
    desc: PHP runtime include path
    for: [source]
    if:
      type: path
      regex: 'include[\\/]php[\\/]'

  - id: php-runtime-binary
    crit: notable
    desc: PHP runtime binary basename
    for: [elf, pe, macho]
    if:
      type: basename
      regex: '^php(-fpm)?$'

  - id: curl-runtime-library
    crit: baseline
    desc: libcurl runtime library object
    for: [elf, macho, pe]
    if:
      type: basename
      regex: 'libcurl\.so(\.[0-9]+)*$'

  - id: curl-windows-runtime-product
    crit: baseline
    desc: Windows libcurl product identity
    for: [pe]
    if:
      type: value
      path: pe.version.product_name
      exact: The curl library

  - id: curl-windows-runtime-internal-name
    crit: baseline
    desc: Windows libcurl internal name
    for: [pe]
    if:
      type: value
      path: pe.version.internal_name
      exact: libcurl

  - id: curl-static-library-archive
    crit: notable
    desc: libcurl static library archive
    for: [archive]
    if:
      type: basename
      exact: libcurl.a

  - id: underscore-esm-distribution
    desc: Underscore.js ESM distribution file
    crit: notable
    conf: 0.99
    for: [javascript, typescript]
    if:
      type: basename
      exact: underscore-esm-min.js

  - id: pg-ruby-library
    crit: notable
    desc: pg Ruby library
    for: [ruby]
    if:
      type: path
      regex: 'lib[\\/]pg[\\/]connection\.rb$'

  - id: breezy-urllib-transport
    crit: notable
    desc: Breezy urllib transport
    for: [python]
    if:
      type: path
      regex: 'transport[\\/]http[\\/]urllib\.py$'

  - id: breezy-ssh-transport
    crit: notable
    desc: Breezy SSH transport
    for: [python]
    ref: sha256:4d9e38aacdc25dff620163647fad0849902b08f53fdf1b86bc38fd7c11bc55aa
    if:
      type: path
      regex: 'transport[\\/]ssh\.py$'

  - id: windows-winmd-metadata
    crit: notable
    desc: Windows Runtime metadata file
    for: [pe]
    if:
      type: basename
      exact: Windows.winmd

composite_rules:
  - id: curl-windows-runtime-library
    crit: notable
    desc: Windows libcurl runtime library identity
    all:
      - id: curl-windows-runtime-product
      - id: curl-windows-runtime-internal-name

  - id: deno-runtime-binary
    desc: Deno runtime binary
    crit: notable
    conf: 0.98
    for: [elf]
    all:
      - id: deno-runtime-basename
      - id: deno-runtime-marker

  - id: openjdk-rt-jar
    desc: OpenJDK runtime class archive
    crit: notable
    conf: 0.98
    for: [jar]
    all:
      - id: rt-jar-basename
      - id: large-java-runtime-jar

  - id: dotnet-aspnetcore-crypto-runtime
    desc: ASP.NET Core cryptography runtime libraries
    crit: notable
    conf: 0.96
    any:
      - id: dotnet-aspnetcore-dataprotection
      - id: dotnet-aspnetcore-keyderivation
      - id: dotnet-aspnetcore-crypto-internal

  - id: php-source-tree
    desc: PHP source tree path
    crit: notable
    conf: 0.98
    for: [binaries, scripts, source, github-actions, jpeg, zip, tar, archive, zst, php, javascript]
    any:
      - id: php-source-archive-basename
      - id: php-version-source-dir
      - id: php-core-subtree-path

  - id: php-runtime-package
    desc: PHP runtime package path
    crit: notable
    conf: 0.98
    for: [binaries, scripts, source, php]
    any:
      - id: php-runtime-lib-path
      - id: php-runtime-include-path
      - id: php-runtime-binary
      - id: curl-runtime-library
      - id: php-pear-share-path

  - id: tauri-frame-runtime
    desc: Frame Tauri runtime
    crit: notable
    conf: 0.98
    all:
      - id: tauri-frame-app
      - id: metadata/build/framework::tauri-runtime
