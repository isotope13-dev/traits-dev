defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.96
  size_max: 8388608

traits:
  - id: js-bundle
    desc: Video.js browser bundle
    if:
      type: path
      regex: '(^|[\\/])video(\\.core|\\.novtt)?(\\.min)?\\.js$'
  - id: lang-bundle
    desc: Video.js language bundle
    if:
      type: path
      regex: '(^|[\\/])lang[\\/][a-zA-Z-]+\\.js$'
  - id: alt-bundle
    desc: Video.js alternate bundle
    if:
      type: path
      regex: '(^|[\\/]alt[\\/]video)$'

composite_rules:
  - id: release-bundle
    desc: Video.js release bundle
    any:
      - id: well-known/lib/videojs
