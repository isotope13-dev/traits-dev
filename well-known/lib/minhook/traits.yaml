# MinHook (Tsuda Kageyu) — minimalistic Windows API hooking library.
# This fingerprint is used as benign context so generic patching/injection
# primitives in the library source are not mislabeled as shellcode loading.
defaults:
  platforms: [windows]
  for: [c, cpp]
  size_max: 1048576

traits:
  - id: minhook-banner
    desc: MinHook library banner in source
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: MinHook - The Minimalistic API Hooking Library for x64/x86

  - id: tsuda-kageyu-copyright
    desc: Tsuda Kageyu copyright banner
    crit: component
    conf: 0.99
    if:
      type: text
      substr: Copyright (C) 2009-2017 Tsuda Kageyu.

  - id: minhook-header-include
    desc: MinHook public header include
    crit: component
    conf: 0.97
    if:
      type: text
      exact: '#include "../include/MinHook.h"'

  - id: stb-minhook-header-include
    desc: stb_minhook bundled header include
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: ^stb_minhook(_v[0-9]+)?\.h$

  - id: minhook-createhook-api
    desc: MinHook CreateHook API name
    crit: component
    conf: 0.96
    if:
      type: text
      word: MH_CreateHookApiEx

  - id: minhook-status-helper
    desc: MinHook status helper name
    crit: component
    conf: 0.96
    if:
      type: text
      word: MH_StatusToString

  - id: minhook-enablehook-api
    desc: MinHook enable hook API name
    crit: component
    conf: 0.97
    if:
      type: symbol
      exact: MH_EnableHook

  - id: minhook-disablehook-api
    desc: MinHook disable hook API name
    crit: component
    conf: 0.97
    if:
      type: symbol
      exact: MH_DisableHook

composite_rules:
  - id: minhook-api-burst
    desc: Multiple MinHook public API names
    crit: component
    conf: 0.96
    needs: 2
    any:
      - id: minhook-createhook-api
      - id: minhook-status-helper
      - id: micro-behaviors/process/hook/interception::minhook-init-source
      - id: minhook-enablehook-api
      - id: minhook-disablehook-api

  - id: minhook-source-context
    desc: MinHook source identity marker
    crit: component
    conf: 0.98
    any:
      - id: minhook-banner
      - id: stb-minhook-header-include

  - id: minhook-source
    desc: MinHook API hooking library source
    crit: baseline
    conf: 0.99
    all:
      - id: minhook-source-context
    any:
      - id: tsuda-kageyu-copyright
      - id: minhook-header-include
      - id: minhook-api-burst
