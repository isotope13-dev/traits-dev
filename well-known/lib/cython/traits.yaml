defaults:
  platforms: [unix, windows]
  for: [python, apk, whl, tar, zip]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 524288000

traits:
  - id: cython-package-name
    desc: Cython package name
    ref: sha256:2ef7985607d6aa8290f86b617df1551b8e88910e195ba1bf5668b902a60d312d
    if:
      type: text
      regex: '(?i)\b(py3(\.\d+)?-cython|cython)\b'
  - id: cython-package-path
    desc: Cython Python package path
    ref: sha256:2ef7985607d6aa8290f86b617df1551b8e88910e195ba1bf5668b902a60d312d
    if:
      type: path
      regex: 'Cython[\\/](Compiler|Build|Debugger)[\\/]'
  - id: cython-main-script
    desc: Cython main script
    ref: sha256:2ef7985607d6aa8290f86b617df1551b8e88910e195ba1bf5668b902a60d312d
    if:
      type: text
      substr: 'Cython -- Main Program'

composite_rules:
  - id: cython-compiler-library
    desc: Cython compiler library context
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: cython-package-name
      - id: cython-package-path
      - id: cython-main-script
