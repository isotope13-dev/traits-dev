defaults:
  size_max: 52428800
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  crit: baseline
  conf: 0.9
traits:
  - id: ffmpeg-av-malloc
    desc: FFmpeg av_malloc symbol
    crit: component
    if:
      type: symbol
      exact: av_malloc
  - id: ffmpeg-av-free
    desc: FFmpeg av_free symbol
    crit: component
    if:
      type: symbol
      exact: av_free
  - id: ffmpeg-av-log
    desc: FFmpeg av_log symbol
    crit: component
    if:
      type: symbol
      exact: av_log
composite_rules:
  - id: ffmpeg-lib-marker
    desc: FFmpeg/Libav multimedia library marker
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: ffmpeg-av-malloc
      - id: ffmpeg-av-free
      - id: ffmpeg-av-log
