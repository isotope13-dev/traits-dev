defaults:
  size_max: 268435456
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  crit: baseline
  conf: 0.9
traits:
  - id: ffmpeg-product-versioninfo
    desc: FFmpeg ProductName version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.product_name
      exact: FFmpeg

  - id: ffmpeg-description-versioninfo
    desc: FFmpeg FileDescription version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.description
      regex: '^FFmpeg\b'

  - id: ffmpeg-av-malloc
    desc: FFmpeg av_malloc symbol
    crit: component
    if:
      type: symbol
      exact: av_malloc
  - id: ffmpeg-av-free
    desc: FFmpeg av_free symbol
    crit: component
    if:
      type: symbol
      exact: av_free
  - id: ffmpeg-av-log
    desc: FFmpeg av_log symbol
    crit: component
    if:
      type: symbol
      exact: av_log
  - id: ffmpeg-program-debug-name
    desc: FFmpeg program debug name string
    crit: component
    conf: 0.98
    if:
      type: text
      section: .edata
      substr: ffmpeg_g.exe
  - id: ffmpeg-version-string
    desc: FFmpeg program version string
    crit: component
    conf: 0.99
    if:
      type: text
      section: .rdata
      regex: '(?i)^FFmpeg version [0-9]+\.[0-9]+'
  - id: ffmpeg-source-tree-marker
    desc: FFmpeg embedded source tree marker
    crit: component
    conf: 0.99
    if:
      type: text
      section: .rdata
      regex: '(?i)(^|[/:\\])ffmpeg[\\/]src[\\/]fftools[\\/]'
composite_rules:
  - id: ffmpeg-lib-marker
    desc: FFmpeg/Libav multimedia library marker
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: well-known/lib/ffmpeg::ffmpeg-av-free
      - id: well-known/lib/ffmpeg::ffmpeg-av-log
      - id: well-known/lib/ffmpeg::ffmpeg-av-malloc
      - id: well-known/lib/ffmpeg::ffmpeg-description-versioninfo
      - id: well-known/lib/ffmpeg::ffmpeg-program-debug-name
      - id: well-known/lib/ffmpeg::ffmpeg-product-versioninfo
      - id: well-known/lib/ffmpeg::ffmpeg-version-string
      - id: well-known/lib/ffmpeg::ffmpeg-source-tree-marker
