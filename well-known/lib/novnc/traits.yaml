defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
  - id: source-path
    desc: noVNC source member path
    crit: notable
    conf: 0.98
    if:
      type: path
      substr: novnc/

  - id: name-marker
    desc: noVNC source name marker
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)noVNC|RFB keysyms'

  - id: rfb-marker
    desc: noVNC RFB implementation marker
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)RFB\.messages|pseudoEncodingVMware|pseudoEncodingQEMU'

  - id: ancillary-marker
    desc: noVNC implementation support marker
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)AsyncClipboard|mozilla\.org/mozilla-central'

composite_rules:
  - id: protocol-marker
    desc: noVNC RFB protocol implementation marker
    crit: notable
    conf: 0.98
    any:
      - id: name-marker
      - id: rfb-marker
      - id: ancillary-marker

  - id: source-context
    desc: Recognized noVNC source library context
    crit: exception
    conf: 0.99
    all:
      - id: source-path
      - id: protocol-marker
