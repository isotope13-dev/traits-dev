defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, python, go]

traits:
  - id: sdk-name
    desc: StitchAPIs SDK name
    crit: notable
    conf: 0.92
    if:
      type: text
      word: StitchAPIs
      case_insensitive: true
  - id: api-host
    desc: StitchAPIs service API host
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: api.stitchapis.io
      case_insensitive: true

composite_rules:
  - id: sdk
    desc: StitchAPIs multi-language SDK
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: sdk-name
      - id: api-host
