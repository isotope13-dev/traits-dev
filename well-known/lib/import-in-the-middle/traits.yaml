# Node.js import-in-the-middle is a legitimate loader/instrumentation library.
# Its loader implementation intentionally rebinds `require` while resolving
# built-in modules; that is not package impersonation or a shadowing attack.
defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: package-name
    desc: import-in-the-middle package name
    crit: notable
    conf: 0.99
    if:
      type: value
      path: name
      exact: import-in-the-middle

  - id: package-description
    desc: Node.js import instrumentation description
    crit: notable
    conf: 0.99
    if:
      type: value
      path: description
      substr: Intercept imports in Node.js

  - id: create-require-import-meta
    desc: Import-in-the-middle loader signature
    crit: notable
    conf: 0.99
    for: [javascript, typescript]
    if:
      type: text
      regex: 'createRequire\(import\.meta\.url\)[\s\S]{0,992}getExportsForNodeBuiltIn'

  - id: node-builtin-module-loader
    desc: Node loader resolves built-in modules
    crit: notable
    conf: 0.99
    for: [javascript, typescript]
    if:
      type: text
      substr: getExportsForNodeBuiltIn

composite_rules:
  - id: import-in-the-middle-package-context
    desc: import-in-the-middle package manifest context
    crit: notable
    conf: 0.99
    all:
      - id: package-name
      - id: package-description

  - id: import-in-the-middle-library-context
    desc: Recognized import-in-the-middle instrumentation library context
    crit: exception
    conf: 0.99
    for: [package.json, javascript, typescript]
    scope: archive
    any:
      - id: import-in-the-middle-loader-source
      - id: import-in-the-middle-package-context

  - id: import-in-the-middle-loader-source
    desc: import-in-the-middle built-in loader source
    crit: notable
    conf: 0.99
    for: [javascript, typescript]
    all:
      - id: create-require-import-meta
      - id: node-builtin-module-loader
