defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.96

traits:
  - id: npm-systeminformation-module
    desc: npm systeminformation module
    if:
      type: path
      regex: 'node_modules[\\/]systeminformation[\\/]'
  - id: systeminformation-library-header
    desc: System Information library source header
    if:
      type: text
      substr: 'Description:   System Information - library'
  - id: npm-systeminformation-package
    desc: npm systeminformation package artifact
    for: [npm, tar]
    if:
      type: path
      basename: true
      case_insensitive: true
      regex: '^systeminformation(-[0-9][^:/\\\\]{1,80})?\\.(tgz|tar|gz)$'
