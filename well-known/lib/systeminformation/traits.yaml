defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: filesystem-module-path
    desc: systeminformation filesystem module path
    for: [javascript]
    if:
      type: path
      regex: '(^|[\\/!])node_modules[\\/]systeminformation[\\/]lib[\\/]filesystem\.js$'
  - id: filesystem-module-basename
    desc: systeminformation filesystem module basename
    for: [javascript]
    if:
      type: basename
      exact: filesystem.js
  - id: diskstats-probe
    desc: systeminformation diskstats probe
    for: [javascript]
    if:
      type: text
      substr: /proc/diskstats
  - id: system-module-path
    desc: systeminformation system module path
    for: [javascript]
    if:
      type: path
      regex: '(^|[\\/!])node_modules[\\/]systeminformation[\\/]lib[\\/]system\.js$'
  - id: system-module-basename
    desc: systeminformation system module basename
    for: [javascript]
    if:
      type: basename
      exact: system.js
  - id: dmidecode-system-probe
    desc: systeminformation dmidecode system probe
    for: [javascript]
    if:
      type: text
      substr: dmidecode -t system
  - id: asar-filesystem-module-member
    desc: systeminformation filesystem module ASAR member
    for: [data]
    size_min: 10240
    if:
      type: value
      path: archive.members[*].path
      exact: node_modules/systeminformation/lib/filesystem.js
  - id: asar-package-json-member
    desc: systeminformation package metadata ASAR member
    for: [data]
    size_min: 10240
    if:
      type: value
      path: archive.members[*].path
      exact: node_modules/systeminformation/package.json

composite_rules:
  - id: filesystem-module
    desc: systeminformation filesystem module
    for: [javascript]
    all:
      - id: filesystem-module-path
      - id: filesystem-module-basename
      - id: diskstats-probe
  - id: system-module
    desc: systeminformation system module
    for: [javascript]
    all:
      - id: system-module-path
      - id: system-module-basename
      - id: dmidecode-system-probe
  - id: asar-bundled-library
    desc: systeminformation bundled in ASAR
    all:
      - id: asar-filesystem-module-member
      - id: asar-package-json-member
