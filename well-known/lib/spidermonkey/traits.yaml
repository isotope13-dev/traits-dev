defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll, elf, macho]
  crit: component
  conf: 0.95
  size_min: 512
  size_max: 52428800

traits:
  - id: js-init-export
    desc: SpiderMonkey JS_Init export
    if:
      type: export
      exact: JS_Init

  - id: js-evaluate-script-export
    desc: SpiderMonkey JS_EvaluateScript export
    if:
      type: export
      exact: JS_EvaluateScript

  - id: js-new-context-export
    desc: SpiderMonkey JS_NewContext export
    if:
      type: export
      exact: JS_NewContext

composite_rules:
  - id: spidermonkey-js-engine
    desc: Mozilla SpiderMonkey JavaScript engine library
    crit: baseline
    conf: 0.99
    all:
      - id: metadata/binary/metrics/threshold::many-exports-100
    any:
      - id: js-init-export
      - id: js-evaluate-script-export
      - id: js-new-context-export
    needs: 3
