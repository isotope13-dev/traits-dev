defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: abaplint-core-package-name
    desc: ABAP lint core npm package
    crit: notable
    conf: 1.0
    if:
      type: value
      path: name
      exact: '@abaplint/core'
  - id: abaplint-core-repository
    desc: ABAP lint GitHub repository
    crit: notable
    conf: 1.0
    if:
      type: value
      path: repository.url
      regex: 'github\.com[/:]abaplint/abaplint(\.git)?$'
  - id: abaplint-benchmark-download
    desc: ABAP lint benchmark fixture download
    crit: notable
    conf: 1.0
    if:
      type: value
      path: scripts.*
      regex: 'tsc\s*&&\s*curl[^"\n]{0,180}raw\.githubusercontent\.com/abapGit/build'
  - id: abaplint-benchmark-local-execution
    desc: ABAP lint local benchmark execution
    crit: notable
    conf: 1.0
    if:
      type: value
      path: scripts.*
      regex: 'raw\.githubusercontent\.com/abapGit/build[^"\n]{0,180}&&\s*node\s+build/adhoc/'
