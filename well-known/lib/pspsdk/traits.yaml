defaults:
  platforms: [unix]
  for: [c, cpp]
  crit: notable
  conf: 0.95

traits:
  - id: psp-sdk-source-marker
    desc: PSP SDK source marker
    if:
      type: text
      substr: "PSP Software Development Kit"
  - id: psp-sdk-header-include
    desc: PSP SDK header include
    if:
      type: text
      substr: "#include <pspsdk.h>"

composite_rules:
  - id: psp-sdk-source
    desc: PSP SDK source file
    any:
      - id: psp-sdk-source-marker
      - id: psp-sdk-header-include
