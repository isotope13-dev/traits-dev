defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  size_max: 5000000
traits:
- id: tom-wu-copyright
  desc: Tom Wu JSBN copyright
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: Copyright (c) 2005  Tom Wu
- id: jsbn-file-marker
  desc: JSBN source file marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'File: jsbn.js'
- id: low-prime-table
  desc: JSBN low-prime lookup table
  crit: notable
  conf: 0.99
  if:
    type: text
    substr: 'var lowprimes = [2,3,5,7,11,13,17,19'
- id: encrypt-min-js-basename
  desc: Minified encryption bundle basename
  crit: component
  conf: 0.72
  if:
    type: path
    basename: true
    exact: encrypt.min.js
composite_rules:
- id: jsbn-rsa-library
  desc: JSBN RSA JavaScript library
  crit: notable
  conf: 0.95
  all:
  - id: tom-wu-copyright
  - id: jsbn-file-marker
- id: jsbn-rsa-minified-bundle
  desc: Minified JSBN RSA encryption bundle
  crit: notable
  conf: 0.78
  all:
  - id: encrypt-min-js-basename
  - id: micro-behaviors/crypto/library/keyword::encrypt-keyword
