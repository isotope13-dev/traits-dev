defaults:
  platforms: [unix, windows]
  for: [pkginfo, python, whl]

traits:
  - id: dna-sdk-package-name
    desc: DNA SDK package metadata identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: dna-sdk

  - id: dna-sdk-source-path
    desc: DNA SDK Python source path
    crit: component
    conf: 0.99
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])dna[\\/]'

composite_rules:
  - id: dna-sdk-source-context
    desc: DNA SDK source package context
    crit: notable
    conf: 0.99
    for: [pkginfo, python]
    scope: outer
    all:
      - id: dna-sdk-package-name
      - id: dna-sdk-source-path
