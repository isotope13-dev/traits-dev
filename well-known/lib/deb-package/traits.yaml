defaults:
  platforms: [linux, windows]
  for: [deb, elf, so, pe, zip, shell, python, php]
  size_max: 200000000
traits:
  - id: eso-midas-bench-script
    desc: ESO MIDAS benchmark script
    crit: baseline
    conf: 0.98
    for: [shell]
    if:
      type: path
      regex: 'util[\\/]bench[\\/]tst\.sh$'
  - id: hoogle-update-script
    desc: Hoogle update maintenance script
    crit: baseline
    conf: 0.98
    for: [shell]
    if:
      type: basename
      exact: update-hoogle
  - id: mariadb-secure-install-script
    desc: MariaDB secure install script
    crit: baseline
    conf: 0.98
    for: [shell]
    if:
      type: basename
      exact: mariadb-secure-installation
  - id: cctbx-string-test-module
    desc: CCTBX string utility test module
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: path
      regex: 'libtbx[\\/]tst_str_utils\.py$'
  - id: firefox-esr-libxul
    desc: Firefox ESR libxul library
    crit: baseline
    conf: 0.98
    for: [elf, so]
    if:
      type: path
      regex: 'firefox-esr.*[\\/]libxul\.so$'
  - id: thunderbird-libxul
    desc: Thunderbird libxul library
    crit: baseline
    conf: 0.98
    for: [elf, so]
    if:
      type: path
      regex: 'thunderbird.*[\\/]libxul\.so$'
  - id: firefox-esr-omni
    desc: Firefox ESR omni archive
    crit: baseline
    conf: 0.98
    for: [zip]
    if:
      type: path
      regex: 'firefox-esr.*[\\/]browser[\\/]omni\.ja$'
  - id: firefox-esr-crashhelper
    desc: Firefox ESR crash helper
    crit: baseline
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: crashhelper
  - id: firefox-omni-basename
    desc: Firefox omni archive basename
    crit: baseline
    conf: 0.98
    for: [zip, vbs]
    if:
      type: basename
      exact: omni.ja
  - id: gdal-shared-library
    desc: GDAL shared library package member
    crit: notable
    conf: 0.98
    for: [elf, so]
    if:
      type: path
      regex: 'libgdal\.so'
  - id: libassuan-shared-library
    desc: libassuan Debian shared library
    crit: baseline
    conf: 0.98
    for: [elf, so]
    size_max: 200000
    if:
      type: basename
      regex: '^libassuan\.so'
  - id: libssh-shared-library
    desc: libssh Debian shared library
    crit: baseline
    conf: 0.98
    for: [elf, so]
    size_max: 2000000
    if:
      type: basename
      regex: '^libssh\.so'
  - id: ca-certificates-postinst
    desc: ca-certificates postinst script
    crit: notable
    conf: 0.98
    for: [shell]
    size_max: 20000
    if:
      type: basename
      exact: ca-certificates.postinst
  - id: speech-dispatcher-binary
    desc: Speech Dispatcher binary
    crit: baseline
    conf: 0.98
    for: [elf]
    if:
      type: path
      regex: 'usr[\\/]bin[\\/]speech-dispatcher$'
  - id: speech-dispatcher-basename
    desc: Speech Dispatcher basename
    crit: baseline
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: speech-dispatcher
  - id: zoneminder-functions-php
    desc: ZoneMinder functions.php package file
    crit: baseline
    conf: 0.98
    for: [php]
    if:
      type: path
      regex: 'www[\\/]includes[\\/]functions\.php$'
  - id: zoneminder-deb
    desc: ZoneMinder Debian package
    crit: baseline
    conf: 0.98
    for: [deb]
    if:
      type: path
      regex: 'zoneminder_.*\.deb$'
  - id: dotnet-corelib-member
    desc: Bundled .NET CoreLib member
    crit: baseline
    conf: 0.98
    for: [pe]
    if:
      type: basename
      exact: System.Private.CoreLib.dll
  - id: dotnet-system-runtime-member
    desc: Bundled .NET System Runtime member
    crit: baseline
    conf: 0.98
    for: [pe]
    if:
      type: basename
      exact: System.Runtime.dll
  - id: devtoys-package-path
    desc: DevToys Debian package path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: devtoys
  - id: powershell-package-path
    desc: PowerShell Debian package path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: powershell
  - id: duplicati-package-path
    desc: Duplicati Debian package path
    crit: baseline
    conf: 0.98
    if:
      type: path
      substr: duplicati
  - id: rustdesk-sciter-library
    desc: RustDesk Sciter GTK library
    crit: baseline
    conf: 0.98
    for: [elf, so]
    if:
      type: path
      regex: 'rustdesk.*[\\/]libsciter-gtk\.so$'
composite_rules:
  - id: socket-exec-benign-library
    desc: Debian socket exec benign library
    crit: notable
    conf: 0.96
    any:
      - id: speech-dispatcher-binary
      - id: speech-dispatcher-basename
      - id: rustdesk-sciter-library
      - id: libassuan-shared-library
      - id: libssh-shared-library
  - id: deb-maintenance-script
    desc: Debian package maintenance script
    crit: notable
    conf: 0.98
    any:
      - id: eso-midas-bench-script
      - id: hoogle-update-script
      - id: mariadb-secure-install-script
  - id: deb-firefox-runtime
    desc: Debian Firefox runtime member
    crit: notable
    conf: 0.98
    any:
      - id: firefox-esr-libxul
      - id: thunderbird-libxul
      - id: firefox-esr-omni
      - id: firefox-esr-crashhelper
      - id: firefox-omni-basename
  - id: deb-zoneminder-webapp
    desc: Debian ZoneMinder web app
    crit: notable
    conf: 0.98
    any:
      - id: zoneminder-functions-php
      - id: zoneminder-deb
  - id: deb-dotnet-runtime-package
    desc: Debian bundled .NET runtime
    crit: notable
    conf: 0.98
    all:
      - id: dotnet-runtime-library-member
    any:
      - id: devtoys-package-path
      - id: powershell-package-path
      - id: duplicati-package-path
  - id: dotnet-runtime-library-member
    desc: Bundled .NET runtime library member
    crit: baseline
    conf: 0.98
    any:
      - id: dotnet-corelib-member
      - id: dotnet-system-runtime-member
