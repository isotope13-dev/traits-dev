# BaiqiSoft's BarcodeLabel control is a legitimate WinForms barcode-label SDK.
# Its commercial protection embeds and decrypts managed resources, resolves
# APIs dynamically, and carries an embedded Barcodes2D PE. Those mechanics are
# otherwise useful loader/injection evidence, so the exception requires both
# the vendor's exact PE identity and the embedded barcode engine marker.
defaults:
  platforms: [windows]
  for: [pe, dll, nupkg]
  crit: notable
  conf: 0.99

traits:
  - id: barcode-control-company
    desc: BaiqiSoft BarcodeLabel PE company identity
    for: [pe, dll]
    size_min: 2000000
    size_max: 5000000
    if:
      type: value
      path: pe.version.company
      exact: BaiqiSoft

  - id: barcode-control-package-id
    desc: BaiqiSoft barcode-label package identity
    for: [nupkg]
    if:
      type: value
      path: nupkg.id
      regex: '^BaiqiSoft\.(PrintBarcodeLabels\.NET|BarcodeLabelPrintingSDK\.NET4)$'

  - id: barcode-control-embedded-engine
    desc: Embedded Barcodes2D barcode engine marker
    for: [pe, dll]
    size_min: 2000000
    size_max: 5000000
    if:
      type: text
      exact: Barcodes2D.dll
      section: .text

composite_rules:
  - id: barcode-control-library-context
    desc: Recognized BaiqiSoft BarcodeLabel protected library
    crit: exception
    conf: 0.99
    for: [pe, dll]
    all:
      - id: barcode-control-company
      - id: barcode-control-embedded-engine

  - id: barcode-control-package-context
    desc: Recognized BaiqiSoft barcode-label package
    crit: exception
    conf: 0.99
    for: [nupkg]
    scope: archive
    all:
      - id: barcode-control-package-id
      - id: barcode-control-company
      - id: barcode-control-embedded-engine
