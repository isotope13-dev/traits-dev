defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.95

traits:
  - id: pdfobject-api
    desc: jsPDF PDFObject API marker
    if:
      type: text
      regex: '\.API\.PDFObject\s*=\s*function'
  - id: pdf-xref-builder-putxref
    desc: jsPDF putXRef routine
    if:
      type: text
      exact: putXRef
  - id: pdf-xref-builder-builddocument
    desc: jsPDF buildDocument routine
    if:
      type: text
      exact: buildDocument
  - id: pdf-header-writer-putheader
    desc: jsPDF putHeader routine
    if:
      type: text
      exact: putHeader
  - id: pdf-header-writer-magic
    desc: jsPDF PDF magic header
    if:
      type: text
      exact: "%PDF-"

composite_rules:
  - id: pdf-xref-builder
    desc: jsPDF xref builder routine
    crit: component
    any:
      - id: pdf-xref-builder-putxref
      - id: pdf-xref-builder-builddocument
  - id: pdf-header-writer
    desc: jsPDF PDF header writer
    crit: component
    any:
      - id: pdf-header-writer-putheader
      - id: pdf-header-writer-magic
  - id: jspdf-bundle
    desc: jsPDF library bundle
    crit: notable
    conf: 0.95
    all:
      - id: pdfobject-api
    any:
      - id: pdf-xref-builder
      - id: pdf-header-writer
