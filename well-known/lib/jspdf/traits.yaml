# jsPDF is a PDF document-generation library. Its bundled cryptographic and
# character-code routines are ordinary PDF implementation code.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
  conf: 0.95

traits:
  - id: jspdf-version-string
    desc: jsPDF library version string
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: jsPDF v?\d+\.\d+\.\d+
  - id: jspdf-banner
    desc: jsPDF library banner
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: yWorks/jsPDF
  - id: jspdf-pdf-document-banner
    desc: jsPDF PDF document-generation library banner
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: jsPDF - PDF Document creation from JavaScript
  - id: jspdf-namespace
    desc: jsPDF namespace assignment
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \(t=t\|\|self\)\.jspdf=\{\}
  - id: html2pdf-bundle
    desc: html2pdf bundled library
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'html2pdf\.js v\d+\.\d+\.\d+|root\["html2pdf"\]\s*=\s*factory\(\)'
  - id: jspdf-standard-font-data
    desc: jsPDF bundled font data
    crit: baseline
    conf: 0.92
    if:
      type: text
      substr: StandardFontDataFactory

  - id: pdfobject-api
    desc: jsPDF PDFObject API marker
    if:
      type: text
      regex: '\.API\.PDFObject\s*=\s*function'
  - id: pdf-xref-builder-putxref
    desc: jsPDF putXRef routine
    if:
      type: text
      exact: putXRef
  - id: pdf-xref-builder-builddocument
    desc: jsPDF buildDocument routine
    if:
      type: text
      exact: buildDocument
  - id: pdf-header-writer-putheader
    desc: jsPDF putHeader routine
    if:
      type: text
      exact: putHeader
  - id: pdf-header-writer-magic
    desc: jsPDF PDF magic header
    if:
      type: text
      exact: '%PDF-'

composite_rules:
  - id: pdf-xref-builder
    desc: jsPDF xref builder routine
    crit: component
    any:
      - id: pdf-xref-builder-putxref
      - id: pdf-xref-builder-builddocument
  - id: pdf-header-writer
    desc: jsPDF PDF header writer
    crit: component
    any:
      - id: pdf-header-writer-putheader
      - id: pdf-header-writer-magic
  - id: jspdf-bundle
    desc: jsPDF library bundle
    crit: notable
    conf: 0.95
    all:
      - id: pdfobject-api
    any:
      - id: pdf-xref-builder
      - id: pdf-header-writer
