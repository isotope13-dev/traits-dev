defaults:
  platforms: [windows]
  for: [pe, dll]
  size_max: 52428800
  crit: notable
  conf: 0.96
traits:
  - id: nlog-dll-basename
    crit: notable
    desc: NLog DLL basename
    if:
      type: path
      regex: '^NLog\.dll(@|$)'
      case_insensitive: true
  - id: nlog-embedded-member
    crit: notable
    desc: Embedded NLog DLL member
    if:
      type: path
      regex: 'NLog\.dll@'
      case_insensitive: true
