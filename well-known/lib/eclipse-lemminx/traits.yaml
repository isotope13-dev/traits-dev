defaults:
  platforms: [unix, windows]
  for: [class, jar]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 50000000

traits:
  - id: lemminx-class-path
    desc: Eclipse LemMinX Java class path
    if:
      type: path
      regex: 'eclipse[\\/]lemminx'
  - id: lemminx-command-service-class
    desc: Eclipse LemMinX command service
    if:
      type: text
      substr: org/eclipse/lemminx/services/extensions/commands

composite_rules:
  - id: lemminx-language-server-class
    desc: Eclipse LemMinX language-server class
    crit: baseline
    conf: 0.99
    all:
      - id: lemminx-class-path
      - id: lemminx-command-service-class
