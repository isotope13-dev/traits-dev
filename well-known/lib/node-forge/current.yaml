defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: node-forge-package-path
    desc: node-forge package source path
    crit: component
    conf: 0.98
    if:
      type: path
      regex: 'node_modules[\\/]node-forge[\\/]'
  - id: forge-rsa-namespace
    desc: node-forge RSA namespace marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: forge.rsa
  - id: forge-ed25519-namespace
    desc: node-forge Ed25519 namespace marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: forge.ed25519

composite_rules:
  - id: node-forge-current-library
    desc: node-forge cryptographic library source
    crit: notable
    conf: 0.98
    all:
      - id: node-forge-package-path
    any:
      - id: forge-rsa-namespace
      - id: forge-ed25519-namespace
