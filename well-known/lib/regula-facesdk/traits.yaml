defaults:
  platforms: [unix, windows]

traits:
  - id: face-components-package-name
    desc: Regula Face SDK web-components package identity
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@regulaforensics/vp-frontend-face-components'
  - id: regula-facesdk-brand-marker
    desc: Regula Face SDK web-components runtime marker
    crit: notable
    conf: 0.99
    for: [javascript, typescript, markdown, package.json]
    if:
      type: text
      regex: '(?i)faceapi\.regulaforensics\.com'
  - id: regula-facesdk-package-marker
    desc: Regula Face SDK package marker
    crit: notable
    conf: 0.99
    for: [javascript, typescript, markdown, package.json]
    if:
      type: text
      regex: '(?i)@regulaforensics/(facesdk-webclient|vp-frontend-face-components)'
  - id: regula-storybook-host-marker
    desc: Regula Face SDK Storybook host
    crit: notable
    conf: 0.99
    for: [javascript, typescript, markdown, package.json]
    if:
      type: text
      regex: '(?i)storybook-face\.regulaforensics\.com'
  - id: camera-liveness-component-marker
    desc: Camera/liveness component marker
    crit: notable
    conf: 0.99
    for: [javascript, typescript, markdown]
    if:
      type: text
      regex: '(?i)face[- ](capture|liveness)|liveness assessment|Web Components.{0,40}camera'

composite_rules:
  - id: official-face-components-context
    desc: Recognized Regula Face SDK web-components package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: face-components-package-name
    any:
      - id: regula-facesdk-brand-marker
      - id: regula-facesdk-package-marker
      - id: regula-storybook-host-marker
      - id: camera-liveness-component-marker
