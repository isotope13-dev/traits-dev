defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.95
traits:
  - id: sentry-global
    desc: Sentry JavaScript global
    if:
      type: text
      substr: __SENTRY__
  - id: sentry-logger-text
    desc: Sentry JavaScript logger text
    if:
      type: text
      substr: Sentry Logger
  - id: sentry-sdk-version-field
    desc: Sentry SDK version field
    if:
      type: text
      substr: sdkProcessingMetadata
composite_rules:
  - id: sentry-js-sdk
    desc: Sentry JavaScript SDK
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: sentry-global
      - id: sentry-logger-text
      - id: sentry-sdk-version-field
