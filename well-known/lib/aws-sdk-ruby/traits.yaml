defaults:
  platforms: [windows, unix]
  for: [ruby, tar]
  crit: baseline
  conf: 0.95

traits:
  - id: package-path
    desc: AWS SDK Ruby package path marker
    if:
      type: basename
      regex: (?i)(^|[!:/\\])aws-sdk-[^!:/\\]{1,120}([!:/\\]|$)
  - id: instance-profile-class
    desc: AWS SDK instance profile class marker
    for: [ruby]
    if:
      type: ast
      kind: class
      exact: InstanceProfileCredentials
  - id: aws-module
    desc: AWS SDK Ruby module marker
    for: [ruby]
    if:
      type: ast
      kind: module
      exact: Aws
  - id: metadata-disabled-constant
    desc: AWS SDK metadata-disabled constant marker
    for: [ruby]
    if:
      type: string_literal
      substr: AWS_EC2_METADATA_DISABLED
  - id: namespace
    desc: AWS SDK Ruby namespace marker
    for: [ruby]
    if:
      type: text
      regex: module\s+(Aws|Seahorse)\b
  - id: shared-config-provider
    desc: AWS SDK shared config provider marker
    for: [ruby]
    if:
      type: text
      substr: class SharedConfig

composite_rules:
  - id: library
    desc: AWS SDK Ruby library identity
    any:
      - id: package-path
      - id: instance-profile-class
      - id: aws-module
      - id: metadata-disabled-constant
      - id: namespace
      - id: shared-config-provider
