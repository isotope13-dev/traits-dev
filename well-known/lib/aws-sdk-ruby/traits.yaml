defaults:
  platforms: [windows, unix]
  for: [ruby, tar]
  crit: baseline
  conf: 0.95

traits:
  - id: package-path
    desc: AWS SDK Ruby package path marker
    if:
      type: path
      regex: (?i)(^|[!:/\\])aws-sdk-[^!:/\\]{1,120}([!:/\\]|$)
  - id: instance-profile-class
    desc: AWS SDK instance profile class marker
    for: [ruby]
    if:
      type: text
      substr: InstanceProfileCredentials
  # `aws-module` (tree-sitter `module Aws`) removed: redundant with the
  # `namespace` trait below, whose `module\s+(Aws|Seahorse)\b` text match
  # already covers the `module Aws` declaration.
  - id: metadata-disabled-constant
    desc: AWS SDK metadata-disabled constant marker
    for: [ruby]
    if:
      type: string_literal
      substr: AWS_EC2_METADATA_DISABLED
  - id: namespace
    desc: AWS SDK Ruby namespace marker
    for: [ruby]
    if:
      type: text
      regex: module\s+(Aws|Seahorse)\b
  - id: shared-config-provider
    desc: AWS SDK shared config provider marker
    for: [ruby]
    if:
      type: text
      substr: class SharedConfig

