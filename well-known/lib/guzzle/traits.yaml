defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.96

traits:
  - id: namespace
    desc: Guzzle namespace marker
    if:
      type: text
      regex: 'namespace\s+.{0,80}GuzzleHttp\\'

  - id: package-doc
    desc: Guzzle package doc marker
    if:
      type: text
      substr: "Guzzle, PHP HTTP client"

  - id: stream-handler
    desc: Guzzle stream handler marker
    if:
      type: text
      regex: 'class\s+(StreamHandler|StreamDecoratorTrait)\b'

composite_rules:
  - id: library-context
    desc: Guzzle library context
    crit: baseline
    conf: 0.98
    any:
      - id: namespace
      - id: package-doc

  - id: stream-context
    desc: Guzzle stream implementation context
    crit: baseline
    conf: 0.97
    all:
      - id: library-context
      - id: stream-handler
