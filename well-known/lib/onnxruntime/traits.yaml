defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  crit: component
  conf: 0.97
  size_min: 1048576
  size_max: 536870912

traits:
  - id: microsoft-namespace
    desc: ONNX Runtime Microsoft namespace
    if:
      type: text
      substr: Microsoft.ML.ONNXRuntime
      section: rdata

  - id: trace-provider
    desc: ONNX Runtime trace provider
    if:
      type: text
      substr: ONNXRuntimeTraceLoggingProvider
      section: rdata

  - id: cxx-namespace
    desc: ONNX Runtime C++ namespace
    if:
      type: text
      substr: 'onnxruntime::'
      section: rdata

  - id: provider-dll-name
    desc: ONNX Runtime provider DLL name
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      substr: onnxruntime_providers_shared.dll
      section: rdata

composite_rules:
  - id: onnxruntime-library
    desc: ONNX Runtime library markers
    crit: component
    conf: 0.98
    needs: 2
    any:
      - id: microsoft-namespace
      - id: trace-provider
      - id: cxx-namespace
      - id: provider-dll-name
