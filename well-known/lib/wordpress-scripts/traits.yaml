defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, npm]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: '@wordpress/scripts package name'
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@wordpress/scripts'

composite_rules:
  - id: package-context
    desc: Recognized @wordpress/scripts package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: metadata/package/files/included::npm-package-scripts-member
