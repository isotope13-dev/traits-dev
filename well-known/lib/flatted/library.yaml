# Recognises the upstream `flatted` library — a small (~1.4 KB minified)
# ES5 helper for round-tripping circular JavaScript object graphs through
# JSON. Used as an allow-list anchor and as the precondition for an
# anti-tamper composite that fires when a file matches the flatted shape
# *and* carries imports/strings that the genuine library never has.
defaults:
  for: [javascript, typescript]
  platforms: [unix, windows]
traits:
  - id: flatted-min-self-prefix
    desc: flatted minified self.Flatted IIFE prefix
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'self.Flatted=function(n){"use strict";'
  - id: flatted-min-api-tail
    desc: flatted minified API export tail
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'n.parse=v,n.stringify=S,n.toJSON=function(n)'
  # The "smuggled capability" indicators (eval / network / fs / child-process)
  # are GENERIC capabilities, not flatted-specific — they surfaced standalone as
  # well-known/lib/flatted components on any fetch/fs/eval-using file. They now
  # live as neutral micro-behaviors and are referenced cross-directory by the
  # flatted-tampered-library composite below, gated by the real flatted shape.

composite_rules:
  - id: flatted-min-library
    desc: Upstream flatted minified library shape
    crit: component
    conf: 0.99
    all:
      - id: flatted-min-self-prefix
      - id: flatted-min-api-tail

  - id: flatted-tampered-library
    desc: Tampered flatted library with smuggled capability
    crit: hostile
    conf: 0.97
    attack: T1195.002
    mbc: B0030
    all:
      - id: flatted-min-library
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-send
      - id: metadata/import/builtin::require-fs
      - id: objectives/supply-chain/trojanized/library/framework::require-child-process-dup
