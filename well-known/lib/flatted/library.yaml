# Recognises the upstream `flatted` library — a small (~1.4 KB minified)
# ES5 helper for round-tripping circular JavaScript object graphs through
# JSON. Used as an allow-list anchor and as the precondition for an
# anti-tamper composite that fires when a file matches the flatted shape
# *and* carries imports/strings that the genuine library never has.
defaults:
  for: [javascript, typescript]
  platforms: [unix, windows]
traits:
  - id: flatted-min-self-prefix
    desc: flatted minified self.Flatted IIFE prefix
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'self.Flatted=function(n){"use strict";'
  - id: flatted-min-api-tail
    desc: flatted minified API export tail
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'n.parse=v,n.stringify=S,n.toJSON=function(n)'
  # Indicators that a flatted-shaped file contains capability the upstream
  # library never has — child-process, network, eval, etc.
  - id: flatted-tamper-eval
    desc: eval/new Function call (flatted tamper fragment)
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\b(eval|new Function)\s*\('
  - id: flatted-tamper-network
    desc: fetch/XMLHttpRequest/http(s) require (flatted tamper fragment)
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\b(fetch|XMLHttpRequest|require\(["'']https?["'']\))'
  - id: flatted-tamper-fs
    desc: require('fs') call (flatted tamper fragment)
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'require\(["'']fs["'']\)'

composite_rules:
  - id: flatted-min-library
    desc: Upstream flatted minified library shape
    crit: component
    conf: 0.99
    all:
      - id: flatted-min-self-prefix
      - id: flatted-min-api-tail

  - id: flatted-tampered-library
    desc: Tampered flatted library with smuggled capability
    crit: hostile
    conf: 0.97
    attack: T1195.002
    mbc: B0030
    all:
      - id: flatted-min-library
    any:
      - id: flatted-tamper-eval
      - id: flatted-tamper-network
      - id: flatted-tamper-fs
      - id: objectives/supply-chain/trojanized/library/framework::require-child-process-dup
