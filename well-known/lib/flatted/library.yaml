defaults:
  for:
  - javascript
  - typescript
  platforms:
  - unix
  - windows
  size_max: 5000000
traits:
- id: flatted-min-self-prefix
  desc: flatted minified self.Flatted IIFE prefix
  crit: component
  conf: 0.99
  if:
    type: text
    substr: self.Flatted=function(n){"use strict";
- id: flatted-min-api-tail
  desc: flatted minified API export tail
  crit: component
  conf: 0.99
  if:
    type: text
    substr: n.parse=v,n.stringify=S,n.toJSON=function(n)
composite_rules:
- id: flatted-min-library
  desc: Upstream flatted minified library shape
  crit: component
  conf: 0.99
  all:
  - id: flatted-min-self-prefix
  - id: flatted-min-api-tail
- id: flatted-tampered-library
  desc: Tampered flatted library with smuggled capability
  crit: hostile
  conf: 0.97
  attack: T1195.002
  mbc: B0030
  all:
  - id: flatted-min-library
  any:
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-send
  - id: metadata/import/builtin::require-fs
  - id: objectives/supply-chain/trojanized/library/framework::require-child-process-dup
