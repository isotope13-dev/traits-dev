# minizip / unzip 1.01 (Gilles Vollant) — small ZIP read/write companion to zlib.
# Ships as a few C files; commonly statically linked into installers and into
# packed/loader malware that carries a ZIP-packaged payload.
defaults:
  size_max: 52428800
  for: [pe, dll, elf, macho]
  platforms: [windows, linux, macos]

traits:
  - id: minizip-101-banner
    desc: Minizip 1.01 (Gilles Vollant) library banner
    crit: notable
    conf: 0.95
    if:
      type: trait
      id: metadata/library/compression::minizip-101-banner
