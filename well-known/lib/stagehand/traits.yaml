defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.98

traits:
  - id: stagehand-shadow-dom-helper
    desc: Stagehand closed-shadow-DOM helper marker
    if:
      type: text
      substr: "__stagehand__"
  - id: stagehand-page-runtime
    desc: Stagehand browser page runtime marker
    if:
      type: text
      substr: "StagehandPage"

composite_rules:
  - id: stagehand-browser-automation-context
    desc: Stagehand browser automation library context
    crit: exception
    conf: 0.99
    all:
      - id: stagehand-shadow-dom-helper
      - id: stagehand-page-runtime
