defaults:
  platforms: [windows, unix]
  for: [c, cpp, javascript, github-actions, text]

traits:
  - id: mpich-source-path
    desc: MPICH source tree path
    crit: notable
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/])mpich-[0-9][A-Za-z0-9._-]*'

  - id: ucx-source-path
    desc: UCX source tree path
    crit: notable
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/])ucx([\\/]|$)'

  - id: libfabric-source-path
    desc: libfabric source tree path
    crit: notable
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/])libfabric([\\/]|$)'

  - id: hwloc-source-path
    desc: hwloc source tree path
    crit: notable
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/])hwloc([\\/]|$)'

  - id: gtest-death-test-source
    desc: GoogleTest death-test source
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: death_test_use_fork

  - id: ucx-source-marker
    desc: UCX source API marker
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: UCS_TEST

  - id: ucx-c-api-marker
    desc: UCX C API marker
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: ucs_
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: libfabric-source-marker
    desc: libfabric source API marker
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: libfabric

  - id: hwloc-source-marker
    desc: hwloc source API marker
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: hwloc_

  - id: mpich-source-marker
    desc: MPICH source marker
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: MPICH

composite_rules:
  - id: mpich-source
    desc: MPICH source tree
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: mpich-source-path
      - id: mpich-source-marker

  - id: ucx-source
    desc: UCX source tree
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: ucx-source-path
      - id: ucx-source-marker
      - id: ucx-c-api-marker

  - id: libfabric-source
    desc: libfabric source tree
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: libfabric-source-path
      - id: libfabric-source-marker

  - id: hwloc-source
    desc: hwloc source tree
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: hwloc-source-path
      - id: hwloc-source-marker
