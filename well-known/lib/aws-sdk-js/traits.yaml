defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, npm]
  crit: notable
  conf: 0.98

traits:
  - id: v2-package-path
    desc: AWS SDK JS v2 package path
    if:
      type: path
      regex: '(^|[\\/])aws-sdk-[0-9][^\\/]*\.tgz$'

  - id: package-manifest
    desc: AWS SDK JS package manifest
    for: [package.json]
    if:
      type: value
      path: name
      exact: aws-sdk

  - id: v2-client-loader
    desc: AWS SDK JS v2 generated client loader
    if:
      type: text
      regex: 'var Service = AWS\.Service;[\s\S]{0,80}var apiLoader = AWS\.apiLoader;'

  - id: v2-typescript-service
    desc: AWS SDK JS v2 TypeScript service declaration
    if:
      type: text
      regex: "import \\{Service\\} from '../lib/service';[\\s\\S]{0,180}extends Service"

composite_rules:
  - id: aws-sdk-js-archive-context
    desc: Recognized AWS SDK for JavaScript v2 package context
    crit: notable
    conf: 0.99
    scope: archive
    any:
      - id: package-manifest
      - id: v2-package-path
