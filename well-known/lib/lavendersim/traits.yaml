defaults:
  platforms: [macos]
  for: [macho]
  crit: notable
  conf: 0.98
  size_min: 100000
  size_max: 5242880

traits:
  - id: native-library-path
    desc: LavenderSim native simulation library
    if:
      type: basename
      exact: liblavendersim.dylib
  - id: package-member-path
    desc: LavenderSim native library package path
    if:
      type: path
      regex: '(^|[\\/])lavendersim[\\/]liblavendersim\.dylib$'
