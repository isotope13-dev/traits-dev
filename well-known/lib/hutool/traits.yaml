defaults:
  platforms: [unix, windows]
  for: [jar, zip, class]
  crit: notable
  conf: 0.99

traits:
  - id: hutool-core-library
    desc: Hutool core utility library member
    if:
      type: path
      regex: '(?i)hutool-core-[0-9][^\\/]{0,32}\.jar'

  - id: hutool-core-class-member
    desc: Hutool core Java class member
    for: [java_class]
    if:
      type: text
      substr: cn/hutool/core/
