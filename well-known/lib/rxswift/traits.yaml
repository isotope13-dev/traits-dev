defaults:
  platforms: [macos]
  for: [macho, dylib]
  crit: notable
  conf: 0.8
  size_min: 65536
  size_max: 600000000

traits:
  - id: rxswift-reactive-subject
    desc: RxSwift reactive Subject API symbol
    crit: notable
    if:
      type: symbol
      regex: 'RxSwift.{0,50}(Subject|BehaviorSubject)'
