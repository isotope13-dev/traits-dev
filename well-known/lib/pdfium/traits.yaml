defaults:
  platforms: [linux, macos, windows]
  crit: baseline
  conf: 0.98
  size_max: 268435456

traits:
  - id: source-tree
    desc: PDFium source tree or parser test corpus
    for: [source, c, cpp, pdf, javascript, text, tar]
    if:
      type: path
      regex: '(^|[\\/])pdfium([\\/]|-|_)'

  - id: testing-resource-path
    desc: PDFium PDF testing resource
    for: [pdf]
    if:
      type: path
      regex: 'testing[\\/]resources'

composite_rules:
  - id: source-tree-identifier
    desc: PDFium source tree or parser test corpus
    crit: notable
    conf: 0.99
    any:
      - id: source-tree
      - id: testing-resource-path
