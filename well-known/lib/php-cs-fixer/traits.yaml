---
# PHP-CS-Fixer is a legitimate PHP formatter. Its source contains examples
# and fixer logic that mention eval() and pack() without being a payload.
defaults:
  platforms: [unix, windows]
  for: [php, composer.json]

traits:
  - id: php-cs-fixer-package-name
    desc: PHP-CS-Fixer Composer package identity
    crit: notable
    conf: 1.0
    for: [composer.json]
    if:
      type: value
      path: name
      exact: friendsofphp/php-cs-fixer

  - id: php-cs-fixer-source-tree
    desc: PHP-CS-Fixer source tree
    crit: notable
    conf: 0.99
    for: [php]
    if:
      type: path
      substr: PHP-CS-Fixer-PHP-CS-Fixer-
