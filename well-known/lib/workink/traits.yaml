# Work.ink key-validation library identity.  The export pair and endpoint
# identify a small validation DLL; they are context, not hostile behavior.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: token-validation-endpoint
    desc: Work.ink token validation endpoint
    crit: notable
    conf: 0.99
    size_min: 4096
    size_max: 200000
    if:
      type: text
      section: .rdata
      exact: https://work.ink/_api/v2/token/isValid/

  - id: is-key-valid-export
    desc: Work.ink key validation export
    crit: notable
    conf: 0.99
    size_min: 4096
    size_max: 200000
    if:
      type: export
      exact: IsKeyValid

  - id: start-security-export
    desc: Work.ink security initialization export
    crit: notable
    conf: 0.99
    size_min: 4096
    size_max: 200000
    if:
      type: export
      exact: StartSecurity
