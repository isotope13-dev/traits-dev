defaults:
  platforms: [macos]
  for: [macho]
  crit: baseline
  conf: 0.98
  size_min: 1000000
  size_max: 15000000

traits:
  - id: do-not-disturb-path
    desc: sindresorhus do-not-disturb path
    crit: component
    if:
      type: path
      basename: true
      exact: do-not-disturb

  - id: dndprefs-changed-marker
    desc: do-not-disturb Swift marker
    crit: component
    if:
      type: symbol
      substr: do_not_disturb12DoNotDisturb

composite_rules:
  - id: do-not-disturb-helper
    desc: sindresorhus do-not-disturb helper
    all:
      - id: do-not-disturb-path
      - id: dndprefs-changed-marker
