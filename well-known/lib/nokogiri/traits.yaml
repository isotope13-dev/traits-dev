defaults:
  platforms: [unix, windows]
  for: [ruby, shell, python, javascript, c]
  crit: baseline
  conf: 0.97
  size_max: 268435456

traits:
  - id: native-extension-bundle
    desc: Nokogiri native extension bundle
    if:
      type: text
      regex: '(?i)\b(nokogiri|NOKOGIRI_USE_SYSTEM_LIBRARIES)\b|ext/nokogiri|lib/nokogiri'
