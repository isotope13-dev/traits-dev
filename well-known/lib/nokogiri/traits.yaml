defaults:
  platforms: [unix, windows]
  for: [ruby, shell, python, javascript, c]
  crit: notable
  conf: 0.97
  size_max: 268435456

traits:
  - id: library-reference
    desc: Ruby requires the Nokogiri XML library
    for: [ruby]
    if:
      type: symbol
      kind: call
      exact: require
      arg:
        kind: string
        exact: nokogiri
