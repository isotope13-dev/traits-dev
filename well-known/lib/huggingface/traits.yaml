defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.96

traits:
  - id: copyright-header
    desc: Hugging Face copyright header
    size_max: 2000000
    if:
      type: text
      regex: "Copyright 20(19|2[0-9])-present, the HuggingFace Inc\\. team\\."
  - id: hf-api-basename
    desc: Hugging Face API filename
    size_max: 2000000
    if:
      type: basename
      exact: hf_api.py
  - id: runtime-utils-basename
    desc: Hugging Face runtime utils filename
    size_max: 2000000
    if:
      type: basename
      exact: _runtime.py
  - id: runtime-bytecode-path
    desc: Hugging Face runtime bytecode path
    for: [pyc]
    if:
      type: path
      regex: 'huggingface_hub[\\/]utils[\\/]'
  - id: runtime-bytecode-basename
    desc: Hugging Face runtime bytecode filename
    for: [pyc]
    if:
      type: basename
      regex: '^_runtime\.cpython-[0-9]+\.pyc$'
  - id: git-credential-utils-basename
    desc: Hugging Face git credential filename
    size_max: 2000000
    if:
      type: basename
      exact: _git_credential.py
  - id: sandbox-server-bucket
    desc: Hugging Face sandbox server mount path
    if:
      type: text
      substr: hf-sbx-server
  - id: sandbox-server-bootstrap-env
    desc: Hugging Face sandbox bootstrap environment
    if:
      type: text
      regex: 'SBX_DL_TOKEN[\s\S]{0,200}SBX_SERVER_URL[\s\S]{0,200}SBX_SERVER_MOUNT'
  - id: tasks-local-app-snippet-helper
    desc: Hugging Face node-llama-cpp snippet helper
    for: [javascript, typescript]
    if:
      type: text
      word: snippetNodeLlamaCppCli
  - id: node-llama-cpp-hf-chat-command
    desc: node-llama-cpp Hugging Face model chat command
    for: [javascript, typescript]
    if:
      type: text
      substr: 'node-llama-cpp chat hf:'

composite_rules:
  - id: hub-package-file
    desc: Hugging Face Hub package file
    crit: notable
    conf: 0.96
    all:
      - id: copyright-header
      - id: hf-api-basename
  - id: hub-utils-package-file
    desc: Hugging Face Hub utils file
    crit: notable
    conf: 0.96
    all:
      - id: copyright-header
    any:
      - id: runtime-utils-basename
      - id: git-credential-utils-basename
  - id: hub-runtime-bytecode
    desc: Hugging Face runtime bytecode
    crit: notable
    conf: 0.99
    for: [pyc]
    all:
      - id: runtime-bytecode-path
      - id: runtime-bytecode-basename
  - id: sandbox-server-bootstrap
    desc: Hugging Face sandbox server bootstrap
    crit: notable
    conf: 0.99
    all:
      - id: sandbox-server-bucket
      - id: sandbox-server-bootstrap-env
  - id: tasks-local-app-snippets
    desc: Recognized Hugging Face local-app snippets
    crit: exception
    conf: 0.99
    for: [javascript, typescript]
    all:
      - id: tasks-local-app-snippet-helper
      - id: node-llama-cpp-hf-chat-command
