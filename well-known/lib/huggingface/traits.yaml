defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.96

traits:
  - id: copyright-header
    desc: Hugging Face copyright header
    size_max: 2000000
    if:
      type: text
      substr: "Copyright 2022-present, the HuggingFace Inc. team."
  - id: hf-api-basename
    desc: Hugging Face API filename
    size_max: 2000000
    if:
      type: basename
      exact: hf_api.py
  - id: runtime-utils-basename
    desc: Hugging Face runtime utils filename
    size_max: 2000000
    if:
      type: basename
      exact: _runtime.py
  - id: git-credential-utils-basename
    desc: Hugging Face git credential filename
    size_max: 2000000
    if:
      type: basename
      exact: _git_credential.py

composite_rules:
  - id: hub-package-file
    desc: Hugging Face Hub package file
    crit: notable
    conf: 0.96
    all:
      - id: copyright-header
      - id: hf-api-basename
  - id: hub-utils-package-file
    desc: Hugging Face Hub utils file
    crit: notable
    conf: 0.96
    all:
      - id: copyright-header
    any:
      - id: runtime-utils-basename
      - id: git-credential-utils-basename

