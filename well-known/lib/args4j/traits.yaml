defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - class
  - jar
  - zip
  size_max: 5000000
traits:
- id: args4j-package-path
  desc: args4j package path
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: org/kohsuke/args4j/
- id: args4j-starter-class
  desc: args4j Starter class
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: org/kohsuke/args4j/Starter
composite_rules:
- id: args4j-library
  desc: args4j command-line parsing library
  crit: notable
  conf: 0.95
  any:
  - id: args4j-package-path
  - id: args4j-starter-class
