# zxcvbn — Dropbox password-strength estimator library. Its `ranked_dictionaries`
# symbol is a benign marker used as FP-suppression context by other rules.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  size_min: 512
  size_max: 500000000
  crit: baseline
traits:
  - id: zxcvbn-ranked-dictionaries
    desc: zxcvbn ranked_dictionaries symbol
    if:
      type: symbol
      exact: ranked_dictionaries
