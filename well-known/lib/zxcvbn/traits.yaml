# zxcvbn — Dropbox password-strength estimator library. Its `ranked_dictionaries`
# symbol is a benign marker used as FP-suppression context by other rules.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  size_min: 512
  size_max: 500000000
  crit: notable
traits:
  - id: zxcvbn-ranked-dictionaries
    crit: notable
    desc: zxcvbn ranked_dictionaries symbol
    if:
      type: symbol
      exact: ranked_dictionaries
  - id: zxcvbn-umd-export
    desc: zxcvbn UMD export marker
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: ").zxcvbn=e()"
  - id: zxcvbn-passwords-table-head
    desc: zxcvbn password table head
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: "123456,password,12345678"
  - id: zxcvbn-passwords-table-minified
    desc: zxcvbn minified password table
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: 'o("passwords",r("'
  - id: zxcvbn-passwords-qwerty
    desc: zxcvbn password qwerty sequence
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: "12345678,qwerty"
  - id: zxcvbn-window-export
    desc: zxcvbn window export marker
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      regex: 'window\.zxcvbn\s*=\s*\w+'
  - id: zxcvbn-source-banner
    desc: zxcvbn source banner
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: "This is the zxcvbn password strength estimator"
composite_rules:
  - id: zxcvbn-password-strength-library
    desc: zxcvbn password strength library
    crit: notable
    conf: 1.0
    for: [javascript]
    needs: 2
    any:
      - id: zxcvbn-umd-export
      - id: zxcvbn-window-export
      - id: zxcvbn-source-banner
      - id: zxcvbn-passwords-table-head
      - id: zxcvbn-passwords-table-minified
      - id: zxcvbn-passwords-qwerty
