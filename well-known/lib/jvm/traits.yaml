defaults:
  platforms: [unix, windows]
  for: [macho, elf, pe]
  crit: baseline
  conf: 0.98
  size_max: 536870912

traits:
  - id: runtime-library-basename
    desc: OpenJDK JVM runtime library basename
    if:
      type: path
      basename: true
      regex: '^((libjvm\.(so|dylib))|jvm\.dll)$'

  - id: runtime-support-library-basename
    desc: OpenJDK JVM support library basename
    if:
      type: path
      basename: true
      regex: '^(lib(javajpeg|jawt|awt)\.|awt\.dll$)'

  - id: runtime-awt-library-basename
    desc: OpenJDK AWT support library basename
    if:
      type: path
      basename: true
      regex: '^lib(awt_lwawt|fontmanager|freetype)\.'

  - id: runtime-x11-awt-library-basename
    desc: OpenJDK X11 AWT backend library basename
    if:
      type: path
      basename: true
      regex: '^libawt_xawt\.'

  - id: runtime-io-library-basename
    desc: OpenJDK NIO support library basename
    if:
      type: path
      basename: true
      regex: '^libnio\.'

  - id: runtime-network-library-basename
    desc: OpenJDK network support library basename
    if:
      type: path
      basename: true
      regex: '^(lib(net|nio)\.|net\.dll$)'

  - id: runtime-media-library-basename
    desc: OpenJDK media support library basename
    if:
      type: path
      basename: true
      regex: '^lib(lcms|mlib_image|splashscreen)\.'

  - id: runtime-windows-media-library-basename
    desc: OpenJDK Windows media library basename
    ref: sha256:c1ec4978244ad1305c90a99e2b74741749066e105038c3621ad319de988ece74
    if:
      type: basename
      exact: mlib_image.dll

  - id: runtime-sspi-bridge-basename
    desc: OpenJDK SSPI bridge library basename
    ref: sha256:c1ec4978244ad1305c90a99e2b74741749066e105038c3621ad319de988ece74
    if:
      type: path
      basename: true
      exact: sspi_bridge.dll

  - id: runtime-syslookup-library-basename
    desc: OpenJDK syslookup support library basename
    if:
      type: path
      basename: true
      substr: libsyslookup.

  - id: runtime-spawn-helper-basename
    desc: OpenJDK spawn helper basename
    if:
      type: path
      basename: true
      exact: jspawnhelper

  - id: bundled-runtime-path
    desc: Bundled OpenJDK runtime path
    if:
      type: path
      regex: 'runtime[\\/]Contents[\\/]Home'

  - id: runtime-library
    desc: OpenJDK JVM runtime library
    if:
      type: text
      regex: '(Java HotSpot|OpenJDK|JVM_EnqueueOperation)'
      section: rdata

  - id: jpackage-app-launcher-marker
    desc: jpackage application launcher marker
    for: [macho]
    if:
      type: text
      substr: jpackage
      section: __TEXT.__cstring

  - id: jli-launcher-marker
    desc: JLI_Launch application launcher marker
    for: [macho]
    if:
      type: text
      substr: JLI_Launch
      section: __TEXT.__cstring
  - id: java-launcher-basename
    desc: Java launcher executable basename
    if:
      type: path
      basename: true
      regex: '^(java|javaw|java\.exe|javaw\.exe)$'
      case_insensitive: true
  - id: jli-launcher-symbol
    desc: JLI_Launch Java launcher symbol
    for: [macho]
    if:
      type: symbol
      exact: _JLI_Launch
  - id: macos-libjli-rpath
    desc: macOS Java launcher libjli rpath
    for: [macho]
    platforms: [macos]
    if:
      type: value
      path: macho.libraries[*]
      exact: '@rpath/libjli.dylib'
  - id: azul-zulu-code-signature
    desc: Azul Zulu Java code signature
    for: [macho]
    platforms: [macos]
    if:
      type: value
      path: macho.code_signature.identifier
      exact: com.azul.zulu.java
  - id: keytool-basename
    desc: Java keytool executable basename
    for: [macho]
    platforms: [macos]
    if:
      type: basename
      exact: keytool
  - id: azul-zulu-keytool-code-signature
    desc: Azul Zulu keytool code signature
    for: [macho]
    platforms: [macos]
    if:
      type: value
      path: macho.code_signature.identifier
      exact: com.azul.zulu.keytool

composite_rules:
  - id: jpackage-macho-launcher
    desc: jpackage Mach-O Java application launcher
    crit: baseline
    conf: 0.96
    for: [macho]
    platforms: [macos]
    all:
      - id: jli-launcher-marker
      - id: jpackage-app-launcher-marker
  - id: macos-java-launcher
    desc: macOS Java runtime launcher
    crit: notable
    conf: 0.98
    for: [macho]
    platforms: [macos]
    all:
      - id: java-launcher-basename
      - id: jli-launcher-symbol
      - id: macos-libjli-rpath
  - id: azul-zulu-macos-java-launcher
    desc: Azul Zulu macOS Java launcher
    crit: notable
    conf: 0.99
    for: [macho]
    platforms: [macos]
    all:
      - id: java-launcher-basename
      - id: jli-launcher-symbol
      - id: macos-libjli-rpath
      - id: azul-zulu-code-signature
  - id: azul-zulu-macos-keytool
    desc: Azul Zulu macOS keytool
    crit: notable
    conf: 0.99
    for: [macho]
    platforms: [macos]
    all:
      - id: keytool-basename
      - id: azul-zulu-keytool-code-signature
