defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: notable
  conf: 0.96

traits:
  - id: erb-opal-runtime
    desc: ERB Opal template compilation runtime
    for: [javascript]
    if:
      type: text
      substr: 'Opal.ERB.$compile'

  - id: erb-package-name
    desc: npm ERB package identity
    for: [package.json]
    if:
      type: value
      path: name
      exact: erb
