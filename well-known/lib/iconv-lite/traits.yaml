# iconv-lite bundles large DBCS lookup tables as encoded JavaScript strings.
# Their localized entropy is library data, not evidence of a concealed payload.
defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]

traits:
  - id: iconv-lite-decoding-table-runtime
    desc: iconv-lite DBCS decoding-table implementation
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: "iconv-lite internal error: invalid decoding table value"
