# Identity of the official Braintree (a PayPal service) .NET payment SDK, keyed
# on the assembly's version resources. Neutral: the genuine `Braintree` NuGet
# package carries these too. It exists so impersonation and trojan composites
# can assert "this artifact presents itself as the Braintree SDK" and pair that
# with a squatted package id or an injected payload.
defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll]
  size_max: 16777216

traits:
  - id: braintree-payment-sdk
    desc: Braintree payment SDK brand identity
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pe.version.product_name
      regex: 'Braintree Payment Gateway'
