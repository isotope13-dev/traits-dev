defaults:
  platforms: [windows, linux, macos]
  for: [python, pyc]
  crit: notable
  conf: 0.98

traits:
  - id: module-path
    desc: requests-ntlm module path
    if:
      type: path
      regex: '(^|[\\/])requests_ntlm[\\/]requests_ntlm\.pyc?$'
  - id: http-ntlm-auth-class
    desc: requests-ntlm authentication class
    if:
      type: text
      substr: HttpNtlmAuth
  - id: ntlm-library-marker
    desc: requests-ntlm library marker
    if:
      type: text
      substr: Supports pass-the-hash

composite_rules:
  - id: requests-ntlm-library-context
    desc: Recognized requests-ntlm library context
    crit: exception
    conf: 0.99
    all:
      - id: module-path
      - id: http-ntlm-auth-class
      - id: ntlm-library-marker
