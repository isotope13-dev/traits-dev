defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.96

traits:
  - id: namespace
    desc: Firebase JWT namespace marker
    if:
      type: text
      regex: 'namespace\s+.{0,80}Firebase\\JWT'

  - id: jwk-class
    desc: Firebase JWT JWK class
    if:
      type: text
      regex: 'class\s+JWK\b'

composite_rules:
  - id: jwk-context
    desc: Firebase JWT JWK context
    crit: baseline
    conf: 0.98
    all:
      - id: namespace
      - id: jwk-class
