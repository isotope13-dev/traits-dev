defaults:
  size_max: 52428800
  platforms: [windows]
  for: [dll]
  crit: baseline
  conf: 0.97

traits:
  - id: imagehlp-company
    desc: Microsoft ImageHlp company metadata
    if:
      type: kv
      path: pe.version.company
      substr: Microsoft Corporation

  - id: imagehlp-description
    desc: Windows Image Helper metadata
    if:
      type: kv
      path: pe.version.description
      substr: Windows NT Image Helper

  - id: imagehlp-original-filename
    desc: IMAGEHLP.DLL original filename
    if:
      type: kv
      path: pe.version.original_filename
      exact: IMAGEHLP.DLL

  - id: imagehlp-pdb-path
    desc: ImageHlp PDB path
    crit: component
    conf: 0.9
    if:
      type: kv
      path: pe.debug.pdb.path
      exact: imagehlp.pdb

  - id: imagehlp-api-version-export
    desc: ImageHlp API version export
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: export
      exact: ImagehlpApiVersion

composite_rules:
  - id: microsoft-imagehlp-dll
    desc: Microsoft Windows ImageHlp DLL
    crit: notable
    conf: 0.99
    all:
      - id: imagehlp-company
      - id: imagehlp-original-filename
    any:
      - id: imagehlp-description
      - id: imagehlp-pdb-path
      - id: imagehlp-api-version-export
      - id: micro-behaviors/process/debug/symbol::remove-relocations
    needs: 2
