defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: native-addon-pdb-path
    desc: win-ca native addon build path
    crit: notable
    conf: 0.98
    size_min: 1000
    size_max: 500000
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])win-ca[\\/].*\.pdb$'

composite_rules:
  - id: win-ca-native-certificate-enumerator
    desc: win-ca native certificate enumeration addon
    crit: exception
    conf: 0.99
    all:
      - id: native-addon-pdb-path
      - id: micro-behaviors/crypto/certificate/store::cert-open-system-store
      - id: micro-behaviors/crypto/certificate/store::cert-enum-certificates
      - id: micro-behaviors/crypto/certificate/store::cert-close-store
