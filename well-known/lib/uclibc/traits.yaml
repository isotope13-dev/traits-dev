# uClibc / newlib static-link string tables commonly seen in
# stripped IoT ELFs (including Mirai builds). These are libc
# implementation artifacts, not C2 protocol markers.
defaults:
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.9
  size_min: 20000
  size_max: 5000000
traits:
  - id: printf-conversion-specifiers
    desc: uClibc printf conversion specifier table
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: npxXoudifFeEgGaACScs
      section: rodata
  - id: locale-class-bitmap
    desc: uClibc locale character-class bitmap
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: hlLjztqZ
      section: rodata
composite_rules:
  - id: static-uclibc-string-tables
    desc: Statically linked uClibc string tables
    crit: notable
    conf: 0.95
    all:
      - id: printf-conversion-specifiers
      - id: locale-class-bitmap
