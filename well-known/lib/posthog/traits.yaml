defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85

traits:
  - id: posthog-host
    desc: PostHog telemetry service host
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'posthog\.com'
      case_insensitive: true

  - id: posthog-event-object
    desc: PostHog event object fields
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'distinctId.{0,240}\bevent\b.{0,240}\bproperties\b|\bdistinct_id\b.{0,240}\bevent\b'
      case_insensitive: true

  - id: posthog-feature-flag-lookup
    desc: PostHog feature flag lookup
    conf: 0.88
    if:
      type: text
      regex: '\bgetFeatureFlag\s*\(|\bsendFeatureFlags\s*:'

composite_rules:
  - id: posthog-telemetry-client
    desc: PostHog analytics client identity
    conf: 0.92
    all:
      - id: posthog-host
    any:
      - id: posthog-event-object
      - id: posthog-feature-flag-lookup
