defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85

traits:
  - id: posthog-python-integration-import
    desc: Python PostHog integration import
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: import
      regex: '(^|\.)posthog(\.|$)'

  - id: posthog-host
    desc: PostHog telemetry service host
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'posthog\.com'
      case_insensitive: true

  - id: posthog-event-object
    desc: PostHog event object fields
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'distinctId.{0,240}\bevent\b.{0,240}\bproperties\b|\bdistinct_id\b.{0,240}\bevent\b'
      case_insensitive: true

  - id: posthog-feature-flag-lookup
    desc: PostHog feature flag lookup
    conf: 0.88
    if:
      type: text
      regex: '\bgetFeatureFlag\s*\(|\bsendFeatureFlags\s*:'

  - id: posthog-dotnet-binding-product
    desc: Maui.Posthog .NET binding product identity
    crit: notable
    conf: 0.95
    platforms: [windows]
    for: [pe, dll]
    size_min: 10000
    if:
      type: value
      path: pe.version.product_name
      exact: Maui.Posthog

  - id: posthog-dotnet-session-replay-start
    desc: Maui.Posthog session-replay start API metadata
    crit: notable
    conf: 0.95
    platforms: [windows]
    for: [pe, dll]
    size_min: 10000
    if:
      type: text
      substr: StartSessionReplay
      section: .text

  - id: posthog-dotnet-session-replay-stop
    desc: Maui.Posthog session-replay stop API metadata
    crit: notable
    conf: 0.95
    platforms: [windows]
    for: [pe, dll]
    size_min: 10000
    if:
      type: text
      substr: StopSessionReplay
      section: .text

composite_rules:
  - id: posthog-telemetry-client
    desc: PostHog analytics client identity
    conf: 0.92
    all:
      - id: posthog-host
    any:
      - id: posthog-event-object
      - id: posthog-feature-flag-lookup
