# Cydia Substrate is a legitimate iOS/macOS runtime-hooking framework.
# Its framework binary may contain low-level instructions and Apple cache
# path strings as part of its loader/runtime implementation.
defaults:
  platforms: [ios, macos]
  for: [macho, dylib]
traits:
  - id: framework-binary-path
    desc: Cydia Substrate framework binary
    crit: notable
    conf: 0.99
    size_min: 65536
    size_max: 10485760
    if:
      type: path
      regex: '(?i)(^|[\\/])CydiaSubstrate\\.framework([\\/]|$)'
  - id: framework-binary-basename
    desc: Cydia Substrate framework binary name
    crit: notable
    conf: 0.99
    size_min: 65536
    size_max: 10485760
    if:
      type: basename
      exact: CydiaSubstrate
