defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, npm]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: BitGo JavaScript SDK package name
    for: [package.json]
    if:
      type: value
      path: name
      regex: '^(bitgo|@bitgo/(sdk-core|sdk-lib-mpc))$'

  - id: repository-marker
    desc: BitGoJS repository marker
    for: [package.json, javascript, typescript]
    if:
      type: text
      regex: 'github\.com/BitGo/BitGoJS'

  - id: bitgo-package-path
    desc: BitGo package archive path
    for: [npm]
    if:
      type: path
      regex: '(^|[\\/])(@?bitgo|sdk-core)-[0-9][^\\/]*\.tgz$'

composite_rules:
  - id: bitgo-js-archive-context
    desc: Recognized BitGoJS package context
    crit: notable
    conf: 0.99
    scope: archive
    any:
      - id: package-name
      - id: repository-marker
      - id: bitgo-package-path
