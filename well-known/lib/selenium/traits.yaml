defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.99

traits:
  - id: selenium-manager-basename
    desc: Selenium Manager executable basename
    size_min: 1000000
    size_max: 20000000
    if:
      type: path
      basename: true
      exact: selenium-manager.exe
  - id: selenium-release-url
    desc: Selenium project release URL
    size_min: 1000000
    size_max: 20000000
    if:
      type: text
      section: .rdata
      exact: https://github.com/SeleniumHQ/selenium/releases/

composite_rules:
  - id: selenium-manager-official-binary
    desc: Official Selenium Manager Windows binary
    all:
      - id: selenium-manager-basename
      - id: selenium-release-url
