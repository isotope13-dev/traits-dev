# @stacksjs/ts-cloud is an infrastructure-as-code library. Its AWS credential
# resolution and cloud API requests are used to authenticate the user's own
# deployment, not to collect unrelated local credentials. Keep those generic
# capabilities visible while suppressing credential-stealer composites only
# when the published package identity and repository agree. The context is
# input-scoped so package-wide composites can use it.
defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, npm, archives]
  crit: notable
  conf: 1.0

traits:
  - id: ts-cloud-package-name
    desc: Stacks TS Cloud npm package identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      regex: '^(@stacksjs/ts-cloud|@ts-cloud/core)$'

  - id: ts-cloud-repository
    desc: Stacks TS Cloud upstream repository
    crit: notable
    for: [package.json]
    if:
      type: value
      path: repository.url
      regex: 'github\.com/stacksjs/ts-cloud(\.git)?'

  - id: ts-cloud-npm-package-name
    desc: Stacks TS Cloud npm archive identity
    crit: notable
    for: [npm]
    if:
      type: value
      path: npm.name
      regex: '^(@stacksjs/ts-cloud|@ts-cloud/core)$'

  - id: ts-cloud-npm-repository
    desc: Stacks TS Cloud npm archive upstream repository
    crit: notable
    for: [npm]
    if:
      type: value
      path: npm.repository.url
      regex: 'github\.com/stacksjs/ts-cloud(\.git)?'

  - id: ts-cloud-archive-package-name
    desc: TS Cloud package name in archive manifest
    crit: notable
    for: [javascript, typescript, npm]
    if:
      type: value
      path: package.json::name
      regex: '^(@stacksjs/ts-cloud|@ts-cloud/core)$'

  - id: ts-cloud-archive-repository
    desc: TS Cloud repository in archive manifest
    crit: notable
    for: [javascript, typescript, npm]
    if:
      type: value
      path: package.json::repository.url
      regex: 'github\.com/stacksjs/ts-cloud(\.git)?'

  - id: ts-cloud-generated-output-marker
    desc: TS Cloud generated output marker
    crit: notable
    for: [javascript, typescript]
    if:
      type: text
      substr: 'Generated by ts-cloud'

  - id: ts-cloud-aws-signing-marker
    desc: TS Cloud AWS signing marker
    crit: notable
    for: [javascript, typescript]
    if:
      type: text
      substr: AWS4-HMAC-SHA256

  - id: ts-cloud-ec2-credential-marker
    desc: TS Cloud EC2 credential marker
    crit: notable
    for: [javascript, typescript]
    if:
      type: text
      substr: '169.254.169.254/latest/meta-data/iam/security-credentials'

composite_rules:
  - id: ts-cloud-package-identity-evidence
    desc: TS Cloud package manifest identity evidence
    crit: notable
    conf: 1.0
    scope: outer
    all:
      - id: ts-cloud-package-name
      - id: ts-cloud-repository
      - id: ts-cloud-generated-output-marker

  - id: ts-cloud-npm-identity-evidence
    desc: TS Cloud npm archive identity evidence
    crit: notable
    conf: 1.0
    scope: outer
    all:
      - id: ts-cloud-npm-package-name
      - id: ts-cloud-npm-repository
      - id: ts-cloud-generated-output-marker

  - id: ts-cloud-archive-identity-evidence
    desc: TS Cloud archive manifest identity evidence
    crit: notable
    conf: 1.0
    scope: outer
    all:
      - id: ts-cloud-archive-package-name
      - id: ts-cloud-archive-repository
      - id: ts-cloud-generated-output-marker

  - id: ts-cloud-package-context
    desc: Recognized Stacks TS Cloud package context for archive-wide analysis
    crit: exception
    conf: 1.0
    scope: outer
    all:
      - id: ts-cloud-package-name
      - id: ts-cloud-repository

  - id: ts-cloud-npm-package-context
    desc: Recognized Stacks TS Cloud npm archive context for archive-wide analysis
    crit: exception
    conf: 1.0
    scope: outer
    all:
      - id: ts-cloud-npm-package-name
      - id: ts-cloud-npm-repository

  - id: ts-cloud-archive-package-context
    desc: Recognized TS Cloud archive context
    crit: exception
    conf: 1.0
    scope: outer
    all:
      - id: ts-cloud-archive-package-name
      - id: ts-cloud-archive-repository

  - id: ts-cloud-aws-runtime-context
    desc: Recognized TS Cloud AWS credential-resolution and signing runtime
    crit: exception
    conf: 1.0
    scope: outer
    all:
      - id: ts-cloud-aws-signing-marker
      - id: ts-cloud-ec2-credential-marker
    any:
      - id: ts-cloud-package-identity-evidence
      - id: ts-cloud-npm-identity-evidence
      - id: ts-cloud-archive-identity-evidence
