defaults:
  platforms: [windows, unix]
  for: [pe, dll, so, dylib]
  size_max: 15000000

traits:
  - id: tcl-tk-runtime-library
    desc: Tcl/Tk runtime shared library
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '^(tcl|tk)[0-9]{2}t?\.(dll|so|dylib)$'
      case_insensitive: true
  - id: tcl-tk-extension-library
    desc: Tcl/Tk extension shared library
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '^(tix|tcldde)[0-9]{2}\.(dll|so|dylib)$'
      case_insensitive: true
composite_rules:
  - id: tcl-tk-runtime-component
    desc: Tcl/Tk runtime or extension library
    crit: baseline
    conf: 0.98
    any:
      - id: tcl-tk-runtime-library
      - id: tcl-tk-extension-library
