# Redis-backed rate limiter for Go (github.com/go-redis/redis_rate).
#
# Token-bucket / leaky-bucket rate limiter using Redis as the shared store.
# Appears in API gateways, chat bots, and any service that needs cross-
# instance request rate enforcement.
defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.95
  size_min: 1024
  size_max: 524288000

traits:
  - id: redis-rate-import
    desc: Imports go-redis/redis_rate
    if:
      type: text
      regex: 'github\.com/go-redis/redis_rate(/v\d+)?'

  - id: redis-rate-allow-call
    desc: redis_rate Allow check
    if:
      type: text
      regex: '\.Allow\s*\(\s*ctx\b'

  - id: redis-rate-limit-struct
    desc: redis_rate.Limit literal
    crit: component
    if:
      type: text
      regex: '\bredis_rate\.(Limit|PerSecond|PerMinute|PerHour)'

composite_rules:
  - id: redis-rate-limiting
    desc: Go process uses Redis-backed rate limiting
    all:
      - id: redis-rate-import
    any:
      - id: redis-rate-allow-call
      - id: redis-rate-limit-struct
