defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: baseline
  conf: 0.96
  size_min: 1000
  size_max: 8000000

traits:
  - id: converter-bundle-path
    desc: json-ts converter bundle path
    crit: component
    if:
      type: basename
      regex: '^(json-ts(\.min)?|bin)\.js$'

  - id: source-map-marker
    desc: source map marker
    crit: component
    if:
      type: text
      substr: sourceMappingURL

  - id: json2ts-export-marker
    desc: json2ts export marker
    crit: component
    if:
      type: text
      substr: exports.json2ts

  - id: typescript-compiler-marker
    desc: TypeScript compiler marker
    crit: component
    if:
      type: text
      substr: TypeScript compiler release

composite_rules:
  - id: converter-bundle
    desc: json-ts converter bundle
    all:
      - id: converter-bundle-path
      - id: json2ts-export-marker
      - id: typescript-compiler-marker
