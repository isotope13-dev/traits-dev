defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: pageant-window-marker
    desc: Pageant SSH-agent window marker
    crit: notable
    conf: 0.99
    size_min: 30000
    size_max: 100000
    if:
      type: text
      substr: Pageant
      section: .data
  - id: pageant-request-protocol
    desc: Pageant SSH-agent request marker
    crit: notable
    conf: 0.95
    size_min: 30000
    size_max: 100000
    if:
      type: text
      substr: PageantRequest
      section: .data

composite_rules:
  - id: ssh2-pageant-helper-context
    desc: Recognized ssh2 Pageant helper context
    crit: exception
    conf: 0.99
    all:
      - id: pageant-window-marker
      - id: pageant-request-protocol
