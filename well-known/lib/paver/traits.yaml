# Paver's path utility uses ordinary filesystem metadata operations as part
# of its build and copy helpers; those operations are not timestomping.
defaults:
  platforms: [unix, windows]
  for: [python, pyc]
traits:
  - id: paver-module-path
    desc: Paver Python module path
    crit: notable
    conf: 0.99
    if:
      type: path
      regex: '(?i)(^|[\\/])paver([\\/]|$)'
