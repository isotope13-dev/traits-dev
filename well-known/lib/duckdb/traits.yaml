defaults:
  platforms: [windows, unix]
  for: [binaries, javascript]
  crit: baseline
  conf: 0.95
  size_max: 2147483648

traits:
  - id: go-bindings-module
    desc: DuckDB Go bindings module path
    if:
      type: text
      substr: github.com/duckdb/duckdb-go

  - id: c-api-export-prefix
    desc: DuckDB C API export prefix
    for: [pe, dll, elf, macho]
    if:
      type: export
      regex: ^duckdb_[a-z0-9_]+$

  - id: javascript-worker-path
    desc: DuckDB JavaScript worker bundle path
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '^duckdb(-node-eh)?\.worker\.(c?js|mjs)$|^duckdb-worker\.js$'

composite_rules:
  - id: javascript-worker-runtime
    desc: DuckDB JavaScript worker runtime bundle
    for: [javascript]
    all:
      - id: javascript-worker-path
      - id: metadata/library/structure::js-emscripten-generated-bundle

  - id: duckdb-library
    desc: DuckDB embedded database library
    any:
      - id: go-bindings-module
      - id: c-api-export-prefix
      - id: javascript-worker-runtime
