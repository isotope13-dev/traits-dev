# Selenium EngFlow CI credential helper script. Benign FP context.
defaults:
  platforms: [linux, windows, macos]
  for: [shell]
traits:
  - id: selenium-engflow-helper-uri
    desc: Selenium EngFlow URI marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: gypsum.cluster.engflow.com
  - id: selenium-engflow-helper-service
    desc: Selenium EngFlow service marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Selenium EngFlow
  - id: selenium-engflow-helper-emit-headers
    desc: Selenium helper header emitter
    crit: component
    conf: 0.98
    if:
      type: text
      substr: emit_headers
composite_rules:
  - id: selenium-engflow-credential-helper
    desc: Selenium EngFlow credential helper script
    crit: notable
    conf: 0.98
    all:
      - id: selenium-engflow-helper-uri
      - id: selenium-engflow-helper-service
      - id: selenium-engflow-helper-emit-headers
