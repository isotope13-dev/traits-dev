defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.95

traits:
  - id: zip-record-constants
    desc: JavaScript ZIP64 central-directory constant
    crit: component
    size_min: 32768
    if:
      type: text
      substr: ZIP64_CENTRAL_DIRECTORY_END
  - id: zip-data-descriptor-constant
    desc: JavaScript ZIP data descriptor constant
    crit: component
    size_min: 32768
    if:
      type: text
      substr: DATA_DESCRIPTOR

composite_rules:
  - id: bundled-zip-library
    desc: Bundled JavaScript ZIP library
    crit: notable
    all:
      - id: zip-record-constants
      - id: zip-data-descriptor-constant
