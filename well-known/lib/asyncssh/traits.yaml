# AsyncSSH is a dual-use Python SSH protocol library. Importing it identifies
# the dependency but does not, by itself, imply malicious remote access.
defaults:
  platforms: [linux, macos, windows]
  for: [python]

traits:
  - id: asyncssh-python-library
    desc: AsyncSSH Python SSH library
    crit: notable
    conf: 0.98
    if:
      type: symbol
      kind: import
      exact: asyncssh
