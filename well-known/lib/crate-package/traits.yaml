defaults:
  platforms: [unix, windows]
  for: [rust, shell]
  size_max: 1000000
traits:
  - id: rootcx-service-rs-name
    desc: rootcx-platform service.rs basename
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      exact: service.rs
  - id: rootcx-service-content
    desc: rootcx-platform service helper content
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: RootCX\\
  - id: ocgcore-setup-ndk-name
    desc: ocgcore setup-ndk.sh basename
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      exact: setup-ndk.sh
  - id: ocgcore-setup-ndk-content
    desc: ocgcore Android NDK setup helper content
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: ndk-bundle
composite_rules:
  - id: rootcx-platform-service-module
    desc: rootcx-platform crate service helper
    crit: notable
    conf: 0.98
    all:
      - id: rootcx-service-rs-name
      - id: rootcx-service-content
  - id: ocgcore-ffi-android-ndk-setup
    desc: ocgcore-ffi Android NDK setup helper
    crit: notable
    conf: 0.98
    all:
      - id: ocgcore-setup-ndk-name
      - id: ocgcore-setup-ndk-content
