defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.96
  size_max: 8388608
traits:
  # Identifies code that uses the pandas data-analysis library. Referenced as a
  # benign-context `unless:` by obfuscation/code-metrics composites — pandas /
  # data-science code legitimately has many lambdas and one-liners that trip
  # metrics-based obfuscation heuristics.
  - id: import
    desc: pandas data analysis library import
    if:
      type: text
      regex: \b(import|from)\s+pandas\b
