defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.96

traits:
  - id: suncalc-export-marker
    desc: SunCalc astronomy library export
    if:
      type: text
      regex: 'factory\(global\.SunCalc|exports\.SunCalc\s*='
  - id: suncalc-julian-epoch-constants
    desc: SunCalc Julian epoch constants
    if:
      type: text
      word: J2000
  - id: suncalc-sun-coords
    desc: SunCalc sunCoords routine
    if:
      type: symbol
      kind: function
      exact: sunCoords

composite_rules:
  - id: suncalc-astronomy-library
    desc: SunCalc sun/moon astronomy library
    crit: notable
    conf: 0.97
    all:
      - id: suncalc-julian-epoch-constants
    any:
      - id: suncalc-export-marker
      - id: suncalc-sun-coords
