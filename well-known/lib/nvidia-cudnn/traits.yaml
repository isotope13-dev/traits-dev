defaults:
  platforms: [linux]
  for: [elf, so]
  crit: baseline
  conf: 0.97
  size_max: 2147483648

traits:
  - id: cudnn-runtime-library-path
    desc: NVIDIA cuDNN runtime library path
    if:
      type: path
      regex: 'cudnn[^\\/]*[\\/]lib'

  - id: cudnn-runtime-basename
    desc: NVIDIA cuDNN runtime library basename
    if:
      type: basename
      regex: '^libcudnn.*\.so(\.[0-9]+)*$'

composite_rules:
  - id: runtime-library
    desc: NVIDIA cuDNN runtime library
    all:
      - id: cudnn-runtime-library-path
      - id: cudnn-runtime-basename
