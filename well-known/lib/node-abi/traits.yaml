defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: node-abi npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: node-abi

  - id: source-target-lookup
    desc: node-abi target lookup function
    for: [javascript]
    if:
      type: text
      substr: 'function getNextTarget (runtime, targets)'

  - id: lts-status-window
    desc: node-abi static LTS status window
    for: [javascript]
    if:
      type: text
      regex: 'target\.lts\s*=\s*startDate\s*<\s*currentDate\s*&&\s*currentDate\s*<\s*endDate'
