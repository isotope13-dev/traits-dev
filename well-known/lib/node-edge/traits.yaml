defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: component
  conf: 0.96

traits:
  - id: npm-package-name
    desc: node-edge npm package name
    crit: baseline
    for: [package.json]
    if:
      type: value
      path: name
      exact: node-edge

  - id: runtime-header
    desc: node-edge runtime basename
    for: [javascript]
    if:
      type: basename
      exact: node-edge.js

  - id: runtime-config-paths
    desc: node-edge runtime config paths
    for: [javascript]
    if:
      type: literal
      exact: m2mConfig/sec/

  - id: runtime-kdf-info-label
    desc: node-edge runtime KDF info label
    for: [javascript]
    if:
      type: literal
      exact: node-edge-info

  - id: endpoint-api-export
    desc: node-edge endpoint API export
    for: [javascript]
    if:
      type: symbol
      exact: edge.createServer

composite_rules:
  - id: edge-network-runtime-library
    desc: node-edge network runtime library
    crit: baseline
    conf: 0.99
    for: [javascript]
    all:
      - id: runtime-header
      - id: runtime-config-paths
      - id: runtime-kdf-info-label
      - id: endpoint-api-export
