# Benign browser-automation helper scripts (Playwright capture, real-device probe).
# FP context: headless-browser drivers resemble stealer collection.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript]
  size_max: 20000000
traits:
  - id: playwright-capture-helper
    desc: Playwright capture helper script
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '.*playwright.*capture.*\.mjs$'
  - id: browser-real-device-probe-helper
    desc: Browser real device probe helper script
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: 'browser_real_device_probe\.mjs$'
  - id: puppeteer-core-library-path
    desc: Contains bundled Puppeteer Core library paths
    crit: notable
    conf: 0.9
    size_min: 1000
    size_max: 20000000
    for: [javascript, typescript, python, pe, dll, csharp, go]
    if:
      type: text
      substr: puppeteer-core/lib/
  - id: puppeteer-core-require
    desc: JavaScript imports Puppeteer Core
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: 'require\s*\(\s*["'']puppeteer-core["'']\s*\)'
composite_rules:
  - id: browser-automation-helper-script
    desc: Browser automation helper script
    crit: notable
    conf: 0.95
    any:
      - id: playwright-capture-helper
      - id: browser-real-device-probe-helper
