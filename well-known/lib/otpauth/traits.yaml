defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.98

traits:
  - id: otpauth-library-bundle
    desc: OTPAuth TOTP/HOTP library bundle
    if:
      type: text
      regex: 'otpauth\s+[0-9]+\.[0-9]+\.[0-9]+'

  - id: noble-hashes-library-bundle
    desc: Noble hashes library bundle
    if:
      type: text
      substr: 'noble-hashes - MIT License'

composite_rules:
  - id: otpauth-noble-hashes-bundle
    desc: OTPAuth bundle with its noble hash dependency
    crit: notable
    conf: 0.99
    all:
      - id: otpauth-library-bundle
      - id: noble-hashes-library-bundle
