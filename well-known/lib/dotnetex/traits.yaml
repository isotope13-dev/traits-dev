defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.98
  size_min: 1024
  size_max: 5000000

traits:
  - id: hfextensions-assembly-name
    desc: HFDotnetEx HFExtensions assembly
    if:
      type: path
      basename: true
      exact: HFDotnetEx.HFExtensions.dll

  - id: dotnetex-extension-pdb-path
    desc: DotnetEx Extensions build path
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)\\DotnetEx\\src\\CsharpSrc\\Extensions\\'

  - id: dotnetex-product-metadata
    desc: DotnetEx product metadata
    if:
      type: value
      path: pe.version.product_name
      exact: Library From Old .NET Framework

composite_rules:
  - id: dotnetex-library
    desc: DotnetEx legacy framework library
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: hfextensions-assembly-name
      - id: dotnetex-extension-pdb-path
      - id: dotnetex-product-metadata
