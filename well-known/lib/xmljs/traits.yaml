defaults:
  platforms: [windows, unix]
  for: [package.json]

traits:
  - id: package-name
    desc: libxmljs native XML addon package name
    crit: notable
    conf: 0.99
    if:
      type: value
      path: name
      exact: libxmljs
  - id: repository-url
    desc: libxmljs source repository URL
    crit: notable
    conf: 0.99
    if:
      type: value
      path: repository.url
      exact: http://github.com/libxmljs/libxmljs.git
  - id: native-preinstall-script
    desc: libxmljs native addon preparation hook
    crit: notable
    conf: 0.99
    if:
      type: value
      path: scripts.preinstall
      exact: node scripts/preinstall.js
  - id: native-install-script
    desc: libxmljs native addon install hook
    crit: notable
    conf: 0.99
    if:
      type: value
      path: scripts.install
      exact: node-pre-gyp install --fallback-to-build --loglevel http -j max

composite_rules:
  - id: libxmljs-native-addon-context
    desc: Recognized libxmljs native addon package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: repository-url
      - id: native-preinstall-script
      - id: native-install-script
