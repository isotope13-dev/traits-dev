defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  crit: component
  conf: 0.96
  size_max: 5000000
traits:
- id: marked-header
  desc: Marked parser header
  if:
    type: text
    regex: marked v[0-9.]+ - a markdown parser
- id: marked-report-url
  desc: Marked parser report URL
  if:
    type: literal
    substr: github.com/markedjs/marked
- id: marked-regex-edit-helper
  desc: Marked regex edit helper
  if:
    type: text
    regex: function\s+edit\s*\(\s*regex,\s*opt\s*=
- id: marked-html-tag-list
  desc: Marked HTML tag allowlist
  if:
    type: text
    substr: address|article|aside|base|basefont|blockquote|body|caption|center|col|colgroup
composite_rules:
- id: marked-js-bundle
  desc: Marked JavaScript parser bundle
  crit: notable
  conf: 0.99
  all:
  - id: marked-html-tag-list
  any:
  - id: marked-report-url
  - id: marked-header
  - id: marked-regex-edit-helper
