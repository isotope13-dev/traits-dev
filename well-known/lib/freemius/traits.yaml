defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  - javascript
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: freemius-copyright
  desc: Freemius SDK copyright header
  for:
  - php
  if:
    type: text
    substr: Freemius, Inc.
- id: freemius-sdk-constant
  desc: Freemius WP_FS__ SDK constant
  for:
  - php
  if:
    type: text
    regex: WP_FS__[A-Z_]{2,40}
- id: freemius-js-ref
  desc: Freemius SDK JavaScript asset
  for:
  - javascript
  if:
    type: text
    substr: freemius
    case_insensitive: true
