# Freemius SDK — the ubiquitous WordPress plugin monetization/licensing SDK,
# vendored under vendor/freemius/ in thousands of legitimate plugins. Its
# checkout/pricing/trial code (PHP and the bundled pricing JS) legitimately
# references card brands ("Mastercard", "credit cards including Visa,
# Mastercard, American Express", "No credit card required") and uses dynamic
# dispatch (call_user_func_array) for WordPress hooks — both of which trip
# credential-access and webshell heuristics. Used as a positive `unless:`
# context to mute those FPs on the genuine SDK.
defaults:
  platforms: [windows, unix]
  for: [php, javascript]
  crit: baseline
  conf: 0.95
traits:
  - id: freemius-copyright
    desc: Freemius SDK copyright header
    for: [php]
    if:
      type: text
      substr: 'Freemius, Inc.'
  - id: freemius-sdk-constant
    desc: Freemius WP_FS__ SDK constant
    for: [php]
    if:
      type: text
      regex: 'WP_FS__[A-Z_]{2,40}'
  - id: freemius-js-ref
    desc: Freemius SDK JavaScript asset
    for: [javascript]
    if:
      type: text
      substr: freemius
      case_insensitive: true
# No composite: referencing the directory `well-known/lib/freemius` directly
# matches any of these atoms (a composite OR-ing all of them is a redundant
# directory alias).
