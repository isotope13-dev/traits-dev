defaults:
  platforms: [unix, windows]
  for: [documents, data, javascript]
  crit: baseline
  conf: 0.95
traits:
  - id: xterm-css-copyright
    desc: xterm.js stylesheet copyright
    if:
      type: text
      substr: 'Copyright (c) 2014 The xterm.js authors'
  - id: xterm-css-class
    desc: xterm.js terminal CSS class
    if:
      type: text
      substr: '.xterm'
composite_rules:
  - id: library
    desc: xterm.js library asset
    crit: notable
    conf: 0.96
    any:
      - id: xterm-css-copyright
      - id: xterm-css-class
