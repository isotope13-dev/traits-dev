defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  size_min: 1024
  size_max: 10485760
traits:
  - id: libiconv-dll-basename
    desc: GNU libiconv DLL basename
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: libiconv2.dll
  - id: libiconv-export
    desc: GNU libiconv export
    crit: baseline
    conf: 0.9
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: libiconv
composite_rules:
  - id: gnu-libiconv-library
    desc: GNU libiconv conversion library
    crit: baseline
    conf: 0.95
    all:
      - id: libiconv-dll-basename
      - id: libiconv-export
