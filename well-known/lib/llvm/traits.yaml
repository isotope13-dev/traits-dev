# LLVM library detection
# Identifies libLLVM component DLLs (compiler infrastructure).
# These are legitimate compiler/runtime libraries used by Clang,
# LLD, and other LLVM toolchain components.
defaults:
  size_max: 52428800
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: libllvm-export
    desc: libLLVM library export name
    crit: baseline
    conf: 0.95
    size_min: 100000
    if:
      type: text
      substr: libLLVM
composite_rules:
  - id: llvm-library
    desc: LLVM compiler library component
    crit: baseline
    conf: 0.98
    any:
      - id: libllvm-export
      - id: metadata/lang/compiler/native::llvm-string
      - id: metadata/lang/compiler/native::libllvm
