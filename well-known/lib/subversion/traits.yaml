defaults:
  size_max: 52428800
  platforms: [windows, linux, macos]
  for: [pe, elf, macho, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: subversion-source-path
    desc: Subversion source path string
    if:
      type: text
      substr: subversion/libsvn_
      section: .rdata

  - id: subversion-working-copy-db
    desc: Subversion working-copy database marker
    if:
      type: text
      exact: wc.db
      section: .rdata

  - id: subversion-working-copy-export
    desc: Subversion working-copy exported API
    crit: component
    conf: 0.9
    if:
      type: export
      regex: ^svn_wc_

  - id: msys-subversion-runtime-import
    desc: MSYS Subversion runtime import
    crit: component
    conf: 0.9
    if:
      type: text
      regex: msys-svn_(subr|delta|diff)-1-0\.dll
      section: .rdata

composite_rules:
  - id: subversion-working-copy-library
    desc: Subversion working-copy library
    crit: notable
    conf: 0.99
    all:
      - id: subversion-source-path
    any:
      - id: subversion-working-copy-db
      - id: subversion-working-copy-export
      - id: msys-subversion-runtime-import
    needs: 2
