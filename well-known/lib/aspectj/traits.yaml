defaults:
  platforms: [unix, windows]
  for: [jar, class, java_class]
  crit: notable
  conf: 0.99

traits:
  - id: aspectj-weaver-jar
    desc: AspectJ Weaver JAR identity
    for: [jar]
    if:
      type: basename
      regex: '^aspectjweaver-[0-9][A-Za-z0-9._-]*\.jar$'

  - id: aspectj-class-namespace
    desc: AspectJ Weaver Java class namespace
    for: [class, java_class]
    if:
      type: import
      regex: '^org/aspectj/'
