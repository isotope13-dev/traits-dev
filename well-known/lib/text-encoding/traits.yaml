defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: text-encoding npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: text-encoding
  - id: encoding-indexes-global
    desc: text-encoding indexes global assignment
    for: [javascript]
    if:
      type: text
      substr: 'global["encoding-indexes"]'
  - id: encoding-indexes-global-sq
    desc: text-encoding indexes global assignment
    for: [javascript]
    if:
      type: text
      substr: "global['encoding-indexes']"

composite_rules:
  - id: encoding-indexes-loader
    desc: text-encoding indexes loader
    crit: notable
    conf: 0.99
    any:
      - id: encoding-indexes-global
      - id: encoding-indexes-global-sq
