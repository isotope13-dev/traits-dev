defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: win32kfull-system-path
    desc: win32kfull system driver path
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)\\SystemRoot\\System32\\win32kfull\.sys
      section: rdata
  - id: win32kfull-api-set-table
    desc: win32kfull API set table
    crit: component
    conf: 0.95
    if:
      type: text
      exact: W32GetWin32kFullApiSetTable
      section: rdata
  - id: win32kbase-system-path
    desc: win32kbase system driver path
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)\\SystemRoot\\System32\\win32kbase\.sys
      section: rdata
  - id: win32kbase-api-set-table
    desc: win32kbase API set table
    crit: component
    conf: 0.95
    if:
      type: text
      exact: ext_ms_win_core_win32k_base_export_l1_table
      section: rdata
composite_rules:
  - id: win32kfull-system-component
    desc: Microsoft win32kfull kernel component
    crit: baseline
    conf: 0.97
    all:
      - id: win32kfull-system-path
      - id: win32kfull-api-set-table
  - id: win32kbase-system-component
    desc: Microsoft win32kbase kernel component
    crit: baseline
    conf: 0.97
    all:
      - id: win32kbase-system-path
      - id: win32kbase-api-set-table
