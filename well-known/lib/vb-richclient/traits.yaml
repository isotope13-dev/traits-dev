defaults:
  platforms: [windows]
  for: [pe, dll, whl]
  crit: notable
  conf: 0.99
  size_max: 100000000

traits:
  - id: vb-richclient-runtime-library
    desc: VB RichClient runtime library
    for: [pe, dll]
    if:
      type: basename
      regex: '^(RC6|RC6Widgets|vbRichClient5)\.dll$'
  - id: vb-richclient-runtime-bundle
    desc: Wheel bundles VB RichClient runtimes
    for: [whl]
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)(RC6|RC6Widgets|vbRichClient5)\.dll$'
