defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll]
  size_min: 16384
traits:
  - id: harmonylib-marker
    desc: HarmonyLib runtime-patching library marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: HarmonyLib
      section: .text
  - id: harmony-method-attribute
    desc: HarmonyMethod attribute (patch annotation)
    crit: component
    conf: 0.95
    if:
      type: text
      substr: HarmonyTargetMethod
      section: .text
composite_rules:
  - id: harmony-runtime-patcher
    desc: Harmony runtime detour/patching library
    crit: baseline
    conf: 0.99
    any:
      - id: harmonylib-marker
      - id: harmony-method-attribute
