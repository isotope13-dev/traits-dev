# @jsr/uri__abstract-bot-api is a legitimate multi-platform messaging API
# library.  The package identity is archive-scoped so its transport and test
# code is not mistaken for a credential stealer or tunnel payload.
defaults:
  platforms: [linux, macos, windows]
  for: [package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: '@jsr/uri__abstract-bot-api package metadata name'
    if:
      type: value
      path: name
      exact: '@jsr/uri__abstract-bot-api'

  - id: source-library-marker
    desc: 'Abstract Bot API source dependency marker'
    for: [javascript, typescript]
    if:
      type: text
      substr: '@jsr/uri__gamla'

composite_rules:
  - id: package-identity
    desc: Recognized @jsr/uri__abstract-bot-api package context
    crit: exception
    conf: 0.99
    for: [javascript, package.json]
    scope: archive
    any:
      - id: package-name
      - id: source-library-marker
