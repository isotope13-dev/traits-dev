defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: baseline
  conf: 0.97
  size_min: 8192
  size_max: 10485760

traits:
  - id: pyodide-runtime-path
    desc: Pyodide runtime path
    if:
      type: path
      regex: '(^|[\\/])pyodide[\\/]pyodide\.(asm\.)?js$'

  - id: pyodide-runtime-text
    desc: Pyodide runtime text
    if:
      type: text
      substr: pyodide

composite_rules:
  - id: pyodide-runtime-bundle
    desc: Pyodide runtime bundle
    all:
      - id: pyodide-runtime-path
      - id: pyodide-runtime-text
