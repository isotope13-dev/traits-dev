defaults:
  platforms: [unix, windows]
  for: [javascript, zip, python, wasm]
  crit: baseline
  conf: 0.97
  size_min: 8192
  size_max: 10485760

traits:
  - id: pyodide-runtime-path
    desc: Pyodide runtime path
    for: [javascript]
    if:
      type: basename
      regex: '^pyodide(\.asm)?\.js$'

  - id: pyodide-runtime-text
    desc: Pyodide runtime text
    for: [javascript]
    if:
      type: text
      substr: pyodide

  - id: pyodide-wasm-asset
    desc: Pyodide WebAssembly runtime asset
    crit: notable
    for: [wasm]
    if:
      type: basename
      exact: pyodide.asm.wasm

  - id: pyodide-stdlib-asset
    desc: Pyodide standard library asset
    crit: notable
    for: [whl, zip]
    if:
      type: value
      path: archive.members[*].path
      regex: 'pyodide/[0-9]+(\.[0-9]+)+/full/python_stdlib\.zip$'

composite_rules:
  - id: pyodide-runtime-bundle
    desc: Pyodide runtime bundle
    crit: notable
    for: [javascript]
    all:
      - id: pyodide-runtime-path
      - id: pyodide-runtime-text
