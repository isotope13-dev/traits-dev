defaults:
  platforms:
  - unix
  - windows
  for:
  - python
  - pyc
  - conda
  - archives
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 1000000000
traits:
- id: pytorch-site-package-path
  desc: PyTorch site-package path
  crit: component
  conf: 0.98
  for:
  - python
  - pyc
  if:
    type: path
    regex: '(^|[\\/])torch[\\/]'
- id: pytorch-conda-package-path
  desc: PyTorch Conda package path
  crit: component
  conf: 0.98
  for:
  - conda
  - archives
  if:
    type: path
    regex: '(^|[\\/])pytorch-[0-9][^\\/]*\.(conda|tar\.zst|tar)$'
composite_rules:
- id: pytorch-library
  desc: PyTorch library package context
  crit: notable
  conf: 0.98
  any:
  - id: pytorch-site-package-path
  - id: pytorch-conda-package-path
