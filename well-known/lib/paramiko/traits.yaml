# Paramiko is a dual-use Python SSH protocol library. Importing it identifies
# the dependency but does not, by itself, imply client or server behavior.
defaults:
  platforms: [linux, macos, windows]
  for: [python]

traits:
  - id: paramiko-python-library
    desc: Paramiko Python SSH library
    crit: notable
    conf: 0.98
    if:
      type: symbol
      kind: import
      exact: paramiko
