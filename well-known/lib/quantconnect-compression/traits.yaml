defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.96
  size_min: 512
  size_max: 52428800

traits:
  - id: product-versioninfo
    desc: QuantConnect.Compression product info
    if:
      type: value
      path: pe.version.product_name
      exact: QuantConnect.Compression

  - id: original-filename
    desc: QuantConnect.Compression original filename
    if:
      type: value
      path: pe.version.original_filename
      exact: QuantConnect.Compression.dll

  - id: quantconnect-company-versioninfo
    desc: QuantConnect CompanyName version info
    if:
      type: value
      path: pe.version.company
      exact: QuantConnect Corporation

  - id: lean-compression-pdb-path
    desc: QuantConnect Lean compression PDB path
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)[\\/]QuantConnect[\\/]Lean[\\/]Compression[\\/].*QuantConnect\.Compression\.pdb$'

composite_rules:
  - id: quantconnect-compression-library
    desc: QuantConnect.Compression .NET library
    crit: baseline
    conf: 0.99
    all:
      - id: product-versioninfo
      - id: original-filename
      - id: quantconnect-company-versioninfo
    any:
      - id: lean-compression-pdb-path
      - id: micro-behaviors/data/archive/extract/zip::dotnet-zip-extract
