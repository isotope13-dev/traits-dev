# Wintun — official WireGuard project's userspace TUN driver for
# Windows.
#
# Source: https://www.wintun.net/  (project)
#         https://git.zx2c4.com/wintun/  (canonical repo)
#
# Microsoft-driver-signed legitimate library used by WireGuard,
# OpenVPN, mainstream commercial VPN clients (NordVPN, ProtonVPN,
# Mullvad, ExpressVPN), and many IT tunnel products. Identification
# only; not a malicious indicator on its own.
#
# Notable when bundled with a binary that also drops it under tools/
# or %AppData% — the bundling itself is a campaign-context signal,
# captured by composites that reference this fingerprint plus the
# context.
defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 1024
  size_max: 4194304

traits:
  - id: wintun-create-adapter-export
    desc: WintunCreateAdapter export symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: WintunCreateAdapter

  - id: wintun-open-adapter-export
    desc: WintunOpenAdapter export symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: WintunOpenAdapter

  - id: wintun-sys-driver-file
    desc: wintun sys driver file
    crit: notable
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "wintun(-arm64|-x86|-amd64)?\\.sys"

  - id: wintun-catalog-file
    desc: wintun catalog file
    crit: notable
    conf: 0.92
    if:
      type: text
      section: rdata
      regex: "wintun(-arm64|-x86|-amd64)?\\.cat"

  - id: wintun-inf-file
    desc: wintun inf file
    crit: notable
    conf: 0.92
    if:
      type: text
      section: rdata
      regex: "wintun(-arm64|-x86|-amd64)?\\.inf"

  - id: wintun-registry-key
    desc: ROOT Wintun device key
    crit: notable
    conf: 0.95
    if:
      type: text
      section: rdata
      substr: "ROOT\\Wintun"

composite_rules:
  - id: wintun-driver-files
    desc: wintun driver companion files
    crit: notable
    conf: 0.95
    any:
      - id: wintun-sys-driver-file
      - id: wintun-catalog-file
      - id: wintun-inf-file

  - id: wintun-driver-component
    desc: Wintun WireGuard TUN driver component
    crit: notable
    conf: 0.99
    any:
      - id: wintun-create-adapter-export
      - id: wintun-open-adapter-export
    all:
      - id: wintun-driver-files
