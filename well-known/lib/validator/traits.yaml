# Validator.js string validation library fingerprints.
defaults:
  platforms: [windows, unix]
  for: [javascript]
  size_min: 512
  size_max: 16384

traits:
  - id: isdatauri-basename
    desc: Exact validator isDataURI basename
    crit: component
    conf: 0.98
    if:
      type: path
      basename: true
      exact: isDataURI.js

  - id: assertstring-import
    desc: Validator assertString import
    crit: component
    conf: 0.98
    if:
      type: text
      substr: 'require("./util/assertString")'

  - id: data-scheme-check
    desc: Checks literal data scheme
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "schemeAndMediaType.slice(0, 5) !== 'data:'"

  - id: base64-attribute-check
    desc: Checks literal base64 attribute
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "attributes[i].toLowerCase() === 'base64'"

  - id: isdatauri-validdata-regex
    desc: Validator DataURI payload regex
    crit: component
    conf: 0.995
    if:
      type: text
      substr: 'var validData = /^[a-z0-9!\$&''\(\)\*\+,;=\-\._~:@\/\?%\s]*$/i;'

composite_rules:
  - id: isdatauri-helper
    desc: Official validator isDataURI helper
    crit: notable
    conf: 0.99
    all:
      - id: isdatauri-basename
      - id: assertstring-import
      - id: data-scheme-check
      - id: base64-attribute-check
      - id: isdatauri-validdata-regex
