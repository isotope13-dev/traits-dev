defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.96

traits:
  - id: auth-js-web3-module
    desc: Supabase Auth Web3 module
    if:
      type: text
      substr: node_modules/@supabase/auth-js/dist/module/lib/web3/ethereum.js

  - id: storage-js-doc-examples
    desc: Supabase storage SDK examples
    if:
      type: text
      regex: '@supabase/(storage-js|supabase-js)|new StorageClient\('

