defaults:
  platforms: [unix, windows]
  for: [jar, class, java_class]
  crit: notable
  conf: 0.99

traits:
  - id: h2-jar-manifest
    desc: H2 Database Engine JAR identity
    for: [jar]
    if:
      type: value
      path: jar.manifest.bundle_symbolic_name
      exact: com.h2database

  - id: h2-class-namespace
    desc: H2 Database Engine Java class namespace
    for: [class, java_class]
    if:
      type: import
      regex: '^org/h2/'
