defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  size_min: 1024
  size_max: 10485760
traits:
  - id: libintl-dll-basename
    desc: GNU libintl DLL basename
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: libintl3.dll
  - id: libintl-prefixed-export
    desc: GNU libintl prefixed export
    crit: baseline
    conf: 0.9
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: libintl_gettext
composite_rules:
  - id: gnu-libintl-library
    desc: GNU libintl gettext library
    crit: baseline
    conf: 0.95
    all:
      - id: libintl-dll-basename
      - id: libintl-prefixed-export
