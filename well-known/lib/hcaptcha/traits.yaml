# hCaptcha — server-side siteverify flow. Benign FP context: secret-key + verify
# endpoint resemble credential exfiltration.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]
traits:
  - id: hcaptcha-siteverify-secret-context--rx-5
    desc: hCaptcha siteverify before secret key
    crit: component
    conf: 0.98
    if:
      type: text
      regex: "api\\.hcaptcha\\.com/siteverify[\\s\\S]{0,500}HCAPTCHA_SECRET_KEY"
    count_max: 1028188
  - id: hcaptcha-siteverify-secret-context--rx-6
    desc: hCaptcha secret key before siteverify
    crit: component
    conf: 0.98
    if:
      type: text
      regex: "HCAPTCHA_SECRET_KEY[\\s\\S]{0,500}api\\.hcaptcha\\.com/siteverify"
    count_max: 1028189
composite_rules:
  - id: hcaptcha-siteverify-secret-context
    desc: hCaptcha server verification flow
    crit: notable
    conf: 0.98
    any:
      - id: hcaptcha-siteverify-secret-context--rx-5
      - id: hcaptcha-siteverify-secret-context--rx-6
