# nbclassic is the maintained classic Jupyter Notebook front end.  Its release
# packages contain vendored browser loaders, sanitizer code, and security tests;
# those files can resemble generic loader, redirect, or file-walking heuristics.
defaults:
  platforms: [unix, windows]
  for: [javascript, python, tar]
  crit: notable
  conf: 0.98

traits:
  - id: package-name
    desc: nbclassic Python package identity
    for: [tar]
    if:
      type: text
      substr: '@name py313-nbclassic-'

  - id: package-member-path
    desc: nbclassic package member path
    if:
      type: path
      regex: '(^|[\\/])nbclassic([\\/]|-)'

composite_rules:
  - id: package-context
    desc: Recognized nbclassic release package context
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: package-name
    any:
      - id: package-member-path
