defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: component
  conf: 0.95
  size_max: 10000000

traits:
  - id: closure-base-runtime
    desc: Google Closure base runtime
    if:
      type: text
      substr: "var CLOSURE_NO_DEPS=true;var COMPILED=false;var goog=goog||{}"

  - id: closure-structs-runtime
    desc: Google Closure structs runtime
    if:
      type: text
      substr: "goog.provide(\"goog.structs\")"

  - id: closure-structs-filter
    desc: Google Closure structs filter helper
    if:
      type: text
      substr: "goog.structs.filter=function(col,f,opt_obj)"

composite_rules:
  - id: closure-library-runtime
    desc: Google Closure Library runtime
    crit: notable
    conf: 0.98
    all:
      - id: closure-base-runtime
      - id: closure-structs-runtime
    any:
      - id: closure-structs-filter
