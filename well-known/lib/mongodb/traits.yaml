defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  size_max: 200000000

traits:
  - id: mongodb-driver-basename
    desc: MongoDB JavaScript driver bundle basename
    crit: component
    conf: 0.95
    if:
      type: value
      path: file.basename
      exact: mongodb.js
  - id: mongodb-driver-client-symbol
    desc: MongoDB JavaScript driver client symbol
    crit: component
    conf: 0.95
    if:
      type: text
      substr: MongoClient must be connected
composite_rules:
  - id: mongodb-js-driver-bundle
    desc: MongoDB JavaScript driver bundle
    crit: baseline
    conf: 0.98
    all:
      - id: mongodb-driver-basename
      - id: mongodb-driver-client-symbol
      - id: objectives/credential-access/cloud/token/files::aws-iam-credential-access-path
