defaults:
  platforms: [macos, linux, windows]
  for: [macho, elf, pe, archives]
  crit: notable
  conf: 0.99
  size_max: 600000000

traits:
  - id: dotnet-nativeaot-runtime
    desc: Microsoft .NET NativeAOT runtime member
    if:
      type: path
      regex: '(?i)Microsoft\.NETCore\.App\.Runtime|iossimulator-x64'
