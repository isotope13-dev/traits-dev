# Pithikos/C-Thread-Pool — minimal MIT-licensed thread-pool library
# https://github.com/Pithikos/C-Thread-Pool
#
# Detection via the library's distinctive error strings; two matches
# strongly imply static linkage.
defaults:
  size_max: 52428800
  platforms: [linux, macos, windows]
  for: [binaries]
traits:
  - id: thpool-init-oom
    desc: thpool_init() OOM error string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "thpool_init(): Could not allocate memory for thread pool"
  - id: thpool-job-oom
    desc: thpool_add_work() OOM error string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "thpool_add_work(): Could not allocate memory for new job"
  - id: thpool-sigusr
    desc: thread_do() SIGUSR1 handler error string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "thread_do(): cannot handle SIGUSR1"
  - id: bsem-error
    desc: bsem_init() invalid value error string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "bsem_init(): Binary semaphore can take only values 1 or 0"
composite_rules:
  - id: c-thread-pool-lib-marker
    desc: Statically linked C-Thread-Pool library
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: well-known/lib/c-thread-pool::bsem-error
      - id: well-known/lib/c-thread-pool::thpool-init-oom
      - id: well-known/lib/c-thread-pool::thpool-job-oom
      - id: well-known/lib/c-thread-pool::thpool-sigusr
