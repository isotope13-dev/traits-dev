defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.98

traits:
  - id: jsch-jar-path
    desc: JCraft JSch library JAR
    ref: sha256:c1ec4978244ad1305c90a99e2b74741749066e105038c3621ad319de988ece74
    for: [jar]
    size_min: 100000
    size_max: 3000000
    if:
      type: basename
      regex: '^com\.jcraft\.jsch_[0-9][^\\/]*\.jar$'
  - id: junixsocket-native-library
    desc: junixsocket native support library
    ref: sha256:c1ec4978244ad1305c90a99e2b74741749066e105038c3621ad319de988ece74
    for: [elf, macho]
    size_min: 40000
    size_max: 120000
    if:
      type: basename
      regex: '^libjunixsocket-native-[0-9][^\\/]*\.(so|dylib)$'
