defaults:
  platforms: [linux]
  for: [elf, so]

traits:
  - id: libselinux-soname
    desc: libselinux shared-library soname
    crit: notable
    conf: 1.0
    size_min: 10000
    size_max: 1000000
    if:
      type: value
      path: elf.soname
      exact: libselinux.so.1

  - id: libselinux-basename
    desc: libselinux shared-library basename
    crit: notable
    conf: 1.0
    size_min: 10000
    size_max: 1000000
    if:
      type: basename
      regex: '^libselinux\.so(\.\d+)?$'

composite_rules:
  - id: official-libselinux
    desc: Recognized libselinux system library
    crit: exception
    conf: 1.0
    all:
      - id: libselinux-soname
      - id: libselinux-basename
