defaults:
  platforms: [windows, unix]
  for: [package.json]

traits:
  - id: package-name
    desc: Bunyan logging library package name
    crit: notable
    conf: 0.99
    if:
      type: value
      path: name
      exact: bunyan
  - id: package-description
    desc: Bunyan JSON logging library description
    crit: notable
    conf: 0.99
    if:
      type: value
      path: description
      substr: JSON logging library

composite_rules:
  - id: bunyan-library-context
    desc: Recognized Bunyan logging library package context
    crit: exception
    conf: 0.99
    for: [package.json, javascript, typescript]
    scope: archive
    all:
      - id: package-name
      - id: package-description
