defaults:
  for: [pe, elf, macho]
  platforms: [linux, macos, windows]
  size_min: 1048576
  size_max: 2147483647
traits:
  - id: isolate-symbol
    desc: V8 isolate API symbol
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: v8::Isolate
      section: rdata
  - id: build-configuration-flag
    desc: V8 build configuration flag string
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: v8_enable_
      section: rdata
composite_rules:
  - id: v8-runtime-multi-marker
    desc: V8 JavaScript runtime (API symbol and build configuration markers)
    crit: notable
    conf: 0.96
    all:
      - id: well-known/lib/v8::isolate-symbol
      - id: well-known/lib/v8::build-configuration-flag
