defaults:
  platforms: [linux, macos, windows]
  for: [package.json, data]

traits:
  - id: cookie-parser-upstream-repo
    desc: Repository shorthand points to cookie-parser
    crit: baseline
    conf: 0.94
    if:
      type: value
      path: "repository"
      substr: "expressjs/cookie-parser"

  - id: cookie-parser-upstream-repo-url
    desc: "Repo URL targets expressjs cookie-parser"
    crit: baseline
    conf: 0.94
    if:
      type: value
      path: "repository.url"
      substr: "github.com/expressjs/cookie-parser"

  - id: cookie-parser-upstream-homepage
    desc: Homepage points to cookie-parser project
    crit: baseline
    conf: 0.9
    if:
      type: value
      path: "homepage"
      substr: "github.com/expressjs/cookie-parser#readme"

  - id: cookie-parser-upstream-bugs
    desc: Bugs URL points to cookie-parser issues
    crit: baseline
    conf: 0.9
    if:
      type: value
      path: "bugs.url"
      substr: "github.com/expressjs/cookie-parser/issues"
