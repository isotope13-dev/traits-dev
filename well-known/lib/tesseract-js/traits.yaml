defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
  conf: 0.98
traits:
  - id: package-json-metadata
    desc: tesseract.js embedded package metadata
    if:
      type: text
      substr: '{"name":"tesseract.js","version":'
  - id: unpkg-worker-path
    desc: tesseract.js unpkg worker path
    if:
      type: text
      substr: 'https://unpkg.com/tesseract.js@v'
  - id: core-package-reference
    desc: tesseract.js-core package reference
    if:
      type: text
      substr: tesseract.js-core
composite_rules:
  - id: upstream-browser-bundle
    desc: Upstream tesseract.js browser bundle
    crit: component
    conf: 0.99
    needs: 2
    any:
      - id: package-json-metadata
      - id: unpkg-worker-path
      - id: core-package-reference
