defaults:
  platforms: [unix, windows]
  for: [python]
  crit: baseline
  conf: 0.96

traits:
  - id: source-tree
    desc: redis-py Python source tree
    crit: notable
    if:
      type: path
      # Match characteristic redis-py module files, not any project directory
      # named `redis` (for example tccli/services/redis/redis_client.py).
      regex: '(^|[\\/])redis[\\/](client|connection)\.py'
