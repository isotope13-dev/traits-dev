defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
  - id: version-header
    desc: Highlight.js version header
    crit: component
    conf: 0.99
    if:
      type: text
      regex: 'Highlight\.js v[0-9]+\.[0-9]+\.[0-9]+'
  - id: project-url
    desc: Highlight.js project URL
    crit: component
    conf: 0.99
    if:
      type: text
      substr: highlightjs/highlight.js

composite_rules:
  - id: browser-bundle
    desc: Highlight.js syntax-highlighter bundle
    crit: notable
    conf: 0.99
    all:
      - id: version-header
      - id: project-url
