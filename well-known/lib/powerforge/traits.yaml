defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.96
  size_min: 512
  size_max: 52428800

traits:
  - id: product-versioninfo
    desc: PowerForge ProductName version info
    if:
      type: value
      path: pe.version.product_name
      regex: '^PowerForge(\.|$)'

  - id: original-filename
    desc: PowerForge original filename
    if:
      type: value
      path: pe.version.original_filename
      regex: '^PowerForge(\..*)?\.dll$'

  - id: evotec-services-company
    desc: Evotec Services CompanyName version info
    if:
      type: value
      path: pe.version.company
      exact: Evotec Services sp. z o.o.

composite_rules:
  - id: powerforge-library
    desc: PowerForge .NET library
    crit: baseline
    conf: 0.99
    all:
      - id: product-versioninfo
      - id: original-filename
      - id: evotec-services-company
