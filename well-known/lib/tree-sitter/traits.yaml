defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, so, dylib, dll]
  crit: notable
  conf: 0.99
  size_min: 4096
  size_max: 8388608
traits:
  - id: tree-sitter-grammar-library
    desc: Tree-sitter parser grammar library
    if:
      type: symbol
      kind: export
      regex: '^_?tree_sitter_[a-z0-9_]+$'
