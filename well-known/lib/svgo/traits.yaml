defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript, package.json, npm, tar]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: SVGO npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: svgo

  - id: package-member-context
    desc: SVGO npm package member
    for: [javascript, typescript]
    if:
      type: value
      path: package.json::name
      exact: svgo

  - id: archive-member-path
    desc: SVGO npm archive member path
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|[\\/])svgo-[0-9][^\\/]*\.tgz'
