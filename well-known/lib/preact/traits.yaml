defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript]
  crit: baseline
  conf: 0.98

traits:
  - id: package-dependency
    desc: preact package dependency
    for: [package.json]
    unless:
      - id: metadata/package/testing/presence/fixture::preact-package-fixture-context
    if:
      type: value
      path: dependencies.preact
      exists: true

  - id: import-marker
    desc: preact import marker
    for: [javascript, typescript]
    if:
      type: import
      exact: preact
