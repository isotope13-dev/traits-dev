defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript]
  crit: baseline
  conf: 0.98

traits:
  - id: package-dependency
    desc: preact package dependency
    for: [package.json]
    unless:
      - id: metadata/package/testing/presence/fixture::component-test-package-json-path
      - id: metadata/package/testing/presence/fixture::types-helper-package-json-path
      - id: metadata/package/testing/presence/fixture::types-private-fixture-package
    if:
      type: kv
      path: dependencies.preact
      exists: true

  - id: import-marker
    desc: preact import marker
    for: [javascript, typescript]
    if:
      type: symbol
      kind: import
      exact: preact
