defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
  - javascript
  - typescript
  crit: baseline
  conf: 0.98
  size_max: 5000000
traits:
- id: package-dependency
  desc: preact package dependency
  for:
  - package.json
  unless:
  - id: metadata/package/testing/presence/fixture/
  if:
    type: value
    path: dependencies.preact
    exists: true
- id: import-marker
  desc: preact import marker
  for:
  - javascript
  - typescript
  if:
    type: import
    exact: preact
composite_rules:
- id: preact-library
  desc: preact UI library
  crit: notable
  conf: 0.98
  any:
  - id: package-dependency
  - id: import-marker
