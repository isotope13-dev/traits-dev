defaults:
  platforms: [windows, unix]
  for: [javascript, package.json]
  crit: notable
  conf: 0.98

traits:
  - id: undici-package-name
    desc: Undici npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: undici

  - id: undici-socks5-address-builder
    desc: Undici SOCKS5 address builder helper
    crit: component
    for: [javascript]
    if:
      type: function
      exact: buildAddressBuffer

  - id: undici-socks5-response-parser
    desc: Undici SOCKS5 response parser helper
    crit: component
    for: [javascript]
    if:
      type: function
      exact: parseResponseAddress

composite_rules:
  - id: undici-socks5-utils-module
    desc: Undici SOCKS5 utility module
    crit: notable
    conf: 0.98
    all:
      - id: undici-socks5-address-builder
      - id: undici-socks5-response-parser
