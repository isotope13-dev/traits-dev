defaults:
  platforms: [unix, windows]
  for: [python]
  size_min: 1
  size_max: 524288000

traits:
  - id: mastodon-py-authentication-mixin-import
    desc: Mastodon.py authentication mixin import
    crit: component
    conf: 0.92
    ref: sha256:fab39b4045be97c3d98a8425a3486b5561cca80ba0f61721a2070935eeba7846
    if:
      type: text
      substr: 'from mastodon.authentication import Mastodon as MastoAuthentication'

  - id: mastodon-py-main-class
    desc: Mastodon.py API client main class
    crit: component
    conf: 0.9
    ref: sha256:fab39b4045be97c3d98a8425a3486b5561cca80ba0f61721a2070935eeba7846
    if:
      type: text
      regex: 'class Mastodon\('

  - id: mastodon-py-module-path
    desc: Mastodon.py package module path
    crit: component
    conf: 0.9
    ref: sha256:fab39b4045be97c3d98a8425a3486b5561cca80ba0f61721a2070935eeba7846
    if:
      type: path
      regex: '(^|[\\/])mastodon[\\/]Mastodon\.py$'

composite_rules:
  - id: mastodon-py-library-context
    desc: Mastodon.py Python API client library context
    crit: notable
    conf: 0.98
    all:
      - id: mastodon-py-module-path
      - id: mastodon-py-authentication-mixin-import
      - id: mastodon-py-main-class
