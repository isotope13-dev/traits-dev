defaults:
  platforms: [unix]
  for: [elf, so]
traits:
- id: libguile-shared-library
  desc: Guile shared library
  crit: notable
  conf: 0.95
  size_min: 1000000
  size_max: 10000000
  if:
    type: basename
    regex: '^libguile-[0-9.]+\.so'
- id: guile-slib-archive-basename
  desc: Guile SLIB package archive basename
  crit: notable
  conf: 1.0
  for: [tar, archive]
  if:
    type: basename
    regex: '^guile[0-9]*-slib-[0-9][A-Za-z0-9._+-]*\.tgz$'
