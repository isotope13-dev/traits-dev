# react-native-noti-sdk is a notification library whose Android module asks
# users to exempt the app from battery optimization so delivery remains reliable.
defaults:
  platforms: [android]
  for: [package.json, java, kotlin]

traits:
  - id: package-name
    desc: react-native-noti-sdk package identity
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: name
      exact: react-native-noti-sdk

  - id: repository
    desc: react-native-noti-sdk source repository
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: repository.url
      regex: 'github\.com[/:]haonc/react-native-noti-sdk(\.git)?$'

  - id: android-module
    desc: Noti SDK Android module
    crit: notable
    conf: 0.99
    for: [kotlin, java]
    if:
      type: text
      regex: 'com\.rnnotisdk\.(NotiUiModule|NotiSdk)|NotiSdk/1\.0'

composite_rules:
  - id: source-notification-context
    desc: react-native-noti-sdk Android notification source context
    crit: exception
    conf: 0.99
    all:
      - id: android-module
      - id: micro-behaviors/os/privilege/check::android-battery-optimization-status
      - id: micro-behaviors/os/privilege/check::android-request-ignore-battery-action
      - id: micro-behaviors/os/message/intent::android-start-activity

  - id: archive-notification-context
    desc: react-native-noti-sdk notification package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: repository
      - id: micro-behaviors/ui/window/notify/message::android-rich-notification-actions
      - id: micro-behaviors/os/privilege/manifest::ignore-battery-optimizations
      - id: micro-behaviors/os/privilege/check::android-battery-optimization-status
      - id: micro-behaviors/os/privilege/check::android-request-ignore-battery-action
