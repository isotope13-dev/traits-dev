# gevent ships an explicitly documented, unauthenticated network REPL named
# BackdoorServer for local debugging.  Its source, tests, and bytecode are
# benign library context for the generic backdoor-server label rule.
defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  crit: notable
  conf: 0.99

traits:
  - id: gevent-backdoor-path
    desc: gevent backdoor module or test path
    if:
      type: path
      regex: '(?i)(^|[\\/])gevent[\\/]backdoor\.pyc?$'

  - id: gevent-package-marker
    desc: gevent package namespace marker
    if:
      type: text
      regex: '\bgevent\.'

composite_rules:
  - id: gevent-backdoor-debug-context
    desc: Recognized gevent backdoor debugging context
    crit: exception
    conf: 0.99
    all:
      - id: gevent-backdoor-path
      - id: gevent-package-marker
