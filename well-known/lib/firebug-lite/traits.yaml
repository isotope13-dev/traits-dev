defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: firebug-lite-debug-basename
    desc: Firebug Lite debug bundle basename
    crit: component
    conf: 0.95
    if:
      type: value
      path: file.basename
      exact: firebug-lite-debug.js
  - id: firebug-lite-project-url
    desc: Firebug Lite project URL
    crit: component
    conf: 0.98
    if:
      type: text
      substr: firebug-lite
composite_rules:
  - id: firebug-lite-debug-bundle
    desc: Firebug Lite debug bundle
    crit: baseline
    conf: 0.98
    all:
      - id: firebug-lite-debug-basename
      - id: firebug-lite-project-url
