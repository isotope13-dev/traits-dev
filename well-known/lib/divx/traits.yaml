defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.96

traits:
  - id: divx-company
    desc: DivX company metadata
    if:
      type: value
      path: pe.version.company
      substr: DivX, Inc.

  - id: divx-product-name
    desc: DivX product metadata
    if:
      type: value
      path: pe.version.product_name
      substr: DivX

  - id: divx-original-filename
    desc: DivX original DLL filename
    if:
      type: value
      path: pe.version.original_filename
      exact: DivX.dll

composite_rules:
  - id: divx-dll
    desc: DivX DLL
    crit: notable
    conf: 0.99
    all:
      - id: divx-original-filename
    any:
      - id: divx-company
      - id: divx-product-name
