defaults:
  platforms: [unix, windows]
  for: [javascript, json]
  crit: baseline
  conf: 0.95
traits:
  - id: package-json-name
    desc: function-bind package manifest
    if:
      type: text
      substr: '"name": "function-bind"'
  - id: implementation-error-message
    desc: function-bind implementation source
    if:
      type: text
      substr: 'Function.prototype.bind called on incompatible'
composite_rules:
  - id: library
    desc: function-bind library
    crit: notable
    conf: 0.96
    any:
      - id: package-json-name
      - id: implementation-error-message
