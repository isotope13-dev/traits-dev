defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: component
  conf: 0.98

traits:
  - id: pkginfo-name-django
    desc: Django package metadata name
    if:
      type: value
      path: name
      exact: Django
  - id: pkginfo-framework-classifier
    desc: Django package classifier
    if:
      type: value
      path: classifier
      exact: "Framework :: Django"
  - id: pkginfo-project-url
    desc: Django project URL metadata
    if:
      type: value
      path: project-url
      substr: https://www.djangoproject.com/
  - id: pkginfo-framework-summary
    desc: Django web framework summary
    if:
      type: value
      path: summary
      substr: Python web framework

composite_rules:
  - id: django-python-web-framework
    desc: Django Python web framework
    crit: notable
    conf: 0.99
    needs: 3
    any:
      - id: pkginfo-name-django
      - id: pkginfo-framework-classifier
      - id: pkginfo-project-url
      - id: pkginfo-framework-summary
