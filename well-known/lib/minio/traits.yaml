# MinIO JavaScript client identity. Its AWS IAM provider intentionally reads
# the ECS/EC2 credential endpoints as part of normal S3 client authentication.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.97

traits:
  - id: node-module-path
    desc: MinIO Node.js module path
    if:
      type: path
      regex: 'node_modules[\\/]minio[\\/]'
  - id: iam-aws-provider-basename
    desc: MinIO AWS IAM provider filename
    if:
      type: basename
      regex: '^IamAwsProvider\.(js|mjs)$'

composite_rules:
  - id: minio-iam-aws-provider
    desc: MinIO AWS IAM credential provider
    crit: notable
    conf: 0.99
    all:
      - id: node-module-path
      - id: iam-aws-provider-basename
