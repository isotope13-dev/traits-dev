defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, dll]
  size_max: 10485760
  crit: notable
  conf: 0.95

traits:
  - id: embedded-sqlite-runtime-basename
    desc: Embedded SQLite native runtime
    if:
      type: basename
      regex: '^(lib)?e_sqlite3\.(so|dylib|dll)$'
  - id: sqlite-jdbc-native-runtime
    desc: Xerial SQLite JDBC native runtime
    if:
      type: basename
      regex: '^(lib)?sqlitejdbc\.(so|dylib|dll)$'
