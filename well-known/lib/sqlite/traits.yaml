defaults:
  size_max: 10485760
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: sqlite-tcl-init-export
    desc: SQLite Tcl init export
    if:
      type: export
      exact: Tclsqlite3_Init

  - id: sqlite3-init-export
    desc: SQLite init export
    if:
      type: export
      exact: Sqlite3_Init

  - id: sqlite-version-string
    desc: SQLite version string
    crit: component
    conf: 0.86
    if:
      type: text
      section: .rdata
      exact: sqlite_version

composite_rules:
  - id: sqlite-tcl-extension-library
    desc: SQLite Tcl extension library
    crit: notable
    conf: 0.98
    all:
      - id: sqlite-tcl-init-export
      - id: sqlite3-init-export
    any:
      - id: sqlite-version-string
      - id: micro-behaviors/data/db/sqlite::sqlite-format
