defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: yui-connection-copyright
    desc: Yahoo YUI connection library copyright
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: 'Copyright (c) 2011, Yahoo! Inc.'
  - id: yui-connection-namespace
    desc: Yahoo YUI connection namespace
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: YAHOO.util.Connect
  - id: yui-connection-version
    desc: Yahoo YUI 2.9 connection version
    crit: notable
    conf: 1.0
    if:
      type: text
      regex: 'version:\s*2\.9\.0'

composite_rules:
  - id: yui-connection-library
    desc: Recognized Yahoo YUI connection library
    crit: exception
    conf: 1.0
    all:
      - id: yui-connection-copyright
      - id: yui-connection-namespace
      - id: yui-connection-version
