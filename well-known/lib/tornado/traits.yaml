defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.97
  size_max: 268435456

traits:
  - id: source-tree
    desc: Tornado Python web framework source tree
    if:
      type: path
      regex: '(^|[\\/])tornado([\\/]|-[0-9])'

  - id: site-package
    desc: Tornado installed Python package
    if:
      type: path
      regex: 'site-packages[\\/]tornado[\\/]'

composite_rules:
  - id: library-code
    desc: Tornado Python framework code
    crit: notable
    conf: 0.98
    any:
      - id: source-tree
      - id: site-package
