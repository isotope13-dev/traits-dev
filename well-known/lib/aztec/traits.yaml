# Official Aztec Noir circuit package and its Barretenberg native Node addon.
# The native addon uses socket/connect for its local shared-memory message
# processor; these markers identify that implementation context without
# treating generic socket capability as malicious.
defaults:
  platforms: [linux, macos, windows]
  crit: notable
  conf: 0.98

traits:
  - id: noir-protocol-circuits-types-package
    desc: Aztec Noir protocol circuits package
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@aztec/noir-protocol-circuits-types'

  - id: barretenberg-native-addon-basename
    desc: Barretenberg native Node addon basename
    for: [elf, macho]
    size_min: 1000000
    size_max: 10000000
    if:
      type: basename
      exact: nodejs_module.node

  - id: barretenberg-spsc-shm-marker
    desc: Barretenberg SPSC shared-memory marker
    for: [elf, macho]
    size_min: 1000000
    size_max: 10000000
    if:
      type: text
      word: SpscShm
      section: .rodata

  - id: barretenberg-mpsc-producer-marker
    desc: Barretenberg MPSC producer marker
    for: [elf, macho]
    size_min: 1000000
    size_max: 10000000
    if:
      type: text
      word: MpscProducer
      section: .rodata

  - id: barretenberg-mpsc-consumer-marker
    desc: Barretenberg MPSC consumer marker
    for: [elf, macho]
    size_min: 1000000
    size_max: 10000000
    if:
      type: text
      word: MpscConsumer
      section: .rodata

composite_rules:
  - id: barretenberg-native-node-addon
    desc: Barretenberg native Node addon identity
    crit: notable
    conf: 0.99
    all:
      - id: barretenberg-native-addon-basename
      - id: barretenberg-shared-memory-implementation

  - id: barretenberg-shared-memory-implementation
    desc: Barretenberg shared-memory IPC implementation
    crit: notable
    conf: 0.99
    any:
      - id: barretenberg-spsc-shm-marker
      - id: barretenberg-mpsc-producer-marker
      - id: barretenberg-mpsc-consumer-marker
