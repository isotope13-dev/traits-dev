# CTPF (https://github.com/q-uestionable-AI/CTPF) is a defensive
# trust-boundary testing harness for agentic systems.
defaults:
  platforms: [unix, windows]
  for: [pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: CTPF package metadata identity
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: ctpf

  - id: repository
    desc: CTPF upstream repository marker
    if:
      type: text
      substr: github.com/q-uestionable-AI/CTPF

  - id: package-path
    desc: CTPF package member path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])q_ai([\\/]|$)'

composite_rules:
  - id: package-context
    desc: Recognized CTPF package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: package-path
