defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: component
  conf: 0.98
  size_min: 1
  size_max: 50000000

traits:
  - id: core-feature-class
    desc: Tabulator CoreFeature class marker
    if:
      type: text
      substr: class CoreFeature
  - id: register-module-call
    desc: Tabulator registerModule call marker
    if:
      type: text
      substr: Tabulator.registerModule

composite_rules:
  - id: tabulator-grid-bundle
    desc: Tabulator grid library bundle
    crit: baseline
    conf: 0.99
    all:
      - id: core-feature-class
      - id: register-module-call
