defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: official-crypto-sdk-package
    desc: Official crypto SDK package identity
    if:
      type: value
      path: package.json::name
      regex: '^(@injectivelabs/|@ledgerhq/|viem$|ox$)'

  - id: official-crypto-sdk-manifest
    desc: Official crypto SDK manifest identity
    for: [package.json]
    if:
      type: value
      path: name
      regex: '^(@injectivelabs/|@ledgerhq/|viem$|ox$)'

  - id: trezor-connect-webextension-library
    desc: Trezor Connect WebExtension library
    for: [javascript, typescript]
    if:
      type: literal
      substr: '@trezor/connect-webextension'
