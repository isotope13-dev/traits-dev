# MCP server exposing GitHub issue image/attachment/comment tools. Benign FP
# context: GitHub API calls in an MCP tool resemble exfiltration.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]
  crit: component
  conf: 0.98
traits:
  - id: mcp-sdk-server-import
    desc: MCP SDK server import
    if:
      type: text
      substr: "@modelcontextprotocol/sdk/server/mcp.js"
  - id: github-issue-images-tool
    desc: GitHub issue images tool
    if:
      type: text
      substr: 'title: "GitHub Issue Images"'
  - id: github-issue-attachments-tool
    desc: GitHub issue attachments tool
    if:
      type: text
      substr: 'title: "GitHub Issue Attachments"'
  - id: github-issue-comments-api
    desc: GitHub issue comments API
    conf: 0.97
    if:
      type: text
      substr: "/issues/${issueNumber}/comments?per_page="
composite_rules:
  - id: benign-github-issue-artifacts-mcp
    desc: MCP GitHub issue artifact retriever
    crit: notable
    conf: 0.98
    all:
      - id: mcp-sdk-server-import
      - id: github-issue-images-tool
      - id: github-issue-attachments-tool
      - id: github-issue-comments-api
