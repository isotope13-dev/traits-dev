defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: component
  conf: 0.98
  size_min: 1
  size_max: 2000000

traits:
  - id: lexer-cjs-basename
    desc: es-module-lexer CJS basename
    if:
      type: path
      basename: true
      exact: lexer.cjs
  - id: lexer-cjs-content-marker
    desc: es-module-lexer CJS content marker
    if:
      type: text
      substr: exports.parse=parse

composite_rules:
  - id: dist-lexer-cjs
    desc: es-module-lexer CJS distribution
    crit: baseline
    conf: 0.99
    all:
      - id: lexer-cjs-basename
      - id: lexer-cjs-content-marker
