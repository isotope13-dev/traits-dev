defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, package.json]
  crit: component
  conf: 0.96

traits:
  - id: npm-package-name
    desc: styled-jsx npm package name
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: styled-jsx
  - id: npm-package-repository
    desc: styled-jsx npm repository identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: repository
      regex: '(^|/)vercel/styled-jsx$'
  - id: archive-package-name
    desc: styled-jsx npm archive name
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.name
      exact: styled-jsx
  - id: archive-package-repository
    desc: styled-jsx npm archive repository
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.repository.url
      regex: '(^|/)vercel/styled-jsx$'
  - id: package-member-context
    desc: styled-jsx package member identity
    crit: notable
    for: [javascript, typescript]
    if:
      type: value
      path: package.json::name
      exact: styled-jsx
  - id: archive-member-path
    desc: styled-jsx npm archive member path
    crit: notable
    for: [javascript, typescript]
    if:
      type: path
      substr: styled-jsx-

composite_rules:
  - id: official-npm-archive
    desc: Official styled-jsx npm archive identity
    crit: notable
    conf: 0.99
    for: [npm, tar]
    scope: archive
    all:
      - id: archive-package-name
      - id: archive-package-repository
