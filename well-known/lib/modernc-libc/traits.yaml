defaults:
  size_max: 52428800
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.95

traits:
  - id: source-tree
    desc: modernc libc generated source or package path
    crit: notable
    for: [go, c, cpp, text, archive]
    if:
      type: path
      regex: 'modernc\.org(:|[/\\])libc(@v|[-:]v)'
  - id: libc-xdlsym-runtime
    desc: modernc libc dynamic symbol shim
    if:
      type: text
      exact: modernc.org/libc.Xdlsym
      section: rdata
