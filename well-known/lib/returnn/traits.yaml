# RETURNN is a legitimate Python deep-learning and sequence-modeling framework.
# These traits identify the distribution context; they do not suppress the
# package's neutral process, network, filesystem, or native-build capabilities.
defaults:
  platforms: [linux, macos, windows]
  for: [whl]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: RETURNN Python wheel identity
    if:
      type: value
      path: whl.distribution
      exact: returnn

  - id: upstream-homepage
    desc: RETURNN upstream GitHub homepage
    if:
      type: value
      path: whl.home_page
      regex: '^https://github\.com/rwth-i6/returnn/?$'

composite_rules:
  - id: package-identity
    desc: Recognized RETURNN machine-learning framework wheel
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: upstream-homepage
