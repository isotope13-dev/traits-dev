defaults:
  platforms: [unix]
  for: [elf, so]
  crit: notable
  conf: 0.99
  size_min: 100000
  size_max: 20000000

traits:
  - id: libsystemd-shared-library
    desc: libsystemd shared library basename
    if:
      type: basename
      # Distribution builds also ship the private shared runtime as
      # libsystemd-shared-<release>.so.
      regex: '^libsystemd(-shared)?(-[0-9][0-9A-Za-z.-]*)?\.so(\.[0-9.]+)?$'

  - id: libudev-shared-library
    desc: libudev shared library basename
    if:
      type: basename
      # auditwheel embeds an eight-hex content tag before the SONAME suffix.
      regex: '^libudev(-[0-9a-f]{8})?\.so(\.[0-9.]+)?$'

composite_rules:
  - id: systemd-shared-library
    desc: systemd runtime shared library
    crit: notable
    conf: 0.99
    any:
      - id: libsystemd-shared-library
      - id: libudev-shared-library
