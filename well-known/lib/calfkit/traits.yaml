# Calfkit is a benign Python framework for decentralized AI-agent services.
# These identity traits preserve that context while leaving its real network,
# IPC, environment, filesystem, and process capabilities visible as neutral
# micro-behaviors.
defaults:
  platforms: [unix, windows]
  for: [whl, pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Calfkit Python wheel identity
    for: [whl]
    if:
      type: value
      path: whl.distribution
      exact: calfkit

  - id: repository-marker
    desc: Calfkit upstream repository marker
    for: [pkginfo]
    if:
      type: value
      path: project-url
      regex: 'github\.com/calf-ai/calfkit-sdk(/|$)'

  - id: vendored-pydantic-ai
    desc: Calfkit vendored Pydantic AI source
    for: [whl]
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)calfkit/_vendor/pydantic_ai/'

  - id: agent-mesh-module
    desc: Calfkit agent mesh URL module
    for: [python]
    if:
      type: path
      regex: 'calfkit[/\\]client[/\\]_mesh_url\.py$'

composite_rules:
  - id: package-identity
    desc: Recognized Calfkit AI-agent framework package
    crit: notable
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: package-name
    any:
      - id: vendored-pydantic-ai
      - id: repository-marker
    needs: 1
