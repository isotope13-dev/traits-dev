# geeviz (https://github.com/gee-community/geeviz) is an Earth Engine
# visualization and analysis toolkit.
defaults:
  platforms: [unix, windows]
  for: [pkginfo, python, javascript]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: GeeViz package metadata identity
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: geeviz

  - id: repository
    desc: GeeViz upstream repository marker
    if:
      type: text
      substr: github.com/gee-community/geeviz

  - id: package-path
    desc: GeeViz package member path
    for: [python, javascript]
    if:
      type: path
      regex: '(^|[\\/])geeViz([\\/]|$)'

composite_rules:
  - id: package-context
    desc: Recognized GeeViz package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-name
      - id: package-path
