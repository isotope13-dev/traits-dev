defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - ruby
  - tar
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: package-path-active-support
  desc: ActiveSupport source path marker
  if:
    type: path
    basename: true
    substr: active_support
    case_insensitive: true
- id: package-path-gem
  desc: ActiveSupport RubyGem path marker
  if:
    type: path
    basename: true
    regex: "(?i)activesupport-[0-9]"
- id: module
  desc: ActiveSupport Ruby module marker
  for:
  - ruby
  if:
    type: text
    regex: 'module\s+ActiveSupport\b|class\s+ActiveSupport::'
composite_rules:
- id: active-support-library
  desc: Rails ActiveSupport Ruby library
  crit: notable
  conf: 0.97
  needs: 2
  any:
  - id: package-path-active-support
  - id: package-path-gem
  - id: module
