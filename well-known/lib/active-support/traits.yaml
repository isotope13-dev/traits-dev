defaults:
  platforms: [linux, macos, windows]
  for: [ruby, tar]
  crit: baseline
  conf: 0.95

traits:
  - id: package-path-active-support
    desc: ActiveSupport source path marker
    if:
      type: basename
      substr: active_support
      case_insensitive: true
  - id: package-path-gem
    desc: ActiveSupport RubyGem path marker
    if:
      type: basename
      regex: '(?i)activesupport-[0-9]'
  - id: module
    desc: ActiveSupport Ruby module marker
    for: [ruby]
    if:
      type: text
      regex: 'module\s+ActiveSupport\b|class\s+ActiveSupport::'

composite_rules:
  - id: library
    desc: ActiveSupport Ruby library identity
    any:
      - id: package-path-active-support
      - id: package-path-gem
      - id: module
