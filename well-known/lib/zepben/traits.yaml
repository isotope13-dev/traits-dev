defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: create-token-fetcher-managed-identity
    desc: Zepben managed-identity token helper
    crit: notable
    conf: 0.98
    if:
      type: text
      word: create_token_fetcher_managed_identity

  - id: connect-with-identity-helper
    desc: Zepben identity connection helper
    crit: notable
    conf: 0.98
    if:
      type: text
      word: connect_with_identity

composite_rules:
  - id: azure-managed-identity-helper
    desc: Zepben Azure managed-identity helper
    crit: notable
    conf: 0.98
    any:
      - id: create-token-fetcher-managed-identity
      - id: connect-with-identity-helper
