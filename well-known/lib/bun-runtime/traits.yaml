defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, elf, macho, pe]
  crit: component
  conf: 0.94
  size_min: 1048576
  size_max: 536870912

traits:
  - id: bun-sqlite-module
    desc: Bun SQLite module import
    if:
      type: text
      substr: bun:sqlite

  - id: bun-version-marker
    desc: Bun runtime version marker
    if:
      type: text
      substr: BUN_1.2

  - id: bun-profile-marker
    desc: Bun profile marker
    if:
      type: text
      substr: bun-profile

  - id: bun-napi-ffi-marker
    desc: Bun NAPI FFI marker
    if:
      type: text
      substr: Bun__thisFFIModuleNapiEnv

  - id: javascriptcore-source-path
    desc: JavaScriptCore source path marker
    if:
      type: text
      substr: vendor/WebKit/Source/JavaScriptCore

  - id: zig-global-object-source
    desc: Bun ZigGlobalObject source marker
    if:
      type: text
      substr: ZigGlobalObject.cpp

composite_rules:
  - id: native-runtime-markers
    desc: Bun native runtime markers
    crit: component
    conf: 0.96
    any:
      - id: bun-version-marker
      - id: bun-profile-marker
      - id: bun-napi-ffi-marker

  - id: source-path-markers
    desc: Bun source path markers
    crit: component
    conf: 0.96
    any:
      - id: javascriptcore-source-path
      - id: zig-global-object-source

  - id: runtime-context
    desc: Bun runtime bundle context
    crit: component
    conf: 0.97
    needs: 2
    any:
      - id: metadata/binary/section/name::bun-section-name
      - id: micro-behaviors/dylib/load/runtime::bun-ffi-module
      - id: bun-sqlite-module
      - id: native-runtime-markers
      - id: source-path-markers
