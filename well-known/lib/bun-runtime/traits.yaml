defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: bun-powershell-command-template
    desc: Bun PowerShell command template
    crit: component
    conf: 0.98
    size_min: 1000000
    if:
      type: text
      substr: 'powershell -ExecutionPolicy Bypass -File'
      section: .rdata

composite_rules:
  - id: runtime-context
    desc: Bun runtime bundle context
    crit: notable
    conf: 0.99
    all:
      - id: metadata/binary/section/name::bun-section-name
      - id: bun-powershell-command-template
