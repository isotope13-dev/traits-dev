defaults:
  platforms: [unix, windows]
  for: [binaries]

traits:
  - id: native-keyring-package-version
    desc: Native keyring package version marker
    crit: notable
    conf: 0.98
    size_min: 10000
    size_max: 10000000
    if:
      type: text
      regex: '(windows-native-keyring-store|keyring-core)-[0-9]+\.[0-9]+\.[0-9]+'

  - id: zowe-cli-source-root
    desc: Zowe CLI source root marker
    crit: notable
    conf: 0.98
    size_min: 10000
    size_max: 10000000
    if:
      type: text
      regex: '(?i)[\\/]zowe-cli[\\/]+zowe-cli[\\/]'

  - id: zowe-secrets-core-source
    desc: Zowe secrets core source marker
    crit: notable
    conf: 0.98
    size_min: 10000
    size_max: 10000000
    if:
      type: text
      regex: '(?i)packages[\\/]secrets[\\/]core[\\/]src[\\/]os[\\/]'

composite_rules:
  - id: zowe-secrets-native-keyring-source
    desc: Zowe native keyring backend source
    crit: exception
    conf: 0.99
    all:
      - id: zowe-cli-source-root
      - id: zowe-secrets-core-source
