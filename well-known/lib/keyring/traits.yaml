defaults:
  platforms: [unix, windows]
  for: [binaries]

traits:
  - id: napi-rs-keyring-native-addon
    desc: napi-rs keyring native credential addon
    crit: notable
    conf: 0.98
    size_min: 10000
    size_max: 10000000
    if:
      type: text
      regex: '(windows-native-keyring-store|keyring-core)-[0-9]+\.[0-9]+\.[0-9]+'
