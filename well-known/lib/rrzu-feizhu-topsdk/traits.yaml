defaults:
  platforms: [unix, windows]
  for: [php, composer.json, zip]
  crit: notable
  conf: 0.99

traits:
  - id: composer-package-name
    desc: Feizhu Top SDK Composer package name
    for: [composer.json]
    if:
      type: value
      path: name
      exact: rrzu/feizhu-topsdk

  - id: source-tree-path
    desc: Feizhu Top SDK source tree path
    for: [php]
    if:
      type: path
      regex: '(^|[\\/])rrzu-feizhu-topsdk-[0-9a-f]+([\\/]|$)'

composite_rules:
  - id: archive-context
    desc: Recognized Feizhu Top SDK package context
    crit: exception
    conf: 0.99
    scope: archive
    any:
      - id: composer-package-name
      - id: source-tree-path
