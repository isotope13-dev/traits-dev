defaults:
  platforms: [unix]
  for: [elf, macho]
  crit: notable
  conf: 0.98
  size_min: 4096

traits:
  - id: libgit2-init-api
    desc: libgit2 initialization API
    if:
      type: import
      exact: git_libgit2_init

  - id: libgit2-ssh-credential-api
    desc: libgit2 SSH credential API
    if:
      type: import
      regex: '^git_cred_ssh_key_(new|from_agent)$'

composite_rules:
  - id: libgit2-ssh-credential-support
    desc: libgit2 SSH credential support
    all:
      - id: libgit2-init-api
      - id: libgit2-ssh-credential-api
