defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.98
  size_max: 5000000

traits:
  - id: jose-component-core-namespace
    desc: JOSE Component Core namespace
    if:
      type: text
      regex: 'namespace\s+Jose\\Component\\Core'

  - id: ec-key-class
    desc: JOSE Component Core ECKey class
    if:
      type: text
      regex: 'class\s+ECKey\b'

composite_rules:
  - id: web-token-jwt-core-library
    desc: Web-Token JWT core library
    crit: notable
    conf: 0.99
    all:
      - id: jose-component-core-namespace
      - id: ec-key-class
