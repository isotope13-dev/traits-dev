defaults:
  platforms: [unix]
  for: [shell]
  crit: baseline
  conf: 0.98

traits:
  - id: sevenzip-bin-helper-path
    desc: 7zip-bin helper path
    if:
      type: path
      regex: 'node_modules[\\/]7zip-bin[\\/]7x\.sh$'
  - id: sevenzip-bin-helper-basename
    desc: 7zip-bin helper basename
    if:
      type: basename
      exact: 7x.sh

composite_rules:
  - id: sevenzip-bin-helper
    desc: 7zip-bin helper script
    crit: notable
    all:
      - id: sevenzip-bin-helper-path
      - id: sevenzip-bin-helper-basename
