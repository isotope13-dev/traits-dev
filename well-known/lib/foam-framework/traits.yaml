defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - javascript
  size_max: 5000000
traits:
- id: foam-global-api
  desc: FOAM global model API call
  crit: component
  conf: 0.92
  size_min: 4096
  if:
    type: text
    regex: FOAM\.(lookup|putFactory|browse|registerModel)\(
- id: foam-register-model
  desc: FOAM runtime model registration call
  crit: component
  conf: 0.9
  size_min: 4096
  if:
    type: text
    substr: registerModel
- id: foam-powered-banner
  desc: FOAM-powered attribution banner
  crit: baseline
  conf: 0.95
  size_min: 4096
  if:
    type: text
    substr: github.com/foam-framework/foam
composite_rules:
- id: foam-framework-source
  desc: Google FOAM metaprogramming framework source
  crit: baseline
  conf: 0.95
  all:
  - id: foam-global-api
  - id: foam-register-model
