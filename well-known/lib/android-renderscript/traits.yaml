defaults:
  platforms: [android, linux]
  for: [elf]
  crit: baseline
  conf: 0.98
  size_max: 5242880

traits:
  - id: support-library-basename
    desc: Android RenderScript support library basename
    if:
      type: path
      basename: true
      regex: '^lib(RSSupport|rsjni)\.so$'

  - id: support-library-path
    desc: Android RenderScript APK library path
    if:
      type: path
      regex: '(^|[\\/!])lib[\\/][^\\/!]+[\\/]lib(RSSupport|rsjni)\.so$'
