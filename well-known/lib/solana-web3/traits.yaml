defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.95
  size_max: 8000000
traits:
  - id: npm-package-name
    desc: Solana Web3 npm package
    for: [package.json]
    if:
      type: value
      path: name
      exact: "@solana/web3.js"
  - id: npm-package-member-path
    desc: Solana Web3 package path
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)web3\.js-[0-9][^/]*\.tgz'
  - id: js-rpc-error-export
    desc: Solana Web3 RPC error export
    for: [javascript, typescript]
    if:
      type: text
      substr: SolanaJSONRPCErrorCode
composite_rules:
  - id: solana-web3-library
    desc: Solana Web3 JavaScript SDK
    for: [javascript, typescript, package.json]
    any:
      - id: npm-package-name
      - id: npm-package-member-path
      - id: js-rpc-error-export
