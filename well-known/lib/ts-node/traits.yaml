defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.99

traits:
  - id: ntypescript-dev-dependency
    desc: ts-node declares ntypescript for development
    if:
      type: value
      path: devDependencies.ntypescript
      exists: true

composite_rules:
  - id: ts-node-ntypescript-dev-context
    desc: ts-node legacy ntypescript development context
    crit: notable
    conf: 0.99
    all:
      - id: metadata/package/manifest/name::ts-node-package-name
      - id: ntypescript-dev-dependency
