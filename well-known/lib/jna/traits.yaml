defaults:
  platforms: [unix, windows]
  for: [jar, zip, class]
  crit: baseline
  conf: 0.98

traits:
  - id: platform-jar-basename
    desc: JNA platform JAR
    if:
      type: path
      regex: '(^|[\\/!])jna-platform-[0-9][A-Za-z0-9._-]*\.jar($|!)'

  - id: platform-win32-package
    desc: JNA Win32 platform package marker
    if:
      type: text
      substr: com/sun/jna/platform/win32/
  - id: native-dispatch-library
    desc: JNA native dispatch library
    for: [pe, dll, elf, macho]
    size_max: 5000000
    if:
      type: path
      basename: true
      regex: '^(lib)?jnidispatch\.(dll|so|jnilib|dylib)$'
