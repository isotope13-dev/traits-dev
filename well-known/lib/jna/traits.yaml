defaults:
  platforms: [unix, windows]
  for: [jar, zip, class]
  crit: baseline
  conf: 0.98

traits:
  - id: platform-jar-basename
    desc: JNA platform JAR
    if:
      type: basename
      regex: '(^|[\\/!])jna-platform-[0-9][A-Za-z0-9._-]*\.jar($|!)'

  - id: platform-win32-package
    desc: JNA Win32 platform package marker
    if:
      type: raw
      substr: com/sun/jna/platform/win32/
