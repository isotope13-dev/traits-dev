defaults:
  platforms: [windows, linux, macos]
  for: [javascript]
traits:
- id: monaco-editor-license-banner
  desc: Monaco editor license banner
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: github.com/microsoft/monaco-editor
- id: monaco-basic-language-module
  desc: Monaco basic language module
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'define\(["'']vs/(monaco/)?basic-languages/'
- id: monaco-environment-global
  desc: MonacoEnvironment global reference
  crit: notable
  conf: 0.95
  if:
    type: text
    word: MonacoEnvironment
- id: monaco-editor-api
  desc: monaco.editor API reference
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: monaco.editor
composite_rules:
- id: monaco-editor-language-definition
  desc: Monaco editor language definition
  crit: notable
  conf: 0.98
  all:
  - id: monaco-editor-license-banner
  - id: monaco-basic-language-module
- id: monaco-editor-runtime
  desc: Monaco editor runtime bundle
  crit: notable
  conf: 0.96
  any:
  - id: monaco-environment-global
  - id: monaco-editor-api
  - id: monaco-editor-language-definition
