defaults:
  platforms: [windows, linux, macos]
  for: [javascript]
  size_max: 5000000
traits:
- id: monaco-editor-license-banner
  desc: Monaco editor license banner
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: github.com/microsoft/monaco-editor
- id: monaco-basic-language-module
  desc: Monaco basic language module
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'define\(["'']vs/(monaco/)?basic-languages/'
composite_rules:
- id: monaco-editor-language-definition
  desc: Monaco editor language definition
  crit: notable
  conf: 0.98
  all:
  - id: monaco-editor-license-banner
  - id: monaco-basic-language-module
