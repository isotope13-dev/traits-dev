defaults:
  platforms: [windows, linux]
  for: [dll, elf, so]
  crit: baseline
  conf: 0.96
  size_max: 16777216

traits:
  - id: loader-dll
    desc: Vulkan loader DLL
    if:
      type: path
      basename: true
      exact: vulkan-1.dll
      case_insensitive: true
  - id: loader-linux-so
    desc: Vulkan loader shared object
    crit: notable
    platforms: [linux]
    for: [elf, so]
    if:
      type: path
      basename: true
      exact: libvulkan.so.1
      case_insensitive: true
