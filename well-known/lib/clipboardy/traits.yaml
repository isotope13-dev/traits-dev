defaults:
  platforms: [unix, windows]
  for: [javascript, pe, npm]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 5000000

traits:
  - id: clipboardy-package-path
    desc: clipboardy package path
    if:
      type: path
      regex: '(^|[\\/])clipboardy(-[0-9][^\\/]*)?'

  - id: clipboardy-package-name
    desc: clipboardy package manifest name
    for: [package.json]
    if:
      type: value
      path: name
      exact: clipboardy

  - id: clipboardy-macos-helper
    desc: clipboardy macOS clipboard helper
    for: [javascript]
    if:
      type: text
      regex: 'execa\(.{0,20}pbcopy[\s\S]{0,180}execa\(.{0,20}pbpaste'

composite_rules:
  - id: clipboardy-package-context
    desc: Recognized clipboardy package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: clipboardy-package-path
      - id: clipboardy-package-name
