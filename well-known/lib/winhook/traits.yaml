defaults:
  platforms: [windows]
  for: [c, cpp]
  size_max: 1048576

traits:
  - id: winhook-header-guard
    desc: winhook header guard
    crit: component
    conf: 0.98
    if:
      type: text
      exact: _WINHOOK_H

  - id: winhook-version-330
    desc: winhook version 330 macro
    crit: component
    conf: 0.99
    if:
      type: text
      exact: "#define WINHOOK_VERSION 330"

  - id: winhook-dynbind-macro
    desc: winhook dynamic bind macro
    crit: component
    conf: 0.97
    if:
      type: text
      word: WINHOOK_USEDYNBIND

  - id: winhook-start-exe-inject
    desc: winhook start-and-inject symbol
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: winhook_startexeinject

  - id: winhook-inject-dll
    desc: winhook DLL injection symbol
    crit: component
    conf: 0.99
    if:
      type: symbol
      exact: winhook_injectdll

  - id: winhook-hooking-api
    desc: winhook API hook symbols
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: '^winhook_(iathook(pe|module)?|inline(un)?hooks)$'

  - id: winhook-patch-format-api
    desc: winhook patch format symbols
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: '^winhook_patchmemory(1337(ex)?|ips(ex)?|pattern)$'

composite_rules:
  - id: winhook-source
    desc: winhook process hook utility source
    crit: suspicious
    conf: 0.995
    all:
      - id: winhook-start-exe-inject
      - id: winhook-inject-dll
    any:
      - id: winhook-header-guard
      - id: winhook-hooking-api
      - id: winhook-patch-format-api
      - id: winhook-dynbind-macro
      - id: winhook-version-330
