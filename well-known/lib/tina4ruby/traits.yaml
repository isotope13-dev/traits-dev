defaults:
  platforms:
  - unix
  - windows
  for:
  - ruby
  - javascript
  crit: baseline
  conf: 0.96
  size_max: 5000000
traits:
- id: tina4-module-declaration
  desc: Tina4 module declaration
  for:
  - ruby
  if:
    type: text
    regex: module\s+Tina4\b
- id: tina4-dev-admin-require
  desc: Tina4 dev admin require
  for:
  - ruby
  if:
    type: text
    regex: require_relative\s+["']tina4/dev_admin["']
- id: tina4-request-inspector-class
  desc: Tina4 request inspector class
  for:
  - ruby
  if:
    type: text
    regex: class\s+RequestInspector\b
- id: tina4-dev-api-mcp-path
  desc: Tina4 dev MCP API path
  for:
  - ruby
  if:
    type: text
    substr: "/__dev/api/mcp"
- id: dev-admin-js
  desc: Tina4 dev admin JS bundle
  for:
  - javascript
  size_min: 8192
  if:
    type: text
    substr: "/__dev/api/mcp/tools"
- id: frond-js
  desc: Tina4 Frond client bundle
  for:
  - javascript
  size_min: 8192
  if:
    type: text
    regex: window\.frond\s*=\s*(R|frond)
composite_rules:
- id: framework-core
  desc: Tina4Ruby framework core
  crit: baseline
  conf: 0.96
  for:
  - ruby
  near_bytes: 4096
  all:
  - id: tina4-module-declaration
  - id: tina4-dev-admin-require
- id: dev-admin-ruby
  desc: Tina4 dev admin Ruby module
  crit: baseline
  conf: 0.96
  for:
  - ruby
  near_bytes: 40000
  all:
  - id: tina4-module-declaration
  - id: tina4-request-inspector-class
  - id: tina4-dev-api-mcp-path
