defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.99

traits:
  - id: anthropic-sdk-migration-cli-usage
    desc: Anthropic SDK migration CLI usage marker
    crit: component
    if:
      type: text
      substr: 'Usage: anthropic-ai-sdk <subcommand>'
  - id: anthropic-sdk-migration-download
    desc: Anthropic SDK migration tool download URL
    crit: notable
    if:
      type: text
      substr: 'https://github.com/stainless-api/migrate-ts/releases/download/'

composite_rules:
  - id: anthropic-sdk-migration-cli
    desc: Anthropic SDK migration CLI identity
    crit: notable
    conf: 0.99
    all:
      - id: anthropic-sdk-migration-cli-usage
      - id: anthropic-sdk-migration-download
