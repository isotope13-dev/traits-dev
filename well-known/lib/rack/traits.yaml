defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 2000000

traits:
  - id: rack-gem-path
    desc: Rack gem path
    if:
      type: basename
      exact: rack.rb
  - id: rack-library-requires
    desc: Rack library requires
    if:
      type: text
      substr: rack/sendfile

composite_rules:
  - id: rack-library
    desc: Rack Ruby web library
    crit: notable
    conf: 0.99
    any:
      - id: rack-gem-path
      - id: rack-library-requires
