# omdev is a Python development and CI utility library.  Its package identity
# is benign context for automation, desktop input, and container setup code.
defaults:
  platforms: [linux, macos, windows]
  for: [pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: omdev Python package metadata name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: omdev

  - id: package-path
    desc: omdev Python package member path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])omdev([\\/]|$)'

composite_rules:
  - id: omdev-library
    desc: Recognized omdev development library context
    crit: exception
    conf: 0.99
    scope: archive
    any:
      - id: package-name
      - id: package-path
