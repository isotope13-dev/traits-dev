# github.com/klauspost/cpuid — benign Go CPU-feature detection library.
# Its import path and embedded hypervisor-vendor table trip VM-detection
# heuristics; used as unless/downgrade exclusions there.
defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
  size_min: 1
  size_max: 1073741824
traits:
  - id: go-klauspost-cpuid-lib
    desc: klauspost cpuid library markers
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: github.com/klauspost/cpuid/v2
  - id: go-cpuid-vendor-table
    desc: Go cpuid hypervisor vendor table
    crit: baseline
    conf: 0.99
    for: [binaries]
    if:
      type: text
      substr: TCGTCGTCGTCGMicrosoft HvVMwareVMwareXenVMMXenVMMbhyve bhyve
