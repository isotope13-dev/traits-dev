defaults:
  size_max: 52428800
  platforms: [linux, macos, windows]
  for: [pe, dll, python, zip, tar]

traits:
  - id: windows-extension-source-path
    desc: psutil Windows extension source path
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: psutil/arch/windows\
      section: rdata

  - id: windows-extension-filename
    desc: psutil Windows extension filename
    crit: baseline
    conf: 0.95
    if:
      type: text
      word: _psutil_windows.pyd
      section: rdata
  - id: python-package-path
    desc: psutil Python package path
    crit: baseline
    conf: 0.98
    for: [python, zip, tar]
    if:
      type: path
      regex: (?i)(^|[!:/\\])psutil(-[0-9][^!:/\\]{1,160}|[!:/\\]|$)
  - id: python-source-author
    desc: psutil source copyright author
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: Giampaolo Rodola
  - id: python-library-docstring
    desc: psutil library module docstring
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: psutil is a cross-platform library

composite_rules:
  - id: windows-extension
    desc: psutil Windows extension binary
    crit: baseline
    conf: 0.98
    any:
      - id: well-known/lib/psutil::windows-extension-source-path
      - id: well-known/lib/psutil::windows-extension-filename
  - id: python-package
    desc: psutil Python library package
    crit: baseline
    conf: 0.98
    any:
      - id: python-package-path
      - id: python-source-author
      - id: python-library-docstring
