# APM Insight bundles an xCrash-based native crash and ANR dumper.  Its
# cross-process /proc reads and child dumper are diagnostic, not process
# discovery or persistence.
defaults:
  platforms: [android]
  for: [elf, so]
  crit: notable
  conf: 0.99
  size_min: 1000
  size_max: 10000000

traits:
  - id: apm-insight-native-library-name
    desc: APM Insight native crash monitor library
    if:
      type: basename
      regex: '^libapminsight[ab]\.so$'

  - id: apm-insight-nativecrash-class
    desc: APM Insight native crash JNI marker
    if:
      type: text
      substr: com/apm/insight/nativecrash/NativeImpl
      section: .rodata

  - id: apm-insight-xcrash-dumper-marker
    desc: APM Insight xCrash native dumper marker
    if:
      type: text
      regex: '\[xcrash\].{0,100}(PR_SET_PTRACER|fork|waitpid)'
      section: .rodata

composite_rules:
  - id: apm-insight-native-crash-monitor
    desc: APM Insight xCrash native crash-monitor context
    crit: exception
    conf: 0.99
    all:
      - id: apm-insight-native-library-name
    any:
      - id: apm-insight-nativecrash-class
      - id: apm-insight-xcrash-dumper-marker
