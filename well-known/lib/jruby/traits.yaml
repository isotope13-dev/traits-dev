defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
  size_max: 67108864
traits:
  - id: package-path
    desc: JRuby package path marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: jruby-complete.jar
  - id: jruby-home-path
    desc: JRuby embedded home path
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: META-INF/jruby.home/
  - id: embedded-runtime-path
    desc: JRuby embedded runtime path
    crit: baseline
    conf: 0.99
    if:
      type: text
      regex: '(^|[\\/!])jruby-complete\.jar!|META-INF/jruby\.home[\\/]'
  - id: embedded-runtime-member
    desc: JRuby embedded runtime archive member
    crit: baseline
    conf: 0.99
    if:
      type: basename
      regex: '(^|[\\/!])(jruby-complete\.jar!|META-INF/jruby\.home[\\/!])'
  - id: module-marker
    desc: JRuby runtime marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: "org\\.jruby|JRUBY_VERSION|RUBY_ENGINE\\s*=\\s*['\"]jruby['\"]"
