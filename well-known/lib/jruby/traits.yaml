defaults:
  platforms: [windows, unix]
  for: [jar, java, ruby, class]
  size_max: 67108864
traits:
  - id: archive-basename
    desc: JRuby complete archive basename
    crit: baseline
    conf: 0.99
    if:
      type: path
      basename: true
      exact: jruby-complete.jar
  - id: package-path
    desc: JRuby package path marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: jruby-complete.jar
  - id: stdlib-archive-marker
    desc: JRuby stdlib archive path marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: META-INF/jruby.home/lib/ruby/stdlib/
  - id: jruby-home-path
    desc: JRuby embedded home path
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: META-INF/jruby.home/
  - id: embedded-runtime-path
    desc: JRuby embedded runtime path
    crit: baseline
    conf: 0.99
    if:
      type: text
      regex: '(^|[\\/!])jruby-complete\.jar!|META-INF/jruby\.home[\\/]'
  - id: embedded-runtime-member
    desc: JRuby embedded runtime archive member
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: '(^|[\\/!])(jruby-complete\.jar!|META-INF/jruby\.home[\\/!])'
  - id: nested-member-path
    desc: JRuby nested archive member path
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: '(^|[\\/!]).*jruby-complete\.jar![^\\n]*|(^|[\\/!]).*META-INF/jruby\.home[\\/!][^\\n]*'
  - id: native-stdlib-path
    desc: JRuby native stdlib path marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: META-INF/jruby.home/lib/ruby/stdlib/libfixposix/binary/
  - id: jffi-native-basename
    desc: JRuby JFFI native library basename
    crit: baseline
    conf: 0.99
    for: [elf, pe, dll, dylib]
    if:
      type: path
      regex: '(^|[\\/!:])(libjffi-[0-9.]+\.(so|jnilib)|jffi-[0-9.]+\.dll)(@0x[0-9A-Fa-f]+)?$'
  - id: jffi-native-export
    desc: JRuby JFFI native export marker
    crit: baseline
    conf: 0.99
    for: [elf, pe, dll, dylib]
    if:
      type: export
      regex: '^Java_com_kenai_jffi_Foreign_dl(sym|open|close)$'
  - id: module-marker
    desc: JRuby runtime marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: "org\\.jruby|JRUBY_VERSION|RUBY_ENGINE\\s*=\\s*['\"]jruby['\"]"
  - id: bundler-thor-open-uri-helper
    desc: JRuby Bundler Thor open-uri helper
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: input.binmode.read
  - id: source-updater-url
    desc: JRuby source updater Maven URL
    crit: baseline
    conf: 0.99
    for: [ruby]
    if:
      type: text
      substr: repo1.maven.org/maven2/org/jruby/jruby-complete/
  - id: source-updater-install-banner
    desc: JRuby source updater install banner
    crit: baseline
    conf: 0.98
    for: [ruby]
    if:
      type: text
      substr: Installing gems...
  - id: source-updater-gem-install
    desc: JRuby source updater gem install
    crit: baseline
    conf: 0.98
    for: [ruby]
    if:
      type: text
      substr: '-S", "gem", "install"'
  - id: source-updater-jar-refresh
    desc: JRuby source updater jar refresh
    crit: baseline
    conf: 0.98
    for: [ruby]
    if:
      type: text
      substr: 'sh "jar", "uf", jar_name'
  - id: source-updater-destination
    desc: JRuby source updater destination path
    crit: baseline
    conf: 0.99
    for: [ruby]
    if:
      type: text
      regex: 'third_party/jruby|jruby-complete\.jar'
  - id: malformed-elf-downgrade
    desc: Downgrade embedded ELF markers in JRuby
    crit: baseline
    conf: 0.99
    if:
      id: anti-analysis/malformed/elf-header
    downgrade:
      any:
        - id: runtime-context
composite_rules:
  - id: runtime-context
    desc: JRuby embedded runtime context
    crit: baseline
    conf: 0.99
    any:
      - id: archive-basename
      - id: package-path
      - id: stdlib-archive-marker
      - id: jruby-home-path
      - id: embedded-runtime-path
      - id: embedded-runtime-member
      - id: nested-member-path
      - id: native-stdlib-path
      - id: jffi-native-basename
      - id: jffi-native-export
      - id: module-marker
  - id: source-updater-context
    desc: JRuby source updater script context
    crit: baseline
    conf: 0.99
    all:
      - id: source-updater-url
      - id: source-updater-destination
    any:
      - id: source-updater-install-banner
      - id: source-updater-gem-install
      - id: source-updater-jar-refresh
    needs: 2
