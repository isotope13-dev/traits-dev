defaults:
  platforms: [unix, windows]
  for: [php]

traits:
  - id: php-class-identity
    desc: elFinder PHP class declaration
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '\bclass\s+elFinder\b'

  - id: php-constant-identity
    desc: elFinder PHP constant namespace
    crit: notable
    conf: 0.98
    count_min: 3
    if:
      type: text
      regex: '\bELFINDER_[A-Z0-9_]{2,}\b'

composite_rules:
  - id: source-context
    desc: elFinder PHP source context
    crit: exception
    conf: 0.99
    all:
      - id: php-class-identity
      - id: php-constant-identity
