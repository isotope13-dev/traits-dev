defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  size_max: 5000000
traits:
- id: apache-arrow-module
  desc: Apache Arrow JavaScript module
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: apache-arrow
- id: arrow-flight-protocol
  desc: Apache Arrow Flight protocol
  crit: baseline
  conf: 0.99
  if:
    type: text
    substr: arrow.flight.protocol.FlightService
- id: arrow-record-batch-reader
  desc: Apache Arrow RecordBatchReader
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: RecordBatchReader
- id: arrow-bignum-symbol-marker
  desc: Apache Arrow BigNum implementation marker
  crit: notable
  conf: 0.99
  if:
    type: text
    substr: isArrowBigNumSymbol
- id: arrow-bignum-constructor-marker
  desc: Apache Arrow BigNum constructor marker
  crit: notable
  conf: 0.99
  if:
    type: text
    regex: 'function\s+BigNum\s*\('

composite_rules:
  - id: apache-arrow-bignum-source
    desc: Apache Arrow BigNum typed-array source context
    crit: exception
    conf: 0.99
    all:
      - id: arrow-bignum-symbol-marker
      - id: arrow-bignum-constructor-marker
