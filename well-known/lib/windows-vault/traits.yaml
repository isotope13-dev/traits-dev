defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: vaultcli-basename
    desc: Windows Vault CLI DLL basename
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      exact: vaultcli.dll
      case_insensitive: true
  - id: vault-internal-source-path
    desc: Windows Vault internal source path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: onecore\ds\security\vault
      section: rdata
  - id: vaultcli-pdb-path
    desc: Windows Vault CLI PDB path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: vaultcli.pdb
      section: rdata
composite_rules:
  - id: windows-vaultcli-component
    desc: Microsoft Windows Vault CLI component
    crit: baseline
    conf: 0.97
    all:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: vaultcli-basename
    any:
      - id: vault-internal-source-path
      - id: vaultcli-pdb-path
