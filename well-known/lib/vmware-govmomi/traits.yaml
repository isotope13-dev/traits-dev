defaults:
  platforms: [unix, windows]
  for: [go]
  conf: 0.99

traits:
  - id: source-directory
    desc: VMware govmomi source directory
    crit: notable
    if:
      type: path
      regex: '(^|[\\/])govmomi([\\/]|$)'
  - id: broadcom-source-marker
    desc: Broadcom govmomi source marker
    crit: notable
    if:
      type: text
      substr: '© Broadcom. All Rights Reserved.'

composite_rules:
  - id: govmomi-source-context
    desc: Vendored VMware govmomi source context
    crit: exception
    all:
      - id: source-directory
      - id: broadcom-source-marker
