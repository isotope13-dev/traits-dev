defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - scripts
  - binaries
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: packaged-youtube-dl-exe
  desc: Packaged youtube-dl executable
  crit: notable
  conf: 0.97
  for: [pe]
  size_min: 1000000
  size_max: 100000000
  if:
    type: path
    substr: youtube-dl.exe
- id: packaged-youtube-dl-member
  desc: youtube-dl packaged member
  crit: notable
  conf: 0.97
  size_max: 1073741824
  if:
    type: path
    regex: '(^|[\\/])(yt_dlp|curl_cffi)([\\/]|$)'
- id: infoextractor-base
  desc: youtube-dl InfoExtractor base class reference
  size_min: 1
  size_max: 1073741824
  if:
    type: text
    substr: InfoExtractor
- id: valid-url-pattern-attr
  desc: youtube-dl extractor _VALID_URL attribute
  size_min: 1
  size_max: 1073741824
  if:
    type: text
    substr: _VALID_URL
- id: real-extract-method
  desc: youtube-dl extractor _real_extract method
  size_min: 1
  size_max: 1073741824
  if:
    type: text
    substr: _real_extract
composite_rules:
- id: youtube-dl-extractor-module
  desc: youtube-dl/yt-dlp site extractor module
  crit: notable
  conf: 0.97
  all:
  - id: infoextractor-base
  - id: valid-url-pattern-attr
  - id: real-extract-method
- id: youtube-dl-package-context
  desc: youtube-dl packaged executable context
  crit: notable
  conf: 0.98
  any:
  - id: packaged-youtube-dl-exe
  - id: packaged-youtube-dl-member
  - id: youtube-dl-extractor-module
