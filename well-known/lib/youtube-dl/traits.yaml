# youtube-dl / yt-dlp video extractor library.
#
# Each site extractor module subclasses InfoExtractor and implements
# `_real_extract`, declaring a `_VALID_URL` pattern. That triad uniquely
# identifies a youtube-dl/yt-dlp extractor. These modules legitimately embed
# thousands of streaming-site URLs (shady TLDs, raw-IP hosts, spoofed
# user-agents, .php scraper endpoints, even official .onion mirrors), so the
# module is referenced as benign context to suppress C2/exfil false positives
# on that bundled URL corpus.
defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
  crit: baseline
  conf: 0.95
traits:
  - id: infoextractor-base
    desc: youtube-dl InfoExtractor base class reference
    size_min: 1
    size_max: 1073741824
    if:
      type: text
      substr: InfoExtractor
  - id: valid-url-pattern-attr
    desc: youtube-dl extractor _VALID_URL attribute
    size_min: 1
    size_max: 1073741824
    if:
      type: text
      substr: _VALID_URL
  - id: real-extract-method
    desc: youtube-dl extractor _real_extract method
    size_min: 1
    size_max: 1073741824
    if:
      type: text
      substr: _real_extract
composite_rules:
  - id: youtube-dl-extractor-module
    desc: youtube-dl/yt-dlp site extractor module
    crit: baseline
    conf: 0.97
    all:
      - id: infoextractor-base
      - id: valid-url-pattern-attr
      - id: real-extract-method
