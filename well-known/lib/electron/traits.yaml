defaults:
  for: [pe, elf, macho]
  platforms: [linux, macos, windows]
  size_min: 1048576
  size_max: 2147483647
traits:
  - id: nodejs-webstorage-marker
    desc: Electron/Node.js webstorage SQLite marker
    crit: baseline
    conf: 0.97
    if:
      type: text
      substr: nodejs_webstorage
      section: rdata
  - id: chrome-native-messaging-marker
    desc: Chrome/Electron native messaging registry path
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: NativeMessagingHosts
      section: rdata
  - id: v8-isolate-marker
    desc: V8 isolate symbol marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: v8::Isolate
      section: rdata
  - id: chrome-version-resource
    desc: Chromium-derived runtime CompanyName
    crit: baseline
    conf: 0.92
    if:
      type: text
      substr: GitHub, Inc.
      section: rdata
composite_rules:
  - id: electron-app-runtime
    desc: Electron application runtime bundle
    crit: baseline
    conf: 0.97
    any:
      - id: nodejs-webstorage-marker
      - id: chrome-native-messaging-marker
      - id: v8-isolate-marker
      - id: chrome-version-resource
