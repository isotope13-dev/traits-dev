defaults:
  for: [pe, elf, macho]
  platforms: [linux, macos, windows]
  size_min: 1048576
  size_max: 2147483647
traits:
  - id: electron-windows-runtime-pdb
    desc: Electron Windows runtime PDB identity
    crit: notable
    conf: 0.99
    for: [pe]
    platforms: [windows]
    if:
      type: value
      path: pe.debug.pdb.basename
      exact: electron.exe.pdb
  - id: electron-app-resources-path
    desc: Electron application resources path
    crit: notable
    conf: 0.98
    for: [macho, binaries]
    if:
      type: path
      regex: 'Resources[\\/]app[\\/]'
  - id: v8-context-snapshot-name
    desc: Electron V8 context snapshot file
    crit: notable
    conf: 0.99
    for: [data]
    if:
      type: basename
      exact: v8_context_snapshot.x86_64.bin
      case_insensitive: true
  - id: electron-node-basename
    desc: Node runtime basename
    crit: component
    conf: 0.99
    for: [macho, binaries]
    if:
      type: path
      regex: '[\\/]node$'
  - id: nodejs-webstorage-marker
    desc: Electron/Node.js webstorage SQLite marker
    crit: baseline
    conf: 0.97
    if:
      type: text
      substr: nodejs_webstorage
      section: rdata
  - id: chrome-native-messaging-marker
    desc: Chrome/Electron native messaging registry path
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: NativeMessagingHosts
      section: rdata
  - id: electron-node-symbol
    desc: Electron node integration symbol
    crit: baseline
    conf: 0.93
    if:
      type: text
      substr: electron_node
      section: rdata
  - id: chrome-policy-marker
    desc: Chromium policy subsystem string
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: chrome_policy
      section: rdata
composite_rules:
  - id: electron-bundled-node-runtime
    desc: Electron-bundled Node runtime
    crit: notable
    conf: 0.98
    all:
      - id: electron-app-resources-path
      - id: electron-node-basename
  - id: electron-app-runtime
    desc: Electron application runtime bundle
    crit: notable
    conf: 0.97
    any:
      - id: well-known/lib/electron::chrome-native-messaging-marker
      - id: well-known/lib/electron::chrome-policy-marker
      - id: well-known/lib/electron::electron-windows-runtime-pdb
      - id: well-known/lib/electron::electron-enable-logging-env
      - id: well-known/lib/electron::electron-node-symbol
      - id: well-known/lib/electron::nodejs-webstorage-marker
  # Stronger multi-marker variant used to suppress capability composites that the
  # Chromium framework binary satisfies legitimately (RawInput, GDI capture,
  # CreateProcess, V8 JIT VirtualProtect). Requires two independent Chromium/
  # Electron signatures so a single embedded string cannot grant the exemption.
  - id: electron-chromium-runtime-strong
    desc: Chromium/Electron runtime binary (multi-marker)
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: well-known/lib/electron::chrome-native-messaging-marker
      - id: well-known/lib/electron::chrome-policy-marker
      - id: well-known/lib/electron::electron-enable-logging-env
      - id: well-known/lib/electron::electron-node-symbol
      - id: well-known/lib/electron::nodejs-webstorage-marker
