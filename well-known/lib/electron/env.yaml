# Electron runtime environment markers. ELECTRON_ENABLE_LOGGING is a benign
# Electron env var used as FP-suppression context by other rules.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  size_min: 512
  size_max: 500000000
  crit: baseline
traits:
  - id: electron-enable-logging-env
    desc: ELECTRON_ENABLE_LOGGING environment variable
    if:
      type: text
      substr: ELECTRON_ENABLE_LOGGING
