# VideoLAN VLC engine and bundled media codec libraries (libvlccore, libx265,
# codec/demux plugins). These are heavily-optimized native media libraries that
# legitimately use W^X memory, large stack-string tables (codec parameter names)
# and worker threads — a shape that trips generic shellcode-injection heuristics.
# Used as a false-positive exclusion for those capability composites. Requires
# two independent VideoLAN/codec strings so a thin masquerading loader that only
# copies the "VideoLAN.VLC" identity string is NOT exempted.
defaults:
  size_max: 52428800
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  crit: component
  conf: 0.9
traits:
  - id: libvlc-string
    desc: libvlc runtime string
    if:
      type: text
      substr: libvlc
      section: rdata
  - id: videolan-string
    desc: VideoLAN identity string
    if:
      type: text
      substr: VideoLAN
      section: rdata
  - id: vlc-prefix-symbol
    desc: libvlc internal symbol prefix
    if:
      type: text
      substr: vlc_
      section: rdata
  - id: x265-encoder-string
    desc: x265 HEVC encoder string
    if:
      type: text
      substr: x265
      section: rdata
  - id: hevc-codec-string
    desc: HEVC codec identifier string
    if:
      type: text
      substr: HEVC
      section: rdata
composite_rules:
  - id: videolan-codec-lib
    desc: VideoLAN VLC engine or bundled media codec library
    crit: baseline
    conf: 0.95
    needs: 2
    any:
      - id: well-known/lib/videolan
  - id: media-codec-lib
    desc: Recognized media codec/engine library (FFmpeg or VideoLAN)
    crit: baseline
    conf: 0.95
    any:
      - id: videolan-codec-lib
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
