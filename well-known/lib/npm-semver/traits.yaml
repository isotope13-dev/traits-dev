defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: baseline
  conf: 0.98
  size_min: 1000
  size_max: 5000000

traits:
  - id: range-class-path
    desc: npm semver range class path
    crit: component
    if:
      type: path
      regex: 'semver[:/\\]classes[:/\\]range\.js$'

  - id: range-class-text
    desc: npm semver Range class text
    crit: component
    if:
      type: text
      substr: class Range

  - id: semver-class-path
    desc: npm semver class module path
    crit: component
    if:
      type: path
      regex: 'semver[:/\\]classes[:/\\]semver\.js$'

  - id: semver-class-text
    desc: npm semver class module text
    crit: component
    if:
      type: text
      substr: class SemVer

  - id: semver-debug-env-marker
    desc: npm semver debug environment marker
    crit: notable
    if:
      type: text
      substr: NODE_DEBUG

composite_rules:
  - id: range-class
    desc: npm semver range class
    crit: notable
    all:
      - id: range-class-path
      - id: range-class-text

  - id: semver-class
    desc: npm semver class module
    crit: notable
    all:
      - id: semver-class-path
      - id: semver-class-text
