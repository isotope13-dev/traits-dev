defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: cookie-language-helper
    desc: i18next cookie language helper
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'cacheUserLanguage.{0,240}lookupCookie|lookupCookie.{0,240}cacheUserLanguage'
