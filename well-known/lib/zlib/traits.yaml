defaults:
  size_max: 52428800
  for: [binaries]
  platforms: [unix, windows]
traits:
  - id: unzip-015-banner
    desc: unzip 0.15 library banner
    crit: baseline
    conf: 0.93
    if:
      type: text
      substr: unzip 0.15 Copyright 1998 Gilles Vollant
      section: .rdata
  - id: inflate-113-banner
    desc: inflate 1.1.3 library banner
    crit: baseline
    conf: 0.93
    if:
      type: text
      substr: inflate 1.1.3 Copyright 1995-1998 Mark Adler
      section: .rdata
  - id: inflate-12x-banner
    desc: inflate 1.2.x library banner
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: inflate 1\.2\.\d+ Copyright 1995-\d{4} Mark Adler
composite_rules:
  - id: legacy-zlib-unzip-stack
    desc: Legacy zlib and unzip stack
    crit: notable
    conf: 0.95
    all:
      - id: unzip-015-banner
      - id: inflate-113-banner
