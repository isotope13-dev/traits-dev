defaults:
  platforms: [windows, unix]
  for: [package.json, pe, dll]
  crit: notable
  conf: 0.99
  size_max: 524288000

traits:
  - id: node-pty-package-name
    desc: node-pty terminal process library package
    for: [package.json]
    if:
      type: value
      path: name
      exact: node-pty

  - id: node-pty-author
    desc: Microsoft node-pty package author
    for: [package.json]
    if:
      type: value
      path: author.name
      exact: Microsoft Corporation

  - id: node-pty-native-module
    desc: node-pty Windows ConPTY native module
    for: [pe, dll]
    if:
      type: path
      regex: '(?i)(^|[\\/])node-pty.{0,120}conpty\.node$'

composite_rules:
  - id: node-pty-native-module-context
    desc: Recognized node-pty ConPTY native module context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: node-pty-package-name
      - id: node-pty-author
      - id: node-pty-native-module
