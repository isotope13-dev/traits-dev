# Embedded CPython interpreter markers: C-API symbol strings present in any
# native binary that embeds the CPython runtime (Py_Initialize, PyEval_, the
# frozen importlib bootstrap, etc.). Neutral — appears in PyInstaller/py2exe
# output and any legitimately embedded interpreter; composites in other tiers
# reference these to require an embedded interpreter as one leg.
defaults:
  platforms: [unix, windows]
  for: [binaries]
  size_min: 512
  size_max: 500000000
  crit: component
traits:
  - id: cpython-py-initialize
    desc: Py_Initialize embedded-interpreter symbol
    if:
      type: text
      substr: Py_Initialize
      section: .text
    unless:
      - id: micro-behaviors/fs/temp/pyinstaller/
  - id: cpython-py-initializeex
    desc: Py_InitializeEx embedded-interpreter symbol
    if:
      type: text
      substr: Py_InitializeEx
      section: .text
  - id: cpython-pyrun-simplestring
    desc: PyRun_SimpleString embedded-interpreter symbol
    if:
      type: text
      substr: PyRun_SimpleString
      section: .text
    unless:
      - id: micro-behaviors/fs/temp/pyinstaller/
  - id: cpython-pyeval
    desc: PyEval_ embedded-interpreter symbol family
    if:
      type: text
      substr: PyEval_
      section: .text
    unless:
      - id: micro-behaviors/fs/temp/pyinstaller/
  - id: cpython-py-setprogramname
    desc: Py_SetProgramName embedded-interpreter symbol
    if:
      type: text
      substr: Py_SetProgramName
      section: .text
  - id: cpython-py-setpythonhome
    desc: Py_SetPythonHome embedded-interpreter symbol
    if:
      type: text
      substr: Py_SetPythonHome
      section: .text
  - id: cpython-importlib
    desc: importlib string in embedded interpreter
    if:
      type: text
      substr: importlib
      section: .text
    unless:
      - id: micro-behaviors/fs/temp/pyinstaller/
  - id: cpython-frozen-importlib
    desc: _frozen_importlib bootstrap string
    if:
      type: text
      substr: _frozen_importlib
      section: .text
