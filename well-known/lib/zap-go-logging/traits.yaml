# Uber zap structured logging library for Go (go.uber.org/zap).
#
# Structured-logging marker. Apps wiring zap are production services with
# structured-log discipline — benign-context evidence consistent with the
# rest of the observability stack (Sentry, Prometheus, OTel).
defaults:
  platforms: [unix, windows]
  for: [go]
  crit: baseline
  conf: 0.95
  size_min: 1024
  size_max: 524288000

traits:
  - id: zap-go-import
    desc: Imports go.uber.org/zap
    if:
      type: text
      substr: 'go.uber.org/zap'

  - id: zap-new-production
    desc: zap.NewProduction logger constructor
    if:
      type: text
      regex: '\bzap\.NewProduction\s*\('

  - id: zap-new-development
    desc: zap.NewDevelopment logger constructor
    if:
      type: text
      regex: '\bzap\.NewDevelopment\s*\('

  - id: zap-sugar-logger
    desc: zap SugaredLogger usage
    if:
      type: text
      substr: 'SugaredLogger'

composite_rules:
  - id: zap-logging
    desc: Go process uses zap structured logging
    crit: baseline
    all:
      - id: zap-go-import
    any:
      - id: zap-new-production
      - id: zap-new-development
      - id: zap-sugar-logger
