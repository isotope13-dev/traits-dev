defaults:
  size_max: 52428800
  platforms: [windows, linux, macos]
traits:
  - id: openssl-project-copyright
    desc: Modern OpenSSL Project copyright
    crit: baseline
    conf: 0.95
    for: [source]
    if:
      type: text
      substr: The OpenSSL Project Authors
      section: text
  - id: openssl-eric-young-copyright
    desc: OpenSSL copyright and license header
    crit: baseline
    conf: 0.9
    for: [source]
    if:
      type: text
      substr: Eric Young (eay@cryptsoft.com)
      section: text
  - id: openssl-version-symbol
    desc: OpenSSL_version export symbol
    crit: baseline
    conf: 0.95
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: OpenSSL_version
  - id: openssl-evp-api
    desc: OpenSSL EVP API symbols
    crit: baseline
    conf: 0.95
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: EVP_EncryptInit
  - id: openssl-098y-banner
    desc: OpenSSL 0.9.8y version banner
    crit: baseline
    conf: 0.92
    for: [binaries]
    if:
      type: raw
      substr: OpenSSL 0.9.8y 5 Feb 2013
      section: .rdata
  - id: openssl-source-paths
    desc: OpenSSL source path strings
    crit: baseline
    conf: 0.82
    for: [binaries]
    if:
      type: raw
      substr: .\crypto\
      section: .rdata
  - id: cryptogams-attrib
    desc: CRYPTOGAMS assembly attribution string
    crit: baseline
    conf: 0.95
    for: [binaries]
    if:
      type: text
      substr: CRYPTOGAMS by <appro@openssl.org>
  - id: cryptogams-attrib-dotasm
    desc: CRYPTOGAMS dot-asm attribution string
    crit: baseline
    conf: 0.95
    for: [binaries]
    if:
      type: text
      substr: 'CRYPTOGAMS by <https://github.com/dot-asm>'
composite_rules:
  - id: openssl-library
    desc: OpenSSL cryptographic library binary
    crit: baseline
    conf: 0.95
    all:
      - id: openssl-version-symbol
      - id: openssl-evp-api
  - id: openssl-static-fingerprint
    desc: Static OpenSSL build fingerprint
    crit: baseline
    conf: 0.9
    all:
      - id: openssl-098y-banner
      - id: openssl-source-paths
  - id: openssl-cryptogams
    desc: OpenSSL binary with CRYPTOGAMS assembly
    crit: baseline
    conf: 0.95
    any:
      - id: openssl-library
      - id: openssl-static-fingerprint
      - id: cryptogams-attrib
      - id: cryptogams-attrib-dotasm
