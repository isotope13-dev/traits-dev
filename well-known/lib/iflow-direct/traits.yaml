# iflow-direct is a transport-agnostic IMAP client.  Its authentication and
# message operations are caller-directed protocol features, not exfiltration.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: '@bobfrankston/iflow-direct package metadata name'
    if:
      type: value
      path: name
      exact: '@bobfrankston/iflow-direct'

  - id: imap-client-source
    desc: iflow-direct native IMAP client implementation
    for: [javascript, typescript]
    if:
      type: text
      substr: NativeImapClient

  - id: tcp-transport-source
    desc: iflow-direct TCP transport adapter dependency
    for: [javascript, typescript]
    if:
      type: text
      substr: '@bobfrankston/tcp-transport'

composite_rules:
  - id: package-identity
    desc: Recognized iflow-direct IMAP client package context
    crit: exception
    conf: 0.99
    for: [javascript, typescript, package.json]
    scope: archive
    any:
      - id: package-name
      - id: imap-client-source
      - id: tcp-transport-source
