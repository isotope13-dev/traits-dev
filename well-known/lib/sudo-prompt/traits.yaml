# Known sudo-prompt elevation helper. Its PowerShell/RunAs and temporary-file
# code implements an explicit user-requested privilege prompt.
defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: npm-package-name
    desc: sudo-prompt npm package name
    crit: notable
    conf: 1.0
    if:
      type: value
      path: name
      exact: sudo-prompt
