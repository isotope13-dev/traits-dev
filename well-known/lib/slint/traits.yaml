defaults:
  for: [pe, elf, macho]
  platforms: [unix, windows]
  size_min: 65536
  size_max: 268435456
traits:
  - id: slint-prefix-exports
    desc: Many slint_ prefixed exports
    crit: baseline
    conf: 0.95
    count_min: 30
    if:
      type: symbol
      kind: export
      regex: ^slint_[a-z][a-z0-9_]+$
  - id: slint-runtime-banner
    desc: Slint UI runtime string marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: slint-ui
      section: rdata
composite_rules:
  - id: slint-library
    desc: Slint UI runtime library
    crit: baseline
    conf: 0.95
    any:
      - id: well-known/lib/slint
