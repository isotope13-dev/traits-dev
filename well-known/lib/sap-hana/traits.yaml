# SAP HANA's native client is a signed, vendor-provided database driver.
# Its bundled SQLDBC/Poco runtime legitimately contains privilege wrappers,
# file replacement helpers, and CryptoAPI support used for tracing and TLS.
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.98

traits:
  - id: sap-hana-native-client-unix-marker
    desc: SAP HANA native client marker
    for: [elf, macho]
    platforms: [unix]
    size_min: 1000000
    if:
      type: text
      section: .rodata
      regex: 'SQLDBC|SAP release [0-9]+\.[0-9]+|src_napi[/\\]hana\.cpp'
  - id: sap-hana-native-client-windows-marker
    desc: SAP HANA native client marker
    for: [pe]
    platforms: [windows]
    size_min: 1000000
    if:
      type: text
      section: .rdata
      regex: 'SQLDBC|SAP release [0-9]+\.[0-9]+|src_napi[/\\]hana\.cpp'
