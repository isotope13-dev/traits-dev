defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, elf, macho, pe]
  crit: component
  conf: 0.95
  size_min: 4096
  size_max: 268435456

traits:
  - id: package-name
    desc: OpenTUI core package name
    for: [package.json, javascript, typescript]
    size_min: 64
    size_max: 67108864
    if:
      type: text
      substr: '@opentui/core'

  - id: data-path-marker
    desc: OpenTUI data path marker
    for: [javascript, typescript, elf, macho, pe]
    if:
      type: text
      substr: data-paths-opentui

  - id: tree-sitter-asset
    desc: OpenTUI tree-sitter asset
    for: [javascript, typescript, elf, macho, pe]
    if:
      type: text
      regex: 'tree-sitter-[A-Za-z0-9_-]+\.wasm'

  - id: query-asset
    desc: OpenTUI tree-sitter query asset
    for: [javascript, typescript, elf, macho, pe]
    if:
      type: text
      regex: '(highlights|injections)-[A-Za-z0-9_-]+\.scm'

composite_rules:
  - id: runtime-context
    desc: OpenTUI runtime bundle context
    crit: component
    conf: 0.97
    needs: 2
    any:
      - id: package-name
      - id: data-path-marker
      - id: tree-sitter-asset
      - id: query-asset
