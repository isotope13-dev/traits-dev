defaults:
  for: [ruby]
  platforms: [windows, unix]

traits:
  - id: net-ssh-session-basename
    desc: Net::SSH session basename
    crit: component
    conf: 0.9
    if:
      type: value
      path: file.basename
      exact: session.rb
  - id: net-ssh-session-require
    desc: Net::SSH session require
    crit: component
    conf: 0.95
    if:
      type: text
      substr: require 'net/ssh/connection/channel'
  - id: net-ssh-start-doc
    desc: Net::SSH start documentation
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Net::SSH.start

composite_rules:
  - id: net-ssh-session-library
    desc: Net::SSH session library
    crit: notable
    conf: 0.98
    all:
      - id: net-ssh-session-basename
      - id: net-ssh-session-require
      - id: net-ssh-start-doc
