# Official EthereumJS utility package identity.
# These atoms describe the upstream metadata that an impersonator can retain;
# the hostile conclusion belongs in objectives/supply-chain/.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.96

traits:
  - id: npm-package-name
    desc: EthereumJS utility npm package name
    if:
      type: value
      path: name
      regex: '^(ethereumjs-util|@ethereumjs/util)$'

  - id: npm-package-repository
    desc: EthereumJS utility monorepo URL
    if:
      type: value
      path: repository.url
      regex: '^https?://github\.com/ethereumjs/ethereumjs-monorepo(\.git)?/?$'

  - id: npm-package-homepage
    desc: EthereumJS utility package homepage
    if:
      type: value
      path: homepage
      regex: '^https?://github\.com/ethereumjs/ethereumjs-monorepo/tree/[a-z0-9._-]{1,32}/packages/util'

  - id: npm-package-description
    desc: EthereumJS utility package description
    crit: component
    if:
      type: value
      path: description
      exact: A collection of utility functions for Ethereum

  - id: archive-package-name
    desc: EthereumJS utility archive package name
    for: [npm, tar, zip]
    if:
      type: value
      path: npm.name
      regex: '^(ethereumjs-util|@ethereumjs/util)$'

  - id: archive-package-repository
    desc: EthereumJS utility archive repository URL
    for: [npm, tar, zip]
    if:
      type: value
      path: npm.repository.url
      regex: '^https?://github\.com/ethereumjs/ethereumjs-monorepo(\.git)?/?$'

  - id: archive-package-homepage
    desc: EthereumJS utility archive homepage
    for: [npm, tar, zip]
    if:
      type: value
      path: npm.homepage
      regex: '^https?://github\.com/ethereumjs/ethereumjs-monorepo/tree/[a-z0-9._-]{1,32}/packages/util'

composite_rules:
  - id: official-npm-package
    desc: Official EthereumJS utility npm identity
    all:
      - id: npm-package-name
      - id: npm-package-repository
      - id: npm-package-homepage

  - id: official-npm-archive
    desc: Official EthereumJS utility archive identity
    for: [npm, tar, zip]
    scope: archive
    all:
      - id: archive-package-name
      - id: archive-package-repository
      - id: archive-package-homepage
