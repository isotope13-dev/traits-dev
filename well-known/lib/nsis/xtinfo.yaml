defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: xtinfo-product-name
    desc: NSIS xtInfo plug-in product metadata
    crit: component
    conf: 0.99
    size_min: 10000
    size_max: 10485760
    if:
      type: value
      path: pe.version.product_name
      exact: xtInfoPlugin
  - id: xtinfo-internal-name
    desc: NSIS xtInfo plug-in internal filename
    crit: component
    conf: 0.99
    size_min: 10000
    size_max: 10485760
    if:
      type: value
      path: pe.version.internal_name
      exact: xtInfoPlugin.dll
  - id: xtinfo-author
    desc: xtInfo plug-in author metadata
    crit: component
    conf: 0.99
    size_min: 10000
    size_max: 10485760
    if:
      type: value
      path: pe.version.company_name
      regex: '(?i)^Jari Berg Jensen(, jari@razormotion\.com)?$'

composite_rules:
  - id: xtinfo-plugin-identity
    desc: NSIS xtInfo system-information plug-in
    crit: notable
    conf: 0.99
    all:
      - id: xtinfo-product-name
      - id: xtinfo-internal-name
    any:
      - id: xtinfo-author
      - id: metadata/package/versioning::pe-productversion-field
