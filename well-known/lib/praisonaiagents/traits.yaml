defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.95
  size_max: 5000000

traits:
  - id: package-metadata
    desc: PraisonAI agents package metadata
    for: [pkginfo]
    if:
      type: text
      regex: '^Name:\s*praisonaiagents$'

  - id: agent-property-docs
    desc: PraisonAI agent property docs
    for: [python]
    if:
      type: path
      regex: 'praisonaiagents[\\/]agent[\\/]agent\.py$'

  - id: authenticated-agent-endpoint
    desc: PraisonAI authenticated agent endpoint
    for: [python]
    if:
      type: text
      substr: _authorise_launch_request

  - id: managed-compute-protocol
    desc: PraisonAI managed compute protocol
    for: [python]
    if:
      type: text
      substr: Compute Provider Protocol for Managed Agents

  - id: memory-adapter-factory
    desc: PraisonAI memory adapter factory
    for: [python]
    if:
      type: text
      substr: Memory Adapter Factory Functions

  - id: permission-pattern-doctest
    desc: PraisonAI permission pattern doctest
    for: [python]
    if:
      type: path
      regex: 'praisonaiagents[\\/]permissions[\\/]arity\.py$'

  - id: base-tool-source
    desc: PraisonAI base tool source
    for: [python]
    if:
      type: text
      substr: Base classes for PraisonAI Agent tools

  - id: email-tool-source
    desc: PraisonAI email tool source
    for: [python]
    if:
      type: text
      substr: Email tools for PraisonAI Agents

  - id: approved-file-tool-source
    desc: PraisonAI approved file tool source
    for: [python]
    if:
      type: text
      substr: '@require_approval(risk_level="high")'

composite_rules:
  - id: praisonaiagents-source-context
    desc: PraisonAI agents source context
    crit: notable
    conf: 0.95
    any:
      - id: package-metadata
      - id: agent-property-docs
      - id: authenticated-agent-endpoint
      - id: managed-compute-protocol
      - id: memory-adapter-factory
      - id: permission-pattern-doctest
      - id: base-tool-source
      - id: email-tool-source
      - id: approved-file-tool-source
