defaults:
  platforms: [unix, windows]
  for: [python]
  crit: baseline
  conf: 0.96
  size_max: 8388608

traits:
  - id: source-tree
    desc: Pygments syntax lexer tables
    crit: notable
    if:
      type: path
      regex: '(^|[\\/])pygments[\\/](lexers|formatters|unistring\\.py)'
  - id: module-docstring
    desc: Pygments module docstring
    crit: baseline
    if:
      type: text
      regex: 'pygments\\.[a-z_]+\\n\\s+~{6,}'
  - id: copyright-notice
    desc: Pygments copyright notice
    crit: baseline
    if:
      type: text
      substr: 'Copyright 2006-2023 by the Pygments team'
