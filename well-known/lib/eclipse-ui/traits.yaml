defaults:
  platforms: [unix, windows]
  for: [jar, class, java_class]
  crit: notable
  conf: 0.99

traits:
  - id: eclipse-ui-key-namespace
    desc: Eclipse UI internal keybinding namespace
    if:
      type: import
      regex: '^org/eclipse/ui/internal/keys/'

  - id: eclipse-ui-quickaccess-namespace
    desc: Eclipse UI internal quick-access namespace
    if:
      type: import
      regex: '^org/eclipse/ui/internal/quickaccess/'

composite_rules:
  - id: eclipse-ui-keybinding-context
    desc: Recognized Eclipse UI keyboard context
    crit: exception
    conf: 0.99
    any:
      - id: eclipse-ui-key-namespace
      - id: eclipse-ui-quickaccess-namespace

  - id: builtin-credential-keylogger
    desc: Eclipse UI keylogger heuristic hook
    crit: notable
    conf: 0.99
    any:
      - id: eclipse-ui-key-namespace
      - id: eclipse-ui-quickaccess-namespace
    unless:
      - id: eclipse-ui-keybinding-context
