defaults:
  platforms: [unix, windows]
  for: [jar, class, java_class]
  crit: notable
  conf: 0.99

traits:
  # Java-class analyzers emit credential/keylogger for generic key-stroke
  # vocabulary. Eclipse's keybinding and quick-access implementations are
  # benign UI input handling; this sentinel-named hook lets their namespace
  # traits suppress that engine finding without weakening the real namespace
  # observations.
  - id: builtin-credential-keylogger
    desc: Built-in Java keybinding finding hook
    crit: suspicious
    conf: 1.0
    for: [class, java_class]
    if:
      type: basename
      exact: __cleave_builtin_credential_keylogger_hook__
    unless:
      - id: eclipse-ui-key-namespace
      - id: eclipse-ui-quickaccess-namespace
  - id: eclipse-ui-key-namespace
    desc: Eclipse UI internal keybinding namespace
    if:
      type: import
      regex: '^org/eclipse/ui/internal/keys/'

  - id: eclipse-ui-quickaccess-namespace
    desc: Eclipse UI internal quick-access namespace
    if:
      type: import
      regex: '^org/eclipse/ui/internal/quickaccess/'
