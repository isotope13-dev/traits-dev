# Identity for the upstream running-process Rust runtime.  The LaunchAgent
# backend is an intentional, user-requested runpm feature; this marker lets
# persistence composites distinguish that documented implementation from an
# unrelated source file that installs a LaunchAgent.
defaults:
  platforms: [macos]
  for: [rust]

traits:
  - id: runpm-launchd-backend
    desc: running-process runpm LaunchAgent backend
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: com.zackees.runpm-daemon
