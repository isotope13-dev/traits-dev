defaults:
  size_max: 10485760
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: rsa-bsafe-product-versioninfo
    desc: RSA BSAFE Crypto-C ME product
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.product_name
      exact: RSA BSAFE Crypto-C ME

  - id: rsa-security-company-versioninfo
    desc: RSA Security company version info
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.company
      exact: RSA - The Security Division of EMC

  - id: rsa-bsafe-fips-provider-string
    desc: RSA BSAFE FIPS provider string
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rdata
      substr: RSA BSAFE FIPS140-2 PROVIDER

composite_rules:
  - id: rsa-bsafe-crypto-library
    desc: RSA BSAFE Crypto-C ME library
    crit: notable
    conf: 0.99
    all:
      - id: rsa-bsafe-product-versioninfo
      - id: rsa-security-company-versioninfo
    any:
      - id: rsa-bsafe-fips-provider-string
