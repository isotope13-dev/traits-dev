# fasttemplate string templating for Go (github.com/valyala/fasttemplate).
#
# Lightweight `{{name}}` placeholder substitution. Used in chat bots, log
# formatters, response renderers. Genuine but low-signal — recorded so the
# import tree is fully accounted for.
defaults:
  platforms: [unix, windows]
  for: [go]
  crit: baseline
  conf: 0.93
  size_min: 1024
  size_max: 524288000

traits:
  - id: fasttemplate-import
    desc: Imports valyala/fasttemplate
    if:
      type: text
      substr: 'github.com/valyala/fasttemplate'

  - id: fasttemplate-new-call
    desc: fasttemplate.New constructor
    if:
      type: text
      regex: '\bfasttemplate\.New(Template)?\s*\('

composite_rules:
  - id: fasttemplate-engine
    desc: Go process uses fasttemplate string templating
    all:
      - id: fasttemplate-import
      - id: fasttemplate-new-call
