defaults:
  platforms: [unix]
  for: [elf]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 20000000

traits:
  - id: condor-version-export
    desc: HTCondor version export
    crit: notable
    if:
      type: export
      exact: CondorVersion
  - id: condor-daemon-core-export
    desc: HTCondor daemon core export
    crit: notable
    if:
      type: export
      exact: daemonCore

composite_rules:
  - id: htcondor-native-library
    desc: HTCondor native library identity
    crit: notable
    all:
      - id: condor-version-export
      - id: condor-daemon-core-export
