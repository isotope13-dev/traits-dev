defaults:
  platforms:
  - unix
  - windows
  for:
  - scripts
  - binaries
  size_max: 5000000
traits:
- id: urllib3-content
  desc: Contains content specific to urllib3 library
  crit: notable
  if:
    type: text
    regex: "(Client-side SSL/TLS verification|File uploads with multipart encoding)"
- id: urllib3-name
  desc: Imports the Python urllib3 library
  crit: notable
  for: [python]
  if:
    type: import
    regex: '^urllib3(\.|$)'
- id: tui-summary
  desc: Summary mentions Terminal User Interface
  crit: notable
  if:
    type: text
    substr: A library for creating a terminal user interface
