defaults:
  platforms:
  - unix
  - windows
  for:
  - scripts
  - binaries
  size_max: 5000000
traits:
- id: urllib3-content
  desc: Contains two urllib3 feature-description phrases
  crit: notable
  count_min: 2
  if:
    type: text
    regex: "(Client-side SSL/TLS verification|File uploads with multipart encoding)"
- id: urllib3-name
  desc: Imports the Python urllib3 library
  crit: notable
  for: [python]
  if:
    type: import
    regex: '^urllib3(\.|$)'
