defaults:
  platforms: [linux, macos, windows]
  for: [python, python-bytecode, zip, tar, javascript]
  crit: baseline
  conf: 0.95

traits:
  - id: package-path
    desc: scikit-learn package source path marker
    if:
      type: basename
      regex: (?i)(^|[!:/\\])(scikit-learn-[^!:/\\]{1,160}|sklearn)([!:/\\]|$)
  - id: source-header
    desc: scikit-learn source file header marker
    for: [python, javascript]
    if:
      type: text
      substr: The scikit-learn developers
  - id: documentation-url
    desc: scikit-learn documentation URL marker
    for: [python, javascript]
    if:
      type: text
      substr: scikit-learn.org
  - id: array-api-compat-vendored
    desc: Array API compatibility library marker
    for: [python]
    if:
      type: text
      substr: __array_api_version__

