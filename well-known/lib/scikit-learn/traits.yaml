defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - python
  - python-bytecode
  - zip
  - tar
  - javascript
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: package-path
  for:
  - python
  - pyc
  - text
  desc: scikit-learn package source path marker
  if:
    type: path
    basename: true
    case_insensitive: true
    regex: "^(scikit-learn-[^:/\\\\]{1,160}|sklearn)([:/\\\\]|$)"
- id: source-header
  desc: scikit-learn source file header marker
  for:
  - python
  - javascript
  if:
    type: text
    substr: The scikit-learn developers
- id: documentation-url
  desc: scikit-learn documentation URL marker
  for:
  - python
  - javascript
  if:
    type: text
    substr: scikit-learn.org
- id: array-api-compat-vendored
  desc: Array API compatibility library marker
  for:
  - python
  if:
    type: text
    substr: __array_api_version__
composite_rules:
- id: scikit-learn-library
  desc: scikit-learn machine learning library
  crit: notable
  conf: 0.95
  any:
  - id: package-path
  - id: source-header
  - id: documentation-url
- id: scikit-learn-vendored-array-api
  desc: array-api-compat vendored within scikit-learn
  crit: notable
  conf: 0.95
  all:
  - id: array-api-compat-vendored
  - id: well-known/lib/scikit-learn::scikit-learn-library
