defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: protocol-buffers-schema npm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: protocol-buffers-schema

  - id: source-parser-marker
    desc: protocol-buffers-schema parser marker
    for: [javascript]
    if:
      type: text
      regex: 'var PACKABLE_TYPES = \[[\s\S]{0,500}var onfieldoptionvalue = function \(tokens\)'
