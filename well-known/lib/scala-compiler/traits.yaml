defaults:
  platforms:
  - unix
  - windows
  for:
  - jar
  - zip
  - class
  crit: baseline
  conf: 0.98
  size_max: 5000000
traits:
- id: scala-compiler-jar
  desc: Scala compiler JAR
  size_min: 100000
  size_max: 50000000
  if:
    type: path
    regex: "(^|[\\\\/!])scala-compiler\\.jar($|!)"
- id: scala-compiler-package
  desc: Scala compiler package marker
  size_min: 100000
  size_max: 50000000
  if:
    type: text
    substr: scala/tools/nsc/
- id: scala-reflect-jar
  desc: Scala reflect JAR
  size_min: 100000
  size_max: 50000000
  if:
    type: path
    regex: "(^|[\\\\/!])scala-reflect\\.jar($|!)"
- id: scala-reflect-package
  desc: Scala reflect package marker
  size_min: 100000
  size_max: 50000000
  if:
    type: text
    substr: scala/reflect/
