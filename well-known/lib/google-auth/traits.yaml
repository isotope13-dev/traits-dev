defaults:
  platforms:
  - unix
  - windows
  for:
  - php
  crit: component
  conf: 0.96
  size_max: 5000000
traits:
- id: namespace
  desc: Google Auth namespace marker
  if:
    type: text
    regex: namespace\s+.{0,80}Google\\Auth\\
- id: credentials-loader
  desc: Google Auth credentials loader
  if:
    type: text
    regex: class\s+CredentialsLoader\b
- id: python-package-path
  desc: Python google-auth package path
  crit: notable
  conf: 0.96
  for: [python]
  if:
    type: path
    regex: '(^|[\\/])google[\\/]auth'
composite_rules:
- id: credentials-loader-context
  desc: Google Auth credentials loader context
  crit: notable
  conf: 0.99
  all:
  - id: namespace
  - id: credentials-loader
