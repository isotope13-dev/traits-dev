# ELK.js emits compact arithmetic loops in its bundled and worker builds.
# These filenames identify the library's generated runtime, so its generic
# anti-static signal should remain available as notable library evidence while
# not being promoted to a suspicious obfuscation finding.
defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: notable
  conf: 0.99

traits:
  - id: elkjs-bundled-runtime-file
    desc: ELK.js bundled runtime file
    if:
      type: basename
      exact: elk.bundled.js
  - id: elkjs-worker-runtime-file
    desc: ELK.js worker runtime file
    if:
      type: basename
      regex: '^elk-worker(\.min)?\.js$'
