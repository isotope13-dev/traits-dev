defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.96
  size_min: 512
  size_max: 52428800

traits:
  - id: product-versioninfo
    desc: Spectre.Console ProductName version info
    if:
      type: value
      path: pe.version.product_name
      regex: '^Spectre\.Console'

  - id: original-filename
    desc: Spectre.Console original filename
    if:
      type: value
      path: pe.version.original_filename
      regex: '^Spectre\.Console.*\.dll$'

  - id: console-library-comment
    desc: Spectre.Console library comment
    if:
      type: value
      path: pe.version.comments
      substr: create beautiful console applications

composite_rules:
  - id: spectre-console-library
    desc: Spectre.Console .NET library
    crit: baseline
    conf: 0.99
    all:
      - id: product-versioninfo
      - id: original-filename
      - id: console-library-comment
