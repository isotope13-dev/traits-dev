defaults:
  for: [pe]
  platforms: [windows]
  size_min: 500000
  size_max: 2000000

traits:
  - id: protect-sdk-version-export
    desc: Protect SDK version export
    crit: component
    conf: 0.98
    if:
      type: export
      exact: ProtectSdkVersion

  - id: psa-export-prefix
    desc: PSA licensing export prefix
    crit: component
    conf: 0.96
    count_min: 10
    if:
      type: export
      regex: ^PSA_

  - id: psc-export-prefix
    desc: PSC licensing export prefix
    crit: component
    conf: 0.96
    count_min: 8
    if:
      type: export
      regex: ^PSC_

  - id: pse-export-prefix
    desc: PSE licensing export prefix
    crit: component
    conf: 0.96
    count_min: 8
    if:
      type: export
      regex: ^PSE_

  - id: update-star-force-domain
    desc: StarForce update domain marker
    crit: component
    conf: 0.98
    if:
      type: text
      exact: update.star-force.com
      section: UPX0

  - id: driverinstaller-template
    desc: StarForce driver installer template
    crit: component
    conf: 0.96
    if:
      type: text
      exact: DriverInstaller.{%1!s!}.%2!s!
      section: UPX0

composite_rules:
  - id: protect-sdk-wrapper
    desc: StarForce Protect SDK wrapper
    crit: notable
    conf: 0.98
    all:
      - id: protect-sdk-version-export
    any:
      - id: psa-export-prefix
      - id: psc-export-prefix
      - id: pse-export-prefix
      - id: update-star-force-domain
      - id: driverinstaller-template
    needs: 3
