defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 20000
  size_max: 52428800
traits:
  - id: thinstall-bin-env
    desc: ThinApp THINSTALL_BIN marker
    crit: component
    conf: 0.96
    if:
      type: text
      exact: THINSTALL_BIN
      section: .text
  - id: thinapp-version-string
    desc: ThinApp version resource marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: ThinAppVersion
      section: .res
  - id: thinapp-build-time-string
    desc: ThinApp build timestamp marker
    crit: component
    conf: 0.92
    if:
      type: text
      exact: ThinAppBuildDateTime
      section: .res
  - id: thinstall-boot-loader-pdb
    desc: ThinApp boot loader PDB path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: thinstall\\modules\\boot_loader.pdb
      section: .text
composite_rules:
  - id: thinapp-packed-runtime
    desc: VMware ThinApp packaged runtime
    crit: notable
    conf: 0.96
    all:
      - id: thinstall-bin-env
      - id: thinapp-version-string
    any:
      - id: thinapp-build-time-string
      - id: thinstall-boot-loader-pdb
