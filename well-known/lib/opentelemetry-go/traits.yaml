# OpenTelemetry for Go (go.opentelemetry.io + ecosystem instrumentations).
#
# Distributed-tracing / metrics standard. Apps that import OTel are
# emitting spans to a collector — benign-context evidence of production
# observability infrastructure.
defaults:
  platforms: [unix, windows]
  for: [go]
  crit: baseline
  conf: 0.95
  size_min: 1024
  size_max: 524288000

traits:
  - id: otel-go-import
    desc: Imports go.opentelemetry.io
    if:
      type: text
      substr: 'go.opentelemetry.io/'

  - id: otelpgx-import
    desc: Imports exaring/otelpgx Postgres OTel
    if:
      type: text
      substr: 'github.com/exaring/otelpgx'

  - id: otel-tracer-provider
    desc: otel.SetTracerProvider call
    if:
      type: text
      regex: '\botel\.SetTracerProvider\s*\('

  - id: otel-tracer-start
    desc: tracer.Start span open
    if:
      type: text
      regex: '\.Start\s*\(\s*[a-zA-Z_]\w*,\s*"[^"\n]{1,80}"'

composite_rules:
  - id: opentelemetry-instrumentation
    desc: Go process emits OpenTelemetry telemetry
    any:
      - id: otel-go-import
      - id: otelpgx-import
      - id: otel-tracer-provider
