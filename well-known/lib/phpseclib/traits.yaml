defaults:
  platforms:
  - unix
  - windows
  for:
  - php
  crit: component
  conf: 0.96
  size_max: 5000000
traits:
- id: namespace
  desc: phpseclib namespace marker
  if:
    type: text
    regex: namespace\s+.{0,80}phpseclib3\\
- id: class-prefix
  desc: phpseclib class prefix
  if:
    type: text
    substr: phpseclib3\
- id: crypt-class
  desc: phpseclib crypto class marker
  if:
    type: text
    regex: class\s+(Hash|SymmetricKey|Engine|EvalBarrett)\b
- id: legacy-source-marker
  desc: Legacy phpseclib source marker
  if:
    type: text
    regex: 'phpseclib\.sourceforge\.net|SSH-[12]\.\d+-phpseclib'
- id: legacy-ssh-class
  desc: Legacy phpseclib SSH class
  if:
    type: symbol
    regex: '^Net_SSH[12]$'
composite_rules:
- id: library-context
  desc: phpseclib library context
  crit: baseline
  conf: 0.98
  any:
  - id: namespace
  - id: class-prefix
- id: legacy-library-context
  desc: Legacy phpseclib SSH implementation context
  crit: baseline
  conf: 0.98
  all:
  - id: legacy-source-marker
  - id: legacy-ssh-class
- id: crypto-implementation-context
  desc: phpseclib crypto implementation context
  crit: baseline
  conf: 0.97
  all:
  - id: library-context
  - id: crypt-class
