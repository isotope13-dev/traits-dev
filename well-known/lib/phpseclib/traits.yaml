defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.96

traits:
  - id: namespace
    desc: phpseclib namespace marker
    if:
      type: text
      regex: 'namespace\s+.{0,80}phpseclib3\\'

  - id: class-prefix
    desc: phpseclib class prefix
    if:
      type: text
      substr: 'phpseclib3\'

  - id: crypt-class
    desc: phpseclib crypto class marker
    if:
      type: text
      regex: 'class\s+(Hash|SymmetricKey|Engine|EvalBarrett)\b'

composite_rules:
  - id: library-context
    desc: phpseclib library context
    crit: baseline
    conf: 0.98
    any:
      - id: namespace
      - id: class-prefix

  - id: crypto-implementation-context
    desc: phpseclib crypto implementation context
    crit: baseline
    conf: 0.97
    all:
      - id: library-context
      - id: crypt-class
