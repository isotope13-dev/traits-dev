# openapi-typescript-codegen generated API client. Benign FP context: generated
# username/password/withCredentials config resembles credential handling.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]
  crit: component
  conf: 0.96
traits:
  - id: openapi-api-error-class
    desc: OpenAPI ApiError class
    if:
      type: text
      substr: ApiError
  - id: openapi-with-credentials-config
    desc: OpenAPI with credentials config
    if:
      type: text
      substr: WITH_CREDENTIALS
  - id: openapi-response-transformer
    desc: OpenAPI response transformer
    if:
      type: text
      substr: responseTransformer
  - id: openapi-username-config
    desc: OpenAPI username config
    if:
      type: text
      substr: "USERNAME:void 0"
  - id: openapi-password-config
    desc: OpenAPI password config
    if:
      type: text
      substr: "PASSWORD:void 0"
composite_rules:
  - id: generated-openapi-api-client
    desc: Generated OpenAPI API client
    crit: notable
    conf: 0.96
    all:
      - id: openapi-api-error-class
      - id: openapi-with-credentials-config
      - id: openapi-response-transformer
      - id: openapi-username-config
      - id: openapi-password-config
