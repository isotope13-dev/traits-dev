defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
  size_max: 1000000

traits:
  - id: blessed-unicode-module-path
    desc: Blessed unicode module path
    crit: component
    conf: 0.94
    if:
      type: basename
      regex: '(^|[\\/])unicode\.js$'

  - id: blessed-unicode-helper-text
    desc: Blessed unicode helper text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "unicode"

composite_rules:
  - id: blessed-terminal-unicode-module
    desc: Blessed terminal unicode helper
    crit: notable
    conf: 0.94
    all:
      - id: blessed-unicode-module-path
      - id: blessed-unicode-helper-text
