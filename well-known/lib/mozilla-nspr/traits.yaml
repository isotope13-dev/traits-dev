defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95
  size_min: 512
  size_max: 52428800

traits:
  - id: nspr-product-versioninfo
    desc: "NSPR ProductName VERSIONINFO"
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.product_name
      exact: Netscape Portable Runtime

  - id: nspr-original-filename-versioninfo
    desc: NSPR libnspr4 original filename version info
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.original_filename
      exact: libnspr4.dll

  - id: mozilla-foundation-company-versioninfo
    desc: Mozilla Foundation CompanyName version info
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.company
      exact: Mozilla Foundation

  - id: nspr-pr-abort-export
    desc: NSPR PR_Abort export
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: PR_Abort

  - id: nspr-monitor-export
    desc: NSPR monitor export
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: PR_GetMonitorEntryCount

composite_rules:
  - id: nspr-library
    desc: Mozilla Netscape Portable Runtime library
    crit: baseline
    conf: 0.99
    all:
      - id: nspr-product-versioninfo
      - id: nspr-original-filename-versioninfo
    any:
      - id: mozilla-foundation-company-versioninfo
      - id: nspr-pr-abort-export
      - id: nspr-monitor-export
