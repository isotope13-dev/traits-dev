defaults:
  platforms: [windows, linux, macos]
  for: [javascript]
  crit: notable
  conf: 0.95

traits:
  - id: dropzone-js
    desc: Dropzone JavaScript library
    if:
      type: path
      regex: '(?i)^dropzone(\.min)?\.js$'
      basename: true
  - id: dropzone-data-uri-preview
    desc: Dropzone data URI preview helper
    crit: component
    if:
      type: text
      substr: "var byteString = atob(dataURI.split(',')[1]);"
  - id: jstree-library
    desc: jsTree JavaScript library
    if:
      type: path
      regex: '(?i)^jstree(\.min)?\.js$'
      basename: true
  - id: jstree-storage-state
    desc: jsTree localStorage state helper
    crit: component
    if:
      type: text
      substr: "a.jstree.defaults.state={key:\"jstree\""
  - id: google-code-prettify-runner
    desc: Google Code Prettify runner
    if:
      type: path
      regex: '^(run_prettify|prettify)(-min)?\.js$'
      case_insensitive: true
      basename: true
  - id: google-code-prettify-autoload
    desc: Google Code Prettify autoload helper
    crit: component
    if:
      type: text
      substr: "j==\"autorun\"?S=!/^[0fn]/i.test(w)"
  - id: tinymce-plugin-manager
    desc: TinyMCE plugin manager bundle
    if:
      type: text
      substr: tinymce.PluginManager
  - id: tinymce-asset-path
    desc: TinyMCE asset path
    if:
      type: path
      regex: '(^|[\\/])tinymce([\\/]|$)'
  - id: redoc-standalone-bundle
    desc: Redoc standalone UI bundle
    if:
      type: text
      substr: "exports.Redoc=t(require(\"null\"))"
  - id: redoc-oas-bundle-symbol
    desc: Redoc OpenAPI bundle symbol
    crit: component
    if:
      type: text
      substr: "t.bundleDocument=t.bundleFromString=t.bundle=t.OasVersion"
  - id: redoc-version-marker
    desc: ReDoc bundled UI version marker
    crit: component
    if:
      type: text
      regex: 'ReDoc Version:\s*[0-9]+\.[0-9]+\.[0-9]+'
  - id: graphiql-react-bundle
    desc: GraphiQL React UI bundle
    if:
      type: text
      substr: "GraphiQL"
  - id: graphiql-assets-path
    desc: GraphiQL asset path
    if:
      type: path
      regex: '(?i)(^|[\\/])graphiql(\.min)?\.js$'
  - id: choices-js-library
    crit: notable
    desc: Choices JavaScript library
    if:
      type: path
      regex: '(?i)^choices(\.min)?\.js$'
      basename: true
  - id: zeus-helen-library
    crit: notable
    desc: Zeus Helen JavaScript library
    if:
      type: path
      regex: '(?i)zeus[\\/]helen\.js$'
  - id: ace-editor-module
    desc: Ace editor module bundle
    if:
      type: text
      substr: 'ace.define("ace/'
  - id: createjs-library-marker
    desc: CreateJS canvas library
    if:
      type: text
      substr: 'this.createjs=this.createjs||{}'
  - id: mobile-browser-detection-helper
    desc: Mobile browser detection helper
    if:
      type: text
      substr: 'jQuery.browser.mobile'
  - id: dompurify-library-marker
    desc: Contains the DOMPurify sanitization library
    if:
      type: text
      substr: DOMPurify
  - id: html2canvas-library-marker
    desc: html2canvas JavaScript library marker
    if:
      type: text
      substr: html2canvas

composite_rules:
  - id: dropzone-library
    desc: Dropzone JavaScript library
    crit: notable
    conf: 0.97
    any:
      - id: dropzone-js
      - id: well-known/lib/web-ui-vendors::dropzone-data-uri-preview
  - id: jstree-library-context
    desc: jsTree JavaScript library
    crit: notable
    conf: 0.97
    any:
      - id: jstree-library
      - id: well-known/lib/web-ui-vendors::jstree-storage-state
  - id: google-code-prettify-library
    desc: Google Code Prettify library
    crit: notable
    conf: 0.97
    any:
      - id: google-code-prettify-runner
      - id: well-known/lib/web-ui-vendors::google-code-prettify-autoload
  - id: tinymce-library
    desc: TinyMCE JavaScript library
    crit: notable
    conf: 0.97
    any:
      - id: tinymce-plugin-manager
      - id: tinymce-asset-path
  - id: redoc-library
    desc: Redoc OpenAPI UI library
    crit: notable
    conf: 0.97
    any:
      - id: redoc-standalone-bundle
      - id: well-known/lib/web-ui-vendors::redoc-oas-bundle-symbol
      - id: well-known/lib/web-ui-vendors::redoc-version-marker
  - id: graphiql-library
    desc: GraphiQL UI library
    crit: notable
    conf: 0.97
    any:
      - id: graphiql-react-bundle
      - id: graphiql-assets-path
