# ipaddr.js — the widely-vendored JavaScript IPv4/IPv6 address library
# (a dependency of express, body-parser, proxy-addr, etc.).
#
# Parsing and formatting addresses from integer octet lists is the whole point
# of the library, so it legitimately trips IP-construction/obfuscation matchers.
# Referenced as benign context by those rules so a vendored IP library does not
# read as C2-IP obfuscation.
defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: notable
traits:
  - id: ipaddr-basename
    crit: notable
    desc: ipaddr.js library filename
    conf: 0.9
    if:
      type: basename
      regex: '^ipaddr(\.min)?\.js$'
  - id: ipaddr-parse-cidr-api
    crit: notable
    desc: ipaddr.js parseCIDR API
    conf: 0.85
    if:
      type: text
      exact: parseCIDR
  - id: ipaddr-special-ranges-api
    crit: notable
    desc: ipaddr.js SpecialRanges API
    conf: 0.85
    if:
      type: text
      exact: SpecialRanges
  - id: ipaddr-from-byte-array-api
    crit: notable
    desc: ipaddr.js fromByteArray API
    conf: 0.85
    if:
      type: text
      exact: fromByteArray
composite_rules:
  - id: ipaddr-api-markers
    crit: notable
    desc: ipaddr.js library API symbols
    conf: 0.85
    any:
      - id: ipaddr-parse-cidr-api
      - id: ipaddr-special-ranges-api
      - id: ipaddr-from-byte-array-api
  - id: ipaddr-js-library
    crit: notable
    desc: ipaddr.js IP-address library
    conf: 0.92
    any:
      - id: ipaddr-basename
      - id: ipaddr-api-markers
