defaults:
  platforms:
  - unix
  - windows
  for:
  - ruby
  size_max: 5000000
traits:
- id: openuri-stdlib-module
  desc: Ruby OpenURI stdlib module
  crit: component
  conf: 0.98
  if:
    type: text
    regex: "(^|\\n)module\\s+OpenURI\\b|OpenURI::OpenRead|URI::HTTP#open"
- id: openuri-stdlib-meta
  desc: Ruby OpenURI stdlib metadata
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: OpenURI::Meta
composite_rules:
- id: openuri-stdlib
  desc: Ruby OpenURI standard library
  crit: notable
  conf: 0.98
  any:
  - id: openuri-stdlib-module
  - id: openuri-stdlib-meta
