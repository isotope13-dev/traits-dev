defaults:
  platforms:
  - windows
  - unix
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: windows-rs-binding-core-crate
  desc: Windows Rust binding crate
  for:
  - rust
  - source
  - cargo.toml
  if:
    type: path
    regex: "(winapi|windows|windows-sys|windows-targets)-[0-9]+\\."
- id: windows-rs-binding-api-crate
  desc: Windows Rust binding crate
  for:
  - rust
  - source
  - cargo.toml
  if:
    type: path
    regex: "(windows-core|windows-implement|windows-interface)-[0-9]+\\."
- id: windows-rs-binding-types-crate
  desc: Windows Rust binding crate
  for:
  - rust
  - source
  - cargo.toml
  if:
    type: path
    regex: "(windows-result|windows-strings|windows-numerics)-[0-9]+\\."
- id: windows-rs-binding-tool-crate
  desc: Windows Rust binding crate
  for:
  - rust
  - source
  - cargo.toml
  if:
    type: path
    regex: "(windows-version|windows-link|windows-registry)-[0-9]+\\."
- id: rust-syscall-binding-crate
  desc: Rust syscall binding crate
  for:
  - rust
  - source
  if:
    type: path
    regex: "(libc|nix|rustix|redox_syscall|linux-raw-sys|errno)-[0-9]+\\."
composite_rules:
- id: windows-rs-binding-crate
  desc: Windows Rust binding crate
  for:
  - rust
  - source
  - cargo.toml
  any:
  - id: windows-rs-binding-core-crate
  - id: windows-rs-binding-api-crate
  - id: windows-rs-binding-types-crate
  - id: windows-rs-binding-tool-crate
