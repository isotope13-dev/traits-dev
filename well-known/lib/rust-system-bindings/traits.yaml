# Canonical Rust system-binding crates (vendored dependencies).
#
# These crates are the source-of-truth FFI bindings for OS APIs and raw
# syscalls, so they enumerate every dangerous-looking symbol/constant as a
# *declaration* (extern blocks, `link!` macros, `pub const SYS_*`, doc-comments),
# never as offensive usage. A capability detector that matches a bare OS-API or
# syscall name therefore fires on these crates in every Rust project that vendors
# them (libc, nix, rustix, windows-sys, winapi are among the most-depended-upon
# crates on crates.io).
#
# Used ONLY as false-positive-exclusion context (referenced from `unless:`).
# Path-anchored on cargo's vendored `<crate>-<semver>/` directory layout, the
# same approach as metadata/package/files/dependency-paths::node-modules-path.
# A loose file outside this layout still gets scanned normally.
defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 0.95
traits:
  - id: windows-rs-binding-core-crate
    desc: Windows Rust binding crate
    for: [rust, source, cargo.toml]
    if:
      type: path
      regex: '(^|[\\/])(winapi|windows|windows-sys|windows-targets)-[0-9]+\.[0-9]'
  - id: windows-rs-binding-api-crate
    desc: Windows Rust binding crate
    for: [rust, source, cargo.toml]
    if:
      type: path
      regex: '(^|[\\/])(windows-core|windows-implement|windows-interface)-[0-9]+\.[0-9]'
  - id: windows-rs-binding-types-crate
    desc: Windows Rust binding crate
    for: [rust, source, cargo.toml]
    if:
      type: path
      regex: '(^|[\\/])(windows-result|windows-strings|windows-numerics)-[0-9]+\.[0-9]'
  - id: windows-rs-binding-tool-crate
    desc: Windows Rust binding crate
    for: [rust, source, cargo.toml]
    if:
      type: path
      regex: '(^|[\\/])(windows-version|windows-link|windows-registry)-[0-9]+\.[0-9]'
  - id: rust-syscall-binding-crate
    desc: Rust syscall binding crate
    for: [rust, source]
    if:
      type: path
      regex: '(^|[\\/])(libc|nix|rustix|redox_syscall|linux-raw-sys|errno)-[0-9]+\.[0-9]'
composite_rules:
  - id: windows-rs-binding-crate
    desc: Windows Rust binding crate
    for: [rust, source, cargo.toml]
    any:
      - id: windows-rs-binding-core-crate
      - id: windows-rs-binding-api-crate
      - id: windows-rs-binding-types-crate
      - id: windows-rs-binding-tool-crate
