defaults:
  platforms: [windows, unix, android]
  crit: baseline
  conf: 0.98

traits:
  - id: java-decoder-jar-group
    desc: Brotli Java decoder group
    for: [jar]
    if:
      type: value
      path: jar.pom.group_id
      exact: org.brotli
  - id: java-decoder-jar-artifact
    desc: Brotli Java decoder artifact
    for: [jar]
    if:
      type: value
      path: jar.pom.artifact_id
      exact: dec
  - id: java-decoder-class-name
    desc: Brotli Java decoder class name
    for: [class, java_class]
    if:
      type: basename
      exact: f$a.class
  - id: java-decoder-class-import
    desc: Brotli Java decoder import
    for: [class, java_class]
    if:
      type: import
      exact: org/a/a/f
  - id: java-decoder-dictionary-error
    desc: Brotli dictionary error string
    for: [class, java_class]
    if:
      type: hex
      pattern: 43 6F 72 72 75 70 74 65 64 20 62 72 6F 74 6C 69 20 64 69 63 74 69 6F 6E 61 72 79

composite_rules:
  - id: java-decoder-jar
    desc: Brotli Java decoder JAR
    crit: notable
    for: [jar]
    all:
      - id: java-decoder-jar-group
      - id: java-decoder-jar-artifact
  - id: java-decoder-class
    desc: Brotli Java decoder class
    crit: notable
    for: [class, java_class]
    all:
      - id: java-decoder-class-name
    any:
      - id: java-decoder-class-import
      - id: java-decoder-dictionary-error
