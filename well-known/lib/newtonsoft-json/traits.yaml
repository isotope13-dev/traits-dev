defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.96
  size_min: 512
  size_max: 52428800

traits:
  - id: json-net-product-versioninfo
    desc: Json.NET ProductName version info
    if:
      type: kv
      path: pe.version.product_name
      exact: Json.NET

  - id: newtonsoft-company-versioninfo
    desc: Newtonsoft CompanyName version info
    if:
      type: kv
      path: pe.version.company
      exact: Newtonsoft

  - id: newtonsoft-json-original-filename
    desc: Newtonsoft.Json original filename
    if:
      type: kv
      path: pe.version.original_filename
      exact: Newtonsoft.Json.dll

  - id: newtonsoft-json-dll-name
    desc: Newtonsoft.Json DLL name
    conf: 0.9
    if:
      type: text
      exact: Newtonsoft.Json.dll
      section: .rsrc

composite_rules:
  - id: newtonsoft-json-library
    desc: Newtonsoft.Json library
    crit: baseline
    conf: 0.99
    all:
      - id: json-net-product-versioninfo
      - id: newtonsoft-company-versioninfo
    any:
      - id: newtonsoft-json-original-filename
      - id: newtonsoft-json-dll-name
      - id: micro-behaviors/data/serialize/json::json-newtonsoft
