defaults:
  platforms: [unix]
  for: [c, elf]
  size_min: 100
  size_max: 100000000

traits:
  - id: uid-wrapper-name
    desc: uid_wrapper source marker
    crit: notable
    conf: 0.99
    for: [c]
    if:
      type: text
      word: uid_wrapper
  - id: uid-wrapper-deepbind-marker
    desc: uid_wrapper deepbind marker
    crit: notable
    conf: 0.99
    for: [c]
    if:
      type: text
      word: UID_WRAPPER_DISABLE_DEEPBIND
  - id: uid-wrapper-syscall-marker
    desc: uid_wrapper syscall marker
    crit: notable
    conf: 0.99
    for: [c]
    if:
      type: text
      word: uwrap_handle_syscall

composite_rules:
  - id: uid-wrapper-source
    desc: uid_wrapper identity-wrapper source
    crit: notable
    conf: 0.99
    any:
      - id: uid-wrapper-name
      - id: uid-wrapper-deepbind-marker
      - id: uid-wrapper-syscall-marker
