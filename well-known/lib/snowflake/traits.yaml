defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.99

traits:
  - id: connector-vendored-urllib3
    desc: Snowflake connector vendored urllib3 logger
    if:
      type: text
      substr: snowflake.connector.vendored.urllib3.connectionpool

  - id: connector-managed-identity-detector
    desc: Snowflake connector managed identity detector
    if:
      type: function
      exact: is_managed_identity_available_on_azure_vm

composite_rules:
  - id: connector-platform-detection
    desc: Snowflake connector cloud platform detection
    crit: notable
    all:
      - id: connector-vendored-urllib3
      - id: connector-managed-identity-detector
