defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: notable
  conf: 0.95

traits:
  - id: package-name
    desc: Raycast API package manifest
    for: [package.json]
    if:
      type: value
      path: name
      exact: "@raycast/api"

  - id: official-api-runtime-url
    desc: Raycast API runtime endpoint
    for: [javascript]
    if:
      type: text
      substr: "https://www.raycast.com"

  - id: api-import-template
    desc: Raycast API import template
    for: [javascript]
    if:
      type: text
      substr: 'from "@raycast/api"'

  - id: rust-function-template
    desc: Raycast Rust function template
    for: [javascript]
    if:
      type: text
      substr: "runRustFunction"

composite_rules:
  - id: rust-extension-api-template
    desc: Raycast Rust extension template
    crit: notable
    conf: 0.96
    for: [javascript]
    all:
      - id: api-import-template
      - id: rust-function-template
