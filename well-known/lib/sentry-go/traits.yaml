# Sentry error tracking SDK for Go (github.com/getsentry/sentry-go).
#
# Production-observability marker. Code that imports Sentry is shipping
# error telemetry to a SaaS — strong benign-context evidence (malware does
# not generally instrument itself for crash reporting).
defaults:
  platforms: [unix, windows]
  for: [go]
  crit: baseline
  conf: 0.95
  size_min: 1024
  size_max: 524288000

traits:
  - id: sentry-go-import
    desc: Imports github.com/getsentry/sentry-go
    if:
      type: text
      substr: 'github.com/getsentry/sentry-go'

  - id: sentry-init-call
    desc: sentry.Init configuration call
    if:
      type: text
      regex: '\bsentry\.Init\s*\('

  - id: sentry-capture-call
    desc: Sentry CaptureException / CaptureMessage
    if:
      type: text
      regex: '\bsentry\.Capture(Exception|Message)\s*\('

composite_rules:
  - id: sentry-instrumentation
    desc: Go process ships errors to Sentry
    all:
      - id: sentry-go-import
    any:
      - id: sentry-init-call
      - id: sentry-capture-call
