defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, npm]
  crit: notable
  conf: 0.98

traits:
  - id: cline-llms-package-name
    desc: Cline LLM package manifest identity
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@cline/llms'

  - id: cline-llms-archive-path
    desc: Cline LLM package archive path
    for: [javascript, npm]
    if:
      type: path
      regex: '(^|[\\/])llms-[0-9][^\\/]*\.tgz'

  - id: cline-llms-brand-marker
    desc: Cline LLM provider catalog brand marker
    for: [javascript]
    if:
      type: text
      regex: '\bCline\b.{0,60}(provider|model)|(provider|model).{0,60}\bCline\b'

  - id: cline-llms-bedrock-provider
    desc: Cline LLM Bedrock provider catalog marker
    for: [javascript]
    if:
      type: text
      exact: AWS_BEARER_TOKEN_BEDROCK

composite_rules:
  - id: cline-llms-provider-catalog
    desc: Cline LLM provider catalog
    all:
      - id: cline-llms-brand-marker
      - id: cline-llms-bedrock-provider
