# Cadence is the open-source Flow smart-contract language implementation.
# These identity facts let archive-level rules distinguish its documented
# repository maintenance tooling from credential-stealing code.
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.98

traits:
  - id: module-path
    desc: Cadence Go module identity
    for: [go.mod]
    if:
      type: text
      regex: '(?m)^module\s+github\.com/onflow/cadence\s*$'
  - id: updater-marker
    desc: Cadence updater configuration type marker
    for: [typescript]
    if:
      type: text
      substr: CadenceUpdateToolConfigSchema
