defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.96
  size_min: 512
  size_max: 52428800

traits:
  - id: product-versioninfo
    desc: HtmlForgeX ProductName version info
    if:
      type: value
      path: pe.version.product_name
      exact: HtmlForgeX

  - id: original-filename
    desc: HtmlForgeX original filename
    if:
      type: value
      path: pe.version.original_filename
      exact: HtmlForgeX.dll

  - id: evotec-company-versioninfo
    desc: Evotec CompanyName version info
    if:
      type: value
      path: pe.version.company
      exact: Evotec

composite_rules:
  - id: htmlforgex-library
    desc: HtmlForgeX .NET library
    crit: baseline
    conf: 0.99
    all:
      - id: product-versioninfo
      - id: original-filename
      - id: evotec-company-versioninfo
