defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
  conf: 0.96
  size_min: 1
  size_max: 50000000

traits:
  - id: npm-package-name
    desc: Next.js npm package name
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: next
  - id: npm-package-repository
    desc: Next.js npm repository identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: repository
      exact: vercel/next.js
  - id: npm-package-homepage
    desc: Next.js npm homepage identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: homepage
      exact: https://nextjs.org
  - id: archive-package-name
    desc: Next.js npm archive name
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.name
      exact: next
  - id: archive-package-repository
    desc: Next.js npm archive repository
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.repository.url
      exact: git+https://github.com/vercel/next.js.git
  - id: archive-package-homepage
    desc: Next.js npm archive homepage
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.homepage
      exact: https://nextjs.org
  - id: package-member-context
    desc: Next.js package member identity
    crit: notable
    if:
      type: value
      path: package.json::name
      exact: next
  - id: next-server-build-path
    desc: Next.js server build path
    if:
      type: path
      regex: '\.next[\\/]server'
  - id: next-node-modules-path
    desc: Next.js node_modules path
    if:
      type: path
      regex: 'node_modules[\\/]next'
  - id: next-dist-path
    desc: Next.js dist path
    if:
      type: path
      regex: 'next[\\/]dist'
  - id: eval-source-map-plugin-basename
    desc: Eval source-map plugin basename
    if:
      type: path
      basename: true
      exact: eval-source-map-dev-tool-plugin.js
  - id: eval-source-map-plugin-marker
    desc: Eval source-map plugin marker
    if:
      type: text
      substr: eval-source-map-dev-tool-plugin.js.map
  - id: node-crypto-shim-basename
    desc: Node crypto shim basename
    if:
      type: path
      basename: true
      exact: node-crypto.js
  - id: node-crypto-shim-marker
    desc: Node crypto shim marker
    if:
      type: text
      substr: generateKeyPairSyncExpression
  - id: next-build-telemetry-writer
    desc: Next.js build telemetry writer
    if:
      type: text
      substr: "writeFileSync(_path.default.join(this.distDir, '_events.json')"
  - id: next-production-build-phase
    desc: Next.js production build phase
    if:
      type: text
      substr: PHASE_PRODUCTION_BUILD
  - id: next-prerender-manifest-writer
    desc: Next.js prerender manifest writer
    if:
      type: text
      substr: writePrerenderManifest
  - id: next-build-source-flow--rx-7
    desc: Next loadConfig with production-build phase
    if:
      type: text
      regex: "loadConfig.{0,240}PHASE_PRODUCTION_BUILD"
    count_max: 1028192
  - id: next-build-source-flow--rx-8
    desc: Next writeManifest with prerender manifest
    if:
      type: text
      regex: "writeManifest.{0,240}PRERENDER_MANIFEST"
    count_max: 1028193
  - id: next-build-source-flow--rx-9
    desc: Next build context marker
    if:
      type: text
      substr: NextBuildContext
    count_max: 1028194

composite_rules:
  - id: official-npm-package
    desc: Official Next.js npm package identity
    crit: notable
    for: [package.json]
    all:
      - id: npm-package-name
      - id: npm-package-repository
      - id: npm-package-homepage
  - id: official-npm-archive
    desc: Official Next.js npm archive identity
    crit: notable
    for: [npm, tar]
    scope: archive
    all:
      - id: archive-package-name
      - id: archive-package-repository
      - id: archive-package-homepage
  - id: next-build-source-flow
    desc: Next.js build source flow
    conf: 0.98
    any:
      - id: next-build-source-flow--rx-7
      - id: next-build-source-flow--rx-8
      - id: next-build-source-flow--rx-9
  - id: next-build-pipeline-context
    desc: Next.js build pipeline source
    crit: notable
    conf: 0.98
    all:
      - id: metadata/library/structure::js-large-module-bundle
      - id: next-build-source-flow
    any:
      - id: next-production-build-phase
      - id: next-prerender-manifest-writer
  - id: next-node-modules-runtime
    desc: Next.js node_modules runtime file
    crit: baseline
    conf: 0.98
    all:
      - id: next-node-modules-path
      - id: next-dist-path
  - id: next-eval-source-map-plugin
    desc: Next.js eval source-map plugin
    crit: baseline
    conf: 0.99
    all:
      - id: eval-source-map-plugin-basename
      - id: eval-source-map-plugin-marker
  - id: next-crypto-extension-shim
    desc: Next.js crypto extension shim
    crit: baseline
    conf: 0.99
    all:
      - id: node-crypto-shim-basename
      - id: node-crypto-shim-marker
  - id: nextjs-build-identity
    desc: Next.js build output identity
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: next-server-build-path
      - id: next-build-telemetry-writer
      - id: next-eval-source-map-plugin
      - id: next-crypto-extension-shim
