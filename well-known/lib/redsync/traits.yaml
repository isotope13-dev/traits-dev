# Redsync distributed-lock library for Go (github.com/go-redsync/redsync).
#
# Distributed-mutex pattern over Redis using the Redlock algorithm.
# Genuine coordination primitive — appears in production microservices
# that need cross-instance exclusion.
defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.95
  size_min: 1024
  size_max: 524288000

traits:
  - id: redsync-import
    desc: Imports go-redsync/redsync
    if:
      type: text
      regex: 'github\.com/go-redsync/redsync(/v\d)?'

  - id: redsync-new-call
    desc: redsync.New constructor
    if:
      type: text
      regex: '\bredsync\.New\s*\('

  - id: redsync-mutex-lock
    desc: Redsync mutex Lock call
    crit: component
    if:
      type: text
      regex: '\.Lock\s*\(\s*ctx\b'

composite_rules:
  - id: redsync-distributed-lock
    desc: Go process uses Redsync distributed locking
    all:
      - id: redsync-import
    any:
      - id: redsync-new-call
      - id: redsync-mutex-lock
