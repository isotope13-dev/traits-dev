defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: request-signer
    desc: aws4 Node.js RequestSigner implementation
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: RequestSigner.prototype
  - id: aws4-export
    desc: aws4 Node.js module export
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '\bvar\s+aws4\s*=\s*exports\b'

composite_rules:
  - id: library
    desc: aws4 Node.js AWS Signature Version 4 library
    crit: notable
    conf: 0.99
    all:
      - id: request-signer
      - id: aws4-export
