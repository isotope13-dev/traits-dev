defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - class
  - jar
  - zip
  size_max: 5000000
traits:
- id: rhino-head-package-path
  desc: Mozilla Rhino Java package path
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: com/google/javascript/rhino/head/
- id: rhino-java-adapter-class
  desc: Rhino JavaAdapter class
  crit: component
  conf: 0.9
  if:
    type: text
    substr: com/google/javascript/rhino/head/JavaAdapter
