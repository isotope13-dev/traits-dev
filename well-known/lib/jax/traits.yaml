defaults:
  platforms: [unix, windows]
  for: [whl, elf, python]
  crit: baseline
  conf: 0.98
  size_min: 1024

traits:
  - id: jaxlib-wheel-path
    desc: jaxlib wheel or extracted member path
    crit: component
    if:
      type: path
      basename: true
      regex: '^jaxlib-[0-9][^/\\]*\.whl$'

  - id: jaxlib-member-path
    desc: jaxlib extracted member path
    crit: component
    if:
      type: path
      regex: '(^|[/\\])jaxlib[/\\]'

composite_rules:
  - id: jaxlib-wheel
    desc: Official jaxlib wheel or native member
    crit: notable
    conf: 0.99
    any:
      - id: jaxlib-wheel-path
      - id: jaxlib-member-path
