# Atalasoft EZTwain Pro native scanning library identity.
#
# This is provenance/context evidence.  TWAIN acquisition and image-format
# APIs are the library's advertised surface and are not network or execution
# behavior by themselves.
defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 262144
  size_max: 4194304

traits:
  - id: eztwain-company
    desc: Atalasoft EZTwain company metadata
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.company
      exact: Atalasoft (www.atalasoft.com)

  - id: eztwain-product
    desc: EZTwain Pro product metadata
    crit: notable
    conf: 0.99
    if:
      type: value
      path: pe.version.product_name
      exact: EZTwain Pro

  - id: eztwain-original-filename
    desc: EZTwain native DLL original filename
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.original_filename
      exact: Eztwain3.dll

composite_rules:
  - id: eztwain-pro-library
    desc: Atalasoft EZTwain Pro scanning library
    crit: notable
    conf: 1.0
    all:
      - id: eztwain-company
      - id: eztwain-product
      - id: eztwain-original-filename
