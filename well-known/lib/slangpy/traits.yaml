defaults:
  platforms: [unix]
  for: [cpp]
  crit: notable
  conf: 0.98

traits:
  - id: platform-linux-source
    desc: SlangPy Linux platform source file
    if:
      type: path
      regex: 'sgl[\\/]core[\\/]platform_linux\.cpp$'
  - id: sgl-platform-namespace
    desc: Slang graphics platform namespace
    if:
      type: text
      substr: 'namespace sgl::platform'

composite_rules:
  - id: slangpy-platform-source-context
    desc: SlangPy platform source context
    crit: exception
    conf: 0.99
    all:
      - id: platform-linux-source
      - id: sgl-platform-namespace
