# @stacksjs/stx is a UI/rendering framework. Its optional desktop-preview
# import is intentionally attempted and caught when the optional desktop
# package is absent.
defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, typescript, npm, archives]
  crit: notable
  conf: 1.0

traits:
  - id: stx-package-name
    desc: Stacks STX npm package identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@stacksjs/stx'

  - id: stx-repository
    desc: Stacks STX upstream repository
    crit: notable
    for: [package.json]
    if:
      type: value
      path: repository.url
      regex: 'github\.com/stacksjs/stx(\.git)?'

composite_rules:
  - id: stx-package-context
    desc: Recognized Stacks STX framework package context
    crit: exception
    conf: 1.0
    scope: archive
    all:
      - id: stx-package-name
      - id: stx-repository
