# AWS Common Runtime native/JNI library identity.
# These paths identify the upstream AWS CRT library shipped as a dependency;
# they are context for its documented S3/TLS/credential-provider capabilities,
# not evidence that the containing program is exfiltrating data.
defaults:
  platforms: [unix, windows]
  for: [jar, binaries]
  crit: notable
  conf: 0.98
  size_min: 100
  size_max: 100000000

traits:
  - id: jar-package-path
    desc: AWS CRT JAR package path
    for: [jar]
    if:
      type: path
      basename: true
      regex: '^aws-crt-[^/]+\.jar$'
  - id: native-library-path
    desc: AWS CRT JNI native library path
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      regex: '^(lib)?aws-crt-jni\.(so|dylib|dll)$'
