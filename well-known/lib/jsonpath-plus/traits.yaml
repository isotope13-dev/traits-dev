# JSONPath-Plus evaluates user-supplied JSONPath expressions in its browser
# VM compatibility layer; its dynamic Function call is documented behavior.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.97

traits:
  - id: jsonpath-plus-library
    desc: JSONPath-Plus Node.js module
    if:
      type: path
      regex: 'node_modules[\\/]jsonpath-plus[\\/]'
