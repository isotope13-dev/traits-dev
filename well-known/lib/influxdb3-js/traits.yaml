defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]
traits:
  - id: influxdb3-browser-package
    desc: InfluxDB 3 browser client package
    crit: baseline
    conf: 1.0
    for: [package.json]
    if:
      type: kv
      path: name
      exact: '@influxdata/influxdb3-client-browser'
  - id: influxdb3-js-user-agent
    desc: influxdb3-js user agent
    crit: baseline
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: influxdb3-js/
  - id: influxdb3-js-repository
    desc: InfluxDB 3 JavaScript repository
    crit: baseline
    conf: 0.98
    for: [package.json]
    if:
      type: kv
      path: repository.url
      substr: github.com/InfluxCommunity/influxdb3-js
composite_rules:
  - id: official-influxdb3-js-package
    desc: Official InfluxDB 3 JavaScript package
    crit: baseline
    conf: 1.0
    for: [package.json]
    all:
      - id: influxdb3-browser-package
      - id: influxdb3-js-repository
