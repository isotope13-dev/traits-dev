defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]

traits:
  - id: javascript-mime-map-basename
    desc: JavaScript MIME map basename
    crit: component
    conf: 0.9
    if:
      type: value
      path: file.basename
      exact: utils.js
  - id: message-rfc822-mime-entry
    desc: message/rfc822 MIME entry
    crit: component
    conf: 0.95
    if:
      type: text
      substr: message/rfc822
  - id: rar-compressed-mime-entry
    desc: RAR compressed MIME entry
    crit: component
    conf: 0.95
    if:
      type: text
      substr: application/x-rar-compressed

composite_rules:
  - id: javascript-mime-extension-map
    desc: JavaScript MIME extension map
    crit: notable
    conf: 0.98
    all:
      - id: javascript-mime-map-basename
      - id: message-rfc822-mime-entry
      - id: rar-compressed-mime-entry
