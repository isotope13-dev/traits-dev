defaults:
  for:
  - javascript
  platforms:
  - unix
  - windows
  size_max: 5000000
traits:
- id: tailwindcss-package-record
  desc: Tailwind CSS package metadata in bundle
  crit: component
  conf: 0.98
  if:
    type: text
    regex: name:["']tailwindcss["'].{0,80}version:["']\d+\.\d+\.\d+
- id: tailwindcss-cdn-warning
  desc: Tailwind CSS CDN bundle warning
  crit: component
  conf: 0.98
  if:
    type: text
    substr: cdn.tailwindcss.com should not be used in production
composite_rules:
- id: tailwindcss-cdn-bundle
  desc: Tailwind CSS standalone CDN bundle
  crit: notable
  conf: 0.98
  all:
  - id: tailwindcss-package-record
  - id: tailwindcss-cdn-warning
