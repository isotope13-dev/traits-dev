defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: vasync npm package name
    if:
      type: value
      path: name
      exact: vasync
  - id: bunyan-package
    desc: bunyan npm package name
    if:
      type: value
      path: name
      exact: bunyan
  # vasync appears in any of the dependency maps depending on the consumer:
  # bunyan lists it under devDependencies, restify under dependencies. Cover
  # each map so the typosquat suppression does not depend on which one.
  - id: vasync-dependency
    desc: Declares vasync dependency
    if:
      type: value
      path: dependencies.vasync
      exists: true
  - id: vasync-dev-dependency
    desc: Declares vasync dev dependency
    if:
      type: value
      path: devDependencies.vasync
      exists: true
  - id: vasync-optional-dependency
    desc: Declares vasync optional dependency
    if:
      type: value
      path: optionalDependencies.vasync
      exists: true

composite_rules:
  - id: bunyan-vasync-dependency
    desc: bunyan depends on vasync
    crit: notable
    conf: 0.99
    all:
      - id: bunyan-package
      - id: vasync-dependency
