defaults:
  platforms: [windows, unix]
  for: [python, whl, apk, conda]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 524288000

traits:
  - id: pyyaml-reader-path
    desc: PyYAML reader module path
    if:
      type: path
      regex: '(^|[\\/])yaml[\\/]reader\.py$'
  - id: pyyaml-package-name
    desc: PyYAML package name
    if:
      type: text
      regex: '(?i)\bpyyaml\b'

composite_rules:
  - id: pyyaml-library-context
    desc: PyYAML library context
    crit: notable
    conf: 0.98
    any:
      - id: pyyaml-reader-path
      - id: pyyaml-package-name
