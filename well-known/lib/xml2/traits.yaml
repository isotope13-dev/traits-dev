defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript, c, xml]
  crit: baseline
  conf: 0.97
  size_max: 268435456

traits:
  - id: source-path-marker
    desc: libxml2 source distribution path
    if:
      type: basename
      regex: '(^|[\\/])libxml2-[0-9].{0,120}'
  - id: source-text-marker
    desc: libxml2 source distribution text
    if:
      type: text
      regex: '\blibxml2\b|LIBXML_'
composite_rules:
  - id: source-bundle
    desc: libxml2 source distribution bundle
    crit: baseline
    conf: 0.97
    any:
      - id: source-path-marker
      - id: source-text-marker
