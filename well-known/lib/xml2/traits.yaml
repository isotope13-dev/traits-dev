defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript, c, xml]
  crit: baseline
  conf: 0.97
  size_max: 268435456

traits:
- id: source-path-marker
  for: [c, cpp, makefile, shell]
  desc: libxml2 source distribution path
  if:
    type: path
    regex: '(^|[\\/])libxml2-[0-9].{0,120}'
- id: source-text-marker--libxml2
  desc: libxml2 source distribution text (libxml2)
  if:
    type: text
    word: libxml2
- id: source-text-marker--libxml
  desc: libxml2 source distribution text (LIBXML_)
  if:
    type: text
    word: LIBXML_
composite_rules:
- id: source-text-marker
  desc: libxml2 source distribution text
  any:
  - id: source-text-marker--libxml2
  - id: source-text-marker--libxml
- id: source-bundle
  desc: libxml2 source distribution bundle
  crit: baseline
  conf: 0.97
  any:
  - id: well-known/lib/xml2
