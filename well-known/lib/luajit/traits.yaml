defaults:
  platforms:
  - windows
  - unix
  for:
  - pe
  - dll
  - binaries
  crit: component
  size_max: 5000000
traits:
- id: luajit-runtime-env-pair
  desc: LuaJIT runtime environment variable pair
  conf: 0.9
  size_min: 100000
  size_max: 5000000
  if:
    type: text
    regex: "\\bLUA_(NOENV|CPATH)\\b"
composite_rules:
- id: runtime-context
  desc: LuaJIT runtime context
  crit: notable
  conf: 0.96
  all:
  - id: luajit-runtime-env-pair
  - id: micro-behaviors/process/interpreter/lua::embedded-lua-vm
  - id: objectives/command-and-control/dropper/execution/loader::luajit-runtime-cluster
