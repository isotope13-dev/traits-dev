defaults:
  platforms: [unix, windows]
  for: [c, text]

traits:
  - id: spandsp-source-marker
    desc: SpanDSP source marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: spandsp

  - id: g726-codec-source
    desc: G.726 codec source marker
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: g726
