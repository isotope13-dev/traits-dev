defaults:
  platforms: [unix, windows]
  for: [jar, class, java_class]
  crit: notable
  conf: 0.99

traits:
  - id: lombok-jar
    desc: Project Lombok compiler JAR
    for: [jar]
    if:
      type: basename
      regex: '^lombok-[0-9][A-Za-z0-9._-]*\.jar$'

  - id: lombok-class-namespace
    desc: Project Lombok class namespace
    for: [class, java_class]
    if:
      type: import
      regex: '^lombok/'
