defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: baseline
  conf: 0.98

traits:
  - id: npm-package-name
    desc: Partytown npm package name
    crit: notable
    for: [package.json]
    if:
      type: value
      path: name
      exact: '@builder.io/partytown'
  - id: npm-package-repository
    desc: Partytown npm repository identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: repository.url
      exact: git+https://github.com/BuilderIO/partytown.git
  - id: npm-package-homepage
    desc: Partytown npm homepage identity
    crit: notable
    for: [package.json]
    if:
      type: value
      path: homepage
      exact: https://github.com/BuilderIO/partytown#readme
  - id: archive-package-name
    desc: Partytown npm archive name
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.name
      exact: '@builder.io/partytown'
  - id: archive-package-repository
    desc: Partytown npm archive repository
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.repository.url
      exact: git+https://github.com/BuilderIO/partytown.git
  - id: archive-package-homepage
    desc: Partytown npm archive homepage
    crit: notable
    for: [npm, tar]
    if:
      type: value
      path: npm.homepage
      exact: https://github.com/BuilderIO/partytown#readme
  - id: runtime-basename
    desc: Partytown runtime file basename
    crit: notable
    if:
      type: path
      basename: true
      exact: partytown.js
  - id: runtime-header
    desc: Partytown runtime banner
    crit: notable
    if:
      type: text
      substr: 'MIT builder.io'

composite_rules:
  - id: official-npm-package
    desc: Official Partytown npm package identity
    crit: notable
    for: [package.json]
    all:
      - id: npm-package-name
      - id: npm-package-repository
      - id: npm-package-homepage
  - id: official-npm-archive
    desc: Official Partytown npm archive identity
    crit: notable
    for: [npm, tar]
    all:
      - id: archive-package-name
      - id: archive-package-repository
      - id: archive-package-homepage
  - id: runtime-file
    desc: Partytown runtime implementation file
    crit: notable
    all:
      - id: runtime-basename
      - id: runtime-header
