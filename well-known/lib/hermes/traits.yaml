# Hermes JavaScript engine, published by the Facebook/React Native project.
# This identity is used to distinguish its legitimate bundled native runtime
# files from suspicious native payloads in unrelated npm packages.
defaults:
  platforms: [unix, windows]
  for: [package.json, binaries]

traits:
- id: hermes-package-repository
  desc: Hermes JavaScript engine package repository
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: repository.url
    regex: '(^|/)facebook/hermes(\.git)?$'
- id: hermes-package-name
  desc: Hermes JavaScript engine package name
  crit: notable
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: name
    exact: hermesvm
- id: hermes-binary-banner
  desc: Hermes JavaScript compiler binary marker
  crit: notable
  conf: 0.99
  for: [binaries]
  size_min: 100000
  size_max: 52428800
  if:
    type: text
    exact: Hermes JavaScript compiler

composite_rules:
- id: hermes-runtime
  desc: Hermes JavaScript runtime identity
  crit: notable
  conf: 0.99
  any:
  - id: hermes-package-repository
  - id: hermes-package-name
  - id: hermes-binary-banner
