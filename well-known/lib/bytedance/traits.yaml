# ByteDance's NPTH native runtime includes xCrash's child-process dumper. Its
# LD_PRELOAD string is deliberate crash-dump setup, not linker hijacking.
defaults:
  platforms: [android]
  for: [elf, so]
  crit: notable
  conf: 0.99
  size_min: 1000
  size_max: 10000000

traits:
  - id: npth-library-name
    desc: ByteDance NPTH native library name
    if:
      type: basename
      exact: libnpth.so

  - id: npth-dumper-library-marker
    desc: NPTH crash dumper library marker
    if:
      type: text
      substr: libnpth_dumper.so
      section: .rodata

  - id: xcrash-dumper-marker
    desc: xCrash native dumper marker
    if:
      type: text
      substr: before execve dumper
      section: .rodata

composite_rules:
  - id: npth-crash-dumper-context
    desc: ByteDance NPTH xCrash dumper context
    crit: exception
    conf: 0.99
    all:
      - id: npth-library-name
      - id: npth-dumper-library-marker
      - id: xcrash-dumper-marker
