defaults:
  platforms: [unix, windows]
  size_max: 60000000
traits:
  - id: basename-auth-py
    desc: auth.py basename
    crit: baseline
    conf: 0.95
    for: [python]
    if:
      type: path
      basename: true
      exact: auth.py
  - id: docker-py-auth-marker
    desc: docker-py registry auth helper marker
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: INDEX_URL = f'https://index.{INDEX_NAME}/v1/'
  - id: basename-ray-speedscope-import
    desc: Ray speedscope import bundle basename
    crit: baseline
    conf: 0.95
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '^import\.[A-Za-z0-9]+\.js$'
  - id: ray-speedscope-marker
    desc: Ray dashboard speedscope bundle marker
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: parcelRequire=function
  - id: tk-libtcl-shared-library
    desc: conda Tk Tcl shared library
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: path
      basename: true
      regex: '^libtcl[0-9.]+\.so$'
  - id: basename-mtls-helper
    desc: google-auth mTLS helper basename
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      basename: true
      exact: _mtls_helper.py
  - id: google-auth-mtls-marker
    desc: google-auth mTLS helper marker
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: CERTIFICATE_CONFIGURATION_DEFAULT_PATH
  - id: basename-sphinx-epub-base
    desc: Sphinx EPUB builder basename
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      basename: true
      exact: _epub_base.py
  - id: sphinx-epub-marker
    desc: Sphinx EPUB builder marker
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: epub
  - id: basename-ipython-completer
    desc: IPython completer basename
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      basename: true
      exact: completer.py
  - id: ipython-completer-marker
    desc: IPython completer marker
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: IPCompleter
  - id: basename-jax-k8s-cluster
    desc: JAX Kubernetes cluster helper basename
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      basename: true
      exact: k8s_cluster.py
  - id: jax-k8s-cluster-marker
    desc: JAX Kubernetes cluster helper marker
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: KUBERNETES_SERVICE_HOST
  - id: gevent-conda-outer-archive
    desc: conda gevent outer package archive
    crit: baseline
    conf: 0.98
    for: [conda]
    if:
      type: path
      basename: true
      exact: gevent-26.5.0-py310h914a7a9_0.conda
  - id: gevent-conda-inner-archive
    desc: conda gevent inner package archive
    crit: baseline
    conf: 0.98
    for: [data]
    if:
      type: path
      basename: true
      regex: '^pkg-gevent(-[^\\/]+)?\.tar\.zst$'
  - id: basename-bokeh-min-js
    desc: Bokeh minified server bundle basename
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: path
      basename: true
      exact: bokeh.min.js
  - id: bokeh-server-js-marker
    desc: Bokeh server websocket bundle marker
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: DEFAULT_SERVER_WEBSOCKET_URL
composite_rules:
  - id: docker-py-auth-helper
    desc: conda docker-py auth helper module
    crit: notable
    conf: 0.98
    all:
      - id: basename-auth-py
      - id: docker-py-auth-marker
  - id: ray-dashboard-speedscope-bundle
    desc: conda Ray dashboard speedscope JavaScript bundle
    crit: baseline
    conf: 0.98
    all:
      - id: basename-ray-speedscope-import
      - id: ray-speedscope-marker
  - id: google-auth-mtls-helper
    desc: conda google-auth mTLS helper
    crit: baseline
    conf: 0.98
    all:
      - id: basename-mtls-helper
      - id: google-auth-mtls-marker
  - id: sphinx-epub-builder
    desc: conda Sphinx EPUB builder module
    crit: notable
    conf: 0.98
    all:
      - id: basename-sphinx-epub-base
      - id: sphinx-epub-marker
  - id: ipython-completer-module
    desc: conda IPython completer module
    crit: notable
    conf: 0.98
    all:
      - id: basename-ipython-completer
      - id: ipython-completer-marker
  - id: jax-k8s-cluster-module
    desc: conda JAX Kubernetes cluster helper
    crit: notable
    conf: 0.98
    all:
      - id: basename-jax-k8s-cluster
      - id: jax-k8s-cluster-marker
  - id: gevent-conda-archive
    desc: conda gevent package archive
    crit: notable
    conf: 0.98
    any:
      - id: gevent-conda-outer-archive
      - id: gevent-conda-inner-archive
  - id: bokeh-server-js-bundle
    desc: conda Bokeh server JavaScript bundle
    crit: notable
    conf: 0.98
    all:
      - id: basename-bokeh-min-js
      - id: bokeh-server-js-marker
