# jwt-decode JavaScript library markers. Decoding JWTs is common in browser and
# API clients; malicious intent comes from composites that pair it with config
# targeting or token movement.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: jwt-decode-import
    desc: jwt-decode library import
    crit: notable
    conf: 0.9
    if:
      type: text
      word: "jwt-decode"
