defaults:
  platforms: [macos, linux, windows]
  for: [macho, elf, pe, jar]
  crit: baseline
  conf: 0.98
  size_max: 536870912

traits:
  - id: native-library-basename
    desc: Skiko native library basename
    if:
      type: basename
      regex: '(^|[\\/!])libskiko[-_][^\\/!]*\.(dylib|so|dll)$'

  - id: runtime-jar-basename
    desc: Skiko runtime JAR basename
    if:
      type: basename
      regex: '(^|[\\/!])skiko-[^\\/!]*runtime[^\\/!]*\.jar$'
