defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, npm]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: js-beautify package identity
    if:
      type: value
      path: name
      exact: js-beautify
  - id: package-path
    desc: js-beautify package member path
    if:
      type: path
      regex: '(?i)(^|[/\\])js-beautify([-_.]|[/\\]|$)'
  - id: packer-unpacker-implementation
    desc: js-beautify Packer unpacker implementation
    for: [javascript]
    if:
      type: text
      substr: 'var P_A_C_K_E_R ='

composite_rules:
  - id: package-context
    desc: Recognized js-beautify package context
    crit: exception
    scope: archive
    any:
      - id: package-name
      - id: package-path
      - id: packer-unpacker-implementation
