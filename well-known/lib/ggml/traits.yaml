defaults:
  platforms: [windows, unix]
  for: [c, cpp, javascript, text]

traits:
  - id: ggml-source-path
    desc: ggml native inference source path
    crit: baseline
    conf: 0.95
    if:
      type: path
      regex: '(^|[\\/])(ggml|native_llama[^\\/]*)'

  - id: ggml-source-marker
    desc: ggml native inference source marker
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: ggml

composite_rules:
  - id: ggml-inference-source
    desc: ggml native inference (llama.cpp) source
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: ggml-source-path
      - id: ggml-source-marker
