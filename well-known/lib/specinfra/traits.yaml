defaults:
  platforms: [windows, unix]
  for: [ruby, powershell, gem, tar]
  crit: notable
  conf: 0.95

traits:
  - id: specinfra-library-path
    desc: Specinfra Ruby library path
    if:
      type: path
      regex: 'specinfra(-[0-9][^\\/]*)?|specinfra\.gemspec'
  - id: specinfra-gemspec-name
    desc: Specinfra gemspec package name
    for: [ruby]
    if:
      type: text
      regex: 'spec\.name\s*=\s*["'']specinfra["'']'
