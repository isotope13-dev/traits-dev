defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.96
  size_max: 8388608

traits:
  - id: unicode-data-table
    desc: Symfony Unicode data table
    if:
      type: path
      regex: 'Resources[\\/]unidata[\\/]Regex\\.php$'
  - id: polyfill-namespace
    desc: Symfony Polyfill namespace
    if:
      type: text
      regex: 'namespace\s+.{0,80}Symfony\\Polyfill\\'
  - id: package-doc
    desc: Symfony package doc marker
    if:
      type: text
      substr: "This file is part of the Symfony package."

composite_rules:
  - id: symfony-framework
    desc: Symfony PHP framework component
    crit: notable
    conf: 0.97
    any:
      - id: polyfill-namespace
      - id: unicode-data-table
      - id: package-doc
