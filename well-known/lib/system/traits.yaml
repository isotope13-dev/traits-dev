# The historical `system` npm package bundles a generated CommonJS loader.
# Its loader intentionally creates a local require function and uses Function
# to compile modules while bootstrapping browser bundles.
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.99

traits:
  - id: system-package
    desc: system npm module package metadata
    for: [package.json]
    if:
      type: value
      path: name
      exact: system
  - id: system-browser-loader-marker
    desc: Generated system browser module loader marker
    for: [javascript]
    if:
      type: text
      substr: 'Bundle allows the run-time to'
  - id: system-compiler-marker
    desc: system Function-based module compiler
    for: [javascript]
    if:
      type: text
      substr: 'globalEval = new Function("_", "return eval(_)")'

composite_rules:
  - id: system-browser-loader-bundle
    desc: Generated system browser loader bundle
    crit: notable
    conf: 0.99
    all:
      - id: system-browser-loader-marker
      - id: system-compiler-marker
