defaults:
  size_min: 10000
  platforms: [linux, macos, windows]
traits:
  - id: nlohmann-json-v3-symbol
    desc: Embedded nlohmann::json v3 C++ library
    crit: notable
    conf: 0.88
    for: [macho, elf, pe, dll]
    if:
      type: text
      substr: json_abi_v3_11_3
      section: .rdata
  - id: nlohmann-json-source-header
    desc: nlohmann::json single-header source library
    crit: notable
    conf: 0.95
    for: [c, cpp]
    if:
      type: text
      substr: github.com/nlohmann/json
