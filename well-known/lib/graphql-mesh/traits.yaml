defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  crit: component
  conf: 0.94

traits:
  - id: graphql-mesh-package-name
    desc: GraphQL Mesh package name
    for: [package.json]
    if:
      type: value
      path: name
      regex: '^@graphql-mesh/'

  - id: graphql-mesh-repository
    desc: GraphQL Mesh repository reference
    for: [package.json, json]
    if:
      type: value
      path: repository.url
      substr: ardatan/graphql-mesh

  - id: omnigraph-odata-dependency
    desc: Omnigraph OData dependency
    for: [package.json, json]
    if:
      type: value
      path: dependencies
      substr: '@omnigraph/odata'

  - id: graphql-mesh-odata-transport-code
    desc: GraphQL Mesh OData transport code
    for: [javascript]
    if:
      type: text
      regex: 'processDirectives[\s\S]{0,180}createDefaultExecutor'

composite_rules:
  - id: graphql-mesh-odata-transport-package
    desc: GraphQL Mesh OData transport package
    crit: notable
    conf: 0.98
    all:
      - id: graphql-mesh-package-name
      - id: omnigraph-odata-dependency
    any:
      - id: graphql-mesh-repository
      - id: graphql-mesh-odata-transport-code

