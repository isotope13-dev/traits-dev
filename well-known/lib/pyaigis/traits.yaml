# pyaigis — Zero-dependency Python LLM firewall.
# https://github.com/killertcell428/aigis
#
# Apache 2.0. PyPI package `pyaigis`, Python module `aigis`. Contributes to
# the generic `llm-scanner-context` composite in
# micro-behaviors/data/text/llm/scanner/ so credential / jailbreak / supply-
# chain traits that fire on its pattern database self-suppress.
defaults:
  platforms: [unix, windows]
  for: [python, package.json, pyproject.toml, pkginfo]
  crit: notable
  conf: 0.96
  size_min: 512
  size_max: 524288000

traits:
  - id: pyaigis-package-name
    desc: Package metadata declares pyaigis
    conf: 0.99
    if:
      type: text
      regex: '^Name:\s*pyaigis\s*$'

  - id: pyaigis-import
    desc: Imports the aigis LLM-firewall module
    conf: 0.97
    if:
      type: text
      # Accepts deep imports like `from aigis.safety.loader import` — original
      # regex's `(\.\w+)?` only matched one dotted segment and missed many of
      # the package's own internal cross-imports. Bounded repetition (≤5
      # segments) keeps the engine happy under the nested-quantifier rule.
      regex: '\b(from\s+aigis(\.\w+){0,5}\s+import|import\s+aigis\b)'

  - id: pyaigis-guard-class
    desc: aigis.Guard class usage
    conf: 0.95
    if:
      type: text
      regex: '\baigis\.Guard\s*\(|from\s+aigis\s+import\s+Guard\b'

  - id: pyaigis-self-name
    # Module docstrings in pyaigis frequently self-identify with the
    # capitalized package name "Aigis" — covers pattern-data and scanner-
    # helper files that do not import the aigis module themselves.
    desc: Aigis package self-name reference
    conf: 0.92
    if:
      type: text
      word: Aigis

composite_rules:
  - id: pyaigis-context
    desc: File is part of pyaigis LLM firewall
    any:
      - id: pyaigis-package-name
      - id: pyaigis-import
      - id: pyaigis-guard-class
      - id: pyaigis-self-name
