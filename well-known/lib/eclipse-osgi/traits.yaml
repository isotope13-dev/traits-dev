defaults:
  platforms: [unix, windows]
  for: [jar, class, java_class]
  crit: notable
  conf: 0.99

traits:
  - id: equinox-jar
    desc: Eclipse Equinox OSGi framework JAR
    for: [jar]
    if:
      type: basename
      regex: '^org\.eclipse\.osgi-[0-9][A-Za-z0-9._-]*\.jar$'

  - id: equinox-class-namespace
    desc: Eclipse Equinox OSGi class namespace
    for: [class, java_class]
    if:
      type: import
      regex: '^org/eclipse/osgi/'
