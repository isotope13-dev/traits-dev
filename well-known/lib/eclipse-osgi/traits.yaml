defaults:
  platforms: [unix, windows]
  for: [jar, class, java_class]
  crit: notable
  conf: 0.99

traits:
  - id: eclipse-foundation-team-id
    desc: Eclipse Foundation macOS signing team identifier
    platforms: [macos]
    for: [macho]
    size_min: 10000
    size_max: 100000000
    if:
      type: value
      path: macho.code_signature.team_id
      exact: JCDTMS22B4

  - id: equinox-jar
    desc: Eclipse Equinox OSGi framework JAR
    for: [jar]
    if:
      type: basename
      regex: '^org\.eclipse\.osgi-[0-9][A-Za-z0-9._-]*\.jar$'

  - id: equinox-class-namespace
    desc: Eclipse Equinox OSGi class namespace
    for: [class, java_class]
    if:
      type: import
      regex: '^org/eclipse/osgi/'
