defaults:
  platforms: [macos, linux, windows]
  crit: baseline
  conf: 0.98
  size_max: 536870912

traits:
  - id: source-tree
    desc: Skia graphics library source tree
    crit: notable
    for: [source, c, cpp, shell, python, javascript, text, tar]
    if:
      type: path
      regex: '(^|[\\/])skia([\\/]|$)'

  - id: napi-rs-canvas-native-addon-path
    desc: napi-rs canvas Skia native addon path
    for: [macho, elf, pe]
    if:
      type: path
      regex: '@napi-rs[\\/]canvas.{0,80}\.node$'
  - id: skia-node-addon-basename
    desc: Skia Node native addon basename
    for: [macho, elf, pe]
    if:
      type: path
      basename: true
      regex: '^skia\.[^\\/]*\.node$'

composite_rules:
  - id: node-canvas-native-addon
    desc: Skia-backed Node canvas native addon
    crit: notable
    conf: 0.99
    all:
      - id: metadata/binary/framework::node-api-addon-export
    any:
      - id: napi-rs-canvas-native-addon-path
      - id: skia-node-addon-basename
