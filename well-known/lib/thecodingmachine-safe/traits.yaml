defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.98
  size_max: 5000000

traits:
  - id: safe-namespace
    desc: TheCodingMachine Safe namespace
    if:
      type: text
      regex: 'namespace\s+Safe\s*;'

  - id: safe-zlib-exception
    desc: TheCodingMachine Safe zlib exception
    if:
      type: text
      substr: Safe\Exceptions\ZlibException

composite_rules:
  - id: thecodingmachine-safe-library
    desc: TheCodingMachine Safe generated wrapper library
    crit: notable
    conf: 0.99
    all:
      - id: safe-namespace
      - id: safe-zlib-exception
