defaults:
  platforms: [windows, linux, macos]
  for: [javascript]
traits:
  - id: diff-match-patch-constructor
    desc: Google diff-match-patch constructor
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: function diff_match_patch()
  - id: diff-map-method
    desc: diff-match-patch diff_map method
    crit: component
    conf: 0.9
    if:
      type: text
      substr: diff_map=function
composite_rules:
  - id: diff-match-patch-library
    desc: Google diff-match-patch library
    crit: baseline
    conf: 0.95
    all:
      - id: diff-match-patch-constructor
      - id: diff-map-method
