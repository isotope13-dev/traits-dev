defaults:
  platforms: [windows]
  for: [dll]
  size_min: 4096
  size_max: 2097152

traits:
  - id: easyhook-pdb-path
    desc: EasyHook DLL PDB path
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.debug.pdb.path
      regex: '(?i)[\\/]EasyHook-[0-9.]+[\\/]src[\\/]Release[\\/]x86[\\/]EasyHookDll\.pdb$'

  - id: easyhook32-driver-name
    desc: EasyHook 32-bit driver name
    crit: component
    conf: 0.98
    if:
      type: text
      exact: EasyHook32Drv.sys
      section: .rdata

  - id: easyhook64-driver-name
    desc: EasyHook 64-bit driver name
    crit: component
    conf: 0.98
    if:
      type: text
      exact: EasyHook64Drv.sys
      section: .rdata

  - id: easyhook-install-export
    desc: EasyHook install hook export
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: '^_?LhInstallHook(@[0-9]+)?$'

  - id: easyhook-inject-export
    desc: EasyHook remote injection export
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: '^_?RhInjectLibrary(@[0-9]+)?$'

  - id: easyhook-create-inject-export
    desc: EasyHook create inject export
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: '^_?RhCreateAndInject(@[0-9]+)?$'

composite_rules:
  - id: easyhook-driver-set
    desc: EasyHook driver name set
    crit: component
    conf: 0.98
    needs: 2
    any:
      - id: easyhook32-driver-name
      - id: easyhook64-driver-name

  - id: easyhook-injection-exports
    desc: EasyHook injection exports
    crit: component
    conf: 0.98
    needs: 2
    any:
      - id: easyhook-install-export
      - id: easyhook-inject-export
      - id: easyhook-create-inject-export

  - id: easyhook-library
    desc: EasyHook API hooking library
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: easyhook-pdb-path
      - id: easyhook-driver-set
      - id: easyhook-injection-exports
