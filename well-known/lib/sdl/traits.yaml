defaults:
  platforms: [windows, unix]
  for: [pe, dll, elf, macho]
  crit: component
  conf: 0.98
  size_min: 100000
  size_max: 52428800
traits:
- id: sdl3-dll-basename
  desc: SDL3 runtime library basename
  platforms: [windows]
  for: [dll]
  if:
    type: basename
    exact: SDL3.dll
    case_insensitive: true
- id: sdl-runtime-strings--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'SDL revision:'
- id: sdl-runtime-strings--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'libsdl\.org'
- id: sdl-runtime-strings--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'SDL_APP_(ID|NAME)'
- id: sdl-runtime-strings--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'SDL_VIDEODRIVER'
composite_rules:
- id: sdl-runtime-component
  desc: SDL runtime component
  crit: component
  conf: 0.98
  any:
  - id: sdl3-dll-basename
  - id: sdl-runtime-strings
- id: sdl-runtime-strings
  desc: SDL runtime library strings
  crit: baseline
  conf: 1.0
  any:
  - id: sdl-runtime-strings--rx-1
  - id: sdl-runtime-strings--rx-2
  - id: sdl-runtime-strings--rx-3
  - id: sdl-runtime-strings--rx-4
  needs: 1
