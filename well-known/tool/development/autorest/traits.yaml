defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: notable
  conf: 0.96
  size_max: 10000000

traits:
  # A `package/dist/*.js` path is every npm tarball's build output, not an
  # AutoRest signature — matching it here mislabeled arbitrary packages as
  # AutoRest and, via the `unless:` lists that reference this directory,
  # suppressed detections on any npm dist file. Match AutoRest's actual
  # generated-file header instead, which is emitted verbatim into every file
  # its code generator produces.
  - id: autorest-generated-header
    desc: AutoRest code-generator header comment
    if:
      type: text
      substr: 'Code generated by Microsoft (R) AutoRest'
    crit: notable
