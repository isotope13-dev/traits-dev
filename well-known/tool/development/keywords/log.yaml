defaults:
  platforms:
  - unix
  - windows
  for:
  - scripts
  - binaries
  size_max: 5000000
traits:
- id: hacker-tool-log-marker
  desc: Bracket-star log marker
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: "[*] "
  not:
    - substr: "[*] +"
    - substr: "[*] ("
    - substr: "/[*] ("
  unless:
    - id: metadata/package/testing/presence/harness/
    - type: path
      regex: 'Cython[\\/]TestUtils\.py$'
    - id: metadata/file/extension/identity::c3-source-basename
