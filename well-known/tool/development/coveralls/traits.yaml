defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.96
traits:
  - id: python-api-module-path
    desc: Coveralls Python API module path
    crit: component
    ref: sha256:37d28745b97bdcda16b65959a5e5c03617490c3b43f18210cb48bae640bdd863
    if:
      type: path
      regex: '(^|[\\/])coveralls[\\/]api\.py$'
  - id: jobs-endpoint-fragment
    desc: Coveralls jobs endpoint fragment
    crit: component
    ref: sha256:37d28745b97bdcda16b65959a5e5c03617490c3b43f18210cb48bae640bdd863
    if:
      type: text
      substr: /api/v1/jobs
composite_rules:
  - id: python-client-upload-api
    desc: Coveralls Python upload client
    crit: notable
    conf: 0.96
    all:
      - id: python-api-module-path
      - id: jobs-endpoint-fragment
