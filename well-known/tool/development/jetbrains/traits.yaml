defaults:
  size_max: 52428800
  platforms: [windows, unix]
  for: [pe, elf, macho, json]
traits:
  - id: jetbrains-company-string
    desc: JetBrains company string
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: JetBrains s.r.o.
      section: rsrc
  - id: jetbrains-version-company
    desc: JetBrains PE version company
    crit: baseline
    conf: 0.98
    for: [pe]
    if:
      type: value
      path: pe.version.company
      regex: '^JetBrains( s\.r\.o\.)?$'
  - id: jetbrains-product-info
    desc: JetBrains product descriptor
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: product-info.json
      section: .text
  - id: rider-product-string
    desc: JetBrains Rider product string
    crit: component
    conf: 0.98
    for: [pe]
    if:
      type: text
      exact: JetBrains Rider
      section: rdata
  - id: rider64-filename-string
    desc: rider64.exe filename string
    crit: component
    conf: 0.98
    for: [pe]
    if:
      type: text
      exact: rider64.exe
      section: rdata
  - id: jetbrains-rights-string
    desc: JetBrains company rights string
    crit: component
    conf: 0.96
    for: [pe]
    if:
      type: text
      regex: JetBrains s\.r\.o\. 20\d{2}\. All rights reserved\.
      section: rdata
  - id: debugger-worker-binary
    desc: JetBrains debugger worker binary
    crit: notable
    conf: 0.99
    if:
      type: basename
      regex: '(?i)^JetBrains\.Debugger\.Worker(\.exe)?$'
composite_rules:
  - id: jetbrains-binary
    desc: Binary from JetBrains
    crit: notable
    conf: 0.98
    any:
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/tool/development/jetbrains::jetbrains-version-company
      - id: well-known/tool/development/jetbrains::jetbrains-product-info
  - id: signed-jetbrains-binary
    desc: Verified JetBrains-signed PE
    crit: notable
    conf: 0.99
    all:
      - id: well-known/tool/development/jetbrains::jetbrains-binary
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
    any:
      - id: metadata/signed/developer::jetbrains-s.r.o.
      - id: metadata/signed/leaf::jetbrains-s.r.o.
  - id: rider-version-identity
    desc: JetBrains Rider version identity
    crit: suspicious
    conf: 0.97
    for: [pe]
    all:
      - id: well-known/tool/development/jetbrains::rider-product-string
      - id: well-known/tool/development/jetbrains::rider64-filename-string
    any:
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/tool/development/jetbrains::jetbrains-rights-string
    near_bytes: 512
