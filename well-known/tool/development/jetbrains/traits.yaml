defaults:
  size_max: 52428800
  platforms: [windows, unix]
  for:
    - binaries
    - manifests
traits:
  - id: jetbrains-company-string
    desc: JetBrains company string
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: JetBrains s.r.o.
      section: .rsrc
  - id: jetbrains-product-info
    desc: JetBrains product descriptor
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: product-info.json
      section: .text
  - id: rider-product-string
    desc: JetBrains Rider product string
    crit: component
    conf: 0.98
    for: [pe]
    if:
      type: text
      exact: JetBrains Rider
  - id: rider64-filename-string
    desc: rider64.exe filename string
    crit: component
    conf: 0.98
    for: [pe]
    if:
      type: text
      exact: rider64.exe
  - id: jetbrains-rights-string
    desc: JetBrains company rights string
    crit: component
    conf: 0.96
    for: [pe]
    if:
      type: text
      regex: JetBrains s\.r\.o\. 20\d{2}\. All rights reserved\.
composite_rules:
  - id: jetbrains-binary
    desc: Binary from JetBrains
    crit: notable
    conf: 0.98
    any:
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/tool/development/jetbrains::jetbrains-product-info
  - id: signed-jetbrains-binary
    desc: Signed JetBrains binary
    crit: baseline
    conf: 0.99
    all:
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: metadata/signed/developer::jetbrains-s.r.o.
  - id: rider-version-identity
    desc: JetBrains Rider version identity
    crit: suspicious
    conf: 0.97
    for: [pe]
    all:
      - id: well-known/tool/development/jetbrains::rider-product-string
      - id: well-known/tool/development/jetbrains::rider64-filename-string
    any:
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/tool/development/jetbrains::jetbrains-rights-string
    near_bytes: 512
