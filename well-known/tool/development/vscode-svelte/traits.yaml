defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.96
  size_max: 16777216

traits:
  - id: svelte-node-modules
    desc: Svelte extension node modules
    if:
      type: basename
      substr: extension/node_modules/svelte
  - id: vscode-node-modules
    desc: VS Code extension support modules
    if:
      type: basename
      regex: '(^|[\\/])extension[\\/]node_modules[\\/](@?vscode|typescript|prettier)'
  - id: parser-node-modules
    desc: Svelte extension parser modules
    if:
      type: basename
      regex: '(^|[\\/])extension[\\/]node_modules[\\/](acorn|jsonc-parser|css-tree)'
  - id: utility-node-modules
    desc: Svelte extension utility modules
    if:
      type: basename
      regex: '(^|[\\/])extension[\\/]node_modules[\\/](lodash|emmet|@emmetio)'

composite_rules:
  - id: extension-bundle
    desc: Svelte VS Code extension bundle
    any:
      - id: svelte-node-modules
      - id: vscode-node-modules
      - id: parser-node-modules
      - id: utility-node-modules
