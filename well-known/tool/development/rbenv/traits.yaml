# rbenv's bundled RubyGems plugin legitimately registers post-install and
# post-uninstall callbacks and uses class_eval to wrap Bundler.  This identity
# is specific to the gem-rehash integration and is used only as benign context.
defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
  conf: 0.99

traits:
  - id: rbenv-gem-rehash-plugin-path
    desc: rbenv gem-rehash plugin path
    if:
      type: basename
      exact: rubygems_plugin.rb

  - id: rbenv-gem-rehash-marker
    desc: rbenv gem-rehash callback marker
    if:
      type: text
      regex: '(?i)Gem\.post_install|Gem\.post_uninstall|rbenv\s+rehash'

composite_rules:
  - id: rbenv-gem-rehash-plugin-context
    desc: rbenv RubyGems gem-rehash plugin context
    crit: exception
    conf: 0.99
    all:
      - id: rbenv-gem-rehash-plugin-path
      - id: rbenv-gem-rehash-marker
