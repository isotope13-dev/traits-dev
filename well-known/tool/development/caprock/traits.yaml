defaults:
  platforms: [unix, windows]
  for: [pkginfo, python, whl]

traits:
  - id: caprock-package-name
    desc: Caprock package metadata identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: caprock

  - id: caprock-source-path
    desc: Caprock Python source path
    crit: component
    conf: 0.99
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])caprock[\\/]'

composite_rules:
  - id: caprock-source-context
    desc: Caprock source package context
    crit: notable
    conf: 0.99
    for: [pkginfo, python]
    scope: outer
    all:
      - id: caprock-package-name
      - id: caprock-source-path
