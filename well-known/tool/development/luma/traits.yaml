defaults:
  platforms: [unix, windows]
  for: [pkginfo, whl]
  crit: baseline
  conf: 0.99

traits:
  - id: package-name
    desc: Luma infrastructure Python package name
    crit: notable
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: luma-infra
  - id: repository
    desc: Luma infrastructure GitHub repository metadata
    crit: notable
    for: [pkginfo]
    if:
      type: value
      path: project-url
      substr: github.com/LiuTianjie/luma
  - id: archive-name
    desc: Luma infrastructure wheel archive name
    crit: notable
    for: [whl]
    if:
      type: path
      basename: true
      regex: '^luma[_-]infra-[0-9]+\.[0-9]+\.[0-9]+-py3-none-any\.whl$'
  - id: archive-member
    desc: Luma infrastructure wheel member
    crit: notable
    conf: 0.99
    for: [python, javascript]
    size_max: 50000000
    if:
      type: path
      regex: '(^|[\\/])luma[\\/]'
