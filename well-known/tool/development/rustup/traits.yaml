defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: notable
  conf: 0.99

traits:
  - id: rustup-installer-path
    desc: Rustup bootstrap installer script path
    if:
      type: basename
      exact: rustup-init.sh

  - id: rustup-installer-source-url
    desc: Rustup official distribution root URL
    if:
      type: text
      substr: static.rust-lang.org/rustup

  - id: rustup-loongarch-probe
    desc: Rustup LoongArch ABI compatibility probe
    if:
      type: text
      substr: check_loongarch_uapi

composite_rules:
  - id: rustup-installer
    desc: Rustup bootstrap installer with platform compatibility probe
    crit: exception
    conf: 0.99
    all:
      - id: rustup-installer-path
      - id: rustup-installer-source-url
      - id: rustup-loongarch-probe
