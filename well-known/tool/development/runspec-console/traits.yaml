defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98
  size_max: 104857600

traits:
  - id: runspec-console-path
    desc: RunSpec console package path
    for: [whl, python, javascript, shell]
    if:
      type: path
      regex: '(^|[^A-Za-z0-9_])runspec_console([\\/]|-|$)'
  - id: runspec-console-basename
    desc: RunSpec console package basename
    for: [archive, whl]
    if:
      type: basename
      regex: '^runspec_console-[0-9].*\.whl$'

composite_rules:
  - id: runspec-console-context
    desc: RunSpec console context
    crit: baseline
    conf: 0.98
    any:
      - id: runspec-console-path
      - id: runspec-console-basename
