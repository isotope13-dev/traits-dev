# Sentry's Rust command-line client is a legitimate developer/build tool.
# Require both its embedded command marker and its user-facing help text so
# a binary merely named "sentry-cli" does not receive this identity.
defaults:
  platforms: [macos, linux, windows]
  for: [macho, elf, pe]
  crit: notable
  conf: 0.98
  size_min: 1000000
  size_max: 100000000

traits:
  - id: sentry-cli-command-namespace
    desc: Sentry CLI command namespace text
    crit: component
    if:
      type: raw
      section: __TEXT,__const
      substr: sentry_cli::commands::issues

  - id: sentry-cli-help-text
    desc: Sentry CLI command utility help text
    crit: component
    if:
      type: raw
      section: __TEXT,__const
      substr: "Command line utility for Sentry."

composite_rules:
  - id: sentry-cli
    desc: Sentry command-line client
    crit: notable
    conf: 0.98
    all:
      - id: sentry-cli-command-namespace
      - id: sentry-cli-help-text
