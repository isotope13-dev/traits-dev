defaults:
  platforms:
  - unix
  - windows
  for:
  - shell
  - python
  - ruby
  - javascript
  crit: baseline
  size_max: 5000000
traits:
- id: jq-processing
  desc: Uses jq for JSON processing
  if:
    type: string_literal
    word: jq
- id: sed-processing
  desc: Uses sed for text processing
  if:
    type: string_literal
    word: sed
- id: awk-processing
  desc: Uses awk for text processing
  if:
    type: string_literal
    word: awk
