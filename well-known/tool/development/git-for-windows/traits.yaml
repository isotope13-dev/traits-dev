defaults:
  platforms: [windows]
  for: [pe, zip]
  crit: notable
  conf: 0.96
  size_max: 5000000
traits:
  - id: mingit-distribution-archive
    desc: Git for Windows MinGit archive
    for: [zip]
    size_max: 209715200
    if:
      type: basename
      regex: "(?i)MinGit-[0-9][^\\/]*\\.(zip|7z)$"
  - id: mingit-gcmcore-dll
    desc: Git for Windows GCM Core DLL
    for: [pe]
    if:
      type: path
      regex: "(?i)mingw(32|64)/bin/gcmcore\\.dll$"
  - id: mingit-github-dll
    desc: Git for Windows GitHub DLL
    for: [pe]
    if:
      type: path
      regex: "(?i)mingw(32|64)/bin/GitHub\\.dll$"
  - id: mingit-openssl-legacy-provider
    desc: Git for Windows OpenSSL legacy provider
    for: [pe]
    if:
      type: path
      regex: "(?i)ossl-modules/legacy\\.dll$"
