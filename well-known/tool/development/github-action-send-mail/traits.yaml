defaults:
  platforms: [unix, windows]
  for: [javascript, json]
traits:
  - id: action-pack-send-mail-package
    desc: action-pack-send-mail package marker
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: action-pack-send-mail
  - id: nodemailer-marker
    desc: Imports or declares the Nodemailer package
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\b(from|require)\b.{0,24}nodemailer|nodemailer.{0,24}:'
composite_rules:
  - id: nodemailer-action-inputs
    desc: Nodemailer GitHub Action inputs
    crit: notable
    conf: 0.95
    all:
      - id: nodemailer-marker
      - id: micro-behaviors/communications/email/send/smtp::smtp-connection-input-field
  - id: github-action-send-mail-context
    desc: GitHub Action send-mail wrapper
    crit: notable
    conf: 0.96
    all:
      - id: nodemailer-action-inputs
    any:
      - id: action-pack-send-mail-package
      - id: metadata/library/github-actions::actions-sdk
