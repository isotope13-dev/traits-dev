defaults:
  platforms: [unix, windows]
  for: [javascript, json]
traits:
  - id: action-pack-send-mail-package
    desc: action-pack-send-mail package marker
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: action-pack-send-mail
  - id: nodemailer-marker
    desc: Nodemailer marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: nodemailer
  - id: smtp-marker
    desc: SMTP marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: smtp
composite_rules:
  - id: nodemailer-action-inputs
    desc: Nodemailer GitHub Action inputs
    crit: baseline
    conf: 0.95
    any:
      - id: nodemailer-marker
      - id: smtp-marker
  - id: github-action-send-mail-context
    desc: GitHub Action send-mail wrapper
    crit: baseline
    conf: 0.96
    all:
      - id: nodemailer-action-inputs
    any:
      - id: action-pack-send-mail-package
      - id: metadata/library/github-actions::actions-sdk
