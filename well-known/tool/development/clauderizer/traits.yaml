defaults:
  platforms: [unix, windows]
  for: [whl]
  crit: notable
  conf: 0.98

traits:
  - id: package-name
    desc: Clauderizer Python wheel package
    if:
      type: value
      path: whl.distribution
      exact: clauderizer

  - id: hosttargets-module
    desc: Clauderizer AI host integration module
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)clauderizer/hosttargets\.py$'

  - id: mcp-server-module
    desc: Clauderizer MCP server module
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)clauderizer/mcp_server\.py$'

  - id: hook-dispatch-module
    desc: Clauderizer AI-agent hook dispatch module
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)clauderizer/hook/dispatch\.py$'

  - id: clauderize-entrypoint
    desc: Clauderizer clauderize command-line entrypoint
    for: [text]
    if:
      type: text
      regex: '(?m)^clauderize\s*=\s*clauderizer\.cli:main\s*$'

  - id: clauderizer-entrypoint
    desc: Clauderizer clauderizer command-line entrypoint
    for: [text]
    if:
      type: text
      regex: '(?m)^clauderizer\s*=\s*clauderizer\.cli:main\s*$'

  - id: clauderizer-hook-entrypoint
    desc: Clauderizer agent-hook entrypoint
    for: [text]
    if:
      type: text
      regex: '(?m)^clauderizer-hook\s*=\s*clauderizer\.hook\.dispatch:main\s*$'

  - id: clauderizer-mcp-entrypoint
    desc: Clauderizer MCP server entrypoint
    for: [text]
    if:
      type: text
      regex: '(?m)^clauderizer-mcp\s*=\s*clauderizer\.mcp_server:main\s*$'

composite_rules:
  - id: clauderizer-package
    desc: Clauderizer AI-agent working-memory and integration tool wheel
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: package-name
    any:
      - id: hosttargets-module
      - id: mcp-server-module
      - id: hook-dispatch-module
      - id: clauderize-entrypoint
      - id: clauderizer-entrypoint
      - id: clauderizer-hook-entrypoint
      - id: clauderizer-mcp-entrypoint
    needs: 1
