defaults:
  platforms: [unix, windows]
  for: [whl]
  crit: notable
  conf: 0.98

traits:
  - id: package-name
    desc: Clauderizer Python wheel package
    if:
      type: value
      path: whl.distribution
      exact: clauderizer

  - id: hosttargets-module
    desc: Clauderizer AI host integration module
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)clauderizer/hosttargets\.py$'

  - id: mcp-server-module
    desc: Clauderizer MCP server module
    if:
      type: value
      path: archive.members[*].path
      regex: '(^|/)clauderizer/mcp_server\.py$'

composite_rules:
  - id: clauderizer-package
    desc: Clauderizer AI-agent memory tool wheel
    crit: notable
    conf: 0.99
    scope: archive
    all:
      - id: package-name
    any:
      - id: hosttargets-module
      - id: mcp-server-module
    needs: 1
