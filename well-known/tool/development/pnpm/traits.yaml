defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, npm, tar]
  crit: notable
  conf: 0.98

traits:
  - id: official-pnpm-package-name
    desc: Official pnpm package name
    for: [package.json]
    if:
      type: value
      path: name
      exact: pnpm
composite_rules:
  - id: official-pnpm-package-archive
    desc: Official pnpm package archive identity
    crit: notable
    conf: 0.98
    for: [archives]
    scope: archive
    all:
      - id: official-pnpm-package-name
      - id: metadata/package/files/included::package-json-basename
