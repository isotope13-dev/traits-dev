defaults:
  platforms: [windows]
  for: [vbs]
  crit: notable
  conf: 0.99

traits:
  - id: run-hidden-wrapper-path
    desc: Agents Live hidden WSH wrapper path
    if:
      type: path
      regex: '(^|[\\/])agents_live[\\/]run-hidden\.vbs$'

  - id: run-hidden-task-scheduler-documentation
    desc: Agents Live WSL task-scheduler documentation
    if:
      type: text
      substr: 'Used by Windows Task Scheduler to launch wsl.exe silently.'

composite_rules:
  - id: run-hidden-wrapper-tool
    desc: Agents Live documented WSH task-scheduler wrapper
    crit: exception
    conf: 0.99
    all:
      - id: run-hidden-wrapper-path
      - id: run-hidden-task-scheduler-documentation
