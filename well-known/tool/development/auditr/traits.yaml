defaults:
  platforms: [windows, linux, macos]
  for: [whl, python, pyc]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 150000000

traits:
  - id: package-name
    desc: Auditr package name metadata
    for: [whl]
    if:
      type: text
      regex: '(?m)^Name:\s*auditr\s*$'
  - id: auditor-summary
    desc: Auditr deterministic auditor summary
    for: [whl]
    if:
      type: text
      substr: A deterministic codebase auditor
  - id: malware-scanner-module
    desc: Auditr malware scanner module
    for: [python, pyc]
    if:
      type: path
      regex: 'malware[\\/]install\.pyc?$'
  - id: self-update-module
    desc: Auditr self-update module
    for: [python, pyc]
    if:
      type: path
      regex: 'cli[\\/]self_update\.pyc?$'
  - id: local-report-server-module
    desc: Auditr local report server module
    for: [python, pyc]
    if:
      type: path
      regex: 'auditr[\\/].{0,16}serve\.pyc?$'
