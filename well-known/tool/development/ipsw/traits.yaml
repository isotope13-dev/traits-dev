defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98
  size_max: 200000000

traits:
  - id: ipsw-package-context
    desc: IPSW tool package context
    for: [archives, binaries]
    if:
      type: path
      substr: pkg-ipsw
  - id: ipsw-binary-basename
    desc: IPSW CLI binary basename
    for: [elf, macho, pe]
    if:
      type: basename
      exact: ipsw
