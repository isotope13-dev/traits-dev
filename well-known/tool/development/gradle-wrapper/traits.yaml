defaults:
  platforms: [unix, windows]
  for: [shell, batch]
  crit: baseline
  conf: 0.96
traits:
  - id: unix-gradle-wrapper
    desc: Gradle Unix wrapper script
    for: [shell]
    if:
      type: text
      substr: 'Gradle start up script for UN*X'
  - id: windows-gradle-wrapper
    desc: Gradle Windows wrapper script
    for: [batch]
    if:
      type: text
      substr: 'Gradle startup script for Windows'
composite_rules:
  - id: gradle-wrapper-script
    desc: Gradle wrapper script
    crit: notable
    conf: 0.98
    any:
      - id: unix-gradle-wrapper
      - id: windows-gradle-wrapper
