# Yarn package manager — bundled CLI marker (benign).
# Used as a false-positive exclusion for parent-process-verification composites.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: yarn-cli-bundle-marker
    desc: Bundled Yarn CLI marker
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "explicit version specifier from the Yarn CLI"
