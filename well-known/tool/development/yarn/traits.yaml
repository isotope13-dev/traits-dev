defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  size_max: 10000000
traits:
- id: yarn-cli-explicit-version-marker
  desc: Yarn CLI explicit version marker
  crit: baseline
  conf: 1.0
  if:
    type: text
    substr: explicit version specifier from the Yarn CLI
- id: yarn-registry-constant
  desc: Yarn registry constant
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: YARN_REGISTRY

composite_rules:
- id: yarn-cli-bundle-marker
  desc: Bundled Yarn CLI marker
  crit: notable
  conf: 0.98
  any:
  - id: yarn-cli-explicit-version-marker
  - id: metadata/file/invisible-unicode::yarn-standalone-bundle-filename
  - id: yarn-registry-constant
