defaults:
  platforms: [unix, windows]
  for: [php]
  crit: baseline
  conf: 0.96

traits:
  - id: composer-phar-name
    desc: Composer PHAR filename
    if:
      type: path
      basename: true
      exact: composer.phar
  - id: composer-console-namespace
    desc: Composer console namespace
    if:
      type: text
      substr: 'namespace Composer\Console;'
  - id: composer-env-handling
    desc: Composer environment variable handling
    if:
      type: text
      substr: COMPOSER_HOME

composite_rules:
  - id: composer-phar-cli
    desc: Composer PHAR CLI application
    crit: component
    all:
      - id: composer-phar-name
      - id: composer-console-namespace
      - id: composer-env-handling
