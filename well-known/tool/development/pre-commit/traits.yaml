# pre-commit ships a deliberately empty placeholder gemspec so hook language
# environments can resolve a package name.  Its 0.0.0 version is not a
# dependency-confusion signal.
defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
  conf: 0.99

traits:
  - id: pre-commit-placeholder-gemspec-name
    desc: pre-commit placeholder gem name
    if:
      type: text
      substr: pre_commit_placeholder_package

  - id: pre-commit-placeholder-gemspec-summary
    desc: pre-commit placeholder gem summary
    if:
      type: text
      substr: placeholder gem for pre-commit hooks

composite_rules:
  - id: pre-commit-placeholder-gemspec-context
    desc: pre-commit placeholder gemspec context
    crit: exception
    conf: 0.99
    all:
      - id: pre-commit-placeholder-gemspec-name
      - id: pre-commit-placeholder-gemspec-summary
