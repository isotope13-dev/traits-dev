defaults:
  platforms: [unix, windows]
  for: [package-lock.json]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 50000000

traits:
  - id: microsoft-vscode-ado-npm-feed
    desc: Microsoft VSCode Azure DevOps npm feed
    if:
      type: value
      path: packages.*.resolved
      regex: '^https?://pkgs\.dev\.azure\.com/monacotools/Monaco/_packaging/vscode/npm/registry/'
