defaults:
  platforms: [unix, windows]
  for: [elf, shell, c, cpp, archives]

traits:
  - id: patchelf-test-fixture
    desc: Patchelf upstream test fixture path
    crit: notable
    conf: 1.0
    size_min: 1
    size_max: 100000000
    if:
      type: path
      regex: 'patchelf-[0-9]+\.[0-9]+\.[0-9]+[\\/]tests[\\/]'
