defaults:
  platforms: [unix, windows]
  for: [pkginfo, python, whl]

traits:
  - id: shibaclaw-package-name
    desc: ShibaClaw package metadata identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: shibaclaw

  - id: shibaclaw-source-path
    desc: ShibaClaw Python source path
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])shibaclaw[\\/]'

  - id: shibaclaw-updater-installer-url
    desc: ShibaClaw updater installer URL constant
    crit: notable
    conf: 0.99
    for: [python]
    if:
      type: symbol
      kind: identifier
      exact: INSTALLER_URL

composite_rules:
  - id: shibaclaw-official-release-updater-context
    desc: Official ShibaClaw release updater context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: shibaclaw-source-path
      - id: shibaclaw-updater-installer-url
