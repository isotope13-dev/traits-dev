defaults:
  platforms: [windows, unix]
  for: [zip, javascript, chrome-manifest]
  crit: baseline
  conf: 0.95
  size_min: 4096
  size_max: 67108864

traits:
  - id: extension-id
    desc: Firebug extension identifier
    if:
      type: text
      substr: firebug@software.joehewitt.com

  - id: content-root
    desc: Firebug content tree marker
    if:
      type: text
      substr: content/firebug/

  - id: pref-domain
    desc: Firebug preference domain
    if:
      type: text
      substr: extensions.firebug

  - id: lib-js-xpcom-utils
    desc: Firebug XPCOM utils marker
    if:
      type: text
      substr: fbXPCOMUtils

  - id: lib-js-debugger-service
    desc: Firebug debugger service marker
    if:
      type: text
      substr: jsdIDebuggerService

  - id: lib-js-service-id
    desc: Firebug service identifier marker
    if:
      type: text
      substr: '@joehewitt.com/firebug;1'

composite_rules:
  - id: firefox-devtools-extension
    desc: Firebug Firefox developer tool
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: well-known/tool/development/firebug
