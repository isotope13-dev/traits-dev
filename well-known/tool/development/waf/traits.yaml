defaults:
  platforms: [unix, windows]
  for: [python]
  size_min: 100
  size_max: 100000000

traits:
  - id: waf-author-marker
    desc: Waf author source marker
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: 'Thomas Nagy'
  - id: waf-pickle-command-decode
    desc: Waf pickled command decode
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: 'cPickle\.loads\s*\(\s*base64\.b64decode\s*\(\s*txt\s*\)\s*\)'
  - id: waf-subprocess-command-worker
    desc: Waf subprocess command worker
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: 'subprocess\.Popen\s*\(\s*cmd'

composite_rules:
  - id: waf-serialized-command-worker
    desc: Waf serialized command worker source
    crit: notable
    conf: 0.99
    all:
      - id: waf-author-marker
      - id: waf-pickle-command-decode
      - id: waf-subprocess-command-worker
    near_lines: 60
