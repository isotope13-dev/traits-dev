defaults:
  platforms: [unix]
  for: [elf, macho]
  size_max: 200000000

traits:
  - id: swiftlint-main-symbol
    desc: SwiftLint main entry symbol
    crit: notable
    conf: 0.96
    if:
      type: symbol
      exact: swiftlint_main

  - id: swiftlint-framework-symbol
    desc: SwiftLint framework symbol
    crit: notable
    conf: 0.96
    if:
      type: symbol
      regex: SwiftLintFramework

  - id: swiftlint-framework-rodata
    desc: SwiftLint framework rodata string
    crit: notable
    conf: 0.96
    for: [elf]
    if:
      type: text
      substr: SwiftLintFramework
      section: .rodata

  - id: swiftlint-framework-cstring
    desc: SwiftLint framework cstring
    crit: notable
    conf: 0.96
    for: [macho]
    if:
      type: text
      substr: SwiftLintFramework
      section: __TEXT.__cstring

  - id: swiftlint-disable-rule-symbol
    desc: SwiftLint disable-rule symbol
    crit: notable
    conf: 0.96
    if:
      type: symbol
      regex: SuperfluousDisableCommandRule

  - id: swiftlint-disable-rule-rodata
    desc: SwiftLint disable-rule rodata string
    crit: notable
    conf: 0.96
    for: [elf]
    if:
      type: text
      substr: SuperfluousDisableCommandRule
      section: .rodata

composite_rules:
  - id: swiftlint-framework-marker
    desc: SwiftLint framework marker
    crit: notable
    conf: 0.97
    any:
      - id: swiftlint-framework-symbol
      - id: swiftlint-framework-rodata
      - id: swiftlint-framework-cstring

  - id: swiftlint-release-binary
    desc: SwiftLint release binary
    crit: notable
    conf: 0.98
    all:
      - id: swiftlint-framework-marker
      - id: swiftlint-disable-rule-marker

  - id: swiftlint-disable-rule-marker
    desc: SwiftLint disable-rule marker
    crit: notable
    conf: 0.97
    any:
      - id: swiftlint-disable-rule-symbol
      - id: swiftlint-disable-rule-rodata
