defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho]
  crit: baseline
  conf: 0.95
  size_min: 65536
  size_max: 1073741824

traits:
  - id: qemu-version-banner
    desc: QEMU version banner string
    if:
      type: text
      section: rodata
      regex: '\bqemu-[a-z][a-z0-9_]{1,16}\s+version\s+\d'
  - id: qemu-is-aligned-macro
    desc: QEMU_IS_ALIGNED assertion macro
    if:
      type: text
      section: rodata
      substr: QEMU_IS_ALIGNED
  - id: qemu-core-system-export
    desc: QEMU core system export
    crit: notable
    if:
      type: symbol
      exact: qemu_init_subsystems
  - id: qemu-qmp-export
    desc: QEMU QMP command export
    crit: notable
    if:
      type: symbol
      exact: qmp_marshal_query_vnc
  - id: qemu-riscv-export
    desc: QEMU RISC-V CPU export
    crit: notable
    if:
      type: symbol
      exact: riscv_cpu_finalize_features

composite_rules:
  - id: qemu-system-emulator
    desc: Recognized QEMU system emulator
    crit: exception
    conf: 0.99
    all:
      - id: qemu-core-system-export
      - id: qemu-qmp-export
