defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho]
  crit: baseline
  conf: 0.95

traits:
  - id: qemu-version-banner
    desc: QEMU version banner string
    if:
      type: text
      regex: 'qemu-(aarch64|arm|x86_64|i386|mips|mipsel|ppc|ppc64|riscv32|riscv64|s390x|sparc|sparc64|hppa|alpha|m68k|sh4|microblaze|nios2|or1k|xtensa|cris)\s+version\s+\d'
  - id: qemu-is-aligned-macro
    desc: QEMU_IS_ALIGNED assertion macro
    if:
      type: text
      substr: QEMU_IS_ALIGNED

composite_rules:
  - id: qemu-emulator-binary
    desc: QEMU emulator binary
    crit: baseline
    conf: 0.97
    any:
      - id: qemu-version-banner
      - id: qemu-is-aligned-macro
