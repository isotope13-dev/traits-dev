defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho]
  crit: baseline
  conf: 0.95
  size_min: 65536
  size_max: 1073741824

traits:
  - id: qemu-version-banner
    desc: QEMU version banner string
    if:
      type: text
      section: rodata
      regex: '\bqemu-[a-z][a-z0-9_]{1,16}\s+version\s+\d'
  - id: qemu-is-aligned-macro
    desc: QEMU_IS_ALIGNED assertion macro
    if:
      type: text
      section: rodata
      substr: QEMU_IS_ALIGNED
