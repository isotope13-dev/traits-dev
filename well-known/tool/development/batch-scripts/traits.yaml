defaults:
  platforms: [unix, windows]
  for: [batch]
  size_max: 1000000
traits:
  - id: batch-scripts-iexpress-example-path
    desc: batch.scripts IExpress hybrid example path
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: '(?i)iexpress[\\/](hidder|bat2exeIEXP|iexpYNButton)\.bat$'
  - id: batch-scripts-bat2exe-example-name
    desc: batch.scripts Bat2Exe example basename
    crit: notable
    conf: 0.98
    if:
      type: path
      basename: true
      exact: Bat2Exe 1.0.bat
  - id: batch-scripts-iexpress-example-name
    desc: batch.scripts IExpress hybrid example basename
    crit: notable
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '(?i)^(hidder|bat2exeIEXP|iexpYNButton)\.bat$'
  - id: windows11-scripts-admx-name-comment
    desc: Windows11 tweak script basename context
    crit: notable
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '(?i)^((Minimal|Standard|Expert)_Install|Windows11Tweaks)\.bat$'
  - id: everythingportable-launcher-path
    desc: EverythingPortable launcher batch path
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: '(?i)[\\/]EverythingPortable[\\/]launch_[a-z0-9_]+\.bat$'
  - id: everythingportable-launcher-title
    desc: EverythingPortable portable launcher title
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)Portable [A-Za-z0-9+_. -]+ Launcher - Helper Edition'
  - id: undeletable-dir-example-path
    desc: Undeletable directory example batch path
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: '(?i)[\\/]undeletable-dirs-on-desktop[\\/]script\.bat$'
  - id: pytorch-ci-sevenzip-installer
    desc: PyTorch CI 7-Zip installer batch
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: sourceforge.net/projects/sevenzip/files/7-Zip/
  - id: uup-converter-wimlib-batch
    desc: UUP converter wimlib batch script
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: '(?i)[\\/]uup-converter-wimlib[\\/]convert-UUP\.cmd$'
