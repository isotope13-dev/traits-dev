defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - package.json
    - npm
  size_max: 8000000

traits:
  - id: socket-dev-cli-package-name
    desc: Socket.dev CLI package name
    crit: component
    conf: 0.96
    for:
      - package.json
    if:
      type: value
      path: name
      exact: socket

  - id: socket-dev-cli-package-description
    desc: Socket.dev CLI package description
    crit: component
    conf: 0.96
    for:
      - package.json
    if:
      type: value
      path: description
      exact: CLI for Socket.dev

  - id: socket-dev-cli-bundle-registry
    desc: Socket.dev registry bundle marker
    crit: notable
    conf: 0.94
    for:
      - javascript
    if:
      type: text
      substr: "@socketsecurity/registry"

  - id: socket-dev-cli-bundle-domain
    desc: Socket.dev domain bundle marker
    crit: notable
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      substr: "socket.dev"

  - id: socket-dev-cli-bundle-title
    desc: Socket.dev title bundle marker
    crit: notable
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      substr: "Socket.dev"

  - id: socket-dev-cli-vendored-path
    desc: Socket.dev CLI vendored dependency path
    crit: notable
    conf: 0.92
    for:
      - javascript
    if:
      type: path
      regex: '@socketsecurity[\\/]registry'

composite_rules:
  - id: socket-dev-cli-package
    desc: Socket.dev CLI package metadata
    crit: notable
    conf: 0.96
    all:
      - id: socket-dev-cli-package-name
      - id: socket-dev-cli-package-description

  - id: socket-dev-cli-bundle
    desc: Socket.dev CLI bundled code
    crit: notable
    conf: 0.94
    any:
      - id: socket-dev-cli-bundle-registry
      - id: socket-dev-cli-bundle-domain
      - id: socket-dev-cli-bundle-title
