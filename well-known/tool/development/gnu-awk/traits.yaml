defaults:
  platforms: [linux]
  for: [elf]
  crit: notable
  conf: 0.98
  size_min: 100000
  size_max: 20000000

traits:
  - id: gawk-basename
    desc: GNU Awk executable basename
    if:
      type: basename
      exact: gawk

  - id: gawk-version-string
    desc: GNU Awk version string
    if:
      type: text
      section: .rodata
      regex: 'GNU Awk [0-9]+\.[0-9]+'

composite_rules:
  - id: gawk-binary
    desc: GNU Awk executable identity
    crit: notable
    conf: 0.99
    all:
      - id: gawk-basename
      - id: gawk-version-string
