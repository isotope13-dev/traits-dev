defaults:
  platforms: [unix, windows]
  for: [python, javascript, package.json, pkginfo, archives]

traits:
- id: package-context
  desc: pymobiledevice3 package context
  crit: baseline
  conf: 0.99
  if:
    type: path
    substr: pymobiledevice3
- id: package-archive
  desc: pymobiledevice3 package archive
  crit: baseline
  conf: 0.99
  for: [whl, zip, tar]
  if:
    type: path
    basename: true
    substr: pymobiledevice3-
