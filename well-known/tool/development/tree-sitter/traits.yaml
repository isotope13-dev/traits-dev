defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, so, dylib]
  crit: notable
  conf: 0.9
  size_min: 4096
  size_max: 50000000
traits:
  - id: cli-basename
    desc: Tree-sitter CLI basename
    if:
      type: basename
      exact: tree-sitter
  - id: allocator-export
    desc: Tree-sitter allocator export
    for: [elf, macho, dll, so, dylib]
    if:
      type: export
      regex: '^ts_current_(malloc|calloc|realloc|free)$'
composite_rules:
  - id: tree-sitter-cli-binary
    desc: Tree-sitter CLI binary
    all:
      - id: cli-basename
      - id: allocator-export
