defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.98
  size_min: 1000000
  size_max: 15000000

traits:
  - id: fzf-binary-basename
    desc: fzf Windows executable basename
    if:
      type: basename
      exact: fzf.exe
      case_insensitive: true

  - id: fzf-go-module
    desc: fzf Go module path
    if:
      type: text
      exact: github.com/junegunn/fzf/src
      section: .rdata

composite_rules:
  - id: fzf-binary
    desc: fzf Windows binary
    crit: notable
    conf: 0.99
    all:
      - id: fzf-binary-basename
      - id: fzf-go-module
