# Megabrain local code-intelligence CLI/library identity.
defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Megabrain package metadata identity
    if:
      type: value
      path: name
      exact: megabrain

  - id: repository
    desc: Megabrain upstream repository marker
    if:
      type: text
      substr: github.com/bernatch22/megabrain
