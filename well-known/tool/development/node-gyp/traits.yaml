defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: component
  conf: 0.98

traits:
  - id: node-gyp-main-basename
    desc: node-gyp main module basename
    if:
      type: basename
      exact: node-gyp.js
  - id: node-gyp-usage-banner
    desc: node-gyp usage banner
    if:
      type: text
      substr: 'Usage: node-gyp <command> [options]'
  - id: node-gyp-config-env-prefix
    desc: node-gyp npm config environment prefix
    if:
      type: text
      substr: npm_package_config_node_gyp_

composite_rules:
  - id: node-gyp-main-module
    desc: node-gyp main module
    crit: notable
    conf: 0.99
    all:
      - id: node-gyp-main-basename
    any:
      - id: node-gyp-usage-banner
      - id: node-gyp-config-env-prefix
