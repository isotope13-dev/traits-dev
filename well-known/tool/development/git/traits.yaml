defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.96

traits:
  - id: git-p4-basename
    desc: Git p4 helper basename
    if:
      type: basename
      exact: git-p4

  - id: git-p4-config-namespace
    desc: Git p4 config namespace
    if:
      type: literal
      substr: git-p4.

  - id: git-p4-fast-import-text
    desc: Git fast-import bridge text
    if:
      type: literal
      substr: git fast-import

composite_rules:
  - id: git-p4-python-bridge
    desc: Git p4 Python bridge
    all:
      - id: git-p4-basename
      - id: git-p4-config-namespace
      - id: git-p4-fast-import-text
