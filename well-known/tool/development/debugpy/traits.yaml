defaults:
  platforms: [unix, windows]
  for: [python, pe, dll, elf, c]
  crit: baseline
  conf: 0.97
  size_max: 268435456

traits:
- id: package-path-marker
  desc: debugpy debugger package path
  if:
    type: path
    basename: true
    regex: '(?i)(ms-python\.debugpy|debugpy|pydevd)'
- id: attach-helper-path
  desc: debugpy attach helper path
  if:
    type: path
    basename: true
    regex: '(?i)(inject_dll|attach_(x86|amd64)|attach_linux)'
- id: winappdbg-path
  desc: debugpy winappdbg vendored path
  if:
    type: path
    basename: true
    regex: '(?i)(py_win_helpers|winappdbg)'
- id: package-text-marker--debugpy
  desc: debugpy debugger package bundle (debugpy)
  if:
    type: text
    word: debugpy
- id: package-text-marker--pydevd-attach-to-process
  desc: debugpy debugger (pydevd_attach_to_process)
  if:
    type: text
    word: pydevd_attach_to_process
- id: package-text-marker--pydevd
  desc: debugpy debugger package bundle (pydevd)
  if:
    type: text
    word: pydevd
composite_rules:
- id: package-text-marker
  desc: debugpy debugger package bundle
  any:
  - id: package-text-marker--debugpy
  - id: package-text-marker--pydevd-attach-to-process
  - id: package-text-marker--pydevd
- id: package-bundle
  desc: debugpy debugger package bundle
  crit: baseline
  conf: 0.97
  any:
  - id: well-known/tool/development/debugpy::attach-helper-path
  - id: well-known/tool/development/debugpy::package-path-marker
  - id: well-known/tool/development/debugpy::package-text-marker--debugpy
  - id: well-known/tool/development/debugpy::package-text-marker--pydevd
  - id: well-known/tool/development/debugpy::package-text-marker--pydevd-attach-to-process
  - id: well-known/tool/development/debugpy::winappdbg-path
