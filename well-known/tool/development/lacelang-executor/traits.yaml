defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  conf: 0.94

traits:
  - id: package-path
    desc: lacelang executor package path
    if:
      type: path
      regex: '(^|[\\/])lacelang_executor[\\/]'

  - id: http-timing-docstring
    desc: Lace HTTP timing module
    if:
      type: text
      substr: HTTP client with per-phase timing

  - id: reject-invalid-certs-option
    desc: Lace invalid cert option
    if:
      type: text
      substr: rejectInvalidCerts=false

composite_rules:
  - id: http-timing-module
    desc: Lace HTTP timing module
    crit: notable
    conf: 0.98
    all:
      - id: package-path
      - id: http-timing-docstring
      - id: reject-invalid-certs-option
