defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.96
  size_min: 1
  size_max: 10000000

traits:
  - id: inno-setup-compiler
    desc: Inno Setup compiler DLL identity
    if:
      type: basename
      exact: ISCmplr.dll
  - id: inno-setup-ide-manifest
    desc: Inno Setup IDE manifest identity
    if:
      type: value
      path: pe.manifest.description
      exact: Inno Setup IDE
  - id: inno-setup-ide-product
    desc: Inno Setup product identity
    if:
      type: value
      path: pe.version.product_name
      exact: Inno Setup

composite_rules:
  - id: inno-setup-ide-context
    desc: Inno Setup IDE development-tool context
    crit: notable
    conf: 0.99
    all:
      - id: inno-setup-ide-manifest
      - id: inno-setup-ide-product
