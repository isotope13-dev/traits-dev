defaults:
  platforms: [unix, windows]

traits:
  - id: bazel-diff-bzlmod-fixture-archive-name
    desc: Bazel-diff bzlmod fixture archive name
    crit: component
    conf: 0.99
    for: [zip, tar]
    size_max: 100000000
    if:
      type: basename
      regex: '^bzlmod-cc-transitive-test-[0-9]\.zip$'
  - id: bazel-bzlmod-transitive-fixture-token
    desc: Bazel bzlmod transitive fixture token
    crit: component
    conf: 0.98
    for: [zip, tar, macho, dylib, python, c, cpp, shell]
    size_max: 100000000
    if:
      type: path
      regex: 'bazel-bzlmod-cc-transitive-test-[0-9]'

composite_rules:
  - id: bazel-diff-bzlmod-test-fixture
    desc: Bazel-diff bzlmod test fixture
    crit: notable
    conf: 0.99
    # The fixture marker is in the enclosing archive while entitlement
    # findings land on binaries nested inside it.
    scope: outer
    any:
      - id: bazel-diff-bzlmod-fixture-archive-name
      - id: bazel-bzlmod-transitive-fixture-token
