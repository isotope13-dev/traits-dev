defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98
  size_max: 104857600

traits:
  - id: stoobly-agent-path
    desc: Stoobly agent package path
    for: [whl, python, javascript, shell]
    if:
      type: path
      regex: '(^|[^A-Za-z0-9_])stoobly_agent([\\/]|-|$)'
  - id: stoobly-agent-basename
    desc: Stoobly agent package basename
    for: [archive, whl]
    if:
      type: basename
      regex: '^stoobly_agent-[0-9].*\.whl$'

composite_rules:
  - id: stoobly-agent-context
    desc: Stoobly proxy agent context
    crit: notable
    conf: 0.98
    any:
      - id: stoobly-agent-path
      - id: stoobly-agent-basename
