defaults:
  platforms: [unix, windows]
  for: [package.json, npm, rust]

traits:
  - id: aube-test-registry-storage-path
    desc: Aube package registry test fixture path
    crit: component
    conf: 0.99
    for: [npm, package.json, javascript, shell]
    size_max: 20000000
    if:
      type: path
      regex: 'test[\\/]registry[\\/]storage|cli-with-node-engine-1\.0\.0\.tgz'
  - id: aube-fixture-package-json-path
    desc: Aube fixture package manifest path
    crit: component
    conf: 0.99
    for: [package.json]
    size_max: 20000
    if:
      type: value
      path: name
      exact: aube-bun-messy-fixture
  - id: aube-npm-package-name
    desc: Aube npm package name
    crit: component
    conf: 0.99
    for: [package.json]
    size_max: 20000
    if:
      type: value
      path: name
      exact: '@endevco/aube'
  - id: aube-npm-arch-preinstall
    desc: Aube architecture package preinstall
    crit: component
    conf: 0.99
    for: [package.json]
    size_max: 20000
    if:
      type: value
      path: scripts.preinstall
      exact: node installArchSpecificPackage.js
  - id: aube-pnpm-e2e-cli-package-name
    desc: Aube pnpm e2e fixture package name
    crit: component
    conf: 0.99
    for: [npm, package.json]
    size_max: 20000
    if:
      type: value
      path: name
      regex: '^@pnpm\.e2e/'
  - id: aube-pnpm-e2e-cli-package-text
    desc: Aube pnpm e2e fixture manifest text
    crit: component
    conf: 0.99
    for: [package.json]
    size_max: 10000
    if:
      type: text
      substr: '"name": "@pnpm.e2e/cli-with-node-engine"'
  - id: aube-content-sniff-source-path
    desc: Aube content sniff scanner source path
    crit: component
    conf: 0.99
    for: [rust]
    size_max: 50000
    if:
      type: path
      regex: '(^|[\\/])content_sniff\.rs$'
  - id: aube-content-sniff-doc-comment
    desc: Aube lifecycle scanner documentation comment
    crit: component
    conf: 0.99
    for: [rust]
    size_max: 50000
    if:
      type: text
      substr: Lightweight content scanner for dependency lifecycle script
  - id: aube-bats-test-marker
    desc: Bats test case marker
    crit: component
    conf: 0.92
    for: [javascript, shell]
    size_max: 200000
    if:
      type: text
      substr: '@test "'
  - id: aube-test-script-command
    desc: Aube test script invokes aube
    crit: component
    conf: 0.98
    for: [javascript, shell]
    size_max: 200000
    if:
      type: text
      regex: '\baube\s+(install|update|link|publish)\b'
  - id: aube-test-auth-command
    desc: Aube test script invokes auth commands
    crit: component
    conf: 0.98
    for: [javascript, shell]
    size_max: 200000
    if:
      type: text
      regex: '\baube\s+(login|logout|add)\b'
  - id: aube-node-platform-package-loader
    desc: Aube native platform package reference
    crit: notable
    conf: 0.99
    for: [javascript, package.json]
    size_max: 20000
    if:
      type: text
      regex: '@jdxcode/aube-node-(darwin|linux|win32)-(arm64|x64)(-musl)?'
  - id: aube-node-package-reservation-message
    desc: Aube package reserves a native package name
    crit: notable
    conf: 0.99
    for: [javascript, package.json]
    size_max: 20000
    if:
      type: text
      substr: placeholder published to reserve the package name

composite_rules:
  - id: aube-package-test-fixture
    desc: Aube package-manager test fixture
    crit: notable
    conf: 0.99
    for: [package.json, npm, javascript, shell]
    any:
      - id: aube-test-registry-storage-path
      - id: aube-fixture-package-json-path
      - id: aube-pnpm-e2e-cli-package-name
      - id: aube-pnpm-e2e-cli-package-text
      - id: aube-test-script-fixture
  - id: aube-lifecycle-scanner-source
    desc: Aube lifecycle-script scanner source
    crit: notable
    conf: 0.99
    all:
      - id: aube-content-sniff-source-path
      - id: aube-content-sniff-doc-comment
  - id: aube-published-npm-package
    desc: Aube published npm package
    crit: notable
    conf: 0.99
    for: [package.json]
    all:
      - id: aube-npm-package-name
      - id: aube-npm-arch-preinstall
  - id: aube-test-script-fixture
    desc: Aube package-manager test script
    crit: notable
    conf: 0.98
    for: [javascript, shell]
    all:
      - id: aube-bats-test-marker
    any:
      - id: aube-test-script-command
      - id: aube-test-auth-command
  - id: aube-node-placeholder-reservation
    desc: Aube native package reservation stub
    crit: exception
    conf: 0.99
    for: [javascript, package.json]
    all:
      - id: aube-node-platform-package-loader
      - id: aube-node-package-reservation-message
