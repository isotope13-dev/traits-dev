defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, apk, pkginfo, text]
  crit: baseline
  conf: 0.96
  size_min: 1
  size_max: 524288000

traits:
  - id: dagdotdev-package-name
    desc: Dagdotdev package name
    if:
      type: path
      substr: dagdotdev-
  - id: dagdotdev-basename
    desc: Dagdotdev binary basename
    if:
      type: path
      regex: '(^|[\\/])dagdotdev$'

composite_rules:
  - id: dagdotdev-tool
    desc: Dagdotdev development tool
    crit: notable
    conf: 0.96
    any:
      - id: dagdotdev-package-name
      - id: dagdotdev-basename
