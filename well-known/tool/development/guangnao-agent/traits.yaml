defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, npm]
  crit: notable
  conf: 0.95

traits:
  - id: package-name
    desc: Guangnao Agent CLI package name
    for: [package.json, npm]
    if:
      type: value
      path: package.json::name
      exact: "@guangnao/agent-cli"
  - id: cli-banner
    desc: Guangnao Agent CLI banner
    for: [javascript, typescript]
    if:
      type: text
      regex: 'Guangnao\.com.{0,80}agent-cli shell'
