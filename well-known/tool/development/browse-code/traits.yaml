# Browse Code local AI-chat coding bridge identity.
defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: Browse Code package metadata identity
    if:
      type: value
      path: name
      exact: browse_code

  - id: repository
    desc: Browse Code upstream repository marker
    if:
      type: text
      substr: github.com/Dedeep007/browse_code
