defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  conf: 0.96

traits:
  - id: phar-stub
    desc: WP-CLI PHAR bootstrap marker
    if:
      type: text
      substr: "include 'phar://wp-cli.phar/php/boot-phar.php'"
  - id: package-version-manifest
    desc: WP-CLI embedded package manifest
    if:
      type: text
      regex: 'wp-cli/wp-cli\s+v?[0-9]+\.[0-9]+\.[0-9]+'
  - id: bundled-core-command-packages
    desc: WP-CLI bundled core commands
    if:
      type: text
      regex: 'wp-cli/(cache|checksum|config)-command\s+v?[0-9]+'
  - id: bundled-site-command-packages
    desc: WP-CLI bundled site commands
    if:
      type: text
      regex: 'wp-cli/(core|db|extension)-command\s+v?[0-9]+'
  - id: bundled-runtime-command-packages
    desc: WP-CLI bundled runtime commands
    if:
      type: text
      regex: 'wp-cli/(eval|package|shell)-command\s+v?[0-9]+'

composite_rules:
  - id: wp-cli-phar
    desc: WP-CLI self-contained PHAR archive
    crit: notable
    all:
      - id: phar-stub
      - id: package-version-manifest
    any:
      - id: bundled-core-command-packages
      - id: bundled-site-command-packages
      - id: bundled-runtime-command-packages
      - id: metadata/file/magic/identity::php-archive
