defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho, deb]
  crit: baseline
  conf: 0.95

traits:
  - id: binary-name
    desc: GNAT compiler binary name marker
    size_min: 1
    size_max: 2147483648
    if:
      type: basename
      substr: gnat
      case_insensitive: true
  - id: package-path
    desc: GNAT compiler package path marker
    size_min: 1
    size_max: 2147483648
    if:
      type: basename
      substr: gnat-
      case_insensitive: true

composite_rules:
  - id: compiler
    desc: GNAT Ada compiler identity
    any:
      - id: binary-name
      - id: package-path
