# Android Debug Bridge (adb) — benign Android developer tool basename.
# Used as a false-positive exclusion for Windows stealer-recon composites.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1
  size_max: 104857600
traits:
  - id: adb-exe-basename
    desc: Android Debug Bridge basename
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(^|[!/])adb\.exe$'
