defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: diagnostics-hub
    desc: Microsoft DiagnosticsHub component
    crit: notable
    conf: 0.9
    if:
      type: path
      basename: true
      substr: DiagnosticsHub
  - id: visual-studio-uitesting-namespace
    desc: Visual Studio UI Testing namespace
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Microsoft.VisualStudio.TestTools.UITesting
      section: rdata
  - id: visual-studio-uitesting-browserwindow
    desc: Visual Studio UI browser automation
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Microsoft.VisualStudio.TestTools.UITesting::BrowserWindow
      section: rdata
composite_rules:
  - id: visual-studio-uitesting-component
    desc: Microsoft Visual Studio UI Testing component
    crit: baseline
    conf: 0.98
    all:
      - id: metadata/signed/platform::microsoft
      - id: visual-studio-uitesting-namespace
    any:
      - id: visual-studio-uitesting-browserwindow
      - id: metadata/package/versioning::pe-productname-field
