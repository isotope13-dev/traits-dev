defaults:
  platforms: [unix, windows]
  for: [elf, pe]
  crit: notable
  conf: 0.97
  size_min: 1000000
  size_max: 100000000

traits:
  - id: flow-bin-package-name
    desc: Flow type-checker npm package identity
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: name
      exact: flow-bin

  - id: flow-bin-signing-certificate
    desc: Flow package signing certificate entry
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: files[*]
      regex: '(^|[\\/])signing\.pem$'

  - id: flow-bin-platform-binaries
    desc: Flow package platform-specific binary entries
    crit: notable
    conf: 1.0
    for: [package.json]
    if:
      type: value
      path: files[*]
      regex: '(^|[\\/])flow-(linux|osx|win)'

  - id: flow-bin-package-path
    desc: Flow type checker binary package path
    if:
      type: path
      regex: 'node_modules/flow-bin/'

composite_rules:
  - id: flow-bin-package-context
    desc: Recognized Flow type-checker package context
    crit: exception
    conf: 1.0
    scope: archive
    all:
      - id: flow-bin-package-name
      - id: flow-bin-signing-certificate
      - id: flow-bin-platform-binaries
