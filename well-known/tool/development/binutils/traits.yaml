defaults:
  platforms: [linux]
  for: [elf]
  size_max: 1000000
traits:
  - id: binutils-ld-testsuite-object
    desc: GNU binutils linker testsuite object fixture
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)testsuite[\\/]ld-x86-64[\\/]pr[0-9]+b?\.obj$'
  - id: binutils-pr27590-object-basename
    desc: GNU binutils pr27590 linker testsuite object
    crit: baseline
    conf: 0.98
    if:
      type: path
      basename: true
      exact: pr27590b.obj

composite_rules:
  - id: binutils-ld-testsuite-fixture
    desc: GNU binutils ld testsuite object fixture
    crit: notable
    conf: 0.98
    any:
      - id: binutils-ld-testsuite-object
      - id: binutils-pr27590-object-basename
