defaults:
  platforms: [unix, windows]
  for: [javascript, npm, archives]
  crit: notable
  conf: 0.98
  size_max: 300000000

traits:
  - id: autohq-cli-package
    desc: AutoHQ CLI package path
    if:
      type: path
      regex: '@autohq-cli-[0-9][^\\/]*'
  - id: autohq-cli-source-marker
    desc: AutoHQ CLI package identity
    if:
      type: text
      substr: '@autohq/cli'
