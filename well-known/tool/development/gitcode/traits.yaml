defaults:
  platforms: [unix]
  for: [python]

traits:
  - id: gitcode-tool-docstring
    desc: GitCode tool docstring
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'gitcode tool'
  - id: gitcode-token-env
    desc: GitCode token environment variable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'GITCODE_TOKEN'
  - id: gitcode-api-base
    desc: GitCode API base URL
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'api.gitcode.com/api/v5'

composite_rules:
  - id: gitcode-release-helper
    desc: GitCode release helper CLI
    crit: notable
    conf: 0.95
    all:
      - id: gitcode-tool-docstring
      - id: gitcode-token-env
      - id: gitcode-api-base
