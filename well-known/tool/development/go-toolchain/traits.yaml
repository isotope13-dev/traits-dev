defaults:
  platforms: [unix, windows]
  for: [go, shell, elf, macho, pe, text, archive]
  size_max: 200000000

traits:
  - id: go-toolchain-bin-path
    desc: Go toolchain binary path
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: 'go/bin/(go|gofmt)(\.exe)?$'

  - id: go-toolchain-source-path
    desc: Go toolchain source tree path
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: 'go/(src|test)/'

  - id: go-module-source-path
    desc: Go module source tree path
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: 'go@v[^\\/]+'

  - id: go-buildid-testdata-path
    desc: Go buildid PE base64 test fixture basename
    crit: baseline
    conf: 0.99
    for: [text]
    if:
      type: path
      basename: true
      exact: a.pe.base64

composite_rules:
  - id: go-toolchain-distribution
    desc: Go toolchain distribution artifact
    crit: notable
    conf: 0.98
    any:
      - id: go-toolchain-bin-path
      - id: go-toolchain-source-path
      - id: go-module-source-path
      - id: go-buildid-testdata-path
