defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.98

traits:
  - id: corepack-source-path
    desc: Corepack source path
    if:
      type: path
      regex: '(?i)(^|[\\/])corepack([\\/]|$)'

  - id: corepack-registry-token-marker
    desc: Corepack npm registry authentication marker
    if:
      type: text
      substr: COREPACK_NPM_TOKEN

composite_rules:
  - id: corepack-registry-client-context
    desc: Corepack npm registry client context
    crit: exception
    conf: 0.99
    all:
      - id: corepack-source-path
      - id: corepack-registry-token-marker
