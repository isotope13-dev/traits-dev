# GHCup — Haskell toolchain installer. Benign get-ghcup.haskell.org bootstrap.
# Used as a false-positive exclusion for curl/wget pipe-to-shell composites.
defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: ghcup-bootstrap-pipe
    desc: GHCup bootstrap installer pipe
    crit: component
    if:
      type: text
      regex: (?i)get-ghcup\.haskell\.org.{0,40}\|\s*(bash|sh)\b
