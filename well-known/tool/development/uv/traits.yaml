defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
  size_min: 1048576

traits:
  - id: uv-executable-basename
    desc: uv executable basename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      exact: uv
  - id: uv-crate-source-path
    desc: uv crate source path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: crates/uv-client/src/middleware.rs
      section: .rodata
  - id: astral-python-index-endpoint
    desc: Astral Python index endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /simple/astral-sh/
      section: .rodata
  - id: uv-build-backend
    desc: uv build backend package
    crit: notable
    conf: 0.98
    for: [python, apk]
    size_min: 1
    size_max: 2000000
    if:
      type: path
      regex: '(^|[\\/])uv_build([\\/]|$)'

composite_rules:
  - id: astral-uv-python-tool
    desc: Astral uv Python tool
    crit: notable
    conf: 0.98
    all:
      - id: uv-executable-basename
      - id: uv-crate-source-path
      - id: astral-python-index-endpoint
