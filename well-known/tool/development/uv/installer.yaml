defaults:
  platforms: [linux, macos, windows]
  for: [shell]
  crit: component
  conf: 0.98

traits:
  - id: uv-installer-script-path
    desc: Astral uv installer script path
    if:
      type: path
      basename: true
      exact: uv-installer.sh

  - id: astral-uv-installer-source
    desc: Astral uv installer source marker
    if:
      type: text
      regex: '(github\.com/astral-sh/uv/releases/download|source.{0,50}astral-sh)'

  # Shared benign-context marker for the official uv bootstrap installer URL,
  # referenced from `unless:` guards so a package that pipes the OFFICIAL uv
  # installer to a shell is not mistaken for an attacker curl|sh dropper.
  - id: uv-install-sh-bootstrap-url
    desc: Astral uv install.sh bootstrap URL
    crit: notable
    for: [scripts]
    if:
      type: text
      substr: astral.sh/uv/install.sh

composite_rules:
  - id: astral-uv-installer
    desc: Official Astral uv bootstrap installer
    crit: notable
    conf: 0.99
    all:
      - id: uv-installer-script-path
      - id: astral-uv-installer-source
