# Mozilla Gecko/Firefox crashhelper and related tool markers
defaults:
  platforms: [macos, linux, windows]
  for: [macho, elf, pe]
  crit: baseline
  conf: 0.94

traits:
  - id: gecko-source-path
    desc: Gecko source tree path reference
    if:
      type: text
      substr: /builds/worker/checkouts/gecko/
  - id: crash-helper-server
    desc: Firefox crash_helper_server module reference
    if:
      type: text
      substr: crash_helper_server
  - id: breakpad-crash-generation
    desc: Breakpad crash generation server reference
    if:
      type: text
      substr: Breakpad CrashGenerationServer

composite_rules:
  - id: mozilla-crash-helper
    desc: Mozilla Firefox crashhelper binary
    crit: baseline
    conf: 0.96
    needs: 2
    any:
      - id: gecko-source-path
      - id: crash-helper-server
      - id: breakpad-crash-generation
