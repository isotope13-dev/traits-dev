defaults:
  platforms: [macos, windows, linux]
  for: [package.json]
  crit: component
  size_max: 200000

traits:
  - id: salesforce-cli-package-name
    desc: Salesforce CLI package name
    conf: 0.99
    if:
      type: value
      path: name
      exact: '@salesforce/cli'

  - id: salesforce-cli-repository
    desc: Salesforce CLI repository URL
    conf: 0.99
    if:
      type: value
      path: homepage
      exact: https://github.com/forcedotcom/cli

  - id: salesforce-cli-preinstall-script
    desc: Salesforce CLI compatibility preinstall script
    conf: 0.98
    if:
      type: value
      path: scripts.preinstall
      exact: node ./scripts/preinstall.js

  - id: salesforce-templates-package-name
    desc: Salesforce templates package name
    conf: 0.99
    if:
      type: value
      path: name
      exact: '@salesforce/templates'

  - id: salesforce-templates-repository
    desc: Salesforce templates repository URL
    conf: 0.99
    if:
      type: value
      path: homepage
      exact: https://github.com/forcedotcom/salesforcedx-templates

composite_rules:
  - id: salesforce-cli-preinstall-compat-package
    desc: Salesforce CLI preinstall compatibility package
    crit: notable
    conf: 0.99
    all:
      - id: salesforce-cli-package-name
      - id: salesforce-cli-repository
      - id: salesforce-cli-preinstall-script
  - id: salesforce-templates-package
    desc: Official Salesforce templates package
    crit: notable
    conf: 0.99
    all:
      - id: salesforce-templates-package-name
      - id: salesforce-templates-repository
