defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.96
  size_max: 1073741824

traits:
  - id: official-env-helper
    desc: Codecov official CI environment helper
    if:
      type: text
      substr: https://codecov.io/env
  - id: bash-uploader-v4-endpoint
    desc: Codecov Bash uploader v4 endpoint
    if:
      type: text
      regex: 'https://codecov\.io/upload/v[0-9]+'
  - id: bash-uploader-package-query
    desc: Codecov Bash uploader package query
    if:
      type: text
      regex: 'package=bash-\$VERSION'
  - id: bash-uploader-gzip-body
    desc: Codecov Bash uploader gzip body upload
    if:
      type: text
      regex: '--data-binary\s+@"\$upload_file\.gz"'

composite_rules:
  - id: official-bash-uploader
    desc: Codecov Bash uploader implementation
    crit: notable
    conf: 0.98
    all:
      - id: bash-uploader-v4-endpoint
      - id: bash-uploader-package-query
      - id: bash-uploader-gzip-body
