defaults:
  platforms: [unix, windows]
  for: [pkginfo, package.json, npm, tar, whl]
  crit: baseline
  conf: 0.99

traits:
  - id: package-name
    desc: Projen package name
    crit: notable
    for: [pkginfo, package.json]
    if:
      type: value
      path: name
      exact: projen
  - id: pypi-repository
    desc: Projen Python distribution repository metadata
    crit: notable
    for: [pkginfo]
    if:
      type: value
      path: home-page
      substr: github.com/projen/projen
  - id: npm-repository
    desc: Projen npm repository metadata
    crit: notable
    for: [package.json]
    if:
      type: value
      path: repository.url
      regex: 'github\.com[/:]projen/projen(\.git)?$'
  - id: archive-name
    desc: Projen package archive name
    crit: notable
    for: [whl, npm, tar]
    if:
      type: path
      basename: true
      regex: '^projen-[0-9]+\.[0-9]+\.[0-9]+(-py3-none-any\.whl|\.tgz)$'

composite_rules:
  - id: pypi-package
    desc: Projen Python distribution identity
    crit: notable
    all:
      - id: package-name
      - id: pypi-repository
  - id: npm-package
    desc: Projen npm package identity
    crit: notable
    all:
      - id: package-name
      - id: npm-repository
