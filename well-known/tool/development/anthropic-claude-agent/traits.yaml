defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, macho]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 100000000

traits:
  - id: claude-agent-sdk-js-marker
    desc: Claude agent SDK JavaScript marker
    for: [javascript, typescript]
    if:
      type: text
      substr: '@anthropic-ai/claude-agent-sdk'
  - id: claude-agent-sdk-runtime-marker
    desc: Claude Agent SDK runtime marker
    crit: notable
    for: [javascript, typescript]
    if:
      type: text
      substr: CLAUDE_AGENT_SDK
  - id: claude-agent-native-runtime
    desc: Claude Agent native runtime filename
    crit: notable
    platforms: [unix, windows, android]
    for: [elf]
    size_max: 300000000
    if:
      type: path
      regex: '(^|[\\/])claude$'
  - id: claude-agent-sdk-python-marker
    desc: Claude Agent SDK Python package
    crit: notable
    for: [python]
    if:
      type: path
      regex: 'claude_agent_sdk[\\/]types\.py$'
  - id: salesforce-einstein-gpt-marker
    desc: Salesforce Einstein GPT extension marker
    for: [javascript, typescript]
    if:
      type: text
      substr: salesforcedx-einstein-gpt

composite_rules:
  - id: salesforce-claude-agent-extension
    desc: Salesforce Claude agent extension
    crit: notable
    conf: 0.99
    all:
      - id: claude-agent-sdk-js-marker
      - id: salesforce-einstein-gpt-marker
