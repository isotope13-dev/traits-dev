defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, macho]
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 100000000

traits:
  - id: claude-agent-sdk-js-marker
    desc: Claude agent SDK JavaScript marker
    for: [javascript, typescript]
    if:
      type: text
      substr: '@anthropic-ai/claude-agent-sdk'
  - id: salesforce-einstein-gpt-marker
    desc: Salesforce Einstein GPT extension marker
    for: [javascript, typescript]
    if:
      type: text
      substr: salesforcedx-einstein-gpt

composite_rules:
  - id: salesforce-claude-agent-extension
    desc: Salesforce Claude agent extension
    crit: notable
    conf: 0.99
    all:
      - id: claude-agent-sdk-js-marker
      - id: salesforce-einstein-gpt-marker
