defaults:
  platforms: [unix, windows]
  for: [binaries, java, class, jar, javascript, text]
  crit: component
  conf: 0.92
  size_max: 536870912

traits:
  - id: async-profiler-banner
    desc: async-profiler banner string
    if:
      type: text
      substr: async-profiler
  - id: async-profiler-jni-symbol
    desc: async-profiler JNI entrypoint
    for: [binaries, class, jar]
    if:
      type: text
      regex: Java_one_profiler_AsyncProfiler_(start|stop|execute|getSamples)
  - id: async-profiler-sampler
    desc: async-profiler sampler thread
    if:
      type: text
      substr: Async-profiler Sampler
  - id: async-profiler-jfr-sync
    desc: async-profiler JFR integration
    if:
      type: text
      substr: one/profiler/JfrSync
  - id: async-profiler-perf-events
    desc: async-profiler perf event support
    for: [binaries, class, jar]
    if:
      type: text
      substr: perf_events
  - id: flamegraph-rendering-bundle
    desc: Flamegraph rendering bundle
    if:
      type: text
      substr: flamegraph-rendering/
  - id: flamegraph-renderer-config
    desc: Flamegraph packed config renderer
    if:
      type: text
      substr: packed-config
  - id: clj-async-profiler-marker
    desc: clj-async-profiler marker
    if:
      type: text
      substr: clj-async-profiler

composite_rules:
  - id: async-profiler-native
    desc: async-profiler native profiler
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: async-profiler-banner
      - id: async-profiler-jni-symbol
      - id: async-profiler-sampler
      - id: async-profiler-jfr-sync
      - id: async-profiler-perf-events
  - id: jvm-profiler-agent
    desc: JVM profiler attach agent
    crit: notable
    conf: 0.96
    any:
      - id: micro-behaviors/process/attach/jvm::jvm-profiler-agent-load
      - id: micro-behaviors/process/attach/jvm::jvm-profiler-attach
    all:
      - id: clj-async-profiler-marker
  - id: flamegraph-profiler-ui
    desc: Profiler flamegraph renderer
    crit: notable
    conf: 0.95
    all:
      - id: flamegraph-renderer-config
    any:
      - id: flamegraph-rendering-bundle
      - id: async-profiler-banner
      - id: clj-async-profiler-marker
  - id: clj-async-profiler-wrapper
    desc: Clojure async-profiler wrapper
    crit: notable
    conf: 0.98
    all:
      - id: clj-async-profiler-marker
    any:
      - id: async-profiler-native
      - id: jvm-profiler-agent
      - id: flamegraph-profiler-ui
