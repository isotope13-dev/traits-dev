# Static analysis security tool integrations
# Detects packages that integrate with multiple SAST/security scanners,
# which legitimately reference credential patterns and AI tool paths.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, github-actions]

traits:
  - id: bearer-tool
    desc: Bearer SAST tool reference
    crit: component
    if:
      type: text
      regex: 'bearer/bearer|bearer\s+(scan|ci|init)\b'
  - id: semgrep-tool
    desc: Semgrep SAST tool reference
    crit: component
    if:
      type: text
      word: semgrep
  - id: grype-tool
    desc: Grype vulnerability scanner reference
    crit: component
    if:
      type: text
      word: grype
  - id: scorecard-tool
    desc: OpenSSF Scorecard reference
    crit: component
    if:
      type: text
      regex: 'ossf/scorecard|scorecard-action|scorecard\s+--(repo|local)\b'
  - id: trufflehog-tool
    desc: TruffleHog secret scanner reference
    crit: component
    if:
      type: text
      word: trufflehog
  - id: lockfile-lint-tool
    desc: lockfile-lint reference
    crit: component
    if:
      type: text
      word: lockfile-lint
  - id: snyk-tool
    desc: Snyk security scanner reference
    crit: component
    if:
      type: text
      word: snyk

  - id: secret-scanner-yaml-named-regex
    desc: Named credential regex entries
    crit: baseline
    conf: 0.92
    for: [javascript, typescript, python, ruby, go, rust]
    count_min: 8
    if:
      type: text
      regex: 'name:\s*["''][A-Za-z]+\s*(key|secret|token|password)["'']'
      case_insensitive: true
    unless:
      - id: metadata/library/web3::generated-contract-abi
  - id: js-secret-scanner-pattern-table
    desc: JavaScript secret scanner regex table
    crit: baseline
    conf: 0.94
    for: [javascript, typescript]
    count_min: 8
    if:
      type: text
      regex: '\["[a-z0-9-]*(key|secret|token|password)[a-z0-9-]*",\s*/'
      case_insensitive: true
  - id: js-secret-scan-tool-name
    desc: JavaScript secret_scan tool name
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: string_literal
      exact: secret_scan
  - id: js-secret-scan-redacted-output
    desc: JavaScript secret scan redacted output
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'redacted findings|redact\(match\[0\]\)'
  - id: python-secret-label-catalog
    desc: Python secret detector label catalog
    crit: baseline
    conf: 0.94
    for: [python]
    count_min: 4
    if:
      type: text
      regex: '"(OpenAI API key|GitHub PAT|AWS access key|Slack token)"'
  - id: python-secret-rule-catalog
    desc: Python secret detection rule catalog
    crit: baseline
    conf: 0.96
    for: [python]
    if:
      type: text
      substr: _BUILTIN_PATTERNS
  - id: vscode-marketplace-publish-script
    desc: VS Code marketplace publishing script
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(VSCE_PAT|OVSX_PAT|vsce\s+publish|ovsx\s+publish)\b'

composite_rules:
  - id: secret-scanner-named-regex
    desc: Named credential regex entries
    crit: baseline
    conf: 0.94
    for: [javascript, typescript, python, ruby, go, rust]
    any:
      - id: secret-scanner-yaml-named-regex
      - id: js-secret-scanner-pattern-table
      - id: python-secret-label-catalog
  - id: secret-scanner-implementation
    desc: Read-only secret scanner implementation
    crit: baseline
    conf: 0.96
    for: [javascript, typescript]
    all:
      - id: js-secret-scanner-pattern-table
      - id: js-secret-scan-tool-name
    any:
      - id: js-secret-scan-redacted-output
      - id: secret-scanner-named-regex
  - id: sast-scanner-integration
    desc: Package integrates multiple SAST scanners
    crit: baseline
    conf: 0.95
    needs: 3
    any:
      - id: well-known/tool/detection/sast
