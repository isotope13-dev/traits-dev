defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
  crit: baseline
  conf: 0.95
  size_min: 512
  size_max: 104857600
traits:
  - id: xor-classify
    desc: STNG XOR classification function
    if:
      type: symbol
      regex: stng::xor::classify
  - id: xor-classify-corpus
    desc: STNG XOR classification corpus
    if:
      type: text
      substr: High-confidence XOR key found, stopping search
      section: .text
  - id: pattern-corpus
    desc: STNG static pattern corpus
    if:
      type: text
      substr: static patterns
      section: .text
  - id: regex-corpus
    desc: STNG static regex corpus
    if:
      type: text
      substr: static regex
      section: .text
