defaults:
  platforms:
  - unix
  - windows
  for:
  - scripts
  - binaries
  size_max: 5000000
traits:
- id: virustotal
  desc: VirusTotal service name reference
  crit: component
  conf: 0.7
  if:
    type: text
    substr: virustotal
    case_insensitive: true
- id: emerging-threats-url
  desc: Emerging Threats documentation URL
  crit: component
  if:
    type: text
    substr: http://doc.emergingthreats.net
- id: security-solution-str
  desc: securitySolution string (single)
  crit: component
  if:
    type: text
    substr: securitySolution
- id: security-solution-many
  desc: securitySolution string (6+ occurrences)
  crit: component
  count_min: 6
  if:
    type: text
    substr: securitySolution
- id: snort-url
  desc: Snort URL
  crit: component
  if:
    type: text
    substr: http://www.snort.org
- id: exploit-db-domain
  desc: exploit-db.com domain
  crit: component
  if:
    type: text
    substr: exploit-db.com
- id: sanitized-url-regex
  desc: Regex for matching sanitized URLs (hXXp://)
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: h\.\.p\[s\]\*:\\/\\/
- id: malware-catalog-id
  desc: Malware catalog identifier
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\bMAL-\\d{4}-[A-Z0-9-]{4,}"
- id: zeroday-lessons-catalog
  desc: Zeroday lessons catalog
  crit: component
  conf: 0.9
  if:
    type: text
    word: zeroday-lessons
- id: threat-intel-label
  desc: Threat-intelligence label
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\b(threat intelligence|threat-intel)\\b"
    case_insensitive: true
  unless:
  - id: metadata/library/python-stdlib
  - type: path
    regex: '(^|[/\\])pydoc_data[/\\]'
- id: advisory-source-identifiers--ghsa
  desc: Security advisory source identifiers (GHSA)
  crit: component
  conf: 0.92
  if:
    type: text
    word: GHSA
- id: advisory-source-identifiers--osv
  desc: Security advisory source identifiers (OSV)
  crit: component
  conf: 0.92
  if:
    type: text
    word: OSV
- id: advisory-source-identifiers--nvd
  desc: Security advisory source identifiers (NVD)
  crit: component
  conf: 0.92
  if:
    type: text
    word: NVD
- id: advisory-source-identifiers--cisa
  desc: Security advisory source identifiers (CISA)
  crit: component
  conf: 0.92
  if:
    type: text
    word: CISA
- id: primary-advisory-sources--qualys
  desc: Primary advisory source names (Qualys)
  crit: component
  conf: 0.9
  if:
    type: text
    case_insensitive: true
    word: Qualys
- id: primary-advisory-sources--rhsa
  desc: Primary advisory source names (RHSA)
  crit: component
  conf: 0.9
  if:
    type: text
    word: RHSA
  unless:
  - type: text
    substr: Application data fields available for sorting
- id: primary-advisory-sources--usn
  desc: Primary advisory source names (USN)
  crit: component
  conf: 0.9
  if:
    type: text
    word: USN
- id: primary-advisory-sources--zdi
  desc: Primary advisory source names (ZDI)
  crit: component
  conf: 0.9
  if:
    type: text
    word: ZDI
- id: threat-intel-feed-word
  desc: Threat-feed context word
  crit: component
  conf: 0.85
  if:
    type: text
    word: feed
- id: threat-intel-indicator-word
  desc: Threat-indicator context word
  crit: component
  conf: 0.85
  if:
    type: text
    word: indicator
- id: threat-intel-ioc-word
  desc: Threat IOC context word
  crit: component
  conf: 0.85
  if:
    type: text
    word: ioc
- id: threat-intel-signature-word
  desc: Threat-signature context word
  crit: component
  conf: 0.85
  if:
    type: text
    word: signature
composite_rules:
- id: advisory-source-identifiers
  desc: Security advisory source identifiers
  crit: component
  conf: 0.92
  any:
  - id: advisory-source-identifiers--ghsa
  - id: advisory-source-identifiers--osv
  - id: advisory-source-identifiers--nvd
  - id: advisory-source-identifiers--cisa
- id: primary-advisory-sources
  desc: Primary advisory source names
  crit: component
  conf: 0.9
  any:
  - id: primary-advisory-sources--qualys
  - id: primary-advisory-sources--rhsa
  - id: primary-advisory-sources--usn
  - id: primary-advisory-sources--zdi
- id: threat-intel-text
  desc: Threat-intelligence feed context
  crit: component
  conf: 0.9
  all:
    - id: threat-intel-label
    - id: threat-intel-feed-marker
  near_bytes: 160
- id: threat-intel-feed-marker
  desc: Threat-feed indicator or rule marker
  crit: component
  conf: 0.85
  any:
    - id: threat-intel-feed-word
    - id: threat-intel-indicator-word
    - id: threat-intel-ioc-word
    - id: threat-intel-signature-word
- id: signatures-db
  desc: Security signature database or threat intelligence feed
  crit: notable
  conf: 0.9
  any:
  - id: emerging-threats-url
  - id: security-solution-many
  - id: snort-url
  - id: metadata/file/metrics::cve-pattern-many
  - id: exploit-db-domain
  - id: advisory-source-identifiers
  - id: primary-advisory-sources
  - id: malware-catalog-id
  - id: zeroday-lessons-catalog
  - id: threat-intel-text
  unless:
  - id: metadata/file/profile/identity::static-html-shell
