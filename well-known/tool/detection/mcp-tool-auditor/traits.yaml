defaults:
  platforms: [unix, windows]
  for: [whl, python]
  crit: notable
  conf: 0.98

traits:
  - id: mcp-tool-auditor-package-name
    desc: MCP Tool Auditor package metadata
    for: [whl]
    if:
      type: value
      path: 'whl.distribution'
      exact: mcp_tool_auditor

  - id: mcp-tool-auditor-offensive-module
    desc: MCP Auditor offensive simulation module
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)offensive/(poisoner|rugpull_sim|atpa_server)\.py$'

  - id: mcp-tool-auditor-scanner-module
    desc: MCP Auditor scanner implementation
    for: [whl]
    if:
      type: value
      path: 'archive.members[*].path'
      regex: '(^|/)auditor/scanner\.py$'

  - id: mcp-tool-auditor-authorization-warning
    desc: MCP Auditor authorization warning
    for: [python]
    if:
      type: text
      regex: '(?i)AUTHORIZED\s+PENETRATION\s+TESTING'

  - id: mcp-tool-auditor-poisoner-generator
    desc: MCP Auditor poisoned-server generator
    for: [python]
    if:
      type: text
      substr: 'PoisonedServerGenerator'

  - id: mcp-tool-auditor-offensive-import
    desc: MCP Auditor offensive security module import
    for: [python]
    if:
      type: text
      regex: 'import\s+(ATPA_SPECIFIC|RUG_PULL_SPECIFIC|print_security_warning|require_ack)\b'

composite_rules:
  - id: mcp-tool-auditor-offensive-context
    desc: MCP Auditor authorized offensive simulation context
    crit: notable
    conf: 0.99
    for: [python]
    any:
      - id: mcp-tool-auditor-authorization-warning
      - id: mcp-tool-auditor-poisoner-generator
      - id: mcp-tool-auditor-offensive-import

  - id: mcp-tool-auditor-package
    desc: MCP Tool Auditor security scanner package
    crit: notable
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: mcp-tool-auditor-package-name
    any:
      - id: mcp-tool-auditor-offensive-module
      - id: mcp-tool-auditor-scanner-module
      - id: mcp-tool-auditor-authorization-warning
    needs: 1
