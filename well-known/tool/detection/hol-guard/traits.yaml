defaults:
  platforms:
  - unix
  - windows
  for:
  - python
  - javascript
  - pkginfo
  - whl
  size_max: 5000000
traits:
- id: plugin-scanner-package-metadata
  desc: plugin-scanner package metadata
  crit: component
  conf: 0.98
  for:
  - pkginfo
  if:
    type: value
    path: name
    exact: plugin-scanner
- id: hol-guard-project-metadata
  desc: HOL Guard project metadata
  crit: component
  conf: 0.98
  for:
  - pkginfo
  if:
    type: text
    regex: HOL Guard|hashgraph-online/hol-guard
- id: plugin-scanner-summary
  desc: plugin-scanner maintainer security summary
  crit: component
  conf: 0.96
  for:
  - pkginfo
  if:
    type: value
    path: summary
    regex: Lint, verify, and gate plugin ecosystems
- id: hol-guard-internal-module
  desc: HOL Guard internal module path
  crit: component
  conf: 0.95
  for:
  - python
  - javascript
  if:
    type: path
    regex: "codex_plugin_scanner[\\\\/]guard[\\\\/]"
- id: plugin-scanner-internal-module
  desc: plugin-scanner internal package path
  crit: component
  conf: 0.94
  for:
  - python
  - javascript
  if:
    type: path
    regex: "(^|[\\\\/])codex_plugin_scanner[\\\\/]"
- id: hol-guard-product-name
  desc: HOL Guard product name
  crit: component
  conf: 0.86
  if:
    type: text
    regex: "\\bHOL Guard\\b"
- id: hol-guard-sensitive-reason-copy
  desc: HOL Guard sensitive-path explanation copy
  crit: component
  conf: 0.92
  for:
  - python
  - javascript
  if:
    type: text
    regex: Guard treats .{0,120} as sensitive
- id: hol-guard-supply-chain-module
  desc: HOL Guard supply-chain protection module
  crit: component
  conf: 0.9
  for:
  - python
  if:
    type: path
    regex: "guard[\\\\/]runtime[\\\\/]supply_chain"
composite_rules:
- id: hol-guard-tool
  desc: HOL Guard / plugin-scanner security tool context
  crit: component
  conf: 0.98
  all:
  - id: hol-guard-product-name
  any:
  - id: plugin-scanner-package-metadata
  - id: plugin-scanner-summary
  - id: hol-guard-project-metadata
  - id: plugin-scanner-internal-module
  - id: hol-guard-internal-module
  - id: hol-guard-supply-chain-module
- id: hol-guard-runtime-detector-context
  desc: HOL Guard runtime detector or policy context
  crit: component
  conf: 0.96
  any:
  - id: hol-guard-tool
  - id: plugin-scanner-internal-module
  - id: hol-guard-sensitive-reason-copy
  - id: hol-guard-supply-chain-module
