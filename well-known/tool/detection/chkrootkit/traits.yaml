defaults:
  platforms: [unix]
  for: [shell, perl, text, source, tar]
  size_max: 52428800
  crit: component
  conf: 0.96

traits:
  - id: source-tree-path
    desc: chkrootkit source tree path
    if:
      type: path
      regex: 'chkrootkit-[0-9][^\\/]*'

  - id: scanner-script-banner
    desc: chkrootkit scanner script banner
    if:
      type: text
      substr: 'Searching for Rocke Miner'

composite_rules:
  - id: source-tree
    desc: chkrootkit rootkit scanner source tree
    crit: notable
    conf: 0.99
    any:
      - id: source-tree-path
      - id: scanner-script-banner
