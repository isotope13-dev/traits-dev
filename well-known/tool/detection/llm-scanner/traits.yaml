defaults:
  platforms:
  - unix
  - windows
  for:
  - python
  - javascript
  - typescript
  - rust
  - pkginfo
  - package.json
  - documents
  crit: notable
  conf: 0.93
  size_max: 5000000
traits:
- id: garak-import
  desc: Imports NVIDIA garak LLM vulnerability scanner
  conf: 0.97
  if:
    type: text
    regex: "\\b(from\\s+garak(\\.\\w+)?\\s+import|import\\s+garak\\b)"
- id: llm-guard-import
  desc: Imports llm-guard (Protect AI)
  conf: 0.97
  if:
    type: text
    regex: "\\b(from\\s+llm_guard(\\.\\w+)?\\s+import|import\\s+llm_guard\\b)"
- id: lakera-guard-import
  desc: Imports Lakera Guard SDK
  conf: 0.96
  if:
    type: text
    regex: "\\b(from\\s+lakera(_guard)?\\s+import|import\\s+lakera_guard\\b)"
- id: nemo-guardrails-import
  desc: Imports NVIDIA NeMo Guardrails
  conf: 0.97
  if:
    type: text
    regex: "\\b(from\\s+nemoguardrails(\\.\\w+)?\\s+import|import\\s+nemoguardrails\\b)"
- id: rebuff-import
  desc: Imports rebuff prompt-injection detector
  conf: 0.96
  if:
    type: text
    regex: "\\b(from\\s+rebuff(\\.\\w+)?\\s+import|import\\s+rebuff\\b)"
- id: guardrails-ai-import
  desc: Imports guardrails-ai validators
  conf: 0.9
  if:
    type: text
    regex: "\\bfrom\\s+guardrails(\\.\\w+)?\\s+import\\s+(Guard|Validator|OnFailAction)\\b"
- id: prompt-armor-import
  desc: Imports promptarmor SDK
  conf: 0.95
  if:
    type: text
    regex: "\\b(from\\s+prompt(_|-)armor(\\.\\w+)?\\s+import|import\\s+prompt(_|-)armor\\b)"
- id: hiddenlayer-import
  desc: Imports HiddenLayer ML security SDK
  conf: 0.95
  if:
    type: text
    regex: "\\b(from\\s+hiddenlayer(\\.\\w+)?\\s+import|import\\s+hiddenlayer\\b)"
- id: promptfoo-config
  desc: promptfoo evaluation framework marker
  conf: 0.9
  if:
    type: text
    regex: \bpromptfoo:\s*\{|"promptfoo":\s*\{
- id: guardrail-validator-class
  desc: GuardrailValidator / GuardrailsComponent class
  conf: 0.93
  if:
    type: text
    regex: "\\b(Guardrail(s)?(Component|Validator)|PromptInjectionDetector|JailbreakDetector)\\b"
- id: prompt-injection-detect-fn
  desc: detect_prompt_injection function definition
  conf: 0.93
  if:
    type: text
    regex: "\\bdef\\s+detect_prompt_injection\\b"
- id: prompt-injection-check-fn
  desc: prompt injection check fn
  conf: 0.9
  if:
    type: text
    regex: "\\bdef\\s+(is_prompt_injection|check_injection|check_jailbreak)\\b"
- id: indirect-injection-lineage-detector
  desc: Indirect prompt-injection lineage detector
  conf: 0.93
  if:
    type: text
    regex: "\\bdef\\s+find_injections\\b"
- id: jailbreak-scan-fn
  desc: scan_for_jailbreak function definition
  conf: 0.93
  if:
    type: text
    regex: "\\bdef\\s+scan_for_jailbreak\\b"
- id: scan-input-fn
  desc: scan_input / scan_prompt function definition
  conf: 0.88
  if:
    type: text
    regex: "\\bdef\\s+scan_(input|prompt|messages)\\b"
- id: scan-output-fn
  desc: scan_output / scan_response func definition
  conf: 0.88
  if:
    type: text
    regex: "\\bdef\\s+scan_(output|response)\\b"
- id: owasp-llm-top-10-reference
  desc: OWASP LLM Top 10 reference
  conf: 0.93
  if:
    type: text
    regex: "\\bOWASP\\s+LLM\\s+Top\\s+10\\b"
- id: detection-pattern-dataclass
  desc: DetectionPattern dataclass declaration
  conf: 0.9
  if:
    type: text
    regex: "\\bclass\\s+(Detection|Security|Threat|Risk)Pattern\\b"
- id: prompt-injection-defender-doc
  desc: Defender-shape prompt-injection phrasing
  conf: 0.9
  if:
    type: text
    regex: "\\b(detect|screen|block)\\w{0,12}[\\s\\w-]{0,30}prompt injection"
    case_insensitive: true
- id: prompt-injection-attack-doc
  desc: prompt injection attack noun phrase
  conf: 0.88
  if:
    type: text
    regex: "\\bprompt injection attack[s]?\\b"
    case_insensitive: true
- id: prompt-injection-rejection-message
  desc: Prompt injection rejection message
  conf: 0.9
  if:
    type: text
    substr: looks like prompt injection
    case_insensitive: true
- id: prompt-injection-phrases-doc
  desc: Prompt injection phrases documentation
  conf: 0.88
  if:
    type: text
    regex: "\\bprompt[- ]injection phrases\\b"
    case_insensitive: true
- id: ai-skill-scanner-report-doc
  desc: AI skill scanner report document
  conf: 0.94
  if:
    type: text
    regex: Cisco AI Defense Skill Scanner|LLM_PROMPT_INJECTION|BEHAVIOR_ENV_VAR_EXFILTRATION
    case_insensitive: true
- id: mvar-security-package-summary
  desc: MVAR security package metadata
  for:
  - pkginfo
  conf: 0.95
  if:
    type: value
    path: summary
    exact: "MVAR: Information Flow Control for LLM Agent Runtimes"
- id: mvar-attack-suite-fixture
  desc: MVAR attack-suite test fixture
  for:
  - python
  conf: 0.95
  if:
    type: text
    regex: "MVAR (EXTREME )?ATTACK TEST SUITE|Testing against CVE-2026-25253 \\+ OpenClaw"
- id: mvar-bash-policy-fixture
  desc: MVAR bash policy fixture
  for:
  - python
  conf: 0.95
  if:
    type: text
    substr: "Bash Command Policy Rules for MVAR Claude Code Hook Demo"
- id: mvar-security-runtime-token
  desc: MVAR security runtime token
  for:
  - python
  conf: 0.93
  if:
    type: text
    regex: "MVAR_(PRINCIPAL_ID|EXECUTION_TOKEN|REQUIRE_EXECUTION_TOKEN|VAULT_TOKEN)"
composite_rules:
- id: llm-scanner-context
  desc: File is part of an LLM security scanner / firewall
  crit: notable
  conf: 0.96
  any:
  - id: well-known/tool/detection/llm-scanner::ai-skill-scanner-report-doc
  - id: well-known/tool/detection/llm-scanner::detection-pattern-dataclass
  - id: well-known/tool/detection/llm-scanner::garak-import
  - id: well-known/tool/detection/llm-scanner::guardrail-validator-class
  - id: well-known/tool/detection/llm-scanner::guardrails-ai-import
  - id: well-known/tool/detection/llm-scanner::hiddenlayer-import
  - id: well-known/tool/detection/llm-scanner::jailbreak-scan-fn
  - id: well-known/tool/detection/llm-scanner::lakera-guard-import
  - id: well-known/tool/detection/llm-scanner::llm-guard-import
  - id: well-known/tool/detection/llm-scanner::nemo-guardrails-import
  - id: well-known/tool/detection/llm-scanner::owasp-llm-top-10-reference
  - id: well-known/tool/detection/llm-scanner::prompt-armor-import
  - id: well-known/tool/detection/llm-scanner::prompt-injection-attack-doc
  - id: well-known/tool/detection/llm-scanner::prompt-injection-check-fn
  - id: well-known/tool/detection/llm-scanner::indirect-injection-lineage-detector
  - id: well-known/tool/detection/llm-scanner::prompt-injection-defender-doc
  - id: well-known/tool/detection/llm-scanner::prompt-injection-detect-fn
  - id: well-known/tool/detection/llm-scanner::prompt-injection-phrases-doc
  - id: well-known/tool/detection/llm-scanner::prompt-injection-rejection-message
  - id: well-known/tool/detection/llm-scanner::promptfoo-config
  - id: well-known/tool/detection/llm-scanner::rebuff-import
  - id: well-known/tool/detection/llm-scanner::scan-input-fn
  - id: well-known/tool/detection/llm-scanner::scan-output-fn
  - id: well-known/lib/pyaigis/
- id: mvar-security-context
  desc: File is part of MVAR LLM security tooling
  crit: notable
  conf: 0.96
  any:
  - id: well-known/tool/detection/llm-scanner::mvar-security-package-summary
  - id: well-known/tool/detection/llm-scanner::mvar-attack-suite-fixture
  - id: well-known/tool/detection/llm-scanner::mvar-bash-policy-fixture
  - id: well-known/tool/detection/llm-scanner::mvar-security-runtime-token
