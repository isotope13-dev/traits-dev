defaults:
  platforms: [unix]
  crit: notable
  conf: 0.96
  size_min: 1
  size_max: 200000000

traits:
  - id: source-package-basename
    desc: Snort source package archive
    for: [archive, tar, data]
    if:
      type: basename
      regex: '^snort-[0-9][A-Za-z0-9._+-]*\.(tgz|tar|tar\.gz)$'

  - id: package-member-path
    desc: Snort package member path
    for: [source, scripts, documents, data, archive, tar]
    if:
      type: path
      substr: snort_dynamicpreprocessor

  - id: dynamic-source-path
    desc: Snort dynamic source tree path
    for: [source, documents, data]
    if:
      type: path
      substr: snort_dynamicsrc

  - id: documentation-path
    desc: Snort documentation path
    for: [source, scripts, documents, data]
    if:
      type: path
      substr: share/doc/snort

  - id: example-config-path
    desc: Snort example configuration path
    for: [source, scripts, documents, data]
    if:
      type: path
      substr: examples/snort

  - id: snort-executable-basename
    desc: Snort executable basename
    for: [binaries]
    if:
      type: basename
      exact: snort

  - id: dynamic-preprocessor-library
    desc: Snort dynamic preprocessor library
    for: [elf]
    if:
      type: basename
      regex: '^libsf_[a-z0-9_]+_preproc\.so(\.[0-9]+){0,3}$'

  - id: dynamic-preprocessor-archive
    desc: Snort dynamic preprocessor static library
    for: [archive, data]
    if:
      type: basename
      regex: '^libsf_[a-z0-9_]+_preproc\.a$'

  - id: dynamic-engine-library
    desc: Snort dynamic rule engine library
    for: [elf, archive, data]
    if:
      type: basename
      regex: '^libsf_engine\.(so(\.[0-9]+){0,3}|a)$'

  - id: shared-object-rules-library
    desc: Snort shared object rules library
    for: [elf, archive, data]
    if:
      type: basename
      regex: '^libsf_sorules\.(so(\.[0-9]+){0,3}|a)$'

  - id: unified2-utility-basename
    desc: Snort Unified2 utility executable
    for: [elf]
    if:
      type: basename
      regex: '^u2(streamer|spewfoo|openappid|boat)$'

  - id: appid-builder-script
    desc: Snort AppID detector builder script
    for: [shell]
    if:
      type: basename
      exact: appid_detector_builder.sh

  - id: snort-configuration-marker
    desc: Snort configuration marker
    for: [scripts, source, documents, data]
    if:
      type: text
      regex: '(?i)\bsnort_(dynamicpreprocessor|dynamicsrc)\b|\bsnort\.conf\b'

  - id: archive-member-path
    desc: Snort archive member path
    for: [archive, tar, data]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)share/snort/|(^|/)lib/snort_dynamicpreprocessor/'

  - id: ftptelnet-preprocessor-archive
    desc: Snort FTP/Telnet preprocessor archive
    for: [archive, data]
    if:
      type: basename
      exact: libsf_ftptelnet_preproc.a

  - id: appid-preprocessor-archive
    desc: Snort AppID preprocessor archive
    for: [archive, data]
    if:
      type: basename
      exact: libsf_appid_preproc.a

  - id: protocol-decoder-header-name
    desc: Snort protocol header filename
    for: [c, cpp]
    if:
      type: basename
      exact: sf_protocols.h

  - id: tcp-decoder-comment
    desc: TCP decoder comment
    for: [c, cpp]
    if:
      type: text
      substr: "DecodeTCP"

  - id: udp-decoder-comment
    desc: UDP decoder comment
    for: [c, cpp]
    if:
      type: text
      substr: "DecodeUDP"

composite_rules:
  - id: source-package
    desc: Snort source or binary package
    crit: notable
    conf: 0.98
    any:
      - id: source-package-basename
      - id: package-member-path
      - id: dynamic-source-path
      - id: documentation-path
      - id: example-config-path
      - id: snort-executable-basename
      - id: dynamic-preprocessor-library
      - id: dynamic-preprocessor-archive
      - id: dynamic-engine-library
      - id: shared-object-rules-library
      - id: unified2-utility-basename
      - id: appid-builder-script
      - id: snort-package-script-path
      - id: archive-member-path

  - id: snort-package-script-path
    desc: Snort pkgsrc maintainer script
    crit: notable
    conf: 0.96
    all:
      # The basename is a generic pkgsrc property; Snort identity comes only
      # from its configuration marker in the same script/package context.
      - id: metadata/package/files/bsd::pkgsrc-maintainer-script-basename
      - id: snort-configuration-marker

  - id: dynamic-preprocessor-static-archive
    desc: Snort dynamic preprocessor archive
    crit: notable
    conf: 0.96
    any:
      - id: ftptelnet-preprocessor-archive
      - id: appid-preprocessor-archive
      - id: dynamic-preprocessor-archive

  - id: protocol-decoder-header
    desc: Snort protocol decoder header
    crit: notable
    conf: 0.96
    all:
      - id: protocol-decoder-header-name
      - id: tcp-decoder-comment
      - id: udp-decoder-comment
