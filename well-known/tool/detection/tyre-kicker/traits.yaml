# Tyre Kicker is a defensive browser security scanner. Its remediation,
# exposure-scanning, and report-rendering modules intentionally contain
# examples of credentials, supply-chain attacks, and update warnings.
defaults:
  platforms: [unix, windows]
  for: [javascript, chrome-manifest, crx]
  crit: notable
  conf: 0.99

traits:
  - id: manifest-identity
    desc: Tyre Kicker security scanner manifest
    for: [chrome-manifest]
    if:
      type: value
      path: name
      exact: Tyre Kicker - Security Scanner
  - id: crx-identity
    desc: Tyre Kicker security scanner archive
    for: [crx]
    if:
      type: text
      substr: Tyre Kicker - Security Scanner
  - id: remediation-guide-basename
    desc: Tyre Kicker remediation guide filename
    crit: component
    if:
      type: basename
      exact: remediation-guides.js
  - id: remediation-guide-class
    desc: Tyre Kicker remediation guide class
    crit: component
    if:
      type: text
      substr: class RemediationGuides
  - id: exposed-files-basename
    desc: Tyre Kicker exposed-files filename
    crit: component
    if:
      type: basename
      exact: exposed-files-scanner.js
  - id: exposed-files-class
    desc: Tyre Kicker exposed-files scanner class
    crit: component
    if:
      type: text
      substr: Exposed Files Scanner
  - id: business-impact-basename
    desc: Tyre Kicker business-impact filename
    crit: component
    if:
      type: basename
      exact: business-impact-data.js
  - id: business-impact-class
    desc: Tyre Kicker business-impact class
    crit: component
    if:
      type: text
      substr: class BusinessImpactData
  - id: catastrophic-warning-basename
    desc: Tyre Kicker catastrophic-warning filename
    crit: component
    if:
      type: basename
      exact: catastrophic-warning.js
  - id: catastrophic-warning-function
    desc: Tyre Kicker catastrophic-warning function
    crit: component
    if:
      type: text
      substr: buildCatastrophicWarning

composite_rules:
  - id: remediation-guide-module
    desc: Tyre Kicker remediation guide module
    for: [javascript]
    all:
      - id: remediation-guide-basename
      - id: remediation-guide-class
  - id: exposed-files-module
    desc: Tyre Kicker exposed-files scanner module
    for: [javascript]
    all:
      - id: exposed-files-basename
      - id: exposed-files-class
  - id: business-impact-module
    desc: Tyre Kicker business-impact module
    for: [javascript]
    all:
      - id: business-impact-basename
      - id: business-impact-class
  - id: catastrophic-warning-module
    desc: Tyre Kicker catastrophic-warning module
    for: [javascript]
    all:
      - id: catastrophic-warning-basename
      - id: catastrophic-warning-function
  - id: defensive-scanner-context
    desc: Tyre Kicker defensive scanner context
    any:
      - id: manifest-identity
      - id: crx-identity
      - id: remediation-guide-module
      - id: exposed-files-module
      - id: business-impact-module
      - id: catastrophic-warning-module
