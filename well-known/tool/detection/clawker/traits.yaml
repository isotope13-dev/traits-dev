defaults:
  platforms: [unix, windows]
  for: [source, scripts, documents, manifests, data]
  size_max: 52428800
traits:
  - id: source-tree
    desc: Clawker security tool source tree
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: '(^|[\\/])schmitthub[\\/]clawker@'

  - id: adversarial-payload-fixture
    desc: Clawker adversarial payload fixture
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: 'adversarial[\\/]payloads[\\/][0-9]{2}$'
