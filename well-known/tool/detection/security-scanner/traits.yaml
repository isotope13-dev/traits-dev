defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - source
  - documents
  size_max: 5000000
traits:
- id: anteumbra-package-tree-member
  desc: Anteumbra scanner package member
  crit: notable
  conf: 0.99
  for: [python, php, javascript, text, whl, pkginfo, json]
  if:
    type: path
    regex: '(?i)(^|[\\/])anteumbra([\\/]|-[0-9])'
- id: penterep-ptsrvtester-package
  desc: Penterep service security tester package
  crit: notable
  conf: 0.99
  for: [whl, python, pyc, lnk, zip, json]
  if:
    type: path
    regex: '(?i)ptsrvtester'
- id: cloud-sdk-api-model
  desc: Auto-generated cloud-SDK API-model code
  crit: component
  conf: 0.95
  for:
  - python
  count_min: 15
  if:
    type: text
    regex: ":type \\w{1,40}:"
- id: defensive-dangerous-command-doc
  desc: Defensive dangerous command documentation
  crit: component
  conf: 0.92
  if:
    type: text
    regex: "(destructive command|dangerous command|known dangerous patterns)"
    case_insensitive: true
- id: defensive-suspicious-command-doc
  desc: Defensive suspicious command documentation
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(Suspicious hook command|contains suspicious pattern)"
    case_insensitive: true
- id: python-vulnerability-pattern-catalog
  desc: Python vulnerability pattern catalog
  crit: notable
  conf: 0.94
  for:
  - python
  if:
    type: text
    regex: 'VULNERABILITY_PATTERNS\s*='
- id: code-critical-pattern-constant
  desc: Critical code-pattern constant
  crit: component
  conf: 0.96
  for:
  - python
  if:
    type: text
    substr: CODE_CRITICAL_PATTERNS
- id: code-high-pattern-constant
  desc: High code-pattern constant
  crit: component
  conf: 0.96
  for:
  - python
  if:
    type: text
    substr: CODE_HIGH_PATTERNS
- id: dangerous-query-keyword-denylist
  desc: Common SQL keywords in scanner denylist text
  crit: notable
  conf: 0.92
  count_min: 4
  if:
    type: text
    regex: '\\b(UNION|DROP|DELETE|INSERT|UPDATE|EXEC|EXECUTE)\\b'
- id: sensitive-dir-guard-comment
  desc: sensitive dir guard comment
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)should never be (browsed|accessed|used)"
- id: credential-stripping-sandbox-env
  desc: Credential-stripping sandbox env builder
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)(_MCP_STRIP_ENV_KEYS|strip\\w* credential)"
- id: credential-stripping-scratch-dir
  desc: Credential-stripping sandbox env builder
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: "(?i)scratch dir\\w* instead of"
- id: credential-stripping-mcp-env-keys
  desc: MCP credential strip list
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: _MCP_STRIP_ENV_KEYS
- id: blocked-sensitive-path-list
  desc: Defensive sensitive path blocklist
  crit: notable
  conf: 0.93
  for:
  - python
  if:
    type: text
    regex: "(?i)(blocked path patterns|_BLOCKED_PATH_PATTERNS|blocked.{0,80}(/etc/shadow|/etc/passwd))"
- id: integration-secret-pattern-catalog
  desc: Integration secret pattern catalog
  crit: notable
  conf: 0.93
  for:
  - python
  if:
    type: text
    regex: "INTEGRATION_PATTERNS[\\s\\S]{0,800}(DISCORD_TOKEN|SLACK_TOKEN|GITHUB_TOKEN)"
- id: credential-dir-denylist-phrase
  desc: Credential-store directory denylist phrasing
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)credential[- ]?(store|dir)s?.{0,60}(deny|block)[- ]?list"
- id: defensive-prompt-pattern-vars
  desc: Defensive prompt pattern variables
  crit: component
  conf: 0.95
  if:
    type: text
    regex: PROMPT_INJECTION_(PATTERNS|MARKERS)
    case_insensitive: true
- id: defensive-threat-signature-doc
  desc: Defensive threat signature documentation
  crit: component
  conf: 0.95
  if:
    type: text
    regex: Built-in threat signatures|tool call details
    case_insensitive: true
- id: defensive-threat-label-anti-mining
  desc: Defensive anti-mining label
  crit: component
  conf: 0.95
  if:
    type: text
    substr: anti-mining
    case_insensitive: true
- id: defensive-threat-labels
  desc: Defensive threat label catalog
  crit: component
  conf: 0.95
  if:
    type: text
    regex: "(anti-trojan|reverse_shell|disk_wipe)"
    case_insensitive: true
- id: security-risk-validator-package-summary
  desc: Security risk validator package metadata
  for:
  - pkginfo
  crit: component
  conf: 0.94
  if:
    type: value
    path: summary
    regex: Validates .* for security, .* risks
    case_insensitive: true
- id: ai-policy-checker-package-summary
  desc: AI policy checker package metadata
  for:
  - pkginfo
  crit: component
  conf: 0.94
  if:
    type: value
    path: summary
    regex: "(?i)Inspect and policy-check AI agent runs"
- id: defensive-security-scanner-detecting-phrase
  desc: Defensive security scanner detecting phrase
  for:
  - python
  crit: component
  conf: 0.94
  if:
    type: text
    regex: "(?i)scanner (module )?for detecting"
- id: defensive-security-risk-target-phrase
  desc: Defensive security-risk target phrase
  for:
  - python
  crit: component
  conf: 0.94
  if:
    type: text
    regex: "(?i)security risks|permission violations|prompt injection"
- id: risk-definition-constructor-call
  desc: Risk definition constructor call
  for:
  - python
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: RiskDefinition
- id: agent-risk-classifier-function
  desc: Agent action risk classifier function
  crit: component
  conf: 0.9
  for:
  - python
  if:
    type: function
    exact: classify_all
- id: agent-risk-category-table
  desc: Agent action risk category table
  crit: component
  conf: 0.9
  for:
  - python
  if:
    type: text
    regex: 'secret-read.{0,500}network-egress.{0,500}fs-destructive'
- id: scanner-module-field
  desc: Scanner module assignment field
  for:
  - python
  crit: component
  conf: 0.9
  if:
    type: text
    substr: scanner_modules=[ScannerModule.
- id: skilltotal-scanner-module-path
  desc: SkillTotal scanner module path
  for:
  - python
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '(^|[\\/])skilltotal[\\/]'
- id: pymaxim-safety-module-path
  desc: PyMaxim safety scanner module path
  for:
  - python
  crit: component
  conf: 0.95
  if:
    type: path
    regex: '(^|[\\/])maxim[\\/]'
- id: evidence-collector-captured-fields
  desc: Collector ID or captured-artifact field
  crit: component
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: "\\b(collector_id|captured_artifacts?)\\b"
- id: companion-collector-doc
  desc: Companion collector documentation
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Companion collector
- id: security-posture-scanner-doc
  desc: Security posture scanner documentation
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: security posture signals|All discovery is read-only|Environment scanner
- id: wpsecscan-package-summary
  desc: WPSecScan defensive package metadata
  for:
  - pkginfo
  crit: component
  conf: 0.98
  if:
    type: value
    path: summary
    regex: Defensive WordPress security scanner.*Authorized testing only
- id: wpsecscan-check-module
  desc: WPSecScan check module Finding import
  crit: component
  conf: 0.98
  for:
  - python
  if:
    type: text
    regex: from \.\.?models import .{0,120}Finding
- id: wpsecscan-check-signature
  desc: WPSecScan check module function signature
  crit: component
  conf: 0.98
  for:
  - python
  if:
    type: text
    regex: def\s+check\s*\(\s*client:\s*Client,\s*ctx:\s*dict\s*\)\s*->\s*list\[Finding\]
- id: wpsecscan-cli-context
  desc: WPSecScan CLI/module text context
  crit: notable
  conf: 0.96
  for:
  - python
  if:
    type: text
    regex: wpsecscan\s+(--daemon|scan-zip)|python -m wpsecscan
- id: wordpress-security-plugin-header
  desc: WordPress security plugin metadata
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    regex: "\\*\\s*Plugin Name:.{0,120}(security|firewall|malware|scanner)"
    case_insensitive: true
- id: wordpress-malware-scanner-class
  desc: WordPress malware scanner class
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    regex: "\\bclass[-_ ]?(malware|file|password|user)[-_ ]?scanner\\b"
    case_insensitive: true
- id: wordpress-yara-signature-scanner
  desc: WordPress YARA signature scanner
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    regex: "\\b(yara[-_ ]?scanner|signature[-_ ]?sync)\\b"
    case_insensitive: true
- id: wordpress-threat-pattern-catalog
  desc: WordPress threat pattern catalog
  crit: component
  conf: 0.95
  for:
  - php
  if:
    type: text
    regex: "rule_id.{0,160}(webshell|backdoor|malware|signature)"
    case_insensitive: true
- id: wordpress-strong-password-validator
  desc: WordPress strong password validator
  crit: component
  conf: 0.95
  for:
  - php
  if:
    type: text
    regex: "\\b(Strong[_ ]Password[_ ]Validator|weak_passwords|blocked_words)\\b"
    case_insensitive: true
- id: wordpress-password-security-scanner
  desc: WordPress password security scanner
  crit: component
  conf: 0.95
  for:
  - php
  if:
    type: text
    regex: "\\b(common_weak_passwords|password strength|most common passwords)\\b"
    case_insensitive: true
- id: secret-pattern-description-field
  desc: Secret scanner description field
  crit: component
  conf: 0.95
  if:
    type: text
    regex: description:\s*".{0,120}"
- id: secret-redactor-suggest-field
  desc: Secret redactor env-var remediation suggestion
  crit: component
  conf: 0.92
  count_min: 3
  if:
    type: text
    regex: suggest:\s*['"]process\.env\.
- id: secret-redactor-symbols
  desc: Secret redactor / leak-scanner function names
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\b(redactString|redactSecrets?|sanitizePayload)\\b"
- id: secret-pattern-severity-field
  desc: Secret scanner severity field
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'severity\s*:'
- id: secret-pattern-private-key-label
  desc: Secret scanner private-key label
  crit: component
  conf: 0.95
  if:
    type: text
    regex: Private Key|Secret Key
- id: secret-pattern-token-label
  desc: Secret scanner token label
  crit: component
  conf: 0.95
  if:
    type: text
    regex: Personal Access Token|Service Account Key|Access Key ID
- id: defensive-command-blocklist--blocked-commands
  desc: Defensive dangerous command (BLOCKED_COMMANDS)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: BLOCKED_COMMANDS
- id: defensive-command-blocklist--blocked-command-patterns
  desc: Defensive dangerous (BLOCKED_COMMAND_PATTERNS)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: BLOCKED_COMMAND_PATTERNS
- id: defensive-risky-command-pattern-registry
  desc: Defensive risky-command pattern registry
  crit: notable
  conf: 0.98
  for: [python]
  if:
    type: symbol
    exact: _RISKY_PATTERNS.append
- id: defensive-threat-signature-vars--mining-signatures
  desc: Defensive threat signature (MINING_SIGNATURES)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: MINING_SIGNATURES
- id: defensive-threat-signature-vars--trojan-signatures
  desc: Defensive threat signature (TROJAN_SIGNATURES)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: TROJAN_SIGNATURES
- id: defensive-threat-signature-vars--threat-signatures
  desc: Defensive threat signature (_THREAT_SIGNATURES)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: _THREAT_SIGNATURES
- id: defensive-threat-pattern-vars--threat-patterns
  desc: Defensive threat pattern (_THREAT_PATTERNS)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: _THREAT_PATTERNS
- id: defensive-threat-pattern-vars--threat-patterns-2
  desc: Defensive threat pattern (THREAT_PATTERNS)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: THREAT_PATTERNS
- id: defensive-malicious-pattern-audit-list--malicious-patterns
  desc: Defensive malicious-pattern (MALICIOUS_PATTERNS)
  crit: component
  conf: 0.95
  for:
  - python
  if:
    type: text
    word: MALICIOUS_PATTERNS
- id: defensive-malicious-pattern-audit-list--audit-source-code
  desc: Defensive malicious-pattern (audit_source_code)
  crit: component
  conf: 0.95
  for:
  - python
  if:
    type: text
    word: audit_source_code
- id: defensive-malicious-pattern-audit-list--audit-network-permissions
  desc: Defensive (audit_network_permissions)
  crit: component
  conf: 0.95
  for:
  - python
  if:
    type: text
    word: audit_network_permissions
- id: defensive-prompt-pattern-table--prompt-injection-ignore
  desc: Defensive prompt (prompt_injection_ignore)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: prompt_injection_ignore
- id: defensive-prompt-pattern-table--deception-hide
  desc: Defensive prompt pattern table (deception_hide)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: deception_hide
- id: defensive-prompt-pattern-table--sys-prompt-override
  desc: Defensive prompt pattern (sys_prompt_override)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: sys_prompt_override
- id: defensive-prompt-pattern-table--disregard-rules
  desc: Defensive prompt pattern table (disregard_rules)
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    word: disregard_rules
- id: evidence-collector-artifacts--signal-overrides
  desc: Defensive evidence collector (signal_overrides)
  crit: component
  conf: 0.95
  if:
    type: text
    word: signal_overrides
- id: evidence-collector-artifacts--precondition-checks
  desc: Defensive evidence (precondition_checks)
  crit: component
  conf: 0.95
  if:
    type: text
    word: precondition_checks
- id: evidence-collector-artifacts--collector-meta
  desc: Defensive evidence collector (collector_meta)
  crit: component
  conf: 0.95
  if:
    type: text
    word: collector_meta
- id: evidence-collector-artifacts--collector-errors
  desc: Defensive evidence collector (collector_errors)
  crit: component
  conf: 0.95
  if:
    type: text
    word: collector_errors
- id: security-playbook-artifacts--playbook-id
  desc: Security playbook artifact catalog (playbook_id)
  crit: component
  conf: 0.9
  if:
    type: text
    word: playbook_id
- id: security-playbook-artifacts--false-positive-checks-required
  desc: Security (false_positive_checks_required)
  crit: component
  conf: 0.9
  if:
    type: text
    word: false_positive_checks_required
- id: wordpress-suspicious-file-patterns--suspicious-patterns
  desc: WordPress suspicious file (suspicious_patterns)
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    case_insensitive: true
    word: suspicious_patterns
- id: wordpress-suspicious-file-patterns--should-exclude-scanner-target
  desc: WordPress (should_exclude_scanner_target)
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    case_insensitive: true
    word: should_exclude_scanner_target
- id: wordpress-issue-type-catalog--type-webshell
  desc: WordPress malware issue type (TYPE_WEBSHELL)
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    word: TYPE_WEBSHELL
- id: wordpress-issue-type-catalog--type-backdoor
  desc: WordPress malware issue type (TYPE_BACKDOOR)
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    word: TYPE_BACKDOOR
- id: wordpress-issue-type-catalog--type-malware
  desc: WordPress malware issue type (TYPE_MALWARE)
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    word: TYPE_MALWARE
- id: wordpress-issue-type-catalog--type-trojan
  desc: WordPress malware issue type (TYPE_TROJAN)
  crit: component
  conf: 0.94
  for:
  - php
  if:
    type: text
    word: TYPE_TROJAN
- id: push-guard-private-path-catalog
  desc: Push Guard private path rule catalog
  crit: component
  conf: 0.99
  for:
  - python
  if:
    type: text
    regex: '\bPRIVATE_PATH_DEFAULTS\s*=\s*\['
- id: push-guard-git-scan-functions
  desc: Push Guard Git push scanning functions
  crit: component
  conf: 0.99
  for:
  - python
  if:
    type: text
    regex: '\bdef\s+scan_git_(push|range)\s*\('
composite_rules:
- id: code-pattern-catalog
  desc: Defensive source-code execution pattern catalog
  crit: notable
  conf: 0.98
  for:
  - python
  all:
  - id: code-critical-pattern-constant
  - id: code-high-pattern-constant
- id: auditr-defensive-signature-catalog
  desc: auditr defensive signature catalog context
  crit: notable
  conf: 0.99
  for:
  - python
  # The legs moved to well-known/tool/detection/auditr/signatures — one ML path
  # feature per tool, and this directory was at the 80-trait cap. The composite keeps
  # its id here because 43 unless:/downgrade: clauses reference it by this path.
  any:
  - id: well-known/tool/detection/auditr/signatures
- id: defensive-command-blocklist
  desc: Defensive dangerous command blocklist
  crit: component
  conf: 0.95
  any:
  - id: defensive-command-blocklist--blocked-commands
  - id: defensive-command-blocklist--blocked-command-patterns
- id: defensive-threat-signature-vars
  desc: Defensive threat signature variables
  crit: component
  conf: 0.95
  any:
  - id: defensive-threat-signature-vars--mining-signatures
  - id: defensive-threat-signature-vars--trojan-signatures
  - id: defensive-threat-signature-vars--threat-signatures
- id: defensive-threat-pattern-vars
  desc: Defensive threat pattern variables
  crit: component
  conf: 0.95
  any:
  - id: defensive-threat-pattern-vars--threat-patterns
  - id: defensive-threat-pattern-vars--threat-patterns-2
- id: defensive-malicious-pattern-audit-list
  desc: Defensive malicious-pattern audit list
  crit: component
  conf: 0.95
  for:
  - python
  any:
  - id: defensive-malicious-pattern-audit-list--malicious-patterns
  - id: defensive-malicious-pattern-audit-list--audit-source-code
  - id: defensive-malicious-pattern-audit-list--audit-network-permissions
- id: defensive-prompt-pattern-table
  desc: Defensive prompt pattern table
  crit: component
  conf: 0.95
  any:
  - id: defensive-prompt-pattern-table--prompt-injection-ignore
  - id: defensive-prompt-pattern-table--deception-hide
  - id: defensive-prompt-pattern-table--sys-prompt-override
  - id: defensive-prompt-pattern-table--disregard-rules
- id: evidence-collector-artifacts
  desc: Defensive evidence collector artifacts
  crit: component
  conf: 0.95
  any:
  - id: evidence-collector-artifacts--signal-overrides
  - id: evidence-collector-artifacts--precondition-checks
  - id: evidence-collector-artifacts--collector-meta
  - id: evidence-collector-artifacts--collector-errors
- id: push-guard-defensive-context
  desc: Push Guard read-only secret scanning context
  crit: component
  conf: 0.99
  for:
  - python
  all:
  - id: push-guard-private-path-catalog
  - id: push-guard-git-scan-functions
- id: security-playbook-artifacts
  desc: Security playbook artifact catalog
  crit: component
  conf: 0.9
  any:
  - id: security-playbook-artifacts--playbook-id
  - id: security-playbook-artifacts--false-positive-checks-required
- id: wordpress-suspicious-file-patterns
  desc: WordPress suspicious file pattern catalog
  crit: component
  conf: 0.94
  for:
  - php
  any:
  - id: wordpress-suspicious-file-patterns--suspicious-patterns
  - id: wordpress-suspicious-file-patterns--should-exclude-scanner-target
- id: wordpress-issue-type-catalog
  desc: WordPress malware issue type catalog
  crit: component
  conf: 0.94
  for:
  - php
  any:
  - id: wordpress-issue-type-catalog--type-webshell
  - id: wordpress-issue-type-catalog--type-backdoor
  - id: wordpress-issue-type-catalog--type-malware
  - id: wordpress-issue-type-catalog--type-trojan
- id: defensive-sensitive-dir-denylist
  desc: Defensive sensitive-directory denylist guard
  crit: component
  conf: 0.9
  any:
  - id: sensitive-dir-guard-comment
  - id: credential-dir-denylist-phrase
  - id: credential-stripping-sandbox-env
- id: secret-pattern-scanner-db
  desc: Secret-detection pattern database
  crit: component
  conf: 0.95
  all:
  - id: secret-pattern-description-field
  - id: secret-pattern-severity-field
  any:
  - id: secret-pattern-private-key-label
  - id: secret-pattern-token-label
- id: defensive-security-scanner-module-doc
  desc: Defensive security scanner module documentation
  crit: component
  conf: 0.94
  all:
  - id: defensive-security-scanner-detecting-phrase
  - id: defensive-security-risk-target-phrase
- id: secret-redactor-context
  desc: Secret-leak redactor / sanitizer tool context
  crit: component
  conf: 0.95
  any:
  - id: secret-redactor-suggest-field
  - id: secret-redactor-symbols
  - id: secret-pattern-scanner-db
- id: defensive-scanner-tool-context
  desc: Defensive secret/threat scanner or sandbox context
  for:
  - binaries
  - scripts
  - source
  - documents
  - pkginfo
  crit: component
  conf: 0.95
  unless:
  - id: well-known/lib/sentry-js::sentry-js-sdk
  any:
  - id: security-risk-validator-package-summary
  - id: ai-policy-checker-package-summary
  - id: well-known/tool/detection/sast::sast-scanner-integration
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
  - id: defensive-threat-signatures
  - id: defensive-security-scanner-module-doc
  - id: skilltotal-scanner-module-path
  - id: pymaxim-safety-module-path
  - id: defensive-risk-definition-catalog
  - id: defensive-risky-command-pattern-registry
  - id: defensive-sensitive-dir-denylist
  - id: secret-redactor-context
  - id: push-guard-defensive-context
