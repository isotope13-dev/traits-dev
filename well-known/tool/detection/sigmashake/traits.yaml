# SigmaShake Governance — a proprietary LLM / AI-agent guardrail & governance
# product shipped as native binaries (`ssg`, `ssg-eval-server`,
# `ssg-audit-server`, `ssg-hook-fast`, `libssg_eval.dylib`). It is a defensive
# security tool: it runs a local evaluation daemon (`~/.sigmashake/evald.sock`),
# hard-blocks tampering with its own governance rules, and — like any firewall —
# embeds the threats it inspects (scanner-context-inversion). The product
# strings sit in read-only data; used as a benign `unless:` context (e.g. its
# hook forks/setsid's to manage the eval daemon, not for persistence).
defaults:
  platforms: [unix, windows]
  for: [macho]
  crit: baseline
  conf: 0.97
traits:
  - id: sigmashake-governance-marker
    desc: SigmaShake Governance tool marker
    size_min: 65536
    if:
      type: text
      regex: '(?i)sigmashake|ssg-(eval|audit|hook)'
      section: const
