defaults:
  platforms:
  - windows
  - unix
  for:
  - python
  size_max: 5000000
traits:
- id: pipguard-scanner-credential-path-catalog
  desc: pipguard scanner credential-path catalog
  crit: component
  conf: 0.99
  if:
    type: text
    substr: 'CREDENTIAL_PATHS = ['
- id: pipguard-scanner-shell-signature-catalog
  desc: pipguard scanner shell-call signature catalog
  crit: component
  conf: 0.99
  if:
    type: text
    substr: '_SHELL_EXEC_FUNCS = frozenset({'
- id: pipguard-scanner-analysis-entrypoints
  desc: pipguard scanner AST analysis entrypoints
  crit: component
  conf: 0.99
  if:
    type: text
    regex: '\bdef\s+scan_(pth|python)_file\s*\('
composite_rules:
- id: pipguard-defensive-scanner-source
  desc: pipguard defensive Python package scanner source
  crit: component
  conf: 0.99
  all:
  - id: pipguard-scanner-credential-path-catalog
  - id: pipguard-scanner-shell-signature-catalog
  - id: pipguard-scanner-analysis-entrypoints
