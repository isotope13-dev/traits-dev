defaults:
  platforms: [linux, macos, windows]
  for: [archive, go, github-actions, shell, json, data, text]
  crit: notable
  conf: 0.98
  size_max: 524288000

traits:
  - id: stackrox-source-path
    desc: StackRox source archive path
    if:
      type: path
      substr: github.com-stackrox-stackrox-
  - id: stackrox-go-module
    desc: StackRox Go module path
    if:
      type: text
      substr: github.com/stackrox/stackrox
  - id: stackrox-security-test-artifacts
    desc: StackRox bundled security-test artifacts
    crit: component
    if:
      type: path
      substr: qa-tests-backend/artifacts

composite_rules:
  - id: stackrox-security-platform
    desc: StackRox security platform source
    crit: notable
    conf: 0.99
    any:
      - id: stackrox-source-path
      - id: stackrox-go-module
  - id: stackrox-defensive-test-corpus
    desc: StackRox defensive security-test corpus
    crit: notable
    conf: 0.99
    all:
      - id: stackrox-security-platform
      - id: stackrox-security-test-artifacts
