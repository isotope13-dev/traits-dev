defaults:
  platforms: [windows, unix]
  for: [wasm]
  size_max: 5000000

traits:
- id: authenticated-encryption-recommendation
  desc: Recommends authenticated encryption
  crit: component
  conf: 0.98
  if:
    type: text
    substr: Replace with ChaCha20-Poly1305 or AES-256-GCM
- id: unprivileged-container-recommendation
  desc: Recommends unprivileged container mode
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "Remove privileged: true"

composite_rules:
- id: compiled-remediation-catalog
  desc: Compiled defensive remediation catalog
  crit: notable
  conf: 0.99
  all:
  - id: authenticated-encryption-recommendation
  - id: unprivileged-container-recommendation
