defaults:
  platforms:
  - windows
  - unix
  for:
  - python
  - pkginfo
  - whl
  crit: notable
  conf: 0.99

traits:
- id: source-tree-member
  desc: Gung12 DAST scanner source-tree member
  if:
    type: path
    regex: '(^|[\\/])gung12([\\/]|-[0-9])'
- id: package-name
  desc: Gung12 package metadata identity
  for:
  - pkginfo
  if:
    type: value
    path: name
    exact: gung12
