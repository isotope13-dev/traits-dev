# ClawMetry (github.com/vivekchand/clawmetry, clawmetry.com) — a real-time
# observability + security-monitoring tool for AI-agent runtimes (OpenClaw,
# NemoClaw, Claude Code, Codex, …). Like any security scanner it legitimately
# CONTAINS the threat patterns it detects: its `security_threat_heuristics`
# module ships cryptominer-pool, reverse-shell, disk-wipe and credential-path
# signatures, and its test suite feeds malicious-command fixtures
# (`_scan([_ev("./xmrig --pool stratum+tcp://pool.minexmr.com:4444 …")])`) to
# verify detection. It also reads /proc to discover which agent runtimes are
# running, installs its own `clawmetry-sync` telemetry daemon, and fingerprints
# the runtime — observability, not payload. Used as an `unless:` context to mute
# scanner-context-inversion FPs. Requires 2+ identifying markers so a typosquat
# can't trivially borrow the name.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: clawmetry-package-name
    desc: ClawMetry package/product name
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '(?i)\bclawmetry\b'
  - id: clawmetry-package-name-repeated
    desc: ClawMetry package name referenced repeatedly
    crit: component
    conf: 0.85
    count_min: 3
    if:
      type: text
      regex: '(?i)\bclawmetry\b'
  - id: clawmetry-internal-import
    desc: Imports from the clawmetry package
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(from\s+clawmetry|import\s+clawmetry)\b'
  - id: clawmetry-sync-service
    desc: clawmetry-sync telemetry service
    crit: component
    conf: 0.8
    if:
      type: text
      substr: clawmetry-sync
  - id: clawmetry-observability-identity
    desc: ClawMetry AI-agent observability identity
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'observability for .{0,24}AI agent runtimes'
  - id: clawmetry-threat-heuristics-scanner
    desc: ClawMetry security threat-heuristics scanner
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'security_threat_heuristics|_scan\(\s*\[\s*_ev\('
composite_rules:
  - id: clawmetry-tool
    desc: ClawMetry observability/security tool context
    crit: component
    conf: 0.95
    # Each leg is specific to ClawMetry's own code/identity (the exact summary
    # phrase, the `clawmetry-sync` service, the threat-heuristics scanner-test
    # shape) — a typosquat would have to copy the source to match. The bare
    # `clawmetry` package-name alone is intentionally NOT sufficient.
    any:
      - id: clawmetry-sync-service
      - id: clawmetry-observability-identity
      - id: clawmetry-threat-heuristics-scanner
      # A file that imports clawmetry, or names it 3+ times, is part of the
      # package — a typosquat of a DIFFERENT package would not.
      - id: clawmetry-internal-import
      - id: clawmetry-package-name-repeated
      - id: clawmetry-package-name-strong
  - id: clawmetry-package-name-strong
    desc: ClawMetry package name with a corroborating marker
    crit: component
    conf: 0.9
    all:
      - id: clawmetry-package-name
    any:
      - id: clawmetry-sync-service
      - id: clawmetry-observability-identity
      - id: clawmetry-threat-heuristics-scanner
