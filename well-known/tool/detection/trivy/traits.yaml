defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, apk, pkginfo, text]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 524288000

traits:
  - id: trivy-package-name
    desc: Trivy package name
    if:
      type: path
      substr: trivy-
  - id: trivy-go-module
    desc: Trivy Go module path
    if:
      type: text
      substr: github.com/aquasecurity/trivy

composite_rules:
  - id: trivy-scanner
    desc: Trivy vulnerability scanner
    crit: notable
    conf: 0.98
    any:
      - id: trivy-package-name
      - id: trivy-go-module
