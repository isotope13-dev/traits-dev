defaults:
  platforms: [windows, unix]
  for: [pe, elf, macho, shell, python, javascript, typescript, rust, go]
  size_max: 2000000
  crit: component
  conf: 0.96

traits:
  - id: watchmen-secret-rule-marker
    desc: Watchmen secret-rule output marker
    if:
      type: text
      substr: watchmenSecretRule/v1
  - id: watchmen-policy-rule-marker
    desc: Watchmen policy-rule output marker
    if:
      type: text
      substr: watchmenPolicyRule/v1
  - id: watchmen-secrets-evaluate-hook
    desc: Watchmen secrets evaluate pre-commit hook text
    if:
      type: text
      substr: wm secrets evaluate
  - id: watchmen-security-posture-tools
    desc: Watchmen local security posture tool catalog
    if:
      type: text
      regex: 'security-posture.{0,80}network-exposure.{0,80}secrets-rotation'
  - id: watchmen-brand-url
    desc: WatchmenCLI brand URL
    if:
      type: text
      substr: https://trywatchmen.cloud

composite_rules:
  - id: watchmen-cli-context
    desc: WatchmenCLI defensive machine audit and secret scanner
    crit: component
    conf: 0.98
    all:
      - id: watchmen-brand-url
    any:
      - id: watchmen-secret-rule-marker
      - id: watchmen-policy-rule-marker
      - id: watchmen-secrets-evaluate-hook
      - id: watchmen-security-posture-tools
