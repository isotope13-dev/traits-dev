defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.96
  size_max: 2097152

traits:
  - id: package-name
    desc: WPSecScan package metadata name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: wpsecscan

  - id: defensive-summary
    desc: WPSecScan defensive scanner package summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      regex: 'Defensive WordPress security scanner.*Authorized testing only'

  - id: scanner-keywords
    desc: WPSecScan package security scanner keywords
    for: [pkginfo]
    if:
      type: value
      path: keywords
      regex: 'wordpress,security,scanner,pentest,defensive'

  - id: package-path
    desc: WPSecScan Python package path
    for: [python]
    if:
      type: path
      regex: 'wpsecscan[\\/]'

  - id: user-agent
    desc: WPSecScan HTTP user-agent string
    for: [python]
    if:
      type: string_literal
      substr: WPSecScan/

  - id: finding-model
    desc: WPSecScan Finding model usage
    for: [python]
    if:
      type: text
      regex: '(from \.\.?models import .{0,120}Finding|Finding\(\s*severity=)'

  - id: wpsecscan-env
    desc: WPSecScan environment variable namespace
    for: [python]
    if:
      type: text
      regex: '\bWPSECSCAN_[A-Z0-9_]+\b'

composite_rules:
  - id: package-context
    desc: WPSecScan package metadata context
    crit: component
    conf: 0.98
    all:
      - id: package-name
      - id: defensive-summary
      - id: scanner-keywords

  - id: runtime-context
    desc: WPSecScan runtime module context
    crit: component
    conf: 0.98
    any:
      - id: check-module-context
      - id: wpsecscan-env
      - id: user-agent
      - id: package-path

  - id: check-module-context
    desc: WPSecScan check module context
    crit: component
    conf: 0.98
    all:
      - id: finding-model
      - id: well-known/tool/detection/security-scanner::wpsecscan-check-signature

  - id: defensive-scanner-context
    desc: WPSecScan defensive WordPress scanner context
    crit: notable
    conf: 0.98
    any:
      - id: package-context
      - id: runtime-context
