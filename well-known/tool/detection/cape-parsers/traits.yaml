# CAPE — Malware Configuration Extraction (capesandbox.com).
# Positive identification of the CAPE config-parser library / its parser files.
defaults:
  platforms: [unix, windows]
  for: [python, pkginfo]
  size_max: 2000000
traits:
  - id: capesandbox-marker
    desc: CAPE sandbox project marker
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'capesandbox\.com|CAPE:\s*Malware Configuration|/opt/CAPEv2\b'
