defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, markdown, package.json, github-actions]
  crit: baseline
  conf: 0.96
  size_max: 10485760

traits:
  - id: agent-gate-package-name
    desc: Agent Gate package name
    if:
      type: text
      substr: Agent Gate

  - id: agent-gate-action-description
    desc: Agent Gate action description
    if:
      type: text
      substr: Deterministic CI firewall for AI-generated pull requests

  - id: agent-gate-dist-path
    desc: Agent Gate action dist path
    for: [javascript]
    if:
      type: path
      regex: 'action[\\/]dist[\\/]index\.cjs$'

composite_rules:
  - id: agent-gate-tool-context
    desc: Agent Gate defensive CI tool
    any:
      - id: agent-gate-action-description
      - id: agent-gate-package-name
      - id: agent-gate-dist-path
