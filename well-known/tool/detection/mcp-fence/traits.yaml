defaults:
  platforms: [unix, windows]
  for: [python, archives]

# MCP Fence is a defensive MCP security scanner. Its rule catalog and fuzz
# fixtures intentionally contain the same command and credential strings that
# the scanner is designed to report. Keep that product identity available as
# benign context so those catalog entries are not mistaken for executed
# downloaders or harvested credentials.
traits:
- id: rule-catalog
  desc: MCP Fence scanner rule catalog
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: text
    word: RULE_CATALOG
- id: start-pattern-catalog
  desc: MCP Fence dangerous-start catalog
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: text
    word: DANGEROUS_START_PATTERNS
- id: secret-fixture-markers
  desc: MCP Fence fake-secret fixtures
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: text
    word: _FAKE_SECRET_MARKERS
- id: secret-search-import
  desc: MCP Fence secret scanner import
  crit: notable
  conf: 0.99
  for: [python]
  if:
    type: import
    exact: find_secrets

composite_rules:
- id: rule-catalog-context
  desc: MCP Fence rule catalog context
  crit: notable
  conf: 0.99
  scope: archive
  all:
  - id: well-known/tool/detection/mcp-fence::rule-catalog
  - id: well-known/tool/detection/mcp-fence::start-pattern-catalog
- id: secret-fixture-context
  desc: MCP Fence secret fixture context
  crit: notable
  conf: 0.99
  scope: archive
  all:
  - id: well-known/tool/detection/mcp-fence::secret-fixture-markers
  - id: well-known/tool/detection/mcp-fence::secret-search-import
- id: context
  desc: Recognized MCP Fence defensive scanner
  crit: notable
  conf: 0.99
  scope: archive
  any:
  - id: well-known/tool/detection/mcp-fence::rule-catalog-context
  - id: well-known/tool/detection/mcp-fence::secret-fixture-context
