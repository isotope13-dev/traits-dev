defaults:
  platforms:
  - windows
  - unix
  for:
  - binaries
  - scripts
  - source
  crit: component
  conf: 0.7
  size_max: 5000000
traits:
- id: protected-process-light-keyword
  desc: Protected Process Light / PPL keyword
  if:
    type: text
    regex: "(?i)\\bProtected Process Light\\b"
- id: edr-keyword
  desc: EDR / endpoint detection keyword
  if:
    type: text
    regex: "(?i)\\b(endpoint detection|EDR (agent|driver|service))\\b"
- id: antivirus-keyword
  desc: antivirus keyword
  if:
    type: text
    regex: "(?i)\\b(antivirus (software|product|service|engine))\\b"
