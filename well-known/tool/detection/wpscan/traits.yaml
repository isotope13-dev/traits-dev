defaults:
  platforms: [unix, windows]
  for: [ruby, gem]
  crit: component
  conf: 0.95

traits:
  - id: gem-package-name
    desc: WPScan gem package name
    for: [gem]
    if:
      type: text
      regex: '^name:\s+wpscan$'

  - id: module-namespace
    desc: WPScan Ruby namespace
    for: [ruby]
    if:
      type: text
      substr: module WPScan

  - id: cli-binary-path
    desc: WPScan CLI binary path
    for: [ruby]
    if:
      type: path
      regex: '(^|[\\/])bin[\\/]wpscan$'

  - id: wordpress-scanner-text
    desc: WordPress scanner wording
    if:
      type: text
      regex: 'WPScan|WordPress security scanner|WordPress vulnerability scanner'

composite_rules:
  - id: wpscan-tool-context
    desc: WPScan WordPress scanner context
    crit: notable
    conf: 0.98
    any:
      - id: gem-package-name
      - id: cli-binary-path
      - id: wordpress-scanner-text
    all:
      - id: module-namespace
