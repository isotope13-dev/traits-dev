defaults:
  platforms: [unix]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: source-path
    desc: Cilium Tetragon source tree
    for: [source, scripts, manifests, documents, data, archives, binaries]
    if:
      type: path
      substr: github.com/cilium/tetragon@
  - id: generated-vmlinux-header
    desc: Tetragon generated vmlinux header
    for: [c, cpp, data]
    if:
      type: path
      substr: vmlinux_generated_

composite_rules:
  - id: tetragon-source-context
    desc: Cilium Tetragon eBPF security source
    crit: notable
    conf: 0.98
    any:
      - id: source-path
      - id: generated-vmlinux-header
