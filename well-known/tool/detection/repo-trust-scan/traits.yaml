defaults:
  platforms: [windows, unix]
  for: [scripts, source, documents]
  size_max: 5000000

traits:
- id: repo-trust-scan-wheel-distribution
  desc: repo-trust-scan wheel distribution
  crit: notable
  conf: 0.99
  for: [whl]
  if:
    type: value
    path: whl.distribution
    exact: repo_trust_scan
- id: repo-trust-scan-rules-table
  desc: repo-trust-scan rules table
  crit: component
  conf: 0.99
  for: [python]
  if:
    type: text
    regex: '\bRULES\s*:\s*dict\[str,\s*Rule\]'
- id: repo-trust-scan-download-rule
  desc: repo-trust-scan download rule catalog
  crit: component
  conf: 0.99
  for: [python]
  if:
    type: text
    regex: '\bDOWNLOAD_EXEC\s*=\s*re\.compile'

composite_rules:
- id: repo-trust-scan-source-context
  desc: repo-trust-scan source scanner context
  crit: notable
  conf: 0.99
  for: [python]
  all:
  - id: repo-trust-scan-rules-table
  - id: repo-trust-scan-download-rule
- id: repo-trust-scan-context
  desc: repo-trust-scan defensive scanner context
  crit: notable
  conf: 0.99
  for: [python, whl]
  any:
  - id: repo-trust-scan-wheel-distribution
  - id: repo-trust-scan-source-context
