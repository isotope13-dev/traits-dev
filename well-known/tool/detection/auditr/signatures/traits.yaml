# auditr's scan tables trip the very behaviors they hunt for, so these traits mark the
# modules that hold them. They feed the composite
#   well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
# which 43 unless:/downgrade: clauses across the repo reference; the composite keeps
# its id there, and pulls these in by directory notation.
#
# Kept separate from ../identity so the suppressor means exactly what its name says —
# "a file holding auditr's signature tables" — rather than "any file of auditr's".
# Each trait anchors on its own module's docstring.
defaults:
  platforms: [windows, linux, macos]
  for: [python]
  crit: component
  conf: 0.99
  size_max: 5000000

traits:
  - id: auditr-malware-signature-module
    desc: auditr malware signature catalog module
    if:
      type: text
      substr: Language-agnostic malware signatures
  - id: auditr-malware-detector-module
    desc: auditr malware detector module
    if:
      type: text
      substr: Shell malware detectors
  - id: auditr-python-malware-detector
    desc: auditr Python malware detector implementation
    if:
      type: text
      substr: These fire on the *combination*
  - id: auditr-secret-signature-catalog
    desc: auditr committed-secret signature catalog
    if:
      type: text
      substr: comprehensive catalog of committed-secret signatures
  - id: auditr-supply-chain-detector
    desc: auditr supply-chain detector implementation
    if:
      type: text
      substr: class SetupPyExec
  # The five legs above name only the modules an older auditr layout had. This
  # release moved its tables and detectors, so the inversion FPs resurfaced: the
  # sweep bases hold the miner / credential-path regexes, the security and config
  # detectors hold the API names they match on ("ssl._create_unverified_context",
  # "os.popen", "shell=True"), and the config auditor holds the secret-file glob
  # list (.npmrc / .pypirc / .netrc).
  - id: auditr-malware-sweep-bases
    desc: auditr malware string-sweep rule bases
    if:
      type: text
      substr: Shared malware string-sweep rule bases
  - id: auditr-string-literal-sweep
    desc: auditr cross-language string-sweep module
    if:
      type: text
      substr: Cross-language string-literal sweeps
  - id: auditr-typescript-malware-detector
    desc: auditr TypeScript malware detector module
    if:
      type: text
      substr: TypeScript/JavaScript malware detectors
  - id: auditr-network-security-detector
    desc: auditr transport security detector module
    if:
      type: text
      substr: Transport & network security detectors
  - id: auditr-injection-security-detector
    desc: auditr injection detector module
    if:
      type: text
      substr: Injection & code-execution security detectors
  - id: auditr-config-category-detector
    desc: auditr config-category detector module
    if:
      type: text
      substr: 'Config-category detectors: ad-hoc env reads'
  - id: auditr-config-file-auditor
    desc: auditr config-file detector module
    if:
      type: text
      substr: runs the config-file detectors over data files
  # Not a malware detector, but the same inversion: it holds a table of
  # side-effecting call names ("subprocess.call", "os.system", "os.popen") used to
  # recognize an orchestrator function, so the table reads as the calls themselves.
  - id: auditr-orchestration-detector
    desc: auditr orchestration detector module
    if:
      type: text
      substr: Orchestration-layer detectors
