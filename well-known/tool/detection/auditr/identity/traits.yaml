# auditr — a deterministic code auditor for coding agents and CI (PyPI dist "auditr",
# import package "auditor"). Filed under detection/ rather than development/ because
# what the package *does* is scan: it ships cross-language malware sweeps, a
# committed-secret signature catalog, supply-chain detectors, and ClamAV/osv-scanner
# backends.
#
# Identity is anchored on package-unique CONTENT, never on a module path alone. The
# identity traits previously keyed on `malware/install.py` and `cli/self_update.py` —
# paths any project may have — so a real dropper dropped at malware/install.py was
# reported as "Auditr malware scanner module" at conf 0.98. A well-known/ fingerprint
# asserts a product identity, so it must match something only that product has.
defaults:
  platforms: [windows, linux, macos]
  for: [whl, python, pyc]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 150000000

traits:
  # --- package identity ---
  - id: package-name
    desc: Auditr package name metadata
    for: [whl]
    if:
      type: text
      regex: '(?m)^Name:\s*auditr\s*$'
  - id: auditor-summary
    desc: Auditr deterministic auditor summary
    for: [whl]
    if:
      type: text
      substr: A deterministic codebase auditor

  # --- module identity (content-anchored) ---
  # The dist-name-bearing PyPI release endpoint auditr's updater polls: unique to the
  # updater module, and not hit by accident since it names the auditr distribution.
  - id: self-update-module
    desc: Auditr self-update PyPI release endpoint
    for: [python, pyc]
    if:
      type: text
      substr: pypi.org/pypi/auditr/json
  # Named for what the module is — a backend installer. It fetches the pinned,
  # checksum-verified osv-scanner release and scans nothing itself.
  - id: malware-backend-installer
    desc: Auditr osv-scanner backend installer
    for: [python, pyc]
    if:
      type: text
      substr: OSV_PINNED_VERSION
  - id: local-report-server-module
    desc: Auditr loopback-only report server module
    for: [python, pyc]
    if:
      type: text
      substr: Serve a rendered report on an ephemeral localhost port
