defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - source
  size_max: 5000000
traits:
- id: secret-scrub-denylist-fragment
  desc: Secret/auth-header redaction denylist
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)secret\\|token\\|cookie|bearer\\|api[_-]?key"
- id: redacted-replacement-marker
  desc: REDACTED replacement marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: REDACTED
- id: js-sensitive-patterns-object-sensitive
  desc: JavaScript sensitive pattern object
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: bind
    exact: SENSITIVE_PATTERNS
- id: js-sensitive-patterns-object-generic
  desc: JavaScript pattern catalog object
  crit: notable
  conf: 0.82
  for: [javascript, typescript]
  if:
    type: symbol
    kind: bind
    exact: PATTERNS
- id: js-detect-sensitive-patterns-function
  desc: JavaScript sensitive-pattern detector
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: function
    exact: detectSensitivePatterns
- id: js-standalone-secret-matches-function
  desc: JavaScript secret-match detector
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: function
    exact: findStandaloneSecretMatches
- id: js-likely-secret-match-function
  desc: JavaScript secret validator
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: function
    exact: isLikelySecretMatch
- id: js-detect-sensitive-patterns-async-function
  desc: JavaScript async sensitive-pattern detector
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: function
    exact: detectSensitivePatternsAsync
- id: js-redact-sensitive-text-function
  desc: JavaScript sensitive-text redactor
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: function
    exact: redactSensitiveText
- id: js-secret-env-names-catalog
  desc: JavaScript secret environment catalog
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: bind
    exact: SECRET_ENV_NAMES
- id: js-redactable-types-catalog
  desc: JavaScript redactable type catalog
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: bind
    exact: REDACTABLE_TYPES
- id: python-secret-patterns-list
  desc: Python secret regex pattern list
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: symbol
    kind: bind
    exact: _SECRET_PATTERNS
- id: python-sanitizer-function
  desc: Python sensitive-data sanitizer
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: symbol
    kind: function
    exact: sanitize
  unless:
    - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
- id: secret-redaction-layer
  desc: Secret redaction/scrubbing layer
  crit: notable
  conf: 0.92
  all:
  - id: secret-scrub-denylist-fragment
  - id: redacted-replacement-marker
- id: sensitive-data-js-pattern-object
  desc: JavaScript sensitive-data pattern object
  crit: notable
  conf: 0.9
  any:
  - id: js-sensitive-patterns-object-sensitive
  - id: js-sensitive-patterns-object-generic
- id: sensitive-data-js-validator
  desc: JavaScript sensitive-data validator
  crit: notable
  conf: 0.9
  any:
  - id: js-detect-sensitive-patterns-function
  - id: js-standalone-secret-matches-function
  - id: js-likely-secret-match-function
- id: sensitive-data-js-scanner
  desc: JavaScript sensitive-data scanner implementation
  crit: notable
  conf: 0.95
  all:
  - id: sensitive-data-js-pattern-object
  - id: sensitive-data-js-validator
- id: sensitive-data-js-content-scanner
  desc: JavaScript sensitive-data content scanner
  crit: notable
  conf: 0.95
  all:
  - id: js-detect-sensitive-patterns-async-function
  - id: js-redact-sensitive-text-function
- id: sensitive-data-js-redactor
  desc: JavaScript sensitive-data redactor implementation
  crit: notable
  conf: 0.95
  all:
  - id: js-redact-sensitive-text-function
  - id: js-secret-env-names-catalog
  - id: js-redactable-types-catalog
- id: sensitive-data-python-sanitizer
  desc: Python sensitive-data sanitizer implementation
  crit: notable
  conf: 0.95
  all:
  - id: python-secret-patterns-list
  - id: python-sanitizer-function
- id: sensitive-data-scanner
  desc: Sensitive-data scanner or sanitizer
  crit: notable
  conf: 0.95
  any:
  - id: sensitive-data-js-scanner
  - id: sensitive-data-js-content-scanner
  - id: sensitive-data-js-redactor
  - id: sensitive-data-python-sanitizer
