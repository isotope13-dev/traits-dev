defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - source
  size_max: 5000000
traits:
- id: secret-scrub-denylist-fragment
  desc: Secret/auth-header redaction denylist
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)secret\\|token\\|cookie|bearer\\|api[_-]?key"
- id: redacted-replacement-marker
  desc: REDACTED replacement marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: REDACTED
composite_rules:
- id: secret-redaction-layer
  desc: Secret redaction/scrubbing layer
  crit: notable
  conf: 0.92
  all:
  - id: secret-scrub-denylist-fragment
  - id: redacted-replacement-marker
