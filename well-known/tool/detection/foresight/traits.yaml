# Foresight Agent Guard is a defensive, local-first guardrail for AI coding
# agents. Its replay and injection-benchmark modules intentionally attempt
# forbidden reads so the Sentry proxy can prove that the policy blocks them.
defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.98
  size_max: 5000000

traits:
  - id: package-name
    desc: Foresight Agent Guard package metadata name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: foresight-agent-guard

  - id: defensive-summary
    desc: Foresight predictive guardrail package summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      regex: '(?i)predictive cost, policy, and runaway-session guardrails'

  - id: upstream-repository
    desc: Foresight Agent Guard upstream repository
    for: [pkginfo]
    if:
      type: text
      regex: 'github\.com/AmanM006/foresight([/#?]|$)'

  - id: package-source-path
    desc: Foresight Python package source path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])foresight[\\/]'

  - id: blocked-action-exception
    desc: Foresight blocked-action exception
    for: [python]
    if:
      type: text
      substr: SentryBlockedException

  - id: proxy-constructor
    desc: Foresight policy proxy constructor
    for: [python]
    if:
      type: text
      word: create_sentry_proxy

  - id: session-monitor-class
    desc: Foresight session monitor class
    for: [python]
    if:
      type: text
      word: SessionMonitor

  - id: proxy-class
    desc: Foresight Sentry proxy class
    for: [python]
    if:
      type: text
      word: SentryProxy

  - id: environment-namespace
    desc: Foresight runtime environment namespace
    for: [python]
    if:
      type: text
      regex: '\bFORESIGHT_[A-Z0-9_]+\b'

  - id: requests-interception-target
    desc: Foresight HTTP request interception target
    for: [python]
    if:
      type: text
      substr: requests.Session.request

  - id: subprocess-interception-target
    desc: Foresight subprocess interception target
    for: [python]
    if:
      type: text
      substr: subprocess.Popen

  - id: file-interception-target
    desc: Foresight file interception target
    for: [python]
    if:
      type: text
      substr: builtins.open

composite_rules:
  - id: policy-proxy-runtime
    desc: Foresight policy proxy runtime marker
    crit: component
    conf: 0.95
    for: [python]
    any:
      - id: proxy-constructor
      - id: session-monitor-class
      - id: proxy-class

  - id: interception-targets
    desc: Foresight Sentry interception target set
    crit: component
    conf: 0.95
    for: [python]
    any:
      - id: requests-interception-target
      - id: subprocess-interception-target
      - id: file-interception-target

  - id: package-context
    desc: Foresight Agent Guard package identity
    crit: notable
    conf: 0.99
    for: [pkginfo]
    all:
      - id: package-name
      - id: defensive-summary
      - id: upstream-repository

  - id: guardrail-source-context
    desc: Foresight defensive policy-guard source context
    crit: notable
    conf: 0.99
    for: [python]
    all:
      - id: package-source-path
      - id: blocked-action-exception
    any:
      - id: policy-proxy-runtime
      - id: environment-namespace

  - id: sentry-interceptor-context
    desc: Foresight Sentry file and process interception context
    crit: notable
    conf: 0.99
    for: [python]
    all:
      - id: blocked-action-exception
      - id: policy-proxy-runtime
      - id: interception-targets
