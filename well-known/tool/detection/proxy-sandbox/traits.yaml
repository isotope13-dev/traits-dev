defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.95

traits:
  - id: agentcage-pkg-name
    desc: agentcage package metadata
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: agentcage

  - id: agentcage-summary
    desc: agentcage sandbox summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      substr: Defense-in-depth proxy sandbox

  - id: agentcage-config-path
    desc: agentcage config path
    for: [python, shell, dockerfile, pkginfo, markdown]
    if:
      type: text
      regex: '(\.config/agentcage|/etc/agentcage/)'

  - id: agentcage-package-path
    desc: agentcage package path
    for: [python, shell, dockerfile]
    if:
      type: path
      regex: '(^|[\\/!])agentcage[\\/]'

  - id: agentcage-inspector-loader
    desc: agentcage inspector loader
    for: [python]
    if:
      type: text
      substr: AGENTCAGE_INSPECTOR_DIRS

  - id: agentcage-text-context
    desc: agentcage text context
    for: [python, shell, dockerfile, pkginfo, markdown]
    if:
      type: text
      substr: agentcage

  - id: proxy-sandbox-readme
    desc: proxy sandbox readme context
    for: [pkginfo, markdown, text]
    if:
      type: text
      substr: mitmproxy + domain allowlist + inspectors

  - id: proxy-inspector-allowlist
    desc: proxy inspector allowlist context
    for: [python]
    if:
      type: text
      regex: '(host_url_param_allowlist|folder_allowlist|recipient_allowlist|sender_allowlist)'

  - id: google-jwt-bearer-transform
    desc: Google JWT bearer transform
    for: [python]
    if:
      type: text
      substr: google-jwt-bearer

composite_rules:
  - id: agentcage-package-context
    desc: agentcage package context
    all:
      - id: agentcage-pkg-name
      - id: agentcage-summary

  - id: agentcage-runtime-context
    desc: agentcage runtime context
    any:
      - id: agentcage-package-context
      - id: agentcage-config-path
      - id: agentcage-package-path
      - id: agentcage-inspector-loader
      - id: agentcage-text-context
      - id: proxy-sandbox-readme
      - id: proxy-inspector-allowlist
      - id: google-jwt-bearer-transform
