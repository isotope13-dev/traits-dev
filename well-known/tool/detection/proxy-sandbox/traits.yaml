defaults:
  platforms:
  - unix
  - windows
  crit: notable
  conf: 0.95
  size_max: 5000000
traits:
- id: agentcage-pkg-name
  desc: agentcage package metadata
  for:
  - pkginfo
  if:
    type: value
    path: name
    exact: agentcage
- id: agentcage-summary
  desc: agentcage sandbox summary
  for:
  - pkginfo
  if:
    type: value
    path: summary
    substr: Defense-in-depth proxy sandbox
- id: agentcage-config-path
  desc: agentcage config path
  for:
  - python
  - shell
  - dockerfile
  - pkginfo
  - markdown
  if:
    type: text
    regex: "(\\.config/agentcage|/etc/agentcage/)"
- id: agentcage-package-path
  desc: agentcage package path
  for:
  - python
  - shell
  - dockerfile
  if:
    type: path
    regex: "agentcage[\\\\/]"
- id: agentcage-inspector-loader
  desc: agentcage inspector loader
  for:
  - python
  if:
    type: text
    substr: AGENTCAGE_INSPECTOR_DIRS
- id: agentcage-text-context
  desc: agentcage text context
  for:
  - python
  - shell
  - dockerfile
  - pkginfo
  - markdown
  if:
    type: text
    substr: agentcage
- id: proxy-sandbox-readme
  desc: proxy sandbox readme context
  for:
  - pkginfo
  - markdown
  - text
  if:
    type: text
    substr: mitmproxy + domain allowlist + inspectors
- id: google-jwt-bearer-transform
  desc: Google JWT bearer transform
  for:
  - python
  if:
    type: text
    substr: google-jwt-bearer
- id: proxy-inspector-allowlist--host-url-param-allowlist
  desc: proxy inspector (host_url_param_allowlist)
  for:
  - python
  if:
    type: text
    word: host_url_param_allowlist
- id: proxy-inspector-allowlist--folder-allowlist
  desc: proxy inspector allowlist (folder_allowlist)
  for:
  - python
  if:
    type: text
    word: folder_allowlist
- id: proxy-inspector-allowlist--recipient-allowlist
  desc: proxy inspector allowlist (recipient_allowlist)
  for:
  - python
  if:
    type: text
    word: recipient_allowlist
- id: proxy-inspector-allowlist--sender-allowlist
  desc: proxy inspector allowlist (sender_allowlist)
  for:
  - python
  if:
    type: text
    word: sender_allowlist
composite_rules:
- id: proxy-inspector-allowlist
  desc: proxy inspector allowlist context
  for:
  - python
  any:
  - id: proxy-inspector-allowlist--host-url-param-allowlist
  - id: proxy-inspector-allowlist--folder-allowlist
  - id: proxy-inspector-allowlist--recipient-allowlist
  - id: proxy-inspector-allowlist--sender-allowlist
- id: agentcage-package-context
  desc: agentcage package context
  crit: notable
  conf: 0.98
  all:
  - id: agentcage-pkg-name
  - id: agentcage-summary
- id: agentcage-runtime-context
  crit: notable
  desc: agentcage runtime context
  any:
  - id: agentcage-package-context
  - id: agentcage-config-path
  - id: agentcage-package-path
  - id: agentcage-inspector-loader
  - id: agentcage-text-context
  - id: proxy-sandbox-readme
  - id: proxy-inspector-allowlist
  - id: google-jwt-bearer-transform
- id: agentcage-sandbox-identity
  desc: agentcage proxy sandbox identity
  crit: notable
  conf: 0.97
  needs: 2
  any:
  - id: agentcage-summary
  - id: agentcage-config-path
  - id: agentcage-inspector-loader
  - id: agentcage-text-context
  - id: proxy-sandbox-readme
  - id: proxy-inspector-allowlist
  - id: google-jwt-bearer-transform
  - id: agentcage-package-path
