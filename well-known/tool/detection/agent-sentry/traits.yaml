# agent-sentry / nhi-audit — open-source auditor for Non-Human Identities and
# AI-agent attack surfaces in cloud environments (MIT, github.com/Abhiram-ops/
# agent-sentry). It enumerates cloud/registry/SSH credential FILE PATHS to
# report local exposure risk (RiskLevel findings) — it never reads or transmits
# the secret contents ("No data leaves the machine"). That defensive path
# inventory trips credential-stealer/sweep matchers; this context excuses it.
defaults:
  platforms: [unix, windows]
  crit: component
  conf: 0.96
traits:
- id: package-name
  desc: nhi-audit package metadata name
  for: [pkginfo]
  if:
    type: value
    path: name
    regex: '^nhi[-_]audit$'
- id: package-summary
  desc: NHI auditor package summary
  for: [pkginfo]
  if:
    type: value
    path: summary
    regex: '(?i)auditor for Non-Human Identities'
- id: module-path
  desc: agentsentry Python package path
  for: [python]
  if:
    type: path
    regex: '(^|[\\/!])agentsentry[\\/]'
- id: provider-subclass
  desc: agent-sentry provider plugin base class
  for: [python]
  if:
    type: text
    regex: 'class\s+\w+Provider\s*\(\s*BaseProvider\b'
- id: risk-model
  desc: agent-sentry RiskLevel finding model
  for: [python]
  if:
    type: text
    regex: '\bRiskLevel\.(CRITICAL|HIGH|MEDIUM|LOW)\b'
- id: no-exfil-pledge
  desc: Local-scan no-exfiltration docstring
  for: [python]
  if:
    type: text
    substr: 'No data leaves the machine'
- id: nhi-model--nonhumanidentity
  desc: Non-Human Identity defensive (NonHumanIdentity)
  for: [python]
  if:
    type: text
    word: NonHumanIdentity
- id: nhi-model--nhitype
  desc: Non-Human Identity defensive data (NHIType)
  for: [python]
  if:
    type: text
    word: NHIType
composite_rules:
  # Two or more co-occurring agent-sentry data-model tells. Requiring a pair
  # keeps it specific (a real stealer won't also ship an NHI/RiskLevel risk-
  # reporting model + BaseProvider plugin) while staying robust whether the
  # member path is present (archive) or not (single-file analysis).
- id: nhi-model
  desc: Non-Human Identity defensive data model
  for: [python]
  any:
  - id: nhi-model--nonhumanidentity
  - id: nhi-model--nhitype
- id: module-context
  desc: agent-sentry source module context
  crit: component
  conf: 0.97
  needs: 2
  any:
  - id: module-path
  - id: provider-subclass
  - id: nhi-model
  - id: risk-model
  - id: no-exfil-pledge
- id: package-context
  desc: agent-sentry package metadata context
  crit: component
  conf: 0.97
  any:
  - id: package-name
  - id: package-summary
- id: nhi-auditor-context
  desc: agent-sentry NHI defensive auditor context
  crit: notable
  conf: 0.97
  any:
  - id: module-context
  - id: package-context
