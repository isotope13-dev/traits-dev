defaults:
  platforms:
  - windows
  - unix
  for:
  - python
  - javascript
  - typescript
  - documents
  - package.json
  - pkginfo
  size_max: 5000000
traits:
- id: threat-scan-function
  desc: Threat-scanning func
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\bscan_events_for_threats\\b|\\bscan_for_threats\\b|def\\s+[_a-z]*scan[_a-z]*threat"
- id: offensive-safety-keyword-gate
  desc: Offensive-content safety gate
  crit: component
  conf: 0.92
  if:
    type: text
    regex: "(?i)(offensive content indicators|offensive/security origin|blocks offensive memories)"
- id: destructive-intent-guardrail
  desc: Destructive-intent guardrail patterns
  crit: component
  conf: 0.92
  if:
    type: text
    substr: _DESTRUCTIVE_INTENT_PATTERNS
- id: safety-blacklist-guardrail
  desc: Safety blacklist guardrail patterns
  crit: component
  conf: 0.92
  if:
    type: text
    substr: _SAFETY_BLACKLIST_PATTERNS
- id: ssrf-protection-guardrail
  desc: SSRF protection guardrail
  crit: component
  conf: 0.92
  if:
    type: text
    substr: SSRF protection
- id: llm-code-execution-safety-prompts
  desc: LLM code-execution safety prompts
  crit: component
  conf: 0.94
  for: [javascript, typescript, python]
  if:
    type: text
    substr: Code Execution Safety
- id: llm-topic-blocking-prompts
  desc: LLM topic-blocking prompts
  crit: component
  conf: 0.94
  for: [javascript, typescript, python]
  if:
    type: text
    substr: Topic Blocking
- id: llm-canadian-pii-prompts
  desc: LLM Canadian PII prompts
  crit: component
  conf: 0.94
  for: [javascript, typescript, python]
  if:
    type: text
    substr: Canadian PII
- id: ai-agent-sandbox-validator-doc
  desc: AI agent sandbox validator documentation
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "validation commands provided by the Hub inside an isolated sandbox"
- id: ai-agent-executable-allowlist-doc
  desc: AI agent executable allowlist documentation
  crit: component
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: text
    substr: "Hard allowlist of executables"
- id: ai-agent-blocked-node-flags
  desc: AI agent blocked Node.js flags
  crit: component
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: text
    substr: "BLOCKED_NODE_FLAGS"
- id: ai-agent-sandbox-security-test-doc
  desc: AI agent sandbox security test documentation
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: "security hardening of sandboxExecutor"
- id: ai-agent-shell-metacharacter-test
  desc: AI agent shell metacharacter rejection test
  crit: component
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: text
    substr: "parseCommand rejects shell metacharacters"
- id: ai-agent-allowlist-rejection-test
  desc: AI agent executable allowlist rejection test
  crit: component
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: text
    substr: "ALLOWED_EXECUTABLES rejects"
- id: classify-shell-command-function
  desc: Shell command classifier function
  crit: component
  conf: 0.94
  for: [python]
  if:
    type: text
    substr: "classify_shell_command"
- id: force-delete-refusal-message
  desc: Force-delete refusal message
  crit: component
  conf: 0.94
  for: [python]
  if:
    type: text
    substr: "Refusing recursive force-delete"
- id: shell-block-rules-list
  desc: Shell block-rule list
  crit: component
  conf: 0.92
  for: [python]
  if:
    type: text
    substr: "_BLOCK_RULES"
- id: bash-policy-result-class
  desc: Bash policy result class
  crit: component
  conf: 0.92
  for: [python]
  if:
    type: text
    substr: "BashPolicyResult"
- id: block-code-execution-guardrail-doc
  desc: Block-code-execution guardrail doc marker
  crit: component
  conf: 0.94
  for: [python]
  if:
    type: text
    substr: "Block Code Execution guardrail."
- id: execution-request-phrase-table
  desc: Guardrail execution-request phrase table
  crit: component
  conf: 0.94
  for: [python]
  if:
    type: text
    substr: _EXECUTION_REQUEST_PHRASES
composite_rules:
- id: llm-safety-prompt-dataset
  desc: LLM safety prompt dataset
  crit: component
  conf: 0.96
  any:
  - id: llm-code-execution-safety-prompts
  - id: llm-topic-blocking-prompts
  - id: llm-canadian-pii-prompts
- id: ai-agent-sandbox-validator
  desc: AI agent sandbox validation guardrail
  crit: component
  conf: 0.96
  all:
  - id: ai-agent-sandbox-validator-doc
  - id: ai-agent-executable-allowlist-doc
  - id: ai-agent-blocked-node-flags
- id: ai-agent-sandbox-security-tests
  desc: AI agent sandbox guardrail security tests
  crit: component
  conf: 0.95
  all:
  - id: ai-agent-sandbox-security-test-doc
  - id: ai-agent-shell-metacharacter-test
  - id: ai-agent-allowlist-rejection-test
- id: shell-command-safety-policy
  desc: AI shell command safety policy
  crit: component
  conf: 0.94
  all:
  - id: classify-shell-command-function
  - id: force-delete-refusal-message
- id: shell-block-rule-list
  desc: AI shell block-rule list
  crit: component
  conf: 0.92
  all:
  - id: shell-block-rules-list
  - id: bash-policy-result-class
- id: block-code-execution-guardrail
  desc: Block-code-execution guardrail implementation
  crit: notable
  conf: 0.96
  for: [python]
  all:
  - id: block-code-execution-guardrail-doc
  - id: execution-request-phrase-table
- id: ai-guardrail-context
  desc: AI-agent guardrail / security-scanner tool context
  crit: component
  conf: 0.95
  any:
  - id: threat-scan-function
  - id: offensive-safety-keyword-gate
  - id: destructive-intent-guardrail
  - id: safety-blacklist-guardrail
  - id: ssrf-protection-guardrail
  - id: llm-safety-prompt-dataset
  - id: ai-agent-sandbox-validator
  - id: ai-agent-sandbox-security-tests
  - id: shell-command-safety-policy
  - id: shell-block-rule-list
  - id: block-code-execution-guardrail
  - id: well-known/tool/detection/security-scanner::defensive-threat-signatures
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
  - id: well-known/tool/detection/clawmetry::clawmetry-tool
  - id: well-known/tool/detection/hol-guard::hol-guard-runtime-detector-context
  - id: well-known/app/observability::clawmetry-observability-dashboard
