# Generic context for AI-agent guardrails / LLM firewalls / agent security
# monitors (clawmetry, NeMo Guardrails, LLM Guard, Rebuff, Lakera-style tools,
# prompt-injection detectors, agent threat scanners). Like any security scanner
# they legitimately CONTAIN the threats they detect — cryptominer-pool names,
# reverse-shell ports, disk-wipe commands, credential paths, and prompt-injection
# phrases live in their signature catalogs and test fixtures, not as payload
# (scanner-context-inversion). Used as an `unless:` to mute malware/cryptojacking/
# prompt-injection FPs on this class of tool.
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: threat-scan-function
    desc: 'Threat-scanning func'
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bscan_events_for_threats\b|\bscan_for_threats\b|def\s+[_a-z]*scan[_a-z]*threat'
composite_rules:
  - id: ai-guardrail-context
    desc: AI-agent guardrail / security-scanner tool context
    crit: component
    conf: 0.95
    any:
      # A threat-scan function or a named threat-signature catalog is the core
      # shape of a detection engine — malware does not catalogue itself.
      - id: threat-scan-function
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      # Known guardrail/observability tools.
      - id: well-known/tool/detection/clawmetry::clawmetry-tool
      - id: micro-behaviors/data/text/app::clawmetry-observability-dashboard
