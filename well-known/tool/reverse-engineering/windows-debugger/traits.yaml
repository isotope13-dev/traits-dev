# Windows Debugger Detection
# Identifies binaries that are debuggers (not debugger targets)
# Debug event loop APIs indicate a debugger, not malware
defaults:
  for: [pe]
  platforms: [windows]
  size_max: 1000000
traits:
  - id: debugger-basename
    desc: Windows console debugger executable name
    crit: notable
    conf: 0.85
    if:
      type: path
      basename: true
      regex: '(?i)^(windbg|cdb|ntsd|kd)\.exe$'
  - id: gdbserver-basename
    desc: GDB server executable name
    crit: notable
    conf: 0.9
    if:
      type: path
      basename: true
      exact: gdbserver.exe
      case_insensitive: true
  - id: gdbserver-source-marker
    desc: GDB server source marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: gdbserver/
      section: rdata
  - id: gdbserver-remote-protocol
    desc: GDB remote protocol marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: qXfer:features:read
      section: rdata
composite_rules:
  - id: debug-event-loop
    desc: Windows debug event loop APIs
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/process/debug/event::wait-for-debug-event
      - id: micro-behaviors/process/debug/event::continue-debug-event
    any:
      - id: debugger-basename
      - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
  - id: gdbserver-debugger-server
    desc: GDB server debugger executable
    crit: notable
    conf: 0.95
    all:
      - id: gdbserver-basename
      - id: gdbserver-source-marker
      - id: gdbserver-remote-protocol
      - id: micro-behaviors/process/debug/event::wait-for-debug-event
      - id: micro-behaviors/process/debug/event::continue-debug-event
