defaults:
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.98
  size_min: 1000000
  size_max: 100000000

traits:
  - id: gdb-executable-name
    desc: GDB debugger executable name
    if:
      type: value
      path: file.basename
      regex: '(^|-)gdb([.][^.]*)?$'

  - id: gdb-source-marker
    desc: GNU GDB source and target markers
    if:
      type: text
      section: .rodata
      regex: '(?i)(/binutils/gdb/|org[.]gnu[.]gdb[.])'

composite_rules:
  - id: gdb-debugger-context
    desc: Recognized GNU GDB debugger executable
    crit: exception
    conf: 0.99
    all:
      - id: gdb-executable-name
      - id: gdb-source-marker
