defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
traits:
  - id: cff-explorer-basename
    desc: CFF Explorer executable name
    crit: component
    conf: 0.96
    if:
      type: path
      basename: true
      exact: CFF Explorer.exe
  - id: cff-explorer-product
    desc: CFF Explorer product metadata
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.product_name
      exact: CFF Explorer
  - id: cff-explorer-description
    desc: Common File Format Explorer metadata
    crit: component
    conf: 0.96
    if:
      type: value
      path: pe.version.description
      exact: Common File Format Explorer
  - id: cff-explorer-manifest
    desc: CFF Explorer manifest identity
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      exact: Microsoft.Windows.CFFExplorer
composite_rules:
  - id: cff-explorer-tool
    desc: CFF Explorer PE editing tool
    crit: notable
    conf: 0.99
    all:
      - id: cff-explorer-basename
    any:
      - id: cff-explorer-product
      - id: cff-explorer-description
      - id: cff-explorer-manifest
