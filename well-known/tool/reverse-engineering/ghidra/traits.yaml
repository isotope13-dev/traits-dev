defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: ghidra-release-member
    desc: Ghidra release archive member
    for: [java, python, source, data]
    size_min: 1
    size_max: 600000000
    if:
      type: path
      substr: ghidra_12.0.4_PUBLIC
  - id: ghidra-package-path
    desc: Ghidra Java package path
    for: [java, source]
    if:
      type: path
      substr: ghidra/app/

composite_rules:
  - id: ghidra-reverse-engineering-suite
    desc: Ghidra reverse-engineering suite
    crit: notable
    conf: 0.98
    any:
      - id: ghidra-release-member
      - id: ghidra-package-path
