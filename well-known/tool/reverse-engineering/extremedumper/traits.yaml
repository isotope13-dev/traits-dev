defaults:
  for:
    - pe
  platforms:
    - windows
  size_max: 1000000
traits:
  - id: extremedumper-name
    desc: ExtremeDumper tool name marker
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: ExtremeDumper
      section: .text
  - id: extremedumper-loaderhook-pdb
    desc: ExtremeDumper loader hook PDB
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: ExtremeDumper.LoaderHook.pdb
      section: .text
  - id: extremedumper-loaderhook-dll
    desc: ExtremeDumper loader hook DLL
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: ExtremeDumper.LoaderHook.dll
      section: .text
  - id: extremedumper-managed-injector
    desc: ExtremeDumper managed injector symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: ExtremeDumper.Injecting::Injector::InjectManagedAndWait
  - id: extremedumper-dump-module
    desc: ExtremeDumper dump module symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: ExtremeDumper.Forms::ModulesForm::DumpModule
  - id: extremedumper-loaderhook-monitor
    desc: ExtremeDumper loader hook export
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: LoaderHookMonitorLoop
  - id: extremedumper-loaderhook-create
    desc: ExtremeDumper loader hook export
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: LoaderHookCreateProcess
composite_rules:
  - id: extremedumper-tool
    desc: ExtremeDumper .NET debugging tool
    crit: notable
    conf: 0.995
    any:
      - id: well-known/tool/reverse-engineering/extremedumper::extremedumper-dump-module
      - id: well-known/tool/reverse-engineering/extremedumper::extremedumper-loaderhook-create
      - id: well-known/tool/reverse-engineering/extremedumper::extremedumper-loaderhook-dll
      - id: well-known/tool/reverse-engineering/extremedumper::extremedumper-loaderhook-monitor
      - id: well-known/tool/reverse-engineering/extremedumper::extremedumper-loaderhook-pdb
      - id: well-known/tool/reverse-engineering/extremedumper::extremedumper-managed-injector
      - id: well-known/tool/reverse-engineering/extremedumper::extremedumper-name
