defaults:
  platforms: [windows]
  for: [c, text]

traits:
  - id: ade86-engine-title
    desc: ADE86 assembler/disassembler title
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: Assemble Disassemble Engine 86-32

  - id: ade86-public-api
    desc: ADE86 assembler/disassembler API
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: PUBLIC UNASSEMBLE

  - id: ade86-c-extern-api
    desc: ADE86 C extern API declarations
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: UNASSEMBLE(void* binptr
