defaults:
  platforms: [windows]
  for: [binaries]
  size_min: 1024
  size_max: 52428800

traits:
  - id: scyllahide-plugin
    desc: ScyllaHide debugger plugin basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^ScyllaHide.{0,80}DBGPlugin\.dp(32|64)$'
  - id: scylla-tool-basename
    desc: Scylla reverse-engineering tool basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^Scylla(_x64)?\.exe$'
  - id: debugger-assist-tool-basename
    desc: StrongOD debugger-assist tool filename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^StrongOD\.(exe|dll|dp32|dp64)$'
  - id: sharpod-debugger-assist-basename
    desc: SharpOD debugger-assist tool filename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^SharpOD(_x64)?\.(exe|dll|dp32|dp64)$'
  - id: sharpod-plugin-string
    desc: SharpOD plugin identity string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: SharpOD Anti_Anti Debugger Plugin
      section: rdata
  - id: legacy-debugger-assist-basename
    desc: Legacy debugger-assist tool filename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^(ArmaGeddon|x86launcher)\.(exe|dll)$'
composite_rules:
  - id: reverse-engineering-tool
    desc: Reverse-engineering tool component marker
    crit: baseline
    conf: 0.95
    any:
      - id: well-known/tool/reverse-engineering/scyllahide
