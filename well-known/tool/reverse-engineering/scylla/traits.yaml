defaults:
  for:
    - pe
  platforms:
    - windows
  size_max: 1000000
traits:
  - id: scylla-plugin-exchange
    desc: Scylla plugin exchange marker
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: wide
      substr: ScyllaPluginExchange
      section: .text
  - id: scylla-config
    desc: Scylla configuration filename
    crit: notable
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      exact: Scylla.ini
      section: .text
  - id: scylla-debug-log
    desc: Scylla debug log filename
    crit: notable
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      exact: Scylla_debug.log
      section: .text
  - id: scylla-iat-rebuilder-ui
    desc: Scylla IAT rebuilder UI label
    crit: notable
    conf: 0.95
    if:
      type: encoded
      encoding: wide
      exact: IAT Rebuilder
      section: .text
  - id: scyllahide-debugger-plugin
    desc: ScyllaHide x64dbg plugin filename
    crit: notable
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '^ScyllaHide.{0,80}DBGPlugin\.dp(32|64)$'
  - id: scylla-basename
    desc: Scylla unpacker DLL basename
    crit: notable
    conf: 0.98
    if:
      type: path
      basename: true
      exact: Scylla.dll
      case_insensitive: true
  - id: scylla-export-dump
    desc: Scylla dump export API
    crit: component
    conf: 0.98
    if:
      type: export
      exact: ScyllaDump
  - id: scylla-export-iat
    desc: Scylla IAT export API
    crit: component
    conf: 0.98
    if:
      type: export
      exact: ScyllaIat
  - id: scylla-export-rebuild
    desc: Scylla rebuild export API
    crit: component
    conf: 0.98
    if:
      type: export
      exact: ScyllaRebuild
  - id: scylla-export-start-gui
    desc: Scylla GUI export API
    crit: component
    conf: 0.98
    if:
      type: export
      exact: ScyllaStartGui
  - id: scylla-export-version
    desc: Scylla version export API
    crit: component
    conf: 0.98
    if:
      type: export
      exact: ScyllaVersion
composite_rules:
  - id: scylla-export-api
    desc: Scylla unpacker export API
    crit: notable
    conf: 0.98
    any:
      - id: scylla-export-dump
      - id: scylla-export-iat
      - id: scylla-export-rebuild
      - id: scylla-export-start-gui
      - id: scylla-export-version
  - id: scylla-unpacker
    desc: Scylla unpacking and import fixer
    crit: notable
    conf: 0.99
    needs: 2
    any:
      - id: scylla-basename
      - id: scylla-export-api
      - id: scylla-plugin-exchange
      - id: scylla-config
      - id: scylla-debug-log
      - id: scylla-iat-rebuilder-ui
