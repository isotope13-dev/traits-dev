defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.95
  size_min: 512
  size_max: 52428800

traits:
  - id: pe-explorer-name
    desc: PE Explorer product string
    if:
      type: text
      exact: PE Explorer
      section: .rsrc

  - id: heaventools-software-string
    desc: Heaventools Software string
    if:
      type: text
      exact: Heaventools Software
      section: .rsrc

  - id: heaventools-pe-explorer-manifest
    desc: Heaventools PE Explorer manifest
    if:
      type: text
      substr: Heaventools.PE.Explorer
      section: .rsrc

composite_rules:
  - id: pe-explorer-tool
    desc: Heaventools PE Explorer tool
    crit: notable
    conf: 0.99
    all:
      - id: pe-explorer-name
    any:
      - id: heaventools-software-string
      - id: heaventools-pe-explorer-manifest
      - id: metadata/signed/developer::heaventools-software
