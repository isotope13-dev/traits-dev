defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: libr-socket-shared-library
    desc: radare2 socket helper library
    for: [elf, so]
    size_min: 30000
    size_max: 200000
    if:
      type: basename
      regex: '^libr_socket\.so(\.[0-9.]+)?$'

  - id: libr-debug-header
    desc: radare2 debug API header
    for: [c, cpp]
    if:
      type: path
      substr: include/libr/r_debug.h

  - id: libr-sflib-debug-header
    desc: radare2 sflib debug API header
    for: [c, cpp]
    if:
      type: path
      substr: sflib/common/sftypes.h

  - id: r2bolt-helper-script
    desc: radare2 r2bolt helper script
    for: [shell]
    if:
      type: path
      regex: 'www/bolt/r2bolt\.sh$'
  - id: radare2-archive-member
    desc: radare2 release archive member
    for: [source, scripts, manifests, documents, data, archives, binaries]
    size_min: 1
    size_max: 300000000
    if:
      type: path
      substr: org.radare.radare2installer/radare2/
  - id: radare2-release-source-tree
    desc: radare2 release source tree
    for: [source, scripts, manifests, documents, data, archives, binaries]
    size_min: 1
    size_max: 300000000
    if:
      type: path
      substr: radare2-6.1.8/
  - id: radare2-go-module-source-path
    desc: radare2 Go module source path
    for: [source, scripts, manifests, documents, data, archives, binaries]
    size_min: 1
    size_max: 300000000
    if:
      type: path
      substr: github.com/radare/radare2@
  - id: radare2-android-library
    desc: radare2 Android shared library
    for: [elf, so]
    size_max: 50000000
    if:
      type: basename
      regex: '^libr_[A-Za-z0-9_]+\.so(\.[0-9.]+)?$'
  - id: radare2-r2-basename
    desc: radare2 r2 basename
    for: [elf]
    size_max: 50000000
    if:
      type: basename
      exact: r2
  - id: radare2-r2r-basename
    desc: radare2 r2r basename
    for: [elf]
    size_max: 50000000
    if:
      type: basename
      exact: r2r
  - id: radare2-cli-basename
    desc: radare2 CLI basename
    for: [elf]
    size_max: 50000000
    if:
      type: basename
      exact: radare2
  - id: radare2-windows-release
    desc: radare2 Windows release binary
    for: [pe]
    size_max: 50000000
    if:
      type: path
      regex: '(^|[\\/])(r2blob\.static|radiff2|r2|rafs2)(\.exe)?$'
  - id: radare2-usage-strings
    desc: radare2 CLI usage strings
    for: [pe, elf, macho]
    size_max: 50000000
    if:
      type: text
      section: .rdata
      substr: 'Usage: radiff2'
composite_rules:
  - id: radare2-release-binary
    desc: radare2 release binary
    crit: notable
    conf: 0.98
    any:
      - id: radare2-windows-release
      - id: radare2-usage-strings
  - id: radare2-android-library-context
    desc: radare2 Android library context
    crit: baseline
    conf: 0.98
    all:
      - id: radare2-archive-member
      - id: radare2-android-library
  - id: radare2-android-cli-context
    desc: radare2 Android CLI context
    crit: baseline
    conf: 0.98
    all:
      - id: radare2-archive-member
    any:
      - id: radare2-r2-basename
      - id: radare2-r2r-basename
      - id: radare2-cli-basename
  - id: radare2-source-identity
    desc: radare2 source and library identity
    crit: notable
    conf: 0.98
    any:
      - id: libr-socket-shared-library
      - id: libr-debug-header
      - id: libr-sflib-debug-header
      - id: r2bolt-helper-script
      - id: radare2-archive-member
      - id: radare2-release-source-tree
      - id: radare2-go-module-source-path
      - id: radare2-android-library-context
      - id: radare2-android-cli-context
