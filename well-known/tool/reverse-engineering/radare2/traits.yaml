defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.98

traits:
  - id: libr-socket-shared-library
    desc: radare2 socket helper library
    for: [elf, so]
    size_min: 30000
    size_max: 200000
    if:
      type: basename
      regex: '^libr_socket\.so(\.[0-9.]+)?$'

  - id: libr-debug-header
    desc: radare2 debug API header
    for: [c, cpp]
    if:
      type: path
      substr: include/libr/r_debug.h

  - id: libr-sflib-debug-header
    desc: radare2 sflib debug API header
    for: [c, cpp]
    if:
      type: path
      substr: sflib/common/sftypes.h

  - id: r2bolt-helper-script
    desc: radare2 r2bolt helper script
    for: [shell]
    if:
      type: path
      regex: 'www/bolt/r2bolt\.sh$'
  - id: radare2-windows-release
    desc: radare2 Windows release binary
    for: [pe]
    size_max: 50000000
    if:
      type: path
      regex: '(^|[\\/])(r2blob\.static|radiff2|r2|rafs2)(\.exe)?$'
  - id: radare2-usage-strings
    desc: radare2 CLI usage strings
    for: [pe, elf, macho]
    size_max: 50000000
    if:
      type: text
      section: .rdata
      substr: 'Usage: radiff2'
composite_rules:
  - id: radare2-release-binary
    desc: radare2 release binary
    crit: baseline
    conf: 0.98
    any:
      - id: radare2-windows-release
      - id: radare2-usage-strings
