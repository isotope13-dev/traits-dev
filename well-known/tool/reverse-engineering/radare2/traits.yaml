defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98

traits:
  - id: libr-socket-shared-library
    desc: radare2 socket helper library
    for: [elf, so]
    size_min: 30000
    size_max: 200000
    if:
      type: basename
      regex: '^libr_socket\.so(\.[0-9.]+)?$'

  - id: libr-debug-header
    desc: radare2 debug API header
    for: [c, cpp]
    if:
      type: path
      substr: /usr/include/libr/r_debug.h

  - id: libr-sflib-debug-header
    desc: radare2 sflib debug API header
    for: [c, cpp]
    if:
      type: path
      substr: /usr/include/libr/sflib/common/sftypes.h

  - id: r2bolt-helper-script
    desc: radare2 r2bolt helper script
    for: [shell]
    if:
      type: path
      regex: '/usr/share/radare2/[^/]+/www/bolt/r2bolt\.sh$'
