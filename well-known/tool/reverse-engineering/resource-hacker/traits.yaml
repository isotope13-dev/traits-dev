defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: resource-hacker-marker
    desc: Resource Hacker marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Resource Hacker
      section: rdata
  - id: resource-hacker-program-id
    desc: Resource Hacker program identifier
    crit: component
    conf: 0.98
    if:
      type: text
      exact: angusj.com.ResourceHacker
      section: .rsrc
  - id: resource-hacker-description
    desc: Resource Hacker version description
    crit: component
    conf: 0.96
    if:
      type: text
      exact: Resource viewer, decompiler & recompiler
      section: .rsrc
  - id: resource-hacker-author
    desc: Resource Hacker author marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Angus Johnson
      section: .rsrc
composite_rules:
  - id: resource-hacker
    desc: Angus Johnson Resource Hacker
    crit: notable
    conf: 0.98
    all:
      - id: resource-hacker-program-id
      - id: resource-hacker-description
    any:
      - id: resource-hacker-author
      - id: metadata/package/versioning::pe-version-resource
