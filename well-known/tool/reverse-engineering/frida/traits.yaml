defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.99

traits:
  - id: frida-server-macho
    desc: Frida server Mach-O binary
    platforms: [ios, macos]
    for: [macho]
    size_min: 1000000
    size_max: 30000000
    if:
      type: basename
      exact: frida-server
  - id: frida-agent-macho
    desc: Frida agent Mach-O library
    platforms: [ios, macos]
    for: [macho]
    size_min: 1000000
    size_max: 60000000
    if:
      type: basename
      exact: frida-agent.dylib
  - id: frida-release-artifact-basename
    desc: Frida release artifact basename
    for: [pe, dll, elf, so, macho, dylib]
    size_min: 1000000
    size_max: 90000000
    if:
      type: basename
      regex: '^frida-(server|gadget|inject|clr)-'
  - id: frida-static-library-basename
    desc: Frida static library basename
    platforms: [linux]
    for: [deb]
    size_min: 1000000
    size_max: 250000000
    if:
      type: basename
      regex: '^libfrida-(core|gum|gumjs)\.a$'
  - id: frida-artifact-path-context
    desc: Frida artifact path context
    for: [pe, dll, elf, so, macho, dylib]
    size_min: 1000
    size_max: 90000000
    if:
      type: path
      substr: frida-

composite_rules:
  - id: frida-tool-context
    desc: Frida instrumentation tooling context
    crit: baseline
    conf: 0.99
    any:
      - id: frida-release-artifact-basename
      - id: frida-static-library-basename
      - id: frida-artifact-path-context
