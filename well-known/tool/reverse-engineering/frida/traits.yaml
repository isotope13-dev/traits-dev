defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.99

traits:
  - id: frida-server-macho
    desc: Frida server Mach-O basename
    crit: notable
    platforms: [ios, macos]
    for: [macho]
    size_min: 1000000
    size_max: 30000000
    if:
      type: basename
      exact: frida-server
  - id: frida-agent-macho
    desc: Frida agent Mach-O library basename
    crit: notable
    platforms: [ios, macos]
    for: [macho]
    size_min: 1000000
    size_max: 60000000
    if:
      type: basename
      exact: frida-agent.dylib
  - id: frida-gadget-install-name
    desc: Frida Gadget Mach-O install name
    crit: notable
    conf: 1.0
    platforms: [unix, ios]
    for: [macho]
    size_min: 1000000
    size_max: 60000000
    if:
      type: value
      path: macho.install_name
      exact: '@executable_path/Frameworks/FridaGadget.dylib'
  - id: frida-gadget-code-signature-id
    desc: Frida Gadget Mach-O code-signing identifier
    crit: notable
    conf: 1.0
    platforms: [unix, ios]
    for: [macho]
    size_min: 1000000
    size_max: 60000000
    if:
      type: value
      path: macho.code_signature.identifier
      regex: '^frida-gadget-(ios|tvos|macos|watchos)-[a-z0-9-]+$'
  - id: frida-server-windows-basename
    desc: Frida server Windows filename
    crit: notable
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: basename
      regex: '(^|-)frida-server-[0-9][^-]*-windows-[^.]+\.exe$'
  - id: frida-server-dbus-namespace
    desc: Frida server D-Bus namespace
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: re.frida.server
      section: .rdata
  - id: frida-agent-runner-string
    desc: Frida agent runner class
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: Frida.Agent.Runner
      section: .rdata
  - id: frida-agent-session-string
    desc: Frida agent session class
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: Frida.Agent.Session
      section: .rdata
  - id: frida-agent-controller-string
    desc: Frida agent controller class
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: Frida.Agent.Controller
      section: .rdata
  - id: frida-agent-runner-symbol
    desc: Frida agent runner symbol
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: frida_agent_runner
      section: .rdata
  - id: frida-gadget-load-export-windows
    desc: Frida Gadget loader export
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe, dll]
    size_min: 1000000
    size_max: 120000000
    if:
      type: export
      exact: frida_gadget_load
  - id: frida-gadget-pdb-windows
    desc: Frida Gadget build PDB
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe, dll]
    size_min: 1000000
    size_max: 120000000
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(^|[\\/])libfrida-gadget-raw\.pdb$'
  - id: frida-portal-service-source-path-windows
    desc: Frida Portal service source path
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/src/portal-service.vala
      section: .rdata
  - id: frida-portal-application-source-path-windows
    desc: Frida Portal application source path
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/portal/portal.vala
      section: .rdata
  - id: frida-portal-application-run-export-windows
    desc: Frida Portal application run export
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: export
      exact: frida_portal_application_run
  - id: frida-portal-control-channel-windows
    desc: Frida Portal injection control channel
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: Frida.PortalService.ControlChannel.inject_library_blob
      section: .rdata
  - id: frida-inject-application-run-export-windows
    desc: Frida Inject application run export
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: export
      exact: frida_inject_application_run
  - id: frida-qml-pdb-windows
    desc: Frida QML Windows build PDB
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe, dll]
    size_min: 1000000
    size_max: 120000000
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(^|[\\/])frida-qml\.pdb$'
  - id: frida-qml-plugin-symbol-windows
    desc: Frida QML plugin registration symbol
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe, dll]
    size_min: 1000000
    size_max: 120000000
    if:
      type: symbol
      substr: qml_register_types_Frida

  - id: frida-release-tool-basename
    desc: Frida release tool basename
    crit: notable
    for: [elf, macho, pe, data]
    size_min: 1000000
    size_max: 120000000
    if:
      type: basename
      regex: '(^|-)frida-(server|gadget|inject|clr)-'
  - id: frida-devkit-basename
    desc: Frida devkit artifact basename
    for: [data]
    size_min: 1000000
    size_max: 250000000
    if:
      type: basename
      regex: '^frida-(core|gumjs)-devkit-'
  - id: frida-napi-basename
    desc: Frida N-API package basename
    for: [data]
    size_min: 1000000
    size_max: 90000000
    if:
      type: basename
      regex: '^frida-v[0-9]'
  - id: frida-napi-native-addon
    desc: Frida N-API native addon
    for: [elf, so, dll, dylib]
    size_min: 100000
    size_max: 50000000
    if:
      type: basename
      exact: frida_binding.node
  - id: frida-exec-transition-string
    desc: Frida execution transition string
    for: [binaries, data]
    size_min: 100000
    size_max: 120000000
    if:
      type: text
      substr: Frida.ExecTransitionSession
  - id: frida-agent-main-string
    desc: Frida agent main symbol
    for: [binaries, data]
    size_min: 100000
    size_max: 120000000
    if:
      type: text
      substr: frida_agent_main
  - id: frida-agent-raw-soname-elf
    desc: Frida Agent raw ELF SONAME
    crit: notable
    conf: 1.0
    platforms: [linux, android]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: value
      path: elf.soname
      exact: libfrida-agent-raw.so
  - id: frida-agent-source-path-elf
    desc: Frida Agent source path in ELF
    crit: notable
    conf: 1.0
    platforms: [linux, android]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/lib/agent/agent.vala
      section: .rodata
  - id: frida-gadget-raw-soname-elf
    desc: Frida Gadget raw ELF SONAME
    crit: notable
    conf: 1.0
    platforms: [linux, android]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: value
      path: elf.soname
      exact: libfrida-gadget-raw.so
  - id: frida-gadget-source-path-elf
    desc: Frida Gadget source path in ELF
    crit: notable
    conf: 1.0
    platforms: [linux, android]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/lib/gadget/gadget.vala
      section: .rodata
  - id: frida-elf-version-definition
    desc: Frida ELF version definition
    crit: notable
    conf: 1.0
    platforms: [linux, android]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: value
      path: elf.verdef[*].name
      exact: FRIDA_1.0
  - id: frida-static-library-basename
    desc: Frida static library basename
    platforms: [linux]
    for: [archive, zip, deb, data]
    size_min: 1000000
    size_max: 250000000
    if:
      type: basename
      regex: '^libfrida-(core|gum|gumjs)\.a$'
  - id: frida-devkit-path-context
    desc: Frida devkit artifact path
    for: [binaries, data, archive, tar, zip, jar, class]
    size_min: 1000
    size_max: 300000000
    if:
      type: path
      regex: '(^|[\\/])frida-(core|gumjs)-devkit-'
  - id: frida-internal-symbol-prefix
    desc: Frida internal symbol prefix
    for: [binaries, data, archive, tar, zip, jar, class]
    size_min: 1000
    size_max: 300000000
    if:
      type: text
      substr: _frida_
  - id: frida-server-source-path-elf
    desc: Frida server ELF source path
    crit: notable
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/server/server.vala
      section: .rodata
  - id: frida-server-source-path-macho
    desc: Frida server Mach-O source path
    crit: notable
    platforms: [macos]
    for: [macho]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/server/server.vala
      section: __cstring
  - id: frida-server-application-entry-name-elf
    desc: Frida server ELF application entry name
    crit: notable
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: frida_server_application_start
      section: .rodata
  - id: frida-server-application-entry-name-macho
    desc: Frida server Mach-O application entry name
    crit: notable
    platforms: [macos]
    for: [macho]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: frida_server_application_start
      section: __cstring
  - id: frida-linux-helper-library-injection
    desc: Frida Linux helper injection interface
    crit: notable
    platforms: [linux, android]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      regex: 'Frida\.LinuxHelper(Service|Backend|Process)\.inject_library'
      section: .rodata
  - id: frida-ptrace-pokedata-request-enum
    desc: Frida ptrace POKEDATA request enum
    crit: notable
    conf: 1.0
    attack: T1055.008
    platforms: [linux, android]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      exact: FRIDA_PTRACE_REQUEST_POKEDATA
      section: .rodata
  - id: frida-inject-source-path-elf
    desc: Frida Inject Vala source path
    crit: notable
    conf: 1.0
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/inject/inject.vala
      section: .rodata
  - id: frida-inject-application-symbol-elf
    desc: Frida Inject application start symbol
    crit: notable
    conf: 1.0
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: frida_inject_application_start
      section: .rodata
  - id: python-source-reference
    desc: Python source reference to Frida
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      word: frida
    unless:
      - id: metadata/file/profile/language::large-unparsed-source-corpus

composite_rules:
  - id: frida-mach-task-instrumentation
    desc: Frida Mach task process instrumentation
    crit: notable
    conf: 0.99
    platforms: [macos]
    for: [macho]
    all:
      - id: micro-behaviors/process/attach/mach::task-for-pid
      - id: micro-behaviors/process/attach/mach::task-memory-write
      - id: micro-behaviors/os/kernel/routines::thread-set-state
    any:
      - id: frida-server-native
      - id: frida-gadget-macho

  - id: frida-ptrace-process-instrumentation
    desc: Frida ptrace process instrumentation
    crit: notable
    conf: 0.99
    platforms: [linux, android]
    for: [elf]
    all:
      - id: micro-behaviors/os/syscall/invoke::ptrace-import
      - id: frida-ptrace-pokedata-request-enum
      - id: frida-linux-helper-library-injection
    any:
      - id: frida-inject-native
      - id: frida-server-native

  - id: frida-portal-macho
    desc: Frida Portal Mach-O executable
    crit: notable
    conf: 1.0
    platforms: [macos, ios]
    for: [macho]
    all:
      - id: metadata/signed/developer::753PE4AG6F
      - id: frida-internal-symbol-prefix
    any:
      - id: metadata/signed/id::re.frida.Portal
      - id: metadata/signed/id::frida-portal

  - id: frida-server-windows-pe
    desc: Frida server Windows PE
    crit: notable
    conf: 0.99
    all:
      - id: frida-server-windows-basename
      - id: frida-server-dbus-namespace

  - id: frida-agent-windows-pe
    desc: Frida agent Windows PE
    crit: notable
    conf: 0.99
    any:
      - id: frida-agent-runner-string
      - id: frida-agent-session-string
      - id: frida-agent-controller-string
      - id: frida-agent-runner-symbol

  - id: frida-gadget-windows-pe
    desc: Frida Gadget Windows library
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: frida-gadget-load-export-windows
      - id: frida-gadget-pdb-windows

  - id: frida-portal-windows-pe
    desc: Frida Portal Windows executable
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe]
    all:
      - id: frida-portal-service-source-path-windows
      - id: frida-portal-control-channel-windows

  - id: frida-qml-windows-pe
    desc: Frida QML Windows plugin library
    crit: notable
    conf: 1.0
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: frida-qml-pdb-windows
      - id: frida-qml-plugin-symbol-windows

  - id: frida-tool-context
    desc: Frida instrumentation tooling context
    crit: notable
    conf: 0.99
    for: [binaries, data]
    any:
      - id: frida-portal-macho
      - id: frida-server-macho
      - id: frida-agent-macho
      - id: frida-gadget-macho
      - id: frida-server-windows-pe
      - id: frida-agent-windows-pe
      - id: frida-gadget-windows-pe
      - id: frida-portal-windows-pe
      - id: frida-portal-application-run-export-windows
      - id: frida-qml-windows-pe
      - id: frida-inject-application-run-export-windows
      - id: frida-release-tool-basename
      - id: frida-devkit-basename
      - id: frida-napi-basename
      - id: frida-napi-native-addon
      - id: frida-exec-transition-string
      - id: frida-agent-main-string
      - id: frida-static-library-basename
      - id: frida-devkit-path-context
      - id: frida-internal-symbol-prefix
      - id: metadata/package/quality/recognized-contexts::frida-artifact-path-context
      - id: frida-server-native
      - id: frida-inject-native
      - id: frida-agent-native
      - id: frida-gadget-native
      - id: metadata/signed/id::re.frida.Inject
      - id: metadata/signed/id::frida-gadget-macos-universal
      - id: metadata/signed/developer::753PE4AG6F

  - id: frida-server-native
    desc: Frida native instrumentation server
    crit: notable
    conf: 1.0
    for: [elf, macho]
    needs: 2
    any:
      - id: frida-server-source-path-elf
      - id: frida-server-source-path-macho
      - id: frida-server-application-entry-name-elf
      - id: frida-server-application-entry-name-macho
      - id: frida-linux-helper-library-injection
      - id: metadata/signed/id::re.frida.Server

  - id: frida-inject-native
    desc: Frida native script injector
    crit: notable
    conf: 1.0
    platforms: [linux]
    for: [elf]
    needs: 2
    any:
      - id: frida-inject-source-path-elf
      - id: frida-inject-application-symbol-elf

  - id: frida-agent-native
    desc: Frida Agent native ELF library
    crit: notable
    conf: 1.0
    platforms: [linux, android]
    for: [elf]
    needs: 2
    any:
      - id: frida-agent-raw-soname-elf
      - id: frida-agent-source-path-elf

  - id: frida-gadget-native
    desc: Frida Gadget native ELF library
    crit: notable
    conf: 1.0
    platforms: [linux, android]
    for: [elf]
    needs: 2
    any:
      - id: frida-gadget-raw-soname-elf
      - id: frida-gadget-source-path-elf
      - id: frida-elf-version-definition

  - id: frida-gadget-macho
    desc: Frida Gadget Mach-O library
    crit: notable
    conf: 1.0
    platforms: [unix, ios]
    for: [macho]
    all:
      - id: frida-gadget-install-name
      - id: frida-gadget-code-signature-id
