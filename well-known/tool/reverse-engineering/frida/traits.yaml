defaults:
  platforms: [ios, macos]
  for: [macho]
  crit: baseline
  conf: 0.99

traits:
  - id: frida-server-macho
    desc: Frida server Mach-O binary
    size_min: 1000000
    size_max: 30000000
    if:
      type: basename
      exact: frida-server
  - id: frida-agent-macho
    desc: Frida agent Mach-O library
    size_min: 1000000
    size_max: 60000000
    if:
      type: basename
      exact: frida-agent.dylib
