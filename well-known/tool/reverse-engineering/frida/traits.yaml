defaults:
  platforms: [unix, windows]
  crit: baseline
  conf: 0.99

traits:
  - id: frida-server-macho
    desc: Frida server Mach-O binary
    platforms: [ios, macos]
    for: [macho]
    size_min: 1000000
    size_max: 30000000
    if:
      type: basename
      exact: frida-server
  - id: frida-agent-macho
    desc: Frida agent Mach-O library
    platforms: [ios, macos]
    for: [macho]
    size_min: 1000000
    size_max: 60000000
    if:
      type: basename
      exact: frida-agent.dylib
  - id: frida-gadget-install-name
    desc: Frida Gadget Mach-O install name
    crit: baseline
    conf: 1.0
    platforms: [unix, ios]
    for: [macho]
    size_min: 1000000
    size_max: 60000000
    if:
      type: value
      path: macho.install_name
      exact: '@executable_path/Frameworks/FridaGadget.dylib'
  - id: frida-gadget-code-signature-id
    desc: Frida Gadget Mach-O code-signing identifier
    crit: baseline
    conf: 1.0
    platforms: [unix, ios]
    for: [macho]
    size_min: 1000000
    size_max: 60000000
    if:
      type: value
      path: macho.code_signature.identifier
      regex: '^frida-gadget-(ios|tvos|macos|watchos)-[a-z0-9-]+$'
  - id: frida-server-windows-basename
    desc: Frida server Windows filename
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: basename
      regex: '(^|-)frida-server-[0-9][^-]*-windows-[^.]+\.exe$'
  - id: frida-server-dbus-namespace
    desc: Frida server D-Bus namespace
    platforms: [windows]
    for: [pe]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: re.frida.server
      section: .rdata
  - id: frida-agent-runner-string
    desc: Frida agent runner class
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: Frida.Agent.Runner
      section: .rdata
  - id: frida-agent-session-string
    desc: Frida agent session class
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: Frida.Agent.Session
      section: .rdata
  - id: frida-agent-controller-string
    desc: Frida agent controller class
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: Frida.Agent.Controller
      section: .rdata
  - id: frida-agent-runner-symbol
    desc: Frida agent runner symbol
    platforms: [windows]
    for: [pe, dll]
    size_min: 100000
    size_max: 60000000
    if:
      type: text
      substr: frida_agent_runner
      section: .rdata
  - id: frida-release-tool-basename
    desc: Frida release tool basename
    for: [data]
    size_min: 1000000
    size_max: 90000000
    if:
      type: basename
      regex: '^frida-(server|gadget|inject|clr)-'
  - id: frida-devkit-basename
    desc: Frida devkit artifact basename
    for: [data]
    size_min: 1000000
    size_max: 250000000
    if:
      type: basename
      regex: '^frida-(core|gumjs)-devkit-'
  - id: frida-napi-basename
    desc: Frida N-API package basename
    for: [data]
    size_min: 1000000
    size_max: 90000000
    if:
      type: basename
      regex: '^frida-v[0-9]'
  - id: frida-napi-native-addon
    desc: Frida N-API native addon
    for: [elf, so, dll, dylib]
    size_min: 100000
    size_max: 50000000
    if:
      type: basename
      exact: frida_binding.node
  - id: frida-exec-transition-string
    desc: Frida execution transition string
    for: [binaries, data]
    size_min: 100000
    size_max: 50000000
    if:
      type: text
      substr: Frida.ExecTransitionSession
  - id: frida-agent-main-string
    desc: Frida agent main symbol
    for: [binaries, data]
    size_min: 100000
    size_max: 50000000
    if:
      type: text
      substr: frida_agent_main
  - id: frida-static-library-basename
    desc: Frida static library basename
    platforms: [linux]
    for: [archive, zip, deb, data]
    size_min: 1000000
    size_max: 250000000
    if:
      type: basename
      regex: '^libfrida-(core|gum|gumjs)\.a$'
  - id: frida-devkit-path-context
    desc: Frida devkit artifact path
    for: [binaries, data, archive, tar, zip, jar, class]
    size_min: 1000
    size_max: 300000000
    if:
      type: path
      regex: '(^|[\\/])frida-(core|gumjs)-devkit-'
  - id: frida-internal-symbol-prefix
    desc: Frida internal symbol prefix
    for: [binaries, data, archive, tar, zip, jar, class]
    size_min: 1000
    size_max: 300000000
    if:
      type: text
      substr: _frida_
  - id: frida-server-source-path-elf
    desc: Frida server ELF source path
    crit: notable
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/server/server.vala
      section: .rodata
  - id: frida-server-source-path-macho
    desc: Frida server Mach-O source path
    crit: notable
    platforms: [macos]
    for: [macho]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: subprojects/frida-core/server/server.vala
      section: __cstring
  - id: frida-server-application-symbol-elf
    desc: Frida server ELF application symbol
    crit: notable
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: frida_server_application_start
      section: .rodata
  - id: frida-server-application-symbol-macho
    desc: Frida server Mach-O application symbol
    crit: notable
    platforms: [macos]
    for: [macho]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: frida_server_application_start
      section: __cstring
  - id: frida-linux-helper-service
    desc: Frida Linux helper service class
    crit: notable
    platforms: [linux]
    for: [elf]
    size_min: 1000000
    size_max: 120000000
    if:
      type: text
      substr: Frida.LinuxHelperService.inject_library
      section: .text
  - id: frida-artifact-path-context
    desc: Frida artifact path context
    for: [binaries, data, archive, tar, zip, jar, class]
    size_min: 1000
    size_max: 90000000
    if:
      type: path
      substr: frida-
  - id: python-source-reference
    desc: Python source reference to Frida
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      word: frida
    unless:
      - id: metadata/file/profile/language::large-unparsed-source-corpus

composite_rules:
  - id: frida-portal-macho
    desc: Frida Portal macOS executable
    crit: notable
    conf: 1.0
    platforms: [macos]
    for: [macho]
    all:
      - id: metadata/signed/id::re.frida.Portal
      - id: metadata/signed/developer::753PE4AG6F
      - id: frida-internal-symbol-prefix

  - id: frida-server-windows-pe
    desc: Frida server Windows PE
    crit: notable
    conf: 0.99
    all:
      - id: frida-server-windows-basename
      - id: frida-server-dbus-namespace

  - id: frida-agent-windows-pe
    desc: Frida agent Windows PE
    crit: notable
    conf: 0.99
    any:
      - id: frida-agent-runner-string
      - id: frida-agent-session-string
      - id: frida-agent-controller-string
      - id: frida-agent-runner-symbol

  - id: frida-tool-context
    desc: Frida instrumentation tooling context
    crit: notable
    conf: 0.99
    for: [binaries, data]
    any:
      - id: frida-portal-macho
      - id: frida-server-macho
      - id: frida-agent-macho
      - id: frida-gadget-macho
      - id: frida-server-windows-pe
      - id: frida-agent-windows-pe
      - id: frida-release-tool-basename
      - id: frida-devkit-basename
      - id: frida-napi-basename
      - id: frida-napi-native-addon
      - id: frida-exec-transition-string
      - id: frida-agent-main-string
      - id: frida-static-library-basename
      - id: frida-devkit-path-context
      - id: frida-internal-symbol-prefix
      - id: frida-artifact-path-context
      - id: frida-server-native
      - id: metadata/signed/id::re.frida.Inject
      - id: metadata/signed/id::frida-gadget-macos-universal
      - id: metadata/signed/developer::753PE4AG6F

  - id: frida-server-native
    desc: Frida native instrumentation server
    crit: notable
    conf: 1.0
    for: [elf, macho]
    needs: 2
    any:
      - id: frida-server-source-path-elf
      - id: frida-server-source-path-macho
      - id: frida-server-application-symbol-elf
      - id: frida-server-application-symbol-macho
      - id: frida-linux-helper-service
      - id: metadata/signed/id::re.frida.Server

  - id: frida-gadget-macho
    desc: Frida Gadget Mach-O library
    crit: notable
    conf: 1.0
    platforms: [unix, ios]
    for: [macho]
    all:
      - id: frida-gadget-install-name
      - id: frida-gadget-code-signature-id
