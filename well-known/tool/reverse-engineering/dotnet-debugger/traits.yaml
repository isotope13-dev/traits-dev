defaults:
  platforms: [linux, android, windows]
  for: [elf, so, pe, dll]
  crit: notable
  conf: 0.96
  size_min: 1000000
  size_max: 50000000

traits:
  - id: vsdbg-remote-coreclr-so-basename
    desc: VSDBG remote CoreCLR ELF library
    platforms: [linux, android]
    for: [elf, so]
    if:
      type: basename
      regex: '^libvsdbgremotecoreclr(host|target)\.so$'

  - id: remote-mscordbi-so-basename
    desc: Remote MSCorDBI ELF library
    platforms: [linux]
    for: [elf, so]
    if:
      type: basename
      exact: libremotemscordbihost.so

  - id: vsdbg-remote-coreclr-dll-basename
    desc: VSDBG remote CoreCLR DLL
    platforms: [windows]
    for: [pe, dll]
    if:
      type: basename
      exact: vsdbgremotecoreclrhost.dll
      case_insensitive: true

  - id: remote-coreclr-debugger-export
    desc: .NET remote debugger exported factory
    platforms: [linux, windows]
    if:
      type: export
      exact: CreateRemoteCordbObject

  - id: remote-icordebug-grpc-service
    desc: Remote ICorDebug gRPC service
    platforms: [linux, android]
    for: [elf, so]
    if:
      type: text
      section: .rodata
      substr: "/remoteicordebug.RemoteICorDebug/EventStream"

composite_rules:
  - id: remote-coreclr-debugger-basename
    desc: .NET remote debugger library basename
    crit: notable
    conf: 0.98
    any:
      - id: vsdbg-remote-coreclr-so-basename
      - id: remote-mscordbi-so-basename
      - id: vsdbg-remote-coreclr-dll-basename

  - id: remote-coreclr-debugger-runtime
    desc: .NET remote CoreCLR debugger runtime
    crit: notable
    conf: 0.98
    all:
      - id: remote-coreclr-debugger-basename
    any:
      - id: remote-coreclr-debugger-export
      - id: remote-icordebug-grpc-service
