defaults:
  platforms: [android, unix]
  for: [elf]
  crit: notable
  conf: 0.98
  size_max: 52428800

traits:
  - id: rz-test-basename
    desc: Rizin rz-test executable basename
    if:
      type: basename
      exact: rz-test

  - id: rz-test-usage
    desc: Rizin rz-test command usage string
    if:
      type: text
      section: .rodata
      substr: 'rz-test [-qvVnL]'

  - id: rizin-config-paths
    desc: Rizin runtime configuration paths
    if:
      type: text
      section: .rodata
      substr: .config/rizin

  - id: android-clang-build-comment
    crit: notable
    desc: Android Clang toolchain comment
    if:
      type: comment
      substr: Android (

composite_rules:
  - id: rizin-toolkit
    desc: Rizin reverse-engineering toolkit
    crit: notable
    conf: 0.98
    any:
      - id: rz-test-usage
      - id: rizin-config-paths
      - id: rz-test-basename
