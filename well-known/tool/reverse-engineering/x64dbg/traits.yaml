# x64dbg / x32dbg debugger core
# Identifies the x64dbg/x32dbg debugger DLL itself (not plugins).
defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 8388608
traits:
  - id: x64dbg-debug-message
    desc: x64dbg debugger user-facing message
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: 'Use x64dbg to debug this'
      section: rdata
  - id: x64dbg-titanengine-dll
    desc: TitanEngine debug engine reference
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'TitanEngine.dll'
      section: rdata
  - id: x64dbg-basename
    desc: x64dbg/x32dbg DLL basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '^(x32|x64)dbg\.dll$'
      case_insensitive: true
  - id: x64dbg-exe-basename
    desc: x64dbg/x32dbg executable basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '^(x32|x64|x96)dbg(-unsigned)?\.exe$'
      case_insensitive: true
  - id: x64dbg-bridge-dll-x32
    desc: x32dbg bridge component DLL
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '^x32_?bridge\.dll$'
      case_insensitive: true
  - id: x64dbg-gui-debug-dll-x32
    desc: x32dbg GUI/debug component DLL
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '^x32(gui|_dbg)\.dll$'
      case_insensitive: true
  - id: x64dbg-bridge-dll-x64
    desc: x64dbg bridge component DLL
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '^x64_?bridge\.dll$'
      case_insensitive: true
  - id: x64dbg-gui-debug-dll-x64
    desc: x64dbg GUI/debug component DLL
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '^x64(gui|_dbg)\.dll$'
      case_insensitive: true
  - id: titanengine-basename
    desc: TitanEngine debugger library by basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      exact: TitanEngine.dll
      case_insensitive: true
composite_rules:
  - id: x64dbg-core
    desc: x64dbg/x32dbg debugger core DLL
    crit: notable
    conf: 0.97
    all:
      - id: x64dbg-basename
      - id: x64dbg-debug-message
  - id: x64dbg-executable
    desc: x64dbg/x32dbg debugger executable
    crit: notable
    conf: 0.96
    any:
      - id: x64dbg-exe-basename
      - id: x64dbg-debug-message
  - id: titanengine-library
    desc: TitanEngine unpacker/debug-engine library
    crit: notable
    conf: 0.95
    any:
      - id: titanengine-basename
      - id: x64dbg-titanengine-dll
  - id: x64dbg-release-component
    desc: x64dbg release-bundled debugger component
    crit: component
    conf: 0.94
    any:
      - id: x64dbg-core
      - id: x64dbg-executable
      - id: titanengine-library
      - id: x64dbg-bridge-dll-x32
      - id: x64dbg-gui-debug-dll-x32
      - id: x64dbg-bridge-dll-x64
      - id: x64dbg-gui-debug-dll-x64
