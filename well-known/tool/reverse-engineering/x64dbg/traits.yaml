# x64dbg / x32dbg debugger core
# Identifies the x64dbg/x32dbg debugger DLL itself (not plugins).
defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 8388608
traits:
  - id: x64dbg-debug-message
    desc: x64dbg debugger user-facing message
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: 'Use x64dbg to debug this'
      section: rdata
  - id: x64dbg-titanengine-dll
    desc: TitanEngine debug engine reference
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'TitanEngine.dll'
      section: rdata
  - id: x64dbg-basename
    desc: x64dbg/x32dbg DLL basename
    crit: notable
    conf: 0.95
    if:
      type: basename
      regex: '^(x32|x64)dbg\.dll$'
      case_insensitive: true
  - id: titanengine-basename
    desc: TitanEngine debugger library by basename
    crit: notable
    conf: 0.95
    if:
      type: basename
      regex: '^(?:TitanEngine|titanengine)\.dll$'
composite_rules:
  - id: x64dbg-core
    desc: x64dbg/x32dbg debugger core DLL
    crit: notable
    conf: 0.97
    all:
      - id: x64dbg-basename
      - id: x64dbg-debug-message
  - id: titanengine-library
    desc: TitanEngine unpacker/debug-engine library
    crit: notable
    conf: 0.95
    any:
      - id: titanengine-basename
      - id: x64dbg-titanengine-dll
