defaults:
  platforms: [windows]
  for: [binaries]
  size_min: 1024
  size_max: 52428800

traits:
  - id: scyllahide-plugin
    desc: ScyllaHide debugger plugin basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^ScyllaHide.{0,80}DBGPlugin\.dp(32|64)$'
  - id: scylla-tool-basename
    desc: Scylla reverse-engineering tool basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^Scylla(?:_x64)?\.exe$'
  - id: debugger-assist-tool-basename
    desc: Debugger-assist reverse-engineering tool basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)^(StrongOD|ArmaGeddon|x86launcher)\.(exe|dll)$'
composite_rules:
  - id: reverse-engineering-tool
    desc: Reverse-engineering tool component marker
    crit: baseline
    conf: 0.95
    any:
      - id: scyllahide-plugin
      - id: scylla-tool-basename
      - id: debugger-assist-tool-basename
