defaults:
  platforms: [windows]
  for: [c, text]

traits:
  - id: xde-length-disassembler-banner
    desc: XDE length disassembler engine banner
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: "XDE v1.02 eXtended length disassembler engine"

  - id: xde-disasm-api
    desc: XDE disassembler API
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "xde_disasm"

composite_rules:
  - id: xde-disassembler-engine-source
    desc: XDE disassembler engine source
    crit: notable
    conf: 0.96
    all:
      - id: xde-length-disassembler-banner
      - id: xde-disasm-api
