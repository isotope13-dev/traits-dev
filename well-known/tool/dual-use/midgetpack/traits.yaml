defaults:
  platforms: [unix]
  for: [elf]
  size_min: 8192
  size_max: 16777216

traits:
  - id: midgetpack-banner
    desc: Midgetpack ELF packer banner
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: 'Midgetpack: an ELF file packer'
      section: rodata

  - id: stub-linux-amd64-symbol
    desc: Midgetpack linux/amd64 embedded stub symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: _binary_stub_linux_amd64_start

  - id: stub-linux-x86-symbol
    desc: Midgetpack linux/x86 embedded stub symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: _binary_stub_linux_x86_start

  - id: stub-linux-armv6-symbol
    desc: Midgetpack linux/armv6 embedded stub symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: _binary_stub_linux_armv6_start

  - id: stub-freebsd-amd64-symbol
    desc: Midgetpack freebsd/amd64 embedded stub symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: _binary_stub_freebsd_amd64_start

  - id: stub-freebsd-x86-symbol
    desc: Midgetpack freebsd/x86 embedded stub symbol
    crit: notable
    conf: 0.99
    if:
      type: symbol
      exact: _binary_stub_freebsd_x86_start

  - id: starting-stub-msg
    desc: Midgetpack starting stub runtime message
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'starting stub ...'
      section: rodata

  - id: integrity-good-password-msg
    desc: Midgetpack integrity HMAC failure message
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'Integrity error. Good password ?'
      section: rodata

  - id: curve25519-failed-msg
    desc: Midgetpack curve25519 key exchange failure
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'Curve25519 key exchange failed !'
      section: rodata

  - id: medusa-operator-libcrypt-path
    desc: Medusa operator /rk/libcrypt build path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /rk/libcrypt/old/
      section: .debug_str

composite_rules:
  - id: midgetpack-builder
    desc: Midgetpack ELF packer builder binary
    crit: suspicious
    conf: 0.99
    attack: T1027.002
    all:
      - id: midgetpack-banner
    any:
      - id: stub-linux-amd64-symbol
      - id: stub-linux-x86-symbol
      - id: stub-linux-armv6-symbol
      - id: stub-freebsd-amd64-symbol
      - id: stub-freebsd-x86-symbol
    needs: 2

  - id: midgetpack-packed-output
    desc: Midgetpack packed ELF output payload
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    all:
      - id: starting-stub-msg
      - id: integrity-good-password-msg
    any:
      - id: curve25519-failed-msg
      - id: metadata/binary/anomaly/format::elf-entry-in-writable-segment

  - id: medusa-shipped-midgetpack
    desc: Midgetpack with Medusa operator build path
    crit: hostile
    conf: 0.99
    attack: T1027.002
    all:
      - id: midgetpack-builder
      - id: medusa-operator-libcrypt-path
