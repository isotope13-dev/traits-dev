defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.96
  size_max: 2147483648

traits:
  - id: release-archive-path
    desc: Hashcat release archive
    for: [archive, pe, elf, text, data]
    if:
      type: path
      regex: '(?i)hashcat-[0-9][^\\/]*\.7z$'

  - id: module-30906-so
    desc: Hashcat Bitcoin raw private key module ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30906.so

  - id: module-30906-dll
    desc: Hashcat Bitcoin raw private key module PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30906.dll

  - id: module-30905-so
    desc: Hashcat Bitcoin compressed key module ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30905.so

  - id: module-30905-dll
    desc: Hashcat Bitcoin compressed key module PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30905.dll

  - id: module-30904-so
    desc: Hashcat Bitcoin Bech32 key module ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30904.so

  - id: module-30904-dll
    desc: Hashcat Bitcoin Bech32 key module PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30904.dll

  - id: module-30903-so
    desc: Hashcat Bitcoin Bech32 compressed ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30903.so

  - id: module-30903-dll
    desc: Hashcat Bitcoin Bech32 compressed PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30903.dll

  - id: module-30902-so
    desc: Hashcat Bitcoin P2PKH key module ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30902.so

  - id: module-30902-dll
    desc: Hashcat Bitcoin P2PKH key module PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30902.dll

  - id: module-30901-so
    desc: Hashcat Bitcoin P2PKH compressed ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30901.so

  - id: module-30901-dll
    desc: Hashcat Bitcoin P2PKH compressed PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_30901.dll

  - id: module-28506-so
    desc: Hashcat Bitcoin WIF module ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_28506.so

  - id: module-28506-dll
    desc: Hashcat Bitcoin WIF module PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_28506.dll

  - id: module-28505-so
    desc: Hashcat Bitcoin WIF P2SH module ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_28505.so

  - id: module-28505-dll
    desc: Hashcat Bitcoin WIF P2SH module PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_28505.dll

  - id: module-28504-so
    desc: Hashcat Bitcoin WIF Bech32 module ELF
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_28504.so

  - id: module-28504-dll
    desc: Hashcat Bitcoin WIF Bech32 module PE
    for: [pe, elf]
    if:
      type: path
      basename: true
      exact: module_28504.dll

  - id: module-285-wif
    desc: Hashcat Bitcoin WIF module family
    for: [pe, elf]
    if:
      type: path
      regex: '(?i)(^|[\\/])module_2850[1-6]\.(so|dll)$'

composite_rules:
  - id: module-path
    desc: Hashcat module binary
    crit: notable
    conf: 0.96
    any:
      - id: module-30906-so
      - id: module-30906-dll
      - id: module-30905-so
      - id: module-30905-dll
      - id: module-30904-so
      - id: module-30904-dll
      - id: module-30903-so
      - id: module-30903-dll
      - id: module-30902-so
      - id: module-30902-dll
      - id: module-30901-so
      - id: module-30901-dll
      - id: module-28506-so
      - id: module-28506-dll
      - id: module-28505-so
      - id: module-28505-dll
      - id: module-28504-so
      - id: module-28504-dll
      - id: module-285-wif
