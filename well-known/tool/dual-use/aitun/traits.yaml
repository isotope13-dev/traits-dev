# AiTun publishes local services through hosted relay/P2P tunnels.
# The Python package is a thin wrapper around bundled native Go clients, with a
# documented fallback download path. Treat the identifiable client as dual-use
# tunneling context, not as generic exfil/dropper behavior.
defaults:
  platforms: [windows, unix]
  for: [python, pkginfo, elf, macho, pe, whl, go, binaries]
  attack: T1090
  size_min: 32
  size_max: 524288000
traits:
  - id: aitun-github-repo
    desc: AiTun GitHub repo marker
    crit: component
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: 'GITHUB_REPO\s*=\s*["'']ctz168/aitun["'']'

  - id: aitun-default-server-constant
    desc: AiTun default server constant
    crit: component
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: 'DEFAULT_SERVER\s*=\s*["'']aitun\.cc:6639["'']'

  - id: aitun-pip-user-agent
    desc: AiTun pip user agent
    crit: component
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: 'User-Agent["'']?\s*:\s*["'']aitun-pip["'']'

  - id: aitun-package-metadata
    desc: AiTun PyPI package metadata
    crit: notable
    conf: 0.96
    for: [pkginfo, whl]
    if:
      type: text
      regex: 'Name:\s*aitun[\s\S]{0,500}Secure tunnel service'

  - id: aitun-go-client-module
    desc: AiTun Go client module path
    crit: notable
    conf: 0.99
    for: [elf, macho, pe, go, binaries]
    if:
      type: text
      substr: "aitun/internal/client"

  - id: aitun-default-relay-endpoint
    desc: AiTun default relay endpoint
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "aitun.cc:6639"

composite_rules:
  - id: aitun-python-wrapper
    desc: AiTun Python CLI wrapper
    crit: notable
    conf: 0.97
    for: [python]
    any:
      - id: aitun-github-repo
      - id: aitun-default-server-constant
      - id: aitun-pip-user-agent
  - id: aitun-tunnel-client
    desc: AiTun tunnel client
    crit: notable
    conf: 0.99
    any:
      - id: aitun-python-wrapper
      - id: aitun-package-metadata
      - id: aitun-go-client-module
      - id: aitun-default-relay-endpoint
