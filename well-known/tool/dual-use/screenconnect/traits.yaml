defaults:
  attack: T1219
  platforms:
  - linux
  - unix
  - windows
  - macos
  - ios
  - android
  for:
  - pe
  size_max: 5000000
traits:
- id: screenconnect-clientservice-dll
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect ClientService
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.ClientService
    section: ".text"
  mbc: C0048
- id: screenconnect-client-dll
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect Client DLL
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.Client.dll
    section: ".text"
  mbc: C0048
- id: screenconnect-core-dll
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect Core DLL
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.Core
    section: ".text"
  mbc: C0048
- id: screenconnect-windows-dll
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect Windows DLL
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.Windows
    section: ".text"
  mbc: C0048
- id: screenconnect-client-exe
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect Client exe
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    regex: "(ScreenConnect\\.WindowsClient|ScreenConnect\\.ClientService)"
    section: ".text"
  mbc: C0048
- id: screenconnect-backstage-shell
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect BackstageShell
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.WindowsBackstageShell
    section: ".text"
  mbc: C0048
- id: screenconnect-file-manager
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect FileManager
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.WindowsFileManager
    section: ".text"
  mbc: C0048
- id: screenconnect-auth-package
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect Auth Package
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.WindowsAuthenticationPackage
    section: ".text"
  mbc: C0048
- id: screenconnect-credential-provider
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect Credential Provider
  crit: notable
  conf: 0.95
  platforms:
  - windows
  if:
    type: text
    substr: ScreenConnect.WindowsCredentialProvider
    section: ".text"
  mbc: C0048
- id: connectwisecontrol-client-marker
  size_min: 512
  size_max: 500000000
  desc: ConnectWiseControl client ref
  crit: notable
  conf: 0.9
  platforms:
  - windows
  if:
    type: text
    substr: connectwisecontrol
    section: ".text"
  mbc: C0048
- id: screenconnect-product-marker
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect product marker
  crit: notable
  conf: 0.94
  platforms:
  - windows
  if:
    type: text
    regex: '(?i)\b(ConnectWise Control|ScreenConnect\.ClientService)\b'
    section: ".text"
  mbc: C0048
- id: connectwise-authenticode-subject
  size_min: 512
  size_max: 500000000
  desc: ConnectWise Authenticode signer identity
  crit: notable
  conf: 0.98
  platforms:
  - windows
  if:
    type: value
    path: pe.signatures[0].subject
    regex: 'Connectwise\\?, LLC'
    case_insensitive: true
  mbc: C0048
- id: screenconnect-clickonce-runner-pdb
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect ClickOnce runner PDB
  crit: notable
  conf: 0.96
  platforms:
  - windows
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '\\cwcontrol\\.*ClickOnceRunner\.pdb$'
    case_insensitive: true
  mbc: C0048
- id: screenconnect-dotnet-service-runner-pdb
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect native .NET service runner PDB
  crit: notable
  conf: 0.99
  platforms:
  - windows
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '\\cwcontrol\\Custom\\DotNetRunner\\Release\\DotNetServiceRunner\.pdb$'
    case_insensitive: true
  mbc: C0048
- id: screenconnect-vendor-hosted-endpoint
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect vendor-hosted launch endpoint
  crit: notable
  conf: 0.98
  platforms:
  - windows
  if:
    type: text
    regex: '(?i)https?://[A-Za-z0-9.-]{1,120}\.screenconnect\.com/'
    section: overlay
  mbc: C0002
- id: connectvpn-c2-domain
  size_min: 512
  size_max: 500000000
  desc: ConnectVPN C2 domain
  crit: notable
  conf: 0.9
  platforms:
  - windows
  if:
    type: text
    substr: connectvpn.ru
    section: ".text"
  mbc: C0002
composite_rules:
- id: screenconnect-authenticode-signer
  size_min: 512
  size_max: 500000000
  desc: ConnectWise ScreenConnect signer
  crit: notable
  conf: 0.98
  platforms:
  - windows
  mbc: C0048
  all:
  - id: connectwise-authenticode-subject
  - id: metadata/signed/certificate/identity::pe-cert-issuer-digicert
- id: screenconnect-component-detected
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect component
  crit: suspicious
  conf: 0.95
  platforms:
  - windows
  mbc: C0048
  needs: 3
  any:
  - id: screenconnect-clientservice-dll
  - id: screenconnect-client-dll
  - id: screenconnect-core-dll
  - id: screenconnect-windows-dll
  - id: screenconnect-client-exe
  - id: screenconnect-backstage-shell
  - id: screenconnect-file-manager
  - id: screenconnect-auth-package
  - id: screenconnect-credential-provider
- id: screenconnect-service-persistence
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect service
  crit: hostile
  conf: 0.95
  platforms:
  - windows
  mbc: C0048
  all:
  - id: screenconnect-component-detected
  - id: objectives/persistence/system/service/install::service-startup
- id: screenconnect-family
  size_min: 512
  size_max: 500000000
  desc: ScreenConnect remote access tool
  crit: suspicious
  conf: 0.95
  platforms:
  - windows
  mbc: C0048
  needs: 2
  any:
  - id: screenconnect-component-detected
  - id: connectwisecontrol-client-marker
  - id: screenconnect-product-marker
  - id: screenconnect-authenticode-signer
  - id: screenconnect-clickonce-runner-pdb
  - id: screenconnect-dotnet-service-runner-pdb
  - id: connectvpn-c2-domain

- id: screenconnect-signed-launcher-context
  desc: Verified vendor-hosted ScreenConnect signed launcher context
  crit: exception
  conf: 0.98
  platforms:
  - windows
  all:
  - id: screenconnect-authenticode-signer
  - id: screenconnect-clickonce-runner-pdb
  - id: objectives/command-and-control/backdoor/control/rmm::screenconnect-clickonce-application-url
  - id: screenconnect-vendor-hosted-endpoint
