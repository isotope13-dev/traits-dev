defaults:
  attack: T1219
  platforms: [windows]
  for: [oledoc]
  conf: 0.95

traits:
  - id: msi-clientservice-dll
    desc: ScreenConnect ClientService in MSI
    crit: notable
    if:
      type: text
      substr: ScreenConnect.ClientService.dll
  - id: msi-backstage-shell
    desc: ScreenConnect BackstageShell in MSI
    crit: notable
    if:
      type: text
      substr: ScreenConnect.WindowsBackstageShell.exe
  - id: msi-credential-provider
    desc: ScreenConnect credential provider in MSI
    crit: notable
    if:
      type: text
      substr: ScreenConnect.WindowsCredentialProvider.dll
  - id: msi-auth-package
    desc: ScreenConnect auth package in MSI
    crit: notable
    if:
      type: text
      substr: ScreenConnect.WindowsAuthenticationPackage.dll
  - id: msi-remote-control-banner
    desc: ScreenConnect remote control banner
    crit: suspicious
    if:
      type: text
      substr: 'Your computer is being controlled by {0}'
  - id: msi-launch-parameters-constraint
    desc: ScreenConnect launch parameters config
    crit: notable
    if:
      type: text
      substr: ClientLaunchParametersConstraint
  - id: msi-relay-host-parameter
    desc: ScreenConnect relay host parameter
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: \?h=[a-z0-9-]+-relay\.screenconnect\.com&amp;p=443
  - id: msi-rsa-key-parameter
    desc: ScreenConnect RSA key parameter
    crit: component
    conf: 0.96
    if:
      type: text
      substr: BgIAAACkAABSU0Ex
  - id: msi-feedback-survey-hidden
    desc: ScreenConnect hides survey prompt
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: ShowFeedbackSurveyForm
  - id: msi-under-control-banner-hidden
    desc: ScreenConnect hides control banner
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: AccessShowUnderControlBanner
  - id: msi-balloon-connect-hidden
    desc: ScreenConnect hides connect balloon
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: AccessShowBalloonOnConnect
  - id: msi-balloon-hide-hidden
    desc: ScreenConnect hides hide balloon
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: AccessShowBalloonOnHide
  - id: msi-tray-icon-hidden
    desc: ScreenConnect hides tray icon
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: AccessShowSystemTrayIcon
  - id: msi-wallpaper-hiding
    desc: ScreenConnect toggles wallpaper hiding
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: HideWallpaperOnConnect

composite_rules:
  - id: msi-screenconnect-components
    desc: ScreenConnect component bundle in MSI
    crit: suspicious
    conf: 0.98
    needs: 3
    any:
      - id: msi-clientservice-dll
      - id: msi-backstage-shell
      - id: msi-credential-provider
      - id: msi-auth-package
      - id: msi-remote-control-banner
  - id: msi-stealth-feedback-group
    desc: ScreenConnect suppresses local feedback
    crit: suspicious
    conf: 0.99
    needs: 2
    any:
      - id: msi-feedback-survey-hidden
      - id: msi-under-control-banner-hidden
      - id: msi-wallpaper-hiding
  - id: msi-stealth-access-group
    desc: ScreenConnect suppresses access indicators
    crit: suspicious
    conf: 0.99
    needs: 2
    any:
      - id: msi-balloon-connect-hidden
      - id: msi-balloon-hide-hidden
      - id: msi-tray-icon-hidden
  - id: msi-screenconnect-stealth-config
    desc: ScreenConnect stealth config in MSI
    crit: suspicious
    conf: 0.99
    all:
      - id: msi-launch-parameters-constraint
      - id: msi-stealth-feedback-group
      - id: msi-stealth-access-group
  - id: msi-screenconnect-relay-config
    desc: ScreenConnect relay config in MSI
    crit: suspicious
    conf: 0.99
    all:
      - id: msi-launch-parameters-constraint
      - id: msi-relay-host-parameter
      - id: msi-rsa-key-parameter
  - id: msi-screenconnect-service-installer
    desc: ScreenConnect service installer MSI
    crit: hostile
    conf: 0.99
    all:
      - id: msi-screenconnect-components
      - id: objectives/persistence/system/service/install::msi-service-wrapper-binaries
    any:
      - id: msi-screenconnect-stealth-config
      - id: msi-screenconnect-relay-config
