defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  crit: baseline
  conf: 0.85
  size_min: 512
  size_max: 500000000
traits:
  - id: license-manager-string
    desc: License manager identifier symbol
    if:
      type: symbol
      substr: LicenseManager
  - id: native-license-manager-basename
    desc: Native license manager filename
    conf: 0.9
    if:
      type: basename
      regex: '(?i)^(lib)?licensemanager.*\.(dll|so|dylib).*$'
  - id: license-config-json
    desc: License configuration filename
    conf: 0.8
    if:
      type: text
      substr: license_config.json
      section: data
  - id: lm-hardware-id-export
    desc: License manager hardware export
    conf: 0.9
    if:
      type: symbol
      exact: LM_GetHardwareId
  - id: lm-load-license-export
    desc: License manager load export
    conf: 0.9
    if:
      type: symbol
      exact: LM_LoadLicense
composite_rules:
  - id: native-license-manager-context
    desc: Native license manager SDK
    crit: baseline
    conf: 0.92
    all:
      - id: native-license-manager-basename
    any:
      - id: license-manager-string
      - id: license-config-json
      - id: lm-hardware-id-export
      - id: lm-load-license-export
