defaults:
  platforms: [windows]
  for: [pe]
  size_min: 16384
  size_max: 5242880

traits:
  - id: snremove-company-versioninfo
    desc: SNRemove CompanyName version info
    crit: notable
    conf: 0.97
    size_min: 1
    size_max: 5242880
    if:
      type: value
      path: pe.version.company
      exact: NirSoft

  - id: nirsoft-company-versioninfo
    desc: NirSoft CompanyName version info
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.company
      exact: NirSoft

  - id: nircmd-product-versioninfo
    desc: NirCmd ProductName version info
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.version.product_name
      exact: NirCmd

  - id: nircmd-original-filename
    desc: NirCmd original filename
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.original_filename
      exact: NirCmd.exe

  - id: snremove-product-versioninfo
    desc: SNRemove ProductName version info
    crit: notable
    conf: 0.97
    size_min: 1
    size_max: 5242880
    if:
      type: value
      path: pe.version.product_name
      exact: SNRemove

  - id: snremove-original-filename
    desc: SNRemove OriginalFilename version info
    crit: notable
    conf: 0.98
    size_min: 1
    size_max: 5242880
    if:
      type: value
      path: pe.version.original_filename
      exact: snremove.exe

composite_rules:
  - id: snremove-utility
    desc: NirSoft SNRemove utility
    crit: notable
    conf: 0.99
    size_min: 1
    size_max: 5242880
    all:
      - id: snremove-company-versioninfo
      - id: snremove-product-versioninfo
      - id: snremove-original-filename

  - id: nircmd-utility
    desc: NirSoft NirCmd utility
    crit: notable
    conf: 0.99
    all:
      - id: nirsoft-company-versioninfo
      - id: nircmd-product-versioninfo
    any:
      - id: nircmd-original-filename
