defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - elf
  - macho
  - pe
  size_max: 5000000
traits:
- id: repo
  size_min: 512
  size_max: 500000000
  desc: Chisel repository URL
  crit: suspicious
  conf: 1.0
  attack: T1090
  if:
    type: text
    substr: github.com/jpillora/chisel
    case_insensitive: true
    section: ".text"
- id: func
  size_min: 512
  size_max: 500000000
  desc: Chisel function name
  crit: suspicious
  conf: 0.9
  attack: T1090
  if:
    type: text
    regex: Chisel(Client|Server)
    section: ".text"
- id: keyword
  size_min: 512
  size_max: 500000000
  desc: Chisel tunneling keyword with mode context
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)\bchisel\b.{0,60}\btunnel\b
    case_insensitive: true
    section: ".text"
  not:
  - substr: Chisel Inc
  - substr: "& Chisel"
- id: mode
  size_min: 512
  size_max: 500000000
  desc: Chisel mode
  if:
    type: text
    regex: "(?i)(reverse|socks5)[_-]?(tunnel|proxy|forward)"
    section: ".text"
- id: mode-port-hint
  size_min: 512
  size_max: 500000000
  desc: Chisel mode with port context
  if:
    type: text
    regex: "(?i)chisel.{0,20}port"
    section: ".text"
composite_rules:
- id: keyword-with-mode
  size_min: 512
  size_max: 500000000
  desc: Chisel keyword with tunneling mode
  crit: suspicious
  conf: 0.8
  attack: T1090
  all:
  - id: keyword
  any:
  - id: mode
  - id: mode-port-hint
- id: chisel-detected
  size_min: 512
  size_max: 500000000
  desc: Chisel tunneling tool detected
  crit: notable
  conf: 0.95
  attack: T1090
  any:
  - id: repo
  - id: func
  - id: keyword-with-mode
