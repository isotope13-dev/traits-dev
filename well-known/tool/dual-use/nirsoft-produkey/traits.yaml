# NirSoft ProduKey — legitimate Windows / Office / SQL / Exchange / IE
# product-key recovery utility, freely redistributable. Frequently
# repacked and bundled into stealer toolkits as a credential-recovery
# component.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 16384
  size_max: 5242880
  attack: T1555.004
  mbc: B0028
traits:
  - id: produkey-versioninfo-original-name
    desc: ProduKey OriginalFilename version info
    crit: suspicious
    conf: 0.97
    if:
      type: kv
      path: pe.version.original_filename
      exact: ProduKey.exe

  - id: produkey-versioninfo-internal-name
    desc: ProduKey InternalName version info
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: pe.version.internal_name
      exact: ProduKey

  - id: produkey-product-name
    desc: ProduKey ProductName version info
    crit: notable
    conf: 0.97
    if:
      type: kv
      path: pe.version.product_name
      exact: ProduKey

composite_rules:
  - id: produkey-utility
    desc: NirSoft ProduKey product-key recovery utility
    crit: notable
    conf: 0.99
    all:
      - id: produkey-versioninfo-original-name
      - id: produkey-product-name

  - id: produkey-scrambled-upx-repack
    desc: Repacked NirSoft ProduKey with scrambled UPX header
    crit: hostile
    conf: 0.99
    all:
      - id: produkey-versioninfo-original-name
      - id: objectives/anti-static/pack/upx::scrambled-upx-header
