# NirSoft ProduKey — legitimate Windows / Office / SQL / Exchange / IE
# product-key recovery utility, freely redistributable. Frequently
# repacked and bundled into stealer toolkits as a credential-recovery
# component.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 16384
  size_max: 5242880
  attack: T1555.004
  mbc: B0028
traits:
  - id: produkey-temp-hive
    desc: ProduKey transient registry hive name
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "$$PRODUCKEY_TEMP_HIVE$$"
      section_offset_range: [0, 65536]
      section: UPX1

  - id: produkey-settings-key
    desc: HKCU NirSoft ProduKey settings key
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "Software\\NirSoft\\ProduKey"
      section_offset_range: [0, 65536]
      section: UPX1

  - id: produkey-versioninfo-original-name
    desc: ProduKey OriginalFilename version info
    crit: notable
    conf: 0.95
    if:
      type: kv
      path: pe.version_info.original_filename
      exact: ProduKey.exe

  - id: produkey-msft-pid-alphabet
    desc: Microsoft DigitalProductID alphabet
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "BCDFGHJKMPQRTVWXY2346789"
      section_offset_range: [0, 65536]
      section: UPX1

composite_rules:
  - id: produkey-utility
    desc: NirSoft ProduKey product-key recovery utility
    crit: notable
    conf: 0.99
    all:
      - id: produkey-versioninfo-original-name
    any:
      - id: produkey-temp-hive
      - id: produkey-settings-key
      - id: produkey-msft-pid-alphabet

  - id: produkey-scrambled-upx-repack
    desc: Repacked NirSoft ProduKey with scrambled UPX header
    crit: hostile
    conf: 0.99
    all:
      - id: produkey-utility
      - id: objectives/anti-static/pack/upx::scrambled-upx-header
