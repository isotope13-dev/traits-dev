defaults:
  platforms: [windows, unix]
  for: [binaries]
  crit: notable
  conf: 0.85
traits:
  - id: keyauth-domain
    size_min: 512
    size_max: 500000000
    desc: KeyAuth licensing domain
    if:
      type: text
      regex: keyauth\.(cc|win|uk|us)
      section: .text
  - id: keyauth-api
    size_min: 512
    size_max: 500000000
    desc: KeyAuth API endpoint
    conf: 0.9
    if:
      type: text
      regex: api\.keyauth\.(cc|win|uk)
      section: .text
  - id: keyauth-string
    size_min: 512
    size_max: 500000000
    desc: KeyAuth identifier string
    conf: 0.8
    if:
      type: text
      regex: (?i)keyauth[_-]?(invalid|license|auth|key)
      section: .text
composite_rules:
  - id: keyauth-infrastructure
    size_min: 512
    size_max: 500000000
    desc: KeyAuth licensing system detected
    crit: suspicious
    conf: 0.9
    any:
      - id: well-known/tool/dual-use/keyauth
