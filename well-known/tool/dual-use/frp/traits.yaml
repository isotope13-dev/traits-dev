# FRP — Fast Reverse Proxy
# https://github.com/fatedier/frp
defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: "T1090.003"
  size_min: 1024
  size_max: 524288000

traits:
  - id: frp-repo
    desc: FRP GitHub repo path
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "github.com/fatedier/frp"
      section: rdata

  - id: frp-client-admin-ui
    desc: FRP client admin UI title
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "<title>frp client admin UI</title>"
      section: rdata

  - id: frp-client-description
    desc: FRP client description string
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: "client of frp (https://github.com/fatedier/frp)"
      section: rdata
