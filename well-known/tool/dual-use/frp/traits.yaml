# FRP — Fast Reverse Proxy
# https://github.com/fatedier/frp
defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: "T1090.003"
  size_min: 1024
  size_max: 524288000

traits:
  - id: frp-binary-basename
    desc: FRP client/server binary name
    crit: notable
    conf: 0.98
    if:
      type: path
      basename: true
      regex: "^frp[cs](\\.exe)?$"

  - id: frp-repo
    desc: FRP GitHub repo path
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "github.com/fatedier/frp/"
      section: .rodata

  - id: frp-client-admin-ui
    desc: FRP client admin UI title
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "<title>frp client admin UI</title>"
      section: .rodata

  - id: frp-client-description
    desc: FRP client description string
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: "client of frp (https://github.com/fatedier/frp)"
      section: .rodata

  - id: frp-server-source-name
    desc: FRP server name in source
    crit: notable
    conf: 0.9
    for: [shell, python, javascript, php, powershell]
    if:
      type: text
      regex: '\bfrps(\.(ini|toml))?\b'

  - id: frp-client-source-name
    desc: FRP client name in source
    crit: notable
    conf: 0.9
    for: [shell, python, javascript, php, powershell]
    if:
      type: text
      regex: '\bfrpc(\.(ini|toml))?\b'

composite_rules:
  - id: frp-tool
    desc: FRP reverse proxy tool
    crit: notable
    conf: 0.98
    any:
      - id: frp-binary-basename
      - id: frp-repo
      - id: frp-client-admin-ui
      - id: frp-client-description
      - id: frp-server-source-name
      - id: frp-client-source-name
