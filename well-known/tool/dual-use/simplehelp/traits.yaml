defaults:
  platforms: [windows, macos, linux]
  for: [binaries, scripts, oledoc]
  attack: "T1219"
  size_min: 512
  size_max: 500000000

traits:
  - id: simplehelp-name-binary
    desc: SimpleHelp product name in binary
    crit: notable
    conf: 0.92
    for: [pe, dll, elf, macho]
    if:
      type: text
      substr: SimpleHelp
      section: rdata
  - id: simplehelp-name-script
    desc: SimpleHelp product name in script or document
    crit: component
    conf: 0.92
    for: [scripts, oledoc]
    if:
      type: text
      substr: SimpleHelp
  - id: simplegateway-service-binary
    desc: SimpleGateway service component in binary
    crit: notable
    conf: 0.94
    for: [pe, dll, elf, macho]
    if:
      type: text
      substr: SimpleGatewayService
      section: rdata
  - id: simplegateway-service-script
    desc: 'simplegateway service script'
    crit: component
    conf: 0.94
    for: [scripts, oledoc]
    if:
      type: text
      substr: SimpleGatewayService
  - id: simplehelp-customer-jar-binary
    desc: SimpleHelp customer jar component in binary
    crit: notable
    conf: 0.94
    for: [pe, dll, elf, macho]
    if:
      type: text
      substr: customer.jar
      section: rdata
  - id: simplehelp-customer-jar-script
    desc: SimpleHelp customer jar in script or document
    crit: component
    conf: 0.94
    for: [scripts, oledoc]
    if:
      type: text
      substr: customer.jar

composite_rules:
  - id: simplehelp-name
    desc: SimpleHelp product name
    crit: notable
    conf: 0.92
    any:
      - id: simplehelp-name-binary
      - id: simplehelp-name-script
  - id: simplegateway-service
    desc: SimpleGateway service component
    crit: notable
    conf: 0.94
    any:
      - id: simplegateway-service-binary
      - id: simplegateway-service-script
  - id: simplehelp-customer-jar
    desc: SimpleHelp customer jar component
    crit: notable
    conf: 0.94
    any:
      - id: simplehelp-customer-jar-binary
      - id: simplehelp-customer-jar-script
  - id: simplehelp-rmm-component
    desc: SimpleHelp RMM component
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: simplehelp-name
      - id: simplegateway-service
      - id: simplehelp-customer-jar
