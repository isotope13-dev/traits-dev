defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1048576
  size_max: 20971520

traits:
  - id: zero-import-count
    desc: Import count is exactly zero
    crit: component
    conf: 0.98
    if:
      type: metrics
      field: binary.import_count
      max: 0

  - id: product-name
    desc: PvZ Tools product name
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.product_name
      exact: "PvZ Tools"

  - id: file-description
    desc: PvZ Tools file description
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.description
      exact: "PvZ Tools"

  - id: internal-name
    desc: pvztools internal name
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.internal_name
      exact: "pvztools"

  - id: company-name
    desc: Cube Studio company name
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.company
      exact: "Cube Studio"

composite_rules:
  - id: pvz-tools-game-trainer
    desc: PvZ Tools game trainer
    crit: baseline
    conf: 0.99
    all:
      - id: company-name
    any:
      - id: product-name
      - id: file-description
      - id: internal-name
    needs: 2

  - id: pvz-tools-importless-packed-dump
    desc: PvZ Tools importless packed memory dump
    crit: suspicious
    conf: 0.97
    all:
      - id: pvz-tools-game-trainer
      - id: zero-import-count
      - id: metadata/binary/section/names::upx-section-pair
      - id: metadata/binary/section/metrics::pe-nonstandard-entry
    any:
      - id: metadata/signed/trust-level::unsigned
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::control-flow-obfuscation
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-max-complexity
