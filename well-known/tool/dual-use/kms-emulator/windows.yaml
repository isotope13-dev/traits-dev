defaults:
  platforms: [windows]
  for: [pe]
  size_min: 20000
  size_max: 1000000

traits:
- id: server-emulator-banner
  desc: KMS emulator server banner
  crit: component
  conf: 0.95
  if:
    type: text
    substr: "KMS Server Emulator running..."
    section: rdata
- id: activation-response-log
  desc: KMS activation response log
  crit: component
  conf: 0.94
  if:
    type: text
    substr: "Activation response sent."
    section: rdata
- id: rpc-error-messages
  desc: KMS RPC error messages
  crit: component
  conf: 0.92
  count_min: 2
  if:
    type: text
    regex: "RpcServer(RegisterIfEx|Listen|UseProtseqEp)"
    section: rdata
- id: kms-rpc-interface-uuid
  desc: KMS activation RPC UUID
  crit: component
  conf: 0.98
  if:
    type: hex
    pattern: "75 21 c8 51 4e 84 50 47 b0 d8 ec 25 55 55 bc 06"
    section: .rdata
- id: request-console-log
  desc: KMS request console log
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "Request is got from:"
    section: rdata
- id: hardcoded-endpoint-reference
  desc: Hardcoded KMS endpoint reference
  crit: component
  conf: 0.94
  if:
    type: text
    exact: "12.8.92.17:23313"
    section: rdata
- id: overlay-tail-marker
  desc: Base32 overlay tail marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "PFGDY1IQJUKWQPXIAUC6LUJ4VWBMOBJ2ATNODZU5XLD1WAHVGA6"
    section: overlay
- id: overlay-tail-marker-alt
  desc: Alternate Base32 overlay tail marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: "JTSBQ0BX7V2M5HT72J9H7XUAWHDNPLUIX1T7ORT49Q7U0UINGJ6"
    section: overlay

composite_rules:
- id: kms-rpc-emulator
  desc: KMS RPC emulator detected
  crit: suspicious
  conf: 0.97
  all:
  - id: server-emulator-banner
  - id: activation-response-log
  - id: rpc-error-messages
  - id: kms-rpc-interface-uuid
  any:
  - id: micro-behaviors/communications/ipc/rpc::tcp-rpc-server
  - id: micro-behaviors/communications/ipc/rpc::rpc-tcp-protseq
  - id: request-console-log
  - id: hardcoded-endpoint-reference
  - id: overlay-tail-marker
  - id: overlay-tail-marker-alt
- id: kms-rpc-emulator-overlay-build
  desc: KMS emulator build with overlay marker
  crit: suspicious
  conf: 0.98
  needs: 4
  any:
  - id: server-emulator-banner
  - id: kms-rpc-interface-uuid
  - id: overlay-tail-marker
  - id: overlay-tail-marker-alt
  - id: request-console-log
  - id: hardcoded-endpoint-reference
  - id: micro-behaviors/communications/ipc/rpc::rpc-tcp-protseq
