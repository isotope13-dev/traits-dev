defaults:
  platforms: [windows]
  for: [pe]
  size_min: 20000
  size_max: 1000000

traits:
- id: server-emulator-banner
  desc: KMS emulator server banner
  crit: component
  conf: 0.95
  if:
    type: text
    substr: "KMS Server Emulator running..."
    section: rdata
- id: activation-response-log
  desc: KMS activation response log
  crit: component
  conf: 0.94
  if:
    type: text
    substr: "Activation response sent."
    section: rdata
- id: rpc-error-messages
  desc: KMS RPC error messages
  crit: component
  conf: 0.92
  count_min: 2
  if:
    type: text
    regex: "RpcServer(RegisterIfEx|Listen|UseProtseqEp)"
    section: rdata
- id: request-console-log
  desc: KMS request console log
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "Request is got from:"
    section: rdata

composite_rules:
- id: kms-rpc-emulator
  desc: KMS RPC emulator detected
  crit: suspicious
  conf: 0.97
  all:
  - id: server-emulator-banner
  - id: activation-response-log
  - id: rpc-error-messages
  - id: micro-behaviors/communications/ipc/rpc::tcp-rpc-server
  any:
  - id: request-console-log
  - id: micro-behaviors/communications/ipc/rpc::rpc-server-dispatch-stub
