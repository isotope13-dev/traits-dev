defaults:
  platforms:
  - windows
  for:
  - pe
  size_max: 5000000
traits:
- id: bat-to-exe-converter
  size_min: 512
  size_max: 500000000
  desc: Bat To Exe Converter footprint
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: b2eincfilepath
    section: ".text"
- id: bat-to-exe-pad
  size_min: 512
  size_max: 500000000
  desc: Bat To Exe Converter PAD string
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: PAD-b2edecompile
    section: ".text"
- id: bat-to-exe-password
  size_min: 512
  size_max: 500000000
  desc: Bat To Exe Converter password argument
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: "-b2epass"
    section: ".text"
