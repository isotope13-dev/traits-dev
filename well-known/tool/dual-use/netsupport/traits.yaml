defaults:
  platforms: [windows]
  crit: suspicious
  conf: 0.9

traits:
  - id: client32-config-name
    desc: NetSupport client32 config filename
    crit: component
    for: [archive]
    size_min: 100000
    size_max: 50000000
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)client32\.ini$'
  - id: nsm-config-name
    desc: NetSupport Manager config filename
    crit: component
    for: [archive]
    size_min: 100000
    size_max: 50000000
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)NSM\.ini$'
  - id: pcicl32-dll-name
    desc: NetSupport PCICL32 DLL filename
    crit: component
    for: [archive]
    size_min: 100000
    size_max: 50000000
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)PCICL32\.DLL$'
  - id: remcmdstub-exe-name
    desc: NetSupport remote command stub
    crit: component
    for: [archive]
    size_min: 100000
    size_max: 50000000
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)remcmdstub\.exe$'
  - id: audiocapture-dll-name
    desc: NetSupport audio capture DLL
    crit: component
    for: [archive]
    size_min: 100000
    size_max: 50000000
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)AudioCapture\.dll$'
  - id: netsupport-manager-string
    desc: NetSupport Manager product string
    for: [pe, dll]
    size_min: 10000
    size_max: 10000000
    if:
      type: text
      section: .rdata
      substr: NetSupport Manager
  - id: netsupport-remote-control-string
    desc: NetSupport remote-control string
    for: [pe, dll]
    size_min: 10000
    size_max: 10000000
    if:
      type: text
      section: .rdata
      substr: NetSupport Remote Control
  - id: pcicl32-import
    desc: Imports NetSupport PCICL32 DLL
    for: [pe, dll]
    size_min: 10000
    size_max: 10000000
    if:
      type: import
      exact: PCICL32.dll

composite_rules:
  - id: netsupport-client-archive-layout
    desc: NetSupport client archive layout
    crit: suspicious
    conf: 0.95
    for: [archive]
    size_min: 100000
    size_max: 50000000
    all:
      - id: client32-config-name
      - id: nsm-config-name
    any:
      - id: pcicl32-dll-name
      - id: remcmdstub-exe-name
      - id: audiocapture-dll-name
    needs: 2
  - id: netsupport-client-binary
    desc: NetSupport client binary
    crit: suspicious
    conf: 0.95
    for: [pe, dll]
    size_min: 10000
    size_max: 10000000
    any:
      - id: pcicl32-import
    all:
      - id: netsupport-manager-string
      - id: netsupport-remote-control-string
