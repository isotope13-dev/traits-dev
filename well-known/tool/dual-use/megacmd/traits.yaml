# MEGAcmd — official command-line client for MEGA cloud storage.
# Routinely used by ransomware affiliates (Qilin, BlackBasta, etc.) to
# upload stolen data to MEGA accounts before encryption.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, elf, macho, batch, powershell, shell]
  attack: T1567.002
  mbc: B0030
  size_min: 256
  size_max: 500000000
traits:
- id: mega-domain-uploader
  desc: MEGA cloud upload domain reference
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: '\b(mega\.nz|mega\.io|mega\.co\.nz)\b'
- id: megacmd-binary-name--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: MEGAcmdServer
  count_max: 1001457
- id: megacmd-binary-name--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: MEGAcmdShell
  count_max: 1001458
- id: megacmd-binary-name--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: logout
  count_max: 1001459
- id: megacmd-binary-name--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: login
  count_max: 1001460
- id: megacmd-binary-name--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: sync
  count_max: 1001461
- id: megacmd-server-name
  desc: MEGAcmdServer process name
  crit: notable
  conf: 0.92
  if:
    type: basename
    exact: MEGAcmdServer.exe
    case_insensitive: true
composite_rules:
- id: megacmd-tool
  desc: MEGAcmd cloud-storage client
  crit: hostile
  conf: 0.95
  unless:
  - id: well-known/app/alist::release-path
  any:
  - id: megacmd-binary-name
  - id: megacmd-server-name
  all:
  - id: mega-domain-uploader
- id: megacmd-binary-name
  desc: MEGAcmd binary names
  crit: notable
  conf: 0.85
  any:
  - id: megacmd-binary-name--rx-1
  - id: megacmd-binary-name--rx-2
  - id: megacmd-binary-name--rx-3
  - id: megacmd-binary-name--rx-4
  - id: megacmd-binary-name--rx-5
