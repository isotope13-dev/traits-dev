defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1048576
  size_max: 67108864

traits:
  - id: nckteam-company
    desc: NckTeam company metadata
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version.company
      exact: NckTeam

  - id: spreadtrum-description
    desc: Spreadtrum Module file description
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version.description
      exact: Spreadtrum Module

  - id: spreadtrum-internal-name
    desc: Spreadtrum Module internal name
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version.internal_name
      exact: Spreadtrum Module

  - id: spreadtrum-copyright
    desc: Spreadtrum Module copyright field
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.copyright
      exact: Spreadtrum Module

  - id: nck-firmware-backup-magic
    desc: NCK firmware backup magic
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: '****NCK_TEAM_FW_BACKUP****'
      section: .rdata

  - id: nck-online-tool-workspace
    desc: NCKOnlineTool workspace path
    crit: component
    conf: 0.97
    if:
      type: text
      exact: 'NCKOnlineTool\'
      section: .rdata

  - id: repair-imei
    desc: IMEI repair workflow label
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: '*Repair IMEI*'
      section: .rdata

composite_rules:
  - id: nck-spreadtrum-module
    desc: NckTeam Spreadtrum servicing tool
    crit: baseline
    conf: 0.99
    all:
      - id: nckteam-company
    any:
      - id: spreadtrum-description
      - id: spreadtrum-internal-name
      - id: spreadtrum-copyright
    needs: 2

  - id: nck-spreadtrum-riskware
    desc: NckTeam Spreadtrum phone-unlock riskware
    crit: suspicious
    conf: 0.99
    all:
      - id: nck-spreadtrum-module
    any:
      - id: repair-imei
      - id: nck-firmware-backup-magic
      - id: nck-online-tool-workspace
      - id: objectives/evasion/security-bypass/policy/mobile::android-mdm-bypass-provisioning
      - id: objectives/impact/wipe/disk/format::android-userdata-service-wipe
      - id: micro-behaviors/hardware/flash/device::spreadtrum-fdl-flash-tooling
    needs: 2
