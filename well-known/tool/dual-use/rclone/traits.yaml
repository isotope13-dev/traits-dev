# rclone — open-source cross-cloud sync tool widely abused by ransomware
# affiliates (Qilin/Agenda, BlackBasta, ALPHV/BlackCat, Akira, LockBit)
# for double-extortion data exfiltration before encryption. Detected by
# the binary's distinctive package paths and command vocabulary.
defaults:
  platforms: [windows, unix]
  attack: T1567.002
  mbc: B0030
  size_min: 256
  size_max: 500000000
traits:
  # Presence of the rclone package identifies a dual-use tool (rclone itself is
  # ubiquitous legitimate software) — analyst-relevant but not suspicious on its
  # own (cf. rclone-config-flag, notable). Exfil intent comes from composites that
  # pair rclone with C2/staging/scheduling context.
  - id: rclone-package-path
    desc: rclone Go package path
    crit: notable
    conf: 0.97
    for: [pe, dll, elf, macho, batch, powershell, shell]
    if:
      type: text
      substr: github.com/rclone/rclone
  - id: rclone-config-flag
    desc: rclone --config remote argument
    crit: notable
    conf: 0.85
    for: [batch, powershell, shell]
    if:
      type: text
      regex: '--config\s+\S{1,80}rclone'
  - id: rclone-copy-cmd
    desc: rclone copy/sync/move command
    crit: notable
    conf: 0.85
    for: [batch, powershell, shell]
    if:
      type: text
      regex: '\brclone\s+(copy|sync|move)\b'
  - id: rclone-listing-cmd
    desc: rclone ls/lsd/ncdu command
    crit: notable
    conf: 0.8
    for: [batch, powershell, shell]
    if:
      type: text
      regex: '\brclone\s+(ls|lsd|ncdu)\b'
  - id: rclone-conf-basename
    desc: rclone configuration filename
    crit: component
    conf: 0.95
    for: [data]
    if:
      type: path
      basename: true
      exact: rclone.conf
  - id: rclone-conf-archive-member
    desc: Archive contains rclone.conf
    crit: notable
    conf: 0.9
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)rclone\.conf$'
    downgrade:
      any:
        - id: metadata/package/files/included::github-module-zip-basename
        - id: well-known/tool/sysadmin/kubernetes/iac/
  - id: rclone-conf-remote-section
    desc: rclone config remote section
    crit: component
    conf: 0.9
    for: [data]
    if:
      type: raw
      regex: '(?m)^\[[A-Za-z0-9_. -]{1,80}\]\r?\n'
  - id: rclone-conf-remote-type
    desc: rclone config remote type field
    crit: component
    conf: 0.9
    for: [data]
    if:
      type: raw
      regex: '(?m)^type\s*=\s*[a-z][a-z0-9_-]{1,30}\b'
  - id: rclone-conf-credential-field
    desc: rclone config credential-like field
    crit: notable
    conf: 0.9
    for: [data]
    if:
      type: raw
      regex: '(?m)^[A-Za-z_]*(pass|token|secret|key)[A-Za-z_]*\s*=\s*\S{8,}'
composite_rules:
  - id: rclone-config-with-credentials
    desc: rclone config contains remote credentials
    crit: suspicious
    conf: 0.94
    all:
      - id: rclone-conf-basename
      - id: rclone-conf-remote-section
      - id: rclone-conf-remote-type
      - id: rclone-conf-credential-field
  - id: rclone-tool
    desc: rclone cross-cloud sync tool
    crit: hostile
    conf: 0.95
    any:
      - id: well-known/tool/dual-use/rclone
