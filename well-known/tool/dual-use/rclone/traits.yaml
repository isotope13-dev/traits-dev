# rclone — open-source cross-cloud sync tool widely abused by ransomware
# affiliates (Qilin/Agenda, BlackBasta, ALPHV/BlackCat, Akira, LockBit)
# for double-extortion data exfiltration before encryption. Detected by
# the binary's distinctive package paths and command vocabulary.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, elf, macho, batch, powershell, shell]
  attack: T1567.002
  mbc: B0030
  size_min: 256
  size_max: 500000000
traits:
  - id: rclone-package-path
    desc: rclone Go package path
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: github.com/rclone/rclone
  - id: rclone-config-flag
    desc: rclone --config remote argument
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '--config\s+\S{1,80}rclone'
  - id: rclone-copy-cmd
    desc: rclone copy/sync/move command
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\brclone\s+(copy|sync|move)\b'
  - id: rclone-listing-cmd
    desc: rclone ls/lsd/ncdu command
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\brclone\s+(ls|lsd|ncdu)\b'
composite_rules:
  - id: rclone-tool
    desc: rclone cross-cloud sync tool
    crit: hostile
    conf: 0.95
    any:
      - id: well-known/tool/dual-use/rclone
