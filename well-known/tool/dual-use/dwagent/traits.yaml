defaults:
  attack: T1219
  platforms: [windows]
  for: [pe]
  size_min: 1000
  size_max: 500000000

traits:
  - id: dwagent-product-name
    desc: DWAgent product name
    crit: notable
    conf: 0.95
    if:
      type: text
      word: DWAgent
      section: .rdata
  - id: dwagent-library-name
    desc: DWAgent library marker
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: DWAgentLib
      section: .rdata
composite_rules:
  - id: dwagent-product-service
    desc: DWAgent product and service markers
    crit: component
    conf: 0.97
    all:
      - id: dwagent-product-name
      - id: objectives/persistence/login/self-install/remote-support::dwagent-windows-service-binary
  - id: dwagent-service-launcher
    desc: DWAgent service and launcher markers
    crit: component
    conf: 0.97
    all:
      - id: objectives/persistence/login/self-install/remote-support::dwagent-windows-service-binary
      - id: objectives/persistence/login/self-install/remote-support::dwagent-windows-launcher-binary
  - id: dwagent-install-component-set
    desc: DWAgent installation component set
    crit: notable
    conf: 0.98
    any:
      - id: dwagent-product-service
      - id: dwagent-service-launcher
