# Shadowsocks-Rust (sslocal/ssserver) — Rust implementation of the
# Shadowsocks proxy protocol.
#
# Source: https://github.com/shadowsocks/shadowsocks-rust
#
# Dual-use: legitimate censorship-circumvention tool widely used in
# regions with restricted internet, also routinely abused by malware
# for residential-proxy botnets, traffic-interception VPN scams (the
# Zyra/ShieldGuard campaign), and C2 channel obfuscation.
#
# In an enterprise context, finding sslocal.exe on a workstation is
# almost always either an indicator of compromise or a policy
# violation. Atoms here fire at suspicious by default.
#
# NOTE: Rust binaries store these crate-path strings in .rdata, not
# .text — do not add a `section:` constraint here.
defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: "T1090"
  size_min: 1024
  size_max: 524288000

traits:
  - id: build-root-path
    desc: shadowsocks-rust GitHub Actions build root path
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "shadowsocks-rust\\shadowsocks-rust\\crates"
      section: rdata

  - id: tcprelay-utils-module
    desc: shadowsocks tcprelay utils module path
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "shadowsocks::relay::tcprelay::utils"
      section: rdata

  - id: dns-resolver-module
    desc: shadowsocks DNS resolver module path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "shadowsocks::dns_resolver"
      section: rdata

  - id: shadowsocks-service-crate
    desc: shadowsocks-service crate path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "shadowsocks-service"
      section: rdata

  - id: shadowsocks-plugin-mod
    desc: shadowsocks plugin mod source path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "shadowsocks/src/plugin/mod.rs"
      section: rdata
