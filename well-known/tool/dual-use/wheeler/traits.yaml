# Wheeler — a benign npm package whose bundled update-checker launches a
# detached Node process to check for updates, which trips the stealth-spawn
# dropper heuristics. These identity markers exist so an objectives/ dropper
# rule can exclude it in `unless:` — benign-context belongs in well-known/, not
# defined under the attacker objective it carves out of.
defaults:
  platforms: [windows, unix]
  for: [javascript]
  size_max: 5000000
traits:
- id: wheeler-update-hook-path
  desc: Wheeler update-check hook path
  crit: baseline
  conf: 0.95
  if:
    type: path
    basename: true
    exact: "wheeler-check-update.js"
- id: wheeler-update-checker-agent
  desc: Wheeler update-checker user agent
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: "wheeler-update-checker"
