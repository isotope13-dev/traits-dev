# tun2socks — Go implementation of TUN-to-SOCKS5 redirector.
#
# Source: https://github.com/xjasonlyu/tun2socks
#
# Dual-use: bundled inside legitimate VPN clients to route OS-level
# traffic over a SOCKS5 backend, also widely abused by malware to
# transparently redirect victim traffic through attacker-controlled
# proxy infrastructure (residential-proxy botnets, traffic-laundering
# VPN scams like the Zyra/ShieldGuard campaign).
#
# In enterprise contexts the presence of a standalone tun2socks.exe
# on a workstation is almost always either malware tooling or an
# unauthorised tunnel. Suspicious by default.
#
# Go module-path strings live in .rdata / Go pclntab — pin section
# constraint to .rdata.
defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: "T1090"
  size_min: 1024
  size_max: 524288000

traits:
  - id: xjasonlyu-core-module
    desc: xjasonlyu/tun2socks v2 core module path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "github.com/xjasonlyu/tun2socks/v2/core"
      section: rdata

  - id: xjasonlyu-engine-module
    desc: xjasonlyu/tun2socks v2 engine module path
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "github.com/xjasonlyu/tun2socks/v2/engine"
      section: rdata

  - id: xjasonlyu-proxy-module
    desc: xjasonlyu/tun2socks v2 proxy module path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "github.com/xjasonlyu/tun2socks/v2/proxy"
      section: rdata

  - id: xjasonlyu-tunnel-module
    desc: xjasonlyu/tun2socks v2 tunnel module path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "github.com/xjasonlyu/tun2socks/v2/tunnel"
      section: rdata
