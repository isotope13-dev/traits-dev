# Wstunnel — tunnel TCP/UDP/SOCKS over WebSocket/HTTPS.
# https://github.com/erebe/wstunnel
# Rust-based dual-use tunneling tool deployed as wt.exe in
# SHADOW-EARTH-053 to relay SOCKS5 traffic over HTTPS to attacker C2.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, elf, macho]
  attack: T1572
  mbc: B0030
  size_min: 512
  size_max: 500000000
traits:
  - id: wstunnel-repo
    desc: Wstunnel GitHub repo path
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      substr: github.com/erebe/wstunnel
  - id: wstunnel-binary-name
    desc: wstunnel binary name string
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      regex: '\bwstunnel\b'
  - id: wstunnel-restrict-to
    desc: Wstunnel --restrict-to argument
    crit: notable
    conf: 0.95
    if:
      type: encoded
      regex: 'restrict-to\b|--remote-to-local|--local-to-remote'
composite_rules:
  - id: wstunnel-tunnel
    desc: Wstunnel WebSocket/HTTPS tunneling tool
    crit: hostile
    conf: 0.97
    any:
      - id: wstunnel-repo
    all:
      - id: wstunnel-restrict-to
