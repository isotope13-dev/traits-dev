# Farbrausch's kkrunchy executable packer is used by legitimate demoscene
# releases.  The paired markers identify the packer context; neither marker
# alone is treated as benign because packers can be reused by unwanted code.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 32768
  size_max: 10485760

traits:
  - id: farbrausch-pe-header
    desc: Farbrausch PE packer marker in packed section
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: farbrauschPE
      section: kkrunchy

  - id: kkrunchy-section
    desc: kkrunchy executable packer section
    crit: notable
    conf: 0.99
    if:
      type: section
      exact: kkrunchy

  - id: kkrunchy-rwx-section
    desc: kkrunchy packed section is read-write-executable
    crit: notable
    conf: 0.99
    if:
      type: section
      exact: kkrunchy
      readable: true
      writable: true
      executable: true

composite_rules:
  - id: kkrunchy-rwx-packer-context
    desc: Recognized kkrunchy RWX packer context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: kkrunchy-section
      - id: kkrunchy-rwx-section
