defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl]
  crit: notable
  conf: 0.95

traits:
  - id: package-name
    desc: Waymap package identity
    for: [pkginfo, whl]
    if:
      type: value
      path: name
      exact: waymap
  - id: wheel-package-name
    desc: Waymap wheel package identity
    for: [whl]
    if:
      type: value
      path: METADATA::name
      exact: waymap
  - id: scanner-source-marker
    desc: Waymap scanner source marker
    for: [python]
    if:
      type: text
      substr: "waymap developers"
