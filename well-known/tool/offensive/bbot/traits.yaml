defaults:
  platforms: [unix, windows]
  for: [python, text, whl, pkginfo, pyproject.toml]
  crit: notable
  conf: 0.99

traits:
  - id: package-tree-member
    desc: BBOT security reconnaissance tool package member
    if:
      type: path
      regex: '(?i)(^|[\\/])bbot([\\/]|-[0-9])'

  - id: package-name
    desc: BBOT package metadata name
    for: [pkginfo, pyproject.toml]
    if:
      type: value
      path: name
      exact: bbot
