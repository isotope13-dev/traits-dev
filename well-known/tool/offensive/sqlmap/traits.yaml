# sqlmap is an openly distributed SQL-injection assessment and database
# takeover tool.  Its source and tests intentionally contain exploit probes,
# credential-path fixtures, DNS/OOB examples, and payload-staging examples.
# This identity is benign context for those source-tree members; it does not
# suppress the underlying neutral capability traits.
defaults:
  platforms: [unix, windows]
  for: [python, text, zip]
  crit: notable
  conf: 0.99

traits:
  - id: source-tree-member
    desc: sqlmap source tree member
    if:
      type: path
      regex: '(?i)sqlmapproject[\\/_-]sqlmap'
