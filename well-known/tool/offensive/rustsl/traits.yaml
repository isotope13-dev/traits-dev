defaults:
  platforms: [windows, linux, macos]
  for: [binaries, source]
  crit: suspicious
  conf: 0.9
  size_max: 20000000

traits:
  - id: rsl-start-marker
    desc: RustSL encrypted payload start marker
    crit: component
    if:
      type: text
      substr: RSL_START
  - id: rsl-end-marker
    desc: RustSL encrypted payload end marker
    crit: component
    if:
      type: text
      substr: RSL_END
  - id: rsl-debug-log-name
    desc: RustSL debug log filename
    if:
      type: text
      substr: rsl_debug.log

composite_rules:
  - id: rsl-encrypted-payload-container
    desc: RustSL encrypted payload container markers
    crit: hostile
    conf: 0.98
    all:
      - id: rsl-start-marker
      - id: rsl-end-marker
