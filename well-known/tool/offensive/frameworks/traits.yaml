defaults:
  for: [scripts, binaries]
  platforms:
    - unix
    - windows
traits:
  - id: metasploit-ref
    size_min: 512
    size_max: 500000000
    desc: Metasploit framework reference
    crit: notable
    conf: 0.8
    attack: T1588.002
    if:
      type: text
      word: metasploit
      case_insensitive: true
      section: .text
    unless:
      - id: metadata/package/fields/vendor::bitdefender-ecnet-telemetry
  - id: msfpayload
    size_min: 512
    size_max: 500000000
    desc: Metasploit payload generator reference
    crit: suspicious
    conf: 0.9
    attack: T1587.001
    if:
      type: text
      substr: msfpayload
      section: rdata
  - id: metasploit-url
    size_min: 512
    size_max: 500000000
    desc: Metasploit website reference
    crit: component
    conf: 0.75
    attack: T1588.002
    if:
      type: text
      regex: metasploit\.com
      section: rdata
  - id: osx-x86-shell-bind-tcp
    size_min: 512
    size_max: 500000000
    desc: Metasploit osx/x86 bind shell
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
    if:
      type: text
      exact: "Payload: osx/x86/shell_bind_tcp"
      section: rdata
  - id: meterpreter
    size_min: 512
    size_max: 500000000
    desc: Meterpreter payload reference
    crit: suspicious
    conf: 0.95
    attack: T1059
    platforms:
      - windows
    if:
      type: text
      substr: /meterpreter/
      section: .text
  - id: payload-label
    size_min: 512
    size_max: 500000000
    desc: Payload label string
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: 'Payload: '
      section: .text
  - id: shh-bin-path
    size_min: 512
    size_max: 500000000
    desc: Suspicious /shh/bin path (typosquat)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /shh/bin
      section: .text
  - id: nmap-ref
    size_min: 512
    size_max: 500000000
    desc: Nmap port scanner reference
    crit: notable
    conf: 0.6
    attack: T1046
    if:
      type: text
      word: nmap
      section: .text
  - id: nmap-spoof-source
    size_min: 512
    size_max: 10485760
    desc: Nmap source IP spoofing
    crit: suspicious
    conf: 0.85
    attack: T1046
    if:
      type: text
      regex: (nmap|scan).{0,50}-S\s+[0-9]|arguments.{0,20}-S\s+[0-9]|'-S\s+[0-9]
      section: .text
  - id: masscan-ref
    size_min: 512
    size_max: 500000000
    desc: Masscan port scanner reference
    crit: notable
    conf: 0.75
    attack: T1046
    if:
      type: text
      word: masscan
      section: .text
  - id: masscan-adapter-ip
    size_min: 512
    size_max: 500000000
    desc: Masscan adapter-ip option
    crit: component
    if:
      type: text
      substr: adapter-ip
      section: .text
  - id: masscan-nocapture
    size_min: 512
    size_max: 500000000
    desc: Masscan nocapture option
    crit: component
    if:
      type: text
      substr: nocapture
      section: .text
  - id: masscan-output-format
    size_min: 512
    size_max: 500000000
    desc: Masscan output-format option
    crit: component
    if:
      type: text
      substr: output-format
      section: .text
  - id: masscan-randomize-hosts
    size_min: 512
    size_max: 500000000
    desc: Masscan randomize-hosts option
    crit: component
    if:
      type: text
      substr: randomize-hosts
      section: .text
  - id: chisel-ref
    size_min: 512
    size_max: 500000000
    desc: Chisel TCP/UDP tunnel tool
    crit: suspicious
    conf: 0.9
    attack: T1572
    if:
      type: text
      substr: jpillora/chisel
      section: .text
  - id: chisel-tls-letsencrypt
    size_min: 512
    size_max: 500000000
    desc: Chisel tlsLetsEncrypt function
    crit: component
    if:
      type: text
      substr: tlsLetsEncrypt
      section: .text
  - id: chisel-auth-user
    size_min: 512
    size_max: 500000000
    desc: Chisel authUser function
    crit: component
    if:
      type: text
      substr: authUser
      section: .text
  - id: chisel-tls-keycert
    size_min: 512
    size_max: 500000000
    desc: Chisel tlsKeyCert function
    crit: component
    if:
      type: text
      substr: tlsKeyCert
      section: .text
  - id: chisel-tunnel-out-ssh
    size_min: 512
    size_max: 500000000
    desc: Chisel tunnel_out_ssh function
    crit: component
    if:
      type: text
      substr: tunnel_out_ssh
      section: .text
  - id: venom-dliv3
    size_min: 512
    size_max: 500000000
    desc: Venom Dliv3 GitHub reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: text
      substr: Dliv3/Venom
      section: .text
  - id: venom-agent-path
    size_min: 512
    size_max: 500000000
    desc: Venom agent path reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: text
      substr: /Venom/agent
      section: .text
  - id: venom-agent-name
    size_min: 512
    size_max: 500000000
    desc: Venom agent name reference
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: text
      substr: venom_agent
      section: .text
  - id: al-khaser-check-mac-addr
    size_min: 1024
    size_max: 10485760
    desc: al-khaser MAC probe helper
    crit: component
    conf: 0.96
    platforms:
      - windows
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: text
      word: check_mac_addr
  - id: al-khaser-check-adapter-name
    size_min: 1024
    size_max: 10485760
    desc: al-khaser adapter probe helper
    crit: component
    conf: 0.96
    platforms:
      - windows
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: text
      word: check_adapter_name
  - id: al-khaser-attempt-read-memory-wow64
    size_min: 1024
    size_max: 10485760
    desc: al-khaser WoW64 memory helper
    crit: component
    conf: 0.97
    platforms:
      - windows
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: text
      word: attempt_to_read_memory_wow64
  - id: al-khaser-getpeb64
    size_min: 1024
    size_max: 10485760
    desc: al-khaser 64-bit PEB helper
    crit: component
    conf: 0.97
    platforms:
      - windows
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: text
      word: GetPeb64
  - id: al-khaser-enum-system-firmware
    size_min: 1024
    size_max: 10485760
    desc: al-khaser firmware table helper
    crit: component
    conf: 0.97
    platforms:
      - windows
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: text
      word: enum_system_firmware_tables
  - id: dirbuster
    size_min: 512
    size_max: 500000000
    desc: DirBuster directory brute-force tool
    crit: suspicious
    conf: 0.8
    attack: T1595.003
    if:
      type: text
      word: dirbuster
      section: .text
  - id: smbexec-ntlm
    size_min: 512
    size_max: 500000000
    desc: SMBExec NTLM HASH indicator
    crit: suspicious
    conf: 0.85
    attack: T1021.002
    if:
      type: text
      substr: NTLM HASH
      section: .text
  - id: smbexec-hashpass
    size_min: 512
    size_max: 500000000
    desc: SMBExec HASH PASS substitution indicator
    crit: suspicious
    conf: 0.85
    attack: T1021.002
    if:
      type: text
      substr: 'HASH PASS: Substituting'
      section: .text
  - id: pspy-ref
    size_min: 512
    size_max: 500000000
    desc: pspy process snooping tool
    crit: suspicious
    conf: 0.9
    attack: T1057
    platforms:
      - linux
    for:
      - elf
      - shell
    if:
      type: text
      substr: dominicbreuker/pspy
      section: .text
  - id: pspy-start-fsw
    size_min: 512
    size_max: 500000000
    desc: pspy startFSW function
    crit: component
    if:
      type: text
      substr: startFSW
      section: .text
  - id: pspy-start-pss
    size_min: 512
    size_max: 500000000
    desc: pspy startPSS function
    crit: component
    if:
      type: text
      substr: startPSS
      section: .text
  - id: pspy-trigger-every
    size_min: 512
    size_max: 500000000
    desc: pspy triggerEvery function
    crit: component
    if:
      type: text
      substr: triggerEvery
      section: .text
  - id: nmap-decoy-scan
    size_min: 512
    size_max: 500000000
    desc: Nmap decoy scan
    crit: suspicious
    conf: 0.85
    attack: T1046
    if:
      type: text
      regex: \bnmap(\.exe)?[^\n\r]{0,120}\s-D\s*(ME|RND|[0-9,]+|\d{1,3}(\.\d{1,3}){3})
      section: .text
composite_rules:
  - id: venom-ref
    size_min: 512
    size_max: 500000000
    desc: Venom shellcode generator reference
    crit: notable
    conf: 0.7
    any: null
  - id: smbexec
    size_min: 512
    size_max: 500000000
    desc: SMBExec tool usage
    crit: notable
    conf: 0.7
    any: null
  - id: metasploit-payload
    size_min: 512
    size_max: 500000000
    desc: Metasploit payload detected
    crit: suspicious
    conf: 0.95
    attack: T1587.001
    needs: 2
    any:
      - id: msfpayload
      - id: metasploit-url
      - id: payload-label
      - id: shh-bin-path
  - id: metasploit-osx-shell-bind
    size_min: 512
    size_max: 500000000
    desc: Metasploit macOS x86 bind shell
    crit: hostile
    conf: 0.98
    attack: T1059.004
    for:
      - macho
    platforms:
      - macos
    all:
      - id: metasploit-payload
      - id: osx-x86-shell-bind-tcp
  - id: masscan-config
    size_min: 512
    size_max: 500000000
    desc: Masscan configuration patterns
    crit: suspicious
    conf: 0.85
    attack: T1046
    needs: 3
    any:
      - id: masscan-adapter-ip
      - id: masscan-nocapture
      - id: masscan-output-format
      - id: masscan-randomize-hosts
  - id: chisel-functions
    size_min: 512
    size_max: 500000000
    desc: Chisel tunnel tool function signatures
    crit: suspicious
    conf: 0.85
    attack: T1572
    needs: 3
    any:
      - id: chisel-tls-letsencrypt
      - id: chisel-auth-user
      - id: micro-behaviors/communications/proxy/tunnel::go-websocket-handler
      - id: chisel-tls-keycert
      - id: chisel-tunnel-out-ssh
  - id: pspy-functions
    size_min: 512
    size_max: 500000000
    desc: pspy tool function signatures
    crit: suspicious
    conf: 0.8
    attack: T1057
    needs: 2
    any:
      - id: pspy-start-fsw
      - id: pspy-start-pss
      - id: pspy-trigger-every
  - id: masscan-execution
    size_min: 512
    size_max: 500000000
    desc: Masscan scanner execution
    crit: suspicious
    conf: 0.9
    attack: T1046
    platforms:
      - linux
    for:
      - elf
    all:
      - id: masscan-ref
      - id: micro-behaviors/process/create/exec::command-execution-capability
  - id: al-khaser-descriptor-table-probes
    size_min: 1024
    size_max: 10485760
    desc: al-khaser descriptor table helpers
    crit: component
    conf: 0.97
    platforms:
      - windows
    for:
      - c
      - cpp
      - pe
      - dll
    needs: 2
    any:
      - id: objectives/anti-analysis/vm-detect/instruction::idt-base-helper
      - id: objectives/anti-analysis/vm-detect/instruction::ldt-base-helper
      - id: objectives/anti-analysis/vm-detect/instruction::gdt-base-helper
  - id: al-khaser-anti-analysis-framework
    size_min: 1024
    size_max: 10485760
    desc: al-khaser anti-analysis framework source
    crit: suspicious
    conf: 0.98
    attack: T1587.001
    platforms:
      - windows
    for:
      - c
      - cpp
      - pe
      - dll
    needs: 3
    any:
      - id: al-khaser-check-mac-addr
      - id: al-khaser-check-adapter-name
      - id: al-khaser-attempt-read-memory-wow64
      - id: al-khaser-getpeb64
      - id: al-khaser-enum-system-firmware
      - id: al-khaser-descriptor-table-probes
