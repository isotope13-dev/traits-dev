defaults:
  platforms: [linux, macos, windows]
  for: [go.mod]
  size_min: 128
  size_max: 1048576
  attack: T1587.001

traits:
  - id: mythic-container-python-package
    desc: Mythic C2 Python service SDK
    crit: notable
    conf: 0.99
    for: [whl]
    if:
      type: value
      path: whl.distribution
      exact: mythic_container

  - id: mythic-go-module-path
    desc: Mythic C2 Go module path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?m)^module\s+github\.com/its-a-feature/Mythic\s*$'

  - id: mythic-rabbitmq-dependency
    desc: Mythic RabbitMQ dependency manifest
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "github.com/rabbitmq/amqp091-go"

  - id: mythic-sql-migrate-dependency
    desc: Mythic SQL migration dependency
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "github.com/rubenv/sql-migrate"

composite_rules:
  - id: mythic-c2-server-go-manifest
    desc: Mythic C2 server Go manifest
    crit: hostile
    conf: 0.98
    all:
      - id: mythic-go-module-path
    needs: 3
    any:
      - id: micro-behaviors/communications/http/server/framework::go-http-router-dep
      - id: mythic-rabbitmq-dependency
      - id: mythic-sql-migrate-dependency
      - id: micro-behaviors/communications/grpc::grpc-go-import
