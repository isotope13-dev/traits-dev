defaults:
  platforms: [linux]
  for: [elf, rust, so]
  crit: notable
  conf: 0.9
  size_min: 1024
  size_max: 20971520
traits:
  - id: volundr-framework-string
    desc: Volundr framework reference
    if:
      type: text
      word: "Volundr"
  - id: volundr-lib-string
    desc: Volundr library reference
    if:
      type: text
      substr: "libvolundr.so"
  - id: volundr-infect-tool
    desc: Volundr example infection tool
    if:
      type: text
      substr: "example-infect-text"
  - id: volundr-env-var
    desc: Volundr environment variable
    if:
      type: text
      regex: "VOLUNDR(_LIB)?"
composite_rules:
  - id: volundr-infection-framework
    desc: Volundr ELF infection framework detected
    any:
      - id: volundr-framework-string
      - id: volundr-lib-string
      - id: volundr-infect-tool
      - id: volundr-env-var
