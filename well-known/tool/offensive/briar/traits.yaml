# Briar is an open-source autonomous web-application pentesting tool.  Its
# payloads and subprocess/browser helpers are intentional testing capabilities,
# not an installation-time payload or host-credential collection mechanism.
defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl]
  crit: notable
  conf: 0.99
  size_max: 10000000

traits:
  - id: package-name
    desc: Briar pentest PyPI package name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: briar-pentest

  - id: wheel-package-name
    desc: Briar pentest wheel package name
    for: [whl]
    if:
      type: value
      path: METADATA::name
      exact: briar-pentest

  - id: package-summary
    desc: Briar autonomous pentester package summary
    for: [pkginfo]
    if:
      type: value
      path: summary
      substr: Autonomous AI Pentester

  - id: wheel-package-summary
    desc: Briar autonomous pentester wheel summary
    for: [whl]
    if:
      type: value
      path: METADATA::summary
      substr: Autonomous AI Pentester

  - id: agent-registry-source
    desc: Briar security-agent registry import
    for: [python]
    if:
      type: text
      substr: from briar.agents import

  - id: ssrf-agent-source
    desc: Briar SSRF testing agent class
    for: [python]
    if:
      type: text
      substr: 'class SSRFAgent:'

  - id: dashboard-source
    desc: Briar dashboard application title
    for: [python]
    if:
      type: text
      substr: 'Briar Dashboard'

composite_rules:
  - id: briar-pentest-package
    desc: Briar autonomous web pentesting package
    crit: notable
    conf: 0.99
    for: [pkginfo, whl]
    scope: outer
    all:
      - id: package-name
      - id: package-summary

  - id: briar-pentest-source-tree
    desc: Briar pentest agent source tree
    crit: notable
    conf: 0.99
    for: [python]
    scope: outer
    any:
      - id: agent-registry-source
      - id: ssrf-agent-source
      - id: dashboard-source
    needs: 2
