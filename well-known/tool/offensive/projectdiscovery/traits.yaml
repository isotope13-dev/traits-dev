# ProjectDiscovery Tools
#
# Detects markers associated with ProjectDiscovery's security research and tools.

defaults:
  crit: notable
  platforms: [unix, windows]
  for: [binaries, scripts]
  size_max: 314572800 # 300MB (nuclei macOS arm64 binary is ~120MB)

traits:
  - id: attribution-binary
    desc: Attribution to ProjectDiscovery in binary
    conf: 0.95
    for: [pe, dll, elf, macho]
    if:
      type: text
      substr: "ProjectDiscovery"
      case_insensitive: true
      section: rdata
  - id: attribution-script
    desc: Attribution to ProjectDiscovery in script
    conf: 0.95
    for: [scripts]
    if:
      type: text
      substr: "ProjectDiscovery"
      case_insensitive: true
  - id: nuclei-engine-binary
    desc: Nuclei vulnerability scanner engine in binary
    conf: 0.99
    for: [pe, dll, elf, macho]
    if:
      type: text
      substr: "projectdiscovery/nuclei-templates"
      section: rdata
  - id: nuclei-engine-script
    desc: Nuclei vulnerability scanner engine in script
    conf: 0.99
    for: [scripts]
    if:
      type: text
      substr: "projectdiscovery/nuclei-templates"
composite_rules:
  - id: attribution
    desc: Attribution to ProjectDiscovery
    conf: 0.95
    any:
      - id: attribution-binary
      - id: attribution-script
  - id: nuclei-engine
    desc: Nuclei vulnerability scanner engine
    conf: 0.99
    any:
      - id: nuclei-engine-binary
      - id: nuclei-engine-script
