# Glasshouse / ChatterBox — operator console for Chromium DevTools Protocol
# (CDP) and Electron post-exploitation research.
# https://github.com/Emulated-Criminals/Glasshouse-Framework
#
# Built by Emulated Criminals; descendant of SilentFrame. Targets desktop apps
# packaged with Chromium/Electron where a CDP debug interface is reachable.
# ChatterBox is the interactive enumeration arm; a separate operator module
# is planned for command dispatch through discovered CDP channels.
#
# Identifying shape: CDP client + Runtime.evaluate dispatch + profile/macro
# persistence + the published `enum_WindowRoots` Electron-bridge lexicon
# baked into the default profile.
#
# Severity: suspicious (dual-use research tool with explicit authorized-use
# disclaimer). Final attribution belongs to the analyst based on deployment.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, csharp]
  attack: T1059.007
  mbc: E1106
  # Glasshouse is a managed-runtime CLI tool. Filter out byte-size outliers
  # so well-known/ traits don't fire on tiny snippets or hundred-meg blobs.
  size_min: 1024
  size_max: 524288000
traits:
  - id: chatterbox-cli-banner
    desc: ChatterBox CLI startup banner
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: ChatterBox CLI ready

  - id: chatterbox-prompt
    desc: ChatterBox interactive prompt
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '[ChatterBox]'

  - id: glasshouse-profile-default-enum
    desc: 'glasshouse profile default enum'
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: enum_WindowRoots

composite_rules:
  # Operator-shape cluster: CDP client + Runtime.evaluate + Electron bridge
  # enumeration. Split out so the framework rule can OR it with the banner.
  - id: glasshouse-operator-shape
    desc: CDP eval + Electron bridge probe cluster
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/devtools/client::cdp-protocol-surface
      - id: micro-behaviors/communications/http/devtools/client::cdp-method-runtime-evaluate
      - id: objectives/discovery/host/application/electron::electron-bridge-lexicon-regex

  - id: glasshouse-framework
    desc: Glasshouse ChatterBox CDP post-exploitation framework
    crit: suspicious
    conf: 0.98
    any:
      - id: chatterbox-cli-banner
      - id: glasshouse-operator-shape
