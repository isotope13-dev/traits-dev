# Decepticon — published Apache-2.0 "AI-powered autonomous red-team testing
# framework" (github.com/PurpleAILAB/Decepticon, PyPI `decepticon`). A LangGraph
# multi-agent orchestrator that drives offensive-security workflows. Dual-use:
# legitimately ships exploit/credential-access/C2 knowledge (the `skillogy`
# graph + SKILL.md corpus) and tooling, so it self-identifies as a known
# offensive framework rather than being mis-attributed to malware. Recognizing
# it lets analysts triage the many offensive findings as expected tool content.
defaults:
  platforms: [unix, windows]
  size_max: 5000000
traits:
  - id: skillogy-corpus-header
    desc: Decepticon skillogy autogen header
    crit: notable
    conf: 0.97
    for: [text, scripts]
    if:
      type: text
      substr: 'AUTOGENERATED by decepticon.skillogy'
  - id: skillogy-module-ref
    desc: Decepticon skillogy builder module reference
    crit: notable
    conf: 0.9
    for: [python, text, scripts]
    if:
      type: text
      substr: decepticon.skillogy
  - id: framework-import
    desc: Imports the Decepticon framework package
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '\b(from|import)\s+decepticon\b'
  - id: pkg-name
    desc: Decepticon package name metadata
    crit: component
    conf: 0.9
    for: [pkginfo, pyproject.toml]
    if:
      type: value
      path: name
      substr: decepticon
  - id: pkg-redteam-summary
    desc: Decepticon red-team framework package summary
    crit: notable
    conf: 0.95
    for: [pkginfo, pyproject.toml]
    if:
      type: value
      path: summary
      substr: autonomous red team
  - id: repo-attribution
    desc: Decepticon source repository reference
    crit: component
    conf: 0.9
    for: [text, scripts, markdown]
    if:
      type: text
      substr: PurpleAILAB/Decepticon
composite_rules:
  - id: decepticon-redteam-framework
    desc: Decepticon autonomous red-team framework
    crit: suspicious
    conf: 0.95
    attack: T1588.002
    any:
      - id: skillogy-corpus-header
      - id: skillogy-module-ref
      - id: pkg-name
      - id: pkg-redteam-summary
      - id: framework-import
      - id: repo-attribution
