defaults:
  platforms: [unix, windows]
  for: [class, php, vbs, pe]
  attack: T1505.003
  size_min: 16
  size_max: 100000000

traits:
  - id: java-package-path
    desc: Behinder Java package path component
    crit: notable
    conf: 0.98
    if:
      type: path
      regex: '(^|[\\/])behinder[\\/]'

  - id: default-aes-key
    desc: Behinder default AES key
    crit: component
    conf: 0.95
    if:
      type: text
      substr: e45e329feb5d925b

  - id: rebeyond-package-token
    desc: Behinder rebeyond package token
    crit: component
    conf: 0.92
    if:
      type: text
      substr: net/rebeyond/behinder

  - id: core-decrypt-class-path
    desc: Behinder core decrypt class path
    crit: component
    conf: 0.96
    if:
      type: path
      regex: '(^|[\\/])Decrypt\.class$'

composite_rules:
  - id: family-markers
    desc: Behinder webshell framework family markers
    crit: suspicious
    conf: 0.99
    all:
      - id: java-package-path
    any:
      - id: default-aes-key
      - id: rebeyond-package-token
      - id: core-decrypt-class-path

  - id: webshell-framework
    desc: Behinder webshell management framework
    crit: hostile
    conf: 0.99
    all:
      - id: family-markers
    any:
      - id: objectives/command-and-control/backdoor/webshell/exec/
      - id: objectives/command-and-control/reverse-shell/dup/
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
