# Brutus is Praetorian's published, dual-use credential-testing and RDP
# logon-backdoor assessment tool. Its RDP module can deliberately trigger
# Sticky Keys or Utilman and execute a supplied command after confirming a
# vulnerable host; that is an offensive testing capability, not persistence
# in this source tree.
defaults:
  platforms: [unix, windows]
  for: [go, go.mod, text]
  crit: notable
  conf: 0.99

traits:
  - id: module-identity
    desc: Brutus Go module identity
    for: [go.mod, text]
    if:
      type: text
      substr: github.com/praetorian-inc/brutus

  - id: source-tree-member
    desc: Brutus source-tree member
    for: [go, text]
    if:
      type: path
      regex: '(^|[\\/])brutus@v[0-9]'

  - id: rdp-logon-backdoor-execution
    desc: RDP logon-backdoor command execution path
    crit: notable
    conf: 0.98
    for: [go]
    if:
      type: text
      regex: '(RunStickyKeysExec|RunWebTerminal|triggerBackdoor)\s*\('

  - id: rdp-accessibility-trigger-sequence
    desc: RDP Sticky Keys or Utilman trigger sequence
    crit: notable
    conf: 0.98
    for: [go]
    if:
      type: text
      regex: '(5x\s+Shift|Win\+U|BackdoorStickyKeys|BackdoorUtilman)'

composite_rules:
  - id: rdp-logon-backdoor-assessment
    desc: Brutus RDP logon-backdoor assessment capability
    crit: suspicious
    conf: 0.99
    all:
      - id: source-tree-member
    any:
      - id: rdp-logon-backdoor-execution
      - id: rdp-accessibility-trigger-sequence
