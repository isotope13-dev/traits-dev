defaults:
  platforms: [unix, windows]
  for: [ruby, shell, markdown]
  crit: notable
  conf: 0.98

traits:
  - id: plugin-namespace
    desc: PWN plugin namespace
    if:
      type: text
      substr: PWN::Plugins

  - id: banner-namespace
    desc: PWN banner namespace
    if:
      type: text
      substr: PWN::Banner

  - id: framework-homepage
    desc: PWN framework homepage
    if:
      type: text
      substr: github.com/0dayinc/pwn

  - id: framework-root-env
    desc: PWN root environment variable
    if:
      type: text
      substr: PWN_ROOT

  - id: framework-env-script
    desc: PWN environment script
    if:
      type: text
      substr: pwn_envs.sh

  - id: framework-description
    desc: PWN security testing description
    for: [ruby, markdown]
    if:
      type: text
      substr: Automated Security Testing for CI/CD Pipelines
