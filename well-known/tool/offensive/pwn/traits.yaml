defaults:
  platforms: [unix, windows]
  for: [ruby, shell, markdown]
  crit: notable
  conf: 0.98

traits:
  - id: plugin-namespace
    desc: PWN plugin namespace
    if:
      type: text
      substr: PWN::Plugins

  - id: banner-namespace
    desc: PWN banner namespace
    if:
      type: text
      substr: PWN::Banner

  - id: framework-homepage
    desc: PWN framework homepage
    if:
      type: text
      substr: github.com/0dayinc/pwn

  - id: framework-root-env
    desc: PWN root environment variable
    if:
      type: text
      substr: PWN_ROOT

  - id: framework-env-script
    desc: PWN environment script
    if:
      type: text
      substr: pwn_envs.sh

  - id: framework-description
    desc: PWN security testing description
    for: [ruby, markdown]
    if:
      type: text
      substr: Automated Security Testing for CI/CD Pipelines

  - id: gemspec-name
    desc: pwn RubyGems package name
    for: [ruby]
    if:
      type: text
      regex: '(?m)^\s*spec\.name\s*=\s*["'']pwn["'']'

  - id: packer-provisioner-path
    desc: PWN packer provisioner path
    for: [shell, ruby]
    if:
      type: path
      regex: '(^|[\\/])packer[\\/]provisioners'

  - id: vagrant-provisioner-path
    desc: PWN vagrant provisioner path
    for: [shell, ruby]
    if:
      type: path
      regex: '(^|[\\/])vagrant[\\/]provisioners'

composite_rules:
  - id: pwn-framework-context
    desc: Recognized 0dayInc PWN framework context
    crit: notable
    conf: 0.99
    any:
      - id: plugin-namespace
      - id: framework-homepage
      - id: framework-env-script
      - id: framework-root-env
      - id: gemspec-name
      - id: banner-namespace
      - id: framework-description
      - id: packer-provisioner-path
      - id: vagrant-provisioner-path
    needs: 2
