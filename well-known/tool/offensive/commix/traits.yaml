defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: commix-project-header
    desc: Commix project source header
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "This file is part of Commix Project"
  - id: commix-project-url
    desc: Commix project website URL
    crit: component
    conf: 0.95
    if:
      type: text
      substr: commixproject.com
composite_rules:
  - id: commix-source-file
    desc: Commix offensive tool source file
    crit: suspicious
    conf: 0.99
    all:
      - id: commix-project-header
      - id: commix-project-url
