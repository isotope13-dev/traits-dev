# "bingo" — LLM-driven web pentest / red-team automation suite (Korean).
#
# An AI-agent penetration-testing framework: `bingo/tools_ext/pentest_tools.py`
# exposes a TOOL_CALL protocol so the model invokes developer-verified Python
# pentest functions instead of hallucinating shell (auto-SQLi with WAF bypass,
# post-exploitation chains, SUID/credential enumeration, reverse-shell one-liner
# generation), and `advanced_vuln_scanner.py` is its "Acunetix-level" web
# vulnerability scanner (JWT confusion, GraphQL, IDOR, deserialization gadgets,
# HTTP request smuggling, OAuth misconfig, file-upload webshell bypass).
#
# This is DUAL-USE offensive tooling for authorized engagements — the same
# capabilities ship in sqlmap / Metasploit / Acunetix / Burp. It is fully
# documented (trilingual ko/zh/en operator notices), unobfuscated, uses only
# operator-supplied targets and standard OOB infra (interactsh/oast/burp.dns)
# with `<ATTACKER_IP>`/`<PORT>` placeholders, and has no hardcoded C2, no
# operator-targeting backdoor, and no exfil sink. These identity traits
# recognize the suite so the generic exploitation/webshell/reverse-shell
# objectives can except its own source tree without being weakened.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  # ---- bingo TOOL_CALL AI-pentest framework (pentest_tools.py) ----
  - id: tool-call-protocol
    desc: bingo LLM TOOL_CALL invocation protocol
    conf: 0.95
    if:
      type: text
      substr: 'TOOL_CALL:{"name":"'
  - id: sqli-autoexploit-fn
    desc: bingo sqli_autoexploit tool function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: sqli_autoexploit
  - id: post-exploit-chain-fn
    desc: bingo post_exploit_chain tool function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: post_exploit_chain
  - id: waf-sqli-db-fn
    desc: bingo waf_sqli_db tool function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: waf_sqli_db
  # ---- bingo advanced web vuln scanner (advanced_vuln_scanner.py) ----
  - id: scan-jwt-attack
    desc: JWT algorithm-confusion attack scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef jwt_attack\b'
  - id: scan-graphql
    desc: GraphQL introspection/injection scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef graphql_scan\b'
  - id: scan-request-smuggling
    desc: HTTP request-smuggling scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef request_smuggling_scan\b'
  - id: scan-deserialization
    desc: Deserialization-gadget scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef deserialization_scan\b'
  - id: scan-oauth-misconfig
    desc: OAuth/OIDC misconfig scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef oauth_misconfig_scan\b'

composite_rules:
  - id: bingo-ai-pentest-framework
    desc: bingo LLM-driven pentest automation framework
    crit: notable
    conf: 0.97
    all:
      - id: tool-call-protocol
    any:
      - id: sqli-autoexploit-fn
      - id: post-exploit-chain-fn
      - id: waf-sqli-db-fn
  - id: bingo-web-vuln-scanner
    desc: bingo Acunetix-level web vulnerability scanner
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: scan-jwt-attack
      - id: scan-graphql
      - id: scan-request-smuggling
      - id: scan-deserialization
      - id: scan-oauth-misconfig
