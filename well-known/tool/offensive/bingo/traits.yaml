# "bingo" — LLM-driven web pentest / red-team automation suite (Korean).
#
# An AI-agent penetration-testing framework: `bingo/tools_ext/pentest_tools.py`
# exposes a TOOL_CALL protocol so the model invokes developer-verified Python
# pentest functions instead of hallucinating shell (auto-SQLi with WAF bypass,
# post-exploitation chains, SUID/credential enumeration, reverse-shell one-liner
# generation), and `advanced_vuln_scanner.py` is its "Acunetix-level" web
# vulnerability scanner (JWT confusion, GraphQL, IDOR, deserialization gadgets,
# HTTP request smuggling, OAuth misconfig, file-upload webshell bypass).
#
# This is DUAL-USE offensive tooling for authorized engagements — the same
# capabilities ship in sqlmap / Metasploit / Acunetix / Burp. It is fully
# documented (trilingual ko/zh/en operator notices), unobfuscated, uses only
# operator-supplied targets and standard OOB infra (interactsh/oast/burp.dns)
# with `<ATTACKER_IP>`/`<PORT>` placeholders, and has no hardcoded C2, no
# operator-targeting backdoor, and no exfil sink. These identity traits
# recognize the suite so the generic exploitation/webshell/reverse-shell
# objectives can except its own source tree without being weakened.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  # ---- bingo TOOL_CALL AI-pentest framework (pentest_tools.py) ----
  - id: tool-call-protocol
    desc: bingo LLM TOOL_CALL invocation protocol
    conf: 0.95
    if:
      type: text
      substr: 'TOOL_CALL:{"name":"'
  - id: sqli-autoexploit-fn
    desc: bingo sqli_autoexploit tool function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: sqli_autoexploit
  - id: post-exploit-chain-fn
    desc: bingo post_exploit_chain tool function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: post_exploit_chain
  - id: waf-sqli-db-fn
    desc: bingo waf_sqli_db tool function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: waf_sqli_db
  # ---- bingo advanced web vuln scanner (advanced_vuln_scanner.py) ----
  - id: scan-jwt-attack
    desc: JWT algorithm-confusion attack scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef jwt_attack\b'
  - id: scan-graphql
    desc: GraphQL introspection/injection scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef graphql_scan\b'
  - id: scan-request-smuggling
    desc: HTTP request-smuggling scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef request_smuggling_scan\b'
  - id: scan-deserialization
    desc: Deserialization-gadget scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef deserialization_scan\b'
  - id: scan-oauth-misconfig
    desc: OAuth/OIDC misconfig scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef oauth_misconfig_scan\b'
  # ---- bingo autoexploit modules (autoexploit_modules.py) ----
  - id: ax-lfi-autotest
    desc: bingo lfi_autotest exploit module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef lfi_autotest\b'
  - id: ax-jwt-autoexploit
    desc: bingo jwt_autoexploit exploit module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef jwt_autoexploit\b'
  - id: ax-ssrf-autotest
    desc: bingo ssrf_autotest exploit module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef ssrf_autotest\b'
  - id: ax-deser-autotest
    desc: bingo deser_autotest exploit module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef deser_autotest\b'
  - id: ax-xss-autotest
    desc: bingo xss_autotest exploit module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef xss_autotest\b'
  - id: ax-csrf-poc-gen
    desc: bingo csrf_poc_gen exploit module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef csrf_poc_gen\b'
  - id: ax-smuggling-autotest
    desc: bingo smuggling_autotest exploit module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef smuggling_autotest\b'
  - id: ax-proto-pollution-autotest
    desc: bingo proto_pollution_autotest module
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef proto_pollution_autotest\b'
  # ---- bingo payload database (payload_db.py) ----
  - id: bingo-payload-canary
    desc: bingo bINg0 reflection canary marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'bINg0'
  - id: pd-ssti-db
    desc: SSTI payload-database category
    crit: component
    conf: 0.8
    if:
      type: text
      word: "SSTI_DB"
  - id: pd-log4shell-db
    desc: Log4Shell payload-database category
    crit: component
    conf: 0.8
    if:
      type: text
      word: "LOG4SHELL_DB"
  - id: pd-spring4shell-db
    desc: Spring4Shell payload-database category
    crit: component
    conf: 0.8
    if:
      type: text
      word: "SPRING4SHELL_DB"
  - id: pd-cmdi-db
    desc: Command-injection payload-database category
    crit: component
    conf: 0.8
    if:
      type: text
      word: "CMDI_DB"
  # ---- bingo enhanced vuln scanner (vuln_scanner_plus.py) ----
  - id: vsp-full-site-scan
    desc: bingo full_site_scan whole-site scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef full_site_scan\b'
  - id: vsp-auto-crawl-params
    desc: bingo auto_crawl_params param crawler fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef auto_crawl_params\b'
  - id: vsp-ssrf-scan-plus
    desc: bingo ssrf_scan_plus scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef ssrf_scan_plus\b'
  - id: vsp-ssti-scan-plus
    desc: bingo ssti_scan_plus scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef ssti_scan_plus\b'
  - id: vsp-cmdi-scan-plus
    desc: bingo cmdi_scan_plus scanner fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef cmdi_scan_plus\b'
  # ---- bingo Playwright dynamic-API capture recon (api_dynamic_capture.py) ----
  - id: adc-class
    desc: ApiDynamicCapture Playwright recon class
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bclass ApiDynamicCapture\b'
  - id: adc-capture-fn
    desc: capture_dynamic_apis endpoint capture fn
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bdef capture_dynamic_apis\b'
  - id: adc-result
    desc: DynamicCaptureResult recon result type
    crit: component
    conf: 0.8
    if:
      type: text
      word: "DynamicCaptureResult"

composite_rules:
  - id: bingo-ai-pentest-framework
    desc: bingo LLM-driven pentest automation framework
    crit: notable
    conf: 0.97
    all:
      - id: tool-call-protocol
    any:
      - id: sqli-autoexploit-fn
      - id: post-exploit-chain-fn
      - id: waf-sqli-db-fn
  - id: bingo-web-vuln-scanner
    desc: bingo Acunetix-level web vulnerability scanner
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: scan-jwt-attack
      - id: scan-graphql
      - id: scan-request-smuggling
      - id: scan-deserialization
      - id: scan-oauth-misconfig
  - id: bingo-autoexploit-modules
    desc: bingo automated web-exploitation module set
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: ax-lfi-autotest
      - id: ax-jwt-autoexploit
      - id: ax-ssrf-autotest
      - id: ax-deser-autotest
      - id: ax-proto-pollution-autotest
      - id: ax-xss-autotest
      - id: ax-csrf-poc-gen
      - id: ax-smuggling-autotest
  # Require the bingo-specific bINg0 canary AND a payload-category marker, so a
  # non-bingo web-exploit payload corpus (generic SSTI/Log4Shell/CMDi lists) is
  # never mislabeled as this tool.
  - id: bingo-payload-database
    desc: bingo Acunetix-level web-exploit payload database
    crit: notable
    conf: 0.95
    all:
      - id: bingo-payload-canary
    any:
      - id: pd-ssti-db
      - id: pd-log4shell-db
      - id: pd-spring4shell-db
      - id: pd-cmdi-db
  - id: bingo-vuln-scanner-plus
    desc: bingo enhanced multi-class web vulnerability scanner
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: vsp-full-site-scan
      - id: vsp-auto-crawl-params
      - id: vsp-ssrf-scan-plus
      - id: vsp-ssti-scan-plus
      - id: vsp-cmdi-scan-plus
  - id: bingo-api-dynamic-capture
    desc: bingo Playwright dynamic-API capture recon module
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: adc-class
      - id: adc-capture-fn
      - id: adc-result
