# IOX — Go-based port forwarding and intranet proxy tool.
# https://github.com/EddieIvan01/iox
# Used by SHADOW-EARTH-053 (renamed explorer.exe) for SOCKS5 proxying
# and reverse-tunnel forwarding into target intranets.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, elf, macho]
  attack: T1572
  mbc: B0030
  size_min: 512
  size_max: 500000000
traits:
  - id: iox-repo
    desc: IOX GitHub repo path
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      substr: github.com/EddieIvan01/iox
      section: rdata
  - id: iox-source-path
    desc: IOX cmd/iox source path
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      substr: cmd/iox/main
      section: rdata
  - id: iox-package-path
    desc: IOX Go package path
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      substr: EddieIvan01/iox/
      section: rdata
composite_rules:
  - id: iox-tunnel
    desc: IOX intranet tunneling tool
    crit: hostile
    conf: 0.97
    any:
      - id: well-known/tool/offensive/iox::iox-package-path
      - id: well-known/tool/offensive/iox::iox-repo
      - id: well-known/tool/offensive/iox::iox-source-path
