defaults:
  platforms: [unix, windows]
  crit: suspicious
  conf: 0.99

traits:
  - id: pypi-project-homepage
    desc: Malpip malicious-package builder homepage
    for: [pkginfo]
    if:
      type: value
      path: home-page
      exact: https://github.com/thegoodhackertv/malpip

  - id: wheel-project-homepage
    desc: Malpip malicious-package builder homepage
    for: [whl]
    if:
      type: value
      path: whl.home_page
      exact: https://github.com/thegoodhackertv/malpip
