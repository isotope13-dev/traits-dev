defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - source
  - pkginfo
  - pyproject.toml
  size_max: 5000000
traits:
- id: commonhuman-lab-attribution
  desc: CommonHuman-Lab copyright/author attribution
  crit: component
  conf: 0.95
  if:
    type: text
    substr: CommonHuman-Lab
- id: agpl-spdx-header
  desc: AGPL-3.0 SPDX license identifier
  crit: component
  conf: 0.9
  if:
    type: text
    substr: AGPL-3.0-or-later
- id: commonhuman-lab-author
  desc: CommonHuman-Lab package author/summary
  crit: component
  conf: 0.95
  for:
  - pkginfo
  - pyproject.toml
  if:
    type: value
    path: author
    substr: CommonHuman-Lab
- id: commonhuman-lab-summary
  desc: CommonHuman-Lab package summary
  crit: component
  conf: 0.9
  for:
  - pkginfo
  - pyproject.toml
  if:
    type: value
    path: summary
    substr: CommonHuman-Lab
- id: agpl-license-field
  desc: AGPL-3.0 license metadata field
  crit: component
  conf: 0.85
  for:
  - pkginfo
  - pyproject.toml
  if:
    type: value
    path: license
    substr: AGPL-3.0
composite_rules:
- id: pentest-payload-corpus
  desc: CommonHuman-Lab pentest payload corpus
  crit: component
  conf: 0.95
  all:
  - id: commonhuman-lab-attribution
  - id: agpl-spdx-header
- id: pentest-payload-corpus-pkg
  desc: CommonHuman-Lab pentest payload corpus metadata
  crit: component
  conf: 0.95
  for:
  - pkginfo
  - pyproject.toml
  all:
  - id: agpl-license-field
  any:
  - id: commonhuman-lab-author
  - id: commonhuman-lab-summary
