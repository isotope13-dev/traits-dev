defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - source
  - pkginfo
  - pyproject.toml
  size_max: 5000000
traits:
# PayloadsAllTheThings is the canonical, widely-mirrored payload reference
# library. A file that cites it is a curated payload *corpus* (reference data
# the operator searches), not an executing attack — so it marks the file as a
# recognized offensive-tool payload library for the dual-use unless-context.
- id: payloadsallthethings-reference
  desc: PayloadsAllTheThings payload-library citation
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'Payloads?AllThe[ ]?Things'
    case_insensitive: true
- id: commonhuman-lab-attribution
  desc: CommonHuman-Lab copyright/author attribution
  crit: component
  conf: 0.95
  if:
    type: text
    substr: CommonHuman-Lab
- id: commonhuman-lab-author
  desc: CommonHuman-Lab package author/summary
  crit: component
  conf: 0.95
  for:
  - pkginfo
  - pyproject.toml
  if:
    type: value
    path: author
    substr: CommonHuman-Lab
- id: commonhuman-lab-summary
  desc: CommonHuman-Lab package summary
  crit: component
  conf: 0.9
  for:
  - pkginfo
  - pyproject.toml
  if:
    type: value
    path: summary
    substr: CommonHuman-Lab
- id: agpl-license-field
  desc: AGPL-3.0 license metadata field
  crit: component
  conf: 0.85
  for:
  - pkginfo
  - pyproject.toml
  if:
    type: value
    path: license
    substr: AGPL-3.0
composite_rules:
- id: pentest-payload-corpus
  desc: CommonHuman-Lab pentest payload corpus
  crit: notable
  conf: 0.95
  all:
  - id: commonhuman-lab-attribution
  - id: metadata/package/license::agpl-3-license-identifier
- id: pentest-payload-corpus-pkg
  desc: CommonHuman-Lab pentest payload corpus metadata
  crit: notable
  conf: 0.95
  for:
  - pkginfo
  - pyproject.toml
  all:
  - id: agpl-license-field
  any:
  - id: commonhuman-lab-author
  - id: commonhuman-lab-summary
