defaults:
  platforms: [unix, windows]
  for: [package.json, scripts]
  crit: notable
  conf: 0.95

traits:
  - id: npm-package-name
    desc: SIC Security package name
    for: [package.json]
    conf: 0.99
    if:
      type: value
      path: name
      exact: sic-security

  - id: package-description
    desc: SIC Security package description
    for: [package.json]
    if:
      type: value
      path: description
      substr: Security Intelligence Center

  - id: hexstrike-server-banner
    desc: HexStrike server banner
    for: [python]
    if:
      type: text
      substr: HexStrike AI Tools API Server

  - id: magic-link-alert-module
    desc: SIC magic link alert module
    for: [python]
    if:
      type: text
      substr: "SIC — Magic Link Login"

  - id: mcp-client-banner
    desc: HexStrike MCP client banner
    for: [python]
    if:
      type: text
      substr: HexStrike AI MCP Client

  - id: npx-launcher-comment
    desc: SIC npx launcher comment
    for: [javascript]
    if:
      type: text
      substr: npx sic-security

  - id: sic-readme-title
    desc: SIC Security README title
    for: [text]
    if:
      type: text
      substr: "SIC — AI-Powered Security Intelligence Center"

composite_rules:
  - id: npm-package
    desc: SIC Security npm package
    for: [package.json]
    conf: 0.99
    all:
      - id: npm-package-name
      - id: package-description

  - id: pentest-framework
    desc: SIC offensive security framework
    conf: 0.96
    any:
      - id: npm-package
      - id: hexstrike-server-banner
      - id: magic-link-alert-module
      - id: mcp-client-banner
      - id: npx-launcher-comment
      - id: sic-readme-title
