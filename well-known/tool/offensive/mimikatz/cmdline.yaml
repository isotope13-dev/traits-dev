# Mimikatz command-line invocations and rundll32 carriers.
# Captures the cmdline pattern even when the DLL is renamed.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1003.001
  mbc: E1003
  size_min: 256
  size_max: 500000000
traits:
  - id: lsadump-sam
    desc: Mimikatz lsadump::sam command
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: 'lsadump::sam'
      case_insensitive: true
  - id: lsadump-secrets
    desc: Mimikatz lsadump::secrets command
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: 'lsadump::secrets'
      case_insensitive: true
  - id: lsadump-dcsync
    desc: Mimikatz lsadump::dcsync command
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: 'lsadump::dcsync'
      case_insensitive: true
  - id: privilege-debug
    desc: Mimikatz privilege::debug command
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'privilege::debug'
      case_insensitive: true
  - id: rundll32-mimikatz-cmdline
    desc: rundll32 invoking Mimikatz command
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'rundll32(\.exe)?.{0,200}(sekurlsa::logonpasswords|lsadump::sam)'
      case_insensitive: true
composite_rules:
  - id: mimikatz-rundll32-execution
    desc: Mimikatz invoked via rundll32
    crit: hostile
    conf: 0.98
    any:
      - id: rundll32-mimikatz-cmdline
      - id: lsadump-dcsync
