# Evil-CreateDump — modified Microsoft create-dump.exe (.NET runtime
# diagnostic dumper) repurposed to dump LSASS process memory for
# credential extraction. Detected primarily by its repository identity
# and weaponized filename — internal createdump.pdb / minidump strings
# also appear in the legitimate Microsoft binary and would FP, so they
# are intentionally excluded.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1003.001
  mbc: E1003
  size_min: 1024
  size_max: 500000000
traits:
  - id: evil-createdump-name
    desc: evil-createdump filename
    crit: suspicious
    conf: 0.97
    if:
      type: basename
      regex: '^evil[-_]?createdump(\.exe)?$'
      case_insensitive: true
  - id: evil-createdump-repo
    desc: Evil-CreateDump GitHub repo path
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      regex: 'github\.com/[^/]{1,40}/[Ee]vil[-_]?[Cc]reate[Dd]ump'
      section: rdata
composite_rules:
  - id: evil-createdump-tool
    desc: Evil-CreateDump LSASS dumper
    crit: hostile
    conf: 0.96
    any:
      - id: evil-createdump-name
      - id: evil-createdump-repo
