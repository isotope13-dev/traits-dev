defaults:
  platforms: [linux]
  for: [elf]
  size_min: 512
  size_max: 10485760
traits:
  - id: helper-debug-path
    desc: TripleCross helper debug path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "/TFG/src/helpers"
      section: .debug_str
  - id: helper-makefile-path
    desc: TripleCross helper Makefile path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "/TFG/src/helpers/Makefile"
      section: .rodata
  - id: simple-open-helper-source
    desc: TripleCross simple_open helper source
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "simple_open.c"
      section: .debug_line

composite_rules:
  - id: helper-build-artifact
    desc: TripleCross helper build artifact
    crit: hostile
    conf: 0.96
    all:
      - id: helper-debug-path
      - id: helper-makefile-path
  - id: simple-open-helper-artifact
    desc: TripleCross simple_open artifact
    crit: hostile
    conf: 0.94
    all:
      - id: helper-debug-path
      - id: simple-open-helper-source
  - id: simple-open-trigger-object
    desc: TripleCross helper trigger object
    crit: hostile
    conf: 0.95
    needs: 3
    any:
      - id: helper-debug-path
      - id: helper-makefile-path
      - id: simple-open-helper-source
