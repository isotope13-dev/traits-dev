# xodbox — "network interaction listening post" (github.com/defektive/xodbox).
#
# An out-of-band (OOB) interaction server in the Burp Collaborator / interactsh
# category: it runs HTTP/DNS/FTP/SMTP/SMB/SSH/TCP listeners so a tester can
# prove an application reaches out to attacker-controlled infrastructure
# (SSRF, XXE, blind RCE, log4shell-style callbacks), plus an admin web console
# and chat notifiers.
#
# Its `pkg/mdaas/` tree ("Malware Delivery as a Service") JIT-compiles and
# serves payload templates — including a plain TCP bind shell — so an operator
# can demonstrate impact during an authorized engagement. That payload source
# is real shell-spawning code and legitimately trips the generic bind-shell
# objectives; these identity traits let those objectives except the tool's own
# published source tree without weakening the generic detection.
#
# MIT licensed, publicly attributable (docs site, CI, SECURITY.md, goreleaser),
# distributed through the Go module proxy.
defaults:
  platforms: [unix, windows]
  for: [go, markdown, text, json, zip]
  crit: notable
  conf: 0.98

traits:
  - id: module-declaration
    desc: xodbox Go module declaration
    conf: 0.99
    for: [go, text]
    if:
      type: text
      regex: '^module\s+github\.com/defektive/xodbox\s*$'

  - id: xlog-package-import
    desc: Imports the xodbox xlog package
    if:
      type: import
      exact: github.com/defektive/xodbox/pkg/xlog

  - id: util-package-import
    desc: Imports the xodbox util package
    if:
      type: import
      exact: github.com/defektive/xodbox/pkg/util

  - id: types-package-import
    desc: Imports the xodbox types package
    if:
      type: import
      exact: github.com/defektive/xodbox/pkg/types

  - id: model-package-import
    desc: Imports the xodbox model package
    if:
      type: import
      exact: github.com/defektive/xodbox/pkg/model

  - id: documentation-site
    desc: xodbox documentation site URL
    if:
      type: text
      substr: defektive.github.io/xodbox

  - id: mdaas-delivery-description
    desc: xodbox MDaaS payload delivery description
    for: [markdown, text]
    if:
      type: text
      substr: Malware Delivery as a Service

composite_rules:
  # Two independent markers required: a lone `github.com/defektive/xodbox/...`
  # string can appear in anything that merely imports or vendors the project,
  # so a single module-path hit must never be enough to except a detection.
  - id: xodbox-framework-context
    desc: Recognized xodbox OOB listening-post context
    crit: notable
    conf: 0.99
    any:
      - id: module-declaration
      - id: xlog-package-import
      - id: util-package-import
      - id: types-package-import
      - id: model-package-import
      - id: documentation-site
      - id: mdaas-delivery-description
    needs: 2
