# RingQ — open-source binary packer of Chinese origin used to evade
# AV/EDR static detection. https://github.com/T1ngSh0t/RingQ
# Observed in SHADOW-EARTH-053 environments wrapping post-exploitation
# binaries to bypass signature-based scanning.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.002
  mbc: B0001
  size_min: 1024
  size_max: 500000000
traits:
  - id: ringq-repo
    desc: RingQ GitHub repo path
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      regex: 'github\.com/T1ngSh0t/RingQ|RingQ_[A-Za-z]+'
      case_insensitive: true
  - id: ringq-stub-name
    desc: RingQ stub function/string marker
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      regex: '\bRingQ\b|RingQ\.exe'
  - id: ringq-pdb-path
    desc: RingQ PDB path marker
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\\\\RingQ[\\/]+(Release|Debug)[\\/]+RingQ\.pdb'
      case_insensitive: true
composite_rules:
  - id: ringq-packed-binary
    desc: Binary packed with RingQ
    crit: hostile
    conf: 0.96
    any:
      - id: ringq-repo
      - id: ringq-stub-name
      - id: ringq-pdb-path
