# Game Cheat Overlay Loader Detection
# Detects game-cheat overlay injectors that target specific game processes
# and inject a companion DLL (e.g., overlay, cheat, ESP).
# These are PUA-class HackTools, not traditional malware.
# ATT&CK: T1055 (Process Injection)
defaults:
  platforms: [windows]
  for: [pe]
  crit: suspicious
  conf: 0.95
  size_min: 10000
traits:
  # Unique banner strings that identify the tool
- id: rocket-league-injector-banner
  desc: Rocket League overlay injector banner string
  crit: suspicious
  conf: 0.99
  if:
    type: text
    substr: "Rocket League Injector"
    section: rdata

  # Developer-visible source filename reference
- id: overlay-source-reference
  desc: Developer source filename reference for overlay DLL
  crit: component
  conf: 0.99
  if:
    type: text
    substr: "Overlay.cpp"

  # Sibling overlay DLL dependency
- id: overlay-dll-dependency
  desc: Companion overlay DLL dependency string
  crit: component
  conf: 0.95
  if:
    type: text
    word: "Overlay.dll"

  # Game process target string (RocketLeague.exe)
- id: rocket-league-process-target
  desc: Rocket League game process target string
  crit: component
  conf: 0.99
  if:
    type: text
    word: "RocketLeague.exe"

  # Injection completion message
- id: overlay-injection-complete
  desc: Overlay injection completion message
  crit: component
  conf: 0.95
  if:
    type: text
    substr: "Overlay should be active"

composite_rules:
  # High-confidence detection of Rocket League overlay injector
- id: rocket-league-overlay-injector
  desc: Rocket League overlay DLL injector detected
  crit: suspicious
  conf: 0.98
  all:
  - id: rocket-league-injector-banner
  - id: overlay-dll-dependency
  - id: rocket-league-process-target
  any:
  - id: overlay-source-reference
  - id: overlay-injection-complete
- id: game-cheat-overlay-loader
  desc: Game-cheat overlay DLL injection loader
  crit: hostile
  conf: 0.92
  all:
  - id: overlay-dll-dependency
  - id: micro-behaviors/process/inject/runtime::create-remote-thread-dup
  - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
  any:
  - id: rocket-league-process-target
  - id: rocket-league-injector-banner
  - id: overlay-source-reference
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
