# HackBar is a legitimate browser-based web security testing tool.  Its
# request interception and header rewriting are intentional tool capabilities,
# not evidence that the extension is a covert traffic stealer.
defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.98

traits:
  - id: manifest-name
    desc: HackBar browser extension name
    if:
      type: value
      path: name
      exact: HackBar
  - id: homepage
    desc: HackBar project homepage
    if:
      type: value
      path: homepage_url
      exact: https://hackbar.herokuapp.com
