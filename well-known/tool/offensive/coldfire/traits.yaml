defaults:
  platforms: [linux, macos, windows]
  for: [go, elf, macho, pe]
  attack: T1572
  size_min: 256
  size_max: 268435456

traits:
  - id: coldfire-package
    desc: Go package coldfire declaration
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '^package\s+coldfire\b'

  - id: coldfire-module-path
    desc: Coldfire Go module path
    crit: suspicious
    conf: 0.99
    for: [go.mod]
    if:
      type: text
      substr: "module github.com/redcode-labs/Coldfire"

  - id: coldfire-port-scanner-dep
    desc: Coldfire port scanner dependency
    crit: suspicious
    conf: 0.94
    for: [go.mod]
    attack: T1046
    if:
      type: text
      substr: "github.com/anvie/port-scanner"

  - id: coldfire-elf-reader-dep
    desc: Coldfire ELF reader dependency
    crit: notable
    conf: 0.88
    for: [go.mod]
    if:
      type: text
      substr: "github.com/yalue/elf_reader"

  - id: coldfire-goinfo-dep
    desc: Coldfire host info dependency
    crit: notable
    conf: 0.86
    for: [go.mod]
    if:
      type: text
      substr: "github.com/matishsiao/goInfo"

  - id: ngrok-tcp-fmt
    desc: ngrok tcp CLI format string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "ngrok tcp %d"

  - id: ngrok-http-fmt
    desc: ngrok http CLI format string
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "ngrok http %d"

  - id: ngrok-inspect-api
    desc: ngrok agent inspect API endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "localhost:4040/api/tunnels"

  - id: coldfire-ngrok-function-set
    desc: Coldfire ngrok wrapper function set
    crit: component
    conf: 0.97
    count_min: 2
    if:
      type: text
      regex: '(StartNgrokTCP|StartNgrokHTTP|GetNgrokURL)\b'

  - id: coldfire-crypto-error-encrypt
    desc: Coldfire AES encryption error typo
    crit: component
    conf: 0.95
    if:
      type: text
      word: "Error occured, can't encrypt"

  - id: coldfire-crypto-error-decrypt
    desc: Coldfire AES decryption error typo
    crit: component
    conf: 0.95
    if:
      type: text
      word: "Error occured, can't decrypt"

  - id: coldfire-crypto-error-key
    desc: Coldfire key generation error
    crit: component
    conf: 0.80
    if:
      type: text
      word: "Failed to generate the key."

  - id: coldfire-crypto-error-iv
    desc: Coldfire IV generation error
    crit: component
    conf: 0.80
    if:
      type: text
      word: "Failed to generate IV."

  - id: coldfire-crypto-symbols-1
    desc: Coldfire cryptographic function symbols part 1
    crit: notable
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: 'func (GenerateKey|GenerateIV|EncryptBytes)\b'

  - id: coldfire-crypto-symbols-2
    desc: Coldfire cryptographic function symbols part 2
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: 'func (DecryptBytes|EncryptString|Rot13)\b'

  - id: coldfire-io-files-pattern
    desc: 'Coldfire FilesPattern cred discovery func'
    crit: component
    conf: 0.97
    if:
      type: text
      word: FilesPattern

  - id: coldfire-io-make-zip
    desc: Coldfire MakeZip archive staging function
    crit: notable
    conf: 0.97
    if:
      type: text
      word: MakeZip

  - id: coldfire-io-reader
    desc: Coldfire IOReader with Check error handler
    crit: component
    conf: 0.95
    if:
      type: text
      word: IOReader

composite_rules:
  - id: coldfire-go-module-manifest
    desc: Coldfire Go module manifest
    crit: hostile
    conf: 0.99
    for: [go.mod]
    all:
      - id: coldfire-module-path
      - id: objectives/discovery/network/scan/utility::go-recon-portscan-manifest
    needs: 3
    any:
      - id: coldfire-port-scanner-dep
      - id: coldfire-elf-reader-dep
      - id: coldfire-goinfo-dep

  - id: ngrok-cli-shellout-pair
    desc: ngrok TCP and HTTP CLI shellout pair
    crit: suspicious
    conf: 0.95
    all:
      - id: ngrok-tcp-fmt
      - id: ngrok-http-fmt

  - id: ngrok-tunnel-orchestrator
    desc: ngrok tunnel spawn and inspect API
    crit: suspicious
    conf: 0.95
    all:
      - id: ngrok-inspect-api
    any:
      - id: ngrok-tcp-fmt
      - id: ngrok-http-fmt

  - id: coldfire-ngrok-module
    desc: Coldfire ngrok C2 tunnel module
    crit: hostile
    conf: 0.99
    all:
      - id: coldfire-package
      - id: coldfire-ngrok-function-set
    any:
      - id: ngrok-inspect-api
      - id: ngrok-tcp-fmt
      - id: ngrok-http-fmt

  - id: coldfire-crypto-module
    desc: Coldfire cryptographic and obfuscation module
    crit: hostile
    conf: 0.99
    all:
      - id: coldfire-package
    any:
      - id: coldfire-crypto-symbols-1
      - id: coldfire-crypto-symbols-2
      - id: coldfire-crypto-error-encrypt
      - id: coldfire-crypto-error-decrypt
      - id: coldfire-crypto-error-key
      - id: coldfire-crypto-error-iv

  - id: coldfire-io-module
    desc: Coldfire file I/O and data staging module
    crit: hostile
    conf: 0.99
    all:
      - id: coldfire-package
    needs: 2
    any:
      - id: coldfire-io-files-pattern
      - id: coldfire-io-make-zip
      - id: coldfire-io-reader
