defaults:
  platforms: [linux, macos, windows]
  for: [go, elf, macho, pe]
  attack: T1572
  size_min: 256
  size_max: 268435456

traits:
  - id: coldfire-package
    desc: Go package coldfire declaration
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '^package\s+coldfire\b'

  - id: ngrok-tcp-fmt
    desc: ngrok tcp CLI format string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "ngrok tcp %d"

  - id: ngrok-http-fmt
    desc: ngrok http CLI format string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "ngrok http %d"

  - id: ngrok-inspect-api
    desc: ngrok agent inspect API endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "localhost:4040/api/tunnels"

  - id: coldfire-ngrok-function-set
    desc: Coldfire ngrok wrapper function set
    crit: component
    conf: 0.97
    count_min: 2
    if:
      type: text
      regex: '(StartNgrokTCP|StartNgrokHTTP|GetNgrokURL)\b'

composite_rules:
  - id: ngrok-cli-shellout-pair
    desc: ngrok TCP and HTTP CLI shellout pair
    crit: suspicious
    conf: 0.95
    all:
      - id: ngrok-tcp-fmt
      - id: ngrok-http-fmt

  - id: ngrok-tunnel-orchestrator
    desc: ngrok tunnel spawn and inspect API
    crit: suspicious
    conf: 0.95
    all:
      - id: ngrok-inspect-api
    any:
      - id: ngrok-tcp-fmt
      - id: ngrok-http-fmt

  - id: coldfire-ngrok-module
    desc: Coldfire ngrok C2 tunnel module
    crit: hostile
    conf: 0.99
    all:
      - id: coldfire-package
      - id: coldfire-ngrok-function-set
    any:
      - id: ngrok-inspect-api
      - id: ngrok-tcp-fmt
      - id: ngrok-http-fmt
