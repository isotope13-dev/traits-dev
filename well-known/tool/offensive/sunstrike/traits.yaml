# Invoke-Sunstrike is an AI-orchestrated penetration-testing framework.  The
# source intentionally contains exploit, authentication, Kubernetes, Docker,
# and LLM attack modules, but its distribution documents authorized use,
# scope enforcement, and approval gates.  Identify that tool context so those
# documented test payloads are not mislabeled as malware.
defaults:
  platforms: [unix, windows]
  for: [go, markdown, text, go.mod]
  crit: notable
  conf: 0.99

traits:
  - id: module-identity
    desc: Invoke-Sunstrike Go module identity
    for: [go.mod, go]
    if:
      type: text
      exact: github.com/htunn/invoke-sunstrike

  - id: readme-title
    desc: Invoke-Sunstrike pentest framework title
    for: [markdown]
    if:
      type: text
      substr: Invoke-Sunstrike Pentest Agent

  - id: authorized-use-disclaimer
    desc: Authorized security-testing disclaimer
    for: [markdown, text]
    if:
      type: text
      substr: THIS TOOL IS FOR AUTHORIZED SECURITY TESTING ONLY

  - id: approval-gate
    desc: Human approval gate for active operations
    for: [markdown, go]
    if:
      type: text
      regex: '(?i)human[- ]in[- ]the[- ]loop approval|mandatory confirmation gate'

  - id: scope-enforcement
    desc: Target scope enforcement documentation
    for: [markdown, go, text]
    if:
      type: text
      regex: '(?i)scope enforcement|allowlist.{0,80}(CIDR|wildcard domains|explicit URLs)'

composite_rules:
  - id: framework-identity
    desc: Invoke-Sunstrike offensive testing framework
    crit: notable
    conf: 0.99
    any:
      - id: module-identity
      - id: readme-title

  - id: authorized-framework-context
    desc: Authorized Invoke-Sunstrike testing context
    crit: exception
    conf: 0.99
    scope: outer
    all:
      - id: framework-identity
      - id: authorized-use-disclaimer
      - id: approval-gate
