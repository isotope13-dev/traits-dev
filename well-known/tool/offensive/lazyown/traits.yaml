defaults:
  platforms: [python]
  for: [source, python]
traits:
  - id: lazyown-llm-bridge
    desc: LazyOwn LLM Bridge for remote command execution
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: "LazyOwn LLM Bridge"
  - id: lazyown-mcp-import
    desc: Imports the LazyOwn MCP component
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: "from lazyown_mcp import"
composite_rules:
  - id: lazyown-framework
    desc: Component of the LazyOwn offensive framework
    crit: hostile
    conf: 0.98
    any:
      - id: lazyown-llm-bridge
      - id: lazyown-mcp-import
