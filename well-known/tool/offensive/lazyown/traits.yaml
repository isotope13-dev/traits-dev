defaults:
  platforms: [linux, macos, windows]
  for: [python, pyc]
traits:
  - id: lazyown-llm-bridge
    desc: LazyOwn LLM Bridge for remote command execution
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: "LazyOwn LLM Bridge"
  - id: lazyown-mcp-import
    desc: Imports the LazyOwn MCP component
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "from lazyown_mcp import"
