defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 512
  size_max: 524288000
traits:
  - id: chrome-sandbox-profile
    desc: Chromium sandbox profile text
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "Profile for Chrome Sandbox"
      section: .text
  - id: chrome-sandbox-name
    desc: Chromium sandbox product name
    crit: component
    conf: 0.97
    if:
      type: text
      exact: "Chrome Sandbox"
      section: .text
  - id: qtwebengine-sandbox
    desc: Qt WebEngine sandbox interface
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "QtWebEngineSandbox"
      section: .text
  - id: sandbox-interception-exports
    desc: Chromium sandbox interception exports
    crit: component
    conf: 0.97
    count_min: 2
    if:
      type: symbol
      regex: "^Target(Nt(OpenProcess|OpenProcessToken(Ex)?)|Create(Thread|NamedPipeW))(64)?$"
  - id: chrome-elf-link
    desc: Imports chrome_elf.dll
    crit: component
    conf: 0.99
    if:
      type: text
      substr: chrome_elf.dll
      section: .rdata
  - id: chrome-product-name
    desc: PE ProductName Google Chrome
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version_info.product_name
      regex: '^Google Chrome$'
composite_rules:
  - id: chromium-helper
    desc: Chromium or Qt sandbox helper
    crit: baseline
    conf: 0.99
    needs: 2
    any:
      - id: chrome-sandbox-profile
      - id: chrome-sandbox-name
      - id: qtwebengine-sandbox
      - id: sandbox-interception-exports
  - id: chromium-browser-main
    desc: Chromium-family browser main binary
    crit: baseline
    conf: 0.99
    any:
      - id: chrome-elf-link
      - id: chrome-product-name
