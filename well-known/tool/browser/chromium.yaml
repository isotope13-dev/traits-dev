defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 512
  size_max: 104857600
traits:
  - id: chrome-sandbox-profile
    desc: Chromium sandbox profile text
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "Profile for Chrome Sandbox"
      section: .text
  - id: chrome-sandbox-name
    desc: Chromium sandbox product name
    crit: component
    conf: 0.97
    if:
      type: text
      exact: "Chrome Sandbox"
      section: .text
  - id: qtwebengine-sandbox
    desc: Qt WebEngine sandbox interface
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "QtWebEngineSandbox"
      section: .text
  - id: sandbox-interception-exports
    desc: Chromium sandbox interception exports
    crit: component
    conf: 0.97
    count_min: 2
    if:
      type: symbol
      regex: "^Target(Nt(OpenProcess|OpenProcessToken(Ex)?)|Create(Thread|NamedPipeW))(64)?$"
composite_rules:
  - id: chromium-helper
    desc: Chromium or Qt sandbox helper
    crit: baseline
    conf: 0.99
    needs: 2
    any:
      - id: chrome-sandbox-profile
      - id: chrome-sandbox-name
      - id: qtwebengine-sandbox
      - id: sandbox-interception-exports
