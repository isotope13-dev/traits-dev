defaults:
  platforms: [windows]
  for: [pe]
  size_max: 52428800

traits:
  - id: idm-product-string
    desc: Internet Download Manager product string
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: Internet Download Manager
      section: rdata
  - id: idm-native-messaging-host
    desc: 'idm native messaging host'
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: com.tonec.idm
      section: rdata

composite_rules:
  - id: idm-browser-integration
    desc: Internet Download Manager browser integration
    crit: baseline
    conf: 0.99
    all:
      - id: idm-product-string
    any:
      - id: idm-native-messaging-host
      - id: metadata/signed/developer::tonec-inc.
