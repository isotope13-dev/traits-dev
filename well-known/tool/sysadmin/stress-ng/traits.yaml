# Colin Ian King's stress-ng system stress testing tool.
defaults:
  platforms: [unix]
  for: [elf, apk, archives]
  crit: baseline
  conf: 0.98
  size_max: 200000000

traits:
  - id: stress-ng-basename
    desc: stress-ng executable basename
    crit: notable
    for: [elf]
    if:
      type: path
      basename: true
      exact: stress-ng
  - id: stress-ng-marker
    desc: stress-ng settings banner
    crit: notable
    for: [elf]
    if:
      type: text
      section: .rodata
      substr: 'stress-ng settings:'
  - id: stress-ng-apk-path
    desc: Alpine stress-ng package archive
    crit: notable
    for: [archives, apk]
    if:
      type: path
      regex: '(?i)(^|[\\/])stress-ng-[^\\/]+\.apk$'

composite_rules:
  - id: stress-ng
    desc: stress-ng system stress testing tool
    crit: notable
    any:
      - id: stress-ng-basename
      - id: stress-ng-marker
      - id: stress-ng-apk-path
