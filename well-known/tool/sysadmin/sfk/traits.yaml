defaults:
  platforms: [unix]
  for: [elf]
  crit: notable
  conf: 0.96

traits:
  - id: sfk-basename
    desc: SFK executable basename
    size_min: 500000
    size_max: 10000000
    if:
      type: basename
      exact: sfk
  - id: sfk-book-string
    desc: SFK Book help string
    size_min: 500000
    size_max: 10000000
    if:
      type: text
      substr: "SFK Book"
      section: .rodata
  - id: sfk-list-help-string
    desc: SFK list command help
    size_min: 500000
    size_max: 10000000
    if:
      type: text
      substr: "sfk list"
      section: .rodata

composite_rules:
  - id: swiss-file-knife-binary
    desc: Swiss File Knife binary
    crit: notable
    conf: 0.96
    all:
      - id: sfk-basename
      - id: sfk-book-string
      - id: sfk-list-help-string
