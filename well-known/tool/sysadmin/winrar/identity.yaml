# WinRAR / RAR archiver — genuine vendor components.
#
# WinRAR ships as a signed installer (win.rar GmbH) that bundles the GUI
# (WinRAR.exe), the rar/unrar CLIs, the shell-extension DLLs (RarExt*.dll),
# and a family of self-extracting (SFX) module stubs (Default.SFX, Zip.SFX,
# WinCon.SFX, ...). The native modules carry an Authenticode signature whose
# certificate CN is "win.rar GmbH". The unsigned SFX stubs are identified by
# their WinRAR SFX manifest ("WinRAR SFX module") or, for the console stubs,
# by the Alexander Roshal (WinRAR author) version resource.
#
# This identity exists solely as a benign-context exclusion: a full archiver
# legitimately trips intent-inferring rules (clipboard, keyboard hotkeys, PE
# header parsing, VirtualProtect, the clbcatq.dll DLL-hardening list, deep
# host enumeration, etc.). Identity is anchored on the vendor certificate and
# vendor-unique resource strings — never on generic capability — so it cannot
# be borrowed by unrelated malware.
defaults:
  platforms: [windows]
  for: [pe, dll]
  size_max: 524288000
traits:
  - id: winrar-authenticode-publisher
    desc: Authenticode certificate names win.rar GmbH
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.signatures[0].subject
      regex: 'CN=win\.rar GmbH'
composite_rules:
  - id: winrar-version-authored
    desc: WinRAR-authored version resource (Alexander Roshal)
    crit: component
    conf: 0.97
    all:
      - id: objectives/evasion/masquerade/version-resource/claim::alexander-roshal-author
      - id: metadata/package/tooling::tool-identity-winrar
  - id: winrar-component
    desc: Genuine WinRAR / RAR archiver component
    crit: baseline
    conf: 0.99
    any:
      - id: well-known/tool/sysadmin/winrar::winrar-authenticode-publisher
      - id: metadata/binary/installer/sfx::winrar-sfx
      - id: well-known/tool/sysadmin/winrar::winrar-version-authored
