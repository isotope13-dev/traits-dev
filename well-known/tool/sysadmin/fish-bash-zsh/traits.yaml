defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, dll]
traits:
- id: interactive-shell-binary-marker--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  size_min: 65536
  if:
    type: text
    regex: '\b(__fish_complete|fish-shell/fish-shell/)\b'
    section: rdata
  count_max: 1003651
- id: interactive-shell-binary-marker--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  size_min: 65536
  if:
    type: text
    regex: '\b(/bash/(complete|builtins)|zsh/Completion)\b'
    section: rdata
  count_max: 1003652
- id: interactive-shell-binary-marker--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  size_min: 65536
  if:
    type: text
    regex: '\b(/zsh-[0-9])\b'
    section: rdata
  count_max: 1003653
composite_rules:
- id: interactive-shell-binary-marker
  desc: Interactive shell binary self-identifier
  crit: component
  conf: 0.95
  size_min: 65536
  any:
  - id: interactive-shell-binary-marker--rx-1
  - id: interactive-shell-binary-marker--rx-2
  - id: interactive-shell-binary-marker--rx-3
