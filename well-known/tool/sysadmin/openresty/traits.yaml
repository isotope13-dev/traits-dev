defaults:
  platforms: [unix]
  for: [elf, so]
  size_max: 50000000

traits:
  - id: openresty-nginx-module-path
    desc: OpenResty nginx module path
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: 'ngx_[A-Za-z0-9_]{1,80}_module\.so$'

  - id: openresty-path
    desc: OpenResty install path
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: 'openresty'

composite_rules:
  - id: openresty-nginx-module
    desc: OpenResty nginx module
    crit: notable
    conf: 0.99
    all:
      - id: openresty-nginx-module-path
      - id: openresty-path
