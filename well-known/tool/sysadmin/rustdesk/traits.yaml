defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.94

traits:
  - id: rustdesk-app-name
    desc: RustDesk app name string
    if:
      type: text
      exact: RustDesk
      section: rdata
  - id: rustdesk-core-dll
    desc: RustDesk core DLL reference
    if:
      type: text
      exact: librustdesk.dll
      section: rdata
  - id: rustdesk-core-entrypoint
    desc: RustDesk core entrypoint string
    if:
      type: text
      exact: rustdesk_core_main_args
      section: rdata
  - id: rustdesk-app-name-export
    desc: RustDesk app-name export string
    if:
      type: text
      exact: get_rustdesk_app_name
      section: rdata
  - id: linux-share-path
    desc: RustDesk Linux share path
    platforms: [linux]
    for: [elf, so, shell, javascript, data, systemd]
    if:
      type: basename
      regex: '.{0,120}usr[\\/]share[\\/]rustdesk.{0,120}'
  - id: linux-etc-path
    desc: RustDesk Linux etc path
    platforms: [linux]
    for: [elf, so, shell, javascript, data, systemd]
    if:
      type: basename
      regex: '.{0,120}etc[\\/]rustdesk.{0,120}'
  - id: linux-desktop-path
    desc: RustDesk desktop file path
    platforms: [linux]
    for: [elf, so, shell, javascript, data, systemd]
    if:
      type: basename
      regex: '.{0,120}applications[\\/]rustdesk.{0,120}'
  - id: linux-service-path
    desc: RustDesk service file path
    platforms: [linux]
    for: [elf, so, shell, javascript, data, systemd]
    if:
      type: basename
      exact: rustdesk.service
  - id: linux-service-binary
    desc: RustDesk Linux service binary
    platforms: [linux]
    for: [elf, so, shell, javascript, data, systemd]
    if:
      type: text
      exact: /usr/bin/rustdesk --service

composite_rules:
  - id: rustdesk-windows-runner-markers
    desc: RustDesk Windows runner markers
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: rustdesk-app-name
      - id: rustdesk-core-dll
      - id: rustdesk-core-entrypoint
      - id: rustdesk-app-name-export
  - id: rustdesk-linux-package
    desc: RustDesk Linux package markers
    crit: baseline
    conf: 0.98
    any:
      - id: linux-share-path
      - id: linux-etc-path
      - id: linux-desktop-path
      - id: linux-service-path
      - id: linux-service-binary
