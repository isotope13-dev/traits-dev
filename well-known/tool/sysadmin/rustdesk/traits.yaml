defaults:
  size_max: 52428800
  platforms: [windows]
  for: [pe]
  crit: baseline
  conf: 0.94

traits:
  - id: rustdesk-app-name
    desc: RustDesk app name string
    if:
      type: text
      exact: RustDesk
  - id: rustdesk-core-dll
    desc: RustDesk core DLL reference
    if:
      type: text
      exact: librustdesk.dll
  - id: rustdesk-core-entrypoint
    desc: RustDesk core entrypoint string
    if:
      type: text
      exact: rustdesk_core_main_args
  - id: rustdesk-app-name-export
    desc: RustDesk app-name export string
    if:
      type: text
      exact: get_rustdesk_app_name

composite_rules:
  - id: rustdesk-windows-runner-markers
    desc: RustDesk Windows runner markers
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: rustdesk-app-name
      - id: rustdesk-core-dll
      - id: rustdesk-core-entrypoint
      - id: rustdesk-app-name-export
