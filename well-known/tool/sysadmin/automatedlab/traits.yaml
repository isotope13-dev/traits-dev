defaults:
  platforms: [windows, unix]
  for: [powershell, xml]

traits:
  - id: automatedlab-worker-basename
    desc: AutomatedLabWorker module basename
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: '^AutomatedLabWorker\.(psm1|psd1|nuspec)$'
      case_insensitive: true
  - id: automatedlab-module-marker
    desc: AutomatedLab module marker
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\b(AutomatedLabWorker|Invoke-LWCommand|Get-LabConfigurationItem|LabAutomation)\b'

composite_rules:
  - id: automatedlab-worker-module
    desc: AutomatedLabWorker sysadmin module
    crit: notable
    conf: 0.97
    all:
      - id: automatedlab-worker-basename
      - id: automatedlab-module-marker
