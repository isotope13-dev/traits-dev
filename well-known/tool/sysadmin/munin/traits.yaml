defaults:
  platforms: [unix]
  crit: baseline
  conf: 0.98
  size_max: 50000000
traits:
  - id: graph-title-output
    desc: Munin graph title output
    for: [shell, python, perl, php, c, cpp]
    if:
      type: text
      word: graph_title
  - id: graph-category-output
    desc: Munin graph category output
    for: [shell, python, perl, php, c, cpp]
    if:
      type: text
      word: graph_category
  - id: graph-value-output
    desc: Munin-style metric field output
    for: [shell, python, perl, php, c, cpp]
    if:
      type: text
      # Munin emits quoted `metric.value 42`-style strings. Require the
      # protocol-shaped string literal so ordinary source such as
      # `if child.type not in ...` cannot identify unrelated code as Munin.
      regex: '["''][A-Za-z][A-Za-z0-9_-]*\.(label|value|type)\s+[^"''\n]{1,120}'
  - id: magic-marker
    desc: Munin plugin magic marker
    for: [shell, python, perl, php, c, cpp]
    if:
      type: text
      substr: "#%# family="
  - id: plugin-conf-example
    desc: Munin plugin config example
    for: [shell, python, perl, php, c, cpp]
    if:
      type: text
      substr: /etc/munin/plugin-conf.d/
composite_rules:
  - id: munin-graph-output-context
    desc: Munin graph output context
    crit: notable
    conf: 0.98
    for: [shell, python, perl, php, c, cpp]
    all:
      - id: graph-title-output
      - id: graph-category-output
  - id: munin-monitoring-plugin
    desc: Munin monitoring plugin output
    crit: notable
    conf: 0.98
    all:
      - id: graph-title-output
      - id: graph-category-output
    any:
      - id: graph-value-output
      - id: magic-marker
      - id: plugin-conf-example
