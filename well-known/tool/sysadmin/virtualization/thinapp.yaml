defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: thinapp-boot-loader-pdb
    desc: VMware ThinApp boot loader PDB
    crit: component
    conf: 0.98
    size_max: 1048576
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])thinstall[\\/]modules[\\/]boot_loader\.pdb$'
  - id: thinapp-manage-api-factory
    desc: VMware ThinApp ManageAPIFactory marker
    crit: component
    conf: 0.95
    size_max: 1048576
    if:
      type: text
      exact: ManageAPIFactory
      section: rdata
composite_rules:
  - id: thinapp-boot-loader
    desc: VMware ThinApp boot loader
    crit: baseline
    conf: 0.98
    all:
      - id: thinapp-boot-loader-pdb
      - id: thinapp-manage-api-factory
