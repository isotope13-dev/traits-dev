defaults:
  platforms: [unix, windows]
  for: [elf, pe, go]
  crit: notable
  conf: 0.98
  size_min: 1
  size_max: 200000000

traits:
  - id: lima-module-path
    desc: Lima module path
    if:
      type: text
      substr: github.com/lima-vm/lima
  - id: lima-tool-path
    desc: Lima tool path
    for: [elf, pe]
    if:
      type: basename
      regex: '^(limactl(\.exe)?|limactl-mcp\.exe|lima-guestagent\.[^\\/]+)$'

composite_rules:
  - id: lima-virtualization-tool
    desc: Lima virtualization tool
    crit: notable
    conf: 0.99
    any:
      - id: lima-module-path
      - id: lima-tool-path
