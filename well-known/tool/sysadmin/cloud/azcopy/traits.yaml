defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - elf
  - macho
  - pe
  - apk
  crit: baseline
  conf: 0.98
  size_min: 1
  size_max: 500000000
traits:
- id: azcopy-binary-basename
  desc: AzCopy binary basename
  crit: notable
  conf: 0.98
  for:
  - elf
  - macho
  - pe
  if:
    type: path
    basename: true
    regex: '^azcopy(\.exe)?$'
- id: azcopy-package-path
  desc: AzCopy package path
  crit: component
  conf: 0.98
  for:
  - apk
  if:
    type: path
    regex: '(^|[\\/])azcopy-[0-9][^\\/]*\.apk$'
composite_rules:
- id: azcopy-tool
  desc: AzCopy cloud storage transfer tool
  crit: notable
  conf: 0.98
  any:
  - id: azcopy-binary-basename
  - id: azcopy-package-path
