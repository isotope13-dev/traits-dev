defaults:
  platforms: [unix]
  for: [elf]

traits:
  - id: snmp-command-interpreter
    desc: scli SNMP command interpreter
    crit: notable
    conf: 0.95
    size_min: 500000
    size_max: 5000000
    if:
      type: text
      section: .rodata
      substr: "Scli is a command interpreter which can be used to browse,\nmonitor and configure SNMP enabled devices."
