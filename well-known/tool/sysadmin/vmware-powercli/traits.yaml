defaults:
  platforms: [windows, unix]
  for: [powershell, nupkg, archive]
  crit: baseline
  conf: 0.97
  size_max: 100000000

traits:
  - id: powercli-launch-script-basename
    desc: VMware PowerCLI launch script basename
    if:
      type: path
      basename: true
      exact: VMware.PowerCLI.ps1

  - id: powercli-welcome-text
    desc: VMware PowerCLI welcome text
    if:
      type: text
      substr: "Welcome to VMware"

composite_rules:
  - id: powercli-launch-script
    desc: VMware PowerCLI launch script
    crit: notable
    conf: 0.98
    all:
      - id: powercli-launch-script-basename
      - id: powercli-welcome-text

