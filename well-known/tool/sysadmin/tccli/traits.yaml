defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: tccli-options-import
    desc: Tencent Cloud CLI option module import
    crit: notable
    conf: 0.99
    if:
      type: import
      exact: tccli.options_define
  - id: tccli-service-client-source
    desc: Tencent Cloud CLI service client source
    crit: notable
    conf: 0.98
    if:
      type: import
      regex: '^tencentcloud\.[A-Za-z0-9_]+\.v[0-9]+$'
  - id: tccli-client-dispatch-map
    desc: Tencent Cloud CLI service dispatch map
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: 'CLIENT_MAP = {'

composite_rules:
  - id: tccli-generated-service-client
    desc: Tencent Cloud CLI generated service client
    crit: notable
    conf: 0.99
    all:
      - id: tccli-options-import
      - id: tccli-service-client-source
      - id: tccli-client-dispatch-map
