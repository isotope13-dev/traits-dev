defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - elf
  - macho
  - pe
  - apk
  size_min: 1
  size_max: 500000000
traits:
- id: kapp-controller-basename
  desc: kapp-controller binary basename
  crit: notable
  conf: 0.98
  for:
  - elf
  - macho
  - pe
  if:
    type: path
    basename: true
    regex: '^kapp-controller(\.exe)?$'
- id: kapp-controller-package-path
  desc: kapp-controller package path
  crit: component
  conf: 0.98
  for:
  - apk
  if:
    type: path
    regex: '(^|[\\/])kapp-controller-[0-9][^\\/]*\.apk$'
composite_rules:
- id: kapp-controller-tool
  desc: kapp-controller Kubernetes controller
  crit: notable
  conf: 0.98
  any:
  - id: kapp-controller-basename
  - id: kapp-controller-package-path
