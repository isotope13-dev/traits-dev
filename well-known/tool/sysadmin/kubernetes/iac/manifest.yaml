defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - shell
  - javascript
  - typescript
  - json
  - github-actions
  size_max: 5000000
traits:
- id: kubernetes-iac-path
  desc: Kubernetes IaC directory path
  crit: component
  conf: 0.9
  if:
    type: path
    regex: "(^|/)(k8s|kubernetes|argocd)(/|$)"
    case_insensitive: true
# A bare `apiVersion` key is not Kubernetes-specific — WordPress Gutenberg
# block.json ("apiVersion": 2), Azure ARM (date strings), CloudFormation, and
# others all use it. Require the VALUE to be a k8s group/version token
# (`v1`, `apps/v1`, `networking.k8s.io/v1beta1`) so an integer or date does
# not match. Real manifests always carry one; the composite still needs 2 legs.
- id: kubernetes-manifest-apiversion
  desc: Kubernetes apiVersion group/version value
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'apiVersion["'']?\s*:\s*["'']?([a-z0-9][a-z0-9.-]*/)?v[0-9]+((alpha|beta)[0-9]+)?\b'
- id: kubernetes-manifest-kind
  desc: Kubernetes kind field near apiVersion
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?s)\b(apiVersion.{0,200}kind|kind.{0,200}apiVersion)\b'
- id: kubernetes-pod-serviceaccount-field
  desc: Kubernetes service account field
  crit: component
  conf: 0.88
  if:
    type: text
    word: serviceAccountName
- id: kubernetes-volume-mounts-field
  desc: Kubernetes volume mounts field
  crit: component
  conf: 0.86
  if:
    type: text
    word: volumeMounts
- id: kubernetes-secretref-field
  desc: Kubernetes secret reference field
  crit: component
  conf: 0.86
  if:
    type: text
    word: secretRef
- id: kubernetes-configmap-field
  desc: Kubernetes config map field
  crit: component
  conf: 0.84
  if:
    type: text
    word: configMap
composite_rules:
- id: kubernetes-iac-context
  desc: Kubernetes IaC manifest context
  crit: baseline
  conf: 0.92
  all:
  - id: kubernetes-iac-path
  any:
  - id: kubernetes-manifest-apiversion
  - id: kubernetes-manifest-kind
  - id: kubernetes-pod-serviceaccount-field
  - id: kubernetes-volume-mounts-field
  - id: kubernetes-secretref-field
  - id: kubernetes-configmap-field
  needs: 2
