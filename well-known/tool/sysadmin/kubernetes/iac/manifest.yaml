defaults:
  platforms: [linux, macos, windows]
  for: [shell, javascript, typescript, json, github-actions]

traits:
  - id: kubernetes-iac-path
    desc: Kubernetes IaC directory path
    crit: component
    conf: 0.9
    if:
      type: path
      regex: '(^|/)(k8s|kubernetes|argocd)(/|$)'
      case_insensitive: true
  - id: kubernetes-manifest-apiversion
    desc: Kubernetes apiVersion field
    crit: component
    conf: 0.88
    if:
      type: text
      word: apiVersion
  - id: kubernetes-manifest-kind
    desc: Kubernetes kind field
    crit: component
    conf: 0.86
    if:
      type: text
      word: kind
  - id: kubernetes-pod-serviceaccount-field
    desc: Kubernetes service account field
    crit: component
    conf: 0.88
    if:
      type: text
      word: serviceAccountName
  - id: kubernetes-volume-mounts-field
    desc: Kubernetes volume mounts field
    crit: component
    conf: 0.86
    if:
      type: text
      word: volumeMounts
  - id: kubernetes-secretref-field
    desc: Kubernetes secret reference field
    crit: component
    conf: 0.86
    if:
      type: text
      word: secretRef
  - id: kubernetes-configmap-field
    desc: Kubernetes config map field
    crit: component
    conf: 0.84
    if:
      type: text
      word: configMap

composite_rules:
  - id: kubernetes-iac-context
    desc: Kubernetes IaC manifest context
    crit: baseline
    conf: 0.92
    all:
      - id: kubernetes-iac-path
    any:
      - id: kubernetes-manifest-apiversion
      - id: kubernetes-manifest-kind
      - id: kubernetes-pod-serviceaccount-field
      - id: kubernetes-volume-mounts-field
      - id: kubernetes-secretref-field
      - id: kubernetes-configmap-field
    needs: 2
