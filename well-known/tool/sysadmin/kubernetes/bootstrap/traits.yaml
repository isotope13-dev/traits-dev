defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - shell
  size_max: 5000000
traits:
- id: kubernetes-windows-gce-script
  desc: Kubernetes GCE bootstrap script
  crit: notable
  conf: 0.95
  for:
  - powershell
  if:
    type: text
    regex: '(?i)kubernetes[\s\S]{0,300}(GCE|Google Compute Engine)'
- id: kubernetes-authors-shell
  desc: Kubernetes authors shell text
  crit: component
  conf: 0.95
  if:
    type: text
    substr: The Kubernetes Authors
- id: kubernetes-shell-tooling
  desc: Kubernetes bootstrap tool names
  crit: component
  conf: 0.95
  if:
    type: text
    regex: cri-dockerd|kubeadm|minikube
- id: kubernetes-shell-kubectl-marker
  desc: Kubernetes kubectl shell marker
  crit: component
  conf: 0.95
  if:
    type: text
    word: kubectl
- id: kubernetes-shell-k8s-marker
  desc: Kubernetes k8s shell marker
  crit: component
  conf: 0.95
  if:
    type: text
    word: k8s
- id: kubectl-command-context
  desc: kubectl command invocation
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\b(command\\s+)?kubectl\\b"
- id: kubectl-binary
  desc: Kubernetes kubectl executable
  crit: notable
  conf: 0.99
  for: [elf, macho, pe]
  size_max: 100000000
  if:
    type: basename
    regex: '^kubectl(\.exe)?$'
- id: kubectl-binary-build-marker
  desc: Kubernetes kubectl Go binary build marker
  crit: notable
  conf: 0.99
  for:
  - macho
  size_max: 100000000
  if:
    type: value
    path: macho.go.path
    exact: k8s.io/kubernetes/cmd/kubectl
- id: kubernetes-windows-gce-ssh-installer-name
  desc: Kubernetes GCE OpenSSH installer filename
  crit: component
  conf: 0.98
  for: [powershell]
  if:
    type: basename
    exact: install-ssh.psm1
- id: kubernetes-windows-gce-ssh-installer-marker
  desc: Kubernetes GCE OpenSSH release marker
  crit: component
  conf: 0.98
  for: [powershell]
  if:
    type: text
    substr: Win32-OpenSSH/releases/download
- id: kubernetes-windows-gce-common-module-name
  desc: Kubernetes Windows GCE common module filename
  crit: component
  conf: 0.98
  for: [powershell]
  if:
    type: basename
    exact: common.psm1
- id: kubernetes-windows-gce-common-module-marker
  desc: Kubernetes log rotation task marker
  crit: component
  conf: 0.98
  for: [powershell]
  if:
    type: text
    substr: Rotate Kubernetes logs
composite_rules:
- id: kubernetes-windows-gce-ssh-installer-context
  desc: Kubernetes Windows GCE OpenSSH installer source
  crit: notable
  conf: 0.98
  for: [powershell]
  all:
  - id: kubernetes-windows-gce-ssh-installer-name
  - id: kubernetes-windows-gce-ssh-installer-marker
- id: kubernetes-windows-gce-common-module-context
  desc: Kubernetes Windows GCE common module source
  crit: notable
  conf: 0.98
  for: [powershell]
  all:
  - id: kubernetes-windows-gce-common-module-name
  - id: kubernetes-windows-gce-common-module-marker
- id: kubernetes-bootstrap-context
  desc: Kubernetes bootstrap context
  crit: baseline
  conf: 0.9
  for:
  - shell
  - powershell
  any:
  - id: kubernetes-windows-gce-script
  - id: kubernetes-shell-bootstrap
  - id: kubernetes-windows-gce-ssh-installer-context
  - id: kubernetes-windows-gce-common-module-context
- id: kubernetes-shell-bootstrap
  desc: Kubernetes bootstrap shell context
  crit: component
  conf: 0.95
  all:
  - id: kubernetes-authors-shell
  any:
  - id: kubernetes-shell-tooling
  - id: kubernetes-shell-kubectl-marker
  - id: kubernetes-shell-k8s-marker
