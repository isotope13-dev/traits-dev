defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - shell
  size_max: 5000000
traits:
- id: kubernetes-windows-gce-script
  desc: Kubernetes Windows GCE script
  crit: notable
  conf: 0.95
  for:
  - powershell
  if:
    type: text
    regex: kubernetes|GCE|k8s|Register-ScheduledTask
- id: kubernetes-authors-shell
  desc: Kubernetes authors shell text
  crit: component
  conf: 0.95
  if:
    type: text
    substr: The Kubernetes Authors
- id: kubernetes-shell-tooling
  desc: Kubernetes bootstrap tool names
  crit: component
  conf: 0.95
  if:
    type: text
    regex: cri-dockerd|kubeadm|minikube
- id: kubectl-command-context
  desc: kubectl command invocation
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\b(command\\s+)?kubectl\\b"
composite_rules:
- id: kubernetes-bootstrap-context
  desc: Kubernetes bootstrap context
  crit: baseline
  conf: 0.9
  for:
  - shell
  - powershell
  any:
  - id: kubernetes-windows-gce-script
  - id: kubernetes-shell-bootstrap
- id: kubernetes-shell-bootstrap
  desc: Kubernetes bootstrap shell context
  crit: component
  conf: 0.95
  all:
  - id: kubernetes-authors-shell
  - id: kubernetes-shell-tooling
