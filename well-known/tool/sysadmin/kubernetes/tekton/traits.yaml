defaults:
  platforms: [linux]
  for: [apk, json, text]
  size_max: 1000000

traits:
  - id: tekton-pipelines-apk-package-name
    desc: Tekton Pipelines APK package name
    crit: baseline
    conf: 0.98
    ref: sha256:2bb5656de781c5c1fef1c38c266a11499879562c3497901fc2df41933e8ac8e1
    for: [apk, text]
    if:
      type: text
      regex: '(?m)^pkgname = tekton-pipelines-[A-Za-z0-9_.+-]+$'

  - id: tekton-pipelines-wolfi-purl
    desc: Tekton Pipelines Wolfi APK package URL
    crit: baseline
    conf: 0.98
    ref: sha256:2bb5656de781c5c1fef1c38c266a11499879562c3497901fc2df41933e8ac8e1
    for: [json]
    if:
      type: text
      substr: "pkg:apk/wolfi/tekton-pipelines-"

composite_rules:
  - id: tekton-pipelines-apk-package
    desc: Tekton Pipelines Wolfi/APK package
    crit: baseline
    conf: 0.98
    any:
      - id: tekton-pipelines-apk-package-name
      - id: tekton-pipelines-wolfi-purl
