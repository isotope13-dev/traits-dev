# Kubernetes CLI tools (minikube, kubectl, helm, etc.)
# These are legitimate infrastructure tools that use curl|sh for component
# installation, daemon patterns for VM/container management, and SSH for
# node access — all normal for their purpose.
defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, powershell]
traits:
  - id: minikube-text
    desc: minikube text
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: text
      substr: k8s.io/minikube/pkg/minikube/
  - id: minikube-symbol
    desc: minikube symbol
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: symbol
      substr: k8s.io/minikube/
  - id: minikube-installer
    desc: minikube installer
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: basename
      regex: '(?i)minikube.{0,50}installer'
  - id: kubernetes-windows-gce-script
    desc: Kubernetes Windows GCE support script
    crit: component
    conf: 0.95
    for: [powershell]
    if:
      type: text
      regex: 'kubernetes|GCE|k8s|Register-ScheduledTask'
