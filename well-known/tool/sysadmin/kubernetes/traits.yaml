# Kubernetes CLI tools (minikube, kubectl, helm, etc.)
# These are legitimate infrastructure tools that use curl|sh for component
# installation, daemon patterns for VM/container management, and SSH for
# node access — all normal for their purpose.
defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, powershell]
traits:
  - id: minikube-text
    desc: minikube text
    crit: component
    conf: 0.95
    for: [elf, macho, pe, powershell, go]
    size_min: 1000
    size_max: 500000000
    if:
      type: text
      substr: k8s.io/minikube/pkg/minikube/
  - id: minikube-symbol
    desc: minikube symbol
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: symbol
      substr: k8s.io/minikube/
  - id: minikube-installer
    desc: minikube installer
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: path
      basename: true
      regex: '(?i)minikube.{0,50}installer'
  - id: kubernetes-windows-gce-script
    desc: Kubernetes Windows GCE support script
    crit: component
    conf: 0.95
    for: [powershell]
    if:
      type: text
      regex: 'kubernetes|GCE|k8s|Register-ScheduledTask'
  - id: kubernetes-authors-shell
    desc: Kubernetes authors shell script
    crit: component
    conf: 0.95
    for: [shell]
    if:
      type: text
      substr: The Kubernetes Authors
  - id: kubernetes-shell-tooling
    desc: Kubernetes shell bootstrap tooling
    crit: component
    conf: 0.95
    for: [shell]
    if:
      type: text
      regex: 'cri-dockerd|kubeadm|minikube'
composite_rules:
  - id: kubernetes-shell-bootstrap
    desc: Kubernetes bootstrap shell script
    crit: component
    conf: 0.95
    all:
      - id: kubernetes-authors-shell
      - id: kubernetes-shell-tooling
