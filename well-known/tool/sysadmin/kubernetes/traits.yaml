# Kubernetes CLI tools (minikube, kubectl, helm, etc.)
# These are legitimate infrastructure tools that use curl|sh for component
# installation, daemon patterns for VM/container management, and SSH for
# node access — all normal for their purpose.
defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
traits:
  - id: minikube-text
    desc: minikube text
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: text
      substr: k8s.io/minikube/pkg/minikube/
  - id: minikube-symbol
    desc: minikube symbol
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: symbol
      substr: k8s.io/minikube/
  - id: minikube-installer
    desc: minikube installer
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: basename
      regex: '(?i)minikube.{0,50}installer'
composite_rules:
  - id: minikube
    desc: minikube local Kubernetes tool
    crit: baseline
    conf: 0.95
    any:
      - id: minikube-text
      - id: minikube-symbol
      - id: minikube-installer
