defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, powershell]

traits:
  - id: minikube-text
    desc: minikube package path text
    crit: component
    conf: 0.95
    for: [elf, macho, pe, powershell, go]
    size_min: 1000
    size_max: 500000000
    if:
      type: text
      substr: k8s.io/minikube/pkg/minikube/
  - id: minikube-symbol
    desc: minikube import path symbol
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: symbol
      substr: k8s.io/minikube/
  - id: minikube-installer
    desc: minikube installer basename
    crit: notable
    conf: 0.95
    size_min: 1000000
    size_max: 500000000
    if:
      type: path
      basename: true
      regex: '(?i)minikube.{0,50}installer'
