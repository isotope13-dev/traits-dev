defaults:
  platforms: [linux]
  for: [data, shell]
  crit: notable
  conf: 0.96
  size_max: 134217728

traits:
  - id: k3s-container-archive
    desc: Rancher k3s container image archive
    crit: notable
    for: [tar]
    if:
      type: path
      basename: true
      regex: '^docker\.io_rancher_k3s_.*\.tar\.xz$'
  - id: airgap-image-layer
    desc: k3s airgap image layer
    crit: notable
    if:
      type: path
      regex: '(k3s-airgap-images|blobs[\\/]sha256[\\/])'

  - id: k3s-rootless-source-path
    crit: notable
    desc: k3s rootless source path
    for: [go, archive]
    if:
      type: path
      regex: 'pkg/rootless'
