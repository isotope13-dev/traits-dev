defaults:
  platforms: [linux]
  for: [data, shell]
  crit: baseline
  conf: 0.96
  size_max: 134217728

traits:
  - id: airgap-image-layer
    desc: k3s airgap image layer
    crit: notable
    if:
      type: path
      regex: '(k3s-airgap-images|blobs[\\/]sha256[\\/])'

  - id: k3s-rootless-source-path
    desc: k3s rootless source path
    for: [go, archive]
    if:
      type: path
      regex: 'pkg/rootless'
