defaults:
  platforms: [unix]
  for: [c, python, go]
traits:
  - id: cubesandbox-source-path
    desc: Tencent CubeSandbox source path
    crit: notable
    conf: 0.98
    size_max: 5000000
    if:
      type: path
      substr: github.com/tencentcloud/CubeSandbox@
composite_rules:
  - id: cubesandbox-source-context
    desc: Tencent CubeSandbox source context
    crit: notable
    conf: 0.98
    all:
      - id: cubesandbox-source-path
      - id: metadata/file/string/file::linux-vmlinux-header-basename
