defaults:
  platforms: [unix]
  for: [c, python, go]
traits:
  - id: cubesandbox-source-path
    desc: Tencent CubeSandbox source path
    crit: notable
    conf: 0.98
    size_max: 5000000
    if:
      type: path
      substr: github.com/tencentcloud/CubeSandbox@
  - id: cubesandbox-vmlinux-header
    desc: CubeSandbox generated vmlinux header
    crit: notable
    conf: 0.95
    size_max: 5000000
    if:
      type: path
      basename: true
      exact: vmlinux.h
composite_rules:
  - id: cubesandbox-source-context
    desc: Tencent CubeSandbox source context
    crit: notable
    conf: 0.98
    all:
      - id: cubesandbox-source-path
      - id: cubesandbox-vmlinux-header
