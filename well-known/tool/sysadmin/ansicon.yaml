defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 1048576
traits:
  - id: ansicon-basename
    desc: ANSICON console hook filename
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: '(?i)^(?:ansicon\.exe|ANSI(?:32|64)\.dll)$'
  - id: ansicon-product-string
    desc: ANSICON product marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: ANSICON
  - id: ansicon-hook-symbols
    desc: ANSICON console hook exports
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: '^(?:InjectDLL|RemoteLoad64|IsConsoleHandle|DllNameType)$'
composite_rules:
  - id: ansicon-console-hook-component
    desc: ANSICON console hook component
    crit: component
    conf: 0.98
    needs: 2
    any:
      - id: ansicon-basename
      - id: ansicon-product-string
      - id: ansicon-hook-symbols
