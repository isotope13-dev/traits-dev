defaults:
  platforms: [unix]
  for: [elf]
  size_min: 10000
  size_max: 200000

traits:
  - id: knc-binary-name
    desc: Kerberised NetCat executable name
    crit: notable
    conf: 0.99
    if:
      type: basename
      exact: knc

composite_rules:
  - id: knc-utility
    desc: Kerberised NetCat utility executable
    crit: notable
    conf: 0.99
    all:
      - id: knc-binary-name
      - id: micro-behaviors/os/security/auth/session::gss-client-security-context
      - id: micro-behaviors/os/security/auth/session::gss-server-security-context
