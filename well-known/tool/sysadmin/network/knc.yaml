defaults:
  platforms: [unix]
  for: [elf]
  size_min: 10000
  size_max: 200000

traits:
  - id: knc-binary-name
    desc: Kerberised NetCat executable name
    crit: notable
    conf: 0.99
    if:
      type: basename
      exact: knc

  - id: knc-gss-client-api
    desc: KNC Kerberos client API import
    crit: notable
    conf: 0.99
    if:
      type: import
      exact: gss_init_sec_context

  - id: knc-gss-server-api
    desc: KNC Kerberos server API import
    crit: notable
    conf: 0.99
    if:
      type: import
      exact: gss_accept_sec_context

composite_rules:
  - id: knc-utility
    desc: Kerberised NetCat utility executable
    crit: notable
    conf: 0.99
    all:
      - id: knc-binary-name
      - id: knc-gss-client-api
      - id: knc-gss-server-api
