defaults:
  platforms: [unix]
  for: [binaries]
  size_min: 1024
  size_max: 100000000

traits:
  - id: socat-binary-name
    desc: socat utility executable name
    crit: notable
    conf: 0.98
    if:
      type: basename
      regex: '^socat(1)?$'

  - id: socat-runtime-marker
    desc: socat runtime environment marker
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: SOCAT_MAIN_WAIT

composite_rules:
  - id: socat-utility
    desc: socat network relay utility identity
    crit: notable
    conf: 0.99
    all:
      - id: socat-binary-name
      - id: socat-runtime-marker
