defaults:
  platforms: [unix]
  for: [binaries]
  size_min: 1024
  size_max: 100000000

traits:
  - id: socat-binary-name
    desc: socat utility executable name
    crit: notable
    conf: 0.98
    if:
      type: basename
      regex: '^socat(1)?$'

  - id: socat-runtime-marker
    desc: socat runtime environment marker
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: SOCAT_MAIN_WAIT

  - id: socat-embedded-package-name
    desc: Embedded socat package identity
    crit: notable
    conf: 0.99
    for: [elf]
    platforms: [linux]
    if:
      type: text
      section: .note.package
      regex: '"name"\s*:\s*"socat"'

  - id: socat-embedded-package-version
    desc: Embedded socat package version
    crit: notable
    conf: 0.99
    for: [elf]
    platforms: [linux]
    if:
      type: text
      section: .note.package
      regex: '"name"\s*:\s*"socat"\s*,\s*"version"\s*:'

composite_rules:
  - id: socat-utility
    desc: socat package identity
    crit: notable
    conf: 0.99
    for: [elf]
    platforms: [linux]
    all:
      - id: socat-embedded-package-name
      - id: socat-embedded-package-version
