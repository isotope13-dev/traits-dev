defaults:
  platforms: [unix, openwrt]
  for: [elf]
  crit: baseline
  size_max: 52428800

traits:
  - id: adbyby-basename
    desc: adbyby executable basename
    conf: 0.98
    if:
      type: basename
      exact: adbyby

composite_rules:
  - id: adbyby-package-binary
    desc: adbyby executable with protocol markers
    crit: baseline
    conf: 0.98
    all:
      - id: adbyby-basename
      - id: objectives/command-and-control/channel/covert::covert-protocol-markers
