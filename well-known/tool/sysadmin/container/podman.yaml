defaults:
  platforms:
  - linux
  - macos
  - windows
  crit: baseline
  conf: 0.96
  size_max: 5000000
traits:
- id: podman-go-package
  desc: Podman Go package marker
  for:
  - elf
  - macho
  - pe
  size_min: 1000000
  size_max: 500000000
  if:
    type: text
    section: ".text"
    substr: github.com/containers/podman/
- id: podman-basename
  desc: Podman executable basename
  for:
  - elf
  - macho
  - pe
  size_min: 1000000
  size_max: 500000000
  if:
    type: path
    regex: "(^|[\\\\/])podman(-remote)?(\\.exe)?$"
- id: podman-manpage-path
  desc: Podman manual page path
  for:
  - python
  - shell
  - markdown
  - text
  size_min: 100
  size_max: 1000000
  if:
    type: path
    regex: "(^|[\\\\/!])podman-[a-z0-9_-]+\\.1(\\.gz)?($|!)"
