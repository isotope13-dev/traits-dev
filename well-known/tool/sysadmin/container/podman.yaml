defaults:
  platforms:
  - linux
  - macos
  - windows
  crit: baseline
  conf: 0.96
  size_max: 5000000
traits:
- id: podman-go-package
  desc: Podman Go package marker
  crit: notable
  for:
  - elf
  - macho
  - pe
  size_min: 1000000
  size_max: 500000000
  if:
    type: text
    section: ".text"
    substr: github.com/containers/podman/
- id: podman-basename
  desc: Podman executable basename
  for:
  - elf
  - macho
  - pe
  size_min: 1000000
  size_max: 500000000
  if:
    type: path
    regex: "(^|[\\\\/])podman(-remote)?(\\.exe)?$"
- id: podman-manpage-path
  desc: Podman manual page path
  for:
  - javascript
  - python
  - shell
  - markdown
  - text
  size_min: 100
  size_max: 1000000
  if:
    type: path
    basename: true
    regex: "^podman[a-z0-9_-]*\\.1(\\.gz)?$"
- id: podman-desktop-embedded-linux-image
  desc: Podman Desktop embedded Linux image
  for:
  - elf
  - python
  - powershell
  - shell
  size_min: 1000
  size_max: 500000000
  if:
    type: path
    regex: 'podman-image-(x64|arm64)\.zst'
composite_rules:
- id: podman-distribution
  desc: Podman distribution artifact
  crit: notable
  conf: 0.96
  size_max: 500000000
  any:
  - id: podman-basename
  - id: podman-manpage-path
  - id: podman-desktop-embedded-linux-image
