defaults:
  for: [pe]
  platforms: [windows]
  size_max: 5242880
traits:
  - id: winpty-pipe-prefix
    desc: Winpty named pipe prefix
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: "winpty-"
      section: .text
  - id: winpty-agent-banner
    desc: Winpty agent usage banner
    crit: notable
    conf: 1.0
    if:
      type: raw
      substr: "Ordinarily, this program is launched by winpty.dll"
      section: .text
  - id: winpty-agent-pdb
    desc: Winpty agent debug path
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])winpty-agent\.pdb$'
composite_rules:
  - id: winpty-agent
    desc: Winpty console broker utility
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: winpty-pipe-prefix
      - id: winpty-agent-banner
      - id: winpty-agent-pdb
