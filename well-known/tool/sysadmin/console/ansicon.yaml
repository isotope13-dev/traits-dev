defaults:
  for: [pe, dll]
  platforms: [windows]
  size_max: 1048576
traits:
- id: ansicon-basename
  desc: ANSICON console hook filename
  crit: component
  conf: 0.98
  if:
    type: path
    basename: true
    regex: '(?i)^(ansicon\.exe|ANSI(32|64)\.dll)$'
- id: ansicon-product-string
  desc: ANSICON product marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: ANSICON
    section: rdata
- id: ansicon-hook-symbols--injectdll
  desc: ANSICON console hook exports (InjectDLL)
  crit: component
  conf: 0.98
  if:
    type: symbol
    exact: InjectDLL
- id: ansicon-hook-symbols--remoteload64
  desc: ANSICON console hook exports (RemoteLoad64)
  crit: component
  conf: 0.98
  if:
    type: symbol
    exact: RemoteLoad64
- id: ansicon-hook-symbols--isconsolehandle
  desc: ANSICON console hook exports (IsConsoleHandle)
  crit: component
  conf: 0.98
  if:
    type: symbol
    exact: IsConsoleHandle
- id: ansicon-hook-symbols--dllnametype
  desc: ANSICON console hook exports (DllNameType)
  crit: component
  conf: 0.98
  if:
    type: symbol
    exact: DllNameType
composite_rules:
- id: ansicon-hook-symbols
  desc: ANSICON console hook exports
  crit: component
  conf: 0.98
  any:
  - id: ansicon-hook-symbols--injectdll
  - id: ansicon-hook-symbols--remoteload64
  - id: ansicon-hook-symbols--isconsolehandle
  - id: ansicon-hook-symbols--dllnametype
- id: ansicon-console-hook-component
  desc: ANSICON console hook component
  crit: component
  conf: 0.98
  needs: 2
  any:
  - id: ansicon-basename
  - id: ansicon-product-string
  - id: ansicon-hook-symbols
