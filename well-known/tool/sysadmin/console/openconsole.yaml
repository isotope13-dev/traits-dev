defaults:
  platforms: [windows]
  for: [pe]
  size_min: 200000
  size_max: 3000000

traits:
  - id: microsoft-openconsole-signature
    desc: Verified Microsoft OpenConsole signer
    crit: notable
    conf: 1.0
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '^CN=Microsoft Corporation,'

  - id: openconsole-product-identity
    desc: Windows Terminal OpenConsole product identity
    crit: notable
    conf: 1.0
    if:
      type: value
      path: pe.version.product_name
      exact: Windows Terminal

  - id: openconsole-file-identity
    desc: Windows Terminal OpenConsole file identity
    crit: notable
    conf: 1.0
    if:
      type: value
      path: pe.version.original_filename
      exact: OpenConsole.exe

composite_rules:
  - id: microsoft-openconsole-host
    desc: Verified Microsoft Windows Terminal console host
    crit: exception
    conf: 1.0
    all:
      - id: microsoft-openconsole-signature
      - id: openconsole-product-identity
      - id: openconsole-file-identity
