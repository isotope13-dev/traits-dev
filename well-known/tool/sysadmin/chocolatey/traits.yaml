# Chocolatey (Windows package manager) artifact filenames. These ship in
# every Chocolatey install and carry no signal alone; malware that masquerades
# as a Chocolatey installer embeds them as decoys. Component-only — referenced
# by family composites that add the real malicious behavior.
defaults:
  platforms: [windows]
  for: [pe, scripts]
  crit: component
  conf: 0.5
  size_min: 512
  size_max: 50000000
traits:
  - id: refresh-env-cmd
    desc: Chocolatey RefreshEnv.cmd filename
    if:
      type: text
      substr: RefreshEnv.cmd
  - id: package-cache-location-ps1
    desc: Chocolatey Get-PackageCacheLocation.ps1 filename
    if:
      type: text
      substr: Get-PackageCacheLocation.ps1
