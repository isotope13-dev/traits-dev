defaults:
  platforms: [windows]
  for: [pe, archive]
  size_max: 300000000
traits:
  - id: netch-release-archive
    desc: Netch release archive
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: (?i)^.{0,80}netch.{0,80}\.(7z|zip)$
  - id: netch-executable
    desc: Netch executable
    crit: component
    conf: 0.98
    if:
      type: basename
      exact: Netch.exe
      case_insensitive: true
composite_rules:
  - id: netch-component
    desc: Netch network proxy component
    crit: component
    conf: 0.98
    any:
      - id: well-known/tool/sysadmin/netch
