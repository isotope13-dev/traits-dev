defaults:
  platforms: [windows]
  for: [pe, archive]
  size_max: 300000000
traits:
  - id: netch-release-archive
    desc: Netch release archive
    crit: component
    conf: 0.98
    if:
      type: path
      basename: true
      regex: (?i)^.{0,80}netch.{0,80}\.(7z|zip)$
  - id: netch-executable
    desc: Netch executable
    crit: component
    conf: 0.98
    if:
      type: path
      basename: true
      exact: Netch.exe
      case_insensitive: true
  - id: netch-v2ray-component
    desc: Netch v2ray component
    crit: component
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '(?i)^(v2ray-sn\.exe|tun2socks\.bin|aiodns\.bin)$'
      case_insensitive: true
  - id: netch-route-helper
    desc: Netch route helper binary
    crit: component
    conf: 0.98
    if:
      type: path
      basename: true
      exact: RouteHelper.bin
      case_insensitive: true
  - id: netch-redirector
    desc: Netch redirector binary
    crit: component
    conf: 0.98
    if:
      type: path
      basename: true
      exact: Redirector.bin
      case_insensitive: true
  - id: netch-nfapi-component
    desc: Netch NFAPI component
    crit: component
    conf: 0.98
    if:
      type: path
      basename: true
      exact: nfapi.dll
      case_insensitive: true
composite_rules:
  - id: netch-component
    desc: Netch network proxy component
    crit: component
    conf: 0.98
    any:
      - id: well-known/tool/sysadmin/netch
