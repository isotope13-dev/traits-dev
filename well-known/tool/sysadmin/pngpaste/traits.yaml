defaults:
  platforms: [macos]
  for: [macho]
  crit: baseline
  conf: 0.98
  size_min: 1000
  size_max: 100000

traits:
  - id: pngpaste-basename
    desc: pngpaste executable basename
    crit: component
    if:
      type: path
      basename: true
      exact: pngpaste

  - id: pngpaste-function
    desc: pngpaste pasteboard function
    crit: component
    if:
      type: symbol
      exact: getPasteboardImageData

composite_rules:
  - id: pngpaste-helper
    desc: pngpaste clipboard image utility
    crit: notable
    all:
      - id: pngpaste-basename
      - id: pngpaste-function
      - id: micro-behaviors/os/clipboard/access::macos-nspasteboard-class
