# Repository Maintenance Tools
# Detects scripts used for maintaining code repositories
defaults:
  platforms: [unix, windows]
  for: [shell, python, ruby, javascript]
traits:
  # jq/sed/awk are generic text-processing utilities — relocated to
  # micro-behaviors/data/text/cli-tool. The github-issue-maintenance composite
  # below references them cross-tier.
  - id: git-operations-1
    size_min: 512
    size_max: 500000000
    desc: Git ops (clone/pull/push/commit)
    if:
      type: string_literal
      regex: '\bgit (clone|pull|push|commit)\b'
  - id: git-operations-2
    size_min: 512
    size_max: 500000000
    desc: Git ops (add/status/remote/checkout)
    if:
      type: string_literal
      regex: '\bgit (add|status|remote|checkout)\b'
  - id: hg-operations-1
    size_min: 512
    size_max: 500000000
    desc: Mercurial ops (init/log/status/diff)
    if:
      type: string_literal
      regex: '\bhg (init|log|status|diff)\b'
  - id: hg-operations-2
    size_min: 512
    size_max: 500000000
    desc: Mercurial ops (bookmarks/revert/add/forget)
    if:
      type: string_literal
      regex: '\bhg (bookmarks|revert|add|forget)\b'
  - id: hg-operations-3
    size_min: 512
    size_max: 500000000
    desc: Mercurial ops (commit/ci)
    if:
      type: string_literal
      regex: '\bhg (commit|ci)\b'
composite_rules:
  - id: git-operations
    size_min: 512
    size_max: 500000000
    desc: Git repository operations
    crit: baseline
    any:
      - id: git-operations-1
      - id: git-operations-2
  - id: hg-operations
    size_min: 512
    size_max: 500000000
    desc: Mercurial repository operations
    crit: baseline
    any:
      - id: hg-operations-1
      - id: hg-operations-2
      - id: hg-operations-3
  - id: github-issue-maintenance
    size_min: 512
    size_max: 500000000
    desc: GitHub issue maintenance script
    crit: notable
    all:
      - id: micro-behaviors/communications/http/services/github::gh-issue-mgmt
    any:
      - id: micro-behaviors/data/text/cli-tool::jq-processing
      - id: micro-behaviors/data/text/cli-tool::sed-processing
      - id: micro-behaviors/data/text/cli-tool::awk-processing
