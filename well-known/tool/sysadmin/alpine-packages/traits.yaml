defaults:
  platforms: [unix, windows]
  for: [elf, javascript, ruby, python, shell, apk]
  size_max: 400000000
traits:
  - id: alpine-apk-scripts-db
    desc: Alpine APK scripts database archive basename
    crit: notable
    conf: 0.98
    for: [tar]
    if:
      type: basename
      exact: scripts.tar
  - id: alpine-buildah-binary
    desc: Alpine Buildah package binary
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)usr[\\/]bin[\\/]buildah$'
  - id: buildah-binary-name
    desc: Buildah executable basename
    crit: baseline
    conf: 0.98
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      exact: buildah
  - id: alpine-juicefs-binary
    desc: Alpine JuiceFS package binary
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)usr[\\/]bin[\\/]juicefs$'
  - id: juicefs-binary-name
    desc: JuiceFS executable basename
    crit: baseline
    conf: 0.98
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      exact: juicefs
  - id: alpine-datadog-agent-binary
    desc: Alpine Datadog Agent package binary
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)datadog-agent[\\/]bin[\\/]agent$'
  - id: alpine-datadog-agent-package
    desc: Alpine Datadog Agent package
    crit: baseline
    conf: 0.98
    for: [python, elf, apk]
    if:
      type: path
      regex: '(?i)datadog-agent-.{1,40}\.apk'
  - id: alpine-datadog-operator-binary
    desc: Alpine Datadog Operator binary
    crit: notable
    conf: 0.98
    for: [elf]
    size_min: 10485760
    if:
      type: basename
      exact: manager
  - id: alpine-neuvector-scanner-binary
    desc: Alpine NeuVector scanner binary
    crit: notable
    conf: 0.98
    for: [elf]
    size_min: 10485760
    if:
      type: basename
      exact: scanner
  - id: alpine-neuvector-scanner-task-binary
    desc: Alpine NeuVector scanner task binary
    crit: notable
    conf: 0.98
    for: [elf]
    size_min: 10485760
    if:
      type: basename
      exact: scannerTask
  - id: alpine-redpanda-binary
    desc: Alpine Redpanda binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: redpanda
  - id: alpine-ollama-binary
    desc: Alpine Ollama binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: ollama
  - id: alpine-filebrowser-binary
    desc: Alpine Filebrowser binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: filebrowser
  - id: alpine-calico-felix-binary
    desc: Alpine Calico Felix binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: felix
  - id: alpine-minio-client-binary
    desc: Alpine MinIO client binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: mc
  - id: alpine-buck2-binary
    desc: Alpine Buck2 binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: buck2
  - id: alpine-grafana-tempo-binary
    desc: Alpine Grafana Tempo binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: tempo
  - id: alpine-grafana-pyroscope-binary
    desc: Alpine Grafana Pyroscope binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: pyroscope
  - id: alpine-grafana-pyroscope-profilecli
    desc: Alpine Grafana Pyroscope profilecli binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: profilecli
  - id: alpine-gitlab-runner-helper-binary
    desc: Alpine GitLab Runner helper binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: gitlab-runner-helper
  - id: alpine-kuma-cp-binary
    desc: Alpine Kuma control-plane binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: kuma-cp
  - id: alpine-flux-image-automation-controller-binary
    desc: Alpine Flux image automation controller binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: text
      regex: '(?i)fluxcd/image-automation-controller'
      section: .rodata
  - id: alpine-cargo-c-binary
    desc: Alpine cargo-c binary
    crit: notable
    conf: 0.98
    for: [elf]
    if:
      type: basename
      regex: '^cargo-c(api|build|install|test)$'
  - id: alpine-doctest-source
    desc: Alpine doctest source package content
    crit: notable
    conf: 0.98
    for: [c, cpp, source, elf]
    if:
      type: path
      regex: '(?i)doctest.{0,240}'
  - id: alpine-rook-oci-package
    desc: Alpine Rook OCI compat package
    crit: notable
    conf: 0.98
    for: [archive, apk]
    if:
      type: basename
      regex: '^rook-oci-compat-[0-9][^\\/]*\.apk$'
  - id: alpine-libcxx-header
    desc: Alpine libc++ header
    crit: notable
    conf: 0.98
    for: [javascript]
    if:
      type: basename
      exact: variant
  - id: alpine-datadog-gitlab-projects-py
    desc: Alpine Datadog GitLab projects module
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      regex: '(?i)datadog-agent.*projects\.py$'
  - id: basename-projects-py
    desc: projects.py basename
    crit: baseline
    conf: 0.98
    for: [python]
    if:
      type: path
      basename: true
      exact: projects.py
  - id: alpine-octo-sts-binary
    desc: Alpine octo-sts package binary
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)usr[\\/]bin[\\/]octo-sts$'
  - id: octo-sts-binary-name
    desc: octo-sts executable basename
    crit: baseline
    conf: 0.98
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      exact: octo-sts
  - id: alpine-parseable-binary
    desc: Alpine Parseable server package binary
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)usr[\\/]bin[\\/]parseable$'
  - id: parseable-binary-name
    desc: Parseable executable basename
    crit: baseline
    conf: 0.98
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      exact: parseable
  - id: alpine-telegraf-binary
    desc: Alpine Telegraf package binary
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)usr[\\/]bin[\\/]telegraf$'
  - id: alpine-telegraf-member-binary
    desc: Alpine Telegraf package member
    crit: baseline
    conf: 0.98
    for: [elf]
    if:
      type: path
      regex: '(?i)telegraf-.*usr[\\/]bin[\\/]telegraf$'
  - id: telegraf-binary-name
    desc: Telegraf executable basename
    crit: baseline
    conf: 0.98
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      exact: telegraf
  - id: alpine-policy-controller-binary
    desc: Alpine Policy Controller package binary
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)usr[\\/]bin[\\/]policy-controller$'
  - id: policy-controller-binary-name
    desc: Policy Controller executable basename
    crit: baseline
    conf: 0.98
    for: [elf, macho, pe]
    if:
      type: path
      basename: true
      exact: policy-controller
  - id: alpine-dkron-gcppubsub-executor
    desc: Alpine Dkron GCP Pub/Sub executor
    crit: baseline
    conf: 0.98
    for: [elf]
    if:
      type: path
      basename: true
      exact: dkron-executor-gcppubsub
  - id: alpine-ansible-core-package
    desc: Alpine Ansible core package
    crit: notable
    conf: 0.98
    for: [python, pyc, powershell, shell, csharp, apk]
    if:
      type: path
      regex: '(?i)site-packages[\\/](ansible|ansible_test)[\\/]'
  - id: alpine-apicurio-registry-ui-package
    desc: Alpine Apicurio Registry UI package
    crit: notable
    conf: 0.98
    for: [javascript, pe, dll, apk]
    if:
      type: path
      regex: '(?i)apicurio-registry-ui-[^\\/]+\.apk[\\/]'
  - id: alpine-java-server-package
    desc: Alpine Java server package
    crit: notable
    conf: 0.98
    for: [apk, jar, javascript]
    if:
      type: path
      regex: '(?i)(apache-nifi-registry-toolkit|cassandra|apache-pulsar)'
  - id: alpine-google-cloud-sdk-package
    desc: Alpine Google Cloud SDK package
    crit: notable
    conf: 0.98
    for: [python, apk]
    if:
      type: path
      regex: '(?i)google-cloud-sdk'
  - id: alpine-langfuse-package
    desc: Alpine Langfuse package
    crit: notable
    conf: 0.98
    for: [javascript, package.json, apk]
    if:
      type: path
      regex: '(?i)langfuse-3-[^\\/]+\.apk[\\/]'
  - id: alpine-langfuse-next-app-path
    desc: Alpine Langfuse Next.js app path
    crit: notable
    conf: 0.98
    for: [javascript, package.json]
    if:
      type: path
      regex: '(?i)web[\\/]\\.next'
  - id: datadog-libdatadog-package-json
    desc: Datadog libdatadog package manifest
    crit: notable
    conf: 0.98
    for: [package.json]
    if:
      type: path
      regex: '(?i)@datadog[\\/]libdatadog[\\/]package\.json$'
  - id: datadog-libdatadog-package-name
    desc: Datadog libdatadog package name
    crit: notable
    conf: 0.98
    for: [package.json]
    if:
      type: value
      path: name
      exact: "@datadog/libdatadog"
  - id: datadog-libdatadog-description
    desc: Datadog libdatadog package description
    crit: notable
    conf: 0.98
    for: [package.json]
    if:
      type: value
      path: description
      exact: Node.js binding for libdatadog
  - id: alpine-sftpgo-package
    desc: Alpine SFTPGo package
    crit: notable
    conf: 0.98
    for: [javascript, apk]
    if:
      type: path
      regex: '(?i)sftpgo-[^\\/]+\.apk[\\/]'
  - id: alpine-sftpgo-static-path
    desc: Alpine SFTPGo static asset path
    crit: notable
    conf: 0.98
    for: [javascript]
    if:
      type: path
      regex: '(?i)share[\\/]sftpgo'
  - id: alpine-homebrew-package
    desc: Alpine Homebrew package archive
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)brew-[0-9][^\\/]*\.apk$'
  - id: homebrew-shims-path
    desc: Homebrew shims path
    crit: baseline
    conf: 0.98
    for: [shell]
    if:
      type: path
      regex: '(?i)Homebrew[\\/]shims[\\/]'
  - id: alpine-infinispan-console-bundle
    desc: Alpine Infinispan console JavaScript bundle
    crit: baseline
    conf: 0.98
    if:
      type: path
      regex: '(?i)console[\\/]main\.bundle\.js$'
  - id: infinispan-console-webpack-bundle
    desc: Infinispan console webpack bundle marker
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: webpackChunkinfinispan_console
composite_rules:
  - id: alpine-datadog-agent-python-client
    desc: Alpine Datadog embedded Python client
    crit: baseline
    conf: 0.98
    all:
      - id: alpine-datadog-agent-package
      - id: basename-projects-py
  - id: datadog-libdatadog-package
    desc: Datadog libdatadog package
    crit: notable
    conf: 0.98
    all:
      - id: datadog-libdatadog-package-name
      - id: datadog-libdatadog-description
  - id: alpine-homebrew-shim-script
    desc: Alpine Homebrew shim script
    crit: baseline
    conf: 0.98
    all:
      - id: alpine-homebrew-package
      - id: homebrew-shims-path
  - id: alpine-datadog-agent
    desc: Alpine Datadog Agent package
    crit: notable
    conf: 0.98
    any:
      - id: alpine-datadog-agent-binary
      - id: alpine-datadog-agent-package
      - id: alpine-datadog-gitlab-projects-py
      - id: alpine-datadog-agent-python-client
  - id: alpine-infinispan-console
    desc: Alpine Infinispan console bundle
    crit: notable
    conf: 0.98
    any:
      - id: alpine-infinispan-console-bundle
      - id: infinispan-console-webpack-bundle
  - id: alpine-cloud-native-tool-binary
    desc: Alpine cloud-native sysadmin tool binary
    crit: notable
    conf: 0.98
    any:
      - id: alpine-buildah-binary
      - id: buildah-binary-name
      - id: alpine-juicefs-binary
      - id: juicefs-binary-name
      - id: alpine-octo-sts-binary
      - id: octo-sts-binary-name
      - id: alpine-parseable-binary
      - id: parseable-binary-name
      - id: alpine-policy-controller-binary
      - id: policy-controller-binary-name
      - id: alpine-dkron-gcppubsub-executor
      - id: alpine-telegraf-binary
      - id: alpine-telegraf-member-binary
      - id: telegraf-binary-name
