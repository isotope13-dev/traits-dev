# Identity for the legitimate X.Org xinput diagnostic utility.  Its XI2 event
# test mode necessarily resembles global input collection, so the identity is
# used only as benign context by the native X11 key-capture objective.
defaults:
  platforms: [unix]
  for: [elf]
  size_min: 4096
  size_max: 2000000

traits:
  - id: executable-basename
    desc: xinput diagnostic executable basename
    crit: notable
    conf: 0.99
    if:
      type: path
      basename: true
      exact: xinput

  - id: version-banner
    desc: xinput utility version banner
    crit: notable
    conf: 0.99
    if:
      type: text
      section: .rodata
      regex: '\bxinput version\s+%s\b'

  - id: xi2-extension-marker
    desc: XInput extension diagnostic marker
    crit: notable
    conf: 0.98
    if:
      type: text
      section: .rodata
      substr: XInputExtension

composite_rules:
  - id: xinput-diagnostic-utility
    desc: Recognized xinput XI2 diagnostic utility
    crit: exception
    conf: 0.99
    all:
      - id: executable-basename
      - id: version-banner
      - id: xi2-extension-marker
