defaults:
  platforms:
  - windows
  for:
  - pe
  size_max: 5000000
traits:
- id: tablediff-overlay-binary
  desc: Embedded tablediff.exe overlay marker
  crit: component
  conf: 0.99
  size_min: 80000
  size_max: 160000
  if:
    type: text
    exact: tablediff.exe
    section: rdata
- id: sql-diff-tool-banner
  desc: SQL Server diff tool banner
  crit: component
  conf: 0.99
  size_min: 80000
  size_max: 160000
  if:
    type: text
    exact: Replication Diff Tool Command Line Options
    section: rdata
