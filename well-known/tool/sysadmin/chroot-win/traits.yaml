defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp, archive]
  crit: component
  conf: 0.98
  size_max: 100000000
traits:
  - id: chroot-release-archive
    desc: Windows chroot release archive
    if:
      type: path
      basename: true
      exact: chroot.7z
      case_insensitive: true
  - id: chroot-helper-library
    desc: Windows chroot helper DLL
    if:
      type: path
      basename: true
      regex: '(?i)^ChrootHelp(64)?\.dll$'
      case_insensitive: true
  - id: chroot-helper-process
    desc: Windows chroot helper process
    if:
      type: path
      basename: true
      regex: '(?i)^HelperProcess(64)?\.exe$'
      case_insensitive: true
  - id: chroot-main-executable
    desc: Windows chroot main executable
    if:
      type: path
      basename: true
      regex: '(?i)^Chroot(64)?\.exe$'
      case_insensitive: true
  - id: chroot-helper-source
    desc: Windows chroot helper source
    if:
      type: path
      regex: '(?i)src[\\/]HelperProcess[\\/]'
  - id: chroot-shared-memory-source
    desc: Windows chroot shared memory source
    if:
      type: path
      regex: '(?i)src[\\/]shmem\.cpp$'
composite_rules:
  - id: chroot-windows-component
    desc: Windows chroot component
    crit: notable
    any:
      - id: well-known/tool/sysadmin/chroot-win::chroot-helper-library
      - id: well-known/tool/sysadmin/chroot-win::chroot-helper-process
      - id: well-known/tool/sysadmin/chroot-win::chroot-main-executable
      - id: well-known/tool/sysadmin/chroot-win::chroot-helper-source
      - id: well-known/tool/sysadmin/chroot-win::chroot-release-archive
      - id: well-known/tool/sysadmin/chroot-win::chroot-shared-memory-source
