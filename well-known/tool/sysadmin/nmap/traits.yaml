defaults:
  platforms: [windows, unix]
  for: [kotlin, lua, python, shell, php, perl, c, cpp, source, scripts, archives]
  crit: notable
  conf: 0.96
  size_max: 1000000

traits:
  - id: nmap-source-tree-path
    crit: notable
    desc: Nmap source tree path
    size_max: 300000000
    if:
      type: path
      regex: 'nmap-[0-9][^\\/]*'

  - id: nmap-nse-script-path
    crit: notable
    desc: Nmap NSE script path
    if:
      type: path
      regex: 'scripts[\\/][A-Za-z0-9_-]+\.nse$'

composite_rules:
  - id: nmap-source-tree
    desc: Nmap network scanner source tree
    crit: notable
    conf: 0.99
    any:
      - id: nmap-source-tree-path
      - id: nmap-nse-script-path
