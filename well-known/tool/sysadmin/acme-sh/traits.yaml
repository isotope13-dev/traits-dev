defaults:
  platforms: [unix]
  for: [shell, json]

traits:
  - id: acme-sh-project-marker
    desc: acme.sh project source marker
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: text
      regex: 'github\.com/acmesh-official/acme\.sh|acme\.sh --(issue|deploy|install)'
  - id: acme-sh-base64-helper
    desc: acme.sh base64 helper implementation
    crit: notable
    conf: 0.99
    for: [shell]
    if:
      type: text
      regex: '(?m)^_dbase64\(\)'
composite_rules:
  - id: acme-sh-main-script-context
    desc: acme.sh main script benign context
    crit: exception
    conf: 0.99
    all:
      - id: acme-sh-project-marker
      - id: acme-sh-base64-helper
