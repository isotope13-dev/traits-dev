# startpar — insserv's parallel SysV-init boot sequencer (Debian/Ubuntu).
#
# It runs /etc/init.d scripts concurrently at boot, allocating a PTY for each
# managed child so the boot splash can render its console output, and it opens
# an abstract unix socket to bridge Upstart runlevel events. That combination —
# PTY allocation (grantpt/unlockpt/ptsname) + terminal control (tcsetattr) +
# an outbound/bound socket + exec of the init scripts — is exactly the shape
# the generic PTY-backdoor composites look for, so stock startpar false-positives
# as an interactive PTY implant on every sysvinit-based image.
#
# It is GPL, ships in the `insserv` package, and is publicly attributable. These
# identity traits let the PTY-backdoor objectives except its own tree without
# weakening the generic detection.
defaults:
  platforms: [linux]
  for: [elf]
  size_max: 200000

traits:
  - id: startpar-version-banner
    desc: startpar version banner string
    crit: component
    conf: 0.98
    if:
      type: text
      section: .rodata
      substr: startpar version %s

  - id: startpar-usage-text
    desc: startpar command-line usage text
    crit: component
    conf: 0.98
    if:
      type: text
      section: .rodata
      substr: 'usage: startpar [options]'

  - id: startpar-upstart-bridge
    desc: startpar Upstart event bridge socket name
    crit: component
    conf: 0.98
    if:
      type: text
      section: .rodata
      substr: upstart_startpar_bridge

  - id: startpar-runlevel-mode
    desc: startpar previous/next runlevel option help
    crit: component
    conf: 0.95
    if:
      type: text
      section: .rodata
      substr: '[-P prev] [-R run]'

composite_rules:
  # Two independent markers required so a lone mention (a package that merely
  # references startpar) never trips the exception.
  - id: startpar-boot-tool
    desc: insserv startpar parallel boot sequencer
    crit: notable
    conf: 0.99
    any:
      - id: startpar-version-banner
      - id: startpar-usage-text
      - id: startpar-upstart-bridge
      - id: startpar-runlevel-mode
    needs: 2
