defaults:
  platforms:
  - unix
  - android
  - windows
  for:
  - elf
  - shell
  - pe
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: busybox-reference
  desc: BusyBox utility referenced by name
  crit: baseline
  conf: 0.6
  for:
  - elf
  - shell
  size_min: 512
  size_max: 500000000
  if:
    type: text
    word: busybox
    case_insensitive: true
- id: busybox-binary
  desc: BusyBox multi-call binary signature
  size_min: 10000
  for:
  - elf
  - shell
  if:
    type: text
    substr: BusyBox is a multi-call binary
- id: mingit-busybox-basename
  desc: Git for Windows MinGit BusyBox binary
  size_min: 10000
  size_max: 1048576
  if:
    type: path
    basename: true
    regex: "(?i)MinGit-[^-]+-busybox-.*\\.(zip|exe)$"
