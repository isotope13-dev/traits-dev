defaults:
  platforms:
  - unix
  - android
  - windows
  for:
  - elf
  - shell
  - pe
  - zip
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: busybox-reference
  desc: BusyBox utility referenced by name
  crit: baseline
  conf: 0.6
  for:
  - elf
  - shell
  size_min: 512
  size_max: 500000000
  if:
    type: text
    word: busybox
    case_insensitive: true
- id: busybox-banner
  desc: BusyBox multi-call binary signature
  size_min: 10000
  for:
  - elf
  - shell
  if:
    type: text
    substr: BusyBox is a multi-call binary
- id: busybox-main-symbol
  desc: BusyBox main dispatcher symbol
  crit: component
  conf: 0.95
  for: [elf]
  if:
    type: symbol
    exact: busybox_main
- id: busybox-applet-dispatch-symbol
  desc: BusyBox applet dispatch symbol
  crit: component
  conf: 0.95
  for: [elf]
  if:
    type: symbol
    exact: run_applet_by_name
- id: busybox-applet-table-symbol
  desc: BusyBox applet table symbol
  crit: component
  conf: 0.95
  for: [elf]
  if:
    type: symbol
    exact: applets
- id: mingit-busybox-basename
  desc: Git for Windows MinGit BusyBox binary
  crit: notable
  for:
  - pe
  - zip
  size_min: 10000
  size_max: 1048576
  if:
    type: path
    basename: true
    regex: "(?i)MinGit-[^-]+-busybox-.*\\.(zip|exe)$"
- id: proxy-lookup-basename
  desc: proxy-lookup.exe basename
  crit: baseline
  size_min: 10000
  size_max: 1048576
  for:
  - pe
  if:
    type: path
    basename: true
    exact: proxy-lookup.exe
composite_rules:
- id: busybox-symbol-cluster
  desc: BusyBox dispatcher and applet symbols
  crit: baseline
  conf: 0.98
  for: [elf]
  all:
    - id: busybox-main-symbol
    - id: busybox-applet-dispatch-symbol
    - id: busybox-applet-table-symbol
- id: busybox-binary
  desc: BusyBox multi-call binary signature
  crit: baseline
  conf: 0.98
  for: [elf, shell]
  any:
    - id: busybox-banner
    - id: busybox-symbol-cluster
- id: mingit-proxy-lookup-helper
  desc: Git for Windows proxy lookup helper
  crit: notable
  conf: 0.96
  for:
  - pe
  all:
  - id: proxy-lookup-basename
  - id: metadata/binary/framework::mingw-libgcc-runtime
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-open
