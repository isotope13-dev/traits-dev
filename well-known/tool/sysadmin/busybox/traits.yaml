# BusyBox identification — legitimate multi-call Unix utility suite
defaults:
  platforms: [unix, android, windows]
  for: [elf, shell, pe]
  crit: baseline
  conf: 0.95
traits:
  - id: busybox-binary
    desc: BusyBox multi-call binary signature
    size_min: 10000
    for: [elf, shell]
    if:
      type: text
      substr: "BusyBox is a multi-call binary"
  - id: mingit-busybox-basename
    desc: Git for Windows MinGit BusyBox binary
    size_min: 10000
    size_max: 1048576
    if:
      type: path
      basename: true
      regex: '(?i)MinGit-[^-]+-busybox-.*\.(zip|exe)$'
