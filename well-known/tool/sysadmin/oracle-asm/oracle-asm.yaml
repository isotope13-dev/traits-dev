defaults:
  platforms: [windows]
  for: [pe]
  size_min: 50000
  size_max: 75000

traits:
  - id: oracle-asm-context-string
    desc: Oracle ASM context string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "ASMTOOLG_CTX"
      section: .data

  - id: oracle-asm-scontext-string
    desc: Oracle ASM SCTX string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "ASMTOOLG_SCTX"
      section: .data

  - id: oracle-asm-wizard-string
    desc: Oracle ASM wizard dialog string
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "This wizard will step through the process of configuring new disks for use in an Automatic Storage Management (ASM) disk group."
      section: .data

  - id: oracle-asm-imr-dll
    desc: ORAIMR10.DLL library import/string
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "ORAIMR10.DLL"
      section: .data

composite_rules:
  - id: oracle-asm-configuration-tool
    desc: Oracle Automatic Storage Management (ASM) Configuration Tool
    crit: notable
    conf: 0.99
    all:
      - id: oracle-asm-context-string
      - id: oracle-asm-scontext-string
      - id: oracle-asm-wizard-string
      - id: oracle-asm-imr-dll