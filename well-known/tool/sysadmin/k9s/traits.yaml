defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - elf
  - macho
  - pe
  crit: baseline
  conf: 0.95
  size_max: 5000000
traits:
- id: release-prefix
  desc: k9s release basename prefix
  size_min: 1
  size_max: 1073741824
  crit: component
  conf: 0.98
  if:
    type: path
    basename: true
    regex: "(?i)(^|[\\\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?$"
    case_insensitive: true
- id: release-exe
  desc: k9s release executable basename
  size_min: 1
  size_max: 1073741824
  crit: component
  conf: 0.98
  if:
    type: path
    basename: true
    regex: "(?i)(^|[\\\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?\\.exe$"
    case_insensitive: true
- id: release-zip
  desc: k9s zip release basename
  size_min: 1
  size_max: 1073741824
  crit: component
  conf: 0.98
  for:
  - zip
  if:
    type: path
    basename: true
    regex: "(?i)(^|[\\\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?\\.zip$"
    case_insensitive: true
- id: release-tar
  desc: k9s tar release basename
  size_min: 1
  size_max: 1073741824
  crit: component
  conf: 0.98
  for:
  - tar
  if:
    type: path
    basename: true
    regex: "(?i)(^|[\\\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?\\.(tar|tgz|tar\\.gz)$"
    case_insensitive: true
