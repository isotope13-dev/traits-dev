defaults:
  platforms: [linux, macos, windows]
  for: [binaries, elf, macho, pe, tar]
  crit: baseline
  conf: 0.95

traits:
  - id: release-prefix
    desc: k9s release basename prefix
    size_min: 1
    size_max: 1073741824
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: (?i)(^|[\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?$
      case_insensitive: true
  - id: release-exe
    desc: k9s release executable basename
    size_min: 1
    size_max: 1073741824
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: (?i)(^|[\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?\.exe$
      case_insensitive: true
  - id: release-zip
    desc: k9s zip release basename
    size_min: 1
    size_max: 1073741824
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: (?i)(^|[\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?\.zip$
      case_insensitive: true
  - id: release-tar
    desc: k9s tar release basename
    size_min: 1
    size_max: 1073741824
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: (?i)(^|[\\/])k9s([_-]v?[0-9][A-Za-z0-9._-]*)?\.(tar|tgz|tar\.gz)$
      case_insensitive: true
composite_rules:
  - id: release-path
    desc: k9s release package path marker
    crit: baseline
    conf: 0.95
    any:
      - id: release-prefix
      - id: release-exe
      - id: release-zip
      - id: release-tar
