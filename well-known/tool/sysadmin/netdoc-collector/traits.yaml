# NetDoc Collector is a benign network-inventory and documentation utility.
# Its SSH probing and port checks are product functionality, not brute force.
defaults:
  platforms: [linux, macos, windows]
  for: [pkginfo, python]
  crit: notable
  conf: 0.99

traits:
  - id: package-name
    desc: NetDoc Collector Python package metadata name
    for: [pkginfo]
    if:
      type: value
      path: name
      exact: netdoc-collector

  - id: package-path
    desc: NetDoc Collector Python package member path
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])netdoc_collector([\\/]|$)'

  - id: product-marker
    desc: NetDoc Collector product identity marker
    for: [python]
    if:
      type: text
      regex: 'netdoc_plugin|netdoc_collector\.|NetDoc [Cc]ollector'

composite_rules:
  - id: netdoc-collector-library
    desc: Recognized NetDoc Collector network-inventory package context
    crit: exception
    conf: 0.99
    scope: archive
    all:
      - id: package-path
      - id: product-marker
