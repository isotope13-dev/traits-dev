defaults:
  size_max: 52428800
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: sandboxie-product-marker
  desc: Sandboxie product marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Sandboxie
    section: rsrc
- id: sbie-component-marker
  desc: Sandboxie component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bSbie(Dll|Svc|Drv)\b
    section: rdata
- id: sandboxie-component-basename
  desc: Sandboxie component filename
  crit: component
  conf: 0.95
  if:
    type: path
    basename: true
    regex: '(?i)^(Sbie|Sandboxie|Sbox)'
- id: sandboxie-helper-basename
  desc: Sandboxie helper filename
  crit: component
  conf: 0.95
  if:
    type: path
    basename: true
    regex: '(?i)^(Sandboxie|SboxHostDll)'
- id: sandboxie-sbie-basename
  desc: Sandboxie Sbie component filename
  crit: component
  conf: 0.95
  if:
    type: path
    basename: true
    regex: '(?i)^Sbie[A-Za-z]{3,12}\.(exe|dll|sys)$'
- id: sandboxie-lowlevel-pdb
  desc: Sandboxie low-level PDB path
  crit: component
  conf: 0.98
  if:
    type: text
    substr: \Sandboxie\core\low\obj\
    section: rdata
- id: sandboxie-source-marker--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - c
  - cpp
  - javascript
  - batch
  platforms:
  - windows
  - unix
  if:
    type: text
    substr: Sandboxie
  count_max: 1004167
- id: sandboxie-source-marker--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - c
  - cpp
  - javascript
  - batch
  platforms:
  - windows
  - unix
  if:
    type: text
    substr: QSbieAPI
  count_max: 1004168
- id: sandboxie-source-marker--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - c
  - cpp
  - javascript
  - batch
  platforms:
  - windows
  - unix
  if:
    type: text
    substr: SandMan
  count_max: 1004169
- id: sandboxie-source-path
  desc: Sandboxie source archive path
  crit: component
  conf: 0.95
  platforms:
  - windows
  - unix
  for:
  - c
  - cpp
  - javascript
  - batch
  if:
    type: path
    regex: '(^|[\\/])Sandboxie-[0-9].{0,40}[\\/]'
composite_rules:
- id: sandboxie-component
  desc: Sandboxie binary or source component marker
  crit: baseline
  conf: 0.95
  platforms:
  - windows
  - unix
  for:
  - pe
  - dll
  - c
  - cpp
  - javascript
  - batch
  any:
  - id: sandboxie-product-marker
  - id: sbie-component-marker
  - id: sandboxie-component-basename
  - id: sandboxie-helper-basename
  - id: sandboxie-sbie-basename
  - id: sandboxie-lowlevel-pdb
  - id: sandboxie-source-marker
  - id: sandboxie-source-path
- id: signed-sandboxie-component
  desc: Signed Sandboxie component marker
  crit: component
  conf: 0.98
  all:
  - id: sandboxie-component
  - id: metadata/signed/developer::tonalio-gmbh
- id: sandboxie-source-marker
  desc: Sandboxie source code marker
  crit: component
  conf: 0.95
  for:
  - c
  - cpp
  - javascript
  - batch
  platforms:
  - windows
  - unix
  any:
  - id: sandboxie-source-marker--rx-1
  - id: sandboxie-source-marker--rx-2
  - id: sandboxie-source-marker--rx-3
