defaults:
  platforms: [openwrt, unix]
  for: [lua, shell]
  size_max: 200000

traits:
  - id: passwall-source-path
    desc: OpenWrt Passwall source path
    crit: baseline
    conf: 0.99
    if:
      type: path
      regex: 'openwrt-passwall|luci-app-passwall'

  - id: passwall-config-name
    desc: OpenWrt Passwall config name
    crit: baseline
    conf: 0.95
    if:
      type: text
      word: passwall

composite_rules:
  - id: openwrt-passwall-source
    desc: OpenWrt Passwall source file
    crit: notable
    conf: 0.99
    any:
      - id: passwall-source-path
      - id: passwall-config-name
