defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1024
  size_max: 10485760

traits:
  - id: ripgrep-project-homepage
    desc: ripgrep project homepage
    crit: notable
    conf: 0.95
    if:
      type: hex
      pattern: "42 75 72 6e 74 53 75 73 68 69 2f 72 69 70 67 72 65 70"
      section: .rdata
  - id: ripgrep-source-path
    desc: ripgrep source path marker
    crit: notable
    conf: 0.95
    if:
      type: hex
      pattern: "44 3a 5c 61 5c 72 69 70 67 72 65 70 5c 72 69 70 67 72 65 70 5c 63 72 61 74 65 73"
      section: .rdata

composite_rules:
  - id: ripgrep-tool
    desc: ripgrep search utility
    crit: notable
    conf: 0.95
    any:
      - id: ripgrep-project-homepage
      - id: ripgrep-source-path
