defaults:
  platforms: [windows, unix]
  for: [powershell, nupkg]

traits:
  - id: cdp-project-switcher-name
    desc: cdp project switcher name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'cdp - A fast project directory switcher'

  - id: cdp-fzf-preview-helper
    desc: cdp fzf preview helper
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'cdp-fzf-\$PID[\s\S]{0,900}preview\.ps1[\s\S]{0,900}\{1\}'

composite_rules:
  - id: cdp-project-switcher
    desc: cdp project switcher tool
    crit: notable
    conf: 0.95
    all:
      - id: cdp-project-switcher-name
      - id: cdp-fzf-preview-helper
