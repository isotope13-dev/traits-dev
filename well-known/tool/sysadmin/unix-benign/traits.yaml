defaults:
  platforms: [linux, openbsd, bsd]
  for: [elf]
  crit: notable
  conf: 0.96
traits:
  - id: openbsd-cloud-agent
    crit: notable
    desc: OpenBSD cloud-agent binary
    size_min: 100000
    size_max: 20000000
    if:
      type: path
      regex: '(^|[\\/])libexec[\\/]cloud-agent$'
  - id: sudo-noexec-library
    crit: notable
    desc: sudo noexec library
    size_min: 1000
    size_max: 200000
    if: {type: basename, exact: sudo_noexec.so}
  - id: sudo-intercept-library
    crit: notable
    desc: sudo intercept preload library
    size_min: 1000
    size_max: 200000
    if: {type: basename, exact: sudo_intercept.so}
  # The sudo binary itself: PTY monitoring (use_pty) plus setuid exec trips
  # reverse-shell/PTY composites. Identify it by sudo's .rodata version banner.
  - id: sudo-main-binary
    crit: notable
    desc: sudo privilege-escalation binary
    size_min: 50000
    size_max: 5000000
    if:
      type: text
      section: .rodata
      substr: 'Sudo version %s'
  - id: sudo-noexec-intercept-source
    crit: notable
    desc: sudo noexec/intercept source file
    for: [c, cpp, source]
    if:
      type: path
      regex: 'sudo_(noexec|intercept)\.c$'
  - id: grub-i386-kernel-image
    crit: notable
    desc: GRUB i386 kernel image
    size_min: 10000
    size_max: 2000000
    if: {type: basename, exact: kernel.img}
  - id: emacs-tramp-native-eln
    crit: notable
    desc: Emacs TRAMP native eln
    for: [elf, go, macho]
    size_min: 10000
    size_max: 5000000
    if:
      type: path
      regex: 'tramp-sh-[0-9a-f-]+\.eln$'
  - id: restic-rest-server
    crit: notable
    desc: restic rest-server binary
    size_min: 1000000
    size_max: 100000000
    if: {type: basename, exact: rest-server}
  - id: casaos-binary
    crit: notable
    desc: CasaOS binary
    size_min: 1000000
    size_max: 100000000
    if: {type: basename, exact: casaos}
  - id: kernelsu-daemon
    crit: notable
    desc: KernelSU daemon binary
    size_min: 1000000
    size_max: 100000000
    if:
      type: path
      regex: 'ksud-(x86_64|aarch64)-unknown-linux-musl$'
  - id: flipper-firmware-elf
    crit: notable
    desc: Flipper firmware ELF
    size_min: 100000
    size_max: 20000000
    if: {type: basename, exact: firmware.elf}
  - id: snappy-java-sunos
    crit: notable
    desc: Snappy Java SunOS JNI library
    size_min: 10000
    size_max: 500000
    if: {type: basename, exact: libsnappyjava.so}

composite_rules:
  # Stock shells and privileged system tools legitimately combine socket + PTY
  # + exec (socat relays, gawk coprocesses, sudo command monitoring, startpar
  # boot-time console multiplexing). Grouping them lets backdoor/PTY composites
  # cite one exception instead of many leaves. (busybox/musl/libc are baseline,
  # not notable, so they can't join an exception's any: and stay listed
  # separately by the referencing composites.)
  - id: benign-native-shell-tools
    desc: Stock shells and privileged system tools
    crit: exception
    conf: 0.99
    any:
      - id: sudo-main-binary
      - id: sudo-intercept-library
      - id: sudo-noexec-library
      - id: well-known/tool/sysadmin/network::socat-utility
      - id: well-known/tool/development/gnu-awk::gawk-binary
      - id: well-known/tool/sysadmin/startpar::startpar-boot-tool
