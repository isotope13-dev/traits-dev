defaults:
  platforms: [windows]
  for: [pe]
  size_min: 200000
  size_max: 900000
traits:
  - id: accessenum-pdb-path-marker
    desc: AccessEnum PDB path marker
    crit: component
    conf: 0.98
    if:
      type: kv
      path: debug.pdb_path
      regex: (?i)(^|[\\/])AccessEnum\.pdb$
  - id: sysinternals-accessenum-regpath
    desc: Sysinternals AccessEnum registry path
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Software\Sysinternals\AccessEnum
      section: rdata
