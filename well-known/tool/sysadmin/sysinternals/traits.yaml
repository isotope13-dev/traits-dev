defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: sysinternals-tool
    desc: Sysinternals tool self-identification
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Sysinternals
      section: .rsrc
  - id: sysinternals-sdelete-usage
    desc: Sysinternals SDelete usage text
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "usage: sdelete [-p passes]"
  - id: sysinternals-sdelete-tempfiles
    desc: Sysinternals SDelete temp files
    crit: component
    conf: 0.96
    count_min: 2
    if:
      type: text
      substr: SDELTEMP
composite_rules:
  - id: embedded-sdelete-secure-delete
    desc: SDelete (Sysinternals) embedded for secure file deletion
    crit: notable
    conf: 0.97
    attack: T1485
    any:
      - id: sysinternals-sdelete-usage
      - id: sysinternals-sdelete-tempfiles
