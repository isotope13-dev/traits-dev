defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
    - dll
    - batch
    - powershell
traits:
  - id: sysinternals-rsrc-marker
    desc: Sysinternals tool self-identification
    crit: component
    conf: 0.95
    for: [pe, dll]
    if:
      type: text
      substr: Sysinternals
      section: rdata
  - id: sysinternals-versioninfo-product
    desc: Sysinternals product version metadata
    crit: component
    conf: 0.98
    for: [pe, dll]
    if:
      type: value
      path: pe.version.product_name
      regex: (?i)\bSysinternals\b
  - id: sysinternals-company-versioninfo
    desc: Sysinternals company version metadata
    crit: component
    conf: 0.98
    for: [pe, dll]
    if:
      type: value
      path: pe.version.company
      regex: (?i)\bSysinternals\b
  - id: sysinternals-license-text
    desc: Sysinternals license text embedded
    crit: component
    conf: 0.96
    for: [pe, dll]
    if:
      type: text
      substr: Sysinternals License
      section: rdata
  - id: sysinternals-download-url
    desc: Sysinternals download URL embedded
    crit: component
    conf: 0.96
    for: [pe, dll]
    if:
      type: text
      substr: sysinternals.com
      section: rdata
  - id: accesschk-driver-basename
    desc: AccessChk embedded kernel driver filename
    crit: component
    conf: 0.98
    for: [pe, dll]
    if:
      type: path
      regex: (?i)(^|[!:/\\])akck\.sys(@|$)
  - id: accesschk-binary-basename
    desc: AccessChk embedded executable filename
    crit: component
    conf: 0.98
    for: [pe, dll]
    if:
      type: path
      regex: (?i)(^|[!:/\\])accesschk\.exe(@|$)
  - id: procmon-driver-basename
    desc: Procmon embedded kernel driver filename
    crit: component
    conf: 0.98
    for: [pe, dll]
    if:
      type: path
      regex: (?i)(^|[!:/\\])procmon\.sys(@|$)
  - id: procmon-viewer-basename
    desc: Procmon embedded viewer binary filename
    crit: component
    conf: 0.98
    for: [pe, dll]
    if:
      type: path
      regex: (?i)(^|[!:/\\])process_monitor(@|$)
  - id: psexesvc-basename
    desc: PsExec embedded service binary filename
    crit: component
    conf: 0.98
    for: [pe, dll]
    if:
      type: path
      regex: (?i)(^|[!:/\\])psexesvc\.exe(@|$)
  - id: psexesvc-service-name
    desc: PSEXESVC service name
    crit: notable
    conf: 0.95
    for: [pe, dll]
    if:
      type: text
      word: PSEXESVC
      section: rdata
  - id: psexesvc-image-path
    desc: PSEXESVC.exe image path
    crit: notable
    conf: 0.95
    for: [pe, dll]
    if:
      type: text
      regex: '\\PSEXESVC(\.exe)?\b'
      section: rdata
composite_rules:
  - id: sysinternals-tool
    desc: Sysinternals tool self-identification
    crit: component
    conf: 0.98
    any:
      - id: sysinternals-rsrc-marker
      - id: sysinternals-versioninfo-product
      - id: sysinternals-company-versioninfo
      - id: sysinternals-license-text
      - id: sysinternals-download-url
  - id: sysinternals-embedded-component
    desc: Sysinternals embedded component filename
    crit: component
    conf: 0.98
    any:
      - id: accesschk-driver-basename
      - id: accesschk-binary-basename
      - id: procmon-driver-basename
      - id: procmon-viewer-basename
      - id: psexesvc-basename
  - id: embedded-sdelete-secure-delete
    desc: SDelete (Sysinternals) embedded for secure file deletion
    crit: notable
    conf: 0.97
    attack: T1485
    all:
      - id: sysinternals-tool
      - id: micro-behaviors/fs/delete/secure::sdelete-secure-delete
  - id: psexec-lateral-movement
    desc: PsExec lateral movement service install
    crit: hostile
    conf: 0.95
    attack: T1569.002
    any:
      - id: psexesvc-service-name
      - id: psexesvc-image-path
