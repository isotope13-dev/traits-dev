defaults:
  platforms:
  - windows
  - unix
  for:
  - binaries
  size_max: 5000000
traits:
- id: par-env-vars
  size_min: 512
  size_max: 500000000
  desc: PAR environment variable references
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: PAR_TEMP
    section: ".text"
- id: par-progname
  size_min: 512
  size_max: 500000000
  desc: PAR program name variable
  crit: baseline
  conf: 0.9
  if:
    type: text
    substr: PAR_PROGNAME
    section: ".text"
- id: par-extraction-msg
  size_min: 512
  size_max: 500000000
  desc: PAR extraction failure message
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: extraction of
    section: ".text"
composite_rules:
- id: par-launcher
  size_min: 512
  size_max: 500000000
  desc: PAR (Perl Archive) launcher binary
  crit: notable
  conf: 0.95
  needs: 2
  any:
  - id: well-known/tool/sysadmin/par-launcher::par-env-vars
  - id: well-known/tool/sysadmin/par-launcher::par-extraction-msg
  - id: well-known/tool/sysadmin/par-launcher::par-progname
