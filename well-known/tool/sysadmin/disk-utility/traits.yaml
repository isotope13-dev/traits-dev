defaults:
  for: [binaries]
  platforms:
    - unix
    - windows
  crit: baseline
  size_max: 10485760
traits:
  - id: disk-partition-context
    desc: Disk partitioning utility context
    conf: 0.9
    count_min: 5
    if:
      type: text
      word: partition
      section: .rodata
  - id: winhex-xways
    desc: WinHex/X-Ways forensic disk utility
    crit: notable
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: 'X-Ways Forensics|www\.winhex\.net/|WinHex64\.exe'
      section: .text
