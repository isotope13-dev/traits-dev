defaults:
  platforms:
  - windows
  for:
  - pe
  size_max: 5000000
traits:
- id: conemu-setup-signature
  desc: ConEmu setup signature
  crit: component
  conf: 0.99
  size_max: 52428800
  if:
    type: value
    path: pe.signatures[0].subject
    regex: Maksim Moisiuk
- id: conemu-background-plugin
  desc: ConEmu background plugin DLL
  crit: baseline
  conf: 0.98
  if:
    type: path
    regex: '(?i)ConEmu[\\/]Background[\\/]ConEmuBg\.x64\.dll$'
