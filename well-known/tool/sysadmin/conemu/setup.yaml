defaults:
  platforms:
  - windows
  for:
  - pe
  size_max: 5000000
traits:
- id: conemu-setup-signature
  desc: ConEmu setup signature
  crit: component
  conf: 0.99
  size_max: 52428800
  if:
    type: value
    path: pe.signatures[0].subject
    regex: Maksim Moisiuk
- id: conemu-background-plugin
  desc: ConEmu background plugin DLL
  crit: baseline
  conf: 0.98
  if:
    type: path
    regex: '(?i)ConEmu[\\/]Background[\\/]ConEmuBg\.x64\.dll$'
- id: conemu-main-executable
  desc: ConEmu main executable
  crit: component
  conf: 0.98
  if:
    type: path
    basename: true
    regex: '(?i)^ConEmu(64)?\.exe$'
- id: conemu-hook-library
  desc: ConEmu hook DLL
  crit: component
  conf: 0.98
  if:
    type: path
    basename: true
    regex: '(?i)^ConEmuHk(64)?\.dll$'
- id: conemu-console-server
  desc: ConEmu console server DLL
  crit: component
  conf: 0.98
  if:
    type: path
    basename: true
    regex: '(?i)^ConEmuCD(64)?\.dll$'
- id: conemu-cygwin-runtime
  desc: ConEmu bundled Cygwin runtime
  crit: component
  conf: 0.98
  if:
    type: path
    regex: '(?i)ConEmu[\\/]wsl[\\/]cygwin1\.dll$'
- id: conemu-release-notes
  desc: ConEmu release notes
  crit: component
  conf: 0.98
  for: [text]
  if:
    type: path
    basename: true
    exact: WhatsNew-ConEmu.txt
    case_insensitive: true
composite_rules:
- id: conemu-component
  desc: ConEmu release component
  crit: component
  conf: 0.98
  any:
  - id: well-known/tool/sysadmin/conemu
