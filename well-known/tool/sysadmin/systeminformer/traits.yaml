defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
  size_max: 5000000
traits:
- id: systeminformer-product
  desc: SystemInformer product identification
  crit: baseline
  conf: 0.98
  size_min: 1000
  size_max: 52428800
  if:
    type: value
    path: pe.version.product_name
    regex: "(?i)System Informer"
- id: systeminformer-company
  desc: Winsider Seminars company identification
  crit: baseline
  conf: 0.98
  size_min: 1000
  size_max: 52428800
  if:
    type: value
    path: pe.version.company
    regex: "(?i)Winsider Seminars"
- id: systeminformer-signer
  desc: Winsider Seminars Authenticode signer
  crit: baseline
  conf: 0.97
  size_min: 1000
  size_max: 52428800
  if:
    type: value
    path: pe.signatures[0].subject
    regex: "(?i)Winsider Seminars"
composite_rules:
- id: systeminformer-tool
  desc: System Informer process utility
  crit: notable
  conf: 0.98
  needs: 2
  any:
  - id: systeminformer-product
  - id: systeminformer-company
  - id: systeminformer-signer
