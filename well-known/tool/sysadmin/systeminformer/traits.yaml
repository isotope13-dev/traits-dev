# SystemInformer (formerly Process Hacker)
# Legitimate system monitoring tool by Winsider Seminars & Solutions, Inc.
# Uses low-level NT APIs for process inspection, handle viewing, memory browsing,
# thread context viewing, and service management — all legitimate admin functions.
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: systeminformer-product
    desc: SystemInformer product identification
    crit: baseline
    conf: 0.98
    size_min: 1000
    size_max: 52428800
    if:
      type: kv
      path: pe.version_info.product_name
      regex: (?i)System Informer
  - id: systeminformer-company
    desc: Winsider Seminars company identification
    crit: baseline
    conf: 0.98
    size_min: 1000
    size_max: 52428800
    if:
      type: kv
      path: pe.version_info.company_name
      regex: (?i)Winsider Seminars
  - id: systeminformer-signer
    desc: Winsider Seminars Authenticode signer
    crit: baseline
    conf: 0.97
    size_min: 1000
    size_max: 52428800
    if:
      type: kv
      path: signing.cert.subject
      regex: (?i)Winsider Seminars
