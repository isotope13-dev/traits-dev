defaults:
  platforms: [windows]
  for: [pe]
  size_max: 1048576
traits:
  - id: attach-provider-export
    desc: JVM attach provider export
    crit: component
    conf: 0.99
    if:
      type: export
      exact: Java_sun_tools_attach_AttachProviderImpl_enumProcesses
  - id: attach-enqueue-export
    desc: JVM attach enqueue export
    crit: component
    conf: 0.99
    if:
      type: export
      exact: Java_sun_tools_attach_VirtualMachineImpl_enqueue
  - id: attach-exception-class
    desc: JVM attach exception class
    crit: component
    conf: 0.98
    if:
      type: text
      exact: com/sun/tools/attach/AttachNotSupportedException
      section: .rdata
  - id: attach-operation-string
    desc: JVM attach operation string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: JVM_EnqueueOperation
      section: .rdata
  - id: byte-buddy-attach-dll-name
    desc: Byte Buddy HotSpot attach DLL name
    crit: component
    conf: 0.98
    if:
      type: text
      exact: attach_hotspot_windows.dll
      section: .edata
  - id: byte-buddy-attach-argument-export
    desc: Byte Buddy remote attach argument export
    crit: component
    conf: 0.98
    if:
      type: export
      exact: allocate_remote_argument
  - id: byte-buddy-attach-code-export
    desc: Byte Buddy remote attach code export
    crit: component
    conf: 0.98
    if:
      type: export
      exact: allocate_remote_code
  - id: byte-buddy-attach-execute-export
    desc: Byte Buddy remote attach execute export
    crit: component
    conf: 0.98
    if:
      type: export
      exact: execute_remote_attach@4
composite_rules:
  - id: jdk-attach-library
    desc: OpenJDK JVM attach helper
    crit: baseline
    conf: 0.99
    needs: 3
    any:
      - id: well-known/tool/sysadmin/jvm::attach-enqueue-export
      - id: well-known/tool/sysadmin/jvm::attach-exception-class
      - id: well-known/tool/sysadmin/jvm::attach-operation-string
      - id: well-known/tool/sysadmin/jvm::attach-provider-export
      - id: well-known/tool/sysadmin/jvm::byte-buddy-attach-argument-export
      - id: well-known/tool/sysadmin/jvm::byte-buddy-attach-code-export
      - id: well-known/tool/sysadmin/jvm::byte-buddy-attach-dll-name
      - id: well-known/tool/sysadmin/jvm::byte-buddy-attach-execute-export
