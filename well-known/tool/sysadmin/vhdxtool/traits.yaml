defaults:
  platforms: [windows]
  for: [pe]
  size_max: 52428800
  crit: baseline
  conf: 0.96
traits:
  - id: vhdxtool-basename
    desc: vhdxtool executable basename
    if:
      type: path
      basename: true
      exact: vhdxtool.exe
      case_insensitive: true
  - id: systola-signer
    desc: Systola Authenticode signer
    if:
      type: value
      path: pe.signatures[0].subject
      regex: 'Systola Forwarding'
composite_rules:
  - id: vhdxtool-signed-executable
    desc: Signed vhdxtool executable
    all:
      - id: vhdxtool-basename
    any:
      - id: systola-signer
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
