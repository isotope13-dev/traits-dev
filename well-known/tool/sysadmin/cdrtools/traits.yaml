defaults:
  platforms: [windows]
  for: [pe, archive]
  crit: component
  conf: 0.98
  size_max: 100000000
traits:
  - id: cdrtools-release-archive
    desc: cdrtools release archive
    if:
      type: path
      basename: true
      regex: '(?i)cdrtools.*\.7z$'
  - id: mkisofs-windows-binary
    desc: mkisofs Windows binary
    if:
      type: path
      basename: true
      regex: '(?i)^(mk(isofs|hybrid)|isoinfo|cdda2wav)\.exe$'
      case_insensitive: true
composite_rules:
  - id: cdrtools-component
    desc: cdrtools component
    any:
      - id: well-known/tool/sysadmin/cdrtools
