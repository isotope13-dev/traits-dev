# PortQry — Microsoft port-discovery utility. Legitimate Sysinternals-
# adjacent admin tool, but appears in attacker workflows for internal
# network reconnaissance because it is widely allow-listed and produces
# no AV alerts. Distribution as a PE inside an IExpress CAB
# (IXP000.TMP) is a known weaponization wrapper.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1046
  size_min: 64
  size_max: 500000000
traits:
  - id: portqry-basename
    desc: PortQry binary filename
    crit: notable
    conf: 0.85
    if:
      type: path
      basename: true
      regex: '^([Pp][Oo][Rr][Tt][Qq][Rr][Yy](\.[Ee][Xx][Ee])?|PORTQR~1\.EXE)$'
  - id: portqry-resource-marker
    desc: PortQry resource string marker
    crit: notable
    conf: 0.92
    for: [pe, dll]
    if:
      type: text
      regex: 'PortQryV2\.exe|Microsoft Portqry'
      section: rdata
composite_rules:
  - id: portqry-recon-tool
    desc: PortQry network recon binary
    crit: suspicious
    conf: 0.92
    any:
      - id: well-known/tool/sysadmin/portqry
