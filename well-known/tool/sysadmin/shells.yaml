defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, dll]
traits:
  - id: interactive-shell-binary-marker
    desc: Interactive shell binary self-identifier
    crit: component
    conf: 0.95
    size_min: 65536
    if:
      type: text
      regex: '\b(__fish_complete|fish-shell/fish-shell/|/bash/(complete|builtins)|zsh/Completion|/zsh-[0-9])\b'
