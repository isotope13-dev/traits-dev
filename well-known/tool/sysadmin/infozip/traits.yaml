defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  size_min: 1024
  size_max: 10485760

traits:
  - id: infozip-banner
    desc: Info-ZIP archive utility banner
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: by Info-ZIP
  - id: zipinfo-banner
    desc: ZipInfo archive utility banner
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: by Greg Roelofs and the Info-ZIP group
  - id: unzip-compiled-properly-message
    desc: UnZip compiled properly diagnostic
    crit: component
    conf: 0.85
    if:
      type: text
      substr: and that you have compiled UnZip properly
  - id: unzip-extraction-directory-ui
    desc: UnZip extraction directory UI text
    crit: component
    conf: 0.85
    if:
      type: text
      substr: Set Extraction Directory
  - id: unzip-all-files-extracted-message
    desc: UnZip extraction success message
    crit: component
    conf: 0.85
    if:
      type: text
      substr: All files extracted OK
  - id: funzip-usage
    desc: fUnZip command-line usage
    crit: component
    conf: 0.9
    if:
      type: text
      substr: fUnZip (filter UnZip)
  - id: unzip32-dll-reference
    desc: UNZIP32.DLL helper reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: UNZIP32.DLL
  - id: wiz-single-entry-unzip-export
    desc: Wiz_SingleEntryUnzip helper reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Wiz_SingleEntryUnzip

composite_rules:
  - id: infozip-archive-tool
    desc: Info-ZIP archive utility
    crit: baseline
    conf: 0.95
    any:
      - id: infozip-banner
      - id: zipinfo-banner
      - id: infozip-sfx-tool
      - id: infozip-funzip-tool
      - id: infozip-unzip32-example-tool
  - id: infozip-sfx-tool
    desc: Info-ZIP self-extracting archive utility
    crit: baseline
    conf: 0.9
    all:
      - id: unzip-compiled-properly-message
      - id: unzip-extraction-directory-ui
      - id: unzip-all-files-extracted-message
  - id: infozip-funzip-tool
    desc: Info-ZIP fUnZip archive filter
    crit: baseline
    conf: 0.92
    all:
      - id: funzip-usage
      - id: unzip-compiled-properly-message
  - id: infozip-unzip32-example-tool
    desc: Info-ZIP UNZIP32.DLL example helper
    crit: baseline
    conf: 0.92
    all:
      - id: unzip32-dll-reference
      - id: wiz-single-entry-unzip-export
