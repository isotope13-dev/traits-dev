# Mindustry / Arc source and bundled runtime identity.
# These markers identify the open-source game and its native SDL backend; they
# are benign context for generic rules that otherwise mistake game input and
# file-management code for surveillance or tasking.
defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 0.98

traits:
  - id: mindustry-source-tree
    desc: Mindustry or Arc source-tree path
    crit: notable
    for: [source, scripts]
    if:
      type: path
      regex: '(?i)(^|[\\/])(Mindustry|Arc)-[0-9]+(\.[0-9]+)*([\\/]|$)'

  - id: mindustry-source-identity
    desc: Mindustry source identity marker
    crit: notable
    for: [java, shell, c, cpp, go, javascript, tar]
    if:
      type: text
      regex: '(?i)(github\.com/Anuken/Mindustry|mindustry\.desktop|Mindustry-[0-9])'

  - id: mindustry-arc-sdl-runtime
    desc: Mindustry Arc SDL runtime filename
    crit: notable
    for: [pe, dll]
    size_min: 100000
    if:
      type: basename
      regex: '(?i)^sdl-arc[0-9]+\.dll$'

  - id: mindustry-arc-static-library
    desc: Mindustry Arc bundled static library path
    crit: notable
    platforms: [macos, ios]
    for: [macho]
    size_min: 100000
    size_max: 10000000
    if:
      type: path
      regex: '(?i)libarc-[^\\/]+\.a$'
