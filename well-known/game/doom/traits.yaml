# Generic Doom source-port vocabulary
# doom1.wad and the -iwad argument are shared by every Doom engine port,
# not specific to any single port.
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: component
  conf: 0.9
  size_max: 10485760

traits:
  - id: doom-wad-reference
    desc: doom1.wad game data reference
    if:
      type: text
      word: doom1.wad

  - id: doom-iwad-argument
    desc: Doom IWAD launch argument
    if:
      type: text
      exact: -iwad
