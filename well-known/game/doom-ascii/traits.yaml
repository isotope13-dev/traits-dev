defaults:
  platforms: [windows, unix]
  for: [python]
  size_max: 10485760
traits:
  - id: doom-ascii-config
    desc: doom-ascii.cfg game config reference
    crit: baseline
    conf: 0.98
    if:
      type: text
      word: doom-ascii.cfg
  - id: doom-ascii-name
    desc: doom-ascii executable reference
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: 'doom-ascii(_mac|_win(32|64)\.exe)?'
composite_rules:
  - id: doom-ascii-specific
    desc: doom-ascii-specific identity marker
    crit: component
    any:
      - id: doom-ascii-name
      - id: doom-ascii-config
  - id: doom-ascii-payload
    desc: doom-ascii game payload markers
    crit: notable
    conf: 0.98
    needs: 2
    all:
      - id: doom-ascii-specific
    any:
      - id: doom-ascii-name
      - id: doom-ascii-config
      - id: well-known/game/doom::doom-wad-reference
      - id: well-known/game/doom::doom-iwad-argument
