defaults:
  platforms: [windows, unix]
  for: [python]
  size_max: 10485760
traits:
  - id: doom-wad-reference
    desc: doom1.wad game data reference
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: doom1.wad
  - id: doom-ascii-config
    desc: doom-ascii.cfg game config reference
    crit: baseline
    conf: 0.98
    if:
      type: text
      exact: doom-ascii.cfg
  - id: doom-ascii-name
    desc: doom-ascii executable reference
    crit: baseline
    conf: 0.98
    if:
      type: text
      regex: 'doom-ascii(_mac|_win(32|64)\.exe)?'
  - id: doom-iwad-argument
    desc: Doom IWAD launch argument
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: -iwad
composite_rules:
  - id: doom-ascii-payload
    desc: doom-ascii game payload markers
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: doom-ascii-name
      - id: doom-wad-reference
      - id: doom-ascii-config
      - id: doom-iwad-argument
