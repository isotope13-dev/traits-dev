defaults:
  size_max: 52428800
  platforms:
    - windows
  for:
    - pe
traits:
  - id: valve-corp-string
    desc: Valve Corporation string
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: Valve Corp(\.|oration)
      section: rsrc
  - id: steam-product-name
    desc: Steam product metadata
    crit: baseline
    conf: 0.95
    if:
      type: value
      path: pe.version.product_name
      exact: Steam
  - id: steam-x64launcher-name
    desc: Steam x64launcher metadata
    crit: baseline
    conf: 0.96
    if:
      type: value
      path: pe.version.original_filename
      exact: x64launcher.exe
  - id: steam-path-string
    desc: Steam path reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: Software\Valve\Steam
      section: rdata
  - id: steam-wow6432-path
    desc: Steam Wow6432Node registry path
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: SOFTWARE\WOW6432Node\Valve\Steam
      section: rdata
  - id: steam-activeprocess-path
    desc: Steam ActiveProcess registry path
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: Software\Valve\Steam\ActiveProcess
      section: rdata
  - id: steam-shell-open-command
    desc: Steam shell open command path
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: steam\Shell\Open\Command
      section: rdata
  - id: steam-run-uri
    desc: Steam run URI launch string
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: steam://run/
      section: rdata
  - id: steam-rungameid-uri
    desc: Steam rungameid URI string
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: steam://rungameid/
      section: rdata
  - id: steam-api-exports
    desc: Steam API exports
    crit: baseline
    conf: 0.95
    count_min: 5
    if:
      type: symbol
      regex: ^(SteamAPI_|Steam_|Breakpad_Steam)
  - id: breakpad-steamid-export
    desc: Steam Breakpad export
    crit: baseline
    conf: 0.98
    if:
      type: symbol
      exact: Breakpad_SetSteamID
  - id: steam-error-reporter-path
    desc: Steam error reporter path
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: /steamerrorreporter.exe
      section: rdata
  - id: steam-exe-registry-value
    desc: SteamExe registry value
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: SteamExe
      section: rdata
  - id: steam-install-exe-path
    desc: Steam executable install path
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: C:\Program Files (x86)\Steam\steam.exe
      section: rdata
  - id: steam-backup-executable-name
    desc: Steam backup executable name
    crit: baseline
    conf: 0.95
    if:
      type: text
      exact: steam.back
      section: rdata
  - id: steam-client-process-cluster
    desc: Steam client process name cluster
    crit: baseline
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: (?i)^(streaming_client|steamerrorreporter64?|rustclient|dota2)$
      section: rdata
  - id: valve-sourceinit-anticheat-marker
    desc: Valve sourceinit anticheat marker
    crit: baseline
    conf: 0.97
    if:
      type: text
      exact: _Non_Valve_Anti_Cheat
      section: rdata
composite_rules:
  - id: valve-corp-binary
    desc: Binary from Valve Corporation
    crit: notable
    conf: 0.98
    any:
      - id: well-known/game/steam::valve-corp-string
      - id: metadata/signed/leaf::valve
      - id: metadata/signed/developer::valve
      - id: metadata/signed/developer::valve-corp.
      - id: well-known/game/steam::steam-path-string
      - id: well-known/game/steam::steam-api-exports
      - id: well-known/game/steam::breakpad-steamid-export
      - id: well-known/game/steam::steam-error-reporter-path
      - id: well-known/game/steam::steam-product-name
      - id: well-known/game/steam::steam-x64launcher-name
      - id: valve-sourceinit-anticheat-marker
  - id: steam-launch-targeting
    desc: Steam launch path targeting
    crit: baseline
    conf: 0.96
    needs: 2
    any:
      - id: steam-path-string
      - id: steam-wow6432-path
      - id: steam-activeprocess-path
      - id: steam-shell-open-command
      - id: steam-run-uri
      - id: steam-rungameid-uri
      - id: steam-exe-registry-value
      - id: steam-install-exe-path
