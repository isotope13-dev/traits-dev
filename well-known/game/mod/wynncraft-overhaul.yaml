defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1024
  size_max: 33554432

traits:
  - id: installer-version-token
    desc: Wynncraft installer version token
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(?i)wynncraft-overhaul/installer/[0-9]+\.[0-9]+\.[0-9]+'

  - id: majestic-overhaul-title
    desc: Majestic Overhaul title string
    crit: component
    conf: 0.96
    if:
      type: text
      exact: MAJESTIC OVERHAUL

composite_rules:
  - id: wynncraft-overhaul-installer
    desc: Wynncraft Overhaul installer
    crit: baseline
    conf: 0.99
    all:
      - id: installer-version-token
      - id: majestic-overhaul-title
