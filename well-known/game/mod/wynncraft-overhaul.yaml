defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1024
  size_max: 33554432

traits:
  - id: installer-pdb-path
    desc: Wynncraft installer PDB path
    crit: component
    conf: 0.99
    if:
      type: kv
      path: debug.pdb_path
      exact: wynncraft_overhaul_installer.pdb

  - id: installer-product-name
    desc: Wynncraft installer product name
    crit: component
    conf: 0.97
    if:
      type: kv
      path: pe.version_info.product_name
      exact: wynncraft-overhaul-installer

  - id: installer-file-version
    desc: Wynncraft installer file version
    crit: component
    conf: 0.95
    if:
      type: kv
      path: pe.version_info.file_version
      regex: '^1\.[0-9]+\.[0-9]+$'

  - id: installer-brand-string
    desc: Wynncraft installer branding
    crit: component
    conf: 0.98
    if:
      type: text
      exact: MAJESTIC OVERHAUL
      section: .rdata

  - id: installer-manifest-url
    desc: Wynncraft manifest download URL
    crit: component
    conf: 0.99
    if:
      type: text
      exact: https://cdn.jsdelivr.net/gh/Wynncraft-Overhaul/majestic-overhaul@latest/universal.json
      section: .rdata

  - id: installer-minecraft-paths
    desc: Minecraft modpack data paths
    crit: component
    conf: 0.9
    if:
      type: text
      regex: \.(minecraft|bobby)\b
      section: .rdata

composite_rules:
  - id: wynncraft-overhaul-installer
    desc: Wynncraft Overhaul installer
    crit: baseline
    conf: 0.99
    all:
      - id: installer-product-name
    needs: 1
    any:
      - id: installer-pdb-path
      - id: installer-file-version
      - id: installer-brand-string
      - id: installer-manifest-url

  - id: wynncraft-overhaul-modpack-installer
    desc: Wynncraft modpack installer markers
    crit: baseline
    conf: 0.98
    needs: 2
    any:
      - id: installer-brand-string
      - id: installer-manifest-url
      - id: installer-minecraft-paths
