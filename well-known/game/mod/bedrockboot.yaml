# BedrockBoot Minecraft launcher preload components.
#
# BedrockBoot is a legitimate open-source launcher/mod tool.  Its Windows
# preload component uses standard DLL injection and its C# helper includes a
# third-party in-memory PE loader; those capabilities are expected here, but
# the product identity must be concrete before injection rules are exempted.
defaults:
  platforms: [windows]
  conf: 0.99

traits:
  - id: bedrockboot-preload-injector-pdb
    desc: BedrockBoot preload injector build marker
    crit: component
    for: [pe, dll]
    size_min: 4096
    size_max: 1048576
    if:
      type: text
      section: .rdata
      regex: 'PreLoad.{0,32}Inject\.pdb'

  - id: bedrockboot-memory-module-source
    desc: BedrockBoot DLLFromMemory source marker
    crit: notable
    for: [csharp]
    if:
      type: text
      substr: 'github.com/schellingb/DLLFromMemory-net'

  - id: bedrockboot-memory-module-class
    desc: BedrockBoot memory-module class marker
    crit: notable
    for: [csharp]
    if:
      type: text
      regex: '\bclass\s+MemoryModule\b'

composite_rules:
  - id: bedrockboot-preload-injector
    desc: BedrockBoot preload injector component
    crit: notable
    for: [pe, dll]
    all:
      - id: bedrockboot-preload-injector-pdb
      - id: objectives/anti-static/obfuscation/name-mangling/export-name::inject-export

  - id: bedrockboot-memory-module-context
    desc: BedrockBoot memory-module source context
    crit: exception
    conf: 1.0
    for: [csharp]
    all:
      - id: bedrockboot-memory-module-source
      - id: bedrockboot-memory-module-class
