# .NET WPF Game Modification Tools
#
# Detects legitimate .NET WPF game modification tools (e.g., "Endfield
# Uncensored" by DynamiByte) that use standard Windows process injection
# APIs to inject DLLs into game processes for rendering modifications
# (Vulkan hooking, transparency filter removal, etc.).
#
# These tools are NOT malware — they are open-source game mods distributed
# via GitHub. They use the same injection APIs as game cheats but target
# specific games for legitimate rendering modifications.
#
# Used as a downgrade/unless condition in injection-related rules to
# suppress false positives on legitimate game modification tools.
defaults:
  platforms: [windows]
  for: [pe]
  size_max: 10485760

traits:
  # .NET WPF GUI method names (split to satisfy regex constraints)
- id: endfield-uncensored-metadata
  desc: Endfield Uncensored metadata strings
  crit: component
  conf: 0.98
  if:
    type: text
    section: .rsrc
    regex: "Removes transparency filter in Arknights: Endfield \\(Vulkan\\)"

  # DynamiByte GitHub URL
- id: dynamibyte-github-url
  desc: DynamiByte GitHub URL
  crit: component
  conf: 0.98
  if:
    type: text
    section: .text
    substr: "github.com/DynamiByte/Endfield-Uncensored"

  # Endfield Uncensored specific symbols
- id: endfield-uncensored-symbols
  desc: Endfield Uncensored specific symbols
  crit: component
  conf: 0.98
  if:
    type: symbol
    regex: "Endfield_Uncensored|UnGate11::MainWindow"

- id: wpf-gui-method-names-init--cachestoryboards
  desc: .NET WPF GUI method names (CacheStoryboards)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: CacheStoryboards
- id: wpf-gui-method-names-init--initializeversionlabel
  desc: .NET WPF GUI method (InitializeVersionLabel)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: InitializeVersionLabel
- id: wpf-gui-method-names-init--setinteractionenabled
  desc: .NET WPF GUI method (SetInteractionEnabled)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: SetInteractionEnabled
- id: wpf-gui-method-names-init--handleinvalidbutton
  desc: .NET WPF GUI method names (HandleInvalidButton)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: HandleInvalidButton
- id: wpf-gui-method-names-injector--appendoutput
  desc: .NET WPF GUI method names (AppendOutput)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: AppendOutput
- id: wpf-gui-method-names-injector--injectorthreadproc
  desc: .NET WPF GUI method names (InjectorThreadProc)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: InjectorThreadProc
- id: wpf-gui-method-names-injector--startinjectorasync
  desc: .NET WPF GUI method names (StartInjectorAsync)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: StartInjectorAsync
- id: wpf-gui-method-names-injector--extractembeddeddll
  desc: .NET WPF GUI method names (ExtractEmbeddedDll)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text
    word: ExtractEmbeddedDll
composite_rules:
  # .NET WPF GUI method names — MainWindow, Window methods
- id: wpf-gui-method-names-init
  desc: .NET WPF GUI method names (init)
  crit: component
  conf: 0.9
  any:
  - id: wpf-gui-method-names-init--cachestoryboards
  - id: wpf-gui-method-names-init--initializeversionlabel
  - id: wpf-gui-method-names-init--setinteractionenabled
  - id: wpf-gui-method-names-init--handleinvalidbutton
- id: wpf-gui-method-names-injector
  desc: .NET WPF GUI method names (injector)
  crit: component
  conf: 0.9
  any:
  - id: wpf-gui-method-names-injector--appendoutput
  - id: wpf-gui-method-names-injector--injectorthreadproc
  - id: wpf-gui-method-names-injector--startinjectorasync
  - id: wpf-gui-method-names-injector--extractembeddeddll
- id: wpf-gui-method-names
  desc: .NET WPF GUI method names
  crit: component
  conf: 0.9
  any:
  - id: metadata/library/wpf::wpf-window-method-names
  - id: wpf-gui-method-names-init
  - id: wpf-gui-method-names-injector

  # Unity IL2CPP game DLL references
- id: game-unity-dll-refs
  desc: Unity IL2CPP game DLL references
  crit: component
  conf: 0.95
  any:
  - id: metadata/library/unity-il2cpp::gameassembly-text
  - id: metadata/library/unity-il2cpp::gameassembly-rdata
  - id: metadata/library/unity-il2cpp::gameassembly-data

  # Vulkan graphics API reference
- id: game-vulkan-ref
  desc: Vulkan graphics API reference
  crit: component
  conf: 0.85
  any:
  - id: micro-behaviors/ui/graphics/draw::vulkan-api-ref-text
  - id: micro-behaviors/ui/graphics/draw::vulkan-api-ref-rdata

  # .NET WPF game modification tool — the outer .NET assembly with WPF GUI
- id: dotnet-wpf-game-mod
  desc: .NET WPF game modification tool
  crit: baseline
  conf: 0.92
  all:
  - id: metadata/library/wpf::wpf-namespace-ref
  any:
  - id: wpf-gui-method-names
  - id: game-unity-dll-refs
  - id: game-vulkan-ref
  needs: 1

  # Endfield Uncensored specific identification
- id: endfield-uncensored-game-mod
  desc: Endfield Uncensored game modification tool
  crit: baseline
  conf: 0.99
  all:
  - id: dotnet-wpf-game-mod
  any:
  - id: endfield-uncensored-metadata
  - id: dynamibyte-github-url
  - id: endfield-uncensored-symbols

  # Game-specific embedded DLL — detected by Unity IL2CPP game DLL references
  # Exclude DLLs with anti-debug checks — legitimate game mods don't need those.
- id: game-mod-game-specific-dll
  desc: Native DLL with game-specific IL2CPP references
  crit: baseline
  conf: 0.92
  all:
  - id: game-unity-dll-refs
  any:
  - id: game-vulkan-ref
  - id: objectives/anti-static/obfuscation/name-mangling/export-name::inject-export
  unless:
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol

  # Generic game-mod injection toolkit DLL — detected by InjectDll export
  # combined with the injection API trinity (VirtualAllocEx + WriteProcessMemory +
  # CreateRemoteThread). This catches the loader DLL in tools like
  # "Endfield Uncensored" that export InjectDll and use standard injection APIs.
  # Exclude DLLs with anti-debug checks — legitimate game mods don't need those.
- id: game-injection-toolkit-dll
  desc: Game-mod injection toolkit DLL (InjectDll + injection APIs)
  crit: baseline
  conf: 0.88
  all:
  - id: objectives/anti-static/obfuscation/name-mangling/export-name::inject-export
  - id: objectives/evasion/process/injection/dll::injection-trinity-text
  unless:
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol

  # Embedded DLL that is part of a game modification tool —
  # detected by game-specific strings or injection exports in native PEs
- id: game-mod-embedded-dll
  desc: Native DLL embedded in game modification tool
  crit: baseline
  conf: 0.88
  any:
  - id: game-mod-game-specific-dll
  - id: game-injection-toolkit-dll
  - id: game-unity-dll-refs
