# LX Cheats - Counter-Strike 2 Game Cheat Detection
# LX CHEATS C++ Edition is a game cheat targeting Counter-Strike 2.
# It provides ESP, aimbot, triggerbot, bunnyhop, and no-recoil features
# via a DirectX 11 overlay with Dear ImGui menus.
# It fetches game offsets dynamically from GitHub.
# ATT&CK: T1055 (Process Injection)
defaults:
  for: [pe]
  platforms: [windows]
  crit: component
  conf: 0.95
  size_min: 512
  size_max: 500000000
traits:
  # === Brand strings ===
  - id: lx-cheats-banner
    desc: LX CHEATS brand banner string
    conf: 0.99
    if:
      type: text
      section: rdata
      substr: "LX CHEATS"

  - id: lx-cheats-version
    desc: LX CHEATS version string
    conf: 0.99
    if:
      type: text
      section: rdata
      regex: "LX CHEATS v[0-9]+\\.[0-9]+"

  # === PDB path ===
  - id: lx-cheats-pdb
    desc: LX CHEATS PDB debug path
    conf: 0.99
    if:
      type: value
      path: pe.debug.pdb.path
      regex: "[\\\\/]lx_cheats\\.pdb$"

  # === Game target ===
  - id: cs2-process-target
    desc: Counter-Strike 2 game process target
    conf: 0.95
    if:
      type: text
      section: rdata
      word: "cs2.exe"

  - id: cs2-client-dll-target
    desc: CS2 client.dll module target
    conf: 0.95
    if:
      type: text
      section: rdata
      word: "client.dll"

  # === Cheat feature strings ===
  - id: cheat-esp-basic-display-features
    desc: ESP basic display cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "esp(Enable|Box|FilledBox|Corners)"

  - id: cheat-esp-entity-display-features
    desc: ESP entity display cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "esp(Skeleton|Names|Weapons)"

  - id: cheat-esp-status-overlay-features
    desc: ESP status overlay cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "esp(HealthBar|ArmorBar|HeadDot|SnapLines)"

  - id: cheat-esp-line-overlay-features
    desc: ESP line overlay cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "esp(EyeLines|Bomb)"

  - id: cheat-esp-item-features
    desc: ESP item cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "esp(DroppedWeapons|Deathmatch)"

  - id: cheat-aimbot-control-features
    desc: Aimbot control cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "aimbot(Enable|Key|Fov)"

  - id: cheat-aimbot-targeting-features
    desc: Aimbot targeting cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "aimbot(Smoothing|Target)"

  - id: cheat-triggerbot-control-features
    desc: Triggerbot control cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "trigger(Enable|Key|AttackAll)"

  - id: cheat-triggerbot-check-features
    desc: Triggerbot check cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "trigger(VisibilityCheck|FlashCheck|Delay)"

  - id: cheat-bunnyhop-features
    desc: Bunnyhop cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "bunnyhop(Enable|Key)"

  - id: cheat-norecoil-features
    desc: No-recoil cheat features
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "norecoil(Enable|[XY])"

  - id: cheat-autoaccept-features
    desc: Auto-accept cheat feature
    conf: 0.95
    if:
      type: text
      section: rdata
      word: "autoAcceptEnable"

  # === Game offset names ===
  - id: cs2-offset-entity-list
    desc: CS2 entity list offset reference
    conf: 0.95
    if:
      type: text
      section: rdata
      word: "dwEntityList"

  - id: cs2-offset-local-player
    desc: CS2 local player pawn offset reference
    conf: 0.95
    if:
      type: text
      section: rdata
      word: "dwLocalPlayerPawn"

  - id: cs2-offset-health
    desc: CS2 health offset reference
    conf: 0.95
    if:
      type: text
      section: rdata
      word: "m_iHealth"

  - id: cs2-offset-view-matrix
    desc: CS2 view matrix offset reference
    conf: 0.95
    if:
      type: text
      section: rdata
      word: "dwViewMatrix"

  # === Game weapon names ===
  - id: cs2-firearm-references
    desc: CS2 firearm name references
    conf: 0.85
    if:
      type: text
      section: rdata
      regex: "\\b(deagle|ak47|flashbang)\\b"

  - id: cs2-knife-references
    desc: CS2 knife name references
    conf: 0.85
    if:
      type: text
      section: rdata
      regex: "\\b(knife_ct|knife_t)\\b"

  # === Overlay initialization ===
  - id: dx11-overlay-init-message
    desc: DirectX 11 overlay initialization message
    conf: 0.95
    if:
      type: text
      section: rdata
      substr: "Initializing DirectX 11 overlay"

  # === GitHub offset fetching ===
  - id: cs2-offset-github-url
    desc: CS2 offset fetching from GitHub raw content
    crit: notable
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: "raw\\.githubusercontent\\.com/.{0,50}/cs2-dumper/.{0,50}/output/(offsets|client_dll)\\.json"

composite_rules:
  - id: cheat-esp-features
    desc: ESP cheat feature strings
    crit: component
    conf: 0.95
    any:
      - id: cheat-esp-basic-display-features
      - id: cheat-esp-entity-display-features
      - id: cheat-esp-status-overlay-features
      - id: cheat-esp-line-overlay-features
      - id: cheat-esp-item-features

  - id: cheat-aimbot-features
    desc: Aimbot cheat features
    crit: component
    conf: 0.95
    any:
      - id: cheat-aimbot-control-features
      - id: cheat-aimbot-targeting-features

  - id: cheat-triggerbot-features
    desc: Triggerbot cheat features
    crit: component
    conf: 0.95
    any:
      - id: cheat-triggerbot-control-features
      - id: cheat-triggerbot-check-features

  - id: cs2-weapon-references
    desc: CS2 weapon name references (cheat targeting)
    crit: component
    conf: 0.85
    any:
      - id: cs2-firearm-references
      - id: cs2-knife-references

  # High-confidence LX Cheats detection
  - id: lx-cheats-detected
    desc: LX CHEATS C++ Edition game cheat detected
    crit: hostile
    conf: 0.97
    all:
      - id: lx-cheats-banner
    any:
      - id: lx-cheats-version
      - id: lx-cheats-pdb
      - id: cs2-process-target
      - id: cs2-client-dll-target
    needs: 1

  # Generic CS2 cheat detection (covers variants without LX branding)
  - id: cs2-cheat-detected
    desc: Counter-Strike 2 game cheat with overlay injection
    crit: hostile
    conf: 0.93
    all:
      - id: cs2-process-target
      - id: cs2-client-dll-target
    any:
      - id: cheat-esp-features
      - id: cheat-aimbot-features
      - id: cheat-triggerbot-features
      - id: cheat-bunnyhop-features
      - id: cheat-norecoil-features
      - id: cheat-autoaccept-features
      - id: cs2-offset-entity-list
      - id: cs2-offset-local-player
      - id: cs2-offset-health
      - id: cs2-offset-view-matrix
      - id: cs2-weapon-references
      - id: dx11-overlay-init-message
    needs: 2

  # Game cheat overlay: ImGui + DX11 + game target
  - id: game-cheat-overlay
    desc: Game cheat with ImGui overlay and DirectX 11 rendering
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/ui/framework/imgui::dear-imgui-library
    any:
      - id: cs2-process-target
      - id: cs2-client-dll-target
      - id: cheat-esp-features
      - id: cheat-aimbot-features
    needs: 1

  # GitHub-based offset fetching for game cheats
  - id: cs2-github-offset-fetcher
    desc: Game cheat fetching CS2 offsets from GitHub
    crit: suspicious
    conf: 0.94
    all:
      - id: cs2-offset-github-url
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
    any:
      - id: well-known/lib/nlohmann-json::nlohmann-json-v3-symbol
      - id: cs2-process-target
    needs: 1
