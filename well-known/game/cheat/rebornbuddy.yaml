# RebornBuddy / LlamaLibrary Final Fantasy XIV automation libraries.
# These are game-automation / botting components, not conventional malware.
defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.95
  size_min: 16384
  size_max: 20971520

traits:
  - id: rebornbuddy-assembly-ref
    desc: RebornBuddy assembly reference
    conf: 0.98
    if:
      type: text
      section: .text
      substr: RebornBuddy

  - id: ff14bot-namespace-ref
    desc: ff14bot namespace reference
    conf: 0.98
    if:
      type: text
      section: .text
      substr: ff14bot

  - id: greymagic-assembly-ref
    desc: GreyMagic memory library reference
    conf: 0.95
    if:
      type: text
      section: .text
      substr: GreyMagic

  - id: llamalibrary-assembly-ref
    desc: LlamaLibrary assembly reference
    conf: 0.99
    if:
      type: text
      section: .text
      substr: LlamaLibrary

  - id: platypus-loader-ref
    desc: Platypus loader reference
    conf: 0.95
    if:
      type: text
      section: .text
      substr: PlatypusLoader

  - id: lisbeth-automation-ref
    desc: Lisbeth automation reference
    conf: 0.9
    if:
      type: text
      section: .text
      substr: Lisbeth

composite_rules:
  - id: rebornbuddy-game-automation-library
    desc: RebornBuddy game automation library
    crit: suspicious
    conf: 0.98
    all:
      - id: rebornbuddy-assembly-ref
      - id: ff14bot-namespace-ref
    any:
      - id: greymagic-assembly-ref
      - id: platypus-loader-ref
      - id: lisbeth-automation-ref

  - id: llamalibrary-ffxiv-automation-library
    desc: LlamaLibrary FFXIV automation library
    crit: suspicious
    conf: 0.99
    all:
      - id: llamalibrary-assembly-ref
      - id: rebornbuddy-assembly-ref
      - id: ff14bot-namespace-ref
    any:
      - id: platypus-loader-ref
      - id: lisbeth-automation-ref
      - id: greymagic-assembly-ref
