# Generic game-cheat indicators. These deliberately require combinations of
# cheat controls, emulator targets, UI, and intrusive runtime behavior rather
# than treating a single game-related word as hostile.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.9
  size_min: 512
  size_max: 500000000

traits:
  - id: aim-assist-control
    desc: Aim-assist or silent-aim cheat control
    crit: suspicious
    conf: 0.96
    if:
      type: text
      section: rdata
      regex: '\b(aimbot|aim assist|silent aim)\b'
      case_insensitive: true
  - id: visual-cheat-control
    desc: Wallhack or ESP cheat control
    crit: suspicious
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: '\b(wallhack|ghost hack)\b'
      case_insensitive: true
  - id: combat-modification-control
    desc: Game combat-modification cheat controls
    crit: suspicious
    conf: 0.95
    if:
      type: text
      section: rdata
      regex: '\b(no recoil|no reload|rapid fire|camera hack)\b'
      case_insensitive: true
  # Native cheats may construct labels as immediates in .text rather than
  # storing them in .rdata. These atoms remain suspicious; the hostile rules
  # below also require asynchronous key polling before inferring cheat intent.
  - id: native-aim-feature-label
    desc: Native aim-assistance feature label
    crit: suspicious
    conf: 0.94
    if:
      type: text
      section: .text
      word: SmartAim
      case_insensitive: true
  - id: native-automated-fire-label
    desc: Native automated-fire feature label
    crit: suspicious
    conf: 0.94
    if:
      type: text
      section: .text
      word: AutoFire
      case_insensitive: true
  - id: native-rapid-aim-feature-label
    desc: Native rapid-aim feature label
    crit: suspicious
    conf: 0.94
    if:
      type: text
      section: .text
      word: RapidAim
      case_insensitive: true
  - id: emulator-game-target
    desc: Android emulator or native game process target
    crit: notable
    conf: 0.94
    if:
      type: text
      section: rdata
      regex: '\b(HD-Player\.exe|BstkVMM\.dll|libil2cpp\.so|com\.dts\.freefiremax)\b'
      case_insensitive: true

  - id: valorant-vanguard-target
    desc: Valorant Vanguard target marker
    crit: notable
    conf: 0.99
    if:
      type: text
      section: rdata
      regex: '(?i)(\bvgc\.exe\b|\bvgk\.sys\b|/vanguard/v1/gateway\b|["'']game["'']\s*:\s*["'']valo["''])'

  - id: valorant-vanguard-tamper-command
    desc: Vanguard process-control command
    crit: notable
    conf: 0.99
    if:
      type: text
      section: rdata
      regex: '(?i)(taskkill(\.exe)?[^\r\n]{0,100}\bvgc\.exe\b|\bsc(\.exe)?\s+start\s+vgc\b)'

  - id: valorant-vanguard-pipe-tamper
    desc: Vanguard named-pipe override marker
    crit: notable
    conf: 0.99
    if:
      type: text
      section: rdata
      regex: '(?i)(\boverrid\w*\s+vgc\s+pipe\b|\boriginal\s+pipe\b)'

composite_rules:
  - id: cheat-control-set
    desc: Generic game-cheat control set
    crit: suspicious
    conf: 0.95
    any:
      - id: aim-assist-control
      - id: visual-cheat-control
      - id: combat-modification-control
  - id: injected-game-cheat-panel
    desc: Game-cheat panel combined with emulator targeting and process injection
    crit: hostile
    conf: 0.98
    attack: T1055
    all:
      - id: micro-behaviors/ui/framework/imgui::dear-imgui-library
      - id: emulator-game-target
      - id: cheat-control-set
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
    needs: 2
  - id: traffic-intercepting-game-cheat
    desc: Game-cheat controls combined with WinDivert packet interception
    crit: hostile
    conf: 0.97
    attack: T1040
    all:
      - id: emulator-game-target
      - id: micro-behaviors/communications/capture/windivert::windivert-packet-filter
      - id: cheat-control-set
  - id: native-aim-toggle-cheat
    desc: Native SmartAim cheat controlled by key polling
    crit: hostile
    conf: 0.97
    all:
      - id: native-aim-feature-label
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
  - id: native-rapid-aim-toggle-cheat
    desc: Native RapidAim cheat controlled by key polling
    crit: hostile
    conf: 0.97
    all:
      - id: native-rapid-aim-feature-label
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
  - id: native-automated-fire-toggle-cheat
    desc: Native automated-fire cheat controlled by key polling
    crit: hostile
    conf: 0.97
    all:
      - id: native-automated-fire-label
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state

  - id: valorant-vanguard-cheat-loader
    desc: Valorant cheat loader tampering with Vanguard
    crit: hostile
    conf: 0.99
    attack: T1562.001
    all:
      - id: valorant-vanguard-target
      - id: valorant-vanguard-tamper-command
      - id: valorant-vanguard-pipe-tamper
      - id: micro-behaviors/ui/framework/imgui::dear-imgui-library
    any:
      - id: micro-behaviors/os/privilege/token::high-risk-privilege-name
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-session-connect-flow
    needs: 1
