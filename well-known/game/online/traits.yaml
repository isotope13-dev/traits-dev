defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: netdragon-moyu-company
    desc: NetDragon Tianqing Digital publisher metadata
    crit: notable
    conf: 0.98
    size_min: 32768
    size_max: 1048576
    if:
      type: value
      path: pe.version.company
      exact: 网龙天晴数码
  - id: moyu-client-product
    desc: 魔域 online game client product metadata
    crit: notable
    conf: 0.98
    size_min: 32768
    size_max: 1048576
    if:
      type: value
      path: pe.version.product_name
      exact: 魔域客户端执行程序
  - id: moyu-client-original-name
    desc: 魔域 game client original filename metadata
    crit: notable
    conf: 0.98
    size_min: 32768
    size_max: 1048576
    if:
      type: value
      path: pe.version.original_filename
      exact: 魔域.exe

composite_rules:
  - id: moyu-packed-game-context
    desc: Exception context for the identified packed 魔域 game client
    crit: exception
    conf: 0.99
    all:
      - id: netdragon-moyu-company
      - id: moyu-client-product
      - id: moyu-client-original-name
