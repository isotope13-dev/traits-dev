defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: idr-replace
    desc: Usage of idr_replace
    crit: notable
    conf: 1.0
    if:
      type: string
      exact: "idr_replace"
  - id: proc-pid-ns
    desc: Access to process PID namespace (proc_pid_ns)
    crit: notable
    conf: 1.0
    if:
      type: string
      exact: "proc_pid_ns"
