defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: idr-replace
    desc: Usage of idr_replace
    crit: notable
    conf: 1.0
    if:
      type: text
      exact: idr_replace
  - id: proc-pid-ns
    desc: Access to process PID namespace (proc_pid_ns)
    crit: notable
    conf: 1.0
    if:
      type: text
      exact: proc_pid_ns
