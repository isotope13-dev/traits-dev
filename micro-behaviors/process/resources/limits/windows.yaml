defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
traits:
  - id: create-job-object
    desc: Create Windows job object
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: CreateJobObjectW
  - id: assign-process-job-object
    desc: Assign process to job object
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: AssignProcessToJobObject
  - id: set-job-object-information
    desc: Set job object limits
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: SetInformationJobObject
composite_rules:
  - id: job-object-control
    desc: Create and configure job object
    crit: notable
    conf: 0.94
    all:
      - id: create-job-object
      - id: assign-process-job-object
      - id: set-job-object-information
