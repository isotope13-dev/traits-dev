defaults:
  for: [elf, macho, c]
  platforms:
    - unix
traits:
  - id: getrlimit
    desc: Query resource limits for process
    crit: baseline
    mbc: E1082
    attack: T1082
    conf: 0.4
    if:
      type: symbol
      regex: getrlimit
  - id: setrlimit
    desc: Set resource limits for process
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: setrlimit
