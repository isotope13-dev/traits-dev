defaults:
  for: [elf, macho, c]
  platforms:
    - linux
    - macos
traits:
  - id: shell-ulimit-file-descriptor-limit
    desc: Shell sets file descriptor limit
    crit: notable
    conf: 0.9
    for: [shell]
    platforms: [unix]
    if:
      type: symbol
      kind: call
      exact: ulimit
      arg:
        kind: identifier
        name: -n
  - id: getrlimit
    desc: Query resource limits for process
    crit: baseline
    mbc: E1082
    attack: T1082
    conf: 0.4
    if:
      type: symbol
      regex: getrlimit
  - id: setrlimit
    desc: Set resource limits for process
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: setrlimit
