# Windows threading API references.
#
# Pure capability atoms — these names being present in a binary means
# it can spawn threads. Notable on their own (defines program purpose:
# "this code is multithreaded"), with composites in objectives/ for
# the suspicious combinations (e.g. CreateRemoteThread for injection).
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: create-thread-text
    desc: CreateThread API name reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: CreateThread
