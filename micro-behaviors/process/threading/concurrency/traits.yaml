defaults:
  platforms: [windows, linux, macos]
  for: [go]
traits:
  - id: pthread
    desc: pthread threading library
    crit: baseline
    conf: 0.5
    for: [elf, macho, c, cpp]
    if:
      type: symbol
      regex: pthread_create
  - id: goroutine
    desc: Go goroutine concurrency
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: goroutine\s+\d+|runtime\.goroutine
  - id: go-runtime-gomaxprocs-call
    desc: Go runtime GOMAXPROCS call
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: runtime.GOMAXPROCS
  - id: go-runtime-lock-osthread-call
    desc: Go runtime LockOSThread call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: runtime.LockOSThread
