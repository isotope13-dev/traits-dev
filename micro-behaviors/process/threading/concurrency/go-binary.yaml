defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]

traits:
  - id: go-runtime-gomaxprocs-text
    desc: Go runtime GOMAXPROCS text
    crit: baseline
    conf: 0.76
    if:
      type: text
      substr: runtime.GOMAXPROCS
  - id: go-runtime-lock-osthread-text
    desc: Go runtime LockOSThread text
    crit: baseline
    conf: 0.86
    platforms: [windows]
    for: [pe]
    if:
      type: text
      substr: runtime.LockOSThread
  - id: go-runtime-lock-osthread-elf-bytes
    desc: Go runtime LockOSThread ELF bytes
    crit: baseline
    conf: 0.86
    platforms: [unix]
    for: [elf]
    if:
      type: hex
      section: .gopclntab
      pattern: 72 75 6E 74 69 6D 65 2E 4C 6F 63 6B 4F 53 54 68 72 65 61 64
  - id: go-runtime-lock-osthread-macho-bytes
    desc: Go runtime LockOSThread Mach-O bytes
    crit: baseline
    conf: 0.86
    platforms: [macos]
    for: [macho]
    if:
      type: hex
      section: __gopclntab
      pattern: 72 75 6E 74 69 6D 65 2E 4C 6F 63 6B 4F 53 54 68 72 65 61 64

composite_rules:
  - id: go-runtime-lock-osthread-binary
    desc: Go runtime LockOSThread binary
    crit: baseline
    conf: 0.86
    any:
      - id: go-runtime-lock-osthread-text
      - id: go-runtime-lock-osthread-elf-bytes
      - id: go-runtime-lock-osthread-macho-bytes
