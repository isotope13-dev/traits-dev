defaults:
  platforms: [windows]
  for: [pe]
  attack: T1129
traits:
- id: srw-lock-acquire
  desc: SRW lock acquisition
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    exact: AcquireSRWLockExclusive
- id: srw-lock-release
  desc: SRW lock release
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    exact: ReleaseSRWLockExclusive
- id: srw-lock-shared--acquiresrwlockshared
  desc: SRW shared lock read (AcquireSRWLockShared)
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    regex: AcquireSRWLockShared
- id: srw-lock-shared--releasesrwlockshared
  desc: SRW shared lock read (ReleaseSRWLockShared)
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    regex: ReleaseSRWLockShared
- id: condition-variable-wait--sleepconditionvariablesrw
  desc: Condition variable (SleepConditionVariableSRW)
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    regex: SleepConditionVariableSRW
- id: condition-variable-wait--sleepconditionvariablecs
  desc: Condition variable (SleepConditionVariableCS)
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    regex: SleepConditionVariableCS
- id: condition-variable-signal--wakeconditionvariable
  desc: Condition variable (WakeConditionVariable)
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    regex: WakeConditionVariable
- id: condition-variable-signal--wakeallconditionvariable
  desc: Condition variable (WakeAllConditionVariable)
  crit: baseline
  conf: 0.65
  if:
    type: symbol
    regex: WakeAllConditionVariable
composite_rules:
  # Combined slist operations
- id: srw-lock-shared
  desc: SRW shared lock read
  crit: baseline
  conf: 0.65
  any:
  - id: srw-lock-shared--acquiresrwlockshared
  - id: srw-lock-shared--releasesrwlockshared
- id: condition-variable-wait
  desc: Condition variable wait
  crit: baseline
  conf: 0.65
  any:
  - id: condition-variable-wait--sleepconditionvariablesrw
  - id: condition-variable-wait--sleepconditionvariablecs
- id: condition-variable-signal
  desc: Condition variable signal
  crit: baseline
  conf: 0.65
  any:
  - id: condition-variable-signal--wakeconditionvariable
  - id: condition-variable-signal--wakeallconditionvariable
- id: slist-operations
  desc: Interlocked SList operations
  crit: baseline
  conf: 0.65
  any:
  - id: micro-behaviors/mem/sync/mutex::interlocked-flush-slist
  - id: micro-behaviors/mem/sync/mutex::interlocked-push-entry-slist
  - id: micro-behaviors/mem/sync/mutex::interlocked-pop-entry-slist
- id: srw-lock-ops
  desc: SRW lock operations
  crit: baseline
  conf: 0.7
  needs: 2
  any:
  - id: srw-lock-acquire
  - id: srw-lock-release
  - id: srw-lock-shared
- id: condition-variable-ops
  desc: Condition variable ops
  crit: baseline
  conf: 0.7
  any:
  - id: condition-variable-wait
  - id: condition-variable-signal
- id: slist-sync-ops
  desc: Interlocked SList sync
  crit: baseline
  conf: 0.7
  all:
  - id: micro-behaviors/mem/sync/mutex::initialize-slist-head
  - id: slist-operations
- id: advanced-sync-primitives
  desc: Advanced sync primitives
  crit: baseline
  conf: 0.75
  needs: 2
  any:
  - id: srw-lock-ops
  - id: condition-variable-ops
  - id: slist-sync-ops
- id: advanced-sync-server
  desc: Advanced server infrastructure
  crit: baseline
  conf: 0.8
  mbc: E1030
  all:
  - id: micro-behaviors/process/create/
  - id: advanced-sync-primitives
