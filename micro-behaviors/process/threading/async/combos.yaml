# Process Threading Patterns
# Local thread-based execution (not cross-process injection)
# Example: Chrysalis loader2 thread coordination
defaults:
  platforms: [windows]
  for: ["pe"]
composite_rules:
  # === Thread Message Queue ===
  - id: thread-message-sync
    desc: Thread synchronization via message queue
    crit: baseline
    conf: 0.80
    all:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/os/message/queue::peek-message-a
        # === Threaded Worker Pool ===
  - id: worker-pool-comp
    desc: Worker threads with synchronization
    crit: baseline
    conf: 0.75
    all:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/os/exception/handler::capture-context
        # === Background Executor ===
  - id: background-execution
    desc: Background thread with exception handling
    crit: notable
    conf: 0.80
    all:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/os/exception/register::rtl-add-function-table
      - id: micro-behaviors/os/exception/handler::virtual-unwind
