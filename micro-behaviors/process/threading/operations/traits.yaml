defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [scripts, binaries, source]
traits:
  - id: pthread
    desc: pthread threading library
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: pthread_create
  - id: goroutine
    desc: Go goroutine concurrency
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: goroutine\s+\d+|runtime\.goroutine
composite_rules:
  - id: concurrent
    desc: Threading/concurrency indicators
    crit: baseline
    any:
      - id: pthread
      - id: goroutine
