defaults:
  platforms: [linux]
  for: [c, cpp, rust, go]
  mbc: B0033

traits:
  - id: ptrace-pokedata-request-constant
    desc: ptrace POKEDATA memory-write request constant
    crit: notable
    conf: 0.98
    attack: T1055.008
    platforms: [linux, android]
    for: [elf]
    if:
      type: text
      substr: PTRACE_REQUEST_POKEDATA

  - id: ptrace-poke-source-call
    desc: Calls ptrace with a POKE request
    crit: notable
    conf: 0.88
    attack: T1055
    if:
      type: text
      regex: '\bptrace\s*\(\s*PTRACE_POKE(TEXT|DATA|USER)\b'
    unless:
      - id: metadata/lang/source/
      - id: well-known/lib/rust-system-bindings::rust-syscall-binding-crate
      - id: well-known/lib/benign-runtime-bundles::node-source-tree
      - id: well-known/app/sudo::source-tree
