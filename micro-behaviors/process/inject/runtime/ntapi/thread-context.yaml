defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1055
traits:
  - id: nt-write-virtual-memory
    desc: XOR-hidden remote memory write API
    crit: suspicious
    conf: 0.9
    mbc: C0032
    if:
      type: encoded
      encoding: xor
      substr: NtWriteVirtualMemory
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/binary/metrics/threshold::many-exports-100

  - id: xor-nt-get-context-thread
    desc: XOR-hidden thread register read API
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      substr: NtGetContextThread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/structural::many-imports

  - id: xor-nt-set-context-thread
    desc: XOR-hidden thread hijack API
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      substr: NtSetContextThread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/structural::many-imports

  - id: nt-resume-thread
    desc: Resumes thread to run injected code
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NtResumeThread
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
      # Wine/ReactOS ntdll exports NtResumeThread as part of the API surface.
      - id: metadata/binary/vendor::windows-system-implementer-dll
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/structural::many-imports
