defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1055
traits:
  - id: nt-write-virtual-memory
    desc: XOR NtWriteVirtualMemory API reference
    crit: suspicious
    conf: 0.9
    mbc: C0032
    if:
      type: encoded
      encoding: xor
      substr: NtWriteVirtualMemory
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports
        - id: metadata/binary/metrics::many-exports-100

  - id: xor-nt-get-context-thread
    desc: XOR NtGetContextThread reference
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      substr: NtGetContextThread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports

  - id: xor-nt-set-context-thread
    desc: XOR NtSetContextThread reference
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      substr: NtSetContextThread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports

  - id: nt-resume-thread
    desc: NtResumeThread API reference
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NtResumeThread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports
