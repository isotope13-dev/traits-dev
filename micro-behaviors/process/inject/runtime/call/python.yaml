# Cross-process memory writes through Python's pymem library.
defaults:
  for: [python]
  platforms: [windows]
  crit: notable
  conf: 0.92

traits:
  - id: pymem-process-attach
    desc: Attaches pymem to a target process
    if:
      type: symbol
      kind: call
      exact: Pymem

  - id: pymem-memory-write
    desc: Writes target process memory with pymem
    mbc: C0032
    attack: T1055
    if:
      type: symbol
      kind: call
      regex: '^pymem\.write(_[A-Za-z0-9_]+)?$'
