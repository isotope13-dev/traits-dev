# Windows process-injection runtime primitives. These are the raw API
# capabilities (memory read/write into another process, remote thread
# creation, APC queue, thread context manipulation, suspend/resume).
# Neutral capability tier per TAXONOMY.md — intent is inferred by the
# composite in `objectives/evasion/process/injection/thread-hijacking.yaml`
# and related composites, which reference these IDs across tiers.
defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: write-process-memory-binary
    desc: WriteProcessMemory API reference
    crit: notable
    conf: 0.95
    attack: T1055
    mbc: C0032
    if:
      type: symbol
      exact: WriteProcessMemory
    unless:
      - id: metadata/package/quality::common-fp-context
    downgrade:
      any:
        - id: metadata/package/quality::common-fp-context
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
        - id: metadata/lang/compiled::go-runtime-marker
  - id: write-process-memory-source
    desc: WriteProcessMemory API reference in source
    crit: notable
    conf: 0.95
    attack: T1055
    mbc: C0032
    for: [c, cpp, csharp, python]
    if:
      type: symbol
      exact: WriteProcessMemory
    unless:
      - id: well-known/tool/development/debugpy
      - id: well-known/tool/development/debugpy::package-path-marker
    downgrade:
      any:
        - type: basename
          regex: '(?i)(debugpy|pydevd|inject_dll\.cpp)'
        - type: text
          regex: '(debugpy|pydevd_attach_to_process|pydevd)'
  - id: write-process-memory-script
    desc: WriteProcessMemory API reference in script
    crit: notable
    conf: 0.95
    attack: T1055
    mbc: C0032
    for: [powershell, batch, vbs, javascript]
    if:
      type: symbol
      exact: WriteProcessMemory
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: read-process-memory
    desc: References ReadProcessMemory process read API
    crit: notable
    conf: 0.95
    attack: T1005
    if:
      type: text
      word: ReadProcessMemory
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/package/quality::common-fp-context
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
    downgrade:
      any:
        - id: metadata/package/quality::common-fp-context
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
  - id: queue-user-apc
    desc: QueueUserAPC API reference
    crit: notable
    conf: 0.95
    attack: T1055.004
    mbc: B0018
    for: [pe, dll, c, cpp]
    if:
      type: text
      word: QueueUserAPC
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    downgrade:
      any:
        - id: metadata/package/quality::common-fp-context
        - id: metadata/package/quality::common-fp-context
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/signed/platform::microsoft-corporation
        - id: well-known/app/microsoft-csharp-compiler::microsoft-csharp-compiler-bundle
  - id: native-remote-thread-create
    desc: Native remote thread creation API
    crit: suspicious
    conf: 0.97
    attack: T1055.001
    mbc: B0013
    for: [pe, dll, c, cpp, csharp, python]
    if:
      type: symbol
      regex: ^(NtCreateThreadEx|RtlCreateUserThread)$
# The thread-context primitives below are used by the Go runtime for GC
# stop-the-world and goroutine preemption, and by Microsoft Detours, Valve
# games, and OllyDbg plugins — all legitimate. Downgrade when any of those
# runtimes are present so only deliberate use (composite `thread-execution-hijacking`)
# surfaces as a finding.
  - id: set-thread-context-dup
    desc: SetThreadContext API reference
    crit: notable
    conf: 0.95
    attack: T1055
    if:
      type: text
      substr: SetThreadContext
    downgrade:
      any:
        - id: metadata/package/quality::common-fp-context
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    unless:
      - type: basename
        regex: \.pyd$
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: get-thread-context-dup
    desc: GetThreadContext API reference
    crit: notable
    conf: 0.9
    attack: T1005
    if:
      type: text
      substr: GetThreadContext
    downgrade:
      any:
        - id: metadata/package/quality::common-fp-context
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    unless:
      - type: basename
        regex: \.pyd$
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: suspend-thread
    desc: SuspendThread API reference
    crit: notable
    conf: 0.9
    attack: T1055
    if:
      type: text
      exact: SuspendThread
    count_min: 3
    downgrade:
      any:
        - id: metadata/package/quality::common-fp-context
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
    unless:
      - type: basename
        regex: \.pyd$
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: resume-thread-dup
    desc: ResumeThread API reference
    crit: baseline
    conf: 0.9
    attack: T1055
    if:
      type: text
      word: ResumeThread
    unless:
      - type: basename
        regex: \.pyd$
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
    downgrade:
      any:
        - id: well-known/tool/development/debugpy::attach-helper-path
# Note: the extended-remote-thread symbol trait
# (`CreateRemoteThreadEx` / `NtCreateThreadEx` / `RtlCreateUserThread`) lives in
# `objectives/evasion/fileless/memory::create-thread-sym` — injection-tier
# composites that want it reference that ID directly, avoiding duplication here.
  - id: mavinject-injectrunning-string
    desc: App-V mavinject /INJECTRUNNING injection flag
    crit: suspicious
    conf: 0.95
    attack: T1105
    if:
      type: text
      exact: /INJECTRUNNING
  - id: binaryinjector-header-ref
    desc: binaryinjector.h source header reference
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: binaryinjector.h
  - id: onenote-elevation-pdb
    desc: OneNote elevation server PDB path
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: onelev.pdb
composite_rules:
  - id: create-remote-thread-dup
    desc: Remote thread creation API reference
    crit: notable
    conf: 0.98
    attack: T1055.001
    mbc: B0013
    for: [pe, dll, c, cpp, csharp, python]
    any:
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/process/inject/dll::create-remote-thread-csharp
      - id: native-remote-thread-create
    downgrade:
      any:
        - id: metadata/package/quality::common-fp-context
        - id: metadata/package/quality::common-fp-context
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
        - id: well-known/tool/development/debugpy::attach-helper-path
        - id: well-known/lib/electron::v8-isolate-marker
  - id: write-process-memory-dup
    desc: WriteProcessMemory API reference
    crit: notable
    conf: 0.95
    attack: T1055
    mbc: C0032
    for: [binaries, source, scripts]
    any:
      - id: write-process-memory-binary
      - id: write-process-memory-source
      - id: write-process-memory-script
