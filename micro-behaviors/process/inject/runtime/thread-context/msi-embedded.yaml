defaults:
  platforms: [windows]
  for: [oledoc, ole]
  crit: notable
  conf: 0.9
  attack: T1055

traits:
  - id: msi-embedded-write-process-memory
    desc: MSI embedded WriteProcessMemory reference
    if:
      type: raw
      substr: WriteProcessMemory

  - id: msi-embedded-get-thread-context
    desc: MSI embedded GetThreadContext reference
    if:
      type: raw
      substr: GetThreadContext

  - id: msi-embedded-set-thread-context
    desc: MSI embedded SetThreadContext reference
    if:
      type: raw
      substr: SetThreadContext

  - id: msi-embedded-resume-thread
    desc: MSI embedded ResumeThread reference
    if:
      type: raw
      substr: ResumeThread
