defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits: []
composite_rules:
  - id: thread-context-pair-suspend-get
    desc: Suspend plus get context
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup

  - id: thread-context-pair-suspend-set
    desc: Suspend plus set context
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup

  - id: thread-context-pair-suspend-resume
    desc: Suspend plus resume thread
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup

  - id: thread-context-pair-get-set
    desc: Get and set context
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup

  - id: thread-context-pair-get-resume
    desc: Get context plus resume
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup

  - id: thread-context-pair-set-resume
    desc: Set context plus resume
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup

  - id: thread-context-triple-no-suspend
    desc: Get set resume thread context
    crit: component
    conf: 0.88
    all:
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup

  - id: thread-context-triple-no-get
    desc: Suspend set resume thread context
    crit: component
    conf: 0.88
    all:
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup

  - id: thread-context-triple-no-set
    desc: Suspend get resume thread context
    crit: component
    conf: 0.88
    all:
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup

  - id: thread-context-triple-no-resume
    desc: Suspend get set thread context
    crit: component
    conf: 0.88
    all:
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup

  - id: thread-context-apis-2of4
    desc: Two thread context APIs
    crit: component
    conf: 0.85
    any:
      - id: thread-context-pair-suspend-get
      - id: thread-context-pair-suspend-set
      - id: thread-context-pair-suspend-resume
      - id: thread-context-pair-get-set
      - id: thread-context-pair-get-resume
      - id: thread-context-pair-set-resume

  - id: thread-context-apis-3of4
    desc: Three thread context APIs
    crit: component
    conf: 0.9
    any:
      - id: thread-context-triple-no-suspend
      - id: thread-context-triple-no-get
      - id: thread-context-triple-no-set
      - id: thread-context-triple-no-resume
