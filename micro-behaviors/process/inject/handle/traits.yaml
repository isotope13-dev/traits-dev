# Remote handle manipulation
# Cross-process handle operations: duplicate, close, query handles in other processes
# Used by file unlockers, handle hijacking, ransomware, and security tool evasion
defaults:
  platforms: [windows]
traits:
  - id: remote-close-handle
    desc: Force-close handle in remote process
    crit: suspicious
    conf: 0.85
    attack: "T1562"
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: "[Rr]emote[Cc]lose[Hh]andle"
  - id: nt-duplicate-object
    desc: Duplicate handle via NT API
    crit: suspicious
    conf: 0.85
    for: [pe, dll]
    if:
      type: symbol
      exact: "NtDuplicateObject"
    unless:
      # Wine/ReactOS ntdll implements and exports NtDuplicateObject — it provides
      # the API rather than abusing it, so suppress rather than merely downgrade.
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/tool/sysadmin/chroot-win::chroot-windows-component
    downgrade:
      any:
        - id: well-known/tool/sysadmin/systeminformer::systeminformer-product
        - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
  - id: is-file-object
    desc: Handle type classification as file object
    crit: notable
    conf: 0.75
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: "[Ii]s[Ff]ile[Oo]bj"
  - id: is-disk-file
    desc: Handle classification as disk file
    crit: notable
    conf: 0.75
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: "[Ii]s[Dd]isk[Ff]ile"
  - id: get-file-path-from-handle
    desc: Resolve file path from handle
    crit: notable
    conf: 0.75
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: "[Gg]et[Ff]ile[Pp]ath.{0,20}[Hh]"
  - id: nt-close
    desc: Close handle via NT API
    crit: notable
    conf: 0.80
    for: [pe, dll]
    if:
      type: symbol
      exact: "NtClose"
