# DLL Injection Methods
# Detects common APIs and techniques for DLL/SO injection
# MBC: F0003 (Process Injection)
# ATT&CK: T1055.001 (Dynamic-link Library Injection)
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, c, cpp, pe]
  crit: notable
  conf: 0.95
  attack: "T1055.001"
  mbc: "F0003"
traits:
  - id: python-injectdll-helper
    desc: Python InjectDLL helper function
    platforms: [windows]
    for: [python]
    if:
      type: function
      exact: InjectDLL
  - id: create-remote-thread
    desc: CreateRemoteThread API reference
    if:
      type: symbol
      regex: 'CreateRemoteThread'
    unless:
      - id: well-known/game/mod::bedrockboot-preload-injector-pdb
  - id: create-remote-thread-source
    desc: Source CreateRemoteThread reference
    for: [csharp, rust]
    if:
      type: symbol
      exact: CreateRemoteThread
  - id: create-remote-thread-python-source
    desc: Python CreateRemoteThread call
    platforms: [windows]
    for: [python]
    if:
      type: symbol
      kind: call
      exact: CreateRemoteThread

composite_rules:
  - id: python-remote-dll-injection-chain
    desc: Python remote-DLL injection API chain
    platforms: [windows]
    for: [python]
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-python-source
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
      - id: create-remote-thread-python-source
