# DLL Injection Methods
# Detects common APIs and techniques for DLL/SO injection
# MBC: F0003 (Process Injection)
# ATT&CK: T1055.001 (Dynamic-link Library Injection)
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, c, cpp, pe]
  crit: notable
  conf: 0.95
  attack: "T1055.001"
  mbc: "F0003"
traits:
  - id: write-process-memory
    desc: WriteProcessMemory API reference
    if:
      type: symbol
      regex: 'WriteProcessMemory'
  - id: create-remote-thread
    desc: CreateRemoteThread API reference
    if:
      type: symbol
      regex: 'CreateRemoteThread'
  - id: load-library-a-dup
    desc: LoadLibraryA API reference
    for: [python, javascript, typescript, c, cpp]
    if:
      type: symbol
      regex: 'LoadLibraryA'
  - id: load-library-a-remote-resolution
    desc: Dynamic LoadLibraryA resolution for remote injection
    crit: notable
    conf: 0.95
    for: [pe, dll]
    if:
      type: text
      word: LoadLibraryA
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/vendor::microsoft-corp-marker
