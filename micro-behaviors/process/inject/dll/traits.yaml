# DLL Injection Methods
# Detects common APIs and techniques for DLL/SO injection
# MBC: F0003 (Process Injection)
# ATT&CK: T1055.001 (Dynamic-link Library Injection)
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, c, cpp, pe]
  crit: notable
  conf: 0.95
  attack: "T1055.001"
  mbc: "F0003"
traits:
  - id: create-remote-thread
    desc: CreateRemoteThread API reference
    if:
      type: symbol
      regex: 'CreateRemoteThread'
    unless:
      - id: well-known/game/mod::bedrockboot-preload-injector-pdb
  - id: create-remote-thread-source
    desc: Source CreateRemoteThread reference
    for: [csharp, rust]
    if:
      type: symbol
      exact: CreateRemoteThread
  - id: create-remote-thread-python-source
    desc: Python CreateRemoteThread call
    platforms: [windows]
    for: [python]
    if:
      type: symbol
      kind: call
      exact: CreateRemoteThread
