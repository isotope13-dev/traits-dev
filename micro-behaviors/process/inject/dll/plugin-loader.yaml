# Plugin loader architecture strings.
# Malware loaders that load external DLL plugins with a specific "Execute"
# export pattern. Error strings reference plugin lifecycle management.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: plugin-execute-export
    desc: Plugin Execute export string reference
    if:
      type: text
      exact: "Export 'Execute' not found"
  - id: plugin-std-exception
    desc: Plugin standard exception error string
    if:
      type: text
      exact: "[ERROR] Plugin Std Exception:"
  - id: plugin-terminated
    desc: Plugin termination status string
    if:
      type: text
      exact: "[SYSTEM] Plugin terminated successfully."
  - id: plugin-id-mismatch
    desc: Plugin ID mismatch error string
    if:
      type: text
      exact: "[ERROR] Plugin not found (ID Mismatch)."
