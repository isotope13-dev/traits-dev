defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055"
  mbc: "E1055"
traits:
  - id: initialize-kernel-apc
    desc: Initialize kernel APC object
    crit: baseline
    conf: 0.96
    if:
      type: symbol
      exact: "KeInitializeApc"
  - id: queue-kernel-apc
    desc: Queue kernel APC delivery
    crit: baseline
    conf: 0.96
    if:
      type: symbol
      exact: "KeInsertQueueApc"
  - id: lookup-thread-by-id
    desc: Resolve thread object by ID
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "PsLookupThreadByThreadId"
  - id: remote-virtual-memory
    desc: Allocate remote process memory
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: "ZwAllocateVirtualMemory"
composite_rules:
  - id: kernel-apc-injection-primitives
    desc: Kernel APC injection primitives
    crit: suspicious
    conf: 0.97
    all:
      - id: initialize-kernel-apc
      - id: queue-kernel-apc
      - id: lookup-thread-by-id
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
