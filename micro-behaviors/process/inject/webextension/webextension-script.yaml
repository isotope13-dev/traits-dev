# Browser-extension code/CSS injection into page contexts (chrome.scripting,
# MV2 tabs.executeScript, runtime.getURL-fed script element). Generic technique:
# injecting code into another execution context.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-scripting-api
    desc: Chrome scripting API usage
    if:
      type: text
      regex: 'chrome\.scripting\.[A-Za-z_]'
  - id: chrome-scripting-execute
    desc: Chrome scripting executeScript injection
    if:
      type: text
      regex: '(chrome|browser)\.scripting\.executeScript\b'
  - id: chrome-scripting-insert-css
    desc: Chrome scripting insertCSS injection
    crit: baseline
    if:
      type: text
      regex: '(chrome|browser)\.scripting\.insertCSS\b'
  - id: chrome-tabs-execute-script
    desc: MV2 tabs.executeScript injection
    if:
      type: text
      regex: '(chrome|browser)\.tabs\.executeScript\b'
composite_rules:
  - id: extension-page-script-injection
    desc: Extension injects page script
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-create-script-element
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-get-url
  - id: active-tab-scripting-execute
    desc: Extension injects active tab script
    crit: suspicious
    conf: 0.94
    ref: sha256:14e6689d364517cfb12e021b84a1ef2e97550a387fcadde09fe40c706098410a
    scope: archive
    all:
      - id: chrome-scripting-execute
      - id: metadata/permission/manifest::permission-scripting
      - id: metadata/permission/active-tab::permission-active-tab
