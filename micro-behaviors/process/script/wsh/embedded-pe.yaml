defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: xmlhttp-createobject
    desc: Embedded XMLHTTP COM script
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: (ActiveXObject|WScript\.CreateObject)\(['"]Microsoft\.XMLHTTP['"]\)

  - id: adodb-stream-createobject
    desc: Embedded ADODB stream script
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: WScript\.CreateObject\(['"]ADODB\.Stream['"]\)

  - id: wscript-arguments-item
    desc: Embedded WScript argument item
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: WScript.Arguments.Item(

  - id: target-overwrite-save
    desc: Script saves payload over target
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: SaveToFile\((T|t)arget,\s*2\)

  - id: target-delete-before-save
    desc: Script deletes target before save
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: DeleteFile\((T|t)arget\)

  - id: status-telemetry-parameters
    desc: Script reports status query flags
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: script_(error|success)4=1

  - id: wsh-powershell-base64-decode
    desc: Embedded WSH decodes Base64 text for PowerShell
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: '[System.Convert]::FromBase64String'

  - id: wsh-powershell-scriptblock-create
    desc: Embedded WSH creates a PowerShell ScriptBlock
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: '[scriptblock]::Create'

  - id: wsh-shell-run-hidden
    desc: Embedded WSH hidden command run
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)\.Run\s+[A-Za-z_][A-Za-z0-9_]*\s*,\s*0\s*,\s*True\b'

  - id: wsh-obfuscated-base64-fragments
    desc: WSH assembles encoded fragments
    crit: notable
    conf: 0.96
    count_min: 3
    if:
      type: text
      regex: '(?i)\bCall\s+[A-Za-z_][A-Za-z0-9_]*\s*\(\s*["''][A-Za-z0-9+/=@]{24,}["'']\s*\)'

composite_rules:
  - id: embedded-http-file-dropper
    desc: Embedded WSH HTTP file dropper
    crit: suspicious
    conf: 0.96
    all:
      - id: xmlhttp-createobject
      - id: adodb-stream-createobject
      - id: target-overwrite-save
    any:
      - id: target-delete-before-save
      - id: wscript-arguments-item

  - id: embedded-http-status-telemetry
    desc: Embedded WSH status telemetry
    crit: suspicious
    conf: 0.94
    all:
      - id: xmlhttp-createobject
      - id: status-telemetry-parameters
