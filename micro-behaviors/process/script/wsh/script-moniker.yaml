defaults:
  platforms: [windows]
  for: [scripts, binaries]
traits:
  - id: script-moniker-url
    desc: 'String containing a script: URL moniker'
    crit: suspicious
    if:
      type: text
      regex: (?i)script:https?://
    unless:
      - id: metadata/file/profile/identity::generated-attack-map-context
  - id: wsh-getobject-url-moniker
    desc: WSH GetObject URL moniker
    crit: suspicious
    size_min: 10000
    for:
      - javascript
      - html
    # Match only the WSH-style bare-name `GetObject("...")` with a moniker
    # or ProgID string-literal argument — this is the COM/scripting form
    # malware uses (`GetObject("script:http://…")`, `GetObject("new:GUID")`,
    # etc.). Microsoft HTML Help Workshop's `ehlpdhtm.js` defines a
    # user-namespaced `CCSSP.GetObject = function(...)` and calls it as
    # `CCSSP.GetObject(...)`, which is unrelated to WSH and was triggering
    # false positives — keying on `(?:script:|new:|ProgID:|"\w+\.\w+)` in
    # the first argument keeps the attack form and excludes the method-on-
    # an-object usage.
    if:
      type: text
      regex: '\bGetObject\s*\(\s*["''](script:|new:|ProgID:)'
    not:
      - substr: "declare function GetObject("
      - substr: "Retrieves an existing object with the specified ProgID"
    unless:
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - type: basename
        regex: '(?i)(^|[\\/!]).*(test|tests)[^\\/!]*\.(js|html?)$'
  - id: wsh-getobject-directory-moniker
    desc: WSH GetObject directory moniker
    crit: suspicious
    size_min: 10000
    for:
      - javascript
      - html
    if:
      type: text
      regex: '\bGetObject\s*\(\s*["''](winmgmts:|LDAP:|WinNT:|IIS:)'
    not:
      - substr: "declare function GetObject("
      - substr: "Retrieves an existing object with the specified ProgID"
    unless:
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/document/html/
      - type: text
        substr: codeSnippetLink
      - type: text
        substr: Doxygen
      - type: text
        substr: Generated by
      - type: text
        substr: '#get base LDAP string'
      - type: basename
        regex: '(?i)(^|[\\/!]).*(test|tests)[^\\/!]*\.(js|html?)$'
  - id: wsh-getobject-progid
    desc: WSH GetObject ProgID
    crit: suspicious
    size_min: 10000
    for:
      - javascript
      - html
    if:
      type: text
      regex: '\bGetObject\s*\(\s*["''][A-Za-z][\w]*\.[A-Za-z]'
    not:
      - substr: "declare function GetObject("
      - substr: "Retrieves an existing object with the specified ProgID"
    unless:
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - type: basename
        regex: '(?i)(^|[\\/!]).*(test|tests)[^\\/!]*\.(js|html?)$'
composite_rules:
  - id: wsh-getobject-call
    desc: WSH GetObject moniker call
    crit: suspicious
    any:
      - id: wsh-getobject-url-moniker
      - id: wsh-getobject-directory-moniker
      - id: wsh-getobject-progid
