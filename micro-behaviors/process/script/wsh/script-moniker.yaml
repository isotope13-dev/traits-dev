defaults:
  # WSH monikers are meaningful in script contexts, not arbitrary native binaries.
  for: [javascript, vbs, html]

traits:
  - id: script-moniker-url
    desc: "String containing a script: URL moniker"
    crit: suspicious
    if:
      type: string
      regex: '(?i)script:https?://'

  - id: wsh-getobject-call
    desc: "String containing a GetObject call"
    crit: suspicious
    if:
      type: string
      regex: '(?i)\bGetObject\s*\('
