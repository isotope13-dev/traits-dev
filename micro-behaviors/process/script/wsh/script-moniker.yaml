defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - vbs
    - html
traits:
  - id: script-moniker-url
    desc: 'String containing a script: URL moniker'
    crit: suspicious
    if:
      type: text
      regex: (?i)script:https?://
  - id: wsh-getobject-call
    desc: String containing a GetObject call
    crit: suspicious
    size_min: 10000
    for:
      - javascript
      - html
    if:
      type: text
      regex: \bGetObject\s*\(
    not:
      - substr: "declare function GetObject("
      - regex: '^\s*GetObject\s*\(\w+:\s*\w+'
      - substr: "Retrieves an existing object with the specified ProgID"
