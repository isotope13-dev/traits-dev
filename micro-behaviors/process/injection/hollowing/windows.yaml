# Process Hollowing Detection
# Detects process hollowing / RunPE injection technique
# ATT&CK: T1055.012 (Process Injection: Process Hollowing)

defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1055.012"
  mbc: "E1055.012"

traits:
  # Process creation suspended
  - id: create-process-suspended
    desc: CREATE_SUSPENDED process flag
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "CREATE_SUSPENDED"

  - id: create-process-flags
    desc: CreateProcess with suspended flag (0x4)
    crit: notable
    conf: 0.65
    count_min: 2
    size_max: 2097152
    if:
      type: hex
      section: text
      pattern: "6a 04"

  # Section unmapping
  - id: nt-unmap-section
    desc: NtUnmapViewOfSection call
    crit: component
    conf: 0.85
    if:
      type: string
      substr: "NtUnmapViewOfSection"

  - id: zw-unmap-section
    desc: ZwUnmapViewOfSection call
    crit: component
    conf: 0.85
    if:
      type: string
      substr: "ZwUnmapViewOfSection"

  # virtual-alloc-ex: use canonical version from mem/protect/modify
  # (removed to avoid duplicate pattern)

  # nt-allocate-remote: use canonical version from os/syscall/raw::nt-allocate-ssn
  # (removed to avoid duplicate pattern)

  # Memory writing
  - id: write-process-memory
    desc: WriteProcessMemory call
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "WriteProcessMemory"

  # nt-write-virtual: use canonical version from os/syscall/raw::nt-write-ssn
  # (removed to avoid duplicate pattern)

  # Thread context manipulation
  - id: get-thread-context
    desc: GetThreadContext call
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "GetThreadContext"

  - id: set-thread-context
    desc: SetThreadContext call
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "SetThreadContext"

  - id: nt-get-context
    desc: NtGetContextThread call
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "NtGetContextThread"

  - id: nt-set-context
    desc: NtSetContextThread call
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "NtSetContextThread"

  # Thread resume
  - id: resume-thread
    desc: ResumeThread call
    crit: notable
    conf: 0.6
    if:
      type: string
      substr: "ResumeThread"

  - id: image-base-relocation
    desc: IMAGE_BASE_RELOCATION parsing
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "IMAGE_BASE_RELOCATION"

  # Legitimate Windows processes often targeted
  - id: svchost-target
    desc: svchost.exe target path
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: "(?i)system32[/\\\\]+svchost\\.exe"

  - id: dllhost-target
    desc: dllhost.exe target path
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: "(?i)system32[/\\\\]+dllhost\\.exe"

  - id: rundll32-target
    desc: rundll32.exe target path
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: "(?i)system32[/\\\\]+rundll32\\.exe"

composite_rules:
  # Section unmapping APIs
  - id: unmap-section-apis
    desc: Section unmapping APIs
    crit: component
    conf: 0.85
    any:
      - id: nt-unmap-section
      - id: zw-unmap-section

  # Memory writing APIs
  - id: memory-write-apis
    desc: Process memory writing APIs
    any:
      - id: write-process-memory
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn

  # Thread context APIs
  - id: thread-context-apis
    desc: Thread context manipulation APIs
    any:
      - id: get-thread-context
      - id: set-thread-context
      - id: nt-get-context
      - id: nt-set-context

  # Legitimate process targets
  - id: hollow-targets
    desc: Common process hollowing targets
    crit: notable
    conf: 0.75
    any:
      - id: svchost-target
      - id: dllhost-target
      - id: rundll32-target

  # Process hollowing primitives
  - id: hollowing-primitives
    desc: Process hollowing API primitives
    crit: suspicious
    conf: 0.9
    all:
      - id: create-process-suspended
      - id: unmap-section-apis
      - id: memory-write-apis
      - id: thread-context-apis
