# Process Name Manipulation
# MBC: B0001 (Defense Evasion)
# ATT&CK: T1036.004 (Masquerading: Process Name)
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  - id: nodejs-title
    desc: "Modify process title in NodeJS"
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: |
        process\.title\s*=
