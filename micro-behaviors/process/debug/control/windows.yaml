# Windows debugger-control APIs.
# These are neutral capabilities; intent is inferred by objective composites.
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.96

traits:
  - id: debug-active-process-stop-api
    desc: Detaches debugger from active process
    if:
      type: symbol
      exact: DebugActiveProcessStop

  - id: nt-remove-process-debug-api
    desc: Removes debugger from process
    if:
      type: text
      substr: NtRemoveProcessDebug

  - id: dbg-ui-set-debug-object-api
    desc: Sets thread debug object
    if:
      type: text
      substr: DbgUiSetThreadDebugObject

composite_rules:
  - id: debugger-control-api-cluster
    desc: Debugger attach and detach API cluster
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: micro-behaviors/process/debug/event::wait-for-debug-event
      - id: debug-active-process-stop-api
      - id: nt-remove-process-debug-api
      - id: dbg-ui-set-debug-object-api
