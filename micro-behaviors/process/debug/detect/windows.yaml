# Debugger Detection APIs — Windows
# Neutral debugging APIs used by both security tools and anti-debug code
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
traits:
  - id: is-debugger-present-import
    desc: References the IsDebuggerPresent API
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "IsDebuggerPresent"
    unless:
      - id: metadata/binary/linking/api-set::api-set-forwarder-dll
  - id: check-remote-debugger
    desc: CheckRemoteDebuggerPresent API
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "CheckRemoteDebuggerPresent"
