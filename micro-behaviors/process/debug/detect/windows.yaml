# Debugger Detection APIs — Windows
# Neutral debugging APIs used by both security tools and anti-debug code
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
traits:
  - id: check-remote-debugger
    desc: CheckRemoteDebuggerPresent API
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "CheckRemoteDebuggerPresent"
