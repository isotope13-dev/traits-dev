defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]

traits:
  - id: gdb-name-reference
    desc: GDB debugger name reference
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)(^|[/\\\s])gdb(server)?([.\s:/\\-]|$)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/catalog/identity/
      - id: metadata/build/autotools::autoconf-generated-script
      - id: well-known/app/drivers/
      - id: well-known/tool/dual-use/mihomo::mihomo-comment-bundle
      # 7-Zip's file-extension association table lists `gdb` as a bare 3-letter
      # extension token among many (nsf ntf wdb db fdb gdb exe dll ...); the
      # `gdb` here is archive vocabulary, not a GDB debugger reference. Anchor
      # on the table's distinctive opening run so this stays scoped to 7-Zip.
      - type: text
        substr: "7z xz lzma ace arc arj bz tbz bz2 tbz2"

  - id: lldb-name-reference
    desc: LLDB debugger name reference
    crit: notable
    conf: 0.5
    if:
      type: text
      word: lldb

  - id: gdbserver-reference
    desc: GDB server reference in Python source
    crit: notable
    conf: 0.9
    for: [python, pyc]
    if:
      type: text
      word: gdbserver

  - id: gdb-debugger-text-marker
    desc: GDB debugger text marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)(GNU gdb|gdbserver|This GDB|This gdb)'

  - id: org-gnu-gdb-marker
    desc: org.gnu.gdb bundle identifier
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: org.gnu.gdb.

  - id: lldb-ptrace-text-marker
    desc: LLDB or ptrace text marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)(\blldb\b|LLDB_DEBUGSERVER_PATH|\bptrace_)'
