defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]

traits:
  - id: gdb-name-reference
    desc: GDB debugger name reference
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)(^|[/\\\s])gdb(server)?([.\s:/\\-]|$)'
    unless:
      - id: metadata/file/catalog/identity/
      - id: metadata/build/autotools::autoconf-generated-script
      - id: well-known/app/drivers/

  - id: lldb-name-reference
    desc: LLDB debugger name reference
    crit: notable
    conf: 0.5
    if:
      type: text
      word: lldb

  - id: gdbserver-reference
    desc: GDB server reference in Python source
    crit: notable
    conf: 0.9
    for: [python, pyc]
    if:
      type: text
      word: gdbserver

  - id: gdb-debugger-text-marker
    desc: GDB debugger text marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)(GNU gdb|gdbserver|This GDB|This gdb)'

  - id: org-gnu-gdb-marker
    desc: org.gnu.gdb bundle identifier
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: org.gnu.gdb.

  - id: lldb-ptrace-text-marker
    desc: LLDB or ptrace text marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)(\blldb\b|LLDB_DEBUGSERVER_PATH|\bptrace_)'
