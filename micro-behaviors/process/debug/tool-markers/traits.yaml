defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]

traits:
  - id: gdb-debugger-text-marker
    desc: GDB debugger text marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)(GNU gdb|gdbserver|This GDB|This gdb)'

  - id: org-gnu-gdb-marker
    desc: org.gnu.gdb bundle identifier
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: org.gnu.gdb.

  - id: lldb-ptrace-text-marker
    desc: LLDB or ptrace text marker
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)(\blldb\b|LLDB_DEBUGSERVER_PATH|\bptrace_)'
