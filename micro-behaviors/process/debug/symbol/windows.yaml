defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.85
traits:
  - id: sym-from-addr
    desc: Resolve symbol from address (imagehlp)
    attack: T1562.001
    if:
      type: symbol
      exact: "SymFromAddr"
  - id: sym-load-module
    desc: Load module symbols (imagehlp)
    if:
      type: symbol
      regex: "SymLoadModule(64)?"
  - id: sym-get-module-base
    desc: Get module base via symbol engine
    if:
      type: symbol
      regex: "SymGetModuleBase(64)?"
  - id: sym-unload-module
    desc: Unload module symbols (imagehlp)
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: "SymUnloadModule(64)?"
  - id: sym-find-file-in-path
    desc: Find symbol file on disk (imagehlp)
    if:
      type: symbol
      exact: "SymFindFileInPath"
  - id: remove-relocations
    desc: Remove PE relocation table (imagehlp)
    crit: suspicious
    conf: 0.92
    attack: T1027
    unless:
      - id: well-known/lib/wine::wine-runtime-component
    if:
      type: symbol
      exact: "RemoveRelocations"
  - id: image-enumerate-certs
    desc: Enumerate PE digital certificates
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "ImageEnumerateCertificates"
composite_rules:
  - id: imagehlp-symbol-enumeration
    desc: imagehlp symbol resolution suite
    crit: notable
    conf: 0.9
    attack: T1562.001
    any:
      - id: sym-from-addr
      - id: sym-load-module
      - id: sym-get-module-base
      - id: sym-find-file-in-path
