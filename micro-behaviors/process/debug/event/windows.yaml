# Windows Debug Event Loop APIs
# Core APIs used by debuggers to control debuggee processes
defaults:
  for: [pe]
  platforms: [windows]
  crit: notable
  conf: 0.85
traits:
  - id: debug-event-dispatch-sub-ladder
    desc: Debug event dispatching loop
    conf: 0.9
    if:
      type: hex
      # 8b 44 24 40 : mov eax, dword [rsp + 0x40] (dwDebugEventCode)
      # 83 e8 01    : sub eax, 1 (EXCEPTION_DEBUG_EVENT = 1)
      # 0f 84 ...   : je ...
      # 83 e8 01    : sub eax, 1 (CREATE_THREAD_DEBUG_EVENT = 2)
      pattern: "8b 44 24 40 83 e8 01 0f 84 ?? ?? 00 00 83 e8 01"
      section: .text
  - id: wait-for-debug-event
    desc: Wait for debug event from debuggee
    if:
      type: symbol
      exact: "WaitForDebugEvent"
  - id: continue-debug-event
    desc: Continue debuggee after debug event
    if:
      type: symbol
      exact: "ContinueDebugEvent"
  - id: debug-active-process
    desc: Attach debugger to running process
    if:
      type: symbol
      exact: "DebugActiveProcess"
