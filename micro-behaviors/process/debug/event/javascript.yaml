defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: debugger-statement
    desc: JavaScript debugger breakpoint statement
    crit: notable
    conf: 0.95
    if:
      type: tree-sitter
      query: '(debugger_statement) @debugger'
  - id: debugger-infinite-loop
    desc: Debugger breakpoint followed by infinite loop
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'debugger\s*;\s*while\s*\(\s*true\s*\)'
