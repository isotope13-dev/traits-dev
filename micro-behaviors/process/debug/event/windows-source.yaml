defaults:
  platforms: [windows]
  for: [source]
traits:
  - id: wait-for-debug-event-source
    desc: WaitForDebugEvent reference in source
    crit: notable
    conf: 0.9
    if:
      type: text
      word: WaitForDebugEvent
  - id: continue-debug-event-source
    desc: ContinueDebugEvent reference in source
    crit: notable
    conf: 0.9
    if:
      type: text
      word: ContinueDebugEvent
  - id: debug-process-flags-source
    desc: DEBUG_PROCESS child creation flags in source
    crit: notable
    conf: 0.92
    if:
      type: text
      word: DEBUG_ONLY_THIS_PROCESS+DEBUG_PROCESS
composite_rules:
  - id: debugger-event-loop-source
    desc: Built-in debugger event loop in source
    crit: suspicious
    conf: 0.97
    all:
      - id: wait-for-debug-event-source
      - id: continue-debug-event-source
      - id: debug-process-flags-source
