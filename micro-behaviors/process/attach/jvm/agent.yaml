defaults:
  platforms: [unix, windows]
  for: [binaries, java, class, jar, text]
  crit: notable
  conf: 0.9
  size_max: 536870912
traits:
  - id: jvm-profiler-agent-load
    desc: Loads a Java agent into running JVM
    if:
      type: text
      regex: '\bloadAgent(Path)?\s*\('
  - id: jvm-profiler-attach
    desc: Attaches to a running JVM (Attach API)
    if:
      type: text
      regex: '(?i)(tools[./]attach[./]VirtualMachine|VirtualMachine[./]attach)'

  - id: jvm-dynamic-attach-api-bytecode-com
    desc: JVM com.sun Attach API class reference
    crit: notable
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 63 6F 6D 2E 73 75 6E 2E 74 6F 6F 6C 73 2E 61 74 74 61 63 68 2E 56 69 72 74 75 61 6C 4D 61 63 68 69 6E 65

  - id: jvm-dynamic-attach-api-bytecode-sun
    desc: JVM sun Attach API class reference
    crit: notable
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 73 75 6E 2E 74 6F 6F 6C 73 2E 61 74 74 61 63 68 2E 56 69 72 74 75 61 6C 4D 61 63 68 69 6E 65

composite_rules:
  - id: jvm-dynamic-attach-api-bytecode
    desc: JVM dynamic attach API in bytecode
    crit: notable
    conf: 0.92
    for: [class, jar, zip]
    any:
      - id: jvm-dynamic-attach-api-bytecode-com
      - id: jvm-dynamic-attach-api-bytecode-sun
