defaults:
  platforms: [unix, windows]
  for: [binaries, java, class, jar, text]
  crit: notable
  conf: 0.9
  size_max: 536870912
traits:
  - id: jvm-profiler-agent-load
    desc: Dynamic JVM agent load via loadAgentPath
    if:
      type: text
      substr: loadAgentPath
  - id: jvm-profiler-attach
    desc: JVM attach API use (VirtualMachine.attach)
    if:
      type: text
      substr: VirtualMachine/attach
