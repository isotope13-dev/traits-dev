defaults:
  platforms: [unix, windows]
  for: [binaries, java, class, jar, text]
  crit: notable
  conf: 0.9
  size_max: 536870912
traits:
  - id: jvm-profiler-agent-load
    desc: Loads a Java agent into running JVM
    if:
      type: text
      regex: '\bloadAgent(Path)?\s*\('
  - id: jvm-profiler-attach
    desc: Attaches to a running JVM (Attach API)
    if:
      type: text
      regex: 'VirtualMachine[./]attach\b'
