defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: attach-process-address-space
    desc: Attach to foreign process address space
    crit: notable
    conf: 0.97
    attack: "T1055"
    if:
      type: symbol
      exact: "KeStackAttachProcess"
  - id: detach-process-address-space
    desc: Detach from foreign process address space
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: "KeUnstackDetachProcess"
  - id: lookup-process-by-id
    desc: Resolve process object by ID
    crit: notable
    conf: 0.92
    attack: "T1057"
    if:
      type: symbol
      exact: "PsLookupProcessByProcessId"
  - id: lookup-process-by-id-xoradd-string
    desc: Encoded PsLookupProcessByProcessId string
    crit: notable
    conf: 0.94
    attack: "T1057"
    if:
      type: text
      substr: 'dFzXWROKlOQ\%21'
  - id: query-process-peb
    desc: Query target process PEB
    crit: notable
    conf: 0.9
    attack: "T1055"
    if:
      type: symbol
      exact: "PsGetProcessPeb"
  - id: query-process-peb-xoradd-string
    desc: Encoded PsGetProcessPeb string
    crit: notable
    conf: 0.93
    attack: "T1055"
    if:
      type: text
      exact: dFqRLiHT_XML
  - id: process-image-name-xoradd-string
    desc: Encoded PsGetProcessImageFileName string
    crit: notable
    conf: 0.9
    attack: "T1057"
    if:
      type: text
      substr: 'dFqRLiHT_XML	,#$!'
  - id: lookup-process-by-id-atbash-string
    desc: Atbash-obfuscated process-ID lookup string
    crit: notable
    conf: 0.98
    attack: "T1057"
    if:
      type: text
      substr: 'KhOllpfkKilxvhhYbKilxvhhRw'
  - id: query-process-peb-atbash-string
    desc: Atbash-obfuscated PsGetProcessPeb string
    crit: notable
    conf: 0.96
    attack: "T1055"
    if:
      type: text
      substr: 'KhTvgKilxvhhKvy'
  - id: query-process-wow64-atbash-string
    desc: Atbash-obfuscated WOW64 process query string
    crit: notable
    conf: 0.96
    attack: "T1055"
    if:
      type: text
      substr: 'KhTvgKilxvhhDld64Kilxvhh'
composite_rules:
  - id: cross-process-address-space-attach
    desc: Cross process address space attach
    crit: suspicious
    conf: 0.97
    all:
      - id: attach-process-address-space
      - id: detach-process-address-space
      - id: lookup-process-by-id
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
        - id: metadata/signed/platform/
        - id: well-known/lib/wine/
  - id: hidden-process-object-access
    desc: Hidden process object access
    crit: suspicious
    conf: 0.95
    all:
      - id: lookup-process-by-id-xoradd-string
    any:
      - id: query-process-peb-xoradd-string
      - id: process-image-name-xoradd-string
  - id: atbash-process-object-access
    desc: Atbash-obfuscated process object access
    crit: suspicious
    conf: 0.98
    all:
      - id: lookup-process-by-id-atbash-string
    any:
      - id: query-process-peb-atbash-string
      - id: query-process-wow64-atbash-string
