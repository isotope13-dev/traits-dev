defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: attach-process-address-space
    desc: Attach to foreign process address space
    crit: suspicious
    conf: 0.97
    attack: "T1055"
    if:
      type: symbol
      exact: "KeStackAttachProcess"

  - id: detach-process-address-space
    desc: Detach from foreign process address space
    crit: baseline
    conf: 0.92
    if:
      type: symbol
      exact: "KeUnstackDetachProcess"

  - id: lookup-process-by-id
    desc: Resolve process object by ID
    crit: notable
    conf: 0.92
    attack: "T1057"
    if:
      type: symbol
      exact: "PsLookupProcessByProcessId"

  - id: query-process-peb
    desc: Query target process PEB
    crit: notable
    conf: 0.9
    attack: "T1055"
    if:
      type: symbol
      exact: "PsGetProcessPeb"

composite_rules:
  - id: cross-process-address-space-attach
    desc: Cross process address space attach
    crit: suspicious
    conf: 0.97
    all:
      - id: attach-process-address-space
      - id: detach-process-address-space
      - id: lookup-process-by-id
