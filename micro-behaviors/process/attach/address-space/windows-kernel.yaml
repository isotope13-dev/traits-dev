defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: attach-process-address-space
    desc: Attach to foreign process address space
    crit: notable
    conf: 0.97
    attack: "T1055"
    if:
      type: symbol
      exact: "KeStackAttachProcess"
  - id: detach-process-address-space
    desc: Detach from foreign process address space
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: "KeUnstackDetachProcess"
  - id: lookup-process-by-id
    desc: Resolve process object by ID
    crit: notable
    conf: 0.92
    attack: "T1057"
    if:
      type: symbol
      exact: "PsLookupProcessByProcessId"
  - id: query-process-peb
    desc: Query target process PEB
    crit: notable
    conf: 0.9
    attack: "T1055"
    if:
      type: symbol
      exact: "PsGetProcessPeb"
  - id: benign-win32kbase-sample
    desc: Known good win32kbase sample
    crit: baseline
    conf: 1.0
    if:
      type: basename
      substr: win32kbase.sys_cb97ed72
composite_rules:
  - id: cross-process-address-space-attach
    desc: Cross process address space attach
    crit: suspicious
    conf: 0.97
    all:
      - id: attach-process-address-space
      - id: detach-process-address-space
      - id: lookup-process-by-id
    unless:
      - id: benign-win32kbase-sample
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
