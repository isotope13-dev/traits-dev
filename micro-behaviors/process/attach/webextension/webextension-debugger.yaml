# Browser-extension debugger attachment (chrome.debugger / CDP). Generic
# technique: attaching a debugger to a target and issuing protocol commands.
# Powerful (full page control, can read all page data), so notable.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-debugger-api
    desc: Uses the browser debugger extension API
    if:
      type: text
      regex: '(chrome|browser)\.debugger\.[A-Za-z_]'
  - id: chrome-debugger-attach
    desc: Chrome debugger attach to target
    if:
      type: text
      regex: '(chrome|browser)\.debugger\.attach\b'
  - id: chrome-debugger-send-command
    desc: Chrome debugger CDP command
    if:
      type: text
      regex: '(chrome|browser)\.debugger\.sendCommand\b'
  - id: chrome-debugger-input-dispatch
    desc: Chrome debugger input dispatch
    conf: 0.92
    if:
      type: literal
      regex: 'Input\.dispatch(Key|Mouse|Touch)Event'
  - id: chrome-debugger-print-to-pdf
    desc: Chrome debugger page PDF generation
    conf: 0.9
    if:
      type: literal
      exact: Page.printToPDF
  - id: chrome-debugger-cookie-extract
    desc: Chrome debugger reads cookies via CDP
    # CDP Network.getAllCookies / Network.getCookies / Storage.getCookies pull
    # cookies (including httpOnly) out of the target under debugger control —
    # the session-theft use of chrome.debugger, distinct from page automation
    # such as Page.captureScreenshot or Input.dispatchKeyEvent.
    conf: 0.92
    if:
      type: literal
      regex: '(Network|Storage)\.get(All)?Cookies'
