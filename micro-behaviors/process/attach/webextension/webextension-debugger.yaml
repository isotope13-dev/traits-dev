# Browser-extension debugger attachment (chrome.debugger / CDP). Generic
# technique: attaching a debugger to a target and issuing protocol commands.
# Powerful (full page control, can read all page data), so notable.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-debugger-api
    desc: Chrome debugger API usage
    if:
      type: text
      regex: '(chrome|browser)\.debugger\.[A-Za-z_]'
  - id: chrome-debugger-attach
    desc: Chrome debugger attach to target
    if:
      type: text
      regex: '(chrome|browser)\.debugger\.attach\b'
  - id: chrome-debugger-send-command
    desc: Chrome debugger CDP command
    if:
      type: text
      regex: '(chrome|browser)\.debugger\.sendCommand\b'
  - id: chrome-debugger-input-dispatch
    desc: Chrome debugger input dispatch
    conf: 0.92
    if:
      type: literal
      regex: 'Input\.dispatch(Key|Mouse|Touch)Event'
