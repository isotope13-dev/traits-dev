defaults:
  platforms: [android, unix, ios]
  for: [c, cpp]

traits:
  - id: ptrace-attach-call
    desc: POSIX ptrace process attach
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'ptrace\s*\(\s*PTRACE_ATTACH'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
