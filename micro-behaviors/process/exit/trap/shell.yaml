defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: shell-exit-trap
    desc: Shell EXIT trap handler
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\btrap\s+[''"][^''"]{1,80}[''"]\s+EXIT\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
