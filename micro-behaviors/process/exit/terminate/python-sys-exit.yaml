# sys.exit() — process-exit capability (normal control flow). Relocated from
# anti-analysis/sandbox-detect; the sandbox exit-gate composites reference it
# cross-directory.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: python-sys-exit-symbol
    desc: Python sys.exit symbol
    crit: component
    conf: 0.84
    if:
      type: symbol
      exact: sys.exit
