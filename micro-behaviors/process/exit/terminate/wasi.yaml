# WASI proc_exit — a WASM module terminating its own instance. Imported by
# essentially every WASI build, so baseline; surfaced for completeness of the
# module's host-call surface alongside its net/fs imports.
defaults:
  platforms: [windows, unix]
  for: [wasm]
traits:
  - id: wasi-proc-exit
    desc: WASM exits via WASI proc_exit
    crit: baseline
    conf: 0.8
    if:
      type: import
      exact: "proc_exit"
