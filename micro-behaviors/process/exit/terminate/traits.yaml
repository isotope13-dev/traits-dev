defaults:
  platforms: [windows, unix]
traits:
  - id: exit-call
    desc: Generic exit call
    crit: baseline
    conf: 0.3
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: exit
  - id: sys-exit
    desc: Python sys.exit call
    crit: baseline
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      substr: sys.exit
  - id: process-exit
    desc: Node.js process.exit call
    crit: baseline
    conf: 0.3
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: process.exit
  - id: process-on-exit
    desc: Node.js process exit event listener registered
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: process.on
