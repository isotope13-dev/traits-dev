defaults:
  platforms: [windows, unix]
traits:
  - id: exit-call
    desc: Generic exit call
    crit: baseline
    conf: 0.3
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: exit
  - id: sys-exit
    desc: Python sys.exit call
    crit: baseline
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      substr: sys.exit
  - id: process-exit
    desc: Node.js process.exit call
    crit: baseline
    conf: 0.3
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: process.exit
  - id: lua-os-exit
    desc: Lua os.exit call
    crit: baseline
    conf: 0.75
    for:
      - lua
    if:
      type: symbol
      exact: os.exit
  - id: process-exit-zero-repeat
    desc: Repeated Node.js clean exits
    crit: baseline
    conf: 0.7
    for:
      - javascript
      - typescript
    count_min: 4
    if:
      type: text
      substr: process.exit(0)
  - id: process-on-exit
    desc: Node.js process exit event listener registered
    crit: baseline
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: process.on
  - id: js-process-on-exit-hook
    desc: Node process exit hook registered
    crit: notable
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bprocess\.on\s*\(\s*["''](exit|beforeExit)["'']'
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: js-exit-hook-file-read
    desc: Node exit hook reads file
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.on\s*\(\s*["''](exit|beforeExit)["''][^;]{0,400}readFile(Sync)?\s*\('
