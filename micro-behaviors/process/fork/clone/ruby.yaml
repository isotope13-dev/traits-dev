defaults:
  platforms: [unix]
  for: [ruby]
traits:
  - id: process-fork-dup
    desc: Process.fork call
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: Process.fork
  - id: fork-brace-block
    desc: fork with brace block
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      regex: \bfork\s*\{
  - id: fork-do-block
    desc: fork with do block
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      regex: \bfork\s*do\b
  - id: fork-paren
    desc: fork with parenthesis
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      regex: \bfork\s*\(
composite_rules:
  - id: fork-block
    desc: fork with block/do
    crit: notable
    conf: 0.7
    any:
      - id: fork-brace-block
      - id: fork-do-block
      - id: fork-paren
  - id: ruby-fork
    desc: Fork process
    crit: notable
    conf: 0.88
    any:
      - id: micro-behaviors/process/fork/clone::process-fork-dup
      - id: fork-block
