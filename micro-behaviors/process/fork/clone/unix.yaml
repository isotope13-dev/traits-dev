# Process Forking
# MBC: C0017 (Create Process)
# ATT&CK: T1106
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [binaries, scripts, source, manifests, documents, media, data]
traits:
  - id: fork
    desc: Process forking
    crit: baseline
    conf: 0.66
    for: [elf, macho, so, dylib]
    if:
      type: symbol
      regex: "^(fork|vfork|clone[0-9]?)$"
  - id: daemon-dup
    desc: Daemonize process
    crit: notable
    conf: 0.66
    for: [elf, macho, so, dylib]
    if:
      type: symbol
      # setsid: use micro-behaviors/process/create/setsid/traits.yaml::c (canonical)
      exact: "daemon"
