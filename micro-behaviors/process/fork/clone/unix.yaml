defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: fork
    desc: Process forking
    crit: baseline
    conf: 0.66
    for:
      - elf
      - macho
      - so
      - dylib
    if:
      type: symbol
      regex: (^|_)(fork|vfork|clone[0-9]?)$
  - id: daemon-dup
    desc: Daemonize process
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
      - so
      - dylib
    if:
      type: symbol
      exact: daemon
  - id: python-os-fork
    desc: Python os.fork() call
    crit: baseline
    conf: 0.8
    for: [python]
    if:
      type: ast
      kind: call
      exact: os.fork
  - id: python-os-fork-string
    desc: Python os.fork() call (string)
    crit: baseline
    conf: 0.6
    for: [python]
    if:
      type: text
      substr: os.fork()
