defaults:
  platforms: [linux, macos, android]
  for: [scripts, binaries]
traits:
  - id: fork
    desc: Process creation via fork or clone
    crit: notable
    conf: 0.86
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: (^|_)(fork|vfork|clone[0-9]?)$
  - id: daemon-dup
    desc: Daemonize process
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: daemon
  - id: python-os-fork
    desc: Python os.fork() call
    crit: baseline
    conf: 0.8
    for: [python]
    if:
      type: symbol
      kind: call
      exact: os.fork
  - id: python-os-fork-string
    desc: Python os.fork() call (string)
    crit: baseline
    conf: 0.6
    for: [python]
    if:
      type: text
      substr: os.fork()
  - id: c-fork-call
    desc: C fork child process
    crit: baseline
    conf: 0.8
    for: [c, cpp]
    if:
      type: text
      regex: '\bfork\s*\(\s*\)'
