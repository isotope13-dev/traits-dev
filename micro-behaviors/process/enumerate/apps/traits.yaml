defaults:
  platforms: [windows, unix]
  for: [pe, elf, python, javascript, powershell]
  attack: T1057
  mbc: E1592
  crit: baseline
traits:
  - id: charles-process-name
    desc: Charles proxy process-name fragment
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: literal
      exact: charles
      case_insensitive: true
  - id: taskmgr-process
    desc: Task Manager process name
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)taskmgr(\.exe)?
  - id: perfmon-process
    desc: Performance Monitor process name
    crit: notable
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)\bperfmon(\.exe)?\b
  - id: resmon-process
    desc: Resource Monitor process name
    crit: notable
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)\bresmon(\.exe)?\b
  - id: browser-apps-chrome-firefox
    desc: Chrome or Chromium browser executable name
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\b(chrome\.exe|google-chrome|chromium-browser)\b
      case_insensitive: true
    unless:
      - type: text
        substr: application/x-google-chrome-extension
  - id: browser-apps-firefox-exe
    desc: Firefox Windows executable
    conf: 0.5
    for: [pe, dll, elf, c, cpp, python, javascript, powershell, batch]
    if:
      type: text
      word: firefox.exe
      case_insensitive: true
  - id: browser-apps-firefox-bin
    desc: Firefox Linux binary
    conf: 0.5
    if:
      type: text
      regex: (?i)\bfirefox-bin\b
      case_insensitive: true
  - id: browser-apps-firefox-browser
    desc: Firefox browser package name
    conf: 0.5
    if:
      type: text
      regex: (?i)\bfirefox-browser\b
      case_insensitive: true
  - id: browser-apps-firefox-esr
    desc: Firefox ESR package name
    conf: 0.5
    if:
      type: text
      regex: (?i)\bfirefox-esr\b
      case_insensitive: true
  - id: browser-apps-firefox-app
    desc: Firefox macOS app bundle
    conf: 0.5
    if:
      type: text
      substr: /Applications/Firefox.app
      case_insensitive: true
  - id: browser-apps-msedge-safari
    desc: Microsoft Edge executable name
    conf: 0.5
    if:
      type: text
      word: msedge
      case_insensitive: true
  - id: browser-apps-safari
    desc: Browser app safari
    conf: 0.5
    count_max: 1
    if:
      type: text
      regex: (?i)\b(safari\.exe|/Applications/Safari\.app)\b
  - id: browser-apps-opera-brave
    desc: Browser app opera
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\b(opera\.exe|opera-browser|opera_stable)\b
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
    downgrade:
      any:
        - id: metadata/binary/resource/
        - id: metadata/package/quality/
        - type: text
          substr: X3DOM Runtime, http://www.x3dom.org/
  - id: browser-apps-brave
    desc: Brave browser process name
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\b(brave\.exe|brave-browser|bravebrowser)\b
    unless:
      - id: metadata/file/catalog/identity/
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: browser-apps-iexplore
    desc: Browser app iexplore
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\biexplore\b
    unless:
      - id: metadata/package/quality/
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: office-apps-word-excel
    desc: Office app winword
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: winword
      case_insensitive: true
  - id: office-apps-excel
    desc: Office app excel
    crit: notable
    conf: 0.5
    count_max: 2
    if:
      type: text
      regex: (?i)\b(excel\.exe|Microsoft Excel|/Applications/Microsoft Excel\.app)\b
    not:
      - substr: file-excel
    unless:
      - type: text
        substr: application/vnd.ms-excel
      - id: metadata/file/catalog/identity/
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-powerpoint-soffice
    desc: Office app powerpnt
    crit: notable
    conf: 0.5
    if:
      type: text
      word: powerpnt
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-soffice
    desc: Office app soffice
    crit: notable
    conf: 0.5
    if:
      type: text
      word: soffice
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-outlook-onenote
    desc: Office app outlook
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\boutlook\.exe\b
    unless:
      - type: text
        substr: application/vnd.ms-outlook
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-onenote
    desc: References Microsoft OneNote
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: onenote
      case_insensitive: true
    unless:
      - id: metadata/document/office/container/
      - type: text
        substr: application/onenote
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: dev-apps-sublime
    desc: Dev app sublime_text
    crit: notable
    conf: 0.5
    if:
      type: text
      word: sublime_text
      case_insensitive: true
  - id: dev-apps-notepad-vim
    desc: Dev app notepad++
    crit: notable
    conf: 0.5
    if:
      type: text
      word: notepad++
      case_insensitive: true
  - id: dev-apps-vim
    desc: Repeated Vim name references
    # "vim" is a generic 3-letter word that appears in benign command/package
    # lookup tables (e.g. `"vim": "vim"`, which alone satisfies count_min:2 on
    # one line). Too weak to be a notable enumeration signal standalone; it is
    # only meaningful as part of the broader dev-apps enumeration composite.
    crit: component
    conf: 0.5
    count_min: 2
    if:
      type: text
      word: vim
      case_insensitive: false
    not:
      - substr: /vim
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
  - id: dev-apps-emacs
    desc: Repeated Emacs name references
    crit: component
    conf: 0.5
    count_min: 2
    if:
      type: text
      word: emacs
      case_insensitive: true
    not:
      - regex: '(?i)(/terminfo/|github\.com/|/usr/share/)'
    unless:
      - type: text
        substr: dired
      - type: basename
        exact: CHANGES
      - id: well-known/tool/development/fzf::fzf-binary
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
  - id: dev-apps-pycharm-exe
    desc: PyCharm Windows executable
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (?i)\bpycharm(64|32)?\.exe\b
      case_insensitive: true
  - id: dev-apps-pycharm-shell
    desc: PyCharm shell launcher
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (?i)\bpycharm\.sh\b
      case_insensitive: true
  - id: dev-apps-pycharm-app
    desc: PyCharm macOS app bundle
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (?i)\bpycharm\.app\b
      case_insensitive: true
  - id: dev-apps-pycharm-path
    desc: PyCharm path component
    crit: component
    conf: 0.5
    if:
      type: text
      regex: '[/\\]pycharm\b'
      case_insensitive: true
    unless:
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: dev-apps-intellij
    desc: IntelliJ executable or launcher name
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '(?i)\b(idea|intellij)(64)?\.(exe|sh|app)\b'
    unless:
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
composite_rules:
  - id: browser-apps
    desc: References a browser executable name
    crit: notable
    conf: 0.5
    any:
      - id: browser-apps-chrome-firefox
      - id: browser-apps-firefox
      - id: browser-apps-msedge-safari
      - id: browser-apps-safari
      - id: browser-apps-opera-brave
      - id: browser-apps-brave
      - id: browser-apps-iexplore
  - id: browser-apps-firefox
    desc: Browser app firefox
    crit: baseline
    conf: 0.5
    any:
      - id: browser-apps-firefox-exe
      - id: browser-apps-firefox-bin
      - id: browser-apps-firefox-browser
      - id: browser-apps-firefox-esr
      - id: browser-apps-firefox-app
  - id: office-apps
    desc: Office/Productivity application names
    crit: notable
    conf: 0.5
    any:
      - id: office-apps-word-excel
      - id: office-apps-excel
      - id: office-apps-powerpoint-soffice
      - id: office-apps-soffice
      - id: office-apps-outlook-onenote
      - id: office-apps-onenote
  - id: dev-apps
    desc: Developer/Editor application names
    crit: baseline
    conf: 0.5
    any:
      - id: well-known/app/vscode::vscode-name
      - id: dev-apps-sublime
      - id: dev-apps-notepad-vim
      - id: dev-apps-vim
      - id: dev-apps-emacs
      - id: dev-apps-pycharm
      - id: dev-apps-intellij
  - id: dev-apps-pycharm
    desc: Dev app pycharm
    crit: notable
    conf: 0.5
    any:
      - id: dev-apps-pycharm-exe
      - id: dev-apps-pycharm-shell
      - id: dev-apps-pycharm-app
      - id: dev-apps-pycharm-path
