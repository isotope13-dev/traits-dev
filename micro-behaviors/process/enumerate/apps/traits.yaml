defaults:
  platforms: [windows, unix]
  for: [pe, elf, python, javascript, powershell]
  attack: T1057
  mbc: E1592
  crit: baseline
traits:
  - id: browser-apps-chrome-firefox
    desc: Browser app chrome
    conf: 0.5
    for: [pe, elf, python, javascript]
    if:
      type: text
      regex: (?i)\b(chrome\.exe|google-chrome|chromium-browser)\b
      case_insensitive: true
  - id: browser-apps-firefox
    desc: Browser app firefox
    conf: 0.5
    if:
      type: text
      word: firefox
      case_insensitive: true
  - id: browser-apps-msedge-safari
    desc: Browser app msedge
    conf: 0.5
    if:
      type: text
      word: msedge
      case_insensitive: true
  - id: browser-apps-safari
    desc: Browser app safari
    conf: 0.5
    count_max: 1
    if:
      type: text
      regex: (?i)\b(safari\.exe|/Applications/Safari\.app)\b
  - id: browser-apps-opera-brave
    desc: Browser app opera
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\b(opera\.exe|opera-browser|opera_stable)\b
    unless:
      - type: text
        substr: "@externs"
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
        - id: metadata/vendor/microsoft::visual-studio-uitesting-component
        - type: text
          substr: X3DOM Runtime, http://www.x3dom.org/
  - id: browser-apps-brave
    desc: Browser app brave
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\b(brave\.exe|brave-browser|bravebrowser)\b
    unless:
      - id: metadata/file/text::frequency-list-catalog
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: browser-apps-iexplore
    desc: Browser app iexplore
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\biexplore\b
    unless:
      - id: metadata/vendor/microsoft::visual-studio-uitesting-component
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: office-apps-word-excel
    desc: Office app winword
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: winword
      case_insensitive: true
  - id: office-apps-excel
    desc: Office app excel
    crit: notable
    conf: 0.5
    count_max: 2
    if:
      type: text
      regex: (?i)\bexcel\b
    not:
      - substr: file-excel
    unless:
      - id: metadata/file/text::frequency-list-catalog
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-powerpoint-soffice
    desc: Office app powerpnt
    crit: notable
    conf: 0.5
    if:
      type: text
      word: powerpnt
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-soffice
    desc: Office app soffice
    crit: notable
    conf: 0.5
    if:
      type: text
      word: soffice
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-outlook-onenote
    desc: Office app outlook
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\boutlook\.exe\b
    unless:
      - type: text
        substr: application/vnd.ms-outlook
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: office-apps-onenote
    desc: Office app onenote
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: onenote
      case_insensitive: true
    unless:
      - id: metadata/document/office::help2-container
      - type: text
        substr: application/onenote
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-windows
  - id: dev-apps-vscode-sublime
    desc: Dev app vscode
    crit: component
    conf: 0.5
    if:
      type: text
      word: vscode
      case_insensitive: true
  - id: dev-apps-sublime
    desc: Dev app sublime_text
    crit: notable
    conf: 0.5
    if:
      type: text
      word: sublime_text
      case_insensitive: true
  - id: dev-apps-notepad-vim
    desc: Dev app notepad++
    crit: notable
    conf: 0.5
    if:
      type: text
      word: notepad++
      case_insensitive: true
  - id: dev-apps-vim
    desc: Dev app vim
    crit: notable
    conf: 0.5
    if:
      type: text
      word: vim
      case_insensitive: false
  - id: dev-apps-emacs-pycharm
    desc: Dev app emacs
    crit: notable
    conf: 0.5
    count_min: 2
    if:
      type: text
      word: emacs
      case_insensitive: true
    not:
      - regex: '(?i)(/terminfo/|github\.com/|/usr/share/)'
    unless:
      - type: text
        substr: dired
      - type: basename
        exact: CHANGES
  - id: dev-apps-pycharm
    desc: Dev app pycharm
    crit: notable
    conf: 0.5
    if:
      type: text
      word: pycharm
      case_insensitive: true
    unless:
      - id: metadata/package/testing/presence::test-filename-pattern
  - id: dev-apps-intellij
    desc: Dev app intellij
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\bintellij\b
    unless:
      - id: metadata/package/testing/presence::test-filename-pattern
composite_rules:
  - id: browser-apps
    desc: Web browser application names
    crit: notable
    conf: 0.5
    any:
      - id: browser-apps-chrome-firefox
      - id: browser-apps-firefox
      - id: browser-apps-msedge-safari
      - id: browser-apps-safari
      - id: browser-apps-opera-brave
      - id: browser-apps-brave
      - id: browser-apps-iexplore
  - id: office-apps
    desc: Office/Productivity application names
    crit: notable
    conf: 0.5
    any:
      - id: office-apps-word-excel
      - id: office-apps-excel
      - id: office-apps-powerpoint-soffice
      - id: office-apps-soffice
      - id: office-apps-outlook-onenote
      - id: office-apps-onenote
  - id: dev-apps
    desc: Developer/Editor application names
    crit: notable
    conf: 0.5
    any:
      - id: dev-apps-vscode-sublime
      - id: dev-apps-sublime
      - id: dev-apps-notepad-vim
      - id: dev-apps-vim
      - id: dev-apps-emacs-pycharm
      - id: dev-apps-pycharm
      - id: dev-apps-intellij
