# Application Enumeration (via Process List)
# ATT&CK: T1057 (Process Discovery)
# MBC: E1592
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
  attack: "T1057"
  mbc: "E1592"
  crit: baseline # Too broad - matches user agents, docs, etc. Not process enum alone.
traits:
  - id: browser-apps-chrome-firefox
    desc: Browser app chrome
    conf: 0.5
    if:
      type: string_value
      word: "chrome"
      case_insensitive: true
  - id: browser-apps-firefox
    desc: Browser app firefox
    conf: 0.5
    if:
      type: string_value
      word: "firefox"
      case_insensitive: true
  - id: browser-apps-msedge-safari
    desc: Browser app msedge
    conf: 0.5
    if:
      type: string_value
      word: "msedge"
      case_insensitive: true
  - id: browser-apps-safari
    desc: Browser app safari
    conf: 0.5
    count_max: 1
    if:
      type: string_value
      regex: "(?i)\\bsafari\\b"
  - id: browser-apps-opera-brave
    desc: Browser app opera
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "opera"
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: browser-apps-brave
    desc: Browser app brave
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "brave"
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: browser-apps-iexplore
    desc: Browser app iexplore
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)\\biexplore\\b"
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: office-apps-word-excel
    desc: Office app winword
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      word: "winword"
      case_insensitive: true
  - id: office-apps-excel
    desc: Office app excel
    crit: notable
    conf: 0.5
    count_max: 2
    if:
      type: string_value
      regex: "(?i)\\bexcel\\b"
  - id: office-apps-powerpoint-soffice
    desc: Office app powerpnt
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "powerpnt"
      case_insensitive: true
  - id: office-apps-soffice
    desc: Office app soffice
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "soffice"
      case_insensitive: true
  - id: office-apps-outlook-onenote
    desc: Office app outlook
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "outlook"
      case_insensitive: true
  - id: office-apps-onenote
    desc: Office app onenote
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "onenote"
      case_insensitive: true
    unless:
      - id: metadata/format/document/help2::help2-container
  - id: dev-apps-vscode-sublime
    desc: Dev app vscode
    crit: component
    conf: 0.5
    if:
      type: string_value
      word: "vscode"
      case_insensitive: true
  - id: dev-apps-sublime
    desc: Dev app sublime_text
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "sublime_text"
      case_insensitive: true
  - id: dev-apps-notepad-vim
    desc: Dev app notepad++
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "notepad++"
      case_insensitive: true
  - id: dev-apps-vim
    desc: Dev app vim
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "vim"
      case_insensitive: false
  - id: dev-apps-emacs-pycharm
    desc: Dev app emacs
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "emacs"
      case_insensitive: true
  - id: dev-apps-pycharm
    desc: Dev app pycharm
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "pycharm"
      case_insensitive: true
  - id: dev-apps-intellij
    desc: Dev app intellij
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)\\bintellij\\b"
composite_rules:
  - id: browser-apps
    desc: Web browser application names
    crit: notable
    conf: 0.5
    any:
      - id: browser-apps-chrome-firefox
      - id: browser-apps-firefox
      - id: browser-apps-msedge-safari
      - id: browser-apps-safari
      - id: browser-apps-opera-brave
      - id: browser-apps-brave
      - id: browser-apps-iexplore
  - id: office-apps
    desc: Office/Productivity application names
    crit: notable
    conf: 0.5
    any:
      - id: office-apps-word-excel
      - id: office-apps-excel
      - id: office-apps-powerpoint-soffice
      - id: office-apps-soffice
      - id: office-apps-outlook-onenote
      - id: office-apps-onenote
  - id: dev-apps
    desc: Developer/Editor application names
    crit: notable
    conf: 0.5
    any:
      - id: dev-apps-vscode-sublime
      - id: dev-apps-sublime
      - id: dev-apps-notepad-vim
      - id: dev-apps-vim
      - id: dev-apps-emacs-pycharm
      - id: dev-apps-pycharm
      - id: dev-apps-intellij
