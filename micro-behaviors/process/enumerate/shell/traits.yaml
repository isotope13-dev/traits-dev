defaults:
  platforms:
    - unix
    - windows
  for:
    - scripts
  crit: notable
  conf: 0.6
  attack: T1057
traits:
  - id: ps-stat-comm-listing
    desc: ps lists process state and command
    platforms: [unix]
    for: [shell]
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: ps
      arg:
        kind: identifier
        name: stat=,comm=
  - id: awk-comm-name-filter
    desc: awk filters process command name
    platforms: [unix]
    for: [shell]
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: awk
      arg:
        kind: string
        exact: "$2 == name"
  - id: awk-zombie-state-filter
    desc: awk filters zombie process state
    platforms: [unix]
    for: [shell]
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: awk
      arg:
        kind: string
        exact: "$1 !~ /^Z/"
  - id: ps-aux
    desc: ps aux command
    if:
      type: text
      substr: ps aux
  - id: ps-ef
    desc: ps -ef command
    if:
      type: text
      substr: ps -ef
  # Distinct ps listing flags not already covered by ps-aux ("ps aux") or
  # ps-ef ("ps -ef") — avoids double-matching the same command.
  - id: ps-listing-flags
    desc: ps process listing via -aux/-A/-e flags
    platforms: [unix]
    if:
      type: text
      regex: \bps\s+(-aux|-A|-e\b)
  - id: ps-list-command
    desc: ps process listing command
    platforms: [unix]
    conf: 0.92
    if:
      type: text
      regex: 'ps (-e -o pid,ppid,comm,args|-ef|aux|-al)'
  - id: ps-grep-filter
    desc: ps process listing filtered through grep
    platforms: [unix]
    conf: 0.85
    if:
      type: text
      regex: ps\s+(-ef|-aux)[^|]{0,30}\|[^|]{0,50}grep
    unless:
      - id: well-known/app/ventoy/
  - id: pgrep-cmd
    desc: pgrep process search command
    platforms: [unix]
    if:
      type: text
      regex: \bpgrep\s+(-[a-zA-Z]+\s+)?["']?[A-Za-z]
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ps-eo-user-pid-cmd
    desc: ps -eo user,pid,command process list
    if:
      type: text
      substr: "ps -eo user,pid,command"
  - id: busybox-ps-encoded
    desc: XOR-obfuscated busybox ps command
    platforms:
      - unix
      - android
    for:
      - elf
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 36 3D 3A 7B 36 21 27 2D 36 3B 2C 74 24 27 54
  - id: tasklist
    desc: Invokes the Windows tasklist command
    platforms:
      - windows
    for: [scripts, binaries]
    if:
      # Require a command-token boundary before `tasklist` that is NOT `/` or `.` — the
      # Windows command never has a leading slash. Excludes URL/REST path segments like
      # `/tasklist` (an API endpoint) and member access `x.tasklist`, while still matching
      # `tasklist`, `"tasklist"`, `tasklist /svc`, `tasklist.exe`. Filters the Earth
      # Engine `request to "/tasklist"` comment FP.
      type: text
      regex: '(?m)(^|[^/.\w])tasklist(\.exe)?([ \t]+/[A-Za-z]|[ \t]*[;&|>]|[ \t]*$)'
    downgrade:
      any:
        - id: metadata/binary/resource/
