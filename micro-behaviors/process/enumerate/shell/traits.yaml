defaults:
  platforms:
    - unix
    - windows
  for:
    - scripts
  crit: notable
  conf: 0.6
  attack: T1057
traits:
  - id: ps-aux
    desc: ps aux command
    if:
      type: text
      substr: ps aux
  - id: ps-ef
    desc: ps -ef command
    if:
      type: text
      substr: ps -ef
  - id: ps-aux-text
    desc: ps aux command (raw text)
    platforms: [unix]
    if:
      type: text
      regex: \bps\s+(-?aux|-ef|-A|-e\b)
  - id: pgrep-cmd
    desc: pgrep process search command
    platforms: [unix]
    if:
      type: text
      regex: \bpgrep\s+(-[a-zA-Z]+\s+)?["']?[A-Za-z]
  - id: ps-eo-user-pid-cmd
    desc: ps -eo user,pid,command process list
    if:
      type: text
      substr: "ps -eo user,pid,command"
  - id: busybox-ps-encoded
    desc: XOR-obfuscated busybox ps command
    platforms:
      - unix
      - android
    for:
      - elf
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 36 3D 3A 7B 36 21 27 2D 36 3B 2C 74 24 27 54
  - id: tasklist
    desc: tasklist command (Windows)
    platforms:
      - windows
    for: [scripts, binaries]
    if:
      type: text
      word: tasklist
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
