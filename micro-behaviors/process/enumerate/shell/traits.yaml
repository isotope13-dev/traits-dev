defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - shell
  crit: notable
  conf: 0.6
  attack: T1057
traits:
  - id: ps-aux
    desc: ps aux command
    if:
      type: string_value
      substr: ps aux
  - id: ps-ef
    desc: ps -ef command
    if:
      type: string_value
      substr: ps -ef
  - id: busybox-ps-encoded
    desc: XOR-obfuscated busybox ps command
    platforms:
      - linux
      - unix
      - android
    for:
      - elf
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 36 3D 3A 7B 36 21 27 2D 36 3B 2C 74 24 27 54
  - id: tasklist
    desc: tasklist command (Windows)
    platforms:
      - windows
    for:
      - pe
      - powershell
      - batch
    if:
      type: string_value
      word: tasklist
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
