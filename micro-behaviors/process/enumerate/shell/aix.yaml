defaults:
  platforms: [unix]
  for: [elf, macho, c, cpp]
  attack: T1057
traits:
  - id: getpids
    desc: Enumerate process IDs (AIX)
    crit: notable
    conf: 0.9
    mbc: E1057
    if:
      type: symbol
      exact: getpids
  - id: proc-psinfo
    desc: Read process info from /proc
    crit: notable
    conf: 0.8
    for: [elf, macho, c, cpp, shell]
    if:
      type: string_literal
      substr: /proc/%d/psinfo
  - id: kvm-getprocs
    desc: Enumerate processes via libkvm
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: kvm_getprocs
  - id: lssrc-cmd
    desc: lssrc command (AIX)
    crit: notable
    conf: 0.8
    for: [elf, macho, c, cpp, shell]
    if:
      type: text
      word: lssrc
  - id: lparstat-cmd
    desc: lparstat command (AIX)
    crit: notable
    conf: 0.8
    for: [elf, macho, c, cpp, shell]
    if:
      type: text
      word: lparstat
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: oslevel-cmd
    desc: oslevel command (AIX)
    crit: notable
    conf: 0.8
    for: [elf, macho, c, cpp, shell]
    if:
      type: text
      word: oslevel
