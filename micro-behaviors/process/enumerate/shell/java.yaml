defaults:
  platforms: [unix]
  for: [java]
  attack: T1057
traits:
  - id: java-ps-ef-command
    desc: Java runs ps -ef process listing
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'runCommand("ps -ef")'
  - id: java-ps-eo-command
    desc: Java runs ps -eo process listing
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'runCommand\("ps -eo [^"]{3,80}"'
