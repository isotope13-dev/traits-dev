# WMI / CIM process enumeration. Querying the Win32_Process class lists every
# running process (PID, name, command line) — the WMI equivalent of the
# psapi / snapshot enumeration methods alongside it. A query is *enumeration*
# (discovery), distinct from WMI process *execution* (Win32_Process.Create),
# which lives under objectives/execution/wmi. Legitimate monitors/profilers
# use this, so it is a notable capability, not inherently malicious.
defaults:
  platforms: [windows]
  for: [scripts, source]
  attack: T1057
  mbc: E1057
traits:
  - id: win32-process-cmdlet-enumeration
    desc: WMI Win32_Process enumeration (PowerShell cmdlet)
    for: [powershell, csharp, python, vbs, kotlin]
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Get-(CimInstance|WmiObject)(\s+-Class(Name)?)?\s+Win32_Process'
      case_insensitive: true
  - id: win32-process-wql-enumeration
    desc: WMI Win32_Process enumeration (WQL query)
    for: [powershell, csharp, python, vbs, kotlin]
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'FROM\s+Win32_Process\b'
      case_insensitive: true
