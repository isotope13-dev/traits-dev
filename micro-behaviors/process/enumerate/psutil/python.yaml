# Process enumeration through Python's psutil library.
defaults:
  for: [python]
  platforms: [windows, unix]
  crit: notable
  conf: 0.9

traits:
  - id: psutil-process-iter-call
    desc: Enumerates processes through psutil
    if:
      type: symbol
      kind: call
      regex: '^(psutil_)?process_iter$'

  - id: psutil-process-iter-import
    desc: Imports psutil process enumeration API
    if:
      type: symbol
      kind: import
      exact: process_iter
