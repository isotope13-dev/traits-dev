# Process enumeration via PSAPI - Windows
# Alternative to Toolhelp32 snapshot-based enumeration
# Used by malware to scan for security tools before payload execution
defaults:
  attack: T1057
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: enum-processes
    desc: Enumerate all running processes (PSAPI)
    crit: notable
    conf: 0.9
    mbc: "E1057"
    if:
      type: text
      regex: "^(K32)?EnumProcesses$"
  - id: enum-process-modules
    desc: Enumerate modules in process (PSAPI)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "EnumProcessModules"
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: get-module-basename-w
    desc: Get process module name (PSAPI)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "GetModuleBaseNameW"
    unless:
      - type: exports_count
        min: 100
  - id: get-module-basename-a
    desc: Get process module name ANSI (PSAPI)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "GetModuleBaseNameA"
    unless:
      - type: exports_count
        min: 100
  - id: psapi-dll-string
    desc: PSAPI.dll dynamic load string
    crit: component
    conf: 0.8
    if:
      type: text
      word: PSAPI
  - id: get-module-filename-ex-string
    desc: GetModuleFileNameExA dynamic resolve
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetModuleFileNameExA
  - id: get-process-image-filename-string
    desc: GetProcessImageFileNameA dynamic resolve
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetProcessImageFileNameA
composite_rules:
  - id: psapi-process-scan
    desc: PSAPI process enumeration chain
    crit: notable
    conf: 0.9
    all:
      - id: enum-processes
    any:
      - id: enum-process-modules
      - id: get-module-basename-w
      - id: get-module-basename-a
  - id: psapi-dynamic-resolve
    desc: Dynamic PSAPI API resolution strings
    crit: notable
    conf: 0.88
    all:
      - id: psapi-dll-string
    any:
      - id: get-module-filename-ex-string
      - id: get-process-image-filename-string
