# Process enumeration via PSAPI - Windows
# Alternative to Toolhelp32 snapshot-based enumeration
# Used by malware to scan for security tools before payload execution
defaults:
  attack: T1057
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: enum-device-drivers
    desc: Enumerate loaded kernel device drivers (PSAPI)
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: EnumDeviceDrivers
  - id: get-mapped-file-name-w
    desc: Resolve filename for mapped memory region
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: GetMappedFileNameW
  - id: enum-processes
    desc: Enumerate all running processes (PSAPI)
    crit: notable
    conf: 0.9
    mbc: "E1057"
    if:
      type: symbol
      regex: "^(K32)?EnumProcesses$"
  - id: enum-process-modules
    desc: Enumerate modules in process (PSAPI)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "EnumProcessModules"
  - id: get-module-basename-w
    desc: Get process module name (PSAPI)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "GetModuleBaseNameW"
  - id: k32-get-module-information
    desc: Query loaded-module base, size, and entry point
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "K32GetModuleInformation"
  - id: get-module-basename-a
    desc: Get process module name ANSI (PSAPI)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "GetModuleBaseNameA"
  - id: psapi-dll-string
    desc: PSAPI.dll dynamic load string
    crit: component
    conf: 0.8
    if:
      type: text
      word: PSAPI
  - id: get-module-filename-ex-string
    desc: GetModuleFileNameExA dynamic resolve
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetModuleFileNameExA
  - id: get-process-image-filename-string
    desc: GetProcessImageFileNameA dynamic resolve
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetProcessImageFileNameA
  - id: query-full-process-image-name-w
    desc: Query full process image path
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: QueryFullProcessImageNameW
  - id: get-process-image-filename-w
    desc: Read process image path via PSAPI
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: GetProcessImageFileNameW
  - id: get-module-filename-ex-w
    desc: Read remote module path via PSAPI
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: GetModuleFileNameExW
composite_rules:
  - id: psapi-process-scan
    desc: PSAPI process enumeration chain
    crit: notable
    conf: 0.9
    all:
      - id: enum-processes
    any:
      - id: enum-process-modules
      - id: get-module-basename-w
      - id: get-module-basename-a
  - id: psapi-dynamic-resolve
    desc: Dynamic PSAPI API resolution strings
    crit: notable
    conf: 0.88
    all:
      - id: psapi-dll-string
    any:
      - id: get-module-filename-ex-string
      - id: get-process-image-filename-string
  - id: process-image-path-resolution
    desc: Map process IDs to executable paths
    crit: notable
    conf: 0.93
    needs: 2
    any:
      - id: query-full-process-image-name-w
      - id: get-process-image-filename-w
      - id: get-module-filename-ex-w
