# Managed process discovery through System.Diagnostics.Process.
# Process enumeration is a neutral discovery capability; termination rules
# belong under process/terminate and may consume these traits.
defaults:
  for: [csharp, pe, dll]
  platforms: [windows]
  attack: T1057
  mbc: E1057
traits:
  - id: get-processes-by-name
    desc: .NET process lookup by name
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GetProcessesByName
  - id: dotnet-process-enumeration-member
    desc: .NET enumeration of running processes
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: GetProcesses
composite_rules:
  - id: dotnet-process-discovery
    desc: .NET process discovery by name or full process listing
    crit: notable
    conf: 0.92
    any:
      - id: get-processes-by-name
      - id: dotnet-process-enumeration-member
