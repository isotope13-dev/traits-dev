# Process listing evasion via bracketed grep patterns
# The [n]pm trick uses character-class bracketing in grep to avoid
# matching the grep process itself while still matching the target.
# This is a classic process-list-evasion technique.
defaults:
  platforms: [unix]
  for: [javascript, typescript, shell, python, ruby]
  attack: T1057
  mbc: C0003
traits:
  - id: bracketed-grep-npm
    desc: Bracketed grep pattern for npm evasion
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'grep\s+.{0,20}\[n\]pm'
  - id: bracketed-grep-generic
    desc: "Bracketed grep for proc listing evasion"
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'grep\s+.{0,20}\[.\]\w{2,}'
    not:
      - substr: 'grep -v "grep"'
      # autoconf/configure scripts use [@]FILE etc. for m4 quoting
      - regex: '\[\s*@\s*\]\s*(FILE|LINE|DATE|TIME|VERSION)'
