defaults:
  for: [pe, c]
  platforms:
  - windows
traits:
- id: create-toolhelp32-snapshot
  desc: Create process or module snapshot
  crit: notable
  conf: 0.9
  attack: T1057
  mbc: E1057
  for: [pe]
  if:
    type: symbol
    exact: CreateToolhelp32Snapshot
  unless:
  - id: well-known/lib/electron::electron-enable-logging-env
  - type: basename
    exact: nsProcess.dll
  - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
- id: process32-first
  desc: Get first process from snapshot
  crit: notable
  conf: 0.9
  attack: T1057
  for: [pe]
  if:
    type: symbol
    regex: Process32First[AW]$
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: well-known/lib/electron::electron-enable-logging-env
  - type: basename
    exact: nsProcess.dll
  - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
- id: process32-next
  desc: Enumerate next process in snapshot
  crit: notable
  conf: 0.9
  attack: T1057
  for: [pe]
  if:
    type: symbol
    regex: Process32Next[AW]$
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: well-known/lib/electron::electron-enable-logging-env
  - type: basename
    exact: nsProcess.dll
  - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
- id: create-toolhelp32-snapshot-source
  desc: Create process or module snapshot
  crit: notable
  conf: 0.9
  attack: T1057
  mbc: E1057
  for: [c, cpp]
  if:
    type: symbol
    exact: CreateToolhelp32Snapshot
- id: process32-first-source
  desc: Get first process from snapshot
  crit: notable
  conf: 0.9
  attack: T1057
  for: [c, cpp]
  if:
    type: text
    regex: \bProcess32First[AW]?\b
- id: process32-next-source
  desc: Enumerate next process in snapshot
  crit: notable
  conf: 0.9
  attack: T1057
  for: [c, cpp]
  if:
    type: text
    regex: \bProcess32Next[AW]?\b
- id: toolhelp-api-name-triplet
  desc: Embedded Toolhelp process API triplet
  crit: notable
  conf: 0.82
  attack: T1057
  if:
    type: text
    regex: Process32Next.{0,8}Process32First.{0,8}CreateToolhelp32Snapshot
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/binary/installer/script/
  - id: well-known/lib/electron::electron-enable-logging-env
  - id: metadata/binary/installer/script/
  - type: basename
    exact: nsProcess.dll
# Runtime-resolved API names are often assembled as stack strings instead of
# appearing in the PE import table.  The composite below requires the
# complete process-snapshot traversal set.
- id: dynamic-process32-first
  desc: Runtime Process32First API name
  crit: notable
  conf: 0.9
  attack: T1057
  mbc: E1057
  for: [pe]
  if:
    type: text
    substr: Process32First
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/signed/leaf::microsoft-corporation
  - id: metadata/lang/compiler/systems::go-binary-comp
  - id: well-known/game/mod::bedrockboot-preload-injector-pdb
- id: dynamic-process32-next
  desc: Runtime Process32Next API name
  crit: notable
  conf: 0.9
  attack: T1057
  mbc: E1057
  for: [pe]
  if:
    type: text
    substr: Process32Next
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/signed/leaf::microsoft-corporation
  - id: metadata/lang/compiler/systems::go-binary-comp
  - id: well-known/game/mod::bedrockboot-preload-injector-pdb
# Keep P/Invoke name-only evidence in the neutral process-enumeration tier.
# The discovery composites add the multi-source profiling context.
- id: process32-traversal-text
  desc: Process32 snapshot traversal API text
  crit: notable
  conf: 0.9
  attack: T1057
  for: [pe]
  if:
    type: text
    regex: Process32(First|Next)
  unless:
    - id: metadata/lang/compiler/systems::go-binary-comp
    - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
  downgrade:
    any:
      - id: well-known/game/mod/
- id: create-toolhelp32-snapshot-obfuscated
  desc: Obfuscated CreateToolhelp32Snapshot API string
  crit: notable
  conf: 0.92
  attack: T1057
  if:
    type: text
    word: aoe2pteTh3aorelpnhCtolSs
- id: process32-first-obfuscated
  desc: Obfuscated Process32First API string
  crit: notable
  conf: 0.92
  attack: T1057
  if:
    type: text
    word: c3rosirsFtPe2s
- id: process32-next-obfuscated
  desc: Obfuscated Process32Next API string
  crit: notable
  conf: 0.92
  attack: T1057
  if:
    type: text
    word: c3xosersNPe2t
- id: module32-first
  desc: Get first module from snapshot
  crit: notable
  conf: 0.85
  if:
    type: symbol
    regex: Module32First[AW]?$
- id: module32-next
  desc: Enumerate next module from snapshot
  crit: notable
  conf: 0.85
  if:
    type: symbol
    regex: Module32Next[AW]?$
- id: module32-first-string
  desc: Module32First API string
  crit: component
  conf: 0.8
  if:
    type: text
    word: Module32First
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: module32-next-string
  desc: Module32Next API string
  crit: component
  conf: 0.8
  if:
    type: text
    word: Module32Next
- id: thread32-first-string
  desc: Thread32First API string
  crit: component
  conf: 0.8
  if:
    type: text
    word: Thread32First
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: thread32-next-string
  desc: Thread32Next API string
  crit: component
  conf: 0.8
  if:
    type: text
    word: Thread32Next

- id: heap32list-first-string
  desc: Heap32ListFirst API string
  crit: component
  conf: 0.8
  if:
    type: text
    word: Heap32ListFirst
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: heap32list-next-string
  desc: Heap32ListNext API string
  crit: component
  conf: 0.8
  if:
    type: text
    word: Heap32ListNext
- id: create-toolhelp32-snapshot-string
  desc: CreateToolhelp32Snapshot API string
  crit: component
  conf: 0.85
  attack: T1057
  for: [pe, c, cpp]
  if:
    type: text
    substr: CreateToolhelp32Snapshot
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: toolhelp32-read-process-memory-string
  desc: Toolhelp32ReadProcessMemory API string
  crit: component
  conf: 0.82
  if:
    type: text
    word: Toolhelp32ReadProcessMemory
- id: heap32-first-string
  desc: Heap32First API string
  crit: component
  conf: 0.8
  if:
    type: text
    word: Heap32First
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
composite_rules:
- id: dynamic-toolhelp-process-traversal
  desc: Runtime Toolhelp process traversal
  crit: notable
  conf: 0.97
  attack: T1057
  mbc: E1057
  all:
  - id: create-toolhelp32-snapshot-string
  - id: dynamic-process32-first
  - id: dynamic-process32-next
  unless:
  - id: metadata/lang/compiler/systems::go-binary-comp
- id: toolhelp-module-enumeration
  desc: Toolhelp snapshot module enumeration
  crit: notable
  conf: 0.91
  all:
  - id: create-toolhelp32-snapshot
  - id: module32-first
  - id: module32-next
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/binary/installer/script/
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/installer/script/
- id: toolhelp-process-enumeration-symbol
  desc: Toolhelp process enumeration via imports
  crit: notable
  conf: 0.9
  attack: T1057
  all:
  - id: create-toolhelp32-snapshot
  - id: process32-first
  - id: process32-next
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/binary/installer/script/
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/installer/script/
- id: toolhelp-process-enumeration
  desc: Toolhelp snapshot process enumeration
  crit: notable
  conf: 0.9
  attack: T1057
  any:
  - id: toolhelp-process-enumeration-symbol
  - id: toolhelp-process-enumeration-source
  - id: toolhelp-api-name-triplet
  - id: toolhelp-process-enumeration-obfuscated
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/binary/installer/script/
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/installer/script/
- id: toolhelp-process-enumeration-obfuscated
  desc: Obfuscated Toolhelp process enumeration
  crit: suspicious
  conf: 0.94
  attack: T1057
  all:
  - id: create-toolhelp32-snapshot-obfuscated
  - id: process32-first-obfuscated
  - id: process32-next-obfuscated
- id: toolhelp-process-enumeration-source
  desc: Toolhelp process enumeration in source
  crit: notable
  conf: 0.9
  attack: T1057
  for: [c, cpp]
  all:
  - id: create-toolhelp32-snapshot-source
  - id: process32-first-source
  - id: process32-next-source
- id: toolhelp-module-enumeration-string
  desc: Toolhelp module enumeration strings
  crit: notable
  conf: 0.9
  all:
  - id: module32-first-string
  - id: module32-next-string
- id: toolhelp-thread-enumeration-string
  desc: Toolhelp thread enumeration strings
  crit: notable
  conf: 0.9
  all:
  - id: thread32-first-string
  - id: thread32-next-string
- id: toolhelp-heap-enumeration-string
  desc: Toolhelp heap enumeration strings
  crit: notable
  conf: 0.88
  all:
  - id: heap32list-first-string
  - id: heap32list-next-string
- id: dynamic-toolhelp-enumerator
  desc: Dynamically resolved Toolhelp enumeration suite
  crit: notable
  conf: 0.92
  all:
  - id: micro-behaviors/os/module/load::get-proc-address-import
  any:
  - id: toolhelp-api-name-triplet
  - id: toolhelp-module-enumeration-string
  - id: toolhelp-thread-enumeration-string
  - id: toolhelp-heap-enumeration-string
- id: packed-toolhelp-string-bundle
  desc: Packed Toolhelp string bundle
  crit: baseline
  conf: 0.7
  all:
  - id: metadata/binary/symbols/compat::zero-import-count
  - id: metadata/binary/metrics/structural::single-complex-function
- id: comprehensive-toolhelp-strings
  desc: Comprehensive Toolhelp API string suite
  crit: notable
  conf: 0.9
  attack: T1057
  any:
  - id: create-toolhelp32-snapshot-string
  - id: toolhelp-module-enumeration-string
  - id: toolhelp-thread-enumeration-string
  - id: toolhelp-heap-enumeration-string
  - id: toolhelp32-read-process-memory-string
