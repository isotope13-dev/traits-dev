# Process enumeration via snapshots - Windows
# Used by malware to identify security products to terminate
defaults:
  for: [pe, dll, c, cpp]
  platforms: [windows]
traits:
  - id: create-toolhelp32-snapshot
    desc: Create process or module snapshot
    crit: notable
    conf: 0.9
    attack: "T1057"
    mbc: "E1057"
    if:
      type: raw
      word: "CreateToolhelp32Snapshot"
  - id: process32-first
    desc: Get first process from snapshot
    crit: notable
    conf: 0.9
    attack: "T1057"
    if:
      type: raw
      regex: "\\bProcess32First[AW]?\\b"
  - id: process32-next
    desc: Enumerate next process in snapshot
    crit: notable
    conf: 0.9
    attack: "T1057"
    if:
      type: raw
      regex: "\\bProcess32Next[AW]?\\b"
  - id: toolhelp-api-name-triplet
    desc: Embedded Toolhelp process API triplet
    crit: notable
    conf: 0.82
    attack: "T1057"
    if:
      type: raw
      regex: "Process32Next.{0,8}Process32First.{0,8}CreateToolhelp32Snapshot"
  - id: create-toolhelp32-snapshot-obfuscated
    desc: Obfuscated CreateToolhelp32Snapshot API string
    crit: notable
    conf: 0.92
    attack: "T1057"
    if:
      type: string
      exact: "aoe2pteTh3aorelpnhCtolSs"
  - id: process32-first-obfuscated
    desc: Obfuscated Process32First API string
    crit: notable
    conf: 0.92
    attack: "T1057"
    if:
      type: string
      exact: "c3rosirsFtPe2s"
  - id: process32-next-obfuscated
    desc: Obfuscated Process32Next API string
    crit: notable
    conf: 0.92
    attack: "T1057"
    if:
      type: string
      exact: "c3xosersNPe2t"
  - id: module32-first
    desc: Get first module from snapshot
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "Module32First[AW]?$"
  - id: module32-next
    desc: Enumerate next module from snapshot
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "Module32Next[AW]?$"
composite_rules:
  - id: toolhelp-process-enumeration-symbol
    desc: Toolhelp process enumeration via imports
    crit: notable
    conf: 0.9
    attack: "T1057"
    all:
      - id: create-toolhelp32-snapshot
      - id: process32-first
      - id: process32-next
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
  - id: toolhelp-process-enumeration
    desc: Toolhelp snapshot process enumeration
    crit: notable
    conf: 0.9
    attack: "T1057"
    any:
      - id: toolhelp-process-enumeration-symbol
      - id: toolhelp-api-name-triplet
      - id: toolhelp-process-enumeration-obfuscated
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
  - id: toolhelp-process-enumeration-obfuscated
    desc: Obfuscated Toolhelp process enumeration
    crit: suspicious
    conf: 0.94
    attack: "T1057"
    all:
      - id: create-toolhelp32-snapshot-obfuscated
      - id: process32-first-obfuscated
      - id: process32-next-obfuscated
