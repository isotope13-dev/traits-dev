defaults:
  for:
    - pe
    - dll
    - c
    - cpp
  platforms:
    - windows
traits:
  - id: create-toolhelp32-snapshot
    desc: Create process or module snapshot
    crit: notable
    conf: 0.9
    attack: T1057
    mbc: E1057
    for: [pe, dll]
    if:
      type: text
      exact: CreateToolhelp32Snapshot
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - type: text
        substr: "Nullsoft Install System"
      - type: basename
        exact: nsProcess.dll
  - id: process32-first
    desc: Get first process from snapshot
    crit: notable
    conf: 0.9
    attack: T1057
    for: [pe, dll]
    if:
      type: text
      regex: Process32First[AW]?$
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft-windows
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - type: text
        substr: "Nullsoft Install System"
      - type: basename
        exact: nsProcess.dll
  - id: process32-next
    desc: Enumerate next process in snapshot
    crit: notable
    conf: 0.9
    attack: T1057
    for: [pe, dll]
    if:
      type: text
      regex: Process32Next[AW]?$
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft-windows
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - type: text
        substr: "Nullsoft Install System"
      - type: basename
        exact: nsProcess.dll
  - id: create-toolhelp32-snapshot-source
    desc: Create process or module snapshot
    crit: notable
    conf: 0.9
    attack: T1057
    mbc: E1057
    for: [c, cpp]
    if:
      type: text
      regex: \bCreateToolhelp32Snapshot\s*\(
  - id: process32-first-source
    desc: Get first process from snapshot
    crit: notable
    conf: 0.9
    attack: T1057
    for: [c, cpp]
    if:
      type: text
      regex: \bProcess32First[AW]?\b
  - id: process32-next-source
    desc: Enumerate next process in snapshot
    crit: notable
    conf: 0.9
    attack: T1057
    for: [c, cpp]
    if:
      type: text
      regex: \bProcess32Next[AW]?\b
  - id: toolhelp-api-name-triplet
    desc: Embedded Toolhelp process API triplet
    crit: notable
    conf: 0.82
    attack: T1057
    if:
      type: raw
      regex: Process32Next.{0,8}Process32First.{0,8}CreateToolhelp32Snapshot
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - type: text
        substr: "Nullsoft Install System"
      - type: basename
        exact: nsProcess.dll
  - id: create-toolhelp32-snapshot-obfuscated
    desc: Obfuscated CreateToolhelp32Snapshot API string
    crit: notable
    conf: 0.92
    attack: T1057
    if:
      type: text
      exact: aoe2pteTh3aorelpnhCtolSs
  - id: process32-first-obfuscated
    desc: Obfuscated Process32First API string
    crit: notable
    conf: 0.92
    attack: T1057
    if:
      type: text
      exact: c3rosirsFtPe2s
  - id: process32-next-obfuscated
    desc: Obfuscated Process32Next API string
    crit: notable
    conf: 0.92
    attack: T1057
    if:
      type: text
      exact: c3xosersNPe2t
  - id: module32-first
    desc: Get first module from snapshot
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: Module32First[AW]?$
  - id: module32-next
    desc: Enumerate next module from snapshot
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: Module32Next[AW]?$
  - id: module32-first-string
    desc: Module32First API string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Module32First
  - id: module32-next-string
    desc: Module32Next API string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Module32Next
  - id: thread32-first-string
    desc: Thread32First API string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Thread32First
  - id: thread32-next-string
    desc: Thread32Next API string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Thread32Next
  - id: heap32list-first-string
    desc: Heap32ListFirst API string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Heap32ListFirst
  - id: heap32list-next-string
    desc: Heap32ListNext API string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Heap32ListNext
  - id: create-toolhelp32-snapshot-string
    desc: CreateToolhelp32Snapshot API string
    crit: component
    conf: 0.85
    attack: T1057
    for: [c, cpp]
    if:
      type: text
      substr: CreateToolhelp32Snapshot
  - id: toolhelp32-read-process-memory-string
    desc: Toolhelp32ReadProcessMemory API string
    crit: component
    conf: 0.82
    if:
      type: text
      exact: Toolhelp32ReadProcessMemory
  - id: heap32-first-string
    desc: Heap32First API string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Heap32First
composite_rules:
  - id: toolhelp-process-enumeration-symbol
    desc: Toolhelp process enumeration via imports
    crit: notable
    conf: 0.9
    attack: T1057
    all:
      - id: create-toolhelp32-snapshot
      - id: process32-first
      - id: process32-next
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/binary/installer/script::nsis
        - id: metadata/package/versioning::pe-version-resource
        - type: text
          substr: "ELECTRON_ENABLE_LOGGING"
        - type: text
          substr: "Nullsoft Install System"
  - id: toolhelp-process-enumeration
    desc: Toolhelp snapshot process enumeration
    crit: notable
    conf: 0.9
    attack: T1057
    any:
      - id: toolhelp-process-enumeration-symbol
      - id: toolhelp-process-enumeration-source
      - id: toolhelp-api-name-triplet
      - id: toolhelp-process-enumeration-obfuscated
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/binary/installer/script::nsis
        - id: metadata/package/versioning::pe-version-resource
        - type: text
          substr: "ELECTRON_ENABLE_LOGGING"
        - type: text
          substr: "Nullsoft Install System"
  - id: toolhelp-process-enumeration-obfuscated
    desc: Obfuscated Toolhelp process enumeration
    crit: suspicious
    conf: 0.94
    attack: T1057
    all:
      - id: create-toolhelp32-snapshot-obfuscated
      - id: process32-first-obfuscated
      - id: process32-next-obfuscated
  - id: toolhelp-process-enumeration-source
    desc: Toolhelp process enumeration in source
    crit: notable
    conf: 0.9
    attack: T1057
    for: [c, cpp]
    all:
      - id: create-toolhelp32-snapshot-source
      - id: process32-first-source
      - id: process32-next-source
  - id: toolhelp-module-enumeration-string
    desc: Toolhelp module enumeration strings
    crit: notable
    conf: 0.9
    all:
      - id: module32-first-string
      - id: module32-next-string
  - id: toolhelp-thread-enumeration-string
    desc: Toolhelp thread enumeration strings
    crit: notable
    conf: 0.9
    all:
      - id: thread32-first-string
      - id: thread32-next-string
  - id: toolhelp-heap-enumeration-string
    desc: Toolhelp heap enumeration strings
    crit: notable
    conf: 0.88
    all:
      - id: heap32list-first-string
      - id: heap32list-next-string
  - id: dynamic-toolhelp-enumerator
    desc: Dynamic Toolhelp enumeration suite
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: toolhelp-api-name-triplet
      - id: toolhelp-process-enumeration
      - id: toolhelp-module-enumeration-string
      - id: toolhelp-thread-enumeration-string
      - id: toolhelp-heap-enumeration-string
  - id: packed-toolhelp-string-bundle
    desc: Packed Toolhelp string bundle
    crit: baseline
    conf: 0.7
    all:
      - id: metadata/binary/symbols::zero-import-count
      - id: metadata/binary/metrics::single-complex-function
  - id: comprehensive-toolhelp-strings
    desc: Comprehensive Toolhelp API string suite
    crit: suspicious
    conf: 0.9
    attack: T1057
    any:
      - id: create-toolhelp32-snapshot-string
      - id: toolhelp-module-enumeration-string
      - id: toolhelp-thread-enumeration-string
      - id: toolhelp-heap-enumeration-string
      - id: toolhelp32-read-process-memory-string
      - id: heap32-first-string
    needs: 3
    downgrade:
      any:
        - id: packed-toolhelp-string-bundle
        - id: metadata/package/versioning::pe-version-resource
