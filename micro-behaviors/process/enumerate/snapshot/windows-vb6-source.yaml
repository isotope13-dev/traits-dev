defaults:
  platforms: [windows]
  attack: T1057
  for: [vbs]
traits:
  - id: create-toolhelp-snapshot-vb6
    desc: VB6 Toolhelp snapshot declare
    crit: notable
    conf: 0.93
    if:
      type: raw
      substr: CreateToolhelpSnapshot
  - id: process32-first-vb6
    desc: VB6 Process32First alias
    crit: notable
    conf: 0.92
    if:
      type: raw
      substr: Alias "Process32First"
  - id: process-first-call-vb6
    desc: VB6 ProcessFirst call site
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: ProcessFirst(hSnapshot, uProcess)
  - id: process32-next-vb6
    desc: VB6 Process32Next alias
    crit: notable
    conf: 0.92
    if:
      type: raw
      substr: Alias "Process32Next"
  - id: process-next-call-vb6
    desc: VB6 ProcessNext call site
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: ProcessNext(hSnapshot, uProcess)
composite_rules:
  - id: process-first-vb6
    desc: VB6 first process iteration
    crit: notable
    conf: 0.93
    any:
      - id: process32-first-vb6
      - id: process-first-call-vb6
  - id: process-next-vb6
    desc: VB6 next process iteration
    crit: notable
    conf: 0.93
    any:
      - id: process32-next-vb6
      - id: process-next-call-vb6
  - id: toolhelp-process-enumeration-vb6
    desc: VB6 Toolhelp process enumeration
    crit: notable
    conf: 0.95
    all:
      - id: create-toolhelp-snapshot-vb6
      - id: process-first-vb6
      - id: process-next-vb6
