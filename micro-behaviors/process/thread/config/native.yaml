defaults:
  platforms: [linux, macos, windows]
  for: [binaries, elf, macho, pe]

traits:
  - id: thread-pool-min-max-format
    desc: Thread pool min/max format
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(min|max) threads: %u'
    unless:
      - id: metadata/vendor/identity::freebsd-kernel-image
