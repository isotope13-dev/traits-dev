defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: set-priority-class
    desc: Raise process priority class
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "SetPriorityClass"
  - id: set-thread-priority
    desc: Raise thread execution priority
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "SetThreadPriority"
composite_rules:
  - id: priority-adjustment
    desc: Adjust process or thread priority
    crit: baseline
    conf: 0.88
    any:
      - id: set-priority-class
      - id: set-thread-priority
