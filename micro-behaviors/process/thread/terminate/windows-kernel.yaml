defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9

traits:
  - id: ps-terminate-system-thread
    desc: Terminate kernel system thread
    if:
      type: symbol
      exact: PsTerminateSystemThread
  - id: ps-terminate-system-thread-xoradd-string
    desc: Encoded PsTerminateSystemThread string
    conf: 0.93
    if:
      type: text
      substr: 'dFbRJTSU]I[l926&)'
