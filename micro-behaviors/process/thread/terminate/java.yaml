# Detects usage of deprecated Thread.stop() in Java
# Ref: https://docs.oracle.com/javase/8/docs/technotes/guides/concurrency/threadPrimitiveDeprecation.html
# Lang: java
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: stop
    desc: Detects usage of deprecated Thread.stop() in Java
    crit: suspicious
    conf: 0.8
    for: [java]
    if:
      type: text
      # Limit to explicit Thread.stop() or thread-like variable names.
      regex: '(\bThread|\b[a-zA-Z0-9_]*Thread)\.stop\s*\(\s*\)'
    not:
      - substr: "bumpyIcon.stop()"
      - substr: "animating.stop()"
      - substr: "cloningfeature.stop()"
      - substr: "dp.stop()"
      - substr: "surf.stop()"
      - substr: "runwindow.stop()"
