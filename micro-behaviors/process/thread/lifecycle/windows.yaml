defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
traits:
  - id: create-fiber
    desc: Create a fiber object
    if:
      type: symbol
      exact: CreateFiber
  - id: switch-to-fiber
    desc: Switch to a fiber object
    if:
      type: symbol
      exact: SwitchToFiber
  - id: convert-thread-to-fiber
    desc: Convert thread to fiber
    if:
      type: symbol
      exact: ConvertThreadToFiber
