defaults:
  platforms: [windows, unix]
traits:
  - id: jvm-thread-class-ref
    desc: JVM Thread class reference
    crit: baseline
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/lang/Thread
  - id: respawn
    desc: Thread started from finally block
    crit: notable
    conf: 0.8
    for: [java]
    if:
      type: text
      regex: 'finally\s*\{[\s\S]{0,240}new\s+Thread[\s\S]{0,120}\.start\(\)'
    unless:
      - type: basename
        regex: '.*Test\.java$'
