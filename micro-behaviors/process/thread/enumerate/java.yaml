defaults:
  platforms: [windows, unix]
  for: [java]
traits:
  - id: get-group
    desc: Detects getThreadGroup call
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\.getThreadGroup\s*\(\s*\)'
    unless:
      - type: basename
        regex: '.*Test\.java$'
  - id: enumerate-dup
    desc: Detects enumerate call
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\.enumerate\s*\(\s*[^,]{1,100},\s*(true|false)\s*\)'
