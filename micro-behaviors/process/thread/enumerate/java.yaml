defaults:
  platforms: [windows, unix]
  for: [java]
traits:
  - id: get-group
    desc: Java thread group access
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.getThreadGroup\s*\(\s*\)'
    unless:
      - type: basename
        regex: '.*Test\.java$'
  - id: enumerate-dup
    desc: Java thread enumeration call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.enumerate\s*\(\s*[^,]{1,100},\s*(true|false)\s*\)'
