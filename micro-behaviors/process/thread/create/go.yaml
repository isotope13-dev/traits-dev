defaults:
  platforms: [unix, windows]
  for: [go]
traits:
  - id: go-init-with-goroutine
    desc: Go init launches goroutine
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'func\s+init\s*\(\s*\)\s*\{[\s\S]{0,400}\bgo\s+'
  - id: go-goroutine-launch-call
    desc: Go goroutine launch call
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '\bgo\s+(func\s*\(|[A-Za-z_][A-Za-z0-9_]*\s*\()'
  - id: go-goroutine-connect-call
    desc: Go goroutine launches connect call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bgo\s+([A-Za-z_]\w*\.)?connect\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: go-goroutine-dial-call
    desc: Go goroutine launches dial call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bgo\s+([A-Za-z_]\w*\.)?dial\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
