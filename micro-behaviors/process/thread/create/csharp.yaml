defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: threadstart-source
    desc: C# ThreadStart source usage
    crit: baseline
    conf: 0.94
    if:
      type: raw
      regex: 'new\s+Thread\s*\(\s*new\s+ThreadStart'
  - id: background-thread-source
    desc: Background thread source flag
    crit: baseline
    conf: 0.9
    if:
      type: raw
      regex: 'IsBackground\s*=\s*true'
  - id: worker-name-core
    desc: Core worker thread names
    crit: notable
    conf: 0.97
    count_min: 3
    if:
      type: raw
      regex: 'Name\s*=\s*"(wall|topics|albums)"'
  - id: worker-name-media
    desc: Media worker thread names
    crit: notable
    conf: 0.97
    count_min: 2
    if:
      type: raw
      regex: 'Name\s*=\s*"(audio|video)"'
composite_rules:
  - id: threadstart-burst
    desc: Multi-threaded attack fanout
    crit: notable
    conf: 0.98
    all:
      - id: threadstart-source
      - id: background-thread-source
      - id: worker-name-core
      - id: worker-name-media
