# Thread Creation
# Local thread creation in current process
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Thread Creation ===
  - id: create-thread
    desc: Create thread in current process
    crit: baseline
    conf: 0.95
    attack: "T1129"
    if:
      type: symbol
      exact: "CreateThread"
  - id: exit-thread
    desc: Exit thread execution
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "ExitThread"
  - id: python-threading-thread
    desc: Python thread creation
    crit: notable
    conf: 0.82
    for: [python]
    platforms: [windows, unix]
    if:
      type: symbol
      exact: threading.Thread
