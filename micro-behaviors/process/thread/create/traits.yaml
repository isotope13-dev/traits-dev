# Thread Creation
# Local thread creation in current process
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Thread Creation ===
  - id: create-thread
    desc: Create thread in current process
    crit: baseline
    conf: 0.95
    attack: "T1129"
    if:
      type: import
      exact: "CreateThread"
  - id: create-thread-buffer-resolved-x64
    desc: Resolved x64 thread start from buffer
    crit: notable
    conf: 0.96
    attack: "T1055"
    arch: [x86-64]
    if:
      type: hex
      section: .text
      # CreateThread(NULL, 0, start_address, NULL, 0, NULL) under the x64
      # ABI, with the function pointer loaded from a RIP-relative table.
      pattern: '48 8B 05 ?? ?? ?? ?? 48 8B 55 ?? 48 C7 44 24 28 00 00 00 00 C7 44 24 20 00 00 00 00 41 B9 00 00 00 00 49 89 D0 BA 00 00 00 00 B9 00 00 00 00 FF D0'
  - id: exit-thread
    desc: Exit thread execution
    crit: baseline
    conf: 0.90
    if:
      type: import
      exact: "ExitThread"
  # Python thread creation lives in micro-behaviors/process/create/thread/python.yaml
  # (python-thread-create / python-daemon-thread) — this file is Windows-only
  # thread lifecycle (CreateThread/ExitThread).
