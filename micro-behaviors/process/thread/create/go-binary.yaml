defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]

traits:
  - id: go-runtime-newproc-text
    desc: Go runtime newproc text
    crit: baseline
    conf: 0.76
    platforms: [windows]
    for: [pe]
    if:
      type: text
      substr: runtime.newproc
  - id: go-runtime-newproc-elf-bytes
    desc: Go runtime newproc ELF bytes
    crit: baseline
    conf: 0.76
    platforms: [unix]
    for: [elf]
    if:
      type: hex
      section: .gopclntab
      pattern: 72 75 6E 74 69 6D 65 2E 6E 65 77 70 72 6F 63
  - id: go-runtime-newproc-macho-bytes
    desc: Go runtime newproc Mach-O bytes
    crit: baseline
    conf: 0.76
    platforms: [macos]
    for: [macho]
    if:
      type: hex
      section: __gopclntab
      pattern: 72 75 6E 74 69 6D 65 2E 6E 65 77 70 72 6F 63

composite_rules:
  - id: go-runtime-newproc-binary
    desc: Go runtime newproc binary
    crit: baseline
    conf: 0.76
    any:
      - id: go-runtime-newproc-text
      - id: go-runtime-newproc-elf-bytes
      - id: go-runtime-newproc-macho-bytes
