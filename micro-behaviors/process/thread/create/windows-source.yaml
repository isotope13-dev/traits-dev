defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: create-thread-source
    desc: CreateThread usage in source
    crit: notable
    conf: 0.9
    if:
      type: text
      word: "CreateThread"
  - id: addthread-helper
    desc: Internal addthread orchestration helper
    crit: notable
    conf: 0.88
    if:
      type: text
      word: "addthread"
composite_rules:
  - id: threaded-task-orchestration
    desc: Threaded task orchestration pattern
    crit: notable
    conf: 0.92
    all:
      - id: create-thread-source
      - id: addthread-helper
