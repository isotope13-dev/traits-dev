defaults:
  for:
    - pe
    - pe
    - c
    - cpp
  platforms:
    - windows
  mbc: C0042
traits:
  - id: create-mutex
    desc: CreateMutex API call
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: CreateMutex[AW]?$
  - id: create-mutex-ex
    desc: CreateMutexEx API call (extended)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: CreateMutexEx[AW]?$
  - id: open-mutex
    desc: OpenMutex API call
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: OpenMutex[AW]?$
  - id: release-mutex
    desc: ReleaseMutex API call
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: ReleaseMutex
  - id: global-prefix
    desc: Global namespace mutex prefix
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)^Global\\\\
  - id: local-prefix
    desc: Local namespace mutex prefix
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: (?i)^Local\\\\
  - id: guid-mutex
    desc: GUID-formatted mutex name
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \{[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}\}
    unless:
      - id: metadata/document/office::help2-container
    not:
      - substr: supportedOS
      - substr: schemas-microsoft-com
      - substr: e2011457-1546-43c5-a5fe-008deee3d3f0
      - substr: 35138b9a-5d96-4fbd-8e2d-a2440225f93a
      - substr: 4a2f28e3-53b9-4441-ba9c-d69d4a4a6e38
      - substr: 1f676c76-80e1-4239-95bb-83d0f6d0da78
      - substr: 8e0f7a12-bfb3-4fe8-b9a5-48fd50a15a9a
    downgrade:
      any:
        - type: text
          substr: RegServer
        - type: text
          substr: APPID
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics::many-imports
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
  - id: dense-global-numeric-mutexes
    desc: Many numbered global mutex names
    crit: suspicious
    conf: 0.86
    count_min: 8
    if:
      type: text
      regex: (?i)\\bGlobal\\\\[0-9]{2,5}\\b
  - id: global-once-mutexes
    desc: Multiple Global\\name_once mutexes
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: (?i)^Global\\\\[a-z0-9]{4,24}_once$
composite_rules:
  - id: mutex-api
    desc: Mutex creation/access API
    crit: baseline
    conf: 0.85
    any:
      - id: create-mutex
      - id: create-mutex-ex
      - id: open-mutex
  - id: dynamic-mutex-resolution
    desc: Dynamic resolution of mutex objects
    crit: notable
    conf: 0.8
    any:
      - id: create-mutex
      - id: open-mutex
  - id: global-mutex-single-instance
    desc: Global mutex for single instance check
    crit: notable
    conf: 0.85
    all:
      - id: global-prefix
    any:
      - id: create-mutex
      - id: open-mutex
  - id: mutex-instance-check
    desc: Mutex-based single instance enforcement
    crit: baseline
    conf: 0.8
    all:
      - id: mutex-api
    any:
      - id: micro-behaviors/process/terminate/kill::exit-process
      - id: micro-behaviors/os/exception/error-handling::get-last-error
