defaults:
  for: [powershell]
  platforms: [windows]
  mbc: C0042
traits:
  - id: new-object-mutex
    desc: System.Threading.Mutex creation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'New-Object\s+System\.Threading\.Mutex'
  - id: global-guid-name
    desc: Global GUID mutex name
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'Global\\[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      case_insensitive: true
  - id: mutex-release-call
    desc: Mutex release method
    crit: baseline
    conf: 0.82
    if:
      type: text
      substr: ReleaseMutex
  - id: created-flag-exit
    desc: Mutex creation exit gate
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '-not\s+\$[A-Za-z0-9_]+\)\s*\{\s*exit\s+[01]'
composite_rules:
  - id: global-mutex-single-instance-script
    desc: PowerShell single instance mutex
    crit: notable
    conf: 0.93
    all:
      - id: new-object-mutex
      - id: global-guid-name
    any:
      - id: mutex-release-call
      - id: created-flag-exit
