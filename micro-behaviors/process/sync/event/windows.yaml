# Event Synchronization - Windows
# MBC: C0039 (Inter-Process Communication)
defaults:
  for: [pe, dll]
  platforms: [windows]
  mbc: "C0039"
traits:
  - id: create-event
    desc: Create named event object
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: '^CreateEvent[AW]?$'
  - id: open-event
    desc: Open named event object
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: '^OpenEvent[AW]?$'
  - id: global-bank-event-name
    desc: Global bank-themed event name
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'Global\\[A-Za-z0-9]{0,16}Bank[A-Za-z0-9]{0,24}Event'
  - id: pulse-event
    desc: Pulse event object state
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: 'PulseEvent'
  - id: set-event
    desc: Set event object state
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: 'SetEvent'
  - id: reset-event
    desc: Reset event object state
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: 'ResetEvent'
