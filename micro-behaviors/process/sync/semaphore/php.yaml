defaults:
  platforms: [unix]
  for: [php]
traits:
  - id: sem-get
    desc: PHP semaphore creation access
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: sem_get
  - id: sem-acquire
    desc: PHP semaphore acquire call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: sem_acquire
  - id: sem-release
    desc: PHP semaphore release call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: sem_release
composite_rules:
  - id: semaphore-ops
    desc: PHP semaphore synchronization
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: sem-get
      - id: sem-acquire
      - id: sem-release
