# Semaphore Synchronization - Windows
# MBC: C0042 (Mutex/Semaphore synchronization primitives)
defaults:
  for: [pe]
  platforms: [windows]
  mbc: "C0042"
traits:
  - id: create-semaphore
    desc: Create semaphore object
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "^CreateSemaphore(Ex)?[AW]?$"
  - id: open-semaphore
    desc: Open named semaphore object
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: "^OpenSemaphore[AW]?$"
  - id: release-semaphore
    desc: Release semaphore count
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "ReleaseSemaphore"
  - id: wait-for-multiple-objects
    desc: Wait on multiple object handles
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "WaitForMultipleObjects"
  - id: wait-for-multiple-objects-ex
    desc: Wait on multiple handles extended
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "WaitForMultipleObjectsEx"
composite_rules:
  - id: semaphore-api
    desc: Semaphore synchronization API usage
    crit: baseline
    conf: 0.85
    any:
      - id: create-semaphore
      - id: open-semaphore
      - id: release-semaphore
  - id: coordinated-semaphore-wait
    desc: Semaphore coordination with wait logic
    crit: baseline
    conf: 0.85
    all:
      - id: semaphore-api
    any:
      - id: wait-for-multiple-objects
      - id: wait-for-multiple-objects-ex
