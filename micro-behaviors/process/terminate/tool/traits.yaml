defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: kill-dup
    desc: Unix kill command terminates processes
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (^|/)kill\s+-[0-9A-Z]+\b|/bin/kill\b
  - id: killall
    desc: killall command
    crit: notable
    conf: 0.8
    count_min: 2
    if:
      type: text
      word: killall
  - id: pkill
    desc: pkill process termination command
    crit: notable
    conf: 0.8
    if:
      type: text
      word: pkill
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::freebsd-pjdfstest-shell
  - id: taskkill-explorer-force
    desc: Force kills Windows Explorer
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    for: [batch, powershell, vbs]
    if:
      type: text
      regex: (?i)\btaskkill\b[^\r\n]{0,80}/f[^\r\n]{0,80}/im\s+explorer\.exe\b
  - id: taskkill-pid-force
    desc: Force kills process by PID
    crit: notable
    conf: 0.9
    platforms: [windows]
    if:
      type: text
      regex: (?i)(^|[\s"/])taskkill(\.exe)?\b[^\r\n]{0,40}/f[^\r\n]{0,40}/pid\b
