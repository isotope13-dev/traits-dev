defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: kill-dup
    desc: kill command
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (^|/)kill\s+-[0-9A-Z]+\b|/bin/kill\b
  - id: killall
    desc: killall command
    crit: notable
    conf: 0.8
    count_min: 2
    if:
      type: text
      word: killall
  - id: pkill
    desc: pkill command
    crit: notable
    conf: 0.8
    if:
      type: text
      word: pkill
