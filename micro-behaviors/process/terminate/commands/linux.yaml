# Process Termination CLI Commands (Linux)
# MBC: F0007 (Defense Evasion)
# ATT&CK: T1070 (Indicator Removal)
defaults:
  platforms: [linux, unix, macos, android, ios]
  crit: notable
  conf: 0.7
  for: [shell, elf]
traits:
  - id: pkill-force
    desc: pkill force kill pattern (-9)
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "pkill\\s+-9\\s+-f"
  - id: busybox-kill-force-encoded
    desc: XOR-obfuscated busybox kill -9
    crit: suspicious
    conf: 0.88
    if:
      type: hex
      section: ".rodata"
      pattern: 7B 36 3D 3A 7B 36 21 27 2D 36 3B 2C 74 3F 3D 38 38 74 79 6D 74 54
