defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: kill-dup
    desc: Unix kill command terminates processes
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (^|/)kill\s+-[0-9A-Z]+\b|/bin/kill\b
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: kill-force
    desc: Force kill command
    crit: notable
    conf: 0.82
    platforms: [unix]
    if:
      type: text
      regex: '\b(pkill|killall|kill)\s+-9\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: killall
    desc: killall command
    crit: notable
    conf: 0.8
    count_min: 2
    if:
      type: text
      word: killall
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
  - id: pkill
    desc: pkill process termination command
    crit: notable
    conf: 0.8
    if:
      type: text
      word: pkill
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
  - id: taskkill-explorer-force
    desc: Force kills Windows Explorer
    crit: notable
    conf: 0.94
    platforms: [windows]
    for: [batch, powershell, vbs]
    if:
      type: text
      regex: (?i)\btaskkill\b[^\r\n]{0,80}/f[^\r\n]{0,80}/im\s+explorer\.exe\b
  - id: taskkill-pid-force
    desc: Force kills process by PID
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [python]
    if:
      type: text
      regex: (?i)(^|[\s"/])taskkill(\.exe)?\b[^\r\n]{0,40}/f[^\r\n]{0,40}/pid\b
  - id: taskkill-token
    desc: taskkill command token
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: notable
    conf: 0.72
    platforms: [windows]
    for: [javascript, typescript, batch, powershell, vbs]
    if:
      type: text
      regex: '(?i)(^|[\s"'';&|])taskkill(\.exe)?(?=[\s/]|$)'
  - id: taskkill-pid-argument
    desc: taskkill PID argument
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: notable
    conf: 0.78
    platforms: [windows]
    if:
      type: text
      exact: /PID
  - id: taskkill-svchost-force
    desc: Force kills svchost.exe by image name
    crit: notable
    conf: 0.94
    platforms: [windows]
    for: [batch, powershell, vbs]
    if:
      type: text
      regex: (?i)\btaskkill\b[^\r\n]{0,80}/f[^\r\n]{0,80}/im\s+svchost\.exe\b
  - id: taskkill-browser-image
    desc: Terminates browser process by image name
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [python]
    if:
      type: text
      regex: '(?i)\btaskkill(\.exe)?\b[^\r\n]{0,80}\b(brave|chrome|msedge|opera)\.exe\b'

  - id: pyc-taskkill-force-image
    desc: Python bytecode force-kills a process image
    crit: notable
    conf: 0.92
    platforms: [windows]
    for: [pyc]
    if:
      type: text
      regex: '(?i)\btaskkill\b[^\r\n]{0,80}/f[^\r\n]{0,80}/im\b'

  - id: js-taskkill-force-command
    desc: JavaScript force-kills a Windows process
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\btaskkill(\.exe)?\b[^\r\n]{0,80}(/im\b[^\r\n]{0,80}/f\b|/f\b[^\r\n]{0,80}/im\b)'
  - id: batch-taskkill-image-name
    desc: Batch force-kills a process by image name
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [batch]
    if:
      type: text
      regex: '(?i)\btaskkill\b.{0,80}/f.{0,80}/im\s+[A-Za-z0-9_.-]+\.exe\b'

  - id: native-taskkill-force-image
    desc: Native binary embeds force-kill command
    crit: notable
    conf: 0.92
    platforms: [windows]
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: '(?i)\btaskkill(\.exe)?\b[^\r\n]{0,100}/f[^\r\n]{0,100}/im\s+["'']?[A-Za-z0-9_.-]+\.exe\b'
composite_rules:
  - id: taskkill-pid-command
    desc: taskkill terminates by PID
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: notable
    conf: 0.86
    platforms: [windows]
    all:
      - id: taskkill-token
      - id: taskkill-pid-argument
