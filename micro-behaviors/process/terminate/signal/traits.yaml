defaults:
  for: [binaries, source]
  platforms:
    - unix
    - windows
traits:
  - id: kill
    desc: Send signal to process
    crit: baseline
    mbc: E1562
    attack: T1562
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: symbol
      exact: kill
    platforms:
      - unix
  - id: killpg
    desc: Send signal to process group
    crit: notable
    mbc: E1562
    attack: T1562
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: symbol
      exact: killpg
    platforms:
      - unix
  - id: sigprocmask
    desc: Examine or change blocked signals
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: symbol
      exact: sigprocmask
    platforms:
      - unix
  - id: _exit
    desc: Terminate process immediately without cleanup
    crit: baseline
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: symbol
      exact: _exit
    platforms:
      - unix
