defaults:
  for: [binaries, source]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: kill
    desc: Send signal to process
    crit: baseline
    mbc: E1562
    attack: T1562
    conf: 0.6
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: kill
    platforms:
      - unix
      - linux
      - macos
  - id: killpg
    desc: Send signal to process group
    crit: notable
    mbc: E1562
    attack: T1562
    conf: 0.7
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: killpg
    platforms:
      - unix
      - linux
      - macos
  - id: sigprocmask
    desc: Examine or change blocked signals
    crit: baseline
    conf: 0.6
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: sigprocmask
    platforms:
      - unix
      - linux
      - macos
  - id: _exit
    desc: Terminate process immediately without cleanup
    crit: baseline
    conf: 0.4
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: _exit
    platforms:
      - unix
      - linux
      - macos
