defaults:
  for: [elf, macho, so]
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: kill
    desc: Send signal to process
    crit: baseline
    mbc: E1562
    attack: T1562
    conf: 0.6
    if:
      type: symbol
      exact: kill
    platforms:
      - linux
      - macos
  - id: killpg
    desc: Send signal to process group
    crit: notable
    mbc: E1562
    attack: T1562
    conf: 0.7
    if:
      type: symbol
      exact: killpg
    platforms:
      - linux
      - macos
  - id: sigprocmask
    desc: Examine or change blocked signals
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: sigprocmask
    platforms:
      - linux
      - macos
  - id: _exit
    desc: Terminate process immediately without cleanup
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      exact: _exit
    platforms:
      - linux
      - macos
