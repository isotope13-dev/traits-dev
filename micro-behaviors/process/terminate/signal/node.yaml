# Node.js Process Termination Signals
# Detects process.kill() with negative PID (process group killing)
defaults:
  for: [javascript, typescript]
  platforms: [windows, unix]
traits:
  - id: process-kill-group
    desc: Process group kill via negative PID
    # Killing a process group (negative PID) is standard process-supervision
    # cleanup — spawn-a-shell test harnesses and daemon managers do it routinely.
    # Notable as a capability; intent composites can reference it for EDR-kill.
    crit: notable
    conf: 0.85
    mbc: "E1562"
    attack: "T1562"
    if:
      type: text
      regex: 'process\.kill\(\s*-'
    unless:
    - id: micro-behaviors/process/interpreter/vm/
    - id: well-known/tool/detection/sast/
