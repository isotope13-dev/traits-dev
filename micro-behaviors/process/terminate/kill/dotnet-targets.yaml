defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: dotnet-process-enumeration-member
    desc: .NET process enumeration member
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: GetProcesses

  - id: dotnet-process-kill-member
    desc: .NET process kill member
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: KillProcess

  - id: dotnet-msbuild-target-name
    desc: .NET MSBuild process target
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: MSBuild

  - id: dotnet-msbuild-killer-helper-class
    desc: .NET MSBuild killer helper class
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: KillProceTarget

composite_rules:
  - id: dotnet-msbuild-kill-capability
    desc: .NET helper targets MSBuild termination
    crit: suspicious
    conf: 0.98
    all:
      - id: dotnet-process-enumeration-member
      - id: dotnet-process-kill-member
      - id: dotnet-msbuild-target-name
