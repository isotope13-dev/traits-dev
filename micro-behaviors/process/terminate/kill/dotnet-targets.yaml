defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: dotnet-kill-process-helper-name
    desc: .NET helper named KillProcess
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: KillProcess

  - id: dotnet-kill-member-reference
    desc: .NET Process.Kill member reference
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)(System\.Diagnostics\.)?Process(::|\.)Kill(\b|\()'

  - id: dotnet-terminate-process-reference
    desc: .NET TerminateProcess reference
    crit: notable
    conf: 0.92
    mbc: B0033
    if:
      type: text
      regex: '(?i)\bTerminate\s*Process\b'
    unless:
      - id: metadata/lang/compiler/systems/
      - id: metadata/lang/compiler/native/

  - id: dotnet-msbuild-target-name
    desc: .NET MSBuild process target
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: MSBuild

  - id: dotnet-msbuild-killer-helper-class
    desc: .NET MSBuild killer helper class
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: KillProceTarget

composite_rules:
  - id: dotnet-msbuild-kill-capability
    desc: .NET helper targets MSBuild termination
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/process/enumerate/managed::dotnet-process-enumeration-member
      - id: dotnet-kill-process-helper-name
      - id: dotnet-msbuild-target-name
