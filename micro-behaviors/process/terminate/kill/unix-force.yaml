defaults:
  platforms:
    - unix
    - android
    - ios
  crit: notable
  conf: 0.7
  for:
    - shell
    - elf
traits:
  - id: mass-pkill
    desc: Mass process killing via pkill
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \bpkill\s+-f\s+["\x27][^"\x27\n]{0,80}[|]
  - id: mass-kill-pattern
    desc: Mass process killing via ps/grep/kill
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: ps\s+aux.{0,80}grep.{0,80}(kill|xargs.{0,20}kill)
    unless:
      - id: metadata/package/testing/presence/harness::shell-crate-test-path
    not:
      - substr: grep mysqld | grep -v grep | awk '{print $2}' | xargs kill
  - id: netstat-kill-pattern
    desc: Kills processes by network connection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: netstat.{0,80}grep.{0,80}(kill|xargs.{0,20}kill)
  - id: pkill-force
    desc: pkill force kill pattern (-9)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: pkill\s+-9\s+-f
    unless:
      - id: metadata/package/testing/presence/harness/
  - id: busybox-kill-force-encoded
    desc: XOR-obfuscated busybox kill -9
    crit: suspicious
    conf: 0.88
    if:
      type: hex
      section: .rodata
      pattern: 7B 36 3D 3A 7B 36 21 27 2D 36 3B 2C 74 3F 3D 38 38 74 79 6D 74 54
