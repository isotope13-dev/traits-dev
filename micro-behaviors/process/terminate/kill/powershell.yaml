defaults:
  platforms: [windows, unix]
  for: [powershell]
  crit: notable
  conf: 0.88
traits:
  - id: stop-process
    desc: PowerShell stops process
    if:
      type: text
      word: Stop-Process
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: stop-process-force
    desc: PowerShell force-stops process
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bStop-Process\b[^\r\n]{0,160}-Force\b'
