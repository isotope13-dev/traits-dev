# Process Termination - JavaScript
# Capabilities related to killing processes in JavaScript
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-sigsegv-kill
    desc: Terminates process with SIGSEGV
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'process\.kill\(process\.pid,\s*[''"]SIGSEGV[''"]\)'
  - id: js-sigkill-process
    desc: Node sends SIGKILL to process
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "process\\.kill[\\s\\S]{0,120}'SIGKILL'"
    unless:
      - type: text
        regex: 'owned daemon process|DaemonProcess|shutdownDaemon|this\.process'
      - id: metadata/package/files/dependency::node-modules-path
      - id: micro-behaviors/process/create/shell/host/
