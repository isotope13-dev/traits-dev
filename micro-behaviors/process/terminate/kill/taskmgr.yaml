defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1562.001"
  mbc: "B0001"

traits:
  - id: taskmgr-image
    desc: Task Manager process name
    crit: component
    conf: 0.98
    if:
      type: text
      regex: \btaskmgr\.exe\b
composite_rules:
  - id: taskmgr-kill-chain
    desc: Task Manager termination workflow
    crit: suspicious
    conf: 0.97
    all:
      - id: taskmgr-image
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: micro-behaviors/process/create/spawn::open-process
      - id: micro-behaviors/process/terminate/kill::terminate-process

  - id: anti-taskmgr-detection
    desc: Anti-Task Manager anti-analysis behavior
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: taskmgr-kill-chain
