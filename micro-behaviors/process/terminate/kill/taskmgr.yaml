defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1562.001"
  mbc: "B0001"

traits:
  - id: taskmgr-terminate-process
    desc: Task Manager process termination
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: TerminateProcess

  - id: taskmgr-open-process
    desc: Task Manager process handle acquire
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: OpenProcess

  - id: taskmgr-process-enum
    desc: Task Manager process enumeration
    crit: notable
    conf: 0.90
    if:
      type: symbol
      exact: Process32Next

composite_rules:
  - id: taskmgr-kill-chain
    desc: Task Manager termination workflow
    crit: suspicious
    conf: 0.97
    all:
      - id: taskmgr-process-enum
      - id: taskmgr-open-process
      - id: taskmgr-terminate-process

  - id: anti-taskmgr-detection
    desc: Anti-Task Manager anti-analysis behavior
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: taskmgr-kill-chain
