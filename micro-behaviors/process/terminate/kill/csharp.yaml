# .NET process termination patterns
defaults:
  for: [csharp, pe, dll]
  platforms: [windows]
traits:
  - id: get-processes-by-name
    desc: .NET process lookup by name
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: "GetProcessesByName"
  - id: close-main-window
    desc: .NET process window close
    crit: notable
    conf: 0.88
    if:
      type: raw
      substr: ".CloseMainWindow()"
  - id: process-kill
    desc: .NET process kill call
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: ".Kill()"
composite_rules:
  - id: process-terminate-loop
    desc: .NET process termination loop
    crit: baseline
    conf: 0.94
    all:
      - id: get-processes-by-name
    any:
      - id: close-main-window
      - id: process-kill
