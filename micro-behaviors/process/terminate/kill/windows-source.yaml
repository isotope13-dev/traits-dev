defaults:
  for:
  - pe
  platforms:
  - windows
traits:
- id: av-kill-targets-a
  desc: Legacy AV kill targets set A
  crit: suspicious
  conf: 0.97
  count_min: 4
  if:
    type: text
    regex: (?i)Asesinar\('.{0,24}(AVP|NAV|VSE|ZONEALARM).{0,24}'\);
- id: av-kill-targets-b
  desc: Legacy AV kill targets set B
  crit: suspicious
  conf: 0.97
  count_min: 4
  if:
    type: text
    regex: (?i)Asesinar\('.{0,24}(BLACKICE|PERSFW|F-PROT|NOD32).{0,24}'\);
- id: admin-tool-targets-a
  desc: Admin tool kill targets A
  crit: suspicious
  conf: 0.98
  count_min: 2
  if:
    type: text
    regex: (?i)Asesinar\('.{0,24}(Regedit|msconfig|regedt32).{0,24}'\);
- id: admin-tool-targets-b
  desc: Admin tool kill targets B
  crit: suspicious
  conf: 0.98
  count_min: 2
  if:
    type: text
    regex: (?i)Asesinar\('.{0,24}(taskmgr|sysedit|sfc).{0,24}'\);
- id: toolhelp-kill-loop-source-cond-5--inline-3845
  desc: Regex component marker
  crit: component
  conf: 0.98
  size_min: 8192
  if:
    type: metrics
    field: exports.count
    min: 100
  count_max: 1003846
- id: toolhelp-kill-loop-source-cond-6--inline-3846
  desc: Regex component marker
  crit: component
  conf: 0.98
  size_min: 8192
  if:
    type: metrics
    field: functions.count
    min: 1000
  count_max: 1003847
composite_rules:
- id: admin-tool-target-list
  desc: Admin tool kill targets
  crit: suspicious
  conf: 0.98
  all:
  - id: admin-tool-targets-a
  - id: admin-tool-targets-b
- id: security-tool-target-list
  desc: Large AV process kill list
  crit: suspicious
  conf: 0.98
  all:
  - id: av-kill-targets-a
  - id: av-kill-targets-b
- id: toolhelp-kill-loop-source
  desc: Toolhelp process termination API cluster
  crit: suspicious
  conf: 0.98
  size_min: 8192
  all:
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
  - id: micro-behaviors/process/create/spawn::open-process
  - id: terminate-process
  downgrade:
    any:
    - id: micro-behaviors/process/terminate/kill/
- id: toolhelp-kill-loop-benign-context
  desc: Benign context for Toolhelp process termination APIs
  crit: component
  conf: 0.9
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/resource::pe-resource-opaque-token
  - id: metadata/binary/installer/script::nsis
  - id: well-known/tool/reverse-engineering/armnf::marker
  - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: toolhelp-kill-loop-source-cond-5--inline-3845
  - id: toolhelp-kill-loop-source-cond-6--inline-3846
