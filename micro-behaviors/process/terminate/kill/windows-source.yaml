defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: av-kill-targets-a
    desc: Legacy AV kill targets set A
    crit: suspicious
    conf: 0.97
    count_min: 4
    if:
      type: string_value
      regex: (?i)Asesinar\('.{0,24}(AVP|NAV|VSE|ZONEALARM).{0,24}'\);
  - id: av-kill-targets-b
    desc: Legacy AV kill targets set B
    crit: suspicious
    conf: 0.97
    count_min: 4
    if:
      type: string_value
      regex: (?i)Asesinar\('.{0,24}(BLACKICE|PERSFW|F-PROT|NOD32).{0,24}'\);
  - id: admin-tool-targets-a
    desc: Admin tool kill targets A
    crit: suspicious
    conf: 0.98
    count_min: 2
    if:
      type: string_value
      regex: (?i)Asesinar\('.{0,24}(Regedit|msconfig|regedt32).{0,24}'\);
  - id: admin-tool-targets-b
    desc: Admin tool kill targets B
    crit: suspicious
    conf: 0.98
    count_min: 2
    if:
      type: string_value
      regex: (?i)Asesinar\('.{0,24}(taskmgr|sysedit|sfc).{0,24}'\);
composite_rules:
  - id: admin-tool-target-list
    desc: Admin tool kill targets
    crit: suspicious
    conf: 0.98
    all:
      - id: admin-tool-targets-a
      - id: admin-tool-targets-b
  - id: security-tool-target-list
    desc: Large AV process kill list
    crit: suspicious
    conf: 0.98
    all:
      - id: av-kill-targets-a
      - id: av-kill-targets-b
  - id: toolhelp-kill-loop-source
    desc: Toolhelp terminate loop workflow
    crit: suspicious
    conf: 0.98
    size_min: 8192
    all:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: micro-behaviors/process/create/spawn::open-process
      - id: terminate-process
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/developer
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/package/versioning::pe-version-resource-opaque-token
        - id: metadata/binary/installer/script::nsis
        - type: exports_count
          min: 100
        - type: metrics
          field: binary.function_count
          min: 1000
