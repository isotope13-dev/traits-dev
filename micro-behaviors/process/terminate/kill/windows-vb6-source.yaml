defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: terminate-process-vb6
    desc: VB6 TerminateProcess declare
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: TerminateProcess
  - id: open-process-vb6
    desc: VB6 OpenProcess declare
    crit: suspicious
    conf: 0.92
    if:
      id: micro-behaviors/process/create/spawn::open-process-script
    unless:
      - id: metadata/package/quality/source::security-tracker-cve-leaf
  - id: killapp-routine-vb6
    desc: VB6 KillApp routine
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: Public Function KillApp(
composite_rules:
  - id: toolhelp-kill-loop-vb6
    desc: VB6 Toolhelp terminate workflow
    crit: suspicious
    conf: 0.97
    all:
      - id: terminate-process-vb6
      - id: open-process-vb6
      - id: killapp-routine-vb6
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-vb6
