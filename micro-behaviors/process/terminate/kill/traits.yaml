defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: terminate-process
    desc: Process termination via TerminateProcess
    crit: baseline
    conf: 0.95
    mbc: B0033
    if:
      type: symbol
      exact: TerminateProcess
    downgrade:
      any:
        - type: string_value
          substr: ApiSet Stub DLL
  - id: exit-process
    desc: Exit current process
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: ExitProcess
  - id: terminate-process-source
    desc: TerminateProcess call in C source
    crit: notable
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bTerminateProcess\s*\(
  - id: exit-process-source
    desc: ExitProcess call in C source
    crit: notable
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bExitProcess\s*\(
  - id: zw-terminate-process
    desc: Kernel ZwTerminateProcess routine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ZwTerminateProcess
  - id: zw-open-process
    desc: Kernel ZwOpenProcess routine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ZwOpenProcess
