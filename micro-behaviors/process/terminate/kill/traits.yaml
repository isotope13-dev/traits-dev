defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: terminate-process
    desc: Process termination via TerminateProcess
    crit: notable
    conf: 0.95
    mbc: B0033
    if:
      type: symbol
      exact: TerminateProcess
    unless:
      - id: metadata/lang/compiler/native/
    downgrade:
      any:
        - type: text
          substr: ApiSet Stub DLL
  - id: go-xsys-terminate-process
    desc: Go x/sys TerminateProcess wrapper
    crit: notable
    conf: 0.9
    mbc: B0033
    if:
      type: text
      exact: golang.org/x/sys/windows.TerminateProcess
  - id: exit-process
    desc: Exit current process
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: ExitProcess
  - id: terminate-process-source
    desc: TerminateProcess call in C source
    crit: notable
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: TerminateProcess
    unless:
      - id: metadata/lang/source/
  - id: exit-process-source
    desc: ExitProcess call in C source
    crit: baseline
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: ExitProcess
    unless:
      - id: metadata/lang/source/
  - id: zw-terminate-process
    desc: Kernel ZwTerminateProcess routine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ZwTerminateProcess
  - id: kernel-terminate-process-reference
    desc: Kernel process-termination routine reference
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: '(?i)\b(Zw|Nt)TerminateProcess\b'
  - id: zw-open-process
    desc: Kernel ZwOpenProcess routine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ZwOpenProcess
  - id: go-process-kill-method
    desc: Go process kill method
    crit: notable
    conf: 0.9
    for:
      - go
    platforms:
      - unix
      - windows
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(Process\.)?Kill$'
  - id: go-process-name-kill-loop
    desc: Go process-name kill loop helper
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: text
      regex: 'main\.(killByNameLoop|killAllSoftetherLoop)\b'
