defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: terminate-process
    desc: Process termination via TerminateProcess
    crit: baseline
    conf: 0.95
    mbc: B0033
    if:
      type: text
      exact: TerminateProcess
    downgrade:
      any:
        - type: text
          substr: ApiSet Stub DLL
  - id: exit-process
    desc: Exit current process
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: ExitProcess
  - id: terminate-process-source
    desc: TerminateProcess call in C source
    crit: notable
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bTerminateProcess\s*\(
  - id: exit-process-source
    desc: ExitProcess call in C source
    crit: notable
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bExitProcess\s*\(
  - id: zw-open-process
    desc: Open process handle via Zw
    crit: notable
    conf: 0.96
    mbc: B0033
    if:
      type: symbol
      exact: ZwOpenProcess
  - id: zw-terminate-process
    desc: Terminate process via Zw
    crit: notable
    conf: 0.98
    mbc: B0033
    if:
      type: symbol
      exact: ZwTerminateProcess
  - id: zw-close-handle
    desc: Close kernel handle via Zw
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: ZwClose
composite_rules:
  - id: zw-process-kill-chain
    desc: Kernel process kill chain
    crit: suspicious
    conf: 0.97
    all:
      - id: zw-open-process
      - id: zw-terminate-process
      - id: zw-close-handle
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-idata
