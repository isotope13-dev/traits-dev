# Process Termination
# Capabilities to stop or kill processes
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Process Termination ===
  - id: terminate-process
    desc: Process termination via TerminateProcess
    crit: baseline
    conf: 0.95
    mbc: "B0033"
    if:
      type: symbol
      exact: "TerminateProcess"
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
  - id: exit-process
    desc: Exit current process
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "ExitProcess"
  - id: terminate-process-source
    desc: TerminateProcess call in C source
    crit: notable
    conf: 0.9
    for: [c, cpp]
    if:
      type: raw
      regex: '\bTerminateProcess\s*\('
  - id: exit-process-source
    desc: ExitProcess call in C source
    crit: notable
    conf: 0.85
    for: [c, cpp]
    if:
      type: raw
      regex: '\bExitProcess\s*\('
