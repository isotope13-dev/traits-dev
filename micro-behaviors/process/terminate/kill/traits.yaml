defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: terminate-process
    desc: Process termination via TerminateProcess
    crit: notable
    conf: 0.95
    mbc: B0033
    if:
      type: symbol
      exact: TerminateProcess
    count_min: 5
    downgrade:
      any:
        - type: text
          substr: ApiSet Stub DLL
  - id: go-xsys-terminate-process
    desc: Go x/sys TerminateProcess wrapper
    crit: notable
    conf: 0.9
    mbc: B0033
    if:
      type: text
      exact: golang.org/x/sys/windows.TerminateProcess
  - id: exit-process
    desc: Exit current process
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: ExitProcess
  - id: terminate-process-source
    desc: TerminateProcess call in C source
    crit: suspicious
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: TerminateProcess
    count_min: 5
    unless:
      - id: metadata/lang/source::wine-compat-source
  - id: exit-process-source
    desc: ExitProcess call in C source
    crit: baseline
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: ExitProcess
    unless:
      - id: metadata/lang/source::wine-compat-source
  - id: zw-terminate-process
    desc: Kernel ZwTerminateProcess routine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ZwTerminateProcess
  - id: zw-open-process
    desc: Kernel ZwOpenProcess routine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ZwOpenProcess
