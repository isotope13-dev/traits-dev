# Container Runtime Library Detection
# Useful for ML baseline - legitimate container usage patterns
defaults:
  for: [all]
traits:
  # NOTE: Containerd and Kubernetes detection is handled by micro-behaviors/os/container/runtime/go.yaml
  # The traits below detect OCI/runc and CRI-specific patterns not covered there

  # === Runc atomic indicators ===
  - id: runc-oci-str
    desc: OCI runc runtime
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "opencontainers/runc"
  - id: libcontainer-str
    desc: libcontainer library
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "libcontainer"
      # === CRI atomic indicators ===
  - id: cri-api-str
    desc: Container Runtime Interface API
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "cri-api"
  - id: runtimeservice-str
    desc: CRI RuntimeService
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: "RuntimeService"
      # === OCI spec atomic indicators ===
  - id: opencontainers-str
    desc: opencontainers string
    crit: component
    if:
      type: string
      substr: "opencontainers"
  - id: oci-runtime-spec-str
    desc: oci-runtime-spec string
    crit: component
    if:
      type: string
      substr: "oci-runtime-spec"
  - id: image-spec-str
    desc: image-spec string
    crit: component
    if:
      type: string
      substr: "image-spec"
  - id: org-opencontainers-str
    desc: org.opencontainers annotation
    crit: component
    if:
      type: string
      substr: "org.opencontainers"
      # === Hook atomic indicators ===
  - id: prestart-str
    desc: prestart hook
    crit: component
    if:
      type: string
      word: "prestart"
  - id: poststart-str
    desc: poststart hook
    crit: component
    if:
      type: string
      word: "poststart"
  - id: poststop-str
    desc: poststop hook
    crit: component
    if:
      type: string
      word: "poststop"
      # NOTE: config-json-str removed - use metadata/quality/config::config-json-file
  - id: cni-github-str
    # === CNI atomic indicators ===

    desc: containernetworking/cni string
    crit: component
    if:
      type: string
      substr: "containernetworking/cni"
  - id: cni-prefix-str
    desc: CNI_ environment prefix
    crit: component
    if:
      type: string
      substr: "CNI_"
  - id: cni-libcni-str
    desc: cni/libcni string
    crit: component
    if:
      type: string
      substr: "cni/libcni"
      # === Namespace atomic indicators ===
  - id: clone-newnet-str
    desc: CLONE_NEWNET constant
    crit: component
    if:
      type: string
      word: "CLONE_NEWNET"
  - id: setns-str
    desc: setns syscall
    crit: component
    if:
      type: string
      word: "setns"
  - id: veth-str
    desc: veth interface
    crit: component
    if:
      type: string
      word: "veth"
  - id: bridge-str
    desc: bridge interface
    crit: component
    if:
      type: string
      word: "bridge"
      # NOTE: k8s.io/* patterns are covered by micro-behaviors/os/container/runtime::kubernetes
  - id: k8s-apps-v1-str
    # === Kubernetes API path indicators (not covered by the regex) ===

    desc: Kubernetes apps/v1 API
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "apis/apps/v1"
  - id: k8s-pods-v1-str
    desc: Kubernetes pods API
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "api/v1/pods"
  - id: kubeconfig-env-str
    desc: KUBECONFIG environment variable
    crit: notable
    conf: 0.8
    if:
      type: string
      word: "KUBECONFIG"
      # NOTE: .kube/config is a secret file path - see objectives/credential-access/environment/secret-access::kube-config-file
composite_rules:
  # === Runc composites ===
  - id: runc-refs
    desc: Runc references
    crit: notable
    conf: 0.9
    any:
      - id: runc-oci-str
      - id: libcontainer-str
        # === CRI composites ===
  - id: cri-refs
    desc: CRI API references
    crit: notable
    conf: 0.85
    all:
      - id: cri-api-str
      - id: runtimeservice-str
        # Container runtime composite
  - id: runtime
    desc: Container runtime library usage
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/os/container/runtime::docker-dup
      - id: runc-refs
      - id: cri-refs
        # === OCI composites ===
  - id: oci-refs
    desc: OCI specification references
    crit: component
    any:
      - id: opencontainers-str
      - id: oci-runtime-spec-str
      - id: image-spec-str
  - id: hooks-refs
    desc: Container hooks
    crit: component
    needs: 2
    any:
      - id: prestart-str
      - id: poststart-str
      - id: poststop-str
  - id: hooks-with-config
    desc: Hooks with config.json
    crit: component
    all:
      - id: hooks-refs
      - id: metadata/quality/config::config-json-file
        # OCI spec composite
  - id: oci
    desc: OCI specification compliance
    crit: notable
    conf: 0.9
    any:
      - id: oci-refs
      - id: org-opencontainers-str
      - id: hooks-with-config
        # === CNI composites ===
  - id: cni-refs
    desc: CNI references
    crit: component
    any:
      - id: cni-github-str
      - id: cni-prefix-str
      - id: cni-libcni-str
  - id: ns-refs
    desc: Network namespace references
    crit: component
    any:
      - id: clone-newnet-str
      - id: setns-str
  - id: net-refs
    desc: Network interface references
    crit: component
    any:
      - id: veth-str
      - id: bridge-str
  - id: ns-clone-setns
    desc: Clone and setns combo
    crit: component
    all:
      - id: clone-newnet-str
      - id: setns-str
  - id: net-with-ns
    desc: Network interfaces with namespace
    crit: component
    all:
      - id: net-refs
      - id: ns-refs
        # Container networking composite
  - id: network
    desc: Container networking patterns
    crit: notable
    conf: 0.85
    any:
      - id: cni-refs
      - id: ns-clone-setns
      - id: net-with-ns
        # === Kubernetes composites ===
  - id: k8s-api-paths
    desc: Kubernetes API paths
    crit: notable
    conf: 0.85
    any:
      - id: k8s-apps-v1-str
      - id: k8s-pods-v1-str
        # Kubernetes client composite
  - id: kubernetes-comp
    desc: Kubernetes client library
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/os/container/runtime::kubernetes
      - id: k8s-api-paths
      - id: kubeconfig-env-str
