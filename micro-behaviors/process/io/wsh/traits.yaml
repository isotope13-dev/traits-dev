# WSH reads the output stream of a child process.
defaults:
  platforms: [windows]
  for: [vbs, javascript, html]
  crit: notable
  conf: 0.92

traits:
  - id: wsh-process-output-readall
    desc: WSH reads child-process output to completion
    if:
      type: text
      regex: '\.Std(Out|Err)\.ReadAll\s*\('
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
