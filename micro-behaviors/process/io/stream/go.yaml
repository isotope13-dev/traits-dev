defaults:
  platforms: [windows, unix]
  for: [go]
  crit: notable
  conf: 0.93

traits:
  - id: go-connection-stdio-redirect
    desc: Go child stdio uses a connection
    attack: T1059
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.(Stdin|Stdout|Stderr)\s*=\s*connection\b'
  - id: go-conn-stdio-redirect
    desc: Go child stdio uses a conn stream
    attack: T1059
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.(Stdin|Stdout|Stderr)\s*=\s*conn\b'
  - id: go-client-stdio-redirect
    desc: Go child stdio uses a client stream
    attack: T1059
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.(Stdin|Stdout|Stderr)\s*=\s*(client|socket)\b'

composite_rules:
  - id: go-network-stdio-redirect
    desc: Go child stdio uses a network stream
    crit: notable
    conf: 0.95
    any:
      - id: go-connection-stdio-redirect
      - id: go-conn-stdio-redirect
      - id: go-client-stdio-redirect
