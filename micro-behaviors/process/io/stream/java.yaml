defaults:
  platforms: [unix, windows]
  for: [java, class, jar, zip]
traits:
  - id: java-input-stream-access
    desc: Java input stream access
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: getInputStream
  - id: java-processbuilder-redirect-input
    desc: Java ProcessBuilder redirects standard input
    crit: notable
    conf: 0.92
    if:
      type: import
      exact: java/lang/ProcessBuilder.redirectInput
  - id: java-processbuilder-redirect-output
    desc: Java ProcessBuilder redirects standard output
    crit: notable
    conf: 0.92
    if:
      type: import
      exact: java/lang/ProcessBuilder.redirectOutput
  - id: java-processbuilder-redirect-errors
    desc: Java ProcessBuilder merges standard error
    crit: notable
    conf: 0.92
    if:
      type: import
      exact: java/lang/ProcessBuilder.redirectErrorStream

composite_rules:
  - id: java-processbuilder-redirected-stdio
    desc: Java ProcessBuilder redirects all standard streams
    crit: notable
    conf: 0.96
    all:
      - id: java-processbuilder-redirect-input
      - id: java-processbuilder-redirect-output
      - id: java-processbuilder-redirect-errors
