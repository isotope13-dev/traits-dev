defaults:
  platforms: [unix, windows]
  for: [pe, csharp]

traits:
  - id: run-process-output-helper
    desc: .NET process-output helper token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: RunProcessOutput

  - id: run-process-input-helper
    desc: .NET process-input helper token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: RunProcessInput
