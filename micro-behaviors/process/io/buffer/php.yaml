# PHP Output Buffering/Capture Traits
# Detects output buffering used to capture command execution results
# MBC: E1059 (Command Execution)
defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  # Output buffering functions
  - id: ob-start
    desc: Starts output buffering
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: "ob_start"
  - id: ob-get-contents
    desc: Gets output buffer contents
    crit: notable
    conf: 0.6
    if:
      type: ast
      kind: call
      exact: "ob_get_contents"
  - id: ob-get-clean
    desc: Gets and cleans output buffer
    crit: notable
    conf: 0.6
    if:
      type: ast
      kind: call
      exact: "ob_get_clean"
  - id: ob-end-clean
    desc: Ends and cleans output buffer
    crit: notable
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: "ob_end_clean"
  - id: ob-end-flush
    desc: Ends and flushes output buffer
    crit: notable
    conf: 0.4
    if:
      type: ast
      kind: call
      exact: "ob_end_flush"
  - id: ob-get-level
    desc: Gets output buffering level
    crit: notable
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: "ob_get_level"
composite_rules:
  - id: output-buffer-capture
    desc: "Output buffer capture pattern"
    crit: notable
    conf: 0.75
    all:
      - id: ob-start
    any:
      - id: ob-get-contents
      - id: ob-get-clean
