# PHP Output Buffering Capabilities
# ob_* functions capture/manage the output stream. These are ubiquitous, benign
# PHP plumbing — every templating engine (Plates, Twig, Blade), WordPress, and
# framework uses them — so the atoms are baseline capabilities. Malicious use
# (capturing shell-command output while suppressing errors) is inferred by
# composites that ALSO require an exec sink + error suppression, e.g.
# objectives/command-and-control/backdoor/webshell/obf-dispatch::php-stealth-output-control
# and well-known/malware/backdoor/smart-slider-3::smart-slider-stealth-backdoor.
defaults:
  platforms: [windows, unix]
  for: [php]
  crit: baseline
traits:
  # Output buffering functions
  - id: ob-start
    desc: Starts output buffering
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: "ob_start"
  - id: ob-get-contents
    desc: Gets output buffer contents
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: "ob_get_contents"
  - id: ob-get-clean
    desc: Gets and cleans output buffer
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: "ob_get_clean"
  - id: ob-end-clean
    desc: Ends and cleans output buffer
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: "ob_end_clean"
  - id: ob-end-flush
    desc: Ends and flushes output buffer
    conf: 0.4
    if:
      type: symbol
      kind: call
      exact: "ob_end_flush"
  - id: ob-get-level
    desc: Gets output buffering level
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: "ob_get_level"
composite_rules:
  - id: output-buffer-capture
    desc: Captures PHP output-buffer contents
    crit: baseline
    conf: 0.75
    all:
      - id: ob-start
    any:
      - id: ob-get-contents
      - id: ob-get-clean
