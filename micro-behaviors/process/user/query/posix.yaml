defaults:
  for:
    - shell
    - python
    - javascript
    - elf
  platforms:
    - unix
    - linux
    - macos
  crit: baseline
  mbc: E1033
  attack: T1033
traits:
  - id: getlogin
    desc: Get login name
    conf: 0.5
    if:
      type: symbol
      regex: getlogin
  - id: getpwuid
    desc: Get password file entry by UID
    conf: 0.5
    if:
      type: symbol
      regex: getpwuid
  - id: hostname-pwd-whoami
    desc: Chained recon commands hostname pwd whoami
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: hostname\s*&&\s*pwd\s*&&\s*whoami
      case_insensitive: true
  - id: whoami-cmd
    desc: whoami command
    conf: 0.5
    if:
      type: string_value
      substr: whoami
  - id: id-u-cmd
    desc: id -u command
    conf: 0.5
    if:
      type: string_value
      substr: id -u
  - id: id-cmd
    desc: id command (with path)
    conf: 0.5
    if:
      type: string_value
      substr: /bin/id
  - id: id-and-ls-recon
    desc: id and ls recon command chain
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '\bid\s*&&\s*ls\s'
