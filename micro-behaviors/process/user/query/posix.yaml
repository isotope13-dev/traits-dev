# User Information Query Functions (POSIX)
# Basic POSIX functions for querying current user information
# MBC: E1033 (System Owner/User Discovery)
# ATT&CK: T1033 (System Owner/User Discovery)
defaults:
  for: [shell, python, javascript, powershell, pe, elf]
  platforms: [unix, linux, macos]
  crit: baseline
  mbc: "E1033"
  attack: "T1033"
traits:
  - id: getlogin
    desc: Get login name
    conf: 0.5
    if:
      type: symbol
      regex: "getlogin"
  - id: getpwuid
    desc: Get password file entry by UID
    conf: 0.5
    if:
      type: symbol
      regex: "getpwuid"
  - id: hostname-pwd-whoami
    desc: Chained recon commands hostname pwd whoami
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "hostname\\s*&&\\s*pwd\\s*&&\\s*whoami"
      case_insensitive: true
  - id: whoami-cmd
    desc: whoami command
    conf: 0.5
    if:
      type: string
      substr: "whoami"
  - id: id-u-cmd
    desc: id -u command
    conf: 0.5
    if:
      type: string
      substr: "id -u"
  - id: id-cmd
    desc: id command (with path)
    conf: 0.5
    if:
      type: string
      substr: "/bin/id"
