defaults:
  for: [elf, macho, c]
  platforms:
    - linux
    - macos
  crit: notable
  mbc: E1033
  attack: T1033
traits:
  - id: getlogin
    desc: Get login name
    conf: 0.5
    if:
      type: symbol
      regex: getlogin
  - id: getpwuid
    desc: Get password file entry by UID
    conf: 0.5
    if:
      type: symbol
      regex: getpwuid
    unless:
      - id: metadata/file/text/string::python3-interpreter-basename
    downgrade:
      # Go's os/user package statically imports getpwuid_r on Darwin/BSD to
      # implement user.Current / user.Lookup.
      any:
        - id: metadata/lang/compiler/systems::go-binary-macho
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/file/text/string::system-shell-basename
  - id: getpwnam
    desc: Resolve username to password entry
    crit: baseline
    conf: 0.4
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: getpwnam
  - id: hostname-pwd-whoami
    desc: Chained recon commands hostname pwd whoami
    crit: suspicious
    conf: 0.9
    for: [scripts, c, elf, macho]
    if:
      type: text
      regex: 'hostname\s*&&\s*pwd\s*&&\s*whoami'
      case_insensitive: true
  - id: whoami-hostname-pwd
    desc: Chained recon commands whoami hostname pwd
    crit: suspicious
    conf: 0.9
    for: [scripts, c, elf, macho]
    if:
      type: text
      regex: 'whoami\s*&&\s*hostname\s*&&\s*pwd'
      case_insensitive: true
  - id: hostname-whoami-pwd
    desc: Chained recon commands hostname whoami pwd
    crit: suspicious
    conf: 0.9
    for: [scripts, c, elf, macho]
    if:
      type: text
      regex: 'hostname\s*&&\s*whoami\s*&&\s*pwd'
      case_insensitive: true
  - id: whoami-command-separator
    desc: whoami command after shell separator
    conf: 0.5
    for: [scripts, c, elf, macho]
    if:
      type: text
      regex: '(^|[;&|()]|\$\()\s*(/usr/bin/)?whoami(\s|[;&|)])'
      case_insensitive: true
  - id: whoami-command-backtick
    desc: whoami command in shell backticks
    conf: 0.5
    for: [shell, c, elf, macho]
    if:
      type: text
      regex: '`\s*(/usr/bin/)?whoami\s*`'
      case_insensitive: true
  - id: whoami-command-quoted
    desc: whoami command in quoted shell
    conf: 0.55
    for: [shell, c, elf, macho]
    if:
      type: text
      regex: '["'']\s*(/usr/bin/)?whoami\s*["'']'
  - id: id-u-cmd
    desc: id -u command
    conf: 0.5
    if:
      type: text
      substr: id -u
  - id: id-cmd
    desc: id command (with path)
    conf: 0.5
    if:
      type: text
      substr: /bin/id
  - id: id-cmd-shell
    desc: bare `id` command invocation in shell script
    crit: notable
    conf: 0.7
    for: [shell]
    if:
      type: symbol
      exact: id
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: id-and-ls-recon
    desc: id and ls recon command chain
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '\bid\s*&&\s*ls\s'
  - id: os-getlogin-python
    desc: os.getlogin() Python username call
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: os\.getlogin\s*\(
composite_rules:
  - id: whoami-cmd
    desc: whoami command
    crit: notable
    conf: 0.55
    any:
      - id: whoami-command-separator
      - id: whoami-command-backtick
      - id: whoami-command-quoted
