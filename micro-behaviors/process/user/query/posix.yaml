defaults:
  for:
    - python
    - javascript
    - elf
    - macho
  platforms:
    - unix
    - linux
    - macos
  crit: notable
  mbc: E1033
  attack: T1033
traits:
  - id: getlogin
    desc: Get login name
    conf: 0.5
    if:
      type: symbol
      regex: getlogin
  - id: getpwuid
    desc: Get password file entry by UID
    conf: 0.5
    if:
      type: symbol
      regex: getpwuid
    unless:
      - type: basename
        exact: python3
  - id: getpwnam
    desc: Resolve username to password entry
    crit: baseline
    conf: 0.4
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: getpwnam
  - id: hostname-pwd-whoami
    desc: Chained recon commands hostname pwd whoami
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: raw
      regex: hostname\s*&&\s*pwd\s*&&\s*whoami
      case_insensitive: true
  - id: whoami-cmd
    desc: whoami command
    conf: 0.5
    count_min: 2
    if:
      type: text
      substr: whoami
  - id: id-u-cmd
    desc: id -u command
    conf: 0.5
    if:
      type: text
      substr: id -u
  - id: id-cmd
    desc: id command (with path)
    conf: 0.5
    if:
      type: text
      substr: /bin/id
  - id: id-and-ls-recon
    desc: id and ls recon command chain
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '\bid\s*&&\s*ls\s'
  - id: os-getlogin-python
    desc: os.getlogin() Python username call
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: os\.getlogin\s*\(
