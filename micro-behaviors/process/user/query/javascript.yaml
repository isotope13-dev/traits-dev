defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  attack: T1033
traits:
  - id: os-userinfo-call
    desc: os.userInfo() user query
    conf: 0.8
    if:
      type: symbol
      exact: os.userInfo
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: os-homedir-call
    desc: os.homedir() user home directory
    conf: 0.7
    if:
      type: symbol
      exact: os.homedir
    unless:
      - type: text
        substr: const homeDirectory = os.homedir();
      - type: text
        regex: "path\\.join\\(os\\.homedir\\(\\),\\s*(envPath\\.slice\\(1\\)|['\"]\\.npm(rc)?['\"])"
      - type: text
        regex: "path\\.join\\(os\\.homedir\\(\\),\\s*['\"]\\.[A-Za-z0-9_-]{1,40}['\"]\\)"
      - type: text
        substr: reportedCWD = os.homedir() + reportedCWD.substring(1)
      - id: well-known/app/opencode-router
      - id: well-known/app/nitin-ai
  - id: execsync-quoted-whoami
    desc: execSync runs quoted whoami
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: (?i)\bexecSync\s*\(\s*['"]whoami['"]
  - id: execsync-quoted-hostname
    desc: execSync runs quoted hostname
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      type: text
      regex: (?i)\bexecSync\s*\(\s*['"]hostname['"]
  - id: quoted-whoami-command-arg
    desc: Quoted whoami command argument
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '["'']whoami["'']'
  - id: quoted-hostname-command-arg
    desc: Quoted hostname command argument
    crit: notable
    conf: 0.65
    attack: T1082
    if:
      type: text
      regex: '["'']hostname["'']'
    unless:
      - type: text
        regex: '["'']hostname["'']\s*:'
      - type: text
        regex: '\[\s*["'']hostname["'']\s*\]'
      - type: text
        regex: ',\s*["'']hostname["'']'
      - type: text
        regex: 'verify_hostname|:hostname\b'
