defaults:
  platforms: [windows]
  for: [batch, powershell, shell, binaries]
  attack: T1033
traits:
  - id: windows-whoami-command
    desc: Windows whoami command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)(^|[\r\n&|({])\s*whoami(\.exe)?\b
  - id: dotnet-user-name
    desc: Query current username via .NET
    crit: notable
    conf: 0.9
    for: [pe, csharp]
    if:
      type: text
      exact: get_UserName
