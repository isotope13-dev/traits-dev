defaults:
  platforms: [windows]
  for: [batch, powershell, shell, binaries]
  attack: T1033
traits:
  - id: windows-whoami-command
    desc: Windows whoami command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)(^|[\r\n&|({])\s*whoami(\.exe)?\b
  - id: dotnet-user-name
    desc: Reads .NET Environment UserName
    crit: notable
    conf: 0.9
    for: [powershell, csharp]
    if:
      type: text
      regex: '(?i)(System\.)?Environment\]?(::|\.)UserName\b'
