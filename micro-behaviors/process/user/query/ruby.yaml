defaults:
  platforms: [windows, unix]
  for: [ruby]
  crit: notable
  conf: 0.85

traits:
  - id: ruby-process-uid
    desc: Ruby process user ID access
    if:
      type: symbol
      exact: Process.uid

  - id: ruby-process-gid
    desc: Ruby process group ID access
    if:
      type: symbol
      exact: Process.gid

  - id: ruby-etc-user-lookup
    desc: Ruby current user account lookup
    if:
      type: text
      regex: '\bEtc\.(getlogin|getpwuid)\b'
