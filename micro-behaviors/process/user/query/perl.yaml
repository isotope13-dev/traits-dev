defaults:
  platforms: [unix]
  for: [perl]
  crit: notable
  conf: 0.78
  mbc: E1033
  attack: T1033
traits:
  - id: perl-getpwuid
    desc: Get passwd entry by UID
    if:
      type: symbol
      exact: getpwuid
  - id: perl-win32-login-name
    desc: Perl Win32 current user query
    platforms: [windows, unix]
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: Win32::LoginName()
