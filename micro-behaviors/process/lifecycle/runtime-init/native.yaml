# Native C-runtime startup fingerprints.
#
# Compiler-emitted process bootstrap import sets. These are pure runtime
# initialization (not application behavior); composites elsewhere reference them
# as benign context so the runtime's own imports are not mistaken for deliberate
# anti-analysis (debugger/VM/timing) evasion.
defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: msvc-crt-startup-imports
    desc: MSVC CRT startup/security-cookie import set
    crit: baseline
    conf: 0.95
    # Compiler-generated UCRT bootstrap (__scrt_common_main_seh +
    # __security_init_cookie + __report_gsfailure). Every MSVC-built module
    # imports this exact cluster: the security-cookie entropy seed
    # (GetSystemTimeAsFileTime, GetCurrentThreadId), the UCRT InitializeSListHead
    # bootstrap, and the x64 RtlCaptureContext SEH unwinder. Hand-rolled
    # anti-analysis never assembles this whole set, so its co-occurrence marks
    # benign runtime imports rather than deliberate evasion.
    all:
      - id: micro-behaviors/time/query::get-system-time-as-filetime
      - id: micro-behaviors/process/info/thread::get-current-thread-id
      - id: micro-behaviors/mem/sync/mutex::initialize-slist-head
      - id: micro-behaviors/os/exception/handler::capture-context
