# PHP class library files normally contain only declarations. Top-level
# `$x = new Foo(); $x->bar();` executes the moment `require_once` is
# evaluated by any consumer, which is the standard packaging-shape of
# supply-chain implants (e.g. BFunky http-parser Analytics.php).
defaults:
  platforms: [unix, windows]
  for: [php]
traits:
  - id: top-level-new-instance
    desc: Top-level new instance in file
    crit: notable
    conf: 0.75
    mbc: B0023
    attack: T1059.004
    if:
      type: text
      regex: '(^|\n)\$[A-Za-z_][A-Za-z0-9_]*\s*=\s*new\s+[A-Z]'
  - id: top-level-method-call
    desc: Top-level method call in file
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(^|\n)\$[A-Za-z_][A-Za-z0-9_]*->[A-Za-z_][A-Za-z0-9_]*\s*\('
  - id: require-dir-php-sibling
    desc: require_once sibling helper file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'require(_once)?\s*\(\s*__DIR__\s*\.\s*["''][^"'']{1,80}\.php'
