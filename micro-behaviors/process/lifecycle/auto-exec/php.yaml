# PHP file-loading behavior: sibling includes are evaluated when the file is
# loaded. Intent-specific supply-chain composites add the surrounding context.
defaults:
  platforms: [unix, windows]
  for: [php]
traits:
  - id: require-dir-php-sibling
    desc: require_once sibling helper file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'require(_once)?\s*\(\s*__DIR__\s*\.\s*["''][^"'']{1,80}\.php'
