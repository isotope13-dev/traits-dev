# A .NET module initializer ([ModuleInitializer], C# 9+) runs the moment the
# CLR loads the assembly -- before any consumer calls into it and with no
# explicit invocation. Legitimate libraries occasionally use it for one-time
# setup (registering serializers, feature flags), so the capability itself is
# neutral; it is, however, an auto-execution surface an analyst wants weighed
# in a supply-chain diff, which is exactly what trojanized-clone implants abuse
# to fire a payload transparently on every consumer of the "library".
defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll]

traits:
  - id: dotnet-module-initializer
    desc: .NET module initializer runs on load
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ModuleInitializerAttribute
      section: text
