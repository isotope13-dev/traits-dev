defaults:
  platforms: [unix, windows]
  for: [java, class, java_class, jar]
  crit: notable
  conf: 0.85

traits:
  - id: java-instrumentation-retransform
    desc: Java retransforms loaded classes
    if:
      type: text
      substr: retransformClasses

  - id: java-instrumentation-add-transformer
    desc: Java registers a class transformer
    if:
      type: text
      substr: addTransformer
