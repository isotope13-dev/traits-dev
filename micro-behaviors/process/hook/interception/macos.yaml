defaults:
  platforms:
    - macos
    - ios
  for:
    - macho
    - dylib
traits:
  - id: objc-runtime-hook
    desc: 'Objective-C runtime class-resolution hook'
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: _objc_setHook_getClass
  - id: objc-runtime-class-method-resolve
    desc: Objective-C runtime method replacement lookup
    crit: notable
    conf: 0.92
    for: [objc]
    if:
      type: text
      regex: 'objc_getClass[\s\S]{0,260}class_getInstanceMethod'
