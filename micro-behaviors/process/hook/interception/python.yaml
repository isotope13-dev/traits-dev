defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: B0024

traits:
  - id: atexit-register
    desc: Python atexit hook registration
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: atexit.register
      kind: import
  - id: module-getattr-pep562
    desc: Python module __getattr__ hook
    crit: notable
    conf: 0.82
    if:
      type: ast
      query: |
        (module
          (function_definition
            name: (identifier) @name
            (#eq? @name "__getattr__")))
  - id: init-subclass-hook
    desc: Python __init_subclass__ class hook
    crit: notable
    conf: 0.82
    if:
      type: ast
      query: |
        (function_definition
          name: (identifier) @name
          (#eq? @name "__init_subclass__"))
