defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: B0024

traits:
  - id: javascript-object-prototype-setter-hook
    desc: Injects a global JavaScript setter hook
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'Object\.defineProperty\(Object\.prototype.{0,40}secret.{0,25}set:function'
    unless:
      - id: well-known/app/spotify-monitor::secret-grabber-script
      - id: well-known/app/spotify-monitor::totp-test-script

  - id: python-global-http-client-patching
    desc: Globally patches supported Python HTTP clients
    crit: notable
    conf: 0.95
    for: [python, pe, dll]
    if:
      type: text
      substr: Globally patch supported sync HTTP libraries
  - id: atexit-register
    desc: Registers a function for process exit
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: atexit.register
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: module-getattr-pep562
    desc: Python module __getattr__ hook
    crit: baseline
    conf: 0.82
    if:
      type: tree-sitter
      query: |
        (module
          (function_definition
            name: (identifier) @name
            (#eq? @name "__getattr__")))
  - id: init-subclass-hook
    desc: Python __init_subclass__ class hook
    crit: baseline
    conf: 0.82
    # Class-nested method def — the cached `function` fact only covers top-level
    # defs, so this stays a node query to reach the method inside the class body.
    if:
      type: tree-sitter
      query: |
        (function_definition
          name: (identifier) @name
          (#eq? @name "__init_subclass__"))
  - id: sys-meta-path-mutation
    desc: Python sys.meta_path mutation
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'sys\.meta_path\s*\.\s*(insert|append)\s*\('
  - id: sys-path-hooks-mutation
    desc: Python sys.path_hooks mutation
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'sys\.path_hooks\s*\.\s*(insert|append)\s*\('
  - id: sys-settrace-install
    desc: Python global trace-hook installation
    crit: notable
    conf: 0.92
    if:
      type: import
      exact: sys.settrace
  - id: python-socket-class-replacement
    desc: Python replaces the process socket class
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'socket\.socket\s*=\s*\w+'
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
  - id: python-builtins-open-hook
    desc: Python replaces the builtins open function
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'builtins\.open\s*=\s*\w+'
  - id: python-stdio-stream-hook
    desc: Python replaces a standard I/O stream
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'sys\.(stdout|stderr)\s*=\s*\w+'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-sitecustomize-write
    desc: Python writes a sitecustomize startup file
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'sitecustomize_path\s*=\s*.{0,100}sitecustomize\.py'
  - id: python-pythonpath-sitecustomize
    desc: Python prepends sitecustomize to PYTHONPATH
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(PYTHONPATH|sitecustomize_dir).{0,300}(PYTHONPATH|sitecustomize_dir)'

composite_rules:
  - id: python-sitecustomize-startup-hook
    desc: Python sitecustomize startup hook
    crit: notable
    conf: 0.94
    all:
      - id: python-sitecustomize-write
      - id: python-pythonpath-sitecustomize
