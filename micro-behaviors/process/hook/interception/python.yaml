defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: B0024

traits:
  - id: atexit-register
    desc: Python atexit hook registration
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\batexit\.register\s*\('
  - id: module-getattr-pep562
    desc: Python module __getattr__ hook
    crit: baseline
    conf: 0.82
    if:
      type: tree-sitter
      query: |
        (module
          (function_definition
            name: (identifier) @name
            (#eq? @name "__getattr__")))
  - id: init-subclass-hook
    desc: Python __init_subclass__ class hook
    crit: baseline
    conf: 0.82
    if:
      type: tree-sitter
      query: |
        (function_definition
          name: (identifier) @name
          (#eq? @name "__init_subclass__"))
  - id: sys-meta-path-mutation
    desc: Python sys.meta_path mutation
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'sys\.meta_path\s*\.\s*(insert|append)\s*\('
  - id: sys-path-hooks-mutation
    desc: Python sys.path_hooks mutation
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'sys\.path_hooks\s*\.\s*(insert|append)\s*\('
