defaults:
  platforms: [windows]
  for: [c, cpp]

traits:
  - id: iat-hook-symbol
    desc: IAT hook helper symbol
    crit: notable
    conf: 0.96
    if:
      type: symbol
      regex: ^winhook_iathook(pe|module)?$

  - id: pe-import-directory-source
    desc: PE import directory access
    crit: component
    conf: 0.92
    if:
      type: text
      word: IMAGE_DIRECTORY_ENTRY_IMPORT

  - id: first-thunk-source
    desc: PE FirstThunk access
    crit: component
    conf: 0.92
    if:
      type: text
      word: FirstThunk

  - id: inline-hook-wrapper-symbol
    desc: Inline hook wrapper symbol
    crit: notable
    conf: 0.96
    if:
      type: symbol
      regex: ^winhook_inline(un)?hooks

  - id: minhook-init-source
    desc: MinHook initialize call
    crit: component
    conf: 0.97
    if:
      type: symbol
      exact: MH_Initialize

  - id: minhook-createhook-source
    desc: MinHook CreateHook call
    crit: component
    conf: 0.97
    if:
      type: symbol
      exact: MH_CreateHook

composite_rules:
  - id: iat-hooking-source
    desc: PE import table hooking source
    crit: suspicious
    conf: 0.94
    all:
      - id: iat-hook-symbol
      - id: pe-import-directory-source
      - id: first-thunk-source

  - id: inline-hooking-source
    desc: Inline API hooking wrapper source
    crit: suspicious
    conf: 0.94
    all:
      - id: inline-hook-wrapper-symbol
      - id: minhook-init-source
      - id: minhook-createhook-source
