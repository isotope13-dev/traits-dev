defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
- id: console-log-reassign
  desc: Reassigns console.log method
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'console\.log\s*=\s*(function|\(\)|=>)'
- id: console-warn-reassign
  desc: Reassigns console.warn method
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'console\.warn\s*=\s*(function|\(\)|=>)'
- id: console-error-reassign
  desc: Reassigns console.error method
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'console\.error\s*=\s*(function|\(\)|=>)'
- id: console-method-wrapper
  desc: Wraps a console method with a callback
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'console\.(log|warn|error)\s*=\s*\([^)]{1,80}\)\s*=>'
- id: console-log-noop
  desc: Assigns an empty function to console.log
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'console\.log\s*=\s*\(\)\s*=>\s*\{\s*\}'
- id: console-warn-noop
  desc: Assigns an empty function to console.warn
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'console\.warn\s*=\s*\(\)\s*=>\s*\{\s*\}'
- id: console-error-noop
  desc: Assigns an empty function to console.error
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'console\.error\s*=\s*\(\)\s*=>\s*\{\s*\}'
- id: console-object-replace
  desc: Replaces the global console object
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'window\.console\s*=\s*\{[\s\S]{0,120}log\s*:'
- id: console-prototype-modify
  desc: Modifies console prototype methods
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'Console\.prototype\.(log|warn|error)\s*='
