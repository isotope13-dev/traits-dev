defaults:
  platforms: [windows]
  for: [vbs]

traits:
  - id: set-windowlong-wndproc-vb6
    desc: VB6 WndProc replacement API
    crit: component
    conf: 0.93
    if:
      type: text
      substr: SetWindowLongA Lib "user32"

  - id: call-windowproc-vb6
    desc: VB6 calls previous WndProc
    crit: component
    conf: 0.92
    if:
      type: text
      substr: CallWindowProcA Lib "user32"

  - id: gwl-wndproc-constant-vb6
    desc: VB6 GWL_WNDPROC constant
    crit: component
    conf: 0.9
    if:
      type: text
      word: GWL_WNDPROC

  - id: rtlmovememory-vb6
    desc: VB6 RtlMoveMemory declaration
    crit: component
    conf: 0.9
    if:
      type: text
      substr: RtlMoveMemory Lib "kernel32"

composite_rules:
  - id: vb6-wndproc-thunk-hook
    desc: VB6 window procedure thunk hook
    crit: notable
    conf: 0.94
    all:
      - id: set-windowlong-wndproc-vb6
      - id: call-windowproc-vb6
      - id: gwl-wndproc-constant-vb6
      - id: rtlmovememory-vb6
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-vb6
