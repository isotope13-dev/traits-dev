defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - pe
    - csharp
traits:
  - id: proxy-generator
    desc: ProxyGenerator class reference
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: ProxyGenerator
  - id: dynamic-proxy-class
    desc: DynamicProxy class reference
    crit: component
    conf: 0.7
    if:
      type: text
      substr: DynamicProxy
  - id: iinterceptor-interface
    desc: IInterceptor interface reference
    crit: component
    conf: 0.65
    if:
      type: text
      substr: IInterceptor
  - id: interceptor-class
    desc: Interceptor class reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: Interceptor
  - id: iinvocation-interface
    desc: IInvocation interface reference
    crit: component
    conf: 0.65
    if:
      type: text
      substr: IInvocation
composite_rules:
  - id: dynamic-proxy
    desc: Dynamic proxy generation (Castle, etc.)
    crit: notable
    conf: 0.8
    any:
      - id: proxy-generator
      - id: iinterceptor-interface
      - id: dynamic-proxy-class
  - id: interceptor-comp
    desc: Method interception capability
    crit: notable
    conf: 0.75
    any:
      - id: iinterceptor-interface
      - id: interceptor-class
      - id: iinvocation-interface
