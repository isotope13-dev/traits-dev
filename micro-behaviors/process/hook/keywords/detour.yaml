# Neutral keywords related to detours/hooking
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
traits:
  - id: detour
    desc: References API detouring terminology
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: detour
      case_insensitive: true
    unless:
      - id: metadata/file/catalog/identity/
      - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
    downgrade:
      any:
        - id: metadata/signed/platform::apple
