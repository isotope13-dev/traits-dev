# Browser-extension network request interception/modification (webRequest
# blocking listeners, declarativeNetRequest rules). Generic technique:
# intercepting/rewriting in-flight requests.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-webrequest-api
    desc: Chrome webRequest API usage
    if:
      type: text
      regex: '(chrome|browser)\.webRequest\.[A-Za-z_]'
  - id: chrome-webrequest-blocking
    desc: Chrome webRequest blocking listener
    if:
      type: text
      regex: '(chrome|browser)\.webRequest\.onBeforeRequest|onBeforeSendHeaders'
  - id: webrequest-request-body-access
    desc: WebRequest request body access
    if:
      type: literal
      kind: string
      exact: requestBody
  - id: webrequest-request-header-access
    desc: WebRequest request header access
    if:
      type: literal
      kind: string
      exact: requestHeaders
  - id: chrome-declarative-net-request
    desc: Chrome declarativeNetRequest rules
    if:
      type: text
      regex: '(chrome|browser)\.declarativeNetRequest\b'
