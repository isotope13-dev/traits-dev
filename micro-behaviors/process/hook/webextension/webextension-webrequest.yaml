# Browser-extension network request interception/modification (webRequest
# blocking listeners, declarativeNetRequest rules). Generic technique:
# intercepting/rewriting in-flight requests.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: dnr-block-request-rules
    desc: DNR rules block network requests
    for: [json]
    conf: 0.95
    if:
      type: value
      path: root[*].action.type
      exact: block
  - id: chrome-webrequest-api
    desc: Uses the WebExtension webRequest API
    if:
      type: text
      regex: '(chrome|browser)\.webRequest\.[A-Za-z_]'
  - id: chrome-webrequest-pre-request
    desc: References pre-request WebExtension hooks
    if:
      type: text
      regex: '(chrome|browser)\.webRequest\.onBeforeRequest|onBeforeSendHeaders'
  - id: browser-proxy-request-listener
    desc: Registers a browser proxy request listener
    if:
      type: text
      regex: '\bproxy\.onRequest\.addListener\b'
  - id: webrequest-auth-required-listener
    desc: Registers a web-request authentication listener
    if:
      type: text
      regex: '\bwebRequest\.onAuthRequired\.addListener\b'
  - id: webrequest-block-or-redirect
    desc: Returns a request-cancel or redirect response
    # A blocking webRequest handler that returns a {cancel} / {redirectUrl}
    # BlockingResponse — the request-blocking action of a content filter / URL
    # blocker. Distinct from a header modifier or history tracker, which return
    # {requestHeaders} or nothing and let the request through.
    conf: 0.9
    if:
      type: text
      regex: '(return|[?:])\s*\{\s*(cancel|redirectUrl)\s*:'
  - id: webrequest-before-request-listener
    desc: References the WebExtension onBeforeRequest hook
    if:
      type: text
      regex: 'webRequest\.onBeforeRequest\b'
  - id: webrequest-before-send-headers-listener
    desc: References the WebRequest request-header hook
    if:
      type: text
      regex: 'webRequest\.onBeforeSendHeaders\b'
  - id: webrequest-completed-listener
    desc: References the WebRequest completion hook
    if:
      type: text
      regex: 'webRequest\.onCompleted\b'
  - id: chrome-webrequest-send-headers
    desc: Registers a WebRequest send-headers listener
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.webRequest\.onSendHeaders\.addListener)$'
  - id: remote-filter-rules-fetch
    desc: Fetches remote browser filtering rules
    conf: 0.94
    if:
      type: text
      regex: 'fetch\([^)]{0,80}DYNAMIC_RULES_URL'
  - id: webrequest-request-body-marker
    desc: WebRequest request body field marker
    crit: component
    if:
      type: literal
      kind: string
      exact: requestBody
  - id: webrequest-request-header-access
    desc: WebRequest request header access
    if:
      type: literal
      kind: string
      exact: requestHeaders
  - id: chrome-declarative-net-request
    desc: WebExtension declarativeNetRequest API
    if:
      type: text
      regex: '(chrome|browser)\.declarativeNetRequest\b'
  - id: chrome-dnr-update-rulesets
    desc: Updates declarative network rulesets
    if:
      type: symbol
      kind: call
      regex: '(^|\.)declarativeNetRequest\.updateEnabledRulesets$'
  - id: chrome-dnr-update-dynamic-rules
    desc: Chrome updates dynamic DNR rules
    conf: 0.92
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: symbol
      kind: call
      exact: chrome.declarativeNetRequest.updateDynamicRules
  - id: browser-dnr-update-dynamic-rules
    desc: Browser updates dynamic DNR rules
    conf: 0.92
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: symbol
      kind: call
      exact: browser.declarativeNetRequest.updateDynamicRules
  - id: bare-dnr-update-dynamic-rules
    desc: Updates dynamic DNR rules
    conf: 0.9
    unless:
      - id: metadata/package/testing/
    if:
      type: symbol
      kind: call
      exact: declarativeNetRequest.updateDynamicRules
  - id: chrome-dnr-update-session-rules
    desc: Chrome updates session DNR rules
    conf: 0.92
    unless:
      - id: metadata/package/testing/
    if:
      type: symbol
      kind: call
      exact: chrome.declarativeNetRequest.updateSessionRules
  - id: browser-dnr-update-session-rules
    desc: Browser updates session DNR rules
    conf: 0.92
    unless:
      - id: metadata/package/testing/
    if:
      type: symbol
      kind: call
      exact: browser.declarativeNetRequest.updateSessionRules
  - id: bare-dnr-update-session-rules
    desc: Updates session DNR rules
    conf: 0.9
    unless:
      - id: metadata/package/testing/
    if:
      type: symbol
      kind: call
      exact: declarativeNetRequest.updateSessionRules
  - id: webrequest-on-headers-received
    desc: Registers WebRequest response-header listener
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.webRequest\.onHeadersReceived(\.addListener)?)$'
  - id: dnr-cookie-header-mod
    desc: DNR sets Cookie header
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: modifyHeaders[\s\S]{0,220}(header|name)\s*:\s*['"]Cookie['"]
composite_rules:
  - id: webrequest-request-body-access
    desc: WebRequest request body access
    crit: notable
    conf: 0.92
    all:
      - id: chrome-webrequest-api
      - id: webrequest-request-body-marker
  - id: webrequest-request-header-capture
    desc: WebRequest request-header capture
    crit: notable
    conf: 0.92
    all:
      - id: webrequest-before-send-headers-listener
      - id: webrequest-request-header-access
  - id: request-interception
    desc: Extension observes or modifies web requests
    crit: notable
    conf: 0.9
    any:
      - id: chrome-webrequest-pre-request
      - id: browser-proxy-request-listener
      - id: webrequest-before-send-headers-listener
      - id: webrequest-on-headers-received
      - id: declarative-net-request-update
  - id: declarative-net-request-update
    desc: Updates declarativeNetRequest rules
    crit: notable
    conf: 0.92
    any:
      - id: chrome-dnr-update-dynamic-rules
      - id: browser-dnr-update-dynamic-rules
      - id: bare-dnr-update-dynamic-rules
      - id: chrome-dnr-update-session-rules
      - id: browser-dnr-update-session-rules
      - id: bare-dnr-update-session-rules
