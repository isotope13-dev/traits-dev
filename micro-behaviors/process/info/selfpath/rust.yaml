defaults:
  platforms: [windows, unix]
  for: [rust]

traits:
  - id: current-exe
    desc: Queries the current Rust executable path
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: std::env::current_exe()

  - id: current-exe-with-extension
    desc: Current executable derived path
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: current_exe.with_extension

composite_rules:
  - id: current-exe-path
    desc: Rust current executable path
    crit: notable
    conf: 0.88
    any:
      - id: current-exe
      - id: current-exe-with-extension
