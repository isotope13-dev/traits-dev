defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: argv0-passed-to-imported-call-x64
    desc: Passes argv[0] to an imported call
    crit: notable
    conf: 0.86
    arch: [x86-64]
    if:
      type: hex
      section: .text
      # Windows x64 main routines commonly load argv[0] from the argv array
      # into RCX immediately before an imported call. The callee is resolved
      # by the import table; this atom records only the self-path data flow.
      pattern: '48 8B 0E FF 15 ?? ?? ?? ??'
