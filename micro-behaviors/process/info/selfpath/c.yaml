defaults:
  platforms: [windows, unix]
  for: [c, cpp]
traits:
  - id: check-argv-0
    desc: Accesses argv[0] command-line name
    conf: 0.8
    crit: notable
    if:
      type: text
      regex: '\bargv\s*\[\s*0\s*\]'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
