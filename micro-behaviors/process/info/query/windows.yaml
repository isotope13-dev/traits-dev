defaults:
  for:
    - pe
    - dll
  platforms:
    - windows

traits:
  - id: go-parent-pid-query
    desc: Go queries its parent PID
    crit: component
    conf: 0.84
    for: [go]
    if:
      type: text
      regex: '(?i)Getppid\s*\(\)|ProcessEntry32'

  - id: go-explorer-parent-reference
    desc: Go examines the Windows parent executable
    crit: component
    conf: 0.84
    for: [go]
    if:
      type: text
      regex: '(?i)StartedByExplorer|UTF16ToString.{0,80}ExeFile'

  - id: zw-query-information-process
    desc: ZwQueryInformationProcess import
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: ZwQueryInformationProcess
    downgrade:
      any:
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export

composite_rules:
  - id: go-parent-explorer-check
    desc: Go checks explorer.exe as parent
    crit: notable
    conf: 0.84
    for: [go]
    near_bytes: 768
    all:
      - id: go-parent-pid-query
      - id: go-explorer-parent-reference
