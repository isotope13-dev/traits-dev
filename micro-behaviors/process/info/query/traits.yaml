defaults:
  for: [binaries, c]
  platforms:
    - linux
    - unix
    - macos
traits:
  - id: macos-process-identifier
    desc: Accesses macOS process identifier property
    crit: notable
    conf: 0.7
    platforms: [macos]
    for: [macho]
    if:
      type: text
      substr: processIdentifier
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/vendor/
  - id: get-process-for-pid
    desc: Lookup process by PID (Carbon)
    crit: notable
    conf: 0.8
    platforms:
      - macos
    for:
      - macho
      - c
    if:
      type: text
      substr: GetProcessForPID
