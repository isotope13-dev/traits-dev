defaults:
  platforms: [windows]
  for: [pe, dll, scripts]
traits:
  - id: guard-flag
    desc: -guard CLI flag (watchdog control)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)(?:^|[\s"'])-guard(?:$|[\s"'])
  - id: no-guard-flag
    desc: -no-guard CLI flag (watchdog disable)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)(?:^|[\s"'])-no-guard(?:$|[\s"'])
composite_rules:
  - id: guard-flag-pair
    desc: Both -guard and -no-guard CLI flags present
    crit: suspicious
    conf: 0.85
    all:
      - id: guard-flag
      - id: no-guard-flag
