# Process command-line inspection (Windows)
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: get-command-line
    desc: Query current process command line
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      regex: "^GetCommandLine[AW]$"
  - id: compare-command-line-strings
    desc: Compare command line against embedded strings
    crit: notable
    conf: 0.9
    if:
      type: import_combination
      required:
        - GetCommandLineA
        - GetCommandLineW
      suspicious:
        - lstrcmpA
        - lstrcmpiA
        - lstrlenA
      min_suspicious: 2
    downgrade:
      any:
        - type: metrics
          field: binary.import_count
          min: 80
        - id: metadata/signed/platform::microsoft
  - id: command-line-to-argv
    desc: Parse command line arguments
    crit: baseline
    conf: 0.86
    if:
      type: symbol
      exact: "CommandLineToArgvW"
composite_rules:
  - id: command-line-argument-parsing
    desc: Query and parse command line
    crit: notable
    conf: 0.88
    all:
      - id: get-command-line
      - id: command-line-to-argv
