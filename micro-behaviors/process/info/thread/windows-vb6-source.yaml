defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1055.003
traits:
  - id: get-thread-context-vb6
    desc: VB6 GetThreadContext call
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: GetThreadContext
  - id: set-thread-context-vb6
    desc: VB6 SetThreadContext call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SetThreadContext
  - id: resume-thread-vb6
    desc: VB6 ResumeThread call
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ResumeThread
