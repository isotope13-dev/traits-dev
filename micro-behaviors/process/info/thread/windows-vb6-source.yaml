defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1055.003
traits:
  - id: get-thread-context-vb6
    desc: VB6 reads thread CPU registers
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: GetThreadContext
  - id: set-thread-context-vb6
    desc: VB6 hijacks thread EIP/RIP register
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SetThreadContext
    unless:
      - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
  - id: resume-thread-vb6
    desc: VB6 resumes suspended thread
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ResumeThread
