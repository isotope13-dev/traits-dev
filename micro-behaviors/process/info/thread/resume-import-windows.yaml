defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9

traits:
  - id: resume-thread-dup
    desc: ResumeThread API import
    if:
      type: import
      exact: ResumeThread
    unless:
      - id: metadata/lang/compiler/systems/
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
    downgrade:
      any:
        - id: well-known/tool/development/debugpy::attach-helper-path
