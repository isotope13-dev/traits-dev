# Process/Thread Information (Windows)
# Basic thread and module queries
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.9
traits:
  - id: get-current-thread-id
    desc: Get current thread ID
    if:
      type: symbol
      exact: "GetCurrentThreadId"
  - id: get-current-process-id
    desc: Get current process ID
    if:
      type: symbol
      exact: "GetCurrentProcessId"
  - id: get-module-handle
    desc: Get module handle
    crit: notable
    for: [c, cpp]
    if:
      type: text
      regex: "\\bGetModuleHandle[AW]?\\b"
  - id: get-thread-context
    desc: Read thread execution context
    crit: notable
    conf: 0.92
    attack: "T1055.003"
    for: [c, cpp]
    if:
      type: text
      word: "GetThreadContext"
    unless:
      - id: metadata/package/testing/presence::c-source-test-directory
      - id: metadata/package/testing/presence::c-source-test-file
  - id: set-thread-context
    desc: Modify thread execution context
    crit: notable
    conf: 0.94
    attack: "T1055.003"
    for: [c, cpp]
    if:
      type: text
      word: "SetThreadContext"
    unless:
      - id: metadata/package/testing/presence::c-source-test-directory
      - id: metadata/package/testing/presence::c-source-test-file
  - id: suspend-thread
    desc: Suspend remote thread execution
    crit: suspicious
    conf: 0.9
    attack: "T1055.003"
    for: [c, cpp]
    if:
      type: text
      word: "SuspendThread"
  - id: resume-thread
    desc: Resume remote thread execution
    crit: suspicious
    conf: 0.9
    attack: "T1055.003"
    for: [c, cpp]
    if:
      type: text
      word: "ResumeThread"
