# Process/Thread Information (Windows)
# Basic thread and module queries
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.9
traits:
- id: get-current-thread-id
  desc: Get current thread ID
  if:
    type: symbol
    exact: "GetCurrentThreadId"
- id: open-thread
  desc: Open thread handle
  crit: notable
  conf: 0.9
  attack: "T1055.004"
  if:
    type: symbol
    exact: "OpenThread"
- id: open-thread-source
  desc: Open thread handle
  crit: notable
  conf: 0.9
  attack: "T1055.004"
  for: [c, cpp]
  if:
    type: text
    word: "OpenThread"
- id: get-current-process-id
  desc: Get current process ID
  if:
    type: symbol
    exact: "GetCurrentProcessId"
- id: get-module-handle
  desc: Get module handle
  crit: notable
  for: [c, cpp]
  if:
    type: text
    regex: "\\bGetModuleHandle[AW]?\\b"
- id: get-thread-context
  desc: Read thread execution context
  crit: notable
  conf: 0.92
  attack: "T1055.003"
  for: [c, cpp]
  if:
    type: text
    word: "GetThreadContext"
  unless:
  - id: metadata/package/testing/presence/harness::c-source-test-directory
  - id: metadata/package/testing/presence/harness::c-source-test-file
- id: set-thread-context
  desc: Modify thread execution context
  crit: notable
  conf: 0.94
  attack: "T1055.003"
  for: [c, cpp]
  if:
    type: text
    word: "SetThreadContext"
  unless:
  - id: metadata/package/testing/presence/harness::c-source-test-directory
  - id: metadata/package/testing/presence/harness::c-source-test-file
- id: hardware-breakpoint-register-field
  desc: Hardware breakpoint register field
  crit: component
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    regex: '\bD[rR][0-7]\b|\bCONTEXT_DEBUG_REGISTERS\b'
- id: suspend-thread
  desc: Suspend remote thread execution
  crit: notable
  conf: 0.9
  attack: "T1055.003"
  for: [c, cpp]
  downgrade:
    any:
    - id: well-known/tool/development/debugpy
    - id: well-known/tool/development/debugpy::package-path-marker
    - type: basename
      regex: '(?i)(debugpy|pydevd|attach\.cpp)'
    - type: text
      regex: debugpy
    - type: text
      regex: pydevd_attach_to_process
    - type: text
      regex: pydevd
  if:
    type: text
    word: "SuspendThread"
- id: resume-thread
  desc: Calls the Windows ResumeThread API
  crit: notable
  conf: 0.9
  for: [pe, dll, c, cpp, powershell, batch, vbs, javascript]
  downgrade:
    any:
    - id: well-known/tool/development/debugpy
    - id: well-known/tool/development/debugpy::package-path-marker
    - type: basename
      regex: '(?i)(debugpy|pydevd|attach\.cpp)'
    - type: text
      regex: debugpy
    - type: text
      regex: pydevd_attach_to_process
    - type: text
      regex: pydevd
  if:
    type: text
    word: "ResumeThread"
  unless:
  - id: metadata/lang/compiled::go-runtime-marker
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: well-known/game/mod::bedrockboot-preload-cpp-pdb

composite_rules:
- id: hardware-breakpoint-register-manipulation
  desc: Hardware breakpoint register setup
  crit: notable
  conf: 0.9
  mbc: B0012
  for: [c, cpp]
  all:
  - id: get-thread-context
  - id: set-thread-context
  - id: hardware-breakpoint-register-field
  near_bytes: 512
