# Windows process timing / I/O introspection APIs (used legitimately, and by
# malware for anti-emulation timing checks).
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.85
traits:
  - id: get-process-times
    desc: GetProcessTimes process timing query
    if:
      type: symbol
      exact: GetProcessTimes
  - id: get-process-io-counters
    desc: GetProcessIoCounters process I/O query
    if:
      type: symbol
      exact: GetProcessIoCounters
