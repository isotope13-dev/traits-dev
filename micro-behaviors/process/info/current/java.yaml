defaults:
  for: [java, class]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: protection-domain-class
    desc: Java ProtectionDomain class reference
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: java/security/ProtectionDomain
  - id: codesource-class
    desc: Java CodeSource class reference
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: java/security/CodeSource
  - id: getlocation-ref
    desc: Java getLocation call reference
    crit: component
    conf: 0.82
    if:
      type: raw
      word: getLocation
  - id: touri-ref
    desc: Java toURI call reference
    crit: component
    conf: 0.82
    if:
      type: raw
      word: toURI
  - id: getpath-ref
    desc: Java getPath call reference
    crit: component
    conf: 0.8
    if:
      type: raw
      word: getPath
composite_rules:
  - id: protection-domain-self-path
    desc: Resolves own path via ProtectionDomain
    crit: notable
    conf: 0.9
    all:
      - id: protection-domain-class
      - id: codesource-class
      - id: getlocation-ref
      - id: touri-ref
      - id: getpath-ref
