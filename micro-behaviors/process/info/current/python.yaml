defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-sys-executable-symbol
    desc: Python sys.executable reference
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: sys.executable

  - id: python-sys-executable-text
    desc: Python sys.executable reference text
    crit: component
    conf: 0.75
    if:
      type: text
      substr: sys.executable

composite_rules:
  - id: python-sys-executable
    desc: Python sys.executable reference
    crit: component
    conf: 0.9
    any:
      - id: python-sys-executable-symbol
      - id: python-sys-executable-text
