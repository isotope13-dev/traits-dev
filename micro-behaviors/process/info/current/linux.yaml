defaults:
  platforms: [linux]
  for: [c, cpp, elf]

traits:
  - id: set-process-name-prctl
    desc: Sets process name with PR_SET_NAME
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'prctl\s*\(\s*PR_SET_NAME\b|PR_SET_NAME\s*,'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
