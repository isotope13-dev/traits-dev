defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: check-ppid
    desc: Accesses process.ppid (Parent PID)
    conf: 0.8
    crit: notable
    if:
      type: text
      substr: process.ppid
  - id: check-argv
    desc: Accesses process.argv (Command line arguments)
    conf: 0.8
    crit: baseline
    if:
      type: text
      substr: process.argv
