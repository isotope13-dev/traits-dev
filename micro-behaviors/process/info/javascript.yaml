defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: check-ppid
    desc: Accesses process.ppid (Parent PID)
    conf: 0.8
    crit: notable
    if:
      type: raw
      substr: process.ppid
  - id: check-argv
    desc: Accesses process.argv (Command line arguments)
    conf: 0.8
    crit: baseline
    if:
      type: raw
      substr: process.argv
