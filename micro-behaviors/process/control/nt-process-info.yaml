# Windows NT Process Information APIs
# NtSetInformationProcess / NtQueryInformationProcess for process manipulation
# ATT&CK: T1562 (Impair Defenses) / T1055 (Process Injection context)
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: nt-set-information-process
    desc: NtSetInformationProcess NT process attribute modification
    crit: notable
    conf: 0.85
    attack: T1562
    if:
      type: string_value
      exact: NtSetInformationProcess
