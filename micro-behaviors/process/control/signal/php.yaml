# PHP Process Control Capabilities
# MBC: C0032 (Process Creation), F0004 (Process Name Spoofing)
# ATT&CK: T1036.004 (Masquerade Task or Service)
defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  # === Process Forking ===
  - id: pcntl-fork
    desc: Process fork via pcntl_fork()
    crit: notable
    conf: 0.8
    mbc: "C0032"
    if:
      type: symbol
      exact: "pcntl_fork"
    unless:
      - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
  - id: pcntl-waitpid
    desc: Wait for child process
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: "pcntl_waitpid"
  # === Session/Daemon Control ===
  - id: posix-setsid
    desc: Create new session (daemonize)
    crit: suspicious
    conf: 0.85
    mbc: "F0004"
    attack: "T1036"
    if:
      type: symbol
      exact: "posix_setsid"
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
  # === Process Title Masquerading ===
  - id: cli-set-process-title
    desc: Set CLI process title
    crit: notable
    conf: 0.9
    mbc: "F0004"
    attack: "T1036.004"
    if:
      type: symbol
      exact: "cli_set_process_title"
    unless:
      - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
  - id: setproctitle
    desc: Set process title (PECL)
    crit: notable
    conf: 0.9
    mbc: "F0004"
    attack: "T1036.004"
    if:
      type: symbol
      exact: "setproctitle"
    unless:
      - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
  # === Time Control ===
  - id: set-time-limit
    desc: Remove execution time limit
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: "set_time_limit"
    unless:
      - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
  - id: ignore-user-abort
    desc: "Ignore client abort for PHP background exec"
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: ignore_user_abort
  - id: ignore-user-abort-true-call
    desc: 'ignore user abort true call'
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '@?ignore_user_abort\s*\(\s*true\s*\)'
composite_rules:
  - id: daemonize
    desc: PHP daemonization pattern
    crit: suspicious
    conf: 0.9
    mbc: "F0004"
    all:
      - id: pcntl-fork
      - id: posix-setsid
    unless:
      - id: well-known/app/zealphp
  - id: process-masquerade
    desc: PHP process name masquerading
    crit: suspicious
    conf: 0.9
    mbc: "F0004"
    attack: "T1036.004"
    any:
      - id: cli-set-process-title
      - id: setproctitle
