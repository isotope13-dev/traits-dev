defaults:
  platforms: [windows]
  for: [pe]
  attack: T1562.001

traits:
  - id: nt-suspend-process-str
    desc: NtSuspendProcess API name reference
    crit: notable
    conf: 0.95
    if:
      type: text
      word: NtSuspendProcess

  - id: nt-resume-process-str
    desc: NtResumeProcess API name reference
    crit: notable
    conf: 0.95
    if:
      type: text
      word: NtResumeProcess

  - id: gopsutil-process-suspend-context
    desc: gopsutil process suspend/resume helper context
    crit: component
    conf: 0.95
    if:
      type: text
      substr: github.com/shirou/gopsutil/v3/process

composite_rules:
  - id: benign-nt-suspend-resume-context
    desc: Benign NtSuspendProcess/NtResumeProcess library or tool context
    crit: component
    conf: 0.95
    any:
      - id: well-known/tool/reverse-engineering/x64dbg::titanengine-library
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-core
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
      - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
      - id: well-known/lib/electron::electron-app-runtime
      - id: well-known/tool/sysadmin/systeminformer
      - id: gopsutil-process-suspend-context
      # Wine/ReactOS ntdll implements NtSuspendProcess/NtResumeProcess.
      - id: metadata/binary/vendor::windows-system-implementer-dll
  - id: nt-suspend-resume-runtime
    desc: NtSuspendProcess and NtResumeProcess runtime resolution
    crit: suspicious
    conf: 0.92
    all:
      - id: nt-suspend-process-str
      - id: nt-resume-process-str
    unless:
      - id: benign-nt-suspend-resume-context
