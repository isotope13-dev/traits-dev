defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: setproctitle-call
    desc: Python changes its process title
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: setproctitle.setproctitle
  - id: python-os-kill-call
    desc: Python sends a process signal
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: os.kill
