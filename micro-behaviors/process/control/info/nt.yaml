# Windows NT Process Information APIs
# NtSetInformationProcess / NtQueryInformationProcess for process manipulation
# ATT&CK: T1562 (Impair Defenses) / T1055 (Process Injection context)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1562
traits:
  - id: nt-set-information-process
    desc: References the NtSetInformationProcess API
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: NtSetInformationProcess
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
  - id: process-info-class-7-constant
    desc: Immediate process-information class value 7
    crit: component
    conf: 0.8
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: BA 07 00 00 00
  - id: process-info-class-30-constant
    desc: Immediate process-information class value 30
    crit: component
    conf: 0.8
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: BA 1E 00 00 00
  - id: process-info-class-31-constant
    desc: Immediate process-information class value 31
    crit: component
    conf: 0.8
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: BA 1F 00 00 00
