defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: get-process-affinity-mask
    desc: Query process CPU affinity
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "GetProcessAffinityMask"
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/signed/platform::.net-dac
    downgrade:
      # Go's runtime queries CPU affinity during scheduler init on Windows.
      any:
        - id: metadata/lang/compiled::go-runtime-marker
  - id: set-process-affinity-mask
    desc: Set process CPU affinity
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "SetProcessAffinityMask"
  - id: set-thread-affinity-mask
    desc: Set thread CPU affinity
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "SetThreadAffinityMask"
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
composite_rules:
  - id: affinity-mask-control
    desc: Query and modify CPU affinity
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    all:
      - id: get-process-affinity-mask
    any:
      - id: set-process-affinity-mask
      - id: set-thread-affinity-mask
