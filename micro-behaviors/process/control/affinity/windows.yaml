defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: get-process-affinity-mask
    desc: Query process CPU affinity
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "GetProcessAffinityMask"
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: set-process-affinity-mask
    desc: Set process CPU affinity
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "SetProcessAffinityMask"
  - id: set-thread-affinity-mask
    desc: Set thread CPU affinity
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "SetThreadAffinityMask"
composite_rules:
  - id: affinity-mask-control
    desc: Query and modify CPU affinity
    crit: notable
    conf: 0.9
    all:
      - id: get-process-affinity-mask
    any:
      - id: set-process-affinity-mask
      - id: set-thread-affinity-mask
