defaults:
  for: [binaries, c]
  platforms:
    - linux
    - macos
    - unix
traits:
  - id: waitpid
    desc: Wait for child process state
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: waitpid
  - id: waitid
    desc: Wait for process state changes
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: waitid
composite_rules:
  - id: wait
    desc: Wait for child process completion
    crit: baseline
    conf: 0.66
    any:
      - id: waitpid
      - id: waitid
