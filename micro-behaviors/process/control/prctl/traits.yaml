defaults:
  platforms:
    - linux
    - android
    - openwrt
  for:
    - elf
traits:
  - id: prctl-symbol
    desc: prctl process-control syscall symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: prctl

  - id: prctl-syscall-x64
    desc: Direct x86-64 prctl syscall
    crit: notable
    conf: 0.9
    platforms: [linux]
    size_max: 10485760
    if:
      type: hex
      section: .text
      pattern: B8 9D 00 00 00 0F 05
    unless:
      - id: well-known/tool/development/qemu
      - id: micro-behaviors/dylib/library/libc/
      - id: micro-behaviors/dylib/library/family/
      - id: well-known/app/mcu-ai-debug/
      - id: metadata/binary/linking/runtime::glibc-runtime-markers

  - id: linux-libc-prctl-fallback
    desc: Linux libc prctl fallback
    crit: notable
    conf: 0.86
    platforms: [unix]
    for: [python]
    ref: sha256:42187a66ff99c8b15518e82f405b0647d8921b04c0fbf2661905010bf4a64920
    if:
      type: text
      regex: 'libc\.so\.6[\s\S]{0,800}prctl'
