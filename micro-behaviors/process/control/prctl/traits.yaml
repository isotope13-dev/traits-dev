defaults:
  platforms:
    - linux
    - android
    - openwrt
  for:
    - elf
traits:
  - id: prctl-symbol
    desc: prctl process-control syscall symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: prctl

  - id: linux-libc-prctl-fallback
    desc: Linux libc prctl fallback
    crit: notable
    conf: 0.86
    platforms: [unix]
    for: [python]
    ref: sha256:42187a66ff99c8b15518e82f405b0647d8921b04c0fbf2661905010bf4a64920
    if:
      type: text
      regex: 'libc\.so\.6[\s\S]{0,800}prctl'
