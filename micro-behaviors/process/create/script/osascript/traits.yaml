defaults:
  for: [source]
  platforms:
    - macos
    - ios
  attack: T1059.002
traits:
  - id: osascript-dup
    desc: osascript execution
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: osascript
  - id: osascript-exec
    desc: osascript command execution
    crit: notable
    conf: 0.8
    for: [shell, applescript, macho]
    if:
      type: text
      regex: osascript\s+-e\s+\\?['"]
  - id: osascript-jxa
    desc: osascript executing JXA (JavaScript for Automation)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: osascript\s+(-l\s*JavaScript|-lJavaScript)
  - id: osascript-stdin
    desc: osascript reading from stdin
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: osascript\b.{0,100}[\s]-(\s|$)
  - id: osascript-do-shell-script-var
    desc: osascript executing shell variable
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: osascript\s+-e\s+["']do shell script\s+\$[A-Za-z0-9_]+
  - id: sysoexec-string
    desc: sysoexec Apple Event in string
    crit: suspicious
    conf: 0.8
    attack: T1059.004
    if:
      type: text
      substr: sysoexec
  - id: sysoload-string
    desc: sysoload Apple Event in string
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: sysoload
  - id: sysodela-string
    desc: sysodela Apple Event in string
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: sysodela
  - id: ref-system-settings
    desc: References System Settings
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: System Settings
  - id: ref-system-prefs
    desc: References System Preferences
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: System Preferences
  - id: ref-terminal
    desc: References Terminal
    crit: notable
    conf: 0.85
    attack: T1059.004
    if:
      type: text
      substr: '"Terminal"'
  - id: open-g-bg
    desc: Open background lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: open\s+-(g|bg)
  - id: osascript-binary-ref
    desc: osascript path in binary
    crit: notable
    conf: 0.8
    for: [macho]
    if:
      type: text
      substr: /usr/bin/osascript
  - id: do-shell-script-binary
    desc: AppleScript do shell script in binary
    crit: suspicious
    conf: 0.9
    for: [macho]
    count_min: 2
    if:
      type: text
      substr: do shell script
    unless:
      - id: well-known/tool/offensive/projectdiscovery::nuclei-engine
  - id: applescript-set-domain
    desc: AppleScript domain resolution in binary
    crit: suspicious
    conf: 0.95
    for: [macho]
    if:
      type: text
      substr: set domain to do shell script
  - id: applescript-on-handler-binary
    desc: AppleScript on handler in binary
    crit: notable
    conf: 0.85
    for: [macho]
    if:
      type: text
      regex: ^on \w+\(\)
  - id: pipe-osascript
    desc: Pipe output to osascript
    crit: suspicious
    conf: 0.9
    for: [applescript, macho]
    if:
      type: text
      regex: \|\s*osascript\b
composite_rules:
  - id: osascript-shell
    desc: osascript invoking shell command
    crit: notable
    conf: 0.85
    attack: T1059.004
    for: [shell, macho]
    all:
      - id: micro-behaviors/process/create/script/osascript::osascript-exec
      - id: sysoexec-string
  - id: osascript-settings
    desc: osascript automating System Settings
    crit: notable
    conf: 0.8
    for: [applescript, macho]
    all:
      - id: micro-behaviors/process/create/script/osascript::osascript-exec
    any:
      - id: ref-system-settings
      - id: ref-system-prefs
