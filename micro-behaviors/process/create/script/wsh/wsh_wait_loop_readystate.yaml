# JScript/WSH Synchronous Wait Loop (ReadyState)
# Detects 'while (readyState < 4) { Sleep(...) }' pattern common in synchronous downloaders
defaults:
  platforms: [windows]
  crit: suspicious
  conf: 0.8
  for: [javascript]
traits:
  - id: wsh-wait-loop-readystate
    desc: "Synchronous wait loop for XMLHTTP readyState completion"
    if:
      type: text
      # while (obj.readyState < 4) { WScript.Sleep(1000); }
      # Regex matches: while (... < 4) { ...WScript... }
      regex: 'while\s*\([^)]{0,120}<\s*4\s*\)\s*\{[^}]{0,120}WScript[^}]{0,120}\}'
  - id: wsh-do-block-marker
    desc: "Do-while block marker"
    crit: component
    if:
      type: text
      regex: 'do\s*\{'
  - id: wscript-marker
    desc: "WScript marker"
    crit: component
    if:
      type: text
      word: WScript
  - id: activexobject-marker
    desc: "ActiveXObject marker"
    crit: component
    if:
      type: text
      word: ActiveXObject
  - id: responsebody-marker
    desc: "responseBody marker"
    crit: component
    for: [javascript, vbs, html]
    if:
      type: text
      word: responseBody
      case_insensitive: true
  - id: wsh-readystate-continue
    desc: "ReadyState continue marker"
    crit: component
    if:
      type: text
      regex: 'eadystate[\s\S]{0,200}continue'
  - id: wsh-do-while-close
    desc: "Do-while close marker"
    crit: component
    if:
      type: text
      regex: '\}\s*while'

composite_rules:
  - id: wsh-do-wait-readystate
    desc: "Do-while wait for XMLHTTP readyState"
    all:
      - id: wsh-do-block-marker
      - id: wsh-readystate-continue
      - id: wsh-do-while-close
    any:
      - id: wscript-marker
      - id: activexobject-marker
      - id: responsebody-marker
    near_bytes: 1200
