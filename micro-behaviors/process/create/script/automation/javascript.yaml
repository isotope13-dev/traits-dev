# JavaScript browser automation execution surfaces.
defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript]
  attack: T1059.007
traits:
  - id: browser-page-evaluate
    desc: Browser automation evaluates page JavaScript
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: page.evaluate
