defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [groovy]
traits:
  - id: gradle-exec-calc
    desc: Gradle executes calc.exe (PoC/Malware payload)
    crit: suspicious
    conf: 1.0
    if:
      type: raw
      regex: "commandLine\\s*.{0,220}\\bcalc(\\.exe)?\\b"
  - id: gradle-exec-powershell-encoded
    desc: Gradle executes encoded PowerShell
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: "powershell.{0,220}-e(ncodedCommand)?\\s+[A-Za-z0-9+/=]{20,}"
