defaults:
  for: [java, groovy, kotlin]
traits:
  - id: exec-task
    desc: Gradle exec task definition
    crit: baseline
    if:
      type: raw
      regex: "exec\\s*\\{"
  - id: command-line
    desc: Gradle commandLine property
    crit: baseline
    if:
      type: raw
      regex: "commandLine"
