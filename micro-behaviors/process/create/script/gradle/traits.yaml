defaults:
  platforms: [windows, unix]
  for: [java, groovy, kotlin]
traits:
  - id: exec-task
    desc: Gradle exec task definition
    crit: notable
    if:
      type: text
      regex: "exec\\s*\\{"
  - id: command-line
    desc: Gradle commandLine property
    crit: notable
    if:
      type: text
      substr: "commandLine"
