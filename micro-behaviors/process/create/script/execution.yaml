defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: batch-script-exec-cmd
    desc: cmd launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: string_value
      regex: (?i)cmd(?:\.exe)?\s*/[ckr]\s+.{0,80}\.bat\b
  - id: batch-script-exec-wscript
    desc: WScript.Shell launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: string_value
      regex: (?i)wscript\.shell.{0,80}\.bat\b
  - id: batch-script-exec-shell-exec
    desc: ShellExecute launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: string_value
      regex: (?i)shellexecute(?:ex)?.{0,80}\.bat\b
  - id: batch-script-exec-createprocess
    desc: CreateProcess launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: string_value
      regex: (?i)createprocess(?:w|a)?.{0,80}\.bat\b
  - id: batch-script-exec-processstartinfo
    desc: ProcessStartInfo launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: string_value
      regex: (?i)processstartinfo.{0,80}\.bat\b
  - id: powershell-script-execution
    desc: Executes a PowerShell script file (.ps1)
    crit: notable
    conf: 0.7
    attack: T1059.001
    if:
      type: string_value
      regex: \.ps1$
  - id: shell-script-execution
    desc: Executes a shell script file (.sh)
    crit: notable
    conf: 0.7
    attack: T1059.004
    if:
      type: raw
      regex: (^|[ ;&|(])((/bin/)?(ba)?sh|shell|zsh)\s+[^\s]{1,80}\.sh
  - id: shell-script-execution-string
    desc: Executes a shell script file (.sh)
    crit: notable
    conf: 0.75
    attack: T1059.004
    if:
      type: string_value
      regex: ((/bin/)?(ba)?sh|shell|zsh)\s+[^\s]{1,80}\.sh
  - id: shell-script-execution-alt
    desc: Executes shell script via alt interpreters
    crit: notable
    conf: 0.7
    attack: T1059.004
    if:
      type: raw
      regex: (^|[ ;&|])(dash|ash|source)\s+[^\s]{1,80}\.sh
  - id: shell-script-execution-dot
    desc: Executes a shell script file via dot
    crit: notable
    conf: 0.7
    attack: T1059.004
    if:
      type: raw
      regex: (^|[ ;&|])\.\s+[^\s]{1,80}\.sh
  - id: shell-script-relative-execution
    desc: Executes a relative shell script path (.sh)
    crit: notable
    conf: 0.7
    attack: T1059.004
    if:
      type: raw
      regex: (^|[\n;&|()])\s*\./[A-Za-z0-9_./-]{1,80}\.sh
composite_rules:
  - id: batch-script-execution
    desc: Executes a batch script file (.bat)
    crit: notable
    conf: 0.7
    attack: T1059.003
    any:
      - id: batch-script-exec-cmd
      - id: batch-script-exec-wscript
      - id: batch-script-exec-shell-exec
      - id: batch-script-exec-createprocess
      - id: batch-script-exec-processstartinfo
  - id: shell-script-execution-any
    desc: Executes a shell script file (.sh)
    crit: notable
    conf: 0.7
    attack: T1059.004
    any:
      - id: shell-script-execution
      - id: shell-script-execution-string
      - id: shell-script-execution-alt
      - id: shell-script-execution-dot
      - id: shell-script-relative-execution
