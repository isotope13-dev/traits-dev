defaults:
  for: [applescript]
  platforms:
    - macos
  attack: T1059.002
traits:
  - id: shell-dup
    desc: do shell script (Apple Event)
    crit: notable
    conf: 0.95
    attack: T1059.004
    if:
      type: string
      regex: ^syso\.exec$
  - id: shell-dup-cmd
    desc: do shell script (command)
    crit: notable
    conf: 0.95
    attack: T1059.004
    if:
      type: string
      substr: do shell script
  - id: delay
    desc: delay command
    crit: baseline
    conf: 0.95
    if:
      type: string
      regex: ^syso\.dela$
  - id: load-script
    desc: load script (Apple Event)
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: ^syso\.load$
  - id: load-script-cmd
    desc: load script (command)
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: load script
  - id: open-location
    desc: open location (Apple Event)
    crit: notable
    conf: 0.9
    attack: T1204.001
    if:
      type: string
      regex: ^syso\.open$
  - id: open-url
    desc: open URL (Apple Event)
    crit: notable
    conf: 0.9
    attack: T1204.001
    if:
      type: string
      regex: ^syso\.surl$
  - id: get-url
    desc: get URL (Apple Event)
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: ^syso\.GUrl$
  - id: open-location-cmd
    desc: open location (command)
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: open location
  - id: open-url-cmd
    desc: open URL (command)
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: open URL
  - id: run-app
    desc: run/open application (Apple Event)
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: ^aevt\.oapp$
  - id: quit-app
    desc: quit application (Apple Event)
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: ^aevt\.quit$
  - id: reopen-app
    desc: reopen application (Apple Event)
    crit: baseline
    conf: 0.85
    if:
      type: string
      regex: ^aevt\.rapp$
  - id: activate
    desc: activate application
    crit: baseline
    conf: 0.9
    if:
      type: string
      regex: ^misc\.actv$
  - id: do-script
    desc: do script in application
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: ^misc\.dosc$
  - id: select
    desc: select UI element
    crit: baseline
    conf: 0.85
    if:
      type: string
      regex: ^misc\.slct$
  - id: folder-ref
    desc: folder/file reference
    crit: baseline
    conf: 0.9
    if:
      type: string
      regex: ^ears\.ffdr$
  - id: count
    desc: count items
    crit: baseline
    conf: 0.9
    if:
      type: string
      regex: ^core\.cnte$
  - id: delete-dup
    desc: delete items
    crit: notable
    conf: 0.9
    attack: T1070.004
    if:
      type: string
      regex: ^core\.dele$
  - id: move
    desc: move items
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: ^core\.move$
  - id: duplicate
    desc: duplicate items
    crit: baseline
    conf: 0.85
    if:
      type: string
      regex: ^core\.clon$
composite_rules:
  - id: micro-behaviors/process/create/script::shell-dup-execution
    desc: Compiled AppleScript executes shell commands
    crit: notable
    conf: 0.9
    attack: T1059.004
      - applescript
    any:
      - id: micro-behaviors/process/create/script::shell-dup
      - id: micro-behaviors/process/create/script::shell-dup-cmd
  - id: delayed-shell
    desc: Shell execution with delay (sandbox
    crit: suspicious
    conf: 0.85
    attack: T1497
      - applescript
    all:
      - id: delay
      - id: micro-behaviors/process/create/script::shell-dup-execution
  - id: external-script
    desc: Loads external AppleScript code
    crit: suspicious
    conf: 0.85
    any:
      - id: load-script
      - id: load-script-cmd
  - id: opens-url
    desc: Opens URL or location
    crit: notable
    conf: 0.85
    attack: T1204.001
      - applescript
    any:
      - id: open-location
      - id: open-url
      - id: get-url
      - id: open-location-cmd
      - id: open-url-cmd
  - id: dropper
    desc: Loads external script then executes
    crit: suspicious
    conf: 0.9
    all:
      - id: external-script
      - id: micro-behaviors/process/create/script::shell-dup-execution
