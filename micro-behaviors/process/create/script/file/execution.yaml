defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: batch-call-script
    desc: Batch call to script file
    crit: notable
    conf: 0.4
    for:
      - batch
    if:
      type: text
      regex: (?im)^\s*@?call\s+\"?[A-Za-z0-9_./\\%-]+\.(bat|cmd)\b
    not:
      - substr: 'build-gyp\\gyp.bat'
    unless:
      - type: basename
        regex: ^vcbuild\.bat$
  - id: batch-script-exec-cmd
    desc: cmd launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    if:
      type: text
      regex: (?i)cmd(\.exe)?\s*/[ckr]\s+.{0,80}\.bat\b
  - id: batch-script-exec-wscript
    desc: WScript.Shell launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: text
      regex: (?i)wscript\.shell.{0,80}\.bat\b
  - id: batch-script-exec-shell-exec
    desc: ShellExecute launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: text
      regex: (?i)shellexecute(ex)?.{0,80}\.bat\b
  - id: batch-script-exec-createprocess
    desc: CreateProcess launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: text
      regex: (?i)createprocess(w|a)?.{0,80}\.bat\b
  - id: batch-script-exec-processstartinfo
    desc: ProcessStartInfo launches batch script
    crit: notable
    conf: 0.7
    attack: T1059.003
    if:
      type: text
      regex: (?i)processstartinfo.{0,80}\.bat\b
  - id: powershell-script-execution
    desc: Executes a PowerShell script file (.ps1)
    crit: notable
    conf: 0.7
    attack: T1059.001
    if:
      type: text
      regex: '(?i)(powershell|pwsh)(\.exe)?[ \t]+[^\r\n]{1,120}\.ps1\b'
    unless:
      - type: text
        substr: IdentifyConsole.ps1
      - type: text
        substr: ConinMode.ps1
      - type: text
        substr: IdentifyConsoleWindow.ps1
  - id: shell-script-execution
    desc: Executes a shell script file (.sh)
    crit: notable
    conf: 0.7
    attack: T1059.004
    for: [scripts]
    unless:
      - type: basename
        regex: (?i)(^|[/\\!])(METADATA|PKG-INFO|README(\.[^/\\!]*)?)$
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: metadata/lang/embedded::shell
      # Python package help/errors commonly show the install command without
      # executing it; do not report that prose as process creation.
      - type: text
        regex: '(?is)\b(run|install).{0,80}\b(bash|sh|zsh)\s+[^\n]{1,80}\.sh\b'
      - type: text
        regex: '(?is)\b(usage|example).{0,80}\b(bash|sh|zsh)\s+[^\n]{1,80}\.sh\b'
    if:
      type: text
      regex: (?m)(^|[\n;&|])\s*((/bin/)?(ba)?sh|shell|zsh)\s+\S{1,80}\.sh
  - id: shell-script-execution-env
    desc: Executes shell script with env assignment
    crit: notable
    conf: 0.7
    attack: T1059.004
    for: [scripts]
    unless:
      - type: basename
        regex: (?i)(^|[/\\!])(METADATA|PKG-INFO|README(\.[^/\\!]*)?)$
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: metadata/lang/embedded::shell
    if:
      type: text
      regex: (?m)(^|[\n;&|])\s*[A-Z_]\w*=\S{1,60}\s+(bash|sh|zsh)\s+\S{1,80}\.sh
  - id: shell-script-execution-alt
    desc: Executes shell script via alt interpreters
    crit: notable
    conf: 0.7
    attack: T1059.004
    for: [scripts]
    unless:
      - type: basename
        regex: (?i)(^|[/\\!])(METADATA|PKG-INFO|README(\.[^/\\!]*)?)$
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: metadata/lang/embedded::shell
    if:
      type: text
      regex: (?m)(^|[\n;&|])\s*(dash|ash|source)\s+\S{1,80}\.sh
  - id: shell-script-execution-dot
    desc: Executes a shell script file via dot
    crit: notable
    conf: 0.7
    attack: T1059.004
    for: [scripts]
    unless:
      - id: metadata/build/autotools::autoconf-generated-script
      - type: basename
        regex: (?i)(^|[/\\!])(METADATA|PKG-INFO|README(\.[^/\\!]*)?)$
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: metadata/lang/embedded::shell
    if:
      type: text
      regex: (?m)(^|[\n;&|])\s*\.\s+\S{1,80}\.sh
  - id: shell-script-relative-execution
    desc: Executes a relative shell script path (.sh)
    crit: notable
    conf: 0.7
    attack: T1059.004
    for: [shell]
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
    if:
      type: symbol
      kind: call
      regex: '^\./[A-Za-z0-9_./-]{1,80}\.sh$'
  - id: shell-executes-downloaded-scripts
    desc: Shell executes downloaded shell scripts
    crit: notable
    conf: 0.9
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      regex: '\bsh\s+[A-Za-z0-9._-]+\.sh;.{0,80}\bsh\s+[A-Za-z0-9._-]+\.sh\b'
  - id: nohup-shell-script-execution
    desc: nohup launches a shell script file
    crit: notable
    conf: 0.9
    attack: T1059.004
    for: [shell]
    if:
      type: text
      regex: '\bnohup\s+((/usr)?/bin/)?(ba)?sh\s+["'']?[^\s"'']{1,120}\.sh["'']?'
composite_rules:
  - id: batch-script-execution
    desc: Executes a batch script file (.bat)
    crit: notable
    conf: 0.7
    attack: T1059.003
    any:
      - id: batch-call-script
      - id: batch-script-exec-cmd
      - id: batch-script-exec-wscript
      - id: batch-script-exec-shell-exec
      - id: batch-script-exec-createprocess
      - id: batch-script-exec-processstartinfo
  - id: shell-script-execution-any
    desc: Executes a shell script file (.sh)
    crit: notable
    conf: 0.7
    attack: T1059.004
    any:
      - id: shell-script-execution
      - id: shell-script-execution-env
      - id: shell-script-execution-alt
      - id: shell-script-execution-dot
      - id: shell-script-relative-execution
  - id: multi-interpreter-exec
    desc: Multi-interpreter shell execution fallback
    crit: notable
    conf: 0.9
    attack: T1059.004
    for: [shell]
    needs: 2
    any:
      - id: shell-script-execution
      - id: shell-script-execution-env
      - id: shell-script-execution-dot
      - id: shell-script-execution-alt
      - id: shell-script-relative-execution
