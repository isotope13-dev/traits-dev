defaults:
  platforms: [unix, windows]
  for: [github-actions]

traits:
  - id: github-actions-python-file
    desc: GitHub Actions executes a Python file
    crit: notable
    conf: 0.9
    attack: T1059.006
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: '^(python|python3)\s+\S{1,80}\.py'
