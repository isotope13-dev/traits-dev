defaults:
  platforms: [windows, unix]
  for: [lua]

traits:
  - id: lua-dofile
    desc: Executes Lua file with dofile
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: dofile
  - id: batch-starts-lua-payload
    desc: Batch starts Lua payload
    crit: notable
    conf: 0.96
    attack: T1059.003
    for: [batch]
    platforms: [windows]
    if:
      type: text
      regex: '(?im)^\s*start\s+lua(\.exe)?\s+.{1,120}$'
