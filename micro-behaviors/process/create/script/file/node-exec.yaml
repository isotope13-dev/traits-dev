defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: spawn-node-process
    desc: Spawns Node.js process
    crit: notable
    conf: 0.84
    mbc: "C0017"
    attack: "T1059.007"
    if:
      type: text
      regex: "spawn\\(\\s*['\"]node['\"]"
  - id: node-child-process-command
    desc: Node child process command execution
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'child_process[\s\S]{0,160}\.exec\((cmd|command)'
