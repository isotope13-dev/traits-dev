defaults:
  platforms: [windows]
  for: [batch]

traits:
  - id: batch-executable-start
    desc: Batch script launches an executable with start
    crit: notable
    conf: 0.92
    attack: T1059.003
    if:
      type: text
      regex: '(?im)^\s*@?start\s+(""\s+)?["'']?[A-Za-z0-9_./\\%-]+\.exe\b'

  - id: batch-variable-runtime-script-launch
    desc: Batch launches variable-selected runtime script
    crit: notable
    conf: 0.95
    attack: T1059
    if:
      type: text
      regex: '(?im)%[A-Za-z_][A-Za-z0-9_]*%.{0,100}\.(js|mjs|cjs|npl)\b'
