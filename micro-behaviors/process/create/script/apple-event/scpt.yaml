defaults:
  for:
    - applescript
  platforms:
    - macos
  attack: T1059.002
traits:
  - id: shell-dup
    desc: do shell script (Apple Event)
    crit: notable
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: ^syso\.exec$
  - id: shell-dup-cmd
    desc: do shell script (command)
    crit: notable
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      substr: do shell script
  - id: compiled-shell-exec-event
    desc: Compiled AppleScript shell exec event
    crit: notable
    conf: 0.94
    attack: T1059.004
    if:
      type: text
      substr: .sysoexecTEXT
  - id: run-script-cmd
    desc: run script command
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: run script
  - id: run-script-variable
    desc: Executes AppleScript from variable
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \brun script\s+[A-Za-z_][A-Za-z0-9_]*\b
  - id: open-g-flag
    desc: Open background lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bopen\s+-g\b
  - id: delay
    desc: delay command
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: ^syso\.dela$
  - id: load-script
    desc: load script (Apple Event)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (^syso\.load$|sysoload)
  - id: compiled-load-script-event
    desc: Compiled AppleScript load script event
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: sysoloadscpt
  - id: load-script-cmd
    desc: load script (command)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (load script|loadscpt)
  - id: load-script-posix-file
    desc: Loads AppleScript from POSIX file
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'load script\s*\(\s*POSIX file'
  - id: osacompile-cmd
    desc: osacompile command reference
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bosacompile\b|o"&"s"&"a"&"c"&"o"&"m"&"p"&"i"&"l"&"e'
  - id: open-location
    desc: open location (Apple Event)
    crit: notable
    conf: 0.9
    attack: T1204.001
    if:
      type: text
      regex: ^syso\.open$
  - id: open-url
    desc: open URL (Apple Event)
    crit: notable
    conf: 0.9
    attack: T1204.001
    if:
      type: text
      regex: ^syso\.surl$
  - id: get-url
    desc: get URL (Apple Event)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ^syso\.GUrl$
  - id: open-location-cmd
    desc: open location (command)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: open location
  - id: open-url-cmd
    desc: open URL (command)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: open URL
  - id: run-app
    desc: run/open application (Apple Event)
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: ^aevt\.oapp$
  - id: quit-app
    desc: quit application (Apple Event)
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: ^aevt\.quit$
  - id: reopen-app
    desc: reopen application (Apple Event)
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: ^aevt\.rapp$
  - id: activate
    desc: activate application
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^misc\.actv$
  - id: do-script
    desc: do script in application
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ^misc\.dosc$
  - id: select
    desc: select UI element
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: ^misc\.slct$
  - id: folder-ref
    desc: folder/file reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^ears\.ffdr$
  - id: count
    desc: count items
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^core\.cnte$
  - id: delete-dup
    desc: delete items
    crit: notable
    conf: 0.9
    attack: T1070.004
    if:
      type: text
      regex: ^core\.dele$
  - id: move
    desc: move items
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: ^core\.move$
  - id: duplicate
    desc: duplicate items
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: ^core\.clon$
composite_rules:
  - id: micro-behaviors/process/create/script/apple-event::shell-dup-execution
    desc: Compiled AppleScript executes shell commands
    crit: notable
    conf: 0.9
    attack: T1059.004 - applescript
    any:
      - id: micro-behaviors/process/create/script/apple-event::shell-dup
      - id: micro-behaviors/process/create/script/apple-event::shell-dup-cmd
  - id: delayed-shell
    desc: Shell execution with delay (sandbox
    crit: suspicious
    conf: 0.85
    attack: T1497 - applescript
    all:
      - id: delay
      - id: micro-behaviors/process/create/script/apple-event::shell-dup-execution
  - id: external-script
    desc: Loads external AppleScript code
    crit: suspicious
    conf: 0.85
    any:
      - id: load-script
      - id: load-script-cmd
      - id: load-script-posix-file
  - id: opens-url
    desc: Opens URL or location
    crit: notable
    conf: 0.85
    attack: T1204.001 - applescript
    any:
      - id: open-location
      - id: open-url
      - id: get-url
      - id: open-location-cmd
      - id: open-url-cmd
  - id: run-script-execution
    desc: Executes AppleScript at runtime
    crit: notable
    conf: 0.9
    any:
      - id: run-script-cmd
      - id: run-script-variable
  - id: dropper
    desc: Loads external script then executes
    crit: suspicious
    conf: 0.9
    all:
      - id: external-script
      - id: micro-behaviors/process/create/script/apple-event::shell-dup-execution
