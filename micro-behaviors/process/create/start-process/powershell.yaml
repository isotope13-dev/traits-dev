defaults:
  for:
    - python
    - javascript
    - powershell
    - pe
  crit: notable
  conf: 0.8
  platforms:
    - windows
traits:
  - id: start-process-call
    desc: Start-Process call
    for: [powershell]
    if:
      type: text
      word: Start-Process
      case_insensitive: true
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: saps-alias
    desc: PowerShell saps process-start alias
    crit: notable
    conf: 0.95
    for: [powershell]
    if:
      type: text
      regex: '(?im)(^|["'';&|][ \t]*)saps([ \t]|$)'
  - id: start-process-filepath
    desc: Start-Process FilePath parameter
    for: [powershell]
    if:
      type: text
      regex: (?i)\bStart-Process\b[^\r\n]{0,120}-FilePath\b
  - id: go-powershell-start-process
    desc: Go embeds a PowerShell Start-Process launch
    crit: notable
    conf: 0.95
    attack: T1059.001
    for: [go]
    if:
      type: string_literal
      regex: '(?is)\bStart-Process\b.{0,120}-FilePath\s+["'']?powershell(\.exe)?\b'
  - id: start-process-msiexec
    desc: Start-Process launches msiexec
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)\bStart-Process\b[^\r\n]{0,160}\bmsiexec(\.exe)?\b
  - id: start-process-caret
    desc: Caret-obfuscated Start-Process call
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)S\^t\^?a\^?r\^?t\^?-\^?P\^?r\^?o\^?c\^?e\^?s\^?s
  # 'S'+'ta'+'rt-P'+'roce'+'ss' — common BAT/PS string-split of Start-Process.
  - id: start-process-string-concat
    desc: Concatenated Start-Process name fragments
    crit: suspicious
    conf: 0.92
    for: [powershell, batch]
    if:
      type: text
      regex: '''S''\s*\+\s*''ta''\s*\+\s*''rt-P'''
  - id: start-process-tokenized
    desc: Tokenized Start-Process sequence
    crit: suspicious
    conf: 0.86
    for:
      - javascript
      - vbs
    if:
      type: text
      regex: (?is);Sl8y7.{0,60}-l8y7pro.{0,80}l8y7sS
  - id: batch-start-process-self-arg
    desc: Batch Start-Process self relaunch
    crit: notable
    conf: 0.94
    for:
      - batch
    if:
      type: text
      regex: (?i)Start-Process[^\r\n]{0,200}%~f0
composite_rules: []
