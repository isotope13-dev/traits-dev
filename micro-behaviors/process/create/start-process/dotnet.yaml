defaults:
  platforms: [windows, unix]
  for: [csharp]

traits:
  - id: dotnet-process-start-info
    desc: .NET configures a process start descriptor
    crit: notable
    mbc: OB0006
    attack: T1059
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: CreateProcessStartInfo
  - id: create-process-api-import
    desc: C# imports the Windows CreateProcess API
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: CreateProcess
