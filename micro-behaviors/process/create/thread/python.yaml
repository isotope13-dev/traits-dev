defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
traits:
  - id: python-thread-create
    desc: Python thread creation call
    conf: 0.65
    if:
      type: text
      regex: '\.Thread\('
  - id: python-daemon-thread
    desc: Python daemon thread creation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.Thread\([^)]{0,220}daemon\s*=\s*True'
