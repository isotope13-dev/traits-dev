defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: python-thread-create
    desc: Creates a thread in Python
    conf: 0.65
    if:
      type: text
      regex: '\.Thread\('
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-daemon-thread
    desc: Creates a daemon thread in Python
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.Thread\([^)]{0,220}daemon\s*=\s*True'
  - id: python-thread-target-os-system
    desc: Thread target is os.system
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'threading\.Thread\([^)\n]{0,180}target\s*=\s*os\.system'
  - id: python-thread-target-subprocess
    desc: Thread target is subprocess
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'threading\.Thread\([^)\n]{0,180}target\s*=\s*subprocess\.(Popen|run|call)'
  - id: python-process-target-os-system
    desc: Process target is os.system
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'multiprocessing\.Process\([^)\n]{0,180}target\s*=\s*os\.system'
  - id: python-process-target-subprocess
    desc: Process target is subprocess
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'multiprocessing\.Process\([^)\n]{0,180}target\s*=\s*subprocess\.(Popen|run|call)'

composite_rules:
  - id: python-thread-exec-target
    desc: Thread runs execution API target
    crit: notable
    conf: 0.86
    any:
      - id: python-thread-target-os-system
      - id: python-thread-target-subprocess
  - id: python-process-exec-target
    desc: Process runs execution API target
    crit: notable
    conf: 0.86
    any:
      - id: python-process-target-os-system
      - id: python-process-target-subprocess
