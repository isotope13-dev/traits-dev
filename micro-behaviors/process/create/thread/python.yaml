defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  crit: baseline
traits:
  - id: python-thread-create
    desc: Python thread creation call
    conf: 0.65
    if:
      type: raw
      regex: '\.Thread\('
  - id: python-daemon-thread
    desc: Python daemon thread creation
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '\.Thread\([^)]{0,220}daemon\s*=\s*True'
composite_rules:
  - id: python-background-worker
    desc: Python background worker thread
    crit: notable
    conf: 0.85
    any:
      - id: python-daemon-thread
      - id: python-thread-create
