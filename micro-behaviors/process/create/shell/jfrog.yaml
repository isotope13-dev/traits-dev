defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
    - shell
    - python
  crit: notable
traits:
  - id: jfrog-cli-export
    desc: JFrog CLI configuration export command
    conf: 1.0
    if:
      type: string_literal
      regex: jf\s+c\s+export\b
