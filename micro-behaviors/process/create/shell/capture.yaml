defaults:
  platforms: [macos, ios, linux, unix, android, windows]
composite_rules:
  - id: capture-command-output
    desc: "Executes shell command and captures"
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/process/create/popen::c-popen
    any:
      - id: micro-behaviors/process/create/direct::fgets-loop
      - id: micro-behaviors/process/create/direct::cpp-exception
    for: [macho, elf, pe]
    none:
      - id: metadata/signed/platform::apple
    unless:
      - id: metadata/format::many-imports
      - id: micro-behaviors/process/tty/pty::terminal-control-stack
    # Downgrade for system libraries, shell interpreters, and large binaries
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::shell-interpreter
        - id: micro-behaviors/dylib/library::debugger-tool-marker
        - id: metadata/format::many-functions
