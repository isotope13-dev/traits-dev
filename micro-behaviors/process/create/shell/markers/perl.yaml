defaults:
  for: [perl]
  platforms: [unix]
traits:
  - id: system-call
    desc: Perl system command execution
    crit: notable
    conf: 0.85
    attack: "T1059.006"
    count_min: 1
    if:
      id: micro-behaviors/process/create/shell::system-call
    unless:
      - id: metadata/file/text::roff-document
  - id: backticks-exec
    desc: Perl backticks command execution
    crit: notable
    conf: 0.8
    attack: "T1059.006"
    if:
      type: text
      regex: '`[^`\n]{1,160}(2>&1|3>&1|uname -a|echo)[^`\n]{0,80}`'
    not:
      - substr: "$CROSS_COMPILE"
    unless:
      - id: metadata/file/text::roff-document
composite_rules:
  - id: perl-shell-exec
    desc: Perl shell command execution
    crit: notable
    conf: 0.8
    any:
      - id: system-call
      - id: backticks-exec
