defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]

# Terminal-multiplexer (tmux) session control. Dual-use: orchestrators drive
# headless sessions this way, but the same primitives let malware run commands
# in a detached session that survives logout, inject keystrokes into another
# shell, or scrape a pane's contents. Subcommand names are tmux-distinctive but
# gated on co-occurrence with the "tmux" binary literal to avoid false matches.
traits:
  - id: tmux-command-literal
    desc: tmux binary literal
    crit: component
    conf: 0.85
    if:
      type: literal
      kind: string
      exact: tmux

  - id: tmux-new-session-literal
    desc: tmux new-session subcommand
    crit: component
    conf: 0.85
    if:
      type: literal
      kind: string
      exact: new-session

  - id: tmux-send-keys-literal
    desc: tmux send-keys subcommand
    crit: component
    conf: 0.85
    if:
      type: literal
      kind: string
      exact: send-keys

  - id: tmux-capture-pane-literal
    desc: tmux capture-pane subcommand
    crit: component
    conf: 0.85
    if:
      type: literal
      kind: string
      exact: capture-pane

composite_rules:
  - id: tmux-session-control
    desc: Controls tmux multiplexer sessions
    crit: notable
    conf: 0.9
    all:
      - id: tmux-command-literal
      - id: tmux-new-session-literal

  - id: tmux-send-keys-injection
    desc: Injects keystrokes into tmux session
    crit: notable
    conf: 0.9
    all:
      - id: tmux-command-literal
      - id: tmux-send-keys-literal

  - id: tmux-pane-capture
    desc: Captures tmux pane contents
    crit: notable
    conf: 0.9
    all:
      - id: tmux-command-literal
      - id: tmux-capture-pane-literal
