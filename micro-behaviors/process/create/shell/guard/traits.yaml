defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.88

traits:
- id: command-filter-blocklist
  desc: Shell command blocklist
  if:
    type: text
    substr: BLOCKED_PATTERNS

- id: command-filter-verdicts
  desc: Shell command safety verdicts
  if:
    type: text
    regex: "VERDICT\\.(ALLOW|CONFIRM|BLOCK)"

- id: shell-command-safety-gate
  desc: Shell command safety gate
  if:
    type: text
    substr: assertSafe(command)

- id: shell-command-approval-check
  desc: Shell command approval check
  if:
    type: text
    substr: commandNeedsApproval

- id: command-blocked-marker
  desc: Command blocked marker
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: COMMAND_BLOCKED

- id: destructive-action-prohibition-phrase
  desc: Destructive action prohibition phrase
  crit: notable
  conf: 0.88
  for: [scripts]
  if:
    type: text
    regex: '(?i)\b(no|never)\s+(destruction|destructive)\b'

- id: execute-command-tool-name
  desc: execute_command tool name
  if:
    type: string_literal
    exact: execute_command

- id: python-command-safety-rule-class
  desc: Python command safety rule class
  crit: baseline
  conf: 0.95
  for: [python]
  if:
    type: text
    substr: class CommandSafetyRule

- id: sudo-exec
  desc: sudo command execution
    # Component-only: `exec.{0,20}sudo` trivially matches in Go binaries whose
    # string tables juxtapose `os/exec` with `sudo` help text / package paths.
    # Only meaningful paired with an escalation library (see `privilege-escalation`).
  crit: component
  conf: 0.75
  for:
  - go
  - elf
  - macho
  platforms:
  - linux
  - macos
  if:
    type: text
    regex: exec.{0,20}sudo|sudo.{0,20}exec

- id: python-command-safety-blocklists--blocked-patterns
  desc: Python command safety (blocked_patterns)
  crit: baseline
  conf: 0.95
  for: [python]
  if:
    type: text
    word: blocked_patterns
- id: python-command-safety-blocklists--defaults-blocked
  desc: Python command safety (_DEFAULTS_BLOCKED)
  crit: baseline
  conf: 0.95
  for: [python]
  if:
    type: text
    word: _DEFAULTS_BLOCKED
- id: python-command-safety-blocklists--require-confirmation
  desc: Python command safety (require_confirmation)
  crit: baseline
  conf: 0.95
  for: [python]
  if:
    type: text
    word: require_confirmation
- id: python-command-safety-always-blocked
  desc: Python always_blocked command list
  crit: notable
  conf: 0.95
  for: [python]
  if:
    type: text
    word: always_blocked
- id: python-command-safety-always-allowed
  desc: Python always_allowed command list
  crit: notable
  conf: 0.95
  for: [python]
  if:
    type: text
    word: always_allowed
- id: python-command-safety-block-reasons
  desc: Python command block reasons map
  crit: notable
  conf: 0.95
  for: [python]
  if:
    type: text
    word: BLOCK_REASONS
- id: python-whitelist-blocklist-shell-guard
  desc: Python shell allow/blocklist guard
  crit: notable
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '(?s)def\s+_check_allowed\s*\([^)]{0,80}\).{0,900}self\._blocked.{0,350}self\._whitelist'
composite_rules:
- id: python-command-safety-blocklists
  desc: Python command safety blocklists
  crit: baseline
  conf: 0.95
  for: [python]
  any:
  - id: python-command-safety-blocklists--blocked-patterns
  - id: python-command-safety-blocklists--defaults-blocked
  - id: python-command-safety-blocklists--require-confirmation
  - id: python-command-safety-always-blocked
  - id: python-command-safety-always-allowed
  - id: python-command-safety-block-reasons
- id: guarded-shell-command-tool
  desc: Guarded shell command tool
  crit: notable
  conf: 0.94
  all:
  - id: execute-command-tool-name
  any:
  - id: shell-command-safety-gate
  - id: shell-command-approval-check
  - id: micro-behaviors/process/create/spawn::shell-true

- id: destructive-command-safety-filter
  desc: Destructive command safety filter
  crit: component
  conf: 0.92
  all:
  - id: command-filter-blocklist
  any:
  - id: command-filter-verdicts
  - id: shell-command-safety-gate

- id: python-command-safety-filter
  desc: Python destructive command safety filter
  crit: component
  conf: 0.95
  for: [python]
  all:
  - id: python-command-safety-rule-class
  - id: python-command-safety-blocklists

- id: node-temp-exec-benign-context
  desc: Benign Node temp execution context
  crit: component
  conf: 0.9
  any:
  - id: metadata/package/testing/harness/runtime::test-basename-spec
  - id: metadata/package/testing/
  - id: metadata/library/
  - id: metadata/file/policy/config/xcode::plutil-xml-convert-command
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
  - id: metadata/file/policy/config/xcode::xcode-scheme-config-rewrite
  - id: metadata/library/vscode::vscode-extension-marker
  - id: metadata/library/structure::js-webpack-bundle
