# Java Runtime.exec() with Shell Command Strings
# Detects Runtime.getRuntime().exec() with /bin/bash or cmd.exe in source
# JSP files are detected as Python by cleave, so for: includes python
# MBC: C0017 (Process Creation)
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [windows, unix]
  for: [python, java, class]
  mbc: C0017
  attack: T1059

traits:
  - id: runtime-exec-with-shell-array
    desc: Runtime.exec() with shell command array
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: Runtime\.getRuntime\(\)\.exec\s*\(new\s+String\[\]

  - id: runtime-exec-bash-c
    desc: Runtime.exec() with /bin/bash -c
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '"/bin/bash", "-c"'

  - id: runtime-exec-cmd-c
    desc: Runtime.exec() with cmd.exe /c
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '"cmd.exe", "/c"'

  - id: process-get-input-stream
    desc: Process.getInputStream() for output capture
    crit: component
    conf: 0.7
    if:
      type: text
      substr: process.getInputStream()

composite_rules:
  - id: java-shell-exec-with-capture
    desc: Java shell execution with output capture
    crit: notable
    conf: 0.9
    all:
      - id: runtime-exec-with-shell-array
    any:
      - id: runtime-exec-bash-c
      - id: runtime-exec-cmd-c
      - id: process-get-input-stream
