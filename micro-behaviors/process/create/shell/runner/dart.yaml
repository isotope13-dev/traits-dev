defaults:
  platforms: [macos]
  for: [macho, dylib]
  crit: notable
  conf: 0.86
  mbc: E1059.004
  attack: T1059.004

traits:
  - id: process-start
    desc: Dart spawns a child process
    conf: 0.82
    if:
      type: text
      substr: "Process_Start"
  - id: run-executable-with-arguments
    desc: Dart runs executable with arguments
    conf: 0.9
    if:
      type: text
      substr: "runExecutableWithArguments"
  - id: invoke-execute-symbol
    desc: Dart command dispatch routine
    conf: 0.88
    if:
      type: text
      substr: "invokeExecute"
  - id: remote-execute-symbol
    desc: Dart remote command execution routine
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "_remoteExecute"
    unless:
      - id: metadata/binary/framework::darwin-framework-binary
  - id: command-error-output
    desc: Dart command execution error text
    conf: 0.86
    if:
      type: text
      substr: "Command failed with exit code"
  - id: command-output-label
    desc: Dart command output label
    conf: 0.82
    if:
      type: text
      substr: "  Command: "
  - id: osascript-executable
    desc: Dart osascript executable reference
    conf: 0.86
    if:
      type: text
      substr: "Couldn't find the executable osascript"
