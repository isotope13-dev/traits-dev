defaults:
  platforms: [unix]
  for: [rust, elf]
  attack: T1059

traits:
  - id: rust-shell-command-exec
    desc: Rust spawns sh with a command
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("sh"\)[\s\S]{0,120}\.arg\("-c"\)'
    unless:
      - type: text
        regex: 'ATOMCODE_HOOK_EVENT|HookContext|hook\.command'
      - type: text
        regex: 'pub struct BashTool|ToolDef|ToolContext'
      - type: text
        regex: 'ApprovalRequirement|Destructive commands require user confirmation'
      - type: text
        regex: 'fn run_shell_command\(cmd: &str\)[\s\S]{0,260}suppress_console_window_sync'

  - id: rust-shell-command-runner
    desc: Runs a shell command from Rust
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("(sh|/bin/sh)"\)|/bin/sh -c'
    unless:
      - type: text
        regex: 'ATOMCODE_HOOK_EVENT|HookContext|hook\.command'
      - type: text
        regex: 'pub struct BashTool|ToolDef|ToolContext'
      - type: text
        regex: 'ApprovalRequirement|Destructive commands require user confirmation'
      - type: text
        regex: 'fn run_shell_command\(cmd: &str\)[\s\S]{0,260}suppress_console_window_sync'
      - type: text
        regex: 'ParallelEditTool|build_detect|Build command failed|Build timed out'
      - type: text
        regex: 'script_parity|shell_script_matches_rust|--print-manifest'
