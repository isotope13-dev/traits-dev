defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  crit: notable
  conf: 0.7
traits:
  - id: require-vscode
    desc: require('vscode') statement
    if:
      type: text
      regex: require\(['"]vscode['"]\)
  - id: import-vscode
    desc: import from 'vscode' statement
    if:
      type: text
      regex: from\s+['"]vscode['"]
  - id: namespace
    desc: vscode namespace reference
    crit: baseline
    if:
      type: string_literal
      regex: vscode\.\w+
  - id: activate-function
    desc: extension activate function
    if:
      type: string_literal
      regex: ^function\s+activate\b|activate\s*[:=]\s*function
  - id: global-state
    desc: vscode globalState access
    if:
      type: string_literal
      substr: globalState
composite_rules:
  - id: vscode-extension-marker
    desc: VSCode extension identification markers
    any:
      - id: require-vscode
      - id: import-vscode
      - id: namespace
      - id: activate-function
