defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: hidden-cmd-stackstring
    desc: Hidden cmd.exe launch stack strings
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: "C:\\Windows\\SysWOW64\\cmd."
  - id: createprocess-shellcode-api
    desc: CreateProcess shellcode API naming
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: "CreateProcessFunc"
  - id: fontdrvhost-exe-path
    desc: Fontdrvhost executable path marker
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: "(?i)([\\\\/]|^|\\s)fontdrvhost\\.exe($|\\s)"
  - id: fontdrvhost-myagent
    desc: Fontdrvhost MyAgent marker
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: "fontdrvhost.MyAg"
composite_rules:
  - id: temp-fontdrvhost-drop
    desc: Temp fontdrvhost stage drop markers
    crit: suspicious
    conf: 0.9
    any:
      - id: fontdrvhost-exe-path
      - id: fontdrvhost-myagent
