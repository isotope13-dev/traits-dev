defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: js-afplay
    desc: References afplay audio command
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      word: afplay
  - id: js-aplay
    desc: References aplay audio command
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      word: aplay
  - id: js-soundplayer
    desc: References PowerShell SoundPlayer API
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: Media.SoundPlayer
  - id: js-audio-file-ref
    desc: References an audio file extension
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: \.(mp3|wav)$
composite_rules:
  - id: js-audio-player-command
    desc: References a platform audio player
    crit: notable
    conf: 0.92
    any:
      - id: js-afplay
      - id: js-aplay
      - id: js-soundplayer
  - id: js-bundled-audio-player
    desc: Executes bundled audio player file
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/process/create/shell/player::js-audio-file-ref
      - id: micro-behaviors/process/create/shell/player::js-audio-player-command
