defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: js-afplay
    desc: Executes afplay audio command
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: afplay
  - id: js-aplay
    desc: Executes aplay audio command
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: aplay
  - id: js-soundplayer
    desc: PowerShell SoundPlayer command
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: Media.SoundPlayer
  - id: js-audio-file-ref
    desc: References bundled audio file
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: \.(mp3|wav)$
composite_rules:
  - id: js-audio-player-command
    desc: Executes platform audio player
    crit: notable
    conf: 0.92
    any:
      - id: js-afplay
      - id: js-aplay
      - id: js-soundplayer
  - id: js-bundled-audio-player
    desc: Executes bundled audio player file
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/process/create/shell/player::js-audio-file-ref
      - id: micro-behaviors/process/create/shell/player::js-audio-player-command
