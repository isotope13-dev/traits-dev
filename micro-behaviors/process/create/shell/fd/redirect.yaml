traits:
  - id: shell-stdin-fd-redirect
    desc: Shell stdin FD redirection
    crit: component
    conf: 0.9
    platforms: [unix]
    for: [python]
    if:
      type: string_literal
      substr: "/bin/sh -i <&"
  # Linux syscall traits
  - id: syscall-execve-linux
    desc: 'syscall execve linux'
    crit: notable
    conf: 0.8
    platforms: [linux]
    for: [elf]
    if:
      type: syscall
      name: ["execve", "execveat"]
  - id: syscall-dup-redirect-linux
    desc: 'syscall dup redirect linux'
    crit: notable
    conf: 0.8
    platforms: [linux]
    for: [elf]
    count_min: 2
    if:
      type: syscall
      name: ["dup2", "dup3"]
  - id: x86-64-syscall-execve
    desc: Direct x86-64 execve syscall
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [elf]
    if:
      type: hex
      section: text
      pattern: "B8 3B 00 00 00 0F 05"
  - id: x86-64-syscall-dup2
    desc: Direct x86-64 dup2 syscall
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [elf]
    if:
      type: hex
      section: text
      pattern: "B8 21 00 00 00 0F 05"
  # macOS syscall traits
  - id: syscall-execve-macos
    desc: macOS execve syscall for program execution
    crit: notable
    conf: 0.8
    platforms: [macos]
    for: [macho]
    if:
      type: syscall
      name: ["execve"]
  - id: syscall-dup-redirect-macos
    desc: "macOS dup2 syscall for fd redirection"
    crit: notable
    conf: 0.8
    platforms: [macos]
    for: [macho]
    count_min: 2
    if:
      type: syscall
      name: ["dup2"]
composite_rules:
  - id: shell-redirect
    desc: Executes program with file descriptor redirection
    conf: 0.8
    crit: notable
    platforms: [linux]
    for: [elf]
    all:
      - id: syscall-execve-linux
      - id: syscall-dup-redirect-linux
  - id: shell-redirect-macos
    desc: macOS program execution with FD redirection
    conf: 0.8
    crit: notable
    platforms: [macos]
    for: [macho]
    all:
      - id: syscall-execve-macos
      - id: syscall-dup-redirect-macos
