# Shell Command Execution Frequency Patterns
# Detects excessive or unusual frequency of shell command execution
# High-volume popen/system calls are strong malware indicators
defaults:
  attack: T1059
  for: [elf, macho, so, dylib]
  platforms: [linux, macos, unix]
traits:
  # GAP #2: High-volume function call pattern detection
  # A single popen() is notable, but 10+ is highly suspicious
  # Use type: raw with word boundary to enforce count constraints
  - id: excessive-popen
    desc: "Excessive popen() calls"
    crit: suspicious
    conf: 0.95
    count_min: 10
    per_kb_min: 0.05
    if:
      type: raw
      word: "popen"
    unless:
      - id: metadata/binary/metrics::many-imports
  - id: extreme-popen
    desc: "Extreme popen() calls"
    crit: suspicious
    conf: 0.98
    count_min: 20
    per_kb_min: 0.1
    if:
      type: raw
      word: "popen"
    unless:
      - id: metadata/binary/metrics::many-imports
  - id: excessive-system
    desc: "Excessive system() calls"
    crit: suspicious
    conf: 0.9
    count_min: 5
    per_kb_min: 0.02
    if:
      type: raw
      word: "system"
    unless:
      - id: metadata/binary/metrics::many-imports
composite_rules:
  # High volume + capture = command orchestration malware
  - id: command-orchestration-pattern
    desc: "Command orchestration malware pattern"
    crit: suspicious
    conf: 0.95
    any:
      - id: excessive-popen
      - id: extreme-popen
    unless:
      - id: metadata/signed/platform::apple
      - id: micro-behaviors/dylib/library::system-lib-marker
      - id: micro-behaviors/dylib/library::shell-interpreter
