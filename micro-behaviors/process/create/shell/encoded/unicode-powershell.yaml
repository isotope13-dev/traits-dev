defaults:
  platforms: [windows]
  for: [javascript, html, vbs]
  attack: T1059.001

traits:
  - id: unicode-delimited-powershell-prefix
    desc: Unicode-delimited PowerShell prefix
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'p\P{ASCII}+o\P{ASCII}*w\P{ASCII}+e\P{ASCII}*r'
  - id: unicode-delimited-powershell-suffix
    desc: Unicode-delimited PowerShell suffix
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 's\P{ASCII}+h\P{ASCII}+e\P{ASCII}+l\P{ASCII}+l'

composite_rules:
  - id: unicode-delimited-powershell-command
    desc: Unicode-delimited PowerShell command
    crit: notable
    conf: 0.96
    near_bytes: 200
    all:
      - id: unicode-delimited-powershell-prefix
      - id: unicode-delimited-powershell-suffix
