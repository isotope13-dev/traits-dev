defaults:
  platforms: [unix]
  for: [elf]
  mbc: E1059.004
  attack: T1059.004
traits:
  - id: bin-sh-binary-text
    desc: References /bin/sh in binary
    crit: notable
    conf: 0.65
    if:
      type: text
      exact: /bin/sh
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: bin-bash-xor18
    desc: XOR-obfuscated /bin/bash path
    crit: component
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 37 7A 71 76 37 7A 79 6B 70
  - id: bin-ash-xor18
    desc: XOR-obfuscated /bin/ash path
    crit: component
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 37 7A 71 76 37 79 6B 70
  - id: bin-sh-xor18
    desc: XOR-obfuscated /bin/sh path
    crit: component
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 37 7A 71 76 37 6B 70
composite_rules:
  - id: unix-shell-paths-xor18
    desc: XOR-obfuscated Unix shell paths
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: bin-bash-xor18
      - id: bin-ash-xor18
      - id: bin-sh-xor18
