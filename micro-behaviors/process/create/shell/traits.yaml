defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - shell
traits:
  - id: shell-shell
    desc: Bash shell reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)\bbash\s+-[ci]\b
  - id: system-call-word
    desc: system() call (string)
    crit: notable
    conf: 0.5
    for: [shell, c, cpp]
    if:
      type: string_value
      regex: (^|[^A-Za-z0-9_\.])system\s*[(]
  - id: system-fn
    desc: system() function call
    crit: notable
    conf: 0.9
    for: [shell, c, cpp]
    if:
      type: symbol
      exact: system
composite_rules:
  - id: go-shell-strings
    desc: Go shell execution strings
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/system::go-os-exec
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
      - id: micro-behaviors/process/create/shell/lang::pipe-redirection
  - id: shell-symbols
    desc: Shell execution symbols
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/binary/resource::resource-only-dll
    any:
      - id: micro-behaviors/process/create/shell/
  - id: shell-execution-indicators
    desc: Shell command execution indicators
    crit: notable
    conf: 0.9
    any:
      - id: shell-symbols
      - id: go-shell-strings
