defaults:
  attack: T1218.011
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: rundll32-exec
    desc: Executes a DLL using rundll32.exe
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \brundll32(\.exe)?\b
  - id: rundll32-exec-with-args
    desc: Rundll32 DLL execution with export name
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: rundll32(\.exe)?\s+[^,]{1,200},[a-zA-Z0-9_]{3,}
    not:
      - regex: rundll32\.exe\s+%s,InstallHinfSection\b
      - exact: "rundll32.exe %s,ExportCookieFile"
      - regex: rundll32\.exe\s+%s,(Export|Import)CookieFile(ByProcess)?
      - regex: rundll32\.exe\s+%s,ClearMyTracksByProcess\b
      - regex: rundll32\.exe\s+ieadvpack\.dll,RegisterOCX
      - regex: (?i)\brundll32(\.exe)?\s+clipc\.dll,ClipCleanUpState\b
      - regex: rundll32\.exe\s+%s?advpack\.dll,DelNodeRunDLL32
      - regex: rundll32\.exe\s+powrprof\.dll,SetSuspendState\b
      # url.dll protocol handlers are the canonical Win32 URL/file opener
      # (e.g. `rundll32 url.dll,FileProtocolHandler <url>`); benign, no payload.
      - regex: (?i)\brundll32(\.exe)?\s+url\.dll,(FileProtocolHandler|OpenURL|MailToProtocolHandler)\b
    unless:
      - id: metadata/binary/framework::windows-appcompat-shim
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
        - id: metadata/signed/platform/
