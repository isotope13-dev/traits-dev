# PowerShell Invoke-Expression (iex) — dynamic-code execution primitive.
defaults:
  for: [powershell, batch]
  platforms: [windows, linux, macos]

traits:
  - id: invoke-expression
    desc: PowerShell Invoke-Expression cmdlet
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bInvoke-Expression\b'
  - id: iex-alias
    desc: PowerShell iex alias
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\biex\s+\$'
  - id: powershell-irm-iex-command-string
    desc: PowerShell download-and-execute command string
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: literal
      kind: string
      regex: '(?i)\bpowershell\b.{0,80}\birm\b.{0,120}\|\s*iex'
