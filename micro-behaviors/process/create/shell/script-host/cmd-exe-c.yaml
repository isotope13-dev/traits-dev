defaults:
  platforms: [windows]
  for: [pe, dll, scripts, rust]
traits:
  - id: cmd-exe-c-command
    desc: Runs commands through cmd.exe /c
    crit: notable
    conf: 0.85
    if:
      type: text
      # A backtick prefix is omitted deliberately: prose commonly quotes
      # rejected commands as `cmd /c ...`, while executable JS strings use a
      # quote and shell commands appear at a line boundary or after whitespace.
      regex: '(?is)(^|["''\s(=,:])cmd(\.exe)?\s*/c\s+\S|Command::new\("cmd"\).{0,80}"/C"'
  - id: cmd-exe-spawn
    desc: Node spawns cmd.exe
    crit: notable
    conf: 0.86
    attack: "T1059.003"
    for: [javascript, typescript]
    if:
      type: text
      regex: 'spawn\(\s*["'']cmd\.exe["'']'
  - id: powershell-exe-spawn
    desc: Node spawns powershell.exe
    crit: notable
    conf: 0.86
    attack: "T1059.001"
    for: [javascript, typescript]
    if:
      type: text
      regex: 'spawn\(\s*["'']powershell(\.exe)?["'']'
