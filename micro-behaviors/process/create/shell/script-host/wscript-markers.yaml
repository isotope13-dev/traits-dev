defaults:
  platforms: [windows]
  for:
    - vbs
  crit: notable
  conf: 0.7
traits:
  - id: wscript-shell
    desc: WScript.Shell object reference
    if:
      type: string_literal
      substr: WScript.Shell
  - id: wscript-exe
    desc: wscript.exe executable reference
    if:
      type: string_literal
      substr: wscript.exe
  - id: cscript-exe
    desc: cscript.exe executable reference
    if:
      type: string_literal
      substr: cscript.exe
