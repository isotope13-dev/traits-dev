defaults:
  platforms: [unix]
  for: [shell]
traits:
- id: pipe-to-http-client
  desc: Shell pipe to HTTP client
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '[^|]\|\s*(curl|wget)\b'
- id: curl-pipe-bash-text
  desc: References a curl-to-Bash pipeline
  crit: notable
  conf: 0.9
  for: [shell, markdown]
  attack: T1059.004
  unless:
    - id: well-known/tool/detection/llm-scanner::llm-scanner-context
    # Security playbook / attack writeups citing known-bad or illustrative hosts
    - type: text
      regex: '(?i)https?://(attacker\.com|hackmoltrepeat\.com)/'
    - type: text
      regex: '(?i)Actions That curl\s*\|\s*bash'
  if:
    type: text
    regex: 'curl\s+.{0,160}\|\s*bash\b'
- id: python-curl-pipe-bash-string
  desc: Python string contains curl-to-Bash command
  crit: notable
  conf: 0.94
  attack: T1059.004
  for: [python]
  if:
    type: literal
    kind: string
    regex: 'curl\s+[^\n]{0,200}\|\s*bash\b'
- id: curl-pipe-sh-text
  desc: Text contains curl piped to sh
  crit: notable
  conf: 0.9
  ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
  attack: T1059.004
  if:
    type: text
    regex: 'curl\s+.{0,180}\|\s*sh\b'
  not:
  - regex: 'curl\s+.{0,200}astral\.sh.{0,200}\|\s*sh\b'
  - regex: 'curl\s+-LsSf\s+\.\.\.\s*\|\s*sh\b'
  - regex: 'curl\s+.{0,80}\{UV_INSTALL_URL\}\s*\|\s*sh\b'
  unless:
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - type: text
    substr: astral.sh/uv/install.sh
