defaults:
  platforms: [unix]
  for: [shell]
traits:
- id: pipe-to-http-client
  desc: Shell pipe to HTTP client
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '[^|]\|\s*(curl|wget)\b'
- id: curl-pipe-bash-text
  desc: Text contains curl piped to bash
  crit: notable
  conf: 0.9
  for: [shell, markdown]
  attack: T1059.004
  if:
    type: text
    regex: 'curl\s+.{0,160}\|\s*bash\b'
