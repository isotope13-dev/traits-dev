# Shell Pipe Chains
# Detects excessive piping or complex redirections in shell commands (stealth signal).
defaults:
  platforms: [unix]
  for: [shell]
traits:
- id: excessive-pipes--rx-1
  desc: cat/grep pipeline has at least four pipes
  crit: notable
  conf: 0.8
  unless:
    - id: metadata/file/format::sourcemap-sources-content
    - id: metadata/file/extension/identity::squashfs-container-filename
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(cat|grep)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

  count_max: 1003758
- id: excessive-pipes--rx-2
  desc: awk/sed pipeline has at least four pipes
