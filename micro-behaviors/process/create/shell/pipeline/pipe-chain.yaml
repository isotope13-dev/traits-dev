composite_rules:
- id: shell-null-and-excessive-pipes
  desc: Script combines null redirection and long pipeline
  crit: notable
  conf: 0.8
  all:
  - id: micro-behaviors/os/console/io::null-redirect-stdout-stderr
  - id: micro-behaviors/process/create/shell/pipeline::excessive-pipes

- id: stealth-shell-chain
  desc: Stealthy shell command chain with multiple pipes and concealment
  crit: notable
  conf: 0.8
  unless:
  - id: metadata/package/testing/presence/harness/
