# Generic Mercurial (hg) command invocation — a neutral version-control
# capability. Relocated from well-known/tool/sysadmin/repo-maintenance (running
# hg is not a unique tool signature). Composites reference these cross-tier,
# mostly as benign-context.
defaults:
  platforms: [unix, windows]
  for: [shell, python, ruby, javascript]
  size_min: 512
  size_max: 500000000
traits:
  - id: hg-operations-1
    desc: Mercurial ops (init/log/status/diff)
    if:
      type: string_literal
      regex: '\bhg (init|log|status|diff)\b'
  - id: hg-operations-2
    desc: Mercurial ops (bookmarks/revert/add/forget)
    if:
      type: string_literal
      regex: '\bhg (bookmarks|revert|add|forget)\b'
  - id: hg-operations-3
    desc: Mercurial ops (commit/ci)
    if:
      type: string_literal
      regex: '\bhg (commit|ci)\b'
composite_rules:
  - id: hg-operations
    desc: Mercurial repository operations
    crit: baseline
    any:
      - id: hg-operations-1
      - id: hg-operations-2
      - id: hg-operations-3
