# Interactive shell environment setup patterns
defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: term-xterm-export
    desc: Sets TERM=xterm for interactive shell
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "export TERM=xterm"
  - id: ps1-custom-prompt
    desc: Custom PS1 shell prompt configuration
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: PS1='.{1,30}';export PS1
