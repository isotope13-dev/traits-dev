defaults:
  platforms: [unix]
  for: [perl, shell]
  attack: T1059.006

traits:
  - id: perl-e-system-exec
    desc: Perl one-liner system or exec call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bperl\s+([-''"]\S*\s+){0,3}-e\s+.{0,220}\b(system|exec)\s*\('
  - id: perl-e-backtick-exec
    desc: Perl one-liner backtick or qx call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bperl\s+([-''"]\S*\s+){0,3}-e\s+.{0,200}(qx\(|`[^`]{0,80}`)'
