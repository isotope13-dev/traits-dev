# Generic git command invocation. Running git is a neutral version-control
# capability (build scripts, CI, dev tooling, repo-maintenance automation all
# do it). Relocated from the bogus well-known/tool/sysadmin/repo-maintenance
# "family" entry — these are not a unique tool signature. Many composites
# reference these cross-tier as benign-context (a script that runs git is
# ordinary), and the github-issue-maintenance composite below identifies a
# benign GitHub-automation script shape.
defaults:
  platforms: [unix, windows]
  for: [shell, python, ruby, javascript]
  size_min: 512
  size_max: 500000000
traits:
  - id: git-operations-1
    desc: Git ops (clone/pull/push/commit)
    if:
      type: string_literal
      regex: '\bgit (clone|pull|push|commit)\b'
  - id: git-operations-2
    desc: Git ops (add/status/remote/checkout)
    if:
      type: string_literal
      regex: '\bgit (add|status|remote|checkout)\b'
  - id: git-remote-url-capture
    desc: Reads git remote URL
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: 'git\s+(remote\s+(get-url|-v)|config\s+--get\b[^\n]{0,40}\.url|ls-remote\s+--get-url)'
    unless:
      - type: text
        substr: 'insteadOf'
composite_rules:
  - id: git-operations
    desc: Git repository operations
    crit: baseline
    any:
      - id: git-operations-1
      - id: git-operations-2
  - id: github-issue-maintenance
    desc: GitHub issue maintenance script
    crit: notable
    all:
      - id: micro-behaviors/communications/http/services/github::gh-issue-mgmt
    any:
      - id: micro-behaviors/data/text/cli-tool::jq-processing
      - id: micro-behaviors/data/text/cli-tool::sed-processing
      - id: micro-behaviors/data/text/cli-tool::awk-processing
