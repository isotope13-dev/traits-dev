defaults:
  platforms: [windows, linux, macos]
  for:
    - javascript
traits:
  - id: git-push-origin
    desc: Pushes git ref to origin
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: "git\\s+push\\s+origin\\b"

composite_rules:
  - id: git-tag-and-push
    desc: Creates and pushes git tag
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/process/create/shell/git::git-tag-annotate
      - id: git-push-origin
