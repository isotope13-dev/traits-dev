defaults:
  platforms: [windows, linux, macos]
  for: [javascript, typescript]

# git worktree management: checking out multiple working trees of one repo.
# Benign VCS capability (orchestrators isolate each task in its own worktree),
# tracked as a baseline behavioral fact.
traits:
  - id: git-worktree-subcommand-literal
    desc: Git worktree subcommand literal
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      exact: worktree

  - id: git-worktree-command-text
    desc: Git worktree management command
    crit: baseline
    conf: 0.85
    if:
      type: literal
      kind: string
      regex: '\bgit\s+worktree\s+(add|remove|prune|list)\b'

composite_rules:
  - id: git-worktree-management
    desc: Manages git worktrees
    crit: baseline
    conf: 0.85
    all:
      - id: micro-behaviors/process/create/shell/git::git-command-literal
      - id: git-worktree-subcommand-literal
