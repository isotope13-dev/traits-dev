defaults:
  platforms: [windows, linux, macos]
  for: [javascript, typescript]

traits:
  - id: git-command-literal
    desc: Git command literal
    crit: component
    conf: 0.86
    if:
      type: literal
      kind: string
      exact: git

  - id: git-reset-literal
    desc: reset argument literal
    crit: component
    conf: 0.86
    if:
      type: literal
      kind: string
      exact: reset

  - id: git-hard-flag-literal
    desc: Git hard reset flag literal
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: --hard

  - id: git-head-ref-literal
    desc: Git HEAD ref literal
    crit: component
    conf: 0.82
    if:
      type: literal
      kind: string
      exact: HEAD
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/

  - id: git-reset-hard-head-text
    desc: Git hard reset command text
    crit: notable
    conf: 0.88
    if:
      type: literal
      kind: string
      regex: '\bgit\s+reset\s+--hard\s+HEAD\b'

composite_rules:
  - id: git-reset-hard-head-argv
    desc: Git hard reset argv sequence
    crit: notable
    conf: 0.9
    near_bytes: 96
    all:
      - id: git-command-literal
      - id: git-reset-literal
      - id: git-hard-flag-literal
      - id: git-head-ref-literal
