defaults:
  platforms: [windows, linux, macos]
  for:
    - javascript
traits:
  - id: git-rev-parse-head
    desc: Queries current git commit hash
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "git\\s+rev-parse\\s+HEAD"
  - id: git-rev-parse-dir
    desc: Queries Git repository directory
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "git\\s+rev-parse\\s+--git-dir"
