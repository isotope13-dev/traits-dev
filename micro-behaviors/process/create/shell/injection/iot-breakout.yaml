# IoT command-injection via WiFi/admin parameters. Targets the
# `ssid=...|reboot` / `passwd=...&kill` style config-form abuses seen on
# embedded devices. The composite fires on the shell-metachar pattern in
# config-string context and is suppressed when the file is plainly JS/TS
# (variable declarations, type annotations, simple assignments) — those
# look superficially similar but are not injection sinks.
defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.8
  for: [scripts]
traits:
- id: iot-param-injection--rx-1
  desc: ssid=/pass= followed by shell metachar
  crit: component
  for: [shell, javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(ssid|pass)\b\s*[:=].{0,20}[;\|&`\$\(]'
- id: iot-param-injection--rx-2
  desc: admin=/user= followed by shell metachar
  crit: component
  for: [shell, javascript, typescript]
  if:
    type: text
    regex: '(?i)(^|[^:A-Za-z0-9_])["'']?(admin|user)["'']?\s*[:=]\s*.{0,20}[;\|&`\$\(]'
- id: iot-param-injection--rx-3
  desc: key=/config= followed by shell metachar
  crit: component
  for: [shell, javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(key|config)\b\s*[:=].{0,20}[;\|&`\$\(]'
- id: fallback-dropper
  desc: wget/curl chained with tftp/echo fallback
  crit: notable
  if:
    type: text
    regex: '(?i)(wget|curl).{0,100}\|\|.{0,100}(tftp|echo)'
  unless:
  - type: text
    substr: command -v curl >/dev/null 2>&1 || command -v wget
# ---- JS/TS FP suppressors ----
# These match ordinary JS/TS syntax that superficially resembles the IoT
# config form. Used only as `unless:` predicates on the composite below.
- id: iot-param-injection-cond-0--inline-3970
  desc: 'var/let/const <name>key = ... declaration (JS suppressor)'
  crit: component
  conf: 1.0
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b(var|let|const)\s+\w*key\s*='
- id: iot-param-injection-cond-1--inline-3971
  desc: '"key|config: string|number;" TS field type (suppressor)'
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(string|number)\s*;'
- id: iot-param-injection-cond-1--inline-3972
  desc: '"key|config: boolean|Buffer;" TS field type (suppressor)'
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(boolean|Buffer)\s*;'
- id: iot-param-injection-cond-1--inline-3973
  desc: '"key|config: any|Function;" TS field type (suppressor)'
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(any|Function)\s*;'
- id: iot-param-injection-cond-1--inline-3974
  desc: '"key|config: object;" TS field type (suppressor)'
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(object)\s*;'
- id: iot-param-injection-cond-2--inline-3976
  desc: '<ident> = <ident>; plain JS/TS assignment (suppressor)'
  crit: component
  conf: 1.0
  for: [javascript, typescript]
  # Catches `FOO = BAR;` shape — exports.X = Y, module aliases, etc. — so
  # the composite below does not fire on routine JS code.
  if:
    type: text
    regex: '\b[A-Za-z_][A-Za-z0-9_]*\s*=\s*[A-Za-z_][A-Za-z0-9_]*\s*;'
composite_rules:
- id: iot-param-injection
  desc: Shell-metachar in IoT config parameter
  crit: notable
  conf: 1.0
  any:
  - id: iot-param-injection--rx-1
  - id: iot-param-injection--rx-2
  - id: iot-param-injection--rx-3
  # Suppress when the file is clearly JS/TS source rather than an embedded
  # device config form.
  unless:
  - id: iot-param-injection-cond-0--inline-3970
  - id: iot-param-injection-cond-1--inline-helper-3975
  - id: iot-param-injection-cond-2--inline-3976
- id: iot-param-injection-cond-1--inline-helper-3975
  desc: TS field-type declaration (JS suppressor helper)
  crit: component
  conf: 1.0
  any:
  - id: iot-param-injection-cond-1--inline-3971
  - id: iot-param-injection-cond-1--inline-3972
  - id: iot-param-injection-cond-1--inline-3973
  - id: iot-param-injection-cond-1--inline-3974
