defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.8
  for: [scripts]
traits:
- id: iot-param-injection--rx-1
  desc: Regex component marker
  crit: component
  for: [shell, javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(ssid|pass)\b\s*[:=].{0,20}[;\|&`\$\(]'
  count_max: 1003967
- id: iot-param-injection--rx-2
  desc: Regex component marker
  crit: component
  for: [shell, javascript, typescript]
  if:
    type: text
    regex: '(?i)(^|[^:A-Za-z0-9_])["'']?(admin|user)["'']?\s*[:=]\s*.{0,20}[;\|&`\$\(]'
  count_max: 1003968
- id: iot-param-injection--rx-3
  desc: key= or config= followed by shell metacharacter
  crit: component
  for: [shell, javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(key|config)\b\s*[:=].{0,20}[;\|&`\$\(]'
  count_max: 1003969
- id: fallback-dropper
  desc: Dropper with multi-utility fallback
  crit: suspicious
  if:
    type: text
    regex: '(?i)(wget|curl).{0,100}\|\|.{0,100}(tftp|echo)'
  unless:
  - type: text
    substr: command -v curl >/dev/null 2>&1 || command -v wget
- id: iot-param-injection-cond-0--inline-3970
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b(var|let|const)\s+\w*key\s*='
  count_max: 1003971
- id: iot-param-injection-cond-1--inline-3971
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(string|number)\s*;'
  count_max: 1003972
- id: iot-param-injection-cond-1--inline-3972
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(boolean|Buffer)\s*;'
  count_max: 1003973
- id: iot-param-injection-cond-1--inline-3973
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(any|Function)\s*;'
  count_max: 1003974
- id: iot-param-injection-cond-1--inline-3974
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [typescript]
  if:
    type: text
    regex: '\b(key|config)\s*:\s*(object)\s*;'
  count_max: 1003975
- id: iot-param-injection-cond-2--inline-3976
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b[A-Za-z_][A-Za-z0-9_]*\s*=\s*[A-Za-z_][A-Za-z0-9_]*\s*;'
  count_max: 1003977
composite_rules:
- id: iot-param-injection
  desc: Command injection characters in config-like strings
  crit: notable
  conf: 1.0
  any:
  - id: iot-param-injection--rx-1
  - id: iot-param-injection--rx-2
  - id: iot-param-injection--rx-3
  unless:
  - id: iot-param-injection-cond-0--inline-3970
  - id: iot-param-injection-cond-1--inline-helper-3975
  - id: iot-param-injection-cond-2--inline-3976
- id: iot-param-injection-cond-1--inline-helper-3975
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: iot-param-injection-cond-1--inline-3971
  - id: iot-param-injection-cond-1--inline-3972
  - id: iot-param-injection-cond-1--inline-3973
  - id: iot-param-injection-cond-1--inline-3974
