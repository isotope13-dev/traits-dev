defaults:
  attack: T1218.011
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: rundll32-exec
    desc: Executes a DLL using rundll32.exe
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \bundll32(\.exe)?\b
  - id: rundll32-exec-with-args
    desc: Rundll32 DLL execution with export name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: rundll32(\.exe)?\s+[^,]{1,200},[a-zA-Z0-9_]{3,}
