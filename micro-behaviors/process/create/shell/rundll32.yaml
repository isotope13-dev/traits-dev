defaults:
  attack: T1218.011
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - vbs
    - python
    - ruby
    - powershell
traits:
  - id: rundll32-exec
    desc: Executes a DLL using rundll32.exe
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: \bundll32(\.exe)?\b
  - id: rundll32-exec-with-args
    desc: Rundll32 DLL execution with export name
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: rundll32(\.exe)?\s+[^,]{1,200},[a-zA-Z0-9_]{3,}
