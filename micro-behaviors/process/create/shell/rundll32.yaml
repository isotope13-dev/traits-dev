# Rundll32 Execution from Script
# References: https://attack.mitre.org/techniques/T1218/011/
defaults:
  for: [javascript, vbs, python, ruby, powershell]
traits:
  - id: rundll32-exec
    desc: "Executes a DLL using rundll32.exe"
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: '\bundll32(\.exe)?\b'
    attack: "T1218.011"
  - id: rundll32-exec-with-args
    desc: "Rundll32 DLL execution with export name"
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: 'rundll32(\.exe)?\s+[^,]{1,200},[a-zA-Z0-9_]{3,}'
    attack: "T1218.011"
