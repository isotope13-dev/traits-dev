defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - shell
traits:
  - id: nohup-background-miner
    desc: Background process with mining flags
    crit: suspicious
    conf: 0.85
    attack: T1496
    mbc: B0041
    if:
      type: string_literal
      regex: nohup\s+\./.{1,30}\s+-u\s+.{1,150}\s+-o\s+.{1,150}&
