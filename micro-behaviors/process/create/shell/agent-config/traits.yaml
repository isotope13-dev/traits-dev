defaults:
  platforms: [windows, unix]
  for: [json]
  crit: notable
  conf: 0.92

traits:
  - id: ai-agent-statusline-shell-command
    desc: Status line runs a shell command
    if:
      type: text
      regex: '(?i)\b(bash|sh)\s+-c\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: ai-agent-statusline-cached-plugin-wrapper
    desc: Status line runs cached plugin wrapper
    conf: 0.97
    if:
      type: text
      regex: '(?i)plugins[\\/]cache[\\/].{0,700}wrapper\.sh'
