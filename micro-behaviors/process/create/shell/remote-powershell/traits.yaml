# Neutral capability atoms for a program that invokes PowerShell with hidden
# execution settings. Intent is supplied by objective composites.
defaults:
  platforms: [windows]
  for: [pe, pyc, powershell, python]
  attack: T1059.001

traits:
  - id: powershell-policy-bypass
    desc: PowerShell execution-policy bypass option
    crit: notable
    conf: 0.98
    if:
      type: text
      # A documentation comment is not an invocation of PowerShell.
      regex: '(?im)^(?!\s*#)\s*(powershell|pwsh)(\.exe)?\b[^\r\n]{0,100}-ExecutionPolicy\s+Bypass\b'

  - id: powershell-hidden-window
    desc: PowerShell hidden-window option
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)-WindowStyle\s+Hidden\b'

  - id: powershell-command-runner
    desc: PowerShell command runner via subprocess
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?is)\bsubprocess\.run\b.{0,500}\bpowershell\.exe\b.{0,180}\b-Command\b'

  - id: python-powershell-fetch-alias
    desc: Python subprocess passes PowerShell fetch alias
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: call
      substr: subprocess
      arg:
        kind: string
        substr: irm

  - id: python-powershell-subprocess
    desc: Python subprocess passes PowerShell
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: call
      substr: subprocess
      arg:
        kind: string
        substr: powershell

  - id: powershell-expression-pipeline
    desc: Python subprocess passes PowerShell expression
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: call
      substr: subprocess
      arg:
        kind: string
        substr: iex

composite_rules:
  - id: python-powershell-fetch-execute
    desc: PowerShell fetch-and-execute pipeline
    crit: notable
    conf: 0.99
    for: [python]
    all:
      - id: python-powershell-subprocess
      - id: python-powershell-fetch-alias
      - id: powershell-expression-pipeline
    near_bytes: 512

  - id: powershell-policy-bypass-hidden
    desc: PowerShell policy bypass with hidden window
    crit: notable
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/shell/interpreter::powershell-executable-token
      - id: powershell-policy-bypass
      - id: powershell-hidden-window
    near_bytes: 768
