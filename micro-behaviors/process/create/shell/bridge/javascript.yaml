defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: ai-agent-shell-instruction-tag
    desc: AI-agent shell instruction tag in prompt text
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '<(run_command|shell|bash)>[\s\S]{0,220}</'

  - id: vscode-create-terminal
    desc: Creates a VS Code terminal
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.createTerminal\s*\('

  - id: terminal-send-text
    desc: Sends text to terminal session
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.sendText\s*\('

  - id: js-execsync
    desc: Executes shell commands synchronously
    crit: notable
    conf: 1.0
    unless:
      - type: basename
        exact: windowsPtyAgent.js
      - type: basename
        exact: publish.js
      - type: text
        substr: require('../common')
    if:
      type: symbol
      exact: execSync
  - id: js-execsync-cmd-arg
    desc: execSync called with cmd variable
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: execSync(cmd
  - id: js-compiled-execsync-cmd-arg
    desc: compiled JS execSync cmd arg
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: execSync)(cmd
  - id: js-execfilesync
    desc: Executes a file synchronously
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: execFileSync
  - id: js-execfile-bash
    desc: Node execFile launches bash process
    crit: notable
    conf: 0.86
    mbc: "C0017"
    attack: "T1059.004"
    for: [javascript, typescript]
    if:
      type: text
      regex: "execFile\\)?\\(\\s*['\"`]bash['\"`]"
  - id: js-function-bash-first-arg
    desc: JavaScript call receives Bash argument
    crit: component
    conf: 0.84
    mbc: "C0017"
    attack: "T1059.004"
    for: [javascript, typescript]
    if:
      type: text
      regex: "\\b[A-Za-z_$][\\w$]*\\s*\\(\\s*['\"`]bash['\"`]\\s*,"
  - id: js-spawnsync
    desc: Calls spawnSync() to run a child process
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: spawnSync
  - id: js-spawnsync-bash-command
    desc: Runs variable command through Bash
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: 'spawnSync\(\s*["'']bash["'']\s*,\s*\[\s*["'']-c["'']\s*,\s*\w+'
  - id: js-execsync-destructure
    desc: Imports execSync from Node.js child_process
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'execSync:\w+\}\s*=\s*require\('
  - id: js-exec
    desc: Executes shell commands
    crit: notable
    conf: 1.0
    if:
      type: symbol
      kind: call
      exact: exec
    unless:
      - id: local-exec-function
      - type: text
        regex: '\b(exec|const exec|let exec|var exec)\s*=\s*(?!require\(["''](?:node:)?child_process)'
      - type: text
        substr: cordova/exec
      - id: metadata/lang/compiled::erlang-module-marker
      - type: string_literal
        substr: '@ioredis/commands'
      - type: string_literal
        substr: redis-commands
      - type: string_literal
        substr: EXECABORT
  - id: node-starts-browser-url
    desc: Node invokes Windows start with a URL
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'exec\s*\(\s*`start\s+""\s+["'']?\$\{[A-Za-z_$][A-Za-z0-9_$]*\}'
  - id: js-cmd-start
    desc: Launches cmd via start
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: start\s+cmd
  - id: js-terminal-launch
    desc: Launches Linux terminal emulator
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: gnome-terminal|x-terminal-emulator|xfce4-terminal
  - id: js-bun-exec
    desc: JavaScript Bun process spawn API
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bBun\.(spawn|spawnSync|exec|execSync)\b'

composite_rules:
  - id: vscode-terminal-command-dispatch
    desc: Dispatches commands through VS Code terminal
    crit: notable
    conf: 0.92
    near_bytes: 4096
    all:
      - id: vscode-create-terminal
      - id: terminal-send-text

  - id: js-file-write-and-shell-exec
    desc: JavaScript writes files and executes shell commands
    crit: notable
    conf: 0.85
    near_lines: 25
    all:
      - id: micro-behaviors/fs/write/file/direct::js-file-write
      - id: child-process-require
    any:
      - id: js-exec
      - id: js-execsync
      - id: spawn-call
    unless:
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: well-known/lib/nextjs::next-build-telemetry-writer
      - id: micro-behaviors/process/create/shell/build::npm-install-ignore-scripts
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::node-common-require
        - id: metadata/library/prettier
        - id: metadata/package/documentation/
        - id: micro-behaviors/process/interpreter/vm/
  - id: js-sync-child-process-api
    desc: JavaScript synchronous child-process API
    crit: notable
    conf: 0.9
    any:
      - id: js-execfilesync
      - id: js-spawnsync
      - id: js-execsync
