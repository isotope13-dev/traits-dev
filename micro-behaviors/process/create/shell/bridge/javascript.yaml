defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: js-execsync
    desc: Executes shell commands synchronously
    crit: notable
    conf: 1.0
    unless:
      - type: basename
        exact: windowsPtyAgent.js
      - type: basename
        exact: publish.js
      - type: text
        substr: require('../common')
    if:
      type: symbol
      exact: execSync
  - id: js-execsync-cmd-arg
    desc: execSync called with cmd variable
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: execSync(cmd
  - id: js-compiled-execsync-cmd-arg
    desc: compiled JS execSync cmd arg
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: execSync)(cmd
  - id: js-execfilesync
    desc: Executes a file synchronously
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: execFileSync
  - id: js-execfile-bash
    desc: Node execFile launches bash process
    crit: notable
    conf: 0.86
    mbc: "C0017"
    attack: "T1059.004"
    for: [javascript, typescript]
    if:
      type: text
      regex: "execFile\\)?\\(\\s*['\"`]bash['\"`]"
  - id: js-function-bash-first-arg
    desc: JavaScript function call launches bash process
    crit: notable
    conf: 0.84
    mbc: "C0017"
    attack: "T1059.004"
    for: [javascript, typescript]
    if:
      type: text
      regex: "\\b[A-Za-z_$][\\w$]*\\s*\\(\\s*['\"`]bash['\"`]\\s*,"
  - id: js-spawnsync
    desc: Spawns a process synchronously
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: spawnSync
  - id: js-execsync-destructure
    desc: execSync destructured require alias
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'execSync:\w+\}\s*=\s*require\('
  - id: js-exec
    desc: Executes shell commands
    crit: notable
    conf: 1.0
    if:
      type: symbol
      kind: call
      exact: exec
    unless:
      - id: local-exec-function
      - type: text
        regex: '\b(exec|const\s+exec|let\s+exec|var\s+exec)\s*=\s*[A-Za-z_$][\w$]*\('
      - type: text
        substr: cordova/exec
      - id: metadata/lang/compiled::erlang-module-marker
      - type: string_literal
        substr: '@ioredis/commands'
      - type: string_literal
        substr: redis-commands
      - type: string_literal
        substr: EXECABORT
  - id: js-cmd-start
    desc: Launches cmd via start
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: start\s+cmd
  - id: js-terminal-launch
    desc: Launches Linux terminal emulator
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: gnome-terminal|x-terminal-emulator|xfce4-terminal
  - id: js-bun-exec
    desc: JavaScript Bun process spawn API
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bBun\.(spawn|spawnSync|exec|execSync)\b'

composite_rules:
  - id: js-sync-child-process-api
    desc: JavaScript synchronous child-process API
    crit: notable
    conf: 0.9
    any:
      - id: js-execfilesync
      - id: js-spawnsync
      - id: js-execsync
