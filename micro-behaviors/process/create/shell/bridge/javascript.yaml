defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: js-execsync
    desc: Executes shell commands synchronously
    crit: notable
    conf: 1.0
    unless:
      - type: basename
        regex: \.map$
      - type: basename
        exact: windowsPtyAgent.js
      - type: basename
        exact: publish.js
      - type: text
        substr: require('../common')
    if:
      type: symbol
      exact: execSync
  - id: js-execfilesync
    desc: Executes a file synchronously
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: execFileSync
  - id: js-spawnsync
    desc: Spawns a process synchronously
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: spawnSync
  - id: js-execsync-destructure
    desc: execSync destructured require alias
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'execSync:\w+\}\s*=\s*require\('
  - id: js-exec
    desc: Executes shell commands
    crit: notable
    conf: 1.0
    if:
      type: ast
      kind: call
      exact: exec
    unless:
      - type: text
        substr: -module(
      - type: string_literal
        substr: '@ioredis/commands'
      - type: string_literal
        substr: redis-commands
      - type: string_literal
        substr: EXECABORT
  - id: js-spawn
    desc: Spawns a child process
    crit: notable
    conf: 1.0
    if:
      type: symbol
      exact: spawn
  - id: js-cmd-start
    desc: Launches cmd via start
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: start\s+cmd
  - id: js-terminal-launch
    desc: Launches Linux terminal emulator
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: gnome-terminal|x-terminal-emulator|xfce4-terminal
  - id: js-bun-exec
    desc: JavaScript Bun executes shell command
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      word: bun
