defaults:
  platforms:
    - unix
    - windows
  for: [javascript]
  attack: T1059
traits:
  - id: child-process-require-call
    desc: require child_process import
    crit: notable
    conf: 0.8
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: require\(\s*["'](node:)?child_process["']\s*\)
  - id: child-process-destructure-require
    desc: Destructured child_process require
    crit: notable
    conf: 0.85
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: \{[^}\n]{1,48}\}\s*=\s*require\(\s*["'](node:)?child_process
  - id: child-process-import-runtime
    desc: Runtime child_process import
    crit: notable
    conf: 0.75
    mbc: C0017
    if:
      type: text
      regex: \bimport\s+[^;\n]{1,80}from\s+["'](node:)?child_process["']
    unless:
      - type: basename
        exact: windowsPtyAgent.ts
      - type: text
        substr: import type
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
  - id: child-process-inline-member-require
    desc: Inline child_process member require
    crit: notable
    conf: 0.9
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: ast
      language: javascript
      query: |
        (member_expression
          object: (call_expression
            function: (identifier) @fn
            arguments: (arguments (string) @arg)
          )
          property: (property_identifier) @prop
          (#eq? @fn "require")
          (#match? @arg "'(node:)?child_process'|\"(node:)?child_process\"")
          (#match? @prop "^(exec|execSync|spawn|spawnSync|fork)$")
        )
  - id: child-process-inline-exec-call
    desc: Inline child_process exec call
    crit: notable
    conf: 0.94
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (call_expression
              function: (identifier) @fn
              arguments: (arguments (string) @mod)
            )
            property: (property_identifier) @prop
          )
          arguments: (arguments (string) @cmd)
          (#eq? @fn "require")
          (#match? @mod "'(node:)?child_process'|\"(node:)?child_process\"")
          (#match? @prop "^(exec|execSync)$")
        )
  - id: exec-call
    desc: exec() function call (Python/JavaScript)
    crit: notable
    conf: 0.85
    mbc: C0017
    if:
      type: ast
      kind: call
      exact: exec
  - id: spawn-call
    desc: spawn() function call
    crit: notable
    conf: 0.7
    unless:
      - type: basename
        exact: install.js
    if:
      type: ast
      kind: call
      exact: spawn
  - id: execSync-call
    desc: Node.js synchronous exec
    crit: notable
    conf: 0.85
    mbc: C0017
    if:
      type: ast
      kind: call
      exact: child_process.execSync
  - id: execSync-compiled
    desc: Compiled TypeScript execSync invocation
    crit: notable
    conf: 0.85
    mbc: C0017
    if:
      type: text
      regex: 'child_process_\d+\.execSync'
  - id: getExecOutput
    desc: Node.js exec output capture (GitHub Actions)
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: getExecOutput
  - id: silent-true
    desc: Silent execution flag (hides output)
    crit: notable
    conf: 0.85
    mbc: F0005
    if:
      type: string_literal
      regex: silent:\s*true
composite_rules:
  - id: child-process-require
    desc: Node.js child_process module import
    crit: notable
    conf: 0.8
    mbc: C0017
    any:
      - id: child-process-require-call
      - id: child-process-destructure-require
      - id: child-process-import-runtime
      - id: child-process-inline-member-require
  - id: child-process-exec
    desc: Node.js child_process execution
    crit: notable
    conf: 0.85
    mbc: C0017
    any:
      - id: child-process-inline-exec-call
      - id: exec-call
      - id: spawn-call
      - id: execSync-call
      - id: execSync-compiled
      - id: getExecOutput
