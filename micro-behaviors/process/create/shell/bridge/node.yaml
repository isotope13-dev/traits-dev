defaults:
  platforms:
    - unix
    - windows
  for: [javascript]
  attack: T1059
traits:
  - id: child-process-keyword-literal
    desc: child_process module name literal
    crit: component
    conf: 0.9
    if:
      type: string_literal
      word: child_process
  - id: execsync-method-literal
    desc: execSync method name literal
    crit: component
    conf: 0.9
    if:
      type: string_literal
      word: execSync
  - id: local-exec-function
    desc: Local function named exec
    crit: baseline
    conf: 0.9
    if:
      type: function
      exact: exec
  - id: child-process-require-call
    desc: Loads Node.js child_process with require()
    crit: notable
    conf: 0.8
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::node-core-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    if:
      type: text
      regex: require\(\s*["'](node:)?child_process["']\s*\)
  - id: child-process-computed-member-call
    desc: Calls child_process through a computed member
    crit: notable
    conf: 0.9
    mbc: C0017
    if:
      type: text
      regex: 'child_process_\d+\s*\[[^\]\n]{1,120}\]\s*\)\s*\('
  - id: child-process-destructure-require
    desc: Destructures APIs from Node.js child_process
    crit: notable
    conf: 0.85
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::node-core-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    if:
      type: text
      regex: \{[^}\n]{1,48}\}\s*=\s*require\(\s*["'](node:)?child_process
  - id: child-process-import-runtime
    desc: Imports Node.js child_process at runtime
    crit: notable
    conf: 0.75
    mbc: C0017
    if:
      type: text
      regex: \bimport\s+[^;\n]{1,80}from\s+["'](node:)?child_process["']
    unless:
      - type: basename
        exact: windowsPtyAgent.ts
      - type: text
        substr: import type
      - id: metadata/package/testing/harness/runtime::node-core-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
  - id: child-process-inline-member-require
    desc: Accesses child_process from inline require()
    crit: notable
    conf: 0.9
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::node-core-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    # `require('child_process').exec|spawn|fork[Sync]` — inline member access on
    # the require() result. Distinctive as source text.
    if:
      type: text
      regex: 'require\s*\(\s*[''"](node:)?child_process[''"]\s*\)\s*\.(exec|spawn|fork)(Sync)?'
  - id: child-process-inline-exec-call
    desc: Inline child_process exec call
    crit: notable
    conf: 0.94
    mbc: C0017
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - type: basename
        regex: ^(install|windowsPtyAgent)\.js$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime::node-core-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    # `require('child_process').exec[Sync](...)` — inline require-and-call.
    if:
      type: text
      regex: 'require\s*\(\s*[''"](node:)?child_process[''"]\s*\)\s*\.execSync?\s*\('
  - id: child-process-exec-alias-binding
    desc: Binds child_process exec to local alias
    crit: notable
    conf: 0.92
    mbc: C0017
    if:
      type: text
      regex: '\bexec\s*=\s*require\s*\(\s*[''"](node:)?child_process[''"]\s*\)\s*\.exec\b'
  - id: spawn-call
    desc: Calls spawn() to create a child process
    crit: notable
    conf: 0.7
    unless:
      - type: basename
        exact: install.js
    if:
      type: symbol
      kind: call
      exact: spawn
  - id: execSync-call
    desc: Runs shell commands synchronously with execSync
    crit: notable
    conf: 0.85
    mbc: C0017
    if:
      type: symbol
      kind: call
      regex: '(^|\.)execSync$'
  - id: execSync-compiled
    desc: Compiled TypeScript execSync invocation
    crit: notable
    conf: 0.85
    mbc: C0017
    if:
      type: text
      regex: 'child_process_\d+\.execSync'
  - id: child-process-require-compiled
    desc: Compiled TS child_process require
    crit: notable
    conf: 0.9
    mbc: C0017
    # `const child_process_N = require("child_process")` is the standard tsc/
    # esbuild CommonJS emit for `import { spawn } from "child_process"`, not
    # obfuscation. Reported here as a neutral capability; MCP-backdoor composites
    # reference it cross-directory and supply the malicious intent.
    if:
      type: text
      regex: 'child_process_\d+\s*=\s*require\('
  - id: child-process-compiled-computed-call
    desc: Compiled child_process computed-member call
    crit: notable
    conf: 0.9
    mbc: C0017
    # `child_process_N["spawn"](...)` — property-mangled minifier/bundler emit
    # invoking a child_process API through a computed member. Neutral capability;
    # intent comes from the referencing composite.
    if:
      type: text
      regex: 'child_process_\d+\s*\[.{1,120}\]\s*\)\s*\('
  - id: getExecOutput
    desc: Node.js exec output capture (GitHub Actions)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: getExecOutput
  - id: silent-true
    desc: Silent execution flag (hides output)
    crit: notable
    conf: 0.85
    mbc: F0005
    if:
      type: string_literal
      regex: silent:\s*true
  - id: shell-embedded-child-process-require
    desc: Embedded Node child_process require
    crit: notable
    conf: 0.95
    mbc: C0017
    for: [shell]
    if:
      type: text
      substr: 'child_process'
  - id: shell-embedded-node-exec-call
    desc: Calls an .exec() method in embedded text
    crit: component
    conf: 0.95
    mbc: C0017
    for: [shell]
    if:
      type: text
      regex: '\.exec\s*\('
composite_rules:
  - id: child-process-require
    desc: Imports the Node.js child_process module
    crit: notable
    conf: 0.8
    mbc: C0017
    any:
      - id: child-process-require-call
      - id: child-process-destructure-require
      - id: child-process-import-runtime
      - id: child-process-inline-member-require
  - id: child-process-exec-alias-call
    desc: Calls an aliased child_process exec function
    crit: notable
    conf: 0.92
    mbc: C0017
    near_lines: 80
    all:
      - id: child-process-exec-alias-binding
      - id: micro-behaviors/process/create/shell/bridge::js-exec
  - id: child-process-exec
    desc: Node.js child_process execution
    crit: notable
    conf: 0.85
    mbc: C0017
    any:
      - id: child-process-inline-exec-call
      - id: child-process-exec-alias-call
      - id: micro-behaviors/process/create/exec::js-child-process
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: spawn-call
      - id: execSync-call
      - id: execSync-compiled
      - id: getExecOutput
  - id: shell-embedded-node-child-process-exec
    desc: Embedded Node child_process execution
    crit: notable
    conf: 0.95
    mbc: C0017
    for: [shell]
    near_bytes: 512
    all:
      - id: shell-embedded-child-process-require
      - id: shell-embedded-node-exec-call
