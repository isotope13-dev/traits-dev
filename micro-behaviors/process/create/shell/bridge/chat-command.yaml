defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1059
  mbc: C0017
  crit: notable
  conf: 0.88

traits:
  - id: slash-bash-command-literal
    desc: Chat slash-bash command literal
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      substr: /bash

  - id: parse-bash-command-function
    desc: Chat bash command parser
    crit: component
    conf: 0.92
    if:
      type: function
      exact: parseBashCommand

  - id: pre-bash-command-field
    desc: Pre-bash command field
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: preBash

  - id: open-shell-command-literal
    desc: Chat slash-open command literal
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: /open

composite_rules:
  - id: chat-bash-command-handler
    desc: Chat bash command handler
    crit: notable
    conf: 0.92
    all:
      - id: slash-bash-command-literal
    any:
      - id: parse-bash-command-function
      - id: pre-bash-command-field

  - id: chat-open-shell-command
    desc: Chat open shell command
    crit: notable
    conf: 0.88
    all:
      - id: open-shell-command-literal
      - id: micro-behaviors/process/create/shell/invoke::bash-keyword
