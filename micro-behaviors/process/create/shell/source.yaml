defaults:
  platforms:
    - unix
    - linux
    - macos
  for: [source]
traits:
  - id: embedded-shebang-sh
    desc: Embedded shell script shebang (#!/bin/sh)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: '#!/bin/sh'
    unless:
      - id: metadata/quality/testing::test-directory
      - id: metadata/dev/testing/rust::rust-test
