defaults:
  for: [perl]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: system-call
    desc: Perl system command execution
    crit: notable
    conf: 0.85
    attack: "T1059.006"
    if:
      type: raw
      regex: '\bsystem\s*\('
  - id: backticks-exec
    desc: Perl backticks with redirection
    crit: suspicious
    conf: 0.9
    attack: "T1059.006"
    if:
      type: raw
      regex: '`[^`\n]{1,160}(2>&1|3>&1)[^`\n]{0,80}`'
composite_rules:
  - id: perl-shell-exec
    desc: Perl shell command execution
    crit: notable
    conf: 0.9
    any:
      - id: system-call
      - id: backticks-exec
