defaults:
  for: [perl]
  platforms: [unix]
traits:
  - id: system-call
    desc: Perl system command execution
    crit: notable
    conf: 0.85
    attack: "T1059.006"
    if:
      type: text
      regex: '\bsystem\s*\('
  - id: backticks-exec
    desc: Perl backticks with redirection
    crit: notable
    conf: 0.9
    attack: "T1059.006"
    if:
      type: text
      regex: '`[^`\n]{1,160}(2>&1|3>&1)[^`\n]{0,80}`'
    unless:
      - type: text
        substr: "xcrun --sdk macosx --show-sdk-path"
      - type: text
        substr: "cxxfilt --version 2>&1"
      - type: text
        substr: "NginxBinary -V 2>&1"
      - type: text
        substr: "$NGINX -V 2>&1"
composite_rules:
  - id: perl-shell-exec
    desc: Perl shell command execution
    crit: notable
    conf: 0.9
    any:
      - id: system-call
      - id: backticks-exec
