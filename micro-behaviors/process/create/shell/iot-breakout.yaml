defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.8
  for: [scripts]
traits:
  - id: iot-param-injection
    desc: Command injection characters in config-like strings
    crit: baseline
    if:
      type: text
      regex: '(?i)(ssid|pass|admin|user|key|config).{0,20}[;\|&`\$\(]'
  - id: fallback-dropper
    desc: Dropper with multi-utility fallback
    crit: suspicious
    if:
      type: text
      regex: '(?i)(wget|curl).{0,100}\|\|.{0,100}(tftp|echo)'
