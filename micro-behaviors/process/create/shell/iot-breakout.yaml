defaults:
  platforms: [unix, windows]
  crit: notable
  conf: 0.8
  for: [scripts]
traits:
- id: iot-param-injection--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(ssid|pass)\b\s*[:=].{0,20}[;\|&`\$\(]'
- id: iot-param-injection--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(admin|user)\b\s*[:=].{0,20}[;\|&`\$\(]'
- id: iot-param-injection--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(key|config)\b\s*[:=].{0,20}[;\|&`\$\(]'
- id: fallback-dropper
  desc: Dropper with multi-utility fallback
  crit: suspicious
  if:
    type: text
    regex: '(?i)(wget|curl).{0,100}\|\|.{0,100}(tftp|echo)'
  unless:
  - type: text
    substr: command -v curl >/dev/null 2>&1 || command -v wget
composite_rules:
- id: iot-param-injection
  desc: Command injection characters in config-like strings
  crit: notable
  conf: 1.0
  any:
  - id: iot-param-injection--rx-1
  - id: iot-param-injection--rx-2
  - id: iot-param-injection--rx-3
  needs: 1
  unless:
  - type: text
    regex: '\b(var|let|const)\s+\w*key\s*='
  - type: text
    regex: '\b(key|config)\s*:\s*(string|number|boolean|Buffer|any|Function|object)\s*;'
  - type: text
    regex: '\b[A-Za-z_][A-Za-z0-9_]*\s*=\s*[A-Za-z_][A-Za-z0-9_]*\s*;'
