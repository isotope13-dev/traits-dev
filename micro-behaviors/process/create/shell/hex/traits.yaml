defaults:
  attack: T1027
  mbc: B0032
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: hex-encoded-curl
    desc: Hex-encoded 'curl' command fragment
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: 6375726c
  - id: hex-encoded-wget
    desc: Hex-encoded 'wget' command fragment
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: '77676574'
  - id: hex-encoded-chmod
    desc: Hex-encoded 'chmod' command fragment
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: 63686d6f64
  - id: hex-encoded-sh
    desc: Hex-encoded 'sh' shell fragment
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: 2f62696e2f7368
  - id: hex-encoded-iptables
    desc: Hex-encoded iptables command fragment
    crit: notable
    conf: 0.82
    if:
      type: string_literal
      substr: 69707461626c6573
  - id: hex-encoded-uci-firewall
    desc: Hex-encoded UCI firewall command
    crit: notable
    conf: 0.84
    if:
      type: string_literal
      substr: 75636920736574206669726577616c6c
  - id: hex-encoded-root-crontab
    desc: Hex-encoded root crontab path
    crit: notable
    conf: 0.84
    if:
      type: string_literal
      substr: 2f6574632f63726f6e746162732f726f6f74
  - id: lua-hex-encoded-copy-command
    desc: Lua hex-encoded copy command
    crit: component
    conf: 0.86
    for: [lua]
    platforms: [windows]
    if:
      type: literal
      exact: 636f707920
