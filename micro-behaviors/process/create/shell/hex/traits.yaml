defaults:
  attack: T1027
  mbc: B0032
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
    - python
traits:
  - id: hex-encoded-curl
    desc: Hex-encoded 'curl' command fragment
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 6375726c
  - id: hex-encoded-wget
    desc: Hex-encoded 'wget' command fragment
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '77676574'
  - id: hex-encoded-chmod
    desc: Hex-encoded 'chmod' command fragment
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 63686d6f64
  - id: hex-encoded-sh
    desc: Hex-encoded 'sh' shell fragment
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: 2f62696e2f7368
