# Shell execution references in Mach-O binaries
# Detects compiled binaries referencing shell interpreters
defaults:
  platforms: [macos]
  for: [macho]
  crit: notable
  mbc: E1059.004
  attack: T1059.004
traits:
  - id: bin-zsh-binary
    desc: References /bin/zsh shell in binary
    conf: 0.8
    if:
      type: text
      substr: "/bin/zsh"
  - id: nstask-launch
    desc: NSTask/Process launch method
    conf: 0.8
    if:
      type: symbol
      exact: "launchAndReturnError:"
  - id: curl-cli-binary
    desc: Embedded curl command line in binary
    conf: 0.85
    attack: T1105
    if:
      type: text
      substr: "/usr/bin/curl -"
