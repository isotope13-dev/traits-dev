defaults:
  platforms:
    - unix
    - windows
  for:
    - scripts
    - source
    - pe
  crit: notable
  conf: 0.7
traits:
  - id: powershell-keyword
    desc: References PowerShell interpreter
    if:
      type: text
      word: powershell
      case_insensitive: true
    for: [scripts,-powershell,source,pe]
    unless:
      - id: metadata/binary/resource/
      - id: well-known/tool/development/fzf::fzf-binary
      - id: well-known/lib/monaco-editor/
      # Icon glyph catalogs (Codicon terminalPowershell), not interpreter use
      - type: text
        regex: '(?i)terminalPowershell|terminal-powershell'
  - id: powershell-caret-obfuscated
    desc: caret-obfuscated powershell keyword
    conf: 0.85
    if:
      type: text
      regex: (?i)p\^o\^?w\^?e\^?r\^?s\^?h\^?e\^?l\^?l
  - id: powershell-invocation
    desc: PowerShell invoked from shell or batch
    for: [shell, batch]
    if:
      type: text
      regex: (?i)\bpowershell(\.exe)?\s+[-/&;|]
  - id: powershell-command-fstring
    desc: Python builds PowerShell command f-string
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?i)\bf["''][^"''\r\n]{0,180}\bpowershell\b[^"''\r\n]{0,140}-Command\s+\{[A-Za-z_]\w*\}'
composite_rules:
  - id: powershell-executable-reference
    desc: PowerShell executable reference
    crit: notable
    conf: 0.5
    for: [batch, pe, python, javascript, vbs]
    near_bytes: 256
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: powershell-keyword
  - id: powershell-engine-markers
    desc: PowerShell engine identification markers
    any:
      - id: powershell-keyword
      - id: powershell-caret-obfuscated
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
