defaults:
  platforms:
    - unix
    - windows
  for:
    - scripts
    - source
    - pe
  crit: notable
  conf: 0.7
traits:
  - id: powershell-keyword
    desc: powershell keyword
    if:
      type: text
      word: powershell
      case_insensitive: true
    unless:
      - id: metadata/binary/resource/
      - id: well-known/tool/development/fzf::fzf-binary
  - id: powershell-caret-obfuscated
    desc: caret-obfuscated powershell keyword
    conf: 0.85
    if:
      type: text
      regex: (?i)p\^o\^?w\^?e\^?r\^?s\^?h\^?e\^?l\^?l
  - id: invoke-prefix
    desc: Invoke- prefix for cmdlets
    if:
      type: string_literal
      regex: \bInvoke-[A-Z][a-zA-Z]+
  - id: powershell-invocation
    desc: PowerShell invoked from shell or batch
    for: [shell, batch]
    if:
      type: text
      regex: (?i)\bpowershell(\.exe)?\s+[-/&;|]
composite_rules:
  - id: powershell-engine-markers
    desc: PowerShell engine identification markers
    any:
      - id: powershell-keyword
      - id: powershell-caret-obfuscated
      - id: invoke-prefix
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
