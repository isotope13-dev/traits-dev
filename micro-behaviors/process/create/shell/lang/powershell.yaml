# PowerShell Script Engine Patterns
# Detects markers for PowerShell execution
defaults:
  for: [all]
  crit: notable
  conf: 0.7
traits:
  - id: powershell-keyword
    desc: powershell keyword
    if:
      type: string
      word: "powershell"
      case_insensitive: true
    unless:
      - id: metadata/format/pe::resource-only-dll
  - id: powershell-caret-obfuscated
    desc: caret-obfuscated powershell keyword
    conf: 0.85
    if:
      type: raw
      regex: '(?i)p\^o\^?w\^?e\^?r\^?s\^?h\^?e\^?l\^?l'
  - id: invoke-prefix
    desc: Invoke- prefix for cmdlets
    if:
      type: string
      regex: '\bInvoke-[A-Z][a-zA-Z]+'
composite_rules:
  - id: powershell-engine-markers
    desc: PowerShell engine identification markers
    any:
      - id: powershell-keyword
      - id: powershell-caret-obfuscated
      - id: invoke-prefix
