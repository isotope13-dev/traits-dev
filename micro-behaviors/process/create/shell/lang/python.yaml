defaults:
  platforms:
    - unix
    - windows
  for:
    - python
traits:
  - id: python-download
    desc: Downloads file via PowerShell and
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: powershell.{0,50}curl\.exe.{0,30}-o
  - id: python-start-process-dup
    desc: Executes process via PowerShell Start-Process
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: powershell.{0,50}Start-Process
    unless:
      - id: metadata/file/format::sourcemap-sources-content
  - id: masq-realtek
    desc: Masquerades as Realtek audio process
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: RealtekHDAudio
  - id: masq-windowsupdate
    desc: Masquerades as Windows Update process
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: WindowsUpdate
  - id: masq-lsass
    desc: Masquerades as lsass process
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: lsass
    unless:
      - type: text
        substr: SYSTEM_CRITICAL_NAMES
  - id: masq-svchost
    desc: Masquerades as svchost process
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: svchost
    unless:
      - type: text
        substr: SYSTEM_CRITICAL_NAMES
composite_rules:
  - id: system-masquerade
    desc: Masquerades as system process
    crit: notable
    conf: 0.8
    any:
      - id: masq-realtek
      - id: masq-windowsupdate
      - id: masq-lsass
      - id: masq-svchost
  - id: powershell-dropper
    desc: PowerShell-based dropper (Download + Execute)
    crit: suspicious
    conf: 0.98
    attack: T1059.001
    mbc: E1059 - python
    all:
      - id: python-download
      - id: micro-behaviors/process/create/shell/lang::python-start-process-dup
      - id: system-masquerade
