defaults:
  platforms:
    - unix
    - windows
  for:
    - ruby
traits:
  - id: ruby-exec
    desc: exec() replaces current process
    crit: notable
    conf: 0.95
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'exec'
  - id: ruby-system-dup
    desc: system() executes command
    crit: notable
    conf: 0.95
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'system'
  - id: ruby-system-download-command
    desc: Ruby system downloader command
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bsystem\s*\(.{0,80}(curl|wget)\b'
  - id: ruby-system-shell-interpreter
    desc: Ruby system shell interpreter
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bsystem\s*\(.{0,80}(\bsh\b|bash|zsh|shell)'
  - id: ruby-spawn
    desc: spawn() creates new process
    crit: notable
    conf: 0.9
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'spawn'
  - id: ruby-popen
    desc: popen pipes to/from command
    crit: notable
    conf: 0.92
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'popen'
  - id: ruby-backtick
    desc: Backtick command execution
    crit: notable
    conf: 0.93
    if:
      type: symbol
      regex: '`|%x'
  - id: ruby-backtick-command-substitution
    desc: Ruby backtick command substitution
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?m)^\s{0,40}[A-Za-z_][A-Za-z0-9_]{0,40}\s*=\s*`.{1,160}`'
  - id: ruby-shell-exec
    desc: Shell execution via exec
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: exec.{0,50}bin/sh|exec.{0,50}bin/shell
composite_rules:
  - id: ruby-shell-exec-imports
    desc: Ruby shell command execution pattern
    crit: notable
    conf: 0.7
    any:
      - id: metadata/import/ruby::open3
      - id: ruby-system-dup
      - id: ruby-backtick
      - id: ruby-popen
  - id: ruby-system-shell-command
    desc: Ruby system shell command
    crit: notable
    conf: 0.86
    any:
      - id: ruby-system-download-command
      - id: ruby-system-shell-interpreter
