defaults:
  for:
    - oledoc
    - ooxml
  platforms:
    - windows
    - macos
  crit: notable
  conf: 0.88
traits:
  - id: createobject-call-universal
    desc: VBA CreateObject invocation
    if:
      type: text
      regex: (?i)\bCreateObject\b
  - id: wait-method-call
    desc: Office wait method call
    if:
      type: text
      exact: Wait
  - id: timevalue-delay-call
    desc: TimeValue delay construction
    if:
      type: text
      exact: TimeValue
  - id: oleformat-access
    desc: OLEFormat object access
    if:
      type: text
      regex: (?i)\bOLEFormat\b
  - id: classtype-access
    desc: OLE ClassType inspection
    if:
      type: text
      regex: (?i)\bClassType\b
  - id: package-class-marker
    desc: Embedded package class marker
    if:
      type: text
      exact: Package
  - id: open-no-repair-dialog
    desc: Silent document open dialog
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?i)\bOpenNoRepairDialog\b
  - id: password-document-parameter
    desc: Password-protected document parameter
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?i)\bPasswordDocument\b
  - id: temp-environ-access
    desc: TEMP environment lookup
    if:
      type: text
      regex: (?i)\bEnviron\s*\(\s*["'](TEMP|TMP)["']\s*\)
  - id: embedded-docm-name
    desc: Embedded DOCM payload name
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: (?i)\b[A-Za-z0-9_-]+\.docm\b
  - id: second-stage-macro-name
    desc: Hardcoded second-stage macro
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: CommentAddReportSummary
  - id: split-string-call
    desc: Split string reconstruction
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: (?i)\bSplit\s*\(
  - id: right-string-call
    desc: Right string trimming
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: (?i)\bRight\s*\(
composite_rules:
  - id: office-vba-delay-loop
    desc: Office VBA delay loop
    crit: suspicious
    conf: 0.95
    all:
      - id: createobject-call-universal
      - id: wait-method-call
      - id: timevalue-delay-call
  - id: office-vba-embedded-ole-extract
    desc: Office VBA embedded OLE extract
    crit: suspicious
    conf: 0.96
    all:
      - id: oleformat-access
      - id: classtype-access
      - id: package-class-marker
  - id: office-vba-open-encrypted-document
    desc: Office VBA encrypted document open
    crit: suspicious
    conf: 0.96
    all:
      - id: open-no-repair-dialog
      - id: password-document-parameter
      - id: embedded-docm-name
  - id: office-vba-string-fragmentation
    desc: Office VBA string fragmentation
    crit: suspicious
    conf: 0.9
    all:
      - id: split-string-call
      - id: right-string-call
    any:
      - id: autoopen-entrypoint
      - id: createobject-call-universal
      - id: temp-environ-access
      - id: oleformat-access
      - id: open-no-repair-dialog
