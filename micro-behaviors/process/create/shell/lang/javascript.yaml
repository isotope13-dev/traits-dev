# Command Execution - JavaScript/Node.js
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: js-execsync
    desc: Executes shell commands synchronously
    crit: notable
    conf: 1.0
    if:
      type: symbol
      exact: "execSync"
  - id: js-exec
    desc: Executes shell commands
    crit: notable
    conf: 1.0
    if:
      type: symbol
      exact: "exec"
    unless:
      - type: string_value
        substr: "@ioredis/commands"
      - type: string_value
        substr: "redis-commands"
      - type: string_value
        substr: "EXECABORT"
  - id: js-spawn
    desc: Spawns a child process
    crit: notable
    conf: 1.0
    if:
      type: ast
      kind: call
      exact: "spawn"
  - id: js-cmd-start
    desc: Launches cmd via start
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: 'start\s+cmd'
  - id: js-terminal-launch
    desc: Launches Linux terminal emulator
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: "gnome-terminal|x-terminal-emulator|xfce4-terminal"
  - id: js-bun-exec
    desc: Executes bun command
    crit: notable
    conf: 0.8
    if:
      type: string_value
      word: "bun"
