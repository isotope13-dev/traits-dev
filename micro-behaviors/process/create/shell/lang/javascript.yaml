defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: js-execsync
    desc: Executes shell commands synchronously
    crit: notable
    conf: 1.0
    unless:
      - type: basename
        regex: \.map$
      - type: basename
        exact: windowsPtyAgent.js
      - type: text
        substr: require('../common')
    if:
      type: symbol
      exact: execSync
  - id: js-exec
    desc: Executes shell commands
    crit: notable
    conf: 1.0
    if:
      type: symbol
      exact: exec
    unless:
      - type: text
        substr: -module(
      - type: string_literal
        substr: '@ioredis/commands'
      - type: string_literal
        substr: redis-commands
      - type: string_literal
        substr: EXECABORT
  - id: js-spawn
    desc: Spawns a child process
    crit: notable
    conf: 1.0
    if:
      type: ast
      kind: call
      exact: spawn
  - id: js-cmd-start
    desc: Launches cmd via start
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: start\s+cmd
  - id: js-terminal-launch
    desc: Launches Linux terminal emulator
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: gnome-terminal|x-terminal-emulator|xfce4-terminal
  - id: js-bun-exec
    desc: Executes bun command
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      word: bun
