defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: python-c-flag
    desc: Python inline command launch
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      query: |
        ((call
          function: (attribute
            object: (identifier) @module
            attribute: (identifier) @method)
          arguments: (argument_list
            (list
              (string) @interpreter
              (string) @flag)))
         (#eq? @module "subprocess")
         (#match? @method "^(run|Popen|call|check_call|check_output)$")
         (#match? @interpreter "^['\"]python(3(\\.\\d+)?)?['\"]$")
         (#match? @flag "^['\"]-c['\"]$"))
        ((call
          function: (attribute
            object: (identifier) @module
            attribute: (identifier) @method)
          arguments: (argument_list
            (string) @command))
         (#match? @module "^(os|subprocess)$")
         (#match? @method "^(system|run|Popen|call|check_call|check_output)$")
         (#match? @command "(?i)python(3(\\.\\d+)?)?\\s+['\"]?-c\\b"))

  - id: python3-inline-command
    desc: Python 3 inline command launch
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      query: |
        ((call
          function: (attribute
            object: (identifier) @module
            attribute: (identifier) @method)
          arguments: (argument_list
            (list
              (string) @interpreter
              (string) @flag)))
         (#eq? @module "subprocess")
         (#match? @method "^(run|Popen|call|check_call|check_output)$")
         (#match? @interpreter "^['\"]python3(\\.\\d+)?['\"]$")
         (#match? @flag "^['\"]-c['\"]$"))
