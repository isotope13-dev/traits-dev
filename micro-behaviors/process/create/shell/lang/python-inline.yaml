defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: python-c-flag
    desc: Python interpreter inline-command flag
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bpython(3(\.\d+)?)?\s+["'']?-c["'']?\b'

  - id: python3-inline-command
    desc: Python subprocess inline command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'subprocess\.run\s*\(\s*\[\s*["'']python3["'']\s*,\s*["'']-c["'']'
