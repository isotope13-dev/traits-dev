defaults:
  for:
    - vbs
  platforms:
    - windows
  crit: notable
  conf: 0.85
traits:
  - id: interaction-identifier
    desc: VB Interaction identifier
    crit: component
    conf: 0.93
    if:
      type: string_value
      exact: Interaction
composite_rules:
  - id: textbox-backed-shell
    desc: Shell launched from textbox
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/document/office/macro::word-vba-project
      - id: metadata/document/office/macro::forms-textbox-payload-surface
      - id: micro-behaviors/process/create/shell::cmd-slash-c
      - id: interaction-identifier
