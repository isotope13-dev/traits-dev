defaults:
  for: [all]
  platforms: [windows]
  crit: notable
  conf: 0.85
traits:
  - id: interaction-identifier
    desc: VB Interaction identifier
    crit: component
    conf: 0.93
    if:
      type: string
      exact: "Interaction"
composite_rules:
  - id: textbox-backed-shell
    desc: Shell launched from textbox
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/format/document/office::word-vba-project
      - id: metadata/format/document/office::forms-textbox-payload-surface
      - id: micro-behaviors/process/create/shell::cmd-slash-c
      - id: interaction-identifier
