defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  attack: T1059
traits:
  - id: child-process-require-call
    desc: require child_process import
    crit: notable
    conf: 0.8
    mbc: C0017
    if:
      type: raw
      regex: require\(\s*["'](node:)?child_process["']\s*\)
  - id: child-process-import-runtime
    desc: Runtime child_process import
    crit: notable
    conf: 0.75
    mbc: C0017
    if:
      type: raw
      regex: \bimport\s+[^;\n]{1,80}from\s+["'](node:)?child_process["']
    unless:
      - type: raw
        substr: import type
  - id: exec-call
    desc: exec() function call (Python/JavaScript)
    crit: notable
    conf: 0.85
    mbc: C0017
    for:
      - python
      - javascript
      - typescript
    if:
      type: ast
      kind: call
      exact: exec
  - id: spawn-call
    desc: spawn() function call
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: spawn(
  - id: execSync-call
    desc: Node.js synchronous exec
    crit: notable
    conf: 0.85
    mbc: C0017
    if:
      type: ast
      kind: call
      exact: child_process.execSync
  - id: execSync-compiled
    desc: Compiled TypeScript execSync invocation
    crit: notable
    conf: 0.85
    mbc: C0017
    if:
      type: raw
      regex: 'child_process_\d+\.execSync'
  - id: getExecOutput
    desc: Node.js exec output capture (GitHub Actions)
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: getExecOutput
  - id: silent-true
    desc: Silent execution flag (hides output)
    crit: notable
    conf: 0.85
    mbc: F0005
    if:
      type: string_value
      regex: silent:\s*true
composite_rules:
  - id: child-process-require
    desc: Node.js child_process module import
    crit: notable
    conf: 0.8
    mbc: C0017
    any:
      - id: child-process-require-call
      - id: child-process-import-runtime
  - id: child-process-exec
    desc: Node.js child_process execution
    crit: notable
    conf: 0.85
    mbc: C0017
    any:
      - id: exec-call
      - id: spawn-call
      - id: execSync-call
      - id: execSync-compiled
      - id: getExecOutput
