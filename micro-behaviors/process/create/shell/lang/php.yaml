# PHP Command Execution Traits
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059.004 (Unix Shell)
defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  mbc: "E1059"
  attack: "T1059.004"
traits:
- id: exec-dup
  desc: Shell command execution via exec()
  conf: 0.95
  if:
    type: symbol
    kind: call
    exact: "exec"

- id: shell-exec
  desc: Shell command execution via shell_exec()
  conf: 0.95
  if:
    type: symbol
    kind: call
    exact: "shell_exec"

- id: system
  desc: Shell command execution via system()
  conf: 0.95
  if:
    type: symbol
    kind: call
    exact: "system"

- id: passthru
  desc: Shell command execution via passthru()
  conf: 0.95
  if:
    type: symbol
    kind: call
    exact: "passthru"

- id: popen
  desc: Process open via popen()
  conf: 0.9
  if:
    type: symbol
    kind: call
    exact: "popen"

- id: proc-open
  desc: Process execution via proc_open()
  conf: 0.9
  if:
    type: symbol
    kind: call
    exact: "proc_open"

- id: pcntl-exec
  desc: Direct process execution via pcntl_exec()
  conf: 0.95
  attack: "T1059"
  if:
    type: symbol
    kind: call
    exact: "pcntl_exec"

- id: backtick
  desc: Shell command execution via backticks
  conf: 0.9
  size_max: 500000
  if:
    type: tree-sitter
    node: shell_command_expression
    regex: ".{1,120}"

- id: exec-user-input-func-core
  desc: Variable input reaches core exec functions
  conf: 0.9
  if:
    type: text
    regex: \b(exec|system|shell_exec)\s*\(\s*\$
  unless:
  - id: metadata/package/quality::php-empty-function-declarations
  - id: metadata/package/fields/compat::php-manual-empty-function-stubs

- id: exec-user-input-func-alt
  desc: Variable input reaches alt exec functions
  conf: 0.9
  if:
    type: text
    regex: \b(passthru|popen)\s*\(\s*\$
  unless:
  - id: metadata/package/quality::php-empty-function-declarations
  - id: metadata/package/fields/compat::php-manual-empty-function-stubs

- id: exec-user-input-get
  desc: User input from $_GET
  conf: 0.85
  if:
    type: tree-sitter
    query: "((function_call_expression\n  function: (name) @func\n  arguments: (arguments (_) @arg)\n)\n(#match? @func \"^(exec|system|shell_exec|passthru|popen|proc_open)$\")\n(#match? @arg \"\\$_GET\"))\n"

- id: exec-user-input-post
  desc: User input from $_POST
  conf: 0.85
  if:
    type: tree-sitter
    query: "((function_call_expression\n  function: (name) @func\n  arguments: (arguments (_) @arg)\n)\n(#match? @func \"^(exec|system|shell_exec|passthru|popen|proc_open)$\")\n(#match? @arg \"\\$_POST\"))\n"

- id: exec-user-input-request
  desc: User input from $_REQUEST
  conf: 0.85
  if:
    type: tree-sitter
    query: "((function_call_expression\n  function: (name) @func\n  arguments: (arguments (_) @arg)\n)\n(#match? @func \"^(exec|system|shell_exec|passthru|popen|proc_open)$\")\n(#match? @arg \"\\$_REQUEST\"))\n"
- id: exec-user-input-get-text--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(exec|system)\s*\(\s*\$_GET\s*\[[^\]]{1,80}\]'
  count_max: 1004423
- id: exec-user-input-get-text--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(shell_exec|passthru)\s*\(\s*\$_GET\s*\[[^\]]{1,80}\]'
  count_max: 1004424
- id: exec-user-input-get-text--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(popen|proc_open)\s*\(\s*\$_GET\s*\[[^\]]{1,80}\]'
  count_max: 1004425
- id: shell-stderr-redirect
  desc: Shell stderr redirected to stdout
  conf: 0.85
  if:
    type: string_literal
    exact: ' 2>&1'

composite_rules:
- id: exec-user-input-source
  desc: User input from PHP request superglobals
  conf: 0.85
  any:
  - id: exec-user-input-get
  - id: exec-user-input-post
  - id: exec-user-input-request
  - id: exec-user-input-get-text

- id: exec-user-input-func
  desc: User input reaches command functions
  conf: 0.9
  any:
  - id: exec-user-input-func-core
  - id: exec-user-input-func-alt

- id: exec-user-input
  desc: Command execution with user input
  crit: suspicious
  conf: 0.9
  all:
  - id: exec-user-input-source
  - id: exec-user-input-func
- id: exec-user-input-get-text
  desc: GET input reaches command execution
  crit: baseline
  conf: 0.92
  any:
  - id: exec-user-input-get-text--rx-1
  - id: exec-user-input-get-text--rx-2
  - id: exec-user-input-get-text--rx-3
  unless:
  - id: metadata/package/quality::php-empty-function-declarations
  - id: metadata/package/fields/compat::php-manual-empty-function-stubs
