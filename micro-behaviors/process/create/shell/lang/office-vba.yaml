defaults:
  for:
    - documents
  platforms:
    - windows
    - macos
traits:
  - id: createobject-call
    desc: VBA CreateObject call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)CreateObject\(
  - id: autoopen-entrypoint
    desc: VBA AutoOpen style entrypoint
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)(AutoOpen|Workbook_Open|Document_Open)
  - id: wscript-shell-object
    desc: VBA WScript.Shell object
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: (?i)wscript\s*\.\s*shell|wsc.?ript\.s.?hell
  - id: textbox-run-payload
    desc: VBA textbox-backed Run call
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: (?is)\.Run!\([^)]{0,120}TextBox[0-9]{1,2}
  - id: comspec-batch-stager
    desc: VBA COMSPEC batch stager
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)%COMSPEC%\s*/c.{0,80}/v:'
  - id: multi-url-download-list
    desc: Multiple hardcoded payload URLs
    crit: notable
    conf: 0.94
    for:
      - ooxml
      - oledoc
    count_min: 3
    if:
      type: raw
      regex: https?://[A-Za-z0-9._,-]{4,120}/[A-Za-z0-9_/?;=@\[\]\-]{1,120}
    not:
      - regex: https?://www\.w3\.org/
      - regex: https?://ns\.adobe\.com/
      - regex: https?://purl\.org/
      - regex: https?://developer\.microsoft\.com/
      - regex: https?://www\.microsoft\.com/pkiops/
      - regex: https?://schemas\.microsoft\.com/
      - regex: https?://[a-z]+\.microsoft\.com/ocsp
      - regex: https?://ocsp\.digicert\.com
      - regex: https?://cacerts\.digicert\.com/
      - regex: https?://crl[0-9]+\.digicert\.com/
      - regex: https?://(ocsp|crl|crt)\.(comodoca|sectigo)\.com
      - regex: https?://(ocsp|crl|secure)\.globalsign\.com/
      - regex: https?://www\.(digicert|globalsign)\.com/
      - regex: https?://sectigo\.com/CPS
      - regex: https?://[a-z0-9.-]*symcb\.com/
      - regex: https?://www\.thawte\.com/
      - regex: https?://[a-z0-9.-]*symantec\.com/
      - regex: https?://example\.com/\?foo=1
      - regex: https?://www\.imdb\.com/title/
      - substr: application/x-executableelfapplication/vnd.microsoft.portable-executabledll
      - regex: https?://github\.com/tauri-apps/tauri/
      - substr: "tauri::"
    unless:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: metadata/file/text/format::gettext-po-catalog
      - type: basename
        regex: '(?i)\.pot$'
      - type: raw
        substr: "app-launcher/index.html"
  - id: public-exe-drop-path
    desc: Obfuscated Public EXE drop path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)\$env:pu.?bli.?[^\\r\\n]{0,80}\.exe
  - id: powershell-encoded-flag-junked
    desc: PowerShell encoded flag with junk
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: (?i)(powershell|pwsh).{0,40}-(enc|encodedcommand)
  - id: msiexec-quiet-install
    desc: VBA msiexec quiet install command
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: (?i)msiexec(.{0,32})/q
