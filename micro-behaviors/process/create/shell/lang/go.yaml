defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [go, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: exec-cmd-start
    desc: exec.(*Cmd).Start reference
    conf: 0.4
    if:
      type: symbol
      exact: exec.(*Cmd).Start
  - id: exec-cmd-run
    desc: exec.(*Cmd).Run reference
    conf: 0.4
    if:
      type: symbol
      exact: exec.(*Cmd).Run
  - id: stdin-pipe
    desc: StdinPipe reference
    conf: 0.5
    if:
      type: text
      substr: StdinPipe
  - id: stdout-pipe
    desc: StdoutPipe reference
    conf: 0.4
    if:
      type: text
      substr: StdoutPipe
  - id: stderr-pipe
    desc: StderrPipe reference
    conf: 0.4
    if:
      type: text
      substr: StderrPipe
  - id: stdin-redirect
    desc: Direct stdin redirection
    conf: 0.6
    if:
      type: text
      substr: Stdin =
  - id: stdout-redirect
    desc: Direct stdout redirection
    conf: 0.6
    if:
      type: text
      substr: Stdout =
  - id: stderr-redirect-dup
    desc: Direct stderr redirection
    conf: 0.6
    if:
      type: text
      substr: Stderr =
composite_rules:
  - id: pipe-redirection
    desc: Go pipe redirection
    any:
      - id: stdin-pipe
      - id: stdout-pipe
      - id: stderr-pipe
      - id: stdin-redirect
      - id: stdout-redirect
      - id: micro-behaviors/process/create/shell/lang::stderr-redirect-dup
