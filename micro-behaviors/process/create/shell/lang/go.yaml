defaults:
  platforms: [unix, windows, macos]
  for: [go, elf, macho, pe]
  crit: notable
  conf: 0.7
traits:
  - id: exec-cmd-start
    desc: exec.(*Cmd).Start reference
    conf: 0.4
    if:
      type: raw
      substr: exec.(*Cmd).Start
  - id: exec-cmd-run
    desc: exec.(*Cmd).Run reference
    conf: 0.4
    if:
      type: raw
      substr: exec.(*Cmd).Run
  - id: stdin-pipe
    desc: StdinPipe reference
    conf: 0.5
    if:
      type: string_value
      substr: StdinPipe
  - id: stdout-pipe
    desc: StdoutPipe reference
    conf: 0.4
    if:
      type: string_value
      substr: StdoutPipe
  - id: stderr-pipe
    desc: StderrPipe reference
    conf: 0.4
    if:
      type: string_value
      substr: StderrPipe
  - id: stdin-redirect
    desc: Direct stdin redirection
    conf: 0.6
    if:
      type: string_value
      substr: Stdin =
  - id: stdout-redirect
    desc: Direct stdout redirection
    conf: 0.6
    if:
      type: string_value
      substr: Stdout =
  - id: stderr-redirect-dup
    desc: Direct stderr redirection
    conf: 0.6
    if:
      type: string_value
      substr: Stderr =
composite_rules:
  - id: pipe-redirection
    desc: Go pipe redirection
    any:
      - id: stdin-pipe
      - id: stdout-pipe
      - id: stderr-pipe
      - id: stdin-redirect
      - id: stdout-redirect
      - id: micro-behaviors/process/create/shell/lang::stderr-redirect-dup
