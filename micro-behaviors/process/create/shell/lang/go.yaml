defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [go, elf, macho, pe]
  crit: notable
  conf: 0.7
traits:
- id: exec-cmd-start
  desc: exec.(*Cmd).Start reference
  conf: 0.4
  if:
    type: symbol
    regex: (^|/)exec\.\(\*Cmd\)\.Start$
- id: io-pipe
  desc: io.(*pipe).CloseWrite reference
  conf: 0.55
  if:
    type: symbol
    exact: io.(*pipe).CloseWrite
- id: exec-cmd-run
  desc: exec.(*Cmd).Run reference
  conf: 0.4
  if:
    type: symbol
    exact: exec.(*Cmd).Run
- id: stdin-pipe
  desc: StdinPipe reference
  conf: 0.5
  if:
    type: text
    substr: StdinPipe
- id: stdout-pipe
  desc: StdoutPipe reference
  conf: 0.4
  if:
    type: text
    substr: StdoutPipe
- id: stderr-pipe
  desc: StderrPipe reference
  conf: 0.4
  if:
    type: text
    substr: StderrPipe
- id: stdio-redirect
  desc: Direct stdio redirection
  conf: 0.6
  if:
    type: text
    regex: 'Std(in|out|err)\s*='
- id: shell-fallback-paths--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: /bin/(zsh|ksh).{0,24}/bin/(zsh|ksh|csh)
- id: shell-fallback-paths--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: /bin/(csh).{0,24}/bin/(zsh|ksh|csh)
composite_rules:
- id: pipe-redirection
  desc: Go pipe redirection
  any:
  - id: stdin-pipe
  - id: stdout-pipe
  - id: stderr-pipe
  - id: stdio-redirect
- id: go-piped-shell-wrapper
  desc: Go decoder piped into shell
  crit: suspicious
  conf: 0.92
  all:
  - id: exec-cmd-start
  - id: io-pipe
  - id: pipe-redirection
  - id: shell-fallback-paths
- id: shell-fallback-paths
  desc: Multiple shell fallback paths
  crit: component
  conf: 0.86
  any:
  - id: shell-fallback-paths--rx-1
  - id: shell-fallback-paths--rx-2
  needs: 1
