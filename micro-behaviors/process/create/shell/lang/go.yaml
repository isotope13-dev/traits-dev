defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [go, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: exec-cmd-start
    desc: exec.(*Cmd).Start reference
    conf: 0.4
    if:
      type: symbol
      regex: (^|/)exec\.\(\*Cmd\)\.Start$
  - id: io-pipe
    desc: io.(*pipe).CloseWrite reference
    conf: 0.55
    if:
      type: symbol
      exact: io.(*pipe).CloseWrite
  - id: exec-cmd-run
    desc: exec.(*Cmd).Run reference
    conf: 0.4
    if:
      type: symbol
      exact: exec.(*Cmd).Run
  - id: stdin-pipe
    desc: StdinPipe reference
    conf: 0.5
    if:
      type: text
      substr: StdinPipe
  - id: stdout-pipe
    desc: StdoutPipe reference
    conf: 0.4
    if:
      type: text
      substr: StdoutPipe
  - id: stderr-pipe
    desc: StderrPipe reference
    conf: 0.4
    if:
      type: text
      substr: StderrPipe
  - id: stdin-redirect
    desc: Direct stdin redirection
    conf: 0.6
    if:
      type: text
      substr: Stdin =
  - id: stdout-redirect
    desc: Direct stdout redirection
    conf: 0.6
    if:
      type: text
      substr: Stdout =
  - id: stderr-redirect-dup
    desc: Direct stderr redirection
    conf: 0.6
    if:
      type: text
      substr: Stderr =
  - id: shell-fallback-paths
    desc: Multiple shell fallback paths
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: /bin/(zsh|ksh|csh).{0,24}/bin/(zsh|ksh|csh)
composite_rules:
  - id: pipe-redirection
    desc: Go pipe redirection
    any:
      - id: stdin-pipe
      - id: stdout-pipe
      - id: stderr-pipe
      - id: stdin-redirect
      - id: stdout-redirect
      - id: micro-behaviors/process/create/shell/lang::stderr-redirect-dup
  - id: go-piped-shell-wrapper
    desc: Go decoder piped into shell
    crit: suspicious
    conf: 0.92
    all:
      - id: exec-cmd-start
      - id: io-pipe
      - id: pipe-redirection
      - id: shell-fallback-paths
