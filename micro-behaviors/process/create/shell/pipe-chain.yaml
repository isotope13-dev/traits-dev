# Shell Pipe Chains
# Detects excessive piping or complex redirections in shell commands (stealth signal).
defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: excessive-pipes
    desc: Command with excessive pipe chaining (4+ pipes)
    crit: notable
    conf: 0.8
    unless:
      - type: basename
        regex: '\.(css|html?|js)$'
      - type: basename
        regex: '\.(json|md|php)$'
      - type: basename
        regex: '\.(py|pyc|pyi)$'
      - type: basename
        regex: '\.(txt|xml)$'
      - type: basename
        regex: '(^|[\\/])(configure|config\.(guess|sub))$'
    if:
      type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
      regex: '(?m)\b(cat|grep|awk|sed|cut|sort|uniq|tr|base64|curl|wget|sh|bash|python|perl|ruby|php|nc|netcat)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

  - id: complex-redirection-chain
    desc: Command with complex redirection and piping
    crit: notable
    conf: 0.75
    unless:
      - type: basename
        regex: '\.(css|html?|js)$'
      - type: basename
        regex: '\.(json|md|php)$'
      - type: basename
        regex: '\.(py|pyc|pyi)$'
      - type: basename
        regex: '\.(txt|xml)$'
      - type: basename
        regex: '(^|[\\/])(configure|config\.(guess|sub))$'
    if:
      type: text
      # Matches combinations of single pipes and redirections
      regex: '(?m)\b(cat|grep|awk|sed|cut|sort|uniq|tr|base64|curl|wget|sh|bash|python|perl|ruby|php|nc|netcat)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1|2>&1[^\n|]{0,160}\|[^\n|]{1,160}'

  - id: shell-null-redirection
    desc: Shell command with heavy /dev/null redirection (stealth)
    crit: notable
    conf: 0.8
    unless:
      - type: basename
        regex: '\.(css|html?|js)$'
      - type: basename
        regex: '\.(json|md|php)$'
      - type: basename
        regex: '\.(py|pyc|pyi)$'
      - type: basename
        regex: '\.(txt|xml)$'
      - type: basename
        regex: '(^|[\\/])(configure|config\.(guess|sub))$'
    if:
      type: text
      regex: '>/dev/null\s+2>&1|2>&1\s+>/dev/null'

composite_rules:
  - id: stealth-shell-chain
    desc: Stealthy shell command chain with multiple pipes and concealment
    crit: suspicious
    conf: 0.9
    all:
      - id: shell-null-redirection
    any:
      - id: excessive-pipes
      - id: complex-redirection-chain
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/signed/platform::microsoft
