# Shell Pipe Chains
# Detects excessive piping or complex redirections in shell commands (stealth signal).
defaults:
  platforms: [unix]
  for: [shell, scripts]
traits:
  - id: excessive-pipes
    desc: Command with excessive pipe chaining (4+ pipes)
    crit: suspicious
    conf: 0.8
    unless:
      - type: basename
        regex: '\.(py|pyc|pyi)$'
    if:
      type: text
      # Matches commands with 4 or more SINGLE pipes in a single line
      # Avoids || by requiring at least one non-pipe character after each |
      # Using bounded quantifier {1,160} to satisfy validation
      regex: '(?:\|[^|]{1,160}){4,}'

  - id: complex-redirection-chain
    desc: Command with complex redirection and piping
    crit: notable
    conf: 0.75
    unless:
      - type: basename
        regex: '\.(py|pyc|pyi)$'
    if:
      type: text
      # Matches combinations of single pipes and redirections
      regex: '\|[^|]{1,160}>.{0,160}2>&1|2>&1.{0,160}\|[^|]{1,160}'

  - id: shell-null-redirection
    desc: Shell command with heavy /dev/null redirection (stealth)
    crit: notable
    conf: 0.8
    unless:
      - type: basename
        regex: '\.(py|pyc|pyi)$'
    if:
      type: text
      regex: '>/dev/null\s+2>&1|2>&1\s+>/dev/null'

composite_rules:
  - id: stealth-shell-chain
    desc: Stealthy shell command chain with multiple pipes and concealment
    crit: suspicious
    conf: 0.9
    all:
      - id: shell-null-redirection
    any:
      - id: excessive-pipes
      - id: complex-redirection-chain
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/signed/platform::microsoft
