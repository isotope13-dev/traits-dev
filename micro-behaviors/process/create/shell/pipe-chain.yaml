# Shell Pipe Chains
# Detects excessive piping or complex redirections in shell commands (stealth signal).
defaults:
  platforms: [unix]
  for: [shell]
traits:
- id: excessive-pipes--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(cat|grep)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(awk|sed)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(cut|sort)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(uniq|tr)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(base64|curl)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(wget|sh)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(bash|python)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(perl|ruby)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(php|nc)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: excessive-pipes--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
      # Command-like line with 4+ pipes; avoids ASCII tables, CSS vars, and encoded alphabets.
    regex: '(?m)\b(netcat)\b[^\n|]{0,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|[^\n|]{1,120}\|'

- id: complex-redirection-chain--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(cat|grep)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(awk|sed)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(cut|sort)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(uniq|tr)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(base64|curl)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(wget|sh)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(bash|python)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(perl|ruby)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(php|nc)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '(?m)\b(netcat)\b[^\n|]{0,160}\|[^\n|]{0,160}>[^\n|]{0,160}2>&1'

- id: complex-redirection-chain--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
      # Matches combinations of single pipes and redirections
    regex: '2>&1[^\n|]{0,160}\|[^\n|]{1,160}'

- id: shell-null-redirection
  desc: Shell command suppresses output
  crit: notable
  conf: 0.8
  unless:
  - id: metadata/package/testing/presence::linux-kselftest-shell
  - id: metadata/package/tooling::libtool-generated-script
  - id: metadata/package/tooling::ssh-copy-id-utility
  - type: basename
    regex: '\.(css|html?|js|json)$'
  - type: basename
    regex: '\.(md|php|txt|xml)$'
  - type: basename
    regex: '\.(pyi?|pyc)$'
  - type: basename
    regex: '(^|[\\/])(configure|config\.(guess|sub))$'
  if:
    type: text
    regex: '>/dev/null\s+2>&1|2>&1\s+>/dev/null'

- id: stealth-pipe-command--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: '>/dev/null'
- id: stealth-pipe-command--rx-23
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: base64
- id: stealth-pipe-command--rx-24
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: netcat
- id: stealth-pipe-command--rx-25
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: python
- id: stealth-pipe-command--rx-26
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: bash
- id: stealth-pipe-command--rx-27
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: curl
- id: stealth-pipe-command--rx-28
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: grep
- id: stealth-pipe-command--rx-29
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: perl
composite_rules:
- id: shell-null-and-excessive-pipes
  desc: Shell command with both null redirection and excessive pipes
  crit: notable
  conf: 0.8
  all:
  - id: micro-behaviors/process/create/shell::shell-null-redirection
  - id: micro-behaviors/process/create/shell::excessive-pipes

- id: stealth-shell-chain
  desc: Stealthy shell command chain with multiple pipes and concealment
  crit: suspicious
  conf: 0.8
  unless:
  - id: metadata/package/testing/presence::linux-kselftest-shell
  any:
  - id: micro-behaviors/process/create/shell::stealth-pipe-command
  - id: micro-behaviors/process/create/shell::shell-null-and-excessive-pipes
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: metadata/signed/platform::microsoft
- id: excessive-pipes
  desc: Command with excessive pipe chaining (4+ pipes)
  crit: notable
  conf: 0.8
  any:
  - id: excessive-pipes--rx-1
  - id: excessive-pipes--rx-2
  - id: excessive-pipes--rx-3
  - id: excessive-pipes--rx-4
  - id: excessive-pipes--rx-5
  - id: excessive-pipes--rx-6
  - id: excessive-pipes--rx-7
  - id: excessive-pipes--rx-8
  - id: excessive-pipes--rx-9
  - id: excessive-pipes--rx-10
  needs: 1
  unless:
  - id: metadata/package/testing/presence::linux-kselftest-shell
  - id: metadata/package/tooling::libtool-generated-script
  - type: basename
    regex: '\.(css|html?|js|json)$'
  - type: basename
    regex: '\.(md|php|txt|xml)$'
  - type: basename
    regex: '\.(pyi?|pyc)$'
  - type: basename
    regex: '(^|[\\/])(configure|config\.(guess|sub))$'
- id: complex-redirection-chain
  desc: Command with complex redirection and piping
  crit: notable
  conf: 0.75
  any:
  - id: complex-redirection-chain--rx-11
  - id: complex-redirection-chain--rx-12
  - id: complex-redirection-chain--rx-13
  - id: complex-redirection-chain--rx-14
  - id: complex-redirection-chain--rx-15
  - id: complex-redirection-chain--rx-16
  - id: complex-redirection-chain--rx-17
  - id: complex-redirection-chain--rx-18
  - id: complex-redirection-chain--rx-19
  - id: complex-redirection-chain--rx-20
  - id: complex-redirection-chain--rx-21
  needs: 1
  unless:
  - id: metadata/package/testing/presence::linux-kselftest-shell
  - id: metadata/package/tooling::autoconf-generated-script
  - id: metadata/package/tooling::libtool-generated-script
  - type: basename
    regex: '\.(css|html?|js|json)$'
  - type: basename
    regex: '\.(md|php|txt|xml)$'
  - type: basename
    regex: '\.(pyi?|pyc)$'
  - type: basename
    regex: '(^|[\\/])(configure|config\.(guess|sub))$'
- id: stealth-pipe-command
  desc: Shell command with piping and null redirection
  crit: suspicious
  conf: 0.8
  any:
  - id: stealth-pipe-command--rx-22
  - id: stealth-pipe-command--rx-23
  - id: stealth-pipe-command--rx-24
  - id: stealth-pipe-command--rx-25
  - id: stealth-pipe-command--rx-26
  - id: stealth-pipe-command--rx-27
  - id: stealth-pipe-command--rx-28
  - id: stealth-pipe-command--rx-29
  needs: 1
  unless:
  - id: metadata/package/tooling::autoconf-generated-script
  - id: metadata/package/tooling::libtool-generated-script
