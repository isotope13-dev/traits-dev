defaults:
  platforms: [unix, windows]
  for: [scripts]
  crit: notable
  conf: 0.8
  attack: T1059
traits:
  - id: shfmt-write-command
    desc: shfmt in-place write command
    if:
      type: text
      regex: '\bshfmt\b.{0,80}\s-w\b'
  - id: prettier-write-command
    desc: Prettier in-place write command
    if:
      type: text
      regex: '\bprettier\b.{0,80}--write\b'
  - id: eslint-fix-command
    desc: ESLint fix command
    if:
      type: text
      regex: '\beslint\b.{0,120}--fix\b'
