# Compiler/Build Tool Invocation
# Detects direct invocation of C/C++ compilers and build tools in shell scripts
# These are notable capabilities when executed dynamically in installers/scripts
defaults:
  platforms: [unix, android, ios]
  crit: notable
  attack: "T1027.004" # Obfuscated Files or Information: Compile After Delivery
  for: [shell]
traits:
  - id: swift-build-command
    desc: Swift package build command
    crit: notable
    conf: 0.9
    platforms: [macos]
    if:
      type: text
      regex: '\bswift\s+build\b'

  - id: gcc-invocation
    desc: GCC compiler invocation
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/build/autotools::autoconf-generated-script
    if:
      type: text
      # Require compiler-shaped arguments.  Package-manager lists such as
      # `gcc gcc-c++ make` are not GCC executions and must not feed payload
      # composites merely because the package name appears at line start.
      regex: '(?m)(^|[;&|({])[ \t]*gcc[ \t]+(-\S+|\S+\.[A-Za-z]{1,3}\b)'
  - id: gpp-invocation
    desc: G++ C++ compiler invocation
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/file/extension/identity::autotools-configure-basename
      - type: text
        substr: MINGW_CXX
    if:
      type: text
      regex: '(?m)(^\s*|[;&|({]\s*)g\+\+\s+(-|[a-zA-Z0-9_./]+)'
  - id: clang-invocation
    desc: Clang compiler invocation
    crit: notable
    conf: 0.85
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/autotools::autoconf-generated-script
    if:
      type: text
      regex: '\bclang(\+\+)?\s+(-|[a-zA-Z0-9_./]+)'
  - id: cc-invocation
    desc: C compiler invocation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(^|[;&(]\s*)cc\s+(-|[a-zA-Z0-9_./]+)'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: make-invocation
    desc: Invokes the Make build tool
    crit: notable
    conf: 0.8
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/autotools::autoconf-generated-script
    if:
      type: text
      regex: '\bmake\s+(all|clean|install)\b'
  - id: make-invocation-build
    desc: Make build invocation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bmake\s+(build|check|test|dist)\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - id: make-invocation-flag
    desc: Make invocation with flags
    crit: notable
    conf: 0.8
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/package/testing/presence/harness/
    if:
      type: text
      regex: '\bmake\s+-[a-zA-Z]\b'
  - id: native-toolchain-install-command
    desc: Go/Cargo install command
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '[\n;&|(][ \t]*(sudo\s+)?(cargo|go)\s+install\s+[\w@]'
