# Python wrappers that invoke native compiler toolchains at runtime.
# These are capability markers; intent is determined by higher-level context.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  attack: T1027.004

traits:
  - id: python-cargo-command
    desc: Cargo command string
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bcargo\s+(build|run|install|check)\b'
  - id: python-clang-command
    desc: Clang command string
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: clang
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-gcc-command
    desc: GCC command string
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: gcc
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-subprocess-zig-command
    desc: Python subprocess launches Zig
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '^subprocess\.(run|Popen|call)$'
      arg:
        kind: string
        regex: '^zig(\s|$)'
  - id: python-os-zig-command
    desc: Python os API launches Zig
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '^os\.(system|popen)$'
      arg:
        kind: string
        regex: '^zig(\s|$)'

composite_rules:
  - id: python-c-compiler-command
    desc: Python invokes a C compiler
    crit: notable
    conf: 0.9
    any:
      - id: python-clang-command
      - id: python-gcc-command
  - id: python-zig-command
    desc: Python launches a Zig command
    crit: notable
    conf: 0.9
    any:
      - id: python-subprocess-zig-command
      - id: python-os-zig-command
