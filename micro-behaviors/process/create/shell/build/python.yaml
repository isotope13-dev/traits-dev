# Python wrappers that invoke native compiler toolchains at runtime.
# These are capability markers; intent is determined by higher-level context.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  attack: T1027.004

traits:
  - id: python-cargo-command
    desc: Cargo command string
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: cargo
  - id: python-clang-command
    desc: Clang command string
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: clang
  - id: python-gcc-command
    desc: GCC command string
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: gcc
  - id: python-zig-command
    desc: Zig command string
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: zig

composite_rules:
  - id: python-c-compiler-command
    desc: Python invokes a C compiler
    crit: notable
    conf: 0.9
    any:
      - id: python-clang-command
      - id: python-gcc-command
