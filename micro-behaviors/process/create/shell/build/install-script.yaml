defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.84
  attack: T1059.004

traits:
  - id: local-build-install-script
    desc: Local build installer script execution
    if:
      type: text
      substr: ./build.sh --install

  - id: sudo-local-build-install-script
    desc: Elevated local build installer execution
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: sudo ./build.sh --install
