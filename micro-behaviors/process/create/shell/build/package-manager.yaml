defaults:
  platforms: [unix, windows]
  for: [scripts]
  crit: notable
  conf: 0.82
  attack: T1059
traits:
  - id: bun-install-command
    desc: Bun package install command
    if:
      type: text
      regex: '\bbun\s+install\b'
  - id: npm-install-ignore-scripts
    desc: npm install disables lifecycle scripts
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bnpm\s+(install|ci)\b[^\n]{0,160}--ignore-scripts'
  - id: npm-install-command
    desc: npm package install command
    if:
      type: text
      regex: '\bnpm\s+install\b'
    unless:
      - id: metadata/file/format::generic-template-source
  - id: npm-install-save-command
    desc: npm install command with save flag
    conf: 0.92
    if:
      type: literal
      regex: 'npm\s+install\s+[a-z@][a-z0-9._@/-]{1,60}\s+--save(\s|$)'
    unless:
      - id: metadata/file/format::generic-template-source
  - id: js-package-run-build-command
    desc: npm, Yarn, or pnpm run build
    conf: 0.9
    if:
      type: text
      regex: '\b(npm|yarn|pnpm)\s+run\s+build\b'
  - id: npm-named-package-install-command
    desc: npm named package install command
    if:
      type: text
      regex: '[\n;&|(][ \t]*(sudo[ \t]+)?npm[ \t]+(install|i|add)[ \t]+[\w@][\w@./-]'
    unless:
      - id: metadata/file/format::generic-template-source
  - id: yarn-install-command
    desc: Yarn package install command
    if:
      type: text
      regex: '\byarn\s+install\b'
  - id: pnpm-install-command
    desc: pnpm package install command
    if:
      type: text
      regex: '\bpnpm\s+install\b'
  - id: js-runtime-named-package-install-command
    desc: JS runtime named package install command
    if:
      type: text
      regex: '[\n;&|(][ \t]*(sudo[ \t]+)?(bun|pnpm|yarn)[ \t]+(add|install)[ \t]+[\w@][\w@./-]'
  - id: pip-named-package-install-command
    desc: pip named package install command
    if:
      type: text
      regex: '[\n;&|(][ \t]*(sudo[ \t]+)?pip[0-9]?[ \t]+install[ \t]+[\w@][\w@./-]'
    unless:
      - type: text
        regex: '#[^\n]*\bpip[0-9]?\s+install\b'
  - id: gem-named-package-install-command
    desc: RubyGems named package install command
    if:
      type: text
      regex: '[\n;&|(][ \t]*(sudo[ \t]+)?gem[ \t]+install[ \t]+[\w@][\w@./-]'
  - id: runtime-fetch-install-command
    desc: Runtime fetch install command
    if:
      type: text
      regex: '[\n;&|(][ \t]*(sudo[ \t]+)?(deno|pipx|uv)[ \t]+(install|add)[ \t]+'
