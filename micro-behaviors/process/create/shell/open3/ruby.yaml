defaults:
  platforms: [unix, windows]
  for: [ruby]
  mbc: E1059
  attack: T1059

traits:
  - id: capture-command
    desc: Ruby Open3 captures child-command output
    crit: notable
    conf: 0.92
    if:
      # The qualified member is retained in Ruby source text; the call fact
      # exposes only the unqualified capture method name.
      type: text
      regex: 'Open3\.(capture2|capture2e|capture3)\s*\('
