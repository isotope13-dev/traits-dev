defaults:
  for: [perl]
  platforms: [unix]
traits:
  - id: call
    desc: Perl IPC::Open3 process creation
    crit: notable
    conf: 0.8
    attack: "T1059.006"
    if:
      type: symbol
      exact: open3
  - id: bin-sh
    desc: Perl open3 launches /bin/sh
    crit: suspicious
    conf: 0.94
    attack: "T1059.004"
    if:
      type: text
      regex: 'open3\s*\(.{0,40}/bin/sh'
  - id: stdin-write
    desc: Writes command into shell stdin
    crit: notable
    conf: 0.85
    attack: "T1059.006"
    if:
      type: text
      regex: 'print\s+WRTH\s+"\$command\\n"'
composite_rules:
  - id: shell-exec
    desc: Perl open3 shell command execution
    crit: suspicious
    conf: 0.96
    all:
      - id: bin-sh
      - id: stdin-write
