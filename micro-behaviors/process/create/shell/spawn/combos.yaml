defaults:
  platforms: [unix, windows, macos]
# Composite Command Execution Capabilities
composite_rules:
  - id: shell-execution-comp
    desc: Shell command execution capability
    crit: notable
    mbc: "E1059"
    attack: "T1059"
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/shell/spawn/
      - id: micro-behaviors/process/create/shell/script-host/
    unless:
      - id: metadata/library/sage-math/
  - id: shell-with-dev-null
    desc: Shell invocation with /dev/null redirection
    crit: component
    conf: 0.6
    all:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: micro-behaviors/fs/path/device/special::dev-null
