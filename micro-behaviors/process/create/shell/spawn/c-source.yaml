defaults:
  platforms: [macos, linux]
  for:
    - c
    - cpp
    - swift
    - zig
traits:
  - id: c-popen-path-prefix
    desc: popen shell with exported PATH
    crit: notable
    conf: 0.97
    if:
      type: string_literal
      exact: export PATH=/bin:/sbin:/usr/bin:/usr/local/bin:/usr/sbin;%s
  - id: c-popen-call
    desc: C popen command execution
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: popen
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: c-execl-shell
    desc: C execl invokes shell
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: 'execl(shell, shell'
composite_rules:
  - id: c-capture-command-output
    desc: captures shell output via popen
    crit: suspicious
    conf: 0.97
    all:
      - id: c-popen-call
      - id: c-popen-path-prefix
    any:
      - id: micro-behaviors/process/create/direct::fgets-loop
      - id: micro-behaviors/process/create/direct::cpp-exception
