defaults:
  platforms:
    - linux
    - macos
    - windows
  for:
    - shell
traits:
  - id: xargs-bash-c
    desc: xargs launches bash -c command
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'xargs.{0,50}bash\s+-c'

  # The shell `exec` builtin replaces the current process image with a program
  # (execve, no fork) — process creation, per TAXONOMY `process/create/ (spawn,
  # exec)`. Relocated from process/interpreter/eval (that dir is for code
  # interpreters/eval; `exec` runs a binary, it does not interpret a string).
  - id: shell-exec
    desc: Uses shell exec to replace process
    crit: notable
    conf: 0.5
    attack: T1059
    if:
      type: symbol
      exact: exec
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
  - id: shell-shell
    desc: Bash shell reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\bbash\s+-[ci]\b
  - id: system-fn
    desc: system() function call
    crit: notable
    conf: 0.9
    for: [c, cpp, objc, macho, elf]
    platforms: [unix, windows, openwrt]
    if:
      type: symbol
      exact: system
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: shell-execution-shm
    desc: Execution from shared memory (/dev/shm)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)/dev/shm/[a-zA-Z0-9._-]+\b'
  - id: shell-execution-current-dir
    desc: Execution from current directory (./file)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?m)^\s*\./[a-zA-Z0-9._-]+\b'
    not:
      - regex: '(?m)^\s*\./(usr|etc|var|boot|bin|lib)\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
composite_rules:
  - id: go-shell-strings
    desc: Go shell execution strings
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/system::go-os-exec
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
      - id: micro-behaviors/process/create/shell/lang::stdio-or-pipe-redirection
