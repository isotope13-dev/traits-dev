defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1059.006
traits:
  - id: php-exec
    desc: PHP exec() function call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: exec
  - id: php-shell-exec
    desc: PHP shell_exec() function call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: shell_exec
  - id: php-passthru
    desc: PHP passthru() function call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: passthru
