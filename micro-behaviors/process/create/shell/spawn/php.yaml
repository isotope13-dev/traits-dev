defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1059.006
traits:
  - id: php-exec
    desc: PHP exec() function call
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/file/extension/identity::yara-extension
    if:
      type: symbol
      kind: call
      exact: exec
  - id: php-shell-exec
    desc: PHP shell_exec() function call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: shell_exec
  - id: php-passthru
    desc: PHP passthru() function call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: passthru
  - id: php-escapeshellarg
    desc: PHP shell argument escaping call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: escapeshellarg
  - id: php-escapeshellcmd
    desc: PHP shell command escaping call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: escapeshellcmd

composite_rules:
  - id: php-shell-argument-escaping
    desc: PHP shell argument escaping
    crit: notable
    conf: 0.85
    any:
      - id: php-escapeshellarg
      - id: php-escapeshellcmd
