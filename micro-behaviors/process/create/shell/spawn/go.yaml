defaults:
  platforms: [windows, unix]
  for: [go]
  attack: T1059
traits:
  - id: go-powershell-command-flag
    desc: PowerShell -Command flag as Go string
    crit: component
    conf: 0.7
    if:
      type: string_literal
      exact: "-Command"

composite_rules:
  - id: go-windows-powershell-dispatch
    desc: Go dispatches command via PowerShell
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: go-powershell-command-flag
      - id: micro-behaviors/process/create/direct::exec-command
