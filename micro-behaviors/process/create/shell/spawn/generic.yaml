defaults:
  platforms:
  - unix
  - windows
  for: [shell, python, javascript, powershell, c]
traits:
- id: bin-sh-binary-text
  desc: References /bin/sh in native binary text
  crit: notable
  conf: 0.65
  platforms: [unix]
  for: [elf, macho]
  if:
    type: text
    exact: /bin/sh
  downgrade:
    any:
    - id: metadata/file/string/identity::system-shell-basename
- id: rsh-remote-shell-client
  desc: References /usr/bin/rsh remote shell client
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: /usr/bin/rsh
- id: bin-sh
  desc: References /bin/sh shell executable
  crit: notable
  mbc: E1059.004
  attack: T1059.004
  conf: 0.6
  if:
    type: literal
    regex: '(^|[^A-Za-z0-9_/.+-])/bin/sh($|[^A-Za-z0-9._-])'
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  platforms:
  - unix
  for:
  - scripts
  - binaries
- id: bin-bash-path
  desc: "refs /bin/bash shell path in native binary"
  crit: component
  conf: 0.6
  platforms: [unix]
  for: [elf]
  if:
    type: text
    exact: /bin/bash
    section: rdata
- id: python-bash-path
  desc: /bin/bash shell path in Python code
  crit: component
  conf: 0.8
  attack: T1059.004
  if:
    type: string_literal
    substr: /bin/bash
  platforms:
  - unix
  for:
  - python
- id: bin-sh-interactive
  desc: Interactive shell references (/bin/sh -i)
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    regex: /bin/sh\s+-i
  unless:
  - id: metadata/build/docker::buildkit-dockerfile-frontend
  platforms:
  - unix
  for:
  - scripts
  - binaries
# exec of an interactive shell, in the text corpus — catches an embedded
# /bin/sh -i restorer/dropper script staged in a compiled binary's data
# section, which is not recovered as a parser-level string literal.
- id: exec-interactive-shell
  desc: Exec interactive shell (exec /bin/sh -i)
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: exec\s+/bin/sh\s+-i
  unless:
  - id: metadata/build/docker::buildkit-dockerfile-frontend
  platforms:
  - unix
  for:
  - binaries
- id: sh-dynamic-command-target
  desc: Shell command name from variable
  crit: notable
  conf: 0.6
  if:
    type: metrics
    field: calls.dynamic_target_count
    min: 1
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/package/files/system-package::shell-completion-script
  - id: metadata/package/files/system-package::zsh-function-script
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: metadata/library/structure::next-static-js-chunk
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/files/bsd::pkgsrc-maintainer-script
  - type: path
    regex: '(^|[\\/])(scripts|tools|Documentation)([\\/]|$)'
- id: usr-bin-sh
  desc: References /usr/bin/sh shell executable
  crit: notable
  mbc: E1059.004
  attack: T1059.004
  conf: 0.6
  if:
    type: literal
    regex: '(^|[^A-Za-z0-9_/.+-])/usr/bin/sh($|[^A-Za-z0-9._-])'
  unless:
  - id: metadata/build/docker::buildkit-dockerfile-frontend
  platforms:
  - unix
  for:
  - scripts
  - binaries
- id: bin-shell
  desc: References /bin/shell (Bash shell)
  crit: notable
  mbc: E1059.004
  attack: T1059.004
  conf: 0.6
  if:
    type: string_literal
    substr: /bin/shell
  unless:
  - id: metadata/build/docker::buildkit-dockerfile-frontend
  platforms:
  - unix
  for:
  - scripts
  - binaries
- id: zsh-exec
  desc: zsh shell reference
  crit: notable
  conf: 0.7
  unless:
  - type: basename
    exact: terminal.js
  - type: basename
    exact: terminal.ts
  - type: basename
    exact: CHANGES
  - id: metadata/package/testing/scripted/
  - id: metadata/build/autotools::autoconf-generated-script
  - id: micro-behaviors/process/create/shell/guard/
  - type: import
    regex: "^rich\\.syntax$"
  if:
    type: text
    regex: '(^|[;&|]\s*)zsh\s+(-[ci]\b|["''])'
- id: bash-exec
  desc: References the Bash shell
  crit: notable
  conf: 0.7
  for: [shell, python, javascript, powershell]
  not:
  - substr: "env.SHELL || '/bin/bash'"
  - substr: "#!/bin/bash"
  - substr: "!/bin/bash"
  - regex: '#!\s*/bin/bash\b'
  - regex: '#!\s*/usr/bin/env\s+bash\b'
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - type: basename
    regex: ^configure$
  - type: basename
    regex: ^postinst$
  - type: basename
    regex: ^postrm$
  - id: metadata/file/string/identity::python3-interpreter-basename
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/package/testing/
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_])(/bin/bash|bash\s+-[ci])\b'
- id: bash-keyword
  desc: bash shell keyword (beyond shebang)
  crit: notable
  conf: 0.7
  for: [shell, python, javascript, powershell]
  unless:
  - id: metadata/lang/shebang::bash
  - id: micro-behaviors/process/create/shell/guard/
  - type: basename
    regex: (?i)(^|[/\\!])(METADATA|PKG-INFO|README(\.[^/\\!]*)?)$
  - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
  - id: metadata/lang/embedded::shell
  - type: import
    regex: "^rich\\.syntax$"
  if:
    type: text
    regex: '(^|[;&|]\s*)bash\s+(-[ci]\b|["''])'
- id: sh-c-exec
  desc: shell execution with -c flag
  crit: notable
  conf: 0.8
  for: [shell, python, javascript, powershell]
  unless:
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: metadata/package/testing/presence/harness/
  - id: metadata/build/autotools::autoconf-generated-script
  if:
    type: text
    regex: \b(sh|bash|zsh)\s+-c\b
- id: command-substitution
  desc: shell script command substitution
  crit: baseline
  for: [shell, python]
  if:
    type: text
    regex: \$\([A-Za-z0-9_ \t|'"]+?\)
  unless:
  - id: micro-behaviors/process/create/shell/spawn/
  - id: micro-behaviors/process/create/shell/script-host/
  - id: micro-behaviors/os/sysinfo/process/
- id: backtick-command-substitution
  desc: shell backtick command substitution
  crit: baseline
  for: [shell]
  if:
    type: text
    regex: '`[^`\n]{0,120}[ \t;&$/-][^`\n]{0,120}`'
  unless:
  - id: micro-behaviors/process/create/shell/spawn/
  - id: micro-behaviors/process/create/shell/script-host/
  - id: micro-behaviors/os/sysinfo/process/
  - id: metadata/lang/embedded::shell
  - id: metadata/lang/source::js-ts-source-basename
- id: cmd-name
  desc: cmd executable string literal
  crit: component
  for: [python, javascript, powershell, perl, pe]
  if:
    type: string_literal
    exact: cmd
- id: cmd-slash-c
  desc: cmd /c command execution
  for: [python, javascript, powershell, perl, pe]
  if:
    type: string_literal
    substr: cmd /c
    case_insensitive: true
- id: shell-platform-check-ostype
  desc: Checks OSTYPE variable
  crit: baseline
  conf: 0.8
  for: [shell]
  if:
    type: text
    substr: $OSTYPE
- id: shell-platform-check-linux
  desc: Checks linux-gnu platform
  crit: baseline
  conf: 0.8
  for: [shell]
  if:
    type: text
    word: linux-gnu
- id: shell-platform-check-darwin
  desc: Checks darwin platform
  crit: baseline
  conf: 0.8
  for: [shell]
  if:
    type: text
    word: darwin
- id: shell-platform-check-msys
  desc: Checks msys platform
  crit: baseline
  conf: 0.8
  for: [shell]
  if:
    type: text
    word: msys
- id: shell-platform-check-cygwin
  desc: Checks cygwin platform
  crit: baseline
  conf: 0.8
  for: [shell]
  if:
    type: text
    word: cygwin
- id: curl-pipe-exec-python-shell
  desc: Curl piped directly to Python
  crit: notable
  conf: 0.9
  for: [shell, python]
  if:
    type: text
    regex: 'curl[^\\\n]{0,80}\|\s*(sudo\s+)?\b(python\d*(\.\d+)?)\b'
  not:
  - substr: install.python-poetry.org
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: curl-pipe-exec-sh-node
  desc: Curl piped directly to shell or Node
  crit: notable
  conf: 0.9
  for: [shell, python, javascript, perl, php]
  unless:
  - id: metadata/package/testing/
  - type: basename
    regex: '^(METADATA|PKG-INFO)$'
  - id: metadata/file/extension/identity::markdown-file-basename
  - type: text
    substr: "Install this version of wasmer:"
  if:
    type: text
    regex: 'curl[^\\\n]{0,160}\|\s*(sudo\s+)?\b(node|[bnzk]?a?sh)\b'
  not:
  - substr: "# run as curl | sh"
  - substr: "curl http://npmjs.org/install.sh"
  - substr: "https://rustwasm.github.io/wasm-pack/installer/init.sh"
  - substr: npmjs.com/install
  - substr: "https://dot.net/v1/dotnet-install.sh | bash"
  - substr: "https://www.npmjs.com"
  - substr: "https://www.npmjs.org/install.sh"
  - substr: "https://www\\.npmjs\\.com/install\\.sh | sh"
  - substr: "https://install.fuel.sh"
  - substr: "https://install.fuel.network"
  - substr: astral.sh
  - substr: golangci-lint.run/install.sh
  - substr: raw.githubusercontent.com/golangci/golangci-lint
  - substr: aka.ms/apm-unix
  - substr: ollama.com
  - substr: kuma.io
  - substr: rustup.rs
  downgrade:
    any:
    - id: metadata/package/quality/
    - type: basename
      exact: minikube
    - id: metadata/package/testing/harness/runtime/
- id: curl-pipe-exec-php
  desc: Curl piped to php
  crit: notable
  conf: 0.9
  for: [shell, php, javascript]
  if:
    type: text
    regex: curl.{0,50}https?://.{0,80}\|.{0,50}(sudo\s+)?\bphp
- id: sudo-piped-shell-exec
  desc: Piped shell execution with sudo
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: \|\s*sudo\s+\b(shell|sh|zsh|ksh)\b
  unless:
  - id: well-known/app/actions-batch/
  - type: text
    substr: https://get.arkade.dev
- id: sudo-piped-script-exec
  desc: "Piped scripting interpreter exec with sudo"
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: \|\s*sudo\s+\b(python\d*|perl|php|node)\b
  unless:
  - id: well-known/app/actions-batch/
  - type: text
    substr: getcomposer.org/installer
  - type: text
    substr: https://get.arkade.dev
- id: sleep-format-exec
  desc: Shell sleep with format command template
  crit: notable
  conf: 0.85
  attack: T1029
  if:
    type: text
    regex: sleep %[ds].{0,10}%[ds]
- id: open-a-app
  desc: macOS open -a application launch
  crit: notable
  conf: 0.8
  attack: T1204.001
  platforms:
  - macos
  for: [scripts, binaries]
  if:
    type: string_literal
    regex: open -a \w+
- id: command-substitution-unless-cond-0--rx-1
  desc: Inline-code bytes or property documentation
  crit: component
  for: [shell, python]
  if:
    type: text
    regex: '`[A-Za-z_][A-Za-z0-9_]{2,}`\s+(bytes|property)'
  unless:
  - id: metadata/lang/source::openapi-generator-source-banner
  count_max: 1005108
- id: command-substitution-unless-cond-0--rx-2
  desc: Inline-code option or field documentation
  crit: component
  for: [shell, python]
  if:
    type: text
    regex: '`[A-Za-z_][A-Za-z0-9_]{2,}`\s+(option|field)'
  unless:
  - id: metadata/lang/source::openapi-generator-source-banner
  count_max: 1005109
- id: command-substitution-unless-cond-0--rx-3
  desc: Inline-code parameter documentation
  crit: component
  for: [shell, python]
  if:
    type: text
    regex: '`[A-Za-z_][A-Za-z0-9_]{2,}`\s+(parameter)'
  unless:
  - id: metadata/lang/source::openapi-generator-source-banner
  count_max: 1005110
composite_rules:
- id: cmd-exe-file-path
  desc: References cmd.exe file path
  all:
  - id: micro-behaviors/fs/path/extension::exe-dup
  - id: cmd-name
- id: cmd-exe
  desc: References cmd.exe (Windows Command Prompt)
  crit: notable
  mbc: E1059.003
  attack: T1059.003
  conf: 0.6
  for: [scripts, binaries]
  any:
  - id: cmd-exe-file-path
  - id: cmd-slash-c
- id: win-createprocess
  desc: Creates new process via Windows API
  crit: notable
  mbc: E1059.003
  attack: T1059.003
  conf: 0.9
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/spawn::create-process-w
- id: win-shellexecute
  desc: Executes file or program via Windows ShellExecute API
  crit: notable
  mbc: E1059.003
  attack: T1059.003
  conf: 0.9
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/process/create/exec::shell-execute-a
  - id: micro-behaviors/process/create/exec::shell-execute
  - id: micro-behaviors/process/create/exec::shell-execute-ex
  - id: micro-behaviors/process/create/system::shell-execute-ex-a
- id: shell-platform-check
  desc: Checks shell platform type
  crit: baseline
  conf: 0.8
  for: [shell]
  any:
  - id: shell-platform-check-ostype
  - id: shell-platform-check-linux
  - id: shell-platform-check-darwin
  - id: shell-platform-check-msys
  - id: shell-platform-check-cygwin
- id: curl-pipe-exec
  desc: One-liner download and execute
  crit: notable
  conf: 0.9
  any:
  - id: curl-pipe-exec-python-shell
  - id: curl-pipe-exec-sh-node
  - id: curl-pipe-exec-php
- id: sudo-piped-exec
  desc: Piped interpreter execution with sudo
  crit: notable
  conf: 0.9
  any:
  - id: sudo-piped-shell-exec
  - id: sudo-piped-script-exec
- id: command-substitution-unless-cond-0--rx-helper-4
  desc: Inline-code API documentation context
  crit: component
  conf: 1.0
  for: [shell, python]
  any:
  - id: command-substitution-unless-cond-0--rx-1
  - id: command-substitution-unless-cond-0--rx-2
  - id: command-substitution-unless-cond-0--rx-3
