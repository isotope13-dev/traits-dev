defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.004

traits:
  - id: node-spawn-bash-shell
    desc: Node spawns Bash shell process
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: cp.spawn
      arg:
        kind: string
        exact: /bin/bash

  - id: bash-interactive-fd-bridge
    desc: Bash interactive fd bridge
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'bash\s+-i\s*<&[0-9]+\s*>&[0-9]+\s*2>&[0-9]+'
