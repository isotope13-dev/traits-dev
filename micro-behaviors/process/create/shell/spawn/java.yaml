defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
traits:
  - id: java-process-builder
    desc: Java ProcessBuilder usage
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: ProcessBuilder
  - id: java-runtime-exec
    desc: Java Runtime.exec() usage
    crit: notable
    conf: 0.8
    if:
      type: text
      word: Runtime.getRuntime().exec
  - id: java-cmd-exe-c-arguments
    desc: Java bytecode contains cmd /c arguments
    crit: component
    conf: 0.95
    for: [class, jar, zip]
    if:
      type: raw
      regex: 'cmd\.exe[\s\S]{0,80}/c'

composite_rules:
  - id: java-processbuilder-cmd-start
    desc: Java ProcessBuilder launches through cmd /c
    crit: notable
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode
      - id: java-cmd-exe-c-arguments
