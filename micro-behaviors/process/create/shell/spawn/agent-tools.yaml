defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  conf: 0.9

traits:
  - id: python-agent-execute-command-tool
    desc: Python agent execute_command tool
    if:
      type: text
      regex: '\bdef\s+execute_command\s*\('
  - id: python-agent-execute-shell-function
    desc: Python defines execute_shell function
    crit: component
    conf: 0.95
    if:
      type: function
      exact: execute_shell
  - id: python-tool-decorator
    desc: Python tool decorator
    if:
      type: text
      substr: '@tool('
  - id: agent-skill-subprocess-pid-text
    desc: Agent skill subprocess PID text
    crit: notable
    conf: 0.9
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    for: [python, shell, javascript, typescript, ruby, text]
    if:
      type: text
      substr: subprocesses with PID tracking
  - id: subprocess-timeout-expired-text
    desc: Subprocess TimeoutExpired reference
    crit: component
    conf: 0.88
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    for: [python, shell, javascript, typescript, ruby, text]
    if:
      type: text
      substr: TimeoutExpired
  - id: agent-skill-shell-detect-text
    desc: Agent skill shell detection text
    crit: notable
    conf: 0.88
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    for: [python, shell, javascript, typescript, ruby, text]
    if:
      type: text
      substr: detect the active shell
  - id: agent-skill-multi-shell-names
    desc: Agent skill multiple shell names
    crit: notable
    conf: 0.88
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    for: [python, shell, javascript, typescript, ruby, text]
    if:
      type: text
      regex: 'PowerShell.{0,120}cmd\.exe.{0,120}bash'

composite_rules:
  - id: agent-shell-command-tool
    desc: Agent shell command execution tool
    crit: notable
    conf: 0.95
    all:
      - id: python-agent-execute-command-tool
      - id: python-tool-decorator
      - id: micro-behaviors/process/create/subprocess::shell-true
  - id: agent-file-backed-shell-execution
    desc: Agent file-access module runs shell commands
    crit: notable
    conf: 0.97
    all:
      - id: python-agent-execute-shell-function
      - id: micro-behaviors/process/create/subprocess::variable-command-shell-true
      - id: micro-behaviors/fs/file/read-write::agent-file-tools
  - id: agent-skill-subprocess-pid-control
    desc: Agent skill subprocess PID control
    crit: notable
    conf: 0.91
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    near_bytes: 1200
    all:
      - id: agent-skill-subprocess-pid-text
      - id: subprocess-timeout-expired-text
    any:
      - id: micro-behaviors/process/terminate/command::taskkill-token
  - id: agent-skill-shell-detection-guide
    desc: Agent skill shell detection guide
    crit: notable
    conf: 0.9
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    all:
      - id: agent-skill-shell-detect-text
      - id: agent-skill-multi-shell-names
