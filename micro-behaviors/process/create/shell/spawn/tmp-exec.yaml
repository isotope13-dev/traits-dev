defaults:
  platforms: [unix]
  for: [shell]
  crit: suspicious
  conf: 0.8
traits:
  - id: shell-tmp-execution
    desc: Shell execution from /tmp directory
    if:
      type: text
      # A direct command must begin a shell command (at the start of a line,
      # or after a separator and whitespace). This avoids treating parameter
      # defaults such as ${OUTDIR:-/tmp/results} as execution of that path.
      regex: '(^|[\n;&|()])\s*/tmp/[A-Za-z0-9_./-]{1,80}\b(?![<*?])'
    not:
      - substr: curl -SLo /tmp/go.tar.gz
      - substr: /tmp/BOUT-dev/.ci_
      - substr: ./bin/go.exe build -o /tmp/test_result.exe /tmp/test_main.go
      - regex: '\*\.AppImage\b'
      - substr: /tmp/squashfs-root/AppRun
      # Data/config file paths under /tmp are references, not shell execution
      - regex: (^|[;&|()])\s*/tmp/[A-Za-z0-9_./-]{1,80}\.(conf|cfg|ini|log|txt|json|ya?ml|xml|toml|lock|pid|sock|db|dat)\b
      - regex: '(^|[;&|()])\s*(sudo\s+)?rm\s+-rf\s+[\s\S]{0,160}/tmp/'
      - substr: /tmp/makepkg/*
      - regex: 'EGroupware-egroupware-[^\\/]+[\\/]doc[\\/]rpm-build[\\/]release-appcenter\.sh$'
      - substr: /tmp/FlameGraph/stackcollapse-perf.pl
      - regex: '/tmp/FlameGraph/(stackcollapse-perf|flamegraph)\.pl\b'
      - regex: '/tmp/bench[A-Za-z0-9_./-]*'
      - regex: 'mingw-lite/releases/download/[\s\S]{0,300}/tmp/mingw32'
      # Relative project paths like "$(pwd)/tmp/certs" are data locations, not /tmp execution.
      - regex: '\$\([^)\n]{1,120}\)/tmp/[A-Za-z0-9_./-]{1,80}\b'
    unless:
      - id: well-known/app/x11vnc::xdummy-helper-script
      - id: pkgbuild-go-temp-selftest-context
      - id: metadata/package/testing/presence/harness/
      - id: well-known/app/egroupware/
      - id: well-known/tool/sysadmin/cubesandbox::cubesandbox-source-path
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path
      - id: well-known/app/kagent::kagent-source-path
      - id: well-known/lib/skia::source-tree
      - type: path
        basename: true
        regex: '(^|.*[-_])smoke([-_].*)?\.sh$'
  - id: pkgbuild-go-temp-selftest-context
    desc: PKGBUILD Go temp self-test context
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: ./bin/go.exe build -o /tmp/test_result.exe /tmp/test_main.go
  - id: executes-tmp-file-exec
    desc: Shell execs /tmp path directly
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s;&])exec\s+\/tmp\/[A-Za-z0-9._-]+(\s|$)'
  - id: executes-tmp-file-shell
    desc: Shell runs /tmp path via shell
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s;&])([bz]?sh)\s+\/tmp\/[A-Za-z0-9._-]+(\s|$)'
  - id: executes-tmp-file-source
    desc: Shell sources /tmp path directly
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s;&])(\.|source)\s+\/tmp\/[A-Za-z0-9._-]+(\s|$)'
  - id: android-tmp-chmod-exec
    desc: Android chmods and executes temp payload
    crit: notable
    conf: 0.92
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      regex: 'chmod\s+\+x\s+/data/local/tmp/.{1,40}/data/local/tmp/'
  - id: tmp-rust-text-file-context
    desc: Temporary Rust or text file context
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '/tmp/[A-Za-z0-9._-]+\.(rs|txt)\b'
  - id: tmp-my-bundles-context
    desc: my-bundles temporary path context
    crit: component
    conf: 0.86
    if:
      type: text
      substr: /tmp/my-bundles
  - id: tmp-rustc-compile-run-context
    desc: rustc temporary compile-run context
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'rustc\s+(-O\s+)?/tmp/.{1,40}\s+-o\s+/tmp/.{1,40}\s*&&\s*/tmp/.{1,40}'
  - id: tmp-rustc-main-optimized-context
    desc: rustc optimized temporary main context
    crit: component
    conf: 0.86
    if:
      type: text
      substr: rustc -O /tmp/main.rs -o /tmp/m
  - id: tmp-rustc-main-context
    desc: rustc temporary main context
    crit: component
    conf: 0.86
    if:
      type: text
      substr: rustc /tmp/main.rs -o /tmp/m
composite_rules:
  - id: executes-tmp-file
    desc: Shell executes /tmp path directly
    crit: notable
    conf: 0.9
    any:
      - id: executes-tmp-file-exec
      - id: executes-tmp-file-shell
      - id: executes-tmp-file-source
    unless:
      - id: tmp-rust-text-file-context
      - id: tmp-my-bundles-context
      - id: tmp-rustc-compile-run-context
      - id: tmp-rustc-main-optimized-context
      - id: tmp-rustc-main-context
