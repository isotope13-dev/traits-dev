defaults:
  platforms:
    - unix
  for: [source]
traits:
  - id: embedded-shebang-sh
    desc: Embedded shell script shebang (#!/bin/sh)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: '#!/bin/sh'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/harness/unit/
