defaults:
  platforms:
    - unix
  for: [source]
traits:
  - id: embedded-shebang-sh
    desc: Embedded shell script shebang (#!/bin/sh)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: '#!/bin/sh'
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/harness/unit/

  - id: embedded-shebang-sh-bytes
    desc: Embedded shell script shebang bytes
    crit: notable
    conf: 0.8
    platforms: [unix, windows]
    for: [elf, macho, pe]
    if:
      type: text
      substr: '#!/bin/sh'
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/harness/unit/
