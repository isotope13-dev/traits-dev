defaults:
  attack: T1059
  for:
    - scripts
  platforms:
    - unix
traits:
  - id: sh-interactive
    desc: Interactive shell invocation (sh -i)
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: '(^|[^A-Za-z0-9_])sh\s+-i([^A-Za-z0-9_]|$)'
  - id: sh-interactive-command
    desc: Shell command launches interactive sh
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?m)(^|[;&|]\s*)(/bin/)?sh\s+-i\b'
