# Shell / eval invocation capability expressed in an npm package.json script
# (sh -c / bash -c / eval). scripts[*] matches any script value.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: B0030
  attack: T1059
traits:
  - id: npm-script-shell
    desc: npm script invokes shell or eval
    if:
      type: value
      path: 'scripts[*]'
      regex: '\b(sh|bash)\s+-c\b|\beval\b'
  - id: node-npx-target
    desc: Spawns the npx package runner
    crit: notable
    conf: 0.9
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)spawn(Sync)?$'
      arg:
        kind: string
        exact: npx
