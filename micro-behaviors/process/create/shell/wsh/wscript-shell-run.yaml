defaults:
  platforms: [windows]
  for: [javascript, vbs]
traits:
  - id: wscript-shell-run
    desc: "Invokes the WSH Shell Run method"
    crit: notable
    conf: 0.9
    if:
      type: text
      # Match direct member calls (shell.run(...)) and bracket access (shell["run"](...))
      regex: '(?i)\b\w*shell\w*\s*(\.\s*run|\[\s*[''"]run[''"]\s*\])\s*\('
    attack: "T1059.007" # Command and Scripting Interpreter: JavaScript/JScript
  - id: wscript-shell-run-bracket
    desc: Bracketed Run method call
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\[\s*["'']Run["'']\s*\]\s*\('
  - id: wscript-shell-run-hidden-window
    desc: WSH Run call requests a hidden window
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(?i)\.Run$'
      arg:
        kind: number
        value: 0
    unless:
    - id: micro-behaviors/process/interpreter/vm/
    - id: well-known/tool/detection/sast/
    - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: shell-application-shellexecute-hidden
    desc: ShellExecute hides launched process
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(?i)\.ShellExecute$'
      arg:
        kind: number
        value: 0
  - id: shellexecute-method-call
    desc: Calls the WSH ShellExecute method
    crit: notable
    conf: 0.9
    for: [javascript, vbs, html]
    if:
      type: text
      regex: '(?i)\.ShellExecute\b'
    unless:
      - id: metadata/package/testing/harness/runtime/
  # Text fallback for VBS/WSH where AST symbol arg matching is unavailable.
  # Covers both `ShellExecute(...)` and VBS statement form `ShellExecute a, b, c, d, 0`.
  - id: shellexecute-hidden-showcmd
    desc: ShellExecute with hidden show-command
    crit: notable
    conf: 0.93
    for: [vbs, javascript, html]
    if:
      type: text
      regex: '(?i)\.ShellExecute\b[^;\r\n]{0,240},\s*0\s*\)?\s*$'
  - id: wscript-shell-run-indirect
    desc: Indirect bracketed WScript command invocation
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?s)\b\w+\s*\[.{1,40}\]\s*\(\s*\w+\s*,\s*[^)]{1,40}\)'
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
composite_rules:
  - id: wscript-shell-run-obfuscated
    desc: Obfuscated WScript.Shell Run invocation
    crit: notable
    conf: 0.9
    all:
      - id: wscript-shell-run-indirect
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
  - id: wscript-shell-run-via-brackets
    desc: WScript.Shell Run via bracketed invocation
    crit: notable
    conf: 0.92
    all:
      - id: wscript-shell-run-bracket
      - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: wscript-shell-hidden-run
    desc: WScript.Shell hides launched command window
    crit: suspicious
    conf: 0.95
    all:
      - id: wscript-shell-run-hidden-window
      - id: micro-behaviors/os/com/object::wscript-shell-literal
