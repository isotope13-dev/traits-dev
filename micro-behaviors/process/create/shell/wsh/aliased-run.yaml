defaults:
  platforms: [windows]
  for: [javascript, vbs]

traits:
  - id: wsh-run-method-call
    desc: WScript.Shell Run method call
    crit: notable
    conf: 0.95
    attack: T1059.007
    if:
      type: text
      regex: '(?i)WScript\.Shell.{0,80}\.Run\b\s*\('
  - id: wsh-run-hidden-flags
    desc: WSH Run uses hidden window flags
    crit: notable
    conf: 0.95
    attack: T1564.003
    if:
      type: text
      regex: '(?i)WScript\.Shell.{0,160}\.Run\b.{0,80},\s*0\s*,\s*(false|true)\s*\)?'
  # Text fallback for parser-failing or heavily obfuscated JScript.  A Run
  # call with show-window 0 and a Boolean wait flag is the complete WSH hidden
  # launch signature even when the shell object and command are aliases.
  - id: wsh-run-hidden-window-text
    desc: WSH Run call uses hidden-window arguments
    crit: notable
    conf: 0.94
    attack: T1564.003
    if:
      type: text
      regex: '(?is)\.Run\s*\([^;\r\n]{1,512},\s*0\s*,\s*(false|true)\s*\)'
composite_rules:
  - id: wsh-aliased-run-hidden-window-text
    desc: WSH Run hides a child window
    crit: notable
    conf: 0.98
    near_lines: 4
    all:
      - id: wsh-run-method-call
      - id: wsh-run-hidden-flags
