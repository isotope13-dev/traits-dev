defaults:
  platforms: [windows]
  for: [javascript, vbs]

traits:
  - id: wsh-run-method-call
    desc: Calls a WSH Run method
    crit: notable
    conf: 0.95
    attack: T1059.007
    if:
      type: text
      regex: '(?i)\.\s*Run\b\s*\(?'
  - id: wsh-run-hidden-flags
    desc: WSH Run uses hidden window flags
    crit: notable
    conf: 0.95
    attack: T1564.003
    if:
      type: text
      regex: '(?i),\s*(0|&H0)\s*,\s*(false|true)\s*\)?'
composite_rules:
  - id: wsh-aliased-run-hidden-window-text
    desc: WSH Run hides a child window
    crit: notable
    conf: 0.98
    near_lines: 4
    all:
      - id: wsh-run-method-call
      - id: wsh-run-hidden-flags
