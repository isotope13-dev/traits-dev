defaults:
  platforms: [windows]
  for:
    - vbs
  crit: notable
  conf: 0.7
traits:
  - id: wscript-shell
    desc: WScript.Shell object reference
    if:
      type: text
      substr: WScript.Shell
  - id: wscript-exe
    desc: wscript.exe executable reference
    if:
      type: text
      substr: wscript.exe
  - id: cscript-exe
    desc: cscript.exe executable reference
    if:
      type: text
      substr: cscript.exe
composite_rules:
  - id: wscript-engine-markers
    desc: WScript engine identification markers
    any:
      - id: wscript-shell
      - id: wscript-exe
      - id: cscript-exe
