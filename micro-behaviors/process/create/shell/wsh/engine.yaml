defaults:
  platforms: [windows]
  for:
    - vbs
  crit: notable
  conf: 0.7
composite_rules:
  # WScript engine markers — the atomic traits live in the sibling
  # process/create/shell/invoke (canonical, literal); this composite references
  # them rather than re-defining duplicate text matchers.
  - id: wscript-engine-markers
    desc: WScript engine identification markers
    any:
      - id: micro-behaviors/process/create/shell/invoke::wscript-shell
      - id: micro-behaviors/process/create/shell/invoke::wscript-exe
      - id: micro-behaviors/process/create/shell/invoke::cscript-exe
