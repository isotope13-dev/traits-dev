defaults:
  platforms:
    - linux
    - macos
    - windows
  for:
    - shell
traits:
  # The shell `exec` builtin replaces the current process image with a program
  # (execve, no fork) — process creation, per TAXONOMY `process/create/ (spawn,
  # exec)`. Relocated from process/interpreter/eval (that dir is for code
  # interpreters/eval; `exec` runs a binary, it does not interpret a string).
  - id: shell-exec
    desc: Shell exec builtin (process replacement)
    crit: notable
    conf: 0.5
    attack: T1059
    if:
      type: symbol
      exact: exec
  - id: shell-shell
    desc: Bash shell reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\bbash\s+-[ci]\b
  - id: system-call-word
    desc: system() call (string)
    crit: notable
    conf: 0.5
    for: [shell, c, cpp]
    if:
      type: string_literal
      regex: (^|[^A-Za-z0-9_\.])system\s*[(]
    unless:
      - type: basename
        regex: \.[1-9]$
  - id: system-fn
    desc: system() function call
    crit: notable
    conf: 0.9
    for: [c, cpp, objc, macho, elf]
    platforms: [unix, windows, openwrt]
    if:
      type: symbol
      exact: system
  - id: system-symbol-text
    desc: system() symbol text
    crit: notable
    conf: 0.75
    for: [elf, macho]
    platforms: [unix]
    if:
      type: text
      regex: ^system(\.c)?$
  - id: shell-execution-shm
    desc: Execution from shared memory (/dev/shm)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)/dev/shm/[a-zA-Z0-9._-]+\b'
  - id: shell-execution-current-dir
    desc: Execution from current directory (./file)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?m)^\s*\./[a-zA-Z0-9._-]+\b'
    not:
      - regex: '(?m)^\s*\./(usr|etc|var|boot|bin|lib)\b'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
composite_rules:
  - id: go-shell-strings
    desc: Go shell execution strings
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/system::go-os-exec
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
      - id: micro-behaviors/process/create/shell/lang::pipe-redirection
  - id: shell-symbols
    desc: Shell execution symbols
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/binary/resource::resource-only-dll
    any:
      - id: micro-behaviors/process/create/shell/
  - id: shell-execution-indicators
    desc: Shell command execution indicators
    crit: notable
    conf: 0.9
    any:
      - id: shell-symbols
      - id: go-shell-strings
