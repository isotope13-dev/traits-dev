defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
  size_min: 8000
  size_max: 50000

traits:
  - id: post-command-passthru
    desc: POST command passthru sink
    crit: notable
    conf: 0.97
    attack: T1059.004
    if:
      type: raw
      substr: 'passthru($_POST[''cmd''])'

  - id: default-command-listing
    desc: Defaults command to ls
    crit: notable
    conf: 0.88
    attack: T1059.004
    if:
      type: raw
      substr: '$_POST[''cmd'']="ls -la"'

  - id: exec-id-output
    desc: Executes id and prints result
    crit: notable
    conf: 0.94
    attack: T1059.004
    if:
      type: raw
      substr: '".exec("id")."<br>"'

  - id: exec-pwd-output
    desc: Executes pwd and prints result
    crit: notable
    conf: 0.92
    attack: T1059.004
    if:
      type: raw
      substr: '".exec("pwd").""'

  - id: bind-shell-compile-launch
    desc: Compiles and launches bind shell
    crit: suspicious
    conf: 0.96
    attack: T1059.004
    if:
      type: raw
      substr: 'gcc -o bd bd.c; ./bd '

  - id: interactive-bash-bind
    desc: Interactive bash bind shell
    crit: suspicious
    conf: 0.99
    attack: T1059.004
    if:
      type: raw
      substr: 'system(\"echo welcome to r57 shell && /bin/bash -i\");'

composite_rules:
  - id: interactive-bind-launch
    desc: Compiled interactive bind shell
    crit: suspicious
    conf: 0.98
    all:
      - id: bind-shell-compile-launch
      - id: interactive-bash-bind
