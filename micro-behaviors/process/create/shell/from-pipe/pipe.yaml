defaults:
  for:
    - all
  crit: notable
  conf: 0.6
  attack: T1059.004
traits:
  - id: pipe-sh-dup
    desc: pipe to sh
    if:
      type: string
      regex: ' \|\s*sh\b'
  - id: pipe-bash-dup
    desc: pipe to bash
    if:
      type: string
      regex: ' \|\s*bash\b'
  - id: output-pipe-sh
    desc: -O- | sh pattern
    crit: suspicious
    conf: 0.85
    mbc: B0024
    if:
      type: string
      regex: -[Oo]-?\s*\|\s*sh\b
composite_rules:
  - id: micro-behaviors/process/create/shell/from-pipe::pipe-sh-dup-or-bash
    desc: Pipe to shell (sh or bash)
    any:
      - id: micro-behaviors/process/create/shell/from-pipe::pipe-sh-dup
      - id: micro-behaviors/process/create/shell/from-pipe::pipe-bash-dup
