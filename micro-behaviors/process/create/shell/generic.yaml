defaults:
  platforms:
  - unix
  - windows
  for: [shell, python, javascript, powershell, c]
traits:
- id: bin-sh
  desc: References /bin/sh (Bourne shell)
  crit: notable
  mbc: E1059.004
  attack: T1059.004
  conf: 0.6
  unless:
  - id: metadata/package/testing/harness::is-test
  - type: text
    substr: '"comment":"buildkit.dockerfile.v0"'
  - type: text
    substr: "command: '/bin/sh'"
  if:
    type: string_literal
    substr: /bin/sh
  platforms:
  - unix
  for:
  - scripts
  - binaries
- id: python-bash-path
  desc: /bin/bash shell path in Python code
  crit: component
  conf: 0.8
  attack: T1059.004
  if:
    type: string_literal
    substr: /bin/bash
  platforms:
  - unix
  for:
  - python
- id: bin-sh-interactive
  desc: Interactive shell references (/bin/sh -i)
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    regex: /bin/sh\s+-i
  unless:
  - type: text
    substr: '"comment":"buildkit.dockerfile.v0"'
  platforms:
  - unix
  for:
  - scripts
  - binaries
- id: usr-bin-sh
  desc: References /usr/bin/sh shell path
  crit: notable
  mbc: E1059.004
  attack: T1059.004
  conf: 0.6
  if:
    type: string_literal
    substr: /usr/bin/sh
  unless:
  - type: text
    substr: '"comment":"buildkit.dockerfile.v0"'
  platforms:
  - unix
  for:
  - scripts
  - binaries
- id: bin-shell
  desc: References /bin/shell (Bash shell)
  crit: notable
  mbc: E1059.004
  attack: T1059.004
  conf: 0.6
  if:
    type: string_literal
    substr: /bin/shell
  unless:
  - type: text
    substr: '"comment":"buildkit.dockerfile.v0"'
  platforms:
  - unix
  for:
  - scripts
  - binaries
- id: zsh-exec
  desc: zsh shell reference
  crit: notable
  conf: 0.7
  unless:
  - type: basename
    exact: terminal.js
  - type: basename
    exact: terminal.ts
  - type: basename
    exact: CHANGES
  - id: metadata/package/testing/scripted::xterm-terminal-recording
  - id: metadata/package/tooling::autoconf-generated-script
  if:
    type: text
    word: zsh
- id: bash-exec
  desc: bash shell reference
  crit: notable
  conf: 0.7
  for: [shell, python, javascript, powershell]
  not:
  - substr: "env.SHELL || '/bin/bash'"
  - substr: "#!/bin/bash"
  - substr: "!/bin/bash"
  - regex: '#!\s*/bin/bash\b'
  - regex: '#!\s*/usr/bin/env\s+bash\b'
  unless:
  - type: basename
    regex: '^(configure|postinst|postrm)$'
  - type: basename
    exact: python3
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/package/testing/harness::is-test
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_])(/bin/bash|bash\s+-[ci])\b'
- id: sh-c-exec
  desc: shell execution with -c flag
  crit: notable
  conf: 0.8
  for: [shell, python, javascript, powershell]
  unless:
  - id: metadata/package/testing/presence::linux-kselftest-shell
  - id: metadata/package/tooling::autoconf-generated-script
  if:
    type: text
    regex: \b(sh|bash|zsh)\s+-c\b
- id: command-substitution
  desc: shell script command substitution
  crit: baseline
  for: [shell, python, c]
  if:
    type: text
    regex: \$\([a-zA-Z0-9_\s|'"]+?\)|`[a-zA-Z0-9_\s|'"]+?`
  unless:
  - id: command-substitution-unless-cond-0--rx-helper-4
  - id: micro-behaviors/os/env/vars/cicd::sh-whoami-command
- id: cmd-name
  desc: cmd command name
  for: [python, javascript, powershell, perl, pe]
  if:
    type: string_literal
    word: cmd
- id: cmd-slash-c
  desc: cmd /c command execution
  for: [python, javascript, powershell, perl, pe]
  if:
    type: string_literal
    substr: cmd /c
    case_insensitive: true
- id: shell-platform-check-ostype
  desc: Checks OSTYPE variable
  crit: baseline
  conf: 0.8
  if:
    type: text
    substr: $OSTYPE
- id: shell-platform-check-linux
  desc: Checks linux-gnu platform
  crit: baseline
  conf: 0.8
  if:
    type: text
    exact: linux-gnu
- id: shell-platform-check-darwin
  desc: Checks darwin platform
  crit: baseline
  conf: 0.8
  if:
    type: text
    exact: darwin
- id: shell-platform-check-msys
  desc: Checks msys platform
  crit: baseline
  conf: 0.8
  if:
    type: text
    exact: msys
- id: shell-platform-check-cygwin
  desc: Checks cygwin platform
  crit: baseline
  conf: 0.8
  if:
    type: text
    exact: cygwin
- id: curl-pipe-exec-python-shell
  desc: Curl piped to python or shell
  crit: suspicious
  conf: 0.9
  for: [shell, python]
  if:
    type: text
    regex: curl.{0,50}\|.{0,50}(sudo\s+)?\b(python|shell)
  not:
  - substr: install.python-poetry.org
- id: curl-pipe-exec-sh-node
  desc: Curl piped to sh or node
  crit: notable
  conf: 0.9
  for: [shell, python, javascript, perl, php]
  unless:
  - id: metadata/package/testing/harness::is-test
  - type: basename
    regex: \.md$
    case_insensitive: true
  - type: text
    substr: "Install this version of wasmer:"
  if:
    type: text
    regex: curl.{0,50}https?://.{0,80}\|.{0,50}(sudo\s+)?\b(sh|node)\b
  not:
  - substr: "# run as curl | sh"
  - substr: "curl http://npmjs.org/install.sh"
  - substr: "https://rustwasm.github.io/wasm-pack/installer/init.sh"
  - substr: npmjs.com/install
  - substr: "https://dot.net/v1/dotnet-install.sh | bash"
  - substr: "https://www.npmjs.com"
  - substr: "https://www.npmjs.org/install.sh"
  - substr: "https://www\\.npmjs\\.com/install\\.sh | sh"
  - substr: "https://install.fuel.sh"
  - substr: "https://install.fuel.network"
  - substr: astral.sh
  - substr: golangci-lint.run/install.sh
  - substr: ollama.com
  - substr: kuma.io
  - substr: rustup.rs
  downgrade:
    any:
    - id: metadata/package::common-fp-context
    - type: basename
      exact: minikube
    - id: metadata/package/testing/harness::is-test
- id: curl-pipe-exec-php
  desc: Curl piped to php
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: curl.{0,50}\|.{0,50}(sudo\s+)?\bphp
- id: sudo-piped-shell-exec
  desc: Piped shell execution with sudo
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \|\s*sudo\s+\b(shell|sh|zsh|ksh)\b
- id: sudo-piped-script-exec
  desc: Piped scripting interpreter execution with sudo
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \|\s*sudo\s+\b(python\d*|perl|php|node)\b
- id: sleep-format-exec
  desc: Shell sleep with format command template
  crit: notable
  conf: 0.85
  attack: T1029
  if:
    type: text
    regex: sleep %[ds].{0,10}%[ds]
- id: open-a-app
  desc: macOS open -a application launch
  crit: notable
  conf: 0.8
  attack: T1204.001
  platforms:
  - macos
  for: [scripts, binaries]
  if:
    type: string_literal
    regex: open -a \w+
- id: command-substitution-unless-cond-0--rx-1
  desc: Regex component marker
  crit: component
  for: [shell, python, c]
  if:
    type: text
    regex: '`[A-Za-z_][A-Za-z0-9_]{2,}`\s+(bytes|property)'
  count_max: 1005108
- id: command-substitution-unless-cond-0--rx-2
  desc: Regex component marker
  crit: component
  for: [shell, python, c]
  if:
    type: text
    regex: '`[A-Za-z_][A-Za-z0-9_]{2,}`\s+(option|field)'
  count_max: 1005109
- id: command-substitution-unless-cond-0--rx-3
  desc: Regex component marker
  crit: component
  for: [shell, python, c]
  if:
    type: text
    regex: '`[A-Za-z_][A-Za-z0-9_]{2,}`\s+(parameter)'
  count_max: 1005110
composite_rules:
- id: cmd-exe-file-path
  desc: References cmd.exe file path
  all:
  - id: micro-behaviors/fs/path/extension::exe-dup
  - id: cmd-name
- id: cmd-exe
  desc: References cmd.exe (Windows Command Prompt)
  crit: notable
  mbc: E1059.003
  attack: T1059.003
  conf: 0.6
  for: [scripts, binaries]
  any:
  - id: cmd-exe-file-path
  - id: cmd-slash-c
- id: win-createprocess
  desc: Creates new process via Windows API
  crit: notable
  mbc: E1059.003
  attack: T1059.003
  conf: 0.9
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/spawn::create-process-w
- id: win-shellexecute
  desc: Executes file or program via Windows ShellExecute API
  crit: notable
  mbc: E1059.003
  attack: T1059.003
  conf: 0.9
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/process/create/exec::shell-execute-a
  - id: micro-behaviors/process/create/exec::shell-execute
  - id: micro-behaviors/process/create/exec::shell-execute-ex
  - id: micro-behaviors/process/create/system::shell-execute-ex-a
- id: shell-platform-check
  desc: Checks shell platform type
  crit: baseline
  conf: 0.8
  any:
  - id: shell-platform-check-ostype
  - id: shell-platform-check-linux
  - id: shell-platform-check-darwin
  - id: shell-platform-check-msys
  - id: shell-platform-check-cygwin
- id: curl-pipe-exec
  desc: One-liner download and execute
  crit: notable
  conf: 0.9
  any:
  - id: curl-pipe-exec-python-shell
  - id: curl-pipe-exec-sh-node
  - id: curl-pipe-exec-php
- id: sudo-piped-exec
  desc: Piped interpreter execution with sudo
  crit: suspicious
  conf: 0.9
  any:
  - id: sudo-piped-shell-exec
  - id: sudo-piped-script-exec
- id: command-substitution-unless-cond-0--rx-helper-4
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [shell, python, c]
  any:
  - id: command-substitution-unless-cond-0--rx-1
  - id: command-substitution-unless-cond-0--rx-2
  - id: command-substitution-unless-cond-0--rx-3
