# Command Execution Detection
# MBC: OB0009 (Execution) → E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  for: [all]
traits:
  # C/C++ - Unix
  - id: c-popen
    desc: "Executes command and captures output"
    crit: notable
    mbc: "E1059.004"
    attack: "T1059.004"
    conf: 0.9
    if:
      type: symbol
      # Match popen token boundaries, not larger symbols like dupopen.
      regex: "(^|_)popen(64)?($|_)"
    platforms: [unix, linux, macos]
    for: [binaries]
  - id: c-execve
    desc: "Executes program directly via C"
    crit: notable
    mbc: "E1059"
    attack: "T1059"
    conf: 0.95
    if:
      type: symbol
      regex: execve
    platforms: [unix, linux, macos]
    for: [binaries]
  - id: c-exec-variants
    desc: "C-style exec family functions"
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: "^exec(l(e|p)?|v(e|p(e)?)?)$"
    platforms: [unix, linux, macos]
    for: [binaries]
  # Windows
  - id: shell-execute-ex-a
    desc: "ShellExecuteExA ANSI extended API"
    crit: notable
    mbc: "E1059.003"
    attack: "T1059.003"
    conf: 0.9
    if:
      type: symbol
      exact: "ShellExecuteExA"
    platforms: [windows]
    for: [pe, dll]
  # Go
  - id: go-os-exec
    desc: "Executes commands via Go os/exec"
    crit: notable
    mbc: "E1059"
    attack: "T1059"
    conf: 0.9
    if:
      type: symbol
      regex: 'os/exec\..{0,50}'
  # Python
  - id: python-os-system
    desc: "Executes shell commands via Python"
    crit: notable
    mbc: "E1059.006"
    attack: "T1059.006"
    conf: 0.95
    for: [python]
    if:
      type: symbol
      exact: "os.system"
  # JavaScript
  - id: js-child-process
    desc: "Executes commands via Node.js child_process"
    crit: notable
    mbc: "E1059"
    attack: "T1059"
    conf: 0.9
    if:
      type: symbol
      regex: 'child_process\.(exec|spawn|fork).{0,50}'
  # Ruby
  - id: ruby-system
    desc: "Executes commands via Ruby system()"
    crit: notable
    mbc: "E1059"
    attack: "T1059"
    conf: 0.9
    for: [ruby]
    if:
      type: string
      regex: '\bsystem\([''\"]'
  # Rust
  - id: rust-command
    desc: "Executes process via Rust std::process::Command"
    crit: notable
    mbc: "E1059"
    attack: "T1059"
    conf: 0.9
    if:
      type: symbol
      regex: "std::process::Command::.{0,50}"
  # Shell references
  - id: bin-sh
    desc: "References /bin/sh (Bourne shell)"
    crit: notable
    mbc: "E1059.004"
    attack: "T1059.004"
    conf: 0.6
    if:
      type: string
      substr: "/bin/sh"
    platforms: [unix, linux, macos]
    for: [binaries, c, cpp]
  - id: usr-bin-sh
    desc: "References /usr/bin/sh shell path"
    crit: notable
    mbc: "E1059.004"
    attack: "T1059.004"
    conf: 0.6
    if:
      type: string
      substr: "/usr/bin/sh"
    platforms: [unix, linux, macos]
    for: [binaries, c, cpp]
  - id: bin-bash
    desc: "References /bin/bash (Bash shell)"
    crit: notable
    mbc: "E1059.004"
    attack: "T1059.004"
    conf: 0.6
    if:
      type: string
      substr: "/bin/bash"
    platforms: [unix, linux, macos]
    for: [binaries]
  - id: cmd-name
    desc: "cmd command name"
    for: [pe, dll, shell, batch, powershell]
    platforms: [windows]
    if:
      type: string
      word: "cmd"
  - id: cmd-slash-c
    desc: "cmd /c command execution"
    if:
      type: string
      regex: 'cmd /c'
      case_insensitive: true
  # Behavioral Patterns
  - id: shell-platform-check-ostype
    desc: "Checks OSTYPE variable"
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: raw
      regex: '\$OSTYPE'
  - id: shell-platform-check-linux
    desc: "Checks linux-gnu platform"
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: raw
      exact: "linux-gnu"
  - id: shell-platform-check-darwin
    desc: "Checks darwin platform"
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: raw
      exact: "darwin"
  - id: shell-platform-check-msys
    desc: "Checks msys platform"
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: raw
      exact: "msys"
  - id: shell-platform-check-cygwin
    desc: "Checks cygwin platform"
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: raw
      exact: "cygwin"
  - id: curl-pipe-exec-python-bash
    desc: "Curl piped to python or bash"
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: raw
      regex: 'curl.{0,50}\|.{0,50}(sudo\s+)?\b(python|bash)'
  - id: curl-pipe-exec-sh-node
    desc: "Curl piped to sh or node"
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: raw
      regex: 'curl.{0,50}\|.{0,50}(sudo\s+)?\b(sh|node)'
  - id: curl-pipe-exec-php
    desc: "Curl piped to php"
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: raw
      regex: 'curl.{0,50}\|.{0,50}(sudo\s+)?\bphp'
  - id: sudo-piped-shell-exec
    desc: "Piped shell execution with sudo"
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: raw
      regex: '\|\s*sudo\s+\b(bash|sh|zsh|ksh)\b'
  - id: sudo-piped-script-exec
    desc: "Piped scripting interpreter execution with sudo"
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: raw
      regex: '\|\s*sudo\s+\b(python\d*|perl|php|node)\b'
  # Shell sleep with format specifier followed by command - randomized execution cadence
  - id: sleep-format-exec
    desc: "Shell sleep with format command template"
    crit: notable
    conf: 0.85
    attack: "T1029"
    if:
      type: string
      regex: "sleep %[ds].{0,10}%[ds]"
  # macOS open command to launch applications
  - id: open-a-app
    desc: "macOS open -a application launch"
    crit: notable
    conf: 0.8
    attack: "T1204.001"
    platforms: [macos]
    if:
      type: string
      regex: 'open -a \w+'
composite_rules:
  - id: cmd-exe-file-path
    desc: "References cmd.exe file path"
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: cmd-name
  - id: cmd-exe
    desc: "References cmd.exe (Windows Command Prompt)"
    crit: notable
    mbc: "E1059.003"
    attack: "T1059.003"
    conf: 0.6
    platforms: [windows]
    any:
      - id: cmd-exe-file-path
      - id: cmd-slash-c
  # win-createprocess: composite referencing canonical process creation traits
  - id: win-createprocess
    desc: "Creates new process via Windows API"
    crit: notable
    mbc: "E1059.003"
    attack: "T1059.003"
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::create-process-w
  # win-shellexecute: composite referencing canonical shell execute traits
  - id: win-shellexecute
    desc: "Executes file or program via Windows ShellExecute API"
    crit: notable
    mbc: "E1059.003"
    attack: "T1059.003"
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: shell-execute-ex-a
  - id: shell-platform-check
    desc: "Checks shell platform type"
    crit: notable
    conf: 0.8
    for: [shell]
    any:
      - id: shell-platform-check-ostype
      - id: shell-platform-check-linux
      - id: shell-platform-check-darwin
      - id: shell-platform-check-msys
      - id: shell-platform-check-cygwin
  - id: curl-pipe-exec
    desc: "One-liner download and execute"
    crit: suspicious
    conf: 0.9
    for: [shell]
    any:
      - id: curl-pipe-exec-python-bash
      - id: curl-pipe-exec-sh-node
      - id: curl-pipe-exec-php
  - id: sudo-piped-exec
    desc: "Piped interpreter execution with sudo"
    crit: suspicious
    conf: 0.9
    for: [shell]
    any:
      - id: sudo-piped-shell-exec
      - id: sudo-piped-script-exec
