defaults:
  platforms:
    - linux
    - unix
    - macos
    - windows
  for: [binaries, source]
traits:
  - id: c-popen
    desc: Executes command and captures output
    crit: notable
    mbc: E1059.004
    attack: T1059.004
    conf: 0.95
    for:
      - elf
      - macho
      - so
      - dylib
      - c
      - cpp
    if:
      type: symbol
      regex: (^|_)popen(64)?($|_)
