# popen() family - execute command and capture output via pipe
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  platforms: [unix, linux, macos]
  for: [binaries, scripts]
traits:
  - id: c-popen
    desc: "Executes command and captures output"
    crit: notable
    mbc: "E1059.004"
    attack: "T1059.004"
    conf: 0.95
    if:
      type: symbol
      # Match popen token boundaries, not larger symbols like dupopen.
      regex: "(^|_)popen(64)?($|_)"
    for: [shell, python, ruby, php, javascript]
