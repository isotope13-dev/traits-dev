defaults:
  platforms: [unix, windows]
  for: [shell]
  attack: T1059.004
traits:
  - id: shell-git-clone
    desc: git clone in shell script
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bgit\s+clone\b'
  - id: shell-git-pull
    desc: git pull in shell script
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\bgit\s+(-C\s+\S+\s+)?pull\b'
