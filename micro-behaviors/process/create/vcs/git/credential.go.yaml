defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1059.003

traits:
  - id: go-git-credential-helper
    desc: Go invokes git credential helper
    crit: notable
    conf: 0.95
    if:
      type: tree-sitter
      kind: call
      regex: 'exec\.Command(Context)?\([\s\S]{0,120}"git"[\s\S]{0,40}"credential"'
