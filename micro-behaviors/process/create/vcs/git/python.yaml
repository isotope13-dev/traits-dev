defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.88
  attack: T1059.006
  mbc: C0017

traits:
  - id: git-clone-argv-token
    desc: Git clone argv token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"clone"'

  - id: git-no-tags-argv-token
    desc: Git no-tags argv token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"--no-tags"'

  - id: git-reset-hard-argv-token
    desc: Git reset hard argv token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"reset", "--hard"'

composite_rules:
  - id: subprocess-git-clone-argv
    desc: Python subprocess invokes git clone
    crit: notable
    conf: 0.9
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: git-clone-argv-token
      - id: git-no-tags-argv-token

  - id: subprocess-git-reset-hard-argv
    desc: Python subprocess hard-resets git checkout
    crit: notable
    conf: 0.88
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: git-reset-hard-argv-token
