defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.88
  attack: T1059.006
  mbc: C0017

traits:
  - id: python-gitpython-import
    desc: Imports the GitPython library
    crit: notable
    conf: 0.95
    if:
      type: import
      regex: '^git(\.|$)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-git-clone-call
    desc: Python invokes Git repository clone API
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(clone_from|clone_repository)$'

  - id: python-git-hook-write
    desc: Python writes a Git hook file
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: open
      arg:
        kind: string
        substr: '.git/hooks/'

  - id: python-git-hook-chmod
    desc: Python changes Git hook permissions
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: os.chmod
      arg:
        kind: string
        substr: '.git/hooks/'

  - id: python-subprocess-git-pull
    desc: Python subprocess performs git pull
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'subprocess\.run\([\s\S]{0,120}[''\"]git[''\"][\s\S]{0,80}[''\"]pull[''\"]'

  - id: python-subprocess-git-clone
    desc: Python subprocess invokes git clone
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'subprocess\.run\(\s*\[\s*[''\"]git[''\"]\s*,\s*[''\"]clone[''\"]'

  - id: python-subprocess-git-add
    desc: Python subprocess stages Git file
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'subprocess\.run\([\s\S]{0,120}[''\"]git[''\"][\s\S]{0,80}[''\"]add[''\"]'

  - id: python-subprocess-git-commit
    desc: Python subprocess commits Git changes
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'subprocess\.run\([\s\S]{0,120}[''\"]git[''\"][\s\S]{0,80}[''\"]commit[''\"]'

  - id: git-clone-argv-token
    desc: Git clone argv token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"clone"'

  - id: git-no-tags-argv-token
    desc: Git no-tags argv token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"--no-tags"'

  - id: git-reset-hard-argv-token
    desc: Git reset --hard argument sequence
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"reset", "--hard"'

  - id: git-fetch-origin-argv-token
    desc: Git fetch origin argv token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"fetch", "--no-tags"'

  - id: git-hooks-disabled-config-token
    desc: Git hooks disabled via core.hooksPath
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: text
      substr: '"core.hooksPath=/dev/null"'

  - id: git-terminal-prompt-disabled-env-token
    desc: Git terminal prompt disabled environment token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: string_literal
      exact: GIT_TERMINAL_PROMPT

  - id: git-askpass-disabled-env-token
    desc: Git askpass disabled environment token
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    crit: component
    if:
      type: string_literal
      exact: GIT_ASKPASS

composite_rules:
  - id: python-git-hook-install
    desc: Python installs an executable Git hook
    crit: notable
    conf: 0.96
    all:
      - id: python-git-hook-write
      - id: python-git-hook-chmod

  - id: subprocess-git-clone-argv
    desc: Python subprocess invokes git clone
    crit: notable
    conf: 0.9
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: git-clone-argv-token
      - id: git-no-tags-argv-token

  - id: subprocess-git-clone-hooks-disabled
    desc: Python subprocess invokes git clone with hooks disabled
    crit: notable
    conf: 0.9
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: subprocess-git-clone-argv
      - id: git-hooks-disabled-config-token

  - id: subprocess-git-noninteractive-clone
    desc: Python subprocess runs git clone with credential prompts disabled
    crit: notable
    conf: 0.88
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: subprocess-git-clone-argv
      - id: git-terminal-prompt-disabled-env-token
      - id: git-askpass-disabled-env-token

  - id: subprocess-git-fetch-origin-argv
    desc: Python subprocess fetches from git origin
    crit: notable
    conf: 0.86
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: git-fetch-origin-argv-token

  - id: subprocess-git-reset-hard-argv
    desc: Python subprocess hard-resets git checkout
    crit: notable
    conf: 0.88
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: git-reset-hard-argv-token

  - id: subprocess-git-fetch-reset-workflow
    desc: Python subprocess fetches and hard-resets git checkout
    crit: notable
    conf: 0.9
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    all:
      - id: subprocess-git-fetch-origin-argv
      - id: subprocess-git-reset-hard-argv

  - id: python-git-knowledge-sync
    desc: Python pulls, stages, and commits Git knowledge
    crit: notable
    conf: 0.97
    all:
      - id: python-subprocess-git-pull
      - id: python-subprocess-git-add
      - id: python-subprocess-git-commit
