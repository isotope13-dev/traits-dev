defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: create-process-as-user
    desc: CreateProcessAsUser API reference
    attack: T1134
    crit: notable
    if:
      type: symbol
      regex: ^CreateProcessAsUser[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/tool/sysadmin/sysinternals/
      - id: well-known/tool/sysadmin/sysinternals/
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: create-process-with-token
    desc: CreateProcessWithToken API reference
    attack: T1134
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ^CreateProcessWithToken[AW]$
      case_insensitive: true
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/signed/leaf::microsoft-corporation
  - id: create-process-with-token-source
    desc: CreateProcessWithToken API in Rust source
    for: [rust]
    attack: T1134
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: CreateProcessWithToken
  - id: winsta0-default
    desc: 'refs default interactive window station'
    crit: suspicious
    if:
      type: text
      regex: winsta0\\\\default
      case_insensitive: true
