defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: create-process-as-user
    desc: CreateProcessAsUser API reference
    attack: T1134
    crit: suspicious
    if:
      type: symbol
      regex: ^CreateProcessAsUser[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-embedded-component
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: create-process-with-token
    desc: CreateProcessWithToken API reference
    attack: T1134
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: ^CreateProcessWithToken[AW]$
      case_insensitive: true
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/leaf::microsoft-corporation
  - id: winsta0-default
    desc: References default interactive window station (winsta0\default)
    crit: suspicious
    if:
      type: text
      regex: winsta0\\\\default
      case_insensitive: true
