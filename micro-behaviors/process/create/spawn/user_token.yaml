defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: create-process-as-user
    desc: CreateProcessAsUser API reference
    attack: T1134
    crit: suspicious
    if:
      type: text
      regex: CreateProcessAsUser[AW]?
      case_insensitive: true
    unless:
      - id: metadata/binary/metrics::many-exports-100
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-embedded-component
      # Go's `golang.org/x/sys/windows` statically links `CreateProcessAsUserW`
      # for any Go Windows binary that imports the stdlib `syscall` package —
      # the API is present regardless of program behavior. Match Go runtime
      # presence as a signal that the string is a stdlib artifact, not a
      # deliberate "CreateProcessAsUser" call site.
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: create-process-with-token
    desc: CreateProcessWithToken API reference
    attack: T1134
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: ^CreateProcessWithToken[AW]$
      case_insensitive: true
    unless:
      - id: metadata/binary/metrics::many-exports-100
  - id: winsta0-default
    desc: References default interactive window station (winsta0\default)
    crit: suspicious
    if:
      type: text
      regex: winsta0\\\\default
      case_insensitive: true
