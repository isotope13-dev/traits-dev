defaults:
  platforms: [windows, unix]
traits:
  - id: start
    desc: Process execution via Process.Start
    crit: notable
    mbc: OB0006
    attack: T1059
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: Process.Start
    for:
      - csharp
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
  - id: process-token-dotnet
    desc: .NET Process type token
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: ProcessStartInfo
    for:
      - pe
  - id: use-shell-execute-property
    desc: .NET UseShellExecute property setter
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: set_UseShellExecute
    for:
      - pe
      - dll
  - id: redirect-standard-output-dotnet
    desc: .NET child stdout capture and redirection
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(RedirectStandardOutput\s*=\s*true|set_RedirectStandardOutput|StandardOutput\.ReadToEnd)'
    for:
      - pe
      - csharp
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
  - id: redirect-standard-input-dotnet
    desc: .NET child stdin redirection
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: set_RedirectStandardInput
    for:
      - pe
  - id: redirect-standard-error-dotnet
    desc: .NET child stderr redirection
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: set_RedirectStandardError
    for:
      - pe
  - id: start-token-dotnet
    desc: .NET Process.Start token
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\bProcess\.Start\b
    for:
      - pe
    unless:
      - id: metadata/binary/metrics/structural::no-imports
  - id: diagnostics-namespace-dotnet
    desc: .NET process namespace token
    crit: component
    conf: 0.75
    if:
      type: text
      substr: System.Diagnostics.Process
    for:
      - pe
  - id: startup-path-dotnet
    desc: .NET StartupPath property token
    crit: baseline
    conf: 0.75
    if:
      type: text
      substr: get_StartupPath
    for:
      - pe
  - id: start-info
    desc: Process start configuration
    crit: notable
    mbc: OB0006
    attack: T1059
    conf: 0.85
    if:
      type: symbol

      kind: call

      regex: '(^|\\.)ProcessStartInfo$'
    for:
      - csharp
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
  - id: current-process
    desc: Acquires handle to current process
    crit: notable
    mbc: OB0006
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: GetCurrentProcess
    for:
      - csharp
  - id: terminate
    desc: Process termination via Kill()
    crit: suspicious
    mbc: E1562
    attack: T1562
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: .Kill(
    for:
      - csharp
  - id: vbnet-latebound-process-start
    desc: VB.NET late-bound Process.Start
    crit: notable
    mbc: B0003
    attack: T1059
    conf: 0.94
    if:
      type: text
      regex: 'typeof\s*\(\s*Process\s*\).{0,40}"Start"'
    for:
      - csharp
composite_rules:
  - id: dotnet-redirected-stdio
    desc: .NET child process stdio redirection
    crit: notable
    conf: 0.88
    for:
      - pe
    all:
      - id: process-token-dotnet
      - id: redirect-standard-output-dotnet
    any:
      - id: redirect-standard-input-dotnet
      - id: redirect-standard-error-dotnet
      - id: start-token-dotnet
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: dotnet-process-start-tokenized
    desc: .NET tokenized Process.Start pattern
    crit: notable
    conf: 0.8
    for:
      - pe
    all:
      - id: process-token-dotnet
      - id: start-token-dotnet
      - id: diagnostics-namespace-dotnet
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
  - id: dotnet-process-start-split-tokens
    desc: .NET split Process.Start tokens
    crit: notable
    conf: 0.78
    for:
      - pe
    all:
      - id: metadata/lang/compiler/managed::diagnostics-namespace
      - id: metadata/file/string/artifact::process-word-token
      - id: start-token-dotnet
      - id: metadata/binary/framework::dotnet-assembly
