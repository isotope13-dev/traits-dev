# C# Process Execution Traits
# objective: exec, behavior: process
traits:
  - id: start
    desc: Process execution via Process.Start
    crit: suspicious
    mbc: "OB0006"
    attack: "T1059"
    conf: 0.95
    if:
      type: ast
      kind: call
      exact: "Process.Start"
    for: [csharp]
  - id: process-token-dotnet
    desc: .NET Process type token
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: "(?i)(System\\.Diagnostics\\.Process|\\bProcessStartInfo\\b)"
    for: [pe, dll]
  - id: start-token-dotnet
    desc: .NET Start method token
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: "(?i)(\\bProcessStartInfo\\b|\\bSystem\\.Diagnostics\\.Process\\b)"
    for: [pe, dll]
    unless:
      # Only meaningful in .NET binaries - skip native PEs
      - id: metadata/format::no-imports
  - id: diagnostics-namespace-dotnet
    desc: .NET System.Diagnostics namespace token
    crit: component
    conf: 0.75
    if:
      type: raw
      substr: "System.Diagnostics"
    for: [pe, dll]
  - id: startup-path-dotnet
    desc: .NET StartupPath property token
    crit: notable
    conf: 0.75
    if:
      type: raw
      substr: "get_StartupPath"
    for: [pe, dll]
  - id: start-info
    desc: Process start configuration
    crit: notable
    mbc: "OB0006"
    attack: "T1059"
    conf: 0.85
    if:
      type: ast
      node: object_creation_expression
      exact: "ProcessStartInfo"
    for: [csharp]
  - id: current-process
    desc: Acquires handle to current process
    crit: notable
    mbc: "OB0006"
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: "GetCurrentProcess"
    for: [csharp]
  - id: terminate
    desc: Process termination via Kill()
    crit: suspicious
    mbc: "E1562"
    attack: "T1562"
    conf: 0.95
    if:
      type: ast
      kind: call
      exact: ".Kill("
    for: [csharp]
composite_rules:
  - id: dotnet-process-start-tokenized
    desc: .NET tokenized Process.Start pattern
    crit: notable
    conf: 0.8
    for: [pe, dll]
    all:
      - id: process-token-dotnet
      - id: start-token-dotnet
      - id: diagnostics-namespace-dotnet
