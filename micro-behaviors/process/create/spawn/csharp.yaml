defaults:
  platforms: [windows, unix]
traits:
  - id: start
    desc: Process execution via Process.Start
    crit: suspicious
    mbc: OB0006
    attack: T1059
    conf: 0.95
    if:
      type: ast
      kind: call
      exact: Process.Start
    for:
      - csharp
  - id: process-token-dotnet
    desc: .NET Process type token
    crit: component
    conf: 0.7
    if:
      type: text
      substr: ProcessStartInfo
    for:
      - pe
  - id: redirect-standard-output-dotnet
    desc: .NET child stdout redirection
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: set_RedirectStandardOutput
    for:
      - pe
  - id: redirect-standard-input-dotnet
    desc: .NET child stdin redirection
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: set_RedirectStandardInput
    for:
      - pe
  - id: start-token-dotnet
    desc: .NET Process.Start token
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: (?i)\bProcess\.Start\b
    for:
      - pe
    unless:
      - id: metadata/binary/metrics::no-imports
  - id: diagnostics-namespace-dotnet
    desc: .NET process namespace token
    crit: component
    conf: 0.75
    if:
      type: text
      substr: System.Diagnostics.Process
    for:
      - pe
  - id: diagnostics-namespace-token-dotnet
    desc: .NET Diagnostics namespace token
    crit: component
    conf: 0.65
    if:
      type: text
      exact: System.Diagnostics
    for:
      - pe
  - id: process-class-token-dotnet
    desc: .NET Process class token
    crit: component
    conf: 0.6
    if:
      type: text
      exact: Process
    for:
      - pe
  - id: start-method-token-dotnet
    desc: .NET Start method token
    crit: component
    conf: 0.55
    if:
      type: text
      exact: Start
    for:
      - pe
  - id: startup-path-dotnet
    desc: .NET StartupPath property token
    crit: baseline
    conf: 0.75
    if:
      type: text
      substr: get_StartupPath
    for:
      - pe
  - id: start-info
    desc: Process start configuration
    crit: notable
    mbc: OB0006
    attack: T1059
    conf: 0.85
    if:
      type: ast
      node: object_creation_expression
      exact: ProcessStartInfo
    for:
      - csharp
  - id: current-process
    desc: Acquires handle to current process
    crit: notable
    mbc: OB0006
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: GetCurrentProcess
    for:
      - csharp
  - id: terminate
    desc: Process termination via Kill()
    crit: suspicious
    mbc: E1562
    attack: T1562
    conf: 0.95
    if:
      type: ast
      kind: call
      exact: .Kill(
    for:
      - csharp
composite_rules:
  - id: dotnet-redirected-stdio
    desc: .NET child process stdio redirection
    crit: suspicious
    conf: 0.88
    for:
      - pe
    all:
      - id: process-token-dotnet
      - id: redirect-standard-output-dotnet
    any:
      - id: redirect-standard-input-dotnet
      - id: start-token-dotnet
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: dotnet-process-start-tokenized
    desc: .NET tokenized Process.Start pattern
    crit: notable
    conf: 0.8
    for:
      - pe
    all:
      - id: process-token-dotnet
      - id: start-token-dotnet
      - id: diagnostics-namespace-dotnet
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
  - id: dotnet-process-start-split-tokens
    desc: .NET split Process.Start tokens
    crit: notable
    conf: 0.78
    for:
      - pe
    all:
      - id: diagnostics-namespace-token-dotnet
      - id: process-class-token-dotnet
      - id: start-method-token-dotnet
      - id: metadata/binary/framework::dotnet-assembly
