defaults:
  attack: T1059
  mbc: E1203
  platforms:
    - unix
    - windows
  for:
    - java
    - class
traits:
  - id: java-runtime-exec-source
    desc: Java Runtime.exec() call in source
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Runtime.getRuntime().exec
  - id: java-processbuilder-source
    desc: Java ProcessBuilder usage in source
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: new ProcessBuilder
