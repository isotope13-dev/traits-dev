# Node.js Process Spawning Capabilities
# Capabilities related to child_process.spawn() and process management
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  # === Detached spawn execution indicators ===
  - id: detached-true
    desc: Detached process spawn option
    crit: notable
    conf: 0.85
    mbc: "F0011"
    attack: "T1059"
    if:
      type: text
      regex: 'detached\s*:\s*true'
  - id: detached-dynamic
    desc: Detached spawn with dynamic value
    crit: notable
    conf: 0.8
    mbc: "F0011"
    attack: "T1059"
    if:
      type: text
      regex: 'detached\s*:\s*process\.'
  - id: windowshide-option
    desc: windowsHide option
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'windowsHide\s*:\s*true'
  - id: windowshide-obfuscated-true
    desc: windowsHide set via obfuscated true
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'windowsHide[''"]\s*:\s*!\s*!\s*\[\s*\]'
  - id: shell-false
    desc: "shell: false option"
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: 'shell\s*:\s*false'
  - id: shell-true
    desc: "shell: true option"
    crit: notable
    conf: 0.9
    attack: "T1059"
    if:
      type: text
      regex: 'shell\s*:\s*true'
  - id: shell-obfuscated-dynamic
    desc: "shell option via obfuscated alias"
    crit: notable
    conf: 0.9
    attack: "T1059"
    if:
      type: text
      regex: 'shell[''"]\s*:\s*_0x[a-fA-F0-9]{4,}\['
  # === Silent I/O patterns ===
  - id: stdio-ignore
    desc: stdio set to ignore
    crit: notable
    conf: 0.85
    mbc: "F0005"
    if:
      type: text
      regex: "stdio\\s*:\\s*(\\[[^\\]]{0,220}['\"]ignore['\"]|['\"]ignore['\"])"
  # === Orphan process patterns ===
  - id: child-unref-call
    desc: child.unref() orphan process call
    crit: notable
    conf: 0.85
    mbc: "F0011"
    if:
      type: text
      regex: '\bchild\.unref\(\)'
  # === Shell spawn patterns ===
  - id: spawn-bash
    desc: Spawns bash shell process
    crit: notable
    conf: 0.85
    mbc: "C0017"
    attack: "T1059.004"
    if:
      type: text
      regex: "spawn\\(['\"]bash['\"]"
  - id: child-process-member-spawn
    desc: child_process alias spawn call
    crit: component
    conf: 0.85
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            property: (property_identifier) @prop
          )
          (#eq? @prop "spawn")
        )
  # === Node.js self-execution ===
  - id: process-execpath-spawn
    desc: Spawn using process.execPath
    crit: notable
    conf: 0.9
    mbc: "B0024"
    attack: "T1059.007"
    unless:
      - id: metadata/package/testing/harness::test-basename-spec
    if:
      type: text
      substr: "process.execPath"
composite_rules:
  - id: child-process-alias-spawn
    desc: Node.js child_process alias spawn
    crit: notable
    conf: 0.85
    mbc: C0017
    all:
      - id: metadata/import/builtin::require-child-process
      - id: child-process-member-spawn
