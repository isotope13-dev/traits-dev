# Node.js Process Spawning Capabilities
# Capabilities related to child_process.spawn() and process management
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  # === Detached spawn execution indicators ===
  - id: detached-true
    desc: Detached process spawn option
    crit: notable
    conf: 0.85
    mbc: "F0011"
    attack: "T1059"
    if:
      type: text
      regex: 'detached\s*:\s*true'
  - id: detached-dynamic
    desc: Detached spawn with dynamic value
    crit: notable
    conf: 0.8
    mbc: "F0011"
    attack: "T1059"
    if:
      type: text
      regex: 'detached\s*:\s*process\.'
  - id: windowshide-option
    desc: windowsHide option
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'windowsHide\s*:\s*true'
  - id: windowshide-obfuscated-true
    desc: windowsHide set via obfuscated true
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'windowsHide[''"]\s*:\s*!\s*!\s*\[\s*\]'
  - id: windowshide-obfuscated-expression
    desc: windowsHide set via expression
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '[''"]?windowsHide[''"]?\s*:\s*!\s*\([^)]{1,120}\)'
  - id: shell-false
    desc: "shell: false option"
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: 'shell\s*:\s*false'
  - id: shell-true
    desc: "shell: true option"
    crit: notable
    conf: 0.9
    attack: "T1059"
    if:
      type: text
      regex: 'shell\s*:\s*true'
  - id: shell-obfuscated-dynamic
    desc: "shell option via obfuscated alias"
    crit: notable
    conf: 0.9
    attack: "T1059"
    if:
      type: text
      regex: 'shell[''"]\s*:\s*_0x[a-fA-F0-9]{4,}\['
  # === Silent I/O patterns ===
  - id: stdio-ignore
    desc: stdio set to ignore
    crit: notable
    conf: 0.85
    mbc: "F0005"
    if:
      type: text
      regex: "stdio\\s*:\\s*(\\[[^\\]]{0,220}['\"]ignore['\"]|['\"]ignore['\"])"
  # === Orphan process patterns ===
  - id: child-unref-call
    desc: child.unref() orphan process call
    crit: notable
    conf: 0.85
    mbc: "F0011"
    if:
      type: text
      regex: '\bchild\.unref\(\)'
  - id: unref-call
    desc: Process handle unref() call
    crit: notable
    conf: 0.8
    # Require a real receiver before the dot (identifier, `)`, or `]`) so the
    # Vue/`...unref(x)` reactivity-helper spread — where the preceding char is
    # the second `.` of `...` — does not register as a process-handle call.
    if:
      type: text
      regex: '[\w$)\]]\s*\.\s*unref\s*\('
  # === Shell spawn patterns ===
  - id: spawn-bash
    desc: Spawns bash shell process
    crit: notable
    conf: 0.85
    mbc: "C0017"
    attack: "T1059.004"
    if:
      type: text
      regex: "spawn\\(['\"]bash['\"]"
  - id: child-process-member-spawn
    desc: Node child_process spawns external process
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/library/structure::js-known-bundler-output
    if:
      # Migrated from a tree-sitter call query to a `kind: call`
      # match on the pre-extracted call fact (no per-member
      # tree-sitter cursor walk; same call-name semantics).
      type: symbol
      kind: call
      regex: '\.spawn$'
  # === Node.js self-execution ===
  - id: process-execpath-spawn
    desc: Spawn using process.execPath
    crit: notable
    conf: 0.9
    mbc: "B0024"
    attack: "T1059.007"
    unless:
      - id: metadata/package/testing/harness/runtime::test-basename-spec
    if:
      type: text
      substr: "process.execPath"
  - id: process-argv-slice-self-reexec
    desc: Self re-exec via process.argv.slice(1)
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'process\.argv\s*\.\s*slice\s*\(\s*1\s*\)'
  - id: process-env-daemonized-flag
    desc: __DAEMONIZED environment flag
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "__DAEMONIZED"
  - id: node-java-process-target
    desc: Node targets Java launcher process
    crit: notable
    conf: 0.86
    attack: "T1059.007"
    if:
      type: text
      regex: 'spawn\s*\([^)]{0,160}(javaw?\.exe|javaw?[''"])'
  - id: node-jar-launch-argument
    desc: Node passes Java JAR argument
    crit: notable
    conf: 0.88
    attack: "T1059.007"
    if:
      type: text
      regex: '[''"]-jar[''"]|[^\w]-jar\s+[^''"\s]{1,160}\.jar'
  - id: node-lazy-daemon-entry-resolution
    desc: Node lazy daemon entry resolution
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'resolveDefaultBrokerEntry|brokerEntry\s*\?\?|fileURLToPath\s*\(\s*import\.meta\.url\s*\)'
  - id: node-bearer-health-probe
    desc: Node bearer-authenticated health probe
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'fetch\s*\([^;]{0,500}/health[^;]{0,500}Authorization\s*:'
  - id: fork-call
    desc: child_process fork of a script path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bfork\(\s*(path\b|__dirname|["\x27\x60])'
composite_rules:
  - id: detached-ignored-unref-spawn
    desc: Detached ignored unref spawn
    crit: notable
    conf: 0.9
    all:
      - id: detached-true
      - id: stdio-ignore
    any:
      - id: child-unref-call
      - id: unref-call
      - id: windowshide-option
  # A detached fork survives the parent and runs an independent script — unlike
  # a normal worker/fork pool, which stays attached. `silent`/`stdio:'ignore'`
  # further hides its output. This is the fork-based sibling of the spawn combo.
  - id: detached-fork
    desc: Detached fork of a script
    crit: notable
    conf: 0.9
    near_lines: 8
    all:
      - id: fork-call
      - id: detached-true
  - id: node-lazy-daemon-spawn
    desc: Node lazy daemon spawn
    crit: notable
    conf: 0.9
    all:
      - id: detached-ignored-unref-spawn
      - id: node-lazy-daemon-entry-resolution
    any:
      - id: process-execpath-spawn
      - id: node-bearer-health-probe
  - id: child-process-alias-spawn
    desc: Node.js child_process alias spawn
    crit: notable
    conf: 0.85
    mbc: C0017
    all:
      - id: metadata/import/builtin::require-child-process
      - id: child-process-member-spawn
  - id: detached-self-reexec
    desc: Detached self re-exec behavior
    crit: suspicious
    conf: 0.94
    all:
      - id: process-env-daemonized-flag
      - id: micro-behaviors/os/env/vars/access::js-process-env-spread
