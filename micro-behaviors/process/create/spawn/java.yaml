defaults:
  platforms: [windows, unix, android]
  attack: T1059
  mbc: E1203
  for:
    - java
    - class
    - apk
    - zip
traits:
  - id: java-runtime-exec
    desc: Java Runtime exec for command execution
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: java.lang.Runtime.exec
  - id: java-processbuilder
    desc: Java ProcessBuilder for process creation
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: java.lang.ProcessBuilder
  - id: java-process-management-class
    desc: Java process management classes in obfuscated code
    crit: suspicious
    conf: 0.8
    for: [class]
    count_min: 1
    if:
      type: text
      regex: '[Mm]anager.{0,50}\.class'
  - id: java-process-destruction
    desc: Java process termination
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .destroy(
  - id: java-processbuilder-bytecode
    desc: Java bytecode ProcessBuilder reference
    crit: notable
    conf: 0.88
    for: [class, jar, zip, apk]
    if:
      type: text
      substr: java/lang/ProcessBuilder
  - id: java-runtime-exec-bytecode-symbol
    desc: Java bytecode Runtime.exec call
    crit: notable
    conf: 0.95
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/Runtime.exec
  - id: java-runtime-getruntime-bytecode-symbol
    desc: Java bytecode Runtime accessor
    crit: component
    conf: 0.92
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/Runtime.getRuntime
  - id: java-processbuilder-start-bytecode-symbol
    desc: Java bytecode ProcessBuilder start
    crit: notable
    conf: 0.95
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/ProcessBuilder.start
  - id: java-processbuilder-init-bytecode-symbol
    desc: Java bytecode ProcessBuilder constructor
    crit: component
    conf: 0.92
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/ProcessBuilder.<init>
  - id: java-runtime-class
    desc: Java Runtime class reference
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "java/lang/Runtime"
  - id: java-getruntime-ref
    desc: Java getRuntime call reference
    crit: component
    conf: 0.84
    if:
      type: text
      word: getRuntime
  - id: java-exec-ref
    desc: Java Runtime exec launches command
    crit: notable
    conf: 0.8
    if:
      type: text
      word: exec
composite_rules:
  - id: java-runtime-exec-bytecode
    desc: Java bytecode Runtime exec chain
    crit: notable
    conf: 0.92
    all:
      - id: java-runtime-class
      - id: java-getruntime-ref
      - id: java-exec-ref
  - id: java-processbuilder-start-bytecode
    desc: Java bytecode ProcessBuilder execution
    crit: notable
    conf: 0.94
    all:
      - id: java-processbuilder-init-bytecode-symbol
      - id: java-processbuilder-start-bytecode-symbol
  - id: java-process-manipulation
    desc: Java process manipulation pattern
    crit: suspicious
    conf: 0.88
    all:
      - id: java-process-management-class
    any:
      - id: java-runtime-exec
      - id: java-runtime-exec-bytecode-symbol
      - id: java-runtime-exec-bytecode
      - id: java-processbuilder
      - id: java-processbuilder-start-bytecode
