defaults:
  platforms: [windows, unix]
  for:
    - go
traits:
  - id: setuid
    desc: Change user/group ID
    crit: notable
    conf: 0.95
    attack: T1548.001
    if:
      type: string_literal
      regex: syscall\.Set(u|g)id
  - id: symlink-dup
    desc: Create symbolic links
    crit: notable
    conf: 0.8
    attack: T1574.006
    if:
      type: string_literal
      substr: os.Symlink
  - id: manipulate
    desc: Process manipulation
    crit: notable
    conf: 0.85
    attack: T1055
    if:
      type: string_literal
      regex: (os\.FindProcess|syscall\.Kill)
  - id: lifecycle
    desc: Set finalizer hooks
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: runtime.SetFinalizer
