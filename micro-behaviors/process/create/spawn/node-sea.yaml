# Process-launching primitives in a Node SEA payload
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: node-sea-hidden-spawn
    desc: Hidden child spawn
    crit: notable
    conf: 0.98
    if:
      type: raw
      regex: 'stdio:"ignore"[\s\S]{0,100}windowsHide:!?0'

  - id: node-sea-detached-spawn
    desc: Detached child spawn
    crit: notable
    conf: 0.98
    if:
      type: raw
      regex: 'stdio:"ignore"[\s\S]{0,100}detached:!?0'

  - id: node-sea-executable-launch
    desc: Launches discovered .exe
    crit: notable
    conf: 0.97
    if:
      type: raw
      regex: 'endsWith\("\.exe"\)[\s\S]{0,800}(spawn|tt)\('

composite_rules:
  - id: node-sea-hidden-detached-spawn
    desc: Hidden detached child spawn
    crit: notable
    conf: 0.99
    all:
      - id: node-sea-hidden-spawn
      - id: node-sea-detached-spawn
