# Process Creation
# Creating and managing processes
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Process Creation ===
  - id: java-exe-classpath-launch
    desc: "Native launch of java.exe with classpath"
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: 'java\.exe\s+-cp\b'
  - id: create-process-a
    desc: Create process (ANSI)
    crit: notable
    conf: 0.95
    attack: "T1106"
    for: [pe, dll, c, cpp]
    if:
      type: symbol
      exact: "CreateProcessA"
  - id: create-process-w
    desc: Create process (Unicode)
    crit: notable
    conf: 0.95
    attack: "T1106"
    for: [pe, dll, c, cpp, rust]
    if:
      type: symbol
      exact: "CreateProcessW"
  - id: create-process-source
    desc: CreateProcess usage in source
    crit: notable
    conf: 0.9
    attack: "T1106"
    for: [c, cpp]
    if:
      type: text
      word: "CreateProcess"
  - id: init-proc-thread-attribute-list
    desc: Initialize process attribute list
    crit: notable
    conf: 0.95
    attack: "T1134"
    if:
      type: symbol
      exact: "InitializeProcThreadAttributeList"
  - id: update-proc-thread-attribute
    desc: Update process attribute list
    crit: notable
    conf: 0.95
    attack: "T1134"
    if:
      type: symbol
      exact: "UpdateProcThreadAttribute"
  - id: open-process
    desc: Open process handle
    crit: notable
    conf: 0.95
    attack: "T1106"
    for: [pe, dll, c, cpp, rust]
    if:
      type: symbol
      exact: "OpenProcess"
    unless:
      - id: well-known/game/mod::bedrockboot-preload-injector-pdb
  - id: open-process-script
    desc: OpenProcess API reference in script
    crit: notable
    conf: 0.92
    attack: T1106
    for: [powershell, batch, vbs, javascript]
    if:
      type: text
      word: OpenProcess
  - id: close-handle-dup
    desc: Close handle
    crit: baseline
    conf: 0.90
    for: [pe, dll, c, cpp]
    if:
      type: text
      word: "CloseHandle"
  - id: wait-for-single-object
    desc: Wait for process/object
    crit: baseline
    conf: 0.90
    for: [pe, dll, c, cpp]
    if:
      type: text
      word: "WaitForSingleObject"
  - id: get-exit-code-process
    desc: Get process exit code
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "GetExitCodeProcess"
  - id: wspawnl
    desc: Spawn process via _wspawnl
    crit: notable
    conf: 0.92
    attack: "T1106"
    if:
      type: symbol
      exact: "_wspawnl"
  - id: wspawnvpe
    desc: Spawn process via _wspawnvpe
    crit: notable
    conf: 0.92
    attack: "T1106"
    if:
      type: symbol
      exact: "_wspawnvpe"
  - id: wexecve
    desc: Replace process image via _wexecve
    crit: notable
    conf: 0.9
    attack: "T1106"
    if:
      type: symbol
      exact: "_wexecve"
composite_rules:
  - id: wide-spawn-or-exec
    desc: Wide-character spawn or exec primitive
    crit: notable
    conf: 0.9
    any:
      - id: wspawnl
      - id: wspawnvpe
      - id: wexecve
  - id: proc-thread-attribute-list
    desc: Extended process startup attributes
    crit: notable
    conf: 0.96
    all:
      - id: init-proc-thread-attribute-list
      - id: update-proc-thread-attribute
