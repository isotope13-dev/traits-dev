# Node.js Spawn with Eval (-e flag)
# Detects spawning node with inline code execution
defaults:
  platforms: [windows, unix]
  attack: T1059.007
  mbc: C0017
  for: [javascript, typescript]
traits:
  - id: node-eval-signal-test-fixture
    desc: Node eval signal-handling test fixture
    crit: component
    if:
      type: text
      substr: "SIGINT in parent"
  - id: spawn-node-eval
    desc: Spawns node with -e inline code
    # Inline Node code is a process-creation capability.  Build tools and
    # daemon managers use it legitimately; hostile staging requires the
    # surrounding fetch/decode/payload evidence supplied by objective rules.
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "spawn\\s*\\(\\s*['\"]node['\"]\\s*,\\s*\\[[^\\]]{0,60}['\"]\\s*-e['\"]"
    unless:
      - id: node-eval-signal-test-fixture
      - type: basename
        regex: '\.(test|spec)\.[cm]?[jt]sx?$'
      - type: text
        substr: ".test."
      - type: text
        substr: "describe("
  - id: spawn-node-eval-var
    desc: Spawns node -e with variable code
    # A variable inline script is still not hostile by itself: CLI generators
    # commonly construct daemon wrappers this way.
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "spawn\\s*\\(\\s*['\"]node['\"]\\s*,\\s*\\[\\s*['\"]\\s*-e['\"]\\s*,"
    unless:
      - id: node-eval-signal-test-fixture
      - type: basename
        regex: '\.(test|spec)\.[cm]?[jt]sx?$'
      - type: text
        substr: ".test."
      - type: text
        substr: "describe("
