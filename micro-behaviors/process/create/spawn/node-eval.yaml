# Node.js Spawn with Eval (-e flag)
# Detects spawning node with inline code execution
defaults:
  attack: T1059.007
  mbc: C0017
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: spawn-node-eval
    desc: Spawns node with -e inline code
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: "spawn\\s*\\(\\s*['\"]node['\"]\\s*,\\s*\\[[^\\]]{0,60}['\"]\\s*-e['\"]"
    not:
      - substr: "SIGINT in parent"
  - id: spawn-node-eval-var
    desc: Spawns node -e with variable code
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: "spawn\\s*\\(\\s*['\"]node['\"]\\s*,\\s*\\[\\s*['\"]\\s*-e['\"]\\s*,"
    not:
      - substr: "SIGINT in parent"
