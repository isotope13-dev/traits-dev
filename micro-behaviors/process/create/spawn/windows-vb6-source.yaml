defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1106
traits:
  - id: create-process-a-vb6
    desc: VB6 CreateProcessA declare
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: CreateProcessA Lib "kernel32"
  - id: create-process-call-vb6
    desc: VB6 CreateProcessA call site
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: CreateProcessA sHost
composite_rules:
  - id: create-process-vb6
    desc: VB6 process creation primitive
    crit: baseline
    conf: 0.94
    any:
      - id: create-process-a-vb6
      - id: create-process-call-vb6
