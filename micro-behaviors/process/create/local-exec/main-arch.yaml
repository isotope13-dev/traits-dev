defaults:
  platforms: [unix, android]
  for: [shell, scripts, binaries]

traits:
  - id: main-short-payload-name
    desc: Short main_ payload basename
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '\bmain_[a-z0-9]{2,5}\b'
    unless:
      - id: metadata/package/testing/

  - id: main-short-payload-run
    desc: Runs local short-suffix main executable
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '\./main_[a-z0-9]{2,5}\b'
