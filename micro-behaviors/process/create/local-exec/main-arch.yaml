defaults:
  platforms: [unix, android]
  for: [shell, scripts, binaries]

traits:
  - id: main-arch-payload-name
    desc: main_* architecture payload name
    crit: component
    conf: 0.96
    if:
      type: text
      substr: 'main_'
    unless:
      - id: metadata/package/testing/

  - id: main-arch-local-run
    desc: main_* payload local execution
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: './main_'
