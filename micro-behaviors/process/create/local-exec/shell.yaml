defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: local-execution
    desc: "Executes a file from current directory"
    crit: notable
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*\./["''\.\w\$][^\s;&|]{0,80}'
    not:
      - regex: '\./(usr|etc|var|boot|bin|lib)/'
      - regex: '(?i)\.(cfg|conf|pem|log|txt|md)(\s|$)'
    downgrade:
      any:
        - id: metadata/package/testing/presence::freebsd-pjdfstest-shell
    unless:
      - id: metadata/package/tooling::autoconf-generated-script
  - id: tmp-path-execution
    desc: "Executes a file from temp path"
    crit: notable
    conf: 0.8
    attack: T1059.004
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*/(tmp|var/tmp|dev/shm)/["''.\w$][^\s;&|]{0,80}'
  - id: background-local-exec
    desc: "Executes local file in background (& operator)"
    crit: notable
    conf: 0.85
    attack: T1059.004
    if:
      type: text
      regex: '(?m)\./["''\.\w\$][^\n;&]{0,80}\s+&\s*$'
    downgrade:
      any:
        - id: metadata/package/testing/presence::freebsd-pjdfstest-shell
