defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: local-execution
    desc: "Executes a file from current directory"
    crit: notable
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*\./["''\.\w\$][^\s;&|]{0,80}'
    not:
      - regex: '\./(usr|etc|var|boot|bin|lib)/'
      - regex: '(?i)\.(cfg|conf|pem|log|txt|md)(\s|$)'
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
    unless:
      - id: metadata/build/autotools::autoconf-generated-script
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
  - id: execute-dot-slash-var
    desc: Executes local variable path
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\./["'']?\$[A-Za-z_]\w*["'']?'
  - id: execute-dot-slash-literal
    desc: Executes local literal path
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*\./[A-Za-z0-9._-]{2,32}\b'
  - id: tmp-path-execution
    desc: "Executes a file from temp path"
    crit: notable
    conf: 0.8
    attack: T1059.004
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*/(tmp|var/tmp|dev/shm)/["''.\w$][^\s;&|]{0,80}'
  - id: background-local-exec
    desc: "Executes local file in background (& operator)"
    crit: notable
    conf: 0.85
    attack: T1059.004
    if:
      type: text
      regex: '(?m)\./["''\.\w\$][^\n;&]{0,80}\s+&\s*$'
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
composite_rules:
  - id: chmod-exec-var-local
    desc: chmod then executes local variable
    crit: notable
    conf: 0.9
    attack: T1222.002
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-var-target
      - id: execute-dot-slash-var
    near_bytes: 180
  - id: chmod-exec-literal-local
    desc: chmod then executes local literal
    crit: notable
    conf: 0.9
    attack: T1222.002
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-literal-target
      - id: execute-dot-slash-literal
    near_bytes: 180
