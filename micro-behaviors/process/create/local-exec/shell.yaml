defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: native-relative-executable-string
    desc: Relative executable path string
    crit: component
    conf: 0.88
    for: [elf]
    if:
      type: raw
      regex: '(?i)\./[A-Za-z0-9._-]{2,32}\b'

  - id: local-execution
    desc: "Local ./ file invocation"
    crit: notable
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*\./["''\.\w\$][^\s;&|]{0,80}'
    not:
      - regex: '\./(usr|etc|var|boot|bin|lib)/'
      - regex: '(?i)\.(cfg|conf|pem|log|txt|md)(\s|$)'
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
    unless:
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
      - id: metadata/build/autotools::autoconf-generated-script
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
  - id: local-executable-host-argument
    desc: Local executable receives host argument
    crit: notable
    conf: 0.92
    attack: T1059.004
    if:
      type: text
      regex: '(?m)^\s*\./[A-Za-z0-9._-]{2,64}\s+--host\s+\S+'
  - id: local-executable-user-argument
    desc: Local executable receives user argument
    crit: notable
    conf: 0.92
    attack: T1059.004
    if:
      type: text
      regex: '(?m)^\s*\./[A-Za-z0-9._-]{2,64}\s+--host\s+\S+\s+--user\s+\S+'
  - id: execute-dot-slash-var
    desc: Executes local variable path
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\./["'']?\$[A-Za-z_]\w*["'']?'
  - id: execute-dot-slash-literal
    desc: Executes a local relative file
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '^\./'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
  - id: tmp-path-execution
    desc: "Executes a file from temp path"
    crit: notable
    conf: 0.8
    attack: T1059.004
    unless:
      - id: metadata/package/files/system-package::zsh-function-script
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*/(tmp|var/tmp|dev/shm)/["''\.\w$][^\s;&|]{0,80}'
    not:
      - regex: '/(tmp|var/tmp|dev/shm)/[^\s;&|]*[<*?\[\](){}]'
  - id: background-tmp-execution
    desc: Backgrounds executable from temporary path
    crit: notable
    conf: 0.9
    attack: T1059.004
    if:
      type: text
      regex: '(?m)(^|[;&|]\s*)/(tmp|var/tmp|dev/shm)/["''\.\w$][^\n;&|]{0,80}\s+&\s*$'
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: background-local-exec
    desc: "Executes local file in background (& operator)"
    crit: notable
    conf: 0.85
    attack: T1059.004
    if:
      type: text
      regex: '(?m)\./["''\.\w\$][^\n;&]{0,80}\s+&\s*$'
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
  - id: pyproject-hidden-tmp-background-exec
    desc: PyProject backgrounds hidden temp executable
    crit: notable
    conf: 0.95
    for: [pyproject.toml]
    platforms: [linux, macos, windows]
    if:
      type: value
      path: tool.setuptools.cmdclass.build_py
      regex: '/tmp/\.[A-Za-z0-9_][A-Za-z0-9._-]*\s*&'
  - id: composer-hidden-tmp-background-exec
    desc: Composer hook backgrounds hidden temp executable
    crit: notable
    conf: 0.95
    for: [composer.json]
    platforms: [linux, macos, windows]
    if:
      type: value
      path: scripts.post-install-cmd[*]
      regex: '/tmp/\.[A-Za-z0-9_][A-Za-z0-9._-]*\s*&'
  - id: structured-hidden-tmp-background-exec
    desc: Structured command backgrounds hidden temp file
    crit: notable
    conf: 0.95
    for: [vbs, package-lock.json, plist]
    platforms: [linux, macos, windows]
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9_][A-Za-z0-9._-]*\s+(&|&amp;)'
  - id: hidden-tmp-background-exec
    desc: Backgrounds a hidden temporary executable
    crit: notable
    conf: 0.94
    for: [shell, php, applescript]
    if:
      type: text
      regex: '(?m)(^|[;&]\s*|nohup\s+)/(var/)?tmp/\.[A-Za-z0-9_][A-Za-z0-9._-]*[^;\n]{0,80}\s*&'
  - id: hidden-home-background-exec
    desc: Backgrounds a hidden home executable
    crit: notable
    conf: 0.94
    for: [shell, php]
    if:
      type: text
      regex: '(?m)(^|[;&]\s*)~/\.[A-Za-z0-9_][A-Za-z0-9._-]*[^;\n]{0,80}\s*&'
composite_rules:
  - id: local-executable-host-user-arguments
    desc: Local executable receives host and user
    crit: notable
    conf: 0.94
    attack: T1059.004
    all:
      - id: local-executable-host-argument
      - id: local-executable-user-argument
    near_lines: 1
  - id: chmod-exec-var-local
    desc: chmod then executes local variable
    crit: notable
    conf: 0.9
    attack: T1222.002
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-var-target
      - id: execute-dot-slash-var
    near_bytes: 180
  - id: chmod-exec-literal-local
    desc: chmod then executes local literal
    crit: notable
    conf: 0.9
    attack: T1222.002
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-literal-target
      - id: execute-dot-slash-literal
    near_bytes: 180
