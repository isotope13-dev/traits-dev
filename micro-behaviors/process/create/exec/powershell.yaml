# Process Creation in PowerShell
defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9
traits:
  - id: powershell-invoke-item
    desc: PowerShell opens an item with Invoke-Item
    if:
      type: text
      word: Invoke-Item
      case_insensitive: true
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: powershell-call-exe
    desc: PowerShell call operator launches an executable
    if:
      type: text
      regex: '(?i)&\s*["''][^"'']{1,120}\.exe\b'
