defaults:
  platforms: [unix, windows]
  attack: T1059
traits:
- id: exec-api-call
  desc: exec API call
  crit: notable
  conf: 0.85
  for: [python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '\bexec(File|Sync)?\s*\('
- id: spawn-api-call
  desc: spawn API call
  crit: notable
  conf: 0.85
  for: [python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '\bspawn(Sync)?\s*\('
- id: system-api-call
  desc: system API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, go, rust]
  if:
    type: symbol
    exact: system
- id: subprocess-api-call
  desc: subprocess API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '\bsubprocess\.(run|Popen|call)\s*\('
- id: rust-command-new-call
  desc: Rust Command::new call
  crit: component
  conf: 0.85
  for: [rust]
  if:
    type: text
    substr: 'Command::new('
- id: go-exec-command-call
  desc: Go exec.Command call
  crit: component
  conf: 0.85
  for: [go]
  if:
    type: text
    substr: 'exec.Command('
