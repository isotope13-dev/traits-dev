defaults:
  platforms: [unix, windows]
  attack: T1059
traits:
- id: node-promisified-exec
  desc: Node promisifies the shell exec API
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: call
    exact: promisify
    arg:
      kind: identifier
      name: exec
- id: node-promisified-exec-file
  desc: Node promisifies the file exec API
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: call
    exact: promisify
    arg:
      kind: identifier
      name: execFile
- id: node-promisified-exec-call
  desc: Node promisified exec API call
  crit: notable
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: symbol
    kind: call
    regex: '(^|\.)exec(File)?Async$'
- id: exec-api-call
  desc: Calls Node child-process exec API
  crit: notable
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: symbol
    kind: call
    regex: '(^|\.)exec(File|Sync)?$'
  unless:
    - id: metadata/lang/scripted::dts-declaration-file
- id: spawn-api-call
  desc: Node child-process spawn call
  crit: notable
  conf: 0.85
  for: [javascript, typescript]
  unless:
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  if:
    type: text
    regex: '\bchild_process\s*\.\s*spawn(Sync)?\s*\('
- id: system-api-call
  desc: system API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, go, rust]
  if:
    type: symbol
    exact: system
- id: subprocess-api-call
  desc: subprocess API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '\bsubprocess\.(run|Popen|call)\s*\('
- id: rust-command-new-call
  desc: Creates Rust process with Command::new
  crit: notable
  conf: 0.85
  for: [rust]
  if:
    type: text
    regex: '\bCommand::new\s*\('
- id: go-exec-command-call
  desc: Creates a child process with Go exec.Command
  crit: component
  conf: 0.85
  for: [go]
  if:
    type: text
    substr: 'exec.Command('
