defaults:
  platforms: [unix, windows]
  attack: T1059
traits:
- id: node-promisified-exec
  desc: Node promisifies the shell exec API
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: call
    exact: promisify
    arg:
      kind: identifier
      name: exec
- id: node-promisified-exec-file
  desc: Node promisifies the file exec API
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: symbol
    kind: call
    exact: promisify
    arg:
      kind: identifier
      name: execFile

- id: node-do-shell-helper
  desc: JavaScript shell helper invocation
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  mbc: C0017
  attack: T1059.007
  if:
    type: text
    regex: '\b(AsNodeTool|NodeTool)\.doShell\s*\('
- id: node-promisified-exec-call
  desc: Node promisified exec API call
  crit: notable
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: symbol
    kind: call
    regex: '(^|\.)exec(File)?Async$'
- id: exec-family-call-target
  desc: JavaScript exec-family call target
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: '\bchild_process\s*\.\s*exec(File|Sync)?\s*\('
- id: js-child-process
  desc: Calls Node.js child_process execution API
  crit: notable
  conf: 0.92
  for: [javascript, typescript]
  mbc: E1059
  if:
    type: symbol
    kind: call
    regex: '(^|\.)child_process\.(exec(File)?|spawn|fork)(Sync)?$'
- id: js-object-exec-call
  desc: JavaScript child_process.exec call
  crit: notable
  conf: 0.86
  for: [javascript, typescript]
  mbc: C0017
  attack: T1059.007
  if:
    type: symbol
    kind: call
    regex: '(^|\.)child_process\.exec$'
- id: system-api-call
  desc: System-named API reference
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, go, rust]
  if:
    type: symbol
    exact: system
- id: python-os-system-call
  desc: Python invokes os.system to execute a command
  crit: notable
  conf: 0.92
  for: [python]
  if:
    type: tree-sitter
    kind: call
    regex: '(?s)\bos\.system\s*\('
  unless:
    - id: well-known/tool/detection/security-scanner::code-pattern-catalog
- id: subprocess-api-call
  desc: Invokes a subprocess creation API
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: symbol
    kind: call
    regex: '^subprocess\.(run|Popen|call)$'
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
    - id: well-known/tool/detection/security-scanner::code-pattern-catalog
- id: python-asyncio-subprocess-call
  desc: Python creates a subprocess through asyncio
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: symbol
    kind: call
    regex: '(^|\.)create_subprocess_(shell|exec)$'
- id: rust-command-new-call
  desc: Constructs a Rust process command
  crit: notable
  conf: 0.85
  for: [rust]
  if:
    type: text
    regex: '\bCommand::new\s*\('
- id: go-exec-command-call
  desc: Creates a child process with Go exec.Command
  crit: component
  conf: 0.85
  for: [go]
  if:
    type: text
    substr: 'exec.Command('

composite_rules:
- id: exec-api-call
  desc: Calls Node child-process exec API
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  all:
    - id: micro-behaviors/process/create/shell/bridge::child-process-require
    - id: exec-family-call-target
  unless:
    - id: metadata/lang/scripted::dts-declaration-file
