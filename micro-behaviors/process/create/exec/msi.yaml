defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: "T1204.002"
  conf: 0.92
traits:
  - id: wix-ca-quietexec
    desc: WiX CAQuietExec custom action
    crit: notable
    if:
      type: text
      substr: CAQuietExec
  - id: wix-quietexec-command-props
    desc: WiX QuietExec command properties
    crit: notable
    if:
      type: text
      regex: Wix(QuietExec|SilentExec)(64)?Cmd(Line|Timeout)
  - id: advanced-installer-launchapp-toggle
    desc: Advanced Installer launch toggle
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: AI_LaunchApp(RUNAPPLICATION=1)
  - id: advanced-installer-app-file-exe
    desc: Advanced Installer references embedded EXE
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: AI_APP_FILE\[#.{1,80}\.exe\]
  - id: advanced-installer-runasadmin-exe
    desc: "Adv Installer launches embedded EXE elevated"
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'LaunchFile/DontWait\s+/Run\s*AsAdmin\s+"\[#.{1,80}\.exe\]"'
  - id: advanced-installer-luajit-app-file
    desc: LuaJIT custom action file
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: AI_APP_FILE[#LuaJIT.exe]
  - id: advanced-installer-luajit-script-args
    desc: Lua bytecode launch arguments
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: AI_APP_ARGS"[#script.lua]"

  - id: lnk-msiexec-quiet-install
    desc: LNK invokes quiet MSI installation
    crit: notable
    conf: 0.97
    attack: T1218.007
    for: [lnk]
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\bmsiexec(\.exe)?\s+/i\b.{0,160}\s+/qn\b'
  - id: msi-launchfile-custom-action
    desc: MSI schedules a LaunchFile action
    crit: notable
    conf: 0.93
    count_min: 2
    if:
      type: raw
      substr: LaunchFile
  - id: msi-powershell-executable-encoded
    desc: Decoded MSI references PowerShell
    crit: notable
    conf: 0.98
    attack: T1059.001
    if:
      type: encoded
      encoding: base64
      substr: powershell.exe
  - id: msi-encoded-command-option
    desc: Decoded MSI uses encoded command option
    crit: notable
    conf: 0.98
    attack: T1027
    if:
      type: encoded
      encoding: base64
      substr: '-Enc'
  - id: msi-powershell-hidden-window-option
    desc: MSI custom action hides PowerShell window
    crit: notable
    conf: 0.97
    attack: T1564.003,T1059.001
    if:
      type: raw
      regex: '(?i)powershell\.exe.{0,40}-W\s+Hidden'
  - id: msi-powershell-executionpolicy-bypass
    desc: MSI custom action bypasses PowerShell policy
    crit: notable
    conf: 0.97
    attack: T1059.001
    if:
      type: raw
      regex: '(?i)powershell\.exe.{0,80}-(ExecutionPolicy|EP)\s+Bypass'
  - id: msi-powershell-encoded-command-option
    desc: MSI passes an encoded PowerShell command
    crit: notable
    conf: 0.98
    attack: T1027,T1059.001
    if:
      type: raw
      regex: '(?i)powershell\.exe.{0,100}-(EncodedCommand|enc)\b'
composite_rules:
  - id: advanced-installer-embedded-exe-launch
    desc: MSI launches embedded EXE via Advanced Installer
    crit: suspicious
    conf: 0.97
    all:
      - id: advanced-installer-launchapp-toggle
      - id: advanced-installer-app-file-exe
  - id: advanced-installer-elevated-embedded-exe-launch
    desc: MSI elevates embedded EXE launch
    crit: suspicious
    conf: 0.98
    all:
      - id: advanced-installer-embedded-exe-launch
      - id: advanced-installer-runasadmin-exe
  - id: advanced-installer-luajit-launch
    desc: MSI launches embedded LuaJIT
    crit: suspicious
    conf: 0.98
    all:
      - id: advanced-installer-launchapp-toggle
      - id: advanced-installer-luajit-app-file
      - id: advanced-installer-luajit-script-args
