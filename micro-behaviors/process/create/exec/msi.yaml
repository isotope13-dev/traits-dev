defaults:
  platforms: [windows]
  for: [oledoc]
  attack: "T1204.002"
  conf: 0.92
traits:
  - id: wix-ca-quietexec
    desc: WiX CAQuietExec custom action
    crit: notable
    if:
      type: raw
      substr: CAQuietExec
  - id: wix-quietexec-command-props
    desc: WiX QuietExec command properties
    crit: notable
    if:
      type: raw
      regex: Wix(QuietExec|SilentExec)(64)?Cmd(Line|Timeout)
  - id: advanced-installer-launchapp-toggle
    desc: Advanced Installer launch toggle
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: AI_LaunchApp(RUNAPPLICATION=1)
  - id: advanced-installer-luajit-app-file
    desc: LuaJIT custom action file
    crit: notable
    conf: 0.97
    if:
      type: raw
      substr: AI_APP_FILE[#LuaJIT.exe]
  - id: advanced-installer-luajit-script-args
    desc: Lua bytecode launch arguments
    crit: notable
    conf: 0.97
    if:
      type: raw
      substr: AI_APP_ARGS"[#script.lua]"
composite_rules:
  - id: advanced-installer-luajit-launch
    desc: MSI launches embedded LuaJIT
    crit: suspicious
    conf: 0.98
    all:
      - id: advanced-installer-launchapp-toggle
      - id: advanced-installer-luajit-app-file
      - id: advanced-installer-luajit-script-args
