defaults:
  platforms:
    - unix
    - windows
  for: [python, javascript, typescript, shell, scripts, binaries]
  size_min: 512
  size_max: 500000000

composite_rules:
  - id: command-execution-capability
    desc: Command execution capability
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/process/create/direct::execve-symbol
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: micro-behaviors/process/create/subprocess::popen-ast
      - id: micro-behaviors/process/create/subprocess::asyncio-create-subprocess-exec
      - id: micro-behaviors/process/create/shell/spawn::cmd-exe
