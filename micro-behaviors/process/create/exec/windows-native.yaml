# Windows Native Command Execution APIs
# Low-level WinAPI execution methods
# ATT&CK: T1106 (Native API)
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: winexec
    desc: WinExec command execution API
    crit: notable
    conf: 0.9
    attack: "T1106"
    if:
      type: symbol
      exact: "WinExec"
  - id: sdclt-path-reference
    desc: References Windows Backup launcher sdclt.exe
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bsdclt\.exe\b'
