defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
traits:
- id: shell-exec-availability-check
  desc: Checks PHP shell_exec availability
  if:
    type: text
    regex: '\b(function_exists|is_callable)\s*\(\s*["'']shell_exec["'']'
- id: system-passthru-availability-check
  desc: Checks PHP system or passthru availability
  if:
    type: text
    regex: '\b(function_exists|is_callable)\s*\(\s*["''](system|passthru)["'']'
- id: proc-open-popen-availability-check
  desc: Checks PHP proc_open or popen availability
  if:
    type: text
    regex: '\b(function_exists|is_callable)\s*\(\s*["''](proc_open|popen)["'']'

composite_rules:
- id: php-execution-function-availability
  desc: Checks PHP execution function availability
  crit: notable
  conf: 1.0
  any:
  - id: shell-exec-availability-check
  - id: system-passthru-availability-check
  - id: proc-open-popen-availability-check
