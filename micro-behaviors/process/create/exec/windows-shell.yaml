# Windows Shell Execution
# Windows API based shell/process execution
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Shell Execution APIs ===
  - id: shell-execute-ex
    desc: Execute shell command (ShellExecuteExW)
    crit: notable
    conf: 0.75
    attack: "T1059.001"
    if:
      type: string
      exact: "ShellExecuteExW"
      section: rdata
  - id: shell-execute
    desc: Execute shell command (ShellExecuteW)
    crit: notable
    conf: 0.75
    attack: "T1059.001"
    if:
      type: string
      exact: "ShellExecuteW"
      section: rdata
  # === Command Line Execution ===
  - id: get-command-line
    desc: Retrieve command line arguments
    crit: baseline
    conf: 0.65
    if:
      type: symbol
      exact: "GetCommandLineW"
  # === Windows command execution artifacts ===
  - id: cmd-exe-reference
    desc: cmd.exe command interpreter reference
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "cmd.exe"
  - id: powershell-exe-reference
    desc: PowerShell.exe interpreter reference
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "PowerShell.exe"
  - id: netsh-exe-reference
    desc: netsh.exe utility reference
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "netsh.exe"
  - id: route-exe-reference
    desc: route.exe utility reference
    crit: notable
    conf: 0.78
    if:
      type: string
      exact: "route.exe"
  - id: netsh-set-dns
    desc: netsh set interface DNS server
    crit: suspicious
    conf: 0.92
    attack: "T1565.001"
    if:
      type: string
      regex: "netsh\\s+interface\\s+(ip|ipv4)\\s+(set|add)\\s+dns\\s+name="
      case_insensitive: true
  - id: netsh-set-dns-substr
    desc: netsh interface DNS set command fragment
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "netsh interface ip set dns name="
  - id: ipconfig-flushdns-renew
    desc: Flush and renew DNS resolver state
    crit: suspicious
    conf: 0.9
    attack: "T1565.001"
    if:
      type: string
      regex: "ipconfig\\s+/flushdns.{0,40}ipconfig\\s+/renew"
      case_insensitive: true
  - id: set-netadapterbinding-ipv6
    desc: Toggle IPv6 adapter binding via PowerShell
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "set-netadapterbinding.{0,120}ComponentID\\s+ms_tcpip6"
      case_insensitive: true
  - id: ms-tcpip6-component
    desc: PowerShell IPv6 adapter component reference
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "ms_tcpip6"
  - id: route-delete-command
    desc: Route table deletion command template
    crit: suspicious
    conf: 0.88
    if:
      type: string
      regex: "route\\.exe\\s+delete\\s+%s"
      case_insensitive: true
composite_rules:
  - id: dns-reconfiguration-cli
    desc: DNS configuration rewritten via CLI
    crit: suspicious
    conf: 0.93
    all:
      - id: netsh-set-dns-substr
    any:
      - id: ipconfig-flushdns-renew
      - id: cmd-exe-reference
