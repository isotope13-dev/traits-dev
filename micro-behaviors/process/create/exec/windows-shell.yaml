defaults:
  for:
    - pe
    - dll
    - csharp
  platforms:
    - windows
traits:
  - id: shell-execute-ex
    desc: Opens a target via ShellExecuteExW
    crit: notable
    conf: 0.75
    attack: T1059.001
    if:
      type: symbol
      exact: ShellExecuteExW
  - id: shell-execute
    desc: Opens a target via ShellExecuteW
    crit: notable
    conf: 0.75
    attack: T1059.001
    if:
      type: symbol
      exact: ShellExecuteW
  - id: cmd-exe-reference
    desc: References Windows cmd.exe interpreter
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: cmd.exe
  - id: powershell-exe-reference
    desc: PowerShell.exe interpreter reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: PowerShell.exe
      case_insensitive: true
  - id: netsh-exe-reference
    desc: netsh.exe utility reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: netsh.exe
  - id: route-exe-reference
    desc: route.exe utility reference
    crit: notable
    conf: 0.78
    if:
      type: text
      exact: route.exe
  - id: tauri-shell-open-plugin
    desc: Tauri shell open plugin invoke
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: plugin:shell|open
      section: .rdata
  - id: netsh-set-dns
    desc: netsh set interface DNS server
    crit: suspicious
    conf: 0.92
    attack: T1565.001
    if:
      type: text
      regex: netsh\s+interface\s+(ip|ipv4)\s+(set|add)\s+dns\s+name=
      case_insensitive: true
    downgrade:
      any:
        - type: metrics
          field: pe.has_signature
          min: 1
  - id: netsh-set-dns-substr
    desc: netsh interface DNS set command fragment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: netsh interface ip set dns name=
    downgrade:
      any:
        - type: metrics
          field: pe.has_signature
          min: 1
  - id: ipconfig-flushdns-renew
    desc: Flush and renew DNS resolver state
    crit: suspicious
    conf: 0.9
    attack: T1565.001
    if:
      type: text
      regex: ipconfig\s+/flushdns.{0,40}ipconfig\s+/renew
      case_insensitive: true
  - id: set-netadapterbinding-ipv6
    desc: Toggle IPv6 adapter binding via PowerShell
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: set-netadapterbinding.{0,120}ComponentID\s+ms_tcpip6
      case_insensitive: true
  - id: ms-tcpip6-component
    desc: PowerShell IPv6 adapter component reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: ms_tcpip6
  - id: route-delete-command
    desc: Route table deletion command template
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: route\.exe\s+delete\s+%s
      case_insensitive: true
  - id: netsh-firewall-allowedprogram
    desc: netsh firewall allowedprogram rule
    crit: suspicious
    conf: 0.95
    attack: T1562.004
    if:
      type: text
      regex: firewall\s+set\s+allowedprogram.{0,60}mode\s*=\s*ENABLE
      case_insensitive: true
  - id: netsh-firewall-allowedprogram-fragment
    desc: netsh firewall allowedprogram fragment
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: firewall set allowedprogram
composite_rules:
  - id: dns-reconfiguration-cli
    desc: DNS configuration rewritten via CLI
    crit: suspicious
    conf: 0.93
    all:
      - id: netsh-set-dns-substr
    any:
      - id: ipconfig-flushdns-renew
      - id: cmd-exe-reference
  - id: firewall-allowedprogram-cli
    desc: Firewall exception added via netsh
    crit: suspicious
    conf: 0.95
    all:
      - id: netsh-firewall-allowedprogram-fragment
    any:
      - id: netsh-firewall-allowedprogram
      - id: netsh-exe-reference
  - id: cmd-shell-via-createprocess
    desc: cmd.exe /c executed via CreateProcess
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/script-host::cmd-exe-c-command
      - id: micro-behaviors/process/create/spawn::create-process-w
