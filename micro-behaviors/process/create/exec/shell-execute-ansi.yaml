# ShellExecute ANSI variant - often seen in malware to reduce strings
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
  attack: "T1059.001"
traits:
  - id: shell-execute-a
    desc: Execute shell command (ShellExecuteA)
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: "ShellExecuteA"
  - id: shell-execute-a-obfuscated
    desc: Obfuscated ShellExecuteA API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "leeexthEuSlcA"
