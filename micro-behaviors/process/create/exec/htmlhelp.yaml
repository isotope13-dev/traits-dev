# Process targets configured through an HTML Help Shortcut Item1 parameter.
# The syntax establishes a launch capability; malicious auto-fire intent is
# inferred by the CHM delivery composites.
defaults:
  platforms: [windows]
  for: [html]
  crit: notable
  conf: 0.92

traits:
  - id: htmlhelp-shortcut-item1-cmd
    desc: HTML Help Shortcut targets cmd
    if:
      type: text
      regex: '(?i)name\s*=\s*["'']Item1["''][^>]{0,240}value\s*=\s*["''][,;]?cmd(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-powershell
    desc: HTML Help Shortcut targets PowerShell
    if:
      type: text
      regex: '(?i)name\s*=\s*["'']Item1["''][^>]{0,240}value\s*=\s*["''][,;]?powershell(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-schtasks
    desc: HTML Help Shortcut targets schtasks
    conf: 0.96
    if:
      type: text
      regex: '(?i)name\s*=\s*["'']Item1["''][^>]{0,240}value\s*=\s*["''][,;]?schtasks\b'

  - id: htmlhelp-shortcut-item1-named-target
    desc: HTML Help Shortcut names process target
    conf: 0.94
    if:
      type: text
      regex: '(?i)name\s*=\s*["'']Item1["''][^>]{0,120}value\s*=\s*["''],[A-Za-z0-9_ .-]{3,80},'

  - id: htmlhelp-shortcut-item1-script-host
    desc: HTML Help Shortcut targets script host
    conf: 0.9
    if:
      type: text
      regex: '(?i)name\s*=\s*["'']Item1["''][^>]{0,240}value\s*=\s*["''][,;]?(wscript|cscript)(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-lolbin
    desc: HTML Help Shortcut targets LOLBin
    conf: 0.9
    if:
      type: text
      regex: '(?i)name\s*=\s*["'']Item1["''][^>]{0,240}value\s*=\s*["''][,;]?(mshta|rundll32)(\.exe)?\b'
