defaults:
  for: [c]
  platforms: [windows]
traits:
  - id: shell-execute-call-source
    desc: Delphi ShellExecute API call
    crit: notable
    conf: 0.95
    if:
      type: raw
      regex: '(?i)\bShellExecute\s*\('
  - id: lorraine-hta-launch
    desc: Launches Lorraine HTA payload
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      substr: "PChar('c:\\lorraine.c.hta')"
  - id: gratisweb-launch
    desc: Opens Falckon website URL
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: "http://www.gratisweb.com/falckon/index.html"
composite_rules:
  - id: shell-execute-payload-launch
    desc: ShellExecute launches payload artifacts
    crit: suspicious
    conf: 0.98
    all:
      - id: shell-execute-call-source
    any:
      - id: lorraine-hta-launch
      - id: gratisweb-launch
