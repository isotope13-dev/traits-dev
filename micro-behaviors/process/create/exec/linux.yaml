defaults:
  platforms:
    - linux
  for:
    - source
    - binaries
    - c
traits:
  - id: call-usermodehelper
    desc: 'Executes user-mode process from kernel'
    crit: notable
    conf: 0.95
    mbc: E1059
    attack: T1059
    for: [c, cpp, elf]
    if:
      type: symbol
      substr: call_usermodehelper
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
