defaults:
  platforms:
    - linux
  for:
    - source
    - binaries
    - c
traits:
  - id: call-usermodehelper-symbol
    desc: Executes user-mode process from kernel (symbol)
    crit: component
    conf: 0.95
    for: [elf]
    if:
      type: symbol
      substr: call_usermodehelper
  - id: call-usermodehelper-text
    desc: Executes user-mode process from kernel (text)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: call_usermodehelper
composite_rules:
  - id: call-usermodehelper
    desc: Executes user-mode process from kernel (call_usermodehelper)
    crit: suspicious
    conf: 0.95
    mbc: E1059
    attack: T1059
    any:
      - id: call-usermodehelper-symbol
      - id: call-usermodehelper-text
