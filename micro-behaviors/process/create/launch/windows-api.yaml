defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1106

traits:
  - id: create-process-api-name
    desc: CreateProcess API name in binary
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\bCreateProcess[AW]?\b'
    unless:
      - id: well-known/app/drivers::ngx-dll-basename
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
