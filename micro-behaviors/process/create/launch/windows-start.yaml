# Windows `start` command process launching from Python source.
# The atoms describe the capability; install-time intent is inferred by the
# supply-chain composites that reference them.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1059.003
  mbc: E1059.003

traits:
  - id: windows-start-command-a
    desc: Launches executable with Windows start command
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: \bstart\s+['"]?[a-zA-Z0-9._\\/-]+\.(exe|bat|cmd|ps1)

  - id: windows-start-command-b
    desc: Launches executable with Windows start command
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: \bstart\s+['"]?[a-zA-Z0-9._\\/-]+\.(scr|msi|com)

  - id: os-system-start-concat
    desc: Builds Windows start command for os.system
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: os\.system\s*\(\s*['"]start\s+['"]\s*\+

  - id: os-system-start-fstring
    desc: Builds Windows start command with f-string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: os\.system\s*\(\s*f['"]start\s+\{

  - id: windows-start-variable-target
    desc: Launches a variable target with Windows start
    crit: notable
    conf: 0.8
    platforms: [windows]
    for: [bat, cmd, powershell, vbs]
    if:
      type: text
      regex: '(?i)\bstart\s+""\s+["'']?[!%][A-Za-z_][A-Za-z0-9_]{0,40}[!%]["'']?'

composite_rules:
  - id: windows-start-command
    desc: Windows start command execution capability
    crit: notable
    conf: 0.85
    any:
      - id: windows-start-command-a
      - id: windows-start-command-b
      - id: os-system-start-fstring
      - id: os-system-start-concat
