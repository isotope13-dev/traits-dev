defaults:
  platforms: [unix, windows]
  for: [java, kotlin, class, java_class, jar, text, shell, markdown]
  attack: T1059
  crit: notable
  conf: 0.85

traits:
  - id: java-jar-command-line
    desc: Runs an executable JAR (java -jar)
    if:
      type: text
      substr: java -jar

  - id: java-classpath-command-line
    # Neutral JVM launch form. Extremely common in usage/help text, build
    # scripts and READMEs — intent comes from what the command line points at,
    # so objective composites must supply that context.
    desc: Runs Java class via classpath (java -cp)
    if:
      type: text
      substr: java -cp

  - id: java-jar-command-bytecode
    desc: java -jar string in bytecode
    crit: component
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 6A 61 76 61 20 2D 6A 61 72
