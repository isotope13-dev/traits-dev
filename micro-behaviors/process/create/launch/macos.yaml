defaults:
  attack: T1106
  for:
    - python
    - shell
  platforms:
    - macos
traits:
  - id: open-app
    desc: macOS open application
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: \bopen\s+-a\s+[^\n]{1,120}\.app\b|\['open'\s*,\s*['"][^'"\n]{1,120}\.app['"]
  - id: open-command
    desc: open command execution
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: \['open'\s*,|open\s+-a
  - id: nsworkspace-open-file
    desc: NSWorkspace openFile programmatic launch
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: (openFile:withApplication|\[NSWorkspace.{0,30}openFile)
  - id: nsworkspace-shared
    desc: NSWorkspace sharedWorkspace singleton
    crit: component
    conf: 0.7
    if:
      type: string_literal
      substr: sharedWorkspace
composite_rules:
  - id: nsworkspace-app-launch
    desc: Programmatic app launch via NSWorkspace
    crit: notable
    conf: 0.85
    attack: T1204.002
    all:
      - id: nsworkspace-open-file
      - id: nsworkspace-shared
  - id: app-execution
    desc: macOS application execution
    crit: notable
    conf: 0.85
    any:
      - id: open-app
      - id: open-command
      - id: nsworkspace-app-launch
