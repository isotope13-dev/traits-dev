defaults:
  attack: T1106
  for:
    - python
    - shell
    - macho
  platforms:
    - macos
traits:
  - id: open-app
    desc: macOS open application
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: \bopen\s+(-a\s+)?["']?[^\n]{1,180}\.app\b|\['open'\s*,\s*['"][^'"\n]{1,120}\.app['"]
  - id: open-command
    desc: open command execution
    crit: notable
    conf: 0.75
    if:
      type: literal
      kind: string
      regex: ^open\s+(-a\b|["'])
  - id: open-file-command
    desc: macOS open command invocation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?m)^[[:space:]]*open[[:space:]]+\S+'
  - id: usr-bin-open-command
    desc: /usr/bin/open command execution
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: /usr/bin/open\s+(-[A-Za-z][A-Za-z0-9-]*\s+){0,4}(["'][^"'\n]{0,240}|[^"'\s\n]{1,240})
  - id: nsworkspace-open-file
    desc: NSWorkspace openFile programmatic launch
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: (openFile:withApplication|\[NSWorkspace.{0,30}openFile)
  - id: nsworkspace-shared
    desc: NSWorkspace sharedWorkspace singleton
    crit: component
    conf: 0.7
    if:
      type: string_literal
      substr: sharedWorkspace
composite_rules:
  - id: nsworkspace-app-launch
    desc: Programmatic app launch via NSWorkspace
    crit: notable
    conf: 0.85
    attack: T1204.002
    all:
      - id: nsworkspace-open-file
      - id: nsworkspace-shared
  - id: app-execution
    desc: macOS application execution
    crit: notable
    conf: 0.85
    any:
      - id: open-app
      - id: open-command
      - id: usr-bin-open-command
      - id: nsworkspace-app-launch
