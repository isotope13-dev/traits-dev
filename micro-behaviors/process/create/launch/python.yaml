defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  crit: notable
  attack: T1059.003
  mbc: E1059.003
traits:
  - id: python-start-process
    desc: Launches process via start command (Windows)
    conf: 0.8
    if:
      type: string_value
      regex: os\.system\(['"]start |subprocess\.(call|Popen|run)\(\['start'
  - id: webbrowser-open
    desc: Opens URL in system web browser
    conf: 0.7
    if:
      type: symbol
      regex: webbrowser\.open
