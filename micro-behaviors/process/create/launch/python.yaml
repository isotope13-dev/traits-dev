defaults:
  platforms: [windows, unix]
  for:
    - python
  crit: notable
  attack: T1059.003
  mbc: E1059.003
traits:
  - id: python-start-process
    desc: Launches process via start command (Windows)
    conf: 0.8
    if:
      type: string_literal
      regex: os\.system\(['"]start |subprocess\.(call|Popen|run)\(\['start'
  - id: sys-executable-module-relaunch
    desc: Relaunches Python module executable
    conf: 0.9
    ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
    if:
      type: text
      regex: 'sys\.executable\s*,\s*["'']-m["'']'
  - id: webbrowser-open
    desc: Opens URL in system web browser
    conf: 0.7
    if:
      type: symbol
      regex: webbrowser\.open
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: python-command-exec-any
    desc: Python command execution
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/create/subprocess::process-execution
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
