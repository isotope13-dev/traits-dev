defaults:
  for: [pe, batch, powershell, javascript, vbs, python, csharp, cpp]
  platforms: [windows]
  crit: notable
  conf: 0.9
  attack: T1204.002

traits:
  - id: run-when-done-control
    desc: Run-after-download control flag
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    count_min: 2
    if:
      type: text
      regex: '(RunWhenDone=|g2gSetRunWhenDone|g2gAddDownloadSetToRun)'

  - id: shell-open-command-association
    desc: Shell open command association
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    if:
      type: text
      exact: \shell\open\command

  - id: temp-setup-output-name
    desc: Temp setup output filename
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    count_min: 2
    if:
      type: text
      regex: '(?i)(^|[\\/])[A-Za-z0-9._ -]{1,80}-setup\.exe\b'

composite_rules:
  - id: downloader-run-after-fetch
    desc: Downloader run-after-fetch controls
    # The capability is notable; intent is inferred by objective-tier rules.
    crit: notable
    conf: 0.92
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    all:
      - id: run-when-done-control
    any:
      - id: shell-open-command-association
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/process/create/exec::shell-execute-a
