# Process detachment / daemonization
# MBC: F0003 (Process Detach)
defaults:
  mbc: F0003
  platforms: [linux, macos, windows]
traits:
  - id: python-dup
    desc: "Detaches process via os.setsid"
    crit: notable
    conf: 0.9
    attack: "T1036"
    for: [python]
    if:
      type: text
      substr: "os.setsid"
  - id: preexec-fn
    desc: "Manipulates process via subprocess preexec_fn"
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      substr: "preexec_fn="
  - id: c
    desc: "Calls setsid() system call"
    crit: notable
    conf: 0.8
    for: [c]
    if:
      type: ast
      kind: call
      exact: setsid
  - id: c-setsid-call
    desc: C setsid session detach
    crit: notable
    conf: 0.82
    for: [c, cpp]
    platforms: [unix]
    if:
      type: text
      regex: '\bsetsid\s*\(\s*\)'
  - id: import
    desc: "setsid() function import"
    crit: component
    for: [elf, macho]
    if:
      type: symbol
      exact: "setsid"
