defaults:
  for: [documents]
  platforms: [windows, macos]
  crit: notable
  conf: 0.88
traits:
  - id: ppt-action-verb
    desc: PowerPoint action verb attribute
    if:
      type: raw
      regex: '(?i)action="ppaction://[a-z]'
  - id: ppt-custom-action-macro
    desc: PowerPoint macro action trigger
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '(?i)ppaction://macro'
composite_rules:
  - id: ppt-macro-trigger
    desc: PowerPoint VBA macro action trigger
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/document/office/macro::ppt-vba-document
      - id: ppt-custom-action-macro
