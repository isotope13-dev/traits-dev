defaults:
  for: [documents]
  platforms: [windows, macos]
  crit: notable
  conf: 0.88
traits:
  - id: ppt-action-verb
    desc: PowerPoint action verb attribute
    if:
      type: raw
      regex: '(?i)action="ppaction://[a-z]'
  - id: ppt-custom-action-macro
    desc: PowerPoint macro action trigger
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '(?i)ppaction://macro'
  # `ppaction://program` runs an external program embedded in the
  # presentation. Used by malicious .pptx files to execute the
  # bundled payload when a user clicks an action button.
  - id: ppt-custom-action-program
    desc: PowerPoint program action trigger
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(?i)ppaction://program'
  # `ppaction://hlinkfile` opens a hyperlinked local file — abused
  # by attached-file-disguised-as-link attacks where the hyperlink
  # target is a sibling .lnk or .exe.
  - id: ppt-custom-action-hlinkfile
    desc: PowerPoint file-hyperlink action
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: '(?i)ppaction://hlinkfile'
  # OnMouseOver action — fires without click. Combined with a
  # macro/program action trigger it's the canonical CVE-2017-0199
  # PowerPoint variant ("hover here to view content").
  - id: ppt-mouseover-action
    desc: PowerPoint OnMouseOver action trigger
    crit: suspicious
    conf: 0.93
    for: [ooxml]
    if:
      type: raw
      regex: '(?i)<p:ohlinkMouseOver'
    unless:
      - id: metadata/document/html::ndoc-generated-page
  # External hyperlink (Hyperlink rType=external + http target) is
  # benign in most decks but suspicious when it appears alongside
  # macros or program actions; surfaced as `notable` for composites.
  # The compound check (relationship type + http target on same
  # line) is strict enough to keep false positives low without
  # requiring an over-length regex.
  - id: ppt-external-hyperlink-http
    desc: PowerPoint external HTTP hyperlink
    if:
      type: raw
      regex: '(?i)relationships/hyperlink"\s+Target="https?://'
composite_rules:
  - id: ppt-macro-trigger
    desc: PowerPoint VBA macro action trigger
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/document/office/macro::ppt-vba-document
      - id: ppt-custom-action-macro
