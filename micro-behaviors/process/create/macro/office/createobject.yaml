# VBA `CreateObject(...)` ProgIDs and the GetObject second-arg ProgIDs.
#
# cleave's office analyzer surfaces `CreateObject("WScript.Shell")` as
# `Import { symbol: "WScript.Shell", library: "com", source:
# "vba-createobject" }` and the analogous GetObject second-arg form
# under `library: "com-getobject"`. Atomic traits below match by
# ProgID via `type: symbol`. The non-literal-arg case (where the
# argument is built at runtime) is captured separately by the
# `office.vba.createobject_non_literal_count` metric trait at the
# bottom — that's the strongest single obfuscation signal.
#
# Coverage matches maldoca's `VbaObjectName` enum plus a handful of
# extras (ADODB.Stream, MSXML2.ServerXMLHTTP) common in modern
# droppers. ProgIDs are case-sensitive in the upstream serialization
# so we use `exact:` matchers; case-insensitive variants would mask
# legitimate usage.
defaults:
  for: [oledoc, ooxml, vbs]
  platforms: [windows]
  crit: notable
  conf: 0.92

traits:
  # --- Shell / process execution ---
  - id: createobject-wscript-shell
    desc: VBA CreateObject WScript.Shell
    crit: suspicious
    if:
      type: import
      exact: WScript.Shell
  - id: createobject-shell-application
    desc: VBA CreateObject Shell.Application
    crit: suspicious
    if:
      type: import
      exact: Shell.Application

  # --- Filesystem ---
  - id: createobject-scripting-fso
    desc: VBA CreateObject Scripting.FileSystemObject
    crit: suspicious
    if:
      type: import
      exact: Scripting.FileSystemObject
  - id: createobject-scripting-dictionary
    desc: VBA CreateObject Scripting.Dictionary
    if:
      type: import
      exact: Scripting.Dictionary

  # --- Network / HTTP fetcher ProgIDs.
  #     Consolidated regex covers MSXML2.XMLHTTP[.N.M],
  #     MSXML2.ServerXMLHTTP[.N.M], Microsoft.XMLHTTP, MSXML2.DOMDocument,
  #     Microsoft.XMLDOM, and WinHttp.WinHttpRequest.5.1. ProgIDs in
  #     these three families are interchangeable for the dropper
  #     composite's purposes; the directory-aggregated ML feature still
  #     fires once when any are present. ---
  - id: createobject-http-fetcher
    desc: VBA CreateObject HTTP/XML fetcher object
    crit: suspicious
    conf: 0.93
    if:
      type: import
      regex: '^(MSXML2|Microsoft|WinHttp)\.'

  - id: createobject-internetexplorer-application
    desc: VBA CreateObject InternetExplorer.Application
    crit: suspicious
    if:
      type: import
      exact: InternetExplorer.Application

  # --- Streaming / data download ---
  - id: createobject-adodb-stream
    desc: VBA CreateObject ADODB.Stream
    crit: suspicious
    if:
      type: import
      exact: ADODB.Stream

  # --- DOM / regex (string-obfuscation surface) ---
  - id: createobject-msxml-dom
    desc: VBA CreateObject Microsoft.XMLDOM
    if:
      type: import
      regex: '^(Microsoft|MSXML2)\.(DOM|FreeThreadedDOM)Document(\.[0-9]+\.[0-9]+)?$'
  - id: createobject-vbscript-regexp
    desc: VBA CreateObject VBScript.RegExp
    if:
      type: import
      exact: VBScript.RegExp

  # --- Office cross-app instantiation (lateral-movement-in-app) ---
  - id: createobject-word-application
    desc: VBA CreateObject Word.Application
    if:
      type: import
      exact: Word.Application
  - id: createobject-excel-application
    desc: VBA CreateObject Excel.Application
    if:
      type: import
      exact: Excel.Application
  - id: createobject-powerpoint-application
    desc: VBA CreateObject PowerPoint.Application
    if:
      type: import
      exact: PowerPoint.Application

  # --- ProgID-via-CLSID instantiation (CreateObject("clsid:...")) ---
  - id: createobject-clsid-string
    desc: VBA CreateObject with CLSID string
    crit: suspicious
    conf: 0.95
    if:
      type: import
      regex: '^clsid:'

  # --- Runtime-built ProgID (strongest single obfuscation signal) ---
  - id: createobject-non-literal-arg
    desc: CreateObject called with non-literal argument
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: office.vba.createobject_non_literal_count
      min: 1

  # --- GetObject ProgID forms ---
  - id: getobject-progid-script-moniker
    desc: GetObject with script moniker
    crit: suspicious
    conf: 0.95
    if:
      type: import
      exact: "script:"
  - id: getobject-non-literal-arg
    desc: GetObject called with non-literal argument
    crit: suspicious
    conf: 0.93
    if:
      type: metrics
      field: office.vba.getobject_non_literal_count
      min: 1
