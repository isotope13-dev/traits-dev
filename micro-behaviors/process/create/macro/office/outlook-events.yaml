# Outlook (ThisOutlookSession) VBA event handlers.
#
# Outlook templates / .otm projects can register event handlers on
# the Application object that fire on incoming/outgoing mail and
# user actions. Common abuse: `Application_NewMailEx` registers a
# callback that fires on every new message — used for credential
# harvest automation, exfil triggers, and persistence by malicious
# Outlook addins.
#
# These atomics use `kind: function` symbol matchers since cleave's
# office analyzer surfaces every `Sub <Name>` declaration as a
# function symbol.
defaults:
  for: [oledoc, ooxml, vbs]
  platforms: [windows]
  crit: suspicious
  conf: 0.92

traits:
  - id: outlook-application-startup
    desc: VBA Application_Startup event handler
    if:
      type: symbol
      kind: function
      exact: Application_Startup
  - id: outlook-application-quit
    desc: VBA Application_Quit event handler
    if:
      type: symbol
      kind: function
      exact: Application_Quit
  - id: outlook-application-newmail
    desc: VBA Application_NewMail event handler
    if:
      type: symbol
      kind: function
      exact: Application_NewMail
  - id: outlook-application-newmailex
    desc: VBA Application_NewMailEx event handler
    if:
      type: symbol
      kind: function
      exact: Application_NewMailEx
  - id: outlook-application-itemsend
    desc: VBA Application_ItemSend event handler
    if:
      type: symbol
      kind: function
      exact: Application_ItemSend
  - id: outlook-application-mapilogonatcomplete
    desc: VBA MAPILogonComplete event handler
    if:
      type: symbol
      kind: function
      exact: Application_MAPILogonComplete
