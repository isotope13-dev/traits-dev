defaults:
  # VBA only lives in OLE compound documents (.doc/.xls), OOXML macro
  # containers (.docm/.xlsm). The broad `documents`
  # for-group also expands to markdown/text/html/pdf/rtf, where these
  # case-insensitive regexes match English prose (e.g. "double shell (host"
  # in a README) and mislabel it as an Office-macro dropper. Mirror the
  # sibling createobject.yaml scope.
  for:
    - oledoc
    - ooxml
    - xlsx
  platforms:
    - windows
  crit: notable
  conf: 0.88
traits:
  - id: auto-open-sub-decl
    desc: VBA auto-open subroutine declaration
    crit: notable
    if:
      type: text
      regex: (?i)Sub\s+(AutoOpen|Document_Open|Workbook_Open|Auto_Open)\b
  - id: shell-or-createobject-call
    desc: Shell or CreateObject invocation
    if:
      type: text
      regex: (?i)(\bShell\s*["'(]|WScript\.Shell|\bCreateObject\s*\()
    unless:
      - id: metadata/binary/installer/database::msi-installer-raw
    not:
      - regex: createObjectURL
  - id: auto-close-trigger
    desc: VBA auto-close execution trigger
    conf: 0.9
    if:
      type: text
      regex: (?i)\b(AutoClose|Document_Close|Auto_Close)\b
  - id: workbook-before-close-trigger
    desc: VBA workbook before-close trigger
    conf: 0.9
    if:
      type: text
      regex: (?i)\b(Workbook_BeforeClose|Document_BeforeClose)\b
  - id: workbook-activate-trigger
    desc: VBA Workbook_Activate trigger
    if:
      type: text
      regex: (?i)\bWorkbook_Activate\b
  - id: userform-activate-trigger
    desc: VBA UserForm activation trigger
    conf: 0.85
    if:
      type: text
      regex: (?i)\bUserForm_Activate\b
  - id: document-beforeprint-trigger
    desc: VBA Document_BeforePrint trigger
    if:
      type: text
      regex: (?i)\bDocument_BeforePrint\b
  - id: content-change-trigger
    desc: VBA content change execution
    if:
      type: text
      regex: (?i)\b(Worksheet_Change|Worksheet_Calculate|Worksheet_SelectionChange)\b

  - id: raw-auto-open-entrypoint
    desc: Raw VBA auto-open entrypoint
    crit: notable
    conf: 0.9
    for: [oledoc]
    if:
      type: raw
      regex: '(?i)(AutoOpen|Document_Open|Workbook_Open|Auto_Open)'

  - id: raw-createobject-call
    desc: Raw VBA CreateObject call
    conf: 0.86
    for: [oledoc]
    if:
      type: text
      regex: 'CreateO[b]ject'

  - id: raw-shell-call
    desc: Raw VBA shell call
    crit: suspicious
    conf: 0.88
    for: [oledoc]
    if:
      type: raw
      regex: '(?i)\bshell\s*\('
    unless:
      - type: path
        regex: '(?i)\.(pot|po|mo)$'

  - id: raw-caesar3-powershell-encodedcommand
    desc: Raw Caesar3 PowerShell EncodedCommand
    crit: suspicious
    conf: 0.96
    for: [oledoc]
    if:
      type: text
      regex: 'srzhuvkhoo\x230HqfrghgFrppdqg'
