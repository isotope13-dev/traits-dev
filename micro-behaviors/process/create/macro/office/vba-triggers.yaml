defaults:
  for:
    - documents
    - vbs
  platforms:
    - windows
  crit: notable
  conf: 0.88
traits:
  - id: auto-open-sub-decl
    desc: VBA auto-open subroutine declaration
    crit: suspicious
    if:
      type: text
      regex: (?i)Sub\s+(AutoOpen|Document_Open|Workbook_Open|Auto_Open)\b
  - id: shell-or-createobject-call
    desc: Shell or CreateObject invocation
    if:
      type: text
      regex: (?i)(\bShell\s*["'(]|WScript\.Shell|\bCreateObject\s*\()
    unless:
      - id: metadata/binary/installer/database::msi-installer-raw
    not:
      - regex: createObjectURL
  - id: auto-close-trigger
    desc: VBA auto-close execution trigger
    conf: 0.9
    if:
      type: text
      regex: (?i)\b(AutoClose|Document_Close|Auto_Close)\b
  - id: workbook-before-close-trigger
    desc: VBA workbook before-close trigger
    conf: 0.9
    if:
      type: text
      regex: (?i)\b(Workbook_BeforeClose|Document_BeforeClose)\b
  - id: workbook-activate-trigger
    desc: VBA Workbook_Activate trigger
    if:
      type: text
      regex: (?i)\bWorkbook_Activate\b
  - id: userform-activate-trigger
    desc: VBA UserForm activation trigger
    conf: 0.85
    if:
      type: text
      regex: (?i)\bUserForm_Activate\b
  - id: document-beforeprint-trigger
    desc: VBA Document_BeforePrint trigger
    if:
      type: text
      regex: (?i)\bDocument_BeforePrint\b
  - id: content-change-trigger
    desc: VBA content change execution
    if:
      type: text
      regex: (?i)\b(Worksheet_Change|Worksheet_Calculate|Worksheet_SelectionChange)\b
