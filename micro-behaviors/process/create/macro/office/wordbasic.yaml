defaults:
  for: [oledoc]
  platforms: [windows]
  crit: notable
  conf: 0.88

traits:
  - id: wordbasic-autoopen
    desc: WordBasic AutoOpen macro entrypoint in OleDoc
    crit: suspicious
    conf: 0.87
    attack: T1204.002
    if:
      type: raw
      word: "AutoOpen"
      case_insensitive: true

  - id: wordbasic-filesaveas-hook
    desc: WordBasic FileSaveAs macro override in OleDoc
    conf: 0.85
    attack: T1204.002
    if:
      type: raw
      word: "FileSaveAs"

  - id: wordbasic-normal-dot-ref
    desc: Reference to NORMAL.DOT default template
    conf: 0.85
    if:
      type: raw
      regex: '(?i)NORMAL\.DOT'
