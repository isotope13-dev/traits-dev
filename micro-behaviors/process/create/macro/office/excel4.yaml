defaults:
  for: [documents]
  platforms: [windows]
  crit: suspicious
  conf: 0.95
traits:
  - id: formula-fill-runtime-write
    desc: XLM formula runtime write
    crit: suspicious
    conf: 0.98
    count_min: 8
    if:
      type: raw
      substr: FORMULA.FILL
  - id: run-dispatch-chain
    desc: XLM RUN dispatch chain
    crit: notable
    conf: 0.97
    count_min: 12
    if:
      type: raw
      substr: RUN(
  - id: char-obfuscation-burst
    desc: XLM dense CHAR obfuscation
    crit: suspicious
    conf: 0.98
    count_min: 200
    if:
      type: raw
      substr: CHAR(
  - id: get-cell-style-keying
    desc: XLM GET.CELL style keying
    crit: suspicious
    conf: 0.97
    count_min: 3
    if:
      type: raw
      substr: GET.CELL(
  - id: date-keyed-now-math
    desc: XLM date-keyed NOW math
    crit: suspicious
    conf: 0.97
    count_min: 2
    if:
      type: raw
      substr: DAY(NOW())
composite_rules:
  - id: excel4-macro-document
    desc: Excel 4.0 macro sheet document
    crit: notable
    conf: 0.98
    all:
      - id: metadata/document/office/macro::excel-workbook-part
      - id: metadata/document/office/macro::excel4-macrosheet-content
  - id: excel4-runtime-formula-stager
    desc: Excel 4.0 runtime formula stager
    crit: notable
    conf: 0.99
    all:
      - id: metadata/document/office/macro::excel4-ooxml-macrosheet
      - id: formula-fill-runtime-write
      - id: run-dispatch-chain
  - id: excel4-style-keyed-obfuscation
    desc: Excel 4.0 style-keyed obfuscation
    conf: 0.99
    all:
      - id: metadata/document/office/macro::excel4-ooxml-macrosheet
      - id: char-obfuscation-burst
      - id: get-cell-style-keying
  - id: excel4-timed-decode-stager
    desc: Excel 4.0 timed decode stager
    conf: 0.98
    all:
      - id: metadata/document/office/macro::excel4-ooxml-macrosheet
      - id: formula-fill-runtime-write
      - id: date-keyed-now-math
