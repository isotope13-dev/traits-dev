# Excel / Workbook / Worksheet / Chart VBA event handlers.
#
# cleave's office analyzer surfaces every VBA `Sub <Name>` /
# `Function <Name>` declaration as a `kind: function` symbol. These
# atomics match the canonical Excel automation event handlers by
# exact name — much more precise than raw-regex scanning over module
# source, which fires on comments and string literals that just
# happen to mention the trigger name.
#
# Many of these names are *also* listed in
# `vba-triggers.yaml` as raw-regex traits; that file matches the
# trigger when only obfuscated source is available (e.g., a stomped
# module). The symbol-typed atomics here fire when the source
# decompresses cleanly — both atoms can co-fire harmlessly because
# they target different evidence sources.
#
# Per RULES.md the trigger family is `notable` standalone (event
# handlers are normal Excel features); composites elsewhere combine
# them with API imports / loader patterns to escalate.
defaults:
  for: [oledoc, ooxml, vbs]
  platforms: [windows]
  crit: notable
  conf: 0.92

traits:
  # --- Workbook lifecycle ---
  - id: workbook-open-handler
    desc: VBA Workbook_Open event handler
    if:
      type: function
      exact: Workbook_Open
  - id: workbook-activate-handler
    desc: VBA Workbook_Activate event handler
    if:
      type: function
      exact: Workbook_Activate
  - id: workbook-deactivate-handler
    desc: VBA Workbook_Deactivate event handler
    if:
      type: function
      exact: Workbook_Deactivate
  - id: workbook-beforeclose-handler
    desc: VBA Workbook_BeforeClose event handler
    if:
      type: function
      exact: Workbook_BeforeClose
  - id: workbook-beforesave-handler
    desc: VBA Workbook_BeforeSave event handler
    if:
      type: function
      exact: Workbook_BeforeSave

  # --- Worksheet events (cell change, calculate, selection) ---
  - id: worksheet-change-handler
    desc: VBA Worksheet_Change event handler
    if:
      type: function
      exact: Worksheet_Change
  - id: worksheet-calculate-handler
    desc: VBA Worksheet_Calculate event handler
    if:
      type: function
      exact: Worksheet_Calculate
  - id: worksheet-selectionchange-handler
    desc: VBA Worksheet_SelectionChange event handler
    if:
      type: function
      exact: Worksheet_SelectionChange
  - id: worksheet-activate-handler
    desc: VBA Worksheet_Activate event handler
    if:
      type: function
      exact: Worksheet_Activate

  # --- Chart events (often abused: a chart object's Calculate event
  #     can fire on every cell change without an explicit trigger sub) ---
  - id: chart-activate-handler
    desc: VBA Chart_Activate event handler
    crit: suspicious
    conf: 0.93
    if:
      type: function
      exact: Chart_Activate
  - id: chart-calculate-handler
    desc: VBA Chart_Calculate event handler
    crit: suspicious
    conf: 0.93
    if:
      type: function
      exact: Chart_Calculate
  - id: chart-mousedown-handler
    desc: VBA Chart_MouseDown event handler
    if:
      type: function
      exact: Chart_MouseDown

  # --- AutoOpen-style classic XL macros ---
  - id: auto-open-handler
    desc: VBA Auto_Open / AutoOpen handler
    crit: suspicious
    conf: 0.95
    if:
      type: function
      regex: '^Auto[_]?Open$'
  - id: auto-close-handler
    desc: VBA Auto_Close / AutoClose handler
    crit: suspicious
    conf: 0.93
    if:
      type: function
      regex: '^Auto[_]?Close$'

  # Many distinct event handlers in the same workbook is unusual —
  # legitimate sheets typically attach to one or two events for
  # specific UX. Five+ event handlers is a strong "many surfaces of
  # execution" signal that pairs with macro/loader composites.
  # Modeled as an atomic metric-typed trait, not a composite —
  # composites must combine multiple atomics, not wrap a single
  # primitive.
  - id: many-event-handlers
    desc: Many distinct VBA event handlers
    crit: notable
    conf: 0.88
    if:
      type: metrics
      field: office.vba.distinct_trigger_count
      min: 5
