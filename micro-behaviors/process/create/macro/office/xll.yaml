defaults:
  platforms: [windows]
  for: [dll]
  crit: notable
  conf: 0.9

traits:
  - id: xll-auto-open
    desc: Excel add-in auto-open entry point
    conf: 0.95
    if:
      type: symbol
      exact: xlAutoOpen

  - id: xll-auto-close
    desc: Excel add-in auto-close entry point
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: xlAutoClose

  - id: xll-auto-remove
    desc: Excel add-in removal callback
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: xlAutoRemove

  - id: xll-manager-info
    desc: Excel add-in manager info export
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: xlAddInManagerInfo(12)?

  - id: xll-auto-free
    desc: Excel add-in memory free callback
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: xlAutoFree(12)?

  - id: xll-set-excel12-entry
    desc: Excel 12 entry point registration export
    conf: 0.92
    if:
      type: symbol
      exact: SetExcel12EntryPt

  - id: xll-sync-macro
    desc: Excel SyncMacro callback export
    conf: 0.9
    if:
      type: symbol
      exact: SyncMacro

  - id: xll-calculation-hook
    desc: Excel calculation lifecycle callback
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: Calculation(Canceled|Ended)

  - id: xlcall32-ref
    desc: Excel callback DLL reference
    crit: baseline
    conf: 0.88
    if:
      type: string_value
      exact: XLCALL32.DLL

  - id: xlf-register-ref
    desc: Excel function registration API reference
    conf: 0.9
    if:
      type: string_value
      exact: xlfRegister

composite_rules:
  - id: xll-addin-dll
    desc: Excel XLL add-in entry points present
    crit: notable
    conf: 0.95
    all:
      - id: xll-auto-open
    any:
      - id: xll-auto-close
      - id: xll-auto-remove
      - id: xll-manager-info
      - id: xll-set-excel12-entry
    needs: 1
