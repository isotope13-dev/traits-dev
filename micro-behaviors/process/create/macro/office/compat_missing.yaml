# Trait definitions formerly emitted as inline findings by cleave's
# office analyzer. Now backed by the metrics/symbols populated on
# `OfficeMetrics` and `report.functions`, so the analyzer code can
# focus on parsing and the trait base owns the threshold/criticality
# logic.
#
# IDs are stable — `objectives/anti-static/obfuscation/document/` and
# `well-known/malware/trojan/trickbot/document.yaml` reference them
# by name and would break if renamed.
#
# Threshold values match the inline-finding values they replaced
# (formula_fill ≥ 8, run ≥ 12, char ≥ 200, get_cell ≥ 3, day_now ≥ 2);
# tuning happens here in YAML rather than in `office/mod.rs`.
defaults:
  for: [oledoc, ooxml]
  platforms: [windows]
  conf: 0.97

traits:
  # --- XLM substring-count thresholds ---
  # These convert the inline `if formula_fill_count >= 8 { findings.push(...) }`
  # blocks formerly in `office/mod.rs` into metric-typed traits.
  - id: char-obfuscation-burst
    desc: XLM dense CHAR obfuscation
    crit: suspicious
    conf: 0.98
    attack: T1027
    if:
      type: metrics
      field: office.xlm.char_count
      min: 200

  - id: date-keyed-now-math
    desc: XLM date-keyed NOW math
    crit: suspicious
    attack: T1497.003
    if:
      type: metrics
      field: office.xlm.day_now_count
      min: 2

  - id: formula-fill-runtime-write
    desc: XLM formula runtime write
    crit: suspicious
    conf: 0.98
    if:
      type: metrics
      field: office.xlm.formula_fill_count
      min: 8

  - id: get-cell-style-keying
    desc: XLM GET.CELL style keying
    crit: suspicious
    attack: T1497
    if:
      type: metrics
      field: office.xlm.get_cell_count
      min: 3

  - id: run-dispatch-chain
    desc: XLM RUN dispatch chain
    crit: notable
    if:
      type: metrics
      field: office.xlm.run_count
      min: 12

  # --- Document_* lifecycle event handler atomics ---
  # Symbol-typed (kind: function) so they fire on declared Sub
  # blocks without the false positives of raw-text matching.
  - id: document-open-handler
    desc: VBA Document_Open event handler
    crit: notable
    if:
      type: function
      exact: Document_Open
  - id: document-new-handler
    desc: VBA Document_New event handler
    crit: notable
    if:
      type: function
      exact: Document_New
  - id: document-close-handler
    desc: VBA Document_Close event handler
    crit: notable
    if:
      type: function
      exact: Document_Close

composite_rules:
  # Multiple document lifecycle triggers in the same project — Open
  # + New + Close all in one VBA project is the historical TrickBot
  # marker. Now expressed as a 3-atomic composite of the symbol-
  # typed handlers above.
  - id: document-lifecycle-trigger-mix
    desc: Multiple document lifecycle triggers
    crit: suspicious
    conf: 0.94
    all:
      - id: document-open-handler
      - id: document-new-handler
      - id: document-close-handler
