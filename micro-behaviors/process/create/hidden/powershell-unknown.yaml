defaults:
  for: [powershell]
  platforms: [windows]
traits:
  - id: encodedcommand-bypass
    desc: PowerShell EncodedCommand with bypass
    crit: suspicious
    conf: 0.94
    attack: T1059.001
    if:
      type: text
      substr: powershell.exe -NonInteractive -ExecutionPolicy Bypass -EncodedCommand
  - id: hidden-process-object
    desc: Hidden .NET process launch object
    crit: notable
    conf: 0.88
    attack: T1564.003
    if:
      type: text
      regex: '(?i)New-Object\s+System\.Diagnostics\.Process'
  - id: create-no-window
    desc: Process CreateNoWindow enabled
    crit: notable
    conf: 0.86
    attack: T1564.003
    if:
      type: text
      substr: StartInfo.CreateNoWindow = $true
  - id: windowstyle-hidden
    desc: ProcessWindowStyle Hidden configuration
    crit: notable
    conf: 0.9
    attack: T1564.003
    if:
      type: text
      substr: ProcessWindowStyle]::Hidden
composite_rules:
  - id: hidden-powershell-execution
    desc: Hidden PowerShell execution flow
    crit: suspicious
    conf: 0.95
    attack: T1059.001
    all:
      - id: encodedcommand-bypass
    any:
      - id: hidden-process-object
      - id: create-no-window
      - id: windowstyle-hidden
    needs: 2
