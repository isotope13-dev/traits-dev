# Hidden Window Process Creation - Windows
# Neutral observations of hidden window execution flags.
# ATT&CK: T1564.003 (Hide Artifacts: Hidden Window)
# Many legitimate tools (services, background workers, installers) use hidden windows.
defaults:
  platforms: [windows]
  attack: "T1564.003"
traits:
  - id: conhost-headless
    desc: conhost.exe --headless execution
    crit: notable
    conf: 0.9
    for: [batch, powershell, pe]
    if:
      type: raw
      regex: '(?i)conhost\.exe\s+--headless'
  - id: powershell-hidden-window
    desc: PowerShell hidden window flag
    crit: notable
    conf: 0.8
    for: [batch, vbs, powershell, pe]
    if:
      type: raw
      regex: '(?i)powershell[^\n]{0,30}-w\s+h(idden)?'
composite_rules:
  - id: hidden-console-execution
    desc: Hidden console/window execution
    conf: 0.9
    any:
      - id: conhost-headless
      - id: powershell-hidden-window
