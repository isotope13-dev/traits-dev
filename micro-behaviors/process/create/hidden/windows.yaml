# Hidden Window Process Creation - Windows
# Neutral observations of hidden window execution flags.
# ATT&CK: T1564.003 (Hide Artifacts: Hidden Window)
# Many legitimate tools (services, background workers, installers) use hidden windows.
defaults:
  platforms: [windows]
  attack: "T1564.003"
traits:
  - id: conhost-headless
    desc: conhost.exe --headless execution
    crit: notable
    conf: 0.9
    for: [batch, powershell, pe, javascript, vbs]
    if:
      type: raw
      regex: '(?i)conhost\.exe\s+--headless'
  - id: sihost32-arg
    desc: Suspicious /sihost32 launcher argument
    crit: notable
    conf: 0.92
    for: [pe]
    if:
      type: text
      exact: "/sihost32"
  - id: powershell-hidden-window
    desc: PowerShell hidden window flag
    crit: notable
    conf: 0.8
    for: [batch, vbs, powershell, pe, javascript]
    if:
      type: raw
      regex: '(?i)powershell[^\n]{0,80}-(w|windowstyle)\s+h(idden)?'
  - id: powershell-hidden-window-string
    desc: PowerShell WindowStyle Hidden string
    crit: notable
    conf: 0.84
    for: [pe, batch, vbs, powershell, javascript]
    if:
      type: text
      substr: -WindowStyle Hidden
composite_rules:
  - id: hidden-console-execution
    desc: Hidden console/window execution
    conf: 0.9
    any:
      - id: conhost-headless
      - id: sihost32-arg
      - id: powershell-hidden-window
      - id: powershell-hidden-window-string
