defaults:
  platforms: [windows]
  for: [class, jar, zip]
traits:
  - id: javaw-exe-suffix
    desc: Java javaw executable suffix
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: w.exe
  - id: java-jar-launch-arg
    desc: Java JAR launch argument
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: " -jar "
  - id: windows-start-empty-title
    desc: Windows start launches hidden command
    crit: suspicious
    conf: 0.72
    if:
      type: raw
      substr: ' & start "" '
  - id: java-powershell-windowstyle-hidden
    desc: Java PowerShell WindowStyle Hidden
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: '(?i)-WindowStyle.{0,40}Hidden'
  - id: java-powershell-executionpolicy-bypass
    desc: Java PowerShell ExecutionPolicy Bypass
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: '(?i)-ExecutionPolicy.{0,40}Bypass'
composite_rules:
  - id: java-detached-jar-launch
    desc: Java detached JAR launch
    crit: suspicious
    conf: 0.84
    all:
      - id: java-jar-launch-arg
      - id: windows-start-empty-title
  - id: javaw-jar-hidden-launch
    desc: Java javaw JAR hidden launch
    crit: suspicious
    conf: 0.88
    all:
      - id: javaw-exe-suffix
      - id: java-jar-launch-arg
      - id: windows-start-empty-title
  - id: java-hidden-powershell
    desc: Java hidden PowerShell execution
    crit: suspicious
    conf: 0.93
    all:
      - id: java-powershell-windowstyle-hidden
      - id: java-powershell-executionpolicy-bypass
