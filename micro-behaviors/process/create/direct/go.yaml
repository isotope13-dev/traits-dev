# Go Command Execution
defaults:
  platforms: [windows, unix]
  for: [go]
traits:
  - id: exec-command
    desc: "Go exec.Command call"
    crit: notable
    conf: 0.95
    attack: "T1059.003"
    if:
      type: symbol
      exact: "exec.Command"
  - id: go-command-start
    desc: Go starts an exec.Command process
    crit: notable
    conf: 0.9
    attack: "T1059.003"
    if:
      type: symbol
      kind: call
      regex: '^exec\.Command\(\)\.Start$'
  - id: go-command-output-capture
    desc: "Go command output capture"
    crit: notable
    conf: 0.9
    attack: "T1059.003"
    if:
      type: symbol
      kind: call
      regex: '(^|\.)CombinedOutput$'
  - id: syscall-exec
    desc: "Direct execution via syscall.Exec"
    crit: notable
    conf: 0.98
    attack: "T1106"
    if:
      type: symbol
      exact: "syscall.Exec"
  - id: syscall-forkexec
    desc: "Direct execution via syscall.ForkExec"
    crit: notable
    conf: 0.98
    attack: "T1106"
    if:
      type: symbol
      exact: "syscall.ForkExec"
  - id: start-process
    desc: "Direct execution via os.StartProcess"
    crit: notable
    conf: 0.95
    attack: "T1106"
    if:
      type: symbol
      exact: "os.StartProcess"
  - id: exec-lookpath
    desc: "Go exe path resolution via exec.LookPath"
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "exec.LookPath"
