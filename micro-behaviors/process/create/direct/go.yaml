# Go Command Execution
defaults:
  platforms: [windows, unix]
  for: [go]
traits:
  - id: exec-command
    desc: Creates a child process with Go exec.Command
    crit: notable
    conf: 0.95
    attack: "T1059.003"
    if:
      type: symbol
      exact: "exec.Command"
  - id: exec-command-context
    desc: Creates a Go child process with context
    crit: notable
    conf: 0.95
    attack: "T1059.003"
    if:
      type: symbol
      exact: "exec.CommandContext"
  - id: go-python-inline-command
    desc: Go launches Python with inline -c
    crit: notable
    conf: 0.9
    attack: "T1059.006"
    if:
      type: text
      regex: 'exec\.Command\(\s*"(python(\d(\.\d+)?)?|py)"\s*,\s*"-c"'
  - id: go-command-start
    desc: Go starts an exec.Command process
    crit: notable
    conf: 0.9
    attack: "T1059.003"
    if:
      type: symbol
      kind: call
      regex: '^exec\.Command\(\)\.Start$'
  - id: go-command-output-capture
    desc: "Go command output capture"
    crit: notable
    conf: 0.9
    attack: "T1059.003"
    if:
      type: symbol
      kind: call
      regex: '(^|\.)CombinedOutput$'
  - id: syscall-exec
    desc: "Direct execution via syscall.Exec"
    crit: notable
    conf: 0.98
    attack: "T1106"
    if:
      type: symbol
      exact: "syscall.Exec"
  - id: syscall-forkexec
    desc: "Direct execution via syscall.ForkExec"
    crit: notable
    conf: 0.98
    attack: "T1106"
    if:
      type: symbol
      exact: "syscall.ForkExec"
  - id: start-process
    desc: "Direct execution via os.StartProcess"
    crit: notable
    conf: 0.95
    attack: "T1106"
    if:
      type: symbol
      exact: "os.StartProcess"
  - id: exec-lookpath
    desc: "Go exe path resolution via exec.LookPath"
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "exec.LookPath"
  - id: exec-lookpath-gdb
    desc: Checks for the GDB executable
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec.LookPath
      arg:
        kind: string
        exact: gdb
    unless:
      - id: metadata/package/quality/recognized-contexts::vm-fixture-context
  - id: exec-lookpath-lldb
    desc: Checks for the LLDB executable
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec.LookPath
      arg:
        kind: string
        exact: lldb
    unless:
      - id: metadata/package/quality/recognized-contexts::vm-fixture-context
  - id: exec-lookpath-strace
    desc: Checks for the strace executable
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec.LookPath
      arg:
        kind: string
        exact: strace
    unless:
      - id: metadata/package/quality/recognized-contexts::vm-fixture-context
  - id: exec-lookpath-ltrace
    desc: Checks for the ltrace executable
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec.LookPath
      arg:
        kind: string
        exact: ltrace
    unless:
      - id: metadata/package/quality/recognized-contexts::vm-fixture-context
  - id: exec-lookpath-dtrace
    desc: Checks for the dtrace executable
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec.LookPath
      arg:
        kind: string
        exact: dtrace
    unless:
      - id: metadata/package/quality/recognized-contexts::vm-fixture-context
composite_rules:
  - id: debugger-tool-lookup
    desc: Checks for debugger or tracing executables
    crit: notable
    conf: 0.9
    any:
      - id: exec-lookpath-gdb
      - id: exec-lookpath-lldb
      - id: exec-lookpath-strace
      - id: exec-lookpath-ltrace
      - id: exec-lookpath-dtrace
