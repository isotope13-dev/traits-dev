defaults:
  attack: T1106
  platforms:
    - unix
    - android
    - ios
  for: [elf, macho, c]
traits:
  - id: execve-import
    desc: Direct execve program execution
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: execve
    downgrade:
      # Go's os/exec package statically imports execve for exec.Command on Unix;
      # every Go Unix binary imports it regardless of program behavior.
      any:
        - id: metadata/lang/compiled::go-runtime-marker
  - id: fexecve-import
    desc: Direct fexecve program execution
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: fexecve
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
  - id: execve-symbol
    desc: execve system call symbol
    crit: component
    conf: 0.9
    platforms:
      - linux
    for:
      - elf
    if:
      type: symbol
      regex: ^_?execve$
composite_rules:
  - id: execve-with-fd-redirect-macos
    desc: macOS execve with FD redirect
    crit: notable
    conf: 0.88
    platforms:
      - macos
    for:
      - macho
    all:
      - id: execve-import
      - id: micro-behaviors/process/fd/dup::dup2
    unless:
      # Accept any Go-runtime detector (go-version-string requires rodata and
      # misses stripped builds; go-runtime-marker now catches those too).
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/lang/compiled::go-runtime-marker
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - type: basename
          regex: ^ssh(d|-.+)?$
