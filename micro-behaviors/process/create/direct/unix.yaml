defaults:
  attack: "T1106"
  platforms: [linux, macos, unix, android, ios]
  for: [elf, macho, so, dylib, c]

traits:
  - id: execve-import
    desc: Direct execve program execution
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "execve"

  - id: fexecve-import
    desc: Direct fexecve program execution
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "fexecve"

composite_rules:
  - id: execve-with-fd-redirect-macos
    desc: macOS execve with FD redirect
    crit: suspicious
    conf: 0.88
    platforms: [macos]
    for: [macho, dylib]
    all:
      - id: execve-import
      - id: micro-behaviors/process/fd/dup::dup2
