defaults:
  attack: T1106
  platforms:
  - unix
  - android
  - ios
  for: [elf, macho, c]
traits:
- id: python-preexec-hook
  desc: Python subprocess pre-execution hook
  crit: notable
  conf: 0.9
  platforms: [unix]
  for: [python]
  if:
    type: text
    substr: preexec_fn=
- id: execve-import
  desc: References execve process API
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: execve
  downgrade:
      # Go's os/exec package statically imports execve for exec.Command on Unix;
      # every Go Unix binary imports it regardless of program behavior.
    any:
    - id: metadata/lang/compiler/systems::go-binary
    - id: metadata/lang/compiler/systems::go-binary-macho
    - id: metadata/file/string/identity::system-shell-basename
- id: python-os-execve-call
  desc: Python os.execve process replacement
  crit: notable
  conf: 0.92
  for: [python]
  if:
    type: symbol
    kind: call
    exact: os.execve
- id: fexecve-import
  desc: Direct fexecve program execution
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: fexecve
  downgrade:
    any:
    - id: metadata/lang/compiled/
- id: posix-spawn-import
  desc: POSIX spawn process execution
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: posix_spawn
- id: posix-spawnp-import
  desc: POSIX spawn PATH execution
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: posix_spawnp
- id: posix-spawn-file-actions
  desc: POSIX spawn file actions
  crit: notable
  conf: 0.86
  if:
    type: symbol
    substr: posix_spawn_file_actions_
- id: posix-spawn-attr-control
  desc: POSIX spawn attribute control
  crit: notable
  conf: 0.82
  if:
    type: symbol
    substr: posix_spawnattr_
- id: pipe-import
  desc: References POSIX pipe API
  crit: baseline
  conf: 0.72
  if:
    type: symbol
    regex: ^pipe2?$
composite_rules:
- id: execve-with-fd-redirect-macos
  desc: macOS execve with FD redirect
  crit: notable
  conf: 0.88
  platforms:
  - macos
  for:
  - macho
  all:
  - id: execve-import
  - id: micro-behaviors/process/fd/dup::dup2
  unless:
      # Accept any Go-runtime detector (go-version-string requires rodata and
      # misses stripped builds; go-runtime-marker now catches those too).
  - id: metadata/lang/compiler/systems::go-version-string
  - id: metadata/lang/compiler/systems::go-binary-macho
  - id: metadata/lang/compiled/
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: micro-behaviors/os/service/remote::sshd-ref
- id: posix-spawn-with-fd-actions
  desc: POSIX spawn with FD actions
  crit: notable
  conf: 0.9
  platforms:
  - macos
  - linux
  for:
  - macho
  - elf
  all:
  - id: posix-spawn-file-actions
  any:
  - id: posix-spawn-import
  - id: posix-spawnp-import
- id: fork-exec-piped-stdio
  desc: Fork-exec with piped stdio
  crit: notable
  conf: 0.86
  platforms:
  - linux
  - macos
  for:
  - elf
  - macho
  all:
  - id: pipe-import
  - id: micro-behaviors/process/fd/dup::dup2
  - id: execve-import
- id: child-stdio-pipe-redirect
  desc: Child process stdio pipe redirect
  crit: notable
  conf: 0.88
  platforms:
  - linux
  - macos
  for:
  - elf
  - macho
  all:
  - id: pipe-import
  any:
  - id: posix-spawn-with-fd-actions
  - id: fork-exec-piped-stdio
