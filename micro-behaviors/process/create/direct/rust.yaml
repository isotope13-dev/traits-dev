# Process Execution - Rust
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  platforms: [windows, unix]
  attack: T1059
  mbc: E1059
  for: [rust]
traits:
  - id: rust-spawn-call
    desc: Rust spawn() method call
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\.spawn\s*\('
  - id: rust-process-command-import
    desc: Imports Rust process::Command
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?m)^\s*use\s+((std|tokio)::process|async_process)::(Command\b|\{.{0,120}\bCommand\b)'
  - id: rust-command-curl-wget
    desc: Constructs curl or wget process command
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\s*\(\s*"(curl|wget)"'
  - id: rustfmt-process-command
    desc: Rust invokes the rustfmt source formatter
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'Command::new\s*\(\s*"rustfmt"\s*\)'
  - id: rust-qualified-process-command
    desc: Creates Rust command via qualified path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\b(std|tokio)::process::Command::new\s*\('
  - id: rust-hook-command-new
    desc: Rust launches a hook-selected command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Command::new\s*\(\s*&[A-Za-z_][A-Za-z0-9_]*_hook\s*\)'
  - id: rust-hook-command-spawn
    desc: Rust spawns a hook-selected command
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'Command::new\s*\(\s*&[A-Za-z_][A-Za-z0-9_]*_hook\s*\)[\s\S]{0,180}\.spawn\s*\('
  - id: rust-bin-sh-c-call
    desc: Rust runs /bin/sh -c
    crit: component
    conf: 0.92
    platforms: [unix, openwrt]
    if:
      type: text
      regex: 'Command::new\s*\(\s*"/bin/(ba)?sh"\s*\)\s*\n?\s*\.arg\s*\(\s*"-c"'
  - id: rust-command-output
    desc: Captures child process output
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: \.output\s*\(\s*\)\s*\?
  - id: rust-stdout-stderr-return
    desc: Returns stdout or stderr text
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: from_utf8_lossy\(&output\.(stdout|stderr)\)\.to_string\(\)
    count_min: 2
composite_rules:
  - id: rust-command-from-import
    desc: Constructs a Rust command using imported Command
    crit: notable
    conf: 0.95
    all:
      - id: rust-process-command-import
      - id: micro-behaviors/process/create/exec::rust-command-new-call
  - id: rust-process-command
    desc: Constructs a Rust child-process command
    crit: notable
    conf: 0.95
    any:
      - id: rust-command-from-import
      - id: rust-qualified-process-command
  - id: rust-bin-sh-c
    desc: Rust process command runs /bin/sh -c
    crit: notable
    conf: 0.92
    all:
      - id: rust-process-command
      - id: rust-bin-sh-c-call
  - id: rust-spawn
    desc: Spawns a child process via Rust Command
    crit: notable
    conf: 0.9
    all:
      - id: rust-process-command
      - id: rust-spawn-call
    near_lines: 8
