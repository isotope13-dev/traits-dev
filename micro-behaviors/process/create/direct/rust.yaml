# Process Execution - Rust
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [rust]
traits:
  - id: rust-spawn
    desc: Spawns a new process
    crit: notable
    conf: 0.9
    mbc: "E1059"
    attack: "T1059"
    if:
      type: ast
      kind: call
      exact: ".spawn()"
  - id: rust-async-process
    desc: Executes process using async-process
    crit: notable
    conf: 0.9
    mbc: "E1059"
    attack: "T1059"
    if:
      type: ast
      kind: call
      exact: "Command::new"
