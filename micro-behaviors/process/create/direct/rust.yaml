# Process Execution - Rust
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  platforms: [windows, unix]
  attack: T1059
  mbc: E1059
  for: [rust]
traits:
  - id: rust-spawn-call
    desc: Rust spawn() method call
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\.spawn\s*\('
  - id: rust-async-process
    desc: Builds process via Command::new
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: \bCommand::new\s*\(
  - id: rust-bin-sh-c
    desc: Rust runs /bin/sh -c
    crit: notable
    conf: 0.92
    platforms: [unix, openwrt]
    if:
      type: text
      regex: 'Command::new\s*\(\s*"/bin/(ba)?sh"\s*\)\s*\n?\s*\.arg\s*\(\s*"-c"'
  - id: rust-command-output
    desc: Captures child process output
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: \.output\s*\(\s*\)\s*\?
  - id: rust-stdout-stderr-return
    desc: Returns stdout or stderr text
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: from_utf8_lossy\(&output\.(stdout|stderr)\)\.to_string\(\)
    count_min: 2
composite_rules:
  - id: rust-spawn
    desc: Spawns a child process via Rust Command
    crit: notable
    conf: 0.9
    all:
      - id: rust-async-process
      - id: rust-spawn-call
    near_lines: 8
