# Process Execution - Rust
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  platforms: [windows, unix]
  attack: T1059
  mbc: E1059
  for: [rust]
traits:
  - id: rust-spawn
    desc: Spawns a new process
    crit: notable
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: ".spawn()"
  - id: rust-async-process
    desc: Executes process using async-process
    crit: notable
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "Command::new"
