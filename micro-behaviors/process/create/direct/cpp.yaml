defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
traits:
  - id: fgets-loop
    desc: Line-based file reading (fgets)
    crit: baseline
    if:
      type: symbol
      exact: fgets
  - id: string-append
    desc: Capturing data into C++ std::string
    crit: baseline
    if:
      type: symbol
      regex: std::__1::basic_string.{0,50}(append|push_back|operator\+=)
