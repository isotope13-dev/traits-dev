defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: C0024
  attack: T1059.007

traits:
  - id: deno-run-call
    desc: Deno.run process creation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: Deno.run
  - id: deno-command-call
    desc: Deno.Command process creation
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: Deno.Command
  - id: deno-execpath-call
    desc: Deno executable path lookup
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: Deno.execPath
  - id: deno-allow-run-flag
    desc: Deno allow-run permission flag
    crit: notable
    conf: 0.86
    if:
      type: literal
      exact: --allow-run
  - id: deno-allow-env-flag
    desc: Deno allow-env permission flag
    crit: notable
    conf: 0.84
    if:
      type: literal
      exact: --allow-env
  - id: deno-ignore-cert-errors-flag
    desc: Deno ignores TLS certificate errors
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: --unsafely-ignore-certificate-errors

composite_rules:
  - id: deno-self-spawns-runtime-script
    desc: Deno runtime creates script process
    crit: suspicious
    conf: 0.93
    all:
      - id: deno-run-call
      - id: deno-execpath-call
    any:
      - id: deno-allow-run-flag
      - id: deno-allow-env-flag
