defaults:
  platforms: [linux]
  for: [elf]
  arch: [arm]
  crit: notable

# Linux ARM EABI syscall wrappers in stripped static binaries.  These atoms
# describe the operation represented by the syscall number; intent belongs in
# objective composites.
traits:
  - id: arm-eabi-execve
    desc: ARM EABI direct execve(2) wrapper
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      # mov r7, 11; svc 0 (Linux ARM EABI execve)
      pattern: "0b 70 a0 e3 00 00 00 ef"
  - id: arm-eabi-clone
    desc: ARM EABI direct clone(2) wrapper
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      # mov r7, 120; svc 0 (Linux ARM EABI clone)
      pattern: "78 70 a0 e3 00 00 00 ef"
  - id: arm-eabi-dup2
    desc: ARM EABI direct dup2(2) wrapper
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      # mov r7, 63; svc 0 (Linux ARM EABI dup2)
      pattern: "3f 70 a0 e3 00 00 00 ef"
