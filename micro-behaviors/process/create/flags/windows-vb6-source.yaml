defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1106
traits:
  - id: create-suspended-vb6
    desc: VB6 CREATE_SUSPENDED flag
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: CREATE_SUSPENDED
  - id: context-full-vb6
    desc: VB6 CONTEXT_FULL constant
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: CONTEXT_FULL
