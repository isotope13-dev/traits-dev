# Windows Process Creation Flags
# Neutral capabilities - intent determined in objectives/
# GuardDog-inspired
defaults:
  platforms: [windows]
  for: [python]
  crit: notable
  conf: 0.90
traits:
  # === Windows Creation Flags (neutral capabilities) ===
  - id: create-no-window
    desc: CREATE_NO_WINDOW flag
    if:
      type: symbol
      exact: "CREATE_NO_WINDOW"
  - id: sw-hide
    desc: SW_HIDE window flag
    if:
      type: symbol
      exact: "SW_HIDE"
  - id: sw-hide-token
    desc: SW_HIDE window flag token
    crit: component
    conf: 0.85
    for: [javascript, vbs, c, cpp, csharp]
    if:
      type: text
      word: "SW_HIDE"
  - id: show-window-property-symbol
    desc: ShowWindow property reference
    crit: notable
    conf: 0.86
    for: [javascript, vbs, c, cpp, csharp]
    if:
      type: symbol
      regex: '(^|\.)ShowWindow$'
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
  - id: show-window-hidden-assignment
    desc: Assigns hidden ShowWindow value
    crit: notable
    conf: 0.88
    for: [javascript, vbs, html]
    if:
      type: text
      regex: '(?i)\bShowWindow\s*=\s*0'
  - id: detached-process
    desc: DETACHED_PROCESS flag
    if:
      type: symbol
      exact: "DETACHED_PROCESS"
  - id: python-detached-hidden-hex
    desc: Python detached hidden process flags
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "creationflags\\s*=\\s*0x0?8000008\\b"
  - id: startupinfo
    desc: STARTUPINFO structure
    if:
      type: symbol
      regex: 'STARTUPINFO'
  - id: create-suspended
    desc: CREATE_SUSPENDED flag
    if:
      type: symbol
      exact: "CREATE_SUSPENDED"
  - id: create-suspended-flag-reference
    desc: CREATE_SUSPENDED process creation flag reference
    crit: notable
    conf: 0.9
    for: [go, c, cpp, csharp, pe, dll, powershell, batch, javascript]
    if:
      type: text
      word: CREATE_SUSPENDED
