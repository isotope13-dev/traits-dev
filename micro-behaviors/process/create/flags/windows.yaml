# Windows Process Creation Flags
# Neutral capabilities - intent determined in objectives/
# GuardDog-inspired
defaults:
  platforms: [windows]
  for: [python]
  crit: notable
  conf: 0.90
traits:
  # === Windows Creation Flags (neutral capabilities) ===
  - id: create-no-window
    desc: CREATE_NO_WINDOW flag
    if:
      type: symbol
      exact: "CREATE_NO_WINDOW"
  - id: sw-hide
    desc: SW_HIDE window flag
    if:
      type: symbol
      exact: "SW_HIDE"
  - id: detached-process
    desc: DETACHED_PROCESS flag
    if:
      type: symbol
      exact: "DETACHED_PROCESS"
  - id: python-detached-hidden-hex
    desc: Python detached hidden process flags
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "creationflags\\s*=\\s*0x0?8000008\\b"
  - id: startupinfo
    desc: STARTUPINFO structure
    if:
      type: symbol
      regex: 'STARTUPINFO'
  - id: create-suspended
    desc: CREATE_SUSPENDED flag
    if:
      type: symbol
      exact: "CREATE_SUSPENDED"
  - id: create-suspended-source
    desc: CREATE_SUSPENDED flag in source code
    crit: notable
    conf: 0.9
    for: [go, c, cpp, csharp]
    if:
      type: text
      word: CREATE_SUSPENDED
