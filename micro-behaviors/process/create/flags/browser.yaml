defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]

traits:
  - id: chromium-no-first-run-flag
    desc: Chromium --no-first-run launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --no-first-run

  - id: chrome-disable-background-networking-flag
    desc: Chrome background-networking disable flag
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: --disable-background-networking

  - id: chrome-simulate-outdated-no-au-flag
    desc: Chrome --simulate-outdated-no-au launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --simulate-outdated-no-au

  - id: chrome-disable-component-update-flag
    desc: Chrome --disable-component-update launch flag
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: --disable-component-update

  - id: edge-disable-auto-update-flag
    desc: Edge --disable-auto-update launch flag
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: --disable-auto-update\b

  - id: browser-load-extension-flag
    desc: Browser --load-extension launch flag
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: --load-extension=
