defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  conf: 0.96

traits:
  - id: powershell-hidden-window-flag
    desc: PowerShell hidden-window option flag
    if:
      type: literal
      exact: -WindowStyle

  - id: powershell-hidden-window-value
    desc: PowerShell hidden-window option value
    if:
      type: literal
      exact: Hidden

  - id: powershell-policy-bypass-flag
    desc: PowerShell execution-policy bypass option
    crit: notable
    for: [powershell, python, batch, pe]
    if:
      type: text
      regex: '(?i)\b(powershell|pwsh)(\.exe)?\b[^\r\n]{0,100}-(ExecutionPolicy|EP)\s+Bypass\b'

  - id: powershell-policy-bypass-value
    desc: PowerShell bypass policy value
    if:
      type: literal
      exact: Bypass
