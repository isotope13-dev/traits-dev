defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  conf: 0.96

traits:
  - id: powershell-no-profile-flag
    desc: PowerShell disables profile loading
    crit: notable
    for: [powershell, python, batch, pe, go, html]
    if:
      type: text
      regex: '(?i)\b(powershell|pwsh)(\.exe)?\b[^\r\n]{0,140}-(NoProfile|nop)\b'

  - id: powershell-noninteractive-flag
    desc: PowerShell disables interactive prompts
    crit: notable
    for: [powershell, python, batch, pe, go, html]
    if:
      type: text
      regex: '(?i)\b(powershell|pwsh)(\.exe)?\b[^\r\n]{0,140}-NonInteractive\b'

  - id: powershell-no-logo-flag
    desc: PowerShell suppresses startup banner
    crit: notable
    for: [powershell, python, batch, pe, go, html]
    if:
      type: text
      regex: '(?i)\b(powershell|pwsh)(\.exe)?\b[^\r\n]{0,140}-NoLogo\b'

  - id: powershell-windowstyle-minimized
    desc: PowerShell requests minimized window
    crit: notable
    for: [powershell, python, batch, pe, go, html]
    if:
      type: text
      regex: '(?i)\b(powershell|pwsh)(\.exe)?\b[^\r\n]{0,100}-WindowStyle\s+Minimized\b'

  - id: powershell-hidden-window-flag
    desc: PowerShell hidden-window option flag
    if:
      type: literal
      exact: -WindowStyle

  - id: powershell-hidden-window-value
    desc: PowerShell hidden-window option value
    if:
      type: literal
      exact: Hidden

  - id: powershell-policy-bypass-flag
    desc: PowerShell execution-policy bypass option
    crit: notable
    for: [powershell, python, batch, pe, go, html]
    if:
      type: text
      regex: '(?i)\b(powershell|pwsh)(\.exe)?\b[^\r\n]{0,100}-(ExecutionPolicy|EP)\s+Bypass\b'
    unless:
      - id: well-known/lib/huggingface::hub-utils-package-file
      - id: well-known/lib/huggingface::hub-runtime-bytecode

  - id: powershell-policy-bypass-value
    desc: PowerShell bypass policy value
    for: [powershell, python]
    if:
      type: literal
      exact: Bypass
