defaults:
  platforms: [windows]
  for:
    - pe
    - dll
traits:
  - id: detached-process-flag-immediate
    desc: DETACHED_PROCESS flag immediate
    crit: component
    conf: 0.82
    arch:
      - x86
    if:
      type: hex
      section: .text
      pattern: 68 00 00 00 08 6A 01 6A 00
  - id: winexec-sw-hide-immediate
    desc: WinExec hidden-window flag immediate
    crit: component
    conf: 0.9
    arch:
      - x86
    if:
      type: hex
      section: .text
      pattern: 6A 00 56 FF 15 ?? ?? ?? ??
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
composite_rules:
  - id: detached-createprocessa
    desc: Detached CreateProcessA execution
    crit: notable
    conf: 0.86
    all:
      - id: detached-process-flag-immediate
      - id: micro-behaviors/process/create/spawn::create-process-a
  - id: hidden-winexec
    desc: Hidden WinExec process launch
    crit: suspicious
    conf: 0.85
    attack: T1564.003
    all:
      - id: winexec-sw-hide-immediate
      - id: micro-behaviors/process/create/exec::winexec
    unless:
      - id: well-known/tool/sysadmin/sandboxie/
      - id: well-known/tool/reverse-engineering/scyllahide/
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: well-known/app/internet-explorer/
