defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: shell-bang-true
    desc: Minified shell spawn option set to true
    crit: notable
    conf: 0.9
    attack: T1059
    if:
      type: text
      regex: 'shell\s*:\s*!\s*0'
  - id: detached-bang-true
    desc: Detached spawn minified true
    crit: notable
    conf: 0.86
    mbc: "F0011"
    attack: "T1059"
    if:
      type: text
      regex: 'detached\s*:\s*!\s*0'
  - id: windowshide-bang-true
    desc: Minified windowsHide true option
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'windowsHide\s*:\s*!\s*0'
