defaults:
  for:
    - csharp
  platforms:
    - windows
traits:
  - id: interaction-shell
    desc: VB Interaction.Shell execution
    crit: notable
    conf: 0.92
    attack: T1059
    mbc: OB0006
    if:
      type: text
      substr: Interaction.Shell(
  - id: hidden-appwinstyle
    desc: Hidden AppWinStyle shell execution
    crit: suspicious
    conf: 0.95
    attack: T1564
    if:
      type: text
      substr: AppWinStyle.Hide
  - id: nircmd-executable
    desc: NirCmd executable reference
    crit: notable
    conf: 0.95
    attack: T1218
    if:
      type: string_literal
      exact: nircmdc.exe
  - id: nircmd-shellcopy
    desc: NirCmd shellcopy command
    crit: notable
    conf: 0.95
    attack: T1218
    if:
      type: text
      regex: nircmdc\.exe\s+shellcopy
  - id: run-key-regsetval
    desc: Run key regsetval command
    crit: suspicious
    conf: 0.97
    attack: T1547.001
    if:
      type: text
      substr: ' regsetval sz "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run" '
  - id: nircmd-filldelete
    desc: NirCmd filldelete command
    crit: suspicious
    conf: 0.95
    attack: T1070.004
    if:
      type: text
      regex: nircmdc\.exe\s+filldelete
  - id: nircmd-waitprocess-filldelete
    desc: NirCmd waitprocess file wipe
    crit: suspicious
    conf: 0.98
    attack: T1070.004
    if:
      type: text
      regex: nircmdc\.exe\s+waitprocess\s+/.{0,40}filldelete \*\.\*
  - id: nircmd-hide-window-title
    desc: NirCmd window title hiding
    crit: suspicious
    conf: 0.95
    attack: T1564
    if:
      type: text
      regex: nircmdc\.exe\s+win hide ititle
  - id: nircmd-temp-exe-delete
    desc: NirCmd temp executable deletion
    crit: suspicious
    conf: 0.96
    attack: T1070.004
    if:
      type: text
      regex: nircmdc\.exe\s+execmd del "%TEMP%\\\*\.exe"
  - id: nircmd-attrib-system-readonly
    desc: NirCmd sets system readonly attributes
    crit: suspicious
    conf: 0.94
    attack: T1564.001
    if:
      type: text
      regex: nircmdc\.exe\s+execmd attrib \+r \+s
  - id: nircmd-attrib-clear-hidden
    desc: NirCmd clears hidden system attributes
    crit: suspicious
    conf: 0.92
    attack: T1222
    if:
      type: text
      regex: nircmdc\.exe\s+execmd attrib -h -r -s
  - id: dep-disable-attempt
    desc: NX AlwaysOff boot setting attempt
    crit: suspicious
    conf: 0.96
    attack: T1562.001
    if:
      type: text
      regex: ba?cdedit /set \{current\} nx AlwaysOff
  - id: process-enumeration-dotnet
    desc: .NET process enumeration
    crit: notable
    conf: 0.9
    attack: T1057
    mbc: C0003
    if:
      type: text
      substr: Process.GetProcesses()
  - id: current-directory-delete
    desc: Current directory file deletion
    crit: suspicious
    conf: 0.9
    attack: T1070.004
    if:
      type: text
      regex: DeleteFile\(FileSystem\.CurDir\(\).{0,40}nircmd
composite_rules:
  - id: hidden-shell-lolbin
    desc: Hidden shell execution via NirCmd
    crit: suspicious
    conf: 0.97
    all:
      - id: interaction-shell
      - id: hidden-appwinstyle
      - id: nircmd-executable
  - id: nircmd-persistence-staging
    desc: NirCmd persistence staging commands
    crit: suspicious
    conf: 0.97
    any:
      - id: nircmd-shellcopy
      - id: run-key-regsetval
      - id: nircmd-attrib-system-readonly
