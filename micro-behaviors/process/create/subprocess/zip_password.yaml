# Password-protected ZIP creation via subprocess
# ATT&CK: T1560.001 (Archive Collected Data: Archive via Utility)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1560.001"
traits:
  - id: popen-zip-password
    desc: subprocess.Popen call to zip with password
    crit: suspicious
    conf: 0.8
    mbc: "E1560.001"
    if:
      type: text
      regex: 'subprocess\.Popen\([^)]{0,50}[''"]zip[''"],\s*[''"]-P[''"]'
