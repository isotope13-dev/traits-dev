defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.88
  mbc: C0017

traits:
  - id: exec-env-run-argv-call
    desc: ExecEnv run_argv process spawn
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(run_argv)$'

  - id: shell-command-shlex-join
    desc: shlex joined shell command
    if:
      type: symbol
      kind: call
      exact: shlex.join

composite_rules:
  - id: exec-env-process-execution
    desc: ExecEnv process execution backend
    all:
      - id: exec-env-run-argv-call
    any:
      - id: shell-command-shlex-join
      - id: micro-behaviors/process/create/subprocess::popen-ast

