      # === GuardDog: distutils.spawn ===
  - id: distutils-spawn
    desc: distutils spawn function
    crit: notable
    conf: 0.85
    mbc: "E1059.006"
    if:
      type: symbol
      regex: '(distutils\.spawn\.spawn|spawn)\('
composite_rules:
  # All subprocess methods (string-based, AST-based, and content-based)
  - id: methods
    desc: subprocess module methods
    crit: notable
    conf: 0.75
    any:
      - id: popen-content
      - id: run-content
      - id: call
      - id: check-output
      - id: getoutput-content
      - id: check-call-content
      - id: run-ast
        # GuardDog: os.exec* family composite
  - id: os-exec-family
    desc: os.exec* family functions
    crit: notable
    conf: 0.85
    any:
      - id: os-execl
      - id: os-execle
      - id: os-execlp
      - id: os-execlpe
      - id: os-execv
      - id: os-execve
      - id: os-execvp
      - id: os-execvpe
        # GuardDog: os.spawn* family composite
  - id: os-spawn-family
    desc: os.spawn* family functions
    crit: notable
    conf: 0.85
    any:
      - id: os-spawnl
      - id: os-spawnle
      - id: os-spawnlp
      - id: os-spawnlpe
      - id: os-spawnv
      - id: os-spawnve
      - id: os-spawnvp
      - id: os-spawnvpe
      - id: os-posix-spawn
      - id: os-posix-spawnp
        # GuardDog: All process execution capabilities
  - id: process-execution
    desc: Python process execution capabilities
    crit: notable
    conf: 0.80
    any:
      - id: methods
      - id: os-popen
      - id: os-popen-ast
      - id: micro-behaviors/process/create/system::python-os-system
      - id: os-exec-family
      - id: os-spawn-family
      - id: distutils-spawn
