# Python subprocess execution
# ATT&CK: T1059.006 (Python)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"
traits:
  # === Import patterns ===
  - id: import-dup
    desc: subprocess module import
    crit: baseline
    conf: 0.7
    mbc: "E1059.006"
    if:
      type: text
      regex: "import subprocess|from subprocess"
      # === String-based method detection ===
      # NOTE: popen removed - use popen-content (content type is broader)
  - id: call
    desc: subprocess.call call
    crit: notable
    conf: 0.75
    mbc: "E1059.006"
    if:
      type: text
      substr: "subprocess.call("
  - id: call-touch-argv
    desc: subprocess.call launches touch argv
    crit: notable
    conf: 0.94
    mbc: "E1059.006"
    if:
      type: ast
      query: |
        ((call
          function: (attribute
            object: (identifier) @mod
            attribute: (identifier) @meth)
          arguments: (argument_list
            (list
              (string) @cmd
              (string) @path)))
         (#eq? @mod "subprocess")
         (#eq? @meth "call")
         (#match? @cmd "^['\"]touch['\"]$")
         (#match? @path "^['\"][^'\"]+['\"]$"))
  - id: check-output
    desc: subprocess.check_output call
    crit: notable
    conf: 0.8
    mbc: "E1059.006"
    if:
      type: text
      substr: "subprocess.check_output("
    unless:
      - type: text
        regex: subprocess\.check_output\(\s*\[\s*["']wslpath["']
      - type: basename
        regex: '^(common_ship|ship|make_msvc_package)\.py$'
  - id: getoutput-content
    desc: subprocess.getoutput call
    crit: notable
    conf: 0.86
    mbc: "E1059.006"
    if:
      type: text
      substr: "subprocess.getoutput("
      # NOTE: check-call removed - use check-call-content (content type is broader)
  - id: os-popen
    # === os.popen detection ===

    desc: Executes command via os.popen
    crit: notable
    conf: 0.85
    mbc: "E1059.006"
    if:
      type: text
      substr: "os.popen("
  - id: os-popen-raw
    desc: Executes command via os.popen (raw)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "os.popen"
  - id: os-popen-ast
    desc: Executes command via os.popen
    crit: notable
    conf: 0.9
    mbc: "C0017"
    if:
      type: ast
      query: |
        ((call
          function: (attribute
            object: (identifier) @mod
            attribute: (identifier) @meth))
         (#eq? @mod "os")
         (#eq? @meth "popen"))
      # === AST-based detection (more precise) ===
  - id: run-ast
    desc: "Executes external system command"
    crit: notable
    conf: 0.85
    mbc: "C0017"
    if:
      type: ast
      query: |
        ((call
          function: (attribute
            object: (identifier) @mod
            attribute: (identifier) @meth)
          arguments: (argument_list
            (string) @cmd))
         (#eq? @mod "subprocess")
         (#match? @meth "^(Popen|run|call|check_output|check_call)$"))
      # === Content-based fallback ===
      # subprocess calls appear as code, not string literals, so string type misses them.
      # Content type matches raw file bytes.
  - id: run-content
    desc: subprocess.run call (content)
    crit: notable
    conf: 0.75
    mbc: "E1059.006"
    if:
      type: text
      substr: "subprocess.run("
  - id: popen-content
    desc: subprocess.Popen call (content)
    crit: notable
    conf: 0.75
    mbc: "E1059.006"
    if:
      type: text
      substr: "subprocess.Popen("
    unless:
      - type: text
        regex: subprocess\.Popen\(\s*\[\s*["']open["']
      - type: text
        regex: subprocess\.Popen\(\s*\[\s*["']xdg-open["']
      - type: text
        regex: subprocess\.Popen\(\s*\[\s*["']explorer\.exe["']
  - id: check-call-content
    desc: subprocess.check_call call (content)
    crit: notable
    conf: 0.75
    mbc: "E1059.006"
    if:
      type: text
      substr: "subprocess.check_call("
    unless:
      - type: basename
        regex: '^(ship|make_msvc_package)\.py$'
  - id: shell-true
    desc: shell=True parameter in subprocess
    crit: notable
    conf: 0.7
    mbc: "E1059.006"
    if:
      type: text
      substr: "shell=True"
  - id: asyncio-create-subprocess-exec
    desc: asyncio subprocess execution call
    crit: notable
    conf: 0.85
    mbc: "E1059.006"
    if:
      type: symbol
      exact: "asyncio.create_subprocess_exec"
  - id: java-jar-argv
    desc: Python subprocess launches JAR
    crit: notable
    conf: 0.9
    mbc: "E1059.006"
    if:
      type: text
      regex: subprocess\.(run|Popen|call)\(\s*\[\s*['"]java['"]\s*,\s*['"]-jar['"]
  - id: sys-executable-popen
    desc: subprocess.Popen with sys.executable list
    crit: notable
    conf: 0.9
    mbc: "E1059.006"
    if:
      type: text
      regex: "Popen\\s*\\(\\s*\\[\\s*sys\\.executable\\s*,"
  - id: sys-executable-c-popen
    desc: subprocess.Popen inline Python command
    crit: notable
    conf: 0.94
    mbc: "E1059.006"
    if:
      type: text
      regex: "Popen\\s*\\(\\s*\\[\\s*sys\\.executable\\s*,\\s*['\"]-c['\"]"
  - id: sys-executable-c-popen-ast
    desc: subprocess.Popen inline Python command (AST)
    crit: notable
    conf: 0.96
    mbc: "E1059.006"
    if:
      type: ast
      query: |
        ((call
          function: (attribute
            object: (identifier) @mod
            attribute: (identifier) @meth)
          arguments: (argument_list
            (list
              (attribute
                object: (identifier) @sysmod
                attribute: (identifier) @executable)
              (string) @flag)))
         (#eq? @mod "subprocess")
         (#eq? @meth "Popen")
         (#eq? @sysmod "sys")
         (#eq? @executable "executable")
         (#match? @flag "^['\"]-c['\"]$"))
      # === GuardDog: os.exec* family ===
  - id: os-execl
    desc: os.execl - execute with path and args
    crit: notable
    conf: 0.85
    mbc: "E1059.006"
    if:
      type: symbol
      exact: "os.execl"
  - id: os-execle
