    if:
      type: symbol
      exact: "os.execvpe"
      # === GuardDog: os.spawn* family ===
  - id: os-spawnl
    desc: os.spawnl - spawn with path and args
    crit: notable
    conf: 0.85
    mbc: "E1059.006"
    if:
      type: symbol
      exact: "os.spawnl"
  - id: os-spawnle
    desc: os.spawnle - spawn with environment
    crit: notable
    conf: 0.85
    mbc: "E1059.006"
    if:
      type: symbol
      exact: "os.spawnle"
  - id: os-spawnlp
    desc: os.spawnlp - spawn with PATH search
    crit: notable
