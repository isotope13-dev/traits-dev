# Python subprocess execution
# ATT&CK: T1059.006 (Python)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"
traits:
  # === Import patterns ===
- id: import-subprocess
  desc: Imports Python's subprocess module
  crit: notable
  conf: 0.95
  mbc: "E1059.006"
  if:
    type: import
    exact: subprocess
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
  - id: well-known/tool/detection/security-remediation::authenticated-encryption-recommendation

- id: subprocess-output-options
  desc: Python subprocess captures output streams
  crit: notable
  conf: 0.9
  mbc: "C0017"
  if:
    type: text
    regex: 'subprocess\.(run|Popen|call)\([\s\S]{0,700}\b(stdout|stderr)\b'
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: subprocess-suppresses-stdio
  desc: Python subprocess stdio suppression
  crit: notable
  conf: 0.94
  mbc: "C0017"
  if:
    type: text
    regex: 'subprocess\.(run|Popen|call)\([\s\S]{0,700}\b(stdout|stderr)\s*=\s*subprocess\.DEVNULL'
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: subprocess-shell-cwd-options
  desc: Subprocess sets shell or working directory
  crit: notable
  conf: 0.9
  mbc: "C0017"
  if:
    type: tree-sitter
    kind: call
    regex: '(?s)\bsubprocess\.(run|Popen|call)\s*\([^)]{0,700}\b(shell|cwd)\s*='
  unless:
  - id: well-known/tool/detection/security-scanner::code-pattern-catalog
- id: python-command-and-cwd-parameters
  desc: Function accepts command and cwd parameters
  crit: notable
  conf: 0.9
  mbc: "C0017"
  if:
    type: text
    regex: 'def\s+\w+\s*\([^)]{0,200}\bcommand\b[^)]{0,160}\bcwd\b'
      # === String-based method detection ===
      # NOTE: popen removed - use popen-content (content type is broader)
- id: call
  desc: subprocess.call call
  crit: notable
  conf: 0.75
  mbc: "E1059.006"
  if:
    type: text
    substr: "subprocess.call("
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: call-touch-argv
  desc: subprocess.call launches touch argv
  crit: notable
  conf: 0.94
  mbc: "E1059.006"
  if:
      # Restored arg discriminator dropped in the call migration.
    type: symbol
    kind: call
    exact: 'subprocess.call'
    arg:
      kind: string
- id: check-output
  desc: subprocess.check_output call
  crit: notable
  conf: 0.8
  mbc: "E1059.006"
  if:
    type: text
    substr: "subprocess.check_output("
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - type: text
    regex: subprocess\.check_output\(\s*\[\s*["']wslpath["']
  - type: basename
    regex: '^(common_ship|ship|make_msvc_package)\.py$'
- id: pyc-check-output-call
  desc: Python bytecode references check_output
  crit: notable
  conf: 0.9
  mbc: "E1059.006"
  for: [pyc]
  if:
    type: text
    word: check_output
- id: getoutput-content
  desc: subprocess.getoutput call
  crit: notable
  conf: 0.86
  mbc: "E1059.006"
  if:
    type: text
    substr: "subprocess.getoutput("
      # NOTE: check-call removed - use check-call-content (content type is broader)
- id: os-popen
    # === os.popen detection ===

  desc: Executes command via os.popen
  crit: notable
  conf: 0.85
  mbc: "E1059.006"
  unless:
  - id: well-known/tool/detection/security-scanner::python-vulnerability-pattern-catalog
  - id: well-known/tool/detection/llm-scanner::skill-vetting-pattern-scanner
  if:
    type: text
    substr: "os.popen("
- id: os-popen-raw
  desc: Executes command via os.popen (raw)
  crit: notable
  conf: 0.8
  unless:
  - id: well-known/tool/detection/security-scanner::python-vulnerability-pattern-catalog
  - id: well-known/tool/detection/llm-scanner::skill-vetting-pattern-scanner
  # A scanner's detector lists the API names it matches on ("os.system", "os.popen")
  # as data; the module names the call, it does not make it.
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - type: text
    regex: '(?i)_SYMBOL_CAPS'
  if:
    type: text
    substr: "os.popen"
- id: os-popen-ast
  desc: Executes command via os.popen
  crit: notable
  conf: 0.9
  mbc: "C0017"
  if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
    type: symbol
    kind: call
    exact: 'os.popen'
- id: popen-ast
  desc: Launches a process with subprocess.Popen
  crit: notable
  conf: 0.85
  mbc: "C0017"
  if:
    type: symbol
    kind: call
    regex: '^(subprocess\.)?Popen$'
- id: popen-import
  desc: Imports Python subprocess.Popen
  crit: notable
  conf: 0.9
  mbc: "E1059.006"
  if:
    type: import
    exact: Popen
- id: popen-shell-true
  desc: Python Popen launches through a shell
  crit: notable
  conf: 0.94
  mbc: "C0017"
  if:
    type: tree-sitter
    kind: call
    regex: '(?s)\b(subprocess\.)?Popen\s*\([^)]{0,700}\bshell\s*=\s*True'
- id: subprocess-detached-session
  desc: Python starts a detached subprocess session
  crit: notable
  conf: 0.9
  mbc: "C0017"
  if:
    type: text
    substr: "start_new_session=True"
- id: run-ast
  desc: Calls subprocess.run to launch a process
  crit: notable
  conf: 0.85
  mbc: "C0017"
  if:
    type: tree-sitter
    kind: call
    regex: '(?s)\bsubprocess\.run\s*\('
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
    - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
    - id: well-known/tool/detection/security-scanner::code-pattern-catalog
- id: python-bash-script-launch
  desc: Python launches a Bash script
  crit: notable
  conf: 0.96
  mbc: "E1059.006"
  if:
    type: text
    regex: 'subprocess\.(run|Popen|call)\(\s*\[\s*["'']bash["'']\s*,\s*[^\]\n]{1,240}\]'
- id: python-bash-stdin-script
  desc: Python passes script text to Bash stdin
  crit: notable
  conf: 0.95
  mbc: "E1059.006"
  if:
    type: text
    regex: 'subprocess\.(run|Popen|call)\(\s*\[\s*["'']bash["'']\s*\][\s\S]{0,240}\binput\s*='
- id: python-start-shell-reference
  desc: Python references a start.sh script
  crit: notable
  conf: 0.96
  mbc: "E1059.006"
  if:
    type: string_literal
    exact: start.sh
- id: python-binary-path-argv-proxy
  desc: Python wrapper forwards arguments to a binary
  crit: notable
  conf: 0.9
  mbc: "C0017"
  if:
    type: text
    regex: 'subprocess\.run\(\[\s*(str\()?binary_path\)?\s*\]\s*\+\s*sys\.argv\[1:\]'
- id: call-ast
  desc: Runs a process with subprocess.call
  crit: notable
  conf: 0.85
  mbc: "C0017"
  if:
    type: symbol
    kind: call
    exact: subprocess.call
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: check-output-ast
  desc: subprocess.check_output call
  crit: notable
  conf: 0.85
  mbc: "C0017"
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  if:
    type: symbol
    kind: call
    exact: subprocess.check_output
- id: check-call-ast
  desc: subprocess.check_call call
  crit: notable
  conf: 0.85
  mbc: "C0017"
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  if:
    type: symbol
    kind: call
    exact: subprocess.check_call
- id: run-content
  desc: Calls subprocess.run
  crit: notable
  conf: 0.75
  mbc: "E1059.006"
  if:
    type: text
    substr: "subprocess.run("
  # Prefer the structured call finding when parsing succeeds; retain this
  # text matcher only as a fallback for malformed or embedded source.
  unless:
  - id: run-ast
- id: popen-content
  desc: Calls subprocess.Popen
  crit: notable
  conf: 0.75
  mbc: "E1059.006"
  if:
    type: text
    substr: "subprocess.Popen("
  unless:
  - id: popen-ast
  - type: text
    regex: subprocess\.Popen\(\s*\[\s*["']open["']
  - type: text
    regex: subprocess\.Popen\(\s*\[\s*["']xdg-open["']
  - type: text
    regex: subprocess\.Popen\(\s*\[\s*["']explorer\.exe["']
- id: check-call-content
  desc: Calls subprocess.check_call
  crit: notable
  conf: 0.75
  mbc: "E1059.006"
  if:
    type: text
    substr: "subprocess.check_call("
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  - type: basename
    regex: '^(ship|make_msvc_package)\.py$'
- id: shell-true
  desc: shell=True parameter in subprocess
  crit: notable
  conf: 0.7
  mbc: "E1059.006"
  unless:
  - id: well-known/tool/detection/security-scanner::python-vulnerability-pattern-catalog
  - id: well-known/tool/detection/llm-scanner::skill-vetting-pattern-scanner
  # An injection detector quotes "shell=True" in the diagnostic it prints about
  # other people's code; it is a message string, not a call it makes.
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - type: text
    regex: 'CODE_(CRITICAL|HIGH)_PATTERNS'
  - type: text
    substr: 'Replace dangerous patterns'
  if:
    type: text
    substr: "shell=True"
  not:
  - substr: never ``shell=True``
- id: variable-command-shell-true
  desc: Variable command passed to shell
  crit: notable
  conf: 0.95
  mbc: "E1059.006"
  if:
    type: text
    regex: 'subprocess\.run\(\s*command\s*,[\s\S]{0,300}shell\s*=\s*True'

- id: python-interpreter-code-argument
  desc: Python interpreter receives code variable
  crit: notable
  conf: 0.92
  mbc: "E1059.006"
  if:
    type: text
    regex: 'python[23]?["'']\s*,\s*["'']-[cC]["'']\s*,\s*code'

- id: python-interpreter-file-argument
  desc: Python interpreter receives file variable
  crit: notable
  conf: 0.92
  mbc: "E1059.006"
  if:
    type: text
    regex: 'python[23]?["'']\s*,\s*file'
- id: shell-true-call
  desc: subprocess call with shell=True
  crit: notable
  conf: 0.82
  mbc: "E1059.006"
  unless:
  - id: well-known/tool/detection/security-scanner::python-vulnerability-pattern-catalog
  - id: well-known/tool/detection/llm-scanner::skill-vetting-pattern-scanner
  - id: well-known/tool/detection/security-scanner::code-pattern-catalog
  if:
    type: tree-sitter
    kind: call
    regex: '(?s)\bsubprocess\.(run|Popen|call)\s*\([^)]{0,100}\bshell\s*=\s*True'
- id: asyncio-create-subprocess-exec
  desc: asyncio subprocess execution call
  crit: notable
  conf: 0.85
  mbc: "E1059.006"
  if:
    type: symbol
    exact: "asyncio.create_subprocess_exec"
- id: java-jar-argv
  desc: Python subprocess launches JAR
  crit: notable
  conf: 0.9
  mbc: "E1059.006"
  if:
    type: text
    regex: subprocess\.(run|Popen|call)\(\s*\[\s*['"]java['"]\s*,\s*['"]-jar['"]
- id: sys-executable-popen
  desc: subprocess.Popen with sys.executable list
  crit: notable
  conf: 0.9
  mbc: "E1059.006"
  if:
    type: text
    regex: "Popen\\s*\\(\\s*\\[\\s*sys\\.executable\\s*,"
- id: sys-executable-c-popen
  desc: subprocess.Popen inline Python command
  crit: notable
  conf: 0.94
  mbc: "E1059.006"
  if:
    type: text
    regex: "Popen\\s*\\(\\s*\\[\\s*sys\\.executable\\s*,\\s*['\"]-c['\"]"
- id: sys-executable-c-subprocess
  desc: subprocess runs inline Python code
  crit: notable
  conf: 0.94
  mbc: "E1059.006"
  if:
    type: text
    regex: 'subprocess\.(Popen|run|call)\(\s*\[\s*sys\.executable\s*,\s*[''"]-c[''"]'
- id: sys-executable-stdin-subprocess
  desc: subprocess runs Python from stdin
  crit: notable
  conf: 0.94
  mbc: "E1059.006"
  if:
    type: text
    regex: 'subprocess\.(Popen|run|call)\(\s*\[\s*sys\.executable\s*,\s*[''"]-[''"]'
- id: sys-executable-c-popen-ast
  desc: subprocess.Popen inline Python command (AST)
  crit: notable
  conf: 0.96
  mbc: "E1059.006"
  if:
      # Restored arg discriminator dropped in the call migration.
    type: symbol
    kind: call
    exact: 'subprocess.Popen'
    arg:
      kind: string
      regex: '^-c$'
- id: subprocess-importlib-module
  desc: importlib resolves subprocess module
  crit: component
  conf: 0.86
  mbc: "E1059.006"
  if:
    type: symbol
    kind: call
    exact: importlib.import_module
    arg:
      kind: string
      exact: subprocess
- id: importlib-check-output-call
  desc: Dynamic check_output call
  crit: component
  conf: 0.82
  mbc: "E1059.006"
  if:
    type: symbol
    kind: call
    exact: importlib.import_module().check_output
