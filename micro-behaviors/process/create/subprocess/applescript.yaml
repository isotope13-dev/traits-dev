defaults:
  platforms: [macos]
  for: [applescript]
  attack: T1059.004

traits:
  - id: nstask-class
    desc: AppleScript references NSTask
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: NSTask
  - id: nstask-launch-path
    desc: AppleScript configures an NSTask launch path
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: setLaunchPath_
  - id: nstask-launch
    desc: AppleScript launches an NSTask
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: launchAndReturnError_

composite_rules:
  - id: applescript-nstask-shell-exec
    desc: AppleScript configures and launches an NSTask
    crit: notable
    conf: 0.98
    all:
      - id: nstask-class
      - id: nstask-launch-path
      - id: nstask-launch
