defaults:
  platforms: [windows, unix]
  for: [python]

composite_rules:
  - id: python-exec-capability
    desc: Python process execution capability
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
    any:
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: micro-behaviors/process/create/subprocess::subprocess-shell-pyc
      - id: micro-behaviors/process/create/subprocess::popen-zip-password
      - id: micro-behaviors/process/create/system::python-os-system
