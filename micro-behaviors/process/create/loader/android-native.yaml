defaults:
  platforms: [android]
  for: [elf]
  crit: notable
  conf: 0.88
  attack: "T1406"

traits:
- id: short-obfuscated-jni-exports
  desc: Short obfuscated JNI exports
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: "Java_aa_ab_"
  count_min: 6

- id: data-ptr-export
  desc: Native stage data pointer export
  crit: component
  conf: 0.9
  if:
    type: symbol
    kind: export
    exact: DATA_PTR

- id: loader-class-return-signature
  desc: Native bridge returns Loader class
  crit: component
  conf: 0.88
  if:
    type: text
    substr: ")Lcom/Loader;"

composite_rules:
- id: obfuscated-jni-stage-writer
  desc: Obfuscated JNI writes staged payload
  crit: suspicious
  conf: 0.97
  all:
  - id: short-obfuscated-jni-exports
  - id: micro-behaviors/fs/file/open::fopen
  - id: micro-behaviors/fs/file/write/direct::write
  - id: micro-behaviors/fs/chmod::syscall-chmod

- id: android-native-embedded-dex-loader
  desc: Android native embedded DEX loader
  crit: suspicious
  conf: 0.98
  all:
  - id: short-obfuscated-jni-exports
  - id: data-ptr-export
  - id: loader-class-return-signature
  any:
  - id: micro-behaviors/fs/file/open::fopen
  - id: micro-behaviors/fs/file/write/direct::write
  - id: micro-behaviors/fs/chmod::syscall-chmod
