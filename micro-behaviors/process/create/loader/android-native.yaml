defaults:
  platforms: [android]
  for: [elf]
  crit: notable
  conf: 0.88
  attack: "T1406"

traits:
  - id: short-obfuscated-jni-exports
    desc: Short obfuscated JNI exports
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "Java_aa_ab_"
    count_min: 6

composite_rules:
  - id: obfuscated-jni-stage-writer
    desc: Obfuscated JNI writes staged payload
    crit: suspicious
    conf: 0.97
    all:
      - id: short-obfuscated-jni-exports
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/write::write
      - id: micro-behaviors/fs/chmod/commands::syscall-chmod
