# Android Dynamic Code Loading
# Detects use of DexClassLoader / PathClassLoader for runtime code loading from DEX/APK files
# Specificity comes from Dalvik class name format (Ldalvik/system/DexClassLoader;)
# ATT&CK: T1406 (Obfuscated Files or Information — Android)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries, scripts, source, manifests, documents, media, data]
  crit: notable
  conf: 0.9
  attack: "T1406"

traits:
  - id: dex-class-loader
    desc: DexClassLoader dynamic code loading
    mbc: "C0021"
    if:
      type: string_value
      substr: "Ldalvik/system/DexClassLoader;"

  - id: path-class-loader
    desc: PathClassLoader runtime class loading
    conf: 0.8
    if:
      type: string_value
      substr: "Ldalvik/system/PathClassLoader;"

  - id: dex-format-template
    desc: DEX/JAR secondary file path template
    conf: 0.85
    if:
      type: string_value
      regex: "%s/%s\\.dex"

composite_rules:
  - id: dynamic-dex-loading
    desc: Android dynamic DEX code loading
    crit: suspicious
    conf: 0.92
    mbc: "C0021"
    any:
      - id: dex-class-loader
      - id: path-class-loader
      - id: dex-format-template
