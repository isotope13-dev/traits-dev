# Android Reflective Staged DEX Loader
# Detects stage-1 APK loaders that decrypt/write a hidden payload and patch BaseDexClassLoader internals.
defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.9
  attack: "T1406"

traits:
  - id: reflective-array
    desc: Reflection array helper for loader patching
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "Ljava/lang/reflect/Array;"

  - id: base-dex-class-loader
    desc: BaseDexClassLoader referenced directly
    conf: 0.92
    if:
      type: raw
      substr: "dalvik.system.BaseDexClassLoader"

  - id: dex-elements-field
    desc: BaseDexClassLoader dexElements field access
    conf: 0.94
    if:
      type: raw
      substr: "dexElements"

  - id: path-list-field
    desc: BaseDexClassLoader pathList field access
    conf: 0.92
    if:
      type: raw
      substr: "pathList"

  - id: attach-base-context
    desc: Android loader hooks app context
    crit: notable
    conf: 0.82
    if:
      type: raw
      substr: "attachBaseContext"

  - id: hidden-stage-asset
    desc: Large hex named opaque asset
    crit: suspicious
    conf: 0.9
    size_min: 1048576
    if:
      type: basename
      regex: '^[a-f0-9]{8}$'

  - id: high-entropy-stage-asset
    desc: Large stage asset has maximum entropy
    crit: suspicious
    conf: 0.96
    size_min: 1048576
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.95
    unless:
      - id: metadata/binary::binary-format-checked

  - id: dropped-stage-dex
    desc: Hex named private DEX path
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '[a-f0-9]{8}\.dex'

  - id: file-output-stream-call
    desc: Android loader writes staged payload
    crit: notable
    conf: 0.84
    if:
      type: raw
      substr: "java.io.FileOutputStream("

  - id: dalvik-file-output-stream-class
    desc: Dalvik FileOutputStream class reference
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: "Ljava/io/FileOutputStream;"

  - id: encoded-loader-delimiter
    desc: Base64 encoded loader delimiter
    crit: component
    conf: 0.9
    if:
      type: yara
      source: |
        rule encoded_loader_delimiter {
          strings:
            $a = "aHJpam5qcHN2Y29i" ascii
          condition:
            #a >= 6
        }

  - id: encoded-android-runtime-fields
    desc: Encoded Android runtime fields
    crit: suspicious
    conf: 0.95
    if:
      type: yara
      source: |
        rule encoded_android_runtime_fields {
          strings:
            $a = "bU1haW5UaHJlYW" ascii
            $b = "bVBhY2thZ2VJbmZv" ascii
            $c = "bUFwcGxpY2F0aW9u" ascii
          condition:
            all of them
        }

  - id: encoded-android-asset-loader
    desc: Encoded Android staged asset name
    crit: suspicious
    conf: 0.94
    if:
      type: yara
      source: |
        rule encoded_android_asset_loader {
          strings:
            $a = "bmd5Ym1h" ascii
            $b = "bXNiaGd0Zw" ascii
            $c = "cGF0aExpc3Q" ascii
          condition:
            all of them
        }

  - id: encoded-cjnejwgbazc-delimiter
    desc: Repeated encoded loader delimiter
    crit: component
    conf: 0.9
    count_min: 8
    if:
      type: raw
      substr: "Y2puZWp3Z2Jhem"

  - id: encoded-cjnejwgbazc-runtime-fields
    desc: Encoded Android runtime swap fields
    crit: suspicious
    conf: 0.96
    count_min: 6
    if:
      type: raw
      substr: "Y2puZWp3Z2JhemNt"

  - id: encoded-cjnejwgbazc-stage-asset
    desc: Encoded Android staged asset name
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      substr: "Y2puZWp3Z2JhemN5cXdzcmNqbmVqd2diYXpj"

  - id: encoded-cjnejwgbazc-dex-elements
    desc: Encoded dexElements field name
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      substr: "Y2puZWp3Z2JhemNkZXhFbGVtZW50c2NqbmVqd2diYXpj"

  - id: encoded-cjnejwgbazc-path-list
    desc: Encoded pathList field name
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      substr: "Y2puZWp3Z2JhemNwYXRoTGlzdGNqbmVqd2diYXpj"

  - id: encoded-hqjgwjslwxj-delimiter
    desc: Encoded loader delimiter token
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "hqjgwjslwxj"

  - id: encoded-hqjgwjslwxj-runtime-fields
    desc: Encoded Android runtime swap fields
    crit: component
    conf: 0.96
    if:
      type: raw
      substr: "aHFqZ3dqc2x3eGptSW5pdGlhbEFwcGxpY2F0aW9u"

  - id: encoded-hqjgwjslwxj-stage-asset
    desc: Encoded Android staged asset name
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: "aHFqZ3dqc2x3eGphZXFhdGtidWhxamd3anNsd3hq"

  - id: encoded-hqjgwjslwxj-dex-elements
    desc: Encoded dexElements field name
    crit: component
    conf: 0.96
    if:
      type: raw
      substr: "aHFqZ3dqc2x3eGpkZXhFbGVtZW50c2hxamd3anNsd3hq"

  - id: encoded-hqjgwjslwxj-path-list
    desc: Encoded pathList field name
    crit: component
    conf: 0.96
    if:
      type: raw
      substr: "aHFqZ3dqc2x3eGpwYXRoTGlzdGhxamd3anNsd3hq"

  - id: dex-file-api
    desc: Dalvik DexFile loader API
    conf: 0.92
    if:
      type: raw
      substr: "dalvik.system.DexFile"

  - id: zip-stage-read
    desc: Android loader reads payload from ZipFile
    crit: notable
    conf: 0.84
    if:
      type: raw
      substr: "Ljava/util/zip/ZipFile;"

  - id: reflective-field-access
    desc: Reflective declared field access
    crit: component
    conf: 0.84
    if:
      type: raw
      substr: "getDeclaredField"

  - id: reflective-method-access
    desc: Reflective declared method access
    crit: component
    conf: 0.84
    if:
      type: raw
      substr: "getDeclaredMethod"

  - id: reflective-access-bypass
    desc: Reflection accessibility bypass
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: "setAccessible"

composite_rules:
  - id: reflective-classloader-patch
    desc: Reflective BaseDexClassLoader element patching
    crit: suspicious
    conf: 0.98
    all:
      - id: base-dex-class-loader
      - id: dex-elements-field
      - id: path-list-field
    any:
      - id: reflective-array
      - id: attach-base-context

  - id: reflective-dex-loader-member
    desc: Reflective DexFile classloader patching chain
    crit: suspicious
    conf: 0.98
    all:
      - id: base-dex-class-loader
      - id: dex-elements-field
      - id: path-list-field
      - id: dex-file-api
    any:
      - id: reflective-field-access
      - id: reflective-method-access
      - id: reflective-access-bypass
      - id: file-output-stream-call
      - id: zip-stage-read
    needs: 2

  - id: opaque-hex-stage-asset
    desc: Hex named staged asset with high entropy
    crit: suspicious
    conf: 0.98
    all:
      - id: hidden-stage-asset
      - id: high-entropy-stage-asset

  - id: hidden-dex-write
    desc: Hidden stage asset written to private DEX path
    crit: suspicious
    conf: 0.99
    all:
      - id: hidden-stage-asset
      - id: dropped-stage-dex
      - id: file-output-stream-call

  - id: encoded-application-swap-loader
    desc: Encoded Android application swap loader
    crit: suspicious
    conf: 0.99
    all:
      - id: encoded-loader-delimiter
      - id: encoded-android-runtime-fields
      - id: encoded-android-asset-loader
    any:
      - id: reflective-field-access
      - id: reflective-method-access
      - id: reflective-access-bypass
      - id: dalvik-file-output-stream-class
    needs: 2

  - id: encoded-delimited-application-swap-loader
    desc: Delimited encoded Android application swap loader
    crit: suspicious
    conf: 0.99
    all:
      - id: encoded-cjnejwgbazc-delimiter
      - id: encoded-cjnejwgbazc-runtime-fields
      - id: encoded-cjnejwgbazc-stage-asset
      - id: encoded-cjnejwgbazc-dex-elements
      - id: encoded-cjnejwgbazc-path-list
    any:
      - id: reflective-field-access
      - id: reflective-method-access
      - id: reflective-access-bypass
      - id: dalvik-file-output-stream-class
    needs: 2

  - id: encoded-hqjgwjslwxj-application-swap-loader
    desc: Delimited encoded Android application swap loader
    crit: suspicious
    conf: 0.99
    all:
      - id: encoded-hqjgwjslwxj-delimiter
      - id: encoded-hqjgwjslwxj-runtime-fields
      - id: encoded-hqjgwjslwxj-stage-asset
      - id: encoded-hqjgwjslwxj-dex-elements
      - id: encoded-hqjgwjslwxj-path-list
    any:
      - id: reflective-field-access
      - id: reflective-method-access
      - id: reflective-access-bypass
      - id: dalvik-file-output-stream-class
    needs: 2
