# Android Reflective Staged DEX Loader
# Detects stage-1 APK loaders that decrypt/write a hidden payload and patch BaseDexClassLoader internals.
defaults:
  platforms: [android]
  for: [apk, binaries]
  crit: notable
  conf: 0.9
  attack: "T1406"

traits:
  - id: reflective-array
    desc: Reflection array helper for loader patching
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "Ljava/lang/reflect/Array;"

  - id: base-dex-class-loader
    desc: BaseDexClassLoader referenced directly
    conf: 0.92
    if:
      type: text
      exact: "dalvik.system.BaseDexClassLoader"

  - id: dex-elements-field
    desc: BaseDexClassLoader dexElements field access
    conf: 0.94
    if:
      type: text
      exact: "dexElements"

  - id: path-list-field
    desc: BaseDexClassLoader pathList field access
    conf: 0.92
    if:
      type: text
      exact: "pathList"

  - id: attach-base-context
    desc: Loader hooks Application attachBaseContext
    crit: component
    conf: 0.82
    if:
      type: text
      exact: "attachBaseContext"

  - id: hidden-stage-asset
    desc: Obfuscated stage asset name
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: "assets/cd50f0bb"

  - id: dropped-stage-dex
    desc: Hidden payload dropped as private DEX
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: "622a2177.dex"

  - id: file-output-stream-call
    desc: Loader writes payload with FileOutputStream
    crit: component
    conf: 0.84
    if:
      type: text
      exact: "java.io.FileOutputStream("

composite_rules:
  - id: reflective-classloader-patch
    desc: Reflective BaseDexClassLoader element patching
    crit: suspicious
    conf: 0.98
    all:
      - id: base-dex-class-loader
      - id: dex-elements-field
      - id: path-list-field
    any:
      - id: reflective-array
      - id: attach-base-context

  - id: hidden-dex-write
    desc: Hidden stage asset written to private DEX path
    crit: suspicious
    conf: 0.99
    all:
      - id: hidden-stage-asset
      - id: dropped-stage-dex
      - id: file-output-stream-call
