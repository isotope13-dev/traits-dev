# Malicious Command and Script Patterns
# Detects complex construction and execution logic
defaults:
  platforms: [windows, unix]
traits:
  - id: string-assign
    desc: 'Assigns command/URL-like string to variable'
    crit: baseline
    conf: 0.6
    for: [python]
    if:
      type: tree-sitter
      query: |
        ((assignment
          left: (identifier) @var
          right: (string) @val)
         (#match? @var "^(cmd|command|url|data|msg|body)$"))
composite_rules:
  - id: command-spreading
    desc: "Command spreading (String construction +)"
    crit: notable
    conf: 0.85
    near_lines: 10
    all:
      - id: micro-behaviors/process/create/construction::string-assign
      - id: micro-behaviors/process/create/subprocess::run-content
