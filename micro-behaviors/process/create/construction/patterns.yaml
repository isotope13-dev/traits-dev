# Malicious Command and Script Patterns
# Detects complex construction and execution logic
defaults:
  platforms: [windows, unix]
traits:
  - id: go-formatted-shell-script
    desc: Formats an embedded shell script in Go
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: text
      regex: 'fmt\.Sprintf\([^)]{0,200}#!/bin/sh'

  # Only command-oriented variable names belong here: this atom lives under
  # process/create and feeds command-construction detection. Generic HTTP
  # plumbing names (url/data/msg/body) are not command construction and caused
  # benign `url = f"..."` assignments to be miscounted as execution capability.
  - id: string-assign
    desc: 'Assigns a command-like string to a variable'
    crit: baseline
    conf: 0.6
    for: [python]
    if:
      type: tree-sitter
      query: |
        ((assignment
          left: (identifier) @var
          right: (string) @val)
         (#match? @var "^(cmd|command|cmdline|cmd_line|cmdstr)$"))
composite_rules:
  - id: command-spreading
    desc: "Command spreading (String construction +)"
    crit: notable
    conf: 0.85
    near_lines: 10
    all:
      - id: micro-behaviors/process/create/construction::string-assign
      - id: micro-behaviors/process/create/subprocess::run-content
