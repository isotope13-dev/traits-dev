# Node.js command construction: the program to run is assembled into a
# variable rather than written as a literal at the spawn site, so the target
# is not visible statically. Neutral on its own — external-editor launchers,
# CLI wrappers, and package-manager shims all do this. Composites that care
# about a SPECIFIC target (e.g. the npx self-update chain in
# objectives/persistence/system/package-manager) supply that target from
# their own legs and reference this atom only for the spawn itself.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: spawn-command-variable
    desc: Spawns a child from a cmd variable
    crit: notable
    conf: 0.92
    mbc: C0017
    attack: "T1059"
    if:
      type: text
      regex: 'spawn\s*\(\s*cmd\s*,'
