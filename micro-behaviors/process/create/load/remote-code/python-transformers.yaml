defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  # A plain `.from_pretrained(...)` loads a pinned model and does NOT execute
  # remote code — it is the safe default. On its own this is just a model-load
  # capability (building block), not a remote-code-execution signal.
  - id: from-pretrained-call
    desc: "Transformers/diffusers from_pretrained load"
    crit: component
    conf: 0.9
    if:
      # Cached call fact (no per-member cursor walk): matches `X.from_pretrained(`.
      type: symbol
      kind: call
      regex: '\.from_pretrained$'

  # `trust_remote_code=True` is the flag that actually opts into executing
  # arbitrary Python shipped in the model repo. This keyword only appears in the
  # transformers/diffusers loader context, so it is a precise standalone signal.
  - id: trust-remote-code-enabled
    desc: 'trust remote code enabled'
    crit: notable
    conf: 0.9
    attack: T1105
    if:
      type: text
      regex: 'trust_remote_code\s*=\s*True'

composite_rules:
  # The real behavior: a from_pretrained load that opts into remote code.
  - id: transformers-trust-remote-code
    desc: from_pretrained called with trust_remote_code=True (executes remote model code)
    crit: notable
    conf: 0.9
    attack: T1105
    all:
      - id: from-pretrained-call
      - id: trust-remote-code-enabled
