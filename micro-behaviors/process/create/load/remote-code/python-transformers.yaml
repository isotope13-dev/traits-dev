defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: transformers-trust-remote-code
    desc: Transformers from_pretrained trusts remote code
    crit: notable
    conf: 0.9
    attack: T1105
    if:
      type: ast
      query: |
        (call
          function: (attribute
            attribute: (identifier) @method)
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @kw
              value: (true)))
          (#eq? @method "from_pretrained")
          (#eq? @kw "trust_remote_code"))
