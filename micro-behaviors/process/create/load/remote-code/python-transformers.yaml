defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: transformers-trust-remote-code
    desc: Transformers from_pretrained trusts remote code
    crit: notable
    conf: 0.9
    attack: T1105
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.from_pretrained$'
