defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1105
traits:
- id: js-dom-createelement-literal
  desc: Creates a script element with createElement
  # Must create a *script* element. Bare createElement matches benign UI builders
  # (createElement('div'/'button'/'textarea')); the all-substrings composite then
  # false-fires on any DOM-building code that also mentions "script"/"src".
  crit: component
  conf: 0.8
  if:
    type: text
    regex: createElement\s*\(\s*['"`]script['"`]
- id: js-dom-script-literal
  desc: Script string literal
  crit: component
  conf: 0.8
  if:
    type: literal
    substr: script
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: js-dom-appendchild-literal
  desc: DOM appendChild string literal
  crit: component
  conf: 0.8
  if:
    type: literal
    substr: appendChild
- id: js-dom-script-src-literal
  desc: Script source attribute literal
  crit: component
  conf: 0.75
  if:
    type: literal
    exact: src
composite_rules:
- id: js-dynamic-script-loader
  desc: Browser dynamically loads script element
  crit: notable
  conf: 0.86
  all:
  - id: js-dom-createelement-literal
  - id: js-dom-script-literal
  - id: js-dom-appendchild-literal
  - id: js-dom-script-src-literal
