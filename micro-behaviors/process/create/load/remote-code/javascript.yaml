defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1105
traits:
- id: js-dom-createelement-literal
  desc: DOM createElement string literal
  crit: component
  conf: 0.8
  if:
    type: string_literal
    substr: createElement
- id: js-dom-script-literal
  desc: DOM script element literal
  crit: component
  conf: 0.8
  if:
    type: string_literal
    substr: script
- id: js-dom-appendchild-literal
  desc: DOM appendChild string literal
  crit: component
  conf: 0.8
  if:
    type: string_literal
    substr: appendChild
- id: js-dom-script-src-literal
  desc: DOM script src literal
  crit: component
  conf: 0.75
  if:
    type: string_literal
    substr: src
composite_rules:
- id: js-dynamic-script-loader
  desc: Browser dynamically loads script element
  crit: notable
  conf: 0.86
  all:
  - id: js-dom-createelement-literal
  - id: js-dom-script-literal
  - id: js-dom-appendchild-literal
  - id: js-dom-script-src-literal
