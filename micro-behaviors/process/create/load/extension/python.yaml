defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.95

traits:
  - id: python-database-extension-install
    desc: Python installs a database runtime extension
    if:
      type: symbol
      kind: call
      regex: '^[A-Za-z_][A-Za-z0-9_]*\.install_extension$'
  - id: python-database-extension-load
    desc: Python loads a database runtime extension
    if:
      type: symbol
      kind: call
      regex: '^[A-Za-z_][A-Za-z0-9_]*\.load_extension$'
  - id: python-duckdb-allows-unsigned-extensions
    desc: DuckDB permits unsigned extensions
    if:
      type: text
      regex: '(?i)["'']allow_unsigned_extensions["'']\s*:'
