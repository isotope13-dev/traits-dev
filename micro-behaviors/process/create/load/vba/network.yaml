# VBA `Declare` imports of Windows networking APIs (urlmon, wininet,
# winhttp, ws2_32). These atomics are the "URL/socket dropper" surface
# — see maldoca's urlmon enum: URLDownloadToFile is the canonical
# example, used by Emotet/IcedID/Qakbot Word droppers for years.
defaults:
  for: [oledoc, ooxml, vbs]
  platforms: [windows]
  crit: suspicious
  conf: 0.93

traits:
  # --- urlmon URL-fetcher APIs ---
  - id: vba-declare-urlmon-fetcher
    desc: VBA Declare imports an urlmon URL fetcher
    if:
      type: import
      regex: '^URL(Download(ToFile|ToCacheFile)|OpenStream)[AW]?$'

  # --- wininet HTTP-request APIs (Open URL / send request) ---
  - id: vba-declare-wininet-http-fetcher
    desc: VBA Declare imports a wininet HTTP fetcher
    if:
      type: import
      regex: '^(InternetOpenUrl|HttpSendRequest)[AW]?$'

  # --- Auxiliary wininet entrypoints kept as separate atomics — they
  #     open the session / read response bytes but don't fetch
  #     directly, and ML benefits from distinct features. ---
  - id: vba-declare-internetopen
    desc: VBA Declare imports InternetOpen
    if:
      type: import
      regex: '^InternetOpen[AW]?$'
  - id: vba-declare-internetreadfile
    desc: VBA Declare imports InternetReadFile
    if:
      type: import
      exact: InternetReadFile

  # --- ws2_32 ---
  - id: vba-declare-socket
    desc: VBA Declare imports socket
    if:
      type: import
      exact: socket
  - id: vba-declare-connect
    desc: VBA Declare imports connect
    if:
      type: import
      exact: connect
  - id: vba-declare-wsastartup
    desc: VBA Declare imports WSAStartup
    if:
      type: import
      exact: WSAStartup
