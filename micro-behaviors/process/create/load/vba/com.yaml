# VBA `Declare` imports of COM-runtime APIs (ole32, oleaut32). These
# enable arbitrary CLSID instantiation from scripts that don't have
# access to `CreateObject` (or want to bypass it). Less common than
# `CreateObject` but a strong signal when present.
defaults:
  for: [oledoc, ooxml, vbs]
  platforms: [windows]
  crit: suspicious
  conf: 0.93

traits:
  - id: vba-declare-cocreateinstance
    desc: VBA Declare imports CoCreateInstance
    if:
      type: import
      exact: CoCreateInstance
  - id: vba-declare-cocreateinstancefromapp
    desc: VBA Declare imports CoCreateInstanceFromApp
    if:
      type: import
      exact: CoCreateInstanceFromApp
  - id: vba-declare-cogetobject
    desc: VBA Declare imports CoGetObject
    if:
      type: import
      exact: CoGetObject
  - id: vba-declare-cogetinstancefromfile
    desc: VBA Declare imports CoGetInstanceFromFile
    if:
      type: import
      exact: CoGetInstanceFromFile
  - id: vba-declare-cogetclassobject
    desc: VBA Declare imports CoGetClassObject
    if:
      type: import
      exact: CoGetClassObject
  - id: vba-declare-coloadlibrary
    desc: VBA Declare imports CoLoadLibrary
    if:
      type: import
      exact: CoLoadLibrary
  - id: vba-declare-shellexecute
    desc: VBA Declare imports ShellExecute
    if:
      type: import
      regex: '^ShellExecute(A|W|Ex(A|W)?)?$'
