# Loading a Windows DLL through Python's ctypes bridge is a neutral capability.
defaults:
  platforms: [windows]
  for: [python]

traits:
  - id: python-ctypes-windll-load
    desc: Python loads Windows DLL with ctypes
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: ctypes.WinDLL
