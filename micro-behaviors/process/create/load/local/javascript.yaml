defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  attack: T1059.007

traits:
  - id: cjs-side-effect-local-require
    desc: CommonJS side-effect-only require
    if:
      type: text
      regex: "(?m)^[ \\t]*require\\s*\\(\\s*['\"]\\.\\.?/[^'\"]{1,80}['\"]\\s*\\)\\s*;?[ \\t]*$"
  - id: cjs-side-effect-execution-subpath
    desc: CJS side-effect import of runner subpath
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: >-
        (?m)^[ \t]*require\s*\(\s*["'][^"']{1,60}/(cjs-)?runner[^"']{0,30}["']\s*\)\s*;?[ \t]*$
  - id: cjs-parser-subpath-require
    desc: CommonJS require of parser subpath
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "require\\s*\\(\\s*['\"][^'\"]{1,60}/selector-parser['\"]\\s*\\)"
  - id: cjs-caught-local-require
    desc: CommonJS local require inside try block
    if:
      type: text
      regex: "try\\s*\\{\\s*require\\s*\\(\\s*['\"]\\./[^'\"]{1,80}['\"]\\s*\\)"
  - id: cjs-native-node-module-require
    desc: CommonJS loads a native .node module
    crit: notable
    conf: 0.92
    attack: T1129
    if:
      type: text
      regex: 'require\s*\([^;\n]{0,120}\.node'
