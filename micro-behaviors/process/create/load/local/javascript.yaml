defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  attack: T1059.007

traits:
  - id: cjs-side-effect-local-require
    desc: CommonJS local side-effect require
    if:
      type: text
      regex: "(?m)^[ \\t]*require\\s*\\(\\s*['\"][^'\"]{1,80}['\"]\\s*\\)\\s*;?"
  - id: cjs-caught-local-require
    desc: CommonJS local require inside try block
    if:
      type: text
      regex: "try\\s*\\{\\s*require\\s*\\(\\s*['\"]\\./[^'\"]{1,80}['\"]\\s*\\)"
