# Invoking an AI coding-agent CLI (Codex, Claude Code, OpenCode, MimoCode) and
# the permission/sandbox modes those CLIs expose.
#
# Previously filed under process/create/hcom/. `hcom` names an unrelated macOS
# PTY-relay binary (well-known/app/hcom, micro-behaviors/process/create/hcom/
# hcom.yaml), so these traits were keyed to a product-named directory that says
# nothing about what they match — and, since the ML pipeline features on the
# directory path, to the wrong signal. `agent/` names the technique: process
# creation, specifically the AI-agent-CLI kind.
#
# Each flag here is a documented mode of the agents themselves, so the atoms
# stay notable; abuse intent comes from the composites in objectives/ that pair
# them with scripted/non-interactive invocation.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, package.json, json, shell, python]
  attack: T1059
  mbc: B0022
  crit: notable
  conf: 0.88

traits:
  - id: codex-cli-command
    desc: Codex CLI command invocation
    if:
      type: text
      regex: '\bcodex (login|login status|--version)\b'

  - id: codex-exec-command
    desc: Codex exec command invocation
    crit: notable
    conf: 0.94
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    if:
      type: text
      regex: '\bcodex\s+exec\b'

  - id: codex-global-install
    desc: Codex global package install
    if:
      type: text
      substr: '@openai/codex@latest'

  - id: ai-agent-bypass-permissions-mode
    desc: AI agent bypass permissions mode
    crit: notable
    conf: 0.93
    if:
      type: literal
      kind: string
      exact: bypassPermissions

  - id: ai-agent-bypass-permissions-setting
    desc: AI settings enable bypass permissions
    crit: notable
    conf: 0.97
    for: [json]
    if:
      type: value
      path: permissions.defaultMode
      exact: bypassPermissions

  - id: ai-agent-skip-dangerous-permission-prompt
    desc: Suppresses AI dangerous-mode permission prompt
    crit: notable
    conf: 0.97
    for: [json]
    if:
      type: value
      path: skipDangerousModePermissionPrompt
      exact: 'true'

  # An AI-agent permission-bypass flag is a documented mode of the agents
  # themselves (Claude Code `--dangerously-skip-permissions`, CodeWhale `--yolo`).
  # As a bare capability it is notable; the abuse signal is the composite that
  # combines it with a scripted/non-interactive agent invocation.
  - id: ai-agent-dangerous-permission-flag
    desc: AI agent permission bypass flag
    crit: notable
    conf: 0.96
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    if:
      type: text
      regex: '(--dangerously-skip-permissions|--yolo|--trust-all-tools)'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures

  - id: ai-agent-shell-command-allowlist
    desc: AI agent shell command allowlist
    crit: notable
    conf: 0.92
    ref: sha256:ffbf482c4b6c5a57944da3576001f383e4cb61bce3ed008b813487357e49e107
    if:
      type: text
      regex: 'Bash\([A-Za-z0-9_.-]{1,48}:\*\)'

  - id: codex-dangerous-sandbox-bypass-flag
    desc: Codex sandbox bypass flag
    crit: notable
    conf: 0.97
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    if:
      type: text
      substr: --dangerously-bypass-approvals-and-sandbox
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures

  - id: codex-full-access-sandbox-mode
    desc: Codex full-access sandbox mode
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'sandbox_mode["'']?\s*[=:]\s*["'']danger-full-access'

  - id: codex-never-approval-policy
    desc: Codex command approvals disabled
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'approval_policy["'']?\s*[=:]\s*["'']never'

  - id: codex-full-auto-approval-mode
    desc: Codex full-auto approval mode
    crit: notable
    conf: 0.96
    ref: sha256:b92af7e8379fba6a66eb7b99e4db29eacd6040b05abd2b8e0373eaf43dce92b0
    if:
      type: text
      regex: '["'']--approval-mode["'']\s*,[\s\S]{0,80}["'']full-auto["'']'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures

  - id: claude-cli-literal
    desc: Claude CLI command token
    crit: component
    conf: 0.88
    size_max: 1000000
    if:
      type: text
      regex: '(^|[\s"''`([{;|&])claude([\s"''`\])};|&]|$)'

  - id: claude-print-flag
    desc: Claude CLI print mode flag
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bclaude\b[^\n\r;&|]{0,120}(^|[[:space:]])(--print|-p)([[:space:]]|$)'

  - id: claude-settings-flag
    desc: Claude CLI settings flag
    crit: component
    conf: 0.9
    if:
      type: text
      substr: --settings

  - id: claude-stream-json-mode
    desc: Claude stream JSON mode
    crit: component
    conf: 0.9
    if:
      type: text
      substr: stream-json
  - id: python-llm-agent-command-builder
    desc: Python LLM agent command builder
    crit: component
    conf: 0.92
    for: [python]
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    if:
      type: text
      regex: 'def\s+_build_(claude|codex|ollama)_command\s*\('
  - id: python-invoke-claude-call
    desc: Python invoke Claude call
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    if:
      type: symbol
      kind: call
      exact: invoke_claude
  - id: opencode-cli-token
    desc: OpenCode CLI command token
    crit: component
    conf: 0.88
    if:
      type: text
      word: opencode
      case_insensitive: true
  - id: opencode-server-command
    desc: OpenCode server command
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '\bopencode\s+server\b'
      case_insensitive: true
  - id: opencode-server-listening
    desc: OpenCode server startup output
    crit: component
    conf: 0.95
    if:
      type: text
      substr: opencode server listening
      case_insensitive: true
  - id: python-llm-runner-class
    desc: Python LLM runner class
    crit: component
    conf: 0.92
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      regex: 'class\s+\w*Runner\s*\(\s*LLMRunner\s*\)'
  - id: python-agent-command-config
    desc: Python agent command config
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: symbol
      kind: call
      exact: self.config.get
      arg:
        kind: string
        exact: command
  - id: python-agent-command-template-format
    desc: Python agent command template formatting
    crit: component
    conf: 0.92
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: symbol
      kind: call
      exact: command_template.format
  - id: python-agent-run-command-wrapper
    desc: Python agent run command wrapper
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: symbol
      kind: call
      exact: self._run_command

composite_rules:
  - id: codex-cli-or-agent-session
    desc: Codex CLI or agent session
    crit: notable
    conf: 0.9
    any:
      - id: codex-cli-command
      - id: codex-exec-command
      - id: codex-global-install
      - id: micro-behaviors/fs/path/application/config::codex-config-directory

  - id: codex-bypass-permissions-mode
    desc: Codex bypass permissions mode
    crit: notable
    conf: 0.93
    all:
      - id: codex-cli-or-agent-session
      - id: ai-agent-bypass-permissions-mode

  - id: claude-cli-agent-session
    desc: Claude CLI agent session
    crit: notable
    conf: 0.92
    all:
      - id: claude-cli-literal
    any:
      - id: claude-print-flag
      - id: claude-settings-flag
      - id: claude-stream-json-mode
      - id: ai-agent-dangerous-permission-flag
      - id: micro-behaviors/fs/path/application/config::claude-config-directory
  - id: opencode-cli-agent-session
    desc: OpenCode CLI agent session
    crit: notable
    conf: 0.94
    all:
      - id: opencode-cli-token
    any:
      - id: opencode-server-command
      - id: opencode-server-listening

  - id: ai-coding-cli-local-server
    desc: AI coding CLI local server
    crit: notable
    conf: 0.94
    all:
      - id: opencode-cli-agent-session
      - id: micro-behaviors/communications/http/endpoints::loopback-http-target
    any:
      - id: micro-behaviors/process/create/spawn::child-process-member-spawn
      - id: micro-behaviors/process/create/spawn::child-process-alias-spawn
      - id: micro-behaviors/process/create/spawn::process-execpath-spawn

  - id: claude-dangerous-agent-session
    desc: Claude agent permission bypass
    crit: notable
    conf: 0.96
    all:
      - id: claude-cli-agent-session
      - id: ai-agent-dangerous-permission-flag
  - id: claude-bypass-permissions-mode
    desc: Claude agent bypass permissions mode
    crit: notable
    conf: 0.96
    all:
      - id: claude-cli-agent-session
      - id: ai-agent-bypass-permissions-mode
  - id: python-dangerous-llm-agent-runner
    desc: Python dangerous LLM agent runner
    crit: notable
    conf: 0.96
    for: [python]
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    all:
      - id: python-llm-agent-command-builder
      - id: micro-behaviors/process/create/subprocess::process-execution
    any:
      - id: ai-agent-dangerous-permission-flag
      - id: codex-dangerous-sandbox-bypass-flag
      - id: codex-full-auto-approval-mode
  - id: python-full-auto-llm-agent-runner
    desc: Python full-auto LLM agent runner
    crit: notable
    conf: 0.96
    for: [python]
    ref: sha256:b92af7e8379fba6a66eb7b99e4db29eacd6040b05abd2b8e0373eaf43dce92b0
    all:
      - id: python-llm-runner-class
      - id: codex-full-auto-approval-mode
      - id: micro-behaviors/process/create/subprocess::process-execution
  - id: python-llm-command-template-runner
    desc: Python LLM command template runner
    crit: notable
    conf: 0.95
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    all:
      - id: python-llm-runner-class
      - id: python-agent-command-config
      - id: python-agent-command-template-format
      - id: micro-behaviors/data/parse/command::python-shlex-command-split
      - id: python-agent-run-command-wrapper
