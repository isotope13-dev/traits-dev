# Concurrency Patterns
# Generic indicators of multi-threaded or concurrent execution
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: worker-pool
    desc: References to worker pools
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      regex: "(worker|thread|goroutine)[_-]?pool"
      case_insensitive: true
