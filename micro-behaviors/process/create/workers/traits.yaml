defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: worker-pool
    desc: References to worker pools
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: (worker|thread|goroutine)[_-]?pool
      case_insensitive: true
  - id: worker-thread-label
    desc: Worker thread label string
    # Neutral threading-runtime marker (OpenMP "OMP Worker Thread #%d",
    # .NET/Java thread pools). Referenced by objective composites
    # (e.g. cryptojacking miner runtime) that add intent-specific evidence.
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: Worker Thread
  - id: worker-thread-count-flag
    desc: Worker thread count flag
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '(?i)(--threads|-t)[= ]\d+'
  - id: worker-thread-count-name
    desc: Worker thread count name
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '(?i)(numThreads|num_threads|threadCount)[= ]\d+'

composite_rules:
  - id: worker-thread-count-setting
    desc: Worker thread count setting
    crit: notable
    conf: 0.78
    any:
      - id: worker-thread-count-flag
      - id: worker-thread-count-name
