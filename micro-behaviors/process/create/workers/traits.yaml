defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: worker-pool
    desc: References a worker, thread, or goroutine pool
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: (worker|thread|goroutine)[_-]?pool
      case_insensitive: true
  - id: worker-thread-label
    desc: Worker thread label string
    # Neutral threading-runtime marker (OpenMP "OMP Worker Thread #%d",
    # .NET/Java thread pools). Referenced by objective composites
    # (e.g. cryptojacking miner runtime) that add intent-specific evidence.
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: Worker Thread
  - id: worker-thread-count-flag
    desc: Worker thread count flag
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '(?i)--(threads?|thread-count|workers?)[= ]\d+'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - id: worker-thread-count-name
    desc: Sets a numeric worker-thread count
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '(?i)(numThreads|num_threads|threadCount)[= ]\d+'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: worker-thread-count-setting
    desc: Configures the number of worker threads
    crit: notable
    conf: 0.78
    any:
      - id: worker-thread-count-flag
      - id: worker-thread-count-name
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
