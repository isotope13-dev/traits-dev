defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: worker-pool
    desc: References to worker pools
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: (worker|thread|goroutine)[_-]?pool
      case_insensitive: true
  - id: worker-thread-label
    desc: Worker thread label string
    # Neutral threading-runtime marker (OpenMP "OMP Worker Thread #%d",
    # .NET/Java thread pools). Referenced by objective composites
    # (e.g. cryptojacking miner runtime) that add intent-specific evidence.
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: Worker Thread
