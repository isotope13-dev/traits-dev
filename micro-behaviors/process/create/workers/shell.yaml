# Neutral parallel/batch execution via xargs. `xargs` (and `xargs -P` for
# parallelism) is a standard build/CI/batch idiom. Objective composites
# reference these cross-directory and supply the destructive context.
defaults:
  platforms: [unix, android, ios]
  for: [shell]
traits:
  - id: xargs-cmd
    desc: xargs command usage
    crit: component
    conf: 0.6
    if:
      type: symbol
      exact: xargs
  - id: xargs-parallel-flag
    desc: xargs with parallel flag (-P)
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: xargs\s+.{0,50}-P\s*\d*
