# Node.js Worker Threads
# Detects worker_threads usage for parallel code execution
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: "C0017"
traits:
  - id: worker-threads-import
    desc: Imports worker_threads module
    crit: notable
    conf: 0.85
    attack: "T1059.007"
    if:
      type: text
      regex: "from\\s+['\\\"](node:)?worker_threads['\\\"]"
  - id: worker-threads-require
    desc: Requires worker_threads module
    crit: notable
    conf: 0.92
    attack: "T1059.007"
    if:
      type: symbol
      kind: call
      exact: require
      arg:
        kind: string
        substr: worker_threads
  - id: new-worker-instance
    desc: Creates Worker thread instance
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "(new\\s+Worker\\(.{0,200}worker_threads|worker_threads.{0,200}new\\s+Worker\\()"
  - id: worker-constructor-call
    desc: Invokes Node Worker constructor
    crit: notable
    conf: 0.9
    attack: "T1059.007"
    if:
      type: symbol
      kind: call
      exact: Worker
  - id: worker-eval-option
    desc: Worker evaluates inline source string
    crit: notable
    conf: 0.95
    attack: T1059.007
    if:
      type: text
      regex: 'eval\s*:\s*true'
  - id: new-worker-require-resolve
    desc: Creates Worker from resolved module
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'new\s+Worker\s*\(\s*require\.resolve\s*\('
