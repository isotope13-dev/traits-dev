# Shell backgrounding: a subshell or command group launched as an async job
# with a trailing `&`. A neutral process-control capability — ubiquitous in
# parallel CI scripts and build pipelines (run N downloads concurrently, then
# `wait`). On its own it carries no intent; a C2/beacon composite must supply
# the polling, jitter, and exec legs.
defaults:
  platforms: [unix]
  for: [github-actions, shell]
traits:
  - id: sh-background-subshell
    desc: Shell backgrounds a subshell job
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: '\)\s*&\s*$'
