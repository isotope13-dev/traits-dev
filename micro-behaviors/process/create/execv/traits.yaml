# exec() family - replace current process with new program
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  platforms: [unix, linux, macos]
  for: [binaries, scripts]
traits:
  - id: c-execve
    desc: "Executes program directly via C"
    crit: notable
    mbc: "E1059"
    attack: "T1059"
    conf: 0.95
    if:
      type: symbol
      regex: execve
    for: [shell, python, ruby, php, javascript]
  - id: c-exec-variants
    desc: "C-style exec family functions"
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: "^exec(l(e|p)?|v(e|p(e)?)?)$"
    for: [shell, python, ruby, php, javascript]
  - id: execl-source
    desc: execl function call in C source
    crit: notable
    conf: 0.85
    for: [c, cpp]
    if:
      type: raw
      regex: '\bexecl\s*\('
