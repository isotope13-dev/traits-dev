defaults:
  platforms:
    - unix
    - linux
    - macos
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: c-execve
    desc: Executes program directly via C
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.95
    for:
      - c
      - cpp
    if:
      type: ast
      kind: call
      exact: execve
  - id: c-execve-raw
    desc: execve call in C source
    crit: notable
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: raw
      regex: \bexecve\s*\(
  - id: c-exec-variants
    desc: C-style exec family functions
    crit: notable
    conf: 0.8
    for:
      - elf
      - macho
      - so
      - dylib
      - c
      - cpp
    if:
      type: symbol
      regex: ^exec(l(e|p)?|v(p(e)?)?)$
  - id: execl-source
    desc: execl function call in C source
    crit: notable
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: raw
      regex: \bexecl\s*\(
