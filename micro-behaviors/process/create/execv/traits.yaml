defaults:
  platforms:
    - linux
    - macos
  for: [scripts, binaries]
traits:
  - id: c-execve
    desc: Executes program directly via C
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.95
    for:
      - c
      - cpp
    if:
      type: ast
      kind: call
      exact: execve
  - id: c-execve-raw
    desc: execve call in C source
    crit: notable
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bexecve\s*\(
  - id: c-exec-variants
    desc: C-style exec family functions
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: ^exec(l(e|p)?|v(p(e)?)?)$
    for: [elf, macho]
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - type: basename
        exact: spawn-helper
      - type: basename
        exact: chrome-sandbox
      - type: basename
        regex: ^russh\..*\.node$
      - type: basename
        exact: tabby
  - id: execl-source
    desc: execl function call in C source
    crit: notable
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bexecl\s*\(
  - id: c-execve-argv-target
    desc: execve target from argv
    crit: notable
    conf: 0.88
    for:
      - c
      - cpp
    if:
      type: text
      regex: '\bexecve\s*\(\s*argv\s*\[\s*1\s*\]'
