defaults:
  platforms:
    - linux
    - macos
  for: [scripts, binaries]
traits:
  - id: sys-execve-source-constant
    desc: Source references the execve syscall number
    crit: notable
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      word: SYS_execve
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: c-exec-variants
    desc: C-style exec family functions
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: ^exec(l(e|p)?|v(p(e)?)?)$
    for: [elf, macho]
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - type: basename
        exact: spawn-helper
      - id: metadata/file/string/identity::chrome-sandbox-basename
      - type: basename
        regex: ^russh\..*\.node$
      - id: well-known/app/tabby::tabby-basename
  - id: exec-variant-symbol-text
    desc: Exec family symbol text
    crit: notable
    conf: 0.75
    for: [elf, macho]
    if:
      type: text
      regex: ^exec(l(e|p)?|v(p(e)?)?)(\.c)?$
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - type: basename
        exact: spawn-helper
      - id: metadata/file/string/identity::chrome-sandbox-basename
      - type: basename
        regex: ^russh\..*\.node$
      - id: well-known/app/tabby::tabby-basename
  - id: execl-source
    desc: execl function call in C source
    crit: notable
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: execl
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: c-execve-argv-target
    desc: execve target from argv
    crit: notable
    conf: 0.88
    for:
      - c
      - cpp
    if:
      type: text
      regex: '\bexecve\s*\(\s*argv\s*\[\s*1\s*\]'
composite_rules:
  - id: execve-fn
    desc: Exec family process replacement
    crit: notable
    conf: 0.4
    any:
      - id: micro-behaviors/process/create/direct::execve-import
      - id: c-exec-variants
    downgrade:
      any:
        - id: well-known/tool/dual-use/shadowsocks-rust::shadowsocks-service-crate
        - id: well-known/tool/reverse-engineering/rizin::rz-test-usage
