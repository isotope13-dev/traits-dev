defaults:
  platforms:
    - linux
    - macos
  for: [scripts, binaries]
traits:
  - id: c-exec-variants
    desc: C-style exec family functions
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: ^exec(l(e|p)?|v(p(e)?)?)$
    for: [elf, macho]
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - type: basename
        exact: spawn-helper
      - id: metadata/file/text/string::chrome-sandbox-basename
      - type: basename
        regex: ^russh\..*\.node$
      - id: objectives/collection/keylog/capture::tabby-basename
  - id: execl-source
    desc: execl function call in C source
    crit: notable
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: execl
  - id: c-execve-argv-target
    desc: execve target from argv
    crit: notable
    conf: 0.88
    for:
      - c
      - cpp
    if:
      type: text
      regex: '\bexecve\s*\(\s*argv\s*\[\s*1\s*\]'
