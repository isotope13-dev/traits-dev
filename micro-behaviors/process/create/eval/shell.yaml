defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.8
  mbc: E1059.004
traits:
  - id: shell-eval
    desc: eval command in shell script
    unless:
      - id: metadata/package/tooling::autoconf-generated-script
    if:
      type: string_literal
      word: eval
  - id: shell-eval-variable
    desc: Eval of shell variable content
    unless:
      - id: metadata/package/tooling::autoconf-generated-script
    if:
      type: text
      regex: eval\s+"\$[A-Za-z_]
  - id: shell-heredoc
    desc: shell script heredoc
    crit: baseline
    if:
      type: text
      regex: <<\s*['"]?[A-Za-z0-9_]+['"]?
