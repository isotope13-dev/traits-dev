defaults:
  platforms: [linux, macos, unix]
  for: [shell]
  crit: notable
  conf: 0.8
  mbc: E1059.004
traits:
  - id: shell-eval
    desc: eval command in shell script
    if:
      type: string_value
      word: eval
  - id: shell-heredoc
    desc: shell script heredoc
    crit: baseline
    if:
      type: raw
      regex: <<\s*['"]?[A-Za-z0-9_]+['"]?
