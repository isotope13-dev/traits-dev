defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.8
  mbc: E1059.004
traits:
  - id: shell-eval-variable
    desc: Eval of shell variable content
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/build/autotools::autoconf-generated-script
      - id: metadata/build/autotools::autotools-config-basename
      - id: metadata/build/autotools::libtool-generated-script
    if:
      type: text
      regex: eval\s+"\$[A-Za-z_]

  - id: shell-heredoc
    desc: shell script heredoc
    crit: baseline
    if:
      type: text
      regex: <<\s*['"]?[A-Za-z0-9_]+['"]?
