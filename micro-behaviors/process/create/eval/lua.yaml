defaults:
  platforms: [windows, unix]
  for: [lua]

traits:
  - id: lua-load
    desc: Lua dynamic code loading with load
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: load
  - id: lua-loadstring
    desc: Lua dynamic code loading with loadstring
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: loadstring

composite_rules:
  - id: lua-dynamic-load
    desc: Lua dynamic code loading
    crit: notable
    conf: 0.9
    any:
      - id: lua-load
      - id: lua-loadstring
