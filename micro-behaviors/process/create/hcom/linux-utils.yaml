defaults:
  platforms: [linux]
  for: [elf, rust, shell]
  crit: notable
  conf: 0.8
traits:
  - id: readelf-invocation
    desc: Invokes readelf
    if:
      type: text
      word: "readelf"
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
  - id: md5sum-invocation
    desc: Invokes md5sum
    for: [rust, shell]
    if:
      type: text
      regex: '(^|[\s;&|`$({])md5sum[ \t]{1,8}["'']?[-./~\w$]'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
  - id: md5sum-path-invocation
    desc: Invokes md5sum by path
    for: [elf]
    if:
      type: text
      regex: '/(usr/)?bin/md5sum([[:space:]"'';&)>`]|$)'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
  - id: mkdir-invocation
    desc: Invokes mkdir
    crit: notable
    if:
      type: text
      regex: '(^|[\\s;&|`$({])mkdir([ \\t]|$)'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
  - id: cp-invocation
    desc: Invokes cp
    crit: notable
    if:
      type: text
      regex: '(^|[\s;&|`$({])cp([ \t]|$)'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
composite_rules:
  - id: linux-system-util-usage
    desc: Uses multiple Linux system utilities
    all:
      - id: mkdir-invocation
      - id: cp-invocation
    any:
      - id: readelf-invocation
      - id: md5sum-invocation
      - id: md5sum-path-invocation
