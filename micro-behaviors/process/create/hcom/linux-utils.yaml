defaults:
  platforms: [linux]
  for: [elf, rust, shell]
  crit: notable
  conf: 0.8
traits:
  - id: readelf-invocation
    desc: Invokes readelf
    if:
      type: text
      word: "readelf"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/package/files/system-package::shell-completion-script
  - id: md5sum-invocation
    desc: Invokes md5sum
    for: [rust, shell]
    if:
      type: text
      regex: '(^|[\s;&|`$({])md5sum[ \t]{1,8}["'']?[-./~\w$]'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/package/files/system-package::shell-completion-script
  - id: md5sum-path-invocation
    desc: Invokes md5sum by path
    for: [elf]
    if:
      type: text
      regex: '/(usr/)?bin/md5sum([[:space:]"'';&)>`]|$)'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
composite_rules:
  - id: linux-system-util-usage
    desc: Uses multiple Linux system utilities
    all:
      - id: micro-behaviors/fs/directory/mkdir::mkdir-command
      - id: micro-behaviors/fs/shell-ops::cp-command
    any:
      - id: readelf-invocation
      - id: md5sum-invocation
      - id: md5sum-path-invocation
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
