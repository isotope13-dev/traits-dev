defaults:
  platforms: [macos]
  for: [macho]
  size_min: 1000000
  size_max: 25000000
  crit: component
  conf: 0.96

traits:
  - id: hcom-pty-wrapper
    desc: hcom PTY wrapper text
    if:
      type: text
      substr: "hcom pty - PTY wrapper for hcom"

  - id: hcom-relay-cli
    desc: hcom relay CLI text
    if:
      type: text
      substr: "hcom relay - Cross-device sync via MQTT pub/sub"

  - id: hcom-pty-source-path
    desc: hcom PTY Rust source path
    if:
      type: text
      substr: "src/pty/mod.rs"

  - id: hcom-relay-source-path
    desc: hcom relay Rust source path
    if:
      type: text
      substr: "src/relay/client.rs"

  - id: hcom-launch-source-path
    desc: hcom launch Rust source path
    if:
      type: text
      substr: "src/commands/launch.rs"
