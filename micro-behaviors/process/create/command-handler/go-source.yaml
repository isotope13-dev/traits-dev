defaults:
  platforms: [unix, windows]
  for: [go]

traits:
  - id: channel-backed-command-queue
    desc: Channel backed command queue
    crit: notable
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      regex: 'commandQueue\s+map\[string\].{0,80}taskChan\s+chan string'

  - id: queued-command-process-dispatch
    desc: Queued command process dispatch
    crit: notable
    conf: 0.95
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: symbol
      kind: call
      exact: "sc.processLauncher.Run"

  - id: lock-file-queue-replay
    desc: Lock file queue replay
    crit: notable
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      regex: 'for\s+cmd,\s*status\s*:=\s*range\s+lock\.Statuses[\s\S]{0,900}addQueueItem\(cmd'

  - id: dependency-triggered-queue-expansion
    desc: Dependency triggered queue expansion
    crit: notable
    conf: 0.88
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      regex: 'for\s+_,\s*dep\s*:=\s*range\s+dependencies[\s\S]{0,420}AddTempItem\(dep\)'

