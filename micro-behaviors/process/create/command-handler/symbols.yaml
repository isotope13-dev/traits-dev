# Command-handler symbols
# Generic symbols/identifiers that suggest command dispatch or command
# execution support. Backdoor intent is inferred by objectives that combine
# these atoms with transport, tasking, or concealment evidence.
defaults:
  platforms: [windows, unix]
  for: [elf, macho, pe]
  crit: component
traits:
  - id: run-command-symbol
    desc: RunCommand C++ symbol
    conf: 0.8
    if:
      type: symbol
      regex: "__Z10RunCommand"
  - id: process-request-symbol
    desc: ProcessRequest C++ symbol
    conf: 0.8
    if:
      type: symbol
      regex: "__Z14ProcessRequest"
  - id: save-and-execute-symbol
    desc: SaveAndExecute C++ symbol
    conf: 0.85
    if:
      type: symbol
      regex: "__Z14SaveAndExecute"
  - id: execute-symbol
    desc: Execute C++ symbol
    conf: 0.7
    if:
      type: symbol
      regex: "__Z7Execute"
  - id: get-response-symbol
    desc: GetResponse C++ symbol
    conf: 0.75
    if:
      type: symbol
      regex: "__Z11GetResponse"
  - id: write-callback-symbol
    desc: WriteCallback C++ symbol for data handling
    conf: 0.7
    if:
      type: symbol
      regex: "__Z13WriteCallback"
  - id: generate-uid-symbol
    desc: GenerateUID C++ symbol
    conf: 0.75
    if:
      type: symbol
      regex: "__Z11GenerateUID"
  - id: make-status-string-symbol
    desc: MakeStatusString C++ symbol
    conf: 0.7
    if:
      type: symbol
      regex: "__Z16MakeStatusString"
  - id: get-exe-path-symbol
    desc: GetCurrentExecutablePath C++ symbol
    conf: 0.7
    if:
      type: symbol
      regex: "__Z24GetCurrentExecutablePath"
  - id: exec-command-symbol
    desc: ExecCommand command-handler symbol
    conf: 0.85
    if:
      type: symbol
      exact: ExecCommand
    unless:
      - id: metadata/binary/framework::dotnet-metadata
  - id: cmd-exec-identifier
    desc: CmdExec command-handler identifier
    conf: 0.75
    if:
      type: text
      word: CmdExec
    unless:
      - type: text
        substr: Distribution.Client.CmdExec
  - id: execute-command-label
    desc: Execute-command handler label
    crit: notable
    conf: 0.86
    platforms: [windows]
    for: [pe]
    if:
      type: hex
      section: .rdata
      pattern: 65 78 65 63 75 74 65 5f 63 6f 6d 6d 61 6e 64
composite_rules:
  - id: cpp-command-handler-symbols
    desc: C++ command-handler symbol cluster
    crit: notable
    conf: 0.95
    needs: 4
    any:
      - id: run-command-symbol
      - id: process-request-symbol
      - id: save-and-execute-symbol
      - id: execute-symbol
      - id: get-response-symbol
      - id: generate-uid-symbol
      - id: exec-command-symbol
      - id: cmd-exec-identifier
