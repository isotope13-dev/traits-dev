# Node.js configured server process launch capability.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: configured-server-executable-spawn
    desc: Node spawns configured server executable
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(execFile|spawn)\s*\([^)]{0,80}serverPath'
