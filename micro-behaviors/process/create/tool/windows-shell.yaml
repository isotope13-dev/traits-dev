# References to built-in Windows shell tools by name in binary strings.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.7

traits:
  - id: launch-mspaint
    desc: Reference to mspaint.exe image editor
    if:
      type: text
      section: rdata
      substr: "mspaint.exe"

  - id: launch-explorer
    desc: Reference to explorer.exe shell
    if:
      type: text
      section: rdata
      substr: "explorer.exe"
