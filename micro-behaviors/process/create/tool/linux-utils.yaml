defaults:
  platforms: [linux]
  for: [elf, rust, shell]
  crit: notable
  conf: 0.8
traits:
  - id: readelf-invocation
    desc: Invokes readelf
    if:
      type: text
      word: "readelf"
  - id: md5sum-invocation
    desc: Invokes md5sum
    if:
      type: text
      word: "md5sum"
  - id: mkdir-invocation
    desc: Invokes mkdir
    if:
      type: text
      word: "mkdir"
  - id: cp-invocation
    desc: Invokes cp
    if:
      type: text
      word: "cp"
composite_rules:
  - id: linux-system-util-usage
    desc: Uses multiple Linux system utilities
    all:
      - id: mkdir-invocation
      - id: cp-invocation
    any:
      - id: readelf-invocation
      - id: md5sum-invocation
