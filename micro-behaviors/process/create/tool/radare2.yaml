defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: exec-radare2
    desc: radare2 executable reference
    crit: notable
    conf: 0.8
    if:
      # Migrated from a tree-sitter query to a lenient `type: text`
      # match (no per-member cursor walk). Approximates the query's
      # structural intent via its distinctive token(s).
      type: text
      regex: '\b(subprocess|Popen|system|execv)\b.{0,120}[''"]radare2[''"]'
  - id: exec-rizin
    desc: rizin executable reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(subprocess|Popen|system|execv)\b.{0,120}[''"]rizin[''"]'
  - id: exec-r2-cmd
    desc: Executes Radare2/Rizin command string
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: '["''](radare2|rizin|r2) -[a-zA-Z]+ '
composite_rules:
  - id: exec-r2
    desc: Radare2/Rizin executable reference
    crit: notable
    conf: 0.8
    any:
      - id: exec-radare2
      - id: exec-rizin
