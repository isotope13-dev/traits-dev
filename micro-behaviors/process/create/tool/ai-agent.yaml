defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, package.json, shell]
  attack: T1059
  mbc: B0022
  crit: notable
  conf: 0.88

traits:
  - id: codex-cli-command
    desc: Codex CLI command invocation
    if:
      type: text
      regex: '\bcodex (login|login status|--version)\b'

  - id: codex-global-install
    desc: Codex global package install
    if:
      type: text
      substr: '@openai/codex@latest'

  - id: codex-session-resume
    desc: Codex session resume control
    if:
      type: text
      substr: resumeSessionId

  - id: ai-agent-bypass-permissions-mode
    desc: AI agent bypass permissions mode
    crit: component
    conf: 0.93
    if:
      type: literal
      kind: string
      exact: bypassPermissions

  # An AI-agent permission-bypass flag is a documented mode of the agents
  # themselves (Claude Code `--dangerously-skip-permissions`, CodeWhale `--yolo`).
  # As a bare capability it is notable; the abuse signal is the composite that
  # combines it with a scripted/non-interactive agent invocation.
  - id: ai-agent-dangerous-permission-flag
    desc: AI agent permission bypass flag
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(--dangerously-skip-permissions|--yolo|--trust-all-tools)'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures

  - id: claude-cli-literal
    desc: Claude CLI command literal
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: claude

  - id: claude-print-flag
    desc: Claude CLI print flag
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: --print

  - id: claude-settings-flag
    desc: Claude CLI settings flag
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: --settings

  - id: claude-stream-json-mode
    desc: Claude stream JSON mode
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: stream-json

composite_rules:
  - id: codex-cli-or-agent-session
    desc: Codex CLI or agent session
    crit: notable
    conf: 0.9
    any:
      - id: codex-cli-command
      - id: codex-global-install
      - id: codex-session-resume
      - id: micro-behaviors/fs/path/application/config::codex-config-directory

  - id: codex-bypass-permissions-mode
    desc: Codex bypass permissions mode
    crit: suspicious
    conf: 0.93
    all:
      - id: codex-cli-or-agent-session
      - id: ai-agent-bypass-permissions-mode

  - id: claude-cli-agent-session
    desc: Claude CLI agent session
    crit: notable
    conf: 0.92
    all:
      - id: claude-cli-literal
    any:
      - id: claude-print-flag
      - id: claude-settings-flag
      - id: claude-stream-json-mode
      - id: micro-behaviors/fs/path/application/config::claude-config-directory

  - id: claude-dangerous-agent-session
    desc: Claude agent permission bypass
    crit: suspicious
    conf: 0.96
    all:
      - id: claude-cli-agent-session
      - id: ai-agent-dangerous-permission-flag
