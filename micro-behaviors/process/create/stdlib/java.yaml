defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
traits:
  - id: jvm-runtime-class-ref
    desc: JVM Runtime class reference
    crit: baseline
    conf: 0.9
    if:
      type: value
      path: class.class_refs[*]
      exact: java/lang/Runtime
  - id: jvm-processbuilder-class-ref
    desc: JVM ProcessBuilder class reference
    crit: baseline
    conf: 0.9
    if:
      type: value
      path: class.class_refs[*]
      exact: java/lang/ProcessBuilder
