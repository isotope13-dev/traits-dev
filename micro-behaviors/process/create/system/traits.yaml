defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [python, javascript, ruby, go]
traits:
  - id: shell-execute-ex-a
    desc: ShellExecuteExA ANSI extended API
    crit: notable
    mbc: E1059.003
    attack: T1059.003
    conf: 0.9
    platforms:
      - windows
    for: [pe]
    if:
      type: symbol
      exact: ShellExecuteExA
  - id: shell-execute-ex-a-string
    desc: ShellExecuteExA API string
    crit: baseline
    mbc: E1059.003
    attack: T1059.003
    conf: 0.82
    platforms:
      - windows
    for: [pe]
    if:
      type: text
      exact: ShellExecuteExA
  - id: go-os-exec
    desc: Executes commands via Go os/exec
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [go, elf, pe, macho]
    if:
      type: symbol
      regex: os/exec\..{0,50}
  - id: go-os-exec-pclntab
    desc: Go binary uses os/exec
    crit: baseline
    mbc: E1059
    attack: T1059
    conf: 0.85
    for: [elf, macho, pe]
    if:
      type: text
      substr: os/exec
  - id: python-os-system
    desc: Executes shell commands via Python
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.95
    if:
      type: symbol
      regex: ^(os\.system|import__\("os"\)\.system)$
  - id: js-child-process
    desc: Executes commands via Node.js child_process
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [javascript]
    if:
      type: symbol
      regex: child_process\.(exec|spawn|fork).{0,50}
  - id: js-execfile-call
    desc: Executes file via Node.js execFile
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.execFile(Sync)?\s*\('
  - id: js-execfile-direct-call
    desc: Executes file via Node.js execFile
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: tree-sitter
      language: javascript
      query: |
        (call_expression
          function: (identifier) @fn
          (#match? @fn "^execFile(Sync)?$")
        )
  - id: ruby-system
    desc: Executes commands via Ruby system()
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [ruby]
    if:
      type: text
      regex: \bsystem\(['\"]
  - id: rust-command
    desc: Executes process via Rust std::process::Command
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [rust, elf, pe, macho]
    if:
      type: symbol
      regex: std::process::Command::.{0,50}
