defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [binaries, scripts]
traits:
  - id: shell-execute-ex-a
    desc: ShellExecuteExA ANSI extended API
    crit: notable
    mbc: E1059.003
    attack: T1059.003
    conf: 0.9
    if:
      type: symbol
      exact: ShellExecuteExA
    platforms:
      - windows
    for:
      - python
      - ruby
      - php
      - javascript
      - powershell
  - id: go-os-exec
    desc: Executes commands via Go os/exec
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    if:
      type: symbol
      regex: os/exec\..{0,50}
  - id: python-os-system
    desc: Executes shell commands via Python
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.95
    if:
      type: symbol
      exact: os.system
  - id: js-child-process
    desc: Executes commands via Node.js child_process
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    if:
      type: symbol
      regex: child_process\.(exec|spawn|fork).{0,50}
  - id: ruby-system
    desc: Executes commands via Ruby system()
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    if:
      type: string_value
      regex: \bsystem\(['\"]
  - id: rust-command
    desc: Executes process via Rust std::process::Command
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    if:
      type: symbol
      regex: std::process::Command::.{0,50}
