defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [python, javascript, ruby, go]
traits:
  - id: mshta-exe-literal
    desc: mshta.exe execution literal
    crit: component
    conf: 0.92
    platforms:
      - windows
    for: [pe]
    if:
      type: text
      exact: mshta.exe
      section: rdata
  - id: shell-execute-ex-a
    desc: ShellExecuteExA ANSI extended API
    crit: notable
    mbc: E1059.003
    attack: T1059.003
    conf: 0.9
    platforms:
      - windows
    for: [pe]
    if:
      type: symbol
      exact: ShellExecuteExA
  - id: go-os-exec
    desc: Executes commands via Go os/exec
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [go, elf, pe, macho]
    if:
      type: symbol
      regex: os/exec\..{0,50}
  - id: go-os-exec-pclntab
    desc: Go binary uses os/exec
    crit: baseline
    mbc: E1059
    attack: T1059
    conf: 0.85
    for: [elf, macho, pe]
    if:
      type: text
      substr: os/exec
  - id: python-os-system
    desc: Executes shell commands via Python
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.95
    if:
      type: symbol
      kind: call
      regex: '^(os\.system|import__\("os"\)\.system|sys\.modules\.os\.system|vars\(\)\.system)$'
  - id: python-import-os-as-o
    desc: Python imports os as o
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '\bimport\s+os\s+as\s+o\b'
  - id: python-o-system-call
    desc: Python o.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: symbol
      kind: call
      exact: o.system
  - id: python-import-os-as-underscore-os
    desc: Python imports os as _os
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '\bimport\s+os\s+as\s+_os\b'
  - id: python-underscore-os-system-call
    desc: Python _os.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: symbol
      kind: call
      exact: _os.system
  - id: python-import-os-as-os-underscore
    desc: Python imports os as os_
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '\bimport\s+os\s+as\s+os_\b'
  - id: python-os-underscore-system-call
    desc: Python os_.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: symbol
      kind: call
      exact: os_.system
  - id: python-import-os-as-oslib
    desc: Python imports os as oslib
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '\bimport\s+os\s+as\s+oslib\b'
  - id: python-oslib-system-call
    desc: Python oslib.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: symbol
      kind: call
      exact: oslib.system
  - id: python-import-os-as-operating-system
    desc: Python imports os as operating_system
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '\bimport\s+os\s+as\s+operating_system\b'
  - id: python-operating-system-system-call
    desc: Python operating_system.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.86
    for: [python]
    if:
      type: symbol
      kind: call
      exact: operating_system.system
  - id: python-os-system-open-url
    desc: Python os.system opens URL
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'os\.system\s*\(\s*f?["'']\s*(start|open|xdg-open)\s+https?://'
  - id: js-child-process
    desc: Executes commands via Node.js child_process
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [javascript]
    if:
      type: symbol
      regex: child_process\.(exec|spawn|fork).{0,50}
  - id: js-execfile-call
    desc: Executes file via Node.js execFile
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.execFile(Sync)?\s*\('
  - id: js-execfile-direct-call
    desc: Executes file via Node.js execFile
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [javascript, typescript]
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '^execFile(Sync)?$'
  - id: ruby-system
    desc: Executes commands via Ruby system()
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [ruby]
    if:
      type: text
      regex: \bsystem\(['\"]
  - id: rust-command
    desc: "Executes proc via Rust std::proc::cmd"
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [rust, elf, pe, macho]
    if:
      type: symbol
      regex: std::process::Command::.{0,50}

composite_rules:
  - id: python-aliased-os-system-o
    desc: Executes shell commands via o alias
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    near_lines: 80
    all:
      - id: python-import-os-as-o
      - id: python-o-system-call
  - id: python-aliased-os-system-underscore-os
    desc: Executes shell commands via _os alias
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    near_lines: 80
    all:
      - id: python-import-os-as-underscore-os
      - id: python-underscore-os-system-call
  - id: python-aliased-os-system-os-underscore
    desc: Executes shell commands via os_ alias
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    near_lines: 80
    all:
      - id: python-import-os-as-os-underscore
      - id: python-os-underscore-system-call
  - id: python-aliased-os-system-oslib
    desc: Executes shell commands via oslib alias
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    near_lines: 80
    all:
      - id: python-import-os-as-oslib
      - id: python-oslib-system-call
  - id: python-aliased-os-system-operating-system
    desc: Executes shell commands via operating_system alias
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    near_lines: 80
    all:
      - id: python-import-os-as-operating-system
      - id: python-operating-system-system-call
  - id: python-aliased-os-system
    desc: Executes shell commands via aliased os
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.9
    for: [python]
    any:
      - id: python-aliased-os-system-o
      - id: python-aliased-os-system-underscore-os
      - id: python-aliased-os-system-os-underscore
      - id: python-aliased-os-system-oslib
      - id: python-aliased-os-system-operating-system
