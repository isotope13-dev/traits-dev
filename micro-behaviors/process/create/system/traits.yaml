defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [python, javascript, ruby, go]
traits:
  - id: mshta-exe-literal
    desc: mshta.exe execution literal
    crit: component
    conf: 0.92
    platforms:
      - windows
    for: [pe]
    if:
      type: text
      exact: mshta.exe
      section: rdata
  - id: shell-execute-ex-a
    desc: ShellExecuteExA ANSI extended API
    crit: notable
    mbc: E1059.003
    attack: T1059.003
    conf: 0.9
    platforms:
      - windows
    for: [pe]
    if:
      type: symbol
      exact: ShellExecuteExA
  - id: go-os-exec
    desc: Executes commands via Go os/exec
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [go, elf, pe, macho]
    if:
      type: symbol
      regex: os/exec\..{0,50}
  - id: go-os-exec-pclntab
    desc: Go binary uses os/exec
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.85
    for: [elf, macho, pe]
    if:
      type: text
      regex: 'os/exec\.(Command|LookPath|\(\*Cmd\)\.)'
  - id: python-os-system
    desc: Executes shell commands via Python
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.95
    for: [python]
    if:
      type: tree-sitter
      kind: call
      regex: '(?s)\bos\.system\s*\('
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/detection/security-scanner::code-pattern-catalog
  # Text-level backstop for os.system via a short `import os as <alias>` form
  # (os / o / _os). The symbol-call atoms rely on the parser's symbol table,
  # which the bulk scanner can drop on files dominated by a single huge
  # embedded-blob line (e.g. a base64 payload string). Anchored to short os
  # aliases so it does NOT match the ubiquitous, benign `platform.system()`.
  - id: python-os-system-text
    desc: os.system shell execution in source text
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '\b(os|o|_os)\.system\s*\('
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      # This package contains the pattern catalog and remediation text that
      # the rule itself documents; neither is an executed call.
      - type: text
        regex: 'CODE_(CRITICAL|HIGH)_PATTERNS'
      - type: text
        substr: 'Replace dangerous patterns'
  - id: python-o-system-call
    desc: Python o.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    if:
      type: symbol
      kind: call
      exact: o.system
  - id: python-underscore-os-system-call
    desc: Python _os.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    if:
      type: symbol
      kind: call
      exact: _os.system
  - id: python-os-underscore-system-call
    desc: Python os_.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    if:
      type: symbol
      kind: call
      exact: os_.system
  - id: python-oslib-system-call
    desc: Python oslib.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    if:
      type: symbol
      kind: call
      exact: oslib.system
  - id: python-operating-system-system-call
    desc: Python operating_system.system call
    crit: component
    mbc: E1059.006
    attack: T1059.006
    conf: 0.88
    for: [python]
    if:
      type: symbol
      kind: call
      exact: operating_system.system
  - id: python-os-system-open-url
    desc: Python os.system opens URL
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'os\.system\s*\(\s*f?["'']\s*(start|open|xdg-open)\s+https?://'
  - id: js-execfile-call
    desc: Executes file via Node.js execFile
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '^execFile(Sync)?$'
  - id: ruby-system
    desc: Runs a command with Ruby system()
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [ruby]
    if:
      type: symbol
      kind: call
      exact: system
  - id: rust-command
    desc: "Executes proc via Rust std::proc::cmd"
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [rust, elf, pe, macho]
    if:
      type: symbol
      regex: std::process::Command::.{0,50}

composite_rules:
  - id: python-aliased-os-system
    desc: Executes shell commands via aliased os
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.9
    for: [python]
    any:
      - id: python-o-system-call
      - id: python-underscore-os-system-call
      - id: python-os-underscore-system-call
      - id: python-oslib-system-call
      - id: python-operating-system-system-call
