defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [python, javascript, ruby, go]
traits:
  - id: mshta-exe-literal
    desc: mshta.exe execution literal
    crit: component
    conf: 0.92
    platforms:
      - windows
    for: [pe]
    if:
      type: text
      exact: mshta.exe
      section: rdata
  - id: shell-execute-ex-a
    desc: ShellExecuteExA ANSI extended API
    crit: notable
    mbc: E1059.003
    attack: T1059.003
    conf: 0.9
    platforms:
      - windows
    for: [pe]
    if:
      type: symbol
      exact: ShellExecuteExA
  - id: go-os-exec
    desc: Executes commands via Go os/exec
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [go, elf, pe, macho]
    if:
      type: symbol
      regex: os/exec\..{0,50}
  - id: go-os-exec-pclntab
    desc: Go binary uses os/exec
    crit: baseline
    mbc: E1059
    attack: T1059
    conf: 0.85
    for: [elf, macho, pe]
    if:
      type: text
      substr: os/exec
  - id: python-os-system
    desc: Executes shell commands via Python
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.95
    if:
      type: symbol
      kind: call
      regex: '^(os\.system|import__\("os"\)\.system|sys\.modules\.os\.system|vars\(\)\.system)$'
  - id: python-os-system-open-url
    desc: Python os.system opens URL
    crit: notable
    mbc: E1059.006
    attack: T1059.006
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'os\.system\s*\(\s*f?["'']\s*(start|open|xdg-open)\s+https?://'
  - id: js-child-process
    desc: Executes commands via Node.js child_process
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [javascript]
    if:
      type: symbol
      regex: child_process\.(exec|spawn|fork).{0,50}
  - id: js-execfile-call
    desc: Executes file via Node.js execFile
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.execFile(Sync)?\s*\('
  - id: js-execfile-direct-call
    desc: Executes file via Node.js execFile
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [javascript, typescript]
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '^execFile(Sync)?$'
  - id: ruby-system
    desc: Executes commands via Ruby system()
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [ruby]
    if:
      type: text
      regex: \bsystem\(['\"]
  - id: rust-command
    desc: "Executes proc via Rust std::proc::cmd"
    crit: notable
    mbc: E1059
    attack: T1059
    conf: 0.9
    for: [rust, elf, pe, macho]
    if:
      type: symbol
      regex: std::process::Command::.{0,50}
