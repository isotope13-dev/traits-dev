defaults:
  platforms: [unix]
  for: [elf, macho, c, cpp]
traits:
  - id: getpid
    desc: Get process ID
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      exact: getpid
  - id: getpid-text
    desc: Get process ID (text)
    crit: baseline
    conf: 0.3
    if:
      type: text
      regex: '\bgetpid\s*\('
  - id: getppid
    desc: Get process ID
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      exact: getppid
  - id: getppid-text
    desc: Get process ID (text)
    crit: baseline
    conf: 0.3
    if:
      type: text
      regex: '\bgetppid\s*\('
composite_rules:
  - id: get-uid
    desc: Get user or group ID
    crit: baseline
    conf: 0.3
    any:
      - id: micro-behaviors/os/privilege/query/
