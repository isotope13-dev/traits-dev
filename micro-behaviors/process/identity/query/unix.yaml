defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: getpid
    desc: Get process ID
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      exact: getpid
  - id: getppid
    desc: Get process ID
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      exact: getppid
composite_rules:
  - id: get-uid
    desc: Get user or group ID
    crit: baseline
    conf: 0.3
    any:
      - id: micro-behaviors/os/privilege/query/
