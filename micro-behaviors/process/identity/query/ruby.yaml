defaults:
  platforms: [windows, unix]
  for: [ruby]
  crit: notable
  conf: 0.85

traits:
  - id: ruby-process-pid
    desc: Ruby current process ID access
    if:
      type: symbol
      exact: Process.pid

  - id: ruby-process-ppid
    desc: Ruby parent process ID access
    if:
      type: symbol
      exact: Process.ppid
