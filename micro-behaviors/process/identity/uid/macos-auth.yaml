# macOS Security Framework Privileged Process Execution
# Detects use of AuthorizationExecuteWithPrivileges and related APIs
# for executing processes with elevated privileges.
# These APIs are typically used for admin tasks but are often abused
# by malware to escalate privileges without user interaction.
# ATT&CK: T1548.004 (Abuse Elevation Control Mechanism)
defaults:
  for: [macho, dylib, c]
  platforms: [macos]
  attack: "T1548.004"
traits:
  - id: auth-execute-with-privileges
    desc: "Runs process as root via Security API"
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: "AuthorizationExecuteWithPrivileges"
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/framework/
        - id: metadata/binary/framework/
    unless:
      - id: well-known/app/macos-benign/
      - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
      - type: path
        substr: /firefox-ios/ThirdParty/sentry-cli
      - type: path
        substr: /focus-ios/focus-ios-tests/tools/sentry-cli
  - id: auth-create
    desc: "AuthorizationCreate API for auth context"
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "AuthorizationCreate"
  - id: auth-copy-rights
    desc: "AuthorizationCopyRights API privilege check"
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "AuthorizationCopyRights"
  - id: security-framework
    desc: "Security Authorization API usage"
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "Authorization(Free|MakeExternalForm|CopyInfo|CopyExternalForm)"
