defaults:
  for: [elf, macho, c]
  platforms:
    - unix
traits:
  - id: setuid-dup
    desc: Set user ID (capability)
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: ^(setuid|seteuid|setreuid|setresuid)$
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - id: metadata/file/text/string::chrome-sandbox-basename
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: setgid
    desc: Set group ID (capability)
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: ^(setgid|setegid|setregid|setresgid)$
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - id: metadata/file/text/string::chrome-sandbox-basename
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: drop-privs
    desc: Drop privileges (setuid after getuid)
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: ^(setuid|setgid|seteuid|setegid)$
