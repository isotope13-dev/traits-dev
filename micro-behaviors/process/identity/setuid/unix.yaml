defaults:
  for: [elf, macho, c]
  platforms:
  - unix
traits:
- id: setuid-dup--setreuid
  desc: Set user ID (setreuid)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: setreuid
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: setuid-dup--setresuid
  desc: Set user ID (setresuid)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: setresuid
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: setgid--setregid
  desc: Set group ID (setregid)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: setregid
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: setgid--setresgid
  desc: Set group ID (setresgid)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: setresgid
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: drop-privs--setuid
  desc: Drop privileges (setuid)
  crit: baseline
  conf: 0.8
  if:
    type: symbol
    exact: setuid
- id: drop-privs--setgid
  desc: Drop privileges (setgid)
  crit: baseline
  conf: 0.8
  if:
    type: symbol
    exact: setgid
- id: drop-privs--seteuid
  desc: Drop privileges (seteuid)
  crit: baseline
  conf: 0.8
  if:
    type: symbol
    exact: seteuid
- id: drop-privs--setegid
  desc: Drop privileges (setegid)
  crit: baseline
  conf: 0.8
  if:
    type: symbol
    exact: setegid
- id: setuid-root-retention-diagnostic
  desc: Native setuid root-retention diagnostic
  crit: notable
  conf: 0.94
  for: [elf, macho]
  if:
    type: text
    substr: setuid(0) succeeded (when it should not)
composite_rules:
- id: setuid-dup
  desc: Set user ID (capability)
  crit: notable
  conf: 0.6
  unless:
  - id: metadata/file/string/identity::node-pty-native-basename
  - id: metadata/file/string/identity::chrome-sandbox-basename
  downgrade:
    any:
    - id: metadata/file/string/identity::system-shell-basename
  any:
  - id: micro-behaviors/process/identity/setuid::drop-privs--setuid
  - id: micro-behaviors/process/identity/setuid::drop-privs--seteuid
  - id: setuid-dup--setreuid
  - id: setuid-dup--setresuid
- id: setgid
  desc: Set group ID (capability)
  crit: notable
  conf: 0.6
  unless:
  - id: metadata/file/string/identity::node-pty-native-basename
  - id: metadata/file/string/identity::chrome-sandbox-basename
  downgrade:
    any:
    - id: metadata/file/string/identity::system-shell-basename
  any:
  - id: micro-behaviors/process/identity/setuid::drop-privs--setgid
  - id: micro-behaviors/process/identity/setuid::drop-privs--setegid
  - id: setgid--setregid
  - id: setgid--setresgid
- id: drop-privs
  desc: Drop privileges (setuid after getuid)
  crit: baseline
  conf: 0.8
  any:
  - id: drop-privs--setuid
  - id: drop-privs--setgid
  - id: drop-privs--seteuid
  - id: drop-privs--setegid
