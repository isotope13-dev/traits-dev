# Process identity-change calls in source (setuid/setgid/initgroups).
# Neutral capability: daemons drop privileges, setuid helpers change identity,
# privilege-escalation exploits raise to root. Intent lives in composites.
# Symbol-based detection for compiled binaries is in setuid/unix.yaml; this is
# the source-text surface (covers the `name(` call shape the symbol view of a
# language like Rust/Go/shell does not always project).
# MBC: C0042 (Modify Security Privileges)
defaults:
  platforms: [unix]
  for: [c, cpp, rust, go, shell]
  crit: notable
  conf: 0.7
traits:
  - id: setid-call-source
    desc: Sets process user/group identity
    if:
      type: text
      regex: \b(setuid|setgid|initgroups)\s*\(
