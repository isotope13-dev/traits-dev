# Python process identity changes.  A service may use these to drop privileges;
# privilege-escalation intent belongs in an objective composite.
defaults:
  platforms: [unix]
  for: [python]
  crit: notable
  conf: 0.9
  mbc: C0042

traits:
  - id: os-setuid-call
    desc: Python changes process user ID
    if:
      type: symbol
      exact: os.setuid

  - id: os-setgid-call
    desc: Python changes process group ID
    if:
      type: symbol
      exact: os.setgid
