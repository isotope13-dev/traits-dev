# Anti-forensic argument wiping in C/C++ source
defaults:
  platforms: [linux, unix, macos]
  for: [c, cpp]
  attack: "T1070"
traits:
  - id: bzero-argv
    desc: Wipes argv contents with bzero
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: bzero\s*\(\s*argv
  - id: memset-argv
    desc: Wipes argv contents with memset
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: memset\s*\(\s*argv
