defaults:
  platforms: [windows, unix]
traits:
  - id: password-required-flag
    desc: Password command-line argument
    crit: component
    conf: 0.8
    for:
      - scripts
      - binaries
    if:
      type: text
      regex: --password(\s+PASS|\s+\$?pass|\b)
      case_insensitive: true
  - id: suspicious-arg-passw
    desc: Suspicious --passw argument usage
    crit: suspicious
    for:
      - python
    if:
      type: string_literal
      exact: --passw
