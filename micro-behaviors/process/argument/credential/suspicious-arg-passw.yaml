defaults:
  platforms: [windows, unix]
traits:
  - id: password-required-flag
    desc: Password command-line argument
    crit: component
    conf: 0.8
    for:
      - scripts
      - binaries
    if:
      type: text
      regex: --password(\s+PASS|\s+\$?pass|\b)
      case_insensitive: true
    unless:
      # Completion catalogs describe flags but do not consume process
      # arguments. Keep this capability for actual command-line interfaces.
      - type: text
        regex: '@register_completion_schema|PROGRAM_DESCRIPTIONS|completion schema'
  - id: suspicious-arg-passw
    desc: Suspicious --passw argument usage
    crit: suspicious
    for:
      - python
    if:
      type: string_literal
      exact: --passw
