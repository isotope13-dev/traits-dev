# Generic CLI subcommand/selector verb tokens ("get", "show", "list", "item",
# "items"). Neutral parsing fragments that appear in countless programs; on
# their own they carry no credential or attack meaning. They exist only to be
# proximity-combined with a specific tool name inside higher-tier composites
# (e.g. `op item get`, `bw list items`). Kept in this neutral tier — not under
# an intent directory — so a bare subcommand literal never inflates a
# whole-directory reference such as `objectives/credential-access` via a
# standalone match.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
traits:
  - id: cli-verb-list
    desc: CLI list subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: list
  - id: cli-verb-item
    desc: CLI item subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: item
  - id: cli-verb-get
    desc: CLI get subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: get
  - id: cli-verb-show
    desc: CLI show subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: show
  - id: cli-verb-items
    desc: CLI items selector token
    conf: 0.82
    if:
      type: string_literal
      exact: items
  - id: cli-verb-debug
    desc: CLI debug subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: debug
  - id: cli-verb-prefs
    desc: CLI prefs subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: prefs
  - id: cli-verb-print
    desc: CLI print subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: print
  - id: cli-verb-token
    desc: CLI token subcommand token
    conf: 0.82
    if:
      type: string_literal
      exact: token
