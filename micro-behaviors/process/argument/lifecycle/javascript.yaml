# JavaScript lifecycle-mode command-line arguments.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
  mbc: B0024

traits:
  - id: postinstall-argv-check
    desc: Checks argv for postinstall mode flag
    conf: 0.9
    if:
      type: string_literal
      regex: 'process\.argv\.(includes|indexOf)\([''"]--postinstall[''"]\)'
  - id: postinstall-flag-string
    desc: JavaScript contains a postinstall CLI mode flag
    conf: 0.7
    if:
      type: string_literal
      substr: --postinstall
