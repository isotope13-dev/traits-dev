# Anti-forensic argument wiping in C/C++ source
defaults:
  platforms: [unix]
  for: [c, cpp]
  attack: "T1070"
traits:
  - id: bzero-argv
    desc: Wipes argv contents with bzero
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: bzero\s*\(\s*argv
  - id: memset-argv
    desc: Wipes argv contents with memset
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: memset\s*\(\s*argv\s*\[
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-spdx-source-context
