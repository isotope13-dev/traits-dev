defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-stdin-write-call
    desc: Node stdin.write call fact
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      substr: .stdin.write

  - id: js-stdin-write-text
    desc: Node stdin.write text reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: stdin.write

  - id: js-stdin-end
    desc: Node stdin end call
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      substr: stdin.end

  - id: js-stdout-write-empty
    desc: Empty buffer stdout write
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'process\.stdout\._write\(\s*\[\s*\]\s*,'

  - id: js-command-output-result-object
    desc: JavaScript command output result object
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "stdout\\s*:\\s*stdout[\\s\\S]{0,120}stderr\\s*:\\s*stderr"

composite_rules:
  - id: js-stdin-write
    desc: Node stdin write call
    crit: notable
    conf: 0.86
    any:
      - id: js-stdin-write-call
      - id: js-stdin-write-text
