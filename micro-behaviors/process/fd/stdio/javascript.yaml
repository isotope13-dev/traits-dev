defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-stdin-write
    desc: Writes to Node process stdin
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: stdin.write

  - id: js-stdin-end
    desc: Node stdin end call
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      substr: stdin.end

  - id: js-stdout-write-empty
    desc: Empty buffer stdout write
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'process\.stdout\._write\(\s*\[\s*\]\s*,'

  - id: js-command-output-result-object
    desc: JavaScript command output result object
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "stdout\\s*:\\s*stdout[\\s\\S]{0,120}stderr\\s*:\\s*stderr"

  - id: js-output-identifier
    desc: JavaScript output identifier
    crit: component
    conf: 0.55
    if:
      type: symbol
      kind: identifier
      exact: output

  - id: js-command-identifier
    desc: JavaScript command identifier
    crit: component
    conf: 0.55
    if:
      type: symbol
      kind: identifier
      exact: command

  - id: node-stdio-pipe
    desc: Pipes a Node standard stream
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bstd(in|out|err)\.pipe\s*\('

  - id: node-socket-pipe
    desc: Pipes a Node socket stream
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(socket|sock|client)\.pipe\s*\('

  - id: node-response-pipe
    desc: Pipes a Node response stream
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: res.pipe

composite_rules:
  - id: node-stream-pipe
    desc: Pipes a Node stream
    crit: notable
    conf: 0.8
    any:
      - id: node-stdio-pipe
      - id: node-socket-pipe
