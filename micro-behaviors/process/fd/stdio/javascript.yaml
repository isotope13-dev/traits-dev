defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-stdin-read
    desc: Reads Node process stdin
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)stdin\.(on|read|resume)$'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: node-read-stdin-fd
    desc: Reads Node stdin through file descriptor 0
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: fs.readFileSync
      arg:
        kind: number
        value: 0

  - id: js-stdin-write
    desc: Writes to Node process stdin
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: stdin.write

  - id: js-stdin-end
    desc: Node stdin end call
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      substr: stdin.end

  - id: js-stdout-write-empty
    desc: Empty buffer stdout write
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'process\.stdout\._write\(\s*\[\s*\]\s*,'

  - id: js-command-output-result-object
    desc: JavaScript command output result object
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "stdout\\s*:\\s*stdout[\\s\\S]{0,120}stderr\\s*:\\s*stderr"

  - id: node-stdio-pipe
    desc: Pipes a Node standard stream
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bstd(in|out|err)\.pipe\s*\('

  - id: node-socket-pipe
    desc: Pipes a Node socket stream
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(socket|sock|client)\.pipe\s*\('

  - id: node-stream-to-stdin-pipe
    desc: Pipes a Node stream into child stdin
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]*\.pipe\s*\(\s*[A-Za-z_$][\w$]*\.stdin\s*\)'

  - id: node-child-output-to-stream-pipe
    desc: Pipes child output to a stream
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]*\.(stdout|stderr)\.pipe\s*\(\s*[A-Za-z_$][\w$]*\s*\)'

  - id: node-response-pipe
    desc: Pipes a Node response stream
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(response|res|reply)\.pipe\s*\('

composite_rules:
  - id: node-stream-pipe
    desc: Pipes a Node stream
    crit: notable
    conf: 0.8
    any:
      - id: node-stdio-pipe
      - id: node-socket-pipe
