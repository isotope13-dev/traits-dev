# Subprocess stdio pipe arguments and pipe methods (stdin=/stdout=/stderr=,
# .PIPE, .pipe()). Generic process-IO capabilities (every subprocess that
# captures output; .pipe() is also RxJS/pandas/gulp); relocated from objectives/
# command-and-control/reverse-shell so the standalone components are labelled by
# what they search for. The reverse-shell pipe composites reference them
# cross-directory.
defaults:
  platforms: [linux, windows, macos]
  for: [python, pyc]
traits:
  - id: py-stdin-pipe
    desc: stdin= pipe argument (Python)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: stdin\s*=
  - id: py-stdout-pipe
    desc: stdout= pipe argument (Python)
    crit: component
    conf: 0.4
    if:
      type: text
      regex: stdout\s*=
  - id: py-stderr-pipe
    desc: stderr= pipe argument (Python)
    crit: component
    conf: 0.4
    if:
      type: text
      regex: stderr\s*=
  - id: py-stdin-custom-stream
    desc: Python redirects stdin to custom stream
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: stdin\s*=\s*(?!subprocess\.(PIPE|DEVNULL|STDOUT))[A-Za-z_]\w*
  - id: py-stdout-custom-stream
    desc: Python redirects stdout to custom stream
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: stdout\s*=\s*(?!subprocess\.(PIPE|DEVNULL|STDOUT))[A-Za-z_]\w*
  - id: py-stderr-custom-stream
    desc: Python redirects stderr to custom stream
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: stderr\s*=\s*(?!subprocess\.(PIPE|DEVNULL|STDOUT))[A-Za-z_]\w*
  - id: py-stdio-dup2
    desc: Python duplicates descriptor to stdio
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: os\.dup2\s*\(\s*[A-Za-z_]\w*(\.fileno\s*\(\s*\))?\s*,\s*[012]\s*\)
  - id: pipe-constant
    desc: PIPE constant reference
    crit: component
    conf: 0.4
    for: [python]
    if:
      type: text
      regex: \.PIPE\b
  - id: dot-pipe
    desc: .pipe( method call
    crit: component
    conf: 0.4
    for: [python]
    if:
      type: text
      substr: .pipe(
composite_rules:
  - id: python-subprocess-pipe-args
    desc: Python subprocess PIPE args
    crit: component
    conf: 0.6
    any:
      - id: py-stdin-pipe
      - id: py-stdout-pipe
      - id: py-stderr-pipe
  - id: pipe-methods
    desc: Pipe method or constant
    crit: component
    conf: 0.5
    any:
      - id: dot-pipe
      - id: pipe-constant
  - id: python-custom-stdio
    desc: Python subprocess custom stdio streams
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: py-stdin-custom-stream
      - id: py-stdout-custom-stream
      - id: py-stderr-custom-stream
