defaults:
  platforms: [windows, linux, macos]
  for: [c, cpp]

traits:
  - id: c-select-stdin-fd
    desc: C select monitors standard input
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'FD_SET\s*\(\s*STDIN_FILENO'

  - id: c-write-to-stdout
    desc: C writes buffer to standard output
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'write\s*\(\s*STDOUT_FILENO\s*,'

  - id: c-read-from-stdin
    desc: C reads buffer from standard input
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'read\s*\(\s*STDIN_FILENO\s*,'
