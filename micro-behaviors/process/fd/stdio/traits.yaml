defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: stdin-string
    desc: stdin string reference
    crit: baseline
    conf: 0.3
    if:
      type: string_literal
      substr: stdin
  - id: stdout-string
    desc: stdout string reference
    crit: baseline
    conf: 0.3
    if:
      type: string_literal
      substr: stdout
  - id: stderr-string
    desc: stderr string reference
    crit: baseline
    conf: 0.3
    if:
      type: string_literal
      substr: stderr
  - id: freopen-import
    desc: freopen stream redirection import
    crit: notable
    conf: 0.7
    for: [macho, elf]
    if:
      type: symbol
      exact: freopen
composite_rules:
  - id: stdio-refs
    desc: Multiple standard I/O references
    crit: baseline
    conf: 0.4
    needs: 2
    any:
      - id: stdin-string
      - id: stdout-string
      - id: stderr-string
