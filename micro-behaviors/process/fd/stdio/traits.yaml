# Standard I/O stream references
# Atomic capability: code references stdin/stdout/stderr
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, javascript, typescript]
traits:
  - id: stdin-string
    desc: stdin string reference
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      substr: "stdin"
  - id: stdout-string
    desc: stdout string reference
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      substr: "stdout"
  - id: stderr-string
    desc: stderr string reference
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      substr: "stderr"
composite_rules:
  - id: stdio-refs
    desc: Multiple standard I/O references
    crit: baseline
    conf: 0.4
    needs: 2
    any:
      - id: stdin-string
      - id: stdout-string
      - id: stderr-string
