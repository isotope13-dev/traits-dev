# contextlib redirect_stdout / redirect_stderr — neutral stdio-redirection
# capability (output capture, quiet modes). Relocated from anti-analysis/
# sandbox-detect; the silent-launch composite references these cross-directory.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: python-stdout-redirect-symbol
    desc: Python stdout redirection
    crit: component
    conf: 0.84
    if:
      type: symbol
      exact: redirect_stdout
  - id: python-stderr-redirect-symbol
    desc: Python stderr redirection
    crit: component
    conf: 0.84
    if:
      type: symbol
      exact: redirect_stderr
