# File Descriptor Range Closure - Unix
# Broad descriptor closure is used for daemonization and process isolation.
defaults:
  for: [elf, c]
  platforms: [unix]
traits:
  - id: close-range
    desc: Close file descriptor ranges
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: "close_range"
  - id: closefrom
    desc: Close all descriptors from limit
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: "closefrom"
