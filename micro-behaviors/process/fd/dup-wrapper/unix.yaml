defaults:
  platforms: [linux, macos]
  for: [elf, macho]

traits:
  - id: libc-dup2-wrapper-symbol
    desc: Native libc dup2 wrapper symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: __libc_dup2
  - id: gi-dup2-wrapper-symbol
    desc: Native glibc dup2 wrapper symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: __GI_dup2

composite_rules:
  - id: native-dup2-wrapper-symbol
    desc: Native dup2 wrapper symbol
    crit: notable
    conf: 0.9
    any:
      - id: libc-dup2-wrapper-symbol
      - id: gi-dup2-wrapper-symbol
