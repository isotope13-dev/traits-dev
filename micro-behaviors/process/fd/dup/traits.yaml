defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: dup
    desc: Duplicate file descriptor
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: dup
  - id: dup2
    desc: Duplicate file descriptor (I/O redirection)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: dup2
  - id: dup3
    desc: Duplicate file descriptor (I/O redirection)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: dup3
  - id: source-dup2-stdio-fd
    desc: Native source dup2 targets stdio fd
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: 'dup2\s*\([^,()]{1,40},\s*[0-2]\s*\)'
  - id: source-dup2-stdio-fileno
    desc: Native source dup2 targets STD*_FILENO
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: 'dup2\s*\([^,()]{1,40},\s*STD(IN|OUT|ERR)_FILENO\s*\)'
  - id: source-stderr-fd-token
    desc: Native source names stderr fd
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      word: STDERR_FILENO
  - id: source-stdout-fd-token
    desc: Native source names stdout fd
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      word: STDOUT_FILENO
  - id: source-stdin-fd-token
    desc: Native source names stdin fd
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      word: STDIN_FILENO
composite_rules:
  - id: source-stdio-fd-token
    desc: Native source names a standard stream fd
    crit: component
    conf: 0.9
    for: [c, cpp]
    any:
      - id: source-stderr-fd-token
      - id: source-stdout-fd-token
      - id: source-stdin-fd-token
  - id: source-dup2-stdio
    desc: Native source redirects standard streams
    crit: notable
    conf: 0.9
    for: [c, cpp]
    any:
      - id: source-dup2-stdio-fd
      - id: source-dup2-stdio-fileno
