defaults:
  platforms: [windows, unix]
  for: [binaries, c]
traits:
  - id: dup
    desc: Duplicate file descriptor
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: dup
  - id: dup2
    desc: Duplicate file descriptor (I/O redirection)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: dup2
  - id: dup3
    desc: Duplicate file descriptor (I/O redirection)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: dup3
