defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: python-pty-fork
    desc: Python allocates a child PTY
    crit: notable
    conf: 0.92
    attack: T1059
    for: [python]
    if:
      type: text
      substr: "pty.fork()"

  - id: python-pty-master-write
    desc: Python writes bytes to PTY master
    crit: notable
    conf: 0.92
    attack: T1059
    for: [python]
    if:
      type: text
      substr: "os.write(master"

  - id: openpty-call
    desc: openpty() call
    crit: notable
    conf: 0.7
    attack: T1059
    for: [scripts, binaries]
    if:
      type: text
      substr: openpty
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: python-pty-shell-process
    desc: Python shell process attached to PTY
    crit: notable
    conf: 0.9
    attack: T1059.006
    mbc: B0022
    for: [python]
    if:
      type: text
      regex: '(?s)os\.openpty\(\).{0,320}subprocess\.Popen\(.{0,320}(stdin|stdout|stderr)\s*=\s*slave_fd'
  - id: pty-open-call
    desc: pty.Open call
    crit: notable
    conf: 0.7
    attack: T1059
    for: [scripts, binaries]
    if:
      type: text
      substr: pty.Open
  - id: posix-openpt
    desc: POSIX open pseudoterminal master
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: posix_openpt
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: grantpt
    desc: Grant access to slave pseudoterminal
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      regex: grantpt
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: unlockpt
    desc: Unlock slave pseudoterminal
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      regex: unlockpt
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: ptsname-symbol
    desc: ptsname symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      regex: ptsname
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: ptsname-r-symbol
    desc: ptsname_r symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      regex: ptsname_r
  - id: ttyname-r-symbol
    desc: ttyname_r symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      regex: ttyname_r
  - id: tcgetattr
    desc: Get terminal attributes
    crit: notable
    conf: 0.75
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      regex: tcgetattr
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
  - id: tcsetattr
    desc: Set terminal attributes
    crit: notable
    conf: 0.75
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: tcsetattr
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - id: metadata/file/string/identity::system-shell-basename
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: cfmakeraw
    desc: Make terminal attributes raw-mode
    crit: component
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: cfmakeraw
  - id: cfsetispeed
    desc: Set terminal input baud rate attribute
    crit: component
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: cfsetispeed
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: cfsetospeed
    desc: Set terminal output baud rate attribute
    crit: component
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: cfsetospeed
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: vhangup
    desc: Virtual terminal hangup
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: vhangup
  - id: getpass
    desc: Terminal password prompt
    crit: notable
    conf: 0.6
    attack: T1056
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: getpass
  - id: setupterm
    desc: Terminal initialization
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: text
      substr: setupterm
  - id: import-pty
    desc: import pty statement
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - python
    if:
      type: text
      substr: import pty
  - id: from-pty-import
    desc: from pty import statement
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - python
    if:
      type: text
      substr: from pty import
  - id: pty-spawn
    desc: Calls Python PTY spawn API
    crit: notable
    conf: 0.9
    attack: T1059
    for:
      - python
    if:
      type: symbol
      kind: call
      exact: pty.spawn
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: node-pty-module-ref
    desc: node-pty module reference
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: node-pty
    not:
      - substr: node-pty Build
  - id: node-pty-spawn
    desc: Node.js PTY spawn
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: pty\.spawn\s*\(
  - id: node-pty-spawn-command-options
    desc: PTY spawns caller-supplied command and arguments
    crit: notable
    conf: 0.94
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: text
      regex: 'pty\.spawn\s*\(\s*[^,\n]{1,120}\.command\s*,\s*[^,\n]{1,120}\.args'
  - id: pty-js-require
    desc: require('pty.js') call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: require('pty.js')
  - id: go-creack-pty-path
    desc: github.com/creack/pty library path
    crit: notable
    conf: 0.95
    attack: T1059
    for: [elf, macho, go.mod]
    if:
      type: text
      substr: github.com/creack/pty
  - id: go-creack-pty-error
    desc: github.com/creack/pty error message
    crit: notable
    conf: 0.9
    attack: T1059
    for: [elf, macho]
    if:
      type: text
      substr: "failed to start pty: %v"
  - id: go-creack-pty-kv
    desc: github.com/creack/pty library dependency
    crit: notable
    conf: 1.0
    attack: T1059
    for: [elf, macho]
    if:
      type: value
      path: go.dependencies.path
      exact: github.com/creack/pty
  - id: winpty-dll-name
    desc: winpty DLL filename
    crit: notable
    conf: 0.86
    attack: T1059
    platforms: [windows]
    for: [pe]
    if:
      type: text
      substr: winpty.dll
  - id: winpty-agent-name
    desc: winpty agent executable filename
    crit: notable
    conf: 0.9
    attack: T1059
    platforms: [windows]
    for: [pe]
    if:
      type: text
      substr: winpty-agent.exe
  - id: go-embedded-winpty-path
    desc: Go embedded winpty executable path
    crit: notable
    conf: 0.95
    attack: T1059
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: 'executables/[A-Za-z0-9_/.-]{1,80}winpty'
  - id: dev-ptmx
    desc: /dev/ptmx PTY master multiplexer device
    crit: component
    conf: 0.9
    platforms: [linux]
    for: [elf]
    if:
      type: text
      exact: /dev/ptmx
      section: rdata
  - id: login-tty-symbol
    desc: login_tty PTY session symbol
    crit: component
    platforms: [unix]
    for: [elf]
    if:
      type: symbol
      exact: login_tty
  - id: go-pty-start
    desc: Starts child process under Go PTY
    crit: notable
    conf: 0.95
    attack: T1059
    for: [go]
    if:
      type: symbol
      kind: call
      exact: pty.Start
composite_rules:
  - id: node-pty-usage
    desc: Node.js PTY library usage
    crit: notable
    conf: 0.85
    for: [javascript, typescript]
    any:
      - id: node-pty-module-ref
      - id: node-pty-spawn
      - id: pty-js-require

  - id: openpty
    desc: Open pseudoterminal
    crit: notable
    conf: 0.85
    attack: T1059
    for: [scripts, binaries, c, cpp]
    any:
      - id: openpty-call
      - id: pty-open-call
  - id: winpty-bundled-console
    desc: Bundled Windows PTY console support
    crit: notable
    conf: 0.92
    platforms: [windows]
    for: [pe]
    any:
      - id: winpty-dll-name
      - id: winpty-agent-name
      - id: go-embedded-winpty-path
    needs: 2
  - id: terminal-control-stack
    desc: Interactive terminal control stack
    crit: baseline
    conf: 0.8
    for:
      - elf
      - macho
      - c
      - cpp
    needs: 3
    any:
      - id: openpty
      - id: tcgetattr
      - id: tcsetattr
      - id: cfsetispeed
      - id: cfsetospeed
      - id: setupterm
  - id: pty-allocation-symbols
    desc: Pseudoterminal allocation symbols
    crit: component
    conf: 0.8
    for:
      - elf
      - macho
      - c
      - cpp
    any:
      - id: openpty
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: ptsname
  - id: pty-allocation-sequence
    desc: Full manual PTY allocation sequence (posix_openpt + grantpt + unlockpt)
    crit: component
    conf: 0.85
    for:
      - elf
      - macho
      - c
      - cpp
    all:
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
  - id: pty-allocation-full
    desc: Full PTY allocation with slave-name resolution
    crit: component
    conf: 0.85
    for:
      - elf
      - macho
      - c
      - cpp
    all:
      - id: pty-allocation-sequence
      - id: ptsname
  - id: terminal-attribute-control
    desc: Terminal attribute control symbols
    crit: component
    conf: 0.8
    for:
      - elf
      - macho
    any:
      - id: tcgetattr
      - id: tcsetattr
      - id: cfmakeraw
      - id: cfsetispeed
      - id: cfsetospeed
      - id: setupterm
  - id: ptsname
    desc: Get slave pseudoterminal name
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    any:
      - id: ptsname-symbol
      - id: ptsname-r-symbol
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: ttyname-comp
    desc: Get terminal device pathname
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
      - c
      - cpp
    any:
      - id: micro-behaviors/process/tty/terminal::ttyname
      - id: ttyname-r-symbol
  - id: python-pty-comp
    desc: Python PTY module
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - python
    any:
      - id: import-pty
      - id: from-pty-import
  - id: interactive-shell
    desc: Interactive shell via PTY
    crit: notable
    conf: 0.8
    attack: T1059
    mbc: B0022
    for: [scripts, binaries, c, cpp]
    needs: 2
    any:
      - id: openpty
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: pty-spawn
      - id: ptsname
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/family/
  - id: posix-pty-shell
    # Full PTY allocation plus a shell spawn — the interactive-terminal
    # capability shared by terminal emulators, tmux, script(1), expect and
    # sshd. It is NOT a backdoor on its own; that requires redirecting the PTY
    # to a socket (see objectives/command-and-control/reverse-shell/pty, whose
    # composites add the network leg). Neutral capability: notable, accurate
    # name, no intent assertion.
    desc: Full PTY allocation with shell spawn
    crit: notable
    conf: 0.95
    attack: T1059
    mbc: B0022
    for:
      - elf
      - macho
    platforms:
      - linux
      - macos
    all:
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: ptsname
      - id: micro-behaviors/process/create/shell/
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/app
  - id: pty-network-backdoor
    desc: PTY with socket and fork operations
    crit: notable
    conf: 0.95
    attack: T1059
    mbc: B0022
    for:
      - elf
      - macho
      - c
      - cpp
    platforms:
      - linux
      - macos
    all:
      - id: micro-behaviors/communications/socket/create::create
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/fork/clone::fork
      - id: interactive-shell
    any:
      - id: micro-behaviors/communications/socket/receive::receive
      - id: micro-behaviors/communications/socket/send::send
      - id: micro-behaviors/process/create/direct::execve-import
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/
        - id: metadata/binary/
  - id: go-creack-pty
    desc: github.com/creack/pty library
    crit: notable
    conf: 0.95
    attack: T1059
    for: [elf, macho, go.mod]
    any:
      - id: go-creack-pty-path
      - id: go-creack-pty-error
      - id: go-creack-pty-kv
