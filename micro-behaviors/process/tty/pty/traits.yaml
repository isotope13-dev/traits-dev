defaults:
  platforms:
    - unix
    - windows
    - macos
traits:
  - id: openpty-call
    desc: openpty() call
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - elf
      - macho
      - python
    if:
      type: string_value
      substr: openpty
  - id: pty-open-call
    desc: pty.Open call
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - elf
      - macho
      - python
    if:
      type: string_value
      substr: pty.Open
  - id: posix-openpt
    desc: POSIX open pseudoterminal master
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: posix_openpt
  - id: grantpt
    desc: Grant access to slave pseudoterminal
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: grantpt
  - id: unlockpt
    desc: Unlock slave pseudoterminal
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: unlockpt
  - id: ptsname-symbol
    desc: ptsname symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: ptsname
  - id: ptsname-r-symbol
    desc: ptsname_r symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: ptsname_r
  - id: ttyname-r-symbol
    desc: ttyname_r symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: ttyname_r
  - id: tcgetattr
    desc: Get terminal attributes
    crit: notable
    conf: 0.75
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: tcgetattr
  - id: tcsetattr
    desc: Set terminal attributes
    crit: notable
    conf: 0.75
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: tcsetattr
  - id: vhangup
    desc: Virtual terminal hangup
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: vhangup
  - id: getpass
    desc: Terminal password prompt
    crit: notable
    conf: 0.6
    attack: T1056
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: getpass
  - id: setupterm
    desc: Terminal initialization
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: string_value
      substr: setupterm
  - id: import-pty
    desc: import pty statement
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - python
    if:
      type: raw
      substr: import pty
  - id: from-pty-import
    desc: from pty import statement
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - python
    if:
      type: raw
      regex: from pty import
  - id: pty-spawn
    desc: Python PTY spawn
    crit: suspicious
    conf: 0.9
    attack: T1059
    for:
      - python
    if:
      type: string_value
      substr: pty.spawn
composite_rules:
  - id: openpty
    desc: Open pseudoterminal
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
      - python
    any:
      - id: openpty-call
      - id: pty-open-call
  - id: terminal-control-stack
    desc: Interactive terminal control stack
    crit: baseline
    conf: 0.8
    for:
      - elf
      - macho
    needs: 3
    any:
      - id: openpty
      - id: tcgetattr
      - id: tcsetattr
      - id: setupterm
  - id: ptsname
    desc: Get slave pseudoterminal name
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    any:
      - id: ptsname-symbol
      - id: ptsname-r-symbol
  - id: ttyname-comp
    desc: Get terminal device pathname
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    any:
      - id: micro-behaviors/process/tty/terminal::ttyname
      - id: ttyname-r-symbol
  - id: python-pty-comp
    desc: Python PTY module
    crit: suspicious
    conf: 0.85
    attack: T1059
    for:
      - python
    any:
      - id: import-pty
      - id: from-pty-import
  - id: interactive-shell
    desc: Interactive shell via PTY
    crit: notable
    conf: 0.8
    attack: T1059
    mbc: B0022
    for:
      - elf
      - macho
      - python
    needs: 2
    any:
      - id: openpty
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: pty-spawn
      - id: ptsname
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library::debugger-tool-marker
  - id: posix-pty-shell
    desc: POSIX PTY shell (backdoor pattern)
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    for:
      - elf
      - macho
    platforms:
      - macos
      - linux
      - unix
    all:
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: ptsname
      - id: micro-behaviors/process/create/shell/
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: micro-behaviors/dylib/library::debugger-tool-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::shell-interpreter
        - id: micro-behaviors/dylib/library::terminal-editor-marker
  - id: pty-network-backdoor
    desc: PTY-based network backdoor
    crit: notable
    conf: 0.95
    attack: T1059
    mbc: B0022
    for:
      - elf
      - macho
    platforms:
      - macos
      - linux
      - unix
    all:
      - id: micro-behaviors/communications/socket/create::create
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/fork/clone::fork
    any:
      - id: posix-openpt
      - id: openpty
      - id: grantpt
      - id: unlockpt
      - id: micro-behaviors/communications/socket/receive::receive
      - id: micro-behaviors/communications/socket/send::send
      - id: micro-behaviors/process/create/execv::c-execve
      - id: micro-behaviors/process/create/shell::bin-sh
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/
        - id: metadata/binary/
