defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: openpty-call
    desc: openpty() call
    crit: notable
    conf: 0.7
    attack: T1059
    for: [scripts, binaries]
    if:
      type: text
      substr: openpty
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: pty-open-call
    desc: pty.Open call
    crit: notable
    conf: 0.7
    attack: T1059
    for: [scripts, binaries]
    if:
      type: text
      substr: pty.Open
  - id: posix-openpt
    desc: POSIX open pseudoterminal master
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: posix_openpt
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: grantpt
    desc: Grant access to slave pseudoterminal
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: grantpt
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: unlockpt
    desc: Unlock slave pseudoterminal
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: unlockpt
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: ptsname-symbol
    desc: ptsname symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: ptsname
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
  - id: ptsname-r-symbol
    desc: ptsname_r symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: ptsname_r
  - id: ttyname-r-symbol
    desc: ttyname_r symbol
    crit: notable
    conf: 0.6
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: ttyname_r
  - id: tcgetattr
    desc: Get terminal attributes
    crit: notable
    conf: 0.75
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: tcgetattr
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: tcsetattr
    desc: Set terminal attributes
    crit: notable
    conf: 0.75
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      regex: tcsetattr
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - id: metadata/file/text/string::system-shell-basename
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: cfmakeraw
    desc: Make terminal attributes raw-mode
    crit: component
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: cfmakeraw
  - id: cfsetispeed
    desc: Set terminal input baud rate attribute
    crit: component
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: cfsetispeed
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: cfsetospeed
    desc: Set terminal output baud rate attribute
    crit: component
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: cfsetospeed
    unless:
      - type: basename
        regex: ^(node-pty|pty|conpty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: vhangup
    desc: Virtual terminal hangup
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: vhangup
  - id: getpass
    desc: Terminal password prompt
    crit: notable
    conf: 0.6
    attack: T1056
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: getpass
  - id: setupterm
    desc: Terminal initialization
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - elf
      - macho
    if:
      type: text
      substr: setupterm
  - id: import-pty
    desc: import pty statement
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - python
    if:
      type: text
      substr: import pty
  - id: from-pty-import
    desc: from pty import statement
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - python
    if:
      type: text
      substr: from pty import
  - id: pty-spawn
    desc: Python PTY spawn
    crit: notable
    conf: 0.9
    attack: T1059
    for:
      - python
    if:
      type: string_literal
      substr: pty.spawn
  - id: node-pty-module-ref
    desc: node-pty module reference
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: node-pty
    not:
      - substr: node-pty Build
  - id: node-pty-spawn
    desc: Node.js PTY spawn
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: pty\.spawn\s*\(
  - id: pty-js-require
    desc: require('pty.js') call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: require('pty.js')
  - id: go-creack-pty-path
    desc: github.com/creack/pty library path
    crit: notable
    conf: 0.95
    attack: T1059
    for: [elf, macho]
    if:
      type: text
      substr: github.com/creack/pty
  - id: go-creack-pty-error
    desc: github.com/creack/pty error message
    crit: notable
    conf: 0.9
    attack: T1059
    for: [elf, macho]
    if:
      type: text
      substr: "failed to start pty: %v"
  - id: go-creack-pty-kv
    desc: github.com/creack/pty library dependency
    crit: notable
    conf: 1.0
    attack: T1059
    for: [elf, macho]
    if:
      type: kv
      path: go.dependencies.path
      exact: github.com/creack/pty
composite_rules:
  - id: openpty
    desc: Open pseudoterminal
    crit: notable
    conf: 0.85
    attack: T1059
    for: [scripts, binaries]
    any:
      - id: openpty-call
      - id: pty-open-call
  - id: terminal-control-stack
    desc: Interactive terminal control stack
    crit: baseline
    conf: 0.8
    for:
      - elf
      - macho
    needs: 3
    any:
      - id: openpty
      - id: tcgetattr
      - id: tcsetattr
      - id: cfsetispeed
      - id: cfsetospeed
      - id: setupterm
  - id: pty-allocation-symbols
    desc: Pseudoterminal allocation symbols
    crit: component
    conf: 0.8
    for:
      - elf
      - macho
    any:
      - id: openpty
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: ptsname
  - id: terminal-attribute-control
    desc: Terminal attribute control symbols
    crit: component
    conf: 0.8
    for:
      - elf
      - macho
    any:
      - id: tcgetattr
      - id: tcsetattr
      - id: cfmakeraw
      - id: cfsetispeed
      - id: cfsetospeed
      - id: setupterm
  - id: ptsname
    desc: Get slave pseudoterminal name
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    any:
      - id: ptsname-symbol
      - id: ptsname-r-symbol
  - id: ttyname-comp
    desc: Get terminal device pathname
    crit: notable
    conf: 0.8
    attack: T1059
    for:
      - elf
      - macho
    any:
      - id: micro-behaviors/process/tty/terminal::ttyname
      - id: ttyname-r-symbol
  - id: python-pty-comp
    desc: Python PTY module
    crit: notable
    conf: 0.85
    attack: T1059
    for:
      - python
    any:
      - id: import-pty
      - id: from-pty-import
  - id: interactive-shell
    desc: Interactive shell via PTY
    crit: notable
    conf: 0.8
    attack: T1059
    mbc: B0022
    for: [scripts, binaries]
    needs: 2
    any:
      - id: openpty
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: pty-spawn
      - id: ptsname
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/family::debugger-tool-marker
  - id: posix-pty-shell
    desc: POSIX PTY shell (backdoor pattern)
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    for:
      - elf
      - macho
    platforms:
      - linux
      - macos
    all:
      - id: posix-openpt
      - id: grantpt
      - id: unlockpt
      - id: ptsname
      - id: micro-behaviors/process/create/shell/
    downgrade:
      any:
        - id: metadata/binary/vendor::system-component
        - id: micro-behaviors/dylib/library/family::debugger-tool-marker
        - id: micro-behaviors/dylib/library/family::system-lib-marker
        - id: micro-behaviors/dylib/library/family::shell-interpreter
        - id: micro-behaviors/dylib/library/app
  - id: pty-network-backdoor
    desc: PTY with socket and fork operations
    crit: notable
    conf: 0.95
    attack: T1059
    mbc: B0022
    for:
      - elf
      - macho
    platforms:
      - linux
      - macos
    all:
      - id: micro-behaviors/communications/socket/create::create
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/fork/clone::fork
      - id: interactive-shell
    any:
      - id: micro-behaviors/communications/socket/receive::receive
      - id: micro-behaviors/communications/socket/send::send
      - id: micro-behaviors/process/create/execv::c-execve
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/
        - id: metadata/binary/
  - id: go-creack-pty
    desc: github.com/creack/pty library
    crit: notable
    conf: 0.95
    attack: T1059
    for: [elf, macho]
    any:
      - id: go-creack-pty-path
      - id: go-creack-pty-error
      - id: go-creack-pty-kv
