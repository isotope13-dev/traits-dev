# Process TTY/PTY - Ruby
defaults:
  platforms: [unix]
  for: [ruby]

traits:
  - id: ruby-pty
    desc: Pseudo-terminal (PTY) manipulation
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: "\\bPTY\\.(spawn|open)\\s*\\("

composite_rules:
  - id: terminal-runner-history-isolation
    desc: PTY runner isolates subprocess shell history
    crit: exception
    all:
      - id: ruby-pty
      - id: micro-behaviors/os/env/vars/access::histfile-dev-null
