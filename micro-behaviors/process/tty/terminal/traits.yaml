defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c]
traits:
  - id: isatty
    desc: Detect if running in terminal (isatty)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: isatty
  - id: ttyname
    desc: Get terminal name (ttyname)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: ttyname
  - id: term-env
    desc: TERM= environment setting
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: TERM=
  - id: xterm-ref
    desc: xterm terminal reference
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: xterm
  - id: vt100-ref
    desc: vt100 terminal reference
    crit: notable
    conf: 0.65
    platforms: [unix]
    for: [elf, macho, c]
    if:
      type: text
      word: vt100
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: terminal-type-linux
    desc: Terminal type linux identifier
    crit: component
    conf: 0.8
    if:
      type: text
      exact: linux
    unless:
    - id: well-known/app/drivers/
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: stty-cmd
    desc: stty command reference
    crit: notable
    conf: 0.4
    if:
      type: text
      word: stty
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: raw-mode
    desc: raw mode terminal setting
    crit: notable
    conf: 0.4
    if:
      type: text
      regex: \braw\s+mode\b|setraw|stty\s+raw
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: setpgrp
    desc: Set process group
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: setpgrp
  - id: getpgrp
    desc: Query process group
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: getpgrp
  - id: tcsetpgrp
    desc: Move foreground terminal process group
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: tcsetpgrp
  - id: terminal-type-vt102
    desc: Terminal type vt102 identifier
    crit: component
    conf: 0.8
    platforms: [linux, macos]
    for: [elf, macho]
    if:
      type: text
      regex: ^vt10[02]$
    unless:
    - id: well-known/app/drivers/
  - id: terminal-type-ansi
    desc: Terminal type ansi identifier
    crit: component
    conf: 0.8
    platforms: [linux, macos]
    for: [elf, macho]
    if:
      type: text
      exact: ansi
    unless:
    - id: well-known/app/drivers/
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: terminal-type-dumb
    desc: Terminal type dumb identifier
    crit: component
    conf: 0.8
    platforms: [linux, macos]
    for: [elf, macho]
    if:
      type: text
      exact: dumb
  - id: terminal-type-screen
    desc: Terminal type screen identifier
    crit: component
    conf: 0.8
    platforms: [linux, macos]
    for: [elf, macho]
    if:
      type: text
      exact: screen
    unless:
    - id: well-known/app/drivers/
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
composite_rules:
  - id: tty-markers
    desc: TTY device markers
    crit: baseline
    conf: 0.5
    any:
      - id: isatty
      - id: ttyname
      - id: micro-behaviors/fs/path/device/terminal::dev-tty
  - id: ttyname-comp
    desc: TTY name query
    crit: baseline
    conf: 0.5
    any:
      - id: ttyname
      - id: micro-behaviors/fs/path/device/terminal::dev-tty
  - id: terminal-setup
    desc: Terminal setup markers
    crit: baseline
    conf: 0.4
    any:
      - id: term-env
      - id: xterm-ref
      - id: vt100-ref
      - id: stty-cmd
      - id: raw-mode
  - id: pty-terminal-setup
    desc: PTY terminal setup
    crit: notable
    conf: 0.78
    all:
      - id: micro-behaviors/process/tty/pty::pty-network-backdoor
      - id: vt100-ref
  - id: terminal-job-control
    desc: Terminal process-group control capability
    crit: baseline
    conf: 0.6
    any:
      - id: setpgrp
      - id: getpgrp
      - id: tcsetpgrp
  - id: terminal-type-string
    desc: Terminal type identifier string (legacy wrapper)
    crit: component
    conf: 0.8
    any:
    - id: terminal-type-vt102
    - id: xterm-ref
    - id: terminal-type-ansi
    - id: terminal-type-linux
    - id: terminal-type-dumb
    - id: terminal-type-screen
