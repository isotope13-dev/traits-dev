defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c]
traits:
  - id: isatty
    desc: Detect if running in terminal (isatty)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: isatty
  - id: ttyname
    desc: Get terminal name (ttyname)
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: ttyname
  - id: term-env
    desc: TERM= environment setting
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: TERM=
  - id: xterm-ref
    desc: xterm terminal reference
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: xterm
  - id: vt100-ref
    desc: vt100 terminal reference
    crit: notable
    conf: 0.65
    platforms: [unix]
    for: [elf, macho, c]
    if:
      type: text
      exact: vt100
  - id: stty-cmd
    desc: stty command reference
    crit: notable
    conf: 0.4
    if:
      type: text
      exact: stty
  - id: raw-mode
    desc: raw mode terminal setting
    crit: notable
    conf: 0.4
    if:
      type: text
      regex: \braw\s+mode\b|setraw|stty\s+raw
  - id: setpgrp
    desc: Set process group
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: setpgrp
  - id: getpgrp
    desc: Query process group
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: getpgrp
  - id: tcsetpgrp
    desc: Move foreground terminal process group
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: tcsetpgrp
composite_rules:
  - id: tty-markers
    desc: TTY device markers
    crit: baseline
    conf: 0.5
    any:
      - id: isatty
      - id: ttyname
      - id: micro-behaviors/fs/path/device/terminal::dev-tty
  - id: terminal-setup
    desc: Terminal setup markers
    crit: baseline
    conf: 0.4
    any:
      - id: term-env
      - id: xterm-ref
      - id: vt100-ref
      - id: stty-cmd
      - id: raw-mode
  - id: pty-terminal-setup
    desc: PTY terminal setup
    crit: notable
    conf: 0.78
    all:
      - id: micro-behaviors/process/tty/pty::pty-network-backdoor
      - id: vt100-ref
  - id: terminal-job-control
    desc: Terminal process-group control capability
    crit: baseline
    conf: 0.6
    any:
      - id: setpgrp
      - id: getpgrp
      - id: tcsetpgrp
