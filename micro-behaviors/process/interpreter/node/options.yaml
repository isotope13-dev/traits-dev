defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell]
  attack: T1059.007
traits:
  - id: require-preload-option
    desc: Node.js require preload option
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: --require=
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: node-eval-command
    desc: Node inline eval command
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: '\bnode\s+-e\s+'
    unless:
      - type: basename
        regex: '\.(test|spec)\.[cm]?[jt]sx?$'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern

  - id: which-node-lookup
    desc: Locate node binary via `which node`
    crit: component
    conf: 0.97
    if:
      type: string_literal
      regex: '(^|[;&|(]\s*)which\s+node(\.exe)?(\s|$)'

  - id: where-node-lookup
    desc: Locate node binary via `where node`
    crit: component
    conf: 0.97
    if:
      type: string_literal
      regex: '(^|[;&|(]\s*)where\s+node(\.exe)?(\s|$)'
    not:
      - substr: "where node or an edge is added"
      - substr: "Hints for where node labels are to be placed"
      - substr: "which node and where node lookup"
