defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell]
  attack: T1059.007
traits:
  - id: require-preload-option
    desc: Node.js require preload option
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: --require=
    unless:
      - id: metadata/package/testing/harness::electron-node-spec-harness

  - id: node-eval-command
    desc: Node inline eval command
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: '\bnode\s+-e\s+'
    unless:
      - type: basename
        regex: '\.(test|spec)\.[cm]?[jt]sx?$'
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-filename-pattern
