defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: process-binding-evals
    desc: Uses Node internal evals binding
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: "process\\.binding\\s*\\(\\s*['\"]evals['\"]\\s*\\)"
  - id: process-binding-natives
    desc: 'Access to process.binding'
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: "process\\.binding\\s*\\(\\s*['\"]natives['\"]\\s*\\)"
  - id: process-dlopen
    desc: Native addon loading via process.dlopen
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "process\\.dlopen\\s*\\("
