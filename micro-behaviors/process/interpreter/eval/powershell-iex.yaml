# PowerShell dynamic expression evaluation primitives.
defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1059.001
  mbc: E1059

traits:
  - id: powershell-iex-call
    desc: PowerShell Invoke-Expression or iex call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(?i)^(iex|Invoke-Expression)$'

  - id: embedded-powershell-iex
    desc: PowerShell Invoke-Expression command text
    crit: notable
    conf: 0.9
    for: [powershell, javascript, html]
    if:
      # This also covers a WSH loader that stores the PowerShell command in an
      # environment variable and invokes it through a later child process.
      type: text
      regex: '(?i)\bInvoke-Expression\b'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: embedded-powershell-iex-alias
    desc: Embedded PowerShell IEX alias call
    crit: notable
    conf: 0.9
    for: [powershell, javascript, html]
    if:
      type: text
      regex: '(?i)\biex(\s*\(|\s+\$[A-Za-z_]\w*)'

  - id: embedded-powershell-chained-iex
    desc: PowerShell pipes IEX output to IEX
    crit: suspicious
    conf: 0.98
    for: [powershell, javascript, html]
    if:
      type: text
      regex: '(?i)\biex\s+\$[A-Za-z_]\w*\s*\|\s*iex\b'

  - id: powershell-irm-iex-command-string
    desc: PowerShell download-and-execute command string
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: literal
      kind: string
      regex: '(?i)\bpowershell\b.{0,80}\birm\b.{0,120}\|\s*iex'
