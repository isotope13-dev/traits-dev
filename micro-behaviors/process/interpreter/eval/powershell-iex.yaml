# PowerShell dynamic expression evaluation primitives.
defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1059.001
  mbc: E1059

traits:
  - id: powershell-iex-call
    desc: PowerShell Invoke-Expression or iex call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(?i)^(iex|Invoke-Expression)$'

  - id: powershell-irm-iex-command-string
    desc: PowerShell download-and-execute command string
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: literal
      kind: string
      regex: '(?i)\bpowershell\b.{0,80}\birm\b.{0,120}\|\s*iex'
