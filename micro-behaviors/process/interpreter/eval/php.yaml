defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
  attack: "T1059.006"
  mbc: "E1059"
traits:
  - id: eval-symbol
    desc: PHP eval() token present
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: \beval\s*\(
  - id: mixedcase-base64-decode-fragments
    desc: Mixed-case base64 decode fragments
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: BaSe64.{0,32}_deCOde
  - id: fragmented-eval-token
    desc: Fragmented eval token assembly
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: "'e'\\s*\\.\\s*'va'\\s*\\.\\s*'l'"
  - id: fragmented-gzinflate-token
    desc: Fragmented gzinflate assembly
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: "'g'\\s*\\.\\s*'zi'\\s*\\.\\s*'nf'\\s*\\.\\s*'l'\\s*\\.\\s*'at'\\s*\\.\\s*'e'"
  - id: fragmented-create-function-token
    desc: Fragmented create_function assembly
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: "'create_fun'\\s*\\.\\s*'ct'\\s*\\.\\s*'io'\\s*\\.\\s*'n'"
  - id: eval-gzinflate-base64
    desc: eval gzinflate base64 chain
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      regex: 'eval\s*\(\s*gzinflate\s*\(\s*base64_decode\s*\('
  - id: eval-gzuncompress-base64
    desc: eval gzuncompress base64 chain
    crit: suspicious
    conf: 0.99
    if:
      type: encoded
      regex: 'eval\s*\(\s*gzuncompress\s*\(\s*base64_decode\s*\('
  - id: create-function-eval-loader
    desc: create_function staged eval loader
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      regex: 'create_function\s*\([^)]{0,120}eval\s*\(\s*gzinflate\s*\(\s*base64_decode\s*\('
  - id: create-function-gzuncompress-loader
    desc: create_function gzuncompress stage
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      regex: 'create_function.{0,80}gzuncompress.{0,40}base64_decode'
      case_insensitive: true
composite_rules:
  - id: staged-eval-loader
    desc: Staged PHP eval loader
    crit: suspicious
    conf: 0.99
    any:
      - id: fragmented-eval-token
      - id: mixedcase-base64-decode-fragments
      - id: eval-gzinflate-base64
      - id: eval-gzuncompress-base64
      - id: fragmented-create-function-token
      - id: create-function-eval-loader
      - id: create-function-gzuncompress-loader
