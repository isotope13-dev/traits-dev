defaults:
  platforms: [windows, unix]
  for: [ruby]
  attack: T1059
traits:
  - id: ruby-eval
    desc: Ruby dynamic code evaluation call
    crit: notable
    conf: 0.9
    downgrade:
      any:
        - id: well-known/lib/nokogiri::library-reference
        - id: well-known/lib/active-support::module
    if:
      type: symbol
      exact: eval
  - id: ruby-instance-eval
    desc: Ruby instance_eval call
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      word: instance_eval
    unless:
      - type: text
        regex: instance_eval\(&method\)
  - id: ruby-class-eval
    desc: Ruby class_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: class_eval
    unless:
      - type: text
        regex: class_eval\s+<<-RUBY,\s+__FILE__,\s+__LINE__\s+\+\s+1
      - id: metadata/package/testing/presence/harness::ruby-test-file
  - id: ruby-module-eval
    desc: Ruby module_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: module_eval
