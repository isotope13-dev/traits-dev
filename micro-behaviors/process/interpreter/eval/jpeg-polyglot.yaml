defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [jpeg]
  attack: "T1059.006"
  mbc: "E1059"
traits:
  - id: php-eval-decrypted-content
    desc: Eval of decrypted PHP content
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      substr: "eval('?>' . $decryptedContent);"
