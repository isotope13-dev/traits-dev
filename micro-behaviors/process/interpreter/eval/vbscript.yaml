# VBScript dynamic evaluation
# ATT&CK: T1059.005 (Command and Scripting Interpreter: Visual Basic)
defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1059.005

traits:
  - id: vbs-executeglobal
    desc: ExecuteGlobal evaluates VBScript text
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bExecuteGlobal\b'

  - id: vbs-execute-statement
    desc: Execute evaluates generated VBScript code
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bExecute\s+.{1,160}'

  - id: vbs-eval-function
    desc: Eval evaluates a VBScript expression
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bEval\s*\('
