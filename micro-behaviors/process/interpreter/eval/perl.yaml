defaults:
  platforms: [unix, windows]
  for: [perl]
  attack: T1059.006

traits:
  - id: perl-eval-command-variable
    desc: Perl eval command variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\beval\s+\$(cmd|command|exec|run)[A-Za-z0-9_]*\b'

  - id: perl-eval-payload-variable
    desc: Perl eval payload variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\beval\s+\$(payload|code|data|shellcode)[A-Za-z0-9_]*\b'

  - id: perl-eval-buffer-variable
    desc: Perl eval buffer variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\beval\s+\$(buf|buffer|msg|input)[A-Za-z0-9_]*\b'

  - id: perl-eval-response-variable
    desc: Perl eval response variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\beval\s+\$(resp|response|reply)[A-Za-z0-9_]*\b'

  - id: perl-eval-remote-variable
    desc: Perl eval remote variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\beval\s+\$(recv|received|remote|task)[A-Za-z0-9_]*\b'

composite_rules:
  - id: perl-eval-variable
    desc: Perl eval attacker variable
    crit: suspicious
    conf: 0.92
    any:
      - id: perl-eval-command-variable
      - id: perl-eval-payload-variable
      - id: perl-eval-buffer-variable
      - id: perl-eval-response-variable
      - id: perl-eval-remote-variable
