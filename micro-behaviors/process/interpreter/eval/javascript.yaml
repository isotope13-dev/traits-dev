# JavaScript Eval Detection
# MBC: B0009.016 (Dynamic Execution)
# ATT&CK: T1059.007
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-new-function-constructor
    desc: JavaScript new Function constructor
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: new Function(
    unless:
      - type: text
        substr: "new Function('return this')"
      - type: text
        substr: 'new Function("return this")'
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/jquery/
  - id: js-indirect-function-constructor
    desc: Function constructor via prototype chain
    crit: notable
    conf: 0.9
    # `[].constructor.constructor`, `"".constructor.constructor`,
    # `({}).constructor.constructor` all resolve to the Function constructor
    # without ever writing the literal token `Function`/`eval`. This indirection
    # is an evasion idiom used to keep the dynamic-execution sink out of reach of
    # static `Function(`/`eval(` greps; legitimate code reaches Function directly.
    if:
      type: text
      regex: '\.constructor\s*\.\s*constructor\b'
    unless:
      - id: metadata/library/structure::js-large-minified-bundle
  - id: js-charcode-constructor-stage
    desc: Char-code-built Function constructor stage
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\(function\(\)\{\}\)\[String\.fromCharCode.{1,180}\]\([A-Za-z_$][A-Za-z0-9_$]*\)'
  - id: js-eval-raw
    desc: eval() function call (raw)
    crit: notable
    conf: 0.7
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'eval'
    unless:
      - id: metadata/lang/compiled::erlang-module-marker
      - type: text
        substr: eval(path)
      - id: metadata/package/testing/harness/runtime::v8-native-intrinsic-call
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime/
      - type: text
        substr: "function eval_template"
    downgrade:
      any:
        - id: metadata/package/testing/harness/fixture::embedded-unit-test-fixture
  - id: js-eval-object-property
    desc: eval() executes object property
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    ref: sha256:3136a698ee6023e879bec6a1ff24d69f9ece7db5195e520acd82fed5b3efa220
    if:
      type: text
      regex: '\beval\s*\(\s*[A-Za-z_$][\w$]*\.[A-Za-z_$][\w$]*\s*\)'
    unless:
      - id: metadata/library/structure/
      - id: metadata/library/runtime::angularjs-bundle
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: well-known/lib/benign-runtime-bundles::node-source-tree
      - id: well-known/lib/nextjs/
      - id: well-known/app/civicrm/
      - id: metadata/library/runtime::websharper-runtime-marker
      - type: text
        substr: CriticalCmdDialog
  - id: js-indirect-eval
    desc: Indirect eval via comma operator ((0,eval))
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\(\s*0\s*,\s*eval\s*\)\s*\('
    # `(0,eval)(...)` is a standard transpiler/bundler idiom for global-scope
    # eval; suppress it on large minified bundles to avoid noise, matching the
    # js-new-function-constructor precedent above. Dropper composites use the
    # component fragment in supply-chain/hidden-payload/encoding instead, which
    # carries no bundle exclusion so megabyte single-line packers still match.
    unless:
      - id: metadata/library/structure::js-large-minified-bundle
