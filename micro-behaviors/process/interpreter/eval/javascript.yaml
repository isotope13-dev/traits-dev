# JavaScript Eval Detection
# MBC: B0009.016 (Dynamic Execution)
# ATT&CK: T1059.007
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-new-function-constructor
    desc: JavaScript new Function constructor
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: new Function(
    unless:
      - type: text
        substr: "new Function('return this')"
      - type: text
        substr: 'new Function("return this")'
      - id: metadata/library/structure::js-large-minified-bundle
  - id: js-eval-raw
    desc: eval() function call (raw)
    crit: notable
    conf: 0.7
    if:
      type: tree-sitter
      language: javascript
      query: |-
        (call_expression
          function: (identifier) @fn
          (#eq? @fn "eval"))
        (call_expression
          function: (member_expression
            object: (identifier) @obj
            property: (property_identifier) @prop)
          (#eq? @obj "window")
          (#eq? @prop "eval"))
    unless:
      - type: text
        substr: -module(
      - type: text
        substr: eval(path)
      - id: metadata/package/testing/harness/runtime::v8-native-intrinsic-call
      - id: metadata/package/testing/harness/runtime::v8-mjsunit-assert-pair
      - id: metadata/package/testing/harness/runtime::is-test
      - type: text
        substr: "function eval_template"
    downgrade:
      any:
        - id: metadata/package/testing/harness/fixture::embedded-unit-test-fixture
