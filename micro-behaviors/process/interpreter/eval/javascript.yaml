# JavaScript Eval Detection
# MBC: B0009.016 (Dynamic Execution)
# ATT&CK: T1059.007
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-eval-raw
    desc: eval() function call (raw)
    crit: notable
    conf: 0.7
    for: [javascript]
    if:
      type: text
      regex: '(^|[^\w$.])eval\s*\('
    unless:
      - type: text
        substr: -module(
      - type: text
        substr: "@externs"
    downgrade:
      any:
        - id: metadata/package/testing/harness::embedded-unit-test-fixture
        - id: metadata/package/testing/harness::is-test
