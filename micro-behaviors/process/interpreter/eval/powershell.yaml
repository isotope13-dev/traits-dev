defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1059.001
  mbc: E1059

traits:
  - id: powershell-invoke-command
    desc: PowerShell Invoke-Command call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)\bInvoke-Command\b'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context

  - id: powershell-call-operator
    desc: PowerShell computed call operator
    crit: notable
    conf: 0.85
    if:
      type: tree-sitter
      kind: call
      regex: '&\s*\.?\s*\('

  - id: powershell-add-type
    desc: PowerShell Add-Type compilation
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)Add-Type\s+-TypeDefinition'

  - id: powershell-add-type-variable
    desc: PowerShell Add-Type variable compilation
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '(?i)\bAdd-Type\s+\$[A-Za-z_][A-Za-z0-9_]*'

  - id: powershell-scriptblock-execution
    desc: PowerShell ScriptBlock execution API
    crit: notable
    conf: 0.9
    for: [powershell, oledoc]
    if:
      type: text
      regex: '(?i)\bInvoke-ScriptBlock\b|\bScriptBlock\.Create\s*\('

  - id: powershell-scriptblock-constructor-text
    desc: PowerShell creates a ScriptBlock
    crit: notable
    conf: 0.92
    for: [powershell, oledoc]
    if:
      type: text
      regex: '(?i)\[\s*scriptblock\s*\]::create\s*\('

  - id: powershell-scriptblock-constructor
    desc: PowerShell ScriptBlock constructor call
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: '(?i)\[\s*scriptblock\s*\]::create\s*\('

  - id: powershell-multiple-eval-fallbacks
    desc: PowerShell uses dynamic eval fallbacks
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?is)Invoke-Expression[\s\S]{0,1000}\[ScriptBlock\]::Create[\s\S]{0,1000}&\s*\{\s*\.\s*\{'

composite_rules:
  - id: powershell-multiple-eval-paths
    desc: Multiple PowerShell dynamic eval methods
    crit: notable
    conf: 0.95
    near_lines: 20
    all:
      - id: powershell-scriptblock-constructor-text
      - id: micro-behaviors/process/interpreter/eval::embedded-powershell-iex
