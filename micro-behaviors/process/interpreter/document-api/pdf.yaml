defaults:
  platforms: [windows, unix]
  for: [pdf]
  crit: suspicious
  conf: 0.95
  attack: T1203

traits:
  - id: pdf-stream-collab-emailinfo
    desc: PDF stream calls Collab.collectEmailInfo
    if:
      type: kv
      path: streams[*].decoded_text
      substr: Collab.collectEmailInfo
  - id: pdf-stream-collab-geticon
    desc: PDF stream calls Collab.getIcon
    if:
      type: kv
      path: streams[*].decoded_text
      substr: Collab.getIcon
  - id: pdf-stream-media-newplayer
    desc: PDF stream calls media.newPlayer
    if:
      type: kv
      path: streams[*].decoded_text
      substr: media.newPlayer
  - id: pdf-stream-spell-customdict
    desc: PDF stream opens custom dictionary
    if:
      type: kv
      path: streams[*].decoded_text
      substr: spell.customDictionaryOpen
  - id: pdf-stream-util-printf-exploit
    desc: PDF stream util.printf exploit marker
    conf: 0.96
    if:
      type: kv
      path: streams[*].decoded_text
      regex: 'util.{0,24}printf.{0,64}45000f'
  - id: pdf-stream-printseps
    desc: PDF stream calls printSeps
    conf: 0.92
    if:
      type: kv
      path: streams[*].decoded_text
      substr: printSeps
  - id: pdf-stream-addtoolbutton
    desc: PDF stream calls app.addToolButton
    conf: 0.92
    if:
      type: kv
      path: streams[*].decoded_text
      substr: app.addToolButton
