defaults:
  platforms: [unix, windows]
  for: [csharp, pe]

traits:
  - id: method-invoke
    desc: .NET invokes a reflected method member
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: ".Invoke("
  - id: get-type-call
    desc: .NET obtains an object runtime type
    crit: component
    conf: 0.7
    if:
      type: text
      substr: GetType(
  - id: typeof-call
    desc: C# references a type with typeof
    crit: component
    conf: 0.7
    if:
      type: text
      substr: typeof(
