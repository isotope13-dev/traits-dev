defaults:
  platforms: [windows, unix]
  for: [pe, csharp]
  crit: notable

traits:
  - id: activator
    desc: .NET Activator type reference
    conf: 0.8
    if:
      type: text
      word: Activator

  - id: create-delegate
    desc: Creates .NET reflection delegate
    conf: 0.8
    if:
      type: text
      word: CreateDelegate

  - id: method-info-class
    desc: .NET MethodInfo class reference
    conf: 0.8
    if:
      type: text
      substr: System.Reflection.MethodInfo

  - id: get-methods-token
    desc: GetMethods member-name token
    crit: component
    conf: 0.65
    if:
      type: text
      word: GetMethods

  - id: begin-invoke-token
    desc: BeginInvoke member-name token
    crit: component
    conf: 0.7
    if:
      type: text
      word: BeginInvoke

  - id: end-invoke-token
    desc: EndInvoke member-name token
    crit: component
    conf: 0.7
    if:
      type: text
      word: EndInvoke

composite_rules:
  - id: reflection-method-access
    desc: .NET reflection method inspection
    crit: notable
    conf: 0.78
    needs: 2
    any:
      - id: method-info-class
      - id: metadata/lang/compiler/managed::get-method-token
      - id: get-methods-token

  - id: delegate-invocation-chain
    desc: .NET reflected delegate invocation
    crit: notable
    conf: 0.88
    all:
      - id: create-delegate
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: reflection-method-access
    any:
      - id: begin-invoke-token
      - id: end-invoke-token
