defaults:
  platforms: [unix, windows]
  for: [powershell]
  crit: notable
  conf: 0.9

traits:
  - id: powershell-assembly-entrypoint-invoke
    desc: PowerShell invokes a .NET assembly entry point
    if:
      type: text
      regex: '(?i)\.EntryPoint\.Invoke\('

  - id: powershell-assembly-method-invoke
    desc: PowerShell invokes a reflected .NET method
    for: [powershell, javascript, html, vbs, text, data]
    if:
      type: text
      regex: '(?is)\.GetMethod\([^)]{1,120}\)[\s\S]{0,512}\.Invoke\('

  - id: powershell-appdomain-reflected-load-invoke
    desc: PowerShell invokes AppDomain assembly loading
    if:
      type: text
      regex: '(?is)AppDomain.{0,160}CurrentDomain.{0,240}GetMethod\([''\"]Load[''\"].{0,200}\.Invoke\('

  # JScript/HTA loaders often split method names inside the PowerShell string
  # they stage (for example, `GetMethod('Lo'+'ad', ...)`). Keep the split
  # fragments atomic so each matcher stays short and reusable.
  - id: powershell-appdomain-currentdomain
    desc: PowerShell accesses AppDomain CurrentDomain
    crit: notable
    conf: 0.95
    for: [powershell, javascript, html, vbs, text, data]
    if:
      type: text
      regex: '(?i)AppDomain.{0,80}CurrentDomain'

  - id: powershell-appdomain-token
    desc: PowerShell references AppDomain type
    crit: notable
    conf: 0.92
    for: [powershell, javascript, html, vbs, text, data]
    if:
      type: text
      word: AppDomain

  - id: powershell-split-currentdomain
    desc: Split-name CurrentDomain token
    crit: suspicious
    conf: 0.97
    for: [powershell, javascript, html, vbs, text, data]
    if:
      type: text
      regex: '[''\"]Cu[''\"]\s*\+\s*[''\"]rrentDomain[''\"]'

  - id: powershell-split-load-method
    desc: Split-name .NET Load method
    crit: suspicious
    conf: 0.97
    for: [powershell, javascript, html, vbs, text, data]
    if:
      type: text
      regex: 'GetMethod\(\s*[''\"]Lo[''\"]\s*\+\s*[''\"]ad[''\"]'

composite_rules:
  - id: powershell-appdomain-split-reflected-load
    desc: Split-name AppDomain reflective load
    crit: suspicious
    conf: 0.98
    for: [powershell, javascript, html, vbs, text, data]
    all:
      - id: powershell-appdomain-token
      - id: powershell-split-currentdomain
      - id: powershell-split-load-method
      - id: powershell-assembly-method-invoke
