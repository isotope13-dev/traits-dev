defaults:
  platforms: [unix, windows]
  for: [powershell]
  crit: notable
  conf: 0.9

traits:
  - id: powershell-assembly-entrypoint-invoke
    desc: PowerShell invokes a .NET assembly entry point
    if:
      type: text
      regex: '(?i)\.EntryPoint\.Invoke\('

  - id: powershell-assembly-method-invoke
    desc: PowerShell invokes a reflected .NET method
    if:
      type: text
      regex: '(?is)\.GetMethod\([^)]{1,120}\)[\s\S]{0,512}\.Invoke\('

  - id: powershell-appdomain-reflected-load-invoke
    desc: PowerShell invokes AppDomain assembly loading
    if:
      type: text
      regex: '(?is)AppDomain.{0,160}CurrentDomain.{0,240}GetMethod\([''\"]Load[''\"].{0,200}\.Invoke\('
