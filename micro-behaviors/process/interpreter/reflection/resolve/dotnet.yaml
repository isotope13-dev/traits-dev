defaults:
  platforms: [windows, unix]
  for: [pe, csharp]
  crit: notable

traits:
  - id: resolve-method
    desc: Resolves .NET method metadata token
    conf: 0.82
    if:
      type: text
      word: ResolveMethod

  - id: resolve-type
    desc: Resolves .NET type metadata token
    conf: 0.82
    if:
      type: text
      word: ResolveType

  - id: get-fields-call
    desc: .NET GetFields reflection method reference
    conf: 0.72
    if:
      type: text
      word: GetFields
    unless:
      - id: metadata/lang/compiler/managed::delphi

composite_rules:
  - id: resolver-token-pair
    desc: Multiple .NET reflection resolver APIs
    crit: notable
    conf: 0.72
    needs: 2
    any:
      - id: resolve-method
      - id: resolve-type
      - id: get-fields-call
      - id: micro-behaviors/process/interpreter/reflection/runtime::create-delegate

  - id: resolver-api-cluster
    desc: .NET reflection metadata resolver cluster
    crit: notable
    conf: 0.91
    all:
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: resolver-token-pair
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
        - id: metadata/signed/platform::microsoft-corporation
        - id: well-known/app/microsoft-csharp-compiler/
