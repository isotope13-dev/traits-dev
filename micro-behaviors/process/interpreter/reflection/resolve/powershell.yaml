defaults:
  platforms: [unix, windows]
  for: [powershell]
  crit: notable
  conf: 0.9

traits:
  - id: powershell-assembly-load
    desc: PowerShell loads a .NET assembly
    if:
      type: text
      regex: '(?i)\[System\.Reflection\.Assembly\]::Load\('
    not:
      - substr: 'SharpZipLib.dll'

  - id: powershell-assembly-load-partial
    desc: PowerShell loads a .NET assembly partially
    if:
      type: text
      regex: '(?i)\[System\.Reflection\.Assembly\]::LoadWithPartialName\('
