defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript]
traits:
  - id: perl-code-execute
    desc: Executes Perl code
    crit: notable
    conf: 0.75
    mbc: C0059
    attack: T1059.006
    if:
      type: text
      regex: '\bperl\s+(-[A-Za-z]+\s+){0,3}(-e\s+|.{1,80}\.(pl|pm)([\s"'']|$))'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/renderdoc/
  - id: perl-keyword
    desc: Perl interpreter command reference
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/lang/shebang::perl
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: metadata/package/files/bsd::pkgsrc-maintainer-script
      - id: well-known/lib/web-ui-vendors::google-code-prettify-library
      - type: import
        regex: "^rich\\.syntax$"
      - id: well-known/tool/development/fzf::fzf-binary
    if:
      type: text
      regex: '(?m)(^|[;&|"''])\s*(/usr/bin/)?perl\s+(-[A-Za-z]+\s+)?\S'
