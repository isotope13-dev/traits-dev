defaults:
  platforms: [unix, windows]
  for: [shell, scripts]
traits:
  - id: perl-keyword
    desc: perl interpreter keyword (beyond shebang)
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/lang/shebang::perl
      - id: metadata/package/files/bsd::pkgsrc-maintainer-script
      - type: import
        regex: "^rich\\.syntax$"
    if:
      type: text
      word: perl
