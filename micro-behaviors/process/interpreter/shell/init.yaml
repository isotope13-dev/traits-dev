defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript, typescript, c, cpp, elf, macho]
  crit: notable
  conf: 0.84

traits:
  - id: shell-init-path
    desc: Shell startup file path reference
    if:
      type: string_literal
      regex: '([~/]\.bash_profile|[~/]\.bashrc|[~/]\.profile)\b'
    unless:
      - id: micro-behaviors/ui/help::shell-profile-setup-instruction
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context

  - id: system-profile-path
    desc: System-wide shell profile path reference
    if:
      type: text
      regex: '/etc/profile\b'
    unless:
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context

  - id: system-profiled-path
    desc: System-wide shell profile.d path reference
    if:
      type: text
      regex: '/etc/profile\.d(/|\b)'

  - id: system-bashrc-path
    desc: System-wide Bash rc path reference
    if:
      type: text
      regex: '/etc/(bash\.)?bashrc\b'

  - id: system-zshrc-path
    desc: System-wide Zsh rc path reference
    if:
      type: text
      regex: '/etc/(zsh/)?zshrc\b'

  - id: system-fish-config-path
    desc: System-wide Fish config path reference
    if:
      type: text
      regex: '/etc/fish/config\.fish\b'
