defaults:
  platforms: [unix, windows, android]
  for: [java, class, jar, zip, apk]

traits:
  - id: java-bash-command-token
    desc: Java bash command token
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bbash\s+-c\b'

composite_rules:
  - id: java-bash-process-launch
    desc: Java launches bash
    crit: notable
    conf: 0.94
    scope: leaf
    near_bytes: 4096
    all:
      - id: java-bash-command-token
    any:
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode-symbol
