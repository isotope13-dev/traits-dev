defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  crit: notable
  conf: 0.7
traits:
  - id: require-vscode
    desc: require('vscode') statement
    if:
      type: text
      regex: require\(['"]vscode['"]\)
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: import-vscode
    desc: import from 'vscode' statement
    if:
      type: text
      regex: from\s+['"]vscode['"]
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: namespace
    desc: VS Code namespace reference
    crit: baseline
    if:
      type: string_literal
      regex: vscode\.\w+
  - id: activate-function
    desc: VS Code extension activate function
    if:
      type: string_literal
      regex: ^function\s+activate\b|activate\s*[:=]\s*function
  - id: global-state
    desc: VS Code globalState access
    crit: notable
    if:
      type: text
      substr: globalState
  - id: workspace-state
    desc: VS Code workspaceState access
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: workspaceState
composite_rules:
  - id: vscode-extension-marker
    desc: VS Code extension identification markers
    any:
      - id: require-vscode
      - id: import-vscode
      - id: namespace
      - id: activate-function
