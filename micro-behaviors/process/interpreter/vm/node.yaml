defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: vm-require
    desc: Node.js vm module import
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: require\(['"]vm['"]\)|from ['"]vm['"]
  - id: vm-createContext
    desc: VM createContext (sandbox creation)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bcreateContext\s*\(
  - id: vm-runInContext
    desc: VM runInContext (execute code in sandbox)
    crit: notable
    conf: 0.9
    mbc: B0024
    attack: T1059
    if:
      type: text
      regex: \brunInContext\s*\(
    unless:
      - id: metadata/package/testing/harness::node-common-require
      - id: metadata/package/testing/harness::test-basename-pattern
      - id: metadata/package/testing/harness::node-inspector-harness
      - id: metadata/lang/scripted::dts-declaration-file
  - id: vm-runInNewContext
    desc: VM runInNewContext (execute in isolated sandbox)
    crit: notable
    conf: 0.9
    mbc: B0024
    attack: T1059
    if:
      type: text
      regex: \brunInNewContext\s*\(
    unless:
      - type: text
        regex: \brunInNewContext\s*\(\s*['"]gc['"]\s*\)
  - id: vm-runInThisContext
    desc: VM runInThisContext (execute in current context)
    crit: notable
    conf: 0.85
    attack: T1059
    if:
      type: text
      regex: \brunInThisContext\s*\(
    downgrade:
      any:
        - id: metadata/package/testing/harness::node-common-require
        - id: metadata/package/testing/harness::test-basename-pattern
        - id: metadata/package/testing/harness::node-inspector-harness
        - id: metadata/lang/scripted::dts-declaration-file
  - id: vm-Script
    desc: VM Script compilation
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: new vm\.Script|vm\.Script\(
  - id: constructor-escape
    desc: VM sandbox escape via constructor
    crit: suspicious
    conf: 0.95
    mbc: B0024
    attack: T1059
    if:
      type: string_literal
      regex: constructor\s*\(\s*['"]return this['"]\s*\)|this\.constructor\.constructor
  - id: process-binding
    desc: Access to process.binding (internal Node)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \bprocess\.binding\s*\(
    unless:
      - id: micro-behaviors/process/interpreter/node::process-binding-evals
      - id: micro-behaviors/process/interpreter/node::process-binding-natives
      - id: metadata/package/testing/compiled::benchmark
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
  - id: function-constructor-access
    desc: Function.constructor access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: Function.constructor
  - id: function-direct-call
    desc: Direct Function constructor call
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (^|[=(,]\s*)Function\s*\(
    unless:
      - type: text
        substr: "@externs"
  - id: request-method-call
    desc: .request method call
    crit: notable
    conf: 0.4
    count_min: 2
    if:
      type: text
      substr: .request(
  - id: atob-call
    desc: atob base64 decode function
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \batob\s*\(
  - id: buffer-from-call
    desc: Buffer.from conversion
    crit: notable
    conf: 0.4
    count_min: 3
    if:
      type: string_literal
      substr: Buffer.from
  - id: base64-url
    desc: Base64 encoded URL (potential C2)
    crit: suspicious
    conf: 0.85
    mbc: C0026
    attack: T1027
    if:
      type: encoded
      encoding: base64
      regex: https?://
    not:
      - regex: microsoft\.com/pki
      - regex: digicert\.com
      - regex: verisign\.com
      - regex: globalsign\.com
    downgrade:
      any:
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/binary/metrics::large-embedded-b64-blob
  - id: yarn-release-bundle
    desc: Yarn bundled release artifact
    crit: component
    if:
      type: basename
      regex: ^yarn-[0-9][0-9.]*\.cjs$
composite_rules:
  - id: vm-runInNewContext-benign-harness
    desc: VM runInNewContext benign harness context
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/package/testing/harness::node-common-require
      - id: metadata/package/testing/harness::test-basename-pattern
      - id: metadata/package/testing/harness::test-basename-spec
      - id: metadata/package/testing/harness::node-inspector-harness
      - id: metadata/lang/scripted::dts-declaration-file
  - id: vm-run-methods
    desc: VM code execution methods
    crit: notable
    conf: 0.8
    any:
      - id: vm-runInContext
      - id: vm-runInNewContext
  - id: http-clients
    desc: HTTP client library usage
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/communications/http/request::script-http-client
      - id: request-method-call
  - id: vm-with-http
    desc: VM execution combined with HTTP
    crit: suspicious
    conf: 0.95
    mbc: B0024
    attack: T1105
    unless:
      - id: yarn-release-bundle
    all:
      - id: vm-run-methods
      - id: http-clients
    downgrade:
      any:
        - id: metadata/library/lodash::domain
        - id: metadata/library/lodash::run-in-context
        - id: metadata/library/react/
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: micro-behaviors/process/create/shell/host::require-vscode
        - id: metadata/package/fields::scoped-known-org
  - id: file-to-vm-execution
    desc: File read + VM execution (loader pattern)
    crit: suspicious
    conf: 0.92
    mbc: E1059
    attack: T1059.007
    all:
      - id: vm-require
      - id: vm-run-methods
      - id: metadata/import/builtin/node::require-fs
