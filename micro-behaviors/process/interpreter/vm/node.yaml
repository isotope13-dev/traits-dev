defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
traits:
- id: vm-require
  desc: Node.js vm module import
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: require\(['"](?:node:)?vm['"]\)|from ['"](?:node:)?vm['"]
- id: vm-createContext
  desc: VM createContext (sandbox creation)
  crit: notable
  conf: 0.8
  if:
    type: symbol
    exact: createContext
- id: vm-runInContext--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: runInContext
  count_max: 1004277
- id: vm-runInContext--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: require
  count_max: 1004278
- id: vm-runInContext--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '2000'
  count_max: 1004279
- id: vm-runInContext--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: from
  count_max: 1004280
- id: vm-runInContext--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: node
  count_max: 1004281
- id: vm-runInNewContext--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: runInNewContext
  count_max: 1004282
- id: vm-runInNewContext--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: require
  count_max: 1004283
- id: vm-runInNewContext--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '2000'
  count_max: 1004284
- id: vm-runInNewContext--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: from
  count_max: 1004285
- id: vm-runInNewContext--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: node
  count_max: 1004286
- id: vm-runInThisContext
  desc: VM runInThisContext (execute in current context)
  crit: notable
  conf: 0.85
  attack: T1059
  if:
    type: symbol
    exact: runInThisContext
  downgrade:
    any:
    - id: metadata/package/testing/harness::node-common-require
    - id: metadata/package/testing/harness::test-basename-pattern
    - id: metadata/package/testing/harness::node-inspector-harness
    - id: metadata/lang/scripted::dts-declaration-file
- id: vm-Script
  desc: VM Script compilation
  crit: notable
  conf: 0.8
  if:
    type: string_literal
    regex: new vm\.Script|vm\.Script\(
- id: constructor-escape
  desc: VM sandbox escape via constructor
  crit: suspicious
  conf: 0.95
  mbc: B0024
  attack: T1059
  if:
    type: string_literal
    regex: constructor\s*\(\s*['"]return this['"]\s*\)|this\.constructor\.constructor
- id: process-binding
  desc: Access to process.binding (internal Node)
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: \bprocess\.binding\s*\(
  unless:
  - type: text
    regex: process\.binding\(['"]uv['"]\)
  - id: micro-behaviors/process/interpreter/node::process-binding-evals
  - id: micro-behaviors/process/interpreter/node::process-binding-natives
  - id: metadata/package/testing/compiled::benchmark
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-fixtures
  - id: metadata/package/testing/presence::test-filename-pattern
- id: function-constructor-access
  desc: Function.constructor access
  crit: notable
  conf: 0.6
  if:
    type: string_literal
    substr: Function.constructor
- id: function-direct-call
  desc: Direct Function constructor call
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: (^|[=(,]\s*)Function\s*\(
  unless:
  - type: text
    substr: "@externs"
- id: request-method-call
  desc: .request method call
  crit: notable
  conf: 0.4
  count_min: 2
  if:
    type: text
    substr: .request(
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: atob-call
  desc: atob base64 decode function
  crit: notable
  conf: 0.5
  if:
    type: string_literal
    regex: \batob\s*\(
- id: buffer-from-call
  desc: Buffer.from conversion
  crit: notable
  conf: 0.4
  count_min: 3
  if:
    type: string_literal
    substr: Buffer.from
- id: base64-url
  desc: Base64 encoded URL (potential C2)
  crit: suspicious
  conf: 0.85
  mbc: C0026
  attack: T1027
  if:
    type: encoded
    encoding: base64
    regex: https?://
  not:
  - regex: microsoft\.com/pki
  - regex: digicert\.com
  - regex: verisign\.com
  - regex: globalsign\.com
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-filename-pattern
  - id: metadata/lang/scripted::dts-declaration-file
  - id: objectives/supply-chain/trojanized/application/context::definitely-typed-namespace-import
  downgrade:
    any:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    - id: metadata/binary/metrics::large-embedded-b64-blob
    - id: metadata/package/testing/presence::test-filename-pattern
- id: yarn-release-bundle
  desc: Yarn bundled release artifact
  crit: component
  if:
    type: basename
    regex: ^yarn-[0-9][0-9.]*\.cjs$
- id: parcel-test-utils-context
  desc: Parcel test utilities module
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: "export {fsFixture} from './fsFixture';"
- id: vm-runInNewContext-cond-0--inline-4298
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \brunInNewContext\s*\(\s*['"]gc['"]\s*\)
  count_max: 1004299
composite_rules:
- id: vm-runInNewContext-benign-harness
  desc: VM runInNewContext benign harness context
  crit: baseline
  conf: 0.9
  any:
  - id: metadata/package/testing/harness::node-common-require
  - id: metadata/package/testing/harness::test-basename-pattern
  - id: metadata/package/testing/harness::test-basename-spec
  - id: metadata/package/testing/harness::node-inspector-harness
  - id: metadata/lang/scripted::dts-declaration-file
- id: vm-run-methods
  desc: VM code execution methods
  crit: notable
  conf: 0.8
  any:
  - id: vm-runInContext
  - id: vm-runInNewContext
- id: http-clients
  desc: HTTP client execution markers
  crit: notable
  conf: 0.6
  any:
  - id: micro-behaviors/communications/http/request::script-http-client
  - id: request-method-call
- id: vm-with-http-benign-context
  desc: VM HTTP benign context
  crit: baseline
  conf: 0.9
  any:
  - id: yarn-release-bundle
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  - id: parcel-test-utils-context
- id: vm-with-http
  desc: VM execution combined with HTTP
  crit: notable
  conf: 0.95
  mbc: B0024
  attack: T1105
  unless:
  - id: vm-with-http-benign-context
  all:
  - id: vm-run-methods
  - id: http-clients
  downgrade:
    any:
    - id: metadata/package/tooling::webpack-bundled
    - id: metadata/library/lodash::domain
    - id: metadata/library/react/
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    - id: micro-behaviors/process/create/shell/host::require-vscode
    - id: metadata/package/fields::scoped-known-org
- id: file-to-vm-execution
  desc: File read + VM execution (loader pattern)
  crit: suspicious
  conf: 0.92
  mbc: E1059
  attack: T1059.007
  all:
  - id: vm-require
  - id: vm-run-methods
  - id: metadata/import/builtin/node::require-fs
- id: vm-runInContext
  desc: VM runInContext (execute code in sandbox)
  crit: notable
  conf: 0.9
  mbc: B0024
  attack: T1059
  any:
  - id: vm-runInContext--rx-1
  - id: vm-runInContext--rx-2
  - id: vm-runInContext--rx-3
  - id: vm-runInContext--rx-4
  - id: vm-runInContext--rx-5
  unless:
  - id: metadata/package/testing/harness::node-common-require
  - id: metadata/package/testing/harness::test-basename-pattern
  - id: metadata/package/testing/harness::node-inspector-harness
  - id: metadata/lang/scripted::dts-declaration-file
- id: vm-runInNewContext
  desc: VM runInNewContext (execute in isolated sandbox)
  crit: notable
  conf: 0.9
  mbc: B0024
  attack: T1059
  any:
  - id: vm-runInNewContext--rx-6
  - id: vm-runInNewContext--rx-7
  - id: vm-runInNewContext--rx-8
  - id: vm-runInNewContext--rx-9
  - id: vm-runInNewContext--rx-10
  unless:
  - id: vm-runInNewContext-cond-0--inline-4298
  - id: metadata/package/testing/harness::electron-node-spec-harness
