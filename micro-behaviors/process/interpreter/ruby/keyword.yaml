defaults:
  platforms: [unix, windows]
  for: [shell, scripts]

traits:
  - id: ruby-command-invocation
    desc: Ruby interpreter command invocation
    crit: notable
    conf: 0.82
    for: [shell, batch]
    if:
      type: text
      regex: '(^|[;&|]\s*)ruby([0-9.]+)?\s+'

  - id: ruby-binary-path
    desc: Ruby interpreter binary path
    crit: notable
    conf: 0.82
    for: [scripts, dockerfile, makefile]
    if:
      type: string_literal
      regex: '(^|[/\\])bin/ruby\b|ruby\.exe\b'

  - id: ruby-keyword
    desc: Ruby interpreter keyword
    crit: component
    conf: 0.7
    unless:
      - id: metadata/lang/shebang::ruby
      - type: import
        regex: "^rich\\.syntax$"
    if:
      type: text
      word: ruby
  - id: ruby-inline-library-flag
    desc: Ruby inline or library flag
    crit: notable
    conf: 0.75
    for: [shell, batch, ruby]
    if:
      type: text
      regex: ruby\s+-(e|r(socket|open-uri|fiddle))\b

  - id: ruby-cross-interpreter-exec
    desc: Another runtime invokes Ruby interpreter
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(spawn|execFile|execSync|Popen)\s*\(\s*["''].{0,60}ruby(\.exe)?["'']'
