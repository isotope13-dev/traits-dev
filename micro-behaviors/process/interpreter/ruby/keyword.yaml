defaults:
  platforms: [unix, windows]
  for: [shell, scripts]

traits:
  - id: ruby-command-invocation
    desc: Ruby interpreter command invocation
    crit: notable
    conf: 0.82
    for: [shell, batch]
    if:
      type: text
      regex: '(^|[;&|]\s*)ruby([0-9.]+)?\s+'

  - id: ruby-binary-path
    desc: Ruby interpreter binary path
    crit: notable
    conf: 0.82
    for: [scripts, dockerfile, makefile]
    if:
      type: string_literal
      regex: '(^|[/\\])bin/ruby\b|ruby\.exe\b'

  - id: ruby-keyword
    desc: Ruby interpreter keyword
    crit: component
    conf: 0.7
    unless:
      - id: metadata/lang/shebang::ruby
      - type: import
        regex: "^rich\\.syntax$"
    if:
      type: text
      word: ruby

composite_rules:
  - id: ruby-cross-interpreter-exec
    desc: Ruby interpreter launched by another runtime
    crit: notable
    conf: 0.84
    for: [python, javascript, typescript, elf, macho, pe]
    near_bytes: 400
    all:
      - id: ruby-keyword
    any:
      - id: micro-behaviors/process/create/shell/bridge/
      - id: micro-behaviors/process/create/system/
      - id: micro-behaviors/process/create/subprocess/
