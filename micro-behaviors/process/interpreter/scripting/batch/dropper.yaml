defaults:
  platforms: [unix, windows]
  for: [bat, cmd]
traits:
  - id: start-exe-exit-bat
    desc: Sequence to start executable and exit
    crit: suspicious
    conf: 0.9
    attack: T1059.003
    if:
      type: text
      regex: '(?i)start\s+[^ ]{1,100}\.exe ? exit'
  - id: delayed-expansion
    desc: Batch delayed variable expansion
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: setlocal enabledelayedexpansion
      case_insensitive: true
