defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: start-exe-exit-bat
    desc: Sequence to start executable and exit
    crit: suspicious
    conf: 0.9
    for: [bat, cmd]
    attack: T1059.003
    if:
      type: text
      regex: '(?i)start\s+[^ ]{1,100}\.exe ? exit'
