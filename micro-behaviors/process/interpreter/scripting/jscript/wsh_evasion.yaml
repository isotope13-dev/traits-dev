# WSH specific evasion techniques
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027 (Obfuscated Files or Information)

traits:
  - id: this-bracket-wsh-access
    desc: Dynamic access to WSH object using this[...]
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    mbc: "B0032"
    attack: "T1027"
    count_min: 6
    per_kb_min: 0.5
    if:
      type: raw
      regex: 'this(\s|/\*.*?\*/){0,5}\[(\s|/\*.*?\*/){0,5}[a-zA-Z_]\w*(\s|/\*.*?\*/){0,5}\]'
