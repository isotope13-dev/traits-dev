# JScript Conditional Compilation
# References: https://learn.microsoft.com/en-us/previous-versions/windows/internet-explorer/ie-developer/scripting-articles/121hztk3(v=vs.84)
defaults:
  platforms: [windows]
  for: [javascript]
traits:
  - id: jscript-cc-on
    desc: JScript conditional compilation activation
    crit: notable
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    if:
      type: text
      substr: '/*@cc_on'
  - id: jscript-cc-variable
    desc: JScript conditional compilation variable
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '@_win32|@_win64|@_jscript_version'
  - id: jscript-cc-if
    desc: JScript conditional compilation logic
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '@if\s*\(\s*@_jscript_version\s*[<>!=]=?\s*\d+\s*\)'
  - id: jscript-cc-eval
    desc: Eval within JScript conditional compilation
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?s)/\*@cc_on[\s\S]{0,500}eval\s*\(\s*\w+\s*\)[\s\S]{0,500}@\*/'
  - id: jscript-cc-tail-eval
    desc: Eval gated after JScript CC tail
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '@\*/\s*if\s*\(\s*\w+\s*==\s*\d+\s*\)\s*eval\(\w+\)'
