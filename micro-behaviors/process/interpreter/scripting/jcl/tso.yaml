defaults:
  platforms: [zos]
  for: [jcl]
  attack: T1059

traits:
  - id: jcl-ikjeft01-tso-exec
    desc: JCL invokes TSO batch program
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?m)^//[A-Z0-9#$@_]+\s+EXEC\s+PGM=IKJEFT01\b'

  - id: jcl-systsin-exec-member
    desc: JCL SYSTSIN executes member
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "(?s)//SYSTSIN\\s+DD\\s+\\*[\\s\\S]{0,180}\\bEXEC\\s+'[A-Z0-9.$#@_]+\\([A-Z0-9#$@_]+\\)'"

  - id: jcl-sysproc-library
    desc: JCL assigns SYSPROC library
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?m)^//[A-Z0-9#$@_]+\.SYSPROC\s+DD\s+DSN='

  - id: jcl-sysdata-dataset
    desc: JCL assigns SYSDATA dataset
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '(?m)^//[A-Z0-9#$@_]+\.SYSDATA\s+DD\s+DSN='
