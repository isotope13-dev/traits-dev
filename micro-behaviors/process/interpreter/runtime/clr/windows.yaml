defaults:
  platforms: [windows]
  for: [pe]
  crit: notable

traits:
  - id: clr-native-hosting-apis
    desc: Native PE references CLR hosting APIs
    conf: 0.93
    if:
      type: text
      regex: 'CLRCreateInstance|ICorRuntimeHost::Start'

  - id: clr-byte-array-assembly-load
    desc: CLR loads assembly byte array
    conf: 0.96
    if:
      type: text
      substr: '_AppDomain::Load(byte[])'

  - id: clr-entrypoint-invoke
    desc: CLR invokes managed entry point
    conf: 0.96
    if:
      type: text
      substr: '_MethodInfo::Invoke(entry point)'
