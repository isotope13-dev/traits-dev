defaults:
  platforms: [windows, unix]
  for: [java, class, java_class, jar]
  crit: notable
  conf: 0.9

traits:
  - id: java-scriptengine-api
    desc: Java ScriptEngine API reference
    if:
      type: text
      substr: javax/script/ScriptEngine

  - id: java-scriptengine-eval-api
    desc: Java ScriptEngine eval reference
    if:
      type: text
      substr: ScriptEngine.eval

  - id: java-scriptengine-eval-descriptor
    desc: Java ScriptEngine eval descriptor
    if:
      type: text
      substr: 'eval:(Ljava/'

  - id: java-scriptengine-getenginebyname
    desc: Java ScriptEngineManager lookup
    if:
      type: text
      substr: getEngineByName

  - id: java-compiler-task-source
    desc: Java compiler task source reference
    crit: notable
    conf: 0.9
    for: [java]
    if:
      type: text
      substr: JavaCompiler.CompilationTask

  - id: java-toolprovider-system-compiler
    desc: Java ToolProvider system compiler call
    crit: notable
    conf: 0.94
    for: [java]
    if:
      type: symbol
      kind: call
      exact: getSystemJavaCompiler

  - id: java-toolprovider-system-compiler-bytecode
    desc: Java bytecode system compiler reference
    crit: notable
    conf: 0.94
    for: [class, java_class]
    if:
      type: hex
      pattern: 67 65 74 53 79 73 74 65 6D 4A 61 76 61 43 6F 6D 70 69 6C 65 72

  - id: java-urlclassloader-api
    desc: Java URLClassLoader API reference
    crit: notable
    conf: 0.9
    for: [java]
    if:
      type: symbol
      substr: URLClassLoader

  - id: java-custom-classloader-load
    desc: Java custom ClassLoader load method
    crit: notable
    conf: 0.9
    for: [java]
    if:
      type: text
      regex: 'new ClassLoader[\s\S]{0,320}loadClass'
