defaults:
  platforms: [windows, unix]
  for: [java, class, java_class, jar]
  crit: notable
  conf: 0.9

traits:
  - id: java-scriptengine-api
    desc: Java ScriptEngine API reference
    if:
      type: text
      substr: javax/script/ScriptEngine

  - id: java-scriptengine-eval-api
    desc: Java ScriptEngine eval reference
    if:
      type: text
      substr: ScriptEngine.eval

  - id: java-scriptengine-eval-descriptor
    desc: Java ScriptEngine eval descriptor
    if:
      type: text
      substr: 'eval:(Ljava/'

  - id: java-scriptengine-getenginebyname
    desc: Java ScriptEngineManager lookup
    if:
      type: text
      substr: getEngineByName
