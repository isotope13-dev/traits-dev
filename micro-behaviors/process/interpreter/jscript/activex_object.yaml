defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  - id: activex-object
    desc: ActiveXObject string presence
    crit: notable
    if:
      type: text
      substr: "ActiveXObject"
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: metadata/library/runtime::core-js-htmlfile-fallback
      - id: metadata/library/browser-parser::turndown-htmlfile-fallback
