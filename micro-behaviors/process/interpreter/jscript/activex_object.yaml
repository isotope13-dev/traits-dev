defaults:
  platforms: [unix, windows]
  for: [javascript, vbs, html]
traits:
  - id: activex-object
    desc: ActiveXObject constructor reference
    crit: notable
    if:
      # Text fallback keeps the neutral constructor capability available in
      # oversized/minified JScript where bounded parsing yields no call facts.
      type: text
      regex: '(?i)\b(new\s+)?ActiveXObject\s*\('
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: metadata/library/runtime/
      - id: metadata/library/jquery/
      - id: metadata/library/browser-parser::turndown-htmlfile-fallback

  # XML-hosted JScript (notably XSLT/MSC content) is analyzed as XML rather
  # than as a standalone JavaScript file, so the symbol matcher above is not
  # available. Intent comes from the surrounding loader behavior.
  - id: activex-object-text
    desc: ActiveXObject constructor in embedded script
    crit: notable
    conf: 0.92
    for: [xml]
    if:
      type: text
      regex: '\bActiveXObject\s*\('

  - id: activex-object-decoder-progid
    desc: Computed COM constructor with encoded ProgID
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'new\s+\w+\[\w+\(["''][^"'']{2,40}["'']\)\]\('
    attack: T1027
