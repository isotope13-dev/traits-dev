defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: wscript-lister-assignment
    desc: Assignment to WScript.lister (Nemucod indicator)
    crit: suspicious
    # `WScript.lister = …` — assigning to a non-existent WScript property
    # (Nemucod stores state there). Distinctive as source text.
    if:
      type: text
      regex: 'WScript\s*\.\s*lister\s*='
  # `WScript.<prop> = …` where <prop> is a non-standard scratch name — WScript
  # has no such properties, so assigning to them is obfuscation state storage.
  # The property list is split into ≤4-alternative source-text atoms (alt-chain
  # limit) joined by the `wscript-invalid-property-assignment` composite below.
  - id: wscript-invalid-property-assign--g1
    desc: 'WScript scratch-property assignment'
    crit: component
    if:
      type: text
      regex: 'WScript\s*\.\s*(lister|test|check|data)\s*='
  - id: wscript-invalid-property-assign--g2
    desc: 'WScript scratch-property assignment'
    crit: component
    if:
      type: text
      regex: 'WScript\s*\.\s*(val|str|len|off)\s*='
  - id: wscript-invalid-property-assign--g3
    desc: 'WScript scratch-property assignment'
    crit: component
    if:
      type: text
      regex: 'WScript\s*\.\s*(pos|idx|cnt|key)\s*='
  - id: wscript-invalid-property-assign--g4
    desc: WScript scratch-property assignment (temp/tmp)
    crit: component
    if:
      type: text
      regex: 'WScript\s*\.\s*(temp|tmp)\s*='
composite_rules:
  - id: wscript-invalid-property-assignment
    desc: Assignment to non-standard WScript property (anti-analysis/obfuscation)
    crit: suspicious
    any:
      - id: wscript-invalid-property-assign--g1
      - id: wscript-invalid-property-assign--g2
      - id: wscript-invalid-property-assign--g3
      - id: wscript-invalid-property-assign--g4
