# JScript / WSH Traits
defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  for: [javascript, typescript]
traits:
  - id: is-jscript
    desc: JScript file type (WScript host)
    crit: component
    for: [javascript]
    if:
      type: text
      substr: "WScript"
  - id: adodb-fragment-dodb
    desc: ADODB.Stream string fragment (DODB)
    if:
      type: string_literal
      substr: 'DODB'
    not:
      - substr: ADODB.Stream
    unless:
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
      - id: well-known/app/google-web::official-google-web-asset
  - id: createobject-call
    desc: JScript CreateObject call
    crit: notable
    conf: 0.85
    # Requires the WScript prefix or a quoted COM ProgID argument
    # ("WScript.Shell", "Scripting.FileSystemObject", "ADODB.Stream", ...).
    # A bare `CreateObject(` was matching plain-JavaScript methods that merely
    # share the name — Construct 3's game runtime exposes
    # `CreateObject(a,b,d,c,e,h)` to spawn sprite instances, and factory/ORM
    # helpers use it too. Those are not COM instantiation.
    if:
      type: text
      regex: '\b(WScript\.CreateObject\s*\(|CreateObject\s*\(\s*["''][A-Za-z]\w*\.)'
  - id: batch-launcher-content
    desc: Batch file content with start and exit
    crit: suspicious
    if:
      type: text
      # Matches "start payload.exe" followed by "\r\nexit" in a string
      regex: 'start\s+.{0,100}\\r\\n\s*exit'
