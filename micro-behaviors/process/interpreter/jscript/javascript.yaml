# JScript / WSH Traits
defaults:
  crit: notable
  conf: 0.8
  for: [javascript, typescript]
traits:
  - id: is-jscript
    desc: JScript file type (WScript host)
    crit: notable
    for: [javascript]
    if:
      type: raw
      substr: "WScript"
  - id: adodb-fragment-dodb
    desc: ADODB.Stream string fragment (DODB)
    if:
      type: raw
      substr: 'DODB'
    unless:
      - id: micro-behaviors/fs/write/file::adodb-stream
  - id: wscript-shell-fragment-dotshel
    desc: WScript.Shell string fragment (.Shel)
    if:
      type: raw
      substr: '.Shel'
    unless:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: createobject-fragment-ateobject
    desc: CreateObject string fragment (ateObject)
    if:
      type: raw
      regex: '(^|[^A-Za-z])ateObject([^A-Za-z]|$)'
  - id: batch-launcher-content
    desc: Batch file content with start and exit
    crit: suspicious
    if:
      type: raw
      # Matches "start payload.exe" followed by "\r\nexit" in a string
      regex: 'start\s+.{0,100}\\r\\n\s*exit'
