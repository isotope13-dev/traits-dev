# JScript / WSH Traits
defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  for: [javascript, typescript]
traits:
  - id: is-jscript
    desc: JScript file type (WScript host)
    crit: component
    for: [javascript]
    if:
      type: text
      substr: "WScript"
  - id: adodb-fragment-dodb
    desc: ADODB.Stream string fragment (DODB)
    if:
      type: string_literal
      substr: 'DODB'
    not:
      - substr: ADODB.Stream
    unless:
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
      - id: well-known/app/google-web::official-google-web-asset
  - id: createobject-fragment-ateobject
    desc: CreateObject string fragment (ateObject)
    if:
      type: text
      regex: '(^|[^A-Za-z])ateObject([^A-Za-z]|$)'
  - id: batch-launcher-content
    desc: Batch file content with start and exit
    crit: suspicious
    if:
      type: text
      # Matches "start payload.exe" followed by "\r\nexit" in a string
      regex: 'start\s+.{0,100}\\r\\n\s*exit'
