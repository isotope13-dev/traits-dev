defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  attack: T1059

traits:
  - id: python-wasm-runtime-import
    desc: Python imports a WebAssembly runtime
    conf: 0.88
    if:
      type: import
      exact: wasmtime
  - id: python-wasm-registration-call
    desc: Python registers a WebAssembly module
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)register_wasm(_module|_wat)?$'
  - id: python-wasm-task-call
    desc: Python submits a WebAssembly task for execution
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((submit_)?wasm_task)$'

composite_rules:
  - id: python-wasm-use
    desc: Python uses a WebAssembly execution interface
    crit: notable
    conf: 0.92
    any:
      - id: python-wasm-runtime-import
      - id: python-wasm-registration-call
      - id: python-wasm-task-call
