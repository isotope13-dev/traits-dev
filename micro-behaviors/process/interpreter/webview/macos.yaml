defaults:
  platforms: [macos]
  for: [macho, dylib, javascript, html]
  crit: notable
  conf: 0.86

traits:
  - id: flutter-wkwebview-plugin
    desc: Flutter WKWebView plugin reference
    conf: 0.88
    if:
      type: text
      substr: "webview_flutter_wkwebview"
  - id: flutter-webview-method-channel
    desc: Flutter WebView method channel
    conf: 0.86
    if:
      type: text
      substr: "plugins.flutter.io/webview"
  - id: flutterinvoke-channel-name
    desc: FlutterInvoke JavaScript channel name
    conf: 0.9
    if:
      type: text
      exact: "flutterInvoke"
  - id: javascript-channel-name-message
    desc: WebView JavaScript channel name message
    conf: 0.86
    if:
      type: text
      substr: "A JavaScriptChannel with name `"
  - id: flutterinvoke-postmessage
    desc: FlutterInvoke postMessage bridge call
    conf: 0.93
    if:
      type: text
      substr: "flutterInvoke.postMessage(JSON.stringify"
  - id: webview-postmessage-json
    desc: WebView postMessage JSON bridge call
    conf: 0.88
    if:
      type: text
      regex: '[A-Za-z_$][A-Za-z0-9_$]*\.postMessage\(JSON\.stringify'
  - id: webview-invoke-callback-map
    desc: WebView invoke callback map
    conf: 0.9
    if:
      type: text
      substr: "window._invokeCallbacks"
  - id: webview-invoke-response-error
    desc: WebView invoke response error handler
    conf: 0.9
    if:
      type: text
      substr: "Error processing invoke response"

composite_rules:
  - id: flutter-webview-native-invoke-bridge
    desc: Flutter WebView JavaScript-native bridge
    crit: suspicious
    conf: 0.94
    all:
      - id: flutterinvoke-channel-name
    any:
      - id: flutterinvoke-postmessage
      - id: webview-invoke-callback-map
      - id: webview-invoke-response-error
  - id: flutter-webview-js-channel-bridge
    desc: Flutter WebView JavaScript channel bridge
    crit: suspicious
    conf: 0.92
    all:
      - id: flutter-wkwebview-plugin
      - id: javascript-channel-name-message
    any:
      - id: webview-postmessage-json
      - id: webview-invoke-callback-map
      - id: webview-invoke-response-error
