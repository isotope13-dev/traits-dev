# Android WebView JavaScript Bridge
# Detects WebView APIs that bridge JavaScript and Java, enabling JS to invoke native code
# Specificity comes from DEX-format Dalvik class name strings (Ldalvik/..., addJavascriptInterface)
# ATT&CK: T1411 (User Interface Spoofing)
defaults:
  platforms: [android]
  for: [apk, binaries]
  crit: notable
  conf: 0.85
  attack: "T1411"

traits:
  - id: add-javascript-interface
    desc: WebView addJavascriptInterface Java-JS bridge
    conf: 0.9
    mbc: "C0048"
    if:
      type: text
      exact: "addJavascriptInterface"

  - id: should-override-url-loading
    desc: WebViewClient shouldOverrideUrlLoading URL intercept
    conf: 0.75
    if:
      type: text
      exact: "shouldOverrideUrlLoading"

  - id: webview-class-reference
    desc: Android WebView class reference
    conf: 0.86
    if:
      type: raw
      substr: "Landroid/webkit/WebView;"

  - id: webview-load-url
    desc: Android WebView URL loading
    conf: 0.86
    if:
      type: raw
      substr: "loadUrl"

  - id: webview-enable-javascript
    desc: Android WebView JavaScript enabled
    conf: 0.9
    if:
      type: raw
      substr: "setJavaScriptEnabled"

  - id: webview-enable-dom-storage
    desc: Android WebView DOM storage enabled
    conf: 0.88
    if:
      type: raw
      substr: "setDomStorageEnabled"

  - id: javascript-uri-webview
    desc: WebView javascript URI scheme
    conf: 0.9
    if:
      type: text
      exact: "javascript:"

  - id: load-url-unsafe
    desc: WebView loadUrlUnsafe unchecked URL load
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "loadUrlUnsafe"

composite_rules:
  - id: webview-js-bridge
    desc: Android WebView JavaScript-to-native bridge
    crit: suspicious
    conf: 0.88
    mbc: "C0048"
    any:
      - id: add-javascript-interface
      - id: load-url-unsafe

  - id: webview-remote-content-shell
    desc: Android WebView remote content shell
    crit: suspicious
    conf: 0.92
    all:
      - id: webview-class-reference
      - id: webview-load-url
    any:
      - id: webview-enable-javascript
      - id: webview-enable-dom-storage
      - id: should-override-url-loading
    needs: 2
