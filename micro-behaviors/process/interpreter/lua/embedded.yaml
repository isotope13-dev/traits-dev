defaults:
  platforms: [windows, unix]
  for: [binaries, c, cpp]
traits:
- id: lua-bytecode-magic
  desc: Embedded Lua bytecode magic
  crit: notable
  conf: 0.96
  for: [pe, dll]
  if:
    type: hex
    section: .rdata
    pattern: "1B 4C 75 61"
- id: lua-c-api-cluster--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    regex: \b(lua_(open|close)|luaL_(newstate|openlibs))\b
  count_max: 1004536
