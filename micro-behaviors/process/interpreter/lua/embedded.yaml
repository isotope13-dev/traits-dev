defaults:
  platforms: [windows, unix]
  for: [binaries, c, cpp]
traits:
  - id: lua-bytecode-magic
    desc: Embedded Lua bytecode magic
    crit: notable
    conf: 0.96
    for: [pe, dll]
    if:
      type: hex
      section: .rdata
      pattern: "1B 4C 75 61"
  - id: lua-c-api-cluster
    desc: Embedded Lua C API cluster
    crit: notable
    conf: 0.94
    count_min: 3
    if:
      type: text
      regex: \b(lua_(open|close|pcall|call|load|loadbuffer|tolstring|pushstring|pushcclosure|settable|gettable|setglobal|getglobal)|luaL_(newstate|openlibs|loadbuffer|loadstring))\b
  - id: lua-env-vars
    desc: Lua environment variables
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \bLUA_(PATH|CPATH|INIT)\b
composite_rules:
  - id: embedded-lua-vm
    desc: Embedded Lua virtual machine
    crit: notable
    conf: 0.96
    all:
      - id: lua-c-api-cluster
    any:
      - id: lua-bytecode-magic
      - id: lua-env-vars
