defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006
  mbc: E1059

traits:
  - id: python-vm-file-io-opcode
    desc: Python VM dispatches file I/O opcode
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '_IO_OPS\s*=\s*frozenset\(\s*\{[^}\n]{0,160}["'']red["'']'

  - id: python-vm-network-io-opcode
    desc: Python VM dispatches network I/O opcode
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '_IO_OPS\s*=\s*frozenset\(\s*\{[^}\n]{0,160}["'']get["'']'

  - id: python-vm-exec-io-opcode
    desc: Python VM dispatches process execution opcode
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '_IO_OPS\s*=\s*frozenset\(\s*\{[^}\n]{0,160}["'']exe["'']'

  - id: caller-code-ast-exec
    desc: Python parses caller code in exec mode
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: 'ast\.parse\(\s*code\b[\s\S]{0,120}mode\s*=\s*["'']exec["'']\s*\)'

  - id: module-source-compile-exec
    desc: Python compiles module source in exec mode
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: 'compile\(\s*source\s*,\s*module\.__file__\s*,\s*["'']exec["'']\s*\)'

composite_rules:
  - id: caller-code-execution-handler
    desc: Python handler executes caller code
    crit: notable
    conf: 0.98
    all:
      - id: caller-code-ast-exec
      - id: micro-behaviors/process/interpreter/python::exec-builtin

  - id: module-source-execution-handler
    desc: Python handler executes module source
    crit: notable
    conf: 0.98
    all:
      - id: module-source-compile-exec
      - id: micro-behaviors/os/api-resolution/dynamic::python-types-moduletype-create
      - id: micro-behaviors/process/interpreter/python::exec-builtin
