defaults:
  for: [c, cpp]
  platforms: [linux, macos, windows, unix]
  conf: 0.9
  crit: notable
  attack: T1059.006

traits:
  - id: python-h-include
    desc: Python.h C API header in native source
    if:
      type: raw
      regex: '#\s*include\s*[<"]Python\.h[>"]'

  - id: pytype-object-def
    desc: PyTypeObject Python type definition in native source
    if:
      type: raw
      substr: PyTypeObject

  - id: pyarg-parsetuple
    desc: PyArg_ParseTuple C API argument parsing
    if:
      type: raw
      substr: PyArg_ParseTuple

  - id: pycallable-check
    desc: PyCallable_Check C API callable validation
    if:
      type: raw
      substr: PyCallable_Check

  - id: pyvarobject-head-init
    desc: PyVarObject_HEAD_INIT extension object macro
    if:
      type: raw
      substr: PyVarObject_HEAD_INIT

composite_rules:
  - id: python-capi-extension-module
    desc: Python C extension module in native source
    crit: notable
    conf: 0.92
    all:
      - id: python-h-include
      - id: pytype-object-def
    any:
      - id: pyarg-parsetuple
      - id: pyvarobject-head-init
