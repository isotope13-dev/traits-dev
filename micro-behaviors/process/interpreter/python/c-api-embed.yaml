defaults:
  for: [c, cpp]
  platforms: [windows, unix]
  conf: 0.9
  crit: notable
  attack: T1059.006

traits:
  - id: python-h-include
    desc: Python.h C API header in native source
    if:
      type: text
      regex: '#\s*include\s*[<"]Python\.h[>"]'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pytype-object-def
    desc: 'pytype object def'
    if:
      type: text
      substr: PyTypeObject
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pyarg-parsetuple
    desc: PyArg_ParseTuple C API argument parsing
    if:
      type: text
      substr: PyArg_ParseTuple
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pycallable-check
    desc: PyCallable_Check C API reference
    if:
      type: text
      substr: PyCallable_Check
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pyvarobject-head-init
    desc: PyVarObject_HEAD_INIT extension object macro
    if:
      type: text
      substr: PyVarObject_HEAD_INIT
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: python-capi-extension-module
    desc: Python C extension module in native source
    crit: notable
    conf: 0.92
    all:
      - id: python-h-include
      - id: pytype-object-def
    any:
      - id: pyarg-parsetuple
      - id: pyvarobject-head-init
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
