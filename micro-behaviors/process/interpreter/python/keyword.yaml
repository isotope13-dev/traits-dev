defaults:
  platforms: [unix, windows]
  for: [shell, batch, powershell, ruby, perl, lua]
traits:
  - id: python-inline-command
    desc: Python interpreter runs inline command
    # Neutral capability: `python -c '<code>'` or `python <<HEREDOC`. Common
    # in CI, build, and provisioning scripts. Reverse-shell / multi-layer
    # obfuscation composites reference it cross-directory as one leg.
    crit: notable
    conf: 0.9
    attack: T1059.006
    for: [shell, batch, powershell, ruby, perl, lua, github-actions]
    if:
      type: text
      regex: '\bpython3?\s+(-c|<<)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-keyword
    desc: Invokes Python interpreter
    crit: notable
    conf: 0.7
    for: [shell, batch, powershell, ruby, perl]
    unless:
      - id: metadata/lang/shebang/
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/build/conda/
      - type: text
        substr: "empty('python')"
      - type: text
        substr: "e.g. 'javascript', 'python'"
      - type: text
        regex: '(?im)^pkgdesc=.*\bpython\b'
    if:
      type: symbol
      regex: '(?i)^python(\d(\.\d+)?)?(\.exe)?$'
  - id: pythonw-launch
    desc: pythonw executable reference
    crit: notable
    conf: 0.84
    for: [shell, batch, powershell, ruby, perl, lua, python]
    if:
      type: text
      regex: '(?i)\bpythonw(\.exe)?\b'
    unless:
      - id: metadata/library/versioneer/
      - type: text
        substr: "pythonw/detached console"
