defaults:
  platforms: [unix, windows]
  for: [shell, batch, powershell, ruby, perl, lua]
traits:
  - id: python-inline-command
    desc: Python interpreter runs inline command
    # Neutral capability: `python -c '<code>'` or `python <<HEREDOC`. Common
    # in CI, build, and provisioning scripts. Reverse-shell / multi-layer
    # obfuscation composites reference it cross-directory as one leg.
    crit: component
    conf: 0.9
    attack: T1059.006
    for: [shell, text, github-actions]
    if:
      type: text
      regex: '\bpython3?\s+(-c|<<)'
  - id: python-keyword
    desc: python interpreter keyword (beyond shebang)
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/lang/shebang::python
      - id: metadata/lang/shebang::python2
      - id: metadata/lang/shebang::python3
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/build/conda::conda-recipe-build-script
      - type: text
        substr: "empty('python')"
      - type: text
        substr: "e.g. 'javascript', 'python'"
    if:
      type: text
      regex: '(?i)(^|["''`\s=/\\(])python(\d(\.\d+)?)?(\.exe)?(["''`\s):,]|$)'
