defaults:
  platforms: [unix, windows]
  for: [shell, scripts]
traits:
  - id: python-keyword
    desc: python interpreter keyword (beyond shebang)
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/lang/shebang::python
      - id: metadata/lang/shebang::python2
      - id: metadata/lang/shebang::python3
    if:
      type: text
      word: python
