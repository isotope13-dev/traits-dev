# traits/micro-behaviors/execution/interpreter/python/dynamic.yaml
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"
  mbc: "E1059"
traits:
  - id: eval-builtin
    desc: "Python eval() built-in function"
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: eval
  - id: exec-builtin
    desc: "Python exec() built-in function"
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: exec
  - id: dunder-import-call
    desc: Python __import__ call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "__import__"
  - id: compile-builtin
    desc: "Python compile() built-in function"
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: compile
