# traits/micro-behaviors/execution/interpreter/python/dynamic.yaml
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"
  mbc: "E1059"
traits:
  - id: exec-after-file-read
    desc: Python exec after file read
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'read\(\)[\s\S]{0,500}exec\(\s*\w+,\s*\w+,\s*\w+\)'

  - id: eval-builtin
    desc: "Python eval() built-in function"
    crit: notable
    conf: 0.85
    if:
      type: tree-sitter
      kind: call
      regex: '\beval\s*\('
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/tool/detection/security-scanner::code-pattern-catalog

  - id: exec-command-argument
    desc: Python exec() called with command variable
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec
      arg:
        kind: identifier
        name: command

  # A mapping lookup passed directly to eval is an unsafe-evaluation
  # capability, but this atom alone does not establish a remote source.
  - id: eval-mapping-get
    desc: Python eval of mapping get result
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "\\beval\\s*\\(\\s*[a-z_][A-Za-z0-9_]*\\s*\\.get\\s*\\([^)]{0,180},.{0,120}\\)\\s*\\)"
  - id: eval-constructed-expression
    desc: Python eval of a constructed expression string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\beval\\s*\\([^()\\n]{0,180}\\+[^()\\n]{0,180}\\)'
  - id: eval-prefixed-configuration-expression
    desc: Evaluates prefixed Python expression
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'startswith\\(\\s*["'']eval%["'']\\s*\\)[\\s\\S]{0,240}\\beval\\s*\\('
  - id: exec-builtin
    desc: Executes dynamic Python code with exec()
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
      - id: well-known/tool/detection/security-scanner::code-pattern-catalog
  - id: exec-variable
    desc: Python exec() executes a variable value
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\bexec\s*\(\s*[A-Za-z_]\w*\s*\)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: exec-variable-namespace
    desc: Python exec() on variable in namespace
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bexec\s*\(\s*[A-Za-z_]\w*\s*,\s*[A-Za-z_]\w*(\s*,\s*[A-Za-z_]\w*)?\s*\)'
  - id: dunder-import-call
    desc: Python __import__ call
    crit: notable
    conf: 0.85
    if:
      type: tree-sitter
      kind: call
      regex: '\b__import__\s*\('
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - type: text
        regex: '__import__\(\s*[''"]pkgutil[''"]\s*\)\.extend_path'
      - type: text
        regex: '__import__\(\s*[''"]pkg_resources[''"]\s*\)\.declare_namespace'
      - id: well-known/tool/detection/security-scanner::code-pattern-catalog
  - id: compile-builtin
    desc: "Python compile() built-in function"
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: compile
  - id: compile-exec-mode
    desc: Python compile() exec mode
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: compile
      arg:
        kind: string
        exact: exec
  - id: compile-synthetic-filename
    desc: Python compile synthetic filename
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: '(^|[^.a-zA-Z0-9_])compile\(.{0,80}''<[A-Za-z0-9_]{4,}'
  - id: ipython-interactive-shell-import
    desc: Imports IPython interactive shell
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: IPython.core.interactiveshell
  - id: ast-parse-caller-code-exec
    desc: Parses caller code in exec mode
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'ast.parse(code or "", mode="exec")'
  - id: runpy-run-path
    desc: Python runpy.run_path execution
    crit: notable
    conf: 0.93
    if:
      type: symbol
      kind: call
      exact: runpy.run_path
  - id: runpy-run-module
    desc: Python runpy.run_module execution
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: runpy.run_module

composite_rules:
  - id: ipython-display-code-runner
    desc: IPython display code runner
    crit: notable
    conf: 0.95
    all:
      - id: ipython-interactive-shell-import
      - id: ast-parse-caller-code-exec
