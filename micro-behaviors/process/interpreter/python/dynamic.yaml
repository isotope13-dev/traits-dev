# traits/micro-behaviors/execution/interpreter/python/dynamic.yaml
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"
  mbc: "E1059"
traits:
  - id: eval-builtin
    desc: "Python eval() built-in function"
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: eval
  # A mapping lookup passed directly to eval is an unsafe-evaluation
  # capability, but this atom alone does not establish a remote source.
  - id: eval-mapping-get
    desc: Python eval of mapping get result
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "\\beval\\s*\\(\\s*[a-z_][A-Za-z0-9_]*\\s*\\.get\\s*\\([^)]{0,180},.{0,120}\\)\\s*\\)"
  - id: exec-builtin
    desc: "Python exec() built-in function"
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: exec
    unless:
      - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
  - id: dunder-import-call
    desc: Python __import__ call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "__import__"
    unless:
      - type: text
        regex: '__import__\(\s*[''"]pkgutil[''"]\s*\)\.extend_path'
      - type: text
        regex: '__import__\(\s*[''"]pkg_resources[''"]\s*\)\.declare_namespace'
  - id: compile-builtin
    desc: "Python compile() built-in function"
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: compile
  - id: compile-exec-mode
    desc: Python compile() exec mode
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: compile
      arg:
        kind: string
        exact: exec
  - id: compile-synthetic-filename
    desc: Python compile synthetic filename
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: '(^|[^.a-zA-Z0-9_])compile\(.{0,80}''<[A-Za-z0-9_]{4,}'
  - id: ipython-interactive-shell-import
    desc: Imports IPython interactive shell
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: IPython.core.interactiveshell
  - id: ast-parse-caller-code-exec
    desc: Parses caller code in exec mode
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'ast.parse(code or "", mode="exec")'
  - id: runpy-run-path
    desc: Python runpy.run_path execution
    crit: notable
    conf: 0.93
    if:
      type: symbol
      kind: call
      exact: runpy.run_path
  - id: runpy-run-module
    desc: Python runpy.run_module execution
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: runpy.run_module

composite_rules:
  - id: ipython-display-code-runner
    desc: IPython display code runner
    crit: notable
    conf: 0.95
    all:
      - id: ipython-interactive-shell-import
      - id: ast-parse-caller-code-exec
