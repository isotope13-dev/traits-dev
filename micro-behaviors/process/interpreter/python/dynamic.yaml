# traits/micro-behaviors/execution/interpreter/python/dynamic.yaml
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"
  mbc: "E1059"
traits:
  - id: eval-builtin
    desc: "Python eval() built-in function"
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: "eval("
  - id: exec-builtin
    desc: "Python exec() built-in function"
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: exec
    unless:
      - type: basename
        regex: '\.(R|Rd)$'
  - id: dunder-import-call
    desc: Python __import__ call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "__import__"
    unless:
      - type: text
        regex: '__import__\(\s*[''"]pkgutil[''"]\s*\)\.extend_path'
      - type: text
        regex: '__import__\(\s*[''"]pkg_resources[''"]\s*\)\.declare_namespace'
  - id: compile-builtin
    desc: "Python compile() built-in function"
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: compile
  - id: compile-exec-mode
    desc: Python compile() exec mode
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: compile\s*\([^)]{1,120},\s*['"][^'"]{1,120}['"]\s*,\s*['"]exec['"]\s*\)
