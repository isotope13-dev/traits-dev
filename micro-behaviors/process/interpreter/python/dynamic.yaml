# traits/micro-behaviors/execution/interpreter/python/dynamic.yaml
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: exec-builtin
    desc: "Python exec() built-in function"
    crit: notable
    conf: 0.9
    attack: "T1059.006"
    mbc: "E1059"
    if:
      type: ast
      query: |
        (call function: (identifier) @name (#eq? @name "exec"))
