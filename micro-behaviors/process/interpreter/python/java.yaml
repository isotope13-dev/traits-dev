defaults:
  platforms: [unix, windows, android]
  for: [java, class, jar, zip, apk]

traits:
  - id: java-python3-interpreter-token
    desc: Java Python 3 command token
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bpython3(\.[0-9]+)?\b'

composite_rules:
  - id: java-python3-process-launch
    desc: Java launches Python 3
    crit: notable
    conf: 0.94
    scope: leaf
    near_bytes: 4096
    all:
      - id: java-python3-interpreter-token
    any:
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode-symbol
