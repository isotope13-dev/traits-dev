# Script-interpreter execution capability expressed in an npm package.json
# script (perl / python / ruby / node). scripts[*] matches any script value.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: B0030
  attack: T1059
traits:
  - id: npm-script-interpreter
    desc: Package script invokes a language interpreter
    if:
      type: value
      path: 'scripts[*]'
      regex: '\b(perl|python3?|ruby|node)\s'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
