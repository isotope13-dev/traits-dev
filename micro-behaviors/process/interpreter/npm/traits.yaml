# Script-interpreter execution capability expressed in an npm package.json
# script (perl / python / ruby / node). scripts[*] matches any script value.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: B0030
  attack: T1059
traits:
  - id: npm-script-interpreter
    desc: npm script runs a script interpreter
    if:
      type: value
      path: 'scripts[*]'
      regex: '\b(perl|python3?|ruby|node)\s'
