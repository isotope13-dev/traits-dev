defaults:
  platforms: [windows]
  for: [batch, powershell, pe, dll]
  attack: T1059.003
  mbc: E1059
traits:
  - id: start-command
    desc: Windows 'start' command for background
    crit: notable
    conf: 0.85
    for: [batch, powershell]
    if:
      type: string_literal
      regex: \bstart\s+['"]?\{?\$?\w*executable
  - id: start-hidden
    desc: Windows 'start /b' hidden background
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: \bstart\s+/[bB]\s
    unless:
      - type: text
        substr: del "%%~f0"&exit /b
  - id: start-minimized
    desc: Windows 'start /min' minimized process
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: \bstart\s+/min\s
  - id: batch-start-minimized
    desc: Batch starts minimized process
    crit: notable
    conf: 0.82
    for: [batch]
    if:
      type: text
      regex: (?i)\bstart\s+/min\s+.{1,80}\.exe\b
  - id: powershell-hidden
    desc: PowerShell hidden window execution
    crit: notable
    conf: 0.9
    for: [batch, powershell, python, javascript, vbs]
    if:
      type: text
      regex: (?im)^\s*-WindowStyle\s+Hidden\b
    not:
      - regex: '(?i)\bDo\s+NOT\s+use\s+-WindowStyle\s+Hidden\b'
  - id: powershell-hidden-tokenized
    desc: Tokenized PowerShell windowstyle marker
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: (?i)WINl8y7.{0,24}wS.{0,24}ncibn4e81u2I
  - id: set-thread-execution-state
    desc: Prevents system sleep
    crit: notable
    conf: 0.9
    for: [powershell, csharp, pe, dll]
    if:
      type: text
      word: SetThreadExecutionState
  - id: cmd-start
    desc: cmd.exe /c with background start
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: cmd(\.exe)?\s*/[cC]\s+start
  - id: cmd-powershell-chain-tokenized
    desc: cmd.exe launching PowerShell chain
    crit: suspicious
    conf: 0.86
    for: [batch, powershell, javascript, vbs, pe]
    if:
      # `/c[\s"]` requires the cmd /c flag to be followed by a separator so it
      # matches `cmd /c "powershell …"` but not the VS Code keybinding hint
      # "Cmd/Ctrl + Shift + P" (where `/c` is part of "Ctrl").
      type: text
      regex: (?im)\bcmd(\.exe)?\s*/c\s[^\r\n]{0,240}\bp\^?o\^?w\^?e\^?r\^?s\^?h\^?e\^?l\^?l(\.exe)?\b
    unless:
      - type: text
        substr: "quotes within quotes"
composite_rules:
  - id: hidden-pip-install
    desc: Background pip install via Windows
    crit: suspicious
    conf: 0.95
    all:
      - id: start-hidden
      - id: micro-behaviors/os/package-manager/install::pip-install
