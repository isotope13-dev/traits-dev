defaults:
  platforms: [windows]
  for: [batch, powershell, pe, dll]
  attack: T1059.003
  mbc: E1059
traits:
  - id: start-command
    desc: Windows 'start' command for background
    crit: notable
    conf: 0.85
    for: [batch, powershell]
    if:
      type: string_literal
      regex: \bstart\s+['"]?\{?\$?\w*executable
  - id: start-hidden
    desc: Windows 'start /b' hidden background
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: \bstart\s+/[bB]\s
    unless:
      - type: text
        substr: del "%%~f0"&exit /b
  - id: start-minimized
    desc: Windows 'start /min' minimized process
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: \bstart\s+/min\s
  - id: batch-start-minimized
    desc: Batch starts minimized process
    crit: notable
    conf: 0.82
    for: [batch]
    if:
      type: text
      regex: (?i)\bstart\s+/min\s+.{1,80}\.exe\b
  - id: powershell-hidden
    desc: PowerShell hidden window execution
    crit: notable
    conf: 0.9
    for: [batch, powershell, python, javascript, vbs]
    if:
      type: text
      regex: (?i)\bpowershell(\.exe)?\b[^\r\n]{0,120}-WindowStyle\s+Hidden\b
    not:
      - regex: '(?i)\bDo\s+NOT\s+use\s+-WindowStyle\s+Hidden\b'
  - id: powershell-hidden-tokenized
    desc: Tokenized PowerShell windowstyle marker
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: (?i)WINl8y7.{0,24}wS.{0,24}ncibn4e81u2I
  - id: set-thread-execution-state
    desc: Prevents system sleep
    crit: notable
    conf: 0.9
    for: [powershell, csharp, pe, dll]
    if:
      type: text
      word: SetThreadExecutionState
  - id: cmd-start
    desc: cmd.exe /c with background start
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: cmd(\.exe)?\s*/[cC]\s+start
  - id: cmd-powershell-direct-launch
    desc: cmd.exe directly launches PowerShell
    crit: suspicious
    conf: 0.86
    for: [batch, powershell, javascript, vbs, pe]
    if:
      # Require PowerShell immediately after cmd /c so command-probing source
      # such as `cmd /c "${ir} /?"` is not treated as execution.
      type: text
      regex: \bcmd(\.exe)?\s*/c\s+["']?powershell(\.exe)?\b
      case_insensitive: true
    unless:
      - type: text
        substr: "quotes within quotes"
      - type: text
        regex: (?i)(do not|avoid|forbid)[^\r\n]{0,120}powershell
      - type: text
        regex: (禁止|禁用)[^\r\n]{0,120}PowerShell
composite_rules:
  - id: hidden-pip-install
    desc: Background pip install via Windows
    crit: suspicious
    conf: 0.95
    all:
      - id: start-hidden
      - id: micro-behaviors/os/package-manager/install::pip-install
