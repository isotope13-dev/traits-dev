defaults:
  platforms: [windows, unix]
  for:
    - rust
  attack: T1059
traits:
  - id: rust-fork-daemon
    desc: Uses fork::daemon for background execution
    crit: notable
    conf: 0.85
    mbc: F0005
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(daemon)$'
  - id: rust-daemonize-crate
    desc: Daemonize crate usage
    crit: notable
    conf: 0.85
    mbc: F0005
    if:
      type: symbol
      kind: call
      regex: 'Daemonize::'
  - id: rust-spawn-detached-win
    desc: Process spawned in detached mode (Windows)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: CREATE_NEW_PROCESS_GROUP
  - id: rust-command-pre-exec
    desc: Rust command configures pre-exec callback
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(pre_exec|before_exec)\s*\('
  - id: rust-setsid-call
    desc: Rust invokes setsid
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(nix::unistd::setsid|libc::setsid|setsid\s*\()'
composite_rules:
  - id: rust-spawn-detached-unix
    desc: Rust child calls setsid before execution
    crit: notable
    conf: 0.9
    all:
      - id: rust-command-pre-exec
      - id: rust-setsid-call
  - id: rust-spawn-detached
    desc: Process spawned in detached mode
    crit: notable
    conf: 0.7
    any:
      - id: rust-spawn-detached-win
      - id: rust-spawn-detached-unix
  - id: daemonized-execution
    desc: Process daemonization in Rust
    crit: notable
    conf: 0.85
    mbc: F0005
    any:
      - id: rust-fork-daemon
      - id: rust-daemonize-crate
