defaults:
  platforms: [unix]
  for: [python]
traits:
  - id: background-execution-devnull
    desc: Background exec with devnull
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "> /dev/null 2>&1 &|> /dev/null 2>&1$"
    unless:
      - type: text
        substr: "emsdk_env.sh"