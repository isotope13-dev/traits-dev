defaults:
  for: [all]
traits:
  - id: process-fork
    desc: Process forking syscall (fork, vfork, clone)
    crit: notable
    conf: 0.7
    if:
      type: syscall
      name: ["fork", "vfork", "clone"]
  - id: process-fork-macos
    desc: Process forking syscall on macOS
    crit: notable
    conf: 0.7
    if:
      type: syscall
      name: ["fork"]
  - id: process-setsid
    desc: Create new session and become session leader
    crit: notable
    conf: 0.7
    if:
      type: syscall
      name: ["setsid"]
composite_rules:
  - id: daemon
    desc: Daemon behavior - detaches from terminal
    conf: 0.85
    crit: notable
    platforms: [linux]
    for: [elf]
    all:
      - id: process-fork
      - id: process-setsid
  - id: daemon-full
    desc: Full daemon pattern with stdin/stdout
    conf: 0.9
    crit: notable
    platforms: [linux]
    for: [elf]
    all:
      - id: process-fork
      - id: process-setsid
      - id: micro-behaviors/process/create/shell::syscall-dup-redirect-linux
  - id: daemon-macos
    desc: macOS daemon behavior - detaches from terminal
    conf: 0.85
    crit: notable
    platforms: [macos]
    for: [macho]
    all:
      - id: process-fork-macos
      - id: process-setsid
  - id: daemon-macos-full
    desc: Full macOS daemon pattern with FD redirection
    conf: 0.9
    crit: notable
    platforms: [macos]
    for: [macho]
    all:
      - id: process-fork-macos
      - id: process-setsid
      - id: micro-behaviors/process/create/shell::syscall-dup-redirect-macos
