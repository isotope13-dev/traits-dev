defaults:
  platforms: [unix]
  for: [c, html]
traits:
- id: fclose-stdin
  desc: closes stdin stream
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: "fclose(stdin);"
- id: fclose-stdout
  desc: closes stdout stream
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: "fclose(stdout);"
- id: fclose-stderr
  desc: closes stderr stream
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: "fclose(stderr);"
- id: double-fork-doc
  desc: double fork daemon note
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: "fork()s twice"
- id: close-standard-streams-cond-0--inline-5588
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: "Use fclose instead of close to make sure the write above is flushed"
  count_max: 1005589
- id: close-standard-streams-cond-1--inline-5589
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: "Expected stdout to be closed"
  count_max: 1005590
composite_rules:
- id: close-standard-streams
  desc: closes standard I/O streams
  crit: suspicious
  conf: 0.92
  all:
  - id: fclose-stdin
  - id: fclose-stdout
  - id: fclose-stderr
  downgrade:
    any:
    - id: close-standard-streams-cond-0--inline-5588
    - id: close-standard-streams-cond-1--inline-5589
- id: double-fork-stealth
  desc: double-fork stealth daemonization
  crit: suspicious
  conf: 0.94
  all:
  - id: double-fork-doc
  - id: close-standard-streams
