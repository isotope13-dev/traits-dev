defaults:
  platforms: [linux, unix, macos]
  for: [c, html]
traits:
  - id: fclose-stdin
    desc: closes stdin stream
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: "fclose(stdin);"
  - id: fclose-stdout
    desc: closes stdout stream
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: "fclose(stdout);"
  - id: fclose-stderr
    desc: closes stderr stream
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: "fclose(stderr);"
  - id: double-fork-doc
    desc: double fork daemon note
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "fork()s twice"
composite_rules:
  - id: close-standard-streams
    desc: closes standard I/O streams
    crit: suspicious
    conf: 0.92
    all:
      - id: fclose-stdin
      - id: fclose-stdout
      - id: fclose-stderr
  - id: double-fork-stealth
    desc: double-fork stealth daemonization
    crit: suspicious
    conf: 0.94
    all:
      - id: double-fork-doc
      - id: close-standard-streams
