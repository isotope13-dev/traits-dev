# Node.js event-loop handle detachment
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: node-handle-unref-call
    desc: Node handle detached from event loop
    crit: notable
    conf: 0.9
    mbc: "F0011"
    # Call-site evidence only: text `.unref()` matches JSDoc in .d.ts files.
    # Vue's unref(value) is a different call shape (has an argument).
    if:
      type: symbol
      kind: call
      substr: .unref
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
