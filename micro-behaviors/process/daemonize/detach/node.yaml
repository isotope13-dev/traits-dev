# Node.js event-loop handle detachment
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: node-handle-unref-call
    desc: Node handle detached from event loop
    crit: notable
    conf: 0.9
    mbc: "F0011"
    if:
      # Node child processes, timers, sockets, and ports detach via a
      # zero-argument unref(). Requiring the empty argument list avoids Vue's
      # unrelated unref(value) reactive-value helper.
      type: text
      regex: '\.unref\s*\(\s*\)'
