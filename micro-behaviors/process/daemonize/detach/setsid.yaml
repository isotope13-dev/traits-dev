# POSIX session detachment and daemonization primitives.
defaults:
  mbc: F0003
  platforms: [linux, macos]
  crit: notable

traits:
  - id: python-setsid
    desc: Calls Python os.setsid
    conf: 0.9
    for: [python]
    if:
      type: symbol
      kind: call
      exact: os.setsid

  - id: setsid-call
    desc: Calls POSIX setsid API
    conf: 0.9
    for: [c, cpp]
    if:
      type: symbol
      kind: call
      exact: setsid
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: setsid-import
    desc: Imports POSIX setsid API
    conf: 0.95
    for: [elf, macho]
    if:
      type: import
      exact: setsid
