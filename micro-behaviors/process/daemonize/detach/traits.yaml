defaults:
  platforms:
    - linux
    - macos
  for: [elf, macho]
composite_rules:
  - id: fork-new-session
    desc: Forks process into detached session
    crit: notable
    conf: 0.75
    all:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/setsid::import
    unless:
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/lang/compiler/systems::rust-src-path
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary-macho
  - id: self-exe-session-detach
    desc: Reads own executable while detaching process session
    crit: notable
    conf: 0.75
    for: [elf]
    platforms: [linux]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/process/create/setsid::import
    any:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/direct::execve-import
    unless:
      - id: well-known/app/renderdoc/
  - id: full-daemon
    desc: Full daemon behavior (fork + setsid + devnull)
    crit: notable
    conf: 0.3
    for:
      - elf
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/path/device/special::dev-null
    any:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/lang/compiler/systems/
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/systems::go-version-string
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family::shell-builtin-marker
