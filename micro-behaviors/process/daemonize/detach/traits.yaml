defaults:
  platforms:
    - linux
    - macos
  for: [elf, macho]
composite_rules:
  - id: full-daemon
    desc: Full daemon behavior (fork + setsid + devnull)
    crit: notable
    conf: 0.3
    for:
      - elf
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/path/device/special::dev-null
    any:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/lang/compiler/systems/
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/systems::go-version-string
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family::shell-builtin-marker
