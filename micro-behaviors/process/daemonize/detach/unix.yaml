# Unix Background Process Execution
# Detects commands designed to run processes in background/detached
# ATT&CK: T1059.004 (Unix Shell)
defaults:
  for: [shell]
  attack: "T1059.004"
  platforms: [unix]
traits:
  # nohup command for detached execution
  - id: nohup-command
    desc: nohup detached process execution
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: "nohup"
  - id: nohup-string-command
    desc: nohup command in string
    crit: notable
    conf: 0.75
    for: [scripts]
    if:
      type: string_literal
      regex: '\bnohup\s+\./[A-Za-z0-9._/-]+'
  - id: nohup-shell-launch
    desc: Shell launches a named command with nohup
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bnohup[ \t]+(["'']?[A-Za-z0-9_./$-]+["'']?)([ \t]+|$)'
  # Redirect to /dev/null
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: redirect-dev-null
    desc: Redirects output to /dev/null
    crit: component
    if:
      type: text
      regex: '>\s*/dev/null'
  # Background with & and output suppression
  - id: background-ampersand-hidden
    desc: Background process with hidden output
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/build/autotools::autoconf-generated-script
      - type: basename
        regex: '(^|[\\/])test\.sh$'
      - type: text
        regex: '\bXvfb\b[\s\S]{0,900}>\s*/dev/null\s+2>&1\s*&'
    if:
      type: text
      regex: '>\s*/dev/null\s+2>&1\s*&(\s|$)'
  # disown command (detach from shell)
  - id: disown-command
    desc: disown command to detach process
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: "disown"
  # setsid command (new session)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: setsid-command
    desc: setsid command for new session
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: "setsid"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
composite_rules:
  # nohup with output redirection to /dev/null (hiding output)
  - id: nohup-hidden-output
    desc: nohup with hidden output
    crit: notable
    conf: 0.85
    mbc: "F0005"
    all:
      - id: nohup-command
      - id: redirect-dev-null
  # Stealthy background execution
  - id: stealthy-background
    desc: Detached background process execution
    crit: notable
    conf: 0.9
    mbc: "F0005"
    any:
      - id: nohup-hidden-output
      - id: background-ampersand-hidden
      - id: nohup-string-command
  - id: disown-interactive-shell
    desc: Detaches interactive shell (stealthy background backdoor)
    crit: suspicious
    conf: 0.9
    all:
      - id: disown-command
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
