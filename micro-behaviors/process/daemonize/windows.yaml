defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
    - shell
    - php
    - javascript
  attack: T1059.003
  mbc: E1059
traits:
  - id: start-command
    desc: Windows 'start' command for background
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: \bstart\s+['"]?\{?\$?\w*executable
  - id: start-hidden
    desc: Windows 'start /b' hidden background
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: \bstart\s+/[bB]\s
    unless:
      - type: raw
        substr: del "%%~f0"&exit /b
  - id: start-minimized
    desc: Windows 'start /min' minimized process
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: \bstart\s+/min\s
  - id: powershell-hidden
    desc: PowerShell hidden window execution
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: (?i)w\^?i\^?n\^?d\^?o\^?w\^?s\^?t\^?y\^?l\^?e.{0,4}h\^?i\^?d\^?d\^?e\^?n
  - id: powershell-hidden-tokenized
    desc: Tokenized PowerShell windowstyle marker
    crit: suspicious
    conf: 0.82
    for:
      - javascript
      - vbs
      - batch
      - shell
    if:
      type: raw
      regex: (?i)WINl8y7.{0,24}wS.{0,24}ncibn4e81u2I
  - id: cmd-start
    desc: cmd.exe /c with background start
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: cmd(\.exe)?\s*/[cC]\s+start
  - id: cmd-powershell-chain-tokenized
    desc: cmd.exe launching PowerShell chain
    crit: suspicious
    conf: 0.86
    for:
      - javascript
      - vbs
      - batch
      - shell
    if:
      type: raw
      regex: (?i)cmd\.exe.{0,24}/c.{0,40}P\^?OWeR
    unless:
      - type: raw
        substr: "quotes within quotes"
composite_rules:
  - id: hidden-pip-install
    desc: Background pip install via Windows
    crit: suspicious
    conf: 0.95
    all:
      - id: start-hidden
      - id: micro-behaviors/os/package-manager/install::pip-install
