defaults:
  platforms: [windows, unix]
  for: [scripts, python, ruby, javascript, shell]
  crit: component
  conf: 0.7

traits:
  - id: worker-word
    desc: worker keyword reference
    if:
      type: text
      word: worker
  - id: daemon-word
    desc: daemon keyword reference
    if:
      type: text
      word: daemon

composite_rules:
  - id: daemon-keyword
    desc: Daemon or worker keyword in script
    crit: baseline
    conf: 0.7
    any:
      - id: daemon-word
      - id: worker-word
