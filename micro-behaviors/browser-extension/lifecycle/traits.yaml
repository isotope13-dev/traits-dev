# Browser-extension runtime lifecycle / identity. These are irreducibly
# extension-specific (no non-extension analog): the extension's own runtime
# object, install/update events, self-resource URLs, and the WebExtension
# `browser.*` namespace. Messaging (runtime.sendMessage/onMessage) is NOT here
# — it is a generic IPC technique and lives in communications/ipc/message/.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-runtime-api
    desc: Chrome runtime API usage
    if:
      type: text
      regex: 'chrome\.runtime\.[A-Za-z_]'
  - id: chrome-runtime-on-installed
    desc: Chrome runtime install/update listener
    crit: baseline
    if:
      type: text
      regex: '(chrome|browser)\.runtime\.onInstalled'
  - id: chrome-runtime-get-url
    desc: Chrome runtime resource URL
    crit: baseline
    if:
      type: text
      regex: '(chrome|browser)\.runtime\.getURL|runtime\.getURL\('
  - id: chrome-runtime-id
    desc: Chrome runtime extension ID read
    crit: baseline
    if:
      type: text
      regex: '(chrome|browser)\.runtime\.id\b'
  - id: chrome-webnavigation-api
    desc: Chrome webNavigation API usage
    if:
      type: text
      regex: '(chrome|browser)\.webNavigation\.[A-Za-z_]'
  - id: chrome-history-state-listener
    desc: Chrome history-state navigation listener
    conf: 0.94
    if:
      type: text
      regex: '(chrome|browser)\.webNavigation\.onHistoryStateUpdated\.addListener\b'
  - id: chrome-search-query
    desc: Chrome search API query
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)(chrome\.search\.query|search\.query)$'
  - id: browser-namespace-1
    desc: Uses browser.* namespace core APIs
    conf: 0.95
    if:
      type: string_literal
      regex: browser\.(runtime|tabs|storage|webRequest)
  - id: browser-namespace-2
    desc: Uses browser.* namespace data APIs
    conf: 0.95
    if:
      type: string_literal
      regex: browser\.(cookies|history|bookmarks)
composite_rules:
  - id: browser-namespace
    desc: Uses browser.* namespace (Firefox/WebExtension)
    crit: notable
    conf: 0.95
    any:
      - id: browser-namespace-1
      - id: browser-namespace-2
