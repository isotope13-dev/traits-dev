defaults:
  platforms: [windows, unix]
  for: [chrome-manifest]
  crit: notable
  conf: 0.7

traits:
  - id: content-script-url-match-pattern
    desc: Manifest defines content-script URL patterns
    if:
      type: value
      path: 'content_scripts[*].matches'
      regex: '://'
  - id: persistent-background-page
    desc: Persistent extension background page
    if:
      type: value
      path: 'background.persistent'
      exact: 'true'
