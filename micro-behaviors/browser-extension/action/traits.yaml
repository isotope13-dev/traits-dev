# Browser-extension toolbar action / popup surface (chrome.action, MV2
# browserAction). UI control specific to extensions; neutral.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.9
traits:
  - id: browser-file-input-assignment
    desc: Assigns FileList to upload input
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.files\s*=\s*[A-Za-z_$][A-Za-z0-9_$]*\.files'
  - id: chrome-action-api
    desc: Chrome action/browserAction API usage
    if:
      type: text
      regex: '(chrome|browser)\.(action|browserAction)\.[A-Za-z_]'
  - id: chrome-action-click-listener
    desc: Chrome action click listener
    if:
      type: text
      substr: chrome.action.onClicked.addListener
  - id: chrome-action-open-popup
    desc: Chrome action opens popup programmatically
    if:
      type: text
      regex: '(chrome|browser)\.action\.openPopup\b'
  - id: context-menu-click-listener
    desc: Context-menu click listener
    crit: notable
    conf: 0.97
    if:
      type: symbol
      kind: call
      exact: chrome.contextMenus.onClicked.addListener
  - id: selected-text-property-access
    desc: Reads the selected-text property
    crit: notable
    conf: 0.97
    if:
      type: text
      word: selectionText
  - id: companion-extension-promotion-link
    desc: Configures a companion-extension promotion link
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bpromoted(Extension|App)(Link|Url)\b'
