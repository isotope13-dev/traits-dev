# Browser-extension management API: enumerate, enable/disable, or uninstall
# other installed extensions. These are neutral extension capabilities; intent
# such as targeting security extensions belongs in an objective composite.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: browser-management-api
    desc: Accesses the browser extension management API
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.)?management\.[A-Za-z_][A-Za-z0-9_]*$'
  - id: browser-management-get-all
    desc: Enumerates installed browser extensions
    conf: 0.92
    unless:
      - id: metadata/package/testing/
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.)?management\.getAll$'
  - id: browser-management-set-enabled
    desc: Enables or disables another browser extension
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.)?management\.setEnabled$'
  - id: browser-management-disable-call
    desc: Disables another extension with a false argument
    if:
      type: text
      regex: '(?is)(chrome|browser)\.management\.setEnabled\s*\([^)]{0,160},\s*(false|!1)\s*\)'
  - id: browser-management-conflict-label
    desc: Shows proxy-conflict disable label
    if:
      type: text
      regex: '(?i)disable other extension'
  - id: browser-management-conflict-explanation
    desc: Explains proxy-conflict cause
    if:
      type: text
      regex: '(?i)controlling your proxy settings'
  - id: browser-management-uninstall
    desc: Uninstalls another browser extension
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(chrome|browser)\.management\.uninstall\s*\('
  - id: browser-management-uninstall-self
    desc: Uninstalls the current browser extension
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.)?management\.uninstallSelf$'
