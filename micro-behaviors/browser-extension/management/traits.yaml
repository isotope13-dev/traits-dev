# Browser-extension management API: enumerate, enable/disable, or uninstall
# other installed extensions. Extension-specific; powerful (can neutralise
# rival/security extensions), so presence is notable.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-management-api
    desc: Chrome management API usage
    if:
      type: text
      regex: '(chrome|browser)\.management\.[A-Za-z_]'
  - id: chrome-management-get-all
    desc: Enumerate installed extensions
    if:
      type: text
      regex: '(chrome|browser)\.management\.getAll\b'
  - id: chrome-management-set-enabled
    desc: Enable/disable another extension
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(chrome|browser)\.management\.setEnabled\b'
  - id: chrome-management-uninstall
    desc: Uninstall another extension
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(chrome|browser)\.management\.uninstall\b'
  - id: chrome-management-uninstall-self
    desc: Uninstall current extension
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)((chrome|browser)\.management\.uninstallSelf|management\.uninstallSelf)$'
