# Browser-extension management API: enumerate, enable/disable, or uninstall
# other installed extensions. These are neutral extension capabilities; intent
# such as targeting security extensions belongs in an objective composite.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: browser-management-api
    desc: Browser extension management API usage
    if:
      type: text
      regex: '(chrome|browser)\.management\.[A-Za-z_]'
  - id: browser-management-get-all
    desc: Enumerates installed browser extensions
    if:
      type: text
      regex: '(chrome|browser)\.management\.getAll\b'
  - id: browser-management-set-enabled
    desc: Enables or disables another browser extension
    if:
      type: text
      regex: '(chrome|browser)\.management\.setEnabled\b'
  - id: browser-management-uninstall
    desc: Uninstalls another browser extension
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(chrome|browser)\.management\.uninstall\b'
  - id: browser-management-uninstall-self
    desc: Uninstalls the current browser extension
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)((chrome|browser)\.management\.uninstallSelf|management\.uninstallSelf)$'
