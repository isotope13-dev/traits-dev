# Browser-extension tab control: open / navigate / enumerate / update browser
# tabs. Extension-specific (the chrome.tabs / browser.tabs surface); no clean
# non-extension analog.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-tabs-api
    desc: Chrome tabs API usage
    if:
      type: text
      regex: '(chrome|browser)\.tabs\.[A-Za-z_]'
  - id: chrome-tabs-create
    desc: Chrome tab creation
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)(chrome\.tabs\.create|tabs\.create)$'
  - id: chrome-tabs-query
    desc: Chrome tabs query
    if:
      type: text
      substr: tabs.query(
  - id: chrome-tabs-update
    desc: Chrome tab update
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)(chrome\.tabs\.update|tabs\.update)$'
  - id: static-https-tab-opener
    desc: Opens fixed HTTPS tab
    if:
      type: text
      regex: 'chrome\.tabs\.create\([^)]{0,180}https://'
