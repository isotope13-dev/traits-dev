# Browser-extension tab control: open / navigate / enumerate / update browser
# tabs. Extension-specific (the chrome.tabs / browser.tabs surface); no clean
# non-extension analog.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-tabs-api
    desc: Chrome tabs API usage
    if:
      type: text
      regex: '(chrome|browser)\.tabs\.[A-Za-z_]'
  - id: chrome-tabs-create
    desc: Chrome tab creation
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)(chrome\.tabs\.create|tabs\.create)$'
  - id: extension-window-create
    desc: Extension creates browser window
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)(chrome\.windows\.create|browser\.windows\.create|windows\.create)$'
  - id: extension-window-remove
    desc: Extension closes browser window
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)(chrome\.windows\.remove|browser\.windows\.remove|windows\.remove)$'
  - id: chrome-tabs-query
    desc: Chrome tabs query
    if:
      type: text
      substr: tabs.query(
  - id: chrome-tabs-update
    desc: Chrome tab update
    if:
      type: symbol
      kind: call
      regex: '(^|\\.)(chrome\.tabs\.update|tabs\.update)$'
  - id: static-https-tab-opener
    desc: Opens fixed HTTPS tab
    if:
      type: text
      regex: 'chrome\.tabs\.create\([^)]{0,180}https://'
  - id: chrome-tabs-capture-visible
    desc: Chrome visible-tab screenshot capture
    if:
      type: text
      regex: '(chrome|browser)\.tabs\.captureVisibleTab\b'
  - id: chrome-tabs-on-activated
    desc: Chrome tab activation listener
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    if:
      type: symbol
      kind: call
      exact: chrome.tabs.onActivated.addListener
  - id: chrome-tabs-on-updated
    desc: Chrome tab update listener
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    if:
      type: symbol
      kind: call
      exact: chrome.tabs.onUpdated.addListener
composite_rules:
  - id: chrome-tab-lifecycle-listeners
    desc: Chrome tab lifecycle listeners
    crit: notable
    conf: 0.92
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    any:
      - id: chrome-tabs-on-activated
      - id: chrome-tabs-on-updated
