# Browser-extension tab control: open / navigate / enumerate / update browser
# tabs. Extension-specific (the chrome.tabs / browser.tabs surface); no clean
# non-extension analog.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-tabs-api
    desc: References the WebExtension tabs API
    if:
      type: symbol
      kind: member
      regex: '^(chrome|browser)\.tabs(\.[A-Za-z_][A-Za-z0-9_]*|$)'
  - id: chrome-tabs-create
    desc: Opens a new browser tab
    if:
      type: symbol
      kind: call
      regex: '(^|\.)tabs\.create$'
  - id: chrome-tabs-get
    desc: Reads browser tab details
    if:
      type: symbol
      kind: call
      regex: '(^|\.)tabs\.get$'
  - id: extension-window-create
    desc: Extension creates browser window
    if:
      type: symbol
      kind: call
      regex: '(^|\.)windows\.create$'
  - id: extension-window-remove
    desc: Extension closes browser window
    if:
      type: symbol
      kind: call
      regex: '(^|\.)windows\.remove$'
  - id: chrome-tabs-query
    desc: Queries open browser tabs
    if:
      type: text
      substr: tabs.query(
  - id: chrome-tabs-update
    desc: Updates a browser tab
    if:
      type: symbol
      kind: call
      regex: '(^|\.)tabs\.update$'
  - id: chrome-tabs-update-with-url
    desc: Updates a browser tab URL
    if:
      type: text
      regex: 'tabs\.update\s*\([^)]{0,240}\burl\s*:'
  - id: static-https-tab-opener
    desc: Opens fixed HTTPS URL in browser tab
    if:
      type: text
      regex: 'chrome\.tabs\.create\([^)]{0,180}https://'
  - id: chrome-tabs-capture-visible
    desc: Captures an image of the visible tab
    if:
      type: text
      regex: '(chrome|browser)\.tabs\.captureVisibleTab\b'
  - id: webextension-tabs-capture-visible
    desc: Captures visible tab through an aliased API
    if:
      type: text
      regex: '(^|[^.A-Za-z0-9_])tabs\.captureVisibleTab\b'
  - id: chrome-tabs-on-activated
    desc: Registers a browser tab activation listener
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    if:
      type: symbol
      kind: call
      regex: '(^|\.)tabs\.onActivated\.addListener$'
  - id: chrome-tabs-on-updated
    desc: Registers a browser tab update listener
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    if:
      type: symbol
      kind: call
      regex: '(^|\.)tabs\.onUpdated\.addListener$'
  - id: chrome-tabs-on-removed
    desc: Registers a browser tab removal listener
    if:
      type: symbol
      kind: call
      regex: '(^|\.)tabs\.onRemoved\.addListener$'
  - id: chrome-tabs-reload
    desc: Reloads a browser tab
    if:
      type: symbol
      kind: call
      regex: '(^|\.)tabs\.reload$'
composite_rules:
  - id: install-https-tab-open
    desc: Opens an HTTPS tab after extension installation
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: chrome-tabs-create
      - id: static-https-tab-opener

  - id: chrome-tab-lifecycle-listeners
    desc: Monitors browser tab activation or updates
    crit: notable
    conf: 0.92
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    any:
      - id: chrome-tabs-on-activated
      - id: chrome-tabs-on-updated
