# PHP Standard I/O and Error Control
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059.004
defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
traits:
  - id: error-reporting-off
    desc: Disables error reporting (error_reporting(0))
    conf: 0.95
    if:
      type: text
      regex: 'error_reporting\s*\(\s*0\s*\)'
  - id: error-suppress-prefix
    desc: Suppresses errors with the PHP @ operator
    conf: 0.7
    if:
      type: tree-sitter
      node: error_suppression_expression
      regex: .{1,120}
