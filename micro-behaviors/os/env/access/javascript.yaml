defaults:
  platforms: [windows, unix]
traits:
  - id: js-filtered-env-copy
    desc: Filters and copies process.env values
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'Object\.keys\s*\(\s*process\.env\s*\)\s*\.filter[\s\S]{0,900}\bprocess\.env\s*\['

  - id: process-env
    desc: Node process.env access
    crit: baseline
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      substr: process.env
  - id: javascript
    desc: Access environment variables
    crit: baseline
    conf: 0.8
    for: [javascript, typescript]
    if:
      # Migrated from a tree-sitter query (member_expression `process.env`
      # + subscript_expression `process["env"]`). filefacts normalizes both
      # forms — `process.env` and `process["env"]` — to the same `member`
      # chain `process.env`, so one `kind: member` match covers both without
      # the per-member tree-sitter cursor walk. Anchored so `process.env` and
      # `process.env.SECRET` match but `process.environment` does not.
      type: symbol
      kind: member
      regex: '^process\.env(\.|$)'
  - id: node-process-env-enumeration
    desc: Enumerates Node.js environment names
    crit: notable
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: Object\.(keys|entries)\s*\(\s*process\.env\s*\)
  - id: node-pm2-env-check
    desc: Detects PM2 environment (NODE_APP_INSTANCE)
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env\.(NODE_APP_INSTANCE|pm2_env)|["'']NODE_APP_INSTANCE["'']'
  - id: node-process-env-object-assignment
    desc: Node assigns process.env object
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.[A-Za-z_$][A-Za-z0-9_$]*\s*=\s*process\.env\b'

  - id: wsh-process-environment
    desc: WSH process environment access
    crit: notable
    conf: 0.9
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: text
      regex: 'Environment\s*\(.{0,24}Proc.{0,12}ess'
  - id: wsh-process-environment-split
    desc: Split-join WSH process environment access
    crit: notable
    conf: 0.92
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: text
      regex: 'Environment\s*\(\s*\[["'']Pro["''].{0,32}["'']cess["'']'
  - id: wsh-environment-symbol
    desc: WSH Environment method access
    crit: notable
    conf: 0.86
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: symbol
      regex: '\.Environment$'

  - id: wsh-expand-environment-strings-call
    desc: Calls WSH ExpandEnvironmentStrings
    crit: notable
    conf: 0.9
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: symbol
      regex: '\.ExpandEnvironmentStrings$'
  - id: env-dynamic-assignment
    desc: Dynamic environment variable assignment
    crit: notable
    conf: 0.88
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: 'Environment\s*\([^)]{0,48}\)\s*\(\s*["''][A-Za-z0-9_]{6,32}["'']\s*\)\s*='
  - id: expandenv-random-variable
    desc: "ExpandenvStrings on random-looking env var"
    crit: notable
    conf: 0.88
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: 'ExpandEnvironmentStrings\s*\(\s*["'']%[A-Za-z0-9_]{8,24}%["'']\s*\)'
      case_insensitive: true
    not:
      - regex: '(?i)ALLUSERSPROFILE'
      - regex: '(?i)APPDATA'
      - regex: '(?i)COMMONPROGRAMFILES'
      - regex: '(?i)COMPUTERNAME'
      - regex: '(?i)COMSPEC'
      - regex: '(?i)HOMEDRIVE'
      - regex: '(?i)HOMEPATH'
      - regex: '(?i)LOCALAPPDATA'
      - regex: '(?i)LOGONSERVER'
      - regex: '(?i)NUMBER_OF_PROCESSORS'
      - regex: '(?i)ONEDRIVE'
      - regex: '(?i)OS'
      - regex: '(?i)PATHEXT'
      - regex: '(?i)PROCESSOR_ARCHITECTURE'
      - regex: '(?i)PROCESSOR_IDENTIFIER'
      - regex: '(?i)PROCESSOR_LEVEL'
      - regex: '(?i)PROCESSOR_REVISION'
      - regex: '(?i)PROGRAMDATA'
      - regex: '(?i)PROGRAMFILES'
      - regex: '(?i)PUBLIC'
      - regex: '(?i)SYSTEMDRIVE'
      - regex: '(?i)SYSTEMROOT'
      - regex: '(?i)TEMP'
      - regex: '(?i)TMP'
      - regex: '(?i)USERDOMAIN'
      - regex: '(?i)USERDOMAIN_ROAMINGPROFILE'
      - regex: '(?i)USERNAME'
      - regex: '(?i)USERPROFILE'
      - regex: '(?i)WINDIR'
  - id: env-item-random-variable
    desc: 'env.Item access on random-looking env variable'
    crit: notable
    conf: 0.84
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: '\.Item\s*\(\s*["''][A-Za-z0-9_]{8,24}["'']\s*\)'
      case_insensitive: true
    not:
      - regex: '(?i)ALLUSERSPROFILE'
      - regex: '(?i)APPDATA'
      - regex: '(?i)COMMONPROGRAMFILES'
      - regex: '(?i)COMPUTERNAME'
      - regex: '(?i)COMSPEC'
      - regex: '(?i)HOMEDRIVE'
      - regex: '(?i)HOMEPATH'
      - regex: '(?i)LOCALAPPDATA'
      - regex: '(?i)LOGONSERVER'
      - regex: '(?i)NUMBER_OF_PROCESSORS'
      - regex: '(?i)ONEDRIVE'
      - regex: '(?i)OS'
      - regex: '(?i)PATHEXT'
      - regex: '(?i)PROCESSOR_ARCHITECTURE'
      - regex: '(?i)PROCESSOR_IDENTIFIER'
      - regex: '(?i)PROCESSOR_LEVEL'
      - regex: '(?i)PROCESSOR_REVISION'
      - regex: '(?i)PROGRAMDATA'
      - regex: '(?i)PROGRAMFILES'
      - regex: '(?i)PUBLIC'
      - regex: '(?i)SYSTEMDRIVE'
      - regex: '(?i)SYSTEMROOT'
      - regex: '(?i)TEMP'
      - regex: '(?i)TMP'
      - regex: '(?i)USERDOMAIN'
      - regex: '(?i)USERDOMAIN_ROAMINGPROFILE'
      - regex: '(?i)USERNAME'
      - regex: '(?i)USERPROFILE'
      - regex: '(?i)WINDIR'
  - id: wsh-environment-item-assignment
    desc: WSH Environment item assignment
    crit: notable
    conf: 0.9
    for: [javascript, html]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)\.Environment\("[^"]{1,16}"\)\.Item\("[A-Za-z_][A-Za-z0-9_]{4,16}"\)\s*='
  - id: wsh-environment-object
    desc: WSH Environment object retrieval
    crit: notable
    conf: 0.95
    for: [javascript, vbs, html]
    platforms: [windows]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.Environment\s*\(\s*["''](User|Process|System)["'']\s*\)'
  - id: wsh-environment-separate-item-assignment
    desc: Assignment to a WSH Environment object item
    crit: notable
    conf: 0.95
    for: [javascript, vbs, html]
    platforms: [windows]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.Item\s*\(\s*["''][A-Za-z0-9_]{4,24}["'']\s*\)\s*='
  - id: wsh-environment-assignment-call
    desc: WSH environment item assignment
    crit: notable
    conf: 0.94
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: text
      regex: '\.Environment\s*\([^)]{0,32}\)\s*\(\s*["''][A-Za-z0-9_]{1,24}["'']\s*\)\s*='
  - id: wsh-environment-method-text
    desc: Calls the WSH Environment method
    crit: notable
    conf: 0.9
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.Environment\s*\('
  - id: wsh-environment-indexed-assignment
    desc: WSH environment indexed assignment
    crit: notable
    conf: 0.95
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: text
      # JScript's COM default-property form can assign an indexed value:
      # `env(keys[i]) = value`.  This avoids sample-specific names while
      # excluding ordinary property assignments.
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\s*\(\s*[A-Za-z_$][A-Za-z0-9_$]*\s*\[[^\]\r\n]{1,40}\]\s*\)\s*='
  - id: wsh-environment-decoded-assignment-cluster
    desc: Repeated decoded WSH environment assignments
    crit: notable
    conf: 0.98
    for: [javascript, vbs]
    platforms: [windows]
    count_min: 32
    if:
      type: text
      # JScript's WSH default-property syntax allows an encoded key to be
      # assigned as `env(decode(...)) = decode(...)`.  A large repeated run is
      # payload staging, not ordinary environment configuration.
      regex: '(?m)^\s*\w+\s*\(\s*\w+\s*\([^\)\r\n]{1,160}\)\s*\)\s*='
composite_rules:
  - id: wsh-environment-object-item-assignment
    desc: WSH Environment object receives an item assignment
    crit: notable
    conf: 0.96
    near_lines: 30
    all:
      - id: wsh-environment-object
      - id: wsh-environment-separate-item-assignment
  - id: wsh-environment-computed-assignment
    desc: WSH environment computed assignment
    crit: notable
    conf: 0.96
    all:
      - id: wsh-environment-method-text
      - id: wsh-environment-assignment-call
  - id: wsh-environment-indexed-staging
    desc: WSH environment method paired with indexed assignment
    crit: notable
    conf: 0.97
    all:
      - id: wsh-environment-method-text
      - id: wsh-environment-indexed-assignment
