defaults:
  platforms: [windows, unix]
traits:
  - id: javascript
    desc: Access environment variables
    crit: baseline
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: ast
      language: javascript
      query: |-
        (member_expression
          object: (identifier) @process
          property: (property_identifier) @env
          (#eq? @process "process")
          (#eq? @env "env")
        )
        (subscript_expression
          object: (identifier) @process
          index: (string) @env
          (#eq? @process "process")
          (#match? @env "env")
        )
  - id: wsh-process-environment
    desc: WSH process environment access
    crit: notable
    conf: 0.9
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: 'Environment\s*\(.{0,24}Proc.{0,12}ess'
  - id: wsh-process-environment-split
    desc: Split-join WSH process environment access
    crit: notable
    conf: 0.92
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: text
      regex: 'Environment\s*\(\s*\[["'']Pro["''].{0,32}["'']cess["'']'
  - id: wsh-environment-symbol
    desc: WSH Environment method access
    crit: notable
    conf: 0.86
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: symbol
      regex: '\.Environment$'
  - id: wsh-process-fragment-proc
    desc: Process selector Proc fragment
    crit: component
    conf: 0.86
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: string_literal
      exact: Proc
  - id: wsh-process-fragment-es
    desc: Process selector es fragment
    crit: component
    conf: 0.72
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: string_literal
      exact: es
  - id: wsh-process-fragment-proce
    desc: Process selector Proce fragment
    crit: component
    conf: 0.86
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: string_literal
      exact: Proce
  - id: wsh-process-fragment-ss
    desc: Process selector ss fragment
    crit: component
    conf: 0.66
    for: [javascript, vbs]
    platforms: [windows]
    if:
      type: string_literal
      exact: ss
  - id: env-dynamic-assignment
    desc: Dynamic environment variable assignment
    crit: notable
    conf: 0.88
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: '[A-Za-z_$][A-Za-z0-9_$]{5,}\(\s*["''][A-Za-z0-9]{8,24}["'']\s*\)\s*='
  - id: expandenv-random-variable
    desc: ExpandEnvironmentStrings on random-looking env variable
    crit: notable
    conf: 0.88
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: 'ExpandEnvironmentStrings\s*\(\s*["'']%[A-Za-z0-9]{8,24}%["'']\s*\)'
  - id: env-item-random-variable
    desc: Environment.Item access on random-looking env variable
    crit: notable
    conf: 0.84
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: '\.Item\s*\(\s*["''][A-Za-z0-9]{8,24}["'']\s*\)'
composite_rules:
  - id: wsh-process-environment-fragmented
    desc: Fragmented WSH Process environment access
    crit: notable
    conf: 0.9
    for: [javascript, vbs]
    platforms: [windows]
    all:
      - id: wsh-environment-symbol
      - id: wsh-process-fragment-proc
      - id: wsh-process-fragment-es
  - id: wsh-process-environment-fragmented-proce
    desc: Fragmented WSH Process environment access
    crit: notable
    conf: 0.9
    for: [javascript, vbs]
    platforms: [windows]
    all:
      - id: wsh-environment-symbol
      - id: wsh-process-fragment-proce
      - id: wsh-process-fragment-ss
