defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
traits:
  - id: jvm-system-class-ref
    desc: JVM System class reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/lang/System

  - id: java-system-getproperty
    desc: Java System.getProperty() usage
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: System.getProperty
  - id: java-system-getenv
    desc: Java System.getenv() usage
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: System.getenv
