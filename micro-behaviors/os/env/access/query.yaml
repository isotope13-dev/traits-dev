defaults:
  for: [binaries, c]
  crit: baseline
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: getenv-user
    desc: Query USER environment variable
    conf: 0.5
    attack: T1033
    mbc: E1033
    platforms:
      - unix
      - linux
      - macos
    if:
      type: text
      regex: getenv\("USER"\)
  - id: getenv-home
    desc: Query HOME environment variable
    conf: 0.5
    attack: T1082
    mbc: E1082
    platforms:
      - unix
      - linux
      - macos
    if:
      type: text
      regex: getenv\("HOME"\)
