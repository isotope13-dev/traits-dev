# Environment Variable Access (Python)
# Basic Python environment variable access functions
# MBC: E1082 (System Information Discovery)
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  mbc: "E1082"
  attack: "T1082"
traits:
  - id: os-path-expandvars
    desc: Expands environment variables in paths
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: os.path.expandvars
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: os-environ-symbol
    desc: Accesses environment variables (os.environ)
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: "os.environ"
  - id: os-environ-assignment
    desc: Python writes environment variable
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: 'os\.environ\s*\[.{0,120}\]\s*='
