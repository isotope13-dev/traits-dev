# Environment and Localization Operations
# Locale, timezone, and environment variable access
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Localization Functions ===
  - id: locale-name-to-lcid
    desc: Locale name to code conversion
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "LocaleNameToLCID"
  - id: lcmap-string-ex
    desc: Locale-aware string mapping
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "LCMapStringEx"
  - id: lcmap-string-w
    desc: Unicode string locale mapping
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "LCMapStringW"
  - id: get-string-type-w
    desc: Get Unicode character type
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "GetStringTypeW"
  # === System Information ===
  - id: are-file-apis-ansi
    desc: File API ANSI check
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "AreFileApisANSI"
  - id: create-environment-block
    desc: Build user environment block
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "CreateEnvironmentBlock"
  - id: get-environment-strings
    desc: Get environment strings
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: "^_?(GetEnvironmentStrings(W|A)?|FreeEnvironmentStringsW)$"
  - id: get-environment-strings-wide
    desc: Read wide environment block
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: "GetEnvironmentStringsW"
    unless:
      - type: basename
        regex: ^clink_x(64|86)\.exe$
  - id: free-environment-strings-wide
    desc: Release wide environment block
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "FreeEnvironmentStringsW"
    unless:
      - type: basename
        regex: ^clink_x(64|86)\.exe$
  - id: destroy-environment-block
    desc: Release user environment block
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "DestroyEnvironmentBlock"
  - id: set-environment-variable-wide
    desc: Set wide environment variable
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: "SetEnvironmentVariableW"
    unless:
      - type: basename
        regex: ^clink_x(64|86)\.exe$
  - id: vb6-environ-bstr
    desc: VB6 environment variable lookup
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: "rtcEnvironBstr"
composite_rules:
  - id: environment-block-enumeration
    desc: Enumerate process environment block
    crit: notable
    conf: 0.88
    all:
      - id: get-environment-strings-wide
      - id: free-environment-strings-wide
