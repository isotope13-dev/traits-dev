# Environment and Localization Operations
# Locale, timezone, and environment variable access
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Localization Functions ===
  - id: locale-name-to-lcid
    desc: Locale name to code conversion
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "LocaleNameToLCID"
  - id: lcmap-string-ex
    desc: Locale-aware string mapping
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "LCMapStringEx"
  - id: lcmap-string-w
    desc: Unicode string locale mapping
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "LCMapStringW"
  - id: get-string-type-w
    desc: Get Unicode character type
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "GetStringTypeW"
  # === System Information ===
  - id: are-file-apis-ansi
    desc: File API ANSI check
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "AreFileApisANSI"
  - id: create-environment-block
    desc: Build user environment block
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "CreateEnvironmentBlock"
  - id: get-environment-strings
    desc: Get environment strings
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: "^_?(GetEnvironmentStrings(W|A)?|FreeEnvironmentStringsW)$"
  - id: get-environment-strings-wide
    desc: Read wide environment block
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: "GetEnvironmentStringsW"
  - id: free-environment-strings-wide
    desc: Release wide environment block
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "FreeEnvironmentStringsW"
  - id: destroy-environment-block
    desc: Release user environment block
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "DestroyEnvironmentBlock"
  - id: native-environ-reference
    desc: "Direct environ[] global access"
    crit: baseline
    conf: 0.75
    platforms: [unix]
    for: [c, cpp, objc, elf]
    if:
      type: text
      word: environ
  - id: vb6-environ-bstr
    desc: VB6 environment variable lookup
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: "rtcEnvironBstr"
  - id: get-environment-variable
    desc: "Read a process env var (GetenvVariableA/W)"
    crit: notable
    conf: 0.85
    for: [pe, dll, c, cpp]
    if:
      type: import
      regex: ^GetEnvironmentVariable[AW]$
composite_rules:
  - id: environment-block-enumeration
    desc: Enumerate process environment block
    crit: baseline
    conf: 0.88
    all:
      - id: get-environment-strings-wide
      - id: free-environment-strings-wide
    downgrade:
      # Go's os package statically imports GetEnvironmentStringsW /
      # FreeEnvironmentStringsW on Windows to implement os.Environ().
      any:
        - id: metadata/lang/compiled/
