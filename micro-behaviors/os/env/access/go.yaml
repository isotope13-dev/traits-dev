defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [go, binaries]
  crit: notable
  attack: T1082
traits:
  - id: os-getenv
    desc: os.Getenv() environment variable
    conf: 0.8
    if:
      type: symbol
      exact: os.Getenv
  - id: os-lookupenv
    desc: os.LookupEnv() environment lookup
    conf: 0.8
    if:
      type: symbol
      exact: os.LookupEnv
  - id: os-environ
    desc: os.Environ() all environment variables
    conf: 0.85
    if:
      type: symbol
      exact: os.Environ
composite_rules:
  - id: env-access-comp
    desc: Environment variable access
    crit: notable
    conf: 0.8
    any:
      - id: os-getenv
      - id: os-lookupenv
      - id: os-environ
