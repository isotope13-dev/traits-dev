defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  crit: baseline
traits:
  - id: os-getenv
    desc: os.Getenv() reads a named environment variable
    conf: 0.8
    if:
      type: symbol
      exact: os.Getenv
  - id: os-lookupenv
    desc: os.LookupEnv() reads a named env variable
    conf: 0.8
    if:
      type: symbol
      exact: os.LookupEnv
  - id: os-environ
    desc: os.Environ() enumerates the entire environment
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: symbol
      exact: os.Environ
composite_rules:
  - id: env-access-comp
    desc: Environment variable access
    crit: baseline
    conf: 0.8
    any:
      - id: os-getenv
      - id: os-lookupenv
      - id: os-environ
