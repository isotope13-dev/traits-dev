defaults:
  platforms: [windows, unix]
  for: [ruby]
  crit: notable
  conf: 0.75
traits:
  - id: env-bracket-access
    desc: Accesses Ruby environment variables with ENV[]
    if:
      type: literal
      exact: ENV[

  - id: env-fetch
    desc: Ruby ENV.fetch access
    if:
      type: symbol
      regex: 'ENV.{0,50}fetch'

  - id: sensitive-env-var
    desc: References a sensitive Ruby environment variable
    if:
      type: text
      regex: 'ENV\[.{0,30}(TOKEN|SECRET|KEY|PASS)'
