defaults:
  platforms: [windows, unix]
  for: [ruby]
traits:
  - id: rails-env-reference
    desc: Rails environment reference
    crit: baseline
    conf: 0.85
    if:
      type: string_literal
      regex: 'Rails\.env(\[0\])?'
  - id: rails-env-check-obfuscated
    desc: Obfuscated Rails environment check
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    if:
      type: text
      regex: 'Rails\.env\[0\]\s*==\s*["'']p["'']'
