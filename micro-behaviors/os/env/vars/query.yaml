defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.6
  attack: T1082
traits:
  - id: printenv
    desc: printenv command
    if:
      type: string_value
      substr: printenv
  - id: env-cmd
    desc: env command path
    if:
      type: string_value
      substr: /usr/bin/env
