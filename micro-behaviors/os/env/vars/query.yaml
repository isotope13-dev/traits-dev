defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts]
  crit: notable
  conf: 0.6
  attack: T1082
traits:
  - id: printenv
    desc: printenv command
    if:
      type: text
      substr: printenv
  - id: env-cmd
    desc: env command path
    not:
      - regex: '^#!\s*/usr/bin/env'
    if:
      type: text
      substr: /usr/bin/env
