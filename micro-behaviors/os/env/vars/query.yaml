# Environment Variable Queries
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.6
  attack: "T1082"
traits:
  - id: printenv
    desc: printenv command
    if:
      type: string_value
      substr: "printenv"
  # Note: "env" as a word is too generic (appears in certificate text, etc.)
  # Require the executable path or command form
  - id: env-cmd
    desc: env command path
    if:
      type: string_value
      substr: "/usr/bin/env"
