defaults:
  for:
    - shell
    - python
    - javascript
    - elf
  platforms: [android, unix]
  crit: notable
  conf: 0.8
traits:
  - id: android-root-var
    desc: ANDROID_ROOT environment variable
    if:
      type: text
      word: ANDROID_ROOT
  - id: android-data-var
    desc: ANDROID_DATA environment variable
    if:
      type: text
      word: ANDROID_DATA
  - id: android-storage-var
    desc: ANDROID_STORAGE environment variable
    if:
      type: text
      word: ANDROID_STORAGE
  - id: android-env-prefix
    desc: ANDROID_* environment variable (any)
    conf: 0.7
    if:
      type: text
      regex: ^ANDROID_[A-Z_]+
  - id: node-appdata-access
    desc: Node reads Windows APPDATA directory
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    platforms: [windows, unix]
    if:
      type: text
      substr: process.env.APPDATA
