defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: npm-lifecycle
    desc: Access npm lifecycle event
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: npm_lifecycle_event
  - id: npm-config-user-agent
    desc: Access npm user agent
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: npm_config_user_agent
  - id: npm-package-info
    desc: Access npm package info
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: process\.env\.npm_package_
