defaults:
  platforms: [windows]
  for: [powershell]
traits:
  - id: env-username
    desc: Accesses username environment variable
    crit: notable
    conf: 0.8
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)(\$env:USERNAME\b|%USERNAME%)'
  - id: env-computername
    desc: Accesses computername environment variable
    crit: notable
    conf: 0.8
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)(\$env:COMPUTERNAME\b|%COMPUTERNAME%)'
  - id: env-temp-dup
    desc: Accesses temp environment variable
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(?i)\$env:TEMP\b'
  - id: env-appdata
    desc: Accesses APPDATA environment variable
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(?i)\$env:(LOCAL)?APPDATA\b'
