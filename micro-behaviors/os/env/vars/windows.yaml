defaults:
  for:
    - pe
    - powershell
    - batch
    - vbs
  platforms:
    - windows
traits:
  - id: comspec-env-var
    desc: Accesses ComSpec environment variable
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)comspec
  - id: temp-env-var
    desc: Contains %TEMP% environment variable string
    crit: notable
    if:
      type: text
      substr: '%TEMP%'
      case_insensitive: true
