defaults:
  for:
    - vbs
  platforms:
    - windows
  crit: baseline
  conf: 0.85
traits:
  - id: environ-function
    desc: VBA Environ function call
    if:
      type: text
      regex: (?i)\bEnviron\(
  - id: temp-path-lookup
    desc: Temp directory environment lookup
    crit: notable
    if:
      type: text
      regex: (?i)Environ\(\s*"(TEMP|TMP)"\s*\)
  - id: appdata-path-lookup
    desc: AppData environment lookup
    if:
      type: text
      regex: (?i)Environ\(\s*"(APPDATA|LOCALAPPDATA)"\s*\)
  - id: userprofile-lookup
    desc: UserProfile environment lookup
    if:
      type: text
      regex: (?i)Environ\(\s*"USERPROFILE"\s*\)
  - id: computername-lookup
    desc: ComputerName environment lookup
    crit: notable
    if:
      type: text
      regex: (?i)Environ\(\s*"COMPUTERNAME"\s*\)
  - id: username-lookup
    desc: Username environment lookup
    crit: notable
    if:
      type: text
      regex: (?i)Environ\(\s*"USERNAME"\s*\)
