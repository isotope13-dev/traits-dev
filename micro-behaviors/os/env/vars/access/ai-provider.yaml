defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript, typescript, powershell, go]
  crit: notable
  conf: 0.85

traits:
- id: anthropic-base-url-variable
  desc: Anthropic API base URL variable reference
  if:
    type: text
    word: ANTHROPIC_BASE_URL
- id: anthropic-auth-token-variable
  desc: Anthropic API auth token variable reference
  if:
    type: text
    word: ANTHROPIC_AUTH_TOKEN
