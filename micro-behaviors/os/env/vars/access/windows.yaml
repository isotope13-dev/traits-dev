defaults:
  for:
    - pe
    - powershell
    - batch
    - vbs
  platforms:
    - windows
traits:
  - id: comspec-env-var
    desc: Accesses ComSpec environment variable
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: (?i)comspec
  - id: temp-env-var
    desc: Contains %TEMP% environment variable string
    crit: baseline
    if:
      type: text
      substr: '%TEMP%'
      case_insensitive: true
  - id: getenv-profiling-api
    desc: GetEnvironmentVariable profiler check
    crit: component
    conf: 0.86
    for: [pe, dll, csharp]
    if:
      type: text
      regex: 'GetEnvironmentVariable(A|W)?'
    unless:
    - id: metadata/lang/compiler/systems::go-buildinfo
    - id: well-known/app/drivers::ngx-dll-basename
