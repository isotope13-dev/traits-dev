# Node.js Addon Environment Variable Checks
# Detects native addons that check environment variables to alter behavior,
# commonly used as anti-analysis guardrails.
# ATT&CK: T1622 (Triggered Execution)
defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
traits:
  - id: node-addon-quiet-check
    desc: NODE_ADDON_QUIET environment variable check
    crit: suspicious
    conf: 0.88
    attack: T1622
    if:
      type: text
      word: NODE_ADDON_QUIET
  - id: node-debug-check
    desc: NODE_DEBUG environment variable check
    crit: notable
    conf: 0.75
    attack: T1622
    if:
      type: text
      word: NODE_DEBUG
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/signed/platform::microsoft

composite_rules:
  - id: node-addon-env-guardrail
    desc: Native addon environment guardrail
    crit: suspicious
    conf: 0.9
    mbc: B0025
    all:
      - id: metadata/binary/framework::node-api-addon-export
    any:
      - id: node-addon-quiet-check
      - id: node-debug-check
    unless:
      - id: well-known/tool/reverse-engineering/frida::frida-tool-context
