defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
- id: npm-lifecycle
  desc: Access npm lifecycle event
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: npm_lifecycle_event
- id: npm-config-user-agent
  desc: Access npm user agent
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: npm_config_user_agent
- id: npm-package-info
  desc: Access npm package info
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: process\.env\.npm_package_
- id: npmrc-publishing-version-context
  desc: npmrc package publishing message context
  crit: baseline
  conf: 0.86
  if:
    type: string_literal
    substr: "Publishing version:"
- id: npmrc-registry-auth-token
  desc: npmrc registry client primary context
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'registry-auth-token|ini\.parse\(input\)|setNpmrc'
- id: npmrc-token-to-npmrc-text
  desc: npm token to npmrc writing text context
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'npmToken to npmrc|Writing \.npmrc to \$\{basedir\}'
- id: npmrc-tool-config-context
  desc: npmrc package manager config and redaction context
  crit: baseline
  conf: 0.88
  if:
    type: text
    regex: 'name:\s*[''"]npmrc[''"]|packageFile\.npmrc|redactedFields|configSerializer'
- id: npmrc-file-extension-list-context
  desc: npmrc filename in extension allowlist context
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '[''"]wgetrc[''"],\s*[''"]npmrc[''"],\s*[''"]yarnrc[''"]'
- id: npm-build-env-windows-profile--appdata
  desc: npm build Windows profile env (APPDATA)
  crit: component
  conf: 0.9
  if:
    type: text
    word: APPDATA
- id: npm-build-env-windows-profile--systemroot
  desc: npm build Windows profile env (SystemRoot)
  crit: component
  conf: 0.9
  if:
    type: text
    word: SystemRoot
composite_rules:
- id: npm-build-env-windows-profile
  desc: npm build Windows profile env
  crit: component
  conf: 0.9
  any:
  - id: micro-behaviors/os/env/vars/access::rust-localappdata-env-var
  - id: npm-build-env-windows-profile--appdata
  - id: micro-behaviors/os/env/vars/user-info::userprofile-var
  - id: npm-build-env-windows-profile--systemroot
- id: npm-embedded-build-env-dump
  desc: JavaScript embeds npm build environment
  crit: baseline
  conf: 0.95
  all:
  - id: npm-config-user-agent
  - id: npm-lifecycle
  - id: npm-build-env-windows-profile
- id: npmrc-benign-context
  desc: Benign npmrc reference context
  crit: component
  conf: 0.88
  any:
  - id: npmrc-publishing-version-context
  - id: metadata/library/structure::vscode-icon-theme-catalog
  - id: npm-embedded-build-env-dump
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/library/runtime::update-notifier-npmrc-context
  - id: metadata/library/structure::vscode-material-icon-map-bundle
  - id: npmrc-registry-client-context
  - id: npmrc-tool-config-context
  - id: npmrc-file-extension-list-context
- id: npmrc-registry-client-context
  desc: npmrc registry client context
  crit: baseline
  conf: 0.88
  any:
  - id: npmrc-registry-auth-token
  - id: npmrc-token-to-npmrc-text
