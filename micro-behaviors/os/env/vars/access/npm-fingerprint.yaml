defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
composite_rules:
- id: npm-lifecycle-fingerprint-context
  desc: Reads multiple npm lifecycle environment values
  crit: notable
  conf: 0.8
  needs: 2
  any:
  - id: micro-behaviors/os/env/vars/access::npm-lifecycle
  - id: micro-behaviors/os/env/vars/access::npm-config-user-agent
  - id: micro-behaviors/os/env/vars/access::npm-package-info
