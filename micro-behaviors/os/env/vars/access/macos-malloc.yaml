# macOS Malloc debugging environment variables. MallocStackLogging et al. are
# legitimate heap-debugging vars, but are abused (e.g. CVE-2015-5889) to make
# a setuid process write attacker-controlled logs to root-owned paths.
defaults:
  platforms: [macos]
  for: [python, shell, macho]
  size_min: 16
  size_max: 50000000
traits:
  - id: malloc-stack-logging
    desc: MallocStackLogging heap-debug environment variable
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: MallocStackLogging
