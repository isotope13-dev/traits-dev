defaults:
  platforms:
    - unix
    - windows
  for: [scripts]
  crit: notable
  conf: 0.6
  attack: T1082
traits:
  - id: printenv
    desc: printenv command
    if:
      type: text
      substr: printenv
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
      - id: well-known/lib/highlight-js::browser-bundle
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
  - id: env-cmd
    desc: Runs a command through /usr/bin/env
    if:
      type: text
      regex: '(?m)(^|[;&|][ \t]*)/usr/bin/env([ \t]|$)'
    unless:
      - id: metadata/package/files/bsd::pkgsrc-maintainer-script
      - id: well-known/lib/highlight-js::browser-bundle
  - id: env-cmd-bare
    desc: Runs env to list environment variables
    crit: component
    conf: 0.5
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '(?m)^\s*env\s*$|^\s*env\s+-[A-Za-z-]{1,40}\s*$'
    not:
      - substr: "#!/usr/bin/env"
      - substr: "/node_gyp_bins/python3"
      - substr: findTool(desc, commandList)
      - substr: apply env-specific formatting (colors, etc.)
      - substr: "whoami\n            env\n            freebsd-version"
    unless:
      - type: text
        regex: 'env\s+[A-Za-z_][A-Za-z0-9_]*='
      - type: basename
        exact: configure
      - id: metadata/file/extension/identity::autotools-configure-basename
      - type: basename
        exact: Makefile
        case_insensitive: true
