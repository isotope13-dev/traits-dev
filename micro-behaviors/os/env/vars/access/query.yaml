defaults:
  platforms:
    - unix
    - windows
  for: [scripts]
  crit: notable
  conf: 0.6
  attack: T1082
traits:
  - id: printenv
    desc: printenv command
    if:
      type: text
      substr: printenv
  - id: env-cmd
    desc: env command reference
    not:
      - regex: '^#!\s*/usr/bin/env'
      - substr: '/usr/bin/env bash'
      - substr: '/usr/bin/env sh'
      - substr: '/usr/bin/env python'
      - substr: '/usr/bin/env node'
    if:
      type: text
      substr: /usr/bin/env
    unless:
      - id: metadata/package/files/bsd::pkgsrc-maintainer-script
  - id: env-cmd-bare
    desc: Bare env command for environment listing
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (^|[;&(|\s])env(\s|-|$)
    not:
      - substr: "#!/usr/bin/env"
      - substr: "/node_gyp_bins/python3"
      - substr: findTool(desc, commandList)
      - substr: apply env-specific formatting (colors, etc.)
      - substr: "whoami\n            env\n            freebsd-version"
    unless:
      - type: text
        regex: 'env\s+[A-Za-z_][A-Za-z0-9_]*='
      - type: basename
        exact: configure
      - id: metadata/file/extension/identity::autotools-configure-basename
      - type: basename
        exact: Makefile
        case_insensitive: true
