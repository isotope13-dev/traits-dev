# Environment-variable / secret access capability expressed in an npm
# package.json script (process.env / $AWS_* / $GITHUB_*). scripts[*] matches
# any script value. (Sibling npm.yaml covers npm_* env access in JS source.)
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: E1552
  attack: T1552.001
traits:
  - id: npm-script-env
    desc: npm script reads environment variables
    if:
      type: value
      path: 'scripts[*]'
      regex: 'process\.env|\$\{?(AWS_|GITHUB_)'
  - id: npm-script-full-env-object
    desc: npm script references entire environment
    crit: suspicious
    conf: 0.92
    ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
    if:
      type: value
      path: 'scripts[*]'
      regex: '(\benv\s*:\s*process\.env\b|JSON\.stringify\([^)]*process\.env)'
    unless:
      - id: well-known/app/comfy-desktop::comfy-desktop-package-name
