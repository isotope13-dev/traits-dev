# Environment-variable / secret access capability expressed in an npm
# package.json script (process.env / $AWS_* / $GITHUB_*). scripts[*] matches
# any script value. (Sibling npm.yaml covers npm_* env access in JS source.)
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: E1552
  attack: T1552.001
traits:
  - id: npm-script-env
    desc: npm script reads environment variables
    if:
      type: value
      path: 'scripts[*]'
      regex: 'process\.env|\$\{?(AWS_|GITHUB_)'
