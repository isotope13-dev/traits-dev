defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
traits:
  - id: path-var
    desc: PATH environment variable
    if:
      type: text
      exact: PATH
  - id: path-prepend-tmp
    desc: PATH variable prepended with /tmp
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?m)(^|[;\n])\s*(export\s+)?PATH\s*=\s*/tmp(/|:|$)'
    not:
      - substr: "AUTOTEST_PATH=bin"
      - substr: "/src/foo-1.0/bin:\\$PATH $0"
  - id: shell-path-prepend-export
    desc: Prepends a directory ahead of PATH
    crit: notable
    conf: 0.7
    for: [shell]
    if:
      type: text
      regex: 'export\s+PATH=\S*:\$PATH'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
