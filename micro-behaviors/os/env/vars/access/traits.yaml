defaults:
  platforms: [windows, unix]
  for: [c, cpp, elf, pe]
traits:
  - id: getenv
    desc: getenv function (read environment variable)
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      regex: (^|\.)getenv$
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family::video-lib-marker
        - id: micro-behaviors/dylib/library/family::graphics-lib-marker
        - id: micro-behaviors/dylib/library/family::system-lib-marker
  - id: setenv
    desc: setenv function (set environment variable)
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: (^|\.)setenv$
  - id: putenv
    desc: putenv function (modify environment variable)
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: (^|\.)putenv$
  - id: unsetenv
    desc: unsetenv function (remove environment variable)
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: (^|\.)unsetenv$
  - id: js-process-env-write
    desc: JavaScript process.env assignment
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: process\.env\.\w+\s*=[^=]
  - id: js-process-env-spread
    desc: Spread of entire process.env into object
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\.\.\.\s*process\.env'
  - id: python-environ-iteration
    desc: Python environ iteration helpers
    crit: baseline
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: environ\.(items|values|keys)
  - id: go-environ-iteration
    desc: Go iterates over os.Environ()
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: text
      regex: 'range\s+os\.Environ\s*\(\s*\)'
  - id: dollar-home
    desc: $HOME variable reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: $HOME
  - id: path-env-var-direct
    desc: Direct PATH assignment (PATH= or PATH+=)
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      regex: (^|[^A-Z0-9_])PATH[+]?=[^=\s]
composite_rules:
  - id: env-access-comp
    desc: Environment variable access functions
    crit: baseline
    conf: 0.4
    any:
      - id: getenv
      - id: setenv
      - id: putenv
      - id: unsetenv
      - id: python-environ-iteration
  - id: set
    desc: Environment variable modification
    crit: baseline
    conf: 0.5
    any:
      - id: setenv
      - id: putenv
      - id: unsetenv
