defaults:
  platforms: [windows, unix]
  for: [c, cpp, elf, pe]
traits:
  - id: getenv
    desc: getenv function (read environment variable)
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      regex: (^|\.)getenv$
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
  - id: setenv
    desc: setenv function (set environment variable)
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: (^|\.)setenv$
  - id: putenv
    desc: putenv function (modify environment variable)
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: (^|\.)putenv$
  - id: unsetenv
    desc: "unsetenv func (remove env var)"
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: (^|\.)unsetenv$
  - id: js-process-env-write
    desc: JavaScript process.env assignment
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: process\.env\.\w+\s*=[^=]
  - id: js-process-env-optional-trim-read
    desc: JavaScript process.env optional trim read
    crit: baseline
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env\.[A-Z0-9_]+\?\.trim\(\)'
  - id: js-process-env-delete-or-restore
    desc: Conditional process.env delete/restore
    crit: baseline
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: 'delete process\.env\.[A-Z0-9_]+\s*:\s*process\.env\.'
  - id: js-process-env-word-assignment
    desc: JavaScript process.env word assignment
    crit: baseline
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env\.[A-Z0-9_]+\s*=\s*\w+'
  - id: js-process-env-spread
    desc: Spread of entire process.env into object
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\.\.\.\s*process\.env'
  - id: js-object-keys-env
    desc: JavaScript enumerates process.env keys
    crit: baseline
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: text
      substr: Object.keys(process.env
  - id: js-object-entries-env
    desc: JavaScript enumerates process.env entries
    crit: baseline
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: text
      substr: Object.entries(process.env
  - id: js-env-index-copy-to-object
    desc: JavaScript copies process.env entry
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: '\w+\s*\[\s*\w+\s*\]\s*=\s*process\.env\s*\[\s*\w+\s*\]'
  - id: python-environ-iteration
    desc: Python environ iteration helpers
    crit: baseline
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: environ\.(items|values|keys)
  - id: python-environ-items-loop
    desc: Python loops environ items
    crit: notable
    conf: 0.88
    for: [python]
    ref: sha256:7c8adc80c7efc628483693598c7827bbc1529a0e1fd87d7cdd5ff6af889c008f
    if:
      type: symbol
      kind: call
      exact: os.environ.items
  - id: python-environ-sensitive-filter
    desc: Python filters sensitive environment keys
    crit: notable
    conf: 0.86
    for: [python]
    ref: sha256:7c8adc80c7efc628483693598c7827bbc1529a0e1fd87d7cdd5ff6af889c008f
    if:
      type: text
      substr: sensitive_keywords = ["KEY", "TOKEN", "SECRET"
  - id: python-environ-copy-assignment
    desc: Python copies environment entry
    crit: component
    conf: 0.82
    for: [python]
    ref: sha256:7c8adc80c7efc628483693598c7827bbc1529a0e1fd87d7cdd5ff6af889c008f
    if:
      type: text
      substr: env_vars[key] = value
  - id: python-environ-dict
    desc: Python converts environ to dict
    crit: baseline
    conf: 0.7
    for: [python]
    if:
      type: text
      substr: dict(os.environ)
  - id: python-environ-string
    desc: Python converts environ to string
    crit: baseline
    conf: 0.7
    for: [python]
    if:
      type: text
      substr: str(os.environ)
  - id: rust-localappdata-env-var
    desc: Rust LOCALAPPDATA environment variable
    crit: baseline
    conf: 0.8
    for: [rust]
    if:
      type: text
      word: LOCALAPPDATA
  - id: go-environ-iteration
    desc: Go iterates over os.Environ()
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: text
      regex: 'range\s+os\.Environ\s*\(\s*\)'
  - id: dollar-home
    desc: $HOME variable reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: $HOME
  - id: js-process-env-home
    desc: process.env.HOME reference
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: process.env.HOME
  - id: path-env-var-direct
    desc: Direct PATH assignment (PATH= or PATH+=)
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      regex: (^|[^A-Z0-9_])PATH[+]?=[^=\s]
  - id: shell-export-env-assignments
    desc: Multiple shell environment exports
    crit: baseline
    conf: 0.72
    for: [shell]
    count_min: 2
    if:
      type: text
      regex: '^export\s+[A-Z0-9_]+\s*='
  - id: powershell-path-assignment
    desc: PowerShell PATH environment assignment
    crit: component
    conf: 0.82
    for: [scripts]
    if:
      type: text
      regex: '(?i)\$env:PATH\s*='
  - id: getenv-home
    desc: getenv HOME lookup
    crit: baseline
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      regex: getenv.{0,30}HOME
  - id: env-dot-home
    desc: env.HOME property reference
    crit: baseline
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: env.HOME
    not:
      - substr: Resolve ~ in path configs to env.HOME
      - substr: process.env.HOME
    unless:
      - id: metadata/file/catalog/identity/
composite_rules:
  - id: js-process-env-preserve-restore
    desc: JavaScript process.env preserve/restore
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    near_bytes: 500
    all:
      - id: js-process-env-optional-trim-read
      - id: js-process-env-delete-or-restore
      - id: js-process-env-word-assignment
  - id: env-access-comp
    desc: Environment variable access functions
    crit: baseline
    conf: 0.4
    any:
      - id: getenv
      - id: setenv
      - id: putenv
      - id: unsetenv
      - id: python-environ-iteration
      - id: python-environ-dict
      - id: python-environ-string
      - id: js-object-keys-env
      - id: js-object-entries-env
      - id: getenv-home
  - id: python-filtered-environ-copy
    desc: Python copies filtered environment values
    crit: notable
    conf: 0.9
    for: [python]
    ref: sha256:7c8adc80c7efc628483693598c7827bbc1529a0e1fd87d7cdd5ff6af889c008f
    all:
      - id: python-environ-items-loop
      - id: python-environ-sensitive-filter
      - id: python-environ-copy-assignment
  - id: set
    desc: Environment variable modification
    crit: baseline
    conf: 0.5
    any:
      - id: setenv
      - id: putenv
      - id: unsetenv
