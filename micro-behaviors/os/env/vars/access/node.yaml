defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell]
traits:
  - id: node-home-access
    desc: Node reads HOME directory environment variable
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: member
      exact: process.env.HOME
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: node-localappdata-access
    desc: Node reads Windows LOCALAPPDATA directory
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: member
      exact: process.env.LOCALAPPDATA
  - id: node-options-env
    desc: NODE_OPTIONS environment variable
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: symbol
      kind: member
      exact: process.env.NODE_OPTIONS
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: node-ld-preload-env
    desc: Node accesses LD_PRELOAD environment variable
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env\.LD_PRELOAD\s*=|["'']LD_PRELOAD["'']\s*:\s*["'']|\bLD_PRELOAD\s*=\s*["'']'
