defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  crit: notable
  conf: 0.8
traits:
  - id: shell-zsh
    desc: SHELL environment variable zsh marker
    if:
      type: text
      substr: SHELLzsh
  - id: guarded-shell-parameter-expansion
    desc: Guarded shell parameter expansion
    crit: baseline
    conf: 0.85
    for: [shell]
    platforms: [unix, android, ios]
    if:
      type: text
      regex: '\$\{[A-Za-z_][A-Za-z0-9_]*:[?-]'
    unless:
      - id: metadata/package/files/bsd::pkgsrc-maintainer-script
