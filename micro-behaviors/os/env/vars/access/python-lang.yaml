# Reads the LANG environment variable — neutral locale/env capability.
# Relocated from anti-analysis/sandbox-detect (locale-gate building block).
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: python-os-getenv-call
    desc: Python reads an environment variable
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '^os\.(getenv|environ\.get)$'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: python-lang-env-access
    desc: Python LANG environment access
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: LANG
