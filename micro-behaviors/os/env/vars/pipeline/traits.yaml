defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: notable
  conf: 0.85
traits:
  - id: shell-env-pipe
    desc: Shell pipes env listing to command
    if:
      type: text
      regex: '(?m)(^|[;&|][ \t]*)\b(env|printenv)\b[ \t]*\|'
    unless:
      - id: metadata/file/format::sourcemap-sources-content
