# CI-provided credential environment variables are normal integration points.
# They become credential-theft evidence only when paired with a second token or
# with a collection/exfiltration behavior in objectives/.
defaults:
  platforms: [unix, windows]
  for: [python, javascript, ruby, go]
  crit: notable
  conf: 0.9

traits:
  - id: circleci-token-env-read
    desc: Reads CIRCLECI_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}CIRCLECI_TOKEN'
  - id: circle-token-env-read
    desc: Reads CIRCLE_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}CIRCLE_TOKEN'
  - id: travis-token-env-read
    desc: Reads TRAVIS_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}TRAVIS_TOKEN'
  - id: jenkins-token-env-read
    desc: Reads JENKINS_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}JENKINS_TOKEN'
  - id: jenkins-api-token-env-read
    desc: Reads JENKINS_API_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}JENKINS_API_TOKEN'
  - id: gitlab-token-env-read
    desc: Reads GITLAB_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}GITLAB_TOKEN'
  - id: ci-job-token-python-read
    desc: Python reads GitLab CI job token
    for: [python]
    if:
      type: text
      regex: 'os\.(getenv\s*\(|environ\s*\[)[^\n]{0,48}CI_JOB_TOKEN'
  - id: ci-job-token-other-read
    desc: Reads GitLab CI job token environment variable
    for: [javascript, ruby, go]
    if:
      type: text
      regex: '(getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}CI_JOB_TOKEN'
  - id: gitlab-private-token-env-read
    desc: Reads GITLAB_PRIVATE_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}GITLAB_PRIVATE_TOKEN'
  - id: codecov-token-env-read
    desc: Reads CODECOV_TOKEN environment variable
    if:
      type: text
      regex: '(os\.getenv\s*\(|getenv\s*\(|ENV\s*\[|process\.env\.)[^\n]{0,48}CODECOV_TOKEN'
