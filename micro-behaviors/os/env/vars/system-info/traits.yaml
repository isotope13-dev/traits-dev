defaults:
  for: [binaries, shell, python]
  crit: baseline
  conf: 0.5
  platforms:
  - unix
  - windows
traits:
- id: hostname-var
  desc: HOSTNAME environment variable
  platforms:
  - unix
  if:
    type: text
    word: HOSTNAME
- id: shell-var
  desc: SHELL environment variable
  platforms:
  - unix
  if:
    type: text
    word: SHELL
- id: term-var
  desc: TERM environment variable
  platforms:
  - unix
  if:
    type: text
    word: TERM
- id: pwd-var
  desc: PWD environment variable
  platforms:
  - unix
  if:
    type: text
    word: PWD
- id: oldpwd-var
  desc: OLDPWD environment variable
  platforms:
  - unix
  if:
    type: text
    word: OLDPWD
- id: node-env-var
  desc: NODE_ENV runtime mode variable
  for: [scripts, binaries]
  if:
    type: text
    word: NODE_ENV
- id: systemroot-var
  desc: SYSTEMROOT environment variable
  platforms: [windows]
  if:
    type: text
    substr: SystemRoot
    case_insensitive: true
- id: windir-var
  desc: windir environment variable
  platforms: [windows]
  if:
    type: text
    word: windir
    case_insensitive: true
- id: computername-var
  desc: COMPUTERNAME environment variable
  platforms: [windows]
  if:
    type: text
    substr: COMPUTERNAME
    case_insensitive: true
- id: number-of-processors-var
  desc: NUMBER_OF_PROCESSORS environment variable
  platforms: [windows]
  if:
    type: text
    substr: NUMBER_OF_PROCESSORS
    case_insensitive: true
- id: windows-env-var-cluster-string--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [pe, dll]
  size_max: 5242880
  platforms: [windows]
  if:
    type: text
    regex: (USERPROFILE|LOCALAPPDATA).{0,8}(USERPROFILE|LOCALAPPDATA)
  count_max: 1007240
