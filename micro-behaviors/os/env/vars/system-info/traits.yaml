defaults:
  for: [binaries, shell, python]
  crit: baseline
  conf: 0.5
  platforms:
  - unix
  - windows
traits:
- id: hostname-var
  desc: HOSTNAME environment variable
  platforms:
  - unix
  if:
    type: text
    exact: HOSTNAME
- id: shell-var
  desc: SHELL environment variable
  platforms:
  - unix
  if:
    type: text
    exact: SHELL
- id: term-var
  desc: TERM environment variable
  platforms:
  - unix
  if:
    type: text
    exact: TERM
- id: pwd-var
  desc: PWD environment variable
  platforms:
  - unix
  if:
    type: text
    exact: PWD
- id: oldpwd-var
  desc: OLDPWD environment variable
  platforms:
  - unix
  if:
    type: text
    exact: OLDPWD
- id: systemroot-var
  desc: SYSTEMROOT environment variable
  platforms: [windows]
  if:
    type: text
    substr: SystemRoot
    case_insensitive: true
- id: windir-var
  desc: windir environment variable
  platforms: [windows]
  if:
    type: text
    substr: windir
    case_insensitive: true
- id: computername-var
  desc: COMPUTERNAME environment variable
  platforms: [windows]
  if:
    type: text
    substr: COMPUTERNAME
    case_insensitive: true
- id: number-of-processors-var
  desc: NUMBER_OF_PROCESSORS environment variable
  platforms: [windows]
  if:
    type: text
    substr: NUMBER_OF_PROCESSORS
    case_insensitive: true
- id: os-var
  desc: OS environment variable
  platforms: [windows]
  if:
    type: text
    exact: OS
- id: windows-env-var-cluster-string--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [pe, dll]
  size_max: 5242880
  platforms: [windows]
  if:
    type: text
    regex: (USERPROFILE|LOCALAPPDATA).{0,8}(USERPROFILE|LOCALAPPDATA)
- id: windows-env-var-cluster-string--rx-2
