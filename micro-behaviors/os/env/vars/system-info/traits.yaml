# System Information Environment Variables
# Individual traits for system-related environment variables
defaults:
  for: [shell, python, javascript, powershell, pe, elf]
  crit: baseline
  conf: 0.5
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: hostname-var
    desc: HOSTNAME environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "HOSTNAME"
  - id: shell-var
    desc: SHELL environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "SHELL"
  - id: term-var
    desc: TERM environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "TERM"
  - id: pwd-var
    desc: PWD environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "PWD"
  - id: oldpwd-var
    desc: OLDPWD environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "OLDPWD"
  - id: systemroot-var
    desc: SYSTEMROOT environment variable
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string_value
      exact: "SYSTEMROOT"
  - id: windir-var
    desc: WINDIR environment variable
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string_value
      exact: "WINDIR"
