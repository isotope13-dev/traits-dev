defaults:
  for: [binaries, scripts]
  crit: baseline
  conf: 0.5
  platforms:
    - unix
    - windows
traits:
  - id: hostname-var
    desc: HOSTNAME environment variable
    platforms:
      - unix
    if:
      type: text
      exact: HOSTNAME
  - id: shell-var
    desc: SHELL environment variable
    platforms:
      - unix
    if:
      type: text
      exact: SHELL
  - id: term-var
    desc: TERM environment variable
    platforms:
      - unix
    if:
      type: text
      exact: TERM
  - id: pwd-var
    desc: PWD environment variable
    platforms:
      - unix
    if:
      type: text
      exact: PWD
  - id: oldpwd-var
    desc: OLDPWD environment variable
    platforms:
      - unix
    if:
      type: text
      exact: OLDPWD
  - id: systemroot-var
    desc: SYSTEMROOT environment variable
    platforms:
      - windows
    if:
      type: text
      exact: SYSTEMROOT
  - id: windir-var
    desc: WINDIR environment variable
    platforms:
      - windows
    if:
      type: text
      exact: WINDIR
