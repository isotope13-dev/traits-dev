# CI/CD Environment Variable Targeting - JavaScript/Node.js
# Detects access to CI/CD runner environment variables in npm packages
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.75
traits:
  # GitHub Actions runner variables via process.env
  - id: process-env-runner-name
    desc: process.env.RUNNER_NAME access
    conf: 0.85
    if:
      type: text
      regex: "process\\.env\\.RUNNER_NAME"
  - id: process-env-runner-os
    desc: Reads RUNNER_OS CI variable
    conf: 0.8
    if:
      type: text
      regex: "process\\.env\\.RUNNER_OS"
  - id: process-env-github-actions
    desc: Reads GITHUB_ACTIONS CI variable
    conf: 0.8
    if:
      type: text
      regex: "process\\.env\\.GITHUB_ACTIONS"
  - id: process-env-github-repository
    desc: Reads GITHUB_REPOSITORY CI variable
    conf: 0.78
    if:
      type: text
      regex: "process\\.env\\.GITHUB_REPOSITORY"
  - id: process-env-github-run-id
    desc: Reads GITHUB_RUN_ID CI variable
    conf: 0.78
    if:
      type: symbol
      kind: member
      exact: process.env.GITHUB_RUN_ID
  - id: process-env-ci-job-id
    desc: Reads CI_JOB_ID CI variable
    conf: 0.78
    if:
      type: symbol
      kind: member
      exact: process.env.CI_JOB_ID
  - id: process-env-ci-project-name
    desc: Reads CI_PROJECT_NAME CI variable
    conf: 0.78
    if:
      type: symbol
      kind: member
      exact: process.env.CI_PROJECT_NAME
  - id: process-env-ci
    desc: Reads CI environment flag
    conf: 0.75
    if:
      type: text
      regex: "process\\.env\\.CI\\b"
  - id: process-env-jenkins-prefix
    desc: Reads Jenkins CI environment variables
    conf: 0.8
    if:
      type: text
      substr: process.env.JENKINS_
  # Bracket notation access (evasion technique)
  - id: process-env-bracket-runner
    desc: process.env bracket access for runner vars
    conf: 0.85
    if:
      type: text
      regex: "process\\.env\\[[\"']RUNNER_"
  - id: process-env-bracket-github
    desc: process.env bracket access for github vars
    conf: 0.8
    if:
      type: text
      regex: "process\\.env\\[[\"']GITHUB_"
  - id: github-actions-gated-fetch
    desc: CI variable near JavaScript fetch call
    conf: 0.9
    if:
      type: text
      regex: 'GITHUB_ACTIONS[\\s\\S]{0,200}\\bfetch\\s*\\('
