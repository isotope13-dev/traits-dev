defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.75
traits:
  - id: runner-name
    desc: RUNNER_NAME environment variable access
    conf: 0.85
    if:
      type: text
      exact: RUNNER_NAME
  - id: runner-os
    desc: RUNNER_OS environment variable access
    conf: 0.8
    if:
      type: text
      exact: RUNNER_OS
  - id: runner-arch
    desc: RUNNER_ARCH environment variable access
    conf: 0.8
    if:
      type: text
      exact: RUNNER_ARCH
  - id: runner-temp
    desc: RUNNER_TEMP environment variable access
    conf: 0.75
    if:
      type: text
      exact: RUNNER_TEMP
  - id: github-actor
    desc: GITHUB_ACTOR environment variable
    conf: 0.7
    if:
      type: text
      exact: GITHUB_ACTOR
  - id: github-repository
    desc: GITHUB_REPOSITORY environment variable
    conf: 0.7
    if:
      type: text
      exact: GITHUB_REPOSITORY
  - id: github-workflow
    desc: GITHUB_WORKFLOW environment variable
    conf: 0.7
    if:
      type: text
      exact: GITHUB_WORKFLOW
  - id: github-actions-flag
    desc: GITHUB_ACTIONS runtime flag
    conf: 0.85
    for: [shell, python, javascript, typescript, ruby, go, binaries]
    if:
      type: text
      word: GITHUB_ACTIONS
  - id: github-env-file
    desc: GITHUB_ENV environment file
    conf: 0.85
    for: [shell, python, javascript, typescript, ruby, go, binaries]
    if:
      type: text
      regex: '\bGITHUB_ENV\b|["`]GITHUB["`]\s*,\s*["`]_ENV["`]'
  - id: github-path-file
    desc: GITHUB_PATH environment file
    conf: 0.85
    for: [shell, python, javascript, typescript, ruby, go, binaries]
    if:
      type: text
      regex: '\bGITHUB_PATH\b|["`]GITHUB["`]\s*,\s*["`]_PATH["`]'
composite_rules:
  - id: github-context-access
    desc: GitHub Actions context access
    crit: notable
    conf: 0.8
    any:
      - id: github-actor
      - id: github-repository
      - id: github-workflow
