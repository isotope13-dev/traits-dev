# CI/CD Environment Variable Targeting - Shell
# Detects access to CI/CD runner environment variables in shell scripts
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [unix, android, ios]
  for: [shell]
  crit: notable
  conf: 0.75
traits:
  # GitHub Actions runner variables
- id: sh-runner-name
  desc: $RUNNER_NAME shell environment access
  conf: 0.85
  if:
    type: text
    regex: "\\$\\{?RUNNER_NAME\\}?"
- id: sh-runner-os
  desc: $RUNNER_OS shell environment access
  conf: 0.8
  if:
    type: text
    regex: "\\$\\{?RUNNER_OS\\}?"
- id: sh-github-actions
  desc: $GITHUB_ACTIONS shell environment access
  conf: 0.8
  if:
    type: text
    regex: "\\$\\{?GITHUB_ACTIONS\\}?"
- id: sh-github-actor
  desc: $GITHUB_ACTOR shell environment access
  conf: 0.75
  if:
    type: text
    regex: "\\$\\{?GITHUB_ACTOR\\}?"
- id: sh-github-repository
  desc: $GITHUB_REPOSITORY shell env access
  conf: 0.75
  if:
    type: text
    regex: "\\$\\{?GITHUB_REPOSITORY\\}?"
  # CI detection variables
- id: sh-ci-variable
  desc: $CI shell environment variable
  conf: 0.7
  if:
    type: text
    regex: "\\$CI\\b|\\$\\{CI\\}"
  # System info collection
- id: sh-uname-fingerprint
  desc: uname command for fingerprinting
  conf: 0.8
  unless:
  - id: metadata/package/testing/presence::linux-kselftest-shell
  - type: basename
    regex: '(^|[!/])configure$'
  - type: text
    substr: "case $(uname -s) in"
  if:
    type: text
    regex: "\\$\\(uname\\s+-[a-z]+\\)|`uname\\s+-[a-z]+`"
- id: sh-hostname-command
  desc: Shell hostname command substitution
  conf: 0.75
  if:
    type: text
    regex: "\\$\\(hostname\\)|`hostname`"
- id: sh-whoami-command--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: "(^|[\\n;&|`$({])\\s*whoami(\\s|[;&|)]|$)"
  count_max: 1007674
composite_rules:
- id: shell-system-fingerprinting
  desc: System fingerprinting shell commands
  crit: notable
  conf: 0.8
  needs: 2
  any:
  - id: sh-uname-fingerprint
  - id: sh-hostname-command
  - id: sh-whoami-command
  - id: sh-ci-variable
- id: sh-whoami-command
  desc: whoami command
  crit: baseline
  conf: 0.75
  any:
  - id: sh-whoami-command--rx-3
  unless:
  - id: metadata/package/testing/harness::is-test
