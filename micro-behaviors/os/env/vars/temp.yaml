defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
traits:
  - id: temp-var
    desc: TEMP environment variable
    platforms:
      - windows
    if:
      type: text
      exact: TEMP
  - id: tmp-var
    desc: TMP environment variable
    if:
      type: text
      exact: TMP
  - id: tmpdir-var
    desc: TMPDIR environment variable
    platforms:
      - unix
    if:
      type: text
      exact: TMPDIR
  - id: tempdir-var
    desc: TEMPDIR environment variable
    if:
      type: text
      exact: TEMPDIR
