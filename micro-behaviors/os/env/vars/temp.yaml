defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
traits:
  - id: temp-var
    desc: TEMP environment variable
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: text
      exact: TEMP
  - id: tmp-var
    desc: TMP environment variable
    platforms:
      - windows
      - linux
      - unix
    if:
      type: text
      exact: TMP
  - id: tmpdir-var
    desc: TMPDIR environment variable
    platforms:
      - linux
      - unix
      - macos
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      exact: TMPDIR
  - id: tempdir-var
    desc: TEMPDIR environment variable
    if:
      type: text
      exact: TEMPDIR
