# Temporary Directory Environment Variables
# Individual traits for temp directory env vars
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
traits:
  - id: temp-var
    desc: TEMP environment variable
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string_value
      exact: "TEMP"
  - id: tmp-var
    desc: TMP environment variable
    platforms: [windows, linux, unix]
    if:
      type: string_value
      exact: "TMP"
  - id: tmpdir-var
    desc: TMPDIR environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "TMPDIR"
  - id: tempdir-var
    desc: TEMPDIR environment variable
    if:
      type: string_value
      exact: "TEMPDIR"
