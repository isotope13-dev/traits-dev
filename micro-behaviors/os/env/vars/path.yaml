defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
traits:
  - id: path-var
    desc: PATH environment variable
    if:
      type: text
      exact: PATH
  - id: path-prepend-tmp
    desc: PATH variable prepended with /tmp
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (PATH=/tmp|export PATH=/tmp|export\s+PATH=/tmp)
    not:
      - substr: "AUTOTEST_PATH=bin"
      - substr: "/src/foo-1.0/bin:\\$PATH $0"
