defaults:
  for:
    - shell
    - python
    - javascript
    - elf
  crit: baseline
  conf: 0.7
  platforms:
    - linux
    - unix
    - macos
traits:
  - id: display-var
    desc: DISPLAY environment variable (X11)
    if:
      type: text
      exact: DISPLAY
  - id: wayland-display-var
    desc: WAYLAND_DISPLAY environment variable
    if:
      type: text
      exact: WAYLAND_DISPLAY
composite_rules:
  - id: display-access
    desc: Accesses display environment variable
    crit: baseline
    conf: 0.9
    any:
      - id: display-var
      - id: wayland-display-var
