defaults:
  platforms: [unix]
  for: [shell]
  mbc: F0005
  attack: T1070.003

traits:
  - id: prompt-command-unset
    desc: Unsets the PROMPT_COMMAND shell variable
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: unset PROMPT_COMMAND

  - id: prompt-command-empty
    desc: Assigns an empty PROMPT_COMMAND value
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "PROMPT_COMMAND=''"

  - id: prompt-command-empty-assignment
    desc: Clears PROMPT_COMMAND with an empty assignment
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'PROMPT_COMMAND=("")?[ \t]*(;|[\r\n]|$)'
