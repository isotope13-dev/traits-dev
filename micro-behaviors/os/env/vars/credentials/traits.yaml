defaults:
  platforms:
    - unix
    - windows
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.7
traits:
  - id: python-environ-credential-filter
    desc: Filters Python env names by credential terms
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'in\s+os\.environ[\s\S]{0,100}["''](SECRET|TOKEN|KEY)'

  - id: javascript-private-key-environment-variable
    desc: JavaScript private-key environment variable
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env(\.[A-Z0-9_]*PRIVATE_KEY|\[\s*["''][A-Z0-9_]*PRIVATE_KEY["'']\s*\])'

  - id: ssh-private-key-dup
    desc: SSH_PRIVATE_KEY environment variable
    if:
      type: text
      word: SSH_PRIVATE_KEY
  - id: jwt-secret
    desc: Reads JWT_SECRET from the process environment
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env(\.JWT_SECRET|\[\s*["'']JWT_SECRET["'']\s*\])'
  - id: session-secret
    desc: SESSION_SECRET environment variable
    if:
      type: text
      word: SESSION_SECRET
  - id: cookie-secret
    desc: COOKIE_SECRET environment variable
    if:
      type: text
      word: COOKIE_SECRET
  - id: root-password
    desc: ROOT_PASSWORD environment variable
    if:
      type: text
      word: ROOT_PASSWORD
  - id: admin-password
    desc: ADMIN_PASSWORD environment variable
    if:
      type: text
      word: ADMIN_PASSWORD
  - id: smbhash
    desc: SMBHASH environment variable
    crit: suspicious
    conf: 0.9
    attack: T1550.002
    if:
      type: text
      word: SMBHASH
      section: .rodata
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: service-account-key
    desc: SERVICE_ACCOUNT_KEY environment variable
    if:
      type: text
      word: SERVICE_ACCOUNT_KEY
  - id: aws-env-secret-vars
    desc: AWS credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^AWS_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: aws-secret-access-key-var
    # A bare name can occur in documentation or SDK guidance; it does not
    # establish that the program reads the credential.  Keep it as incomplete
    # evidence and let the access-specific atom below carry the behavior.
    desc: AWS secret-key environment name reference
    crit: component
    conf: 0.86
    if:
      type: text
      word: AWS_SECRET_ACCESS_KEY

  - id: python-aws-secret-access-key-env-read
    desc: Python reads AWS secret-key environment variable
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '^(os\.)?(getenv|environ\.get)$'
      arg:
        kind: string
        exact: AWS_SECRET_ACCESS_KEY

  - id: python-aws-secret-access-key-environ-read
    desc: Python indexes AWS secret-key env
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'os\.environ\s*\[\s*["'']AWS_SECRET_ACCESS_KEY["'']\s*\]'
  - id: shell-embedded-node-credential-env-read
    desc: Embedded credential env access
    crit: notable
    conf: 0.95
    for: [shell]
    if:
      type: text
      substr: process.env.AWS_SECRET_ACCESS_KEY
  - id: shell-embedded-node-npm-token-read
    desc: Embedded NPM token env access
    crit: notable
    conf: 0.95
    for: [shell]
    if:
      type: text
      substr: process.env.NPM_TOKEN
  - id: github-credentials
    desc: GitHub credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^(GITHUB_|GH_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: gitlab-credentials
    desc: GitLab credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^GITLAB_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: azure-credentials-dup
    desc: Azure credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^AZURE_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: google-credentials
    desc: Google credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^GOOGLE_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: docker-credentials
    desc: Docker credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^DOCKER_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-generic
    desc: Generic database credential variables
    conf: 0.8
    if:
      type: text
      regex: ^(DATABASE_|DB_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-redis
    desc: Redis database credential variables
    conf: 0.8
    if:
      type: text
      regex: ^REDIS_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-sql
    desc: SQL database credential variables
    conf: 0.8
    if:
      type: text
      regex: ^(POSTGRES_|MYSQL_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-nosql
    desc: MongoDB credential variables
    conf: 0.8
    if:
      type: text
      regex: ^MONGO_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: package-registry-credentials-npm
    desc: NPM/PyPI registry credentials
    conf: 0.7
    if:
      type: text
      regex: ^(NPM_|PYPI_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: package-registry-credentials-enterprise
    desc: Enterprise registry credentials
    conf: 0.7
    if:
      type: text
      regex: ^(NUGET_|ARTIFACTORY_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: chat-api-credentials
    desc: Chat/messaging API credentials
    conf: 0.7
    if:
      type: text
      regex: ^(SLACK_|DISCORD_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: ai-api-credentials
    desc: AI service API credentials
    conf: 0.7
    if:
      type: text
      regex: ^(OPENAI_|ANTHROPIC_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: payment-api-credentials-stripe
    desc: Stripe payment API credentials
    conf: 0.7
    if:
      type: text
      regex: ^STRIPE_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: payment-api-credentials-messaging
    desc: Messaging service API credentials
    conf: 0.7
    if:
      type: text
      regex: ^(TWILIO_|SENDGRID_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: security-tool-credentials-scanning
    desc: Security scanning tool credentials
    conf: 0.7
    if:
      type: text
      regex: ^(SONAR_|SNYK_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: security-tool-credentials-vault
    desc: Vault/secrets management credentials
    conf: 0.7
    if:
      type: text
      regex: ^(VAULT_|HASHICORP_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: service-credential-env-var
    desc: Reads secret-like credential env variable
    conf: 0.86
    for: [javascript, typescript]
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    if:
      type: text
      regex: 'process\.env\.[A-Z][A-Z0-9_]{0,40}_(PASSWORD|CLIENT_SECRET|API_KEY|AUTH_TOKEN)\b'
      not:
        - substr: CURLOPT_
        - substr: CURLINFO_
        # Public build-time variables are intentionally exposed to browser
        # bundles; they are not service-secret accesses.
        - regex: 'process\.env\.(NEXT_PUBLIC_|PUBLIC_|VITE_|EXPO_PUBLIC_|REACT_APP_)'
    unless:
      - id: metadata/lang/source::codegen-source-path
      - id: well-known/app/google-web::official-google-web-asset

  - id: process-env-token-name
    desc: JavaScript process.env credential token variable
    crit: notable
    if:
      type: text
      # Require the singular TOKEN word so settings such as *_TOKENS are not
      # mistaken for credential reads.
      regex: 'process\.env(\.[A-Z0-9_]*TOKEN\b|\[[^]]*TOKEN\b[^]]*\])'
  - id: posix-env-token-name
    desc: Reads a TOKEN-named environment variable
    crit: notable
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '^(os\.)?(getenv|environ\.get)$'
      arg:
        kind: string
        regex: '(?i)\b[A-Z0-9_]*TOKEN[A-Z0-9_]*\b'
  - id: system-env-token-name
    desc: System environment TOKEN variable
    crit: notable
    if:
      type: text
      regex: '(System\.getenv|GetEnvironmentVariable)\s*\([^)]{0,60}TOKEN'
  - id: keyword-secret
    desc: SECRET-named environment variable
    crit: notable
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '^(os\.getenv|os\.environ\.get)$'
      arg:
        kind: string
        substr: SECRET
  - id: keyword-auth
    desc: Python reads AUTH-named environment variable
    crit: notable
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: 'os\.(getenv|environ\.get)\s*\([^)]{0,60}AUTH'
  - id: keyword-pwd
    desc: Secret-bearing PWD environment name
    crit: notable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}PWD[A-Z0-9_]{0,48}'
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
  - id: keyword-cred
    desc: Secret-bearing CRED environment name
    crit: notable
    if:
      type: string_literal
      regex: '(^|_)CRED(ENTIALS)?(_|$)'
  - id: composer-auth-var-name
    desc: Composer credential environment variable
    conf: 0.9
    if:
      type: literal
      exact: COMPOSER_AUTH
  - id: python-github-token-env-read
    desc: Python reads GITHUB_TOKEN environment variable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '^(os\.)?(getenv|environ\.get)$'
      arg:
        kind: string
        exact: GITHUB_TOKEN
  - id: python-gh-token-env-read
    desc: Python reads GH_TOKEN environment variable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '^(os\.)?(getenv|environ\.get)$'
      arg:
        kind: string
        exact: GH_TOKEN

composite_rules:
  - id: python-sensitive-env-read
    desc: Python reads secret-bearing environment variable
    crit: notable
    conf: 0.9
    for: [python]
    any:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: micro-behaviors/os/env/access::os-environ-symbol
    all:
      - id: micro-behaviors/os/env/vars/credentials/
    near_lines: 4
