defaults:
  platforms:
    - unix
    - windows
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.7
traits:
  - id: ssh-private-key-dup
    desc: SSH_PRIVATE_KEY environment variable
    if:
      type: text
      word: SSH_PRIVATE_KEY
  - id: jwt-secret
    desc: JWT_SECRET environment variable
    if:
      type: text
      word: JWT_SECRET
  - id: session-secret
    desc: SESSION_SECRET environment variable
    if:
      type: text
      word: SESSION_SECRET
  - id: cookie-secret
    desc: COOKIE_SECRET environment variable
    if:
      type: text
      word: COOKIE_SECRET
  - id: root-password
    desc: ROOT_PASSWORD environment variable
    if:
      type: text
      word: ROOT_PASSWORD
  - id: admin-password
    desc: ADMIN_PASSWORD environment variable
    if:
      type: text
      word: ADMIN_PASSWORD
  - id: smbhash
    desc: SMBHASH environment variable
    crit: suspicious
    conf: 0.9
    attack: T1550.002
    if:
      type: text
      word: SMBHASH
      section: .rodata
  - id: service-account-key
    desc: SERVICE_ACCOUNT_KEY environment variable
    if:
      type: text
      word: SERVICE_ACCOUNT_KEY
  - id: aws-env-secret-vars
    desc: AWS credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^AWS_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: github-credentials
    desc: GitHub credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^(GITHUB_|GH_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: gitlab-credentials
    desc: GitLab credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^GITLAB_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: azure-credentials-dup
    desc: Azure credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^AZURE_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: google-credentials
