defaults:
  platforms:
    - unix
    - windows
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.7
traits:
  - id: javascript-private-key-environment-variable
    desc: JavaScript private-key environment variable
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env(\.[A-Z0-9_]*PRIVATE_KEY|\[\s*["''][A-Z0-9_]*PRIVATE_KEY["'']\s*\])'

  - id: ssh-private-key-dup
    desc: SSH_PRIVATE_KEY environment variable
    if:
      type: text
      word: SSH_PRIVATE_KEY
  - id: jwt-secret
    desc: JWT_SECRET environment variable
    if:
      type: text
      word: JWT_SECRET
  - id: session-secret
    desc: SESSION_SECRET environment variable
    if:
      type: text
      word: SESSION_SECRET
  - id: cookie-secret
    desc: COOKIE_SECRET environment variable
    if:
      type: text
      word: COOKIE_SECRET
  - id: root-password
    desc: ROOT_PASSWORD environment variable
    if:
      type: text
      word: ROOT_PASSWORD
  - id: admin-password
    desc: ADMIN_PASSWORD environment variable
    if:
      type: text
      word: ADMIN_PASSWORD
  - id: smbhash
    desc: SMBHASH environment variable
    crit: suspicious
    conf: 0.9
    attack: T1550.002
    if:
      type: text
      word: SMBHASH
      section: .rodata
  - id: service-account-key
    desc: SERVICE_ACCOUNT_KEY environment variable
    if:
      type: text
      word: SERVICE_ACCOUNT_KEY
  - id: aws-env-secret-vars
    desc: AWS credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^AWS_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: aws-secret-access-key-var
    desc: AWS_SECRET_ACCESS_KEY environment variable
    conf: 0.86
    if:
      type: text
      word: AWS_SECRET_ACCESS_KEY
  - id: github-credentials
    desc: GitHub credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^(GITHUB_|GH_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: gitlab-credentials
    desc: GitLab credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^GITLAB_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: azure-credentials-dup
    desc: Azure credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^AZURE_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: google-credentials
    desc: Google credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^GOOGLE_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: docker-credentials
    desc: Docker credential environment variables
    conf: 0.8
    if:
      type: text
      regex: ^DOCKER_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-generic
    desc: Generic database credential variables
    conf: 0.8
    if:
      type: text
      regex: ^(DATABASE_|DB_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-redis
    desc: Redis database credential variables
    conf: 0.8
    if:
      type: text
      regex: ^REDIS_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-sql
    desc: SQL database credential variables
    conf: 0.8
    if:
      type: text
      regex: ^(POSTGRES_|MYSQL_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: database-credentials-nosql
    desc: MongoDB credential variables
    conf: 0.8
    if:
      type: text
      regex: ^MONGO_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: package-registry-credentials-npm
    desc: NPM/PyPI registry credentials
    conf: 0.7
    if:
      type: text
      regex: ^(NPM_|PYPI_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: package-registry-credentials-enterprise
    desc: Enterprise registry credentials
    conf: 0.7
    if:
      type: text
      regex: ^(NUGET_|ARTIFACTORY_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: chat-api-credentials
    desc: Chat/messaging API credentials
    conf: 0.7
    if:
      type: text
      regex: ^(SLACK_|DISCORD_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: ai-api-credentials
    desc: AI service API credentials
    conf: 0.7
    if:
      type: text
      regex: ^(OPENAI_|ANTHROPIC_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: payment-api-credentials-stripe
    desc: Stripe payment API credentials
    conf: 0.7
    if:
      type: text
      regex: ^STRIPE_.{0,50}_(TOKEN|KEY|SECRET)$
  - id: payment-api-credentials-messaging
    desc: Messaging service API credentials
    conf: 0.7
    if:
      type: text
      regex: ^(TWILIO_|SENDGRID_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: security-tool-credentials-scanning
    desc: Security scanning tool credentials
    conf: 0.7
    if:
      type: text
      regex: ^(SONAR_|SNYK_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: security-tool-credentials-vault
    desc: Vault/secrets management credentials
    conf: 0.7
    if:
      type: text
      regex: ^(VAULT_|HASHICORP_).{0,50}_(TOKEN|KEY|SECRET)$
  - id: service-credential-env-var
    desc: JavaScript service credential env access
    conf: 0.86
    for: [javascript, typescript]
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    if:
      type: text
      regex: 'process\.env\.[A-Z][A-Z0-9_]{0,40}_(PASSWORD|CLIENT_SECRET|API_KEY|AUTH_TOKEN)\b'
      not:
        - substr: CURLOPT_
        - substr: CURLINFO_
    unless:
      - id: metadata/lang/source::codegen-source-path
      - id: well-known/app/google-web::official-google-web-asset

  - id: process-env-token-name
    desc: JavaScript process.env TOKEN variable
    crit: notable
    if:
      type: text
      regex: 'process\.env(\.[A-Z0-9_]*TOKEN[A-Z0-9_]*|\[[^]]*TOKEN[^]]*\])'
  - id: posix-env-token-name
    desc: Credential-like TOKEN environment variable name
    crit: notable
    if:
      type: text
      regex: 'os\.(environ|getenv)[^\n]{0,50}\b[A-Z0-9_]*TOKEN[A-Z0-9_]*\b'
  - id: system-env-token-name
    desc: System environment TOKEN variable
    crit: notable
    if:
      type: text
      regex: '(System\.getenv|GetEnvironmentVariable)\s*\([^)]{0,60}TOKEN'
  - id: keyword-secret
    desc: Secret-bearing SECRET environment name
    crit: notable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}SECRET[A-Z0-9_]{0,48}'
  - id: keyword-auth
    desc: Secret-bearing AUTH environment name
    crit: notable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}AUTH[A-Z0-9_]{0,48}'
  - id: keyword-pass
    desc: Secret-bearing PASSWORD environment name
    crit: notable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}(PASSWORD|PASS)(_[A-Z0-9_]{1,48})?\b'
  - id: keyword-pwd
    desc: Secret-bearing PWD environment name
    crit: notable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}PWD[A-Z0-9_]{0,48}'
  - id: keyword-cred
    desc: Secret-bearing CRED environment name
    crit: notable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}CRED(ENTIALS)?[A-Z0-9_]{0,48}'

composite_rules:
  - id: python-sensitive-env-read
    desc: Python reads secret-bearing environment variable
    crit: notable
    conf: 0.9
    for: [python]
    any:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: micro-behaviors/os/env/access::os-environ-symbol
    all:
      - id: micro-behaviors/os/env/vars/credentials/
    near_lines: 4
