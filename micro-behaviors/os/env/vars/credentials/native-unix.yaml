defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]

traits:
  - id: native-password-environment-name
    desc: Password env name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_(PASSWORD|PASSWD|PASS)\b'
  - id: native-token-environment-name
    desc: Token env name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_(TOKEN|ACCESS_TOKEN|AUTH_TOKEN)\b'
  - id: native-secret-environment-name
    desc: Secret-key env name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_(SECRET_KEY|ACCESS_KEY|CLIENT_SECRET)\b'
  - id: native-api-key-environment-name
    desc: API key env name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_API_KEY\b'

composite_rules:
  - id: native-credential-environment-names
    desc: Multiple credential environment names
    crit: notable
    conf: 0.9
    any:
      - id: native-password-environment-name
      - id: native-token-environment-name
      - id: native-secret-environment-name
      - id: native-api-key-environment-name
    needs: 3
