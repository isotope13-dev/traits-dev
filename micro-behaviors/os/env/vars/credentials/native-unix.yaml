defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]

traits:
  - id: native-password-like-identifier
    desc: Password-like identifier string in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_(PASSWORD|PASSWD|PASS)\b'
      # GLib/libsoup and similar libraries use all-caps names for API
      # constants (for example G_*_PASSWORD and SOUP_*_PASSWORD). Those
      # strings are not environment-variable names and must not feed the
      # credential-harvesting composite merely because a native binary also
      # imports getenv.
      not:
        - regex: '^(G|SOUP|NICE|SSL|TLS|GLIB|GIO)_[A-Z0-9_]+$'
  - id: native-token-like-identifier
    desc: Token-like identifier string in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_(TOKEN|ACCESS_TOKEN|AUTH_TOKEN)\b'
      not:
        - regex: '^(G|SOUP|NICE|SSL|TLS|GLIB|GIO)_[A-Z0-9_]+$'
  - id: native-secret-like-identifier
    desc: Secret-key-like identifier string in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_(SECRET_KEY|ACCESS_KEY|CLIENT_SECRET)\b'
      not:
        - regex: '^(G|SOUP|NICE|SSL|TLS|GLIB|GIO)_[A-Z0-9_]+$'
  - id: native-api-key-like-identifier
    desc: API-key-like identifier string in native code
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9_]*_API_KEY\b'
      not:
        - regex: '^(G|SOUP|NICE|SSL|TLS|GLIB|GIO)_[A-Z0-9_]+$'

composite_rules:
  - id: native-credential-like-identifiers
    desc: Multiple credential-like identifier strings in native code
    crit: notable
    conf: 0.9
    any:
      - id: native-password-like-identifier
      - id: native-token-like-identifier
      - id: native-secret-like-identifier
      - id: native-api-key-like-identifier
    needs: 3
