defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]

traits:
  - id: native-password-environment-name
    desc: PASSWORD env-name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      word: PASSWORD
  - id: native-token-environment-name
    desc: TOKEN env-name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      word: TOKEN
  - id: native-secret-environment-name
    desc: SECRET env-name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      word: SECRET
  - id: native-api-key-environment-name
    desc: API_KEY env-name in native code
    crit: component
    conf: 0.82
    if:
      type: text
      word: API_KEY

composite_rules:
  - id: native-credential-environment-names
    desc: Multiple credential environment names
    crit: notable
    conf: 0.9
    any:
      - id: native-password-environment-name
      - id: native-token-environment-name
      - id: native-secret-environment-name
      - id: native-api-key-environment-name
    needs: 3
