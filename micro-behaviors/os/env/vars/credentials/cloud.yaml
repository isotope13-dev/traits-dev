defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.95

traits:
  - id: azure-tenant-client-secret-env-names
    desc: Azure tenant/client-secret env names
    crit: notable
    conf: 0.94
    for: [go, elf]
    if:
      type: text
      regex: 'AZURE_TENANT_ID[\s\S]{0,120}AZURE_CLIENT_SECRET'

  - id: python-gcp-app-creds-env-read
    desc: Python reads GCP credentials env var
    if:
      type: symbol
      kind: member
      exact: os.environ.GOOGLE_APPLICATION_CREDENTIALS
  - id: python-gcp-service-account-env-read
    desc: Python reads GCP service-account env var
    if:
      type: text
      regex: '(getenv|environ).{0,30}GCP_SERVICE_ACCOUNT'
  - id: python-azure-client-secret-env-read
    desc: Python reads Azure client secret env var
    if:
      type: symbol
      kind: member
      exact: os.environ.AZURE_CLIENT_SECRET
