defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.95

traits:
  - id: npm-token-env-read
    desc: Reads NPM_TOKEN from JavaScript env
    if:
      type: text
      regex: 'process\s*\.\s*env\s*(\.\s*NPM_TOKEN\b|\[\s*["'']NPM_TOKEN["'']\s*\])'

  - id: node-auth-token-env-read
    desc: Reads NODE_AUTH_TOKEN from JavaScript env
    if:
      type: text
      regex: 'process\s*\.\s*env\s*(\.\s*NODE_AUTH_TOKEN\b|\[\s*["'']NODE_AUTH_TOKEN["'']\s*\])'

  - id: npm-auth-token-env-read
    desc: Reads NPM_AUTH_TOKEN from JavaScript env
    if:
      type: text
      regex: 'process\s*\.\s*env\s*(\.\s*NPM_AUTH_TOKEN\b|\[\s*["'']NPM_AUTH_TOKEN["'']\s*\])'
