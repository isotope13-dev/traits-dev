defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: google-cloud-credential-env-read
    desc: Reads Google credential environment variable
    if:
      type: text
      regex: 'process\.env\.GOOGLE_[A-Z0-9_]*(TOKEN|KEY|SECRET|CREDENTIALS?)\b'
    # GOOGLE_API_KEY is the ordinary API-key input used by Google client
    # libraries.  It is still covered by the generic credential-env and
    # Gemini service atoms, but it is not evidence of harvesting Google Cloud
    # account credentials for this objective.
    not:
      - regex: 'process\.env\.GOOGLE_API_KEY\b'
  - id: azure-cloud-credential-env-read
    desc: Reads Azure credential environment variable
    if:
      type: text
      regex: 'process\.env\.AZURE_[A-Z0-9_]*(TOKEN|KEY|SECRET|CREDENTIALS?)\b'
