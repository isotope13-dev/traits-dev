defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: google-cloud-credential-env-read
    desc: Reads Google credential environment variable
    if:
      type: text
      regex: 'process\.env\.GOOGLE_[A-Z0-9_]*(TOKEN|KEY|SECRET|CREDENTIALS?)\b'
  - id: azure-cloud-credential-env-read
    desc: Reads Azure credential environment variable
    if:
      type: text
      regex: 'process\.env\.AZURE_[A-Z0-9_]*(TOKEN|KEY|SECRET|CREDENTIALS?)\b'
