defaults:
  platforms: [unix, windows]
  for: [python]
traits:
- id: python-api-key-env-read
  desc: Python reads API key env vars
  crit: notable
  conf: 0.85
  if:
    type: symbol
    kind: call
    regex: '^(os\.)?(getenv|environ\.get)$'
    arg:
      kind: string
      regex: '(?i)(^|[_-])API[_-]?KEY($|[_-])'
- id: javascript-credential-env-read
  desc: JavaScript reads a credential env var
  crit: notable
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: 'process\.env\.[A-Z0-9_]*(API[_-]?KEY|TOKEN|SECRET|PASSWORD)[A-Z0-9_]*\b'
    case_insensitive: true
