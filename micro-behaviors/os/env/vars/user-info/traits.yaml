# User Information Environment Variables
# Individual traits for user-related environment variables
defaults:
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: user-var
    desc: USER environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "USER"
  - id: username-var
    desc: USERNAME environment variable
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string_value
      exact: "USERNAME"
  - id: logname-var
    desc: LOGNAME environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "LOGNAME"
  - id: home-var
    desc: HOME environment variable
    platforms: [linux, unix, macos]
    for: [shell, python, javascript, elf]
    if:
      type: string_value
      exact: "HOME"
  - id: userprofile-var
    desc: USERPROFILE environment variable
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string_value
      exact: "USERPROFILE"
  - id: homedrive-var
    desc: HOMEDRIVE environment variable
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string_value
      exact: "HOMEDRIVE"
  - id: homepath-var
    desc: HOMEPATH environment variable
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string_value
      exact: "HOMEPATH"
