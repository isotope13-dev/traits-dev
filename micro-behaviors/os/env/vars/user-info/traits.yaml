defaults:
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: user-var
    desc: USER environment variable
    platforms:
      - linux
      - unix
      - macos
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      exact: USER
  - id: username-var
    desc: USERNAME environment variable
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: text
      exact: USERNAME
  - id: logname-var
    desc: LOGNAME environment variable
    platforms:
      - linux
      - unix
      - macos
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      exact: LOGNAME
  - id: home-var
    desc: HOME environment variable
    platforms:
      - linux
      - unix
      - macos
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      exact: HOME
  - id: userprofile-var
    desc: USERPROFILE environment variable
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: text
      exact: USERPROFILE
  - id: homedrive-var
    desc: HOMEDRIVE environment variable
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: text
      exact: HOMEDRIVE
  - id: homepath-var
    desc: HOMEPATH environment variable
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: text
      exact: HOMEPATH
