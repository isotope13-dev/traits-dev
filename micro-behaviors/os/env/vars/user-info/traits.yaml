defaults:
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
  platforms:
    - unix
    - windows
traits:
  - id: user-var
    desc: USER environment variable
    platforms:
      - unix
    if:
      type: text
      exact: USER
  - id: username-var
    desc: USERNAME environment variable
    platforms:
      - windows
    if:
      type: text
      exact: USERNAME
  - id: logname-var
    desc: LOGNAME environment variable
    platforms:
      - unix
    if:
      type: text
      exact: LOGNAME
  - id: home-var
    desc: HOME environment variable
    platforms:
      - unix
    if:
      type: text
      exact: HOME
  - id: userprofile-var
    desc: USERPROFILE environment variable
    crit: notable
    platforms:
      - windows
    if:
      type: text
      word: USERPROFILE
  - id: homedrive-var
    desc: HOMEDRIVE environment variable
    platforms:
      - windows
    if:
      type: text
      exact: HOMEDRIVE
  - id: homepath-var
    desc: HOMEPATH environment variable
    platforms:
      - windows
    if:
      type: text
      exact: HOMEPATH
