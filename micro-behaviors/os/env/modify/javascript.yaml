defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: env-path-assignment
    desc: JavaScript PATH environment assignment
    if:
      type: symbol
      kind: bind
      exact: env.PATH
  - id: path-prepend-existing-value
    desc: Prepends value to PATH environment
    conf: 0.95
    if:
      type: tree-sitter
      query: "((assignment_expression\n  left: (member_expression\n    object: (identifier) @obj\n    property: (property_identifier) @prop)\n  right: (binary_expression\n    left: (_)\n    right: (member_expression\n      property: (property_identifier) @path_prop)))\n (#eq? @prop \"PATH\")\n (#eq? @path_prop \"PATH\"))\n"
  - id: bun-path-setup-reference
    desc: JavaScript references Bun PATH setup
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)PATH\s*=.{0,160}\.bun[\\/]bin'
