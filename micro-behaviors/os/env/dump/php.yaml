# PHP getenv() with no arguments returns the entire process environment
# as an associative array. Legitimate code reads named variables; the
# no-arg form is almost exclusively used by webshells, supply-chain
# implants, and credential stealers to ship the host's full env
# (including secrets) off-box.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: C0007
  attack: T1082
traits:
  - id: php-getenv-no-args
    desc: getenv() dumps all environment
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bgetenv\s*\(\s*\)'
    downgrade:
      # Framework-managed config bootstrap (Symfony, Laravel, dotenv libs)
      # legitimately calls `getenv()` no-args to merge the process env into
      # the application config (`array_filter(getenv(), 'is_string')`). In
      # that context the call is plumbing, not exfil prep — keep evidence
      # but drop severity. Bare procedural PHP shells stay suspicious.
      any:
        - id: metadata/library/web-frameworks::symfony-context
        - id: metadata/library/web-frameworks::laravel-context
        - id: metadata/library/web-frameworks::wordpress-context
        - type: text
          regex: '^namespace\s+[A-Z]'

  - id: php-env-superglobal
    desc: PHP $_ENV superglobal access
    # $_ENV access is the standard PHP config-bootstrap pattern (Symfony,
    # Laravel, dotenv libraries all read it). The actually-suspicious version
    # — getenv() with no args returning the whole env — is covered by
    # `php-getenv-no-args` above. Baseline keeps this as inventory-only
    # evidence so it doesn't drown real findings.
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: '\$_ENV\b'
