# Messaging/chat service token configuration keys. These are neutral
# application configuration markers; credential-theft objectives add the
# victim-store or exfiltration context.
defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript]
  crit: notable
  conf: 0.82
traits:
  - id: python-email-service-env-config
    desc: Python email service environment configuration
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: '\bEMAIL_(ADDRESS|PASSWORD|IMAP_HOST|SMTP_HOST)\b'
  - id: messaging-service-token-key
    desc: Messaging service token config key
    if:
      type: text
      regex: '\b(discord|telegram|slack)_(bot_)?token\b'
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: javascript-slack-token-env-read
    desc: JavaScript reads Slack token configuration
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: member
      exact: process.env.SLACK_TOKEN
