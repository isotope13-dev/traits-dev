defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.95

# These settings are legitimate for private modules, local development, and
# Go's own module tooling. Build-pipeline abuse is inferred only when they are
# combined with CI environment-file manipulation in objectives/.
traits:
- id: go-module-sum-exclusion
  desc: Go module checksum exclusion setting
  if:
    type: text
    regex: 'GONOSUMCHECK|GONOSUMDB|["`]OSU["`]\s*,\s*["`]MCHECK|["`]OSU["`]\s*,\s*["`]MDB'
- id: go-module-mutation-flag
  desc: Go module mutation flag setting
  if:
    type: text
    regex: 'GOFLAGS\s*=\s*-mod=mod|LAGS=-mod=mod'
