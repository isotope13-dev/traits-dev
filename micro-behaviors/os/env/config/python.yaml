# Python environment/configuration resolver capabilities.
#
# These describe normal application configuration plumbing. Credential theft
# objectives should combine env access with secret targeting or exfiltration
# rather than emitting these neutral markers from an objective directory.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
- id: python-config-proxy-class
  desc: Python configuration proxy class
  crit: notable
  conf: 0.85
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  if:
    type: text
    regex: 'class\s+Config\b|PersistentConfig\s*\('
- id: python-many-env-getters
  desc: Python repeated environment variable reads
  crit: notable
  conf: 0.85
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  count_min: 10
  if:
    type: text
    regex: 'os\.environ\.get\s*\('
  unless:
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: python-named-secret-env-lookup
  desc: Python reads a named secret environment variable
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: "os\\.environ\\.get\\s*\\([\\\"'](SECRET_KEY|SECRET|TRIGGER[A-Z0-9_]*)[\\\"']\\)"
- id: python-dotenv-load
  desc: Python dotenv loading
  crit: notable
  conf: 0.85
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  if:
    type: symbol
    exact: load_dotenv
- id: python-env-resolver-spec
  desc: Python env-var resolver specification
  crit: notable
  conf: 0.88
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  if:
    type: text
    regex: '\b(EnvVarSpec|ManualResolver|McpResolver|EnvVar)\s*\('
- id: python-mcp-env-installer-marker
  desc: Python MCP env-var installer marker
  crit: notable
  conf: 0.88
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  if:
    type: text
    regex: 'mcp\.upsert_server|class\s+\w+Mcp\w*Tool\(BaseTool\)|Install/configure .{0,80}MCP server'
composite_rules:
- id: python-db-config-marker
  desc: Python database configuration marker
  crit: notable
  conf: 0.85
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  all:
    - id: micro-behaviors/data/db/orm::sqlalchemy
  any:
    - id: python-config-proxy-class
- id: python-env-config-marker
  desc: Python environment configuration marker
  crit: notable
  conf: 0.86
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  all:
    - id: python-many-env-getters
  any:
  - id: python-dotenv-load
  - id: python-db-config-marker
- id: python-env-resolver-marker
  desc: Python environment resolver configuration marker
  crit: notable
  conf: 0.88
  ref: sha256:e9bef8406a3b69fe6558990b02e40b2b75a2872d5133f812bafbc0c0393cee77
  all:
  - id: python-env-resolver-spec
  any:
  - id: python-env-config-marker
  - id: python-mcp-env-installer-marker
