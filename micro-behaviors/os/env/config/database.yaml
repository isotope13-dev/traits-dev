# Database connection settings read from the process environment.
# These are normal application configuration capabilities. Credential-access
# objectives should combine them with multiple secret stores or exfiltration.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: database-url
    desc: Reads database connection URL from process.env
    if:
      type: symbol
      kind: member
      regex: '^process\.env\.(DATABASE_URL|TEST_DATABASE_URL)$'

  - id: mongodb-uri
    desc: Reads MongoDB connection URI from process.env
    if:
      type: symbol
      kind: member
      regex: '^process\.env\.(MONGO|MONGODB)_URI$'

  - id: mongodb-database-name
    desc: Reads MongoDB database name from process.env
    if:
      type: symbol
      kind: member
      regex: '^process\.env\.(MONGO|MONGODB)_(DB_)?(NAME|DATABASE)$|^process\.env\.DB_NAME$'

  - id: postgres-settings
    desc: Reads PostgreSQL settings from process.env
    if:
      type: symbol
      kind: member
      regex: '^process\.env\.POSTGRES_[A-Za-z0-9_]+$'

  - id: mysql-settings
    desc: Reads MySQL settings from process.env
    if:
      type: symbol
      kind: member
      regex: '^process\.env\.MYSQL_[A-Za-z0-9_]+$'

  - id: redis-url
    desc: Reads Redis connection URL from process.env
    if:
      type: symbol
      kind: member
      exact: process.env.REDIS_URL

composite_rules:
  - id: database-connection-env-config
    desc: Database connection environment configuration
    crit: notable
    conf: 0.85
    any:
      - id: database-url
      - id: mongodb-uri
      - id: postgres-settings
      - id: mysql-settings
      - id: redis-url
