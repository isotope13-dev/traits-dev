defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
  crit: notable
  conf: 0.8
traits:
  - id: user-from-uid
    desc: Convert user ID to username (user_from_uid)
    if:
      type: symbol
      exact: user_from_uid
  - id: getpwent
    desc: Iterate password entries
    if:
      type: symbol
      exact: getpwent
