defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.9

traits:
  - id: admin-group-selection
    desc: Go source selects an admin user group
    if:
      type: text
      regex: 'user\.Groups?\b.{0,30}\badmin\b'
  - id: primary-admin-group-selection
    desc: Go source selects admin primary group
    if:
      type: text
      regex: 'user\.PrimaryGroup\b.{0,30}\badmin\b'
  - id: go-admin-group-argument
    desc: Go administrator group argument
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?is)("Group"\s*:\s*groupID|user\.Group\s*=\s*admin|case\s+"admin"\s*:)'
