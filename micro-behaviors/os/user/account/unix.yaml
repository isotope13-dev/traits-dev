# Unix account-management command references.  Account creation is a neutral
# capability; attacker intent requires additional context in objectives/.
defaults:
  platforms: [unix]
  for: [python, shell]
  crit: notable
  conf: 0.9
  attack: T1136.001

traits:
  - id: useradd-command
    desc: Creates Unix account with useradd or adduser
    for: [python, shell, elf]
    if:
      type: text
      regex: '(^|[\n;&|`$])\s*(/usr/sbin/)?(useradd|adduser)[ \t]+(-|[A-Za-z0-9_./])'
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: useradd-login-shell
    desc: Account creation specifies a login shell
    crit: notable
    conf: 0.86
    for: [python, shell, elf]
    if:
      type: text
      regex: '(useradd|adduser)\b[^\n]{0,120}(-s|--shell)'
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: useradd-uid-zero
    desc: Creates Unix account with UID zero
    crit: notable
    conf: 0.95
    for: [python, shell, elf]
    if:
      type: text
      regex: '(?i)(useradd|adduser)\b[^\n;&|]{0,120}-(ou|u)\s+0'
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: useradd-gid-zero
    desc: Creates Unix account with GID zero
    crit: notable
    conf: 0.95
    for: [python, shell, elf]
    if:
      type: text
      regex: '(?i)(useradd|adduser)\b[^\n;&|]{0,160}-g\s+0'
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: chpasswd-command
    desc: Changes Unix passwords with chpasswd
    for: [python, shell, elf]
    if:
      type: text
      regex: "(^|[\\n;&|`$({])\\s*((/usr/sbin/)?chpasswd\\b|echo '%s:%s' \\| chpasswd)"
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/sysadmin/busybox::busybox-binary
