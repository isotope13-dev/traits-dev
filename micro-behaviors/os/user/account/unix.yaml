# Unix account-management command references.  Account creation is a neutral
# capability; attacker intent requires additional context in objectives/.
defaults:
  platforms: [unix]
  for: [python, shell]
  crit: notable
  conf: 0.9

traits:
  - id: useradd-command
    desc: Creates Unix account with useradd
    attack: T1136.001
    if:
      type: string_literal
      word: useradd
