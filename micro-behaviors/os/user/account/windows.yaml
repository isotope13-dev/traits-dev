defaults:
  platforms: [windows]
  for: [pe, powershell, batch, vbs]
traits:
  - id: new-local-user
    desc: Uses New-LocalUser PowerShell cmdlet
    crit: notable
    conf: 0.9
    attack: "T1136.001"
    if:
      type: text
      regex: '(?i)New-LocalUser'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: add-local-group-member
    desc: Uses Add-LocalGroupMember PowerShell cmdlet
    crit: notable
    conf: 0.9
    attack: "T1098"
    if:
      type: text
      regex: '(?i)Add-LocalGroupMember'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: remove-local-group-member
    desc: Uses Remove-LocalGroupMember PowerShell cmdlet
    crit: notable
    conf: 0.9
    attack: "T1531"
    if:
      type: text
      regex: '(?i)Remove-LocalGroupMember'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: net-user-create
    desc: Creates local user via net user command
    crit: notable
    conf: 0.9
    attack: "T1136.001"
    if:
      type: text
      regex: '(?i)net\s+user\s+\S+\s+\S+'
    not:
      - regex: '(?i)net\s+user\s+%'
  - id: net-localgroup-administrators-add
    desc: Adds user to administrators via net localgroup
    crit: suspicious
    conf: 0.95
    attack: "T1098"
    if:
      type: text
      regex: '(?i)net\s+localgroup\s+administrators\s+\S+\s+/add'
