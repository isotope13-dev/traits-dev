defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9

traits:
  - id: powershell-win32-useraccount-query
    desc: PowerShell Win32 user account inventory query
    if:
      type: text
      substr: Win32_UserAccount

  - id: powershell-logon-session-query
    desc: PowerShell Win32 logon session inventory query
    if:
      type: text
      substr: Win32_LogonSession
