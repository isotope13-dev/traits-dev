# Windows Startup Persistence
# Capabilities related to Windows Startup folder persistence

traits:
  - id: win-startup-path
    desc: Windows Startup folder path reference
    crit: notable
    conf: 0.8
    for: [all]
    platforms: [windows]
    if:
      type: string
      regex: '(?i)Microsoft[/\\]Windows[/\\]Start Menu'

  - id: shell-get-special-folder-location
    desc: Resolve special folder location via Shell32
    crit: notable
    conf: 0.8
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      exact: "SHGetSpecialFolderLocation"

  - id: shell-get-path-from-idlist
    desc: Convert Shell folder ID to path
    crit: notable
    conf: 0.8
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      exact: "SHGetPathFromIDListA"

  - id: shell-get-folder-path
    desc: Resolve special folder path via Shell32
    crit: notable
    conf: 0.8
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      exact: "SHGetFolderPathW"

  - id: path-combine
    desc: Combine filesystem paths via Shlwapi
    crit: notable
    conf: 0.78
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      exact: "PathCombineW"

  - id: path-append
    desc: Append child path via Shlwapi
    crit: notable
    conf: 0.78
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      exact: "PathAppendW"

composite_rules:
  - id: startup-folder-shell-api-chain
    desc: Resolve startup-like folder via Shell APIs
    crit: notable
    conf: 0.85
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: shell-get-special-folder-location
      - id: shell-get-path-from-idlist

  - id: startup-folder-shell-path-composition-chain
    desc: Resolve startup path and compose file destination
    crit: suspicious
    conf: 0.88
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: shell-get-folder-path
      - id: win-startup-path
    any:
      - id: path-combine
      - id: path-append
