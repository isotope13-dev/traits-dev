# Windows Startup Persistence
# Capabilities related to Windows Startup folder persistence
defaults:
  platforms: [windows]
traits:
  - id: win-startup-path
    desc: Windows Startup folder path reference
    crit: notable
    conf: 0.8
    for: [pe, powershell, batch, vbs]
    if:
      type: string
      regex: '(?i)Microsoft[/\\]Windows[/\\]Start Menu'
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: shell-get-special-folder-location
    desc: Resolve special folder location via Shell32
    crit: baseline
    conf: 0.8
    for: [pe, dll]
    if:
      type: symbol
      exact: "SHGetSpecialFolderLocation"
  - id: shell-get-path-from-idlist
    desc: Convert Shell folder ID to path
    crit: baseline
    conf: 0.8
    for: [pe, dll]
    if:
      type: symbol
      exact: "SHGetPathFromIDListA"
  - id: shell-get-folder-path
    desc: Resolve special folder path via Shell32
    crit: baseline
    conf: 0.8
    for: [pe, dll]
    if:
      type: symbol
      exact: "SHGetFolderPathW"
composite_rules:
  - id: startup-folder-shell-api-chain
    desc: Resolve startup-like folder via Shell APIs
    crit: notable
    conf: 0.85
    for: [pe, dll]
    all:
      - id: shell-get-special-folder-location
      - id: shell-get-path-from-idlist
      - id: win-startup-path
  - id: startup-folder-shell-path-composition-chain
    desc: Resolve startup path and compose file destination
    crit: suspicious
    conf: 0.88
    for: [pe, dll]
    all:
      - id: shell-get-folder-path
      - id: win-startup-path
    any:
      - id: micro-behaviors/fs/path/construct::path-combine
      - id: micro-behaviors/fs/path/construct::path-append
    downgrade:
      any:
        - id: metadata/format::many-imports
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::msvc
