defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: java-startup-enum
    desc: Presence of STARTUP string in Java
    crit: notable
    if:
      type: string_value
      word: "STARTUP"
