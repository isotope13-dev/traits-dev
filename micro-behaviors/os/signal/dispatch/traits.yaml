# Exact signal-dispatch symbols are neutral capabilities. Objective rules add
# the kill-hook context that gives them hostile meaning.
defaults:
  platforms: [linux, macos, windows]
  for: [c, cpp]
  crit: notable
  conf: 0.82

traits:
  - id: getsig
    desc: Signal dispatch function getsig
    if:
      type: symbol
      kind: function
      exact: getsig
  - id: setsig
    desc: Signal dispatch function setsig
    if:
      type: symbol
      kind: function
      exact: setsig
  - id: sighandler
    desc: Signal dispatch function sighandler
    if:
      type: symbol
      kind: function
      exact: sighandler
  - id: sig-handler
    desc: Signal dispatch function sig_handler
    if:
      type: symbol
      kind: function
      exact: sig_handler
