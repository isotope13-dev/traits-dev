defaults:
  platforms: [linux, macos, windows]
# Signal Handling
# C runtime signal handlers (Windows and Unix)
traits:
  # === Signal Management ===
  - id: sig-ign-sighup-x64
    desc: SIGHUP signal ignore pattern (x86_64)
    # Component-only: the 10-byte pattern `mov edi, 1; mov esi, 1` is common
    # compiler-generated code — two small immediate loads that collide with
    # arbitrary function prologues in large binaries. Only meaningful paired
    # with a signal-handler import inside `signal-ignore-pattern`.
    crit: component
    conf: 0.4
    for:
      - elf
      - macho
    size_max: 10485760
    if:
      type: hex
      section: .text
      pattern: BF 01 00 00 00 BE 01 00 00 00
    unless:
      - id: metadata/file/string/identity::system-shell-basename
      - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers/
  - id: signal
    desc: Install signal handler
    crit: baseline
    conf: 0.90
    for: ["pe", "elf", "macho"]
    if:
      type: symbol
      exact: "signal"
  - id: sigaction
    desc: Install signal handler (POSIX sigaction)
    crit: baseline
    conf: 0.90
    for: ["elf", "macho"]
    platforms: [linux, macos]
    if:
      type: symbol
      exact: "sigaction"
  # Source-level signal-handler install (sigaction(SIGxxx, &act)) and the
  # SA_SIGINFO flag. Universal benign C; the inline-hook objective composite
  # references these and supplies the RWX/context-hijack evidence for intent.
  - id: sigaction-source-call
    desc: sigaction() handler-install source call
    crit: baseline
    conf: 0.85
    for: ["c", "cpp", "objc", "elf"]
    platforms: [linux, macos]
    if:
      type: text
      regex: 'sigaction\(SIG[A-Z0-9]+\s*,\s*&'
  - id: sa-siginfo-flag
    desc: SA_SIGINFO sigaction flag
    crit: component
    conf: 0.8
    for: ["c", "cpp", "objc", "elf"]
    platforms: [linux, macos]
    if:
      type: text
      substr: SA_SIGINFO
  - id: raise
    desc: Send signal to self
    crit: baseline
    conf: 0.85
    for: ["pe", "elf", "macho"]
    if:
      type: symbol
      exact: "raise"
  - id: abort
    desc: Abort program execution
    crit: baseline
    conf: 0.90
    for: ["pe", "elf", "macho"]
    if:
      type: symbol
      exact: "abort"
