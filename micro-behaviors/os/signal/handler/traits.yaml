defaults:
  platforms: [linux, macos, windows]
# Signal Handling
# C runtime signal handlers (Windows and Unix)
traits:
  # === Signal Management ===
  - id: signal
    desc: Install signal handler
    crit: baseline
    conf: 0.90
    for: ["pe", "elf", "macho"]
    if:
      type: symbol
      exact: "signal"
  - id: sigaction
    desc: Install signal handler (POSIX sigaction)
    crit: baseline
    conf: 0.90
    for: ["elf", "macho"]
    platforms: [linux, macos]
    if:
      type: symbol
      exact: "sigaction"
  # Source-level signal-handler install (sigaction(SIGxxx, &act)) and the
  # SA_SIGINFO flag. Universal benign C; the inline-hook objective composite
  # references these and supplies the RWX/context-hijack evidence for intent.
  - id: sigaction-source-call
    desc: sigaction() handler-install source call
    crit: baseline
    conf: 0.85
    for: ["c", "cpp", "objc", "elf"]
    platforms: [linux, macos]
    if:
      type: text
      regex: 'sigaction\(SIG[A-Z0-9]+\s*,\s*&'
  - id: sa-siginfo-flag
    desc: SA_SIGINFO sigaction flag
    crit: component
    conf: 0.8
    for: ["c", "cpp", "objc", "elf"]
    platforms: [linux, macos]
    if:
      type: text
      substr: SA_SIGINFO
  - id: raise
    desc: Send signal to self
    crit: baseline
    conf: 0.85
    for: ["pe", "elf", "macho"]
    if:
      type: symbol
      exact: "raise"
  - id: abort
    desc: Abort program execution
    crit: baseline
    conf: 0.90
    for: ["pe", "elf", "macho"]
    if:
      type: symbol
      exact: "abort"
