defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: sys-extension
    desc: Windows .sys driver filename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)\.sys$'
  - id: native-subsystem
    desc: PE native subsystem
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.subsystem
      exact: native

  - id: driver-image-reference
    desc: Windows driver image filename reference
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: '(?i)\b[A-Za-z0-9_.-]{2,80}\.sys\b'

composite_rules:
  - id: windows-kernel-driver
    desc: Windows kernel driver binary
    crit: notable
    conf: 0.98
    all:
      - id: sys-extension
      - id: native-subsystem
    any:
      - id: metadata/binary/resource::kernel-driver-init
      - id: metadata/binary/resource::kernel-driver-idata
