defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: sys-extension
    desc: Windows .sys driver filename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)\.sys$'
  - id: native-subsystem
    desc: PE native subsystem
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.subsystem
      exact: native

composite_rules:
  - id: windows-kernel-driver
    desc: Windows kernel driver binary
    crit: notable
    conf: 0.98
    all:
      - id: sys-extension
      - id: native-subsystem
    any:
      - id: metadata/binary/resource::kernel-driver-init
      - id: metadata/binary/resource::kernel-driver-idata
