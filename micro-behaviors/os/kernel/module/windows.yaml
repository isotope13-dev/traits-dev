defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: sys-extension
    desc: Windows .sys driver filename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)\.sys$'
  - id: native-subsystem
    desc: PE native subsystem
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.subsystem
      exact: native

  - id: driver-image-reference
    desc: Windows driver image filename reference
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: '(?i)\b[A-Za-z0-9_.-]{2,80}\.sys\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: load-driver-api
    desc: Imports the native Windows driver-loading API
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: NtLoadDriver
  - id: unload-driver-api
    desc: Imports the native Windows driver-unloading API
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: NtUnloadDriver
  - id: loaded-module-list-reference
    desc: References the Windows loaded-kernel-module list
    crit: notable
    conf: 0.96
    if:
      type: symbol
      exact: PsLoadedModuleList

composite_rules:
  - id: windows-kernel-driver
    desc: Windows kernel driver binary
    crit: notable
    conf: 0.98
    all:
      - id: sys-extension
      - id: native-subsystem
    any:
      - id: metadata/binary/resource::kernel-driver-init
      - id: metadata/binary/resource::kernel-driver-idata
  - id: native-kernel-api-context
    desc: Native PE using Windows kernel-driver APIs
    crit: notable
    conf: 0.98
    all:
      - id: native-subsystem
    any:
      - id: micro-behaviors/os/kernel/device::create-device-object
      - id: micro-behaviors/mem/read/cross-process::mm-copy-virtual-memory
      - id: micro-behaviors/process/attach/address-space::attach-process-address-space
      - id: micro-behaviors/process/terminate/kill::zw-terminate-process
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution-symbol
    needs: 1
