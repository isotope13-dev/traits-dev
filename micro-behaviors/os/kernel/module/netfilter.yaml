defaults:
  platforms: [linux]
  for: [c, cpp, elf]
  crit: notable

traits:
  - id: nf-accept-verdict
    desc: Netfilter NF_ACCEPT verdict token
    crit: component
    conf: 0.5
    if:
      type: text
      substr: NF_ACCEPT

  - id: nf-drop-verdict
    desc: Netfilter NF_DROP verdict token
    crit: component
    conf: 0.5
    if:
      type: text
      word: NF_DROP

  - id: nf-register-hook
    desc: Registers a netfilter packet hook
    conf: 0.9
    if:
      type: symbol
      substr: nf_register_hook

  - id: nf-register-net-hook
    desc: Registers a netfilter network hook
    conf: 0.9
    if:
      type: symbol
      substr: nf_register_net_hook
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: nf-unregister-hook
    desc: Unregisters a netfilter hook
    conf: 0.9
    if:
      type: symbol
      substr: nf_unregister_hook

composite_rules:
  - id: netfilter-verdict
    desc: Uses a netfilter packet verdict
    crit: notable
    conf: 0.8
    any:
      - id: nf-accept-verdict
      - id: nf-drop-verdict
