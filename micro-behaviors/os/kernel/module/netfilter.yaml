defaults:
  platforms: [linux]
  for: [c, cpp, elf]

traits:
  - id: nf-accept-verdict
    desc: Netfilter NF_ACCEPT verdict token
    crit: component
    conf: 0.5
    if:
      type: text
      substr: NF_ACCEPT

  - id: nf-drop-verdict
    desc: Netfilter NF_DROP verdict token
    crit: component
    conf: 0.5
    if:
      type: text
      word: NF_DROP
