defaults:
  platforms: [linux, openwrt]
  for: [elf]
traits:
  - id: linux-module-header-include
    desc: Includes Linux kernel module header
    crit: baseline
    conf: 0.99
    for: [c, cpp]
    if:
      type: text
      regex: '<linux/module.h>'

  - id: linux-kbuild-obj-m
    desc: Declares Linux obj-m module target
    crit: component
    conf: 0.95
    for: [c, cpp, shell, makefile]
    if:
      type: text
      regex: (?m)^obj-m\s*[:+?]?=\s*[A-Za-z0-9_.-]+\.o\b
  - id: linux-kbuild-running-kernel-tree
    desc: References running kernel build tree
    crit: component
    conf: 0.95
    for: [c, cpp, shell, makefile]
    if:
      type: text
      regex: /lib/modules/\$\(shell uname -r\)/build\b
  - id: linux-kbuild-submake-module-dir
    desc: Invokes Kbuild submake with module dir
    crit: component
    conf: 0.95
    for: [c, cpp, shell, makefile]
    if:
      type: text
      regex: \$\(MAKE\)\s+-C\s+\$\(KDIR\)\s+M=\$\(PWD\)\s+(modules|clean)\b
  - id: linux-kbuild-submake-running-kernel-tree
    desc: Invokes Kbuild against running kernel tree
    crit: component
    conf: 0.95
    for: [c, cpp, shell, makefile]
    if:
      type: text
      regex: make -C /lib/modules/\$\(shell uname -r\)/build M=\$\(PWD\) (modules|clean)\b
  - id: linux-module-init-symbol
    desc: Registers Linux kernel module init
    crit: notable
    conf: 0.8
    for: [c]
    if:
      type: symbol
      exact: module_init
  - id: linux-module-exit-symbol
    desc: Registers Linux kernel module exit
    crit: notable
    conf: 0.8
    for: [c]
    if:
      type: symbol
      exact: module_exit
  - id: linux-kernel-init-attribute
    desc: Linux kernel __init section attribute
    crit: baseline
    conf: 0.95
    for: [c]
    if:
      type: text
      regex: '(?m)\)\s*__init\s*([;,{])'
  - id: linux-module-license-macro
    desc: Declares Linux kernel module license
    crit: baseline
    conf: 0.9
    for: [c]
    if:
      type: symbol
      kind: call
      exact: MODULE_LICENSE
  - id: linux-module-author-macro
    desc: Declares Linux kernel module author metadata
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: symbol
      kind: call
      exact: MODULE_AUTHOR
  - id: linux-module-description-macro
    desc: Declares Linux module description metadata
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: symbol
      kind: call
      exact: MODULE_DESCRIPTION
  - id: linux-module-init-macro
    desc: Registers Linux kernel module init
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: symbol
      kind: call
      exact: module_init
  - id: linux-module-exit-macro
    desc: Registers Linux kernel module exit
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: symbol
      kind: call
      exact: module_exit
  - id: kernel-list-del-init
    desc: Uses Linux list_del_init helper
    crit: baseline
    conf: 0.75
    for:
      - elf
      - c
      - cpp
    if:
      type: text
      substr: list_del_init
  - id: this-module-macro
    desc: Uses Linux THIS_MODULE kernel macro
    crit: baseline
    conf: 0.6
    for:
      - elf
      - c
      - cpp
    if:
      type: text
      substr: THIS_MODULE
  - id: linux-register-kprobe
    desc: Registers Linux kprobe
    crit: notable
    conf: 0.9
    for: [c, cpp, elf]
    if:
      type: text
      word: register_kprobe
  - id: linux-unregister-kprobe
    desc: Unregisters Linux kprobe
    crit: notable
    conf: 0.9
    for: [c, cpp, elf]
    if:
      type: text
      word: unregister_kprobe
    unless:
      - type: path
        regex: '(^|[!/])vboxdrv\.ko$'
  - id: syscall-init-module
    desc: "init_module syscall for loading kernel"
    crit: notable
    conf: 0.8
    if:
      type: syscall
      name: ["init_module"]
  - id: syscall-finit-module
    desc: "finit_module syscall for loading kernel"
    crit: notable
    conf: 0.8
    if:
      type: syscall
      name: ["finit_module"]
  - id: syscall-delete-module
    desc: "delete_module syscall for unloading kernel"
    crit: notable
    conf: 0.8
    if:
      type: syscall
      name: ["delete_module"]
  - id: syscall-kexec-load
    desc: "kexec_load syscall for loading new"
    crit: notable
    conf: 0.8
    if:
      type: syscall
      name: ["kexec_load"]
  - id: syscall-kexec-file-load
    desc: "kexec_file_load syscall for loading new"
    crit: notable
    conf: 0.8
    if:
      type: syscall
      name: ["kexec_file_load"]
composite_rules:
  - id: linux-kbuild-module-build
    desc: Builds Linux kernel module with Kbuild
    conf: 0.98
    crit: notable
    for: [c, cpp, shell, makefile]
    all:
      - id: linux-kbuild-obj-m
      - id: linux-kbuild-running-kernel-tree
    any:
      - id: linux-kbuild-submake-module-dir
      - id: linux-kbuild-submake-running-kernel-tree
  - id: kernel-module-load
    desc: Loads kernel module
    conf: 0.95
    crit: suspicious
    any:
      - id: syscall-init-module
      - id: syscall-finit-module
  - id: kexec
    desc: Loads new kernel for kexec
    conf: 0.95
    crit: suspicious
    any:
      - id: syscall-kexec-load
      - id: syscall-kexec-file-load
