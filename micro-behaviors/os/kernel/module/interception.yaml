defaults:
  platforms: [unix]
  for: [c, cpp, elf]
traits:
  - id: old-create
    desc: "Reference to old_create_module"
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "old_create_module"
  - id: old-delete
    desc: "Reference to old_delete_module"
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "old_delete_module"
  - id: nr-create
    desc: "Reference to __NR_create_module"
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "__NR_create_module"
    unless:
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
  - id: nr-delete
    desc: "Reference to __NR_delete_module"
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "__NR_delete_module"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
