# Kernel Module Loading Tools
# Neutral operations - driver installation, hardware setup, etc.
# These are user-space tools for managing kernel modules/extensions.
# Syscall-level detection is in kernel-module.yaml (init_module, etc.)
defaults:
  crit: notable
  conf: 0.8
traits:
  # === Linux ===
  - id: insmod-cmd
    desc: insmod kernel module loader
    platforms: [linux]
    for: [shell, python, elf]
    if:
      type: string_value
      regex: '\binsmod\s+'
  - id: modprobe-cmd
    desc: modprobe kernel module loader
    platforms: [linux]
    for: [shell, python, elf]
    if:
      type: string_value
      regex: '\bmodprobe\s+'
  - id: rmmod-cmd
    desc: rmmod kernel module unloader
    platforms: [linux]
    for: [shell, python, elf]
    if:
      type: string_value
      regex: '\brmmod\s+'
  - id: dkms-cmd
    desc: DKMS dynamic kernel module management
    crit: baseline
    platforms: [linux]
    for: [shell, python, elf]
    if:
      type: string_value
      regex: '\bdkms\s+(install|add|build)\b'
  # === macOS ===
  - id: kextload-cmd
    desc: kextload kernel extension loader
    platforms: [macos]
    for: [shell, python, macho]
    if:
      type: string_value
      regex: '\bkextload\s+'
  - id: kextutil-cmd
    desc: kextutil kernel extension utility
    platforms: [macos]
    for: [shell, python, macho]
    if:
      type: string_value
      regex: '\bkextutil\s+'
  - id: kextunload-cmd
    desc: kextunload kernel extension unloader
    platforms: [macos]
    for: [shell, python, macho]
    if:
      type: string_value
      regex: '\bkextunload\s+'
  - id: systemextensionsctl-cmd
    desc: systemextensionsctl system extension manager
    platforms: [macos]
    for: [shell, python, macho]
    if:
      type: string_value
      regex: '\bsystemextensionsctl\s+'
composite_rules:
  - id: linux-kmod-load
    desc: Linux kernel module loading tool
    conf: 0.85
    platforms: [linux]
    any:
      - id: insmod-cmd
      - id: modprobe-cmd
  - id: macos-kext-load
    desc: macOS kernel extension loading tool
    conf: 0.85
    platforms: [macos]
    any:
      - id: kextload-cmd
      - id: kextutil-cmd
