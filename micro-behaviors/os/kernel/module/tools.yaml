defaults:
  crit: notable
  conf: 0.8
traits:
  - id: insmod-cmd
    desc: insmod kernel module loader
    platforms:
      - linux
      - openwrt
    for:
      - shell
      - python
      - elf
    if:
      type: text
      regex: \binsmod\s+
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: modprobe-cmd
    desc: modprobe kernel module loader
    platforms:
      - linux
      - openwrt
    for:
      - shell
      - python
      - elf
    if:
      # Command position only: leading anchor excludes hyphenated binary names
      # like `nvidia-modprobe` and config dirs like `modprobe.d`.
      type: text
      regex: '(^|[\s;&|(])modprobe\s+'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: rmmod-cmd
    desc: rmmod kernel module unloader
    platforms:
      - linux
      - openwrt
    for:
      - shell
      - python
      - elf
    if:
      type: text
      regex: \brmmod\s+
  - id: dkms-cmd
    desc: DKMS dynamic kernel module management
    crit: baseline
    platforms:
      - linux
      - openwrt
    for:
      - shell
      - python
      - elf
    if:
      type: text
      regex: \bdkms\s+(install|add|build)\b
  - id: kextload-cmd
    desc: kextload kernel extension loader
    platforms:
      - macos
    for:
      - shell
      - python
      - macho
    if:
      type: text
      regex: \bkextload\s+
  - id: kextutil-cmd
    desc: kextutil kernel extension utility
    platforms:
      - macos
    for:
      - shell
      - python
      - macho
    if:
      type: text
      regex: \bkextutil\s+
  - id: kextunload-cmd
    desc: kextunload kernel extension unloader
    platforms:
      - macos
    for:
      - shell
      - python
      - macho
    if:
      type: text
      regex: \bkextunload\s+
  - id: systemextensionsctl-cmd
    desc: systemextensionsctl system extension manager
    platforms:
      - macos
    for:
      - shell
      - python
      - macho
    if:
      type: text
      regex: \bsystemextensionsctl\s+
composite_rules:
  - id: linux-kmod-load
    desc: Linux kernel module loading tool
    conf: 0.85
    platforms:
      - linux
      - openwrt
    any:
      - id: insmod-cmd
      - id: modprobe-cmd
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: macos-kext-load
    desc: macOS kernel extension loading tool
    conf: 0.85
    platforms:
      - macos
    any:
      - id: kextload-cmd
      - id: kextutil-cmd
