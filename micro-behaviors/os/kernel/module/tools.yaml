defaults:
  crit: notable
  conf: 0.8
traits:
  - id: insmod-cmd
    desc: insmod kernel module loader
    platforms:
      - linux
    for: [scripts, binaries]
    if:
      type: text
      regex: \binsmod\s+
  - id: modprobe-cmd
    desc: modprobe kernel module loader
    platforms:
      - linux
    for: [scripts, binaries]
    if:
      type: text
      regex: \bmodprobe\s+
  - id: rmmod-cmd
    desc: rmmod kernel module unloader
    platforms:
      - linux
    for: [scripts, binaries]
    if:
      type: text
      regex: \brmmod\s+
  - id: dkms-cmd
    desc: DKMS dynamic kernel module management
    crit: baseline
    platforms:
      - linux
    for: [scripts, binaries]
    if:
      type: text
      regex: \bdkms\s+(install|add|build)\b
  - id: kextload-cmd
    desc: kextload kernel extension loader
    platforms:
      - macos
    for: [scripts, binaries]
    if:
      type: text
      regex: \bkextload\s+
  - id: kextutil-cmd
    desc: kextutil kernel extension utility
    platforms:
      - macos
    for: [scripts, binaries]
    if:
      type: text
      regex: \bkextutil\s+
  - id: kextunload-cmd
    desc: kextunload kernel extension unloader
    platforms:
      - macos
    for: [scripts, binaries]
    if:
      type: text
      regex: \bkextunload\s+
  - id: systemextensionsctl-cmd
    desc: systemextensionsctl system extension manager
    platforms:
      - macos
    for: [scripts, binaries]
    if:
      type: text
      regex: \bsystemextensionsctl\s+
composite_rules:
  - id: linux-kmod-load
    desc: Linux kernel module loading tool
    conf: 0.85
    platforms:
      - linux
    any:
      - id: insmod-cmd
      - id: modprobe-cmd
  - id: macos-kext-load
    desc: macOS kernel extension loading tool
    conf: 0.85
    platforms:
      - macos
    any:
      - id: kextload-cmd
      - id: kextutil-cmd
