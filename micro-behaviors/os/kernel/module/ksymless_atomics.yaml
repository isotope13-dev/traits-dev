defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: ksymless-trampoline-stager
    desc: x86-64 trampoline hook stager (movabs, push, ret)
    crit: suspicious
    conf: 1.0
    if:
      type: string_value
      regex: 'H\xb8\x00\x00\x00\x00\x00\x00\x00\x00P\xc3'
  - id: ksymless-find-address-up
    desc: Stack walking heuristic to find x64_sys_call
    crit: suspicious
    conf: 1.0
    if:
      type: string_value
      regex: 'find_address_up'
