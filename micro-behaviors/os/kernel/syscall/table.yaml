defaults:
  platforms: [unix]
  for: [c]

traits:
  - id: syscall-table-entry-assignment
    desc: Assigns a syscall table entry
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\b_{0,2}syscall_table\s*\[[^\]]{1,80}\]\s*='
  - id: sys-sysent-header
    desc: FreeBSD syscall entry table header
    crit: component
    conf: 0.98
    if:
      type: text
      substr: sys/sysent.h
  - id: sysent-raw
    desc: Sysent syscall entry table reference
    crit: component
    conf: 0.98
    if:
      type: text
      word: sysent
