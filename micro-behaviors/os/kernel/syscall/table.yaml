defaults:
  platforms: [unix]
  for: [c]

traits:
  - id: sys-sysent-header
    desc: FreeBSD syscall entry table header
    crit: component
    conf: 0.98
    if:
      type: text
      substr: sys/sysent.h
  - id: sysent-raw
    desc: Sysent syscall entry table reference
    crit: component
    conf: 0.98
    if:
      type: text
      word: sysent
