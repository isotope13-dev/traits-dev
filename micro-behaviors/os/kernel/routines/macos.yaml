defaults:
  platforms: [macos, ios]
  for: [macho, c]
  attack: T1129
traits:
  - id: thread-set-state
    desc: Sets thread state via Mach API
    crit: notable
    if:
      type: symbol
      exact: thread_set_state
  - id: thread-get-state
    desc: Gets thread state via Mach API
    crit: notable
    if:
      type: symbol
      exact: thread_get_state
  - id: arm-neon-state-ref
    desc: Reference to ARM NEON thread state
    crit: component
    if:
      type: text
      # ARM_NEON_STATE, ARM_NEON_STATE64, or flavor 16
      regex: ARM_NEON_STATE(64)?\b|\bARM_VFP_STATE\b
composite_rules:
  - id: thread-state-api
    desc: Accesses Mach thread state APIs
    crit: component
    any:
      - id: thread-set-state
      - id: thread-get-state
  - id: thread-state-neon-manipulation
    desc: Manipulates ARM NEON registers via thread state
    crit: suspicious
    conf: 0.9
    all:
      - id: thread-state-api
      - id: arm-neon-state-ref
