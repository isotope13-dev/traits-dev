defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: do-syslog-routine
    desc: Linux do_syslog routine
    crit: notable
    conf: 0.9
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: symbol
      exact: do_syslog
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/app/sudo::source-tree
  - id: dynamic-resolution-symbol
    desc: Dynamically resolves kernel routine addresses
    crit: notable
    if:
      type: symbol
      exact: MmGetSystemRoutineAddress
    unless:
      - id: well-known/lib/win32k/
  - id: export-routine-lookup
    desc: Resolves a named kernel export at runtime
    crit: notable
    conf: 0.96
    for: [pe]
    platforms: [windows]
    if:
      type: symbol
      exact: RtlFindExportedRoutineByName
  - id: dynamic-resolution-xoradd-string
    desc: Encoded MmGetSystemRoutineAddress string
    crit: notable
    conf: 0.94
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: 'yXqRLjCHHXSm/46**'
  - id: export-routine-lookup-xoradd-string
    desc: Encoded RtlFindExportedRoutineByName string
    crit: notable
    conf: 0.93
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: 'fAZqQW^~DMQM4$&'
  - id: atbash-export-routine-name
    desc: Atbash-obfuscated kernel export resolver name
    crit: notable
    conf: 0.98
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: 'IgoUrmwVckligvwIlfgrmvYbMznv'
  - id: kallsyms-lookup-name-reference
    desc: References the kallsyms_lookup_name resolver
    crit: notable
    conf: 0.85
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: text
      word: kallsyms_lookup_name
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: kallsyms-lookup-symbol
    desc: Runtime kernel symbol resolver
    crit: notable
    conf: 0.8
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: symbol
      substr: kallsyms_lookup
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: copy-from-user
    desc: copy_from_user kernel userspace copy
    crit: baseline
    conf: 0.9
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: symbol
      exact: copy_from_user
  - id: copy-to-user
    desc: copy_to_user kernel userspace copy
    crit: baseline
    conf: 0.9
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: symbol
      exact: copy_to_user
composite_rules:
  - id: dynamic-resolution
    desc: Dynamically resolves kernel routine addresses
    crit: notable
    conf: 0.95
    any:
      - id: dynamic-resolution-symbol
      - id: dynamic-resolution-xoradd-string
    unless:
      - id: well-known/lib/win32k/
