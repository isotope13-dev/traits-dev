defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: dynamic-resolution
    desc: Dynamically resolves kernel routine addresses
    crit: notable
    if:
      type: symbol
      exact: MmGetSystemRoutineAddress
  - id: kallsyms-lookup-name
    desc: kallsyms_lookup_name kernel symbol resolver
    crit: notable
    conf: 0.85
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: text
      word: kallsyms_lookup_name
  - id: copy-from-user
    desc: copy_from_user kernel userspace copy
    crit: baseline
    conf: 0.9
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: symbol
      exact: copy_from_user
  - id: copy-to-user
    desc: copy_to_user kernel userspace copy
    crit: baseline
    conf: 0.9
    for: [c, elf]
    platforms: [linux, android]
    if:
      type: symbol
      exact: copy_to_user
