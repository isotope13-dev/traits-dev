defaults:
  platforms: [windows]
  for: [binaries]
  crit: notable
traits:
  - id: ob-reference-object-by-name
    desc: ObReferenceObjectByName kernel API
    if:
      type: symbol
      exact: ObReferenceObjectByName
  - id: set-firmware-env-var
    desc: Set UEFI firmware variable
    crit: notable
    conf: 0.9
    for: [pe, dll]
    if:
      type: symbol
      regex: ^SetFirmwareEnvironmentVariable[AW]?$
  - id: go-set-firmware-env-var
    desc: Go resolves UEFI variable setter
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: literal
      regex: ^SetFirmwareEnvironmentVariable[AW]?$
composite_rules:
  - id: kernel-process-termination
    desc: Kernel driver capability to terminate processes
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/terminate/kill::zw-terminate-process
      - id: micro-behaviors/process/terminate/kill::zw-open-process
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
        - id: metadata/signed/platform::microsoft
        - id: well-known/lib/win32k::win32kfull-system-component
        - id: well-known/lib/wine::wine-runtime-component
    unless:
      - id: well-known/lib/win32k::win32kbase-system-component
      - id: metadata/binary/vendor::bitdefender-product-marker
