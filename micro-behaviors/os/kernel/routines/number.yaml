defaults:
  platforms: [linux, android]
  for: [c]
  crit: notable
  conf: 0.88

traits:
  - id: simple-strtoul-call
    desc: Parses an integer with simple_strtoul
    if:
      type: symbol
      kind: call
      exact: simple_strtoul

  - id: copyin-call
    desc: Copies kernel data from user space
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: copyin

  - id: copyout-call
    desc: Copies kernel data to user space
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: copyout
