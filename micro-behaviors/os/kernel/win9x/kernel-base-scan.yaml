defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: asm-mz-scan-backward
    conf: 0.92
    crit: suspicious
    desc: ASM scans backward for MZ DOS header
    if:
      type: raw
      regex: cmp\s+word\s+ptr\s+\[e[a-d]x\],'MZ'
  - id: asm-page-align-scan
    conf: 0.9
    crit: component
    desc: ASM page-aligned memory scan
    if:
      type: raw
      regex: sub\s+e[a-d]x,1000h
composite_rules:
  - id: asm-kernel-base-scan
    conf: 0.95
    crit: suspicious
    desc: Scans memory backward for kernel base
    attack: T1106
    all:
      - id: asm-mz-scan-backward
      - id: asm-page-align-scan
