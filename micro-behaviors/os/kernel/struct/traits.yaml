# Core Linux kernel structure usage — kernel-programming facts shared by
# drivers, tracers, and glibc-adjacent headers. Rootkit intent lives in
# objectives/evasion/kernel-hide composites that reference these cross-tier.
defaults:
  platforms: [linux, android]
  for: [c]
  crit: notable
  conf: 0.85
traits:
  - id: task-struct
    desc: Linux task_struct usage
    if:
      type: text
      substr: task_struct
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: cred-struct
    desc: Linux struct cred usage
    if:
      type: text
      regex: '\bstruct\s+cred\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
