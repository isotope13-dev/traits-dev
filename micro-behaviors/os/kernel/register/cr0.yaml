# x86 CR0 control-register access. Reading and writing CR0 is a privileged
# operation, so it is analyst-relevant wherever it appears — but it is NOT by
# itself a rootkit signal. In-tree kernel code touches CR0 routinely for cache
# control (`drivers/cpufreq/powernow-k6.c` sets X86_CR0_CD around a frequency
# transition), suspend/resume register save-restore (`arch/x86/power/cpu.c`),
# and paging setup. What distinguishes a rootkit is clearing the *write-protect*
# bit (bit 16) to patch read-only kernel memory; that intent lives in
# objectives/evasion/kernel-hide/, which composes these atoms with WP evidence.
defaults:
  platforms: [unix]
  for: [c, cpp, elf]
  crit: notable
  conf: 0.95

traits:
  - id: cr0-read-call
    desc: Reads the x86 CR0 control register
    if:
      type: symbol
      kind: call
      exact: read_cr0
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

  - id: cr0-write-call
    desc: Writes the x86 CR0 control register
    if:
      type: symbol
      regex: ^write_cr0
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

  - id: native-cr0-write-call
    desc: Writes CR0 via native_write_cr0
    if:
      type: symbol
      regex: ^native_write_cr0
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
