# x86 System Management Mode interfaces. Entering SMM is a firmware-privileged
# transition, so referencing the interface is analyst-relevant — but it is not
# an attack on its own: in-tree platform drivers use it for ordinary hardware
# access (drivers/hwmon/dell-smm-hwmon.c declares an `smm_call` function pointer
# and a `struct smm_regs` to read fan speeds and temperatures). SMM *backdoor*
# intent is asserted in objectives/privilege-escalation/exploit/kernel/, which
# pairs these atoms with a privesc command and root-shell evidence.
defaults:
  platforms: [linux]
  for: [c, cpp]
  crit: notable
  conf: 0.9

traits:
  - id: smm-call-interface
    desc: References an SMM call interface
    if:
      type: text
      word: smm_call
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: smm-register-block-struct
    desc: SMM register block struct reference
    conf: 0.88
    if:
      type: text
      word: smm_regs
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
