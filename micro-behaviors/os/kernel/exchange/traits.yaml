defaults:
  platforms: [unix]
  for: [c]

traits:
  - id: xchg-atomic-operation
    desc: C source references the xchg atomic operation
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: xchg
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
