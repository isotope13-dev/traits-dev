defaults:
  platforms: [linux, android]
  for: [c]
  crit: component
  conf: 0.9

traits:
  - id: linux-bpf-header
    desc: Linux BPF kernel header
    if:
      type: string_literal
      regex: linux/bpf\.h
  - id: linux-sched-signal-header
    desc: Linux task signal header
    if:
      type: string_literal
      regex: linux/sched/signal\.h
  - id: linux-sock-diag-header
    desc: Linux socket diagnostics header
    if:
      type: string_literal
      regex: linux/sock_diag\.h
  - id: linux-tracepoint-header
    desc: Linux tracepoint kernel header
    if:
      type: string_literal
      regex: linux/tracepoint\.h
