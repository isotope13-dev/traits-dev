defaults:
  platforms: [linux, android]
  for: [c]
  crit: component
  conf: 0.9

traits:
  - id: linux-user-mode-helper-header
    desc: Linux user-mode helper header
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: linux/umh\.h
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: linux-bpf-header
    desc: Linux BPF kernel header
    if:
      type: string_literal
      regex: linux/bpf\.h
  - id: linux-sched-signal-header
    desc: Linux task signal header
    if:
      type: string_literal
      regex: linux/sched/signal\.h
  - id: linux-sock-diag-header
    desc: Linux socket diagnostics header
    if:
      type: string_literal
      regex: linux/sock_diag\.h
  - id: linux-tracepoint-header
    desc: Linux tracepoint kernel header
    if:
      type: string_literal
      regex: linux/tracepoint\.h
