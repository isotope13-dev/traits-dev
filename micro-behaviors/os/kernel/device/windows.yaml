defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
traits:
- id: create-device-object
  desc: Create kernel device object
  crit: notable
  conf: 0.94
  if:
    type: symbol
    exact: "IoCreateDevice"
- id: create-device-object-xoradd-string
  desc: Encoded IoCreateDevice string
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: '}ZuE]XN^xXHV#$B'
- id: create-device-symbolic-link
  desc: Create device symbolic link
  crit: notable
  conf: 0.95
  if:
    type: symbol
    exact: "IoCreateSymbolicLink"
- id: create-device-object-atbash-string
  desc: Atbash-obfuscated IoCreateDevice string
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: 'RlXivzgvWverxv'
- id: create-device-symbolic-link-atbash-string
  desc: Atbash-obfuscated IoCreateSymbolicLink string
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: 'RlXivzgvHbnylorxOrmp'
- id: create-device-symbolic-link-xoradd-string
  desc: Encoded IoCreateSymbolicLink string
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: '}ZuE]XN^oDS]/-+'
- id: build-device-ioctl-request
  desc: Build kernel device IOCTL request
  crit: baseline
  conf: 0.92
  if:
    type: symbol
    exact: "IoBuildDeviceIoControlRequest"
- id: filesystem-device-type
  desc: Filesystem device type reference
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: \b(FILE_DEVICE_(DISK_FILE_SYSTEM|NETWORK_FILE_SYSTEM|FILE_SYSTEM))\b
  unless:
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: filesystem-irp-major-functions--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  count_min: 3
  if:
    type: text
    regex: \b(IRP_MJ_(CREATE|READ))\b
  count_max: 1004258
- id: filesystem-irp-major-functions--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  count_min: 3
  if:
    type: text
    regex: \b(IRP_MJ_(CLOSE|QUERY_INFORMATION))\b
  count_max: 1004259
- id: filesystem-irp-major-functions--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  count_min: 3
  if:
    type: text
    regex: \b(IRP_MJ_(FILE_SYSTEM_CONTROL|DEVICE_CONTROL))\b
  count_max: 1004260
- id: attach-device-stack--ioattachdevice
  desc: Attach kernel device stack (IoAttachDevice)
  crit: notable
  conf: 0.94
  if:
    type: text
    word: IoAttachDevice
- id: attach-device-stack--ioattachdevicetodevicestack
  desc: Attach kernel (IoAttachDeviceToDeviceStack)
  crit: notable
  conf: 0.94
  if:
    type: text
    word: IoAttachDeviceToDeviceStack
- id: attach-device-stack--ioattachdevicetodevicestacksafe
  desc: Attach kernel (IoAttachDeviceToDeviceStackSafe)
  crit: notable
  conf: 0.94
  if:
    type: text
    word: IoAttachDeviceToDeviceStackSafe
composite_rules:
- id: attach-device-stack
  desc: Attach kernel device stack
  crit: notable
  conf: 0.94
  any:
  - id: attach-device-stack--ioattachdevice
  - id: attach-device-stack--ioattachdevicetodevicestack
  - id: attach-device-stack--ioattachdevicetodevicestacksafe
- id: kernel-device-control
  desc: Kernel device control channel
  crit: notable
  conf: 0.96
  all:
  - id: create-device-object
  - id: create-device-symbolic-link
  - id: build-device-ioctl-request
- id: hidden-kernel-device-control
  desc: Hidden kernel device control channel
  crit: notable
  conf: 0.95
  all:
  - id: create-device-object-xoradd-string
  - id: create-device-symbolic-link-xoradd-string
- id: atbash-kernel-device-control
  desc: Atbash-obfuscated kernel device control channel
  crit: notable
  conf: 0.98
  all:
  - id: create-device-object-atbash-string
  - id: create-device-symbolic-link-atbash-string
- id: filesystem-filter-device
  desc: Filesystem filter device attachment
  crit: notable
  conf: 0.95
  all:
  - id: create-device-object
  - id: attach-device-stack
  any:
  - id: filesystem-device-type
  - id: filesystem-irp-major-functions
- id: filesystem-irp-major-functions
  desc: Filesystem IRP major functions
  crit: notable
  conf: 0.92
  any:
  - id: filesystem-irp-major-functions--rx-1
  - id: filesystem-irp-major-functions--rx-2
  - id: filesystem-irp-major-functions--rx-3
