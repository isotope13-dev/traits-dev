defaults:
  platforms: [linux, openwrt]
  for: [c, cpp, elf]

traits:
  - id: linux-register-chrdev
    desc: Registers Linux char device
    crit: notable
    conf: 0.9
    if:
      type: text
      word: register_chrdev
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: linux-major-device-number
    desc: Extracts Linux major device number
    crit: notable
    conf: 0.75
    for: [c]
    if:
      type: symbol
      kind: call
      exact: MAJOR
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
