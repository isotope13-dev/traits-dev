# Linux kernel notifier-chain registration. Registering on the keyboard
# notifier chain is how a module observes key events, and it is neutral on its
# own: the in-tree screen reader (drivers/accessibility/speakup), SysRq and
# input drivers all register here, as do LKM keyloggers. The keylogging intent
# comes from what the module does with the events — keycode maps, a capture
# buffer, copy_to_user — which objectives/collection/keylog/kernel/ composes.
defaults:
  platforms: [linux]
  for: [c, elf]
  crit: notable
  conf: 0.95

traits:
  - id: keyboard-notifier-register
    desc: Registers a kernel keyboard notifier
    if:
      type: text
      word: register_keyboard_notifier
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: keyboard-notifier-unregister
    desc: Unregisters a kernel keyboard notifier
    conf: 0.93
    if:
      type: text
      word: unregister_keyboard_notifier
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: keyboard-notifier-param-struct
    desc: keyboard_notifier_param struct reference
    crit: component
    conf: 0.93
    if:
      type: text
      word: keyboard_notifier_param
