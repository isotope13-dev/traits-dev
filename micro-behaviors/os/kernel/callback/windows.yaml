defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: process-notify-routine
    desc: Register process creation callback
    crit: notable
    conf: 0.95
    attack: "T1057"
    if:
      type: symbol
      exact: "PsSetCreateProcessNotifyRoutine"
  - id: process-notify-routine-ex
    desc: Register extended process callback
    crit: notable
    conf: 0.95
    attack: "T1057"
    if:
      type: symbol
      exact: "PsSetCreateProcessNotifyRoutineEx"
  - id: image-load-notify-routine
    desc: Register image load callback
    crit: notable
    conf: 0.95
    attack: "T1574"
    if:
      type: symbol
      exact: "PsSetLoadImageNotifyRoutine"
  - id: registry-callback
    desc: Register registry operation callback
    crit: suspicious
    conf: 0.97
    attack: "T1112"
    if:
      type: symbol
      exact: "CmRegisterCallback"
  - id: shutdown-notification
    desc: Register driver shutdown notification
    crit: notable
    conf: 0.92
    attack: "T1547.006"
    if:
      type: symbol
      exact: "IoRegisterShutdownNotification"
composite_rules:
  - id: process-lifecycle-callback
    desc: Process lifecycle callback registration
    crit: notable
    conf: 0.95
    any:
      - id: process-notify-routine
      - id: process-notify-routine-ex
  - id: rootkit-callback-triad
    desc: Process image and registry callbacks
    crit: suspicious
    conf: 0.98
    all:
      - id: process-lifecycle-callback
      - id: image-load-notify-routine
      - id: registry-callback
