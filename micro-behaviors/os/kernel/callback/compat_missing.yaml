defaults:
  platforms: [windows]
  for: [binaries, c, cpp]

traits:
- id: filesystem-minifilter-control--ioregisterfsregistrationchange
  desc: Filesystem (IoRegisterFsRegistrationChange)
  crit: notable
  conf: 0.95
  if:
    type: text
    word: IoRegisterFsRegistrationChange
- id: filesystem-minifilter-control--fltregisterfilter
  desc: Filesystem filter (FltRegisterFilter)
  crit: notable
  conf: 0.95
  if:
    type: text
    word: FltRegisterFilter
- id: filesystem-minifilter-control--fltstartfiltering
  desc: Filesystem filter (FltStartFiltering)
  crit: notable
  conf: 0.95
  if:
    type: text
    word: FltStartFiltering
composite_rules:
- id: filesystem-minifilter-control
  desc: Filesystem filter registration
  crit: notable
  conf: 0.95
  any:
  - id: filesystem-minifilter-control--ioregisterfsregistrationchange
  - id: filesystem-minifilter-control--fltregisterfilter
  - id: filesystem-minifilter-control--fltstartfiltering
