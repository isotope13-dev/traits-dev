defaults:
  platforms: [unix]
  for: [c, cpp, elf, shell]

traits:
  - id: ftrace-enabled-variable
    desc: ftrace_enabled kernel variable
    crit: notable
    conf: 0.75
    if:
      type: text
      word: ftrace_enabled
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: tracing-on-variable
    desc: tracing_on kernel variable
    crit: notable
    conf: 0.75
    if:
      type: text
      word: tracing_on
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
