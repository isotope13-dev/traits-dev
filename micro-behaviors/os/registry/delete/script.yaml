# WScript registry deletion is a neutral script capability.  Impact or
# persistence intent is inferred only when combined with stronger evidence.
defaults:
  platforms: [windows]
  for: [vbs]
  crit: notable
  conf: 0.9

traits:
  - id: wscript-regdelete
    desc: WScript RegDelete registry removal
    crit: notable
    conf: 0.9
    attack: T1112
    mbc: E1563
    if:
      type: string_literal
      regex: RegDelete\s*\(
