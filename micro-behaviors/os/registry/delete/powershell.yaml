defaults:
  platforms: [windows]
  for: [powershell, batch]
  crit: notable
  conf: 0.9
  attack: T1112
  mbc: E1563

traits:
  - id: remove-itemproperty-run-key
    desc: Removes a Windows Run-key value
    if:
      type: text
      regex: (?i)Remove-ItemProperty\b[^\n]{0,160}(HKLM|HKCU)[:\\][^\n]{0,200}\\CurrentVersion\\Run

  - id: reg-delete-run-key
    desc: reg.exe deletes a Windows Run-key value
    if:
      type: text
      regex: (?i)reg(\.exe)?\s+delete\b[^\n]{0,160}\\CurrentVersion\\Run
