# Registry hive names are neutral WScript references.  The surrounding
# operation determines whether the reference has persistence or impact intent.
defaults:
  platforms: [windows]
  for: [vbs]
  crit: notable
  conf: 0.9
  attack: T1012
  mbc: E1563

traits:
  - id: hkey-local-machine
    desc: HKLM system-wide registry hive reference
    if:
      type: string_literal
      exact: HKEY_LOCAL_MACHINE

  - id: hkey-current-user
    desc: HKCU per-user registry hive reference
    if:
      type: string_literal
      exact: HKEY_CURRENT_USER
