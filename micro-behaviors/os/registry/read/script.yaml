# WScript registry access is a neutral script capability.  Keep the atom in a
# micro-behavior tier and restrict it to executable VBScript: JavaScript
# bundles often embed old-IE VBScript fallback text as inert string literals.
defaults:
  platforms: [windows]
  for: [vbs]
  crit: notable
  conf: 0.9

traits:
  - id: wscript-regread
    desc: WScript RegRead registry query
    crit: notable
    conf: 0.9
    attack: T1012
    mbc: E1563
    if:
      type: string_literal
      regex: RegRead\s*\(
