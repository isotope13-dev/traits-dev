defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1112
  mbc: C0036
traits:
  - id: wsh-regwrite-dword
    desc: WScript.Shell RegWrite with REG_DWORD
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: REG_DWORD
  - id: wsh-regwrite-run-key
    desc: WScript.Shell regwrite to Run key
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: CurrentVersion\Run
composite_rules:
  - id: wsh-persistence-run-key
    desc: WSH persistence via Run key
    crit: suspicious
    conf: 0.95
    all:
      - id: wsh-regwrite-run-key
      - id: wsh-regwrite-dword
