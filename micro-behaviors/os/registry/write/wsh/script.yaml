# WScript registry writes are a neutral script capability.  Persistence is
# inferred by objective composites when a write is paired with an autostart key.
defaults:
  platforms: [windows]
  for: [vbs]
  crit: notable
  conf: 0.9
  attack: T1112
  mbc: E1563

traits:
  - id: wscript-regwrite
    desc: WScript RegWrite registry modification
    if:
      type: string_literal
      regex: RegWrite\s*\(
