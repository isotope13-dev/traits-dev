defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1112"
traits:
  - id: load-registry-hive
    desc: Load registry hive from disk
    crit: notable
    conf: 0.97
    if:
      type: symbol
      exact: "ZwLoadKey"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: unload-registry-hive
    desc: Unload registry hive from disk
    crit: notable
    conf: 0.97
    if:
      type: symbol
      exact: "ZwUnloadKey"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: create-registry-key
    desc: Create registry key
    crit: baseline
    conf: 0.93
    if:
      type: symbol
      exact: "ZwCreateKey"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: set-registry-value
    desc: Set registry value
    crit: baseline
    conf: 0.93
    if:
      type: symbol
      exact: "ZwSetValueKey"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: write-registry-value
    desc: Write registry value helper
    crit: baseline
    conf: 0.92
    if:
      type: symbol
      exact: "RtlWriteRegistryValue"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
composite_rules:
  - id: registry-hive-load-unload
    desc: Registry hive load and unload
    crit: suspicious
    conf: 0.98
    all:
      - id: load-registry-hive
      - id: unload-registry-hive
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
        - id: metadata/vendor/sandboxie::sandboxie-component
        - type: symbol
          exact: "NtInitializeRegistry"
  - id: registry-persistence-primitives
    desc: Registry persistence write primitives
    crit: notable
    conf: 0.95
    all:
      - id: create-registry-key
      - id: set-registry-value
      - id: write-registry-value
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
