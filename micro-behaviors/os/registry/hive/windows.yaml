defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1112"

traits:
  - id: load-registry-hive
    desc: Load registry hive from disk
    crit: suspicious
    conf: 0.97
    if:
      type: symbol
      exact: "ZwLoadKey"

  - id: unload-registry-hive
    desc: Unload registry hive from disk
    crit: suspicious
    conf: 0.97
    if:
      type: symbol
      exact: "ZwUnloadKey"

  - id: create-registry-key
    desc: Create registry key
    crit: notable
    conf: 0.93
    if:
      type: symbol
      exact: "ZwCreateKey"

  - id: set-registry-value
    desc: Set registry value
    crit: notable
    conf: 0.93
    if:
      type: symbol
      exact: "ZwSetValueKey"

  - id: write-registry-value
    desc: Write registry value helper
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: "RtlWriteRegistryValue"

composite_rules:
  - id: registry-hive-load-unload
    desc: Registry hive load and unload
    crit: suspicious
    conf: 0.98
    all:
      - id: load-registry-hive
      - id: unload-registry-hive

  - id: registry-persistence-primitives
    desc: Registry persistence write primitives
    crit: notable
    conf: 0.95
    all:
      - id: create-registry-key
      - id: set-registry-value
      - id: write-registry-value
