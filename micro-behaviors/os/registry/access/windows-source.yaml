defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: messenger-cache-service-path
    desc: MessengerService list cache path
    crit: notable
    conf: 0.97
    if:
      type: text
      exact: Software\Microsoft\MessengerService\ListCache\.NET Messenger Service
  - id: msnmessenger-cache-path
    desc: MSN Messenger list cache path
    crit: notable
    conf: 0.97
    if:
      type: text
      exact: Software\Microsoft\MSNMessenger\ListCache\.NET Messenger Service
  - id: mirc-uninstall-key-source
    desc: mIRC uninstall registry path
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: \SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\mIRC
  - id: currentversion-run-open-source
    desc: Opens CurrentVersion Run key
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: \Software\Microsoft\Windows\CurrentVersion\Run
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-code-signing-pca-2011
        - id: metadata/binary/metrics::many-imports
  - id: load32-run-write-source
    desc: Writes LOAD32 run value
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: Reg.WriteString('LOAD32',SysDir + '\Lorena.exe');
  - id: programfilesdir-read-source
    desc: Reads ProgramFilesDir path
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: Progfiles := reg.ReadString('ProgramFilesDir');
composite_rules:
  - id: messenger-contact-cache-harvest
    desc: Harvests Messenger contact caches
    crit: suspicious
    conf: 0.98
    all:
      - id: messenger-cache-service-path
      - id: msnmessenger-cache-path
