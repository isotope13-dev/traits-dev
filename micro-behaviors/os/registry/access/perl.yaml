defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1112

traits:
  - id: perl-win32-tieregistry
    desc: Perl Win32 TieRegistry import
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?m)^\s*use\s+Win32::TieRegistry\s*;

  - id: perl-registry-key-write
    desc: Perl registry KEY_WRITE constant
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: Win32::TieRegistry::KEY_WRITE()

  - id: perl-reg-add-reg-sz
    desc: Perl reg add REG_SZ command
    crit: notable
    conf: 0.86
    if:
      type: literal
      regex: 'reg add .{0,160}/t REG_SZ'
