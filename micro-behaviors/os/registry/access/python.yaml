defaults:
  platforms: [windows]
  for: [python]

traits:
  - id: python-winreg-import
    desc: Python winreg import
    crit: notable
    conf: 1.0
    if:
      type: text
      regex: 'import\s+(winreg|_winreg)'

composite_rules:
  - id: python-reg-run-access
    desc: Python Windows registry Run key access
    crit: notable
    conf: 0.95
    mbc: F0006
    all:
      - id: python-winreg-import
      - id: micro-behaviors/os/registry/keys::windows-registry-run-access
