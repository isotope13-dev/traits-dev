defaults:
  platforms: [windows]
  for: [javascript, vbs]

traits:
  - id: powershell-app-paths-registry-read
    desc: Reads PowerShell App Paths registry entry
    crit: notable
    conf: 0.94
    attack: T1012
    if:
      type: text
      regex: '(?i)App\s*Paths.{0,120}Powe.{0,24}Sh.{0,24}ell.{0,24}e.{0,12}xe'
