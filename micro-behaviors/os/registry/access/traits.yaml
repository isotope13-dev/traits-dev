defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: msi-edgeupdate-config-value-reference
  desc: MSI EdgeUpdate registry config value
  crit: notable
  conf: 0.96
  attack: T1112
  for: [oledoc, ole]
  if:
    type: raw
    regex: '(?i)Software\\Microsoft\\EdgeUpdatecfg'
- id: powershell-registry-read
  desc: PowerShell reads a registry value
  crit: notable
  conf: 0.9
  for: [powershell, oledoc]
  attack: T1012,T1112
  if:
    type: text
    regex: '(?i)\b(gp\s+["'']?HKCU:\\|Get-ItemProperty\b)'
  unless:
  - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
- id: reg-open-key-w
  desc: Open registry key via WinAPI
  crit: baseline
  conf: 0.85
  attack: T1112
  if:
    type: symbol
    exact: RegOpenKeyW
- id: reg-open-key-ex-w-symbol
  desc: Open registry key via import symbol
  crit: baseline
  conf: 0.9
  attack: T1112
  if:
    type: symbol
    exact: RegOpenKeyExW
- id: reg-open-key-a-symbol
  desc: Open registry key via import symbol
  crit: baseline
  conf: 0.9
  attack: T1112
  if:
    type: symbol
    exact: RegOpenKeyA
- id: reg-open-key-ex-a-symbol
  desc: Open registry key via import symbol ANSI
  crit: baseline
  conf: 0.9
  attack: T1112
  if:
    type: symbol
    exact: RegOpenKeyExA
- id: go-registry-openkey-call
  desc: Open registry key via Go API
  crit: baseline
  conf: 0.88
  attack: T1112
  for:
  - go
  if:
    type: symbol
    kind: call
    regex: '(^|\\.)(registry\.OpenKey|OpenKey)$'
- id: go-registry-package-import
  desc: Go Windows registry package import
  crit: baseline
  conf: 0.9
  attack: T1112
  for:
  - go
  if:
    type: symbol
    kind: import
    exact: golang.org/x/sys/windows/registry
- id: go-registry-create-key
  desc: Creates Windows registry key via Go
  crit: notable
  conf: 0.94
  attack: T1112
  for:
  - go
  if:
    type: symbol
    kind: call
    exact: registry.CreateKey
- id: reg-query-value-ex-a-symbol
  desc: Query registry value via import symbol
  crit: baseline
  conf: 0.85
  attack: T1112
  if:
    type: symbol
    exact: RegQueryValueExA
- id: reg-query-value-ex-w-symbol
  desc: Query registry value via import symbol
  crit: baseline
  conf: 0.9
  attack: T1112
  if:
    type: symbol
    exact: RegQueryValueExW
- id: reg-query-info-key-a-symbol
  desc: Query registry key metadata ANSI
  crit: baseline
  conf: 0.85
  attack: T1112
  if:
    type: symbol
    exact: RegQueryInfoKeyA
- id: reg-enum-value-a-symbol
  desc: Enumerate registry values via import
  crit: baseline
  conf: 0.88
  attack: T1112
  if:
    type: symbol
    exact: RegEnumValueA
- id: reg-enum-key-ex-a-symbol
  desc: Enumerate registry subkeys via import
  crit: baseline
  conf: 0.88
  attack: T1112
  if:
    type: symbol
    exact: RegEnumKeyExA
- id: reg-create-key-ex-w
  desc: Create registry key via WinAPI
  crit: baseline
  conf: 0.85
  attack: T1112
  if:
    type: symbol
    exact: RegCreateKeyExW
- id: reg-create-key-a
  desc: Create registry key via WinAPI
  crit: baseline
  conf: 0.85
  attack: T1112
  if:
    type: text
    regex: ^RegCreateKey[AW]$
- id: reg-set-value-ex-a
  desc: Set registry value via WinAPI ANSI
  crit: baseline
  conf: 0.85
  attack: T1112
  if:
    type: symbol
    exact: RegSetValueExA
- id: reg-set-value-ex-w
  desc: Set registry value via WinAPI
  crit: baseline
  conf: 0.85
  attack: T1112
  if:
    type: symbol
    exact: RegSetValueExW
- id: registry-powershell-byte-payload--rx-4
  desc: RegSetValueEx text reference
  crit: component
  conf: 0.9
  attack: T1112
  if:
    type: text
    substr: RegSetValueEx
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
  count_max: 1008473
- id: reg-set-key-value-a
  desc: Set registry key value API (A)
  crit: baseline
  conf: 0.85
  attack: T1112
  for: [pe, dll, c, cpp]
  if:
    type: symbol
    exact: RegSetKeyValueA
- id: reg-set-key-value-w
  desc: Set registry key value API (W)
  crit: baseline
  conf: 0.85
  attack: T1112
  for: [pe, dll, c, cpp]
  if:
    type: symbol
    exact: RegSetKeyValueW
- id: reg-notify-change-key-value
  desc: Monitor registry key changes
  crit: notable
  conf: 0.85
  attack: T1112
  if:
    type: symbol
    exact: RegNotifyChangeKeyValue
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: reg-set-key-security
  desc: Modify registry key security
  crit: notable
  conf: 0.9
  attack: T1112
  if:
    type: symbol
    exact: RegSetKeySecurity
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: reg-create-key-transacted-name
  desc: Transacted registry create API lookup
  crit: notable
  conf: 0.9
  attack: T1112
  if:
    type: text
    exact: RegCreateKeyTransactedW
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: reg-open-key-transacted-name
  desc: Transacted registry open API lookup
  crit: notable
  conf: 0.9
  attack: T1112
  if:
    type: text
    exact: RegOpenKeyTransactedW
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: reg-delete-key-transacted-name
  desc: Transacted registry delete API lookup
  crit: notable
  conf: 0.9
  attack: T1112
  if:
    type: text
    exact: RegDeleteKeyTransactedW
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: internet-settings-key
  desc: Internet Settings registry key access
  crit: notable
  conf: 0.85
  attack: T1112
  if:
    type: text
    exact: Software\Microsoft\Windows\CurrentVersion\Internet Settings
- id: windows-uninstall-key-path
  desc: Windows uninstall registry key path string
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall
- id: legacy-netscape-navigator-key
  desc: Legacy Netscape Navigator registry key access
  crit: baseline
  conf: 0.85
  if:
    type: text
    regex: (?i)Software\\Netscape\\Netscape Navigator
    section: .text
- id: legacy-netscape-marker
  desc: Legacy Netscape browser marker
  crit: baseline
  conf: 0.8
  if:
    type: text
    regex: (?i)(Netscape Navigator|Netscape Communicator)
    section: .text
- id: enable-autodial-value
  desc: EnableAutodial registry value access
  crit: notable
  conf: 0.9
  attack: T1112
  if:
    type: text
    exact: EnableAutodial
- id: windows-firewall-authorizedapps-path
  desc: Windows firewall authorized apps key path
  crit: notable
  conf: 0.9
  attack: T1562.004
  if:
    type: text
    exact: SYSTEM\CurrentControlSet\Services\SharedAccess\Parameters\FirewallPolicy\StandardProfile\AuthorizedApplications\List
- id: service-dll-value
  desc: ServiceDLL registry value name
  crit: component
  conf: 0.86
  attack: T1112
  if:
    type: text
    exact: ServiceDLL
- id: powershell-shellids-path
  desc: PowerShell ShellIds registry path
  crit: notable
  conf: 0.92
  attack: T1112
  if:
    type: text
    exact: SOFTWARE\Microsoft\PowerShell\1\ShellIds\Microsoft.PowerShell
- id: powershell-executionpolicy-value
  desc: PowerShell ExecutionPolicy value-name reference
  crit: notable
  conf: 0.92
  if:
    type: text
    exact: ExecutionPolicy
  unless:
    - id: metadata/signed/platform::microsoft
    - id: metadata/package/quality/false-positives::microsoft-office-support-bundle-context
- id: active-setup-fragment
  desc: Active Setup registry key fragment
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    substr: Active Setup\I
- id: powershell-policy-state-signed--remotesigned
  desc: PowerShell signed policy state (RemoteSigned)
  crit: component
  conf: 0.84
  if:
    type: text
    exact: RemoteSigned
- id: powershell-policy-state-signed--allsigned
  desc: PowerShell signed policy state (AllSigned)
  crit: component
  conf: 0.84
  if:
    type: text
    exact: AllSigned
- id: powershell-policy-state-signed--restricted
  desc: PowerShell signed policy state (Restricted)
  crit: component
  conf: 0.84
  if:
    type: text
    exact: Restricted
- id: powershell-policy-state-bypass--bypass
  desc: PowerShell bypass policy state (Bypass)
  crit: component
  conf: 0.86
  if:
    type: text
    exact: Bypass
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: powershell-policy-state-bypass--unrestricted
  desc: PowerShell bypass policy state (Unrestricted)
  crit: component
  conf: 0.86
  if:
    type: text
    exact: Unrestricted
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
composite_rules:
- id: powershell-policy-state-signed
  desc: PowerShell signed policy state
  crit: component
  conf: 0.84
  attack: T1112
  any:
  - id: powershell-policy-state-signed--remotesigned
  - id: powershell-policy-state-signed--allsigned
  - id: powershell-policy-state-signed--restricted
- id: powershell-policy-state-bypass
  desc: PowerShell bypass policy state
  crit: component
  conf: 0.86
  attack: T1112
  any:
  - id: powershell-policy-state-bypass--bypass
  - id: powershell-policy-state-bypass--unrestricted
- id: registry-open-key-api
  desc: Registry key open API
  crit: baseline
  conf: 0.9
  attack: T1112
  any:
  - id: reg-open-key-w
  - id: reg-open-key-a-symbol
  - id: reg-open-key-ex-w-symbol
  - id: reg-open-key-ex-a-symbol
  - id: go-registry-openkey-call
- id: registry-query-value-api
  desc: Registry value query API
  crit: baseline
  conf: 0.88
  attack: T1112
  any:
  - id: reg-query-value-ex-a-symbol
  - id: reg-query-value-ex-w-symbol
- id: registry-read-api-chain
  desc: Registry key open and query chain
  crit: baseline
  conf: 0.9
  attack: T1112
  all:
  - id: registry-open-key-api
  - id: registry-query-value-api
- id: registry-enumeration-api-chain
  desc: Registry key enumeration API chain
  crit: notable
  conf: 0.9
  attack: T1112
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
  all:
  - id: registry-open-key-api
  any:
  - id: reg-query-info-key-a-symbol
  - id: reg-enum-value-a-symbol
  - id: reg-enum-key-ex-a-symbol
  needs: 2
- id: registry-create-key-api
  desc: Registry key creation API
  crit: notable
  conf: 0.9
  attack: T1112
  any:
  - id: micro-behaviors/os/registry/manipulate::reg-create-key-ex-a
  - id: reg-create-key-ex-w
  - id: reg-create-key-a
- id: registry-set-value-api
  desc: Registry value write API
  crit: notable
  conf: 0.9
  attack: T1112
  for: [pe, dll, c, cpp]
  any:
  - id: reg-set-value-ex-a
  - id: reg-set-value-ex-w
  - id: reg-set-key-value-a
  - id: reg-set-key-value-w
- id: registry-write-api-chain
  desc: Registry key and value write chain
  crit: baseline
  conf: 0.9
  attack: T1112
  all:
  - id: registry-set-value-api
  any:
  - id: registry-create-key-api
  - id: registry-open-key-api
- id: registry-transacted-api-chain
  desc: Transacted registry API fallback chain
  crit: notable
  conf: 0.9
  attack: T1112
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
  all:
  - id: reg-open-key-transacted-name
  - id: reg-create-key-transacted-name
  - id: reg-delete-key-transacted-name
- id: internet-settings-autodial-tamper
  desc: Internet Settings autodial registry tampering
  crit: notable
  conf: 0.9
  attack: T1112
  all:
  - id: internet-settings-key
  - id: enable-autodial-value
  - id: reg-open-key-w
  any:
  - id: reg-set-value-ex-a
  - id: reg-set-value-ex-w
- id: windows-firewall-authorizedapps-write-chain
  desc: Firewall authorized apps registry write chain
  crit: notable
  conf: 0.92
  attack: T1562.004
  all:
  - id: windows-firewall-authorizedapps-path
  - id: registry-set-value-api
  any:
  - id: reg-open-key-w
  - id: registry-create-key-api
- id: powershell-executionpolicy-write-chain
  desc: PowerShell policy registry write
  crit: suspicious
  conf: 0.94
  attack: T1112
  all:
  - id: powershell-shellids-path
  - id: powershell-executionpolicy-value
  - id: registry-set-value-api
  any:
  - id: reg-open-key-w
  - id: registry-create-key-api
  - id: registry-query-value-api
- id: powershell-policy-state
  desc: PowerShell policy state string
  crit: component
  conf: 0.88
  attack: T1112
  any:
  - id: powershell-policy-state-signed
  - id: powershell-policy-state-bypass
