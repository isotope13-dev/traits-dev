defaults:
  platforms: [windows]
  for: [binaries, scripts, oledoc]

traits:
  - id: currentversion-run
    desc: CurrentVersion Run path
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: CurrentVersion\Run
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/vendor::microsoft-corp-versioninfo

  - id: go-currentversion-run
    desc: Go CurrentVersion Run path
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: text
      regex: '(?i)CurrentVersion\\\\+Run'

  - id: windows-registry-run-access
    desc: Accesses Windows registry Run key
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)currentversion\\run
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: run-value-name
    desc: Windows Run registry value name string
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '(?i)(currentversion\\+run|\\+runonce\b|\\+run\b)'
  - id: currentversion-run-perl-escaped
    desc: Escaped CurrentVersion Run path
    crit: notable
    conf: 0.85
    for: [perl]
    platforms: [windows, unix]
    if:
      type: text
      substr: 'Software\\Microsoft\\Windows\\CurrentVersion\\Run'
