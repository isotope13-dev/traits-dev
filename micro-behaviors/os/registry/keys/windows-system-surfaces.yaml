defaults:
  platforms: [windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9

traits:
  - id: winlogon-registry-path
    desc: Windows Winlogon registry key path
    for: [powershell, pe, dll, csharp, batch, vbs]
    if:
      type: text
      substr: 'Windows NT\CurrentVersion\Winlogon'

  - id: currentversion-windows-load-run-path
    desc: Windows CurrentVersion Load or Run key path
    for: [powershell, pe, dll, csharp, batch, vbs]
    if:
      type: text
      regex: '(?is)CurrentVersion\\Windows.{0,96}\b(load|run)\b'

  - id: appinit-dlls-value-name
    desc: AppInit DLL registry value name
    if:
      type: text
      word: AppInit_DLLs

  - id: loadappinit-policy-value
    desc: LoadAppInit DLL policy value name
    if:
      type: text
      word: LoadAppInit_DLLs

  - id: appcert-dlls-registry-path
    desc: AppCert DLL registry value path
    if:
      type: text
      regex: '(?i)\\Control\\Session Manager\\AppCertDlls\b|\\AppCertDlls\b'
