defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: user-shell-folders-regpath
  desc: Explorer User Shell Folders registry path
  crit: baseline
  conf: 0.92
  if:
    type: text
    exact: SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\User Shell Folders
- id: lanmanserver-parameters-regpath
  desc: LanmanServer service Parameters registry path
  crit: baseline
  conf: 0.9
  if:
    type: text
    exact: SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
