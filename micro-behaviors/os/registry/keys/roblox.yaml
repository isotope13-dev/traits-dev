defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: registry-access
    desc: Accesses Roblox registry keys
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)(SOFTWARE\\Roblox\\RobloxStudioBrowser\\roblox\.com|\.ROBLOSECURITY)'
