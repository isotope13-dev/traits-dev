defaults:
  crit: notable
  conf: 0.9
  for: [pe]
  platforms: [windows]

traits:
  - id: pubwin-registry
    desc: 'pubwin registry'
    if:
      type: text
      word: 'SOFTWARE\Hintsoft\PubwinClient'

  - id: sicent-registry
    desc: 'sicent registry'
    if:
      type: text
      word: 'SOFTWARE\Sicent\wx2004Clt'

  - id: icafe8-registry
    desc: 'icafe8 registry'
    if:
      type: text
      word: 'SOFTWARE\iCafe8'

composite_rules:
  - id: wangba-enumeration
    desc: Enumerates multiple Chinese Internet Cafe management systems
    crit: suspicious
    conf: 0.95
    all:
      - id: pubwin-registry
      - id: sicent-registry
      - id: icafe8-registry
