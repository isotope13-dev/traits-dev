defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell, vbs, javascript, csharp]
traits:
  - id: disable-taskmgr
    desc: Disable Task Manager registry policy
    crit: notable
    conf: 0.95
    if:
      type: text
      word: DisableTaskMgr
  - id: chrome-extension-force-install-policy-key
    desc: Chrome force-install policy key reference
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      exact: ExtensionInstallForcelist
