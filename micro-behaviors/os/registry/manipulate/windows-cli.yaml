defaults:
  platforms: [windows]
  for: [scripts, csharp, c, cpp, go, rust]
  attack: T1112
traits:
  - id: reg-exe-add-command
    desc: reg.exe add command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\breg(\.exe)?["'']?\s*,?\s*\[?\s*["'']add["'']'
  - id: hkcu-software-classes-path
    desc: HKCU Software Classes path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)HKCU\\+Software\\+Classes'
  - id: url-protocol-registry-value
    desc: URL Protocol registry value
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "URL Protocol"
  - id: shell-open-command-key
    desc: shell open command registry key
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)shell\\+open\\+command'
  - id: com-apartment-threading-model
    desc: Registers COM apartment threading model
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)ThreadingModel.{0,60}Apartment'
  # Registers a file-type class in HKEY_CLASSES_ROOT with an icon and/or open
  # command. This is what every installer that owns a file extension does
  # (RustDesk's `.<ext>` recording handler, image viewers, editors); ransomware
  # also does it for its encrypted-file extension, so the intent comes from the
  # ransom composite that pairs this with a ransom note / extension / shadow
  # delete -- not from the registration itself. Relocated here from
  # objectives/impact/ransom (matcher detects a generic capability).
  - id: file-class-shell-registration
    desc: HKCR file-class registration
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)(HKEY_CLASSES_ROOT|HKCR).{0,160}(DefaultIcon|shell\\\\open\\\\command|\.ico)'
    not:
    - regex: (?i)PhotoViewer\.FileAssoc
    unless:
    - id: metadata/lang/source/
