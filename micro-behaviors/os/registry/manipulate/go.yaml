defaults:
  platforms: [windows]
  for: [go]
  attack: T1112
  mbc: C0036

traits:
  - id: go-registry-set-string-value-call
    desc: Go registry SetStringValue call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(\.)?SetStringValue$'

  - id: go-registry-set-dword-value-call
    desc: Go registry SetDWordValue call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(\.)?SetDWordValue$'
