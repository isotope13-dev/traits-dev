defaults:
  for: [rust]
  platforms: [windows]
  attack: T1112

traits:
  - id: regkey-predef-hklm
    desc: Rust HKLM registry handle
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'RegKey::predef\(\s*HKEY_LOCAL_MACHINE\s*\)'

  - id: regkey-create-subkey
    desc: Rust registry subkey creation
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\.\s*create_subkey\('

  - id: regkey-set-value
    desc: Rust set_value method call
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.\s*set_value\('

composite_rules:
  - id: rust-winreg-write
    desc: Rust registry create and write
    crit: notable
    conf: 0.93
    all:
      - id: regkey-set-value
    any:
      - id: regkey-predef-hklm
      - id: regkey-create-subkey
