# Python Registry Capabilities
defaults:
  for: ["python"]
  platforms: ["windows"]
traits:
  - id: winreg-openkey
    desc: Opens a Windows registry key
    crit: baseline
    conf: 0.8
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '(^|\.)winreg\.\^OpenKey$'
  - id: winreg-setvalue
    desc: Sets a Windows registry value
    crit: notable
    conf: 0.8
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '(^|\.)winreg\.\^SetValue$'
