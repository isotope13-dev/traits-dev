defaults:
  for: [vbs]
  platforms: [windows]
  crit: notable
  conf: 0.88
traits:
  - id: regwrite-call
    desc: VBA RegWrite registry write
    attack: "T1112"
    if:
      type: string
      regex: "(?i)\\.RegWrite\\b"
  - id: regread-call
    desc: VBA RegRead registry read
    crit: baseline
    if:
      type: string
      regex: "(?i)\\.RegRead\\b"
  - id: regdelete-call
    desc: VBA RegDelete registry delete
    attack: "T1112"
    if:
      type: string
      regex: "(?i)\\.RegDelete\\b"
  - id: run-key-path
    desc: Registry Run key path reference
    crit: suspicious
    conf: 0.92
    attack: "T1547.001"
    if:
      type: raw
      regex: '(?i)\\CurrentVersion\\Run'
composite_rules:
  - id: vba-registry-persistence
    desc: VBA writes to registry Run key
    crit: suspicious
    conf: 0.96
    attack: "T1547.001"
    all:
      - id: regwrite-call
      - id: run-key-path
