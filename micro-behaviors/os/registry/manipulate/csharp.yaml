defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: registry-get-value
    desc: Registry.GetValue read access
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "Registry.GetValue("
  - id: open-subkey-writable
    desc: Registry OpenSubKey with write access
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'OpenSubKey\(.{1,200}true\)'
  - id: open-subkey-readable
    desc: Registry OpenSubKey read access
    crit: notable
    conf: 0.87
    if:
      type: text
      regex: 'OpenSubKey\(.{1,200}false\)'
  - id: create-subkey
    desc: Registry CreateSubKey usage
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ".CreateSubKey("
  - id: lanmanserver-shares-key
    desc: LanmanServer shares registry path
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: 'System\\CurrentControlSet\\Services\\lanmanserver\\Shares'
  - id: set-value
    desc: Registry SetValue write
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: ".SetValue("
composite_rules:
  - id: registry-write-marker
    desc: Registry key creation with value write
    crit: notable
    conf: 0.92
    attack: "T1112"
    all:
      - id: create-subkey
      - id: set-value
  - id: registry-share-enumeration-marker
    desc: Registry access for network share discovery
    crit: suspicious
    conf: 0.95
    all:
      - id: open-subkey-readable
      - id: lanmanserver-shares-key
