defaults:
  platforms:
  - windows
  for: [pe, c, cpp]
traits:
- id: dotnet-registry-delete-value-member
  desc: .NET RegistryKey.DeleteValue mutation
  crit: notable
  conf: 0.9
  for:
  - pe
  if:
    type: text
    exact: DeleteValue
- id: reg-delete-value-w-symbol
  desc: RegDeleteValueW registry value deletion
  crit: notable
  conf: 0.88
  attack: T1112
  if:
    type: symbol
    exact: RegDeleteValueW
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: metadata/binary/metrics/threshold::many-exports-200
- id: reg-delete-key-value-w-symbol
  desc: RegDeleteKeyValueW registry value deletion
  crit: notable
  conf: 0.9
  attack: T1112
  for:
  - pe
  if:
    type: symbol
    exact: RegDeleteKeyValueW
  unless:
  - id: metadata/signed/platform/
- id: reg-delete-value-a-symbol
  desc: RegDeleteValueA registry value deletion
  crit: notable
  conf: 0.88
  attack: T1112
  ref: sha256:4f0345c5f747afeef5bd5e071a531cdf697d5384f2943a2da854d6117b5de1e9
  if:
    type: symbol
    exact: RegDeleteValueA
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: metadata/binary/metrics/threshold::many-exports-200
- id: reg-create-key-ex-a
  desc: Create registry key ANSI
  crit: notable
  conf: 0.88
  attack: T1112
  for:
  - pe
  if:
    type: text
    exact: RegCreateKeyExA
- id: reg-close-key
  desc: Close registry key
  crit: baseline
  conf: 0.9
  if:
    type: symbol
    exact: RegCloseKey
- id: legal-notice-caption
  desc: References legalnoticecaption registry value
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)legalnoticecaption
- id: legal-notice-text
  desc: References legalnoticetext registry value
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)legalnoticetext
- id: no-changing-wallpaper
  desc: References NoChangingWallpaper policy key
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)NoChangingWallpaper
- id: lock-screen-image-path
  desc: References LockScreenImagePath registry value
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)LockScreenImagePath
- id: sh-delete-key-a
  desc: Recursively delete registry key tree
  crit: notable
  conf: 0.9
  attack: T1112
  for:
  - pe
  if:
    type: symbol
    exact: "SHDeleteKeyA"
- id: sh-delete-key-w
  desc: Recursively delete registry key tree (wide)
  crit: notable
  conf: 0.9
  attack: T1112
  for:
  - pe
  if:
    type: symbol
    exact: "SHDeleteKeyW"
- id: reg-delete-key-a-symbol
  desc: Delete registry key via import
  crit: notable
  conf: 0.9
  attack: T1112
  for:
  - pe
  if:
    type: symbol
    exact: RegDeleteKeyA
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: reg-restore-key
  desc: Restore registry key hive
  crit: notable
  conf: 0.9
  for:
  - pe
  if:
    type: text
    regex: ^RegRestoreKey[AW]?$
- id: reg-replace-key
  desc: Replace registry key hive backing
  crit: notable
  conf: 0.92
  attack: T1112
  for:
  - pe
  if:
    type: text
    regex: ^RegReplaceKey[AW]?$
  downgrade:
    any:
    - type: metrics
      field: exports.count
      min: 256
- id: reg-save-key
  desc: Save registry hive to file
  crit: notable
  conf: 0.9
  attack: T1112
  for:
  - pe
  if:
    type: text
    regex: ^RegSaveKey[AW]?$
- id: registry-hive-swap-apis-cond-0--inline-11068
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: metrics
    field: exports.count
    min: 256
  count_max: 1011069
composite_rules:
- id: registry-write-api-chain
  desc: Registry open create and write APIs
  crit: notable
  conf: 0.92
  attack: T1112
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
  all:
  - id: micro-behaviors/os/registry/access::registry-set-value-api
  any:
  - id: reg-create-key-ex-a
  - id: micro-behaviors/os/registry/access
- id: registry-state-restore-or-delete
  desc: Restore or delete registry state
  crit: notable
  conf: 0.9
  all:
  - id: micro-behaviors/os/registry/manipulate::reg-delete-value-w-symbol
  - id: reg-restore-key
- id: registry-delete-key-api
  desc: Registry key deletion API
  crit: notable
  conf: 0.9
  attack: T1112
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
  any:
  - id: reg-delete-key-a-symbol
  - id: micro-behaviors/os/registry/manipulate::reg-delete-value-w-symbol
  - id: reg-delete-value-a-symbol
  - id: sh-delete-key-a
  - id: sh-delete-key-w
- id: registry-hive-swap-apis
  desc: Registry hive save and replace chain
  crit: notable
  conf: 0.94
  attack: T1112
  all:
  - id: reg-replace-key
  any:
  - id: reg-save-key
  - id: reg-restore-key
  downgrade:
    any:
    - id: registry-hive-swap-apis-cond-0--inline-11068
