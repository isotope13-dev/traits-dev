defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - pe
    - powershell
    - batch
    - vbs
traits:
  - id: reg-close-key
    desc: Close registry key
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: RegCloseKey
  - id: legal-notice-caption
    desc: References legalnoticecaption registry value
    crit: baseline
    conf: 0.85
    if:
      type: raw
      regex: (?i)legalnoticecaption
  - id: legal-notice-text
    desc: References legalnoticetext registry value
    crit: baseline
    conf: 0.85
    if:
      type: raw
      regex: (?i)legalnoticetext
  - id: no-changing-wallpaper
    desc: References NoChangingWallpaper policy key
    crit: baseline
    conf: 0.85
    if:
      type: raw
      regex: (?i)NoChangingWallpaper
  - id: lock-screen-image-path
    desc: References LockScreenImagePath registry value
    crit: baseline
    conf: 0.85
    if:
      type: raw
      regex: (?i)LockScreenImagePath
  - id: sh-delete-key-a
    desc: Recursively delete registry key tree
    crit: notable
    conf: 0.9
    attack: T1112
    for:
      - pe
      - pe
    if:
      type: symbol
      exact: "SHDeleteKeyA"
  - id: sh-delete-key-w
    desc: Recursively delete registry key tree (wide)
    crit: notable
    conf: 0.9
    attack: T1112
    for:
      - pe
      - pe
    if:
      type: symbol
      exact: "SHDeleteKeyW"
  - id: reg-delete-value
    desc: Delete registry value
    crit: baseline
    conf: 0.88
    for:
      - pe
      - pe
    if:
      type: text
      exact: RegDeleteValueW
  - id: reg-delete-key-a-symbol
    desc: Delete registry key via import
    crit: notable
    conf: 0.9
    attack: T1112
    for:
      - pe
      - pe
    if:
      type: symbol
      exact: RegDeleteKeyA
  - id: reg-restore-key
    desc: Restore registry key hive
    crit: baseline
    conf: 0.9
    for:
      - pe
      - pe
    if:
      type: text
      regex: ^RegRestoreKey[AW]?$
  - id: reg-replace-key
    desc: Replace registry key hive backing
    crit: baseline
    conf: 0.92
    attack: T1112
    for:
      - pe
      - pe
    if:
      type: text
      regex: ^RegReplaceKey[AW]?$
    downgrade:
      any:
        - type: exports_count
          min: 256
  - id: reg-save-key
    desc: Save registry hive to file
    crit: baseline
    conf: 0.9
    attack: T1112
    for:
      - pe
      - pe
    if:
      type: text
      regex: ^RegSaveKey[AW]?$
composite_rules:
  - id: registry-state-restore-or-delete
    desc: Restore or delete registry state
    crit: baseline
    conf: 0.9
    all:
      - id: reg-delete-value
      - id: reg-restore-key
  - id: registry-delete-key-api
    desc: Registry key deletion API
    crit: notable
    conf: 0.9
    attack: T1112
    any:
      - id: reg-delete-key-a-symbol
      - id: reg-delete-value
      - id: sh-delete-key-a
      - id: sh-delete-key-w
  - id: registry-hive-swap-apis
    desc: Registry hive save and replace chain
    crit: baseline
    conf: 0.94
    attack: T1112
    all:
      - id: reg-replace-key
    any:
      - id: reg-save-key
      - id: reg-restore-key
    downgrade:
      any:
        - type: exports_count
          min: 256
