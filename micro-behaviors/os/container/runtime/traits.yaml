# Container Detection - Generic
# Generic container detection paths
# NOTE: /proc/1/cgroup and /proc/self/cgroup moved to micro-behaviors/fs/proc/container/linux
defaults:
  platforms: [unix]
  for: [python, shell, javascript]
traits:
  - id: containerenv
    desc: Container marker file reference
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /run/.containerenv
