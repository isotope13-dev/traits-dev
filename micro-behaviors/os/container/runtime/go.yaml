# Go Container and Cloud Operations
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [go]
traits:
  - id: docker-dup
    desc: "Docker operations"
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: '(^|[^A-Za-z0-9_-])(docker|containerd)([^A-Za-z0-9_-]|$)'
  - id: kubernetes
    desc: "Kubernetes API access"
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: '(kubernetes|k8s\.io)'
