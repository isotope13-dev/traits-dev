defaults:
  platforms: [windows, unix]
  for:
    - go
traits:
  - id: docker-dup
    desc: Container runtime identifiers
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: (^|[^A-Za-z0-9_-])(docker|containerd)([^A-Za-z0-9_-]|$)
  - id: kubernetes
    desc: Kubernetes API access
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: (k8s\.io|client-go|/var/run/secrets/kubernetes)
