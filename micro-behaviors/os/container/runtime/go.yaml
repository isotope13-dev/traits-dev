defaults:
  platforms: [windows, unix]
  for:
    - go
traits:
  - id: k8s-api-package
    desc: Kubernetes API package import
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: k8s\.io/(api|apimachinery)
  - id: k8s-core-package
    desc: Kubernetes core package import
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: k8s\.io/(kubernetes|kubectl|kubelet)
  - id: k8s-client-go-package
    desc: Kubernetes client-go package import
    crit: component
    conf: 0.85
    if:
      type: string_literal
      substr: client-go
  - id: k8s-service-account-path
    desc: Kubernetes service-account path
    crit: component
    conf: 0.85
    if:
      type: string_literal
      substr: /var/run/secrets/kubernetes
composite_rules:
  - id: kubernetes
    desc: Kubernetes API access
    crit: notable
    conf: 0.85
    any:
      - id: k8s-api-package
      - id: k8s-core-package
      - id: k8s-client-go-package
      - id: k8s-service-account-path
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
