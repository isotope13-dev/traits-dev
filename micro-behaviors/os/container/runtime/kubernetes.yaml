defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: service-env
    desc: Kubernetes service environment variable
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: KUBERNETES_SERVICE
  - id: secrets-path
    desc: Kubernetes secrets path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /var/run/secrets/kubernetes
  - id: serviceaccount-token
    desc: Kubernetes service-account token path
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: /var/run/secrets/kubernetes.io/serviceaccount/token
  - id: projected-serviceaccount-token
    desc: "Kubernetes projected service-account path"
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: /var/run/secrets/[^"' \n]{1,120}/serviceaccount/token
  - id: serviceaccount-namespace
    desc: Kubernetes service-account namespace path
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: /var/run/secrets/kubernetes.io/serviceaccount/namespace
  - id: serviceaccount-ca
    desc: Kubernetes service-account CA path
    crit: notable
    conf: 0.78
    if:
      type: text
      substr: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  - id: api-namespaces-path
    desc: Kubernetes namespaced core resource API path
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: /api/v1/namespaces/[a-z0-9][-a-z0-9]{0,61}/(pods|secrets|services|configmaps)
  - id: in-cluster-default-api-host
    desc: Kubernetes in-cluster API host
    crit: notable
    conf: 0.86
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      substr: https://kubernetes.default.svc
  - id: server-side-apply-patch
    desc: Kubernetes server-side apply patch
    crit: notable
    conf: 0.86
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      substr: application/apply-patch+yaml
  - id: force-field-manager
    desc: Kubernetes forced field manager
    crit: component
    conf: 0.78
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      regex: 'fieldManager.{0,80}force.{0,20}(true|True)'
  - id: serviceaccount-token-read
    desc: Kubernetes service-account token read
    crit: notable
    conf: 0.86
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      regex: '\/\s*["'']token["'']\s*\)\.read_text'
  - id: api-pods-path
    desc: Kubernetes pods API path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: /api/v1/namespaces/[^"' \n]{1,120}/pods(\b|/)
  - id: api-statefulsets-path
    desc: Kubernetes StatefulSets API path
    crit: notable
    conf: 0.82
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      regex: /apis/apps/v1/namespaces/[^"' \n]{1,120}/statefulsets(\b|/)
  - id: api-cronjobs-path
    desc: Kubernetes CronJobs API path
    crit: notable
    conf: 0.84
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      regex: /apis/batch/v1/namespaces/[^"' \n]{1,120}/cronjobs(\b|/)
  - id: api-hpa-path
    desc: Kubernetes autoscaler API path
    crit: notable
    conf: 0.8
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      regex: /apis/autoscaling/v2/namespaces/[^"' \n]{1,120}/horizontalpodautoscalers(\b|/)
  - id: api-nodes-path
    desc: Kubernetes nodes API path
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: /api/v1/nodes(\b|/)
  - id: api-secrets-path
    desc: Kubernetes secrets API path
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: /api/v1/namespaces/[^"' \n]{1,120}/secrets(\b|/)
  - id: kube-system-namespace
    desc: Kubernetes kube-system namespace reference
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: kube-system
  - id: privileged-pod-spec
    desc: Kubernetes privileged container spec
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'privileged["'']?\s*[:=]\s*(true|True|1)'
    unless:
      - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
  - id: hostpath-volume-spec
    desc: Kubernetes hostPath volume spec
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'hostPath["'']?\s*[:=]|hostPath\s*:'
  - id: api-pod-exec-path
    desc: Kubernetes pod exec API path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: /api/v1/namespaces/[^"' \n]{1,120}/pods/[^"' \n]{1,120}/exec\b
  - id: bearer-authz
    desc: Kubernetes API bearer header fragment
    crit: component
    conf: 0.72
    if:
      type: text
      regex: Authorization.{0,48}Bearer
  - id: clusterrole-binding-manifest
    desc: Kubernetes ClusterRoleBinding manifest
    crit: notable
    conf: 0.82
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      substr: ClusterRoleBinding
  - id: custom-resource-definition-manifest
    desc: Kubernetes CRD manifest
    crit: notable
    conf: 0.8
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    if:
      type: text
      substr: CustomResourceDefinition
composite_rules:
  - id: serviceaccount-files
    desc: Kubernetes service-account file access
    crit: notable
    conf: 0.92
    any:
      - id: serviceaccount-token
      - id: projected-serviceaccount-token
      - id: serviceaccount-namespace
      - id: serviceaccount-ca
  - id: api-enumeration
    desc: Kubernetes API enumeration paths
    crit: notable
    conf: 0.9
    any:
      - id: api-pods-path
      - id: api-secrets-path
      - id: api-nodes-path
    needs: 2
  - id: privileged-hostpath-pod
    desc: Kubernetes privileged hostPath pod
    crit: suspicious
    conf: 0.95
    all:
      - id: privileged-pod-spec
      - id: hostpath-volume-spec
    any:
      - id: api-pods-path
      - id: kube-system-namespace
    unless:
      - id: well-known/tool/sysadmin/kubernetes/minikube
      - id: well-known/app/aks-engine/
      - id: metadata/lang/compiler/systems::go-binary
      - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-bootstrap-context
  - id: pod-exec
    desc: Kubernetes pod exec API usage
    crit: notable
    conf: 0.94
    all:
      - id: api-pod-exec-path
      - id: bearer-authz
  - id: workload-write-api
    desc: Kubernetes workload write APIs
    crit: notable
    conf: 0.9
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    any:
      - id: api-statefulsets-path
      - id: api-cronjobs-path
      - id: api-hpa-path
    needs: 2
  - id: incluster-apply-client
    desc: Kubernetes in-cluster apply client
    crit: suspicious
    conf: 0.93
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    all:
      - id: secrets-path
      - id: serviceaccount-token-read
      - id: in-cluster-default-api-host
      - id: server-side-apply-patch
      - id: bearer-authz
    any:
      - id: force-field-manager
      - id: workload-write-api
  - id: operator-rbac-bundle
    desc: Kubernetes operator RBAC bundle
    crit: notable
    conf: 0.9
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    all:
      - id: custom-resource-definition-manifest
      - id: clusterrole-binding-manifest
    any:
      - id: workload-write-api
      - id: api-cronjobs-path
