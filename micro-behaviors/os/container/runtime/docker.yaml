defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: dockerenv
    desc: Docker environment file
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: /.dockerenv
  - id: docker-sock
    desc: Docker socket path
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: /run/docker.sock
