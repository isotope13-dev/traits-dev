defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
    - shell
    - javascript
traits:
  - id: dockerenv
    desc: Docker environment file
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /.dockerenv
  - id: docker-sock
    desc: Docker socket path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /run/docker.sock
