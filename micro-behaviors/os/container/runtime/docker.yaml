defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: dockerenv
    desc: Docker marker file reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: /.dockerenv
  - id: docker-sock
    desc: Docker socket path
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: /run/docker.sock
  - id: docker-var-run-sock
    desc: Docker socket path
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: /var/run/docker.sock
