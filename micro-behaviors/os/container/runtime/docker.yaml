defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, go]
traits:
  - id: docker-api-privileged-field
    desc: Docker privileged API field
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '"Privileged"\s*:\s*(true|True)'
  - id: docker-cli-run-create
    desc: Docker CLI run or create command
    crit: component
    conf: 0.74
    if:
      type: text
      regex: '\bdocker\s+(run|create)\b'
  - id: docker-cli-exec
    desc: Docker exec verb
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bdocker\s+exec\b'
  - id: docker-privileged-flag
    desc: Docker privileged CLI flag
    crit: notable
    conf: 0.8
    if:
      type: text
      word: --privileged
  - id: dockerenv
    desc: Docker marker file reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: /.dockerenv
  - id: docker-sock
    desc: Docker socket path
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: /run/docker.sock
  - id: docker-var-run-sock
    desc: Docker socket path
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: /var/run/docker.sock
  - id: docker-api-port-2375
    desc: Docker unauthenticated API port
    crit: component
    conf: 0.78
    if:
      type: text
      regex: ':2375\b|\b2375/tcp\b'
  - id: docker-api-port-2376
    desc: Docker TLS API port
    crit: component
    conf: 0.72
    if:
      type: text
      regex: ':2376\b|\b2376/tcp\b'
  - id: docker-root-bind-host
    desc: Docker root filesystem bind mount
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/tool/offensive/pentestkit/
      - id: well-known/tool/development/luma::archive-member
      # Docker's upstream integration suite deliberately tests a host-root
      # bind mount; this is a benign test harness context.
      - type: path
        dirname: true
        regex: '(^|[\\/])integration-cli([\\/]|$)'
    if:
      type: text
      regex: '-v\s+/:/host\b|["'']/:/host["'']|--mount\s+[^;\n]{0,60}source=/[^;\n]{0,60}target=/host'
  - id: docker-daemon-cli-start
    desc: Docker daemon CLI start
    crit: notable
    conf: 0.86
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    if:
      type: text
      regex: '(?i)\bdocker\s+-d\b|exec\.Command\([^)\n]{0,120}["'']-d["'']'
  - id: docker-sdk-python
    desc: Docker daemon control via Python SDK
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: 'python_on_whales|docker\.from_env\('
  - id: docker-sdk-container-exec
    desc: Executes command inside container via SDK
    crit: notable
    conf: 0.82
    attack: T1609
    for: [python]
    if:
      type: text
      regex: '\bdocker\.execute\(|\.exec_run\('
  - id: docker-sdk-privileged
    desc: Docker SDK privileged container kwarg
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: 'privileged\s*=\s*True'
composite_rules:
  - id: docker-privileged-cli-run-create
    desc: Docker privileged run or create
    crit: component
    conf: 0.84
    near_bytes: 160
    all:
      - id: docker-cli-run-create
      - id: docker-privileged-flag
  - id: docker-privileged-exec
    desc: Docker privileged exec flag
    crit: notable
    conf: 0.82
    near_bytes: 160
    all:
      - id: docker-cli-exec
      - id: docker-privileged-flag
  - id: docker-remote-api-ports
    desc: Docker remote API ports
    crit: notable
    conf: 0.82
    any:
      - id: docker-api-port-2375
      - id: docker-api-port-2376
    needs: 2
  - id: docker-host-escape-spec
    desc: Docker privileged host mount
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/tool/development/luma::archive-member
    all:
      - id: docker-privileged-spec
      - id: docker-root-bind-host
  - id: docker-privileged-spec
    desc: Docker privileged container spec
    crit: suspicious
    conf: 0.86
    unless:
      - id: well-known/tool/development/luma::archive-member
    any:
      - id: docker-api-privileged-field
      - id: docker-privileged-cli-run-create
    downgrade:
      any:
        - id: well-known/tool/sysadmin/container/
