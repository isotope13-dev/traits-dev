defaults:
  platforms: [unix]
  for: [c, cpp, rust, shell]
  crit: notable
  conf: 0.9
traits:
  - id: oci-init-binary
    desc: OCI guest init runtime
    if:
      type: text
      substr: init-oci
  - id: oci-command-file
    desc: OCI guest command file
    if:
      type: text
      substr: /.supermachine-cmd
  - id: oci-workdir-file
    desc: OCI guest working directory file
    if:
      type: text
      substr: /.supermachine-workdir
  - id: container-pseudofs-mounts
    desc: Container pseudo-filesystem mounts
    if:
      type: text
      regex: mount\s*\(.{0,160}"/(proc|sys|dev|dev/pts)"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: docker-export-rootfs
    desc: Docker image export to root filesystem
    if:
      type: text
      substr: docker export
  - id: oci-image-builder
    desc: OCI image builder implementation
    if:
      type: text
      substr: OciImageBuilder
composite_rules:
  - id: oci-guest-init
    desc: OCI guest init and process launcher
    crit: notable
    conf: 0.95
    all:
      - id: oci-command-file
      - id: oci-workdir-file
    any:
      - id: container-pseudofs-mounts
      - id: micro-behaviors/process/identity/setuid::setid-call-source
      - id: oci-init-binary
  - id: oci-rootfs-builder
    desc: OCI image export and rootfs preparation
    crit: notable
    conf: 0.94
    all:
      - id: oci-image-builder
      - id: docker-export-rootfs
