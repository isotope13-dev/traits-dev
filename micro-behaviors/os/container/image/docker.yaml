defaults:
  platforms: [unix]
  for: [rust, cargo.toml]
  crit: notable
  conf: 0.9
traits:
  - id: docker-config-json
    desc: Docker config file reference
    if:
      type: text
      substr: .docker/config.json
  - id: image-builder-api
    desc: Container image builder API
    if:
      type: text
      substr: Image::builder
  - id: docker-runtime-api
    desc: Docker runtime API usage
    if:
      type: text
      substr: bollard::Docker
  - id: docker-auth-type
    desc: Docker auth type marker
    if:
      type: text
      substr: DockerAuth
  - id: registry-auth-text
    desc: Registry auth text
    if:
      type: text
      substr: registry auth
  - id: registry-before-docker-config
    desc: Registry before Docker config path
    if:
      type: text
      regex: 'registry.{0,120}\.docker/config\.json'
  - id: docker-config-before-registry
    desc: Docker config before registry
    if:
      type: text
      regex: '\.docker/config\.json.{0,120}registry'
composite_rules:
  - id: docker-registry-auth-resolution
    desc: Docker registry auth resolution
    crit: notable
    conf: 0.9
    any:
      - id: docker-auth-type
      - id: registry-auth-text
      - id: registry-before-docker-config
      - id: docker-config-before-registry
  - id: container-image-runtime
    desc: Container image runtime and builder integration
    crit: notable
    conf: 0.94
    needs: 2
    any:
      - id: docker-config-json
      - id: docker-registry-auth-resolution
      - id: image-builder-api
      - id: docker-runtime-api
      - id: micro-behaviors/os/container/oci::oci-rootfs-builder
  - id: docker-registry-auth-config
    desc: Docker registry auth config for image pulls
    crit: notable
    conf: 0.94
    all:
      - id: docker-config-json
      - id: docker-registry-auth-resolution
