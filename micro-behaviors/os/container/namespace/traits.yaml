defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: runc-oci-str
    desc: OCI runc runtime
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: opencontainers/runc
  - id: libcontainer-str
    desc: libcontainer library
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: libcontainer
  - id: cri-api-str
    desc: Container Runtime Interface API
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: cri-api
  - id: runtimeservice-str
    desc: CRI RuntimeService
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: RuntimeService
  - id: opencontainers-str
    desc: opencontainers string
    crit: component
    if:
      type: string_value
      substr: opencontainers
  - id: oci-runtime-spec-str
    desc: oci-runtime-spec string
    crit: component
    if:
      type: string_value
      substr: oci-runtime-spec
  - id: image-spec-str
    desc: image-spec string
    crit: component
    if:
      type: string_value
      substr: image-spec
  - id: org-opencontainers-str
    desc: org.opencontainers annotation
    crit: component
    if:
      type: string_value
      substr: org.opencontainers
  - id: prestart-str
    desc: prestart hook
    crit: component
    if:
      type: string_value
      word: prestart
  - id: poststart-str
    desc: poststart hook
    crit: component
    if:
      type: string_value
      word: poststart
  - id: poststop-str
    desc: poststop hook
    crit: component
    if:
      type: string_value
      word: poststop
  - id: cni-github-str
    desc: containernetworking/cni string
    crit: component
    if:
      type: string_value
      substr: containernetworking/cni
  - id: cni-prefix-str
    desc: CNI_ environment prefix
    crit: component
    if:
      type: string_value
      substr: CNI_
  - id: cni-libcni-str
    desc: cni/libcni string
    crit: component
    if:
      type: string_value
      substr: cni/libcni
  - id: clone-newnet-str
    desc: CLONE_NEWNET constant
    crit: component
    if:
      type: string_value
      word: CLONE_NEWNET
  - id: setns-str
    desc: setns syscall
    crit: component
    if:
      type: string_value
      word: setns
  - id: veth-str
    desc: veth interface
    crit: component
    if:
      type: string_value
      word: veth
  - id: bridge-str
    desc: bridge interface
    crit: component
    if:
      type: string_value
      word: bridge
  - id: k8s-apps-v1-str
    desc: Kubernetes apps/v1 API
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: apis/apps/v1
  - id: k8s-pods-v1-str
    desc: Kubernetes pods API
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: api/v1/pods
  - id: kubeconfig-env-str
    desc: KUBECONFIG environment variable
    crit: notable
    conf: 0.8
    if:
      type: string_value
      word: KUBECONFIG
composite_rules:
  - id: runc-refs
    desc: Runc references
    crit: notable
    conf: 0.9
    any:
      - id: runc-oci-str
      - id: libcontainer-str
  - id: cri-refs
    desc: CRI API references
    crit: notable
    conf: 0.85
    all:
      - id: cri-api-str
      - id: runtimeservice-str
  - id: runtime
    desc: Container runtime library usage
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/os/container/runtime::docker-dup
      - id: runc-refs
      - id: cri-refs
  - id: oci-refs
    desc: OCI specification references
    crit: component
    any:
      - id: opencontainers-str
      - id: oci-runtime-spec-str
      - id: image-spec-str
  - id: hooks-refs
    desc: Container hooks
    crit: component
    needs: 2
    any:
      - id: prestart-str
      - id: poststart-str
      - id: poststop-str
  - id: hooks-with-config
    desc: Hooks with config.json
    crit: component
    all:
      - id: hooks-refs
      - id: metadata/package/config::config-json-file
  - id: oci
    desc: OCI specification compliance
    crit: notable
    conf: 0.9
    any:
      - id: oci-refs
      - id: org-opencontainers-str
      - id: hooks-with-config
  - id: cni-refs
    desc: CNI references
    crit: component
    any:
      - id: cni-github-str
      - id: cni-prefix-str
      - id: cni-libcni-str
  - id: ns-refs
    desc: Network namespace references
    crit: component
    any:
      - id: clone-newnet-str
      - id: setns-str
  - id: net-refs
    desc: Network interface references
    crit: component
    any:
      - id: veth-str
      - id: bridge-str
  - id: ns-clone-setns
    desc: Clone and setns combo
    crit: component
    all:
      - id: clone-newnet-str
      - id: setns-str
  - id: net-with-ns
    desc: Network interfaces with namespace
    crit: component
    all:
      - id: net-refs
      - id: ns-refs
  - id: network
    desc: Container networking patterns
    crit: notable
    conf: 0.85
    any:
      - id: cni-refs
      - id: ns-clone-setns
      - id: net-with-ns
  - id: k8s-api-paths
    desc: Kubernetes API paths
    crit: notable
    conf: 0.85
    any:
      - id: k8s-apps-v1-str
      - id: k8s-pods-v1-str
  - id: kubernetes-comp
    desc: Kubernetes client library
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/os/container/runtime::kubernetes
      - id: k8s-api-paths
      - id: kubeconfig-env-str
