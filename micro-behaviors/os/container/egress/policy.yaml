defaults:
  platforms: [unix]
  for: [rust, php]
  crit: notable
  conf: 0.9
traits:
  - id: egress-deny-private
    desc: Container egress deny-private policy
    if:
      type: text
      substr: deny_private
  - id: egress-denylist
    desc: Container egress denylist policy
    if:
      type: text
      substr: 'denylist:'
  - id: egress-allowlist
    desc: Container egress allowlist policy
    if:
      type: text
      substr: 'allowlist:'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: metadata-endpoint-block
    desc: Metadata endpoint egress block
    if:
      type: text
      substr: 169.254.169.254
  - id: cidr-egress-match
    desc: CIDR-based egress policy match
    if:
      type: text
      substr: cidr_contains
composite_rules:
  - id: container-egress-policy
    desc: Container network egress policy controls
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/os/container/egress::cidr-egress-match
      - id: micro-behaviors/os/container/egress::egress-allowlist
      - id: micro-behaviors/os/container/egress::egress-deny-private
      - id: micro-behaviors/os/container/egress::egress-denylist
      - id: micro-behaviors/os/container/egress::metadata-endpoint-block
