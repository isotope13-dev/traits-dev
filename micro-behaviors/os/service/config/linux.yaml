# Linux Service Configuration
# Neutral service management operations - package managers, deployment tools,
# Ansible, systemd, etc. all write and reload service files routinely.
defaults:
  platforms: [linux, unix]
  for: [shell, python, elf]
traits:
  - id: systemd-service-path
    desc: Systemd service file path reference
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: '/etc/systemd/system/[a-zA-Z0-9_\-]+\.service|/lib/systemd/system/[a-zA-Z0-9_\-]+\.service'
  - id: init-script-path
    desc: Init.d service script path reference
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '/etc/init\.d/[a-zA-Z0-9_\-]+'
  - id: daemon-reload
    desc: systemctl daemon-reload command
    crit: baseline
    conf: 0.75
    if:
      type: string_value
      regex: 'systemctl\s+daemon-reload'
