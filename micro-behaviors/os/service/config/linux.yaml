defaults:
  platforms:
    - unix
  for: [scripts, binaries]
traits:
  - id: systemd-keyword
    desc: References the systemd init system
    crit: notable
    conf: 0.6
    if:
      type: text
      word: systemd
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: metadata/document/html/
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/drivers/
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  - id: nix-systemd-service-definition
    desc: Nix defines a systemd service unit
    crit: notable
    conf: 0.86
    for: [shell]
    if:
      type: text
      regex: '\bsystemd\.services\.[A-Za-z0-9_."''-]+\s*='
  - id: nix-systemd-timer-definition
    desc: Nix defines a systemd timer unit
    crit: notable
    conf: 0.86
    for: [shell]
    if:
      type: text
      regex: '\bsystemd\.timers\.[A-Za-z0-9_."''-]+\s*='
  - id: systemd-etc-service-path
    desc: References a systemd service path under /etc
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: /etc/systemd/system/[a-zA-Z0-9_\-]+\.service
  - id: systemd-etc-directory-path
    desc: System-wide /etc/systemd directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/systemd
    unless:
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  - id: systemd-lib-service-path
    desc: Systemd /lib service file path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: /lib/systemd/system/[a-zA-Z0-9_\-]+\.service
  - id: init-script-path
    desc: Init.d service script path reference
    crit: notable
    conf: 0.8
    if:
      type: text
      # Match concrete script names and printf-style templates used when a
      # binary writes /etc/init.d/<name> at install time (e.g. /etc/init.d/%s).
      regex: /etc/init\.d/(%[sdXx]|[a-zA-Z0-9_\-]+)
  - id: sshd-config-path
    desc: SSH daemon configuration file
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /etc/ssh/sshd_config
    unless:
      - type: text
        substr: run_rc_command
  - id: daemon-reload
    desc: systemctl daemon-reload command
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: systemctl\s+daemon-reload
composite_rules:
  - id: systemd-service-path
    desc: Systemd service file path reference
    crit: notable
    conf: 0.85
    any:
      - id: systemd-etc-service-path
      - id: systemd-lib-service-path
