defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.85

# SysV init metadata and service-wrapper operations are neutral service
# mechanics. Persistence intent requires a separate installation or enablement
# action in objectives/persistence.
traits:
  - id: sysv-init-script-header
    desc: SysV init script metadata header
    attack: T1037.004
    # Embedded unit/init templates in IoT bots ship this header inside ELF
    # string tables, not only as stand-alone shell scripts.
    for: [shell, elf]
    if:
      type: text
      substr: BEGIN INIT INFO

  - id: sysv-chkconfig-header
    desc: SysV chkconfig metadata header
    attack: T1037.004
    if:
      type: text
      regex: '#\s*chkconfig:\s*[-0-9]+\s+[0-9]+\s+[0-9]+'

  - id: subsys-lockfile
    desc: SysV service subsystem lockfile
    if:
      type: text
      substr: /var/lock/subsys/

  - id: daemon-wrapper
    desc: SysV daemon wrapper invocation
    if:
      type: text
      regex: '\bdaemon\s+\$'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
