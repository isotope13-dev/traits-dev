defaults:
  platforms: [macos]
  for: [go, kotlin, php, ruby, rust, javascript, python]
  crit: notable
  conf: 0.9
  attack: T1543.004

# Source-level launchd configuration observations. These are capabilities;
# persistence intent is inferred only by objective composites that combine them
# with service loading or other attack-context evidence.
traits:
  - id: source-launchagents-join
    desc: Source joins Library LaunchAgents path
    if:
      type: text
      regex: '["'']Library["''][\s\S]{0,80}["'']LaunchAgents["'']'
    unless:
      - type: text
        substr: PERSISTENCE_PATHS

  - id: source-launchagents-plist
    desc: Source references LaunchAgents plist
    if:
      type: text
      regex: 'Library/LaunchAgents/.{0,80}\.plist'

  - id: source-runatload-key
    desc: Source enables launchd RunAtLoad
    if:
      type: text
      regex: 'RunAtLoad[\s\S]{0,80}(<true\s*/>|true\b)'
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-path

  - id: source-startinterval-key
    desc: Source specifies launchd StartInterval
    if:
      type: text
      word: StartInterval
