# Neutral structural/config properties of a systemd .service unit file.
# These describe what a unit file IS (ExecStart=, [Install], WantedBy=,
# Description=, blank-line layout, dependency declarations) — neutral service
# configuration mechanics, not persistence intent. A normal distro-shipped
# unit file satisfies many of these; the persistence verdict lives in the
# objectives/persistence/system/service/systemd composites that combine them
# with genuinely suspicious evidence (dangerous ExecStart path, missing docs,
# timer/path/socket triggers).
defaults:
  platforms: [linux]
  for: [systemd]
traits:
- id: exec-start-text
  desc: ExecStart directive (extracted strings)
  crit: component
  # Native daemons/stealers that author a unit file at runtime embed these
  # directives as plain strings; elf is included so the systemd composites can
  # fire on compiled binaries that author units.
  for: [shell, python, systemd, go, rust, objc, elf]
  if:
    type: text
    word: "ExecStart"
  unless:
  - id: well-known/app/drivers/

- id: exec-start-kv
  desc: ExecStart directive (structured service data)
  crit: component
  if:
    type: value
    path: "service.exec_start"
  unless:
  - id: well-known/app/drivers/

- id: wanted-by-multi-user-text
  desc: 'WantedBy=multi-user.target directive'
  crit: component
  conf: 0.7
  for: [shell, python, systemd, go, rust, objc, elf]
  if:
    type: text
    word: "WantedBy=multi-user.target"

- id: exec-start-expected-core
  desc: ExecStart from core system path
  crit: baseline
  if:
    type: value
    path: "service.exec_start"
    regex: "^/(bin|sbin|usr/bin)/"
  unless:
  - id: well-known/app/drivers/

- id: blank-line-separator
  desc: Unit file blank line separator
  crit: component
  count_min: 2
  if:
    type: text
    regex: '[\r\n]{2,}'
  unless:
  - id: well-known/app/drivers/

- id: documentation-exists
  desc: Unit Documentation= exists
  crit: component
  if:
    type: value
    path: "unit.documentation"
    exists: true

- id: unit-description-exists
  desc: Unit Description= exists
  crit: component
  if:
    type: value
    path: "unit.description"
    exists: true
  unless:
  - id: well-known/app/drivers/

- id: after-exists
  desc: Unit After= exists
  crit: component
  if:
    type: value
    path: "unit.after"
    exists: true
  unless:
  - id: well-known/app/drivers/

- id: install-wanted-by-exists
  desc: Install WantedBy= exists
  crit: component
  if:
    type: value
    path: "install.wanted_by"
    exists: true
  unless:
  - id: well-known/app/drivers/

- id: service-type-minimal--oneshot
  desc: Minimal service type (oneshot)
  crit: baseline
  if:
    type: value
    path: "service.type"
    exact: oneshot
- id: service-type-minimal--idle
  desc: Minimal service type (idle)
  crit: baseline
  if:
    type: value
    path: "service.type"
    exact: idle
composite_rules:
- id: service-type-minimal
  desc: Minimal service type (oneshot/idle)
  crit: baseline
  unless:
  - id: well-known/app/drivers/
  any:
  - id: service-type-minimal--oneshot
  - id: service-type-minimal--idle
