defaults:
  platforms: [macos]
  for: [c, objc, macho, shell, plist, applescript, python, javascript]
  crit: notable
  conf: 0.85
  attack: T1543.004

traits:
  - id: launchdaemons-path
    desc: macOS LaunchDaemons path reference
    if:
      type: text
      substr: LaunchDaemons
    unless:
      - id: well-known/tool/development/ipsw
  - id: launchagents-path
    desc: macOS LaunchAgents path reference
    if:
      type: text
      regex: '(?i)(^|[\\/])Library[\\/]LaunchAgents([\\/]|$)'
  - id: launchagent-run-at-load
    desc: LaunchAgent requests immediate load
    if:
      type: text
      regex: '(?s)LaunchAgents.{0,500}RunAtLoad.{0,80}true|RunAtLoad.{0,500}LaunchAgents.{0,80}true'
  - id: launchctl-service-management
    desc: Python manages launchctl service
    for: [python]
    if:
      type: text
      regex: '\[\s*["'']launchctl["'']\s*,|\blaunchctl\s+(load|unload|list)\b'
  - id: shell-launchagents-plist-write
    desc: Shell writes LaunchAgent plist
    for: [shell]
    if:
      type: text
      regex: 'Library/LaunchAgents[\s\S]{0,420}<key>RunAtLoad</key>'
  - id: shell-encoded-launchagents-plist-write
    desc: Shell carries a base64-encoded LaunchAgent plist
    for: [shell]
    if:
      type: encoded
      encoding: base64
      regex: '(?is)Library/LaunchAgents[\s\S]{0,420}<key>RunAtLoad</key>'
  - id: shell-launchdaemons-plist-write
    desc: Shell writes LaunchDaemon plist
    for: [shell]
    if:
      type: text
      regex: 'Library/LaunchDaemons[\s\S]{0,420}<key>RunAtLoad</key>'
  - id: shell-launchd-start-interval
    desc: Shell specifies launchd StartInterval
    for: [shell]
    if:
      type: text
      regex: '<key>StartInterval</key>[\s\S]{0,80}<integer>'

composite_rules:
  - id: shell-launchagent-plist-write
    desc: Shell writes a LaunchAgent plist directly or from base64
    crit: notable
    conf: 0.98
    any:
      - id: shell-launchagents-plist-write
      - id: shell-encoded-launchagents-plist-write
