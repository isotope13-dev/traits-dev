defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.88

traits:
  - id: winspool-printer-enum
    desc: Enumerate installed printers
    if:
      type: symbol
      exact: EnumPrintersA

  - id: winspool-printer-open
    desc: Open printer handle
    if:
      type: symbol
      exact: OpenPrinterA

  - id: winspool-printer-set
    desc: Configure printer settings
    if:
      type: symbol
      exact: SetPrinterA

  - id: winspool-printer-delete
    desc: Delete printer queue
    if:
      type: symbol
      exact: DeletePrinter

  - id: printui-entry-command
    desc: PrintUIEntry command invocation
    conf: 0.95
    if:
      type: text
      substr: printui.dll,PrintUIEntry

  - id: set-default-printer-api
    desc: Set default printer API
    if:
      type: symbol
      exact: SetDefaultPrinterA

  - id: lcs-open-scanner
    desc: LCS open scanner API
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      exact: LcsOpenScanner

  - id: lcs-start-job-scanner
    desc: LCS start scanner job API
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      exact: LcsStartJobScanner

  - id: lcs-enum-scanners
    desc: LCS enumerate scanners API
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      exact: LcsEnumScanners

  - id: lcs-open-printer
    desc: LCS open printer API
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      exact: LcsOpenPrinter

  - id: lcs-start-job-printer
    desc: LCS start printer job API
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      exact: LcsStartJobPrinter

  - id: scanner-device-class-string
    desc: Scanner device class strings
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      substr: "CScannerDevice::"

  - id: scanner-command-class-string
    desc: Scanner command class strings
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      substr: "CCmdScanCmd::"

  - id: warsaw-scanner-command-string
    desc: Warsaw scanner command strings
    crit: notable
    conf: 0.88
    if:
      type: text
      section: .rdata
      substr: "CWarScanCmd::"

  - id: bpd-scanner-device-string
    desc: BPD scanner device string
    crit: notable
    conf: 0.86
    if:
      type: text
      section: .rdata
      exact: BpdScanner

  - id: printer-download-char-glyph-export
    desc: Printer driver glyph download DDI export
    conf: 0.9
    if:
      type: export
      exact: DownloadCharGlyph

  - id: printer-download-font-header-export
    desc: Printer driver font header download DDI export
    conf: 0.9
    if:
      type: export
      exact: DownloadFontHeader

  - id: printer-send-font-cmd-export
    desc: Printer driver font command DDI export
    conf: 0.9
    if:
      type: export
      exact: SendFontCmd

  - id: printer-tt-download-method-export
    desc: Printer driver TrueType download method DDI export
    conf: 0.9
    if:
      type: export
      exact: TTDownloadMethod

  - id: printer-write-printer-export
    desc: Printer driver WritePrinter spooler export
    conf: 0.9
    if:
      type: export
      exact: WritePrinter

composite_rules:
  - id: printer-font-download-exports
    desc: Printer driver font-download DDI export set
    crit: component
    conf: 0.92
    any:
      - id: printer-download-char-glyph-export
      - id: printer-download-font-header-export
      - id: printer-send-font-cmd-export
      - id: printer-tt-download-method-export
      - id: printer-write-printer-export
    needs: 2

  - id: printer-setup-helper
    desc: Windows printer setup helper
    crit: notable
    conf: 0.95
    all:
      - id: printui-entry-command
    any:
      - id: winspool-printer-enum
      - id: winspool-printer-open
      - id: winspool-printer-set
      - id: winspool-printer-delete
      - id: set-default-printer-api

  - id: scanner-printer-device-integration
    desc: Scanner/printer device integration
    crit: notable
    conf: 0.94
    any:
      - id: lcs-scanner-printer-api-table
      - id: scanner-device-command-strings
    all:
      - id: micro-behaviors/os/sysinfo/hardware::setupapi-device-enumeration
      - id: winspool-printer-enum

  - id: lcs-scanner-printer-api-table
    desc: LCS scanner/printer API table
    crit: notable
    conf: 0.94
    any:
      - id: lcs-open-scanner
      - id: lcs-start-job-scanner
      - id: lcs-enum-scanners
      - id: lcs-open-printer
      - id: lcs-start-job-printer
    needs: 4

  - id: scanner-device-command-strings
    desc: Scanner device command strings
    crit: notable
    conf: 0.92
    any:
      - id: scanner-device-class-string
      - id: scanner-command-class-string
      - id: warsaw-scanner-command-string
      - id: bpd-scanner-device-string
    needs: 2
