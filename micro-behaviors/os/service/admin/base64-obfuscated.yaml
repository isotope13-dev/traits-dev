# Base64 encoded administrative tools
# MBC: OB0008 (Defensive Evasion)
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  attack: T1027
  mbc: C0027
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: bcdedit-base64
    desc: "Base64 encoded bcdedit command"
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: "YmNkZWRpdC"
  - id: bcdedit-cmd-base64
    desc: "Base64 encoded cmd.exe /c bcdedit"
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: "Y21kLmV4ZSAvYyBiY2RlZGl0"
  - id: vssadmin-base64
    desc: "Base64 encoded vssadmin command"
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: "dnNzYWRtaW4"
