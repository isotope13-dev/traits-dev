# Base64 encoded administrative tools
# MBC: OB0008 (Defensive Evasion)
# ATT&CK: T1027 (Obfuscated Files or Information)

defaults:
  for: [all]

traits:
  - id: bcdedit-base64
    desc: "Base64 encoded bcdedit command"
    crit: suspicious
    conf: 0.9
    mbc: "C0027"
    attack: "T1027"
    if:
      type: string
      substr: "YmNkZWRpdC"

  - id: bcdedit-cmd-base64
    desc: "Base64 encoded cmd.exe /c bcdedit"
    crit: suspicious
    conf: 0.9
    mbc: "C0027"
    attack: "T1027"
    if:
      type: string
      substr: "Y21kLmV4ZSAvYyBiY2RlZGl0"

  - id: vssadmin-base64
    desc: "Base64 encoded vssadmin command"
    crit: suspicious
    conf: 0.9
    mbc: "C0027"
    attack: "T1027"
    if:
      type: string
      substr: "dnNzYWRtaW4"
