defaults:
  platforms: [unix, windows]
  for: [python, shell]
  crit: baseline
  size_max: 5242880
traits:
  - id: gcloud-command-token
    desc: gcloud command token
    conf: 0.9
    if:
      type: text
      word: gcloud
  - id: gcloud-container-list-tags
    desc: gcloud container images list-tags command
    conf: 0.9
    if:
      type: text
      regex: 'container["'']?\s*,?\s*["'']images["'']?\s*,?\s*["'']list-tags|container\s+images\s+list-tags'
  - id: container-digest-format-query
    desc: Container registry digest-only output query
    conf: 0.9
    if:
      type: text
      substr: "--format=get(digest)"
  - id: release-image-polling-text
    desc: Release image registry polling text
    conf: 0.86
    if:
      type: text
      regex: '(Polls? the .{0,40}registry|Still waiting|IMAGES_TO_PROMOTE)'
  - id: cloud-provider-kind-command
    desc: cloud-provider-kind command reference
    conf: 0.9
    if:
      type: text
      substr: cloud-provider-kind
  - id: cloud-provider-kind-go-install
    desc: cloud-provider-kind Go install command
    conf: 0.9
    if:
      type: text
      substr: sigs.k8s.io/cloud-provider-kind@latest
  - id: cloud-provider-kind-gateway-channel
    desc: cloud-provider-kind gateway channel argument
    conf: 0.88
    if:
      type: text
      substr: --gateway-channel
  - id: python-popen-devnull-redirect
    desc: Python Popen redirects output to DEVNULL
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'subprocess\.Popen\([\s\S]{0,360}(stdout|stderr)\s*=\s*subprocess\.DEVNULL'
composite_rules:
  - id: container-image-release-polling
    desc: Container image release digest polling
    crit: notable
    conf: 0.92
    all:
      - id: gcloud-command-token
      - id: gcloud-container-list-tags
      - id: container-digest-format-query
      - id: release-image-polling-text
      - id: micro-behaviors/time/sleep/interval::python-sleep-1s-plus
  - id: kubernetes-cloud-provider-dev-service-launch
    desc: Kubernetes cloud provider dev service background launch
    crit: notable
    conf: 0.92
    for: [python]
    all:
      - id: cloud-provider-kind-command
      - id: python-popen-devnull-redirect
    any:
      - id: cloud-provider-kind-go-install
      - id: cloud-provider-kind-gateway-channel
