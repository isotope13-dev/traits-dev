defaults:
  platforms: [unix, windows]
  for: [python, text, github-actions]
  crit: baseline
  size_max: 5242880
traits:
  - id: uv-publish-command
    desc: uv publish command invocation
    conf: 0.9
    if:
      type: text
      substr: '"uv", ["publish"]'
  - id: uv-publish-token-env
    desc: UV publish token environment assignment
    conf: 0.9
    if:
      type: text
      substr: '"UV_PUBLISH_TOKEN": token'
  - id: pypi-release-token-env
    desc: PyPI release token environment lookup
    conf: 0.9
    if:
      type: text
      regex: 'PYPI_TOKEN.{0,80}TWINE_PASSWORD|TWINE_PASSWORD.{0,80}PYPI_TOKEN'
  - id: pypi-token-var-from-env
    desc: PyPI token variable from env
    conf: 0.9
    if:
      type: text
      regex: 'pypi_token\s*=\s*os\.environ\.get\(.{0,20}PYPI_TOKEN'
  - id: twine-password-pypi-var-assignment
    desc: Twine password from PyPI token variable
    conf: 0.9
    if:
      type: text
      regex: 'TWINE_PASSWORD.{0,40}pypi_token'
  - id: twine-upload-command
    desc: Twine upload command invocation
    conf: 0.9
    if:
      type: text
      substr: '["twine", "upload"]'
  - id: cargo-publish-command
    desc: cargo publish command invocation
    conf: 0.9
    if:
      type: text
      substr: '"cargo", ["publish"]'
  - id: cargo-publish-token-env
    desc: Cargo publish token environment assignment
    conf: 0.9
    if:
      type: text
      substr: '"CARGO_REGISTRY_TOKEN": token'
  - id: cargo-publish-workflow-run
    desc: GitHub Actions cargo publish step
    conf: 0.9
    if:
      type: text
      substr: "run: cargo publish"
  - id: cargo-publish-workflow-secret
    desc: GitHub Actions Cargo registry token secret
    conf: 0.9
    if:
      type: text
      substr: 'CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}'
  - id: publish-setup-field
    desc: Release target publishSetup field
    conf: 0.86
    if:
      type: text
      substr: '"publishSetup"'
  - id: cargo-publish-secret-instructions
    desc: Cargo registry token setup instructions
    conf: 0.86
    if:
      type: text
      substr: "CARGO_REGISTRY_TOKEN secret"
  - id: deno-publish-command
    desc: deno publish command invocation
    conf: 0.9
    if:
      type: text
      substr: '"deno", ["publish"]'
  - id: deno-publish-token-env
    desc: Deno publish token environment assignment
    conf: 0.9
    if:
      type: text
      substr: '"DENO_TOKEN": token'
  - id: github-api-auth-header
    desc: GitHub API Authorization header assignment
    conf: 0.9
    if:
      type: text
      substr: '"Authorization"'
  - id: github-api-url
    desc: GitHub API URL reference
    conf: 0.9
    if:
      type: text
      substr: api.github.com
  - id: github-token-workflow-secret
    desc: GitHub Actions GITHUB_TOKEN secret
    conf: 0.88
    if:
      type: text
      substr: 'GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}'
  - id: release-published-workflow-trigger
    desc: GitHub Actions release published trigger
    conf: 0.88
    if:
      type: text
      substr: "types: [published]"
  - id: github-cli-auth-token-command
    desc: GitHub CLI auth token helper reference
    conf: 0.9
    if:
      type: text
      regex: '("gh",\s*"auth",\s*"token"|`gh auth token`)'
  - id: read-version-method-call
    desc: Release target read_version method call
    conf: 0.84
    if:
      type: text
      substr: self.read_version
  - id: template-vars-method
    desc: Release template_vars method
    conf: 0.84
    if:
      type: text
      substr: "def template_vars"
  - id: version-zero-fallback-assignment
    desc: Version fallback assignment to 0.0.0
    conf: 0.84
    if:
      type: text
      substr: 'version = "0.0.0"'
  - id: npm-wrapper-platform-map
    desc: npm native wrapper platform map
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: "const PLATFORMS = {"
  - id: npm-wrapper-package-resolve
    desc: npm wrapper resolves platform package
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: 'require.resolve(`${pkg}/package.json`)'
  - id: npm-wrapper-spawns-binary
    desc: npm wrapper spawns resolved binary
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: "spawnSync(binPath"
  - id: devto-cli-publish-script
    desc: Dev.to CLI publish script
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: scripts[*]
      substr: "@sinedied/devto-cli push"
  - id: devto-token-env-script
    desc: Dev.to token environment in publish script
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: scripts[*]
      substr: "DEVTO_TOKEN"
composite_rules:
  - id: uv-pypi-publish-token-pipeline
    desc: uv PyPI publish token use
    crit: notable
    conf: 0.94
    all:
      - id: uv-publish-command
      - id: uv-publish-token-env
      - id: pypi-release-token-env
  - id: twine-pypi-publish-token-pipeline
    desc: Twine PyPI publish token use
    crit: notable
    conf: 0.94
    all:
      - id: twine-upload-command
      - id: twine-pypi-token-env
  - id: twine-pypi-token-env
    desc: PyPI token assigned to Twine password
    crit: notable
    conf: 0.92
    all:
      - id: pypi-token-var-from-env
      - id: twine-password-pypi-var-assignment
  - id: pypi-publish-token-pipeline
    desc: PyPI publish pipeline token use
    crit: notable
    conf: 0.94
    any:
      - id: uv-pypi-publish-token-pipeline
      - id: twine-pypi-publish-token-pipeline
  - id: cargo-publish-token-pipeline
    desc: Cargo publish pipeline token use
    crit: notable
    conf: 0.94
    all:
      - id: cargo-publish-command
      - id: cargo-publish-token-env
  - id: cargo-publish-workflow-token
    desc: Cargo publish workflow token use
    crit: notable
    conf: 0.94
    all:
      - id: cargo-publish-workflow-run
      - id: cargo-publish-workflow-secret
      - id: release-published-workflow-trigger
  - id: cargo-publish-setup-instructions
    desc: Cargo publish secret setup instructions
    crit: notable
    conf: 0.9
    all:
      - id: publish-setup-field
      - id: cargo-publish-secret-instructions
      - id: template-vars-method
  - id: deno-publish-token-pipeline
    desc: Deno publish pipeline token use
    crit: notable
    conf: 0.94
    all:
      - id: deno-publish-command
      - id: deno-publish-token-env
  - id: registry-publish-token-pipeline
    desc: Package registry publish token pipeline
    crit: notable
    conf: 0.94
    any:
      - id: pypi-publish-token-pipeline
      - id: cargo-publish-token-pipeline
      - id: cargo-publish-workflow-token
      - id: cargo-publish-setup-instructions
      - id: deno-publish-token-pipeline
  - id: github-publish-workflow-token
    desc: GitHub publish workflow token use
    crit: notable
    conf: 0.9
    all:
      - id: github-token-workflow-secret
      - id: release-published-workflow-trigger
  - id: github-api-cli-token-helper
    desc: GitHub API helper uses gh auth token
    crit: notable
    conf: 0.94
    all:
      - id: github-cli-auth-token-command
      - id: github-api-auth-header
      - id: github-api-url
  - id: release-template-version-fallback
    desc: Release target template uses fallback version
    crit: notable
    conf: 0.9
    all:
      - id: read-version-method-call
      - id: template-vars-method
      - id: version-zero-fallback-assignment
  - id: npm-native-binary-wrapper
    desc: npm native binary wrapper template
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    all:
      - id: npm-wrapper-platform-map
      - id: npm-wrapper-package-resolve
      - id: npm-wrapper-spawns-binary
  - id: devto-publish-script
    desc: Dev.to publish pipeline script
    crit: notable
    conf: 0.94
    for: [package.json]
    all:
      - id: devto-cli-publish-script
      - id: devto-token-env-script
