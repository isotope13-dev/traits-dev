defaults:
  platforms: [linux, macos]
  for: [python]
  crit: baseline
  conf: 0.9
  size_max: 5242880

traits:
  - id: python-user-service-helper
    desc: Python user service helper names
    if:
      type: text
      regex: '_guard_service_namespace|ensure_linger|service_name\(\)'
  - id: python-systemctl-user-argv
    desc: Python systemctl user argv
    if:
      type: text
      substr: '["systemctl", "--user"'
  - id: python-launchctl-argv
    desc: Python launchctl argv
    if:
      type: text
      substr: '["launchctl",'

composite_rules:
  - id: python-managed-user-service-context
    desc: Python managed user service lifecycle
    all:
      - id: python-user-service-helper
    any:
      - id: python-systemctl-user-argv
      - id: python-launchctl-argv
