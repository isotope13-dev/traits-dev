defaults:
  platforms:
    - unix
    - windows
  crit: baseline
  for: [shell, powershell, python, javascript, github-actions]
  size_max: 5242880
traits:
  - id: backup-script
    desc: HTTP backup script pattern
    conf: 0.8
    if:
      type: text
      regex: curl\s+.{0,100}backup|wget\s+.{0,100}backup|aws\s+s3\s+cp.{0,100}backup
  - id: installer-script
    desc: HTTP installer script pattern
    conf: 0.8
    if:
      type: text
      regex: curl\s+.{0,100}install|wget\s+.{0,100}install|install\.sh
  # Installer-vs-dropper line: a remote script PIPED into a shell is the
  # universal install idiom (golangci-lint, helm, rustup, kustomize, kubevela,
  # …). What separates a legitimate installer from a `curl $C2/api | bash`
  # dropper is the fetched script's NAME: legitimate installers fetch a
  # conventionally-named `install.sh` / `get-*` / `setup_*` script, a path
  # malware almost never uses for its payload. These atoms recognize that
  # benign shape so the C2/dropper objectives can DOWNGRADE (not suppress) the
  # generic curl|bash signal — an unknown URL stays suspicious, a named
  # installer drops to notable.
  - id: install-script-pipe
    desc: install-named remote script piped to a shell
    crit: baseline
    conf: 0.9
    for: [shell, github-actions, makefile, dockerfile, powershell]
    if:
      type: text
      regex: '(curl|wget)\b[^\n|]{0,200}/install[\w.-]*\s*\|\s*(bash|sh)\b'
  - id: getter-script-pipe
    desc: get/setup-named remote script piped to a shell
    crit: baseline
    conf: 0.9
    for: [shell, github-actions, makefile, dockerfile, powershell]
    if:
      type: text
      regex: '(curl|wget)\b[^\n|]{0,200}/(get|setup)[\w.-]*\s*\|\s*(bash|sh)\b'
  - id: clickhouse-installer-pipe
    desc: ClickHouse installer piped to shell
    crit: notable
    conf: 0.98
    for: [github-actions, shell]
    if:
      type: text
      substr: 'curl https://clickhouse.com | sh'
  - id: release-download-reference
    desc: Release download URL reference
    conf: 0.86
    if:
      type: text
      substr: releases/latest/download

  - id: github-release-api-download
    desc: Downloads release metadata from GitHub API
    crit: notable
    conf: 0.92
    for: [shell]
    if:
      type: text
      regex: 'curl[\s\S]{0,240}https://api\.github\.com/'

  - id: downloaded-artifact-sha256-compare
    desc: Compares downloaded artifact with SHA-256
    crit: notable
    conf: 0.94
    for: [shell]
    if:
      type: text
      regex: 'expected=\$\(awk[\s\S]{0,180}actual=\$\(sha256[\s\S]{0,180}\$expected'
  - id: sha256sums-verification-reference
    desc: Installer references SHA256SUMS verification
    conf: 0.9
    if:
      type: text
      substr: SHA256SUMS
  - id: macos-quarantine-codesign-repair
    desc: "macOS quarantine clear plus codesign repair"
    conf: 0.92
    platforms: [macos]
    for: [shell]
    if:
      type: text
      regex: 'xattr\s+-d\s+com\.apple\.quarantine[\s\S]{0,700}codesign'
  - id: dotnet-local-publish
    desc: Local dotnet publish build
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: 'dotnet\s+publish\b'
  - id: pyinstaller-local-build
    desc: Local PyInstaller build
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: 'PyInstaller\s+--clean'
  - id: staged-dir-var
    desc: Staged package directory variable
    conf: 0.86
    for: [shell]
    if:
      type: text
      word: STAGE_DIR
  - id: tar-gzip-create
    desc: Creates gzip tar archive
    conf: 0.86
    for: [shell]
    if:
      type: text
      regex: 'tar\s+-czf'
  - id: staged-new-binary-copy-to-new
    desc: Copies downloaded binary to .new path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      substr: 'cp "$TMPDIR/$BINARY_NAME" "$INSTALL_DIR/$BINARY_NAME.new"'
  - id: staged-new-binary-rename
    desc: Renames .new binary into install path
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      substr: 'mv -f "$INSTALL_DIR/$BINARY_NAME.new" "$INSTALL_DIR/$BINARY_NAME"'
  - id: tool-class-inheritance
    desc: Tool class inheritance
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'class\s+\w+Tool\((BinaryTool|BaseTool|McpTool)\)'
  - id: tool-cli-help-install
    desc: Tool install CLI help
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'cli_help\s*=\s*["'']Install'
  - id: tool-install-update-text
    desc: Tool install update text
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'Install or update .{0,80}(CLI|tool|server|application)'
  - id: package-manager
    desc: Package manager command
    conf: 0.9
    if:
      type: text
      regex: apt-get\s+update|apk\s+add|brew\s+install
  - id: ci-cd-pipeline
    desc: CI/CD pipeline HTTP usage
    conf: 0.8
    if:
      type: text
      regex: jenkins|gitlab-ci|github-actions|travis-ci
  - id: health-check-fetch
    desc: HTTP health check fetch command
    conf: 0.9
    if:
      type: text
      regex: (curl|wget)\s+[^|&]{0,120}health
  - id: health-check-local
    desc: Localhost health endpoint
    conf: 0.9
    if:
      type: text
      regex: http://(localhost|127\.0\.0\.1).{0,50}/health
composite_rules:
  - id: tool-installer-framework
    desc: Tool installer framework
    conf: 0.88
    for: [python]
    any:
      - id: tool-class-inheritance
      - id: tool-cli-help-install
      - id: tool-install-update-text
  - id: health-check
    desc: HTTP health check pattern
    conf: 0.9
    any:
      - id: health-check-fetch
      - id: health-check-local
  - id: verified-release-installer
    desc: Installer downloads release artifact with checksum verification
    conf: 0.94
    any:
      - id: installer-script
    all:
      - id: release-download-reference
      - id: sha256sums-verification-reference

  - id: verified-github-release-installer
    desc: GitHub release installer verifies downloaded artifact
    crit: exception
    conf: 0.96
    for: [shell]
    all:
      - id: github-release-api-download
      - id: downloaded-artifact-sha256-compare
  - id: staged-new-binary-install
    desc: Staged .new binary install before atomic rename
    conf: 0.9
    for: [shell]
    near_bytes: 1600
    all:
      - id: staged-new-binary-copy-to-new
      - id: staged-new-binary-rename
  - id: macos-quarantine-repair-installer
    desc: Verified release installer repairs macOS quarantine metadata
    conf: 0.96
    platforms: [macos]
    for: [shell]
    all:
      - id: release-download-reference
      - id: sha256sums-verification-reference
      - id: macos-quarantine-codesign-repair
  - id: macos-local-build-quarantine-repair-installer
    desc: Local build installer repairs macOS quarantine metadata on staged binary
    conf: 0.95
    platforms: [macos]
    for: [shell]
    all:
      - id: dotnet-local-publish
      - id: staged-new-binary-install
      - id: macos-quarantine-codesign-repair
  - id: macos-local-pyinstaller-quarantine-repair
    desc: Local PyInstaller archive build repairs macOS quarantine metadata
    conf: 0.94
    platforms: [macos]
    for: [shell]
    all:
      - id: pyinstaller-local-build
      - id: staged-dir-var
      - id: tar-gzip-create
