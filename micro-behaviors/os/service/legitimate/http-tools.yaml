defaults:
  platforms:
    - unix
    - windows
  crit: baseline
  for: [shell, powershell, python, javascript, github-actions]
  size_max: 5242880
traits:
  - id: backup-script
    desc: HTTP backup script pattern
    conf: 0.8
    if:
      type: text
      regex: curl\s+.{0,100}backup|wget\s+.{0,100}backup|aws\s+s3\s+cp.{0,100}backup
  - id: installer-script
    desc: HTTP installer script pattern
    conf: 0.8
    if:
      type: text
      regex: curl\s+.{0,100}install|wget\s+.{0,100}install|install\.sh
  - id: tool-class-inheritance
    desc: Tool class inheritance
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'class\s+\w+Tool\((BinaryTool|BaseTool|McpTool)\)'
  - id: tool-cli-help-install
    desc: Tool install CLI help
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'cli_help\s*=\s*["'']Install'
  - id: tool-install-update-text
    desc: Tool install update text
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'Install or update .{0,80}(CLI|tool|server|application)'
  - id: package-manager
    desc: Package manager HTTP usage
    conf: 0.9
    if:
      type: text
      regex: apt-get\s+update|apk\s+add|brew\s+install
  - id: ci-cd-pipeline
    desc: CI/CD pipeline HTTP usage
    conf: 0.8
    if:
      type: text
      regex: jenkins|gitlab-ci|github-actions|travis-ci
  - id: health-check-fetch
    desc: HTTP health check fetch command
    conf: 0.9
    if:
      type: text
      regex: (curl|wget)\s+[^|&]{0,120}health
  - id: health-check-local
    desc: Localhost health endpoint
    conf: 0.9
    if:
      type: text
      regex: http://(localhost|127\.0\.0\.1).{0,50}/health
composite_rules:
  - id: tool-installer-framework
    desc: Tool installer framework
    conf: 0.88
    for: [python]
    any:
      - id: tool-class-inheritance
      - id: tool-cli-help-install
      - id: tool-install-update-text
  - id: health-check
    desc: HTTP health check pattern
    conf: 0.9
    any:
      - id: health-check-fetch
      - id: health-check-local
