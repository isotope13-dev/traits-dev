defaults:
  platforms: [macos]
  for: [shell, applescript]
  crit: baseline
  size_max: 5242880

traits:
  - id: macos-installed-helper-background-launch
    desc: macOS installed helper background launch
    conf: 0.9
    for: [applescript]
    if:
      type: text
      regex: 'do shell script "nohup /Library/[A-Za-z0-9._ -]+/bin/[A-Za-z0-9._-]+ > /dev/null 2>&1 &"'
  - id: macos-pkg-forget-receipts
    desc: macOS package receipt removal
    conf: 0.9
    for: [shell]
    if:
      type: text
      substr: "pkgutil --forget"
  - id: macos-uninstaller-name
    desc: macOS uninstaller script name
    conf: 0.9
    for: [shell]
    if:
      type: path
      basename: true
      regex: '(?i)uninstall(er)?$'
  - id: macos-library-tree-remove
    desc: macOS installed library tree removal
    conf: 0.88
    for: [shell]
    if:
      type: text
      regex: 'rm -rf /Library/[A-Za-z0-9._ -]+'

composite_rules:
  - id: macos-package-uninstaller
    desc: macOS package uninstaller script
    crit: notable
    conf: 0.94
    for: [shell]
    all:
      - id: macos-uninstaller-name
      - id: macos-pkg-forget-receipts
      - id: macos-library-tree-remove
