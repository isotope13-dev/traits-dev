defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.86

traits:
  - id: android-job-service
    desc: Android JobService reference
    if:
      type: text
      substr: "Landroid/app/job/JobService;"

  - id: android-boot-completed-action
    desc: Android boot completed receiver
    conf: 0.9
    if:
      type: text
      substr: "android.intent.action.BOOT_COMPLETED"

  - id: android-boot-completed-permission
    desc: RECEIVE_BOOT_COMPLETED permission
    for: [xml, java, kotlin]
    conf: 0.9
    if:
      type: text
      word: "RECEIVE_BOOT_COMPLETED"

  - id: android-foreground-service-permission
    desc: Android foreground service permission
    conf: 0.88
    if:
      type: text
      substr: "android.permission.FOREGROUND_SERVICE"

  - id: android-foreground-service-permission-text
    desc: FOREGROUND_SERVICE permission
    for: [xml, java, kotlin]
    conf: 0.85
    crit: notable
    if:
      type: text
      word: "FOREGROUND_SERVICE"

  - id: android-write-sync-settings-permission
    desc: WRITE_SYNC_SETTINGS permission
    for: [xml, java, kotlin]
    crit: notable
    conf: 0.9
    if:
      type: text
      word: "WRITE_SYNC_SETTINGS"

  - id: android-background-service-names
    desc: Android opaque service names
    crit: component
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: "Lcom/mante/daily/cleaner/data/repository/(Hige|Dinga|Badesin)Service;"
