defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: telnetd
    desc: telnetd daemon reference
    if:
      type: text
      word: telnetd
  - id: httpd
    desc: httpd daemon reference
    if:
      type: text
      word: httpd
    unless:
      - type: text
        regex: application/x-httpd-php(-source)?
  - id: apache2
    desc: apache2 daemon reference
    if:
      type: text
      word: apache2
  - id: ftpd
    desc: ftpd daemon reference
    if:
      type: text
      word: ftpd
  - id: inetd
    desc: inetd daemon reference
    for:
      - c
      - html
    platforms:
      - linux
      - unix
    if:
      type: text
      substr: /usr/sbin/inetd
composite_rules:
  - id: remote-access-daemons
    desc: Remote access daemon references
    any:
      - id: telnetd
      - id: micro-behaviors/os/service/remote::sshd-ref
      - id: ftpd
      - id: httpd
      - id: inetd
