defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: telnetd
    desc: telnetd daemon reference
    if:
      type: text
      word: telnetd
    unless:
      - id: metadata/file/text/format::roff-document
  - id: httpd
    desc: httpd daemon reference
    if:
      type: text
      regex: '(?m)(^|[\n\r])\s*[^#\s].{0,120}\bhttpd(\s|$)'
    not:
      - substr: "Server: httpd/"
      - substr: restart_httpd
      - regex: application/x-httpd-php(-source)?
      - substr: /etc/apache2/mime.types
      - substr: /etc/apache/mime.types
    unless:
      - id: metadata/file/text/catalog::neovim-filetype-registry
  - id: apache2
    desc: apache2 daemon reference
    if:
      type: text
      regex: '(^|[\s"`(/])apache2(\s|$)'
    not:
      - substr: /etc/apache2/mime.types
    unless:
      - id: metadata/file/text/catalog::neovim-filetype-registry
  - id: ftpd
    desc: FTP daemon software name reference
    crit: component
    if:
      type: text
      word: ftpd
    unless:
      - id: metadata/file/text/format::roff-document
  - id: inetd
    desc: inetd daemon reference
    for:
      - c
      - html
    platforms:
      - unix
    if:
      type: text
      substr: /usr/sbin/inetd
composite_rules:
  # A bare "ftpd" name is just an FTP-software reference (FFmpeg names pure-ftpd
  # in its ftp muxer help). Claiming an FTP *daemon* requires FTP protocol
  # command handling too; FFmpeg's ftp *client* carries the same verbs, so the
  # multimedia-library marker rules it out as a server.
  - id: ftpd-daemon
    desc: FTP daemon with protocol command handling
    crit: notable
    conf: 0.8
    all:
      - id: ftpd
      - id: micro-behaviors/communications/ftp/control::ftp-protocol-support
    unless:
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
  - id: remote-access-daemons
    desc: Remote access daemon references
    any:
      - id: telnetd
      - id: micro-behaviors/os/service/remote::sshd-ref
      - id: ftpd-daemon
      - id: httpd
      - id: inetd
