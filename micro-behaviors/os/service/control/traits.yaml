defaults:
  for:
    - shell
    - elf
  platforms:
    - linux
traits:
  - id: systemctl-word
    desc: References systemctl service manager
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?m)(^|[;&|])\s*(sudo\s+)?systemctl(\s+|$)
    unless:
      - id: metadata/file/extension/identity::markdown-file-basename
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
  - id: systemctl-list-units
    desc: systemctl list-units command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: systemctl list-units
  - id: python-systemctl-user-argv
    desc: Python invokes systemctl user service
    crit: notable
    conf: 0.82
    for: [python]
    if:
      type: text
      regex: '\[\s*["'']systemctl["'']\s*,\s*["'']--user["'']'
    unless:
      - id: micro-behaviors/os/service/legitimate::python-managed-user-service-context
  - id: python-launchctl-argv
    desc: Python invokes launchctl service control
    crit: notable
    conf: 0.82
    for: [python]
    platforms: [macos]
    if:
      type: text
      regex: '\[\s*["'']launchctl["'']'
    unless:
      - id: micro-behaviors/os/service/legitimate::python-managed-user-service-context
  - id: launchctl-load-command
    desc: launchctl load service command
    crit: notable
    conf: 0.92
    for: [go, kotlin, php, ruby, rust, javascript, typescript, python]
    platforms: [macos]
    if:
      type: text
      regex: '\blaunchctl\b.{0,80}\bload\b'
    unless:
      - type: text
        substr: com.apple.smb.preferences
  - id: launchctl-load-plist
    desc: launchctl loads a plist service
    crit: notable
    conf: 0.94
    for: [shell]
    platforms: [macos]
    mbc: B0028
    attack: T1543.004
    if:
      type: text
      regex: '(?m)^\s*(sudo\s+)?launchctl\s+load\s+[^;\n]{0,160}\.plist'
  - id: launchctl-stop-command
    desc: launchctl stops a service
    crit: notable
    conf: 0.82
    for: [shell, python, javascript]
    platforms: [macos]
    mbc: B0028
    attack: T1543.004
    if:
      type: text
      regex: '\blaunchctl\s+stop\s+\S+'
  - id: loginctl-enable-linger
    desc: Enables lingering user services
    crit: notable
    conf: 0.86
    for: [shell, python]
    if:
      type: text
      regex: '\bloginctl\b.{0,80}\benable-linger\b'
    unless:
      - id: micro-behaviors/os/service/legitimate::python-managed-user-service-context
  - id: service-start
    desc: service start command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: service\s+[a-zA-Z0-9_\-]+\s+start
  - id: service-stop
    desc: service stop command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: service\s+[a-zA-Z0-9_\-]+\s+stop
  - id: service-restart
    desc: service restart command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: service\s+[a-zA-Z0-9_\-]+\s+restart
  - id: chkconfig-word
    desc: chkconfig command
    crit: notable
    conf: 0.7
    if:
      type: text
      word: chkconfig
  - id: launchctl-command
    desc: launchctl command (manage launchd services)
    crit: notable
    conf: 0.7
    mbc: B0028
    attack: T1543.004
    platforms: [macos]
    for: [shell, applescript, python, javascript, c, macho]
    if:
      type: text
      regex: (^|[\s;&|(/])(/bin/)?launchctl(\s|$)
    not:
      - regex: completions/launchctl\.fish|complete --command launchctl|Opens the launchctl daemon file
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: launchctl-enable-disable-command
    desc: launchctl service enable or disable command
    crit: notable
    conf: 0.88
    platforms: [macos]
    for: [shell, applescript, python, javascript, c, macho]
    if:
      type: text
      regex: '\blaunchctl\s+(enable|disable)\b'
  - id: launchctl-bootout-gui
    desc: launchctl bootout gui service
    crit: notable
    conf: 0.86
    mbc: B0028
    attack: T1543.004
    platforms: [macos]
    for: [macho, c, shell]
    if:
      type: text
      substr: launchctl bootout gui/
  - id: launchctl-bootstrap-gui
    desc: launchctl bootstrap gui service
    crit: notable
    conf: 0.86
    mbc: B0028
    attack: T1543.004
    platforms: [macos]
    for: [macho, c, shell]
    if:
      type: text
      substr: launchctl bootstrap gui/
  - id: launchctl-load-variable
    desc: launchctl loads variable plist
    crit: notable
    conf: 0.93
    mbc: B0028
    attack: T1543.004
    platforms: [macos]
    for: [shell]
    if:
      type: text
      regex: 'launchctl load "\$[A-Z_]{3,40}"'
composite_rules:
  - id: service-cmd
    desc: service command with action
    crit: notable
    conf: 0.7
    any:
      - id: service-start
      - id: service-stop
      - id: service-restart
  - id: service-control
    desc: Service control commands
    crit: notable
    conf: 0.7
    any:
      - id: systemctl-word
      - id: service-cmd
      - id: chkconfig-word
      - id: launchctl-stop-command
