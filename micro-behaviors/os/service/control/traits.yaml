defaults:
  for:
    - shell
    - elf
  platforms:
    - linux
traits:
  - id: systemctl-word
    desc: systemctl command
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      word: systemctl
  - id: service-start
    desc: service start command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: service\s+[a-zA-Z0-9_\-]+\s+start
  - id: service-stop
    desc: service stop command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: service\s+[a-zA-Z0-9_\-]+\s+stop
  - id: service-restart
    desc: service restart command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: service\s+[a-zA-Z0-9_\-]+\s+restart
  - id: chkconfig-word
    desc: chkconfig command
    crit: notable
    conf: 0.7
    if:
      type: text
      word: chkconfig
composite_rules:
  - id: service-cmd
    desc: service command with action
    crit: notable
    conf: 0.7
    any:
      - id: service-start
      - id: service-stop
      - id: service-restart
  - id: service-control
    desc: Service control commands
    crit: notable
    conf: 0.7
    any:
      - id: systemctl-word
      - id: service-cmd
      - id: chkconfig-word
