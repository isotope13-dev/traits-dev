defaults:
  attack: T1543.003
  for:
    - pe
  platforms:
    - windows
traits:
  - id: open-sc-manager
    desc: Open service control manager
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: ^OpenSCManager[AW]?$
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: text
        substr: "Nullsoft Install System"
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: open-service
    desc: Open existing service handle
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: ^OpenService[AW]?$
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: text
        substr: "Nullsoft Install System"
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: query-service-config
    desc: Query service configuration
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: ^QueryServiceConfig[AW]?$
  - id: change-service-config
    desc: Modify service configuration
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: ^ChangeServiceConfig[AW]?$
  - id: create-service
    desc: Create Windows service
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: ^CreateService[AW]?$
  - id: control-service
    desc: Send service control code
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: ControlService
  - id: delete-service
    desc: Delete installed service
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: DeleteService
  - id: query-service-status
    desc: Query service runtime status
    crit: notable
    conf: 0.82
    if:
      type: symbol
      regex: ^QueryServiceStatus(Ex)?$
    unless:
      - id: metadata/binary/installer/script::nsis
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: text
        substr: "Nullsoft Install System"
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: start-service
    desc: Start Windows service
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: ^StartService[AW]?$
  - id: start-service-dispatcher
    desc: Start service control dispatcher
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: ^StartServiceCtrlDispatcher[AW]$
  - id: start-service-dispatcher-text
    desc: Start service dispatcher string
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: StartServiceCtrlDispatcherW
  - id: register-service-handler
    desc: Register service control handler
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: ^RegisterServiceCtrlHandler(Ex)?[AW]$
  - id: register-service-handler-text
    desc: Service handler registration string
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: RegisterServiceCtrlHandlerW
  - id: set-service-status
    desc: Report service status updates
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: SetServiceStatus
  - id: set-service-status-text
    desc: Service status reporting string
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: SetServiceStatus
composite_rules:
  - id: start-service-dispatcher-api
    desc: Service dispatcher API reference
    crit: notable
    conf: 0.9
    any:
      - id: start-service-dispatcher
      - id: start-service-dispatcher-text
  - id: register-service-handler-api
    desc: Service handler API reference
    crit: notable
    conf: 0.9
    any:
      - id: register-service-handler
      - id: register-service-handler-text
  - id: set-service-status-api
    desc: Service status API reference
    crit: notable
    conf: 0.88
    any:
      - id: set-service-status
      - id: set-service-status-text
  - id: reconfigure-and-start-service
    desc: Reconfigure service then start
    crit: notable
    conf: 0.9
    all:
      - id: open-sc-manager
      - id: open-service
      - id: change-service-config
    any:
      - id: start-service
      - id: query-service-config
  - id: service-control-dispatch
    desc: Windows service control dispatch
    crit: notable
    conf: 0.92
    all:
      - id: start-service-dispatcher-api
      - id: register-service-handler-api
    any:
      - id: set-service-status-api
      - id: start-service
  - id: service-dispatch-triad
    desc: Full Windows service dispatch triplet
    crit: notable
    conf: 0.95
    all:
      - id: start-service-dispatcher-api
      - id: register-service-handler-api
      - id: set-service-status-api
  - id: service-stop-control
    desc: Service stop or delete chain
    crit: notable
    conf: 0.92
    all:
      - id: open-sc-manager
      - id: open-service
    any:
      - id: control-service
      - id: delete-service
      - id: query-service-status
