defaults:
  attack: T1543.003
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: sc-create-command
    desc: sc.exe create service command
    crit: notable
    conf: 0.95
    for: [csharp, powershell, batch]
    if:
      type: text
      regex: '(?i)(^|["''`])sc(\.exe)?\s+create\b'
  - id: sc-config-command
    desc: sc.exe configure service command
    crit: notable
    conf: 0.95
    for: [csharp, powershell, batch]
    if:
      type: text
      regex: '(?i)(^|["''`])sc(\.exe)?\s+config\b'
  - id: sc-delete-command
    desc: sc.exe delete service command
    crit: notable
    conf: 0.95
    for: [csharp, powershell, batch]
    if:
      type: text
      regex: '(?i)(^|["''`])sc(\.exe)?\s+delete\b'
  - id: sc-start-command
    desc: sc.exe start service command
    crit: notable
    conf: 0.95
    # Native loaders often embed the command and invoke it through a shell
    # helper; keep this coverage aligned with the script forms.
    for: [scripts, binaries]
    if:
      type: text
      regex: '(?i)(^|["''`])sc(\.exe)?\s+start\b'
  - id: sc-stop-command
    desc: sc.exe stop service command
    crit: notable
    conf: 0.95
    for: [csharp, powershell, batch]
    if:
      type: text
      regex: '(?i)(^|["''`])sc(\.exe)?\s+stop\b'
  - id: sc-query-command
    desc: sc.exe query service command
    crit: notable
    conf: 0.95
    for: [csharp, powershell, batch]
    if:
      type: text
      regex: '(?i)(^|["''`])sc(\.exe)?\s+q(c|description)\b'

  - id: python-win32serviceutil-module
    desc: Imports Python service management module
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: import
      exact: win32serviceutil
  - id: notify-service-status-change
    desc: Register Windows service status callback
    crit: notable
    conf: 0.93
    for: [pe, dll, c, cpp]
    if:
      type: symbol
      exact: NotifyServiceStatusChangeW
  - id: open-sc-manager
    desc: Open service control manager
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (^|[./])OpenSCManager[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/library/data::gcp-go-sdk
      - id: well-known/lib/windows-vault/
      - id: well-known/tool/development/fzf::fzf-binary
  - id: open-service
    desc: Open existing service handle
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (^|[./])OpenService[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/lib/windows-vault/
      - id: well-known/tool/development/fzf::fzf-binary
  - id: query-service-config
    desc: Query service configuration
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (^|[./])QueryServiceConfig[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/lib/windows-vault/
      - id: well-known/tool/development/fzf::fzf-binary
  - id: change-service-config
    desc: Modify service configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (^|[./])ChangeServiceConfig[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/tool/development/fzf::fzf-binary
  - id: create-service
    desc: Create Windows service
    crit: notable
    conf: 0.85
    for: [pe, dll, c, cpp]
    if:
      type: symbol
      regex: (^|[./])CreateService[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: control-service
    desc: Send service control code
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: ControlService
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: delete-service
    desc: Delete installed service
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: DeleteService
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: query-service-status
    desc: Query service runtime status
    crit: notable
    conf: 0.82
    if:
      type: symbol
      regex: ^QueryServiceStatus(Ex)?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: start-service
    desc: Start Windows service
    crit: notable
    conf: 0.85
    for: [pe, dll, c, cpp]
    if:
      type: text
      regex: (^|[./])StartService[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/lib/windows-vault/
      - id: well-known/tool/development/fzf::fzf-binary
  - id: cscservice-name
    desc: Offline Files service name
    crit: component
    conf: 0.95
    if:
      type: text
      exact: CscService
  - id: start-service-dispatcher
    desc: Start service control dispatcher
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (^|[./])StartServiceCtrlDispatcher[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/tool/development/fzf::fzf-binary
  - id: register-service-handler
    desc: Register service control handler
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (^|[./])RegisterServiceCtrlHandler(Ex)?[AW]?$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/tool/development/fzf::fzf-binary
  - id: set-service-status
    desc: Report service status updates
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (^|[./])SetServiceStatus$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/tool/development/fzf::fzf-binary
  - id: open-sc-manager-import
    desc: Program opens service control manager
    crit: notable
    conf: 0.95
    if:
      type: import
      regex: ^OpenSCManager[AW]?$
  - id: open-service-import
    desc: Program can open Windows services
    crit: notable
    conf: 0.93
    if:
      type: import
      regex: ^OpenService[AW]?$
  - id: start-service-import
    desc: Program can start Windows services
    crit: notable
    conf: 0.93
    if:
      type: import
      regex: ^StartService[AW]?$
  - id: go-open-sc-manager-proc
    desc: Go resolves OpenSCManager proc
    crit: component
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: OpenSCManagerW
  - id: go-open-service-proc
    desc: Go resolves OpenService proc
    crit: component
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: OpenServiceW
  - id: go-create-service-proc
    desc: Go resolves CreateService proc
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: CreateServiceW
  - id: go-change-service-config-proc
    desc: Go resolves ChangeServiceConfig proc
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: ChangeServiceConfigW
  - id: go-control-service-proc
    desc: Go resolves ControlService proc
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: ControlService
  - id: go-start-service-proc
    desc: Go resolves StartService proc
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: StartServiceW
composite_rules:
  - id: service-admin-import-cluster
    desc: Windows service admin import cluster
    crit: notable
    conf: 0.95
    all:
      - id: open-sc-manager-import
    needs: 3
    any:
      - id: create-service
      - id: open-service-import
      - id: start-service-import
    downgrade:
      any:
        - id: metadata/binary/installer/family/
        - id: metadata/signed/platform/
  - id: reconfigure-and-start-service
    desc: Reconfigure service then start
    crit: notable
    conf: 0.9
    all:
      - id: open-sc-manager
      - id: open-service
      - id: change-service-config
    any:
      - id: start-service
      - id: query-service-config
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
  - id: service-control-dispatch
    desc: Windows service control dispatch
    crit: notable
    conf: 0.92
    all:
      - id: start-service-dispatcher
      - id: register-service-handler
    any:
      - id: set-service-status
      - id: start-service
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
  - id: service-dispatch-triad
    desc: Full Windows service dispatch triplet
    crit: notable
    conf: 0.95
    all:
      - id: start-service-dispatcher
      - id: register-service-handler
      - id: set-service-status
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
  - id: service-stop-control
    desc: Service stop or delete chain
    crit: notable
    conf: 0.92
    all:
      - id: open-sc-manager
      - id: open-service
    any:
      - id: control-service
      - id: delete-service
      - id: query-service-status
  - id: go-service-install-control
    desc: Go Windows service install control
    crit: notable
    conf: 0.93
    for: [go]
    all:
      - id: go-open-sc-manager-proc
      - id: go-create-service-proc
    any:
      - id: go-open-service-proc
      - id: go-start-service-proc
  - id: go-service-stop-control
    desc: Go Windows service stop control
    crit: notable
    conf: 0.93
    for: [go]
    all:
      - id: go-open-sc-manager-proc
      - id: go-open-service-proc
      - id: go-control-service-proc
  - id: go-service-reconfigure-control
    desc: Go Windows service reconfigure control
    crit: notable
    conf: 0.93
    for: [go]
    all:
      - id: go-open-sc-manager-proc
      - id: go-open-service-proc
      - id: go-change-service-config-proc
  - id: service-admin-with-winhttp
    desc: Service administration combined with WinHTTP request capability
    crit: notable
    conf: 0.9
    all:
      - id: service-admin-import-cluster
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
