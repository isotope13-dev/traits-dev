defaults:
  platforms: [windows]
  for: [binaries, scripts, c, cpp, pe, dll, javascript, typescript]
  crit: notable
  conf: 0.99

traits:
  - id: service-stopped-or-disabled-message
    desc: References a stopped or disabled service message
    if:
      type: text
      regex: '(?i)\b(Stopped|Disabled)\s+service\b'
    unless:
      - id: metadata/signed/leaf::microsoft-corporation
