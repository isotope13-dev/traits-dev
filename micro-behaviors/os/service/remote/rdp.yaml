defaults:
  platforms: [windows]
  for: [pe]
traits:
- id: freerdp-vchan-manager-exports
  desc: FreeRDP virtual channel manager exports
  crit: notable
  conf: 0.94
  if:
    type: symbol
    regex: ^WTSVirtualChannelManager
- id: freerdp-rdpgfx-exports
  desc: FreeRDP graphics channel exports
  crit: notable
  conf: 0.94
  if:
    type: symbol
    regex: ^rdpgfx_client_context_
- id: freerdp-assistance-export
  desc: FreeRDP assistance session export
  crit: notable
  conf: 0.93
  if:
    type: symbol
    exact: freerdp_assistance_set_connection_string2
- id: freerdp-keyboard-layout-export
  desc: FreeRDP keyboard layout export
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: freerdp_keyboard_get_layouts
composite_rules:
- id: freerdp-remote-desktop-stack
  desc: Embedded FreeRDP remote desktop stack
  crit: suspicious
  conf: 0.97
  all:
  - id: freerdp-vchan-manager-exports
  - id: freerdp-rdpgfx-exports
  any:
  - id: freerdp-assistance-export
  - id: freerdp-keyboard-layout-export
