defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: sshd-ref
    desc: sshd daemon reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: sshd
  - id: sshd-path
    desc: sshd daemon path
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: /usr/sbin/sshd
  - id: ssh-service
    desc: SSH service reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: ssh.service

  - id: dropbear-ref
    desc: dropbear SSH daemon reference
    crit: baseline
    conf: 0.45
    if:
      type: text
      word: dropbear
  - id: dropbear-server-args
    desc: dropbear server-side execution arguments
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bdropbear\s+[^&;|\n]{0,60}-[pFrE]'

composite_rules:
  - id: ssh-service-setup
    desc: SSH daemon service setup
    crit: notable
    conf: 0.8
    all:
      - id: sshd-ref
    any:
      - id: sshd-path
      - id: ssh-service
