defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: sshd-ref
    desc: sshd daemon reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: sshd
  - id: sshd-path
    desc: sshd daemon path
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: /usr/sbin/sshd
  - id: ssh-service
    desc: SSH service reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: ssh.service
  - id: dropbear-ref
    desc: dropbear SSH daemon reference
    crit: baseline
    conf: 0.45
    if:
      type: text
      word: dropbear
