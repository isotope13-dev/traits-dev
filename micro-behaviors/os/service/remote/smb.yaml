defaults:
  platforms: [windows]
  for: [c, cpp, pe]
traits:
  - id: net-user-enum-source
    desc: NetUserEnum remote user enumeration
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: NetUserEnum
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: ipc-null-session-path
    desc: IPC$ null session share path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: \\\\%s\\IPC$
  - id: wnet-add-connection2-source
    desc: WNetAddConnection2 remote share connect
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: WNetAddConnection2
  - id: net-schedule-job-add-source
    desc: NetScheduleJobAdd remote task creation
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: NetScheduleJobAdd
