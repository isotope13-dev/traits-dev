defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: advapi32-link
    desc: Links to ADVAPI32.dll (Service Management)
    crit: baseline
    conf: 1.0
    if:
      type: symbol
      exact: DeregisterEventSource
  - id: service-config-change
    desc: Changes service configuration via ADVAPI32
    crit: notable
    conf: 1.0
    if:
      type: symbol
      exact: ChangeServiceConfig2W
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: service-dll-value-name
    desc: ServiceDll registry value marker
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: servicedll
      case_insensitive: true
  - id: system32-service-dll-target
    desc: Service DLL path under System32
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)%+systemroot%+\\\\system32\\\\
  - id: service-parameters-registry-path
    desc: Service parameters registry path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)system\\\\currentcontrolset\\\\services\\\\[^\\\\]{1,80}\\\\parameters
  - id: svchost-k-service-group
    desc: svchost service group command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)%+systemroot%+\\\\system32\\\\svchost\.exe\s+-k\s+(%s|[a-z0-9_.-]+)
composite_rules:
  - id: legit-service-host-registration
    desc: Canonical svchost service registration
    crit: notable
    conf: 0.92
    all:
      - id: service-dll-value-name
      - id: system32-service-dll-target
      - id: svchost-k-service-group
    any:
      - id: service-parameters-registry-path
      - id: micro-behaviors/os/service/export::win-service-export
