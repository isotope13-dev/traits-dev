defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: open-print-processor-export
    desc: Print processor open export
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: OpenPrintProcessor
  - id: close-print-processor-export
    desc: Print processor close export
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: ClosePrintProcessor
  - id: control-print-processor-export
    desc: Print processor control export
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: ControlPrintProcessor
  - id: print-document-processor-export
    desc: Print processor document export
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: PrintDocumentOnPrintProcessor
  - id: enum-print-datatypes-export
    desc: Print processor datatype export
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: EnumPrintProcessorDatatypesW
  - id: print-processor-capabilities-export
    desc: Print processor capabilities export
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: GetPrintProcessorCapabilities
  - id: winspool-drv-dependency
    desc: Windows spooler library dependency
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: WINSPOOL.DRV
      section: .rdata

composite_rules:
  - id: print-processor-dll-api-surface
    desc: Windows print processor DLL API
    crit: notable
    conf: 0.95
    all:
      - id: open-print-processor-export
      - id: close-print-processor-export
      - id: control-print-processor-export
    any:
      - id: print-document-processor-export
      - id: enum-print-datatypes-export
      - id: print-processor-capabilities-export
    needs: 2
  - id: print-processor-proxy-surface
    desc: Print processor proxy surface
    crit: notable
    conf: 0.96
    all:
      - id: print-processor-dll-api-surface
      - id: winspool-drv-dependency
