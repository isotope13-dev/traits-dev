defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: api-ms-string-reference
    desc: Reference to api-ms- Windows API string
    crit: component
    conf: 0.9
    count_min: 15
    if:
      type: text
      substr: api-ms-
  - id: load-library-ex-system32
    desc: LoadLibraryExW with LOAD_LIBRARY_SEARCH_SYSTEM32
    crit: component
    conf: 0.85
    if:
      type: hex
      section: text
      pattern: 41 B8 00 08 00 00 # mov r8d, 0x800

composite_rules:
  - id: custom-api-resolver-logic
    desc: Custom API resolver logic (manual module/export resolution)
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/os/module/load::get-module-handle-ex
      - id: api-ms-string-reference
    any:
      - id: load-library-ex-system32
      - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
    unless:
      - id: metadata/binary/framework::unity-player-framework
      - id: metadata/library/python-runtime::python-runtime
      - id: metadata/signed/certificate::benign-consumer-leaves
      - id: metadata/signed/platform::microsoft
      - id: micro-behaviors/ui/framework/imgui::dear-imgui-library
      - id: well-known/tool/reverse-engineering/x64dbg::titanengine-library
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
