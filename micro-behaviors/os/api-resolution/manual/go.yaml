defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1027.007
traits:
  - id: xsys-windows-lazyproc-call
    desc: Go x/sys/windows LazyProc call
    crit: notable
    conf: 0.94
    if:
      type: string_value
      exact: golang.org/x/sys/windows.(*LazyProc).Call
  - id: syscall-lazyproc-find
    desc: Go syscall LazyProc resolver
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: syscall.(*LazyProc).Find
  - id: xsys-windows-load-dll
    desc: Go x/sys/windows DLL loader
    crit: notable
    conf: 0.88
    if:
      type: string_value
      exact: golang.org/x/sys/windows.LoadDLL
composite_rules:
  - id: go-lazyproc-resolution
    desc: Go LazyProc API resolution
    crit: suspicious
    conf: 0.95
    all:
      - id: xsys-windows-lazyproc-call
    any:
      - id: syscall-lazyproc-find
      - id: xsys-windows-load-dll
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load::load-library-ex-w
    needs: 2
