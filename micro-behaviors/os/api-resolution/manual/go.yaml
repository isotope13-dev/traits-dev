defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1027.007
traits:
  - id: xsys-windows-lazyproc-call
    desc: Go x/sys/windows LazyProc call
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: golang.org/x/sys/windows.(*LazyProc).Call
  - id: syscall-lazyproc-find
    desc: Go syscall LazyProc resolver
    # Component-only: `syscall.(*LazyProc).Find` is present in virtually every
    # Go Windows binary that transitively imports the `syscall` package.
    # The `go-lazyproc-resolution` composite gates on the `.Call` invocation,
    # which is the real "this binary resolves APIs at runtime" signal.
    crit: component
    conf: 0.9
    if:
      type: text
      exact: syscall.(*LazyProc).Find
  - id: syscall-lazyproc-call
    desc: Go syscall LazyProc call
    crit: component
    conf: 0.9
    if:
      type: text
      exact: syscall.(*LazyProc).Call
  - id: syscall-syscalln
    desc: Go syscall SyscallN dispatch
    crit: component
    conf: 0.9
    if:
      type: text
      exact: syscall.SyscallN
  - id: syscall-direct-call
    desc: Go direct syscall dispatch
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: syscall.Syscall
  - id: xsys-windows-load-dll
    desc: Go x/sys/windows DLL-loading API reference
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: golang.org/x/sys/windows.LoadDLL
composite_rules:
  - id: go-lazyproc-resolution
    desc: Go LazyProc API resolution
    # x/sys/windows LazyProc is a common Go wrapper for Win32 calls. Keep it
    # visible for supply-chain diffs, but let objective composites raise intent.
    crit: notable
    conf: 0.95
    all:
      - id: xsys-windows-lazyproc-call
    any:
      - id: syscall-lazyproc-find
      - id: xsys-windows-load-dll
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
    needs: 2
  - id: go-syscall-dynamic-api-dispatch
    desc: Go SyscallN dispatch reference
    # Go's Windows syscall/xsys wrappers commonly dispatch through SyscallN in
    # legitimate software. Treat it as a notable API-resolution capability;
    # objectives can raise severity when paired with stronger malicious context.
    crit: notable
    conf: 0.96
    all:
      - id: syscall-lazyproc-call
      - id: syscall-syscalln
    any:
      - id: syscall-lazyproc-find
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load/runtime::load-library-w
      - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
    needs: 2
