defaults:
  for:
    - c
    - cpp
  platforms:
    - windows
  attack: T1027.007
traits:
  - id: nt-current-teb
    desc: Access current TEB directly
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: NtCurrentTeb
  - id: peb-ldr-data
    desc: Access PEB loader data
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \bP+EB_LDR_DATA\b|\bPEB_LDR_DATA\b
  - id: module-list-walk
    desc: Walk PEB module list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bIn(Memory|Load|Initialization)OrderModuleList\b
  - id: export-directory
    desc: Parse PE export directory
    crit: notable
    conf: 0.85
    if:
      type: text
      word: IMAGE_EXPORT_DIRECTORY
  - id: export-name-ordinals
    desc: Parse export name ordinals
    crit: notable
    conf: 0.85
    if:
      type: text
      word: AddressOfNameOrdinals
  - id: export-name-table
    desc: Parse export name table
    crit: notable
    conf: 0.85
    if:
      type: text
      word: AddressOfNames
  - id: export-function-table
    desc: Parse export function table
    crit: notable
    conf: 0.85
    if:
      type: text
      word: AddressOfFunctions
  - id: kernel32-resolver
    desc: Kernel32 DLL resolution string
    crit: component
    conf: 0.9
    for:
      - pe
      - pe
    if:
      type: text
      substr: kernel32.dll
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
composite_rules:
  - id: peb-module-walk
    desc: Resolve modules from PEB
    crit: suspicious
    conf: 0.9
    all:
      - id: nt-current-teb
      - id: peb-ldr-data
      - id: module-list-walk
  - id: manual-export-resolution
    desc: Manually resolve PE exports
    crit: suspicious
    conf: 0.92
    needs: 3
    any:
      - id: export-directory
      - id: export-name-ordinals
      - id: export-name-table
      - id: export-function-table
