defaults:
  for:
    - c
    - cpp
    - pe
    - dll
  platforms:
    - windows
  attack: T1027.007
traits:
  - id: export-table-label
    desc: ExportTable parser label
    crit: component
    conf: 0.8
    if:
      type: text
      word: ExportTable
  - id: nt-current-teb
    desc: Access current TEB directly
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: NtCurrentTeb
  - id: peb-ldr-data
    desc: Access PEB loader data
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \bP+EB_LDR_DATA\b|\bPEB_LDR_DATA\b
  - id: module-list-walk
    desc: Walk PEB module list
    crit: component
    conf: 0.9
    if:
      type: text
      regex: \bIn(Memory|Load|Initialization)OrderModuleList\b
    unless:
      - id: well-known/tool/sysadmin/sandboxie/
  - id: export-directory
    desc: Parse PE export directory
    crit: notable
    conf: 0.85
    if:
      type: text
      word: IMAGE_EXPORT_DIRECTORY
  - id: export-name-ordinals
    desc: Parse export name ordinals
    crit: notable
    conf: 0.85
    if:
      type: text
      word: AddressOfNameOrdinals
  - id: export-name-table
    desc: Parse export name table
    crit: notable
    conf: 0.85
    if:
      type: text
      word: AddressOfNames
  - id: export-function-table
    desc: Parse export function table
    crit: notable
    conf: 0.85
    if:
      type: text
      word: AddressOfFunctions
  - id: kernel32-resolver
    desc: Kernel32 DLL resolution string
    crit: component
    conf: 0.9
    for:
      - pe
      - dll
    if:
      type: text
      substr: kernel32.dll
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/framework::dotnet-metadata
  - id: shadow-ntdll-indicator
    desc: Shadow ntdll technique indicator
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "(shadow|clean).ntdll"

  - id: shadow-ntdll-redirection
    desc: Redirecting APIs to shadow ntdll
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "Redirecting Nt* pointers to clean copy"

  - id: knowndlls-ntdll
    desc: KnownDlls ntdll reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "\\KnownDlls\\ntdll.dll"

  # Deferred resolution: API name strings staged in .rdata for later GetProcAddress.
  # These are NOT in the static IAT — the binary resolves them at runtime.
  - id: gettemppath2w-staged
    desc: "GetTempPath2W name staged runtime resolution"
    crit: component
    conf: 0.9
    for:
      - pe
    if:
      type: text
      exact: GetTempPath2W
      section: .rdata
    unless:
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup

  - id: gettempfilename-staged
    desc: "GetTempFileName name staged runtime resolution"
    crit: component
    conf: 0.9
    for:
      - pe
    if:
      type: text
      regex: ^GetTempFileName[AW]?$
      section: .rdata

composite_rules:
  - id: peb-module-walk
    desc: Resolve modules from PEB
    crit: suspicious
    conf: 0.9
    all:
      - id: nt-current-teb
      - id: peb-ldr-data
      - id: module-list-walk
    unless:
      - id: well-known/lib/wine::wine-source-tree
  - id: manual-export-resolution
    desc: Manually resolve PE exports
    crit: notable
    conf: 0.92
    needs: 3
    any:
      - id: export-directory
      - id: export-name-ordinals
      - id: export-name-table
      - id: export-function-table
    unless:
      - id: metadata/file/extension/identity::dotnet-native-image
      - id: metadata/library/memory-module::memory-module-source
      - id: well-known/tool/sysadmin/sandboxie/
      - id: metadata/lang/compiler/managed::delphi
  - id: staged-temp-api-resolution
    desc: Multiple temp APIs staged for deferred resolution
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: gettemppath2w-staged
      - id: gettempfilename-staged
