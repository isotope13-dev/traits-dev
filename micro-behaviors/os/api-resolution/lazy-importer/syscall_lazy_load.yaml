defaults:
  for: [pe, dll, c, cpp]
  platforms:
    - windows
  attack: T1027.002
traits:
  - id: li-fn-macro-dup
    desc: LI_FN macro (lazy import function)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: LI_FN(
  - id: li-module-macro-dup
    desc: LI_MODULE macro (lazy import module)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: LI_MODULE(
  - id: lazy-importer-khash
    desc: LAZY_IMPORTER_KHASH compile-time hash
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: LAZY_IMPORTER_KHASH
  - id: lazy-importer-hpp
    desc: lazy_importer.hpp header
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: lazy_importer(\.hpp)?
  - id: justas-lazy-importer
    desc: JustasMasiulis lazy_importer attribution
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: JustasMasiulis
  - id: lazy-function-template
    desc: lazy_function template class
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: lazy_function
  - id: cached-call-pattern
    desc: .cached() lazy import call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \.cached\(\)\(
  - id: safe-cached-pattern
    desc: .safe_cached() lazy import call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.safe_cached\(\)\(
composite_rules:
  - id: lazy-importer-usage
    desc: Lazy importer library usage
    crit: suspicious
    conf: 0.95
    any:
      - id: micro-behaviors/os/api-resolution/lazy-importer::li-fn-macro-dup
      - id: micro-behaviors/os/api-resolution/lazy-importer::li-module-macro-dup
      - id: lazy-importer-khash
  - id: lazy-importer-calls
    desc: Lazy importer cached calls
    crit: suspicious
    conf: 0.9
    any:
      - id: cached-call-pattern
      - id: safe-cached-pattern
