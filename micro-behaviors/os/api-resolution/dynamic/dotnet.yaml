defaults:
  platforms: [windows]
  for: [pe, csharp]

traits:
  - id: assembly-load-getmethod-chain
    desc: .NET reflection loads type method
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Assembly\.Load[\s\S]{0,140}\.GetType[\s\S]{0,360}\.GetMethod'

  - id: managed-process-module-reference
    desc: .NET process module metadata access
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: ProcessModule

  - id: managed-module-collection-reference
    desc: .NET process module collection access
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)(ProcessModule[\s\S]{0,512}get_Modules|get_Modules[\s\S]{0,512}ProcessModule)'

  - id: managed-module-base-address
    desc: .NET module base-address access
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: get_BaseAddress

  - id: managed-function-pointer-delegate
    desc: .NET native function-pointer delegate conversion
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: GetDelegateForFunctionPointer

  - id: managed-unmanaged-memory-marshalling
    desc: .NET unmanaged memory allocation API
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)Alloc(HGlobal|CoTaskMem)'

  - id: managed-unicode-marshalling
    desc: .NET Unicode unmanaged string marshalling
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: StringToHGlobalUni

  - id: managed-ansi-marshalling
    desc: .NET ANSI pointer string marshalling
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: PtrToStringAnsi
