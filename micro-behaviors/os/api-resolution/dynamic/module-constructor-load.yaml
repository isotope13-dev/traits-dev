# Node.js Dynamic Module Resolution via module.constructor._load()
# Detects the anti-static evasion pattern where malware bypasses
# require() by calling module.constructor._load() with dynamically
# constructed module names. This defeats AST-based detectors that
# match require('module') call expressions.
# ATT&CK: T1027.002 (Obfuscated Files or Information)
# MBC: B0032 (Anti-Static Analysis)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: suspicious
  conf: 0.9
  attack: "T1027.002"
  mbc: "B0032"

traits:
  # Direct module.constructor._load() call
  - id: module-constructor-load
    desc: Dynamic module load via module.constructor._load
    if:
      type: text
      regex: "module\\.constructor\\._load\\("

  # module.constructor with bracket access (obfuscated _load)
  # e.g., module.constructor[_0xb1i9([0x5f,0x6c,0x6f,0x61,0x64])]
  - id: module-constructor-bracket-load
    desc: Obfuscated module load via module.constructor[decoded]
    if:
      type: text
      regex: "module\\.constructor\\[.{1,50}\\]\\s*\\("

  # module.constructor access (component — needs context)
  - id: module-constructor-access
    desc: Access to module.constructor
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: "module\\.constructor\\b"
