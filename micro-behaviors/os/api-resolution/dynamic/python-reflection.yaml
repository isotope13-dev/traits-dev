defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-getattr-composed-name
    desc: Python getattr with a composed attribute name
    crit: notable
    conf: 0.85
    if:
      type: tree-sitter
      query: |
        (call
          function: (identifier) @fn
          (#eq? @fn "getattr")
          arguments: (argument_list
            (_) @obj
            [
              (binary_operator
                left: (string)
                right: (string))
              (binary_operator
                left: (call
                  function: (identifier) @chr_l
                  (#eq? @chr_l "chr")))
              (call
                function: (identifier) @chr_only
                (#eq? @chr_only "chr"))
            ]))
  - id: dunder-import-getattr
    desc: "Python dynamic import via __import__ & getattr"
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'getattr\s*\(\s*__import__\s*\('
  - id: python-getattr-call
    desc: Python getattr dynamic attribute lookup
    crit: component
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: getattr
  - id: python-dunder-getattribute-dispatch
    desc: Calls Python __getattribute__ directly
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)__getattribute__$'
  - id: python-getattr-eval-callable
    desc: Python getattr resolves eval callable
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: getattr
      arg:
        kind: string
        regex: '^(eval|exec|compile)$'
  - id: python-getattr-import-callable
    desc: Python getattr resolves import callable
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: getattr
      arg:
        kind: string
        exact: __import__
  - id: python-getattr-process-callable
    desc: Python getattr resolves process callable
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: getattr
      arg:
        kind: string
        regex: '^(system|popen|Popen)$'
  - id: python-sys-modules-member
    desc: Python sys.modules dynamic module access
    crit: component
    conf: 0.78
    if:
      type: symbol
      kind: member
      exact: sys.modules
  - id: python-sys-modules-api-call
    desc: Python sys.modules dynamic API call
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '^sys\.modules\.[^.]+\.(system|popen|Popen|check_output)$'
  - id: python-vars-api-call
    desc: Python vars() dynamic API call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      regex: '^vars\(\)\.(system|popen|Popen|check_output)$'

composite_rules:
  - id: dynamic-import-access
    desc: Python dynamic import with attribute lookup
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
      - id: python-getattr-call
    near_lines: 5
    unless:
      - id: well-known/tool/detection/
      - id: well-known/tool/development/stoobly-agent/
      - id: well-known/tool/sysadmin/munin/
  - id: python-getattr-risky-callable
    desc: Python getattr resolves risky callable
    crit: notable
    conf: 0.86
    any:
      - id: python-getattr-eval-callable
      - id: python-getattr-import-callable
      - id: python-getattr-process-callable
  - id: python-sys-modules-api-dispatch
    desc: Python sys.modules dynamic API dispatch
    crit: notable
    conf: 0.9
    all:
      - id: python-sys-modules-member
      - id: python-sys-modules-api-call
