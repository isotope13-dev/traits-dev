defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1027.002
  mbc: F0004
traits:
  - id: peb-ldr-data
    desc: PEB_LDR_DATA structure access
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: PEB_LDR_DATA
  - id: in-memory-order
    desc: InMemoryOrderModuleList traversal
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: InMemoryOrderModuleList
  - id: in-load-order
    desc: InLoadOrderModuleList traversal
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: InLoadOrderModuleList
  - id: in-init-order
    desc: InInitializationOrderModuleList traversal
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: InInitializationOrderModuleList
  - id: peb-gs-access
    desc: PEB access via GS segment (x64)
    crit: baseline
    conf: 0.8
    if:
      type: hex
      section: .text
      pattern: 65 48 8b ?? 60
  - id: peb-fs-access
    desc: PEB access via FS segment (x86)
    crit: baseline
    conf: 0.8
    if:
      type: hex
      section: .text
      pattern: 64 a1 30 00 00 00
  - id: address-of-name-ordinals
    desc: AddressOfNameOrdinals export parsing
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: AddressOfNameOrdinals
    unless:
      - type: text
        word: ExportTable
    downgrade:
      any:
        - id: metadata/binary/symbols::ollydbg-plugin-export
        - id: metadata/binary/framework::dotnet-metadata
        - id: micro-behaviors/fs/file/section::pe-viewer-header-labels
  - id: li-fn-macro
    desc: LI_FN macro usage
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: LI_FN
  - id: li-module-macro
    desc: LI_MODULE macro usage
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: LI_MODULE
  - id: fnv1a-hash
    desc: FNV-1a hash algorithm
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (?i)fnv.?1a
  - id: djb2-hash
    desc: DJB2 hash algorithm
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (?i)djb2
  - id: get-proc-by-hash
    desc: Get procedure by hash function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)get.?proc.?by.?hash
  - id: resolve-by-hash
    desc: Resolve API by hash function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)resolve.?by.?hash
composite_rules:
  - id: peb-traversal
    desc: PEB module list traversal
    crit: notable
    conf: 0.85
    any:
      - id: in-memory-order
      - id: in-load-order
      - id: in-init-order
  - id: lazy-importer
    desc: Lazy importer library usage
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/os/api-resolution/lazy-importer::lazy-importer-usage
      - id: li-fn-macro
      - id: li-module-macro
