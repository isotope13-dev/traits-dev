# Windows x86 position-independent shellcode carries no import table: it finds
# kernel32 by walking the TEB/PEB loader module list, then locates each export
# by hashing the export-directory name strings and comparing against precomputed
# constants. The sibling windows.yaml matches those opcodes with `type: hex` in
# a PE's .text section. This file matches the same opcodes in their *escaped
# source* form ("\x64\xa1\x18..."), which is how shellcode generators emit a
# blob into a C/script file — a surface the .text-section rules cannot reach,
# since such a file has no sections, no imports, and no API name strings.
#
# The `["\n]*` separators tolerate the row break generators insert every N
# bytes, so an idiom split across two quoted rows still matches.
defaults:
  platforms: [windows]
  for: [c, cpp, python, powershell, ruby, php, javascript]
  attack: T1027.002
  mbc: F0004
traits:
  # 64 a1 18 00 00 00 = mov eax, fs:[0x18] -- the TEB self-reference (TEB.Self),
  # the canonical x86 entry point to a PEB walk. Six fixed bytes: it does not
  # collide by chance, even inside a large high-entropy escaped blob.
  - id: escaped-x86-teb-self-ref
    desc: Escaped x86 TEB self-ref (fs:[0x18]) PEB walk
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\x64["\n]*\\xa1["\n]*\\x18["\n]*\\x00["\n]*\\x00["\n]*\\x00'

  # imul reg, reg, 0x1f  ...  or reg, 0x20
  # Multiply-by-31 accumulator plus an OR 0x20 ASCII lowercase fold: the
  # case-insensitive export-name hash used to resolve APIs without naming them.
  - id: escaped-x86-api-name-hash-fold
    desc: Escaped x86 API-name hash loop (x31 fold)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\x6b\\x[cdef][0-9a-f]\\x1f[\s\S]{0,28}\\x83\\xc[89a-f]\\x20'
