# Go Privilege Escalation Capabilities
# Detects UAC bypass and privilege elevation attempts
# MBC: E1134 (Access Privileges)
# ATT&CK: T1548.002 (Bypass User Account Control)
defaults:
  mbc: "E1134"
  attack: "T1548.002"
  platforms: [windows]
traits:
  # go-escalate library
  - id: go-escalate-import
    desc: lu4p/go-escalate privilege escalation library
    crit: suspicious
    conf: 0.95
    for: [go]
    if:
      type: ast
      kind: import
      regex: "lu4p/go-escalate|go-escalate"
  - id: go-escalate-string
    desc: go-escalate library in binary
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: string
      regex: "lu4p/go-escalate|escalate\\.Elevate"
  # Elevation checks - atomic traits
  - id: is-elevated-call
    desc: IsElevated function call
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: ast
      kind: call
      exact: "IsElevated"
  - id: is-admin-call
    desc: isAdmin function call
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: ast
      kind: call
      exact: "isAdmin"
  - id: check-elevate-call
    desc: CheckElevate function call
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: ast
      kind: call
      exact: "CheckElevate"
  - id: is-elevated-string
    desc: IsElevated in binary
    crit: notable
    conf: 0.75
    for: [pe]
    if:
      type: string
      word: "IsElevated"
  - id: check-elevate-string
    desc: CheckElevate in binary
    crit: notable
    conf: 0.75
    for: [pe]
    if:
      type: string
      word: "CheckElevate"
  # Elevate function
  - id: elevate-call
    desc: Privilege elevation call
    crit: suspicious
    conf: 0.9
    for: [go]
    if:
      type: ast
      kind: call
      regex: "escalate\\.Elevate|Elevate\\("
  # UAC bypass patterns - atomic traits
  - id: uac-bypass-pattern
    desc: UAC bypass string pattern
    crit: suspicious
    conf: 0.9
    for: [go, pe]
    if:
      type: string
      regex: "UAC.{0,20}bypass|bypass.{0,20}UAC"
  - id: fodhelper-bypass
    desc: fodhelper UAC bypass
    crit: suspicious
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      word: "fodhelper"
  - id: eventvwr-bypass
    desc: eventvwr UAC bypass
    crit: notable
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      word: "eventvwr"
  - id: computerdefaults-bypass
    desc: computerdefaults UAC bypass
    crit: suspicious
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      word: "computerdefaults"
  # Linux privilege escalation
  - id: setuid-call
    # Note: runas detection is in micro-behaviors/os/privilege/escalation/traits.yaml
    # We reference it via composite rule instead of duplicating

    desc: setuid system call
    crit: notable
    conf: 0.8
    for: [go]
    platforms: [linux, unix]
    if:
      type: ast
      kind: call
      regex: "syscall\\.Setuid|unix\\.Setuid"
  - id: sudo-exec
    desc: sudo command execution
    crit: notable
    conf: 0.75
    for: [go, elf, macho]
    platforms: [linux, macos, unix]
    if:
      type: string
      regex: "exec.{0,20}sudo|sudo.{0,20}exec"
  - id: sudo-path
    desc: sudo binary path
    crit: notable
    conf: 0.7
    for: [go, elf, macho]
    platforms: [linux, macos, unix]
    if:
      type: string
      exact: "/usr/bin/sudo"
composite_rules:
  # Helper: Escalate library
  - id: escalate-library
    desc: Privilege escalation library
    crit: suspicious
    conf: 0.9
    any:
      - id: go-escalate-import
      - id: go-escalate-string
  # Helper: Elevation checks
  - id: is-elevated-check
    desc: Elevation check operations
    crit: notable
    conf: 0.8
    any:
      - id: is-elevated-call
      - id: is-admin-call
      - id: check-elevate-call
  # Helper: Escalation operations
  - id: escalate-operations
    desc: Escalation operations
    crit: notable
    conf: 0.85
    any:
      - id: is-elevated-check
      - id: elevate-call
  # Helper: UAC bypass indicators
  - id: uac-bypass-string
    desc: UAC bypass indicators combined
    crit: suspicious
    conf: 0.9
    any:
      - id: uac-bypass-pattern
      - id: fodhelper-bypass
      - id: eventvwr-bypass
  # Helper: UAC indicators (references runas from escalation/traits.yaml)
  - id: uac-indicators
    desc: UAC bypass indicators
    crit: suspicious
    conf: 0.9
    any:
      - id: uac-bypass-string
      - id: micro-behaviors/os/privilege/escalation::runas-verb
  - id: privilege-escalation
    desc: Privilege escalation attempt
    crit: suspicious
    conf: 0.9
    all:
      - id: escalate-library
      - id: escalate-operations
  - id: uac-bypass
    desc: UAC bypass technique
    crit: suspicious
    conf: 0.95
    all:
      - id: uac-indicators
      - id: escalate-operations
