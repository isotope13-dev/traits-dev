defaults:
  platforms: [macos]
  for: [macho, shell, applescript, python, javascript, swift, objc]
  crit: notable
  attack: T1548.004

traits:
  - id: applescript-admin-prompt
    desc: AppleScript requests administrator privileges
    conf: 0.94
    if:
      type: text
      substr: with administrator privileges
    unless:
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: metadata/lang/scripted::dts-declaration-file
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: well-known/app/gns3::gns3-gui-package-member
