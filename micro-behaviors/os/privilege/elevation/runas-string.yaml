defaults:
  platforms: [windows]
  for: [pe, dll, scripts]
traits:
  - id: runas-string
    desc: runas privilege elevation string
    crit: notable
    conf: 0.7
    if:
      type: text
      word: runas
      case_insensitive: true
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
  - id: runas-verb
    desc: PowerShell RunAs verb requests elevation
    crit: notable
    conf: 0.9
    for: [powershell, batch, javascript, typescript]
    if:
      type: text
      regex: '(?i)-Verb\s+RunAs\b'

composite_rules:
  - id: shell-execute-runas
    desc: ShellExecute requests runas elevation
    crit: notable
    conf: 0.92
    for: [pe, dll]
    all:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: runas-string
