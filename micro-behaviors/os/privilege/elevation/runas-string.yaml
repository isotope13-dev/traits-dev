defaults:
  platforms: [windows]
  for: [pe, dll, scripts]
traits:
  - id: runas-string
    desc: References the Windows runas elevation command
    crit: notable
    conf: 0.9
    if:
      type: text
      word: runas
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
  # ShellExecute "runas" verb is often a lone wide string adjacent to schtasks
  # args; keep an exact-token atom so PE loaders still match when word
  # boundaries are ambiguous across UTF-16 extractions.
  - id: runas-verb-token
    desc: Exact runas ShellExecute verb token
    crit: notable
    conf: 0.92
    for: [pe, dll]
    if:
      type: text
      exact: runas
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
  - id: runas-verb
    desc: PowerShell RunAs verb requests elevation
    crit: notable
    conf: 0.9
    for: [powershell, batch, javascript, typescript]
    if:
      type: text
      regex: '(?i)-Verb\s+RunAs\b'

composite_rules:
  - id: runas-elevation-token
    desc: Windows runas elevation token present
    crit: notable
    conf: 0.9
    any:
      - id: runas-string
      - id: runas-verb-token
  - id: shell-execute-runas
    desc: ShellExecute requests runas elevation
    crit: notable
    conf: 0.92
    for: [pe, dll]
    all:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: runas-elevation-token
