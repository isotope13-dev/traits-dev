# Python subprocess privilege elevation. Shelling out to `sudo`/`doas` from a
# list-form subprocess call is the Python analogue of a bare `sudo` in a shell
# script (see shell.yaml): a common, legitimate capability on its own — intent
# is inferred by composites (e.g. an elevated write to a sensitive system file).
# Kept separate from the shell matcher because the argv-list form
# (`subprocess.run(["sudo", ...])`) never matches shell command-line syntax.
defaults:
  platforms: [unix]
  for: [python]

traits:
  - id: python-sudo-subprocess-invoke
    desc: Invokes sudo/doas via Python subprocess
    crit: notable
    conf: 0.7
    ref: sha256:85b3ca874237ae61400c4fd379f7c6717529c1ca737b2377c678ecda532998c8
    if:
      type: text
      regex: 'subprocess\.\w+\(\s*\[\s*["''](sudo|doas)["'']'
  - id: python-sudo-argv-list
    desc: Builds sudo/doas argv list
    crit: notable
    conf: 0.74
    if:
      type: text
      regex: '=\s*\[\s*["''](sudo|doas)["'']\s*\]'
    unless:
      - id: micro-behaviors/os/service/legitimate::python-managed-user-service-context
      - id: micro-behaviors/os/service/legitimate::package-manager
