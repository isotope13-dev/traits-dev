# Neutral shell privilege-elevation command invocation. A bare `sudo`/`doas`
# call is a common, legitimate capability — intent is inferred by composites
# (e.g. sudo inside a PKGBUILD build() function, which runs in fakeroot and
# should never need real elevation).
defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: sudo-command-invoke
    desc: Invokes sudo or doas to elevate
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?m)(^|[\n;&|])\s*(sudo|doas)\s+\S'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: sudo-curl-privileged-path
    desc: sudo curl writes into privileged path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'sudo\s+curl\s+.{0,160}(-o|--output)\s+/(etc|usr|var)/'
  - id: sudo-wget-privileged-path
    desc: sudo wget writes into privileged path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'sudo\s+wget\s+.{0,160}(-O|--output-document)[ =]+/(etc|usr|var)/'
  - id: sudo-chmod-executable
    desc: sudo chmod grants executable permissions
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'sudo\s+chmod\s+(7[0-7]{2}|\+x)\s+'
    not:
      - substr: sudo chmod 777
