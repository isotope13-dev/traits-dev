defaults:
  for: [elf, macho, c, cpp]
  crit: baseline
  platforms: [unix]
traits:
  - id: getgid
    desc: Get group ID
    conf: 0.5
    if:
      type: symbol
      exact: getgid
  - id: getgid-text
    desc: Get group ID (text)
    conf: 0.5
    if:
      type: text
      regex: '\bgetgid\s*\('
  - id: getegid
    desc: Get effective group ID
    conf: 0.5
    if:
      type: symbol
      exact: getegid
  - id: getegid-text
    desc: Get effective group ID (text)
    conf: 0.5
    if:
      type: text
      regex: '\bgetegid\s*\('
  - id: geteuid
    desc: Get effective user ID
    conf: 0.5
    if:
      type: symbol
      exact: geteuid
  - id: geteuid-text
    desc: Get effective user ID (text)
    conf: 0.5
    if:
      type: text
      regex: '\bgeteuid\s*\('
  - id: getuid
    desc: Get user ID
    conf: 0.5
    if:
      type: symbol
      exact: getuid
  - id: getuid-text
    desc: Get user ID (text)
    conf: 0.5
    if:
      type: text
      regex: '\bgetuid\s*\('
