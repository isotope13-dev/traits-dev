defaults:
  for: [python]
  crit: baseline
  platforms: [unix, windows]
traits:
  - id: is-root-check
    desc: Check if process is root
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'os\.getuid\(\)\s*==\s*0'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
