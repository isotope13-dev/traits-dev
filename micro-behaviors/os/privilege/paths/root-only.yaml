defaults:
  for: [scripts, binaries, c, cpp, objc, elf, macho, java, class, kotlin]
  platforms:
  - unix
  crit: notable
  conf: 0.9
traits:
- id: etc-shadow
  desc: /etc/shadow password file access
  if:
    type: text
    substr: /etc/shadow
  unless:
  - type: text
    regex: DANGEROUS_PATTERNS
  - type: text
    regex: BLOCKED_TOOLS
  - id: metadata/file/catalog/identity::neovim-filetype-registry
- id: etc-shadow-bytecode
  desc: /etc/shadow password file access in bytecode
  for: [class, jar, zip]
  if:
    type: hex
    pattern: 2F 65 74 63 2F 73 68 61 64 6F 77
- id: etc-shadow-pyc
  desc: /etc/shadow access in Python bytecode
  for: [pyc]
  if:
    type: text
    substr: /etc/shadow
- id: proc-mem
  desc: /proc/*/mem memory access
  if:
    type: text
    regex: /proc/[^/]{1,20}/mem
  unless:
  - id: well-known/app/tabby::tabby-basename
  - type: text
    substr: /proc/self/
- id: dev-kmem
  desc: /dev/kmem kernel memory access
  if:
    type: text
    exact: /dev/kmem
- id: boot-vmlinuz
  desc: /boot/vmlinuz kernel image
  if:
    type: text
    substr: /boot/vmlinuz
- id: boot-initrd
  desc: /boot/initrd initial ramdisk
  if:
    type: text
    substr: /boot/initrd
- id: sys-kernel-debug
  desc: /sys/kernel/debug/ debugfs access
  if:
    type: text
    substr: /sys/kernel/debug/
- id: sys-kernel-security
  desc: /sys/kernel/security/ LSM access
  if:
    type: text
    substr: /sys/kernel/security/
composite_rules:
- id: root-access
  desc: Root-only path access
  conf: 1.0
  any:
  - id: etc-shadow
  - id: etc-shadow-bytecode
  - id: etc-shadow-pyc
  - id: proc-mem
  - id: dev-kmem
  - id: boot-vmlinuz
  - id: boot-initrd
  - id: sys-kernel-debug
  - id: sys-kernel-security
