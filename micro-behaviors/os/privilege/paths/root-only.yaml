defaults:
  for: [scripts, binaries, c, cpp, objc, elf, macho, java, class, kotlin]
  platforms:
  - unix
  crit: notable
  conf: 0.9
traits:
- id: etc-shadow-access-call-before
  desc: Access call preceding /etc/shadow path
  crit: component
  if:
    type: text
    regex: '(?i)(open|fopen|Path)\\([^\\n]{0,80}/etc/shadow'
  unless:
  - type: text
    regex: DANGEROUS_PATTERNS
  - type: text
    regex: BLOCKED_TOOLS
  - id: metadata/file/catalog/identity/
- id: etc-shadow-access-call-after
  desc: Access call following /etc/shadow path
  crit: component
  if:
    type: text
    regex: '(?i)/etc/shadow[^\\n]{0,80}(open|fopen|Path)'
  unless:
  - type: text
    regex: DANGEROUS_PATTERNS
  - type: text
    regex: BLOCKED_TOOLS
  - id: metadata/file/catalog/identity/
- id: etc-shadow-bytecode
  desc: /etc/shadow password file access in bytecode
  for: [class, jar, zip]
  if:
    type: hex
    pattern: 2F 65 74 63 2F 73 68 61 64 6F 77
- id: proc-mem
  desc: /proc/*/mem memory access
  if:
    type: text
    regex: /proc/[^/]{1,20}/mem
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/app/tabby::tabby-basename
  - type: text
    substr: /proc/self/
- id: dev-kmem
  desc: /dev/kmem kernel memory access
  if:
    type: text
    exact: /dev/kmem
- id: boot-vmlinuz
  desc: /boot/vmlinuz kernel image
  if:
    type: text
    substr: /boot/vmlinuz
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: metadata/document/html/
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: boot-initrd
  desc: /boot/initrd initial ramdisk
  if:
    type: text
    substr: /boot/initrd
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: sys-kernel-debug-path
  desc: References /sys/kernel/debug/ debugfs path
  if:
    type: text
    substr: /sys/kernel/debug/
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: sys-kernel-security
  desc: /sys/kernel/security/ LSM access
  if:
    type: text
    substr: /sys/kernel/security/
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
- id: etc-shadow
  desc: /etc/shadow password file access
  crit: notable
  conf: 0.98
  any:
  - id: etc-shadow-access-call-before
  - id: etc-shadow-access-call-after
- id: root-access
  desc: Root-only path access
  conf: 1.0
  any:
  - id: etc-shadow
  - id: etc-shadow-bytecode
  - id: proc-mem
  - id: dev-kmem
  - id: boot-vmlinuz
  - id: boot-initrd
  - id: sys-kernel-debug-path
  - id: sys-kernel-security
