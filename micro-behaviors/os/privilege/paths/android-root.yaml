# Android Root Detection via SU Manager Paths
# Detects code that checks for SuperSU/Superuser root manager presence
# Common in security-aware Android apps; also used by malware to detect rooted devices
# ATT&CK: T1422 (System Information Discovery — Android)
defaults:
  platforms: [android]
  for: [apk, binaries]
  crit: notable
  conf: 0.85
  attack: "T1422"

traits:
  - id: supersu-apk-path
    desc: Checks for SuperSU root manager APK
    if:
      type: text
      regex: "SuperSU\\.apk"

  - id: superuser-apk-path
    desc: Checks for Superuser root manager APK
    if:
      type: text
      regex: "Superuser\\.apk"

  - id: is-rooted-string
    desc: isRooted runtime root detection check
    conf: 0.8
    if:
      type: text
      regex: "is[_-]?[Rr]ooted"

  - id: root-detection-exception
    desc: Root detection exception handler
    conf: 0.8
    if:
      type: text
      substr: "attempting to detect whether the device is rooted"

composite_rules:
  - id: android-root-check
    desc: Android root manager presence check
    crit: suspicious
    conf: 0.88
    any:
      - id: supersu-apk-path
      - id: superuser-apk-path
      - id: is-rooted-string
      - id: root-detection-exception
    needs: 2
