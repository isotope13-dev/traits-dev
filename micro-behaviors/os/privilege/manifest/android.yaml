defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.86

traits:
  - id: device-admin-policy-resource
    desc: Android device admin policy
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "res/xml/adm_rit.xml"
      offset_range: [-262144, null]

  - id: read-external-storage
    desc: External storage read permission
    count_min: 1
    if:
      type: text
      substr: "android.permission.READ_EXTERNAL_STORAGE"

  - id: write-external-storage
    desc: External storage write permission
    attack: T1406
    count_min: 1
    if:
      type: text
      substr: "android.permission.WRITE_EXTERNAL_STORAGE"

  - id: write-external-storage-utf16
    desc: External storage write permission
    attack: T1406
    for: [data]
    if:
      type: text
      substr: "WRITE_EXTERNAL"

  - id: bind-device-admin
    desc: Device admin bind permission
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "android.permission.BIND_DEVICE_ADMIN"

  - id: bind-device-admin-utf16
    desc: Device admin bind permission
    crit: suspicious
    conf: 0.9
    for: [data]
    if:
      type: text
      substr: "BIND_DEVICE_AD"

  - id: kill-uid
    desc: Kill UID permission requested
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "android.permission.KILL_UID"

  - id: kill-uid-utf16
    desc: Kill UID permission requested
    crit: suspicious
    conf: 0.9
    for: [data]
    if:
      type: text
      substr: "KILL_UID"

  - id: manage-device-admins
    desc: Manage device admins permission
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "android.permission.MANAGE_DEVICE_ADMINS"

  - id: manage-device-admins-utf16
    desc: Manage device admins permission
    crit: suspicious
    conf: 0.9
    for: [data]
    if:
      type: text
      substr: "MANAGE_DEVICE"

  - id: system-alert-window
    desc: Android overlay window permission
    crit: suspicious
    conf: 0.9
    attack: T1411
    if:
      type: text
      exact: "android.permission.SYSTEM_ALERT_WINDOW"

  - id: set-wallpaper
    desc: Android wallpaper change permission
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: "android.permission.SET_WALLPAPER"

  - id: retrieve-window-content
    desc: Android window content permission
    crit: suspicious
    conf: 0.88
    attack: T1411
    if:
      type: text
      exact: "android.permission.RETRIEVE_WINDOW_CONTENT"

  - id: bind-notification-listener
    desc: Android notification listener permission
    crit: notable
    conf: 0.94
    attack: T1517
    if:
      type: text
      substr: "android.permission.BIND_NOTIFICATION_LISTENER_SERVICE"

  - id: notification-listener-service
    desc: Android notification listener service
    crit: notable
    conf: 0.93
    attack: T1517
    if:
      type: text
      substr: "Landroid/service/notification/NotificationListenerService;"

  - id: package-usage-stats
    desc: Android usage stats permission
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "android.permission.PACKAGE_USAGE_STATS"

  - id: query-all-packages
    desc: Android package query permission
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "android.permission.QUERY_ALL_PACKAGES"

  - id: get-installed-apps
    desc: Android installed apps permission
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "android.permission.GET_INSTALLED_APPS"

  - id: manage-external-storage
    desc: Android all files access permission
    crit: notable
    conf: 0.94
    attack: T1406
    if:
      type: text
      substr: "android.permission.MANAGE_EXTERNAL_STORAGE"

  - id: send-sms
    desc: Android SMS send permission
    conf: 0.9
    if:
      type: text
      substr: "android.permission.SEND_SMS"

  - id: receive-sms
    desc: Android SMS receive permission
    conf: 0.9
    if:
      type: text
      substr: "android.permission.RECEIVE_SMS"

  - id: read-sms
    desc: Android SMS read permission
    conf: 0.9
    if:
      type: text
      substr: "android.permission.READ_SMS"

  - id: read-phone-state
    desc: Android phone state permission
    conf: 0.88
    if:
      type: text
      substr: "android.permission.READ_PHONE_STATE"

  - id: read-phone-numbers
    desc: Android phone number permission
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "android.permission.READ_PHONE_NUMBERS"

  - id: ignore-battery-optimizations
    desc: Android battery optimization exemption
    crit: notable
    conf: 0.92
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    for: [apk, zip, xml]
    if:
      type: text
      substr: "android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"
