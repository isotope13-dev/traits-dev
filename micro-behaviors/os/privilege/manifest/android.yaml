defaults:
  platforms: [android]
  for: [apk]
  crit: notable
  conf: 0.86

traits:
  - id: read-external-storage
    desc: External storage read permission
    count_min: 1
    if:
      type: text
      exact: "android.permission.READ_EXTERNAL_STORAGE"

  - id: write-external-storage
    desc: External storage write permission
    attack: T1406
    count_min: 1
    if:
      type: text
      exact: "android.permission.WRITE_EXTERNAL_STORAGE"

  - id: bind-device-admin
    desc: Device admin bind permission
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "android.permission.BIND_DEVICE_ADMIN"

  - id: kill-uid
    desc: Kill UID permission requested
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "android.permission.KILL_UID"

  - id: manage-device-admins
    desc: Manage device admins permission
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "android.permission.MANAGE_DEVICE_ADMINS"
