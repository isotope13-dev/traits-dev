defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  conf: 0.8
traits:
  - id: highest-available
    desc: Manifest requests highest available privileges
    crit: notable
    if:
      type: string_value
      regex: <requestedExecutionLevel level=['"]highestAvailable
  - id: require-administrator
    desc: Manifest requires administrator privileges
    crit: notable
    if:
      type: string_value
      regex: <requestedExecutionLevel level=['"]requireAdministrator
  - id: auto-elevate
    desc: Auto-elevation manifest attribute
    crit: notable
    if:
      type: string_value
      regex: autoElevate.{0,20}true|<autoElevate>true
      case_insensitive: true
  - id: ui-access
    desc: UIAccess privilege in manifest
    crit: notable
    if:
      type: string_value
      regex: uiAccess=['"]true
composite_rules:
  - id: admin-manifest
    desc: Manifest requests admin privileges
    conf: 0.9
    any:
      - id: highest-available
      - id: require-administrator
