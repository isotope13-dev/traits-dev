defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  conf: 0.8
traits:
  - id: highest-available
    desc: Manifest requests highest available privileges
    crit: suspicious
    if:
      type: text
      regex: <requestedExecutionLevel level=['"]highestAvailable
      section: .rsrc
  - id: require-administrator
    desc: Manifest requires administrator privileges
    crit: notable
    if:
      type: text
      regex: <requestedExecutionLevel level=['"]requireAdministrator
      section: .rsrc
  - id: require-administrator-overlay
    desc: Overlay manifest requires administrator
    crit: notable
    conf: 0.88
    size_min: 1000000
    if:
      type: text
      regex: <requestedExecutionLevel level=['"]requireAdministrator
      offset_range: [1048576, null]
  - id: msi-embedded-require-administrator
    desc: MSI embedded manifest requires admin
    crit: suspicious
    conf: 0.9
    for: [oledoc, ole]
    if:
      type: raw
      regex: <requestedExecutionLevel level=['"]requireAdministrator
  - id: auto-elevate
    desc: Auto-elevation manifest attribute
    crit: suspicious
    if:
      type: text
      regex: autoElevate.{0,20}true|<autoElevate>true
      case_insensitive: true
      section: .rsrc
  - id: ui-access
    desc: UIAccess privilege in manifest
    crit: suspicious
    if:
      type: text
      regex: uiAccess=['"]true
      section: .rsrc
composite_rules:
  - id: admin-manifest
    desc: Manifest requests admin privileges
    conf: 0.9
    any:
      - id: highest-available
      - id: require-administrator
      - id: require-administrator-overlay
      - id: msi-embedded-require-administrator
