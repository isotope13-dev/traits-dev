defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: duplicate-token-any
    desc: Access token duplication API
    crit: notable
    conf: 0.84
    any:
      - id: duplicate-token-ex
      - id: duplicate-token-ex-source
  - id: duplicate-token-basic-any
    desc: Basic access token duplication API
    crit: notable
    conf: 0.8
    any:
      - id: duplicate-token
      - id: duplicate-token-source
  - id: token-duplication-api
    desc: Token duplication API
    crit: notable
    conf: 0.82
    any:
      - id: duplicate-token-any
      - id: duplicate-token-basic-any
  - id: token-secondary-access-api
    desc: Secondary token access API
    crit: notable
    conf: 0.82
    any:
      - id: open-thread-token-any
      - id: get-token-information-any
  - id: token-privilege-api-usage
    desc: Token privilege API usage detected
    crit: baseline
    conf: 0.9
    any:
      - id: open-process-token
      - id: open-thread-token
      - id: get-token-information
