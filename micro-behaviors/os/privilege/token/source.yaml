defaults:
  platforms:
    - windows
  for: [c, cpp]
traits:
  - id: duplicate-token-source
    desc: DuplicateToken API reference in Rust source
    crit: notable
    conf: 0.88
    for: [rust]
    if:
      type: text
      word: DuplicateToken
  - id: duplicate-token-ex-source
    desc: DuplicateTokenEx API reference in Rust source
    crit: notable
    conf: 0.9
    for: [rust]
    if:
      type: text
      word: DuplicateTokenEx
  - id: token-elevation-type
    desc: Token elevation type query in source
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: TokenElevationType
    unless:
      - type: text
        substr: START_TEST
      - type: text
        regex: \bok_\w+\s*[(]
      - type: text
        regex: \bwinetest\b
  - id: set-thread-token
    desc: SetThreadToken API reference
    crit: notable
    conf: 0.9
    attack: T1134.001
    for: [pe, dll, c, cpp]
    if:
      type: symbol
      exact: SetThreadToken
    unless:
      - id: metadata/lang/source::windows-dll-ordinal-lookup-source
      - type: text
        regex: "\\bok\\s*\\("
      - type: text
        substr: START_TEST
      - type: text
        regex: \bERR\("SetThreadToken
  - id: token-linked-token
    desc: TokenLinkedToken query in source
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: TokenLinkedToken
    unless:
      - type: text
        regex: "TokenLinkedToken[,\\s]"
composite_rules:
  - id: token-downgrade-source
    desc: Token privilege downgrade in source
    crit: notable
    conf: 0.9
    attack: T1134
    all:
      - id: token-elevation-type
      - id: set-thread-token
