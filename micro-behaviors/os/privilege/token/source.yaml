defaults:
  platforms:
    - windows
  for: [c, cpp]
traits:
  - id: token-elevation-type
    desc: Token elevation type query in source
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: TokenElevationType
    unless:
      - type: text
        substr: START_TEST
      - type: text
        regex: \bok_\w+\s*[(]
      - type: text
        regex: \bwinetest\b
  - id: set-thread-token
    desc: SetThreadToken call in source
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: SetThreadToken
    unless:
      - id: metadata/lang/source::windows-dll-ordinal-lookup-source
      - type: text
        regex: "\\bok\\s*\\("
      - type: text
        substr: START_TEST
  - id: token-linked-token
    desc: TokenLinkedToken query in source
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: TokenLinkedToken
composite_rules:
  - id: token-downgrade-source
    desc: Token privilege downgrade in source
    crit: suspicious
    conf: 0.9
    attack: T1134
    all:
      - id: token-elevation-type
      - id: set-thread-token
