defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  crit: notable
traits:
  - id: get-token-information
    desc: GetTokenInformation API
    conf: 0.8
    if:
      type: symbol
      exact: "GetTokenInformation"
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: open-process-token
    desc: Open process access token
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: OpenProcessToken
  - id: lookup-privilege-value
    desc: Lookup privilege name to LUID
    conf: 0.75
    if:
      type: symbol
      regex: ^LookupPrivilegeValue[AW]$
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: adjust-token-privileges
    desc: Enable/disable privileges in access token
    conf: 0.8
    if:
      type: symbol
      exact: AdjustTokenPrivileges
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: open-thread-token
    desc: Open thread access token
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: OpenThreadToken
