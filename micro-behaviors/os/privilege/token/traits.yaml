defaults:
  platforms: [windows]
  for: [pe, c, cpp]
  crit: notable
traits:
  - id: nsis7z-dll-basename
    desc: nsis7z plugin basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '(^|[!/])nsis7z\.dll$'
  - id: get-token-information
    desc: GetTokenInformation API
    conf: 0.8
    if:
      type: symbol
      exact: "GetTokenInformation"
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: open-process-token
    desc: Open process access token
    conf: 0.75
    if:
      type: symbol
      exact: OpenProcessToken
    unless:
      - type: exports_count
        min: 100
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: text
        substr: "Nullsoft Install System"
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: lookup-privilege-value
    desc: Lookup privilege name to LUID
    conf: 0.75
    if:
      type: symbol
      exact: LookupPrivilegeValueW
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: lookup-privilege-value-text
    desc: Lookup privilege LUID string
    conf: 0.72
    if:
      type: text
      exact: LookupPrivilegeValueW
    unless:
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: lookup-privilege-value-ansi
    desc: Lookup privilege name to LUID ANSI
    conf: 0.75
    if:
      type: symbol
      exact: LookupPrivilegeValueA
  - id: lookup-privilege-value-ansi-text
    desc: Lookup privilege LUID ANSI string
    conf: 0.72
    if:
      type: text
      exact: LookupPrivilegeValueA
  - id: se-backup-privilege-name
    desc: SeBackupPrivilege token name
    conf: 0.84
    if:
      type: text
      exact: SeBackupPrivilege
  - id: se-restore-privilege-name
    desc: SeRestorePrivilege token name
    conf: 0.84
    if:
      type: text
      exact: SeRestorePrivilege
  - id: adjust-token-privileges
    desc: Enable/disable privileges in access token
    conf: 0.8
    if:
      type: symbol
      exact: AdjustTokenPrivileges
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: adjust-token-privileges-text
    desc: Adjust token privileges string
    conf: 0.76
    if:
      type: text
      exact: AdjustTokenPrivileges
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: UAC.dll
  - id: open-thread-token
    desc: Open thread access token
    conf: 0.75
    if:
      type: symbol
      exact: OpenThreadToken
    unless:
      - id: metadata/signed/platform::microsoft-windows
composite_rules:
  - id: adjust-token-privileges-any
    desc: Token privilege adjustment API
    crit: notable
    conf: 0.8
    any:
      - id: adjust-token-privileges
      - id: adjust-token-privileges-text
  - id: lookup-privilege-value-any
    desc: Resolve privilege name to token LUID
    conf: 0.78
    any:
      - id: lookup-privilege-value
      - id: lookup-privilege-value-ansi
      - id: lookup-privilege-value-ansi-text
      - id: lookup-privilege-value-text
  - id: backup-restore-privilege-names
    desc: Backup and restore privilege names
    crit: notable
    conf: 0.88
    all:
      - id: se-backup-privilege-name
      - id: se-restore-privilege-name
  - id: process-token-privilege-setup
    desc: Open process token and resolve privilege
    crit: notable
    conf: 0.86
    all:
      - id: open-process-token
      - id: lookup-privilege-value-any
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: micro-behaviors/os/privilege/token::nsis7z-dll-basename
  - id: backup-restore-privilege-adjustment
    desc: Adjusts backup and restore token privileges
    crit: suspicious
    conf: 0.93
    all:
      - id: adjust-token-privileges-any
      - id: lookup-privilege-value-any
      - id: backup-restore-privilege-names
