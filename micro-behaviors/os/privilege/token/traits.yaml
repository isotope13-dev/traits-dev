defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  crit: notable
traits:
  - id: proxmox-root-api-token-provision
    desc: Proxmox provisions root API token
    crit: notable
    conf: 0.98
    for: [python]
    platforms: [linux]
    if:
      type: text
      regex: 'token_user\s*=\s*["'']root@pam["''][\s\S]{0,240}["'']pveum["''][\s\S]{0,160}["'']--privsep["'']'

  - id: get-token-information
    desc: GetTokenInformation API
    conf: 0.8
    if:
      type: symbol
      exact: "GetTokenInformation"
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/lib/windows-vault/
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: open-process-token
    desc: Open process access token
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: OpenProcessToken
  - id: duplicate-token
    desc: Duplicate a Windows access token
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: DuplicateToken
  - id: duplicate-token-ex
    desc: Duplicate a Windows token with extended options
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: DuplicateTokenEx
  - id: dynamic-process-token-impersonation
    desc: Runtime token impersonation API pair
    crit: notable
    conf: 0.97
    attack: T1134.001
    if:
      type: text
      regex: (?i)OpenProcessToken.{0,96}ImpersonateLoggedOnUser
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/signed/leaf::microsoft-corporation
  - id: lookup-privilege-value
    desc: Lookup privilege name to LUID
    conf: 0.75
    if:
      type: symbol
      regex: ^LookupPrivilegeValue[AW]$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: adjust-token-privileges
    desc: Enable/disable privileges in access token
    conf: 0.8
    if:
      type: symbol
      exact: AdjustTokenPrivileges
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: create-restricted-token
    desc: Create restricted access token
    crit: notable
    conf: 0.84
    if:
      type: text
      word: CreateRestrictedToken
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: high-risk-privilege-name
    desc: References high-risk Windows token privilege
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: Se(Debug|Tcb|AssignPrimaryToken|Impersonate)Privilege
    unless:
      - id: well-known/app/drivers::nvidia-windows-nvapi-context
  - id: logon-user
    desc: LogonUser credential token logon
    conf: 0.82
    if:
      type: text
      word: LogonUserW
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: rtl-adjust-privilege
    desc: Adjust privilege via ntdll
    crit: notable
    conf: 0.9
    attack: T1134.001
    if:
      type: symbol
      exact: RtlAdjustPrivilege
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/source/
      - id: metadata/lang/source/
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: shutdown-privilege-name
    desc: Shutdown privilege name string
    # A name string is only partial evidence of privilege use; the API
    # traits below provide the actual token-adjustment behavior.
    crit: component
    conf: 0.78
    attack: T1134.001
    if:
      type: text
      word: SeShutdownPrivilege
    unless:
      - id: well-known/tool/sysadmin/sysinternals/
      - id: well-known/tool/sysadmin/sysinternals/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/binary/framework/
  - id: backup-privilege-name
    desc: Backup privilege name string
    crit: notable
    conf: 0.82
    attack: T1134.001
    if:
      type: text
      exact: SeBackupPrivilege
  - id: restore-privilege-name
    desc: Restore privilege name string
    crit: notable
    conf: 0.82
    attack: T1134.001
    if:
      type: text
      exact: SeRestorePrivilege
  - id: open-thread-token
    desc: Open thread access token
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: OpenThreadToken
    unless:
      - id: well-known/lib/windows-vault/
  - id: set-token-information
    desc: Modify access-token attributes
    crit: notable
    conf: 0.86
    attack: T1134
    if:
      type: symbol
      exact: SetTokenInformation
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: get-token-information-source
    desc: GetTokenInformation API in Rust source
    for: [rust]
    conf: 0.88
    if:
      type: text
      word: GetTokenInformation
  - id: open-process-token-source
    desc: OpenProcessToken API in Rust source
    for: [rust]
    crit: baseline
    conf: 0.85
    if:
      type: text
      word: OpenProcessToken
  - id: lookup-privilege-value-source
    desc: LookupPrivilegeValue API in Rust source
    for: [rust]
    conf: 0.85
    if:
      type: text
      substr: LookupPrivilegeValue
  - id: adjust-token-privileges-source
    desc: AdjustTokenPrivileges API in Rust source
    for: [rust]
    conf: 0.88
    if:
      type: text
      word: AdjustTokenPrivileges
  - id: open-thread-token-source
    desc: OpenThreadToken API in Rust source
    for: [rust]
    crit: baseline
    conf: 0.85
    if:
      type: text
      word: OpenThreadToken

composite_rules:
  - id: get-token-information-any
    desc: GetTokenInformation API reference
    crit: notable
    conf: 0.84
    any:
      - id: get-token-information
      - id: get-token-information-source
  - id: open-process-token-any
    desc: Open process access token
    crit: notable
    conf: 0.8
    any:
      - id: open-process-token
      - id: open-process-token-source
  - id: lookup-privilege-value-any
    desc: Lookup privilege name to LUID
    crit: notable
    conf: 0.8
    any:
      - id: lookup-privilege-value
      - id: lookup-privilege-value-source
  - id: adjust-token-privileges-any
    desc: Enable or disable token privileges
    crit: notable
    conf: 0.82
    any:
      - id: adjust-token-privileges
      - id: adjust-token-privileges-source
  - id: open-thread-token-any
    desc: Open thread access token
    crit: baseline
    conf: 0.8
    any:
      - id: open-thread-token
      - id: open-thread-token-source
  - id: logon-privilege-api-cluster
    desc: Token logon and privilege API cluster
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: lookup-privilege-value
      - id: adjust-token-privileges
      - id: create-restricted-token
      - id: logon-user
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
