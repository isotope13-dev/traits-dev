defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  crit: notable
traits:
  - id: get-token-information
    desc: GetTokenInformation API
    conf: 0.8
    if:
      type: symbol
      exact: "GetTokenInformation"
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: well-known/lib/windows-vault::windows-vaultcli-component
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: open-process-token
    desc: Open process access token
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: OpenProcessToken
  - id: lookup-privilege-value
    desc: Lookup privilege name to LUID
    conf: 0.75
    if:
      type: symbol
      regex: ^LookupPrivilegeValue[AW]$
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/binary/metrics/threshold::many-exports-100
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: adjust-token-privileges
    desc: Enable/disable privileges in access token
    conf: 0.8
    if:
      type: symbol
      exact: AdjustTokenPrivileges
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/binary/metrics/threshold::many-exports-100
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: create-restricted-token
    desc: Create restricted access token
    conf: 0.84
    if:
      type: text
      exact: CreateRestrictedToken
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: logon-user
    desc: LogonUser credential token logon
    conf: 0.82
    if:
      type: text
      exact: LogonUserW
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: rtl-adjust-privilege
    desc: Adjust privilege via ntdll
    crit: suspicious
    conf: 0.9
    attack: T1134.001
    if:
      type: symbol
      exact: RtlAdjustPrivilege
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/lang/source::windows-compat-api-source
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: shutdown-privilege-name
    desc: Shutdown privilege name string
    crit: notable
    conf: 0.78
    attack: T1134.001
    if:
      type: text
      exact: SeShutdownPrivilege
    unless:
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-embedded-component
      - id: metadata/package/tooling::tool-identity-7zip
      - id: metadata/package/tooling::official-7zip-component
      - id: metadata/binary/framework::dotnet-assembly
  - id: open-thread-token
    desc: Open thread access token
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: OpenThreadToken
    unless:
      - id: well-known/lib/windows-vault::windows-vaultcli-component

composite_rules:
  - id: logon-privilege-api-cluster
    desc: Token logon and privilege API cluster
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: lookup-privilege-value
      - id: adjust-token-privileges
      - id: create-restricted-token
      - id: logon-user
    unless:
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
