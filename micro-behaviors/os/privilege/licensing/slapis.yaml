# Windows Software Licensing (SL) API references
# These are legitimate Windows APIs for product activation/licensing.
# In isolation they are notable capabilities; combined they indicate
# potential license theft or activation bypass (see objectives composite).
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.9

traits:
  - id: sl-install-proof-of-purchase
    desc: SLInstallProofOfPurchase API reference
    if:
      type: text
      word: SLInstallProofOfPurchase

  - id: sl-install-license
    desc: SLInstallLicense API reference
    if:
      type: text
      word: SLInstallLicense

  - id: sl-deposit-offline-id
    desc: SLDepositOfflineConfirmationId API reference
    if:
      type: text
      word: SLDepositOfflineConfirmationId

  - id: sl-activate-product
    desc: SLActivateProduct API reference
    if:
      type: text
      word: SLActivateProduct

  - id: sl-deposit-migration-blob
    desc: SLDepositMigrationBlob API reference
    if:
      type: text
      word: SLDepositMigrationBlob

  - id: sl-deposit-token-response
    desc: SLDepositTokenActivationResponse API reference
    if:
      type: text
      word: SLDepositTokenActivationResponse
