defaults:
  platforms: [windows]
  for: [pe, dll, go, c, cpp, csharp, rust, powershell]
  attack: T1033

traits:
  - id: trustedinstaller-sid-literal
    desc: TrustedInstaller well-known SID literal
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'S-1-5-80-956008885-3418522649-1831038044-1853292631-2271478464'
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc

  - id: localsystem-sid-literal
    desc: LocalSystem well-known SID literal
    crit: component
    conf: 0.85
    if:
      type: text
      word: "S-1-5-18"

composite_rules:
  - id: post-exploit-privilege-classifier
    desc: Post-exploitation privilege self-classifier
    crit: suspicious
    conf: 0.92
    all:
      - id: trustedinstaller-sid-literal
      - id: localsystem-sid-literal
    unless:
      - id: metadata/signed/platform::microsoft
