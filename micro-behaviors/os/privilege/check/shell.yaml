# Neutral shell root/privilege checks. Testing `$UID`/`$EUID`/`id -u` against 0
# is ubiquitous in installers, init scripts, and sudo-guards. Objective
# composites (e.g. disk wipers, privilege escalation) reference these
# cross-directory and supply the destructive/elevation context.
defaults:
  platforms: [unix, android, ios]
  for: [shell]
traits:
  - id: uid-var
    desc: Shell UID variable reference
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      regex: ^\$\{?[EU]?UID\}?$
  - id: uid-zero-compare
    desc: Shell UID/EUID compared to 0 (root check)
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: \$\{?E?UID\}?\s*(==|!=|-eq|-ne)\s*0
  - id: uid-check-content
    desc: Shell ${UID} == 0 root check
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '"\$\{UID\}"\s*==\s*0'
  - id: id-u-check
    desc: id -u equals zero check
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: \$\(id\s+-u\)\s*(==|!=|-eq|-ne)\s*0
composite_rules:
  - id: root-privilege-check
    desc: Shell checks whether it is running as root
    crit: notable
    conf: 0.85
    any:
      - id: uid-zero-compare
      - id: id-u-check
      - id: uid-check-content
