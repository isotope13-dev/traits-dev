defaults:
  platforms: [android]
  for: [apk, zip, java, kotlin]
  crit: component
  conf: 0.84

traits:
  - id: android-oppo-battery-settings-layout
    desc: Android OPPO battery settings prompt
    for: [apk, zip]
    if:
      type: text
      substr: "res/layout/oppobattery.xml"
      offset_range: [-262144, null]

  - id: android-battery-optimization-status
    desc: Android battery optimization status
    crit: notable
    conf: 0.9
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      word: isIgnoringBatteryOptimizations

  - id: android-request-ignore-battery-action
    desc: Android battery exemption request
    crit: notable
    conf: 0.92
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      word: ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS
