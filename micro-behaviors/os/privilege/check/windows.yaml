defaults:
  for:
    - pe
    - dll
    - rust
  attack: T1033
  platforms:
    - windows
traits:
  - id: is-user-an-admin
    desc: IsUserAnAdmin API call
    crit: notable
    conf: 0.75
    if:
      type: text
      word: IsUserAnAdmin
  - id: shell32-ordinal-680
    desc: Shell32 ordinal 680 (IsUserAnAdmin)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: shell32.dll:680
  - id: check-token-membership
    desc: Check token group membership
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: CheckTokenMembership
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: allocate-initialize-sid
    desc: Allocate and initialize SID
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: AllocateAndInitializeSid
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: is-elevated-property
    desc: Checks if current process is elevated
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: (?i)(IsElevated|isAdmin|RunAsAdmin|IsAdministrator)
    unless:
      - id: metadata/lang/compiler/managed::delphi
  - id: net-session-admin-check-raw
    desc: Checks Windows admin access with net session
    crit: notable
    conf: 0.88
    for: [data, pe, batch, powershell, javascript]
    if:
      type: text
      # `Rem net session` is a common commented-out admin check and is not
      # execution.  Anchor the capability to an executable batch/source line.
      regex: '(?im)^[ \t]*(?!rem\b|::|%)[^\r\n]{0,200}\bnet(\.exe)?\s+session\b'
  - id: net-session-admin-check-hex
    desc: Hex encoded net session
    crit: notable
    conf: 0.86
    for: [data, pe, batch, powershell, javascript]
    if:
      type: text
      substr: "6e65742073657373696f6e"
  - id: token-integrity-level
    desc: Token integrity level query
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: TokenIntegrityLevel
    unless:
      - id: metadata/lang/compiler/managed::delphi
composite_rules:
  - id: admin-sid-check
    desc: Admin group SID membership check
    crit: notable
    conf: 0.9
    all:
      - id: allocate-initialize-sid
      - id: check-token-membership
    unless:
      - id: metadata/signed/developer::broadcom-inc
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-code-signing-pca-2011
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
        - id: well-known/tool/sysadmin/sandboxie/
        - id: metadata/binary/installer/
        - id: micro-behaviors/fs/shell-ops::browse-for-folder
