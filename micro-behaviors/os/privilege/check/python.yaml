# Windows Admin Privilege Check - Python
# Detects Python code checking for admin/elevated privileges
# ATT&CK: T1033 (System Owner/User Discovery)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1033"
traits:
  - id: ctypes-is-admin
    desc: Admin check via ctypes IsUserAnAdmin
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "IsUserAnAdmin"
  - id: os-getuid-admin
    desc: Admin check via os.getuid() == 0
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "os.getuid() == 0"
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
