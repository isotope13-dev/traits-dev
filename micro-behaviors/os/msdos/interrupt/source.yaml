defaults:
  for:
    - c
  platforms:
    - unix
    - windows
traits:
  - id: int21-find-first
    desc: DOS find-first file call
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)(AH=4Eh|find first file|find first|mov\\s+ah,4E)
  - id: int21-find-next
    desc: DOS find-next file call
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)(AH=4Fh|find next file|find next|mov\\s+ah,4F)
  - id: int21-open-file
    desc: DOS open file call
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: (?i)(AH=3Dh|open file for read/write|mov\\s+ax,3D02)
  - id: int21-read-file
    desc: DOS read file call
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: (?i)(AH=3Fh|read file|mov\\s+ah,3F)
  - id: int21-write-file
    desc: DOS write file call
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: (?i)(AH=40h|write file|mov\\s+ah,40)
  - id: int21-close-file
    desc: DOS close file call
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: (?i)(AH=3Eh|close file|mov\\s+ah,3E)
  - id: int21-attributes
    desc: DOS file attribute control
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)(AH=43h|Get/Set file attributes|attribute byte in DTA)
  - id: int21-set-dta
    desc: DOS local DTA setup
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)(AH=1Ah|set local DTA|get address of curent DTA|restore DTA)
  - id: int21-date-check
    desc: DOS date query logic
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)(AH=2Ah|Get system date|compare date)
  - id: int24-hook
    desc: DOS critical error hook
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)(AH=25h|intercepte INT 24h|restore INT 24h|INT 24h handler)
  - id: int13-disk-sector-io
    desc: BIOS disk sector writes
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: (?i)(INT\s*13h|write one sector to disk|mov\s+ax,[23]01h)
