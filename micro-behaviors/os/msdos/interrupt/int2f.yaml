defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: int-2f-get-dos-seg
    desc: "Get DOS internal segment"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)(mov|xchg)\s+ax,\s*1203h(\s*;.{0,220})?\s*[\r\n]+\s*int\s+2fh
  - id: int-2f-get-sft
    desc: 'Get System File Table address'
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)(mov|xchg)\s+ax,\s*1216h(\s*;.{0,220})?\s*[\r\n]+\s*int\s+2fh
  - id: int-2f-get-jft
    desc: "Get Job File Table number"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)(mov|xchg)\s+ax,\s*1220h(\s*;.{0,220})?\s*[\r\n]+\s*int\s+2fh
