defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: ivt-segment-val
    desc: Loads interrupt vector table segment value (0024h)
    crit: notable
    if:
      type: text
      regex: (?i)mov\s+ax,24h
  - id: ivt-segment-reg
    desc: Sets ES register to accumulator value (ASM)
    crit: notable
    if:
      type: text
      regex: (?i)mov\s+es,ax
