defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: int-21h-inline-asm
    desc: Inline assembly call to DOS Interrupt 21h
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'asm\s+int'

    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker