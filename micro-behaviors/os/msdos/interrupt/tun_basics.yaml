defaults:
  platforms: [unix, windows, macos]
  for: [c, cpp, pe, elf, shell]
traits:
  - id: tunneler-keyword
    desc: Tunneling terminology in source
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: raw
      substr: tunneler
  - id: list-of-lists
    desc: DOS List of Lists via AH=52h
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: '(?i)mov\s+ah,52'
  - id: trap-flag-hide
    desc: Hides trap flag from pushf
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: raw
      substr: 'not 100'
  - id: mcb-boundary-var
    desc: DOS Memory Control Block variable
    crit: notable
    conf: 0.88
    if:
      type: raw
      substr: firstMCB
  - id: tunneled-int21-result
    desc: Stores tunneled INT 21h address
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: '(?i)(saved21_CS|tunnel_cs)'
  - id: x86-opcode-table
    desc: x86 opcode disassembly jump table
    crit: suspicious
    conf: 0.9
    size_min: 5000
    count_min: 20
    if:
      type: raw
      regex: '(?i)db\s+ModRM'
