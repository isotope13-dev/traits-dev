defaults:
  platforms: [unix, windows]
  for: [c, cpp, pe, elf, shell]
traits:
- id: tunneler-keyword
  desc: Tunneling terminology in source
  crit: notable
  conf: 0.85
  count_min: 2
  if:
    type: text
    substr: tunneler
- id: list-of-lists
  desc: DOS List of Lists via AH=52h
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(?i)mov\s+ah,52'
- id: trap-flag-hide
  desc: Hides trap flag from pushf
  crit: suspicious
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '(?i)\bnot\s+100h\b'
- id: mcb-boundary-var
  desc: DOS Memory Control Block variable
  crit: notable
  conf: 0.88
  if:
    type: text
    substr: firstMCB
- id: x86-opcode-table
  desc: x86 opcode disassembly jump table
  crit: suspicious
  conf: 0.9
  size_min: 5000
  count_min: 20
  if:
    type: text
    regex: '(?i)db\s+ModRM'
- id: tunneled-int21-result--saved21-cs
  desc: Stores tunneled INT 21h address (saved21_CS)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: saved21_CS
- id: tunneled-int21-result--tunnel-cs
  desc: Stores tunneled INT 21h address (tunnel_cs)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: tunnel_cs
composite_rules:
- id: tunneled-int21-result
  desc: Stores tunneled INT 21h address
  crit: suspicious
  conf: 0.92
  any:
  - id: tunneled-int21-result--saved21-cs
  - id: tunneled-int21-result--tunnel-cs
