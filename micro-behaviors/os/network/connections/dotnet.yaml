# .NET equivalents of the Win32 network-table enumeration APIs.
# `System.Net.NetworkInformation.IPGlobalProperties` exposes the same
# active-TCP / active-UDP listener data that `GetExtendedTcpTable` /
# `GetExtendedUdpTable` return on Windows. Code that walks these lists
# is doing local network discovery / port reconnaissance — used by
# legitimate monitoring tools AND by post-exploitation frameworks
# enumerating reachable services on the compromised host.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, csharp]
  crit: notable
  conf: 0.88
  attack: T1049
traits:
  - id: ip-global-properties-class
    desc: System.Net.NetworkInformation.IPGlobalProperties class usage
    if:
      type: text
      word: IPGlobalProperties

  - id: get-active-tcp-listeners
    desc: Enumerate active TCP listeners (port-scan / recon)
    if:
      type: text
      word: GetActiveTcpListeners

  - id: get-active-udp-listeners
    desc: Enumerate active UDP listeners
    if:
      type: text
      word: GetActiveUdpListeners

  - id: get-active-tcp-connections
    desc: Enumerate active TCP connections
    if:
      type: text
      word: GetActiveTcpConnections

  - id: import-network-information
    desc: Imports System.Net.NetworkInformation
    crit: component
    conf: 0.7
    if:
      type: import
      exact: System.Net.NetworkInformation

composite_rules:
  - id: dotnet-tcp-listener-enumeration
    desc: .NET local TCP listener enumeration
    crit: notable
    conf: 0.92
    all:
      - id: ip-global-properties-class
    any:
      - id: get-active-tcp-listeners
      - id: get-active-udp-listeners
      - id: get-active-tcp-connections
      - id: import-network-information
