# Network Connection Table Enumeration - Windows
# APIs for enumerating active TCP/UDP connections
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
  attack: T1049
traits:
  - id: get-tcp-table
    desc: Enumerate active TCP connections
    if:
      type: symbol
      exact: "GetTcpTable"
  - id: get-udp-table
    desc: Enumerate active UDP listeners
    if:
      type: symbol
      exact: "GetUdpTable"
  - id: get-tcp-table-ex
    desc: Enumerate TCP connections with process info
    if:
      type: symbol
      exact: "GetExtendedTcpTable"
  - id: get-udp-table-ex
    desc: Enumerate UDP listeners with process info
    if:
      type: symbol
      exact: "GetExtendedUdpTable"
