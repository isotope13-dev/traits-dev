# Network Connection Table Enumeration - Windows
# APIs for enumerating active TCP/UDP connections
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
traits:
  - id: set-tcp-entry
    desc: Modify active TCP connection table
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: SetTcpEntry
  - id: get-tcp-table
    desc: Enumerate active TCP connections
    attack: T1049
    if:
      type: symbol
      exact: "GetTcpTable"
  - id: get-udp-table
    desc: Enumerate active UDP listeners
    attack: T1049
    if:
      type: symbol
      exact: "GetUdpTable"
  - id: get-tcp-table-ex
    desc: Enumerate TCP connections with process info
    attack: T1049
    if:
      type: symbol
      exact: "GetExtendedTcpTable"
  - id: get-udp-table-ex
    desc: Enumerate UDP listeners with process info
    attack: T1049
    if:
      type: symbol
      exact: "GetExtendedUdpTable"
