defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: netstat
    desc: netstat command
    if:
      type: string_value
      substr: netstat
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: netstat-an
    desc: netstat -an command
    if:
      type: string_value
      substr: netstat -an
  - id: ss
    desc: ss socket statistics
    if:
      type: string_value
      regex: \bss\s+-[atnlup]
  - id: lsof-i
    desc: lsof network listing
    if:
      type: string_value
      substr: lsof -i
