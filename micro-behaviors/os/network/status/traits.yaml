defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: netstat
    desc: netstat command
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      substr: netstat
    unless:
      - id: metadata/file/extension/identity::markdown-file-basename
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: netstat-an
    desc: netstat -an command
    if:
      type: text
      substr: netstat -an
  - id: ss
    desc: ss socket statistics
    if:
      type: text
      regex: \bss\s+-[atnlup]
  - id: lsof-i
    desc: lsof network listing
    if:
      type: text
      substr: lsof -i
