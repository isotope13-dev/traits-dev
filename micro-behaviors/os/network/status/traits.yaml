defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ipconfig
    desc: Windows ipconfig command reference
    conf: 0.75
    if:
      type: text
      regex: '(?i)(^|[\s"'';&|])ipconfig(\.exe)?(?=[\s/-]|$)'
  - id: netstat
    desc: netstat command
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      regex: '(?i)(^|[\s"'';&|])netstat(\.exe)?(?=[\s/-]|$)'
    unless:
      - id: metadata/file/extension/identity::markdown-file-basename
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: netstat-an
    desc: netstat -an command
    if:
      type: text
      regex: '(?i)(^|[\s"'';&|])netstat(\.exe)?\s+-an\b'
  - id: ss
    desc: ss socket statistics
    if:
      type: text
      regex: \bss\s+-[atnlup]
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: lsof-i
    desc: lsof network listing
    if:
      type: text
      substr: lsof -i
