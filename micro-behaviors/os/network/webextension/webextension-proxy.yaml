# Browser-extension proxy configuration (chrome.proxy.settings). Generic
# technique: changing the network proxy configuration. Routing browser traffic
# through an attacker proxy is a real abuse, so notable.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-proxy-api
    desc: Chrome proxy API usage
    if:
      type: text
      regex: '(chrome|browser)\.proxy\.[A-Za-z_]'
  - id: chrome-proxy-settings-set
    desc: Chrome proxy settings modification
    if:
      type: text
      regex: '(chrome|browser)\.proxy\.settings\.set\s*\('
  - id: chrome-proxy-settings-clear
    desc: Chrome proxy settings cleared
    if:
      type: text
      regex: '(chrome|browser)\.proxy\.settings\.clear\s*\('
