defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: wnet-add-connection2-source
    desc: Network share authentication API
    crit: notable
    conf: 0.93
    if:
      type: raw
      word: "WNetAddConnection2"
  - id: net-user-enum-source
    desc: Remote user enumeration API
    crit: notable
    conf: 0.93
    if:
      type: raw
      word: "NetUserEnum"
  - id: net-schedule-job-add-source
    desc: Remote scheduled job API
    crit: notable
    conf: 0.95
    if:
      type: raw
      word: "NetScheduleJobAdd"
  - id: net-remote-tod-source
    desc: Remote time of day API
    crit: baseline
    conf: 0.85
    if:
      type: raw
      word: "NetRemoteTOD"
  - id: ipc-null-session-path
    desc: IPC$ null session path
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: 'ipc\\$'
