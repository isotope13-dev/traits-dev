defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: wnet-add-connection2-source
    desc: Network share authentication API
    crit: notable
    conf: 0.93
    if:
      type: raw
      word: "WNetAddConnection2"
  - id: net-user-enum-source
    desc: Remote user enumeration API
    crit: notable
    conf: 0.93
    if:
      type: raw
      word: "NetUserEnum"
  - id: net-schedule-job-add-source
    desc: Remote scheduled job API
    crit: notable
    conf: 0.95
    if:
      type: raw
      word: "NetScheduleJobAdd"
  - id: net-remote-tod-source
    desc: Remote time of day API
    crit: baseline
    conf: 0.85
    if:
      type: raw
      word: "NetRemoteTOD"
  - id: admin-share-drop-path
    desc: Admin share payload path
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: 'Admin\\$\\\\system32\\\\GT\\.exe'
  - id: legacy-system-drop-path
    desc: WinNT share payload path
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: 'c\\$\\\\winnt\\\\system32\\\\GT\\.exe'
  - id: ipc-null-session-path
    desc: IPC$ null session path
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: 'ipc\\$'
  - id: local-payload-stager
    desc: Local payload staging file
    crit: suspicious
    conf: 0.98
    if:
      type: string
      exact: "moo.dat"
composite_rules:
  - id: smb-share-propagation-primitives
    desc: SMB propagation API chain
    crit: suspicious
    conf: 0.96
    needs: 3
    any:
      - id: wnet-add-connection2-source
      - id: net-user-enum-source
      - id: net-schedule-job-add-source
      - id: admin-share-drop-path
      - id: legacy-system-drop-path
      - id: ipc-null-session-path
      - id: local-payload-stager
  - id: remote-drop-or-enum
    desc: Remote share drop or enumeration
    crit: suspicious
    conf: 0.96
    any:
      - id: admin-share-drop-path
      - id: legacy-system-drop-path
      - id: net-user-enum-source
      - id: ipc-null-session-path
