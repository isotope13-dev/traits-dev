defaults:
  platforms: [windows]
  for: [lua]
  attack: T1021.002

traits:
  - id: lua-admin-share-path
    desc: Lua admin share path
    crit: notable
    conf: 0.92
    if:
      type: literal
      regex: '^(\\\\\\\\|/)?ADMIN\$$'

  - id: lua-hex-net-view-command
    desc: Lua hex net view command
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      regex: '^6e65742076696577'

  - id: lua-hex-net-use-command
    desc: Lua hex net use command
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: 6e657420757365205c5c

  - id: lua-wmic-logicaldisk-command
    desc: Lua WMIC logicaldisk command
    crit: notable
    conf: 0.9
    if:
      type: literal
      substr: wmic logicaldisk get name
