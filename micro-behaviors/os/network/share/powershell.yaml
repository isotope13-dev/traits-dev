defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1021.002

traits:
  - id: ps-get-smbshare-cimsession
    desc: PowerShell remote SMB share query
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Get-SmbShare[\s\S]{0,120}New-CimSession'

  - id: ps-net-view-unc-host
    desc: PowerShell net view UNC host
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'net view "\\\\\$[A-Za-z_][A-Za-z0-9_]{0,40}"'

  - id: ps-admin-share-list
    desc: PowerShell admin share list
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"C\$"[\s\S]{0,80}"ADMIN\$"[\s\S]{0,80}"IPC\$"'

  - id: ps-admin-c-share-path
    desc: PowerShell C$ admin share path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\\\\\$[A-Za-z_][A-Za-z0-9_]{0,40}\\C\$'

  - id: ps-unc-path-test
    desc: PowerShell UNC path test
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'Test-Path\s+\$[A-Za-z_][A-Za-z0-9_]{0,40}'

  - id: ps-smb-tcpclient-probe
    desc: PowerShell SMB port probe
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'System\.Net\.Sockets\.TcpClient[\s\S]{0,180}ConnectAsync'

  - id: ps-cim-remote-session
    desc: PowerShell remote CIM session
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'New-CimSession\s+-ComputerName\s+\$?[A-Za-z_][A-Za-z0-9_]{0,40}'
