# Windows network share connection APIs (symbol-based)
# WNetAddConnection/WNetCancelConnection from mpr.dll
defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: wnet-add-connection
    desc: Network share connection API import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      substr: WNetAddConnection

  - id: wnet-cancel-connection
    desc: Network share disconnect API import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      substr: WNetCancelConnection

composite_rules:
  - id: wnet-share-connect-cycle
    desc: Network share connect and disconnect cycle
    crit: suspicious
    conf: 0.92
    all:
      - id: wnet-add-connection
      - id: wnet-cancel-connection
    downgrade:
      any:
        - id: metadata/lang/compiled::autoit-compiled-script
        - id: metadata/signed/platform::microsoft
        - id: micro-behaviors/communications/socket/share::pywin32-wnet-extension
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/signed/trust-level::signer-evidence-present
        - id: well-known/lib/wine::wine-runtime-component
