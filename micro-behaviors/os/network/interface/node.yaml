defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1016

traits:
  - id: node-network-interfaces-call
    desc: Node.js network interface enumeration call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: networkInterfaces
  - id: node-network-interfaces-reference
    desc: Node.js networkInterfaces reference
    crit: notable
    conf: 0.82
    if:
      type: string_literal
      word: networkInterfaces

  - id: ipv4-family-literal
    desc: Checks an IPv4 interface family
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: IPv4

  - id: internal-interface-filter
    desc: Filters internal network interfaces
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '!\s*.{0,24}\.internal\b'

  - id: returns-interface-address
    desc: Returns a network interface address
    crit: component
    conf: 0.86
    not:
      - regex: 'return\s+this\.address\s*[;,}]'
      - substr: Address.simpleGroup(
    unless:
      - type: text
        substr: _srv.address()
    if:
      type: text
      regex: 'return\s+[\w.$\[\]]{1,40}\.address\s*[;,}]'

composite_rules:
  - id: node-local-ip-selection
    desc: Selects a local IPv4 interface address
    crit: notable
    conf: 0.96
    all:
      - id: node-network-interfaces-call
      - id: ipv4-family-literal
      - id: internal-interface-filter
      - id: returns-interface-address
