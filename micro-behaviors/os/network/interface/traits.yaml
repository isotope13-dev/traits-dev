defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ifconfig
    desc: ifconfig command
    if:
      type: text
      substr: ifconfig
    unless:
      - id: metadata/file/text/format::roff-document
      - id: metadata/package/testing/harness/runtime::is-test
  - id: ip-addr
    desc: ip addr command
    crit: baseline
    if:
      type: text
      regex: (^|[^[:alnum:]])ip addr( show)?([^[:alnum:]]|$)
  - id: ip-link
    desc: ip link command
    if:
      type: text
      regex: \bip\s+link\s+(show|set|add|del)\b
  - id: powershell-get-netipaddress
    desc: PowerShell local IP discovery
    platforms: [windows]
    if:
      type: text
      substr: Get-NetIPAddress
  - id: ifconfig-a
    desc: ifconfig -a command
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: ifconfig -a
