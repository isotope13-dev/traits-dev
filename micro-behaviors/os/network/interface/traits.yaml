defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ifconfig
    desc: ifconfig command
    if:
      type: text
      substr: ifconfig
    unless:
      - id: metadata/file/text::roff-document
      - id: metadata/package/testing/harness::is-test
  - id: ip-addr
    desc: ip addr command
    crit: baseline
    if:
      type: text
      regex: (^|[^[:alnum:]])ip addr( show)?([^[:alnum:]]|$)
  - id: ip-a
    desc: ip a command
    platforms: [unix]
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      regex: \bip\s+a\b
  - id: ip-link
    desc: ip link command
    if:
      type: text
      regex: \bip\s+link\s+(show|set|add|del)\b
