# Network Interface Configuration
# Tools for listing and configuring network interfaces
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: ifconfig
    desc: ifconfig command
    if:
      type: string
      substr: ifconfig
  - id: ip-addr
    desc: ip addr command
    crit: baseline
    if:
      type: string
      regex: "(^|[^[:alnum:]])ip addr( show)?([^[:alnum:]]|$)"
  - id: ip-a
    desc: ip a command
    platforms: [linux, unix]
    for: [shell, python, javascript, elf]
    if:
      type: string
      regex: \bip\s+a\b
  - id: ip-link
    desc: ip link command
    if:
      type: string
      regex: '\bip\s+link\s+(show|set|add|del)\b'
