defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: python-local-ip-helper
    desc: Retrieves the host's local IP address
    for: [python, pe, dll]
    if:
      type: text
      regex: '\bget_local_ip\s*\('
  - id: ifconfig
    desc: ifconfig command
    if:
      type: text
      substr: ifconfig
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/file/format/
      - id: metadata/package/testing/harness/runtime/
  - id: ip-addr
    desc: ip addr command
    crit: notable
    if:
      type: text
      regex: (^|[^[:alnum:]])ip addr( show)?([^[:alnum:]]|$)
  - id: ip-link
    desc: Uses ip link for network interfaces
    if:
      type: text
      regex: \bip\s+link\s+(show|set|add|del)\b
  - id: ip-route-show
    desc: Queries routes with ip route
    platforms: [unix]
    for: [shell, elf]
    conf: 0.75
    attack: T1016
    if:
      type: text
      regex: (ip route show|ip route list|/sbin/ip route)
    unless:
      - type: text
        regex: ip route (show|list).{0,40}\|\s*(grep|sed|awk)\b
      - type: text
        regex: GET_STATE\[[0-9]\]="ip (addr|route) show dev \$IFACE
      - id: micro-behaviors/fs/path/binary::bin-busybox-path
  - id: powershell-get-netipaddress
    desc: PowerShell local IP discovery
    platforms: [windows]
    if:
      type: text
      substr: Get-NetIPAddress
  - id: ifconfig-a
    desc: ifconfig -a command
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: ifconfig -a
  - id: python-getsockname-local-ip
    desc: Extracts local IP via socket
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'getsockname\s*\(\s*\)\s*\[\s*0\s*\]'
