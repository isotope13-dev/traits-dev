defaults:
  for: [pe, dll, c, cpp]
  platforms: [windows]
  attack: "T1016"
traits:
- id: get-adapters-info
  desc: Enumerate local adapters via GetAdaptersInfo
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetAdaptersInfo"
- id: get-adapters-addresses
  desc: Enumerate local network adapter addresses
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetAdaptersAddresses"
- id: get-if-table
  desc: Enumerate network interfaces via GetIfTable
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetIfTable"
- id: get-if-table2
  desc: Enumerate interfaces via GetIfTable2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetIfTable2"
- id: get-if-entry2
  desc: Query interface row via GetIfEntry2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetIfEntry2"
- id: get-ip-interface-table
  desc: Enumerate IP interfaces table
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetIpInterfaceTable"
- id: get-ip-interface-entry
  desc: Query IP interface row
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetIpInterfaceEntry"
- id: get-ip-forward-table
  desc: Enumerate IP forward table
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetIpForwardTable"
- id: get-best-interface-ex
  desc: Resolve best outbound interface
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "GetBestInterfaceEx"
- id: net-domain-join-info
  desc: Query host domain join status
  crit: notable
  conf: 0.8
  if:
    type: symbol
    exact: "NetGetJoinInformation"
- id: wlan-open-handle
  desc: Open WLAN API client handle
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "WlanOpenHandle"
- id: wlan-enum-interfaces
  desc: Enumerate WLAN interfaces
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "WlanEnumInterfaces"
- id: wlan-get-available-network-list
  desc: Enumerate nearby WiFi networks
  crit: notable
  conf: 0.95
  if:
    type: symbol
    exact: "WlanGetAvailableNetworkList"
- id: wlan-get-profile-list
  desc: Enumerate saved WLAN profiles
  crit: notable
  conf: 0.95
  if:
    type: text
    exact: "WlanGetProfileList"
- id: wlan-get-profile
  desc: Read saved WLAN profile
  crit: notable
  conf: 0.95
  if:
    type: text
    exact: "WlanGetProfile"
- id: wlan-query-interface
  desc: Query WLAN interface details
  crit: notable
  conf: 0.95
  if:
    type: text
    exact: "WlanQueryInterface"
- id: wlan-api-library-reference
  desc: WLAN API library reference
  crit: notable
  conf: 0.92
  if:
    type: text
    exact: "wlanapi.dll"
- id: wlan-api-provider
  desc: WLAN API provider library
  crit: notable
  conf: 0.95
  if:
    type: path
    basename: true
    exact: "wlanapi.dll"
- id: bluetooth-find-first-radio
  desc: Enumerate local Bluetooth radios
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "BluetoothFindFirstRadio"
- id: bluetooth-find-first-device
  desc: Enumerate nearby Bluetooth devices
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "BluetoothFindFirstDevice"
composite_rules:
- id: route-and-adapter-discovery
  desc: Route table and adapter discovery
  crit: notable
  conf: 0.92
  all:
  - id: get-ip-forward-table
  - id: get-best-interface-ex
  any:
  - id: get-adapters-addresses
  - id: get-adapters-info
  - id: get-if-entry2
  - id: get-ip-interface-entry
- id: wlan-network-recon
  desc: WLAN adapter and network enumeration
  crit: notable
  conf: 0.9
  all:
  - id: wlan-open-handle
  - id: wlan-enum-interfaces
  - id: wlan-get-available-network-list
  downgrade:
    any:
    - id: wlan-api-provider
- id: wlan-profile-enumeration
  desc: WLAN profile enumeration capability
  crit: notable
  conf: 0.93
  all:
  - id: wlan-api-library-reference
  - id: wlan-get-profile-list
  any:
  - id: wlan-get-profile
  - id: wlan-query-interface
  - id: wlan-get-available-network-list
- id: wlan-bssid-profile-harvest
  desc: WLAN profile and BSSID collection
  crit: notable
  conf: 0.95
  all:
  - id: wlan-profile-enumeration
  - id: micro-behaviors/hardware/wireless/network::bssid
- id: bluetooth-device-recon
  desc: Bluetooth radio and device enumeration
  crit: notable
  conf: 0.85
  all:
  - id: bluetooth-find-first-radio
  - id: bluetooth-find-first-device
  downgrade:
    any:
    - id: well-known/lib/wine::wine-runtime-component
- id: generic-adapter-enumeration-surface
  desc: Generic adapter enumeration surface
  crit: component
  conf: 0.9
  needs: 3
  any:
  - id: get-adapters-info
  - id: get-adapters-addresses
  - id: get-if-table
  - id: get-if-table2
- id: host-network-fingerprint-surface
  desc: Multi-source host network fingerprinting
  crit: suspicious
  conf: 0.9
  needs: 3
  any:
  - id: get-adapters-info
  - id: get-adapters-addresses
  - id: get-if-table
  - id: get-if-table2
  - id: get-if-entry2
  - id: get-ip-interface-table
  - id: get-ip-interface-entry
  - id: get-ip-forward-table
  - id: get-best-interface-ex
  - id: net-domain-join-info
  - id: wlan-network-recon
  - id: bluetooth-device-recon
  downgrade:
    needs: 3
    any:
    - id: generic-adapter-enumeration-surface
    - id: well-known/app/fastfetch::fastfetch-windows-component
    - id: well-known/app/swifttunnel_vpn::swifttunnel
  unless:
  - id: well-known/app/swifttunnel_vpn::swifttunnel
  - id: well-known/app/fastfetch::fastfetch-windows-component
