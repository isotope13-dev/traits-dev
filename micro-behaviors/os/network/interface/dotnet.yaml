defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: dotnet-network-namespace
    desc: References System.Net.NetworkInformation namespace
    crit: notable
    if:
      type: text
      substr: System.Net.NetworkInformation
  - id: dotnet-get-all-interfaces
    desc: References GetAllNetworkInterfaces method
    crit: notable
    if:
      type: text
      word: GetAllNetworkInterfaces
  - id: dotnet-get-physical-address
    desc: References GetPhysicalAddress method
    crit: component
    if:
      type: text
      word: GetPhysicalAddress
composite_rules:
  - id: dotnet-network-interface-recon
    desc: Enumerates network interfaces for hardware addresses
    crit: notable
    all:
      - id: dotnet-network-namespace
      - id: dotnet-get-all-interfaces
      - id: dotnet-get-physical-address
