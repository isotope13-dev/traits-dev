defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: dotnet-network-namespace
    desc: "refs NetworkInformation namespace"
    crit: notable
    if:
      type: text
      substr: System.Net.NetworkInformation
  - id: dotnet-get-all-interfaces
    desc: References GetAllNetworkInterfaces method
    crit: notable
    if:
      type: text
      word: GetAllNetworkInterfaces
  - id: dotnet-get-physical-address
    desc: References GetPhysicalAddress method
    crit: component
    if:
      type: text
      word: GetPhysicalAddress
  # Reading a socket's own endpoint is ordinary server bookkeeping (reporting
  # the bound port) as often as it is host profiling, so alone it is only one
  # leg of the discovery idiom below.
  - id: dotnet-socket-local-endpoint
    desc: References Socket LocalEndPoint getter
    crit: component
    if:
      type: text
      word: get_LocalEndPoint
composite_rules:
  - id: dotnet-network-interface-recon
    desc: Enumerates network interfaces for hardware addresses
    crit: notable
    all:
      - id: dotnet-network-namespace
      - id: dotnet-get-all-interfaces
      - id: dotnet-get-physical-address

  # The "connect a UDP socket to an address you never actually talk to, then
  # read back LocalEndPoint" trick resolves which local interface would be used
  # for egress. Dual-use: malware reports the victim's LAN address with it, and
  # NAT-aware servers (FTP PASV, SIP, P2P) need it for the same reason. Neutral
  # capability -- intent comes from what the caller does with the address. The
  # broadcast literal stays inline because a bare 255.255.255.255 is far more
  # often a netmask constant than a connect target.
  - id: dotnet-local-ip-via-broadcast-connect
    desc: Learns local IP via broadcast-address connect
    crit: notable
    conf: 0.85
    all:
      - id: dotnet-socket-local-endpoint
      - id: micro-behaviors/communications/ip/literal::all-ones-ipv4-literal
