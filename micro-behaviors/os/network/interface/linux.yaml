defaults:
  for:
    - c
    - elf
    - shell
  platforms:
    - linux
  crit: baseline
  mbc: E1082
  attack: T1082
traits:
  - id: ip-addr-show
    desc: Linux ip lists interface addresses
    crit: notable
    conf: 0.8
    attack: T1016
    if:
      type: string_literal
      regex: (ip addr show|ip addr list|ip -4 addr)
    unless:
      - type: text
        regex: GET_STATE\[[0-9]\]="ip (addr|route) show dev \$IFACE

  - id: sys-class-net
    desc: /sys/class/net/ path
    conf: 0.5
    if:
      type: text
      substr: /sys/class/net/
