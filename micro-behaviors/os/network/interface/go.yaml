defaults:
  platforms: [windows, unix]
  for: [go]
  crit: notable
  conf: 0.75
  mbc: E1016
  attack: T1016
traits:
  - id: net-interfaces
    desc: Go network interface enumeration
    if:
      type: symbol
      kind: call
      exact: net.Interfaces
  - id: net-interfaceaddrs
    desc: Queries local network interface addresses in Go
    if:
      type: symbol
      kind: call
      exact: net.InterfaceAddrs
