defaults:
  platforms: [windows]
  for: [javascript, vbs, html, lnk, batch, powershell, python, pe]
traits:
  - id: create-shortcut
    desc: Creates a shortcut using WScript.Shell
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)(WScript\.Shell|\.lnk).{0,240}\.CreateShortcut\s*\(
    unless:
      - type: text
        substr: ShortcutService/CreateShortcut
      - type: text
        substr: ServiceClient.createShortcut(
      - type: text
        substr: "ServiceClient.createShortcut("
  - id: wscript-shell-object
    desc: Instantiates WScript.Shell object
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)WScript\.Shell
  - id: shortcut-target-path
    desc: Assigns a shortcut target path
    crit: component
    conf: 0.75
    if:
      type: text
      substr: .TargetPath
  - id: shortcut-arguments
    desc: Assigns shortcut launch arguments
    crit: component
    conf: 0.75
    if:
      type: text
      substr: .Arguments
  - id: shortcut-save
    desc: Saves a configured shortcut
    crit: component
    conf: 0.7
    if:
      type: text
      substr: .Save()
  - id: shortcut-save-symbol
    desc: Calls a shortcut object's Save method
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: symbol
      kind: call
      regex: 'Save$'
  # A shortcut configured to launch via `cmd /c start ...` — the weaponized-LNK
  # idiom where the payload runs hidden while a decoy file opens for the victim.
  - id: lnk-arguments-cmd-start
    desc: Shortcut arguments run cmd start launcher
    crit: suspicious
    conf: 0.88
    for: [javascript, vbs, html]
    if:
      type: text
      regex: '\.Arguments\s*=\s*["''][^"''\n]{0,40}/c\b[^"''\n]{0,80}\bstart\b'
