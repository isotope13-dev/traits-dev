defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: create-shortcut
    desc: Creates a shortcut (.lnk) using WScript.Shell
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?i)\.CreateShortcut\s*\(
    unless:
      - type: text
        substr: ShortcutService/CreateShortcut
  - id: wscript-shell-object
    desc: Instantiates WScript.Shell object
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: (?i)WScript\.Network
