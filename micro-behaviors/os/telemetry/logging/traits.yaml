defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: avast-burger-client-factory
    desc: Avast "Burger" telemetry library
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: BurgerClientFactory
  - id: avast-burger-client
    desc: Avast "Burger" telemetry library
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: BurgerClient
  - id: avast-analytics-endpoint
    desc: Avast analytics telemetry endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: analytics\.ff\.avast\.com
    unless:
      - type: text
        regex: analytics\.ff\.avast\.com
        section: .rsrc
  - id: telemetry-send
    desc: Generic telemetry/analytics send message
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: analytics\.send|telemetry\.send|track\.event
  - id: hardware-id-hwid
    desc: Hardware/Unique ID in telemetry context
    crit: notable
    conf: 0.6
    if:
      type: text
      exact: hwid
  - id: hardware-id-guid
    desc: Hardware/Unique ID in telemetry context
    crit: component
    conf: 0.6
    if:
      type: text
      exact: guid
  - id: hardware-id-local-app
    desc: Hardware/Unique ID in telemetry context
    crit: notable
    conf: 0.6
    if:
      type: text
      exact: localAppHWID
composite_rules:
  - id: avast-telemetry
    desc: Avast analytics telemetry detection
    crit: suspicious
    conf: 0.95
    any:
      - id: avast-burger-lib
      - id: avast-analytics-endpoint
  - id: general-telemetry
    desc: General telemetry or tracking capability
    crit: notable
    conf: 0.8
    all:
      - id: telemetry-send
      - id: hardware-id-context
  - id: avast-burger-lib
    desc: Avast "Burger" telemetry library
    crit: notable
    conf: 0.9
    any:
      - id: avast-burger-client-factory
      - id: avast-burger-client
  - id: hardware-id-context
    desc: Hardware/Unique ID in telemetry context
    crit: notable
    conf: 0.6
    any:
      - id: hardware-id-hwid
      - id: hardware-id-guid
      - id: hardware-id-local-app
