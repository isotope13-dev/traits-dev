# Browser-extension analytics event fields. These names are generic telemetry
# payload fields, not Google Apps Script-specific indicators.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.93

traits:
  - id: extension-track-event-marker
    desc: Extension TRACK_EVENT marker
    if:
      type: text
      word: TRACK_EVENT

  - id: extension-event-category-field
    desc: Extension analytics category field
    if:
      type: text
      word: eventCategory

  - id: extension-event-action-field
    desc: Extension analytics action field
    if:
      type: text
      word: eventAction

  - id: extension-event-label-field
    desc: Extension analytics label field
    if:
      type: text
      word: eventLabel

composite_rules:
  - id: extension-analytics-event-payload
    desc: Extension analytics event fields
    crit: notable
    any:
      - id: extension-track-event-marker
      - id: micro-behaviors/os/telemetry/logging/event::track-event-method
      - id: extension-event-category-field
      - id: extension-event-action-field
      - id: extension-event-label-field
