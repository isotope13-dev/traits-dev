defaults:
  platforms: [windows, unix]
  for: [macho, swift, objc, javascript, typescript]
  crit: notable

traits:
  - id: log-event-identifier
    desc: References a logEvent telemetry method
    conf: 0.82
    if:
      type: text
      word: logEvent
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: track-event-method
    desc: Calls the trackEvent telemetry method
    crit: notable
    conf: 0.93
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)trackEvent$'
