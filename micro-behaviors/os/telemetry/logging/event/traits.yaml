defaults:
  platforms: [windows, unix]
  for: [macho, swift, objc, javascript, typescript]
  crit: notable

traits:
  - id: log-event-identifier
    desc: References the logEvent telemetry method
    conf: 0.82
    if:
      type: text
      word: logEvent
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: track-event-method
    desc: Calls the trackEvent telemetry method
    crit: notable
    conf: 0.93
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)trackEvent$'
  - id: log-activity-endpoint
    desc: References a log-activity telemetry endpoint
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      substr: /log-activity
  - id: activity-event-identity-fields
    desc: Builds pseudonymous activity telemetry fields
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\buser_id\s*:[\s\S]{0,100}\bsession_id\s*:'

composite_rules:
  - id: pseudonymous-activity-telemetry-post
    desc: Posts pseudonymous activity telemetry
    crit: notable
    conf: 0.94
    near_lines: 40
    all:
      - id: log-activity-endpoint
      - id: activity-event-identity-fields
      - id: micro-behaviors/communications/http/request/client::fetch-post-pattern
