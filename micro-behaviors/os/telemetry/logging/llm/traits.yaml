defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  mbc: C0069

traits:
  - id: deepseek-request-log-label
    desc: DeepSeek outgoing request log label
    crit: component
    conf: 0.9
    if:
      type: text
      substr: OUTGOING DEEPSEEK REQUEST

  - id: deepseek-response-log-label
    desc: DeepSeek incoming response log label
    crit: component
    conf: 0.9
    if:
      type: text
      substr: INCOMING DEEPSEEK RESPONSE

  - id: console-log-json-stringify-call
    desc: Console logs JSON stringified payload
    crit: component
    conf: 0.86
    if:
      type: text
      regex: "console\\.log\\s*\\([^\\n]{0,120}JSON\\.stringify\\s*\\("

  - id: console-log-response-text-call
    desc: Console logs response text variable
    crit: component
    conf: 0.82
    if:
      type: text
      regex: "console\\.log\\s*\\([^\\n]{0,120}\\btext\\b"

composite_rules:
  - id: deepseek-request-console-logging
    desc: DeepSeek request payload console logging
    crit: notable
    conf: 0.92
    all:
      - id: deepseek-request-log-label
      - id: console-log-json-stringify-call

  - id: deepseek-response-console-logging
    desc: DeepSeek response payload console logging
    crit: notable
    conf: 0.92
    all:
      - id: deepseek-response-log-label
      - id: console-log-response-text-call

  - id: deepseek-payload-console-logging
    desc: DeepSeek API request and response console logging
    crit: notable
    conf: 0.94
    all:
      - id: deepseek-request-console-logging
      - id: deepseek-response-console-logging
