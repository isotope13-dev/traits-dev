defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: mcp-forensic-request-response-fields
    desc: MCP forensic request response fields
    crit: notable
    conf: 0.92
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      regex: '"forensic_request"[\s\S]{0,180}"forensic_response"[\s\S]{0,180}"replay_payload"'

  - id: audit-entry-event-function
    desc: Audit entry event function
    crit: notable
    conf: 0.86
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      substr: def audit_entry_to_event_dict

  - id: telemetry-body-formatter
    desc: Telemetry body formatter
    crit: notable
    conf: 0.86
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      substr: def format_telemetry_body

  - id: telemetry-sinks-config-field
    desc: Telemetry sinks config field
    crit: notable
    conf: 0.86
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      substr: telemetry_sinks

  - id: telemetry-url-config-lookup
    desc: Telemetry URL config lookup
    crit: notable
    conf: 0.84
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      substr: 'spec.get("url"'

  - id: telemetry-headers-config-lookup
    desc: Telemetry headers config lookup
    crit: notable
    conf: 0.84
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      substr: 'spec.get("headers"'

  - id: http-telemetry-sink-builder
    desc: HTTP telemetry sink builder
    crit: notable
    conf: 0.86
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      substr: make_http_telemetry_sink

  - id: urllib-request-telemetry-post
    desc: Urllib telemetry POST request
    crit: component
    conf: 0.88
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      regex: 'urllib\.request\.Request.{0,80}method="POST"'

  - id: syslog-telemetry-sink-builder
    desc: Syslog telemetry sink builder
    crit: notable
    conf: 0.86
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    if:
      type: text
      substr: _make_syslog_sink

composite_rules:
  - id: mcp-audit-entry-telemetry-wrapper
    desc: MCP audit event telemetry wrapper
    crit: notable
    conf: 0.92
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    all:
      - id: audit-entry-event-function
      - id: telemetry-body-formatter
      - id: micro-behaviors/data/serialize/json::json-dumps-call

  - id: mcp-forensic-event-telemetry
    desc: MCP forensic event telemetry
    crit: notable
    conf: 0.94
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    all:
      - id: mcp-forensic-request-response-fields
      - id: mcp-audit-entry-telemetry-wrapper

  - id: config-expanded-telemetry-sinks
    desc: Config expanded telemetry sinks
    crit: notable
    conf: 0.92
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    all:
      - id: telemetry-sinks-config-field
      - id: micro-behaviors/os/env/access::os-path-expandvars
      - id: telemetry-url-config-lookup
      - id: telemetry-headers-config-lookup

  - id: http-post-telemetry-sink
    desc: HTTP POST telemetry sink
    crit: notable
    conf: 0.92
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    near_lines: 80
    all:
      - id: http-telemetry-sink-builder
      - id: urllib-request-telemetry-post

  - id: syslog-udp-telemetry-sink
    desc: UDP syslog telemetry sink
    crit: notable
    conf: 0.9
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    all:
      - id: syslog-telemetry-sink-builder
      - id: micro-behaviors/communications/socket/udp::sock-dgram-python
      - id: micro-behaviors/communications/socket/send::python-sendto
