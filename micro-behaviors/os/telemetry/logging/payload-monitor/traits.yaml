# Payload monitoring and sandboxing indicators
defaults:
  platforms: [windows]
  for: [binaries]

traits:
  - id: payload-tag
    desc: Payload log tag
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "[PAYLOAD]"

  - id: payload-network-log
    desc: Payload networking log message
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\[PAYLOAD\] (WinHttp|connect|send|recv|InternetConnect)'

  - id: payload-process-log
    desc: Payload process log message
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\[PAYLOAD\] (CreateProcess|OpenProcess|WriteProcessMemory|CreateRemoteThread)'

  - id: payload-reg-log
    desc: Payload registry log message
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\[PAYLOAD\] (RegOpenKey|RegSetValue)'

  - id: stomp-tag
    desc: Module stomp log tag
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "[STOMP]"
