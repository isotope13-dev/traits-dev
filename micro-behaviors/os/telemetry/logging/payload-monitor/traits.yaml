# Payload monitoring and sandboxing indicators
defaults:
  platforms: [windows]
  for: [binaries]

traits:
- id: payload-tag
  desc: Payload log tag
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "[PAYLOAD]"

- id: payload-network-log--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\[PAYLOAD\] (WinHttp|connect)'

  count_max: 1010383
- id: payload-network-log--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\[PAYLOAD\] (send|recv)'

  count_max: 1010384
- id: payload-network-log--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\[PAYLOAD\] (InternetConnect)'

  count_max: 1010385
- id: payload-process-log
  desc: Payload process log message
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '\[PAYLOAD\] (CreateProcess|OpenProcess|WriteProcessMemory|CreateRemoteThread)'

- id: payload-reg-log
  desc: Payload registry log message
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\[PAYLOAD\] (RegOpenKey|RegSetValue)'

- id: stomp-tag
  desc: Module stomp log tag
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "[STOMP]"
composite_rules:
- id: payload-network-log
  desc: Payload networking log message
  crit: component
  conf: 0.95
  any:
  - id: payload-network-log--rx-1
  - id: payload-network-log--rx-2
  - id: payload-network-log--rx-3
