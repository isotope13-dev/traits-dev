defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.82

traits:
- id: response-status-field
  desc: Captures HTTP response status
  if:
    type: text
    regex: "['\"]status_code['\"][\\s\\S]{0,120}->getStatusCode\\s*\\("

- id: response-time-field
  desc: Captures request response time
  if:
    type: text
    regex: "['\"]response_time['\"][\\s\\S]{0,160}microtime\\s*\\("
