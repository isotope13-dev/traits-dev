defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.82

traits:
- id: full-url-field
  desc: Captures full request URL
  if:
    type: symbol
    exact: fullUrl

- id: client-ip-field
  desc: Captures request client IP
  if:
    type: text
    regex: "['\"]ip_address['\"][\\s\\S]{0,80}->ip\\s*\\("

- id: user-agent-field
  desc: Captures request User-Agent
  if:
    type: text
    regex: "['\"]user_agent['\"][\\s\\S]{0,120}->userAgent\\s*\\("

- id: referrer-field
  desc: Captures request referrer
  if:
    type: text
    regex: "['\"]referrer['\"][\\s\\S]{0,120}->header\\s*\\(\\s*['\"]referer['\"]"

composite_rules:
- id: laravel-http-request-telemetry
  desc: Laravel HTTP request telemetry logging
  crit: notable
  conf: 0.9
  any:
  - id: full-url-field
  - id: client-ip-field
  - id: user-agent-field
  - id: referrer-field
  - id: micro-behaviors/os/telemetry/http/user::authenticated-user-field
  - id: micro-behaviors/os/telemetry/http/response::response-status-field
  - id: micro-behaviors/os/telemetry/http/response::response-time-field
  needs: 4
