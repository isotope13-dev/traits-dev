# Java JMX MBean Repository Access Patterns
# Detects reflective access to JMX MBean repository for multi-context injection
# MBC: C0034 (OS integration)
defaults:
  platforms: [windows, unix]
  for: [python, java, class]

traits:
  - id: mbean-server-platform
    desc: JMX Platform MBeanServer access
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: ManagementFactory.getPlatformMBeanServer

  - id: jmx-repository
    desc: JMX MBean Repository access
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: com.sun.jmx.mbeanserver.Repository

  - id: named-object
    desc: JMX NamedObject reference
    crit: component
    conf: 0.8
    if:
      type: text
      substr: com.sun.jmx.mbeanserver.NamedObject

  - id: webapp-servlet-context
    desc: WebLogic WebAppServletContext reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: weblogic.servlet.internal.WebAppServletContext

composite_rules:
  - id: jmx-multi-context-injection
    desc: JMX MBean walk for multi-context injection
    crit: suspicious
    conf: 0.95
    all:
      - id: mbean-server-platform
      - id: jmx-repository
    any:
      - id: named-object
      - id: webapp-servlet-context
