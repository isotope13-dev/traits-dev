defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.86

traits:
  - id: appsflyer-sdk
    desc: AppsFlyer Android SDK bundled
    if:
      type: raw
      substr: "com.appsflyer:af-android-sdk"

  - id: appsflyer-event-endpoint
    desc: AppsFlyer event endpoint
    conf: 0.84
    if:
      type: raw
      substr: "/androidevent?app_id="

  - id: adjust-sdk-endpoint
    desc: Adjust Android endpoint
    if:
      type: raw
      substr: "https://app.adjust.com"

  - id: adjust-adid-manager
    desc: Adjust Adid manager reference
    conf: 0.88
    if:
      type: raw
      substr: "AdjustIdManager"

composite_rules:
  - id: android-attribution-tracking-sdks
    desc: Android attribution tracking SDKs
    crit: suspicious
    conf: 0.93
    all:
      - id: appsflyer-sdk
      - id: adjust-sdk-endpoint
    any:
      - id: appsflyer-event-endpoint
      - id: adjust-adid-manager
