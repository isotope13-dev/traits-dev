defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: global-keyboard-activity-listener
    desc: Registers global keyboard activity listener
    crit: baseline
    conf: 0.93
    if:
      type: text
      regex: '(document|window|globalThis)\.addEventListener\s*\(\s*["''](keydown|keyup)["'']'

  - id: global-pointer-activity-listener
    desc: Registers global pointer activity listener
    crit: baseline
    conf: 0.93
    if:
      type: text
      regex: '(document|window|globalThis)\.addEventListener\s*\(\s*["''](pointerdown|mousedown)["'']'

  - id: trusted-input-event-guard
    desc: Checks whether browser input is trusted
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '\.isTrusted\b'

  - id: activity-tracker-client-factory
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: ClientFactory
  - id: activity-tracker-analytics-library
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: AnalyticsLibrary
  - id: sentry-replay-session-recording
    desc: Sentry Replay sampling configured
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'replaysOnErrorSampleRate\s*:\s*1'
composite_rules:
  - id: trusted-keyboard-activity-listener
    desc: Registers trusted keyboard activity
    crit: notable
    conf: 0.93
    all:
      - id: trusted-input-event-guard
      - id: global-keyboard-activity-listener

  - id: trusted-pointer-activity-listener
    desc: Registers trusted pointer activity
    crit: notable
    conf: 0.93
    all:
      - id: trusted-input-event-guard
      - id: global-pointer-activity-listener

  - id: activity-tracker
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    any:
      - id: activity-tracker-client-factory
      - id: activity-tracker-analytics-library
