defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: activity-tracker-client-factory
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: ClientFactory
  - id: activity-tracker-analytics-library
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: AnalyticsLibrary
composite_rules:
  - id: activity-tracker
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    any:
      - id: activity-tracker-client-factory
      - id: activity-tracker-analytics-library
