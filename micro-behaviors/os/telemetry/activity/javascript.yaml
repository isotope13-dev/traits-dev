defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: activity-tracker-client-factory
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: ClientFactory
  - id: activity-tracker-analytics-library
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: AnalyticsLibrary
  - id: sentry-replay-session-recording
    desc: Sentry Replay sampling configured
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'replaysOnErrorSampleRate\s*:\s*1'
composite_rules:
  - id: activity-tracker
    desc: User activity tracking library reference
    crit: notable
    conf: 0.7
    any:
      - id: activity-tracker-client-factory
      - id: activity-tracker-analytics-library
