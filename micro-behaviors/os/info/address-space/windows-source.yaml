defaults:
  platforms: [windows]
  for: [text]
traits:
  - id: kernel-address-scan-comment
    desc: Scans memory to locate kernel base
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: "scans memory to find kernel address"
  - id: no-hardcoded-kernel-comment
    desc: Avoids hard-coded kernel addresses
    crit: notable
    conf: 0.92
    if:
      type: string
      substr: "do not use hard-coded kernel address values"
composite_rules:
  - id: kernel-address-discovery-source
    desc: Runtime kernel address discovery in source
    crit: suspicious
    conf: 0.97
    all:
      - id: kernel-address-scan-comment
    any:
      - id: no-hardcoded-kernel-comment
