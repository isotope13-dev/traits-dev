# Win32 System Information APIs
# System profiling capabilities used by RATs for beacon data
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: get-computer-name
    desc: Query computer/host name
    crit: notable
    conf: 0.9
    attack: "T1082"
    if:
      type: string_value
      regex: "^GetComputerName[AW]$"
  - id: get-user-name
    desc: Query current username
    crit: notable
    conf: 0.9
    attack: "T1033"
    if:
      type: symbol
      regex: "^GetUserName[AW]$"
  - id: get-version-ex
    desc: Query Windows version info
    crit: baseline
    conf: 0.9
    attack: "T1082"
    if:
      type: symbol
      regex: "^GetVersionEx[AW]$"
  - id: get-system-default-lang-id
    desc: Query system default language
    crit: baseline
    conf: 0.9
    attack: "T1082"
    if:
      type: string_value
      exact: "GetSystemDefaultLangID"
  - id: get-memory-status
    desc: Query system memory capacity
    crit: baseline
    conf: 0.9
    attack: "T1082"
    if:
      type: symbol
      exact: "GlobalMemoryStatusEx"
  - id: get-disk-space
    desc: Query disk free space
    crit: notable
    conf: 0.9
    attack: "T1082"
    if:
      type: string_value
      regex: "^GetDiskFreeSpace(Ex)?[AW]?$"
  - id: get-system-info
    desc: Query system hardware info (CPU cores)
    crit: baseline
    conf: 0.9
    attack: "T1082"
    if:
      type: symbol
      exact: "GetSystemInfo"
  - id: get-locale-info
    desc: Query locale information
    crit: baseline
    conf: 0.88
    attack: "T1082"
    if:
      type: string_value
      regex: "^GetLocaleInfo[AW]$"
  - id: get-user-default-lcid
    desc: Query user locale identifier
    crit: baseline
    conf: 0.85
    attack: "T1082"
    if:
      type: string_value
      exact: "GetUserDefaultLCID"
  - id: get-calendar-info
    desc: Query calendar regional settings
    crit: baseline
    conf: 0.82
    attack: "T1082"
    if:
      type: string_value
      regex: "^GetCalendarInfo[AW]$"
