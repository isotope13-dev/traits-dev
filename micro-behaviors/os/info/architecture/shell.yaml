# Shell Architecture Detection
# Detects architecture-specific string references in shell scripts
# Commonly seen in IoT botnet droppers that select architecture-specific payloads
defaults:
  platforms: [unix, windows, macos]
  for:
    - shell
  crit: component
traits:
  - id: arch-mips
    desc: "MIPS architecture string"
    if:
      type: string
      word: mips
  - id: arch-arm
    desc: "ARM architecture string"
    if:
      type: string
      regex: \barm[0-9]?\b
  - id: arch-aarch64
    desc: "AArch64 (ARM64) architecture string"
    if:
      type: string
      word: aarch64
  - id: arch-arm64
    desc: "arm64 architecture string"
    if:
      type: string
      word: arm64
  - id: arch-x86
    desc: "x86 architecture string"
    if:
      type: string
      word: x86
  - id: arch-sh4
    desc: "SH4 architecture string"
    if:
      type: string
      word: sh4
  - id: arch-ppc
    desc: "PPC architecture string"
    if:
      type: string
      word: ppc
  - id: arch-arc
    desc: "ARC architecture string"
    if:
      type: string
      word: arc
composite_rules:
  - id: multi-arch-target
    desc: "Script targets multiple CPU architectures (IoT botnet dropper pattern)"
    crit: suspicious
    conf: 0.85
    mbc: "Discovery"
    attack: "T1082"
    needs: 3
    any:
      - id: arch-mips
      - id: arch-arm
      - id: arch-aarch64
      - id: arch-arm64
      - id: arch-x86
      - id: arch-sh4
      - id: arch-ppc
      - id: arch-arc
