# APT Package Manager Configuration Traits
# Detects manipulation of APT keys and repositories
defaults:
  platforms: [unix, android, ios]
  for: [shell, elf]
traits:
  - id: microsoft-apt-source-reference
    desc: References a Microsoft APT repository
    crit: notable
    conf: 0.98
    for: [shell, javascript, typescript, dockerfile, github-actions]
    if:
      type: text
      substr: packages.microsoft.com/config/ubuntu

  - id: apt-package-install-command
    desc: Uses an APT package install command
    crit: notable
    conf: 0.98
    for: [shell, javascript, typescript, dockerfile, github-actions]
    if:
      type: text
      regex: '(?im)^[ \t]*(sudo[ \t]+)?apt(-get)?[ \t]+[^\n]{0,80}\binstall\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: google-chrome-apt-package-name
    desc: Names Chrome package in an APT command
    crit: notable
    conf: 0.98
    for: [shell, javascript, typescript, dockerfile, github-actions]
    if:
      type: text
      regex: '(?i)\bapt(-get)?\b[^\n]{0,50}\bgoogle-chrome-stable\b'

  - id: google-linux-signing-key-reference
    desc: References the Google Linux package signing key
    crit: notable
    conf: 0.98
    for: [shell, javascript, typescript, dockerfile, github-actions]
    if:
      type: text
      substr: dl-ssl.google.com/linux/linux_signing_key.pub

  - id: debian-frontend-noninteractive
    desc: Sets Debian package mode noninteractive
    crit: notable
    conf: 0.95
    for: [shell, dockerfile, github-actions]
    if:
      type: text
      substr: DEBIAN_FRONTEND=noninteractive
  - id: apt-key-add
    desc: Adds a trusted key via apt-key
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'apt-key\s+add'
    attack: "T1098"
  - id: apt-key-export
    desc: Exports a trusted key via apt-key
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'apt-key\s+export'
  - id: apt-sources-list-write
    desc: Writes to APT sources list
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '/etc/apt/sources\.list'
    unless:
      - type: text
        substr: /etc/apt/sources.list.d/svtplay-dl.list
    attack: "T1072"
  - id: gpg-import-pipe
    desc: Imports a GPG key from a pipeline
    crit: notable
    conf: 0.86
    for: [shell, rust]
    if:
      type: text
      regex: '\|\s*([a-z/]+/)?gpg\b\s+--import'
  - id: apt-key-add-pipe
    desc: Adds an APT key from a pipeline
    crit: notable
    conf: 0.86
    for: [shell, rust]
    if:
      type: text
      regex: '\|\s*(sudo\s+)?apt-key\s+add\s+-'
  - id: gpg-dearmor-pipe
    desc: Converts a GPG key to keyring
    crit: notable
    conf: 0.86
    for: [shell, rust]
    if:
      type: text
      regex: '\|\s*gpg\b\s+--dearmor\b'
  - id: tee-keyring-pipe
    desc: Writes piped key to APT keyrings
    crit: notable
    conf: 0.86
    for: [shell, rust]
    if:
      type: text
      regex: '\|\s*tee\b[^\n]{0,80}/etc/apt/keyrings/'

composite_rules:
  - id: google-chrome-apt-install
    desc: Installs the Google Chrome APT package
    crit: notable
    conf: 0.98
    all:
      - id: apt-package-install-command
      - id: google-chrome-apt-package-name
    near_lines: 4

  - id: browser-apt-provisioning-marker
    desc: Browser package provisioning references
    crit: notable
    conf: 0.98
    any:
      - id: microsoft-apt-source-reference
      - id: google-chrome-apt-install
      - id: google-linux-signing-key-reference
