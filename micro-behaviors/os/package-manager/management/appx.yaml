defaults:
  platforms: [windows]
  for: [pe, powershell, batch, vbs]

traits:
  - id: appx-package-removal-command
    desc: Removes an installed Windows AppX package
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: '\bget-appxpackage\b.{0,160}\bremove-appxpackage\b'
      case_insensitive: true
