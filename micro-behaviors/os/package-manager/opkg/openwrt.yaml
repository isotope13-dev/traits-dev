defaults:
  platforms: [openwrt]
  for: [javascript, typescript, shell, php, python]
  attack: T1098

traits:
  - id: openwrt-opkg-customfeeds-path
    desc: OpenWrt opkg custom feeds config path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/opkg/customfeeds.conf
  - id: openwrt-opkg-remote-feed-stanza
    desc: OpenWrt opkg remote feed stanza
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'src/gz\s+[^\\n]{1,80}https://'
