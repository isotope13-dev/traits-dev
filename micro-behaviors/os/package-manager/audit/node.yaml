defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, shell]

traits:
  - id: npm-audit-command
    desc: Invokes npm dependency vulnerability audit
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '["'']npm["''][^\r\n]{0,100}["'']audit["'']|\bnpm\s+audit\b'
