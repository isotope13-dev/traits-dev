defaults:
  platforms: [windows, unix]
  for: [github-actions]
  crit: notable
  conf: 0.85

# A CI workflow installing build/test prerequisites is a neutral package
# manager capability.  Objective rules may combine it with other evidence
# when package installation is part of an attack chain.
traits:
  - id: gha-apt-get-noninteractive-y
    desc: GitHub Actions apt-get noninteractive install
    if:
      type: text
      substr: apt-get install -y
  - id: gha-apt-install-noninteractive-y
    desc: GitHub Actions apt noninteractive install
    if:
      type: text
      substr: apt install -y
  - id: gha-yum-noninteractive
    desc: GitHub Actions yum noninteractive install
    if:
      type: text
      substr: yum install -y
  - id: gha-dnf-noninteractive
    desc: GitHub Actions dnf noninteractive install
    if:
      type: text
      substr: dnf install -y
