defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: build-npm-install
    desc: Build runs npm dependency installation
    crit: notable
    conf: 0.9
    platforms: [unix, windows]
    for: [dockerfile, github-actions]
    if:
      type: text
      regex: '\bnpm[ \t]+install\b'
  - id: python-pip-module-import
    desc: Python pip module import
    crit: component
    conf: 0.8
    platforms: [windows, unix]
    for: [python]
    if:
      type: text
      substr: import pip
  - id: gha-apt-get-install-cmd
    desc: GitHub Actions apt-get install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: apt-get install
  - id: gha-apt-install-cmd
    desc: GitHub Actions apt install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      regex: 'apt install\s+\S+'
  - id: gha-yum-install-cmd
    desc: GitHub Actions yum install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: yum install
  - id: gha-yum-install-y-cmd
    desc: GitHub Actions yum -y install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: yum -y install
  - id: gha-dnf-install-cmd
    desc: GitHub Actions dnf install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: dnf install
  - id: gha-dnf-install-y-cmd
    desc: GitHub Actions dnf -y install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: dnf -y install
  - id: apt-get-install-cmd
    desc: apt-get install command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: apt-get install
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
      - type: basename
        regex: '(?i)^(readme|metadata|pkg-info)(\.|$)'
      - id: metadata/file/extension/identity::markdown-file-basename
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - type: text
        substr: apt-get install svtplay-dl
      - id: gha-apt-get-install-cmd
  - id: apt-install-cmd
    desc: Installs a package with apt
    crit: notable
    conf: 0.75
    for: [shell]
    if:
      type: text
      regex: '(?im)^[ \t]*(sudo[ \t]+)?apt install\s+\S+'
    not:
      - substr: doover-pydoover
    unless:
      - type: basename
        regex: '(?i)^(readme|metadata|pkg-info)(\.|$)'
      - id: metadata/file/extension/identity::markdown-file-basename
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: gha-apt-install-cmd
  - id: yum-install-cmd
    desc: Installs a package with yum
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: yum install
    unless:
      - type: basename
        regex: '(?i)^(readme|metadata|pkg-info)(\.|$)'
      - id: gha-yum-install-cmd
  - id: yum-install-y-cmd
    desc: Installs a package non-interactively with yum
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: yum -y install
    unless:
      - type: basename
        regex: '(?i)^(readme|metadata|pkg-info)(\.|$)'
      - id: gha-yum-install-y-cmd
  - id: dnf-install-cmd
    desc: dnf install command
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?m)^(sudo )?dnf install|[;&|](sudo )?dnf install'
    unless:
      - type: basename
        regex: '(?i)^(readme|metadata|pkg-info)(\.|$)'
      - id: gha-dnf-install-cmd
  - id: dnf-install-y-cmd
    desc: dnf -y install command
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?m)^(sudo )?dnf -y install|[;&|](sudo )?dnf -y install'
    unless:
      - type: basename
        regex: '(?i)^(readme|metadata|pkg-info)(\.|$)'
      - id: gha-dnf-install-y-cmd
  - id: which-apt-get
    desc: checking for apt-get availability
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: which apt-get
  - id: which-yum
    desc: checking for yum availability
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: which yum
  - id: which-dnf
    desc: checking for dnf availability
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: which dnf
  - id: package-manager-which-conditional
    desc: which package manager conditional
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: which\s+(apt-get|yum|dnf).{0,50}&&
  - id: package-manager-if-conditional
    desc: if which package manager conditional
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: if.{0,50}which\s+(apt-get|yum|dnf)
  - id: bsd-package-command-set
    desc: BSD package manager command set
    crit: notable
    conf: 0.85
    platforms: [unix]
    for: [shell, python, javascript, typescript, kotlin]
    if:
      type: text
      regex: 'pkg_add[\s\S]{0,180}pkg_delete[\s\S]{0,180}pkg_info'
composite_rules:
  - id: apt-get-install
    desc: apt-get package installation command
    crit: notable
    conf: 0.75
    any:
      - id: apt-get-install-cmd
      - id: apt-install-cmd
  - id: yum-install
    desc: yum package installation command
    crit: notable
    conf: 0.75
    any:
      - id: yum-install-cmd
      - id: yum-install-y-cmd
  - id: dnf-install
    desc: dnf package installation command
    crit: notable
    conf: 0.75
    any:
      - id: dnf-install-cmd
      - id: dnf-install-y-cmd
  - id: which-package-check
    desc: checking for package manager availability
    crit: baseline
    conf: 0.6
    any:
      - id: which-apt-get
      - id: which-yum
      - id: which-dnf
  - id: package-manager-conditional
    desc: conditional package manager execution multi-distro
    crit: notable
    conf: 0.7
    any:
      - id: package-manager-which-conditional
      - id: package-manager-if-conditional
