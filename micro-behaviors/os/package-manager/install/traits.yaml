defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
  for:
    - elf
    - shell
traits:
  - id: apt-get-install-cmd
    desc: apt-get install command
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: apt-get install
    attack: T1190
  - id: apt-install-cmd
    desc: apt install command
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: apt install
    attack: T1190
  - id: yum-install-cmd
    desc: yum install command
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: yum install
    attack: T1190
  - id: yum-install-y-cmd
    desc: yum -y install command
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: yum -y install
    attack: T1190
  - id: dnf-install-cmd
    desc: dnf install command
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: dnf install
    attack: T1190
  - id: dnf-install-y-cmd
    desc: dnf -y install command
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: dnf -y install
    attack: T1190
  - id: which-apt-get
    desc: checking for apt-get availability
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: which apt-get
  - id: which-yum
    desc: checking for yum availability
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: which yum
  - id: which-dnf
    desc: checking for dnf availability
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: which dnf
  - id: package-manager-which-conditional
    desc: which package manager conditional
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: which\s+(apt-get|yum|dnf).{0,50}&&
  - id: package-manager-if-conditional
    desc: if which package manager conditional
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: if.{0,50}which\s+(apt-get|yum|dnf)
composite_rules:
  - id: apt-get-install
    desc: apt-get package installation command
    crit: notable
    conf: 0.75
    attack: T1190
    any:
      - id: apt-get-install-cmd
      - id: apt-install-cmd
  - id: yum-install
    desc: yum package installation command
    crit: notable
    conf: 0.75
    attack: T1190
    any:
      - id: yum-install-cmd
      - id: yum-install-y-cmd
  - id: dnf-install
    desc: dnf package installation command
    crit: notable
    conf: 0.75
    attack: T1190
    any:
      - id: dnf-install-cmd
      - id: dnf-install-y-cmd
  - id: which-package-check
    desc: checking for package manager availability
    crit: baseline
    conf: 0.6
    any:
      - id: which-apt-get
      - id: which-yum
      - id: which-dnf
  - id: package-manager-conditional
    desc: conditional package manager execution multi-distro
    crit: notable
    conf: 0.7
    any:
      - id: package-manager-which-conditional
      - id: package-manager-if-conditional
