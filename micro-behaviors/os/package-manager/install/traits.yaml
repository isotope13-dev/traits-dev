defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: python-pip-module-import
    desc: Python pip module import
    crit: component
    conf: 0.8
    platforms: [windows, unix]
    for: [python]
    if:
      type: text
      substr: import pip
  - id: gha-apt-get-install-cmd
    desc: GitHub Actions apt-get install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: apt-get install
  - id: gha-apt-install-cmd
    desc: GitHub Actions apt install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      regex: 'apt install\s+\S+'
  - id: gha-yum-install-cmd
    desc: GitHub Actions yum install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: yum install
  - id: gha-yum-install-y-cmd
    desc: GitHub Actions yum -y install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: yum -y install
  - id: gha-dnf-install-cmd
    desc: GitHub Actions dnf install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: dnf install
  - id: gha-dnf-install-y-cmd
    desc: GitHub Actions dnf -y install
    crit: baseline
    conf: 0.75
    for: [github-actions]
    if:
      type: text
      substr: dnf -y install
  - id: apt-get-install-cmd
    desc: apt-get install command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: apt-get install
    unless:
      - type: basename
        regex: '(?i)^readme(\.|$)'
      - type: basename
        regex: '(?i)\.(md|markdown)(##|$)'
      - type: text
        substr: "Description-Content-Type: text/markdown"
      - type: text
        substr: apt-get install svtplay-dl
      - id: gha-apt-get-install-cmd
  - id: apt-install-cmd
    desc: apt install command
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'apt install\s+\S+'
    not:
      - substr: doover-pydoover
    unless:
      - type: basename
        regex: '(?i)^readme(\.|$)'
      - type: basename
        regex: '(?i)\.(md|markdown)(##|$)'
      - type: text
        substr: "Description-Content-Type: text/markdown"
      - id: gha-apt-install-cmd
  - id: yum-install-cmd
    desc: yum install command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: yum install
    unless:
      - type: basename
        regex: '(?i)^readme(\.|$)'
      - id: gha-yum-install-cmd
  - id: yum-install-y-cmd
    desc: yum -y install command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: yum -y install
    unless:
      - type: basename
        regex: '(?i)^readme(\.|$)'
      - id: gha-yum-install-y-cmd
  - id: dnf-install-cmd
    desc: dnf install command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: dnf install
    unless:
      - type: basename
        regex: '(?i)^readme(\.|$)'
      - id: gha-dnf-install-cmd
  - id: dnf-install-y-cmd
    desc: dnf -y install command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: dnf -y install
    unless:
      - type: basename
        regex: '(?i)^readme(\.|$)'
      - id: gha-dnf-install-y-cmd
  - id: which-apt-get
    desc: checking for apt-get availability
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: which apt-get
  - id: which-yum
    desc: checking for yum availability
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: which yum
  - id: which-dnf
    desc: checking for dnf availability
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: which dnf
  - id: package-manager-which-conditional
    desc: which package manager conditional
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: which\s+(apt-get|yum|dnf).{0,50}&&
  - id: package-manager-if-conditional
    desc: if which package manager conditional
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: if.{0,50}which\s+(apt-get|yum|dnf)
composite_rules:
  - id: apt-get-install
    desc: apt-get package installation command
    crit: notable
    conf: 0.75
    any:
      - id: apt-get-install-cmd
      - id: apt-install-cmd
  - id: yum-install
    desc: yum package installation command
    crit: notable
    conf: 0.75
    any:
      - id: yum-install-cmd
      - id: yum-install-y-cmd
  - id: dnf-install
    desc: dnf package installation command
    crit: notable
    conf: 0.75
    any:
      - id: dnf-install-cmd
      - id: dnf-install-y-cmd
  - id: which-package-check
    desc: checking for package manager availability
    crit: baseline
    conf: 0.6
    any:
      - id: which-apt-get
      - id: which-yum
      - id: which-dnf
  - id: package-manager-conditional
    desc: conditional package manager execution multi-distro
    crit: notable
    conf: 0.7
    any:
      - id: package-manager-which-conditional
      - id: package-manager-if-conditional
