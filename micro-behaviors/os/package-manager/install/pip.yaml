defaults:
  platforms: [windows, unix]
  for:
    - python
    - shell
  mbc: C0002
traits:
  - id: pip-install
    desc: pip install command
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      regex: \bpip\b.{0,50}\binstall\b
    not:
      - substr: Run `pip install
      - substr: run `pip install
      - substr: "`pip install"
      - substr: "pip install --upgrade"
  - id: pip-install-y
    desc: pip install -y (non-interactive)
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: \bpip\b.{0,20}\binstall\b.{0,20}-y
  - id: pip-main-install
    desc: Direct pip.main(['install', ...]) call
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: string_literal
      regex: pip\.main\(\[.{0,50}install
  - id: ensurepip-bootstrap
    desc: pip bootstrapping via ensurepip
    crit: baseline
    conf: 0.8
    for:
      - python
    if:
      type: string_literal
      substr: ensurepip
  - id: requirements-check-call
    desc: Calls requirements-check helper
    crit: component
    conf: 0.7
    for: [python]
    if:
      type: symbol
      exact: check_requirements
composite_rules:
  - id: pip-installation
    desc: Python package installation via pip
    crit: notable
    conf: 0.8
    any:
      - id: pip-install
      - id: pip-main-install
      - id: ensurepip-bootstrap
