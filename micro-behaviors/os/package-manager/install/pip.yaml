defaults:
  platforms: [windows, unix]
  for:
    - python
    - shell
  mbc: C0002
traits:
  - id: pip-install
    desc: pip install command
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      regex: \bpip\b.{0,50}\binstall\b
    not:
      - substr: Run `pip install
      - substr: run `pip install
      - substr: "`pip install"
      - substr: "pip install --upgrade"
  - id: pip-install-remote-url
    desc: Remote pip install URL reference
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: '\bpip3?\s+install\s+https?://'
  - id: pip-install-y
    desc: pip install -y (non-interactive)
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: \bpip\b.{0,20}\binstall\b.{0,20}\s-(y|yes)(\s|$)
  - id: subprocess-pip-install-list
    desc: Subprocess argument list invokes pip install
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'subprocess\.[a-z_]+\(\s*\[[^\]]{0,360}\bpip\b[^\]]{0,160}\binstall\b'
  - id: python-pip-module-command
    desc: Python command launches pip module
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: string_literal
      regex: '\bpython(3(\.\d+)?)?\s+-m\s+pip3?\b'
  - id: pip-main-install
    desc: Direct pip.main(['install', ...]) call
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: string_literal
      regex: pip\.main\(\[.{0,50}install
  - id: ensurepip-bootstrap
    desc: pip bootstrapping via ensurepip
    crit: baseline
    conf: 0.8
    for:
      - python
    if:
      type: string_literal
      substr: ensurepip
  - id: requirements-check-call
    desc: Calls requirements-check helper
    crit: component
    conf: 0.7
    for: [python]
    if:
      type: symbol
      exact: check_requirements
  - id: python-legacy-dependency-link-url
    desc: Python legacy dependency link URL
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: 'dependency_links\s*=\s*\[[\s\S]{0,600}https?://.{1,240}'
composite_rules:
  - id: pip-installation
    desc: Python package installation via pip
    crit: notable
    conf: 0.8
    any:
      - id: pip-install
      - id: pip-main-install
      - id: ensurepip-bootstrap
