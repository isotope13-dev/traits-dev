defaults:
  for: [plist]
  platforms: [macos]
  attack: "T1105"
traits:
- id: download-config-url
  desc: "Configures app download URL in Info.plist"
  crit: notable
  if:
    type: value
    path: "DownloadApplicationPackageURL"
    regex: "http"
- id: download-config-spare
  desc: "Configures spare app dl URL in Info.plist"
  crit: notable
  conf: 1.0
  if:
    type: value
    path: "SpareDownloadPackageURL"
    regex: "http"
- id: installer-redirect-banner
  desc: Configures installer banner URL
  crit: baseline
  if:
    type: value
    path: "BannerJumpURL"
- id: installer-redirect-code
  desc: Configures installer jump code
  crit: baseline
  if:
    type: value
    path: "InstallJumpCode"
- id: bugsplat-reporting
  desc: Configures BugSplat crash reporting
  crit: baseline
  if:
    type: value
    path: "BugsplatServerURL"
- id: auto-download-launch--1
  desc: auto download launch (1)
  crit: notable
  conf: 1.0
  if:
    type: value
    path: "AllowedDownloadImmediatelyWhenApplicationLaunch"
    exact: '1'
- id: auto-download-launch--true
  desc: auto download launch (true)
  crit: notable
  conf: 1.0
  if:
    type: value
    path: "AllowedDownloadImmediatelyWhenApplicationLaunch"
    exact: 'true'
composite_rules:
- id: auto-download-launch
  desc: 'auto download launch'
  crit: notable
  conf: 1.0
  any:
  - id: auto-download-launch--1
  - id: auto-download-launch--true
