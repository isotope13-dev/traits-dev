defaults:
  platforms: [android, unix, windows]
  for: [apk, zip]
  crit: notable
  conf: 0.88

traits:
  - id: android-apk-mime-type
    desc: Android APK MIME type
    if:
      type: raw
      substr: "application/vnd.android.package-archive"

  - id: package-installer-service-class
    desc: Android package installer service class
    crit: component
    conf: 0.84
    if:
      type: raw
      word: "PackageInstallerService"

  - id: android-request-install-packages-permission
    desc: REQUEST_INSTALL_PACKAGES permission
    for: [xml, java, kotlin]
    crit: suspicious
    conf: 0.92
    attack: "T1631"
    if:
      type: text
      word: "REQUEST_INSTALL_PACKAGES"

  - id: android-request-delete-packages-permission
    desc: REQUEST_DELETE_PACKAGES permission
    for: [xml, java, kotlin]
    crit: notable
    conf: 0.9
    if:
      type: text
      word: "REQUEST_DELETE_PACKAGES"

  - id: android-package-installer-session-mode
    desc: PackageInstaller MODE_FULL_INSTALL session
    for: [java, kotlin]
    crit: suspicious
    conf: 0.93
    attack: "T1631"
    if:
      type: text
      word: "MODE_FULL_INSTALL"

  - id: android-package-installer-session-api
    desc: PackageInstaller.Session usage
    for: [java, kotlin]
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "PackageInstaller.Session"

  - id: android-package-installer-open-session
    desc: PackageInstaller openSession call
    for: [java, kotlin]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "packageInstaller\\.openSession"

composite_rules:
  - id: android-silent-apk-install
    desc: Programmatic APK install via PackageInstaller.Session
    crit: suspicious
    conf: 0.95
    attack: "T1631"
    for: [java, kotlin]
    all:
      - id: android-package-installer-session-mode
      - id: android-package-installer-session-api
