defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell, batch]
  crit: notable
  conf: 0.9

traits:
  - id: bun-installer-url
    desc: Bun installer endpoint reference
    if:
      type: literal
      kind: string
      substr: bun.sh/install
  - id: bun-piped-installer-command
    desc: Bun installer piped to a shell
    conf: 0.95
    if:
      type: text
      substr: 'https://bun.sh/install | bash'
