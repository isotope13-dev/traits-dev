defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.95

traits:
  - id: npm-set-registry-auth-token
    desc: npm registry auth-token configuration command
    if:
      type: literal
      kind: string
      substr: 'npm config set //registry.npmjs.org/:_authToken'
  - id: npm-config-list-command
    desc: NPM configuration listing command
    crit: notable
    conf: 0.9
    for: [javascript, typescript, shell, batch]
    if:
      type: text
      substr: npm config list
