defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: npm-publish-command
    desc: npm package publish command string
    if:
      type: literal
      kind: string
      regex: '\bnpm\s+publish\b'

  - id: npm-variable-description-package
    desc: Builds package with variable description
    conf: 0.85
    if:
      type: text
      regex: '\{\s*name:\s*\w+,\s*version,\s*description,\s*license:'

  - id: npm-binary-data-package-construction
    desc: Builds npm package containing binary data
    conf: 0.96
    if:
      type: text
      regex: 'writeFileSync\([^)]{0,100}[/\\]data\.bin'
