defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: npm-publish-command
    desc: Invokes npm package publish
    # Release helpers commonly invoke npm from shell scripts; keep this atom
    # on the command itself rather than limiting it to JavaScript source.
    for: [javascript, typescript, shell]
    if:
      type: symbol
      kind: call
      exact: npm
      arg:
        kind: identifier
        name: publish

  - id: npm-variable-description-package
    desc: Builds package with variable description
    conf: 0.85
    if:
      type: text
      regex: '\{\s*name:\s*\w+,\s*version,\s*description,\s*license:'

  - id: npm-binary-data-package-construction
    desc: Builds npm package containing binary data
    conf: 0.96
    if:
      type: text
      regex: 'writeFileSync\([^)]{0,100}[/\\]data\.bin'
