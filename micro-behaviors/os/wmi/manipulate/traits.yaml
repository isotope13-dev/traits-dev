defaults:
  platforms: [windows]
  conf: 0.9
  for: [powershell, batch, vbs]
traits:
  - id: modify-service-wmi
    desc: Modifies service via WMI Change
    crit: suspicious
    attack: "T1543.003"
    if:
      type: text
      regex: 'Win32_Service.{0,100}Change'
      case_insensitive: true
  - id: start-service-wmi
    desc: Starts service via WMI StartService
    crit: notable
    attack: "T1543.003"
    if:
      type: text
      regex: 'Win32_Service.{0,100}StartService'
      case_insensitive: true
  - id: modify-registry-wmi
    desc: Modifies registry via WMI StdRegProv
    crit: suspicious
    attack: "T1112"
    if:
      type: text
      regex: 'StdRegProv.{0,100}Set.{0,50}Value'
      case_insensitive: true
  - id: unc-path-reference
    desc: Reference to a UNC network share path
    crit: notable
    if:
      type: text
      # A leading delimiter is required so random backslashes in encoded
      # text cannot be mistaken for `\\server\share`.
      regex: '(?i)(^|[\s"''=(:,])\\\\[a-zA-Z0-9.-]+\\[a-zA-Z0-9$_. -]+(\\|["''\s,;)]|$)'
  - id: external-ip-unc-path-reference
    desc: UNC share path to external IP
    crit: suspicious
    if:
      type: text
      regex: '\\\\([0-9]{1,3}\.){3}[0-9]{1,3}\\'
      is: external_ip
