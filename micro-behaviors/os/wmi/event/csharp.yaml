# WMI event subscription in C# source code
defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: management-event-watcher
    desc: ManagementEventWatcher for WMI events
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: 'ManagementEventWatcher\b'
  - id: wql-event-query
    desc: WqlEventQuery for WMI event subscription
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: 'WqlEventQuery\b'
  - id: event-arrived-handler
    desc: EventArrived handler for WMI events
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "EventArrivedEventHandler"
