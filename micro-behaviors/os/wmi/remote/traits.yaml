defaults:
  platforms: [windows]
  for: [scripts]
  crit: notable
  conf: 0.95

traits:
  - id: remote-wmi-moniker
    desc: Remote WMI moniker target
    attack: T1047
    if:
      type: text
      regex: '(?i)\bwinmgmts:\s*\\\\[A-Za-z0-9_.-]{1,255}\\'
    not:
      - regex: '(?i)winmgmts:\s*\\\\(localhost|127\.0\.0\.1|\.)\\'
