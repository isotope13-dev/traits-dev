defaults:
  for:
    - vbs
  platforms:
    - windows
  crit: notable
  conf: 0.9
traits:
  - id: getobject-winmgmts
    desc: WMI GetObject moniker invocation
    if:
      type: text
      regex: '(?i)GetObject\s*\(\s*"winmgmts:'
  - id: execquery-call
    desc: WMI ExecQuery method call
    if:
      type: text
      regex: (?i)\.ExecQuery\b
  - id: win32-process-create
    desc: WMI Win32_Process.Create call
    crit: suspicious
    conf: 0.94
    attack: T1047
    if:
      type: text
      regex: (?i)Win32_Process.{0,20}\.Create
  - id: win32-operatingsystem
    desc: WMI OS enumeration query
    if:
      type: text
      regex: (?i)Win32_OperatingSystem
  - id: win32-computersystem
    desc: WMI system enumeration query
    if:
      type: text
      regex: (?i)Win32_ComputerSystem
composite_rules:
  - id: vba-wmi-process-launch
    desc: VBA WMI process creation
    crit: suspicious
    conf: 0.96
    attack: T1047
    all:
      - id: getobject-winmgmts
      - id: win32-process-create
