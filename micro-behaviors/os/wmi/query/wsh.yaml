defaults:
  platforms: [windows]
  for: [vbs]
  crit: notable
  conf: 0.9

traits:
- id: wmi-process-create-call
  desc: WMI object creates a process
  crit: notable
  conf: 0.96
  attack: T1047
  for: [javascript, vbs]
  if:
    type: text
    # WSH droppers often decode the Win32_Process class name and invoke
    # Get(...).Create(...), leaving no literal class name for a string-only
    # rule to find.
    regex: '(?i)\.\s*Get\s*\([^)]{1,180}\)\s*\.\s*Create\s*\('

- id: wmi-process-startup-instance
  desc: WMI process-startup object instance
  crit: notable
  conf: 0.94
  attack: T1047
  for: [javascript, vbs]
  if:
    type: text
    regex: '(?i)\bSpawnInstance_\s*\(\s*\)'

- id: wmi-hidden-process-startup
  desc: WMI process startup instance hides its window
  crit: suspicious
  conf: 0.96
  attack: T1564.003,T1047
  for: [javascript, vbs]
  if:
    type: text
    regex: '(?is)\bSpawnInstance_\s*\(\s*\).{0,180}\bShowWindow\s*=\s*0\b'

- id: wmi-impersonation-moniker
  desc: WMI moniker requests impersonation
  if:
    type: text
    substr: 'impersonationLevel=impersonate'

composite_rules:
- id: wmi-hidden-process-create
  desc: WSH creates a hidden process through WMI
  crit: suspicious
  conf: 0.97
  attack: T1564.003,T1047
  for: [javascript, vbs]
  # Obfuscators can insert a long reconstructed class name between the
  # startup instance and Create call; the composite still requires both WMI
  # startup markers and the hidden-window setting.
  near_bytes: 20000
  all:
  - id: wmi-process-create-call
  - id: wmi-hidden-process-startup
