defaults:
  platforms: [windows]
  for: [powershell, go, vbs]
  crit: notable
  conf: 0.9

traits:
  - id: subscription-namespace
    desc: WMI subscription namespace reference
    if:
      type: literal
      regex: '(?i)root\\subscription'

  - id: event-filter-class-name
    desc: WMI EventFilter class name reference
    if:
      type: literal
      word: __EventFilter

  - id: commandline-consumer-class-name
    desc: WMI command-line consumer class name reference
    if:
      type: literal
      word: CommandLineEventConsumer

  - id: activescript-consumer-class-name
    desc: WMI ActiveScript consumer class name reference
    if:
      type: literal
      word: ActiveScriptEventConsumer

  - id: filter-consumer-binding-class-name
    desc: WMI filter-consumer binding class name reference
    if:
      type: literal
      word: __FilterToConsumerBinding
