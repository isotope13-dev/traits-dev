defaults:
  for: [pe, dll, csharp, c, cpp]
  platforms: [windows]
  crit: notable
  conf: 0.88
  attack: T1082

traits:
  - id: wmi-processor-class
    desc: WMI processor class reference
    if:
      type: text
      substr: Win32_Processor

  - id: wmi-video-controller-class
    desc: WMI video controller class reference
    if:
      type: text
      substr: Win32_VideoController

  - id: wmi-disk-drive-class
    desc: WMI disk drive class reference
    if:
      type: text
      substr: Win32_DiskDrive

  - id: wmi-operating-system-class
    desc: WMI operating system class reference
    if:
      type: text
      substr: Win32_OperatingSystem

  - id: wmi-system-enclosure-class
    desc: WMI enclosure class reference
    if:
      type: text
      substr: Win32_SystemEnclosure

  - id: wmi-computer-system-class
    desc: WMI computer system class reference
    if:
      type: text
      substr: Win32_ComputerSystem

  - id: wmi-bios-class
    desc: WMI BIOS class reference
    if:
      type: text
      substr: Win32_BIOS

  - id: wmi-baseboard-class
    desc: WMI baseboard class reference
    if:
      type: text
      substr: Win32_BaseBoard

  - id: wmi-network-adapter-config-class
    desc: WMI network adapter configuration reference
    if:
      type: text
      substr: Win32_NetworkAdapterConfiguration

  - id: wmi-logical-disk-class
    desc: WMI logical disk class reference
    if:
      type: text
      substr: Win32_LogicalDisk

  - id: wmi-thermal-zone-class
    desc: WMI thermal zone class reference
    conf: 0.9
    if:
      type: text
      substr: MSAcpi_ThermalZoneTemperature

  - id: wmi-fan-class
    desc: WMI fan class reference
    conf: 0.9
    if:
      type: text
      substr: Win32_Fan

  - id: wmi-cache-memory-class
    desc: WMI cache memory class reference
    if:
      type: text
      substr: Win32_CacheMemory

  - id: wmi-memory-device-class
    desc: WMI memory device class reference
    if:
      type: text
      substr: Win32_MemoryDevice

  - id: wmi-memory-array-class
    desc: WMI memory array class reference
    if:
      type: text
      substr: Win32_MemoryArray
