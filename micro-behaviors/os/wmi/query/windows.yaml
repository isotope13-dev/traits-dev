defaults:
  platforms: [windows]
traits:
  - id: cimv2-namespace-reference
    desc: WMI CIMv2 namespace reference
    crit: notable
    conf: 0.9
    for: [go, powershell, vbs, batch, javascript]
    if:
      type: text
      regex: '(?i)root[\\/]cimv2\b'
  - id: query-computer-system-product
    desc: WMI query for ComputerSystemProduct
    crit: notable
    conf: 0.9
    attack: "T1082"
    for: [pe, powershell, javascript, vbs, batch]
    if:
      type: text
      substr: "Win32_ComputerSystemProduct"
  - id: query-antivirus
    desc: Queries for AntiVirus products via WMI
    crit: notable
    conf: 0.9
    attack: "T1518.001"
    for: [powershell, javascript, vbs, batch]
    if:
      type: text
      regex: '(?i)(AntiVirusProduct|FirewallProduct|SpywareProduct)'
  - id: query-security-center
    desc: Queries SecurityCenter2 namespace
    crit: notable
    conf: 0.9
    attack: "T1518.001"
    for: [powershell, javascript, vbs, batch]
    if:
      type: text
      regex: '(?i)root.{1,2}SecurityCenter2'
  - id: query-os-info
    desc: Queries OS information via WMI
    crit: notable
    conf: 0.8
    for: [powershell, javascript, vbs, batch, rust, kotlin]
    if:
      type: text
      regex: '(?i)(Win32_OperatingSystem|Win32_ComputerSystem|Win32_Processor)'
    unless:
      - type: text
        regex: '\$\{[^}]{0,120}Win32_ComputerSystem[^}]*&&'
  - id: query-process-list
    desc: Queries running processes via WMI
    crit: notable
    conf: 0.9
    attack: "T1057"
    for: [powershell, javascript, vbs, batch, rust, kotlin]
    if:
      type: text
      regex: '(?i)SELECT\s+\*\s+from\s+Win32_Process'
  - id: query-logical-disks
    desc: Queries logical disks via WMI
    crit: notable
    conf: 0.88
    attack: "T1120"
    for: [powershell, javascript, vbs, batch, rust]
    if:
      type: text
      regex: '(?i)SELECT\s+\*\s+from\s+Win32_LogicalDisk'
  - id: query-installed-software
    desc: Queries installed software via WMI
    crit: notable
    conf: 0.92
    attack: "T1518"
    for: [powershell, javascript, vbs, batch, rust, kotlin]
    if:
      type: text
      regex: '(?i)SELECT\s+\*\s+from\s+Win32_Product'
  - id: query-pnp-devices
    desc: Queries hardware devices via WMI
    crit: notable
    conf: 0.9
    attack: "T1082"
    for: [powershell, javascript, vbs, batch, rust]
    if:
      type: text
      regex: '(?i)SELECT\s+\*\s+from\s+Win32_PnPEntity'
  - id: query-user-accounts
    desc: Queries user accounts via WMI
    crit: notable
    conf: 0.9
    attack: "T1087"
    for: [powershell, javascript, vbs, batch, rust, kotlin]
    if:
      type: text
      regex: '(?i)SELECT\s+\*\s+from\s+Win32_UserAccount'
  - id: query-network-adapters
    desc: Queries network adapters via WMI
    crit: notable
    conf: 0.9
    attack: "T1016"
    for: [powershell, javascript, vbs, batch, rust, kotlin]
    if:
      type: text
      regex: '(?i)SELECT\s+\*\s+from\s+Win32_NetworkAdapter'
  - id: wmi-object-cmdlet
    desc: Uses Get-WmiObject or Gwmi cmdlet
    crit: notable
    conf: 0.8
    for: [powershell, batch, kotlin]
    if:
      type: text
      regex: '(?i)(Get-WmiObject|Gwmi)\b'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: cim-instance-cmdlet
    desc: Uses Get-CimInstance cmdlet
    crit: notable
    conf: 0.8
    for: [powershell, batch, kotlin]
    if:
      type: text
      regex: '(?i)Get-CimInstance\b'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context

  - id: query-os-class-cmdlet
    desc: WMI OS class cmdlet query
    crit: notable
    conf: 0.84
    for: [powershell, batch, kotlin]
    if:
      type: text
      regex: '(?i)-Class(Name)?\s+Win32_(BIOS|ComputerSystem)'

  - id: query-process-class-cmdlet
    desc: WMI process class cmdlet query
    crit: notable
    conf: 0.86
    attack: "T1057"
    for: [powershell, batch, kotlin]
    if:
      type: text
      regex: '(?i)-Class(Name)?\s+Win32_Process\b'

  - id: query-product-class-cmdlet
    desc: WMI product class cmdlet query
    crit: notable
    conf: 0.86
    attack: "T1518"
    for: [powershell, batch, kotlin]
    if:
      type: text
      regex: '(?i)-Class(Name)?\s+Win32_Product\b'

  - id: query-user-class-cmdlet
    desc: WMI user class cmdlet query
    crit: notable
    conf: 0.86
    attack: "T1087"
    for: [powershell, batch, kotlin]
    if:
      type: text
      regex: '(?i)-Class(Name)?\s+Win32_UserAccount\b'

  - id: query-network-class-cmdlet
    desc: WMI network class cmdlet query
    crit: notable
    conf: 0.86
    attack: "T1016"
    for: [powershell, batch, kotlin]
    if:
      type: text
      regex: '(?i)-Class(Name)?\s+Win32_NetworkAdapter'

composite_rules:
  - id: wmi-recon-query-sweep
    desc: Multi-class WMI reconnaissance sweep
    crit: suspicious
    conf: 0.94
    needs: 4
    any:
      - id: query-os-info
      - id: query-process-list
      - id: query-logical-disks
      - id: query-installed-software
      - id: query-pnp-devices
      - id: query-user-accounts
      - id: query-network-adapters
      - id: query-os-class-cmdlet
      - id: query-process-class-cmdlet
      - id: query-product-class-cmdlet
      - id: query-user-class-cmdlet
      - id: query-network-class-cmdlet
