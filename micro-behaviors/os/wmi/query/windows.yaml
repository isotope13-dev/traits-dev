defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: query-antivirus
    desc: Queries for AntiVirus products via WMI
    crit: notable
    conf: 0.9
    attack: "T1518.001"
    for: [powershell, javascript, vbs, batch]
    if:
      type: text
      regex: '(?i)(AntiVirusProduct|FirewallProduct|SpywareProduct)'
  - id: query-security-center
    desc: Queries SecurityCenter2 namespace
    crit: notable
    conf: 0.9
    attack: "T1518.001"
    for: [powershell, javascript, vbs, batch]
    if:
      type: text
      regex: '(?i)root.{1,2}SecurityCenter2'
  - id: query-os-info
    desc: Queries OS information via WMI
    crit: notable
    conf: 0.8
    for: [powershell, javascript, vbs, batch]
    if:
      type: text
      regex: '(?i)(Win32_OperatingSystem|Win32_ComputerSystem|Win32_Processor)'
  - id: wmi-object-cmdlet
    desc: Uses Get-WmiObject or Gwmi cmdlet
    crit: notable
    conf: 0.8
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)(Get-WmiObject|Gwmi)\b'
  - id: cim-instance-cmdlet
    desc: Uses Get-CimInstance cmdlet
    crit: notable
    conf: 0.8
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)Get-CimInstance\b'
