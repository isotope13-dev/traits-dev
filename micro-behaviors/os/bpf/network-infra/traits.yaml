defaults:
  platforms:
    - unix
    - windows
  crit: baseline
  for:
    - elf
    - c
traits:
  - id: bpf-program
    desc: bpf_program struct
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (^|[^A-Za-z0-9_])bpf_program([^A-Za-z0-9_]|$)
  - id: bpf-prefix
    desc: BPF_ prefix
    conf: 0.4
    if:
      type: text
      exact: BPF_
  - id: pcap-prefix-a
    desc: pcap library function reference
    conf: 0.5
    if:
      type: symbol
      regex: pcap_(open_live|compile|setfilter|loop)
  - id: pcap-prefix-b
    desc: pcap library function reference
    conf: 0.5
    if:
      type: symbol
      substr: pcap_
composite_rules:
  - id: pcap-prefix
    desc: pcap library function reference
    conf: 0.5
    any:
      - id: pcap-prefix-a
      - id: pcap-prefix-b
  - id: has-bpf-infra
    desc: Has BPF infrastructure components
    crit: notable
    conf: 0.6
    needs: 2
    any:
      - id: bpf-program
      - id: bpf-prefix
      - id: pcap-prefix
      - id: micro-behaviors/communications/socket/receive::receive
