defaults:
  platforms:
    - linux
  for: [elf]
  crit: notable
  conf: 0.8
traits:
  - id: bpf-probe-read
    desc: bpf_probe_read function
    if:
      type: symbol
      regex: bpf_probe_read
  - id: bpf-kprobe
    desc: bpf_kprobe function
    if:
      type: text
      substr: bpf_kprobe
  - id: bpf-tracepoint
    desc: bpf_tracepoint function
    if:
      type: text
      substr: bpf_tracepoint
