# Packet Manipulation Helpers
# eBPF helpers for modifying packet contents
defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.75
  for: [c]
traits:
  - id: csum-helper
    desc: Checksum helper function
    if:
      type: text
      regex: "csum_(fold|replace|update|diff)"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: skb-load-bytes
    desc: Load packet bytes helper
    conf: 0.72
    if:
      type: text
      substr: "bpf_skb_load_bytes"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: skb-store-bytes
    desc: Store packet bytes helper
    conf: 0.74
    if:
      type: text
      substr: "bpf_skb_store_bytes"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: recompute-csum-flag
    desc: Recompute checksum flag
    conf: 0.72
    if:
      type: text
      substr: "BPF_F_RECOMPUTE_CSUM"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: eth-swap
    desc: Ethernet address swap macro
    conf: 0.8
    if:
      type: text
      substr: "eth_swap"
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: eth-alen
    desc: ETH_ALEN Ethernet address length
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: "ETH_ALEN"
  # NOTE: ntohs/htons/ntohl/htonl moved to communications/ip/parse/unix.yaml
  # as that's the more canonical location for network byte order functions
  - id: ntohs-bswap-b
    desc: Network byte order conversion
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: "__builtin_bswap(16|32|64)"
composite_rules:
  - id: skb-packet-rewrite
    desc: In-place skb packet rewrite
    crit: notable
    conf: 0.86
    all:
      - {id: skb-store-bytes}
      - {id: recompute-csum-flag}
    any:
      - {id: skb-load-bytes}
      - {id: csum-helper}
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/tool/detection/cilium-tetragon::source-path
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
  - id: ntohs-bswap
    desc: Network byte order conversion
    crit: baseline
    conf: 0.5
    any:
      - id: micro-behaviors/communications/ip/parse/
      - {id: ntohs-bswap-b}
  - id: has-packet-manip
    desc: Has packet manipulation capabilities
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - {id: csum-helper}
      - {id: skb-packet-rewrite}
      - {id: eth-swap}
      - {id: eth-alen}
      - {id: ntohs-bswap}
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
