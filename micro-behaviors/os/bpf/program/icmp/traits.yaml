defaults:
  platforms: [unix, android]
traits:
- id: icmp-prog-reply
  desc: ICMP reply program reference
  crit: notable
  conf: 0.8
  for: [c, elf]
  if:
    type: text
    regex: (?i)icmp[_-]?(prog[_-]?)?reply|reply[_-]?icmp
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: icmphdr-struct
  desc: ICMP header structure
  crit: notable
  conf: 0.7
  for: [c, elf]
  if:
    type: text
    regex: struct\s+icmphdr|icmphdr\s*\*
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: icmp-type-field
  desc: ICMP type field access
  crit: notable
  conf: 0.75
  for: [c]
  if:
    type: text
    regex: icmp[h]?->type
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: icmp-echo-request
  desc: ICMP echo request type (8)
  crit: notable
  conf: 0.6
  for: [c, elf]
  if:
    type: text
    regex: ->type\s*==\s*8|type\s*==\s*(ICMP_ECHO|8)
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: icmp-echo-reply
  desc: ICMP echo reply type (0)
  crit: notable
  conf: 0.6
  for: [c, elf]
  if:
    type: text
    regex: ->type\s*=\s*0[^0-9]|type\s*=\s*ICMP_ECHOREPLY\b
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: icmp-invalid-code-one
  desc: Invalid ICMP echo code one
  crit: component
  conf: 0.78
  for: [c]
  if:
    type: text
    regex: 'icmp->code\s*=\s*1\b'
- id: icmp-invalid-code-one-text
  desc: Invalid ICMP code text
  crit: component
  conf: 0.72
  for: [text]
  if:
    type: text
    regex: '(?i)invalid ICMP code 1|code=1'
- id: icmp-x-prefix-tag-text
  desc: ICMP X prefix text
  crit: component
  conf: 0.76
  for: [text]
  if:
    type: text
    regex: '(?i)ICMP.{0,40}X:'
- id: icmp-x3458-handshake-tag
  desc: ICMP X3458 handshake tag
  crit: notable
  conf: 0.88
  for: [c, elf, text]
  if:
    type: text
    word: "X:3458"
- id: icmp-heartbeat-payload-ascii
  desc: ICMP sequential heartbeat payload
  crit: component
  conf: 0.84
  for: [c, elf, text]
  if:
    type: text
    substr: "!\"#$%&'()*+,-./01234567"
- id: icmp-heartbeat-text
  desc: ICMP heartbeat text marker
  crit: component
  conf: 0.72
  for: [text]
  if:
    type: text
    regex: '(?i)heartbeat.{0,40}ICMP|ICMP.{0,40}heartbeat'
- id: icmp-seq-1234-source-dec
  desc: ICMP sequence 1234 reference
  crit: component
  conf: 0.82
  for: [c]
  if:
    type: text
    regex: (?i)icmp.{0,24}seq.{0,24}1234
- id: icmp-seq-1234-source-hex
  desc: ICMP sequence 0x04d2 reference
  crit: component
  conf: 0.82
  for: [c]
  if:
    type: text
    regex: (?i)icmp.{0,24}seq.{0,24}0x04d2
- id: icmp-seq-1234-text
  desc: ICMP sequence 1234 text
  crit: component
  conf: 0.74
  for: [text]
  if:
    type: text
    regex: '(?i)(ICMP.{0,40})?(seq|sequence)[^0-9]{0,8}1234'
- id: cbpf-load-icmp-id-ethernet
  desc: cBPF load ICMP identifier field
  crit: component
  conf: 0.74
  for: [elf]
  if:
    type: hex
    section: .rodata
    pattern: 28 00 00 00 26 00 00 00
- id: cbpf-load-icmp-seq-ethernet
  desc: cBPF load ICMP sequence field
  crit: component
  conf: 0.72
  for: [elf]
  if:
    type: hex
    section: .rodata
    pattern: 28 00 00 00 28 00 00 00
- id: cbpf-jeq-1234-le
  desc: cBPF compare against 1234
  crit: component
  conf: 0.64
  for: [elf]
  if:
    type: hex
    section: .rodata
    pattern: 15 00 ?? ?? D2 04 00 00
- id: cbpf-jeq-1234-be
  desc: cBPF compare against network-order 1234
  crit: component
  conf: 0.64
  for: [elf]
  if:
    type: hex
    section: .rodata
    pattern: 15 00 ?? ?? 04 D2 00 00
- id: icmp-fixed-ttl-64
  desc: ICMP reply TTL 64 assignment
  crit: component
  conf: 0.72
  for: [c]
  if:
    type: text
    regex: iph->ttl\s*=\s*64\b
- id: icmp-static-ip-id
  desc: ICMP reply static IP identifier
  crit: component
  conf: 0.76
  for: [c]
  if:
    type: text
    regex: iph->id\s*=\s*[1-9][0-9]{0,5}\b
composite_rules:
- id: icmp-parsing
  desc: ICMP packet parsing
  crit: notable
  conf: 0.75
  for: [c, elf]
  needs: 2
  any:
  - id: micro-behaviors/communications/ip/services::ipproto-icmp
  - id: icmphdr-struct
  - id: icmp-type-field
  - id: icmp-echo-request
  - id: icmp-echo-reply
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: icmp-type-spoof
  desc: ICMP type modification
  crit: notable
  conf: 0.85
  for: [c]
  all:
  - id: icmp-type-field
  any:
  - id: icmp-echo-request
  - id: icmp-echo-reply
  unless:
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: icmp-reply-rewrite
  desc: ICMP echo reply packet rewrite
  crit: notable
  conf: 0.9
  for: [c]
  all:
  - id: icmp-type-spoof
  - id: micro-behaviors/os/bpf/program/network::ip-addr-swap
  any:
  - id: micro-behaviors/os/bpf/network-manip::eth-swap
  - id: micro-behaviors/os/bpf/network-manip::csum-helper
- id: icmp-fixed-ip-reply-profile
  desc: Fixed IP header reply profile
  crit: notable
  conf: 0.86
  for: [c]
  all:
  - id: icmp-reply-rewrite
  - id: icmp-fixed-ttl-64
  - id: icmp-static-ip-id
- id: icmp-echo-only-filter
  desc: ICMP echo only packet filter
  crit: notable
  conf: 0.84
  for: [c]
  all:
  - id: icmp-type-field
  - id: icmp-echo-request
  - id: icmp-echo-reply
  - id: micro-behaviors/os/bpf/program/network::xdp-pass
  - id: micro-behaviors/os/bpf/program/network::xdp-drop
- id: icmp-sequence-1234
  desc: ICMP sequence 1234 marker
  crit: notable
  conf: 0.78
  for: [c, elf, text]
  any:
  - id: icmp-seq-1234-source-dec
  - id: icmp-seq-1234-source-hex
  - id: icmp-seq-1234-text
  - id: cbpf-jeq-1234-le
  - id: cbpf-jeq-1234-be
  all:
  - id: micro-behaviors/communications/ip/services::services-icmp
- id: pid-derived-icmp-bpf-filter
  desc: PID-derived ICMP BPF filter
  crit: notable
  conf: 0.82
  for: [elf]
  all:
  - id: micro-behaviors/process/identity/query::getpid
  - id: micro-behaviors/communications/socket/options::options-filter-native
  any:
  - id: cbpf-load-icmp-id-ethernet
  - id: cbpf-load-icmp-seq-ethernet
  - id: icmp-parsing
- id: icmp-sequence-1234-marker
  desc: ICMP sequence 1234 marker
  crit: component
  conf: 0.78
  for: [c, elf, text]
  any:
  - id: icmp-sequence-1234
  - id: icmp-seq-1234-text
- id: invalid-icmp-code-one-marker
  desc: Invalid ICMP code marker
  crit: component
  conf: 0.78
  for: [c, text]
  any:
  - id: icmp-invalid-code-one
  - id: icmp-invalid-code-one-text
- id: invalid-code-icmp-heartbeat
  desc: Invalid ICMP heartbeat channel
  crit: suspicious
  conf: 0.9
  for: [c, text]
  all:
  - id: invalid-icmp-code-one-marker
  - id: icmp-sequence-1234-marker
  any:
  - id: icmp-heartbeat-payload-ascii
  - id: icmp-heartbeat-text
  - id: icmp-parsing
- id: x-tagged-icmp-command-channel
  desc: X-tagged ICMP command channel
  crit: suspicious
  conf: 0.9
  for: [c, text]
  all:
  - id: icmp-x-prefix-tag-text
  - id: icmp-sequence-1234-marker
  any:
  - id: icmp-x3458-handshake-tag
  - id: icmp-x-prefix-tag-text
  - id: icmp-parsing
