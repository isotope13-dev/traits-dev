# Go eBPF userspace-loader stack. The existing loader traits cover the C/libbpf
# and Python/BCC toolchains; this file covers the pure-Go ecosystem (cilium/ebpf,
# aquasecurity/libbpfgo, bpf2go codegen) that modern agents and Go-based eBPF
# rootkits use to load and attach kernel programs from userspace. Neutral and
# dual-use: observability/CNI agents and TripleCross-style rootkits share these
# APIs, so the kernel-hide / signal-backdoor objectives reference them cross-tier
# alongside the in-kernel hiding evidence.
defaults:
  platforms: [unix, android]
  for: [go, elf, macho]
  mbc: E1611
traits:
  - id: cilium-ebpf-import
    desc: cilium/ebpf pure-Go eBPF library import
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: github.com/cilium/ebpf
  - id: libbpfgo-import
    desc: aquasecurity/libbpfgo eBPF binding import
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: github.com/aquasecurity/libbpfgo
  - id: ebpf-load-collection-call
    desc: cilium/ebpf loads collection/map into kernel
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bebpf\.(LoadCollection(Spec)?|NewMap)\b'
  - id: ebpf-link-probe-attach
    desc: cilium/ebpf attaches kprobe/uprobe/tracepoint
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\blink\.(K\w*probe|Uprobe|(Raw)?Tracepoint)\b'
  - id: ebpf-link-net-attach
    desc: cilium/ebpf attaches XDP/TCX/cgroup hook
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\blink\.Attach(XDP|TCX|Cgroup)\b'
  - id: ebpf-perf-ringbuf-reader
    desc: cilium/ebpf perf/ringbuf kernel-event reader
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(perf|ringbuf)\.NewReader\b'
  - id: bpf2go-codegen
    desc: bpf2go-generated eBPF object loader
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'bpf2go|_bpf(el|eb)\.(go|o)\b'
composite_rules:
  # A Go binary that pulls in an eBPF library and calls its load/attach API is
  # unambiguously running a kernel eBPF program from userspace.
  - id: go-ebpf-program-loader
    desc: Go userspace loader for an eBPF program
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: cilium-ebpf-import
      - id: libbpfgo-import
      - id: ebpf-load-collection-call
      - id: ebpf-link-probe-attach
      - id: ebpf-link-net-attach
      - id: ebpf-perf-ringbuf-reader
      - id: bpf2go-codegen
