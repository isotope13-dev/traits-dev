defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: bpf-core-read-user
    desc: eBPF read from user memory
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      regex: bpf_(core_read_user|probe_read_user)
  - id: uprobe-attach
    desc: eBPF uprobe attachment
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: string_value
      regex: (attach_uprobe|uprobe_opts|bpf_program__attach_uprobe)
  - id: uprobe-sec
    desc: eBPF uprobe SEC declaration
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: string_value
      regex: uprobe/
  - id: uprobe-retprobe
    desc: eBPF return probe
    crit: notable
    conf: 0.75
    for:
      - c
      - elf
    if:
      type: string_value
      substr: retprobe
