defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: bpf-core-read-user
    desc: eBPF read from user memory
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      regex: bpf_(core_read_user|probe_read_user)
  - id: uprobe-attach
    desc: eBPF uprobe attachment
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      regex: (attach_uprobe|uprobe_opts|bpf_program__attach_uprobe)
  - id: uprobe-sec
    desc: eBPF uprobe SEC declaration
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: string_literal
      substr: uprobe/
  - id: uprobe-retprobe
    desc: eBPF return probe
    crit: notable
    conf: 0.75
    for:
      - c
      - elf
    if:
      type: text
      substr: retprobe
  - id: kprobe-sec
    desc: SEC kprobe section declaration
    crit: notable
    conf: 0.85
    for: [c, elf]
    if:
      type: text
      substr: "SEC(\"kprobe/"
  - id: bpf-probe-read
    desc: bpf_probe_read kernel memory read
    crit: notable
    conf: 0.7
    for: [c]
    if:
      type: text
      substr: "bpf_probe_read"
  - id: pt-regs-parm
    desc: PT_REGS_PARM syscall argument access
    crit: notable
    conf: 0.75
    for: [c]
    if:
      type: text
      regex: "PT_REGS_PARM[1-6]"
  - id: syscall-kprobe-macro
    desc: SYSCALL_KPROBE hook macro framework
    crit: notable
    conf: 0.85
    for: [c]
    if:
      type: text
      substr: "SYSCALL_KPROBE"
  - id: sk-buff-struct
    desc: struct __sk_buff TC program context
    crit: notable
    conf: 0.6
    for: [c, elf]
    if:
      type: text
      substr: "__sk_buff"
