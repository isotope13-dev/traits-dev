defaults:
  platforms: [windows, unix]
traits:
- id: bpf-core-read-user
  desc: eBPF read from user memory
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: symbol
    regex: bpf_(core_read_user|probe_read_user)
- id: uprobe-sec
  desc: eBPF uprobe SEC declaration
  crit: suspicious
  conf: 0.85
  for:
  - c
  if:
    type: string_literal
    substr: uprobe/
- id: retprobe-section
  desc: eBPF return-probe SEC declaration
  crit: component
  conf: 0.75
  for:
  - c
  - elf
  if:
    type: text
    regex: 'SEC\("u?retprobe/'
- id: attach-uretprobe-symbol
  desc: attach_uretprobe symbol
  crit: component
  conf: 0.75
  for:
  - c
  - elf
  if:
    type: text
    substr: attach_uretprobe
- id: bpf-program-attach-uretprobe-symbol
  desc: bpf_program__attach_uretprobe symbol
  crit: component
  conf: 0.75
  for:
  - c
  - elf
  if:
    type: text
    substr: bpf_program__attach_uretprobe
- id: retprobe-option
  desc: eBPF return-probe option
  crit: component
  conf: 0.75
  for:
  - c
  - elf
  if:
    type: text
    regex: 'uprobe_opts[^\n]{0,80}retprobe|retprobe\s*=\s*true'
- id: kprobe-sec
  desc: SEC kprobe section declaration
  crit: suspicious
  conf: 0.85
  for: [c, elf]
  if:
    type: text
    substr: "SEC(\"kprobe/"
- id: bpf-probe-read
  desc: bpf_probe_read kernel memory read
  crit: suspicious
  conf: 0.7
  for: [c]
  if:
    type: text
    substr: "bpf_probe_read"
- id: bpf-probe-write-user
  desc: "eBPF userspace memory write helper"
  crit: notable
  conf: 0.85
  attack: T1562.001
  for:
  - c
  - elf
  if:
    type: text
    substr: bpf_probe_write_user
  downgrade:
    any:
    - id: metadata/binary/metrics/size::massive-executable
    - id: micro-behaviors/os/bpf/program/maps::bpf-map-hash
- id: pt-regs-parm
  desc: PT_REGS_PARM syscall argument access
  crit: suspicious
  conf: 0.75
  for: [c]
  if:
    type: text
    regex: "PT_REGS_PARM[1-6]"
- id: syscall-kprobe-macro
  desc: SYSCALL_KPROBE hook macro framework
  crit: suspicious
  conf: 0.85
  for: [c]
  if:
    type: text
    substr: "SYSCALL_KPROBE"
- id: sk-buff-struct
  desc: struct __sk_buff TC program context
  crit: notable
  conf: 0.6
  for: [c, elf]
  if:
    type: text
    substr: "__sk_buff"
- id: uprobe-attach--attach-uprobe
  desc: eBPF uprobe attachment (attach_uprobe)
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    word: attach_uprobe
- id: uprobe-attach--uprobe-opts
  desc: eBPF uprobe attachment (uprobe_opts)
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    word: uprobe_opts
- id: uprobe-attach--bpf-program-attach-uprobe
  desc: eBPF uprobe (bpf_program__attach_uprobe)
  crit: notable
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    word: bpf_program__attach_uprobe
composite_rules:
- id: uprobe-attach
  desc: eBPF uprobe attachment
  crit: notable
  conf: 0.8
  for:
  - c
  - elf
  unless:
  - id: metadata/file/string/identity::bpf-tool-basename
  any:
  - id: uprobe-attach--attach-uprobe
  - id: uprobe-attach--uprobe-opts
  - id: uprobe-attach--bpf-program-attach-uprobe
- id: uprobe-retprobe
  desc: eBPF return probe
  crit: suspicious
  conf: 0.75
  for:
  - c
  - elf
  any:
  - id: retprobe-section
  - id: attach-uretprobe-symbol
  - id: bpf-program-attach-uretprobe-symbol
  - id: retprobe-option
  unless:
  - id: well-known/lib/glibc
