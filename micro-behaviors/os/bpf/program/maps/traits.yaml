# eBPF Programs - BPF Map Operations
# Capabilities for BPF/eBPF program detection
defaults:
  platforms: [unix]
  for: [c, elf]
traits:
  # === BPF Map Operations ===
  - id: bpf-map-lookup
    desc: BPF map lookup helper
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "bpf_map_lookup_elem"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-update
    desc: BPF map update helper
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "bpf_map_update_elem"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-delete
    desc: BPF map delete helper
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "bpf_map_delete_elem"
  # === BPF Map Type Declarations ===
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-array
    desc: BPF array map type
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: "BPF_MAP_TYPE_ARRAY"
  # === eBPF Map Type Declarations ===
  # BPF_MAP_TYPE_RINGBUF in eBPF code (data exfiltration buffer)
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-ringbuf
    desc: BPF ring buffer map
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "BPF_MAP_TYPE_RINGBUF"
  # BPF_MAP_TYPE_HASH for connection/context tracking
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-hash
    desc: BPF hash map
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: "BPF_MAP_TYPE_HASH"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-prog-array
    desc: BPF program array map for tail calls
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "BPF_MAP_TYPE_PROG_ARRAY"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-lru-hash
    desc: BPF LRU hash map type
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: "BPF_MAP_TYPE_LRU_HASH"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-map-percpu-array
    desc: BPF per-CPU array map type
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: "BPF_MAP_TYPE_PERCPU_ARRAY"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-maps-section
    desc: eBPF .maps section declaration
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: 'SEC(".maps")'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: trigger-ports-map
    desc: Trigger ports BPF map
    crit: suspicious
    conf: 0.93
    for:
      - c
    if:
      type: text
      regex: 'trigger_ports\s+SEC\("\.maps"\)'
  - id: auth-elem-map
    desc: Auth element BPF map
    crit: suspicious
    conf: 0.93
    for:
      - c
    if:
      type: text
      regex: 'auth_elem\s+SEC\("\.maps"\)'
  - id: files-elem-map
    desc: Altered files BPF map
    crit: suspicious
    conf: 0.93
    for:
      - c
    if:
      type: text
      regex: 'files_elem\s+SEC\("\.maps"\)'
  - id: map-key-ushort
    desc: Unsigned short map key type
    crit: notable
    conf: 0.76
    for:
      - c
    if:
      type: text
      regex: '__type\(key,\s*unsigned short\)'
  - id: map-max-entries-8
    desc: Eight-entry BPF map size
    crit: component
    conf: 0.7
    for:
      - c
    if:
      type: text
      substr: "__uint(max_entries, 8);"
  - id: map-max-entries-1
    desc: Single-entry BPF map size
    crit: component
    conf: 0.7
    for:
      - c
    if:
      type: text
      substr: "__uint(max_entries, 1);"
  - id: map-max-entries-2
    desc: Two-entry BPF map size
    crit: component
    conf: 0.7
    for:
      - c
    if:
      type: text
      substr: "__uint(max_entries, 2);"
  - id: map-value-char256
    desc: 256-byte map value buffer
    crit: notable
    conf: 0.82
    for:
      - c
    if:
      type: text
      regex: '__type\(value,\s*char\[256\]\)'
  - id: map-value-file-block
    desc: file_block map value
    crit: notable
    conf: 0.84
    for:
      - c
    if:
      type: text
      regex: '__type\(value,\s*struct\s+file_block\)'
