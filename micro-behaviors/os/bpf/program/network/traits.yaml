defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: so-attach-bpf
    desc: SO_ATTACH_BPF socket option
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: SO_ATTACH_BPF
  - id: af-packet
    desc: AF_PACKET raw socket
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: AF_PACKET
    unless:
      - id: metadata/lang/compiler/systems::go-binary
  - id: af-packet-source
    desc: AF_PACKET packet socket constant
    crit: notable
    conf: 0.76
    for:
      - c
      - cpp
    if:
      type: text
      substr: AF_PACKET
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: sock-dgram-source
    desc: Datagram socket type constant
    crit: component
    conf: 0.72
    for:
      - c
      - cpp
    if:
      type: text
      substr: SOCK_DGRAM
  - id: sequence-string
    desc: knock sequence string reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: \b(knock|port|packet)[_-]?sequence\b
      case_insensitive: true
  - id: xdp-tx
    desc: XDP_TX return action
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      substr: XDP_TX
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: xdp-drop
    desc: XDP_DROP packet discard
    crit: notable
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      substr: XDP_DROP
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: xdp-pass
    desc: XDP_PASS packet passthrough
    crit: notable
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      substr: XDP_PASS
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: xdp-md-struct
    desc: struct xdp_md packet context
    crit: notable
    conf: 0.7
    for:
      - c
      - elf
    if:
      type: text
      substr: struct xdp_md
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: xdp-data-end
    desc: XDP data_end pointer
    crit: component
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      word: data_end
  - id: xdp-attach
    desc: XDP program attachment to interface
    crit: notable
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      substr: bpf_xdp_attach
  - id: xdp-flags
    desc: XDP attachment flags
    crit: notable
    conf: 0.6
    for:
      - c
      - elf
    if:
      type: text
      regex: XDP_FLAGS_(UPDATE_IF_NOEXIST|SKB_MODE|DRV_MODE|HW_MODE)
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: bpf-skeleton-include
    desc: BPF skeleton header include
    crit: notable
    conf: 0.9
    for:
      - c
    if:
      type: text
      regex: '#include\s+"[^"]{1,120}\.skel\.h"'
  - id: ethhdr-struct
    desc: Ethernet header structure
    crit: notable
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      regex: struct\s+ethhdr|ethhdr\s*\*
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: iphdr-struct
    desc: IP header structure
    crit: baseline
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      regex: struct\s+iphdr|iphdr\s*\*
  - id: ip-addr-swap
    desc: IP address swap operation
    crit: notable
    conf: 0.75
    for:
      - c
    if:
      type: text
      regex: swap.{0,30}(saddr|daddr)|(saddr|daddr).{0,30}swap
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: knock-string-port-knock
    desc: knock string reference
    crit: notable
    conf: 0.6
    for:
      - elf
      - c
    if:
      type: text
      regex: (?i)port[_-]?knock
  - id: knock-string-knock-terms
    desc: knock string reference
    crit: notable
    conf: 0.6
    for:
      - elf
      - c
    if:
      type: text
      regex: (?i)knock[_-]?(sequence|packet)
composite_rules:
  - id: af-packet-dgram-filter-source
    desc: Datagram packet socket filtering
    crit: notable
    conf: 0.88
    for:
      - c
      - cpp
    all:
      - id: af-packet-source
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: sock-dgram-source
      - id: micro-behaviors/communications/socket/options::options-filter
      - id: well-known/app/openvpn::openvpn-source-tree
  - id: knock-string
    desc: knock string reference
    crit: notable
    conf: 0.6
    for:
      - elf
      - c
    any:
      - id: knock-string-port-knock
      - id: knock-string-knock-terms
  - id: xdp-packet-reflection
    desc: XDP packet reply rewrite
    crit: suspicious
    conf: 0.9
    attack: T1205.001
    for:
      - c
    all:
      - id: xdp-tx
      - id: ip-addr-swap
    any:
      - id: micro-behaviors/os/bpf/network-manip::eth-swap
      - id: micro-behaviors/os/bpf/network-manip::csum-helper
