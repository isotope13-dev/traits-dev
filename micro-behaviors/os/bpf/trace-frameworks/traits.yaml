defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.85
traits:
  - id: bpftrace
    desc: bpftrace framework
    if:
      type: text
      substr: bpftrace
    unless:
      - id: metadata/file/catalog/identity/
  - id: bcc-import-from
    desc: Python BCC from-import
    crit: component
    if:
      type: text
      regex: '\bfrom\s+bcc\b'
  - id: bcc-import
    desc: Python BCC import
    crit: component
    if:
      type: text
      regex: '\bimport\s+bcc\b'
  - id: bcc-path
    desc: BCC library path
    crit: component
    if:
      type: text
      substr: bcc/
  - id: libbpf
    desc: libbpf library
    if:
      type: text
      substr: libbpf
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: bcc-lib
    desc: BCC library
    crit: notable
    conf: 0.85
    any:
      - id: bcc-import-from
      - id: bcc-import
      - id: bcc-path
