defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.85
traits:
  - id: bpftrace
    desc: bpftrace framework
    if:
      type: text
      substr: bpftrace
  - id: bcc-lib
    desc: BCC library
    if:
      type: text
      regex: \bbcc(_|/|\s|$)
  - id: libbpf
    desc: libbpf library
    if:
      type: text
      substr: libbpf
