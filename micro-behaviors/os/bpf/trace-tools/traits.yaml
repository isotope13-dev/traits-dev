defaults:
  platforms:
    - unix
    - android
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: cilium
    desc: Cilium observability
    if:
      type: text
      substr: cilium
  - id: falco
    desc: Falco security
    count_min: 2
    if:
      type: text
      word: falco
  - id: tracee
    desc: Tracee observability
    if:
      type: text
      word: tracee
    unless:
      - id: metadata/file/text::frequency-list-catalog
