# eBPF Observability Tools
# Legitimate eBPF-based observability and security tools
defaults:
  platforms: [linux, unix, android]
  for: [shell, python, javascript, elf]
  crit: notable
  conf: 0.9
traits:
  - id: cilium
    desc: Cilium observability
    if:
      type: string_value
      substr: "cilium"
  - id: falco
    desc: Falco security
    if:
      type: string_value
      substr: "falco"
  - id: tracee
    desc: Tracee observability
    if:
      type: string_value
      substr: "tracee"
