defaults:
  for: [pe, dll, c, cpp]
  platforms:
    - windows
traits:
  - id: wow64-fs-redirect
    desc: WoW64 filesystem redirection control
    crit: notable
    conf: 0.9
    attack: T1574
    if:
      type: text
      substr: Wow64EnableWow64FsRedirection
  - id: wow64-disable-redirect
    desc: Disable WoW64 filesystem redirection
    crit: baseline
    conf: 0.9
    attack: T1574
    if:
      type: text
      substr: Wow64DisableWow64FsRedirection
  - id: wow64-revert-redirect
    desc: Revert WoW64 filesystem redirection
    conf: 0.8
    if:
      type: text
      substr: Wow64RevertWow64FsRedirection
  - id: is-wow64-process
    desc: Check if running under WoW64
    conf: 0.7
    if:
      type: text
      substr: IsWow64Process
  - id: wow64-process-stack
    desc: Wow64Process reference via stack string
    crit: notable
    conf: 0.75
    if:
      type: text
      exact: Wow64Process
  - id: ntwow64-query-information-process64
    desc: Imports NtWow64QueryInformationProcess64 API
    crit: notable
    conf: 0.93
    if:
      type: import
      exact: NtWow64QueryInformationProcess64
  - id: ntwow64-query-virtual-memory64
    desc: Imports NtWow64QueryVirtualMemory64 API
    crit: notable
    conf: 0.93
    if:
      type: import
      exact: NtWow64QueryVirtualMemory64
  - id: ntwow64-read-virtual-memory64
    desc: Imports NtWow64ReadVirtualMemory64 API
    crit: notable
    conf: 0.94
    if:
      type: import
      exact: NtWow64ReadVirtualMemory64
  - id: ntwow64-write-virtual-memory64
    desc: Imports NtWow64WriteVirtualMemory64 API
    crit: notable
    conf: 0.96
    if:
      type: import
      exact: NtWow64WriteVirtualMemory64
  - id: process-basic-information-class
    desc: ProcessBasicInformation info class
    crit: component
    conf: 0.88
    for:
      - c
      - cpp
    if:
      type: text
      substr: ProcessBasicInformation
composite_rules:
  - id: wow64-peb64-query
    desc: Query 64-bit PEB from WoW64
    crit: suspicious
    conf: 0.95
    all:
      - id: ntwow64-query-information-process64
      - id: process-basic-information-class
  - id: wow64-cross-arch-memory-introspection
    desc: Inspect 64-bit address space from WoW64
    crit: suspicious
    conf: 0.95
    all:
      - id: is-wow64-process
    needs: 2
    any:
      - id: ntwow64-query-virtual-memory64
      - id: ntwow64-read-virtual-memory64
      - id: wow64-peb64-query
