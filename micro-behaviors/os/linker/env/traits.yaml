defaults:
  for:
    - so
    - c
  platforms:
    - linux
traits:
  - id: ld-preload
    desc: LD_PRELOAD environment variable
    crit: notable
    conf: 0.7
    mbc: F0015
    attack: T1574.006
    if:
      type: text
      substr: LD_PRELOAD
  - id: ld-preload-export
    desc: LD_PRELOAD shell export
    crit: notable
    conf: 0.85
    platforms: [unix]
    for: [elf, shell, c, cpp, objc, zig, php]
    mbc: F0015
    attack: T1574.006
    if:
      type: text
      substr: export LD_PRELOAD
  - id: ld-library-path
    desc: LD_LIBRARY_PATH environment variable
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: LD_LIBRARY_PATH
  - id: ld-audit
    desc: LD_AUDIT environment variable
    crit: notable
    conf: 0.7
    mbc: F0015
    attack: T1574.006
    if:
      type: text
      substr: LD_AUDIT
  - id: ld-debug
    desc: LD_DEBUG environment variable
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: LD_DEBUG
  - id: ld-bind-now
    desc: LD_BIND_NOW environment variable
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: LD_BIND_NOW
composite_rules: []
