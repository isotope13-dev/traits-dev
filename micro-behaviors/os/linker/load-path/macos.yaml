defaults:
  platforms: [macos]
  for: [ruby, shell, python, go, rust, objc, macho, dylib]

traits:
  - id: install-name-tool-load-path-change
    desc: Rewrites Mach-O library load path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'install_name_tool.{0,120}-(change|add_rpath|delete_rpath|rpath)\b'

  - id: codesign-remove-signature
    desc: Removes Mach-O code signature
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'codesign\s+--remove-signature\b'

composite_rules: []
