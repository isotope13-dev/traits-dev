defaults:
  platforms: [macos]
  for: [macho]
composite_rules:
  - id: kqueue-usage
    desc: Direct kqueue event notification
    crit: notable
    conf: 0.65
    all:
      - id: micro-behaviors/os/event/kqueue/queue::kqueue-func
      - id: micro-behaviors/os/event/kqueue/event::kevent-func
