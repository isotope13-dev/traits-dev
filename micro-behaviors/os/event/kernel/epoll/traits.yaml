defaults:
  platforms: [unix, android]
  for: [elf]
traits:
  - id: epoll-create
    desc: epoll_create function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: epoll_create
  - id: epoll-ctl
    desc: epoll_ctl function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: epoll_ctl
  - id: epoll-wait
    desc: epoll_wait function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: epoll_wait
composite_rules:
  - id: epoll-usage
    desc: Direct epoll event notification
    crit: notable
    conf: 0.65
    needs: 2
    any:
      - id: micro-behaviors/os/event/kernel/epoll::epoll-create
      - id: micro-behaviors/os/event/kernel/epoll::epoll-ctl
      - id: micro-behaviors/os/event/kernel/epoll::epoll-wait
