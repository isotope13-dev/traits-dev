defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.9

traits:
  - id: open-trace-w
    desc: Open ETW trace consumer
    if:
      type: symbol
      exact: OpenTraceW

  - id: process-trace
    desc: Consume ETW event stream
    if:
      type: symbol
      exact: ProcessTrace

composite_rules:
  - id: etw-trace-consumer
    desc: Consume Windows ETW trace session
    crit: notable
    conf: 0.93
    all:
      - id: open-trace-w
      - id: process-trace
