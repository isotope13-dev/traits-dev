defaults:
  platforms: [macos]
  for: [macho, dylib]
traits:
  - id: kqueue-func
    desc: kqueue function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: kqueue
    unless:
      - type: basename
        regex: \.node$
  - id: kevent-func
    desc: kevent function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: kevent
    unless:
      - type: basename
        regex: \.node$
composite_rules:
  - id: kqueue-usage
    desc: Direct kqueue event notification
    crit: notable
    conf: 0.65
    all:
      - id: kqueue-func
      - id: kevent-func
