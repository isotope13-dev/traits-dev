defaults:
  platforms: [macos, unix]
  for: [elf, macho, so, dylib]
traits:
  - id: kqueue-func
    desc: kqueue function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: kqueue
  - id: kevent-func
    desc: kevent function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: kevent
composite_rules:
  - id: kqueue-usage
    desc: Direct kqueue event notification
    crit: notable
    conf: 0.65
    all:
      - id: kqueue-func
      - id: kevent-func
