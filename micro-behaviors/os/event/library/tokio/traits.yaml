defaults:
  platforms: [unix, android, windows]
  for: [elf, macho, pe, rust]
traits:
  - id: tokio-namespace
    desc: 'tokio:: namespace'
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: 'tokio::'
  - id: tokio-runtime
    desc: tokio_runtime reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: tokio_runtime
  - id: tokio-net
    desc: tokio::net module
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: tokio::net
  - id: tokio-spawn
    desc: tokio::spawn function
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: tokio::spawn
  - id: tokio-cargo
    desc: tokio- cargo dependency
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: tokio-
  - id: tokio-crate-path
    desc: Tokio crate source path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /tokio-
  - id: tokio-runtime-thread-name
    desc: Tokio runtime worker thread
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: tokio-rt-worker
