defaults:
  platforms: [linux, unix, macos, android, windows]
  for: [elf, macho, rust]
traits:
  - id: tokio-namespace
    desc: 'tokio:: namespace'
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: 'tokio::'
  - id: tokio-runtime
    desc: tokio_runtime reference
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: tokio_runtime
  - id: tokio-net
    desc: tokio::net module
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: tokio::net
  - id: tokio-spawn
    desc: tokio::spawn function
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: tokio::spawn
  - id: tokio-cargo
    desc: tokio- cargo dependency
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: tokio-
composite_rules:
  - id: tokio
    desc: Tokio async runtime (Rust)
    crit: notable
    conf: 0.7
    any:
      - id: tokio-namespace
      - id: tokio-runtime
      - id: tokio-net
      - id: tokio-spawn
      - id: tokio-cargo
