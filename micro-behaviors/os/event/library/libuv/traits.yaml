defaults:
  platforms: [unix, android, windows]
  for: [elf, macho, pe]
traits:
  - id: uv-loop-init
    desc: uv_loop_init function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: uv_loop_init
  - id: uv-run
    desc: uv_run function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: uv_run
  - id: uv-tcp-init
    desc: uv_tcp_init function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: uv_tcp_init
  - id: uv-tcp-connect
    desc: uv_tcp_connect function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: uv_tcp_connect
  - id: uv-write
    desc: uv_write function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: uv_write
  - id: uv-read-start
    desc: uv_read_start function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: uv_read_start
  - id: uv-spawn
    desc: uv_spawn function
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: uv_spawn
  - id: uv-default-loop
    desc: uv_default_loop function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: uv_default_loop
composite_rules:
  - id: libuv
    desc: libuv event loop library
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: micro-behaviors/os/event/library/libuv::uv-default-loop
      - id: micro-behaviors/os/event/library/libuv::uv-loop-init
      - id: micro-behaviors/os/event/library/libuv::uv-read-start
      - id: micro-behaviors/os/event/library/libuv::uv-run
      - id: micro-behaviors/os/event/library/libuv::uv-spawn
      - id: micro-behaviors/os/event/library/libuv::uv-tcp-connect
      - id: micro-behaviors/os/event/library/libuv::uv-tcp-init
      - id: micro-behaviors/os/event/library/libuv::uv-write
