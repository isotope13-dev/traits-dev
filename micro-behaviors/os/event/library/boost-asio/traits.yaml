defaults:
  platforms: [linux, unix, macos, android, windows]
  for: [elf, macho, so, dylib, pe, dll]
traits:
  - id: boost-asio-namespace
    desc: boost::asio namespace
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: boost::asio
  - id: io-service
    desc: io_service class
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: io_service
  - id: io-context
    desc: io_context class
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: io_context
  - id: async-read
    desc: async_read function
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: async_read
  - id: async-write
    desc: async_write function
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: async_write
  - id: async-connect
    desc: async_connect function
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: async_connect
  - id: deadline-timer
    desc: deadline_timer class
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      substr: deadline_timer
composite_rules:
  - id: boost-asio
    desc: Boost.Asio event loop library
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: boost-asio-namespace
      - id: io-service
      - id: io-context
      - id: async-read
      - id: async-write
      - id: async-connect
      - id: deadline-timer
