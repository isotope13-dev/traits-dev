# .NET Windows Session Event Hooks
# SystemEvents.SessionEnding used to intercept logoff/shutdown
# ATT&CK: T1546 (Event Triggered Execution)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1546
traits:
  - id: add-session-ending
    desc: 'add session ending'
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: add_SessionEnding
  - id: session-ending-event-handler
    desc: ".NET SessionEndingEventHandler delegate ref"
    crit: component
    conf: 0.8
    if:
      type: text
      exact: SessionEndingEventHandler
composite_rules:
  - id: dotnet-session-ending-hook
    desc: .NET session ending event hook (logoff/shutdown intercept)
    crit: notable
    conf: 0.88
    all:
      - id: add-session-ending
      - id: session-ending-event-handler
