defaults:
  platforms: [linux, unix, macos, android]
  for: [elf, macho]
traits:
  - id: ev-loop
    desc: ev_loop function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: ev_loop
  - id: ev-io-start
    desc: ev_io_start function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: ev_io_start
  - id: ev-io-stop
    desc: ev_io_stop function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: ev_io_stop
  - id: ev-timer-start
    desc: ev_timer_start function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: ev_timer_start
  - id: ev-run
    desc: ev_run function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: ev_run
  - id: ev-break
    desc: ev_break function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: ev_break
  - id: ev-default-loop
    desc: ev_default_loop function
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      regex: ev_default_loop
  - id: libev-error
    desc: libev error string
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: 'libev: '
composite_rules:
  - id: libev
    desc: libev event loop library
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: ev-loop
      - id: ev-io-start
      - id: ev-io-stop
      - id: ev-timer-start
      - id: ev-run
      - id: ev-break
      - id: ev-default-loop
      - id: libev-error
