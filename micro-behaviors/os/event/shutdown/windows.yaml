defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  # AbortSystemShutdownW cancels an in-progress system shutdown started by
  # InitiateSystemShutdown.  Rare outside system utilities; seeing it appear
  # in a supply-chain diff is a strong purpose-change signal.
  - id: abort-system-shutdown-w
    desc: Cancel an in-progress system shutdown
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: AbortSystemShutdownW
  - id: register-application-restart
    desc: RegisterApplicationRestart API reference
    crit: notable
    conf: 0.85
    for: [pe, dll, source]
    if:
      type: text
      substr: RegisterApplicationRestart
  - id: set-process-shutdown-parameters
    desc: SetProcessShutdownParameters API reference
    crit: notable
    conf: 0.85
    for: [pe, dll, source]
    if:
      type: text
      substr: SetProcessShutdownParameters
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
  - id: ewx-restartapps-flag
    desc: EWX_RESTARTAPPS restart flag
    crit: component
    conf: 0.85
    for: [pe, dll, source]
    if:
      type: text
      substr: EWX_RESTARTAPPS
  - id: abort-system-shutdown-text
    desc: AbortSystemShutdown API reference
    crit: notable
    conf: 0.82
    for: [pe, dll, source]
    if:
      type: text
      regex: AbortSystemShutdown[AW]?

composite_rules:
  - id: application-restart-registration
    desc: Registers Windows application restart behavior
    crit: notable
    conf: 0.92
    for: [pe, dll, source]
    all:
      - id: register-application-restart
      - id: set-process-shutdown-parameters
