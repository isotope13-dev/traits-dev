defaults:
  for: [pe, dll, c, cpp]
  platforms: [windows]
traits:
  - id: powershell-operational-log-name
    desc: PowerShell operational event log name reference
    crit: notable
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: Microsoft-Windows-PowerShell/Operational

  - id: register-event-source
    desc: Register Windows event source
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      regex: ^RegisterEventSource[AW]?$
  - id: report-event
    desc: Write Windows event log entry
    crit: baseline
    conf: 0.92
    if:
      type: symbol
      regex: ^ReportEvent[AW]?$

  - id: open-event-log-api
    desc: Opens a Windows event log
    crit: notable
    conf: 0.93
    for: [c, cpp]
    if:
      type: text
      regex: '\bOpenEventLog[AW]?\s*\('
  - id: open-event-log-import
    desc: Imports Windows event log opener
    crit: notable
    conf: 0.95
    for: [pe, dll]
    if:
      type: import
      regex: '^OpenEventLog[AW]$'

composite_rules:
  - id: event-log-write
    desc: Windows event log writing
    crit: notable
    conf: 0.93
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/metrics/threshold::many-exports-100
    all:
      - id: register-event-source
      - id: report-event
  - id: event-log-open
    desc: Windows event log access
    crit: notable
    conf: 0.94
    any:
      - id: open-event-log-api
      - id: open-event-log-import
