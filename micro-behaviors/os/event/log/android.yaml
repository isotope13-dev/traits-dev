defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.88

traits:
  - id: android-logcat-command
    desc: Android logcat command
    if:
      type: text
      substr: "logcat"

  - id: android-logcat-clear-command
    desc: Android logcat clear command
    if:
      type: text
      substr: "logcat -c"

  - id: sketchware-debug-log-broadcast
    desc: Sketchware debug log broadcast
    conf: 0.94
    if:
      type: text
      substr: "pro.sketchware.ACTION_NEW_DEBUG_LOG"

  - id: sketchware-logger-class
    desc: Sketchware logger class
    conf: 0.92
    if:
      type: text
      substr: "Lcom/my/newproject6/SketchLogger;"
