# Random Number Generation
# Detects random seeding and generation patterns used for randomized behavior
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, c, objc]
traits:
  - id: srand-symbol
    desc: Random seed initialization (srand)
    crit: baseline
    conf: 0.4
    if:
      type: symbol
      exact: "srand"
  - id: rand-symbol
    desc: Random number generation (rand)
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      exact: "rand"
composite_rules:
  - id: seeded-random
    desc: Seeded random number generation
    crit: baseline
    conf: 0.5
    all:
      - id: srand-symbol
      - id: rand-symbol
