defaults:
  platforms: [windows, unix]
traits:
  - id: go-crypto-rand-read
    desc: Read cryptographic random bytes
    crit: baseline
    conf: 0.8
    for: [pe, elf, macho]
    if:
      type: text
      exact: crypto/rand.Read
  - id: go-crypto-rand-reader
    desc: Use crypto rand reader
    crit: baseline
    conf: 0.75
    for: [pe, elf, macho]
    if:
      type: text
      exact: crypto/rand.(*reader).Read
composite_rules:
  - id: go-crypto-random-bytes
    desc: Generate cryptographic random bytes
    crit: notable
    conf: 0.82
    any:
      - id: go-crypto-rand-read
      - id: go-crypto-rand-reader
