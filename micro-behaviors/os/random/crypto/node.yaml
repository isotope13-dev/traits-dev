# Node.js cryptographic random-value generation.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable

traits:
  - id: node-random-bytes
    desc: Node.js random byte generation
    conf: 0.65
    if:
      type: symbol
      regex: (^|\.)randomBytes$
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure/
  - id: node-random-32-byte-value
    desc: Node.js 32-byte random value
    conf: 0.84
    if:
      type: text
      regex: 'randomBytes\s*\(\s*(32|0x20)\s*\)'
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: node-random-fill
    desc: Node.js random buffer fill
    conf: 0.65
    if:
      type: symbol
      regex: (^|\.)(randomFill|randomFillSync)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: node-random-int-or-uuid
    desc: Node.js random integer or UUID
    conf: 0.62
    if:
      type: symbol
      regex: (^|\.)(randomInt|randomUUID)$
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-minified-bundle

composite_rules:
  - id: node-random-generation
    desc: Node.js cryptographic random-value generation
    crit: notable
    conf: 0.72
    any:
      - id: node-random-bytes
      - id: node-random-32-byte-value
      - id: node-random-fill
      - id: node-random-int-or-uuid
