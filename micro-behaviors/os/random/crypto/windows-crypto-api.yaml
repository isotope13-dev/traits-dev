# Windows cryptographic PRNG APIs
# ProcessPrng from bcryptprimitives.dll is the modern Windows CSPRNG
# used by Rust's getrandom crate and other crypto libraries.
# In the context of a Node.js native addon with shellcode injection,
# this indicates the capability to generate encryption keys for
# payload encryption or C2 communication.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.9

traits:
  - id: process-prng
    desc: Windows cryptographic PRNG (ProcessPrng)
    mbc: C0068
    if:
      type: symbol
      exact: ProcessPrng
    downgrade:
      any:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
