# WASI random_get — a WASM module's CSPRNG access. The only way a sandboxed
# WebAssembly module obtains secure entropy from the host; in a crypto-bearing
# payload it is the key/nonce source. Imported by most WASI builds, so baseline.
defaults:
  platforms: [windows, unix]
  for: [wasm]
traits:
  - id: wasi-random-get
    desc: WASM imports WASI CSPRNG
    crit: baseline
    conf: 0.8
    if:
      type: import
      exact: "random_get"
