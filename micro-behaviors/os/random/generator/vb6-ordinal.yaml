defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: vb6-ordinal-random-next
    desc: VB6 ordinal random-number helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 593'

  - id: vb6-ordinal-randomize
    desc: VB6 ordinal randomize helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 594'

composite_rules:
  - id: vb6-ordinal-runtime-prng
    desc: VB6 runtime ordinal pseudo-random generator
    crit: baseline
    conf: 0.94
    all:
      - id: metadata/binary/framework::vb6-application-framework
      - id: vb6-ordinal-random-next
      - id: vb6-ordinal-randomize
