# Cryptographic random number generation - Windows
# Used for encryption key generation
defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: crypt-gen-random
    desc: Generate cryptographic random bytes
    crit: notable
    conf: 0.9
    attack: "T1486"
    mbc: "C0027"
    if:
      type: symbol
      exact: "CryptGenRandom"
    unless:
      - type: basename
        regex: '(?i)\.pyd$'
  - id: rtl-gen-random
    desc: Generate random bytes (RtlGenRandom)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "RtlGenRandom"
  - id: bcrypt-gen-random
    desc: Generate random bytes via BCrypt
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: BCryptGenRandom
  - id: system-function-036
    desc: SystemFunction036 undocumented RNG alias
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: SystemFunction036
    unless:
      - id: metadata/signed/developer::microsoft
