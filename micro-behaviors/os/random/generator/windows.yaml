# Cryptographic random number generation - Windows
# Used for encryption key generation
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: vb6-rtc-randomize
    desc: VB6 randomize helper
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: rtcRandomize
  - id: vb6-rtc-random-next
    desc: VB6 random number helper
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: rtcRandomNext
  - id: crypt-gen-random
    desc: Generate cryptographic random bytes
    crit: notable
    conf: 0.9
    attack: "T1486"
    mbc: "C0027"
    if:
      type: text
      regex: (^|[./])CryptGenRandom$
    unless:
      - id: metadata/binary/metrics::many-exports-100
  - id: rtl-gen-random
    desc: Generate random bytes (RtlGenRandom)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "RtlGenRandom"

composite_rules:
  - id: vb6-runtime-prng
    desc: VB6 runtime PRNG helpers
    crit: baseline
    conf: 0.92
    all:
      - id: vb6-rtc-randomize
      - id: vb6-rtc-random-next
