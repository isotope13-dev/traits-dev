defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: baseline
traits:
  - id: math-random-call
    desc: Math.random invocation
    conf: 1.0
    if:
      type: symbol
      kind: call
      exact: Math.random
  - id: math-random-index
    desc: Math.random used for indexing (probabilistic character selection)
    conf: 1.0
    # `arr[Math.floor(Math.random()…)]` — a random array/string index. The
    # `[`-anchored `Math.floor(Math.random(` run is distinctive as source text.
    if:
      type: text
      regex: '\[\s*Math\.floor\s*\(\s*Math\.random\s*\('
