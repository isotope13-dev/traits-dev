# C# Random Number Generation Detection
# Detects instantiation and use of random number generators
defaults:
  platforms: [windows]
  crit: baseline
  for: [csharp]
traits:
  - id: random-instantiation
    desc: Random number generator instantiation
    conf: 0.7
    if:
      type: symbol

      kind: call

      regex: '(^|\\.)Random$'
  - id: random-next
    desc: Random.Next() method call
    conf: 0.7
    if:
      type: symbol
      substr: "Random.Next"
  - id: random-nextbytes
    desc: .NET Random.NextBytes method call
    crit: notable
    conf: 0.84
    for: [csharp, pe, dll]
    if:
      type: text
      exact: NextBytes
