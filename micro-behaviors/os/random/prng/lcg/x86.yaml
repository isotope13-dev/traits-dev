defaults:
  platforms:
    - windows
    - linux
    - macos
  for: [elf, macho, pe]
traits:
  - id: lcg-imul-constant
    desc: LCG PRNG multiplier 0x41C64E6D in code
    crit: component
    conf: 0.85
    arch:
      - x86
      - x86-64
    count_min: 3
    if:
      type: hex
      section: .text
      pattern: 69 ?? 6D 4E C6 41
  - id: lcg-addend-constant
    desc: LCG PRNG addend 0x3039 near multiplier
    crit: component
    arch:
      - x86
      - x86-64
    count_min: 3
    if:
      type: hex
      section: .text
      pattern: 05 39 30 00 00
composite_rules:
  - id: lcg-prng-engine
    desc: LCG PRNG engine (multiplier + addend constants)
    crit: baseline
    conf: 0.9
    all:
      - id: lcg-imul-constant
      - id: lcg-addend-constant
