defaults:
  platforms: [windows]
  for: [vbs]

traits:
  - id: vb6-rnd-randomize
    desc: VB6 Rnd seeded PRNG
    crit: baseline
    conf: 0.86
    if:
      type: text
      substr: Randomize

  - id: vb6-alnum-keygen
    desc: VB6 alphanumeric key generator
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Public Function GenKey(ByVal PassLength As Integer)

composite_rules:
  - id: vb6-rnd-alnum-key-generator
    desc: VB6 Rnd alphanumeric key generator
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/random/prng::vb6-rnd-randomize
      - id: micro-behaviors/os/random/prng::vb6-alnum-keygen
