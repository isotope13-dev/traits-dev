defaults:
  platforms: [windows]
  for: [c]

traits:
  - id: rdtsc-seed-source
    desc: Seeds PRNG from RDTSC in source
    crit: notable
    conf: 0.9
    size_min: 500
    if:
      type: text
      substr: db            0fh,31h
  - id: m-sequence-prng-source
    desc: Uses m-sequence PRNG helper in source
    crit: notable
    conf: 0.95
    size_min: 1000
    if:
      type: text
      word: __m_seq_gen
  - id: randomseed-state-source
    desc: Tracks mutable PRNG seed in source
    crit: component
    conf: 0.9
    size_min: 1000
    if:
      type: text
      word: randomseed
  - id: pkrng-banner-source
    desc: PKRNG generator banner in source
    crit: notable
    conf: 0.97
    size_min: 1000
    if:
      type: text
      substr: Random Number Generator (PKRNG)
composite_rules:
  - id: rdtsc-m-sequence-prng-source
    desc: RDTSC-seeded m-sequence PRNG source
    crit: suspicious
    conf: 0.98
    all:
      - id: rdtsc-seed-source
      - id: m-sequence-prng-source
      - id: randomseed-state-source
    any:
      - id: pkrng-banner-source
