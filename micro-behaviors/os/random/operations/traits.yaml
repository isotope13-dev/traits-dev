defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: dev-random
    desc: /dev/random access
    conf: 0.7
    if:
      type: text
      substr: /dev/random
  - id: rand-bytes
    desc: RAND_bytes function
    conf: 0.8
    if:
      type: text
      substr: RAND_bytes
  - id: getrandom
    desc: getrandom syscall
    conf: 0.8
    if:
      type: text
      substr: getrandom
  - id: arc4random
    desc: arc4random function
    conf: 0.8
    if:
      type: text
      substr: arc4random
  - id: getentropy
    desc: getentropy function
    conf: 0.8
    if:
      type: text
      substr: getentropy
  - id: secrandomcopybytes
    desc: SecRandomCopyBytes (macOS)
    conf: 0.8
    if:
      type: text
      substr: SecRandomCopyBytes
  - id: cryptdll-cdlocaterng
    desc: Windows cryptdll.dll CDLocateRng reference
    crit: notable
    conf: 0.8
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      substr: CDLocateRng
composite_rules:
  - id: secure-random
    desc: Secure random number generation
    conf: 0.8
    any:
      - id: micro-behaviors/os/random::urandom
      - id: dev-random
      - id: rand-bytes
      - id: getrandom
      - id: arc4random
      - id: getentropy
      - id: secrandomcopybytes
