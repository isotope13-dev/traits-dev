defaults:
  platforms: [unix, windows]
  for: [java, class]
  attack: T1115
traits:
  - id: java-awt-system-clipboard
    desc: Java AWT system clipboard access
    crit: component
    conf: 0.9
    if:
      type: text
      substr: getSystemClipboard
  - id: java-clipboard-get-contents
    desc: Java clipboard contents read
    crit: component
    conf: 0.88
    if:
      type: text
      substr: getContents
  - id: java-string-data-flavor
    desc: Java string clipboard flavor
    crit: component
    conf: 0.86
    if:
      type: text
      substr: stringFlavor
composite_rules:
  - id: java-clipboard-text-read
    desc: Java reads system clipboard text
    crit: notable
    conf: 0.93
    all:
      - id: java-awt-system-clipboard
      - id: java-clipboard-get-contents
    any:
      - id: java-string-data-flavor
    unless:
      - id: well-known/app/plantuml::vscode-extension-member
      - id: well-known/app/plantuml::jar-member
      - id: well-known/app/plantuml::clipboard-loop-class
