defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1115
  crit: notable
  conf: 0.85

traits:
  - id: vscode-paste-command
    desc: VS Code paste command invocation
    if:
      type: literal
      kind: string
      exact: "editor.action.clipboardPasteAction"

  - id: clipboard-saving-text
    desc: Clipboard saving text
    if:
      type: literal
      kind: string
      regex: 'saving.{0,16}clipboard|clipboard.{0,16}saving'
      case_insensitive: true

  - id: clipboard-backup-text
    desc: Clipboard backup text
    if:
      type: literal
      kind: string
      regex: 'backup.{0,16}clipboard|clipboard.{0,16}backup'
      case_insensitive: true

  - id: clipboard-restore-text
    desc: Clipboard restore text
    if:
      type: literal
      kind: string
      regex: 'restor(e|ing).{0,16}clipboard|clipboard.{0,16}restor(e|ing)'
      case_insensitive: true

composite_rules:
  - id: vscode-paste-with-input-automation
    desc: VS Code paste command combined with input automation
    crit: notable
    conf: 0.86
    all:
      - id: vscode-paste-command
    any:
      - id: micro-behaviors/hardware/input/keyboard/simulate::sendkeys-keystroke-injection
      - id: micro-behaviors/hardware/input/keyboard/simulate::osascript-keystroke-injection
      - id: clipboard-save-restore-text
  - id: clipboard-save-restore-text
    desc: Clipboard save or restore text
    crit: notable
    conf: 0.86
    any:
      - id: clipboard-saving-text
      - id: clipboard-backup-text
      - id: clipboard-restore-text
