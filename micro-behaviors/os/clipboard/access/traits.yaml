defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: open-clipboard
    desc: Open clipboard access
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: OpenClipboard
  - id: close-clipboard
    desc: Close clipboard
    crit: baseline
    conf: 0.65
    if:
      type: symbol
      exact: CloseClipboard
  - id: set-clipboard-data
    desc: Write data to clipboard
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: SetClipboardData
  - id: get-clipboard-data
    desc: Read data from clipboard
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: GetClipboardData
  - id: empty-clipboard
    desc: Clear clipboard contents
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: EmptyClipboard
  - id: clipboard-sequence-number
    desc: Poll clipboard change counter
    crit: notable
    conf: 0.85
    attack: T1115
    if:
      type: symbol
      exact: GetClipboardSequenceNumber
  - id: dotnet-add-clipboard-listener
    desc: Adds clipboard format listener (P/Invoke)
    crit: notable
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    platforms:
      - windows
      - macos
      - linux
      - unix
      - android
      - ios
    if:
      type: string_value
      exact: AddClipboardFormatListener
  - id: set-parent-api
    desc: SetParent API call
    crit: component
    if:
      type: string_value
      substr: SetParent
  - id: hwnd-message-const
    desc: HWND_MESSAGE constant
    crit: component
    if:
      type: string_value
      regex: IntPtr\(-3\)|HWND_MESSAGE
  - id: macos-nspasteboard-class
    desc: NSPasteboard class reference
    crit: notable
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    if:
      type: string_value
      substr: NSPasteboard
  - id: macos-general-pasteboard
    desc: generalPasteboard reference
    crit: notable
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    if:
      type: string_value
      substr: generalPasteboard
  - id: macos-pasteboard-items
    desc: Iterates macOS pasteboard items
    crit: notable
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    if:
      type: string_value
      substr: pasteboardItems
composite_rules:
  - id: dotnet-set-parent-message
    desc: Sets parent to HWND_MESSAGE for invisible window
    crit: notable
    conf: 0.9
    all:
      - id: set-parent-api
      - id: hwnd-message-const
  - id: macos-nspasteboard-access
    desc: Accesses macOS NSPasteboard
    crit: notable
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    any:
      - id: macos-nspasteboard-class
      - id: macos-general-pasteboard
