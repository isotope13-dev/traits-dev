defaults:
  platforms:
    - windows
  for:
    - pe
    - rust
traits:
  - id: open-clipboard
    desc: Open clipboard access
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: OpenClipboard
  - id: close-clipboard
    desc: Close clipboard
    crit: notable
    conf: 0.65
    if:
      type: symbol
      exact: CloseClipboard
  - id: set-clipboard-data
    desc: Write data to clipboard
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: SetClipboardData
  - id: get-clipboard-data
    desc: Read data from clipboard
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: GetClipboardData
  - id: is-clipboard-format-available
    desc: Check clipboard format availability
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: IsClipboardFormatAvailable
  - id: register-clipboard-format-a
    desc: Register custom clipboard format
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: RegisterClipboardFormatA
  - id: register-clipboard-format-w
    desc: Register custom clipboard format
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: RegisterClipboardFormatW
  - id: empty-clipboard
    desc: Clear clipboard contents
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: EmptyClipboard
  - id: open-clipboard-text
    desc: OpenClipboard string reference
    crit: notable
    conf: 0.74
    for: [binaries, source]
    if:
      type: text
      word: OpenClipboard
  - id: close-clipboard-text
    desc: CloseClipboard string reference
    crit: notable
    conf: 0.7
    for: [binaries, source]
    if:
      type: text
      word: CloseClipboard
  - id: set-clipboard-data-text
    desc: SetClipboardData string reference
    crit: notable
    conf: 0.78
    for: [binaries, source]
    if:
      type: text
      word: SetClipboardData
  - id: get-clipboard-data-text
    desc: GetClipboardData string reference
    crit: notable
    conf: 0.76
    for: [binaries, source]
    if:
      type: text
      word: GetClipboardData
  - id: empty-clipboard-text
    desc: EmptyClipboard string reference
    crit: notable
    conf: 0.74
    for: [binaries, source]
    if:
      type: text
      word: EmptyClipboard
  - id: unicode-text-format
    desc: Unicode clipboard text format constant
    crit: component
    conf: 0.76
    for: [source]
    if:
      type: text
      word: CF_UNICODETEXT
  - id: dotnet-clipboard-gettext-helper
    desc: Managed clipboard read helper
    crit: notable
    conf: 0.78
    if:
      type: text
      exact: ClipboardGetText
  - id: dotnet-clipboard-settext-helper
    desc: Managed clipboard write helper
    crit: notable
    conf: 0.78
    if:
      type: text
      exact: ClipboardSetText
  - id: dotnet-copy-to-clipboard-helper
    desc: Managed copy-to-clipboard helper
    crit: notable
    conf: 0.76
    if:
      type: text
      exact: CopyToClipboard
  - id: clipboard-sequence-number
    desc: Poll clipboard change counter
    crit: notable
    conf: 0.85
    attack: T1115
    if:
      type: symbol
      exact: GetClipboardSequenceNumber
  - id: dotnet-add-clipboard-listener
    desc: Adds clipboard format listener (P/Invoke)
    crit: notable
    conf: 0.9
    for: [scripts, binaries]
    platforms:
      - unix
      - windows
    if:
      type: text
      exact: AddClipboardFormatListener
  - id: hwnd-message-const
    desc: HWND_MESSAGE constant
    crit: component
    if:
      type: text
      regex: IntPtr\(-3\)|HWND_MESSAGE
  - id: macos-nspasteboard-class
    desc: NSPasteboard class reference
    crit: notable
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    if:
      type: text
      substr: NSPasteboard
  - id: macos-general-pasteboard
    desc: generalPasteboard reference
    crit: notable
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    if:
      type: text
      substr: generalPasteboard
  - id: macos-pasteboard-items
    desc: Iterates macOS pasteboard items
    crit: notable
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    if:
      type: text
      substr: pasteboardItems
  - id: dotnet-clipboard-class
    desc: Clipboard class or symbol reference
    crit: notable
    conf: 0.85
    for:
      - pe
      - csharp
    if:
      type: text
      word: Clipboard
    not:
      - substr: ClipboardFormat
      - substr: AddClipboardFormatListener
      - substr: RegisterClipboardFormat
      - substr: EmptyClipboard
      - substr: OpenClipboard
      - substr: CloseClipboard
      - substr: SetClipboardData
      - substr: GetClipboardData
      # MFC AppWizard resource strings (benign UI text)
      - substr: on the Clipboard
      - substr: to the Clipboard
      - substr: clipboard format
      - substr: Clipboard does not support
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::winforms-ui
        - id: objectives/anti-static/pack/detect::enigma-protector
composite_rules:
  - id: dotnet-set-parent-message
    desc: Sets parent to HWND_MESSAGE for invisible window
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/ui/window/manage/control::set-parent-api
      - id: hwnd-message-const
  - id: macos-nspasteboard-access
    desc: Accesses macOS NSPasteboard
    crit: suspicious
    conf: 0.8
    for:
      - macho
    platforms:
      - macos
    any:
      - id: macos-nspasteboard-class
      - id: macos-general-pasteboard
  - id: register-clipboard-format
    desc: Custom clipboard format registration
    crit: notable
    conf: 0.78
    any:
      - id: register-clipboard-format-a
      - id: register-clipboard-format-w
  - id: win32-clipboard-read-write
    desc: Win32 clipboard read and write access
    crit: notable
    conf: 0.82
    for: [binaries, source]
    all:
      - id: open-clipboard-text
    any:
      - id: set-clipboard-data-text
      - id: get-clipboard-data-text
      - id: empty-clipboard-text
  - id: win32-unicode-clipboard-read
    desc: Win32 Unicode clipboard text read
    crit: notable
    conf: 0.9
    for: [source, pe]
    all:
      - id: open-clipboard
      - id: is-clipboard-format-available
      - id: get-clipboard-data
      - id: unicode-text-format
  - id: dotnet-clipboard-read-write-helper
    desc: .NET clipboard read/write helpers
    crit: notable
    conf: 0.82
    any:
      - id: dotnet-copy-to-clipboard-helper
      - id: dotnet-clipboard-gettext-helper
      - id: dotnet-clipboard-settext-helper
