# Command-line clipboard tools. `clip.exe` is the built-in Windows utility whose
# sole purpose is to place piped stdin onto the clipboard; scripts (JScript/VBS
# under WSH, batch, PowerShell) reach the clipboard by shelling out to it. This
# is a neutral write capability — intent (clipboard hijacking, exfil) lives in
# objectives/ composites that reference it.
defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1115
traits:
  - id: clip-exe-command-ref
    desc: clip.exe command reference
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(^|[\s"`''&;<>])clip\.exe(\s|[&;<>]|$)'
    unless:
      - type: text
        substr: clip.exe /?
  - id: pipe-to-clip-command
    desc: Shell pipe to clip command
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\|\s*clip(\.exe)?\b(\s|[&;<>]|$)'

  - id: dotnet-pbpaste-read
    desc: Reads clipboard via pbpaste
    crit: notable
    conf: 0.9
    platforms: [unix, windows]
    for: [pe]
    if:
      type: text
      exact: pbpaste

  - id: dotnet-pbcopy-write
    desc: Writes clipboard via pbcopy
    crit: notable
    conf: 0.9
    platforms: [unix, windows]
    for: [pe]
    if:
      type: text
      exact: pbcopy

  - id: dotnet-xclip-program
    desc: .NET xclip program token
    crit: component
    conf: 0.78
    platforms: [unix, windows]
    for: [pe]
    if:
      type: text
      exact: xclip

  - id: dotnet-clip-program
    desc: .NET clip program token
    crit: component
    conf: 0.8
    platforms: [unix, windows]
    for: [pe]
    if:
      type: text
      exact: clip

composite_rules:
  - id: clip-exe-write
    desc: Writes clipboard via clip.exe
    crit: notable
    conf: 0.8
    any:
      - id: clip-exe-command-ref
      - id: pipe-to-clip-command

  - id: dotnet-xclip-read
    desc: Reads clipboard via xclip
    crit: notable
    conf: 0.88
    platforms: [unix, windows]
    for: [pe]
    near_bytes: 16384
    all:
      - id: dotnet-xclip-program
      - id: micro-behaviors/process/io/buffer::run-process-output-helper

  - id: dotnet-xclip-write
    desc: Writes clipboard via xclip
    crit: notable
    conf: 0.88
    platforms: [unix, windows]
    for: [pe]
    near_bytes: 16384
    all:
      - id: dotnet-xclip-program
      - id: micro-behaviors/process/io/buffer::run-process-input-helper

  - id: dotnet-clip-write
    desc: Writes clipboard via clip
    crit: notable
    conf: 0.9
    platforms: [unix, windows]
    for: [pe]
    near_bytes: 16384
    all:
      - id: dotnet-clip-program
      - id: micro-behaviors/process/io/buffer::run-process-input-helper
