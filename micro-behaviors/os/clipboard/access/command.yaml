# Command-line clipboard tools. `clip.exe` is the built-in Windows utility whose
# sole purpose is to place piped stdin onto the clipboard; scripts (JScript/VBS
# under WSH, batch, PowerShell) reach the clipboard by shelling out to it. This
# is a neutral write capability — intent (clipboard hijacking, exfil) lives in
# objectives/ composites that reference it.
defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1115
traits:
  - id: clip-exe-command-ref
    desc: clip.exe command reference
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(^|[\s"`''&;<>])clip\.exe(\s|[&;<>]|$)'
    unless:
      - type: text
        substr: clip.exe /?
  - id: pipe-to-clip-command
    desc: Shell pipe to clip command
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\|\s*clip(\.exe)?\b(\s|[&;<>]|$)'

composite_rules:
  - id: clip-exe-write
    desc: Writes clipboard via clip.exe
    crit: notable
    conf: 0.8
    any:
      - id: clip-exe-command-ref
      - id: pipe-to-clip-command
