# PowerShell clipboard-read capability. The Get-Clipboard cmdlet reads the
# current clipboard contents; it is a neutral capability used by both benign
# tooling and clipboard stealers (intent lives in objectives/collection).
defaults:
  platforms: [windows]
  for: [powershell, pe]
  attack: T1115
traits:
  - id: powershell-get-clipboard
    desc: PowerShell Get-Clipboard cmdlet
    crit: notable
    conf: 0.7
    if:
      type: text
      section: .text
      substr: Get-Clipboard
    unless:
      - type: raw
        regex: fish_clipboard_paste|powershell\.exe Get-Clipboard|string collect -N
