defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1115
traits:
  - id: node-pbpaste-read
    desc: Reads clipboard via pbpaste
    crit: notable
    conf: 0.95
    if:
      type: literal
      substr: pbpaste
    unless:
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: well-known/lib/clipboardy::clipboardy-package-path
      - id: well-known/app/qwen-code::qwen-code-bundle-text
      - id: well-known/app/guangnao-agent-cli::guangnao-agent-cli-context
  - id: node-powershell-get-clipboard
    desc: Reads clipboard via PowerShell
    crit: notable
    conf: 0.95
    if:
      type: literal
      regex: powershell.{0,50}Get-Clipboard
  - id: node-xclip-read
    desc: Reads clipboard via xclip
    crit: notable
    conf: 0.95
    if:
      type: literal
      regex: 'xclip.{0,80}(-o|-out|--out)'
    not:
      - substr: "pbcopy/xclip"
      - substr: "xclip/pbcopy"
  - id: node-pbcopy-write
    desc: Writes clipboard via pbcopy
    crit: notable
    conf: 0.9
    if:
      type: literal
      substr: pbcopy
    not:
      - substr: "pbcopy/xclip"
      - substr: "xclip/pbcopy"
  - id: node-xclip-write
    desc: Writes clipboard via xclip
    crit: notable
    conf: 0.95
    if:
      type: literal
      regex: 'xclip\s+-selection\s+clipboard'
    not:
      - regex: '(-o|-out|--out)'
      - substr: "pbcopy/xclip"
      - substr: "xclip/pbcopy"
  - id: node-set-clipboard-write
    desc: Writes clipboard via Set-Clipboard
    crit: notable
    conf: 0.95
    if:
      type: literal
      substr: Set-Clipboard
composite_rules:
  - id: node-cli-clipboard-read
    desc: Reads clipboard via CLI helper
    crit: notable
    conf: 0.9
    any:
      - id: node-pbpaste-read
      - id: node-xclip-read
      - id: node-powershell-get-clipboard
  - id: node-cli-clipboard-write
    desc: Writes clipboard via CLI helper
    crit: notable
    conf: 0.9
    any:
      - id: node-pbcopy-write
      - id: node-xclip-write
      - id: node-set-clipboard-write
