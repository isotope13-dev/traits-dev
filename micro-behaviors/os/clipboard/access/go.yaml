defaults:
  platforms: [windows]
  for: [pe]
  attack: T1115

traits:
  - id: go-clipboard-fragment
    desc: Go binary clipboard string fragment
    crit: component
    conf: 0.76
    size_max: 52428800
    if:
      type: text
      substr: clipboar

composite_rules:
  - id: go-clipboard-with-process-exec
    desc: Go binary references clipboard and process execution
    crit: notable
    conf: 0.82
    size_max: 52428800
    scope: leaf
    all:
      - id: go-clipboard-fragment
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
