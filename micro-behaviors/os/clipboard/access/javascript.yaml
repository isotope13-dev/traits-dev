defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: T1115
traits:
  - id: browser-execcommand-copy
    desc: Browser execCommand clipboard copy
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "document\\.execCommand\\s*\\(\\s*['\"]copy['\"]"
  - id: browser-clipboard-write
    desc: Writes to the browser clipboard
    crit: notable
    conf: 0.92
    if:
      type: symbol
      regex: '(^|\.)(navigator|browser)\.clipboard\.writeText$'
  - id: browser-clipboard-read
    desc: Reads from the browser clipboard
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: navigator.clipboard.readText
  - id: browser-clipboarddata-get
    desc: Browser paste clipboardData read
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "clipboardData\\.getData\\s*\\("
  - id: browser-paste-event-handler
    desc: Browser paste event handler
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "(addEventListener\\s*\\(\\s*['\"]paste['\"]|\\bonpaste\\s*=)"
  - id: browser-execcommand-inserttext
    desc: Browser execCommand text insertion
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: "document\\.execCommand\\s*\\(\\s*['\"]insertText['\"]"
  - id: browser-obfuscated-execcommand-copy
    desc: Obfuscated browser clipboard copy command
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'execCommand.{0,80}99\s*,\s*111\s*,\s*112\s*,\s*121'
  - id: browser-select-before-copy
    desc: Calls select() on a browser element
    crit: component
    conf: 0.78
    if:
      type: symbol
      regex: "\\.select$"
composite_rules:
  - id: browser-clipboard-copy-command
    desc: Browser clipboard copy command
    crit: notable
    conf: 0.92
    any:
      - id: browser-execcommand-copy
      - id: browser-obfuscated-execcommand-copy
  - id: browser-dom-clipboard-copy
    desc: Browser DOM clipboard copy flow
    crit: notable
    conf: 0.9
    all:
      - id: browser-clipboard-copy-command
    any:
      - id: browser-clipboard-write
      - id: browser-select-before-copy
      - id: browser-obfuscated-execcommand-copy
  - id: browser-dom-clipboard-paste
    desc: Browser DOM clipboard paste flow
    crit: notable
    conf: 0.9
    all:
      - id: browser-paste-event-handler
    any:
      - id: browser-clipboard-read
      - id: browser-clipboarddata-get
      - id: browser-execcommand-inserttext
