defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: T1115
traits:
  - id: browser-execcommand-copy
    desc: Browser execCommand clipboard copy
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "document\\.execCommand\\s*\\(\\s*['\"]copy['\"]"
  - id: browser-clipboard-write
    desc: Browser clipboard write API
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: navigator.clipboard.writeText
  - id: browser-clipboard-read
    desc: Browser clipboard read API
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: navigator.clipboard.readText
  - id: browser-clipboarddata-get
    desc: Browser paste clipboardData read
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "clipboardData\\.getData\\s*\\("
  - id: browser-paste-event-listener
    desc: Browser paste event listener
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "addEventListener\\s*\\(\\s*['\"]paste['\"]"
  - id: browser-execcommand-inserttext
    desc: Browser execCommand text insertion
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: "document\\.execCommand\\s*\\(\\s*['\"]insertText['\"]"
  - id: browser-textarea-copy-staging
    desc: Browser stages text for clipboard copy
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "createElement\\s*\\(\\s*['\"]textarea['\"]"
  - id: browser-select-before-copy
    desc: Browser selects text for clipboard copy
    crit: component
    conf: 0.78
    if:
      type: symbol
      regex: "\\.select$"
composite_rules:
  - id: browser-dom-clipboard-copy
    desc: Browser DOM clipboard copy flow
    crit: notable
    conf: 0.9
    all:
      - id: browser-execcommand-copy
    any:
      - id: browser-clipboard-write
      - id: browser-textarea-copy-staging
      - id: browser-select-before-copy
  - id: browser-dom-clipboard-paste
    desc: Browser DOM clipboard paste flow
    crit: notable
    conf: 0.9
    all:
      - id: browser-paste-event-listener
    any:
      - id: browser-clipboard-read
      - id: browser-clipboarddata-get
      - id: browser-execcommand-inserttext
