defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: T1115
traits:
  - id: browser-execcommand-copy
    desc: Browser execCommand clipboard copy
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "document\\.execCommand\\s*\\(\\s*['\"]copy['\"]"
  - id: browser-clipboard-write
    desc: Browser clipboard write API
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: navigator.clipboard.writeText
  - id: browser-textarea-copy-staging
    desc: Textarea staged clipboard copy
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "createElement\\s*\\(\\s*['\"]textarea['\"]"
  - id: browser-select-before-copy
    desc: Selects DOM text before copy
    crit: component
    conf: 0.78
    if:
      type: symbol
      regex: "\\.select$"
composite_rules:
  - id: browser-dom-clipboard-copy
    desc: Browser DOM clipboard copy flow
    crit: notable
    conf: 0.9
    all:
      - id: browser-execcommand-copy
    any:
      - id: browser-clipboard-write
      - id: browser-textarea-copy-staging
      - id: browser-select-before-copy
