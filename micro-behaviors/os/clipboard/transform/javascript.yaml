defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: T1115
traits:
  - id: browser-clipboard-write-transformed-text
    desc: Browser clipboard write of transformed text
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'navigator\.clipboard\.writeText\s*\([^)]{0,240}\.replace\s*\('
