defaults:
  platforms: [windows]
  for: [python]
  attack: T1115
  crit: notable
  conf: 0.9

traits:
  - id: python-add-clipboard-format-listener
    desc: Python registers a Win32 clipboard listener
    if:
      type: symbol
      kind: call
      regex: '(^|\.)AddClipboardFormatListener$'
  - id: python-get-clipboard-data-call
    desc: Python reads Win32 clipboard data
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetClipboardData$'
  - id: python-get-message-call
    desc: Python receives Win32 window messages
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetMessageW$'
