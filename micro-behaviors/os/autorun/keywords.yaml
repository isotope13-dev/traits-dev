defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
    - python
  crit: notable
  conf: 0.5
traits:
  - id: startup-keyword
    desc: Startup directory keyword
    if:
      type: string_value
      word: Startup
  - id: launchd-keyword
    desc: launchd keyword
    if:
      type: string_value
      word: launchd
