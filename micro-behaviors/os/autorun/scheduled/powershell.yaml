# Neutral PowerShell scheduled-task API and trigger observations.
defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9

traits:
  - id: register-scheduledtask
    desc: Registers a Windows scheduled task
    if:
      type: text
      regex: '(^|[^\{A-Za-z0-9_-])Register-ScheduledTask\b'
      case_insensitive: true

  - id: new-scheduledtaskaction
    desc: Builds a scheduled-task action
    if:
      type: text
      substr: New-ScheduledTaskAction
      case_insensitive: true

  - id: new-scheduledtasktrigger
    desc: Builds a scheduled-task trigger
    if:
      type: text
      substr: New-ScheduledTaskTrigger
      case_insensitive: true

  - id: new-scheduledtask-principal-system
    desc: Assigns a scheduled task to SYSTEM
    conf: 0.93
    if:
      type: text
      regex: 'New-ScheduledTaskPrincipal[\s\S]{0,240}-UserId\s+["'']?SYSTEM'
      case_insensitive: true

  - id: new-scheduledtask-principal-local-system
    desc: Assigns a scheduled task to LocalSystem
    conf: 0.93
    if:
      type: text
      regex: 'New-ScheduledTaskPrincipal[\s\S]{0,240}LocalSystem'
      case_insensitive: true

  - id: new-scheduledtask-principal-authority-system
    desc: Assigns task to NT AUTHORITY SYSTEM
    conf: 0.93
    if:
      type: text
      regex: 'New-ScheduledTaskPrincipal[\s\S]{0,240}NT AUTHORITY\\SYSTEM'
      case_insensitive: true

  - id: schtask-runlevel-highest
    desc: Requests highest scheduled-task run level
    if:
      type: text
      regex: -RunLevel\s+Highest\b
      case_insensitive: true

  - id: schtask-trigger-at-startup
    desc: Creates an at-startup task trigger
    crit: component
    if:
      type: text
      regex: New-ScheduledTaskTrigger\b[^\n]{0,80}-AtStartup\b
      case_insensitive: true

  - id: schtask-trigger-at-logon
    desc: Creates an at-logon task trigger
    crit: component
    if:
      type: text
      regex: New-ScheduledTaskTrigger\b[^\n]{0,80}-AtLogon\b
      case_insensitive: true

  - id: scheduledtask-repeating-trigger-encoded
    desc: Scheduled task repetition trigger
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: New-ScheduledTaskTrigger\b[^\n]{0,160}-RepetitionInterval\b
      case_insensitive: true

  - id: scheduledtask-hidden-settings-encoded
    desc: Creates hidden scheduled-task settings
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: New-ScheduledTaskSettingsSet\b[^\n]{0,160}-Hidden\b
      case_insensitive: true

  - id: new-scheduledtaskaction-encoded
    desc: Decoded layer builds scheduled-task action
    crit: notable
    conf: 0.97
    for: [oledoc]
    attack: T1053.005
    if:
      type: encoded
      encoding: base64
      substr: New-ScheduledTaskAction
      case_insensitive: true
  - id: new-scheduledtasktrigger-encoded
    desc: Decoded layer builds scheduled-task trigger
    crit: notable
    conf: 0.97
    for: [oledoc]
    attack: T1053.005
    if:
      type: encoded
      encoding: base64
      substr: New-ScheduledTaskTrigger
      case_insensitive: true
  - id: register-scheduledtask-encoded
    desc: Decoded layer registers a scheduled task
    crit: notable
    conf: 0.97
    for: [oledoc]
    attack: T1053.005
    if:
      type: encoded
      encoding: base64
      substr: Register-ScheduledTask
      case_insensitive: true
  - id: scheduledtask-repetition-interval-encoded
    desc: Decoded layer sets task repetition interval
    crit: notable
    conf: 0.97
    for: [oledoc]
    attack: T1053.005
    if:
      type: encoded
      encoding: base64
      substr: -RepetitionInterval
      case_insensitive: true

  - id: scheduledtask-repeating-trigger-encoded
    desc: Decoded repeating task trigger
    crit: notable
    conf: 0.97
    for: [oledoc]
    attack: T1053.005
    if:
      type: encoded
      encoding: base64
      regex: '-(RepetitionInterval|RepetitionDuration)\b'
      case_insensitive: true

  - id: scheduledtask-hidden-settings-encoded
    desc: Decoded hidden task settings
    crit: notable
    conf: 0.97
    for: [oledoc]
    attack: T1053.005
    if:
      type: encoded
      encoding: base64
      regex: 'New-ScheduledTaskSettingsSet[\s\S]{0,160}-Hidden\b'
      case_insensitive: true

composite_rules:
  - id: scheduled-task-registration
    desc: Registers a Windows scheduled task
    crit: notable
    conf: 0.92
    all:
      - id: register-scheduledtask
    any:
      - id: new-scheduledtaskaction
      - id: new-scheduledtasktrigger
