# Neutral Python crontab operations. Intent-specific persistence composites
# should combine these capabilities with self-installation or payload context.
defaults:
  platforms: [unix]
  for: [python, pyc]
  crit: notable
  conf: 0.9

traits:
  - id: crontab-install-command
    desc: Python installs crontab from standard input
    if:
      type: text
      regex: '\["crontab",\s*"-"\]'

  - id: crontab-shell-pipe
    desc: Python shell-pipes a cron entry into crontab
    if:
      type: text
      regex: 'crontab -l[\s\S]{0,220}\|\s*crontab -'
