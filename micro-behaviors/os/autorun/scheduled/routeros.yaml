defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, pyc, javascript]
  attack: T1053
  mbc: OB0007

traits:
  - id: routeros-system-script-add
    desc: Creates a RouterOS system script
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(/system[ /]script[ /]add|api\.menu\([''"]/system/script[''"]\)\.add)'
  - id: routeros-system-scheduler-add
    desc: Creates a RouterOS scheduler entry
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(/system[ /]scheduler[ /]add|api\.menu\([''"]/system/scheduler[''"]\)\.add)'
  - id: routeros-script-run
    desc: Runs a RouterOS system script
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(/system[ /]script run|on-event=.{0,120}system script run)'
