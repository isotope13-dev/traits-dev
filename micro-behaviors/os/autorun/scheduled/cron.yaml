defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.5
traits:
  - id: crontab-keyword
    desc: crontab keyword
    if:
      type: text
      word: crontab
    unless:
      - id: metadata/file/text::roff-document
      - id: metadata/file/text::neovim-filetype-registry
