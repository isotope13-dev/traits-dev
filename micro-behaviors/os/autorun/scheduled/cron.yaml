defaults:
  platforms: [unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.5
traits:
  - id: crontab-keyword
    desc: References cron job scheduling
    if:
      type: text
      word: crontab
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format/
      - id: metadata/file/catalog/identity/
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: crontab-remove
    desc: Removes the current user's crontab
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcrontab\s+-r\b'
  - id: crontab-wildcard-entry
    desc: Wildcard crontab entry with command
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?m)(^|["''])[ \t]*(\*[ \t]+){4}\*[ \t]+(\.?/|\$|[A-Za-z_])[^\r\n]{0,500}$'
