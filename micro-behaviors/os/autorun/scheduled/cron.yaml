defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.5
traits:
  - id: crontab-keyword
    desc: "cron job scheduling reference"
    if:
      type: text
      word: crontab
    unless:
      - id: metadata/file/format::roff-document
      - id: metadata/file/catalog/identity::neovim-filetype-registry
