# Persistence marker strings and Windows Maintenance path references.
# These are attack-context-specific fragments that have no meaning outside
# of malware persistence mechanisms. Combined in objectives/persistence/
# composites for full detection.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
  attack: T1053.005
  mbc: F0012
traits:
  - id: schtasks-utility-token
    desc: Windows schtasks utility reference
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: notable
    conf: 0.7
    if:
      type: text
      word: schtasks
  - id: persist-marker
    desc: Persistence configuration marker string
    if:
      type: text
      exact: "[PERSIST:1]"
  - id: windows-maintenance-path
    desc: "Win Maintenance scheduled task path reference"
    if:
      type: text
      substr: "\\Microsoft\\Windows\\Maintenance\\"

  - id: powershell-scheduled-task-arguments
    desc: Scheduled task action arguments read
    crit: notable
    conf: 0.93
    for: [powershell]
    if:
      type: text
      regex: '\.Actions\s*\.\s*Arguments'

  - id: powershell-schtasks-xml-create
    desc: Scheduled task XML creation
    crit: notable
    conf: 0.95
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)schtasks\s+/create[^\r\n]{0,180}/xml'
