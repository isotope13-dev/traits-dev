# Neutral Windows scheduled-task capabilities and persistence-related markers.
# Objective rules combine these observations with intent-specific evidence.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
  attack: T1053.005
  mbc: F0012
traits:
  - id: schtasks-utility-token
    desc: Windows schtasks utility reference
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: notable
    conf: 0.7
    if:
      type: text
      word: schtasks
  - id: persist-marker
    desc: Persistence configuration marker string
    if:
      type: text
      exact: "[PERSIST:1]"
  - id: windows-maintenance-path
    desc: "Win Maintenance scheduled task path reference"
    if:
      type: text
      substr: "\\Microsoft\\Windows\\Maintenance\\"

  - id: powershell-scheduled-task-arguments
    desc: Scheduled task action arguments read
    crit: notable
    conf: 0.93
    for: [powershell]
    if:
      type: text
      regex: '\.Actions\s*\.\s*Arguments'

  - id: powershell-schtasks-xml-create
    desc: Scheduled task XML creation
    crit: notable
    conf: 0.95
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)schtasks\s+/create[^\r\n]{0,180}/xml'

  - id: schtasks-create-cmd
    desc: Windows schtasks create command
    crit: notable
    conf: 0.92
    for: [pe, dll, powershell, batch, csharp, python, java, class, java_class]
    if:
      type: text
      regex: '(?i)schtasks\s*/create'

  - id: schtasks-runlevel-highest
    desc: Scheduled task requests highest run level
    crit: notable
    conf: 0.9
    for: [pe, dll, powershell, batch, csharp, python, go, class]
    if:
      type: text
      regex: '(?i)schtasks(\.exe)?[^\r\n]{0,200}/rl\s+highest\b'

  - id: schtasks-system-runas
    desc: Scheduled task runs as SYSTEM
    crit: notable
    conf: 0.92
    for: [pe, dll, powershell, batch, csharp, python, go, class]
    if:
      type: text
      regex: '(?i)schtasks(\.exe)?[^\r\n]{0,200}/ru\s+["\x27]?(SYSTEM|NT AUTHORITY\\SYSTEM)["\x27]?'

  - id: schtasks-force-flag
    desc: Scheduled task command uses force flag
    crit: notable
    conf: 0.9
    for: [pe, dll, powershell, batch, csharp, python, go, class]
    if:
      type: text
      regex: '(?i)schtasks(\.exe)?[^\r\n]{0,120}/f\b'

  - id: schtasks-exe-create
    desc: Windows schtasks.exe create command
    crit: notable
    conf: 0.92
    for: [pe, dll, powershell, batch, csharp, python, java, class, java_class]
    if:
      type: text
      regex: '(?i)schtasks\.exe.{0,30}create'

  - id: itaskscheduler-interface
    desc: ITaskScheduler interface reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ITaskScheduler
    unless:
      - id: metadata/signed/platform::microsoft

  - id: task-scheduler-keyword
    desc: Windows TaskScheduler API keyword
    crit: notable
    conf: 0.85
    if:
      type: text
      word: TaskScheduler
