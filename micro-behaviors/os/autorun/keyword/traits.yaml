defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.5
traits:
  - id: startup-keyword
    desc: Startup directory keyword
    crit: baseline
    if:
      type: text
      word: Startup
  - id: launchd-keyword
    desc: References the macOS launchd service manager
    if:
      type: text
      word: launchd
