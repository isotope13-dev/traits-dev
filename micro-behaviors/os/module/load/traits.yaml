defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: disable-thread-library-calls
    desc: Suppress DLL thread attach notifications
    crit: baseline
    conf: 0.85
    mbc: "F0004"
    if:
      type: symbol
      exact: DisableThreadLibraryCalls
    unless:
      - type: basename
        regex: '.*\.ax$'
      - type: exports_count
        min: 100
  - id: get-module-handle-ansi
    desc: Get module handle ANSI
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetModuleHandleA
  - id: get-module-handle-wide
    desc: Get module handle Unicode
    crit: baseline
    conf: 0.78
    if:
      type: symbol
      exact: GetModuleHandleW
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: string_value
        substr: "Nullsoft Install System"
  - id: get-module-handle-ex
    desc: Get extended module handle
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      regex: ^GetModuleHandleEx[AW]$
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: string_value
        substr: "Nullsoft Install System"
  - id: get-module-filename-dup
    desc: Get module file path
    crit: baseline
    conf: 0.7
    if:
      type: text
      exact: GetModuleFileNameW
  - id: get-module-filename-ansi
    desc: Get module file path (ANSI)
    crit: baseline
    conf: 0.7
    if:
      type: text
      exact: GetModuleFileNameA
  - id: free-library
    desc: Unload dynamic library
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: FreeLibrary
  - id: get-current-process
    desc: Get current process handle
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetCurrentProcess
composite_rules:
  - id: self-module-resolution
    desc: Resolve own module handle variants
    crit: notable
    conf: 0.84
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/framework::electron-desktop-runtime
    any:
      - id: get-module-handle-ansi
      - id: get-module-handle-wide
      - id: get-module-handle-ex
