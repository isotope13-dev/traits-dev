defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: node-module-wrap-override
    desc: Overrides Node module wrapper
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "require\\(['\"]module['\"]\\)\\.wrap\\s*="

  - id: node-require-wrapper-prototype
    desc: Wraps Node require function
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "Object\\.setPrototypeOf\\(function\\s+\\w*WrappedRequire"

  - id: node-require-function-rebind
    desc: Rebinds Node require function
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "require\\s*=\\s*\\(function\\s*\\(req\\)"

