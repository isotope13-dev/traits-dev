defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: get-proc-address-import
    desc: Resolve exports with GetProcAddress
    crit: baseline
    conf: 0.9
    if:
      type: import
      exact: "GetProcAddress"
    downgrade:
      any:
        - type: text
          substr: clangd
        - type: text
          substr: clang
        - type: text
          substr: llvm
        # Go's windows syscall package statically links GetProcAddress for
        # lazy-bound DLL imports — every Go Windows binary imports it.
        - id: metadata/lang/compiled/
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: get-proc-address-reference
    desc: GetProcAddress API reference
    crit: baseline
    conf: 0.88
    if:
      type: text
      word: GetProcAddress
composite_rules:
  - id: dynamic-self-resolution-imports
    desc: Dynamically resolve own modules and exports
    crit: baseline
    conf: 0.92
    all:
      - id: get-proc-address-import
    any:
      - id: micro-behaviors/os/module/load::get-module-handle-ansi
      - id: micro-behaviors/os/module/load::get-module-handle-wide
      - id: micro-behaviors/os/module/load::get-module-handle-ex
