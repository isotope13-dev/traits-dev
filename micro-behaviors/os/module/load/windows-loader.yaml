defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: uninstall-exe-basename
    desc: Uninstall executable basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: '^Uninstall .{1,50}\.exe$'
  - id: get-proc-address-import
    desc: Resolve exports with GetProcAddress
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "GetProcAddress"
    unless:
      - id: metadata/binary/metrics::many-imports
      - type: text
        regex: '(clangd|clang|llvm|ELECTRON_ENABLE_LOGGING)'
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: micro-behaviors/os/module/load::uninstall-exe-basename
      - type: basename
        exact: elevate.exe
composite_rules:
  - id: dynamic-self-resolution-imports
    desc: Dynamically resolve own modules and exports
    crit: notable
    conf: 0.92
    all:
      - id: get-proc-address-import
    any:
      - id: micro-behaviors/os/module/load::get-module-handle-wide
      - id: micro-behaviors/os/module/load::get-module-handle-ex
