defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: get-proc-address-import
    desc: Resolve exports with GetProcAddress
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "GetProcAddress"
    unless:
      - type: text
        substr: clangd
      - type: text
        substr: clang
      - type: text
        substr: llvm
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
composite_rules:
  - id: dynamic-self-resolution-imports
    desc: Dynamically resolve own modules and exports
    crit: notable
    conf: 0.92
    all:
      - id: get-proc-address-import
    any:
      - id: micro-behaviors/os/module/load::get-module-handle-wide
      - id: micro-behaviors/os/module/load::get-module-handle-ex
