defaults:
  platforms: [windows]
  for: [binaries]

traits:
  - id: disable-thread-library-calls
    desc: Disable DLL thread notifications
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: DisableThreadLibraryCalls
  - id: uninstall-exe-basename
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_uninstall_exe_basename__
