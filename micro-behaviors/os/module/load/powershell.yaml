defaults:
  platforms: [windows]
  for: [powershell]
traits:
  - id: powershell-install-module
    desc: Installs a PowerShell module
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: Install-Module

  - id: powershell-skip-publisher-check
    desc: Bypasses PowerShell module publisher validation
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: -SkipPublisherCheck

  - id: powershell-ad-gpo-module
    desc: Loads AD/GPO PowerShell module
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: Rsat\.(ActiveDirectory|GroupPolicy)|Import-Module\s+(ActiveDirectory|GroupPolicy)
      case_insensitive: true
    unless:
      - id: well-known/lib/powerforge/
