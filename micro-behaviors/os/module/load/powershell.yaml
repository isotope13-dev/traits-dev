defaults:
  platforms: [windows]
  for: [powershell]
traits:
  - id: powershell-ad-gpo-module
    desc: Loads AD/GPO PowerShell module
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: Rsat\.(ActiveDirectory|GroupPolicy)|Import-Module\s+(ActiveDirectory|GroupPolicy)
      case_insensitive: true
    unless:
      - id: well-known/lib/powerforge/
