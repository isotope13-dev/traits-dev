defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: sys-path-mutate
    desc: Modifies module search path (sys.path)
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      regex: '^sys\.path\.(insert|append|extend)$'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
