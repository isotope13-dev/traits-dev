defaults:
  platforms: [unix, windows, macos]
  for: [c, cpp, pe, elf, shell]
traits:
  - id: int-vector-calc-asm
    desc: DOS Interrupt Vector Calculation (Assembly)
    crit: notable
    if:
      type: raw
      regex: 'mov\s+si,4\*(13|21)'
  - id: ivt-direct-write-asm
    desc: Direct IVT entry modification (Assembly)
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      regex: '(?i)(ds:\[13h\*4\]|13h\*4|int 13h vector)'
