defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.6

traits:
  - id: disk-free-space
    desc: Checks available disk space
    if:
      type: symbol
      kind: call
      exact: disk_free_space

  - id: disk-total-space
    desc: Checks total disk space
    if:
      type: symbol
      kind: call
      exact: disk_total_space
