defaults:
  platforms:
    - unix
    - android
  for: [scripts, binaries]
traits:
  - id: esxcli-vm-list
    desc: Reference to ESXi VM process list command
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: esxcli vm process list
  - id: vim-cmd-tool
    desc: VMware vim-cmd administration tool
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: vim-cmd
  - id: esxcli-tool
    desc: ESXi command-line administration tool
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: esxcli
  - id: vim-cmd-vmsvc
    desc: VMware vmsvc administration command
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: vim-cmd vmsvc
  - id: vmsvc-getallvms
    desc: VMware VM enumeration command
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: vmsvc/getallvms
  - id: vmware-extensions-core-a
    desc: VMware VMDK disk-image path or filename
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\\/])[^\r\n]{1,120}\.vmdk(?=$|[\s"''`])'
  - id: vmware-extensions-core-a-vmx
    desc: VMware VMX configuration path or filename
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\\/])[^\r\n]{1,120}\.vmx(?=$|[\s"''`])'
  - id: vmware-extensions-core-a-vmsd
    desc: VMware VMSD snapshot-metadata path or filename
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\\/])[^\r\n]{1,120}\.vmsd(?=$|[\s"''`])'
  - id: vmware-extensions-core-a-vmsn
    desc: VMware VMSN snapshot-state path or filename
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\\/])[^\r\n]{1,120}\.vmsn(?=$|[\s"''`])'
  - id: vmware-extensions-core-b
    desc: "VMware VM files: .vswp/.vmem/.nvram/.vmxf"
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \.(vswp|vmem|nvram|vmxf)\b
  - id: vmfs-path
    desc: Reference to VMware VMFS volumes path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /vmfs/
  - id: vm-world-id
    desc: Reference to ESXi VM World ID
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'World ID:|VM:.{0,20}ID:|Running VM:'
  - id: esxcli-vm-kill
    desc: Reference to ESXi VM process kill commands
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: esxcli\s+vm\s+process\s+kill
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: vimcmd-snapshot-remove
    desc: Reference to VMware snapshot removal command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: vim-cmd.{0,30}snapshot\.remove
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: esxi-world-id-param
    desc: VMware CLI world-id argument
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'esxcli.{0,160}--world-id|--world-id.{0,160}esxcli'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: cpp-vm-killer-symbols
    desc: C++ symbols for VM termination
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: _Z\d+(Kill(Virtual)?Machines?|KillVm|KillProcess)
  - id: vm-killer-flags
    desc: Command-line flags for VM termination
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: --(vmkill(er)?|prockill(er)?|vmlist)
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: killing-vms-msg
    desc: Message indicating VM termination operation
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Killing VM[Ss]?:|Removing Snapshots
  - id: killing-vm-simple
    desc: Simple VM termination message
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'Killing VM '
  - id: skipping-vm-message
    desc: VM operation skip message
    crit: notable
    conf: 0.72
    if:
      type: text
      substr: 'Skipping VM '
  - id: esxi-preparation
    desc: Reference to ESXi preparation/waiting state
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Waiting for ESXi Preparation
composite_rules:
  - id: vmware-extensions
    desc: "VMware VM files: .vmdk/.vmx/.vmsd/.vmsn/.vswp/.vmem/.nvram/.vmxf"
    crit: notable
    conf: 0.9
    any:
      - id: vmware-extensions-core-a
      - id: vmware-extensions-core-a-vmx
      - id: vmware-extensions-core-a-vmsd
      - id: vmware-extensions-core-a-vmsn
      - id: vmware-extensions-core-b
