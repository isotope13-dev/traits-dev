defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: dmidecode
    desc: dmidecode command for hardware info
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: dmidecode
  - id: dmi-sysfs
    desc: DMI sysfs path access
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: /sys/class/dmi
  - id: dmi-product-name
    desc: DMI product_name field
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: '(?i)(dmi|smbios).{0,40}product_name'
  - id: dmi-sys-vendor
    desc: DMI sys_vendor field
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: '(?i)(dmi|smbios).{0,40}sys_vendor'
  - id: dmi-bios-vendor
    desc: DMI bios_vendor field
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: '(?i)(dmi|smbios).{0,40}bios_vendor'
  - id: smbios-token
    desc: SMBIOS hardware information marker
    crit: component
    conf: 0.5
    if:
      type: text
      substr: smbios
  - id: cpu-vendor-genuineintel
    desc: GenuineIntel CPU vendor string
    crit: baseline
    conf: 0.4
    if:
      type: text
      exact: GenuineIntel
    unless:
      - id: well-known/app/drivers/
  - id: cpu-vendor-authenticamd
    desc: AuthenticAMD CPU vendor string
    crit: baseline
    conf: 0.4
    if:
      type: text
      exact: AuthenticAMD
    unless:
      - id: well-known/app/drivers/
composite_rules:
  - id: dmi-vendor-product
    desc: DMI vendor and product identification fields
    crit: baseline
    conf: 0.5
    any:
      - id: dmi-sys-vendor
      - id: dmi-product-name
      - id: dmi-bios-vendor
  - id: cpu-vendor-string
    desc: CPU vendor identification string
    crit: baseline
    conf: 0.4
    any:
      - id: cpu-vendor-genuineintel
      - id: cpu-vendor-authenticamd
