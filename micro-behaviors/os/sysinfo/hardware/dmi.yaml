defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: dmidecode
    desc: dmidecode command for hardware info
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: dmidecode
  - id: dmi-sysfs
    desc: DMI sysfs path access
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: /sys/class/dmi
  - id: dmi-product-name
    desc: DMI product_name field
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: product_name
  - id: dmi-sys-vendor
    desc: DMI sys_vendor field
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: sys_vendor
  - id: dmi-bios-vendor
    desc: DMI bios_vendor field
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: bios_vendor
composite_rules:
  - id: dmi-vendor-product
    desc: DMI vendor and product identification fields
    crit: baseline
    conf: 0.5
    any:
      - id: dmi-sys-vendor
      - id: dmi-product-name
      - id: dmi-bios-vendor
