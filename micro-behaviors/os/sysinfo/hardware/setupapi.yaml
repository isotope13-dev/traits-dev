# SETUPAPI device enumeration APIs
# Windows SetupAPI is used to enumerate hardware devices, query device
# properties, and manage device interfaces. Legitimate use includes
# device managers and hardware utilities. In malware context, it is
# used for hardware discovery and targeting.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
traits:
  - id: setupdi-get-class-devs-w
    desc: Enumerate device classes via SetupAPI wide API
    if:
      type: symbol
      exact: SetupDiGetClassDevsW
  - id: cm-locate-devnode-w
    desc: Locate hardware device node
    if:
      type: symbol
      exact: CM_Locate_DevNodeW
  - id: hid-manufacturer-string
    desc: Read HID manufacturer identifier
    if:
      type: symbol
      exact: HidD_GetManufacturerString
  - id: setupdi-get-class-devs
    desc: Enumerate device classes via SetupAPI
    if:
      type: symbol
      exact: SetupDiGetClassDevsA
  - id: setupdi-enum-device-interfaces
    desc: Enumerate device interfaces via SetupAPI
    if:
      type: symbol
      exact: SetupDiEnumDeviceInterfaces
  - id: setupdi-get-device-interface-detail
    desc: Get device interface detail via SetupAPI
    if:
      type: symbol
      exact: SetupDiGetDeviceInterfaceDetailA
  - id: setupdi-get-device-registry-property
    desc: Query device registry property via SetupAPI
    if:
      type: symbol
      exact: SetupDiGetDeviceRegistryPropertyA
composite_rules:
  - id: setupapi-device-enumeration
    desc: SETUPAPI hardware device enumeration cluster
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: setupdi-get-class-devs
      - id: setupdi-enum-device-interfaces
      - id: setupdi-get-device-interface-detail
      - id: setupdi-get-device-registry-property
