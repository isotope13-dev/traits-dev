# Go Hardware Discovery
# Detects hardware information queries
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  mbc: "E1082"
  attack: "T1082"
traits:
  - id: runtime-numcpu
    desc: runtime.NumCPU CPU count
    crit: baseline
    conf: 0.5
    for: [go]
    if:
      type: ast
      kind: call
      exact: "runtime.NumCPU"
