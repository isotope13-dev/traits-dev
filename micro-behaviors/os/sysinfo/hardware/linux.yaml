defaults:
  for:
    - elf
    - so
    - c
    - shell
  platforms:
    - linux
  crit: baseline
  mbc: E1082
  attack: T1082
traits:
  - id: dmi-class-path
    desc: /sys/class/dmi/id/ path
    conf: 0.5
    if:
      type: string_value
      substr: /sys/class/dmi/id/
  - id: dmi-devices-path
    desc: /sys/devices/virtual/dmi/id/ path
    conf: 0.5
    if:
      type: string_value
      substr: /sys/devices/virtual/dmi/id/
  - id: bios-version
    desc: bios_version DMI field
    conf: 0.5
    if:
      type: string_value
      substr: bios_version
  - id: cpu-model-name
    desc: model name CPU field
    conf: 0.4
    if:
      type: string_value
      substr: model name
  - id: cpu-family
    desc: cpu family field
    conf: 0.4
    if:
      type: string_value
      substr: cpu family
  - id: cpu-cores
    desc: cpu cores field
    conf: 0.4
    if:
      type: string_value
      substr: cpu cores
  - id: lscpu-cmd
    desc: lscpu command
    conf: 0.4
    if:
      type: string_value
      substr: lscpu
