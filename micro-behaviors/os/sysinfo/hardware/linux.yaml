defaults:
  for:
    - elf
    - so
    - c
    - shell
  platforms:
    - linux
  crit: baseline
  mbc: E1082
  attack: T1082
traits:
  - id: dmi-class-path
    desc: /sys/class/dmi/id/ path
    conf: 0.5
    if:
      type: text
      substr: /sys/class/dmi/id/
  - id: dmi-devices-path
    desc: /sys/devices/virtual/dmi/id/ path
    conf: 0.5
    if:
      type: text
      substr: /sys/devices/virtual/dmi/id/
  - id: dmi-product-name-path
    desc: SMBIOS product_name DMI sysfs path
    conf: 0.85
    for:
      - c
      - cpp
      - elf
      - shell
    if:
      type: text
      substr: /sys/class/dmi/id/product_name
    unless:
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: dmi-board-vendor-path
    desc: SMBIOS board/vendor DMI sysfs path
    conf: 0.85
    for:
      - c
      - cpp
      - elf
      - shell
    if:
      type: text
      regex: '/sys/class/dmi/id/(board_vendor|sys_vendor|bios_vendor)'
    unless:
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: bios-version
    desc: bios_version DMI field
    conf: 0.5
    if:
      type: text
      substr: bios_version
  - id: cpu-model-name
    desc: model name CPU field
    conf: 0.4
    if:
      type: text
      substr: model name
    unless:
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/lang/compiler/systems::rust-src-path
  - id: cpu-family
    desc: cpu family field
    conf: 0.4
    if:
      type: text
      substr: cpu family
    unless:
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/lang/compiler/systems::rust-src-path
  - id: cpu-cores
    desc: cpu cores field
    conf: 0.4
    if:
      type: text
      substr: cpu cores
    unless:
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/lang/compiler/systems::rust-src-path
  - id: lscpu-cmd
    desc: lscpu command
    conf: 0.4
    if:
      type: text
      substr: lscpu
