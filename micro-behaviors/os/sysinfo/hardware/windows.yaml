defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
  attack: T1082
traits:
  - id: get-memory-status
    desc: Query system memory capacity
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: GlobalMemoryStatusEx
  - id: get-disk-space
    desc: Query disk free space
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ^GetDiskFreeSpace(Ex)?[AW]?$
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft-windows
  - id: get-system-info
    desc: Query system hardware info (CPU cores)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: GetSystemInfo
