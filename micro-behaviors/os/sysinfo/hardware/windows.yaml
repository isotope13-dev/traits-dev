defaults:
  for:
    - pe
    - dll
    - c
    - cpp
  platforms:
    - windows
  attack: T1082
traits:
  - id: get-memory-status
    desc: Query system memory capacity
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: GlobalMemoryStatusEx
  - id: get-disk-space
    desc: Query disk free space
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ^GetDiskFreeSpace(Ex)?[AW]?$
  - id: get-system-info
    desc: Query system hardware info (CPU cores)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: GetSystemInfo
  - id: get-system-firmware-table
    desc: Query system firmware table
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GetSystemFirmwareTable
  - id: enum-system-firmware-tables
    desc: Enumerate system firmware tables
    crit: notable
    conf: 0.92
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: EnumSystemFirmwareTables
composite_rules:
  - id: firmware-table-inspection
    desc: Enumerate and read firmware tables
    crit: notable
    conf: 0.94
    all:
      - id: enum-system-firmware-tables
      - id: get-system-firmware-table
