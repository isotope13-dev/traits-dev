# Win32 Hardware Information APIs
# Memory, disk, and CPU hardware queries
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1082"
traits:
  - id: get-memory-status
    desc: Query system memory capacity
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "GlobalMemoryStatusEx"
  - id: get-disk-space
    desc: Query disk free space
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: "^GetDiskFreeSpace(Ex)?[AW]?$"
  - id: get-system-info
    desc: Query system hardware info (CPU cores)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "GetSystemInfo"
