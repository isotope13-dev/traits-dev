defaults:
  for:
    - pe
    - dll
    - c
    - cpp
  platforms:
    - windows
  attack: T1082
traits:
  - id: get-memory-status
    desc: Query system memory capacity
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: GlobalMemoryStatusEx
  - id: get-system-info
    desc: Queries Windows hardware and memory layout
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GetSystemInfo
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary-comp
        - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: get-system-firmware-table
    desc: Query system firmware table
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GetSystemFirmwareTable
  - id: get-system-firmware-table-string
    desc: GetSystemFirmwareTable API name string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GetSystemFirmwareTable
  - id: enum-system-firmware-tables
    desc: Enumerate system firmware tables
    crit: notable
    conf: 0.92
    for:
      - c
      - cpp
    if:
      type: symbol
      exact: EnumSystemFirmwareTables
  - id: enum-system-firmware-tables-string
    desc: EnumSystemFirmwareTables API name string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: EnumSystemFirmwareTables
  - id: enumerate-display-devices
    desc: Enumerate Windows display devices
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: EnumDisplayDevicesA
  - id: gpu-vendor-marker-set
    desc: GPU vendor marker string set
    crit: baseline
    conf: 0.88
    count_min: 4
    if:
      type: text
      substr: nvidia
      case_insensitive: true
composite_rules:
  - id: firmware-table-inspection
    desc: Enumerate and read firmware tables
    crit: notable
    conf: 0.94
    all:
      - id: enum-system-firmware-tables
      - id: get-system-firmware-table
