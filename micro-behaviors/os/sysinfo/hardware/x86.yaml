# SIDT reads the x86 interrupt-descriptor-table register. Debuggers, kernels,
# bootloaders, and diagnostic software use it legitimately; anti-VM intent
# requires additional evidence about how the returned address is interpreted.
defaults:
  platforms: [windows, linux]
  for: [pe, elf]
  arch: [x86]
  crit: notable
  conf: 0.9

traits:
  - id: sidt-stack-destination
    desc: SIDT stores x86 IDT register on stack
    if:
      type: hex
      section: text
      pattern: "0F 01 4C 24 ??"

  - id: sidt-absolute-destination
    desc: SIDT stores x86 IDT register in memory
    conf: 0.88
    if:
      type: hex
      section: text
      pattern: "0F 01 0D ?? ?? ?? ??"
