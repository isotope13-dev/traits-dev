defaults:
  platforms: [routeros, appliance, unix]
  for: [javascript]
  attack: T1082

traits:
  - id: jvm-total-memory-reference
    desc: Java runtime total memory reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: totalMemory

  - id: jvm-max-memory-reference
    desc: Java runtime maximum memory reference
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: maxMemory
