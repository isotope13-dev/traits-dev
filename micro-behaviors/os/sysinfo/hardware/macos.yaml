defaults:
  platforms: [macos]
  for: [python, scripts, binaries]
  crit: notable
  attack: T1082
  mbc: E1082

traits:
  - id: system-profiler-display
    desc: macOS display hardware query
    conf: 0.9
    if:
      type: text
      regex: 'system_profiler\s+SPDisplaysDataType'
  - id: system-profiler-hardware
    desc: macOS hardware information query
    conf: 0.9
    for: [javascript, typescript, python, scripts, binaries]
    if:
      type: text
      regex: 'system_profiler\s+SPHardwareDataType'
