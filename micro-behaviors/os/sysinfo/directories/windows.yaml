# Windows system directory queries
defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: get-system-directory
    desc: Get Windows system directory path
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "GetSystemDirectory[AW]?$"
  - id: get-system-directory-text
    desc: Get Windows system directory path
    crit: baseline
    conf: 0.88
    if:
      type: text
      regex: "GetSystemDirectory[AW]?$"
  - id: get-windows-directory
    desc: Get Windows installation directory
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "GetWindowsDirectory[AW]?$"
  - id: get-system-windows-directory
    desc: Get system Windows directory path
    crit: notable
    conf: 0.88
    if:
      type: symbol
      regex: "GetSystemWindowsDirectory[AW]?$"
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: get-system-wow64-directory
    desc: Get WOW64 system directory path
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "GetSystemWow64Directory[AW]?$"

# NOTE: GetTempPath moved to fs/temp/directory/windows.yaml
# as that's the more canonical location for temp directory operations
