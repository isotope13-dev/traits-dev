# Windows system directory queries
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: get-system-directory
    desc: Get Windows system directory path
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "GetSystemDirectoryA?$"
  - id: get-system-directory-string
    desc: GetSystemDirectory API string
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: "^GetSystemDirectory[AW]?$"
  - id: dotnet-system-directory
    desc: .NET SystemDirectory property access
    crit: notable
    conf: 0.88
    for: [pe, csharp]
    if:
      type: text
      exact: get_SystemDirectory
  - id: get-windows-directory
    desc: Get Windows installation directory
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "GetWindowsDirectory[AW]?$"
  - id: get-windows-directory-string
    desc: GetWindowsDirectory API string
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: "^GetWindowsDirectory[AW]?$"
  - id: get-system-windows-directory
    desc: Get system Windows directory path
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      regex: "GetSystemWindowsDirectory[AW]?$"
  - id: get-system-wow64-directory
    desc: Get WOW64 system directory path
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "GetSystemWow64Directory[AW]?$"

# NOTE: GetTempPath moved to fs/temp/directory/windows.yaml
# as that's the more canonical location for temp directory operations

composite_rules:
  - id: windows-directory-api-strings
    desc: Windows directory API strings
    crit: component
    conf: 0.84
    any:
      - id: get-system-directory-string
      - id: get-windows-directory-string
