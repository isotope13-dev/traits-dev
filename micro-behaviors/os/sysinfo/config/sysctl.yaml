# Sysctl Kernel State Access
# Query or modify kernel parameters via sysctl
defaults:
  attack: T1082
  mbc: E1082
traits:
  - id: sysctl
    desc: Query or modify kernel state via sysctl
    crit: baseline
    conf: 0.6
    for: [elf, macho, c]
    if:
      type: symbol
      regex: sysctl
    platforms: [unix, linux, macos]
  - id: sysctlbyname
    desc: Read or modify kernel state by name
    crit: baseline
    conf: 0.6
    for: [macho, c]
    if:
      type: symbol
      regex: sysctlbyname
    platforms: [macos]
