defaults:
  platforms: [unix]
  for: [ruby]
traits:
  - id: ruby-sysctl-hw-model
    desc: Ruby sysctl hw.model query
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "sysctl -n hw.model"
  - id: ruby-sysctl-hw-machine
    desc: Ruby sysctl hw.machine query
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "sysctl -n hw.machine"
  - id: ruby-sysctl-hw-ncpu
    desc: Ruby sysctl hw.ncpu query
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "sysctl -n hw.ncpu"
  - id: ruby-sysctl-kern-osrelease
    desc: Ruby sysctl kern.osrelease query
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "sysctl -n kern.osrelease"
  - id: ruby-sysctl-kern-ident
    desc: Ruby sysctl kern.ident query
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "sysctl -n kern.ident"
composite_rules:
  - id: ruby-bsd-sysctl-hardware-query
    desc: Ruby BSD sysctl hardware query
    crit: notable
    conf: 0.88
    any:
      - id: ruby-sysctl-hw-model
      - id: ruby-sysctl-hw-machine
      - id: ruby-sysctl-hw-ncpu
      - id: ruby-sysctl-kern-osrelease
      - id: ruby-sysctl-kern-ident
