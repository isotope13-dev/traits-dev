defaults:
  for: [elf, macho, c]
  crit: baseline
  mbc: E1082
  attack: T1082
  platforms:
    - unix
    - windows
traits:
  - id: sysconf
    desc: Query system configuration information
    conf: 0.4
    if:
      type: symbol
      regex: sysconf
    platforms:
      - unix
  - id: confstr
    desc: Get configuration-dependent string
    conf: 0.4
    if:
      type: symbol
      regex: confstr
    platforms:
      - unix
