defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-environment-collector-class
    desc: Python environment collector class
    crit: notable
    conf: 0.94
    if:
      type: string_literal
      exact: EnvironmentCollector

  - id: python-installed-package-enumeration
    desc: Python enumerates installed package metadata
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: importlib.metadata.distributions

  - id: python-thread-frame-profiler
    desc: Python samples all live thread frames
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'sys\._current_frames\s*\(\)'

composite_rules:
  - id: python-environment-collector
    desc: Python collects environment metadata
    crit: notable
    conf: 0.96
    near_bytes: 6000
    all:
      - id: python-environment-collector-class
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-node
