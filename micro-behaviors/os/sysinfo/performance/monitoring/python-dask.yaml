defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: python-psutil-process-metrics
    desc: Python psutil process metrics
    crit: notable
    conf: 0.9
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: call
      exact: psutil.Process

  - id: python-process-rss-read
    desc: Python process RSS read
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: call
      exact: self._proc.memory_info

  - id: python-process-cpu-percent-read
    desc: Python process CPU percent read
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: call
      exact: self._proc.cpu_percent

  - id: dask-worker-executing-keys
    desc: Dask worker executing keys field
    crit: notable
    conf: 0.87
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      word: executing_keys

  - id: dask-worker-memory-limit-field
    desc: Dask worker memory limit field
    crit: notable
    conf: 0.86
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      word: memory_limit

  - id: dask-task-memory-schema
    desc: Dask task memory schema
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      word: TaskMemory

  - id: dask-memory-sample-schema
    desc: Dask memory sample schema
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      word: MemorySample

composite_rules:
  - id: dask-worker-runtime-metrics
    desc: Dask worker runtime metrics
    crit: notable
    conf: 0.92
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    all:
      - id: python-psutil-process-metrics
      - id: python-process-rss-read
      - id: dask-worker-executing-keys
    any:
      - id: python-process-cpu-percent-read
      - id: dask-worker-memory-limit-field

  - id: dask-task-memory-attribution
    desc: Dask task memory attribution
    crit: notable
    conf: 0.92
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    all:
      - id: dask-worker-executing-keys
    any:
      - id: dask-task-memory-schema
      - id: dask-memory-sample-schema
