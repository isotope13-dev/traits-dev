defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: htop-atop
    desc: Interactive process monitors (htop/atop)
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \b(htop|atop|iotop|iftop)\b
  - id: stat-tools
    desc: System statistics tools (vmstat/iostat/mpstat/sar)
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \b(vmstat|iostat|mpstat|sar)\b
  - id: lsmem
    desc: Memory information tool
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: lsmem
  - id: pdh-open-query
    desc: Open Windows performance query
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: PdhOpenQueryA
  - id: pdh-add-english-counter
    desc: Add Windows performance counter
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: PdhAddEnglishCounterW
  - id: pdh-get-formatted-counter-value
    desc: Read formatted performance counter
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: PdhGetFormattedCounterValue
composite_rules:
  - id: pdh-performance-counters
    desc: Monitor Windows performance counters
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.94
    all:
      - id: pdh-open-query
      - id: pdh-add-english-counter
      - id: pdh-get-formatted-counter-value
