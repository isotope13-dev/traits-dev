defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: htop-tool
    desc: htop process monitor
    crit: baseline
    conf: 0.9
    for: [shell, python, pe, elf, macho]
    if:
      type: text
      word: htop
  - id: atop-tool
    desc: atop process monitor
    crit: baseline
    conf: 0.9
    for: [shell, python, pe, elf, macho]
    if:
      type: text
      word: atop
  - id: iotop-tool
    desc: iotop process monitor
    crit: baseline
    conf: 0.9
    for: [shell, python, pe, elf, macho]
    if:
      type: text
      word: iotop
  - id: iftop-tool
    desc: iftop process monitor
    crit: baseline
    conf: 0.9
    for: [shell, python, pe, elf, macho]
    if:
      type: text
      word: iftop
  - id: stat-tools
    desc: System statistics tools (vmstat/iostat/mpstat/sar)
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \b(vmstat|iostat|mpstat|sar)\b
  - id: lsmem
    desc: Memory information tool
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: lsmem
  - id: pdh-open-query
    desc: Open Windows performance query
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: PdhOpenQueryA
  - id: pdh-add-english-counter
    desc: Add Windows performance counter
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: PdhAddEnglishCounterW
  - id: pdh-get-formatted-counter-value
    desc: Read formatted performance counter
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: PdhGetFormattedCounterValue
composite_rules:
  - id: htop-atop
    desc: Interactive process monitors (htop/atop)
    crit: baseline
    conf: 0.9
    any:
      - id: htop-tool
      - id: atop-tool
      - id: iotop-tool
      - id: iftop-tool
  - id: pdh-performance-counters
    desc: Monitor Windows performance counters
    for: [pe, dll]
    platforms: [windows]
    crit: notable
    conf: 0.94
    all:
      - id: pdh-open-query
      - id: pdh-add-english-counter
      - id: pdh-get-formatted-counter-value
