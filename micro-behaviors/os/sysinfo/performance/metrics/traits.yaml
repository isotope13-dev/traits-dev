defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]

traits:
  - id: hashrate-reference
    desc: Hashrate performance metric reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)\bhashrate\b'
  - id: hugepages-reference
    desc: HugePages memory setting reference
    crit: baseline
    conf: 0.85
    if:
      type: text
      word: hugepages
      case_insensitive: true
