defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082

traits:
  - id: get-process-version
    desc: Query process version information
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: GetProcessVersion
  - id: get-active-processor-group-count
    desc: Query active processor group count
    crit: notable
    conf: 0.88
    if:
      type: import
      exact: GetActiveProcessorGroupCount
