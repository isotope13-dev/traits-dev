defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]

traits:
  - id: createhash-call
    desc: JavaScript references crypto.createHash
    crit: component
    conf: 0.55
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: createHash
  - id: hash-algorithms
    desc: JavaScript references MD5 or SHA-256 hashing
    crit: baseline
    conf: 0.6
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: '(?i)\\b(md5|sha256)\\b'
  - id: python-hardware-fingerprint-call
    desc: Calls a Python hardware fingerprint helper
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: symbol
      kind: call
      exact: get_hardware_fingerprint
  - id: macos-ioreg-platform-uuid-command
    desc: References a macOS ioreg hardware UUID query
    crit: notable
    conf: 0.85
    for: [macho, c, shell, scripts, javascript, typescript]
    platforms: [macos]
    if:
      type: text
      regex: ioreg[^\n]{0,60}IOPlatformExpertDevice

  - id: generate-hwid
    desc: GenerateHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: GenerateHardwareId
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: get-hwid
    desc: GetHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: GetHardwareId
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: hardware-id-string
    desc: hardware_id string
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\bhardware_id\b
    not:
      - substr: V4_Driver_Hardware_IDs
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: hwid-string
    desc: "Hardware ID (HWID) reference"
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\bhwid\b
    not:
      - substr: Failed to
    unless:
      - id: metadata/signed/platform/
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  # A `machineId` field is how agents, licensing checks and telemetry clients
  # bind state to a specific host. The bare field name is a neutral host-
  # identifier observation; intent (license binding, fingerprint exfil) comes
  # from the composites that reference it.
  - id: machineid-identifier-field
    desc: References a machineId host identifier field
    crit: notable
    conf: 0.9
    for: [javascript, typescript, json, python, go, csharp, java, php]
    attack: T1082
    mbc: E1082
    if:
      type: text
      word: machineId

  - id: machineguid
    desc: MachineGuid registry key
    crit: baseline
    conf: 0.7
    platforms: [windows]
    if:
      type: text
      word: MachineGuid
    unless:
      - type: text
        exact: VMware Tools
  - id: cryptography-machineguid-path
    desc: Windows MachineGuid registry path
    crit: baseline
    conf: 0.86
    platforms: [windows]
    if:
      type: text
      substr: SOFTWARE\Microsoft\Cryptography\MachineGuid
  - id: microsoft-mrt-guid-path
    desc: Microsoft MRT GUID registry path
    crit: baseline
    conf: 0.9
    platforms: [windows]
    if:
      type: text
      substr: SOFTWARE\Microsoft\RemovalTools\MRT\GUID
  - id: ps-productid-registry-read-hklm-first
    desc: PowerShell reads Windows ProductID registry
    crit: baseline
    conf: 0.85
    for: [powershell]
    platforms: [windows]
    if:
      type: text
      regex: HKLM[:\\][^\n"']{0,8}SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion[^\n]{0,200}ProductID
      case_insensitive: true
    count_max: 1018070
  - id: ps-productid-registry-read-productid-first
    desc: PowerShell reads Windows ProductID registry
    crit: baseline
    conf: 0.85
    for: [powershell]
    platforms: [windows]
    if:
      type: text
      regex: ProductID[^\n]{0,200}HKLM[:\\][^\n"']{0,8}SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion
      case_insensitive: true
    count_max: 1018071
composite_rules:
  - id: machine-id-generation
    desc: Generates a host identifier from system data and a hash
    crit: notable
    conf: 0.85
    mbc: E1592
    attack: T1082
    for: [javascript, typescript]
    all:
      - id: createhash-call
      - id: hash-algorithms
    any:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: micro-behaviors/os/network/interface::node-network-interfaces-call
  - id: ps-productid-registry-read
    desc: PowerShell reads Windows ProductID registry
    crit: baseline
    conf: 0.85
    for: [powershell]
    platforms: [windows]
    any:
      - id: ps-productid-registry-read-hklm-first
      - id: ps-productid-registry-read-productid-first
