defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]

traits:
  - id: generate-hwid
    desc: GenerateHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: GenerateHardwareId
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: get-hwid
    desc: GetHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: GetHardwareId
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: hardware-id-string
    desc: hardware_id string
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\bhardware_id\b
    not:
      - substr: V4_Driver_Hardware_IDs
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: hwid-string
    desc: "Hardware ID (HWID) reference"
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\bhwid\b
    not:
      - substr: Failed to
    unless:
      - id: metadata/signed/platform::microsoft
      - type: trait
        id: metadata/file/extension::linux-kernel-package-artifact-basename
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
