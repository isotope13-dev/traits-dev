defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: actionscript-capabilities-class
    desc: ActionScript Capabilities class reference
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      word: Capabilities
  - id: actionscript-version-token
    desc: ActionScript version token reference
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: Capabilities\s*\.\s*version
composite_rules:
  - id: actionscript-version-check
    desc: Detects ActionScript Capabilities.version check
    crit: notable
    conf: 0.85
    all:
      - id: actionscript-capabilities-class
      - id: actionscript-version-token
