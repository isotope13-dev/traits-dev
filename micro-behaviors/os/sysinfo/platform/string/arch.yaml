defaults:
  platforms:
  - unix
  - windows
  for:
  - c
  - elf
  crit: baseline
  mbc: E1082
  attack: T1082
traits:
- id: arch-x86-64
  desc: x86_64 architecture string
  conf: 0.3
  if:
    type: text
    substr: x86_64
- id: arch-aarch64
  desc: aarch64 architecture string
  conf: 0.3
  platforms:
  - unix
  if:
    type: text
    substr: aarch64
- id: arch-i386
  desc: i386 architecture string
  conf: 0.3
  if:
    type: text
    word: i386
- id: arch-arm-dup
  desc: arm architecture string
  conf: 0.3
  platforms:
  - unix
  if:
    type: text
    word: arm
- id: multi-arch-runtime-wordlist
  desc: Architecture-suffixed platform names
  crit: notable
  conf: 0.85
  for: [shell]
  platforms:
  - unix
  - android
  count_min: 3
  if:
    type: text
    regex: '(?i)\b[A-Za-z]{1,8}(x86(_64)?|mips|mpsl|arc|arm[0-9]*|i[3-6]86|m68k|ppc|spc|sh4)\b'
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - id: metadata/build/autotools::autoconf-generated-script
  - id: metadata/lang/compiled/
  - id: metadata/file/extension/identity::squashfs-container-filename
- id: arch-suffix-mpsl
  desc: ELF basename ends with mpsl suffix
  crit: suspicious
  conf: 0.92
  for: [elf]
  platforms:
  - linux
  - android
  if:
    type: path
    basename: true
    regex: '(?i)\.mpsl$'
- id: arch-suffix-mipsel
  desc: ELF basename ends with mipsel suffix
  crit: notable
  conf: 0.85
  for: [elf]
  platforms:
  - linux
  - android
  if:
    type: path
    basename: true
    regex: '(?i)\.mipsel$'
- id: arch-suffix-arm-family
  desc: ELF basename ends with ARM suffix
  crit: notable
  conf: 0.8
  for: [elf]
  platforms:
  - linux
  - android
  if:
    type: path
    basename: true
    regex: '(?i)\.arm[4-7]?$'
- id: arch-suffix-bot
  desc: ELF basename ends with bot suffix
  crit: suspicious
  conf: 0.9
  for: [elf]
  platforms:
  - linux
  - android
  if:
    type: path
    basename: true
    regex: '(?i)\.bot$'
composite_rules:
- id: multi-arch-bot-suffix-cluster
  desc: Multi-architecture bot binary suffix cluster
  crit: suspicious
  conf: 0.93
  for: [elf]
  platforms:
  - linux
  - android
  needs: 2
  any:
  - id: arch-suffix-mpsl
  - id: arch-suffix-mipsel
  - id: arch-suffix-arm-family
  - id: arch-suffix-bot
