defaults:
  platforms:
  - unix
  - windows
  for:
  - c
  - elf
  crit: baseline
  mbc: E1082
  attack: T1082
traits:
- id: arch-x86-64
  desc: x86_64 architecture string
  conf: 0.3
  if:
    type: text
    substr: x86_64
- id: arch-aarch64
  desc: aarch64 architecture string
  conf: 0.3
  platforms:
  - unix
  if:
    type: text
    substr: aarch64
- id: arch-i386
  desc: i386 architecture string
  conf: 0.3
  if:
    type: text
    word: i386
- id: arch-arm-dup
  desc: arm architecture string
  conf: 0.3
  platforms:
  - unix
  if:
    type: text
    word: arm
- id: multi-arch-runtime-wordlist
  desc: Architecture-suffixed platform names
  crit: notable
  conf: 0.85
  for: [shell]
  platforms:
  - unix
  - android
  count_min: 3
  if:
    type: text
    regex: '(?i)\b[A-Za-z]{1,8}(x86(_64)?|mips|mpsl|arc|arm[0-9]*|i[3-6]86|m68k|ppc|spc|sh4)\b'
  unless:
  - id: metadata/build/autotools::autoconf-generated-script
  - id: metadata/lang/compiled/
composite_rules: []
