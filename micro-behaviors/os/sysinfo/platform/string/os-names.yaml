defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: os-string-windows
    desc: Windows platform string
    crit: baseline
    conf: 0.4
    if:
      type: string_literal
      substr: Windows
    unless:
      - id: metadata/file/text/catalog::vscode-php-global-functions-catalog
      - id: metadata/lang/source::windows-generated-def-table
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: well-known/lib/protobuf-ts::protobuf-ts-js
      - type: text
        substr: on Windows ensure PowerShell is available
      - type: text
        regex: 'User-Agent:\s*Mozilla/5\.0\s*\(Windows NT'
  - id: os-string-linux
    desc: Linux platform string
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: Linux
    unless:
      - id: metadata/lang/source::windows-generated-def-table
  - id: os-string-darwin
    desc: Darwin platform string
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: Darwin
    unless:
      - id: metadata/lang/source::windows-generated-def-table
