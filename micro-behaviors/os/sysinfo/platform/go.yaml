# Go Platform Detection
# Detects OS and architecture identification
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  mbc: "E1082"
  attack: "T1082"
  for: [go]
traits:
  - id: runtime-goos
    desc: runtime.GOOS OS detection
    crit: baseline
    conf: 0.5
    if:
      type: ast
      kind: selector
      exact: "runtime.GOOS"
  - id: runtime-goarch
    desc: runtime.GOARCH architecture detection
    crit: baseline
    conf: 0.5
    if:
      type: ast
      kind: selector
      exact: "runtime.GOARCH"
