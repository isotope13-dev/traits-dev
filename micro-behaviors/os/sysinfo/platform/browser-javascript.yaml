defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1082"
traits:
  - id: navigator-battery-read
    desc: Reads browser battery status API
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: navigator(\?\.|\.)getBattery\s*\(
  - id: browser-screen-dimensions-read
    desc: Reads browser screen dimensions
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: screen\.(height|width)
  - id: navigator-cookie-enabled-read
    desc: Reads browser cookieEnabled flag
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: navigator(\?\.|\.)cookieEnabled
  - id: navigator-platform-read
    desc: Reads browser platform string
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: navigator(\?\.|\.)platform
  - id: browser-timezone-read
    desc: Reads browser timezone via Intl API
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: Intl\.DateTimeFormat\s*\(\s*\)\.resolvedOptions\s*\(\s*\)\.timeZone
