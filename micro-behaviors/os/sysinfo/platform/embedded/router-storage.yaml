# Generic embedded-device storage / config paths (/nvram, /jffs, /etc/config,
# /etc/factory). Neutral: these paths reference standard OpenWrt / embedded
# Linux flash and configuration storage and appear in legitimate firmware,
# busybox tooling and SDKs. Firmware-tamper composites combine them with
# erase/write commands.
defaults:
  platforms: [unix, android, ios]
  for: [elf, macho]
  crit: component
traits:
  - id: nvram-path
    desc: /nvram path (router storage)
    conf: 0.8
    if:
      type: text
      substr: /nvram
      section: .text
  - id: jffs-path
    desc: /jffs path (router storage)
    conf: 0.8
    if:
      type: text
      substr: /jffs
      section: .text
  - id: etc-factory-path
    desc: /etc/factory config path
    conf: 0.7
    if:
      type: text
      substr: /etc/factory
      section: .text
  - id: etc-config-path
    desc: /etc/config sysconfig path
    conf: 0.6
    if:
      type: text
      substr: /etc/config
      section: .text
