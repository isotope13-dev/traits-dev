defaults:
  for:
    - shell
    - python
    - javascript
    - elf
  platforms:
    - linux
    - embedded
  crit: suspicious
  conf: 0.9
traits:
  - id: mtd-device-paths
    desc: Multiple MTD flash device paths
    count_min: 2
    if:
      type: text
      regex: (/mnt/mtd/|/dev/mtd)
    downgrade:
      any:
        - id: micro-behaviors/hardware/flash/device::firmware-upgrade-context
