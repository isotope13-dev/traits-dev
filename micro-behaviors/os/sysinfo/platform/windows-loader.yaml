defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: get-locale-info-import
    desc: Query locale information
    crit: baseline
    conf: 0.86
    if:
      type: symbol
      exact: "GetLocaleInfoW"
  - id: enum-system-locales-import
    desc: Enumerate installed locales
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: "EnumSystemLocalesW"
composite_rules:
  - id: locale-fingerprinting-imports
    desc: Fingerprint host locale configuration
    crit: baseline
    conf: 0.92
    all:
      - id: get-locale-info-import
      - id: micro-behaviors/os/sysinfo/platform::get-user-default-lcid
      - id: enum-system-locales-import
