defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  conf: 0.9

traits:
  - id: python-locale-getdefaultlocale-call
    desc: Python queries the default process locale
    if:
      type: text
      substr: locale.getdefaultlocale
  - id: python-locale-getlocale-call
    desc: Python queries the active process locale
    if:
      type: text
      substr: locale.getlocale

composite_rules:
  - id: python-locale-query
    desc: Python queries process locale settings
    crit: baseline
    conf: 0.92
    any:
      - id: python-locale-getdefaultlocale-call
      - id: python-locale-getlocale-call
