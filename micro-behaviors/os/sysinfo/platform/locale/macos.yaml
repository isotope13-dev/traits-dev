defaults:
  platforms: [macos]
  for: [shell, javascript, typescript, python, c, cpp, macho]
  crit: notable
  conf: 0.88

traits:
  - id: apple-input-sources-plist-reference
    desc: Reads macOS enabled input-source settings
    if:
      type: text
      substr: AppleEnabledInputSources

  - id: hitoolbox-input-sources-plist-reference
    desc: References macOS HIToolbox input settings
    if:
      type: text
      substr: com.apple.HIToolbox

