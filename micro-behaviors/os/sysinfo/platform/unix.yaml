defaults:
  for: [binaries, shell, c]
  crit: notable
  platforms:
    - unix
    - linux
    - macos
traits:
  - id: uname
    desc: Query system name and information
    conf: 0.6
    mbc: E1082
    attack: T1082
    unless:
      - type: basename
        exact: configure
      - type: basename
        exact: libvk_swiftshader.so
      - type: basename
        exact: libGLESv2.so
    if:
      type: symbol
      regex: uname
