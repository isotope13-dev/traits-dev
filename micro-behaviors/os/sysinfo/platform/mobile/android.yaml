defaults:
  for:
    - shell
    - python
    - javascript
    - elf
  platforms: [android, unix]
  crit: notable
  conf: 0.95
traits:
  - id: android-platform-paths
    desc: Multiple Android platform paths
    count_min: 3
    unless:
      - type: path
        regex: '/\\.zig-cache/|/zig-cache/|/build$'
    if:
      type: text
      regex: ^(/system/|/data/data/|/apex/)
