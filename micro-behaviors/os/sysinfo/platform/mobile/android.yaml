defaults:
  for:
    - shell
    - python
    - javascript
    - elf
  platforms: [android, unix]
  crit: notable
  conf: 0.95
traits:
  - id: android-platform-paths
    desc: Multiple Android platform paths
    count_min: 3
    unless:
      - type: path
        regex: '/\\.zig-cache/|/zig-cache/|/build$'
    if:
      type: text
      regex: ^(/system/|/data/data/|/apex/)
  - id: android-product-property-reference
    desc: Reads Android product build properties
    crit: notable
    conf: 0.9
    for: [python, pyc]
    if:
      type: text
      regex: 'ro\.product\.(brand|model|manufacturer)'
    unless:
      - id: well-known/lib/skia::source-tree
  - id: android-version-property-reference
    desc: Reads Android version build property
    crit: notable
    conf: 0.9
    for: [python, pyc]
    if:
      type: text
      substr: ro.build.version.release
composite_rules:
  - id: android-build-property-profile
    desc: Reads multiple Android build properties
    crit: notable
    conf: 0.93
    for: [python, pyc]
    all:
      - id: android-product-property-reference
      - id: android-version-property-reference
