defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.86

traits:
  - id: android-telephony-manager
    desc: Android telephony manager reference
    if:
      type: text
      substr: "Landroid/telephony/TelephonyManager;"

  - id: android-imei-accessor
    desc: Android IMEI accessor method
    conf: 0.88
    if:
      type: text
      substr: "getImei"

  - id: android-device-id-accessor
    desc: Android device ID accessor
    conf: 0.84
    if:
      type: text
      substr: "getDeviceId"

  - id: android-settings-secure
    desc: Android secure settings access
    conf: 0.84
    if:
      type: text
      substr: "Landroid/provider/Settings$Secure;"

  - id: android-id-settings-key
    desc: Android ID settings key
    conf: 0.88
    if:
      type: text
      substr: "android_id"

  - id: android-advertising-id-sdk
    desc: Android advertising ID SDK
    conf: 0.88
    if:
      type: text
      substr: "play-services-ads-identifier"

composite_rules:
  - id: android-hardware-id-collection
    desc: Android hardware identifier collection
    crit: notable
    conf: 0.92
    all:
      - id: android-telephony-manager
    any:
      - id: android-imei-accessor
      - id: android-device-id-accessor

  - id: android-persistent-id-collection
    desc: Android persistent identifier collection
    crit: notable
    conf: 0.92
    all:
      - id: android-settings-secure
    any:
      - id: android-advertising-id-sdk
      - id: android-id-settings-key
      - id: android-hardware-id-collection
