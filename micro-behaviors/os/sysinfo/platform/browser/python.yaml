defaults:
  platforms: [macos]
  for: [python, shell]

traits:
  - id: defaults-read-command
    desc: macOS defaults read command
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bdefaults\s+read\b|["'']defaults["'']\s*,\s*["'']read["'']'
  - id: launchservices-handler-key
    desc: LaunchServices handler key reference
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bLSHandlers?\b|\bLSHandlerRoleAll\b'

composite_rules:
  - id: launchservices-default-browser-read
    desc: Reads LaunchServices browser settings
    crit: notable
    conf: 0.95
    all:
      - id: defaults-read-command
      - id: launchservices-handler-key
