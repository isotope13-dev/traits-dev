defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1082"
traits:
  - id: js-locale-discovery
    desc: Reads JavaScript environment locale
    crit: notable
    conf: 0.9
    if:
      type: literal
      regex: 'resolvedOptions\\(\\)\\.locale|Intl\\.DateTimeFormat'

  - id: js-locale-symbol
    desc: Reads locale through Intl.DateTimeFormat
    crit: notable
    conf: 0.9
    unless:
      - id: well-known/lib/sentry-js/
    if:
      type: symbol
      substr: DateTimeFormat.resolvedOptions

  - id: navigator-language
    desc: Reads browser UI language
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\bnavigator\.language\b'

  - id: navigator-battery-read
    desc: Reads browser battery status API
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: getBattery

  - id: browser-screen-dimensions-read
    desc: Reads browser screen dimensions
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: screen.height

  - id: browser-webgl-vendor-parameter-read
    desc: Reads WebGL vendor identifier
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?is)\.getParameter\(\s*\w+\.UNMASKED_VENDOR_WEBGL\s*\)'

  - id: browser-webgl-renderer-parameter-read
    desc: Reads WebGL renderer identifier
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?is)\.getParameter\(\s*\w+\.UNMASKED_RENDERER_WEBGL\s*\)'

  - id: browser-webgl-software-renderer-check
    desc: Checks WebGL software renderer identifier
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)(renderer|webgl)[^\r\n]{0,120}(SwiftShader|llvmpipe|softpipe)'

  - id: navigator-cookie-enabled-read
    desc: Reads browser cookieEnabled flag
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: cookieEnabled

  - id: navigator-platform-read
    desc: Reads navigator.platform browser identity
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: navigator.platform

  - id: navigator-webdriver-read
    desc: Reads browser WebDriver automation flag
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: member
      exact: navigator.webdriver

  - id: browser-timezone-read
    desc: Reads browser timezone via Intl API
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'resolvedOptions\(\)\s*(\.\s*timeZone|\[\s*["'']timeZone)'
    unless:
      - id: metadata/lang/scripted::dts-declaration-file

  - id: electron-renderer-detect
    desc: Detects Electron renderer process
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bprocess\.type\s*={0,2}\s*["'']renderer["'']|\bprocess\.versions\.electron\b'

  - id: nwjs-detect
    desc: Detects NW.js environment
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: __nwjs

  - id: webkit-appearance-detect
    desc: "WebKit/Blink via WebkitAppearance style"
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: WebkitAppearance
  - id: browser-window-presence-check
    desc: Checks for browser window global
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: "(?i)typeof\\s+window\\s*!={1,2}\\s*['\"]undefined['\"]"

composite_rules:
  - id: browser-identity-input
    desc: Reads browser identity or display input
    crit: notable
    conf: 0.9
    any:
      - id: navigator-platform-read
      - id: browser-screen-dimensions-read
      - id: micro-behaviors/communications/http/user-agent::navigator-useragent-read

  - id: browser-webgl-renderer-read
    desc: Reads WebGL vendor and renderer identifiers
    crit: notable
    conf: 0.92
    near_bytes: 512
    all:
      - id: browser-webgl-vendor-parameter-read
      - id: browser-webgl-renderer-parameter-read
