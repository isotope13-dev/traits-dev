# Browser identity overrides are neutral automation or privacy mechanics.
# Anti-bot intent requires additional context in an objective composite.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: bidi-browser-identity-override
    desc: Browser identity override through BiDi
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: literal
      kind: string
      regex: 'emulation\.set(UserAgent|Geolocation|Timezone)'

  - id: bidi-browser-surface-override
    desc: Browser locale and surface override through BiDi
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: literal
      kind: string
      regex: 'emulation\.set(Locale|ScreenSettings|HardwareConcurrency)'

  - id: navigator-user-agent-override
    desc: Overrides browser user-agent identity
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator\s*,\s*["'']userAgent["'']'

  - id: navigator-platform-override
    desc: Overrides browser platform identity
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator\s*,\s*["'']platform["'']'
