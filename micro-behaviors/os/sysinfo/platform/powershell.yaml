# PowerShell Platform Detection
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [powershell]
traits:
  - id: os-version
    desc: Queries OS version info
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '(?i)(\[System.Environment\]::OSVersion|\$PSVersionTable\.PSVersion)'
