defaults:
  platforms: [windows, unix]
  for: [php]

traits:
  - id: php-os-constant
    desc: Reads the PHP OS constant
    crit: notable
    conf: 0.7
    if:
      type: text
      word: PHP_OS

  - id: phpversion-call
    desc: Reads the PHP runtime version
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: phpversion

  - id: server-software-access
    desc: Reads the web server software variable
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \$_SERVER\s*\[['\"]SERVER_SOFTWARE['\"]\]
