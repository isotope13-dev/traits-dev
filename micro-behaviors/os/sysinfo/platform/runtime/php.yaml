defaults:
  platforms: [windows, unix]
  for: [php]

traits:
  - id: php-version-constant
    desc: Reads the PHP runtime version constant
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: PHP_VERSION

  - id: php-os-constant
    desc: Reads the PHP OS constant
    crit: notable
    conf: 0.7
    if:
      type: text
      # PHP_OS and PHP_OS_FAMILY are the runtime OS identity constants.
      regex: \bPHP_OS(_FAMILY)?\b

  - id: phpversion-call
    desc: Reads the PHP runtime version
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: phpversion

  - id: php-uname-call
    desc: Reads OS information via php_uname()
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: php_uname

  - id: php-uname-symbol
    desc: References the php_uname OS information function
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: php_uname

  - id: server-software-access
    desc: Reads the web server software variable
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \$_SERVER\s*\[['\"]SERVER_SOFTWARE['\"]\]
