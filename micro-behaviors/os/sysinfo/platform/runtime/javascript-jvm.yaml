# Java runtime information references embedded in JavaScript sources.
# These are neutral system-information capabilities; anti-analysis composites
# add the intent-specific interpretation when several checks occur together.
defaults:
  platforms: [routeros, appliance, unix]
  for: [javascript]
  attack: T1082

traits:
  - id: jvm-management-factory-reference
    desc: Java runtime management factory reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ManagementFactory.getRuntimeMXBean
