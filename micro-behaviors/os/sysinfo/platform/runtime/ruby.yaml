defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: ruby-platform-const
    desc: Reads the Ruby platform constant
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: string_literal
      regex: RUBY_PLATFORM|RbConfig::CONFIG
  - id: ruby-host-os-config-access
    desc: Ruby host_os config access
    crit: notable
    conf: 0.8
    attack: T1082
    if:
      type: text
      regex: "RbConfig::CONFIG\\s*\\[\\s*['\"]host_os"
  - id: ruby-platform-linux
    desc: References the Ruby linux platform token
    crit: notable
    conf: 0.7
    attack: T1082
    if:
      type: string_literal
      word: linux
  - id: ruby-platform-mswin
    desc: References the Ruby mswin platform token
    crit: notable
    conf: 0.7
    attack: T1082
    if:
      type: string_literal
      word: mswin
  - id: windows-os-check-a
    desc: Checks for a Windows Ruby platform
    crit: notable
    conf: 0.7
    attack: T1497
    if:
      type: string_literal
      regex: mingw|host_os.{0,50}match
  - id: windows-os-check-b
    desc: Windows platform check branch
    crit: notable
    conf: 0.7
    attack: T1497
    if:
      type: string_literal
      word: bccwin
  - id: windows-os-check-c
    desc: Windows platform check branch
    crit: notable
    conf: 0.7
    attack: T1497
    if:
      type: string_literal
      word: wince
  - id: windows-os-check-d
    desc: Windows platform check branch
    crit: notable
    conf: 0.7
    attack: T1497
    if:
      type: string_literal
      word: emc
composite_rules:
  - id: platform-fingerprint
    desc: Platform fingerprinting check
    crit: notable
    conf: 0.75
    attack: T1082
    any:
      - id: ruby-platform-const
      - id: ruby-host-os-config-access
      - id: ruby-platform-linux
      - id: ruby-platform-mswin
  - id: windows-os-check
    desc: Windows OS platform check
    crit: notable
    conf: 0.7
    attack: T1497
    any:
      - id: windows-os-check-a
      - id: windows-os-check-b
      - id: windows-os-check-c
      - id: windows-os-check-d
