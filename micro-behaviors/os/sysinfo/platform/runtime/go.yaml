# Go Platform Detection
# Detects OS and architecture identification
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [windows, unix]
  mbc: "E1082"
  attack: "T1082"
  for: [go]
traits:
- id: runtime-goos
  desc: runtime.GOOS OS detection
  crit: baseline
  conf: 0.5
  if:
    type: text
    substr: "runtime.GOOS"
- id: runtime-goarch
  desc: runtime.GOARCH architecture detection
  crit: baseline
  conf: 0.5
  if:
    type: text
    substr: "runtime.GOARCH"
- id: go-machine-type-function--getmachinetype
  desc: Go machine type identification (getMachineType)
  crit: notable
  conf: 0.8
  if:
    type: text
    word: getMachineType
- id: go-machine-type-function--getuuid
  desc: Go machine type identification (getUuid)
  crit: notable
  conf: 0.8
  if:
    type: text
    word: getUuid
- id: go-machine-type-function--getmachineid
  desc: Go machine type identification (GetMachineID)
  crit: notable
  conf: 0.8
  if:
    type: text
    word: GetMachineID
composite_rules:
- id: go-machine-type-function
  desc: Go machine type identification
  crit: notable
  conf: 0.8
  any:
  - id: go-machine-type-function--getmachinetype
  - id: go-machine-type-function--getuuid
  - id: go-machine-type-function--getmachineid
