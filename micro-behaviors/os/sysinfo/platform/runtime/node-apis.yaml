# Node.js System Info APIs
# Neutral platform/OS query functions used by any Node.js application
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
traits:
  - id: os-release-call
    desc: os.release() call
    conf: 0.7
    if:
      type: symbol
      exact: os.release
  - id: os-uptime-call
    desc: os.uptime() system uptime query
    conf: 0.85
    if:
      type: symbol
      exact: os.uptime
  - id: os-loadavg-call
    desc: os.loadavg() load average query
    conf: 0.85
    if:
      type: symbol
      exact: os.loadavg
  - id: process-cwd-call
    desc: process.cwd() call
    conf: 0.7
    if:
      type: symbol
      exact: process.cwd
  - id: js-platform-win32-check
    desc: process.platform === 'win32' check
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "process\\.platform\\s*===?\\s*['\"]win32['\"]"
