# Node.js System Info APIs
# Neutral platform/OS query functions used by any Node.js application
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
traits:
  - id: process-arch-content
    desc: Reads Node.js process.arch
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: process.arch
  - id: process-versions-content
    desc: Reads Node.js process.versions
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: process.versions
  - id: os-release-call
    desc: Queries OS release with os.release()
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: os.release
  - id: os-platform-call
    desc: Queries OS platform with os.platform()
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: os.platform
  - id: os-arch-call
    desc: Queries the CPU architecture with os.arch()
    conf: 0.75
    if:
      type: symbol
      exact: os.arch
  - id: os-type-call
    desc: Queries the operating-system name with os.type()
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: os.type
  - id: os-uptime-call
    desc: os.uptime() system uptime query
    conf: 0.85
    if:
      type: symbol
      exact: os.uptime
  - id: os-loadavg-call
    desc: os.loadavg() load average query
    conf: 0.85
    if:
      type: symbol
      exact: os.loadavg
  - id: process-cwd-call
    desc: process.cwd() call
    conf: 0.7
    if:
      type: symbol
      exact: process.cwd
  - id: process-version-access
    desc: Reads Node.js version through process.version
    crit: notable
    conf: 0.72
    if:
      type: symbol
      kind: member
      exact: process.version
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: js-platform-win32-check
    desc: Checks whether Node.js runs on Windows
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "process\\.platform\\s*===?\\s*['\"]win32['\"]"
  - id: js-platform-darwin-check
    desc: process.platform macOS check
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "(process\\.platform|os\\.platform\\(\\))\\s*===?\\s*['\"]darwin['\"]"
  - id: js-platform-linux-check
    desc: process.platform Linux check
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "(process\\.platform|os\\.platform\\(\\))\\s*===?\\s*['\"]linux['\"]"
  - id: process-platform-content
    desc: References the Node.js process.platform value
    conf: 0.7
    crit: baseline
    if:
      type: text
      substr: process.platform
  - id: os-platform-switch
    desc: switch on os.platform()
    conf: 0.75
    crit: notable
    if:
      type: text
      regex: "switch\\s*\\(\\s*os\\.platform\\(\\)\\s*\\)"

composite_rules:
  - id: process-property-fingerprint
    desc: Reads multiple Node.js process properties
    crit: notable
    conf: 0.8
    needs: 3
    any:
      - id: process-platform-content
      - id: process-arch-content
      - id: process-versions-content
      - id: micro-behaviors/process/info/commandline::check-argv
      - id: process-version-access
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: multi-platform-branch
    desc: Multi-platform OS branching logic
    crit: notable
    conf: 0.8
    mbc: E1082
    attack: T1082
    needs: 2
    any:
      - id: js-platform-darwin-check
      - id: js-platform-linux-check
      - id: js-platform-win32-check
      - id: os-platform-switch
