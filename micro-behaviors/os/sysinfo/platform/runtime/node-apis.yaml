# Node.js System Info APIs
# Neutral platform/OS query functions used by any Node.js application
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
traits:
  - id: os-platform-call
    desc: os.platform family call
    conf: 0.75
    if:
      type: text
      regex: "os\\.(platform|arch|type|release)\\s*\\("
  - id: os-release-call
    desc: os.release() call
    conf: 0.7
    if:
      type: symbol
      exact: os.release
  - id: os-uptime-call
    desc: os.uptime() system uptime query
    conf: 0.85
    if:
      type: symbol
      exact: os.uptime
  - id: os-loadavg-call
    desc: os.loadavg() load average query
    conf: 0.85
    if:
      type: symbol
      exact: os.loadavg
  - id: process-cwd-call
    desc: process.cwd() call
    conf: 0.7
    if:
      type: symbol
      exact: process.cwd
  - id: process-version-access
    desc: process.version access
    crit: notable
    conf: 0.72
    if:
      type: ast
      kind: member
      exact: process.version
  - id: js-platform-win32-check
    desc: process.platform === 'win32' check
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "process\\.platform\\s*===?\\s*['\"]win32['\"]"
  - id: process-platform-content
    desc: process.platform in content
    conf: 0.7
    crit: baseline
    if:
      type: text
      substr: process.platform
