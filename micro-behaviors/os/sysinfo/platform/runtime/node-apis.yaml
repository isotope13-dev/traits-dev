# Node.js System Info APIs
# Neutral platform/OS query functions used by any Node.js application
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
traits:
  - id: os-platform-call
    desc: os.platform family call
    conf: 0.75
    if:
      type: text
      regex: "os\\.(platform|type|release)\\s*\\("
  - id: os-arch-call
    desc: os.arch() call
    conf: 0.75
    if:
      type: symbol
      exact: os.arch
  - id: os-uptime-call
    desc: os.uptime() system uptime query
    conf: 0.85
    if:
      type: symbol
      exact: os.uptime
  - id: os-loadavg-call
    desc: os.loadavg() load average query
    conf: 0.85
    if:
      type: symbol
      exact: os.loadavg
  - id: process-cwd-call
    desc: process.cwd() call
    conf: 0.7
    if:
      type: symbol
      exact: process.cwd
  - id: process-version-access
    desc: process.version access
    crit: notable
    conf: 0.72
    if:
      type: symbol
      kind: member
      exact: process.version
  - id: js-platform-win32-check
    desc: process.platform === 'win32' check
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "process\\.platform\\s*===?\\s*['\"]win32['\"]"
  - id: js-platform-darwin-check
    desc: process.platform macOS check
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "(process\\.platform|os\\.platform\\(\\))\\s*===?\\s*['\"]darwin['\"]"
  - id: js-platform-linux-check
    desc: process.platform Linux check
    conf: 0.6
    crit: baseline
    if:
      type: text
      regex: "(process\\.platform|os\\.platform\\(\\))\\s*===?\\s*['\"]linux['\"]"
  - id: process-platform-content
    desc: process.platform in content
    conf: 0.7
    crit: baseline
    if:
      type: text
      substr: process.platform
  - id: os-platform-switch
    desc: switch on os.platform()
    conf: 0.75
    crit: notable
    if:
      type: text
      regex: "switch\\s*\\(\\s*os\\.platform\\(\\)\\s*\\)"

composite_rules:
  - id: multi-platform-branch
    desc: Multi-platform OS branching logic
    crit: notable
    conf: 0.8
    mbc: E1082
    attack: T1082
    needs: 2
    any:
      - id: js-platform-darwin-check
      - id: js-platform-linux-check
      - id: js-platform-win32-check
      - id: os-platform-switch
