defaults:
  platforms: [windows, unix]
  for:
    - python
  crit: notable
  attack: T1082
traits:
  - id: python-win32-check
    desc: Checks for Windows platform
    conf: 0.8
    mbc: E1082
    if:
      type: string_literal
      regex: sys\.platform.{0,20}win32|platform.{0,20}win32|['"]win32['"].{0,20}sys\.platform
  - id: python-osname-nt-check
    desc: Windows platform check via os.name == 'nt'
    conf: 0.8
    mbc: E1082
    if:
      type: text
      regex: os\.name\s*==\s*['"]nt['"]|from\s+os\s+import\s+name\b
  - id: sys-platform-check
    desc: Python sys.platform conditional check
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: sys.platform
  - id: sys-argv-access
    desc: Python sys.argv command-line access
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: sys.argv
  - id: sys-argv-1
    desc: Python first positional argv access
    # Baseline: `sys.argv[1]` is the normal way every Python CLI script reads
    # its first argument — not a behavior signal on its own.
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: sys\.argv\s*\[\s*1\s*\]
  - id: sys-argv-2
    desc: Python second positional argv access
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: sys\.argv\s*\[\s*2\s*\]
  - id: platform-system
    desc: Queries the OS with platform.system()
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: platform.system
    unless:
      - type: text
        regex: 'HEADER_NAME_USER_AGENT\s*=\s*[''"]User-Agent[''"]'
  - id: platform-node
    desc: platform.node() hostname call
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: platform.node
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: platform-full
    desc: platform.platform() full info
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: platform.platform
  - id: python-platform-machine
    desc: Queries CPU architecture with platform.machine()
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: platform.machine
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-platform-processor
    desc: platform.processor() processor identity
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: platform.processor
  - id: platform-libc-version
    desc: Queries the host libc implementation
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: platform.libc_ver
  - id: platform-python-version
    desc: Queries the Python interpreter version
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: platform.python_version
  - id: platform-python-build
    desc: Queries the Python interpreter build
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: platform.python_build
  - id: platform-python-compiler
    desc: Queries the Python compiler identity
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: platform.python_compiler
  - id: platform-os-release
    desc: Queries the operating system release
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: platform.release
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: platform-macos-version
    desc: Queries the macOS version
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: platform.mac_ver
  - id: platform-windows-version
    desc: Queries the Windows version
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: platform.win32_ver
composite_rules:
  - id: sys-argv-two-positional
    desc: Python two positional argv operands
    # Baseline: a CLI script taking two positional args is normal shape, not
    # a behavior claim.
    crit: baseline
    conf: 0.9
    all:
      - id: sys-argv-1
      - id: sys-argv-2
