defaults:
  platforms: [routeros, appliance, unix]
  for: [javascript]
  attack: T1082

traits:
  - id: linux-hypervisor-type-path
    desc: Linux hypervisor type path reference
    crit: notable
    conf: 0.91
    if:
      type: string_literal
      exact: /sys/hypervisor/type

  - id: udev-queue-path
    desc: Udev queue path reference
    crit: notable
    conf: 0.91
    if:
      type: string_literal
      exact: /dev/.udev/queue
