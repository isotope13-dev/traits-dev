defaults:
  for: [elf, macho, c, cpp]
  crit: notable
  platforms:
    - unix
traits:
  - id: uname
    desc: Query system name and information
    conf: 0.6
    mbc: E1082
    attack: T1082
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
      - type: basename
        exact: configure
      - id: metadata/file/string/identity::python3-interpreter-basename
      - id: metadata/file/extension/identity::autotools-configure-basename
      - type: basename
        exact: libvk_swiftshader.so
      - type: basename
        exact: libGLESv2.so
      - type: text
        substr: "Checked 'uname -a': arm64="
      - type: text
        substr: "uname shell command to check for arm64 failed:"
    if:
      type: symbol
      exact: uname

  - id: kernel-image-path
    desc: References Linux kernel image (vmlinux) paths

    for: [shell, python, c, cpp, elf]
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '/boot/vmlinux-|/sys/kernel/btf/vmlinux|/lib/modules/.{1,160}/vmlinux'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
  - id: kernel-vmlinux-reference
    desc: References vmlinux BTF kernel metadata

    for: [shell, python, c, cpp, elf]
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)vmlinux.{0,40}(BTF|kernel)'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
