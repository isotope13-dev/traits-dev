defaults:
  for: [elf, macho, c, cpp]
  crit: notable
  platforms:
    - unix
traits:
  - id: uname
    desc: Query system name and information
    conf: 0.6
    mbc: E1082
    attack: T1082
    unless:
      - type: basename
        exact: configure
      - type: basename
        exact: python3
      - type: basename
        regex: '(^|[!/])configure$'
      - type: basename
        exact: libvk_swiftshader.so
      - type: basename
        exact: libGLESv2.so
      - type: text
        substr: "Checked 'uname -a': arm64="
      - type: text
        substr: "uname shell command to check for arm64 failed:"
    if:
      type: symbol
      exact: uname

  - id: kernel-image-path
    desc: References Linux kernel image (vmlinux) paths

    for: [shell, python, c, cpp, elf]
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '/boot/vmlinux-|/sys/kernel/btf/vmlinux|/lib/modules/.{1,160}/vmlinux'

  - id: kernel-vmlinux-symbol
    desc: References vmlinux kernel image symbol

    for: [shell, python, c, cpp, elf]
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: vmlinux
