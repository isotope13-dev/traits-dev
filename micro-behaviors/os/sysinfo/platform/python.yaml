# Python Platform Detection
# Detects Python-specific system information access patterns
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  crit: notable
traits:
  - id: python-win32-check
    desc: Checks for Windows platform
    conf: 0.8
    attack: T1082
    mbc: E1082
    if:
      type: string_value
      regex: "sys\\.platform.{0,20}win32|platform.{0,20}win32|['\"]win32['\"].{0,20}sys\\.platform"
  - id: sys-platform-check
    desc: Python sys.platform conditional check
    crit: baseline
    conf: 0.8
    attack: "T1082"
    if:
      type: raw
      substr: "sys.platform"
  - id: sys-argv-access
    desc: Python sys.argv command-line access
    crit: baseline
    conf: 0.7
    attack: "T1082"
    if:
      type: raw
      substr: "sys.argv"
  - id: platform-system
    desc: platform.system() call
    conf: 0.70
    attack: "T1082"
    if:
      type: raw
      substr: "platform.system()"
  - id: platform-node
    desc: platform.node() hostname call
    conf: 0.70
    attack: "T1082"
    if:
      type: raw
      substr: "platform.node()"
  - id: platform-full
    desc: platform.platform() full info
    conf: 0.70
    attack: "T1082"
    if:
      type: raw
      substr: "platform.platform()"
