defaults:
  platforms:
    - unix
    - windows
  for:
    - c
    - elf
  crit: baseline
  mbc: E1082
  attack: T1082
traits:
  - id: arch-x86-64
    desc: x86_64 architecture string
    conf: 0.3
    if:
      type: text
      substr: x86_64
  - id: arch-aarch64
    desc: aarch64 architecture string
    conf: 0.3
    platforms:
      - unix
    if:
      type: text
      substr: aarch64
  - id: arch-i386
    desc: i386 architecture string
    conf: 0.3
    if:
      type: text
      exact: i386
  - id: arch-arm-dup
    desc: arm architecture string
    conf: 0.3
    platforms:
      - unix
    if:
      type: text
      exact: arm
  - id: multi-arch-runtime-wordlist
    desc: Multi-architecture runtime wordlist
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    platforms:
      - unix
      - android
    unless:
      - id: metadata/package/tooling::autoconf-generated-script
    if:
      type: text
      regex: (?s)(?:\barm(?:5|6|7)?\b.{0,80}\bmips\b.{0,80}\bx86(?:_64)?\b|\bmips\b.{0,80}\bx86(?:_64)?\b.{0,80}\barm(?:5|6|7)?\b|\bx86(?:_64)?\b.{0,80}\barm(?:5|6|7)?\b.{0,80}\bmips\b)
