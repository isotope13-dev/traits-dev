defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1082
traits:
  - id: libegl-basename
    desc: Chromium libEGL basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '(^|[!/])libEGL\.dll$'
  - id: get-version-ex
    desc: Query Windows version info
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^GetVersionEx[AW]$
  - id: get-system-default-lang-id
    desc: Query system default language
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: GetSystemDefaultLangID
  - id: get-user-default-ui-language
    desc: Query user default UI language
    crit: baseline
    conf: 0.88
    if:
      type: text
      exact: GetUserDefaultUILanguage
  - id: get-locale-info
    desc: Query locale information
    crit: baseline
    conf: 0.88
    if:
      type: text
      regex: ^GetLocaleInfo[AW]$
  - id: get-user-default-lcid
    desc: Query user locale identifier
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GetUserDefaultLCID
  - id: enum-system-locales
    desc: Enumerate installed system locales
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: ^EnumSystemLocales(Ex|W|A)?$
  - id: get-calendar-info
    desc: Query calendar regional settings
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: ^GetCalendarInfo[AW]$
composite_rules:
  - id: locale-environment-fingerprint
    desc: Multiple Win32 locale discovery APIs
    crit: notable
    conf: 0.9
    all:
      - id: get-locale-info
      - id: get-user-default-lcid
    any:
      - id: enum-system-locales
      - id: get-calendar-info
    unless:
      - id: micro-behaviors/os/sysinfo/platform::libegl-basename
