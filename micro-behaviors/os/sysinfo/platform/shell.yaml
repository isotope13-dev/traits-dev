defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
  crit: component
traits:
  - id: arch-mips
    desc: MIPS architecture string
    if:
      type: string_literal
      word: mips
  - id: arch-arm
    desc: ARM architecture string
    if:
      type: string_literal
      regex: \barm[0-9]?\b
  - id: arch-aarch64
    desc: AArch64 (ARM64) architecture string
    if:
      type: string_literal
      word: aarch64
  - id: arch-arm64
    desc: arm64 architecture string
    if:
      type: string_literal
      word: arm64
  - id: arch-x86
    desc: x86 architecture string
    if:
      type: string_literal
      word: x86
  - id: arch-sh4
    desc: SH4 architecture string
    if:
      type: string_literal
      word: sh4
  - id: arch-ppc
    desc: PPC architecture string
    if:
      type: string_literal
      word: ppc
  - id: arch-arc
    desc: ARC architecture string
    if:
      type: string_literal
      word: arc
composite_rules:
  - id: multi-arch-target
    desc: Script targets multiple CPU architectures (IoT botnet dropper pattern)
    crit: notable
    conf: 0.85
    mbc: Discovery
    attack: T1082
    needs: 3
    any:
      - id: arch-mips
      - id: arch-arm
      - id: arch-aarch64
      - id: arch-arm64
      - id: arch-x86
      - id: arch-sh4
      - id: arch-ppc
      - id: arch-arc
