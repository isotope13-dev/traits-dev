# Node.js System Info APIs
# Neutral platform/OS query functions used by any Node.js application
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
traits:
  - id: os-release-call
    desc: os.release() call
    conf: 0.7
    if:
      type: symbol
      exact: os.release
  - id: process-cwd-call
    desc: process.cwd() call
    conf: 0.7
    if:
      type: symbol
      exact: process.cwd
