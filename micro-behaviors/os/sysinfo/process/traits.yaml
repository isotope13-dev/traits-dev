# OS Information Gathering
# System information collection capabilities
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  - id: teb-fs-18h-source
    desc: Reads the Windows TEB via FS:[18h]
    crit: notable
    conf: 0.85
    for: [c, cpp]
    if:
      type: text
      regex: 'FS:\[0?x?18h?\]'
      case_insensitive: true
  # === Startup Information ===
  - id: get-startup-info
    desc: Get process startup information
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "GetStartupInfoW"
  - id: get-startup-info-a
    desc: Read startup info via GetStartupInfoA
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "GetStartupInfoA"
  # === Module Information ===
  - id: get-module-filename-ex
    desc: Get module filename for process
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "GetModuleFileNameEx"
