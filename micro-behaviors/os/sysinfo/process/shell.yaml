defaults:
  platforms: [unix, windows]
  for: [batch, powershell, shell, binaries]
  attack: T1082
traits:
  - id: sh-whoami-command--rx-3
    desc: whoami current-user enumeration command
    crit: component
    conf: 0.75
    for: [shell]
    platforms: [unix]
    if:
      type: text
      regex: "(^|[\\n;&|`$({])\\s*whoami(\\s|[;&|)]|$)"
    count_max: 1007674
  - id: windows-systeminfo-command
    desc: Windows systeminfo command
    crit: notable
    conf: 0.72
    for: [batch, powershell, shell]
    if:
      type: text
      regex: (?i)(^|[\r\n&|({])\s*systeminfo(\.exe)?\b
  - id: systeminfo-token
    desc: systeminfo command/string token
    crit: component
    conf: 0.72
    for: [batch, class, pe, powershell, pyc, python]
    platforms: [windows]
    if:
      type: text
      substr: systeminfo
composite_rules:
  - id: sh-whoami-command
    desc: whoami command
    crit: baseline
    conf: 0.75
    for: [shell]
    platforms: [unix]
    any:
      - id: sh-whoami-command--rx-3
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: shell-system-fingerprinting
    desc: System fingerprinting shell commands
    crit: notable
    conf: 0.8
    for: [shell]
    platforms: [unix]
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/platform/arch::sh-uname-fingerprint
      - id: micro-behaviors/os/sysinfo/hostname::sh-hostname-command
      - id: sh-whoami-command
      - id: micro-behaviors/os/env/vars/cicd::sh-ci-variable
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
