defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: cpuid-autht-fragment
    desc: CPUID AuthenticAMD vendor fragment
    crit: component
    conf: 0.85
    if:
      type: text
      exact: Autht
      section: .text

  - id: cpuid-genut-fragment
    desc: Split GenuineIntel vendor fragment
    crit: component
    conf: 0.85
    if:
      type: text
      exact: Genut
      section: .text

composite_rules:
  - id: split-cpu-vendor-check
    desc: Split CPU vendor check
    crit: notable
    conf: 0.88
    all:
      - id: cpuid-autht-fragment
      - id: cpuid-genut-fragment
