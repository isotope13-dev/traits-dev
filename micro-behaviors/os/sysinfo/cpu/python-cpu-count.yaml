# os.cpu_count() — CPU-count system-info capability (worker-pool sizing, etc.).
# Generic; relocated from objectives/anti-analysis/sandbox-detect so the
# standalone component is labelled by what it searches for. The sandbox
# cpu-count-exit gate references it cross-directory.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: python-cpu-count-symbol
    desc: Python CPU count symbol
    crit: component
    conf: 0.84
    if:
      type: symbol
      exact: os.cpu_count
