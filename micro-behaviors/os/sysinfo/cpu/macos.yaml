defaults:
  attack: T1082
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: sysctl-cpu-brand-string
    desc: macOS CPU model sysctl key
    crit: notable
    conf: 0.85
    for: [macho, shell, python, javascript, ruby, c, cpp, go]
    platforms: [macos]
    if:
      type: text
      substr: machdep.cpu.brand_string
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary-macho
  - id: macos-cpuinfo
    desc: macOS CPU information query
    crit: notable
    conf: 0.7
    platforms:
      - macos
    if:
      type: text
      substr: CpuInfoAndModel
