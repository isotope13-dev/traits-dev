defaults:
  for:
    - elf
    - shell
    - python
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: sys-devices
    desc: Access CPU info via /sys/devices
    crit: baseline
    conf: 0.7
    attack: T1082
    platforms:
      - linux
    if:
      type: text
      substr: /sys/devices/system/cpu
    unless:
      - type: basename
        exact: tabby
