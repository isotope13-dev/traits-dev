defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: get-computer-name
    desc: Query computer/host name
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      type: symbol
      regex: '^GetComputerName(Ex)?[AW]?$'
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary-comp
        - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: get-user-name
    desc: Query current username
    crit: notable
    conf: 0.9
    attack: T1033
    if:
      type: symbol
      regex: ^GetUserName[AW]$
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: dotnet-user-domain-name
    desc: Query current Windows logon domain
    crit: notable
    conf: 0.9
    attack: T1033
    for: [pe, csharp]
    if:
      type: text
      exact: get_UserDomainName
