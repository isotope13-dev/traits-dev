defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: get-computer-name
    desc: Query computer/host name
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      type: text
      regex: ^GetComputerName[AW]$
  - id: get-user-name
    desc: Query current username
    crit: notable
    conf: 0.9
    attack: T1033
    if:
      type: symbol
      regex: ^GetUserName[AW]$
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: string_value
        substr: "Nullsoft Install System"
      - type: basename
        regex: '^Uninstall .+\.exe$'
