# Hostname Discovery - Ruby
# Retrieving system hostname
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
  attack: "T1082"
traits:
  - id: ruby-socket-gethostname
    desc: Queries hostname with Ruby Socket.gethostname
    crit: notable
    conf: 0.9
    platforms: [unix, windows]
    if:
      type: text
      regex: '\bSocket\.gethostname\b'
