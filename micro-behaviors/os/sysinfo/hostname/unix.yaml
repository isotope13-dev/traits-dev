defaults:
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  crit: baseline
  mbc: E1082
  attack: T1082
  platforms:
    - unix
    - linux
    - macos
    - windows
traits:
  - id: gethostname
    desc: Get hostname of current machine
    for:
      - elf
      - macho
    conf: 0.5
    if:
      type: symbol
      regex: gethostname
  - id: getdomainname
    desc: Get NIS domain name
    for:
      - elf
      - macho
    conf: 0.5
    platforms:
      - unix
      - linux
      - macos
    if:
      type: symbol
      regex: getdomainname
  - id: getfqdn
    desc: Get fully qualified domain name
    conf: 0.5
    platforms:
      - unix
      - linux
      - macos
    if:
      type: text
      substr: getfqdn
