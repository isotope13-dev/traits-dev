defaults:
  for: [scripts, binaries]
  crit: baseline
  mbc: E1082
  attack: T1082
  platforms:
    - unix
    - windows
traits:
  - id: gethostname
    desc: Get hostname of current machine
    for:
      - elf
      - macho
      - c
      - cpp
      - objc
    conf: 0.5
    if:
      type: symbol
      regex: gethostname
  - id: getdomainname
    desc: Get NIS domain name
    for:
      - elf
      - macho
    conf: 0.5
    platforms:
      - linux
      - macos
    if:
      type: symbol
      regex: getdomainname
  - id: getfqdn
    desc: Get fully qualified domain name
    conf: 0.5
    platforms:
      - linux
      - macos
    if:
      type: text
      substr: getfqdn
