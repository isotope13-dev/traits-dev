# Hostname Identification
# Composite rules for hostname and domain identification
defaults:
  platforms: [linux, macos, windows, unix]
composite_rules:
  - id: hostname-identification
    desc: Identifies the hostname for system fingerprinting
    crit: notable
    conf: 0.7
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/hostname::gethostname
      - id: micro-behaviors/os/sysinfo/machine-id::etc-hostname
      - id: micro-behaviors/os/env/vars/system-info::hostname-var
      - id: micro-behaviors/os/sysinfo/hostname::getfqdn
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
