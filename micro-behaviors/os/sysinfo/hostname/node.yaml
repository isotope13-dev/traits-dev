defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  attack: T1082
traits:
  - id: node-os-alias-hostname-call
    desc: Node os-alias hostname query
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: '^[A-Za-z_$][A-Za-z0-9_$]*\.hostname$'
  - id: os-hostname-call
    desc: os.hostname() call
    conf: 0.75
    if:
      type: symbol
      exact: os.hostname
