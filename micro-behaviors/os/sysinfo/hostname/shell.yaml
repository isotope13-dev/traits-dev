# Hostname Discovery - Shell/POSIX
# Retrieving system hostname via shell commands
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  for: [shell, javascript, typescript, python, ruby, perl]
  attack: "T1082"
traits:
  - id: hostname-cmd
    desc: hostname command invocation
    crit: notable
    conf: 0.5
    mbc: "E1082"
    if:
      type: string_value
      regex: ^hostname(?:\s|$)
    unless:
      - type: raw
        regex: verify_hostname|:hostname\b
      - type: basename
        regex: (_spec|_test)\.rb$
