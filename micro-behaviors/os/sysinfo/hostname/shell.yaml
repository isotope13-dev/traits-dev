# Hostname Discovery - Shell/POSIX
# Retrieving system hostname via shell commands
defaults:
  platforms: [unix, windows]
  for: [shell, javascript, typescript, python, ruby, perl, lua]
  attack: "T1082"
traits:
  - id: hostname-cmd
    desc: Invokes hostname shell command
    crit: notable
    conf: 0.5
    for: [shell]
    mbc: "E1082"
    if:
      type: string_literal
      regex: ^hostname(\s|$)
    unless:
      - type: text
        regex: verify_hostname|:hostname\b
      - type: text
        regex: '["'']hostname["'']\s*,\s*["'']port["'']'
      # "hostname" as a dict/subscript/config key, not a command being executed
      - type: text
        regex: '\[\s*["'']hostname["'']\s*\]'
      - type: text
        regex: '["'']hostname["'']\s*:'
      - type: text
        regex: ',\s*["'']hostname["'']'
      - id: metadata/package/testing/presence/harness::ruby-test-file
      - id: metadata/package/files/system-package::shell-completion-script
  - id: sh-hostname-command
    desc: Shell hostname command substitution
    crit: notable
    conf: 0.75
    for: [shell]
    platforms: [unix]
    if:
      type: text
      regex: "\\$\\(hostname\\)|`hostname`"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
