# Go Hostname and Identity Discovery
# Detects hostname, user, and process identity queries
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  mbc: "E1082"
  attack: "T1082"
traits:
  - id: os-hostname
    desc: os.Hostname() call
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: ast
      kind: call
      exact: "os.Hostname"
  - id: hostname-string
    desc: Hostname in binary
    crit: notable
    conf: 0.65
    for: [elf, macho, pe]
    if:
      type: string_value
      word: "Hostname"
  - id: user-current
    desc: user.Current() call
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: ast
      kind: call
      exact: "user.Current"
  - id: os-getuid
    desc: os.Getuid() call
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: ast
      kind: call
      exact: "os.Getuid"
  - id: os-executable
    desc: os.Executable() self path
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: ast
      kind: call
      exact: "os.Executable"
  - id: os-getpid
    desc: os.Getpid() call
    crit: baseline
    conf: 0.5
    for: [go]
    if:
      type: ast
      kind: call
      exact: "os.Getpid"
composite_rules:
  - id: system-fingerprint
    desc: System fingerprinting capability
    crit: notable
    conf: 0.75
    for: [go]
    any:
      - id: os-hostname
      - id: user-current
      - id: os-executable
  - id: full-system-recon
    desc: Full system reconnaissance
    crit: suspicious
    conf: 0.85
    for: [go]
    all:
      - id: os-hostname
      - id: user-current
