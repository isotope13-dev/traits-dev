defaults:
  platforms: [windows, linux, macos]
  mbc: E1082
  attack: T1082
traits:
- id: os-hostname
  desc: os.Hostname() call
  crit: notable
  conf: 0.7
  for:
  - go
  if:
    type: symbol
    kind: call
    exact: os.Hostname
- id: hostname-string-raw
  desc: Hostname in binary
  crit: component
  conf: 0.65
  for: [go, elf, macho, pe]
  if:
    type: text
    word: Hostname
- id: user-current
  desc: user.Current() call
  crit: notable
  conf: 0.7
  for:
  - go
  if:
    type: symbol
    kind: call
    exact: user.Current
- id: os-getuid
  desc: os.Getuid() call
  crit: notable
  conf: 0.7
  for:
  - go
  if:
    type: symbol
    kind: call
    exact: os.Getuid
- id: os-executable
  desc: os.Executable() self path
  crit: notable
  conf: 0.7
  for:
  - go
  if:
    type: symbol
    kind: call
    exact: os.Executable
- id: os-getpid
  desc: os.Getpid() call
  crit: baseline
  conf: 0.5
  for:
  - go
  if:
    type: symbol
    kind: call
    exact: os.Getpid
composite_rules:
- id: system-fingerprint
  desc: System fingerprinting capability
  crit: notable
  conf: 0.75
  for:
  - go
  any:
  - id: os-hostname
  - id: user-current
  - id: os-executable
- id: full-system-recon
  desc: Host and user identity collection
  crit: notable
  conf: 0.85
  for:
  - go
  all:
  - id: os-hostname
  - id: user-current
- id: hostname-string
  desc: Hostname in Go binary
    # Baseline: Go's `os.Hostname` is transitively linked by most stdlib paths
    # (os/user, net/http, os/signal), so its string appearing in gopclntab is
    # the norm for any non-trivial Go program — not a behavior claim.
  crit: baseline
  conf: 0.65
  for: [scripts, binaries]
  all:
  - id: hostname-string-raw
  any:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiled::go-runtime-marker
