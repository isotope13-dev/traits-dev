defaults:
  platforms: [windows]
  for: [binaries, source]

traits:
  - id: get-adapters-addresses
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: micro-behaviors/os/network/interface::get-adapters-addresses
  - id: get-adapters-info
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: micro-behaviors/os/network/interface::get-adapters-info
  - id: dotnet-mac-address-enumeration
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: micro-behaviors/os/sysinfo/network::dotnet-mac-address-enumeration-real
  - id: dotnet-address-bytes
    desc: References GetAddressBytes method
    crit: component
    conf: 0.92
    if:
      type: text
      word: GetAddressBytes
  - id: ss
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      word: __cleave_missing_os_sysinfo_network_ss__

composite_rules:
  - id: dotnet-mac-address-enumeration-real
    desc: Enumerates MAC address bytes in .NET
    crit: notable
    conf: 0.96
    all:
      - id: micro-behaviors/os/network/interface::dotnet-network-interface-recon
      - id: dotnet-address-bytes
