defaults:
  platforms: [windows, unix]
  for:
    - binaries
    - shell
    - python
    - javascript
traits:
  - id: sys-class-net
    desc: Linux network interface sysfs path
    crit: notable
    conf: 0.75
    platforms: [unix]
    if:
      type: text
      substr: /sys/class/net
  - id: ip-link
    desc: Network interface query via ip link
    crit: notable
    conf: 0.75
    platforms: [unix]
    if:
      type: text
      regex: \bip\s+link\b
  - id: ip-a
    desc: Network interface query via ip a
    crit: notable
    conf: 0.75
    platforms: [unix]
    if:
      type: text
      regex: \bip\s+a(ddr)?\b
  - id: ifconfig
    desc: Network interface query via ifconfig
    crit: notable
    conf: 0.75
    if:
      type: text
      word: ifconfig
  - id: netstat-an
    desc: Network status query via netstat -an
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \bnetstat\s+-an\b
  - id: ss
    desc: Network status query via ss
    crit: notable
    conf: 0.7
    platforms: [unix]
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_:./-])(/usr/(sbin|bin)/)?ss(\s|$)'
  - id: socket-ip-address-single
    desc: Single IP derived from socket
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: socket.{0,40}(local|public|external).{0,20}(ip|address)
  - id: mac-format-string
    desc: Formatted MAC address string pattern
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: (%02X[:-]){5}%02X
