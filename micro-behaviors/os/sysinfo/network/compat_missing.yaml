defaults:
  platforms: [windows]
  for: [binaries, source]

traits:
  - id: get-adapters-addresses
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: micro-behaviors/os/network/interface::get-adapters-addresses
  - id: get-adapters-info
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: micro-behaviors/os/network/interface::get-adapters-info
  - id: dotnet-mac-address-enumeration
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_dotnet_mac_address_enumeration__
  - id: ss
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_os_sysinfo_network_ss__
