defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, source, binaries]
traits:
  - id: sys-class-net
    desc: Linux network interface sysfs path
    crit: notable
    conf: 0.75
    platforms: [linux, unix]
    if:
      type: string_value
      substr: /sys/class/net
  - id: ip-link
    desc: Network interface query via ip link
    crit: notable
    conf: 0.75
    platforms: [linux, unix]
    if:
      type: string_value
      regex: \bip\s+link\b
  - id: ip-a
    desc: Network interface query via ip a
    crit: notable
    conf: 0.75
    platforms: [linux, unix]
    if:
      type: string_value
      regex: \bip\s+a(ddr)?\b
  - id: ifconfig
    desc: Network interface query via ifconfig
    crit: notable
    conf: 0.75
    if:
      type: string_value
      word: ifconfig
  - id: netstat-an
    desc: Network status query via netstat -an
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: \bnetstat\s+-an\b
  - id: ss
    desc: Network status query via ss
    crit: notable
    conf: 0.7
    platforms: [linux, unix]
    if:
      type: string_value
      word: ss
  - id: socket-ip-address-single
    desc: Single IP derived from socket
    crit: notable
    conf: 0.72
    if:
      type: string_value
      regex: socket.{0,40}(local|public|external).{0,20}(ip|address)
  - id: mac-format-string
    desc: Formatted MAC address string pattern
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: (%02X[:-]){5}%02X
