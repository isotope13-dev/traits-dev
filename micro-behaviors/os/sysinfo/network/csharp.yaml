defaults:
  platforms: [unix, windows]
  for: [csharp]

traits:
  - id: dotnet-network-interface-enumeration
    desc: .NET enumerates local network interfaces
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: NetworkInterface.GetAllNetworkInterfaces
  - id: dotnet-ip-global-properties
    desc: .NET queries IP global properties
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: IPGlobalProperties.GetIPGlobalProperties()
