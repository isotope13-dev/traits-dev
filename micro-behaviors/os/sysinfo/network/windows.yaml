defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: net-statistics-get
    desc: Query Windows network statistics
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: NetStatisticsGet
  - id: lanmanserver-service
    desc: LanmanServer service marker
    crit: component
    conf: 0.8
    if:
      type: string_value
      exact: LanmanServer
  - id: lanmanworkstation-service
    desc: LanmanWorkstation service marker
    crit: component
    conf: 0.8
    if:
      type: string_value
      exact: LanmanWorkstation
composite_rules:
  - id: windows-network-statistics
    desc: Windows network activity fingerprinting
    crit: notable
    conf: 0.92
    all:
      - id: net-statistics-get
    any:
      - id: lanmanserver-service
      - id: lanmanworkstation-service
