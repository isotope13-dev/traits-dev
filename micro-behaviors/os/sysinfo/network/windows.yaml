defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: dotnet-networkinterface-namespace
    desc: .NET network interface namespace
    crit: component
    conf: 0.9
    if:
      type: text
      exact: System.Net.NetworkInformation
  - id: dotnet-get-all-network-interfaces
    desc: Enumerate all network interfaces
    crit: notable
    conf: 0.96
    if:
      type: text
      exact: GetAllNetworkInterfaces
  - id: dotnet-get-physical-address
    desc: Read adapter physical address
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: GetPhysicalAddress
  - id: dotnet-get-address-bytes
    desc: Read physical address bytes
    crit: component
    conf: 0.9
    if:
      type: text
      exact: GetAddressBytes
  - id: net-statistics-get
    desc: Query Windows network statistics
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: NetStatisticsGet
  - id: get-tcp-table
    desc: Query TCP connection table
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: GetTcpTable
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: get-udp-table
    desc: Query UDP connection table
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: GetUdpTable
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: get-if-table
    desc: Query network interface table
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: GetIfTable
  - id: get-adapters-info
    desc: Query adapter information
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GetAdaptersInfo
  - id: get-adapters-addresses
    desc: Query adapter addresses
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: GetAdaptersAddresses
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: lanmanserver-service
    desc: LanmanServer service marker
    crit: component
    conf: 0.8
    if:
      type: text
      exact: LanmanServer
  - id: lanmanworkstation-service
    desc: LanmanWorkstation service marker
    crit: component
    conf: 0.8
    if:
      type: text
      exact: LanmanWorkstation
composite_rules:
  - id: dotnet-mac-address-enumeration
    desc: Enumerates MAC addresses via .NET
    crit: notable
    conf: 0.97
    all:
      - id: dotnet-networkinterface-namespace
      - id: dotnet-get-all-network-interfaces
      - id: dotnet-get-physical-address
    any:
      - id: dotnet-get-address-bytes
      - id: get-adapters-addresses
    needs: 1
  - id: windows-network-statistics
    desc: Windows network activity fingerprinting
    crit: notable
    conf: 0.92
    all:
      - id: net-statistics-get
    any:
      - id: lanmanserver-service
      - id: lanmanworkstation-service
