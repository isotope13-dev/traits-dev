defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]

traits:
  - id: ifconfig-hwaddr-field
    desc: References ifconfig HWaddr field
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: HWaddr
  - id: ether-mac-address-field
    desc: Parses ether MAC address field
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'ether\s+[0-9a-fA-F]{2}[:-][0-9a-fA-F]{2}[:-][0-9a-fA-F]{2}'
  - id: siocgifhwaddr-ioctl
    desc: References MAC-address query ioctl
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: SIOCGIFHWADDR
