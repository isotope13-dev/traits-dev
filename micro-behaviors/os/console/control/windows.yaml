defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: set-console-ctrl-handler
    desc: Register console control handler
    crit: baseline
    conf: 0.86
    if:
      type: symbol
      exact: SetConsoleCtrlHandler
    unless:
      - id: metadata/file/extension::uac-exe-basename
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    downgrade:
      # Go's runtime registers a console ctrl handler to translate Ctrl-C into
      # SIGINT for os/signal; every Go Windows binary imports it.
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/binary/framework::dotnet-singlefilehost-runtime
