defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: chcp-65001-command
    desc: Windows UTF-8 code page command
    crit: baseline
    conf: 0.85
    for: [batch, powershell, vbs]
    if:
      type: text
      regex: "chcp['\"]?\\s*,\\s*['\"]65001"
  - id: set-console-ctrl-handler
    desc: Register console control handler
    crit: baseline
    conf: 0.86
    if:
      type: symbol
      exact: SetConsoleCtrlHandler
    unless:
      - id: metadata/file/extension/identity::uac-exe-basename
      - id: metadata/binary/framework/
    downgrade:
      # Go's runtime registers a console ctrl handler to translate Ctrl-C into
      # SIGINT for os/signal; every Go Windows binary imports it.
      any:
        - id: metadata/lang/compiled/
        - id: metadata/binary/framework/
