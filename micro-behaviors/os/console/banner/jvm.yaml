defaults:
  platforms: [unix]
  for: [java, kotlin, class, jar]
  crit: notable
  conf: 0.9

traits:
  - id: jvm-login-banner-path-reference
    desc: JVM references Unix login banner paths
    if:
      type: text
      regex: '/etc/issue[\s\S]{0,120}/etc/motd'

  - id: jvm-login-banner-path-bytecode
    desc: JVM bytecode references the issue banner path
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 65 74 63 2F 69 73 73 75 65
