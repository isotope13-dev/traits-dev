defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.86

traits:
  - id: issue-banner-overwrite
    desc: Shell overwrites login issue banner
    if:
      type: text
      regex: 'cat\s*>\s*/etc/issue\b'

  - id: motd-banner-overwrite
    desc: Shell overwrites login MOTD banner
    if:
      type: text
      regex: 'cat\s*>\s*/etc/motd\b'
