defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  # Console alias APIs are almost never called by user code outside of
  # `cmd.exe` itself and process-name spoofers.  Their presence in another
  # PE is a notable purpose signal.
  - id: get-console-alias-exes-a
    desc: Enumerate console alias owners (ANSI)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: GetConsoleAliasExesA
  - id: get-console-alias-exes-length-w
    desc: Size the console alias buffer (wide)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: GetConsoleAliasExesLengthW
  - id: read-console-output-character-w
    desc: Read characters from a console screen buffer
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: ReadConsoleOutputCharacterW
