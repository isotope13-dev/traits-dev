defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: redirect-dev-null
    desc: Redirect to /dev/null
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: '>/dev/null'
  - id: stderr-to-dev-null
    desc: Stderr redirected to /dev/null
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: '2>/dev/null'
  - id: dense-stderr-suppression
    desc: Dense stderr suppression pattern
    crit: notable
    conf: 0.85
    for: [shell]
    count_min: 5
    per_kb_min: 5.0
    if:
      type: text
      substr: '2>/dev/null'
    unless:
      - type: text
        regex: '(?s)^#![^\n]*\n(\s*(addgroup|adduser)\b[^\n]*\s2>/dev/null\s*\n)+(\s*exit\s+0\s*)?$'
  - id: stderr-redirect
    desc: Stderr redirect 2>&1
    crit: baseline
    conf: 0.5
    if:
      type: raw
      exact: 2>&1
  - id: windows-stdout-to-nul
    desc: Stdout redirected to NUL
    crit: baseline
    conf: 0.55
    for: [batch, powershell, pe, vbs]
    if:
      type: text
      regex: '(?i)>\s*nul\b'
  - id: pipe-shell
    desc: Pipe to shell
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: '| shell'
  - id: pipe-sh
    desc: Pipe to sh
    crit: baseline
    conf: 0.6
    if:
      type: text
      exact: '| sh'
  - id: pipe-bin-sh
    desc: Pipe to /bin/sh
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: '| /bin/sh'
composite_rules:
  - id: output-suppression
    desc: Output/error suppression
    any:
      - id: redirect-dev-null
      - id: stderr-redirect
  - id: shell-pipes
    desc: Pipe to shell interpreters
    any:
      - id: pipe-shell
      - id: pipe-sh
      - id: pipe-bin-sh
