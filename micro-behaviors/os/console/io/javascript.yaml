defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  crit: component
traits:
- id: js-console-object
  desc: References the JavaScript console object
  if:
    type: text
    substr: console

- id: js-console-output-silenced-log-err
  desc: Silences JS console output methods (log/error)
  crit: component
  if:
    type: text
    regex: (?i)console\.(log|error)\s*=\s*(function\s*\(\)|=>|\{\s*\})

- id: js-console-output-silenced-info-dbg
  desc: "Silences JS console output methods"
  crit: component
  if:
    type: text
    regex: (?i)console\.(info|debug)\s*=\s*(function\s*\(\)|=>|\{\s*\})

- id: js-console-output-silenced-warn
  desc: Silences JS console output methods (warn)
  crit: component
  if:
    type: text
    regex: (?i)console\.warn\s*=\s*(function\s*\(\)|=>|\{\s*\})

composite_rules:
- id: js-console-output-silenced
  desc: Silences JavaScript console output methods
  crit: suspicious
  conf: 0.94
  any:
  - id: js-console-output-silenced-log-err
  - id: js-console-output-silenced-info-dbg
  - id: js-console-output-silenced-warn
