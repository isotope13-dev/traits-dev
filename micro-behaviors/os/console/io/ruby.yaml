# Ruby Console/Interaction
# Traits for identifying console interaction in Ruby
defaults:
  platforms: [windows, unix]
  attack: T1059
  for: [ruby]
traits:
  # === Interactive Shell Input ===
  - id: stdin-gets-call
    desc: STDIN input for interactive shell
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: "gets"
  # `chomp` alone is generic trailing-newline trimming (used on file reads,
  # arrays, any string), not interactive input. It only signals interactive
  # input when paired with `gets`, so it is a composite fragment for the
  # `gets.chomp` idiom (see the stdin-gets composite below), not a standalone
  # console-I/O finding.
  - id: stdin-chomp-call
    desc: chomp trailing-newline trim
    crit: component
    conf: 0.6
    if:
      type: symbol
      exact: "chomp"
  # === Exit Command Pattern ===
  # NOTE: Only applies to Ruby source code - checking for shell loop exit patterns.
  # The string "exit" is too generic for binaries (present in error messages, help text).
  - id: exit-command-check
    desc: Exit command check in shell
    crit: notable
    conf: 0.65
    if:
      type: symbol
      kind: call
      exact: "exit"
composite_rules:
  - id: stdin-gets
    desc: Interactive line read (gets.chomp)
    crit: notable
    conf: 0.8
    all:
      - id: stdin-gets-call
      - id: stdin-chomp-call
