defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: firewall-cmd
    desc: Invokes the firewall-cmd utility
    if:
      type: text
      regex: '(^|[;&|[:space:]])firewall-cmd([[:space:]]|$)'
  - id: firewalld
    desc: Controls the firewalld service
    if:
      type: text
      regex: '\b(systemctl|service)\s+\S+\s+firewalld\b'
  - id: add-port-rule
    desc: Adds a port rule to firewalld
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '\bfirewall-cmd\b[^\n]{0,160}--add-port(=|\s)'
  - id: add-service-rule
    desc: Adds a service rule to firewalld
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '\bfirewall-cmd\b[^\n]{0,160}--add-service(=|\s)'
  - id: new-service
    desc: Creates a firewalld service definition
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '\bfirewall-cmd\b[^\n]{0,160}--new-service(=|\s)'
  - id: add-source-rule
    desc: Adds a source rule to firewalld
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '\bfirewall-cmd\b[^\n]{0,160}--add-source(=|\s)'
  - id: persistent-rule
    desc: Persists a firewalld rule
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '\bfirewall-cmd\b[^\n]{0,160}--permanent\b'
  - id: complete-reload
    desc: Reloads all firewalld rules
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      substr: firewall-cmd --complete-reload
  - id: reload
    desc: Reloads firewalld rules
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      substr: firewall-cmd --reload
  - id: restart
    desc: Restarts the firewalld service
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      substr: systemctl restart firewalld
  - id: enable
    desc: Enables firewalld at boot
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      substr: systemctl enable firewalld
  - id: start
    desc: Starts the firewalld service
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      substr: systemctl start firewalld
  - id: firewalld-stop
    desc: Stops or disables firewalld service
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '\b(systemctl|service)\s+(stop|disable)\s+firewalld\b'
  - id: vagrant-test-firewalld-stop
    desc: Stops firewalld in a Vagrant test VM
    crit: notable
    conf: 0.95
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '(?i)(vagrant|vm\.provision).{0,120}systemctl\s+(stop|disable)\s+firewalld\b'
