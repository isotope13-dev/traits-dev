defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: firewall-cmd
    desc: firewall-cmd utility
    if:
      type: text
      substr: firewall-cmd
  - id: firewalld
    desc: firewalld service
    if:
      type: text
      substr: firewalld
  - id: firewalld-stop
    desc: Stops or disables firewalld service
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '\b(systemctl|service)\s+(stop|disable)\s+firewalld\b'
  - id: vagrant-test-firewalld-stop
    desc: Stops firewalld in a Vagrant test VM
    crit: notable
    conf: 0.95
    platforms: [linux]
    for: [shell, ruby]
    if:
      type: text
      regex: '(?i)(vagrant|vm\.provision).{0,120}systemctl\s+(stop|disable)\s+firewalld\b'
