# firewalld - Dynamic Firewall Manager
# RHEL/CentOS/Fedora firewall daemon
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: firewall-cmd
    desc: firewall-cmd utility
    if:
      type: string_value
      substr: firewall-cmd
  - id: firewalld
    desc: firewalld service
    if:
      type: string_value
      substr: firewalld
