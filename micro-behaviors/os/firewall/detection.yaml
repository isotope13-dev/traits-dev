# Firewall Tool Detection
# Checks for presence of firewall management tools
defaults:
  platforms: [linux, unix]
  for: [shell, elf]
  crit: notable
traits:
  - id: which-firewall-cmd
    desc: which firewall-cmd
    conf: 0.5
    if:
      type: string_value
      substr: "which firewall-cmd"
  - id: which-ufw
    desc: which ufw
    conf: 0.5
    if:
      type: string_value
      substr: "which ufw"
  - id: command-v-ufw
    desc: command -v ufw
    conf: 0.5
    if:
      type: string_value
      substr: "command -v ufw"
  - id: which-iptables
    desc: which iptables
    conf: 0.5
    if:
      type: string_value
      substr: "which iptables"
