defaults:
  platforms: [windows]
  for: [python]
  crit: notable
  conf: 0.92
  attack: T1562.004

traits:
  - id: netsh-advfirewall-rule-query
    desc: Queries Windows Defender firewall rule
    if:
      type: text
      regex: '(?i)netsh.{0,120}advfirewall.{0,120}(show|query).{0,40}rule'

  - id: netsh-advfirewall-rule-delete
    desc: Deletes Windows Defender firewall rule
    if:
      type: text
      regex: '(?i)netsh.{0,120}advfirewall.{0,120}delete.{0,40}rule'

  - id: netsh-advfirewall-rule-allow
    desc: Adds Windows Defender firewall allow rule
    if:
      type: text
      regex: '(?i)netsh.{0,120}advfirewall.{0,120}add.{0,40}rule.{0,80}action[= ]allow'
