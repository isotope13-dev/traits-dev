defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ufw
    desc: ufw firewall command
    if:
      type: text
      exact: 'ufw '
  - id: allow-rule
    desc: Adds an allow rule to ufw
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bufw\s+allow\b'
  - id: enable
    desc: Enables the ufw host firewall
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bufw(\s+--force)?\s+enable\b'
