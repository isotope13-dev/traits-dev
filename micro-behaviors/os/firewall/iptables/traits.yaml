defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: iptables
    desc: iptables command
    if:
      type: text
      regex: (?im)(^|[;&|])\s*(sudo\s+)?iptables(\s|$)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: iptables-policy-change
    desc: Changes an iptables chain policy
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?im)(^|[;&|])\s*(sudo\s+)?iptables\s+(-P|--policy)
  - id: iptables-accept-dport
    desc: Adds an inbound iptables port allow rule
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\biptables\b[^\n]{0,100}\bINPUT\b[^\n]{0,80}--dport\s+[0-9]{2,5}[^\n]{0,40}\bACCEPT\b'
  - id: ip6tables
    desc: ip6tables command
    if:
      type: text
      substr: ip6tables
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: iptables-save
    desc: iptables-save command
    if:
      type: text
      substr: iptables-save
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ip6tables-save
    desc: ip6tables-save command
    ref: sha256:4f2559adefb2c0f7a7efa5d9395565bb1a0e4e9f5ce62a8b8be433facbb2d3be
    if:
      type: text
      substr: ip6tables-save
  - id: iptables-save-system-rules
    desc: iptables-save writes system rules
    ref: sha256:4f2559adefb2c0f7a7efa5d9395565bb1a0e4e9f5ce62a8b8be433facbb2d3be
    if:
      type: text
      regex: '\biptables-save\s*>\s*/etc/iptables/iptables\.rules\b'
  - id: ip6tables-save-system-rules
    desc: ip6tables-save writes system rules
    ref: sha256:4f2559adefb2c0f7a7efa5d9395565bb1a0e4e9f5ce62a8b8be433facbb2d3be
    if:
      type: text
      regex: '\bip6tables-save\s*>\s*/etc/iptables/ip6tables\.rules\b'
  - id: iptables-flush-flag
    desc: iptables flush flag
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: iptables\s+(-F|--flush)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ip6tables-flush-flag
    desc: ip6tables flush flag
    crit: notable
    conf: 0.85
    ref: sha256:4f2559adefb2c0f7a7efa5d9395565bb1a0e4e9f5ce62a8b8be433facbb2d3be
    if:
      type: text
      regex: ip6tables\s+(-F|--flush)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: iptables-delete-chain-flag
    desc: iptables delete chain flag
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: iptables\s+(-X|--delete-chain)
  - id: ip6tables-delete-chain-flag
    desc: ip6tables delete chain flag
    crit: notable
    conf: 0.8
    ref: sha256:4f2559adefb2c0f7a7efa5d9395565bb1a0e4e9f5ce62a8b8be433facbb2d3be
    if:
      type: text
      regex: ip6tables\s+(-X|--delete-chain)
