# iptables - Linux Packet Filtering
# Legacy netfilter firewall interface

defaults:
  for: [all]
  crit: notable
  conf: 0.9

traits:
  - id: iptables
    desc: iptables command
    if:
      type: string
      substr: iptables

  - id: ip6tables
    desc: ip6tables command
    if:
      type: string
      substr: ip6tables

  - id: iptables-save
    desc: iptables-save command
    if:
      type: string
      substr: iptables-save

  # === Policy Changes ===
  - id: iptables-policy
    desc: iptables policy change
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: 'iptables\s+(-P|--policy)'

  - id: iptables-flush-flag
    desc: iptables flush flag
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: 'iptables\s+(-F|--flush)'

  - id: iptables-delete-chain-flag
    desc: iptables delete chain flag
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: 'iptables\s+(-X|--delete-chain)'

  - id: iptables-prerouting-redirect
    desc: iptables PREROUTING REDIRECT rule
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: 'iptables\s+.{0,100}-t\s+nat\s+.{0,100}-A\s+PREROUTING\s+.{0,100}-j\s+REDIRECT'

composite_rules:
  - id: iptables-manipulation
    desc: iptables rule manipulation
    crit: notable
    conf: 0.85
    any:
      - id: iptables-policy
      - id: iptables-flush-flag
      - id: iptables-delete-chain-flag
