defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: nft
    desc: nft command
    if:
      type: text
      exact: 'nft '
  - id: nftables
    desc: "nftables firewall subsystem reference"
    if:
      type: text
      substr: nftables
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
  - id: nftables-uid-redirect
    desc: nftables UID-based traffic redirect rule
    if:
      type: text
      regex: '\bskuid\b[\s\S]{0,120}\bredirect\b|\bredirect\b[\s\S]{0,120}\bskuid\b'
