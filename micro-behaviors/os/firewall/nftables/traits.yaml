# nftables - Modern Linux Packet Filtering
# Successor to iptables
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: nft
    desc: nft command
    if:
      type: string_value
      exact: "nft "
  - id: nftables
    desc: nftables reference
    if:
      type: string_value
      substr: nftables
