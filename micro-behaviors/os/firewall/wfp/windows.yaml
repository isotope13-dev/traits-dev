defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1562.004"
traits:
  - id: fwpm-engine-open
    desc: Open Windows Filtering Platform engine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "FwpmEngineOpen0"
  - id: fwpm-provider-add
    desc: Add Windows Filtering Platform provider
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "FwpmProviderAdd0"
  - id: fwpm-sublayer-add
    desc: Add Windows Filtering Platform sublayer
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "FwpmSubLayerAdd0"
  - id: fwpm-filter-add
    desc: Install Windows Filtering Platform filter
    crit: notable
    conf: 0.93
    if:
      type: symbol
      exact: "FwpmFilterAdd0"
  - id: fwpm-filter-enum
    desc: Enumerate Windows Filtering Platform filters
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: "FwpmFilterEnum0"
  - id: fwpm-filter-delete-by-id
    desc: Remove Windows Filtering Platform filter
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: "FwpmFilterDeleteById0"
  - id: fwpm-sublayer-delete-by-key
    desc: Remove Windows Filtering Platform sublayer
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "FwpmSubLayerDeleteByKey0"
  - id: fwpm-engine-close
    desc: Close Windows Filtering Platform engine
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "FwpmEngineClose0"
  - id: fwpm-free-memory
    desc: Free Windows Filtering Platform buffers
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: "FwpmFreeMemory0"
composite_rules:
  - id: wfp-filter-lifecycle
    desc: Build and install WFP filter pipeline
    crit: notable
    conf: 0.94
    all:
      - id: fwpm-engine-open
      - id: fwpm-filter-add
    any:
      - id: fwpm-provider-add
      - id: fwpm-sublayer-add
  - id: wfp-filter-teardown
    desc: Remove installed WFP filter pipeline
    crit: notable
    conf: 0.93
    all:
      - id: fwpm-filter-delete-by-id
      - id: fwpm-sublayer-delete-by-key
    any:
      - id: fwpm-engine-close
      - id: fwpm-free-memory
