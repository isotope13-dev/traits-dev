defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: permission-denied
    desc: POSIX "Permission denied" error message
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: Permission denied

  - id: segfault-core-dumped
    desc: Segfault core dumped message
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: "segmentation fault (core dumped)"
