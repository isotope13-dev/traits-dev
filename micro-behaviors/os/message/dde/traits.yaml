defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.85
traits:
  - id: dde-create-data-handle
    desc: Create DDE data handle for IPC
    attack: T1559.002
    if:
      type: symbol
      exact: "DdeCreateDataHandle"
  - id: dde-initialize
    desc: Initialize DDEML library
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: "DdeInitialize[AW]?"
  - id: dde-connect
    desc: Connect to DDE server
    attack: T1559.002
    if:
      type: symbol
      exact: "DdeConnect"
  - id: dde-client-transaction
    desc: Execute DDE client transaction
    crit: suspicious
    conf: 0.88
    attack: T1559.002
    if:
      type: import
      exact: "DdeClientTransaction"
    unless:
      - type: text
        substr: called unimplemented DdeClientTransaction
      - id: well-known/app/internet-explorer/
      - id: well-known/lib/wine/
      - id: metadata/signed/leaf::microsoft-corporation
