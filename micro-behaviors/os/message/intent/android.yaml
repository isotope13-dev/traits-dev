defaults:
  platforms: [android]
  for: [java, kotlin]
  crit: notable
  conf: 0.88

traits:
  - id: android-action-view-intent
    desc: Android ACTION_VIEW intent
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      word: ACTION_VIEW

  - id: android-start-activity
    desc: Android starts activity
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    for: [apk, zip, java, kotlin]
    if:
      type: text
      word: startActivity

  - id: android-uri-parse
    desc: Android Uri parse call
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      regex: '\bUri\s*\.\s*parse\s*\('

  - id: android-intent-extra-routing
    desc: Android intent extra routing
    crit: component
    conf: 0.86
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      regex: 'getStringExtra\s*\(\s*"type"\s*\)[\s\S]{0,120}getStringExtra\s*\(\s*"value"\s*\)'

composite_rules:
  - id: android-uri-start-activity
    desc: Android URI starts activity
    crit: notable
    conf: 0.9
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    all:
      - id: android-action-view-intent
      - id: android-start-activity
      - id: android-uri-parse
