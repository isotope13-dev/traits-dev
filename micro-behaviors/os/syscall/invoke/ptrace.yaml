defaults:
  platforms: [linux]
  for: [elf]
traits:
  - id: ptrace-import
    desc: Imports ptrace debugger API
    conf: 0.8
    crit: notable
    platforms: [unix]
    for: [elf, macho]
    if:
      type: symbol
      exact: "ptrace"
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-version-string
  - id: ptrace-dup
    desc: Uses ptrace - debugger or
    conf: 0.85
    crit: suspicious
    if:
      type: syscall
      name: ["ptrace"]
  - id: process-memory-access
    desc: Reads or writes another process
    conf: 0.9
    crit: suspicious
    if:
      type: syscall
      name: ["process_vm_readv", "process_vm_writev"]
