defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  attack: T1106
traits:
  - id: nr-getdents
    desc: Direct __NR_getdents syscall reference
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: raw
      substr: __NR_getdents
  - id: nr-getdents64
    desc: Direct __NR_getdents64 syscall reference
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: raw
      substr: __NR_getdents64
  - id: nr-openat
    desc: Direct __NR_openat syscall reference
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: raw
      substr: __NR_openat
  - id: nr-close
    desc: Direct __NR_close syscall reference
    crit: baseline
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: raw
      substr: __NR_close
  - id: syscall-fn
    desc: Direct syscall() function invocation
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: raw
      regex: \bsyscall\s*\(
  - id: dirent64-struct
    desc: struct dirent64 usage
    crit: component
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: raw
      substr: dirent64
  - id: d-reclen-field
    desc: d_reclen field access
    crit: notable
    conf: 0.85
    for:
      - c
      - elf
    if:
      type: raw
      substr: d_reclen
  - id: d-name-field
    desc: d_name field access
    crit: baseline
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: string_value
      word: d_name
composite_rules:
  - id: direct-getdents
    desc: Direct getdents syscall bypassing libc
    crit: suspicious
    conf: 0.95
    for:
      - c
      - elf
    all:
      - id: syscall-fn
    any:
      - id: nr-getdents
      - id: nr-getdents64
  - id: dirent-manipulation
    desc: Dirent structure manipulation
    crit: suspicious
    conf: 0.9
    for:
      - c
      - elf
    all:
      - id: dirent64-struct
      - id: d-reclen-field
