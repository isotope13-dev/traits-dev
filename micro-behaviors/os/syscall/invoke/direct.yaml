defaults:
  platforms: [windows, unix]
  attack: T1106
traits:
  - id: syscall-definitions-header
    desc: Includes system syscall definitions
    crit: notable
    conf: 0.9
    for: [c, cpp]
    if:
      type: symbol
      kind: import
      exact: sys/syscall.h
  - id: nr-getdents
    desc: Direct __NR_getdents syscall reference
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_getdents
  - id: nr-getdents64
    desc: Direct __NR_getdents64 syscall reference
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_getdents64
  - id: nr-openat
    desc: Direct __NR_openat syscall reference
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_openat
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
  - id: nr-close
    desc: Direct __NR_close syscall reference
    crit: baseline
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_close
  - id: syscall-fn
    desc: Direct syscall() function invocation
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: symbol
      kind: call
      exact: syscall
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: python-dot-syscall
    desc: Python .syscall() method invocation
    crit: notable
    conf: 0.6
    for:
      - python
    if:
      type: text
      substr: .syscall(
  - id: libc-syscall
    desc: Raw syscall via libc binding
    crit: notable
    conf: 0.5
    for:
      - scripts
      - binaries
    if:
      type: string_literal
      substr: libc.syscall
  - id: dirent64-struct
    desc: struct dirent64 usage
    crit: component
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      substr: dirent64
  - id: d-reclen-field
    desc: d_reclen field access
    crit: component
    conf: 0.85
    for:
      - c
      - elf
    if:
      type: text
      substr: d_reclen
  - id: d-reclen-modification
    desc: d_reclen field modification
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      regex: \bd_reclen\s*([+\-*/|&^]?=|\+\+|--)
  - id: d-name-field
    desc: d_name field access
    crit: baseline
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      word: d_name
  - id: kernel-module-include-detect
    desc: 'Linux kernel module header include'
    crit: component
    conf: 0.99
    for:
      - c
      - elf
    if:
      type: text
      regex: linux/module\.h
  - id: linux-kernel-header-include
    desc: Linux kernel header include
    crit: baseline
    conf: 0.98
    for:
      - c
      - elf
    if:
      type: text
      regex: '#\s*include\s*<linux/'
  - id: linux-uinteger-alias-reference
    desc: Linux __u integer alias references in source
    crit: component
    conf: 0.6
    for: [c, cpp]
    if:
      type: text
      regex: \b__u(8|16|32|64)\b
    count_min: 3
  - id: export-symbol-macro
    desc: EXPORT_SYMBOL macro
    crit: baseline
    conf: 0.95
    for:
      - c
      - elf
    if:
      type: text
      substr: EXPORT_SYMBOL(
  - id: syscall-define-macro
    desc: SYSCALL_DEFINE macro
    crit: baseline
    conf: 0.95
    for:
      - c
      - elf
    if:
      type: text
      regex: \bSYSCALL_DEFINE\d+\b
  - id: dir-context-struct
    desc: Linux dir_context struct
    crit: baseline
    conf: 0.95
    for:
      - c
      - elf
    if:
      type: text
      substr: struct dir_context
  # Anchored two levels deep: a bare `include/`, `net/` or `kernel/` segment
  # occurs in most C projects and would make this a blanket suppressor, whereas
  # include/linux and include/uapi name the Linux kernel's own header tree.
  - id: kernel-header-tree-path
    desc: Linux kernel include/linux header tree path
    crit: baseline
    conf: 0.99
    for:
      - c
      - elf
    if:
      type: path
      regex: '(^|[\\/])include[\\/](linux|uapi)'
  - id: linux-kernel-tree-path-mmfs
    desc: Linux kernel mm/fs/lib tree path
    crit: baseline
    conf: 0.98
    for: [c, elf]
    if:
      type: path
      regex: '(^|[\\/])(block|fs|mm|lib)([\\/]|$)'
  - id: linux-kernel-tree-path-extra
    desc: Linux kernel crypto/sound/tools tree path
    crit: baseline
    conf: 0.98
    for: [c, elf]
    if:
      type: path
      regex: '(^|[\\/])(crypto|sound|virt|tools|init|ipc)([\\/]|$)'
  - id: linux-kernel-tree-path-scripts
    desc: Linux kernel scripts/samples tree path
    crit: baseline
    conf: 0.98
    for: [c, elf]
    if:
      type: path
      regex: '(^|[\\/])(scripts|samples|certs|usr)([\\/]|$)'
composite_rules:
  - id: direct-getdents
    desc: Direct getdents syscall bypassing libc
    crit: suspicious
    conf: 0.95
    for:
      - c
      - elf
    all:
      - id: syscall-fn
    any:
      - id: nr-getdents
      - id: nr-getdents64
  - id: dirent-manipulation
    desc: Dirent structure manipulation
    crit: suspicious
    conf: 0.9
    for:
      - c
      - elf
    all:
      - id: dirent64-struct
      - id: d-reclen-modification
    unless:
      - id: kernel-module-include-detect
      - id: metadata/binary/license::linux-kernel-gpl2-spdx-header
      - id: export-symbol-macro
      - id: syscall-define-macro
      - id: dir-context-struct
      - id: well-known/lib/glibc
  - id: linux-kernel-tree-path-any
    desc: Linux kernel source tree path (any top-level)
    crit: baseline
    conf: 0.99
    for: [c, elf]
    any:
      - id: metadata/lang/source::linux-kernel-source-tree-path
      - id: linux-kernel-tree-path-mmfs
      - id: linux-kernel-tree-path-extra
      - id: linux-kernel-tree-path-scripts
  - id: linux-kernel-source-context
    desc: Linux kernel source context
    crit: baseline
    conf: 0.99
    for:
      - c
      - elf
    # Evidence never pools across archive members for `unless:` — suppression
    # resolves per-file — so both legs must hold in the file being cleared.
    #
    # A kernel-tree PATH ALONE is not context: `linux-kernel-tree-path-any`
    # accepts ~22 near-universal directory names (lib, fs, net, tools, usr,
    # scripts, include...), so any project has one. It must always be paired
    # with a marker that only genuinely in-tree code carries.
    #
    # The marker list is deliberately short. An SPDX line, `<linux/module.h>`
    # and a bare `<linux/*.h>` include are all present in EVERY out-of-tree LKM
    # rootkit, so accepting them as "this is in-tree kernel source" hands an
    # attacker a one-line bypass of the whole kernel-hide family. Only markers
    # an out-of-tree module has no reason to carry qualify: the kernel's own
    # header tree, EXPORT_SYMBOL, SYSCALL_DEFINE, struct dir_context.
    all:
      - id: linux-kernel-tree-path-any
    needs: 1
    any:
      - id: kernel-header-tree-path
      - id: export-symbol-macro
      - id: syscall-define-macro
      - id: dir-context-struct
