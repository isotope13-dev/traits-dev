defaults:
  platforms: [windows, unix]
  attack: T1106
traits:
  - id: nr-getdents
    desc: Direct __NR_getdents syscall reference
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_getdents
  - id: nr-getdents64
    desc: Direct __NR_getdents64 syscall reference
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_getdents64
  - id: nr-openat
    desc: Direct __NR_openat syscall reference
    crit: notable
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_openat
    unless:
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
  - id: nr-close
    desc: Direct __NR_close syscall reference
    crit: baseline
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      substr: __NR_close
  - id: syscall-fn
    desc: Direct syscall() function invocation
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: symbol
      kind: call
      exact: syscall
  - id: python-dot-syscall
    desc: Python .syscall() method invocation
    crit: notable
    conf: 0.6
    for:
      - python
    if:
      type: text
      substr: .syscall(
  - id: libc-syscall
    desc: Raw syscall via libc binding
    crit: notable
    conf: 0.5
    for:
      - scripts
      - binaries
    if:
      type: string_literal
      substr: libc.syscall
  - id: dirent64-struct
    desc: struct dirent64 usage
    crit: component
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      substr: dirent64
  - id: d-reclen-field
    desc: d_reclen field access
    crit: component
    conf: 0.85
    for:
      - c
      - elf
    if:
      type: text
      substr: d_reclen
  - id: d-reclen-modification
    desc: d_reclen field modification
    crit: component
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      regex: \bd_reclen\s*([+\-*/|&^]?=|\+\+|--)
  - id: d-name-field
    desc: d_name field access
    crit: baseline
    conf: 0.5
    for:
      - c
      - elf
    if:
      type: text
      word: d_name
  - id: kernel-module-include-detect
    desc: 'Linux kernel module header include'
    crit: component
    conf: 0.99
    for:
      - c
      - elf
    if:
      type: text
      regex: linux/module\.h
  - id: kernel-spdx-gpl2
    desc: Linux kernel SPDX header
    crit: baseline
    conf: 0.99
    for:
      - c
      - elf
    if:
      type: text
      substr: "SPDX-License-Identifier: GPL-2.0"
  - id: export-symbol-macro
    desc: EXPORT_SYMBOL macro
    crit: baseline
    conf: 0.95
    for:
      - c
      - elf
    if:
      type: text
      substr: EXPORT_SYMBOL(
  - id: syscall-define-macro
    desc: SYSCALL_DEFINE macro
    crit: baseline
    conf: 0.95
    for:
      - c
      - elf
    if:
      type: text
      regex: \bSYSCALL_DEFINE\d+\b
  - id: dir-context-struct
    desc: Linux dir_context struct
    crit: baseline
    conf: 0.95
    for:
      - c
      - elf
    if:
      type: text
      substr: struct dir_context
composite_rules:
  - id: direct-getdents
    desc: Direct getdents syscall bypassing libc
    crit: suspicious
    conf: 0.95
    for:
      - c
      - elf
    all:
      - id: syscall-fn
    any:
      - id: nr-getdents
      - id: nr-getdents64
  - id: dirent-manipulation
    desc: Dirent structure manipulation
    crit: suspicious
    conf: 0.9
    for:
      - c
      - elf
    all:
      - id: dirent64-struct
      - id: d-reclen-modification
    unless:
      - id: kernel-module-include-detect
      - id: kernel-spdx-gpl2
      - id: export-symbol-macro
      - id: syscall-define-macro
      - id: dir-context-struct
      - id: well-known/lib/glibc
  - id: linux-kernel-source-context
    desc: Linux kernel source context
    crit: baseline
    conf: 0.99
    for:
      - c
      - elf
    needs: 2
    any:
      - id: kernel-spdx-gpl2
      - id: export-symbol-macro
      - id: syscall-define-macro
      - id: dir-context-struct
