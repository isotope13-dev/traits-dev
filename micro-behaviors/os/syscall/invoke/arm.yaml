# ARM Direct Execution Syscalls
# Detects hand-written ARM assembly making direct I/O syscalls
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [unix, android]
  for: [elf]
  crit: notable
traits:
  - id: svc-linux-arm64
    desc: Linux ARM64 direct SVC syscall instruction
    crit: notable
    conf: 0.85
    platforms: [linux]
    arch: [aarch64]
    count_min: 8
    per_kb_min: 0.03
    if:
      type: hex
      section: text
      pattern: "01 00 00 D4"
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiler/systems::go-version-string
  - id: svc-read
    desc: "ARM direct read(2) syscall"
    if:
      type: hex
      section: ".text"
      # mov r7, 3 (read); svc 0
      pattern: "03 70 a0 e3 00 00 00 ef"
  - id: svc-write
    desc: "ARM direct write(2) syscall"
    if:
      type: hex
      section: ".text"
      # mov r7, 4 (write); svc 0
      pattern: "04 70 a0 e3 00 00 00 ef"
