defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: ntdll-import
  desc: Direct NT API access
  crit: baseline
  conf: 0.85
  if:
    type: text
    substr: ntdll
- id: all-ones-handle-constant
  desc: All-ones x64 handle constant
  crit: component
  conf: 0.8
  arch:
  - x86-64
  count_min: 2
  if:
    type: hex
    section: .text
    pattern: 48 C7 C1 FF FF FF FF
  unless:
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers::ngx-dll-basename
- id: ntdll-direct-memory-op-a
  desc: 'Direct NT memory manipulation'
  crit: suspicious
  conf: 0.9
  mbc: C0021
  count_min: 3
  if:
    type: symbol
    regex: ^Nt(Allocate|Write|Protect)VirtualMemory$
  unless:
    # Wine/ReactOS builtins implement these NT syscalls (ntdll/kernelbase) — they
    # provide the API, not abuse it, so suppress rather than merely downgrade.
    - id: metadata/binary/vendor/
    - id: well-known/tool/sysadmin/chroot-win/
  downgrade:
    any:
    - type: metrics
      field: exports.count
      min: 256
    - id: well-known/tool/sysadmin/systeminformer::systeminformer-product
- id: ntdll-direct-memory-op-b
  desc: Direct NT memory manipulation (view/query)
  crit: suspicious
  conf: 0.9
  mbc: C0021
  if:
    type: symbol
    regex: ^Nt(View|Query)VirtualMemory$
  unless:
    # Wine/ReactOS ntdll implements and exports these NT syscalls — full suppress,
    # not just downgrade (an API provider has no injection intent).
    - id: metadata/binary/vendor/
    - id: well-known/tool/sysadmin/chroot-win/
    - id: well-known/tool/sysadmin/conemu/
  downgrade:
    any:
    - id: well-known/tool/sysadmin/systeminformer::systeminformer-product
- id: ntdll-direct-process-op
  desc: Direct NT process/thread manipulation
  crit: notable
  conf: 0.9
  count_min: 2
  if:
    type: symbol
    regex: ^Nt(Create|Open)(Process|Thread)(Ex)?$
  downgrade:
    any:
    - type: metrics
      field: exports.count
      min: 256
- id: encode-pointer
  desc: Pointer value encoding
  crit: baseline
  conf: 0.85
  if:
    type: symbol
    exact: EncodePointer
- id: ntdll-direct-memory-op-cond-0--inline-7463
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: exports.count
    min: 256
  count_max: 1007464
- id: linux-vdso-symbol
  desc: __vdso exported symbol string
  crit: component
  conf: 0.95
  platforms:
    - linux
  for:
    - elf
  if:
    type: text
    regex: __vdso_[a-z_]+
- id: taskstats-pid-attribute
  desc: TaskStats PID attribute reference
  crit: notable
  conf: 0.8
  platforms:
  - unix
  for:
  - c
  - elf
  if:
    type: text
    substr: TASKSTATS_CMD_ATTR_PID
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
- id: ntdll-direct-memory-op
  desc: Direct NT memory manipulation (stealth)
  crit: suspicious
  conf: 0.9
  mbc: C0021
  any:
  - id: ntdll-direct-memory-op-a
  - id: ntdll-direct-memory-op-b
  downgrade:
    any:
    - id: ntdll-direct-memory-op-cond-0--inline-7463
    - id: metadata/signed/platform/
