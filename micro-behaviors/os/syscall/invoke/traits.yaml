defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: ntdll-import
    desc: Direct NT API access
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      substr: ntdll
  - id: ntdll-direct-memory-op-a
    desc: Direct NT memory manipulation (allocate/write/protect)
    crit: notable
    conf: 0.9
    mbc: C0021
    count_min: 3
    if:
      type: symbol
      regex: ^Nt(Allocate|Write|Protect)VirtualMemory$
    downgrade:
      any:
        - type: exports_count
          min: 256
  - id: ntdll-direct-memory-op-b
    desc: Direct NT memory manipulation (view/query)
    crit: notable
    conf: 0.9
    mbc: C0021
    if:
      type: symbol
      regex: ^Nt(View|Query)VirtualMemory$
  - id: ntdll-direct-process-op
    desc: Direct NT process/thread manipulation
    crit: notable
    conf: 0.9
    count_min: 2
    if:
      type: symbol
      regex: ^Nt(Create|Open)(Process|Thread)(Ex)?$
    downgrade:
      any:
        - type: exports_count
          min: 256
  - id: encode-pointer
    desc: Pointer value encoding
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: EncodePointer
composite_rules:
  - id: ntdll-direct-memory-op
    desc: Direct NT memory manipulation (stealth)
    crit: suspicious
    conf: 0.9
    mbc: C0021
    any:
      - id: ntdll-direct-memory-op-a
      - id: ntdll-direct-memory-op-b
    downgrade:
      any:
        - type: exports_count
          min: 256
        - id: metadata/signed/platform::microsoft
