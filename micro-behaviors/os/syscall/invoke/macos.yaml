# macOS Direct System Calls
# Detects use of direct syscall instructions instead of libc wrappers
# This is a high-confidence indicator of evasion or low-level malware
defaults:
  platforms: [macos]
  for: [macho]
traits:
  - id: macos-arm64-direct-syscall
    desc: macOS ARM64 direct syscall (svc 0x80)
    crit: suspicious
    conf: 0.95
    arch: [aarch64]
    size_max: 10485760
    if:
      type: hex
      pattern: "01 10 00 d4" # svc 0x80, Darwin syscall/Mach trap convention
      section: "__text"
    unless:
      # Universal Mach-O binaries produce cross-slice false positives for
      # raw ARM64 svc bytes.
      - id: metadata/file/magic/identity::cafebabe-magic
      - id: metadata/binary/framework::darwin-framework-binary
      - id: metadata/library/sage-math/
      - id: well-known/app/macos-benign/
      - id: metadata/library/structure::vscode-packaged-native-tool
      # Frida implements Darwin syscall/Mach-trap shims as part of its
      # debugger and instrumentation runtime. Its native server identity is
      # considerably more specific than this four-byte instruction match.
      - id: well-known/tool/reverse-engineering/frida::frida-server-native
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/framework::darwin-framework-binary
  - id: macos-x86-64-direct-syscall
    desc: macOS x86_64 direct syscall (syscall)
    crit: suspicious
    conf: 0.95
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      pattern: "0F 05" # syscall
      section: "__text"
    downgrade:
      any:
        - id: metadata/signed/platform::apple
