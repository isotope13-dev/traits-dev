          exact: NtFreeVirtualMemory

  - id: python-nt-close-wrapper
    desc: Python wraps NtClose syscall
    if:
      type: symbol
      kind: call
      exact: syscall_wrapper.wrap
      args:
        - kind: string
          exact: NtClose
