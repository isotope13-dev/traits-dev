# Python wrappers around named Windows NT syscalls.
# These are neutral syscall capabilities; intent is inferred by objective
# composites that combine them into cross-process memory operations.
defaults:
  platforms: [windows]
  for: [python]
  crit: notable
  conf: 0.96

traits:
  - id: python-nt-open-process-wrapper
    desc: Python wraps NtOpenProcess syscall
    if:
      type: symbol
      kind: call
      exact: syscall_wrapper.wrap
      args:
        - kind: string
          exact: NtOpenProcess

  - id: python-nt-read-virtual-memory-wrapper
    desc: Python wraps NtReadVirtualMemory syscall
    if:
      type: symbol
      kind: call
      exact: syscall_wrapper.wrap
      args:
        - kind: string
          exact: NtReadVirtualMemory

  - id: python-nt-write-virtual-memory-wrapper
    desc: Python wraps NtWriteVirtualMemory syscall
    if:
      type: symbol
      kind: call
      exact: syscall_wrapper.wrap
      args:
        - kind: string
          exact: NtWriteVirtualMemory

  - id: python-nt-query-virtual-memory-wrapper
