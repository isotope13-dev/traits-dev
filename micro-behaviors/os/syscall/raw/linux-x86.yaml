defaults:
  for: [elf]
  platforms: [linux]
  crit: notable
  conf: 0.86
  arch: [x86]

traits:
  - id: x86-syscall-instruction-text
    desc: x86 syscall source invocation
    crit: notable
    conf: 0.85
    for: [c]
    if:
      type: text
      regex: '\bint\s+0x80\b|\bsyscall\s*\(|\bsysenter\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
  - id: x86-int80-wrapper
    desc: x86 int80 syscall wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      section: ".text"
      pattern: "8B 44 24 14 CD 80 5B 5E 5F 5D C3"
