defaults:
  for: [elf]
  platforms: [linux]
  crit: notable
  conf: 0.86
  arch: [x86]

traits:
  - id: x86-syscall-instruction-text
    desc: x86 syscall instruction text
    crit: notable
    conf: 0.85
    for: [c]
    if:
      type: text
      regex: int.{0,10}0x80|syscall|sysenter
  - id: x86-int80-wrapper
    desc: x86 int80 syscall wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      section: ".text"
      pattern: "8B 44 24 14 CD 80 5B 5E 5F 5D C3"
