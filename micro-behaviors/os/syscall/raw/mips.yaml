# Raw MIPS O32 syscall instruction. This is a neutral capability; intent is
# inferred only when it is composed with a specific operation or objective.
defaults:
  platforms: [unix, android]
  for: [elf]
  arch: [mips]
traits:
  - id: mips-direct-syscall-instruction-be
    desc: Big-endian MIPS direct system-call instruction
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      pattern: "00 00 00 0c"
  - id: mips-direct-syscall-instruction-le
    desc: Little-endian MIPS syscall instruction
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      pattern: "0c 00 00 00"
  - id: mips-o32-execve-syscall
    desc: Big-endian MIPS O32 direct execve syscall
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      pattern: "24 02 0f ab 00 00 00 0c"
  - id: mips-o32-open-syscall
    desc: Big-endian MIPS O32 direct open syscall
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      pattern: "24 02 0f a5 00 00 00 0c"
  - id: mips-o32-write-syscall
    desc: Big-endian MIPS O32 direct write syscall
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      pattern: "24 02 0f a4 00 00 00 0c"
  - id: mips-o32-fork-syscall
    desc: Big-endian MIPS O32 direct fork syscall
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      pattern: "24 02 0f a2 00 00 00 0c"
  - id: mips-o32-unlink-syscall
    desc: Big-endian MIPS O32 direct unlink syscall
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      pattern: "24 02 0f aa 00 00 00 0c"

composite_rules:
  - id: mips-direct-syscall-instruction
    desc: MIPS direct system-call instruction
    crit: notable
    conf: 0.98
    any:
      - id: mips-direct-syscall-instruction-be
      - id: mips-direct-syscall-instruction-le
