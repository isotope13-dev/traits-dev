# SuperH/Linux direct system-call trap observations.
# A single trap is neutral; objective rules combine it with a tiny stripped
# ELF and protocol evidence when identifying a native downloader/stager.
defaults:
  platforms: [linux]
  for: [elf]

traits:
  - id: sh-trapa-syscall
    desc: SuperH direct system-call trap instruction
    crit: notable
    conf: 0.98
    size_max: 4096
    if:
      type: hex
      # SH trapa #0x16, the Linux SuperH syscall entry used by the loader.
      pattern: "16 C3"
      offset_range: [128, 4096]
