defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1106
  mbc: F0004
traits:
- id: syscall-ret-gadget
  desc: syscall; ret gadget (0F 05 C3)
  crit: notable
  conf: 0.8
  arch:
  - x86-64
  size_max: 5000000
  if:
    type: hex
    section: .text
    pattern: 0f 05 c3
  unless:
  - id: metadata/signed/platform/
- id: ssn-stub-validation
  desc: Syscall stub signature check (4C/B8)
  crit: component
  conf: 0.9
  arch:
  - x86-64
  size_max: 5000000
  if:
    type: hex
    section: .text
    pattern: 80 3? 4C 8B D1 B8
- id: mov-eax-syscall
  desc: mov eax, imm32; syscall pattern
  crit: component
  conf: 0.85
  arch:
  - x86-64
  count_min: 2
  if:
    type: hex
    section: .text
    pattern: b8 ?? ?? 00 00 [0-10] 0f 05
- id: nt-allocate-ssn
  desc: NtAllocateVirtualMemory syscall setup
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: NtAllocateVirtualMemory
  unless:
  - id: metadata/binary/resource::kernel-driver-idata
- id: nt-write-ssn
  desc: NtWriteVirtualMemory syscall setup
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: NtWriteVirtualMemory
- id: nt-create-thread-ssn
  desc: NtCreateThreadEx syscall setup
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: NtCreateThreadEx
- id: nt-protect-ssn
  desc: NtProtectVirtualMemory syscall setup
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: NtProtectVirtualMemory
- id: nt-query-info-ssn
  desc: NtQueryInformationProcess API reference
  crit: notable
  conf: 0.85
  if:
    type: text
    exact: NtQueryInformationProcess
  unless:
  - id: well-known/tool/development/fzf::fzf-binary
- id: nt-open-process-ssn
  desc: NtOpenProcess syscall setup
  crit: notable
  conf: 0.7
  if:
    type: text
    exact: NtOpenProcess
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: ssn-resolution-str
  desc: SSN resolution string indicator
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)(get|find|resolve).?ssn
  unless:
  - id: metadata/binary/framework::dotnet-metadata
- id: syscall-stub-str
  desc: Syscall stub string indicator
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: (?i)syscall.?stub
- id: direct-syscall-pattern-cond-0--inline-7330
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: supR3Hardened
  count_max: 1007331
composite_rules:
- id: nt-functions-set
  desc: Multiple Nt* syscall functions referenced
  needs: 3
  any:
  - id: nt-allocate-ssn
  - id: nt-write-ssn
  - id: nt-create-thread-ssn
  - id: nt-protect-ssn
  - id: nt-query-info-ssn
  - id: nt-open-process-ssn
- id: direct-syscall-pattern
  desc: Direct syscall invocation pattern
  crit: notable
  conf: 0.9
  all:
  - id: syscall-ret-gadget
  - id: mov-eax-syscall
  - id: nt-functions-set
  downgrade:
    any:
    - id: direct-syscall-pattern-cond-0--inline-7330
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-200
  - id: metadata/signed/platform/
