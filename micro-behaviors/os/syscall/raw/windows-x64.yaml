defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1106
  mbc: F0004
traits:
  - id: syscall-ret-gadget
    desc: syscall; ret gadget (0F 05 C3)
    crit: notable
    conf: 0.8
    arch:
      - x86-64
    size_max: 5000000
    if:
      type: hex
      section: .text
      pattern: 0f 05 c3
  - id: ssn-stub-validation
    desc: Syscall stub signature check (4C/B8)
    crit: component
    conf: 0.9
    arch:
      - x86-64
    size_max: 5000000
    if:
      type: hex
      section: .text
      pattern: 80 3? 4C 8B D1 B8
  - id: mov-eax-syscall
    desc: mov eax, imm32; syscall pattern
    crit: component
    conf: 0.85
    arch:
      - x86-64
    count_min: 2
    if:
      type: hex
      section: .text
      pattern: b8 ?? ?? 00 00 [0-10] 0f 05
  - id: nt-allocate-ssn
    desc: NtAllocateVirtualMemory syscall setup
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: NtAllocateVirtualMemory
  - id: nt-write-ssn
    desc: NtWriteVirtualMemory syscall setup
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: NtWriteVirtualMemory
  - id: nt-create-thread-ssn
    desc: NtCreateThreadEx syscall setup
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: NtCreateThreadEx
  - id: nt-protect-ssn
    desc: NtProtectVirtualMemory syscall setup
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: NtProtectVirtualMemory
  - id: nt-query-info-ssn
    desc: NtQueryInformationProcess API reference
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: NtQueryInformationProcess
  - id: nt-open-process-ssn
    desc: NtOpenProcess syscall setup
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: NtOpenProcess
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: ssn-resolution-str
    desc: SSN resolution string indicator
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)(get|find|resolve).?ssn
    unless:
      - id: metadata/binary/framework::dotnet-metadata
  - id: syscall-stub-str
    desc: Syscall stub string indicator
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)syscall.?stub
  - id: sw3-dispatch-export-cluster
    desc: SysWhispers3 dispatch export cluster
    crit: component
    conf: 0.95
    if:
      type: symbol
      regex: ^SW3_Get(Syscall(Address|Number)|RandomSyscallAddress)$
  - id: sw3-populate-export
    desc: SysWhispers3 syscall list export
    crit: component
    conf: 0.95
    if:
      type: symbol
      regex: ^(Z23SW3_PopulateSyscallListv|SW3_PopulateSyscallList)$
composite_rules:
  - id: nt-functions-set
    desc: Multiple Nt* syscall functions referenced
    needs: 3
    any:
      - id: nt-allocate-ssn
      - id: nt-write-ssn
      - id: nt-create-thread-ssn
      - id: nt-protect-ssn
      - id: nt-query-info-ssn
      - id: nt-open-process-ssn
  - id: direct-syscall-pattern
    desc: Direct syscall invocation pattern
    crit: notable
    conf: 0.9
    all:
      - id: syscall-ret-gadget
      - id: mov-eax-syscall
      - id: nt-functions-set
    downgrade:
      any:
        - type: text
          substr: supR3Hardened
    unless:
      - id: metadata/binary/metrics::many-exports-200
      - id: metadata/signed/platform::microsoft
  - id: syswhispers3-direct-syscall-wrapper
    desc: SysWhispers3-style exported syscall wrapper
    crit: suspicious
    conf: 0.96
    all:
      - id: sw3-dispatch-export-cluster
      - id: sw3-populate-export
      - id: nt-allocate-ssn
      - id: nt-protect-ssn
      - id: syscall-ret-gadget
    unless:
      - id: metadata/signed/platform::microsoft
