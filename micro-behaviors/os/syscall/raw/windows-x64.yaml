# Windows x64 Direct Syscall Patterns
# Detects direct syscall invocation bypassing ntdll hooks
# ATT&CK: T1106 (Native API)
# MBC: F0004 (System Calls)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1106"
  mbc: "F0004"
traits:
  - id: syscall-ret-gadget
    desc: syscall; ret gadget (0F 05 C3)
    crit: notable
    conf: 0.8
    arch: [x86-64]
    size_max: 5000000
    if:
      type: hex
      section: ".text"
      pattern: "0f 05 c3"
  # Hell's Gate / Halo's Gate SSN extraction: validates syscall stub by checking
  # first byte == 0x4C (mov r10,rcx) before extracting syscall number
  - id: ssn-stub-validation
    desc: "Syscall stub signature check (4C/B8)"
    crit: component
    conf: 0.9
    arch: [x86-64]
    size_max: 5000000
    if:
      type: hex
      section: ".text"
      # cmp byte [reg], 0x4C (check for mov r10,rcx opcode)
      pattern: "80 3? 4C"
  # Syscall stub patterns - mov eax, SSN; syscall
  - id: mov-eax-syscall
    desc: mov eax, imm32; syscall pattern
    crit: notable
    conf: 0.85
    arch: [x86-64]
    if:
      type: hex
      section: ".text"
      pattern: "b8 ?? ?? 00 00 [0-10] 0f 05"
  # Common Nt function syscall numbers (varies by Windows version)
  - id: nt-allocate-ssn
    desc: NtAllocateVirtualMemory syscall setup
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "NtAllocateVirtualMemory"
  - id: nt-write-ssn
    desc: NtWriteVirtualMemory syscall setup
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "NtWriteVirtualMemory"
  - id: nt-create-thread-ssn
    desc: NtCreateThreadEx syscall setup
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "NtCreateThreadEx"
  - id: nt-protect-ssn
    desc: NtProtectVirtualMemory syscall setup
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "NtProtectVirtualMemory"
  - id: nt-query-info-ssn
    desc: NtQueryInformationProcess API reference
    crit: baseline
    conf: 0.6
    if:
      type: symbol
      exact: "NtQueryInformationProcess"
  - id: nt-open-process-ssn
    desc: NtOpenProcess syscall setup
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "NtOpenProcess"
  # syscall-trampoline-str: use canonical version from os/syscall/trampoline
  # (removed to avoid duplicate pattern)
  - id: ssn-resolution-str
    desc: SSN resolution string indicator
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "(?i)(get|find|resolve).?ssn"
    unless:
      - id: metadata/format/pe::dotnet-metadata
      - id: metadata/dotnet::bsjb-signature
  - id: syscall-stub-str
    desc: Syscall stub string indicator
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: "(?i)syscall.?stub"
composite_rules:
  - id: nt-functions-set
    desc: Multiple Nt* syscall functions referenced
    needs: 3
    any:
      - id: nt-allocate-ssn
      - id: nt-write-ssn
      - id: nt-create-thread-ssn
      - id: nt-protect-ssn
      - id: nt-query-info-ssn
      - id: nt-open-process-ssn
  - id: direct-syscall-pattern
    desc: Direct syscall invocation pattern
    crit: suspicious
    conf: 0.9
    all:
      - id: syscall-ret-gadget
      - id: mov-eax-syscall
      - id: nt-functions-set
    downgrade:
      any:
        - type: string
          substr: "supR3Hardened"
