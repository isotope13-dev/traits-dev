# Syscall Trampoline Implementation
# Detects syscall trampoline techniques for EDR bypass
# ATT&CK: T1106 (Native API), T1562.001 (Impair Defenses)
defaults:
  for: [pe, dll, c, cpp]
  platforms: [windows]
  attack: "T1106"
traits:
  # Trampoline function patterns
  - id: syscall-trampoline-fn
    desc: SyscallTrampoline function
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: "SyscallTrampoline"
  - id: syscall-gadget-ptr
    desc: pSyscallGadget pointer field
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: "pSyscallGadget"
  - id: syscall-entry-struct
    desc: SYSCALL_ENTRY structure
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "SYSCALL_ENTRY"
  - id: syscall-stubs-struct
    desc: SYSCALL_STUBS structure
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "SYSCALL_STUBS"
  - id: initialize-syscalls-fn
    desc: InitializeSyscalls function
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "InitializeSyscalls"
  - id: ssn-field
    desc: SSN (syscall number) field
    crit: baseline
    conf: 0.8
    if:
      type: string
      word: "ssn"
  # Syscall wrapper suffix pattern
  - id: syscall-suffix-pattern
    desc: _syscall function suffix pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "Nt[A-Z][a-zA-Z]+_syscall"
  - id: global-syscall-stubs
    desc: g_syscall_stubs global variable
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "g_syscall_stubs"
composite_rules:
  - id: syscall-trampoline-impl
    desc: Syscall trampoline implementation
    crit: suspicious
    conf: 0.95
    any:
      - id: syscall-trampoline-fn
      - id: syscall-gadget-ptr
      - id: syscall-entry-struct
  - id: syscall-wrapper-library
    desc: Direct syscall wrapper library
    crit: suspicious
    conf: 0.95
    all:
      - id: initialize-syscalls-fn
      - id: syscall-stubs-struct
