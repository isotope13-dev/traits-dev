# Callback Execution via Enum APIs (Windows)
# Enumeration APIs that accept function pointers, often abused for stealthy code execution
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.95
traits:
  - id: enum-ui-languages
    desc: Enumerate UI languages (callback trigger)
    if:
      type: symbol
      regex: "^EnumUILanguages[AW]$"
  - id: enum-resource-types
    desc: Enumerate resource types (callback trigger)
    if:
      type: symbol
      regex: "^EnumResourceTypes[AW]$"
  - id: enum-resource-names
    desc: Enumerate resource names (callback trigger)
    if:
      type: symbol
      regex: "^EnumResourceNames[AW]$"
  - id: enum-date-formats
    desc: Enumerate date formats (callback trigger)
    if:
      type: symbol
      exact: "EnumDateFormatsA"
  - id: enum-language-group-locales
    desc: 'Enumerate language group locales'
    if:
      type: symbol
      regex: "^EnumLanguageGroupLocales[AW]$"
  - id: cert-enum-system-store-location
    desc: Enumerate certificate store locations
    crit: baseline
    conf: 0.97
    mbc: C0016
    if:
      type: text
      substr: CertEnumSystemStoreLocation
  - id: payload-release-log
    desc: Payload release log
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: releasing payload
      case_insensitive: true
  - id: cert-enum-callback-token
    desc: CertEnum callback token
    crit: notable
    conf: 0.9
    if:
      type: text
      word: CertEnum
