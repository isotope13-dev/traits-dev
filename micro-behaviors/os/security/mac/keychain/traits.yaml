defaults:
  attack: T1555.001
  mbc: T1555.001
  for: [scripts, binaries]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: find-generic-password
    desc: Find generic password via security utility
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    for: [shell, python, javascript]
    if:
      type: string_value
      substr: "security find-generic-password"
  - id: find-internet-password
    desc: Find internet password via security utility
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    for: [shell, python, javascript]
    if:
      type: string_value
      substr: "security find-internet-password"
  - id: dump-keychain
    desc: Dump keychain via security utility
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    for: [shell, python, javascript]
    if:
      type: string_value
      substr: "security dump-keychain"
  - id: export-keychain
    desc: Export items from keychain via security utility
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    for: [shell, python, javascript]
    if:
      type: string_value
      substr: "security export"
  - id: secitem-copy-matching-api
    desc: Read keychain item via API
    crit: notable
    conf: 0.9
    platforms: [macos, ios]
    for: [shell, python, javascript]
    if:
      type: symbol
      exact: "SecItemCopyMatching"
  - id: secitem-add-api
    desc: Add keychain item via API
    crit: notable
    conf: 0.85
    platforms: [macos, ios]
    for: [shell, python, javascript]
    if:
      type: symbol
      exact: "SecItemAdd"
  - id: secitem-delete-api
    desc: Delete keychain item via API
    crit: notable
    conf: 0.85
    platforms: [macos, ios]
    for: [shell, python, javascript]
    if:
      type: symbol
      exact: "SecItemDelete"
  - id: secclass-generic-password
    desc: Generic password class key
    crit: notable
    conf: 0.8
    platforms: [macos, ios]
    for: [shell, python, javascript]
    if:
      type: symbol
      exact: "kSecClassGenericPassword"
composite_rules:
  - id: keychain-item-crud
    desc: Keychain CRUD API usage
    crit: notable
    conf: 0.9
    platforms: [macos, ios]
    for: [shell, python, javascript]
    needs: 2
    any:
      - id: secitem-copy-matching-api
      - id: secitem-add-api
      - id: secitem-delete-api
      - id: secclass-generic-password
