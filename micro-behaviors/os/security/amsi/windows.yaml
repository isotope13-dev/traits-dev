defaults:
  platforms: [windows]
  for: [powershell, batch, csharp]
  crit: notable
  conf: 0.9

traits:
  - id: dll-reference
    desc: References Windows AMSI library
    if:
      type: text
      word: amsi.dll
      case_insensitive: true

  - id: scan-buffer-api
    desc: References AMSI buffer scanning API
    if:
      type: text
      word: AmsiScanBuffer
      case_insensitive: true
