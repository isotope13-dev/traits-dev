defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: add-ace
    desc: Add ACE to ACL
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "AddAce"
  - id: get-acl-information
    desc: Query ACL information
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: "GetAclInformation"
  - id: initialize-security-descriptor
    desc: Initialize security descriptor
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "InitializeSecurityDescriptor"
  - id: initialize-acl
    desc: Initialize ACL structure
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: "InitializeAcl"
  - id: make-absolute-sd
    desc: Flatten self-relative descriptor
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "MakeAbsoluteSD"
  - id: set-security-descriptor-dacl
    desc: Set security descriptor DACL
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "SetSecurityDescriptorDacl"
composite_rules:
  - id: acl-rewrite-cluster
    desc: Rewrite ACLs and security descriptor
    crit: notable
    conf: 0.94
    all:
      - id: initialize-security-descriptor
      - id: set-security-descriptor-dacl
    any:
      - id: add-ace
      - id: get-acl-information
      - id: initialize-acl
      - id: make-absolute-sd
