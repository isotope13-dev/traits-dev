defaults:
  for:
    - elf
  platforms:
    - linux
  crit: baseline
traits:
  - id: cap-get-file
    desc: cap_get_file function
    conf: 0.6
    if:
      type: text
      substr: cap_get_file
  - id: cap-set-file
    desc: cap_set_file function
    conf: 0.6
    if:
      type: text
      substr: cap_set_file
  - id: cap-setuid
    desc: CAP_SETUID capability reference
    crit: notable
    conf: 0.85
    for:
      - elf
      - shell
      - python
      - ruby
    if:
      type: text
      regex: cap_setuid|setcap.{0,50}setuid
