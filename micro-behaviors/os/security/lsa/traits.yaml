defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.87
traits:
  - id: lsa-lookup-names
    desc: LSA internal name-to-SID lookup
    attack: T1087.001
    if:
      type: symbol
      exact: "LsaICLookupNames"
  - id: lsa-set-system-access
    desc: LSA account system access rights modify
    crit: suspicious
    conf: 0.9
    attack: T1078.001
    if:
      type: symbol
      exact: "LsaSetSystemAccessAccount"
  - id: lsa-open-policy
    desc: Open LSA policy database
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "LsaOpenPolicy"
  - id: lsa-query-information-policy
    desc: Query LSA policy settings
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "LsaQueryInformationPolicy"
