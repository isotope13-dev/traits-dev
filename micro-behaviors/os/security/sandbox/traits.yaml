defaults:
  crit: notable
  platforms:
    - unix
    - windows
traits:
  - id: sandbox-init
    desc: macOS sandbox initialization
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
    if:
      type: symbol
      regex: sandbox_init
  - id: sandbox-init-params
    desc: macOS sandbox initialization with parameters
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
    if:
      type: symbol
      regex: sandbox_init_with_parameters
  - id: sandbox-extension-consume
    desc: macOS sandbox extension consumption
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
    if:
      type: symbol
      regex: sandbox_extension_consume
  - id: sandbox-extension-issue
    desc: macOS sandbox extension issuance
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
    if:
      type: symbol
      regex: sandbox_extension_issue
  - id: sandbox-check
    desc: macOS sandbox check function
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
    if:
      type: symbol
      regex: sandbox_check
  - id: sandbox-entering
    desc: Sandbox entry log message
    conf: 0.85
    platforms:
      - macos
    for:
      - macho
    if:
      type: text
      substr: entering sandbox
      case_insensitive: true
      section: .text
  - id: sandbox-failed
    desc: Sandbox entry failure message
    conf: 0.85
    platforms:
      - macos
    for:
      - macho
    if:
      type: text
      substr: Failed to enter sandbox
      section: .text
  - id: hardened-runtime
    desc: macOS Hardened Runtime enabled
    conf: 0.9
    platforms:
      - macos
    for:
      - macho
    if:
      type: text
      regex: (?i)hardened.{0,4}runtime
      section: .text
  - id: seccomp-init
    desc: Linux seccomp sandbox initialization
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    if:
      type: symbol
      regex: seccomp_init
  - id: seccomp-rule-add
    desc: Linux seccomp rule addition
    conf: 0.9
    platforms:
      - linux
    for:
      - elf
    if:
      type: symbol
      regex: seccomp_rule_add
  - id: seccomp-load
    desc: Linux seccomp profile loading
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    if:
      type: symbol
      regex: seccomp_load
  - id: prctl-seccomp
    desc: Linux prctl seccomp mode
    conf: 0.85
    platforms:
      - linux
    for:
      - elf
    if:
      type: text
      substr: PR_SET_SECCOMP
      section: .text
  - id: seccomp-mode-filter
    desc: Linux seccomp filter mode constant
    conf: 0.85
    platforms:
      - linux
    for:
      - elf
    if:
      type: text
      substr: SECCOMP_MODE_FILTER
      section: .text
  - id: pledge
    desc: OpenBSD pledge syscall restriction
    conf: 0.95
    platforms: [unix]
    for: [elf, c]
    if:
      type: symbol
      exact: pledge
  - id: unveil
    desc: OpenBSD unveil filesystem restriction
    conf: 0.95
    platforms: [unix]
    for: [elf, c]
    if:
      type: symbol
      exact: unveil
  - id: cap-enter
    desc: FreeBSD Capsicum capability mode
    conf: 0.95
    platforms: [unix]
    for: [elf, c]
    if:
      type: symbol
      regex: cap_enter
  - id: cap-rights-limit
    desc: FreeBSD Capsicum rights limiting
    conf: 0.9
    platforms: [unix]
    for: [elf, c]
    if:
      type: symbol
      regex: cap_rights_limit

  # Python wrappers that launch bubblewrap expose a neutral hardening
  # capability.  The flags are specific to the isolation mechanism; intent
  # is supplied by higher-tier composites when additional attack context exists.
  - id: python-bubblewrap-namespace-flag
    desc: Python configures a bubblewrap namespace
    crit: notable
    conf: 0.95
    platforms: [linux]
    for: [python]
    if:
      type: literal
      regex: '^--unshare-[A-Za-z0-9-]+$'

  - id: python-bubblewrap-seccomp-filter
    desc: Python passes a seccomp filter to bubblewrap
    crit: notable
    conf: 0.95
    platforms: [linux]
    for: [python]
    if:
      type: literal
      exact: --seccomp

  - id: python-bubblewrap-capability-drop-flag
    desc: Python uses bubblewrap capability-drop flag
    crit: notable
    conf: 0.95
    platforms: [linux]
    for: [python]
    if:
      type: literal
      exact: --cap-drop
  - id: python-browser-no-sandbox-flag
    desc: Python launches a browser without its sandbox
    crit: notable
    conf: 0.9
    platforms: [linux, macos, windows]
    for: [python]
    if:
      type: literal
      exact: --no-sandbox
composite_rules:
  - id: macos-sandboxed
    desc: macOS App Sandbox enabled
    crit: notable
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
    any:
      - id: sandbox-init
      - id: sandbox-init-params
      - id: sandbox-extension-consume
      - id: sandbox-extension-issue
      - id: sandbox-entering
      - id: sandbox-failed
  - id: linux-seccomp
    desc: Linux seccomp sandbox enabled
    crit: notable
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    needs: 2
    any:
      - id: seccomp-init
      - id: seccomp-load
      - id: seccomp-rule-add
      - id: prctl-seccomp
      - id: seccomp-mode-filter
