# Windows Credential Manager and Vault API Access
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.9
traits:
  # === Windows Credential Manager API ===
  - id: cred-enumerate
    desc: Enumerate stored Windows credentials
    if:
      type: symbol
      regex: "^CredEnumerate[AW]?$"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: keytar-native-addon
  - id: cred-read
    desc: Read a single stored credential
    if:
      type: symbol
      regex: "^CredRead[AW]?$"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: keytar-native-addon
  - id: cred-free
    desc: Free credential buffer
    conf: 0.8
    if:
      type: symbol
      exact: "CredFree"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: keytar-native-addon
  - id: cred-write
    desc: Write/store a credential
    if:
      type: symbol
      regex: "^CredWrite[AW]?$"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: keytar-native-addon
  - id: cred-delete
    desc: Delete stored credential (post-theft cleanup)
    if:
      type: symbol
      regex: "^CredDelete[AW]?$"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: keytar-native-addon
  - id: keytar-native-addon
    desc: Keytar native credential addon
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: "keytar.{0,80}node_register_module|(register|napi_register_module)_keytar"
  # === Windows Credential Vault API (VaultAPI) ===
  - id: vault-open
    desc: Open a Windows credential vault
    if:
      type: symbol
      exact: "VaultOpenVault"
    unless:
      - id: well-known/lib/windows-vault/
  - id: vault-enumerate
    desc: Enumerate items in a Windows credential vault
    if:
      type: symbol
      exact: "VaultEnumerateItems"
    unless:
      - id: well-known/lib/windows-vault/
  - id: vault-get-item
    desc: Retrieve a credential from the vault
    if:
      type: symbol
      exact: "VaultGetItem"
    unless:
      - id: well-known/lib/windows-vault/
  - id: vault-close
    desc: Close a Windows credential vault
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "VaultCloseVault"
