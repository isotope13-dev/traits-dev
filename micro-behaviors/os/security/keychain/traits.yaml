defaults:
  attack: T1555.001
  mbc: T1555.001
  for: [macho, c, cpp, swift]
  platforms: [macos, ios]
traits:
  - id: secitem-copy-matching-api
    desc: Read keychain item via API
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: SecItemCopyMatching
  - id: secitem-add-api
    desc: Add keychain item via API
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: SecItemAdd
  - id: secitem-delete-api
    desc: Delete keychain item via API
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: SecItemDelete
  - id: secclass-generic-password
    desc: Generic password class key
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: kSecClassGenericPassword
composite_rules:
  - id: keychain-item-crud
    desc: Keychain CRUD API usage
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: secitem-copy-matching-api
      - id: secitem-add-api
      - id: secitem-delete-api
      - id: secclass-generic-password
