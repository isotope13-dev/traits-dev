defaults:
  attack: T1555.001
  mbc: T1555.001
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: macos-keychain-generic-password-command-reference
    desc: macOS generic-password command ref
    crit: notable
    conf: 0.94
    platforms: [macos]
    for: [rust]
    if:
      type: text
      substr: find-generic-password
  - id: secitem-copy-matching-api
    desc: Read keychain item via API
    crit: notable
    conf: 0.9
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: SecItemCopyMatching
  - id: secitem-add-api
    desc: Add keychain item via API
    crit: notable
    conf: 0.85
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: SecItemAdd
  - id: secitem-delete-api
    desc: Delete keychain item via API
    crit: notable
    conf: 0.85
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: SecItemDelete
  - id: seckeychain-find-generic-password-api
    desc: Read a macOS Keychain generic password
    crit: notable
    conf: 0.95
    platforms: [macos]
    for: [macho]
    if:
      type: import
      exact: SecKeychainFindGenericPassword
  - id: seckeychain-add-generic-password-api
    desc: Add a macOS Keychain generic password
    crit: notable
    conf: 0.95
    platforms: [macos]
    for: [macho]
    if:
      type: import
      exact: SecKeychainAddGenericPassword
  - id: seckeychain-item-modify-api
    desc: Modify a macOS Keychain item
    crit: notable
    conf: 0.95
    platforms: [macos]
    for: [macho]
    if:
      type: import
      exact: SecKeychainItemModifyAttributesAndData
  - id: seckeychain-item-delete-api
    desc: Delete a macOS Keychain item
    crit: notable
    conf: 0.95
    platforms: [macos]
    for: [macho]
    if:
      type: import
      exact: SecKeychainItemDelete
  - id: swift-keychain-delete
    desc: Swift calls the iOS/macOS Keychain deletion API
    crit: notable
    conf: 0.93
    platforms: [macos, ios]
    for: [swift]
    if:
      type: text
      regex: 'SecItemDelete[\s\S]{0,120}kSecClass'
  - id: secclass-generic-password
    desc: Generic password class key
    crit: suspicious
    conf: 0.8
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: kSecClassGenericPassword
composite_rules:
  - id: keychain-item-crud
    desc: OS credential-store API usage
    crit: notable
    conf: 0.9
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    needs: 2
    any:
      - id: micro-behaviors/os/security/keychain::cred-delete
      - id: micro-behaviors/os/security/keychain::cred-enumerate
      - id: micro-behaviors/os/security/keychain::cred-free
      - id: micro-behaviors/os/security/keychain::cred-read
      - id: micro-behaviors/os/security/keychain::cred-write
      - id: micro-behaviors/os/security/keychain::keytar-native-addon
      - id: micro-behaviors/os/security/keychain::python-keyring-delete-password
      - id: micro-behaviors/os/security/keychain::python-keyring-get-password
      - id: micro-behaviors/os/security/keychain::python-keyring-import
      - id: micro-behaviors/os/security/keychain::python-keyring-set-password
      - id: micro-behaviors/os/security/keychain::secclass-generic-password
      - id: micro-behaviors/os/security/keychain::secitem-add-api
      - id: micro-behaviors/os/security/keychain::secitem-copy-matching-api
      - id: micro-behaviors/os/security/keychain::secitem-delete-api
      - id: micro-behaviors/os/security/keychain::vault-close
      - id: micro-behaviors/os/security/keychain::vault-enumerate
      - id: micro-behaviors/os/security/keychain::vault-get-item
      - id: micro-behaviors/os/security/keychain::vault-open
