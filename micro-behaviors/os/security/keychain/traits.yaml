defaults:
  attack: T1555.001
  mbc: T1555.001
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: secitem-copy-matching-api
    desc: Read keychain item via API
    crit: notable
    conf: 0.9
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: SecItemCopyMatching
  - id: secitem-add-api
    desc: Add keychain item via API
    crit: notable
    conf: 0.85
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: SecItemAdd
  - id: secitem-delete-api
    desc: Delete keychain item via API
    crit: notable
    conf: 0.85
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: SecItemDelete
  - id: secclass-generic-password
    desc: Generic password class key
    crit: suspicious
    conf: 0.8
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    if:
      type: symbol
      exact: kSecClassGenericPassword
composite_rules:
  - id: keychain-item-crud
    desc: OS credential-store API usage
    crit: notable
    conf: 0.9
    platforms:
      - macos
      - ios
    for:
      - shell
      - python
      - javascript
    needs: 2
    any:
      - id: micro-behaviors/os/security/keychain::cred-delete
      - id: micro-behaviors/os/security/keychain::cred-enumerate
      - id: micro-behaviors/os/security/keychain::cred-free
      - id: micro-behaviors/os/security/keychain::cred-read
      - id: micro-behaviors/os/security/keychain::cred-write
      - id: micro-behaviors/os/security/keychain::keytar-native-addon
      - id: micro-behaviors/os/security/keychain::python-keyring-delete-password
      - id: micro-behaviors/os/security/keychain::python-keyring-get-password
      - id: micro-behaviors/os/security/keychain::python-keyring-import
      - id: micro-behaviors/os/security/keychain::python-keyring-set-password
      - id: micro-behaviors/os/security/keychain::secclass-generic-password
      - id: micro-behaviors/os/security/keychain::secitem-add-api
      - id: micro-behaviors/os/security/keychain::secitem-copy-matching-api
      - id: micro-behaviors/os/security/keychain::secitem-delete-api
      - id: micro-behaviors/os/security/keychain::vault-close
      - id: micro-behaviors/os/security/keychain::vault-enumerate
      - id: micro-behaviors/os/security/keychain::vault-get-item
      - id: micro-behaviors/os/security/keychain::vault-open
