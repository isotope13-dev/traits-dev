defaults:
  platforms: [linux, macos, windows]
  for: [python]
  crit: notable
  conf: 0.85

traits:
  - id: python-keyring-import
    desc: Python keyring module import
    if:
      type: text
      substr: import keyring
  - id: python-keyring-get-password
    desc: Python keyring password read
    conf: 0.9
    if:
      type: text
      substr: keyring.get_password(
  - id: python-keyring-set-password
    desc: Python keyring password write
    conf: 0.9
    if:
      type: text
      substr: keyring.set_password(
  - id: python-keyring-delete-password
    desc: Python keyring password delete
    conf: 0.85
    if:
      type: text
      substr: keyring.delete_password(
