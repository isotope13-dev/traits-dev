defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  conf: 0.9

traits:
  - id: reads-php-disable-functions
    desc: Reads PHP disabled-functions setting
    if:
      type: symbol
      kind: call
      exact: ini_get
      arg:
        kind: string
        exact: disable_functions
  - id: reads-php-open-basedir
    desc: Reads PHP open_basedir setting
    if:
      type: symbol
      kind: call
      exact: ini_get
      arg:
        kind: string
        exact: open_basedir
  - id: reads-php-safe-mode
    desc: Reads PHP safe_mode setting
    if:
      type: symbol
      kind: call
      exact: ini_get
      arg:
        kind: string
        exact: safe_mode
  - id: reads-php-allow-url-include
    desc: Reads PHP URL-include setting
    if:
      type: symbol
      kind: call
      exact: ini_get
      arg:
        kind: string
        exact: allow_url_include
  - id: wordpress-admin-capability-check
    desc: Checks WordPress manage_options capability
    if:
      type: symbol
      kind: call
      exact: current_user_can
      arg:
        kind: string
        exact: manage_options
  - id: wordpress-admin-context-check
    desc: Checks WordPress admin context
    if:
      type: symbol
      kind: call
      exact: is_admin
