defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  conf: 0.9

traits:
  - id: wordpress-admin-capability-check
    desc: Checks WordPress manage_options capability
    if:
      type: symbol
      kind: call
      exact: current_user_can
      arg:
        kind: string
        exact: manage_options
  - id: wordpress-admin-context-check
    desc: Checks WordPress admin context
    if:
      type: symbol
      kind: call
      exact: is_admin
