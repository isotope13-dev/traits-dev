# Runtime security and environment artifact references.
defaults:
  platforms: [ios]
  for: [go, kotlin, rust, cpp, objc]
  crit: notable
  conf: 0.9

traits:
  - id: ios-cydia-artifact-path
    desc: References the iOS Cydia artifact path
    if:
      type: string_literal
      exact: /Applications/Cydia.app

  - id: ios-sileo-artifact-path
    desc: References the iOS Sileo artifact path
    if:
      type: string_literal
      exact: /Applications/Sileo.app

  - id: ios-mobilesubstrate-artifact-path
    desc: References the iOS MobileSubstrate artifact path
    if:
      type: string_literal
      exact: /Library/MobileSubstrate/MobileSubstrate.dylib

  - id: ios-apt-artifact-path
    desc: References the iOS apt artifact path
    if:
      type: string_literal
      exact: /private/var/lib/apt

composite_rules:
  - id: ios-jailbreak-artifact-path
    desc: References an iOS jailbreak artifact path
    crit: notable
    conf: 0.9
    any:
      - id: ios-cydia-artifact-path
      - id: ios-sileo-artifact-path
      - id: ios-mobilesubstrate-artifact-path
      - id: ios-apt-artifact-path
