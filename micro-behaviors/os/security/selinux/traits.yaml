defaults:
  platforms: [linux, android]
  for: [scripts, binaries]
  crit: notable

traits:
  - id: enforce-sysfs-path
    desc: SELinux sysfs enforce path
    conf: 0.82
    if:
      type: text
      substr: /sys/fs/selinux/enforce
  - id: enforce-legacy-path
    desc: Legacy SELinux enforce path
    conf: 0.78
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_./-])/selinux/enforce([^A-Za-z0-9_./-]|$)'
  - id: restorecon-command
    desc: Restores SELinux file labels
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(?m)^[ \t]*((sudo[ \t]+)?restorecon)([ \t]|$)'
