defaults:
  platforms: [linux, android]
  for: [scripts, binaries]
  crit: notable

traits:
  - id: enforce-sysfs-path
    desc: SELinux sysfs enforce path
    conf: 0.82
    if:
      type: text
      substr: /sys/fs/selinux/enforce
  - id: enforce-legacy-path
    desc: Legacy SELinux enforce path
    conf: 0.78
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_./-])/selinux/enforce([^A-Za-z0-9_./-]|$)'
  - id: restorecon-command
    desc: Restores SELinux file labels
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(?m)^[ \t]*((sudo[ \t]+)?restorecon)([ \t]|$)'
  - id: selinux-config-path
    desc: References SELinux policy configuration path
    conf: 0.85
    for: [shell, scripts, binaries]
    if:
      type: text
      substr: /etc/selinux
  - id: getenforce-command
    desc: Reads SELinux enforcement state
    conf: 0.85
    for: [shell]
    if:
      type: text
      word: getenforce
  - id: chcon-command
    desc: Relabels a file with chcon
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '(?m)^\s*(sudo\s+)?chcon\b'
