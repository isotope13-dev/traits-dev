defaults:
  platforms: [linux, android]
  for: [scripts, binaries]
  crit: notable

traits:
  - id: enforce-sysfs-path
    desc: SELinux sysfs enforce path
    conf: 0.82
    if:
      type: text
      substr: /sys/fs/selinux/enforce
  - id: enforce-legacy-path
    desc: Legacy SELinux enforce path
    conf: 0.78
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_./-])/selinux/enforce([^A-Za-z0-9_./-]|$)'
