defaults:
  platforms: [linux, android]
  for: [scripts, binaries]
  crit: notable

traits:
  - id: unconfined-u-label
    desc: References an unconfined SELinux user label
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: '\bunconfined_u:[A-Za-z0-9_.-]+'
  - id: unconfined-r-label
    desc: References an unconfined SELinux role label
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: '\bunconfined_r:[A-Za-z0-9_.-]+'
  - id: unconfined-t-label
    desc: References an unconfined SELinux domain label
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: '\bunconfined_t:[A-Za-z0-9_.-]+'
  - id: object-r-label
    desc: References an object_r SELinux file-role label
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: 'object_r:'
  - id: permissive-keyword
    desc: References SELinux permissive mode
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: permissive
  - id: enforce-sysfs-path
    desc: SELinux sysfs enforce path
    conf: 0.82
    if:
      type: text
      substr: /sys/fs/selinux/enforce
  - id: enforce-legacy-path
    desc: Legacy SELinux enforce path
    conf: 0.78
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_./-])/selinux/enforce([^A-Za-z0-9_./-]|$)'
  - id: restorecon-command
    desc: Restores SELinux file labels
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(?m)^[ \t]*((sudo[ \t]+)?restorecon)([ \t]|$)'
  - id: selinux-config-path
    desc: References SELinux policy configuration path
    conf: 0.85
    for: [shell, scripts, binaries]
    if:
      type: text
      substr: /etc/selinux
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - id: getenforce-command
    desc: Reads SELinux enforcement state
    conf: 0.85
    for: [shell]
    if:
      type: text
      word: getenforce
  - id: chcon-command
    desc: Relabels a file with chcon
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '(?m)^\s*(sudo\s+)?chcon\b'
