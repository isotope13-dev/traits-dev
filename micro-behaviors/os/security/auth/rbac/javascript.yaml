# Application-level authorization changes.  These are neutral capabilities:
# an administrator, installer, or migration can legitimately perform them.
defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: notable
  conf: 0.9

traits:
  - id: application-user-lookup
    desc: Resolves an application user for authorization
    if:
      type: text
      regex: '\bfindUserBy(Username|Id)\b'

  - id: application-role-lookup
    desc: Looks up an application authorization role
    if:
      type: text
      word: getRoleByName

  - id: authorization-binding-write
    desc: Creates an application authorization binding
    if:
      type: symbol
      kind: call
      exact: createBinding

composite_rules:
  - id: application-role-assignment
    desc: Resolves a user and role before writing authorization
    crit: notable
    conf: 0.95
    all:
      - id: application-user-lookup
      - id: application-role-lookup
      - id: authorization-binding-write
