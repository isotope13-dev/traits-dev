defaults:
  platforms: [linux, macos, windows]
  for: [scripts, pyc]
  crit: notable
  conf: 0.85

traits:
  - id: common-password-policy-text
    desc: Common-password policy warning
    if:
      type: text
      regex: '(?i)(password is too common|common passwords|weak passwords|too common\.)'
  - id: dockerfile-root-password-set
    desc: Dockerfile sets root password
    for: [dockerfile]
    platforms: [unix]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'echo\s+["'']?root:.{1,64}["'']?\s*\|\s*chpasswd'
      case_insensitive: true
