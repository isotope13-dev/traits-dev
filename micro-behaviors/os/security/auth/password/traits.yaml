defaults:
  platforms: [linux, macos, windows]
  for: [scripts, pyc]
  crit: notable
  conf: 0.85

traits:
  - id: native-password-getter-or-checker
    desc: Password getter or checker function name
    for: [c, elf]
    platforms: [linux]
    if:
      type: text
      regex: '(get|check)[_-]?password'

  - id: hardcoded-default-password-parameter
    desc: Uses a hardcoded default password parameter
    crit: notable
    conf: 0.9
    for: [python, pe, dll]
    if:
      type: text
      regex: '(?i)\b(pwd|password|passwd)\s*(:\s*str)?\s*=\s*["''][^"''\r\n]{6,80}["'']'
    not:
      # Config key labels like PASSWORD = 'PASSWORD' are not credentials.
      - regex: '(?i)\b(pwd|password|passwd)\s*(:\s*str)?\s*=\s*["''](pwd|password|passwd)["'']'
  - id: php-common-default-password-literal
    desc: PHP common default-password literal
    for: [php]
    platforms: [unix, windows]
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(admin@123|//12345)'

  - id: common-password-policy-text
    desc: Common-password policy warning
    if:
      type: text
      regex: '(?i)(password is too common|common passwords|weak passwords|too common\.)'
  - id: dockerfile-root-password-set
    desc: Dockerfile sets root password
    for: [dockerfile]
    platforms: [unix]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'echo\s+["'']?root:.{1,64}["'']?\s*\|\s*chpasswd'
      case_insensitive: true
