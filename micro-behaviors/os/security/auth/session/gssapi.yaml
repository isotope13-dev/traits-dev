defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe, dll, so]
  crit: notable
  conf: 0.95

traits:
  - id: gss-client-security-context
    desc: Imports GSSAPI client security context
    if:
      type: import
      exact: gss_init_sec_context

  - id: gss-server-security-context
    desc: Imports GSSAPI server security context
    if:
      type: import
      exact: gss_accept_sec_context
