defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.95

traits:
  - id: wordpress-auth-cookie
    desc: Sets a WordPress authentication cookie
    if:
      type: symbol
      exact: wp_set_auth_cookie

  - id: wordpress-current-user
    desc: Sets the current WordPress user
    if:
      type: symbol
      exact: wp_set_current_user

composite_rules:
  - id: wordpress-auth-session-setup
    desc: Completes WordPress authentication session setup
    crit: notable
    conf: 0.95
    all:
      - id: wordpress-auth-cookie
      - id: wordpress-current-user
