defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
  attack: T1550.002

traits:
  - id: python-lm-ntlm-hash-pair
    desc: Python accepts LM:NTLM hash pair
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: '\blmntlm\b|LM:NTLM'
  - id: ntlmssp-marker
    desc: NTLMSSP authentication marker
    crit: notable
    conf: 0.9
    count_min: 2
    if:
      type: text
      substr: NTLMSSP
