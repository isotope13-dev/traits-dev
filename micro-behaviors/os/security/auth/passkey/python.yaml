defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.88

traits:
  - id: webauthn-registration-handler
    desc: WebAuthn credential creation handler
    conf: 0.86
    if:
      type: text
      regex: '\b(generate_registration_options|verify_registration_response|credential_create)\s*\('
      case_insensitive: true

  - id: webauthn-authentication-handler
    desc: WebAuthn credential request handler
    conf: 0.86
    if:
      type: text
      regex: '\b(generate_authentication_options|verify_authentication_response|credential_get)\s*\('
      case_insensitive: true

  - id: passkey-wallet-extension
    desc: Passkey wallet file extension
    conf: 0.9
    if:
      type: text
      regex: '\.passkey\b'
      case_insensitive: true

  - id: passkey-wallet-class
    desc: PasskeyWallet class reference
    conf: 0.88
    if:
      type: text
      word: PasskeyWallet
      case_insensitive: true

  - id: passkey-wallet-module
    desc: passkey_wallet module reference
    conf: 0.88
    if:
      type: text
      word: passkey_wallet
      case_insensitive: true

  - id: passkey-wallet-list-files
    desc: Passkey wallet file listing
    conf: 0.9
    if:
      type: text
      word: list_passkey_files
      case_insensitive: true

  - id: fido2-authenticator-class
    desc: FIDO2 authenticator class
    conf: 0.9
    if:
      type: text
      word: Fido2Authenticator
      case_insensitive: true

  - id: ctap2-class-reference
    desc: CTAP2 class reference
    conf: 0.88
    if:
      type: text
      word: Ctap2
      case_insensitive: true

  - id: attested-credential-data-class
    desc: Attested credential data class
    conf: 0.88
    if:
      type: text
      word: AttestedCredentialData
      case_insensitive: true

  - id: authenticator-data-field
    desc: Authenticator data field
    conf: 0.86
    if:
      type: text
      word: authenticator_data
      case_insensitive: true

  - id: cose-key-algorithm-handling
    desc: COSE key algorithm handling
    conf: 0.88
    if:
      type: text
      regex: '\b(cose_alg|COSEAlgorithmIdentifier|CoseKey|alg_id.{0,40}ES256)\b'
      case_insensitive: true

composite_rules:
  - id: passkey-wallet-context
    desc: Passkey wallet context
    crit: notable
    conf: 0.92
    any:
      - id: passkey-wallet-extension
      - id: passkey-wallet-class
      - id: passkey-wallet-module
      - id: passkey-wallet-list-files

  - id: fido2-authenticator-implementation
    desc: FIDO2 authenticator implementation
    crit: notable
    conf: 0.92
    any:
      - id: fido2-authenticator-class
      - id: ctap2-class-reference
      - id: attested-credential-data-class
      - id: authenticator-data-field

  - id: webauthn-passkey-authenticator
    desc: WebAuthn passkey authenticator
    crit: notable
    conf: 0.94
    all:
      - id: passkey-wallet-context
    any:
      - id: webauthn-registration-handler
      - id: webauthn-authentication-handler
      - id: fido2-authenticator-implementation

  - id: fido2-cose-credential-keys
    desc: FIDO2 COSE credential keys
    crit: notable
    conf: 0.92
    all:
      - id: fido2-authenticator-implementation
      - id: cose-key-algorithm-handling
