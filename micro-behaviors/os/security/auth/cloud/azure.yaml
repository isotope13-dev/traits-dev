defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.88

traits:
  - id: python-azure-default-credential
    desc: Python Azure DefaultCredential usage
    if:
      type: symbol
      exact: DefaultAzureCredential

  - id: python-azure-openai-token-scope
    desc: Python Azure OpenAI token scope
    if:
      type: text
      substr: https://cognitiveservices.azure.com/.default
