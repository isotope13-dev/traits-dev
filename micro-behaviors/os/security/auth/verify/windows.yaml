defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1553.002
traits:
  - id: winverifytrust-symbol
    desc: Verify Authenticode trust chain
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: WinVerifyTrust
  - id: signed-verified-status
    desc: Signed file verification status
    crit: notable
    conf: 0.92
    if:
      type: string_value
      exact: The file "%s" is signed and the signature was verified.
  - id: unsigned-status
    desc: Unsigned file verification status
    crit: baseline
    conf: 0.88
    if:
      type: string_value
      exact: The file "%s" is not signed.
  - id: signature-untrusted-status
    desc: Untrusted signature verification status
    crit: notable
    conf: 0.88
    if:
      type: string_value
      exact: The signature is present, but not trusted.
composite_rules:
  - id: authenticode-verification-flow
    desc: Authenticode verification workflow
    crit: notable
    conf: 0.95
    all:
      - id: winverifytrust-symbol
    any:
      - id: signed-verified-status
      - id: unsigned-status
      - id: signature-untrusted-status
