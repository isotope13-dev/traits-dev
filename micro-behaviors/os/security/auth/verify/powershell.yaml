defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1553.002
traits:
  - id: get-authenticode-signature
    desc: Get-AuthenticodeSignature cmdlet
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bGet-AuthenticodeSignature\b'
  - id: signer-subject-access
    desc: Signer certificate subject access
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bSignerCertificate\.Subject\b'
  - id: valid-signature-status-check
    desc: Checks for valid signature status
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bStatus\b.{0,40}"Valid"|"\s*Valid\s*"'
composite_rules:
  - id: authenticode-verification-workflow
    desc: PowerShell Authenticode verification workflow
    crit: notable
    conf: 0.94
    all:
      - id: get-authenticode-signature
      - id: signer-subject-access
      - id: valid-signature-status-check
