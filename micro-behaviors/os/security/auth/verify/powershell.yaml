defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1553.002
traits:
  - id: get-authenticode-signature
    desc: Get-AuthenticodeSignature cmdlet
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bGet-AuthenticodeSignature\b'
  - id: signer-subject-access
    desc: Signer certificate subject access
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bSignerCertificate\.Subject\b'
  - id: valid-signature-status-check
    desc: Checks for valid signature status
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bStatus\b.{0,40}"Valid"|"\s*Valid\s*"'
  - id: check-credentials-test-helper
    desc: check_credentials helper marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: check_credentials
  - id: check-credentials-script-basename
    desc: check_credentials.ps1 basename
    crit: component
    conf: 0.9
    if:
      type: basename
      exact: check_credentials.ps1
  - id: directoryservices-accountmanagement
    desc: DirectoryServices AccountManagement use
    crit: notable
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      substr: System.DirectoryServices.AccountManagement
  - id: principal-context-construction
    desc: PrincipalContext credential validator
    crit: suspicious
    conf: 0.92
    attack: T1110.001
    if:
      type: text
      substr: System.DirectoryServices.AccountManagement.PrincipalContext
    unless:
      - id: check-credentials-test-helper
      - id: check-credentials-script-basename
  - id: validate-credentials-call
    desc: ValidateCredentials password check
    crit: suspicious
    conf: 0.92
    attack: T1110.001
    if:
      type: text
      regex: '(?i)\bValidateCredentials\s*\('
    unless:
      - id: check-credentials-test-helper
      - id: check-credentials-script-basename
  - id: directoryentry-credential-bind
    desc: DirectoryEntry credential bind
    crit: suspicious
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      regex: '(?i)\bDirectoryEntry\s*\(.{0,80},\s*\$user\s*,\s*\$pass'
composite_rules:
  - id: authenticode-verification-workflow
    desc: PowerShell Authenticode verification workflow
    crit: notable
    conf: 0.94
    all:
      - id: get-authenticode-signature
      - id: signer-subject-access
      - id: valid-signature-status-check
  - id: directoryservices-credential-validation
    desc: PowerShell DirectoryServices credential validation
    crit: suspicious
    conf: 0.96
    attack: T1110.001
    all:
      - id: principal-context-construction
      - id: validate-credentials-call
    any:
      - id: directoryservices-accountmanagement
      - id: directoryentry-credential-bind
    unless:
      - id: check-credentials-test-helper
      - id: check-credentials-script-basename
