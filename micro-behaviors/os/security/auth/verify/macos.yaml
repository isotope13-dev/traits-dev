defaults:
  platforms:
    - macos
  for:
    - macho
    - shell
    - javascript
    - python
    - ruby
traits:
  - id: csidentity-auth
    desc: macOS CSIdentity password authentication
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: CSIdentityAuthenticateUsingPassword
  - id: dscl-authonly
    desc: macOS dscl -authonly (password validation)
    crit: suspicious
    conf: 0.85
    mbc: T1078.001
    if:
      type: string_value
      substr: -authonly
  - id: dscl-local-default
    desc: macOS dscl /Local/Default (local directory service)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: /Local/Default
