defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, pyc, javascript]

traits:
  - id: routeros-privileged-script-policy
    desc: RouterOS script requests sensitive policy rights
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/system|api\.menu).{0,160}policy=[^\r\n]{0,80}(password|sniff|sensitive)'
    unless:
      - id: well-known/app/bitwarden::bitwarden-app
      - id: well-known/app/bitwarden::bitwarden-text-marker
      - id: metadata/library/structure::vscode-extension-generated-asset
