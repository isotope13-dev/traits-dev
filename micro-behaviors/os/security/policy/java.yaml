defaults:
  platforms: [unix, windows]
  for: [java]

# Removing the Java SecurityManager is a neutral capability observation. It
# is used by legitimate wrappers that install a temporary guard against
# System.exit, as well as by security-policy bypasses when combined with
# permission-weakeners. The attack-context composite supplies that intent.
traits:
  - id: java-loginmodule-class-reference
    desc: References the Java LoginModule class
    crit: notable
    conf: 0.94
    for: [java, class, java_class, jar]
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])LoginModule\.class'

  - id: java-login-configuration-provider-property
    desc: Java login provider property
    crit: notable
    conf: 0.94
    for: [java, class, java_class, jar]
    if:
      type: text
      substr: login.configuration.provider

  - id: java-login-configuration-provider-property-bytecode
    desc: Java bytecode login provider property
    crit: notable
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 6c 6f 67 69 6e 2e 63 6f 6e 66 69 67 75 72 61 74 69 6f 6e 2e 70 72 6f 76 69 64 65 72

  - id: java-security-manager-null-call
    desc: Removes the Java SecurityManager
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: setSecurityManager
      arg:
        kind: null
