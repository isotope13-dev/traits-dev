# Browser-extension identity / OAuth token acquisition (chrome.identity).
# Generic technique: obtaining an auth token / launching an auth flow.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-identity-api
    desc: Chrome identity API usage
    if:
      type: text
      regex: '(chrome|browser)\.identity\.[A-Za-z_]'
  - id: chrome-identity-get-auth-token
    desc: Chrome identity OAuth token request
    if:
      type: text
      regex: '(chrome|browser)\.identity\.getAuthToken\b'
  - id: chrome-identity-web-auth-flow
    desc: Chrome identity launchWebAuthFlow
    if:
      type: text
      regex: '(chrome|browser)\.identity\.launchWebAuthFlow\b'
