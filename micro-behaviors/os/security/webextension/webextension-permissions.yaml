# Runtime WebExtension permission changes. These calls prompt for, inspect, or
# revoke extension authority after installation.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.92

traits:
  - id: extension-permissions-request
    desc: Requests additional extension permissions
    if:
      type: symbol
      kind: call
      regex: '(^|\.)permissions\.request$'
  - id: extension-permissions-remove
    desc: Revokes optional extension permissions
    if:
      type: symbol
      kind: call
      regex: '(^|\.)permissions\.remove$'
  - id: extension-permissions-contains
    desc: Checks granted extension permissions
    if:
      type: symbol
      kind: call
      regex: '(^|\.)permissions\.contains$'
