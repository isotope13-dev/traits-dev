defaults:
  platforms: [windows, unix]
  for: [chrome-manifest]

traits:
  - id: extension-identity-permission
    desc: Extension requests identity permission
    crit: notable
    conf: 0.94
    if:
      type: value
      path: permissions
      exact: identity

  - id: permission-downloads
    desc: Extension requests downloads permission
    crit: notable
    conf: 0.9
    if:
      type: value
      path: permissions
      exact: downloads

  - id: host-cloud-docs-google
    desc: Grants access to Google document hosts
    crit: notable
    conf: 0.9
    if:
      type: value
      path: host_permissions
      regex: 'drive\.google\.com|docs\.google\.com'

  - id: host-cloud-docs-enterprise
    desc: Grants access to enterprise document hosts
    crit: notable
    conf: 0.88
    if:
      type: value
      path: host_permissions
      regex: 'dropbox\.com|onedrive\.live\.com|sharepoint\.com'

  - id: host-cloud-docs-saas
    desc: Grants access to SaaS document hosts
    crit: notable
    conf: 0.86
    if:
      type: value
      path: host_permissions
      regex: 'box\.com|notion\.so'

composite_rules:
  - id: host-cloud-docs-storage
    desc: Grants access to cloud-document hosts
    crit: notable
    conf: 0.92
    any:
      - id: host-cloud-docs-google
      - id: host-cloud-docs-enterprise
      - id: host-cloud-docs-saas
  - id: broad-sensitive-permission-set
    desc: Extension combines broad sensitive permissions
    crit: notable
    conf: 0.9
    needs: 3
    unless:
      - id: metadata/package/testing/
      - id: well-known/app/browser-extension::adblock-extension-bundle
    any:
      - id: metadata/permission/manifest::permission-all-urls
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: metadata/permission/network::network-request-modification
      - id: metadata/permission/active-tab::permission-active-tab
      - id: metadata/permission/network::permission-declarative-net-request
      - id: metadata/permission/identity::identity-get-auth-token
      - id: metadata/permission/cookie::permission-cookies
      - id: metadata/permission/history::permission-history
      - id: metadata/permission/clipboard::permission-clipboard-read
      - id: metadata/permission/extension-api::permission-native-messaging
      - id: metadata/permission/debugger::permission-debugger
  - id: all-url-request-download-permission-set
    desc: All-URL request interception and download permissions
    crit: notable
    conf: 0.92
    all:
      - id: metadata/permission/host::broad-host-access
      - id: metadata/permission/network::network-request-modification
      - id: permission-downloads
  - id: broad-scripting-host-authority
    desc: Scripting permission with broad host access
    crit: notable
    conf: 0.9
    all:
      - id: metadata/permission/manifest::is-chrome-manifest
      - id: metadata/permission/manifest::permission-scripting
      - id: metadata/permission/host::broad-host-access
