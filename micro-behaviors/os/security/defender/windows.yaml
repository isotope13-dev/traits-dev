defaults:
  platforms: [windows]
  for: [powershell, batch, vbs, data, pe, javascript]
  crit: notable
  conf: 0.96

traits:
  - id: defender-exclusion-command
    desc: Microsoft Defender exclusion command text
    if:
      type: text
      regex: '\bAdd-MpPreference\b.{0,96}-Exclusion(Path|Extension|Process)\b'
      case_insensitive: true

  - id: defender-exclusion-path-parameter
    desc: Defender exclusion path parameter
    crit: component
    conf: 0.92
    if:
      type: text
      substr: -ExclusionPath
      case_insensitive: true

  - id: defender-reenable-realtime
    desc: Restores Windows Defender realtime monitoring
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: Set-MpPreference\s+.{0,80}-DisableRealtimeMonitoring\s+\$?false
      case_insensitive: true

composite_rules:
  - id: temporary-module-install-restoration
    desc: Temporary Defender disable restored after module installation
    crit: exception
    conf: 0.98
    all:
      - id: defender-reenable-realtime
      - id: micro-behaviors/os/module/load::powershell-install-module
      - id: micro-behaviors/os/module/load::powershell-skip-publisher-check
