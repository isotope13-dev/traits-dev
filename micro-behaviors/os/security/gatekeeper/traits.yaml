# macOS Gatekeeper and code signing security tools
# Detects binaries that invoke system security assessment tools
# These are used by droppers to validate payloads before execution
defaults:
  platforms: [macos]
  for: [macho]
  crit: notable
traits:
  - id: spctl-assess
    desc: Gatekeeper assessment via spctl
    conf: 0.9
    attack: T1553.001
    if:
      type: text
      substr: "/usr/sbin/spctl --assess"
  - id: codesign-verify
    desc: Code signature verification via codesign
    conf: 0.85
    if:
      type: text
      substr: "/usr/bin/codesign -dv"
  - id: file-mime-check
    desc: File MIME type detection via file command
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: "/usr/bin/file --mime-type"
