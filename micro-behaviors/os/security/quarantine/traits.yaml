defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: xattr-bypass
    desc: Bypass Gatekeeper/Quarantine via xattr -c
    crit: suspicious
    conf: 0.9
    mbc: B0009
    attack: T1553.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
    if:
      type: string_literal
      substr: xattr -c
