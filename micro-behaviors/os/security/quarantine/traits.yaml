defaults:
  for: [scripts, binaries]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: xattr-bypass
    desc: Bypass Gatekeeper/Quarantine via xattr -c
    crit: notable
    conf: 0.9
    mbc: B0009
    attack: T1553.001
    platforms: [macos]
    for: [shell, python, javascript]
    if:
      type: string_value
      substr: "xattr -c"
