# Time Queries (Windows)
# System time retrieval APIs
defaults:
  for: [pe, dll]
  crit: baseline
  conf: 0.9
traits:
  - id: get-system-time-as-filetime
    desc: Get system time as FILETIME
    if:
      type: symbol
      exact: "GetSystemTimeAsFileTime"
  - id: get-system-time
    desc: Get system time
    if:
      type: symbol
      exact: "GetSystemTime"
  - id: get-local-time
    desc: Get local time
    if:
      type: symbol
      exact: "GetLocalTime"
  - id: filetime-to-systemtime
    desc: Convert FILETIME to SYSTEMTIME
    if:
      type: symbol
      exact: "FileTimeToSystemTime"
  - id: systemtime-to-filetime
    desc: Convert SYSTEMTIME to FILETIME
    if:
      type: symbol
      exact: "SystemTimeToFileTime"
  - id: systemtime-tz-convert
    desc: Convert time to local timezone
    if:
      type: symbol
      exact: "SystemTimeToTzSpecificLocalTime"
  - id: get-timezone-information
    desc: Query timezone configuration
    if:
      type: symbol
      exact: "GetTimeZoneInformation"
  - id: get-tick-count
    desc: Get tick count
    if:
      type: symbol
      regex: "^GetTickCount(64)?$"
composite_rules:
  - id: local-timezone-conversion
    desc: Local timezone time conversion
    crit: notable
    conf: 0.9
    all:
      - id: filetime-to-systemtime
      - id: systemtime-tz-convert
      - id: get-timezone-information
