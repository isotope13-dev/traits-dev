# Mach exception-port registration is a neutral OS capability.  Crash
# reporters and runtimes use it to turn fatal signals into stack traces.
defaults:
  platforms: [macos, ios]
  for: [macho, c]
  attack: T1622

traits:
- id: task-set-exception-ports
  desc: Register Mach task exception ports
  crit: notable
  conf: 0.95
  if:
    type: symbol
    exact: task_set_exception_ports
- id: thread-set-exception-ports
  desc: Register Mach thread exception ports
  crit: notable
  conf: 0.95
  if:
    type: symbol
    exact: thread_set_exception_ports
