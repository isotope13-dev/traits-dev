defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: set-error-mode
    desc: Suppress error dialogs
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: SetErrorMode
  - id: get-last-error
    desc: Get system error code
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetLastError
  - id: set-last-error
    desc: Set last error code
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: SetLastError
  - id: unhandled-exception-filter
    desc: Handle unhandled exceptions
    crit: baseline
    conf: 0.8
    for:
      - c
      - cpp
    if:
      type: text
      exact: UnhandledExceptionFilter
  - id: set-unhandled-exception-filter
    desc: Register exception handler
    crit: baseline
    conf: 0.85
    for:
      - c
      - cpp
    if:
      type: text
      exact: SetUnhandledExceptionFilter
  - id: add-vectored-exception-handler
    desc: Register vectored exception handler
    crit: notable
    conf: 0.9
    mbc: B0001
    if:
      type: symbol
      exact: AddVectoredExceptionHandler
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - type: basename
        regex: \.pyd$
  - id: add-vectored-exception-handler-source
    desc: Register vectored exception handler in source
    crit: notable
    conf: 0.9
    for:
      - c
    if:
      type: string_literal
      substr: AddVectoredExceptionHandler
    unless:
      - id: metadata/package/testing/compiled::catch2
  - id: remove-vectored-exception-handler-source
    desc: Remove vectored exception handler in source
    crit: notable
    conf: 0.88
    for:
      - c
    if:
      type: string_literal
      substr: RemoveVectoredExceptionHandler
    unless:
      - id: metadata/package/testing/compiled::catch2
  - id: seh-common-exit-comment
    desc: SEH used for common exit
    crit: suspicious
    conf: 0.94
    for:
      - c
    if:
      type: string_literal
      substr: uses SEH for common code exit
  - id: rtl-unwind
    desc: Runtime library unwind operation
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: RtlUnwind
composite_rules:
  - id: vectored-exception-handler-source
    desc: Vectored exception handler lifecycle in source
    crit: suspicious
    conf: 0.94
    for:
      - c
    all:
      - id: add-vectored-exception-handler-source
      - id: remove-vectored-exception-handler-source
    unless:
      - id: metadata/package/testing/compiled::catch2
  - id: exception-filter-pair
    desc: Register and invoke exception filters
    crit: notable
    conf: 0.87
    for:
      - c
      - cpp
    all:
      - id: unhandled-exception-filter
      - id: set-unhandled-exception-filter
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
