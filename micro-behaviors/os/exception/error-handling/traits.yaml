# Error Handling Operations
# Error suppression and handling mechanisms.
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Error Mode ===
  - id: set-error-mode
    desc: Suppress error dialogs
    crit: baseline
    conf: 0.80
    if:
      type: string_value
      exact: "SetErrorMode"
  - id: get-last-error
    desc: Get system error code
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "GetLastError"
  - id: set-last-error
    desc: Set last error code
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "SetLastError"
  # === Process Error Handling ===
  - id: unhandled-exception-filter
    desc: Handle unhandled exceptions
    crit: baseline
    conf: 0.80
    if:
      type: string_value
      exact: "UnhandledExceptionFilter"
  - id: set-unhandled-exception-filter
    desc: Register exception handler
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      exact: "SetUnhandledExceptionFilter"
  - id: add-vectored-exception-handler
    desc: Register vectored exception handler
    crit: notable
    conf: 0.9
    mbc: "B0001"
    if:
      type: symbol
      exact: "AddVectoredExceptionHandler"
    unless:
      - type: basename
        regex: '\.pyd$'
  - id: add-vectored-exception-handler-source
    desc: Register vectored exception handler in source
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: string_value
      substr: "AddVectoredExceptionHandler"
  - id: remove-vectored-exception-handler-source
    desc: Remove vectored exception handler in source
    crit: notable
    conf: 0.88
    for: [c]
    if:
      type: string_value
      substr: "RemoveVectoredExceptionHandler"
  - id: seh-common-exit-comment
    desc: SEH used for common exit
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: string_value
      substr: "uses SEH for common code exit"
  - id: rtl-unwind
    desc: Runtime library unwind operation
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "RtlUnwind"
composite_rules:
  - id: vectored-exception-handler-source
    desc: Vectored exception handler lifecycle in source
    crit: suspicious
    conf: 0.94
    for: [c]
    all:
      - id: add-vectored-exception-handler-source
      - id: remove-vectored-exception-handler-source
