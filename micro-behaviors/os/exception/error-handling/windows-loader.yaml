defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: unhandled-exception-filter-import
    desc: Invoke unhandled exception filter
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: "UnhandledExceptionFilter"
    unless:
      - id: metadata/binary/metrics::many-imports
      - type: metrics
        field: pe.has_signature
        min: 1
      - type: basename
        exact: UAC.exe
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: elevate.exe
  - id: set-unhandled-exception-filter-import
    desc: Register unhandled exception filter
    crit: baseline
    conf: 0.86
    if:
      type: symbol
      exact: "SetUnhandledExceptionFilter"
    unless:
      - id: metadata/binary/metrics::many-imports
      - type: metrics
        field: pe.has_signature
        min: 1
      - type: basename
        exact: UAC.exe
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
      - type: basename
        exact: elevate.exe
composite_rules:
  - id: exception-filter-pair-imports
    desc: Register and invoke exception filters
    crit: notable
    conf: 0.9
    all:
      - id: unhandled-exception-filter-import
      - id: set-unhandled-exception-filter-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: metadata/package/versioning::pe-version-resource
    downgrade:
      any:
        - id: metadata/binary/metrics::many-exports
