defaults:
  platforms: [windows]
  for: [c]

traits:
  - id: seh-fs-chain-push-source
    desc: Pushes x86 SEH chain in source
    crit: notable
    conf: 0.95
    size_min: 1000
    if:
      type: raw
      regex: push\s+dword ptr\s+FS:\[
      case_insensitive: true
  - id: seh-fs-chain-store-source
    desc: Stores ESP into x86 SEH chain
    crit: notable
    conf: 0.95
    size_min: 1000
    if:
      type: raw
      regex: mov\s+dword ptr\s*FS:\[.{1,32}\],\s*esp
      case_insensitive: true
  - id: context-dr-clear-source
    desc: Clears CONTEXT debug registers in source
    crit: suspicious
    conf: 0.98
    size_min: 1000
    if:
      type: raw
      substr: CONTEXT_Dr0/Dr3
  - id: exception-eip-skip-source
    desc: Advances exception EIP in source
    crit: suspicious
    conf: 0.93
    size_min: 1000
    if:
      type: raw
      regex: add\s+\[junk3\+0?B8h\],\s+5
      case_insensitive: true
composite_rules:
  - id: seh-frame-source
    desc: x86 SEH frame setup in source
    crit: notable
    conf: 0.96
    all:
      - id: seh-fs-chain-push-source
      - id: seh-fs-chain-store-source
  - id: debug-register-seh-handler-source
    desc: SEH handler clears debug registers
    crit: suspicious
    conf: 0.99
    all:
      - id: seh-frame-source
      - id: context-dr-clear-source
      - id: exception-eip-skip-source
