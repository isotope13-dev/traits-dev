# Exception Handling and Stack Unwinding
# Low-level exception and stack manipulation
defaults:
  for: [pe]
  platforms: ["windows"]
traits:
  # === Context Capture ===
  - id: capture-context
    desc: Capture CPU context/registers
    crit: baseline
    conf: 0.90
    attack: "T1005"
    if:
      type: symbol
      exact: "RtlCaptureContext"
  # === Function Entry Lookup ===
  - id: lookup-function-entry
    desc: Lookup function entry point
    crit: baseline
    conf: 0.85
    attack: "T1006"
    if:
      type: symbol
      exact: "RtlLookupFunctionEntry"
  # === Stack Unwinding ===
  - id: virtual-unwind
    desc: Virtual unwind stack frame
    crit: baseline
    conf: 0.90
    attack: "T1006"
    if:
      type: symbol
      exact: "RtlVirtualUnwind"
  - id: unwind-ex
    desc: Extended stack unwinding
    crit: baseline
    conf: 0.90
    attack: "T1006"
    if:
      type: symbol
      exact: "RtlUnwindEx"
  # === File Header Lookup ===
  - id: pc-to-file-header
    desc: Get module from code address
    crit: baseline
    conf: 0.85
    attack: "T1005"
    if:
      type: symbol
      exact: "RtlPcToFileHeader"
  # === System Information Query ===
  - id: query-system-information
    desc: Query system information
    crit: baseline
    conf: 0.85
    attack: "T1082"
    mbc: "C0046"
    if:
      type: symbol
      exact: "NtQuerySystemInformation"
  - id: seh-chain-head-read
    desc: Read x86 SEH chain
    crit: baseline
    conf: 0.9
    attack: "T1497.001"
    mbc: "B0001"
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: 64 A1 00 00 00 00
  - id: seh-chain-ecx-read
    desc: Read x86 SEH into ecx
    crit: baseline
    conf: 0.92
    attack: "T1497.001"
    mbc: "B0001"
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: 64 8B 0D 00 00 00 00
composite_rules:
  - id: seh-chain-access
    desc: Access x86 SEH chain
    crit: baseline
    conf: 0.9
    any:
      - id: seh-chain-head-read
      - id: seh-chain-ecx-read
