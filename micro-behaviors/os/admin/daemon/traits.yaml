# System Daemon Patterns
# Detects references to common system service daemons
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.7
traits:
  - id: telnetd
    desc: telnetd daemon reference
    if:
      type: string
      word: "telnetd"
  - id: httpd
    desc: httpd daemon reference
    if:
      type: string
      word: "httpd"
  - id: apache2
    desc: apache2 daemon reference
    if:
      type: string
      word: "apache2"
  - id: ftpd
    desc: ftpd daemon reference
    if:
      type: string
      word: "ftpd"
  - id: inetd
    desc: inetd daemon reference
    for: [c, html]
    platforms: [linux, unix]
    if:
      type: string
      substr: "/usr/sbin/inetd"
composite_rules:
  - id: remote-access-daemons
    desc: Remote access daemon references
    any:
      - id: telnetd
      - id: micro-behaviors/os/service/remote::sshd-ref
      - id: ftpd
      - id: httpd
      - id: inetd
