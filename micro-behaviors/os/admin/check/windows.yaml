# Windows Admin Privilege Check
# Detects Windows APIs checking for admin/elevated privileges
# ATT&CK: T1033 (System Owner/User Discovery)
defaults:
  for: [pe, dll]
  attack: "T1033"
  platforms: [windows]
traits:
  - id: is-user-an-admin
    desc: IsUserAnAdmin API call
    crit: notable
    conf: 0.75
    if:
      type: string_value
      exact: "IsUserAnAdmin"
  - id: shell32-ordinal-680
    desc: Shell32 ordinal 680 (IsUserAnAdmin)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "shell32.dll:680"
