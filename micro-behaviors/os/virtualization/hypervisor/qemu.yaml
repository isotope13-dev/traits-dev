defaults:
  platforms: [windows, linux]
  for: [shell, batch, powershell, pe]
  crit: notable
  conf: 0.9
traits:
  # Neutral, observable network capability: QEMU forwards a host TCP port to a
  # guest service (SSH/RDP). This is the canonical Packer/Vagrant/QEMU image-build
  # provisioning pattern (`hostfwd=tcp::2222-:22`) and benign on its own; objective
  # composites (e.g. command-and-control/backdoor/control/vm) reference it and add
  # the intent-specific context (headless flags + misleading-extension sidecar disk).
  - id: hostfwd-guest-forward
    desc: QEMU host-to-guest SSH/RDP port forward
    if:
      type: text
      regex: (?i)hostfwd=tcp::\d+-:(22|3389)\b
