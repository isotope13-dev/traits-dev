defaults:
  platforms: [windows, linux]
  for: [shell, batch, powershell, pe]
  crit: notable
  conf: 0.9
traits:
  # Neutral, actionable network capability: QEMU forwards a host TCP port to a
  # guest service (SSH/RDP). This is the canonical Packer/Vagrant/QEMU image-build
  # and CI VM-provisioning pattern (`hostfwd=tcp::2222-:22`) and benign on its own;
  # objective composites (e.g. command-and-control/backdoor/control/vm) reference it
  # and add intent-specific context (misleading-extension disks, portable paths).
  - id: hostfwd-guest-forward
    desc: QEMU host-to-guest SSH/RDP port forward
    if:
      type: text
      regex: (?i)hostfwd=tcp::\d+-:(22|3389)\b

  - id: qemu-system-binary
    desc: QEMU system emulator binary reference
    if:
      type: text
      regex: (?i)\bqemu-system-(x86_64|i386|arm|aarch64)(\.exe)?\b
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: qemu-user-netdev
    desc: QEMU user-mode netdev binding
    if:
      type: text
      regex: (?i)-netdev\s+user,id=[A-Za-z0-9_.-]{1,32}\b
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: qemu-e1000-device
    desc: QEMU e1000 network device
    if:
      type: text
      regex: (?i)-device\s+e1000,netdev=[A-Za-z0-9_.-]{1,32}\b

  - id: qemu-cpu-max-flag
    desc: QEMU cpu max flag
    if:
      type: text
      regex: (?i)-cpu\s+max\b

  - id: qemu-display-none-flag
    desc: QEMU display none flag
    if:
      type: text
      regex: (?i)-display\s+none\b
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: qemu-hda-image
    desc: QEMU hda disk image argument
    if:
      type: text
      regex: (?i)-hda\s+\S+

  - id: qemu-drive-image-file
    desc: QEMU drive image file argument
    if:
      type: text
      regex: (?i)-drive\s+file=[^\s&]{1,120}\.(img|qcow2|vhd|vmdk)\b

  - id: qemu-nographic-flag
    desc: QEMU nographic flag
    if:
      type: text
      regex: (?i)-nographic\b
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: qemu-monitor-none-flag
    desc: QEMU monitor none flag
    if:
      type: text
      regex: (?i)-monitor\s+none\b
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: qemu-headless-console
    desc: QEMU headless console flags
    all:
      - id: qemu-system-binary
      - id: qemu-nographic-flag
      - id: qemu-monitor-none-flag

  - id: qemu-headless-args
    desc: QEMU headless execution arguments
    all:
      - id: qemu-system-binary
    any:
      - id: qemu-nographic-flag
      - id: qemu-display-none-flag
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: qemu-guest-disk
    desc: QEMU guest disk image attachment
    all:
      - id: qemu-system-binary
    any:
      - id: qemu-hda-image
      - id: qemu-drive-image-file
