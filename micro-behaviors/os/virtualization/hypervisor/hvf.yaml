defaults:
  platforms: [macos]
  for: [rust, c, cpp]
  crit: notable
  conf: 0.9
traits:
  - id: apple-hvf-vm-create
    desc: Apple HVF VM creation API
    if:
      type: text
      substr: hv_vm_create
  - id: apple-hvf-vcpu-create
    desc: Apple HVF vCPU creation API
    if:
      type: text
      substr: hv_vcpu_create
  - id: apple-hvf-vcpu-run
    desc: Apple HVF vCPU run loop API
    if:
      type: text
      substr: hv_vcpu_run
  - id: apple-hvf-memory-map
    desc: Apple HVF guest memory mapping API
    if:
      type: text
      substr: hv_vm_map
  - id: apple-hvf-gic-config
    desc: Apple HVF interrupt controller configuration
    if:
      type: text
      substr: hv_gic_config
composite_rules:
  - id: apple-hvf-vmm
    desc: Apple HVF virtual machine monitor implementation
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: micro-behaviors/os/virtualization/hypervisor
