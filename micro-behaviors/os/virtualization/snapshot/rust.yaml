defaults:
  platforms: [unix]
  for: [rust]
  crit: notable
  conf: 0.9
traits:
  - id: restore-snapshot-timed
    desc: Timed VM snapshot restore
    if:
      type: text
      substr: restore_snapshot_timed
  - id: snapshot-restore-options
    desc: VM snapshot restore options
    if:
      type: text
      substr: SnapshotRestoreOptions
  - id: snapshot-ram-copy-timing
    desc: VM snapshot RAM copy timing
    if:
      type: text
      substr: ram_copy_us
  - id: snapshot-vcpu-restore-timing
    desc: VM snapshot vCPU restore timing
    if:
      type: text
      substr: vcpu_restore_us
  - id: snapshot-warmup
    desc: VM snapshot warmup flow
    if:
      type: text
      substr: with_warmup
composite_rules:
  - id: vm-snapshot-restore
    desc: VM snapshot restore workflow
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/os/virtualization/snapshot
