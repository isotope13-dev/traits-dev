defaults:
  platforms: [unix]
  for: [rust]
  crit: notable
  conf: 0.9
traits:
  - id: virtio-mmio-model
    desc: VirtIO MMIO device model
    if:
      type: text
      substr: VirtioMmio
  - id: virtio-vsock-device
    desc: VirtIO vsock device model
    if:
      type: text
      substr: VirtioVsock
  - id: virtio-block-device
    desc: VirtIO block device model
    if:
      type: text
      substr: VirtioBlk
  - id: virtio-rng-device
    desc: VirtIO RNG device model
    if:
      type: text
      substr: VirtioRng
  - id: virtio-balloon-device
    desc: VirtIO balloon device model
    if:
      type: text
      substr: VirtioBalloon
  - id: fdt-guest-device-tree
    desc: Guest FDT device tree generation
    if:
      type: text
      substr: generate_fdt
composite_rules:
  - id: virtio-mmio-device-set
    desc: VirtIO MMIO guest device set
    crit: notable
    conf: 0.94
    needs: 2
    any:
      - id: micro-behaviors/os/virtualization/virtio::fdt-guest-device-tree
      - id: micro-behaviors/os/virtualization/virtio::virtio-balloon-device
      - id: micro-behaviors/os/virtualization/virtio::virtio-block-device
      - id: micro-behaviors/os/virtualization/virtio::virtio-mmio-model
      - id: micro-behaviors/os/virtualization/virtio::virtio-rng-device
      - id: micro-behaviors/os/virtualization/virtio::virtio-vsock-device
