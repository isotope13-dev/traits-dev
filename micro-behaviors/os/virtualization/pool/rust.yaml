defaults:
  platforms: [unix]
  for: [rust]
  crit: notable
  conf: 0.9
traits:
  - id: pool-builder
    desc: Worker pool builder
    if:
      type: text
      substr: PoolBuilder
  - id: pool-restore-on-release
    desc: Pool restore-on-release control
    if:
      type: text
      substr: restore_on_release
  - id: pool-idle-timeout
    desc: Worker pool idle timeout
    if:
      type: text
      substr: idle_timeout
  - id: pool-acquire-timeout
    desc: Worker pool acquire timeout
    if:
      type: text
      substr: acquire_timeout
  - id: supermachine-worker
    desc: Supermachine worker process
    if:
      type: text
      substr: supermachine-worker
composite_rules:
  - id: microvm-worker-pool
    desc: MicroVM worker pool controls
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/os/virtualization/pool
