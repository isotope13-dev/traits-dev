# Group ID Resolution (Windows)
# Resolves SIDs and group identifiers to group names
defaults:
  platforms: [unix, windows]
  for: [pe, c, csharp]
  crit: notable
  conf: 0.8
traits:
  - id: lookup-account-sid
    desc: Resolve SID to account/group name
    if:
      type: symbol
      regex: "^LookupAccountSid[AW]?$"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: net-local-group-get-info
    desc: Get local group information
    if:
      type: symbol
      exact: "NetLocalGroupGetInfo"
  - id: net-group-get-info
    desc: Get domain group information
    if:
      type: symbol
      exact: "NetGroupGetInfo"
  - id: convert-sid-to-string
    desc: Convert SID to string representation
    crit: baseline
    if:
      type: symbol
      regex: "^ConvertSidToStringSid[AW]?$"
  - id: convert-string-to-sid
    desc: Convert string to SID
    if:
      type: symbol
      regex: "^ConvertStringSidToSid[AW]?$"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
composite_rules:
  - id: sid-resolution
    desc: Resolve Windows SID to group name
    any:
      - id: lookup-account-sid
      - id: net-local-group-get-info
      - id: net-group-get-info
      - id: convert-sid-to-string
      - id: convert-string-to-sid
