# Group ID Resolution (Perl)
# Resolves GIDs to group names via built-in functions
defaults:
  platforms: [unix]
  for: [perl]
  crit: notable
  conf: 0.8
traits:
  - id: perl-getgrgid
    desc: Resolve GID to group (Perl getgrgid)
    if:
      type: symbol
      exact: getgrgid
  - id: perl-getgrnam
    desc: Resolve group name to GID (Perl getgrnam)
    if:
      type: symbol
      exact: getgrnam
  - id: perl-getgrent
    desc: Iterate group entries (Perl getgrent)
    if:
      type: symbol
      exact: getgrent
