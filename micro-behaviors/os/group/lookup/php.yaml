# Group ID Resolution (PHP)
# Resolves GIDs to group names via POSIX functions
defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  conf: 0.8
traits:
  - id: posix-getgrgid
    desc: Resolve GID to group (posix_getgrgid)
    if:
      type: text
      regex: "\\bposix_getgrgid\\s*\\("
  - id: posix-getgrnam
    desc: Resolve group name to GID (posix_getgrnam)
    if:
      type: text
      regex: "\\bposix_getgrnam\\s*\\("
