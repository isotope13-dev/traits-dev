defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
  crit: notable
  conf: 0.8
traits:
  - id: getgrgid
    desc: Resolve GID to group name (getgrgid)
    if:
      type: symbol
      exact: getgrgid
    unless:
      - type: basename
        exact: python3
  - id: getgrnam
    desc: Resolve group name to GID (getgrnam)
    if:
      type: symbol
      exact: getgrnam
  - id: group-from-gid
    desc: Resolve GID to group name (group_from_gid)
    if:
      type: symbol
      exact: group_from_gid
  - id: getgroups
    desc: Read supplementary group list
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: getgroups
composite_rules:
  - id: gid-resolution
    desc: Resolve group ID to group name
    any:
      - id: getgrgid
      - id: getgrnam
      - id: group-from-gid
