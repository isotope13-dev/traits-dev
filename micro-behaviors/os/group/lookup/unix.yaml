defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
  crit: notable
  conf: 0.8
traits:
  # No "GNU coreutils"-string carve-out here: a self-declared identity string
  # must not hide a real capability (ls genuinely reads xattrs / resolves
  # groups for -l), and the string is trivially plantable by a masquerader.
  - id: getgrgid
    desc: Resolve GID to group name (getgrgid)
    if:
      type: symbol
      exact: getgrgid
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/file/string/identity::python3-interpreter-basename
  - id: getgrnam
    desc: Resolve group name to GID (getgrnam)
    if:
      type: symbol
      exact: getgrnam
  - id: group-from-gid
    desc: Resolve GID to group name (group_from_gid)
    if:
      type: symbol
      exact: group_from_gid
  - id: getgroups
    desc: Read supplementary group list
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: getgroups
composite_rules:
  - id: gid-resolution
    desc: Resolve group ID to group name
    any:
      - id: getgrgid
      - id: getgrnam
      - id: group-from-gid
