defaults:
  platforms: [windows, unix]
  for: [go]
  crit: notable
  conf: 0.9
traits:
  - id: lookup-group-id
    desc: Resolve GID to group (os/user.LookupGroupId)
    if:
      type: symbol
      exact: os/user.LookupGroupId
  - id: lookup-group
    desc: "Resolve group name to group"
    if:
      type: symbol
      exact: os/user.LookupGroup
