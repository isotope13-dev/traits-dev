defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [go, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: lookup-group-id
    desc: Resolve GID to group (os/user.LookupGroupId)
    if:
      type: symbol
      exact: os/user.LookupGroupId
  - id: lookup-group
    desc: Resolve group name to group (os/user.LookupGroup)
    if:
      type: symbol
      exact: os/user.LookupGroup
