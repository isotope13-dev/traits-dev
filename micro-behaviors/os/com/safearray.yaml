defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: safearray-access-data
    desc: Access raw SafeArray data pointer
    if:
      type: symbol
      exact: SafeArrayAccessData

  - id: safearray-unaccess-data
    desc: Release raw SafeArray data pointer
    if:
      type: symbol
      exact: SafeArrayUnaccessData

  - id: safearray-get-element
    desc: Retrieve single element from SafeArray
    if:
      type: symbol
      exact: SafeArrayGetElement

  - id: safearray-put-element
    desc: Place single element into SafeArray
    if:
      type: symbol
      exact: SafeArrayPutElement

composite_rules:
  - id: safearray-data-manipulation-cluster
    desc: SafeArray data manipulation cluster (COM automation)
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: safearray-access-data
      - id: safearray-unaccess-data
      - id: safearray-get-element
      - id: safearray-put-element

  - id: com-safearray-automation-triad
    desc: COM SafeArray data-injection cluster
    crit: suspicious
    conf: 0.98
    all:
      - id: safearray-access-data
      - id: safearray-put-element
      - id: safearray-unaccess-data
    # Specific triad used for direct memory manipulation in COM variants.
