defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [powershell]
traits:
  - id: create-instance
    desc: .NET [activator]::CreateInstance call (COM instantiation)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\[activator\]::CreateInstance'
  - id: get-type-from-clsid
    desc: .NET [type]::GetTypeFromCLSID call (COM lookup)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\[type\]::GetTypeFromCLSID'
