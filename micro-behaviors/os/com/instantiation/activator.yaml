defaults:
  platforms: [windows]
  for: [powershell]
traits:
  - id: create-instance
    desc: '.NET [activator]::CreateInstance call'
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\[activator\]::CreateInstance'
  - id: get-type-from-clsid
    desc: ".NET [type]::GetTypeFromCLSID call"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\[type\]::GetTypeFromCLSID'
  - id: new-object-comobject
    desc: PowerShell COM object creation
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bNew-Object\s+-ComObject\b'
