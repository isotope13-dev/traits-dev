# COM/OLE Operations
# Component Object Model and Object Linking and Embedding
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === COM Initialization ===
  - id: ole-initialize
    desc: Initialize OLE/COM subsystem
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "OleInitialize"
  - id: ole-uninitialize
    desc: Uninitialize OLE/COM subsystem
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "OleUninitialize"
  # === COM Object Creation ===
  - id: co-create-instance
    desc: Create COM object instance
    crit: baseline
    conf: 0.80
    if:
      type: symbol
      exact: "CoCreateInstance"
  - id: co-get-object
    desc: Bind moniker to COM object
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CoGetObject"
  - id: co-initialize-security
    desc: Initialize COM security context
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: "CoInitializeSecurity"
  - id: co-set-proxy-blanket
    desc: Set COM proxy security
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: "CoSetProxyBlanket"
  # === IID Resolution ===
  - id: iid-from-string
    desc: Convert GUID string to IID
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "IIDFromString"
  # === Memory Management ===
  - id: co-task-mem-free
    desc: Free COM memory allocation
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "CoTaskMemFree"
composite_rules:
  - id: privileged-com-activation
    desc: Privileged COM activation chain
    crit: notable
    conf: 0.9
    all:
      - id: co-get-object
    any:
      - id: co-initialize-security
      - id: co-set-proxy-blanket
