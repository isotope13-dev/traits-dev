# COM/OLE Operations
# Component Object Model and Object Linking and Embedding
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === COM Initialization ===
  - id: ole-initialize
    desc: Initialize OLE/COM subsystem
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "OleInitialize"
  - id: ole-uninitialize
    desc: Uninitialize OLE/COM subsystem
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "OleUninitialize"
  # === COM Object Creation ===
  - id: co-create-instance
    desc: Create COM object instance
    crit: baseline
    conf: 0.80
    if:
      type: symbol
      exact: "CoCreateInstance"
  - id: co-get-object
    desc: Bind moniker to COM object
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CoGetObject"
  - id: co-initialize-ex
    desc: Initialize COM apartment model
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "CoInitializeEx"
  - id: co-initialize-security
    desc: Initialize COM security context
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: "CoInitializeSecurity"
  - id: co-set-proxy-blanket
    desc: Set COM proxy security
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: "CoSetProxyBlanket"
  # === OLE Object Creation ===
  - id: ole-create-from-file
    desc: Create OLE object from file on disk
    crit: notable
    conf: 0.88
    attack: T1559.001
    if:
      type: symbol
      exact: "OleCreateFromFile"
  - id: ole-create-ex
    desc: Create extended OLE embedded object
    crit: notable
    conf: 0.85
    attack: T1559.001
    if:
      type: symbol
      exact: "OleCreateEx"
  - id: hicon-user-marshal
    desc: COM cross-process HICON marshaling
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: "HICON_UserMarshal"
  # === IID Resolution ===
  - id: iid-from-string
    desc: Convert GUID string to IID
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "IIDFromString"
  # === Memory Management ===
  - id: co-task-mem-free
    desc: Free COM memory allocation
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "CoTaskMemFree"
  - id: safe-array-lock
    desc: Lock SAFEARRAY for COM data
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: "SafeArrayLock"
  - id: safe-array-put-element
    desc: Write SAFEARRAY automation element
    crit: notable
    conf: 0.84
    if:
      type: string_value
      exact: "SafeArrayPutElement"
  - id: variant-copy
    desc: Copy COM automation variant
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: "VariantCopy"
composite_rules:
  - id: privileged-com-activation
    desc: Privileged COM activation chain
    crit: notable
    conf: 0.9
    all:
      - id: co-get-object
    any:
      - id: co-initialize-security
      - id: co-set-proxy-blanket
  - id: wmi-com-proxy-setup
    desc: COM proxy setup for WMI automation
    crit: notable
    conf: 0.9
    all:
      - id: co-create-instance
      - id: co-initialize-ex
      - id: co-set-proxy-blanket
    any:
      - id: co-initialize-security
      - id: safe-array-lock
      - id: safe-array-put-element
      - id: variant-copy
