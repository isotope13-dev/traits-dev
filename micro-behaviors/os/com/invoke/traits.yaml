# COM/OLE Operations
# Component Object Model and Object Linking and Embedding
defaults:
  for: ["pe", "c", "cpp"]
  platforms: ["windows"]
traits:
  # === COM Initialization ===
  - id: ole-initialize
    desc: Initialize OLE/COM subsystem
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "OleInitialize"
  - id: co-initialize
    desc: Initialize COM subsystem
    crit: baseline
    conf: 0.78
    if:
      type: symbol
      exact: "CoInitialize"
  - id: ole-uninitialize
    desc: Uninitialize OLE/COM subsystem
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "OleUninitialize"
  - id: co-uninitialize
    desc: Uninitialize COM subsystem
    crit: baseline
    conf: 0.78
    if:
      type: symbol
      exact: "CoUninitialize"
  # === COM Object Creation ===
  - id: co-create-instance
    desc: Create COM object instance
    crit: baseline
    conf: 0.80
    if:
      type: symbol
      exact: "CoCreateInstance"
  - id: co-get-object
    desc: Bind moniker to COM object
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CoGetObject"
  - id: co-initialize-ex
    desc: Initialize COM apartment model
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "CoInitializeEx"
  - id: co-initialize-security
    desc: Initialize COM security context
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: "CoInitializeSecurity"
  - id: co-set-proxy-blanket
    desc: Set COM proxy security
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: "CoSetProxyBlanket"
  - id: clsid-from-string
    desc: Resolve CLSID from string
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: "CLSIDFromString"
  - id: string-from-guid2
    desc: Convert GUID to string
    crit: baseline
    conf: 0.76
    if:
      type: symbol
      exact: "StringFromGUID2"
  # === OLE Object Creation ===
  - id: ole-create-from-file
    desc: Create OLE object from file on disk
    crit: notable
    conf: 0.88
    attack: T1559.001
    if:
      type: symbol
      exact: "OleCreateFromFile"
  - id: ole-create-ex
    desc: Create extended OLE embedded object
    crit: notable
    conf: 0.85
    attack: T1559.001
    if:
      type: symbol
      exact: "OleCreateEx"
  - id: ole-set-contained-object
    desc: Mark object as OLE-contained
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "OleSetContainedObject"
  - id: hicon-user-marshal
    desc: COM cross-process HICON marshaling
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: "HICON_UserMarshal"
  # === IID Resolution ===
  - id: iid-from-string
    desc: Convert GUID string to IID
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "IIDFromString"
  # === Memory Management ===
  - id: co-task-mem-free
    desc: Free COM memory allocation
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "CoTaskMemFree"
  - id: safe-array-lock
    desc: Lock SAFEARRAY for COM data
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: "SafeArrayLock"
  - id: variant-copy
    desc: Copy COM automation variant
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: "VariantCopy"
  - id: getobject-call-text
    desc: GetObject COM retrieval call in JavaScript
    crit: notable
    conf: 0.88
    for: [javascript]
    if:
      type: text
      regex: '(?i)\bGetObject\s*\('
composite_rules:
  - id: privileged-com-activation
    desc: Privileged COM activation chain
    crit: suspicious
    conf: 0.9
    all:
      - id: co-get-object
    any:
      - id: co-initialize-security
      - id: co-set-proxy-blanket
    downgrade:
      any:
        - id: metadata/signed/platform/
    unless:
      - id: well-known/app/installer::uniextract-installer
      - id: well-known/tool/sysadmin/universal-extractor/
  - id: wmi-com-proxy-setup
    desc: COM proxy setup for WMI automation
    crit: notable
    conf: 0.9
    all:
      - id: co-create-instance
      - id: co-initialize-ex
      - id: co-set-proxy-blanket
    any:
      - id: co-initialize-security
      - id: safe-array-lock
      - id: micro-behaviors/os/com/array::safearray-put-element
      - id: variant-copy
