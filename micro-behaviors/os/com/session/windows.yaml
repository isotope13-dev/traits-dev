defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp, csharp]
  attack: T1559.001
traits:
  - id: special-system-properties-interface
    desc: COM special session interface
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ISpecialSystemProperties
  - id: set-session-id-call
    desc: COM activation session selector
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: SetSessionId
  - id: storage-backed-com-activation
    desc: Storage-backed COM activation
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: StandardGetInstanceFromIStorage
  - id: interactive-user-runas-value
    desc: Interactive User COM registration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)RunAs\s*=?\s*["'']?Interactive User'
  - id: wts-enumerate-sessions-api
    desc: Enumerate terminal sessions
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\b(WTSEnumerateSessionsA?|WTSEnumerateSessionsW)\b'
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
  - id: wts-open-server-api
    desc: Open remote session server
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\b(WTSOpenServerA?|WTSOpenServerW)\b'
  - id: quser-remote-server
    desc: quser remote session enumeration
    crit: notable
    conf: 0.9
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)\bquser\s+/server:\S{1,120}'

  - id: quser-command-reference
    desc: PowerShell references the quser session command
    crit: notable
    conf: 0.88
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)\bquser\.exe\b'
