defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1547.009

traits:
  - id: swift-shelllink-clsid
    desc: Swift CLSID ShellLink reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CLSID_ShellLink

  - id: swift-ishelllink-slot-table
    desc: Swift IShellLink slot table
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: enum IShellLinkSlot

  - id: swift-shelllink-setpath-slot
    desc: Swift ShellLink SetPath slot
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: IShellLinkSlot.SetPath

  - id: swift-shelllink-setargs-slot
    desc: Swift ShellLink SetArguments slot
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: IShellLinkSlot.SetArguments

  - id: swift-ipersistfile-save-slot
    desc: Swift IPersistFile Save slot
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: IPersistFileSlot.Save

composite_rules:
  - id: swift-shelllink-shortcut-builder
    desc: Swift ShellLink shortcut builder
    crit: notable
    conf: 0.94
    all:
      - id: swift-shelllink-clsid
      - id: swift-ishelllink-slot-table
      - id: swift-shelllink-setpath-slot
      - id: swift-ipersistfile-save-slot
    any:
      - id: swift-shelllink-setargs-slot
      - id: ipersistfile-interface
