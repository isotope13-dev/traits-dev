defaults:
  for:
    - python
    - javascript
    - vbs
    - powershell
    - pe
  platforms:
    - windows
traits:
  - id: wscript-shell-literal
    desc: WScript.Shell object string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: WScript\.Shell(\.1)?
  - id: wscript-com-progid
    desc: WScript COM ProgID reference
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: text
      regex: WScript\.(Shell(\.1)?|Network)\b
