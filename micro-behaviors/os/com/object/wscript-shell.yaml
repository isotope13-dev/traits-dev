# WScript.Shell COM Object
# Detects instantiation of the WScript.Shell object
defaults:
  for: [python, javascript, vbs, powershell, pe]
  platforms: [windows]
traits:
  - id: wscript-shell-literal
    desc: WScript.Shell object string
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'WScript\.Shell(\.1)?'
