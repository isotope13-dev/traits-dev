defaults:
  for:
    - python
    - javascript
    - vbs
    - powershell
    - batch
    - xml
    - pe
    - html
  platforms:
    - windows
traits:
  - id: wscript-shell-literal
    desc: References the WScript.Shell COM object
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: WScript\.Shell(\.1)?
  - id: wscript-com-progid
    desc: WScript COM ProgID reference
    crit: notable
    conf: 0.8
    for: [pe, dll]
    if:
      type: text
      substr: WScript.
