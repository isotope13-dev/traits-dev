defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: clsid-xmlhttp-b64-unicode
    desc: "Msxml2.XMLHTTP CLSID (b64 + Unicode encoded)"
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: RgA1ADAANwA4AEYAMwA1AC0AQwA1ADUAMQAtADEAMQBEADMALQA4ADkAQgA5AC0AMAAwADAAMABGADgAMQBGAEUAMgAyADEA
  - id: clsid-xmlhttp-generic
    desc: Generic XMLHTTP CLSID reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)Msxml2\.XMLHTTP
  - id: activex-http-progid
    desc: Creates legacy ActiveX HTTP object
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(ActiveX|Create)Object\s*\(\s*["''](MSXML2?\.XMLHTTP|Microsoft\.XMLHTTP)'
  - id: xmlhttp-join-fragments
    desc: Fragmented MSXML2 XMLHTTP ProgID
    crit: suspicious
    conf: 0.94
    for: [powershell]
    if:
      type: text
      substr: 'MSX", "ML2.", "XMLHTTP'
  - id: clsid-xmlhttp-raw
    desc: Msxml2.XMLHTTP CLSID (Raw string)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: F5078F35-C551-11D3-89B9-0000F81FE221
    unless:
      - id: well-known/lib/wine/

composite_rules:
  - id: msxml-http-variants
    desc: MSXML HTTP request object variants
    crit: notable
    conf: 0.7
    any:
      - id: clsid-xmlhttp-generic
      - id: activex-http-progid
      - id: micro-behaviors/communications/http/client/xmlhttp::http-client-any
