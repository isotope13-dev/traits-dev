defaults:
  for:
    - pe
    - dll
    - javascript
    - vbs
  platforms:
    - windows
traits:
  - id: clsid-from-progid
    desc: Resolve COM class from ProgID
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: CLSIDFromProgID
  - id: variant-change-type
    desc: Convert OLE automation variant
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: VariantChangeType
  - id: shell-application-progid
    desc: Shell.Application ProgID string
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: Shell.Application
      case_insensitive: true
  - id: filesystemobject-progid
    desc: FileSystemObject ProgID string
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: Scripting.FileSystemObject
  - id: shell-explorer-progid
    desc: Shell Explorer ActiveX ProgID
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: Shell.Explorer.1
  - id: mozilla-browser-progid
    desc: Mozilla browser ActiveX ProgID
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: Mozilla.Browser.1
  - id: atlax-win-init
    desc: ATL ActiveX host initialization
    crit: component
    conf: 0.88
    if:
      type: text
      exact: AtlAxWinInit
  - id: atlax-get-control
    desc: ATL ActiveX control access
    crit: component
    conf: 0.88
    if:
      type: text
      exact: AtlAxGetControl
  - id: namespace-method
    desc: Shell namespace method string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: Namespace
  - id: copyhere-method
    desc: Shell CopyHere method string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: CopyHere
composite_rules:
  - id: ole-automation-setup
    desc: Resolve COM object automation
    crit: notable
    conf: 0.85
    all:
      - id: clsid-from-progid
      - id: variant-change-type
  - id: shell-namespace-copyhere
    desc: Shell COM archive copy pattern
    crit: notable
    conf: 0.88
    all:
      - id: shell-application-progid
      - id: namespace-method
      - id: copyhere-method
  - id: activex-browser-host
    desc: ATL hosted browser control ProgID
    crit: notable
    conf: 0.93
    any:
      - id: shell-explorer-progid
      - id: mozilla-browser-progid
    all:
      - id: atlax-win-init
      - id: atlax-get-control
