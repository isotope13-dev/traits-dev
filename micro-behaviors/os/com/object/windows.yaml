defaults:
  for:
    - pe
    - dll
    - javascript
    - vbs
  platforms:
    - windows
traits:
  - id: clsid-from-progid
    desc: Resolve COM class from ProgID
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: CLSIDFromProgID
  - id: variant-change-type
    desc: Convert OLE automation variant
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: VariantChangeType
  - id: shell-application-progid
    desc: Shell.Application ProgID string
    crit: notable
    conf: 0.85
    if:
      type: text
      word: Shell.Application
      case_insensitive: true
  - id: filesystemobject-progid
    desc: FileSystemObject ProgID string
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bScripting\.FileSystemObject\b'
  - id: shell-explorer-progid
    desc: Shell Explorer ActiveX ProgID
    crit: notable
    conf: 0.92
    if:
      type: text
      word: Shell.Explorer.1
  - id: mozilla-browser-progid
    desc: Mozilla browser ActiveX ProgID
    crit: notable
    conf: 0.9
    if:
      type: text
      word: Mozilla.Browser.1
  - id: webbrowser-activex-clsid
    desc: WebBrowser ActiveX CLSID
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: '{8856F961-340A-11D0-A96B-00C04FD705A2}'
  - id: mfc-cwebbrowser2-class
    desc: MFC CWebBrowser2 class marker
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: CWebBrowser2
  - id: atlax-win-init
    desc: ATL ActiveX host initialization
    crit: component
    conf: 0.88
    if:
      type: text
      word: AtlAxWinInit
  - id: atlax-get-control
    desc: ATL ActiveX control access
    crit: component
    conf: 0.88
    if:
      type: text
      word: AtlAxGetControl
  - id: atlax-get-control-import
    desc: ATL ActiveX control import
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: AtlAxGetControl
  - id: atl-library-import
    desc: ATL library import
    crit: component
    conf: 0.86
    if:
      type: text
      word: ATL.DLL
  - id: atl-ordinal-47-import
    desc: ATL ordinal 47 import
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: "ORDINAL 47"
  - id: namespace-method
    desc: Shell namespace method string
    crit: component
    conf: 0.8
    if:
      type: text
      word: Namespace
  - id: shell-application-namespace
    desc: Shell.Application namespace access
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)Shell\.Application.{0,40}\.Namespace
  - id: copyhere-method
    desc: Shell CopyHere method string
    crit: component
    conf: 0.8
    if:
      type: text
      word: CopyHere
composite_rules:
  - id: ole-automation-setup
    desc: Resolve COM object automation
    crit: notable
    conf: 0.85
    all:
      - id: clsid-from-progid
      - id: variant-change-type
  - id: shell-namespace-copyhere
    desc: Shell COM archive copy pattern
    crit: notable
    conf: 0.88
    all:
      - id: shell-application-progid
      - id: namespace-method
      - id: copyhere-method
  - id: activex-browser-host
    desc: ATL hosted browser control ProgID
    crit: notable
    conf: 0.93
    any:
      - id: shell-explorer-progid
      - id: mozilla-browser-progid
    all:
      - id: atlax-win-init
      - id: atlax-get-control
  - id: atl-activex-com-access
    desc: ATL ActiveX COM access
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/com/invoke::co-initialize
      - id: atlax-get-control-import
  - id: atl-activex-ordinal-com-access
    desc: ATL ordinal ActiveX COM access
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/com/invoke::co-initialize
      - id: atl-library-import
      - id: atl-ordinal-47-import
