# HTML Help ActiveX control observations. These identify neutral COM object
# configuration; dropper intent is inferred by composites under objectives/.
defaults:
  platforms: [windows]
  for: [html]
  crit: notable
  conf: 0.95

traits:
  - id: htmlhelp-shortcut-clsid
    desc: HTML Help Shortcut ActiveX object
    conf: 0.97
    if:
      type: text
      regex: '(?i)classid\s*=\s*["'']clsid:\s*52a2aaae-085d-4187-97ea-8c30db990436'

  - id: htmlhelp-hhctrl-clsid
    desc: HTML Help HHCtrl ActiveX object
    conf: 0.97
    if:
      type: text
      regex: '(?i)classid\s*=\s*["'']clsid:\s*adb880a6-d8ff-11cf-9377-00aa003b7a11'

  - id: htmlhelp-shortcut-command-param
    desc: HTML Help Shortcut command parameter
    if:
      type: text
      regex: '(?i)<param[^>]{0,200}name\s*=\s*["'']Command["''][^>]{0,200}value\s*=\s*["'']ShortCut["'']'
