defaults:
  platforms: [windows]
  for: [scripts, binaries]

traits:
  - id: mapi-namespace-access
    for: [text]
    desc: Outlook MAPI namespace access
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bGetNameSpace\s*\(\s*["'']MAPI["'']\s*\)'
  - id: outlook-application-progid
    for: [text]
    desc: Outlook.Application COM ProgID string
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bOutlook\.Application(\.\d+)?\b'
