# IShellLink COM interface for Windows shortcut manipulation
defaults:
  for: [c, cpp]
  platforms: [windows]
  crit: notable
  conf: 0.88
  attack: T1547.009
traits:
  - id: ishelllink-interface
    desc: IShellLink COM interface in C source
    if:
      type: raw
      substr: IShellLink

  - id: ipersistfile-interface
    desc: IPersistFile COM interface in C source
    if:
      type: raw
      substr: IPersistFile

  - id: clsid-shelllink-constant
    desc: CLSID_ShellLink COM class identifier
    if:
      type: raw
      substr: CLSID_ShellLink

  - id: ishelllink-set-path
    desc: IShellLink SetPath target modification
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      substr: .SetPath

  - id: ishelllink-set-description
    desc: IShellLink SetDescription call
    if:
      type: symbol
      substr: .SetDescription

  - id: ishelllink-get-description
    desc: IShellLink GetDescription call
    if:
      type: symbol
      substr: .GetDescription

  - id: ishelllink-set-arguments
    desc: IShellLink SetArguments call
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      substr: .SetArguments

  - id: ishelllink-get-path
    desc: IShellLink GetPath call
    if:
      type: symbol
      substr: .GetPath

composite_rules:
  - id: ishelllink-shortcut-tamper
    desc: IShellLink COM shortcut target replacement
    crit: suspicious
    conf: 0.93
    all:
      - id: ishelllink-interface
      - id: clsid-shelllink-constant
      - id: ishelllink-set-path
    any:
      - id: ishelllink-set-arguments
      - id: ipersistfile-interface
    needs: 1

  - id: ishelllink-description-marker
    desc: IShellLink uses description as infection marker
    crit: suspicious
    conf: 0.92
    attack: T1027
    all:
      - id: ishelllink-set-description
      - id: ishelllink-get-description
      - id: ishelllink-set-path
