defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: safearray-access-data
    desc: Access raw SafeArray data pointer
    if:
      type: symbol
      exact: SafeArrayAccessData

  - id: safearray-unaccess-data
    desc: Release raw SafeArray data pointer
    if:
      type: symbol
      exact: SafeArrayUnaccessData

  - id: safearray-get-element
    desc: Retrieve single element from SafeArray
    if:
      type: symbol
      exact: SafeArrayGetElement

  - id: safearray-copy-data
    desc: Copy SAFEARRAY contents in bulk
    if:
      type: symbol
      exact: SafeArrayCopyData

  - id: safearray-put-element
    desc: Place single element into SafeArray
    if:
      type: symbol
      exact: SafeArrayPutElement

composite_rules:
  - id: safearray-data-manipulation-cluster
    desc: SafeArray data manipulation cluster (COM automation)
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: safearray-access-data
      - id: safearray-unaccess-data
      - id: safearray-get-element
      - id: safearray-put-element

  - id: com-safearray-automation-triad
    desc: COM SafeArray automation triad
    crit: notable
    conf: 0.98
    all:
      - id: safearray-access-data
      - id: safearray-put-element
      - id: safearray-unaccess-data
    # Common in benign COM automation too; keep this as a notable behavior.

  - id: com-safearray-copy-extract-cluster
    desc: COM SafeArray bulk copy and extraction
    crit: suspicious
    conf: 0.97
    all:
      - id: safearray-copy-data
      - id: safearray-get-element
      - id: safearray-unaccess-data
    downgrade:
      any:
        - id: well-known/lib/wine::wine-runtime-component
