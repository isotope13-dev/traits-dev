defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: noremove-directive
  desc: ATL NoRemove registry script directive
  crit: baseline
  conf: 0.84
  if:
    type: text
    exact: NoRemove
    section: rdata
- id: forceremove-directive
  desc: ATL ForceRemove registry script directive
  crit: baseline
  conf: 0.84
  if:
    type: text
    exact: ForceRemove
    section: rdata

composite_rules:
- id: atl-registration-directives
  desc: ATL COM registration directives
  crit: notable
  conf: 0.9
  all:
  - id: noremove-directive
  - id: forceremove-directive
