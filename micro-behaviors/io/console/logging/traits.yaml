# Console Logging Patterns
# Detects common logging patterns used in tools and exploits
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  - id: hacker-tool-log-marker
    desc: Hacker tool logging marker
    crit: notable
    conf: 0.8
    for: [scripts]
    if:
      type: string_value
      substr: "[*] "
  - id: shellcode-execution-status
    desc: Shellcode execution status logging
    crit: suspicious
    conf: 0.92
    if:
      type: string_value
      substr: "shellcode finished"
