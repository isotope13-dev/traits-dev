# libm (math library) symbols. Bare imported math functions emitted by any
# program linking the C math library. Component-only building blocks; composites
# reference this directory by notation and gate on several co-occurring.
defaults:
  platforms: [linux, macos]
  for: [elf, macho]
  crit: component
  conf: 0.4
traits:
  - id: libm-cos-symbol
    desc: libm cos import
    if:
      type: symbol
      exact: cos
  - id: libm-sin-symbol
    desc: libm sin import
    if:
      type: symbol
      exact: sin
  - id: libm-tan-symbol
    desc: libm tan import
    if:
      type: symbol
      exact: tan
  - id: libm-exp-symbol
    desc: libm exp import
    if:
      type: symbol
      exact: exp
  - id: libm-pow-symbol
    desc: libm pow import
    if:
      type: symbol
      exact: pow
  - id: libm-hypot-symbol
    desc: libm hypot import
    if:
      type: symbol
      exact: hypot
  - id: libm-log1p-symbol
    desc: libm log1p import
    if:
      type: symbol
      exact: log1p
  - id: libm-fmod-symbol
    desc: libm fmod import
    if:
      type: symbol
      exact: fmod
