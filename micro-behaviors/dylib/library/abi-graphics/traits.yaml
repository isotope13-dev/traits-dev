defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: cxx-abi-symbols-b
    desc: C++ ABI symbols cluster B
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: ^(_ZN[A-Z]|_ZSt|_ZNSt|_ZNK[A-Z])
  - id: gxx-symbols
    desc: __gxx_ symbols
    if:
      type: symbol
      regex: ^__gxx_
  - id: mesa-ref-a
    desc: Mesa 3D graphics reference cluster A
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)(\bmesa\b|gallium|\blibGL\b|\blibEGL\b)
  - id: mesa-ref-b
    desc: Mesa 3D graphics reference cluster B
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)(libGLX|dri_|swrast|pipe_loader)
  - id: mesa-ref-c
    desc: Mesa 3D graphics reference marker
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)_mesa_
  - id: opengl-ref-a
    desc: OpenGL graphics reference cluster A
    crit: baseline
    conf: 0.5
    count_min: 2
    if:
      type: text
      regex: (?i)(opengl|glx|\begl\b|vulkan)
  - id: opengl-ref-b
    desc: OpenGL graphics reference cluster B
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)(GL_VERSION|GL_RENDERER|glX[A-Z])
composite_rules:
  - id: cxx-abi-symbols-a
    desc: C++ ABI symbols cluster A
    crit: baseline
    conf: 0.8
    any:
      - id: micro-behaviors/dylib/library/libc::libc-internal-functions-b
      - id: gxx-symbols
