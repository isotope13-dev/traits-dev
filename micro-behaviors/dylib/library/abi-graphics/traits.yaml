defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: cxx-abi-symbols-b
    desc: C++ ABI symbols cluster B
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: ^(_ZN[A-Z]|_ZSt|_ZNSt|_ZNK[A-Z])
  - id: gxx-symbols
    desc: __gxx_ symbols
    if:
      type: symbol
      regex: ^__gxx_
  - id: mesa-ref-a
    desc: Mesa 3D graphics reference cluster A
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\blibGL\b
  - id: mesa-ref-b
    desc: Mesa 3D graphics reference cluster B
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)(libGLX|dri_|swrast|pipe_loader)
  - id: mesa-ref-c
    desc: Mesa 3D graphics reference marker
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)_mesa_
  - id: opengl-ref-a
    desc: OpenGL API import cluster
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: symbol
      kind: import
      regex: '^(gl[A-Z]|wgl[A-Z]|egl[A-Z]|vk[A-Z])'
  - id: opengl-ref-b
    desc: OpenGL runtime library reference
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(opengl32\.dll|vulkan-1\.dll|libGL(X)?\.so|libEGL\.so)\b'
composite_rules:
  - id: cxx-abi-symbols-a
    desc: C++ ABI symbols cluster A
    crit: baseline
    conf: 0.8
    any:
      - id: cxx-abi-symbols-b
      - id: gxx-symbols
