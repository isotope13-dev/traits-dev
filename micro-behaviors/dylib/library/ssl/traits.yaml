# SSL/TLS Library References
# Generic library string references (baseline markers)
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  - id: libssl-ref
    desc: libssl library reference
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      substr: "libssl"
  - id: libcrypto-ref
    desc: libcrypto library reference
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      substr: "libcrypto"
