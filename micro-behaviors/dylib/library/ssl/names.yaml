defaults:
  for:
    - c
    - elf
  crit: baseline
  mbc: E1083
  attack: T1083
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: libssl-so
    desc: libssl shared library reference
    conf: 0.7
    platforms:
      - linux
      - unix
    if:
      type: text
      regex: \\blibssl\\.so
  - id: libcrypto-so
    desc: libcrypto shared library reference
    conf: 0.7
    platforms:
      - linux
      - unix
    if:
      type: text
      regex: \\blibcrypto\\.so
  - id: libgnutls-so
    desc: libgnutls shared library reference
    conf: 0.7
    platforms:
      - linux
      - unix
    if:
      type: text
      regex: \\blibgnutls\\.so
  - id: libnss-so
    desc: libnss shared library reference
    conf: 0.7
    platforms:
      - linux
      - unix
    if:
      type: text
      regex: \\blibnss(3|ssl3)?\\.so
