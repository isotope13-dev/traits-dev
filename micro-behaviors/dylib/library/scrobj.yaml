defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: scrobj
    desc: Loads scrobj.dll (Scripting Object Runtime)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: scrobj\.dll
      case_insensitive: true
  - id: scrobj-encoded
    desc: Loads scrobj.dll (encoded)
    crit: notable
    conf: 0.8
    if:
      type: encoded
      encoding:
        - base64
        - hex
      regex: scrobj\.dll
      case_insensitive: true
  - id: scrobj-raw-hex
    desc: Loads scrobj.dll (hex encoded)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: 7363726f626a2e646c6c
