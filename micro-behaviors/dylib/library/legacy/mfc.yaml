defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: mfc42-ref
    desc: Links legacy MFC42 runtime
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: MFC42.DLL
  - id: afx-socket-init
    desc: MFC AfxSocketInit call
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: AfxSocketInit
  - id: afx-enable-control-container
    desc: MFC AfxEnableControlContainer call
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: AfxEnableControlContainer
  - id: afx-find-resource-handle
    desc: MFC AfxFindResourceHandle call
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: AfxFindResourceHandle
