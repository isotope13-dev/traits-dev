defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [binaries, shell, python, c, cpp, rust, go, javascript]
traits:
- id: libcurl-ref
  desc: libcurl library reference
  crit: baseline
  conf: 0.3
  if:
    type: text
    substr: libcurl
- id: gnu-coreutils-ref
  desc: GNU coreutils reference
  crit: baseline
  conf: 0.3
  if:
    type: text
    substr: GNU coreutils
- id: system-debug-lib
  desc: System debug library
  crit: baseline
  conf: 0.5
  if:
    type: text
    regex: lib.{1,20}_debug\.so
- id: sanitizer-runtime
  desc: Compiler sanitizer runtime library
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: "AddressSanitizer:"
  # Native shared-library family markers — restrict to binaries and compiled
  # source that actually link these libs. On scripts (JS `zlib`, Python `lzma`)
  # these are core-module names, not native dylib references, and are covered by
  # the language import / compression detectors (metadata/import, data/compress).
- id: lzma-ref
  desc: lzma compression reference
  crit: baseline
  conf: 0.3
  for: [binaries, c, cpp, rust, go]
  if:
    type: text
    regex: (?i)\b(liblzma|lzma_[a-z0-9_]{2,32}|lzma\.h)\b
- id: xz-ref
  desc: xz compression reference
  crit: baseline
  conf: 0.3
  for: [binaries, c, cpp, rust, go]
  if:
    type: text
    regex: (?i)\b(libxz|xz_[a-z0-9_]{3,32}|xz-utils)\b
- id: zlib-ref
  desc: zlib compression reference
  crit: baseline
  conf: 0.3
  for: [binaries, c, cpp, rust, go]
  if:
    type: text
    regex: (?i)\bzlib\b
- id: async-io-libev-symbol
  desc: libev symbol
  crit: baseline
  conf: 0.9
  for: [elf, macho, pe, dll]
  if:
    type: symbol
    regex: ^ev_(run|loop|default_loop|io_init)$
- id: async-io-libev-symbol-extra
  desc: libev timer or async symbol
  crit: baseline
  conf: 0.9
  for: [elf, macho, pe, dll]
  if:
    type: symbol
    regex: ^ev_(timer_init|async_send)$
- id: async-io-libuv-symbol
  desc: libuv symbol
  crit: baseline
  conf: 0.9
  for: [elf, macho, pe, dll]
  if:
    type: symbol
    regex: ^uv_(run|loop_init|tcp_init|async_init)$
- id: async-io-libuv-symbol-extra
  desc: libuv timer or filesystem symbol
  crit: baseline
  conf: 0.9
  for: [elf, macho, pe, dll]
  if:
    type: symbol
    regex: ^uv_(timer_init|fs_)
- id: dri-driver-ref-a
  desc: DRI graphics driver path reference
  crit: baseline
  conf: 0.6
  for:
  - elf
  if:
    type: text
    regex: /usr/(lib|X11R6/lib)/(dri|modules/dri)/
- id: dri-driver-ref-b
  desc: DRI graphics driver marker reference
  crit: baseline
  conf: 0.6
  for:
  - elf
  if:
    type: text
    regex: _dri\.so|drirc|DRI_PRIME
- id: x11-dga-marker-a
  desc: X11 DGA marker cluster A
  crit: baseline
  conf: 0.9
  for:
  - elf
  if:
    type: text
    regex: (?i)(XF86DGA|XDGAOpenFramebuffer|XDGACloseFramebuffer)
- id: x11-dga-marker-b
  desc: X11 DGA marker cluster B
  crit: baseline
  conf: 0.9
  for:
  - elf
  if:
    type: text
    regex: (?i)(libXxf86dga|XFree86-DGA)
- id: vdpau-ref
  desc: VDPAU video acceleration library
  crit: baseline
  conf: 0.9
  for:
  - elf
  if:
    type: text
    regex: (?i)(vdpau|VdpDevice|VdpVideoSurface|libvdpau)
- id: drm-driver-ref-a
  desc: DRM/KMS graphics marker cluster A
  crit: baseline
  conf: 0.8
  for:
  - elf
  if:
    type: text
    regex: (?i)(libdrm|drmOpen|drmModeGetResources|DRM_IOCTL)
- id: drm-driver-ref-b
  desc: DRM/KMS graphics marker cluster B
  crit: baseline
  conf: 0.8
  for:
  - elf
  if:
    type: text
    regex: (?i)(drm_mode_|/dev/dri/)
- id: shell-keyword-marker
  desc: Shell interpreter keyword marker
  crit: baseline
  conf: 0.9
  for:
  - elf
  - macho
  if:
    type: text
    substr: is a shell keyword
- id: shell-builtin-marker
  desc: Shell interpreter builtin marker
  crit: baseline
  conf: 0.9
  for:
  - elf
  - macho
  if:
    type: text
    substr: shell builtin
- id: debugger-ptrace-marker-a
  desc: Debugger ptrace usage marker A
  crit: baseline
  conf: 0.7
  for:
  - elf
  - macho
  if:
    type: text
    regex: PTRACE_(ATTACH|DETACH|CONT|PEEKDATA)
  unless:
  - id: metadata/lang/compiler/systems/
- id: debugger-ptrace-marker-b
  desc: Debugger ptrace usage marker B
  crit: baseline
  conf: 0.7
  for:
  - elf
  - macho
  if:
    type: text
    regex: PTRACE_(POKEDATA|SINGLESTEP|GETREGS|SETREGS)
  unless:
  - id: metadata/lang/compiler/systems/
- id: llvm-project-ref-a
  desc: LLVM/Clang project family reference
  crit: baseline
  conf: 0.8
  if:
    type: text
    regex: (?i)\b(libllvm|libclang|llvm-[0-9]{1,2}|clang-[0-9]{1,2})\b
- id: llvm-project-ref-b
  desc: Compiler/project context token
  crit: baseline
  conf: 0.8
  if:
    type: text
    regex: (?i)\b(llvm project|clang version|llvm version|intermediate representation)\b
- id: gcc-project-ref
  desc: GCC project reference
  crit: baseline
  conf: 0.8
  if:
    type: text
    regex: (?i)\bgcc\s+(version|compiler)|\bgnuc\b
# Restrict to binaries and compiled source that actually build with / embed
# CMake provenance (incl. Rust build.rs invoking `Command::new("cmake")`). On
# scripts the bare word `cmake` is a data token — a dependency name, a doc
# mention, or a `.cmake` file-extension entry in a text-extensions list — not a
# native build-tool reference. Same treatment as the lzma/xz/zlib siblings.
- id: cmake-build-ref
  desc: CMake build tool reference
  crit: baseline
  conf: 0.7
  for: [binaries, c, cpp, rust, go]
  if:
    type: text
    word: cmake
    case_insensitive: true
- id: x11-sm-ref
  desc: X11 Session Management library
  crit: baseline
  conf: 0.6
  if:
    type: text
    regex: (?i)(libSM|SmcConn|SmcOpenConnection|SmcCloseConnection)
  unless:
    - id: metadata/file/metrics::js-many-very-long-strings
- id: x11-auth-protocol
  desc: X11 MIT-MAGIC-COOKIE authentication
  crit: baseline
  conf: 0.5
