- id: x11-xorg-ref
  desc: X11 xorg reference
  crit: baseline
  conf: 0.5
  if:
    type: text
    regex: '(?i)\bxorg\b'
- id: x11-xenocara-ref
  desc: X11 xenocara reference
  crit: baseline
  conf: 0.5
  if:
    type: text
    regex: (?i)xenocara
- id: x11-open-display-ref
  desc: X11 XOpenDisplay reference
  crit: baseline
  conf: 0.5
  if:
    type: text
    regex: (?i)XOpenDisplay
- id: x11-create-window-ref
  desc: X11 XCreateWindow reference
  crit: baseline
