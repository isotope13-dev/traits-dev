composite_rules:
- id: async-io-libevent-symbol
  desc: libevent symbol
  crit: baseline
  conf: 0.9
  for: [elf, macho, pe, dll]
  any:
  - id: async-io-libevent-symbol--event-base
  - id: async-io-libevent-symbol--evbuffer
  - id: async-io-libevent-symbol--evhttp
  - id: async-io-libevent-symbol--bufferevent
- id: collectd-plugin-marker
  desc: Collectd plugin marker
  crit: baseline
  conf: 0.9
  for:
  - elf
  any:
  - id: collectd-plugin-marker--plugin-register
  - id: collectd-plugin-marker--plugin-log
  - id: collectd-plugin-marker--module-register
- id: cxx-abi-symbols
  desc: C++ ABI symbols
  crit: baseline
  conf: 0.8
  any:
  - id: micro-behaviors/dylib/library/abi-graphics::cxx-abi-symbols-a
  - id: micro-behaviors/dylib/library/abi-graphics::cxx-abi-symbols-b
- id: mesa-ref
  desc: Mesa 3D graphics reference
  crit: baseline
  conf: 0.5
  any:
  - id: micro-behaviors/dylib/library/abi-graphics::mesa-ref-a
  - id: micro-behaviors/dylib/library/abi-graphics::mesa-ref-b
  - id: micro-behaviors/dylib/library/abi-graphics::mesa-ref-c
- id: opengl-ref
