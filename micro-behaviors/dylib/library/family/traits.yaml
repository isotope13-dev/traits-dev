  - id: dri-driver-ref-a
  - id: dri-driver-ref-b
- id: x11-dga-marker
  desc: X11 DGA library marker
  crit: baseline
  conf: 0.9
  for:
  - elf
  any:
  - id: x11-dga-marker-a
  - id: x11-dga-marker-b
- id: drm-driver-ref
  desc: DRM/KMS graphics driver reference
  crit: baseline
  conf: 0.8
  for:
  - elf
  any:
  - id: drm-driver-ref-a
  - id: drm-driver-ref-b
- id: debugger-ptrace-marker
  desc: Debugger ptrace usage marker
  crit: baseline
  conf: 0.7
  for:
  - elf
  - macho
  any:
  - id: debugger-ptrace-marker-a
  - id: debugger-ptrace-marker-b
- id: llvm-project-ref
  desc: LLVM project reference
  crit: baseline
  conf: 0.8
  all:
  - id: llvm-project-ref-a
  - id: llvm-project-ref-b
- id: x11-ipc-lib-marker
  desc: X11 IPC library markers (ICE, SM)
  crit: baseline
  conf: 0.6
  any:
  - id: x11-libice-ref
  - id: x11-sm-ref
  - id: x11-auth-protocol
- id: network-lib-marker
  desc: Known network library markers
  crit: baseline
  conf: 0.5
  any:
  - id: micro-behaviors/dylib/library/ssl::libssl-ref
  - id: micro-behaviors/dylib/library/ssl::libcrypto-ref
  - id: libcurl-ref
  - id: micro-behaviors/communications/ssh/client::libssh
  - id: x11-ipc-lib-marker
- id: video-lib-marker
  desc: Video acceleration library markers (VA-API, VDPAU)
  crit: baseline
  conf: 0.9
  any:
  - id: vaapi-ref
  - id: vdpau-ref
  - id: drm-driver-ref
- id: graphics-lib-marker
  desc: Graphics/OpenGL library markers
  crit: baseline
  conf: 0.6
  any:
  - id: mesa-ref
  - id: opengl-ref
  - id: x11-ref
  - id: dri-driver-ref
  - id: video-lib-marker
- id: system-lib-marker
  desc: Known system library markers
  crit: baseline
  conf: 0.5
    # Symbol-based libc detection only — text patterns like
    # `libc-version-string` (matches "glibc"/"libc.so.N") fire on
    # every glibc-linked Linux ELF, which yanked the unless: clause
    # for the entire ifunc-* family of composites. Anchor on
    # exports/imports that ONLY actual libc binaries provide
    # (`__libc_start_main`, `__ctype_`/`__tzname`/`__progname`,
    # `gnu_get_libc_version`, `__errno_location`).
  any:
  - id: micro-behaviors/dylib/library/libc::is-libc-binary
  - id: system-debug-lib
  - id: graphics-lib-marker
  - id: collectd-plugin-marker
  - id: micro-behaviors/os/pam/auth::libpam-string
- id: compression-lib-comp
  desc: Compression library markers
  crit: baseline
  conf: 0.4
  any:
  - id: lzma-ref
  - id: xz-ref
  - id: zlib-ref
- id: shell-interpreter
  desc: Shell interpreter binary
  crit: baseline
  conf: 0.9
  for:
  - elf
  - macho
  any:
  - id: shell-keyword-marker
  - id: shell-builtin-marker
- id: compiler-tool-marker
  desc: References a compiler or build tool
  crit: baseline
  conf: 0.8
  any:
  - id: llvm-project-ref
  - id: metadata/lang/compiler/native::libllvm
  - id: gcc-project-ref
  - id: cmake-build-ref
- id: async-io-lib-marker
  desc: Async I/O library (libevent, libev, libuv)
  crit: baseline
  conf: 0.9
  any:
  - id: async-io-libevent-symbol
  - id: async-io-libev-symbol
  - id: async-io-libev-symbol-extra
  - id: async-io-libuv-symbol
  - id: async-io-libuv-symbol-extra
- id: lldb-debugger-ref
  desc: LLDB debugger reference
  crit: baseline
  conf: 0.9
  for:
  - elf
  - macho
  any:
  - id: lldb-debugger-ref-a
  - id: lldb-debugger-ref-b
- id: debugger-tool-marker
  desc: Debugger tool (gdb, lldb, etc.)
  crit: baseline
  conf: 0.9
  for:
  - elf
  - macho
  any:
  - id: gdb-debugger-ref
  - id: lldb-debugger-ref
  - id: debugger-ptrace-marker
