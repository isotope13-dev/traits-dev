defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [binaries, scripts]
traits:
  - id: dlsym-symbol
    desc: dlsym function symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: dlsym
    for: [elf, macho, so]
    platforms: [linux, macos, android]
  - id: dladdr
    desc: Address to symbol lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: dladdr
    unless:
      - id: metadata/file/string/identity::python3-interpreter-basename
      - id: metadata/lang/compiler/generated/
  - id: dladdr-import
    desc: Imports dladdr address-to-symbol lookup
    crit: notable
    conf: 0.85
    for: [elf]
    if:
      type: import
      exact: dladdr
  - id: get-proc-address
    desc: Windows GetProcAddress symbol
    crit: baseline
    conf: 0.95
    attack: T1574.002
    platforms:
      - windows
    for:
      - scripts
      - class
      - pyc
    if:
      type: string_literal
      exact: GetProcAddress
  - id: get-proc-address-source
    desc: Windows GetProcAddress in source
    crit: baseline
    conf: 0.95
    attack: T1574.002
    platforms:
      - windows
    for:
      - c
      - cpp
    if:
      type: text
      word: GetProcAddress
  - id: get-proc-address-prefix-no-import
    desc: Hidden GetProcAddress string fragment
    crit: component
    conf: 0.9
    attack: T1574.002
    platforms:
      - windows
    for:
      - pe
    if:
      type: text
      exact: GetProcAddre
    unless:
      - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: msi-embedded-get-proc-address
    desc: MSI embedded GetProcAddress reference
    crit: component
    conf: 0.9
    attack: T1574.002
    for:
      - oledoc
      - ole
    platforms:
      - windows
    if:
      type: text
      substr: GetProcAddress
  - id: vb6-dll-function-call-symbol
    desc: VB6 named DLL call thunk import
    crit: component
    conf: 0.94
    platforms:
      - windows
    for:
      - pe
    if:
      type: symbol
      exact: DllFunctionCall
  - id: vb6-dll-function-call-ordinal
    desc: VB6 ordinal DLL call thunk import
    crit: component
    conf: 0.94
    platforms:
      - windows
    for:
      - pe
    if:
      type: symbol
      exact: 'ORDINAL 187'
  - id: dlfcn-hook-symbol
    desc: _dlfcn_hook internal linker symbol
    crit: suspicious
    conf: 0.95
    attack: T1574.006
    if:
      type: symbol
      exact: _dlfcn_hook
    for: [macho]
  - id: rtld-next
    desc: RTLD_NEXT pseudo-handle
    crit: notable
    conf: 0.9
    attack: T1574.006
    if:
      type: text
      substr: RTLD_NEXT
    not:
      - substr: RTLD_NEXT used in code not dynamically loaded
  - id: rtld-next-source
    desc: RTLD_NEXT in source code
    crit: baseline
    conf: 0.9
    attack: T1574.006
    for:
      - c
      - cpp
    if:
      type: text
      word: RTLD_NEXT
composite_rules:
  - id: vb6-dll-function-call
    desc: VB6 DLL function call thunk
    crit: notable
    conf: 0.96
    platforms:
      - windows
    for:
      - pe
    all:
      - id: metadata/binary/framework::vb6-application-framework
    any:
      - id: vb6-dll-function-call-symbol
      - id: vb6-dll-function-call-ordinal
  - id: vb6-runtime-api-dispatch
    desc: VB6 runtime API dispatch
    crit: notable
    conf: 0.95
    all:
      - id: metadata/binary/framework::vb6-application-framework
    any:
      - id: vb6-dll-function-call
      - id: metadata/binary/framework::vb6-runtime-core-helper
