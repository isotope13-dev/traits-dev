# Dynamic Library Symbol Lookup
defaults:
  platforms: [unix, windows, macos]
  for: [pe, dll, elf, macho]
traits:
  - id: dlsym-symbol
    desc: dlsym function symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "dlsym"
  - id: dladdr
    desc: Address to symbol lookup
    crit: notable
    conf: 0.85
    attack: "T1574.006"
    if:
      type: string
      substr: "dladdr"
  - id: get-proc-address
    desc: Windows GetProcAddress symbol
    crit: baseline
    conf: 0.95
    attack: "T1574.002"
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: string
      exact: "GetProcAddress"
  - id: get-proc-address-source
    desc: Windows GetProcAddress in source
    crit: baseline
    conf: 0.95
    attack: "T1574.002"
    platforms: [windows]
    for: [c, cpp]
    if:
      type: raw
      word: "GetProcAddress"
  - id: vb6-dll-function-call
    desc: VB6 DllFunctionCall thunk
    crit: notable
    conf: 0.94
    platforms: [windows]
    for: [pe, dll]
    if:
      type: string
      exact: "DllFunctionCall"
  - id: dlfcn-hook-symbol
    desc: _dlfcn_hook internal linker symbol
    crit: suspicious
    conf: 0.95
    attack: "T1574.006"
    if:
      type: symbol
      exact: "_dlfcn_hook"
  - id: rtld-next
    desc: RTLD_NEXT pseudo-handle
    crit: notable
    conf: 0.9
    attack: "T1574.006"
    if:
      type: string
      substr: "RTLD_NEXT"
  - id: rtld-next-source
    desc: RTLD_NEXT in source code
    crit: notable
    conf: 0.9
    attack: "T1574.006"
    for: [c, cpp]
    if:
      type: raw
      word: "RTLD_NEXT"
composite_rules:
  - id: vb6-runtime-api-dispatch
    desc: VB6 runtime API dispatch
    crit: notable
    conf: 0.95
    all:
      - id: metadata/format/pe::vb6-application-framework
    any:
      - id: vb6-dll-function-call
      - id: metadata/format/pe::vb6-runtime-core-helper
