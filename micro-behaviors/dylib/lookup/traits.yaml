defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [binaries, scripts]
traits:
  - id: dlsym-symbol
    desc: dlsym function symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: dlsym
    for: [elf, macho, so]
  - id: dladdr
    desc: Address to symbol lookup
    crit: notable
    conf: 0.85
    attack: T1574.006
    if:
      type: text
      substr: dladdr
    unless:
      - type: basename
        exact: python3
  - id: dladdr-import
    desc: Imports dladdr symbol lookup
    crit: baseline
    conf: 0.85
    for: [elf]
    if:
      type: symbol
      exact: dladdr
      kind: import
  - id: get-proc-address
    desc: Windows GetProcAddress symbol
    crit: baseline
    conf: 0.95
    attack: T1574.002
    platforms:
      - windows
    if:
      type: string_literal
      exact: GetProcAddress
  - id: get-proc-address-source
    desc: Windows GetProcAddress in source
    crit: baseline
    conf: 0.95
    attack: T1574.002
    platforms:
      - windows
    for:
      - c
      - cpp
    if:
      type: text
      word: GetProcAddress
  - id: msi-embedded-get-proc-address
    desc: MSI embedded GetProcAddress reference
    crit: component
    conf: 0.9
    attack: T1574.002
    for:
      - oledoc
      - ole
    platforms:
      - windows
    if:
      type: raw
      substr: GetProcAddress
  - id: vb6-dll-function-call
    desc: VB6 DllFunctionCall thunk
    crit: notable
    conf: 0.94
    platforms:
      - windows
    for:
      - pe
    if:
      type: symbol
      exact: DllFunctionCall
  - id: dlfcn-hook-symbol
    desc: _dlfcn_hook internal linker symbol
    crit: suspicious
    conf: 0.95
    attack: T1574.006
    if:
      type: symbol
      exact: _dlfcn_hook
    for: [macho]
  - id: rtld-next
    desc: RTLD_NEXT pseudo-handle
    crit: notable
    conf: 0.9
    attack: T1574.006
    if:
      type: text
      substr: RTLD_NEXT
    not:
      - substr: RTLD_NEXT used in code not dynamically loaded
  - id: rtld-next-source
    desc: RTLD_NEXT in source code
    crit: baseline
    conf: 0.9
    attack: T1574.006
    for:
      - c
      - cpp
    if:
      type: text
      word: RTLD_NEXT
composite_rules:
  - id: vb6-runtime-api-dispatch
    desc: VB6 runtime API dispatch
    crit: notable
    conf: 0.95
    all:
      - id: metadata/binary/framework::vb6-application-framework
    any:
      - id: vb6-dll-function-call
      - id: metadata/binary/framework::vb6-runtime-core-helper
