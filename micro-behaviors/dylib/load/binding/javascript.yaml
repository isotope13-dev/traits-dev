# Node FFI/native-library loading capabilities.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1129
traits:
  - id: koffi-import
    desc: Imports the Koffi native FFI library
    crit: notable
    conf: 0.96
    if:
      type: import
      exact: koffi
  - id: koffi-load-call
    desc: Loads a native library through Koffi
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      regex: '^require\(\)\.load$'
  - id: koffi-exported-function-call
    desc: Resolves a native function through Koffi
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: lib.func
composite_rules:
  - id: koffi-native-library-load
    desc: Koffi loads and resolves native library functions
    crit: notable
    conf: 0.97
    all:
      - id: koffi-import
      - id: koffi-load-call
      - id: koffi-exported-function-call
