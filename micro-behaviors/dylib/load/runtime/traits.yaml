defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: vb6-runtime-dll-reference
    desc: MSVBVM60.DLL runtime reference
    crit: component
    conf: 0.98
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      exact: MSVBVM60.DLL
  - id: dlopen
    desc: Dynamic library loading via dlopen
    crit: notable
    conf: 0.9
    attack: T1574.006
    for:
      - elf
      - macho
    platforms: [linux, macos, android]
    if:
      type: symbol
      exact: dlopen
    unless:
      - id: well-known/app/tabby::tabby-basename
      - id: metadata/file/string/identity::python3-interpreter-basename
      - id: metadata/lang/compiler/generated/
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
  - id: load-library
    desc: Dynamic library loading via LoadLibrary
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
      - c
      - cpp
      - python
      - javascript
      - typescript
      - javascript
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibrary
  - id: python-add-dll-directory
    desc: Python adds DLL search directory
    crit: notable
    conf: 0.85
    attack: T1574.002
    ref: sha256:2ef7985607d6aa8290f86b617df1551b8e88910e195ba1bf5668b902a60d312d
    for:
      - python
    platforms:
      - windows
    if:
      type: text
      substr: os.add_dll_directory
  - id: load-library-a
    desc: Dynamic library loading via LoadLibraryA
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryA
    unless:
      - id: metadata/binary/installer/family/
      # Do not use metadata/signed/trust-level/ — it also contains unsigned-*
      # markers that incorrectly blanked LoadLibrary on every unsigned PE.
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: metadata/binary/section/names::upx-section
      - type: text
        substr: clangd
      - type: text
        substr: clang
      - id: well-known/lib/electron::electron-enable-logging-env
    downgrade:
      any:
        # A large import table lowers the novelty of this API, but should not
        # erase the concrete dynamic-load capability from the findings.
        - type: metrics
          field: imports.count
          min: 30
  - id: load-library-a-string-no-import
    desc: Hidden LoadLibraryA string reference
    crit: component
    conf: 0.9
    attack: T1574.002
    for:
      - pe
      - javascript
      - typescript
    platforms:
      - windows
    if:
      type: text
      word: LoadLibraryA
    unless:
      - id: load-library-a
      - type: symbol
        exact: LoadLibraryA
  - id: msi-embedded-load-library-a
    desc: MSI embedded LoadLibraryA reference
    crit: component
    conf: 0.9
    attack: T1574.002
    for:
      - oledoc
      - ole
    platforms:
      - windows
    if:
      type: text
      substr: LoadLibraryA
  - id: load-library-w
    desc: LoadLibraryW API reference
    crit: notable
    conf: 0.88
    attack: T1129
    for:
      - pe
      - c
      - cpp
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryW
    unless:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/metrics/structural::many-functions
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform::microsoft-windows
      # Go's Windows syscall runtime imports LoadLibraryW even when the
      # program never performs dynamic library loading itself.
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - type: basename
        exact: WebView2Loader.dll
      - id: well-known/lib/electron::electron-enable-logging-env
  - id: load-library-ex
    desc: Extended dynamic library loading
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryEx
  - id: load-library-ex-a
    desc: Extended dynamic library loading (ANSI)
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryExA
    unless:
      - type: basename
        exact: WebView2Loader.dll
      - type: basename
        regex: '(^|[!/])libEGL\.dll$'
      - type: basename
        regex: ^clink_dll_.*\.dll$
      - type: basename
        regex: \.node$
      - id: metadata/binary/framework/
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
        - id: metadata/lang/compiler/managed::borland-section-code
  - id: load-library-ex-w
    desc: LoadLibraryExW API reference
    crit: baseline
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryExW
    unless:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
      - id: metadata/signed/platform::microsoft-windows
      - type: basename
        exact: WebView2Loader.dll
    downgrade:
      # Go's windows syscall package statically links LoadLibraryExW; every Go
      # Windows binary imports it regardless of the program's own behavior.
      any:
        - id: metadata/lang/compiled/
  - id: set-dll-directory-w
    desc: Set DLL search directory for sideloading
    crit: notable
    conf: 0.92
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: SetDllDirectoryW
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/structural::many-exports
  - id: dlclose
    desc: Dynamic library unload
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlclose
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
    unless:
      - id: metadata/lang/compiler/generated/
  - id: dlerror
    desc: Dynamic linker error handling
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlerror
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
    unless:
      - id: well-known/app/tabby::tabby-basename
      - id: metadata/file/string/identity::python3-interpreter-basename
      - id: metadata/lang/compiler/generated/
  - id: nsbundle
    desc: macOS NSBundle loading
    crit: notable
    conf: 0.6
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      regex: NSBundle[^[:cntrl:]]{0,80}(load(AndReturnError)?|bundleWith(Path|URL))
  - id: objc-method-swizzle
    desc: ObjC method swizzling via runtime
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      substr: class_getInstanceMethod
  - id: objc-set-instance-var
    desc: ObjC runtime instance variable manipulation
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      substr: object_setInstanceVariable
  - id: messaging-app-ichat
    desc: Apple iChat bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/binary/bundle::ichat
  - id: messaging-app-mail
    desc: Apple Mail bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/binary/bundle::mail
  - id: messaging-app-messages
    desc: Apple Messages bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/binary/bundle::messages
  - id: ctypes-windll
    desc: Python ctypes Windows DLL
    crit: notable
    conf: 0.85
    attack: T1574.002
    for:
      - python
    if:
      type: string_literal
      regex: windll\.[\w.]+
  - id: ctypes-cdll-dot
    desc: ctypes.CDLL pattern
    crit: notable
    conf: 0.7
    attack: T1574
    for:
      - python
    if:
      type: symbol
      kind: call
      exact: ctypes.CDLL
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: cdll-paren
    desc: CDLL( call pattern
    crit: notable
    conf: 0.7
    attack: T1574
    for:
      - python
    if:
      type: symbol
      kind: call
      exact: CDLL
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: loadlibrary-keyword
    desc: LoadLibrary keyword
    crit: notable
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      word: LoadLibrary
  - id: python-file-dunder
    desc: __file__ variable
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      substr: __file__
  - id: dirname-call
    desc: dirname function call
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      word: dirname
  - id: abspath-call
    desc: abspath function call
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      word: abspath
  - id: ruby-dlopen
    desc: Ruby FFI dlopen
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - ruby
    if:
      type: string_literal
      regex: \.dlopen\(
  - id: java-loadclass
    desc: Java runtime class loading
    crit: suspicious
    conf: 0.85
    attack: T1574
    for:
      - java
      - class
    if:
      type: text
      substr: loadReplacementClass
  - id: webkit-framework
    desc: WebKit framework linked
    crit: baseline
    conf: 0.9
    for:
      - macho
    if:
      type: text
      substr: WebKit
composite_rules:
  - id: messaging-app-bundle-id
    desc: Apple messaging app bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    any:
      - id: messaging-app-ichat
      - id: messaging-app-mail
      - id: messaging-app-messages
  - id: objc-messaging-hook
    desc: ObjC method swizzle with messaging hook
    crit: suspicious
    conf: 0.9
    attack: T1574.006
    for:
      - macho
    all:
      - id: objc-method-swizzle
      - id: messaging-app-bundle-id
  - id: library-loaders
    desc: Library loading functions (CDLL or
    for:
      - python
    any:
      - id: cdll-paren
      - id: loadlibrary-keyword
  - id: path-manipulation
    desc: Path manipulation functions
    for:
      - python
    any:
      - id: python-file-dunder
      - id: dirname-call
      - id: abspath-call
  - id: local-load
    desc: Python loads local dynamic library
    crit: notable
    conf: 0.9
    attack: T1574
    for:
      - python
    near_lines: 40
    all:
      - id: library-loaders
      - id: path-manipulation
    unless:
      # .pyi files contain API documentation and illustrative ctypes snippets,
      # not executable library-loading code.
      - id: metadata/file/extension/identity::python-type-stub-extension
  - id: dlopen-dlsym
    desc: Dynamic library loading and symbol lookup
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - elf
      - macho
    all:
      - id: dlopen
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
    unless:
      - id: metadata/lang/compiler/generated/
  - id: dl-function
    desc: Any dl* function usage
    crit: notable
    conf: 0.7
    attack: T1574.006
    for:
      - elf
      - macho
    any:
      - id: dlopen
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: dlclose
      - id: dlerror
  - id: nsbundle-dynamic
    desc: NSBundle with dynamic loading APIs
    crit: suspicious
    conf: 0.85
    attack: T1574.006
    for:
      - macho
    all:
      - id: nsbundle
      - id: dl-function
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform::apple
  - id: dynamic-loader-detected
    desc: Dynamic code loading pattern
    crit: notable
    conf: 0.9
    attack: T1574.006
    mbc: B0023
    for:
      - elf
      - macho
    any:
      - id: dlopen-dlsym
      - id: nsbundle-dynamic
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/libc/
  - id: ctypes-cdll
    desc: Python ctypes CDLL loading
    crit: notable
    conf: 0.85
    attack: T1574
    for:
      - python
    any:
      - id: ctypes-cdll-dot
      - id: cdll-paren
