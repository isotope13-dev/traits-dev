defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: dlopen
    desc: Dynamic library loading via dlopen
    crit: notable
    conf: 0.9
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlopen
    unless:
      - id: objectives/collection/keylog/capture::tabby-basename
      - id: metadata/file/text/string::python3-interpreter-basename
      - id: metadata/lang/compiler/generated::nuitka-cpython-extension
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: load-library
    desc: Dynamic library loading via LoadLibrary
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
      - c
      - cpp
      - python
      - javascript
      - typescript
      - javascript
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibrary
  - id: load-library-a
    desc: Dynamic library loading via LoadLibraryA
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryA
    unless:
      - type: metrics
        field: imports.count
        min: 30
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/signed/trust-level::signer-evidence-present
      - id: metadata/binary/section/names::upx-section
      - type: text
        substr: clangd
      - type: text
        substr: clang
      - id: well-known/lib/electron::electron-enable-logging-env
  - id: load-library-a-string-no-import
    desc: Hidden LoadLibraryA string reference
    crit: component
    conf: 0.9
    attack: T1574.002
    for:
      - pe
      - javascript
      - typescript
    platforms:
      - windows
    if:
      type: text
      word: LoadLibraryA
    unless:
      - id: load-library-a
      - type: symbol
        exact: LoadLibraryA
  - id: msi-embedded-load-library-a
    desc: MSI embedded LoadLibraryA reference
    crit: component
    conf: 0.9
    attack: T1574.002
    for:
      - oledoc
      - ole
    platforms:
      - windows
    if:
      type: text
      substr: LoadLibraryA
  - id: load-library-w
    desc: Dynamic library loading via LoadLibraryW
    crit: notable
    conf: 0.88
    attack: T1129
    for:
      - pe
      - c
      - cpp
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryW
    unless:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/metrics/structural::many-functions
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/signed/platform::microsoft-windows
      - type: basename
        exact: WebView2Loader.dll
      - id: well-known/lib/electron::electron-enable-logging-env
  - id: load-library-ex
    desc: Extended dynamic library loading
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryEx
  - id: load-library-ex-a
    desc: Extended dynamic library loading (ANSI)
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryExA
    unless:
      - type: basename
        exact: WebView2Loader.dll
      - type: basename
        regex: '(^|[!/])libEGL\.dll$'
      - type: basename
        regex: ^clink_dll_.*\.dll$
      - type: basename
        regex: \.node$
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
        - id: metadata/lang/compiler/managed::borland-section-code
  - id: load-library-ex-w
    desc: Extended dynamic library loading (Unicode)
    crit: baseline
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryExW
    unless:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft-windows
      - type: basename
        exact: WebView2Loader.dll
    downgrade:
      # Go's windows syscall package statically links LoadLibraryExW; every Go
      # Windows binary imports it regardless of the program's own behavior.
      any:
        - id: metadata/lang/compiled::go-runtime-marker
  - id: set-dll-directory-w
    desc: Set DLL search directory for sideloading
    crit: notable
    conf: 0.92
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: SetDllDirectoryW
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/structural::many-exports
  - id: dlclose
    desc: Dynamic library unload
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlclose
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
    unless:
      - id: metadata/lang/compiler/generated::nuitka-cpython-extension
  - id: dlerror
    desc: Dynamic linker error handling
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlerror
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
    unless:
      - id: objectives/collection/keylog/capture::tabby-basename
      - id: metadata/file/text/string::python3-interpreter-basename
      - id: metadata/lang/compiler/generated::nuitka-cpython-extension
  - id: nsbundle
    desc: macOS NSBundle loading
    crit: notable
    conf: 0.6
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      regex: NSBundle[^[:cntrl:]]{0,80}(load(AndReturnError)?|bundleWith(Path|URL))
  - id: objc-method-swizzle
    desc: ObjC method swizzling via runtime
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      substr: class_getInstanceMethod
  - id: objc-set-instance-var
    desc: ObjC runtime instance variable manipulation
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      substr: object_setInstanceVariable
  - id: messaging-app-ichat
    desc: Apple iChat bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/binary/bundle::ichat
  - id: messaging-app-mail
    desc: Apple Mail bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/binary/bundle::mail
  - id: messaging-app-messages
    desc: Apple Messages bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/binary/bundle::messages
  - id: ctypes-windll
    desc: Python ctypes Windows DLL
    crit: notable
    conf: 0.85
    attack: T1574.002
    for:
      - python
    if:
      type: string_literal
      regex: windll\.[\w.]+
  - id: ctypes-cdll-dot
    desc: ctypes.CDLL pattern
    crit: notable
    conf: 0.7
    attack: T1574
    for:
      - python
    if:
      type: symbol
      kind: call
      exact: ctypes.CDLL
  - id: cdll-paren
    desc: CDLL( call pattern
    crit: notable
    conf: 0.7
    attack: T1574
    for:
      - python
    if:
      type: symbol
      kind: call
      exact: CDLL
  - id: loadlibrary-keyword
    desc: LoadLibrary keyword
    crit: notable
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      word: LoadLibrary
  - id: python-file-dunder
    desc: __file__ variable
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      substr: __file__
  - id: dirname-call
    desc: dirname function call
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      word: dirname
  - id: abspath-call
    desc: abspath function call
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      word: abspath
  - id: ruby-dlopen
    desc: Ruby FFI dlopen
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - ruby
    if:
      type: string_literal
      regex: \.dlopen\(
  - id: java-loadclass
    desc: Java runtime class loading
    crit: suspicious
    conf: 0.85
    attack: T1574
    for:
      - java
      - class
    if:
      type: text
      substr: loadReplacementClass
  - id: webkit-framework
    desc: WebKit framework linked
    crit: baseline
    conf: 0.9
    for:
      - macho
    if:
      type: text
      substr: WebKit
composite_rules:
  - id: messaging-app-bundle-id
    desc: Apple messaging app bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    any:
      - id: messaging-app-ichat
      - id: messaging-app-mail
      - id: messaging-app-messages
  - id: objc-messaging-hook
    desc: ObjC method swizzle with messaging hook
    crit: suspicious
    conf: 0.9
    attack: T1574.006
    for:
      - macho
    all:
      - id: objc-method-swizzle
      - id: messaging-app-bundle-id
  - id: library-loaders
    desc: Library loading functions (CDLL or
    for:
      - python
    any:
      - id: cdll-paren
      - id: loadlibrary-keyword
  - id: path-manipulation
    desc: Path manipulation functions
    for:
      - python
    any:
      - id: python-file-dunder
      - id: dirname-call
      - id: abspath-call
  - id: local-load
    desc: Loading dynamic library from local
    crit: suspicious
    conf: 0.9
    attack: T1574
    for:
      - python
    near_lines: 40
    all:
      - id: library-loaders
      - id: path-manipulation
  - id: dlopen-dlsym
    desc: Core dlopen/dlsym pattern
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - elf
      - macho
    all:
      - id: dlopen
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
    unless:
      - id: metadata/lang/compiler/generated::nuitka-cpython-extension
  - id: dl-function
    desc: Any dl* function usage
    crit: notable
    conf: 0.7
    attack: T1574.006
    for:
      - elf
      - macho
    any:
      - id: dlopen
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: dlclose
      - id: dlerror
  - id: nsbundle-dynamic
    desc: NSBundle with dynamic loading APIs
    crit: suspicious
    conf: 0.85
    attack: T1574.006
    for:
      - macho
    all:
      - id: nsbundle
      - id: dl-function
    downgrade:
      any:
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
  - id: dynamic-loader-detected
    desc: Dynamic code loading pattern
    crit: notable
    conf: 0.9
    attack: T1574.006
    mbc: B0023
    for:
      - elf
      - macho
    any:
      - id: dlopen-dlsym
      - id: nsbundle-dynamic
    downgrade:
      any:
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/family::system-lib-marker
        - id: micro-behaviors/dylib/library/family::video-lib-marker
        - id: micro-behaviors/dylib/library/family::graphics-lib-marker
        - id: micro-behaviors/dylib/library/family::shell-interpreter
        - id: micro-behaviors/dylib/library/libc::cxx-stdlib-marker
  - id: ctypes-cdll
    desc: Python ctypes CDLL loading
    crit: notable
    conf: 0.85
    attack: T1574
    for:
      - python
    any:
      - id: ctypes-cdll-dot
      - id: cdll-paren
