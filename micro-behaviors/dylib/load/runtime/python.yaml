defaults:
  for: [python]
  platforms: [linux, macos, windows]
traits:
  - id: ctypes-import
    desc: Python ctypes import statement
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: from ctypes import
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ctypes-import-module
    desc: Python imports ctypes module
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: ctypes
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ctypes-callback-cast
    desc: Casts address to ctypes callback
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?s)(ctypes\.)?cast\s*\(.{0,160}?,\s*(ctypes\.)?CFUNCTYPE\s*\('
  - id: python-dylib-plugin-api
    desc: Python dynamic-library plugin API
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((load|register)_dylib)$'
