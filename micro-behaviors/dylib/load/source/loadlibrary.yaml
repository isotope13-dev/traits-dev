defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: "T1574.002"
traits:
  - id: load-library-source
    desc: Dynamic library load in source
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*(?![;#/])(invoke\s+)?LoadLibrary(A|W)?\s*(\(|,)'
  - id: load-library-a-source
    desc: LoadLibraryA call in source
    crit: notable
    conf: 0.95
    if:
      type: text
      word: LoadLibraryA
