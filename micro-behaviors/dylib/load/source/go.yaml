defaults:
  platforms: [unix]
  for: [go]
  crit: notable
  conf: 0.88

traits:
  - id: go-plugin-package-import
    desc: Go plugin package import
    if:
      type: text
      regex: '(?m)^\s*"plugin"\s*$'
  - id: go-plugin-open-call
    desc: Go plugin.Open call
    conf: 0.9
    if:
      type: text
      regex: '\bplugin\.Open\s*\('

composite_rules:
  - id: go-plugin-dynamic-load
    desc: Go plugin dynamic load
    conf: 0.92
    any:
      - id: go-plugin-open-call
    all:
      - id: go-plugin-package-import
