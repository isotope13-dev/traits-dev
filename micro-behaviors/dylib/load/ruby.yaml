# Ruby Dynamic Library Loading
# Generic dynamic library loading capabilities
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  attack: T1059
  for: [ruby]
  platforms: [unix, windows]
traits:
  - id: ruby-ffi-dlopen
    desc: Ruby FFI dlopen
    crit: notable
    conf: 0.70
    if:
      type: string
      regex: 'Fiddle\.dlopen|dlopen.{0,50}lib'
  - id: fiddle-dlopen
    desc: Fiddle dynamic library loading
    crit: notable
    conf: 0.75
    if:
      type: string
      regex: 'require.{0,50}fiddle'
  - id: shared-lib-exec
    desc: Shared library execution
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: '\.so.{0,50}ruby|fiddle.{0,50}\.so|lib\.so'
