defaults:
  platforms: [unix, windows]
  for: [go]
traits:
  - id: go-cgo-import
    desc: Go Cgo native interface
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'import\s+"C"'
  - id: go-cgo-directive
    desc: Go Cgo compiler directive
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?m)^#cgo\s+(CFLAGS|LDFLAGS):'
