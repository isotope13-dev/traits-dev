defaults:
  platforms:
    - unix
    - windows
    - macos
traits:
  - id: dlopen
    desc: Dynamic library loading via dlopen
    crit: notable
    conf: 0.9
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlopen
  - id: load-library
    desc: Dynamic library loading via LoadLibrary
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibrary
  - id: load-library-a
    desc: Dynamic library loading via LoadLibraryA
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      exact: LoadLibraryA
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft-windows
      - type: text
        substr: clangd
      - type: text
        substr: clang
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
  - id: load-library-w
    desc: Dynamic library loading via LoadLibraryW
    crit: notable
    conf: 0.88
    attack: T1129
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      exact: LoadLibraryW
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft-windows
      - type: basename
        exact: WebView2Loader.dll
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
  - id: load-library-ex
    desc: Extended dynamic library loading
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryEx
  - id: load-library-ex-a
    desc: Extended dynamic library loading (ANSI)
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryExA
    unless:
      - type: basename
        exact: WebView2Loader.dll
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
  - id: load-library-ex-w
    desc: Extended dynamic library loading (Unicode)
    crit: notable
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    platforms:
      - windows
    if:
      type: symbol
      exact: LoadLibraryExW
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft-windows
      - type: basename
        exact: WebView2Loader.dll
  - id: dlclose
    desc: Dynamic library unload
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlclose
  - id: dlerror
    desc: Dynamic linker error handling
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: dlerror
  - id: nsbundle
    desc: macOS NSBundle loading
    crit: notable
    conf: 0.6
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      regex: NSBundle[^[:cntrl:]]{0,80}(load(AndReturnError)?|bundleWith(Path|URL))
  - id: objc-method-swizzle
    desc: ObjC method swizzling via runtime
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      substr: class_getInstanceMethod
  - id: objc-set-instance-var
    desc: ObjC runtime instance variable manipulation
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      type: text
      substr: object_setInstanceVariable
  - id: messaging-app-ichat
    desc: Apple iChat bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/vendor/apple/bundle-id::ichat
  - id: messaging-app-mail
    desc: Apple Mail bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/vendor/apple/bundle-id::mail
  - id: messaging-app-messages
    desc: Apple Messages bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    if:
      id: metadata/vendor/apple/bundle-id::messages
  - id: ctypes-windll
    desc: Python ctypes Windows DLL
    crit: notable
    conf: 0.85
    attack: T1574.002
    for:
      - python
    if:
      type: string_literal
      regex: windll\.[\w.]+
  - id: ctypes-cdll-dot
    desc: ctypes.CDLL pattern
    crit: notable
    conf: 0.7
    attack: T1574
    for:
      - python
    if:
      type: ast
      kind: call
      exact: ctypes.CDLL
  - id: cdll-paren
    desc: CDLL( call pattern
    crit: notable
    conf: 0.7
    attack: T1574
    for:
      - python
    if:
      type: ast
      kind: call
      exact: CDLL
  - id: loadlibrary-keyword
    desc: LoadLibrary keyword
    crit: notable
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      word: LoadLibrary
  - id: python-file-dunder
    desc: __file__ variable
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      substr: __file__
  - id: dirname-call
    desc: dirname function call
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      word: dirname
  - id: abspath-call
    desc: abspath function call
    crit: baseline
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      word: abspath
  - id: ruby-dlopen
    desc: Ruby FFI dlopen
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - ruby
    if:
      type: string_literal
      regex: \.dlopen\(
  - id: java-loadclass
    desc: Java runtime class loading
    crit: suspicious
    conf: 0.85
    attack: T1574
    for:
      - java
      - class
    if:
      type: text
      substr: loadReplacementClass
  - id: webkit-framework
    desc: WebKit framework linked
    crit: baseline
    conf: 0.9
    for:
      - macho
    if:
      type: text
      substr: WebKit
composite_rules:
  - id: messaging-app-bundle-id
    desc: Apple messaging app bundle identifier
    crit: notable
    conf: 0.8
    attack: T1574.006
    for:
      - macho
    any:
      - id: messaging-app-ichat
      - id: messaging-app-mail
      - id: messaging-app-messages
  - id: objc-messaging-hook
    desc: ObjC method swizzle with messaging hook
    crit: suspicious
    conf: 0.9
    attack: T1574.006
    for:
      - macho
    all:
      - id: objc-method-swizzle
      - id: messaging-app-bundle-id
  - id: library-loaders
    desc: Library loading functions (CDLL or
    for:
      - python
    any:
      - id: cdll-paren
      - id: loadlibrary-keyword
  - id: path-manipulation
    desc: Path manipulation functions
    for:
      - python
    any:
      - id: python-file-dunder
      - id: dirname-call
      - id: abspath-call
  - id: local-load
    desc: Loading dynamic library from local
    crit: suspicious
    conf: 0.9
    attack: T1574
    for:
      - python
    near_lines: 40
    all:
      - id: library-loaders
      - id: path-manipulation
  - id: dlopen-dlsym
    desc: Core dlopen/dlsym pattern
    crit: notable
    conf: 0.85
    attack: T1574.006
    for:
      - elf
      - macho
    all:
      - id: dlopen
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
  - id: dl-function
    desc: Any dl* function usage
    crit: notable
    conf: 0.7
    attack: T1574.006
    for:
      - elf
      - macho
    any:
      - id: dlopen
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: dlclose
      - id: dlerror
  - id: nsbundle-dynamic
    desc: NSBundle with dynamic loading APIs
    crit: suspicious
    conf: 0.85
    attack: T1574.006
    for:
      - macho
    all:
      - id: nsbundle
      - id: dl-function
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
  - id: dynamic-loader-detected
    desc: Dynamic code loading pattern
    crit: suspicious
    conf: 0.9
    attack: T1574.006
    mbc: B0023
    for:
      - elf
      - macho
    any:
      - id: dlopen-dlsym
      - id: nsbundle-dynamic
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::video-lib-marker
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::shell-interpreter
        - id: micro-behaviors/dylib/library/libc::cxx-stdlib-marker
  - id: ctypes-cdll
    desc: Python ctypes CDLL loading
    crit: notable
    conf: 0.85
    attack: T1574
    for:
      - python
    any:
      - id: ctypes-cdll-dot
      - id: cdll-paren
