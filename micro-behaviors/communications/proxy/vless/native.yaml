# Native VLESS/WebSocket proxy protocol markers.
# These are neutral protocol capabilities; proxy intent is inferred by
# objective composites that add listener, forwarding, or payload context.
defaults:
  platforms: [unix]
  for: [elf]
  attack: T1090
  mbc: C0001
traits:
  - id: native-vless-websocket-marker
    desc: Native VLESS WebSocket protocol marker
    crit: notable
    conf: 0.92
    if:
      type: text
      section: .rodata
      regex: '(?i)\bvless[_-]?ws\b|\bUUID_BYTES\b'
