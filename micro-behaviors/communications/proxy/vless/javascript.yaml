# VLESS protocol detection
# VLESS is a proxy protocol used by the V2Ray project.
# The vless:// URL scheme and SNI-masquerade patterns are strong IOCs
# when found in npm packages or scripts (not legitimate proxy clients).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell, python]
  attack: T1090
  mbc: C0001
traits:
  - id: vless-url-scheme
    desc: VLESS proxy URL scheme
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "vless://"
  - id: vless-sni-masquerade
    desc: VLESS URL with SNI cover domain
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'vless://.{0,80}@www\.visa\.com\.tw:443'
  - id: vless-tls-ws-template
    desc: VLESS TLS+WebSocket subscription template
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "encryption=none&security=tls&sni="
