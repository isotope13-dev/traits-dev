defaults:
  platforms: [windows, unix]
  for: [elf, macho, pe]
  crit: notable
  conf: 0.75
  attack: T1090
traits:
  - id: reverse-connection-term
    desc: Reverse-connection terminology reference
    for: [source]
    if:
      type: text
      regex: '(?i)\breverse[-_ ]?(connect(ion)?|conn)\b'
  - id: reverse-proxy
    desc: Reverse proxy implementation reference
    if:
      type: text
      regex: (?i)reverse[-_]?(proxy)
    unless:
      - id: metadata/build/docker::buildkit-dockerfile-frontend
