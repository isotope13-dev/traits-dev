defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1090
traits:
  - id: wintun-dll-reference
    desc: WinTun virtual adapter library reference
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: wintun.dll
  - id: wintun-create-adapter
    desc: Create WinTun virtual network adapter
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: WintunCreateAdapter
  - id: tap0901-adapter-reference
    desc: TAP-Windows tap0901 adapter reference
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: tap0901
  - id: proxy-env-stack
    desc: Windows proxy environment variable stack
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: REQUEST_METHOD.{0,24}ALL_PROXY.{0,24}HTTP_PROXY
  - id: internet-settings-proxy-values
    desc: Internet Settings proxy value names
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: Internet Settings.{0,24}ProxyEnable.{0,24}ProxyServer
  - id: http-connect-host-tunnel
    desc: HTTP CONNECT tunnel host header
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'CONNECT : HTTP/1\.1.{0,8}Host:'
composite_rules:
  - id: windows-virtual-tunnel-adapter
    desc: Windows virtual tunnel adapter support
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: wintun-dll-reference
      - id: wintun-create-adapter
      - id: tap0901-adapter-reference
  - id: windows-http-proxy-tunnel
    desc: Windows HTTP proxy tunnel support
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: proxy-env-stack
      - id: internet-settings-proxy-values
      - id: http-connect-host-tunnel
