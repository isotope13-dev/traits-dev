defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1090"
traits:
  - id: wintun-dll-reference
    desc: WinTun virtual adapter library reference
    crit: notable
    conf: 0.86
    if:
      type: string_value
      exact: "wintun.dll"
  - id: wintun-create-adapter
    desc: Create WinTun virtual network adapter
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: "WintunCreateAdapter"
  - id: tap0901-adapter-reference
    desc: TAP-Windows tap0901 adapter reference
    crit: notable
    conf: 0.86
    if:
      type: string_value
      exact: "tap0901"
composite_rules:
  - id: windows-virtual-tunnel-adapter
    desc: Windows virtual tunnel adapter support
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: wintun-dll-reference
      - id: wintun-create-adapter
      - id: tap0901-adapter-reference
