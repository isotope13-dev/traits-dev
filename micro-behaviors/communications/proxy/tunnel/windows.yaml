defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1090
traits:
  - id: wintun-dll-reference
    desc: WinTun virtual adapter library reference
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: wintun.dll
  - id: wintun-create-adapter
    desc: Create WinTun virtual network adapter
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: WintunCreateAdapter
  - id: tap0901-adapter-reference
    desc: TAP-Windows tap0901 adapter reference
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: tap0901
  - id: wintun-basename
    desc: WinTun library basename
    crit: baseline
    conf: 1.0
    if:
      type: basename
      exact: wintun.dll
composite_rules:
  - id: windows-virtual-tunnel-adapter
    desc: Windows virtual tunnel adapter support
    crit: suspicious
    conf: 0.9
    unless:
      - id: wintun-basename
    needs: 2
    any:
      - id: wintun-dll-reference
      - id: wintun-create-adapter
      - id: tap0901-adapter-reference
