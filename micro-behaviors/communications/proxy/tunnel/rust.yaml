defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1572
traits:
  - id: rust-ngrok-session-builder
    desc: Rust ngrok session builder
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: ngrok::Session::builder()
  - id: rust-ngrok-authtoken
    desc: Rust ngrok auth token setup
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: .authtoken(
  - id: rust-ngrok-http-endpoint
    desc: Rust ngrok HTTP endpoint
    crit: notable
    conf: 0.84
    if:
      type: kv
      path: source.imports
      exact: session.http_endpoint
  - id: rust-ngrok-listen-and-forward
    desc: Rust ngrok listen-and-forward tunnel
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: source.imports
      exact: session.http_endpoint.listen_and_forward
composite_rules:
  - id: rust-ngrok-http-tunnel
    desc: Rust ngrok reverse HTTP tunnel
    crit: suspicious
    conf: 0.94
    all:
      - id: rust-ngrok-session-builder
      - id: rust-ngrok-listen-and-forward
    any:
      - id: rust-ngrok-authtoken
      - id: rust-ngrok-http-endpoint
