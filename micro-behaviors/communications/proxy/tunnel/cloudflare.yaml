defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  attack: T1090
  crit: notable
  conf: 0.86

traits:
  - id: cloudflared-binary-name
    desc: cloudflared binary reference
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: cloudflared

  - id: cloudflared-tunnel-subcommand
    desc: cloudflared tunnel subcommand
    crit: component
    conf: 0.84
    if:
      type: literal
      kind: string
      exact: tunnel

  - id: cloudflared-url-flag
    desc: cloudflared URL forwarding flag
    crit: component
    conf: 0.84
    if:
      type: literal
      kind: string
      exact: --url

  - id: trycloudflare-domain
    desc: trycloudflare tunnel domain
    crit: notable
    conf: 0.86
    if:
      type: literal
      kind: string
      substr: trycloudflare

composite_rules:
  - id: cloudflared-local-service-tunnel
    desc: Cloudflared local service tunnel
    crit: notable
    conf: 0.9
    scope: leaf
    all:
      - id: cloudflared-binary-name
      - id: cloudflared-tunnel-subcommand
      - id: cloudflared-url-flag

