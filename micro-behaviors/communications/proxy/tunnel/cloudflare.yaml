defaults:
  platforms: [windows, unix]
  for: [shell, batch, powershell, python, javascript, go]
  attack: T1090
  crit: notable
  conf: 0.86

traits:
  - id: cloudflared-binary-name
    desc: cloudflared binary reference
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: cloudflared

  - id: cloudflared-tunnel-subcommand
    desc: cloudflared tunnel subcommand
    crit: component
    conf: 0.84
    if:
      type: literal
      kind: string
      exact: tunnel

  - id: cloudflared-url-flag
    desc: cloudflared URL forwarding flag
    crit: component
    conf: 0.84
    if:
      type: literal
      kind: string
      exact: --url

  - id: trycloudflare-domain
    desc: trycloudflare tunnel domain
    crit: notable
    conf: 0.86
    if:
      type: literal
      kind: string
      substr: trycloudflare
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: metadata/file/catalog/identity::public-suffix-list

  - id: cloudflared-node-package-require
    desc: Node cloudflared package import
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: 'require\s*\(\s*["'']cloudflared["'']\s*\)'

  - id: cloudflared-node-quick-tunnel-api
    desc: Node cloudflared quick tunnel API
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: 'Tunnel\.quick\s*\([\s\S]{0,80}localhost'

  - id: reverse-tunnel-term
    desc: Reverse-tunnel terminology
    crit: notable
    conf: 0.8
    for: [scripts]
    if:
      type: text
      regex: '(?i)\breverse[-_ ]+tunnel\b'
    unless:
      - id: well-known/app/skypilot::skypilot-source-file
      - id: metadata/library/runtime::legitimate-kubernetes-incluster-client-marker
      - id: metadata/package/testing/presence/harness::example-directory
      - id: metadata/package/testing/presence/harness::shell-example-directory

composite_rules:
  - id: cloudflared-local-service-tunnel
    desc: Cloudflared local service tunnel
    crit: notable
    conf: 0.9
    all:
      - id: cloudflared-binary-name
      - id: cloudflared-tunnel-subcommand
      - id: cloudflared-url-flag
  - id: cloudflared-node-quick-tunnel
    desc: Node cloudflared quick tunnel to localhost
    crit: notable
    conf: 0.9
    all:
      - id: cloudflared-node-package-require
      - id: cloudflared-node-quick-tunnel-api
