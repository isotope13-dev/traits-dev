defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: python-select-socket-multiplex
    desc: Python select-based socket multiplexing
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: select.select

composite_rules:
  - id: python-loopback-socket-bridge
    desc: Python loopback socket bridge
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/communications/ip/literal::loopback-ipv4-source
      - id: python-select-socket-multiplex
      - id: micro-behaviors/communications/socket/receive::socket-data-transfer
      # A bridge must accept an inbound peer before relaying traffic. A
      # client that merely uses select() to drain an instrument socket is not
      # a proxy/bridge.
      - id: micro-behaviors/communications/socket/connect::socket-accept-call
