defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: python-loopback-host-literal
    desc: Python hardcoded IPv4 loopback host
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: 127.0.0.1

  - id: python-select-socket-multiplex
    desc: Python select-based socket multiplexing
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: select.select

composite_rules:
  - id: python-loopback-socket-bridge
    desc: Python loopback socket bridge
    crit: notable
    conf: 0.95
    all:
      - id: python-loopback-host-literal
      - id: python-select-socket-multiplex
      - id: micro-behaviors/communications/socket/receive::socket-data-transfer
