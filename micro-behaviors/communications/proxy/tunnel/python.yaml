defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: pyngrok-import
    desc: Imports Python pyngrok tunnel library
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: import
      exact: pyngrok

  - id: pyngrok-install-ngrok
    desc: Installs ngrok through pyngrok
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: ngrok.install_ngrok

  - id: ngrok-free-dev-endpoint
    desc: Uses ngrok-free.dev public endpoint
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      regex: '\.ngrok-free\.dev\b'

composite_rules:
  - id: python-ngrok-public-tunnel
    desc: Python ngrok public tunnel
    crit: notable
    conf: 0.96
    all:
      - id: pyngrok-import
      - id: pyngrok-install-ngrok
      - id: ngrok-free-dev-endpoint

  - id: python-loopback-socket-bridge
    desc: Python loopback socket bridge
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/communications/ip/literal::loopback-ipv4-source
      - id: micro-behaviors/os/event/kernel/select::python-select-call
      - id: micro-behaviors/communications/socket/receive::socket-data-transfer
      # A bridge must accept an inbound peer before relaying traffic. A
      # client that merely uses select() to drain an instrument socket is not
      # a proxy/bridge.
      - id: micro-behaviors/communications/socket/connect::socket-accept-call
