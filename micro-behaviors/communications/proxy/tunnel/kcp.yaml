defaults:
  platforms: [linux, macos]
  for: [go, elf, macho]
  attack: T1572
  mbc: C0001

traits:
  - id: go-kcp-tunnel-client-call
    desc: Go KCP tunnel client call
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: transport.KCPTunClient

  - id: go-kcp-tunnel-client-text
    desc: Go KCP tunnel client reference
    crit: component
    conf: 0.72
    if:
      type: text
      substr: KCPTunClient

composite_rules:
  - id: go-kcp-tunnel-client
    desc: Go KCP tunnel client
    crit: notable
    conf: 0.84
    any:
      - id: go-kcp-tunnel-client-call
      - id: go-kcp-tunnel-client-text
