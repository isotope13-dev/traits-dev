defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, go]
  attack: T1090
traits:
  - id: go-tunnel-type
    desc: Go tunnel type reference
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\*tunnel\.(Tunnel|Config|Proxy|sshTunnel|udpConn|udpListener)\b'
  - id: go-tunnel-close
    desc: Go tunnel close routine
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: CloseTunnel
  - id: go-tunnel-listen
    desc: Go tunnel listen routine
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: listenTunnel
  - id: go-forward-loop
    desc: Go forwarding loop routine
    crit: notable
    conf: 0.72
    if:
      type: text
      substr: forwardLoop
  - id: go-forward-dial
    desc: Go forwarding dial routine
    crit: notable
    conf: 0.72
    if:
      type: text
      substr: forwardDial
  - id: go-socks-handler
    desc: Go SOCKS handler routine
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: handleSocks
  - id: go-socks-config-type
    desc: Go SOCKS config type
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\*socks5\.(Config|Server|Request|RuleSet|Authenticator)\b'
  - id: go-socks-config-name
    desc: Go SOCKS config name
    crit: notable
    conf: 0.72
    if:
      type: text
      word: SocksConfig
  - id: go-websocket-handler
    desc: Go WebSocket handler routine
    crit: notable
    conf: 0.78
    if:
      type: text
      substr: handleWebsocket
  - id: go-websocket-conn-type
    desc: Go WebSocket connection type
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\*websocket\.(Conn|Dialer|proxy_Dialer|proxy_socks5)\b'
  - id: go-ngrok-agent-type
    desc: Go ngrok agent type
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\*ngrok\.(Agent|Dialer|Endpoint|Upstream|AgentSession|EndpointListener)\b'
  - id: go-ngrok-config-type
    desc: Go ngrok config type
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\*config\.Ngrok(Config|Account)\b'
  - id: go-ngrok-config-name
    desc: Go ngrok config name
    crit: notable
    conf: 0.74
    if:
      type: text
      regex: '\bNgrok(Config|Account)\b'
  - id: go-websocket-tcp-converter
    desc: Go WebSocket TCP converter
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: WebsocketTCPConverter
  - id: reverse-port-forwarding-help
    desc: Reverse port forwarding help
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: reverse port forwarding
  - id: reverse-socks-remote-help
    desc: Reverse SOCKS remote syntax
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bR(:[0-9]+)?:socks\b'
  - id: ssh-proxycommand-tunnel-help
    desc: SSH ProxyCommand tunnel help
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: 'ssh -o ProxyCommand=.{0,160}\btunnel\b'

composite_rules:
  - id: go-tunnel-forwarding
    desc: Go tunnel forwarding implementation
    crit: notable
    conf: 0.82
    any:
      - id: go-tunnel-type
      - id: go-tunnel-close
      - id: go-tunnel-listen
      - id: go-forward-loop
      - id: go-forward-dial
    needs: 2
  - id: go-socks-websocket-bridge
    desc: Go SOCKS WebSocket bridge
    crit: notable
    conf: 0.86
    any:
      - id: go-socks-handler
      - id: go-socks-config-type
      - id: go-socks-config-name
      - id: go-websocket-handler
      - id: go-websocket-conn-type
      - id: go-websocket-tcp-converter
    needs: 3
  - id: go-ngrok-tunnel-stack
    desc: Go ngrok tunnel stack
    crit: notable
    conf: 0.86
    any:
      - id: go-ngrok-agent-type
      - id: go-ngrok-config-type
      - id: go-ngrok-config-name
      - id: go-tunnel-forwarding
      - id: go-socks-websocket-bridge
    needs: 2
  - id: go-reverse-socks-tunnel-help
    desc: Go reverse SOCKS tunnel help
    crit: notable
    conf: 0.88
    any:
      - id: reverse-port-forwarding-help
      - id: reverse-socks-remote-help
      - id: ssh-proxycommand-tunnel-help
      - id: go-socks-config-name
    needs: 2
