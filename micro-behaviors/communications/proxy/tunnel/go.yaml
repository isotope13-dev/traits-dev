defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, go]
  attack: T1090
traits:
- id: go-tunnel-type--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\*tunnel\.(Tunnel|Config)\b'
  count_max: 1014844
- id: go-tunnel-type--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\*tunnel\.(Proxy|sshTunnel)\b'
  count_max: 1014845
- id: go-tunnel-type--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\*tunnel\.(udpConn|udpListener)\b'
  count_max: 1014846
- id: go-tunnel-close
  desc: Go tunnel close routine
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: CloseTunnel
- id: go-tunnel-listen
  desc: Go tunnel listen routine
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: listenTunnel
- id: go-forward-loop
  desc: Go forwarding loop routine
  crit: notable
  conf: 0.72
  if:
    type: text
    substr: forwardLoop
- id: go-forward-dial
  desc: Go forwarding dial routine
  crit: notable
  conf: 0.72
  if:
    type: text
    substr: forwardDial
- id: go-socks-handler
  desc: Go SOCKS handler routine
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: handleSocks
- id: go-socks-config-type--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\*socks5\.(Config|Server)\b'
  count_max: 1014852
- id: go-socks-config-type--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\*socks5\.(Request|RuleSet)\b'
  count_max: 1014853
- id: go-socks-config-type--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\*socks5\.(Authenticator)\b'
  count_max: 1014854
- id: go-socks-config-name
  desc: Go SOCKS config name
  crit: notable
  conf: 0.72
  if:
    type: text
    word: SocksConfig
- id: go-websocket-handler
  desc: Go WebSocket handler routine
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: handleWebsocket
- id: go-ngrok-agent-type--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.78
  if:
    type: text
    regex: '\*ngrok\.(Agent|Dialer)\b'
  count_max: 1014858
- id: go-ngrok-agent-type--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.78
  if:
    type: text
    regex: '\*ngrok\.(Endpoint|Upstream)\b'
  count_max: 1014859
- id: go-ngrok-agent-type--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.78
  if:
    type: text
    regex: '\*ngrok\.(AgentSession|EndpointListener)\b'
  count_max: 1014860
- id: go-ngrok-config-type
  desc: Go ngrok config type
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: '\*config\.Ngrok(Config|Account)\b'
- id: go-ngrok-config-name
  desc: Go ngrok config name
  crit: notable
  conf: 0.74
  if:
    type: text
    regex: '\bNgrok(Config|Account)\b'
- id: go-websocket-tcp-converter
  desc: Go WebSocket TCP converter
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: WebsocketTCPConverter
- id: reverse-port-forwarding-help
  desc: Reverse port forwarding help
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: reverse port forwarding
- id: reverse-socks-remote-help
  desc: Reverse SOCKS remote syntax
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: '\bR(:[0-9]+)?:socks\b'
- id: ssh-proxycommand-tunnel-help
  desc: SSH ProxyCommand tunnel help
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: 'ssh -o ProxyCommand=.{0,160}\btunnel\b'

- id: go-socks-proxy-module
  desc: Go SOCKS proxy implementation marker
  crit: notable
  conf: 0.9
  attack: T1090.001
  if:
    type: text
    regex: '\b(socks5Quick|socksProxy)\b|\bproxy/socks\b'

- id: go-port-forward-inforward
  desc: Go inForward port forwarding module
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'inForward\.(Start|Stop|addTask)'

- id: go-port-forward-portforward
  desc: Go portForward module
  crit: notable
  conf: 0.9
  if:
    type: text
    word: portForward

- id: go-port-forward-tunnelforward
  desc: Go tunnelForward module
  crit: notable
  conf: 0.9
  if:
    type: text
    word: tunnelForward

- id: go-yamux-multiplexed-transport
  desc: Go yamux stream multiplexer
  crit: notable
  conf: 0.9
  for: [elf, macho, go]
  if:
    type: text
    substr: github.com/hashicorp/yamux
- id: go-relay-discovery-routine
  desc: Go relay endpoint discovery
  crit: notable
  conf: 0.88
  for: [elf, macho, go]
  if:
    type: text
    regex: '(?i)(relay\.(Discover|ParseURL)|relay discovery|discover[^\n]{0,32}relay)'
- id: go-bidirectional-network-copy
  desc: Bidirectional Go network copy
  crit: notable
  conf: 0.86
  for: [elf, macho, go]
  if:
    type: text
    substr: CopyBidirectional

composite_rules:
- id: go-tunnel-forwarding
  desc: Go tunnel forwarding implementation
  crit: notable
  conf: 0.82
  any:
  - id: go-tunnel-type
  - id: go-tunnel-close
  - id: go-tunnel-listen
  - id: go-forward-loop
  - id: go-forward-dial
  needs: 2
- id: go-socks-websocket-bridge
  desc: Go SOCKS WebSocket bridge
  crit: notable
  conf: 0.86
  any:
  - id: go-socks-handler
  - id: go-socks-config-type
  - id: go-socks-config-name
  - id: go-websocket-handler
  - id: micro-behaviors/communications/websocket/library::go-websocket-conn-type
  - id: go-websocket-tcp-converter
  needs: 3
- id: go-ngrok-tunnel-stack
  desc: Go ngrok tunnel stack
  crit: notable
  conf: 0.86
  any:
  - id: go-ngrok-agent-type
  - id: go-ngrok-config-type
  - id: go-ngrok-config-name
  - id: go-tunnel-forwarding
  - id: go-socks-websocket-bridge
  needs: 2
- id: go-reverse-socks-tunnel-help
  desc: Go reverse SOCKS tunnel help
  crit: notable
  conf: 0.88
  any:
  - id: reverse-port-forwarding-help
  - id: reverse-socks-remote-help
  - id: ssh-proxycommand-tunnel-help
  - id: go-socks-config-name
  needs: 2
- id: go-tunnel-type
  desc: Go tunnel type reference
  crit: notable
  conf: 0.75
  any:
  - id: go-tunnel-type--rx-1
  - id: go-tunnel-type--rx-2
  - id: go-tunnel-type--rx-3
- id: go-socks-config-type
  desc: Go SOCKS config type
  crit: notable
  conf: 0.75
  any:
  - id: go-socks-config-type--rx-4
  - id: go-socks-config-type--rx-5
  - id: go-socks-config-type--rx-6
- id: go-ngrok-agent-type
  desc: Go ngrok agent type
  crit: notable
  conf: 0.78
  any:
  - id: go-ngrok-agent-type--rx-7
  - id: go-ngrok-agent-type--rx-8
  - id: go-ngrok-agent-type--rx-9

- id: go-port-forward-module
  desc: Go port forwarding module
  crit: notable
  conf: 0.9
  any:
  - id: go-port-forward-inforward
  - id: go-port-forward-direct

- id: go-port-forward-direct
  desc: Go portForward or tunnelForward module
  crit: notable
  conf: 0.9
  any:
  - id: go-port-forward-portforward
  - id: go-port-forward-tunnelforward
- id: go-relay-tunnel-stack
  desc: Go relay tunnel with multiplexed or bidirectional stream transport
  crit: notable
  conf: 0.92
  for: [elf, macho, go]
  all:
  - id: go-yamux-multiplexed-transport
  any:
  - id: go-relay-discovery-routine
  - id: go-bidirectional-network-copy
