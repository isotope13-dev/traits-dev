defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
    - python
  attack: T1090
traits:
  - id: dev-tun
    desc: /dev/tun device
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: /dev/tun
  - id: dev-tap
    desc: /dev/tap device
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: /dev/tap
  - id: tunsetiff-ioctl
    desc: TUNSETIFF ioctl
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: TUNSETIFF
composite_rules:
  - id: tun
    desc: TUN/TAP device usage
    crit: notable
    conf: 0.66
    any:
      - id: dev-tun
      - id: dev-tap
      - id: tunsetiff-ioctl
