# Java WebSocket TCP Tunnel Patterns
# Detects AsynchronousSocketChannel + WebSocket for TCP proxy/tunnel
# MBC: C0003 (IPC/Tunneling)
# ATT&CK: T1090 (Proxy)
defaults:
  platforms: [windows, unix]
  for: [python, java, class]
  mbc: C0003
  attack: T1090

traits:
  - id: async-socket-channel
    desc: Java AsynchronousSocketChannel usage
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: AsynchronousSocketChannel

  - id: inet-socket-address
    desc: Java InetSocketAddress reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: InetSocketAddress

  - id: byte-buffer-allocate
    desc: Java ByteBuffer.allocate() usage
    crit: component
    conf: 0.5
    if:
      type: text
      substr: ByteBuffer.allocate

  - id: completion-handler
    desc: Java CompletionHandler usage
    crit: component
    conf: 0.7
    if:
      type: text
      substr: CompletionHandler

  - id: byte-output-stream
    desc: Java ByteArrayOutputStream usage
    crit: component
    conf: 0.5
    if:
      type: text
      substr: ByteArrayOutputStream

composite_rules:
  - id: java-websocket-tcp-tunnel
    desc: Java WebSocket TCP tunnel pattern
    crit: suspicious
    conf: 0.9
    scope: leaf
    all:
      - id: async-socket-channel
      - id: completion-handler
      - id: micro-behaviors/communications/http/websocket::websocket-headers
    any:
      - id: byte-buffer-allocate
      - id: byte-output-stream
      - id: inet-socket-address
