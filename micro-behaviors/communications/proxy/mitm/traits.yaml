defaults:
  platforms: [unix, windows]
  for: [python, shell, dockerfile, pkginfo, markdown]
  crit: notable
  conf: 0.9

traits:
- id: proxy-ca-module-marker
  desc: Proxy CA module marker
  crit: notable
  conf: 0.92
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    regex: '(?i)\bproxy_ca\b'
- id: https-interception-marker
  desc: HTTPS interception marker
  crit: notable
  conf: 0.94
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    regex: '(?i)intercepting\s+https\b'
- id: custom-upstream-marker
  desc: Custom upstream marker
  crit: notable
  conf: 0.9
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    regex: '(?i)custom\s+upstream\b'
- id: mitmproxy-ca-cert
  desc: mitmproxy CA certificate path
  if:
    type: text
    substr: mitmproxy-ca-cert.pem

- id: mitmproxy-python-import
  desc: mitmproxy Python import
  for: [python]
  if:
    type: import
    substr: mitmproxy
- id: mitmproxy-command--mitmproxy
  desc: mitmproxy command invocation (mitmproxy)
  if:
    type: text
    word: mitmproxy
- id: mitmproxy-command--mitmdump
  desc: mitmproxy command invocation (mitmdump)
  if:
    type: text
    word: mitmdump
composite_rules:
- id: mitmproxy-command
  desc: mitmproxy command invocation
  any:
  - id: mitmproxy-command--mitmproxy
  - id: mitmproxy-command--mitmdump
