defaults:
  platforms: [unix, windows]
  for: [python, shell, dockerfile, pkginfo, markdown]
  crit: notable
  conf: 0.9

traits:
- id: mitmproxy-ca-cert
  desc: mitmproxy CA certificate path
  if:
    type: text
    substr: mitmproxy-ca-cert.pem

- id: mitmproxy-python-import
  desc: mitmproxy Python import
  for: [python]
  if:
    type: import
    substr: mitmproxy
- id: mitmproxy-command--mitmproxy
  desc: mitmproxy command invocation (mitmproxy)
  if:
    type: text
    word: mitmproxy
- id: mitmproxy-command--mitmdump
  desc: mitmproxy command invocation (mitmdump)
  if:
    type: text
    word: mitmdump
composite_rules:
- id: mitmproxy-command
  desc: mitmproxy command invocation
  any:
  - id: mitmproxy-command--mitmproxy
  - id: mitmproxy-command--mitmdump
