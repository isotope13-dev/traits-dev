# SOCKS proxy implementation in C source code
# Backdoor component of worms (Mydoom xproxy)
defaults:
  for: [c, cpp]
  platforms: [windows, unix]
traits:
  - id: socks4-header-struct
    desc: SOCKS4 header struct definition
    crit: notable
    conf: 0.93
    if:
      type: text
      word: "socks4_header"
  - id: socks4-constants
    desc: SOCKS4 protocol constants
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: "SOCKS4_(SUCCEEDED|REJECTED)"
  - id: socks-relay-function
    desc: SOCKS relay function
    crit: notable
    conf: 0.9
    if:
      type: text
      word: "relay_socks"
  - id: socks-server-function
    desc: SOCKS server function
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "socks4_(server|main|client)"
composite_rules:
  - id: socks4-proxy-implementation
    desc: SOCKS4 proxy in C source
    crit: suspicious
    conf: 0.95
    attack: T1090
    any:
      - id: socks4-header-struct
      - id: socks4-constants
    all:
      - id: socks-server-function
