defaults:
  platforms:
    - unix
    - windows
    - android
  for: [scripts, binaries]
  mbc: C0001
  attack: T1090
traits:
  - id: socks4a-proto
    desc: SOCKS4a protocol string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: socks4a
  - id: socks4-proto
    desc: SOCKS4 protocol reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SOCKS4
  - id: socks5-proto
    desc: SOCKS5 protocol reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SOCKS5
  - id: socks5-string
    desc: socks5 string
    crit: notable
    conf: 0.5
    count_min: 2
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]package\.json$
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
    if:
      type: text
      word: socks5
  - id: socks5-server-symbol
    desc: SOCKS5 server function symbol
    crit: notable
    conf: 0.9
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: socks5_server
  - id: socks4-string
    desc: socks4 string
    crit: notable
    conf: 0.5
    if:
      type: text
      word: socks4
  - id: socks-url
    desc: SOCKS URL scheme
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: socks://
  - id: socks-port-context
    desc: SOCKS/proxy context with port 1080
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (socks|proxy)[:/].{0,30}1080
      case_insensitive: true
  - id: socks-port-literal
    desc: Literal :1080 port token
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: :1080(\b|$)
      case_insensitive: true
  - id: socks-port-keyvalue
    desc: Key/value port assignment to 1080
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: port[=:\s]+1080
      case_insensitive: true
  - id: curl-socks5-hostname
    desc: curl SOCKS5 hostname proxy
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: \bcurl\b.{0,120}--socks5-hostname\b
      case_insensitive: true
composite_rules:
  - id: socks
    desc: SOCKS proxy usage
    crit: notable
    conf: 0.66
    any:
      - id: socks4-proto
      - id: socks5-proto
      - id: socks5-string
      - id: socks5-server-symbol
      - id: socks4-string
      - id: socks-url
      - id: curl-socks5-hostname
      - id: socks-port
  - id: socks-port
    desc: SOCKS port 1080 reference
    crit: notable
    conf: 0.5
    any:
      - id: socks-port-context
      - id: socks-port-literal
      - id: socks-port-keyvalue
