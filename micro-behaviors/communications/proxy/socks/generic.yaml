defaults:
  platforms:
    - unix
    - windows
    - android
  for: [scripts, binaries]
  mbc: C0001
  attack: T1090
traits:
  - id: tor-socks-proxy-port
    desc: Local Tor SOCKS proxy port reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\b(127\.0\.0\.1|localhost):905[01]\b'
  - id: socks4a-proto
    desc: SOCKS4a protocol string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: socks4a
  - id: socks4-proto
    desc: SOCKS4 protocol reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SOCKS4
  - id: socks5-proto
    desc: SOCKS5 protocol reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SOCKS5
  - id: socks5-string
    desc: "SOCKS5 proxy protocol marker"
    crit: notable
    conf: 0.5
    count_min: 2
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]package\.json$
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
    if:
      type: text
      word: socks5
  - id: socks5h-proto
    desc: SOCKS5h protocol string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: socks5h
  - id: socks5h-url-source
    desc: SOCKS5h proxy URL in Rust
    crit: notable
    conf: 0.86
    for: [rust]
    if:
      type: text
      substr: socks5h://
  - id: socks5-server-symbol
    desc: SOCKS5 server function symbol
    crit: notable
    conf: 0.9
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: socks5_server
  - id: socks4-string
    desc: "SOCKS4 proxy protocol marker"
    crit: notable
    conf: 0.5
    if:
      type: text
      word: socks4
  - id: socks-url
    desc: SOCKS URL scheme
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: socks://
  - id: socks-port-context
    desc: SOCKS/proxy context with port 1080
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (socks|proxy)[:/].{0,30}1080
      case_insensitive: true
  - id: socks-port-literal
    desc: SOCKS URL uses port 1080
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '\bsocks(4|5|5h)?://[^[:space:]"'']{1,80}:1080\b'
      case_insensitive: true
    unless:
      - id: well-known/lib/regula-facesdk/
  - id: socks-port-keyvalue
    desc: Key/value port assignment to 1080
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: port[=:\s]+1080
      case_insensitive: true
  - id: socks-server-ref
    desc: SOCKS server terminology
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: socks server
      case_insensitive: true
    not:
      - regex: (?i)socks server (sent|reported|refused|wanted|asked)
      - regex: (?i)can't complete socks[45]? connection
      - regex: (?i)request rejected
  - id: curl-socks5-hostname
    desc: curl SOCKS5 hostname proxy
    crit: notable
    conf: 0.78
    for: [shell, scripts, binaries]
    if:
      type: text
      regex: \bcurl\b.{0,120}--socks5-hostname\b
      case_insensitive: true
  - id: shell-socks5-proxy-variable
    desc: Shell variable stores SOCKS5 proxy option
    crit: notable
    conf: 0.82
    for: [shell]
    if:
      type: text
      regex: '\b[A-Za-z_][A-Za-z0-9_]*\s*=\s*["'']?[^"\n]{0,120}--socks5-hostname\b'
      case_insensitive: true
  # SOCKS-tunnel command verbs used by backdoors that proxy traffic over their
  # C2 channel (e.g. BurrowShell, SNOWGLAZE). Generic across families.
  - id: socks-connect-command
    desc: socks_connect tunnel command verb
    crit: notable
    conf: 0.6
    if:
      type: text
      word: socks_connect
  - id: socks-data-command
    desc: socks_data tunnel command verb
    crit: notable
    conf: 0.6
    if:
      type: text
      word: socks_data
  - id: socks-close-command
    desc: socks_close tunnel command verb
    crit: notable
    conf: 0.6
    if:
      type: text
      word: socks_close
composite_rules:
  - id: socks
    desc: SOCKS proxy usage
    crit: notable
    conf: 0.66
    any:
      - id: socks4-proto
      - id: socks5-proto
      - id: socks5-string
      - id: socks5h-proto
      - id: socks5-server-symbol
      - id: socks4-string
      - id: socks-url
      - id: socks-server-ref
      - id: curl-socks5-hostname
      - id: socks-port
  - id: socks-port
    desc: SOCKS port 1080 reference
    crit: notable
    conf: 0.5
    any:
      - id: socks-port-context
      - id: socks-port-literal
      - id: socks-port-keyvalue
    unless:
      - id: well-known/lib/regula-facesdk/
