# SOCKS5 wire-format opcode byte patterns. These atoms are deliberately
# narrow — they detect the protocol's literal request bytes (RFC 1928)
# and have no standalone signal. They are FP-prone in any large binary
# (only 3 bytes wide) and gain meaning only inside composites that gate
# on a SOCKS-related string or socket-server API surface.
defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
traits:
  - id: socks5-version-greeting-bytes
    desc: SOCKS5 no-auth handshake bytes
    crit: component
    conf: 0.9
    if:
      type: hex
      pattern: "05 01 00 05 00 00"
      section: text
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - type: section
        exact: .modinfo
  - id: socks5-bind-command-byte
    desc: SOCKS5 BIND wildcard-address request
    crit: component
    conf: 0.6
    if:
      type: hex
      pattern: "05 02 00 01 00 00 00 00 00 00"
      section: text
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - type: section
        exact: .modinfo
  - id: socks5-udp-associate-byte
    desc: SOCKS5 UDP wildcard-address request
    crit: component
    conf: 0.6
    if:
      type: hex
      pattern: "05 03 00 01 00 00 00 00 00 00"
      section: text
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - type: section
        exact: .modinfo
