# C# SOCKS5 proxy implementation patterns
defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: socks5-auth-version
    desc: SOCKS5 version byte check
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'AuthData\[\d\]\s*==?\s*5'
  - id: socks5-bidirectional
    desc: Bidirectional socket relay (InSocket/OutSocket)
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'this\.InSocket\.'
  - id: socks5-address-parse
    desc: SOCKS5 IPv4 address parsing from bytes
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'AuthData\[\d\]\.ToString\(\)\s*\+'
  - id: socks5-class
    desc: SOCKS5 class implementation
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'class\s+Socks5'
composite_rules:
  - id: socks5-proxy-impl
    desc: SOCKS5 proxy server implementation
    crit: suspicious
    conf: 0.93
    any:
      - id: socks5-auth-version
      - id: socks5-bidirectional
      - id: socks5-address-parse
      - id: socks5-class
    needs: 2
