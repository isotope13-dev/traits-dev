# Generic Proxy Features
# ATT&CK: T1090 (Proxy)
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: proxy-func
    desc: Proxy function reference (potential proxying
    crit: notable
    conf: 0.5
    attack: "T1090"
    if:
      type: string_value
      word: "ProxyFunc"
  - id: armon-go-socks5
    desc: Uses github.com/armon/go-socks5 library
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "github.com/armon/go-socks5"
