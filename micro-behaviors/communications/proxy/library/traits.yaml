defaults:
  platforms:
    - unix
    - windows
    - android
  for: [scripts, binaries]
traits:
  - id: proxy-func
    desc: Proxy function reference (potential proxying
    crit: notable
    conf: 0.5
    attack: T1090
    if:
      type: text
      word: ProxyFunc
    unless:
      - type: text
        substr: envProxyFunc
      - type: text
        substr: httpproxy.(*Config).ProxyFunc
  - id: armon-go-socks5
    desc: Uses github.com/armon/go-socks5 library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: github.com/armon/go-socks5
  - id: macos-system-proxy-config
    desc: Reads macOS system proxy settings
    crit: notable
    conf: 0.92
    platforms:
      - macos
    for:
      - macho
      - dylib
    if:
      type: symbol
      exact: SCDynamicStoreCopyProxies
  - id: macos-proxy-keys
    desc: macOS HTTP proxy keys
    crit: baseline
    conf: 0.85
    platforms:
      - macos
    for:
      - macho
      - dylib
    count_min: 4
    if:
      type: symbol
      regex: ^kSCPropNetProxies(HTTP|HTTPS)
