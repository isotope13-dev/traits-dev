defaults:
  platforms:
    - unix
    - windows
    - android
  for: [scripts, binaries]
traits:
  - id: proxy-func
    desc: Proxy function reference (potential proxying
    crit: notable
    conf: 0.5
    attack: T1090
    if:
      type: text
      word: ProxyFunc
    unless:
      - type: text
        substr: envProxyFunc
      - type: text
        substr: httpproxy.(*Config).ProxyFunc
  - id: armon-go-socks5
    desc: Uses github.com/armon/go-socks5 library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: github.com/armon/go-socks5
