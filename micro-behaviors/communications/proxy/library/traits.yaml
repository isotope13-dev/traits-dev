defaults:
  platforms:
    - unix
    - windows
    - android
  for: [scripts, binaries]
traits:
  - id: scramjet-client-token
    desc: References ScramjetClient proxy runtime
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: ScramjetClient
  - id: scramjet-client-name-token
    desc: References Scramjet client-name runtime
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: SCRAMJETCLIENTNAME
  - id: scramjet-fetch-handler-token
    desc: References Scramjet proxy fetch handler
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: ScramjetFetchHandler
  - id: libcurl-js-runtime
    desc: Includes libcurl.js browser transport
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: libcurl.js
  - id: websocket-proxy-runtime
    desc: Configures WebSocket proxy transport
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: 'websocket proxy (url|transport)|set_websocket'
  - id: proxy-func
    desc: Proxy function reference (potential proxying
    crit: notable
    conf: 0.5
    attack: T1090
    if:
      type: text
      word: ProxyFunc
    unless:
      - type: text
        substr: envProxyFunc
      - type: text
        substr: httpproxy.(*Config).ProxyFunc
  - id: armon-go-socks5
    desc: Uses github.com/armon/go-socks5 library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: github.com/armon/go-socks5
  - id: macos-system-proxy-config
    desc: Reads macOS system proxy settings
    crit: notable
    conf: 0.92
    platforms:
      - macos
    for:
      - macho
      - dylib
    if:
      type: symbol
      exact: SCDynamicStoreCopyProxies
  - id: macos-proxy-keys
    desc: macOS HTTP proxy keys
    crit: notable
    conf: 0.85
    platforms:
      - macos
    for:
      - macho
      - dylib
    count_min: 4
    if:
      type: symbol
      regex: ^kSCPropNetProxies(HTTP|HTTPS)
  - id: macos-networksetup-set-web-proxy
    desc: macOS networksetup web proxy configuration
    crit: notable
    conf: 0.9
    attack: T1090
    platforms:
      - macos
    for:
      - shell
      - python
      - ruby
      - applescript
    if:
      type: text
      regex: networksetup\s+-set(secure)?webproxy
  - id: dotnet-webbrowserproxy-class
    desc: .NET WebBrowserProxy helper class
    crit: component
    conf: 0.82
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: WebBrowserProxy
  - id: dotnet-set-connection-proxy
    desc: .NET sets system connection proxy
    crit: component
    conf: 0.86
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: SetConnectionProxy
  - id: dotnet-restore-system-proxy
    desc: .NET restores system proxy settings
    crit: component
    conf: 0.84
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: RestoreSystemProxy
  - id: dotnet-proxy-address-property
    desc: .NET proxy address property
    crit: component
    conf: 0.76
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: ProxyAddress
  - id: dotnet-proxied-tcpclient
    desc: .NET proxied TCP client helper
    crit: notable
    conf: 0.84
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: ProxiedTcpClient
composite_rules:
  - id: scramjet-browser-proxy
    desc: Includes Scramjet browser proxy runtime
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    any:
      - id: scramjet-client-token
      - id: scramjet-client-name-token
      - id: scramjet-fetch-handler-token
  - id: dotnet-system-proxy-modification
    desc: .NET system proxy modification helpers
    crit: suspicious
    conf: 0.86
    platforms:
      - windows
    for:
      - pe
      - dll
    all:
      - id: dotnet-webbrowserproxy-class
    any:
      - id: dotnet-set-connection-proxy
      - id: dotnet-restore-system-proxy
      - id: dotnet-proxy-address-property
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
