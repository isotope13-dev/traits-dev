defaults:
  platforms: [unix, windows]
  for: [scripts, binaries, python, pyc]
  attack: T1090.003
  mbc: C0001

traits:
  - id: onion-domain-reference
    desc: Tor onion hidden-service domain reference
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b[a-z2-7]{16,56}\.onion\b'
