# Proxy authentication configuration is a neutral capability.  It becomes
# security-relevant only when an objective-level rule combines it with an
# actual tunnel or relay implementation.
defaults:
  platforms: [unix, windows]
  for: [python]

traits:
- id: proxy-credential-literal-assignment
  desc: Literal Python proxy credential assignment
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bproxy_(user(name)?|pass(word)?)\s*[:=]\s*["\x27][^"\x27\r\n]{4,}["\x27]'
