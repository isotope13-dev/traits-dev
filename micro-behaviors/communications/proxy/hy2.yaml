defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
  attack: T1090

traits:
  - id: hy2-uri
    desc: Hysteria v2 proxy URI
    if:
      type: string_value
      regex: "hy2://"
  - id: hysteria-v2-binary
    desc: Hysteria v2 proxy reference
    if:
      type: string_value
      word: "hysteria"
