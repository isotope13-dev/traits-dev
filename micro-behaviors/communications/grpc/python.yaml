defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.86
  mbc: C0002

traits:
  - id: grpc-python-import
    desc: Imports Python gRPC module
    if:
      type: import
      regex: '(^|\.)grpc(\.|$)'

  - id: grpc-aio-channel
    desc: Python gRPC aio channel
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '^grpc\.aio\.(insecure_)?channel$'

  - id: grpc-insecure-channel
    desc: Python gRPC insecure channel
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: grpc.insecure_channel

  - id: grpc-method-handler
    desc: Python gRPC method handler
    conf: 0.86
    if:
      type: symbol
      kind: call
      regex: '^grpc\.(unary_unary|unary_stream|stream_unary|stream_stream)_rpc_method_handler$'

  - id: grpc-generated-stub
    desc: Python gRPC generated stub
    conf: 0.94
    if:
      type: text
      substr: Generated by the gRPC Python protocol compiler
  - id: grpc-stub-filename-reference
    desc: References Python gRPC stub filename
    conf: 0.84
    if:
      type: text
      regex: '_pb2_grpc\.py\b'

  - id: device-reboot-rpc
    desc: Device reboot RPC method
    conf: 0.86
    if:
      type: text
      regex: 'make_request\(\s*["'']reboot["'']'

  - id: device-shutdown-rpc
    desc: Device shutdown RPC method
    conf: 0.86
    if:
      type: text
      regex: 'make_request\(\s*["'']shutdown["'']'

  - id: device-scheduled-power-rpc
    desc: Device scheduled power RPC method
    conf: 0.84
    if:
      type: text
      regex: 'make_request\(\s*["'']schedule(Start|Shut)down["'']'

  - id: device-firmware-load-rpc
    desc: Device firmware load RPC method
    conf: 0.86
    if:
      type: text
      regex: 'make_request\(\s*["'']load(Firmware|Bootloader)["'']'

composite_rules:
  - id: grpc-python-client
    desc: Python gRPC client
    crit: notable
    conf: 0.92
    all:
      - id: grpc-python-import
    any:
      - id: grpc-aio-channel
      - id: grpc-insecure-channel

  - id: grpc-python-service
    desc: Python gRPC service bindings
    crit: notable
    conf: 0.9
    all:
      - id: grpc-python-import
    any:
      - id: grpc-method-handler
      - id: grpc-generated-stub
      - id: grpc-stub-filename-reference
