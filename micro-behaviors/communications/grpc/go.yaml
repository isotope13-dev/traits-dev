# gRPC client/server in Go (google.golang.org/grpc).
#
# gRPC is HTTP/2-based RPC, ubiquitous in modern microservices. Detection
# proceeds from import + the canonical entry points: NewClient/Dial on the
# client side, NewServer + Serve on the server side. The library's package
# path is stable (`google.golang.org/grpc`) so substring match on the import
# string is highly precise.
defaults:
  platforms: [unix, windows]
  for: [go, go.mod]
  mbc: C0002
traits:
  - id: grpc-go-import
    desc: Imports google.golang.org/grpc package
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'google.golang.org/grpc'

  - id: grpc-go-new-client
    desc: gRPC NewClient call
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\bgrpc\.NewClient\s*\('

  - id: grpc-go-dial
    desc: gRPC Dial (legacy client constructor)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bgrpc\.Dial\s*\('

  - id: grpc-go-new-server
    desc: gRPC NewServer call
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bgrpc\.NewServer\s*\('

  - id: grpc-go-insecure-credentials
    desc: Go gRPC insecure transport credentials
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\binsecure\.NewCredentials\s*\('

  - id: grpc-go-serve
    desc: gRPC Server.Serve call
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\.Serve\s*\(\s*lis\w*\s*\)'

composite_rules:
  - id: grpc-go-client
    desc: Go process is a gRPC client
    crit: notable
    conf: 0.95
    all:
      - id: grpc-go-import
    any:
      - id: grpc-go-new-client
      - id: grpc-go-dial

  - id: grpc-go-server
    desc: Go process is a gRPC server
    crit: notable
    conf: 0.95
    all:
      - id: grpc-go-import
      - id: grpc-go-new-server
    any:
      - id: grpc-go-serve
      - id: grpc-go-new-server

  - id: grpc-go-insecure-transport
    desc: Go gRPC insecure transport
    crit: notable
    conf: 0.92
    all:
      - id: grpc-go-import
      - id: grpc-go-insecure-credentials
