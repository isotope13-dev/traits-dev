defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: terraform-plugin-go-import
    desc: Terraform plugin Go import
    if:
      type: text
      substr: "github.com/hashicorp/terraform-plugin-go"
  - id: terraform-go-plugin-import
    desc: HashiCorp go-plugin import
    if:
      type: text
      substr: "github.com/hashicorp/go-plugin"
  - id: terraform-plugin-protocol-v5
    desc: Terraform plugin protocol v5
    conf: 0.92
    if:
      type: text
      regex: '\btf(plugin5|protov5)\b'
  - id: terraform-plugin-protocol-v6
    desc: Terraform plugin protocol v6
    conf: 0.92
    if:
      type: text
      regex: '\btf(plugin6|protov6)\b'
  - id: terraform-provider-server
    desc: Terraform provider server interface
    conf: 0.9
    if:
      type: text
      regex: '\bProviderServer\b|RegisterProviderServer\s*\('
  - id: terraform-plugin-serve
    desc: Terraform plugin serve call
    conf: 0.9
    if:
      type: text
      regex: '\bplugin\.Serve\s*\('
  - id: terraform-reattach-providers-env
    desc: Terraform reattach providers environment
    conf: 0.92
    if:
      type: text
      substr: "TF_REATTACH_PROVIDERS"

composite_rules:
  - id: terraform-grpc-provider-server
    desc: Terraform gRPC provider server
    conf: 0.94
    all:
      - id: micro-behaviors/communications/grpc::grpc-go-import
      - id: terraform-provider-server
    any:
      - id: terraform-plugin-protocol-v5
      - id: terraform-plugin-protocol-v6
      - id: terraform-plugin-go-import
  - id: terraform-go-plugin-serve
    desc: Terraform go-plugin server
    conf: 0.94
    all:
      - id: terraform-go-plugin-import
      - id: terraform-plugin-serve
    any:
      - id: terraform-plugin-protocol-v5
      - id: terraform-plugin-protocol-v6
      - id: terraform-provider-server
