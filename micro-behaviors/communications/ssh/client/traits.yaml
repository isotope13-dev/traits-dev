defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1021.004
traits:
  - id: ssh-userauth
    desc: SSH user authentication protocol string
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: ssh-userauth
  - id: libssh
    desc: libssh library reference
    crit: notable
    conf: 0.6
    unless:
      - type: text
        substr: curve25519-sha256@libssh.org
    if:
      type: text
      substr: libssh
  - id: ssh-version
    desc: SSH protocol version 2.0 string
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SSH-2.0
  - id: keyboard-interactive
    desc: SSH keyboard-interactive auth method
    crit: notable
    conf: 0.6
    unless:
      - type: text
        substr: tabby-ssh
      - type: text
        substr: builtin-plugins/tabby-ssh
      - type: text
        substr: keyboard-interactive-auth-panel
    if:
      type: text
      substr: keyboard-interactive
  - id: publickey-auth
    desc: SSH publickey auth method
    crit: notable
    conf: 0.6
    count_min: 2
    unless:
      - type: text
        substr: tabby-ssh
      - type: text
        substr: builtin-plugins/tabby-ssh
      - id: metadata/file/text::vscode-php-global-functions-catalog
    if:
      type: text
      substr: publickey
  - id: auth-failed
    desc: SSH authentication failed message
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: Authentication failed
  - id: ssh2-js
    desc: ssh2 Node.js library
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: ast
      kind: import
      regex: ssh2
  - id: node-ssh
    desc: node-ssh library
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: ast
      kind: import
      regex: node-ssh
  - id: paramiko
    desc: Paramiko Python SSH library
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: ast
      kind: import
      exact: paramiko
  - id: fabric
    desc: Fabric Python SSH library
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: ast
      kind: import
      exact: fabric
composite_rules:
  - id: library-comp
    desc: SSH client library
    crit: notable
    conf: 0.75
    needs: 2
    any:
      - id: ssh-userauth
      - id: libssh
      - id: ssh-version
      - id: keyboard-interactive
      - id: publickey-auth
      - id: ssh2-js
      - id: node-ssh
      - id: paramiko
      - id: fabric
  - id: full-implementation
    desc: Full SSH client implementation
    crit: notable
    conf: 0.85
    all:
      - id: library-comp
    any:
      - id: micro-behaviors/os/message/error::permission-denied
      - id: auth-failed
  - id: protocol
    desc: SSH protocol indicators
    crit: baseline
    any:
      - id: ssh-version
      - id: ssh-userauth
      - id: libssh
      - id: keyboard-interactive
      - id: publickey-auth
