defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1021.004
traits:
  - id: ssh-batch-mode-option
    desc: SSH client enables noninteractive batch mode
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [scripts, binaries, pyc]
    if:
      type: text
      substr: BatchMode=yes
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ssh-userauth
    desc: SSH user authentication protocol string
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: ssh-userauth
  - id: ssh2-userauth-request
    desc: SSH2 userauth request packet string
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: SSH2_MSG_USERAUTH_REQUEST
  - id: libssh
    desc: libssh library reference
    crit: notable
    conf: 0.6
    unless:
      - type: text
        substr: curve25519-sha256@libssh.org
      - type: text
        substr: libSSH Version
    if:
      type: text
      substr: libssh
  - id: ssh-version
    desc: SSH protocol version 2.0 string
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SSH-2.0
  - id: keyboard-interactive
    desc: SSH keyboard-interactive auth method
    crit: notable
    conf: 0.6
    unless:
      - type: text
        substr: tabby-ssh
      - type: text
        substr: builtin-plugins/tabby-ssh
      - type: text
        substr: keyboard-interactive-auth-panel
    if:
      type: text
      substr: keyboard-interactive
  - id: auth-failed
    desc: SSH authentication failed message
    crit: component
    conf: 0.5
    if:
      type: text
      substr: Authentication failed
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: ssh2-js
    desc: ssh2 Node.js library
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: symbol
      kind: import
      regex: ssh2
  - id: node-ssh
    desc: node-ssh library
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: symbol
      kind: import
      regex: node-ssh
  - id: python-empty-password-auth
    desc: Python SSH connection with empty password
    crit: notable
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: 'connect\s*\([^)]{0,240}\bpassword\s*=\s*["'']\s*["'']'
  - id: python-auto-add-host-key-policy
    desc: Python auto-accepts unknown SSH host keys
    crit: notable
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: '(?i)\bAutoAddPolicy\s*\(\s*\)'
  - id: fabric
    desc: Fabric Python SSH library
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: symbol
      kind: import
      exact: fabric
  - id: strict-host-disable
    desc: StrictHostKeyChecking disabled
    crit: notable
    conf: 0.7
    for: [scripts, binaries, pyc]
    platforms: [unix]
    # Require the insecure value, not just the option name. Tools that merely
    # expose the option (e.g. an IDE's SSH config UI lists `StrictHostKeyChecking=`)
    # are not disabling host-key verification — only `=no` / ` no` does.
    if:
      type: text
      regex: 'StrictHostKeyChecking[=\s]+no\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: well-known/app/crunr/
    downgrade:
      any:
        - type: basename
          exact: ssh
        - type: basename
          exact: scp
        - type: basename
          exact: sftp
        - id: metadata/signed/platform::apple
  - id: user-known-hosts-file-option
    desc: UserKnownHostsFile SSH option reference
    crit: notable
    conf: 0.75
    platforms: [unix]
    if:
      type: text
      substr: UserKnownHostsFile
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: well-known/app/crunr/
    downgrade:
      any:
        - type: basename
          exact: ssh
        - type: basename
          exact: scp
        - type: basename
          exact: sftp
        - type: basename
          exact: remotectl
        - id: metadata/signed/platform::apple
  - id: key-identity-file
    desc: IdentityFile SSH config option
    crit: notable
    conf: 0.6
    platforms: [unix]
    if:
      type: text
      substr: IdentityFile
  - id: ssh-argv-vector
    desc: Builds argv vector for ssh client
    crit: notable
    conf: 0.6
    platforms: [unix]
    if:
      type: text
      substr: ssh_argv
  - id: sshpass-tool-reference
    desc: sshpass command-line helper reference
    crit: notable
    conf: 0.82
    platforms: [unix]
    if:
      type: text
      word: sshpass
    unless:
      - type: text
        regex: 'sshpass\s+-e\s+sftp|SSHPASS=.*sshpass'
  - id: ssh-remote-command
    desc: SSH client sends a quoted remote command
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: "(^|[\\n;&|]) *ssh +[-.@:A-Za-z0-9_]{1,80} +'[^'\\n]{5,80}'"
composite_rules:
  - id: library-comp
    desc: SSH client/auth library
    crit: notable
    conf: 0.75
    needs: 2
    any:
      - id: ssh-userauth
      - id: ssh2-userauth-request
      - id: libssh
      - id: ssh-version
      - id: keyboard-interactive
      - id: ssh2-js
      - id: node-ssh
      - id: well-known/lib/paramiko::paramiko-python-library
      - id: fabric
  - id: full-implementation
    desc: SSH authentication implementation
    crit: notable
    conf: 0.85
    all:
      - id: library-comp
    any:
      - id: micro-behaviors/os/message/error::permission-denied
      - id: auth-failed
  - id: protocol
    desc: SSH protocol indicators
    crit: baseline
    any:
      - id: ssh-version
      - id: ssh-userauth
      - id: ssh2-userauth-request
      - id: libssh
      - id: keyboard-interactive
