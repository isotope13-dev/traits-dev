defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
  attack: T1021.004
traits:
- id: ssh-config-port-directive
  desc: SSH server configuration Port directive
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: '(?mi)^\s*Port\s+[1-9][0-9]{1,4}\s*(#[^\n]{0,120})?\s*$'
- id: paramiko-server-interface
  desc: Paramiko SSH server interface implementation
  crit: notable
  conf: 0.96
  for: [python]
  if:
    type: symbol
    kind: member
    exact: paramiko.ServerInterface
- id: go-ssh-server-config
  desc: Go SSH server config
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: '*ssh.ServerConfig'
- id: go-ssh-server-conn
  desc: Go SSH server connection
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: '*ssh.ServerConn'
- id: go-xcrypto-ssh-server-connection
  desc: Go x/crypto SSH server handshake
  crit: notable
  conf: 0.9
  for: [elf, macho, go]
  if:
    type: symbol
    kind: call
    exact: ssh.NewServerConn
- id: go-ssh-session-handler
  desc: Go SSH server session handler
  crit: notable
  conf: 0.9
  for: [elf, macho, go]
  if:
    type: function
    exact: handleSession
- id: go-ssh-direct-tcpip-handler
  desc: Go SSH direct-tcpip forwarding handler
  crit: notable
  conf: 0.9
  attack: T1090
  for: [elf, macho, go]
  if:
    type: function
    exact: handleDirectTCPIP
- id: go-ssh-tcpip-forward-handler
  desc: Go SSH remote TCP-forwarding handler
  crit: notable
  conf: 0.9
  attack: T1090
  for: [elf, macho, go]
  if:
    type: function
    exact: handleTCPIPForward
- id: go-ssh-open-client-policy
  desc: Go SSH server disables client authentication
  crit: suspicious
  conf: 0.94
  for: [elf, macho, go]
  if:
    type: text
    regex: '(?i)NoClientAuth\s*[:=]\s*true'
  unless:
    - id: well-known/app/infisical::infisical-cli-pam-context
    - id: metadata/package/testing/
- id: go-listen-ssh
  desc: Go SSH listener routine
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: ListenSSH
- id: go-bind-ssh
  desc: Go SSH bind routine
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: BindSSH
- id: go-ssh-channel-handler
  desc: Go SSH channel handler
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: '\bhandleSSH(Channel|Channels|Requests)\b'
- id: go-ssh-server-preauth
  desc: Go SSH preauth server
  crit: notable
  conf: 0.75
  if:
    type: text
    substr: '*ssh.ServerPreAuthConn'
- id: go-ssh-no-client-auth
  desc: Go SSH config includes NoClientAuth
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: '(?is)NoClientAuth\s*[:=]\s*true|NoClientAuth.{0,80}(ServerConfig|ssh\.)'
- id: go-ssh-public-key-callback
  desc: Go SSH server public key callback
  crit: notable
  conf: 0.76
  if:
    type: text
    substr: PublicKeyCallback
- id: go-ssh-verified-public-key-callback
  desc: Go SSH server verified public key callback
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: VerifiedPublicKeyCallback
- id: go-ssh-max-auth-tries
  desc: Go SSH server MaxAuthTries option
  crit: notable
  conf: 0.72
  if:
    type: text
    substr: MaxAuthTries
- id: go-sftp-packets--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Read|Write)Packet'
  count_max: 1021233
- id: go-sftp-packets--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Open|Opendir)Packet'
  count_max: 1021234
- id: go-sftp-packets--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Readdir|Remove)Packet'
  count_max: 1021235
- id: go-sftp-packets--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Rename|Symlink)Packet'
  count_max: 1021236
- id: ssh-fxp-packet-names--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(READ|WRITE)'
  count_max: 1021237
- id: ssh-fxp-packet-names--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(OPEN|OPENDIR)'
  count_max: 1021238
- id: ssh-fxp-packet-names--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(READDIR|REMOVE)'
  count_max: 1021239
- id: ssh-fxp-packet-names--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(RENAME|SYMLINK)'
  count_max: 1021240
- id: ssh-fxp-packet-names--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(STATUS|HANDLE)'
  count_max: 1021241
- id: sshd-listen-loopback
  desc: SSH daemon listens on loopback
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: (?mi)^\s*ListenAddress\s+127\.0\.0\.1\s*$
- id: sshd-publickey-only--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: (?is)PubkeyAuthentication\s+yes.{0,160}PasswordAuthentication\s+no
  count_max: 1021243
- id: sshd-publickey-only--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: PasswordAuthentication\s+no.{0,160}PubkeyAuthentication\s+yes
  count_max: 1021244
- id: sshd-authorized-keys-file
  desc: SSH daemon authorized keys path
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: (?mi)^\s*AuthorizedKeysFile\s+\S+
- id: sshd-sftp-subsystem
  desc: SSH daemon SFTP subsystem
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: (?mi)^\s*Subsystem\s+sftp\s+\S+

composite_rules:
- id: go-ssh-server-implementation
  desc: Go SSH server implementation
  crit: notable
  conf: 0.88
  any:
  - id: go-ssh-server-config
  - id: go-ssh-server-conn
  - id: go-listen-ssh
  - id: go-bind-ssh
  - id: go-ssh-channel-handler
  - id: go-ssh-server-preauth
  - id: go-ssh-public-key-callback
  - id: go-ssh-no-client-auth
  - id: go-ssh-verified-public-key-callback
  - id: go-ssh-max-auth-tries
  - id: go-xcrypto-ssh-server-connection
  - id: go-ssh-session-handler
  - id: go-ssh-direct-tcpip-handler
  - id: go-ssh-tcpip-forward-handler
  needs: 2
- id: go-ssh-session-shell-execution
  desc: Go SSH session executes a command through a local shell
  crit: notable
  conf: 0.97
  for: [elf, macho, go]
  all:
  - id: go-ssh-session-handler
  - id: micro-behaviors/process/create/shell/lang::go-exec-command-bin-sh
- id: go-ssh-session-stdio-redirect
  desc: Go SSH session routes child-process standard I/O to the SSH channel
  crit: notable
  conf: 0.95
  for: [elf, macho, go]
  all:
  - id: go-ssh-session-handler
  - id: micro-behaviors/process/create/shell/lang::stdio-redirect
- id: go-ssh-direct-channel-relay
  desc: Go SSH direct-tcpip handling dials an endpoint and relays channel bytes
  crit: notable
  conf: 0.97
  for: [elf, macho, go]
  all:
  - id: go-ssh-direct-tcpip-handler
  - id: micro-behaviors/communications/socket/connect::dial
  - id: micro-behaviors/fs/file/copy::io-copy
- id: sshd-config-server
  desc: SSH daemon server configuration
  crit: notable
  conf: 0.82
  needs: 2
  any:
  - id: sshd-listen-loopback
  - id: sshd-publickey-only
  - id: sshd-authorized-keys-file
  - id: sshd-sftp-subsystem
- id: go-sftp-server-support
  desc: Go SFTP server support
  crit: notable
  conf: 0.82
  all:
  - id: go-ssh-server-implementation
  any:
  - id: go-sftp-packets
  - id: ssh-fxp-packet-names
- id: permissive-go-ssh-server-auth
  desc: Permissive Go SSH server auth
  crit: suspicious
  conf: 0.86
  unless:
  - id: well-known/tool/sysadmin/alpine-packages/
  - id: well-known/tool/dual-use/frp::frp-tool
  - id: well-known/tool/dual-use/rclone::rclone-package-path
  all:
  - id: go-ssh-server-implementation
  any:
  - id: go-ssh-open-client-policy
  needs: 1
- id: go-sftp-packets
  desc: Go SFTP packet support
  crit: notable
  conf: 0.7
  any:
  - id: go-sftp-packets--rx-1
  - id: go-sftp-packets--rx-2
  - id: go-sftp-packets--rx-3
  - id: go-sftp-packets--rx-4
- id: ssh-fxp-packet-names
  desc: SSH SFTP packet names
  crit: notable
  conf: 0.72
  any:
  - id: ssh-fxp-packet-names--rx-5
  - id: ssh-fxp-packet-names--rx-6
  - id: ssh-fxp-packet-names--rx-7
  - id: ssh-fxp-packet-names--rx-8
  - id: ssh-fxp-packet-names--rx-9
- id: sshd-publickey-only
  desc: SSH daemon public-key-only auth
  crit: notable
  conf: 0.8
  any:
  - id: sshd-publickey-only--rx-10
  - id: sshd-publickey-only--rx-11
