defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
  attack: T1021.004
traits:
- id: go-ssh-server-config
  desc: Go SSH server config
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: '*ssh.ServerConfig'
- id: go-ssh-server-conn
  desc: Go SSH server connection
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: '*ssh.ServerConn'
- id: go-listen-ssh
  desc: Go SSH listener routine
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: ListenSSH
- id: go-bind-ssh
  desc: Go SSH bind routine
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: BindSSH
- id: go-ssh-channel-handler
  desc: Go SSH channel handler
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: '\bhandleSSH(Channel|Channels|Requests)\b'
- id: go-ssh-server-preauth
  desc: Go SSH preauth server
  crit: notable
  conf: 0.75
  if:
    type: text
    substr: '*ssh.ServerPreAuthConn'
- id: go-ssh-no-client-auth
  desc: Go SSH server NoClientAuth option
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: NoClientAuth
- id: go-ssh-public-key-callback
  desc: Go SSH server public key callback
  crit: notable
  conf: 0.76
  if:
    type: text
    substr: PublicKeyCallback
- id: go-ssh-verified-public-key-callback
  desc: Go SSH server verified public key callback
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: VerifiedPublicKeyCallback
- id: go-ssh-max-auth-tries
  desc: Go SSH server MaxAuthTries option
  crit: notable
  conf: 0.72
  if:
    type: text
    substr: MaxAuthTries
- id: go-sftp-packets--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Read|Write)Packet'
- id: go-sftp-packets--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Open|Opendir)Packet'
- id: go-sftp-packets--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Readdir|Remove)Packet'
- id: go-sftp-packets--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\*sftp\.sshFxp(Rename|Symlink)Packet'
- id: ssh-fxp-packet-names--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(READ|WRITE)'
- id: ssh-fxp-packet-names--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(OPEN|OPENDIR)'
- id: ssh-fxp-packet-names--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(READDIR|REMOVE)'
- id: ssh-fxp-packet-names--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(RENAME|SYMLINK)'
- id: ssh-fxp-packet-names--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: 'SSH_FXP_(STATUS|HANDLE)'
- id: sshd-listen-loopback
  desc: SSH daemon listens on loopback
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: (?mi)^\s*ListenAddress\s+127\.0\.0\.1\s*$
- id: sshd-publickey-only--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: (?is)PubkeyAuthentication\s+yes.{0,160}PasswordAuthentication\s+no
- id: sshd-publickey-only--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: PasswordAuthentication\s+no.{0,160}PubkeyAuthentication\s+yes
- id: sshd-authorized-keys-file
  desc: SSH daemon authorized keys path
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: (?mi)^\s*AuthorizedKeysFile\s+\S+
- id: sshd-sftp-subsystem
  desc: SSH daemon SFTP subsystem
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: (?mi)^\s*Subsystem\s+sftp\s+\S+

composite_rules:
- id: go-ssh-server-implementation
  desc: Go SSH server implementation
  crit: notable
  conf: 0.88
  any:
  - id: go-ssh-server-config
  - id: go-ssh-server-conn
  - id: go-listen-ssh
  - id: go-bind-ssh
  - id: go-ssh-channel-handler
  - id: go-ssh-server-preauth
  - id: go-ssh-no-client-auth
  - id: go-ssh-public-key-callback
  - id: go-ssh-verified-public-key-callback
  - id: go-ssh-max-auth-tries
  needs: 2
- id: sshd-config-server
  desc: SSH daemon server configuration
  crit: notable
  conf: 0.82
  needs: 2
  any:
  - id: sshd-listen-loopback
  - id: sshd-publickey-only
  - id: sshd-authorized-keys-file
  - id: sshd-sftp-subsystem
- id: go-sftp-server-support
  desc: Go SFTP server support
  crit: notable
  conf: 0.82
  all:
  - id: go-ssh-server-implementation
  any:
  - id: go-sftp-packets
  - id: ssh-fxp-packet-names
- id: permissive-go-ssh-server-auth
  desc: Permissive Go SSH server auth
  crit: suspicious
  conf: 0.86
  all:
  - id: go-ssh-server-implementation
  any:
  - id: go-ssh-no-client-auth
  - id: go-ssh-public-key-callback
  - id: go-ssh-verified-public-key-callback
  needs: 2
- id: go-sftp-packets
  desc: Go SFTP packet support
  crit: notable
  conf: 0.7
  any:
  - id: go-sftp-packets--rx-1
  - id: go-sftp-packets--rx-2
  - id: go-sftp-packets--rx-3
  - id: go-sftp-packets--rx-4
  needs: 1
- id: ssh-fxp-packet-names
  desc: SSH SFTP packet names
  crit: notable
  conf: 0.72
  any:
  - id: ssh-fxp-packet-names--rx-5
  - id: ssh-fxp-packet-names--rx-6
  - id: ssh-fxp-packet-names--rx-7
  - id: ssh-fxp-packet-names--rx-8
  - id: ssh-fxp-packet-names--rx-9
  needs: 1
- id: sshd-publickey-only
  desc: SSH daemon public-key-only auth
  crit: notable
  conf: 0.8
  any:
  - id: sshd-publickey-only--rx-10
  - id: sshd-publickey-only--rx-11
  needs: 1
