defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1021.004

traits:
  - id: paramiko-sshclient-connect
    desc: Python Paramiko SSHClient connection call
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: '(?is)\bparamiko\.SSHClient\s*\(\s*\).{0,240}\b[A-Za-z_]\w*\.connect\s*\('
  - id: paramiko-exec-command
    desc: Paramiko SSH remote command execution
    crit: notable
    conf: 0.97
    if:
      type: symbol
      kind: call
      exact: ssh.exec_command
  - id: asyncssh-connect-call
    desc: AsyncSSH connection call
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: asyncssh.connect
  - id: ssh-client-run-call
    desc: SSH client remote command run call
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: ssh.run
  - id: ssh-client-create-process-call
    desc: SSH client remote process creation call
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: ssh.create_process
