defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  - id: ssh-string
    desc: ssh string
    crit: baseline
    conf: 0.4
    attack: T1021.004
    if:
      type: string_value
      word: ssh
  - id: paramiko-dup
    desc: paramiko Python SSH library
    crit: notable
    conf: 0.75
    attack: T1021.004
    if:
      type: string_value
      substr: paramiko
  - id: openssh
    desc: OpenSSH string
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: OpenSSH
  - id: ssh-client
    desc: SSHClient class
    crit: notable
    conf: 0.75
    attack: T1021.004
    if:
      type: string_value
      substr: SSHClient
composite_rules:
  - id: connect-comp
    desc: SSH connection
    crit: notable
    conf: 0.66
    attack: T1021.004
    any:
      - id: ssh-string
      - id: micro-behaviors/communications/ssh/connect::paramiko-dup
      - id: micro-behaviors/communications/ssh/client::libssh
      - id: openssh
      - id: ssh-client
