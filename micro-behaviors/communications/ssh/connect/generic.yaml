defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: ssh-string
    desc: ssh string
    crit: baseline
    conf: 0.4
    attack: T1021.004
    if:
      type: text
      word: ssh
  - id: paramiko-dup
    desc: paramiko Python SSH library
    crit: notable
    conf: 0.75
    attack: T1021.004
    if:
      type: text
      substr: paramiko
  - id: openssh
    desc: OpenSSH string
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: OpenSSH
  - id: ssh-client
    desc: SSHClient class
    crit: notable
    conf: 0.75
    attack: T1021.004
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]
      - type: text
        substr: tabby-ssh
      - type: text
        substr: builtin-plugins/tabby-ssh
    if:
      type: text
      substr: SSHClient
    not:
      - substr: external_russh_.SSHClient
      - substr: AuthenticatedSSHClient
composite_rules:
  - id: connect-comp
    desc: SSH connection
    crit: notable
    conf: 0.66
    attack: T1021.004
    any:
      - id: ssh-string
      - id: micro-behaviors/communications/ssh/connect::paramiko-dup
      - id: micro-behaviors/communications/ssh/client::libssh
      - id: openssh
      - id: ssh-client
