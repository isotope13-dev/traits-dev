defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: ssh-string
  desc: ssh string
  crit: baseline
  conf: 0.4
  attack: T1021.004
  if:
    type: text
    word: ssh
- id: paramiko-dup
  desc: paramiko Python SSH library
  crit: notable
  conf: 0.75
  attack: T1021.004
  if:
    type: text
    substr: paramiko
- id: openssh
  desc: OpenSSH string
  crit: baseline
  conf: 0.5
  unless:
  - type: text
    regex: '(?i)Windows\\System32\\OpenSSH'
  if:
    type: text
    substr: OpenSSH
- id: ssh-client
  desc: SSHClient class
  crit: notable
  conf: 0.75
  attack: T1021.004
  unless:
  - type: basename
    regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]
  - type: text
    substr: tabby-ssh
  - type: text
    substr: builtin-plugins/tabby-ssh
  if:
    type: text
    substr: SSHClient
  not:
  - substr: external_russh_.SSHClient
  - substr: AuthenticatedSSHClient
- id: port-22-ref--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: \bport\s+22\b
    case_insensitive: true
- id: port-22-ref--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: ssh://.{0,50}:22\b
    case_insensitive: true
- id: port-22-ref--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: (?:ssh|scp|sftp)[-_ ]?port\s*[:=]\s*22\b
    case_insensitive: true
composite_rules:
- id: connect-comp
  desc: SSH connection
  crit: notable
  conf: 0.66
  attack: T1021.004
  needs: 2
  any:
  - id: ssh-string
  - id: micro-behaviors/communications/ssh/connect::paramiko-dup
  - id: micro-behaviors/communications/ssh/client::libssh
  - id: ssh-client
  - id: port-22-ref
- id: port-22-ref
  desc: SSH port 22 reference
  crit: component
  conf: 0.72
  attack: T1021.004
  any:
  - id: port-22-ref--rx-1
  - id: port-22-ref--rx-2
  - id: port-22-ref--rx-3
  needs: 1
