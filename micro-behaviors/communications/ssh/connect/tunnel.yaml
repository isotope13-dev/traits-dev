defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: ssh-local-forward-command
    desc: SSH local port forwarding command
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bssh\b[^\n]{0,120}\s-L\s*'
  - id: ssh-background-no-command
    desc: SSH background tunnel mode
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bssh\b[^\n]{0,80}\s-f[^\n]{0,80}\s-N\b|\bssh\b[^\n]{0,80}\s-N[^\n]{0,80}\s-f\b'