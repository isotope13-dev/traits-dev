defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: python-ssh-request-port-forward
    desc: Python SSH remote port-forward request
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      kind: call
      exact: transport.request_port_forward
  - id: ssh-local-forward-command
    desc: Uses SSH local port forwarding
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bssh\b[^\n]{0,120}\s-L\s*'
  - id: ssh-background-no-command
    desc: SSH background tunnel mode
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bssh\b[^\n]{0,80}\s-f[^\n]{0,80}\s-N\b|\bssh\b[^\n]{0,80}\s-N[^\n]{0,80}\s-f\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: ssh-remote-forward-command
    desc: SSH remote port forwarding command
    crit: notable
    conf: 0.9
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    if:
      type: text
      regex: '\bssh\b[^\n]{0,140}\s-R\s+[0-9]{2,5}:'
  - id: ssh-dynamic-socks-command
    desc: SSH dynamic SOCKS proxy command
    crit: notable
    conf: 0.9
    ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
    if:
      type: text
      regex: '\bssh\b[^\n]{0,140}\s-D\s+[0-9]{2,5}\b'
