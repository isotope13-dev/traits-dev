defaults:
  platforms: [unix, windows]
  for: [python, shell]
  crit: notable
  conf: 0.85

traits:
  - id: sftp-open
    desc: Opens an SFTP transfer session
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)open_sftp$'

  - id: sftp-put
    desc: Uploads a file over SFTP
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      kind: call
      exact: sftp.put

  - id: sftp-get
    desc: Downloads a file over SFTP
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      kind: call
      exact: sftp.get

  - id: rsync-command
    desc: rsync command invocation
    if:
      type: text
      regex: '(?i)(^|[\s"'';&|])rsync(\.exe)?(?=[\s-]|$)'

  - id: rsync-exclude-argument
    desc: rsync exclude argument
    if:
      type: text
      regex: '\brsync\b[^\n]{0,160}--exclude|--exclude[^\n]{0,160}\brsync\b'

  - id: scp-command
    desc: scp command invocation
    if:
      type: text
      regex: '(?i)(^|[\s"'';&|])scp(\.exe)?(?=[\s-]|$)'

  - id: tar-sync-fallback
    desc: Shell tar extract
    # Building block for scp-tar-sync. The Python `tarfile.open` form lives in its
    # honest home (micro-behaviors/data/compress/library::tarfile-open-call) and
    # is referenced by scp-tar-sync cross-directory.
    crit: component
    conf: 0.82
    for: [shell]
    if:
      type: text
      substr: 'tar xzf'

composite_rules:
  - id: rsync-with-excludes
    desc: rsync with excludes
    crit: notable
    conf: 0.9
    all:
      - id: rsync-command
      - id: rsync-exclude-argument

  - id: scp-tar-sync
    desc: scp tar synchronization
    crit: notable
    conf: 0.9
    all:
      - id: scp-command
    any:
      - id: tar-sync-fallback
      - id: micro-behaviors/data/compress/library::tarfile-open-call
