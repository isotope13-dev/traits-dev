defaults:
  platforms: [unix, windows]
  for: [python, shell]
  crit: notable
  conf: 0.85

traits:
  - id: rsync-command
    desc: rsync command execution
    if:
      type: text
      regex: '["'']rsync["'']|\\brsync\\b'

  - id: rsync-exclude-argument
    desc: rsync exclude argument
    if:
      type: text
      substr: --exclude

  - id: scp-command
    desc: scp command execution
    if:
      type: text
      regex: '["'']scp["'']|\\bscp\\b'

  - id: tar-sync-fallback
    desc: Shell tar extract
    # Building block for scp-tar-sync. The Python `tarfile.open` form lives in its
    # honest home (micro-behaviors/data/compress/library::tarfile-open-call) and
    # is referenced by scp-tar-sync cross-directory.
    crit: component
    conf: 0.82
    for: [shell]
    if:
      type: text
      substr: 'tar xzf'

composite_rules:
  - id: rsync-with-excludes
    desc: rsync with excludes
    crit: notable
    conf: 0.9
    all:
      - id: rsync-command
      - id: rsync-exclude-argument

  - id: scp-tar-sync
    desc: scp tar synchronization
    crit: notable
    conf: 0.9
    all:
      - id: scp-command
    any:
      - id: tar-sync-fallback
      - id: micro-behaviors/data/compress/library::tarfile-open-call
