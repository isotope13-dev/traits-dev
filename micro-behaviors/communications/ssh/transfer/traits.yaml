defaults:
  platforms: [unix, windows]
  for: [python, shell]
  crit: notable
  conf: 0.85

traits:
  - id: rsync-command
    desc: rsync command execution
    if:
      type: text
      regex: '["'']rsync["'']|\\brsync\\b'

  - id: rsync-exclude-argument
    desc: rsync exclude argument
    if:
      type: text
      substr: --exclude

  - id: scp-command
    desc: scp command execution
    if:
      type: text
      regex: '["'']scp["'']|\\bscp\\b'

  - id: tar-sync-fallback
    desc: tar sync fallback
    conf: 0.82
    if:
      type: text
      regex: 'tar xzf|tarfile\.open'

composite_rules:
  - id: rsync-with-excludes
    desc: rsync with excludes
    crit: notable
    conf: 0.9
    all:
      - id: rsync-command
      - id: rsync-exclude-argument

  - id: scp-tar-sync
    desc: scp tar synchronization
    crit: notable
    conf: 0.9
    all:
      - id: scp-command
      - id: tar-sync-fallback
