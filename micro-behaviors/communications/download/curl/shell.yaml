# File Download Operations
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1105
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  for: [shell]
  attack: "T1105"
traits:
  # === curl atomic indicators ===
  - id: curl-cmd
    desc: curl command
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: "\\bcurl(\\.exe)?\\s"
  - id: curl-output-file
    desc: curl download to file
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'curl(\.exe)?\s+(.{0,50}\s+)?(-[a-zA-Z]{0,5}[oO]|--output)\b'
  - id: curlopt-ref
    desc: CURLOPT constant
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: "CURLOPT"
      # === wget atomic indicators ===
  - id: wget-cmd
    desc: wget command
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: "\\bwget\\s"
  - id: wget-output-file
    desc: wget download to file
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'wget\s+(.{0,50}\s+)?(-O|--output-document)\b'
  - id: wget-path
    desc: wget binary path
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: "/usr/bin/wget"
      # === fetch atomic indicators ===
      # NOTE: "fetch(" is too generic for binaries - matches C++ method names like
      # llvm::Fetcher::fetch(). Restrict to shell/script contexts.
      # Note: fetch() in javascript/typescript is handled by micro-behaviors/communications/http/request::fetch-string
  - id: fetch-call
    desc: fetch function call
    crit: baseline
    conf: 0.5
    if:
      type: raw
      substr: "fetch("
  - id: urllib-urlretrieve
    desc: urllib urlretrieve
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: "urllib.request.urlretrieve"
composite_rules:
  - id: curl
    desc: Download via curl
    crit: notable
    conf: 0.66
    any:
      - id: curl-cmd
      - id: micro-behaviors/dylib/library::libcurl-ref
      - id: curlopt-ref
  - id: wget-comp
    desc: Download via wget
    crit: notable
    conf: 0.66
    any:
      - id: wget-cmd
      - id: wget-path
  - id: fetch
    desc: Download via fetch
    crit: notable
    conf: 0.66
    any:
      - id: fetch-call
      - id: urllib-urlretrieve
