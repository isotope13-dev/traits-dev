# Miscellaneous Shell Download Operations
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1105
defaults:
  for: [shell]
  attack: "T1105"
traits:
  - id: lwp-download
    desc: lwp-download command
    crit: notable
    conf: 0.8
    if:
      type: string
      word: "lwp-download"
  - id: shell-get-http
    desc: get command with http URL
    crit: baseline
    conf: 0.5
    if:
      type: string
      regex: '\\bget\\s+["'']?http'
  - id: shell-get-path
    desc: get command with path argument
    crit: baseline
    conf: 0.5
    if:
      type: string
      regex: '\\bget\\s+.*?\\s+["'']?/'
  - id: shell-get-call
    desc: call to get function/command
    crit: baseline
    conf: 0.5
    if:
      type: string
      regex: '\\bget\\s+'
composite_rules:
  - id: shell-get-download
    desc: get command used for download (common in malware)
    crit: notable
    conf: 0.7
    all:
      - id: shell-get-http
      - id: shell-get-path
