# OPC UA Industrial Interoperability Protocol (TCP port 4840)
# Neutral protocol references — intent inferred at objectives tier.
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: notable
  conf: 0.85

traits:
  - id: keyword
    desc: OPC UA protocol keyword reference
    if:
      type: text
      regex: (?i)\b(OPC[-_ ]?UA|opc\.tcp://)\b

  - id: library
    desc: OPC UA library or module reference
    conf: 0.88
    if:
      type: text
      regex: '(?i)\b(opcua[-_]?client|node-opcua|open62541)\b|\basyncua\b'
