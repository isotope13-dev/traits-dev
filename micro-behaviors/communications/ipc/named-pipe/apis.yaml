defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: named-pipe-api-usage
    desc: Uses named pipe IPC APIs
    crit: notable
    conf: 1.0
    if:
      type: symbol
      regex: '^(Create|Call|Connect|Wait)NamedPipe'
  - id: nt-create-named-pipe
    desc: Native named pipe creation
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: NtCreateNamedPipeFile
