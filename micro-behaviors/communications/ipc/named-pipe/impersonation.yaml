# Named Pipe Impersonation
# Detects use of common system pipe names by non-system processes

defaults:
  crit: suspicious
  conf: 0.9
  for: [all]

traits:
  - id: system-pipe-lsass
    desc: Impersonating LSASS named pipe
    if:
      type: string
      regex: '\\pipe\\lsass'

  - id: system-pipe-generic
    desc: Impersonating system named pipe
    if:
      type: string
      regex: '\\pipe\\(ntsvcs|epmapper|eventlog|samr)'
