defaults:
  for:
    - pe
    - dll
    - c
    - cpp
    - python
  platforms:
    - windows
  attack: T1559
traits:
  - id: pipe-path-prefix
    desc: Named pipe path prefix
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: \\.\pipe\
    unless:
      - id: metadata/binary/framework/
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: create-named-pipe
    desc: CreateNamedPipe API call
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: CreateNamedPipe[AW]?$
    unless:
      - id: metadata/binary/framework/
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: connect-named-pipe
    desc: ConnectNamedPipe API call
    crit: notable
    conf: 0.65
    if:
      type: symbol
      exact: ConnectNamedPipe
    unless:
      - id: metadata/binary/framework/
    downgrade:
      any:
        - id: metadata/binary/framework/
  - id: wait-named-pipe
    desc: Wait for named pipe server
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: WaitNamedPipe[AW]?$
  - id: rust-anonymous-pipe-path
    desc: Rust anonymous named pipe marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: __rust_anonymous_pipe
  - id: dotnet-netnamedpipebinding
    desc: .NET NetNamedPipeBinding reference
    crit: component
    conf: 0.9
    for:
      - pe
      - dll
    if:
      type: text
      substr: NetNamedPipeBinding
  - id: dotnet-netpipe-uri
    desc: .NET net.pipe URI reference
    crit: component
    conf: 0.95
    for:
      - pe
      - dll
    if:
      type: text
      substr: net.pipe://
  - id: pipe-access-duplex
    desc: PIPE_ACCESS_DUPLEX mode
    crit: notable
    conf: 0.6
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: text
      substr: PIPE_ACCESS_DUPLEX
  - id: pipe-type-message
    desc: PIPE_TYPE_MESSAGE mode
    crit: notable
    conf: 0.6
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: text
      substr: PIPE_TYPE_MESSAGE
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-pipe-access-duplex
    desc: Python PIPE_ACCESS_DUPLEX mode
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: symbol
      exact: win32pipe.PIPE_ACCESS_DUPLEX
  - id: python-pipe-type-message
    desc: Python PIPE_TYPE_MESSAGE mode
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: symbol
      exact: win32pipe.PIPE_TYPE_MESSAGE
  - id: vcc-framework-pipe
    desc: VccFramework malware pipe
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: VccFramework
  - id: browser-sync-pipe-format
    desc: Chromium sync pipe format
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: chrome.sync.%u.%u.%04X
  - id: chromium-mojo-pipe-format
    desc: Chromium mojo pipe format
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: mojo.%u.%u.%04X.chrome
  - id: edge-crashpad-pipe-format
    desc: Edge crashpad pipe format
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: msedge.crashpad_%u_%04X
composite_rules:
  - id: named-pipe-server
    desc: Named pipe server creation
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/binary/framework/
    all:
      - id: create-named-pipe
      - id: connect-named-pipe
  - id: named-pipe-client-server
    desc: Named pipe server and client wait
    crit: notable
    conf: 0.82
    all:
      - id: create-named-pipe
      - id: wait-named-pipe
    any:
      - id: connect-named-pipe
  - id: duplex-message-pipe
    desc: Full-duplex message pipe
    crit: notable
    conf: 0.75
    any:
      - id: pipe-access-duplex
      - id: python-pipe-access-duplex
      - id: pipe-type-message
      - id: python-pipe-type-message
    needs: 2
  - id: rust-anonymous-pipe-ipc
    desc: Rust anonymous pipe IPC setup
    crit: notable
    conf: 0.9
    all:
      - id: create-named-pipe
      - id: rust-anonymous-pipe-path
  - id: dotnet-wcf-named-pipe-client
    desc: WCF named pipe IPC client
    crit: notable
    conf: 0.95
    all:
      - id: dotnet-netnamedpipebinding
      - id: dotnet-netpipe-uri
  - id: browser-pipe-formats
    desc: Chromium-family browser pipe formats
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: browser-sync-pipe-format
      - id: chromium-mojo-pipe-format
      - id: edge-crashpad-pipe-format
