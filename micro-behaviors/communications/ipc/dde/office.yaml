defaults:
  for: [oledoc, ooxml]
  platforms: [windows]
  crit: notable
  conf: 0.9
  attack: "T1559.002"
traits:
  - id: ddeauto-field-code
    desc: DDEAUTO field code in document
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(?i)\bDDEAUTO\b'
  - id: dde-field-code
    desc: DDE field code in document
    conf: 0.88
    if:
      type: raw
      regex: '(?i)<w:fldChar[^>]{0,50}fldCharType="begin"[^>]{0,50}/>.{0,200}\bDDE\b'
  - id: dde-cmd-shell-execution
    desc: DDE cmd or PowerShell execution
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: '(?i)DDEAUTO?\s+["\x27]?(cmd|powershell|mshta)'
  - id: dde-script-execution
    desc: DDE script host execution reference
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: '(?i)DDEAUTO?\s+["\x27]?(wscript|cscript)'
  - id: dde-external-link-excel
    desc: Excel external DDE link file
    conf: 0.88
    if:
      type: string
      regex: "(?i)xl/externalLinks/externalLink[0-9]"
