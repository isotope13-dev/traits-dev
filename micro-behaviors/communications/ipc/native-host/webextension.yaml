# Native messaging: a browser extension bridges to a native host process on
# the machine (stdio JSON protocol). This is IPC that crosses the browser
# sandbox into a local executable, so presence is notable.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94
traits:
  - id: native-messaging-host-path
    desc: Browser native messaging host path
    for: [scripts, json]
    conf: 0.88
    if:
      type: text
      regex: 'NativeMessagingHosts|native-messaging-hosts'
    unless:
      - id: well-known/app/bitwarden::bitwarden-app
      - id: well-known/app/bitwarden::bitwarden-text-marker
  - id: browser-extension-native-connect
    desc: Browser extension native host connection
    if:
      type: symbol
      regex: '(^|\.)(connectNative)$'
    unless:
      - id: metadata/library/structure::js-webextension-polyfill-runtime-marker
  - id: browser-extension-native-message
    desc: Browser extension native host message
    if:
      type: symbol
      regex: '(^|\.)(sendNativeMessage)$'
    unless:
      - id: metadata/library/structure::js-webextension-polyfill-runtime-marker
