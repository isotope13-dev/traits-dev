# Python Unix-domain socket IPC.  Peer credentials are a local authorization
# primitive, not evidence of malicious intent by themselves.
defaults:
  platforms: [unix]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: asyncio-unix-server
    desc: Python Unix-domain socket server
    if:
      type: symbol
      kind: call
      exact: asyncio.start_unix_server

  - id: unix-peer-credentials
    desc: Unix socket peer credential check
    if:
      type: text
      regex: 'SO_PEERCRED|getsockopt\s*\(\s*socket\.SOL_SOCKET'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
