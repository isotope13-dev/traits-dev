# Unix-domain socket operations - Rust
defaults:
  platforms: [unix]
  for: [rust]
traits:
  - id: unix-listener-bind
    desc: Rust binds a Unix-domain socket listener
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '\bUnixListener::bind\s*\('
  - id: unix-listener-accept
    desc: Rust accepts a Unix socket client
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      regex: '(^|\.)listener\.accept$'
  - id: unix-stream-read
    desc: Rust reads a Unix socket stream
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      regex: '(^|\.)stream\.read_to_string$'
  - id: unix-socket-path
    desc: Rust names a Unix socket path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '/(tmp|run|var/run)/[^"\r\n]{1,100}\.sock'
