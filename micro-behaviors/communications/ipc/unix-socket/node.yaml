defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]

# Local IPC over a Unix domain socket (Node `net` module): a daemon listens on
# a filesystem socket path and clients connect to it. Distinguished from TCP by
# listen()/connect() taking a socket *path* (or a .sock file) rather than a
# numeric port. Capability, not intent: orchestrators use it to talk to a
# background daemon, but it is also how local malware brokers a private control
# channel between a resident agent and its launcher.
traits:
  - id: net-module-import
    desc: Node net module import
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(require\(|from\s*)["''](node:)?net["'']'

  - id: socket-path-listen
    desc: Server listens on a socket path
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\.listen\(\s*[A-Za-z_$][\w$]*(Path|Sock|Socket)'

  - id: socket-path-connect
    desc: Client connects to a socket path
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\.connect\(\s*(this\.)?[A-Za-z_$][\w$]*(Path|Sock|Socket)'

  - id: socket-file-path
    desc: Unix domain socket file path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '["''`][^"''`]{0,40}\.sock["''`]'

composite_rules:
  - id: unix-socket-ipc
    desc: Local IPC over a Unix domain socket
    crit: notable
    conf: 0.88
    all:
      - id: net-module-import
    any:
      - id: socket-path-listen
      - id: socket-path-connect
      - id: socket-file-path
