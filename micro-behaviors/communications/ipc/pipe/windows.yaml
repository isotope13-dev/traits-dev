defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: create-pipe
    desc: Create anonymous pipe
    crit: baseline
    conf: 0.9
    attack: T1559
    if:
      type: text
      exact: CreatePipe
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: peek-named-pipe
    desc: Peek at pipe data without reading
    crit: notable
    conf: 0.9
    attack: T1559
    if:
      type: symbol
      exact: PeekNamedPipe
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/installer/script::nsis
  - id: duplicate-handle
    desc: Duplicate object handle
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: DuplicateHandle
composite_rules:
  - id: pipe-io-redirect
    desc: Pipe creation with handle redirect
    crit: notable
    conf: 0.9
    all:
      - id: create-pipe
    any:
      - id: micro-behaviors/fs/file/operations::set-std-handle
      - id: duplicate-handle
      - id: peek-named-pipe
