defaults:
  platforms: [windows]
  for: [binaries, source]

traits:
  - id: dotnet-wcf-generated-code-attribute
    desc: WCF generated code attribute
    crit: component
    conf: 0.9
    if:
      type: text
      word: GeneratedCodeAttribute
  - id: dotnet-wcf-service-contract-attribute
    desc: WCF service contract attribute
    crit: component
    conf: 0.9
    if:
      type: text
      word: ServiceContractAttribute
  - id: dotnet-wcf-operation-contract-attribute
    desc: WCF operation contract attribute
    crit: component
    conf: 0.9
    if:
      type: text
      word: OperationContractAttribute
  - id: dotnet-wcf-tempuri-operation
    desc: WCF tempuri SOAP operation URI
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/signed/leaf::microsoft-corporation
    if:
      type: text
      regex: tempuri\.org/[A-Za-z0-9_]+/[A-Za-z0-9_]+

composite_rules:
  - id: dotnet-wcf-generated-soap-client
    desc: Generated .NET WCF SOAP client
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/communications/ipc/wcf::dotnet-wcf-client
      - id: dotnet-wcf-generated-code-attribute
      - id: dotnet-wcf-service-contract-attribute
      - id: dotnet-wcf-operation-contract-attribute
  - id: compat-placeholders
    desc: Reference compatibility placeholders
    crit: baseline
    conf: 1.0
    any:
      - id: dotnet-wcf-generated-soap-client
      - id: dotnet-wcf-tempuri-operation
