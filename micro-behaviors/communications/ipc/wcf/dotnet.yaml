defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: dotnet-system-servicemodel
  desc: References System.ServiceModel namespace
  crit: component
  if:
    type: text
    substr: System.ServiceModel
- id: dotnet-wcf-clientbase
  desc: References WCF ClientBase class
  crit: component
  if:
    type: text
    substr: ClientBase
- id: dotnet-wcf-endpointaddress
  desc: References WCF EndpointAddress
  crit: component
  if:
    type: text
    substr: EndpointAddress
- id: dotnet-wcf-basichttpbinding
  desc: References WCF BasicHttpBinding
  crit: component
  if:
    type: text
    substr: BasicHttpBinding
- id: dotnet-wcf-nettcpbinding
  desc: References WCF NetTcpBinding
  crit: component
  if:
    type: text
    substr: NetTcpBinding
- id: dotnet-wcf-network-uri
  desc: References WCF network URI
  crit: notable
  if:
    type: text
    substr: net.tcp://
- id: dotnet-wcf-reader-quotas
  desc: References WCF reader quotas object
  crit: component
  if:
    type: text
    word: XmlDictionaryReaderQuotas
- id: dotnet-wcf-max-buffer-size
  desc: References WCF max buffer setter
  crit: component
  if:
    type: text
    word: set_MaxBufferSize
- id: dotnet-wcf-max-recv-size
  desc: References WCF max receive setter
  crit: component
  if:
    type: text
    word: set_MaxReceivedMessageSize
- id: dotnet-wcf-default-proxy-toggle
  desc: References WCF default proxy toggle
  crit: component
  if:
    type: text
    word: set_UseDefaultWebProxy
- id: dotnet-wcf-proxy-address
  desc: References WCF proxy address setter
  crit: component
  if:
    type: text
    word: set_ProxyAddress
composite_rules:
- id: dotnet-wcf-client
  desc: Implements a WCF client
  crit: notable
  all:
  - id: dotnet-system-servicemodel
  - id: dotnet-wcf-clientbase
  - id: dotnet-wcf-endpointaddress
- id: dotnet-wcf-http-binding
  desc: Uses WCF BasicHttpBinding for RPC
  crit: notable
  all:
  - id: dotnet-system-servicemodel
  - id: dotnet-wcf-basichttpbinding
- id: dotnet-wcf-relaxed-http-limits
  desc: WCF client raises HTTP size limits
  crit: suspicious
  unless:
  - id: metadata/signed/platform::microsoft-corporation
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/signed/leaf::microsoft-corporation
  - id: well-known/app/parlem-provisioning-drivers::parlem-driver-context
  all:
  - id: dotnet-wcf-http-binding
  - id: dotnet-wcf-reader-quotas
  any:
  - id: dotnet-wcf-max-buffer-size
  - id: dotnet-wcf-max-recv-size
- id: dotnet-wcf-proxy-bypass-config
  desc: WCF client disables proxy routing
  crit: suspicious
  unless:
  - id: metadata/signed/platform::microsoft-corporation
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/signed/leaf::microsoft-corporation
  all:
  - id: dotnet-wcf-http-binding
  - id: dotnet-wcf-default-proxy-toggle
  - id: dotnet-wcf-proxy-address
- id: dotnet-wcf-tcp-binding
  desc: Uses WCF NetTcpBinding for RPC
  crit: notable
  all:
  - id: dotnet-system-servicemodel
  - id: dotnet-wcf-nettcpbinding
  - id: dotnet-wcf-network-uri
