defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: dotnet-system-servicemodel
    desc: References System.ServiceModel namespace
    crit: component
    if:
      type: text
      substr: System.ServiceModel
  - id: dotnet-wcf-clientbase
    desc: References WCF ClientBase class
    crit: component
    if:
      type: text
      substr: ClientBase
  - id: dotnet-wcf-endpointaddress
    desc: References WCF EndpointAddress
    crit: component
    if:
      type: text
      substr: EndpointAddress
  - id: dotnet-wcf-basichttpbinding
    desc: References WCF BasicHttpBinding
    crit: component
    if:
      type: text
      substr: BasicHttpBinding
  - id: dotnet-wcf-nettcpbinding
    desc: References WCF NetTcpBinding
    crit: component
    if:
      type: text
      substr: NetTcpBinding
  - id: dotnet-wcf-network-uri
    desc: References WCF network URI
    crit: notable
    if:
      type: text
      substr: net.tcp://
composite_rules:
  - id: dotnet-wcf-client
    desc: Implements a WCF client
    crit: baseline
    all:
      - id: dotnet-system-servicemodel
      - id: dotnet-wcf-clientbase
      - id: dotnet-wcf-endpointaddress
  - id: dotnet-wcf-http-binding
    desc: Uses WCF BasicHttpBinding for RPC
    crit: baseline
    all:
      - id: dotnet-system-servicemodel
      - id: dotnet-wcf-basichttpbinding
  - id: dotnet-wcf-tcp-binding
    desc: Uses WCF NetTcpBinding for RPC
    crit: baseline
    all:
      - id: dotnet-system-servicemodel
      - id: dotnet-wcf-nettcpbinding
      - id: dotnet-wcf-network-uri
