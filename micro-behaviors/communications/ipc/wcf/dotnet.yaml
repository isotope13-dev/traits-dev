defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: dotnet-system-servicemodel
    desc: References System.ServiceModel namespace
    crit: component
    if:
      type: text
      substr: System.ServiceModel
  - id: dotnet-servicecontract
    desc: References WCF service contract
    crit: component
    if:
      type: text
      exact: ServiceContractAttribute
  - id: dotnet-operationcontract
    desc: References WCF operation contract
    crit: component
    if:
      type: text
      exact: OperationContractAttribute
  - id: dotnet-wcf-clientbase
    desc: References WCF ClientBase class
    crit: component
    if:
      type: text
      substr: ClientBase
  - id: dotnet-wcf-endpointaddress
    desc: References WCF EndpointAddress
    crit: component
    if:
      type: text
      substr: EndpointAddress
  - id: dotnet-wcf-basichttpbinding
    desc: References WCF BasicHttpBinding
    crit: component
    if:
      type: text
      substr: BasicHttpBinding
  - id: dotnet-wcf-security-mode
    desc: References WCF security mode
    crit: component
    if:
      type: text
      exact: BasicHttpSecurityMode
  - id: dotnet-wcf-reader-quotas
    desc: References WCF XML reader quotas
    crit: component
    if:
      type: text
      exact: XmlDictionaryReaderQuotas
  - id: dotnet-wcf-tempuri-operation
    desc: References tempuri WCF operation
    crit: notable
    if:
      type: text
      substr: tempuri.org/IUserService/GetUsers
  - id: dotnet-wcf-nettcpbinding
    desc: References WCF NetTcpBinding
    crit: component
    if:
      type: text
      substr: NetTcpBinding
  - id: dotnet-wcf-network-uri
    desc: References WCF network URI
    crit: notable
    if:
      type: text
      substr: net.tcp://
composite_rules:
  - id: dotnet-wcf-client
    desc: Implements a WCF client
    crit: baseline
    all:
      - id: dotnet-system-servicemodel
      - id: dotnet-wcf-clientbase
      - id: dotnet-wcf-endpointaddress
  - id: dotnet-wcf-http-binding
    desc: Uses WCF BasicHttpBinding for RPC
    crit: baseline
    all:
      - id: dotnet-system-servicemodel
      - id: dotnet-wcf-basichttpbinding
  - id: dotnet-wcf-generated-soap-client
    desc: Generated WCF SOAP client contract
    crit: notable
    conf: 0.94
    all:
      - id: dotnet-wcf-client
      - id: dotnet-wcf-http-binding
    any:
      - id: dotnet-servicecontract
      - id: dotnet-operationcontract
      - id: dotnet-wcf-reader-quotas
      - id: dotnet-wcf-security-mode
      - id: dotnet-wcf-tempuri-operation
    needs: 2
  - id: dotnet-wcf-tcp-binding
    desc: Uses WCF NetTcpBinding for RPC
    crit: baseline
    all:
      - id: dotnet-system-servicemodel
      - id: dotnet-wcf-nettcpbinding
      - id: dotnet-wcf-network-uri
