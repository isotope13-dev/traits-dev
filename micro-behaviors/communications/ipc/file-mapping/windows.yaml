defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: open-file-mapping-a
    desc: Open named file mapping
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "OpenFileMappingA"
  - id: open-file-mapping-w
    desc: Open named file mapping (Unicode)
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "OpenFileMappingW"
