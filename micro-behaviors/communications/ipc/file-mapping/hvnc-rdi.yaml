# hVNC-specific shared memory naming patterns.
# Overlord's hVNC module uses a distinctive naming convention for
# page-file-backed named shared memory sections used in RDI payload transfer.
defaults:
  platforms: [windows]
  for: [go, c, cpp, pe, dll]
  crit: suspicious
  conf: 0.95
  attack: T1055.001
traits:
  - id: hvnc-rdi-section-name
    desc: 'hvnc rdi section name'
    if:
      type: text
      regex: 'Local\\\\hvnc_rdi_'
  - id: hvnc-rdi-section-format
    desc: hVNC RDI section name format string
    if:
      type: text
      substr: 'hvnc_rdi_%d'
composite_rules:
  - id: hvnc-shared-memory-section
    desc: hVNC shared memory section for RDI payload transfer
    crit: suspicious
    conf: 0.96
    any:
      - id: hvnc-rdi-section-name
      - id: hvnc-rdi-section-format
