# AI coding-agent hook protocol (Claude Code / Cursor / etc.).
#
# Hooks are subprocesses the agent invokes with a JSON event on stdin and reads a
# JSON directive from stdout — an IPC channel (sibling of ../mcp). Beyond merely
# being *configured* into the agent, a hook that emits `updatedInput` /
# `hookSpecificOutput` / `permissionDecision` rewrites or gates the tool calls the
# agent runs. That tool-call interception is the analyst-relevant behavior, shared by
# benign context-compressors and malicious agent hijackers alike — so surface it here
# as a capability; intent-specific composites live under objectives/.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, shell]
  crit: notable
  conf: 0.9

traits:
- id: agent-pretooluse-hook
  desc: AI agent PreToolUse hook
  if:
    type: literal
    kind: string
    word: PreToolUse

- id: agent-userpromptsubmit-hook
  desc: "AI agent UserPromptSubmit hook"
  if:
    type: literal
    kind: string
    word: UserPromptSubmit

- id: agent-posttooluse-hook
  desc: AI agent PostToolUse hook
  if:
    type: literal
    kind: string
    exact: PostToolUse

# Unlike its siblings (PreToolUse / UserPromptSubmit / PostToolUse ...), this hook
# event is spelled with a plain English word, so the bare literal is not evidence of
# an agent hook at all — "Stop" is a button caption, a state enum and a keybinding
# label in ordinary code (it fired on a Textual `Binding("ctrl+S","stop","Stop")` in
# a music CLI). Demoted to a component and paired below with the hooks config key,
# which is where a real Stop hook is actually declared.
- id: agent-stop-hook
  desc: AI agent Stop hook
  crit: component
  if:
    type: literal
    kind: string
    exact: Stop

- id: agent-posttoolusefailure-hook
  desc: AI agent PostToolUseFailure hook
  if:
    type: literal
    kind: string
    exact: PostToolUseFailure

- id: agent-hooks-config-key
  desc: AI agent hooks config key
  crit: component
  if:
    type: literal
    kind: string
    exact: hooks

- id: agent-hook-updated-input
  desc: "AI agent hook rewrites tool input"
  if:
    type: literal
    kind: string
    substr: updatedInput

- id: agent-hook-output-block
  desc: "Emits AI agent hook output"
  if:
    type: literal
    kind: string
    word: hookSpecificOutput

- id: agent-hook-permission-decision
  desc: 'AI agent hook gates tool execution'
  if:
    type: literal
    kind: string
    substr: permissionDecision

- id: agent-session-hook--sessionstart
  desc: AI agent SessionStart hook
  crit: notable
  conf: 0.7
  if:
    type: literal
    kind: string
    exact: SessionStart
- id: agent-session-hook--sessionend
  desc: AI agent SessionEnd hook
  crit: notable
  conf: 0.7
  if:
    type: literal
    kind: string
    exact: SessionEnd

- id: agent-hook-lifecycle-stdin-forward
  desc: Forwards agent hook input to lifecycle command
  crit: notable
  conf: 0.92
  for: [shell]
  if:
    type: text
    regex: '(?m)\bcat\s*\|\s*[A-Za-z0-9_.-]+\s+lifecycle\s+[a-z][a-z0-9_-]*\b'
- id: agent-skill-entry-declaration
  desc: AI agent skill entry declaration
  crit: notable
  conf: 0.88
  ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
  for: [python, javascript, typescript, ruby, text]
  if:
    type: text
    regex: '\b(SkillEntry|AgentSkill|tool\s*skill|AI agent skill)\b'
- id: packaged-agent-skill-body
  desc: Packaged AI agent skill body
  crit: notable
  conf: 0.9
  ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
  for: [python, javascript, typescript, ruby, text]
  unless:
  - id: metadata/file/format::adblock-filter-list
  - type: text
    substr: const CHORD_DATA =
  if:
    type: text
    regex: '(?s)\b(SkillEntry|AgentSkill|skill_body).{0,240}\b(body|prompt)\b'
- id: llm-generated-skill-body-field
  desc: LLM generated skill body field
  crit: notable
  conf: 0.9
  for: [python, javascript, typescript, ruby, text]
  if:
    type: text
    substr: '"skill_body"'
- id: llm-generated-skill-md-write
  desc: Writes generated agent skill markdown
  crit: notable
  conf: 0.96
  for: [python]
  if:
    type: text
    regex: 'SKILL\.md["'']\)\.write_text\(.{0,80}skill_body'
- id: proposed-agent-skill-directory-move
  desc: Moves proposed agent skill directory
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: 'shutil\.move\s*\(.{0,80}source.{0,80}target'
- id: agent-memory-sync-command
  desc: AI agent memory sync command
  crit: notable
  conf: 0.93
  ref: sha256:ffbf482c4b6c5a57944da3576001f383e4cb61bce3ed008b813487357e49e107
  if:
    type: text
    regex: '\b[A-Za-z0-9_.-]+\s+memory\s+sync\s+--project-dir\s+\.'
- id: agent-memory-md-session-load
  desc: AI agent session loads MEMORY.md
  crit: notable
  conf: 0.9
  ref: sha256:ffbf482c4b6c5a57944da3576001f383e4cb61bce3ed008b813487357e49e107
  if:
    type: text
    regex: '(?is)`?MEMORY\.md`?.{0,80}(session start|prior session)'
- id: agent-mandatory-memory-capture
  desc: Mandatory AI agent memory capture
  crit: notable
  conf: 0.92
  ref: sha256:ffbf482c4b6c5a57944da3576001f383e4cb61bce3ed008b813487357e49e107
  if:
    type: text
    regex: '(?is)\b(every|all)\s+memory\s+operation.{0,180}\b(goes through|go through|use)\b'
- id: agent-proactive-memory-store-instruction
  desc: AI agent proactively stores memories
  crit: notable
  conf: 0.9
  ref: sha256:ffbf482c4b6c5a57944da3576001f383e4cb61bce3ed008b813487357e49e107
  if:
    type: text
    regex: '(?is)\bstore proactively\b.{0,220}\b(remember|memory-worthy|preference|decision)'
- id: agent-hook-input-read--hookeventname
  desc: Reads AI agent hook tool input (hookEventName)
  crit: component
  if:
    type: literal
    kind: string
    word: hookEventName
- id: agent-hook-input-read--hook-event-name
  desc: Reads AI agent hook tool input (hook_event_name)
  crit: component
  if:
    type: literal
    kind: string
    word: hook_event_name
- id: agent-hook-input-read--tool-input
  desc: Reads AI agent hook tool input (tool_input)
  crit: component
  if:
    type: literal
    kind: string
    word: tool_input
- id: agent-hook-input-read--tool-name
  desc: Reads AI agent hook tool input (tool_name)
  crit: component
  if:
    type: literal
    kind: string
    word: tool_name

- id: agent-hook-stdin-captured-input
  desc: Captures hook stdin in INPUT
  crit: component
  conf: 0.96
  for: [shell]
  if:
    type: text
    regex: '(?i)\bINPUT\s*=\s*\$\(cat\)'

- id: agent-hook-curl-data-input
  desc: Sends INPUT with curl data
  crit: component
  conf: 0.94
  for: [shell]
  if:
    type: text
    regex: '(?is)\bcurl\b[\s\S]{0,300}--data(-raw)?\s+["'']?\$INPUT\b'

- id: agent-hook-curl-short-data-input
  desc: Sends INPUT with curl short data
  crit: component
  conf: 0.94
  for: [shell]
  if:
    type: text
    regex: '(?is)\bcurl\b[\s\S]{0,300}-d\s+["'']?\$INPUT\b'

- id: agent-hook-transcript-file-read
  desc: Reads AI agent transcript file
  crit: notable
  conf: 0.94
  for: [shell]
  mbc: C0016
  if:
    type: text
    regex: '(?i)\b(open|cat)\s*\(?["'']?\$[A-Z_]*TRANSCRIPT_PATH\b'
composite_rules:
# A Stop hook is only identifiable where it is declared — next to the `hooks`
# config key — which is what keeps the generic "Stop" literal from firing on
# every UI label. Restores the standalone signal the demoted atom used to carry.
- id: agent-stop-hook-configured
  desc: AI agent Stop hook configured
  crit: notable
  conf: 0.9
  all:
  - id: agent-stop-hook
  - id: agent-hooks-config-key
  # Reads the agent's tool input AND emits a rewrite of it = actively intercepting and
  # modifying what the AI agent reads/runs — the signature of an agent tool-call
  # interception layer (in-flight Read redirect, Bash command wrapping, …).
- id: agent-session-hook
  desc: AI agent SessionStart/SessionEnd hook
  crit: notable
  conf: 0.7
  downgrade:
    any:
    - id: agent-pretooluse-hook
    - id: agent-userpromptsubmit-hook
    - id: agent-hook-updated-input
    - id: agent-hook-output-block
    - id: agent-hook-permission-decision
    - id: micro-behaviors/communications/ipc/agent-hook/
  any:
  - id: agent-session-hook--sessionstart
  - id: agent-session-hook--sessionend
- id: agent-hook-input-read
  desc: Reads AI agent hook tool input
  crit: component
  any:
  - id: agent-hook-input-read--hookeventname
  - id: agent-hook-input-read--hook-event-name
  - id: agent-hook-input-read--tool-input
  - id: agent-hook-input-read--tool-name
- id: ai-agent-tool-call-interception
  desc: Intercepts and rewrites AI agent tool calls
  crit: notable
  conf: 0.9
  all:
  - id: agent-hook-input-read
  - id: agent-hook-updated-input

- id: agent-hook-stdin-http-forward
  desc: Posts agent hook stdin to HTTP
  crit: notable
  conf: 0.94
  for: [shell]
  mbc: C0002
  attack: T1071.001
  near_bytes: 900
  all:
  - id: agent-hook-stdin-captured-input
  any:
  - id: agent-hook-curl-data-input
  - id: agent-hook-curl-short-data-input
