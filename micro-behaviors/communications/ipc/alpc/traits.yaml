# Windows ALPC (Advanced Local Procedure Call)
# Used legitimately for Windows IPC, but also abused by Pool Party injection
# ATT&CK: T1055 (Process Injection)
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: nt-alpc-create-port
    desc: NtAlpcCreatePort API reference
    crit: notable
    conf: 0.80
    attack: "T1055"
    if:
      type: string
      exact: "NtAlpcCreatePort"
  - id: nt-alpc-connect-port
    desc: NtAlpcConnectPort API reference
    crit: notable
    conf: 0.80
    attack: "T1055"
    if:
      type: string
      substr: "NtAlpcConnectPort"
  - id: nt-alpc-set-information
    desc: NtAlpcSetInformation API reference
    crit: notable
    conf: 0.80
    attack: "T1055"
    if:
      type: string
      substr: "NtAlpcSetInformation"
  - id: tp-alloc-alpc-completion
    desc: TpAllocAlpcCompletion worker factory API
    crit: notable
    conf: 0.85
    attack: "T1055"
    if:
      type: string
      substr: "TpAllocAlpcCompletion"
composite_rules:
  - id: alpc-port-setup
    desc: ALPC port creation and connection
    crit: suspicious
    conf: 0.88
    attack: "T1055"
    needs: 2
    any:
      - id: nt-alpc-create-port
      - id: nt-alpc-connect-port
      - id: nt-alpc-set-information
  - id: alpc-worker-injection
    desc: ALPC worker factory thread pool injection
    crit: suspicious
    conf: 0.92
    attack: "T1055"
    all:
      - id: tp-alloc-alpc-completion
    any:
      - id: nt-alpc-create-port
      - id: nt-alpc-connect-port
