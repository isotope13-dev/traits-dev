defaults:
  attack: T1055
  for:
    - pe
  platforms:
    - windows
traits:
  - id: nt-alpc-create-port
    desc: NtAlpcCreatePort API reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: NtAlpcCreatePort
  - id: nt-alpc-connect-port
    desc: NtAlpcConnectPort API reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: NtAlpcConnectPort
  - id: nt-alpc-set-information
    desc: NtAlpcSetInformation API reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: NtAlpcSetInformation
  - id: tp-alloc-alpc-completion
    desc: TpAllocAlpcCompletion worker factory API
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: TpAllocAlpcCompletion
composite_rules:
  - id: alpc-port-setup
    desc: ALPC port creation and connection
    crit: notable
    conf: 0.88
    needs: 2
    any:
      - id: nt-alpc-create-port
      - id: nt-alpc-connect-port
      - id: nt-alpc-set-information
    downgrade:
      any:
        - type: symbol
          exact: NdrClientCall
        - type: symbol
          exact: RpcServerListen
        - id: metadata/package/versioning::version-resource-metadata
    unless:
      - id: metadata/binary/metrics::many-exports-200
      - id: metadata/signed/platform::microsoft
  - id: alpc-worker-injection
    desc: ALPC worker factory thread pool injection
    crit: notable
    conf: 0.92
    all:
      - id: tp-alloc-alpc-completion
    any:
      - id: nt-alpc-create-port
      - id: nt-alpc-connect-port
    downgrade:
      any:
        - type: symbol
          exact: NdrClientCall
        - type: symbol
          exact: RpcServerListen
        - id: metadata/package/versioning::version-resource-metadata
    unless:
      - id: metadata/binary/metrics::many-exports-200
      - id: metadata/signed/platform::microsoft
