defaults:
  for: [javascript, typescript, python, lua, markdown]
  platforms: [unix, windows]
  crit: notable
traits:
- id: mcp-call-tool-response
  desc: MCP tool call response type
  conf: 0.85
  if:
    type: string_literal
    substr: MCPCallToolResponse
- id: mcp-call-tool-handler
  desc: MCP call_tool handler name
  conf: 0.9
  if:
    type: string_literal
    exact: call_tool
- id: mcp-list-tools-handler
  desc: MCP list_tools handler name
  conf: 0.9
  if:
    type: string_literal
    exact: list_tools
- id: mcp-stdio-transport
  desc: MCP stdio transport class
  conf: 0.9
  if:
    type: string_literal
    regex: StdioServerTransport|server/stdio
- id: mcp-client-config-doc
  desc: MCP client config documentation
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'MCP server|mcp\.json\.example|MCP config examples?'
- id: mcp-tools-call-method
  desc: MCP tools/call JSON-RPC method
  conf: 0.85
  if:
    type: string_literal
    substr: tools/call
- id: mcp-tools-list-method
  desc: MCP tools/list JSON-RPC method
  conf: 0.8
  if:
    type: string_literal
    substr: tools/list
- id: mcp-client-list-tools-call
  desc: MCP client lists server tools
  conf: 0.94
  for: [python]
  if:
    type: symbol
    kind: call
    regex: '(^|\.)(client|session)\.list_tools$'
- id: mcp-client-call-tool-call
  desc: MCP client invokes server tool
  conf: 0.94
  for: [python]
  if:
    type: symbol
    kind: call
    regex: '(^|\.)(client|session)\.call_tool$'
- id: mcp-client-stdio-import
  desc: MCP client imports stdio transport
  conf: 0.94
  for: [python]
  if:
    type: symbol
    kind: import
    exact: stdio_client
- id: mcp-client-stdio-server-parameters
  desc: MCP client imports stdio server parameters
  conf: 0.94
  for: [python]
  if:
    type: symbol
    kind: import
    exact: StdioServerParameters
- id: mcp-server-reconnect-function
  desc: MCP server reconnection function
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: 'async\s+def\s+reconnect_server\s*\('
- id: mcp-protocol-version-field
  desc: MCP protocolVersion field
  crit: component
  conf: 0.88
  if:
    type: string_literal
    exact: protocolVersion
- id: mcp-lua-execution-tool-name
  desc: MCP Lua execution tool name
  crit: component
  conf: 0.94
  for: [python, javascript, typescript]
  if:
    type: text
    regex: '["'']name["'']\s*:\s*["''][A-Za-z0-9_]*(execute|run|eval)_lua["'']'
- id: mcp-arbitrary-lua-description
  desc: MCP arbitrary Lua description
  crit: component
  conf: 0.94
  for: [python, javascript, typescript]
  if:
    type: text
    substr: arbitrary Lua code
- id: fastmcp-import
  desc: Imports FastMCP server API
  conf: 0.85
  for: [python]
  if:
    type: symbol
    kind: import
    regex: '^(FastMCP|mcp\.server\.fastmcp)$'
- id: fastmcp-stdio-transport
  desc: FastMCP server uses stdio transport
  crit: notable
  conf: 0.94
  for: [python]
  if:
    type: text
    regex: 'mcp\.run\([^)]{0,80}transport\s*=\s*["'']stdio["'']'
- id: python-tool-decorator
  desc: Python .tool decorator
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: '(?m)^[ \t]*@[A-Za-z_][A-Za-z0-9_.]*\.tool[ \t]*\('
- id: python-mcp-server-call-tool
  desc: Python invokes an MCP tool by name
  crit: notable
  conf: 0.92
  for: [python]
  if:
    type: symbol
    kind: call
    exact: mcp_server.call_tool
- id: python-mcp-streamable-http-app
  desc: Builds a streamable HTTP MCP application
  crit: notable
  conf: 0.94
  for: [python]
  if:
    type: symbol
    kind: call
    exact: mcp.streamable_http_app
- id: python-shell-server-import
  desc: Imports a Python MCP shell server
  crit: notable
  conf: 0.98
  for: [python]
  if:
    type: symbol
    kind: import
    exact: shell.server
- id: mcp-client-config-key--mcpservers
  desc: MCP client config key (mcpServers)
  crit: component
  conf: 0.9
  if:
    type: text
    word: mcpServers
- id: mcp-client-config-key--mcp-servers-toml
  desc: MCP client config key (mcp_servers)
  crit: component
  conf: 0.9
  ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
  if:
    type: text
    word: mcp_servers
- id: mcp-client-config-key--modelcontextprotocolservers
  desc: MCP client config (modelContextProtocolServers)
  crit: component
  conf: 0.9
  if:
    type: text
    word: modelContextProtocolServers
- id: mcp-server-command-args-fields
  desc: MCP server command and argument fields
  conf: 0.88
  ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
  if:
    type: text
    regex: '["'']command["'']\s*:[\s\S]{0,120}["'']args["'']'
- id: python-mcp-server-env-renderer
  desc: Python renders MCP server environment config
  conf: 0.92
  for: [python]
  if:
    type: text
    regex: 'mcp_servers\.[A-Za-z0-9_.-]+\.env|mcpServers[\s\S]{0,160}["'']env["'']'
- id: mcp-rust-child-process-transport
  desc: MCP Rust child-process transport
  conf: 0.92
  for: [rust]
  if:
    type: text
    substr: ChildProcessTransport
- id: mcp-config-npx-command
  desc: MCP config uses npx command
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']command["'']\s*:\s*["'']npx["'']'
- id: npx-mcp-remote-command-line
  desc: npx mcp-remote command line
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bnpx\s+(-\S+\s+){0,4}mcp-remote\b'
- id: mcp-remote-package-reference
  desc: mcp-remote package reference
  crit: component
  conf: 0.9
  if:
    type: text
    substr: mcp-remote
- id: external-mcp-sse-endpoint
  desc: External MCP SSE endpoint
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'https://[^\s''"`<>()]{1,120}/mcp/sse'
- id: mcp-serve-args-field
  desc: MCP serve argument field
  conf: 0.9
  ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
  if:
    type: text
    regex: '["'']mcp["''][\s\S]{0,80}["'']serve["'']'
- id: mcp-package-registry-symbols--mcp-registry
  desc: MCP package registry installer (MCP_REGISTRY)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: MCP_REGISTRY
- id: mcp-package-registry-symbols--mcp-config-path
  desc: MCP package registry installer (MCP_CONFIG_PATH)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: MCP_CONFIG_PATH
- id: mcp-package-registry-symbols--install-mcp
  desc: MCP package registry installer (install_mcp)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: install_mcp

- id: mcp-agent-target-option
  desc: MCP configuration names a local AI agent
  crit: notable
  conf: 0.9
  for: [python, javascript, typescript, shell, markdown]
  if:
    type: text
    regex: '(?i)--agent[ \t]+(codex|claude-code|cursor)\b'
- id: browser-mcp-intent-category-a
  desc: Browser MCP intent category
  crit: notable
  conf: 0.98
  for: [python]
  if:
    type: literal
    kind: string
    regex: '^browser\.(navigation|inspect|interact)$'
- id: browser-mcp-intent-category-b
  desc: Browser MCP privileged intent category
  crit: notable
  conf: 0.98
  for: [python]
  if:
    type: literal
    kind: string
    regex: '^browser\.(transfer|privileged)$'
- id: browser-mcp-cookie-label
  desc: Browser MCP cookie surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: cookies}
- id: browser-mcp-storage-label
  desc: Browser MCP storage surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: storage}
- id: browser-mcp-auth-header-label
  desc: Browser MCP auth header label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: auth_headers}
- id: browser-mcp-cdp-label
  desc: Browser MCP CDP surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: cdp}
- id: browser-mcp-script-eval-label
  desc: Browser MCP script evaluation label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: script_eval}
- id: browser-mcp-intercept-label
  desc: Browser MCP intercept surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: network_intercept}
- id: browser-mcp-clipboard-label
  desc: Browser MCP clipboard surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: clipboard}
- id: browser-mcp-download-label
  desc: Browser MCP download surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: download}
- id: browser-mcp-upload-label
  desc: Browser MCP upload surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: upload}
- id: browser-mcp-password-label
  desc: Browser MCP password surface label
  crit: notable
  conf: 0.97
  for: [python]
  if: {type: literal, kind: string, exact: password_field}
- id: browser-mcp-profile-mode-flag-a
  desc: Browser MCP profile flags
  crit: notable
  conf: 0.97
  for: [python]
  if:
    type: literal
    kind: string
    regex: '^--(user-data-dir|profile-dir|storage-state)$'
- id: browser-mcp-profile-mode-flag-b
  desc: Browser MCP isolation flags
  crit: notable
  conf: 0.97
  for: [python]
  if:
    type: literal
    kind: string
    regex: '^--(persistent|shared|no-isolated)$'
- id: browser-mcp-profile-mode-flag-c
  desc: Browser MCP debug flags
  crit: notable
  conf: 0.97
  for: [python]
  if:
    type: literal
    kind: string
    regex: '^--remote-debugging-(port|pipe)$'
- id: browser-mcp-profile-mode-flag-d
  desc: Browser MCP remote mode marker
  crit: notable
  conf: 0.97
  for: [python]
  if:
    type: literal
    kind: string
    regex: '^(remote-debugging|--ws-endpoint)$'
composite_rules:
  - id: browser-mcp-security-intent-normalizer
    desc: Browser MCP security intent normalization
    crit: notable
    conf: 0.98
    for: [python]
    all:
      - id: browser-mcp-intent-category
      - id: browser-mcp-sensitive-surface-label
      - id: browser-mcp-profile-mode-detection
  - id: browser-mcp-intent-category
    desc: Browser MCP intent categories
    crit: notable
    conf: 0.98
    for: [python]
    any:
      - id: browser-mcp-intent-category-a
      - id: browser-mcp-intent-category-b
  - id: browser-mcp-sensitive-surface-label
    desc: Browser MCP sensitive surface labels
    crit: notable
    conf: 0.97
    for: [python]
    any:
      - id: browser-mcp-cookie-label
      - id: browser-mcp-storage-label
      - id: browser-mcp-auth-header-label
      - id: browser-mcp-cdp-label
      - id: browser-mcp-script-eval-label
      - id: browser-mcp-intercept-label
      - id: browser-mcp-clipboard-label
      - id: browser-mcp-download-label
      - id: browser-mcp-upload-label
      - id: browser-mcp-password-label
  - id: browser-mcp-profile-mode-detection
    desc: Browser MCP profile mode detection
    crit: notable
    conf: 0.97
    for: [python]
    any:
      - id: browser-mcp-profile-mode-flag-a
      - id: browser-mcp-profile-mode-flag-b
      - id: browser-mcp-profile-mode-flag-c
      - id: browser-mcp-profile-mode-flag-d
  - id: python-mcp-interpreter-tool
    desc: MCP tool passes caller-supplied code to the Python interpreter
    crit: notable
    conf: 0.98
    for: [python]
    all:
      - id: fastmcp-import
      - id: python-tool-decorator
      - id: micro-behaviors/process/create/subprocess::python-interpreter-code-argument

  - id: python-mcp-file-interpreter-tool
    desc: MCP tool passes a caller-supplied file to the Python interpreter
    crit: notable
    conf: 0.96
    for: [python]
    all:
      - id: fastmcp-import
      - id: python-tool-decorator
      - id: micro-behaviors/process/create/subprocess::python-interpreter-file-argument

  - id: python-mcp-http-shell-dispatch
    desc: Routes an HTTP request to an MCP shell server
    crit: notable
    conf: 0.98
    for: [python]
    all:
      - id: micro-behaviors/communications/http/server/request::http-post-endpoint
      - id: micro-behaviors/communications/http/server/framework::fastapi-import
      - id: python-mcp-server-call-tool
      - id: python-shell-server-import
  - id: mcp-jsonrpc-server-dispatch
    desc: MCP JSON-RPC server dispatch
    crit: notable
    conf: 0.9
    all:
      - id: mcp-tools-call-method
      - id: mcp-tools-list-method
      - id: mcp-protocol-version-field
  - id: mcp-arbitrary-code-tool-schema
    desc: MCP arbitrary code tool schema
    crit: notable
    conf: 0.94
    near_lines: 8
    all:
      - id: mcp-lua-execution-tool-name
      - id: mcp-arbitrary-lua-description
  - id: mcp-client-config-key
    desc: MCP client config key
    crit: component
    conf: 0.9
    any:
      - id: mcp-client-config-key--mcpservers
      - id: mcp-client-config-key--mcp-servers-toml
      - id: mcp-client-config-key--modelcontextprotocolservers
  - id: mcp-package-registry-symbols
    desc: MCP package registry installer symbols
    crit: component
    conf: 0.9
    for: [python]
    any:
      - id: mcp-package-registry-symbols--mcp-registry
      - id: mcp-package-registry-symbols--mcp-config-path
      - id: mcp-package-registry-symbols--install-mcp
  - id: mcp-client-package-registry
    desc: MCP package registry installer
    crit: component
    conf: 0.92
    all:
      - id: mcp-package-registry-symbols
    any:
      - id: micro-behaviors/fs/path/application/config::mcp-json-filename
      - id: micro-behaviors/fs/path/application/config::mcp-config-json-filename
  - id: mcp-client-config-installer
    desc: MCP client config installer
    crit: component
    conf: 0.92
    any:
      - id: mcp-client-config-key
      - id: mcp-client-config-doc
      - id: mcp-client-package-registry
  - id: mcp-server-command-schema
    desc: MCP server command schema
    crit: notable
    conf: 0.91
    ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
    near_lines: 30
    all:
      - id: mcp-server-command-args-fields
      - id: mcp-serve-args-field
  - id: remote-mcp-server-over-npx
    desc: Remote MCP server via npx
    crit: notable
    conf: 0.93
    all:
      - id: mcp-remote-package-reference
      - id: external-mcp-sse-endpoint
    any:
      - id: mcp-config-npx-command
      - id: npx-mcp-remote-command-line
