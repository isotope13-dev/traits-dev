defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94

traits:
  - id: extension-login-token-message
    desc: Forwards login token through extension messaging
    if:
      type: text
      regex: 'WEB_LOGIN.{0,160}runtime\.sendMessage\([^)]{0,120}token'
