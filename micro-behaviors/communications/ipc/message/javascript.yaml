defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: js-event-on-message
    desc: JavaScript 'message' event listener
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\.on\(["'']message["'']'

  # Standard window/worker postMessage receiver. Used by every page that
  # talks to web workers, iframes, or extension content scripts. Capability,
  # not intent.
  - id: postmessage-listener
    desc: Registers window or worker message listener
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: addEventListener\(['"]message['"]

  - id: postmessage-to-iframe
    desc: Sends postMessage to iframe
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (contentWindow|iframe\.contentWindow)[\s\S]{0,160}\.postMessage\s*\(

  - id: postmessage-to-parent
    desc: Sends postMessage to parent frame
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: window\.parent\.postMessage\s*\(

  - id: postmessage-call
    desc: Sends data with window or worker postMessage
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      substr: .postMessage

  - id: postmessage-function-override
    desc: Replaces a postMessage function
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(window\.)?parent\.postMessage\s*='

  - id: node-cluster-import
    desc: Imports Node.js cluster module
    crit: component
    conf: 1.0
    if:
      type: symbol
      exact: cluster

  - id: node-process-send
    desc: Sends message via Node.js process.send
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: process.send

  - id: js-deserialise
    desc: Defines JavaScript data deserialize function
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: '[Dd]eseriali[sz]e'

  - id: js-serialise
    desc: Uses serialise function
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: '[Ss]eriali[sz]e'

  - id: node-cluster-role-check
    desc: 'Checks Node.js cluster process role'
    crit: notable
    conf: 1.0
    if:
      type: symbol
      regex: 'cluster\.(isMaster|isWorker|isPrimary)'

  - id: koishi-message-event-hook
    desc: Hooks Koishi message event
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: ctx\.on\(\s*["']message["']

  - id: koishi-private-message-send
    desc: Sends Koishi private message
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: sendPrivateMessage

  - id: koishi-private-message-hardcoded-user
    desc: Private message targets hardcoded user
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: sendPrivateMessage\(\s*["'][0-9]{6,16}["']

  - id: koishi-private-message-repeated-send
    desc: Repeats Koishi private message send
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: string_literal
      substr: sendPrivateMessage

  - id: json-file-command-queue-python
    desc: JSON file command queue
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: text
      substr: '"_queue.txt"'

  - id: json-file-command-queue-lua
    desc: JSON file command queue
    crit: notable
    conf: 0.88
    for: [lua]
    if:
      type: text
      substr: '"/_queue.txt"'

  - id: queued-json-command-dispatch
    desc: Queued JSON command dispatch
    crit: notable
    conf: 0.88
    for: [python, lua]
    if:
      type: text
      regex: 'json\.(loads|decode)\([\s\S]{0,500}(handlers|handle_call)\[[^]]*(method|name)[^]]*\]'

composite_rules:
  - id: node-cluster-ipc
    desc: Node.js Cluster IPC messaging
    crit: notable
    conf: 0.9
    all:
      - id: node-cluster-import
      - id: js-event-on-message

  - id: js-serialise-and-send-ipc
    desc: Serializes data and sends via IPC
    crit: notable
    conf: 0.9
    all:
      - id: js-serialise
      - id: node-process-send
