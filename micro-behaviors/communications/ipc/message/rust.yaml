defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.85

traits:
- id: rust-kafka-record-send
  desc: Rust Kafka record send
  for: [rust]
  conf: 0.88
  if:
    type: text
    regex: '\bFutureRecord::to\s*\(|\.send::<.{1,80}>\s*\(\s*FutureRecord::to'

- id: rust-kafka-producer--futureproducer
  desc: Rust Kafka producer setup (FutureProducer)
  conf: 0.9
  for: [rust]
  if:
    type: text
    word: FutureProducer
- id: rust-kafka-producer--baseproducer
  desc: Rust Kafka producer setup (BaseProducer)
  conf: 0.9
  for: [rust]
  if:
    type: text
    word: BaseProducer
- id: rust-kafka-producer--threadedproducer
  desc: Rust Kafka producer setup (ThreadedProducer)
  conf: 0.9
  for: [rust]
  if:
    type: text
    word: ThreadedProducer
composite_rules:
- id: rust-kafka-producer
  desc: Rust Kafka producer setup
  for: [rust]
  conf: 0.9
  any:
  - id: rust-kafka-producer--futureproducer
  - id: rust-kafka-producer--baseproducer
  - id: rust-kafka-producer--threadedproducer
- id: rust-kafka-produce-message
  desc: Rust Kafka message production
  crit: notable
  conf: 0.92
  all:
  - id: rust-kafka-producer
  - id: rust-kafka-record-send
