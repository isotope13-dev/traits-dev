defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.85

traits:
  - id: rust-kafka-producer
    desc: Rust Kafka producer setup
    for: [rust]
    conf: 0.9
    if:
      type: text
      regex: '\b(FutureProducer|BaseProducer|ThreadedProducer)\b'

  - id: rust-kafka-record-send
    desc: Rust Kafka record send
    for: [rust]
    conf: 0.88
    if:
      type: text
      regex: '\bFutureRecord::to\s*\(|\.send::<.{1,80}>\s*\(\s*FutureRecord::to'

composite_rules:
  - id: rust-kafka-produce-message
    desc: Rust Kafka message production
    crit: notable
    conf: 0.92
    all:
      - id: rust-kafka-producer
      - id: rust-kafka-record-send
