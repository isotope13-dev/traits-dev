# Browser-extension message passing — the WebExtension form of inter-context
# IPC (popup <-> service worker <-> content script, and cross-extension).
# Generic IPC technique; sits alongside native pipes/mailslots/etc. in ipc/.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-runtime-send-message
    desc: Sends a browser extension runtime message
    crit: notable
    if:
      type: text
      regex: '(chrome|browser)\.runtime\.sendMessage|runtime\.sendMessage'
  # Field names an extension uses to hand captured page markup to its
  # background worker. The matcher previously accepted only the single token
  # `domTree:`, which was the field name of one analysed sample — renaming the
  # property was enough to evade every composite built on it, while the trait
  # still claimed to detect "page DOM" in general. Deliberately excludes bare
  # `html:`/`content:`, which are far too generic to imply page capture.
  - id: chrome-runtime-page-dom-field
    desc: WebExtension runtime message carries page DOM
    crit: notable
    conf: 0.94
    if:
      type: text
      # pageSource is commonly a search/telemetry label, not page markup.
      # Keep only field names that explicitly denote a serialized DOM payload.
      regex: '\b(domTree|domSnapshot|pageHtml)\s*:'
      case_insensitive: true
  - id: chrome-runtime-on-message
    desc: Registers a browser runtime message listener
    crit: notable
    if:
      type: text
      regex: 'runtime\s*(\?\.)?\s*onMessage(\.addListener)?'
  - id: chrome-runtime-on-message-external
    desc: Chrome external message listener
    if:
      type: text
      regex: '(chrome\.|browser\.)?runtime\.onMessageExternal(\.addListener)?'
  - id: chrome-runtime-connect-port
    desc: WebExtension runtime port connection
    if:
      type: text
      regex: '(chrome|browser)\.runtime\.connect\b|tabs\.connect\('
  - id: chrome-runtime-port-name
    desc: Chrome runtime named port
    crit: baseline
    if:
      type: text
      regex: 'runtime\.connect\s*\(\s*\{\s*name\s*:'
  - id: chrome-tabs-send-message
    desc: Tab content-script message send
    crit: baseline
    if:
      type: text
      regex: '(chrome|browser)\.tabs\.sendMessage\b'

  - id: page-forwarding-custom-event
    desc: Dispatches forwarding CustomEvent to page
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'CustomEvent\s*\(\s*["'']forwarding["'']'

composite_rules:
  - id: webextension-page-event-command-bridge
    desc: Runtime messages dispatch page commands
    crit: notable
    conf: 0.95
    all:
      - id: page-forwarding-custom-event
      - id: chrome-runtime-on-message
