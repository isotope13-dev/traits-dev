defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9

traits:
  - id: add-atom-a
    desc: Add an ANSI Windows atom
    if:
      type: symbol
      exact: AddAtomA
  - id: find-atom-a
    desc: Find an ANSI Windows atom
    if:
      type: symbol
      exact: FindAtomA
  - id: get-atom-name-a
    desc: Read an ANSI Windows atom name
    if:
      type: symbol
      exact: GetAtomNameA
  - id: global-add-atom-a
    desc: Add an ANSI global Windows atom
    if:
      type: symbol
      exact: GlobalAddAtomA
  - id: global-get-atom-name-a
    desc: Read an ANSI global atom name
    if:
      type: symbol
      exact: GlobalGetAtomNameA

composite_rules:
  - id: local-atom-table-readback
    desc: Local atom-table write and readback
    crit: notable
    conf: 0.92
    all:
      - id: add-atom-a
      - id: get-atom-name-a

  - id: global-atom-table-readback
    desc: Global atom-table write and readback
    crit: notable
    conf: 0.92
    all:
      - id: global-add-atom-a
      - id: global-get-atom-name-a

  - id: atom-table-readback
    desc: Windows atom-table write and readback
    crit: notable
    conf: 0.92
    any:
      - id: local-atom-table-readback
      - id: global-atom-table-readback
