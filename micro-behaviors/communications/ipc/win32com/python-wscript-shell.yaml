# Python WScript.Shell Usage via COM
# Detects usage of WScript.Shell object for scripting automation
# ATT&CK: T1059.005 (Command and Scripting Interpreter: Visual Basic)
defaults:
  crit: suspicious
  conf: 0.85
  for: [python]
  attack: "T1059.005"
  mbc: "E1059"
  platforms: [windows]
traits:
  - id: wscript-shell-progid
    desc: WScript.Shell COM ProgID string
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: '["'']WScript\.Shell(\.[0-9]+)?["'']'
composite_rules:
  - id: wscript-shell-python
    desc: Python WScript.Shell COM object creation
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/ipc/win32com::wscript-shell-progid
    any:
      - id: micro-behaviors/communications/ipc/win32com::import-win32com
      - id: micro-behaviors/communications/ipc/win32com::dispatch-call
