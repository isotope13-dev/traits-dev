defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: rpc-server-protseq-endpoint
    desc: Bind RPC server protocol endpoint
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: RpcServerUseProtseqEpW
  - id: rpc-server-register-interface
    desc: Register RPC server interface
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: RpcServerRegisterIfEx
  - id: rpc-server-unregister-interface
    desc: Unregister RPC server interface
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: RpcServerUnregisterIf
  - id: rpc-server-dispatch-stub
    desc: NDR RPC server dispatch stub
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: NdrServerCall2
  - id: rpc-server-listen
    desc: Start RPC server listener
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: RpcServerListen
  - id: rpc-local-protseq
    desc: Local RPC protocol sequence
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: ncalrpc
  - id: rpc-tcp-protseq
    desc: TCP RPC protocol sequence
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: ncacn_ip_tcp
  - id: rpc-impersonate-client
    desc: Impersonate connected RPC client
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: RpcImpersonateClient
  - id: rpc-revert-to-self
    desc: Revert from RPC impersonation
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: RpcRevertToSelf
composite_rules:
  - id: local-rpc-server
    desc: Local RPC server registration chain
    crit: notable
    conf: 0.93
    all:
      - id: rpc-server-protseq-endpoint
      - id: rpc-server-register-interface
    any:
      - id: rpc-server-dispatch-stub
      - id: rpc-local-protseq
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: tcp-rpc-server
    desc: TCP RPC server registration chain
    crit: notable
    conf: 0.94
    all:
      - id: rpc-server-protseq-endpoint
      - id: rpc-server-register-interface
      - id: rpc-tcp-protseq
    any:
      - id: rpc-server-dispatch-stub
      - id: rpc-server-listen
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: rpc-client-impersonation-flow
    desc: RPC client impersonation flow
    crit: notable
    conf: 0.94
    all:
      - id: rpc-impersonate-client
      - id: rpc-revert-to-self
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: local-rpc-impersonation-server
    desc: Local RPC server with impersonation
    crit: notable
    conf: 0.95
    all:
      - id: local-rpc-server
      - id: rpc-client-impersonation-flow
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
