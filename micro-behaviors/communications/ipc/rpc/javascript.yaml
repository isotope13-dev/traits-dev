defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: wallet-provider-eth-send-transaction
    desc: Ethereum wallet transaction RPC method
    if:
      type: string_literal
      exact: eth_sendTransaction
  - id: wallet-provider-wallet-send-transaction
    desc: Wallet transaction RPC method
    if:
      type: string_literal
      exact: wallet_sendTransaction
  - id: wallet-provider-solana-send-transaction
    desc: Solana wallet transaction RPC method
    if:
      type: string_literal
      exact: solana_signAndSendTransaction
  - id: wallet-provider-tron-send-transaction
    desc: Tron wallet transaction RPC method
    if:
      type: string_literal
      exact: tron_sendTransaction

composite_rules:
  - id: wallet-provider-send-method
    desc: Wallet provider transaction RPC method
    crit: notable
    conf: 0.9
    any:
      - id: wallet-provider-eth-send-transaction
      - id: wallet-provider-wallet-send-transaction
      - id: wallet-provider-solana-send-transaction
      - id: wallet-provider-tron-send-transaction
