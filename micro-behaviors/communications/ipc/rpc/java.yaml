defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
traits:
  - id: jvm-jndi-class-ref
    desc: JVM JNDI package reference
    crit: baseline
    conf: 0.86
    if:
      type: value
      path: class.class_refs[*]
      regex: '^javax/naming(/|$)'
  - id: jvm-rmi-class-ref
    desc: JVM RMI package reference
    crit: baseline
    conf: 0.86
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/rmi(/|$)'
