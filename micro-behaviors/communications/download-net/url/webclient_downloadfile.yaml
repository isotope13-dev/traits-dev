defaults:
  for: [documents]
  crit: notable
  conf: 0.8
  platforms:
    - windows
traits:
  - id: webclient-downloadfile
    desc: Obfuscated System.Net.WebClient.DownloadFile call
    for: [batch, powershell, javascript, vbs]
    if:
      type: raw
      regex: (?i)WebClient.{0,40}D\^?o\^?w\^?n\^?l\^?o\^?a\^?d\^?F\^?i\^?l\^?e
  - id: webclient-downloadfile-tokenized
    desc: Tokenized WebClient DownloadFile sequence
    crit: suspicious
    conf: 0.88
    for: [javascript, vbs]
    if:
      type: raw
      regex: '(?is)sv3qs9Wibn4e8b.{0,120}oWnlOna2u2.{0,80}FIl8y7ll'
  - id: webclient-downloadfile-office-vba
    desc: Office VBA WebClient DownloadFile chain
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: '(?is)(net.?we.?b.?client|we.?client).{0,180}(down.?load.?file|d.?wnl.?ad.?ile)'
composite_rules: []
