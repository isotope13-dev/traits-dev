# Go RPC Server Capabilities
# Detects Go net/rpc server registration and method exposure
# RATs commonly use RPC for structured C2 communication
# MBC: C0040 (Remote Procedure Call)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  mbc: "C0040"
traits:
  # AST-based detection for Go source
  - id: rpc-register
    desc: Go RPC server registration
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: ast
      kind: call
      exact: "rpc.Register"
  - id: rpc-register-name
    desc: Go RPC server registration with custom name
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: ast
      kind: call
      exact: "rpc.RegisterName"
  - id: rpc-serve-conn
    desc: Go RPC connection handler
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: ast
      kind: call
      exact: "rpc.ServeConn"
  - id: rpc-serve-codec
    desc: Go RPC codec handler
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: ast
      kind: call
      exact: "rpc.ServeCodec"
  # String-based detection for compiled binaries
  - id: rpc-register-string
    desc: net/rpc.Register in binary
    crit: notable
    conf: 0.75
    for: [elf, macho, pe]
    if:
      type: string
      substr: "net/rpc.Register"
  - id: rpc-serve-conn-string
    desc: net/rpc.ServeConn in binary
    crit: notable
    conf: 0.75
    for: [elf, macho, pe]
    if:
      type: string
      substr: "net/rpc.ServeConn"
  - id: rpc-import
    desc: Go net/rpc package import
    crit: baseline
    conf: 0.9
    for: [go]
    if:
      type: ast
      kind: import
      exact: "net/rpc"
composite_rules:
  # Helper composite: RPC registration
  - id: rpc-registration
    desc: Go RPC API registration
    crit: notable
    conf: 0.85
    for: [go]
    any:
      - id: rpc-register
      - id: rpc-register-name
  # Helper composite: RPC serving
  - id: rpc-serving
    desc: Go RPC connection serving
    crit: notable
    conf: 0.8
    for: [go]
    any:
      - id: rpc-serve-conn
      - id: rpc-serve-codec
  - id: rpc-server-setup
    desc: Go RPC server with connection handling
    crit: suspicious
    conf: 0.9
    for: [go]
    all:
      - id: rpc-import
      - id: rpc-registration
      - id: rpc-serving
