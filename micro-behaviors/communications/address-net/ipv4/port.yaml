defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: hardcoded-ipv4-port
    desc: Hardcoded IPv4 address with port
    crit: suspicious
    conf: 0.7
    for: [shell, python, javascript, powershell, pe, elf]
    count_min: 1
    if:
      type: string_value
      substr: "128.92.4.4"
