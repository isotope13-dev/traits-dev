defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: private-ip-check-js
    desc: Checks for private IP address ranges (JS)
    crit: notable
    if:
      type: ast
      language: javascript
      query: |
        (
          (call_expression
            function: (member_expression
              object: (identifier) @ip
              property: (property_identifier) @starts
            )
            arguments: (arguments . (string (string_fragment) @range))
          )
          (#eq? @starts "startsWith")
          (#not-match? @ip "^console$")
          (#match? @range "^(10\\.|172\\.|192\\.168|127\\.|fe80::)")
        )
    unless:
      - id: metadata/builder
      - id: metadata/dev/testing
      - id: metadata/library
  - id: private-ip-parts-js
    desc: Checks IP parts for private ranges (JS)
    # NOTE: #match? predicates are not enforced by engine, so this matches
    # any parts[N] === "string" pattern. Demoted to baseline until predicates work.
    crit: baseline
    count_min: 2
    if:
      type: ast
      language: javascript
      query: |
        (binary_expression
          left: (subscript_expression
            object: (identifier) @parts
            index: (number) @idx
          )
          operator: "==="
          right: (string (string_fragment) @val)
        )
        (#match? @val "^(10|172|192|127)$")
