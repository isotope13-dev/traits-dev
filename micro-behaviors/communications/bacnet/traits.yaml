# BACnet Building/Industrial Automation Protocol (UDP port 47808)
# Neutral protocol references — intent inferred at objectives tier.
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: notable
  conf: 0.85

traits:
  - id: keyword
    desc: BACnet keyword outside MIME data
    if:
      type: text
      regex: '(?i)(^|[^a-z/])bacnet\b'

  - id: library
    desc: BACnet library or module reference
    conf: 0.88
    if:
      type: text
      regex: (?i)(bacpypes|bacnet[-_]?stack|node-bacnet)
