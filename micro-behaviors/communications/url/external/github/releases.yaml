defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1105
traits:
  - id: github-release-download
    desc: GitHub releases download URL
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: github\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+/releases/download/
    unless:
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
      - id: metadata/package/testing/harness::is-test
