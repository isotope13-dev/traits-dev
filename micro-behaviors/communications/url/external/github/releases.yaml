defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, rust]
  attack: T1105
traits:
  - id: github-release-download
    desc: GitHub releases download URL
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: github\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+/releases/download/
    unless:
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
      - id: metadata/package/testing/harness/runtime::is-test
  - id: github-release-api-latest
    desc: GitHub latest release API URL
    crit: notable
    conf: 0.84
    if:
      type: raw
      regex: api\.github\.com/repos/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/releases/latest
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: github-archive-ref-download
    desc: GitHub archive refs download URL
    crit: notable
    conf: 0.84
    if:
      type: raw
      regex: github\.com/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/archive/refs/(tags|heads)/
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
