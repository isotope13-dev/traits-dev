defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, rust, python, source]
  attack: T1105
traits:
  - id: github-release-download
    desc: GitHub release asset URL template
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: github\.com/[A-Za-z0-9._${}/:-]+/releases/download/
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/build/docker::buildkit-dockerfile-frontend
      - id: metadata/package/testing/harness/runtime/
  - id: github-release-api-latest
    desc: GitHub latest release API template
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: api\.github\.com/repos/[A-Za-z0-9._${}/:-]+/releases/latest
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: github-archive-ref-download
    desc: References a GitHub branch or tag archive
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: github\.com/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/archive/refs/(tags|heads)/
    unless:
      - id: metadata/package/testing/harness/runtime/
