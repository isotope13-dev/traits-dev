defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1105
traits:
  - id: github-attachment-url
    desc: GitHub attachment/files URL
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: github\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+/files/[0-9]+/[a-zA-Z0-9._-]+
    not:
      - regex: \.(pdf|md|txt|doc|png|jpg|svg)$
