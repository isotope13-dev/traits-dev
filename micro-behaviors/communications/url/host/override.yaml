defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript, scripts]

traits:
  - id: hardcoded-url-host-assignment
    desc: Assigns a request or URL host property
    crit: notable
    conf: 0.82
    if:
      # Require a non-'=' RHS char so equality checks (.host === x) don't
      # register as assignments — Rust regex has no lookahead.
      type: text
      regex: '\b(req(uest)?|url|uri|options)\.host\s*=\s*[^=\s]'

  - id: forwarded-host-header
    desc: X-Forwarded-Host header literal
    crit: notable
    conf: 0.9
    if:
      type: literal
      substr: X-Forwarded-Host

composite_rules:
  - id: url-host-reassignment-forwarding
    desc: URL host reassignment near forwarding header
    crit: notable
    conf: 0.94
    near_lines: 20
    all:
      - id: hardcoded-url-host-assignment
      - id: forwarded-host-header
