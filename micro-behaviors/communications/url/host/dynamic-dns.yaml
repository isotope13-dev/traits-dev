defaults:
  platforms: [linux, macos, windows]
  for: [scripts, source, manifests, pe, elf, macho]

traits:
  - id: dynamic-dns-hostname
    desc: Dynamic DNS hostname reference
    crit: notable
    conf: 0.8
    attack: T1583.001
    if:
      type: text
      regex: '(?i)\b[a-z0-9][-a-z0-9]{0,62}\.(duckdns|no-ip|ddns|hopto)\.[a-z]{2,6}\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
