# URL shorteners are a neutral, notable signal — a shortened link hides its
# destination, which is worth surfacing, but presence alone is not exfiltration.
# Real exfil/C2/dropper intent comes from composites that pair these with a
# network fetch/download (see command-and-control and supply-chain consumers).
# Matching string_literal (not raw text) keeps doc/comment references in parsed
# languages from tripping the signal.
defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  for: [scripts, binaries]
traits:
  - id: bitly
    desc: bit.ly URL shortener
    if:
      type: string_literal
      regex: (https?://|//)bit\.ly/[A-Za-z0-9_-]{2,}
    unless:
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/file/catalog/identity/
    not:
      - substr: bit.ly/CRA-PWA
      - substr: bit.ly/iphoneoscodecs
      - substr: bit.ly/2QL99fu
      - substr: bit.ly/getsizebug1
      - substr: ShareX.UploadersLib
  - id: tinyurl
    desc: tinyurl.com URL shortener
    if:
      type: string_literal
      regex: (https?://)?tinyurl\.com/[A-Za-z0-9_-]{2,32}
    unless:
      - id: objectives/credential-access/cloud/token/oauth::sharex-uploaderslib-assembly
      - type: text
        substr: tinyurl.com/lsdw6p
      - type: text
        substr: tinyurl.com/p7c96j6
      - type: text
        regex: 'https?://tinyurl\.com/[^"'')>\s]+[`''"]?_'
    not:
      - substr: tinyurl.com/lsdw6p
      - substr: tinyurl.com/p7c96j6
  - id: t-co
    desc: t.co (Twitter) URL shortener
    if:
      type: string_literal
      regex: (https?://|//)t\.co/
  - id: rebrandly
    desc: rebrand.ly URL shortener
    if:
      type: string_literal
      regex: rebrand\.ly\b
  - id: buff-ly
    desc: buff.ly URL shortener
    if:
      type: string_literal
      regex: buff\.ly\b
  - id: goo-gl
    desc: goo.gl URL shortener (legacy)
    if:
      type: string_literal
      # Require URL form with a shortlink path; bare "goo.gl" matches prose /
      # doc references (e.g. Clojure nippy comments) that aren't live links.
      regex: (https?://|//)goo\.gl/[A-Za-z0-9_/-]{2,}
    unless:
      - id: metadata/library/automation/
  - id: ow-ly
    desc: ow.ly URL shortener
    if:
      type: string_literal
      regex: ow\.ly\b
  - id: is-gd
    desc: is.gd URL shortener
    if:
      type: string_literal
      # Leading \b prevents matching inside identifiers like `this.gd` in
      # minified JS (no word boundary before "is" in "this"); a real is.gd
      # domain is always preceded by a boundary (/, :, space, start).
      regex: \bis\.gd\b
    unless:
      - id: objectives/credential-access/cloud/token/oauth::sharex-uploaderslib-assembly
  - id: su-pr
    desc: su.pr URL shortener
    if:
      type: string_literal
      regex: su\.pr\b
  - id: bl-ink
    desc: bl.ink URL shortener
    if:
      type: string_literal
      regex: bl\.ink\b
