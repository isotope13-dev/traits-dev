defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: js-fragmented-url-protocol--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(var\s+\w+\s*=\s*"htt"(\s*\+\s*"p")?|y1\s*\+\s*CDhHN)'
- id: js-fragmented-url-protocol--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(\$\{\s*[''"]ht[''"]\s*\}\$\{\s*[''"]tp[''"]\s*\})'
composite_rules:
- id: js-fragmented-url-protocol
  desc: Fragmented URL Protocol (JS)
  crit: notable
  conf: 0.8
  any:
  - id: js-fragmented-url-protocol--rx-1
  - id: js-fragmented-url-protocol--rx-2
  needs: 1
