defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: js-fragmented-url-protocol
    desc: Fragmented URL Protocol (JS)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (var\s+\w+\s*=\s*"htt"(\s*\+\s*"p")?|y1\s*\+\s*CDhHN)
