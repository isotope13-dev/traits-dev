# Any encoded blob that decodes to an http(s):// URL is an unusual choice
# in legitimate code: app config, even tokenised config, almost never
# hides a URL behind base64/hex/xor. The pattern is heavily
# over-represented in loaders, dropper stagers, and supply-chain implants
# where the C2 URL is wrapped to defeat string scanners and review.
defaults:
  platforms: [unix, windows]
  for: [php, javascript, python, shell, powershell]
  mbc: B0032
  attack: T1027
  size_max: 20000000
traits:
  - id: braintree-client-token-doc-context
    desc: Braintree client-token documentation context
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'authorization: clientToken'

  - id: braintree-web-test-path
    desc: Braintree web test fixture path

    for: [typescript, javascript]
    crit: component
    conf: 0.95
    if:
      type: path
      regex: 'braintree-web[\\/]test[\\/](node|web)\.ts$'

  - id: inline-svg-data-uri-context
    desc: Contains an inline SVG data URI
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'data:image/svg+xml'

  - id: inline-image-data-uri-context
    desc: Contains an inline image data URI
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'data:image'

  - id: inline-font-data-uri-context
    desc: Inline web-font data URI context
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'data:(application|font)/[a-z0-9.+-]+[^,]{0,80};base64,'

  - id: wordpress-block-url-context
    desc: WordPress block URL context
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '<!--\s+wp:[\s\S]{0,240}https?://'

  - id: html-anchor-link-context
    desc: Visible HTML hyperlink, not an encoded URL
    # The decoded-string pool can include plain HTML string literals (e.g. a
    # `<a href='https://...'>` link list in a blog/UI component). A visible
    # anchor href is not a hidden/encoded dead-drop URL. This must search the
    # `encoded` corpus — the same pool where encoded-http/https-url match — so
    # the benign-context `unless:` actually fires (a `type: text` copy never
    # sees markup the string extractor filed under encoded strings).
    crit: component
    conf: 0.9
    if:
      type: encoded
      regex: '<a[^>]{0,120}href=["'']?https?://'

  - id: encoded-url-markdown-link-context
    desc: Visible Markdown hyperlink, not an encoded URL
    # A `[text](https://...)` Markdown link in a docstring lands in the encoded
    # pool (often alongside CJK text). The per-trait `not: '\]\(https?://'` can't
    # catch it because `not:` filters only the matched URL span, which no longer
    # contains the `](` preamble — so it must be an `unless:` context searching
    # the full encoded string (mirrors html-anchor-link-context).
    crit: component
    conf: 0.9
    if:
      type: encoded
      regex: '\]\(https?://'

  - id: encoded-url-doc-context
    desc: Encoded URL documentation context
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(@link\s+https?://|Example:\s+https?://)'
  - id: powershell-example-url-context
    desc: PowerShell comment example URL context
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: '(?is)\.EXAMPLE.{0,500}https?://'

  - id: encoded-url-public-doc-context
    desc: Encoded URL public documentation
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(example\.org|wikipedia\.org/wiki/|unicode\.org/)'

  - id: encoded-url-returns-doc-context
    desc: Encoded URL returns documentation context
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Returns:\s+["'']?[^"\n]{0,80}https?://'
  - id: percent-encoded-url-query-context
    desc: Percent-encoded URL query parameter
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https?://.{1,253}[?&].{0,300}%[0-9A-Fa-f]{2}'
  - id: percent-encoded-url-value-context
    desc: URL percent-encoded as a parameter value
    # A URL whose scheme separator is itself percent-encoded (`https%3A%2F%2F…`)
    # is ordinary RFC 3986 application/x-www-form-urlencoded value encoding —
    # the textbook case being an OAuth `redirect_uri=https%3A%2F%2F…` parameter.
    # That is standard URL handling, not a payload wrapped to defeat string
    # scanners (a dead-drop hides behind base64/hex/xor, never a percent-encoded
    # `://`). The `encoded` corpus URL-decodes this and surfaces the plain URL,
    # so the raw `%3A%2F%2F` marker must be matched against file text here.
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '%3[Aa]%2[Ff]%2[Ff]'
  - id: encoded-url-mdn-doc-context
    desc: Encoded URL references MDN documentation
    crit: component
    conf: 0.95
    if:
      type: text
      substr: developer.mozilla.org/

  - id: authenticode-script-signature-context
    desc: Authenticode script signature block context
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(?m)^# SIG # Begin signature block'

  - id: encoded-url-microsoft-doc-context
    desc: Encoded URL references Microsoft documentation
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(msdn\.microsoft\.com/|learn\.microsoft\.com/)'
  - id: stripe-private-frame-context
    desc: Stripe private iframe context
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "__privateStripeFrame"
  - id: js-commented-url-line-context
    desc: JavaScript comment contains a URL
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?m)^\s*//[^\n]{0,240}https?://'
  - id: python-commented-url-line-context
    desc: Python commented URL line context
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?m)^\s*#.{0,240}https?://'
  - id: percent-encoded-octet-context
    desc: Percent-encoded octet context
    crit: component
    conf: 0.85
    for: [javascript, typescript, python]
    if:
      type: text
      regex: '%[0-9A-Fa-f]{2}'
    unless:
      # Random alphabet-coded payloads in oversized minified sources contain
      # percent signs followed by hex characters without representing URLs.
      - id: metadata/library/structure::js-large-minified-bundle
  - id: encoded-commented-url-context
    desc: Encoded URL is source comment
    crit: component
    conf: 0.95
    if:
      type: encoded
      regex: '^["'']?#\s*https?://'
  - id: pkgbuild-commented-source-url-context
    desc: PKGBUILD commented source URL
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'source=\(#["'']https?://'
  - id: encoded-api-doc-url-context
    desc: Encoded API documentation URL
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https?://.{0,180}(api-?docs|apidocs|docs).{0,240}%[0-9A-Fa-f]{2}'

  - id: http-b64-protocol-fragment
    desc: Base64 HTTP protocol fragment
    crit: component
    conf: 0.6
    if:
      type: text
      substr: aHR0cDovL
    not:
      - regex: base64,.{0,500}aHR0cDovL
      - regex: data:image/[A-Za-z0-9.+-]+;base64,
    unless:
      - id: metadata/file/format::sourcemap-inline-base64
      - id: well-known/tool/development/stoobly-agent/
      - type: path
        regex: '(^|[^A-Za-z0-9_])stoobly_agent([\\/]|-|$)'
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports

  - id: https-b64-protocol-fragment
    desc: Base64 HTTPS protocol fragment
    crit: component
    conf: 0.6
    if:
      type: text
      substr: aHR0cHM6Ly
    not:
      - regex: ^iVBORw0KGgo
      - regex: base64,.{0,500}aHR0cHM6Ly
      - regex: data:image/[A-Za-z0-9.+-]+;base64,
    unless:
      - id: metadata/file/format::sourcemap-inline-base64
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports

  - id: atob-encoded-http-url-literal
    desc: atob decodes encoded HTTP URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\batob\s*\(\s*["'']aHR0c(HM6Ly|DovL)[A-Za-z0-9+/_=-]{8,300}["'']\s*\)'
    not:
      - regex: 'data:image/[A-Za-z0-9.+-]+;base64,'
    unless:
      - id: atob-encoded-url-benign-context
      - id: metadata/file/format::sourcemap-inline-base64

  - id: encoded-http-url
    desc: Encoded URL decoded to http(s)
    crit: notable
    conf: 0.85
    if:
      type: encoded
      regex: 'https?://[A-Za-z0-9._:\-]{2,253}(/|$)'
    not:
      - regex: '\]\(https?://'
      - regex: '^["'']?#\s*https?://'
      - regex: 'https?://schemas\.(microsoft|xmlsoap|openxmlformats)'
      - regex: 'https?://www\.w3\.org/'
      - regex: 'https?://(www\.)?apache\.org/'
      - regex: 'https?://json-schema\.org/'
      # Unicode standards body — cited in unicode-* crate generated tables
      - regex: 'https?://(www\.)?unicode\.org/'
      - regex: 'https?://([a-z0-9-]+\.)?wikipedia\.org/'
      - regex: '/{0,2}https?://developer\.mozilla\.org/'
      - regex: 'https?://developer\.mozilla\.org/'
      - regex: 'https?://([a-z0-9.-]+\.)?sandbox\.braintreegateway\.com(?::\d+)?'
      - regex: 'https?://(localhost|127\.0\.0\.1)'
      # RFC 2606 reserved TLDs (test, example, invalid, localhost) and example.com/.org/.net
      # — used in test fixtures, documentation, scanner pattern databases.
      - regex: 'https?://[A-Za-z0-9._\-]+\.(test|example|invalid|localhost)(/|:|$)'
      - regex: 'https?://(www\.)?example\.(com|org|net)(/|:|$)'
    unless:
      - id: metadata/library/ai/
      - id: micro-behaviors/communications/url/encoded/

  - id: encoded-https-url
    desc: Encoded URL decoded to https
    crit: notable
    conf: 0.9
    if:
      type: encoded
      regex: 'https://[A-Za-z0-9._:\-]{2,253}(/|$)'
    not:
      - regex: '\]\(https?://'
      - regex: '^["'']?#\s*https://'
      - regex: 'https://schemas\.(microsoft|xmlsoap|openxmlformats)'
      - regex: 'https://www\.w3\.org/'
      - regex: 'https://(www\.)?apache\.org/'
      - regex: 'https://json-schema\.org/'
      # Unicode standards body — cited in unicode-* crate generated tables
      - regex: 'https://(www\.)?unicode\.org/'
      - regex: 'https://[A-Za-z0-9._\-]+\.(test|example|invalid|localhost)(/|:|$)'
      - regex: 'https://(www\.)?example\.(com|org|net)(/|:|$)'
      - regex: 'https://([a-z0-9-]+\.)?wikipedia\.org/'
      - regex: '/{0,2}https://developer\.mozilla\.org/'
      - regex: 'https://developer\.mozilla\.org/'
      - regex: 'https://([a-z0-9.-]+\.)?sandbox\.braintreegateway\.com(?::\d+)?'
    unless:
      - id: micro-behaviors/communications/url/encoded/

  - id: javascript-charcode-http-scheme-call
    desc: Directly rebuilds HTTP scheme from char codes
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'String\.fromCharCode\s*\(\s*104\s*,\s*116\s*,\s*116\s*,\s*112\s*,\s*58\s*,\s*47\s*,\s*47'

  - id: javascript-charcode-http-scheme-array
    desc: Array contains HTTP scheme character codes
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\[\s*104\s*,\s*116\s*,\s*116\s*,\s*112\s*,\s*58\s*,\s*47\s*,\s*47\s*\]'

composite_rules:
  - id: javascript-charcode-http-scheme
    desc: Rebuilds HTTP scheme from char codes
    crit: notable
    conf: 0.92
    any:
      - id: javascript-charcode-http-scheme-call
      - id: javascript-charcode-http-scheme-array

  - id: js-commented-percent-encoded-url-context
    desc: JavaScript commented encoded URL context
    crit: component
    conf: 0.9
    near_lines: 1
    all:
      - id: js-commented-url-line-context
      - id: percent-encoded-octet-context
  - id: python-commented-percent-encoded-url-context
    desc: Python commented encoded URL context
    crit: component
    conf: 0.9
    near_lines: 1
    all:
      - id: python-commented-url-line-context
      - id: percent-encoded-octet-context
  - id: encoded-url-benign-context
    desc: Encoded URL benign documentation or test context
    crit: component
    conf: 0.95
    any:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
      - id: braintree-client-token-doc-context
      - id: braintree-web-test-path
      - id: metadata/library/automation::selenium-ie-driver-doc-context
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: encoded-api-doc-url-context
      - id: inline-svg-data-uri-context
      - id: wordpress-block-url-context
      - id: html-anchor-link-context
      - id: encoded-url-markdown-link-context
      - id: encoded-url-doc-context
      - id: powershell-example-url-context
      - id: encoded-url-public-doc-context
      - id: encoded-url-returns-doc-context
      - id: percent-encoded-url-query-context
      - id: percent-encoded-url-value-context
      - id: encoded-url-mdn-doc-context
      - id: authenticode-script-signature-context
      - id: encoded-url-microsoft-doc-context
      - id: stripe-private-frame-context
      - id: encoded-commented-url-context
      - id: js-commented-url-line-context
      - id: pkgbuild-commented-source-url-context
      - id: js-commented-percent-encoded-url-context
      - id: python-commented-percent-encoded-url-context
      - id: metadata/library/structure::js-known-bundler-output
      # Minified bundles routinely \u/\x-escape plain CDN/telemetry URLs (fonts,
      # analytics), which the encoded layer then surfaces as "encoded URLs".
      - id: metadata/library/structure::js-any-bundle-output
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/file/format::sourcemap-inline-base64
      - id: metadata/library/structure::js-umd-wrapper
      - id: metadata/library/structure::js-umd-wrapper-minified
      - id: metadata/library/structure::js-umd-wrapper-amd
      - id: metadata/library/structure::js-umd-wrapper-amd-minified
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: metadata/library/structure::js-hashed-asset-bundle
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: micro-behaviors/crypto/certificate/usage::has-pem-certificate
      - id: well-known/lib/guzzle
      - id: well-known/lib/phpseclib
  - id: atob-encoded-url-benign-context
    desc: atob encoded URL benign context
    crit: component
    conf: 0.95
    any:
      - id: braintree-client-token-doc-context
      - id: braintree-web-test-path
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: encoded-api-doc-url-context
      - id: inline-svg-data-uri-context
      - id: encoded-url-doc-context
      - id: powershell-example-url-context
      - id: encoded-url-public-doc-context
      - id: encoded-url-returns-doc-context
      - id: encoded-url-mdn-doc-context
      - id: authenticode-script-signature-context
      - id: encoded-url-microsoft-doc-context
      - id: encoded-commented-url-context
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/file/format::sourcemap-inline-base64
