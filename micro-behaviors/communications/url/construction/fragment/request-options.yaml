defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript

traits:
  - id: url-hostname-option
    desc: Request options use URL hostname
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: 'hostname: url.hostname'
    unless:
      - id: metadata/file/format::sourcemap-sources-content

  - id: url-path-search-option
    desc: Request path appends query string
    crit: notable
    conf: 0.93
    if:
      type: string_literal
      substr: url.pathname + url.search
    unless:
      - id: metadata/file/format::sourcemap-sources-content
