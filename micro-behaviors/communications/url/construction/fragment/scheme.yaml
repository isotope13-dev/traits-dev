defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
traits:
- id: js-fragmented-url-protocol--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'var\s+\w+\s*=\s*"htt"\s*\+\s*"p"'
  count_max: 1013690
- id: js-fragmented-url-protocol--y1-cdhhn
  desc: JavaScript URL fragment marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'y1\s*\+\s*CDhHN'
  count_max: 1013690
- id: js-fragmented-url-protocol--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(\$\{\s*[''"]ht[''"]\s*\}\$\{\s*[''"]tp[''"]\s*\})'
  count_max: 1013691
- id: js-fragmented-url-protocol-htt-p
  desc: HTTP scheme split before final character
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)["'']htt["'']\s*\+\s*["'']p[:s]{0,2}["'']'
  unless:
  - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
- id: js-fragmented-url-protocol-ht-tp
  desc: HTTP scheme split after first two characters
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)["'']ht["'']\s*\+\s*["'']tp[:s]{0,2}["'']'
  unless:
  - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
- id: js-fragmented-url-protocol-h-ttp
  desc: HTTP scheme split after first character
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)["'']h["'']\s*\+\s*["'']ttp[:s]{0,2}["'']'
  unless:
  - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
- id: js-fragmented-url-protocol-h-t-t-p
  desc: HTTP scheme split into four fragments
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)["'']h["'']\s*\+\s*["'']t["'']\s*\+\s*["'']t["'']\s*\+\s*["'']p[:s]{0,2}["'']'
  unless:
  - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
composite_rules:
- id: js-fragmented-url-protocol
  desc: Fragmented URL Protocol (JS)
  crit: notable
  conf: 0.8
  any:
  - id: js-fragmented-url-protocol--rx-1
  - id: js-fragmented-url-protocol--y1-cdhhn
  - id: js-fragmented-url-protocol--rx-2
  - id: js-fragmented-url-protocol-htt-p
  - id: js-fragmented-url-protocol-ht-tp
  - id: js-fragmented-url-protocol-h-ttp
  - id: js-fragmented-url-protocol-h-t-t-p
