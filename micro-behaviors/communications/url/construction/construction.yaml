defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: ruby-iplogger-url
    desc: Detects 'iplogger.org' URL construction
    crit: suspicious
    if:
      type: ast
      language: ruby
      query: "((string) @str\n (#match? @str \"iplogger.*org\"))\n"
