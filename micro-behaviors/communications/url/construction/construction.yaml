defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: ruby-iplogger-url
    desc: Detects 'iplogger.org' URL construction
    crit: suspicious
    if:
      type: ast
      language: ruby
      query: |
        ((string) @str
         (#match? @str "iplogger.*org"))
