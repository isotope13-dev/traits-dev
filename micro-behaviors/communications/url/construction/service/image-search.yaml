# URL construction patterns for image-search browser helpers.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.86

traits:
- id: image-url-search-param
  desc: Search URL carries image URL parameter
  if:
    type: text
    regex: '[?&](imgurl|imageUrl|image_url|img_url)='
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file

- id: image-upload-helper
  desc: Image upload helper function
  conf: 0.8
  if:
    type: text
    regex: '\b(uploadImage(ToHost)?)\b'
  unless:
  - id: metadata/package/testing/
  - id: metadata/file/format::sourcemap-sources-content

- id: search-by-image-handler--searchbyimage
  desc: Search-by-image handler function (searchByImage)
  conf: 0.82
  if:
    type: text
    word: searchByImage
- id: search-by-image-handler--reverseimagesearch
  desc: Search-by-image handler (reverseImageSearch)
  conf: 0.82
  if:
    type: text
    word: reverseImageSearch
- id: search-by-image-handler--searchimagebyurl
  desc: Search-by-image handler (searchImageByUrl)
  conf: 0.82
  if:
    type: text
    word: searchImageByUrl
- id: search-by-image-handler--searchimage
  desc: Search-by-image handler function (searchImage)
  conf: 0.82
  if:
    type: text
    word: searchImage
composite_rules:
- id: search-by-image-handler
  desc: Search-by-image handler function
  conf: 0.82
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file

  any:
  - id: search-by-image-handler--searchbyimage
  - id: search-by-image-handler--reverseimagesearch
  - id: search-by-image-handler--searchimagebyurl
  - id: search-by-image-handler--searchimage
- id: context-menu-image-search
  desc: Browser extension context-menu image search
  crit: notable
  conf: 0.9
  all:
  - id: image-url-search-param
  - id: search-by-image-handler
  - id: micro-behaviors/ui/menu/webextension::image-context-menu

- id: user-triggered-image-search
  desc: User-triggered browser extension image search
  crit: notable
  conf: 0.9
  all:
  - id: image-url-search-param
  - id: search-by-image-handler
  any:
  - id: micro-behaviors/ui/menu/webextension::image-context-menu
  - id: micro-behaviors/ui/window/manage/dom::browser-window-open
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-create

- id: canvas-image-upload-search
  desc: Browser extension uploads canvas image for search
  crit: notable
  conf: 0.92
  all:
  - id: image-url-search-param
  - id: micro-behaviors/ui/graphics/draw::canvas-image-data-url
  - id: micro-behaviors/data/decode/base64::data-url-index-base64-decode
  - id: micro-behaviors/communications/http/post::formdata-class
  any:
  - id: image-upload-helper
  - id: micro-behaviors/communications/http/request/client::js-fetch-call

- id: screenshot-crop-image-search
  desc: Browser extension screenshot crop image search
  crit: notable
  conf: 0.92
  all:
  - id: image-url-search-param
  - id: micro-behaviors/ui/graphics/draw::canvas-image-data-url
  - id: micro-behaviors/data/decode/base64::data-url-index-base64-decode
  - id: micro-behaviors/communications/http/post::formdata-class
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-capture-visible
  any:
  - id: image-upload-helper
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
