defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85

traits:
  - id: android-view-intent-action
    desc: References Android VIEW intent action
    if:
      type: literal
      substr: "android.intent.action.VIEW"

  - id: android-deeplink-rewriter
    desc: Rewrites Android deep links
    if:
      type: symbol
      exact: applyAndroidDeepLinks

  - id: ios-deeplink-rewriter
    desc: Rewrites iOS deep links
    if:
      type: symbol
      exact: applyIosDeepLinks

composite_rules:
  - id: mobile-deeplink-config-rewrite
    desc: Rewrites mobile deep-link configuration
    crit: notable
    conf: 0.92
    needs: 3
    any:
      - id: metadata/file/policy/config/deeplink::android-autoverify-link
      - id: android-view-intent-action
      - id: android-deeplink-rewriter
      - id: metadata/file/policy/config/deeplink::apple-associated-domains
      - id: ios-deeplink-rewriter
      - id: metadata/file/policy/config/deeplink::ios-url-types-config
