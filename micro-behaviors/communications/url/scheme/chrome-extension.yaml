# The `chrome-extension://` URL scheme. A neutral reference: it appears in
# extension code itself, CSP/allowed-origin lists, and browser-console noise
# filters (e.g. ignoring `chrome-extension://` console spam) far more often than
# in extension enumeration. Relocated from objectives/discovery/host/browser —
# enumerating installed extensions is reading the extensions *directory*
# (chrome-extensions-path), not merely naming the scheme.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, html]
traits:
  - id: chrome-extension-scheme
    desc: chrome-extension:// URL scheme reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: chrome-extension://
  - id: chrome-extension-url-prefix-check
    desc: Checks chrome-extension URL scheme
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: 'startsWith\s*\(\s*["'']chrome-extension://["'']\s*\)'
