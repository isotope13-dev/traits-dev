# Detects typosquatted domains of Python Package Index infrastructure
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  for: [python, pyproject.toml]
traits:
  - id: pypihosted-domain
    desc: "Detects the typosquatted domain files.pypihosted.org (mimics files.pythonhosted.org)"
    conf: 1.0
    if:
      type: string
      regex: '(?i)[a-z0-9.-]*pypihosted\.org'
