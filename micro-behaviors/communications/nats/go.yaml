# NATS messaging in Go (github.com/nats-io/nats.go).
#
# NATS is a pub/sub message bus on TCP/4222. Default Go client surface:
# Connect + Publish/Subscribe/Request. Import string is the highest-precision
# signal — outside of nats.go's own test suite, almost nothing else uses
# this exact package path.
defaults:
  platforms: [unix, windows]
  for: [go]
  mbc: C0002
traits:
  - id: nats-go-import
    desc: Imports github.com/nats-io/nats.go
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: 'github.com/nats-io/nats.go'

  - id: nats-connect
    desc: NATS Connect call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bnats\.Connect\s*\('

  - id: nats-publish
    desc: NATS Publish call
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\.Publish\s*\(\s*"[^"\n]{1,80}"'

  - id: nats-subscribe
    desc: NATS Subscribe call
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\.Subscribe\s*\(\s*"[^"\n]{1,80}"'

composite_rules:
  - id: nats-client
    desc: Go process speaks NATS
    crit: notable
    conf: 0.97
    all:
      - id: nats-go-import
    any:
      - id: nats-connect
      - id: nats-publish
      - id: nats-subscribe
