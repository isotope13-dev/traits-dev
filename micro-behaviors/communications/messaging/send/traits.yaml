# Chat / bot message-send API calls — a neutral communications capability.
#
# These endpoint paths (/sendMessage, /sendDocument, /sendPhoto) and method
# names are NOT specific to any one platform: Telegram, Slack, Discord, Teams,
# and countless app backends expose the same verbs. Per TAXONOMY (all network
# access is at least notable, and a generic capability belongs where the
# behavior is described — micro-behaviors/communications/), this is the
# message-send capability. Platform identity (e.g. the api.telegram.org host)
# and exfiltration intent live in the objective composites that reference these
# cross-directory and supply the discriminating context.
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
  crit: notable
  mbc: C0029
traits:
  - id: chat-send-message
    desc: Chat message-send API call
    conf: 0.85
    for: [binaries, scripts, go, python]
    if:
      type: text
      substr: /sendMessage
  - id: python-cookie-material-to-telegram-call
    desc: Defines cookie-to-Telegram helper
    crit: component
    conf: 0.94
    for: [python]
    if:
      type: text
      substr: 'def sendCookieToTelegram'
  - id: chat-send-document
    desc: Chat document-send API call
    conf: 0.85
    if:
      type: text
      substr: /sendDocument
  - id: chat-send-photo
    desc: Chat photo-send API call
    conf: 0.85
    for: [binaries, scripts, rust]
    if:
      type: text
      substr: /sendPhoto
  - id: chat-send-document-symbol
    desc: Chat sendDocument method symbol
    conf: 0.82
    for: [binaries, scripts, rust, python]
    if:
      type: text
      word: sendDocument

composite_rules:
  - id: telegram-bot-api-file-upload
    desc: Sends a file through Telegram Bot API
    crit: notable
    conf: 0.95
    for: [binaries, scripts, python, c, cpp]
    all:
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
    any:
      - id: chat-send-document-symbol
      - id: chat-send-photo
      - id: chat-send-document

  - id: telegram-bot-send-message
    desc: Sends a chat message through Telegram Bot API
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: chat-send-message
