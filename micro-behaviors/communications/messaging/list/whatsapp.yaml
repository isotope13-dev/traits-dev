defaults:
  platforms: [unix, windows]
  for: [javascript]
  crit: notable
  conf: 0.9
  mbc: C0010
traits:
  - id: wppconnect-contact-list
    desc: WPPConnect lists WhatsApp contacts or chats
    conf: 0.88
    if:
      type: text
      regex: '\bWPP\.contact\.list\s*\('
  - id: wppconnect-get-all-contacts
    desc: WPPConnect lists all WhatsApp contacts
    conf: 0.86
    if:
      type: text
      regex: '\b(WPP\.)?getAllContacts\s*\('
