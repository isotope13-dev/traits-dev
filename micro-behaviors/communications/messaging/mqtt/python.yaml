defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: paho-mqtt-import
    desc: Imports Python Paho MQTT client
    if:
      type: import
      exact: paho.mqtt.client

  - id: paho-mqtt-client
    desc: Creates a Paho MQTT client
    if:
      type: symbol
      kind: call
      regex: '(^|\.)mqtt\.Client$'

  - id: mqtt-subscribe
    desc: Subscribes to an MQTT topic
    if:
      type: symbol
      kind: call
      regex: '(^|\.)client\.subscribe$'

  - id: mqtt-connect
    desc: Connects a client to an MQTT broker
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)client\.connect$'

  - id: mqtt-loop-forever
    desc: Runs the MQTT network loop
    if:
      type: symbol
      kind: call
      regex: '(^|\.)client\.loop_forever$'

composite_rules:
  - id: paho-mqtt-subscriber
    desc: Python Paho MQTT subscriber
    crit: notable
    conf: 0.95
    all:
      - id: paho-mqtt-import
      - id: paho-mqtt-client
      - id: mqtt-subscribe
    any:
      - id: mqtt-connect
      - id: mqtt-loop-forever
