defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]

traits:
  - id: mqtt-endpoint-configuration
    desc: JavaScript defines an MQTT URL
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bmqtts?://'

  - id: mqtt-topic-configuration
    desc: JavaScript defines MQTT topic configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?is)\bmqtt\b[\s\S]{0,260}\btopic\s*:\s*\{'
