defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: nping
    desc: nping packet generator
    if:
      type: text
      word: nping
  - id: tcp-mode
    desc: nping TCP packet mode
    if:
      type: text
      substr: --tcp -p
  - id: flags-option
    desc: nping TCP flags option
    if:
      type: text
      substr: --flags
  - id: source-port
    desc: nping spoofed source port
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \bnping\b.{0,80}--source-port\b
  - id: payload-data
    desc: nping packet data payload
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \bnping\b.{0,80}--data(=|\s)
