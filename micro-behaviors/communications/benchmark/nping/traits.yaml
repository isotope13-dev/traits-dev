defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: nping
    desc: nping packet generator
    if:
      type: text
      word: nping
  - id: tcp-mode
    desc: nping TCP packet mode
    if:
      type: text
      substr: --tcp -p
  - id: flags-option
    desc: nping TCP flags option
    # Require actual TCP-flag values after --flags; a bare `--flags` token is a
    # generic CLI option (arg-parsers, help text) and not nping-specific.
    for: [scripts]
    if:
      type: text
      case_insensitive: true
      regex: '--flags[ =]+(SYN|ACK|RST|FIN)'
  - id: source-port
    desc: nping spoofed source port
    crit: component
    conf: 0.85
    if:
      type: text
      substr: --source-port
  - id: payload-data
    desc: nping packet data payload
    crit: component
    conf: 0.85
    if:
      type: text
      substr: --data=
