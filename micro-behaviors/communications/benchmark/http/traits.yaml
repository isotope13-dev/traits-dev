# HTTP Benchmarking Tools
# Load testing and performance measurement
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: ab
    desc: Apache Bench tool
    if:
      type: string_value
      regex: "\\bab\\s+-[nctkvVhwixpTrsHX]"
  - id: wrk
    desc: wrk HTTP benchmark
    if:
      type: string_value
      exact: "wrk "
