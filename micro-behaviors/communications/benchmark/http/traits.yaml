defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ab
    desc: Apache Bench tool
    if:
      type: text
      regex: \bab\s+-[nctkvVhwixpTrsHX]
  - id: wrk
    desc: wrk HTTP benchmark
    if:
      type: text
      exact: 'wrk '
