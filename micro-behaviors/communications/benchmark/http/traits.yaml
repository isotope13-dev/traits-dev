defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ab
    desc: Apache Bench tool
    if:
      type: text
      regex: \bab\s+-[nctkvVhwixpTrsHX]
  - id: ab-argv-list
    desc: ApacheBench argv list
    for: [python]
    if:
      type: text
      regex: '\[\s*["'']ab["'']\s*,\s*["'']-n["'']'
  - id: ab-large-request-count
    desc: ApacheBench large request count
    crit: component
    for: [python]
    if:
      type: text
      regex: '["'']-n["'']\s*,\s*["'']([5-9]\d{2}|[1-9]\d{3,})["'']'
  - id: ab-high-concurrency
    desc: ApacheBench high concurrency
    crit: component
    for: [python]
    if:
      type: text
      regex: '["'']-c["'']\s*,\s*["'']([5-9]\d|[1-9]\d{2,})["'']'
  - id: ab-host-header-argv
    desc: ApacheBench Host header
    crit: notable
    for: [python]
    if:
      type: text
      regex: '["'']-H["'']\s*,\s*["'']Host:'
  - id: wrk
    desc: wrk HTTP benchmark
    if:
      type: text
      exact: 'wrk '
composite_rules:
  - id: ab-high-volume-argv
    desc: High volume ApacheBench argv
    crit: suspicious
    conf: 0.95
    all:
      - id: ab-argv-list
      - id: ab-large-request-count
      - id: ab-high-concurrency
