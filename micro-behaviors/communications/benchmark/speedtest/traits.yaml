defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: speedtest
    desc: speedtest utility
    if:
      type: text
      substr: speedtest
  - id: ookla-config-endpoint
    desc: Speedtest client configuration endpoint
    if:
      type: text
      substr: /speedtest-config.php
  - id: ookla-server-list-endpoint
    desc: Speedtest server list endpoint
    if:
      type: text
      substr: /speedtest-servers-static.php
  - id: large-speedtest-upload
    desc: Large Speedtest upload probe
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Content-Length:\s*[0-9]{8,}'
