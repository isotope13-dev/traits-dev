# Anchored to command/argv position rather than a bare `\biperf\b` token. The
# unanchored form claimed "runs a bandwidth test" for any file that merely
# named the tool in prose — docs, comments, or an LLM prompt template listing
# benchmarking utilities — none of which invoke it.
defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: iperf
    desc: iperf bandwidth test invocation
    if:
      type: text
      regex: '(?im)(^|[;&|"''\[])\s*(sudo\s+)?iperf\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: iperf3
    desc: iperf3 bandwidth test invocation
    if:
      type: text
      regex: '(?im)(^|[;&|"''\[])\s*(sudo\s+)?iperf3\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
