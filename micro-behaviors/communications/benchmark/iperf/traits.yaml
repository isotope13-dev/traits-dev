# iperf - Network Bandwidth Testing
# Measures TCP/UDP throughput
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: iperf
    desc: iperf bandwidth test
    if:
      type: string
      substr: iperf
  - id: iperf3
    desc: iperf3 bandwidth test
    if:
      type: string
      substr: iperf3
