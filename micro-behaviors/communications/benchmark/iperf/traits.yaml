# iperf - Network Bandwidth Testing
# Measures TCP/UDP throughput
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: iperf
    desc: iperf bandwidth test
    if:
      type: string_value
      regex: '(?i)\biperf\b'
  - id: iperf3
    desc: iperf3 bandwidth test
    if:
      type: string_value
      regex: '(?i)\biperf3\b'
