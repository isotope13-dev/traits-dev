# Siemens S7comm / ISO-TSAP Protocol (TCP port 102)
# Neutral protocol references — intent inferred at objectives tier.
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: notable
  conf: 0.85

traits:
- id: keyword
  desc: S7comm/Siemens protocol keyword
  if:
    type: text
    regex: (?i)\b(s7comm|s7[-_]?protocol)\b

- id: step7-keyword--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)\b(Siemens|SIMATIC|S7)\b.{0,40}\bStep\s?7\b

  count_max: 1013057
- id: step7-keyword--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: \bStep\s?7\b.{0,40}\b(Siemens|SIMATIC|S7)\b

  count_max: 1013058
- id: library
  desc: S7 library or module reference
  conf: 0.88
  if:
    type: text
    regex: '(?i)\b(snap7|python-snap7|libnodave|s7[-_]?client)\b'

- id: port-102
  desc: S7comm TCP port 102 context
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)(s7|siemens|iso|connect).{0,20}\b102\b

composite_rules:
- id: protocol-usage
  desc: S7comm protocol usage indicators
  crit: notable
  conf: 0.88
  any:
  - id: keyword
  - id: library
- id: step7-protocol-context
  desc: Siemens Step 7 protocol context
  crit: notable
  conf: 0.88
  all:
  - id: step7-keyword
  any:
  - id: port-102
  - id: keyword
  - id: library
- id: step7-keyword
  desc: Siemens Step 7 software reference
  crit: component
  conf: 1.0
  any:
  - id: step7-keyword--rx-1
  - id: step7-keyword--rx-2
