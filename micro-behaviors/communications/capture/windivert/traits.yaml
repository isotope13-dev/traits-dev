# WinDivert packet interception API surface.
defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  crit: notable
  conf: 0.95
  attack: T1040

traits:
  - id: windivert-open
    desc: Opens a WinDivert packet interception handle
    if:
      type: symbol
      exact: WinDivertOpen
  - id: windivert-receive
    desc: Receives packets through WinDivert
    if:
      type: symbol
      exact: WinDivertRecv
  - id: windivert-send
    desc: Sends or reinjects packets through WinDivert
    if:
      type: symbol
      exact: WinDivertSend
  - id: windivert-close
    desc: Closes a WinDivert interception handle
    crit: baseline
    if:
      type: symbol
      exact: WinDivertClose

composite_rules:
  - id: windivert-packet-filter
    desc: WinDivert packet interception and reinjection API cluster
    crit: notable
    conf: 0.98
    all:
      - id: windivert-open
      - id: windivert-receive
      - id: windivert-send
