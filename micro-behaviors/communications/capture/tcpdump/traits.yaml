defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: tcpdump
    desc: tcpdump packet capture
    for: [scripts, binaries, -php]
    if:
      type: raw
      regex: (?i)\btcpdump\b
    not:
      - regex: application/vnd.tcpdump.pcap
