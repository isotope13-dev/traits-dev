defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: tcpdump
    desc: tcpdump packet capture
    for: [scripts, binaries, -php]
    count_min: 2
    if:
      type: text
      word: tcpdump
    not:
      - regex: application/vnd.tcpdump.pcap
