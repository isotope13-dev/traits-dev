defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: wireshark
    desc: Wireshark analyzer
    if:
      type: string_value
      substr: wireshark
    not:
      - regex: '[a-z]{2,4}\.wireshark'
  - id: tshark
    desc: tshark CLI analyzer
    if:
      type: string_value
      substr: tshark
