defaults:
  platforms:
    - unix
    - android
  for: [scripts, binaries]
  crit: notable
  conf: 0.75
traits:
  - id: open-live
    desc: libpcap live capture open
    if:
      type: text
      substr: pcap_open_live
  - id: compile-filter
    desc: libpcap BPF compile
    if:
      type: text
      substr: pcap_compile
  - id: set-filter
    desc: libpcap BPF setfilter
    if:
      type: text
      substr: pcap_setfilter
  - id: next-packet
    desc: libpcap next packet loop
    if:
      type: text
      substr: pcap_next
  - id: set-nonblock
    desc: libpcap nonblocking capture
    if:
      type: text
      substr: pcap_setnonblock
  - id: selectable-fd
    desc: libpcap selectable file descriptor
    if:
      type: text
      substr: pcap_get_selectable_fd
  - id: non-promiscuous
    desc: non-promiscuous sniffing comment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: not in promiscuous mode
composite_rules:
  - id: listener
    desc: libpcap packet listener
    needs: 2
    any:
      - id: open-live
      - id: compile-filter
      - id: set-filter
      - id: next-packet
      - id: set-nonblock
      - id: selectable-fd
  - id: stealth-listener
    desc: stealth libpcap packet listener
    crit: suspicious
    conf: 0.92
    all:
      - id: listener
      - id: non-promiscuous
