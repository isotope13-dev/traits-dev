# EtherNet/IP + CIP Industrial Protocol (TCP port 44818)
# Neutral protocol references — intent inferred at objectives tier.
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: notable
  conf: 0.85

traits:
  - id: keyword
    desc: EtherNet/IP or CIP protocol reference
    if:
      type: text
      regex: (?i)\b(EtherNet/IP|CIP\s+protocol)\b

  - id: library
    desc: EtherNet/IP library or module reference
    conf: 0.88
    if:
      type: text
      regex: \b(pycomm3|cpppo|ethernet[-_]?ip[-_]?client)\b
