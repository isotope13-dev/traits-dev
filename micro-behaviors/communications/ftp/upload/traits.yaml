# FTP Upload Patterns
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: ftp-upload-symbol
    desc: FTP upload symbol
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: ftp_put|\bSTOR\b|ftp_upload
