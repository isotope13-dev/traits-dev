defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  mbc: C0004
  attack: T1071.002
# FTP control-channel command tokens. Individually these are weak fragments
# (a printf template like "USER %s" appears in plenty of non-FTP code), so they
# are components that only carry signal inside the ftpd-daemon composite.
traits:
  - id: ftp-cmd-auth
    desc: FTP authentication command token
    crit: component
    conf: 0.7
    if:
      type: text
      # FTP commands are canonicalized in uppercase and carry an argument;
      # case-insensitive bare words such as "pass" in prose are not protocol
      # evidence.
      regex: '(?m)^(USER|PASS|ACCT)[ \t]+[^\r\n]{1,128}(\r?\n|$)'
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: ftp-cmd-transfer
    desc: FTP transfer command token
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?m)^(RETR|STOR|STOU)[ \t]+[^\r\n]{1,256}(\r?\n|$)'
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: ftp-cmd-listing
    desc: FTP listing/navigation command token
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?m)^(LIST|NLST|CWD)[ \t]+[^\r\n]{1,256}(\r?\n|$)'
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/

  - id: ftp-server-greeting
    desc: FTP server greeting banner
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?mi)^220[ -].{0,100}\b(ftp|server)\b'

composite_rules:
  # Multiple FTP control-channel commands = the code speaks FTP. This is a
  # true capability and SHOULD fire on FTP clients (e.g. FFmpeg's ftp muxer)
  # as well as servers — it asserts "FTP support", not "runs a daemon".
  - id: ftp-protocol-support
    desc: FTP control-channel command support
    crit: notable
    conf: 0.85
    any:
      - id: ftp-cmd-auth
      - id: ftp-cmd-transfer
      - id: ftp-cmd-listing
    needs: 2

  # A 220 greeting paired with the command vocabulary is evidence of an FTP
  # server implementation, while the command fragments alone also correctly
  # cover clients and protocol libraries.
  - id: ftp-server-implementation
    desc: FTP server command handling and greeting
    crit: notable
    conf: 0.92
    all:
      - id: ftp-protocol-support
      - id: ftp-server-greeting
