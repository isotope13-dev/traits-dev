defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  mbc: C0004
  attack: T1071.002
# FTP control-channel command tokens. Individually these are weak fragments
# (a printf template like "USER %s" appears in plenty of non-FTP code), so they
# are components that only carry signal inside the ftpd-daemon composite.
traits:
  - id: ftp-cmd-auth
    desc: FTP authentication command token
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?m)^(USER|PASS|ACCT) '
  - id: ftp-cmd-transfer
    desc: FTP transfer command token
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?m)^(RETR|STOR|STOU) '
  - id: ftp-cmd-listing
    desc: FTP listing/navigation command token
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?m)^(LIST|NLST|CWD) '

composite_rules:
  # Multiple FTP control-channel commands = the code speaks FTP. This is a
  # true capability and SHOULD fire on FTP clients (e.g. FFmpeg's ftp muxer)
  # as well as servers — it asserts "FTP support", not "runs a daemon".
  - id: ftp-protocol-support
    desc: FTP control-channel command support
    crit: notable
    conf: 0.85
    any:
      - id: ftp-cmd-auth
      - id: ftp-cmd-transfer
      - id: ftp-cmd-listing
    needs: 2
