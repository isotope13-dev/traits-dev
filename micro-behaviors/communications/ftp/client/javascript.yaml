defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
  crit: notable
  conf: 0.8
  mbc: C0004
  attack: T1071.002
traits:
  - id: ftp-require
    desc: Node.js FTP client import
    if:
      type: raw
      regex: require\(['"]ftp['"]\)
  - id: connect-call
    desc: Generic connect call
    crit: component
    if:
      type: ast
      kind: call
      substr: .connect
  - id: ftp-put
    desc: FTP client put/upload call
    if:
      type: ast
      kind: call
      substr: .put
composite_rules:
  - id: ftp-connect
    desc: FTP client connect call
    crit: notable
    conf: 0.8
    all:
      - id: ftp-require
      - id: connect-call
