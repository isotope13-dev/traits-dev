defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: notable
  conf: 0.8
  mbc: C0004
  attack: T1071.002
traits:
  - id: ftp-require
    desc: Node.js FTP client import
    if:
      type: text
      regex: require\(['"]ftp['"]\)
  - id: connect-call
    desc: '.connect method call'
    crit: component
    conf: 0.4
    # `.connect(` — generic, gated by the `ftp-connect` near_bytes composite
    # (same treatment as the `.put(` sibling below).
    if:
      type: text
      regex: '\.connect\s*\('
  # `.put(` is wildly generic (Map.put, custom .put methods, etc.). Treat
  # as a component fragment; only meaningful when the file also imports an
  # FTP library.
  - id: put-call
    desc: ".put() method call (any object, composite-only)"
    crit: component
    conf: 0.4
    if:
      type: text
      regex: \.put\(
composite_rules:
  - id: ftp-connect
    desc: FTP client connects to remote server
    crit: notable
    conf: 0.8
    all:
      - id: ftp-require
      - id: connect-call
    # `.connect()` is generic; require it within the same module body as
    # the `require('ftp')` call.
    near_bytes: 4096
  - id: ftp-put
    desc: FTP client uploads files to server
    crit: notable
    conf: 0.85
    all:
      - id: ftp-require
      - id: put-call
    near_bytes: 4096
