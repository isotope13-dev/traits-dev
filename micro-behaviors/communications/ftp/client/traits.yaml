defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: wininet-ftp-api
    desc: "Uses WinInet FTP APIs"
    mbc: "C0002"
    attack: "T1071.002"
    crit: notable
    if:
      type: symbol
      regex: "^Ftp(Open|Get|Put)File[AW]$|^FtpGetFileSize$"
  - id: ftp-rfc-command-grammar
    desc: FTP command grammar templates
    mbc: "C0004"
    attack: "T1071.002"
    crit: notable
    if:
      type: text
      regex: ACCT <SP> <account-information> <CRLF>|STRU <SP> <structure-code> <CRLF>
  - id: ftp-allocation-grammar
    desc: FTP ALLO command template
    mbc: "C0004"
    attack: "T1071.002"
    crit: notable
    if:
      type: text
      exact: ALLO <SP> <decimal-integer> [ R <SP> <decimal-integer> ] <CRLF>
  - id: ftp-openfile-error
    desc: FTP upload error string
    mbc: "C0004"
    attack: "T1071.002"
    crit: notable
    if:
      type: text
      exact: '[PDPOP] FtpOpenFile Fail : %s, Error[%d]'

composite_rules:
  - id: ftp-client-capability
    desc: FTP client capability strings
    crit: notable
    conf: 0.95
    any:
      - id: wininet-ftp-api
      - id: ftp-rfc-command-grammar
      - id: ftp-allocation-grammar
      - id: ftp-openfile-error
    needs: 2
