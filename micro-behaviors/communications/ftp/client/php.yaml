defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: C0004
  attack: T1071.002

traits:
  - id: php-ftp-connect
    desc: PHP FTP connect call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: ftp_connect
  - id: php-ftp-login
    desc: PHP FTP login call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: ftp_login
  - id: php-ftp-listing
    desc: PHP FTP listing call
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: ftp_nlist

composite_rules:
  - id: php-ftp-client-session
    desc: PHP FTP client session
    crit: notable
    conf: 0.9
    all:
      - id: php-ftp-connect
      - id: php-ftp-login
    any:
      - id: php-ftp-listing
