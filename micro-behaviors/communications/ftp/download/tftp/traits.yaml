defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1105
traits:
  - id: tftp
    desc: BusyBox tftp applet invocation
    crit: notable
    conf: 0.9
    for: [shell]
    platforms: [linux]
    if:
      type: text
      regex: '\bbusybox\s+tftp\b'
  - id: command
    desc: TFTP command invocation
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '\btftp\s+-[glr]\b'
    unless:
      - type: text
        substr: tftp error msg
      - type: text
        substr: tftp rrq file
  - id: client-local-file
    desc: TFTP client local file option
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\btftp\s+-l\s+["$/{]'
  - id: scripted-put
    desc: Scripted TFTP put command
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'printf\s+"[^"]{0,40}put %s'
composite_rules:
  - id: scripted-upload
    desc: Scripted TFTP file upload
    crit: notable
    conf: 0.9
    all:
      - id: client-local-file
      - id: scripted-put
    near_lines: 8
