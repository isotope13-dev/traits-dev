defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ping
    desc: ping command
    if:
      type: raw
      regex: \bping\s+(-|localhost|\d{1,3}\.)
  - id: ping6
    desc: IPv6 ping command
    if:
      type: text
      word: ping6
  - id: fping
    desc: fping fast ping
    if:
      type: text
      word: fping
