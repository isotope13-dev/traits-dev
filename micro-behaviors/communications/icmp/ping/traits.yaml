defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: ping
    desc: References the ping network-reachability command
    not:
      - regex: \bping(\s+-\w+\s+\S+){1,3}\s+127\.
      - regex: \bping(\s+-\w+\s+\S+){1,3}\s+localhost\b
    if:
      type: text
      regex: \bping(\s+-\w+\s+\S+){1,3}\s+\S+
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ping6
    desc: IPv6 ping command
    if:
      type: text
      word: ping6
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: fping
    desc: fping fast ping
    if:
      type: text
      word: fping
