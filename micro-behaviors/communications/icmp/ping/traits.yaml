# ICMP Ping - Host Reachability Testing
# Tests if a host is reachable via ICMP echo
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: ping
    desc: ping command
    if:
      type: string_value
      regex: '\bping\s+(-|localhost|\d{1,3}\.)'
  - id: ping6
    desc: IPv6 ping command
    if:
      type: string_value
      word: "ping6"
  - id: fping
    desc: fping fast ping
    if:
      type: string_value
      substr: fping
