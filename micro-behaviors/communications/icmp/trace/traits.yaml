# ICMP Trace - Network Route Tracing
# Traces the path packets take to reach a destination
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: traceroute
    desc: traceroute command
    if:
      type: string_value
      word: "traceroute"
  - id: tracepath
    desc: tracepath command
    if:
      type: string_value
      word: "tracepath"
  - id: mtr
    desc: mtr network diagnostic
    if:
      type: string_value
      word: "mtr"
  - id: hping
    desc: hping packet tool
    if:
      type: string_value
      word: hping
