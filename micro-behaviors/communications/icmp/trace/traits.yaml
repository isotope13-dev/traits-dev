defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: traceroute
    desc: traceroute command
    if:
      type: text
      regex: (^|\s)traceroute(\s|$)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: tracepath
    desc: tracepath command
    if:
      type: text
      word: tracepath
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: mtr
    desc: mtr network diagnostic
    if:
      type: text
      regex: (?i)(^|[\s"'`/\\])(/usr/(s)?bin/)?mtr(\.exe)?\s+(-[A-Za-z]|[A-Za-z0-9_.:-])
    unless:
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
      - id: metadata/library/data::public-suffix-list-content
      - id: metadata/file/format::sourcemap-sources-content
  - id: hping
    desc: hping packet tool
    if:
      type: text
      word: hping
