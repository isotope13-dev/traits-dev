defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: traceroute
    desc: traceroute command
    if:
      type: text
      regex: (^|\s)traceroute(\s|$)
  - id: tracepath
    desc: tracepath command
    if:
      type: text
      word: tracepath
  - id: mtr
    desc: mtr network diagnostic
    if:
      type: text
      word: mtr
    unless:
      - id: metadata/package::bitdefender-ecnet-telemetry
  - id: hping
    desc: hping packet tool
    if:
      type: text
      word: hping
