defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: wsa-startup
    desc: Initialize Winsock library
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: WSAStartup
  - id: wsa-cleanup
    desc: Cleanup Winsock library
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: WSACleanup
  - id: wsa-get-last-error
    desc: Get last Windows socket error
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSAGetLastError
  - id: wsa-set-last-error
    desc: Set Windows socket error code
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSASetLastError
  - id: ws2-32-dll-marker
    desc: WS2_32 Winsock DLL import
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: WS2_32.dll
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: wsk-register
    desc: Register WSK kernel socket
    crit: notable
    conf: 0.97
    if:
      type: symbol
      exact: WskRegister
  - id: wsk-capture-provider
    desc: Capture WSK provider interface
    crit: notable
    conf: 0.97
    if:
      type: symbol
      exact: WskCaptureProviderNPI
  - id: wsk-release-provider
    desc: Release WSK provider interface
    crit: baseline
    conf: 0.93
    if:
      type: symbol
      exact: WskReleaseProviderNPI
composite_rules:
  - id: kernel-wsk-network-stack
    desc: Kernel WSK networking stack
    crit: suspicious
    conf: 0.98
    all:
      - id: wsk-register
      - id: wsk-capture-provider
