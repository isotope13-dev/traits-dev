# Windows Sockets (Winsock) initialization
# Required before using socket functions on Windows
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: wsa-startup
    desc: Initialize Winsock library
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "WSAStartup"
  - id: wsa-cleanup
    desc: Cleanup Winsock library
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "WSACleanup"
  - id: wsa-get-last-error
    desc: Get last Windows socket error
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "WSAGetLastError"
  - id: wsa-set-last-error
    desc: Set Windows socket error code
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "WSASetLastError"
  - id: ws2-32-dll-marker
    desc: WS2_32 Winsock DLL import
    crit: notable
    conf: 0.7
    if:
      type: string_value
      exact: "WS2_32.dll"
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
