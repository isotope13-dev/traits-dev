defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: wsa-startup
    desc: Initialize Winsock library
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)WSAStartup$'
  - id: wsa-cleanup
    desc: Cleanup Winsock library
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: WSACleanup
  - id: wsa-get-last-error
    desc: Get last Windows socket error
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSAGetLastError
  - id: wsa-set-last-error
    desc: Set Windows socket error code
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSASetLastError
  - id: ws2-32-dll-marker
    desc: WS2_32 Winsock DLL import
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: WS2_32.dll
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: socket-api
    desc: Winsock socket creation import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)socket$'
  - id: connect-api
    desc: Winsock outbound connect import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)connect$'
  - id: send-api
    desc: Winsock send import
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)send$'
  - id: recv-api
    desc: Winsock receive import
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)recv$'
  - id: shutdown-api
    desc: Winsock shutdown import
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: '(^|\.)shutdown$'
  # Winsock ws2_32 client-side ordinal imports (the real export names are
  # stripped from the ws2_32 export table; malware often imports by ordinal
  # instead of by name to shrink the import footprint).  One atomic per
  # ordinal keeps the ML feature space fine-grained.
  - id: ws2-32-ordinal-4
    desc: ws2_32 ordinal 4 (connect)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 4"
  - id: ws2-32-ordinal-16
    desc: ws2_32 ordinal 16 (htons)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 16"
  - id: ws2-32-ordinal-19
    desc: ws2_32 ordinal 19 (recv)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 19"
  - id: ws2-32-ordinal-22
    desc: ws2_32 ordinal 22 (send)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 22"
  - id: ws2-32-ordinal-23
    desc: ws2_32 ordinal 23 (socket)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 23"
composite_rules:
  - id: winsock-client-ordinal-imports
    desc: Winsock client ordinal imports
    crit: notable
    conf: 0.86
    needs: 4
    any:
      - id: ws2-32-ordinal-4
      - id: ws2-32-ordinal-16
      - id: ws2-32-ordinal-19
      - id: ws2-32-ordinal-22
      - id: ws2-32-ordinal-23
    unless:
      - id: metadata/binary/metrics::many-imports-40
  - id: winsock-client-symbol-lifecycle
    desc: Winsock client symbol lifecycle
    crit: notable
    conf: 0.92
    all:
      - id: socket-api
      - id: connect-api
    any:
      - id: send-api
      - id: recv-api
      - id: shutdown-api
  - id: winsock-client-lifecycle
    desc: Winsock client connection lifecycle
    crit: notable
    conf: 0.9
    all:
      - id: ws2-32-dll-marker
    any:
      - id: winsock-client-symbol-lifecycle
      - id: winsock-client-ordinal-imports
