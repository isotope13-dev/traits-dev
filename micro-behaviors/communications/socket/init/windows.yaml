defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: wsa-startup
  desc: Initialize Winsock library
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)WSAStartup$'
- id: wsa-cleanup
  desc: Cleanup Winsock library
  crit: baseline
  conf: 0.9
  if:
    type: symbol
    exact: WSACleanup
- id: wsa-get-last-error
  desc: Get last Windows socket error
  crit: baseline
  conf: 0.85
  if:
    type: symbol
    exact: WSAGetLastError
- id: wsa-set-last-error
  desc: Set Windows socket error code
  crit: baseline
  conf: 0.85
  if:
    type: symbol
    exact: WSASetLastError
- id: ws2-32-dll-marker
  desc: WS2_32 Winsock DLL import
  crit: notable
  conf: 0.7
  if:
    type: text
    exact: WS2_32.dll
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/vendor::is-microsoft-named
- id: msi-embedded-ws2-32-dll
  desc: MSI embedded Winsock DLL reference
  crit: notable
  conf: 0.78
  for: [oledoc, ole]
  if:
    type: text
    substr: ws2_32.dll
- id: ws2-socket-api-string
  desc: Winsock socket API string
  crit: component
  conf: 0.72
  if:
    type: text
    exact: socket
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: ws2-connect-api-string
  desc: Winsock connect API string
  crit: component
  conf: 0.72
  if:
    type: text
    exact: connect
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: ws2-startup-api-string
  desc: Winsock startup API string
  crit: component
  conf: 0.76
  if:
    type: text
    exact: WSAStartup
- id: wsock32-dll-marker
  desc: WSOCK32 Winsock DLL import
  crit: notable
  conf: 0.72
  if:
    type: text
    exact: WSOCK32.dll
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/vendor::is-microsoft-named
- id: socket-api
  desc: Winsock socket creation import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)socket$'
- id: connect-api
  desc: Winsock outbound connect import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)connect$'
- id: bind-api
  desc: Winsock bind import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)bind$'
- id: listen-api
  desc: Winsock listen import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)listen$'
- id: accept-api
  desc: Winsock accept import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)accept$'
- id: send-api
  desc: Winsock send import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)send$'
- id: sendto-api
  desc: Winsock UDP send import
  crit: notable
  conf: 0.88
  if:
    type: symbol
    regex: '(^|\.)sendto$'
- id: wsa-send
  desc: Winsock overlapped send import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: WSASend
- id: recv-api
  desc: Winsock receive import
  crit: notable
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)recv$'
- id: select-api
  desc: Winsock select import
  crit: notable
  conf: 0.88
  if:
    type: symbol
    regex: '(^|\.)select$'
- id: recvfrom-api
  desc: Winsock UDP receive import
  crit: notable
  conf: 0.88
  if:
    type: symbol
    regex: '(^|\.)recvfrom$'
- id: shutdown-api
  desc: Winsock shutdown import
  crit: notable
  conf: 0.85
  if:
    type: symbol
    regex: '(^|\.)shutdown$'
- id: wsa-duplicate-socket
  desc: Share socket with another process
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: WSADuplicateSocketW
- id: getpeername-api
  desc: Query connected peer endpoint
  crit: notable
  conf: 0.85
  if:
    type: symbol
    exact: getpeername
- id: freeaddrinfo-api
  desc: Free resolved address list
  crit: baseline
  conf: 0.8
  if:
    type: symbol
    exact: freeaddrinfo
  # Winsock ws2_32 client-side ordinal imports (the real export names are
  # stripped from the ws2_32 export table; malware often imports by ordinal
  # instead of by name to shrink the import footprint).  One atomic per
  # ordinal keeps the ML feature space fine-grained.
- id: ws2-32-ordinal-4
  desc: Ordinal 4 import; connect in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 4"
- id: ws2-32-ordinal-16
  desc: Ordinal 16 import; recv in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 16"
- id: ws2-32-ordinal-19
  desc: Ordinal 19 import; send in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 19"
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: ws2-32-ordinal-22
  desc: Ordinal 22 import; shutdown in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 22"
- id: ws2-32-ordinal-23
  desc: Ordinal 23 import; socket in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 23"
- id: ws2-32-ordinal-2
  desc: Ordinal 2 import; bind in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 2"
- id: ws2-32-ordinal-17
  desc: Ordinal 17 import; recvfrom in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 17"
- id: ws2-32-ordinal-20
  desc: Ordinal 20 import; sendto in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 20"
- id: ws2-32-ordinal-8
  desc: Ordinal 8 import; htonl in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 8"
- id: ws2-32-ordinal-115
  desc: Ordinal 115 import; WSAStartup in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 115"
- id: ws2-32-ordinal-116
  desc: Ordinal 116 import; WSACleanup in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 116"
- id: ws2-32-ordinal-11
  desc: Ordinal 11 import; inet_addr in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 11"
- id: ws2-32-ordinal-9
  desc: Ordinal 9 import; htons in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 9"
- id: ws2-32-ordinal-52
  desc: Ordinal 52 import; gethostbyname in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 52"
- id: ws2-32-ordinal-51
  desc: Ordinal 51 import; gethostbyaddr in ws2_32
  crit: component
  conf: 0.7
  if:
    type: import
    exact: "ORDINAL 51"
- id: htons-port-80-sockaddr
  desc: Winsock sockaddr port 80 setup
  crit: component
  conf: 0.82
  arch:
  - x86
  if:
    type: hex
    section: .text
    pattern: 6A 50 89 44 24 ?? FF 15
composite_rules:
- id: winsock-name-resolution-ordinal
  desc: Winsock ordinal name resolution
  crit: notable
  conf: 0.84
  all:
  - id: ws2-32-dll-marker
  any:
  - id: ws2-32-ordinal-51
  - id: ws2-32-ordinal-52
- id: winsock-client-ordinal-imports
  desc: Winsock client ordinal imports
  crit: notable
  conf: 0.86
  all:
  - id: ws2-32-dll-marker
  needs: 4
  any:
  - id: ws2-32-ordinal-4
  - id: ws2-32-ordinal-16
  - id: ws2-32-ordinal-19
  - id: ws2-32-ordinal-22
  - id: ws2-32-ordinal-23
  - id: ws2-32-ordinal-2
  - id: ws2-32-ordinal-17
  - id: ws2-32-ordinal-20
  - id: ws2-32-ordinal-8
  unless:
  - id: metadata/binary/metrics/threshold::many-imports-40
- id: socket-api-ordinal
  desc: Winsock socket creation import
  crit: notable
  conf: 0.88
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-23
- id: connect-api-ordinal
  desc: Winsock outbound connect import
  crit: notable
  conf: 0.88
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-4
- id: recv-api-ordinal
  desc: Winsock receive import
  crit: notable
  conf: 0.86
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-16
- id: send-api-ordinal
  desc: Winsock send import
  crit: notable
  conf: 0.86
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-19
- id: shutdown-api-ordinal
  desc: Winsock shutdown import
  crit: notable
  conf: 0.84
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-22
- id: winsock-startup-ordinal
  desc: Initialize Winsock library
  crit: notable
  conf: 0.86
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-115
- id: winsock-runtime-client-api-table
  desc: Runtime-resolved Winsock client APIs
  crit: notable
  conf: 0.86
  all:
  - id: ws2-32-dll-marker
  - id: ws2-socket-api-string
  - id: ws2-connect-api-string
  - id: ws2-startup-api-string
- id: winsock-cleanup-ordinal
  desc: Cleanup Winsock library
  crit: baseline
  conf: 0.84
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-116
- id: inet-addr-api-ordinal
  desc: IPv4 string conversion import
  crit: notable
  conf: 0.84
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-11
- id: htons-api-ordinal
  desc: Network byte order conversion
  crit: notable
  conf: 0.84
  all:
  - id: ws2-32-dll-marker
  - id: ws2-32-ordinal-9
- id: winsock-client-symbol-lifecycle
  desc: Winsock client symbol lifecycle
  crit: notable
  conf: 0.92
  all:
  - id: socket-api
  - id: connect-api
  any:
  - id: send-api
  - id: recv-api
  - id: shutdown-api
- id: winsock-client-lifecycle
  desc: Winsock client connection lifecycle
  crit: notable
  conf: 0.9
  all:
  - id: ws2-32-dll-marker
  any:
  - id: winsock-client-symbol-lifecycle
  - id: winsock-client-ordinal-imports
- id: winsock-port-80-client
  desc: Winsock client uses port 80
  crit: notable
  conf: 0.86
  all:
  - id: winsock-client-lifecycle
  - id: htons-port-80-sockaddr
- id: winsock-legacy-client-lifecycle
  desc: Legacy Winsock client lifecycle
  crit: notable
  conf: 0.9
  all:
  - id: wsock32-dll-marker
  any:
  - id: winsock-client-symbol-lifecycle
  - id: winsock-client-ordinal-imports
- id: winsock-server-symbol-lifecycle
  desc: Winsock server socket lifecycle
  crit: notable
  conf: 0.9
  all:
  - id: socket-api
  - id: bind-api
  - id: listen-api
  any:
  - id: accept-api
  - id: recv-api
  - id: send-api
- id: winsock-dual-role-lifecycle
  desc: Winsock client and server lifecycle
  crit: notable
  conf: 0.94
  all:
  - id: winsock-client-lifecycle
  - id: winsock-server-symbol-lifecycle
  any:
  - id: select-api
  - id: freeaddrinfo-api
- id: winsock-dual-role-multiple-tls-callbacks
  desc: Winsock client-server with multiple TLS callbacks
  crit: notable
  conf: 0.93
  all:
  - id: winsock-dual-role-lifecycle
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  any:
  - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo-import
  - id: micro-behaviors/process/thread/create::create-thread
  - id: select-api
  needs: 2
- id: winsock-datagram-transfer
  desc: Winsock datagram transfer APIs
  crit: notable
  conf: 0.88
  all:
  - id: socket-api
  any:
  - id: sendto-api
  - id: recvfrom-api
