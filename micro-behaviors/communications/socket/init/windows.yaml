defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: wsa-startup
    desc: Initialize Winsock library
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)WSAStartup$'
  - id: wsa-cleanup
    desc: Cleanup Winsock library
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: WSACleanup
  - id: wsa-get-last-error
    desc: Get last Windows socket error
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSAGetLastError
  - id: wsa-set-last-error
    desc: Set Windows socket error code
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSASetLastError
  - id: ws2-32-dll-marker
    desc: WS2_32 Winsock DLL import
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: WS2_32.dll
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/vendor::is-microsoft-named
  - id: msi-embedded-ws2-32-dll
    desc: MSI embedded Winsock DLL reference
    crit: notable
    conf: 0.78
    for: [oledoc, ole]
    if:
      type: raw
      substr: ws2_32.dll
  - id: ws2-socket-api-string
    desc: Winsock socket API string
    crit: component
    conf: 0.72
    if:
      type: text
      exact: socket
  - id: ws2-connect-api-string
    desc: Winsock connect API string
    crit: component
    conf: 0.72
    if:
      type: text
      exact: connect
  - id: ws2-startup-api-string
    desc: Winsock startup API string
    crit: component
    conf: 0.76
    if:
      type: text
      exact: WSAStartup
  - id: wsock32-dll-marker
    desc: WSOCK32 Winsock DLL import
    crit: notable
    conf: 0.72
    if:
      type: text
      exact: WSOCK32.dll
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/vendor::is-microsoft-named
  - id: socket-api
    desc: Winsock socket creation import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)socket$'
  - id: connect-api
    desc: Winsock outbound connect import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)connect$'
  - id: bind-api
    desc: Winsock bind import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)bind$'
  - id: listen-api
    desc: Winsock listen import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)listen$'
  - id: accept-api
    desc: Winsock accept import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)accept$'
  - id: send-api
    desc: Winsock send import
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)send$'
  - id: sendto-api
    desc: Winsock UDP send import
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      regex: '(^|\.)sendto$'
  - id: recv-api
    desc: Winsock receive import
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)recv$'
  - id: recvfrom-api
    desc: Winsock UDP receive import
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      regex: '(^|\.)recvfrom$'
  - id: shutdown-api
    desc: Winsock shutdown import
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: '(^|\.)shutdown$'
  # Winsock ws2_32 client-side ordinal imports (the real export names are
  # stripped from the ws2_32 export table; malware often imports by ordinal
  # instead of by name to shrink the import footprint).  One atomic per
  # ordinal keeps the ML feature space fine-grained.
  - id: ws2-32-ordinal-4
    desc: ws2_32 ordinal 4 (connect)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 4"
  - id: ws2-32-ordinal-16
    desc: ws2_32 ordinal 16 (recv)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 16"
  - id: ws2-32-ordinal-19
    desc: ws2_32 ordinal 19 (send)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 19"
  - id: ws2-32-ordinal-22
    desc: ws2_32 ordinal 22 (shutdown)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 22"
  - id: ws2-32-ordinal-23
    desc: ws2_32 ordinal 23 (socket)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 23"
  - id: ws2-32-ordinal-115
    desc: ws2_32 ordinal 115 (WSAStartup)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 115"
  - id: ws2-32-ordinal-116
    desc: ws2_32 ordinal 116 (WSACleanup)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 116"
  - id: ws2-32-ordinal-11
    desc: ws2_32 ordinal 11 (inet_addr)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 11"
  - id: ws2-32-ordinal-9
    desc: ws2_32 ordinal 9 (htons)
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 9"
  - id: htons-port-80-sockaddr
    desc: Winsock sockaddr port 80 setup
    crit: component
    conf: 0.82
    arch:
      - x86
    if:
      type: hex
      section: .text
      pattern: 6A 50 89 44 24 ?? FF 15
composite_rules:
  - id: winsock-client-ordinal-imports
    desc: Winsock client ordinal imports
    crit: notable
    conf: 0.86
    needs: 4
    any:
      - id: ws2-32-ordinal-4
      - id: ws2-32-ordinal-16
      - id: ws2-32-ordinal-19
      - id: ws2-32-ordinal-22
      - id: ws2-32-ordinal-23
    unless:
      - id: metadata/binary/metrics::many-imports-40
  - id: socket-api-ordinal
    desc: Winsock socket creation import
    crit: notable
    conf: 0.88
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-23
  - id: connect-api-ordinal
    desc: Winsock outbound connect import
    crit: notable
    conf: 0.88
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-4
  - id: recv-api-ordinal
    desc: Winsock receive import
    crit: baseline
    conf: 0.86
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-16
  - id: send-api-ordinal
    desc: Winsock send import
    crit: baseline
    conf: 0.86
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-19
  - id: shutdown-api-ordinal
    desc: Winsock shutdown import
    crit: baseline
    conf: 0.84
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-22
  - id: winsock-startup-ordinal
    desc: Initialize Winsock library
    crit: notable
    conf: 0.86
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-115
  - id: winsock-runtime-client-api-table
    desc: Runtime-resolved Winsock client APIs
    crit: notable
    conf: 0.86
    all:
      - id: ws2-32-dll-marker
      - id: ws2-socket-api-string
      - id: ws2-connect-api-string
      - id: ws2-startup-api-string
  - id: winsock-cleanup-ordinal
    desc: Cleanup Winsock library
    crit: baseline
    conf: 0.84
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-116
  - id: inet-addr-api-ordinal
    desc: IPv4 string conversion import
    crit: baseline
    conf: 0.84
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-11
  - id: htons-api-ordinal
    desc: Network byte order conversion
    crit: baseline
    conf: 0.84
    all:
      - id: ws2-32-dll-marker
      - id: ws2-32-ordinal-9
  - id: winsock-client-symbol-lifecycle
    desc: Winsock client symbol lifecycle
    crit: notable
    conf: 0.92
    all:
      - id: socket-api
      - id: connect-api
    any:
      - id: send-api
      - id: recv-api
      - id: shutdown-api
  - id: winsock-client-lifecycle
    desc: Winsock client connection lifecycle
    crit: notable
    conf: 0.9
    all:
      - id: ws2-32-dll-marker
    any:
      - id: winsock-client-symbol-lifecycle
      - id: winsock-client-ordinal-imports
  - id: winsock-port-80-client
    desc: Winsock client uses port 80
    crit: notable
    conf: 0.86
    all:
      - id: winsock-client-lifecycle
      - id: htons-port-80-sockaddr
  - id: winsock-legacy-client-lifecycle
    desc: Legacy Winsock client lifecycle
    crit: notable
    conf: 0.9
    all:
      - id: wsock32-dll-marker
    any:
      - id: winsock-client-symbol-lifecycle
      - id: winsock-client-ordinal-imports
  - id: winsock-server-symbol-lifecycle
    desc: Winsock server socket lifecycle
    crit: notable
    conf: 0.9
    all:
      - id: socket-api
      - id: bind-api
      - id: listen-api
    any:
      - id: accept-api
      - id: recv-api
      - id: send-api
  - id: winsock-datagram-transfer
    desc: Winsock datagram transfer APIs
    crit: notable
    conf: 0.88
    all:
      - id: socket-api
    any:
      - id: sendto-api
      - id: recvfrom-api
    needs: 1
