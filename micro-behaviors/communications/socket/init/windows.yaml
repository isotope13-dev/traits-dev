defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: wsa-startup
    desc: Initialize Winsock library
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)WSAStartup$'
  - id: wsa-cleanup
    desc: Cleanup Winsock library
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: WSACleanup
  - id: wsa-get-last-error
    desc: Get last Windows socket error
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSAGetLastError
  - id: wsa-set-last-error
    desc: Set Windows socket error code
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: WSASetLastError
  - id: ws2-32-dll-marker
    desc: WS2_32 Winsock DLL import
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: WS2_32.dll
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: socket-api
    desc: Winsock socket creation import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)socket$'
  - id: connect-api
    desc: Winsock outbound connect import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)connect$'
  - id: send-api
    desc: Winsock send import
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)send$'
  - id: recv-api
    desc: Winsock receive import
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)recv$'
  - id: shutdown-api
    desc: Winsock shutdown import
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: '(^|\.)shutdown$'
  - id: winsock-client-ordinal-imports
    desc: Winsock client ordinal imports
    crit: notable
    conf: 0.86
    if:
      type: import_combination
      suspicious:
        - "^ORDINAL (4|16|19|22|23)$"
      min_suspicious: 4
      max_total: 35
composite_rules:
  - id: winsock-client-symbol-lifecycle
    desc: Winsock client symbol lifecycle
    crit: notable
    conf: 0.92
    all:
      - id: socket-api
      - id: connect-api
    any:
      - id: send-api
      - id: recv-api
      - id: shutdown-api
  - id: winsock-client-lifecycle
    desc: Winsock client connection lifecycle
    crit: notable
    conf: 0.9
    all:
      - id: ws2-32-dll-marker
    any:
      - id: winsock-client-symbol-lifecycle
      - id: winsock-client-ordinal-imports
