# Kernel TLS (kTLS) socket offload — moves TLS record encryption/decryption
# into the kernel so the data path can use sendfile()/splice() with TLS.
# Legitimate users: nginx, HAProxy, FreeBSD/Linux TLS-accelerated file serving.
# Neutral capability. Receive-side offload (RX) is far rarer than transmit
# (TX) and is the surface abused by FreeBSD kTLS-RX EXTPG page-cache write
# exploits — intent lives in objectives composites that reference these.
defaults:
  platforms: [unix]
  for: [c, cpp]
  conf: 0.85
traits:
  - id: freebsd-rxtls-enable
    desc: FreeBSD kernel TLS receive offload enable
    crit: notable
    if:
      type: text
      word: TCP_RXTLS_ENABLE
  - id: freebsd-txtls-enable
    desc: FreeBSD kernel TLS transmit offload enable
    crit: notable
    if:
      type: text
      word: TCP_TXTLS_ENABLE
  - id: linux-tls-rx
    desc: Linux kernel TLS receive offload constant
    crit: notable
    if:
      type: text
      word: TLS_RX
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: linux-tls-tx
    desc: Linux kernel TLS transmit offload constant
    crit: notable
    if:
      type: text
      word: TLS_TX
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: tls-enable-struct
    desc: kernel TLS tls_enable setsockopt struct
    crit: component
    if:
      type: text
      word: tls_enable
  - id: ktls-aes-gcm-cipher
    desc: kernel TLS AES-GCM cipher selector
    crit: component
    if:
      type: text
      word: CRYPTO_AES_NIST_GCM_16
  - id: ktls-header-include
    desc: sys/ktls.h kernel TLS header include
    crit: component
    if:
      type: text
      substr: sys/ktls.h
composite_rules:
  - id: kernel-tls-session-setup
    desc: Configures a kernel TLS AES-GCM session
    crit: notable
    conf: 0.85
    any:
      - id: tls-enable-struct
      - id: ktls-aes-gcm-cipher
      - id: ktls-header-include
  - id: kernel-tls-rx-offload
    desc: Uses kernel TLS receive-side decrypt offload
    crit: notable
    conf: 0.9
    any:
      - id: freebsd-rxtls-enable
      - id: linux-tls-rx
