# Windows Network (WNet) share enumeration
# WNetOpenEnum/WNetEnumResource - enumerates network resources
# Used by LAN-spreading worms to find writable shares
defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp, csharp]
traits:
  - id: wnet-open-enum
    desc: Network resource enumeration start
    crit: notable
    conf: 0.9
    if:
      type: raw
      word: WNetOpenEnum
  - id: wnet-enum-resource
    desc: Network resource enumeration
    crit: notable
    conf: 0.9
    if:
      type: raw
      word: WNetEnumResource
composite_rules:
  - id: wnet-share-scan
    desc: Network share enumeration loop
    crit: suspicious
    conf: 0.93
    all:
      - id: wnet-open-enum
      - id: wnet-enum-resource
