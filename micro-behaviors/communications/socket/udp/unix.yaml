defaults:
  platforms: [unix]
  for: [scripts, binaries, -python]
  crit: notable
  conf: 0.7
  size_max: 104857600
traits:
  - id: sock-dgram
    desc: UDP socket type constant
    if:
      type: text
      substr: SOCK_DGRAM
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ipproto-udp
    desc: IPPROTO_UDP constant
    if:
      type: text
      substr: IPPROTO_UDP
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
