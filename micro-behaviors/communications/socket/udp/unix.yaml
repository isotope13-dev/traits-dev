# UDP Socket Creation
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, so, dylib, c]
  crit: notable
  conf: 0.7
  size_max: 104857600
traits:
  - id: sock-dgram
    desc: UDP socket type constant
    if:
      type: string
      substr: "SOCK_DGRAM"
  - id: ipproto-udp
    desc: IPPROTO_UDP constant
    if:
      type: string
      substr: "IPPROTO_UDP"
