defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  # Neutral UDP-socket capability (the non-Python form lives in unix.yaml, which
  # excludes python). Creating a datagram socket is normal for any UDP client —
  # QUIC tooling, DNS, mDNS, etc. The DoS interpretation comes from the
  # objectives/impact/dos/udp flood composite that references this.
  - id: sock-dgram-python
    desc: UDP datagram socket (Python SOCK_DGRAM)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: socket.SOCK_DGRAM
