defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.8
  attack: T1095
  mbc: C0001.003

traits:
  - id: udp-broadcast-send
    desc: UDP broadcast send method in .NET
    if:
      type: text
      substr: broadcastSend

  - id: udp-broadcast-listen
    desc: UDP broadcast listener in .NET
    if:
      type: text
      substr: broadcastListen

  - id: udp-broadcast-endpoint
    desc: UDP broadcast endpoint variable in .NET
    crit: component
    if:
      type: text
      substr: bCastEP

  - id: udp-socket-enable-broadcast
    desc: UDP socket EnableBroadcast property set
    if:
      type: text
      substr: set_EnableBroadcast

  - id: udp-broadcast-socket-var
    desc: UDP broadcast socket variable in .NET
    crit: component
    if:
      type: text
      substr: bCastSocket

composite_rules:
  - id: udp-broadcast-peer-comm
    desc: UDP broadcast peer-to-peer communication
    crit: notable
    conf: 0.85
    any:
      - id: udp-broadcast-send
      - id: udp-broadcast-listen
    all:
      - id: udp-socket-enable-broadcast
      - id: udp-broadcast-endpoint
      - id: udp-broadcast-socket-var
