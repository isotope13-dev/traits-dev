defaults:
  platforms: [linux]
  for: [elf]

traits:
  - id: embedded-telnet-server-banner
    desc: Embedded Telnet server banner
    crit: notable
    conf: 0.97
    attack: T1021.007
    if:
      type: text
      exact: Embedded Telnet Server

  - id: router-telnet-auth-failure-cluster
    desc: Telnet authentication failure string cluster
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\brouter\b[\s\S]{0,160}\b(failed|invalid|wrong)\b'
