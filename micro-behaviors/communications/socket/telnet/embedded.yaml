defaults:
  platforms: [linux]
  for: [elf]

traits:
  - id: embedded-telnet-server-banner
    desc: Embedded Telnet server banner
    crit: notable
    conf: 0.97
    attack: T1021.007
    if:
      type: text
      exact: Embedded Telnet Server

  - id: router-telnet-auth-failure-cluster
    desc: Router Telnet authentication failure strings
    crit: notable
    conf: 0.92
    attack: T1110.001
    if:
      type: text
      regex: '(?i)(invalid|wrong|bad).{0,24}(login|password)'
