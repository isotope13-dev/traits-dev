defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: telnet
    desc: Telnet protocol reference
    crit: notable
    if:
      type: text
      word: telnet
    unless:
      - type: raw
        regex: "['\"]telnet['\"]\\s*=>\\s*23"
      - type: raw
        regex: "\\btelnet\\s*:\\s*['\"][A-Za-z_-]+['\"]"
      - type: raw
        regex: "tabby-ssh|builtin-plugins/tabby-ssh|plugins/tabby-ssh"
      - type: text
        substr: builtin-plugins/tabby-ssh/node_modules
      - type: kv
        path: keywords
        exact: tabby-builtin-plugin
