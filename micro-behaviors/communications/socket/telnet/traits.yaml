defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: telnet
    desc: Telnet protocol reference
    crit: notable
    if:
      type: text
      regex: \btelnet://|\btelnet\b.{0,16}\b(port|23)\b
    unless:
      - type: basename
        regex: (^|[\\/])tabby-telnet[\\/](src|typings|dist)[\\/]
      - type: raw
        regex: "['\"]telnet['\"]\\s*=>\\s*23"
      - type: raw
        regex: "\\btelnet\\s*:\\s*['\"][A-Za-z_-]+['\"]"
      - type: raw
        regex: "tabby-(ssh|telnet)|builtin-plugins/tabby-(ssh|telnet)"
      - type: text
        substr: builtin-plugins/tabby-ssh/node_modules
      - type: value
        path: name
        exact: tabby-telnet
      - type: value
        path: keywords
        exact: tabby-builtin-plugin
  - id: telnet-client-endpoint
    desc: Telnet client connects to host and port
    crit: notable
    conf: 0.92
    for: [shell]
    if:
      type: text
      regex: 'telnet\s+[A-Za-z0-9_.:-]{1,120}\s+[0-9]{1,5}\b'
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: busybox-telnet-client
    desc: BusyBox invokes Telnet client
    crit: notable
    conf: 0.96
    for: [shell]
    if:
      type: text
      regex: '(?m)busybox\s+telnet\s+[A-Za-z0-9_.:-]{1,120}\s+[0-9]{1,5}\b'
