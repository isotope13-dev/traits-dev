defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: telnet
    desc: Telnet protocol reference
    crit: notable
    if:
      type: string_value
      word: telnet
    unless:
      - id: metadata/package::bitdefender-ecnet-telemetry
      - type: raw
        regex: "['\"]telnet['\"]\\s*=>\\s*23"
