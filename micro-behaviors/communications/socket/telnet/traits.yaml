defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: telnet
    desc: Telnet protocol reference
    crit: notable
    if:
      type: raw
      regex: \btelnet://|\btelnet\b.{0,16}\b(port|23)\b
    unless:
      - type: basename
        regex: (^|[\\/])tabby-telnet[\\/](src|typings|dist)[\\/]
      - type: raw
        regex: "['\"]telnet['\"]\\s*=>\\s*23"
      - type: raw
        regex: "\\btelnet\\s*:\\s*['\"][A-Za-z_-]+['\"]"
      - type: raw
        regex: "tabby-(ssh|telnet)|builtin-plugins/tabby-(ssh|telnet)"
      - type: text
        substr: builtin-plugins/tabby-ssh/node_modules
      - type: kv
        path: name
        exact: tabby-telnet
      - type: kv
        path: keywords
        exact: tabby-builtin-plugin
