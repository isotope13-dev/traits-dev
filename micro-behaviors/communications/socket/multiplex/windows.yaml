defaults:
  attack: T1071
  mbc: C0001
  platforms: [windows]
  for: [pe]

traits:
- id: electron-marker
  desc: Electron runtime marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: "Electron v"

- id: wsa-create-event
  desc: Create Winsock event handle
  crit: baseline
  conf: 0.9
  if:
    type: symbol
    exact: WSACreateEvent

- id: wsa-event-select
  desc: Bind socket to event
  crit: notable
  conf: 0.92
  if:
    type: symbol
    exact: WSAEventSelect

- id: wsa-wait-multiple-events
  desc: Wait on Winsock events
  crit: notable
  conf: 0.92
  if:
    type: symbol
    exact: WSAWaitForMultipleEvents

- id: wsa-enum-network-events
  desc: Enumerate socket network events
  crit: notable
  conf: 0.92
  if:
    type: symbol
    exact: WSAEnumNetworkEvents

composite_rules:
- id: winsock-event-loop
  desc: Event-driven Winsock socket loop
  crit: notable
  conf: 0.94
  all:
  - id: wsa-create-event
  - id: wsa-event-select
  - id: wsa-wait-multiple-events
  - id: wsa-enum-network-events
  unless:
  - id: electron-marker
