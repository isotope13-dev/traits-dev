# Socket Multiplexing
# MBC: C0001 (Socket Communication)
# ATT&CK: T1071
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, so, dylib, c]
traits:
  # epoll_create/epoll_ctl/epoll_wait/kqueue/kevent: use micro-behaviors/communications/async/library/traits.yaml (canonical)
  - id: select-multiplex
    desc: select() I/O multiplexing
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: "select"
  - id: poll-multiplex
    desc: poll() I/O multiplexing
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: "poll"
composite_rules:
  - id: multiplex
    desc: I/O multiplexing on sockets
    crit: baseline
    conf: 0.66
    any:
      - id: select-multiplex
      - id: poll-multiplex
      - id: micro-behaviors/communications/async/library
