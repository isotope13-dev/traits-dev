defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: select-multiplex
    desc: select() I/O multiplexing
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: select
  - id: poll-multiplex
    desc: poll() I/O multiplexing
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: poll
composite_rules:
  - id: multiplex
    desc: I/O multiplexing on sockets
    crit: baseline
    conf: 0.66
    any:
      - id: select-multiplex
      - id: poll-multiplex
      - id: micro-behaviors/communications/http/
