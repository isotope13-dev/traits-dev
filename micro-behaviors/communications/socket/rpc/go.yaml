defaults:
  platforms: [windows, linux, macos]
  mbc: C0040
traits:
  - id: rpc-register
    desc: Go RPC server registration
    crit: notable
    conf: 0.85
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: rpc.Register
  - id: rpc-register-name
    desc: Go RPC server registration with custom name
    crit: notable
    conf: 0.85
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: rpc.RegisterName
  - id: rpc-serve-conn
    desc: Go RPC connection handler
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: rpc.ServeConn
  - id: rpc-serve-codec
    desc: Go RPC codec handler
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: rpc.ServeCodec
  - id: rpc-register-string
    desc: net/rpc.Register in binary
    crit: notable
    conf: 0.75
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: net/rpc.Register
  - id: rpc-serve-conn-string
    desc: net/rpc.ServeConn in binary
    crit: notable
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      substr: net/rpc.ServeConn
  - id: rpc-import
    desc: Go net/rpc package import
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: import
      exact: net/rpc
composite_rules:
  - id: rpc-registration
    desc: Go RPC API registration
    crit: notable
    conf: 0.85
    for:
      - go
    any:
      - id: rpc-register
      - id: rpc-register-name
  - id: rpc-serving
    desc: Go RPC connection serving
    crit: notable
    conf: 0.8
    for:
      - go
    any:
      - id: rpc-serve-conn
      - id: rpc-serve-codec
  - id: rpc-server-setup
    desc: Go RPC server with connection handling
    crit: suspicious
    conf: 0.9
    for:
      - go
    all:
      - id: rpc-import
      - id: rpc-registration
      - id: rpc-serving