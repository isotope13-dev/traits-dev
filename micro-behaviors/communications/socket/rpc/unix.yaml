# SunRPC / portmapper client behavior
defaults:
  platforms: [unix, android, ios]
  for: [c, elf, macho]
  mbc: C0040
traits:
  - id: portmapper-client-api
    desc: SunRPC portmapper query API
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^_?pmap_(getmaps|getport|clnt_call)$"
  - id: portmapper-headers
    desc: SunRPC portmapper headers
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: text
      regex: "<rpc/pmap_(prot|clnt)\\.h>"
  - id: portmapper-service-port
    desc: RPC portmapper service port
    crit: notable
    conf: 0.75
    for: [c]
    if:
      type: text
      regex: "htons\\s*\\(\\s*111\\s*\\)"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: statd-program-id
    desc: rpc.statd program identifier
    crit: notable
    conf: 0.95
    for: [c]
    if:
      type: text
      regex: "(#define\\s+RPCID\\s+100024|rpc\\.statd|pm_prog\\s*==\\s*rpcid)"
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: statd-portmapper-enum
    desc: rpc.statd enumeration via portmapper
    crit: suspicious
    conf: 0.96
    for: [c]
    all:
      - id: portmapper-client-api
      - id: statd-program-id
    any:
      - id: portmapper-service-port
      - id: portmapper-headers
