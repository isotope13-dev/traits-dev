# SunRPC / portmapper client behavior
defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [c, elf, macho, so, dylib]
  mbc: C0040
traits:
  - id: portmapper-client-api
    desc: SunRPC portmapper query API
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^_?pmap_(getmaps|getport|clnt_call)$"
  - id: portmapper-headers
    desc: SunRPC portmapper headers
    crit: baseline
    conf: 0.9
    for: [c]
    if:
      type: raw
      regex: "<rpc/pmap_(prot|clnt)\\.h>"
  - id: portmapper-service-port
    desc: RPC portmapper service port
    crit: baseline
    conf: 0.75
    for: [c]
    if:
      type: raw
      regex: "htons\\s*\\(\\s*111\\s*\\)"
  - id: statd-program-id
    desc: rpc.statd program identifier
    crit: notable
    conf: 0.95
    for: [c]
    if:
      type: raw
      regex: "(#define\\s+RPCID\\s+100024|rpc\\.statd|pm_prog\\s*==\\s*rpcid)"
composite_rules:
  - id: statd-portmapper-enum
    desc: rpc.statd enumeration via portmapper
    crit: suspicious
    conf: 0.96
    for: [c]
    all:
      - id: portmapper-client-api
      - id: statd-program-id
    any:
      - id: portmapper-service-port
      - id: portmapper-headers
