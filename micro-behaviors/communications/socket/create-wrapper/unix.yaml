defaults:
  platforms: [linux, macos]
  for: [elf, macho]

traits:
  - id: libc-socket-wrapper-symbol
    desc: Native libc socket wrapper symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: __libc_socket
  - id: gi-socket-wrapper-symbol
    desc: Native glibc socket wrapper symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: __GI_socket

composite_rules:
  - id: native-socket-wrapper-symbol
    desc: Native socket wrapper symbol
    crit: notable
    conf: 0.9
    any:
      - id: libc-socket-wrapper-symbol
      - id: gi-socket-wrapper-symbol
