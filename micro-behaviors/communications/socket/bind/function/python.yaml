defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.82
  mbc: C0001

traits:
  - id: python-short-socket-bind-method
    desc: Python short-name socket bind call
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(s|sock)\.bind$'
  - id: python-server-socket-bind-method
    desc: Python server socket bind call
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(server|listener)\.bind$'
