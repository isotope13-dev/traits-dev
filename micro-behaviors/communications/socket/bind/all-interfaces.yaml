defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: bind-all-interfaces
    desc: Bind to all network interfaces (0.0.0.0)
    crit: notable
    conf: 0.8
    count_min: 2
    if:
      type: text
      regex: (^|[^0-9.])0\.0\.0\.0([^0-9.]|$)
    not:
      - substr: "0.0.0.0/0"
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - type: text
        regex: 'Version=\d+\.0\.0\.0'
