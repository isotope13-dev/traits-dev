defaults:
  platforms:
    - linux
    - unix
  for:
    - c
traits:
  - id: ident-port-113
    desc: binds ident service port 113
    crit: notable
    conf: 0.95
    if:
      type: raw
      regex: htons\s*\(\s*113\s*\)
  - id: ident-userid-unix
    desc: ident USERID UNIX reply
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: 'USERID : UNIX'
  - id: ident-single-client-listen
    desc: single client ident listener
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: listen\s*\(\s*sockfd\s*,\s*1\s*\)
composite_rules:
  - id: identd-server-source
    desc: built in identd listener
    crit: suspicious
    conf: 0.97
    all:
      - id: ident-port-113
      - id: ident-userid-unix
    any:
      - id: ident-single-client-listen
      - id: micro-behaviors/communications/socket/bind::bind
