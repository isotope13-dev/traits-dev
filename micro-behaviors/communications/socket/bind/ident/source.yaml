defaults:
  platforms:
    - unix
  for:
    - c
traits:
  - id: ident-port-113
    desc: binds ident service port 113
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: htons\s*\(\s*113\s*\)
  - id: ident-userid-unix
    desc: ident USERID UNIX reply
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: 'USERID : UNIX'
  - id: ident-single-client-listen
    desc: single client ident listener
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: listen\s*\(\s*sockfd\s*,\s*1\s*\)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: identd-server-source
    desc: built in identd listener
    crit: suspicious
    conf: 0.97
    all:
      - id: ident-port-113
      - id: ident-userid-unix
    any:
      - id: ident-single-client-listen
      - id: micro-behaviors/communications/socket/bind/function::bind
