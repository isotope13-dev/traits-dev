defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: bind-all-interfaces
    desc: Binds or listens on all interfaces (0.0.0.0)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b(bind|listen)\b[^\r\n]{0,120}\b0\.0\.0\.0\b'
    not:
      - substr: "0.0.0.0/0"
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - id: metadata/library/structure/
      - type: text
        regex: 'Version=\d+\.0\.0\.0'
      - type: text
        regex: '(?i)(fallback|falls back|default|return)\s+.{0,40}0\.0\.0\.0'
  - id: python-http-server-all-interfaces
    desc: Python HTTP server binds all interfaces
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: '(?i)\b[A-Za-z_]*HTTPServer\b\s*\(\s*\(\s*["'']0\.0\.0\.0["'']'
