# WASI socket imports — a WASM module's network capability surface.
#
# A WebAssembly module reaches the network only by importing socket functions
# from the WASI host ABI (`wasi_snapshot_preview1` / wasix). filefacts parses
# the import section, so these match the declared host imports directly. A
# sandboxed bytecode payload importing `sock_connect`/`sock_send` is opening
# raw network connections — each is a standalone networking capability, the
# same weight as a native socket() call.
defaults:
  platforms: [windows, unix]
  for: [wasm]
  crit: notable
  conf: 0.9
traits:
  - id: wasi-sock-connect
    desc: WASM imports WASI socket connect
    if:
      type: import
      exact: "sock_connect"
  - id: wasi-sock-send
    desc: WASM imports WASI socket send
    if:
      type: import
      exact: "sock_send"
  - id: wasi-sock-recv
    desc: WASM imports WASI socket recv
    if:
      type: import
      exact: "sock_recv"
  - id: wasi-sock-accept
    desc: WASM imports WASI socket accept
    if:
      type: import
      exact: "sock_accept"
  - id: wasi-sock-open
    desc: WASM imports WASI socket open
    if:
      type: import
      exact: "sock_open"
