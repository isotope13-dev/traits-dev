defaults:
  platforms: [windows, unix]
  for: [powershell, csharp, pe, dll, python, javascript, go, rust]

traits:
  - id: smb-port-pair
    desc: SMB service port pair constants
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\b139\b[^\n]{0,40}\b445\b|\b445\b[^\n]{0,40}\b139\b'
  - id: winrm-port-pair
    desc: WinRM service port pair constants
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b5985\b[^\n]{0,40}\b5986\b|\b5986\b[^\n]{0,40}\b5985\b'
  - id: rdp-port
    desc: RDP service port constant
    crit: component
    conf: 0.7
    if:
      type: text
      word: '3389'
  - id: kerberos-port
    desc: Kerberos service port constant
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '(?i)(kerberos|krb5).{0,30}\b88\b|\b88\b.{0,30}(kerberos|krb5)'
  - id: mssql-port
    desc: MS-SQL service port constant
    crit: component
    conf: 0.7
    if:
      type: text
      word: '1433'
  - id: mysql-port
    desc: MySQL service port constant
    crit: component
    conf: 0.7
    if:
      type: text
      word: '3306'

composite_rules:
  - id: multi-service-port-set
    desc: Multiple Windows and database service port constants
    crit: component
    conf: 0.93
    needs: 4
    any:
      - id: smb-port-pair
      - id: winrm-port-pair
      - id: rdp-port
      - id: kerberos-port
      - id: mssql-port
      - id: mysql-port
