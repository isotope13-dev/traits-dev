defaults:
  for: [pe]
  platforms: [windows]
traits:
- id: create-ip-forward-entry
  desc: Create IP forward entry (route manipulation)
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "CreateIpForwardEntry"
- id: create-ip-forward-entry2
  desc: Create IP forward entry v2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "CreateIpForwardEntry2"
- id: delete-ip-forward-entry
  desc: Delete IP forward entry (route manipulation)
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "DeleteIpForwardEntry"
- id: delete-ip-forward-entry2
  desc: Delete IP forward entry v2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "DeleteIpForwardEntry2"
- id: set-ip-forward-entry2
  desc: Modify IP forward entry v2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "SetIpForwardEntry2"
- id: flush-ip-net-table
  desc: Flush ARP or neighbor cache
  crit: suspicious
  conf: 0.88
  if:
    type: symbol
    exact: "FlushIpNetTable"
  downgrade:
    any:
    - type: metrics
      field: binary.export_count
      min: 50
    - id: metadata/signed/developer
    - id: metadata/signed/leaf
    - id: metadata/signed/platform
- id: route-table-manipulation-cond-0--inline-11395
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: binary.export_count
    min: 50
  count_max: 1011396
- id: route-table-manipulation-cond-3--inline-11396
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: basename
    regex: (?i)^.{0,80}netch.{0,80}\.(7z|zip)$
  count_max: 1011397
composite_rules:
- id: route-table-manipulation
  desc: Programmatic route table modification
  crit: notable
  conf: 0.9
  needs: 2
  any:
  - id: create-ip-forward-entry
  - id: create-ip-forward-entry2
  - id: delete-ip-forward-entry
  - id: delete-ip-forward-entry2
  - id: set-ip-forward-entry2
  downgrade:
    any:
    - id: route-table-manipulation-cond-0--inline-11395
    - id: metadata/signed::signer-evidence-present
    - id: well-known/tool/sysadmin/netch::netch-component
    - id: route-table-manipulation-cond-3--inline-11396
