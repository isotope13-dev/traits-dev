# C source-level connection-state mechanics. These are neutral capabilities;
# port-scan intent is inferred by the objective composite that references them.
defaults:
  platforms: [unix, android, ios]
  for: [c]
  crit: notable

traits:
  - id: nonblocking-fcntl-source
    desc: Configures a socket as nonblocking
    conf: 0.9
    if:
      type: text
      regex: "fcntl\\s*\\([^\\n]{0,120}F_SETFL\\s*,\\s*O_NONBLOCK\\s*\\)"

  - id: eisconn-connect-state
    desc: Handles an already-connected socket
    conf: 0.8
    if:
      type: text
      word: EISCONN
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: ealready-connect-state
    desc: Handles an asynchronous connect state
    conf: 0.8
    if:
      type: text
      word: EALREADY
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

  - id: einprogress-connect-state
    desc: Handles a pending socket connection
    conf: 0.8
    if:
      type: text
      word: EINPROGRESS
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
