defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]

traits:
  - id: stratum-tcp-url
    desc: Stratum TCP endpoint reference
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: stratum+tcp://

  - id: stratum-ssl-url
    desc: Stratum TLS endpoint reference
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: stratum+ssl://

  - id: stratum-term-with-mining-context
    desc: Stratum term near mining context
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\bstratum\b.{0,40}\b(mining|pool|subscribe)\b'

  - id: stratum-subscribe-method
    desc: Stratum mining subscribe method
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: mining.subscribe

  - id: stratum-authorize-method
    desc: Stratum mining authorize method
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: mining.authorize

  - id: stratum-submit-method
    desc: Stratum mining submit method
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: mining.submit

  - id: stratum-port-3333
    desc: Stratum-adjacent port 3333 reference
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b(stratum|pool|mining).{0,40}:\s*3333\b'

composite_rules:
  - id: stratum-keyword
    desc: Stratum term with mining context
    crit: notable
    any:
      - id: stratum-term-with-mining-context
      - id: stratum-tcp-url
      - id: stratum-ssl-url

  - id: stratum-mining-methods
    desc: Stratum mining RPC methods
    crit: notable
    any:
      - id: stratum-subscribe-method
      - id: stratum-authorize-method
      - id: stratum-submit-method

  - id: stratum-mining-protocol
    desc: Stratum mining protocol implementation
    crit: notable
    any:
      - id: stratum-mining-methods
      - id: stratum-tcp-url
      - id: stratum-ssl-url
