defaults:
  platforms: [unix, android]
  for: [elf, shell, c, cpp]
  mbc: C0001
traits:
- id: cnxn-token
  desc: ADB CNXN packet marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: CNXN
- id: open-token
  desc: ADB OPEN packet marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: '\bOPENX?\b'
- id: okay-token
  desc: ADB OKAY packet marker
  crit: component
  conf: 0.72
  if:
    type: text
    substr: OKAY
- id: wrte-token
  desc: ADB WRTE packet marker
  crit: component
  conf: 0.72
  if:
    type: text
    substr: WRTE
- id: clse-token
  desc: ADB CLSE packet marker
  crit: component
  conf: 0.72
  if:
    type: text
    substr: CLSE
- id: packet-state-token-table
  desc: ADB packet state token table
  crit: notable
  conf: 0.88
  if:
    type: text
    substr: CLSEOKAYWRTE
- id: host-features-shell-v2
  desc: ADB shell_v2 host features
  crit: notable
  conf: 0.95
  if:
    type: text
    exact: host::features=cmd,shell_v2
- id: shell-service-command--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'shell:(cd|/)'
  count_max: 1011091
- id: shell-service-command--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'shell:(sh |busybox)'
  count_max: 1011092
- id: shell-service-command--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'shell:(curl|wget)'
  count_max: 1011093
composite_rules:
- id: shell-v2-session
  desc: ADB shell_v2 session protocol
  crit: suspicious
  conf: 0.96
  all:
  - id: host-features-shell-v2
  - id: shell-service-command
  any:
  - id: cnxn-token
  - id: open-token
  - id: okay-token
  - id: wrte-token
  - id: micro-behaviors/communications/socket/send::send
- id: shell-service-command
  desc: ADB shell service command
  crit: suspicious
  conf: 0.92
  any:
  - id: shell-service-command--rx-1
  - id: shell-service-command--rx-2
  - id: shell-service-command--rx-3
- id: adb-protocol-packet-cluster
  desc: ADB protocol packet marker cluster
  crit: notable
  conf: 0.88
  any:
  - id: packet-state-token-table
  - id: clse-token
  - id: okay-token
  - id: wrte-token
  all:
  - id: cnxn-token
