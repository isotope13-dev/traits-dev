defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, -python]
traits:
  - id: sock-stream
    desc: SOCK_STREAM socket type
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: SOCK_STREAM
  - id: tcp-conn
    desc: TCPConn type
    crit: notable
    conf: 0.5
    if:
      type: text
      word: TCPConn
  - id: create-socket
    desc: CreateSocket function
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: CreateSocket
  - id: go-net-error-endpoint
    desc: TCP endpoint state error
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: transport endpoint is (not|already) connected
  - id: go-net-error-connection-refused
    desc: TCP connection refused error
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: connection refused
    unless:
      - id: metadata/binary/metrics/threshold::many-imports-40
  - id: go-net-error-connection-timeout
    desc: TCP connection timeout error
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: connection timed out
    unless:
      - id: metadata/binary/metrics/threshold::many-imports-40
  - id: go-net-error-connection-reset
    desc: TCP connection reset error
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: connection reset by peer
    unless:
      - id: metadata/binary/metrics/threshold::many-imports-40
  - id: go-net-error-connection-abort
    desc: TCP connection abort/drop error
    crit: baseline
    conf: 0.6
    count_min: 2
    if:
      type: text
      regex: \bconnection (abort|dropped)\b
  - id: socket-symbol-text
    desc: Socket API symbol text
    crit: notable
    conf: 0.75
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: ^socket(\.c)?$
  - id: bind-symbol-text
    desc: Bind API symbol text
    crit: notable
    conf: 0.75
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: ^bind(\.c)?$
  - id: listen-symbol-text
    desc: Listen API symbol text
    crit: notable
    conf: 0.75
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: ^listen(\.c)?$
  - id: accept-symbol-text
    desc: Accept API symbol text
    crit: notable
    conf: 0.75
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: ^accept(\.c)?$
  - id: connect-symbol-text
    desc: Connect API symbol text
    crit: notable
    conf: 0.75
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: ^connect(\.c)?$
  - id: recv-symbol-text
    desc: Receive API symbol text
    crit: notable
    conf: 0.75
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: ^recv(\.c)?$
  - id: send-symbol-text
    desc: Send API symbol text
    crit: notable
    conf: 0.75
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: ^send(to)?(\.c)?$
composite_rules:
  - id: connect-comp
    desc: TCP connection operations
    crit: notable
    conf: 0.66
    any:
      - id: sock-stream
      - id: micro-behaviors/communications/socket/connect::dial
      - id: tcp-conn
      - id: create-socket
      - id: go-net-error-connection
      - id: go-net-error-endpoint
  - id: go-net-error-connection
    desc: Go net error - connection issues
    crit: baseline
    conf: 0.6
    any:
      - id: go-net-error-connection-refused
      - id: go-net-error-connection-timeout
      - id: go-net-error-connection-reset
      - id: go-net-error-connection-abort
  - id: server-api-surface
    desc: Socket server API surface
    crit: notable
    conf: 0.8
    all:
      - id: socket-symbol-text
      - id: bind-symbol-text
      - id: listen-symbol-text
  - id: accepting-server-api-surface
    desc: Accepting socket server API surface
    crit: notable
    conf: 0.84
    all:
      - id: server-api-surface
      - id: accept-symbol-text
  - id: socket-io-api-surface
    desc: Socket send receive API surface
    crit: notable
    conf: 0.8
    all:
      - id: socket-symbol-text
      - id: recv-symbol-text
      - id: send-symbol-text
