defaults:
  platforms: [windows]
  for: [powershell]

traits:
  - id: tcpclient-host-port
    desc: PowerShell TcpClient host-port connection
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)New-Object\s+(System\.)?Net\.Sockets\.TCPClient\s*\(\s*"[^"]{1,80}"\s*,\s*\d{2,5}\s*\)'
  - id: tcpclient-stream
    desc: PowerShell TcpClient stream acquisition
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: '(?i)New-Object\s+(System\.)?Net\.Sockets\.TCPClient[\s\S]{0,500}\.GetStream\s*\(\s*\)'
