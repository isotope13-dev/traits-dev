defaults:
  platforms: [windows, unix]
  for: [batch, powershell, javascript, html, pe, dll, source]
  attack: T1071
  mbc: C0002

traits:
  - id: finger-command-user-host
    desc: finger command user host query
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bfinger(\.exe)?\s+[A-Za-z0-9._-]{2,64}@[A-Za-z0-9.-]{3,253}\.[A-Za-z]{2,24}\b'
  - id: finger-command-user-ip
    desc: finger command user IP query
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bfinger(\.exe)?\s+[A-Za-z0-9._-]{2,64}@(\d{1,3}\.){3}\d{1,3}\b'

composite_rules:
  - id: finger-command-query
    desc: finger protocol command query
    crit: notable
    conf: 0.9
    any:
      - id: finger-command-user-host
      - id: finger-command-user-ip
