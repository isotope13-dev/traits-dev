# Dial-only groupings for cross-language objective composites. Keeping these
# separate from the broad socket/connect directory prevents listeners and plain
# socket construction from being mistaken for outbound connection attempts.
defaults:
  platforms: [linux, macos, windows]

traits:
  - id: python-connect-ip-port
    desc: Python socket connects to hardcoded endpoint
    crit: notable
    conf: 0.9
    for: [python, pyc]
    if:
      type: text
      regex: '\.connect\s*\(\s*\(\s*["'']([0-9]{1,3}\.){3}[0-9]{1,3}["'']\s*,\s*[0-9]{2,5}\s*\)\s*\)'
      is: external_ip
  - id: go-net-dial-literal-endpoint
    desc: Go net.Dial with literal TCP endpoint
    crit: notable
    conf: 0.92
    for: [go]
    if:
      type: text
      regex: 'net\.Dial\s*\(\s*"tcp"\s*,\s*"[^"]{1,80}:\d{2,5}"'

composite_rules:
  - id: python-dial
    desc: Python outbound socket connection
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::connect-python
      - id: micro-behaviors/communications/socket/connect::socket-connect-method
      - id: micro-behaviors/communications/socket/connect::socket-create-connection-call
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: go-dial
    desc: Go outbound socket connection
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::go-dial-methods
      - id: micro-behaviors/communications/socket/connect::socket-dial

  - id: jvm-dial
    desc: JVM outbound socket connection
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::java-socket-connect
      - id: micro-behaviors/communications/socket/connect::new-socket-host-port
      - id: micro-behaviors/communications/socket/connect::socket-channel-open

  - id: javascript-dial
    desc: JavaScript outbound socket connection
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::net-connect
      - id: micro-behaviors/communications/socket/connect::net-create-connection-call
      - id: micro-behaviors/communications/socket/connect::net-socket-connect-method

  - id: scripting-dial
    desc: Script-language outbound socket connection
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
      - id: micro-behaviors/communications/socket/connect::gen-tcp-connect
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client

  - id: php-dial
    desc: PHP outbound socket connection
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::php-socket-connect
      - id: micro-behaviors/communications/socket/connect::fsockopen-call
      - id: micro-behaviors/communications/socket/connect::pfsockopen-call

  - id: shell-zig-dial
    desc: Shell or Zig outbound connection
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::dev-tcp-path
      - id: micro-behaviors/communications/socket/connect::zig-tcp-connect-host
      - id: micro-behaviors/communications/socket/connect::zig-tcp-connect-address

  - id: platform-dial
    desc: Platform networking connection attempt
    crit: notable
    any:
      - id: micro-behaviors/communications/socket/connect::ras-dial
      - id: micro-behaviors/communications/socket/connect::nwconnection-connect
      - id: micro-behaviors/communications/socket/connect::deno-connect-call
