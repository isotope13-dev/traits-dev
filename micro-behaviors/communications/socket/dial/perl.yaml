defaults:
  platforms: [linux, macos, windows]
  for: [perl]

traits:
  - id: perl-connect-sockaddr-in-call
    desc: Perl connect call with sockaddr_in
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '\bconnect\s*\(\s*[A-Za-z_$][A-Za-z0-9_$]*\s*,\s*sockaddr_in\s*\('
  - id: perl-socket-tcp-connect
    desc: Perl TCP socket connect sequence
    crit: notable
    conf: 0.95
    platforms: [unix, netbsd]
    if:
      type: text
      regex: '\bsocket\s*\(\s*SOCK[\s\S]{0,160}\bconnect\s*\(\s*SOCK'
