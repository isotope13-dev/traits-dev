defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  attack: T1071
  mbc: C0001
  crit: notable
traits:
  - id: net-dial-udp
    desc: net.DialUDP UDP connection
    conf: 0.85
    if:
      type: symbol
      exact: net.DialUDP
  - id: conn-write
    desc: Connection Write method
    conf: 0.8
    if:
      type: symbol
      regex: \.Write\(
  - id: conn-write-string
    desc: Connection WriteString method
    conf: 0.8
    if:
      type: symbol
      exact: WriteString
composite_rules:
  - id: socket-dial
    desc: Go socket dialing capability
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: micro-behaviors/communications/socket/connect::dial-tcp
      - id: net-dial-udp
