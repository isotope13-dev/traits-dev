defaults:
  platforms: [linux, macos]
  for: [elf, macho]

traits:
  - id: libc-connect-wrapper-symbol
    desc: Native libc connect wrapper symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: __libc_connect
  - id: gi-connect-wrapper-symbol
    desc: Native glibc connect wrapper symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: __GI_connect

composite_rules:
  - id: native-connect-wrapper-symbol
    desc: Native connect wrapper symbol
    crit: notable
    conf: 0.9
    any:
      - id: libc-connect-wrapper-symbol
      - id: gi-connect-wrapper-symbol
