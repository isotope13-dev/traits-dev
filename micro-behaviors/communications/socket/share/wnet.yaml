# Windows Network (WNet) share enumeration
# WNetOpenEnum/WNetEnumResource - enumerates network resources
# Used by LAN-spreading worms to find writable shares
defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
traits:
  - id: wnet-open-enum
    desc: Network resource enumeration start
    crit: notable
    conf: 0.9
    if:
      type: raw
      word: WNetOpenEnum
  - id: wnet-enum-resource
    desc: Network resource enumeration
    crit: notable
    conf: 0.9
    if:
      type: raw
      word: WNetEnumResource
  - id: pywin32-wnet-extension
    desc: pywin32 WNet wrapper extension
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: win32wnet.pyd
      case_insensitive: true
composite_rules:
  - id: wnet-share-scan
    desc: Network share enumeration loop
    crit: suspicious
    conf: 0.93
    all:
      - id: wnet-open-enum
      - id: wnet-enum-resource
    unless:
      - id: pywin32-wnet-extension
      - id: metadata/lang/source::windows-compat-api-source
