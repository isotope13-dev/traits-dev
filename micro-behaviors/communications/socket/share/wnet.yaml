# Windows Network (WNet) share enumeration
# WNetOpenEnum/WNetEnumResource - enumerates network resources
# Used by LAN-spreading worms to find writable shares
defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
traits:
  - id: wnet-open-enum
    desc: Network resource enumeration start
    crit: notable
    conf: 0.9
    if:
      type: text
      word: WNetOpenEnum
  - id: wnet-enum-resource
    desc: Network resource enumeration
    crit: notable
    conf: 0.9
    if:
      type: text
      word: WNetEnumResource
  - id: wnet-open-enum-import
    desc: Start network resource enumeration import
    crit: notable
    conf: 0.94
    for: [pe, dll]
    if:
      type: import
      regex: '^WNetOpenEnum(A|W)?$'
  - id: wnet-enum-resource-import
    desc: Enumerate network resource entries import
    crit: notable
    conf: 0.94
    for: [pe, dll]
    if:
      type: import
      regex: '^WNetEnumResource(A|W)?$'
  - id: pywin32-wnet-extension
    desc: pywin32 WNet wrapper extension
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      exact: win32wnet.pyd
      case_insensitive: true
composite_rules:
  - id: wnet-share-scan
    desc: Enumerates Windows network resources via WNet
    crit: notable
    conf: 0.93
    all:
      - id: wnet-open-enum-api
      - id: wnet-enum-resource-api
    unless:
      - id: pywin32-wnet-extension
      - id: metadata/lang/source/
  - id: wnet-open-enum-api
    desc: Network resource enumeration start API
    crit: notable
    conf: 0.94
    any:
      - id: wnet-open-enum
      - id: wnet-open-enum-import
  - id: wnet-enum-resource-api
    desc: Network resource enumeration API
    crit: notable
    conf: 0.94
    any:
      - id: wnet-enum-resource
      - id: wnet-enum-resource-import
