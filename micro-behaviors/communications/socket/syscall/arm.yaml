# ARM Direct Network Syscalls
# Detects hand-written ARM assembly making direct network syscalls
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [unix, android]
  for: [elf]
  arch: [arm]
  crit: notable
traits:
  - id: svc-socket
    desc: "ARM direct socket(2) syscall setup"
    crit: notable
    if:
      type: hex
      section: ".text"
      # mov r7, 0x100; add r7, r7, 0x19 (25) -> r7 = 281 (socket)
      pattern: "01 7c a0 e3 19 70 87 e2"
  - id: svc-connect
    desc: "ARM direct connect(2) syscall setup"
    crit: notable
    if:
      type: hex
      section: ".text"
      # mov r7, 0x100; add r7, r7, 0x1b (27) -> r7 = 283 (connect)
      pattern: "01 7c a0 e3 1b 70 87 e2"
  - id: arm-socket-syscall-number
    desc: ARM socket(2) syscall number constant
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      # ARM EABI SYS_socket is 281, stored little-endian in the syscall
      # wrapper's literal pool in statically linked hand-written loaders.
      pattern: "19 01 00 00"
  - id: arm-connect-syscall-number
    desc: ARM connect(2) syscall number constant
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      # ARM EABI SYS_connect is 283, stored little-endian in the wrapper's
      # literal pool.
      pattern: "1b 01 00 00"
  - id: arm-svc-syscall-instruction
    desc: ARM direct system-call instruction
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      pattern: "00 00 00 ef"

composite_rules:
  - id: arm-direct-network-syscalls
    desc: ARM direct socket and connect syscalls
    crit: suspicious
    conf: 0.98
    all:
      - id: arm-svc-syscall-instruction
      - id: arm-socket-syscall-number
      - id: arm-connect-syscall-number
