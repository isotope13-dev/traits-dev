defaults:
  for: [binaries]
  platforms:
    - unix
    - windows
traits:
  - id: syscall-socket
    desc: Creates network socket
    crit: baseline
    conf: 0.4
    if:
      type: syscall
      name:
        - socket
        - socketcall
  - id: syscall-bind
    desc: Binds socket to address/port
    crit: baseline
    conf: 0.4
    if:
      type: syscall
      name:
        - bind
  - id: syscall-listen
    desc: Listens for incoming connections
    crit: baseline
    conf: 0.4
    if:
      type: syscall
      name:
        - listen
  - id: syscall-accept
    desc: Accepts incoming connections
    crit: baseline
    conf: 0.4
    if:
      type: syscall
      name:
        - accept
        - accept4
composite_rules:
  - id: server-comp
    desc: Network server - binds and
    conf: 0.6
    crit: baseline
    platforms:
      - linux
    all:
      - id: syscall-socket
      - id: syscall-bind
      - id: syscall-listen
  - id: server-accept
    desc: Network server accepting connections
    conf: 0.6
    crit: baseline
    platforms:
      - linux
    all:
      - id: syscall-socket
      - id: syscall-bind
      - id: syscall-listen
      - id: syscall-accept
