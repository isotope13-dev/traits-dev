# MIPS O32 socketcall wrappers used by statically linked native programs.
defaults:
  platforms: [unix, android]
  for: [elf]
  arch: [mips]
  crit: notable

traits:
  - id: mips-socketcall-socket-be
    desc: Big-endian MIPS socketcall socket operation
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      # socketcall(2) with operation 1 (SYS_SOCKET).
      pattern: "24 04 10 06 27 a6 00 18 03 20 f8 09 24 05 00 01"
  - id: mips-socketcall-socket-le
    desc: Little-endian MIPS socketcall socket operation
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      # Little-endian encoding of socketcall(2) with SYS_SOCKET.
      pattern: "06 10 04 24 18 00 a6 27 09 f8 20 03 01 00 05 24"
  - id: mips-socketcall-connect-be
    desc: Big-endian MIPS socketcall connect operation
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      # socketcall(2) with operation 3 (SYS_CONNECT).
      pattern: "24 04 10 06 27 a6 00 18 03 20 f8 09 24 05 00 03"
  - id: mips-socketcall-connect-le
    desc: Little-endian MIPS socketcall connect operation
    crit: notable
    conf: 0.98
    if:
      type: hex
      section: ".text"
      # Little-endian encoding of socketcall(2) with SYS_CONNECT.
      pattern: "06 10 04 24 18 00 a6 27 09 f8 20 03 03 00 05 24"
composite_rules:
  - id: mips-socketcall-socket
    desc: MIPS socketcall socket operation
    crit: notable
    conf: 0.98
    any:
      - id: mips-socketcall-socket-be
      - id: mips-socketcall-socket-le
  - id: mips-socketcall-connect
    desc: MIPS socketcall connect operation
    crit: notable
    conf: 0.98
    any:
      - id: mips-socketcall-connect-be
      - id: mips-socketcall-connect-le
  - id: mips-direct-network-syscalls
    desc: MIPS direct socket and connect syscalls
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/os/syscall/raw::mips-direct-syscall-instruction
      - id: mips-socketcall-socket
      - id: mips-socketcall-connect
