defaults:
  platforms: [unix]
  for: [rust, c, cpp]
  crit: notable
  conf: 0.9
traits:
  - id: scm-rights
    desc: Unix socket file descriptor passing
    if:
      type: text
      substr: SCM_RIGHTS
  - id: sendmsg-fd-handoff
    desc: sendmsg-based file descriptor handoff
    if:
      type: text
      substr: sendmsg
composite_rules:
  - id: unix-fd-handoff
    desc: Unix socket file descriptor handoff
    crit: notable
    conf: 0.95
    all:
      - id: scm-rights
      - id: sendmsg-fd-handoff
