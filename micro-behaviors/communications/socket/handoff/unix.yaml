defaults:
  platforms: [unix]
  for: [rust, c, cpp]
  crit: notable
  conf: 0.9
traits:
  - id: scm-rights
    desc: Unix socket file descriptor passing
    if:
      type: text
      substr: SCM_RIGHTS
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: sendmsg-fd-handoff
    desc: sendmsg-based file descriptor handoff
    if:
      type: text
      regex: 'SCM_RIGHTS[\\s\\S]{0,600}sendmsg|sendmsg[\\s\\S]{0,600}SCM_RIGHTS'
    unless:
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
composite_rules:
  - id: unix-fd-handoff
    desc: Unix socket file descriptor handoff
    crit: notable
    conf: 0.95
    all:
      - id: scm-rights
      - id: sendmsg-fd-handoff
