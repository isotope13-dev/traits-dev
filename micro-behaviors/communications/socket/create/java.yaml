defaults:
  platforms: [windows, unix]
  attack: T1071
  mbc: C0001
  for:
    - java
    - class
traits:
  - id: java-socket-create
    desc: Java socket creation for network communication
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: java.net.Socket
  - id: java-serversocket-create
    desc: Java server socket creation (listening)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: java.net.ServerSocket
  - id: java-socket-connect
    desc: Java socket connection to remote host
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .connect(
  - id: java-datagramsocket-create
    desc: Java UDP socket creation
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: java.net.DatagramSocket
  - id: java-socket-bytecode-reference
    desc: Java bytecode socket reference
    crit: notable
    conf: 0.86
    for: [apk, class, jar, zip]
    if:
      type: text
      substr: "Ljava/net/Socket;"
  - id: java-socket-slash-reference
    desc: Java slash-form socket reference
    crit: component
    conf: 0.9
    for: [apk, class, jar, zip]
    if:
      type: text
      substr: java/net/Socket
  - id: jvm-socket-class-ref
    desc: JVM socket class reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/net/Socket
  - id: jvm-serversocket-class-ref
    desc: JVM server socket class reference
    crit: baseline
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/net/ServerSocket
  - id: java-datagram-socket-bytecode-reference
    desc: Java bytecode datagram socket reference
    crit: notable
    conf: 0.86
    for: [apk, class, jar, zip]
    if:
      type: text
      substr: "Ljava/net/DatagramSocket;"
