# Java Socket Operations - Network Communication
# MBC: C0001 (Socket Communication)
# ATT&CK: T1071 (Application Layer Protocol)
defaults:
  attack: T1071
  mbc: C0001
  platforms: [linux, macos, windows, unix, android, ios]
  for: [java, class]
traits:
  - id: java-socket-create
    desc: Java socket creation for network communication
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: java.net.Socket
  - id: java-serversocket-create
    desc: Java server socket creation (listening)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: java.net.ServerSocket
  - id: java-socket-connect
    desc: Java socket connection to remote host
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: .connect(
  - id: java-datagramsocket-create
    desc: Java UDP socket creation
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: java.net.DatagramSocket
