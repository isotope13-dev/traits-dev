# Objective-C source-level IPv4 TCP socket capability. Intent is inferred by
# composites that combine socket creation with connection and process behavior.
defaults:
  platforms: [macos, ios, linux]
  for: [objc]
  crit: notable

traits:
  - id: objc-ipv4-tcp-socket-source
    desc: Obj-C IPv4 TCP socket creation
    conf: 0.86
    if:
      type: text
      regex: '\bsocket\s*\(\s*AF_INET\s*,\s*SOCK_STREAM\s*,\s*0\s*\)'
