# .NET TcpClient / Socket TCP connection (compiled PE)
# Detects TcpClient class references in compiled .NET binaries (P/Invoke strings)
defaults:
  for: [pe, dll]
  platforms: [windows, unix]
traits:
- id: tcpclient-dotnet-str
  desc: .NET TcpClient class reference
  crit: notable
  conf: 0.85
  if:
    type: text
    exact: TcpClient
- id: networkstream-dotnet-str
  desc: .NET NetworkStream class reference
  crit: notable
  conf: 0.8
  if:
    type: text
    exact: NetworkStream
- id: tcplistener-dotnet-str
  desc: .NET TcpListener class reference
  crit: notable
  conf: 0.82
  if:
    type: text
    exact: TcpListener
- id: accept-tcpclient-async-dotnet
  desc: .NET accepts inbound TCP clients (async)
  crit: notable
  conf: 0.86
  if:
    type: text
    exact: AcceptTcpClientAsync
# The blocking TcpListener.AcceptTcpClient() is the accept loop used by every
# thread-per-connection .NET server (and by .NET bind shells). It is a distinct
# metadata entry from AcceptTcpClientAsync, so the async atom above never
# covers it.
- id: accept-tcpclient-sync-dotnet
  desc: .NET accepts inbound TCP clients (sync)
  crit: notable
  conf: 0.86
  if:
    type: text
    exact: AcceptTcpClient
- id: socket-receive-send-str--send
  desc: .NET Socket Send/Receive methods (Send)
  crit: component
  conf: 0.8
  if:
    type: text
    exact: Send
- id: socket-receive-send-str--receive
  desc: .NET Socket Send/Receive methods (Receive)
  crit: component
  conf: 0.8
  if:
    type: text
    exact: Receive
composite_rules:
- id: socket-receive-send-str
  desc: .NET Socket Send/Receive methods
  crit: component
  conf: 0.8
  any:
  - id: socket-receive-send-str--send
  - id: socket-receive-send-str--receive
- id: dotnet-tcpclient-channel
  desc: .NET TcpClient bidirectional TCP channel
  crit: notable
  conf: 0.85
  all:
  - id: tcpclient-dotnet-str
  - id: networkstream-dotnet-str
- id: dotnet-inbound-tcp-listener
  desc: .NET inbound TCP listener behavior
  crit: notable
  conf: 0.86
  any:
  - id: tcplistener-dotnet-str
  - id: accept-tcpclient-async-dotnet
  - id: accept-tcpclient-sync-dotnet
