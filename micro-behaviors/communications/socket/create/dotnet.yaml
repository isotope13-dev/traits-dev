# .NET TcpClient / Socket TCP connection (compiled PE)
# Detects TcpClient class references in compiled .NET binaries (P/Invoke strings)
defaults:
  for: [pe, dll]
  platforms: [windows, unix]
traits:
  - id: tcpclient-dotnet-str
    desc: .NET TcpClient class reference
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: TcpClient
  - id: networkstream-dotnet-str
    desc: .NET NetworkStream class reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: NetworkStream
  - id: socket-receive-send-str
    desc: .NET Socket Send/Receive methods
    # Component-only: the standalone words `Send` / `Receive` appear as method
    # names (channel ops, generic send/receive protocols, button labels) in
    # countless binaries — not a .NET-Socket signal on its own. Pair with
    # TcpClient/NetworkStream in a composite for any real .NET network claim.
    crit: component
    conf: 0.8
    if:
      type: text
      regex: ^(Send|Receive)$
composite_rules:
  - id: dotnet-tcpclient-channel
    desc: .NET TcpClient bidirectional TCP channel
    crit: notable
    conf: 0.85
    all:
      - id: tcpclient-dotnet-str
      - id: networkstream-dotnet-str
