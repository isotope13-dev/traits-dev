# Bare reference to the Python `socket` module — a neutral networking capability
# (clients, servers, DB drivers all use it). Relocated from reverse-shell so the
# standalone component is labelled by what it searches for; reverse-shell
# composites reference it cross-directory.
defaults:
  platforms: [linux, windows, macos]
  for: [python]
traits:
  - id: python-socket
    desc: socket module reference
    crit: component
    conf: 0.4
    # Word match: a bare `socket` token, not the `socket` inside
    # `websocket`/`websockets` (a distinct HTTP-upgrade library that is not a
    # raw TCP dial — it otherwise fed the reverse-shell dial aggregator).
    if:
      type: string_literal
      word: socket
