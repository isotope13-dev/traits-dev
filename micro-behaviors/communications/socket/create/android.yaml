defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.86
  attack: T1071
  mbc: C0001

traits:
  - id: android-java-socket-reference
    desc: Android Java socket reference
    if:
      type: raw
      substr: "Ljava/net/Socket;"

  - id: android-java-datagram-socket-reference
    desc: Android datagram socket reference
    if:
      type: raw
      substr: "Ljava/net/DatagramSocket;"

  - id: android-secondary-socket-class
    desc: Android secondary socket class
    crit: component
    conf: 0.84
    if:
      type: raw
      substr: "SecondarySocket"

composite_rules:
  - id: android-socket-communications
    desc: Android socket communications
    crit: notable
    conf: 0.88
    any:
      - id: android-java-socket-reference
      - id: android-java-datagram-socket-reference
