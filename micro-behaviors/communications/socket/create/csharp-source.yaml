# C# TcpClient socket creation
defaults:
  platforms: [windows, unix, openwrt]
  for: [csharp]
traits:
  - id: tcpclient-create
    desc: TcpClient socket creation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'new\s+TcpClient\s*\('
  - id: tcpclient-connect
    desc: TcpClient.Connect to remote host
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\.Connect\s*\(.{1,50},\s*\d+'
  - id: tcpclient-get-stream
    desc: C# obtains a TcpClient network stream
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\.GetStream\s*\(\s*\)'
  - id: tcplistener-create
    desc: TcpListener socket creation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'new\s*\(\s*IPAddress\.Parse\([^)]{1,120}\)'
  - id: accept-tcpclient-async
    desc: Async inbound TCP accept
    crit: notable
    conf: 0.92
    if:
      type: text
      word: AcceptTcpClientAsync
  - id: socket-protocol-type-selection
    desc: C# selects TCP and UDP socket protocols
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'ProtocolType\.Tcp[\s\S]{0,700}ProtocolType\.Udp'
  - id: tcp-listener-create
    desc: C# creates a TCP listener
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)TcpListener$'
  - id: accept-tcp-client
    desc: C# accepts an inbound TCP client
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)AcceptTcpClient$'
