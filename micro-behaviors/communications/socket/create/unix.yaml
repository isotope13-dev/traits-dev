defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [binaries, c]
traits:
  - id: posix-socket-import
    desc: Imports POSIX socket creation API
    crit: notable
    conf: 0.95
    platforms: [linux, macos, android]
    for: [elf, macho]
    if:
      type: import
      exact: socket
  - id: socketcall-sym
    desc: socketcall multiplexed socket syscall (Linux)
    crit: notable
    conf: 0.75
    platforms:
      - linux
    for:
      - elf
    if:
      type: symbol
      exact: socketcall
  - id: socket-create
    desc: Creates network socket (Linux)
    conf: 0.9
    crit: notable
    platforms:
      - linux
    for:
      - elf
    if:
      type: syscall
      name:
        - socket
        - socketpair
        - socketcall
  - id: socket-socket-macos
    desc: macOS socket syscall
    conf: 0.9
    crit: notable
    platforms:
      - macos
    for:
      - macho
    if:
      type: syscall
      name:
        - socket
  - id: socket-connect
    desc: Connects socket to remote host (Linux)
    conf: 0.9
    crit: notable
    platforms:
      - linux
    for:
      - elf
    if:
      type: syscall
      name:
        - connect
  - id: x86-64-socket-syscall
    desc: Direct x86-64 socket syscall
    conf: 0.9
    crit: notable
    platforms: [linux]
    for: [elf]
    if:
      type: hex
      section: text
      pattern: "B8 29 00 00 00 0F 05"
  - id: x86-64-connect-syscall
    desc: Direct x86-64 connect syscall
    conf: 0.9
    crit: notable
    platforms: [linux]
    for: [elf]
    if:
      type: hex
      section: text
      pattern: "B8 2A 00 00 00 0F 05"
  - id: socket-connect-macos
    desc: macOS connect syscall
    conf: 0.9
    crit: notable
    platforms:
      - macos
    for:
      - macho
    if:
      type: syscall
      name:
        - connect
composite_rules:
  - id: create
    desc: Create network socket
    crit: notable
    conf: 0.75
    any:
      - id: posix-socket-import
      - id: micro-behaviors/communications/socket/pair::pair
      - id: socketcall-sym
  - id: client-comp
    desc: Network client - connects to remote host
    conf: 0.85
    crit: notable
    platforms:
      - linux
    for:
      - elf
      - so
      - c
    all:
      - id: socket-create
      - id: socket-connect
  - id: client-macos
    desc: macOS network client
    conf: 0.85
    crit: notable
    platforms:
      - macos
    for:
      - macho
      - dylib
      - c
    all:
      - id: socket-socket-macos
      - id: socket-connect-macos
