# Socket Create - Perl
# Perl-specific socket creation operations
defaults:
  for: [perl]
  platforms: [unix, windows]
traits:
  - id: socket-call
    desc: Perl socket() call
    crit: notable
    conf: 0.6
    attack: "T1059.006"
    if:
      type: raw
      substr: "socket("
  - id: open-call
    desc: Perl open() call
    crit: baseline
    conf: 0.3
    if:
      type: raw
      substr: "open("
  - id: fd-redirect
    desc: Perl file descriptor redirect
    crit: notable
    conf: 0.7
    attack: "T1059.006"
    if:
      type: string_value
      regex: '["'']>&'
