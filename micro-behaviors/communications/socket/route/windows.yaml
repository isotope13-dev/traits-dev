defaults:
  for: [pe]
  platforms: [windows]
traits:
- id: create-ip-forward-entry
  desc: Create IP forward entry (route manipulation)
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "CreateIpForwardEntry"
- id: create-ip-forward-entry2
  desc: Create IP forward entry v2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "CreateIpForwardEntry2"
- id: delete-ip-forward-entry
  desc: Delete IP forward entry (route manipulation)
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "DeleteIpForwardEntry"
- id: delete-ip-forward-entry2
  desc: Delete IP forward entry v2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "DeleteIpForwardEntry2"
- id: set-ip-forward-entry2
  desc: Modify IP forward entry v2
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "SetIpForwardEntry2"
- id: flush-ip-net-table
  desc: Flush ARP or neighbor cache
  crit: suspicious
  conf: 0.88
  if:
    type: symbol
    exact: "FlushIpNetTable"
  downgrade:
    any:
    - type: metrics
      field: exports.count
      min: 50
    - id: metadata/signed/developer
    - id: metadata/signed/leaf
    - id: metadata/signed/platform
    - id: metadata/binary/vendor::windows-system-implementer-dll
    - id: well-known/lib/wine/
- id: high-export-count
  desc: High export count metric
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: exports.count
    min: 50
  count_max: 1011396
composite_rules:
- id: route-table-manipulation
  desc: Programmatic route table modification
  crit: notable
  conf: 0.9
  needs: 2
  any:
  - id: create-ip-forward-entry
  - id: create-ip-forward-entry2
  - id: delete-ip-forward-entry
  - id: delete-ip-forward-entry2
  - id: set-ip-forward-entry2
  downgrade:
    any:
    - id: high-export-count
    - id: metadata/signed/trust-level/
    - id: well-known/tool/sysadmin/netch/
