defaults:
  platforms: [unix, windows]
  for: [c, cpp]
traits:
  - id: send-call-raw
    desc: C send/sendto/sendmsg call-like token
    crit: notable
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_.])(send|sendto|sendmsg)\s*\('
    unless:
      - type: path
        regex: 'Cython[\\/]Utility[\\/]Coroutine\.c$'
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
