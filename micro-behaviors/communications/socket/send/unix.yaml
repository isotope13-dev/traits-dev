defaults:
  attack: T1071
  mbc: C0001
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: send-symbol
    desc: Uses send socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: send
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/file/string/identity::chrome-sandbox-basename
  - id: sendmsg-symbol
    desc: Uses sendmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendmsg
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/app/tabby::tabby-basename
      - id: metadata/file/string/identity::python3-interpreter-basename
  - id: sendto-symbol
    desc: Uses sendto socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendto
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: sendmmsg-symbol
    desc: Uses sendmmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendmmsg
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: sendfile-symbol
    desc: Uses sendfile socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendfile
composite_rules:
  - id: send
    desc: Send a message to a socket
    crit: notable
    conf: 0.66
    any:
      - id: send-symbol
      - id: sendmsg-symbol
      - id: sendto-symbol
      - id: sendmmsg-symbol
      - id: sendfile-symbol
