defaults:
  attack: T1071
  mbc: C0001
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: send-symbol
    desc: Uses send socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: send
    unless:
      - type: basename
        exact: chrome-sandbox
  - id: sendmsg-symbol
    desc: Uses sendmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendmsg
    unless:
      - type: basename
        exact: tabby
      - type: basename
        exact: python3
  - id: sendto-symbol
    desc: Uses sendto socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendto
  - id: sendmmsg-symbol
    desc: Uses sendmmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendmmsg
  - id: _send-symbol
    desc: Uses _send socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: _send
    unless:
      - type: basename
        exact: chrome-sandbox
  - id: sendfile-symbol
    desc: Uses sendfile socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: sendfile
composite_rules:
  - id: send
    desc: Send a message to a socket
    crit: notable
    conf: 0.66
    any:
      - id: send-symbol
      - id: sendmsg-symbol
      - id: sendto-symbol
      - id: sendmmsg-symbol
      - id: _send-symbol
      - id: sendfile-symbol
