defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.86
  attack: T1071
  mbc: C0001

traits:
  - id: javascript-socket-send
    desc: JavaScript socket send call
    if:
      type: symbol
      kind: call
      regex: '^(socket|websocket|ws)\.send$'
  - id: node-socket-json-write
    desc: Node socket writes JSON payload
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\b(s|socket|sock|client)\.write\s*\(\s*JSON\.stringify\s*\('
