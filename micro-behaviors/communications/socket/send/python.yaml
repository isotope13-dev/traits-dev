defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.7
  attack: T1071
  mbc: C0001
traits:
  - id: python-sendto
    desc: Python socket sendto() call
    if:
      type: text
      substr: '.sendto('
  - id: python-sendall
    desc: Python socket sendall() call
    if:
      type: text
      substr: '.sendall('
  - id: python-sendall-pyc-name
    desc: Python socket sendall name in bytecode
    for: [pyc]
    if:
      type: text
      substr: sendall
  - id: socket-send-call
    desc: Python socket send() call
    if:
      type: symbol
      exact: "socket.send"
  - id: socket-send-method-named
    desc: Named Python socket send call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\\b(client_socket|server_socket)\\.(send|sendall)\\s*\\('
  - id: socket-send-method-short
    desc: Short Python socket send call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\\b(sock|socket)\\.(send|sendall)\\s*\\('

composite_rules:
  - id: socket-send-method
    desc: Python socket-like send call
    crit: notable
    conf: 0.85
    any:
      - id: socket-send-method-named
      - id: socket-send-method-short
