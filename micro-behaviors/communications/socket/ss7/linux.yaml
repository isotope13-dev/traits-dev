defaults:
  for:
    - elf
  platforms:
    - linux
    - unix
  crit: notable
  conf: 0.9
traits:
  - id: sms-imsi-log
    desc: SMS intercept log format
    attack: T1040
    if:
      type: text
      substr: send sms from %s imsi:%s to %s
  - id: sms-recv-log
    desc: SMS receive log format
    attack: T1040
    if:
      type: text
      substr: recv sms from %s to %s
  - id: tcap-dialogue-parse
    desc: TCAP dialogue parser errors
    if:
      type: text
      substr: tcap parse begin Dialogue
  - id: tcap-component-parse
    desc: TCAP component parser errors
    if:
      type: text
      substr: tcap parse end component fail
  - id: etsi-sms-spec
    desc: ETSI SMS specification reference
    if:
      type: text
      substr: 123040v040200p.pdf
  - id: imsi-filter-config
    desc: IMSI targeting config path
    crit: suspicious
    attack: T1056
    if:
      type: text
      exact: /tmp/devlog/orbit/keyring/esd/parm.txt
      section: .rodata
  - id: keyword-filter-config
    desc: Keyword targeting config path
    crit: suspicious
    attack: T1056
    if:
      type: text
      exact: /tmp/devlog/orbit/keyring/esd/keyword_parm.txt
      section: .rodata
  - id: telecom-bond-interface
    desc: Bonded telecom interface name
    crit: suspicious
    if:
      type: text
      exact: bond2
composite_rules:
  - id: tcap-sms-parser
    desc: SS7 TCAP SMS parser
    attack: T1040
    all:
      - id: tcap-dialogue-parse
    any:
      - id: tcap-component-parse
      - id: etsi-sms-spec
  - id: selective-sms-filtering
    desc: Selective SMS targeting filters
    crit: suspicious
    attack: T1056
    needs: 2
    any:
      - id: sms-imsi-log
      - id: imsi-filter-config
      - id: keyword-filter-config
