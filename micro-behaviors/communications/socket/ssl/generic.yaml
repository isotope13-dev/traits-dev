defaults:
  platforms: [windows, linux, macos]
traits:
  - id: jvm-ssl-class-ref
    desc: JVM SSL package reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^javax/net/ssl(/|$)'

  - id: ssl-connect-symbol
    desc: SSL connect API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_connect
  - id: ssl-new-symbol
    desc: SSL object creation API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_new
  - id: ssl-ctx-new-symbol
    desc: SSL context creation API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_CTX_new
  - id: tls-client-method-symbol
    desc: TLS client method API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: TLS_client_method
  - id: ssl-read-symbol
    desc: OpenSSL SSL_read API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_read
  - id: ssl-write-symbol
    desc: OpenSSL SSL_write API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_write
  - id: insecure-skip-verify
    desc: InsecureSkipVerify (Go)
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: text
      regex: InsecureSkipVerify\s*:\s*true|InsecureSkipVerify\s*=\s*true
  - id: cert-none
    desc: cert_reqs set to CERT_NONE (Python)
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: text
      regex: \bcert_reqs\s*=\s*(ssl\.)?CERT_NONE\b
  - id: verify-mode-none
    desc: verify_mode = ssl.CERT_NONE (Python)
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: '(?m)^[ \t]{0,40}([A-Za-z_][A-Za-z0-9_]*\.)?verify_mode\s*=\s*(ssl\.)?CERT_NONE\b'
  - id: check-hostname-false
    desc: check_hostname = False (Python)
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: '(?m)^[ \t]{0,40}([A-Za-z_][A-Za-z0-9_]*\.)?check_hostname\s*=\s*False\b'
    unless:
      - type: string_literal
        substr: urllib3
      - type: string_literal
        substr: requests
      - type: string_literal
        substr: botocore
  - id: reject-unauthorized-false
    desc: rejectUnauthorized false (Node.js)
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: 'rejectUnauthorized: false'
  - id: go-tls-client
    desc: Go crypto/tls client connection wrapper
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      exact: tls.Client
  - id: domain-intel-skill-context
    desc: Domain intelligence skill context
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: text
      substr: domain_intel
composite_rules:
  - id: connect-comp
    desc: SSL/TLS connection
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    any:
      - id: ssl-connect-symbol
      - id: ssl-new-symbol
      - id: ssl-ctx-new-symbol
      - id: tls-client-method-symbol
  - id: verify-skip
    desc: Skip SSL certificate verification
    crit: notable
    conf: 0.66
    size_max: 10000
    any:
      - id: insecure-skip-verify
      - id: verify-mode-none
      - id: reject-unauthorized-false
  # Pair signal: when BOTH check_hostname and verify_mode are disabled
  # the TLS context accepts any cert from any host — leaves the connection
  # cryptographically authenticated only by the underlying socket destination.
  # This is the standard pattern for talking to a hardcoded IP while still
  # presenting an HTTPS-looking request.
  - id: tls-validation-fully-disabled
    desc: TLS hostname and certificate validation both disabled
    crit: suspicious
    conf: 0.95
    for: [python]
    all:
      - id: check-hostname-false
      - id: verify-mode-none
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/library/data::websocket-client-source
      - id: well-known/tool/detection/security-scanner/
      - id: domain-intel-skill-context
      - id: well-known/tool/development/pymobiledevice3
