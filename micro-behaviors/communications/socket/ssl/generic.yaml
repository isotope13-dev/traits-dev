defaults:
  platforms: [windows, linux, macos]
traits:
  - id: jvm-ssl-class-ref
    desc: JVM SSL package reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^javax/net/ssl(/|$)'

  - id: ssl-connect-symbol
    desc: SSL connect API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_connect
  - id: ssl-new-symbol
    desc: SSL object creation API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_new
  - id: ssl-ctx-new-symbol
    desc: SSL context creation API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_CTX_new
  - id: tls-client-method-symbol
    desc: TLS client method API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: TLS_client_method
  - id: ssl-read-symbol
    desc: OpenSSL SSL_read API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_read
  - id: ssl-write-symbol
    desc: OpenSSL SSL_write API
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_write
  - id: openssl-ssl-session-function
    desc: OpenSSL SSL session function
    crit: notable
    conf: 0.7
    for: [c, elf]
    if:
      type: text
      regex: '\bSSL_(read|write|set_fd)\b'
  - id: openssl-ssl-connect-function
    desc: OpenSSL SSL connect function
    crit: notable
    conf: 0.7
    for: [c, elf]
    if:
      type: text
      word: SSL_connect
  - id: openssl-ssl-accept-function
    desc: OpenSSL SSL accept function
    crit: notable
    conf: 0.7
    for: [c, elf]
    if:
      type: text
      word: SSL_accept
  - id: gnutls-record-send-recv-source
    desc: GnuTLS record send or receive call
    crit: notable
    conf: 0.9
    for: [c, elf]
    if:
      type: text
      regex: \bgnutls_record_(send|recv)\b
  - id: insecure-skip-verify
    desc: TLS verification bypass configuration
    crit: notable
    conf: 0.8
    for:
      - go
      - pe
    if:
      type: text
      regex: '["'']?(InsecureSkipVerify|skip_tls_verify)["'']?\s*[:=]\s*true'
  - id: cert-none
    desc: cert_reqs set to CERT_NONE (Python)
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: text
      regex: \bcert_reqs\s*=\s*(ssl\.)?CERT_NONE\b
  - id: verify-mode-none
    desc: verify_mode = ssl.CERT_NONE (Python)
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: '(?m)^[ \t]{0,40}([A-Za-z_][A-Za-z0-9_]*\.)?verify_mode\s*=\s*(ssl\.)?CERT_NONE\b'
  - id: check-hostname-false
    desc: check_hostname = False (Python)
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: '(?m)^[ \t]{0,40}([A-Za-z_][A-Za-z0-9_]*\.)?check_hostname\s*=\s*False\b'
    unless:
      - type: string_literal
        substr: urllib3
      - type: string_literal
        substr: requests
      - type: string_literal
        substr: botocore
  - id: reject-unauthorized-false
    desc: Node TLS check disabled by option
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\brejectUnauthorized\s*:\s*(false|!1)\b'
  - id: node-tls-verification-env-disable
    desc: Node TLS verification disabled via environment
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env.{0,40}NODE_TLS_REJECT_UNAUTHORIZED.{0,20}=\s*["'']?0'
  - id: go-tls-client
    desc: Go crypto/tls client connection wrapper
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      exact: tls.Client
  - id: go-tls-dial
    desc: Opens Go TLS connection
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: tls.Dial
  - id: domain-intel-skill-context
    desc: Domain intelligence skill context
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: text
      substr: domain_intel
  - id: python-wrap-socket-server-hostname
    desc: Python TLS socket server_hostname
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'wrap_socket\s*\([^)\n]{0,160}\bserver_hostname\s*='
  - id: python-httpsconnection-sock-replacement
    desc: Python HTTPS connection socket replacement
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: '\b\w+\.sock\s*=\s*\w+\b'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: openssl-ssl-functions
    desc: OpenSSL SSL session functions
    crit: notable
    conf: 0.7
    for: [c, elf]
    any:
      - id: openssl-ssl-session-function
      - id: openssl-ssl-connect-function
      - id: openssl-ssl-accept-function

  - id: connect-comp
    desc: SSL/TLS connection
    crit: notable
    conf: 0.66
    for: [elf, macho, pe]
    any:
      - id: ssl-connect-symbol
      - id: ssl-new-symbol
      - id: ssl-ctx-new-symbol
      - id: tls-client-method-symbol
  - id: verify-skip
    desc: Skip SSL certificate verification
    crit: notable
    conf: 0.66
    size_max: 10000
    any:
      - id: insecure-skip-verify
      - id: verify-mode-none
      - id: reject-unauthorized-false
  # Pair signal: when BOTH check_hostname and verify_mode are disabled
  # the TLS context accepts any cert from any host — leaves the connection
  # cryptographically authenticated only by the underlying socket destination.
  # This is the standard pattern for talking to a hardcoded IP while still
  # presenting an HTTPS-looking request.
  - id: tls-validation-fully-disabled
    desc: TLS hostname and certificate validation both disabled
    crit: notable
    conf: 0.95
    for: [python]
    all:
      - id: check-hostname-false
      - id: verify-mode-none
    unless:
      - id: metadata/package/testing/
      - id: metadata/library/data::websocket-client-source
      - id: well-known/app/kagent::kagent-source-path
      - id: well-known/tool/detection/security-scanner/
      - id: domain-intel-skill-context
      - id: well-known/app/litellm::litellm-package-path
      - id: well-known/tool/development/pymobiledevice3
      - id: well-known/lib/cheroot::cheroot-ssl-module
      - id: well-known/tool/development/lacelang-executor::http-timing-module
