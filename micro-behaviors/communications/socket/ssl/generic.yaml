defaults:
  platforms: [windows, unix]
traits:
  - id: ssl-connect-symbol
    desc: SSL connect API
    crit: baseline
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_connect
  - id: ssl-new-symbol
    desc: SSL object creation API
    crit: baseline
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_new
  - id: ssl-ctx-new-symbol
    desc: SSL context creation API
    crit: baseline
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: SSL_CTX_new
  - id: tls-client-method-symbol
    desc: TLS client method API
    crit: baseline
    conf: 0.66
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: TLS_client_method
  - id: insecure-skip-verify
    desc: InsecureSkipVerify (Go)
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: text
      regex: InsecureSkipVerify\s*:\s*true|InsecureSkipVerify\s*=\s*true
  - id: cert-none
    desc: cert_reqs set to CERT_NONE (Python)
    crit: notable
    conf: 0.75
    for:
      - python
    if:
      type: text
      regex: \bcert_reqs\s*=\s*(ssl\.)?CERT_NONE\b
  - id: verify-mode-none
    desc: verify_mode = ssl.CERT_NONE (Python)
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: \bverify_mode\s*=\s*(ssl\.)?CERT_NONE\b
    unless:
      - type: string_literal
        substr: urllib3
      - type: string_literal
        substr: requests
      - type: string_literal
        substr: botocore
  - id: reject-unauthorized-false
    desc: rejectUnauthorized false (Node.js)
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: 'rejectUnauthorized: false'
composite_rules:
  - id: connect-comp
    desc: SSL/TLS connection
    crit: baseline
    conf: 0.66
    for: [elf, macho, pe]
    any:
      - id: ssl-connect-symbol
      - id: ssl-new-symbol
      - id: ssl-ctx-new-symbol
      - id: tls-client-method-symbol
  - id: verify-skip
    desc: Skip SSL certificate verification
    crit: notable
    conf: 0.66
    size_max: 10000
    any:
      - id: insecure-skip-verify
      - id: verify-mode-none
      - id: reject-unauthorized-false
