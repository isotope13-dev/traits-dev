defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: nc
    desc: nc command invocation
    if:
      type: text
      regex: \bnc\s+(?:-[a-zA-Z]+|[\w.-]+\s+\d{1,5})\b
  - id: netcat
    desc: netcat command invocation
    if:
      type: text
      regex: \bnetcat\s+(?:-[a-zA-Z]+|[\w./:-]+\s+\d{1,5})\b
    unless:
      - id: metadata/package::bitdefender-ecnet-telemetry
      - id: metadata/file/text::nmap-http-fingerprints-catalog
