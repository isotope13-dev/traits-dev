# Netcat - Network Swiss Army Knife
# Raw TCP/UDP connection tool
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: nc
    desc: nc command invocation
    if:
      type: string
      regex: '\bnc\s+(?:-[a-zA-Z]+|[\w.-]+\s+\d{1,5})\b'
  - id: netcat
    desc: netcat command
    if:
      type: string
      word: "netcat"
