defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: nc
    desc: nc command invocation
    if:
      type: text
      # Require a command boundary. A bare word boundary let source identifiers
      # such as `nc` match later expression text across a newline (for example,
      # `nc else 0`).
      regex: '(?m)(^|[;&|(`"''])\s*nc\s+(-[a-zA-Z]+|[\w.-]+\s+\d{1,5})\b'
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: netcat
    desc: netcat command invocation
    if:
      type: text
      regex: \bnetcat\s+(-[a-zA-Z]+|[\w./:-]+\s+\d{1,5})\b
    unless:
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
      - id: metadata/file/catalog/identity/
  - id: netcat-keyword
    desc: netcat command keyword
    crit: component
    conf: 0.7
    if:
      type: text
      word: netcat
  - id: nc-pipe
    desc: Pipe into netcat command
    # Neutral shell pipeline into nc; reverse-shell intent requires additional
    # legs (mkfifo, interactive shell) in objectives composites.
    crit: notable
    conf: 0.7
    for: [shell]
    if:
      type: text
      regex: '\|\s*nc\s'
    unless:
      - type: text
        regex: '\becho\b.{0,16}\|\s*nc\b'
