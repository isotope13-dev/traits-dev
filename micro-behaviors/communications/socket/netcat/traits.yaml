defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: nc
    desc: nc command invocation
    if:
      type: text
      regex: \bnc\s+(?:-[a-zA-Z]+|[\w.-]+\s+\d{1,5})\b
  - id: netcat
    desc: netcat command
    if:
      type: text
      word: netcat
    unless:
      - id: metadata/package::bitdefender-ecnet-telemetry
