defaults:
  platforms: [unix]
  for: [rust, c, cpp]
  crit: notable
  conf: 0.9
traits:
  - id: af-vsock-family
    desc: AF_VSOCK socket family
    if:
      type: text
      substr: AF_VSOCK
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: sockaddr-vm
    desc: VM socket address structure
    if:
      type: text
      substr: sockaddr_vm
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: vm-sockets-header
    desc: Linux VM sockets header
    if:
      type: text
      substr: linux/vm_sockets.h
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: native-vsock-channel
    desc: Native host-to-guest vsock channel
    if:
      type: text
      substr: open_native_to_guest
  - id: vsock-mux
    desc: Vsock multiplexer command or component
    if:
      type: text
      regex: \bvsock-mux\b|VsockMux
composite_rules:
  - id: af-vsock-client
    desc: AF_VSOCK host or guest communication channel
    crit: notable
    conf: 0.95
    any:
      - id: af-vsock-family
      - id: sockaddr-vm
      - id: vm-sockets-header
      - id: native-vsock-channel
  - id: vsock-mux-frontend
    desc: Vsock multiplexing frontend
    crit: notable
    conf: 0.94
    all:
      - id: vsock-mux
      - id: af-vsock-client
