defaults:
  platforms: [unix, windows]
  for: [c, cpp]
traits:
  - id: raw-socket-creation-regex
    desc: "Detects raw socket creation in C/C++"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'socket\s*\([^,]{1,120},\s*(SOCK_RAW|3)\s*,\s*[^)]{1,120}\)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: rawtcp-header
    desc: RawTCP library header
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: lib/RawTCP.h
  - id: rawtcp-sniff-api
    desc: RawTCP packet sniff API
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: rawsocket_sniff_pattern
  - id: rawtcp-send-api
    desc: RawTCP packet send API
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: rawsocket_send
  - id: rawtcp-packet-builder
    desc: RawTCP packet builder API
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: build_standard_packet
composite_rules:
  - id: rawtcp-sniff-and-send
    desc: RawTCP sniff and send loop
    crit: suspicious
    conf: 0.94
    all:
      - id: rawtcp-sniff-api
      - id: rawtcp-send-api
    any:
      - id: rawtcp-header
      - id: rawtcp-packet-builder
