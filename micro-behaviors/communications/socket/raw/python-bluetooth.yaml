defaults:
  platforms: [linux]
  for: [python]
  mbc: C0001

traits:
  - id: python-bluetooth-hci-raw-socket
    desc: Python raw Bluetooth HCI socket
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'socket\.socket\s*\([^\n]{0,40}AF_BLUETOOTH[^\n]{0,40}SOCK_RAW[^\n]{0,40}BTPROTO_HCI'
  - id: python-hci-advertising-command
    desc: Python Bluetooth advertising command transport
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(OCF_SET_ADV_DATA|OCF_SET_ADV_ENABLE)[\s\S]{0,900}\.send\s*\('
composite_rules:
  - id: bluetooth-hci-advertising-transport
    desc: Bluetooth HCI advertising transport
    crit: notable
    conf: 0.98
    all:
      - id: python-bluetooth-hci-raw-socket
      - id: python-hci-advertising-command
