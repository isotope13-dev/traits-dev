# Raw Socket Operations
# MBC: C0001 (Socket Communication)
# ATT&CK: T1071
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
  mbc: "C0001"
  attack: "T1011"
traits:
  - id: raw-socket-ref
    desc: Raw socket terminology
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: "raw.?socket"
      case_insensitive: true
  - id: raw-socket-error
    desc: Raw socket creation error
    crit: suspicious
    conf: 0.8
    if:
      type: string
      regex: "(?i)(could not|failed to).{1,15}raw.?socket"
      # Removed proc-net-raw duplicate - use micro-behaviors/fs/proc/info::proc-net-raw
composite_rules:
  - id: raw
    desc: Create raw network sockets
    crit: notable
    conf: 0.8
    any:
      - id: raw-socket-ref
      - id: raw-socket-error
      - id: micro-behaviors/fs/proc/info::proc-net-raw
