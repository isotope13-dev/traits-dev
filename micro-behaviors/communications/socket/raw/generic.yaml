defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
  mbc: C0001
  attack: T1011
traits:
  - id: raw-socket-ref
    desc: Raw socket terminology
    crit: component
    conf: 0.7
    if:
      type: text
      regex: raw.?socket
      case_insensitive: true
    not:
      - substr: Jail may create raw sockets
      - substr: Prison root can create raw sockets
    unless:
      - id: metadata/vendor/identity::freebsd-kernel-image
  - id: raw-socket-error
    desc: Raw socket creation error
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(could not|failed to).{1,15}raw.?socket
    not:
      - substr: failed to create CAN_RAW socket
  - id: go-rawsocketcall-symbol
    desc: Go raw socket syscall wrapper
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [elf]
    if:
      type: text
      exact: syscall.rawsocketcall
composite_rules:
  - id: raw
    desc: Create raw network sockets
    crit: notable
    conf: 0.8
    any:
      - id: raw-socket-ref
      - id: raw-socket-error
      - id: go-rawsocketcall-symbol
      - id: micro-behaviors/fs/proc/info/path::proc-net-raw
