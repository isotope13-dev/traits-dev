# Socket listen/accept in C/C++ source code
defaults:
  mbc: C0001
  attack: T1071
  platforms: [unix, windows]
  for: [c, cpp]
traits:
  - id: accept-call-source
    desc: Socket accept call in source
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: accept
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/lib/nlohmann-json::nlohmann-json-source-header
composite_rules:
  - id: server-socket-source
    desc: Socket server pattern in source
    crit: notable
    conf: 0.80
    all:
      - id: micro-behaviors/communications/socket/bind/function::bind
    any:
      - id: micro-behaviors/communications/socket/listen::listen-sym
      - id: accept-call-source
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
