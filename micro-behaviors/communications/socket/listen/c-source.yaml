# Socket listen/accept in C/C++ source code
defaults:
  mbc: C0001
  attack: T1071
  platforms: [linux, unix, macos, windows]
  for: [c, cpp]
traits:
  - id: listen-call-source
    desc: Socket listen call in source
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '\blisten\s*\('
  - id: accept-call-source
    desc: Socket accept call in source
    crit: notable
    conf: 0.75
    if:
      type: ast
      kind: call
      exact: accept
composite_rules:
  - id: server-socket-source
    desc: Socket server pattern in source
    crit: notable
    conf: 0.80
    all:
      - id: micro-behaviors/communications/socket/bind::bind
    any:
      - id: listen-call-source
      - id: accept-call-source
