# Socket listen/accept in C/C++ source code
defaults:
  mbc: C0001
  attack: T1071
  platforms: [unix, windows]
  for: [c, cpp]
traits:
  - id: accept-call-source
    desc: Socket accept call in source
    crit: notable
    conf: 0.75
    if:
      type: ast
      kind: call
      exact: accept
composite_rules:
  - id: server-socket-source
    desc: Socket server pattern in source
    crit: notable
    conf: 0.80
    all:
      - id: micro-behaviors/communications/socket/bind/function::bind
    any:
      - id: micro-behaviors/communications/socket/listen::listen-sym
      - id: accept-call-source
