defaults:
  for:
    - ruby
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: listen-ruby
    desc: Listen on TCP socket (Ruby)
    crit: notable
    conf: 0.66
    mbc: C0001
    attack: T1071
    if:
      type: string_value
      substr: Socket.tcp_server
  - id: ruby-tcp-socket
    desc: TCP socket connection
    crit: notable
    conf: 0.9
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: TCPSocket
  - id: ruby-tcp-server
    desc: TCP server listening
    crit: notable
    conf: 0.9
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: TCPServer
  - id: ruby-udp-socket
    desc: UDP socket
    crit: notable
    conf: 0.9
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: UDPSocket
