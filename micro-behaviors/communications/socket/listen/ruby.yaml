defaults:
  platforms: [windows, unix]
  for:
    - ruby
traits:
  - id: listen-ruby
    desc: Listen on TCP socket (Ruby)
    crit: notable
    conf: 0.66
    mbc: C0001
    attack: T1071
    if:
      type: string_literal
      substr: Socket.tcp_server
  - id: ruby-tcp-socket
    desc: TCP socket connection
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: TCPSocket
  - id: ruby-tcp-server
    desc: TCP server listening
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: TCPServer
  - id: ruby-udp-socket
    desc: UDP socket
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: UDPSocket
