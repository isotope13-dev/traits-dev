defaults:
  mbc: C0001
  platforms: [unix]
  for: [elf, macho, c, cpp]
traits:
  - id: socket-sym
    desc: socket function symbol
    crit: notable
    conf: 0.4
    if:
      type: symbol
      exact: socket
  - id: listen-sym
    desc: listen function symbol
    crit: notable
    conf: 0.6
    attack: T1071
    if:
      type: symbol
      exact: listen
  - id: accept-sym
    desc: accept function symbol
    crit: notable
    conf: 0.6
    attack: T1071
    if:
      type: symbol
      exact: accept
  - id: accept64-sym
    desc: accept64 function symbol
    crit: notable
    conf: 0.6
    attack: T1071
    if:
      type: symbol
      regex: accept64
composite_rules:
  - id: accept-func
    desc: Accept connection function
    crit: notable
    conf: 0.6
    attack: T1071
    any:
      - id: accept-sym
      - id: accept64-sym
  - id: listen
    desc: Listen on a socket
    crit: notable
    conf: 0.66
    attack: T1071
    needs: 2
    any:
      - id: socket-sym
      - id: listen-sym
      - id: accept-func
