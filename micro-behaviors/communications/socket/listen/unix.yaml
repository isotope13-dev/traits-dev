defaults:
  mbc: C0001
  attack: T1071
  platforms: [linux, macos]
  for: [elf, macho]
traits:
  - id: listen-sym
    desc: References listen socket API
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: listen
  - id: accept-sym
    desc: accept function symbol
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: accept
  - id: accept64-sym
    desc: accept64 function symbol
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: accept64
composite_rules:
  - id: accept-func
    desc: Accept connection function
    crit: notable
    conf: 0.6
    any:
      - id: accept-sym
      - id: accept64-sym
  - id: listen
    desc: Listen on a socket
    crit: notable
    conf: 0.66
    needs: 2
    any:
      - id: micro-behaviors/communications/socket/create::posix-socket-import
      - id: listen-sym
      - id: accept-func
  - id: server-api-surface
    desc: POSIX socket server API surface
    crit: notable
    conf: 0.8
    all:
      - id: micro-behaviors/communications/socket/create::posix-socket-import
      - id: micro-behaviors/communications/socket/bind/function::bind
      - id: listen-sym
  - id: accepting-server-api-surface
    desc: POSIX accepting socket server API surface
    crit: notable
    conf: 0.84
    all:
      - id: server-api-surface
      - id: accept-sym
