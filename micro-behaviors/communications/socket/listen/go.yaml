defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [go, binaries]
  mbc: C0001
  attack: T1071
traits:
  - id: listen-go
    desc: Go net.Listen call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: net.Listen
  - id: listen-tcp
    desc: Go net.ListenTCP call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: net.ListenTCP
