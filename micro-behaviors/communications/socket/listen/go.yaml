defaults:
  platforms: [windows, unix]
  for: [go]
  mbc: C0001
  attack: T1071
traits:
  - id: listen-go
    desc: Go net.Listen call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: net.Listen
  - id: listen-tcp
    desc: Go net.ListenTCP call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: net.ListenTCP
  - id: listen-udp
    desc: Go net.ListenUDP call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: net.ListenUDP
  - id: accept-go
    desc: Go listener accepts a connection
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)[A-Za-z_$][A-Za-z0-9_$]*\.Accept$'
