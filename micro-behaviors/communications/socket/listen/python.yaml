defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.82
  mbc: C0001

traits:
  - id: python-short-socket-listen-method
    desc: Python short-name socket listen call
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(s|sock)\.listen$'
  - id: python-server-socket-listen-method
    desc: Python server socket listen call
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(server|listener)\.listen$'
  - id: asyncio-start-server-call
    desc: Python asyncio starts a server
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: asyncio.start_server
