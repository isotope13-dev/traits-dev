defaults:
  platforms: [unix]
  for:
    - shell
  mbc: C0001
traits:
  - id: listen-netcat
    desc: Listen with netcat
    crit: suspicious
    conf: 0.66
    attack: T1071
    if:
      type: string_literal
      regex: '(^|[^A-Za-z0-9_./-])(nc|netcat|ncat)\s+-[A-Za-z]{0,3}p\b'
  - id: openssl-s-server
    desc: OpenSSL TLS shell listener
    crit: notable
    conf: 0.9
    attack: T1573.002
    if:
      type: text
      substr: s_server -key key.pem -cert cert.pem -accept
  - id: socat-openssl-listen
    desc: socat OpenSSL listener
    crit: notable
    conf: 0.9
    attack: T1573.002
    if:
      type: text
      regex: '(\$SOCAT|socat)\b.{0,64}OPENSSL-LISTEN:'
