defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - shell
traits:
  - id: listen-netcat
    desc: Listen with netcat
    crit: suspicious
    conf: 0.66
    mbc: C0001
    attack: T1071
    if:
      type: string_value
      regex: nc -[a-z]{0,3}p
