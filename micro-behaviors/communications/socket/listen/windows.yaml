defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1071
  mbc: C0001

composite_rules:
  - id: winsock-listener-imports
    desc: Winsock server listener imports
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/communications/socket/init::bind-api
      - id: micro-behaviors/communications/socket/init::listen-api
    any:
      - id: micro-behaviors/communications/socket/init::accept-api
      - id: micro-behaviors/communications/socket/init::select-api
      - id: micro-behaviors/communications/socket/init::wsa-startup

  - id: winsock-public-listener
    desc: Winsock all interfaces listener
    crit: suspicious
    conf: 0.9
    all:
      - id: winsock-listener-imports
      - id: micro-behaviors/communications/socket/bind/address::bind-all-interfaces
