defaults:
  platforms: [unix, windows]
  for: [binaries]
  mbc: C0002
  attack: T1090.003
traits:
  - id: libp2p-library-reference
    desc: libp2p networking library
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: libp2p

  - id: libp2p-peer-id-reference
    desc: libp2p peer identifier
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: peer.ID

  - id: go-libp2p-kad-dht-reference
    desc: go-libp2p Kademlia DHT
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: github.com/libp2p/go-libp2p-kad-dht

  - id: kademlia-dht-reference
    desc: Kademlia DHT networking
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: '(?i)\bkademlia\b|kad-dht|go-libp2p-kad-dht'

  - id: libp2p-external-ip-multiaddr
    desc: libp2p external IP multiaddr
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '/ip4/([0-9]{1,3}\.){3}[0-9]{1,3}/tcp/[0-9]{2,5}/p2p/[1-9A-HJ-NP-Za-km-z]{20,}'
      is: external_ip

  - id: libp2p-dns-multiaddr-prefix
    desc: libp2p DNS multiaddr prefix
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '/dns4/[-A-Za-z0-9.]{3,120}/tcp/[0-9]{2,5}'

  - id: libp2p-peer-multiaddr-suffix
    desc: libp2p peer multiaddr suffix
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '/p2p/[1-9A-HJ-NP-Za-km-z]{20,}'

composite_rules:
  - id: libp2p-bootstrap-multiaddr
    desc: libp2p bootstrap multiaddr
    crit: notable
    conf: 0.9
    any:
      - id: libp2p-external-ip-multiaddr
      - id: libp2p-dns-bootstrap-multiaddr

  - id: libp2p-dns-bootstrap-multiaddr
    desc: libp2p DNS bootstrap multiaddr
    crit: notable
    conf: 0.85
    all:
      - id: libp2p-dns-multiaddr-prefix
      - id: libp2p-peer-multiaddr-suffix
    near_bytes: 240
