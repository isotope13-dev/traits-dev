defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1573
traits:
  - id: big-endian-u32-framing
    desc: Big-endian u32 length framing
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'struct\.(pack|unpack)\([\"\x27]>I[\"\x27]'
  - id: aesgcm-api-reference
    desc: Python AESGCM API reference
    crit: notable
    conf: 0.88
    if:
      type: text
      word: AESGCM
  - id: length-prefixed-encrypted-message
    desc: Length-prefixed encrypted message text
    crit: component
    conf: 0.86
    if:
      type: text
      substr: length-prefixed encrypted message
composite_rules:
  - id: aesgcm-length-prefixed-socket
    desc: AES-GCM socket message framing
    crit: notable
    conf: 0.92
    all:
      - id: aesgcm-api-reference
    any:
      - id: big-endian-u32-framing
      - id: length-prefixed-encrypted-message
    near_lines: 20
  - id: big-endian-length-prefix-json
    desc: Big-endian length-prefixed JSON
    crit: notable
    conf: 0.9
    all:
      - id: big-endian-u32-framing
      - id: micro-behaviors/data/serialize/json/
