defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1573
traits:
  - id: big-endian-u32-framing
    desc: Big-endian u32 length framing
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'struct\.(pack|unpack)\([\"\x27]>I[\"\x27]'
  - id: aesgcm-length-prefixed-socket
    desc: AES-GCM socket message framing
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: AESGCM|length-prefixed encrypted message
composite_rules:
  - id: big-endian-length-prefix-json
    desc: Big-endian length-prefixed JSON
    crit: notable
    conf: 0.9
    all:
      - id: big-endian-u32-framing
      - id: micro-behaviors/data/serialize/json/
