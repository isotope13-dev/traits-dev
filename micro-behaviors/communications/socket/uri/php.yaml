defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  conf: 0.85

traits:
  - id: tcp-socket-uri
    desc: TCP socket URI with port
    if:
      type: literal
      regex: 'tcp://[a-zA-Z0-9.-]+:\d+'
  - id: udp-socket-uri
    desc: UDP socket URI with port
    if:
      type: literal
      regex: 'udp://[a-zA-Z0-9.-]+:\d+'
