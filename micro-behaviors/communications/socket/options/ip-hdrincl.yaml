defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: ip-hdrincl-option
    desc: "Detects setting IP_HDRINCL socket option (IP header"
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'setsockopt\s*\([^,]{1,120},\s*[^,]{1,120},\s*IP_HDRINCL\s*,\s*[^)]{1,120}\)'
