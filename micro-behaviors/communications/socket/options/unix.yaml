defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: options-get
    desc: Get socket options
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: getsockopt
  - id: options-set
    desc: Set socket options
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: setsockopt
  - id: options-reuseport
    desc: Enable socket port reuse
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: SO_REUSEPORT
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
  - id: options-filter
    desc: Socket packet filtering
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: SO_ATTACH_FILTER
