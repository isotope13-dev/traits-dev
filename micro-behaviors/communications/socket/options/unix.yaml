defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: options-get
    desc: Get socket options
    crit: notable
    conf: 0.66
    if:
      type: symbol
      regex: getsockopt
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: options-set
    desc: Set socket options
    crit: notable
    conf: 0.66
    if:
      type: symbol
      regex: setsockopt
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: options-reuseport
    desc: Enable socket port reuse
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: SO_REUSEPORT
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: options-filter
    desc: Socket packet filtering
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: SO_ATTACH_FILTER
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/compiler/systems::go-binary
  - id: options-filter-x64
    desc: Numeric SO_ATTACH_FILTER option
    crit: component
    conf: 0.86
    platforms: [linux]
    for: [elf]
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: BA 1A 00 00 00 BE 01 00 00 00 89 C7 E8

composite_rules:
  - id: options-filter-native
    desc: Native socket packet filtering
    crit: notable
    conf: 0.86
    platforms: [linux]
    for: [elf]
    all:
      - id: options-set
      - id: options-filter-x64
