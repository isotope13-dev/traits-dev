# Python socket receive primitives. Receiving on an already-open socket is
# data transfer, not connection establishment — kept out of socket/connect/
# so dial-only aggregators (reverse-shell detectors) don't treat a bare
# `.recv` (e.g. a WebSocket client's recv) as an outbound dial.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.7
  attack: T1071
  mbc: C0001
traits:
  - id: socket-recv-call
    desc: socket.recv() call
    if:
      type: symbol
      kind: call
      regex: '(^|[.])(sock(et)?|conn|client)\.recv$'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: socket-recv-method-named
    desc: Named Python socket recv() call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(client_socket|server_socket)\.recv$'
  - id: socket-recvfrom-call
    desc: socket.recvfrom() call
    if:
      type: symbol
      exact: "socket.recvfrom"
  - id: socket-recv-pyc-name
    desc: socket recv name in Python bytecode
    for: [pyc]
    if:
      type: text
      substr: recv
composite_rules:
  # "Socket performs I/O" — send or receive. Spans the send/ and receive/
  # capability homes; lives here since receive is the more sensitive half.
  - id: socket-data-transfer
    desc: Socket data transfer operations
    any:
      - id: socket-recv-call
      - id: socket-recv-method-named
      - id: socket-recvfrom-call
      - id: socket-recv-pyc-name
      - id: micro-behaviors/communications/socket/send::socket-send-call
      - id: micro-behaviors/communications/socket/send::python-sendall
      - id: micro-behaviors/communications/socket/send::socket-send-method
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
