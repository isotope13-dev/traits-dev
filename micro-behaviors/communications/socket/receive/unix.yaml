defaults:
  attack: T1071
  mbc: C0001
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: recv-symbol
    desc: Uses recv socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recv
  - id: recvmsg-symbol
    desc: Uses recvmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recvmsg
    unless:
      - id: objectives/collection/keylog/capture::tabby-basename
      - id: metadata/file/text/string::python3-interpreter-basename
  - id: recvfrom-symbol
    desc: Uses recvfrom socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recvfrom
  - id: recvmmsg-symbol
    desc: Uses recvmmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recvmmsg
  - id: _recv-symbol
    desc: Uses _recv socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: _recv
composite_rules:
  - id: receive
    desc: Receive a message from a socket
    crit: notable
    conf: 0.66
    any:
      - id: recv-symbol
      - id: recvmsg-symbol
      - id: recvfrom-symbol
      - id: recvmmsg-symbol
      - id: _recv-symbol
