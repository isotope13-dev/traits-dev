defaults:
  attack: T1071
  mbc: C0001
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: recv-symbol
    desc: Uses recv socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recv
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: recvmsg-symbol
    desc: Uses recvmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recvmsg
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/app/tabby::tabby-basename
      - id: metadata/file/string/identity::python3-interpreter-basename
  - id: recvfrom-symbol
    desc: Uses recvfrom socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recvfrom
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: recvmmsg-symbol
    desc: Uses recvmmsg socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: recvmmsg
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: receive
    desc: Receive a message from a socket
    crit: notable
    conf: 0.66
    any:
      - id: recv-symbol
      - id: recvmsg-symbol
      - id: recvfrom-symbol
      - id: recvmmsg-symbol
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
