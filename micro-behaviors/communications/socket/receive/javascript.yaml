defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.86
  attack: T1071
  mbc: C0001

traits:
  - id: javascript-socket-message-handler
    desc: JavaScript socket message handler
    if:
      type: text
      regex: '\b(socket|websocket|ws)\.onmessage\s*='

  # Receiving a stream event is neutral; reverse-shell intent comes from the
  # separate socket plus child-process/shell composites.
  - id: node-socket-data-event
    desc: Node socket data event handler
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\.on\(["'']data["'']'
