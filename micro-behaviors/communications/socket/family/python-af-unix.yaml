# AF_UNIX socket family reference — neutral socket capability. Relocated from
# reverse-shell (where it was only ever used as an unless-exclusion).
defaults:
  platforms: [linux, macos]
  for: [python]
traits:
  - id: af-unix-socket
    desc: AF_UNIX socket reference
    crit: component
    if:
      type: text
      substr: socket.AF_UNIX
