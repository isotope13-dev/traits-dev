defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: getifaddrs-symbol
    desc: Enumerates interfaces with getifaddrs
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: getifaddrs
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: if-nameindex-symbol
    desc: Enumerates interfaces with if_nameindex
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: if_nameindex
  - id: if-nametoindex-symbol
    desc: Looks up index with if_nametoindex
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: if_nametoindex
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: if-indextoname-symbol
    desc: Looks up name with if_indextoname
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: if_indextoname
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: enumerate
    desc: Enumerate network interfaces
    crit: notable
    conf: 0.75
    any:
      - id: getifaddrs-symbol
      - id: if-nameindex-symbol
  - id: name-lookup
    desc: Network interface name lookup
    crit: notable
    conf: 0.7
    any:
      - id: if-nametoindex-symbol
      - id: if-indextoname-symbol
