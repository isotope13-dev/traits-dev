# Perl socket dial primitives.
defaults:
  for: [perl]
  platforms: [linux, macos, windows]

traits:
  - id: perl-socket-pf-inet
    desc: Perl socket PF_INET call
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bsocket\s*\([^,)]{0,40},\s*PF_INET'
  - id: perl-sockaddr-in
    desc: Perl sockaddr_in marshalling
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: sockaddr_in
