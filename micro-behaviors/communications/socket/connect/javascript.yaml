# Node.js socket dial primitives.
defaults:
  for: [javascript, typescript]
  platforms: [linux, macos, windows]

traits:
  - id: net-connect-port
    desc: Node net.connect with port literal
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bnet\.(connect|createConnection)\s*\(\s*[0-9]{2,5}'
  - id: net-connect
    desc: Node net.connect or createConnection usage
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\bnet\.(connect|createConnection)\s*\('
  - id: net-create-connection-call
    desc: Node net.createConnection call
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: net.createConnection
  - id: net-socket-connect-method
    desc: Node net.Socket constructor
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bnew\s+net\.Socket\s*\('

  - id: node-socket-connect-call
    desc: Socket-like Node connect call marker
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\b(socket|sock|client|conn)\.connect\s*\('

  - id: deno-connect-call
    desc: Deno TCP connect call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: Deno.connect

composite_rules:
  - id: node-net-socket-connect
    desc: Node net.Socket connects to remote endpoint
    crit: notable
    conf: 0.92
    all:
      - id: net-socket-connect-method
      - id: node-socket-connect-call
    near_bytes: 2048
