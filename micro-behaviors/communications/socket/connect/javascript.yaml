# Node.js socket dial primitives.
defaults:
  for: [javascript, typescript]
  platforms: [linux, macos, windows]

traits:
  - id: net-connect-port
    desc: Node net.connect with port literal
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bnet\.(connect|createConnection)\s*\(\s*[0-9]{2,5}'
  - id: net-socket-connect-method
    desc: Node net.Socket.connect method
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bnew\s+net\.Socket\s*\('
