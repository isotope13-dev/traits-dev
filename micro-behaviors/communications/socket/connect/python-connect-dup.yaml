# Generic `.connect(` / socket.connect calls — networking capability used by
# every client and many DB drivers (hence the DB unless-list). Relocated from
# reverse-shell; the reverse-shell composites reference these cross-directory.
defaults:
  platforms: [linux, windows, macos]
traits:
  - id: socket-connect-dup
    desc: .connect( socket method
    crit: component
    conf: 0.6
    for: [python]
    if:
      type: text
      regex: \b(sock|socket|client_socket|server_socket)\.connect\s*\(
    unless:
    - id: micro-behaviors/data/db/orm::sqlalchemy
    - id: metadata/file/magic::sqlite3
    - id: micro-behaviors/data/db/mongodb::pymongo
    - id: micro-behaviors/data/db/postgresql::psycopg2
    - id: micro-behaviors/data/db/mysql::mysql
  - id: socket-connect-dup-node
    desc: socket.connect call
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: socket.connect
