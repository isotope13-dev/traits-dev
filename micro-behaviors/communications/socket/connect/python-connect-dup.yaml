# Generic `.connect(` / socket.connect calls — networking capability used by
# every client and many DB drivers (hence the DB unless-list). Relocated from
# reverse-shell; the reverse-shell composites reference these cross-directory.
defaults:
  platforms: [linux, windows, macos]
traits:
  - id: socket-connect-method-short
    desc: Short Python socket connect call
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: \b(sock|socket|s)\.connect\s*\(
    unless:
    - id: micro-behaviors/data/db/orm::sqlalchemy
    - id: metadata/file/magic/identity::sqlite3
    - id: micro-behaviors/data/db/mongodb::pymongo
    - id: micro-behaviors/data/db/postgresql::psycopg2
    - id: micro-behaviors/data/db/mysql/
  - id: socket-connect-method-named
    desc: Named Python socket connect call
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: \b(client_socket|server_socket)\.connect\s*\(
  - id: socket-connect-ex-method-short
    desc: Python socket-like connect_ex call
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)connect_ex$'
  - id: socket-connect-dup-node
    desc: socket.connect call
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: socket.connect
composite_rules:
  - id: socket-connect-method
    desc: Python socket-like connect call
    crit: notable
    conf: 0.85
    for: [python]
    any:
      - id: socket-connect-method-short
      - id: socket-connect-method-named
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/data/db/orm::sqlalchemy
      - id: metadata/file/magic/identity::sqlite3
      - id: micro-behaviors/data/db/mongodb::pymongo
      - id: micro-behaviors/data/db/postgresql::psycopg2
      - id: micro-behaviors/data/db/mysql/
