# JVM (Java/Kotlin/Scala/Groovy) socket dial primitives.
defaults:
  for: [java, kotlin, scala, groovy]
  platforms: [linux, macos, windows]

traits:
  - id: new-socket-host-port
    desc: new Socket(host, port) constructor
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "\\bnew\\s+Socket\\s*\\(\\s*[\"'][^\"']{1,80}[\"']\\s*,\\s*[0-9]{2,5}"
  - id: socket-channel-open
    desc: SocketChannel.open with address
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bSocketChannel\.open\s*\('
