defaults:
  platforms:
  - windows
  for:
  - pe

traits:
- id: ras-dial
  desc: Establish RAS connection
  crit: notable
  conf: 0.98
  if:
    type: symbol
    exact: "RasDialW"
  unless:
  - type: text
    substr: DDMGetRasDialParams
- id: ras-enum-connections
  desc: Enumerate RAS connections
  crit: notable
  conf: 0.96
  if:
    type: symbol
    exact: "RasEnumConnectionsW"
  unless:
  - type: text
    substr: DDMGetRasDialParams
- id: ras-get-entry-params
  desc: Read RAS entry params
  crit: notable
  conf: 0.94
  if:
    type: symbol
    exact: "RasGetEntryDialParamsW"
  unless:
  - type: text
    substr: DDMGetRasDialParams
- id: ras-hangup
  desc: Disconnect RAS connection
  crit: notable
  conf: 0.96
  if:
    type: symbol
    exact: "RasHangUpW"
  unless:
  - type: text
    substr: DDMGetRasDialParams
- id: ras-error-string
  desc: Resolve RAS error string
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: "RasGetErrorStringW"
  unless:
  - type: text
    substr: DDMGetRasDialParams
- id: ras-add-connect-notify
  desc: RAS connection notification callback
  crit: notable
  conf: 0.96
  for: [pe, c, cpp]
  if:
    type: text
    regex: \bAddConnectNotify[AW]?\b
- id: rasdial2-usage
  desc: Embedded rasdial controller help
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: "rasdial2 entryname"
- id: rasdial2-disconnect
  desc: Embedded rasdial disconnect command
  crit: suspicious
  conf: 0.94
  if:
    type: text
    exact: "/DISCONNECT"
- id: rasdial2-phonebook
  desc: Embedded rasdial phonebook option
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "/PHONEBOOK:"
- id: rasdial2-success-banner
  desc: Embedded rasdial success banner
  crit: component
  conf: 0.88
  if:
    type: text
    exact: "Command completed successfully."

composite_rules:
- id: ras-session-control
  desc: RAS session connection control
  crit: suspicious
  conf: 0.97
  all:
  - id: ras-dial
  any:
  - id: ras-enum-connections
  - id: ras-get-entry-params
  - id: ras-hangup
  needs: 2
  downgrade:
    any:
    - id: well-known/lib/wine::wine-runtime-component
- id: rasdial2-controller
  desc: Embedded rasdial connection controller
  crit: suspicious
  conf: 0.98
  all:
  - id: rasdial2-usage
  - id: rasdial2-disconnect
  any:
  - id: rasdial2-phonebook
  - id: rasdial2-success-banner
  - id: ras-session-control
