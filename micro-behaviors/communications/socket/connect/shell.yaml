defaults:
  attack: T1071
  mbc: C0001
  platforms:
    - unix
  for:
    - shell
    - javascript
    - typescript
traits:
  - id: dev-tcp-path
    desc: Shell /dev/tcp socket path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: /dev/tcp/.{1,80}/[0-9]{1,5}\b
  - id: dev-tcp-fd-redirect
    desc: Bash fd redirect to /dev/tcp
    # Neutral TCP connect via bash /dev/tcp; reverse-shell/HTTP intent lives in
    # objectives composites that combine this with interactive shell or HTTP verbs.
    crit: notable
    conf: 0.9
    for:
      - shell
    if:
      type: text
      regex: exec\s+[0-9]+<>"?/dev/tcp/
    not:
      # Loopback port probes are local health checks, not C2.
      - regex: 'exec\s+[0-9]+<>"?/dev/tcp/(127\.0\.0\.1|localhost|::1)/'
    unless:
      - type: text
        substr: 'timeout 3 bash -c "exec 3<>/dev/tcp/'
      - type: text
        substr: 'port_busy()'
      - type: text
        substr: '/dev/tcp/127.0.0.1/'
      - id: well-known/app/stirling-pdf::source-tree
  - id: dev-tcp-external-ip
    desc: Shell /dev/tcp external endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: /dev/tcp/([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,5}\b
      is: external_ip
