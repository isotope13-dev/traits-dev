defaults:
  attack: T1071
  mbc: C0001
  platforms:
    - unix
  for:
    - shell
    - source
    - binaries
traits:
  - id: dev-tcp-path
    desc: Shell /dev/tcp socket path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: /dev/tcp/.{1,80}/[0-9]{1,5}\b
  - id: dev-tcp-external-ip
    desc: Shell /dev/tcp external endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: /dev/tcp/([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,5}\b
      is: external_ip
