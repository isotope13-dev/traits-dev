defaults:
  attack: T1071
  mbc: C0001
  platforms: [aix, unix]
  for: [elf, macho, c, cpp]
traits:
  - id: connect-symbol
    desc: Uses connect socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: connect
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
  - id: connectx-symbol
    desc: Uses connectx socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: connectx
  - id: loopback-ipv4
    desc: References IPv4 loopback address
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '127[.]0[.]0[.]1'
  - id: loopback-hostname
    desc: References localhost loopback name
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'localh[o]st'
  - id: loopback-ipv6
    desc: References IPv6 loopback address
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: '::1'
composite_rules:
  - id: connect
    desc: Connect socket to remote host
    crit: notable
    conf: 0.66
    any:
      - id: connect-symbol
      - id: connectx-symbol
  - id: loopback-address
    desc: References a loopback network address
    crit: notable
    conf: 0.8
    any:
      - id: loopback-ipv4
      - id: loopback-hostname
      - id: loopback-ipv6
