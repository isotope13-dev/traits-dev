defaults:
  attack: T1071
  mbc: C0001
  platforms: [aix, unix]
  for: [elf, macho, c, cpp]
traits:
  - id: connect-symbol
    desc: References connect socket API
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: connect
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: connectx-symbol
    desc: Uses connectx socket call
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: connectx
composite_rules:
  - id: connect
    desc: Socket connection API surface
    crit: notable
    conf: 0.66
    any:
      - id: connect-symbol
      - id: connectx-symbol
  - id: loopback-ipv4
    desc: Connect-capable code references IPv4 loopback
    crit: notable
    conf: 0.84
    all:
      - id: connect-symbol
    any:
      - id: micro-behaviors/communications/ip/literal::loopback-ipv4-binary
      - id: micro-behaviors/communications/ip/literal::loopback-ipv4-source
  - id: loopback-hostname
    desc: Connect-capable code references localhost
    crit: notable
    conf: 0.84
    all:
      - id: connect-symbol
    any:
      - id: micro-behaviors/communications/ip/literal::localhost-binary
      - id: micro-behaviors/communications/ip/literal::localhost-source
  - id: loopback-ipv6
    desc: Connect-capable code references IPv6 loopback
    crit: notable
    conf: 0.84
    all:
      - id: connect-symbol
    any:
      - id: micro-behaviors/communications/ip/literal::loopback-ipv6-binary
      - id: micro-behaviors/communications/ip/literal::loopback-ipv6-source
  - id: loopback-address
    desc: Connect-capable code references loopback address
    crit: notable
    conf: 0.8
    any:
      - id: loopback-ipv4
      - id: loopback-hostname
      - id: loopback-ipv6
