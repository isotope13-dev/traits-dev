defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
traits:
  - id: java-socket-connect
    desc: Java/Kotlin Socket connection
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(new\s+)?Socket\s*\('
  - id: java-inet-socket-address
    desc: Java/Kotlin InetSocketAddress usage
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: InetSocketAddress
