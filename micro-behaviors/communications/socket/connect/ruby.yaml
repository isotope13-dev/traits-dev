defaults:
  platforms: [windows, unix]
  for: [ruby]
traits:
  - id: ruby-socket-connect
    desc: Connects a socket in Ruby
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(TCPSocket\.(open|new)|Socket\.tcp|connect_nonblock)\b'
  - id: ruby-sockaddr-in
    desc: Ruby Socket.sockaddr_in
    crit: notable
    conf: 0.8
    if:
      type: text
      word: "sockaddr_in"
