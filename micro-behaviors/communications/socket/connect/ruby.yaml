defaults:
  for: [ruby]

traits:
  - id: ruby-socket-connect
    desc: Ruby socket connect call
    crit: notable
    conf: 0.8
    for: [ruby]
    if:
      type: raw
      regex: '\b(TCPSocket\.(open|new)|Socket\.tcp|connect_nonblock)\b'

  - id: ruby-sockaddr-in
    desc: Ruby Socket.sockaddr_in
    crit: notable
    conf: 0.8
    for: [ruby]
    if:
      type: raw
      word: "sockaddr_in"
