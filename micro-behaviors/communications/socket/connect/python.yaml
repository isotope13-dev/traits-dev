# Socket Connect - Python
# MBC: C0001 (Socket Communication)
# ATT&CK: T1071
defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: "T1071"
  mbc: "C0001"
traits:
  # === Socket module imports ===
- id: socket-module-import
  desc: import socket module
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: "import\\s+socket"
- id: socket-from-import
  desc: from socket import
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: "from\\s+socket\\s+import"
  # === Socket creation ===
- id: socket-socket-call
  desc: socket.socket() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.socket"
- id: socket-af-inet
  desc: socket.AF_INET (IPv4)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.AF_INET"
- id: socket-af-inet-name
  desc: AF_INET constant name
  crit: component
  conf: 0.55
  if:
    type: text
    exact: AF_INET
- id: socket-af-inet6
  desc: socket.AF_INET6 (IPv6)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.AF_INET6"
- id: socket-sock-stream
  desc: socket.SOCK_STREAM (TCP)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.SOCK_STREAM"
- id: socket-sock-stream-name
  desc: SOCK_STREAM constant name
  crit: component
  conf: 0.55
  if:
    type: text
    exact: SOCK_STREAM
- id: socket-sock-dgram
  desc: socket.SOCK_DGRAM (UDP)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.SOCK_DGRAM"
  # === Socket operations ===
- id: socket-connect-call
  desc: socket.connect() call
  crit: notable
  conf: 0.75
  if:
    type: symbol
    exact: "socket.connect"
- id: socket-connect-ex-call
  desc: socket.connect_ex() call (non-blocking)
  crit: notable
  conf: 0.75
  if:
    type: symbol
    exact: "socket.connect_ex"
- id: socket-bind-call
  desc: socket.bind() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.bind"
- id: socket-accept-call--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    substr: listen_socket
- id: socket-accept-call--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    substr: server_socket
- id: socket-accept-call--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    substr: accept
- id: socket-send-call
  desc: socket.send() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.send"
- id: socket-sendall-call
  desc: socket.sendall() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.sendall"
- id: socket-recv-call
  desc: socket.recv() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.recv"
- id: socket-recvfrom-call
  desc: socket.recvfrom() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.recvfrom"
- id: socket-close-call
  desc: socket.close() call
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.close"
  # === Socket address operations ===
- id: socket-gethostbyname
  desc: socket.gethostbyname() DNS lookup
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.gethostbyname"
- id: socket-getaddrinfo
  desc: socket.getaddrinfo() DNS lookup
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.getaddrinfo"
- id: socket-gethostname
  desc: socket.gethostname() call
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.gethostname"
composite_rules:
  # Helper composites
- id: socket-creation
  desc: Socket creation patterns
  any:
  - {id: socket-socket-call}
  - {id: socket-af-inet}
  - {id: socket-af-inet-name}
  - {id: socket-af-inet6}
  - {id: socket-sock-stream}
  - {id: socket-sock-stream-name}
  - {id: socket-sock-dgram}
- id: socket-client-operations
  desc: Client socket operations
  any:
  - {id: socket-connect-call}
  - {id: socket-connect-ex-call}
- id: socket-server-operations
  desc: Server socket operations
  any:
  - {id: socket-bind-call}
  - {id: socket-accept-call}
- id: socket-data-transfer
  desc: Socket data transfer operations
  any:
  - {id: socket-send-call}
  - {id: socket-sendall-call}
  - {id: socket-recv-call}
  - {id: socket-recvfrom-call}
  # Main composite (matches original YARA behavior)
- id: connect-python
  desc: Initiate socket connection (Python)
  crit: notable
  conf: 0.75
  all:
  - {id: socket-creation}
  - {id: socket-client-operations}
- id: socket-accept-call
  desc: socket.accept() call
  crit: notable
  conf: 0.7
  any:
  - id: socket-accept-call--rx-1
  - id: socket-accept-call--rx-2
  - id: socket-accept-call--rx-3
  needs: 1
