# Socket Connect - Python
# MBC: C0001 (Socket Communication)
# ATT&CK: T1071
defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: "T1071"
  mbc: "C0001"
traits:
  # === Socket module imports ===
- id: socket-module-import
  desc: Imports Python's socket module
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: "import\\s+socket"
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: metadata/library/data::aws-python-sdk-source
- id: socket-from-import
  desc: from socket import
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: "from\\s+socket\\s+import"
  # === Socket creation ===
- id: socket-socket-call
  desc: socket.socket() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.socket"
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: socket-af-inet
  desc: socket.AF_INET (IPv4)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.AF_INET"
- id: socket-af-inet-name
  desc: AF_INET constant name
  crit: component
  conf: 0.55
  if:
    type: text
    word: AF_INET
- id: socket-af-inet6
  desc: socket.AF_INET6 (IPv6)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.AF_INET6"
- id: socket-sock-stream
  desc: socket.SOCK_STREAM (TCP)
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.SOCK_STREAM"
- id: socket-sock-stream-name
  desc: SOCK_STREAM constant name
  crit: component
  conf: 0.55
  if:
    type: text
    word: SOCK_STREAM
  # === Socket operations ===
- id: socket-connect-call
  desc: socket.connect() call
  crit: notable
  conf: 0.75
  if:
    type: symbol
    exact: "socket.connect"
- id: socket-create-connection-call
  desc: Python socket create_connection call
  crit: notable
  conf: 0.85
  if:
    type: symbol
    kind: call
    regex: '^_?socket\.create_connection$'
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: socket-connect-pyc-name
  desc: socket connect name in Python bytecode
  crit: notable
  conf: 0.66
  for: [pyc]
  if:
    type: text
    word: connect
- id: socket-connect-ex-call
  desc: socket.connect_ex() call (non-blocking)
  crit: notable
  conf: 0.75
  if:
    type: symbol
    exact: "socket.connect_ex"
- id: socket-connect-ex-pyc-name
  desc: socket connect_ex name in Python bytecode
  crit: notable
  conf: 0.7
  for: [pyc]
  if:
    type: text
    substr: connect_ex
- id: socket-bind-call
  desc: socket.bind() call
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: "socket.bind"
- id: socket-accept-call--rx-1
  desc: listen_socket.accept() call
  crit: component
  conf: 0.7
  if:
    type: symbol
    kind: call
    regex: '(^|\.)(listen_socket|listener_socket)\.accept$'
- id: socket-accept-call--rx-2
  desc: server.accept() call
  crit: component
  conf: 0.7
  if:
    type: symbol
    kind: call
    regex: '(^|\.)(server_socket|server|listener)\.accept$'
- id: socket-accept-call--rx-3
  desc: socket.accept() call
  crit: component
  conf: 0.7
  if:
    type: symbol
    kind: call
    exact: socket.accept
- id: socket-accept-call--rx-4
  desc: sock.accept() call
  crit: component
  conf: 0.7
  if:
    type: symbol
    kind: call
    exact: sock.accept
- id: socket-accept-call--rx-5
  desc: conn.accept() call
  crit: component
  conf: 0.7
  if:
    type: symbol
    kind: call
    exact: conn.accept
- id: socket-accept-call--rx-6
  desc: client_socket.accept() call
  crit: component
  conf: 0.7
  if:
    type: symbol
    kind: call
    exact: client_socket.accept
# socket send/recv/sendall/recvfrom relocated to socket/send/ and
# socket/receive/ (data transfer is not connection establishment).
- id: socket-close-call
  desc: socket.close() call
  crit: notable
  conf: 0.6
  if:
    type: symbol
    exact: "socket.close"
  # === Socket address operations ===
  # NOTE: socket.gethostbyname / socket.getaddrinfo are DNS-resolution calls and
  # live in micro-behaviors/communications/dns/lookup/resolver::gethostbyname /
  # ::getaddrinfo (the single canonical home). Reference those from there rather
  # than duplicating the atom here.
composite_rules:
  # Helper composites
- id: socket-creation
  desc: Socket creation patterns
  any:
  - {id: socket-socket-call}
  - {id: socket-af-inet}
  - {id: socket-af-inet-name}
  - {id: socket-af-inet6}
  - {id: socket-sock-stream}
  - {id: socket-sock-stream-name}
  - {id: micro-behaviors/communications/socket/udp::sock-dgram-python}
- id: socket-client-operations
  desc: Client socket operations
  any:
  - {id: socket-connect-call}
  - {id: socket-connect-ex-call}
- id: socket-server-operations
  desc: Server socket operations
  any:
  - {id: socket-bind-call}
  - {id: socket-accept-call}
  # Main composite (matches original YARA behavior)
- id: connect-python
  desc: Initiate socket connection (Python)
  crit: notable
  conf: 0.75
  all:
  - {id: socket-creation}
  - {id: socket-client-operations}
- id: socket-accept-call
  desc: socket.accept() call
  crit: notable
  conf: 0.7
  any:
  - id: socket-accept-call--rx-1
  - id: socket-accept-call--rx-2
  - id: socket-accept-call--rx-3
  - id: socket-accept-call--rx-4
  - id: socket-accept-call--rx-5
  - id: socket-accept-call--rx-6
