defaults:
  platforms: [windows, unix]
  for: [go]
  mbc: C0001
  attack: T1071
traits:
  - id: dial
    desc: Go net.Dial call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: net.Dial
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: dialer-dial
    desc: Go net.Dialer.Dial call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: net.(*Dialer).Dial
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: dial-tcp
    desc: Go net.DialTCP call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: net.DialTCP
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: dial-timeout-tcp
    desc: Go timed TCP dial call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: net\.DialTimeout.{0,20}tcp
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
composite_rules:
  - id: go-dial-methods
    desc: Go network dial methods
    any:
      - id: dial
      - id: dialer-dial
      - id: dial-tcp
      - id: dial-timeout-tcp
