defaults:
  platforms: [windows, unix]
  for:
    - php
traits:
  - id: php-stream-socket-client
    desc: PHP stream socket client connection
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: stream_socket_client
    unless:
      - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
  - id: php-socket-create
    desc: PHP socket_create function
    crit: notable
    conf: 0.85
    if:
      type: text
      word: socket_create
  - id: php-socket-connect
    desc: PHP socket_connect function
    crit: notable
    conf: 0.85
    if:
      type: text
      word: socket_connect
  - id: localhost-socket-uri
    desc: Localhost socket URI
    crit: notable
    conf: 1.0
    if:
      type: string_literal
      regex: tcp://(127\.0\.0\.1|localhost|0\.0\.0\.0)(:\d+)?
composite_rules:
  - id: php-explicit-socket-endpoint
    desc: PHP stream socket client uses explicit endpoint
    crit: notable
    conf: 0.9
    all:
      - id: php-stream-socket-client
    any:
      - id: micro-behaviors/communications/socket/uri::tcp-socket-uri
      - id: micro-behaviors/communications/socket/uri::udp-socket-uri
  - id: php-reverse-shell
    desc: PHP reverse shell pattern
    crit: suspicious
    conf: 0.95
    all:
      - id: php-socket-create
      - id: php-socket-connect
    any:
      - id: micro-behaviors/process/create/shell/lang/
