defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: C0001
  attack: T1095
traits:
  - id: fsockopen-call
    desc: Opens a socket with PHP fsockopen()
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: fsockopen
  - id: pfsockopen-call
    desc: PHP pfsockopen persistent socket
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: pfsockopen
