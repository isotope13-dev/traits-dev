defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: C0001
  attack: T1095
traits:
  - id: fsockopen-call
    desc: PHP fsockopen socket open
    crit: notable
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: fsockopen
  - id: pfsockopen-call
    desc: PHP pfsockopen persistent socket
    crit: notable
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: pfsockopen
  - id: stream-socket-client-call
    desc: PHP stream_socket_client call
    crit: notable
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: stream_socket_client
