# Zig socket dial primitives.
defaults:
  for: [zig]
  platforms: [linux, macos, windows]

traits:
  - id: zig-tcp-connect-host
    desc: Zig tcpConnectToHost call
    crit: notable
    conf: 0.92
    if:
      type: text
      word: tcpConnectToHost
  - id: zig-tcp-connect-address
    desc: Zig tcpConnectToAddress call
    crit: notable
    conf: 0.92
    if:
      type: text
      word: tcpConnectToAddress
