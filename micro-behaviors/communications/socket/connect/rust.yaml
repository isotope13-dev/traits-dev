# Rust socket dial primitives.
defaults:
  for: [rust]
  platforms: [unix, windows, openwrt]

traits:
  - id: tcpstream-connect
    desc: Rust TcpStream::connect call
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bTcpStream::connect\s*\('
  - id: tcpstream-connect-timeout
    desc: Rust TcpStream timeout connect
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bTcpStream::connect_timeout\s*\('
  - id: udpsocket-bind
    desc: Rust UdpSocket::bind call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bUdpSocket::bind\s*\('
