# Modbus Industrial Control Protocol (TCP port 502)
# Neutral protocol references — intent inferred at objectives tier.
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: notable
  conf: 0.85

traits:
  - id: keyword
    desc: Modbus protocol keyword reference
    if:
      type: text
      word: Modbus
      case_insensitive: true
    not:
      - substr: node_modules/
      - substr: package.json

  - id: library
    desc: Modbus library or module reference
    conf: 0.88
    if:
      type: text
      regex: (?i)(pymodbus|libmodbus|modbus[-_]?tcp)

  - id: port-502
    desc: Modbus TCP port 502 context
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)(modbus|port|connect).{0,30}\b502\b

  - id: read-holding-registers
    desc: Modbus read holding registers frame
    conf: 0.9
    for: [pe]
    if:
      type: hex
      pattern: "01 03 00 00 00 (0A|01|0B|64)"
      section: .rdata

  - id: write-single-register
    desc: Modbus write single register frame
    conf: 0.9
    for: [pe]
    if:
      type: hex
      pattern: "01 06 00 ?? 00 ??"
      section: .rdata

composite_rules:
  - id: protocol-usage
    desc: Modbus protocol usage indicators
    crit: notable
    conf: 0.88
    any:
      - id: keyword
      - id: library
      - id: read-holding-registers
      - id: write-single-register
