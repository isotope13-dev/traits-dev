# Modbus Industrial Control Protocol (TCP port 502)
# Neutral protocol references — intent inferred at objectives tier.
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: notable
  conf: 0.85

traits:
  - id: keyword
    desc: Modbus protocol keyword reference
    crit: component
    if:
      type: text
      word: Modbus
      case_insensitive: true
    not:
      - substr: node_modules/
      - substr: package.json

  - id: library
    desc: Modbus library or module reference
    conf: 0.88
    if:
      type: text
      regex: (?i)(pymodbus|umodbus|libmodbus|modbus[-_]?tcp)

  - id: port-502
    desc: Modbus TCP port 502 context
    crit: component
    conf: 0.7
    if:
      type: text
      # Generic `connect.c:502` strings are not a Modbus port reference.
      regex: (?i)(modbus|port)[^0-9]{0,30}502\b

  - id: read-holding-registers
    desc: Modbus read holding registers frame
    # Component-only: a 6-byte pattern collides with arbitrary .rdata bytes in
    # any large PE. Only meaningful when paired with Modbus keyword/library.
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: hex
      pattern: "01 03 00 00 00 (0A|01|0B|64)"
      section: .rdata

  - id: write-single-register
    desc: Modbus write single register frame
    # Component-only: require MBAP framing to avoid arbitrary PE byte pairs.
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: hex
      pattern: "00 00 00 00 00 06 01 06 00 ?? 00 ??"
      section: .rdata

composite_rules:
  - id: keyword-port-context
    desc: Modbus keyword with port context
    crit: component
    conf: 0.84
    all:
      - id: keyword
      - id: port-502

  - id: protocol-usage
    desc: Modbus protocol usage indicators
    crit: notable
    conf: 0.88
    # A lone keyword is too broad in scanners and AV signatures. Require a
    # library reference, or keyword plus port context.
    any:
      - id: library
      - id: keyword-port-context
  - id: protocol-usage-with-frame
    desc: Modbus keyword/library plus wire-frame evidence
    crit: notable
    conf: 0.95
    all:
      - id: protocol-usage
    any:
      - id: read-holding-registers
      - id: write-single-register
