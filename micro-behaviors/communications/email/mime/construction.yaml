defaults:
  platforms:
    - unix
    - windows
  for:
    - python
    - javascript
    - php
    - go
    - csharp
    - powershell
traits:
  - id: mime-multipart-boundary
    desc: Declares a multipart/mixed MIME boundary
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'multipart/mixed.{0,120}boundary\s*=\s*["'']?[-A-Za-z0-9]{4,70}'
  - id: mime-base64-attachment
    desc: MIME base64 attachment encoding
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'Content-Transfer-Encoding: base64'
  - id: mime-octet-stream
    desc: Uses the application/octet-stream MIME type
    crit: component
    conf: 0.85
    if:
      type: text
      substr: application/octet-stream
  - id: mime-msdownload-content-type
    desc: MIME Windows executable type
    crit: component
    conf: 0.88
    if:
      type: text
      substr: application/x-msdownload
  - id: mime-content-disposition
    desc: MIME attachment disposition
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'Content-Disposition: attachment'
  - id: mime-executable-filename
    desc: MIME executable filename
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'filename=["''][^"'']{0,80}\.(exe|scr|bat|cmd)["'']'
  - id: mime-script-filename
    desc: MIME script filename
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'filename=["''][^"'']{0,80}\.(vbs|ps1|js)["'']'
  - id: mime-content-disposition-typo
    desc: MIME attachment disposition typo
    crit: component
    conf: 0.88
    if:
      type: text
      substr: 'Content-Disposition: attachement'
  - id: mime-multipart-marker-pe
    desc: PE MIME multipart marker
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: text
      regex: multipart/mixed|boundary="----.{1,48}
  - id: mime-base64-attachment-pe
    desc: PE MIME base64 attachment
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: text
      substr: 'Content-Transfer-Encoding: base64'
  - id: mime-msdownload-content-type-pe
    desc: PE MIME executable type
    crit: component
    conf: 0.89
    size_min: 1024
    for: [pe]
    if:
      type: text
      exact: application/x-msdownload
  - id: mime-content-disposition-typo-pe
    desc: PE MIME disposition typo
    crit: component
    conf: 0.89
    size_min: 1024
    for: [pe]
    if:
      type: text
      exact: 'Content-Disposition: attachement;'
  - id: mime-zip-filename-pe
    desc: PE embeds ZIP attachment filename
    crit: notable
    conf: 0.93
    for: [pe]
    if:
      type: text
      regex: 'Content-Disposition:\s*attachment[\s\S]{0,160}\.zip\b'
  - id: eml-file-construction
    desc: Constructs EML message file
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'new\s+File\(.{0,160}\.eml["'']|["'']\.eml["'']'
    unless:
      - id: well-known/lib/mime-db/
      - id: metadata/library/structure::vscode-extension-generated-asset
composite_rules:
  - id: mime-file-attachment
    desc: MIME email file attachment
    crit: notable
    conf: 0.9
    all:
      - id: mime-multipart-boundary
      - id: mime-content-disposition
    any:
      - id: mime-base64-attachment
      - id: mime-octet-stream
  - id: mime-executable-attachment
    desc: MIME email with executable attachment
    crit: suspicious
    conf: 0.93
    all:
      - id: mime-multipart-boundary
      - id: mime-base64-attachment
    any:
      - id: mime-msdownload-content-type
      - id: mime-executable-filename
      - id: mime-script-filename
      - id: mime-content-disposition-typo
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
  - id: mime-executable-attachment-pe
    desc: PE embeds MIME executable attachment
    crit: suspicious
    conf: 0.95
    for: [pe]
    all:
      - id: mime-multipart-marker-pe
      - id: mime-base64-attachment-pe
    any:
      - id: mime-msdownload-content-type-pe
      - id: mime-content-disposition-typo-pe
  - id: mime-zip-attachment-pe
    desc: PE constructs a Base64 ZIP email attachment
    crit: notable
    conf: 0.95
    for: [pe]
    all:
      - id: mime-multipart-marker-pe
      - id: mime-base64-attachment-pe
      - id: mime-zip-filename-pe
