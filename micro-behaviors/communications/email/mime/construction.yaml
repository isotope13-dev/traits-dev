defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, source]
traits:
  - id: mime-multipart-boundary
    desc: MIME multipart boundary marker
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: multipart/mixed.{0,40}boundary
  - id: mime-base64-attachment
    desc: MIME base64 attachment encoding
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: 'Content-Transfer-Encoding: base64'
  - id: mime-octet-stream
    desc: MIME octet-stream content type
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: application/octet-stream
  - id: mime-content-disposition
    desc: MIME attachment disposition
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: 'Content-Disposition: attachment'
composite_rules:
  - id: mime-executable-attachment
    desc: MIME email with executable attachment
    crit: suspicious
    conf: 0.93
    all:
      - id: mime-multipart-boundary
      - id: mime-base64-attachment
    any:
      - id: mime-octet-stream
      - id: mime-content-disposition
