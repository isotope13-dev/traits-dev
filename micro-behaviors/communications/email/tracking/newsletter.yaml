# Newsletter engagement tracking. These are standard email-marketing mechanics:
# a per-recipient open pixel, click redirector, unsubscribe header, and bounce
# correlation token. Abuse intent requires additional evidence.
defaults:
  platforms: [unix, windows]
  for: [php, javascript, typescript]
  crit: notable
  conf: 0.88

traits:
  - id: newsletter-open-pixel-endpoint
    desc: Newsletter open pixel endpoint
    for: [php]
    conf: 0.92
    if:
      type: text
      regex: '(?s)function\s+open\s*\(.{0,160}\).{0,700}Content-Type.{0,80}image/(gif|png)'

  - id: newsletter-click-redirect-endpoint
    desc: Newsletter click redirect endpoint
    for: [php]
    conf: 0.92
    if:
      type: text
      regex: '(?s)function\s+click\s*\(.{0,160}\).{0,700}recordClick\s*\(.{0,300}redirect\s*\('

  - id: list-unsubscribe-header
    desc: Email List-Unsubscribe header
    for: [php]
    conf: 0.9
    if:
      type: text
      substr: List-Unsubscribe

  - id: newsletter-bounce-token
    desc: Newsletter bounce correlation token
    for: [php]
    conf: 0.88
    if:
      type: text
      substr: X-Newsletter-Token

composite_rules:
  - id: newsletter-engagement-tracking
    desc: Newsletter open and click tracking
    crit: notable
    conf: 0.94
    all:
      - id: newsletter-open-pixel-endpoint
      - id: newsletter-click-redirect-endpoint
