defaults:
  for: [pe, dll, c, cpp, csharp]
  platforms: [windows]
  crit: notable
  conf: 0.9

traits:
  - id: session-logon
    desc: Log on to a MAPI session
    if:
      type: text
      word: MapiLogOn
  - id: enumerate-messages
    desc: Enumerate messages through MAPI
    if:
      type: text
      word: MapiFindNext
  - id: read-message
    desc: Read an email through MAPI
    if:
      type: text
      word: MAPIReadMail
