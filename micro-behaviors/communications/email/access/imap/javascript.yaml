defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]

traits:
  - id: account-password-field
    desc: Reads configured IMAP account password
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]{0,24}\.imap\.password\b'

  - id: account-imap-config-serialization
    desc: Serializes IMAP account configuration object
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'JSON\.stringify\(\s*[A-Za-z_$][\w$]{0,24}\.imap\s*\)'

  - id: xoauth2-authentication-command
    desc: Implements IMAP XOAUTH2 authentication
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: 'buildCommand(tag, `AUTHENTICATE XOAUTH2'

  - id: imap-message-fetch-command
    desc: Implements IMAP UID message retrieval
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'buildCommand(tag, `UID FETCH'

  - id: imap-idle-command
    desc: Implements the IMAP IDLE command
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'buildCommand(tag, "IDLE")'

  - id: imap-auto-configuration
    desc: Builds automatic IMAP account configuration
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: createAutoImapConfig

  - id: imap-client-construction
    desc: Constructs a compatibility IMAP client
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\bnew\s+CompatImapClient\s*\('

  - id: imap-message-fetch-method
    desc: Fetches messages through an IMAP client
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\bclient\.fetchMessages(SinceUid)?\s*\('

  - id: imap-idle-mailbox-watch
    desc: Watches an IMAP mailbox for new messages
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\bwatchClient\.watchMailbox\s*\('

  - id: imap-mailbox-append
    desc: Appends a message to an IMAP mailbox
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\bclient\.appendMessage\s*\('

  - id: imapflow-library-import
    desc: Imports the ImapFlow IMAP client library
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: imapflow
