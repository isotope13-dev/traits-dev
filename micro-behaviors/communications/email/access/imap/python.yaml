defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: python-imaplib-import
    desc: Imports Python IMAP client library
    if:
      type: import
      exact: imaplib

  - id: python-imap-tls-client
    desc: Creates an IMAP over TLS client
    if:
      type: symbol
      kind: call
      regex: '(^|\.)imaplib\.IMAP4_SSL$'

  - id: python-imap-login
    desc: Logs in to an IMAP account
    if:
      type: symbol
      kind: call
      regex: '(^|\.)mail\.login$'

  - id: python-imap-mailbox-select
    desc: Selects an IMAP mailbox
    if:
      type: symbol
      kind: call
      regex: '(^|\.)mail\.select$'

  - id: python-imap-mailbox-search
    desc: Searches messages in an IMAP mailbox
    if:
      type: symbol
      kind: call
      regex: '(^|\.)mail\.search$'

  - id: python-imap-message-fetch
    desc: Fetches messages from an IMAP mailbox
    if:
      type: symbol
      kind: call
      regex: '(^|\.)mail\.fetch$'

composite_rules:
  - id: python-imap-mail-reader
    desc: Python IMAP mailbox reader
    crit: notable
    conf: 0.95
    all:
      - id: python-imaplib-import
      - id: python-imap-tls-client
      - id: python-imap-login
