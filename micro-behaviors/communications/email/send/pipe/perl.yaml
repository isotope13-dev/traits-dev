defaults:
  for: [perl]
  platforms: [unix]
traits:
  - id: sendmail-pipe
    desc: Opens pipe to sendmail binary
    crit: notable
    conf: 0.9
    mbc: C0012
    if:
      type: text
      regex: 'open\s*\(\s*\w+\s*,\s*"\|\$?\w*sendmail'
  - id: from-header
    desc: Constructs email From header
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'print MAIL "From:'
  - id: reply-to-header
    desc: Constructs email Reply-To header
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'print MAIL "Reply-To:'
  - id: x-mailer-header
    desc: Sets custom X-Mailer header
    crit: notable
    conf: 0.88
    unless:
      - id: well-known/app/windows-desktop-tools::cmder-vendor-member
    if:
      type: text
      substr: "X-Mailer:"
  - id: content-type-header
    desc: Constructs email Content-Type header
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'print\s+MAIL\s+"Content-Type:'
  - id: sendmail-path
    desc: References sendmail binary path
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: '/usr/s?bin/sendmail'
composite_rules:
  - id: perl-sendmail-email
    desc: Perl script sends email via sendmail
    crit: suspicious
    conf: 0.9
    mbc: C0012
    all:
      - id: sendmail-pipe
    any:
      - id: from-header
      - id: reply-to-header
      - id: content-type-header
      - id: sendmail-path
