# Outlook email automation through .NET COM interop
defaults:
  for: [csharp, pe, dll]
  platforms: [windows]
  attack: T1566.001
traits:
  - id: outlook-application-getactiveobject
    desc: Obtain running Outlook COM application object
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Marshal\.GetActiveObject\s*\(\s*["'']Outlook\.Application["'']\s*\)'
  - id: outlook-mailitem-create
    desc: Outlook MailItem creation through COM
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bCreateItem\s*\(\s*0\s*\)'
  - id: outlook-sendusingaccount
    desc: Outlook SendUsingAccount assignment
    crit: notable
    conf: 0.86
    if:
      type: text
      word: SendUsingAccount
  - id: outlook-contacts-folder-default
    desc: Outlook contacts default folder call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bGetDefaultFolder\s*\(\s*(10|OlDefaultFolders\.olFolderContacts)\s*\)'
  - id: outlook-contacts-folder-name
    desc: Outlook contacts folder enum
    crit: notable
    conf: 0.86
    if:
      type: text
      word: olFolderContacts
  - id: outlook-mailitem-send
    desc: Generic .Send method call
    crit: component
    conf: 0.5
    if:
      type: text
      regex: '\.Send\s*\('
composite_rules:
  - id: outlook-com-mail-send
    desc: Outlook COM mail send automation
    crit: suspicious
    conf: 0.92
    all:
      - id: outlook-application-getactiveobject
      - id: outlook-mailitem-create
      - id: outlook-mailitem-send
    any:
      - id: outlook-sendusingaccount
      - id: outlook-contacts-folder
  - id: outlook-contacts-folder
    desc: Outlook contacts folder access
    crit: suspicious
    conf: 0.9
    any:
      - id: outlook-contacts-folder-default
      - id: outlook-contacts-folder-name
