defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: outlook-createitem-vb6
    desc: VB6 Outlook mail item create
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: (?i)CreateObject\s*\(\s*"Outlook\.Application"\s*\)\.CreateItem\s*\(\s*0\s*\)
  - id: outlook-attachment-vb6
    desc: VB6 Outlook attachment add
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: (?i)\bb\.Attachments\.Add\s+ipath\b
  - id: delete-after-submit-vb6
    desc: VB6 Outlook delete after submit
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)\bb\.DeleteAfterSubmit\s*=\s*True\b
  - id: sendmail-routine-vb6
    desc: VB6 mass mail send routine
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)\bSub\s+sendmail\s*\(\s*address\s+As\s+String\s*\)
  - id: deceptive-patch-subject
    desc: Patch lure email subject
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: b.Subject = "Very important patch!"
composite_rules:
  - id: attached-mail-send-vb6
    desc: VB6 Outlook attachment send
    crit: suspicious
    conf: 0.98
    all:
      - id: outlook-createitem-vb6
      - id: outlook-attachment-vb6
      - id: delete-after-submit-vb6
      - id: sendmail-routine-vb6
