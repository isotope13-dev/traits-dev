# Outlook/MAPI email automation from Windows source code
defaults:
  for: [c, cpp, javascript, vbs]
  platforms: [windows]
traits:
  - id: outlook-application-createobject
    desc: Outlook Application COM creation
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)CreateObject\s*\(\s*["'']outlook\.application["'']\s*\)'
  - id: outlook-application-activex
    desc: Outlook Application ActiveX creation
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)ActiveXObject\s*\(\s*["'']outlook\.application["'']\s*\)'
  - id: mapi-namespace
    desc: Outlook MAPI namespace access
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)GetNameSpace\s*\(\s*["'']MAPI["'']\s*\)'
  - id: outlook-logon
    desc: Outlook MAPI logon call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\.Logon\s+["''][^"'']{1,64}["'']\s*,\s*["''][^"'']{1,64}["'']'
  - id: addresslists-count
    desc: Outlook address lists iteration
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)AddressLists\s*\.\s*Count'
  - id: addresslists-reference
    desc: Outlook address lists reference
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|[.])AddressLists$'
  - id: addressentries-count
    desc: Outlook address entries iteration
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)AddressEntries\s*\.\s*Count'
  - id: addressentries-reference
    desc: Outlook address entries reference
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '(^|[.])AddressEntries$'
  - id: mailitem-create
    desc: Outlook MailItem creation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)CreateItem\s*\(\s*0\s*\)'
  - id: recipients-add
    desc: Outlook recipient collection add
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)Recipients\s*\.\s*Add'
  - id: attachments-add
    desc: Outlook attachment add
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)Attachments\s*\.\s*Add'
  - id: delete-after-submit
    desc: Outlook delete after submit
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)DeleteAfterSubmit\s*=\s*True'
  - id: mailitem-send
    desc: Outlook MailItem send
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\.Send\b'
    unless:
      - id: metadata/lang/source/
  - id: lure-subject
    desc: Serab lure email subject
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: 'd.Subject = "Wow! It should be seen!"'
  - id: lure-body
    desc: Serab lure email body
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: 'd.Body = "Hi dead friend. Press the attached file!"'
  - id: winpof-attachment-path
    desc: Attachment path winpof executable
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)c:\\windows\\winpof\.exe'
composite_rules:
  - id: outlook-application-object
    desc: Outlook Application COM object
    crit: notable
    conf: 0.94
    any:
      - id: outlook-application-createobject
      - id: outlook-application-activex
  - id: outlook-mapi-automation
    desc: Outlook MAPI automation
    crit: suspicious
    conf: 0.94
    all:
      - id: outlook-application-object
      - id: mapi-namespace
    any:
      - id: outlook-logon
      - id: mailitem-create
  - id: outlook-address-lists-access
    desc: Outlook address lists access
    crit: notable
    conf: 0.92
    any:
      - id: addresslists-count
      - id: addresslists-reference
  - id: outlook-address-entries-access
    desc: Outlook address entries access
    crit: notable
    conf: 0.92
    any:
      - id: addressentries-count
      - id: addressentries-reference
  - id: outlook-address-book-enumeration
    desc: Outlook address book enumeration
    crit: suspicious
    conf: 0.95
    all:
      - id: outlook-address-lists-access
      - id: outlook-address-entries-access
  - id: address-book-recipient-harvest
    desc: Outlook address book harvesting
    crit: suspicious
    conf: 0.95
    all:
      - id: outlook-address-book-enumeration
      - id: recipients-add
  - id: attached-mail-send
    desc: Outlook mail with attachment send
    crit: suspicious
    conf: 0.96
    all:
      - id: mailitem-create
      - id: attachments-add
      - id: mailitem-send
