defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, chrome-manifest]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: gmail-send-scope
    desc: Gmail send OAuth scope
    if:
      type: text
      substr: googleapis.com/auth/gmail.send

  - id: gmail-message-send-api
    desc: Gmail message send API
    for: [javascript, typescript]
    if:
      type: text
      substr: gmail.googleapis.com/gmail/v1/users/me/messages/send

  - id: gmail-raw-message-body
    desc: Gmail raw message body
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      substr: "raw:"

composite_rules:
  - id: gmail-api-send
    desc: Sends mail via Gmail API
    crit: notable
    conf: 0.94
    near_bytes: 1200
    all:
      - id: gmail-message-send-api
      - id: gmail-raw-message-body
