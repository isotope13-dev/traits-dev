# Extended MAPI email sending APIs in PE binaries
# mapi32.dll dynamic loading, MAPILogonEx, MAPIInitialize, address book access
# Used by native Windows binaries to send email via Outlook/MAPI
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.9
traits:
- id: mapi32-dll-ref
  desc: MAPI32 DLL reference string
  crit: component
  conf: 0.95
  if:
    type: text
    exact: "mapi32.dll"

- id: mapi-logon-ex
  desc: Extended MAPI logon API
  crit: component
  conf: 0.95
  if:
    type: text
    word: MAPILogonEx

- id: mapi-initialize
  desc: Extended MAPI initialize API
  crit: component
  conf: 0.95
  if:
    type: text
    word: MAPIInitialize

- id: ipm-note-class
  desc: MAPI email message class
  conf: 0.95
  if:
    type: text
    exact: "IPM.Note"

- id: outlook-get-addrs
  desc: Outlook address harvesting function
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: OutlookGetAddrs

- id: mapi-address-book
  desc: MAPI address book access string
  conf: 0.9
  if:
    type: text
    substr: "Get the address book"

- id: sendmail-routine
  desc: MAPI SendMail routine string
  crit: component
  conf: 0.85
  if:
    type: text
    word: SendMail

- id: autocomplete-filename
  desc: Outlook autocomplete filename string
  crit: component
  conf: 0.9
  if:
    type: text
    exact: AutoCompleteFileName

- id: pdf-attachment-string
  desc: PDF email attachment creation
  crit: component
  conf: 0.95
  if:
    type: text
    exact: "Creating PDF attachment"

composite_rules:
- id: extended-mapi-session
  desc: Extended MAPI session initialization
  crit: notable
  conf: 0.95
  all:
  - id: mapi32-dll-ref
  - id: mapi-logon-ex
  - id: mapi-initialize

- id: mapi-email-send-capability
  desc: Extended MAPI email send with addressing
  crit: suspicious
  conf: 0.95
  all:
  - id: extended-mapi-session
  any:
  - id: ipm-note-class
  - id: outlook-get-addrs
  - id: mapi-address-book
- id: mapi-send-with-artifacts
  desc: MAPI email send artifacts
  crit: suspicious
  conf: 0.95
  all:
  - id: mapi-email-send-capability
  any:
  - id: sendmail-routine
  - id: autocomplete-filename
  - id: pdf-attachment-string
  needs: 2
