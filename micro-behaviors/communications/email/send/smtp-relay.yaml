# SMTP relay server components for mass-mailing
# Delphi TSmtpRelayServer and similar relay components
defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp, csharp]
traits:
  - id: smtp-relay-server-component
    desc: Delphi SMTP relay server component
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: SmtpRelayServer
  - id: smtp-relay-dns-assign
    desc: SMTP relay DNS server assignment
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: '(?i)SmtpRelayServer\d*\.Dns'
