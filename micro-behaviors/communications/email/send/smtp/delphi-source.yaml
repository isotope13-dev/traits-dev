defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: tnmsmtp-component
    desc: Delphi TNMSMTP mail component
    crit: notable
    conf: 0.96
    for: [c]
    if:
      type: text
      regex: '(?i)\bTNMSMTP\b'
  - id: smtp-host-assign
    desc: SMTP host property assignment
    crit: notable
    conf: 0.92
    for: [c]
    if:
      type: text
      regex: '(?i)\.\s*Host\s*:=\s*[A-Za-z0-9_]+'
  - id: smtp-connect-call
    desc: SMTP connect method call
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: text
      regex: '(?i)\.\s*connect\s*;'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: smtp-bcc-addstrings
    desc: SMTP blind copy recipient add
    crit: suspicious
    conf: 0.96
    for: [c]
    if:
      type: text
      regex: '(?i)ToBlindCarbonCopy\s*\.\s*AddStrings'
  - id: smtp-attachment-add
    desc: SMTP attachment staging add
    crit: suspicious
    conf: 0.96
    for: [c]
    if:
      type: text
      regex: '(?i)PostMessage\s*\.\s*Attachments\s*\.\s*Add'
  - id: smtp-sendmail-call
    desc: SMTP sendmail method call
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: text
      regex: '(?i)\.\s*SendMail\s*(\([^;\r\n]{0,160}\)|;)'
  - id: hotmail-mx-host
    desc: Hardcoded Hotmail MX host
    crit: suspicious
    conf: 0.98
    for: [c]
    if:
      type: text
      word: "mx2.hotmail.com"
composite_rules:
  - id: tnmsmtp-mailer
    desc: Delphi SMTP mailer workflow
    crit: suspicious
    conf: 0.95
    for: [c]
    all:
      - id: tnmsmtp-component
      - id: smtp-host-assign
      - id: smtp-connect-call
      - id: smtp-sendmail-call
  - id: tnmsmtp-mass-mailer
    desc: Blind-copy SMTP mass mailer
    crit: suspicious
    conf: 0.98
    for: [c]
    all:
      - id: tnmsmtp-mailer
      - id: smtp-bcc-addstrings
      - id: smtp-attachment-add
