defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json]

traits:
  - id: smtp-connection-input-field
    desc: SMTP server or credential input field
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(smtp[-_]server|smtp[-_]username|smtp[-_]password|INPUT_SMTP)\b'
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference

  - id: smtp-client-construction
    desc: Constructs a direct SMTP client
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\bnew\s+SmtpClient\s*\('

  - id: smtp-mail-send
    desc: Sends a message through an SMTP client
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\bsmtp\.sendMail\s*\('

  - id: smtp-xoauth2-authentication
    desc: Configures SMTP XOAUTH2 with a token
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?is)\bmethod\s*:\s*["'']XOAUTH2["''][\s\S]{0,120}\btoken\b'
