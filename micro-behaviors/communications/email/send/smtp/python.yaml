defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: python-smtplib-import
    desc: Imports Python SMTP client library
    if:
      type: symbol
      kind: import
      exact: smtplib

  - id: python-smtp-ssl-client
    desc: Creates Python SMTP TLS client
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: smtplib.SMTP_SSL

  - id: python-smtp-send-message
    desc: Sends email through Python SMTP
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)send_message$'
