defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: python-smtplib-import
    desc: Imports Python SMTP client library
    if:
      type: symbol
      kind: import
      exact: smtplib

  - id: python-smtp-imported-client
    desc: Imports SMTP client from smtplib
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*from\s+smtplib\s+import\s+SMTP\b'

  - id: python-smtp-client-construction
    desc: Constructs a Python SMTP client
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: SMTP

  - id: python-smtp-ssl-client
    desc: Creates Python SMTP TLS client
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: smtplib.SMTP_SSL

  - id: python-smtp-sendmail-call
    desc: Sends email through Python SMTP sendmail
    conf: 0.98
    if:
      type: symbol
      kind: call
      regex: '(^|\.)sendmail$'
