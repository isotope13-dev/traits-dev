# .NET SMTP email delivery from source code
defaults:
  for: [csharp]
  platforms: [windows]
traits:
- id: smtp-client
  desc: .NET SmtpClient construction
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(?i)\bnew\s+SmtpClient\s*\('
- id: smtp-network-credential
  desc: SMTP network credentials
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bnew\s+NetworkCredential\s*\('
- id: smtp-enable-ssl
  desc: SMTP SSL enabled
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(?i)\bEnableSsl\s*=\s*true\b'
- id: smtp-mailmessage-send
  desc: SMTP MailMessage send
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: '(?s)\.Send\s*\(\s*new\s+MailMessage\s*\('
- id: email-harvest-regex--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: string_literal
    regex: '(?i)(\\w|\\S).{0,80}@.{0,80}(\\\.|\[.\])'
  count_max: 1012883
- id: email-harvest-regex--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: string_literal
    regex: '(?i)(\[A-Za-z|\[a-z).{0,80}@.{0,80}(\\\.|\[.\])'
  count_max: 1012884
- id: email-harvest-regex--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: string_literal
    regex: '(?i)(\[0-9).{0,80}@.{0,80}(\\\.|\[.\])'
  count_max: 1012885
- id: legacy-smtp-mass-mailer
  desc: Legacy SMTP mass mail sending loop
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '(?i)(foreach|for)\s*\(.{0,80}\b(Send|SmtpClient)\b'
composite_rules:
- id: smtp-ssl-mail-exfil
  desc: SMTP mail exfiltration over SSL
  crit: suspicious
  conf: 0.96
  all:
  - id: smtp-client
  - id: smtp-network-credential
  - id: smtp-enable-ssl
  - id: smtp-mailmessage-send
- id: email-harvest-regex
  desc: Email address harvesting via regex
  crit: suspicious
  conf: 0.93
  any:
  - id: email-harvest-regex--rx-1
  - id: email-harvest-regex--rx-2
  - id: email-harvest-regex--rx-3
