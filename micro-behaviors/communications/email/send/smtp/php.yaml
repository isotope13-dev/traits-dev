defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.86

traits:
  - id: symfony-mailer-send
    desc: Symfony Mailer send call
    conf: 0.9
    if:
      type: text
      regex: '->send(Plain)?\s*\(\s*\)'

  - id: smtp-transport-exception-handling
    desc: SMTP transport exception handling
    conf: 0.86
    if:
      type: text
      substr: TransportExceptionInterface

composite_rules:
  - id: php-smtp-send-retry-helper
    desc: PHP SMTP send retry helper
    crit: notable
    conf: 0.92
    all:
      - id: symfony-mailer-send
      - id: smtp-transport-exception-handling

