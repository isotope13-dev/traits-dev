# Go SMTP client operations.
#
# These are neutral communication capabilities. They are useful in triage and
# supply-chain diffs, but SMTP is also a normal application feature and does
# not imply exfiltration or abuse by itself.
defaults:
  platforms: [windows, linux, macos]
  for: [go]
  mbc: C0012

traits:
  - id: go-smtp-import
    desc: Imports Go SMTP client package
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: import
      exact: net/smtp

  - id: go-smtp-dial
    desc: Opens Go SMTP connection
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: smtp.Dial

  - id: go-smtp-client
    desc: Creates Go SMTP client
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: smtp.NewClient

  - id: go-smtp-plain-auth
    desc: Configures Go SMTP authentication
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: smtp.PlainAuth
