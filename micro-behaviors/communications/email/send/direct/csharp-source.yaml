# C# raw SMTP protocol implementation (not using SmtpClient)
defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: smtp-mail-from-raw
    desc: Raw SMTP MAIL FROM command
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "MAIL FROM: "
  - id: smtp-rcpt-to-raw
    desc: Raw SMTP RCPT TO command
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "RCPT TO: "
  - id: smtp-helo-raw
    desc: Raw SMTP HELO command
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'HELO\s+(localhost|%s|\{0\})'
  - id: smtp-data-raw
    desc: Raw SMTP DATA command string
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'WriteLine\s*\(\s*"DATA"'
composite_rules:
  - id: raw-smtp-protocol
    desc: Raw SMTP protocol implementation
    crit: suspicious
    conf: 0.95
    all:
      - id: smtp-mail-from-raw
      - id: smtp-rcpt-to-raw
    any:
      - id: smtp-data-raw
