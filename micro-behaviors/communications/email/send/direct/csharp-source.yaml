# C# raw SMTP protocol implementation (not using SmtpClient)
defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: smtp-mail-from-raw
    desc: Raw SMTP MAIL FROM command
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "MAIL FROM: "
  - id: smtp-rcpt-to-raw
    desc: Raw SMTP RCPT TO command
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "RCPT TO: "
  - id: smtp-helo-raw
    desc: Raw SMTP HELO command
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'HELO\s+(localhost|%s|\{0\})'
  - id: smtp-data-raw
    desc: Raw SMTP DATA command string
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'WriteLine\s*\(\s*"DATA"'
  - id: smtp-port-25-tcpclient
    desc: TcpClient SMTP on port 25
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'new\s+TcpClient\s*\(\s*\w+\s*,\s*25\s*\)'
  - id: smtp-ascii-command-burst
    desc: ASCII SMTP command encoding burst
    crit: notable
    conf: 0.94
    count_min: 5
    if:
      type: text
      regex: 'Encoding\.ASCII\.GetBytes\s*\('
  - id: smtp-stream-write-burst
    desc: Repeated SMTP stream writes
    crit: suspicious
    conf: 0.94
    count_min: 5
    if:
      type: text
      regex: 'stream\.Write\s*\(\s*bytes\d'
  - id: smtp-dialog-readline-burst
    desc: SMTP dialog response reads
    crit: component
    conf: 0.88
    count_min: 5
    if:
      type: text
      regex: 'streamReader\.ReadLine\s*\(\)'
  - id: base64-self-attachment
    desc: Base64 self mail attachment
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'Convert\.ToBase64String\s*\(\s*numArray\s*\)'
  - id: rfc2045-wrap-76
    desc: RFC mail Base64 line wrapping
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'index2\s*%\s*76\s*==\s*0'
composite_rules:
  - id: literal-smtp-protocol
    desc: Literal raw SMTP protocol
    crit: suspicious
    conf: 0.95
    all:
      - id: smtp-mail-from-raw
      - id: smtp-rcpt-to-raw
    any:
      - id: smtp-data-raw
  - id: obfuscated-smtp-protocol
    desc: Streamed SMTP protocol implementation
    crit: suspicious
    conf: 0.95
    all:
      - id: smtp-port-25-tcpclient
      - id: smtp-ascii-command-burst
      - id: smtp-stream-write-burst
    any:
      - id: smtp-dialog-readline-burst
  - id: raw-smtp-protocol
    desc: Raw SMTP protocol implementation
    crit: suspicious
    conf: 0.97
    any:
      - id: literal-smtp-protocol
      - id: obfuscated-smtp-protocol
  - id: mime-base64-self-attachment
    desc: MIME-ready Base64 self attachment
    crit: suspicious
    conf: 0.96
    all:
      - id: base64-self-attachment
      - id: rfc2045-wrap-76
