# Direct SMTP protocol strings in a compiled Windows executable.
# This is separate from the source-code rules because cleave exposes PE
# imports and string literals, not the source assembly syntax used there.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.94

traits:
  - id: pe-smtp-esmtp-banner
    desc: PE SMTP ESMTP banner handling
    if:
      type: text
      exact: ESMTP
  - id: pe-smtp-ehlo-format
    desc: PE SMTP EHLO command format
    if:
      type: text
      exact: 'EHLO %s'
  - id: pe-smtp-mail-from-format
    desc: PE SMTP MAIL FROM format
    if:
      type: text
      exact: 'MAIL FROM: %s'
  - id: pe-smtp-rcpt-to-format
    desc: PE SMTP RCPT TO format
    if:
      type: text
      exact: 'RCPT TO: <%s>'
composite_rules:
  - id: pe-direct-smtp-client
    desc: Compiled PE implements the direct SMTP client protocol
    crit: notable
    conf: 0.98
    all:
      - id: pe-smtp-esmtp-banner
      - id: pe-smtp-ehlo-format
      - id: pe-smtp-mail-from-format
      - id: pe-smtp-rcpt-to-format
