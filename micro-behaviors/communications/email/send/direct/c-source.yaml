# Direct SMTP implementation in C source code
# Detects raw SMTP protocol implementation (including ROT13-obfuscated commands)
defaults:
  for: [c, cpp]
  platforms: [windows, linux, macos, unix]
traits:
  - id: smtp-mail-from-c
    desc: SMTP MAIL FROM in C source
    crit: notable
    conf: 0.94
    if:
      type: raw
      substr: "MAIL FROM:<"
  - id: smtp-rcpt-to-c
    desc: SMTP RCPT TO in C source
    crit: notable
    conf: 0.94
    if:
      type: raw
      substr: "RCPT TO:<"
  - id: rot13-smtp-mail-from
    desc: ROT13-encoded SMTP MAIL FROM
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      substr: "ZNVY SEBZ:"
  - id: rot13-smtp-rcpt-to
    desc: ROT13-encoded SMTP RCPT TO
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      substr: "EPCG GB:"
  - id: rot13-smtp-helo
    desc: ROT13-encoded SMTP HELO/EHLO
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: "URYB %"
  - id: smtp-port-25
    desc: SMTP port 25 usage in C source
    crit: component
    conf: 0.8
    if:
      type: raw
      substr: "htons(25)"
composite_rules:
  - id: direct-smtp-c-source
    desc: Direct SMTP mail sending in C
    crit: suspicious
    conf: 0.96
    any:
      - id: smtp-mail-from-c
      - id: rot13-smtp-mail-from
    needs: 1
    all:
      - id: smtp-port-25
