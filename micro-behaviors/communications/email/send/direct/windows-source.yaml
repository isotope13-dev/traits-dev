defaults:
  platforms: [windows]
  for: [c]
traits:
  - id: smtp-mail-from
    desc: SMTP MAIL FROM command
    crit: notable
    conf: 0.94
    if:
      type: raw
      exact: 'szMAILFROM      db      "MAIL FROM:<%s>",13,10,0'
  - id: smtp-rcpt-to
    desc: SMTP RCPT TO command
    crit: notable
    conf: 0.94
    if:
      type: raw
      exact: 'szMAILTO        db      "RCPT TO:<%s>",13,10,0'
  - id: smtp-data-command
    desc: SMTP DATA command
    crit: notable
    conf: 0.9
    if:
      type: raw
      exact: 'szDATA          db      "DATA",13,10,0'
  - id: smtp-helo-format
    desc: SMTP HELO format strings
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: 'HELO %s\.(net|com|org)'
  - id: smtp-queue-threading
    desc: SMTP queue worker threads
    crit: notable
    conf: 0.87
    if:
      type: raw
      word: "SMTPQueueWorkingThread"
composite_rules:
  - id: direct-smtp-mail-engine
    desc: Direct SMTP mail engine
    crit: suspicious
    conf: 0.96
    all:
      - id: smtp-mail-from
      - id: smtp-rcpt-to
      - id: smtp-data-command
    any:
      - id: smtp-helo-format
      - id: smtp-queue-threading
      - id: micro-behaviors/communications/dns/lookup/mx::mx-mail-exchange-lookup
