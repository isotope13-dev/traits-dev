defaults:
  platforms: [windows, unix]
  for:
    - php
traits:
  - id: mail-call
    desc: Sends email via mail()
    crit: notable
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: mail
  - id: wordpress-mail-call
    desc: Sends email via wp_mail()
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: wp_mail
  - id: wordpress-mail-attachments-param
    desc: WordPress mail attachments parameter
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'wp_mail\s*\([\s\S]{0,500}\$attachments'
  - id: mail-suppressed
    desc: Sends email with error suppression (@mail)
    crit: notable
    conf: 0.8
    mbc: B0032
    # PHP error-suppressed call `@mail(` — the `@` operator immediately before
    # the call. Specific enough as source text (the `(` requires a call form).
    if:
      type: text
      regex: '@\s*mail\s*\('
  - id: hardcoded-gmail
    desc: Hardcoded Gmail address
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: '[a-zA-Z0-9._%+-]+@gmail\.com'
  - id: hardcoded-protonmail
    desc: Hardcoded ProtonMail address
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: '[a-zA-Z0-9._%+-]+@protonmail\.(com|ch)'
  - id: hardcoded-tutanota
    desc: Hardcoded Tutanota address
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: '[a-zA-Z0-9._%+-]+@tutanota\.(com|de)'
  - id: hardcoded-yandex
    desc: Hardcoded Yandex address
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: '[a-zA-Z0-9._%+-]+@yandex\.(com|ru)'
  - id: mail-with-remote-addr
    desc: Mail call includes REMOTE_ADDR
    crit: suspicious
    conf: 0.85
    attack: T1048
    # `mail(... REMOTE_ADDR ...)` — require a real mail() call boundary so
    # helpers such as is_email() cannot satisfy the prefix.
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])mail\s*\([\s\S]{0,500}REMOTE_ADDR'
  - id: mail-with-request-uri
    desc: Mail call includes REQUEST_URI
    crit: suspicious
    conf: 0.85
    attack: T1048
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])mail\s*\([\s\S]{0,500}REQUEST_URI'
  - id: mail-with-http-host
    desc: Mail call includes HTTP_HOST
    crit: suspicious
    conf: 0.85
    attack: T1048
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])mail\s*\([\s\S]{0,500}HTTP_HOST'
  - id: access-notification-string
    desc: Access notification message pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      substr: Access Notification
  - id: login-notification-string
    desc: Login notification message pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      substr: Login Notification
  - id: visitor-alert-string
    desc: Visitor alert/notification phrase
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)visitor alert
  - id: shell-access-string
    desc: Shell access notification pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: shell access
  - id: phone-home-http-referer
    desc: Mail captures HTTP referer
    crit: suspicious
    conf: 0.9
    attack: T1048
    if:
      type: text
      exact: $a5 = $_SERVER['HTTP_REFERER'];
  - id: phone-home-document-root
    desc: Mail captures document root
    crit: suspicious
    conf: 0.9
    attack: T1048
    if:
      type: text
      exact: $b33 = $_SERVER['DOCUMENT_ROOT'];
  - id: phone-home-path-translated
    desc: Mail captures translated path
    crit: suspicious
    conf: 0.9
    attack: T1048
    if:
      type: text
      exact: $g32 = $_SERVER['PATH_TRANSLATED'];
  - id: attachment-base64
    desc: Base64 attachment body
    crit: suspicious
    conf: 0.95
    attack: T1048
    if:
      type: text
      exact: 'Content-transfer-encoding: base64'
  - id: attachment-mail-call
    desc: Attachment mail send
    crit: suspicious
    conf: 0.95
    attack: T1048
    if:
      type: text
      exact: $send = mail($to, $subject, $info, $headers);
  - id: gmail-phone-home-subject
    desc: Gmail phone-home subject pattern
    crit: suspicious
    conf: 0.96
    attack: T1048
    if:
      type: text
      exact: $sj98 = "sh-$ra44";
composite_rules:
  - id: mail-exfiltration
    desc: Email exfiltration of server/visitor info
    crit: suspicious
    conf: 0.9
    attack: T1048
    all:
      - id: mail-call
    any:
      - id: mail-with-remote-addr
      - id: mail-with-request-uri
    unless:
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: wordpress-mail-with-attachments
    desc: WordPress mail sends attachments
    crit: notable
    conf: 0.88
    all:
      - id: wordpress-mail-call
      - id: wordpress-mail-attachments-param
  - id: mail-suppressed-notification
    desc: Suppressed email notification (stealth)
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1048
    all:
      - id: mail-suppressed
    any:
      - id: access-notification-string
      - id: mail-with-remote-addr
      - id: mail-with-request-uri
  - id: attacker-email-contact
    desc: Hardcoded email in suspicious context
    crit: suspicious
    conf: 0.85
    all:
      - id: mail-call
    any:
      - id: hardcoded-gmail
      - id: hardcoded-protonmail
      - id: hardcoded-tutanota
      - id: hardcoded-yandex
  - id: php-phone-home-mail
    desc: Hidden mail-based server fingerprint exfiltration
    crit: suspicious
    conf: 0.97
    attack: T1048
    all:
      - id: gmail-phone-home-subject
    any:
      - id: phone-home-http-referer
      - id: phone-home-document-root
      - id: phone-home-path-translated
  - id: php-mail-attachment-exfil
    desc: Mail-based file attachment exfiltration
    crit: suspicious
    conf: 0.96
    attack: T1048
    all:
      - id: attachment-base64
      - id: attachment-mail-call
  - id: phone-home-server-fingerprint
    desc: Mail bundles server fingerprint fields
    crit: suspicious
    conf: 0.95
    attack: T1048
    all:
      - id: phone-home-http-referer
      - id: phone-home-document-root
      - id: phone-home-path-translated
