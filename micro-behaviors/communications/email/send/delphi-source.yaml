defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: tnmsmtp-component
    desc: Delphi TNMSMTP mail component
    crit: notable
    conf: 0.96
    for: [text]
    if:
      type: raw
      regex: '(?i)\bTNMSMTP\b'
  - id: smtp-host-assign
    desc: SMTP host property assignment
    crit: notable
    conf: 0.92
    for: [text]
    if:
      type: raw
      regex: '(?i)\.\s*Host\s*:=\s*[A-Za-z0-9_]+'
  - id: smtp-connect-call
    desc: SMTP connect method call
    crit: notable
    conf: 0.9
    for: [text]
    if:
      type: raw
      regex: '(?i)\.\s*connect\s*;'
  - id: smtp-bcc-addstrings
    desc: SMTP blind copy recipient add
    crit: suspicious
    conf: 0.96
    for: [text]
    if:
      type: raw
      regex: '(?i)ToBlindCarbonCopy\s*\.\s*AddStrings'
  - id: smtp-attachment-add
    desc: SMTP attachment staging add
    crit: suspicious
    conf: 0.96
    for: [text]
    if:
      type: raw
      regex: '(?i)PostMessage\s*\.\s*Attachments\s*\.\s*Add'
  - id: smtp-sendmail-call
    desc: SMTP sendmail method call
    crit: suspicious
    conf: 0.95
    for: [text]
    if:
      type: raw
      regex: '(?i)\.\s*SendMail\b'
  - id: hotmail-mx-host
    desc: Hardcoded Hotmail MX host
    crit: suspicious
    conf: 0.98
    for: [text]
    if:
      type: raw
      exact: "mx2.hotmail.com"
composite_rules:
  - id: tnmsmtp-mailer
    desc: Delphi SMTP mailer workflow
    crit: suspicious
    conf: 0.95
    for: [text]
    all:
      - id: tnmsmtp-component
      - id: smtp-host-assign
      - id: smtp-connect-call
      - id: smtp-sendmail-call
  - id: tnmsmtp-mass-mailer
    desc: Blind-copy SMTP mass mailer
    crit: suspicious
    conf: 0.98
    for: [text]
    all:
      - id: tnmsmtp-mailer
      - id: smtp-bcc-addstrings
      - id: smtp-attachment-add
