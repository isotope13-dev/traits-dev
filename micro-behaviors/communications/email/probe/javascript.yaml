defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1046
  mbc: E1046

traits:
  - id: smtp-probe-routine
    desc: Implements an SMTP service probe routine
    crit: notable
    conf: 0.96
    if:
      type: function
      regex: '(?i)^(probe|scan|check)[A-Za-z0-9_]*smtp'

  - id: smtp-proxy-probe-routine
    desc: Probes an SMTP service through a proxy
    crit: notable
    conf: 0.97
    if:
      type: function
      regex: '(?i)^(probe|scan|check)[A-Za-z0-9_]*smtp[A-Za-z0-9_]*proxy'

  - id: smtp-destination-probe-routine
    desc: Probes SMTP across destinations
    crit: notable
    conf: 0.96
    if:
      type: function
      regex: '(?i)^probeSmtp(Multi|Across)'

  - id: smtp-send-capability-result
    desc: Records SMTP send capability
    crit: notable
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: '(?i)(sendCapable|\\x73\\x65\\x6e\\x64\\x43\\x61\\x70\\x61\\x62\\x6c\\x65)'

  - id: smtp-injection-check-routine
    desc: Checks SMTP responses for injection markers
    crit: notable
    conf: 0.96
    if:
      type: function
      regex: '(?i).*smtp.*injection.*'
