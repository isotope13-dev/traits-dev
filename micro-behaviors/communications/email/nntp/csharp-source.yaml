# NNTP (Usenet) protocol client patterns
defaults:
  platforms: [unix, windows, macos]
  for: [csharp]
traits:
  - id: nntp-group-command
    desc: NNTP GROUP command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"GROUP\s'
  - id: nntp-post-command
    desc: NNTP POST command
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '"POST"'
  - id: nntp-list-command
    desc: NNTP LIST command
    crit: component
    conf: 0.85
    if:
      type: text
      substr: '"LIST"'
  - id: nntp-newsgroups-header
    desc: NNTP NEWSGROUPS header field
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "NEWSGROUPS: "
  - id: nntp-server-registry
    desc: NNTP server from registry
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "NNTP Server"
composite_rules:
  - id: nntp-posting-client
    desc: NNTP newsgroup posting client
    crit: suspicious
    conf: 0.95
    any:
      - id: nntp-group-command
      - id: nntp-post-command
      - id: nntp-newsgroups-header
      - id: nntp-list-command
    needs: 2
