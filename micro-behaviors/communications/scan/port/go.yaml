# Go Port Scanning Capabilities
# Detects network reconnaissance and port scanning
# MBC: E1046 (Network Scanning)
# ATT&CK: T1046 (Network Service Discovery)

defaults:
  mbc: "E1046"
  attack: "T1046"

traits:
  # gomap library
  - id: gomap-import
    desc: gomap port scanning library
    crit: suspicious
    conf: 0.95
    for: [go]
    if:
      type: ast
      kind: import
      regex: "gomap|JustinTimperio/gomap"

  - id: gomap-string
    desc: gomap library in binary
    crit: suspicious
    conf: 0.9
    for: [elf, macho, pe]
    if:
      type: string
      regex: "JustinTimperio/gomap|gomap\\.Scan"

  # nmap wrapper
  - id: go-nmap-import
    desc: go-nmap library import
    crit: suspicious
    conf: 0.9
    for: [go]
    if:
      type: ast
      kind: import
      regex: "go-nmap|nmap"

  # Port scanning patterns
  - id: port-scan-loop
    desc: Sequential port scanning pattern
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: string
      regex: "port.{0,20}scan|scan.{0,20}port|PortScan"

  - id: tcp-connect-scan
    desc: TCP connect scanning
    crit: notable
    conf: 0.75
    for: [go]
    if:
      type: ast
      kind: call
      regex: "net\\.DialTimeout.{0,20}tcp"

  # Network range scanning
  - id: cidr-parse
    desc: CIDR network range parsing
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: ast
      kind: call
      exact: "net.ParseCIDR"

  # Common port lists
  - id: common-ports-array
    desc: Common port array for scanning
    crit: notable
    conf: 0.8
    for: [go, elf, macho, pe]
    if:
      type: string
      word: "commonPorts"

composite_rules:
  # Helper: Scanner library
  - id: scanner-library
    desc: Port scanning library
    crit: suspicious
    conf: 0.9
    any:
      - id: gomap-import
      - id: gomap-string
      - id: go-nmap-import

  # Helper: Scan operations
  - id: scan-operations
    desc: Port scanning operations
    crit: notable
    conf: 0.8
    any:
      - id: port-scan-loop
      - id: tcp-connect-scan
      - id: common-ports-array

  - id: network-scanner
    desc: Network port scanner
    crit: suspicious
    conf: 0.9
    all:
      - id: scanner-library
      - id: scan-operations

  - id: local-network-recon
    desc: Local network reconnaissance
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/socket/recon::net-interfaces
      - id: cidr-parse
      - id: scan-operations
