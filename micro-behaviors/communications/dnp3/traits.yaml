# DNP3 SCADA/Utility Protocol (TCP port 20000)
# Neutral protocol references — intent inferred at objectives tier.
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: notable
  conf: 0.85

traits:
  - id: keyword
    desc: DNP3 protocol keyword reference
    if:
      type: text
      word: DNP3
    not:
      - substr: node_modules/

  - id: library
    desc: DNP3 library or module reference
    conf: 0.88
    if:
      type: text
      regex: (?i)(opendnp3|pydnp3|dnp3[-_]?master)

  - id: port-20000
    desc: DNP3 TCP port 20000 context
    crit: component
    conf: 0.7
    if:
      type: text
      # Generic `connect.c:20000` strings are not a DNP3 port reference.
      regex: (?i)(dnp3?|port)[^0-9]{0,30}20000\b

  - id: sync-header
    desc: DNP3 link-layer sync header bytes
    crit: component
    conf: 0.92
    for: [pe]
    if:
      type: hex
      pattern: "05 64 ?? 0? ?? ??"
      section: .rdata
    count_min: 8
    unless:
      - id: metadata/lang/compiler/systems::go-buildinfo

composite_rules:
  - id: protocol-usage
    desc: DNP3 protocol usage indicators
    crit: notable
    conf: 0.88
    # Keyword/library are precise; sync-header is too loose to prove usage alone.
    any:
      - id: keyword
      - id: library
  - id: protocol-usage-with-frame
    desc: DNP3 keyword/library plus wire-frame evidence
    crit: suspicious
    conf: 0.95
    all:
      - id: protocol-usage
      - id: sync-header

    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/ffmpeg/
