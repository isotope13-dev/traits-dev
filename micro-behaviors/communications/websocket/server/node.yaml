# Node.js WebSocket Server-Side Patterns
# Detects faye-websocket and other server-side WebSocket libraries
# MBC: C0002 (Communication)
# ATT&CK: T1071.001 (Web Protocols)
defaults:
  platforms: [windows, unix]
  for: [javascript]
  mbc: C0002
  attack: T1071.001

traits:
  - id: faye-websocket-require
    desc: faye-websocket module import
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: require\(\s*['"]faye-websocket['"]\s*\)

  - id: websocket-is-websocket
    desc: WebSocket.isWebSocket() check
    crit: component
    conf: 0.85
    if:
      type: text
      substr: isWebSocket

  - id: upgrade-handler
    desc: HTTP upgrade event handler
    crit: component
    conf: 0.7
    if:
      type: text
      regex: \.on\(\s*['"]upgrade['"]

  - id: new-websocket-server
    desc: WebSocket server instance creation
    crit: component
    conf: 0.8
    if:
      type: text
      regex: new\s+WebSocket\s*\(request

  - id: websocket-message-handler
    desc: WebSocket message event handler
    crit: component
    conf: 0.7
    if:
      type: text
      regex: \.on\(\s*['"]message['"]

  - id: websocket-send
    desc: WebSocket send method
    crit: component
    conf: 0.6
    if:
      type: text
      regex: \.send\s*\(

composite_rules:
  - id: node-websocket-server
    desc: Node.js WebSocket server implementation
    crit: notable
    conf: 0.9
    all:
      - id: faye-websocket-require
      - id: websocket-is-websocket
    any:
      - id: upgrade-handler
      - id: new-websocket-server
      - id: websocket-message-handler
      - id: websocket-send
