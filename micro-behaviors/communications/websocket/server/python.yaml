defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1071.001
  mbc: C0002

traits:
  - id: websockets-asyncio-serve-call
    desc: Python starts WebSocket server
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: websockets.asyncio.server.serve

  - id: fastapi-websocket-route
    desc: FastAPI WebSocket route decorator
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?m)^\s*@\s*[A-Za-z_][\w.]*\.websocket\s*\(\s*["''].{1,80}["'']\s*\)'

  - id: fastapi-websocket-receive-text
    desc: WebSocket server receives text messages
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: websocket.receive_text
