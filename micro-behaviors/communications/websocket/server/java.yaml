# Java/JSP WebSocket Server-Side Endpoint Patterns
# Detects javax.websocket server-side constructs used by memory webshells
# JSP files are detected as Python by cleave, so for: includes python
# MBC: C0002 (Communication)
# ATT&CK: T1071.001 (Web Protocols)
defaults:
  platforms: [windows, unix]
  for: [python, java, class]
  mbc: C0002
  attack: T1071.001

traits:
  # --- Endpoint class definition ---
  - id: extends-endpoint
    desc: Java WebSocket Endpoint extension
    crit: component
    conf: 0.85
    if:
      type: text
      substr: extends Endpoint

  - id: message-handler-whole-string
    desc: WebSocket MessageHandler.Whole<String>
    crit: component
    conf: 0.9
    if:
      type: text
      substr: MessageHandler.Whole<String>

  - id: onmessage-websocket
    desc: WebSocket onMessage handler method
    crit: component
    conf: 0.7
    if:
      type: text
      regex: \bonMessage\s*\(String\b

  - id: onopen-websocket
    desc: WebSocket onOpen handler method
    crit: component
    conf: 0.7
    if:
      type: text
      regex: \bonOpen\s*\(.{0,80}Session\b

  # --- Server endpoint config ---
  - id: server-endpoint-config
    desc: javax.websocket ServerEndpointConfig
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ServerEndpointConfig

  - id: server-container
    desc: javax.websocket ServerContainer reference
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ServerContainer

  - id: add-endpoint-call
    desc: WebSocket endpoint registration call
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: addEndpoint(

  - id: register-endpoint-call
    desc: WebSocket endpoint registration via register()
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: .register(config

  # --- WebSocket session I/O ---
  - id: session-send-text
    desc: WebSocket session text send
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: getBasicRemote().sendText

  - id: session-send-binary
    desc: WebSocket session binary send
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: getBasicRemote().sendBinary

  - id: session-send-object
    desc: WebSocket session object send
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: getBasicRemote().sendObject

  - id: add-message-handler
    desc: WebSocket message handler registration
    crit: component
    conf: 0.8
    if:
      type: text
      substr: addMessageHandler

  # --- Container implementations ---
  - id: tyrus-server-container
    desc: Tyrus WebSocket server container (WebLogic)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: TyrusServerContainer

  - id: ws-server-container
    desc: Tomcat WsServerContainer reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: WsServerContainer

  # --- Dynamic endpoint path ---
  - id: request-parameter-path
    desc: Dynamic endpoint path from request parameter
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: request.getParameter("path")

composite_rules:
  - id: java-websocket-server-endpoint
    desc: Java WebSocket server endpoint definition
    crit: notable
    conf: 0.9
    all:
      - id: extends-endpoint
      - id: message-handler-whole-string
    any:
      - id: onmessage-websocket
      - id: onopen-websocket

  - id: java-websocket-endpoint-registration
    desc: Java WebSocket endpoint registration (memory shell)
    crit: suspicious
    conf: 0.92
    all:
      - id: server-endpoint-config
      - id: server-container
    any:
      - id: add-endpoint-call
      - id: register-endpoint-call

  - id: java-websocket-c2-endpoint
    desc: Java WebSocket C2 endpoint (server + I/O)
    crit: suspicious
    conf: 0.92
    all:
      - id: java-websocket-server-endpoint
      - id: java-websocket-endpoint-registration
    any:
      - id: session-send-text
      - id: session-send-binary
      - id: session-send-object
      - id: add-message-handler
