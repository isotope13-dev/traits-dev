defaults:
  platforms: [windows, unix]
  for: [class]
  mbc: C0002
  attack: T1071.001
traits:
  - id: tyrus-client-manager
    desc: Java Tyrus WebSocket client
    crit: notable
    conf: 0.86
    if:
      type: raw
      substr: org/glassfish/tyrus/client/ClientManager
  - id: javax-websocket-client-endpoint
    desc: Java WebSocket client endpoint
    crit: component
    conf: 0.8
    if:
      type: raw
      substr: Ljavax/websocket/ClientEndpoint;
  - id: javax-websocket-send-binary
    desc: Java WebSocket binary send
    crit: component
    conf: 0.82
    if:
      type: raw
      substr: sendBinary
composite_rules:
  - id: java-websocket-client
    desc: Java WebSocket client implementation
    crit: notable
    conf: 0.9
    all:
      - id: tyrus-client-manager
    any:
      - id: javax-websocket-client-endpoint
      - id: javax-websocket-send-binary
