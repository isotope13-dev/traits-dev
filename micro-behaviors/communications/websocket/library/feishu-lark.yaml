defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1071.001
  mbc: C0002
  crit: notable
  conf: 0.9

traits:
  - id: feishu-message-event
    desc: Feishu message event subscription
    if:
      type: text
      substr: im.message.receive_v1

  - id: feishu-card-action-event
    desc: Feishu card action subscription
    if:
      type: text
      substr: card.action.trigger

  - id: lark-wsclient-class
    desc: Lark websocket client class
    crit: component
    conf: 0.86
    if:
      type: text
      substr: WSClient

  - id: lark-event-dispatcher-class
    desc: Lark event dispatcher class
    crit: component
    conf: 0.84
    if:
      type: text
      substr: EventDispatcher

composite_rules:
  - id: feishu-lark-event-websocket-client
    desc: Feishu event websocket client
    crit: notable
    conf: 0.93
    all:
      - id: feishu-message-event
    any:
      - id: lark-wsclient-class
      - id: lark-event-dispatcher-class
