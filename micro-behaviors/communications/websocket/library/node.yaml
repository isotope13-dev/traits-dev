defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: ws
    desc: NodeJS binary using 'ws' (WebSockets)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: node_modules/.{0,30}/ws/index\.js
  - id: socketio-reconnect-attempts
    desc: Socket.IO reconnection attempts config
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: reconnectionAttempts
  - id: socketio-reconnect-delay
    desc: Socket.IO reconnection delay config
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: reconnectionDelay
