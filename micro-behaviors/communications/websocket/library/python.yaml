defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: C0002
  attack: T1071.001
traits:
  - id: websocket-rfc6455-client-context
    desc: Python RFC6455 WebSocket client implementation
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Zero-dependency WebSocket client (RFC 6455)
  - id: websocket-rfc6455-masking-context
    desc: RFC6455 WebSocket payload masking context
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Apply XOR masking to payload data
