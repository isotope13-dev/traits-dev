defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: C0002
  attack: T1071.001
traits:
  - id: websockets-client-import
    desc: Python websockets client import
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'from\s+websockets(\.sync)?\.client\s+import\s+connect|import\s+websockets\b'
  - id: websockets-connect-call
    desc: Python websockets connect call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      regex: '(^|\.)websockets(\.sync)?(\.client)?\.connect$'
  - id: websockets-compat-connect-alias-call
    desc: Python WebSocket compatibility connect alias
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: connect
  - id: websocket-rfc6455-client-context
    desc: Python RFC6455 WebSocket client implementation
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Zero-dependency WebSocket client (RFC 6455)
  - id: websocket-rfc6455-masking-context
    desc: RFC6455 WebSocket payload masking context
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Apply XOR masking to payload data

composite_rules:
  - id: python-websockets-client
    desc: Python websockets client usage
    crit: notable
    conf: 0.9
    all:
      - id: websockets-client-import
      - id: websockets-connect-call
  - id: python-websockets-compat-client
    desc: Python websockets compatibility client usage
    crit: notable
    conf: 0.9
    all:
      - id: websockets-client-import
      - id: websockets-compat-connect-alias-call
