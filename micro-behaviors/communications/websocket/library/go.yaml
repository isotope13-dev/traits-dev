defaults:
  platforms:
    - windows
    - unix
  for:
    - binaries
    - go
    - go.mod
  attack: T1071.001
  mbc: C0002
traits:
  - id: gorilla-websocket
    desc: Imports the Gorilla WebSocket library in Go
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: github\.com/gorilla/websocket
  - id: nhooyr-websocket
    desc: nhooyr.io WebSocket library (Go)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: nhooyr\.io/websocket
  - id: golang-websocket
    desc: golang.org/x/net/websocket (Go)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: golang\.org/x/net/websocket
  - id: go-websocket-conn-type
    desc: References a Go WebSocket connection type
    crit: notable
    conf: 0.7
    for: [go, binaries]
    if:
      type: text
      regex: '\*websocket\.(Conn|Dialer|proxy_Dialer|proxy_socks5)\b'
composite_rules:
  - id: go-websocket-library
    desc: Uses a WebSocket library in Go
    crit: notable
    conf: 0.8
    any:
      - id: gorilla-websocket
      - id: nhooyr-websocket
      - id: golang-websocket
