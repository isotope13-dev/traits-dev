# WebSocket-signaled WebRTC media sessions are a neutral communications
# capability. Capture intent requires a separate local-device source signal.
defaults:
  platforms: [unix, windows]
  for: [python, whl, python-sdist]
  crit: notable
  conf: 0.9

traits:
  - id: python-webrtc-peer-connection
    desc: Python WebRTC peer connection
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: RTCPeerConnection

  - id: python-remote-webrtc-media-track
    desc: Receives a remote WebRTC media track
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "Received remote track:"

  - id: python-webrtc-signaling-reference
    desc: Python WebRTC signaling client reference
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\bself\.signal\b'

composite_rules:
  - id: python-websocket-webrtc-media-session
    desc: Python WebSocket-signaled WebRTC media session
    crit: notable
    conf: 0.96
    scope: archive
    all:
      - id: micro-behaviors/communications/websocket/library::python-websockets-client
      - id: python-webrtc-peer-connection
      - id: python-remote-webrtc-media-track
      - id: python-webrtc-signaling-reference
