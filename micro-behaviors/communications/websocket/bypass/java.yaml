# WebSocket Bypass via Coyote Reflection
# Detects Tomcat Coyote request header forgery to bypass Nginx/CDN WebSocket blocking
# MBC: C0034 (OS integration)
# ATT&CK: T1562 (Impair Defenses)
defaults:
  platforms: [windows, unix]
  for: [python, java, class]

traits:
  - id: coyote-request-field
    desc: "Tomcat Coyote req field access via reflection"
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: coyoteRequest

  - id: mime-headers-reflection
    desc: Tomcat MimeHeaders access via reflection
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: org.apache.tomcat.util.http.MimeHeaders

  - id: upgrade-util
    desc: Tomcat WebSocket UpgradeUtil usage
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: UpgradeUtil

  - id: set-header-method
    desc: Custom SetHeader method for header forgery
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: void\s+SetHeader\s*\(HttpServletRequest

  - id: sec-websocket-version-header
    desc: Sec-WebSocket-Version header manipulation
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: Sec-WebSocket-Version
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
      - id: micro-behaviors/data/text/security/scanner::defensive-scanner-tool-context

composite_rules:
  - id: coyote-websocket-bypass
    desc: Tomcat Coyote WebSocket bypass via header forgery
    crit: suspicious
    conf: 0.95
    all:
      - id: coyote-request-field
      - id: mime-headers-reflection
    any:
      - id: upgrade-util
      - id: set-header-method
      - id: sec-websocket-version-header
