defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1071.001
  mbc: C0002

traits:
  - id: python-socketio-emit-call
    desc: Python Socket.IO emit call
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: symbol
      kind: call
      regex: '^(sio|socketio)\.emit$'

  - id: python-socketio-connect-call
    desc: Calls a Python Socket.IO connect method
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: '\b(sio|socketio)\.connect\s*\('

composite_rules:
  - id: python-socketio-emit
    desc: Python Socket.IO event emit
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: metadata/library/socketio::python-client-import
      - id: python-socketio-emit-call

  - id: python-socketio-connect
    desc: Connects a Python Socket.IO client
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: metadata/library/socketio::python-client-import
      - id: python-socketio-connect-call
