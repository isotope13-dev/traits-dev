# Sending host/runtime metadata over a WebSocket is a neutral communication
# capability.  Remote-command intent belongs in composites that add tasking or
# execution evidence.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94

traits:
  - id: websocket-send-environment
    desc: WebSocket sends environment data
    if:
      type: text
      regex: '\.send\s*\([^)]{0,600}\bprocess\.env\b'

  - id: websocket-send-host-metadata
    desc: WebSocket sends host metadata
    if:
      type: text
      regex: '\.send\s*\([^)]{0,600}\b(os\.)?(hostname|platform|cwd)\b'

  - id: websocket-send-runtime-metadata
    desc: WebSocket sends runtime metadata
    if:
      type: text
      regex: '\.send\s*\([^)]{0,600}\b(os\.)?(arch|cpus|versions)\b'

composite_rules:
  - id: websocket-host-environment-data
    desc: WebSocket sends host or runtime metadata
    crit: notable
    conf: 0.94
    any:
      - id: websocket-send-environment
      - id: websocket-send-host-metadata
      - id: websocket-send-runtime-metadata
