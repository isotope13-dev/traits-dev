# macOS DNS cache management
defaults:
  for: [go, shell]
  platforms: [unix]
traits:
  - id: dscacheutil-flush
    desc: macOS DNS cache flush command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bdscacheutil\b.{0,40}-flushcache\b'
  - id: mdnsresponder-restart
    desc: Restarts macOS DNS responder
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bkillall\b.{0,60}mDNSResponder\b'
