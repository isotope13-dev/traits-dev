    desc: ares_init function
    crit: notable
    conf: 0.4
    if:
      type: symbol
      regex: ares_init
  - id: ares-gethostbyname
    desc: ares_gethostbyname function
    crit: notable
    conf: 0.4
    if:
      type: symbol
      regex: ares_gethostbyname
  - id: ares-process
    desc: ares_process function
    crit: notable
    conf: 0.4
    if:
      type: symbol
      regex: ares_process
  - id: ares-destroy
    desc: ares_destroy function
    crit: notable
    conf: 0.4
    if:
      type: symbol
      regex: ares_destroy
  - id: ares-query
    desc: ares_query function
    crit: notable
    conf: 0.4
    if:
      type: symbol
      regex: ares_query
