defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.9

traits:
  - id: oob-address-request
    desc: References an OOB callback address provider
    if:
      type: text
      substr: RequireOOBAddr

  - id: dns-oob-event-check
    desc: Checks DNS out-of-band events by token
    if:
      type: symbol
      kind: call
      exact: yakit.CheckDNSLogByToken
