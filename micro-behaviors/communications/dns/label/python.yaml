defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-dot-label-loop
    desc: Python iterates dotted DNS labels
    crit: notable
    conf: 0.86
    size_max: 50000
    if:
      type: tree-sitter
      query: |
        (for_statement
          right: (call
            function: (attribute
              object: (identifier) @obj
              attribute: (identifier) @method)
            arguments: (argument_list
              (string) @arg))
          (#match? @obj "^(domain|subdomain|hostname|host|fqdn|qname|labels?)$")
          (#eq? @method "split")
          (#match? @arg "^[\"']\\.[\"']$"))
