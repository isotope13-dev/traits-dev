defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
traits:
  - id: nslookup
    desc: nslookup command
    for: [shell]
    if:
      type: text
      word: nslookup
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: dig
    desc: dig DNS command
    for: [shell]
    if:
      type: text
      regex: (?m)(^|[;&|\s(])dig\s+.{0,120}\b[A-Za-z0-9-]{1,63}(\.[A-Za-z0-9-]{1,63}){1,5}\b
  - id: host
    desc: host DNS command
    crit: notable
    for: [shell]
    if:
      type: text
      regex: (?m)(^|[;&|()])\s*host\s+(\$\w+\.|[A-Za-z0-9*_-]+\.){1,5}[A-Za-z]{2,}\b
    not:
      - substr: "this.xterm.open"
  - id: host-var-subdomain
    desc: host DNS lookup with shell var subdomain
    crit: suspicious
    conf: 0.92
    attack: T1048.003
    for: [shell]
    if:
      type: text
      regex: (?m)(^|[;&|()])\s*host\s+\$\w+\.
  - id: dnsmasq
    desc: dnsmasq resolver command
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: (?m)(^|[;&|()\s])dnsmasq(\s|$)
  - id: ping-hex-subdomain
    desc: ping resolves long hex subdomain
    crit: suspicious
    conf: 0.95
    attack: T1048.003
    for: [shell]
    if:
      type: text
      regex: ping\s+-[cn]\s+\d+\s+[0-9a-f]{12,}\.[A-Za-z0-9.-]+
  - id: ping-var-subdomain
    desc: ping resolves templated hostname
    crit: suspicious
    conf: 0.9
    attack: T1048.003
    for: [shell]
    if:
      type: text
      regex: ping\s+-[cn]\s+\d+\s+\$\{\w+\}
