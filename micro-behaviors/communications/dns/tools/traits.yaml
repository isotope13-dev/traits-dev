# DNS Resolution Tools
# Command-line tools for DNS lookups
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.9
traits:
  - id: nslookup
    desc: nslookup command
    if:
      type: string_value
      word: "nslookup"
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: dig
    desc: dig DNS command
    if:
      type: string_value
      regex: '(?m)(^|[;&|\s(])dig\s+.{0,120}\b[A-Za-z0-9-]{1,63}(\.[A-Za-z0-9-]{1,63}){1,5}\b'
  - id: host
    desc: host DNS command
    crit: baseline
    if:
      type: string_value
      regex: '(?m)(^|[;&|\s(])host\s+([A-Za-z0-9*_-]+\.){1,5}[A-Za-z]{2,}\b'
