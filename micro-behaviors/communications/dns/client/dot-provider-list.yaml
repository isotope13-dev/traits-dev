defaults:
  platforms: [windows, unix]
  for: [go, source]
  crit: component
  conf: 0.9
traits:
  - id: go-dot-addprovider-call
    desc: Go DNS-over-TLS provider registration call
    if:
      type: text
      regex: '\bAddProvider\s*\('

  - id: dot-tls-port-endpoint-literal
    desc: DNS-over-TLS port endpoint literal
    if:
      type: text
      regex: '\b\d{1,3}(\.\d{1,3}){3}:853\b'
      is: external_ip

  - id: dns-over-tls-context-term
    desc: DNS-over-TLS context term
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bDNS[- ]?over[- ]?TLS\b'

  - id: public-dot-major-provider
    desc: Public DNS-over-TLS major provider term
    conf: 0.88
    if:
      type: text
      regex: '(?i)\b(cloudflare-dns|dns\.google|quad9)\b'

  - id: public-dot-community-provider
    desc: Public DNS-over-TLS community provider term
    conf: 0.86
    if:
      type: text
      regex: '(?i)\b(adguard-dns|dnsforge|libredns|dot\.sb)\b'

composite_rules:
  - id: public-dot-provider-list-go
    desc: Go public DNS-over-TLS provider list
    all:
      - id: go-dot-addprovider-call
      - id: dot-tls-port-endpoint-literal
    any:
      - id: dns-over-tls-context-term
      - id: public-dot-major-provider
      - id: public-dot-community-provider
