defaults:
  platforms: [unix, windows]
  for: [perl]
  attack: T1071.004

traits:
  - id: perl-udp-dns-socket
    desc: Perl UDP DNS socket
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "PeerPort\\s*=>\\s*53[\\s\\S]{0,80}Proto\\s*=>\\s*'udp'"

  - id: perl-dns-txt-qtype
    desc: Perl DNS TXT qtype
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'qtype\s*=\s*"\\x00\\x10"'

