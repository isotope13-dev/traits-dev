defaults:
  platforms: [windows, unix]
  for: [go]
  attack: T1071.004
  mbc: C0011

traits:
  - id: miekg-dns-import
    desc: Imports the miekg DNS client
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: github.com/miekg/dns

  - id: miekg-dns-exchange
    desc: Sends a DNS query with miekg
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      substr: Client.Exchange
