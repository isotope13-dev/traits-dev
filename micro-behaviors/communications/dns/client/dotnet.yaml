defaults:
  platforms: [android, windows]
  for: [csharp, pe, dll]
  attack: T1071.004

traits:
  - id: dotnet-udp-socket-token
    desc: .NET UDP socket API token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'UdpClient|System\.Net\.Sockets'
    unless:
      - id: well-known/lib/dotnetex/

  - id: dotnet-dns-context-token
    desc: .NET DNS query API token
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'System\.Net\.Dns|DnsClient|QueryType|Dns\.Resolve'
    unless:
      - id: well-known/lib/dotnetex/

composite_rules:
  - id: dotnet-udp-dns-client
    desc: .NET UDP DNS client capability
    crit: notable
    conf: 0.9
    all:
      - id: dotnet-udp-socket-token
      - id: dotnet-dns-context-token
    unless:
      - id: well-known/lib/spectre-console/
      - id: well-known/tool/sysadmin/netch/
      - id: well-known/app/discord-chat-exporter/
      - id: well-known/app/discord-chat-exporter::discord-chat-exporter-path
      - id: well-known/lib/dotnetex/
