defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  mbc: C0011
  attack: T1071.004
traits:
  - id: doh-provider
    desc: DoH provider class reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: doh.Provider
  - id: doh-class
    desc: DnsOverHttps class reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: DnsOverHttps
  - id: doh-content-type
    desc: DoH media type in Content-Type header
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '(?i)Content-Type.{0,60}application/dns-message|application/dns-message.{0,60}Content-Type'
  - id: doh-query-path
    desc: DoH dns-query path
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: dns-query
  - id: doh-cloudflare-host
    desc: Cloudflare DoH resolver host
    crit: notable
    conf: 0.75
    if:
      type: text
      exact: cloudflare-dns.com
  - id: doh-google-host
    desc: Google DoH resolver host
    crit: notable
    conf: 0.75
    if:
      type: text
      exact: dns.google
  - id: doh-client-user-agent
    desc: DoH client user-agent string
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: DoH-Client/1.0
  - id: doh-quad9-ip
    desc: Quad9 DoH IP endpoint
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: 9.9.9.9/dns-query
  - id: doh-cloudflare-ip-1-1-1-1
    desc: Cloudflare DoH IP endpoint
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: 1.1.1.1/dns-query
  - id: doh-google-ip
    desc: Google DoH IP endpoint
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: 8.8.8.8/dns-query
  - id: doh-google-json
    desc: Google DoH JSON API endpoint
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: dns.google/resolve
  - id: doh-cloudflare-json
    desc: Cloudflare DoH JSON API endpoint
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: cloudflare-dns.com/dns-query
  - id: doh-quad9-json
    desc: Quad9 DoH endpoint
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: dns.quad9.net
composite_rules:
  - id: doh-wireformat-client
    desc: DNS-over-HTTPS wireformat client
    crit: suspicious
    conf: 0.9
    all:
      - id: doh-content-type
      - id: doh-query-path
    any:
      - id: doh-cloudflare-host
      - id: doh-quad9-ip
      - id: doh-cloudflare-ip-1-1-1-1
      - id: doh-google-host
      - id: doh-client-user-agent
    needs: 2
