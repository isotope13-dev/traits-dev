# DNS over HTTPS (DoH)
# MBC: C0011 (DNS Communication)
# ATT&CK: T1071.004
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  mbc: "C0011"
  attack: "T1071.004"
traits:
  - id: doh-provider
    desc: DoH provider class reference
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: "doh.Provider"
  - id: doh-class
    desc: DnsOverHttps class reference
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: DnsOverHttps
  - id: doh-content-type
    desc: DoH content type header
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: application/dns-message
  - id: doh-query-path
    desc: DoH dns-query path
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: dns-query
  - id: doh-cloudflare-ip
    desc: Cloudflare DoH IP endpoint
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: 9.9.9.9/dns-query
  - id: doh-google-ip
    desc: Google DoH IP endpoint
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: 8.8.8.8/dns-query
  # Google DoH JSON API (used by malware for stealth DNS)
  - id: doh-google-json
    desc: Google DoH JSON API endpoint
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "dns.google/resolve"
  - id: doh-cloudflare-json
    desc: Cloudflare DoH JSON API endpoint
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "cloudflare-dns.com/dns-query"
  - id: doh-quad9-json
    desc: Quad9 DoH endpoint
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: "dns.quad9.net"
composite_rules:
  - id: doh
    desc: DNS over HTTPS support
    crit: notable
    conf: 0.66
    any:
      - id: doh-provider
      - id: doh-class
      - id: doh-content-type
      - id: doh-query-path
      - id: doh-cloudflare-ip
      - id: doh-google-ip
      - id: doh-google-json
      - id: doh-cloudflare-json
      - id: doh-quad9-json
