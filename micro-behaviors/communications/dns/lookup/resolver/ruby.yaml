defaults:
  platforms: [windows, unix]
  crit: notable
  for:
    - ruby
  conf: 0.7
traits:
  - id: resolv-getaddress
    desc: Resolv.getaddress method
    if:
      type: string_literal
      regex: Resolv\.getaddress
  - id: resolv-getname
    desc: Resolv.getname method
    if:
      type: string_literal
      regex: Resolv\.getname
  - id: ruby-resolv-new
    desc: Ruby Resolv resolver object
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: Resolv.new
  - id: ruby-resolv-getaddresses
    desc: Ruby Resolv getaddresses method
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: .getaddresses(
composite_rules:
  - id: dns-resolve
    desc: DNS hostname resolution
    crit: notable
    conf: 0.85
    any:
      - id: resolv-getaddress
      - id: resolv-getname
      - id: ruby-resolv-new
      - id: ruby-resolv-getaddresses
