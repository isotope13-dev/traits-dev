# DNS Lookup Operations (Node.js)
# MBC: C0011 (DNS Communication)
# ATT&CK: T1071.004
#
# Type-specific lookups are in subdirectories:
#   txt/     - TXT record lookups
#   reverse/ - Reverse DNS lookups
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: "C0011"
  attack: "T1071.004"
  crit: notable
  conf: 0.7
traits:
  - id: dns-lookup-call
    desc: dns.lookup() call
    conf: 0.65
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
    if:
      type: text
      regex: "dns\\.lookup\\("
  - id: require-dns-inline-lookup
    desc: Inline require('dns').lookup() call
    conf: 0.72
    if:
      type: text
      regex: "require\\(['\"]dns['\"]\\)\\.lookup\\s*\\("
  - id: require-dns-inline-lookup-ast
    desc: Inline require().lookup call
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: require().lookup
  - id: dns-resolve-call
    desc: dns.resolve() call
    conf: 0.7
    if:
      type: text
      regex: "dns\\.resolve\\("
  - id: dns-resolve4
    desc: dns.resolve4() call (A record)
    conf: 0.7
    if:
      type: text
      regex: "dns\\.resolve4\\("
  - id: dns-resolve6
    desc: dns.resolve6() call (AAAA record)
    conf: 0.7
    if:
      type: text
      regex: "dns\\.resolve6\\("
  - id: dns-promises-lookup
    desc: dns.promises.lookup() call
    conf: 0.7
    if:
      type: text
      regex: "dns\\.promises\\.lookup\\("
  - id: ipv4-family-selection
    desc: Node DNS lookup requests IPv4 address results
    conf: 0.75
    if:
      type: text
      regex: 'dns\.(lookup|resolve4|resolve6|promises\.lookup)\([\s\S]{0,160}family\s*:\s*4'
  - id: ipv4-address-flags
    desc: Node DNS requests IPv4 address flags
    conf: 0.75
    if:
      type: text
      regex: "dns\\.ADDRCONFIG\\s*\\|\\s*dns\\.V4MAPPED"
  - id: require-dns
    desc: require('dns') import
    crit: notable
    conf: 0.5
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
    if:
      type: text
      regex: "require\\(['\"]dns['\"]\\)"
composite_rules:
  - id: ipv4-address-selection
    desc: Node DNS lookup selects IPv4-compatible results
    crit: notable
    conf: 0.75
    any:
      - id: ipv4-family-selection
      - id: ipv4-address-flags
  - id: node-dns-lookup
    desc: Node.js DNS lookup operations
    crit: notable
    conf: 0.7
    any:
      - id: dns-lookup-call
      - id: dns-resolve-call
      - id: dns-resolve4
      - id: dns-resolve6
      - id: dns-promises-lookup
      - id: ipv4-family-selection
      - id: ipv4-address-flags
      - id: require-dns-inline-lookup
      - id: require-dns-inline-lookup-ast
