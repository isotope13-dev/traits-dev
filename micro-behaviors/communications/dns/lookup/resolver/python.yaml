# DNS Lookup Capabilities - Python
# GuardDog-inspired: Detects DNS query capabilities
# Note: DNS lookups are neutral capabilities; see objectives/exfiltration/dns/ for intent
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.85
traits:
  # === Built-in socket DNS queries ===
  - id: gethostbyname
    desc: socket.gethostbyname() DNS lookup
    if:
      # Migrated from a tree-sitter call query to a `kind: call`
      # match on the pre-extracted call fact (no per-member
      # tree-sitter cursor walk; same name semantics).
      type: symbol
      kind: call
      exact: 'socket.gethostbyname'
  - id: getaddrinfo
    desc: socket.getaddrinfo() DNS lookup
    if:
      # Migrated from a tree-sitter call query to a `kind: call`
      # match on the pre-extracted call fact (no per-member
      # tree-sitter cursor walk; same name semantics).
      type: symbol
      kind: call
      exact: 'socket.getaddrinfo'
  - id: gethostbyname-ex
    desc: socket.gethostbyname_ex() DNS lookup
    if:
      # Migrated from a tree-sitter call query to a `kind: call`
      # match on the pre-extracted call fact (no per-member
      # tree-sitter cursor walk; same call-name semantics).
      type: symbol
      kind: call
      exact: 'socket.gethostbyname_ex'
  # === dnspython library ===
  - id: dns-resolver-query
    desc: dns.resolver.query() lookup
    if:
      type: symbol
      regex: 'dns\.resolver\.query'
  - id: dns-resolver-resolve
    desc: dns.resolver.resolve() lookup
    if:
      type: symbol
      regex: 'dns\.resolver\.resolve'
  - id: resolver-resolve-call
    desc: dnspython resolver resolves a record
    if:
      type: symbol
      kind: call
      exact: 'resolver.resolve'
  - id: dns-zone-transfer-call
    desc: DNS zone transfer query
    if:
      type: symbol
      kind: call
      exact: 'query.xfr'
  - id: dns-async-udp-query
    desc: Asynchronous DNS UDP query
    if:
      type: symbol
      kind: call
      exact: '_asyncquery.udp'
  - id: dns-query-udp
    desc: dns.query.udp() direct query
    if:
      type: symbol
      regex: 'dns\.query\.udp'
  - id: dns-query-tcp
    desc: dns.query.tcp() direct query
    if:
      type: symbol
      regex: 'dns\.query\.tcp'
  - id: resolver-without-system-config
    desc: dnspython resolver skips system configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Resolver\s*\(\s*configure\s*=\s*False\s*\)'
  - id: resolver-set-nameservers
    desc: Assigns a resolver nameserver list
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.nameservers\s*=\s*\[[^\]\n]{0,160}\]'
  - id: python-resolver-monkey-patch
    desc: Python replaces socket DNS resolver functions
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'socket\.(getaddrinfo|gethostbyname(_ex)?|gethostbyaddr|getnameinfo)\s*=\s*\w+'
  # === aiodns library (async) ===
  - id: aiodns-query
    desc: aiodns DNSResolver query
    if:
      type: symbol
      regex: 'aiodns\.DNSResolver'
composite_rules:
  # Hostname-specific DNS lookup capability — excludes getaddrinfo which is used
  # for general TCP connection setup and would produce too many false positives.
  - id: hostname-specific-lookup
    desc: Hostname-specific DNS lookup API
    crit: notable
    conf: 0.85
    any:
      - id: gethostbyname
      - id: gethostbyname-ex
      - id: dnspython-lookup
      - id: aiodns-query
  # Built-in DNS lookups
  - id: socket-dns-lookup
    desc: Socket-based DNS lookup capability
    crit: notable
    conf: 0.80
    any:
      - id: gethostbyname
      - id: getaddrinfo
      - id: gethostbyname-ex
  # dnspython usage
  - id: dnspython-lookup
    desc: dnspython DNS query capability
    crit: notable
    conf: 0.85
    any:
      - id: dns-resolver-query
      - id: dns-resolver-resolve
      - id: resolver-resolve-call
      - id: dns-query-udp
      - id: dns-query-tcp
      - id: dns-async-udp-query
  # Any DNS lookup capability
  - id: dns-lookup-capability
    desc: DNS lookup capability (any method)
    crit: notable
    conf: 0.80
    any:
      - id: socket-dns-lookup
      - id: dnspython-lookup
      - id: aiodns-query
