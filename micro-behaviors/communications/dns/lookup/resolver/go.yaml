defaults:
  platforms: [windows, unix]
  for: [go]
  attack: T1071.004
  mbc: C0011
  crit: notable
traits:
  - id: net-lookup-host
    desc: net.LookupHost DNS lookup
    conf: 0.85
    if:
      type: symbol
      exact: net.LookupHost
  - id: net-lookup-ip
    desc: net.LookupIP DNS lookup
    conf: 0.85
    if:
      type: symbol
      exact: net.LookupIP
  - id: net-lookup-addr
    desc: net.LookupAddr reverse DNS
    conf: 0.85
    if:
      type: symbol
      exact: net.LookupAddr
composite_rules:
  - id: dns-lookup
    desc: Go DNS lookup capability
    crit: notable
    conf: 0.85
    any:
      - id: net-lookup-host
      - id: net-lookup-ip
      - id: net-lookup-addr
