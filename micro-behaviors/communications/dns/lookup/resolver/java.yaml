defaults:
  platforms: [windows, unix, appliance]
  for: [java, kotlin, class, jar, zip]

traits:
  - id: jvm-inetaddress-getallbyname-source
    desc: JVM InetAddress getAllByName
    crit: notable
    conf: 0.82
    for: [java, kotlin]
    if:
      type: text
      substr: InetAddress.getAllByName
  - id: jvm-inetaddress-getbyname-source
    desc: JVM InetAddress getByName
    crit: notable
    conf: 0.82
    for: [java, kotlin]
    if:
      type: text
      substr: InetAddress.getByName
  - id: jvm-inetaddress-getbyname-bytecode
    desc: JVM bytecode InetAddress getByName
    crit: notable
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: symbol
      exact: java/net/InetAddress.getByName
  - id: jvm-inetaddress-getallbyname-bytecode
    desc: JVM bytecode getAllByName
    crit: notable
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: symbol
      exact: java/net/InetAddress.getAllByName
