# PowerShell/.NET DNS resolution capability.
defaults:
  platforms: [windows]
  for: [powershell, oledoc]
  attack: T1071.004

traits:
  - id: powershell-gethostentry
    desc: PowerShell .NET host-entry DNS lookup
    crit: notable
    conf: 0.96
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\[Net\.Dns\]::GetHostEntry\s*\(\s*["''][^"'']{3,120}["'']'
