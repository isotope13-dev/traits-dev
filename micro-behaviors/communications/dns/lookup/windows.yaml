defaults:
  platforms:
    - windows
  for:
    - pe
  attack: T1071.004
  mbc: C0011
traits:
  - id: dnsapi-dll
    desc: DNSAPI library reference
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: (?i)\bdnsapi\.dll\b
  - id: dnsapi-string
    desc: DNSAPI library string marker
    crit: component
    conf: 0.85
    if:
      type: text
      substr: dnsapi
  - id: dns-query-w
    desc: Windows DNS query API
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: DnsQuery_W
  - id: dns-query-w-go
    desc: Windows DNS query via Go
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: syscall.procDnsQuery_W
  - id: dns-record-list-free
    desc: Free DNS query results
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: DnsRecordListFree
  - id: dns-record-list-free-go
    desc: Free DNS results via Go
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: syscall.procDnsRecordListFree
  - id: dns-name-compare-w
    desc: Compare DNS names
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: DnsNameCompare_W
  - id: dns-name-compare-w-go
    desc: Compare DNS names via Go
    crit: notable
    conf: 0.78
    if:
      type: text
      exact: syscall.procDnsNameCompare_W
composite_rules:
  - id: dnsapi-lookup
    desc: Windows DNS lookup capability
    crit: notable
    conf: 0.9
    any:
      - id: dns-query-w
      - id: dns-query-w-go
      - id: dnsapi-dll
      - id: dnsapi-string
      - id: dns-record-list-free
      - id: dns-record-list-free-go
      - id: dns-name-compare-w
      - id: dns-name-compare-w-go
    needs: 2
