# Windows DNS lookup APIs, including Go lazy syscall bindings.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1071.004"
  mbc: "C0011"
traits:
  - id: dnsapi-dll
    desc: DNSAPI library reference
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: '(?i)\bdnsapi\.dll\b'
  - id: dns-query-w
    desc: Windows DNS query API
    crit: notable
    conf: 0.9
    if:
      type: raw
      exact: "DnsQuery_W"
  - id: dns-query-w-go
    desc: Windows DNS query via Go
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: "syscall.procDnsQuery_W"
  - id: dns-record-list-free
    desc: Free DNS query results
    crit: notable
    conf: 0.8
    if:
      type: raw
      exact: "DnsRecordListFree"
  - id: dns-record-list-free-go
    desc: Free DNS results via Go
    crit: notable
    conf: 0.8
    if:
      type: string_value
      exact: "syscall.procDnsRecordListFree"
  - id: dns-name-compare-w
    desc: Compare DNS names
    crit: notable
    conf: 0.78
    if:
      type: raw
      exact: "DnsNameCompare_W"
  - id: dns-name-compare-w-go
    desc: Compare DNS names via Go
    crit: notable
    conf: 0.78
    if:
      type: string_value
      exact: "syscall.procDnsNameCompare_W"
composite_rules:
  - id: dnsapi-lookup
    desc: Windows DNS lookup capability
    crit: notable
    conf: 0.9
    any:
      - id: dns-query-w
      - id: dns-query-w-go
      - id: dnsapi-dll
      - id: dns-record-list-free
      - id: dns-record-list-free-go
      - id: dns-name-compare-w
      - id: dns-name-compare-w-go
    needs: 2
