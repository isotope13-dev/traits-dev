defaults:
  platforms: [windows]
  for: [c]
traits:
  - id: mx-record-type
    desc: DNS MX record constant
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: "TYPE_MX         equ 15  ; Mail exchange"
  - id: mx-host-resolver
    desc: MX host resolution routine
    crit: notable
    conf: 0.92
    if:
      type: text
      word: "DNSGetMXHost"
  - id: mx-query-builder
    desc: DNS MX query builder
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: "; DNS Client, only MX records are supported"
  - id: mx-record-type-c
    desc: DNS MX record type constant in C
    crit: notable
    conf: 0.93
    for: [c, cpp]
    if:
      type: text
      substr: "TYPE_MX 15"
  - id: dns-type-mx-c
    desc: DNS_TYPE_MX constant usage in C
    crit: notable
    conf: 0.93
    for: [c, cpp]
    if:
      type: text
      word: "DNS_TYPE_MX"
  - id: mx-list-function
    desc: MX record list function in C
    crit: notable
    conf: 0.92
    for: [c, cpp]
    if:
      type: text
      word: "get_mx_list"
  - id: dns-query-a-resolve
    desc: DnsQuery_A dynamic resolution
    crit: notable
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      substr: "DnsQuery_A"
composite_rules:
  - id: mx-mail-exchange-lookup
    desc: DNS MX mail exchange lookup
    crit: suspicious
    conf: 0.95
    all:
      - id: mx-record-type
    any:
      - id: mx-host-resolver
      - id: mx-query-builder
  - id: mx-mail-exchange-lookup-c
    desc: DNS MX lookup in C source
    crit: suspicious
    conf: 0.95
    any:
      - id: mx-record-type-c
      - id: dns-type-mx-c
    all:
      - id: mx-list-function
