defaults:
  platforms: [windows]
  for: [text]
traits:
  - id: mx-record-type
    desc: DNS MX record constant
    crit: notable
    conf: 0.94
    if:
      type: raw
      exact: "TYPE_MX         equ 15  ; Mail exchange"
  - id: mx-host-resolver
    desc: MX host resolution routine
    crit: notable
    conf: 0.92
    if:
      type: raw
      word: "DNSGetMXHost"
  - id: mx-query-builder
    desc: DNS MX query builder
    crit: notable
    conf: 0.9
    if:
      type: raw
      exact: "; DNS Client, only MX records are supported"
composite_rules:
  - id: mx-mail-exchange-lookup
    desc: DNS MX mail exchange lookup
    crit: suspicious
    conf: 0.95
    all:
      - id: mx-record-type
    any:
      - id: mx-host-resolver
      - id: mx-query-builder
