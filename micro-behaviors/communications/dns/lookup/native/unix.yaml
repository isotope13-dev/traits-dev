defaults:
  platforms: [unix]
  for: [elf, macho, c, cpp, objc]
  mbc: C0011
  attack: T1071.004
traits:
  - id: lookup-res-query
    desc: Uses res_query DNS API
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: res_query
  - id: lookup-res-search
    desc: Uses res_search DNS API
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: res_search
composite_rules:
  - id: lookup
    desc: Uses DNS (Domain Name Service)
    crit: notable
    conf: 0.66
    any:
      - id: lookup-res-query
      - id: lookup-res-search
