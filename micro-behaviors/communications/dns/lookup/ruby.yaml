defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  for:
    - ruby
  conf: 0.7
traits:
  - id: resolv-getaddress
    desc: Resolv.getaddress method
    if:
      type: string_value
      regex: Resolv\.getaddress
  - id: resolv-getname
    desc: Resolv.getname method
    if:
      type: string_value
      regex: Resolv\.getname
composite_rules:
  - id: dns-resolve
    desc: DNS hostname resolution
    crit: notable
    conf: 0.85
    any:
      - id: resolv-getaddress
      - id: resolv-getname
