defaults:
  platforms: [unix]
  for: [binaries, c]
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.56
traits:
  - id: in-addr-arpa
    desc: in-addr.arpa reverse lookup
    if:
      type: text
      substr: .in-addr.arpa
  - id: ip6-arpa
    desc: ip6.arpa reverse lookup
    if:
      type: text
      substr: ip6.arpa
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
