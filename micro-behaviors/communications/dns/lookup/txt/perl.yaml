defaults:
  platforms: [windows, unix]
  for: [perl]
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.92

traits:
  - id: perl-net-dns-txt-query
    desc: Perl requests DNS TXT records
    if:
      type: text
      regex: '->query\s*\([^)]{0,160}["'']TXT["'']'

  - id: perl-dns-txt-response-capture
    desc: Perl captures DNS TXT response
    conf: 0.95
    if:
      type: text
      regex: '\bmy\s+\$\w+\s*=\s*\$\w+->query\([^)]{0,160}["'']TXT["'']'
