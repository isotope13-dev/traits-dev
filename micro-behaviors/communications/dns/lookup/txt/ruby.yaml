defaults:
  platforms: [windows, unix]
  for: [ruby]
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.92

traits:
  - id: ruby-resolv-txt-query
    desc: Ruby requests DNS TXT records
    if:
      type: text
      regex: 'getresources\s*\([^)]{0,160}Resource::IN::TXT'

  - id: ruby-dns-txt-response-capture
    desc: Ruby captures DNS TXT response
    conf: 0.95
    if:
      type: text
      regex: '^\s*[a-z_]\w*\s*=\s*.{0,200}getresources\([^)]{0,160}Resource::IN::TXT'
