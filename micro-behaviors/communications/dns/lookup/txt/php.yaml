defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.92

traits:
  - id: php-dns-get-record-txt
    desc: PHP requests DNS TXT records
    if:
      type: symbol
      kind: call
      exact: dns_get_record
      arg:
        kind: identifier
        name: DNS_TXT

  - id: php-dns-txt-response-capture
    desc: PHP captures DNS TXT response
    conf: 0.95
    if:
      type: text
      regex: '\$[A-Za-z_]\w*\s*=\s*dns_get_record\([^)]{0,160}\bDNS_TXT\b'
