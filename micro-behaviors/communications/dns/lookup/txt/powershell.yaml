defaults:
  platforms: [windows]
  for: [powershell, html]
  attack: T1071.004
  mbc: C0011
  crit: notable
  conf: 0.94

traits:
  - id: powershell-nslookup-txt-capture
    desc: PowerShell captures nslookup TXT response
    if:
      type: text
      regex: '(?i)\$[A-Za-z_]\w*\s*=\s*\(\s*nslookup\s+-q=TXT\b'

  - id: nslookup-txt-explicit-resolver
    desc: nslookup TXT query specifies resolver
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bnslookup\s+-q=TXT\s+\S+\s+[^|;&\s]{1,253}'
