defaults:
  platforms: [unix]
  for: [binaries, c, objc]
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.6
traits:
  - id: dns-type-txt
    desc: DNS_TYPE_TXT constant reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: DNS_TYPE_TXT
  - id: t-txt-constant
    desc: T_TXT constant reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: T_TXT
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: ns-t-txt-constant
    desc: ns_t_txt constant reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: ns_t_txt
  - id: dns-txt-tool-query
    desc: DNS TXT lookup via command-line resolver
    crit: notable
    conf: 0.88
    for: [scripts]
    if:
      type: text
      regex: '\b(nslookup\s+-q=TXT|host\s+-t\s+TXT)\b'
composite_rules:
  - id: unix-txt-lookup-dns-type
    desc: Unix DNS TXT lookup via resolver API
    crit: notable
    conf: 0.66
    all:
      - id: micro-behaviors/communications/dns/lookup/native::lookup
      - id: dns-type-txt
  - id: unix-txt-lookup-t-txt
    desc: Unix DNS TXT lookup via resolver API
    crit: notable
    conf: 0.66
    all:
      - id: micro-behaviors/communications/dns/lookup/native::lookup
      - id: t-txt-constant
  - id: unix-txt-lookup-ns-t-txt
    desc: Unix DNS TXT lookup via resolver API
    crit: notable
    conf: 0.66
    all:
      - id: micro-behaviors/communications/dns/lookup/native::lookup
      - id: ns-t-txt-constant
