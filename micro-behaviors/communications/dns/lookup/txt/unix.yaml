defaults:
  platforms: [unix]
  for: [binaries, c, objc]
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.6
traits:
  - id: txt-record-string
    desc: TXT record string reference
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)TXT record
  - id: query-txt-string
    desc: query TXT string reference
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)query TXT
  - id: dns-type-txt
    desc: DNS_TYPE_TXT constant
    conf: 0.6
    if:
      type: text
      substr: DNS_TYPE_TXT
  - id: t-txt-constant
    desc: T_TXT constant
    conf: 0.6
    if:
      type: text
      substr: T_TXT
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: ns-t-txt-constant
    desc: ns_t_txt constant
    conf: 0.6
    if:
      type: text
      substr: ns_t_txt
  - id: dns-txt-tool-query
    desc: DNS TXT lookup via command-line resolver
    crit: notable
    conf: 0.88
    for: [scripts]
    if:
      type: text
      regex: '\b(nslookup\s+-q=TXT|host\s+-t\s+TXT)\b'
composite_rules:
  - id: unix-txt-lookup
    desc: Unix DNS TXT record query
    crit: notable
    conf: 0.66
    any:
      - id: txt-record-string
      - id: query-txt-string
      - id: dns-type-txt
      - id: t-txt-constant
      - id: ns-t-txt-constant
      - id: dns-txt-tool-query
