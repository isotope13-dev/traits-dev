defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.92

traits:
  - id: python-dnspython-query-txt
    desc: Python requests DNS TXT record
    if:
      type: text
      regex: 'dns\.resolver\.query\s*\([^)]{0,160}["'']TXT["'']'

  - id: python-dnspython-resolve-txt
    desc: Python resolves DNS TXT record
    if:
      type: text
      regex: 'dns\.resolver\.resolve\s*\([^)]{0,160}["'']TXT["'']'

  - id: python-dns-txt-response-capture
    desc: Python captures DNS TXT response
    conf: 0.95
    if:
      type: text
      regex: '^\s*[A-Za-z_]\w*\s*=\s*dns\.resolver\.(resolve|query)\s*\([^)\n]{0,160}["'']TXT["'']'
