defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  mbc: C0011
  attack: T1071.004
  crit: notable
  conf: 0.7
traits:
  - id: resolve-txt
    desc: dns.resolveTxt() call
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: dns.resolveTxt
  - id: resolve-txt-promise
    desc: dns.promises.resolveTxt() call
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: dns.promises.resolveTxt
  - id: resolve-txt-string
    desc: resolveTxt string reference
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: resolveTxt
  - id: txt-record-type
    desc: TXT record type constant
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      exact: '''TXT'''
  - id: node-resolve-txt-response-capture
    desc: Node.js captures DNS TXT response
    conf: 0.94
    if:
      type: text
      regex: '\b(const|let|var)\s+\w+\s*=\s*await\s+dns\.promises\.resolveTxt\s*\('
composite_rules:
  - id: node-txt-lookup
    desc: Node.js DNS TXT record resolution
    crit: notable
    conf: 0.75
    any:
      - id: resolve-txt
      - id: resolve-txt-promise
