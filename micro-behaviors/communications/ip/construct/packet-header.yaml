defaults:
  for: [source, scripts, binaries]
  platforms: [unix, windows, macos]
traits:
  - id: ip-checksum-calc
    desc: Manual IP checksum calculation function
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "sum = \\(sum >> 16\\).{0,30}sum >> 16"
  - id: setup-ip-header-func
    desc: IP header construction function
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: setup_ip_header
  - id: setup-udp-header-func
    desc: UDP header construction function
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: setup_udp_header
