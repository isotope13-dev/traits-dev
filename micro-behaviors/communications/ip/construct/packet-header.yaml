defaults:
  for: [source, scripts, binaries]
  platforms: [unix, windows]
traits:
- id: ip-checksum-calc
  desc: Manual IP checksum calculation function
  crit: notable
  conf: 0.8
  if:
    type: raw
    regex: "sum = \\(sum >> 16\\).{0,30}sum >> 16"
- id: setup-ip-header-func
  desc: IP header construction function
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: setup_ip_header
- id: setup-udp-header-func
  desc: UDP header construction function
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: setup_udp_header
- id: tcp-ack-flag-set--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "\\b(TH_ACK|TCP_ACK|TCPHDR_ACK|ACK_FLAG)\\b"
  count_max: 1015703
- id: tcp-ack-flag-set--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "\\btcp(hdr|_header)?\\b.{0,160}\\back\\s*="
  count_max: 1015704
composite_rules:
- id: tcp-ack-flag-set
  desc: TCP ACK flag construction
  crit: component
  conf: 0.85
  any:
  - id: tcp-ack-flag-set--rx-1
  - id: tcp-ack-flag-set--rx-2
