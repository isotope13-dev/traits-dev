defaults:
  platforms: [windows, unix]
traits:
  - id: hardcoded-ipv4-port
    desc: Hardcoded IPv4 address with port
    crit: suspicious
    conf: 0.7
    for: [binaries, scripts]
    count_min: 1
    if:
      type: text
      substr: 128.92.4.4
  - id: hardcoded-ipv4-port-binary
    desc: Hardcoded external IPv4 address with port in binary
    crit: suspicious
    conf: 0.85
    for: [binaries]
    size_max: 20000000
    if:
      type: text
      regex: "^([0-9]{1,3}\\.){3}[0-9]{1,3}:[0-9]{1,5}$"
      is: external_ip
    not:
      - exact: 127.0.0.1:80
      - exact: 127.0.0.1:443
      - regex: "^127\\.0\\.0\\.1:[0-9]+$"
      - regex: "^192\\.168\\.[0-9]{1,3}\\.[0-9]{1,3}:[0-9]+$"
      - regex: "^10\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}:[0-9]+$"
      - regex: "^172\\.(1[6-9]|2[0-9]|3[01])\\.[0-9]{1,3}\\.[0-9]{1,3}:[0-9]+$"
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform::microsoft
