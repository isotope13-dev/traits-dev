defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: resolve-gethostbyname-import
    desc: gethostbyname import string
    crit: baseline
    conf: 0.7
    if:
      type: text
      exact: gethostbyname
  - id: resolve-getaddrinfo-import
    desc: Resolve endpoint with getaddrinfo
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: getaddrinfo
