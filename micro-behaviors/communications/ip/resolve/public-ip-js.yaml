# References to the `public-ip` npm library, which resolves the host's own
# external/public IP via a third-party service. A neutral network capability:
# legitimate telemetry, geo and analytics packages use it just as host-profiling
# malware does. Intent (victim profiling, recon-exfil) comes from composites that
# pair this with geolocation lookups and remote reporting — see
# objectives/supply-chain/recon-exfil/constructor.
defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: public-ip-module-ref
    desc: Reference to the public-ip module name
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: public-ip
  - id: public-ipv4-lookup-call
    desc: Calls publicIpv4 address lookup
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: publicIpv4
