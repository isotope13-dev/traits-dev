defaults:
  platforms: [linux, macos]
  for: [binaries, source]
traits:
  - id: resolve-gethostbyname
    desc: Resolve hostname with gethostbyname
    crit: notable
    conf: 0.66
    platforms: [unix]
    for:
      - elf
      - macho
      - c
      - cpp
      - objc
    if:
      type: symbol
      exact: gethostbyname
  - id: resolve-gethostbyaddr
    desc: Resolve address with gethostbyaddr
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: gethostbyaddr
  - id: resolve-getaddrinfo
    desc: Resolve endpoint with getaddrinfo
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: getaddrinfo
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: resolve-getnameinfo
    desc: Resolve endpoint with getnameinfo
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
      - c
      - cpp
    if:
      type: symbol
      exact: getnameinfo
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: resolve
    desc: Resolve IP addresses
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
      - c
      - cpp
    any:
      - id: resolve-gethostbyname
      - id: resolve-gethostbyaddr
      - id: resolve-getaddrinfo
      - id: resolve-getnameinfo
