defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.85
traits:
  - id: redis-resp-ping-frame
    desc: Redis RESP-framed PING command
    conf: 0.9
    if:
      type: text
      substr: "*1\r\n$4\r\nPING\r\n"
  - id: redis-require-call
    desc: require('redis') call
    if:
      type: text
      regex: 'require\(["'']redis["'']\)'
  - id: redis-new-constructor
    desc: new Redis() constructor
    if:
      type: text
      regex: '\bnew\s+Redis\b'
  - id: redis-createclient-6379
    desc: Redis default port 6379 in createClient
    if:
      type: text
      regex: 'createClient\s*\(\s*\{[^}]{0,200}6379'
  - id: memcache-word
    desc: Memcache protocol/client marker
    conf: 0.8
    if:
      type: text
      regex: '(?i)memcache'
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
composite_rules:
  - id: redis-ping-protocol
    desc: Redis client/protocol marker
    any:
      - id: redis-resp-ping-frame
      - id: redis-require-call
      - id: redis-new-constructor
      - id: redis-createclient-6379
