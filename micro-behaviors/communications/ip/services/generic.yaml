defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - windows
    - ios
  for:
    - elf
    - c
traits:
  - id: ipproto-icmp
    desc: IPPROTO_ICMP protocol constant
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      substr: IPPROTO_ICMP
  - id: services-icmp
    desc: ICMP service/protocol reference
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      word: icmp
      case_insensitive: true
