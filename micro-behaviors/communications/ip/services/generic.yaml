defaults:
  platforms:
    - unix
    - windows
  for:
    - elf
    - c
traits:
  - id: ipproto-icmp
    desc: IPPROTO_ICMP protocol constant
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: IPPROTO_ICMP
  - id: services-icmp
    desc: ICMP service/protocol reference
    crit: baseline
    conf: 0.3
    if:
      type: text
      word: icmp
      case_insensitive: true
