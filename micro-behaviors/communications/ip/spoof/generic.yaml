defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
  attack: T1071
  mbc: C0001
traits:
- id: spoof-keyword
  desc: "Generic 'spoof' term in strings"
  crit: baseline
  conf: 0.65
  if:
    type: text
    word: spoof
- id: forge-keyword
  desc: Packet or header forging keyword
  crit: baseline
  conf: 0.6
  # Bare `forge` matched any identifier/name containing it (avatar-forge,
  # node-forge, sourceforge, salesforce) — meaningless for IP spoofing. Anchor
  # to forging a network object so the word only corroborates the
  # bitwise-IP-construction composite when a packet/header is actually forged.
  if:
    type: text
    regex: '(?i)forge[a-z_]{0,4}(packet|header|datagram)'
- id: ip-hdrincl-constant
  desc: IP_HDRINCL socket option
  crit: notable
  conf: 0.75
  for: [binaries, scripts, -python]
  if:
    type: text
    substr: IP_HDRINCL
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-binary-comp
  - id: metadata/lang/compiler/systems::go-buildinfo
- id: ipproto-raw-constant
  desc: IPPROTO_RAW socket type
  crit: notable
  conf: 0.75
  for: [binaries, scripts, -python]
  if:
    type: text
    substr: IPPROTO_RAW
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-binary-comp
  - id: metadata/lang/compiler/systems::go-buildinfo
- id: sock-raw-constant
  desc: SOCK_RAW socket type
  crit: notable
  conf: 0.7
  for: [binaries, scripts, -python]
  if:
    type: text
    substr: SOCK_RAW
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-binary-comp
  - id: metadata/lang/compiler/systems::go-buildinfo
  - type: text
    substr: syscall.SOCK_RAW
  - type: text
    substr: x/sys/windows.SOCK_RAW
- id: syncookie-word
  desc: "TCP SYN-cookie reference"
  crit: baseline
  conf: 0.5
  if:
    type: text
    substr: syncookie
- id: syn-cookie
  desc: SYN cookie or syn cookie (case variants)
  crit: baseline
  conf: 0.5
  if:
    type: text
    regex: (SYN|syn).?cookie
- id: bitwise-ip-rand-source
  desc: Random number generation function call
  crit: baseline
  conf: 0.8
  for: [binaries, scripts, c, cpp]
  if:
    type: text
    regex: (rand|rand_cmwc|rand_r)\s*\(\s*\)
- id: bitwise-ip-shift-mask
  desc: Bit shift and 0xFF mask pattern
  crit: component
  conf: 0.8
  for: [binaries, scripts, c, cpp]
  if:
    type: text
    regex: '>>\s*[0-9]{1,2}\s*&\s*0xFF'
- id: ruby-rex-socket-library-path
  desc: Ruby Rex socket library path
  crit: component
  conf: 0.95
  for: [ruby]
  if:
    type: path
    regex: 'socket[\\/]comm'
- id: ruby-rex-socket-library-text
  desc: Ruby Rex socket library text
  crit: component
  conf: 0.95
  for: [ruby]
  if:
    type: text
    regex: 'Rex::Socket|require [''"]rex/socket'
composite_rules:
- id: ruby-rex-socket-library-context
  desc: Ruby Rex socket abstraction library context
  crit: component
  conf: 0.95
  all:
  - id: ruby-rex-socket-library-path
  - id: ruby-rex-socket-library-text
- id: spoof
  desc: IP address spoofing capabilities
  crit: suspicious
  conf: 0.7
  any:
  - id: ip-hdrincl-constant
  - id: ipproto-raw-constant
  - id: bitwise-ip-construction
  unless:
  - id: micro-behaviors/communications/ip/spoof/
  - id: well-known/lib/guile::libguile-shared-library
  - id: metadata/lang/source/
  - id: metadata/file/magic/identity::php-archive
  - id: well-known/lib/phpstan::phpstan-phar-basename
- id: bitwise-ip-construction
  desc: IP address construction using bitwise operations
  crit: suspicious
  conf: 0.8
  all:
  - id: bitwise-ip-rand-source
  - id: bitwise-ip-shift-mask
  any:
  - id: spoof-keyword
  - id: forge-keyword
  - id: ip-hdrincl-constant
  - id: ipproto-raw-constant
  - id: sock-raw-constant
  unless:
  - id: well-known/app/bitwarden::bitwarden-browser-extension
  - id: metadata/file/format::sourcemap-context
- id: syncookie
  desc: SYN cookie manipulation
  crit: notable
  conf: 0.66
  any:
  - id: syncookie-word
  - id: syn-cookie
- id: ip-spoof-raw-socket
  desc: IP spoofing via raw socket with IP_HDRINCL
  crit: suspicious
  conf: 0.9
  attack: T1090
  all:
  - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
  - id: micro-behaviors/communications/socket/options::ip-hdrincl-option
