defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries, scripts]
  attack: T1071
  mbc: C0001
traits:
  - id: spoof-keyword
    desc: spoof keyword
    crit: baseline
    conf: 0.65
    if:
      type: string_value
      word: spoof
  - id: forge-keyword
    desc: forge keyword
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      word: forge
  - id: ip-hdrincl-constant
    desc: IP_HDRINCL socket option
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: IP_HDRINCL
  - id: ipproto-raw-constant
    desc: IPPROTO_RAW socket type
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: IPPROTO_RAW
  - id: sock-raw-constant
    desc: SOCK_RAW socket type
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: SOCK_RAW
  - id: syncookie-word
    desc: syncookie word
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: syncookie
  - id: syn-cookie
    desc: SYN cookie or syn cookie (case variants)
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: (SYN|syn).?cookie
  - id: bitwise-ip-rand-source
    desc: Random number generation function call
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: (rand|rand_cmwc|rand_r)\s*\(\s*\)
  - id: bitwise-ip-shift-mask
    desc: Bit shift and 0xFF mask pattern
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: '>>\s*[0-9]{1,2}\s*&\s*0xFF'
composite_rules:
  - id: spoof
    desc: IP address spoofing capabilities
    crit: suspicious
    conf: 0.7
    any:
      - id: spoof-keyword
      - id: forge-keyword
      - id: ip-hdrincl-constant
      - id: ipproto-raw-constant
      - id: bitwise-ip-construction
  - id: bitwise-ip-construction
    desc: IP address construction using bitwise operations (often
    crit: suspicious
    conf: 0.8
    all:
      - id: bitwise-ip-rand-source
      - id: bitwise-ip-shift-mask
    any:
      - id: spoof-keyword
      - id: forge-keyword
      - id: ip-hdrincl-constant
      - id: ipproto-raw-constant
      - id: sock-raw-constant
    needs: 1
  - id: syncookie
    desc: SYN cookie manipulation
    crit: notable
    conf: 0.66
    any:
      - id: syncookie-word
      - id: syn-cookie
  - id: ip-spoof-raw-socket
    desc: IP spoofing via raw socket with IP_HDRINCL
    crit: suspicious
    conf: 0.9
    attack: T1090
    all:
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
      - id: micro-behaviors/communications/socket/options::ip-hdrincl-option
