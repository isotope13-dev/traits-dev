defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: T1071
  mbc: C0001
  crit: notable
  conf: 0.8
traits:
  - id: python-ip-hdrincl-constant
    desc: Python IP_HDRINCL socket option
    if:
      type: symbol
      exact: socket.IP_HDRINCL
  - id: python-ipproto-raw-constant
    desc: Python IPPROTO_RAW socket type
    if:
      type: symbol
      exact: socket.IPPROTO_RAW
  - id: python-sock-raw-constant
    desc: Python SOCK_RAW socket type
    if:
      type: symbol
      exact: socket.SOCK_RAW
