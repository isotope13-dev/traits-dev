defaults:
  platforms:
    - windows
    - linux
    - unix
    - android
    - macos
    - ios
traits:
  - id: external-ipv4-port-binary
    desc: Hardcoded external IPv4 address with port
    crit: notable
    conf: 0.92
    for:
      - pe
      - dll
    size_max: 2000000
    if:
      type: string_value
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{1,5}$
      is: external_ip
      section: .rdata
    unless:
      - id: metadata/lang/compiler::dotnet-ipv4-like-version
      - type: section
        exact: '.rdata'
        length_min: 500000
    downgrade:
      any:
        - type: raw
          substr: Enigma Protector
        - type: raw
          substr: enigmaprotector.com
        - id: metadata/package/versioning::pe-version-resource
