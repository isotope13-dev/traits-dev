defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
traits:
  - id: ipv6-correctform-dash-render
    desc: IPv6 correctForm dash rendering
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: correctForm\(\)\.replace\(/:/g,\s*'-'\)
  - id: dashed-ip-regex
    desc: Dashed IP Replacement pattern (regex)
    crit: notable
    conf: 0.9
    attack: T1071.004
    size_max: 50000
    if:
      type: ast
      language: javascript
      query: "(call_expression\n  function: (member_expression\n    property: (property_identifier) @prop\n  )\n  arguments: (arguments\n    (regex (regex_pattern) @pat)\n    (string (string_fragment) @repl)\n  )\n  (#eq? @prop \"replace\")\n  (#match? @pat \"\\\\.\")\n  (#eq? @repl \"-\")\n)\n"
    unless:
      - id: micro-behaviors/data/text/manipulation::alpha-sanitization-replace
      - id: metadata/build/autotools/
      - id: metadata/build/pip::setup-py
      - type: text
        substr: replace(/~/g,"~0").replace(/\//g,"~1")
    downgrade:
      any:
        - id: metadata/library/runtime::commander
        - id: metadata/library/lodash/
  - id: dashed-ip-colon-regex
    desc: Dashed IP Replacement (colon to dash)
    crit: notable
    conf: 0.9
    attack: T1071.004
    size_max: 50000
    if:
      type: ast
      language: javascript
      query: "(call_expression\n  function: (member_expression\n    property: (property_identifier) @prop\n  )\n  arguments: (arguments\n    (regex (regex_pattern) @pat)\n    (string (string_fragment) @repl)\n  )\n  (#eq? @prop \"replace\")\n  (#match? @pat \":\")\n  (#eq? @repl \"-\")\n)\n"
    unless:
      - id: micro-behaviors/data/text/manipulation::alpha-sanitization-replace
      - id: metadata/build/autotools/
      - id: metadata/build/pip::setup-py
      - type: text
        substr: replace(/~/g,"~0").replace(/\//g,"~1")
      - id: ipv6-correctform-dash-render
    downgrade:
      any:
        - id: metadata/library/runtime::commander
        - id: metadata/library/lodash/
composite_rules:
  - id: dashed-ip-manipulation
    desc: IP Address Manipulation (Dashed format for DNS Exfil)
    crit: notable
    conf: 0.9
    any:
      - id: dashed-ip-regex
      - id: dashed-ip-colon-regex
    unless:
      - id: micro-behaviors/data/text/manipulation::alpha-sanitization-replace
      - id: metadata/build/autotools::autotools
      - id: metadata/build/autotools::configure-ac
      - id: metadata/build/pip::setup-py
      - id: metadata/library/runtime::commander
    downgrade:
      any:
        - id: metadata/library/runtime::commander
