# Cloudflare proxy IP ranges. These addresses front nameless customer origins,
# which is why malware bakes them in as DNS-resilient fallbacks (resolves
# stay reachable as long as Cloudflare itself is up). Detection is per-octet
# range matching against the published CF address blocks:
#   https://www.cloudflare.com/ips-v4/
#
# Standalone presence is `notable` — Cloudflare does host plenty of legitimate
# traffic. The signal becomes `suspicious` only when paired with an obfuscation
# wrapper (octet construction) or a fallback-pool list, so composites in
# objectives/command-and-control/infrastructure/ should reference these atoms.
defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.85
traits:
  # 104.16.0.0/13  (104.16.0.0 - 104.23.255.255) — the bulk of CF proxy IPs
  - id: cloudflare-104-16-23-source-literal
    desc: Cloudflare proxy IP (104.16-23 range)
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: \b104\.(1[6-9]|2[0-3])\.\d{1,3}\.\d{1,3}\b
      is: external_ip
  - id: cloudflare-104-16-23-text
    desc: Cloudflare proxy IP endpoint (104.16-23 range)
    for: [binaries, manifests, data]
    if:
      type: text
      # Require a URL or quoted endpoint value.  Bare dotted coordinates in
      # SVG paths and similar structured data are not network addresses.
      regex: '(https?://|wss?://|["''])(104\.(1[6-9]|2[0-3])\.\d{1,3}\.\d{1,3})\b'
      is: external_ip
  # 172.64.0.0/13 (172.64.0.0 - 172.71.255.255) — secondary CF proxy block
  - id: cloudflare-172-64-71-source-literal
    desc: Cloudflare proxy IP (172.64-71 range)
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: \b172\.(6[4-9]|7[01])\.\d{1,3}\.\d{1,3}\b
      is: external_ip
  - id: cloudflare-172-64-71-text
    desc: Cloudflare proxy IP endpoint (172.64-71 range)
    for: [binaries, manifests, data]
    if:
      type: text
      regex: '(https?://|wss?://|["''])(172\.(6[4-9]|7[01])\.\d{1,3}\.\d{1,3})\b'
      is: external_ip
  # 173.245.48.0/20
  - id: cloudflare-173-245-source-literal
    desc: Cloudflare proxy IP (173.245.48-63 range)
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: \b173\.245\.(4[89]|5[0-9]|6[0-3])\.\d{1,3}\b
      is: external_ip
  - id: cloudflare-173-245-text
    desc: Cloudflare proxy IP endpoint (173.245.48-63)
    for: [binaries, manifests, data]
    if:
      type: text
      regex: 'https?://(173\.245\.(4[89]|5[0-9]|6[0-3])\.\d{1,3})\b'
      is: external_ip
  # 162.158.0.0/15
  - id: cloudflare-162-158-159-source-literal
    desc: Cloudflare proxy IP (162.158-159 range)
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: \b162\.15[89]\.\d{1,3}\.\d{1,3}\b
      is: external_ip
  - id: cloudflare-162-158-159-text
    desc: Cloudflare proxy IP endpoint (162.158-159 range)
    for: [binaries, manifests, data]
    if:
      type: text
      regex: '(https?://|wss?://|["''])(162\.15[89]\.\d{1,3}\.\d{1,3})\b'
      is: external_ip

composite_rules:
  - id: cloudflare-104-16-23
    desc: Cloudflare proxy IP (104.16-23 range)
    crit: notable
    conf: 0.85
    any:
      - id: cloudflare-104-16-23-source-literal
      - id: cloudflare-104-16-23-text
  - id: cloudflare-172-64-71
    desc: Cloudflare proxy IP (172.64-71 range)
    crit: notable
    conf: 0.85
    any:
      - id: cloudflare-172-64-71-source-literal
      - id: cloudflare-172-64-71-text
  - id: cloudflare-173-245
    desc: Cloudflare proxy IP (173.245.48-63 range)
    crit: notable
    conf: 0.85
    any:
      - id: cloudflare-173-245-source-literal
      - id: cloudflare-173-245-text
  - id: cloudflare-162-158-159
    desc: Cloudflare proxy IP (162.158-159 range)
    crit: notable
    conf: 0.85
    any:
      - id: cloudflare-162-158-159-source-literal
      - id: cloudflare-162-158-159-text
  - id: cloudflare-fallback-pool
    desc: Hardcoded Cloudflare fallback IP pool
    crit: suspicious
    conf: 0.9
    for: [scripts, source]
    needs: 2
    any:
      - id: micro-behaviors/communications/ip/proxy::cloudflare-104-16-23-source-literal
      - id: micro-behaviors/communications/ip/proxy::cloudflare-104-16-23-text
      - id: micro-behaviors/communications/ip/proxy::cloudflare-162-158-159-source-literal
      - id: micro-behaviors/communications/ip/proxy::cloudflare-162-158-159-text
      - id: micro-behaviors/communications/ip/proxy::cloudflare-172-64-71-source-literal
      - id: micro-behaviors/communications/ip/proxy::cloudflare-172-64-71-text
      - id: micro-behaviors/communications/ip/proxy::cloudflare-173-245-source-literal
      - id: micro-behaviors/communications/ip/proxy::cloudflare-173-245-text
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::python-test-file
        - id: metadata/package/testing/presence/harness/
