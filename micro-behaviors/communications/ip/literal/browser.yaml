# External IPv4 literals in JavaScript / browser-extension code.
#
# A complete HTTP URL is a clear network-endpoint reference, but numeric
# endpoints are also used by legitimate self-hosted services and migration
# code. Keep the URL atomic notable and let objective composites add the
# execution, exfiltration, or C2 context needed to infer malicious intent.
# Public DNS resolvers are excluded explicitly because a `://`-anchored
# resolver IP passes the external-IP validator.
#
# The bare-literal rule reuses the canonical `external-ipv4-script` atom (rather
# than repeating its regex) and re-tiers it to suspicious for JavaScript; that
# atom's `unless: ip/literal/` lets this more-specific rule take over the finding.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1071.001
  mbc: C0002
  crit: suspicious
  conf: 0.85

traits:
  - id: javascript-external-ipv4-url
    desc: Hardcoded external IPv4 URL in JavaScript
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}'
      is: external_ip
    not:
      - regex: 'https?://(8\.8\.[84]\.[84]|1\.1\.1\.1|9\.9\.9\.9)'
      - regex: 'https?://(1\.0\.0\.1|149\.112|208\.67)'

composite_rules:
  - id: js-external-ipv4-literal
    desc: External IPv4 literal in extension JS
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: metadata/permission/runtime::is-extension
