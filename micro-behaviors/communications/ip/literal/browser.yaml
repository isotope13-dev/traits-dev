# External IPv4 literals in JavaScript / browser-extension code.
#
# Hardcoding a raw external IP (rather than a hostname) in extension or script
# code bypasses DNS, reputation feeds and sinkholes -- a C2/exfil smell -- so in
# the JS/CRX context a hardcoded external IP is treated as suspicious, whether it
# appears bare or inside a URL. Public DNS resolvers are excluded: bare ones are
# already dropped by the external_ip validator (all-single-digit octets read as
# version strings), and the URL rule below excludes them explicitly since a
# `://`-anchored resolver IP passes the validator.
#
# The bare-literal rule reuses the canonical `external-ipv4-script` atom (rather
# than repeating its regex) and re-tiers it to suspicious for JavaScript; that
# atom's `unless: ip/literal/` lets this more-specific rule take over the finding.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1071.001
  mbc: C0002
  crit: suspicious
  conf: 0.85

traits:
  - id: js-external-ipv4-url
    desc: URL to external IPv4 in extension JS
    conf: 0.9
    if:
      type: string_literal
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}'
      is: external_ip
    not:
      - regex: 'https?://(8\.8\.[84]\.[84]|1\.1\.1\.1|9\.9\.9\.9)'
      - regex: 'https?://(1\.0\.0\.1|149\.112|208\.67)'

composite_rules:
  - id: js-external-ipv4-literal
    desc: External IPv4 literal in extension JS
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: metadata/permission/runtime::is-extension
