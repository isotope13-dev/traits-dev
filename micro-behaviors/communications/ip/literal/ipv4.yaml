- id: repeated-private-192-http-url
  desc: Repeated private 192.168 HTTP URL
  crit: notable
  conf: 0.9
  any:
  - id: repeated-private-192-http-url-source-literal
  - id: repeated-private-192-http-url-text

- id: encoded-external-ipv4-benign-binary-context
  desc: Benign encoded IPv4 binary context
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
  - id: encoded-external-ipv4-dotnet-version-text
  - id: encoded-external-ipv4-x3dom-loader-text
  - id: encoded-external-ipv4-pe-version-5-4-248-7
  - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
