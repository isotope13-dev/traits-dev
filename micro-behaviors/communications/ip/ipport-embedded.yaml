# Hardcoded IPv4:port pairs in non-standard file types
# Intentionally has no defaults.for so it applies to all file types, including
# "unknown" (e.g., password-encrypted ZIPs where entries can't be parsed but
# IP:port pairs leak from unencrypted sections or header boundaries).
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [scripts, source, manifests, documents, media, data]

traits:
  - id: external-ipv4-port-any
    desc: Hardcoded external IPv4 with port
    crit: notable
    conf: 0.82
    size_min: 100
    size_max: 5000000
    count_min: 2
    if:
      type: string_value
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}$
      is: external_ip
