defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: private-address-property-check
    desc: Checks address against blocked networks
    crit: component
    conf: 0.92
    if:
      type: text
      substr: addr in net for net in _BLOCKED_NETWORKS

  - id: url-target-validator-function
    desc: Defines URL target validation function
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'def\s+validate_url_target\s*\('

  - id: url-address-resolution-pin
    desc: Resolves and pins URL target addresses
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'def\s+resolve_and_pin\s*\('

composite_rules:
  - id: ssrf-private-network-guard
    desc: Blocks private-network URL targets
    crit: notable
    conf: 0.96
    all:
      - id: private-address-property-check
      - id: url-target-validator-function
