defaults:
  platforms:
    - unix
    - windows
  for: [javascript]
traits:
  - id: private-ip-check-js
    desc: Checks for private IP address ranges (JS)
    crit: notable
    if:
      type: ast
      language: javascript
      query: "(\n  (call_expression\n    function: (member_expression\n      object: (identifier) @ip\n      property: (property_identifier) @starts\n    )\n    arguments: (arguments . (string (string_fragment) @range))\n  )\n  (#eq? @starts \"startsWith\")\n  (#not-match? @ip \"^console$\")\n  (#match? @range \"^(10\\\\.|172\\\\.|192\\\\.168|127\\\\.|fe80::)\")\n)\n"
    unless:
      - id: metadata/build/
      - id: metadata/package/testing/
      - id: metadata/library/
  - id: private-ip-parts-js
    desc: Checks IP parts for private ranges (JS)
    crit: notable
    count_min: 2
    if:
      type: ast
      language: javascript
      query: "(\n  (binary_expression\n    left: (subscript_expression\n      object: (identifier)\n      index: (number) @idx\n    )\n    operator: \"===\"\n    right: (string (string_fragment) @val)\n  )\n  (#match? @idx \"^[0-2]$\")\n  (#match? @val \"^(10|172|192|127)$\")\n)\n"
