# Network-device management port literals. Neutral: a bare ":8728" (the
# MikroTik RouterOS API port) appears in legitimate management clients, configs
# and documentation. Targeting intent comes from composites that pair it with
# vendor names or exploit behavior.
defaults:
  platforms: [unix, android, ios]
  for: [elf, macho]
  crit: component
traits:
  - id: mikrotik-api-port
    desc: MikroTik RouterOS API port :8728
    conf: 0.85
    if:
      type: text
      substr: :8728
      section: .text
