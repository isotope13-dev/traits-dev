# Hardcoded IPv4:port pairs embedded in PE binaries
# C2 endpoints, backdoor listeners, or hardcoded service addresses
#
# Requires networking API evidence to avoid false positives on binary
# constants that happen to match IP:port regex patterns (e.g., struct
# offsets, magic numbers, or assembly version-like values).
defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: external-ipv4-port-pe
    desc: Hardcoded external IPv4 port in PE binary
    crit: component
    conf: 0.88
    size_min: 10000
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}$
      is: external_ip
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker
  - id: external-ipv4-port-rsrc-pair
    desc: Multiple external IPv4 endpoints in PE resources
    crit: suspicious
    conf: 0.95
    size_max: 524288
    count_min: 2
    if:
      type: text
      section: .rsrc
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}$
      is: external_ip
    unless:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/resource::resource-only-dll
      - id: well-known/lib/wine::wine-runtime-component
  - id: external-ipv4-port-rdata-pair
    desc: Multiple external IPv4 endpoints in rdata
    crit: notable
    conf: 0.94
    size_max: 2097152
    count_min: 2
    if:
      type: text
      section: .rdata
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}$
      is: external_ip
    unless:
      - type: raw
        regex: '\b127\.\d{1,3}\.\d{1,3}\.\d{1,3}:[1-9][0-9]{1,4}\b'
      - type: raw
        regex: '\b10\.\d{1,3}\.\d{1,3}\.\d{1,3}:[1-9][0-9]{1,4}\b'
      - type: raw
        regex: '\b192\.168\.\d{1,3}\.\d{1,3}:[1-9][0-9]{1,4}\b'
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/section/metrics::fptable-rdata-loader-layout

composite_rules:
  - id: external-ipv4-port-pe-with-networking
    desc: Hardcoded external IPv4 port with networking evidence
    crit: notable
    conf: 0.88
    size_min: 10000
    all:
      - id: external-ipv4-port-pe
    any:
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/communications/socket/connect/
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/get/
      - id: micro-behaviors/communications/http/post/
      - id: micro-behaviors/communications/ipc/
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker
