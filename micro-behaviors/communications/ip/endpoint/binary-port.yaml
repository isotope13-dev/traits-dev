defaults:
  platforms:
    - unix
    - windows

traits:
  - id: external-ipv4-port-binary-literal
    desc: External IPv4 address with port literal
    crit: component
    conf: 0.92
    for:
      - pe
    size_max: 2000000
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{1,5}$
      is: external_ip
      section: .rdata
    unless:
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - type: section
        exact: '.rdata'
        length_min: 500000

  - id: external-ipv4-port-data-literal
    desc: External IPv4 endpoint in data section
    crit: component
    conf: 0.92
    for:
      - pe
    size_max: 2000000
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{1,5}$
      is: external_ip
      section: .data
    unless:
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - type: section
        exact: '.data'
        length_min: 500000

  - id: external-ipv4-port-elf-static
    desc: External IPv4 endpoint in static ELF
    crit: notable
    conf: 0.95
    for:
      - elf
    size_max: 262144
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{1,5}$
      is: external_ip
      section: .rodata
    unless:
      - id: metadata/binary/linking/static::elf-interpreter-section-name
      - id: metadata/binary/linking/static::elf-dynamic-section-name
      - id: metadata/binary/linking/static::elf-dynsym-section-name
      - id: metadata/binary/linking/static::elf-dynstr-section-name
composite_rules:
  - id: external-ipv4-port-pe-literal
    desc: External IPv4 endpoint in PE data
    crit: component
    conf: 0.92
    for:
      - pe
    any:
      - id: external-ipv4-port-binary-literal
      - id: external-ipv4-port-data-literal
  - id: external-ipv4-port-binary
    desc: Hardcoded external IPv4 address with port
    crit: notable
    conf: 0.92
    for:
      - pe
    size_max: 2000000
    all:
      - id: external-ipv4-port-pe-literal
    any:
      - id: micro-behaviors/communications/socket/init/
      - id: micro-behaviors/communications/socket/connect/
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/get/
      - id: micro-behaviors/communications/http/post/
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
