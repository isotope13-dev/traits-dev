# Hardcoded IPv4:port pairs in non-standard file types
# Intentionally has no defaults.for so it applies to all file types, including
# "unknown" (e.g., password-encrypted ZIPs where entries can't be parsed but
# IP:port pairs leak from unencrypted sections or header boundaries).
defaults:
  platforms: [windows, unix]
  for: [scripts, source, manifests, data]

traits:
  - id: js-port-field
    desc: JavaScript port object field
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bport\s*:\s*[1-9][0-9]{1,4}'
  - id: js-hostname-field
    desc: JavaScript hostname object field
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bhostname\s*:'
  - id: external-ipv4-port-media
    desc: External IPv4 endpoint in media
    crit: notable
    conf: 0.9
    platforms: [windows, unix, android]
    for: [media]
    size_min: 100
    size_max: 5000000
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}$
      is: external_ip
    unless:
      - type: basename
        regex: '\.(png|jpe?g)$'
  - id: external-ipv4-port-source-literal
    desc: Hardcoded external IPv4 with port
    crit: notable
    conf: 0.82
    for: [scripts, source]
    size_min: 100
    size_max: 5000000
    count_min: 2
    if:
      type: literal
      kind: string
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}$
      is: external_ip
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/file/magic/identity::kdt1-geospatial-tree
  - id: external-ipv4-port-text
    desc: Hardcoded external IPv4 with port
    crit: notable
    conf: 0.82
    for: [manifests, data]
    size_min: 100
    size_max: 5000000
    count_min: 2
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}$
      is: external_ip
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/file/magic/identity::kdt1-geospatial-tree
  - id: private-ipv4-port-172-source-literal
    desc: Hardcoded 172 private IPv4 port
    crit: notable
    conf: 0.84
    for: [scripts, source]
    size_min: 100
    size_max: 5000000
    if:
      type: literal
      kind: string
      regex: ^172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}:[1-9]\d{1,4}$
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: private-ipv4-port-172-text
    desc: Hardcoded 172 private IPv4 port
    crit: notable
    conf: 0.84
    for: [manifests, data]
    size_min: 100
    size_max: 5000000
    if:
      type: text
      regex: ^172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}:[1-9]\d{1,4}$
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: private-ipv4-port-192-source-literal
    desc: Hardcoded 192.168 IPv4 with port
    crit: notable
    conf: 0.84
    for: [scripts, source]
    size_min: 100
    size_max: 5000000
    if:
      type: literal
      kind: string
      regex: ^192\.168\.\d{1,3}\.\d{1,3}:[1-9]\d{1,4}$
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: private-ipv4-port-192-text
    desc: Hardcoded 192.168 IPv4 with port
    crit: notable
    conf: 0.84
    for: [manifests, data]
    size_min: 100
    size_max: 5000000
    if:
      type: text
      regex: ^192\.168\.\d{1,3}\.\d{1,3}:[1-9]\d{1,4}$
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: private-ipv4-port-binary-text
    desc: Private IPv4 endpoint in binary text
    crit: notable
    conf: 0.88
    for: [elf, pe, macho]
    size_min: 100
    size_max: 100000000
    if:
      type: text
      regex: '\b(10\.(\d{1,3}\.){2}|192\.168\.\d{1,3}\.)\d{1,3}:[1-9]\d{1,4}\b'
      is: valid_ip
    unless:
      - id: well-known/app/terraform::terraform-core-binary
      - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubectl-binary-build-marker
composite_rules:
  - id: external-ipv4-port-any
    desc: Hardcoded external IPv4 with port
    crit: notable
    conf: 0.82
    any:
      - id: external-ipv4-port-source-literal
      - id: external-ipv4-port-text
  - id: private-ipv4-port-any
    desc: Hardcoded RFC1918 IPv4 with port
    crit: notable
    conf: 0.84
    any:
      - id: private-ipv4-port-172-source-literal
      - id: private-ipv4-port-172-text
      - id: private-ipv4-port-192-source-literal
      - id: private-ipv4-port-192-text
