# Generic high-numbered service/port references. Neutral on their own: these
# port numbers appear in countless legitimate services and configs. Mining and
# C2 composites combine them with pool/wallet flags or known infrastructure.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: baseline
  size_min: 512
  size_max: 500000000
traits:
  - id: ftp-port-21
    desc: FTP service port number
    crit: component
    conf: 0.6
    unless:
      - id: metadata/file/catalog/identity/
    if:
      type: text
      regex: (?i)(ftp|port|connect).{0,20}[:\s]21\b
  - id: ssh-port-22
    desc: SSH service port number
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)ssh.{0,20}[:\\s]22\b
  - id: http-port-80
    desc: HTTP service port number
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness/
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: text
      regex: (?i)\b(http|port|web|connect)\b.{0,20}[:\s]80\b
    not:
      - substr: port of 80
      - substr: WebProxy(
      - substr: webproxy(
      - substr: '? 443 : 80'
      - regex: (?i)https?://[A-Za-z0-9._%-]+(:[^/\s@]+)?(:80\b|/.*:80\b)
  - id: https-port-443-protocol
    desc: HTTPS service port number
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness/
      - id: metadata/file/catalog/identity/
    if:
      type: text
      regex: (?i)\b(https|port|ssl)\b.{0,20}[:\s]443\b
    not:
      - substr: '? 443 : 80'
      - substr: port = this.ssl ? 443
      - substr: https://example.com:443
  - id: https-port-443-transport
    desc: TLS service port number
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)\b(tls|connect)\b.{0,20}[:\s]443\b
    not:
      - substr: '? 443 : 80'
  - id: port-3333
    desc: Port 3333 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*3333\b
      section: .text
  - id: port-8080
    desc: Port 8080 reference
    conf: 0.5
    if:
      type: text
      regex: :\d*8080\b
      section: .text
  - id: port-14444
    desc: Port 14444 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*14444\b
      section: .text
  - id: port-5555
    desc: Port 5555 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*5555\b
      section: .text
  - id: port-7777
    desc: Port 7777 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*7777\b
      section: .text
  - id: port-45700
    desc: Port 45700 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*45700\b
      section: .text
composite_rules:
  - id: https-port-443
    desc: HTTPS service port number
    crit: component
    conf: 0.6
    any:
      - id: https-port-443-protocol
      - id: https-port-443-transport
  - id: common-service-port
    desc: Common service port number
    crit: notable
    conf: 0.6
    any:
      - id: ftp-port-21
      - id: ssh-port-22
      - id: http-port-80
      - id: https-port-443
  - id: common-high-port-any
    desc: Reference to a common high-numbered service port
    crit: baseline
    conf: 0.6
    any:
      - id: port-3333
      - id: port-8080
      - id: port-14444
      - id: port-5555
      - id: port-7777
      - id: port-45700
