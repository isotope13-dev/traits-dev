# Generic high-numbered service/port references. Neutral on their own: these
# port numbers appear in countless legitimate services and configs. Mining and
# C2 composites combine them with pool/wallet flags or known infrastructure.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: baseline
  size_min: 512
  size_max: 500000000
traits:
  - id: port-3333
    desc: Port 3333 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*3333\b
      section: .text
  - id: port-8080
    desc: Port 8080 reference
    conf: 0.5
    if:
      type: text
      regex: :\d*8080\b
      section: .text
  - id: port-14444
    desc: Port 14444 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*14444\b
      section: .text
  - id: port-5555
    desc: Port 5555 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*5555\b
      section: .text
  - id: port-7777
    desc: Port 7777 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*7777\b
      section: .text
  - id: port-45700
    desc: Port 45700 reference
    conf: 0.6
    if:
      type: text
      regex: :\d*45700\b
      section: .text
composite_rules:
  - id: common-high-port-any
    desc: Reference to a common high-numbered service port
    crit: baseline
    conf: 0.6
    any:
      - id: port-3333
      - id: port-8080
      - id: port-14444
      - id: port-5555
      - id: port-7777
      - id: port-45700
