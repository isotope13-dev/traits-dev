# External IP reconnaissance endpoints
# Detects common services used to discover the victim's public IP
# ATT&CK: T1016 (System Network Configuration Discovery)
defaults:
  platforms: [unix, windows]
  for: [scripts, source, binaries]
  crit: notable
  conf: 0.85
  mbc: "C0002"
  attack: "T1016"
traits:
  - id: ifconfig-me
    desc: ifconfig.me external IP lookup
    crit: notable
    conf: 0.9
    if:
      type: text
      word: ifconfig.me
  - id: icanhazip-com
    desc: icanhazip.com external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: icanhazip.com
  - id: ident-me
    desc: ident.me external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: ident.me
  - id: myexternalip-com
    desc: myexternalip.com external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: myexternalip.com
  - id: bot-whatismyipaddress-com
    desc: bot.whatismyipaddress.com external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: bot.whatismyipaddress.com
  - id: ifconfig-co
    desc: ifconfig.co external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: ifconfig.co
