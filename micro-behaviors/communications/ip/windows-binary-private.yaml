defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
traits:
  - id: private-ipv4-port-10-binary-literal
    desc: 10/8 IPv4 with port literal
    crit: component
    conf: 0.86
    if:
      type: text
      regex: ^10\.\d{1,3}\.\d{1,3}\.\d{1,3}:[1-9]\d{1,4}$
      section: .rdata
composite_rules:
  - id: private-ipv4-port-10-binary
    desc: Hardcoded 10/8 IPv4 with port
    crit: notable
    conf: 0.86
    all:
      - id: private-ipv4-port-10-binary-literal
    any:
      - id: micro-behaviors/communications/socket/connect/
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/get/
      - id: micro-behaviors/communications/http/post/
