defaults:
  platforms: [windows, unix]
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: external-ipv4-binary
    desc: Hardcoded external IPv4 address
    crit: notable
    conf: 0.85
    for:
      - binaries
    size_max: 2000000
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    not:
      - exact: 6.11.6.0
      - regex: ^4\.1\.[0-9]\.0$
      - regex: ^8\.8\.[84]\.[84]$
      - exact: 1.1.1.1
      - exact: 9.9.9.9
      - regex: ^208\.67\.22[20]\.22[20]$
      - exact: 123.123.123.123
      - exact: 44.44.45.5
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - id: metadata/binary/symbols::no-import-metadata
      - id: metadata/binary/symbols::no-section-metadata
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource-external-ip
  - id: external-ipv4-script
    desc: Hardcoded external IPv4 address
    crit: notable
    conf: 0.85
    for:
      - scripts
      - source
    size_max: 200000
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    not:
      - regex: ^8\.8\.[84]\.[84]$
      - exact: 1.1.1.1
      - exact: 9.9.9.9
      - regex: ^208\.67\.22[20]\.22[20]$
      - exact: 123.123.123.123
    unless:
      - type: text
        regex: pytest|def test_|def test[A-Z]|unittest\.TestCase
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/harness::is-test
  - id: loopback-ipv4-source
    desc: Hardcoded loopback IPv4 address
    crit: notable
    conf: 0.8
    for:
      - source
      - scripts
    size_max: 200000
    if:
      type: text
      regex: '"127\.0\.0\.1"|127\.0\.0\.1'
    not:
      - regex: (^test|[-_]test)\.(js|ts)$
      - regex: (_spec|_test)\.rb$
      - substr: originatorAddress
      - substr: targetAddress
      - substr: "host: '127.0.0.1'"
      - substr: "host = '127.0.0.1'"
      - substr: "bindParts.unshift('127.0.0.1')"
      - regex: (this\.host|targetAddress):? =? '127\.0\.0\.1'
    unless:
      - type: text
        regex: pytest|def test_
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/rust::rust-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/harness::is-test
  - id: localhost-source
    desc: Hardcoded localhost network host
    crit: baseline
    conf: 0.75
    for:
      - source
      - scripts
    size_max: 200000
    if:
      type: text
      word: localhost
  - id: encoded-external-ipv4-winmd-basename
    desc: WinMD filename context
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: '(?i)\.winmd$'
  - id: encoded-external-ipv4-dotnet-version-text
    desc: Dotnet version text context
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(\.dll\.compressed)?\|4\.1\.[0-9]\.0\|System\.[A-Za-z.]+, Version='
  - id: encoded-external-ipv4-x3dom-loader-text
    desc: X3DOM loader text context
    crit: component
    conf: 0.9
    if:
      type: text
      substr: x3dom.loadJS=function(
  - id: encoded-external-ipv4-port-binary
    desc: Encoded external IPv4 with TCP port
    crit: suspicious
    conf: 0.92
    size_max: 2000000
    if:
      type: encoded
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{2,5}$
      is: external_ip
  - id: encoded-external-ipv4-binary
    desc: Encoded external IPv4 address
    crit: notable
    conf: 0.9
    for:
      - binaries
    size_max: 2000000
    if:
      type: encoded
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    not:
      - exact: "6.11.6.0"
      - exact: "32.32.32.3"
      - regex: ^4\.1\.[0-9]\.0$
      - exact: "44.44.45.5"
    unless:
      - id: encoded-external-ipv4-benign-binary-context
    downgrade:
      any:
        - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
  - id: http-ip-url
    desc: HTTP URL with IP address
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
    if:
      type: raw
      regex: https?://[0-9]{1,3}(\.[0-9]{1,3}){3}(:[0-9]{1,5})?(/[^\s'"<>{}]{0,120})?
      is: external_ip
    not:
      - regex: /thumb\b
      - substr: "http://216.247.220.192"
      - substr: "http://192.99.219.222"
      - substr: "http://192.216.185.10"
      - substr: "http://64.29.18.111"
      - substr: "http://100.100.100.200"
      - substr: "http://100.100.100.200/latest/"
      - substr: "8.8.8.8"
      - substr: "8.8.4.4"
      - substr: "1.1.1.1"
      - substr: "1.0.0.1"
      - substr: "223.5.5.5"
      - substr: "223.6.6.6"
    unless:
      - type: text
        substr: "music.126.net"
      - type: raw
        regex: pytest|def test_|def test[A-Z]|unittest\.TestCase
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/harness::github-issues-api-fixture
      - type: basename
        exact: api-test.js
  - id: repeated-private-192-http-url
    desc: Repeated private 192.168 HTTP URL
    crit: notable
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
    count_min: 2
    if:
      type: text
      regex: https?://192\.168\.\d{1,3}\.\d{1,3}
    unless:
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/harness::is-test
composite_rules:
  - id: encoded-external-ipv4-benign-binary-context
    desc: Benign encoded IPv4 binary context
    crit: component
    conf: 0.95
    any:
      - id: encoded-external-ipv4-winmd-basename
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - id: encoded-external-ipv4-dotnet-version-text
      - id: encoded-external-ipv4-x3dom-loader-text
