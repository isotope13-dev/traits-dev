defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: external-ipv4-binary
    desc: Hardcoded external IPv4 address
    crit: notable
    conf: 0.85
    for:
      - binaries
    size_max: 2000000
    if:
      type: string_value
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    not:
      - regex: ^8\.8\.[84]\.[84]$
      - exact: 1.1.1.1
      - exact: 9.9.9.9
      - regex: ^208\.67\.22[20]\.22[20]$
      - exact: 123.123.123.123
    unless:
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - type: raw
        substr: x3dom.loadJS=function(
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource-external-ip
  - id: external-ipv4-script
    desc: Hardcoded external IPv4 address
    crit: notable
    conf: 0.85
    for:
      - scripts
      - source
    size_max: 200000
    if:
      type: string_value
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    not:
      - regex: ^8\.8\.[84]\.[84]$
      - exact: 1.1.1.1
      - exact: 9.9.9.9
      - regex: ^208\.67\.22[20]\.22[20]$
      - exact: 123.123.123.123
    unless:
      - type: raw
        regex: pytest|def test_|def test[A-Z]|unittest\.TestCase
      - id: metadata/package/testing/presence::test-directory
  - id: loopback-ipv4-source
    desc: Hardcoded loopback IPv4 address
    crit: notable
    conf: 0.8
    for:
      - source
      - scripts
    size_max: 200000
    if:
      type: raw
      regex: '"127\.0\.0\.1"|127\.0\.0\.1'
    unless:
      - type: raw
        regex: pytest|def test_
      - type: basename
        regex: (_spec|_test)\.rb$
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/rust::rust-test
  - id: localhost-source
    desc: Hardcoded localhost network host
    crit: baseline
    conf: 0.75
    for:
      - source
      - scripts
    size_max: 200000
    if:
      type: raw
      word: localhost
  - id: encoded-external-ipv4-port-binary
    desc: Encoded external IPv4 with TCP port
    crit: suspicious
    conf: 0.92
    size_max: 2000000
    if:
      type: encoded
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{2,5}$
      is: external_ip
  - id: encoded-external-ipv4-binary
    desc: Encoded external IPv4 address
    crit: notable
    conf: 0.9
    size_max: 2000000
    if:
      type: encoded
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    unless:
      - type: raw
        substr: x3dom.loadJS=function(
  - id: http-ip-url
    desc: HTTP URL with IP address
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
    if:
      type: raw
      regex: https?://[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}
      is: external_ip
    not:
      - substr: "http://216.247.220.192"
      - substr: "http://192.99.219.222"
      - substr: "http://100.100.100.200"
      - substr: "http://100.100.100.200/latest/"
      - substr: "8.8.8.8"
      - substr: "8.8.4.4"
      - substr: "1.1.1.1"
      - substr: "1.0.0.1"
      - substr: "223.5.5.5"
      - substr: "223.6.6.6"
    unless:
      - type: raw
        substr: "music.126.net"
      - type: raw
        regex: pytest|def test_|def test[A-Z]|unittest\.TestCase
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/harness::github-issues-api-fixture
