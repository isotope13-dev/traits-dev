defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: external-ipv4-binary
    desc: Hardcoded external IPv4 address
    crit: notable
    conf: 0.85
    for:
      - binaries
    size_max: 2000000
    if:
      type: string_value
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    unless:
      - id: metadata/lang/compiler::dotnet-ipv4-like-version
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource-external-ip
  - id: external-ipv4-script
    desc: Hardcoded external IPv4 address
    crit: notable
    conf: 0.85
    for:
      - scripts
      - source
    size_max: 200000
    if:
      type: string_value
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
      is: external_ip
    not:
      - regex: ^8\.8\.[84]\.[84]$
      - exact: 1.1.1.1
      - exact: 9.9.9.9
      - regex: ^208\.67\.22[20]\.22[20]$
      - exact: 123.123.123.123
    unless:
      - type: raw
        regex: pytest|def test_
  - id: loopback-ipv4-source
    desc: Hardcoded loopback IPv4 address
    crit: notable
    conf: 0.8
    for:
      - source
      - scripts
    size_max: 200000
    if:
      type: raw
      regex: '"127\.0\.0\.1"|127\.0\.0\.1'
    unless:
      - type: raw
        regex: pytest|def test_
      - id: metadata/quality/testing::test-directory
      - id: metadata/dev/testing/rust::rust-test
  - id: localhost-source
    desc: Hardcoded localhost network host
    crit: baseline
    conf: 0.75
    for:
      - source
      - scripts
    size_max: 200000
    if:
      type: raw
      word: localhost
  - id: encoded-external-ipv4-port-binary
    desc: Encoded external IPv4 with TCP port
    crit: suspicious
    conf: 0.92
    size_max: 2000000
    if:
      type: encoded
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{2,5}$
      is: external_ip
  - id: http-ip-url
    desc: HTTP URL with IP address
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: https?://[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}
      is: external_ip
    unless:
      - type: raw
        regex: pytest|def test_
