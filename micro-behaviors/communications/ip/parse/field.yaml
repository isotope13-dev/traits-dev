# Neutral references to an IP-address data field (a JSON/object key carrying an
# IP). Ubiquitous in any code that handles IP addresses — DB drivers, HTTP
# clients, loggers. Relocated from objectives/discovery/host/geo: a bare
# `ipAddress` / `"ip":` field is not geolocation profiling. The geo-profiling
# composites reference these cross-directory and add the geo-specific context
# (city/region/country fields, IP-geolocation API endpoints).
defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, pe, elf, rust]
traits:
  - id: ip-address-camel
    desc: ipAddress field (camelCase)
    crit: baseline
    conf: 0.4
    unless:
      - id: well-known/lib/sentry-js/
    if:
      type: text
      word: ipAddress
  - id: ip-json-field
    desc: '"ip" JSON field'
    crit: baseline
    conf: 0.4
    if:
      type: text
      exact: '"ip":'
