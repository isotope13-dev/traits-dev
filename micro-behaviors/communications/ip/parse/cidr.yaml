defaults:
  platforms: [unix, windows]
  for: [php, scripts, c, cpp, go]
  crit: notable
  conf: 0.9
traits:
- id: ip-bitwise-cidr-check
  desc: Bitwise IP range verification logic
  crit: baseline
  if:
    type: text
    substr: (?i)\(?.{0,20}\$[a-z0-9_]{1,20}\s*&\s*\$[a-z0-9_]{1,20}.{0,20}\)
    case_insensitive: true
  conf: 1.0
- id: ip-to-long-conversion--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)\b(IPToLong|ip[-_]?to[-_]?(int|long|number))\b
  count_max: 1016076
- id: ip-to-long-conversion--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)\b(ip2long|inet[-_]?aton)\b
  count_max: 1016077
composite_rules:
- id: ip-to-long-conversion
  desc: Converts IP to long/decimal format
  crit: baseline
  conf: 1.0
  any:
  - id: ip-to-long-conversion--rx-2
  - id: ip-to-long-conversion--rx-3
  unless:
  - id: metadata/file/text::vscode-php-global-functions-catalog
