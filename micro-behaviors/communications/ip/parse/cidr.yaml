defaults:
  platforms: [unix, windows]
  for: [php, scripts, c, cpp, go]
  crit: notable
  conf: 0.9
traits:
  - id: ip-bitwise-cidr-check
    desc: Bitwise IP range verification logic
    if:
      type: text
      regex: '(?i)\(?.{0,20}\$[a-z0-9_]{1,20}\s*&\s*\$[a-z0-9_]{1,20}.{0,20}\)?\s*==\s*\(?.{0,20}\$[a-z0-9_]{1,20}\s*&\s*\$[a-z0-9_]{1,20}.{0,20}\)?'
  - id: ip-to-long-conversion
    desc: Converts IP to long/decimal format
    if:
      type: text
      regex: (?i)\b(IPToLong|ip[-_]?to[-_]?(int|long|number)|ip2long|inet[-_]?aton)\b
    unless:
      - id: metadata/file/text::vscode-php-global-functions-catalog
