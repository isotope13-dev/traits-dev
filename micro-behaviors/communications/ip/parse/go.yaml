# Go IP Parsing
# Neutral Go net package IP operations
defaults:
  platforms: [windows, unix]
  for: [go]
  crit: baseline
traits:
  - id: net-parseip
    desc: net.ParseIP() call
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: "net.ParseIP"
  - id: net-parsecidr
    desc: net.ParseCIDR() call
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: "net.ParseCIDR"
