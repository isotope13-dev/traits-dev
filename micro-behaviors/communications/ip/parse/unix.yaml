# IP Address Parsing
# MBC: C0001 (Socket Communication)
# ATT&CK: T1071
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [binaries, c]
traits:
  - id: inet-pton-symbol
    desc: Parse IP with inet_pton
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: inet_pton
  - id: inet-ntop-symbol
    desc: Parse IP with inet_ntop
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: inet_ntop
  - id: inet-addr-symbol
    desc: Parse IP with inet_addr
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: inet_addr
  - id: inet-aton-symbol
    desc: Parse IP with inet_aton
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: inet_aton
  - id: htons-symbol
    desc: Converts host to network short
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: htons
  - id: htonl-symbol
    desc: Converts host to network long
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: htonl
  - id: ntohs-symbol
    desc: Converts network to host short
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: ntohs
  - id: ntohl-symbol
    desc: Converts network to host long
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: ntohl
composite_rules:
  - id: parse
    desc: Parse IP addresses
    crit: baseline
    conf: 0.66
    any:
      - id: inet-pton-symbol
      - id: inet-ntop-symbol
      - id: inet-addr-symbol
      - id: inet-aton-symbol
  - id: byte-order
    desc: Network byte order conversion
    crit: baseline
    conf: 0.66
    any:
      - id: htons-symbol
      - id: htonl-symbol
      - id: ntohs-symbol
      - id: ntohl-symbol
