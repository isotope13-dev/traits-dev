# Apache HTTPD module API usage in C source
# Detects use of Apache's module API for building loadable modules (DSOs)
defaults:
  for: [c, cpp]
  platforms: [linux, unix]
traits:
  - id: apache-httpd-include
    desc: Apache httpd.h header include
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: "httpd.h"
  - id: apache-http-config-include
    desc: Apache http_config.h header include
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: "http_config.h"
  - id: apache-module-declaration
    desc: Apache module declaration macro
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: "AP_MODULE_DECLARE_DATA"
  - id: apache-hook-handler
    desc: Apache request handler hook registration
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: "ap_hook_handler"
  - id: apache-request-param
    desc: Apache request parameter extraction
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: "apr_table_get"
  - id: apache-hook-log-transaction
    desc: Apache log transaction hook
    crit: notable
    conf: 0.90
    if:
      type: symbol
      exact: "ap_hook_log_transaction"
composite_rules:
  - id: apache-module
    desc: Apache HTTPD loadable module
    crit: notable
    conf: 0.95
    all:
      - id: apache-httpd-include
      - id: apache-hook-handler
    any:
      - id: apache-http-config-include
      - id: apache-module-declaration
