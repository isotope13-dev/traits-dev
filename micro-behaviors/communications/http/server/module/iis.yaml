# IIS / ISAPI extension entry-point symbols. Legitimate IIS extension DLLs
# export these; hostility comes from packing them inside MSI droppers.
defaults:
  platforms: [windows]
  for: [pe, dll, oledoc, ole]
  crit: notable
  conf: 0.92

traits:
  - id: http-extension-proc-export
    desc: IIS ISAPI HttpExtensionProc export
    attack: T1505.004
    if:
      type: text
      substr: HttpExtensionProc

  - id: get-extension-version-export
    desc: IIS ISAPI GetExtensionVersion export
    attack: T1505.004
    if:
      type: text
      substr: GetExtensionVersion

  - id: http-filter-proc-export
    desc: IIS ISAPI HttpFilterProc export
    attack: T1505.004
    if:
      type: text
      substr: HttpFilterProc

composite_rules:
  - id: iis-isapi-extension-exports
    desc: IIS ISAPI extension export set
    conf: 0.94
    all:
      - id: http-extension-proc-export
    any:
      - id: get-extension-version-export
      - id: http-filter-proc-export
