defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.88
  mbc: C0002
  attack: T1071.001

traits:
- id: push-web-middleware-group
  desc: Laravel web middleware group registration
  if:
    type: text
    regex: "pushMiddlewareToGroup\\s*\\(\\s*['\"]web['\"]"

- id: traffic-logger-class
  desc: Laravel traffic logger class
  conf: 0.84
  if:
    type: text
    regex: 'class\s+TrafficLogger\b'
- id: laravel-handle-method
  desc: Laravel middleware handle method
  conf: 0.84
  if:
    type: text
    regex: 'function\s+handle\s*\('

composite_rules:
- id: traffic-logger-middleware-class
  desc: Laravel traffic logger middleware
  crit: notable
  conf: 0.84
  all:
  - id: traffic-logger-class
  - id: laravel-handle-method
  near_bytes: 1200
