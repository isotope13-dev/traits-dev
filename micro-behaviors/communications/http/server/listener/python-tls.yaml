defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1071.001
  mbc: C0002
  conf: 0.9

traits:
  - id: python-tls-server-context
    desc: Python TLS server context
    crit: notable
    ref: sha256:85b3ca874237ae61400c4fd379f7c6717529c1ca737b2377c678ecda532998c8
    if:
      type: text
      substr: ssl.PROTOCOL_TLS_SERVER

  - id: python-wraps-listener-socket
    desc: Python wraps listener socket
    crit: notable
    ref: sha256:85b3ca874237ae61400c4fd379f7c6717529c1ca737b2377c678ecda532998c8
    if:
      type: symbol
      kind: call
      exact: ctx.wrap_socket

composite_rules:
  - id: python-https-listener
    desc: Python HTTPS listener setup
    crit: notable
    conf: 0.94
    ref: sha256:85b3ca874237ae61400c4fd379f7c6717529c1ca737b2377c678ecda532998c8
    all:
      - id: python-tls-server-context
      - id: python-wraps-listener-socket
