defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1071.001
  mbc: C0002
traits:
  - id: httpd-keyword
    desc: httpd web server
    crit: baseline
    conf: 0.6
    if:
      id: micro-behaviors/os/service/daemon::httpd
  - id: apache2-keyword
    desc: apache2 web server
    crit: baseline
    conf: 0.6
    if:
      id: micro-behaviors/os/service/daemon::apache2
  - id: apache-setup-listeners-export
    desc: Apache setup listener export
    crit: component
    conf: 0.9
    platforms: [linux, macos]
    for: [elf, macho, so, dylib]
    if:
      type: symbol
      exact: ap_setup_listeners
  - id: apache-process-http-connection-string
    desc: Apache HTTP connection string
    crit: component
    conf: 0.88
    platforms: [linux, macos]
    for: [elf, macho, so, dylib]
    if:
      type: text
      exact: ap_process_http_connection
  - id: apache-open-htaccess-export
    desc: Apache htaccess export
    crit: component
    conf: 0.88
    platforms: [linux, macos]
    for: [elf, macho, so, dylib]
    if:
      type: symbol
      exact: ap_open_htaccess
  - id: apache-read-request-export
    desc: Apache request parser export
    crit: component
    conf: 0.88
    platforms: [linux, macos]
    for: [elf, macho, so, dylib]
    if:
      type: symbol
      exact: ap_read_request
  - id: libmicrohttpd-start-daemon
    desc: Starts libmicrohttpd HTTP daemon
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [elf, so]
    if:
      type: symbol
      exact: MHD_start_daemon
  - id: apache-signal-server-export
    desc: Apache server control export
    crit: component
    conf: 0.88
    platforms: [linux, macos]
    for: [elf, macho, so, dylib]
    if:
      type: symbol
      exact: ap_signal_server
  # Matching the compound token rather than the bare word lets `not:` see the
  # qualifier: "emby-nginx" / "plex-strm-nginx" are third-party application
  # names that happen to end in the server's name, not a reference to nginx
  # itself. A bare "nginx" token (service name, package, binary path) still hits.
  - id: nginx-keyword
    desc: References the nginx web server
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: '(?i)[a-z0-9-]*\bnginx\b'
    not:
      - regex: '(?i)[a-z0-9]-nginx'
    unless:
      - id: well-known/lib/mime-db::javascript-mime-extension-map
  - id: lighttpd-keyword
    desc: lighttpd web server
    crit: notable
    conf: 0.6
    if:
      type: text
      word: lighttpd
  - id: caddy-keyword
    desc: Caddy web server
    crit: notable
    conf: 0.6
    if:
      type: text
      word: caddy
  - id: tomcat-keyword
    desc: References the Apache Tomcat web server
    crit: notable
    conf: 0.6
    if:
      type: text
      word: tomcat
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
  - id: httpd-conf-path
    desc: httpd.conf configuration file
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: httpd.conf
  - id: apache2-conf-path
    desc: apache2.conf configuration file
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: apache2.conf
  - id: nginx-conf-path
    desc: nginx.conf configuration file
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: nginx.conf
  - id: sites-available-path
    desc: sites-available configuration directory
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: sites-available
  - id: sites-enabled-path
    desc: sites-enabled configuration directory
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: sites-enabled
  - id: bind-port-80
    desc: bind to HTTP port 80
    crit: notable
    conf: 0.65
    unless:
      - id: metadata/library/runtime/
    if:
      type: text
      regex: \b(bind|listen)\b.{0,80}(:80\b|port.{0,20}\b80\b)
  - id: bind-port-443
    desc: bind to HTTPS port 443
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: \b(bind|listen)\b.{0,80}(:443\b|port.{0,20}\b443\b)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: bind-port-8080
    desc: bind to port 8080
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: \b(bind|listen)\b.{0,80}(:8080\b|port.{0,20}\b8080\b)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: bind-port-8000
    desc: bind to port 8000
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: \b(bind|listen)\b.{0,80}(:8000\b|port.{0,20}\b8000\b)
  - id: bind-port-3000
    desc: bind to port 3000
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: \b(bind|listen)\b.{0,80}(:3000\b|port.{0,20}\b3000\b)
  - id: listen-keyword
    desc: .listen() method call (server-style)
    crit: baseline
    conf: 0.5
    for: [scripts]
    # Restrict to method-call form (`x.listen(`) — the bare word "listen"
    # matches addEventListener etc. in any UI/event-driven code.
    if:
      type: text
      regex: '\.listen\s*\('
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: servemux-pattern
    desc: Go HTTP ServeMux
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: ServeMux).ServeHTTP
  - id: http-server-type
    desc: References Go's http.Server type
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: text
      substr: http.Server
  - id: listenandserve-call
    desc: Go ListenAndServe call
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: ListenAndServe
    unless:
      - type: text
        substr: ListenAndServeTLS
  - id: listenandservetls-call
    desc: Go ListenAndServeTLS call
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: ListenAndServeTLS
  - id: web-server-listening-banner
    desc: Web server listening banner
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)web server listening on https?://'
  - id: http-createserver-call
    desc: Node.js http.createServer()
    crit: notable
    conf: 0.75
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: text
        substr: 127.0.0.1
      - type: text
        substr: localhost
    if:
      type: text
      substr: http.createServer
  - id: node-http-create-server-import
    desc: Imports Node.js http.createServer
    crit: component
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bimport\s+\{.{0,80}\bcreateServer\b.{0,80}\}\s+from\s+["''](node:)?http["'']'
  - id: node-http-create-server-imported-call
    desc: Calls createServer imported from Node.js http
    crit: notable
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      exact: createServer
  - id: https-createserver-call
    desc: Node.js https.createServer()
    crit: notable
    conf: 0.75
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: text
        substr: 127.0.0.1
      - type: text
        substr: localhost
    if:
      type: text
      substr: https.createServer
  - id: server-listen-call
    desc: Starts a server with server.listen()
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/lang/scripted::dts-declaration-file
      - type: basename
        regex: '^test-(server|client)\.js$'
      - type: text
        substr: "server.listen(0, 'localhost'"
    not:
      - regex: \.listen\(0,\s*['"](127\.0\.0\.1|localhost)['"]
      - substr: ".listen(0,"
    if:
      type: text
      regex: (server|app)\.listen\s*\(
composite_rules:
  - id: apache-httpd-core-exports
    desc: Apache httpd core server exports
    crit: notable
    conf: 0.88
    needs: 3
    any:
      - id: apache-setup-listeners-export
      - id: apache-process-http-connection-string
      - id: apache-open-htaccess-export
      - id: apache-read-request-export
      - id: apache-signal-server-export
  - id: web-server-binaries
    desc: Common web server binaries
    any:
      - id: httpd-keyword
      - id: apache2-keyword
      - id: apache-httpd-core-exports
      - id: nginx-keyword
      - id: lighttpd-keyword
      - id: caddy-keyword
      - id: tomcat-keyword
      - id: micro-behaviors/communications/http/server/framework::jetty-server-package
  - id: web-server-config-files
    desc: Web server configuration files
    any:
      - id: httpd-conf-path
      - id: apache2-conf-path
      - id: nginx-conf-path
      - id: sites-available-path
      - id: sites-enabled-path
  - id: common-http-ports
    desc: Common HTTP/HTTPS port binding
    any:
      - id: bind-port-80
      - id: bind-port-443
      - id: bind-port-8080
      - id: bind-port-8000
      - id: bind-port-3000
  - id: go-http-server
    desc: Go HTTP server patterns
    any:
      - id: servemux-pattern
      - id: http-server-type
      - id: listenandserve-call
      - id: listenandservetls-call
  - id: nodejs-http-server
    desc: Node.js HTTP server patterns
    any:
      - id: http-createserver-call
      - id: node-http-create-server-imported-call
      - id: https-createserver-call
      - id: server-listen-call
  - id: nodejs-http-imported-create-server
    desc: Node.js HTTP server created through an ES-module import
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    all:
      - id: node-http-create-server-import
      - id: node-http-create-server-imported-call
  - id: server
    desc: Runs an HTTP server
    crit: notable
    conf: 0.7
    any:
      - id: web-server-binaries
      - id: web-server-config-files
      - id: common-http-ports
      - id: go-http-server
      - id: nodejs-http-server
      - id: micro-behaviors/communications/http/server/framework::server-python
