defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1071.001
  mbc: C0002
traits:
  - id: httpd-keyword
    desc: httpd web server
    crit: baseline
    conf: 0.6
    if:
      id: micro-behaviors/os/service/daemon::httpd
  - id: apache2-keyword
    desc: apache2 web server
    crit: baseline
    conf: 0.6
    if:
      id: micro-behaviors/os/service/daemon::apache2
  - id: nginx-keyword
    desc: nginx web server
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: nginx
  - id: lighttpd-keyword
    desc: lighttpd web server
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: lighttpd
  - id: caddy-keyword
    desc: Caddy web server
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: caddy
  - id: tomcat-keyword
    desc: Apache Tomcat server
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: tomcat
  - id: jetty-keyword
    desc: Jetty web server
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: jetty
  - id: httpd-conf-path
    desc: httpd.conf configuration file
    crit: baseline
    conf: 0.65
    if:
      type: text
      substr: httpd.conf
  - id: apache2-conf-path
    desc: apache2.conf configuration file
    crit: baseline
    conf: 0.65
    if:
      type: text
      substr: apache2.conf
  - id: nginx-conf-path
    desc: nginx.conf configuration file
    crit: baseline
    conf: 0.65
    if:
      type: text
      substr: nginx.conf
  - id: sites-available-path
    desc: sites-available configuration directory
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: sites-available
  - id: sites-enabled-path
    desc: sites-enabled configuration directory
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: sites-enabled
  - id: bind-port-80
    desc: bind to HTTP port 80
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (port|bind|listen).{0,50}:80\b
  - id: bind-port-443
    desc: bind to HTTPS port 443
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (port|bind|listen).{0,50}:443\b
  - id: bind-port-8080
    desc: bind to port 8080
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (port|bind|listen).{0,50}:8080\b
  - id: bind-port-8000
    desc: bind to port 8000
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (port|bind|listen).{0,50}:8000\b
  - id: bind-port-3000
    desc: bind to port 3000
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (port|bind|listen).{0,50}:3000\b
  - id: listen-keyword
    desc: listen() socket call
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: listen
  - id: servemux-pattern
    desc: Go HTTP ServeMux
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: ServeMux).ServeHTTP
  - id: http-server-type
    desc: Go http.Server type
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: http.Server
  - id: listenandserve-call
    desc: Go ListenAndServe call
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: ListenAndServe
    unless:
      - type: text
        substr: ListenAndServeTLS
  - id: listenandservetls-call
    desc: Go ListenAndServeTLS call
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: ListenAndServeTLS
  - id: http-createserver-call
    desc: Node.js http.createServer()
    crit: notable
    conf: 0.75
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: text
        substr: 127.0.0.1
      - type: text
        substr: localhost
    if:
      type: text
      substr: http.createServer
  - id: https-createserver-call
    desc: Node.js https.createServer()
    crit: notable
    conf: 0.75
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: text
        substr: 127.0.0.1
      - type: text
        substr: localhost
    if:
      type: text
      substr: https.createServer
  - id: server-listen-call
    desc: server.listen() call
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/lang/scripted::dts-declaration-file
      - type: basename
        regex: '^test-(server|client)\.js$'
      - type: text
        substr: "server.listen(0, 'localhost'"
    not:
      - regex: \.listen\(0,\s*['"](127\.0\.0\.1|localhost)['"]
      - substr: ".listen(0,"
    if:
      type: text
      regex: (server|app)\.listen\s*\(
composite_rules:
  - id: web-server-binaries
    desc: Common web server binaries
    any:
      - id: httpd-keyword
      - id: apache2-keyword
      - id: nginx-keyword
      - id: lighttpd-keyword
      - id: caddy-keyword
      - id: tomcat-keyword
      - id: jetty-keyword
  - id: web-server-config-files
    desc: Web server configuration files
    any:
      - id: httpd-conf-path
      - id: apache2-conf-path
      - id: nginx-conf-path
      - id: sites-available-path
      - id: sites-enabled-path
  - id: common-http-ports
    desc: Common HTTP/HTTPS port binding
    any:
      - id: bind-port-80
      - id: bind-port-443
      - id: bind-port-8080
      - id: bind-port-8000
      - id: bind-port-3000
  - id: go-http-server
    desc: Go HTTP server patterns
    any:
      - id: servemux-pattern
      - id: http-server-type
      - id: listenandserve-call
      - id: listenandservetls-call
  - id: nodejs-http-server
    desc: Node.js HTTP server patterns
    any:
      - id: http-createserver-call
      - id: https-createserver-call
      - id: server-listen-call
  - id: server
    desc: Runs an HTTP server
    crit: notable
    conf: 0.7
    any:
      - id: web-server-binaries
      - id: web-server-config-files
      - id: common-http-ports
      - id: go-http-server
      - id: nodejs-http-server
      - id: micro-behaviors/communications/http/server::server-python
