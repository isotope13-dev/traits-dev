# .NET HTTP Server Capabilities
# 
# Detects neutral mechanics of ASP.NET and IIS request handling.
# These are building blocks for web shells and legitimate web applications.
#
# MBC: C0002 (HTTP)

defaults:
  platforms: [windows]
  for: [binaries, scripts]
  crit: notable

traits:
  - id: http-context
    desc: Access to ASP.NET HttpContext
    if:
      type: text
      substr: HttpContext

  - id: http-request-get
    desc: Access to ASP.NET Request object
    if:
      type: text
      substr: get_Request

  - id: http-response-get
    desc: Access to ASP.NET Response object
    if:
      type: text
      substr: get_Response

  - id: http-resource-get
    desc: Access to ASP.NET Resource object
    if:
      type: text
      substr: get_Resource

  - id: http-headers-access
    desc: Access to HTTP headers
    if:
      type: text
      substr: get_Headers

  - id: http-item-setter
    desc: Modification of HTTP context items
    crit: component
    if:
      type: text
      substr: set_Item

  - id: name-value-collection
    desc: Usage of NameValueCollection (headers/params)
    if:
      type: text
      substr: NameValueCollection

composite_rules:
  - id: http-context-item-setter
    desc: Modification of HTTP context items
    crit: notable
    conf: 0.85
    all:
      - id: http-context
      - id: http-item-setter
