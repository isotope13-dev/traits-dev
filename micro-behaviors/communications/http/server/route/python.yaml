defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  attack: T1071.001
  mbc: C0002

traits:
  - id: python-heartbeat-route
    desc: Python HTTP heartbeat route reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/heartbeat

  - id: python-command-parameter
    desc: Python function accepts a command parameter
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(cmd|command)\s*(:|=)'

composite_rules:
  - id: python-http-command-route
    desc: HTTP route accepts a command
    crit: suspicious
    conf: 0.88
    attack: T1059.004,T1059.006
    # A route exposing a command-shaped parameter is a security-relevant
    # surface, while admin terminals can legitimately implement it.
    near_lines: 25
    all:
      - id: micro-behaviors/communications/http/server/framework::python-http-route-basic-method
      - id: python-command-parameter
