defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell, markdown]
  attack: T1071.001
  mbc: C0002
  crit: notable
  conf: 0.9

traits:
  - id: loopback-notify-url
    desc: Loopback notify HTTP endpoint
    if:
      type: text
      regex: 'http://127\.0\.0\.1(:[0-9]{1,5}|:\$\{[^}]{1,40}\})/notify\b'

  - id: post-notify-route
    desc: POST notify route reference
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'POST (http://127\.0\.0\.1(:[0-9]{1,5}|:\$\{[^}]{1,40}\})/notify|/notify)'

composite_rules:
  - id: loopback-notify-endpoint
    desc: Loopback HTTP notify endpoint
    crit: notable
    conf: 0.92
    any:
      - id: loopback-notify-url
      - id: post-notify-route
