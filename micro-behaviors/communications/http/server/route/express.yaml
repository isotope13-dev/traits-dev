defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.78
  attack: T1071.001
  mbc: C0002
traits:
  - id: express-router
    desc: Express Router creation
    if:
      type: text
      regex: express\.Router
  - id: express-post-endpoint
    desc: Express POST route definition
    if:
      type: text
      regex: (app|router)\.post\s*\(
    downgrade:
      any:
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/library/structure::js-large-module-bundle
  - id: express-get-endpoint
    desc: Express GET route definition
    if:
      type: text
      regex: (app|router)\.get\s*\(\s*['"/]
