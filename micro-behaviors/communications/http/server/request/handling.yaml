# HTTP Server Request Handling
# Micro-behaviors for extracting data from HTTP requests and writing to files
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  conf: 0.75
traits:
  - id: extract-from-request-json
    desc: Extract data from JSON request body
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "(request|req)\\.json|(request|req)\\.get_json"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: extract-from-request-form
    desc: Extract data from form request
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "(request|req)\\.(form|args)\\b"
  - id: extract-from-request-data
    desc: Extract data from request data field
    conf: 0.85
    if:
      type: symbol
      exact: request.data
  - id: file-store-variable
    desc: Store data to file variable
    conf: 0.5
    if:
      type: text
      regex: "(file|f)\\.write\\(\\s*(request\\.data)"
  - id: http-post-endpoint
    desc: HTTP POST method handler
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "@app\\.post\\(|@route.{0,30}POST"
  - id: http-root-endpoint
    desc: HTTP endpoint at root path
    conf: 0.7
    if:
      type: text
      regex: '@.{0,30}(route|post).{0,20}[''\"]/?[''\"]'
