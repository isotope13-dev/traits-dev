defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [go, elf, macho, pe]
traits:
  - id: go-http-router-dep
    desc: Go HTTP router dependency in go.mod
    crit: notable
    conf: 0.78
    for: [go.mod]
    size_min: 1
    if:
      type: text
      regex: 'github\.com/(gorilla/mux|labstack/echo/v4|go-chi/chi)\b'

  - id: server-go
    desc: Go HTTP server
    crit: notable
    conf: 0.66
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      exact: net/http.ListenAndServe
