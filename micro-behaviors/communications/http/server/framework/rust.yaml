defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1071.001
  mbc: C0002
traits:
  - id: axum-serve-call
    desc: Rust axum HTTP serve call
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: axum::serve(
  - id: tokio-tcp-listener-bind
    desc: Rust tokio TCP listener bind
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: tokio::net::TcpListener::bind(
  - id: axum-root-get-route
    desc: Rust axum root GET route
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'Router::new\(\)\.route\(\s*"/"\s*,\s*get\('
  - id: loopback-port-80-string
    desc: Loopback HTTP port 80 bind string
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: 127.0.0.1:80
composite_rules:
  - id: rust-axum-http-server
    desc: Rust axum HTTP server
    crit: notable
    conf: 0.9
    all:
      - id: axum-serve-call
      - id: tokio-tcp-listener-bind
    any:
      - id: axum-root-get-route
      - id: loopback-port-80-string
