defaults:
  platforms: [windows, unix]
  for:
    - python
  attack: T1071.001
  mbc: C0002
traits:
  - id: http-server-module
    desc: http.server module
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: http.server
  - id: threaded-python-http-server
    desc: Threaded Python HTTP server
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: socketserver\.ThreadingMixIn|ThreadedTCPServer
    unless:
      - id: micro-behaviors/communications/http/server/framework::fastapi-import
      - id: micro-behaviors/communications/http/server/framework::uvicorn-import
  - id: simplehttpserver-module
    desc: SimpleHTTPServer module (Python 2)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: SimpleHTTPServer
  - id: basehttpserver-module
    desc: BaseHTTPServer module (Python 2)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: BaseHTTPServer
  - id: http-server-import
    desc: Imports from Python's http.server module
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: from\s+http\.server\s+import
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: simplehttpserver-import
    desc: import SimpleHTTPServer
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: import\s+SimpleHTTPServer
  - id: httpserver-class
    desc: HTTPServer class instantiation
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: HTTPServer\s*\(
  - id: simplehttprequesthandler
    desc: SimpleHTTPRequestHandler class
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: SimpleHTTPRequestHandler
  - id: flask-import
    desc: Flask framework import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: from\s+flask\s+import\s+Flask
  - id: flask-instantiation
    desc: Flask app instantiation
    crit: notable
    conf: 0.8
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.Flask$'
  - id: flask-run-call
    desc: Flask app.run() call
    crit: component
    conf: 0.8
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '(^|\.)\^\(app\|application\)\$\.run$'
    unless:
      - type: import
        regex: "^textual\\.app$"
  - id: python-framework-route-call
    desc: Python framework route call with URL literal
    crit: notable
    conf: 0.75
    # Requiring a URL literal avoids unrelated protocol libraries that expose
    # `.route(...)` for non-HTTP dispatch, such as Modbus request routing.
    # Match an AST call node, not text embedded in a docstring (Bottle's
    # documentation contains an `@app.route('/...')` example).
    if:
      type: tree-sitter
      kind: call
      regex: '\broute\s*\(\s*["'']/'
  - id: django-import
    desc: Django framework import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: from\s+django
  - id: django-wsgi
    desc: Django WSGI application
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: django.core.wsgi
  - id: django-runserver
    desc: Django runserver command
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: runserver
  - id: fastapi-import
    desc: FastAPI framework import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: from\s+fastapi\s+import
  - id: fastapi-instantiation
    desc: FastAPI app instantiation
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: FastAPI\s*\(
  - id: python-http-route-basic-method
    desc: Python basic HTTP route decorator
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?m)^[ \t]*@[A-Za-z_][\w.]*\.(get|post|put)\s*\('
  - id: python-http-route-other-method
    desc: Python alternate HTTP route decorator
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?m)^[ \t]*@[A-Za-z_][\w.]*\.(patch|delete|api_route)\s*\('
  - id: fastapi-http-exception-marker
    desc: FastAPI HTTPException raise
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "raise\\s+HTTPException"
    unless:
      - type: path
        regex: '(^|[\\/])flask_api[\\/]'
  - id: tornado-import
    desc: Tornado framework import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: import\s+tornado
  - id: tornado-application
    desc: Tornado Application class
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: tornado\.web\.Application
  - id: bottle-import
    desc: Bottle framework import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: from\s+bottle\s+import
  - id: python-route-decorator
    desc: Python @route decorator
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?m)^[ \t]*@route[ \t]*\('
  - id: gunicorn-import
    desc: Gunicorn WSGI server import
    crit: notable
    conf: 0.7
    if:
      type: import
      regex: '^gunicorn(\.|$)'
  - id: uvicorn-import
    desc: Imports the Uvicorn ASGI server
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: uvicorn
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: wsgiref-module
    desc: wsgiref module (built-in WSGI)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: wsgiref
composite_rules:
  - id: python-http-method-route
    desc: Python HTTP method route decorator
    crit: notable
    conf: 0.9
    any:
      - id: python-http-route-basic-method
      - id: python-http-route-other-method
  - id: builtin-http-server
    desc: Built-in Python HTTP server modules
    any:
      - id: http-server-module
      - id: simplehttpserver-module
      - id: basehttpserver-module
      - id: http-server-import
      - id: simplehttpserver-import
      - id: httpserver-class
      - id: simplehttprequesthandler
  - id: flask-framework
    desc: Flask web framework usage
    crit: notable
    needs: 2
    any:
      - id: flask-import
      - id: flask-instantiation
      - id: flask-run-call
      - id: python-framework-route-call
  - id: django-framework
    desc: Django web framework usage
    any:
      - id: django-import
      - id: django-wsgi
      - id: django-runserver
  - id: fastapi-framework
    desc: FastAPI framework usage
    any:
      - id: fastapi-import
      - id: fastapi-instantiation
  - id: other-frameworks
    desc: Other Python web frameworks
    any:
      - id: tornado-import
      - id: tornado-application
      - id: bottle-framework
  - id: bottle-framework
    desc: Bottle web framework usage
    crit: notable
    conf: 0.92
    all:
      - id: bottle-import
      - id: python-route-decorator
  - id: wsgi-asgi-servers
    desc: WSGI/ASGI server usage
    any:
      - id: gunicorn-import
      - id: uvicorn-import
      - id: wsgiref-module
  - id: server-python
    desc: Python HTTP server
    crit: notable
    conf: 0.75
    any:
      - id: builtin-http-server
      - id: flask-framework
      - id: django-framework
      - id: fastapi-framework
      - id: other-frameworks
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: wsgi-asgi-servers
