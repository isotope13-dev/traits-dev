# HTTP Server Operations - JavaScript/Node.js
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1071.001
defaults:
  platforms: [unix, windows]
  for: [javascript]
  mbc: "C0002"
  attack: "T1071.001"
traits:
  - id: server-express
    desc: Express.js HTTP server
    crit: notable
    conf: 0.66
    unless:
      - id: metadata/package/documentation::sonar-rule-metadata-json
    if:
      type: symbol
      exact: express
  - id: server-restify-orator
    desc: Orator/Restify HTTP service server
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "(orator-serviceserver-restify|require\\(['\"]restify['\"]\\))"
