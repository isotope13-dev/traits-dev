defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: fastapi-caller-permission-identifier
    desc: FastAPI caller-permission policy identifier
    if:
      type: text
      substr: caller_permission
  - id: fastapi-allowed-routes-identifier
    desc: FastAPI allowed-routes policy identifier
    if:
      type: text
      substr: allowed_routes
  - id: fastapi-team-model-access-identifier
    desc: FastAPI team model-access policy identifier
    if:
      type: text
      substr: can_team_access_model
