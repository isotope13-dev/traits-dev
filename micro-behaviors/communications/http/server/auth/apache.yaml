defaults:
  platforms: [linux]
  for: [elf, so]
  mbc: C0002
  attack: T1071.001

traits:
  - id: apache-check-user-id-hook-export
    desc: Apache authentication hook export
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ap_hook_check_user_id

  - id: apache-basic-auth-password-api-export
    desc: Apache basic-auth password API export
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ap_get_basic_auth_pw
