defaults:
  platforms: [windows, unix]
  for:
    - python
  attack: T1071.001
  mbc: C0002
traits:
  - id: http-server-module
    desc: http.server module
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: http.server
  - id: simplehttpserver-module
    desc: SimpleHTTPServer module (Python 2)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: SimpleHTTPServer
  - id: basehttpserver-module
    desc: BaseHTTPServer module (Python 2)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: BaseHTTPServer
  - id: http-server-import
    desc: from http.server import
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: from\s+http\.server\s+import
  - id: simplehttpserver-import
    desc: import SimpleHTTPServer
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: import\s+SimpleHTTPServer
  - id: httpserver-class
    desc: HTTPServer class instantiation
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: HTTPServer\s*\(
  - id: simplehttprequesthandler
    desc: SimpleHTTPRequestHandler class
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: SimpleHTTPRequestHandler
  - id: flask-import
    desc: Flask framework import
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: from\s+flask\s+import\s+Flask
  - id: flask-instantiation
    desc: Flask app instantiation
    crit: baseline
    conf: 0.8
    if:
      type: ast
      kind: call
      substr: Flask
  - id: flask-run-call
    desc: Flask app.run() call
    crit: baseline
    conf: 0.8
    if:
      type: ast
      kind: call
      substr: .run
  - id: flask-route-decorator
    desc: Flask @app.route decorator
    crit: baseline
    conf: 0.75
    if:
      type: ast
      kind: call
      substr: app.route
  - id: django-import
    desc: Django framework import
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: from\s+django
  - id: django-wsgi
    desc: Django WSGI application
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      substr: django.core.wsgi
  - id: django-runserver
    desc: Django runserver command
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      substr: runserver
  - id: fastapi-import
    desc: FastAPI framework import
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: from\s+fastapi\s+import
  - id: fastapi-instantiation
    desc: FastAPI app instantiation
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      regex: FastAPI\s*\(
  - id: tornado-import
    desc: Tornado framework import
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: import\s+tornado
  - id: tornado-application
    desc: Tornado Application class
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      regex: tornado\.web\.Application
  - id: bottle-import
    desc: Bottle framework import
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: from\s+bottle\s+import
  - id: bottle-route-decorator
    desc: Bottle @route decorator
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      regex: '@route\s*\('
  - id: gunicorn-import
    desc: Gunicorn WSGI server import
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: gunicorn
  - id: uvicorn-import
    desc: Uvicorn ASGI server import
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: uvicorn
  - id: wsgiref-module
    desc: wsgiref module (built-in WSGI)
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: wsgiref
composite_rules:
  - id: builtin-http-server
    desc: Built-in Python HTTP server modules
    any:
      - id: http-server-module
      - id: simplehttpserver-module
      - id: basehttpserver-module
      - id: http-server-import
      - id: simplehttpserver-import
      - id: httpserver-class
      - id: simplehttprequesthandler
  - id: flask-framework
    desc: Flask web framework usage
    crit: notable
    needs: 2
    any:
      - id: flask-import
      - id: flask-instantiation
      - id: flask-run-call
      - id: flask-route-decorator
  - id: django-framework
    desc: Django web framework usage
    any:
      - id: django-import
      - id: django-wsgi
      - id: django-runserver
  - id: fastapi-framework
    desc: FastAPI framework usage
    any:
      - id: fastapi-import
      - id: fastapi-instantiation
  - id: other-frameworks
    desc: Other Python web frameworks
    any:
      - id: tornado-import
      - id: tornado-application
      - id: bottle-import
      - id: bottle-route-decorator
  - id: wsgi-asgi-servers
    desc: WSGI/ASGI server usage
    any:
      - id: gunicorn-import
      - id: uvicorn-import
      - id: wsgiref-module
  - id: server-python
    desc: Python HTTP server
    crit: notable
    conf: 0.75
    any:
      - id: builtin-http-server
      - id: flask-framework
      - id: django-framework
      - id: fastapi-framework
      - id: other-frameworks
      - id: wsgi-asgi-servers
