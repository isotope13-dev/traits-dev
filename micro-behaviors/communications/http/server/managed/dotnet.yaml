# .NET HTTP Server Capabilities
#
# Detects neutral mechanics of ASP.NET, IIS, and managed listener request handling.
# These are building blocks for web shells, RAT panels, and legitimate web applications.
#
# MBC: C0002 (HTTP)

defaults:
  platforms: [windows]
  for: [binaries, scripts]
  crit: notable

traits:
  - id: http-context
    desc: Access to ASP.NET HttpContext
    if:
      type: text
      substr: HttpContext

  - id: http-request-get
    desc: Access to ASP.NET Request object
    if:
      type: text
      substr: get_Request

  - id: http-response-get
    desc: Access to ASP.NET Response object
    if:
      type: text
      substr: get_Response

  - id: http-resource-get
    desc: Access to ASP.NET Resource object
    if:
      type: text
      exact: get_Resource

  - id: http-headers-access
    desc: Access to HTTP headers
    if:
      type: text
      substr: get_Headers

  - id: http-item-setter
    desc: Modification of HTTP context items
    crit: component
    if:
      type: text
      substr: set_Item

  - id: name-value-collection
    desc: Usage of NameValueCollection (headers/params)
    if:
      type: text
      substr: NameValueCollection

  - id: dotnet-httplistener
    desc: .NET HttpListener server
    conf: 0.9
    for: [pe, dll]
    attack: T1071.001
    if:
      type: text
      exact: HttpListener

  - id: dotnet-loopback-prefix
    desc: .NET loopback HTTP prefix
    crit: component
    conf: 0.86
    for: [pe, dll]
    attack: T1071.001
    if:
      type: text
      substr: "http://127.0.0.1:"

  - id: mjpeg-stream-content-type
    desc: MJPEG stream content type
    conf: 0.9
    for: [pe, dll]
    attack: T1071.001
    if:
      type: text
      exact: "multipart/x-mixed-replace; boundary=frame"

  - id: local-viewer-route-set
    desc: Local viewer route set
    crit: component
    conf: 0.86
    for: [pe, dll]
    count_min: 3
    attack: T1071.001
    if:
      type: text
      regex: '^/(stream|input|windows)$|^POST$'

composite_rules:
  - id: http-context-item-setter
    desc: Modification of HTTP context items
    crit: notable
    conf: 0.85
    all:
      - id: http-context
      - id: http-item-setter

  - id: dotnet-loopback-http-listener
    desc: .NET loopback HTTP listener
    crit: notable
    conf: 0.9
    for: [pe, dll]
    all:
      - id: dotnet-httplistener
      - id: dotnet-loopback-prefix

  - id: dotnet-mjpeg-viewer-server
    desc: .NET MJPEG viewer server
    crit: notable
    conf: 0.92
    for: [pe, dll]
    all:
      - id: dotnet-httplistener
      - id: mjpeg-stream-content-type
    any:
      - id: local-viewer-route-set
      - id: dotnet-loopback-prefix
