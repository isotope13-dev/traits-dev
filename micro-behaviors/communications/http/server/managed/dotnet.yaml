# .NET HTTP Server Capabilities
#
# Detects neutral mechanics of ASP.NET, IIS, and managed listener request handling.
# These are building blocks for web shells, RAT panels, and legitimate web applications.
#
# MBC: C0002 (HTTP)

defaults:
  platforms: [windows]
  for: [csharp, pe, dll]
  crit: notable

traits:
  - id: http-context
    desc: Access to ASP.NET HttpContext
    if:
      type: text
      substr: HttpContext
    unless:
      - id: well-known/lib/sentry-js/

  - id: http-request-get
    desc: Access to ASP.NET Request object
    if:
      type: text
      regex: '(?i)\b(System\.Web\.HttpRequest|Microsoft\.AspNetCore\.Http\.HttpRequest)\b'

  - id: http-response-get
    desc: Access to ASP.NET Response object
    if:
      type: text
      word: HttpResponse

  - id: http-headers-getter
    desc: Access to Headers getter
    crit: component
    if:
      type: text
      substr: get_Headers
    unless:
      - type: text
        substr: System.Net.Http.Headers
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/

  - id: dotnet-httplistener
    desc: .NET HttpListener server
    conf: 0.9
    for: [pe, dll]
    attack: T1071.001
    if:
      type: text
      exact: HttpListener

  - id: dotnet-loopback-prefix
    desc: .NET loopback HTTP prefix
    crit: component
    conf: 0.86
    for: [pe, dll]
    attack: T1071.001
    if:
      type: text
      substr: "http://127.0.0.1:"

  - id: mjpeg-stream-content-type
    desc: MJPEG stream content type
    conf: 0.9
    for: [pe, dll]
    attack: T1071.001
    if:
      type: text
      exact: "multipart/x-mixed-replace; boundary=frame"

  - id: local-viewer-route-set
    desc: Local viewer route set
    crit: component
    conf: 0.86
    for: [pe, dll]
    count_min: 3
    attack: T1071.001
    if:
      type: text
      regex: '^/(stream|input|windows)$'

composite_rules:
  - id: http-headers-access
    desc: Access to server-side HTTP headers
    crit: notable
    conf: 0.85
    all:
      - id: http-headers-getter
    any:
      - id: http-context
      - id: http-request-get
      - id: dotnet-httplistener

  - id: http-context-item-setter
    desc: Modification of HTTP context items
    crit: notable
    conf: 0.85
    all:
      - id: http-context
      - id: micro-behaviors/data/manipulation::dotnet-item-setter-token

  - id: dotnet-loopback-http-listener
    desc: .NET loopback HTTP listener
    crit: notable
    conf: 0.9
    for: [pe, dll]
    all:
      - id: dotnet-httplistener
      - id: dotnet-loopback-prefix

  - id: dotnet-mjpeg-viewer-server
    desc: .NET MJPEG viewer server
    crit: notable
    conf: 0.92
    for: [pe, dll]
    all:
      - id: dotnet-httplistener
      - id: mjpeg-stream-content-type
    any:
      - id: local-viewer-route-set
      - id: dotnet-loopback-prefix
