defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  mbc: C0002
  attack: T1071.001
traits:
- id: laravel-route-definition--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: Route::(get|post)\s*\(

- id: laravel-route-definition--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: Route::(put|patch)\s*\(

- id: laravel-route-definition--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: Route::(delete)\s*\(

- id: laravel-load-routes-from
  desc: Laravel package route loading
  conf: 0.86
  if:
    type: symbol
    exact: loadRoutesFrom
composite_rules:
- id: laravel-route-definition
  desc: Laravel route definition
  crit: baseline
  conf: 0.82
  any:
  - id: laravel-route-definition--rx-1
  - id: laravel-route-definition--rx-2
  - id: laravel-route-definition--rx-3
  needs: 1
