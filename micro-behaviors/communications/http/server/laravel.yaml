defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  mbc: C0002
  attack: T1071.001
traits:
  - id: laravel-route-definition
    desc: Laravel route definition
    conf: 0.82
    if:
      type: text
      regex: Route::(get|post|put|patch|delete)\s*\(

  - id: laravel-load-routes-from
    desc: Laravel package route loading
    conf: 0.86
    if:
      type: text
      regex: loadRoutesFrom\s*\(

