defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1071.001
  mbc: C0002
  crit: notable
  conf: 0.75

traits:
  - id: user-info-endpoint
    desc: User info endpoint path
    if:
      type: text
      regex: /user_info\b
  - id: accounts-endpoint-path
    desc: Accounts endpoint path
    crit: component
    conf: 0.75
    if:
      type: text
      substr: /accounts
  - id: anthropic-oauth-profile-endpoint
    desc: Anthropic OAuth profile endpoint
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: /api/oauth/profile
