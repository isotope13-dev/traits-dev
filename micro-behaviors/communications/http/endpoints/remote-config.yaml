defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: remote-feature-config-url
    desc: Remote feature configuration URL
    crit: notable
    conf: 0.93
    if:
      type: string_literal
      regex: '(?i)https?://.{0,160}(app[-_]?config|feature[-_]?flag|remote[-_]?config)'

  - id: remote-config-endpoint
    desc: Hard-coded remote configuration endpoint
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: 'https?://[^"''\s]{1,180}/config\b'
