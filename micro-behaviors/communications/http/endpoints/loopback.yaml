defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, go, shell, ruby, php, java]
traits:
  - id: loopback-http-target
    desc: HTTP request targets loopback address (local IPC)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'https?://(127\.0\.0\.1|localhost|0\.0\.0\.0)'
