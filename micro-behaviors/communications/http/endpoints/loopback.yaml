defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, go, shell, ruby, php, java]
traits:
  - id: loopback-http-url-reference
    desc: "References a loopback HTTP URL"
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'https?://(127\.0\.0\.1|localhost|0\.0\.0\.0)'
  - id: loopback-https-url-or-proxy-text
    desc: "Loopback HTTPS URL or proxy token"
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'PROXY_HTTPS|local_https_proxy|https://(127\.0\.0\.1|localhost)'

composite_rules:
  - id: loopback-http-target
    desc: "HTTP request targets loopback address"
    crit: notable
    conf: 0.9
    near_bytes: 512
    all:
      - id: loopback-http-url-reference
      - id: micro-behaviors/communications/http/request/client::http-client
