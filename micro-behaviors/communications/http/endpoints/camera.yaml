defaults:
  platforms: [unix, windows]
  for: [go]

traits:
  - id: camera-snapshot-cgi-endpoint
    desc: Camera snapshot CGI endpoint path
    crit: notable
    conf: 0.94
    if:
      type: literal
      kind: string
      substr: snapshot.cgi
  - id: camera-management-cgi-endpoint
    desc: Dahua-style camera management CGI endpoint
    crit: notable
    conf: 0.94
    if:
      type: literal
      kind: string
      regex: '/cgi-bin/(configManager|userManager|magicBox|devicemanager)\.cgi'
