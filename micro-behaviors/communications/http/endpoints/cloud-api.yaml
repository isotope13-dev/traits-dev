defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: aws-api-endpoint
    desc: AWS API endpoint reference
    if:
      type: string_literal
      substr: amazonaws.com
    unless:
      - id: metadata/file/text::uproc-tools-catalog
  - id: facebook-graph-api
    desc: Facebook Graph API endpoint
    if:
      type: string_literal
      substr: graph.facebook.com
