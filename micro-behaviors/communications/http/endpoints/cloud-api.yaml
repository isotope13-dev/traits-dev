# Cloud Provider API Endpoints
# Detects references to cloud provider API endpoints in scripts
defaults:
  platforms: [linux, macos, windows, unix]
  for: [python, javascript, shell, powershell]
  crit: notable
  conf: 0.8
traits:
  - id: aws-api-endpoint
    desc: AWS API endpoint reference
    if:
      type: string
      substr: "amazonaws.com"
  - id: facebook-graph-api
    desc: Facebook Graph API endpoint
    if:
      type: string
      substr: "graph.facebook.com"
