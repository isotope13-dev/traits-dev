defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
  for:
    - python
    - javascript
    - shell
    - powershell
  crit: notable
  conf: 0.8
traits:
  - id: aws-api-endpoint
    desc: AWS API endpoint reference
    if:
      type: string_value
      substr: amazonaws.com
  - id: facebook-graph-api
    desc: Facebook Graph API endpoint
    if:
      type: string_value
      substr: graph.facebook.com
