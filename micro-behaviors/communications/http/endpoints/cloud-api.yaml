defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: aws-api-endpoint
    desc: AWS API endpoint marker
    if:
      type: string_literal
      substr: amazonaws.com
    unless:
      - id: metadata/file/text::uproc-tools-catalog
      - id: metadata/package/testing/presence::jest-test-file
      - id: metadata/package/testing/presence::test-directory
  - id: facebook-graph-api
    desc: Facebook Graph API endpoint
    if:
      type: string_literal
      substr: graph.facebook.com
