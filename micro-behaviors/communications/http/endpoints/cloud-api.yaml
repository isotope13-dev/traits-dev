defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: aws-api-endpoint
    desc: References an AWS API endpoint
    if:
      type: string_literal
      substr: amazonaws.com
    unless:
      - id: metadata/file/catalog/identity/
      - id: metadata/package/testing/presence/fixture/
      - id: metadata/package/testing/presence/harness/
  - id: facebook-graph-api
    desc: Facebook Graph API endpoint
    if:
      type: string_literal
      substr: graph.facebook.com
  - id: cloud-account-management-api-path
    desc: Cloud account management API path
    conf: 0.82
    if:
      type: text
      substr: /admin/management/cloud_accounts
  # Managed PaaS / serverless platform endpoints. These are ubiquitous,
  # legitimate hosting platforms (used by millions of benign apps as well as,
  # occasionally, malware C2). A bare endpoint reference is a neutral comms
  # capability, not malicious infrastructure — C2 detection composites combine
  # these cross-tier with malicious context.
  - id: aws-api-gateway
    desc: AWS API Gateway endpoint
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: execute-api\.[a-z0-9-]+\.amazonaws\.com
    unless:
      - id: metadata/library/data/
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/library/qt
  - id: azure-websites
    desc: Azure Websites endpoint
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.azurewebsites\.net'
  - id: google-cloud-functions
    desc: Google Cloud Functions endpoint
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.cloudfunctions\.net'
  - id: vercel-app
    desc: Vercel app endpoint
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.vercel\.app'
  - id: railway-app
    desc: References a Railway-hosted domain
    conf: 0.75
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.railway\.app'
  # Replit app-hosting domains (`*.replit.dev`, `*.repl.co`) — a mainstream dev
  # and deployment platform used by millions of benign apps (and, like every
  # PaaS, occasionally malware staging). Relocated from
  # command-and-control/infrastructure/domain/malicious, where a bare host
  # reference mislabeled every Replit deployment as C2. The abused ephemeral
  # `*.id.repl.co` shape stays suspicious there; the replit-hosted C2 composite
  # references these cross-tier. Peer of railway-app above.
  - id: replit-dev
    desc: Replit.dev endpoint
    conf: 0.6
    attack: T1071
    if:
      type: text
      regex: ([a-z0-9-]{1,63}\.){1,6}replit\.dev
    unless:
      - id: metadata/library/data/
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/library/qt
  - id: repl-co
    desc: Repl.co endpoint
    conf: 0.6
    attack: T1071
    if:
      type: text
      regex: 'https?://([a-z0-9-]{1,63}\.){1,6}repl\.co([/?#: ]|$)'
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: netlify-app
    desc: Netlify app endpoint
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.netlify\.app'
  - id: github-pages
    # GitHub Pages static hosting (`*.github.io`) — a mainstream, overwhelmingly
    # benign host (project doc sites, READMEs). Relocated from
    # command-and-control/infrastructure/domain/hosting where a bare reference
    # mislabeled every github.io link as C2 infrastructure.
    desc: References a GitHub Pages host
    conf: 0.5
    if:
      type: string_literal
      substr: .github.io
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: vercel-serverless
    desc: Vercel serverless function endpoint
    conf: 0.85
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.vercel\.app(/|$)'
  - id: aliyun-oss-object-url
    # Alibaba Cloud OSS object URL — the S3-equivalent object store, ubiquitous
    # in benign CN apps for hosting assets. Relocated from
    # command-and-control/dropper/delivery/http; the cloud-image-stager
    # composite there references it cross-tier alongside stego evidence.
    desc: Alibaba OSS object URL
    conf: 0.5
    for: [scripts, html]
    if:
      type: text
      regex: '(?i)https?://[A-Za-z0-9._-]+\.oss-[A-Za-z0-9-]+\.aliyuncs\.com/[A-Za-z0-9._~/-]+'
  - id: tencent-cloud-scf-endpoint
    desc: Tencent Cloud SCF endpoint
    conf: 0.7
    attack: T1071
    for: [scripts]
    if:
      type: literal
      kind: string
      regex: 'https://[a-z0-9-]+\.ap-[a-z0-9-]+\.tencentscf\.com'
composite_rules:
  - id: serverless-function
    desc: Contacts serverless function endpoint (Lambda, etc)
    crit: notable
    conf: 0.7
    attack: T1071
    any:
      - id: aws-api-gateway
      - id: azure-websites
      - id: google-cloud-functions
      - id: vercel-app
      - id: netlify-app
      - id: tencent-cloud-scf-endpoint
