# Neutral HTTP route fragments.  A JSON endpoint path is common in web
# frameworks and only becomes suspicious when combined with stronger context
# such as public-IP profiling and an external telemetry destination.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python]
  crit: component
  conf: 0.9

traits:
  - id: json-route-path
    desc: Literal /json/ HTTP endpoint path
    if:
      type: literal
      kind: string
      exact: /json/
