# Data-ingestion REST endpoints (`/api/v1/ingest`, `/api/ingest`). These are the
# canonical telemetry/event-intake routes of monitoring agents, log shippers,
# and APM clients — a legitimate, purpose-defining communications capability,
# not an exfil tell on its own. Exfiltration composites combine an ingest POST
# with a collected-media payload (screenshots, credentials) cross-tier; a bare
# JSON ingest POST is ordinary client behavior.
defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, go, java, php, ruby, shell, powershell]
  attack: T1071.001
  mbc: C0002
traits:
  - id: ingest-api-path
    desc: Telemetry or file-ingestion API endpoint path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '/api/(v[0-9]+/)?(ingest|upload)\b'
