# Data-ingestion REST endpoints (`/api/v1/ingest`, `/api/ingest`). These are the
# canonical telemetry/event-intake routes of monitoring agents, log shippers,
# and APM clients — a legitimate, purpose-defining communications capability,
# not an exfil tell on its own. Exfiltration composites combine an ingest POST
# with a collected-media payload (screenshots, credentials) cross-tier; a bare
# JSON ingest POST is ordinary client behavior.
defaults:
  platforms: [unix, windows]
  # Keep the named groups for maintainability, while excluding languages and
  # binary formats where this endpoint-path matcher is not useful.
  for: [scripts, source, elf, -batch, -jcl, -perl, -lua, -applescript, -vbs, -c, -cpp, -csharp, -swift, -groovy, -kotlin, -scala, -zig, -elixir]
  attack: T1071.001
  mbc: C0002
traits:
  - id: ingest-api-path
    desc: Ingest or upload API endpoint path
    crit: notable
    conf: 0.85
    if:
      type: literal
      regex: '/(api/(v[0-9]+/)?)?ingest\b|/api/(v[0-9]+/)?upload\b'
