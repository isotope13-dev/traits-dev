defaults:
  platforms: [windows, unix]
  for: [python, javascript, php, ruby, go, java, elf, macho]
  attack: T1071.001
traits:
  - id: cloudflare-trace-ip-endpoint
    desc: Cloudflare client-IP trace endpoint
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      substr: /cdn-cgi/trace

  - id: history-clear-endpoint
    desc: /history REST endpoint path
    crit: component
    conf: 0.75
    if:
      type: string_literal
      exact: '/history'
  - id: api-history-endpoint
    desc: /api/history REST endpoint path
    crit: component
    conf: 0.75
    if:
      type: string_literal
      substr: '/api/history'
  - id: scan-patterns-api-path
    desc: Scan-patterns API path
    crit: component
    conf: 0.75
    if:
      type: text
      substr: /api/scan-patterns
  - id: api-commands-endpoint
    desc: /api/commands REST endpoint path
    crit: component
    conf: 0.7
    if:
      type: text
      substr: /api/commands
  - id: api-upload-endpoint
    desc: /api/upload REST endpoint path
    crit: component
    conf: 0.7
    if:
      type: text
      substr: /api/upload
  - id: api-trigger-endpoint-path
    desc: REST trigger endpoint path literal
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: literal
      substr: /api/v1/trigger
  - id: collect-api-v1-path
    desc: Collection API v1 path
    crit: component
    conf: 0.7
    if:
      type: literal
      regex: '^/api/v1/(scan-patterns|collect)$'
  - id: collect-path
    desc: Collection endpoint path
    crit: component
    conf: 0.74
    if:
      type: literal
      exact: /collect
  - id: swift-collect-endpoint-literal
    desc: Swift collection endpoint literal
    crit: notable
    conf: 0.9
    for: [swift]
    if:
      type: literal
      kind: string
      regex: '/collect(/|[?#]|$)'
  - id: jvm-collect-path
    desc: JVM collection endpoint path
    crit: component
    conf: 0.86
    for: [class]
    if:
      type: hex
      pattern: 2F 63 6F 6C 6C 65 63 74
  - id: go-format-collect-url
    desc: Go formatted collect URL
    crit: component
    conf: 0.86
    for: [go, elf, macho]
    if:
      type: text
      substr: http://%s/collect
  - id: collect-post-request
    desc: HTTP collect POST request
    crit: component
    conf: 0.82
    for: [elf, macho, javascript, typescript, rust, go, zig, powershell]
    if:
      type: text
      substr: POST /collect HTTP/1.1
  - id: native-http-collect-path
    desc: Native HTTP collect path
    crit: component
    conf: 0.86
    for: [c, cpp, objc, rust, elf, macho]
    if:
      type: text
      regex: '/collect(\?|["''\s]|/clipboard)'
  - id: oss-config-api-path
    desc: OSS configuration API path
    crit: notable
    conf: 0.8
    for: [python, javascript, typescript, html]
    if:
      type: text
      substr: /api/oss/get
  - id: task-list-api-path
    desc: Background task list API path
    crit: notable
    conf: 0.8
    for: [python, javascript, typescript, html]
    if:
      type: text
      substr: /api/tasks/list
  - id: task-control-api-paths
    desc: Background task control API paths
    crit: notable
    conf: 0.82
    for: [python, javascript, typescript, html]
    count_min: 2
    if:
      type: text
      regex: '/api/tasks/(add|start|stop|delete)'
composite_rules:
  - id: scan-or-collect-api-path
    desc: Scan or collection API path
    crit: component
    conf: 0.78
    any:
      - id: scan-patterns-api-path
      - id: collect-api-v1-path
