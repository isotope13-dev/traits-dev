defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.9

traits:
  - id: agent-register-path
    desc: Agent registration endpoint path
    for: [javascript, typescript, powershell, java, kotlin, csharp, go, shell]
    if:
      type: text
      substr: /api/v1/agents/register
  - id: agent-beacon-path
    desc: Agent beacon endpoint path
    for: [javascript, typescript, powershell, java, kotlin, csharp, go, shell]
    if:
      type: text
      regex: '/api/v1/agents/.{1,80}/beacon'
  - id: agent-task-result-path
    desc: Agent task result endpoint path
    for: [javascript, typescript, powershell, java, kotlin, csharp, go, shell]
    if:
      type: text
      regex: '/api/v1/agents/.{1,80}/tasks/.{1,80}/result'
  - id: agent-api-path
    desc: Agent API endpoint path
    for: [javascript, typescript, powershell, java, kotlin, csharp, go, shell]
    if:
      type: text
      substr: /api/v1/agents/
  - id: api-command-path
    desc: API command endpoint path
    if:
      type: text
      substr: /api/command
  - id: api-response-path
    desc: API response endpoint path
    if:
      type: text
      substr: /api/response
  - id: api-commands-path
    desc: API commands endpoint path
    if:
      type: text
      regex: '/api/(v[0-9]+/)?commands\b'
  - id: exec-path
    desc: Exec endpoint path
    if:
      type: literal
      exact: /exec
  - id: private-api-endpoint-reference
    desc: Private-network HTTP API endpoint reference
    crit: notable
    conf: 0.9
    for: [scripts]
    if:
      type: literal
      regex: 'https?://10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/(api|health|status)([/?:#\s"''<>]|$)'
      is: valid_ip
