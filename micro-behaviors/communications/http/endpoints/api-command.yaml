defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.9

traits:
  - id: api-command-path
    desc: API command endpoint path
    if:
      type: text
      substr: /api/command
  - id: api-response-path
    desc: API response endpoint path
    if:
      type: text
      substr: /api/response
  - id: api-commands-path
    desc: API commands endpoint path
    if:
      type: text
      regex: '/api/(v[0-9]+/)?commands\b'
