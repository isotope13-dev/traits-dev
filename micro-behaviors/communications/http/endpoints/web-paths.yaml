# Generic HTTP endpoint path fragments (/home, /index.php, /profile). Neutral:
# these appear in countless legitimate web applications and embedded request
# strings. Malware C2 composites combine them with a known C2 domain or mutex.
defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.9
traits:
  - id: fetch-explicit-external-url
    desc: Fetches an explicit HTTP(S) URL
    crit: notable
    conf: 0.82
    for: [javascript, typescript]
    if:
      type: text
      regex: "fetch\\(\\s*[`'\"]https?://"
  - id: home-endpoint-path
    desc: /home HTTP endpoint path
    if:
      type: text
      exact: /home
      section: .rdata
  - id: index-php-endpoint-path
    desc: /index.php HTTP endpoint path
    if:
      type: text
      exact: /index.php
      section: .rdata
  - id: profile-endpoint-path
    desc: /profile HTTP endpoint path
    if:
      type: text
      exact: /profile
      section: .rdata
