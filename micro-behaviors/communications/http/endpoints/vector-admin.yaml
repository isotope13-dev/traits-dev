defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: notable
  conf: 0.88
  attack: T1071.001
  mbc: C0002

traits:
  - id: admin-payload-backfill-endpoint
    desc: Admin payload backfill endpoint
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    if:
      type: text
      regex: '/api/v[0-9]+/admin/[A-Za-z0-9_-]*payload[A-Za-z0-9_-]*backfill\b'

  - id: mounted-admin-backfill-route
    desc: Mounted admin backfill route
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    if:
      type: text
      regex: 'Route\s*\(\s*["'']/api/v[0-9]+/admin/[A-Za-z0-9_-]*payload'
