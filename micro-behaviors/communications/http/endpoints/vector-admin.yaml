defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: notable
  conf: 0.88
  attack: T1071.001
  mbc: C0002

traits:
  - id: admin-payload-backfill-endpoint
    desc: HTTP admin payload backfill endpoint
    if:
      type: text
      regex: '/api/v[0-9]+/admin/[A-Za-z0-9_-]*payload[A-Za-z0-9_-]*backfill\b'

  - id: mounted-admin-backfill-route
    desc: Mounted admin payload backfill route
    if:
      type: text
      regex: 'Route\s*\(\s*["'']/api/v[0-9]+/admin/[A-Za-z0-9_-]*payload[A-Za-z0-9_-]*backfill\b'
