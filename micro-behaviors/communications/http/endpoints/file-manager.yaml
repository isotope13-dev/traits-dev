defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1071.001
  mbc: C0002
  crit: component
  conf: 0.86

traits:
  - id: rest-file-tree-endpoints
    desc: REST file tree endpoints
    ref: sha256:a978ee4e489697d548b6eb4922c592307a9a38c7ad778bb0c8598fb3739c56db
    count_min: 4
    if:
      type: text
      regex: '/(public/)?(tree|files|metadata)\b'

  - id: rest-file-mutation-endpoints
    desc: REST file mutation endpoints
    ref: sha256:a978ee4e489697d548b6eb4922c592307a9a38c7ad778bb0c8598fb3739c56db
    count_min: 3
    if:
      type: text
      regex: '/(files|tree)/(rename|move|copy)|/bulk/(copy|delete|move)/files\b'

  - id: rest-archive-file-endpoints
    desc: REST archive file endpoints
    ref: sha256:a978ee4e489697d548b6eb4922c592307a9a38c7ad778bb0c8598fb3739c56db
    count_min: 2
    if:
      type: text
      regex: '/zip/(directory|files)\b'

  - id: rest-admin-config-user-endpoints
    desc: REST admin config endpoints
    ref: sha256:a978ee4e489697d548b6eb4922c592307a9a38c7ad778bb0c8598fb3739c56db
    count_min: 3
    if:
      type: text
      regex: '/(config|users/(new|change|delete)|users)\b'

composite_rules:
  - id: rest-file-manager-endpoint-matrix
    desc: REST file manager endpoint matrix
    crit: notable
    conf: 0.94
    ref: sha256:a978ee4e489697d548b6eb4922c592307a9a38c7ad778bb0c8598fb3739c56db
    all:
      - id: rest-file-tree-endpoints
      - id: rest-file-mutation-endpoints
    any:
      - id: rest-archive-file-endpoints
      - id: rest-admin-config-user-endpoints
    needs: 1
