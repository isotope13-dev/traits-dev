# Cloudflare Pages is a general-purpose static hosting endpoint.  Its domain
# alone does not establish command-and-control intent.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8

traits:
  - id: cloudflare-pages-host
    desc: Cloudflare Pages hosting domain
    if:
      type: text
      regex: '\.pages\.dev'
