defaults:
  platforms:
    - unix
  for:
    - scripts
  crit: notable
  conf: 0.8

traits:
  - id: htpasswd-command
    desc: htpasswd password file command
    if:
      type: text
      regex: '\bhtpasswd\s+-[A-Za-z]{0,8}\s+'

  - id: htpasswd-create-flag
    desc: htpasswd creates password file
    crit: component
    if:
      type: text
      regex: '\bhtpasswd\s+-[A-Za-z]{0,4}c[A-Za-z]{0,4}\s+'

  - id: htpasswd-admin-changeme
    desc: htpasswd admin changeme pair
    crit: component
    if:
      type: text
      substr: '"admin" "changeme"'

  - id: nginx-basic-auth-directive
    desc: nginx Basic Auth directive
    conf: 0.85
    for:
      - shell
    if:
      type: text
      substr: "auth_basic"

  - id: php-basic-auth-challenge
    desc: PHP Basic Auth challenge
    conf: 0.9
    platforms: [unix, windows]
    for: [php]
    if:
      type: text
      regex: 'PHP_AUTH_USER[\s\S]{0,160}PHP_AUTH_PW[\s\S]{0,220}WWW-Authenticate'
    unless:
      - id: well-known/app/egroupware/

composite_rules:
  - id: htpasswd-default-credential
    desc: htpasswd default credential
    crit: notable
    conf: 0.9
    near_lines: 3
    all:
      - id: htpasswd-create-flag
      - id: htpasswd-admin-changeme
