# A CI workflow secret used as an HTTP Authorization/Bearer credential is
# authentication to the destination API (e.g. curl -H "Authorization: Bearer
# ${{ secrets.SLACK_TOKEN }}" posting a release notification), not data
# exfiltration. Neutral discriminator: exfil composites in objectives/ that key
# on `${{ secrets }}` reaching a curl treat this as a benign auth use.
defaults:
  platforms: [unix, windows]
  for: [github-actions]
  crit: component
  conf: 0.9

traits:
  - id: workflow-secret-bearer-auth
    desc: Workflow secret in HTTP auth header
    if:
      type: text
      regex: '(?i)(authorization|bearer)[^"''\n]{0,40}\$\{\{\s*secrets\.'
