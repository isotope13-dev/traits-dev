defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.92

traits:
  - id: python-aiohttp-basic-auth
    desc: aiohttp BasicAuth call
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: aiohttp.BasicAuth

composite_rules:
  - id: python-authenticated-session-client
    desc: Python authenticated HTTP session client
    all:
      - id: micro-behaviors/communications/http/headers::authorization-header-map-entry
      - id: micro-behaviors/communications/http/lib/requests::requests-session
