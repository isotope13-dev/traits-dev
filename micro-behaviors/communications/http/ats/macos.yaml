# macOS App Transport Security (ATS) Manifest Signals
defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: allows-arbitrary-loads
    desc: ATS allows arbitrary HTTP loads
    crit: notable
    conf: 0.8
    if:
      type: value
      path: "NSAppTransportSecurity.NSAllowsArbitraryLoads"
      regex: "^(true|1)$"

  # Per-domain ATS exceptions allow insecure HTTP for a specific domain/subdomain tree.
  # The kv path returns the NSAppTransportSecurity dict as a JSON string; match subkeys via regex.
  # Used by malware to permit C2 communication without globally disabling ATS.
  - id: exception-domain-insecure-http
    desc: ATS exception allows insecure HTTP for domain
    crit: suspicious
    conf: 0.85
    attack: "T1071.001"
    if:
      type: value
      path: "NSAppTransportSecurity"
      regex: "NSExceptionAllowsInsecureHTTPLoads.{0,10}true"

  # Disabling forward secrecy allows weak cipher suites and session resumption attacks
  - id: exception-domain-no-forward-secrecy
    desc: "ATS exception disables PFS for domain"
    crit: notable
    conf: 0.8
    attack: "T1573"
    if:
      type: value
      path: "NSAppTransportSecurity"
      regex: "NSExceptionRequiresForwardSecrecy.{0,10}false"

  # TLS 1.0 is deprecated; downgrading to it is a security weakening choice
  - id: exception-domain-tls10
    desc: ATS exception downgrades minimum TLS to 1.0
    crit: notable
    conf: 0.85
    attack: "T1573"
    if:
      type: value
      path: "NSAppTransportSecurity"
      regex: "NSExceptionMinimumTLSVersion.{0,15}TLSv1\\.0"

  # Subdomains extension maximizes C2 infrastructure flexibility
  - id: exception-domain-includes-subdomains
    desc: ATS exception applies to all subdomains
    crit: component
    conf: 0.7
    if:
      type: value
      path: "NSAppTransportSecurity"
      regex: "NSIncludesSubdomains.{0,10}true"

composite_rules:
  # Full ATS bypass via exception domain: insecure HTTP + no PFS + TLS 1.0 downgrade
  # This combination is characteristic of malware intentionally weakening TLS for C2
  - id: ats-exception-domain-c2-bypass
    desc: ATS domain exception with insecure HTTP and weakened TLS
    crit: suspicious
    conf: 0.9
    attack: "T1071.001"
    all:
      - id: exception-domain-insecure-http
      - id: exception-domain-no-forward-secrecy
      - id: exception-domain-includes-subdomains
