defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: oauth-keyword-reference
  desc: OAuth keyword/reference
  crit: notable
  conf: 0.5
  if:
    type: text
    word: oauth
  unless:
  - id: metadata/package/quality::embedded-domain-reputation-catalog
- id: oauth-protocol-reference
  desc: OAuth protocol reference
  crit: notable
  conf: 0.5
  if:
    type: text
    word: OAuth
- id: bearer-auth-header-template
  # Relocated from objectives/credential-access/cloud/token: constructing an
  # outbound `Authorization: Bearer ${token}` header is ordinary API-client
  # authentication, not credential access. Composites that infer OAuth-token
  # harvesting (e.g. the Google-identity userinfo composite) reference it.
  desc: Constructs a Bearer authorization header
  crit: component
  conf: 0.82
  if:
    type: text
    regex: Authorization\s*:\s*`Bearer\s+\$\{[A-Za-z_$][\w$]*\}`
- id: access-token
  desc: access_token field reference
  crit: notable
  conf: 0.5
  count_min: 2
  if:
    type: text
    word: access_token
- id: refresh-token
  desc: refresh_token field reference
  crit: component
  conf: 0.5
  count_min: 2
  if:
    type: text
    substr: refresh_token
- id: auth-tokens-camel
  desc: authToken field name reference
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: \bauthTokens?\b
    not:
    - substr: SetAuthToken
- id: google-accounts
  desc: Google Accounts domain marker
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: accounts.google.com
  unless:
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
- id: googleapis-oauth
  desc: Google OAuth path marker
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: googleapis.com/oauth
- id: google-basic-identity-scope-string
  desc: Google OAuth limited openid/email/profile scope string
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bopenid\s+email\s+profile\b'
- id: google-basic-identity-scope-array
  desc: Google OAuth limited openid/email/profile scope array
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']openid["'']\s*,\s*["'']email["'']\s*,\s*["'']profile["'']'
- id: microsoft-login
  desc: Microsoft login domain marker
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: login.microsoftonline.com
  unless:
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
- id: microsoft-graph
  desc: graph.microsoft.com domain
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: graph.microsoft.com
  unless:
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
- id: oauth-client-id-field
  desc: OAuth client_id field
  crit: component
  conf: 0.65
  if:
    # Whole word: the bare substring matched Oracle's `client_identifier`
    # (a DB session attribute, not OAuth) and other `client_id*` identifiers.
    type: text
    word: client_id
- id: oauth-client-secret-field
  desc: OAuth client_secret field
  crit: component
  conf: 0.65
  if:
    type: text
    substr: client_secret
- id: oauth-authorize-endpoint-field
  desc: OAuth authorize endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: authorizeEndpoint
- id: oauth-token-endpoint-field
  desc: OAuth token endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: tokenEndpoint
- id: oauth-userinfo-endpoint-field
  desc: OAuth userinfo endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: userinfoEndpoint
- id: oauth-revoke-endpoint-field
  desc: OAuth revoke endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: revokeEndpoint
- id: oauth-authorization-code-grant
  desc: OAuth authorization_code grant marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: authorization_code
- id: oauth-pkce-code-verifier
  desc: OAuth PKCE code verifier marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: code_verifier
- id: oauth-pkce-code-challenge
  desc: OAuth PKCE code challenge marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: code_challenge
- id: oauth-callback-handler-name
  desc: OAuth callback handler name
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\bhandleCallback\b|\bgetAuthorizationUrl\b'
- id: microsoft-graph-mail-api
  desc: Microsoft Graph mail API
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: graph\.microsoft\.com.{0,180}(mailFolders|messages|sendMail|reply)
- id: odata-query-marker--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: '(@odata|[?&]\$(filter|select)=)'
  count_max: 1020027
- id: odata-query-marker--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: '(@odata|[?&]\$(top|orderby)=)'
  count_max: 1020028
- id: odata-query-marker--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.72
  if:
    type: text
    regex: '(@odata|[?&]\$(expand)=)'
  count_max: 1020029
composite_rules:
- id: oauth
  desc: OAuth token and endpoint markers
  crit: notable
  conf: 0.66
  any:
  - id: oauth-keyword-reference
  - id: oauth-protocol-reference
  - id: access-token
  - id: refresh-token
- id: oauth-google
  desc: Google OAuth
  crit: component
  conf: 0.66
  any:
  - id: google-accounts
  - id: googleapis-oauth
- id: google-basic-identity-scopes
  desc: Google OAuth limited to openid/email/profile scopes
  crit: baseline
  conf: 0.9
  any:
  - id: google-basic-identity-scope-string
  - id: google-basic-identity-scope-array
- id: oauth-office365
  desc: Office365 OAuth endpoint markers present
  crit: notable
  conf: 0.66
  any:
  - id: microsoft-login
  - id: microsoft-graph
- id: oauth-client-credentials
  desc: OAuth client credential fields
  crit: notable
  conf: 0.86
  all:
  - id: oauth-client-id-field
  - id: oauth-client-secret-field
- id: oauth-client-sdk-context
  desc: OAuth client SDK token lifecycle context
  crit: component
  conf: 0.95
  needs: 5
  any:
  - id: oauth-client-id-field
  - id: access-token
  - id: refresh-token
  - id: oauth-authorize-endpoint-field
  - id: oauth-token-endpoint-field
  - id: oauth-userinfo-endpoint-field
  - id: oauth-revoke-endpoint-field
  - id: oauth-authorization-code-grant
  - id: oauth-pkce-code-verifier
  - id: oauth-pkce-code-challenge
  - id: oauth-callback-handler-name
- id: odata-query-marker
  desc: OData query marker
  crit: notable
  conf: 0.72
  any:
  - id: odata-query-marker--rx-1
  - id: odata-query-marker--rx-2
  - id: odata-query-marker--rx-3
