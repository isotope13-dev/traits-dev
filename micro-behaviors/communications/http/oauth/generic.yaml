defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: google-oauth-authorize-url
  desc: Google OAuth authorize URL
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'https?://accounts\.google\.com/o/oauth2(/v2)?/auth\b'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: micro-behaviors/process/interpreter/vm/
  - id: metadata/library/runtime::acquire-vscode-api
  - id: metadata/package/testing/
- id: google-userinfo-profile-scope
  desc: Requests Google profile identity scope
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: googleapis.com/auth/userinfo.profile
- id: google-userinfo-email-scope
  desc: Requests Google email identity scope
  crit: notable
  conf: 0.9
  if:
      type: text
      substr: googleapis.com/auth/userinfo.email
- id: google-oauth-device-code
  desc: Google OAuth device authorization endpoint
  crit: notable
  conf: 0.86
  if:
    type: text
    substr: oauth2.googleapis.com/device/code
- id: oauth-workers-redirect-uri
  desc: OAuth callback uses Workers endpoint
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'redirect_uri.{0,160}workers\.dev/oauth2callback'
- id: oauth-callback-email-param-read
  desc: Reads email from OAuth callback URL
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: 'extractURLParameter\([^)]{0,80}[''"]mail[''"]'
- id: oauth-keyword-reference
  desc: References an OAuth endpoint marker
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: '(?i)\boauth[/:._-](authorize|token|callback)\b'
  unless:
  - id: metadata/package/quality/
- id: oauth-protocol-reference
  desc: References the OAuth 2 protocol
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: '(?i)\boauth[[:space:]]*2([.]0)?\b'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
- id: oauth-offline-access-url
  desc: OAuth URL requests offline access
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '[?&]access_type=offline\b|access_type%3Doffline\b'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: bearer-auth-header-template
  # Relocated from objectives/credential-access/cloud/token: constructing an
  # outbound `Authorization: Bearer ${token}` header is ordinary API-client
  # authentication, not credential access. Composites that infer OAuth-token
  # harvesting (e.g. the Google-identity userinfo composite) reference it.
  desc: Constructs a Bearer authorization header
  crit: component
  conf: 0.82
  if:
    type: text
    regex: Authorization\s*:\s*`Bearer\s+\$\{[A-Za-z_$][\w$]*\}`
- id: access-token
  desc: access_token field reference
  crit: notable
  conf: 0.5
  count_min: 2
  if:
    type: text
    word: access_token
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: well-known/tool/development/debugpy/
  - type: path
    basename: true
    regex: '(?i)(debugpy|pydevd)'
- id: access-token-presence-check
  desc: Checks OAuth access token presence
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: 'access_token["''][\s\S]{0,120}(has_token|looks_like_success)'
- id: refresh-token
  desc: refresh_token field reference
  crit: notable
  conf: 0.75
  count_min: 1
  if:
    type: text
    substr: refresh_token
- id: password-grant-type
  desc: OAuth password grant_type field
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: 'grant_type["'']?\s*:\s*["'']password["'']'
- id: auth-tokens-camel
  desc: authToken field name reference
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: \bauthTokens?\b
    not:
    - substr: SetAuthToken
- id: google-accounts
  desc: Google Accounts domain marker
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: accounts.google.com
  unless:
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
- id: googleapis-oauth
  desc: Google OAuth path marker
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: googleapis.com/oauth
- id: google-basic-identity-scope-string
  desc: 'google basic identity scope string'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bopenid\s+email\s+profile\b'
- id: google-basic-identity-scope-array
  desc: 'google basic identity scope array'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']openid["'']\s*,\s*["'']email["'']\s*,\s*["'']profile["'']'
- id: microsoft-login
  desc: References a Microsoft login domain
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: login.microsoftonline.com
  unless:
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
- id: microsoft-graph
  desc: graph.microsoft.com domain
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: graph.microsoft.com
  unless:
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
- id: oauth-client-id-field
  desc: OAuth client_id field
  crit: component
  conf: 0.65
  if:
    # Whole word: the bare substring matched Oracle's `client_identifier`
    # (a DB session attribute, not OAuth) and other `client_id*` identifiers.
    type: text
    word: client_id
  unless:
  - id: micro-behaviors/communications/http/oauth/
- id: oauth-client-secret-field
  desc: OAuth client_secret field
  crit: component
  conf: 0.65
  if:
    type: text
    substr: client_secret
  unless:
  - id: micro-behaviors/communications/http/oauth/
- id: oauth-authorize-endpoint-field
  desc: OAuth authorize endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: authorizeEndpoint
- id: oauth-token-endpoint-field
  desc: OAuth token endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: tokenEndpoint
- id: oauth-userinfo-endpoint-field
  desc: OAuth userinfo endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: userinfoEndpoint
- id: oauth-revoke-endpoint-field
  desc: OAuth revoke endpoint field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: revokeEndpoint
- id: oauth-authorization-code-grant
  desc: OAuth authorization-code grant field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: authorization_code
- id: oauth-pkce-code-verifier
  desc: OAuth PKCE code-verifier field
  crit: notable
  conf: 0.8
  for: [scripts, binaries, go]
  if:
    type: text
    regex: '(?i)code_?verifier'
- id: oauth-pkce-code-challenge
  desc: OAuth PKCE code-challenge field
  crit: notable
  conf: 0.8
  for: [scripts, binaries, go]
  if:
    type: text
    regex: '(?i)code_?challenge'
- id: oauth-device-authorization-path
  desc: OAuth device authorization endpoint path
  crit: notable
  conf: 0.9
  for: [scripts, binaries, go]
  if:
    type: text
    substr: device-authorization
- id: microsoft-graph-mail-api
  desc: Microsoft Graph mail API
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: graph\.microsoft\.com.{0,180}(mailFolders|messages|sendMail|reply)
- id: microsoft-graph-todo-api
  desc: Microsoft Graph To Do task API
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: graph\.microsoft\.com/v1\.0/me/todo/(lists|tasks)|Tasks\.ReadWrite
- id: graph-sharepoint-list-items
  desc: Microsoft Graph SharePoint list items path
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: /lists[/(][\w%'()-]{1,64}/items
- id: odata-query-marker--rx-1
  desc: OData filter or select query field
  crit: component
  conf: 0.72
  if:
    type: text
    regex: '(@odata|[?&]\$(filter|select)=)'
  count_max: 1020027
- id: odata-query-marker--rx-2
  desc: OData top or orderby query field
  crit: component
  conf: 0.72
  if:
    type: text
    regex: '(@odata|[?&]\$(top|orderby)=)'
  count_max: 1020028
- id: odata-query-marker--rx-3
  desc: OData expand query field
  crit: component
  conf: 0.72
  if:
    type: text
    regex: '(@odata|[?&]\$(expand)=)'
  count_max: 1020029
- id: oauth-callback-handler-name--handlecallback
  desc: OAuth callback handler name (handleCallback)
  crit: component
  conf: 0.8
  if:
    type: text
    word: handleCallback
- id: oauth-callback-handler-name--getauthorizationurl
  desc: OAuth callback handler (getAuthorizationUrl)
  crit: component
  conf: 0.8
  if:
    type: text
    word: getAuthorizationUrl
composite_rules:
- id: oauth-callback-handler-name
  desc: OAuth callback handler name
  crit: component
  conf: 0.8
  any:
  - id: oauth-callback-handler-name--handlecallback
  - id: oauth-callback-handler-name--getauthorizationurl
- id: generated-api-model-field-context
  desc: Generated API model field context
  crit: component
  conf: 0.95
  any:
  - id: metadata/lang/source::generated-do-not-edit-text
  - id: metadata/lang/source::python-datamodel-codegen-generated
- id: oauth
  desc: OAuth token and endpoint markers
  crit: notable
  conf: 0.66
  any:
  - id: oauth-keyword-reference
  - id: oauth-protocol-reference
  - id: access-token
  - id: refresh-token
- id: oauth-google
  desc: Google OAuth
  crit: component
  conf: 0.66
  any:
  - id: google-accounts
  - id: googleapis-oauth
- id: google-basic-identity-scopes
  desc: Google OAuth limited to openid/email/profile scopes
  crit: baseline
  conf: 0.9
  any:
  - id: google-basic-identity-scope-string
  - id: google-basic-identity-scope-array
- id: oauth-office365
  desc: Office365 OAuth endpoint markers present
  crit: notable
  conf: 0.66
  any:
  - id: microsoft-login
  - id: microsoft-graph
- id: microsoft-graph-list-channel
  desc: Microsoft Graph SharePoint list read/write data channel
  crit: notable
  conf: 0.8
  all:
  - id: microsoft-graph
  - id: graph-sharepoint-list-items
- id: oauth-client-credentials
  desc: OAuth client credential fields
  crit: notable
  conf: 0.86
  all:
  - id: oauth-client-id-field
  - id: oauth-client-secret-field
  unless:
  - id: micro-behaviors/communications/http/oauth/
- id: oauth-client-sdk-context
  desc: OAuth client SDK token lifecycle context
  crit: component
  conf: 0.95
  needs: 5
  any:
  - id: oauth-client-id-field
  - id: access-token
  - id: refresh-token
  - id: oauth-authorize-endpoint-field
  - id: oauth-token-endpoint-field
  - id: oauth-userinfo-endpoint-field
  - id: oauth-revoke-endpoint-field
  - id: oauth-authorization-code-grant
  - id: oauth-pkce-code-verifier
  - id: oauth-pkce-code-challenge
  - id: oauth-callback-handler-name
- id: odata-query-marker
  desc: Uses OData query parameters
  crit: notable
  conf: 0.72
  any:
  - id: odata-query-marker--rx-1
  - id: odata-query-marker--rx-2
  - id: odata-query-marker--rx-3
