defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: oauth-lower
    desc: oauth lowercase
    crit: notable
    conf: 0.5
    if:
      type: text
      word: oauth
    unless:
      - id: metadata/package::embedded-domain-reputation-catalog
  - id: oauth-upper
    desc: OAuth capitalized
    crit: notable
    conf: 0.5
    if:
      type: text
      word: OAuth
  - id: access-token
    desc: access_token reference
    crit: notable
    conf: 0.5
    count_min: 2
    if:
      type: text
      substr: access_token
  - id: refresh-token
    desc: refresh_token reference
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: refresh_token
  - id: auth-tokens-camel
    desc: authTokens reference (camelCase)
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bauthTokens?\b
      not:
        - substr: SetAuthToken
  - id: google-accounts
    desc: accounts.google.com domain
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: accounts.google.com
  - id: googleapis-oauth
    desc: googleapis.com/oauth path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: googleapis.com/oauth
  - id: microsoft-login
    desc: login.microsoftonline.com domain
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: login.microsoftonline.com
  - id: microsoft-graph
    desc: graph.microsoft.com domain
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: graph.microsoft.com
composite_rules:
  - id: oauth
    desc: OAuth authentication
    crit: notable
    conf: 0.66
    any:
      - id: oauth-lower
      - id: oauth-upper
      - id: access-token
      - id: refresh-token
  - id: oauth-google
    desc: Google OAuth
    crit: notable
    conf: 0.66
    any:
      - id: google-accounts
      - id: googleapis-oauth
  - id: oauth-office365
    desc: Office365 OAuth
    crit: notable
    conf: 0.66
    any:
      - id: microsoft-login
      - id: microsoft-graph
