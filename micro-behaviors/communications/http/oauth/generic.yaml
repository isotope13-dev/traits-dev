defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: oauth-lower
    desc: oauth lowercase
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: oauth
    unless:
      - id: metadata/package::embedded-domain-reputation-catalog
  - id: oauth-upper
    desc: OAuth capitalized
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: OAuth
  - id: access-token
    desc: access_token field reference
    crit: notable
    conf: 0.5
    count_min: 2
    if:
      type: text
      substr: access_token
  - id: refresh-token
    desc: refresh_token field reference
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: refresh_token
  - id: auth-tokens-camel
    desc: authToken field name reference
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bauthTokens?\b
      not:
        - substr: SetAuthToken
  - id: google-accounts
    desc: Google Accounts domain marker
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: accounts.google.com
    unless:
      - type: text
        regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
  - id: googleapis-oauth
    desc: Google OAuth path marker
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: googleapis.com/oauth
  - id: microsoft-login
    desc: Microsoft login domain marker
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: login.microsoftonline.com
    unless:
      - type: text
        regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
  - id: microsoft-graph
    desc: graph.microsoft.com domain
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: graph.microsoft.com
    unless:
      - type: text
        regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
composite_rules:
  - id: oauth
    desc: OAuth token and endpoint markers
    crit: notable
    conf: 0.66
    any:
      - id: oauth-lower
      - id: oauth-upper
      - id: access-token
      - id: refresh-token
  - id: oauth-google
    desc: Google OAuth
    crit: component
    conf: 0.66
    any:
      - id: google-accounts
      - id: googleapis-oauth
  - id: oauth-office365
    desc: Office365 OAuth endpoint markers present
    crit: notable
    conf: 0.66
    any:
      - id: microsoft-login
      - id: microsoft-graph
