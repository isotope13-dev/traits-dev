defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]

traits:
  - id: oauth-consent-prompt-parameter
    desc: OAuth request forces consent prompt
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '[?&]prompt=consent\b|prompt%3Dconsent\b'
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
