defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1071.001
  mbc: C0002
traits:
- id: discord-api-users-me-url
  desc: Discord users/@me API endpoint
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: discord(app)?\.com/api/(v[0-9]+/)?users/@me
- id: discord-users-me-path
  desc: Discord users/@me path
  crit: component
  conf: 0.75
  if:
    type: text
    substr: users/@me
- id: discord-oauth-authorize-url
  desc: Discord OAuth authorize endpoint
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: discord(app)?\.com/oauth2/authorize
- id: discord-oauth-token-url
  desc: Discord OAuth token endpoint
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: discord(app)?\.com/api/oauth2/token
