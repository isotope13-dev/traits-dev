# Chromium DevTools Protocol (CDP) client surface.
#
# CDP is the low-level protocol used by Chrome/Edge/Electron for headless
# automation, debugging, and (when reachable) remote inspection. The atoms
# below identify code that *speaks* CDP — both legitimate clients (puppeteer,
# playwright, chromium-recorder wrappers) and post-exploitation frameworks
# that abuse a reachable debug interface to drive a running browser/Electron
# app.
#
# These are micro-behaviors — they fire broadly and the analyst decides intent
# from context (paired traits, deployment, etc.). The composite at the bottom
# requires multiple signals before claiming "this is a CDP client."
defaults:
  for: [pe, dll, csharp, go, javascript, typescript, python]
  platforms: [windows, unix]
  attack: T1106
traits:
  - id: cdp-debugger-url-key
    desc: Chrome DevTools webSocketDebuggerUrl JSON key
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: webSocketDebuggerUrl

  - id: cdp-http-json-version
    desc: CDP /json/version discovery endpoint
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: /json/version

  - id: cdp-http-json-list
    desc: "CDP /json/list HTTP discovery endpoint"
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: /json/list

  - id: cdp-http-json-protocol
    desc: 'cdp http json protocol'
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: /json/protocol

  - id: cdp-method-runtime-evaluate
    desc: CDP Runtime.evaluate arbitrary-JS dispatch
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Runtime.evaluate

  - id: cdp-method-storage-get-cookies
    desc: CDP retrieves browser cookies
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: Storage.getCookies

  - id: cdp-method-runtime-enable
    desc: CDP Runtime.enable method
    crit: component
    conf: 0.75
    if:
      type: text
      substr: Runtime.enable

  - id: cdp-method-page-navigate
    desc: CDP Page.navigate method
    crit: notable
    conf: 0.78
    if:
      type: text
      substr: Page.navigate

  - id: playwright-connect-over-cdp
    desc: Playwright connects to a browser over CDP
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: symbol
      kind: call
      substr: connect_over_cdp

  - id: cdp-execution-context-event
    desc: "CDP executionContextCreated event tracking"
    crit: component
    conf: 0.82
    if:
      type: text
      substr: Runtime.executionContextCreated
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/

composite_rules:
  - id: cdp-protocol-surface
    desc: Chrome DevTools Protocol surface
    crit: notable
    conf: 0.9
    # Two distinct CDP surfaces identify an implementation, but do not by
    # themselves distinguish a client from a server.
    # `id:` directory reference covers every atom in this leaf — see
    # `reuse/many-dir-refs` policy.
    any:
      - id: micro-behaviors/communications/http/devtools/client::cdp-debugger-url-key
      - id: micro-behaviors/communications/http/devtools/client::cdp-execution-context-event
      - id: micro-behaviors/communications/http/devtools/client::cdp-http-json-list
      - id: micro-behaviors/communications/http/devtools/client::cdp-http-json-protocol
      - id: micro-behaviors/communications/http/devtools/client::cdp-http-json-version
      - id: micro-behaviors/communications/http/devtools/client::cdp-method-page-navigate
      - id: micro-behaviors/communications/http/devtools/client::cdp-method-runtime-enable
      - id: micro-behaviors/communications/http/devtools/client::cdp-method-runtime-evaluate
    needs: 2
