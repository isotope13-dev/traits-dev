defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: a2a-sweep-signal
    desc: A2A sweep request signal
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: '"signal_type": "sweep_request"'
  - id: a2a-sweep-diff-payload
    desc: A2A request carries diff summary
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?s)signal_type.{0,160}sweep_request.{0,160}diff_summary'
  - id: a2a-bearer-http-request
    desc: A2A request uses bearer authorization
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?s)A2A_.{0,800}Authorization.{0,32}Bearer'
  - id: a2a-urllib-request
    desc: A2A request uses urllib Request
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?s)A2A_.{0,800}urllib\.request\.Request'

composite_rules:
  - id: a2a-sweep-request
    desc: A2A sweep request sends diff summary
    crit: notable
    conf: 0.94
    all:
      - id: a2a-sweep-signal
      - id: a2a-sweep-diff-payload
      - id: a2a-bearer-http-request
      - id: a2a-urllib-request
    near_bytes: 4096
