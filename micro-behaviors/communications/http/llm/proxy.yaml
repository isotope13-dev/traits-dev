defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1071.001
traits:
- id: python-ai-cloud-provider-reference
  desc: Python AI cloud provider reference
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: '(?i)(Azure OpenAI|Provider\.bedrock|Provider\.vertex)'
- id: openai-function-tool-schema
  desc: OpenAI function tool schema
  crit: notable
  conf: 0.9
  ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
  if:
    type: text
    regex: '["'']type["'']\s*:\s*["'']function["''][\s\S]{0,180}["'']function["'']\s*:'
- id: gpt-proxy-log-prefix
  desc: GPT proxy diagnostic prefix
  crit: notable
  conf: 0.86
  if:
    type: text
    substr: "gpt-proxy:"
- id: llm-chat-completions-path
  desc: OpenAI-compatible chat completions path
  crit: notable
  conf: 0.76
  if:
    type: text
    substr: /v1/chat/completions
- id: jvm-llm-chat-completions-path
  desc: JVM OpenAI-compatible chat completions path
  crit: notable
  conf: 0.9
  for: [class]
  if:
    type: hex
    pattern: 2F 76 31 2F 63 68 61 74 2F 63 6F 6D 70 6C 65 74 69 6F 6E 73
- id: llm-responses-path
  desc: OpenAI-compatible responses path
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: /v1/responses
- id: vllm-inference-generate-path
  desc: vLLM inference generate path
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: '\bendpoint\s*=\s*f?["''].{0,240}/inference/v1/generate'
- id: llm-messages-path
  desc: Anthropic-compatible messages path
  crit: notable
  conf: 0.72
  if:
    type: text
    substr: /v1/messages
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: jvm-llm-messages-path
  desc: JVM Anthropic-compatible messages path
  crit: notable
  conf: 0.9
  for: [class]
  if:
    type: hex
    pattern: 2F 76 31 2F 6D 65 73 73 61 67 65 73
- id: openrouter-chat-completions-url
  desc: OpenRouter chat completions API URL
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: https://openrouter.ai/api/v1/chat/completions
- id: llm-provider-proxy-route--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: claude/chat/completions
  count_max: 1020313
- id: llm-provider-proxy-route--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: whisper/fast
  count_max: 1020314
- id: llm-provider-proxy-route--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: deepseek/r1
  count_max: 1020315
- id: llm-provider-proxy-route--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: gpt-proxy
  count_max: 1020316
- id: llm-response-event-json
  desc: OpenAI responses streaming event JSON
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: '"type":"response\.(created|completed|incomplete)"'
- id: llm-function-call-event
  desc: LLM function call streaming event
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: 'response\.function_call_arguments\.(delta|done)'
- id: llm-tool-calls-json
  desc: LLM tool calls JSON field
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: 'json:"tool_calls"'
- id: llm-token-usage-json--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: completion_tokens
  count_max: 1020320
- id: llm-token-usage-json--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: reasoning_tokens
  count_max: 1020321
- id: llm-token-usage-json--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: output_tokens
  count_max: 1020322
- id: llm-token-usage-json--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: prompt_tokens
  count_max: 1020323
- id: llm-token-usage-json--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: input_tokens
  count_max: 1020324
- id: llm-token-usage-json--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: total_tokens
  count_max: 1020325
- id: llm-api-proxy-phrase
  desc: Local LLM API proxy
  crit: notable
  conf: 0.88
  if:
    type: text
    substr: LLM API proxy
- id: llm-api-cost-attribution-phrase
  desc: LLM API cost attribution phrase
  crit: component
  conf: 0.88
  if:
    type: text
    substr: LLM API cost-attribution
- id: llm-cost-tracking-marker
  desc: LLM cost tracking marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: cost-tracking.{0,80}llm
- id: mitmproxy-openai-marker
  desc: mitmproxy OpenAI marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: mitmproxy.{0,80}openai
- id: llm-body-request-table
  desc: Request bodies table
  crit: component
  conf: 0.82
  if:
    type: text
    substr: request_bodies
- id: llm-body-capture-flag
  desc: Body capture flag
  crit: component
  conf: 0.82
  if:
    type: text
    substr: body_capture
- id: llm-request-response-body-fields
  desc: Request response body fields
  crit: component
  conf: 0.82
  if:
    type: text
    regex: request_body.{0,80}response_body
- id: llm-cloud-upload-request-body
  desc: Upload request body function
  crit: component
  conf: 0.86
  if:
    type: text
    substr: upload_request_body
- id: llm-cloud-body-b64-field
  desc: Body base64 upload field
  crit: component
  conf: 0.84
  if:
    type: text
    substr: body_b64
- id: llm-cloud-uploaded-at-field
  desc: Request bodies uploaded timestamp
  crit: component
  conf: 0.84
  if:
    type: text
    substr: request_bodies.uploaded_at
- id: llm-body-upload-route
  desc: Request body upload route
  crit: component
  conf: 0.86
  if:
    type: text
    substr: /v1/requests/{id}/body
- id: llm-provider-openai-host
  desc: OpenAI provider host
  crit: component
  conf: 0.82
  if:
    type: text
    substr: api.openai.com
- id: llm-provider-anthropic-host
  desc: Anthropic provider host
  crit: component
  conf: 0.82
  if:
    type: text
    substr: api.anthropic.com
- id: llm-provider-anthropic-messages-endpoint
  desc: Anthropic Messages API endpoint
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: api.anthropic.com/v1/messages
- id: llm-provider-openai-audio-speech-endpoint
  desc: OpenAI audio speech endpoint
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: api.openai.com/v1/audio/speech
- id: llm-provider-gemini-host
  desc: Gemini provider host
  crit: component
  conf: 0.82
  if:
    type: text
    substr: generativelanguage.googleapis.com
- id: llm-provider-xai-host
  desc: xAI provider host
  crit: component
  conf: 0.82
  if:
    type: text
    substr: api.x.ai
- id: llm-provider-bedrock-host
  desc: Bedrock provider host
  crit: component
  conf: 0.82
  if:
    type: text
    substr: bedrock.amazonaws.com
- id: llm-provider-vertex-host
  desc: Vertex provider host
  crit: component
  conf: 0.82
  if:
    type: text
    substr: aiplatform.googleapis.com
- id: llm-bedrock-no-adapter-note
  desc: Bedrock adapter absence note
  crit: component
  conf: 0.84
  if:
    type: text
    substr: No adapter ships for Bedrock
- id: llm-vertex-no-adapter-note
  desc: Vertex adapter absence note
  crit: component
  conf: 0.84
  if:
    type: text
    substr: Vertex today
- id: llm-loopback-http-api-phrase
  desc: Loopback HTTP API phrase
  crit: component
  conf: 0.86
  if:
    type: text
    substr: Loopback HTTP API
- id: llm-api-host-loopback
  desc: API host loopback
  crit: component
  conf: 0.84
  if:
    type: text
    regex: api_host.{0,80}127\.0\.0\.1
- id: llm-api-port-field
  desc: API port field
  crit: component
  conf: 0.8
  if:
    type: text
    substr: api_port
- id: llm-loopback-proxy-port
  desc: Loopback proxy port
  crit: component
  conf: 0.84
  if:
    type: text
    substr: 127.0.0.1:8081
- id: llm-loopback-api-port
  desc: Loopback API port
  crit: component
  conf: 0.84
  if:
    type: text
    substr: 127.0.0.1:8765
- id: gpt-proxy-websocket-upstream--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: 'gpt-proxy: ws'
  count_max: 1020326
- id: gpt-proxy-websocket-upstream--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: v1/responses
  count_max: 1020327
- id: gpt-proxy-websocket-upstream--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\bgpt-proxy:.{0,80}\bconnected\b|\bconnected\b.{0,80}\b(upstream|websocket)\b'
  count_max: 1020328
- id: gpt-proxy-websocket-upstream--rx-14
  desc: gpt-proxy WebSocket upstream log marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\b(websocket|gpt-proxy)\b.{0,40}\bupstream\b'
  count_max: 1020329
- id: gpt-proxy-websocket-upstream--rx-15
  desc: WebSocket protocol-upgrade handshake marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\bwebsocket\b.{0,30}\bupgrade\b|\bupgrade\b.{0,30}\bwebsocket\b'
  count_max: 1020330
- id: gpt-proxy-websocket-upstream--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)gpt-proxy.{0,80}\bmerged\b|websocket.{0,80}\bmerged\b'
  count_max: 1020331
composite_rules:
- id: llm-api-compat-proxy
  desc: Embedded LLM API compatibility proxy
  crit: notable
  conf: 0.9
  all:
  - id: gpt-proxy-log-prefix
  any:
  - id: llm-chat-completions-path
  - id: llm-responses-path
  - id: llm-messages-path
  - id: llm-provider-proxy-route
  - id: llm-response-event-json
  - id: llm-function-call-event
  - id: gpt-proxy-websocket-upstream
- id: llm-streaming-tool-proxy
  desc: LLM streaming tool-call proxy
  crit: notable
  conf: 0.86
  all:
  - id: llm-api-compat-proxy
  any:
  - id: llm-tool-calls-json
  - id: llm-token-usage-json
  - id: llm-function-call-event
  needs: 2
- id: llm-local-metering-proxy-marker
  desc: Local LLM metering proxy marker
  crit: notable
  conf: 0.88
  any:
  - id: llm-api-proxy-phrase
  - id: llm-api-cost-attribution-phrase
  - id: llm-cost-tracking-marker
  - id: mitmproxy-openai-marker
- id: llm-body-capture-storage
  desc: LLM request body capture storage
  crit: component
  conf: 0.86
  any:
  - id: llm-body-request-table
  - id: llm-body-capture-flag
  - id: llm-request-response-body-fields
- id: llm-cloud-body-upload
  desc: LLM captured body cloud upload
  crit: component
  conf: 0.88
  any:
  - id: llm-cloud-upload-request-body
  - id: llm-cloud-body-b64-field
  - id: llm-cloud-uploaded-at-field
  - id: llm-body-upload-route
- id: llm-provider-host-allowlist
  desc: LLM provider host allowlist
  crit: notable
  conf: 0.88
  needs: 2
  any:
  - id: llm-provider-openai-host
  - id: llm-provider-anthropic-host
  - id: llm-provider-gemini-host
  - id: llm-provider-xai-host
  - id: llm-provider-bedrock-host
  - id: llm-provider-vertex-host
- id: llm-official-provider-api-call
  desc: Official LLM provider API call
  crit: notable
  conf: 0.92
  any:
  - id: llm-provider-anthropic-messages-endpoint
  - id: llm-provider-openai-audio-speech-endpoint
- id: llm-provider-allowlist-without-adapter
  desc: LLM provider allowlist includes adapterless provider
  crit: component
  conf: 0.84
  any:
  - id: llm-bedrock-no-adapter-note
  - id: llm-vertex-no-adapter-note
- id: llm-api-host-port-config
  desc: LLM API host port config
  crit: component
  conf: 0.84
  all:
  - id: llm-api-host-loopback
  - id: llm-api-port-field
  near_bytes: 600
- id: llm-metering-loopback-api
  desc: LLM metering loopback HTTP API
  crit: notable
  conf: 0.88
  any:
  - id: llm-loopback-http-api-phrase
  - id: llm-loopback-api-port
  - id: llm-api-host-port-config
- id: loopback-llm-proxy-ports
  desc: Loopback LLM proxy ports
  crit: notable
  conf: 0.86
  any:
  - id: llm-loopback-proxy-port
  - id: llm-loopback-api-port
- id: llm-local-metering-context
  desc: Local LLM metering context
  crit: notable
  conf: 0.88
  any:
  - id: llm-api-proxy-phrase
  - id: llm-api-cost-attribution-phrase
  - id: llm-cost-tracking-marker
  - id: mitmproxy-openai-marker
  - id: llm-loopback-http-api-phrase
  - id: llm-loopback-proxy-port
  - id: llm-loopback-api-port
- id: llm-metering-proxy-support
  desc: LLM metering proxy support
  crit: component
  conf: 0.88
  needs: 2
  any:
  - id: llm-provider-host-allowlist
  - id: llm-provider-allowlist-without-adapter
  - id: llm-token-usage-json
  - id: llm-chat-completions-path
  - id: llm-responses-path
  - id: llm-messages-path
- id: local-llm-metering-proxy
  desc: Local LLM metering proxy
  crit: notable
  conf: 0.92
  all:
  - id: llm-local-metering-context
  - id: llm-metering-proxy-support
- id: local-llm-metering-body-capture
  desc: Local LLM proxy captures bodies
  crit: notable
  conf: 0.9
  all:
  - id: local-llm-metering-proxy
  - id: llm-body-capture-storage
- id: local-llm-metering-cloud-body-sync
  desc: Local LLM body cloud sync
  crit: notable
  conf: 0.9
  all:
  - id: local-llm-metering-body-capture
  - id: llm-cloud-body-upload
- id: llm-provider-proxy-route
  desc: LLM provider proxy route
  crit: notable
  conf: 0.82
