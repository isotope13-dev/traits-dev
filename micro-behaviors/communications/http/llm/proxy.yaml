defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1071.001
traits:
- id: gpt-proxy-log-prefix
  desc: GPT proxy diagnostic prefix
  crit: notable
  conf: 0.86
  if:
    type: text
    substr: "gpt-proxy:"
- id: llm-chat-completions-path
  desc: OpenAI-compatible chat completions path
  crit: notable
  conf: 0.76
  if:
    type: text
    substr: /v1/chat/completions
- id: llm-responses-path
  desc: OpenAI-compatible responses path
  crit: notable
  conf: 0.78
  if:
    type: text
    substr: /v1/responses
- id: llm-messages-path
  desc: Anthropic-compatible messages path
  crit: notable
  conf: 0.72
  if:
    type: text
    substr: /v1/messages
- id: llm-provider-proxy-route--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: claude/chat/completions
  count_max: 1020313
- id: llm-provider-proxy-route--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: whisper/fast
  count_max: 1020314
- id: llm-provider-proxy-route--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: deepseek/r1
  count_max: 1020315
- id: llm-provider-proxy-route--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: gpt-proxy
  count_max: 1020316
- id: llm-response-event-json
  desc: OpenAI responses streaming event JSON
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: '"type":"response\.(created|completed|incomplete)"'
- id: llm-function-call-event
  desc: LLM function call streaming event
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: 'response\.function_call_arguments\.(delta|done)'
- id: llm-tool-calls-json
  desc: LLM tool calls JSON field
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: 'json:"tool_calls"'
- id: llm-token-usage-json--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: completion_tokens
  count_max: 1020320
- id: llm-token-usage-json--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: reasoning_tokens
  count_max: 1020321
- id: llm-token-usage-json--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: output_tokens
  count_max: 1020322
- id: llm-token-usage-json--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: prompt_tokens
  count_max: 1020323
- id: llm-token-usage-json--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: input_tokens
  count_max: 1020324
- id: llm-token-usage-json--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.65
  if:
    type: text
    substr: total_tokens
  count_max: 1020325
- id: gpt-proxy-websocket-upstream--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: 'gpt-proxy: ws'
  count_max: 1020326
- id: gpt-proxy-websocket-upstream--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: v1/responses
  count_max: 1020327
- id: gpt-proxy-websocket-upstream--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: connected
  count_max: 1020328
- id: gpt-proxy-websocket-upstream--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: upstream
  count_max: 1020329
- id: gpt-proxy-websocket-upstream--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: upgrade
  count_max: 1020330
- id: gpt-proxy-websocket-upstream--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: merged
  count_max: 1020331
composite_rules:
- id: llm-api-compat-proxy
  desc: Embedded LLM API compatibility proxy
  crit: notable
  conf: 0.9
  all:
  - id: gpt-proxy-log-prefix
  any:
  - id: llm-chat-completions-path
  - id: llm-responses-path
  - id: llm-messages-path
  - id: llm-provider-proxy-route
  - id: llm-response-event-json
  - id: llm-function-call-event
  - id: gpt-proxy-websocket-upstream
- id: llm-streaming-tool-proxy
  desc: LLM streaming tool-call proxy
  crit: notable
  conf: 0.86
  all:
  - id: llm-api-compat-proxy
  any:
  - id: llm-tool-calls-json
  - id: llm-token-usage-json
  - id: llm-function-call-event
  needs: 2
- id: llm-provider-proxy-route
  desc: LLM provider proxy route
  crit: notable
  conf: 0.82
  any:
  - id: llm-provider-proxy-route--rx-1
  - id: llm-provider-proxy-route--rx-2
  - id: llm-provider-proxy-route--rx-3
  - id: llm-provider-proxy-route--rx-4
- id: llm-token-usage-json
  desc: LLM token usage JSON fields
  crit: component
  conf: 0.65
  any:
  - id: llm-token-usage-json--rx-5
  - id: llm-token-usage-json--rx-6
  - id: llm-token-usage-json--rx-7
  - id: llm-token-usage-json--rx-8
  - id: llm-token-usage-json--rx-9
  - id: llm-token-usage-json--rx-10
- id: gpt-proxy-websocket-upstream
  desc: GPT proxy WebSocket upstream diagnostics
  crit: notable
  conf: 0.86
  any:
  - id: gpt-proxy-websocket-upstream--rx-11
  - id: gpt-proxy-websocket-upstream--rx-12
  - id: gpt-proxy-websocket-upstream--rx-13
  - id: gpt-proxy-websocket-upstream--rx-14
  - id: gpt-proxy-websocket-upstream--rx-15
  - id: gpt-proxy-websocket-upstream--rx-16
