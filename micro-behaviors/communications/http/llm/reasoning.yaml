# Reasoning-control parameters shared across LLM chat APIs. These are
# vendor-neutral request/response fields: `reasoning_effort` is the
# OpenAI-compatible knob (also carried by Codex, OpenRouter and the
# OpenAI-compatible mode of most providers), and "thinking mode" is the
# equivalent toggle used by Anthropic, Qwen and DeepSeek clients.
#
# They say only "this code drives an LLM's reasoning depth" — a neutral
# capability, not a provider identity. Provider-specific hosts and fields
# live under communications/http/services/<provider>/; composites there
# reference these atoms to pin a request to a given vendor.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, json, python, go, csharp, java, ruby]
  attack: T1071.001
  mbc: C0002
  crit: notable
  conf: 0.88

traits:
  - id: llm-reasoning-effort-parameter
    desc: LLM reasoning_effort request parameter
    if:
      type: text
      word: reasoning_effort

  - id: llm-thinking-mode-parameter
    desc: LLM thinking-mode request parameter
    if:
      type: text
      regex: '\bthinking[_ -]mode\b'
