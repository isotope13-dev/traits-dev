# Talks to a hosted LLM chat/completion endpoint, regardless of vendor.
#
# Neutral capability: countless legitimate tools call these APIs. It exists so
# objective composites can express "sends X to an LLM" or "executes what an LLM
# returned" without binding themselves to one provider's hostname — a rule that
# names a single vendor is evaded by swapping the base URL, since nearly every
# provider (OpenAI, DeepSeek, Groq, Mistral, OpenRouter, Together, local
# vLLM/Ollama shims) speaks the same OpenAI-compatible path.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
  mbc: C0002

composite_rules:
  - id: llm-chat-api-endpoint
    desc: Calls a hosted LLM chat API endpoint
    crit: notable
    conf: 0.85
    any:
      # OpenAI-compatible surface — the de-facto standard most vendors expose.
      - id: micro-behaviors/communications/http/llm::llm-chat-completions-path
      - id: micro-behaviors/communications/http/llm::llm-responses-path
      # Anthropic-compatible surface.
      - id: micro-behaviors/communications/http/llm::llm-messages-path
      # Vendor clients whose base URL alone identifies the service.
      - id: micro-behaviors/communications/http/services/deepseek::deepseek-chat-api-client
      - id: micro-behaviors/communications/http/services/gemini::gemini-generative-ai-client
