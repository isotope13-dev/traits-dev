# Binary data POST upload patterns
defaults:
  for: [shell]
  platforms: [unix]
traits:
  - id: curl-post-binary-upload
    desc: Curl binary data upload to external URL
    crit: notable
    conf: 0.78
    if:
      type: text
      substr: --data-binary "@
  - id: curl-upload-filename-header
    desc: Curl sends upload filename header
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '-H\s+["'']X-Filename:'
  - id: pe-octet-stream-content-type
    desc: PE octet-stream upload header
    crit: component
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: "Content-Type: application/octet-stream"
  - id: pe-filename-upload-header
    desc: PE upload filename header
    crit: notable
    conf: 0.92
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: "X-Filename:"
  - id: pe-browser-type-upload-header
    desc: PE browser type upload header
    crit: notable
    conf: 0.94
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: "X-Browser-Type:"
  - id: pe-profile-name-upload-header
    desc: PE profile name upload header
    crit: notable
    conf: 0.94
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: "X-Profile-Name:"
  - id: pe-jpeg-content-type
    desc: PE JPEG upload header
    crit: component
    conf: 0.86
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: "Content-Type: image/jpeg"
