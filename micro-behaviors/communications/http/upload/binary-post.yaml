# Binary data POST upload patterns
defaults:
  for: [shell]
  platforms: [unix]
traits:
  - id: curl-post-binary-upload
    desc: Curl binary data upload to external URL
    crit: notable
    conf: 0.78
    if:
      type: text
      substr: --data-binary "@
  - id: curl-upload-filename-header
    desc: Curl sends upload filename header
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '-H\s+["'']X-Filename:'
