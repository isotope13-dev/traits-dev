defaults:
  platforms: [windows, linux, macos]
  for: [python]
  attack: T1071.001

traits:
  - id: upload-file-method-call
    desc: Calls file upload method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)upload_file$'

  - id: upload-transcript-method-call
    desc: Calls agent transcript upload method
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      regex: '(^|\.)upload_transcript$'

  - id: upload-session-artifact-method-call
    desc: Calls session artifact upload method
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      regex: '(^|\.)upload_session_artifact$'

  - id: requests-post-files-parameter
    desc: requests multipart file upload
    crit: notable
    conf: 0.9
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    if:
      # Restrict this to an actual call node so examples in comments and
      # docstrings do not look like uploads.
      type: tree-sitter
      kind: call
      regex: 'requests\.post\s*\([\s\S]{0,420}\bfiles\s*='
