defaults:
  platforms: [android, unix]
  for: [shell, php, perl, c, cpp, elf, go, kotlin, zig]
  attack: T1071.001

traits:
  - id: shell-curl-form-file-upload
    desc: curl uploads local multipart file
    crit: notable
    conf: 0.92
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: 'curl\s+[^\n]{0,180}-F\s+".{0,80}=@.{0,120}"'

  - id: octet-stream-upload-header
    desc: HTTP octet-stream upload header
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: "Content-Type: application/octet-stream"
