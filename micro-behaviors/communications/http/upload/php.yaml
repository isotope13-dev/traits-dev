defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: C0002

traits:
  - id: wordpress-handle-upload-call
    desc: WordPress upload handler call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: wp_handle_upload
  - id: wordpress-nonce-verify-call
    desc: WordPress nonce verification call
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: wp_verify_nonce

composite_rules:
  - id: wordpress-validated-file-upload
    desc: WordPress nonce-validated file upload
    crit: notable
    conf: 0.9
    all:
      - id: wordpress-handle-upload-call
      - id: wordpress-nonce-verify-call
      - id: micro-behaviors/communications/http/request/params::files
