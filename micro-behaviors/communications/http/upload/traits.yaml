defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: http-upload-symbol-a
    desc: HTTP file upload symbol family A
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: (^|_)http[_-]?upload|curl_easy_upload
  - id: http-upload-symbol-b
    desc: HTTP file upload symbol family B
    crit: notable
    conf: 0.6
    if:
      type: symbol
      substr: http_put
  - id: curl-zip
    desc: curl with .zip
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: curl.{0,50}\.zip
  - id: post-zip
    desc: POST with .zip
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: POST.{0,50}\.zip
  - id: upload-zip
    desc: upload .zip
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: upload.{0,50}\.zip
  - id: send-zip
    desc: send .zip
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: send.{0,50}\.zip
  - id: curl-upload-file
    desc: curl --upload-file flag
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: curl\s+.{0,100}--upload-file\b
  - id: http-upload-url-path
    desc: HTTP URL with upload endpoint
    crit: notable
    conf: 0.76
    if:
      type: text
      regex: 'https?://[A-Za-z0-9.-]{3,253}/[A-Za-z0-9._~:/?#\[\]@!$&''()*+,;=-]{0,80}upload\b'
  - id: multipart-file-array-field
    desc: Multipart file array field
    crit: component
    conf: 0.82
    if:
      type: text
      exact: file[]
  - id: dotnet-webclient-uploadfile
    desc: .NET WebClient.UploadFile HTTP exfiltration
    crit: notable
    conf: 0.85
    for: [csharp, source]
    if:
      type: text
      regex: client\.UploadFile\s*\(
  - id: dotnet-webclient-uploadvalues
    desc: .NET WebClient.UploadValues form post
    crit: notable
    conf: 0.8
    for: [csharp, source]
    if:
      type: text
      regex: client\.UploadValues\s*\(
composite_rules:
  - id: http-upload-symbol
    desc: HTTP file upload symbol
    crit: notable
    conf: 0.6
    any:
      - id: http-upload-symbol-a
      - id: http-upload-symbol-b
  - id: zip-upload
    desc: ZIP archive upload
    crit: notable
    conf: 0.75
    any:
      - id: curl-zip
      - id: post-zip
      - id: upload-zip
      - id: send-zip
      - id: curl-upload-file
