# Curl binary data upload
defaults:
  for: [shell, c, cpp]
  platforms: [unix]
traits:
  - id: curl-data-binary
    desc: curl uploads raw binary body
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: --data-binary
  - id: curl-data-binary-stdin
    desc: curl uploads stdin as raw body
    crit: suspicious
    conf: 0.86
    for: [scripts, binaries, shell, batch, powershell, groovy, python, javascript, ruby]
    if:
      type: text
      regex: '\bcurl\b[^\n]{0,120}--data-binary\s+@-'
  - id: github-uploads-api
    desc: GitHub release asset upload API endpoint
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: uploads.github.com
