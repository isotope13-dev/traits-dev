# Curl binary data upload
defaults:
  for: [shell]
  platforms: [unix]
traits:
  - id: curl-data-binary
    desc: curl uploads raw binary body
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: --data-binary
  - id: github-uploads-api
    desc: GitHub release asset upload API endpoint
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: uploads.github.com
