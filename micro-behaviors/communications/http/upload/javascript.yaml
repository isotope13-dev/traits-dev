defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: yarn-standalone-text
    desc: Yarn standalone bundle text marker
    crit: component
    if:
      type: text
      regex: 'yarnpkg\.com|Yarn\s+\d'
  - id: form-data-new
    desc: Creates FormData object
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: 'new\s+FormData\('
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  - id: form-data-append
    desc: Appends data to FormData
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(FormData|formData|fd)\b[\s\S]{0,120}\.append\('
    unless:
      - id: metadata/file/format::sourcemap-sources-content
  - id: blob-gzip-create
    desc: Creates gzip Blob for upload
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'new\s+Blob\s*\(.{0,60}application/gzip'
composite_rules:
  - id: yarn-standalone-bundle
    desc: Yarn standalone bundle
    crit: component
    all:
      - id: metadata/file/invisible-unicode::yarn-standalone-bundle-filename
      - id: yarn-standalone-text
  - id: form-data-stream-upload
    desc: Uploads file stream via FormData
    crit: suspicious
    conf: 0.8
    all:
      - id: form-data-new
      - id: form-data-append
      - id: micro-behaviors/fs/file/read::create-read-stream
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: yarn-standalone-bundle
      - id: metadata/library/structure::js-webpack-bundle
  - id: form-data-blob-upload
    desc: Uploads compressed Blob via FormData and fetch
    crit: suspicious
    conf: 0.85
    all:
      - id: form-data-new
      - id: form-data-append
      - id: blob-gzip-create
      - id: micro-behaviors/communications/http/request/client::fetch-string
