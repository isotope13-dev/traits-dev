defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: node-upload-handler
    desc: JavaScript upload-handler identifier
    crit: component
    conf: 0.9
    if:
      type: symbol
      regex: '(?i)^(handle|process)[A-Za-z0-9_]*upload[A-Za-z0-9_]*$'
  - id: yarn-standalone-text
    desc: Yarn standalone bundle text marker
    crit: component
    if:
      type: text
      regex: 'yarnpkg\.com|Yarn\s+\d'
  # FormData construction is the canonical post/generic::formdata-class atom;
  # the upload composites below reference it cross-directory and add the
  # upload-specific evidence (append + read-stream / gzip Blob + fetch).
  - id: form-data-append
    desc: Appends data to FormData
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(FormData|formData|fd)\b[\s\S]{0,120}\.append\('
    unless:
      - id: metadata/file/format::sourcemap-sources-content
  - id: blob-gzip-create
    desc: Creates gzip Blob for upload
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'new\s+Blob\s*\(.{0,60}application/gzip'
  - id: extension-attachment-reupload-call
    desc: Extension attachment reupload call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: reuploadAttachment
composite_rules:
  - id: yarn-standalone-bundle
    desc: Yarn standalone bundle
    crit: component
    all:
      - id: metadata/file/invisible-unicode::yarn-standalone-bundle-filename
      - id: yarn-standalone-text
  - id: form-data-stream-upload
    desc: Uploads file stream via FormData
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/communications/http/post::formdata-class
      - id: form-data-append
      - id: micro-behaviors/fs/file/read::create-read-stream
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/communications/http/upload/
      - id: metadata/library/structure::js-webpack-bundle
  - id: form-data-blob-upload
    desc: Uploads compressed Blob via FormData and fetch
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/post::formdata-class
      - id: form-data-append
      - id: blob-gzip-create
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: extension-order-history-reupload
    desc: Extension reuploads crypto order-history attachment
    crit: notable
    conf: 0.97
    scope: archive
    for: [javascript, chrome-manifest, xpi, crx, archives]
    all:
      - id: micro-behaviors/process/hook/xhr::fetch-wrapper-original
      - id: micro-behaviors/communications/http/url/path::crypto-order-history-endpoint
      - id: extension-attachment-reupload-call
    any:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: metadata/permission/manifest::privacy-sensitive-data-permissions
      - id: metadata/permission/cookie::permission-cookies
