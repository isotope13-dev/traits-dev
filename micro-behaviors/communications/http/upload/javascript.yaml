defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
traits:
  - id: yarn-standalone-filename
    desc: Yarn standalone bundle filename
    crit: component
    conf: 0.85
    if:
      type: basename
      substr: yarn-standalone.js
  - id: yarn-standalone-text
    desc: Yarn standalone bundle text marker
    crit: component
    if:
      type: text
      regex: 'yarnpkg\.com|Yarn\s+\d'
  - id: form-data-new
    desc: Creates FormData object
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: 'new\s+FormData\('
  - id: form-data-append
    desc: Appends data to FormData
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: '\.append\('
  - id: fs-create-read-stream
    desc: Creates file read stream
    crit: notable
    conf: 0.6
    unless:
      - type: basename
        regex: \.map$
      - type: text
        substr: fs.createReadStream = createReadStream
      - type: text
        substr: var stream = fs.createReadStream(file, {
    if:
      type: text
      regex: "fs\\.createReadStream"
  - id: blob-gzip-create
    desc: Creates gzip Blob for upload
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'new\s+Blob\s*\(.{0,60}application/gzip'
composite_rules:
  - id: yarn-standalone-bundle
    desc: Yarn standalone bundle
    crit: component
    all:
      - id: yarn-standalone-filename
      - id: yarn-standalone-text
  - id: form-data-stream-upload
    desc: Uploads file stream via FormData
    crit: suspicious
    conf: 0.8
    all:
      - id: form-data-new
      - id: form-data-append
      - id: fs-create-read-stream
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: yarn-standalone-bundle
      - id: metadata/library/structure::js-webpack-bundle
  - id: form-data-blob-upload
    desc: Uploads compressed Blob via FormData and fetch
    crit: suspicious
    conf: 0.85
    all:
      - id: form-data-new
      - id: form-data-append
      - id: blob-gzip-create
      - id: micro-behaviors/communications/http/request::fetch-string
