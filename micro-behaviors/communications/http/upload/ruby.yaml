# HTTP Upload - Ruby
defaults:
  platforms: [windows, unix]
  for: [ruby]
  mbc: C0002
  crit: notable
traits:
  - id: multipart-upload
    desc: Multipart upload operation
    conf: 0.85
    if:
      type: string_literal
      word: multipart_upload
  - id: create-multipart-upload
    desc: Create multipart upload operation
    conf: 0.85
    if:
      type: string_literal
      substr: create_multipart_upload
  - id: complete-multipart-upload
    desc: Complete multipart upload operation
    conf: 0.85
    if:
      type: string_literal
      substr: complete_multipart_upload
  - id: upload-part
    desc: Upload part operation
    conf: 0.85
    if:
      type: string_literal
      word: upload_part
