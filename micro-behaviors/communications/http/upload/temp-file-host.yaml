defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  mbc: C0002

composite_rules:
  - id: public-temporary-host-image-upload
    desc: Uploads encoded image to public temporary host
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/services/file-hosting::public-file-or-payload-hosting
      - id: micro-behaviors/communications/http/upload::requests-post-files-parameter
      - id: micro-behaviors/data/encode/image/jpeg::helper-jpeg-encode-call
