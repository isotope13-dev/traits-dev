defaults:
  platforms: [windows, unix]
  for: [go]
  crit: notable
  conf: 0.8
  attack: T1071.001
traits:
  - id: go-user-agent-set
    desc: Sets HTTP User-Agent header
    if:
      type: text
      regex: \.Header\.Set\s*\(\s*"User-Agent"\s*,
  - id: go-content-type-set
    desc: Sets HTTP Content-Type header
    if:
      type: text
      regex: '\.Header\.Set\s*\(\s*"Content-Type"\s*,'
  - id: go-authorization-set
    desc: Sets HTTP Authorization header
    if:
      type: text
      regex: '\.Header\.Set\s*\(\s*"Authorization"\s*,'
  - id: go-bearer-auth-set
    desc: Literal Bearer token in header
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - type: basename
        regex: '_test\.go$'
    if:
      type: text
      regex: '\.Header\.Set\s*\(\s*"Authorization"\s*,\s*"Bearer\s+[A-Za-z0-9._~+\-/=]{8,}"'
