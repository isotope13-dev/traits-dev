defaults:
  platforms: [unix, windows]
  for: [rust]
  mbc: C0002
  attack: T1071.001
traits:
  - id: rust-authorization-header-access
    desc: Rust HTTP Authorization header access
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\.get\s*\(\s*"Authorization"\s*\)|header\s*\(\s*"Authorization"'
  - id: rust-bearer-format-token
    desc: Rust Bearer token header construction
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'format!\s*\(\s*"Bearer\s+\{\}"\s*,\s*[A-Za-z_][A-Za-z0-9_]*\s*\)'
composite_rules:
  - id: rust-http-bearer-auth
    desc: Rust HTTP Bearer token authentication
    crit: notable
    conf: 0.86
    all:
      - id: rust-authorization-header-access
      - id: rust-bearer-format-token
    near_lines: 12
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
