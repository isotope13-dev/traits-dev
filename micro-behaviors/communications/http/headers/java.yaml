defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]
  mbc: C0002
  attack: T1071.001

traits:
  - id: airlift-authorization-header-bytecode
    desc: Airlift HTTP Authorization header use
    crit: notable
    conf: 0.96
    if:
      type: import
      exact: io/airlift/http/client/HeaderNames.AUTHORIZATION

  - id: anthropic-api-key-header-bytecode
    desc: Anthropic X-Api-Key request header
    crit: notable
    conf: 0.95
    if:
      type: hex
      pattern: 58 2D 41 70 69 2D 4B 65 79
