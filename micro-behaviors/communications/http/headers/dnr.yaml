defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: dnr-modify
    desc: DNR action uses modifyHeaders
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\btype\s*:\s*["'']modifyHeaders["'']'
      case_insensitive: true
  - id: dnr-remove
    desc: DNR operation remove
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '"(operation|headerOperation)"\s*:\s*"remove"'
  - id: dnr-security-header-remove
    desc: DNR removes CSP or frame security header
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: '(remove|strip|delete).{0,40}(Content-Security-Policy|X-Frame-Options)'
  - id: dnr-origin
    desc: DNR rule names the Origin header
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '\bheader\s*:\s*["'']origin["'']'
      case_insensitive: true
  - id: access-control-allow-origin-header
    desc: Access-Control-Allow-Origin header name
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      substr: access-control-allow-origin
      case_insensitive: true
  - id: access-control-allow-methods-header
    desc: Access-Control-Allow-Methods header name
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      substr: access-control-allow-methods
      case_insensitive: true
  - id: access-control-allow-headers-header
    desc: Access-Control-Allow-Headers header name
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      substr: access-control-allow-headers
      case_insensitive: true
  - id: access-control-expose-headers-header
    desc: Access-Control-Expose-Headers header name
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      substr: access-control-expose-headers
      case_insensitive: true
  - id: dnr-set-operation
    desc: DNR operation set
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      exact: set
  - id: dnr-access-control-credentials-set
    desc: DNR sets CORS credentials response header
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"Access-Control-Allow-Credentials"[\s\S]{0,160}"operation"\s*:\s*"set"'
  - id: dnr-referer-header-set
    desc: DNR sets Referer request header
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bheader\s*:\s*["''](Referer|Referrer)["''][\s\S]{0,160}\boperation\s*:\s*["'']set["'']'
      case_insensitive: true
  - id: dnr-origin-header-set
    desc: DNR rule sets Origin request header
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bheader\s*:\s*["'']Origin["''][\s\S]{0,160}\boperation\s*:\s*["'']set["'']'
      case_insensitive: true
  - id: dnr-origin-empty-set
    desc: DNR clears Origin request header
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"Origin"[\s\S]{0,160}"value"\s*:\s*""'
  - id: dnr-client-hints-remove
    desc: DNR removes Sec-CH-UA headers
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"Sec-Ch-Ua(-Mobile|-Platform)?"[\s\S]{0,160}"operation"\s*:\s*"remove"'
  - id: client-identity-headers
    desc: Client identity HTTP headers
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: text
      regex: "X-Client-(OS|IP|User)"
    count_min: 3
composite_rules:
  - id: dnr-sec-fetch-spoof
    desc: DNR modifies Sec-Fetch request header
    crit: notable
    conf: 0.85
    all:
      - id: dnr-modify
      - id: micro-behaviors/communications/http/headers::sec-fetch-request-header
  - id: dnr-origin-strip
    desc: DeclarativeNetRequest rule to strip Origin header
    crit: suspicious
    conf: 0.95
    all:
      - id: dnr-modify
      - id: dnr-remove
      - id: dnr-origin
    unless:
      - id: well-known/app/web-to-epub::wte-extension-context
  - id: dnr-cors-origin-rewrite
    desc: DeclarativeNetRequest rule rewrites CORS allow-origin response header
    crit: notable
    conf: 0.9
    all:
      - id: dnr-modify
      - id: dnr-access-control-allow-origin-set
  - id: dnr-cors-credentials-rewrite
    desc: DeclarativeNetRequest rule rewrites credentialed CORS response headers
    crit: notable
    conf: 0.92
    all:
      - id: dnr-cors-origin-rewrite
      - id: dnr-access-control-credentials-set
  - id: dnr-access-control-allow-origin-set
    desc: DNR sets Access-Control-Allow-Origin response header
    crit: notable
    conf: 0.9
    all:
      - id: access-control-allow-origin-header
      - id: dnr-set-operation
    near_bytes: 240
  - id: dnr-access-control-allow-methods-set
    desc: DNR sets Access-Control-Allow-Methods response header
    crit: notable
    conf: 0.9
    all:
      - id: access-control-allow-methods-header
      - id: dnr-set-operation
    near_bytes: 240
  - id: dnr-access-control-allow-headers-set
    desc: DNR sets Access-Control-Allow-Headers response header
    crit: notable
    conf: 0.9
    all:
      - id: access-control-allow-headers-header
      - id: dnr-set-operation
    near_bytes: 240
  - id: dnr-access-control-expose-headers-set
    desc: DNR sets Access-Control-Expose-Headers response header
    crit: notable
    conf: 0.9
    all:
      - id: access-control-expose-headers-header
      - id: dnr-set-operation
    near_bytes: 240
  - id: dnr-cors-permissive-response
    desc: DNR sets multiple permissive CORS response headers
    crit: notable
    conf: 0.96
    all:
      - id: dnr-modify
    any:
      - id: dnr-access-control-allow-origin-set
      - id: dnr-access-control-allow-methods-set
      - id: dnr-access-control-allow-headers-set
      - id: dnr-access-control-expose-headers-set
    needs: 2
  - id: dnr-additional-security-header-modification
    desc: DNR adds an additional security-header modification
    crit: notable
    conf: 0.9
    any:
      - id: dnr-cors-credentials-rewrite
      - id: dnr-sec-fetch-spoof
      - id: dnr-client-hints-remove
      - id: dnr-cors-permissive-response
  - id: dnr-referer-origin-spoof
    desc: DeclarativeNetRequest rule spoofs browser request origin context
    crit: suspicious
    conf: 0.9
    all:
      - id: dnr-modify
    any:
      - id: dnr-referer-header-set
      - id: dnr-origin-header-set
    unless:
      - id: well-known/app/web-to-epub::wte-extension-context
      - id: dnr-origin-empty-set
