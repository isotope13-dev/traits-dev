defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: dnr-modify
    desc: DNR action type modifyHeaders
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: '"modifyHeaders"'
  - id: dnr-remove
    desc: DNR operation remove
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: '"(operation|headerOperation)"\s*:\s*"remove"'
  - id: dnr-origin
    desc: DNR header origin
    crit: component
    conf: 0.6
    if:
      type: text
      substr: '"origin"'
composite_rules:
  - id: dnr-origin-strip
    desc: DeclarativeNetRequest rule to strip Origin header
    crit: suspicious
    conf: 0.95
    all:
      - id: dnr-modify
      - id: dnr-remove
      - id: dnr-origin
