defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, scripts, binaries]
traits:
- id: x-tt-params-header
  desc: Uses TikTok x-tt-params request header
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: x-tt-params
- id: tiktok-api-h2-endpoint
  desc: References TikTok mobile api-h2 endpoint
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: api-h2.tiktokv.com
- id: tiktok-web-api-endpoint--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'tiktok[\s\S]{0,160}/api/'
  count_max: 1021822
- id: tiktok-web-api-endpoint--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '/api/(item|post|comment|aweme)\b'
  count_max: 1021823
- id: credentialed-fetch-include
  desc: Fetch request includes browser credentials
  crit: notable
  conf: 0.75
  unless:
  - id: metadata/library/runtime::next-edge-runtime-bundle
  if:
    type: text
    regex: credentials\s*:\s*['"]include['"]
composite_rules:
- id: tiktok-web-api-endpoint
  desc: References TikTok web API endpoint
  crit: notable
  conf: 0.8
  any:
  - id: tiktok-web-api-endpoint--rx-1
  - id: tiktok-web-api-endpoint--rx-2
