defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, python, go, java, rust, php]
  attack: T1071.001
  mbc: C0002

traits:
  - id: tencent-tc-action-header
    desc: Tencent Cloud action request header
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: "X-TC-Action"
  - id: tencent-tc-timestamp-header
    desc: Tencent Cloud request timestamp header
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: "X-TC-Timestamp"

composite_rules:
  - id: tencent-tc3-signing-marker
    desc: Tencent Cloud TC3 request signing flow
    crit: notable
    conf: 1.0
    all:
      - id: micro-behaviors/crypto/hash/hmac::tencent-tc3-hmac-sha256
      - id: tencent-tc-action-header
      - id: tencent-tc-timestamp-header
