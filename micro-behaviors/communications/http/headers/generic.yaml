defaults:
  platforms:
    - unix
    - windows
  for: [python, javascript, powershell, pe, elf]
  mbc: C0002
  attack: T1071.001
traits:
  - id: ua-mozilla-old
    desc: Old Mozilla 4.0 User-Agent
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: Mozilla/4.0
  - id: ua-curl
    desc: curl User-Agent
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: \bcurl/
  - id: ua-wget
    desc: wget User-Agent
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: \bWget/
  - id: ua-python-urllib
    desc: Python urllib User-Agent
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Python-urllib
  - id: auth-header
    desc: Authorization header
    crit: notable
    conf: 0.5
    unless:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
      - id: metadata/package/testing/presence::jest-test-file
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      substr: 'Authorization:'
      not:
        - substr: libcurl/
  - id: bearer-token
    desc: Bearer token authentication
    crit: notable
    conf: 0.5
    unless:
      - id: metadata/package/testing/presence::jest-test-file
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: '(Authorization|Authenticate)[^\r\n]{0,24}Bearer\s+[A-Za-z0-9._~+\-/=]{8,}'
  - id: bearer-header-from-token
    desc: Bearer header from token
    crit: component
    conf: 0.93
    if:
      type: text
      regex: Authorization.{0,40}Bearer.{0,40}(token|jwt|access_token|session)
    not:
      - substr: "Bearer mytoken"
    unless:
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/presence::unittest-module
  - id: basic-auth
    desc: Basic authentication
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (Authorization|Authenticate).{0,20}Basic
      not:
        - substr: libcurl/
        - substr: '["Authorization"] == "Basic'
        - substr: 'Authorization"] == "Basic'
  - id: headers-encoding
    desc: Accept-Encoding header
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: Accept-Encoding
  - id: header-user
    desc: HTTP header user/userid
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: text
      regex: '-H\s+["'']?(user|userid):'
  - id: header-client
    desc: HTTP header client
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: text
      regex: '-H\s+["'']?client:'
  - id: header-bot
    desc: HTTP header bot
    crit: notable
    conf: 0.6
    for: [shell]
    if:
      type: text
      regex: '-H\s+["'']?bot:'
  - id: header-build
    desc: HTTP header build
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: text
      regex: '-H\s+["'']?build:'
  - id: header-hwid
    desc: HTTP header hwid
    crit: notable
    conf: 0.6
    for: [shell]
    if:
      type: text
      regex: '-H\s+["'']?hwid:'
  - id: header-machine
    desc: HTTP header machine
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: text
      regex: '-H\s+["'']?machine:'
  - id: x-header-user
    desc: X-User header
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '(?i)\bX-User\s*:'
  - id: x-header-client
    desc: X-Client header
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '(?i)\bX-Client\s*:'
  - id: x-header-bot
    desc: X-Bot header
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: X-Bot
  - id: x-header-build
    desc: X-Build header
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: X-Build
  - id: x-header-hwid
    desc: X-HWID header
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: X-HWID
  - id: x-forwarded-for
    desc: X-Forwarded-For proxy header
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "X-Forwarded-For"
  - id: x-real-ip
    desc: X-Real-IP proxy header
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "X-Real-IP"
  - id: x-header-data-hex
    desc: X- header with hex-encoded data
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: '["'']X-[A-Za-z0-9-]+["'']\s*:\s*["''][a-fA-C0-9]{16,}["'']'
  - id: x-header-single-letter
    desc: Single-letter X- header name
    crit: baseline
    conf: 0.85
    if:
      type: raw
      regex: '["'']X-[A-Z]["'']\s*:'
  - id: boundary-param
    desc: boundary= parameter
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: boundary=
  - id: content-length-template
    desc: Content-Length printf template
    crit: baseline
    conf: 0.55
    if:
      type: text
      exact: 'Content-Length: %d'
  - id: content-disposition-filename
    desc: Content-Disposition filename
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: Content-Disposition.{0,30}filename
  - id: form-data-header
    desc: HTTP multipart form-data header
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: 'Content-Disposition: form-data'
composite_rules:
  - id: headers-auth
    desc: HTTP Authorization header
    crit: notable
    conf: 0.66
    any:
      - id: auth-header
      - id: bearer-token
      - id: basic-auth
  - id: headers-useragent-fake
    desc: Fake or suspicious User-Agent
    crit: notable
    conf: 0.66
    any:
      - id: ua-mozilla-old
      - id: ua-curl
      - id: ua-wget
      - id: ua-python-urllib
  - id: bot-headers
    desc: Bot identification HTTP headers
    crit: notable
    conf: 0.7
    any:
      - id: header-user
      - id: header-client
      - id: header-bot
      - id: header-build
      - id: header-hwid
      - id: header-machine
      - id: x-header-user
      - id: x-header-client
      - id: x-header-bot
      - id: x-header-build
      - id: x-header-hwid
      - id: x-header-single-letter
  - id: multipart-upload
    desc: Multipart form data upload
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/communications/http/post::multipart-form
      - id: boundary-param
      - id: content-disposition-filename
      - id: form-data-header
  - id: file-upload-headers
    desc: HTTP file upload header stack
    crit: notable
    conf: 0.78
    all:
      - id: multipart-upload
    any:
      - id: content-length-template
      - id: micro-behaviors/communications/email/mime::mime-octet-stream
      - id: micro-behaviors/communications/http/client::winhttp-request-com
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
    needs: 2
