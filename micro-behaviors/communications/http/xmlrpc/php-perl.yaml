defaults:
  platforms: [windows, unix]
  for: [php, perl]
  mbc: C0002
  attack: T1071.001
traits:
  - id: pingback-method
    desc: XML-RPC pingback method literal
    crit: notable
    conf: 0.97
    if:
      type: string_literal
      substr: pingback.ping
  - id: xml-content-type
    desc: XML-RPC text xml content type
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: text/xml
  - id: php-encode-request
    desc: PHP XML-RPC request builder
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: xmlrpc_encode_request
  - id: perl-http-post-helper
    desc: Perl POST helper import
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (?m)^\s*use\s+HTTP::Request::Common\s*;
  - id: perl-forkmanager
    desc: Perl fork manager worker pool
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: (?m)^\s*use\s+Parallel::ForkManager\s*;
composite_rules:
  - id: php-xmlrpc-client
    desc: PHP XML-RPC pingback client
    crit: suspicious
    conf: 0.96
    all:
      - id: pingback-method
      - id: php-encode-request
      - id: micro-behaviors/communications/http/request/options::php-stream-context-create
  - id: perl-xmlrpc-client
    desc: Perl XML-RPC pingback client
    crit: suspicious
    conf: 0.96
    all:
      - id: pingback-method
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-useragent
      - id: perl-http-post-helper
  - id: perl-xmlrpc-worker-pool
    desc: Perl XML-RPC worker pool
    crit: suspicious
    conf: 0.93
    all:
      - id: perl-xmlrpc-client
      - id: perl-forkmanager
