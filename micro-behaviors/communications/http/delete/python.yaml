defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1071.001

traits:
  - id: urllib-delete-request
    desc: Python urllib DELETE request
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'urllib\.request\.Request[\s\S]{0,260}\bmethod\s*=\s*["'']DELETE["'']'

composite_rules:
  - id: urllib-bearer-delete
    desc: Python urllib bearer DELETE request
    crit: suspicious
    conf: 0.94
    all:
      - id: urllib-delete-request
    any:
      - id: micro-behaviors/communications/http/headers::bearer-token
      - id: micro-behaviors/communications/http/headers::bearer-header-from-token
