defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1071.001

traits:
  - id: urllib-delete-request
    desc: Python urllib DELETE request
    crit: notable
    conf: 0.9
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: text
      regex: 'urllib\.request\.Request[\s\S]{0,260}\bmethod\s*=\s*["'']DELETE["'']'

  - id: bearer-authorization-header
    desc: Bearer authorization header
    crit: notable
    conf: 0.86
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: text
      regex: '["'']Authorization["'']\s*:\s*f?["'']Bearer\s+'

composite_rules:
  - id: urllib-bearer-delete
    desc: Python urllib bearer DELETE request
    crit: suspicious
    conf: 0.94
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    all:
      - id: urllib-delete-request
      - id: bearer-authorization-header
