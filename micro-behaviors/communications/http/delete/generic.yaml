defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
traits:
  - id: delete
    desc: HTTP DELETE method
    if:
      type: text
      regex: ^DELETE\\s+\\S+\\s+HTTP/1\\.[01]$
      case_insensitive: false
  - id: method-constant
    desc: HTTP DELETE method constant
    conf: 0.95
    if:
      type: text
      substr: http.MethodDelete
  - id: route-method-field
    desc: HTTP DELETE route method field
    conf: 0.95
    if:
      type: text
      regex: 'RouteMethod\s*=\s*"DELETE"|Method\s*:\s*"DELETE"'
  - id: method-compare
    desc: HTTP DELETE method comparison
    conf: 0.95
    if:
      type: text
      regex: 'method\s*==\s*"DELETE"|case\s+DELETE\s*:'
  - id: router-call
    desc: HTTP DELETE router call
    conf: 0.95
    if:
      type: text
      regex: '\.DELETE\s*\('
  - id: javascript-http-client-delete-call
    desc: JavaScript HTTP client DELETE call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(this\.)?(http|httpClient|client|request)\.delete\s*\('

composite_rules:
  - id: method-marker
    desc: HTTP DELETE method marker
    conf: 0.95
    any:
      - id: method-constant
      - id: route-method-field
      - id: method-compare
      - id: router-call
