defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries, scripts]
traits:
  - id: m-search
    desc: SSDP M-SEARCH discovery request
    crit: notable
    conf: 0.9
    mbc: C0002
    attack: T1046
    if:
      type: string_value
      substr: M-SEARCH * HTTP/1.1
  - id: discover-header
    desc: SSDP discover MAN header
    crit: notable
    conf: 0.88
    mbc: C0002
    attack: T1046
    if:
      type: string_value
      exact: 'MAN: "ssdp:discover"'
  - id: broadcast-host
    desc: SSDP broadcast host header
    crit: notable
    conf: 0.9
    mbc: C0002
    attack: T1046
    if:
      type: string_value
      exact: "HOST: 255.255.255.255:1900"
  - id: upnp-dial-service-urn
    desc: UPnP DIAL service URN
    crit: notable
    conf: 0.82
    mbc: C0002
    attack: T1046
    if:
      type: string_value
      exact: "ST: urn:dial-multiscreen-org:service:dial:1"
  - id: chrome60-windows-ua
    desc: Chrome 60 Windows User-Agent
    crit: notable
    conf: 0.78
    mbc: C0002
    attack: T1071.001
    if:
      type: string_value
      exact: "USER-AGENT: Google Chrome/60.0.3112.90 Windows"
  - id: snquery-loopback-probe
    desc: SNQUERY loopback probe string
    crit: notable
    conf: 0.84
    mbc: C0002
    attack: T1046
    if:
      type: string_value
      exact: "SNQUERY: 127.0.0.1:AAAAAA:xsvr"
composite_rules:
  - id: ssdp-discovery
    desc: SSDP multicast discovery traffic
    crit: suspicious
    conf: 0.92
    attack: T1046
    all:
      - id: m-search
      - id: discover-header
      - id: broadcast-host
    downgrade:
      any:
        - id: metadata/package/testing/
  - id: upnp-dial-discovery
    desc: UPnP DIAL discovery request
    crit: suspicious
    conf: 0.9
    attack: T1046
    all:
      - id: ssdp-discovery
      - id: upnp-dial-service-urn
  - id: spoofed-browser-ssdp
    desc: Browser-masqueraded SSDP probe
    crit: suspicious
    conf: 0.88
    attack: T1036
    all:
      - id: ssdp-discovery
      - id: chrome60-windows-ua
