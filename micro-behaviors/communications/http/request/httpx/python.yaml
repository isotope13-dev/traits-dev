defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: httpx-get
    desc: httpx.get call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: httpx.get
  - id: httpx-post
    desc: httpx.post call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: httpx.post
  - id: httpx-client-get
    desc: httpx Client GET request
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      language: python
      query: |
        (with_statement
          (with_clause
            (with_item
              value: (as_pattern
                (call
                  function: (attribute
                    object: (identifier) @module
                    attribute: (identifier) @constructor))
                alias: (as_pattern_target) @client)))
          body: (block
            (expression_statement
              (call
                function: (attribute
                  object: (identifier) @bound
                  attribute: (identifier) @method))))
          (#eq? @module "httpx")
          (#eq? @constructor "Client")
          (#eq? @method "get")
          (#eq? @client @bound))
composite_rules:
  - id: httpx-async-client-post
    desc: httpx AsyncClient POST request
    crit: notable
    conf: 0.9
    near_bytes: 2048
    all:
      - id: micro-behaviors/communications/http/client/httpx::httpx-async-client
      - id: micro-behaviors/communications/http/request/client::py-post-generic
