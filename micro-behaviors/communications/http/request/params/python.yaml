defaults:
  platforms:
    - windows
    - unix
  for:
    - python
traits:
  - id: django-request-get
    desc: Django request GET parameter access
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: request.GET
  - id: django-request-post
    desc: Django request POST parameter access
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: request.POST
