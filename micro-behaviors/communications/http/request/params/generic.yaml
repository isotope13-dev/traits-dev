defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  mbc: C0002
traits:
- id: payload-param
  desc: payload request parameter
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\bpayload='
- id: java-servlet-get-parameter
  desc: Java servlet request parameter access
  crit: notable
  conf: 0.78
  for: [java, class]
  if:
    type: text
    substr: request.getParameter
