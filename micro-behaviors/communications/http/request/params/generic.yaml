defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  mbc: C0002
traits:
- id: payload-param
  desc: HTTP query parameter named payload
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '[?&]payload='
- id: vid-param
  desc: vid= HTTP request parameter marker
  crit: component
  conf: 0.85
  for: [scripts]
  if:
    type: string_literal
    exact: vid=
- id: java-servlet-get-parameter
  desc: Java servlet request parameter access
  crit: notable
  conf: 0.78
  for: [java, class]
  if:
    type: text
    substr: request.getParameter
- id: login-action-parameter
  desc: HTTP action=login query parameter
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: action=login
