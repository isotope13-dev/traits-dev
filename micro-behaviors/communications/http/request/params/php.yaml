defaults:
  platforms: [windows, unix]
  for:
    - php
traits:
  - id: get-dup
    desc: Reads PHP query parameters via $_GET
    crit: notable
    conf: 0.85
    attack: T1059
    if:
      type: symbol
      kind: identifier
      exact: '_GET'
  - id: post-dup
    desc: Reads PHP form parameters via $_POST
    crit: notable
    conf: 0.85
    attack: T1059
    if:
      type: symbol
      kind: identifier
      exact: '_POST'
  - id: php-post-password-field
    desc: Reads password field from PHP $_POST
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\$_POST\[[''"](pass|password|cpass|epass)[''"]\]'
  - id: request-dup
    desc: Reads combined PHP request data via $_REQUEST
    crit: notable
    conf: 0.85
    attack: T1059
    if:
      type: symbol
      kind: identifier
      exact: '_REQUEST'
  - id: get-post-param-access
    desc: Reads a GET or POST request parameter
    crit: component
    conf: 0.7
    # `$_GET[...]`/`$_POST[...]` subscript — the `[` confirms an access, not a
    # bare token. A neutral request-input read; webshell/file-manager composites
    # reference it cross-directory alongside their execution evidence.
    if:
      type: text
      regex: '\$_(GET|POST)\s*\['
  - id: cookie
    desc: Reads PHP cookie data via $_COOKIE
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: identifier
      exact: '_COOKIE'
  - id: server-dup
    desc: Reads request metadata from PHP $_SERVER
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: identifier
      exact: '_SERVER'
    unless:
      - id: metadata/file/extension/identity::yara-extension
  - id: server-name
    desc: Reads PHP SERVER_NAME request variable
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \$_SERVER\s*\[\s*['"]SERVER_NAME['"]\s*\]
  - id: document-root-access
    desc: Reads PHP DOCUMENT_ROOT request variable
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \$_SERVER\s*\[\s*['"]DOCUMENT_ROOT['"]\s*\]
  - id: server-referer
    desc: 'HTTP Referer request header access'
    crit: notable
    conf: 0.85
    # Reads the inbound Referer header — a neutral request-input read. Referenced
    # by the webshell obf-dispatch composite (attackers smuggle commands in the
    # Referer), where it is one leg combined with dynamic-call evidence.
    if:
      type: text
      regex: '\$_SERVER\s*\[\s*[''"]HTTP_REFERER'
  - id: files
    desc: Reads PHP file-upload data via $_FILES
    crit: notable
    conf: 0.85
    attack: T1105
    if:
      type: symbol
      kind: identifier
      exact: '_FILES'
  - id: session
    desc: Reads PHP session data via $_SESSION
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: identifier
      exact: '_SESSION'
  - id: extract-get
    desc: extract from $_GET
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: extract\s*\(\s*\$_GET
  - id: extract-post
    desc: extract from $_POST
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: extract\s*\(\s*\$_POST
  - id: extract-request
    desc: extract from $_REQUEST
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: extract\s*\(\s*\$_REQUEST
  - id: extract-cookie
    desc: extract from $_COOKIE
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: extract\s*\(\s*\$_COOKIE
  - id: extract-server
    desc: extract from $_SERVER
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: extract\s*\(\s*\$_SERVER
  - id: legacy-http-vars-request
    desc: Legacy PHP request input arrays
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: \$HTTP_(COOKIE|POST|GET)_VARS
  - id: legacy-http-vars-context
    desc: Legacy PHP context input arrays
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: \$HTTP_(SERVER|ENV)_VARS
  - id: legacy-http-post-files
    desc: Legacy PHP uploaded file array
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: $HTTP_POST_FILES
  - id: extract-legacy-http-request
    desc: extract from legacy request arrays
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: extract\s*\(\s*\$HTTP_(COOKIE|POST|GET)_VARS
  - id: extract-legacy-http-context
    desc: extract from legacy context arrays
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: extract\s*\(\s*\$HTTP_(SERVER|ENV)_VARS
  - id: extract-legacy-http-post-files
    desc: extract from legacy file array
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: extract($HTTP_POST_FILES
  - id: parse-str-get
    desc: parse_str from $_GET
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: parse_str\s*\(\s*\$_GET
  - id: parse-str-post
    desc: parse_str from $_POST
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: parse_str\s*\(\s*\$_POST
  - id: parse-str-request
    desc: parse_str from $_REQUEST
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: parse_str\s*\(\s*\$_REQUEST
  - id: parse-str-cookie
    desc: parse_str from $_COOKIE
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: parse_str\s*\(\s*\$_COOKIE
  - id: parse-str-server
    desc: parse_str from $_SERVER
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: parse_str\s*\(\s*\$_SERVER
  - id: script-filename-superglobal
    desc: Access to script filename (self-reference)
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: (\$_SERVER|\$HTTP_SERVER_VARS)\[['"]SCRIPT_FILENAME['"]\]
  - id: script-filename-getenv
    desc: Access to script filename via getenv
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: getenv\(['"]SCRIPT_FILENAME['"]\)
  - id: http-user-agent-superglobal
    desc: Access to HTTP User-Agent header
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: (\$_SERVER|\$HTTP_SERVER_VARS)\[['"]HTTP_USER_AGENT['"]\]
  - id: http-user-agent-getenv
    desc: Access to HTTP User-Agent via getenv
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: getenv\(['"]HTTP_USER_AGENT['"]\)
  - id: http-referer-superglobal
    desc: Access to HTTP Referer header
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: (\$_SERVER|\$HTTP_SERVER_VARS)\[['"]HTTP_REFERER['"]\]
  - id: http-referer-getenv
    desc: Access to HTTP Referer via getenv
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: getenv\(['"]HTTP_REFERER['"]\)
  - id: register-globals-post
    desc: POST loop injects globals
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: foreach($_POST as $key => $value) {$$key=$value;}
  - id: register-globals-get
    desc: GET loop injects globals
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: foreach($_GET as $key => $value)  {$$key=$value;}
composite_rules:
  - id: extract-input
    desc: Extracts variables from user input
    crit: notable
    conf: 0.9
    any:
      - id: extract-get
      - id: extract-post
      - id: extract-request
      - id: extract-cookie
      - id: extract-server
      - id: extract-legacy-http-request
      - id: extract-legacy-http-context
      - id: extract-legacy-http-post-files
  - id: extract-legacy-http-input
    desc: Extracts legacy request variables
    crit: suspicious
    conf: 0.92
    any:
      - id: extract-legacy-http-request
      - id: extract-legacy-http-context
      - id: extract-legacy-http-post-files
  - id: register-globals-emulation
    desc: Emulates register globals from request
    crit: suspicious
    conf: 0.96
    all:
      - id: register-globals-post
      - id: register-globals-get
  - id: parse-str-input
    desc: Parses user input into variables
    crit: notable
    conf: 0.9
    any:
      - id: parse-str-get
      - id: parse-str-post
      - id: parse-str-request
      - id: parse-str-cookie
      - id: parse-str-server
  - id: script-filename
    desc: Access to script filename (self-reference)
    crit: notable
    conf: 0.85
    any:
      - id: script-filename-superglobal
      - id: script-filename-getenv
  - id: http-user-agent
    desc: Access to HTTP User-Agent header
    crit: notable
    conf: 0.7
    any:
      - id: http-user-agent-superglobal
      - id: http-user-agent-getenv
  - id: http-referer
    desc: Access to HTTP Referer header
    crit: notable
    conf: 0.7
    any:
      - id: http-referer-superglobal
      - id: http-referer-getenv
