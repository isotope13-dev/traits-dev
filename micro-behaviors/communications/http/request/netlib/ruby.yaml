defaults:
  for:
    - ruby
  attack: T1071.001
  mbc: C0002
  platforms:
    - unix
    - windows
traits:
  - id: net-http-post
    desc: Net::HTTP.post() method call
    crit: notable
    conf: 0.93
    if:
      type: string_literal
      regex: Net::HTTP\.post
  - id: net-http-write-request
    desc: Net::HTTP write request method
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'Net::HTTP\.(post|put|request)\b'
  - id: net-http-get-dup
    desc: Net::HTTP.get() method call
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: Net::HTTP\.get
  - id: net-http-new
    desc: Net::HTTP.new() instantiation
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: Net::HTTP\.new
  - id: open-uri-http-fetch
    desc: open-uri HTTP fetch call
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: 'open\s*\(.{0,30}https?://'
