defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1071.001
  mbc: C0002

traits:
- id: fetch-timestamped-url
  desc: Fetches a URL with the current timestamp
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'fetch\s*\(\s*[`"''][^`"'']{1,240}\$\{\s*Date\.now\s*\(\s*\)\s*\}'
- id: fetch-no-store-cache
  desc: Fetch disables response caching
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'fetch\s*\([^)]{0,240}\bcache\s*:\s*["'']no-store["'']'
