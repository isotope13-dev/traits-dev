defaults:
  platforms: [unix]
  for: [perl]
traits:
  - id: request-method-env
    desc: Reads CGI REQUEST_METHOD variable
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "$ENV{REQUEST_METHOD}"
  - id: http-referer-env
    desc: Reads CGI HTTP_REFERER variable
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: "$ENV{HTTP_REFERER}"
  - id: content-length-env
    desc: Reads CGI CONTENT_LENGTH variable
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "$ENV{CONTENT_LENGTH}"
  - id: query-string-env
    desc: Reads CGI QUERY_STRING variable
    crit: component
    conf: 0.78
    if:
      type: text
      substr: "$ENV{QUERY_STRING}"
  - id: html-form-output
    desc: Generates HTML form via print
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'print\s+".{0,200}<FORM\s+ACTION='
  - id: content-type-response
    desc: Outputs CGI Content-type header
    crit: component
    conf: 0.8
    if:
      type: text
      substr: 'Content-type: text/html'
  - id: stdin-post-read
    desc: Reads POST data from STDIN
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'read\s*\(\s*STDIN\s*,'
  - id: url-decode
    desc: Perl CGI URL decoding pattern
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 's/%.{0,40}pack\("C"'
composite_rules:
  - id: raw-cgi-handler
    desc: Perl raw CGI request handler
    crit: notable
    conf: 0.85
    all:
      - id: request-method-env
      - id: content-type-response
    any:
      - id: stdin-post-read
      - id: html-form-output
      - id: content-length-env
      - id: query-string-env
      - id: url-decode
