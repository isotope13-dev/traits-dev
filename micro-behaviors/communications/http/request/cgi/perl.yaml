defaults:
  platforms: [unix]
  for: [perl]
traits:
  - id: module
    desc: Perl CGI module import
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: '(?m)^\s*use\s+CGI\s*;'
  - id: param
    desc: CGI request parameter access
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '->param\s*\('
  - id: cookie
    desc: CGI cookie access
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '->cookie\s*\('
  - id: cookie-header
    desc: CGI response sets cookies
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '->header\s*\(\s*-cookie\s*=>'
  - id: url
    desc: CGI request URL access
    crit: baseline
    conf: 0.65
    if:
      type: text
      regex: '->url\b'
composite_rules:
  - id: request-handling
    desc: Perl CGI request handling
    crit: notable
    conf: 0.84
    all:
      - id: module
      - id: param
  - id: cookie-session
    desc: Perl CGI cookie session handling
    crit: suspicious
    conf: 0.9
    all:
      - id: module
      - id: cookie
      - id: cookie-header
