# WordPress HTTP API Traits
# MBC: E1071 (Standard Application Layer Protocol)
# ATT&CK: T1071.001 (Web Service)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
  crit: notable
  mbc: "E1071"
  attack: "T1071.001"
traits:
  - id: wp-remote-post
    desc: WordPress remote POST request (wp_remote_post)
    conf: 0.95
    if:
      type: symbol
      exact: "wp_remote_post"

  - id: wp-remote-get
    desc: WordPress remote GET request (wp_remote_get)
    conf: 0.95
    if:
      type: symbol
      exact: "wp_remote_get"
