defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
traits:
  - id: get-dup
    desc: HTTP GET parameter access ($_GET)
    crit: notable
    conf: 0.85
    attack: T1059
    if:
      type: ast
      node: variable_name
      regex: \$_GET
  - id: post-dup
    desc: HTTP POST parameter access ($_POST)
    crit: notable
    conf: 0.85
    attack: T1059
    if:
      type: ast
      node: variable_name
      regex: \$_POST
  - id: request-dup
    desc: HTTP REQUEST parameter access ($_REQUEST)
    crit: notable
    conf: 0.85
    attack: T1059
    if:
      type: ast
      node: variable_name
      regex: \$_REQUEST
  - id: cookie
    desc: HTTP Cookie access ($_COOKIE)
    crit: notable
    conf: 0.8
    if:
      type: ast
      node: variable_name
      regex: \$_COOKIE
  - id: server-dup
    desc: Server variable access ($_SERVER)
    crit: notable
    conf: 0.75
    if:
      type: ast
      node: variable_name
      regex: \$_SERVER
  - id: files
    desc: File upload access ($_FILES)
    crit: notable
    conf: 0.85
    attack: T1105
    if:
      type: ast
      node: variable_name
      regex: \$_FILES
  - id: session
    desc: Session variable access ($_SESSION)
    crit: notable
    conf: 0.75
    if:
      type: ast
      node: variable_name
      regex: \$_SESSION
  - id: extract-get
    desc: extract from $_GET
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: extract\s*\(\s*\$_GET
  - id: extract-post
    desc: extract from $_POST
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: extract\s*\(\s*\$_POST
  - id: extract-request
    desc: extract from $_REQUEST
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: extract\s*\(\s*\$_REQUEST
  - id: extract-cookie
    desc: extract from $_COOKIE
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: extract\s*\(\s*\$_COOKIE
  - id: extract-server
    desc: extract from $_SERVER
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: extract\s*\(\s*\$_SERVER
  - id: legacy-http-vars-request
    desc: Legacy PHP request input arrays
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: \$HTTP_(COOKIE|POST|GET)_VARS
  - id: legacy-http-vars-context
    desc: Legacy PHP context input arrays
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: \$HTTP_(SERVER|ENV)_VARS
  - id: legacy-http-post-files
    desc: Legacy PHP uploaded file array
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: "$HTTP_POST_FILES"
  - id: extract-legacy-http-request
    desc: extract from legacy request arrays
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: extract\s*\(\s*\$HTTP_(COOKIE|POST|GET)_VARS
  - id: extract-legacy-http-context
    desc: extract from legacy context arrays
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: extract\s*\(\s*\$HTTP_(SERVER|ENV)_VARS
  - id: extract-legacy-http-post-files
    desc: extract from legacy file array
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "extract($HTTP_POST_FILES"
  - id: parse-str-get
    desc: parse_str from $_GET
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: parse_str\s*\(\s*\$_GET
  - id: parse-str-post
    desc: parse_str from $_POST
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: parse_str\s*\(\s*\$_POST
  - id: parse-str-request
    desc: parse_str from $_REQUEST
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: parse_str\s*\(\s*\$_REQUEST
  - id: parse-str-cookie
    desc: parse_str from $_COOKIE
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: parse_str\s*\(\s*\$_COOKIE
  - id: parse-str-server
    desc: parse_str from $_SERVER
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: parse_str\s*\(\s*\$_SERVER
  - id: script-filename-superglobal
    desc: Access to script filename (self-reference)
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: (\$_SERVER|\$HTTP_SERVER_VARS)\[['"]SCRIPT_FILENAME['"]\]
  - id: script-filename-getenv
    desc: Access to script filename via getenv
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: getenv\(['"]SCRIPT_FILENAME['"]\)
  - id: http-user-agent-superglobal
    desc: Access to HTTP User-Agent header
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (\$_SERVER|\$HTTP_SERVER_VARS)\[['"]HTTP_USER_AGENT['"]\]
  - id: http-user-agent-getenv
    desc: Access to HTTP User-Agent via getenv
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: getenv\(['"]HTTP_USER_AGENT['"]\)
  - id: http-referer-superglobal
    desc: Access to HTTP Referer header
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (\$_SERVER|\$HTTP_SERVER_VARS)\[['"]HTTP_REFERER['"]\]
  - id: http-referer-getenv
    desc: Access to HTTP Referer via getenv
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: getenv\(['"]HTTP_REFERER['"]\)
  - id: register-globals-post
    desc: POST loop injects globals
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      exact: "foreach($_POST as $key => $value) {$$key=$value;}"
  - id: register-globals-get
    desc: GET loop injects globals
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      exact: "foreach($_GET as $key => $value)  {$$key=$value;}"
composite_rules:
  - id: extract-input
    desc: Extracts variables from user input
    crit: notable
    conf: 0.9
    any:
      - id: extract-get
      - id: extract-post
      - id: extract-request
      - id: extract-cookie
      - id: extract-server
      - id: extract-legacy-http-request
      - id: extract-legacy-http-context
      - id: extract-legacy-http-post-files
  - id: extract-legacy-http-input
    desc: Extracts legacy request variables
    crit: suspicious
    conf: 0.92
    any:
      - id: extract-legacy-http-request
      - id: extract-legacy-http-context
      - id: extract-legacy-http-post-files
  - id: register-globals-emulation
    desc: Emulates register globals from request
    crit: suspicious
    conf: 0.96
    all:
      - id: register-globals-post
      - id: register-globals-get
  - id: parse-str-input
    desc: Parses user input into variables
    crit: notable
    conf: 0.9
    any:
      - id: parse-str-get
      - id: parse-str-post
      - id: parse-str-request
      - id: parse-str-cookie
      - id: parse-str-server
  - id: script-filename
    desc: Access to script filename (self-reference)
    crit: notable
    conf: 0.85
    any:
      - id: script-filename-superglobal
      - id: script-filename-getenv
  - id: http-user-agent
    desc: Access to HTTP User-Agent header
    crit: notable
    conf: 0.7
    any:
      - id: http-user-agent-superglobal
      - id: http-user-agent-getenv
  - id: http-referer
    desc: Access to HTTP Referer header
    crit: notable
    conf: 0.7
    any:
      - id: http-referer-superglobal
      - id: http-referer-getenv
