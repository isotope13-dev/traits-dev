defaults:
  platforms: [windows, unix]
  for:
    - php
  crit: notable
traits:
  - id: php-input
    desc: Accesses raw PHP request body
    conf: 0.95
    unless:
      - id: metadata/package/quality/false-positives::php-empty-function-declarations
      - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
    if:
      type: string_literal
      substr: php://input
