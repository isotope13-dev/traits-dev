defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: node-http-request-configured
    desc: Node HTTP request has hostname and port
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.request\s*\(\s*\{[^}]{0,220}\bhostname\b[^}]{0,180}\bport\b'
  - id: remote-extension-config-path
    desc: References a remote extension config file
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      regex: '/ext-config\.json(\?|$)'
  - id: extension-config-cache-write
    desc: Caches extension config in local storage
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'storage\.local\.set\(\{\s*ext_config:'
  - id: configured-api-endpoint-fetch
    desc: Fetches a configured API endpoint
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'fetch\(\s*[A-Za-z_$][\w$]*\.api_endpoint\s*,'

composite_rules:
  - id: remote-extension-config-cache
    desc: Fetches and caches remote extension config
    crit: notable
    conf: 0.95
    near_bytes: 1024
    all:
      - id: remote-extension-config-path
      - id: extension-config-cache-write
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: remote-configured-api-request
    desc: Extension calls a remotely configured API
    crit: notable
    conf: 0.95
    for: [crx, xpi, zip]
    scope: archive
    all:
      - id: remote-extension-config-cache
      - id: configured-api-endpoint-fetch
