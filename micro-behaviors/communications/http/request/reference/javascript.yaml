defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1071.001
  mbc: C0002
traits:
  - id: js-fetch-reference
    desc: Passes fetch as a call argument
    crit: notable
    conf: 0.82
    if:
      type: symbol
      kind: call
      regex: '^[A-Za-z_$][\w$]*(\.[A-Za-z_$][\w$]*)*$'
      arg:
        kind: identifier
        name: fetch
