defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - php
  crit: suspicious
traits:
  - id: php-input
    desc: Access to php://input (raw POST
    conf: 0.95
    unless:
      - id: metadata/package::php-empty-function-declarations
      - id: metadata/package::php-manual-empty-function-stubs
    if:
      type: string_value
      regex: php://input
