# WordPress HTTP API Traits
# MBC: E1071 (Standard Application Layer Protocol)
# ATT&CK: T1071.001 (Web Service)
defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  mbc: "E1071"
  attack: "T1071.001"
traits:
  - id: wp-remote-post
    desc: WordPress remote POST request (wp_remote_post)
    conf: 0.95
    if:
      type: symbol
      exact: "wp_remote_post"

  - id: wp-remote-get
    desc: WordPress remote GET request (wp_remote_get)
    conf: 0.95
    if:
      type: symbol
      exact: "wp_remote_get"
  - id: wp-fetch-feed
    desc: WordPress fetches remote feed
    conf: 0.92
    if:
      type: symbol
      exact: "fetch_feed"
  - id: wp-enqueue-script
    desc: WordPress enqueue script call
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      exact: "wp_enqueue_script"
  - id: wp-enqueue-remote-script
    desc: WordPress enqueues remote script
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'wp_enqueue_script\s*\([^;]{0,240}https?://'
    unless:
      - type: text
        regex: 'wp_enqueue_script\s*\([^;]{0,240}[A-Z0-9_]*PLUGIN_URL'
  - id: register-rest-route
    desc: WordPress REST route registration
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "register_rest_route"
  - id: rest-api-init-hook
    desc: WordPress rest_api_init hook
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: "rest_api_init"
  - id: rest-route-get-method
    desc: WordPress REST route uses GET method
    crit: component
    conf: 0.86
    if:
      type: text
      regex: "['\"]methods['\"]\\s*=>\\s*['\"]GET['\"]"
  - id: rest-route-public-query-context
    desc: WordPress REST route queries public posts
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "post_status['\"]?\\s*=>\\s*['\"]publish['\"]"
  - id: rest-route-public-post-types-context
    desc: WordPress REST public post types
    crit: component
    conf: 0.86
    if:
      type: text
      regex: "['\"]public['\"]\\s*=>\\s*true"
  - id: rest-route-wp-query-context
    desc: WordPress REST route uses WP_Query
    crit: component
    conf: 0.84
    if:
      type: text
      regex: "new\\s+\\\\?WP_Query"
  - id: permission-callback-true
    desc: REST permission callback allows all
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: permission_callback\s*['"]?\s*=>\s*['"]__return_true['"]
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: public-readonly-rest-route-context
composite_rules:
  - id: public-readonly-rest-route-context
    desc: WordPress public read-only REST route context
    crit: component
    conf: 0.9
    all:
      - id: register-rest-route
      - id: rest-route-get-method
    any:
      - id: rest-route-public-query-context
      - id: rest-route-public-post-types-context
      - id: rest-route-wp-query-context
  - id: unauthenticated-rest-route
    desc: WordPress unauthenticated REST route
    crit: suspicious
    conf: 0.96
    all:
      - id: register-rest-route
      - id: permission-callback-true
    any:
      - id: rest-api-init-hook
    downgrade:
      any:
        - id: public-readonly-rest-route-context
