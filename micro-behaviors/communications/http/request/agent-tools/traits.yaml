defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: web-search-tool-class
    desc: Web-search tool class
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'class WebSearchTool('

  - id: web-search-tool-name
    desc: web_search tool name
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: web_search

  - id: web-fetch-tool-class
    desc: Web-fetch tool class
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'class WebFetchTool('

  - id: web-fetch-tool-name
    desc: web_fetch tool name
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: web_fetch

composite_rules:
  - id: web-search-tool
    desc: Provides a web-search tool
    crit: notable
    conf: 0.97
    all:
      - id: web-search-tool-class
      - id: web-search-tool-name

  - id: web-fetch-tool
    desc: Provides a URL-fetch tool
    crit: notable
    conf: 0.97
    all:
      - id: web-fetch-tool-class
      - id: web-fetch-tool-name
