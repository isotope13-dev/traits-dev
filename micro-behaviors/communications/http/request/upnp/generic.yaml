defaults:
  platforms: [linux]
  for: [elf]
  crit: notable
  conf: 0.88
  mbc: C0002

traits:
  - id: add-port-mapping-soap
    desc: UPnP AddPortMapping SOAP action
    attack: T1105
    if:
      type: text
      substr: AddPortMapping

  - id: internet-gateway-service
    desc: UPnP InternetGatewayDevice service discovery
    conf: 0.86
    if:
      type: text
      regex: 'urn:schemas-upnp-org:device:InternetGatewayDevice:[12]'

  - id: wan-connection-service
    desc: UPnP WAN connection service reference
    conf: 0.86
    if:
      type: text
      regex: 'WAN(IP|PPP)Connection'

  - id: relay-port-mapping-body
    desc: UPnP relay port mapping body
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: NewPortMappingDescription>RELAY

composite_rules:
  - id: internet-gateway-port-mapping
    desc: UPnP gateway port mapping request
    crit: notable
    conf: 0.92
    all:
      - id: add-port-mapping-soap
      - id: internet-gateway-service
    any:
      - id: wan-connection-service
      - id: relay-port-mapping-body
