defaults:
  platforms:
    - unix
    - windows
  for: [javascript, typescript]
  attack: T1071.001
  mbc: C0002
traits:
  - id: js-api-key-url-encoding
    desc: JavaScript URL-encodes an API-key identifier
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'encodeURIComponent\s*\(\s*[^()\n]{0,120}\bapiKey\b\s*\)'
  - id: api-key-query-parameter
    desc: HTTP query includes an API key
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '?api_key=${'
  - id: token-variable-in-fetch-query
    desc: Fetch URL query includes a token variable
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?is)\bfetch\s*\(.{0,600}\?.{0,600}\$\{.{0,80}token.{0,80}\}'
  - id: fetch-credentials-include
    desc: Fetch sends browser credentials
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'credentials\s*:\s*["'']include["'']'
    unless:
      - id: metadata/library/runtime/
  - id: js-bearer-header-from-secret-variable
    desc: Uses a credential variable in Bearer header
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'Authorization\s*:\s*`Bearer\s+\$\{[^}]{0,120}\b(apiKey|keySecret|secret|token)\b'
  - id: js-bearer-header-from-auth-token
    desc: Uses an auth token in Bearer header
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'authorization\s*:\s*`Bearer\s+\$\{[^}\n]{0,120}\b(accessToken|auth\.token|token)\b'
      case_insensitive: true
