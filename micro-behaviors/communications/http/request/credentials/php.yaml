defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1071.001
  mbc: C0002

traits:
  - id: php-hardcoded-authorization-field
    desc: PHP hardcoded authorization field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: "(?i)['\"](authorization|proxy-authorization|x-api-key)['\"]\\s*=>\\s*['\"][^'\"]{8,128}['\"]"
  - id: php-hardcoded-token-field
    desc: PHP hardcoded API token field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: "(?i)['\"](x-auth-token|api[_-]?key)['\"]\\s*=>\\s*['\"][^'\"]{8,128}['\"]"

composite_rules:
  - id: php-hardcoded-http-credential-field
    desc: Hardcoded PHP HTTP credential
    crit: suspicious
    conf: 0.92
    any:
      - id: php-hardcoded-authorization-field
      - id: php-hardcoded-token-field
