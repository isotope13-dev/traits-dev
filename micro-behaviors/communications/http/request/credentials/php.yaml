defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1071.001
  mbc: C0002

traits:
  - id: php-hardcoded-http-credential-field
    desc: Hardcoded PHP HTTP credential field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "['\"](password|api[_-]?key|secret)['\"]\\s*=>\\s*['\"][^'\"]{1,128}['\"]"
