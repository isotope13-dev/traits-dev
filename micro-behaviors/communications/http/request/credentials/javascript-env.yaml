defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

# These are HTTP request capabilities.  Credential-theft intent requires a
# separate source/collection context and is therefore modeled in objectives.
traits:
  - id: js-env-token-to-fetch
    desc: JS passes token env into HTTP call
    if:
      type: text
      regex: '(fetch|axios)\s*\([\s\S]{0,220}process\.env\.[A-Z_]*(TOKEN|SECRET)[A-Z_]*'
    not:
      - substr: "process.env.ACTIONS_ID_TOKEN_REQUEST_URL"
      - substr: "Authorization"
      - substr: COREPACK_NPM_TOKEN
      - substr: AUTH_TOKEN}@github

  - id: js-env-key-to-fetch
    desc: JS passes key env into HTTP call
    if:
      type: text
      regex: '(fetch|axios)\s*\([\s\S]{0,220}process\.env\.[A-Z_]*(KEY|PASSWORD)[A-Z_]*'

  - id: js-app-env-prefix-filter
    desc: JS filters app environment prefixes
    conf: 0.86
    if:
      type: text
      regex: '["'']APP_["''].{0,40}["'']API_["''].{0,40}["'']DB_["'']'

  - id: js-env-object-post-body
    desc: JavaScript posts environment object
    crit: suspicious
    if:
      type: text
      regex: 'axios\.post\s*\([\s\S]{0,260}\benv\b'

  - id: js-env-in-native-request
    desc: Environment in Node HTTP request options
    crit: notable
    if:
      type: text
      regex: '\.request\s*\(\s*\{[^}]{0,420}\bprocess\.env\b[^}]{0,420}\}'

  - id: js-env-native-request-write
    desc: Node HTTP request writes environment data
    crit: notable
    if:
      type: text
      regex: '\b(req|request)\s*\.\s*write\s*\([^)]{0,220}\bprocess\.env\b'
    unless:
      - id: well-known/app/electron-auth::electron-ml-parity-runner

composite_rules:
  - id: js-env-to-fetch
    desc: JavaScript sends environment variable via fetch
    any:
      - id: js-env-token-to-fetch
      - id: js-env-key-to-fetch

  - id: js-env-to-native-post
    desc: JavaScript writes environment-derived data through Node HTTP
    all:
      - id: js-env-in-native-request
      - id: js-env-native-request-write

  - id: js-env-http-send
    desc: JavaScript sends environment data over HTTP
    any:
      - id: js-env-to-fetch
      - id: js-env-to-native-post
