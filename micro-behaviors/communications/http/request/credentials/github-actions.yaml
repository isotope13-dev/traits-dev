defaults:
  platforms: [unix, windows]
  for: [github-actions]
  crit: notable
  conf: 0.95

traits:
  - id: curl-secret-reference
    desc: Workflow curl references a secret
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: '\bcurl\b.{0,120}\$\{\{\s*secrets\.[A-Za-z0-9_]+\s*\}\}'
