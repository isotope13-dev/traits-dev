defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1071.001
  mbc: C0002

# Credential-bearing URLs are an HTTP authentication capability.  Theft or
# exfiltration intent requires a separate source/collection context.
traits:
  - id: python-credentialed-url
    desc: Python credentialed HTTP URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)https?://[^/\s:@]{1,120}:[^@\s]{1,160}@'

  - id: python-credential-file-near-http-upload
    desc: Python HTTP upload near credential file
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)(\.pypirc|\.netrc|\.aws/credentials)[\s\S]{0,300}requests\.(post|put)'
