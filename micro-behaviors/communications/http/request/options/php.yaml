# PHP stream-context HTTP request setup.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: C0002
  attack: T1071.001

traits:
  - id: php-stream-context-create
    desc: Creates a PHP stream context
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: stream_context_create
