defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]

traits:
  - id: getsystemwebproxy
    desc: WebRequest system proxy lookup
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [powershell, csharp]
    if:
      type: text
      substr: GetSystemWebProxy
  - id: system-proxy-default-credentials
    desc: HTTP proxy uses Windows default credentials
    crit: notable
    conf: 0.95
    platforms: [windows]
    for: [powershell, csharp]
    if:
      type: text
      regex: Proxy\.Credentials\s*=\s*\[(System\.Net\.|Net\.)?CredentialCache\]::DefaultCredentials
      case_insensitive: true
  - id: proxy-connect-method
    desc: HTTP CONNECT proxy tunnel method
    crit: notable
    conf: 0.8
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      regex: CONNECT\s+%s:%d\s+HTTP/1\.[01]
  - id: http-connect-proxy
    desc: HTTP CONNECT proxy tunneling
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: HTTP CONNECT
    not:
      - regex: 'unparseable HTTP CONNECT'
      - substr: 'HTTP CONNECT failed'
      - substr: 'HTTP CONNECT %s'
      - substr: 'Attempting HTTP CONNECT through'
    downgrade:
      any:
        - id: well-known/lib/openssl::openssl-evp-api
        - id: metadata/signed/leaf::progress-software-corporation
  - id: proxy-connection-keepalive
    desc: Proxy-Connection keep-alive header
    crit: notable
    conf: 0.75
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      regex: 'Proxy-Connection:\s*Keep-Alive'
      not:
        - substr: libcurl/
  - id: allorigins-cors-relay-url
    desc: AllOrigins public CORS relay endpoint
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: literal
      kind: string
      substr: https://api.allorigins.win/get?url=

composite_rules:
  - id: system-proxy-default-credentials-flow
    desc: Reuses system proxy with default credentials
    crit: notable
    conf: 0.95
    all:
      - id: getsystemwebproxy
      - id: system-proxy-default-credentials
  - id: http-proxy-connect-auth-tunnel
    desc: Authenticated HTTP CONNECT proxy tunnel
    crit: notable
    conf: 0.88
    attack: T1071.001
    all:
      - id: proxy-connect-method
      - id: proxy-connection-keepalive
      - id: micro-behaviors/communications/http/headers::basic-auth
