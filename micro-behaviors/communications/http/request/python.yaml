defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
traits:
  - id: url-literal
    desc: Direct URL literal in HTTP
    crit: notable
    conf: 0.8
    if:
      type: ast
      query: "((call\n  function: (attribute\n    object: (identifier) @obj\n    attribute: (identifier) @meth)\n  arguments: (argument_list\n    (string) @url))\n (#match? @obj \"^(requests|urqt|urllib|urllib2|req|r|client|http|session|httpx)$\")\n (#match? @meth \"^(get|post|urlopen|urlretrieve|request)$\"))\n"
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: py-post-generic
    desc: Generic .post() call
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: \.post\(
composite_rules:
  - id: request-python
    desc: Performs HTTP request (urllib, requests, httpx)
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/lib/urllib/
      - id: url-literal
      - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
      - id: micro-behaviors/communications/http/lib/httpx::httpx-get
      - id: micro-behaviors/communications/http/lib/httpx::httpx-post
