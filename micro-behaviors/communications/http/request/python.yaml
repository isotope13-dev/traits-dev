defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: requests-get-url-literal
    desc: requests/httpx get URL literal
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(requests|httpx|session|r)\.get\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-post-url-literal
    desc: requests/httpx post URL literal
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(requests|httpx|session|r)\.post\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: urllib-url-literal
    desc: urllib URL literal in HTTP
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'urllib2?\.(urlopen|urlretrieve|request)\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: py-post-generic
    desc: Generic .post() call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \.post\(
  - id: response-stream-python
    desc: Python HTTP response streaming
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \b(?:iter_content|stream=True|response\.content)\b
  - id: async-response-stream-python
    desc: Async Python response streaming
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \b(?:aiter_bytes|aread)\b
composite_rules:
  - id: url-literal
    desc: Direct URL literal in HTTP
    crit: notable
    conf: 0.8
    any:
      - id: requests-get-url-literal
      - id: requests-post-url-literal
      - id: urllib-url-literal
  - id: request-python
    desc: Performs HTTP request (urllib, requests, httpx)
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/lib/urllib/
      - id: url-literal
      - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
      - id: micro-behaviors/communications/http/lib/httpx::httpx-get
      - id: micro-behaviors/communications/http/lib/httpx::httpx-post
