# HTTP Request Operations - Ruby
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1071.001
defaults:
  for: [ruby]
  attack: "T1071.001"
  mbc: "C0002"
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: net-http-post
    desc: Net::HTTP.post() method call
    crit: notable
    conf: 0.93
    platforms: [unix, windows]
    if:
      type: string_value
      regex: 'Net::HTTP\.post'
  - id: net-http-get-dup
    desc: Net::HTTP.get() method call
    crit: notable
    conf: 0.8
    platforms: [unix, windows]
    if:
      type: string_value
      regex: 'Net::HTTP\.get'
  - id: net-http-new
    desc: Net::HTTP.new() instantiation
    crit: notable
    conf: 0.7
    platforms: [unix, windows]
    if:
      type: string_value
      regex: 'Net::HTTP\.new'
