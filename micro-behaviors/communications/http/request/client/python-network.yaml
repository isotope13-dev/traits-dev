defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
  - id: python-network-any
    desc: Python network activity
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: micro-behaviors/communications/http/lib/requests
      - id: micro-behaviors/communications/socket/receive::socket-data-transfer
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
    unless:
      - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
      - id: metadata/package/testing/presence/harness::test-directory
