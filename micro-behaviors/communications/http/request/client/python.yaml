defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: requests-get-url-literal
    desc: requests/httpx get URL literal
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(requests|httpx|session|r)\.get\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-post-url-literal
    desc: requests/httpx post URL literal
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(requests|httpx|session|r)\.post\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-post-json-payload
    desc: requests.post with json= keyword argument
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "requests\\.post\\([^)]{0,120}json\\s*="
    unless:
      - type: basename
        regex: ^test_.{0,120}\.py$
      - type: basename
        exact: conftest.py
      - type: basename
        regex: ^.{0,120}\.ipynb$
      - type: text
        substr: "localhost"
      - type: text
        substr: "127.0.0.1"
  - id: requests-post-metadata-url
    desc: requests.post URL from __url__ metadata
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'requests\.post\(\s*[A-Za-z_]\w*\[[''"]__url__[''"]\]'
  - id: urllib-url-literal
    desc: urllib URL literal in HTTP
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'urllib2?\.(urlopen|urlretrieve|request)\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: py-post-generic
    desc: Generic .post() call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \.post\(
  - id: response-stream-python
    desc: Python HTTP response streaming
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \b(iter_content|stream=True)\b
  - id: async-response-stream-python
    desc: Async Python response streaming
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.(aiter_bytes|aread)\s*\(
  - id: urllib3-poolmanager
    desc: urllib3 PoolManager client
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'urllib3\.PoolManager\s*\('
  - id: urllib3-http-request
    desc: urllib3 HTTP request call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.request\s*\(\s*["''][A-Z]{3,7}["'']'
composite_rules:
  - id: url-literal
    desc: Direct URL literal in HTTP
    crit: notable
    conf: 0.8
    any:
      - id: requests-get-url-literal
      - id: requests-post-url-literal
      - id: urllib-url-literal
  - id: request-python
    desc: Performs HTTP request (urllib, requests, httpx)
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/lib/urllib/
      - id: url-literal
      - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
      - id: micro-behaviors/communications/http/lib/httpx::httpx-get
      - id: micro-behaviors/communications/http/lib/httpx::httpx-post
      - id: urllib3-poolmanager
      - id: urllib3-http-request
