defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: python-browser-context-request
    desc: Sends HTTP through a browser context
    crit: notable
    conf: 0.96
    if:
      type: symbol
      kind: call
      exact: request_context.request

  - id: requests-get-url-literal
    desc: Literal URL passed to requests.get/httpx.get
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(requests|httpx|session|r)\.get\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-post-url-literal
    desc: requests/httpx post URL literal
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(requests|httpx|session|r)\.post\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-post-json-payload
    desc: Sends JSON with Python requests.post()
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "requests\\.post\\([^)]{0,120}json\\s*="
    unless:
      - type: basename
        regex: ^test_.{0,120}\.py$
      - type: basename
        exact: conftest.py
      - type: basename
        regex: ^.{0,120}\.ipynb$
      - type: text
        substr: "localhost"
      - type: text
        substr: "127.0.0.1"
  - id: requests-post-metadata-url
    desc: requests.post URL from __url__ metadata
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'requests\.post\(\s*[A-Za-z_]\w*\[[''"]__url__[''"]\]'
  - id: urllib-url-literal
    desc: urllib URL literal in HTTP
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'urllib2?\.(urlopen|urlretrieve|request)\s*\(\s*["'']https?://'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: python-urlopen-agent-endpoint
    desc: Python urlopen requests singular agent endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'urlopen\s*\([^\r\n)]{0,160}/agent["''?#]'
  - id: requests-get-binary-url
    desc: requests.get URL targets binary
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: requests.get
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(exe|dll|jar)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-get-native-url
    desc: requests.get URL targets native lib
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: requests.get
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(so|dylib|bin)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-get-script-url
    desc: requests.get URL targets script
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: requests.get
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(sh|py|js|ps1)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: requests-get-windows-script-url
    desc: requests.get URL targets Windows script
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: requests.get
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(bat|cmd|vbs)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: urlretrieve-binary-url
    desc: urlretrieve URL targets binary
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: urllib.request.urlretrieve
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(exe|dll|jar)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: urlretrieve-native-url
    desc: urlretrieve URL targets native lib
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: urllib.request.urlretrieve
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(so|dylib|bin)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: urlretrieve-script-url
    desc: urlretrieve URL targets script
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: urllib.request.urlretrieve
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(sh|py|js|ps1)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: urlretrieve-windows-script-url
    desc: urlretrieve URL targets Windows script
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: urllib.request.urlretrieve
      arg:
        kind: string
        regex: '(?i)^https?://[^"'' ]+\.(bat|cmd|vbs)([?#]|$)'
    unless:
      - type: basename
        regex: (test_|_test\.|\.test\.|\.spec\.).*\.(py)$
  - id: py-post-generic
    desc: Python post method call
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: '(^|\.)post$'
  - id: playwright-browser-context-request
    desc: Browser-context HTTP request
    crit: notable
    conf: 0.96
    if:
      type: symbol
      kind: call
      regex: '(^|\.)request_context\.request$'
  - id: response-stream-python
    desc: Python HTTP response streaming
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'requests\.\w{1,24}\(.{0,120}\bstream\s*=\s*True|iter_content\s*\('
  - id: async-response-stream-python
    desc: Async Python response streaming
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.(aiter_bytes|aread)\s*\(
  - id: urllib3-poolmanager
    desc: urllib3 PoolManager client
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'urllib3\.PoolManager\s*\('
  - id: urllib3-http-request
    desc: urllib3 HTTP request call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.request\s*\(\s*["''][A-Z]{3,7}["'']'
  - id: python-urlencoded-post-body
    desc: Configures a form-urlencoded HTTP body
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'urlencode\s*\(|application/x-www-form-urlencoded'
    unless:
      - type: basename
        regex: '^test_.{0,120}\.py$'
      - type: path
        regex: '(^|[\\/])flask_api[\\/]'

composite_rules:
  - id: urllib-json-post
    desc: urllib JSON POST request
    crit: notable
    conf: 0.9
    scope: file
    near_bytes: 4096
    all:
      - id: micro-behaviors/communications/http/client/library::urllib-request
      - id: micro-behaviors/data/serialize/json::json-dumps-call
    any:
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-object
  - id: python-http-executable-url
    desc: Python HTTP URL targets executable
    crit: notable
    conf: 0.86
    any:
      - id: requests-get-binary-url
      - id: requests-get-native-url
      - id: urlretrieve-binary-url
      - id: urlretrieve-native-url
  - id: python-http-post-any
    desc: Python HTTP POST method usage
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/request/httpx::httpx-post
      - id: httpx-client-post-request
      - id: micro-behaviors/communications/http/request/httpx::httpx-async-client-post
  - id: httpx-client-post-request
    desc: httpx Client POST request
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/client/httpx::httpx-client
      - id: py-post-generic
    near_bytes: 2048
  - id: url-literal
    desc: Uses a literal URL in an HTTP request
    crit: notable
    conf: 0.8
    any:
      - id: requests-get-url-literal
      - id: requests-post-url-literal
      - id: urllib-url-literal
      - id: python-http-executable-url
  - id: request-python
    desc: Sends an HTTP request with a Python client library
    crit: notable
    conf: 0.9
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/lib/requests::requests-put
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-object
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlretrieve-dup
      - id: url-literal
      - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
      - id: micro-behaviors/communications/http/request/httpx
      - id: httpx-client-post-request
      - id: urllib3-poolmanager
      - id: urllib3-http-request
