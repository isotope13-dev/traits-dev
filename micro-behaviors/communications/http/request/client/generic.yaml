defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
traits:
  - id: request
    desc: HTTP REQUEST method
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: REQUEST
      case_insensitive: false
  - id: http-request-func
    desc: httpRequest function reference
    crit: notable
    conf: 0.5
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      substr: httpRequest
  - id: user-agent-header
    desc: User-Agent header
    crit: baseline
    conf: 0.5
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      regex: '(["'']User-Agent["'']\s*:|User-Agent:)'
      not:
        - substr: libcurl/
  - id: auth-header-dup
    desc: Authorization header
    crit: baseline
    conf: 0.5
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      exact: Authorization
      case_insensitive: true
  - id: hardcoded-auth-token
    desc: Hardcoded Authorization token
    crit: suspicious
    conf: 0.7
    mbc: C0002
    attack: T1071.001
    if:
      type: raw
      regex: Authorization.:\s*.(Token|Bearer|Basic)\s+[0-9a-fA-F]{16,}
    unless:
      - type: text
        substr: "'Authorization': 'Bearer AAAAAA"
  - id: http-version
    desc: HTTP/1.x version string
    crit: baseline
    conf: 0.5
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      substr: HTTP/1.
  - id: http-versions
    desc: HTTP protocol version strings
    crit: component
    conf: 0.75
    if:
      type: text
      regex: HTTP/(1\.0|1\.1|2\.0)
  - id: proxy-connect-method
    desc: HTTP CONNECT proxy tunnel method
    crit: notable
    conf: 0.8
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      regex: CONNECT\s+%s:%d\s+HTTP/1\.[01]
  - id: http-connect-proxy
    desc: HTTP CONNECT proxy tunneling
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: HTTP CONNECT
    not:
      - regex: 'unparseable HTTP CONNECT'
      - substr: 'HTTP CONNECT failed'
      - substr: 'HTTP CONNECT %s'
      - substr: 'Attempting HTTP CONNECT through'
    downgrade:
      any:
        - id: well-known/lib/openssl::openssl-evp-api
        - id: metadata/signed/leaf::progress-software-corporation
  - id: proxy-connection-keepalive
    desc: Proxy-Connection keep-alive header
    crit: notable
    conf: 0.75
    mbc: C0002
    attack: T1071.001
    if:
      type: text
      regex: 'Proxy-Connection:\s*Keep-Alive'
      not:
        - substr: libcurl/
  - id: http-response
    desc: HTTP response reference
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)http_response|response_body
  - id: socket-dot
    desc: socket module usage
    crit: notable
    conf: 0.4
    if:
      type: text
      regex: socket\.(socket|connect|gethostbyname|create_connection)\(
  - id: xmlhttprequest-word
    desc: XMLHttpRequest API reference
    crit: notable
    conf: 0.4
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/library/structure::js-emscripten-preamble-marker
    if:
      type: text
      substr: XMLHttpRequest
  - id: content-type-header
    desc: Content-Type header string
    crit: component
    conf: 0.5
    if:
      type: text
      substr: 'Content-Type:'
  - id: http-config-method
    desc: HTTP configuration field (method)
    crit: baseline
    conf: 0.3
    if:
      type: text
      substr: '"method"'
  - id: http-config-body
    desc: HTTP configuration field (body)
    crit: baseline
    conf: 0.3
    if:
      type: raw
      regex: ("body"|body:)
  - id: http-config-headers
    desc: HTTP configuration field (headers)
    crit: baseline
    conf: 0.3
    if:
      type: raw
      regex: ("headers"|headers:)
composite_rules:
  - id: http-config-fields
    desc: HTTP configuration fields (method/body/headers)
    crit: baseline
    conf: 0.5
    needs: 2
    any:
      - id: http-config-method
      - id: http-config-body
      - id: http-config-headers
  - id: http-client
    desc: HTTP client usage markers
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/lib/urllib::urllib-word
      - id: socket-dot
      - id: micro-behaviors/communications/http/request/client::fetch-string
      - id: xmlhttprequest-word
  - id: http-proxy-connect-auth-tunnel
    desc: Authenticated HTTP CONNECT proxy tunnel
    crit: notable
    conf: 0.88
    attack: T1071.001
    all:
      - id: proxy-connect-method
      - id: proxy-connection-keepalive
      - id: micro-behaviors/communications/http/headers::basic-auth
