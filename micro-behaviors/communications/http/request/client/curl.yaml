defaults:
  platforms: [windows, unix]
  for: [shell, c, cpp, elf, macho, pe]
  crit: notable
  conf: 0.9
  attack: T1071.001
  mbc: C0002

traits:
  - id: curl-external-ip-request
    desc: curl requests a literal public IP address
    if:
      type: text
      regex: '(?m)^[ \t]*(if[ \t]+)?curl\b[^\n]{0,96}https?://(\d{1,3}\.){3}\d{1,3}'
      is: external_ip
