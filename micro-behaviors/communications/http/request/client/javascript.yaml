defaults:
  platforms:
    - unix
    - windows
  for: [javascript, typescript]
  attack: T1071.001
  mbc: C0002
traits:
  - id: image-src-network-request
    desc: Sends HTTP request through image source
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(\(new\s+Image\)\.src\s*=|new\s+Image\s*\(\s*\)[\s\S]{0,120}\.src\s*=)'

  - id: axios-request-call
    desc: Calls axios.request() to send an HTTP request
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: axios.request
  - id: axios-direct-call
    desc: Calls axios() to send an HTTP request
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: axios
  - id: http-request
    desc: Node.js http.request
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: '^http(_\d+\.default)?\.request$'
  - id: https-request
    desc: Node.js https.request
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: '^https(_\d+\.default)?\.request$'
  - id: http-get-dup
    desc: Node.js http.get
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: http.get
  - id: node-http-get-destructured
    desc: Node.js http.get destructured alias
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: 'get\s*:\s*\w+\s*\}\s*=\s*require\(["'']node:http'
  - id: node-https-get-destructured
    desc: Node.js https.get destructured alias
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\b(const|let|var)\s*\{\s*get\s*\}\s*=\s*require\(["''](node:)?https["'']\)'
  - id: https-get
    desc: Node.js https.get
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: https.get
  - id: node-https-get-dynamic
    desc: Node.js https.get dynamic call
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '["'']https["'']\)\s*\.get'
  - id: h-require-https
    desc: https module assigned h
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\b(const|let|var)\s+h\s*=\s*require\(["'']https["'']\)'
  - id: node-https-alias-binding
    desc: Binds Node HTTPS to alias h
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(const|let|var)\s+h\s*=\s*(__)?require\(["''](node:)?https["'']\)'
  - id: h-request-call
    desc: JavaScript opens HTTP request stream
    crit: notable
    conf: 0.74
    if:
      type: symbol
      exact: h.request
  - id: request-write-call
    desc: JavaScript writes HTTP request body
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: ^(req|request)\.write$
  - id: request-end-call
    desc: Ends a request-like object with .end()
    crit: component
    conf: 0.72
    if:
      type: symbol
      regex: ^(req|request)\.end$
  - id: node-http-get-dynamic
    desc: Node.js http.get dynamic call
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '["'']http["'']\)\s*\.get'
  - id: js-fetch-call
    desc: Calls or passes the JavaScript fetch API
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bfetch\s*(\(|,)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: fetch-token-query-parameter
    desc: Fetch call with token query parameter
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?is)\bfetch\s*\([^)]{0,600}\?token='
  - id: jquery-ajax-call
    desc: Makes an HTTP request with jQuery.ajax
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: .ajax
  - id: stringified-fetch-call
    desc: String literal begins with fetch(
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      regex: ^["']?fetch\s*\(\s*[^)\s]
  - id: fetch-then-json
    desc: fetch() response JSON parse
    crit: notable
    conf: 0.74
    if:
      type: text
      regex: fetch\(.{0,80}\.then\(.{0,80}\.json\(
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/fixture/
      - id: metadata/package/testing/presence/fixture/
  - id: fetch-json-body
    desc: fetch() sends JSON body
    crit: notable
    conf: 0.82
    count_min: 2
    if:
      type: text
      regex: "fetch\\(.{0,220}'body':JSON\\["
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: xmlhttprequest-new
    desc: XMLHttpRequest network client creation
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: new XMLHttpRequest()
  - id: node-fetch-import
    desc: Imports the node-fetch HTTP client
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: node-fetch
  - id: generic-request-method-call
    desc: Generic .request() method call
    crit: component
    conf: 0.4
    count_min: 2
    if:
      type: text
      regex: '\b(axios|http|https)\.request\s*\('
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: micro-behaviors/data/llm::agent-identity-set
  - id: got-import
    desc: got HTTP client import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (import|require).{0,50}['"]got['"]
  - id: superagent-import
    desc: superagent HTTP client import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (import|require).{0,50}['"]superagent['"]
  - id: needle-import
    desc: needle HTTP client import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (import|require).{0,50}['"]needle['"]
  - id: request-import
    desc: request HTTP client import
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (import|require).{0,50}['"]request['"]

  - id: gmail-session-redirect-marker
    desc: References Gmail's SetOSID session redirect
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: mail.google.com/accounts/SetOSID

  - id: request-interception-response
    desc: Intercepts browser request response
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'request\.(respond|continue)\s*\('

  - id: sms-api-otp-polling
    desc: Polls SMS or OTP API with Axios
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'axios\.(get|post)\s*\([^)]{0,160}/api/(sms|otp)'
      case_insensitive: true

  - id: post-method-text
    desc: Configures an HTTP POST request
    crit: notable
    conf: 0.94
    if:
      type: tree-sitter
      query: |
        ((pair
          key: (property_identifier) @key
          value: (string) @value)
         (#eq? @key "method")
         (#match? @value "^['\"]POST['\"]$"))
    unless:
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime/
  - id: get-with-params
    desc: HTTP GET with query parameters
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: path:\s*[`"'][^`"']{0,220}\$\{
  - id: req-write
    desc: Write data to HTTP request stream
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: req\.write\(
  - id: request-timeout
    desc: HTTP request with timeout
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: \.setTimeout\(\d+,
  - id: silent-error-handler
    desc: Empty error handler (silences failures)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \.on\(['"]error['"],\s*\(\)\s*=>\s*\{\s*\}\)
  - id: bearer-authorization-prefix
    desc: Contains an HTTP Bearer authorization prefix
    crit: component
    conf: 0.93
    if:
      type: text
      substr: Bearer

  - id: node-http-client-scheme-selection
    desc: Selects an HTTP client by URL scheme
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]*\s*=\s*[A-Za-z_$][\w$]*\.startsWith\(\s*["'']https:'

composite_rules:
  - id: fetch-post-pattern
    desc: JavaScript file uses fetch and configures an HTTP POST
    crit: notable
    conf: 0.9
    all:
      - id: js-fetch-call
      - id: post-method-text
  - id: gmail-session-redirect-interception
    desc: Intercepts Gmail's session redirect request
    crit: suspicious
    conf: 0.97
    all:
      - id: gmail-session-redirect-marker
      - id: request-interception-response
  - id: node-https-request-h-alias
    desc: Node.js https.request via alias
    crit: notable
    conf: 0.86
    all:
      - id: h-require-https
      - id: h-request-call
  - id: node-http-request-stream-body
    desc: Node HTTP request writes body
    crit: notable
    conf: 0.84
    all:
      - id: node-http
      - id: request-write-call
      - id: request-end-call
  - id: script-http-client
    desc: Uses a script HTTP client
    crit: notable
    conf: 0.75
    any:
      - id: micro-behaviors/communications/http/request/client::http-client
      - id: js-fetch-call
      - id: http-request
  - id: node-http
    desc: Node.js built-in http/https module usage
    crit: notable
    conf: 0.7
    any:
      - id: http-request
      - id: https-request
      - id: micro-behaviors/communications/http/request/client::http-get-dup
      - id: https-get
      - id: node-http-get-dynamic
      - id: node-https-get-dynamic
      - id: node-https-request-h-alias
  - id: http-client-usage
    desc: Uses an HTTP client library
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/communications/http/lib/axios::request-axios
      - id: node-http
      - id: js-fetch-call
      - id: js-fetch-call
      - id: xmlhttprequest-new
      - id: node-fetch-import
      - id: got-import
      - id: superagent-import
      - id: needle-import
      - id: request-import
      - id: node-https-request-h-alias
  - id: http-post-json
    desc: HTTP POST request with JSON content
    crit: notable
    conf: 0.75
    all:
      - id: post-method-text
      - id: micro-behaviors/communications/http/header/content-type::application-json
  - id: http-post-json-header
    desc: HTTP POST request with JSON content type
    crit: notable
    conf: 0.85
    all:
      - id: post-method-text
      - id: micro-behaviors/communications/http/header/content-type::json-header
  - id: http-method-calls
    desc: Calls an HTTP request method
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: https-request
      - id: http-request
      - id: node-https-request-h-alias
      - id: js-fetch-call
      - id: micro-behaviors/communications/http/post::axios-with-data
      - id: fetch-post-pattern
      - id: get-with-params
  - id: bearer-header-from-storage
    desc: Bearer header from storage
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/data/db/web-storage::dom-storage-getitem
      - id: auth-header-dup
      - id: bearer-authorization-prefix
  - id: vscode-extension-http-request
    desc: VS Code extension HTTP request
    crit: notable
    conf: 0.9
    all:
      - id: metadata/permission/activation::vscode-context
    any:
      - id: js-fetch-call
      - id: http-request
      - id: https-request
      - id: post-method-text
      - id: node-fetch-import
    unless:
      - id: metadata/file/format::sourcemap-sources-content
  - id: node-scheme-selected-http-client
    desc: Node HTTP client selected by URL scheme
    crit: notable
    conf: 0.92
    all:
      - id: node-http-client-scheme-selection
      - id: metadata/import/builtin::require-http
      - id: metadata/import/builtin::require-https
