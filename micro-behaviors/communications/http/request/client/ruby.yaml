defaults:
  for:
    - ruby
  attack: T1071.001
  mbc: C0002
  platforms:
    - unix
    - windows
traits:
  - id: httparty-get
    desc: HTTParty GET request invocation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: member
      exact: 'HTTParty.get'
  - id: net-http-post
    desc: Net::HTTP.post() method call
    crit: notable
    conf: 0.93
    count_min: 1
    if:
      id: micro-behaviors/communications/http/request/netlib::net-http-post
  - id: net-http-get-dup
    desc: Net::HTTP.get() method call
    crit: notable
    conf: 0.8
    count_min: 1
    if:
      id: micro-behaviors/communications/http/request/netlib::net-http-get-dup
  - id: net-http-new
    desc: Net::HTTP.new() instantiation
    crit: notable
    conf: 0.7
    count_min: 1
    if:
      id: micro-behaviors/communications/http/request/netlib::net-http-new
