defaults:
  platforms: [windows, unix]
  for: [shell, batch, powershell, python, javascript, typescript, rust, go, ruby]
  crit: notable
  conf: 0.95

traits:
  - id: resolve-host-override-flag
    desc: curl --resolve host override flag
    if:
      # Literal facts exclude manpage links and explanatory comments.
      type: literal
      kind: string
      exact: --resolve

  - id: connect-to-host-override-flag
    desc: curl --connect-to host override flag
    if:
      type: literal
      kind: string
      exact: --connect-to
