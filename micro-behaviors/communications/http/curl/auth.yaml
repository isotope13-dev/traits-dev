defaults:
  platforms: [unix, windows]
  for: [scripts, binaries, shell, batch, powershell, groovy, python, javascript, ruby]
  crit: notable
  mbc: C0002
  attack: T1071.001

traits:
  - id: curl-basic-auth-token
    desc: curl basic auth token credential
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\bcurl\b[^\n]{0,120}-u\s+[^:\s]{1,80}:token\b'
    # Generated TypeScript declarations embed this exact command as GitHub
    # API documentation; declarations cannot execute it.
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
