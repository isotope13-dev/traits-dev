defaults:
  platforms: [windows, unix]
  for:
    - php
traits:
  - id: init
    desc: cURL session initialization
    crit: notable
    conf: 0.8
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      kind: call
      exact: curl_init
  - id: url-from-method-call
    desc: CURLOPT_URL set from method call
    crit: notable
    conf: 0.7
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: 'CURLOPT_URL\s*,\s*\$this->[A-Za-z_][A-Za-z0-9_]*\s*\('
  - id: url-from-static-call
    desc: CURLOPT_URL set from static call
    crit: notable
    conf: 0.7
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: 'CURLOPT_URL\s*,\s*[A-Za-z_][A-Za-z0-9_]*::[A-Za-z_]'
  - id: url-from-decoder
    desc: CURLOPT_URL set from decoder call
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: 'CURLOPT_URL\s*,\s*(base64_decode|hex2bin|pack)\s*\('
  - id: exec
    desc: cURL request execution
    crit: notable
    conf: 0.8
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      kind: call
      exact: curl_exec
  - id: exec-symbol
    desc: References the PHP curl_exec() function
    crit: notable
    conf: 0.8
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      exact: curl_exec
  - id: init-symbol
    desc: References the PHP curl_init() function
    crit: notable
    conf: 0.75
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      exact: curl_init
  - id: setopt
    desc: cURL option configuration
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: curl_setopt
  - id: ssl-verify-disable
    desc: SSL certificate verification disabled
    # This is an insecure transport configuration worth surfacing, but the
    # setting is also used by older authentication clients for environments
    # without a configured CA bundle.  Escalation requires the encoded-C2
    # composite below rather than this option alone.
    crit: notable
    conf: 0.9
    mbc: B0032
    attack: T1553
    if:
      type: text
      regex: curl_setopt\s*\([^,]{1,120},\s*CURLOPT_SSL_VERIFYPEER\s*,\s*(false|0|FALSE)
    unless:
      - id: well-known/app/wordpress-plugins/
      - id: well-known/app/wordpress-plugins::wordpress-plugin-path-seraphinite-accelerator
      - id: well-known/tool/development/wp-cli/
      - id: well-known/app/civicrm/
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/lib/elfinder::source-context
      - id: well-known/lib/rrzu-feizhu-topsdk::archive-context
      # WordPress-style fallback helper: the local file check identifies the
      # compatibility branch. Raw source is needed because text facts split
      # this relationship into separate runs.
      - type: raw
        regex: 'curl_exec_follow[\s\S]{0,900}file_exists[\s\S]{0,300}SSL_VERIFYPEER'
      - type: path
        regex: '(?i)(^|[\\/])powerpress([\\/]|$)'
  - id: ssl-host-disable
    desc: SSL host verification disabled
    crit: notable
    conf: 0.9
    mbc: B0032
    attack: T1553
    if:
      type: text
      regex: curl_setopt\s*\([^,]{1,120},\s*CURLOPT_SSL_VERIFYHOST\s*,\s*(0|false|FALSE)
    unless:
      - id: well-known/tool/development/wp-cli::wp-cli-phar
  - id: follow-redirects
    desc: cURL follows HTTP redirects
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: CURLOPT_FOLLOWLOCATION
  - id: file-upload
    desc: cURL file upload capability (CURLFile)
    crit: notable
    conf: 0.85
    mbc: B0030
    attack: T1041
    if:
      type: string_literal
      word: CURLFile
  - id: post-data
    desc: cURL POST data configuration
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: CURLOPT_POSTFIELDS
  - id: user-agent-set
    desc: Custom User-Agent header configuration
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: CURLOPT_USERAGENT
  - id: referer-set
    desc: Custom Referer header configuration
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: CURLOPT_REFERER
