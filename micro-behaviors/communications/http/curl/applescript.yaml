defaults:
  for:
    - applescript
  platforms:
    - macos
  attack: T1041
traits:
  - id: curl-cmd
    desc: curl command in AppleScript
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: \bcurl\s
  - id: curl-post
    desc: curl POST request in AppleScript
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: curl\s+.{0,120}-X\s*POST\b
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
  - id: curl-custom-header
    desc: curl custom header flag
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: 'curl\s+.{0,200}-H\s+\\?\"[A-Za-z0-9_-]+:'
  # Raw text (not string_literal): AppleScript delivered as a single-line
  # `osascript -e 'run script "..."'` blob with deeply backslash-escaped nested
  # quotes does not expose clean AST string literals, so a string_literal
  # matcher misses `--data-binary @`; the text matcher catches both the clean
  # and the wrapped/obfuscated forms.
  - id: curl-data-binary-file
    desc: curl data-binary file upload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: --data-binary @
  - id: http-scheme
    desc: HTTP scheme in AppleScript
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: http://
composite_rules:
  - id: curl-post-upload
    desc: AppleScript curl POST upload
    crit: suspicious
    conf: 0.95
    all:
      - id: curl-post
      - id: curl-data-binary-file
