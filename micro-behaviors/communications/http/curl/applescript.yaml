defaults:
  for:
    - applescript
  platforms:
    - macos
  attack: T1041
traits:
  - id: curl-cmd
    desc: curl command in AppleScript
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: \bcurl\s
  - id: curl-post
    desc: curl POST request in AppleScript
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: curl\s+.{0,120}-X\s*POST\b
  - id: curl-custom-header
    desc: curl custom header flag
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'curl\s+.{0,200}-H\s+\\?\"[A-Za-z0-9_-]+:'
  - id: curl-data-binary-file
    desc: curl data-binary file upload
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: --data-binary @
  - id: http-scheme
    desc: HTTP scheme in AppleScript
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: http://
composite_rules:
  - id: curl-post-upload
    desc: AppleScript curl POST upload
    crit: suspicious
    conf: 0.95
    all:
      - id: curl-post
      - id: curl-data-binary-file
