# Dynamic subdomain curl requests
defaults:
  platforms: [unix, android, ios]
  for: [shell]
  crit: notable
traits:
  - id: curl-dynamic-subdomain
    desc: Curl to dynamic subdomain (DNS exfil)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'curl\s+\\?["'']https?://\$[a-zA-Z0-9_]+\.[\w\.\-]+/\\?["'']'
      case_insensitive: true
  - id: shell-embedded-node-curl-exec
    desc: Embedded Node curl command
    crit: notable
    conf: 0.95
    attack: T1041
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.exec\(\s*["'']curl\s+-s\s+["'']'
