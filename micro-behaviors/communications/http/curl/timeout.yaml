# curl Timeout Flags
# Detects curl commands with explicit timeout parameters
# Short timeouts (5-30s) in curl POST requests are a stealer fingerprint
defaults:
  platforms:
    - linux
    - macos
    - windows
  for:
    - shell
    - python
    - javascript
    - php
    - ruby
    - powershell
traits:
  - id: curl-max-time
    desc: curl --max-time timeout flag
    crit: component
    conf: 0.85
    if:
      type: text
      regex: curl\b.{0,200}--max-time\s+\d+
  - id: curl-max-time-short
    desc: curl -m short timeout flag
    crit: component
    conf: 0.85
    if:
      type: text
      regex: curl\b.{0,200}\s-m\s+\d{1,2}\b
  - id: curl-connect-timeout
    desc: curl --connect-timeout flag
    crit: component
    conf: 0.85
    if:
      type: text
      regex: curl\b.{0,200}--connect-timeout\s+\d+
composite_rules:
  - id: curl-with-timeout
    desc: curl command with explicit timeout
    crit: component
    conf: 0.85
    any:
      - id: curl-max-time
      - id: curl-max-time-short
      - id: curl-connect-timeout
