defaults:
  platforms: [unix, windows]
  for: [shell, batch, powershell]
  crit: notable
  mbc: C0002
  attack: T1071.001

traits:
  - id: curl-post-custom-header
    desc: curl POST request with custom header
    conf: 0.82
    if:
      type: text
      regex: '\bcurl(\.exe)?\s+.{0,80}-X\s+POST\s+.{0,80}-H'
