defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  mbc: C0002
  attack: T1071.001

traits:
  - id: curl-post-flag
    desc: curl explicit HTTP POST request
    conf: 0.8
    if:
      type: text
      regex: '\bcurl\b.{0,120}-X\s*POST'
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
