defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  mbc: C0002
  attack: T1071.001

traits:
  - id: curl-short-data-option
    desc: curl sends request body with -d
    crit: notable
    conf: 0.9
    for: [shell, batch, powershell]
    if:
      type: symbol
      kind: call
      regex: '(?i)^curl(\.exe)?$'
      arg:
        kind: identifier
        name: -d
  - id: curl-data-option
    desc: curl sends an HTTP request body
    conf: 0.88
    for: [shell, batch, powershell]
    if:
      type: symbol
      kind: call
      regex: '(?i)^curl(\.exe)?$'
      arg:
        kind: identifier
        name: --data
  - id: curl-post-flag
    desc: curl explicitly sends an HTTP POST request
    conf: 0.8
    if:
      type: text
      regex: '\bcurl\b.{0,120}-X\s*POST'
    unless:
      - id: metadata/lang/source::openapi-generator-source-banner
      - id: well-known/tool/development/fzf::fzf-binary
  - id: workflow-curl-data-option
    desc: Workflow curl request body option
    crit: component
    conf: 0.85
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: '(?m)^[ \t]*[^#\n][^\n]*\bcurl[^\n]{0,160}(-d|--data|--data-raw)'
    unless:
      - id: micro-behaviors/communications/http/auth::workflow-secret-bearer-auth
