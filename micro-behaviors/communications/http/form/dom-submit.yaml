defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, html]
  crit: baseline
  conf: 0.82

traits:
  - id: document-submit-listener
    desc: Document submit event listener
    if:
      type: text
      substr: "document.addEventListener('submit'"
  - id: document-submit-listener-doublequote
    desc: Document submit event listener
    if:
      type: text
      substr: 'document.addEventListener("submit"'
