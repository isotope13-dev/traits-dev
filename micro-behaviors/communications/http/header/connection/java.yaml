defaults:
  platforms: [unix, windows]
  for: [java]
  mbc: C0002
  attack: T1071.001

traits:
  - id: java-connection-keepalive-header
    desc: Java HTTP keep-alive header
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\bConnection:\s*keep-alive\b'

  - id: java-bytecode-connection-keepalive-header
    desc: Java bytecode HTTP keep-alive header
    crit: notable
    conf: 0.8
    for: [class, jar]
    if:
      type: hex
      pattern: 43 6f 6e 6e 65 63 74 69 6f 6e 3a 20 6b 65 65 70 2d 61 6c 69 76 65
