defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: json-header
    desc: Uses JSON HTTP Content-Type header
    crit: notable
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: 'Content-Type[^\r\n]{0,40}application/json'

  - id: application-json
    desc: application/json media type literal
    crit: notable
    conf: 0.65
    count_min: 3
    if:
      type: string_literal
      substr: application/json
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].+\.(js|ts)$
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension

  - id: plain-text-body-header
    desc: HTTP text/plain content type
    crit: baseline
    conf: 0.92
    if:
      type: text
      regex: Content-Type['"]\s*:\s*['"]text/plain
    unless:
      - type: text
        substr: "require('supertest')"
      - id: metadata/package/testing/harness/runtime/
      - type: raw
        regex: writeHead\([^)]{0,400}Content-Type['"]\s*:\s*['"]text/plain
      - type: text
        substr: X-Crowdin-Project
