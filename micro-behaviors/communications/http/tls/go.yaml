defaults:
  platforms:
    - linux
    - unix
    - android
    - windows
    - macos
    - ios
  for:
    - elf
    - pe
    - macho
    - dll
traits:
  - id: utls-import
    desc: uTLS dependency embedded
    crit: notable
    conf: 0.92
    if:
      type: string_value
      substr: github.com/refraction-networking/utls
  - id: utls-conn-state
    desc: uTLS connection state internals
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: utlsConnExtraFields
  - id: utls-build-error
    desc: uTLS ClientHello builder string
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: client hello has already been built by utls
  - id: utls-handshake-type
    desc: uTLS handshake type internals
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: utlsHandshakeMessageType
composite_rules:
  - id: go-utls-fingerprint-customization
    desc: Go binary embeds uTLS fingerprint customization
    crit: notable
    conf: 0.93
    any:
      - id: utls-import
      - id: utls-conn-state
      - id: utls-build-error
      - id: utls-handshake-type
    needs: 2
