defaults:
  platforms:
    - unix
    - windows
  for: [go, elf, macho, pe]
traits:
  - id: go-load-x509-keypair
    desc: Go loads X509 keypair
    crit: notable
    conf: 0.9
    mbc: C0005
    if:
      type: text
      substr: "tls.LoadX509KeyPair"

  - id: go-client-cert-callback
    desc: Go TLS client certificate callback
    crit: notable
    conf: 0.9
    mbc: C0005
    if:
      type: text
      substr: "GetClientCertificate"

  - id: go-http2-tls-client-config
    desc: Go HTTP2 TLS client config
    crit: notable
    conf: 0.88
    mbc: C0005
    if:
      type: text
      regex: 'http2\.Transport[\s\S]{0,220}TLSClientConfig'

  - id: utls-import
    desc: uTLS dependency embedded
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: github.com/refraction-networking/utls
  - id: utls-conn-state
    desc: uTLS connection state internals
    crit: component
    conf: 0.85
    if:
      type: text
      substr: utlsConnExtraFields
  - id: utls-build-error
    desc: uTLS ClientHello builder string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: client hello has already been built by utls
  - id: utls-handshake-type
    desc: uTLS handshake type internals
    crit: component
    conf: 0.8
    if:
      type: text
      substr: utlsHandshakeMessageType
composite_rules:
  - id: go-mutual-tls-http2-client
    desc: Go mutual TLS HTTP2 client
    crit: notable
    conf: 0.93
    mbc: C0005
    all:
      - id: go-load-x509-keypair
      - id: go-client-cert-callback
      - id: go-http2-tls-client-config

  - id: go-utls-fingerprint-customization
    desc: Go binary embeds uTLS fingerprint customization
    crit: notable
    conf: 0.93
    any:
      - id: utls-import
      - id: utls-conn-state
      - id: utls-build-error
      - id: utls-handshake-type
    needs: 2
