defaults:
  platforms: [unix]
  for: [shell]
  mbc: C0005

traits:
- id: curl-insecure
  desc: curl disables TLS certificate verification
  crit: notable
  conf: 0.95
  for: [shell, github-actions]
  platforms: [unix, windows]
  if:
    type: text
    regex: '\bcurl\b[^\n|;]{0,240}\s(-[A-Za-z]*k[A-Za-z]*\b|--insecure\b)'

- id: curl-client-cert-key
  desc: curl client certificate authentication
  crit: notable
  conf: 0.94
  ref: sha256:e4445eaa3155940f60991241a809409aa70b708303a0d07aa35b2e3d2bf76885
  if:
    type: text
    regex: '\bcurl\b(?s:.{0,240})--cert(?s:.{0,120})--key'

- id: curl-custom-ca
  desc: curl custom CA certificate
  crit: notable
  conf: 0.9
  ref: sha256:e4445eaa3155940f60991241a809409aa70b708303a0d07aa35b2e3d2bf76885
  if:
    type: text
    regex: '\bcurl\b(?s:.{0,260})--cacert'

composite_rules:
- id: curl-mutual-tls
  desc: curl mutual TLS authentication
  crit: notable
  conf: 0.95
  ref: sha256:e4445eaa3155940f60991241a809409aa70b708303a0d07aa35b2e3d2bf76885
  all:
  - id: curl-client-cert-key
  - id: curl-custom-ca
