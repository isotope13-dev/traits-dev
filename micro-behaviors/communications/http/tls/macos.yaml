defaults:
  platforms:
    - macos
  for:
    - macho
    - dylib
  mbc: C0002
  attack: T1071.001

traits:
  - id: securetransport-handshake
    desc: SecureTransport TLS handshake
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: SSLHandshake
  - id: securetransport-io
    desc: SecureTransport TLS read/write
    crit: notable
    conf: 0.88
    if:
      type: symbol
      regex: ^SSL(Read|Write)$
  - id: securetransport-peer-domain
    desc: SecureTransport peer domain
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: SSLSetPeerDomainName
  - id: securetransport-trust-eval
    desc: Security framework trust evaluation
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: SecTrustEvaluate

composite_rules:
  - id: securetransport-client
    desc: macOS SecureTransport TLS client
    crit: notable
    conf: 0.92
    all:
      - id: securetransport-handshake
      - id: securetransport-io
    any:
      - id: securetransport-peer-domain
      - id: securetransport-trust-eval
