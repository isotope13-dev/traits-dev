defaults:
  for: [pe, batch, powershell, javascript, vbs, python, csharp, cpp]
  platforms: [windows]
  crit: notable
  conf: 0.88
  attack: T1105
  mbc: E1105

traits:
  - id: download-url-field-set
    desc: Download manager URL fields
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    count_min: 3
    if:
      type: text
      regex: '(^|[^A-Za-z])(DownloadURL|SrcURL|CsrURL|BuyURL)([^A-Za-z]|$)'

  - id: webpage-url-extraction
    desc: Webpage URL extraction messages
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    count_min: 2
    if:
      type: text
      regex: 'Extracted new URL from (data|web page)'

  - id: mirror-url-discovery
    desc: Mirror URL discovery headers
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    count_min: 2
    if:
      type: text
      regex: '(?i)(mirror_url=|mirror-url=|X-Mirror-URL)'

composite_rules:
  - id: url-intake-and-extraction
    desc: Download manager URL intake extraction
    crit: suspicious
    conf: 0.9
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    all:
      - id: download-url-field-set
    any:
      - id: webpage-url-extraction
      - id: mirror-url-discovery
