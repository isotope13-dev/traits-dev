# Browser-extension file download (chrome.downloads). Generic technique:
# fetching a file to disk.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-downloads-api
    desc: Chrome downloads API usage
    crit: baseline
    if:
      type: text
      regex: '(chrome|browser)\.downloads\.[A-Za-z_]|chrome\.downloads\b'
  - id: chrome-downloads-download
    desc: Chrome downloads.download invocation
    if:
      type: text
      regex: '(chrome|browser)\.downloads\.download\b'
