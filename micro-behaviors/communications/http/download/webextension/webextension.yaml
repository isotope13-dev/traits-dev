# Browser-extension file download (chrome.downloads). Generic technique:
# fetching a file to disk.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-downloads-api
    desc: Chrome downloads API usage
    crit: baseline
    if:
      type: text
      regex: '(^|\.)(chrome\.|browser\.)?downloads\.[A-Za-z_]'
  - id: chrome-downloads-download
    desc: Calls WebExtension downloads download API
    if:
      type: symbol
      kind: call
      regex: '(^|\.)downloads\.download$'
  - id: chrome-downloads-search
    desc: Queries browser download records
    if:
      type: symbol
      kind: call
      regex: '(^|\.)downloads\.search$'
  - id: chrome-downloads-cancel
    desc: Cancels an active browser download
    if:
      type: symbol
      kind: call
      regex: '(^|\.)downloads\.cancel$'
  - id: chrome-downloads-change-listener
    desc: Monitors browser download state changes
    if:
      type: symbol
      kind: call
      regex: '(^|\.)downloads\.onChanged\.addListener$'
