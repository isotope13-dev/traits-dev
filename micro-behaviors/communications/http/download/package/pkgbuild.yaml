defaults:
  platforms: [linux]
  for: [shell]

traits:
  - id: pkgbuild-build-phase-fetch
    desc: PKGBUILD build phase fetches remote content
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: function
      regex: '(?s)^(build|prepare)\s*\(\)\s*\{.{0,2000}\b(curl|wget)\b'
