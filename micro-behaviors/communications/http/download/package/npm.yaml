# HTTP GET / download capability expressed in an npm package.json script
# (curl / wget / fetch a URL). scripts[*] matches any script value. An outbound
# POST is a different capability (data going OUT, not a download) and lives in
# communications/http/post — the command-local `not` keeps a curl POST from
# being mislabeled here.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: C0002
  attack: T1071.001
traits:
  - id: npm-script-download
    desc: npm script fetches over HTTP
    if:
      type: value
      path: 'scripts[*]'
      regex: '\b(curl|wget)\b[^;&|\n]{0,200}https?://|\bfetch\s*\('
    not:
      # A curl POST is an outbound request, not a download.  Keep the
      # exclusion command-local so a later build-tool `-d` does not suppress
      # a genuine curl download.
      - regex: '\bcurl\b[^;&|\n]{0,200}(-X\s*POST|--data\b|\s-d\b)'
    unless:
      - id: metadata/package/files/dependency::node-modules-nested-package-json
      - id: well-known/tool/sysadmin/alpine-packages::alpine-langfuse-package
