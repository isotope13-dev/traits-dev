defaults:
  platforms: [windows, unix]
  for: [shell, python, javascript, typescript]
  crit: notable
  mbc: C0002
  attack: T1071.001

traits:
- id: github-release-api-download
  desc: Curl fetches GitHub release metadata
  crit: notable
  conf: 0.92
  for: [shell]
  if:
    type: text
    regex: 'curl[\s\S]{0,240}https://api\.github\.com/'
- id: bun-release-archive-url
  desc: Bun release archive URL reference
  crit: notable
  conf: 0.94
  for: [python, javascript, typescript]
  if:
    type: text
    substr: github.com/oven-sh/bun/releases/download/bun-v
- id: github-raw-curl-fetch
  desc: Curl fetches GitHub raw content
  conf: 0.85
  if:
    type: text
    regex: '\bcurl\b.{0,50}raw\.githubusercontent\.com'
  not:
  - substr: /home/build/melange-out/
  - substr: docker-library/
- id: github-raw-wget-fetch
  desc: Wget fetches GitHub raw content
  conf: 0.85
  if:
    type: text
    regex: '\bwget\b.{0,50}raw\.githubusercontent\.com'
  not:
  - substr: /home/build/melange-out/
  - substr: docker-library/
composite_rules:
- id: github-raw-browser-fetch
  desc: Fetch API reads GitHub raw content
  conf: 0.85
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-any
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
- id: github-raw-fetch
  desc: Fetches content from GitHub raw endpoint
  conf: 0.85
  any:
  - id: github-raw-curl-fetch
  - id: github-raw-wget-fetch
  - id: github-raw-browser-fetch
- id: github-raw-mutable-fetch
  desc: Fetches GitHub raw content from mutable ref
  conf: 0.88
  all:
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-refs
  - id: github-raw-fetch
