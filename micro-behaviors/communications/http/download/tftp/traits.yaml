defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1105
traits:
  - id: command
    desc: tftp command invocation
    crit: notable
    conf: 0.5
    if:
      type: raw
      regex: '\btftp\s+-[glr]\b'
    unless:
      - type: text
        substr: tftp error msg
      - type: text
        substr: tftp rrq file
