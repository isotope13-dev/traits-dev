defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  attack: T1105
traits:
  - id: command
    desc: tftp command invocation
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: \btftp(\s+-\w|\s+(get|put)\b)
    unless:
      - type: string_value
        substr: tftp error msg
      - type: string_value
        substr: tftp rrq file
