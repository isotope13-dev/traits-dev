# Node SEA downloader primitives
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105

traits:
  - id: node-sea-archive-http-fetch
    desc: HTTP response to file
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: 'createWriteStream\([\s\S]{0,600}\.request\('

  - id: node-sea-executable-discovery
    desc: Finds extracted .exe files
    crit: notable
    conf: 0.97
    if:
      type: raw
      regex: 'toLowerCase\(\)\.endsWith\("\.exe"\)[\s\S]{0,800}(spawn|tt)\('
