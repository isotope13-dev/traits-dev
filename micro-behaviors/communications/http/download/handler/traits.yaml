defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: generic-dup
    desc: Function to handle remote file
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: handleFileDownload
  - id: api-download-route
    desc: HTTP download API route
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: /api/download
