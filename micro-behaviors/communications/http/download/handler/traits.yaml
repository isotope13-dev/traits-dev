defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  # Handler names that explicitly identify a payload/file transfer.  Keep the
  # vocabulary narrow: UI actions such as handleDownloadEvents are not network
  # download behavior and belong nowhere in a dropper signature.
  - id: node-payload-download-handler
    desc: Node handler named for payload download
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\b(handle|process)[A-Za-z0-9_]*download(File|Payload|Module)s?\b'
  - id: node-payload-upload-handler
    desc: Node handler named for payload upload
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\b(handle|process)[A-Za-z0-9_]*upload(File|Payload|Module)s?\b'
  - id: browser-forced-download
    desc: Browser creates forced download link
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'createObjectURL.{0,40}(\\.click\\(|download\\s*=)|downloadElement\\.download\\s*='
    not:
      - substr: duplicati-config.
      - substr: downloadFile(o,e){let t=window.URL.createObjectURL(o)
  - id: generic-dup
    desc: Function to handle remote file
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: handleFileDownload
  - id: api-download-route
    desc: HTTP download API route
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: /api/download
  - id: php-content-disposition-readfile
    desc: PHP readfile download response
    crit: notable
    conf: 0.88
    for: [php]
    if:
      type: text
      regex: 'Content-Disposition[\s\S]{0,220}readfile\s*\('

  - id: caller-url-binary-fetch
    desc: Fetches binary response from caller-provided URL
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: 'fetchImpl\s*\(\s*url\s*\)[\s\S]{0,500}\.arrayBuffer\s*\('

composite_rules:
  - id: node-http-stream-to-file
    desc: Node HTTP response streamed to a file
    crit: notable
    conf: 0.92
    attack: T1105
    for: [javascript, typescript]
    near_lines: 12
    all:
      - id: micro-behaviors/fs/write/file/direct::create-write-stream
      - id: micro-behaviors/process/fd/stdio::node-response-pipe
      - id: micro-behaviors/communications/http/request/client::node-http
