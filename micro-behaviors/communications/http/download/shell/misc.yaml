defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
  attack: T1105
traits:
  - id: lwp-download
    desc: lwp-download command
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      word: lwp-download
  - id: curl-wget-command-check
    desc: Checks curl or wget availability
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: command\s+-v\s+(curl|wget)
  - id: shell-curl-wget-url-fetch
    desc: curl or wget fetches an HTTP URL
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(curl|wget)\b[^\n|]{0,160}https?://'
  - id: wget-http-literal-download
    desc: wget downloads HTTP literal path
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\bwget\b\s+https?://[0-9A-Za-z._:-]{3,80}/[A-Za-z0-9._-]{2,40}\b'
  - id: fetch-command-with-var
    desc: fetch command references variable
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(curl|wget|busybox\s+wget)\b[^\n]{0,120}\$[A-Za-z_]\w*'
  - id: fetch-output-to-var
    desc: fetch output redirected to variable
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(curl|wget|busybox\s+wget)\b[^\n]{0,160}(\s>\s|\s-O\s+->?\s*)\$[A-Za-z_]\w*'
  - id: wget-var-reference
    desc: wget references variable
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\bwget\b[^\n]{0,120}\$[A-Za-z_]\w*'
  - id: shell-get-http
    desc: get command with http URL
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \\bget\\s+["']?http
  - id: shell-get-path
    desc: get command with path argument
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \\bget\\s+.*?\\s+["']?/
  - id: shell-get-call
    desc: call to get function/command
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \\bget\\s+
composite_rules:
  - id: shell-get-download
    desc: get command used for download (common in malware)
    crit: notable
    conf: 0.7
    all:
      - id: shell-get-http
      - id: shell-get-path
  - id: fetch-var-output-var
    desc: fetch uses variable and writes variable target
    crit: notable
    conf: 0.9
    all:
      - id: fetch-command-with-var
      - id: fetch-output-to-var
    near_bytes: 220
  - id: wget-loop-variable-download
    desc: wget downloads inside variable loop
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/data/control-flow/loop::shell-for-loop-over-var
      - id: wget-var-reference
    near_bytes: 260
