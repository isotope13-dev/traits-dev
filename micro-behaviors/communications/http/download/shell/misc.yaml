defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
  attack: T1105
traits:
  - id: lwp-download
    desc: lwp-download command
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      word: lwp-download
  - id: curl-wget-command-check
    desc: Checks curl or wget availability
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: command\s+-v\s+(curl|wget)
  - id: shell-curl-wget-url-fetch
    desc: curl or wget fetches an HTTP URL
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?m)(^|[;&|]\s*)\$?\s*(curl|wget)\s+[^\n|]{0,160}https?://'
  - id: shell-script-url-download
    desc: Shell fetches a remote shell script
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(curl|wget)\b.{0,120}https?://[A-Za-z0-9._/~:@?&=%+-]+\.sh\b'
  - id: wget-insecure-tls-download
    desc: wget disables TLS verification
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bwget(\.exe)?\b[^\n]{0,100}--no-check-certificate\b'
    unless:
      - id: metadata/package/testing/
  - id: curl-wget-onnx-asset
    desc: curl or wget fetches ONNX model
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(curl|wget)\b[^\n]{0,160}\.onnx\b'
  - id: curl-wget-image-asset
    desc: curl or wget fetches an image asset
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(curl|wget)\b[^\n]{0,160}\.(png|jpe?g|svg)\b'
  - id: curl-wget-audio-asset
    desc: curl or wget fetches an audio asset
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(curl|wget)\b[^\n]{0,160}\.(wav|mp3|ogg)\b'
  - id: wget-http-literal-download
    desc: wget downloads HTTP literal path
    # This is a complete network operation, not a fragment.  Keep it visible
    # as a notable capability so download-and-execute objectives can compose
    # it without mislabeling the underlying behavior.
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bwget\b\s+https?://[0-9A-Za-z._:-]{3,80}/[A-Za-z0-9._-]{2,40}\b'
  - id: curl-http-literal-download
    desc: curl downloads HTTP URL
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bcurl\b\s+(-[oO]\s+|--output\s+)?https?://[^ \n;&|]{5,140}'
  - id: wget-http-literal-download-cluster
    desc: wget downloads multiple HTTP literal paths
    crit: notable
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\bwget\b\s+https?://[0-9A-Za-z._:-]{3,80}/[A-Za-z0-9._-]{2,40}\b'
  - id: curl-http-literal-download-cluster
    desc: curl downloads multiple HTTP URLs
    crit: notable
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\bcurl\b\s+https?://[^ \n;&|]{5,140}'
  - id: fetch-command-with-var
    desc: curl or wget references shell variable
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(curl|wget|busybox\s+wget)\b[^\n]{0,120}\$[A-Za-z_]\w*'
  - id: fetch-output-to-var
    desc: Output path comes from shell variable
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(\s>|-[oO]\s+)["'']?\$[A-Za-z_]\w*["'']?'
  - id: fetch-output-to-literal
    desc: fetch output redirected to literal
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(curl|wget|busybox\s+wget)\b[^\n]{0,180}(\s>\s|\s-[oO]\s+)[A-Za-z0-9._-]{3,40}\b'
  - id: wget-var-reference
    desc: wget references variable
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\bwget\b[^\n]{0,120}\$[A-Za-z_]\w*'
  - id: shell-get-http
    desc: get command with http URL
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \\bget\\s+["']?http
  - id: shell-get-path
    desc: get command with path argument
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \\bget\\s+.*?\\s+["']?/
  - id: shell-get-call
    desc: call to get function/command
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \\bget\\s+
  - id: loader-selection-env-var
    desc: Downloader selected through environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\\b(LDR|WGET|DL)\\s*=\\s*(curl|wget)'
composite_rules:
  - id: curl-wget-loader-selection
    desc: Selects curl or wget as downloader
    crit: notable
    conf: 0.85
    any:
      - id: curl-wget-command-check
      - id: loader-selection-env-var
  - id: shell-get-download
    desc: get command used for download (common in malware)
    crit: notable
    conf: 0.7
    all:
      - id: shell-get-http
      - id: shell-get-path
  - id: fetch-var-output-var
    desc: curl/wget uses variable input and output paths
    crit: notable
    conf: 0.9
    all:
      - id: fetch-command-with-var
      - id: fetch-output-to-var
    near_bytes: 220
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: wget-loop-variable-download
    desc: wget downloads inside variable loop
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/data/control-flow/loop::shell-for-loop-over-var
      - id: wget-var-reference
    near_bytes: 260
