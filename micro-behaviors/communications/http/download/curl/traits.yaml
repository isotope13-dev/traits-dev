defaults:
  platforms: [windows, unix, openwrt]
  attack: T1071.001
  mbc: B0030
  for: [elf, pe, so, dll, c, cpp, objc]
traits:
  - id: curl-easy-init
    desc: Initializes libcurl easy interface (HTTP
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: curl_easy_init
  - id: curl-easy-setopt
    desc: Configures libcurl options (URL, headers,
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: curl_easy_setopt
  - id: curl-easy-perform
    desc: Executes HTTP request via libcurl
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: curl_easy_perform
  - id: curl-easy-perform-error-string
    desc: libcurl perform failure format string
    crit: component
    conf: 0.86
    if:
      type: text
      exact: "curl_easy_perform() failed: %s"
  - id: curl-easy-cleanup
    desc: Cleans up libcurl session
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: curl_easy_cleanup
  - id: curl-slist-append
    desc: Builds custom HTTP headers for
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: curl_slist_append
  - id: curl-slist-free
    desc: Frees libcurl header list
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: curl_slist_free_all
  - id: libcurl-version
    desc: libcurl version string
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: libcurl [0-9]+\.[0-9]+\.[0-9]+
composite_rules:
  - id: libcurl-http
    desc: Uses libcurl for HTTP communication
    crit: notable
    conf: 0.8
    all:
      - id: curl-easy-init
      - id: curl-easy-perform
  - id: libcurl-custom-headers
    desc: libcurl with custom HTTP headers
    crit: notable
    conf: 0.85
    all:
      - id: curl-easy-init
      - id: curl-slist-append
      - id: curl-easy-perform
  - id: libcurl-custom-headers-compact
    desc: Compact binary using libcurl with custom headers
    crit: notable
    conf: 0.8
    size_max: 500000
    all:
      - id: curl-easy-init
      - id: curl-slist-append
      - id: curl-easy-perform
