defaults:
  platforms: [unix, macos]
  for: [shell]

composite_rules:
  - id: download-and-open-file
    desc: Downloads a file with curl and opens it with the system file launcher
    crit: notable
    conf: 0.9
    scope: file
    near_bytes: 256
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/process/create/launch::open-file-command
