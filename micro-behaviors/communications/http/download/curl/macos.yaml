# libcurl imports on Mach-O (separate file so platform count stays under policy)
defaults:
  platforms: [macos]
  attack: T1071.001
  mbc: B0030
  for: [macho]

traits:
  - id: macos-curl-easy-init
    desc: Mach-O imports curl_easy_init
    crit: notable
    conf: 0.9
    if:
      type: import
      regex: curl_easy_init

  - id: macos-curl-easy-perform
    desc: Mach-O imports curl_easy_perform
    crit: notable
    conf: 0.9
    if:
      type: import
      regex: curl_easy_perform

  - id: macos-curl-mime-init
    desc: Mach-O imports curl_mime_init
    crit: notable
    conf: 0.92
    if:
      type: import
      regex: curl_mime_init

  - id: macos-curl-mime-addpart
    desc: Mach-O imports curl_mime_addpart
    crit: notable
    conf: 0.9
    if:
      type: import
      regex: curl_mime_addpart

  - id: macos-curl-mime-filename
    desc: Mach-O imports curl_mime_filename
    crit: notable
    conf: 0.9
    if:
      type: import
      regex: curl_mime_filename

composite_rules:
  - id: macos-libcurl-http
    desc: Mach-O uses libcurl HTTP
    crit: notable
    conf: 0.92
    all:
      - id: macos-curl-easy-init
      - id: macos-curl-easy-perform

  - id: macos-libcurl-mime-upload
    desc: Mach-O libcurl MIME multipart upload
    crit: notable
    conf: 0.95
    all:
      - id: macos-curl-easy-init
      - id: macos-curl-easy-perform
      - id: macos-curl-mime-init
      - id: macos-curl-mime-addpart
