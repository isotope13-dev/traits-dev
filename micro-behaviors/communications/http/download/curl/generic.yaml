defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  # Overlaps the canonical `curl-cmd` in ../curl/shell.yaml, which anchors on a
  # command-start boundary and also covers `curl.exe` and `-d`. Kept separate
  # only because six composites are calibrated against this looser form; the
  # two should be consolidated onto `curl-cmd` in a deliberate pass.
  - id: curl-invoked-with-url-or-option
    desc: curl invoked with URL or option
    crit: component
    conf: 0.3
    if:
      type: text
      regex: \bcurl(\s+http|\s+--|\s+-[A-CE-Za-ce-z])
    not:
      - substr: curl --help
      - exact: "curl http://npmjs.org/install.sh | sh"
  - id: curl-in-js-exec
    desc: JavaScript exec() invokes curl command
    crit: notable
    conf: 0.92
    for: [javascript]
    if:
      type: text
      regex: \bexec\s*\(\s*['"]curl\b
