defaults:
  platforms: [windows]
  for: [batch]
  attack: T1105

traits:
  - id: batch-curl-call
    desc: Batch invokes curl for network transfer
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?im)^[ \t]*(call[ \t]+)?curl(\.exe)?([ \t]|$)'

  - id: batch-curl-output-temp
    desc: Batch curl output targets TEMP
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?im)^[ \t]*(call[ \t]+)?curl(\.exe)?.{0,120}[ \t]-o[ \t]+["'']?%(TEMP|TMP)%'

  - id: batch-curl-http-url
    desc: Batch curl targets an HTTP URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?im)^[ \t]*(call[ \t]+)?curl(\.exe)?.{0,120}https?://'

composite_rules:
  - id: batch-curl-download-to-temp
    desc: Batch curl downloads an HTTP URL to TEMP
    crit: notable
    conf: 0.95
    near_lines: 1
    all:
      - id: batch-curl-call
      - id: batch-curl-output-temp
      - id: batch-curl-http-url
