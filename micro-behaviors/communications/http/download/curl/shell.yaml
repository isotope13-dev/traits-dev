defaults:
  platforms:
  - unix
  - windows
  for:
  - shell
  - macho
  attack: T1105
traits:
- id: curl-cmd
  desc: curl command
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    regex: '(?i)(^|[\s;&({])curl(\.exe)?\s+'
  unless:
  - type: text
    substr: CURLOPT
  - id: metadata/package/fields/freeform::pkg-description-content-type-markdown
  - type: basename
    regex: '(?i)\.(crt|cer|pem)$'
- id: rust-curl-wget-command
  desc: Rust invokes curl or wget
  crit: notable
  conf: 0.82
  for: [rust]
  if:
    type: text
    regex: 'Command::new\s*\(\s*"(curl|wget)"'
- id: curl-silent
  desc: curl silent flags
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: \bcurl\s+.*?(-[a-zA-Z]*[Sfs][a-zA-Z]*|--silent|--fail)\b
- id: curl-insecure
  desc: curl insecure flags
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: \bcurl(\.exe)?\s+.{0,60}\s(-[A-Za-z]*k[A-Za-z]*|--insecure)\b
  unless:
  - type: text
    substr: 127.0.0.1
- id: curl-output-file
  desc: curl download to file
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: \bcurl(\.exe)?\b[^\n]{0,120}\s(-[a-zA-Z]{0,5}[oO]|--output)\b
- id: subshell-curl
  desc: curl invoked inside command substitution
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \$\(curl
- id: curl-keyword
  desc: curl command keyword
  crit: component
  conf: 0.7
  if:
    type: text
    word: curl
- id: curl-zip-output
  desc: curl downloads ZIP archive to output path
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bcurl\b[^\n]{0,220}(-o|--output)\s*["'']?[^"''\n]{1,160}\.zip\b'
- id: curl-download-external-ip
  desc: Curl downloads payload from external IP
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bcurl\b.{0,120}https?://(\d{1,3}\.){3}\d{1,3}'
    is: external_ip
- id: curl-download-tmp-file
  desc: Curl downloads file into /tmp
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bcurl\b.{0,60}\s-o\s+/tmp/[A-Za-z0-9._-]+'
- id: curl-download-quiet-domain
  desc: Curl quiet download
  crit: notable
  conf: 0.85
  unless:
  - id: well-known/app/opencode-router
  - id: well-known/lib/bun-runtime::runtime-context
  not:
  - substr: curl -fsSL https://bun.com/install | bash
  if:
    type: text
    regex: '\bcurl\s+-[A-Za-z]*[fkLsS]{2,}[A-Za-z]*\s+https?://'
- id: curl-quiet-hash-path
  desc: Quiet curl fetches hash path
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '\bcurl\s+-[A-Za-z]*[fkLsS]{2,}[A-Za-z]*\s+https?://.{1,80}/[a-fA-F0-9]{32,64}\b'
- id: curl-workflow-update-path
  desc: Curl fetches workflow update path
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '\bcurl\b.{0,80}/(n8n|workflow|agent)/(update|helper)\b'
- id: curl-http-script
  desc: Curl downloads remote shell script
  crit: notable
  conf: 0.88
  platforms: [unix, android]
  for: [elf, shell, c, cpp]
  if:
    type: text
    regex: '\bcurl\s+https?://.{0,50}\.sh\b'
- id: curlopt-ref
  desc: CURLOPT constant
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: CURLOPT
- id: wget-cmd
  desc: wget URL download command
  crit: component
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    regex: '(?i)(^|[\s;&({])wget(\.exe)?\s+(-[A-Za-z0-9=./-]+\s+){0,6}https?://'
  unless:
  - id: metadata/package/fields/freeform::pkg-description-content-type-markdown
  not:
  - substr: apt.u.doover.com/install.sh
- id: wget-output-file
  desc: wget download to file
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: wget\s+(.{0,50}\s+)?(-O|--output-document)\b
  unless:
  - id: metadata/build/docker::buildkit-dockerfile-frontend
  - id: metadata/package/fields/freeform::pkg-description-content-type-markdown
  not:
  - substr: apt.u.doover.com/install.sh
- id: wget-path
  desc: wget binary path
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: /usr/bin/wget
- id: fetch-call
  desc: fetch function call
  crit: notable
  conf: 0.5
  if:
    type: symbol
    exact: fetch
- id: urllib-urlretrieve
  desc: urllib urlretrieve
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: urllib.request.urlretrieve
composite_rules:
- id: curl-dynamic-insecure
  desc: Insecure curl with dynamic URL construction
  crit: notable
  conf: 0.9
  all:
  - id: curl-insecure
  - id: micro-behaviors/process/create/shell/invoke::command-substitution
- id: curl
  desc: Download via curl
  crit: notable
  conf: 0.66
  any:
  - id: curl-cmd
  - id: micro-behaviors/dylib/library/family::libcurl-ref
  - id: curlopt-ref
- id: wget-comp
  desc: Download via wget
  crit: notable
  conf: 0.66
  any:
  - id: wget-cmd
  - id: wget-path
- id: fetch
  desc: Download via fetch
  crit: notable
  conf: 0.66
  any:
  - id: fetch-call
  - id: urllib-urlretrieve
