defaults:
  platforms:
  - unix
  - windows
  for:
  - shell
  - macho
  attack: T1105
traits:
- id: curl-cmd
  desc: curl command includes URL or option
  crit: baseline
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    regex: '(?i)(^|[\s;&({])curl(\.exe)?\s+(https?://|--?[\w-]+)'
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/app/k9x-satan::attack-fixture-context
  - id: metadata/lang/source::openapi-generator-source-banner
  - type: text
    substr: CURLOPT
  - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
  - type: basename
    regex: '(?i)\.(crt|cer|pem)$'
  - id: well-known/tool/development/fzf::fzf-binary
- id: curl-silent
  desc: curl command uses silent or fail flags
  crit: notable
  conf: 0.8
  for: [shell, powershell, batch, pe]
  if:
    type: text
    regex: \bcurl(\.exe)?(\s+[^-\s][^\s]{0,120}){0,6}\s+(-[a-zA-Z]*[Sfs][a-zA-Z]*|--silent|--fail)\b
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: curl-silent-http-command
  desc: curl HTTP request uses silent mode
  crit: notable
  conf: 0.85
  for: [elf, shell, c, cpp]
  if:
    type: text
    regex: '\bcurl(\.exe)?\s+-[A-Za-z]*s[A-Za-z]*\s+https?://'
- id: curl-insecure
  desc: curl insecure flags
  crit: notable
  conf: 0.8
  for: [shell, powershell, batch, pe]
  if:
    type: text
    regex: '(?i)\bcurl(\.exe)?[^\r\n]{0,80}\s(-[A-Za-z]*k[A-Za-z]*|--insecure)\b'
  unless:
  - type: text
    substr: 127.0.0.1
- id: curl-output-file
  desc: curl command specifies an output path
  crit: notable
  conf: 0.7
  for: [shell, powershell, batch, pe, macho]
  if:
    type: text
    regex: \bcurl(\.exe)?\b[^\n]{0,120}\s(-[a-zA-Z]{0,5}[oO]|--output)\b
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: curl-output-staging-path
  desc: curl writes to a non-null output path
  crit: notable
  conf: 0.82
  for: [shell, powershell, batch, pe]
  if:
    type: text
    regex: '\bcurl\b[^\n]{0,96}\s(-\w*[oO]|--output)\s*["'']?([\w$.~])'
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: curl-output-redirect
  desc: curl output redirected to file
  crit: notable
  conf: 0.8
  for: [shell]
  if:
    type: text
    # Require curl in command position so package names such as `php-curl`
    # followed by a line-level redirect do not masquerade as curl output.
    regex: '(?m)(^|[;&|()][ \t]*)(sudo[ \t]+)?curl(\.exe)?\b[^\n]{0,200}\s>{1,2}\s*[^&\s]'
- id: subshell-curl
  desc: curl invoked inside command substitution
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \$\(curl
- id: curl-keyword
  desc: curl command keyword
  crit: component
  conf: 0.7
  if:
    type: text
    word: curl
- id: curl-zip-output
  desc: curl downloads ZIP archive to output path
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bcurl\b[^\n]{0,220}(-o|--output)\s*["'']?[^"''\n]{1,160}\.zip\b'
- id: curl-download-tmp-file
  desc: Curl downloads file into /tmp
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bcurl\b.{0,60}\s-o\s+/tmp/[A-Za-z0-9._-]+'
- id: curl-hidden-tmp-output-file
  desc: Curl writes a hidden temporary output file
  crit: notable
  conf: 0.95
  for: [vbs, applescript, html, xml]
  if:
    type: text
    regex: '\bcurl\b[^\n;&|]{0,160}-[A-Za-z]*o\s+/tmp/\.[A-Za-z0-9_.-]+'
- id: curl-quiet-http-request
  desc: curl HTTP request uses quiet/fail flags
  crit: notable
  conf: 0.85
  for: [shell, macho, applescript, groovy, pyproject.toml, composer.json]
  unless:
  - id: well-known/app/opencode-router
  - id: well-known/lib/bun-runtime/
  not:
  - substr: curl -fsSL https://bun.com/install | bash
  if:
    type: text
    regex: '\bcurl\s+-[A-Za-z]*[fkLsS]{2,}[A-Za-z]*\s+https?://'
- id: curl-quiet-hash-path
  desc: Quiet curl fetches hash path
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '\bcurl\s+-[A-Za-z]*[fkLsS]{2,}[A-Za-z]*\s+https?://.{1,80}/[a-fA-F0-9]{32,64}\b'
- id: curl-workflow-update-path
  desc: Curl fetches workflow update path
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '\bcurl\b.{0,80}/(n8n|workflow|agent)/(update|helper)\b'
- id: curl-http-script
  desc: Curl downloads remote shell script
  crit: notable
  conf: 0.88
  platforms: [unix, android]
  for: [elf, shell, c, cpp]
  if:
    type: text
    regex: '\bcurl\s+https?://.{0,50}\.sh\b'
- id: curlopt-ref
  desc: CURLOPT constant
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: CURLOPT
- id: wget-cmd
  desc: wget URL download command
  crit: component
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    regex: '(?i)(^|[\s;&({])wget(\.exe)?\s+(-[A-Za-z0-9=./-]+\s+){0,6}https?://'
  unless:
  - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
  not:
  - substr: apt.u.doover.com/install.sh
- id: wget-output-file
  desc: Downloads a file with wget
  crit: notable
  conf: 0.7
  if:
    type: text
    # Do not classify a shell prompt/example inside a warning or heredoc as a
    # downloader invocation.
    regex: '(?m)(^|[;&|]\s*)\$?\s*wget\s+(.{0,50}\s+)?(-O|--output-document)\b'
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: metadata/build/docker::buildkit-dockerfile-frontend
  - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
  not:
  - substr: apt.u.doover.com/install.sh
- id: wget-path
  desc: wget binary path
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: /usr/bin/wget
- id: fetch-call
  desc: fetch function call
  crit: notable
  conf: 0.5
  if:
    type: symbol
    exact: fetch
- id: urllib-urlretrieve
  desc: urllib urlretrieve
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: urllib.request.urlretrieve
composite_rules:
- id: curl-dynamic-insecure
  desc: Insecure curl with dynamic URL construction
  crit: notable
  conf: 0.9
  all:
  - id: curl-insecure
  - id: micro-behaviors/process/create/shell/spawn::command-substitution
- id: curl
  desc: Download via curl
  crit: notable
  conf: 0.66
  any:
  - id: curl-cmd
  - id: micro-behaviors/dylib/library/family::libcurl-ref
  - id: curlopt-ref
- id: wget-comp
  desc: Download via wget
  crit: notable
  conf: 0.66
  any:
  - id: wget-cmd
  - id: wget-path
- id: fetch
  desc: Download via fetch
  crit: notable
  conf: 0.66
  any:
  - id: fetch-call
  - id: urllib-urlretrieve
