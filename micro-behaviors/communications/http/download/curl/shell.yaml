defaults:
  platforms:
  - unix
  - windows
  for:
  - shell
  - macho
  attack: T1105
traits:
- id: curl-cmd
  desc: curl command
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: curl
  unless:
  - type: text
    substr: CURLOPT
- id: curl-silent
  desc: curl silent flags
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: \bcurl\s+.*?(-[a-zA-Z]*[Sfs][a-zA-Z]*|--silent|--fail)\b
- id: curl-insecure
  desc: curl insecure flags
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: \bcurl(\.exe)?\s+.{0,60}\s(-[A-Za-z]*k[A-Za-z]*|--insecure)\b
  unless:
  - type: text
    substr: 127.0.0.1
- id: curl-output-file
  desc: curl download to file
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: \bcurl(\.exe)?\b[^\n]{0,120}\s(-[a-zA-Z]{0,5}[oO]|--output)\b
- id: curl-zip-output
  desc: curl downloads ZIP archive to output path
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bcurl\b[^\n]{0,220}(-o|--output)\s*["'']?[^"''\n]{1,160}\.zip\b'
- id: curlopt-ref
  desc: CURLOPT constant
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: CURLOPT
- id: wget-cmd
  desc: wget command
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: wget
- id: wget-output-file
  desc: wget download to file
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: wget\s+(.{0,50}\s+)?(-O|--output-document)\b
  unless:
  - type: text
    substr: '"comment":"buildkit.dockerfile.v0"'
- id: wget-path
  desc: wget binary path
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: /usr/bin/wget
- id: fetch-call
  desc: fetch function call
  crit: notable
  conf: 0.5
  if:
    type: symbol
    exact: fetch
- id: urllib-urlretrieve
  desc: urllib urlretrieve
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: urllib.request.urlretrieve
composite_rules:
- id: curl-dynamic-insecure
  desc: Insecure curl with dynamic URL construction
  crit: notable
  conf: 0.9
  all:
  - id: curl-insecure
  - id: micro-behaviors/process/create/shell::command-substitution
- id: curl
  desc: Download via curl
  crit: notable
  conf: 0.66
  any:
  - id: curl-cmd
  - id: micro-behaviors/dylib/library::libcurl-ref
  - id: curlopt-ref
- id: wget-comp
  desc: Download via wget
  crit: notable
  conf: 0.66
  any:
  - id: wget-cmd
  - id: wget-path
- id: fetch
  desc: Download via fetch
  crit: notable
  conf: 0.66
  any:
  - id: fetch-call
  - id: urllib-urlretrieve
