# Shell command-line HTTP download/request shapes.
defaults:
  platforms: [unix, windows]
  for: [shell]
  attack: T1071.001

traits:
  - id: curl-variable-path-segment
    desc: curl request with variable URL path segment
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcurl\b[^\n]{0,160}\$[A-Za-z_][A-Za-z0-9_]*[/-]\$[A-Za-z_][A-Za-z0-9_]*'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
