# Download Tool CLI Flags
# Neutral command-line flags for curl and wget
defaults:
  platforms: [unix]
  for: [shell, python, ruby, perl, javascript, typescript]
  crit: baseline
traits:
  - id: fetch-output-flag-script
    desc: Script sets curl or wget output file
    crit: notable
    conf: 0.85
    platforms: [linux, macos, windows]
    for: [shell, python, ruby, perl, javascript, typescript, applescript, vbs]
    if:
      type: text
      regex: '\b(curl|wget)(\.exe)?\b[^\n]{0,240}(-[A-Za-z]*[oO]|--output)[ \t]+[^ \t\n]{1,200}'
    not:
      - regex: '(-[A-Za-z]*[oO]|--output)[ \t]+/dev/null\b'
      - regex: '(-[A-Za-z]*[oO]|--output)[ \t]+os\.devnull\b'
  - id: fetch-output-flag-build-file
    desc: curl/wget output file option in build file
    crit: notable
    conf: 0.84
    platforms: [linux, macos, windows]
    for: [pyproject.toml, package-lock.json, groovy, plist, composer.json, github-actions, dockerfile, package.json]
    if:
      type: text
      regex: '\b(curl|wget)(\.exe)?\b[^\n]{0,240}(-[A-Za-z]*[oO]|--output)[ \t]+[^ \t\n]{1,200}'
    not:
      - regex: '(-[A-Za-z]*[oO]|--output)[ \t]+/dev/null\b'
      - regex: '(-[A-Za-z]*[oO]|--output)[ \t]+os\.devnull\b'
  - id: curl-s-flag
    desc: curl silent flag (-s)
    conf: 0.6
    if:
      type: text
      regex: 'curl\s+-[a-zA-Z]*s[a-zA-Z]*\b'
  - id: wget-q-flag
    desc: wget quiet flag (-q)
    conf: 0.6
    if:
      type: text
      regex: 'wget\s+-[a-zA-Z]*q[a-zA-Z]*\b'
  - id: wget-stdout-flag
    desc: wget stdout output flag (-O -)
    conf: 0.6
    if:
      type: text
      regex: 'wget\s+[^\n]{0,40}-O\s+-'
  - id: android-tmp-output-download
    desc: Android downloads payload to temp directory
    crit: notable
    conf: 0.9
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      regex: '-O\s+/data/local/tmp/[A-Za-z0-9._-]+'
composite_rules:
  - id: fetch-output-flag
    desc: curl/wget output file option
    crit: notable
    conf: 0.85
    any:
      - id: fetch-output-flag-script
      - id: fetch-output-flag-build-file
