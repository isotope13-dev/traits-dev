defaults:
  platforms: [windows]
  for: [powershell, batch, pe, csharp]
  attack: T1105
  mbc: E1105
traits:
  - id: iwr-outfile-download
    desc: PowerShell downloads output file
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)(Invoke-WebRequest|iwr)[^\r\n]{0,160}-(OutFile|o)\b'
  - id: iwr-exe-url
    desc: PowerShell iwr downloads a URL EXE
    crit: notable
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: '(?im)(^|["'';&|][ \t]*)iwr\b.{0,100}https?://.{0,120}\.exe\b'
