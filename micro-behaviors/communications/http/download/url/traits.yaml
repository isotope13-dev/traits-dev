defaults:
  platforms: [unix, windows]
  for: [scripts]

traits:
  - id: executable-url-reference-a
    desc: HTTP URL ending in executable extension
    crit: notable
    conf: 0.88
    if:
      type: string_literal
      regex: 'https?://[^\s''"]{1,160}\.(exe|scr|msi|bat)([?#][^\s''"]{0,120})?$'
  - id: executable-url-reference-b
    desc: HTTP URL ending in executable extension
    crit: notable
    conf: 0.88
    if:
      type: string_literal
      regex: 'https?://[^\s''"]{1,160}\.(cmd|ps1|dll)([?#][^\s''"]{0,120})?$'

  - id: archive-url-reference-a
    desc: References an HTTP(S) archive URL
    crit: notable
    conf: 0.88
    if:
      type: string_literal
      regex: 'https?://[^\s''"]{1,160}\.(zip|7z)([?#][^\s''"]{0,120})?$'

  - id: archive-url-reference-b
    desc: References an HTTP(S) archive URL
    crit: notable
    conf: 0.88
    if:
      type: string_literal
      regex: 'https?://[^\s''"]{1,160}\.(rar|tar|gz)([?#][^\s''"]{0,120})?$'

  # GitHub's public source-archive endpoints (/archive/, /tarball/, /zipball/,
  # codeload) serve a repository's own source, not attacker-staged payloads — the
  # canonical "fetch an action/tool's source" pattern used by CI action wrappers
  # and installers. Deliberately NOT github /releases/, which can host arbitrary
  # payload assets. Used as a benign-context gate on dropper/staging composites.
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: github-repo-source-archive-url
    desc: github.com repository source-archive URL
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: 'github\.com/[^/\s''"]{1,80}/[^/\s''"]{1,80}/(archive|tarball|zipball)/'
  - id: github-codeload-source-url
    desc: codeload.github.com source-archive URL
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: 'codeload\.github\.com/'

composite_rules:
  - id: executable-url-reference
    desc: HTTP URL ending in executable extension
    crit: notable
    conf: 0.88
    any:
      - id: executable-url-reference-a
      - id: executable-url-reference-b

  - id: archive-url-reference
    desc: References an HTTP(S) archive URL
    crit: notable
    conf: 0.88
    any:
      - id: archive-url-reference-a
      - id: archive-url-reference-b

  - id: github-source-archive-url
    desc: Downloads a GitHub repository source archive
    crit: baseline
    conf: 0.9
    any:
      - id: github-repo-source-archive-url
      - id: github-codeload-source-url
