defaults:
  platforms: [unix, windows]
  for: [scripts]

traits:
  - id: executable-url-reference-a
    desc: HTTP URL ending in executable extension
    crit: notable
    conf: 0.88
    if:
      type: string_literal
      regex: 'https?://[^\s''"]{1,160}\.(exe|scr|msi|bat)([?#][^\s''"]{0,120})?$'
  - id: executable-url-reference-b
    desc: HTTP URL ending in executable extension
    crit: notable
    conf: 0.88
    if:
      type: string_literal
      regex: 'https?://[^\s''"]{1,160}\.(cmd|ps1|dll)([?#][^\s''"]{0,120})?$'

composite_rules:
  - id: executable-url-reference
    desc: HTTP URL ending in executable extension
    crit: notable
    conf: 0.88
    any:
      - id: executable-url-reference-a
      - id: executable-url-reference-b
