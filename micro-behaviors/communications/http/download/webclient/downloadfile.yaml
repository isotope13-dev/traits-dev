defaults:
  for:
    - documents
  crit: notable
  conf: 0.8
  platforms:
    - windows
traits:
  - id: webclient-downloadfile
    desc: Obfuscated System.Net.WebClient download call
    for:
      - batch
      - powershell
      - javascript
      - vbs
    if:
      type: text
      regex: (?i)w\^?e\^?b\^?c\^?l.{0,40}d\^?o\^?w\^?n\^?l\^?o\^?a\^?d
  - id: webclient-downloadfile-tokenized
    desc: Tokenized WebClient DownloadFile sequence
    crit: suspicious
    conf: 0.88
    for:
      - javascript
      - vbs
    if:
      type: text
      regex: (?is)sv3qs9Wibn4e8b.{0,120}oWnlOna2u2.{0,80}FIl8y7ll
  # Matches a clean (non-^-obfuscated) .NET/PowerShell `WebClient.DownloadFile`
  # call. This is a neutral HTTP file-download capability and also the canonical
  # documented way to fetch installers on Windows (e.g. rustup-init, get-pip).
  # The macro-dropper intent comes from the VBA/Office composites that reference
  # this atom (office-vba-powershell, execution/trigger/document/vba), not from
  # the download call alone — so it stays notable here.
  - id: webclient-downloadfile-call
    desc: "WebClient.DownloadFile call"
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?is)(net.?we.?b.?client|we.?client).{0,180}(down.?load.?file|d.?wnl.?ad.?ile)
composite_rules: []
