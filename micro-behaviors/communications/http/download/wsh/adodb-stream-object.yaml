defaults:
  platforms: [windows]
traits:
  - id: adodb-stream-object
    desc: Creates an ADODB.Stream COM object
    crit: notable
    conf: 0.9
    size_max: 300000
    for:
      - javascript
      - vbs
    if:
      type: text
      regex: (?i)(ActiveXObject|CreateObject)\s*\(\s*["']ADODB\.Stream["']\s*\)
    unless:
      - type: text
        substr: "namespace TypeScript.WebTsc"
    attack: T1106
