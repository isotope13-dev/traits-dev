defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: adodb-stream-object
    desc: "Creates ADODB.Stream object via ActiveXObject"
    crit: suspicious
    conf: 0.9
    for: [javascript, vbs]
    if:
      type: string_value
      regex: '(?i)ActiveXObject\s*\(\s*["'']ADODB\.Stream["'']\s*\)'
    attack: "T1106" # Native API
