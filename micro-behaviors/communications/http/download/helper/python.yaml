defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  mbc: C0002

traits:
  - id: download-file-method-call
    desc: Calls file download method
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)download_file$'
  - id: safe-download-import
    desc: safe_download function import
    conf: 0.7
    if:
      type: text
      substr: import safe_download
