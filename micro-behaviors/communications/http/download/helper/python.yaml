defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  mbc: C0002

traits:
  - id: download-file-method-call
    desc: Calls file download method
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)download_file$'
  - id: safe-download-import
    desc: safe_download function import
    conf: 0.7
    if:
      type: text
      substr: import safe_download
  - id: python-string-powershell-webrequest
    desc: Python string contains PowerShell web request
    conf: 0.9
    if:
      type: literal
      kind: string
      regex: '(?i)\b(powershell(\.exe)?\b.{0,80})?(Invoke-WebRequest|iwr)\b\s+(-|https?://)'
  - id: python-string-powershell-download-cradle
    desc: PowerShell download cradle in Python string
    conf: 0.9
    if:
      type: string_literal
      regex: '(?is)(?=.*(Invoke-WebRequest|iwr|Start-BitsTransfer))(?=.*\$env:)'
