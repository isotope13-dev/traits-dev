defaults:
  for:
    - shell
  platforms:
    - linux
  attack: T1105
traits:
  - id: wget
    desc: BusyBox wget payload download
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: busybox wget
  - id: tftp
    desc: BusyBox tftp payload download
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: busybox tftp
  - id: ftpget
    desc: BusyBox ftpget payload download
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: busybox ftpget
