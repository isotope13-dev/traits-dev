defaults:
  for:
    - shell
  platforms:
    - linux
  attack: T1105
traits:
  - id: wget
    desc: BusyBox wget applet invocation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bbusybox\s+wget\b'
  - id: busybox-wget-http-script
    desc: BusyBox wget downloads shell script
    crit: notable
    conf: 0.9
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      regex: '\bbusybox wget\s+https?://.{0,50}\.sh\b'
  - id: busybox-wget-http-reference
    desc: BusyBox wget HTTP download reference
    crit: notable
    conf: 0.9
    for: [elf, shell, c, cpp]
    platforms: [unix, android]
    if:
      type: text
      regex: '\bbusybox\s+wget\s+https?://'
