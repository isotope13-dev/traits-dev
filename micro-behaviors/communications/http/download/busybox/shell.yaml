defaults:
  for:
    - shell
  platforms:
    - linux
  attack: T1105
traits:
  - id: wget
    desc: BusyBox wget payload download
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: busybox wget
  - id: tftp
    desc: BusyBox tftp payload download
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: busybox tftp
  - id: ftpget
    desc: BusyBox ftpget payload download
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: busybox ftpget
  - id: busybox-wget-http-script
    desc: BusyBox wget downloads shell script
    crit: notable
    conf: 0.9
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      regex: '\bbusybox wget\s+https?://.{0,50}\.sh\b'
