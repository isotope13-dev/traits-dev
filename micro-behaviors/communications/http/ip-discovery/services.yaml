defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, source]
  crit: component
  conf: 0.85
traits:
  - id: api-myip-com
    desc: api.myip.com IP discovery API
    if:
      type: text
      substr: api.myip.com
  - id: ipify-api
    desc: ipify.org IP discovery API
    if:
      type: text
      substr: api.ipify.org
  - id: icanhazip
    desc: icanhazip.com IP discovery
    if:
      type: text
      substr: icanhazip.com
  - id: wtfismyip
    desc: wtfismyip.com IP discovery
    if:
      type: text
      substr: wtfismyip.com
  - id: checkip-dyndns
    desc: DynDNS checkip service
    if:
      type: text
      substr: checkip.dyndns.org
  - id: checkip-aws
    desc: AWS checkip service
    if:
      type: text
      substr: checkip.amazonaws.com
  - id: ip-sb-geoip
    desc: IP.SB geoip API
    if:
      type: text
      substr: api.ip.sb
  - id: whatismyipaddress
    desc: whatismyipaddress.com bot API
    if:
      type: text
      substr: whatismyipaddress.com
  - id: ipinfo-io
    desc: ipinfo.io IP information API
    if:
      type: text
      substr: ipinfo.io
  - id: ip-api-com
    desc: ip-api.com geolocation service
    if:
      type: text
      substr: ip-api.com
  - id: ipwho-is
    desc: ipwho.is geolocation service
    if:
      type: text
      substr: ipwho.is
  - id: ipapi-co
    desc: ipapi.co geolocation service
    if:
      type: text
      substr: ipapi.co
  - id: geoplugin-net
    desc: geoplugin.net geolocation service
    if:
      type: text
      substr: geoplugin.net
  - id: myexternalip
    desc: myexternalip.com service
    if:
      type: text
      substr: myexternalip.com
  - id: ifconfig-me
    desc: ifconfig.me IP discovery
    if:
      type: text
      substr: ifconfig.me
  - id: ipecho
    desc: ipecho.net IP discovery
    if:
      type: text
      substr: ipecho.net
  - id: myip-dnsomatic
    desc: DNSomatic myip service
    if:
      type: text
      substr: myip.dnsomatic.com
composite_rules:
  - id: multi-ip-discovery
    desc: Multiple IP discovery services (stealer behavior)
    crit: suspicious
    conf: 0.9
    mbc: C0004
    attack: T1016
    needs: 3
    any:
      - id: micro-behaviors/communications/http/ip-discovery
    unless:
      - id: well-known/tool/offensive/projectdiscovery::nuclei-engine
