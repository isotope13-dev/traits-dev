defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, source, package.json]
  crit: notable
  conf: 0.85
traits:
  - id: api-myip-com
    desc: api.myip.com IP discovery API
    if:
      type: text
      substr: api.myip.com
  - id: ipify-api
    desc: ipify.org IP discovery API
    if:
      type: text
      substr: api.ipify.org
  - id: icanhazip
    desc: icanhazip.com IP discovery
    if:
      type: text
      substr: icanhazip.com
  - id: wtfismyip
    desc: wtfismyip.com IP discovery
    if:
      type: text
      substr: wtfismyip.com
  - id: checkip-dyndns
    desc: DynDNS checkip service
    if:
      type: text
      substr: checkip.dyndns.org
  - id: checkip-aws
    desc: AWS checkip service
    if:
      type: text
      substr: checkip.amazonaws.com
  - id: ip-sb-geoip
    desc: IP.SB geoip API
    if:
      type: text
      substr: api.ip.sb
  - id: whatismyipaddress
    desc: whatismyipaddress.com bot API
    if:
      type: text
      substr: whatismyipaddress.com
  - id: ipinfo-io
    desc: ipinfo.io IP information API
    if:
      type: text
      substr: ipinfo.io
  - id: maxmind-locate-my-ip
    desc: MaxMind locate-my-ip discovery page
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: maxmind.com/en/locate-my-ip-address
  - id: ip-api-com
    desc: ip-api.com geolocation service
    if:
      type: text
      substr: ip-api.com
  - id: ipwho-is
    desc: ipwho.is geolocation service
    if:
      type: text
      substr: ipwho.is
  - id: ipapi-co
    desc: References the ipapi.co IP geolocation service
    if:
      type: text
      substr: ipapi.co
  - id: ipapi-is
    desc: References the ipapi.is IP geolocation service
    if:
      type: text
      substr: api.ipapi.is
  - id: geoplugin-net
    desc: geoplugin.net geolocation service
    if:
      type: text
      substr: geoplugin.net
  - id: myexternalip
    desc: myexternalip.com service
    if:
      type: text
      substr: myexternalip.com
  - id: ifconfig-me
    desc: ifconfig.me IP discovery
    if:
      type: text
      substr: ifconfig.me
  - id: ipecho
    desc: ipecho.net IP discovery
    if:
      type: text
      substr: ipecho.net
  - id: myip-dnsomatic
    desc: DNSomatic myip service
    if:
      type: text
      substr: myip.dnsomatic.com
composite_rules:
  - id: multi-ip-discovery
    desc: Multiple public IP discovery services
    crit: notable
    conf: 0.9
    mbc: C0004
    attack: T1016
    needs: 3
    any:
      - id: micro-behaviors/communications/http/ip-discovery::api-myip-com
      - id: micro-behaviors/communications/http/ip-discovery::checkip-aws
      - id: micro-behaviors/communications/http/ip-discovery::checkip-dyndns
      - id: micro-behaviors/communications/http/ip-discovery::geoplugin-net
      - id: micro-behaviors/communications/http/ip-discovery::icanhazip
      - id: micro-behaviors/communications/http/ip-discovery::ifconfig-me
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: micro-behaviors/communications/http/ip-discovery::ip-sb-geoip
      - id: micro-behaviors/communications/http/ip-discovery::ipapi-co
      - id: micro-behaviors/communications/http/ip-discovery::ipecho
      - id: micro-behaviors/communications/http/ip-discovery::ipify-api
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
      - id: micro-behaviors/communications/http/ip-discovery::ipwho-is
      - id: micro-behaviors/communications/http/ip-discovery::maxmind-locate-my-ip
      - id: micro-behaviors/communications/http/ip-discovery::myexternalip
      - id: micro-behaviors/communications/http/ip-discovery::myip-dnsomatic
      - id: micro-behaviors/communications/http/ip-discovery::whatismyipaddress
      - id: micro-behaviors/communications/http/ip-discovery::wtfismyip
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
