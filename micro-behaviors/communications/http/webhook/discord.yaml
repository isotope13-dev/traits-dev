defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: discord-webhook-configuration
    desc: Discord webhook configuration text
    crit: notable
    conf: 0.9
    for: [scripts]
    if:
      type: text
      regex: '(?i)\bdiscord\s+webhooks?\b|\bwebhooks?\s+to\s+discord\b'
  - id: discord-webhook-path
    desc: Discord webhook API path
    crit: notable
    conf: 0.9
    if:
      type: literal
      regex: discord(app)?\.com/api/webhooks/\d{10,}
    unless:
      - id: metadata/package/testing/
      - id: well-known/app/remotepower::documented-rmm-release-context
      # A feedback form sends user-entered report fields to its configured
      # webhook; that is an application transport, not credential theft.
      - type: text
        regex: '(?i)(submit|send)[-_ ]feedback.{0,700}(title|subject).{0,700}(body|message)'
  - id: discord-webhook-path-split
    desc: Discord webhook API path literal
    crit: notable
    conf: 0.92
    if:
      type: literal
      regex: '["'']?/api/webhooks/\d{10,}/[A-Za-z0-9_-]{50,}'
    unless:
      - id: metadata/package/testing/
      - id: well-known/app/remotepower::documented-rmm-release-context
      - type: text
        regex: '(?i)(submit|send)[-_ ]feedback.{0,700}(title|subject).{0,700}(body|message)'
  - id: webhook-name-check
    desc: Discord webhook name check (activation check)
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \.name\s*(!==|===)\s*['"]true['"]
  - id: discord-webhook-client-hardcoded
    desc: 'discord webhook client hardcoded'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: WebhookClient\(['"]\d{18,20}['"],\s*['"][\w-]{60,80}['"]\)
composite_rules:
  - id: discord-webhook-path-any
    desc: Discord webhook API path detected
    crit: notable
    conf: 0.9
    any:
      - id: discord-webhook-path
      - id: discord-webhook-path-split
