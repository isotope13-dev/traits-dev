defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: discord-webhook-path
    desc: Discord webhook API path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: discord(app)?\.com/api/webhooks/\d{10,}
    unless:
      - id: metadata/package::has-tests
  - id: webhook-name-check
    desc: Discord webhook name check (activation check)
    crit: notable
    conf: 0.5
    if:
      type: raw
      regex: \.name\s*(!==|===)\s*['"]true['"]
  - id: discord-webhook-path-raw
    desc: Discord webhook API path in bytecode
    crit: notable
    conf: 0.92
    for: [class, jar, zip]
    if:
      type: raw
      regex: 'discord(app)?\.com/api/webhooks/\d{10,}'
  - id: discord-webhook-client-hardcoded
    desc: WebhookClient instantiation with hardcoded ID/Token
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: new [\w.]*WebhookClient\(['"]\d{18,20}['"],\s*['"][\w-]{60,80}['"]\)
composite_rules:
  - id: discord-webhook-path-any
    desc: Discord webhook API path detected
    crit: notable
    conf: 0.9
    any:
      - id: discord-webhook-path
      - id: discord-webhook-path-raw
