# Discord Webhook Communications
# Capabilities related to Discord webhooks
defaults:
  for: [all]
traits:
  - id: discord-webhook-path
    desc: Discord webhook API path
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: 'discord(?:app)?\.com/api/webhooks/'
  - id: webhook-name-check
    desc: Discord webhook name check (activation check)
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: '\.name\s*(!==|===)\s*[''"]true[''"]'
  - id: discord-webhook-client-hardcoded
    desc: WebhookClient instantiation with hardcoded ID/Token
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'new [\w.]*WebhookClient\([''"]\d{18,20}[''"],\s*[''"][\w-]{60,80}[''"]\)'
