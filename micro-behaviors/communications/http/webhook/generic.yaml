defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: run-webhook-url
    desc: GitHub Actions run contains a webhook URL
    crit: notable
    conf: 0.88
    for: [github-actions]
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: '(?i)https?://[^ \t"\n]*webhook[^ \t"\n]*'
  - id: wbhk-studio-webhook
    desc: wbhk studio webhook endpoint
    crit: suspicious
    conf: 0.97
    if:
      type: string_literal
      regex: https?://hook\.wbhk\.studio/webhook/[0-9a-f-]{36}|hook\.wbhk\.studio/webhook/
  - id: fixed-webhook-endpoints-array
    desc: Fixed webhook endpoint array
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: FIXED_LOG_ENDPOINTS

  - id: curl-post-webhook-command
    desc: Curl command posts to webhook endpoint
    crit: notable
    conf: 0.85
    for: [shell, python, javascript, typescript, powershell]
    if:
      type: literal
      regex: 'curl.{0,50}-X POST.{0,50}webhook|webhook.{0,50}curl.{0,50}POST'

composite_rules:
  - id: python-webhook-post
    desc: Python posts data to a webhook
    crit: notable
    conf: 0.88
    for: [python]
    mbc: C0002
    near_bytes: 4096
    all:
      - id: micro-behaviors/communications/http/keywords::webhook-service-word
      - id: micro-behaviors/communications/http/request/client::py-post-generic
