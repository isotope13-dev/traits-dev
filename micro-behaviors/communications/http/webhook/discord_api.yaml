defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
traits:
  - id: discord-webhook-api
    desc: Discord webhook API endpoint
    crit: suspicious
    if:
      type: string_value
      regex: /discord(app)?.com\/api\/webhooks/
    for:
      - javascript
      - typescript
      - python
      - shell
    unless:
      - id: metadata/package::has-tests
