defaults:
  platforms:
    - unix
    - android
    - ios
traits:
  - id: discord-webhook-api
    desc: Discord webhook API endpoint
    crit: notable
    if:
      type: string_literal
      regex: /discord(app)?\.com\/api\/webhooks\/\d{10,}/
    for: [scripts, binaries]
    unless:
      - id: metadata/package/testing/
      - id: well-known/app/remotepower::documented-rmm-release-context
      - type: text
        regex: '(?i)(submit|send)[-_ ]feedback.{0,700}(title|subject).{0,700}(body|message)'
