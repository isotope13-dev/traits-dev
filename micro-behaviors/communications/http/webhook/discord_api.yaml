defaults:
  platforms:
    - unix
    - android
    - ios
traits:
  - id: discord-webhook-api
    desc: Discord webhook API endpoint
    crit: suspicious
    if:
      type: string_literal
      regex: /discord(app)?\.com\/api\/webhooks\/\d{10,}/
    for: [scripts, binaries]
    unless:
      - id: metadata/package/quality/profile::has-tests
