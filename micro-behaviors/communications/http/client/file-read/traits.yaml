# PHP HTTP Client Traits
defaults:
  platforms: [unix, windows]
  for: [php]
traits:
  - id: file-get-contents-url
    desc: HTTP request via file_get_contents
    crit: notable
    conf: 0.8
    # `file_get_contents("http(s)://…")`. PHP string-arg values aren't cached
    # facts, so this matches the source text directly — specific enough
    # (the function name plus an inline URL) to stay FP-safe.
    if:
      type: text
      regex: 'file_get_contents\s*\([^)]{0,200}https?://'
  - id: file-get-contents-url-interpolation
    desc: HTTP request with interpolated URL
    crit: notable
    conf: 0.9
    # `file_get_contents("https://…$var…")` — a URL string built with a `$`
    # interpolation (the captured arg value preserves the `$`). Matched on the
    # cached call fact plus an arg-value filter, no live query.
    if:
      type: symbol
      kind: call
      exact: file_get_contents
      arg:
        kind: string
        regex: 'https?://.*\$'
