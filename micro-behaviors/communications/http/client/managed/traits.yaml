defaults:
  crit: notable
  conf: 0.8
  for:
  - pe
  - dll
  - csharp
  - powershell
  platforms:
  - windows
traits:
- id: httpclient
  desc: System.Net.Http.HttpClient type reference
  conf: 0.82
  if:
    type: text
    regex: '(System\.Net\.Http\.)?HttpClient\b'
  unless:
  - id: well-known/game/mod::bedrockboot-source-repository
- id: multipart-form-data-content
  desc: .NET multipart form-data content type reference
  conf: 0.9
  if:
    type: text
    exact: MultipartFormDataContent
- id: getbytearrayasync
  desc: HttpClient byte-array download method
  conf: 0.86
  if:
    type: text
    word: GetByteArrayAsync
  unless:
  - id: well-known/game/mod::bedrockboot-source-repository
- id: getasync
  desc: HttpClient asynchronous HTTP response retrieval
  crit: notable
  conf: 0.86
  attack: T1105
  if:
    type: text
    word: GetAsync
  unless:
  - id: well-known/game/mod::bedrockboot-source-repository
- id: readasbytearrayasync
  desc: HttpClient reads an HTTP response as bytes
  crit: notable
  conf: 0.88
  attack: T1105
  if:
    type: text
    word: ReadAsByteArrayAsync
  unless:
  - id: well-known/game/mod::bedrockboot-source-repository
- id: server-certificate-validation-callback-accept-all
  desc: .NET client accepts every server certificate
  crit: suspicious
  conf: 0.97
  attack: T1553
  if:
    type: text
    regex: '(?is)ServerCertificateCustomValidationCallback\s*=\s*\{\s*\$?true\s*;?\s*\}'
- id: postasync
  desc: .NET asynchronous HTTP POST method
  crit: notable
  conf: 0.88
  attack: T1071.001
  if:
    type: text
    word: PostAsync
  unless:
  - id: well-known/game/mod::bedrockboot-source-repository
- id: readasstringasync
  desc: .NET asynchronous HTTP response body read
  crit: notable
  conf: 0.84
  if:
    type: text
    word: ReadAsStringAsync
  unless:
  - id: well-known/game/mod::bedrockboot-source-repository
- id: getstringasync
  desc: .NET asynchronous HTTP response body fetch
  crit: notable
  conf: 0.86
  attack: T1105
  if:
    type: text
    word: GetStringAsync
  unless:
  - id: well-known/game/mod::bedrockboot-source-repository
- id: default-request-headers
  desc: DefaultRequestHeaders accessor
  crit: component
  conf: 0.8
  if:
    type: text
    word: get_DefaultRequestHeaders
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: user-agent-accessor
  desc: HttpClient UserAgent accessor
  crit: component
  conf: 0.8
  if:
    type: text
    word: get_UserAgent
- id: httpwebrequest
  desc: References the .NET HttpWebRequest class
  conf: 0.82
  if:
    type: text
    substr: HttpWebRequest
- id: webrequest-create
  desc: Calls the .NET WebRequest.Create() method
  conf: 0.78
  if:
    type: text
    regex: (System\.Net\.)?WebRequest.{0,32}Create
- id: webrequest-create-data
  desc: WebRequest create in data
  conf: 0.78
  for:
  - data
  if:
    type: text
    regex: '(?i)(System\.Net\.)?WebRequest.{0,64}Crea.{0,4}te'
- id: getresponse
  desc: HTTP response retrieval method
  crit: notable
  conf: 0.72
  if:
    type: text
    word: GetResponse
- id: getresponse-data
  desc: HTTP response in data
  crit: notable
  conf: 0.72
  for:
  - data
  if:
    type: text
    regex: '(?i)GetResponse'
- id: getresponseasync
  desc: Async HTTP response retrieval
  crit: notable
  conf: 0.72
  if:
    type: text
    word: GetResponseAsync
- id: webclient
  desc: System.Net.WebClient type reference
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '(System\.Net\.)?WebClient\b'
- id: soap-http-client-protocol
  desc: .NET SOAP HTTP client class
  conf: 0.78
  if:
    type: text
    substr: System.Web.Services.Protocols.SoapHttpClientProtocol
- id: downloadstring
  desc: WebClient.DownloadString method
  if:
    type: text
    substr: DownloadString
- id: downloadfile
  desc: WebClient.DownloadFile method
  if:
    type: text
    regex: (?i)(System\.Net\.)?WebClient.{0,80}DownloadFile(\w+)?
- id: dotnet-downloadfile-token
  desc: .NET DownloadFile method token
  crit: notable
  conf: 0.72
  for:
  - pe
  if:
    type: text
    exact: DownloadFile
- id: downloaddata
  desc: WebClient.DownloadData method
  if:
    type: text
    substr: DownloadData
- id: webclient-openread-data
  desc: OpenRead method in data
  crit: notable
  conf: 0.82
  for:
  - data
  if:
    type: text
    regex: '(?i)Op.{0,8}nRea.{0,4}d'
- id: uploadstring
  desc: WebClient.UploadString method
  if:
    type: text
    substr: UploadString
- id: uploadvalues
  desc: WebClient.UploadValues method
  if:
    type: text
    substr: UploadValues
composite_rules:
- id: request
  desc: References a .NET HTTP client API
  crit: notable
  conf: 0.86
  any:
  - id: httpclient
  - id: httpwebrequest
  - id: webrequest-create
  - id: webrequest-create-data
  - id: webclient
  - id: soap-http-client-protocol
- id: httpclient-bytearray-download
  desc: HttpClient byte-array download
  crit: notable
  conf: 0.9
  all:
  - id: httpclient
  - id: getbytearrayasync
- id: custom-user-agent-headers
  desc: Default request headers include User-Agent access
  crit: notable
  conf: 0.85
  all:
  - id: default-request-headers
  - id: user-agent-accessor
