defaults:
  crit: notable
  conf: 0.8
  for:
  - pe
  - dll
  - csharp
  platforms:
  - windows
traits:
- id: httpclient
  desc: System.Net.Http.HttpClient class usage
  conf: 0.82
  if:
    type: text
    regex: '(System\.Net\.Http\.)?HttpClient\b'
- id: getbytearrayasync
  desc: HttpClient byte-array download method
  conf: 0.86
  if:
    type: text
    word: GetByteArrayAsync
- id: default-request-headers
  desc: DefaultRequestHeaders accessor
  crit: component
  conf: 0.8
  if:
    type: text
    word: get_DefaultRequestHeaders
- id: user-agent-accessor
  desc: HttpClient UserAgent accessor
  crit: component
  conf: 0.8
  if:
    type: text
    word: get_UserAgent
- id: httpwebrequest
  desc: System.Net.HttpWebRequest class usage
  conf: 0.82
  if:
    type: text
    substr: HttpWebRequest
- id: webrequest-create
  desc: WebRequest create request method
  conf: 0.78
  if:
    type: text
    regex: (System\.Net\.)?WebRequest.{0,32}Create
- id: webrequest-create-data
  desc: WebRequest create in data
  conf: 0.78
  for:
  - data
  if:
    type: text
    regex: '(?i)(System\.Net\.)?WebRequest.{0,64}Crea.{0,4}te'
- id: getresponse
  desc: HTTP response retrieval method
  crit: notable
  conf: 0.72
  if:
    type: text
    word: GetResponse
- id: getresponse-data
  desc: HTTP response in data
  crit: notable
  conf: 0.72
  for:
  - data
  if:
    type: text
    regex: '(?i)GetResponse'
- id: getresponseasync
  desc: Async HTTP response retrieval
  crit: notable
  conf: 0.72
  if:
    type: text
    word: GetResponseAsync
- id: webclient--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: BaseAddress
    case_insensitive: true
  count_max: 1018016
- id: webclient--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Credentials
    case_insensitive: true
  count_max: 1018017
- id: webclient--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: WebClient
    case_insensitive: true
  count_max: 1018019
- id: webclient--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Download
    case_insensitive: true
  count_max: 1018020
- id: webclient--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Headers
    case_insensitive: true
  count_max: 1018021
- id: webclient--rx-8
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Upload
    case_insensitive: true
  count_max: 1018023
- id: soap-http-client-protocol
  desc: .NET SOAP HTTP client class
  conf: 0.78
  if:
    type: text
    substr: System.Web.Services.Protocols.SoapHttpClientProtocol
- id: downloadstring
  desc: WebClient.DownloadString method
  if:
    type: text
    substr: DownloadString
- id: downloadfile
  desc: WebClient.DownloadFile method
  if:
    type: text
    regex: (?i)(System\.Net\.)?WebClient.{0,80}DownloadFile(\w+)?
- id: downloaddata
  desc: WebClient.DownloadData method
  if:
    type: text
    substr: DownloadData
- id: webclient-openread-data
  desc: OpenRead method in data
  crit: notable
  conf: 0.82
  for:
  - data
  if:
    type: text
    regex: '(?i)Op.{0,8}nRea.{0,4}d'
- id: uploadstring
  desc: WebClient.UploadString method
  if:
    type: text
    substr: UploadString
- id: uploadvalues
  desc: WebClient.UploadValues method
  if:
    type: text
    substr: UploadValues
composite_rules:
- id: request
  desc: .NET HTTP request client
  crit: notable
  conf: 0.86
  any:
  - id: httpclient
  - id: httpwebrequest
  - id: webrequest-create
  - id: webrequest-create-data
  - id: webclient
  - id: soap-http-client-protocol
- id: webclient
  desc: System.Net.WebClient class usage
  crit: baseline
  conf: 1.0
  all:
  - id: webclient--rx-4
  any:
  - id: webclient--rx-1
  - id: webclient--rx-2
  - id: webclient--rx-5
  - id: webclient--rx-6
  - id: webclient--rx-8
- id: httpclient-bytearray-download
  desc: HttpClient byte-array download
  crit: notable
  conf: 0.9
  all:
  - id: httpclient
  - id: getbytearrayasync
- id: custom-user-agent-headers
  desc: Default request headers include User-Agent access
  crit: notable
  conf: 0.85
  all:
  - id: default-request-headers
  - id: user-agent-accessor
