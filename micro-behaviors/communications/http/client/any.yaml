defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: http-client-any
    crit: notable
    desc: Any HTTP client usage
    if:
      type: string_value
      regex: Msxml2\.ServerXMLHTTP
  - id: winhttp-request-com
    crit: notable
    conf: 0.8
    desc: WinHttpRequest COM client ProgID
    platforms:
      - windows
    if:
      type: string_value
      regex: (?i)WinHttp\.WinHttpRequest
  - id: http-client-msxml2-fragment
    crit: notable
    desc: Obfuscated MSXML HTTP fragments
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: raw
      exact: MSXML2
  - id: http-client-mlhttp-fragment
    crit: notable
    desc: Obfuscated MSXML HTTP fragments
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: raw
      exact: MLHTTP
  - id: http-client-msxm-fragment
    crit: notable
    desc: Obfuscated MSXML HTTP fragments
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: raw
      exact: MSXM
  - id: http-client-xml2-fragment
    crit: notable
    desc: Obfuscated MSXML HTTP fragments
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: raw
      exact: XML2
composite_rules:
  - id: http-client-any-obfuscated
    crit: notable
    conf: 0.9
    desc: HTTP client via explicit or obfuscated MSXML
    any:
      - id: http-client-any
      - id: winhttp-request-com
      - id: http-client-msxml-fragment
  - id: http-client-msxml-fragment
    crit: notable
    conf: 0.8
    desc: Obfuscated MSXML HTTP fragments
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    any:
      - id: http-client-msxml2-fragment
      - id: http-client-mlhttp-fragment
      - id: http-client-msxm-fragment
      - id: http-client-xml2-fragment
