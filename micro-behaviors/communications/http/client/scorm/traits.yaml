defaults:
  platforms: [unix, windows]
  for: [javascript, html]
  crit: notable
  conf: 0.9

# SCORM 1.2's LMS API is exposed by the host page. These calls describe a
# course-player session; they are not evidence of C2 by themselves.
traits:
  - id: lms-initialize
    desc: SCORM LMS session initialization
    if:
      type: symbol
      exact: lmsAPI.LMSInitialize
  - id: lms-read-value
    desc: SCORM LMS value read
    if:
      type: symbol
      exact: lmsAPI.LMSGetValue
  - id: lms-write-value
    desc: SCORM LMS value write
    if:
      type: symbol
      exact: lmsAPI.LMSSetValue
  - id: lms-commit
    desc: SCORM LMS session commit
    if:
      type: symbol
      exact: lmsAPI.LMSCommit
  - id: lms-finish
    desc: SCORM LMS session completion
    if:
      type: symbol
      exact: lmsAPI.LMSFinish

composite_rules:
  - id: lms-api-session
    desc: SCORM LMS API session lifecycle
    crit: notable
    conf: 0.95
    all:
      - id: lms-initialize
      - id: lms-finish
    any:
      - id: lms-read-value
      - id: lms-write-value
      - id: lms-commit
