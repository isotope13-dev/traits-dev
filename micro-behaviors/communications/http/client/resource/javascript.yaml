defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html, php, binaries]
  crit: notable
  conf: 0.88
traits:
  - id: async-external-script-element
    desc: Loads asynchronous external script
    conf: 0.92
    for: [html]
    if:
      type: text
      regex: '<script[^>]{0,160}\basync\b[^>]{0,160}\bsrc\s*=\s*["'']https?://'
  - id: external-script-element-load
    desc: Loads external script element
    conf: 0.92
    for: [html]
    if:
      type: text
      regex: '<script[^>]{0,160}\bsrc\s*=\s*["'']https?://'
  - id: external-iframe-element-load
    desc: Loads external iframe content
    conf: 0.92
    for: [html]
    if:
      type: text
      regex: '<iframe[^>]{0,240}\bsrc\s*=\s*["'']https?://'
  - id: external-stylesheet-url-assignment
    desc: Assigns external URL to href
    if:
      type: text
      regex: \.href\s*=\s*['"]https?://
  - id: create-link-resource-element
    desc: Creates link resource element
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      substr: createElement
      arg:
        kind: string
        exact: link
  - id: stylesheet-rel-assignment
    desc: Assigns stylesheet link relation
    conf: 0.92
    for: [javascript, typescript, html, package.json, chrome-manifest]
    if:
      type: text
      regex: \.rel\s*=\s*['"]stylesheet['"]
  - id: dynamic-script-element-load
    desc: Dynamically loads script element
    conf: 0.9
    if:
      type: text
      regex: 'createElement\(\s*[''"]script[''"]\s*\)[\s\S]{0,260}script\.src'
  - id: svg-script-namespace-element
    desc: Creates an SVG namespace script element
    crit: component
    conf: 0.92
    for: [javascript, typescript, svg, html]
    if:
      type: text
      regex: 'createElementNS\(\s*[''"]http://www\.w3\.org/2000/svg[''"]\s*,\s*[''"]script[''"]'
  # Generic `setAttribute('href', <var>)` — a dynamic href assignment on any
  # element. The SVG-<script> context comes from the svg-script-namespace-element
  # leg in the composite below, not from this matcher; named/described for what
  # it actually finds so it does not read as SVG-script injection on its own.
  - id: href-attribute-variable-assignment
    desc: Assigns a variable to an href attribute
    conf: 0.92
    for: [javascript, typescript, svg, html]
    if:
      type: text
      regex: 'setAttribute\(\s*[''"]href[''"]\s*,\s*[A-Za-z_$][\w$]*'
  - id: dynamic-external-iframe-url-assignment
    desc: Assigns an external URL to iframe source
    conf: 0.92
    for: [javascript, typescript, svg, html]
    if:
      type: text
      regex: 'setAttribute\(\s*[''"]src[''"]\s*,\s*[''"]https?://'

composite_rules:
  - id: dynamic-svg-script-element-load
    desc: Dynamically loads an SVG script by variable URL
    conf: 0.92
    for: [javascript, typescript, svg, html]
    all:
      - id: svg-script-namespace-element
      - id: href-attribute-variable-assignment
    near_bytes: 260
  - id: dynamic-stylesheet-element-load
    desc: Dynamically creates stylesheet link
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: create-link-resource-element
      - id: stylesheet-rel-assignment
    near_bytes: 260
  - id: dynamic-external-stylesheet-load
    desc: Dynamically loads external stylesheet
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: dynamic-stylesheet-element-load
      - id: external-stylesheet-url-assignment
    near_bytes: 512
