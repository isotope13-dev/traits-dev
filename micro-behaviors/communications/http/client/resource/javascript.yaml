defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html, php, binaries]
  crit: notable
  conf: 0.88
traits:
  - id: async-external-script-element
    desc: Loads asynchronous external script
    conf: 0.92
    for: [html]
    if:
      type: text
      regex: '<script[^>]{0,160}\basync\b[^>]{0,160}\bsrc\s*=\s*["'']https?://'
  - id: external-stylesheet-url-assignment
    desc: Assigns external URL to href
    if:
      type: text
      regex: \.href\s*=\s*['"]https?://
  - id: dynamic-script-element-load
    desc: Dynamically loads script element
    conf: 0.9
    if:
      type: text
      regex: 'createElement\(\s*[''"]script[''"]\s*\)[\s\S]{0,260}script\.src'
