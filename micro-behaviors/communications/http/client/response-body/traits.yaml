defaults:
  platforms: [windows, unix]
traits:
  - id: response-text
    desc: Access to HTTP response body (.responseText)
    crit: notable
    conf: 0.7
    for: [powershell, javascript]
    if:
      type: text
      regex: '(?i)\.responseText'
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version
  - id: response-body
    desc: Access to HTTP response body
    crit: notable
    conf: 0.82
    for: [powershell]
    if:
      type: text
      regex: '(?i)\.responseBody'
