defaults:
  platforms: [windows, unix]
traits:
  - id: response-text
    desc: Access to HTTP response body (.responseText)
    crit: notable
    conf: 0.7
    for: [powershell, javascript]
    if:
      type: text
      regex: '(?i)\.responseText'
    unless:
      - type: text
        substr: "@externs"
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
  - id: response-body
    desc: Access to HTTP response body
    crit: notable
    conf: 0.82
    for: [powershell]
    if:
      type: text
      regex: '(?i)\.responseBody'
