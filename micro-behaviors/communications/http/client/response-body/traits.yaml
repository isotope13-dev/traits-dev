defaults:
  platforms: [windows, unix]
traits:
  - id: fetch-response-clone-json
    desc: Clones fetch response and parses JSON
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'response\.clone\(\)[\s\S]{0,160}\b(await\s+)?[A-Za-z_$][A-Za-z0-9_$]*\.json\(\)'
  - id: fetch-response-stream-reader
    desc: Reads fetch response as a stream
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.body\??\.getReader\s*\('
  - id: response-text
    desc: Access to HTTP response body (.responseText)
    crit: notable
    conf: 0.7
    for: [powershell, javascript]
    if:
      type: text
      regex: '(?i)\.responseText'
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version
      - id: metadata/library/jquery/
  - id: response-body
    desc: Access to HTTP response body
    crit: notable
    conf: 0.82
    for: [powershell]
    if:
      type: text
      regex: '(?i)\.responseBody'
  - id: fetch-html-innerhtml
    desc: Fetch response HTML written to DOM
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'fetch\s*\([^)]{1,300}\)[\s\S]{0,900}\.innerHTML\s*=\s*html\b'
