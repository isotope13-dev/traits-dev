defaults:
  platforms: [windows, unix]
traits:
  - id: fetch-response-clone-json
    desc: Clones fetch response and parses JSON
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'response\.clone\(\)[\s\S]{0,160}\b(await\s+)?[A-Za-z_$][A-Za-z0-9_$]*\.json\(\)'
  - id: fetch-response-stream-reader
    desc: Reads fetch response as a stream
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.body\??\.getReader\s*\('
  - id: response-text
    desc: Reads an XMLHttpRequest response body
    crit: notable
    conf: 0.7
    for: [powershell, javascript, xml]
    if:
      type: text
      regex: '(?i)\.responseText'
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version
      - id: metadata/library/jquery/
  - id: js-response-text-read
    desc: JavaScript reads HTTP response text
    crit: notable
    conf: 0.82
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '^[A-Za-z_$][A-Za-z0-9_$]*\.text$'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: response-body
    desc: Access to HTTP response body
    crit: notable
    conf: 0.82
    for: [powershell]
    if:
      type: text
      regex: '(?i)\.responseBody'
  - id: javascript-response-body
    desc: JavaScript reads a binary HTTP response body
    crit: notable
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '(?i)\.responseBody'
  - id: fetch-html-innerhtml
    desc: Fetch response HTML written to DOM
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'fetch\s*\([^)]{1,300}\)[\s\S]{0,900}\.innerHTML\s*=\s*html\b'
