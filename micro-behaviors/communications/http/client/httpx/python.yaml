defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: httpx-client
    desc: httpx.Client usage
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: httpx.Client
  - id: httpx-async-client
    desc: Creates an asynchronous HTTP client with httpx
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: httpx.AsyncClient
