defaults:
  crit: notable
  conf: 0.8
  for:
  - pe
  - dll
  - csharp
  platforms:
  - windows
traits:
- id: httpclient
  desc: System.Net.Http.HttpClient class usage
  conf: 0.82
  if:
    type: text
    substr: System.Net.Http.HttpClient
- id: httpwebrequest
  desc: System.Net.HttpWebRequest class usage
  conf: 0.82
  if:
    type: text
    substr: HttpWebRequest
- id: webrequest-create
  desc: WebRequest create request method
  conf: 0.78
  if:
    type: text
    regex: (System\.Net\.)?WebRequest.{0,32}Create
- id: getresponse
  desc: HTTP response retrieval method
  crit: notable
  conf: 0.72
  if:
    type: text
    exact: GetResponse
- id: getresponseasync
  desc: Async HTTP response retrieval
  crit: notable
  conf: 0.72
  if:
    type: text
    exact: GetResponseAsync
- id: webclient--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: BaseAddress
    case_insensitive: true
- id: webclient--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Credentials
    case_insensitive: true
- id: webclient--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: System.Net
    case_insensitive: true
- id: webclient--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: WebClient
    case_insensitive: true
- id: webclient--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Download
    case_insensitive: true
- id: webclient--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Headers
    case_insensitive: true
- id: webclient--rx-7
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: String
    case_insensitive: true
- id: webclient--rx-8
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Upload
    case_insensitive: true
- id: soap-http-client-protocol
  desc: .NET SOAP HTTP client class
  conf: 0.78
  if:
    type: text
    substr: System.Web.Services.Protocols.SoapHttpClientProtocol
- id: downloadstring
  desc: WebClient.DownloadString method
  if:
    type: text
    substr: DownloadString
- id: downloadfile
  desc: WebClient.DownloadFile method
  if:
    type: text
    regex: (?i)(System\.Net\.)?WebClient.{0,80}DownloadFile(\w+)?
- id: downloaddata
  desc: WebClient.DownloadData method
  if:
    type: text
    substr: DownloadData
- id: uploadstring
  desc: WebClient.UploadString method
  if:
    type: text
    substr: UploadString
- id: uploadvalues
  desc: WebClient.UploadValues method
  if:
    type: text
    substr: UploadValues
composite_rules:
- id: request
  desc: .NET HTTP request client
  crit: notable
  conf: 0.86
  any:
  - id: httpclient
  - id: httpwebrequest
  - id: webrequest-create
  - id: webclient
  - id: soap-http-client-protocol
- id: webclient
  desc: System.Net.WebClient class usage
  crit: baseline
  conf: 1.0
  any:
  - id: webclient--rx-1
  - id: webclient--rx-2
  - id: webclient--rx-3
  - id: webclient--rx-4
  - id: webclient--rx-5
  - id: webclient--rx-6
  - id: webclient--rx-7
  - id: webclient--rx-8
  needs: 1
