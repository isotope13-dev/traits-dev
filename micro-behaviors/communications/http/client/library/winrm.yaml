defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.95
  attack: T1021.006

traits:
  - id: winrm-import
    desc: Imports the Python WinRM client
    if:
      type: import
      exact: winrm

  - id: winrm-session
    desc: Creates a WinRM remote session
    if:
      type: symbol
      kind: call
      exact: winrm.Session

  - id: winrm-run-command
    desc: Executes a command through WinRM
    if:
      type: symbol
      kind: call
      regex: '^session\.run_(cmd|ps)$'
