defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: urllib-request
    desc: Python urllib.request usage
    # HTTP client = observable network behavior, so notable per RULES.md
    # ("HTTP clients should remain notable or higher"). Exfil composites
    # reference this and add the intent context.
    crit: notable
    conf: 0.8
    if:
      type: text
      word: urllib.request

  - id: openai-client-import
    desc: Python OpenAI API client import
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(from\s+openai\s+import|import\s+openai\b)'

  - id: openai-chat-completions-call
    desc: Python OpenAI chat completion call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)chat\.completions\.create$'
