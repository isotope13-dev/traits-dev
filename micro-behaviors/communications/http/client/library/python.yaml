defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: aiohttp-import
    desc: Imports the aiohttp Python HTTP client
    crit: notable
    conf: 0.9
    if:
      type: import
      regex: '^(aiohttp|aiohttp\.)'
  - id: python-session-method-call
    desc: Calls a Python HTTP session method
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(^|\.)session\.(get|post|request)$'
  - id: reykit-rnet-http-client-import
    desc: Imports the reykit.rnet Python HTTP client
    crit: notable
    conf: 0.92
    if:
      type: import
      exact: reykit.rnet

  - id: urllib-request
    desc: Imports Python urllib.request HTTP client
    # HTTP client = observable network behavior, so notable per RULES.md
    # ("HTTP clients should remain notable or higher"). Exfil composites
    # reference this and add the intent context.
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: import
      exact: urllib.request
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: huggingface-hub-download-call
    desc: Hugging Face Hub model download call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: hf_hub_download

  - id: openai-client-import
    desc: Python OpenAI API client import
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(from\s+openai\s+import|import\s+openai\b)'

  - id: anthropic-sdk-import
    desc: Imports the Anthropic Python API client
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: anthropic

  - id: anthropic-client-constructor
    desc: Constructs an Anthropic API client
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: anthropic.Anthropic

  - id: anthropic-messages-create
    desc: Sends an Anthropic Messages API request
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: client.messages.create

  - id: openai-chat-completions-call
    desc: Python OpenAI chat completion call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)chat\.completions\.create$'

  - id: openai-client-constructor
    desc: Constructs an OpenAI-compatible API client
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: OpenAI

  - id: bitwarden-sdk-client
    desc: Python Bitwarden SDK client
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: bitwarden_sdk

  - id: python-secret-service-method-call
    desc: Python secret service list/get call
    crit: component
    conf: 0.7
    if:
      type: symbol
      kind: call
      regex: '(^|\.)secrets(\(\))?\.(list|get)$'

composite_rules:
  - id: aiohttp-session-request
    desc: Sends HTTP through an aiohttp session
    crit: notable
    conf: 0.85
    all:
      - id: aiohttp-import
      - id: python-session-method-call

  - id: bitwarden-secret-service-call
    desc: Bitwarden SDK secret service API call
    crit: notable
    conf: 0.95
    all:
      - id: bitwarden-sdk-client
      - id: python-secret-service-method-call
