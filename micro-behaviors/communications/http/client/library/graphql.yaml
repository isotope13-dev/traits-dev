defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]

traits:
  - id: graphql-request-client-import
    desc: Imports the graphql-request HTTP client
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: graphql-request

  - id: graphql-named-operation-field
    desc: Named GraphQL operation field
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '["'']?operationName["'']?\s*:\s*["''][A-Za-z_$][\w$-]*["'']'
