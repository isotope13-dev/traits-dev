defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: openssl-http-routines-diagnostic
    desc: OpenSSL HTTP routines diagnostic string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'HTTP routines'
      section: rdata

  - id: openssl-https-proxy-diagnostic
    desc: OpenSSL HTTPS proxy-request diagnostic string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'https proxy request'
      section: rdata

  - id: openssl-redirect-https-http-diagnostic
    desc: OpenSSL HTTPS-to-HTTP redirect diagnostic string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'redirection from https to http'
      section: rdata

  - id: openssl-wrong-http-version-diagnostic
    desc: OpenSSL wrong-HTTP-version diagnostic string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'received wrong http version'
      section: rdata
