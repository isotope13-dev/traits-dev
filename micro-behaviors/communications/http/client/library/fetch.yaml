defaults:
  platforms: [unix]
  for: [shell]
  attack: T1105
traits:
  - id: fetch-cmd
    desc: fetch command (FreeBSD/AIX)
    crit: notable
    conf: 0.7
    # The FreeBSD/AIX `fetch` CLI is invoked as `fetch <url>` or `fetch -o`.
    # Require a URL or flag after the command word, not a bare word (which
    # collides with the JS Fetch API `fetch(`, method names like .fetch(), and
    # subcommands such as `git fetch --tags`.
    if:
      type: text
      regex: '(?m)(^|[;&|`$()])\s*fetch\s+(-|https?://|ftp://)'
