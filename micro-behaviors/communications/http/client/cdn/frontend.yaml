defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript, php, python]
  crit: notable
  conf: 0.82
  mbc: C0002
  attack: T1071.001

traits:
- id: cdnjs-asset
  desc: Frontend asset loaded from cdnjs
  if:
    type: text
    regex: 'https?://cdnjs\.cloudflare\.com/'

- id: jsdelivr-asset
  desc: Frontend asset loaded from jsDelivr
  if:
    type: text
    regex: 'https?://cdn\.jsdelivr\.net/'

- id: tailwind-cdn-asset
  desc: Tailwind CDN frontend asset
  if:
    type: text
    regex: 'https?://cdn\.tailwindcss\.com/'
