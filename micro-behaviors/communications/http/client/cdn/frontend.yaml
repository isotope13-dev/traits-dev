defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript, php, python]
  crit: notable
  conf: 0.82
  mbc: C0002
  attack: T1071.001

traits:
- id: cdnjs-asset
  desc: Frontend asset loaded from cdnjs
  if:
    type: text
    regex: 'https?://cdnjs\.cloudflare\.com/'

- id: jsdelivr-asset
  desc: Frontend asset loaded from jsDelivr
  if:
    type: text
    regex: 'https?://cdn\.jsdelivr\.net/'
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: tailwind-cdn-asset
  desc: Tailwind CDN frontend asset
  if:
    type: text
    regex: 'https?://cdn\.tailwindcss\.com/'

- id: unpkg-asset
  desc: Frontend asset loaded from unpkg CDN
  if:
    type: text
    regex: 'https?://unpkg\.com/[A-Za-z0-9]'

- id: jquery-cdn-asset
  desc: jQuery frontend asset loaded from CDN
  if:
    type: text
    regex: 'https?://code\.jquery\.com/jquery-'

- id: bootstrap-cdn-asset
  desc: Bootstrap frontend asset loaded from CDN
  if:
    type: text
    regex: 'https?://cdn\.jsdelivr\.net/npm/bootstrap@'

- id: fontawesome-cdn-asset
  desc: Font Awesome frontend asset loaded from CDN
  if:
    type: text
    regex: 'https?://cdnjs\.cloudflare\.com/ajax/libs/font-awesome/'

- id: cloudfront-asset-url
  desc: Frontend asset loaded from CloudFront
  if:
    type: text
    regex: '(https?:)?//[a-z0-9-]{12,64}\.cloudfront\.net/[A-Za-z0-9._~!$&()*+,;=:@/?%-]{12,}'

composite_rules:
- id: multiple-frontend-cdn-assets
  desc: Multiple frontend assets loaded from public CDNs
  crit: notable
  conf: 0.85
  needs: 2
  any:
  - id: cdnjs-asset
  - id: jsdelivr-asset
  - id: tailwind-cdn-asset
  - id: unpkg-asset
  - id: jquery-cdn-asset
  - id: bootstrap-cdn-asset
  - id: fontawesome-cdn-asset
