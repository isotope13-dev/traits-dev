defaults:
  for: [powershell]
  platforms: [windows]
traits:
- id: system-net-webclient
  desc: System.Net.WebClient object creation
  crit: notable
  conf: 0.88
  attack: T1071.001
  if:
    type: text
    regex: '(?i)New-Object\s+System\.Net\.WebClient'
- id: add-user-agent-header
  desc: Adds HTTP User-Agent header
  crit: notable
  conf: 0.88
  attack: T1071.001
  if:
    type: text
    regex: 'Headers\.Add\("User-Agent",\s*\$'
- id: add-cookie-header
  desc: Adds HTTP Cookie header
  crit: notable
  conf: 0.9
  attack: T1071.001
  if:
    type: text
    regex: 'Headers\.Add\("Cookie",\s*\$'
- id: read-set-cookie-header
  desc: Reads Set-Cookie response header
  crit: notable
  conf: 0.92
  attack: T1071.001
  if:
    type: text
    substr: ResponseHeaders.Get("Set-Cookie")
- id: urlmon-user-agent
  desc: Obtains browser User-Agent via urlmon
  crit: suspicious
  conf: 0.9
  attack: T1036.005
  if:
    type: text
    substr: ObtainUserAgentString
composite_rules:
- id: cookie-auth-http-client
  desc: Cookie-authenticated HTTP client flow
  crit: suspicious
  conf: 0.94
  attack: T1071.001
  all:
  - id: system-net-webclient
  - id: add-cookie-header
  - id: read-set-cookie-header
  - id: micro-behaviors/communications/http/client/webclient::webclient-download-data
  any:
  - id: add-user-agent-header
  - id: urlmon-user-agent
