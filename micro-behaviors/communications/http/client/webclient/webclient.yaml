defaults:
  platforms:
    - windows
  for:
    - powershell
    - vbs
    - javascript
    - html
  crit: notable
  conf: 0.88
traits:
  - id: net-webclient-object
    desc: Net.WebClient object creation
    if:
      type: text
      regex: New-Object\s+Net\.WebClient
  - id: webclient-download-data
    desc: WebClient DownloadData method
    if:
      # PowerShell WebClient calls are often embedded in a JScript string
      # before WSH executes them. Keep the client construction and byte
      # download in one bounded match so a lone method name is not enough.
      type: text
      regex: '(?is)(New-Object\s+)?(System\.)?Net\.WebClient\b[\s\S]{0,240}\.\s*DownloadData\s*\('
  - id: unicode-delimited-webclient-token
    desc: Unicode-delimited WebClient identifier
    crit: component
    conf: 0.94
    for: [html]
    if:
      type: text
      regex: 'W\P{ASCII}+e\P{ASCII}+b\P{ASCII}+C\P{ASCII}+l\P{ASCII}+i\P{ASCII}+e\P{ASCII}+n\P{ASCII}+t'
  - id: unicode-delimited-download-token
    desc: Unicode-delimited Download method
    crit: component
    conf: 0.94
    for: [html]
    if:
      type: text
      regex: 'D\P{ASCII}+o\P{ASCII}+w\P{ASCII}+n\P{ASCII}+l\P{ASCII}+o\P{ASCII}+a\P{ASCII}+d'
  - id: unicode-delimited-data-token
    desc: Unicode-delimited Data method suffix
    crit: component
    conf: 0.94
    for: [html]
    if:
      type: text
      regex: 'D\P{ASCII}+a\P{ASCII}+t\P{ASCII}+a'

composite_rules:
  - id: unicode-delimited-webclient-download
    desc: Unicode-delimited WebClient byte download
    crit: notable
    conf: 0.97
    attack: T1105
    all:
      - id: unicode-delimited-webclient-token
      - id: unicode-delimited-download-token
      - id: unicode-delimited-data-token
