defaults:
  platforms:
    - windows
  for:
    - powershell
    - vbs
    - javascript
    - html
  crit: notable
  conf: 0.88
traits:
  - id: net-webclient-object
    desc: Net.WebClient object creation
    if:
      type: text
      regex: New-Object\s+Net\.WebClient
  - id: webclient-download-data
    desc: WebClient DownloadData method
    if:
      # PowerShell WebClient calls are often embedded in a JScript string
      # before WSH executes them. Keep the client construction and byte
      # download in one bounded match so a lone method name is not enough.
      type: text
      regex: '(?is)(New-Object\s+)?(System\.)?Net\.WebClient\b[\s\S]{0,240}\.\s*DownloadData\s*\('
