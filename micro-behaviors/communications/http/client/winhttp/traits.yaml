defaults:
  for:
  - pe
  - dll
  - c
  - cpp
  platforms:
  - windows
  attack: T1071.001
  mbc: C0002
traits:
- id: winhttp-open
  desc: Initialize WinHTTP session
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: WinHttpOpen
- id: winhttp-dll-name-text
  desc: WinHTTP DLL name string reference
  crit: component
  conf: 0.88
  if:
    type: text
    regex: ^W?winhttp\.dll$
    case_insensitive: true
- id: winhttp-dll-name-wide
  desc: WinHTTP DLL name in UTF-16
  crit: component
  conf: 0.9
  for: [pe, dll]
  if:
    type: encoded
    encoding: wide
    exact: winhttp.dll
    case_insensitive: true
- id: winhttp-connect
  desc: Connect WinHTTP to remote host
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: WinHttpConnect
- id: winhttp-open-request
  desc: Create WinHTTP HTTP request handle
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: WinHttpOpenRequest
- id: winhttp-send-request
  desc: Send WinHTTP request to server
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: WinHttpSendRequest
- id: winhttp-send-request-text
  desc: WinHTTP send request text reference
  crit: component
  conf: 0.84
  for: [pe, dll, source]
  if:
    type: text
    word: WinHttpSendRequest
- id: winhttp-receive-response
  desc: Receive WinHTTP server response
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: WinHttpReceiveResponse
- id: winhttp-receive-response-text
  desc: WinHTTP receive response text reference
  crit: component
  conf: 0.84
  for: [pe, dll, source]
  if:
    type: text
    word: WinHttpReceiveResponse
- id: winhttp-read-data
  desc: Read WinHTTP response body
  crit: notable
  conf: 0.85
  if:
    type: symbol
    exact: WinHttpReadData
- id: winhttp-query-data-available
  desc: Query WinHTTP buffered response bytes
  crit: notable
  conf: 0.85
  if:
    type: symbol
    exact: WinHttpQueryDataAvailable
- id: winhttp-query-headers
  desc: Query WinHTTP response headers
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: WinHttpQueryHeaders
- id: winhttp-crack-url
  desc: Parse URL with WinHTTP helper
  crit: notable
  conf: 0.84
  if:
    type: symbol
    exact: WinHttpCrackUrl
- id: winhttp-set-option
  desc: Configure WinHTTP session option
  crit: notable
  conf: 0.82
  if:
    type: symbol
    exact: WinHttpSetOption
- id: winhttp-query-option
  desc: Query WinHTTP session option
  crit: notable
  conf: 0.82
  if:
    type: symbol
    exact: WinHttpQueryOption
- id: winhttp-set-timeouts
  desc: Configure WinHTTP timeout values
  crit: notable
  conf: 0.84
  if:
    type: symbol
    exact: WinHttpSetTimeouts
- id: winhttp-status-callback
  desc: Register WinHTTP status callback
  crit: notable
  conf: 0.86
  if:
    type: symbol
    exact: WinHttpSetStatusCallback
- id: winhttp-write-data
  desc: Write WinHTTP request body data
  crit: notable
  conf: 0.83
  if:
    type: symbol
    exact: WinHttpWriteData
- id: winhttp-close-handle
  desc: Close WinHTTP handle object
  crit: notable
  conf: 0.8
  if:
    type: symbol
    exact: WinHttpCloseHandle
- id: winhttp-add-request-headers-text
  desc: WinHTTP add-headers API string
  crit: component
  conf: 0.82
  if:
    type: text
    exact: WinHttpAddRequestHeaders
- id: winhttp-get-ie-proxy-config
  desc: "Resolve user IE proxy config for WinHTTP"
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: WinHttpGetIEProxyConfigForCurrentUser
- id: winhttp-get-proxy-for-url
  desc: Resolve proxy for URL via WPAD/PAC
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: WinHttpGetProxyForUrl

composite_rules:
- id: winhttp-session-connect-flow
  desc: WinHTTP session with remote connection
  crit: notable
  conf: 0.92
  all:
  - id: winhttp-open
  - id: winhttp-connect
  any:
  - id: winhttp-crack-url
  - id: winhttp-set-timeouts
  - id: winhttp-set-option
  - id: winhttp-status-callback
- id: winhttp-request-flow
  desc: WinHTTP request/response data flow
  crit: notable
  conf: 0.9
  all:
  - id: winhttp-open-request
  - id: winhttp-send-request
  - id: winhttp-receive-response
  any:
  - id: winhttp-read-data
  - id: winhttp-query-data-available
  - id: winhttp-query-headers
- id: winhttp-downloader-flow
  desc: Complete WinHTTP request and response flow
  crit: notable
  conf: 0.94
  all:
  - id: winhttp-session-connect-flow
  - id: winhttp-request-flow
  any:
  - id: winhttp-query-option
  - id: winhttp-close-handle
  - id: winhttp-status-callback
- id: winhttp-downloader-flow-text
  desc: WinHTTP request flow from API references
  crit: notable
  conf: 0.93
  all:
  - id: winhttp-dll-name-text
  - id: winhttp-open
  - id: winhttp-connect
  - id: winhttp-open-request
  - id: winhttp-send-request-text
  - id: winhttp-receive-response-text
  any:
  - id: winhttp-read-data
  - id: winhttp-query-data-available
  - id: winhttp-query-headers
  - id: winhttp-set-option
  - id: winhttp-close-handle
  - id: winhttp-add-request-headers-text
  needs: 2
- id: winhttp-bidirectional-transfer
  desc: WinHTTP request upload and response flow
  crit: notable
  conf: 0.9
  all:
  - id: winhttp-open-request
  - id: winhttp-send-request
  - id: winhttp-write-data
  any:
  - id: winhttp-receive-response
  - id: winhttp-query-headers
- id: winhttp-proxy-aware-resolution
  desc: WinHTTP session with corporate proxy resolution
  crit: notable
  conf: 0.92
  all:
  - id: winhttp-open
  any:
  - id: winhttp-get-ie-proxy-config
  - id: winhttp-get-proxy-for-url
- id: winhttp-runtime-resolution
  desc: Runtime-resolved WinHTTP capability
  crit: notable
  conf: 0.95
  for: [pe, dll]
  all:
  - id: winhttp-dll-name-wide
  - id: micro-behaviors/crypto/hash/fnv::fnv1a-offset-basis
  - id: micro-behaviors/crypto/hash/fnv::fnv1a-x86-prime-imul
  any:
  - id: micro-behaviors/os/api-resolution/hash-based::peb-fs-access
  - id: micro-behaviors/os/api-resolution/hash-based::pe-export-directory-walk-x86
  needs: 1
