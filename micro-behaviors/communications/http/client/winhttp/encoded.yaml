defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1071.001
  mbc: C0002

traits:
  - id: xor-decoded-winhttp-open
    desc: XOR-decoded WinHTTP session initialization API
    crit: notable
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      exact: WinHttpOpen

  - id: xor-decoded-winhttp-connect
    desc: XOR-decoded WinHTTP server connection API
    crit: notable
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      exact: WinHttpConnect

  - id: xor-decoded-winhttp-open-request
    desc: XOR-decoded WinHTTP request creation API
    crit: notable
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      exact: WinHttpOpenRequest

  - id: xor-decoded-winhttp-send-request
    desc: XOR-decoded WinHTTP request transmission API
    crit: notable
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      exact: WinHttpSendRequest

  - id: xor-decoded-winhttp-receive-response
    desc: XOR-decoded WinHTTP response receipt API
    crit: notable
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      exact: WinHttpReceiveResponse

  - id: xor-decoded-winhttp-read-data
    desc: XOR-decoded WinHTTP response-body read API
    crit: notable
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      exact: WinHttpReadData

composite_rules:
  - id: xor-decoded-winhttp-request-flow
    desc: XOR-obfuscated WinHTTP request and response-body flow
    crit: notable
    conf: 0.98
    all:
      - id: xor-decoded-winhttp-open
      - id: xor-decoded-winhttp-connect
      - id: xor-decoded-winhttp-open-request
      - id: xor-decoded-winhttp-send-request
      - id: xor-decoded-winhttp-receive-response
      - id: xor-decoded-winhttp-read-data
