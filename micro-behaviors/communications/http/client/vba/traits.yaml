defaults:
  for:
    - vbs
  platforms:
    - windows
  crit: notable
  conf: 0.88
traits:
  - id: xmlhttp-object
    desc: XMLHTTP COM object instantiation
    if:
      # VBS source is exposed as text when its parser cannot build literals.
      type: text
      regex: '(?i)(CreateObject|ActiveXObject)\s*\(\s*["''](M(SXML2?|icrosoft)|ServerXML)HTTP'
  - id: urldownloadtofile-api
    desc: Downloads remote file to disk
    crit: suspicious
    conf: 0.93
    if:
      type: string_literal
      regex: (?i)URLDownloadToFile
  - id: internetopen-api
    desc: Opens WinInet HTTP session handle
    if:
      type: string_literal
      regex: (?i)InternetOpen
  - id: http-open-send
    desc: HTTP Open and Send method sequence
    conf: 0.85
    if:
      type: text
      # Covers VB/VBS statement-form methods (`obj.open "GET"` and `obj.send`).
      regex: '(?is)\b[A-Za-z_]\w*\s*\.\s*Open\s+["''](GET|POST)["''].{0,240}\b[A-Za-z_]\w*\s*\.\s*Send\b'
composite_rules:
  - id: vba-http-download-to-file
    desc: VBA HTTP download to local file
    crit: suspicious
    conf: 0.95
    all:
      - id: xmlhttp-object
    any:
      - id: metadata/lang/scripted::adodb-stream
      - id: micro-behaviors/fs/write/vba::vba-open-for-output
