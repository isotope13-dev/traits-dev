defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source]
traits:
  - id: js-xmlhttp-progid
    desc: JavaScript XMLHTTP COM client
    crit: notable
    conf: 0.9
    for:
      - javascript
    if:
      type: string_literal
      regex: '(?i)MSXML2\.XMLHTTP|Microsoft\.XMLHTTP|ServerXMLHTTP'
  - id: js-xmlhttp-open
    desc: XMLHTTP.open call
    crit: notable
    conf: 0.8
    for:
      - javascript
    unless:
      - id: metadata/package/documentation/
      - id: metadata/file/format::sourcemap-sources-content
    if:
      type: string_literal
      regex: \.open\s*\(\s*["'](GET|POST)["']
  - id: js-xmlhttp-open-obfuscated-method
    desc: XMLHTTP.open with concatenated HTTP method
    crit: suspicious
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: \.open\s*\(\s*["'][A-Z]{1,4}["']\s*\+\s*["'][A-Z]{1,4}["']\s*,
  - id: js-xmlhttp-send
    desc: XMLHTTP.send call
    crit: notable
    conf: 0.8
    for:
      - javascript
    unless:
      - id: metadata/package/documentation/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/file/format::sourcemap-sources-content
    if:
      type: string_literal
      regex: \.send\s*\(
  - id: ps-xmlhttp-open-get
    desc: PowerShell XMLHTTP GET open
    crit: notable
    conf: 0.86
    for:
      - powershell
    if:
      type: text
      regex: '\.open\("GET",\s*\$[A-Za-z_][A-Za-z0-9_]*,\s*\$false\)'
  - id: ps-xmlhttp-send
    desc: PowerShell XMLHTTP send call
    crit: notable
    conf: 0.82
    for:
      - powershell
    if:
      type: text
      regex: '\.send\(\)'
