defaults:
  platforms: [windows, unix]
traits:
  - id: js-xmlhttp-open-dynamic-url
    desc: XMLHTTP.open with Dynamic URL (JS)
    crit: suspicious
    conf: 0.9
    for: [javascript]
    # The AST query walks every call_expression in the file; on large
    # minified bundles it runs >30s and trips the rule-evaluation timeout
    # bomb-detector. The actual attack pattern (a specific minified
    # `dSta` variable name) is from compact stagers — cap the file size.
    size_max: 200000
    if:
      type: ast
      language: javascript
      query: |-
        (call_expression
          function: (member_expression
            object: (identifier) @xmlhttp_object
            property: (property_identifier) @open_method
          )
          arguments: (arguments
            (string) @method
            (_) @dynamic_url_arg
            (_) @async_arg
          )
          (#eq? @open_method "open")
          (#match? @method "GET|POST")
          (#match? @xmlhttp_object "dSta")
        )
