defaults:
  platforms: [windows]
  for: [pe, dll]
  mbc: B0025
composite_rules:
  - id: dotnet-http-client-with-aes
    desc: .NET HTTP client with AES/Rijndael
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael
    any:
      - id: micro-behaviors/communications/http/client::webclient
      - id: micro-behaviors/communications/http/client::httpwebrequest
      - id: micro-behaviors/communications/http/client::soap-http-client-protocol
