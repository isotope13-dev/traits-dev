defaults:
  for:
    - pe
    - csharp
  platforms:
    - windows
traits:
  - id: login-endpoint
    desc: VK login HTTP endpoint
    crit: notable
    conf: 0.98
    if:
      type: text
      exact: http://vkontakte.ru/login.php
  - id: login-form
    desc: VK credential POST body
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: op=a_login_attempt&email={0}&pass={1}
  - id: captcha-flow
    desc: VK CAPTCHA login flow
    crit: notable
    conf: 0.96
    if:
      type: text
      exact: '&captcha_sid={0}&captcha_key={1}'
  - id: cookie-remixchk
    desc: VK remixchk cookie name
    crit: component
    conf: 0.95
    if:
      type: text
      exact: remixchk
  - id: cookie-remixmid
    desc: VK remixmid cookie name
    crit: component
    conf: 0.95
    if:
      type: text
      exact: remixmid
  - id: cookie-remixpass
    desc: VK remixpass cookie name
    crit: component
    conf: 0.95
    if:
      type: text
      exact: remixpass
  - id: cookie-remixsid
    desc: VK remixsid cookie name
    crit: component
    conf: 0.95
    if:
      type: text
      exact: remixsid
  - id: recon-endpoints
    desc: VK profile recon endpoints
    crit: notable
    conf: 0.94
    count_min: 3
    if:
      type: text
      regex: http://vkontakte\.ru/(search|people|groups)\.php
  - id: post-endpoints-core
    desc: VK posting endpoints core
    crit: notable
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: http://vkontakte\.ru/(wall|board|photos|audio)\.php
  - id: post-endpoints-aux
    desc: VK posting endpoints aux
    crit: notable
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: http://vkontakte\.ru/(video|friend|groups)\.php
  - id: graffiti-boundary
    desc: VK graffiti multipart marker
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: --OLEG-ANDREEV-PAVEL-DUROV-GRAFFITI-POST
  - id: ajax-header
    desc: AJAX request header name
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: X-Requested-With
composite_rules:
  - id: session-cookie-bundle
    desc: VK session cookie bundle
    crit: notable
    conf: 0.97
    all:
      - id: cookie-remixchk
      - id: cookie-remixmid
      - id: cookie-remixpass
      - id: cookie-remixsid
  - id: credential-login
    desc: VK credentialed web login
    crit: suspicious
    conf: 0.99
    all:
      - id: login-endpoint
      - id: login-form
    any:
      - id: session-cookie-bundle
      - id: captcha-flow
  - id: multimedia-abuse
    desc: VK multimedia spam workflow
    crit: suspicious
    conf: 0.98
    all:
      - id: post-endpoints-core
      - id: graffiti-boundary
    any:
      - id: post-endpoints-aux
      - id: ajax-header
      - id: recon-endpoints
