defaults:
  for: [pe, csharp]
  platforms: [windows]
  crit: notable
  conf: 0.82
  mbc: C0002
  attack: T1071.001
traits:
  - id: client-websocket
    desc: .NET ClientWebSocket class usage
    if:
      type: text
      word: ClientWebSocket
    unless:
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: connect-async-method-token
    desc: .NET ConnectAsync method token
    crit: component
    if:
      type: text
      word: ConnectAsync
    unless:
      - type: basename
        regex: ^System\.Net\.(WebSockets(\.Client)?|Sockets|Http)\.dll$
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: send-async-method-token
    desc: .NET ClientWebSocket SendAsync reference
    crit: component
    if:
      type: text
      regex: 'ClientWebSocket.{0,256}SendAsync'
    unless:
      - type: basename
        regex: ^System\.Net\.(WebSockets(\.Client)?|Sockets|Http)\.dll$
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: receive-async-method-token
    desc: .NET ReceiveAsync method token
    crit: component
    if:
      type: text
      word: ReceiveAsync
    unless:
      - type: basename
        regex: ^System\.Net\.(WebSockets(\.Client)?|Sockets|Http)\.dll$
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: websocket-message-type
    desc: WebSocket message type enum
    crit: component
    conf: 0.72
    if:
      type: text
      word: WebSocketMessageType
  - id: websocket-state
    desc: WebSocket state enum
    crit: component
    conf: 0.72
    if:
      type: text
      word: WebSocketState
composite_rules:
  - id: websocket-connect-async
    desc: .NET ClientWebSocket ConnectAsync usage
    crit: notable
    conf: 0.86
    all:
      - id: client-websocket
      - id: connect-async-method-token

  - id: websocket-send-async
    desc: .NET ClientWebSocket SendAsync usage
    crit: notable
    conf: 0.86
    all:
      - id: client-websocket
      - id: send-async-method-token

  - id: websocket-receive-async
    desc: .NET ClientWebSocket ReceiveAsync usage
    crit: notable
    conf: 0.86
    all:
      - id: client-websocket
      - id: receive-async-method-token

  - id: dotnet-client-websocket
    desc: .NET ClientWebSocket API cluster
    crit: notable
    conf: 0.9
    all:
      - id: client-websocket
    any:
      - id: websocket-connect-async
      - id: websocket-send-async
      - id: websocket-receive-async
      - id: websocket-message-type
      - id: websocket-state
    needs: 2
