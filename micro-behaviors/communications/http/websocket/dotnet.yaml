defaults:
  for: [pe, csharp]
  platforms: [windows]
  crit: notable
  conf: 0.82
  mbc: C0002
  attack: T1071.001
traits:
  - id: client-websocket
    desc: .NET ClientWebSocket class usage
    if:
      type: text
      word: ClientWebSocket
    unless:
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: websocket-connect-async
    desc: WebSocket async connect method
    if:
      type: text
      word: ConnectAsync
    unless:
      - type: basename
        regex: ^System\.Net\.(WebSockets(\.Client)?|Sockets|Http)\.dll$
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: websocket-send-async
    desc: WebSocket async send method
    if:
      type: text
      word: SendAsync
    unless:
      - type: basename
        regex: ^System\.Net\.(WebSockets(\.Client)?|Sockets|Http)\.dll$
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: websocket-receive-async
    desc: WebSocket async receive method
    if:
      type: text
      word: ReceiveAsync
    unless:
      - type: basename
        regex: ^System\.Net\.(WebSockets(\.Client)?|Sockets|Http)\.dll$
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: ^System\.Net\.WebSockets(\.Client)?\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: websocket-message-type
    desc: WebSocket message type enum
    crit: component
    conf: 0.72
    if:
      type: text
      word: WebSocketMessageType
  - id: websocket-state
    desc: WebSocket state enum
    crit: component
    conf: 0.72
    if:
      type: text
      word: WebSocketState
composite_rules:
  - id: dotnet-client-websocket
    desc: .NET ClientWebSocket API cluster
    crit: notable
    conf: 0.9
    all:
      - id: client-websocket
    any:
      - id: websocket-connect-async
      - id: websocket-send-async
      - id: websocket-receive-async
      - id: websocket-message-type
      - id: websocket-state
    needs: 2
