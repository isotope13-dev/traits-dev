defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  mbc: C0002
  attack: T1071.001
traits:
  - id: websocket-class
    desc: WebSocket class reference
    crit: component
    conf: 0.5
    count_min: 2
    if:
      type: text
      word: WebSocket
    not:
      - regex: (?i)disabled-by-default
    unless:
      - type: text
        substr: "@externs"
      - id: metadata/lang/scripted::dts-declaration-file
  - id: websocket-lower
    desc: websocket lowercase reference
    crit: component
    conf: 0.5
    for: [scripts]
    if:
      type: text
      word: websocket
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    not:
      - regex: (?i)disabled-by-default
      - substr: github.com/gorilla/websocket
  - id: ws-scheme
    desc: ws:// URL scheme
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: ws://
    unless:
      - id: metadata/package/testing/harness::electron-node-spec-harness
    not:
      - regex: (?i)ws://example
      - regex: (?i)ws://127.0.0.1
      - regex: (?i)ws://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
  - id: wss-scheme
    desc: wss:// URL scheme
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: wss://
    unless:
      - id: metadata/package/testing/harness::electron-node-spec-harness
    not:
      - regex: (?i)wss://example
      - regex: (?i)wss://127.0.0.1
      - regex: (?i)wss://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
composite_rules:
  - id: websocket
    desc: WebSocket communication
    crit: notable
    conf: 0.66
    any:
      - id: websocket-class
      - id: websocket-lower
      - id: ws-scheme
      - id: wss-scheme
