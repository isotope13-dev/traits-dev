defaults:
  platforms:
    - unix
    - windows
  mbc: C0002
  attack: T1071.001
traits:
  - id: websocket-class
    desc: WebSocket class reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    count_min: 2
    if:
      type: text
      word: WebSocket
    not:
      - regex: (?i)disabled-by-default
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/lang/scripted::dts-declaration-file
  - id: websockets-python-lib
    desc: Python websockets library reference
    crit: component
    conf: 0.55
    for: [python]
    if:
      type: text
      regex: '\b(import|from)\s+websockets\b|\bwebsockets\.'
  - id: websocket-binary-rdata
    desc: websocket keyword in binary rdata
    crit: component
    conf: 0.4
    for: [binaries]
    if:
      type: text
      regex: 'websocke(t|H)?'
      section: rdata
  - id: websocket-lower
    desc: websocket lowercase reference
    crit: component
    conf: 0.5
    for: [scripts]
    if:
      type: text
      word: websocket
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    not:
      - regex: (?i)disabled-by-default
      - substr: github.com/gorilla/websocket
  - id: websocket-headers
    desc: WebSocket protocol headers
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      regex: Sec-WebSocket-(Key|Version)
  - id: websocket-upgrade-header
    desc: WebSocket HTTP upgrade header
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: 'Upgrade:\s*websocket'
  - id: websocket-connection-upgrade-header
    desc: WebSocket connection upgrade header
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: 'Connection:\s*Upgrade'
  - id: ping-pong-json
    desc: PONG JSON protocol marker
    crit: component
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      regex: '"PONG"\s*[,\])]'
  - id: ping-pong-pair
    desc: PING/PONG protocol marker
    crit: component
    conf: 0.8
    for: [scripts, binaries]
    size_max: 1000000
    if:
      type: text
      regex: '(?i)PING.{0,120}PONG|PONG.{0,120}PING'
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: websocket-constructor-call
    desc: Creates a browser WebSocket connection
    crit: notable
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      exact: WebSocket
  - id: ws-scheme
    desc: References an unencrypted ws:// WebSocket URL
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: ws://
    unless:
      - type: basename
        regex: '\.typ$'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
    not:
      - regex: (?i)%ws://%ws
      - regex: (?i)ws://example
      - regex: (?i)ws://127.0.0.1
      - regex: (?i)ws://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking/
  - id: ws-public-ipv4-endpoint
    desc: WebSocket URL on public IPv4
    crit: notable
    conf: 0.92
    for: [scripts, binaries]
    if:
      type: text
      regex: 'ws://([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{2,5}/'
      is: external_ip
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: websocket-documentation-heading
    desc: WebSocket documentation example heading
    crit: notable
    conf: 0.98
    for: [scripts, binaries]
    if:
      type: text
      exact: 'Example addresses:'

  - id: ws-private-10
    desc: Private 10/8 WebSocket endpoint
    crit: component
    conf: 0.9
    for: [javascript, typescript, scripts, binaries]
    if:
      type: text
      substr: ws://10.
    not:
      - regex: '(?is)(Example addresses:|Example:)[\s\S]{0,600}ws://10\.'
      - substr: 'ws://10.0.0.1:1234'
    unless:
      - id: private-websocket-documentation-example
  - id: ws-private-192
    desc: Private 192.168/16 WebSocket endpoint
    crit: component
    conf: 0.9
    for: [javascript, typescript, scripts, binaries]
    if:
      type: text
      substr: ws://192.168.
    not:
      - regex: '(?is)(Example addresses:|Example:)[\s\S]{0,600}ws://192\.168\.'
      - substr: 'ws://192.168.1.100:8080'
    unless:
      - id: private-websocket-documentation-example
  - id: ws-private-172
    desc: Private 172.16/12 WebSocket endpoint
    crit: component
    conf: 0.9
    for: [javascript, typescript, scripts, binaries]
    if:
      type: text
      regex: 'ws://172\.(1[6-9]|2[0-9]|3[01])\.'
    not:
      - regex: '(?is)(Example addresses:|Example:)[\s\S]{0,600}ws://172\.(1[6-9]|2[0-9]|3[01])\.'
    unless:
      - id: private-websocket-documentation-example
  - id: wss-scheme
    desc: References an encrypted wss:// WebSocket URL
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: wss://
    unless:
      - type: basename
        regex: '\.typ$'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
    not:
      - regex: (?i)wss://example
      - regex: (?i)wss://127.0.0.1
      - regex: (?i)wss://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking/
composite_rules:
  - id: private-websocket-documentation-example
    desc: Documentation-only private WebSocket examples
    crit: exception
    conf: 0.98
    all:
      - id: websocket-documentation-heading
      - id: ws-scheme

  - id: plaintext-private-websocket-endpoint
    desc: Plaintext private-network WebSocket endpoint
    crit: notable
    conf: 0.9
    all:
      - id: ws-scheme
    any:
      - id: ws-private-10
      - id: ws-private-192
      - id: ws-private-172
    unless:
      - id: private-websocket-documentation-example
  - id: websocket
    desc: WebSocket communication
    crit: notable
    conf: 0.66
    any:
      - id: websocket-class
      - id: websocket-lower
      - id: websocket-constructor-call
      - id: micro-behaviors/communications/socket/receive::javascript-socket-message-handler
      - id: micro-behaviors/communications/socket/send::javascript-socket-send
      - id: ws-scheme
      - id: wss-scheme
  - id: websocket-http-upgrade-headers
    desc: WebSocket HTTP upgrade handshake
    crit: notable
    conf: 0.9
    all:
      - id: websocket-upgrade-header
      - id: websocket-connection-upgrade-header
    near_bytes: 200
