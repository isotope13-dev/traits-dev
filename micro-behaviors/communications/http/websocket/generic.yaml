defaults:
  platforms:
    - unix
    - windows
  mbc: C0002
  attack: T1071.001
traits:
  - id: websocket-class
    desc: WebSocket class reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    count_min: 2
    if:
      type: text
      word: WebSocket
    not:
      - regex: (?i)disabled-by-default
    unless:
      - type: text
        substr: "@externs"
      - id: metadata/lang/scripted::dts-declaration-file
  - id: websocket-lower
    desc: websocket lowercase reference
    crit: component
    conf: 0.5
    for: [scripts]
    if:
      type: text
      word: websocket
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    not:
      - regex: (?i)disabled-by-default
      - substr: github.com/gorilla/websocket
  - id: websocket-headers
    desc: WebSocket protocol headers
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      regex: Sec-WebSocket-(Key|Version)
  - id: websocket-constructor-call
    desc: WebSocket constructor call
    crit: notable
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      exact: WebSocket
  - id: ws-scheme
    desc: ws:// URL scheme
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: ws://
    unless:
      - type: basename
        regex: '\.typ$'
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
    not:
      - regex: (?i)%ws://%ws
      - regex: (?i)ws://example
      - regex: (?i)ws://127.0.0.1
      - regex: (?i)ws://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
  - id: wss-scheme
    desc: wss:// URL scheme
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: wss://
    unless:
      - type: basename
        regex: '\.typ$'
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
    not:
      - regex: (?i)wss://example
      - regex: (?i)wss://127.0.0.1
      - regex: (?i)wss://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
composite_rules:
  - id: websocket
    desc: WebSocket communication
    crit: notable
    conf: 0.66
    any:
      - id: websocket-class
      - id: websocket-lower
      - id: websocket-constructor-call
      - id: ws-scheme
      - id: wss-scheme
