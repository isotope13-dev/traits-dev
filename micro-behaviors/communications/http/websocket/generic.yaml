defaults:
  platforms:
    - unix
    - windows
  mbc: C0002
  attack: T1071.001
traits:
  - id: websocket-class
    desc: WebSocket class reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    count_min: 2
    if:
      type: text
      word: WebSocket
    not:
      - regex: (?i)disabled-by-default
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/lang/scripted::dts-declaration-file
  - id: websockets-python-lib
    desc: Python websockets library reference
    crit: component
    conf: 0.55
    for: [python]
    if:
      type: text
      regex: '\b(import|from)\s+websockets\b|\bwebsockets\.'
  - id: websocket-binary-rdata
    desc: websocket keyword in binary rdata
    crit: component
    conf: 0.4
    for: [binaries]
    if:
      type: text
      regex: 'websocke(t|H)?'
      section: rdata
  - id: websocket-lower
    desc: websocket lowercase reference
    crit: component
    conf: 0.5
    for: [scripts]
    if:
      type: text
      word: websocket
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    not:
      - regex: (?i)disabled-by-default
      - substr: github.com/gorilla/websocket
  - id: websocket-headers
    desc: WebSocket protocol headers
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      regex: Sec-WebSocket-(Key|Version)
  - id: ping-pong-json
    desc: PONG JSON protocol marker
    crit: component
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      regex: '"PONG"\s*[,\])]'
  - id: ping-pong-pair
    desc: PING/PONG protocol marker
    crit: component
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      regex: '(?i)PING.{0,120}PONG|PONG.{0,120}PING'
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: websocket-constructor-call
    desc: WebSocket constructor call
    crit: notable
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      exact: WebSocket
  - id: ws-scheme
    desc: ws:// URL scheme
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: ws://
    unless:
      - type: basename
        regex: '\.typ$'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
    not:
      - regex: (?i)%ws://%ws
      - regex: (?i)ws://example
      - regex: (?i)ws://127.0.0.1
      - regex: (?i)ws://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking/
  - id: wss-scheme
    desc: wss:// URL scheme
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: wss://
    unless:
      - type: basename
        regex: '\.typ$'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
    not:
      - regex: (?i)wss://example
      - regex: (?i)wss://127.0.0.1
      - regex: (?i)wss://localhost
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking/
composite_rules:
  - id: websocket
    desc: WebSocket communication
    crit: notable
    conf: 0.66
    any:
      - id: websocket-class
      - id: websocket-lower
      - id: websocket-constructor-call
      - id: ws-scheme
      - id: wss-scheme
