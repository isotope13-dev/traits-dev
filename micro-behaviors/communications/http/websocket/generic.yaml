# WebSocket Operations
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1071.001
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  mbc: "C0002"
  attack: "T1071.001"
traits:
  # === WebSocket atomic indicators ===
  - id: websocket-class
    desc: WebSocket class reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "WebSocket"
    not:
      - regex: "(?i)disabled-by-default"
  - id: websocket-lower
    desc: websocket lowercase reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "websocket"
    not:
      - regex: "(?i)disabled-by-default"
  - id: ws-scheme
    desc: ws:// URL scheme
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: "ws://"
    not:
      - regex: "(?i)ws://example"
      - regex: "(?i)ws://127.0.0.1"
      - regex: "(?i)ws://localhost"
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
  - id: wss-scheme
    desc: wss:// URL scheme
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: "wss://"
    not:
      - regex: "(?i)wss://example"
      - regex: "(?i)wss://127.0.0.1"
      - regex: "(?i)wss://localhost"
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
composite_rules:
  - id: websocket
    desc: WebSocket communication
    crit: notable
    conf: 0.66
    any:
      - id: websocket-class
      - id: websocket-lower
      - id: ws-scheme
      - id: wss-scheme
