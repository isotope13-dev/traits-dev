defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  mbc: C0002
traits:
  - id: nostr-simplepool
    desc: Nostr SimplePool relay client
    if:
      type: symbol
      exact: SimplePool
  - id: nostr-subscribe-many
    desc: Nostr relay subscription
    if:
      type: text
      regex: '\bpool\.subscribeMany\s*\('
  - id: nostr-relay-publish
    desc: Nostr relay publish call
    if:
      type: text
      regex: '\bpool\.publish\s*\('
  - id: nostr-default-public-relays
    desc: Nostr public relay defaults
    crit: baseline
    if:
      type: text
      regex: 'wss://(relay\.damus\.io|nos\.lol)'
  - id: nostr-url-prefix
    desc: Nostr address URL prefix
    crit: baseline
    if:
      type: text
      regex: 'nostr:(npub1|nsec1|[0-9a-f]{64})'
composite_rules:
  - id: nostr-relay-client
    desc: Nostr relay client behavior
    crit: notable
    conf: 0.95
    all:
      - id: nostr-simplepool
    any:
      - id: nostr-subscribe-many
      - id: nostr-relay-publish
