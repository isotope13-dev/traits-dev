defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, scripts, binaries]
traits:
  - id: tiktok-android-trill-ua
    desc: Spoofs TikTok Android Trill mobile User-Agent
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: com.ss.android.ugc.trill/
  - id: android-cronet-ua
    desc: Spoofs Android Cronet User-Agent stack
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: Android [0-9].{0,120}Cronet/
    unless:
      - id: well-known/lib/youtube-dl/
