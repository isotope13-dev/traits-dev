# Go HTTP User-Agent handling
defaults:
  for: [go]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: go-user-agent-header-set
    desc: Sets HTTP User-Agent header
    crit: notable
    conf: 0.9
    attack: T1071.001
    mbc: C0002
    if:
      type: text
      substr: 'Header.Set("User-Agent"'
