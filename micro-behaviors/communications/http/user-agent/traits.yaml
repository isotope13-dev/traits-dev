defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.7
traits:
  - id: user-agent-header-dup
    desc: HTTP User-Agent header
    if:
      type: text
      substr: 'User-Agent:'
  - id: browser-mozilla-5-0
    desc: Mozilla/5.0 User-Agent prefix
    if:
      type: text
      substr: Mozilla/5.0 (
  - id: python-requests-ua
    desc: Python requests User-Agent
    if:
      type: text
      regex: python-requests/[0-9]
  - id: curl-ua
    desc: curl User-Agent
    if:
      type: text
      regex: curl/[0-9]
  - id: wget-ua
    desc: wget User-Agent
    if:
      type: text
      regex: Wget/[0-9]
  - id: windows-phone-mobile-ua
    desc: Windows Phone mobile browser User-Agent
    crit: notable
    conf: 0.9
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      substr: Mozilla/5.0 (Windows Phone 10.0; Android 6.0.1; Microsoft; RM-1152)
composite_rules:
  - id: common-user-agents
    desc: Common HTTP User-Agent strings
    any:
      - id: browser-mozilla-5-0
      - id: python-requests-ua
      - id: curl-ua
      - id: wget-ua
