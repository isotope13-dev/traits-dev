defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: navigator-useragent-read
    desc: Reads browser User-Agent string
    crit: notable
    conf: 0.75
    for: [javascript, typescript, html]
    attack: T1082
    if:
      # Structured member facts exclude documentation and comments.
      type: symbol
      kind: member
      exact: navigator.userAgent
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version
  - id: browser-mozilla-5-0
    desc: References Mozilla/5.0 User-Agent prefix
    if:
      type: text
      substr: Mozilla/5.0 (
  - id: msie6-windows-nt52-ua
    desc: MSIE 6 / Windows NT 5.2 User-Agent
    if:
      type: text
      exact: "User-Agent: Mozilla/4.0 (compatible; MSIE 6.0; Windows NT 5.2; );"
  - id: msie7-windows-nt51-ua
    desc: MSIE 7 / Windows NT 5.1 User-Agent
    if:
      type: text
      exact: "User-Agent: Mozilla/4.0 (compatible; MSIE 7.0; Windows NT 5.1)"
  - id: msie8-windows-nt51-ua
    desc: MSIE 8 / Windows NT 5.1 User-Agent
    if:
      type: text
      exact: "User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 5.1; Trident/4.0)"
  - id: legacy-msie-ua-encoded
    desc: Encoded legacy MSIE User-Agent
    crit: notable
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    if:
      type: encoded
      encoding: xor
      regex: '^User-Agent: Mozilla/4\.0 \(compatible; MSIE [6-8]\.0; Windows NT 5\.[12]'
  - id: python-requests-ua
    desc: Python requests User-Agent
    if:
      type: text
      regex: python-requests/[0-9]
  - id: curl-ua
    desc: curl User-Agent
    if:
      type: text
      regex: curl/[0-9]
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: wget-ua
    desc: wget User-Agent
    if:
      type: text
      regex: Wget/[0-9]

  - id: telegram-bot-api-user-agent-literal
    desc: Telegram Bot API User-Agent token
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)\bTelegramBot(/[0-9][A-Za-z0-9._-]*|\b)'
  - id: hardcoded-user-agent-list
    desc: Contains multiple hardcoded User-Agent strings
    crit: notable
    conf: 0.9
    count_min: 3
    if:
      type: literal
      kind: string
      regex: 'Mozilla/[45]\.0 \(|python-requests/[0-9]|curl/[0-9]|Wget/[0-9]'
  - id: windows-phone-mobile-ua
    desc: Windows Phone mobile browser User-Agent
    crit: notable
    conf: 0.9
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      substr: Mozilla/5.0 (Windows Phone 10.0; Android 6.0.1; Microsoft; RM-1152)
  - id: hardcoded-windows-browser-ua-literal
    desc: Hardcoded Windows browser User-Agent literal
    crit: notable
    conf: 0.82
    if:
      type: literal
      kind: string
      regex: 'Mozilla/5\.0 \(Windows NT [^)]+\).{0,120}Safari/[0-9]'
  - id: legacy-msie9-ua-pe
    desc: Legacy IE9 User-Agent string
    crit: notable
    conf: 0.88
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: "MSIE 9"
  - id: ipad-safari-15-ua-pe
    desc: iPad Safari 15 User-Agent string
    crit: suspicious
    conf: 0.96
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: Mozilla/5.0 (iPad; CPU OS 15_7_2 like Mac OS X)
  - id: read-server-ua-php
    desc: "Reads inbound User-Agent request header"
    crit: notable
    conf: 0.8
    for: [php]
    if:
      type: text
      regex: '(?i)\$_SERVER\[[''"]HTTP_USER_AGENT[''"]\]'
    unless:
      - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
  - id: ua-windows-os-check-php
    desc: Inbound User-Agent Windows OS token check
    crit: notable
    conf: 0.7
    for: [php]
    if:
      type: text
      regex: '(?i)\$_SERVER.{0,40}HTTP_USER_AGENT.{0,40}(Windows|Win32|Win64)'
  - id: bot-user-agent-list--rx-1
    desc: Contains a crawler User-Agent string
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)(googlebot|bingbot)'
  - id: bot-user-agent-list--rx-2
    desc: Search-engine crawler User-Agent marker
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)(baiduspider|yandexbot)'
  - id: bot-user-agent-list--rx-3
    desc: Social crawler User-Agent marker
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)(facebot|facebookexternalhit)'
  - id: bot-user-agent-list--rx-4
    desc: Social or archive crawler User-Agent marker
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)(twitterbot|ia_archiver)'
  - id: bot-user-agent-list--rx-5
    desc: Google verification crawler User-Agent marker
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)(Google-Site-Verification|Google-InspectionTool)'
  - id: bot-user-agent-list--rx-6
    desc: Google service crawler User-Agent marker
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)(APIs-Google|Google-Ads)'
composite_rules:
  - id: common-user-agents
    desc: Common HTTP User-Agent strings
    any:
      - id: browser-mozilla-5-0
      - id: hardcoded-windows-browser-ua-literal
      - id: python-requests-ua
      - id: curl-ua
      - id: wget-ua
  - id: bot-user-agent-list
    desc: List of search-engine or social crawler User-Agents
    crit: notable
    conf: 1.0
    any:
      - id: bot-user-agent-list--rx-1
      - id: bot-user-agent-list--rx-2
      - id: bot-user-agent-list--rx-3
      - id: bot-user-agent-list--rx-4
      - id: bot-user-agent-list--rx-5
      - id: bot-user-agent-list--rx-6
  - id: bot-user-agent-detection
    desc: Detects crawler requests from the inbound User-Agent header
    crit: notable
    conf: 0.85
    all:
      - id: read-server-ua-php
      - id: bot-user-agent-list
