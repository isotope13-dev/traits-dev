defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: browser-mozilla-5-0
    desc: Mozilla/5.0 User-Agent prefix
    if:
      type: text
      substr: Mozilla/5.0 (
  - id: python-requests-ua
    desc: Python requests User-Agent
    if:
      type: text
      regex: python-requests/[0-9]
  - id: curl-ua
    desc: curl User-Agent
    if:
      type: text
      regex: curl/[0-9]
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: wget-ua
    desc: wget User-Agent
    if:
      type: text
      regex: Wget/[0-9]
  - id: windows-phone-mobile-ua
    desc: Windows Phone mobile browser User-Agent
    crit: notable
    conf: 0.9
    for:
      - pe
    platforms:
      - windows
    if:
      type: text
      substr: Mozilla/5.0 (Windows Phone 10.0; Android 6.0.1; Microsoft; RM-1152)
  - id: hardcoded-windows-browser-ua-literal
    desc: Hardcoded Windows browser User-Agent literal
    crit: notable
    conf: 0.82
    for: [javascript, typescript, scripts, source]
    if:
      type: literal
      kind: string
      regex: 'Mozilla/5\.0 \(Windows NT [^)]+\).{0,120}Safari/[0-9]'
  - id: legacy-msie9-ua-pe
    desc: Legacy IE9 User-Agent string
    crit: notable
    conf: 0.88
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: "MSIE 9"
  - id: ipad-safari-15-ua-pe
    desc: iPad Safari 15 User-Agent string
    crit: suspicious
    conf: 0.96
    for: [pe]
    platforms: [windows]
    if:
      type: text
      substr: Mozilla/5.0 (iPad; CPU OS 15_7_2 like Mac OS X)
  - id: read-server-ua-php
    desc: Reads inbound User-Agent request header ($_SERVER)
    crit: notable
    conf: 0.8
    for: [php]
    if:
      type: text
      regex: '(?i)\$_SERVER\[[''"]HTTP_USER_AGENT[''"]\]'
    unless:
      - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
composite_rules:
  - id: common-user-agents
    desc: Common HTTP User-Agent strings
    any:
      - id: browser-mozilla-5-0
      - id: hardcoded-windows-browser-ua-literal
      - id: python-requests-ua
      - id: curl-ua
      - id: wget-ua
