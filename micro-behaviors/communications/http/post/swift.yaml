defaults:
  platforms: [windows, unix]
  for: [swift]
  mbc: C0002
  attack: T1071.001

traits:
  - id: swift-urlrequest-post-method
    desc: Swift URLRequest POST method
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: request.httpMethod = "POST"

  - id: swift-urlrequest-http-body
    desc: Swift URLRequest HTTP body
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: request.httpBody

  - id: swift-urlsession-data-task
    desc: Swift URLSession data task
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "dataTask(with: request"

  - id: swift-jsonserialization-data
    desc: Swift JSONSerialization data
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: JSONSerialization.data
