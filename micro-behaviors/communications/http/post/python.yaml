# HTTP POST - Python session and requests patterns
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  mbc: C0002
  attack: T1071.001
traits:
  - id: session-post
    desc: HTTP POST via requests Session object
    crit: notable
    conf: 0.8
    if:
      type: symbol
      substr: session.post
  - id: session-post-raw
    desc: HTTP POST via session.post pattern
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: "session\\.post\\("
