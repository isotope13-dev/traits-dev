# HTTP POST - Python session and requests patterns
defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: C0002
  attack: T1071.001
traits:
  - id: python-post-method-literal
    desc: Python POST method literal
    # Neutral building block: the bare "POST" string literal. Carries no
    # standalone signal; exfiltration/upload composites reference it
    # cross-directory alongside an HTTP client + body-serialization leg.
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: POST
  - id: python-base64-json-body
    desc: Python base64-encoded JSON HTTP body
    crit: component
    conf: 0.86
    if:
      type: text
      regex: base64\.b64encode.{0,120}json\.dumps|json\.dumps.{0,120}base64\.b64encode

  - id: session-post-call
    desc: Python session .post call
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: session.post

  - id: python-httpclient-class
    desc: Python http.client HTTP(S) transport
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: http\.client\.HTTPS?Connection

  - id: python-httpclient-post-method
    desc: Python HTTP client request call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: conn.request

composite_rules:
  - id: python-httpclient-post-transport
    desc: Python http.client POST transport
    crit: notable
    conf: 0.94
    near_bytes: 6000
    all:
      - id: python-httpclient-class
      - id: python-httpclient-post-method
      - id: python-post-method-literal

  - id: session-post
    desc: Python requests Session POST request
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-session
      - id: session-post-call
