defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  mbc: C0002
  attack: T1071.001
traits:
  - id: post
    desc: HTTP POST method
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: '[\"\x27]POST[\"\x27]'
  - id: http-post-call
    desc: http.post call
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: http.post
  - id: multipart-form
    desc: multipart/form-data content type
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: multipart/form-data
  - id: formdata-class
    desc: FormData class
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: FormData
    unless:
      - type: raw
        substr: "@externs"
  - id: enctype-attr
    desc: enctype attribute
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: \benctype\s*=
  - id: url-encoded-content-type
    desc: application/x-www-form-urlencoded content type
    crit: notable
    conf: 0.7
    unless:
      - type: string_value
        substr: google/protobuf/descriptor.proto
    if:
      type: string_value
      substr: application/x-www-form-urlencoded
  - id: post-ast
    desc: HTTP POST AST calls
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      regex: ^((http|https)\.post|axios\.post|fetch)$
composite_rules:
  - id: post-method-detection
    desc: Makes HTTP POST requests (method detection)
    crit: notable
    conf: 0.75
    any:
      - id: post
      - id: http-post-call
  - id: post-form
    desc: HTTP form data upload
    crit: notable
    conf: 0.75
    any:
      - id: multipart-form
      - id: formdata-class
      - id: enctype-attr
      - id: url-encoded-content-type
