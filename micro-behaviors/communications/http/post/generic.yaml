defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, php, html, shell]
  mbc: C0002
  attack: T1071.001
traits:
  - id: post-request-line
    desc: HTTP POST request line
    crit: notable
    conf: 0.78
    for: [binaries, scripts]
    if:
      type: text
      regex: \bPOST\s+\S+\s+HTTP/1\.[01]\b
  - id: native-post-request-line
    desc: Native HTTP POST request line
    crit: notable
    conf: 0.82
    for: [c, cpp, objc, rust, elf, macho]
    if:
      type: text
      regex: 'POST .{0,120} HTTP/1\.[01]'
  - id: post
    desc: HTTP POST method
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '[\"\x27]POST[\"\x27]'
  - id: http-post-call
    desc: http.post call
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: http.post
  - id: fetch-post-call
    desc: fetch with POST method
    crit: notable
    conf: 0.72
    for: [javascript, typescript]
    if:
      type: text
      regex: fetch\s*\(.{0,100}method:\s*["\'](POST|PUT)
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: http-request-post
    desc: http.request with POST
    crit: notable
    conf: 0.7
    for: [javascript, typescript]
    if:
      type: text
      regex: http\.request\(.{0,100}method:\s*["\'](POST|PUT)
  - id: raw-content-length-header
    desc: Length-delimited HTTP payload
    crit: notable
    conf: 0.9
    for: [pe, dll, javascript, typescript]
    if:
      type: text
      substr: Content-Length
  - id: request-write-payload-variable
    desc: HTTP request sends payload variable
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '^r(equest|eq)?\.(write|post|send)$'
      arg:
        kind: identifier
        name: payload
  - id: request-write-file-data-variable
    desc: HTTP request sends file data variable
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '^r(equest|eq)?\.(write|post|send)$'
      arg:
        kind: identifier
        name: fileData
  - id: multipart-form
    desc: multipart/form-data content type
    crit: component
    conf: 0.6
    if:
      type: text
      substr: multipart/form-data
    unless:
      - id: metadata/file/string/identity::python3-interpreter-basename
      - id: metadata/library/runtime/
  - id: formdata-class
    desc: FormData constructor call
    crit: notable
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bnew\s+FormData\s*\('
    unless:
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/runtime/
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version
      - id: metadata/package/testing/harness/runtime/
  - id: enctype-attr
    desc: enctype attribute
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \benctype\s*=
    unless:
      - id: metadata/document/html/
  - id: url-encoded-content-type
    desc: application/x-www-form-urlencoded content type
    crit: component
    conf: 0.7
    unless:
      - type: text
        substr: google/protobuf/descriptor.proto
      - type: text
        substr: Vungle Third-Party MRAID Template
      - type: basename
        exact: System.Net.Http.dll
    if:
      type: text
      substr: application/x-www-form-urlencoded
  - id: post-ast
    desc: HTTP POST request via client call
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: ^((http|https)\.post|axios\.post)$
  - id: lua-http-request
    desc: Lua HTTP request call
    crit: notable
    conf: 0.82
    for: [lua]
    if:
      type: symbol
      exact: http.request
  - id: lua-post-method
    desc: Lua POST method literal
    crit: component
    conf: 0.78
    for: [lua]
    if:
      type: string_literal
      exact: POST
composite_rules:
  - id: post-method-detection
    desc: HTTP POST request method markers
    crit: notable
    conf: 0.75
    any:
      - id: post-request-line
      - id: post
      - id: http-post-call
      - id: lua-http-post-request
  - id: post-form
    desc: HTTP multipart form-data upload
    crit: notable
    conf: 0.75
    any:
      - id: multipart-form
      - id: formdata-class
      - id: enctype-attr
      - id: url-encoded-content-type
  - id: lua-http-post-request
    desc: Lua HTTP POST request
    crit: notable
    conf: 0.86
    all:
      - id: lua-http-request
      - id: lua-post-method
