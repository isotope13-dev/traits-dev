defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, php, html, shell]
  mbc: C0002
  attack: T1071.001
traits:
  - id: post-request-line
    desc: HTTP POST request line
    crit: notable
    conf: 0.78
    for: [binaries, scripts]
    if:
      type: text
      regex: \bPOST\s+\S+\s+HTTP/1\.[01]\b
  - id: post
    desc: HTTP POST method
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '[\"\x27]POST[\"\x27]'
  - id: http-post-call
    desc: http.post call
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: http.post
  - id: multipart-form
    desc: multipart/form-data content type
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: multipart/form-data
    unless:
      - type: basename
        exact: python3
      - id: metadata/library/runtime::next-edge-runtime-bundle
  - id: formdata-class
    desc: FormData class
    crit: notable
    conf: 0.6
    if:
      type: text
      word: FormData
    unless:
      - type: text
        substr: "@externs"
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/package/testing/harness::electron-node-spec-harness
  - id: enctype-attr
    desc: enctype attribute
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \benctype\s*=
  - id: url-encoded-content-type
    desc: application/x-www-form-urlencoded content type
    crit: component
    conf: 0.7
    unless:
      - type: text
        substr: google/protobuf/descriptor.proto
      - type: text
        substr: Vungle Third-Party MRAID Template
      - type: basename
        exact: System.Net.Http.dll
    if:
      type: text
      substr: application/x-www-form-urlencoded
  - id: post-ast
    desc: HTTP POST AST calls
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: ast
      kind: call
      regex: ^((http|https)\.post|axios\.post|fetch)$
composite_rules:
  - id: post-method-detection
    desc: Makes HTTP POST requests (method detection)
    crit: notable
    conf: 0.75
    any:
      - id: post-request-line
      - id: post
      - id: http-post-call
  - id: post-form
    desc: HTTP form data upload
    crit: notable
    conf: 0.75
    any:
      - id: multipart-form
      - id: formdata-class
      - id: enctype-attr
      - id: url-encoded-content-type
