defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, php, html, shell]
  mbc: C0002
  attack: T1071.001
traits:
  - id: post-request-line
    desc: HTTP POST request line
    crit: notable
    conf: 0.78
    for: [binaries, scripts]
    if:
      type: text
      regex: \bPOST\s+\S+\s+HTTP/1\.[01]\b
  - id: native-post-request-line
    desc: Native HTTP POST request line
    crit: notable
    conf: 0.82
    for: [c, cpp, objc, rust, elf, macho]
    if:
      type: text
      regex: 'POST .{0,120} HTTP/1\.[01]'
  - id: post
    desc: HTTP POST method string literal
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '[\"\x27]POST[\"\x27]'
  - id: http-post-call
    desc: http.post call
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: http.post
  - id: fetch-post-call
    desc: Sends an HTTP POST request with fetch()
    crit: notable
    conf: 0.72
    for: [javascript, typescript]
    if:
      type: text
      regex: fetch\s*\(.{0,100}method:\s*["\']POST
    unless:
      - id: metadata/package/testing/harness/runtime/
  # Base64-wrapping a JSON POST body is a common exfil packing step in
  # browser extensions and page injectors; pair with cookie/storage sinks
  # in objectives rather than treating the encode alone as hostile.
  - id: fetch-post-b64encode-body
    desc: Fetch POST body passed through b64encode
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'method:\s*["'']POST["'']\s*,\s*body:\s*b64encode\s*\('
  - id: no-cors-before-post
    desc: No-cors mode before POST
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'mode:\s*["'']no-cors["''].{0,120}method:\s*["'']POST["'']'
  - id: post-before-no-cors
    desc: POST method before no-cors
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'method:\s*["'']POST["''].{0,120}mode:\s*["'']no-cors["'']'
  - id: http-request-post
    desc: http.request with POST
    crit: notable
    conf: 0.7
    for: [javascript, typescript]
    if:
      type: text
      regex: http\.request\(.{0,100}method:\s*["\']POST

  - id: node-https-request-post
    desc: https.request with POST
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: text
      regex: https\.request\(.{0,180}method:\s*["'']POST

  - id: request-options-post-method
    desc: Sets POST as an HTTP request method
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bmethod\s*:\s*["'']POST["'']'
  - id: raw-content-length-header
    desc: Sets an HTTP Content-Length header
    crit: notable
    conf: 0.9
    for: [pe, dll, javascript, typescript]
    if:
      type: text
      regex: '(["'']Content-Length["'']\s*:|\.(set|append)\s*\(\s*["'']Content-Length["''])'
      case_insensitive: true
  - id: request-write-payload-variable
    desc: HTTP request sends payload variable
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '^r(equest|eq)?\.(write|post|send)$'
      arg:
        kind: identifier
        name: payload
  - id: request-write-file-data-variable
    desc: HTTP request sends file data variable
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '^r(equest|eq)?\.(write|post|send)$'
      arg:
        kind: identifier
        name: fileData
  - id: multipart-form
    desc: multipart/form-data content type
    crit: component
    conf: 0.6
    if:
      type: text
      substr: multipart/form-data
    unless:
      - id: metadata/file/string/identity::python3-interpreter-basename
      - id: metadata/library/runtime/
  - id: formdata-class
    desc: Constructs browser FormData
    crit: notable
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bnew\s+FormData\s*\('
    unless:
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/runtime/
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version
      - id: metadata/package/testing/harness/runtime/
  - id: enctype-attr
    desc: HTML form encoding attribute
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \benctype\s*=
    unless:
      - id: metadata/document/html/
  - id: url-encoded-content-type
    desc: Uses URL-encoded HTTP form content
    crit: component
    conf: 0.7
    unless:
      - type: text
        substr: google/protobuf/descriptor.proto
      - type: text
        substr: Vungle Third-Party MRAID Template
      - type: basename
        exact: System.Net.Http.dll
    if:
      type: text
      substr: application/x-www-form-urlencoded
  - id: post-ast
    desc: HTTP POST request via client call
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: ^((http|https)\.post|axios\.post)$
  - id: client-wrapper-post-call
    desc: HTTP client wrapper POST call
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(this\.)?(client|https?|request)\.post\s*\('
  - id: javascript-formdata-file-field
    desc: JavaScript FormData file field
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'new\s+FormData\s*\(\s*\)[\s\S]{0,300}\.append\s*\(\s*["'']file["'']'
  - id: javascript-http-request-post
    desc: JavaScript HttpRequest POST call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bnew\s+(http\.)?HttpRequest\s*\(\s*["'']POST["'']'
  - id: lua-http-request
    desc: Lua HTTP request call
    crit: notable
    conf: 0.82
    for: [lua]
    if:
      type: symbol
      exact: http.request
  - id: lua-post-method
    desc: Lua POST method literal
    crit: component
    conf: 0.78
    for: [lua]
    if:
      type: string_literal
      exact: POST
  - id: lua-lcurl-post-option
    desc: Lua libcurl POST option
    crit: notable
    conf: 0.88
    for: [lua]
    if:
      type: text
      substr: curl.OPT_POST
  - id: xhr-post-open
    desc: Opens an XMLHttpRequest with HTTP POST
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.open\s*\(\s*["'']POST["'']'

composite_rules:
  - id: post-method-detection
    desc: Uses an HTTP POST request method
    crit: notable
    conf: 0.75
    any:
      - id: post-request-line
      - id: http-post-call
      - id: lua-http-post-request
  - id: post-form
    desc: HTTP form submission encoding
    crit: notable
    conf: 0.75
    any:
      - id: multipart-form
      - id: formdata-class
      - id: enctype-attr
      - id: url-encoded-content-type
  - id: javascript-formdata-file-upload-request
    desc: JavaScript multipart file upload request
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    near_lines: 12
    all:
      - id: javascript-formdata-file-field
      - id: javascript-http-request-post
  - id: lua-http-post-request
    desc: Lua HTTP POST request
    crit: notable
    conf: 0.86
    all:
      - id: lua-http-request
      - id: lua-post-method
  - id: no-cors-post-request
    desc: No-cors POST request
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    any:
      - id: no-cors-before-post
      - id: post-before-no-cors
