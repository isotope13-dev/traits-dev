defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [go, binaries]
  mbc: C0002
  attack: T1071.001
traits:
  - id: http-post
    desc: Go http.Post call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: http.Post
  - id: http-new-request
    desc: Go http.NewRequest call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: http.NewRequest
  - id: http-post-form
    desc: Go http.PostForm call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: http.PostForm
composite_rules:
  - id: http-post-methods
    desc: Go HTTP POST methods
    crit: notable
    conf: 0.85
    any:
      - id: http-post
      - id: http-new-request
      - id: http-post-form
