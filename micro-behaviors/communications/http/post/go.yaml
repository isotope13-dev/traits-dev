defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  mbc: C0002
  attack: T1071.001
traits:
  - id: http-newrequest-post
    desc: Go HTTP POST request construction
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: text
      regex: 'http\.NewRequest\s*\(\s*"POST"'
  - id: http-newrequest-post-literal-url
    desc: Go HTTP POST to literal URL
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: text
      regex: 'http\.NewRequest\s*\(\s*"POST"\s*,\s*"https?://'
  - id: http-post
    desc: Go http.Post call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: http.Post
  - id: http-post-form
    desc: Go http.PostForm call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: http.PostForm
  - id: go-http-post-method
    desc: Go HTTP Post method call
    crit: notable
    conf: 0.75
    for: [go]
    if:
      type: text
      regex: '\.(Post|PostForm)\s*\('
  - id: url-values-form
    desc: Go URL form value builder
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: symbol
      exact: data.Set
  - id: url-values-encode
    desc: Go URL form encoding
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: symbol
      exact: data.Encode
composite_rules:
  - id: http-post-methods
    desc: Go HTTP POST methods
    crit: notable
    conf: 0.85
    any:
      - id: http-newrequest-post
      - id: http-newrequest-post-literal-url
      - id: http-post
      - id: http-post-form
  - id: go-url-encoded-form-post
    desc: Go URL-encoded form POST
    crit: notable
    conf: 0.88
    all:
      - id: http-post-methods
      - id: url-values-encode
      - id: micro-behaviors/communications/http/headers::go-content-type-set
    any:
      - id: url-values-form
      - id: micro-behaviors/communications/http/lib/netlib::go-http-newrequest
