defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: C0002
  attack: T1071.001
traits:
  # `'method' => 'POST'` inside a PHP HTTP request options array — the standard
  # idiom for wp_remote_post / wp_remote_request / Guzzle / cURL option arrays.
  # A neutral request-method capability, not an upload or exfil signal on its
  # own; exfil/webshell composites combine it with a loot path or remote target.
  - id: php-request-options-post-method
    desc: PHP HTTP request options POST method
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "['\"]method['\"]\\s*=>\\s*['\"]POST['\"]"

composite_rules:
  - id: php-stream-context-http-post
    desc: PHP sends HTTP POST via stream context
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/request/options::php-stream-context-create
      - id: php-request-options-post-method
      - id: micro-behaviors/fs/read/file::file-get-contents
    near_bytes: 4096
