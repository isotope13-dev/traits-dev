defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  mbc: C0002
  attack: T1071.001
traits:
  - id: java-post-method
    desc: Java HTTP POST method
    crit: component
    conf: 0.8
    if:
      type: raw
      exact: POST
  - id: java-json-content-type
    desc: Java JSON content type
    crit: component
    conf: 0.78
    if:
      type: raw
      exact: application/json
composite_rules:
  - id: java-json-post
    desc: Java JSON POST request
    crit: notable
    conf: 0.86
    all:
      - id: java-post-method
      - id: java-json-content-type
