defaults:
  platforms: [windows, unix, android]
  for: [class, jar, zip]
  mbc: C0002
  attack: T1071.001
traits:
  - id: java-post-method-source
    desc: Java HTTP POST request method
    crit: component
    conf: 0.9
    for: [java]
    if:
      type: text
      exact: 'setRequestMethod("POST")'
  - id: java-do-output-source
    desc: Java HTTP request body enabled
    crit: component
    conf: 0.86
    for: [java]
    if:
      type: text
      exact: setDoOutput(true)
  - id: java-octet-stream-source
    desc: Java octet-stream content type
    crit: component
    conf: 0.82
    for: [java]
    if:
      type: text
      word: application/octet-stream
  - id: java-post-method
    desc: Java HTTP POST method
    crit: component
    conf: 0.8
    if:
      type: text
      exact: POST
  - id: jvm-bytecode-do-output
    desc: Java bytecode HTTP output body enabled
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: setDoOutput
  - id: airlift-prepare-post-bytecode
    desc: Airlift Java HTTP POST request
    crit: notable
    conf: 0.96
    if:
      type: import
      exact: io/airlift/http/client/Request$Builder.preparePost
  - id: jvm-bytecode-post-method
    desc: Java bytecode HTTP POST method
    crit: component
    conf: 0.84
    if:
      type: hex
      pattern: 50 4F 53 54
  - id: kotlin-bytecode-copyto-default
    desc: Kotlin bytecode copyTo helper
    crit: notable
    conf: 0.86
    if:
      type: hex
      pattern: 63 6F 70 79 54 6F 24 64 65 66 61 75 6C 74
  - id: java-json-content-type
    desc: Java JSON content type
    crit: component
    conf: 0.78
    if:
      type: text
      exact: application/json
  - id: jvm-post-method-source
    desc: Java/Kotlin HTTP POST request method
    crit: component
    conf: 0.9
    for: [java, kotlin]
    if:
      type: text
      regex: 'setRequestMethod\s*\(\s*"POST"\s*\)|requestMethod\s*=\s*"POST"'
  - id: jvm-urlconnection-open-java-source
    desc: Java opens URLConnection
    crit: component
    conf: 0.88
    for: [java]
    if:
      type: text
      regex: 'Https?URLConnection.{0,80}openConnection\s*\('
  - id: jvm-urlconnection-open-kotlin-source
    desc: Kotlin opens URLConnection
    crit: component
    conf: 0.88
    for: [kotlin]
    if:
      type: text
      regex: 'openConnection\s*\(\)\s+as\s+Https?URLConnection'
  - id: jvm-do-output-source
    desc: Java/Kotlin HTTP request body enabled
    crit: component
    conf: 0.86
    for: [java, kotlin]
    if:
      type: text
      regex: 'setDoOutput\s*\(\s*true\s*\)|doOutput\s*=\s*true'
  - id: jvm-http-body-write-source
    desc: Java/Kotlin writes HTTP request body
    crit: notable
    conf: 0.88
    for: [java, kotlin]
    if:
      type: text
      regex: '(getOutputStream\s*\(\)|\.outputStream\b)[\s\S]{0,160}\.write\s*\('
  - id: kotlin-http-body-copy-source
    desc: Kotlin copies stream to HTTP body
    crit: notable
    conf: 0.88
    for: [kotlin]
    if:
      type: text
      regex: 'outputStream[\s\S]{0,180}copyTo\s*\('
composite_rules:
  - id: jvm-urlconnection-open-source
    desc: Java/Kotlin opens URLConnection
    crit: component
    conf: 0.89
    for: [java, kotlin]
    any:
      - id: jvm-urlconnection-open-java-source
      - id: jvm-urlconnection-open-kotlin-source
  - id: java-urlconnection-post-source
    desc: Java URLConnection POST request
    crit: notable
    conf: 0.92
    for: [java]
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection
      - id: java-post-method-source
      - id: java-do-output-source
  - id: jvm-urlconnection-post-source
    desc: Java/Kotlin URLConnection POST request
    crit: notable
    conf: 0.93
    for: [java, kotlin]
    all:
      - id: jvm-urlconnection-open-source
      - id: jvm-post-method-source
      - id: jvm-do-output-source
  - id: jvm-urlconnection-post-bytecode
    desc: Java bytecode URLConnection POST request
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
      - id: jvm-bytecode-post-method
      - id: jvm-bytecode-do-output
  - id: java-json-post
    desc: Java JSON POST request
    crit: notable
    conf: 0.86
    all:
      - id: java-post-method
      - id: java-json-content-type
