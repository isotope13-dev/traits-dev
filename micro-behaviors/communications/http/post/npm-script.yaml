# Outbound HTTP POST capability expressed in an npm package.json script
# (curl -X POST / --data / -d). A POST sends data OUT — the primitive behind
# build-hook triggers, telemetry/beacons, and exfiltration alike; intent is
# decided by the install-hook / exfil composites, not here. scripts[*] matches
# any script value.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: C0002
  attack: T1071.001
traits:
  - id: npm-script-post
    desc: npm script sends an HTTP POST
    ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
    if:
      type: value
      path: 'scripts[*]'
      # Keep the option tied to the same shell command.  A build script may
      # download an input and then pass a later `-d` option to unzip or another
      # tool; crossing `&&`, `;`, or `|` would mislabel that as curl POST data.
      regex: '\bcurl\b[^;&|\n]{0,120}(-X\s*POST|--data\b|\s-d\b)'
  - id: npm-script-node-http-post
    desc: npm script Node HTTP POST
    ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
    if:
      type: value
      path: 'scripts[*]'
      regex: '\bhttps?\.request\b[\s\S]{0,400}\bmethod\s*:\s*["'']POST["'']'

composite_rules:
  - id: npm-script-http-post
    desc: npm script sends an HTTP POST
    ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
    any:
      - id: npm-script-post
      - id: npm-script-node-http-post
