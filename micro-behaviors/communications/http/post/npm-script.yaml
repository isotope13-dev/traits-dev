# Outbound HTTP POST capability expressed in an npm package.json script
# (curl -X POST / --data / -d). A POST sends data OUT — the primitive behind
# build-hook triggers, telemetry/beacons, and exfiltration alike; intent is
# decided by the install-hook / exfil composites, not here. scripts[*] matches
# any script value.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: C0002
  attack: T1071.001
traits:
  - id: npm-script-post
    desc: npm script sends an HTTP POST
    if:
      type: value
      path: 'scripts[*]'
      regex: '\bcurl\b[^"\n]{0,120}(-X\s*POST|--data\b|\s-d\b)'
