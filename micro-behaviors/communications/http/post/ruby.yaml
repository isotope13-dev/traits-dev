# HTTP POST - Ruby
defaults:
  platforms: [windows, unix]
  for: [ruby]
  mbc: C0002
  crit: notable
traits:
  - id: net-http-post
    desc: Net::HTTP POST request
    conf: 0.85
    if:
      type: text
      regex: Net::HTTP::(Post|post_form)|\.post\b
  - id: ruby-octet-stream-post
    desc: Net::HTTP octet-stream POST request
    conf: 0.88
    if:
      type: text
      regex: "Net::HTTP::Post[\\s\\S]{0,260}application/octet-stream"
