defaults:
  for:
    - javascript
    - typescript
  platforms:
    - unix
    - windows
  crit: notable
  attack: T1071.001
traits:
  - id: axios-post-call
    desc: axios.post() HTTP POST request
    conf: 0.8
    if:
      type: symbol
      exact: axios.post
  - id: axios-with-data
    desc: axios request with data payload
    conf: 0.75
    if:
      type: string_literal
      regex: 'axios\(\{[^}]{0,260}data:'
