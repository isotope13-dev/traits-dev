defaults:
  attack: T1071.001
  mbc: C0002
  platforms: [unix, windows]
  for: [rust]

traits:
  - id: rust-reqwest-post-call
    desc: Rust reqwest POST call
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'reqwest.{0,120}\.post\s*\('

  - id: rust-ureq-post-call
    desc: Rust ureq POST call
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'ureq.{0,120}(\.post\s*\(|\.call\s*\(\s*"POST")'

  - id: rust-curl-post-argument
    desc: Rust curl POST argument
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'Command::new\s*\(\s*"curl"\s*\)[\s\S]{0,300}\.(arg|args)\s*\(\s*"POST"'

  - id: rust-curl-data-argument
    desc: Rust curl data argument
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'Command::new\s*\(\s*"curl"\s*\)[\s\S]{0,300}\.(arg|args)\s*\(\s*"(-d|--data|--data-raw)"'
