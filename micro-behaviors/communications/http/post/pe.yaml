defaults:
  for: [pe, dll]
  platforms: [windows]
  mbc: C0002
  attack: T1071.001
traits:
  - id: post-string-pe
    desc: HTTP POST method string in binary
    crit: baseline
    conf: 0.75
    if:
      type: text
      exact: POST
  - id: post-string-pe-wide
    desc: HTTP POST method in UTF-16
    crit: baseline
    conf: 0.8
    if:
      type: encoded
      encoding: wide
      exact: POST
  - id: post-template-pe
    desc: HTTP POST request template
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "POST %s HTTP/1.1"
  - id: form-urlencoded-header-pe
    desc: URL-encoded form content type
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "Content-Type: application/x-www-form-urlencoded"
  - id: http-send-request
    desc: HttpSendRequest WinInet API
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: ^HttpSendRequest(Ex)?[AW]$
  - id: http-send-request-ex-a-string
    desc: HttpSendRequestExA API name string reference
    crit: component
    conf: 0.9
    if:
      type: text
      exact: HttpSendRequestExA
  - id: http-end-request-a-string
    desc: HttpEndRequestA API name string reference
    crit: component
    conf: 0.9
    if:
      type: text
      exact: HttpEndRequestA
composite_rules:
  - id: wininet-post
    desc: WinInet HTTP POST request capability
    crit: notable
    conf: 0.88
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: post-string-pe
  - id: form-urlencoded-post-template
    desc: URL-encoded HTTP POST template
    crit: notable
    conf: 0.9
    all:
      - id: post-template-pe
      - id: form-urlencoded-header-pe
