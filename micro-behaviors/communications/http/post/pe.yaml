defaults:
  for: [pe, dll]
  platforms: [windows]
  mbc: C0002
  attack: T1071.001
traits:
  - id: post-string-pe
    desc: HTTP POST method string in binary
    crit: notable
    conf: 0.75
    if:
      type: text
      exact: POST
  - id: http-send-request
    desc: HttpSendRequest WinInet API
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: ^HttpSendRequest(Ex)?[AW]$
  - id: http-send-request-ex-a-string
    desc: HttpSendRequestExA string
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: HttpSendRequestExA
composite_rules:
  - id: wininet-post
    desc: WinInet HTTP POST exfiltration
    crit: notable
    conf: 0.88
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: post-string-pe
