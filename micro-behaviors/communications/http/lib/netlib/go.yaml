defaults:
  platforms: [windows, linux, macos]
  mbc: C0002
  attack: T1071.001
traits:
  - id: net-http-import
    desc: References Go net/http standard package
    crit: notable
    conf: 0.5
    for:
      - go
      - elf
      - macho
      - pe
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_./-])net/http([^A-Za-z0-9_./-]|$)'
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiled/
  - id: go-http-newrequest
    desc: Creates a new HTTP request
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      regex: '^http\.NewRequest(WithContext)?$'
  - id: go-http-client-do
    desc: Sends an HTTP request from Go
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      exact: http.DefaultClient.Do
  - id: go-http-header-auth
    desc: Sets Authorization header in Go
    crit: notable
    conf: 0.95
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: Header.Set("Authorization"
  - id: go-http-client-do-string
    desc: References Go net/http Client.Do
    crit: notable
    conf: 0.7
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: net/http.(*Client).Do
  - id: go-http-header-set-string
    desc: References Go net/http Header.Set
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: net/http.Header.Set
  - id: go-http-te-header-runtime-string
    desc: Go net/http TE header validation string
    crit: baseline
    conf: 0.8
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: 'request header "TE" may only be'
  - id: go-http-trailer-eof-runtime-string
    desc: Go net/http trailer EOF runtime string
    crit: baseline
    conf: 0.8
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: 'http: unexpected EOF reading trailer'
  - id: go-http-location-header-runtime-string
    desc: Go net/http Location header runtime string
    crit: baseline
    conf: 0.8
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: 'http: no Location header in response'
