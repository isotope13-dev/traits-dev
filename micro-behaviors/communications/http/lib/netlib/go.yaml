defaults:
  platforms: [windows, linux, macos]
  mbc: C0002
  attack: T1071.001
traits:
  - id: go-http-newrequest
    desc: Creates a new HTTP request
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      regex: '^http\.NewRequest(WithContext)?$'
  - id: go-http-client-do
    desc: Executes an HTTP request in
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      exact: http.DefaultClient.Do
  - id: go-http-header-auth
    desc: Sets Authorization header in Go
    crit: notable
    conf: 0.95
    for:
      - go
    if:
      type: tree-sitter
      kind: call
      exact: Header.Set("Authorization"
  - id: go-http-client-do-string
    desc: net/http.(*Client).Do string in binary
    crit: notable
    conf: 0.7
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: net/http.(*Client).Do
  - id: go-http-header-set-string
    desc: Header.Set string in binary
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: net/http.Header.Set
