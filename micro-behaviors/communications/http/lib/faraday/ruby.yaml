defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
  conf: 0.88
  mbc: C0002
  attack: T1071.001

traits:
  - id: faraday-library-import
    desc: Ruby Faraday HTTP import
    if:
      type: import
      exact: faraday

  - id: faraday-connection-builder
    desc: Faraday HTTP connection builder
    if:
      type: text
      regex: '\bFaraday\.new\s*\('

  - id: faraday-retry-middleware
    desc: Faraday retry middleware use
    if:
      type: import
      exact: faraday/retry

composite_rules:
  - id: faraday-http-client
    desc: Ruby Faraday HTTP client
    any:
      - id: faraday-library-import
      - id: faraday-connection-builder

