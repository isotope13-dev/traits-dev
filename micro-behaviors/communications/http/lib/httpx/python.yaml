defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: httpx-client
    desc: httpx.Client usage
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \bhttpx\.Client\s*\(
  - id: httpx-get
    desc: httpx.get call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: httpx.get
  - id: httpx-async-client
    desc: httpx.AsyncClient usage
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bhttpx\.AsyncClient\s*\(
  - id: httpx-post
    desc: httpx.post call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: httpx.post
composite_rules:
  - id: httpx-async-client-post
    desc: httpx AsyncClient POST request
    crit: notable
    conf: 0.9
    near_bytes: 2048
    all:
      - id: httpx-async-client
      - id: micro-behaviors/communications/http/request/client::py-post-generic
