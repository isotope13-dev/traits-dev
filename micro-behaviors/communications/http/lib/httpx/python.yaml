defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
traits:
  - id: httpx-client
    desc: httpx.Client usage
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \bhttpx\.Client\s*\(
  - id: httpx-get
    desc: httpx.get call
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: httpx.get
  - id: httpx-async-client
    desc: httpx.AsyncClient usage
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bhttpx\.AsyncClient\s*\(
  - id: httpx-post
    desc: httpx.post call
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: httpx.post
