defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  crit: notable
  attack: "T1071.001"
  mbc: "C0002"
traits:
  - id: axios
    desc: axios library reference
    conf: 0.6
    count_min: 2
    not:
      - substr: "CONCATENATED MODULE: ../node_modules/axios/"
    unless:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
    if:
      type: text
      word: axios
  - id: axios-import-default
    desc: axios default import
    conf: 0.7
    unless:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
    if:
      type: text
      regex: 'import\s+axios\s+from\s+[''"'']axios[''"'']'
  - id: axios-import-named
    desc: axios named import
    conf: 0.7
    unless:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
    if:
      type: text
      regex: 'import\s+\{[^}]{0,220}axios[^}]{0,220}\}\s+from\s+[''"'']axios[''"'']'
  - id: axios-require
    desc: axios require statement
    conf: 0.7
    unless:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
    if:
      type: text
      regex: 'require\([''"'']axios[''"'']\)'
composite_rules:
  - id: axios-import-or-require
    desc: axios library import or require
    any:
      - id: axios-import-default
      - id: axios-import-named
      - id: axios-require
  - id: axios-method-calls
    desc: axios HTTP method calls
    any:
      - id: micro-behaviors/communications/http/get::axios-get-call
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: micro-behaviors/communications/http/put::axios-put-call
      - id: micro-behaviors/communications/http/delete::axios-delete-call
      - id: micro-behaviors/communications/http/patch::axios-patch-call
      - id: micro-behaviors/communications/http/head::axios-head-call
      - id: micro-behaviors/communications/http/options::axios-options-call
      - id: micro-behaviors/communications/http/request::axios-request-call
      - id: micro-behaviors/communications/http/request::axios-direct-call
  - id: request-axios
    desc: HTTP requests via axios
    conf: 0.75
    any:
      - id: axios-import-or-require
      - id: axios-method-calls
