defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  crit: notable
  attack: "T1071.001"
  mbc: "C0002"
traits:
  - id: axios-module-import
    desc: Imports the Axios HTTP client
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    if:
      type: import
      exact: axios
  - id: axios-require
    desc: Loads Axios with require()
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    if:
      type: symbol
      kind: call
      exact: require
      arg:
        kind: string
        exact: axios
composite_rules:
  - id: axios
    desc: Uses the Axios HTTP client
    crit: notable
    any:
      - id: axios-module-import
      - id: axios-require
      - id: request-axios
  - id: request-axios
    desc: Sends an HTTP request with Axios
    conf: 0.75
    any:
      - id: micro-behaviors/communications/http/get::axios-get-call
      - id: micro-behaviors/communications/http/get::axios-require-get-call
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: micro-behaviors/communications/http/put::axios-put-call
      - id: micro-behaviors/communications/http/delete::axios-delete-call
      - id: micro-behaviors/communications/http/patch::axios-patch-call
      - id: micro-behaviors/communications/http/head::axios-head-call
      - id: micro-behaviors/communications/http/options::axios-options-call
      - id: micro-behaviors/communications/http/request/client::axios-request-call
      - id: micro-behaviors/communications/http/request/client::axios-direct-call
