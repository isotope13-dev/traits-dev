defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  mbc: C0002
  attack: T1071.001
traits:
  - id: request-java
    desc: HTTP requests (Java)
    crit: notable
    conf: 0.66
    for: [java, class]
    if:
      type: text
      substr: HttpURLConnection
  - id: java-https-urlconnection-source
    desc: Java HTTPS URLConnection usage
    crit: notable
    conf: 0.88
    for: [java]
    if:
      type: text
      word: HttpsURLConnection
  - id: request-java-bytecode
    desc: Java bytecode HTTP connection
    crit: notable
    conf: 0.82
    for: [class, jar, zip]
    if:
      type: raw
      regex: java/net/HttpURLConnection
