defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  mbc: C0002
  attack: T1071.001
traits:
  - id: request-java
    desc: HTTP requests (Java)
    crit: notable
    conf: 0.66
    for: [java, class]
    if:
      type: text
      substr: HttpURLConnection
  - id: java-https-urlconnection-source
    desc: Java HTTPS URLConnection usage
    crit: notable
    conf: 0.88
    for: [java]
    if:
      type: text
      word: HttpsURLConnection
  - id: request-java-bytecode
    desc: Java bytecode HTTP connection
    crit: notable
    conf: 0.82
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 6A 61 76 61 2F 6E 65 74 2F 48 74 74 70 55 52 4C 43 6F 6E 6E 65 63 74 69 6F 6E
  - id: java-url-class-bytecode
    desc: Java URL class reference
    crit: component
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: text
      substr: java/net/URL
  - id: jvm-url-class-ref
    desc: JVM URL class reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/net/URL
  - id: jvm-urlconnection-class-ref
    desc: JVM URLConnection class reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/net/URLConnection
  - id: jvm-http-urlconnection-class-ref
    desc: JVM HttpURLConnection class ref
    crit: notable
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/net/HttpURLConnection
  - id: jvm-http-urlconnection-inputstream
    desc: JVM reads an HTTP response body
    crit: notable
    conf: 0.95
    for: [class, jar, zip]
    if:
      type: import
      exact: java/net/HttpURLConnection.getInputStream
