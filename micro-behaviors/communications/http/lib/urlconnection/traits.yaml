defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  mbc: C0002
  attack: T1071.001
traits:
  - id: request-java
    desc: HTTP requests (Java)
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: HttpURLConnection
  - id: request-java-bytecode
    desc: Java bytecode HTTP connection
    crit: notable
    conf: 0.82
    for: [class, jar, zip]
    if:
      type: raw
      regex: java/net/HttpURLConnection
