defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
  crit: notable
  conf: 0.7
traits:
  - id: reqwest-crate
    desc: reqwest Rust HTTP library
    if:
      type: text
      word: reqwest
  - id: ureq-crate
    desc: ureq Rust HTTP library
    if:
      type: text
      word: ureq
  - id: hyper-crate
    desc: hyper Rust HTTP library
    if:
      type: text
      word: hyper
  - id: surf-crate
    desc: surf Rust HTTP library
    if:
      type: text
      regex: (surf-\d+\.\d+|surf::)
  - id: curl-rust-crate
    desc: curl-rust Rust HTTP library
    if:
      type: text
      substr: curl-rust
composite_rules:
  - id: rust-http-client
    desc: Rust HTTP client library detected
    crit: notable
    conf: 0.7
    any:
      - id: reqwest-crate
      - id: ureq-crate
      - id: hyper-crate
      - id: surf-crate
      - id: curl-rust-crate
