# HTTP Request Operations - Rust
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1071.001
defaults:
  attack: T1071.001
  mbc: C0002
  platforms: [unix, windows]
  for: [rust]
traits:
  - id: rust-reqwest
    desc: Makes HTTP requests using reqwest
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::tests-path-filename
      - id: metadata/package/testing/harness/runtime::is-test
      - type: basename
        regex: '(_test|test)\.rs$'
    if:
      type: symbol
      kind: call
      exact: "client.get"
  - id: rust-reqwest-get-fn
    desc: Direct reqwest get request
    crit: notable
    conf: 0.88
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::tests-path-filename
      - id: metadata/package/testing/harness/runtime::is-test
      - type: basename
        regex: '(_test|test)\.rs$'
    if:
      type: text
      substr: reqwest::get(
  - id: rust-reqwest-client-builder
    desc: reqwest HTTP client builder
    crit: notable
    conf: 0.88
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::tests-path-filename
      - id: metadata/package/testing/harness/runtime::is-test
      - type: basename
        regex: '(_test|test)\.rs$'
    if:
      type: text
      substr: reqwest::Client::builder()
  - id: rust-reqwest-builder
    desc: HTTP client builder with invalid
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: "danger_accept_invalid_certs"
