defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - powershell
  mbc: C0002
  attack: T1071.001
traits:
  - id: iwr-name
    desc: Invoke-WebRequest command name
    if:
      type: raw
      substr: Invoke-WebRequest
  - id: iwr-alias
    desc: iwr alias for Invoke-WebRequest
    if:
      type: raw
      word: iwr
  - id: irm-name
    desc: Invoke-RestMethod command name
    if:
      type: raw
      substr: Invoke-RestMethod
  - id: irm-alias
    desc: irm alias for Invoke-RestMethod
    if:
      type: raw
      word: irm
  - id: wget-alias
    desc: wget alias in PowerShell
    if:
      type: raw
      word: wget
      case_insensitive: true
  - id: curl-alias
    desc: curl alias in PowerShell
    if:
      type: raw
      word: curl
      case_insensitive: true
  - id: webclient-download
    desc: System.Net.WebClient DownloadString/DownloadFile
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: WebClient\)?\.Download|New-Object\s+.{0,30}WebClient|\(Net\.WebClient\)
      case_insensitive: true
  - id: webclient-upload
    desc: System.Net.WebClient UploadString/UploadFile
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: WebClient\)?\.Upload|UploadString|UploadFile|UploadData
      case_insensitive: true
  - id: http-post-method
    desc: HTTP POST method specification
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: -Method\s+POST|-Method\s+['"]POST['"]
      case_insensitive: true
  - id: http-body-param
    desc: HTTP request body parameter
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: -Body\s+[@$\{"']
      case_insensitive: true
  - id: bitstransfer
    desc: BITS transfer cmdlet (stealthy download)
    crit: suspicious
    conf: 0.85
    attack: T1197
    if:
      type: raw
      regex: Start-BitsTransfer|Import-Module\s+BitsTransfer
      case_insensitive: true
  - id: httpwebrequest
    desc: System.Net.HttpWebRequest usage
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: HttpWebRequest|\[System\.Net\.HttpWebRequest\]
      case_insensitive: true
  - id: webclient-eval-followon
    desc: WebClient download followed by eval
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: (?is)WebClient\)?\.Download\w+.{0,240}(Invoke-Expression|\biex\b)
      case_insensitive: true
  - id: webclient-process-followon
    desc: WebClient download followed by process launch
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?is)WebClient\)?\.Download\w+.{0,240}\bStart-Process\b
      case_insensitive: true
  - id: uri-literal
    desc: HTTP/HTTPS URL literal
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: https?://[a-zA-Z0-9][-a-zA-Z0-9]*\.[a-zA-Z]{2,}
  - id: uri-literal-raw
    desc: HTTP/HTTPS URL literal (raw)
    crit: baseline
    conf: 0.75
    for:
      - powershell
      - shell
      - batch
    if:
      type: raw
      regex: https?://[a-zA-Z0-9][\w.-]*\.[a-zA-Z]{2,}
    unless:
      - type: raw
        regex: 'https?://www\.apache\.org/licenses/'
      - type: raw
        regex: 'https?://opensource\.org/licenses/'
      - type: raw
        regex: 'https?://www\.gnu\.org/licenses/'
      - type: basename
        regex: \.dart$
composite_rules:
  - id: invoke-webrequest
    desc: Invoke-WebRequest cmdlet (iwr/wget/curl alias)
    crit: notable
    conf: 0.8
    any:
      - id: iwr-name
      - id: iwr-alias
      - id: wget-alias
      - id: curl-alias
  - id: invoke-restmethod
    desc: Invoke-RestMethod cmdlet (irm alias)
    crit: notable
    conf: 0.8
    any:
      - id: irm-name
      - id: irm-alias
  - id: request-powershell
    desc: Performs HTTP request
    crit: notable
    conf: 0.9
    any:
      - id: invoke-webrequest
      - id: invoke-restmethod
      - id: webclient-download
      - id: httpwebrequest
  - id: download
    desc: Downloads content from URL
    crit: notable
    conf: 0.9
    any:
      - id: invoke-webrequest
      - id: invoke-restmethod
      - id: webclient-download
      - id: bitstransfer
  - id: ps-post
    desc: Performs HTTP POST request (PowerShell)
    crit: suspicious
    conf: 0.85
    all:
      - id: http-post-method
      - id: request-powershell
  - id: download-execute
    desc: Downloads and potentially executes content
    crit: suspicious
    conf: 0.9
    attack: T1105
    any:
      - id: webclient-eval-followon
      - id: webclient-process-followon
  - id: exfil
    desc: Potential data exfiltration via HTTP
    crit: suspicious
    conf: 0.85
    attack: T1041
    needs: 2
    any:
      - id: webclient-upload
      - id: http-post-method
      - id: http-body-param
