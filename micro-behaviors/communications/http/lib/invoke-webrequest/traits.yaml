defaults:
  platforms: [windows]
  for:
    - powershell
  mbc: C0002
  attack: T1071.001
traits:
  - id: iwr-name
    desc: Invoke-WebRequest command name
    for: [powershell, pe]
    if:
      type: text
      substr: Invoke-WebRequest
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: useb-flag
    desc: UseBasicParsing flag (-useb)
    crit: notable
    conf: 0.75
    for: [powershell, batch, pe]
    if:
      type: text
      regex: "(?i)-useb\\b|-UseBasicParsing\\b"
  - id: tls12-force
    desc: TLS 1.2 protocol forced via SecurityProtocol
    crit: notable
    conf: 0.7
    for: [powershell, pe]
    if:
      type: text
      substr: "[Net.SecurityProtocolType]::Tls12"
  - id: tls12-force-string
    desc: TLS12 SecurityProtocol string
    crit: notable
    conf: 0.82
    for: [powershell, pe]
    if:
      type: text
      exact: "[Net.ServicePointManager]::SecurityProtocol=[Net.SecurityProtocolType]::Tls12;"
  - id: iwr-uri
    desc: Invoke-WebRequest URI parameter
    crit: notable
    conf: 0.82
    for: [powershell, pe]
    if:
      type: text
      substr: "Invoke-WebRequest -Uri"
  - id: batch-powershell-iwr-uri
    desc: Batch launches PowerShell web request
    crit: notable
    conf: 0.86
    for: [batch]
    if:
      type: text
      regex: (?i)\bpowershell\b[^\r\n]{0,120}\bInvoke-WebRequest\s+-Uri\b
  - id: batch-powershell-iwr-alias
    desc: Batch launches PowerShell iwr request
    crit: notable
    conf: 0.86
    for: [batch]
    if:
      type: text
      regex: (?i)\bpowershell\b[^\r\n]{0,120}\biwr\b
  - id: iwr-alias
    desc: iwr alias for Invoke-WebRequest
    if:
      type: text
      word: iwr
  - id: irm-name
    desc: Invoke-RestMethod command name
    if:
      type: symbol
      kind: call
      exact: Invoke-RestMethod
  - id: irm-alias
    desc: irm alias for Invoke-RestMethod
    size_min: 1
    if:
      type: symbol
      kind: call
      exact: irm
  - id: irm-bare-domain
    desc: Invoke-RestMethod to bare domain
    crit: notable
    conf: 0.92
    size_min: 1
    if:
      type: text
      regex: '\b(irm|Invoke-RestMethod)\s+[a-z0-9][a-z0-9.-]*\.[a-z]{2,}\b'
      case_insensitive: true
  - id: wget-alias
    desc: wget alias in PowerShell
    if:
      type: text
      word: wget
      case_insensitive: true
  - id: curl-alias
    desc: curl alias in PowerShell
    if:
      type: text
      word: curl
      case_insensitive: true
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: webclient-download
    desc: System.Net.WebClient HTTP client usage
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: WebClient\)?\.Download|New-Object\s+.{0,30}WebClient|\(Net\.WebClient\)
      case_insensitive: true
  - id: webclient-downloadstring
    desc: WebClient DownloadString call
    crit: notable
    conf: 0.92
    for: [powershell, batch]
    if:
      type: text
      regex: '\[System\.Net\.WebClient\]\s*::\s*new\s*\(\s*\)\s*\.\s*DownloadString\s*\('
  - id: webclient-upload
    desc: System.Net.WebClient UploadString/UploadFile
    crit: notable
    conf: 0.85
    for: [powershell, batch]
    if:
      type: text
      regex: WebClient\)?\.Upload|UploadString|UploadFile|UploadData
      case_insensitive: true
  - id: http-post-method
    desc: HTTP POST method specification
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: -Method\s+POST|-Method\s+['"]POST['"]
      case_insensitive: true
  - id: http-body-param
    desc: PowerShell HTTP cmdlet body parameter
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?i)\b(Invoke-WebRequest|Invoke-RestMethod|iwr|irm)\b[^\r\n]{0,180}-Body\s+[@$\{"'']'
  - id: httpwebrequest
    desc: System.Net.HttpWebRequest usage
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: HttpWebRequest|\[System\.Net\.HttpWebRequest\]
      case_insensitive: true
  - id: microsoft-graph-request-context
    desc: Microsoft Graph API request helper context
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(Invoke-MgGraphRequest|graph\.microsoft\.com|Microsoft Graph API|\bGraphBaseUri\b)'
      case_insensitive: true
  - id: posthog-telemetry-context
    desc: PostHog telemetry event submission context
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'posthog\.com/capture|api_key.{0,120}distinct_id.{0,120}event'
      case_insensitive: true
  - id: teams-notification-context
    desc: Microsoft Teams notification webhook context
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'TeamChannelWebhookUri|application/vnd\.microsoft\.card\.adaptive|Send-MtTeamsMessage'
      case_insensitive: true
  - id: webclient-eval-followon
    desc: WebClient download followed by eval
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?is)WebClient\)?\.Download\w+.{0,240}(Invoke-Expression|\biex\b)
      case_insensitive: true
  - id: webclient-process-followon
    desc: WebClient download followed by process launch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?is)WebClient\)?\.Download\w+.{0,240}\bStart-Process\b
      case_insensitive: true
  - id: uri-literal-raw
    desc: HTTP/HTTPS URL literal (raw)
    crit: baseline
    conf: 0.75
    for:
      - powershell
      - batch
    if:
      type: text
      regex: https?://[a-zA-Z0-9][\w.-]*\.[a-zA-Z]{2,}
    unless:
      - type: text
        regex: 'https?://www\.apache\.org/licenses/'
      - type: text
        regex: 'https?://opensource\.org/licenses/'
      - type: text
        regex: 'https?://www\.gnu\.org/licenses/'
      - id: metadata/file/extension/identity::dart-source-basename
composite_rules:
  - id: invoke-webrequest
    desc: Invoke-WebRequest cmdlet (iwr/wget/curl alias)
    crit: notable
    conf: 0.8
    for: [powershell, pe]
    any:
      - id: iwr-name
      - id: iwr-uri
      - id: iwr-alias
      - id: wget-alias
      - id: curl-alias
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: invoke-restmethod
    desc: Invoke-RestMethod cmdlet (irm alias)
    crit: notable
    conf: 0.8
    any:
      - id: irm-name
      - id: irm-alias
      - id: irm-bare-domain
  - id: request-powershell
    desc: Performs HTTP request
    crit: notable
    conf: 0.9
    for: [powershell, pe]
    any:
      - id: invoke-webrequest
      - id: invoke-restmethod
      - id: webclient-download
      - id: httpwebrequest
  - id: download
    desc: Downloads content from URL
    crit: notable
    conf: 0.9
    for: [powershell, pe]
    any:
      - id: invoke-webrequest
      - id: invoke-restmethod
      - id: webclient-download
      - id: micro-behaviors/communications/http/download/manager::bits-transfer-cmdlet
      - id: tls12-force-string
  - id: ps-post
    desc: Performs HTTP POST request (PowerShell)
    crit: notable
    conf: 0.85
    all:
      - id: http-post-method
      - id: request-powershell
  - id: download-execute
    desc: Downloads and potentially executes content
    crit: suspicious
    conf: 0.9
    attack: T1105
    any:
      - id: webclient-eval-followon
      - id: webclient-process-followon
  - id: exfil
    desc: Potential data exfiltration via HTTP
    crit: suspicious
    conf: 0.85
    attack: T1041
    needs: 2
    any:
      - id: webclient-upload
      - id: http-post-method
      - id: http-body-param
    unless:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest/
  - id: exfil-benign-context
    desc: Invoke-WebRequest exfil benign context
    crit: baseline
    conf: 0.9
    any:
      - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
      - id: micro-behaviors/os/service/legitimate::health-check
      - id: micro-behaviors/os/service/legitimate::installer-script
      - id: microsoft-graph-request-context
      - id: posthog-telemetry-context
      - id: teams-notification-context
      - id: metadata/library/ai::ai-coding-assistant-runtime
      - id: well-known/app/posh-ovirt::oracle-support-log-upload-context
      - id: well-known/app/posh-ovirt::remote-viewer-installer-context
      - id: well-known/app/maester::module-context
