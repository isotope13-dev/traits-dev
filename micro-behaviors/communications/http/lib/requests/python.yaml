defaults:
  platforms: [windows, linux, macos]
  for: [python, elf, macho, pe]
traits:
  - id: requests-get
    desc: requests.get call (Python)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: requests.get
  - id: requests-post
    desc: requests.post call (Python)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: requests.post
  - id: requests-session
    desc: requests.Session() persistent HTTP session
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: requests.Session
  - id: gql-requests-transport
    desc: gql RequestsHTTPTransport client
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: RequestsHTTPTransport(
  - id: requests-content-write-source
    desc: requests response content access
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\b\w+\.content\b'

composite_rules:
  - id: requests-response-content-access
    desc: requests response content access
    crit: notable
    conf: 0.82
    all:
      - id: requests-content-write-source
    any:
      - id: requests-get
      - id: requests-post
      - id: requests-session
