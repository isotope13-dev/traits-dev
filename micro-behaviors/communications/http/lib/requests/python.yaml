defaults:
  platforms: [windows, linux, macos]
  for: [python]
traits:
  - id: imports-requests
    desc: Imports the requests HTTP client for Python
    crit: notable
    conf: 0.95
    ref: sha256:badfffc3c9c89439e736a1e00592a84dfb7235836fc3a6f1410d55c6275f1f23
    if:
      type: symbol
      kind: import
      regex: '^requests(\.|$)'
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  - id: requests-get
    desc: Calls requests.get in Python
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: requests.get
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  - id: requests-request
    desc: Calls requests.request in Python
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: requests.request
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  - id: requests-head
    desc: requests.head call (Python)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: requests.head
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  - id: requests-post
    desc: Calls requests.post() in Python
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: requests.post
  - id: requests-put
    desc: requests.put call (Python)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: requests.put
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
  - id: requests-session
    desc: requests.Session() persistent HTTP session
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: requests.Session
  - id: gql-requests-transport
    desc: gql RequestsHTTPTransport client
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: RequestsHTTPTransport
  - id: content-attribute-access
    desc: Accesses an object's .content attribute
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\b\w+\.content\b'
  # Standard requests Response methods — neutral. Relocated from
  # objectives/command-and-control/dropper/delivery/fetch-eval: `.json()` and
  # `.raise_for_status()` are the ordinary way every requests-using program reads
  # an API response (e.g. cat-ademic fetching OpenAlex). The dropper composites
  # reference these cross-directory; the payload-extraction intent is the other
  # legs (`.get('message')`/`.get('cmd')` + base64-decode + exec).
  - id: response-json-call
    desc: Parses HTTP response body as JSON
    crit: component
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '\.json$'
  - id: response-json-code-field
    desc: Reads encoded or decoded JSON response field
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'response\.json\(\)\s*\[\s*[''\"](encoded|decoded)[''\"]\s*\]'
  - id: raise-for-status
    desc: requests raise_for_status response check
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: '\.raise_for_status$'

composite_rules:
  - id: requests-response-content-access
    desc: Reads a requests response body (.content)
    crit: notable
    conf: 0.82
    all:
      - id: content-attribute-access
    any:
      - id: requests-get
      - id: requests-post
      - id: requests-put
      - id: requests-session
