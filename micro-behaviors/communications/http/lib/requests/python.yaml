defaults:
  platforms: [windows, unix]
  for: [python, elf, macho, pe]
traits:
  - id: requests-get
    desc: requests.get call (Python)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: requests.get
  - id: requests-post
    desc: requests.post call (Python)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: requests.post
  - id: requests-session
    desc: requests.Session() persistent HTTP session
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: requests.Session
composite_rules:
  - id: requests-python
    desc: Python requests library usage
    crit: notable
    conf: 0.8
    any:
      - id: requests-get
      - id: requests-post
      - id: requests-session
