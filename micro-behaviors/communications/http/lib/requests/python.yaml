# HTTP Request Operations - Python requests library
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1071.001
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: requests-get
    desc: requests.get call (Python)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "requests.get"
  - id: requests-post
    desc: requests.post call (Python)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "requests.post"
composite_rules:
  - id: requests-python
    desc: Python requests library usage
    crit: notable
    conf: 0.8
    any:
      - id: requests-get
      - id: requests-post
