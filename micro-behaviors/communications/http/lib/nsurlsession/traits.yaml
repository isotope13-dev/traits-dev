defaults:
  platforms:
    - macos
    - ios
  for:
    - objc
    - swift
    - macho
  mbc: C0002
  attack: T1071.001
  size_max: 104857600
traits:
  - id: nsurlsession-shared
    desc: NSURLSession shared session
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: sharedSession
  - id: nsurlrequest-init
    desc: NSURLRequest initialization
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: requestWithURL
  - id: nsurlresponse-handle
    desc: NSURLResponse handling
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: dataTaskWithRequest
  - id: nsurlsession-post
    desc: NSURLSession POST requests
    crit: notable
    conf: 0.7
    for:
      - objc
      - swift
    if:
      type: text
      regex: (setHTTPMethod|HTTPMethod).{0,24}"POST"
  - id: nsurlsession-download-task
    desc: NSURLSession download task creation
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: downloadTaskWith(Request|ResumeData)
  - id: nsurlsession-download-delegate
    desc: NSURLSessionDownloadDelegate implementation
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: 'URLSession:downloadTask:didFinishDownloadingToURL:'
  - id: nsurlsession-default-config
    desc: NSURLSession default configuration
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: defaultSessionConfiguration
  - id: nsurlsession-with-config
    desc: NSURLSession with configuration
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: sessionWithConfiguration
  - id: http-set-method
    desc: HTTP method manipulation via setHTTPMethod
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: setHTTPMethod
  - id: http-header-manipulation
    desc: HTTP header value manipulation
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: setValue:forHTTPHeaderField
  - id: nsurlsession-class
    desc: NSURLSession class reference
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: 'OBJC_CLASS_$_NSURLSession'
  - id: swift-urlrequest-url-init
    desc: Swift URLRequest URL initializer
    crit: notable
    conf: 0.75
    if:
      type: symbol
      substr: Foundation10URLRequestV3url
  - id: swift-urlrequest-http-method
    desc: Swift URLRequest HTTP method setter
    crit: notable
    conf: 0.8
    if:
      type: symbol
      substr: Foundation10URLRequestV10httpMethod
  - id: swift-urlrequest-http-body
    desc: Swift URLRequest HTTP body setter
    crit: notable
    conf: 0.8
    if:
      type: symbol
      substr: Foundation10URLRequestV8httpBody
  - id: swift-urlrequest-http-header
    desc: Swift URLRequest HTTP header setter
    crit: notable
    conf: 0.8
    if:
      type: symbol
      substr: setValue_18forHTTPHeaderField
composite_rules:
  - id: nsurlsession-http-request
    desc: NSURLSession HTTP request with POST
    crit: notable
    conf: 0.8
    all:
      - id: nsurlsession-shared
      - id: nsurlrequest-init
  - id: nsurlsession-download-framework
    desc: NSURLSession download framework with delegate
    crit: notable
    conf: 0.8
    all:
      - id: nsurlsession-download-task
      - id: nsurlsession-download-delegate
      - id: nsurlsession-config
  - id: nsurlsession-config
    desc: NSURLSession configuration setup
    crit: notable
    conf: 0.6
    any:
      - id: nsurlsession-default-config
      - id: nsurlsession-with-config
  - id: swift-urlrequest-post-body
    desc: Swift URLRequest POST body
    crit: notable
    conf: 0.9
    all:
      - id: swift-urlrequest-url-init
      - id: swift-urlrequest-http-method
      - id: swift-urlrequest-http-body
  - id: nsurlsession-swift-request
    desc: Swift NSURLSession request capability
    crit: notable
    conf: 0.9
    all:
      - id: nsurlsession-class
      - id: swift-urlrequest-post-body
