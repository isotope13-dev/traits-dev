defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1071.001

traits:
  - id: perl-lwp-useragent
    desc: Perl LWP HTTP client import
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?m)^\s*use\s+LWP::UserAgent\s*;

  - id: perl-lwp-post-call
    desc: Perl LWP POST call
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "->post("

  - id: perl-lwp-get-call
    desc: Perl LWP GET call
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "->get("

  - id: perl-lwp-content-file-option
    desc: Perl LWP content_file option
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: ":content_file"

  - id: perl-lwp-content-file-hex
    desc: Hex-escaped LWP content_file option
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: '\x3A\x63\x6F\x6E\x74\x65\x6E\x74\x5F\x66\x69\x6C\x65'
