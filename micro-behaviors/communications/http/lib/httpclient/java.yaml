defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]
traits:
  - id: airlift-http-client-bytecode
    desc: Airlift Java HTTP client usage
    crit: notable
    conf: 0.96
    if:
      type: import
      exact: io/airlift/http/client/HttpClient

  - id: java-url-openconnection
    desc: Java URL openConnection HTTP client primitive
    crit: notable
    conf: 0.85
    for: [java, class]
    if:
      type: text
      regex: new\s+URL\(.{0,80}\)\.openConnection\(\)
  - id: java-url-constructor-bytecode
    desc: Java bytecode URL construction
    crit: component
    conf: 0.9
    if:
      type: import
      exact: java/net/URL.<init>
  - id: java-httpclient-api
    desc: Java HttpClient API reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: java/net/http/HttpClient
  - id: java-byte-array-response-handler
    desc: Java HTTP byte-array response handler
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ofByteArray
