defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]
traits:
  - id: java-url-openconnection
    desc: Java URL openConnection HTTP client primitive
    crit: notable
    conf: 0.85
    for: [java, class]
    if:
      type: text
      regex: new\s+URL\(.{0,80}\)\.openConnection\(\)
  - id: java-httpclient-api
    desc: Java HttpClient API reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: java/net/http/HttpClient
  - id: java-byte-array-response-handler
    desc: Java HTTP byte-array response handler
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ofByteArray
