defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]
traits:
  - id: java-httpclient-api
    desc: Java HttpClient API reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: java/net/http/HttpClient
