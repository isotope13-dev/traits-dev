defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: urllib-word
    desc: References Python urllib HTTP client
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \burllib\.request\.|\burllib\.(urlopen|urlretrieve)\b
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: urllib-urlretrieve-dup
  - id: urllib2-word
    desc: urllib2 request client reference
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \burllib2\.(urlopen|Request)\b
  - id: urllib-urlopen
    desc: Calls urllib.request.urlopen
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: urllib.request.urlopen
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: urllib-request-symbol
    desc: urllib.request.Request symbol
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: urllib.request.Request
  - id: urllib-request-alias-urlopen
    desc: request.urlopen call via urllib alias
    crit: notable
    conf: 0.8
    if:
      # Migrated from a tree-sitter call query to a `kind: call`
      # match on the pre-extracted call fact (no per-member
      # tree-sitter cursor walk; same name semantics).
      type: symbol
      kind: call
      exact: 'request.urlopen'
  - id: urllib-import-alias-urlopen
    desc: urllib import alias urlopen call
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'import\s+urllib\.request\s+as\s+[A-Za-z_]\w*[\s\S]{0,500}\b[A-Za-z_]\w*\.urlopen\s*\('
  - id: urllib-import-alias-request-object
    desc: urllib import alias Request object
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'import\s+urllib\.request\s+as\s+[A-Za-z_]\w*[\s\S]{0,500}\b[A-Za-z_]\w*\.Request\s*\('
  - id: urllib-urlopen-py2
    desc: urllib.urlopen call (Python 2)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: urllib.urlopen
  - id: urllib-from-import
    desc: Imports urllib request functions
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: from urllib\.request import (urlopen|Request|urlretrieve)\b
  - id: urllib-urlopen-data
    desc: urlopen with data parameter (potential POST)
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (urllib|urllib2|request)\.urlopen\s*\([^)]{0,200}\bdata\s*=
  - id: urllib-urlretrieve-dup
    desc: urllib.request.urlretrieve call
    crit: notable
    conf: 0.8
    mbc: C0002
    attack: T1105
    if:
      type: symbol
      regex: urllib\.(request\.)?urlretrieve
  - id: urllib-urlencode
    desc: urllib urlencode for data serialization
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \burllib\.parse\.urlencode\s*\(|from\s+urllib\.parse\s+import\s+urlencode\b
  - id: urllib-request-object-call
    desc: request.Request object creation
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: 'request.Request'
  - id: urllib-urlopen-pyc-symbol
    desc: urlopen symbol in Python bytecode
    crit: notable
    conf: 0.78
    for: [pyc]
    if:
      type: text
      substr: urlopen
  - id: urllib-pyc-module-name
    desc: urllib module name in Python bytecode
    crit: component
    conf: 0.76
    for: [pyc]
    ref: sha256:badfffc3c9c89439e736a1e00592a84dfb7235836fc3a6f1410d55c6275f1f23
    if:
      type: text
      substr: urllib
  - id: request-pyc-name
    desc: Request name in Python bytecode
    crit: component
    conf: 0.72
    for: [pyc]
    ref: sha256:badfffc3c9c89439e736a1e00592a84dfb7235836fc3a6f1410d55c6275f1f23
    if:
      type: text
      substr: Request
  - id: urlopen-response-body-assignment
    desc: Assigns response body read from urlopen
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: assignment
      regex: '\w+\s*=\s*[\w.]*urlopen\([^)]{1,120}\)\.read\(\)'
  - id: urlopen-variable-argument
    desc: Passes variable as urlopen argument
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: '([\w.]+\.)?urlopen\(\s*\w+\s*\)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: urlopen-multiple-calls
    desc: Multiple urllib URL-open calls in Python file
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '([\w.]+\.)?urlopen$'
    count_min: 2
composite_rules:
  - id: urllib-request-object
    desc: urllib Request object creation
    crit: notable
    conf: 0.82
    any:
      - id: urllib-request-symbol
      - id: urllib-import-alias-request-object
      - id: urllib-request-object-call
  - id: urllib-request-pyc-symbol
    desc: urllib Request symbol in Python bytecode
    crit: notable
    conf: 0.8
    for: [pyc]
    ref: sha256:badfffc3c9c89439e736a1e00592a84dfb7235836fc3a6f1410d55c6275f1f23
    all:
      - id: urllib-pyc-module-name
      - id: request-pyc-name
  - id: urllib-urlopen-call
    desc: Calls Python urllib urlopen
    crit: notable
    conf: 0.82
    for: [python, pyc]
    any:
      - id: urllib-urlopen
      - id: urllib-request-alias-urlopen
      - id: urllib-import-alias-urlopen
      - id: urllib-urlopen-py2
      - id: urllib-urlopen-data
      - id: urllib-urlopen-pyc-symbol
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
