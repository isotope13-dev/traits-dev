defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: urllib-word
    desc: urllib request client reference
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \burllib\.request\.|\burllib\.(urlopen|urlretrieve)\b
    unless:
      - id: urllib-urlretrieve-dup
  - id: urllib2-word
    desc: urllib2 request client reference
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \burllib2\.(urlopen|Request)\b
  - id: urllib-urlopen
    desc: urllib.request.urlopen call
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: urllib.request.urlopen
  - id: urllib-request-symbol
    desc: urllib.request.Request symbol
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: urllib.request.Request
  - id: urllib-request-alias-urlopen
    desc: request.urlopen call via urllib alias
    crit: notable
    conf: 0.8
    if:
      type: ast
      query: "(call\n  function: (attribute\n    object: (identifier) @obj\n    attribute: (identifier) @meth)\n  (#eq? @obj \"request\")\n  (#eq? @meth \"urlopen\"))\n"
  - id: urllib-urlopen-py2
    desc: urllib.urlopen call (Python 2)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: urllib.urlopen
  - id: urllib-from-import
    desc: Direct import of urlopen/Request from urllib.request
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: from urllib\.request import (urlopen|Request|urlretrieve)\b
  - id: urllib-urlopen-data
    desc: urlopen with data parameter (potential POST)
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (urllib|urllib2|request)\.urlopen\s*\([^)]{0,200}\bdata\s*=
  - id: urllib-urlretrieve-dup
    desc: urllib.request.urlretrieve call
    crit: notable
    conf: 0.8
    mbc: C0002
    attack: T1105
    if:
      type: symbol
      regex: urllib\.(request\.)?urlretrieve
  - id: urllib-urlencode
    desc: urllib urlencode for data serialization
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \burllib\.parse\.urlencode\s*\(|from\s+urllib\.parse\s+import\s+urlencode\b
  - id: urllib-request-object
    desc: request.Request object creation
    crit: notable
    conf: 0.8
    if:
      type: ast
      query: "(call\n  function: (attribute\n    object: (identifier) @obj\n    attribute: (identifier) @meth)\n  (#eq? @obj \"request\")\n  (#eq? @meth \"Request\"))\n"
composite_rules:
  - id: urllib-urlopen-call
    desc: Python urllib urlopen call
    crit: notable
    conf: 0.82
    any:
      - id: urllib-urlopen
      - id: urllib-request-alias-urlopen
      - id: urllib-urlopen-py2
      - id: urllib-urlopen-data
