defaults:
  platforms: [windows, unix, openwrt]
  for: [binaries, rust]
  crit: notable
  conf: 0.7
traits:
  - id: reqwest-crate
    desc: References reqwest Rust HTTP library
    if:
      type: text
      word: reqwest
  - id: ureq-crate
    desc: References ureq Rust HTTP library
    if:
      type: text
      word: ureq
  - id: ureq-user-agent
    desc: ureq Rust HTTP user agent
    if:
      type: text
      substr: ureq/
  - id: hyper-crate
    desc: hyper Rust HTTP library
    if:
      type: text
      regex: (hyper::|hyper-[0-9]|/hyper/)
  - id: surf-crate
    desc: surf Rust HTTP library
    if:
      type: text
      regex: (surf-\d+\.\d+|surf::)
  - id: curl-rust-crate
    desc: curl-rust Rust HTTP library
    if:
      type: text
      substr: curl-rust
