defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  mbc: C0002
  attack: T1071.001

traits:
  - id: loops-api-host
    desc: Loops contact API host
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)(^|[^a-z0-9])app\.loops\.so/api/v[0-9]+([^a-z0-9]|$)'

  - id: loops-create-contact-path
    desc: Loops contact creation API path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /contacts/create
