defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, package.json]
  attack: T1071.001
  mbc: C0002
  crit: notable
  conf: 0.9

traits:
  - id: feishu-openapi-domain
    desc: Feishu OpenAPI endpoint domain
    if:
      type: text
      substr: open.feishu.cn

  - id: feishu-tenant-token-endpoint
    desc: Feishu tenant token endpoint
    if:
      type: text
      substr: /open-apis/auth/v3/tenant_access_token/internal

  - id: feishu-app-credential-fields
    desc: Feishu app credential fields
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bapp_?(id|secret)\b'

  - id: larksuite-node-sdk-dependency
    desc: LarkSuite Node SDK dependency
    for: [package.json]
    if:
      type: value
      path: dependencies
      regex: '@larksuiteoapi/node-sdk'

composite_rules:
  - id: feishu-openapi-client
    desc: Feishu OpenAPI client usage
    crit: notable
    conf: 0.94
    all:
      - id: feishu-openapi-domain
    any:
      - id: feishu-tenant-token-endpoint
      - id: feishu-app-credential-fields
      - id: larksuite-node-sdk-dependency
