defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.86
  mbc: C0002

traits:
  - id: boto3-ec2-client
    desc: boto3 EC2 client
    if:
      type: text
      regex: '\.client\(\s*["'']ec2["'']'

  - id: ec2-run-instances
    desc: EC2 instance launch
    conf: 0.9
    if:
      type: text
      regex: '\brun_instances\b|aws ec2 run-instances'

  - id: ec2-terminate-instances
    desc: EC2 instance termination
    conf: 0.9
    if:
      type: text
      regex: '\bterminate_instances\b|aws ec2 terminate-instances'

  - id: ec2-describe-instances
    desc: EC2 instance enumeration
    conf: 0.86
    if:
      type: text
      regex: '\bdescribe_instances\b|aws ec2 describe-instances'

  - id: ec2-create-key-pair
    desc: EC2 key pair creation
    conf: 0.9
    if:
      type: text
      regex: '\bcreate_key_pair\b|aws ec2 create-key-pair'

  - id: ec2-import-key-pair
    desc: EC2 key pair import
    conf: 0.9
    if:
      type: text
      regex: '\bimport_key_pair\b|aws ec2 import-key-pair'

  - id: ec2-create-security-group
    desc: EC2 security group creation
    conf: 0.9
    if:
      type: text
      regex: '\bcreate_security_group\b|aws ec2 create-security-group'

  - id: ec2-authorize-ingress
    desc: EC2 security group ingress
    conf: 0.9
    if:
      type: text
      regex: '\bauthorize_security_group_ingress\b|authorize-security-group-ingress'

  - id: ec2-spot-price-history
    desc: EC2 spot price query
    conf: 0.88
    if:
      type: text
      regex: '\bdescribe_spot_price_history\b|describe-spot-price-history'

  - id: ec2-describe-instance-types
    desc: EC2 instance type enumeration
    conf: 0.86
    if:
      type: text
      regex: '\bdescribe_instance_types\b|["'']describe_instance_types["'']'

  - id: ec2-create-volume
    desc: EC2 EBS volume creation
    conf: 0.9
    if:
      type: text
      regex: '\bcreate_volume\b|aws ec2 create-volume'

  - id: ec2-attach-volume
    desc: EC2 EBS volume attachment
    conf: 0.9
    if:
      type: text
      regex: '\battach_volume\b|aws ec2 attach-volume'

  - id: ec2-detach-volume
    desc: EC2 EBS volume detachment
    conf: 0.88
    if:
      type: text
      regex: '\bdetach_volume\b|aws ec2 detach-volume'

  - id: ec2-delete-volume
    desc: EC2 EBS volume deletion
    conf: 0.88
    if:
      type: text
      regex: '\bdelete_volume\b|aws ec2 delete-volume'

  - id: ec2-describe-volumes
    desc: EC2 EBS volume enumeration
    conf: 0.86
    if:
      type: text
      regex: '\bdescribe_volumes\b|aws ec2 describe-volumes'

  - id: ec2-ami-describe
    desc: EC2 AMI lookup
    conf: 0.86
    if:
      type: text
      regex: '\bdescribe_images\b|aws ec2 describe-images'

  - id: ec2-user-data-script
    desc: EC2 user data script
    conf: 0.86
    if:
      type: string_literal
      exact: UserData

composite_rules:
  - id: ec2-provisioning-flow
    desc: EC2 provisioning flow
    crit: notable
    conf: 0.92
    all:
      - id: ec2-run-instances
    any:
      - id: ec2-create-key-pair
      - id: ec2-import-key-pair
      - id: ec2-create-security-group
      - id: ec2-authorize-ingress
      - id: ec2-ami-describe

  - id: ec2-ebs-management
    desc: EC2 EBS volume management
    crit: notable
    conf: 0.92
    needs: 2
    any:
      - id: ec2-create-volume
      - id: ec2-attach-volume
      - id: ec2-detach-volume
      - id: ec2-delete-volume
      - id: ec2-describe-volumes

  - id: ec2-ephemeral-job-runner
    desc: EC2 ephemeral job runner
    crit: notable
    conf: 0.92
    all:
      - id: ec2-provisioning-flow
      - id: ec2-terminate-instances
