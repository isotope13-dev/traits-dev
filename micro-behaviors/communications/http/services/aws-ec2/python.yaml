defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.86
  mbc: C0002

traits:
  - id: boto3-ec2-client
    desc: boto3 EC2 client
    if:
      type: text
      regex: '\.client\(\s*["'']ec2["'']'

  - id: ec2-run-instances
    desc: EC2 instance launch
    conf: 0.9
    if:
      type: symbol
      exact: run_instances

  - id: ec2-terminate-instances
    desc: EC2 instance termination
    conf: 0.9
    if:
      type: text
      regex: '\bterminate_instances\b|aws ec2 terminate-instances'

  - id: ec2-describe-instances
    desc: EC2 instance enumeration
    conf: 0.86
    if:
      type: symbol
      exact: describe_instances

  - id: ec2-create-key-pair
    desc: EC2 key pair creation
    conf: 0.9
    if:
      type: symbol
      exact: create_key_pair

  - id: ec2-create-security-group
    desc: EC2 security group creation
    conf: 0.9
    if:
      type: symbol
      exact: create_security_group

  - id: ec2-authorize-ingress
    desc: EC2 security group ingress
    conf: 0.9
    if:
      type: symbol
      exact: authorize_security_group_ingress

  - id: ec2-spot-price-history
    desc: EC2 spot price query
    conf: 0.88
    if:
      type: symbol
      exact: describe_spot_price_history

  - id: ec2-ami-describe
    desc: EC2 AMI lookup
    conf: 0.86
    if:
      type: symbol
      exact: describe_images

  - id: ec2-user-data-script
    desc: EC2 user data script
    conf: 0.86
    if:
      type: string_literal
      substr: UserData

composite_rules:
  - id: ec2-provisioning-flow
    desc: EC2 provisioning flow
    crit: notable
    conf: 0.92
    all:
      - id: ec2-run-instances
    any:
      - id: ec2-create-key-pair
      - id: ec2-create-security-group
      - id: ec2-authorize-ingress
      - id: ec2-ami-describe

  - id: ec2-ephemeral-job-runner
    desc: EC2 ephemeral job runner
    crit: notable
    conf: 0.92
    all:
      - id: ec2-provisioning-flow
      - id: ec2-terminate-instances

