defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: slack-web-api-import
    desc: Slack Web API import
    if:
      type: string_literal
      exact: "@slack/web-api"

  - id: slack-socket-mode-import
    desc: Slack Socket Mode import
    if:
      type: string_literal
      exact: "@slack/socket-mode"

  - id: slack-web-client
    desc: Slack WebClient construction
    conf: 0.88
    if:
      type: text
      regex: '\bnew\s+[^;\n]{0,40}WebClient\s*\('

  - id: slack-socket-client
    desc: Slack SocketModeClient construction
    conf: 0.88
    if:
      type: text
      regex: '\bnew\s+[^;\n]{0,40}SocketModeClient\s*\('

  - id: slack-chat-post
    desc: Slack chat postMessage call
    conf: 0.9
    if:
      type: text
      substr: .chat.postMessage(

  - id: slack-file-upload
    desc: Slack files uploadV2 call
    conf: 0.92
    if:
      type: text
      substr: .files.uploadV2(

  - id: slack-private-download
    desc: Slack private file download
    conf: 0.9
    if:
      type: text
      substr: url_private_download

composite_rules:
  - id: slack-bot-api-client
    desc: Slack bot API client
    crit: notable
    conf: 0.94
    all:
      - id: slack-web-api-import
    any:
      - id: slack-web-client
      - id: slack-chat-post
      - id: slack-file-upload

  - id: slack-socket-mode-client
    desc: Slack Socket Mode client
    crit: notable
    conf: 0.94
    all:
      - id: slack-socket-mode-import
    any:
      - id: slack-socket-client
      - id: slack-private-download
