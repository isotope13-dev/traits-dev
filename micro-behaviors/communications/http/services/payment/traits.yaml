defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]
  crit: notable

traits:
  - id: stripe-sdk-require
    desc: Loads the Stripe Node.js SDK
    conf: 0.94
    if:
      type: text
      regex: "(?i)(require\\s*\\(\\s*['\"]stripe['\"]\\s*\\)|from\\s+['\"]stripe['\"])"
  - id: stripe-checkout-session-call
    desc: Calls the Stripe Checkout Sessions API
    conf: 0.94
    if:
      type: symbol
      kind: call
      regex: 'stripe\\.checkout\\.sessions\\.(create|retrieve)'
  - id: paypal-api-host
    desc: References the PayPal API host
    conf: 0.94
    if:
      type: text
      substr: api-m.paypal.com
  - id: paypal-auth-helper
    desc: Calls a PayPal authentication helper
    conf: 0.94
    if:
      type: text
      substr: paypalAuthenticate
  - id: payment-provider-settings
    desc: References payment-provider configuration
    conf: 0.94
    if:
      type: text
      substr: paymentProviders
  - id: braintree-authorization-fingerprint
    desc: Braintree authorization fingerprint field
    conf: 0.98
    if:
      type: encoded
      substr: '"authorizationFingerprint":"'
  - id: braintree-sandbox-config-url
    desc: References a Braintree sandbox configuration URL
    conf: 0.98
    if:
      type: encoded
      substr: '"configUrl":"https://api.sandbox.braintreegateway.com:443/merchants/'
  - id: braintree-client-api-config-path
    desc: Braintree client API configuration path
    conf: 0.98
    if:
      type: encoded
      substr: '/client_api/v1/configuration"'

composite_rules:
  - id: braintree-sandbox-test-marker
    desc: Braintree sandbox SDK test fixture
    crit: notable
    conf: 0.98
    all:
      - id: braintree-authorization-fingerprint
      - id: braintree-sandbox-config-url
      - id: braintree-client-api-config-path
    any:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/fixture::test-filename-pattern

  - id: payment-provider-api-flow
    desc: Payment provider SDK or API flow
    crit: notable
    conf: 0.94
    any:
      - id: stripe-sdk-require
      - id: stripe-checkout-session-call
      - id: paypal-api-host
      - id: paypal-auth-helper
      - id: payment-provider-settings
