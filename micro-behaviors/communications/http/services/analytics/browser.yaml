defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: C0002
  attack: T1071.001

traits:
  - id: browser-send-beacon
    desc: Browser sendBeacon telemetry
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: navigator.sendBeacon
  - id: google-analytics-measurement-protocol
    desc: "GA Measurement Protocol event POST"
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'google-analytics\.com/mp/collect\?api_secret=.{0,160}measurement_id='
  - id: analytics-track-endpoint
    desc: Analytics track endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /analytics/track
  - id: pageview-event-token
    desc: Pageview analytics event token
    crit: component
    conf: 0.86
    if:
      type: text
      word: pageview
  - id: click-event-token
    desc: Click analytics event token
    crit: component
    conf: 0.86
    if:
      type: text
      word: click
  - id: form-submit-event-token
    desc: Form submit analytics event token
    crit: component
    conf: 0.86
    if:
      type: text
      word: form_submit
  - id: scroll-depth-event-token
    desc: Scroll depth analytics event token
    crit: component
    conf: 0.86
    if:
      type: text
      word: scroll_depth
  - id: page-exit-event-token
    desc: Page exit analytics event token
    crit: component
    conf: 0.86
    if:
      type: text
      word: page_exit

composite_rules:
  - id: interaction-event-tokens
    desc: Interaction analytics event tokens
    crit: component
    conf: 0.86
    needs: 2
    any:
      - id: click-event-token
      - id: form-submit-event-token
      - id: scroll-depth-event-token
      - id: page-exit-event-token
  - id: browser-analytics-event-beacon
    desc: Browser analytics event beacon
    crit: notable
    conf: 0.94
    all:
      - id: analytics-track-endpoint
    any:
      - id: browser-send-beacon
      - id: pageview-event-token
      - id: click-event-token
      - id: form-submit-event-token
      - id: scroll-depth-event-token
      - id: page-exit-event-token
    needs: 2
