defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: grammy-import
    desc: grammY Telegram SDK import
    if:
      type: string_literal
      exact: grammy

  - id: telegram-file-api-url
    desc: Telegram file API URL
    conf: 0.92
    if:
      type: text
      substr: api.telegram.org/file/bot

  - id: telegram-bot-constructor
    desc: Telegram bot constructor
    conf: 0.88
    if:
      type: text
      regex: '\bnew\s+Bot\s*\('

  - id: telegram-send-message
    desc: Telegram sendMessage method
    conf: 0.88
    if:
      type: text
      regex: '\b(bot|tg)\.api\.sendMessage\s*\('

  - id: telegram-send-media
    desc: Telegram send media method
    conf: 0.9
    if:
      type: text
      regex: '\b(bot|tg)\.api\.send(Photo|Audio|Document)\s*\('

  - id: monolog-telegram-handler
    desc: Monolog Telegram handler
    crit: baseline
    conf: 0.97
    for: [php]
    if:
      type: text
      regex: 'class\s+TelegramBotHandler\b'
  - id: python-telegram-tool-decorator
    desc: Python Telegram tool decorator
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '@tool\([\s\S]{0,200}send_telegram_'
  - id: python-telegram-bot-endpoint-template
    desc: Python Telegram Bot API endpoint template
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'api\.telegram\.org/bot\{[^}]{1,40}\}/send'

composite_rules:
  - id: telegram-bot-api-client
    desc: Telegram bot API client
    crit: notable
    conf: 0.94
    all:
      - id: grammy-import
    any:
      - id: telegram-bot-constructor
      - id: telegram-file-api-url
      - id: telegram-send-message
      - id: telegram-send-media

  - id: telegram-bot-library-context
    desc: Telegram bot library context
    crit: baseline
    conf: 0.97
    for: [php, javascript, typescript, python]
    any:
      - id: telegram-bot-api-client
      - id: monolog-telegram-handler
      - id: python-telegram-tool-context

  - id: python-telegram-tool-context
    desc: Python Telegram tool integration context
    crit: baseline
    conf: 0.97
    for: [python]
    all:
      - id: python-telegram-tool-decorator
      - id: python-telegram-bot-endpoint-template

  - id: telegram-media-bridge
    desc: Telegram media bridge client
    crit: notable
    conf: 0.94
    any:
      - id: telegram-file-api-url
      - id: telegram-send-media
    all:
      - id: telegram-bot-api-client
