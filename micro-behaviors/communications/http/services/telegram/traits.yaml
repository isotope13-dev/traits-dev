defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: grammy-import
    desc: grammY Telegram SDK import
    if:
      type: string_literal
      exact: grammy

  - id: telegram-file-api-url
    desc: Telegram file API URL
    conf: 0.92
    if:
      type: text
      substr: api.telegram.org/file/bot

  # The Telegram Bot API host — the platform-identity marker. Neutral
  # capability (legit bots talk to it too); exfil intent comes from the
  # objective composites that pair it with sensitive-data collection. Broad
  # for: so binaries/scripts/source match it, not just JS (the file default).
  - id: telegram-api-host
    desc: Telegram Bot API host
    conf: 0.9
    for: [binaries, scripts, source]
    if:
      type: text
      substr: api.telegram.org

  - id: telegram-bot-constructor
    desc: Telegram bot constructor
    conf: 0.88
    if:
      type: text
      regex: '\bnew\s+Bot\s*\('

  - id: telegram-send-message
    desc: Telegram sendMessage method
    conf: 0.88
    if:
      type: text
      regex: '\b(bot|tg)\.api\.sendMessage\s*\('

  - id: telegram-send-media
    desc: Telegram send media method
    conf: 0.9
    if:
      type: text
      regex: '\b(bot|tg)\.api\.send(Photo|Audio|Document)\s*\('
  - id: node-telegram-bot-api-package
    desc: node-telegram-bot-api package reference
    crit: component
    conf: 0.94
    if:
      type: text
      substr: node-telegram-bot-api
  - id: node-telegram-bot-constructor
    desc: Node TelegramBot constructor
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '\bnew\s+TelegramBot\s*\('
  - id: node-telegram-polling-enabled
    desc: Node Telegram polling bot enabled
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'polling\s*:\s*true'
  - id: node-telegram-ontext-handler
    desc: Node Telegram text command handler
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.onText\s*\('
  - id: node-telegram-sendmessage-method
    desc: Telegram bot sendMessage method
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\b(telegram\w*|bot|ctx\.telegram)\.sendMessage\s*\('

  - id: monolog-telegram-handler
    desc: Monolog Telegram handler
    crit: baseline
    conf: 0.97
    for: [php]
    if:
      type: text
      regex: 'class\s+TelegramBotHandler\b'
  - id: python-telegram-tool-decorator
    desc: Python Telegram tool decorator
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '@tool\([\s\S]{0,200}send_telegram_'
  - id: python-telegram-bot-endpoint-template
    desc: Python Telegram Bot API endpoint template
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'api\.telegram\.org/bot\{[^}]{1,40}\}/send'
  - id: python-telegram-api-url-template
    desc: Python Telegram Bot API URL
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'api\.telegram\.org/bot\{[^}]{1,40}\}'
  - id: python-telegram-get-updates
    desc: Python Telegram getUpdates endpoint
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: getUpdates
  - id: python-telegram-callback-query
    desc: Python Telegram callback endpoint
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: answerCallbackQuery
  - id: python-telegram-edit-message
    desc: Python Telegram edit message endpoint
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: editMessageText
  - id: python-telegram-chat-action
    desc: Python Telegram chat action endpoint
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: sendChatAction
  # go-telegram-api-endpoint removed: it matched the same api.telegram.org host
  # string as telegram-api-host above. The canonical host atom (broad for:)
  # covers go/rust too; go/rust composites below reference it.
  - id: python-telegram-seed-fallback-list
    desc: Python Telegram seed fallback list
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: _SEED_FALLBACK_IPS
  - id: go-telegram-send-message-path
    desc: Go/Rust Telegram sendMessage endpoint
    crit: component
    conf: 0.85
    for: [go, rust]
    if:
      type: text
      substr: /sendMessage
  - id: go-telegram-send-document-path
    desc: Go Telegram sendDocument endpoint
    crit: component
    conf: 0.88
    for: [go]
    if:
      type: text
      substr: /sendDocument
  - id: rust-telegram-get-updates-path
    desc: Rust Telegram getUpdates endpoint
    crit: component
    conf: 0.85
    for: [rust]
    if:
      type: text
      substr: getUpdates

composite_rules:
  - id: telegram-bot-api-client
    desc: Telegram bot API client
    crit: notable
    conf: 0.94
    all:
      - id: grammy-import
    any:
      - id: telegram-bot-constructor
      - id: telegram-file-api-url
      - id: telegram-send-message
      - id: telegram-send-media
  - id: node-telegram-bot-api-client
    desc: Node Telegram bot API client
    crit: notable
    conf: 0.94
    all:
      - id: node-telegram-bot-api-package
      - id: node-telegram-bot-constructor
    any:
      - id: node-telegram-polling-enabled
      - id: node-telegram-ontext-handler
      - id: node-telegram-sendmessage-method

  - id: telegram-bot-library-context
    desc: Telegram bot library context
    crit: baseline
    conf: 0.97
    for: [php, javascript, typescript, python, rust]
    any:
      - id: telegram-bot-api-client
      - id: node-telegram-bot-api-client
      - id: monolog-telegram-handler
      - id: python-telegram-tool-context
      - id: python-telegram-bot-wrapper-context
      - id: rust-telegram-bot-api-client

  - id: python-telegram-tool-context
    desc: Python Telegram tool integration context
    crit: baseline
    conf: 0.97
    for: [python]
    all:
      - id: python-telegram-tool-decorator
      - id: python-telegram-bot-endpoint-template
  - id: python-telegram-bot-wrapper-context
    desc: Python Telegram bot wrapper
    crit: baseline
    conf: 0.96
    for: [python]
    all:
      - id: python-telegram-api-url-template
    needs: 2
    any:
      - id: python-telegram-get-updates
      - id: python-telegram-callback-query
      - id: python-telegram-edit-message
      - id: python-telegram-chat-action

  - id: telegram-media-bridge
    desc: Telegram media bridge client
    crit: notable
    conf: 0.94
    any:
      - id: telegram-file-api-url
      - id: telegram-send-media
    all:
      - id: telegram-bot-api-client
  - id: go-telegram-sendmessage-client
    desc: Go Telegram sendMessage client
    crit: notable
    conf: 0.92
    for: [go]
    all:
      - id: telegram-api-host
      - id: go-telegram-send-message-path
  - id: go-telegram-file-upload-client
    desc: Go Telegram sendDocument file upload client
    crit: notable
    conf: 0.92
    for: [go]
    all:
      - id: telegram-api-host
      - id: go-telegram-send-document-path
  - id: rust-telegram-bot-api-client
    desc: Rust Telegram bot API client
    crit: notable
    conf: 0.92
    for: [rust]
    all:
      - id: telegram-api-host
    any:
      - id: go-telegram-send-message-path
      - id: rust-telegram-get-updates-path
