defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  attack: T1071.001

traits:
  - id: npm-registry-package-request
    desc: Requests package metadata from npm registry
    if:
      type: symbol
      kind: call
      exact: https.get
      arg:
        kind: string
        substr: registry.npmjs.org/

  - id: npm-dist-tags-read
    desc: Reads npm registry distribution tags
    conf: 0.85
    if:
      type: literal
      kind: string
      exact: dist-tags
  - id: python-npm-registry-package-url
    desc: Python constructs npm package metadata URL
    for: [python]
    if:
      type: text
      regex: 'registry\.npmjs\.org\s*/\s*\{'
