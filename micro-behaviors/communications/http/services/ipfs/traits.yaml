# IPFS gateway references are a transport/content-retrieval capability.  They
# are common in wallet, NFT, and decentralized-application clients and do not
# by themselves establish command and control or payload delivery.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell, powershell]
  attack: T1102

traits:
  - id: ipfs-gateway--rx-10
    desc: References the ipfs.io IPFS gateway
    crit: component
    conf: 0.7
    if:
      type: literal
      kind: string
      substr: ipfs.io/ipfs/
    unless:
      - id: metadata/library/data::public-suffix-list-content
  - id: ipfs-gateway--rx-11
    desc: References the Pinata IPFS gateway
    crit: component
    conf: 0.7
    if:
      type: literal
      kind: string
      substr: gateway.pinata.cloud
    unless:
      - id: metadata/library/data::public-suffix-list-content
  - id: ipfs-gateway--rx-12
    desc: References the Cloudflare IPFS gateway
    crit: component
    conf: 0.7
    if:
      type: literal
      kind: string
      substr: cloudflare-ipfs.com
    unless:
      - id: metadata/library/data::public-suffix-list-content
  - id: ipfs-gateway--rx-13
    desc: References the dweb.link IPFS gateway
    crit: component
    conf: 0.7
    if:
      type: literal
      kind: string
      substr: dweb.link
    unless:
      - id: metadata/file/catalog/identity::public-suffix-list
      - id: metadata/library/data::public-suffix-list-content
  - id: ipfs-gateway--rx-14
    desc: References the Filebase IPFS gateway
    crit: component
    conf: 0.7
    if:
      type: literal
      kind: string
      substr: myfilebase.com/ipfs/
    unless:
      - id: metadata/file/catalog/identity::public-suffix-list
      - id: metadata/library/data::public-suffix-list-content
  - id: ipfs-gateway--rx-15
    desc: References the MyPinata IPFS gateway
    crit: component
    conf: 0.7
    if:
      type: literal
      kind: string
      substr: mypinata.cloud/ipfs/
    unless:
      - id: metadata/file/catalog/identity::public-suffix-list
      - id: metadata/library/data::public-suffix-list-content

  - id: public-ipfs-gateway-literal
    desc: Uses a public IPFS content gateway
    crit: notable
    conf: 0.72
    if:
      type: literal
      kind: string
      regex: 'ipfs\.io/ipfs/|gateway\.pinata\.cloud|cloudflare-ipfs\.com'
    unless:
      - id: metadata/library/data::public-suffix-list-content
  - id: alt-ipfs-gateway-literal
    desc: Uses an alternate IPFS content gateway
    crit: notable
    conf: 0.72
    if:
      type: literal
      kind: string
      regex: 'dweb\.link|myfilebase\.com/ipfs/|mypinata\.cloud/ipfs/'
    unless:
      - id: metadata/file/catalog/identity::public-suffix-list
      - id: metadata/library/data::public-suffix-list-content

composite_rules:
  - id: ipfs-gateway
    desc: Uses an IPFS gateway for content retrieval
    crit: notable
    conf: 0.7
    any:
      - id: public-ipfs-gateway-literal
      - id: alt-ipfs-gateway-literal
      - id: ipfs-gateway--rx-10
      - id: ipfs-gateway--rx-11
      - id: ipfs-gateway--rx-12
      - id: ipfs-gateway--rx-13
      - id: ipfs-gateway--rx-14
      - id: ipfs-gateway--rx-15
    unless:
      - id: metadata/file/catalog/identity::public-suffix-list
      - id: metadata/library/data::public-suffix-list-content
