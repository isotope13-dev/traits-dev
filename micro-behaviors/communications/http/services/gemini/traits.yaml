defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: google-generative-ai-package
    desc: Google Generative AI package
    if:
      type: text
      substr: "@google/generative-ai"

  - id: google-generative-ai-client
    desc: Google Generative AI client
    for: [javascript, typescript]
    if:
      type: text
      substr: GoogleGenerativeAI

  - id: gemini-api-key
    desc: Gemini API key environment
    for: [javascript, typescript]
    if:
      type: text
      substr: GEMINI_API_KEY

  - id: gemini-rest-generate-content
    desc: Calls Gemini generateContent REST endpoint
    for: [javascript, typescript]
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'generativelanguage\.googleapis\.com/[^\s"''`]{1,180}generateContent'

  - id: gemini-flash-model
    desc: Gemini Flash model reference
    if:
      type: text
      substr: gemini-2.0-flash

  - id: gemini-embedding-model
    desc: Gemini embedding model reference
    if:
      type: text
      substr: text-embedding-004

  - id: gemini-generate-content
    desc: Gemini generateContent call
    for: [javascript, typescript]
    if:
      type: text
      substr: .generateContent(

  - id: gemini-embed-content
    desc: Gemini embedContent call
    for: [javascript, typescript]
    if:
      type: text
      substr: .embedContent(

composite_rules:
  - id: gemini-generative-ai-client
    desc: Gemini Generative AI client
    crit: notable
    conf: 0.94
    all:
      - id: google-generative-ai-client
    any:
      - id: gemini-api-key
      - id: gemini-flash-model
      - id: gemini-generate-content

  - id: gemini-embedding-client
    desc: Gemini embedding API client
    crit: notable
    conf: 0.94
    all:
      - id: google-generative-ai-client
      - id: gemini-embedding-model
    any:
      - id: gemini-embed-content
      - id: gemini-api-key
