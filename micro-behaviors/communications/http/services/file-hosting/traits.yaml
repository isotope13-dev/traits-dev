defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, source]
  mbc: C0002
traits:
  - id: bullethost-cloud
    desc: Bullethost.cloud file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: bullethost.cloud
  - id: anonfiles-com
    desc: Anonfiles.com file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: anonfiles.com
  - id: gofile-io
    desc: Gofile.io file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: gofile.io
  - id: transfer-sh
    desc: Transfer.sh file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: transfer.sh
  - id: tmpfiles-org
    desc: Tmpfiles.org file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: tmpfiles.org
  # Host split into fragments is a code smell but low-signal on its own (the
  # split-hostname obfuscation composite carries the suspicious weight); this
  # fragment literal is a component building block.
  - id: split-tmpfiles-org-fragments
    desc: Split Tmpfiles.org host fragments
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']tmp["'']\s*,\s*["'']files["'']\s*,\s*["'']\.org["'']'
  - id: catbox-moe
    desc: Catbox.moe file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: catbox.moe
  - id: uguu-se
    desc: Uguu.se file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: uguu.se
  - id: pomf-cat
    desc: Pomf.cat file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: pomf.cat
  - id: 0x0-st
    desc: 0x0.st file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: 0x0.st
  - id: file-io
    desc: File.io file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: file.io
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: filedropper-com
    desc: Filedropper.com file hosting
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: filedropper.com
  - id: doko-moe
    desc: Doko.moe file hosting (commonly abused)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: doko.moe
  - id: freehostia-com
    desc: Freehostia.com free web hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: freehostia.com
    unless:
      - id: metadata/package/quality/
  - id: herokuapp-com
    desc: Heroku app-hosted endpoint reference
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '[a-z0-9-]+\.herokuapp\.com'
    not:
      - substr: mm-resource-service.herokuapp.com
  - id: blogspot-url-binary
    desc: Blogspot URL reference
    crit: notable
    conf: 0.75
    for: [binaries]
    size_max: 10485760
    if:
      type: string_literal
      regex: 'https?://[^\s]{1,120}blogspot\.com([/?#: ]|$)'
    not:
      - regex: (?i)(https?://\S+blogspot\.com\S{0,80})\s*\*/
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/development/debugpy
      - id: metadata/package/testing/presence/harness::go-test-file
composite_rules:
  - id: public-file-or-payload-hosting
    desc: References public file or payload hosting service
    crit: notable
    conf: 0.95
    any:
      - id: bullethost-cloud
      - id: anonfiles-com
      - id: gofile-io
      - id: transfer-sh
      - id: tmpfiles-org
      - id: split-tmpfiles-org-fragments
      - id: catbox-moe
      - id: uguu-se
      - id: pomf-cat
      - id: 0x0-st
      - id: file-io
      - id: filedropper-com
      - id: doko-moe
      - id: freehostia-com
      - id: blogspot-url-binary
  - id: multi-public-file-hosting-services
    desc: References multiple public file-hosting services
    crit: suspicious
    conf: 0.9
    all:
      - id: catbox-moe
      - id: tmpfiles-org
      - id: uguu-se
  - id: public-file-hosting-upload-flow
    desc: Uploads data to a public file-hosting service
    crit: suspicious
    conf: 0.9
    all:
      - id: public-file-or-payload-hosting
      - id: micro-behaviors/communications/http/post::formdata-class
      - id: micro-behaviors/communications/http/request/client::post-method-text
