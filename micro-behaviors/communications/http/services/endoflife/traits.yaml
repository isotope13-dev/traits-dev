# endoflife.date public lifecycle API. This is a legitimate software-support
# metadata source used by version-freshness and EOL scanners.
defaults:
  platforms: [unix, windows]
  for: [scripts]
  crit: notable
  conf: 0.95
traits:
  - id: lifecycle-api-endpoint
    desc: endoflife.date lifecycle API endpoint
    if:
      type: text
      substr: endoflife.date/api
