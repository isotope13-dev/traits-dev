defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, package.json]
  attack: T1071.001
  mbc: C0002
  crit: notable
  conf: 0.9

traits:
  - id: dingtalk-oapi-domain
    desc: DingTalk OpenAPI endpoint domain
    if:
      type: literal
      kind: string
      substr: oapi.dingtalk.com

  - id: dingtalk-api-domain
    desc: DingTalk API endpoint domain
    if:
      type: literal
      kind: string
      substr: api.dingtalk.com

  - id: dingtalk-robot-send-endpoint
    desc: DingTalk robot send endpoint
    if:
      type: literal
      kind: string
      substr: /robot/send?access_token=

  - id: dingtalk-token-field
    desc: DingTalk token field
    crit: component
    conf: 0.86
    if:
      type: literal
      kind: string
      exact: dingToken

  - id: dingtalk-client-secret-field
    desc: DingTalk client secret field
    crit: component
    conf: 0.86
    if:
      type: literal
      kind: string
      exact: clientSecret

composite_rules:
  - id: dingtalk-api-endpoint
    desc: DingTalk API endpoint usage
    crit: notable
    conf: 0.92
    any:
      - id: dingtalk-oapi-domain
      - id: dingtalk-api-domain
      - id: dingtalk-robot-send-endpoint

  - id: dingtalk-credential-field
    desc: DingTalk credential field
    crit: component
    conf: 0.88
    any:
      - id: dingtalk-token-field
      - id: dingtalk-client-secret-field

  - id: dingtalk-openapi-client
    desc: DingTalk OpenAPI client usage
    crit: notable
    conf: 0.94
    all:
      - id: dingtalk-api-endpoint
      - id: dingtalk-credential-field

  - id: dingtalk-client-context
    desc: DingTalk client context
    crit: component
    conf: 0.9
    any:
      - id: dingtalk-openapi-client
      - id: dingtalk-token-field
      - id: dingtalk-client-secret-field
