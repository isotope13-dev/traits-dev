defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: groq-sdk-package
    desc: Groq SDK package
    if:
      type: text
      substr: groq-sdk

  - id: groq-client-constructor
    desc: Groq client construction
    for: [javascript, typescript]
    if:
      type: text
      regex: "\\bnew\\s+Groq\\s*\\("

  - id: groq-api-key
    desc: Groq API key environment
    for: [javascript, typescript]
    if:
      type: text
      substr: GROQ_API_KEY

  - id: groq-chat-completions
    desc: Groq chat completions call
    for: [javascript, typescript]
    if:
      type: text
      substr: .chat.completions.create(

  - id: groq-llama-model
    desc: Groq Llama model reference
    if:
      type: text
      substr: llama-3.3-70b-versatile

composite_rules:
  - id: groq-chat-client
    desc: Groq chat API client
    crit: notable
    conf: 0.94
    all:
      - id: groq-client-constructor
    any:
      - id: groq-api-key
      - id: groq-chat-completions
      - id: groq-llama-model
