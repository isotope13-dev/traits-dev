defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  attack: T1071.001
traits:
  - id: hf-space-reference
    desc: Hugging Face Spaces host reference
    conf: 0.75
    if:
      type: text
      regex: '(?i)[a-zA-Z0-9.-]+\.hf\.space'
    unless:
      - id: metadata/library/data/

# A Hugging Face Space can be an ordinary application backend (for example,
# document conversion or image generation).  The provider marker plus a
# download capability is therefore neutral; command-line staging is kept as
# the objective-level signal.
composite_rules:
  - id: hf-space-download-capability
    desc: Hugging Face Space reference with download capability
    crit: notable
    conf: 0.8
    all:
      - id: hf-space-reference
      - id: micro-behaviors/communications/http/download/
