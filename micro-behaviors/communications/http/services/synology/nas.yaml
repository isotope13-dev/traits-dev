# Synology NAS Web API references
# Detects Synology DSM Web API strings used by NAS upload/exfiltration tools
# ATT&CK: T1071 (Application Layer Protocol)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, shell]
  attack: T1071
  mbc: C0002
traits:
  - id: syno-filestation-upload
    desc: Synology FileStation upload API reference
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "SYNO.FileStation.Upload"

  - id: syno-filestation-sharing
    desc: Synology FileStation sharing API reference
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "SYNO.FileStation.Sharing"

  - id: syno-api-auth
    desc: Synology API authentication reference
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "SYNO.API.Auth"

  - id: synology-webapi-auth-cgi
    desc: Synology authentication CGI endpoint
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "/webapi/auth.cgi"

  - id: synology-webapi-entry-cgi
    desc: Synology Web API entry endpoint
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "/webapi/entry.cgi"

  - id: synology-session-filestation
    desc: Synology FileStation session parameter
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'session: "FileStation"'

composite_rules:
  - id: synology-nas-api
    desc: Synology NAS Web API usage
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/communications/http/services/synology
