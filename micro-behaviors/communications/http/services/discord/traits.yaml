defaults:
  platforms: [windows, macos, linux]
  for: [javascript, typescript, python, pe, elf, macho]
  crit: notable
  conf: 0.8

traits:
  - id: python-command-decorator
    desc: Python Discord command decorator
    for: [python]
    if:
      type: text
      regex: '@bot\.command\s*\('
  - id: api-url
    desc: Discord API URL
    conf: 0.75
    if:
      type: text
      regex: 'discord\.com/api/(webhooks/[0-9]{7,}|v[0-9])'
    not:
      - substr: "discord.com/api/webhooks/123456"
      - regex: discord\\.com/(invite|oauth2/authorize)
      - regex: ^\s*#
    unless:
      - id: metadata/package/testing/
      - id: objectives/exfiltration/messaging/webhook/
  - id: invites-api-endpoint
    desc: Discord invites API endpoint
    if:
      type: text
      substr: /api/v10/invites/
  - id: user-channels-endpoint
    desc: Discord user channels API endpoint
    conf: 0.8
    if:
      type: text
      substr: users/@me/channels
  - id: mfa-totp-endpoint
    desc: Discord MFA TOTP API endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'discord(app)?\.com/api/(v[0-9]+/)?auth/mfa/totp\b'
  - id: domain-regex
    desc: Discord domain regex
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'discord\(\?:app\)\?'
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
