defaults:
  platforms: [windows, macos, linux]
  for: [javascript, typescript, python, pe, elf, macho]
  crit: notable
  conf: 0.8

traits:
  - id: api-url
    desc: Discord API URL
    conf: 0.75
    if:
      type: text
      regex: 'discord\.com/api/(webhooks/[0-9]{7,}|v[0-9])'
    not:
      - substr: "discord.com/api/webhooks/123456"
      - regex: discord\\.com/(invite|oauth2/authorize)
      - regex: ^\s*#
    unless:
      - id: metadata/package/testing/
      - id: objectives/exfiltration/messaging/webhook/
  - id: invites-api-endpoint
    desc: Discord invites API endpoint
    if:
      type: text
      substr: /api/v10/invites/
  - id: domain-regex
    desc: Discord domain regex
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'discord\(\?:app\)\?'
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
