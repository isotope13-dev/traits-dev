defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: notable
  conf: 0.9

traits:
  - id: emergent-memory-service-url
    desc: Emergent Memory service URL
    conf: 0.95
    if:
      type: text
      regex: 'https://(memory|api)\.emergent-company\.ai\b'

  - id: emergent-memory-graph-relationship-command
    desc: Emergent Memory graph relationship command
    conf: 0.95
    if:
      type: text
      regex: '\bmemory(\.exe)?\s+graph\s+relationships\s+(create|update|delete)\b'
