# Hugpy's CLI and worker arms authenticate requests to a configured central
# service.  These are neutral service/client observations used to distinguish
# intended API authentication from credential exfiltration composites.
defaults:
  platforms: [linux, macos, windows]
  for: [python]
  crit: notable
  conf: 0.96

traits:
  - id: hugpy-central-base-url-setting
    desc: Hugpy central URL configuration
    if:
      type: text
      word: HUGPY_BASE_URL

  - id: hugpy-legacy-central-url-setting
    desc: Hugpy legacy central URL configuration
    if:
      type: text
      word: HUGPY_CENTRAL

  - id: hugpy-legacy-url-setting
    desc: Hugpy legacy URL configuration
    if:
      type: text
      word: HUGPY_URL

  - id: hugpy-worker-central-url-setting
    desc: Hugpy worker central URL configuration
    if:
      type: text
      word: WORKER_CENTRAL_URL

  - id: hugpy-auth-token-environment
    desc: Hugpy API or worker token environment variable
    if:
      type: text
      regex: '\b(HUGPY_(TOKEN|API_KEY|OPERATOR_TOKEN)|WORKER_ENROLL_TOKEN)\b'

  - id: hugpy-authenticated-token-post-context
    desc: Hugpy token sent in authenticated request
    if:
      type: text
      regex: '(?is)HUGPY_(TOKEN|API_KEY|OPERATOR_TOKEN)[\s\S]{0,520}(Authorization|urlopen)'

  - id: hugpy-worker-token-post-context
    desc: Hugpy worker token sent in request
    if:
      type: text
      regex: '(?is)WORKER_ENROLL_TOKEN[\s\S]{0,520}(Authorization|urlopen)'

  # These route markers identify Hugpy's documented worker/model control
  # plane.  They are notable service observations; authentication and
  # operator-gating determine intent elsewhere.
  - id: hugpy-worker-registration-route
    desc: Hugpy worker registration route
    if:
      type: text
      regex: '/llm/workers/register\b'

  - id: hugpy-worker-heartbeat-route
    desc: Hugpy worker heartbeat route
    if:
      type: text
      regex: '/llm/workers[\s\S]{0,160}/heartbeat\b'

  - id: hugpy-model-sync-route
    desc: Hugpy model synchronization route
    if:
      type: text
      regex: '/llm/models/[\s\S]{0,100}/(manifest|file|archive)\b'

  - id: hugpy-worker-restart-route
    desc: Hugpy worker restart route
    if:
      type: text
      regex: '/llm/workers/[A-Za-z0-9_.-]{1,64}/(restart|update|pip)\b'

  - id: hugpy-worker-maintenance-route
    desc: Hugpy worker maintenance route
    if:
      type: text
      regex: '/llm/workers/[A-Za-z0-9_.-]{1,64}/(evict|reap)\b'

  - id: hugpy-worker-version-route
    desc: Hugpy worker version route
    if:
      type: text
      regex: '/llm/workers/required-version\b'

composite_rules:
  - id: hugpy-authenticated-central-api-client
    desc: Hugpy authenticated central API client
    all:
      - id: hugpy-central-base-url-setting
      - id: hugpy-auth-token-environment
      - id: micro-behaviors/communications/http/request/client::urllib-json-post
      - id: micro-behaviors/communications/http/headers::authorization-header-map-entry

  - id: hugpy-worker-control-plane
    desc: Hugpy worker control plane
    all:
      - id: hugpy-worker-registration-route
      - id: hugpy-worker-heartbeat-route

  - id: hugpy-model-provisioning-control-plane
    desc: Hugpy model provisioning control plane
    all:
      - id: hugpy-worker-registration-route
      - id: hugpy-model-sync-route

  - id: hugpy-worker-operator-route
    desc: Hugpy worker operator route
    any:
      - id: hugpy-worker-restart-route
      - id: hugpy-worker-maintenance-route
