defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript]
  crit: notable
traits:
- id: github-create-repo-api
  desc: GitHub create repository API call
  conf: 0.8
  if:
    type: text
    substr: /user/repos
- id: github-api-host
  desc: GitHub API host reference
  crit: baseline
  conf: 0.86
  for: [javascript, typescript, python, shell]
  if:
    type: text
    substr: api.github.com
- id: github-app-installation-token-api
  desc: GitHub App installation token API
  conf: 0.88
  for: [javascript, typescript, python, shell]
  if:
    type: text
    substr: /app/installations/
- id: github-create-repo-octokit--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: createForAuthenticatedUser
  count_max: 1017349
- id: github-create-repo-octokit--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: createInOrg
  count_max: 1017350
- id: github-create-or-update-file-contents
  desc: GitHub file contents write API
  conf: 0.92
  if:
    type: text
    regex: \.createOrUpdateFileContents\s*\(
- id: github-contents-template-api
  desc: GitHub contents API template
  conf: 0.86
  for: [javascript, typescript]
  if:
      type: text
      substr: "api.github.com/repos/${"
- id: github-contents-api-endpoint
  desc: GitHub repository contents API endpoint
  conf: 0.86
  for: [javascript, typescript, python, shell]
  if:
    type: literal
    regex: 'api\.github\.com/repos/.{1,120}/contents/'
- id: github-get-authenticated-user
  desc: GitHub authenticated user lookup API
  conf: 0.8
  if:
    type: text
    regex: \.getAuthenticated\s*\(|users\]\[[^]]{0,40}get
- id: github-release-api
  desc: GitHub releases API path
  conf: 0.6
  if:
    type: text
    regex: /repos/.{0,60}/releases
  not:
  - substr: /repos/eugeny/tabby/releases
  - substr: /repos/Microsoft/vscode-linux-bu
- id: github-runner-registration-api
  desc: GitHub Actions runner registration API call
  conf: 0.9
  if:
    type: text
    substr: actions/runners/registration-token
- id: github-issue-label-api
  desc: GitHub issue label API path
  conf: 0.84
  if:
    type: text
    regex: '/repos/[^''"\s]{1,160}/(labels|issues/[^''"\s]{1,80}/labels)\b'
  not:
  - substr: /repos/{owner}/{repo}/labels
  - substr: /repos/{owner}/{repo}/issues/
- id: github-issue-comment-api
  desc: GitHub issue comment API path
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '/repos/[^''"\s]{1,160}/issues/[^''"\s]{1,80}/comments\b'
  not:
  - substr: /repos/{owner}/{repo}/issues/
  unless:
  - id: micro-behaviors/process/interpreter/vm/
  - id: well-known/tool/detection/sast/
- id: github-actions-environments-api
  desc: GitHub Actions environments API path
  conf: 0.9
  for: [javascript, typescript, python, shell]
  if:
    type: text
    regex: '/repos/[^''"\s]{1,160}/environments\b'
  not:
  - substr: /repos/{owner}/{repo}/environments
- id: github-issues-api
  desc: GitHub issues API path
  crit: component
  conf: 0.88
  for: [python, javascript, typescript, shell]
  if:
    type: text
    regex: 'api\.github\.com/repos/.{1,120}/issues(\?|/(\{.{1,20}\}|[0-9]+)(/comments)?)?\b'
- id: github-python-token-auth-header-bracket
  desc: "Python GitHub token auth hdr from os.environ"
  crit: component
  conf: 0.88
  for: [python]
  if:
    type: text
    regex: 'Authorization.{0,80}os\.environ\[[''"]GITHUB_TOKEN'
- id: github-python-token-auth-header-get
  desc: 'github python token auth header get'
  crit: component
  conf: 0.88
  for: [python]
  if:
    type: text
    regex: 'Authorization.{0,80}os\.environ\.get\([''"]GITHUB_TOKEN'
- id: github-python-token-auth-header-var
  desc: Python GitHub token auth header from variable
  crit: component
  conf: 0.86
  for: [python]
  if:
    type: text
    regex: 'Authorization.{0,80}GITHUB_TOKEN'
- id: github-python-client-import
  desc: Python imports the PyGithub client
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: import
    exact: Github
- id: github-python-client-token
  desc: PyGithub client initialized with token
  crit: component
  conf: 0.92
  for: [python]
  if:
    type: text
    regex: 'Github\s*\(\s*[A-Za-z_][A-Za-z0-9_.]*token[A-Za-z0-9_.]*\s*\)'
- id: github-js-token-auth-header-env
  desc: JS GitHub token auth from process.env
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'Authorization.{0,120}process\.env\.GITHUB_TOKEN'
- id: github-rest-api-version-header
  desc: GitHub REST API version header
  crit: component
  conf: 0.9
  for: [javascript, typescript, python, shell]
  if:
    type: text
    substr: X-GitHub-Api-Version
- id: github-create-repo-auto-init-field
  desc: GitHub create-repo auto-init field
  crit: component
  conf: 0.84
  for: [javascript, typescript, python, shell]
  if:
    type: text
    substr: auto_init
composite_rules:
- id: github-create-release-api
  desc: GitHub create release API call
  conf: 0.85
  all:
  - id: github-release-api
  any:
  - id: micro-behaviors/communications/http/post::axios-post-call
- id: github-create-repo
  desc: GitHub repository creation workflow API
  crit: notable
  conf: 0.9
  any:
  - id: github-create-repo-api
  - id: github-create-repo-octokit
  - id: github-create-repo-rest-fields
- id: github-repo-file-write
  desc: GitHub repo contents write API
  crit: suspicious
  conf: 0.93
  all:
  - id: github-create-or-update-file-contents
  any:
  - id: github-create-repo
  - id: github-get-authenticated-user
- id: github-create-repo-octokit
  desc: GitHub authenticated repository creation helper
  crit: baseline
  conf: 0.9
  any:
  - id: github-create-repo-octokit--rx-1
  - id: github-create-repo-octokit--rx-2
- id: github-create-repo-rest-fields
  desc: GitHub repository creation request fields
  crit: notable
  conf: 0.88
  for: [javascript, typescript, python, shell]
  near_bytes: 8192
  all:
  - id: github-rest-api-version-header
  - id: github-create-repo-auto-init-field
- id: github-python-token-auth-header
  desc: Python GitHub token auth header
  crit: component
  conf: 0.88
  for: [python]
  any:
  - id: github-python-token-auth-header-bracket
  - id: github-python-token-auth-header-get
  - id: github-python-token-auth-header-var
- id: github-python-token-client
  desc: Python configures an authenticated PyGithub client
  crit: notable
  conf: 0.92
  for: [python]
  all:
  - id: github-python-client-import
  - id: github-python-client-token
- id: github-js-token-auth-header
  desc: JavaScript GitHub API token auth header
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  all:
  - id: github-api-host
  - id: github-js-token-auth-header-env
- id: github-python-issue-maintenance
  desc: Python GitHub issue maintenance flow
  crit: component
  conf: 0.9
  for: [python]
  all:
  - id: github-python-token-auth-header
  - id: github-issues-api
