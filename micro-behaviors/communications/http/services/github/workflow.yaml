# Neutral GitHub Actions REST API capability. Workflow dispatch is common in
# release automation; supply-chain intent requires additional secret,
# untrusted-input, or exfiltration context in an objectives composite.
defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript, typescript]
  crit: notable
  conf: 0.92

traits:
- id: github-workflow-dispatch-api
  desc: GitHub workflow dispatch API path
  if:
    type: text
    regex: '/repos/[^''"\s]{1,160}/actions/workflows/[^''"\s]{1,120}/dispatches'
  not:
  - substr: /repos/{owner}/{repo}/actions/workflows/
- id: github-workflow-file-write-api
  desc: GitHub workflow file contents API write path
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '/repos/[^''"\s]{1,160}/contents/\.github/workflows/[^''"\s]{0,80}\.ya?ml'
  not:
  - substr: /repos/{owner}/{repo}/contents/
