defaults:
  platforms: [unix, windows]
  for: [scripts, source, javascript, typescript, text, package.json]

traits:
  - id: repeated-public-cloud-provider-name
    desc: Repeated public cloud provider name
    crit: component
    conf: 0.4
    count_min: 3
    if:
      type: text
      regex: '\b(AWS|Azure|Cloudflare|Fastly)\b'
  - id: repeated-google-cloud-provider-name
    desc: Repeated Google Cloud provider name
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b(Google Cloud|GCP|Cloudfront)\b'
