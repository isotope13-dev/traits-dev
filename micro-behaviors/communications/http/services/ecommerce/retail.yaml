defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: C0002
  attack: T1071.001

traits:
- id: ebay-feedback-profile-api
  desc: Accesses eBay feedback profile API
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: ebay.com/fdbk/update_feedback_profile
- id: extensiondata-payment-service
  desc: Connects to ExtensionData payment service
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: pay.extensiondata.com
- id: retail-searchserverapi-endpoint
  desc: searchserverapi product search endpoint
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "searchserverapi.com/getresults"
- id: retail-mybcapps-search-endpoint
  desc: mybcapps product search endpoint
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "services.mybcapps.com/bc-sf-filter/search"
- id: retail-fredhopper-search-endpoint
  desc: Fredhopper product suggestion endpoint
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "query.published.live1.suggest.ap2.fredhopperservices.com/davidjones"
- id: retail-iconic-search-endpoint
  desc: Iconic product suggestion endpoint
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "eve.theiconic.com.au/v2/catalog/suggestions"
- id: retail-myer-search-endpoint
  desc: Myer product search endpoint
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "api-online.myer.com.au/v3/product/search"
- id: retail-asos-search-endpoint
  desc: ASOS product search endpoint
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "www.asos.com/api/product/search"
- id: retail-searchspring-endpoint
  desc: Searchspring product search endpoint
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "searchspring.io/api/search/search.json"
- id: wishlist-item-api
  desc: Wishlist item API access
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'wishlist-service/(add-wishlist-item|get-wishlist-items?)'
    case_insensitive: true
- id: wishlist-price-update-api
  desc: Wishlist price update API access
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'wishlist-service/(update-wishlist-item-prices|delete-wishlist-item|price-drop-trigger)'
    case_insensitive: true

- id: amazon-product-url-pattern
  desc: Amazon product URL reference
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: "/(dp|gp/product)/[A-Z0-9]{10}"

- id: amazon-retail-host-primary
  desc: Amazon retail host reference (primary TLD)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "amazon\\.(com|co\\.uk|de)\\b"
    case_insensitive: true

- id: amazon-retail-host-regional
  desc: Amazon retail host reference (regional TLD)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "amazon\\.(fr|it|es|ca)\\b"
    case_insensitive: true

- id: amazon-retail-host-other
  desc: Amazon retail host reference (other TLD)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "amazon\\.(com\\.au|co\\.jp|in)\\b"
    case_insensitive: true

- id: retail-price-field-primary--bestprice
  desc: Retail price comparison field (bestPrice)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: bestPrice
- id: retail-price-field-primary--sameproduct
  desc: Retail price comparison field (sameProduct)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: sameProduct
- id: retail-price-field-primary--compareprice
  desc: Retail price comparison field (comparePrice)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: comparePrice
- id: retail-price-field-savings--savedprice
  desc: Retail savings comparison field (savedPrice)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: savedPrice
- id: retail-price-field-savings--savedpercentage
  desc: Retail savings comparison (savedPercentage)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: savedPercentage
- id: retail-result-field--retailer
  desc: Retail product result field (retailer)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: retailer
- id: retail-result-field--producturl
  desc: Retail product result field (productUrl)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: productUrl
- id: retail-result-field--productimageurl
  desc: Retail product result field (productImageUrl)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: productImageUrl
- id: retail-result-field--searchresults
  desc: Retail product result field (searchResults)
  crit: component
  conf: 0.84
  if:
    type: text
    case_insensitive: true
    word: searchResults
composite_rules:
- id: retail-price-field-primary
  desc: Retail price comparison field
  crit: component
  conf: 0.84
  any:
  - id: retail-price-field-primary--bestprice
  - id: retail-price-field-primary--sameproduct
  - id: retail-price-field-primary--compareprice
- id: retail-price-field-savings
  desc: Retail savings comparison field
  crit: component
  conf: 0.84
  any:
  - id: retail-price-field-savings--savedprice
  - id: retail-price-field-savings--savedpercentage
- id: retail-result-field
  desc: Retail product result field
  crit: component
  conf: 0.84
  any:
  - id: retail-result-field--retailer
  - id: retail-result-field--producturl
  - id: retail-result-field--productimageurl
  - id: retail-result-field--searchresults
- id: retail-product-search-api
  desc: Retailer product search API access
  crit: notable
  conf: 0.9
  any:
  - id: retail-searchserverapi-endpoint
  - id: retail-mybcapps-search-endpoint
  - id: retail-fredhopper-search-endpoint
  - id: retail-iconic-search-endpoint
  - id: retail-myer-search-endpoint
  - id: retail-asos-search-endpoint
  - id: retail-searchspring-endpoint
- id: retailer-price-comparison-fields
  desc: Retail product price comparison fields
  crit: notable
  conf: 0.84
  all:
  - id: retail-result-field
  any:
  - id: retail-price-field-primary
  - id: retail-price-field-savings
  near_bytes: 512
- id: wishlist-price-drop-api
  desc: Wishlist price-drop API access
  crit: notable
  conf: 0.92
  any:
  - id: wishlist-item-api
  - id: wishlist-price-update-api
- id: amazon-hostname-field-reference
  desc: Amazon hostname stored in a hostname field
  crit: notable
  conf: 0.85
  all:
  - id: micro-behaviors/os/sysinfo/hostname::hostname-field-token
  any:
  - id: amazon-retail-host-primary
  - id: amazon-retail-host-regional
  - id: amazon-retail-host-other
  near_bytes: 128
- id: retail-price-comparison-workflow
  desc: Retail price comparison and wishlist workflow
  crit: notable
  conf: 0.94
  needs: 2
  any:
  - id: retail-product-search-api
  - id: retailer-price-comparison-fields
  - id: wishlist-price-drop-api
