defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: dpaste-api
    desc: Dpaste API usage
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: dpaste\.com/api
  - id: dpaste-api-ast
    desc: Dpaste API usage (AST)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: dpaste.com/api
