defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  mbc: C0002
  attack: T1071.001

traits:
  - id: checkly-api-host
    desc: Checkly monitoring API host
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)(^|[^a-z0-9])api\.checklyhq\.com/v[0-9]+([^a-z0-9]|$)'

  - id: checkly-status-endpoint
    desc: Checkly check-status API path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /check-statuses/
