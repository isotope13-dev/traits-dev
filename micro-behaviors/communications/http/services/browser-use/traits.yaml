defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: browser-use-cloud-api
    desc: Browser Use Cloud API endpoint
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: api.browser-use.com/api/v3
  - id: browser-use-api-key-header
    desc: Browser Use Cloud API key header
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: X-Browser-Use-API-Key
