# Azure Key Vault endpoint shapes are neutral HTTP service indicators. Secret
# theft intent requires the cloud-resource, enumeration, and reader context in
# the credential-access composites that reference these traits.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: resource-url
    desc: Azure Key Vault resource URL
    if:
      type: string_literal
      substr: https://vault.azure.net
  - id: management-vault-list-path
    desc: Azure Key Vault management listing path
    if:
      type: string_literal
      substr: Microsoft.KeyVault/vaults
  - id: secret-list-path
    desc: Azure Key Vault secret-listing path
    if:
      type: string_literal
      substr: /secrets?api-version=
  - id: secret-value-path
    desc: Azure Key Vault secret-value path
    if:
      type: string_literal
      regex: '/secrets/.{1,80}\?api-version='
