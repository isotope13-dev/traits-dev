defaults:
  platforms: [windows, unix]
  for: [scripts, source, binaries]
  attack: "T1102.001"
  mbc: "C0002"

traits:
  - id: google-apps-script-host
    desc: script.google.com Apps Script host
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: script.google.com

  - id: google-apps-script-macros-path
    desc: Apps Script macros deployment path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: "script\\.google\\.com/macros/s/[A-Za-z0-9_-]{20,}"

  - id: google-apps-script-akfycb-deployment
    desc: Apps Script AKfycb deployment ID prefix
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: "AKfycb[A-Za-z0-9_-]{30,}"

  - id: log-event-token
    desc: logEvent telemetry token
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: logEvent
    unless:
      - id: metadata/lang/scripted::dts-declaration-file

  - id: failed-logs-key
    desc: Failed logs storage key
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: failed_logs

composite_rules:
  - id: google-apps-script-telemetry-context
    desc: Apps Script telemetry logging context
    crit: notable
    conf: 0.9
    all:
      - id: google-apps-script-macros-path
    any:
      - id: micro-behaviors/os/telemetry/logging/analytics::telemetry-word
      - id: log-event-token
      - id: failed-logs-key
    near_bytes: 1400
