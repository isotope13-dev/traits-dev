defaults:
  platforms: [windows, unix]
  for: [scripts, source, binaries]
  attack: "T1102.001"
  mbc: "C0002"

traits:
  - id: google-apps-script-host
    desc: script.google.com Apps Script host
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: script.google.com

  - id: google-apps-script-macros-path
    desc: Apps Script macros deployment path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: "script\\.google\\.com/macros/s/[A-Za-z0-9_-]{20,}"

  - id: google-apps-script-akfycb-deployment
    desc: Apps Script AKfycb deployment ID prefix
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: "AKfycb[A-Za-z0-9_-]{30,}"

  - id: failed-logs-key
    desc: Failed logs storage key
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: failed_logs

  - id: feedback-submission-marker
    desc: User-initiated extension feedback submission
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'SUBMIT_FEEDBACK|submitFeedback|Send Feedback'

  - id: license-validation-action
    desc: License validation action parameter
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'action\s*[=:]\s*["''](validate|request)["'']'

  - id: license-cache-storage
    desc: Local license decision cache storage
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'license(Cache|Permanent|CheckedAt)'

  - id: slides-presentation-id-fields
    desc: Google Slides presentation ID fields
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: presentationIds

composite_rules:
  - id: google-apps-script-telemetry-context
    desc: Apps Script telemetry logging context
    crit: exception
    conf: 0.9
    all:
      - id: google-apps-script-macros-path
    any:
      - id: micro-behaviors/os/telemetry/logging/event::log-event-identifier
      - id: failed-logs-key
      - id: feedback-submission-marker
    near_bytes: 1400

  - id: google-apps-script-license-validation-context
    desc: Apps Script extension license-validation context
    crit: exception
    conf: 0.9
    all:
      - id: google-apps-script-macros-path
    any:
      - id: license-validation-action
      - id: license-cache-storage
    near_bytes: 2200

  - id: google-slides-merge-client
    desc: Legitimate Google Slides merge client
    crit: exception
    conf: 0.95
    all:
      - id: google-apps-script-macros-path
      - id: slides-presentation-id-fields
      - id: micro-behaviors/communications/http/lib/requests::requests-post
