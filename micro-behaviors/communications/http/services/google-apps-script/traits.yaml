defaults:
  platforms: [windows, unix]
  for: [scripts, source, binaries]
  attack: "T1102.001"
  mbc: "C0002"

traits:
  - id: google-apps-script-host
    desc: script.google.com Apps Script host
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: script.google.com

  - id: google-apps-script-macros-path
    desc: Apps Script macros deployment path
    crit: notable
    conf: 0.95
    unless:
      - id: well-known/app/competitive-programming-helper::cph-extension-context
      - id: well-known/app/competitive-programming-helper::cph-package-identity
      - id: google-apps-script-user-feedback-context
    if:
      type: text
      regex: "script\\.google\\.com/macros/s/[A-Za-z0-9_-]{20,}"

  - id: google-apps-script-akfycb-deployment
    desc: Apps Script AKfycb deployment ID prefix
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: "AKfycb[A-Za-z0-9_-]{30,}"

  - id: login-name-code-parameters
    desc: Login request carries name and code fields
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'name=\$\{[^}]{1,80}\}&code=\$\{'

  - id: failed-logs-key
    desc: Failed logs storage key
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: failed_logs

  - id: feedback-submission-marker
    desc: User-initiated extension feedback submission
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'SUBMIT_FEEDBACK|submitFeedback|Send Feedback|feedbackSent'

  - id: feedback-json-name-email-comment
    desc: Feedback JSON name email comment fields
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'JSON\.stringify\(\s*\{[^}]{0,160}name:[^}]{0,100}email:[^}]{0,100}comment:'

  - id: feedback-json-name-email-fields
    desc: Feedback JSON name and email fields
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'JSON\.stringify\(\s*\{[^}]{0,100}name:[^}]{0,100}email:'

  - id: feedback-json-title-content-fields
    desc: Feedback title/content JSON fields
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'JSON\.stringify\(\s*\{[^}]{0,240}(title|subject):[^}]{0,160}(content|message):'

  - id: feedback-json-name-email-title-content-shape
    desc: Feedback JSON support payload shape
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'name:[\s\S]{0,100}email:[\s\S]{0,100}title:[\s\S]{0,100}content:'

  - id: feedback-support-form-marker
    desc: Support-form submission status marker
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '(Help & Support|Message sent successfully|Send Message)'
      case_insensitive: true

  - id: license-validation-action
    desc: License validation action parameter
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'action\s*[=:]\s*["''](validate|request)["'']'

  - id: license-validation-function
    desc: Extension license validation function
    crit: notable
    conf: 0.9
    if:
      type: text
      # Require License/Key to end the identifier (or be followed by a call
      # delimiter), so `validateLicense`, `verifyKey`, and
      # `validateLicenseKey` match but `validateKeyword` / `validateKeys`
      # (ajv's schema keyword validators) do not.
      regex: '(?i)\b(verify|validate)(LicenseKey?|Key)([^A-Za-z0-9_$]|$)'

  - id: license-validation-label
    desc: License access validation label
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)validate\s+(access|license)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: license-cache-storage
    desc: Local license decision cache storage
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'license(Cache|Permanent|CheckedAt)'

  - id: license-auth-state
    desc: Local license authorization state
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(license|licence)[\s\S]{0,80}isAuth|isAuth[\s\S]{0,80}(license|licence)'

  - id: slides-presentation-id-fields
    desc: Google Slides presentation ID fields
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: presentationIds

  - id: extension-lifecycle-telemetry-payload
    desc: Extension install-update telemetry payload
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'uuid[A-Z][A-Za-z0-9_]*[\s\S]{0,900}(dateTime|reason|[A-Za-z]+Version)'

  - id: google-sheet-webhook-marker
    desc: Google Sheet webhook marker
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: Google Sheet Webhook

  - id: webhook-fallback-marker
    desc: Webhook fallback marker
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: webhook_fallback_

  - id: legacy-google-analytics-collect-endpoint
    desc: Google Analytics legacy collect endpoint
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: google-analytics.com/collect

  - id: extension-ad-configuration-request
    desc: Extension requests remote ad configuration
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: action=getAds

  - id: waitlist-form-fields
    desc: Waitlist form name and email fields
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?is)formData\.append\(\s*["'']name["''].{0,300}formData\.append\(\s*["'']email["'']'

composite_rules:
  - id: extension-analytics-fallback-marker
    desc: Google Sheet webhook fallback marker
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: google-sheet-webhook-marker
      - id: webhook-fallback-marker

  - id: google-apps-script-telemetry-context
    desc: Apps Script telemetry logging context
    crit: exception
    conf: 0.9
    all:
      - id: google-apps-script-macros-path
    any:
      - id: micro-behaviors/os/telemetry/logging/event::log-event-identifier
      - id: failed-logs-key
      - id: feedback-submission-marker
    near_bytes: 1400

  # User feedback form POSTed to Apps Script (name/email/comment). Does not
  # require the macros-path atom — that atom references this exception in
  # unless:, so including it here would be circular.
  - id: google-apps-script-user-feedback-context
    desc: Apps Script user feedback form submission
    crit: exception
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: feedback-json-name-email-fields
      - id: feedback-json-title-content-fields
    any:
      - id: feedback-submission-marker
      - id: feedback-json-name-email-comment
      - id: feedback-support-form-marker

  - id: google-apps-script-license-validation-context
    desc: Apps Script extension license-validation context
    crit: exception
    conf: 0.9
    all:
      - id: google-apps-script-macros-path
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    any:
      - id: license-validation-action
      - id: license-validation-function
      - id: license-validation-label
      - id: license-cache-storage
      - id: license-auth-state
      - id: micro-behaviors/os/sysinfo/machine-id::machineid-identifier-field

  - id: google-slides-merge-client
    desc: Legitimate Google Slides merge client
    crit: exception
    conf: 0.95
    all:
      - id: google-apps-script-macros-path
      - id: slides-presentation-id-fields
      - id: micro-behaviors/communications/http/lib/requests::requests-post

  - id: google-apps-script-extension-lifecycle-telemetry
    desc: Extension reports install-update lifecycle telemetry to Apps Script
    crit: exception
    conf: 0.94
    all:
      - id: google-apps-script-macros-path
      - id: extension-lifecycle-telemetry-payload
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    near_bytes: 2500

  - id: google-apps-script-extension-analytics-context
    desc: Extension analytics telemetry sent to Apps Script
    crit: exception
    conf: 0.97
    for: [javascript, typescript]
    all:
      - id: google-apps-script-macros-path
      - id: micro-behaviors/os/telemetry/logging/event::extension-analytics-event-payload
      - id: extension-analytics-fallback-marker
      - id: legacy-google-analytics-collect-endpoint
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    near_bytes: 3000

  - id: google-apps-script-login-validation-context
    desc: Extension login validation via Apps Script
    crit: exception
    conf: 0.96
    for: [javascript, typescript]
    all:
      - id: google-apps-script-macros-path
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/params::login-action-parameter
      - id: login-name-code-parameters

  - id: google-apps-script-extension-install-startup-telemetry
    desc: Extension sends install and startup telemetry to Apps Script
    crit: exception
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: google-apps-script-macros-path
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-startup
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    near_bytes: 4000

  - id: google-apps-script-extension-ad-fetch-context
    desc: Extension fetches ad configuration from Apps Script
    crit: exception
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: google-apps-script-macros-path
      - id: extension-ad-configuration-request
      - id: micro-behaviors/communications/http/request/client::js-fetch-call

  - id: google-apps-script-non-c2-context
    desc: Known non-C2 Apps Script context
    crit: exception
    conf: 0.95
    any:
      - id: google-apps-script-extension-install-startup-telemetry
      - id: google-apps-script-extension-ad-fetch-context
      - id: google-apps-script-telemetry-context
      - id: google-apps-script-license-validation-context
      - id: google-slides-merge-client
      - id: google-apps-script-extension-lifecycle-telemetry
      - id: google-apps-script-extension-analytics-context
      - id: google-apps-script-login-validation-context
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
