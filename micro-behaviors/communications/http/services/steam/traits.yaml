defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest]
  crit: notable
  conf: 0.9
  mbc: C0002
traits:
  - id: steamcommunity-url
    desc: Steam community web access
    if:
      type: text
      substr: steamcommunity.com
  - id: steampowered-api-url
    desc: Steam Web API access
    if:
      type: text
      substr: api.steampowered.com
  - id: steam-inventory-endpoint
    desc: Steam inventory endpoint access
    if:
      type: text
      regex: 'steamcommunity\.com/inventory/.{0,80}/730/2'
  - id: steam-econ-trade-api
    desc: Steam trade Web API access
    if:
      type: text
      regex: 'IEconService/GetTrade(Offer|Offers|History)/v1'
  - id: steam-webapi-access-token
    desc: Steam Web API access token
    if:
      type: text
      regex: 'api\.steampowered\.com[^''"]{0,80}access_token'
composite_rules:
  - id: steam-trade-api-client
    desc: Steam trade API client
    crit: notable
    conf: 0.95
    any:
      - id: steam-econ-trade-api
      - id: steam-inventory-endpoint
      - id: steam-webapi-access-token
