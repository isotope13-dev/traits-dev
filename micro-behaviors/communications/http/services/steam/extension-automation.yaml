# Steam trade automation driven from a browser extension: the Steam web API is
# driven via extension message passing + page DOM manipulation. Relocated here
# from the old monolithic browser-extension trait file (co-located with the
# other Steam service traits it references).
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
composite_rules:
  - id: steam-trade-extension-automation
    desc: Steam trade extension automation
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/services/steam::steam-econ-trade-api
      - id: micro-behaviors/communications/http/services/steam::steam-inventory-endpoint
      - id: micro-behaviors/communications/http/services/steam::steam-webapi-access-token
      - id: micro-behaviors/communications/http/services/steam::steamcommunity-url
      - id: micro-behaviors/communications/http/services/steam::steampowered-api-url
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-send-message
    any:
      - id: micro-behaviors/ui/window/manage/dom
