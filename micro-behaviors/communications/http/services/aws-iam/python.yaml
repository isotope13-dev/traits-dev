defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.86
  mbc: C0002

traits:
  - id: boto3-iam-client
    desc: boto3 IAM client
    if:
      type: text
      regex: '\.client\(\s*["'']iam["'']'

  - id: iam-create-role
    desc: IAM role creation
    conf: 0.9
    if:
      type: text
      regex: '\b(iam|iam_client)\.create_role\s*\('

  - id: iam-put-role-policy
    desc: IAM inline role policy
    conf: 0.9
    if:
      type: text
      regex: '\.put_role_policy\s*\('

  - id: iam-create-instance-profile
    desc: IAM instance profile creation
    conf: 0.9
    if:
      type: text
      regex: '\.create_instance_profile\s*\('

  - id: iam-add-role-to-profile
    desc: IAM profile role attachment
    conf: 0.9
    if:
      type: text
      regex: '\.add_role_to_instance_profile\s*\('

  - id: sts-get-caller-identity
    desc: STS caller identity verification
    conf: 0.86
    if:
      type: text
      regex: '\.get_caller_identity\s*\('

  - id: iam-get-account-authorization-details
    desc: AWS IAM authorization-details API operation
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: 'get_account_authorization_details$'

composite_rules:
  - id: ec2-instance-profile-setup
    desc: EC2 instance profile setup
    crit: notable
    conf: 0.92
    all:
      - id: iam-create-instance-profile
      - id: iam-add-role-to-profile

  - id: iam-role-policy-setup
    desc: IAM role policy setup
    crit: notable
    conf: 0.92
    all:
      - id: iam-create-role
      - id: iam-put-role-policy
