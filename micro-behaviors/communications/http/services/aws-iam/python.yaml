defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.86
  mbc: C0002

traits:
  - id: boto3-iam-client
    desc: boto3 IAM client
    if:
      type: text
      regex: '\.client\(\s*["'']iam["'']'

  - id: iam-create-role
    desc: IAM role creation
    conf: 0.9
    if:
      type: symbol
      exact: create_role

  - id: iam-put-role-policy
    desc: IAM inline role policy
    conf: 0.9
    if:
      type: symbol
      exact: put_role_policy

  - id: iam-create-instance-profile
    desc: IAM instance profile creation
    conf: 0.9
    if:
      type: symbol
      exact: create_instance_profile

  - id: iam-add-role-to-profile
    desc: IAM profile role attachment
    conf: 0.9
    if:
      type: symbol
      exact: add_role_to_instance_profile

  - id: sts-get-caller-identity
    desc: STS caller identity verification
    conf: 0.86
    if:
      type: symbol
      exact: get_caller_identity

composite_rules:
  - id: ec2-instance-profile-setup
    desc: EC2 instance profile setup
    crit: notable
    conf: 0.92
    all:
      - id: iam-create-instance-profile
      - id: iam-add-role-to-profile

  - id: iam-role-policy-setup
    desc: IAM role policy setup
    crit: notable
    conf: 0.92
    all:
      - id: iam-create-role
      - id: iam-put-role-policy

