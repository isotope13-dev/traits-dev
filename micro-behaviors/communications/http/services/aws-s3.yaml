# AWS S3 API Operations - Ruby
defaults:
  platforms: [linux, macos, windows, unix]
  for: [ruby]
  crit: notable
traits:
  - id: s3-client
    desc: AWS S3 client initialization
    conf: 0.9
    if:
      type: string_literal
      regex: Aws::S3::Client|S3::Client
  - id: s3-get-object
    desc: S3 get_object operation
    conf: 0.9
    if:
      type: string_literal
      substr: get_object
  - id: s3-put-object
    desc: S3 put_object operation
    conf: 0.9
    if:
      type: string_literal
      substr: put_object
  - id: s3-delete-object
    desc: S3 delete_object operation
    conf: 0.9
    if:
      type: string_literal
      substr: delete_object
  - id: s3-list-objects
    desc: S3 list_objects operation
    conf: 0.9
    if:
      type: string_literal
      word: list_objects
  - id: s3-head-object
    desc: S3 head_object operation
    conf: 0.85
    if:
      type: string_literal
      substr: head_object
  - id: s3-copy-object
    desc: S3 copy_object operation
    conf: 0.85
    if:
      type: string_literal
      substr: copy_object
  - id: s3-presigned-url
    desc: S3 presigned URL generation
    conf: 0.9
    if:
      type: string_literal
      substr: presigned_url
  - id: s3-presigned-post
    desc: S3 presigned POST
    conf: 0.9
    if:
      type: string_literal
      substr: presigned_post
  - id: s3-presigner
    desc: S3 Presigner class
    conf: 0.9
    if:
      type: string_literal
      word: Presigner
