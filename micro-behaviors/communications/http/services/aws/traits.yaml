defaults:
  platforms: [unix, windows]
  for:
    - javascript
    - typescript
traits:
  # AWS Signature Version 4 algorithm identifier. This is the universal SigV4
  # constant emitted by every AWS request signer (aws4, aws-sdk, boto3, ...),
  # not the fingerprint of any single library. Neutral cloud-signing capability.
  - id: sigv4-algorithm-constant
    desc: AWS Signature V4 signing algorithm constant
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: AWS4-HMAC-SHA256

  # EC2 Instance Metadata Service (IMDS) IAM security-credentials endpoint.
  # Reading this path retrieves the instance role's temporary AWS credentials.
  - id: ec2-imds-iam-credentials-endpoint
    desc: EC2 instance-metadata IAM credentials endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '169.254.169.254/latest/meta-data/iam/security-credentials'
