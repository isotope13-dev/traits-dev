defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, html]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  # Web-compose surfaces: a URL that hands prefilled text to X's own composer.
  # These carry no credentials — the user still confirms the post in a browser.
  - id: intent-tweet-url
    desc: Twitter/X intent tweet URL
    for: [javascript, typescript, html, python]
    conf: 0.94
    if:
      type: text
      regex: 'https://(twitter|x)\.com/intent/tweet\?'

  - id: compose-tweet-url
    desc: Twitter/X web compose URL
    for: [javascript, typescript, html, python]
    conf: 0.94
    if:
      type: text
      regex: 'https://(twitter|x)\.com/compose/tweet\b'

  # API surfaces: these post on the account's behalf using stored credentials.
  - id: tweepy-import
    desc: Imports the tweepy Twitter/X API client
    for: [python]
    if:
      type: import
      regex: '^tweepy'

  - id: tweepy-client-construct
    desc: Constructs a tweepy Twitter/X API client
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '^tweepy\.(Client|API)$'

  - id: tweepy-oauth1-handler
    desc: Builds tweepy OAuth1 user credentials
    for: [python]
    if:
      type: symbol
      kind: call
      substr: OAuth1UserHandler

  - id: create-tweet-call
    desc: Publishes a post via the Twitter/X API
    for: [python]
    conf: 0.94
    if:
      type: symbol
      kind: call
      substr: create_tweet

  - id: media-upload-call
    desc: Uploads media via the Twitter/X API
    for: [python]
    conf: 0.88
    if:
      type: symbol
      kind: call
      substr: media_upload

composite_rules:
  - id: authenticated-post-publish
    desc: Publishes to Twitter/X with stored API credentials
    for: [python]
    crit: notable
    conf: 0.95
    all:
      - id: tweepy-import
    any:
      - id: create-tweet-call
      - id: media-upload-call
