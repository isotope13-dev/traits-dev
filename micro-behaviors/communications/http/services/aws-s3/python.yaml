defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  crit: notable
traits:
  - id: boto3-s3-client
    desc: boto3 S3 client initialization
    conf: 0.85
    if:
      type: text
      regex: boto3\.client\(\s*["']s3["']
  - id: generate-presigned-url
    desc: S3 presigned URL generation
    conf: 0.9
    if:
      type: text
      regex: generate_presigned_url|presigned_(?:url|post)
