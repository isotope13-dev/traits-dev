defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: boto3-s3-client
    desc: boto3 S3 client initialization
    conf: 0.85
    if:
      type: text
      regex: '(boto3|session)\.client\(\s*["'']s3["'']'
  - id: generate-presigned-url
    desc: S3 presigned URL generation
    conf: 0.9
    if:
      type: text
      regex: generate_presigned_url|presigned_(url|post)
  - id: s3-create-bucket
    desc: S3 bucket creation
    conf: 0.9
    if:
      type: symbol
      exact: create_bucket
  - id: s3-block-public-access
    desc: S3 public access block
    conf: 0.9
    if:
      type: symbol
      exact: put_public_access_block
  - id: s3-bucket-encryption
    desc: S3 bucket encryption configuration
    conf: 0.9
    if:
      type: symbol
      exact: put_bucket_encryption
  - id: s3-lifecycle-configuration
    desc: S3 lifecycle configuration
    conf: 0.88
    if:
      type: symbol
      exact: put_bucket_lifecycle_configuration
  - id: s3-put-object-python
    desc: S3 object upload
    conf: 0.88
    if:
      type: symbol
      exact: put_object
  - id: s3-download-file
    desc: S3 file download
    conf: 0.88
    # Require the method-call form (`client.download_file(...)`); the bare symbol
    # `download_file` collides with user-defined free functions of that name.
    if:
      type: text
      regex: '\.download_file\s*\('
  - id: s3-delete-objects
    desc: S3 object deletion
    conf: 0.88
    if:
      type: symbol
      exact: delete_objects
  - id: aws-cli-s3-sync
    desc: AWS CLI S3 sync
    conf: 0.88
    if:
      type: text
      substr: aws s3 sync
  - id: aws-cli-s3-copy
    desc: AWS CLI S3 copy
    conf: 0.88
    if:
      type: text
      substr: aws s3 cp

composite_rules:
  - id: s3-bucket-hardening
    desc: S3 bucket hardening
    crit: notable
    conf: 0.92
    needs: 2
    any:
      - id: s3-block-public-access
      - id: s3-bucket-encryption
      - id: s3-lifecycle-configuration

  - id: s3-output-sync
    desc: S3 output synchronization
    crit: notable
    conf: 0.9
    any:
      - id: aws-cli-s3-sync
      - id: s3-put-object-python
      - id: s3-download-file
