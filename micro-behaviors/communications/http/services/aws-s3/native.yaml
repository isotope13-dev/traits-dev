# Native AWS S3 service references.  These identify network capability; intent
# is inferred only by objective composites that add a sensitive data source.
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
- id: amazonaws-domain
  desc: Amazon S3 service domain
  if:
    type: text
    regex: https?://s3\.amazonaws\.com/
- id: regional-bucket-domain
  desc: Regional S3 bucket domain
  conf: 0.82
  if:
    type: text
    regex: https?://[a-z0-9][a-z0-9.-]{2,80}\.s3\.[a-z0-9-]+\.amazonaws\.com/
- id: upload-api
  desc: Amazon S3 upload operation
  if:
    type: text
    regex: s3.{0,50}\.[u]pload
