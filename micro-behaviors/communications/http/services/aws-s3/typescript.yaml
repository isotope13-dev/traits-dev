# AWS S3 API operations in JavaScript/TypeScript.
# These are neutral cloud-storage capabilities; intent belongs in composites
# that establish collection or exfiltration context.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
- id: s3-client-typescript
  desc: AWS S3 client in JavaScript or TypeScript
  if:
    type: text
    regex: "(from|require\\s*\\()\\s*['\"]@aws-sdk/client-s3['\"]"
- id: s3-put-object-typescript
  desc: S3 object upload command
  if:
    type: text
    word: PutObjectCommand
- id: s3-list-objects-typescript
  desc: S3 object listing command
  if:
    type: text
    word: ListObjectsV2Command
- id: s3-delete-object-typescript
  desc: S3 object deletion command
  if:
    type: text
    word: DeleteObjectCommand
- id: s3-get-object-typescript
  desc: S3 object retrieval command
  if:
    type: text
    word: GetObjectCommand
- id: s3-presigned-url-typescript
  desc: S3 presigned URL generation
  if:
    type: text
    word: getSignedUrl
