# A Firebase hostname is a network-service observation; it does not establish
# command-and-control intent by itself.
defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: firebase-rtdb-endpoint
    desc: Firebase Realtime Database endpoint
    if:
      type: text
      regex: '(?i)\b[a-z0-9-]+\.firebaseio\.com\b'
    not:
      - substr: hacker-news.firebaseio.com
