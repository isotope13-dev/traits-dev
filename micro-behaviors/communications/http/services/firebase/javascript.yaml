# Firebase and Firestore service operations in JavaScript/TypeScript.
# These are neutral cloud-service capabilities; intent comes from composites
# that establish collection or exfiltration context.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
- id: firebase-firestore-write
  desc: Firestore document write call
  if:
    type: text
    regex: 'addDoc\s*\(\s*collection\s*\('
- id: firebase-file-tree-record
  desc: Firestore addDoc call containing a tree field
  if:
    type: text
    regex: 'addDoc\s*\([\s\S]{0,240}\btree\s*:'
