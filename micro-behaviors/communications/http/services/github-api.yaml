defaults:
  platforms: [linux, unix, macos, windows]
  for: [shell, python, javascript]
  crit: notable
traits:
  - id: github-create-repo-api
    desc: GitHub create repository API call
    conf: 0.8
    if:
      type: text
      substr: /user/repos
  - id: github-release-api
    desc: GitHub releases API path
    conf: 0.6
    if:
      type: text
      regex: /repos/.{0,60}/releases
    not:
      - substr: /repos/eugeny/tabby/releases
      - substr: /repos/Microsoft/vscode-linux-bu
composite_rules:
  - id: github-create-release-api
    desc: GitHub create release API call
    conf: 0.85
    all:
      - id: github-release-api
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
