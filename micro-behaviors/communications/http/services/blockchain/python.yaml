defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: ipfshttpclient-connect
    desc: Python IPFS client connection
    conf: 0.9
    if:
      type: text
      regex: \bipfshttpclient\.connect\s*\(
  - id: ipfs-add-call
    desc: Python IPFS add call
    conf: 0.9
    if:
      type: text
      regex: \b(ipfs|client)\.add(_bytes)?\s*\(
  - id: arweave-channel
    desc: Arweave or Bundlr usage
    conf: 0.85
    if:
      type: text
      regex: \b(arweave|bundlr)\b
