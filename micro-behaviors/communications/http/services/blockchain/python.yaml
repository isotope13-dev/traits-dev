defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
- id: ipfshttpclient-connect
  desc: Python IPFS client connection
  conf: 0.9
  if:
    type: text
    regex: \bipfshttpclient\.connect\s*\(
- id: ipfs-add-call
  desc: Python IPFS add call
  conf: 0.9
  if:
    type: text
    regex: \b(ipfs|client)\.add(_bytes)?\s*\(
- id: arweave-channel--arweave
  desc: Arweave or Bundlr usage (arweave)
  conf: 0.85
  if:
    type: text
    word: arweave
- id: arweave-channel--bundlr
  desc: Arweave or Bundlr usage (bundlr)
  conf: 0.85
  if:
    type: text
    word: bundlr
- id: electrumx-hostname
  desc: ElectrumX service hostname reference
  conf: 0.9
  if:
    type: text
    regex: '(?i)\belectrumx\.[a-z0-9-]+\.[a-z]{2,24}\b'
composite_rules:
- id: arweave-channel
  desc: Arweave or Bundlr usage
  conf: 0.85
  any:
  - id: arweave-channel--arweave
  - id: arweave-channel--bundlr
