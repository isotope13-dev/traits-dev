defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
traits:
  - id: mempool-space-endpoint
    desc: mempool.space Bitcoin explorer endpoint
    conf: 0.9
    if:
      type: text
      regex: '\bmempool\.space(:[0-9]{2,5}|[/?:#\s"''<>]|$)'
  - id: blockstream-explorer-endpoint
    desc: Blockstream Bitcoin explorer endpoint
    conf: 0.9
    if:
      type: text
      regex: 'https?://blockstream\.info([:/?#\s"''<>]|$)'
  - id: blockstream-green-websocket-endpoint
    desc: Blockstream Green wallet WebSocket endpoint
    conf: 0.92
    if:
      type: text
      regex: 'wss?://green-[A-Za-z0-9.-]+\.blockstream\.com([:/?#\s"''<>]|$)'
