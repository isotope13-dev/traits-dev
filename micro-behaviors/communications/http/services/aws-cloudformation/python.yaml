defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.86
  mbc: C0002

traits:
  - id: boto3-cloudformation-client
    desc: boto3 CloudFormation client
    if:
      type: text
      regex: '\.client\(\s*["'']cloudformation["'']'

  - id: cloudformation-create-stack
    desc: CloudFormation stack creation
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '\.create_stack$'

  - id: cloudformation-update-stack
    desc: CloudFormation stack update
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '\.update_stack$'

  - id: cloudformation-describe-stacks
    desc: CloudFormation stack inspection
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '\.describe_stacks$'

  - id: cloudformation-describe-events
    desc: CloudFormation event inspection
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '\.describe_stack_events$'

composite_rules:
  - id: cloudformation-stack-management
    desc: CloudFormation stack management
    crit: notable
    conf: 0.92
    all:
      - id: boto3-cloudformation-client
    any:
      - id: cloudformation-create-stack
      - id: cloudformation-update-stack
      - id: cloudformation-describe-stacks
      - id: cloudformation-describe-events
