defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, markdown]
  crit: notable
  conf: 0.88
  mbc: C0002

traits:
  - id: deepseek-api-base-url
    desc: DeepSeek API base URL
    if:
      type: text
      substr: https://api.deepseek.com

  - id: deepseek-platform-api-keys
    desc: DeepSeek API key management URL
    if:
      type: text
      substr: https://platform.deepseek.com/api_keys

  - id: deepseek-chat-model-name
    desc: DeepSeek chat model reference
    if:
      type: text
      regex: "\\bdeepseek-(v4-pro|v4-flash|reasoner|chat)\\b"

  # `reasoning_content` is the field the DeepSeek reasoner returns its chain of
  # thought in; unlike `reasoning_effort`/thinking-mode (vendor-neutral knobs,
  # see micro-behaviors/communications/http/llm::reasoning) it is specific to
  # this provider's response schema.
  - id: deepseek-reasoning-content-field
    desc: DeepSeek reasoning_content response field
    if:
      type: text
      word: reasoning_content

composite_rules:
  - id: deepseek-chat-api-client
    desc: DeepSeek chat API client
    crit: notable
    conf: 0.94
    all:
      - id: deepseek-api-base-url
    any:
      - id: deepseek-chat-model-name
      - id: deepseek-reasoning-content-field
      - id: micro-behaviors/communications/http/llm::llm-reasoning-effort-parameter
      - id: micro-behaviors/communications/http/llm::llm-thinking-mode-parameter
