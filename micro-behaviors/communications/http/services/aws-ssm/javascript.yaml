defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94
  mbc: C0002

traits:
  - id: ssm-decrypted-parameter-read
    desc: JavaScript reads decrypted AWS SSM parameters
    if:
      type: text
      regex: 'GetParametersCommand\s*\(\s*\{[\s\S]{0,320}WithDecryption\s*:\s*true\b'
