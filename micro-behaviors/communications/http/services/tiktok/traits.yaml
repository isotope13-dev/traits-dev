defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source]
  crit: notable
  conf: 0.88
  mbc: C0002

traits:
  - id: tiktok-api-h2-endpoint
    desc: TikTok mobile API host
    conf: 0.9
    if:
      type: text
      substr: api-h2.tiktokv.com

  - id: tiktok-web-api-host-path
    desc: TikTok host with API path
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'tiktok[\s\S]{0,160}/api/'
    count_max: 1021822

  - id: tiktok-web-api-path
    desc: TikTok web API path
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '/api/(item|post|comment|aweme|favorite|repost|user/collect|commit/item)\b'
    count_max: 1021823

  - id: tiktok-favorite-list-endpoint
    desc: TikTok favorite-list API endpoint
    conf: 0.92
    if:
      type: text
      substr: /api/favorite/item_list/

  - id: tiktok-collection-list-endpoint
    desc: TikTok collection-list API endpoint
    conf: 0.92
    if:
      type: text
      substr: /api/user/collect/item_list/

  - id: tiktok-repost-list-endpoint
    desc: TikTok repost-list API endpoint
    conf: 0.92
    if:
      type: text
      substr: /api/repost/item_list/

  - id: tiktok-digg-mutation-endpoint
    desc: TikTok digg mutation API endpoint
    conf: 0.9
    if:
      type: text
      substr: /api/commit/item/digg/

  - id: tiktok-collect-mutation-endpoint
    desc: TikTok collect mutation API endpoint
    conf: 0.9
    if:
      type: text
      substr: /api/item/collect/

composite_rules:
  - id: tiktok-web-api-endpoint
    desc: TikTok web API endpoint
    crit: notable
    conf: 0.86
    any:
      - id: tiktok-web-api-host-path
      - id: tiktok-web-api-path

  - id: tiktok-saved-item-listing
    desc: TikTok saved-item listing API
    crit: notable
    conf: 0.94
    any:
      - id: tiktok-favorite-list-endpoint
      - id: tiktok-collection-list-endpoint
      - id: tiktok-repost-list-endpoint

  - id: tiktok-saved-item-mutation
    desc: TikTok saved-item mutation API
    crit: notable
    conf: 0.93
    any:
      - id: tiktok-digg-mutation-endpoint
      - id: tiktok-collect-mutation-endpoint
