defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.78
  mbc: C0002

traits:
  - id: rest-api-endpoint
    desc: References a Supabase REST API endpoint
    if:
      type: text
      regex: '(?i)/rest/v1/[A-Za-z_][A-Za-z0-9_]{2,40}'

  - id: storage-url
    desc: Supabase storage URL
    if:
      type: text
      regex: '[a-z0-9]+\.supabase\.co/storage/v[0-9]+/'

  - id: python-client-import
    desc: Imports the Supabase backend client library
    for: [python]
    conf: 0.92
    if:
      type: import
      regex: '^supabase'

  - id: service-key-reference
    desc: References a Supabase service-role key
    conf: 0.9
    if:
      type: text
      regex: '\bSUPABASE_SERVICE_(ROLE_)?KEY\b'
