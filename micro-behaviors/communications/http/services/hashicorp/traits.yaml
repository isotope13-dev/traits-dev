defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, shell]
  crit: notable
  conf: 0.9
  mbc: C0002
  attack: T1071.001

traits:
  - id: terraform-cloud-api
    desc: Terraform Cloud API endpoint
    if:
      type: text
      regex: 'app\.terraform\.io|/api/v2/(organizations|workspaces)/'
  - id: consul-http-api
    desc: HashiCorp Consul HTTP API
    if:
      type: text
      regex: 'X-Consul-Token|/v1/(session|kv)/'
  - id: consul-token-header
    desc: Consul token HTTP header
    if:
      type: text
      substr: X-Consul-Token
  - id: terraform-cloud-bearer-auth
    desc: Terraform Cloud bearer authorization
    if:
      type: text
      regex: 'Authorization.{0,80}Bearer\s+(tfe_|atlasv1)'

composite_rules:
  - id: hashicorp-infra-api
    desc: HashiCorp infrastructure API usage
    crit: notable
    conf: 0.9
    any:
      - id: terraform-cloud-api
      - id: consul-http-api
  - id: hashicorp-infra-api-token-auth
    desc: HashiCorp infrastructure API token auth
    crit: notable
    conf: 0.9
    all:
      - id: hashicorp-infra-api
    any:
      - id: consul-token-header
      - id: terraform-cloud-bearer-auth
