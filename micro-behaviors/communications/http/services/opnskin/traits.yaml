defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, manifests]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: opnskin-url
    desc: OpnSkin service URL
    if:
      type: text
      regex: 'https?://.{0,40}opnskin\.com'

  - id: opnskin-active-trades-api
    desc: OpnSkin active trades API
    conf: 0.92
    if:
      type: text
      substr: /api/extension/active-trades

  - id: opnskin-confirm-api
    desc: OpnSkin trade confirm API
    conf: 0.92
    if:
      type: text
      regex: '/api/extension/confirm-(sent|receipt)'

  - id: opnskin-trade-audit-api
    desc: OpnSkin trade audit API
    conf: 0.92
    if:
      type: text
      regex: '/api/extension/(trade-(history|reversal)|verify-item)'

  - id: opnskin-pending-verifications-api
    desc: OpnSkin pending verification API
    conf: 0.92
    if:
      type: text
      substr: /api/extension/pending-verifications

  - id: opnskin-detect-incoming-trade-api
    desc: OpnSkin incoming trade API
    conf: 0.92
    if:
      type: text
      substr: /api/extension/detect-incoming-trade

  - id: opnskin-get-pending-actions
    desc: OpnSkin pending actions message
    conf: 0.9
    if:
      type: text
      substr: GET_PENDING_ACTIONS

  - id: opnskin-trade-offer-message
    desc: OpnSkin trade offer message
    conf: 0.9
    if:
      type: text
      regex: 'TRADE_OFFER_(CREATED|SENT|ACCEPTED)'

  - id: opnskin-trade-state-check
    desc: OpnSkin trade state check
    conf: 0.9
    if:
      type: text
      substr: CHECK_TRADE_OFFER_STATE

  - id: opnskin-start-trade-monitor
    desc: OpnSkin trade monitor message
    conf: 0.9
    if:
      type: text
      substr: START_TRADE_MONITOR

  - id: opnskin-sell-sync-inventory
    desc: OpnSkin sell inventory sync
    conf: 0.88
    if:
      type: text
      substr: SELL_SYNC_INVENTORY

  - id: opnskin-inventory-synced-message
    desc: OpnSkin inventory synced message
    conf: 0.88
    if:
      type: text
      substr: SELL_INVENTORY_SYNCED

  - id: opnskin-force-inventory
    desc: OpnSkin force inventory message
    conf: 0.88
    if:
      type: text
      substr: FORCE_INVENTORY

composite_rules:
  - id: opnskin-extension-api
    desc: OpnSkin extension API access
    crit: notable
    conf: 0.93
    any:
      - id: opnskin-active-trades-api
      - id: opnskin-confirm-api
      - id: opnskin-trade-audit-api
      - id: opnskin-pending-verifications-api
      - id: opnskin-detect-incoming-trade-api

  - id: opnskin-pending-actions
    desc: OpnSkin pending action channel
    crit: notable
    conf: 0.92
    any:
      - id: opnskin-get-pending-actions
      - id: opnskin-trade-offer-message
      - id: opnskin-trade-state-check
      - id: opnskin-start-trade-monitor

  - id: opnskin-inventory-sync
    desc: OpnSkin inventory sync channel
    crit: notable
    conf: 0.9
    any:
      - id: opnskin-sell-sync-inventory
      - id: opnskin-inventory-synced-message
      - id: opnskin-force-inventory

  - id: opnskin-steam-trade-bridge
    desc: OpnSkin Steam trade bridge
    crit: notable
    conf: 0.94
    all:
      - id: opnskin-pending-actions
      - id: micro-behaviors/communications/http/services/steam

  - id: opnskin-trade-state-monitor
    desc: OpnSkin trade state monitor
    crit: notable
    conf: 0.92
    all:
      - id: opnskin-trade-state-check
      - id: opnskin-trade-offer-message
