defaults:
  platforms: [unix, windows]
  for: [scripts, source]
traits:
  - id: gdrive-domain
    desc: Google Drive web domain
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: drive.google.com
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - type: text
        regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
  - id: googleapis-drive
    desc: Google Drive API reference
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      regex: googleapis\.com/(upload/)?drive/v[0-9]+/
    unless:
      - type: text
        regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
      - id: metadata/package/testing/
  - id: google-drive-direct-download-url
    desc: Google Drive direct download URL
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: drive\.google\.com/uc\?export=download&id=|drive\.usercontent\.google\.com/download
    not:
      - substr: "/view?usp="

composite_rules:
  - id: google-drive-api
    desc: Google Drive service access
    crit: notable
    conf: 0.9
    any:
      - id: gdrive-domain
      - id: googleapis-drive
