defaults:
  platforms: [unix, windows]
  for: [php, javascript, typescript]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: analytics-service
    desc: Google Analytics API client
    if:
      type: text
      regex: 'class\s+AnalyticsData\s+extends'

  - id: search-console-service
    desc: Google Search Console API client
    if:
      type: text
      regex: 'class\s+SearchConsole\s+extends'

  - id: adsense-service
    desc: Google AdSense API client
    if:
      type: text
      regex: 'class\s+Adsense\s+extends'

  - id: tag-manager-service
    desc: Google Tag Manager API client
    if:
      type: text
      regex: 'class\s+TagManager\s+extends'

  - id: pagespeed-service
    desc: Google PageSpeed API client
    if:
      type: text
      regex: 'class\s+PagespeedInsights\s+extends'

  - id: site-verification-service
    desc: Google Site Verification API client
    if:
      type: text
      regex: 'class\s+SiteVerification\s+extends'

  - id: sign-in-client
    desc: Google Sign-In client
    if:
      type: text
      regex: '(accounts\.google\.com/gsi/client|Google Sign-In)'

  - id: identity-services-gsi-client
    desc: Google Identity Services client bundle
    conf: 0.98
    if:
      type: text
      substr: default_gsi

  - id: sheets-gviz-csv
    desc: Google Sheets gviz CSV feed access
    conf: 0.95
    if:
      type: text
      regex: 'docs\.google\.com/spreadsheets/d/[^''"`\s]{8,}/gviz/tq\?tqx=out:csv'
  - id: people-connections-api
    desc: Google People contacts API
    conf: 0.9
    if:
      type: text
      substr: people.googleapis.com/v1/people/me/connections
  - id: contacts-readonly-scope
    desc: Google contacts readonly scope
    conf: 0.9
    if:
      type: text
      substr: googleapis.com/auth/contacts.readonly

  - id: google-security-page-navigation
    desc: Navigates to Google account security settings
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: myaccount.google.com/security

  - id: google-signin-options-navigation
    desc: Navigates to Google sign-in options
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: myaccount.google.com/signinoptions

  - id: google-two-step-navigation
    desc: Navigates to Google two-step settings
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: myaccount.google.com/two-step-verification

  - id: google-recovery-navigation
    desc: Navigates to Google account recovery settings
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: myaccount.google.com/recovery

  - id: google-login-navigation
    desc: Navigates to a Google sign-in page
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: accounts.google.com/ServiceLogin

  # Generic account-management UI phrases: benign in any app's own profile UI
  # (Clerk, etc.). Only a Google-account-takeover signal when a Google account
  # page is also present — see the google-recovery-ui-mutation composite. Kept
  # component so the bare phrase can't escalate on its own.
  - id: google-recovery-phone-action
    desc: Remove-phone-number account UI label
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Remove phone number

  - id: google-recovery-email-action
    desc: Add/edit recovery phone/email UI label
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(Add|Edit) recovery (phone|email)'
      case_insensitive: true

  - id: google-recovery-endpoint-action
    desc: Automates Google recovery endpoint changes
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(recovery/email|signinoptions/rescuephone)'
      case_insensitive: true

  - id: google-authenticator-action
    desc: Automates Google Authenticator setting changes
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(Set up authenticator|Change authenticator app|Remove Google Authenticator)'
      case_insensitive: true

  - id: google-generate-backup-codes
    desc: Automates generation of Google backup codes
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: Generate new codes

  - id: google-disable-two-step
    desc: Automates disabling Google two-step verification
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: Turn off 2-Step Verification

  - id: google-two-step-subpath-action
    desc: Google authenticator or backup-code settings
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'two-step-verification/(authenticator|backup-codes)'

  - id: google-mail-sync-endpoint
    desc: Gmail mailbox synchronization endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'mail\.google\.com/(mail/u/0/data|sync/u/0/i/bv)'

composite_rules:
  - id: google-security-account-navigation
    desc: Browser navigation across Google account security settings
    crit: notable
    conf: 0.97
    any:
      - id: google-security-page-navigation
      - id: google-signin-options-navigation
      - id: google-two-step-navigation
      - id: google-recovery-navigation
      - id: google-login-navigation

  - id: google-recovery-ui-mutation
    desc: Recovery UI action on Google account page
    crit: suspicious
    conf: 0.97
    all:
      - id: google-security-account-navigation
    any:
      - id: google-recovery-phone-action
      - id: google-recovery-email-action

  - id: google-recovery-account-mutation
    desc: Changes Google account recovery settings
    crit: suspicious
    conf: 0.98
    any:
      - id: google-recovery-endpoint-action
      - id: google-recovery-ui-mutation

  - id: google-two-factor-account-mutation
    desc: Changes Google two-step verification settings
    crit: suspicious
    conf: 0.98
    any:
      - id: google-authenticator-action
      - id: google-generate-backup-codes
      - id: google-disable-two-step
      - id: google-two-step-subpath-action
