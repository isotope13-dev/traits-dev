defaults:
  platforms: [unix, windows]
  for: [php, javascript, typescript]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: analytics-service
    desc: Google Analytics API client
    if:
      type: text
      regex: 'class\s+AnalyticsData\s+extends'

  - id: search-console-service
    desc: Google Search Console API client
    if:
      type: text
      regex: 'class\s+SearchConsole\s+extends'

  - id: adsense-service
    desc: Google AdSense API client
    if:
      type: text
      regex: 'class\s+Adsense\s+extends'

  - id: tag-manager-service
    desc: Google Tag Manager API client
    if:
      type: text
      regex: 'class\s+TagManager\s+extends'

  - id: pagespeed-service
    desc: Google PageSpeed API client
    if:
      type: text
      regex: 'class\s+PagespeedInsights\s+extends'

  - id: site-verification-service
    desc: Google Site Verification API client
    if:
      type: text
      regex: 'class\s+SiteVerification\s+extends'

  - id: sign-in-client
    desc: Google Sign-In client
    if:
      type: text
      regex: '(accounts\.google\.com/gsi/client|Google Sign-In)'
