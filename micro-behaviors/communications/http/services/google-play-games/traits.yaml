defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: google-play-games-oauth-scope
    desc: Google Play Games OAuth scope
    conf: 0.92
    if:
      type: text
      substr: https://www.googleapis.com/auth/games

  - id: google-play-games-leaderboard-api
    desc: Google Play Games leaderboard API
    conf: 0.94
    if:
      type: text
      substr: /games/v1/leaderboards/

  - id: google-play-games-achievements-api
    desc: Google Play Games achievements API
    conf: 0.94
    if:
      type: text
      substr: /games/v1/players/me/achievements
