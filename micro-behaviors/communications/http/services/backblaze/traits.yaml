defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts, source]

traits:
  - id: backblaze-b2-endpoint-reference
    desc: Backblaze B2 service endpoint reference
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\b([a-z0-9-]+\.)?backblazeb2\.com\b|\bb2://'
