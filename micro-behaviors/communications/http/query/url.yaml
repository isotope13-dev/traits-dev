defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: new-url-endpoint
    desc: Builds URL from endpoint
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: new URL(endpoint)
  - id: elex-query-format-string
    desc: Elex C2 query string format
    crit: baseline
    conf: 0.9
    for: [pe]
    if:
      type: text
      exact: 'v=%s&nuuid=%s'