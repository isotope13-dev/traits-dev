defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, javascript]
  crit: notable
  conf: 0.85
traits:
  - id: http-custom-port-number
    desc: HTTP request with custom port (4+ digits)
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: "port"
      regex: "\\d{4,5}"
    attack: T1071
