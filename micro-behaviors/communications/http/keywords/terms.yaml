---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: webhook-service-word
  desc: Mentions 'webhook' (HTTP callback)
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)\\bwebhooks?\\b"
- id: icmp-keyword
  desc: 'Protocol keyword: icmp'
  crit: component
  conf: 0.3
  for:
  - binaries
  if:
    type: text
    exact: icmp
    section: rdata
- id: http-verb-keyword--post
  desc: Contains the HTTP-related keyword post
  conf: 0.75
  for:
  - javascript
  if:
    type: text
    word: post
- id: http-verb-keyword--fetch
  desc: HTTP verb keyword (fetch)
  conf: 0.75
  for:
  - javascript
  if:
    type: text
    word: fetch
- id: http-verb-keyword--request
  desc: Contains the HTTP-related keyword request
  conf: 0.75
  for:
  - javascript
  if:
    type: text
    word: request
composite_rules:
- id: http-verb-keyword
  desc: HTTP verb keyword (post/fetch/request)
  conf: 0.75
  for:
  - javascript
  any:
  - id: http-verb-keyword--post
  - id: http-verb-keyword--fetch
  - id: http-verb-keyword--request
