defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: python-ssl-default-context
    desc: Python creates a default TLS context
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: ssl.create_default_context
  - id: python-ssl-context-wrap-socket
    desc: Wraps a socket in Python TLS context
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(context|ssl_context)\.wrap_socket$'
  - id: requests-verify-false
    desc: Requests GET/POST/PUT TLS verification off
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: requests\.(get|post|put)\s*\([^\n]{0,200}verify\s*=\s*False

  - id: requests-verify-false-delete
    desc: Requests DELETE/HEAD/PATCH TLS verification off
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: requests\.(delete|head|patch)\s*\([^\n]{0,200}verify\s*=\s*False

  - id: requests-session-verify-false
    desc: Requests session TLS verification off
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(Session\(\)|session)\.verify\s*=\s*False'

  - id: unverified-ssl-context
    desc: Disables SSL certificate verification
    crit: notable
    conf: 0.9
    mbc: C0005
    # A transport-security detector compares against "ssl._create_unverified_context"
    # to flag callers; naming the API is not disabling verification.
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
    if:
      type: text
      substr: "_create_unverified_context"
  - id: httpx-verify-false
    desc: httpx client disables TLS verification
    crit: notable
    conf: 0.9
    mbc: C0005
    if:
      type: text
      regex: 'httpx\.(Client|AsyncClient)\s*\([^\n]{0,200}\bverify\s*=\s*False'

  - id: aiohttp-tcpconnector-ssl-false
    desc: aiohttp connector disables TLS verification
    crit: notable
    conf: 0.9
    mbc: C0005
    if:
      type: text
      regex: 'aiohttp\.TCPConnector\s*\([^\n]{0,160}\bssl\s*=\s*False'
