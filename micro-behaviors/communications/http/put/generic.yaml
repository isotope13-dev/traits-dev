defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
traits:
  - id: put
    desc: HTTP PUT method
    if:
      type: text
      regex: \bPUT\s+/\S+\s+HTTP/1\.[01]\b
  - id: javascript-put-request-body
    desc: JavaScript PUT request with body
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)method\s*:\s*["'']PUT["''][\s\S]{0,120}body\s*:'
