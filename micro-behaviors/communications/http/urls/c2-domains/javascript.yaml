# C2 domain detection for known malware staging/keep-alive hosts
# These domains are associated with supply-chain malware campaigns
# and have no legitimate use in normal packages.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: suspicious
  conf: 0.95
  attack: T1105
  mbc: B0030
traits:
  - id: ssss-nyc-mn
    desc: ssss.nyc.mn staging domain (Nezha agent delivery)
    if:
      type: text
      substr: "ssss.nyc.mn"
  - id: serv00-add-url
    desc: serv00.net keep-alive registration endpoint
    if:
      type: text
      substr: "serv00.net/add-url"
  - id: cloudflare-meta-isp
    desc: speed.cloudflare.com ISP fingerprinting endpoint
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "speed.cloudflare.com/meta"
