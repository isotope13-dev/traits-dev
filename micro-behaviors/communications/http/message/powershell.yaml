defaults:
  platforms: [windows]
  for: [powershell]

traits:
  - id: powershell-http-url-literal
    desc: PowerShell HTTP/HTTPS URL literal
    crit: notable
    conf: 0.75
    if:
      type: literal
      kind: string
      regex: 'https?://[a-z0-9][-a-z0-9]*\.[a-z]{2,}'
      case_insensitive: true
    not:
      - regex: 'https?://schemas\.microsoft\.com/windows/2004/02/mit/task\b'
