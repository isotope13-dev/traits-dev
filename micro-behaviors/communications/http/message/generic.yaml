defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.9
traits:
  - id: http-header-field-delimiter
    desc: HTTP header field delimiter
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'HTTP/1\.[01]\r\n[A-Za-z-]+: '
  - id: http-prefix
    desc: HTTP protocol prefix
    if:
      type: string_literal
      regex: ^http://
      case_insensitive: true
  - id: https-prefix
    desc: Contains an HTTPS URL prefix
    if:
      type: string_literal
      regex: ^https://
      case_insensitive: true
  - id: configured-https-endpoint
    desc: Embedded HTTPS endpoint configuration
    crit: notable
    conf: 0.88
    for: [binaries]
    if:
      type: text
      regex: '["'']?(api_url|endpoint|server_url|base_url)["'']?\s*:\s*["'']https?://[A-Za-z0-9.-]{3,253}'
  - id: http-1-0-header
    desc: HTTP/1.0 protocol version
    if:
      type: string_literal
      substr: HTTP/1.0
  - id: split-http10-get-template
    desc: Split HTTP/1.0 GET template
    crit: component
    conf: 0.88
    for: [pe, dll]
    platforms: [windows]
    if:
      type: hex
      section: .data
      pattern: "20 48 54 54 50 2F 31 2E 30 0D 0A 00 47 45 54 20 2F 00"
  - id: http-1-1-header
    desc: HTTP/1.1 protocol version
    if:
      type: string_literal
      substr: HTTP/1.1
  - id: http-2-0-header
    desc: HTTP/2.0 protocol version
    if:
      type: string_literal
      substr: HTTP/2.0
  - id: http-url-literal
    desc: HTTP URL string literal
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      regex: (?i)https?://[\\w.-]+(/[\\w./?&=%:#@~+,;\\-]{1,200})?
    not:
      - substr: www.w3.org
      - substr: purl.org
      - substr: ns.adobe.com
      - substr: apple.com/DTDs
      - substr: xmlns
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/signed/issuer::apple
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/package/versioning::pe-version-resource
  - id: itms-services-manifest
    desc: iOS itms-services manifest URL
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: itms-services://?action=download-manifest&url=
