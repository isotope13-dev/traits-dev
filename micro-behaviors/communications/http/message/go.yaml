defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.9
  mbc: C0002
  attack: T1071.001

traits:
  - id: lowhttp-parse-url-request
    desc: Converts URL to raw HTTP request
    if:
      type: symbol
      kind: call
      exact: lowhttp.ParseUrlToHttpRequestRaw

  - id: lowhttp-normalize-request
    desc: Normalizes a raw HTTP request
    if:
      type: symbol
      kind: call
      exact: lowhttp.FixHTTPRequest

  - id: lowhttp-extract-request-url
    desc: Extracts URL from raw HTTP request
    if:
      type: symbol
      kind: call
      exact: lowhttp.ExtractURLFromHTTPRequestRaw

  - id: lowhttp-replace-request-header
    desc: Replaces a raw HTTP request header
    if:
      type: symbol
      kind: call
      exact: lowhttp.ReplaceHTTPPacketHeader
