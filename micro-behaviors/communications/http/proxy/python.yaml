defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.88

traits:
  - id: proxy-token-env-default
    desc: Proxy token environment default
    if:
      type: text
      regex: 'PROXY_TOKEN\s*=\s*os\.environ\.get\(["'']PROXY_TOKEN["'']'
  - id: proxy-token-header
    desc: Proxy token HTTP header
    if:
      type: text
      regex: 'headers\[[^]]*(X-Proxy-Token|Authorization)[^]]*\]\s*='
  - id: proxy-type-params-body
    desc: Proxy type-params body schema
    crit: component
    if:
      type: text
      regex: '\{["'']type["'']:\s*[A-Za-z_][A-Za-z0-9_]*,\s*["'']params["'']:'
  - id: hardcoded-proxy-token-default
    desc: Hardcoded proxy token default
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'PROXY_TOKEN\s*=\s*os\.environ\.get\(["'']PROXY_TOKEN["''],\s*["''][A-Za-z0-9_-]{10,}["'']\)'

composite_rules:
  - id: authenticated-proxy-post
    desc: Authenticated proxy POST request
    crit: notable
    conf: 0.93
    all:
      - id: proxy-token-header
      - id: micro-behaviors/communications/http/request/client::urllib-json-post
    any:
      - id: proxy-token-env-default
      - id: hardcoded-proxy-token-default
      - id: proxy-type-params-body
    needs: 1
