# JSON telemetry strings used by malware for C2 reporting.
# These contain OS version and privilege level information exfiltrated
# to command-and-control infrastructure.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
  attack: T1082
  mbc: E1082
traits:
  - id: json-os-admin-telemetry
    desc: JSON OS and admin privilege telemetry
    if:
      type: text
      regex: '"OS":".{0,50}"\s*,\s*"Admin":(true|false)'
