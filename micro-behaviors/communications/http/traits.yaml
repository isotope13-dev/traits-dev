composite_rules:
  - id: libev
    desc: libev event loop library usage
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: ev-loop
      - id: ev-io-start
      - id: ev-io-stop
      - id: ev-timer-start
      - id: ev-run
      - id: ev-break
      - id: ev-default-loop
      - id: libev-error
  - id: libuv
    desc: libuv async I/O library usage
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: uv-loop-init
      - id: uv-run
      - id: uv-tcp-init
      - id: uv-tcp-connect
      - id: uv-write
      - id: uv-read-start
      - id: uv-spawn
      - id: uv-default-loop
  - id: c-ares
    desc: c-ares async DNS resolver library
    crit: notable
    conf: 0.7
    needs: 2
    any:
      - id: ares-init
      - id: ares-gethostbyname
      - id: ares-process
      - id: ares-destroy
      - id: ares-query
      - id: ares-success
  - id: libevent
    desc: libevent async I/O library usage
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: event-base-new
      - id: event-base-dispatch
      - id: event-add
      - id: bufferevent-prefix
      - id: evbuffer-prefix
      - id: evdns-prefix
      - id: evhttp-prefix
  - id: boost-asio
    desc: Boost.Asio async I/O library usage
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: boost-asio-namespace
      - id: io-service
      - id: io-context
      - id: async-read
      - id: async-write
      - id: async-connect
      - id: deadline-timer
  - id: tokio
    desc: Tokio async runtime (Rust) usage
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
      - rust
    any:
      - id: tokio-namespace
      - id: tokio-runtime
      - id: tokio-net
      - id: tokio-spawn
      - id: tokio-cargo
  - id: epoll-usage
    desc: Direct epoll usage for async
    crit: notable
    conf: 0.65
    needs: 2
    any:
      - id: epoll-create
      - id: epoll-ctl
      - id: epoll-wait
  - id: kqueue-usage
    desc: Direct kqueue usage for async
    crit: notable
    conf: 0.65
    all:
      - id: kqueue-func
      - id: kevent-func
  - id: epoll-kqueue
    desc: Direct epoll/kqueue usage for async
    crit: notable
    conf: 0.65
    any:
      - id: epoll-usage
      - id: kqueue-usage
  - id: async-io-library
    desc: Uses high-performance async I/O library
    crit: notable
    conf: 0.75
    any:
      - id: libev
      - id: c-ares
      - id: libevent
    unless:
      - id: libevent
      - id: libev
