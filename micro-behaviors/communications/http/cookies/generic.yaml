defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: cookie-header
    desc: Cookie header
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: 'Cookie:'
  - id: set-cookie-header
    desc: Set-Cookie header
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: 'Set-Cookie:'
  - id: http-cookiejar
    desc: http.cookiejar module
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: http.cookiejar
  - id: domain-attribute
    desc: Cookie Domain attribute
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: ; Domain
  - id: httponly-attribute
    desc: Cookie HttpOnly attribute
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      substr: ; HttpOnL
composite_rules:
  - id: cookies
    desc: HTTP cookie handling
    crit: baseline
    conf: 0.66
    any:
      - id: cookie-header
      - id: set-cookie-header
      - id: http-cookiejar
      - id: domain-attribute
      - id: httponly-attribute
