defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: cookie-header
    desc: Cookie header
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: 'Cookie:'
  - id: utf16-cookie-header-pe
    desc: UTF-16 Cookie header in PE
    crit: notable
    conf: 0.75
    for: [pe, dll]
    if:
      type: hex
      section: .rdata
      pattern: 43 00 6F 00 6F 00 6B 00 69 00 65 00 3A 00
  - id: set-cookie-header
    desc: Set-Cookie header
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: 'Set-Cookie:'
  - id: http-cookiejar
    desc: http.cookiejar module
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: http.cookiejar
  - id: domain-attribute
    desc: Cookie Domain attribute
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: ; Domain
  - id: httponly-attribute
    desc: Cookie HttpOnly attribute
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: ; HttpOnL
composite_rules:
  - id: cookies
    desc: HTTP cookie handling
    crit: notable
    conf: 0.66
    any:
      - id: cookie-header
      - id: utf16-cookie-header-pe
      - id: set-cookie-header
      - id: http-cookiejar
      - id: domain-attribute
      - id: httponly-attribute
