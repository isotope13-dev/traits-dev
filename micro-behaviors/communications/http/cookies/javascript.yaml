# Browser Cookie Access - JavaScript/Browser-side
# Detects access to browser document.cookie DOM API and URL parameter harvesting
# ATT&CK: T1539 (Steal Web Session Cookie)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: "T1539"
  mbc: "C0002"
traits:
  - id: linkedin-session-cookie-name
    desc: References LinkedIn li_at session cookie
    crit: notable
    conf: 0.99
    if:
      type: literal
      exact: li_at

  - id: cookie-backend-sync-function
    desc: Synchronizes cookies with remote backend
    crit: notable
    conf: 0.95
    if:
      type: function
      exact: syncCookieToBackend

  - id: session-cookie-name
    desc: References a named session cookie
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "['\\\"]__session['\\\"]"

  - id: cookiebot-consent-state
    desc: Reads Cookiebot consent state
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Cookiebot(\?\.|\.)consent

  - id: document-cookie-read
    desc: Accesses browser document.cookie property
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: member
      exact: document.cookie
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: document-cookie-split-iterate
    desc: Iterates all cookies via document.cookie.split
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: document.cookie.split
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: document-cookie-match
    desc: "Regex scans cookies via document.cookie.match"
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: document.cookie.match
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: tiktok-webid-cookie-match
    desc: Matches TikTok webid cookie
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'document\.cookie\.match\s*\([^)]{0,120}s_v_web_id'

  - id: document-cookie-write
    desc: "Sets browser cookie via document.cookie assign"
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: document.cookie=
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: browser-page-cookie-read
    desc: Reads browser cookies with Puppeteer
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: page.cookies


  # Benign-context markers that downgrade the url-param-to-cookie tracking
  # composite below (legitimate cookie helpers / minified cookie libraries).
  - id: cookie-url-param-benign-token-marker
    desc: Benign x-user-token cookie parameter
    crit: component
    conf: 0.85
    if:
      type: text
      substr: x-user-token=
  - id: cookie-url-param-benign-minified-helper
    desc: Benign minified cookie-helper write pattern
    crit: component
    conf: 0.85
    if:
      type: text
      substr: document.cookie=e+"="+o+c}

composite_rules:
  # A session cookie leaving the browser is security-relevant even when it is
  # part of an explicitly authorized integration.  The co-occurrence below
  # identifies the extension implementation pattern without asserting theft;
  # stealer objectives require separate evidence of hostile intent.
  - id: linkedin-session-cookie-backend-sync
    desc: LinkedIn session cookie backend synchronization code
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    all:
      - id: chrome-cookies-get-all
      - id: linkedin-session-cookie-name
      - id: micro-behaviors/communications/http/request/client::fetch-post-pattern

  # Captures URL query parameters into cookies — the standard attribution /
  # analytics pattern (UTM, gclid, affiliate IDs). Neutral and commonly benign;
  # credential-skimming verdicts live in objectives/collection/stealer/browser/,
  # whose hostile composites combine cookie reads with an actual exfil sink.
  - id: js-cookie-with-url-params
    desc: Writes URL query params to cookies (attribution tracking)
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/url/query::browser-location-search-read
      - id: document-cookie-write
    downgrade:
      any:
        - id: cookie-url-param-benign-token-marker
        - id: cookie-url-param-benign-minified-helper
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
