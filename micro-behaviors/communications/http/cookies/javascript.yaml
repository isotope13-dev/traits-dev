# Browser Cookie Access - JavaScript/Browser-side
# Detects access to browser document.cookie DOM API and URL parameter harvesting
# ATT&CK: T1539 (Steal Web Session Cookie)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: "T1539"
  mbc: "C0002"
traits:
  - id: document-cookie-read
    desc: Reads browser cookies via document.cookie
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: document\.cookie

  - id: document-cookie-split-iterate
    desc: Iterates all cookies via document.cookie.split
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: document\.cookie\.split\s*\(

  - id: document-cookie-match
    desc: Regex-searches cookies via document.cookie.match
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: document\.cookie\.match\s*\(

  - id: tiktok-webid-cookie-match
    desc: Searches document.cookie for TikTok s_v_web_id session identifier
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: document\.cookie\.match\s*\([^)]{0,120}s_v_web_id

  - id: document-cookie-write
    desc: Sets browser cookie via document.cookie assignment
    crit: baseline
    conf: 0.65
    if:
      type: text
      regex: document\.cookie\s*=

  - id: location-search-harvest
    desc: Reads URL query string via window.location.search
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: window\.location\.search

  - id: navigator-useragent-read
    desc: Reads browser User-Agent string
    crit: baseline
    conf: 0.75
    attack: "T1082"
    if:
      type: text
      regex: navigator(\?\.|\.)userAgent

  - id: session-storage-user-session
    desc: Reads user_session value from browser sessionStorage
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (window\.)?sessionStorage(\.|\[['"])user_session
