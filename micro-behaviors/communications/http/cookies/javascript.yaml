# Browser Cookie Access - JavaScript/Browser-side
# Detects access to browser document.cookie DOM API and URL parameter harvesting
# ATT&CK: T1539 (Steal Web Session Cookie)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: "T1539"
  mbc: "C0002"
traits:
  - id: cookiebot-consent-state
    desc: Reads Cookiebot consent state
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Cookiebot(\?\.|\.)consent

  - id: document-cookie-read
    desc: Reads browser cookies via document.cookie
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: document.cookie
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: document-cookie-split-iterate
    desc: Iterates all cookies via document.cookie.split
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: document.cookie.split
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: document-cookie-match
    desc: "Regex scans cookies via document.cookie.match"
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: document.cookie.match
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: tiktok-webid-cookie-match
    desc: 'tiktok webid cookie match'
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'document\.cookie\.match\s*\([^)]{0,120}s_v_web_id'

  - id: document-cookie-write
    desc: "Sets browser cookie via document.cookie assign"
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: document.cookie=
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  - id: location-search-harvest
    desc: "Reads URL query via window.location.search"
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: window.location.search

  - id: navigator-useragent-read
    desc: Reads browser User-Agent string
    crit: notable
    conf: 0.75
    attack: "T1082"
    if:
      type: text
      substr: navigator.userAgent
    unless:
      - id: metadata/library/axios::axios-class
      - id: metadata/library/axios::axios-version

  # Benign-context markers that downgrade the url-param-to-cookie tracking
  # composite below (legitimate cookie helpers / minified cookie libraries).
  - id: cookie-url-param-benign-token-marker
    desc: Benign x-user-token cookie parameter
    crit: component
    conf: 0.85
    if:
      type: text
      substr: x-user-token=
  - id: cookie-url-param-benign-minified-helper
    desc: Benign minified cookie-helper write pattern
    crit: component
    conf: 0.85
    if:
      type: text
      substr: document.cookie=e+"="+o+c}

composite_rules:
  # Captures URL query parameters into cookies — the standard attribution /
  # analytics pattern (UTM, gclid, affiliate IDs). Neutral and commonly benign;
  # credential-skimming verdicts live in objectives/collection/stealer/browser/,
  # whose hostile composites combine cookie reads with an actual exfil sink.
  - id: js-cookie-with-url-params
    desc: Writes URL query params to cookies (attribution tracking)
    crit: notable
    conf: 0.85
    all:
      - id: location-search-harvest
      - id: document-cookie-write
    downgrade:
      any:
        - id: cookie-url-param-benign-token-marker
        - id: cookie-url-param-benign-minified-helper
        - id: metadata/package/quality/profile::has-tests
        - id: metadata/signed/platform/
