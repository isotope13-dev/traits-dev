# Browser-extension cookie store access (chrome.cookies / browser.cookies).
# Reads/writes cookies across sites; credential-adjacent, so notable.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-cookies-api
    desc: Uses extension cookies API
    if:
      type: text
      regex: '(^|\.)(chrome|browser)\.cookies\.[A-Za-z_]'
  - id: chrome-cookies-get-all
    desc: Enumerates extension-accessible cookies
    if:
      type: symbol
      kind: call
      regex: '(^|\.)cookies\.getAll$'
  - id: chrome-cookies-get
    desc: Reads a browser cookie
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.)?cookies\.get$'
  - id: chrome-cookies-set
    desc: Writes browser cookies
    if:
      type: symbol
      kind: member
      regex: '(^|\.)cookies\.set$'
  - id: chrome-cookies-on-changed-listener
    desc: Watches browser cookie changes
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)((chrome|browser)\.)?cookies\.onChanged\.addListener$'
  - id: netscape-cookie-file-header
    desc: Formats Netscape cookie export data
    crit: notable
    conf: 0.95
    if:
      type: literal
      kind: string
      substr: '# Netscape HTTP Cookie File'

composite_rules:
  - id: webextension-cookie-export
    desc: Exports browser cookies in Netscape format
    crit: notable
    conf: 0.96
    all:
      - id: chrome-cookies-get-all
      - id: netscape-cookie-file-header
  - id: all-url-service-worker-cookie-access
    desc: All-URL service worker enumerates cookies
    crit: notable
    conf: 0.9
    all:
      - id: metadata/permission/manifest::is-chrome-manifest
      - id: metadata/permission/host::broad-host-access
      - id: metadata/permission/cookie::permission-cookies
      - id: metadata/permission/manifest::background-service-worker
      - id: chrome-cookies-get-all
    any:
      - id: micro-behaviors/os/security/webextension::permission-downloads
      - id: metadata/permission/network::web-request
      - id: chrome-cookies-on-changed-listener
