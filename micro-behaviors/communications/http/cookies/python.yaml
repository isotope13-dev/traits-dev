defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: playwright-browser-context-cookie-read
    desc: Reads cookies from a Playwright browser context
    crit: notable
    conf: 0.96
    if:
      type: symbol
      kind: call
      exact: context.cookies

  - id: browser-cookie-management-api
    desc: Exposes browser cookie management operations
    crit: notable
    conf: 0.92
    if:
      type: function
      regex: '^browser_cookies_(get|set|save|clear)$'

  - id: browser-cookie3-import
    desc: Imports Python browser-cookie3 reader
    if:
      type: symbol
      kind: import
      exact: browser_cookie3

  - id: browser-cookie3-chrome-call
    desc: Reads Chrome cookies with browser-cookie3
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: browser_cookie3.chrome

  - id: firefox-cookiejar-export
    desc: Exports Firefox cookies to Netscape file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'MozillaCookieJar[\s\S]{0,700}browser_cookie3[\s\S]{0,700}(set_cookie|CJ\.save)'

  - id: python-requests-cookiejar-import
    desc: Imports the Python requests cookie jar
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?m)^\s*from\s+requests\.cookies\s+import\s+RequestsCookieJar\b'

  - id: python-auth-cookie-fields
    desc: Browser authentication cookie fields
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: text
      regex: '["'']name["'']\s*:\s*["''](LOGIN_INFO|__Secure-[13]PSID|_gh_sess|logged_in)["'']'

  - id: python-long-cookie-values
    desc: Long cookie value in browser cookie object
    crit: suspicious
    conf: 0.96
    count_min: 3
    if:
      type: text
      regex: '["'']value["'']\s*:\s*["''][A-Za-z0-9%_./+=:-]{32,}["''][^{}]{0,40}["'']domain["'']'
      case_insensitive: true

  - id: python-cookiejar-request-assignment
    desc: Attaches a cookie jar to request options
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)request_kwargs\s*\[["'']cookies["'']\]\s*=\s*[A-Za-z_][A-Za-z0-9_]*'

  - id: python-hardcoded-cookie-header
    desc: Hardcoded HTTP cookie header
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)["'']cookie["'']\s*:\s*\([^)]{0,200}["''][A-Za-z][A-Za-z0-9_-]{1,24}=[^"'']{8,}'
