defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: browser-cookie3-import
    desc: Imports Python browser-cookie3 reader
    if:
      type: symbol
      kind: import
      exact: browser_cookie3

  - id: browser-cookie3-chrome-call
    desc: Reads Chrome cookies with browser-cookie3
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: browser_cookie3.chrome

  - id: firefox-cookiejar-export
    desc: Exports Firefox cookies to Netscape file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'MozillaCookieJar[\s\S]{0,700}browser_cookie3[\s\S]{0,700}(set_cookie|CJ\.save)'
