# Cookie-store data field access
# A field key naming the encrypted/serialized cookie blob inside a cookie
# store file (e.g. Roblox robloxcookies.dat exposes "CookiesData"). Reading
# such a field is how cookie stealers pull the session blob before decryption.
# Generic across cookie stores; credential-access composites reference it.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, csharp, go]
traits:
  - id: cookie-store-data-field
    desc: Reads a cookie-store data field
    crit: notable
    conf: 0.7
    if:
      type: literal
      kind: string
      regex: (?i)^cookies?_?data$
