defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  attack: T1071
traits:
  - id: script-tld-tk-url
    desc: Script URL using .tk top-level domain
    crit: notable
    conf: 0.8
    for: [scripts]
    if:
      type: literal
      regex: https?://[A-Za-z0-9.-]{1,120}\.tk([:/?#\s"'<>]|$)
    not:
      - substr: https://www.tcl.tk/
      - substr: http://www.tcl.tk/
      - substr: http://calimero.tk/
      - substr: tip.tcl.tk
      - substr: core.tcl.tk
      - substr: paste.tclers.tk
  - id: tld-cc
    desc: Contains a URL with the .cc TLD
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cc(:[0-9]{1,5})?([/?#\s"'<>]|$)
    not:
      - substr: ghps.cc
  - id: tld-xyz
    desc: URL using .xyz top-level domain
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.xyz([:/?#\s"'<>]|$)
    not:
      - regex: '(?m)^\s*Server\s*=\s*https?://[A-Za-z0-9.-]{1,120}\.xyz\b'
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: https://ainodes.xyz
      - substr: https://ario.koltigin.xyz/graphql
      - substr: together.xyz
      - substr: cljdoc.xyz
      - substr: repo.shorin.xyz
      - substr: gh.api.99988866.xyz
      - substr: ghproxy.1888866.xyz
      - substr: github.moeyy.xyz
  - id: tld-su
    desc: URL using .su top-level domain
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.su([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-sbs
    desc: URL using .sbs top-level domain
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.sbs([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-online
    desc: Contains a URL using the .online TLD
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.online([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-life
    desc: URL using .life top-level domain
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.life([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
