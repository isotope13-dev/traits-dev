defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  attack: T1071
traits:
  - id: script-tld-tk-url
    desc: Script URL using .tk top-level domain
    crit: notable
    conf: 0.8
    for: [scripts]
    if:
      type: literal
      regex: https?://[A-Za-z0-9.-]{1,120}\.tk([:/?#\s"'<>]|$)
    not:
      - substr: https://www.tcl.tk/
      - substr: http://www.tcl.tk/
      - substr: http://calimero.tk/
      - substr: tip.tcl.tk
      - substr: core.tcl.tk
      - substr: paste.tclers.tk
  - id: tld-cc
    desc: URL using .cc top-level domain
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cc(:[0-9]{1,5})?([/?#\s"'<>]|$)
    not:
      - substr: ghps.cc
  - id: tld-xyz
    desc: URL using .xyz top-level domain
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.xyz([:/?#\s"'<>]|$)
    not:
      - regex: '(?m)^\s*Server\s*=\s*https?://[A-Za-z0-9.-]{1,120}\.xyz\b'
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: https://ainodes.xyz
      - substr: https://ario.koltigin.xyz/graphql
      - substr: together.xyz
      - substr: cljdoc.xyz
      - substr: repo.shorin.xyz
      - substr: gh.api.99988866.xyz
      - substr: ghproxy.1888866.xyz
      - substr: github.moeyy.xyz
  - id: hardcoded-domain-ru
    desc: Hardcoded .ru country-TLD domain
    conf: 0.6
    if:
      type: text
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}ru[''"/:]'
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
    not:
      - regex: '[''\"]config\.ru[''\"]'
      - substr: language.ru
    downgrade:
      any:
        - type: raw
          regex: defmodule\s+Faker\.Internet\.|sampler\(:free_email_service
  - id: hardcoded-domain-cn
    desc: Hardcoded .cn country-TLD domain
    conf: 0.6
    if:
      type: text
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}cn[''"/:]'
    not:
      # A quoted 2-3 letter label + .cn (e.g. "com.cn", "net.cn", "gov.cn",
      # province codes) is a Chinese public-suffix (eTLD) list entry, not a
      # hardcoded .cn domain endpoint. Public-suffix tables ship these verbatim.
      - regex: '[''"][A-Za-z]{2,3}\.cn[''"]'
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - type: text
        regex: '(?is)<html\b|<!doctype\s+html|<a\s+[^>]*href='
      # Major Chinese cloud-provider API hosts (Azure China, Feishu, Zhipu, AWS
      # China, Aliyun, Tencent Cloud) and legitimate model hubs / university mirrors.
      - type: text
        regex: chinacloudapi\.cn|feishu\.cn|bigmodel\.cn
      - type: text
        regex: amazonaws\.com\.cn|aliyuncs\.com\.cn|tencentcloudapi\.cn
      - type: text
        regex: modelscope\.cn|cernet\.edu\.cn|nju\.edu\.cn
      - type: text
        regex: portal\.azure\.cn
  - id: tld-su
    desc: URL using .su top-level domain
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.su([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-sbs
    desc: URL using .sbs top-level domain
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.sbs([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-online
    desc: URL using .online top-level domain
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.online([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-life
    desc: URL using .life top-level domain
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.life([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
