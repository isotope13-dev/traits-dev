defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, pe]
  crit: notable
  conf: 0.8
traits:
  - id: dropper-common-params
    desc: Common dropper URL parameters (add, uuid)
    if:
      type: encoded
      regex: '[?&]add=[a-zA-Z0-9]{10,}'
  - id: dropper-uuid-param
    desc: UUID-like query parameter seen in droppers
    if:
      type: encoded
      regex: '[?&]uuid=[a-zA-Z0-9]{10,}'
  - id: dropper-obfuscated-add-param
    desc: Obfuscated add parameter construction
    if:
      type: encoded
      regex: '[?&]\{[^:]+:[''"]a[''"]\}\.[a-zA-Z0-9_$]+\+\{[^:]+:[''"]d[''"]\}\.[a-zA-Z0-9_$]+'
  - id: mac-query-param-format
    desc: URL query includes formatted MAC address
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '[?&]mac=%02X-%02X-%02X-%02X-%02X-%02X'
  - id: yandex-installer-telemetry-query
    desc: Yandex installer telemetry query parameters
    crit: component
    conf: 0.95
    for: [pe]
    if:
      type: encoded
      regex: '[?&]yandexuid=\d{10,}.*[?&]mongoID=[0-9a-f]{16,}'
    not:
      - regex: '(?i)(docs|example|test|sample)'
  - id: url-query-type-data-exfil
    desc: URL query exfil with type/data params
    crit: notable
    conf: 0.92
    attack: T1041
    for: [javascript]
    if:
      type: text
      regex: '\?type=\$\{[^}]{1,80}\}&data=\$\{[^}]{1,80}\}'

  - id: url-query-type-data-literal
    desc: URL query with type and data params
    crit: notable
    conf: 0.88
    attack: T1041
    for: [javascript, python, shell]
    if:
      type: text
      regex: "[?&]type=[^&]{1,80}&data=[^&]{1,80}"
    unless:
      - type: text
        substr: "application/x-www-form-urlencoded"
      - id: metadata/package/testing/harness/runtime::is-test

composite_rules:
  - id: dropper-common-params-any
    desc: Common dropper URL parameters (add, uuid)
    crit: notable
    conf: 0.8
    any:
      - id: dropper-common-params
      - id: dropper-uuid-param
      - id: dropper-obfuscated-add-param
      - id: mac-query-param-format
