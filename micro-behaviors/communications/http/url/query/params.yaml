defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, pe]
  crit: notable
  conf: 0.8
traits:
  - id: google-search-query-url
    desc: Google search query URL
    crit: notable
    conf: 0.95
    for: [javascript, typescript, html]
    if:
      type: text
      substr: https://www.google.com/search?q=

  - id: token-query-parameter
    desc: URL token query parameter
    crit: notable
    conf: 0.82
    for: [javascript, typescript, html, python, shell]
    if:
      type: text
      regex: '[?&]token=[A-Za-z0-9_-]{16,}'
      case_insensitive: true

  - id: password-query-parameter
    desc: URL password query parameter
    crit: notable
    conf: 0.8
    for: [javascript, typescript, html, python, shell]
    if:
      type: literal
      regex: '(^|[?&])password='
      case_insensitive: true
  - id: search-source-query-parameter
    desc: Search URL source query parameter
    crit: notable
    conf: 0.86
    for: [javascript, typescript, html]
    if:
      type: literal
      kind: string
      regex: 'https?://[^"''\s]{0,80}(search|newtab)[^"''\s]{0,80}[?&]source='
      case_insensitive: true
  - id: utm-source-query-param
    desc: UTM source query parameter
    crit: component
    conf: 0.85
    for: [javascript, typescript, html]
    if:
      type: string_literal
      regex: '[?&]utm_source='
      case_insensitive: true
  - id: utm-medium-query-param
    desc: UTM medium query parameter
    crit: component
    conf: 0.85
    for: [javascript, typescript, html]
    if:
      type: string_literal
      regex: '[?&]utm_medium='
      case_insensitive: true
  - id: utm-campaign-query-param
    desc: UTM campaign query parameter
    crit: component
    conf: 0.85
    for: [javascript, typescript, html]
    if:
      type: string_literal
      regex: '[?&]utm_campaign='
      case_insensitive: true
  - id: dropper-common-params
    desc: Common dropper URL parameters (add, uuid)
    if:
      type: encoded
      regex: '[?&]add=[a-zA-Z0-9]{10,}'
  - id: dropper-uuid-param
    desc: UUID-like query parameter seen in droppers
    if:
      type: encoded
      regex: '[?&]uuid=[a-zA-Z0-9]{10,}'
  - id: dropper-obfuscated-add-param
    desc: Obfuscated add parameter construction
    if:
      type: encoded
      regex: '[?&]\{[^:]+:[''"]a[''"]\}\.[a-zA-Z0-9_$]+\+\{[^:]+:[''"]d[''"]\}\.[a-zA-Z0-9_$]+'
  - id: http-query-uids-list-param
    desc: HTTP query list parameter for UIDs
    crit: baseline
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: 'uids\[\]\s*='
  - id: mac-query-param-format
    desc: URL query includes formatted MAC address
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '[?&]mac=%02X-%02X-%02X-%02X-%02X-%02X'
  - id: yandex-installer-telemetry-query
    desc: Yandex installer telemetry query parameters
    crit: component
    conf: 0.95
    for: [pe]
    if:
      type: encoded
      regex: '[?&]yandexuid=\d{10,}.*[?&]mongoID=[0-9a-f]{16,}'
    not:
      - regex: '(?i)(docs|example|test|sample)'
  - id: url-query-type-data-exfil
    desc: URL query exfil with type/data params
    crit: notable
    conf: 0.92
    attack: T1041
    for: [javascript]
    if:
      type: text
      regex: '\?type=\$\{[^}]{1,80}\}&data=\$\{[^}]{1,80}\}'

  - id: url-query-type-data-literal
    desc: URL query with type and data params
    crit: notable
    conf: 0.88
    attack: T1041
    for: [javascript, python, shell]
    if:
      type: text
      regex: "[?&]type=[^&]{1,80}&data=[^&]{1,80}"
    unless:
      - type: text
        substr: "application/x-www-form-urlencoded"
      - id: metadata/package/testing/harness/runtime/

composite_rules:
  - id: utm-source-medium-campaign-url
    desc: URL carries UTM source/medium/campaign triad
    crit: notable
    conf: 0.9
    for: [javascript, typescript, html]
    near_bytes: 256
    all:
      - id: utm-source-query-param
      - id: utm-medium-query-param
      - id: utm-campaign-query-param
  - id: dropper-common-params-any
    desc: Common dropper URL parameters (add, uuid)
    crit: notable
    conf: 0.8
    any:
      - id: dropper-common-params
      - id: dropper-uuid-param
      - id: dropper-obfuscated-add-param
      - id: mac-query-param-format
