defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, shell, go, rust, php]
  crit: component
  conf: 0.84
traits:
  - id: platform-query-parameter
    desc: URL query includes platform parameter
    if:
      type: text
      regex: "getAddress\\?platform=|[?&]platform=[^=\\s\"']{1,20}"
