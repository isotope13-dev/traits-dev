defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: browser-location-search-read
    desc: Reads browser URL query string
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: window.location.search
  - id: stored-email-url-query
    desc: Adds stored email to URL query
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '[?&]mail=\$\{encodeURIComponent\([^)]{0,80}\.mail\)\}'
