defaults:
  platforms: [linux, macos, windows]
  for: [python, shell, elf, macho, pe, javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: base64-decoded-http-url
    desc: HTTP URL recovered from Base64 content
    if:
      type: encoded
      encoding: base64
      regex: "https?://[a-zA-Z0-9.-]+\\.[a-z]{2,}"
    not:
      - substr: '"file":"polyglot-no'
      - substr: apple.com
      - substr: digicert.com
      - substr: entrust.net
      - substr: globalsign.com
      - substr: sectigo.com
      - substr: pki.goog
      - substr: microsoft.com
      - regex: 'crl\.|ocsp\.'
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/signed/platform/
      - id: objectives/anti-static/obfuscation/encoding/content::encoded-http-url-referrer-param
      - id: metadata/binary/section/name::bun-section-name
