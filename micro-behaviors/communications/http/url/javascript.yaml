defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: parameter-manipulation-searchparams
    desc: Modifies tracked URL parameters
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'searchParams\.(set|append)\(\s*[''"](tag|affiliate|ref)[''"]'
  - id: parameter-manipulation-params
    desc: Modifies tracked URL parameters
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'params\.(set|append)\(\s*[''"](tag|affiliate|ref)[''"]'
composite_rules:
  - id: parameter-manipulation
    desc: Modifies tracked URL parameters
    crit: notable
    conf: 0.9
    any:
      - id: parameter-manipulation-searchparams
      - id: parameter-manipulation-params
