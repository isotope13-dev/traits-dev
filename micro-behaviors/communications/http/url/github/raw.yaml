defaults:
  platforms: [windows, unix]
  # `source` added so a raw.githubusercontent dead-drop URL is seen in compiled-
  # language loaders (Go/Rust/C#) too, not just scripts — the URL is a text
  # literal regardless of host language.
  for: [scripts, binaries, source, json]
  crit: notable
  mbc: C0002
  attack: T1071.001

traits:
  - id: github-web-raw-url
    desc: GitHub web raw file URL
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'https?://github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/raw/(refs/heads/)?'

  - id: encoded-raw-githubusercontent-url
    desc: Encoded raw.githubusercontent.com URL
    crit: notable
    conf: 0.96
    for: [scripts]
    if:
      type: encoded
      regex: 'https://raw\.githubusercontent\.com/'

  - id: raw-githubusercontent-b64-literal
    desc: Base64 literal raw.githubusercontent.com URL
    crit: notable
    conf: 0.94
    for: [scripts]
    if:
      type: literal
      kind: string
      regex: '^aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29t[A-Za-z0-9_-]{4,120}={0,2}$'

  - id: encoded-gist-githubusercontent-url
    desc: Encoded GitHub Gist raw URL
    crit: notable
    conf: 0.96
    for: [scripts]
    if:
      type: encoded
      regex: 'https://gist\.githubusercontent\.com/'

  - id: gist-github-host-url
    desc: Hardcoded gist.github.com host URL
    crit: notable
    conf: 0.88
    for: [scripts, source]
    if:
      type: literal
      kind: string
      substr: gist.github.com/
    unless:
      - id: metadata/package/testing/

  - id: gist-githubusercontent-raw-url
    desc: GitHub Gist raw content URL
    crit: notable
    conf: 0.92
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: 'gist\.githubusercontent\.com/.+/raw'
    unless:
      - id: metadata/package/testing/

  - id: github-raw-extension-registry-url
    desc: GitHub raw extension registry URL
    crit: notable
    conf: 0.94
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: 'raw\.githubusercontent\.com/.+/registry\.json'
    unless:
      - id: metadata/package/testing/

  - id: gist-githubusercontent-b64-literal
    desc: Base64 literal GitHub Gist raw URL
    crit: notable
    conf: 0.94
    for: [scripts]
    if:
      type: literal
      kind: string
      regex: '^aHR0cHM6Ly9naXN0LmdpdGh1YnVzZXJjb250ZW50LmNvbQ[A-Za-z0-9_-]{4,120}={0,2}$'

  - id: encoded-github-api-contents-url
    desc: Encoded GitHub contents API URL
    crit: notable
    conf: 0.94
    for: [scripts]
    if:
      type: encoded
      regex: 'https://api\.github\.com/repos/.{1,120}/contents/'

  - id: github-raw-plugin-repository-url
    desc: GitHub raw URL for a plugin repository
    crit: notable
    conf: 0.93
    for: [scripts, source]
    if:
      type: text
      regex: raw\.githubusercontent\.com/.{1,80}-plugins
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: github-api-contents-b64-literal
    desc: Base64 literal GitHub contents API URL
    crit: notable
    conf: 0.92
    for: [scripts]
    if:
      type: literal
      kind: string
      regex: '^aHR0cHM6Ly9hcGkuZ2l0aHViLmNvbS9yZXBvcw[A-Za-z0-9_-]{4,160}={0,2}$'

  - id: raw-githubusercontent-web-file
    desc: raw.githubusercontent.com web file URL
    conf: 0.7
    if:
      type: text
      regex: raw\.githubusercontent\.com/.{1,100}\.(html|txt|php)
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        regex: '(?i)\.(crt|cer|pem)$'

  - id: raw-githubusercontent-script-file
    desc: References raw.githubusercontent.com script URL
    conf: 0.7
    if:
      type: text
      regex: raw\.githubusercontent\.com/.{1,100}\.(sh|py|ps1)
    unless:
      - type: text
        regex: (?im)^\s*source:\s*https?://raw\.githubusercontent\.com/
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        regex: '(?i)\.(crt|cer|pem)$'

  - id: raw-githubusercontent-scripting-lang
    desc: raw.githubusercontent.com scripting URL
    conf: 0.8
    if:
      type: text
      regex: raw\.githubusercontent\.com/.{1,100}\.(rb|pl|js)\b
    not:
      - substr: .schema.
      - substr: angular-resource.js
      - substr: code.angularjs.org
      - substr: bower_components/angular
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        regex: '(?i)\.(crt|cer|pem)$'

  - id: raw-githubusercontent-native-library
    desc: raw.githubusercontent.com native library URL
    conf: 0.82
    if:
      type: text
      regex: raw\.githubusercontent\.com/.{1,140}\.(so(\.[0-9.]+)?|dylib|dll)\b
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        regex: '(?i)\.(crt|cer|pem)$'

  - id: raw-githubusercontent-any
    desc: raw.githubusercontent.com URL
    crit: component
    conf: 0.7
    if:
      type: text
      regex: raw\.githubusercontent\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+/
    not:
      - regex: \.(png|jpe?g|gif|svg|webp)([?&\s"'<>]|$)
      - substr: raw.githubusercontent.com/oasis-tcs/sarif-spec/
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/scripted/
      - type: basename
        regex: '(?i)\.(crt|cer|pem)$'

  - id: raw-githubusercontent-refs
    desc: GitHub raw refs/heads URL
    crit: component
    conf: 0.75
    if:
      type: text
      regex: raw\.githubusercontent\.com/.{1,80}/refs/heads/
    not:
      - regex: \.(png|jpe?g|gif|svg|webp)([?&\s"'<>]|$)
