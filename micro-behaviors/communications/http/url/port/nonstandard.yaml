defaults:
  platforms: [windows, unix]
  for: [scripts, javascript]
  crit: notable
  conf: 0.85
traits:
  - id: http-alt-port-8080
    desc: HTTP alternate port 8080
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ':8080\b'
    unless:
      - id: metadata/package/quality/profile::has-tests
      - type: text
        regex: 'https?://localhost:8080/|localhost:8080\b'
      - type: text
        regex: 'https?://127\.0\.0\.1:8080/|127\.0\.0\.1:8080\b'
      - id: metadata/package/testing/presence/harness::ruby-test-file
  - id: http-custom-port-number
    for: [json, xml]
    desc: HTTP request with custom port (4+ digits)
    crit: notable
    conf: 0.85
    if:
      type: value
      path: "port"
      regex: "\\d{4,5}"
    attack: T1071
