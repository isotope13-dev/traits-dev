defaults:
  platforms:
  - unix
  - windows
  crit: notable
  conf: 0.9
  for: [scripts, binaries, documents]
traits:
- id: aws-s3-url
  desc: AWS S3 object URL
  if:
    type: text
    regex: https?://[a-z0-9-]+\.s3(\.[a-z0-9-]+)?\.amazonaws\.com/
- id: gcs-url
  desc: Google Cloud Storage URL
  if:
    type: text
    regex: https?://storage\.googleapis\.com/[a-z0-9-_]+(/|["'']|$)
  unless:
    - type: text
      regex: "https?://storage\\.googleapis\\.com/flutter_infra_release/releases/"
- id: do-spaces-url
  desc: DigitalOcean Spaces URL
  if:
    type: text
    regex: https?://[a-z0-9-]+\.[a-z0-9-]+\.digitaloceanspaces\.com/
- id: vultr-object-storage-url
  desc: Vultr object storage URL
  conf: 0.88
  if:
    type: text
    regex: https?://[a-z0-9-]+\.[a-z0-9-]+\.vultrobjects\.com/
- id: cloudflare-r2-url
  desc: Cloudflare R2 storage URL
  if:
    type: text
    regex: 'https?://[a-z0-9-]+\.r2\.cloudflarestorage\.com(/|["'']|$)'
- id: cloudflare-r2-pub-url
  desc: Cloudflare R2 public bucket URL
  if:
    type: text
    regex: https?://pub-[a-f0-9]+\.r2\.dev/
- id: backblaze-b2-url
  desc: Backblaze B2 storage URL
  if:
    type: text
    regex: https?://[a-z0-9-]+\.backblazeb2\.com/
  unless:
    - id: objectives/credential-access/cloud/token/oauth::sharex-uploaderslib-assembly
- id: dropbox-download-url--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (dl\.dropbox\.com|dl\.dropboxusercontent\.com)/s(cl)?/fi/[a-zA-Z0-9_-]{10,}
  count_max: 1021529
- id: dropbox-download-url--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (www\.dropbox\.com)/s(cl)?/fi/[a-zA-Z0-9_-]{10,}
  count_max: 1021530
- id: dropbox-executable-url--rx-3
  desc: Dropboxusercontent executable URL
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'dl\.dropboxusercontent\.com/[^\s"''<>]{1,240}\.(exe|dll|bat|ps1|msi)\b'
  count_max: 1021531
- id: dropbox-executable-url--rx-4
  desc: Dropbox share executable URL
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'www\.dropbox\.com/s(cl)?/fi/[A-Za-z0-9_-]{10,}[^\s"''<>]{0,240}\.(exe|dll|bat|ps1|msi)\b'
  count_max: 1021532
- id: dropbox-executable-url--rx-5
  desc: Dropbox direct executable URL
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'dl\.dropbox\.com/s(cl)?/fi/[A-Za-z0-9_-]{10,}[^\s"''<>]{0,240}\.(exe|dll|bat|ps1|msi)\b'
  count_max: 1021533
- id: gdrive-download-url--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (drive|docs)\.google\.com/uc\?export=download&id=[a-zA-Z0-9_-]{20,}

  count_max: 1021534
- id: gdrive-download-url--rx-7
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: drive.usercontent.google.com/download
  count_max: 1021535
- id: gdrive-usercontent-host
  desc: Google Drive usercontent host string
  crit: component
  conf: 0.9
  if:
    type: text
    exact: drive.usercontent.google.com
- id: gdrive-download-path-query
  desc: Google Drive download path query
  crit: component
  conf: 0.94
  if:
    type: text
    regex: ^/download\?id=[A-Za-z0-9_-]{20,}&export=download
- id: gdrive-executable-url--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (drive|docs)\.google\.com/(uc|file/d)/[a-zA-Z0-9_-]{20,}.{0,200}\.(exe|dll)\b

  count_max: 1021536
- id: gdrive-executable-url--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (drive|docs)\.google\.com/(uc|file/d)/[a-zA-Z0-9_-]{20,}.{0,200}\.(bat|ps1)\b

  count_max: 1021537
- id: alibaba-oss-url--rx-10
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '[a-z0-9-]{1,64}\.oss-(cn|ap)-[a-z0-9-]{1,32}\.aliyuncs\.com'

  count_max: 1021538
- id: alibaba-oss-url--rx-11
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '[a-z0-9-]{1,64}\.oss-(us|eu)-[a-z0-9-]{1,32}\.aliyuncs\.com'

  count_max: 1021539
- id: alibaba-oss-url--rx-12
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '[a-z0-9-]{1,64}\.oss-(me)-[a-z0-9-]{1,32}\.aliyuncs\.com'

  count_max: 1021540
- id: alibaba-oss-executable-url--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.oss-(cn|ap)-[a-z0-9-]{1,32}\.aliyuncs\.com/.{1,200}\.(exe|dll)\b'

  count_max: 1021541
- id: alibaba-oss-executable-url--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.oss-(cn|ap)-[a-z0-9-]{1,32}\.aliyuncs\.com/.{1,200}\.(bat|ps1)\b'

  count_max: 1021542
- id: alibaba-oss-executable-url--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.oss-(us|eu)-[a-z0-9-]{1,32}\.aliyuncs\.com/.{1,200}\.(exe|dll)\b'

  count_max: 1021543
- id: alibaba-oss-executable-url--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.oss-(us|eu)-[a-z0-9-]{1,32}\.aliyuncs\.com/.{1,200}\.(bat|ps1)\b'

  count_max: 1021544
- id: alibaba-oss-executable-url--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.oss-(me)-[a-z0-9-]{1,32}\.aliyuncs\.com/.{1,200}\.(exe|dll|bat|ps1)\b'

  count_max: 1021545
- id: tencent-cos-url
  desc: Tencent COS bucket URL
  if:
    type: text
    regex: '[a-z0-9-]{1,64}\.cos\.ap-[a-z0-9-]{1,32}\.myqcloud\.com'

- id: tencent-cos-executable-url--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.cos\.ap-[a-z0-9-]{1,32}\.myqcloud\.com/.{1,200}\.(exe|dll)\b'

  count_max: 1021547
- id: tencent-cos-executable-url--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.cos\.ap-[a-z0-9-]{1,32}\.myqcloud\.com/.{1,200}\.(msi|bat)\b'

  count_max: 1021548
- id: tencent-cos-executable-url--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.cos\.ap-[a-z0-9-]{1,32}\.myqcloud\.com/.{1,200}\.(ps1)\b'

  count_max: 1021549
- id: tencent-cos-archive-url
  desc: Tencent COS URL with archive extension
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\.cos\.ap-[a-z0-9-]{1,32}\.myqcloud\.com/.{1,200}\.(zip|7z|rar)\b'
  unless:
  - id: well-known/app/tencent-codebuddy::tencent-codebuddy

- id: mega-download-url
  desc: MEGA.nz download URL
  if:
    type: text
    regex: mega\.nz/(file|#!) /[a-zA-Z0-9_-]{8,}

- id: mediafire-download-url
  desc: MediaFire download URL
  if:
    type: text
    regex: mediafire\.com/(file|download)/[a-zA-Z0-9_-]{10,}
- id: pcloud-api-url
  desc: pCloud API endpoint URL
  for: [apk, zip, java, kotlin]
  if:
    type: text
    regex: 'https?://(api\.)?pcloud\.com/|pcloud\.com/(api|file|download)'
- id: yandex-disk-api-url
  desc: Yandex Disk API endpoint URL
  for: [apk, zip, java, kotlin]
  if:
    type: text
    regex: 'https?://(cloud-api\.yandex\.net|disk\.yandex\.[a-z.]+)/'
- id: zoho-workdrive-api-url
  desc: Zoho WorkDrive API endpoint
  for: [apk, zip, java, kotlin]
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'https?://(www\.)?(zohoapis|workdrive\.zoho|accounts\.zoho)\.[a-z.]+/'

- id: discord-cdn-download-url
  desc: Discord CDN download URL
  if:
    type: text
    regex: cdn\.discordapp\.com/attachments/[0-9]{15,}/[0-9]{15,}/[^\s/]{1,80}
- id: discord-cdn-executable-url
  desc: Discord CDN URL with executable extension
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: discordapp\.com/attachments/[0-9]{15,}/[0-9]{15,}/.{1,80}\.(exe|dll|bat|ps1)\b
- id: discord-cdn-archive-url
  desc: Discord CDN URL with archive extension
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: discordapp\.com/attachments/[0-9]{15,}/[0-9]{15,}/.{1,80}\.(zip|7z|rar)\b
- id: dropbox-download-url-raw
  desc: Dropbox download URL in bytecode
  crit: notable
  conf: 0.9
  for: [class, jar, zip]
  if:
    type: text
    regex: (dl\.dropbox|www\.dropbox)\.com/s(cl)?/fi/[a-zA-Z0-9_-]{10,}
composite_rules:
- id: cloud-download-url
  desc: Download URL from cloud storage provider
  crit: notable
  conf: 0.88
  any:
  - id: dropbox-download-url
  - id: gdrive-download-url
  - id: alibaba-oss-url
  - id: tencent-cos-url
  - id: mega-download-url
  - id: mediafire-download-url
  - id: discord-cdn-download-url
  - id: pcloud-api-url
  - id: yandex-disk-api-url
  - id: zoho-workdrive-api-url

- id: cloud-executable-url
  desc: Executable download URL from cloud storage provider
  crit: notable
  conf: 0.9
  any:
  - id: dropbox-executable-url
  - id: gdrive-executable-url
  - id: alibaba-oss-executable-url
  - id: tencent-cos-executable-url
  - id: discord-cdn-executable-url
- id: cloud-archive-url
  desc: Archive download URL from cloud storage
  crit: notable
  conf: 0.9
  any:
  - id: tencent-cos-archive-url
  - id: discord-cdn-archive-url
- id: discord-cdn-download-url-any
  desc: Discord CDN download URL with suspicious extension
  crit: suspicious
  conf: 0.9
  any:
  - id: discord-cdn-executable-url
  - id: discord-cdn-archive-url
- id: dropbox-download-url
  desc: Dropbox direct download URL
  crit: baseline
  conf: 1.0
  any:
  - id: dropbox-download-url--rx-1
  - id: dropbox-download-url--rx-2
- id: dropbox-executable-url
  desc: Dropbox URL with executable extension
  crit: notable
  conf: 0.95
  any:
  - id: dropbox-executable-url--rx-3
  - id: dropbox-executable-url--rx-4
  - id: dropbox-executable-url--rx-5
- id: gdrive-download-url-split
  desc: Google Drive download URL split across strings
  crit: notable
  conf: 0.98
  all:
  - id: gdrive-usercontent-host
  - id: gdrive-download-path-query
- id: gdrive-download-url
  desc: Google Drive download URL
  crit: notable
  conf: 1.0
  any:
  - id: gdrive-download-url--rx-6
  - id: gdrive-download-url--rx-7
  - id: gdrive-download-url-split
- id: gdrive-executable-url
  desc: Google Drive URL with executable extension
  crit: suspicious
  conf: 0.9
  any:
  - id: gdrive-executable-url--rx-8
  - id: gdrive-executable-url--rx-9
- id: alibaba-oss-url
  desc: Alibaba Cloud OSS bucket URL
  crit: baseline
  conf: 1.0
  any:
  - id: alibaba-oss-url--rx-10
  - id: alibaba-oss-url--rx-11
  - id: alibaba-oss-url--rx-12
- id: alibaba-oss-executable-url
  desc: Alibaba Cloud OSS URL with executable extension
  crit: suspicious
  conf: 0.9
  any:
  - id: alibaba-oss-executable-url--rx-13
  - id: alibaba-oss-executable-url--rx-14
  - id: alibaba-oss-executable-url--rx-15
  - id: alibaba-oss-executable-url--rx-16
  - id: alibaba-oss-executable-url--rx-17
  unless:
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: well-known/app/mastergo::mastergo-application-context
  - id: well-known/app/codewhale::codewhale-application-context
  - id: well-known/app/ollama::ollama-macos-signed-app-context
- id: tencent-cos-executable-url
  desc: Tencent COS URL with executable extension
  crit: suspicious
  conf: 0.92
  any:
  - id: tencent-cos-executable-url--rx-18
  - id: tencent-cos-executable-url--rx-19
  - id: tencent-cos-executable-url--rx-20
