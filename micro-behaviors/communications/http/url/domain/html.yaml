# Absolute hyperlinks in HTML. These are navigation capabilities; intent is
# inferred only when they are correlated with extension lifecycle behavior.
defaults:
  platforms: [unix, windows]
  for: [html]
  crit: notable
  conf: 0.9

traits:
  - id: html-external-link-catalog
    desc: HTML contains a catalog of external hyperlinks
    count_min: 8
    if:
      type: text
      regex: '<a[^>]{0,240}href=["'']https?://'

  - id: html-game-link-catalog
    desc: External game-site hyperlink catalog
    count_min: 3
    if:
      type: text
      regex: '<a[^>]{0,160}href=["'']https?://[^"'']{0,120}(game|unblocked|bowl|solitaire)'
      case_insensitive: true
