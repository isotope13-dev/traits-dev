defaults:
  platforms: [unix, windows]
  for: [binaries]
  size_max: 1000000
  mbc: C0002
  attack: T1071.001

traits:
- id: labs-google-domain-reference
  desc: References the labs.google domain
  crit: notable
  conf: 0.88
  for: [python]
  if:
    type: literal
    substr: labs.google

- id: http-url-binary
  desc: Hardcoded network URL with domain name
  crit: notable
  conf: 0.7
