defaults:
  platforms: [linux, macos, windows]
  for: [scripts, pe, elf, macho]
  mbc: C0002
  attack: T1071.001

traits:
- id: pool-named-subdomain
  desc: Pool-named network subdomain
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: \bpool\.[a-z0-9-]+\.[a-z]{2,4}\b
  not:
  - regex: pool\.(dll|exe|drv|sys)\b
  - regex: \bpool\.[a-z0-9-]+\.(dll|drv|sys|exe)\b
  - regex: \bpool\.(d\.ts|js|ts|js\.map|ts\.map|d\.ts\.map)\b
  - regex: \bpool\.[a-z0-9_]+\.(get|set|add|delete|has|clear|keys|values|entries|forEach|map|filter|find|push|pop|some|every|then|catch|bind|size|length|type|name|node|nodes|root|next|prev|item|items|data|value|state|self|key|all|any|none|min|max|sum|avg|raw|copy|fold|join|sort|head|tail|init|last|done|failed|provider|image|volumes|spec|cluster|tasks|status|ready|metrics)\b
  - regex: \bpool\.(cluster|tasks|nodes|spec)\.
  - substr: no_pool.patch.tmp
  - substr: sks-keyservers.net
  - substr: pool.ntp.org
  - substr: db.pool.acquire
  - substr: pool.acquire.duration
  - regex: '\bpool\.acquire\.dura\b'
  - regex: '\bpool\.acquire\.duration\b'
  unless:
  - id: well-known/lib/aws-sdk-ruby
  - id: well-known/tool/detection/clawmetry/

- id: pool-named-url-host
  desc: Pool-named URL host
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(?i)(https?|stratum\+(tcp|ssl))://[a-z0-9.-]*\bpool\b[a-z0-9.-]*[/:]'
  not:
  - substr: spool
  - substr: poolmanager.pool
  - substr: github.com/openresty/lua-tablepool
  unless:
  - type: text
    substr: pool.ntp.org
