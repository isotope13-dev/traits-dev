# Hardcoded remote host URLs in JavaScript / browser-extension code.
#
# In supply-chain and extension review, every remote host a script or extension
# contacts is a network IOC an analyst wants to see -- so a hardcoded http(s)
# URL to a named host is notable in this context. Notable, not suspicious: a
# hostname alone is not malicious, but it should never be invisible. Loopback,
# reserved example domains and schema/namespace URLs are excluded. Raw-IP URLs
# are handled (as suspicious) by ip/literal/browser.yaml, not here.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.75

traits:
  - id: pdfcompare-online-api-url
    desc: Connects to the pdfcompare.online API
    conf: 0.95
    if:
      type: string_literal
      exact: https://pdfcompare.online/api

  - id: js-remote-host-url
    desc: Contains a hardcoded remote HTTP(S) URL
    size_max: 4000000
    if:
      type: string_literal
      regex: 'https?://([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}'
    not:
      - regex: 'https?://(localhost|[^/"'']*\.local\b)'
      - regex: 'https?://([a-z0-9-]+\.)*example\.(com|org|net)'
      - regex: 'https?://(www\.)?(w3|schemas?\.[a-z]+)\.org'
      # URI identifiers and documentation links are not network endpoints.
      - regex: 'https?://[^/"'']+/(types?|schemas?|issues?)(/|[?#]|$)'
      # Minified production bundles embed a link to the library's own error
      # documentation so a numbered error can be decoded (React's
      # reactjs.org/docs/error-decoder.html, MUI's mui.com/production-error/).
      # These ship in essentially every React/MUI build and are never fetched.
      # Matched host-only: `if:` above captures just scheme+host, and `not:`
      # is applied to that matched span, so a path-based exclusion here would
      # never fire.
      - regex: 'https?://(www\.)?(reactjs|react)\.(org|dev)'
      - regex: 'https?://(www\.)?mui\.com'
      # Apple plist DTD identifiers are XML vocabulary, not fetched endpoints.
      - regex: 'https?://(www\.)?apple\.com'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/package/testing/presence/harness/
      - id: metadata/document/html::doctype

  - id: js-insecure-remote-http-url
    desc: Contains a hardcoded insecure HTTP URL
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: 'http://([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}'
    not:
      # XML/SVG namespace identifiers are URI constants, not insecure network
      # endpoints.  They are common in benign browser libraries.
      - regex: 'http://(www\.)?w3\.org'
      - regex: 'http://schemas?\.[^/"'']+'
      - regex: 'http://(www\.)?apple\.com'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/package/testing/presence/harness/
      - id: metadata/document/html::doctype

  # Game-promotion / newtab-hijack adware carries a casual-game brand at the
  # start of a DNS label (gameograf.com, unblockedgames66.com,
  # coolmathgames.com, solitaire.org). Requiring a label boundary prevents
  # ordinary words such as boardgamearena.com from being treated as promotion
  # hosts.
  - id: js-game-label-promotion-url
    desc: Game-branded host URL in JS
    if:
      type: string_literal
      regex: 'https?://([\w-]+\.)*game[\w-]*\.[a-z]{2,}([/?#]|$)'
      case_insensitive: true
  - id: js-unblocked-game-promotion-url
    desc: Unblocked-game host URL in JS
    if:
      type: string_literal
      regex: 'https?://([\w-]+\.)*unblockedgames[0-9]*\.[a-z]{2,}([/?#]|$)'
      case_insensitive: true
  - id: js-coolmath-game-promotion-url
    desc: Coolmath game host URL in JS
    if:
      type: string_literal
      regex: 'https?://([\w-]+\.)*coolmathgames\.[a-z]{2,}([/?#]|$)'
      case_insensitive: true
  - id: js-solitaire-promotion-url
    desc: Solitaire game host URL in JS
    if:
      type: string_literal
      regex: 'https?://([\w-]+\.)*solitaire\.[a-z]{2,}([/?#]|$)'
      case_insensitive: true
  - id: js-bowl-promotion-url
    desc: Bowl game host URL in JS
    if:
      type: string_literal
      regex: 'https?://([\w-]+\.)*bowl\.[a-z]{2,}([/?#]|$)'
      case_insensitive: true
  - id: chrome-webstore-detail-url
    desc: Chrome Web Store detail page URL
    conf: 0.9
    if:
      type: text
      regex: 'https?://(chrome\.google\.com/webstore/detail/|chromewebstore\.google\.com/detail/)'
      case_insensitive: true

composite_rules:
  - id: js-game-promotion-url
    desc: Game-promotion host URL in JS
    crit: notable
    conf: 0.85
    any:
      - id: js-game-label-promotion-url
      - id: js-unblocked-game-promotion-url
      - id: js-coolmath-game-promotion-url
      - id: js-solitaire-promotion-url
      - id: js-bowl-promotion-url
