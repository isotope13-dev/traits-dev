defaults:
  for: [binaries, scripts, source]
  platforms: [unix, windows]
  attack: T1583.006
  mbc: B0030

traits:
  - id: workers-dev-domain
    desc: Cloudflare Workers domain reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .workers.dev
    unless:
      - id: metadata/package/quality/

  - id: workers-dev-url
    desc: HTTPS URL pointing to Cloudflare Workers
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'https?://[\w.-]+\.workers\.dev/'
