defaults:
  for: [applescript]
  platforms: [macos]
  crit: component
  conf: 0.75

traits:
  - id: url-variable
    desc: URL variable name
    if:
      type: symbol
      regex: "(?i)^url$"

  - id: server-variable
    desc: Server variable name
    if:
      type: symbol
      regex: "(?i)^server$"
