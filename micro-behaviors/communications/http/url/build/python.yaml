# Constructing an HTTP(S) URL from a variable — f-string interpolation of a
# host/domain/server/ip name, or "http://" + var concatenation. This is core
# HTTP-client behavior (every networked Python program builds request URLs this
# way, e.g. aiograpi's f"https://{domain}/graphql_www"), so per TAXONOMY it is a
# communications capability at `notable`, not a C2 signal. C2 intent comes from
# the target being a hardcoded external IP literal, which lives separately under
# objectives/command-and-control/infrastructure/ip and url/external-ip.
defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  mbc: C0002
  crit: notable
traits:
  - id: python-fstring-url-host
    desc: URL f-string from host
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{host\}["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-ip
    desc: URL f-string from ip
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{ip\}["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-server
    desc: URL f-string from server
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{server\}["'?/#]
    not:
      - regex: 'f?["'']?https://\{server\}/api/v4/projects/\{repo\}/(merge_requests/\{merge_request\}/notes|issues/\{issue\}/notes)'
      - regex: 'f?["'']?https://\{server\}/repos/\{repo\}/issues/\{issue\}/comments'
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
      - type: text
        regex: 'api/v4/projects/\{repo\}/merge_requests/\{merge_request\}/notes'
      - type: text
        regex: 'api/v4/projects/\{repo\}/issues/\{issue\}/notes'
      - type: text
        regex: 'repos/\{repo\}/issues/\{issue\}/comments'
  - id: python-fstring-url-domain
    desc: URL f-string from domain
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{domain\}["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
      - type: text
        substr: "MConstants.PROVER_DOTCOM"
  - id: python-fstring-url-with-port-host
    desc: URL f-string with host
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{host\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-with-port-ip
    desc: URL f-string with ip
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{ip\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-with-port-server
    desc: URL f-string with server
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{server\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-with-port-domain
    desc: URL f-string with domain
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{domain\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-string-concat-url
    desc: URL constructed via string concatenation
    conf: 0.85
    if:
      type: string_literal
      regex: '["'']https?://["'']\s*\+\s*\w+'
    not:
      - regex: url
composite_rules:
  - id: python-fstring-url
    desc: URL constructed with f-string variable
    crit: notable
    conf: 0.85
    any:
      - id: python-fstring-url-host
      - id: python-fstring-url-ip
      - id: python-fstring-url-server
      - id: python-fstring-url-domain
  - id: python-fstring-url-with-port
    desc: URL f-string construction with port
    crit: notable
    conf: 0.85
    any:
      - id: python-fstring-url-with-port-host
      - id: python-fstring-url-with-port-ip
      - id: python-fstring-url-with-port-server
      - id: python-fstring-url-with-port-domain
  - id: python-url-construction
    desc: HTTP URL constructed from a variable
    crit: notable
    conf: 0.85
    any:
      - id: python-fstring-url
      - id: python-fstring-url-with-port
      - id: python-string-concat-url
