defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: stack-built-https-url-x64
    desc: x64 stack-built HTTPS URL
    crit: notable
    conf: 0.88
    attack: T1071.001
    arch: [x86-64]
    if:
      type: hex
      section: .text
      # Match the scheme only; hostnames and paths deliberately remain
      # variable so this catches changing infrastructure.
      pattern: 'C6 84 24 ?? ?? ?? ?? 68 C6 84 24 ?? ?? ?? ?? 74 C6 84 24 ?? ?? ?? ?? 74 C6 84 24 ?? ?? ?? ?? 70 C6 84 24 ?? ?? ?? ?? 73 C6 84 24 ?? ?? ?? ?? 3A C6 84 24 ?? ?? ?? ?? 2F C6 84 24 ?? ?? ?? ?? 2F'
