defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: parameter-manipulation-searchparams
    desc: Modifies tracked URL parameters
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'searchParams\.(set|append)\(\s*[''"](tag|affiliate|ref)[''"]'
  - id: parameter-manipulation-params
    desc: Modifies tracked URL parameters
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'params\.(set|append)\(\s*[''"](tag|affiliate|ref)[''"]'
