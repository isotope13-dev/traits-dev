defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
- id: telemetry-api-path
  desc: Telemetry API endpoint path
  conf: 0.78
  if:
    type: text
    substr: /api/telemetry
- id: php-collect
  desc: PHP collection endpoint
  attack: T1041
  if:
    type: text
    regex: \.php\?([^#\s]{0,200}&)?collect(=|&|$)
- id: php-data
  desc: PHP data endpoint
  attack: T1041
  if:
    type: text
    regex: \.php\?([^#\s]{0,200}&)?data(=|&|$)
- id: php-info
  desc: PHP info endpoint
  attack: T1041
  if:
    type: text
    regex: \.php\?([^#\s]{0,200}&)?info(=|&|$)
- id: php-log
  desc: PHP logging endpoint
  attack: T1041
  if:
    type: text
    regex: \.php\?([^#\s]{0,200}&)?log(=|&|$)
- id: php-report
  desc: PHP reporting endpoint
  attack: T1041
  if:
    type: text
    regex: \.php\?([^#\s]{0,200}&)?report(=|&|$)
- id: php-beacon
  desc: PHP beacon endpoint
  attack: T1041
  if:
    type: text
    regex: \.php\?([^#\s]{0,200}&)?beacon(=|&|$)
- id: payload-path-a-get
  desc: HTTP GET executable path
  crit: notable
  attack: T1105
  if:
    type: text
    regex: \bGET\s+/\S+\.(bin|exe|sh|elf)\b
- id: payload-path-a-post
  desc: HTTP POST executable path
  crit: notable
  attack: T1105
  if:
    type: text
    regex: \bPOST\s+/\S+\.(bin|exe|sh|elf)\b
- id: payload-path-a-put
  desc: HTTP PUT executable path
  crit: notable
  attack: T1105
  if:
    type: text
    regex: \bPUT\s+/\S+\.(bin|exe|sh|elf)\b
- id: payload-path-b-get
  desc: HTTP GET payload path
  crit: notable
  attack: T1105
  if:
    type: text
    regex: \bGET\s+/\S+\.(dll|so|dat|payload)\b
- id: payload-path-b-post
  desc: HTTP POST payload path
  crit: notable
  attack: T1105
  if:
    type: text
    regex: \bPOST\s+/\S+\.(dll|so|dat|payload)\b
- id: payload-path-b-put
  desc: HTTP PUT payload path
  crit: notable
  attack: T1105
  if:
    type: text
    regex: \bPUT\s+/\S+\.(dll|so|dat|payload)\b
- id: office-macro-document-url
  desc: External Office macro document URL
  crit: suspicious
  conf: 0.95
  attack: T1105
  for: [html, javascript, typescript]
  if:
    type: text
    regex: https?://[^\s"'<>]{1,200}\.(docm|dotm)(\b|[?#])
    case_insensitive: true
- id: loopback-ipv6-literal
  desc: IPv6 loopback literal
  crit: component
  conf: 0.9
  for: [javascript, typescript, html]
  if:
    type: text
    substr: "::1"
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: ipv4-literal
  desc: IPv4 literal string
  crit: component
  conf: 0.75
  for: [javascript, typescript, html]
  if:
    type: text
    regex: '\b\d{1,3}(\.\d{1,3}){3}\b'
    # Validate octets (0-255, no leading zeros) across every range, including
    # private/loopback, so malformed dotted runs like SVG path coordinates
    # (022.617.46.402) don't register as IP literals.
    is: valid_ip
- id: browser-location-host-ref--rx-1
  desc: window.location host marker
  crit: component
  conf: 0.9
  for: [javascript, typescript, html]
  if:
    type: text
    regex: '\b(window\.)?location\.(host|hostname|href)\b'
  count_max: 1021525
- id: browser-location-host-read
  desc: Reads current host from browser location
  crit: notable
  conf: 0.82
  for: [javascript, typescript, html]
  if:
    type: text
    regex: '\b(window\.)?location\.(host|hostname)\b'
- id: browser-location-host-tld-match
  desc: Matches browser host against ccTLD set
  crit: notable
  conf: 0.82
  for: [javascript, typescript]
  if:
    type: text
    regex: 'location\.host\.match\s*\(\s*/\\\.\('
- id: browser-location-host-ref--rx-2
  desc: URL object host marker
  crit: component
  conf: 0.9
  for: [javascript, typescript, html]
  if:
    type: text
    regex: '\bnew\s+URL\s*\(.{0,200}\)\.(host|hostname|href)\b'
  count_max: 1021526
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/

- id: http-api-version-path
  desc: HTTP API version endpoint path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (^|https?://.{0,200})?/v[0-9.]+/version($|[?#])
composite_rules:
- id: local-ip-or-localhost-literal
  desc: Localhost or IP literal string
  crit: component
  conf: 0.9
  any:
  - id: micro-behaviors/communications/ip/literal::localhost-source
  - id: loopback-ipv6-literal
  - id: ipv4-literal
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: php-collector
  desc: Contacts PHP data collection endpoint
  crit: notable
  conf: 0.85
  attack: T1041
  any:
  - id: php-collect
  - id: php-data
  - id: php-info
  - id: php-log
  - id: php-report
  - id: php-beacon
- id: payload-path-a
  desc: HTTP executable path
  crit: notable
  conf: 0.8
  attack: T1105
  any:
  - id: payload-path-a-get
  - id: payload-path-a-post
  - id: payload-path-a-put
- id: payload-path-b
  desc: HTTP payload path
  crit: notable
  conf: 0.8
  attack: T1105
  any:
  - id: payload-path-b-get
  - id: payload-path-b-post
  - id: payload-path-b-put
- id: payload-path
  desc: URL path suggesting payload download
  crit: notable
  conf: 0.8
  attack: T1105
  any:
  - id: payload-path-a
  - id: payload-path-b
- id: local-ip-or-localhost-guard
  desc: Skips localhost and IP literal hosts
  crit: notable
  conf: 0.9
  for: [javascript, typescript, html]
  near_bytes: 256
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/file/catalog/identity/
  - id: micro-behaviors/data/source/build::icon-registry-bundle
  all:
  - id: local-ip-or-localhost-literal
  - id: browser-location-host-ref
- id: browser-location-host-ref
  desc: Browser host field reference
  crit: component
  conf: 0.9
  for: [javascript, typescript, html]
  any:
  - id: browser-location-host-ref--rx-1
  - id: browser-location-host-ref--rx-2
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
