defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94

traits:
  - id: js-relative-route-fetch
    desc: JavaScript fetches a relative application route
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: fetch
      arg:
        kind: string
        regex: '^/[A-Za-z0-9._~!$&''()*+,;=:@/-]{1,120}$'
  - id: fetch-encoded-template-path
    desc: Fetch embeds encoded data in URL path
    if:
      type: text
      regex: 'fetch\s*\(\s*`https?://[^`]{0,120}\$\{encodeURIComponent\('
  - id: remote-extension-catalog-url
    desc: Remote extension/shortcut listing URL path
    conf: 0.92
    if:
      type: text
      regex: 'https?://[A-Za-z0-9._:/-]{1,200}/(api/extensions(\.php)?|js/shortcuts\.json)'
      case_insensitive: true
