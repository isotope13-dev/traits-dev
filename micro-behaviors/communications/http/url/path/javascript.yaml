defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94

traits:
  - id: fetch-encoded-template-path
    desc: Fetch embeds encoded data in URL path
    if:
      type: text
      regex: 'fetch\s*\(\s*`https?://[^`]{0,120}\$\{encodeURIComponent\('
