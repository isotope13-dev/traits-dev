defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94

traits:
  - id: fetch-encoded-template-path
    desc: Fetch embeds encoded data in URL path
    if:
      type: text
      regex: 'fetch\s*\(\s*`https?://[^`]{0,120}\$\{encodeURIComponent\('
  - id: remote-extension-catalog-url
    desc: Remote browser-extension catalog URL path
    conf: 0.92
    if:
      type: string_literal
      regex: 'https?://[^"''\s]+/api/extensions(\.php)?\b'
      case_insensitive: true
