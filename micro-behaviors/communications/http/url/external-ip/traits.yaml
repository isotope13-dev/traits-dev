# Hardcoded http(s):// URLs that point at a raw external IPv4 address.
# Legitimate code targets a hostname; pinning a literal external IP in a
# URL bypasses DNS, sinkholes, and reputation blocklists. The encoded
# variant catches the very common malware pattern of base64-wrapping the
# C2 URL to defeat string scanners.
defaults:
  platforms: [unix, windows]
  mbc: C0002
  attack: T1071.001
  size_max: 20000000
traits:
  - id: curl-external-ip-request
    desc: curl requests a literal public IP address
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(?m)^[ \t]*(if[ \t]+)?curl\b[^\n]{0,96}https?://(\d{1,3}\.){3}\d{1,3}'
      is: external_ip

  - id: url-external-ip-script
    desc: URL pinned to external IPv4
    crit: notable
    conf: 0.9
    for: [scripts, source]
    if:
      type: string_literal
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}(:[0-9]{1,5})?(/|$)'
      is: external_ip
    not:
      - regex: 'https?://8\.8\.[84]\.[84](/|$)'
      - regex: 'https?://1\.1\.1\.1(/|$)'
      - regex: 'https?://9\.9\.9\.9(/|$)'
      - regex: 'https?://169\.254\.169\.254(/|$)'
      - regex: 'https?://100\.100\.100\.200(/|$)'
      - regex: 'https?://100\.(6[4-9]|[789][0-9]|1[01][0-9]|12[0-7])\.'
    unless:
      - id: metadata/package/testing/presence/harness::c-source-test-directory
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/tool/detection/security-scanner/
      - id: micro-behaviors/crypto/library/blockchain/
      - type: text
        regex: 'extract_.*ctx_limit|maximum context length'

  - id: url-external-ip-encoded
    desc: Encoded URL pinned to external IPv4
    crit: suspicious
    conf: 0.95
    for: [php, javascript, python, shell, powershell]
    if:
      type: encoded
      encoding: base64
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}(:[0-9]{1,5})?(/|$)'
      is: external_ip
    not:
      - regex: 'https?://169\.254\.169\.254(/|$)'
      - regex: 'https?://100\.(6[4-9]|[789][0-9]|1[01][0-9]|12[0-7])\.'
    unless:
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/file/format::sourcemap-inline-base64

  # Port-less only; IP:port URLs are the (higher-confidence) province of
  # url-external-ip-port-binary. Keeping the port optional here made every
  # IP:port literal double-count as two suspicious traits, inflating the
  # sparse-cluster trait floor on binaries that embed a single config endpoint.
  - id: url-external-ip-binary
    desc: URL pinned to external IPv4 (no port)
    crit: suspicious
    conf: 0.8
    for: [binaries]
    if:
      type: text
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}(/|$)'
      is: external_ip
    not:
      - regex: 'https?://8\.8\.[84]\.[84](/|$)'
      - regex: 'https?://1\.1\.1\.1(/|$)'
      - regex: 'https?://169\.254\.169\.254(/|$)'
      - regex: 'https?://100\.100\.100\.200(/|$)'
      - regex: 'https?://100\.(6[4-9]|[789][0-9]|1[01][0-9]|12[0-7])\.'
    unless:
      - id: metadata/lang/compiler/aot::native-runtime-large-file
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/dual-use/screenconnect::screenconnect-signed-launcher-context

  - id: url-external-ip-xor-binary
    desc: XOR-decoded external IPv4 URL
    crit: suspicious
    conf: 0.96
    for: [binaries]
    if:
      type: encoded
      encoding: xor
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}(:[0-9]{1,5})?(/|$)'
      is: external_ip
    not:
      - regex: 'https?://8\.8\.[84]\.[84](/|$)'
      - regex: 'https?://1\.1\.1\.1(/|$)'
      - regex: 'https?://169\.254\.169\.254(/|$)'
      - regex: 'https?://100\.100\.100\.200(/|$)'

  - id: url-external-ip-port-binary
    desc: URL pinned to external IPv4 port
    crit: suspicious
    conf: 0.9
    for: [binaries]
    if:
      type: text
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{2,5}'
      is: external_ip
    unless:
      - id: well-known/app/windows-desktop-tools::steamtools-member
      - id: well-known/app/windows-desktop-tools::steamkit2-library
      - id: well-known/lib/youtube-dl/
      - id: well-known/app/parlem-provisioning-drivers::parlem-driver-context
      - id: well-known/tool/dual-use/screenconnect::screenconnect-signed-launcher-context
    not:
      - regex: 'https?://8\.8\.[84]\.[84]:'
      - regex: 'https?://1\.1\.1\.1:'
      - regex: 'https?://9\.9\.9\.9:'
      - regex: 'https?://169\.254\.169\.254:'
      - regex: 'https?://100\.(6[4-9]|[789][0-9]|1[01][0-9]|12[0-7])\.'

  - id: url-external-ip-query-port-binary
    desc: URL pinned to IPv4 query port
    crit: suspicious
    conf: 0.9
    for: [binaries]
    if:
      type: text
      regex: 'https?://([0-9]{1,3}\.){3}[0-9]{1,3}/.{0,240}([?&]|&amp;)p=[0-9]{2,5}([&#\s]|$)'
      is: external_ip
    not:
      - regex: 'https?://169\.254\.169\.254/'
      - regex: 'https?://100\.(6[4-9]|[789][0-9]|1[01][0-9]|12[0-7])\.'
    unless:
      - id: well-known/tool/dual-use/screenconnect::screenconnect-signed-launcher-context
