defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
traits:
  - id: solana-rpc-url
    desc: Solana RPC endpoint
    conf: 0.9
    if:
      type: string_literal
      regex: api\.(mainnet-beta|devnet|testnet)\.solana\.com
  - id: solana-rpc-method
    desc: Solana JSON-RPC method (signature/account)
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: ^get(SignaturesForAddress|SignFAddress|AccountInfo)$
  - id: solana-rpc-method-2
    desc: Solana JSON-RPC method (balance/tx/blockhash)
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: ^get(Balance|Transaction|LatestBlockhash)$
  # Field names of a Solana getParsedTransaction / getTransaction RPC
  # response. Individually common in web3.js; together they identify code
  # that parses full parsed-transaction payloads (Go struct tags
  # `json:"accountKeys"` survive into a compiled binary's strings, and the
  # bare identifiers appear in JS).
  - id: solana-tx-account-keys-field
    desc: Solana transaction accountKeys field
    crit: component
    conf: 0.8
    if:
      type: text
      substr: accountKeys
  - id: solana-tx-inner-instructions-field
    desc: Solana transaction innerInstructions field
    crit: component
    conf: 0.8
    if:
      type: text
      substr: innerInstructions
  - id: solana-tx-program-id-field
    desc: Solana transaction programId field
    crit: component
    conf: 0.8
    if:
      type: text
      substr: programId
  - id: solana-tx-log-messages-field
    desc: Solana transaction logMessages field
    crit: component
    conf: 0.8
    if:
      type: text
      substr: logMessages
composite_rules:
  - id: solana-rpc-method-any
    desc: Solana JSON-RPC method
    crit: component
    any:
      - id: solana-rpc-method
      - id: solana-rpc-method-2
  - id: solana-parsed-transaction-schema
    desc: Parses Solana parsed-transaction schema
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: solana-tx-account-keys-field
      - id: solana-tx-inner-instructions-field
      - id: solana-tx-program-id-field
      - id: solana-tx-log-messages-field
