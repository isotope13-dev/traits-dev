defaults:
  platforms: [windows]
  for: [scripts, binaries, lnk]
  crit: notable
  conf: 0.88
  attack: T1105
traits:
  - id: davwwwroot-path
    desc: Windows WebDAV redirector path
    if:
      type: text
      exact: DavWWWRoot
  - id: webdav-ssl-unc-argument
    desc: WebDAV SSL UNC path in LNK arguments
    crit: notable
    conf: 0.96
    for: [lnk]
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)DavWWWRoot'
  - id: webdav-ssl-unc-path
    desc: WebDAV SSL UNC path
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)\\\\[^\\\r\n"'']{1,160}@SSL\\DavWWWRoot\\'
  - id: webdav-ssl-unc-lnk-argument
    desc: LNK arguments reference SSL WebDAV
    crit: notable
    conf: 0.96
    for: [lnk]
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)@SSL\\DavWWWRoot\\'
  - id: search-connector-description
    desc: Windows Search Connector XML
    crit: component
    conf: 0.95
    for: [documents, data]
    if:
      type: text
      substr: "<searchConnectorDescription"
  - id: search-connector-simple-location
    desc: Search Connector simple location
    crit: component
    conf: 0.95
    for: [documents, data]
    if:
      type: text
      substr: "<simpleLocation>"
  - id: search-connector-http-ip-url
    desc: Search Connector HTTP IP URL
    crit: notable
    conf: 0.96
    for: [documents, data]
    if:
      type: text
      regex: '<url>https?://[0-9]{1,3}(\.[0-9]{1,3}){3}/?'
      is: external_ip
composite_rules:
  - id: windows-webdav-unc
    desc: Windows WebDAV UNC path
    conf: 0.96
    all:
      - id: webdav-ssl-unc-path
      - id: micro-behaviors/os/wmi/manipulate::unc-path-reference
