defaults:
  platforms: [windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.88
  attack: T1105
traits:
  - id: davwwwroot-path
    desc: Windows WebDAV redirector path
    if:
      type: text
      exact: DavWWWRoot
  - id: webdav-ssl-unc-path
    desc: WebDAV SSL UNC path
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)\\\\[^\\\r\n"'']{1,160}@SSL\\\\DavWWWRoot\\\\'
composite_rules:
  - id: windows-webdav-unc
    desc: Windows WebDAV UNC path
    conf: 0.96
    all:
      - id: webdav-ssl-unc-path
      - id: micro-behaviors/os/wmi::unc-path-reference
