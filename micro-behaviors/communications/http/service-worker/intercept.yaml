defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: protocol-downgrade
    desc: 'Service Worker forces protocol synchronization'
    crit: suspicious
    if:
      type: text
      regex: '\.protocol\s*=\s*self\.location\.protocol'
  - id: cache-busting
    desc: Service Worker implements aggressive cache busting
    crit: notable
    if:
      type: text
      substr: "cache-bust="
composite_rules:
  - id: intercept-all
    desc: Service Worker intercepts requests and claims clients immediately
    crit: notable
    all:
      - id: micro-behaviors/communications/http/service-worker::event-fetch
      - id: micro-behaviors/communications/http/service-worker::control-claim
      - id: micro-behaviors/communications/http/service-worker::api-respond-with
