defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - html
traits:
  - id: api-register
    desc: Registers a Service Worker
    crit: notable
    if:
      type: text
      regex: navigator\.serviceWorker\.register
  - id: event-install
    desc: Service Worker install event listener
    crit: notable
    if:
      type: text
      regex: addEventListener\s*\(\s*["']install["']
  - id: event-activate
    desc: Service Worker activate event listener
    crit: notable
    if:
      type: text
      regex: addEventListener\s*\(\s*["']activate["']
  - id: event-fetch
    desc: 'Service Worker fetch event listener'
    crit: notable
    if:
      type: text
      regex: addEventListener\s*\(\s*["']fetch["']
  - id: control-claim
    desc: Service Worker claims clients immediately
    crit: notable
    if:
      type: text
      regex: clients\.claim\s*\(\)
  - id: control-skip-waiting
    desc: Service Worker skips waiting phase
    crit: notable
    if:
      type: text
      regex: skipWaiting\s*\(\)
  - id: api-respond-with
    desc: respondWith method call
    crit: component
    if:
      type: text
      regex: \.respondWith\s*\(
  - id: push-subscribe
    desc: Browser Push API subscribe
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.pushManager\.subscribe\s*\('
  - id: push-get-subscription
    desc: Browser Push API subscription read
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.pushManager\.getSubscription\s*\('
  - id: notification-request-permission
    desc: Browser notification permission prompt
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.Notification\.requestPermission\s*\('
