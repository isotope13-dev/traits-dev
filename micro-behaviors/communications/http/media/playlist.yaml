defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.9
  mbc: C0002

traits:
  - id: m3u8-playlist-url-extraction
    desc: Extracts HLS playlist URLs
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?is)\bre\.\s*(findall|search)\s*\([^\n]{0,260}\\?\.m3u8'

  - id: stream-token-placeholder-replacement
    desc: Replaces tokens in media URLs
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\.replace\s*\(\s*["'']__TOKEN(PG)?__["'']'
