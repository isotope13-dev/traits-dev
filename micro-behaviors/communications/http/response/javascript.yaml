defaults:
  for: [javascript, typescript]
  mbc: "C0002"
traits:
  - id: http-response-data-eval
    desc: Evaluates HTTP response data directly
    crit: suspicious
    conf: 0.85
    attack: "T1059.007"
    if:
      type: raw
      regex: 'eval\s*\(\s*(res(ponse)?|data)\s*(\.[a-zA-Z0-9_]+){0,2}\s*\)'
  - id: axios-response-data-access
    desc: Accesses axios response data payload
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '\b(res|response|req)\.data\b'
