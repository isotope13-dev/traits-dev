defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: "C0002"
traits:
  - id: http-response-data-eval
    desc: Evaluates HTTP response data directly
    crit: suspicious
    conf: 0.85
    attack: "T1059.007"
    if:
      type: text
      regex: 'eval\s*\(\s*(res(ponse)?|data)\s*(\.[a-zA-Z0-9_]+){0,2}\s*\)'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/web-frameworks/
      - type: text
        substr: "setSettingsHtml"
      - type: text
        substr: "settingsJs"
  - id: response-data-property-access
    desc: response.data property access
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(res|response|req)\.data\b'
  - id: axios-client-reference
    desc: Axios client reference
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\baxios\.|\bfrom\s+["'']axios["'']|\brequire\(["'']axios["'']\)'
composite_rules:
  - id: axios-response-data-access
    desc: Accesses Axios response data payload
    crit: notable
    conf: 0.8
    all:
      - id: response-data-property-access
      - id: axios-client-reference
    unless:
      - id: metadata/package/tooling/
      - id: metadata/package/tooling/
      - id: metadata/package/tooling/
