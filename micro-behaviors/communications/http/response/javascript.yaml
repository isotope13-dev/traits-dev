defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  mbc: "C0002"
traits:
  - id: http-response-data-eval
    desc: Evaluates HTTP response data directly
    crit: suspicious
    conf: 0.85
    attack: "T1059.007"
    if:
      type: text
      regex: 'eval\s*\(\s*(res(ponse)?|data)\s*(\.[a-zA-Z0-9_]+){0,2}\s*\)'
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: axios-response-data-access
    desc: Accesses axios response data payload
    crit: notable
    conf: 0.7
    count_min: 2
    unless:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
    if:
      type: text
      regex: '\b(res|response|req)\.data\b'
