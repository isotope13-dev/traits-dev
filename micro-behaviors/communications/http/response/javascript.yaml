defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: "C0002"
traits:
  - id: http-response-data-eval
    desc: Evaluates an HTTP response body field directly
    crit: suspicious
    conf: 0.85
    attack: "T1059.007"
    if:
      type: text
      regex: 'eval\s*\(\s*(responseText|res(ponse)?\.(data|responseText)|data\.response)\b'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/web-frameworks/
      - id: well-known/lib/pyodide/
      - id: well-known/app/civicrm/
      - id: well-known/tool/offensive/projectdiscovery::nuclei-template-artifact
      - type: text
        substr: "setSettingsHtml"
      - type: text
        substr: "settingsJs"
  - id: response-data-property-access
    desc: Reads a response body from response.data
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(res|response|req)\.data\b'
  - id: axios-client-reference
    desc: References the Axios HTTP client
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\baxios\.|\bfrom\s+["'']axios["'']|\brequire\(["'']axios["'']\)'
composite_rules:
  - id: axios-response-data-access
    desc: Reads an Axios response body from response.data
    crit: notable
    conf: 0.8
    all:
      - id: response-data-property-access
      - id: axios-client-reference
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
