defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: C0002
  crit: notable
  conf: 0.85
traits:
  - id: php-http-response-code-404
    desc: Sets HTTP 404 response code
    if:
      type: tree-sitter
      kind: call
      regex: http_response_code\s*\(\s*404
  - id: php-http-response-code-403
    desc: Sets HTTP 403 response code
    if:
      type: tree-sitter
      kind: call
      regex: http_response_code\s*\(\s*403
