defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: C0002
  crit: notable
  conf: 0.85
traits:
  - id: php-location-redirect
    desc: Sends HTTP Location redirect
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)header\s*\(\s*["'']Location:\s*https?://'
  - id: php-http-response-code-404
    desc: Sets HTTP 404 response code
    if:
      type: text
      regex: http_response_code\s*\(\s*404
  - id: php-http-response-code-403
    desc: Sets HTTP 403 response code
    if:
      type: text
      regex: http_response_code\s*\(\s*403
