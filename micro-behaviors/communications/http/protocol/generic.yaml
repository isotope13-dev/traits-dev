defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
    - windows
  for:
    - shell
    - python
    - javascript
    - powershell
  crit: baseline
  conf: 0.9
traits:
  - id: http-prefix
    desc: HTTP protocol prefix
    if:
      type: string_value
      regex: ^http://
      case_insensitive: true
  - id: https-prefix
    desc: HTTPS protocol prefix
    if:
      type: string_value
      regex: ^https://
      case_insensitive: true
  - id: http-1-0-header
    desc: HTTP/1.0 protocol version
    if:
      type: string_value
      substr: HTTP/1.0
  - id: http-1-1-header
    desc: HTTP/1.1 protocol version
    if:
      type: string_value
      substr: HTTP/1.1
  - id: http-2-0-header
    desc: HTTP/2.0 protocol version
    if:
      type: string_value
      substr: HTTP/2.0
  - id: http-url-literal
    desc: HTTP URL string literal
    crit: baseline
    conf: 0.75
    if:
      type: string_value
      regex: (?i)https?://[\\w.-]+/[\\w./?&=%:#@~+,;\\-]{1,200}
    not:
      - substr: www.w3.org
      - substr: purl.org
      - substr: ns.adobe.com
      - substr: apple.com/DTDs
      - substr: xmlns
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/signed/issuer::apple
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/quality/versioning::pe-version-resource
  - id: http-ip-url-raw
    desc: Raw HTTP URL with IP address (shell)
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: https?://[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}/
      is: external_ip
    unless:
      - type: raw
        regex: pytest|def test_
  - id: itms-services-manifest
    desc: iOS itms-services manifest URL
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: itms-services://?action=download-manifest&url=
