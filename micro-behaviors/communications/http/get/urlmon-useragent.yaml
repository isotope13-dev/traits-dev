defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: urlmon-user-agent-option
    desc: URLMON User-Agent option constant
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: URLMON_OPTION_USERAGENT
  - id: urlmk-get-session-option
    desc: UrlMkGetSessionOption API name
    crit: notable
    conf: 0.9
    if:
      type: text
      word: UrlMkGetSessionOption
