defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 0.7
  for: [binaries]
traits:
  - id: get
    desc: HTTP GET method
    if:
      type: text
      regex: \bGET\s+\S+\s+HTTP/1\.[01]\b
      case_insensitive: false
  - id: javascript-get-method-text
    desc: GET method field in request config
    crit: notable
    conf: 0.72
    for: [javascript, typescript]
    if:
      type: text
      regex: "method\\s*:\\s*['\\\"]GET['\\\"]"
    unless:
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime/
