# WinInet HTTP Client
# Low-level Windows networking capabilities
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  - id: internet-open-str
    desc: InternetOpen API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "^InternetOpen[AW]$"
  - id: internet-open
    desc: Initialize WinInet session
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^InternetOpen[AW]$"
  - id: internet-connect-str
    desc: InternetConnect API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "^InternetConnect[AW]$"
  - id: wininet-dll-import-name
    desc: WinInet DLL import name
    crit: notable
    conf: 0.72
    if:
      type: text
      exact: WININET.dll
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/vendor::is-microsoft-named
  - id: internet-connect
    desc: Connect to HTTP/FTP server via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^InternetConnect[AW]$"
  - id: http-open-request-str
    desc: HttpOpenRequest API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "^HttpOpenRequest[AW]$"
  - id: http-open-request
    desc: Open HTTP request via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^HttpOpenRequest[AW]$"
  - id: internet-open-url
    desc: Open URL via WinInet
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "^InternetOpenUrl[AW]$"
  - id: internet-check-connection
    desc: Check internet connectivity state
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "^InternetCheckConnection[AW]$"
  - id: http-query-info
    desc: Query HTTP response metadata
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: "HttpQueryInfoW"
  - id: http-query-info-str
    desc: HttpQueryInfo API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "^HttpQueryInfo[AW]$"
  - id: internet-read-file
    desc: Read data from internet handle
    crit: notable
    conf: 0.95
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      exact: "InternetReadFile"
  - id: internet-read-file-str
    desc: InternetReadFile API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: InternetReadFile
  - id: delete-url-cache-entry
    desc: Delete WinInet URL cache entry
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "^DeleteUrlCacheEntry[AW]$"
  - id: find-first-url-cache-entry
    desc: Begin WinInet URL cache enumeration
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "^FindFirstUrlCacheEntry[AW]$"
  - id: find-next-url-cache-entry
    desc: Continue WinInet URL cache enumeration
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "^FindNextUrlCacheEntry[AW]$"
  - id: http-send-request
    desc: Send HTTP request via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^HttpSendRequest[AW]$"
  - id: http-send-request-str
    desc: HttpSendRequest API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "^HttpSendRequest[AW]$"
  - id: internet-close-handle-str
    desc: InternetCloseHandle API name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: InternetCloseHandle
  - id: internet-set-option
    desc: Adjust WinInet session or request options
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "^InternetSetOption[AW]$"
  - id: internet-set-option-str
    desc: InternetSetOption API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "^InternetSetOption[AW]$"
  - id: obtain-user-agent-str
    desc: ObtainUserAgentString API name
    crit: component
    conf: 0.85
    if:
      type: text
      exact: ObtainUserAgentString
composite_rules:
  - id: wininet-dynamic-load
    desc: WinInet APIs resolved dynamically
    crit: suspicious
    conf: 0.9
    attack: T1027
    all:
      - id: internet-open-str
    any:
      - id: http-send-request-str
      - id: http-open-request-str
      - id: internet-connect-str
      - id: internet-read-file
      - id: internet-read-file-str
      - id: internet-close-handle-str
      - id: http-query-info-str
      - id: internet-set-option-str
      - id: obtain-user-agent-str
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: well-known/app/microsoft-csharp-compiler::microsoft-csharp-compiler-bundle
        - id: metadata/package/versioning::pe-companyname-field
  - id: wininet-http-request-strings
    desc: WinInet HTTP request APIs as strings
    crit: notable
    conf: 0.9
    all:
      - id: wininet-dll-import-name
      - id: http-open-request-str
      - id: http-send-request-str
    any:
      - id: http-query-info-str
      - id: internet-read-file-str
      - id: internet-connect-str
      - id: internet-close-handle-str
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics/structural::many-imports
  - id: wininet-http-flow
    desc: WinInet request and response workflow
    crit: notable
    conf: 0.9
    all:
      - id: internet-open
    any:
      - id: http-open-request
      - id: internet-open-url
      - id: internet-connect
      - id: http-send-request
      - id: internet-read-file
      - id: http-query-info
    needs: 2
  - id: wininet-cache-cleanup-after-fetch
    desc: WinInet download with cache cleanup
    crit: notable
    conf: 0.92
    all:
      - id: delete-url-cache-entry
    any:
      - id: internet-open-url
      - id: internet-read-file
  - id: url-cache-enumeration
    desc: WinInet URL cache enumeration workflow
    crit: notable
    conf: 0.91
    all:
      - id: find-first-url-cache-entry
      - id: find-next-url-cache-entry
