# WinInet HTTP Client
# Low-level Windows networking capabilities
defaults:
  for: [pe]
  platforms: ["windows"]
traits:
  - id: internet-open
    desc: Initialize WinInet session
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^InternetOpen[AW]$"
  - id: internet-open-import-name
    desc: InternetOpen import name string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: "InternetOpenW"
  - id: internet-connect
    desc: Connect to HTTP/FTP server via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^InternetConnect[AW]$"
  - id: internet-connect-import-name
    desc: InternetConnect import name string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: "InternetConnectW"
  - id: http-open-request
    desc: Open HTTP request via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^HttpOpenRequest[AW]$"
  - id: http-open-request-import-name
    desc: HttpOpenRequest import name string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: "HttpOpenRequestW"
  - id: internet-open-url
    desc: Open URL via WinInet
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "^InternetOpenUrl[AW]$"
  - id: internet-check-connection
    desc: Check internet connectivity state
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: "^InternetCheckConnection[AW]$"
  - id: http-query-info
    desc: Query HTTP response metadata
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: "HttpQueryInfoW"
  - id: internet-read-file
    desc: Read data from internet handle
    crit: notable
    conf: 0.95
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      exact: "InternetReadFile"
  - id: internet-read-file-import-name
    desc: InternetReadFile import name string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: "InternetReadFile"
  - id: http-send-request
    desc: Send HTTP request via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^HttpSendRequest[AW]$"
  - id: http-send-request-import-name
    desc: HttpSendRequest import name string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: "HttpSendRequestW"
composite_rules:
  - id: wininet-http-flow
    desc: WinInet request and response workflow
    crit: notable
    conf: 0.9
    all:
      - id: internet-open
    any:
      - id: http-open-request
      - id: internet-open-url
      - id: internet-connect
      - id: http-send-request
      - id: internet-read-file
      - id: http-query-info
    needs: 2

  - id: wininet-http-flow-import-strings
    desc: WinInet request flow import-name cluster
    crit: notable
    conf: 0.93
    all:
      - id: internet-open-import-name
    any:
      - id: internet-connect-import-name
      - id: http-open-request-import-name
      - id: http-send-request-import-name
      - id: internet-read-file-import-name
    needs: 3
