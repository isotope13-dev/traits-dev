# WinInet HTTP Client
# Low-level Windows networking capabilities
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  - id: internet-open
    desc: Initialize WinInet session
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^InternetOpen[AW]$"
  - id: internet-connect
    desc: Connect to HTTP/FTP server via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^InternetConnect[AW]$"
  - id: http-open-request
    desc: Open HTTP request via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^HttpOpenRequest[AW]$"
  - id: internet-open-url
    desc: Open URL via WinInet
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "^InternetOpenUrl[AW]$"
  - id: internet-check-connection
    desc: Check internet connectivity state
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: "^InternetCheckConnection[AW]$"
  - id: http-query-info
    desc: Query HTTP response metadata
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: "HttpQueryInfoW"
  - id: internet-read-file
    desc: Read data from internet handle
    crit: notable
    conf: 0.95
    mbc: C0002
    attack: T1071.001
    if:
      type: symbol
      exact: "InternetReadFile"
  - id: http-send-request
    desc: Send HTTP request via WinInet
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: "^HttpSendRequest[AW]$"
composite_rules:
  - id: wininet-http-flow
    desc: WinInet request and response workflow
    crit: notable
    conf: 0.9
    all:
      - id: internet-open
    any:
      - id: http-open-request
      - id: internet-open-url
      - id: internet-connect
      - id: http-send-request
      - id: internet-read-file
      - id: http-query-info
    needs: 2
