defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1071.001
traits:
  - id: urlmon-dll-reference
    desc: urlmon library reference
    crit: notable
    conf: 0.8
    if:
      type: text
      word: urlmon.dll
  - id: url-download-to-file-str
    desc: URLDownloadToFile API name as string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: URLDownloadToFile[AW]?
  - id: register-bind-status-callback
    desc: Register urlmon async download progress callback
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: RegisterBindStatusCallback
  - id: url-download-to-cache-str
    desc: URLDownloadToCacheFile API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: URLDownloadToCacheFile[AW]?
  - id: url-open-blocking-stream-str
    desc: URLOpenBlockingStream API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: URLOpenBlockingStream[AW]?
  - id: url-open-stream-str
    desc: URLOpenStream API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: URLOpenStream[AW]?
composite_rules:
  - id: urlmon-dynamic-load
    desc: urlmon download APIs resolved dynamically
    crit: notable
    conf: 0.9
    attack: T1027
    all:
      - id: url-download-to-file-str
    any:
      - id: url-download-to-cache-str
      - id: url-open-blocking-stream-str
      - id: url-open-stream-str
    downgrade:
      any:
        - type: metrics
          field: binary.export_count
          min: 256
  - id: urlmon-library-loader
    desc: urlmon loaded before download
    crit: notable
    conf: 0.9
    attack: T1027
    all:
      - id: urlmon-dll-reference
      - id: urlmon-dynamic-load
      - id: micro-behaviors/dylib/load/
