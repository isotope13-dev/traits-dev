defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1071.001
traits:
- id: urlmon-dll-reference
  desc: References the Windows URLMon library
  crit: component
  conf: 0.8
  if:
    type: text
    word: urlmon.dll
- id: url-download-to-file-str
  desc: URLDownloadToFile API name as string
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: URLDownloadToFile[AW]?
  unless:
  - type: basename
    exact: urlmon.dll
- id: url-download-to-file-import
  desc: Imports the URLMon file-download API
  crit: notable
  conf: 0.95
  if:
    type: import
    regex: '^URLDownloadToFile[AW]?$'
- id: register-bind-status-callback
  desc: "Register urlmon async dl progress callback"
  crit: notable
  conf: 0.8
  if:
    type: symbol
    exact: RegisterBindStatusCallback
- id: url-download-to-cache-str
  desc: URLDownloadToCacheFile API name as string
  crit: component
  conf: 0.9
  if:
    type: text
    regex: URLDownloadToCacheFile[AW]?
- id: url-open-blocking-stream-str
  desc: URLOpenBlockingStream API name as string
  crit: component
  conf: 0.9
  if:
    type: text
    regex: URLOpenBlockingStream[AW]?
- id: url-open-stream-str
  desc: URLOpenStream API name as string
  crit: component
  conf: 0.9
  if:
    type: text
    regex: URLOpenStream[AW]?
- id: url-open-stream-import
  desc: Imports the URLOpenStream download API
  crit: notable
  conf: 0.95
  if:
    type: import
    regex: '^URLOpenStream[AW]?$'
- id: urlmon-dynamic-load-cond-0--inline-19271
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: exports.count
    min: 256
  count_max: 1019272
composite_rules:
- id: url-download-to-file
  desc: Uses URLMon to download a URL to a local file
  crit: notable
  conf: 0.95
  any:
  - id: url-download-to-file-str
  - id: url-download-to-file-import
- id: urlmon-dynamic-load
  desc: Resolves URLMon download APIs dynamically
  crit: notable
  conf: 0.9
  attack: T1027
  all:
  - id: url-download-to-file
  any:
  - id: url-download-to-cache-str
  - id: url-open-blocking-stream-str
  - id: url-open-stream-str
  downgrade:
    any:
    - id: urlmon-dynamic-load-cond-0--inline-19271
- id: urlmon-library-loader
  desc: Loads URLMon before invoking a download API
  crit: notable
  conf: 0.9
  attack: T1027
  all:
  - id: urlmon-dll-reference
  - id: urlmon-dynamic-load
  - id: micro-behaviors/dylib/load/
