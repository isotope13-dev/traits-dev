# Axios HTTP GET
defaults:
  for: [javascript, typescript]
  platforms: [unix, windows]
  crit: notable
  attack: T1071.001
traits:
  - id: axios-get-call
    desc: axios.get() HTTP GET request
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: axios.get
  - id: axios-require-get-call
    desc: require('axios').get HTTP GET request
    conf: 0.82
    if:
      type: text
      regex: 'require\(["'']axios["'']\)\.get\s*\('
    unless:
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
