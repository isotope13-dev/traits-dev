defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1105
  mbc: E1105
traits:
  - id: url-open-blocking-stream-import
    desc: URLMon blocking stream download
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: URLOpenBlockingStreamW
  - id: yandex-pack-download-base
    desc: Yandex pack download URL
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: http://downloader.yandex.net/yandex-pack/
  - id: yandex-click-request-line
    desc: Yandex click request line
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'GET /click/dtype=stred/pid=12/cid=72435/path=%s/* HTTP/1.1'
  - id: yandex-click-host-header
    desc: Yandex click host header
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: 'Host: clck.yandex.ru'
  - id: setup-downloader-cli
    desc: Installer downloader CLI banner
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: 'For using type: downloader.exe --partner <name> [--distr <params>] [--try] <download try count> [--sync]'
  - id: installer-download-start
    desc: Installer download start string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'Downloading installer: %s'
  - id: installer-download-result
    desc: Installer download result string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'Download HRESULT: 0x%08X'
  - id: installer-download-complete
    desc: Installer download completion string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'File downloading complete %s, size: %d'
composite_rules:
  - id: branded-urlmon-downloader
    desc: Branded URLMon installer downloader
    crit: suspicious
    conf: 0.95
    all:
      - id: url-open-blocking-stream-import
    any:
      - id: yandex-pack-download-base
      - id: yandex-click-host-header
      - id: setup-downloader-cli
      - id: installer-download-start
      - id: installer-download-result
      - id: installer-download-complete
  - id: yandex-click-download-template
    desc: Yandex click tracking download
    crit: suspicious
    conf: 0.96
    all:
      - id: yandex-click-request-line
      - id: yandex-click-host-header
    any:
      - id: micro-behaviors/communications/http/user-agent::curl-ua
      - id: micro-behaviors/communications/http/headers::ua-curl
