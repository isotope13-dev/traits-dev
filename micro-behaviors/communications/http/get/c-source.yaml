defaults:
  platforms:
    - unix
    - android
  for:
    - c
traits:
  - id: manual-http10-get
    desc: manual HTTP/1.0 GET request
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: GET /%s HTTP/1\.0
  - id: manual-http10-dynamic-get
    desc: Manual dynamic HTTP/1.0 GET
    crit: notable
    conf: 0.9
    for: [c, cpp, elf]
    if:
      type: text
      regex: 'GET /%[A-Za-z]{1,3} HTTP/1\.0'
  - id: argv-download-destination
    desc: writes download to argv path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: fopen\s*\(\s*argv\s*\[\s*2\s*\]\s*,\s*"wb"\s*\)
  - id: get-help-download
    desc: GET command downloads file
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: GET <http address> <save as>
composite_rules:
  - id: manual-download-to-file
    desc: downloads HTTP resource to file
    crit: suspicious
    conf: 0.96
    all:
      - id: manual-http10-get
      - id: argv-download-destination
