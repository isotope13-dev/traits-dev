# WinINet P/Invoke declarations in C# source code
defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: internet-open-pinvoke
    desc: InternetOpen P/Invoke declaration
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'extern\s+\w+\s+\w*InternetOpen\s*\('
  - id: internet-connect-pinvoke
    desc: InternetConnect P/Invoke declaration
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'extern\s+\w+\s+\w*InternetConnect\s*\('
  - id: http-send-request-pinvoke
    desc: HttpSendRequest P/Invoke declaration
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'extern\s+\w+\s+\w*HttpSendRequest\s*\('
  - id: internet-read-file-pinvoke
    desc: InternetReadFile P/Invoke declaration
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'extern\s+\w+\s+\w*InternetReadFile\s*\('
  - id: wininet-dllimport
    desc: DllImport for wininet.dll
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'DllImport\s*\(\s*"wininet"'
composite_rules:
  - id: wininet-http-flow-source
    desc: WinINet HTTP request flow in C# source
    crit: suspicious
    conf: 0.92
    all:
      - id: wininet-dllimport
    any:
      - id: internet-open-pinvoke
      - id: internet-connect-pinvoke
      - id: http-send-request-pinvoke
      - id: internet-read-file-pinvoke
    needs: 2
