defaults:
  platforms:
    - windows
  attack: T1071.001
  for:
    - pe
    - dll
traits:
  - id: dynamic-wininet-api-set
    desc: InternetOpenUrl downloader API string
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: (InternetOpenUrlA|hWinETS)
    unless:
      - id: metadata/signed/platform::microsoft
  - id: wininet-library-stackstring
    desc: Stack-built WinInet library reference
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: wininet.
      section: .text
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
        - id: well-known/app/internet-explorer::internet-explorer-frame-component
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
      - id: well-known/app/internet-explorer::internet-explorer-frame-component
