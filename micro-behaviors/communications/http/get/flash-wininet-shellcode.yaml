defaults:
  platforms:
  - windows
  attack: T1071.001
  for:
  - pe
  - dll
traits:
- id: wininet-library-stackstring
  desc: Stack-built WinInet library reference
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: wininet.
    section: .text
  downgrade:
    any:
    - id: metadata/binary/vendor/
    - id: metadata/binary/vendor/
    - id: well-known/app/internet-explorer/
  unless:
  - id: metadata/binary/framework/
  - id: metadata/binary/vendor/
  - id: metadata/binary/vendor/
  - id: well-known/app/internet-explorer/
- id: dynamic-wininet-api-set--internetopenurla
  desc: InternetOpenUrl downloader (InternetOpenUrlA)
  crit: notable
  conf: 0.95
  if:
    type: text
    word: InternetOpenUrlA
- id: dynamic-wininet-api-set--hwinets
  desc: InternetOpenUrl downloader API string (hWinETS)
  crit: notable
  conf: 0.95
  if:
    type: text
    word: hWinETS
composite_rules:
- id: dynamic-wininet-api-set
  desc: InternetOpenUrl downloader API string
  crit: notable
  conf: 0.95
  unless:
  - id: metadata/signed/platform/
  any:
  - id: dynamic-wininet-api-set--internetopenurla
  - id: dynamic-wininet-api-set--hwinets
