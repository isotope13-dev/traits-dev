defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1071.001"
  for: [shell, python, javascript, powershell, pe, elf]

traits:
  - id: dynamic-wininet-api-set
    desc: InternetOpenUrl downloader API string
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: "(InternetOpenUrlA|hWinETS)"

  - id: korean-jpg-c2
    desc: Korean JPG masquerade download URLs
    crit: suspicious
    conf: 0.98
    if:
      type: string
      substr: "1588-2040.co.kr/conf/product"

  - id: wininet-library-stackstring
    desc: Stack-built WinInet library reference
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "wininet."

  - id: masquerade-user-agent
    desc: MyAgent user-agent masquerade string
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "fontdrvhost.MyAg"

  - id: kernel32-resolver
    desc: Kernel32 DLL resolution string
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "kernel32.dll"

  - id: virtualprotect-api
    desc: VirtualProtect shellcode API string
    crit: suspicious
    conf: 0.92
    if:
      type: string
      substr: "virtualprotect"

  - id: createprocessa-api
    desc: CreateProcessA shellcode API string
    crit: suspicious
    conf: 0.92
    if:
      type: string
      substr: "createprocessa"
