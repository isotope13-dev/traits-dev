defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1071.001
traits:
  - id: internet-open-str
    desc: InternetOpen API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: InternetOpenA
  - id: internet-connect-str
    desc: InternetConnect API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: InternetConnectA
  - id: internet-attempt-connect-str
    desc: InternetAttemptConnect API name
    crit: component
    conf: 0.88
    if:
      type: text
      exact: InternetAttemptConnect
  - id: http-open-request-str
    desc: HttpOpenRequest API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: HttpOpenRequestA
  - id: http-send-request-str
    desc: HttpSendRequest API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: HttpSendRequestA
  - id: http-add-request-headers-str
    desc: HttpAddRequestHeaders API name
    crit: component
    conf: 0.88
    if:
      type: text
      exact: HttpAddRequestHeadersA
  - id: internet-close-handle-str
    desc: InternetCloseHandle API name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: InternetCloseHandle
  - id: internet-write-file-str
    desc: InternetWriteFile API name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: InternetWriteFile
  - id: http-query-info-str
    desc: HttpQueryInfo API name as string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: HttpQueryInfoA
  - id: http-send-request-ex-str
    desc: HttpSendRequestEx API name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: HttpSendRequestExA
  - id: http-end-request-str
    desc: HttpEndRequest API name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: HttpEndRequestA
  - id: internet-set-option-str
    desc: InternetSetOption API name
    crit: component
    conf: 0.88
    if:
      type: text
      exact: InternetSetOptionW
  - id: internet-set-option-a-str
    desc: InternetSetOptionA API name
    crit: component
    conf: 0.88
    if:
      type: text
      exact: InternetSetOptionA
  - id: internet-query-option-a-str
    desc: InternetQueryOptionA API name
    crit: component
    conf: 0.88
    if:
      type: text
      exact: InternetQueryOptionA
  - id: obtain-user-agent-str
    desc: ObtainUserAgentString API name
    crit: component
    conf: 0.85
    if:
      type: text
      exact: ObtainUserAgentString
  - id: no-cache-header-string
    desc: Cache-Control no-cache header
    crit: component
    conf: 0.86
    if:
      type: text
      exact: 'Cache-Control: no-cache'
composite_rules:
  - id: wininet-connect-sendex-pair
    desc: WinInet connect and sendex strings
    crit: notable
    conf: 0.9
    all:
      - id: internet-connect-str
      - id: http-send-request-ex-str
  - id: ansi-wininet-session-stack
    desc: ANSI WinInet session stack in strings
    crit: notable
    conf: 0.94
    all:
      - id: internet-open-str
    any:
      - id: internet-connect-str
      - id: internet-attempt-connect-str
      - id: http-open-request-str
      - id: http-send-request-str
      - id: http-send-request-ex-str
      - id: http-end-request-str
      - id: internet-write-file-str
      - id: internet-close-handle-str
      - id: http-query-info-str
    needs: 4
  - id: wininet-dynamic-load
    desc: WinInet APIs resolved dynamically
    crit: suspicious
    conf: 0.9
    attack: T1027
    all:
      - id: internet-open-str
    any:
      - id: http-send-request-str
      - id: http-send-request-ex-str
      - id: http-end-request-str
      - id: http-open-request-str
      - id: internet-connect-str
      - id: internet-write-file-str
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: internet-close-handle-str
      - id: http-query-info-str
      - id: internet-set-option-str
      - id: internet-set-option-a-str
      - id: internet-query-option-a-str
      - id: obtain-user-agent-str
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
  - id: dynamic-wininet-post-client
    desc: Dynamic WinInet POST client stack
    crit: notable
    conf: 0.92
    all:
      - id: ansi-wininet-session-stack
    any:
      - id: http-send-request-ex-str
      - id: http-end-request-str
      - id: internet-set-option-str
      - id: internet-set-option-a-str
      - id: internet-query-option-a-str
      - id: http-add-request-headers-str
      - id: internet-write-file-str
      - id: obtain-user-agent-str
      - id: micro-behaviors/communications/http/post::post-string-pe
      - id: no-cache-header-string
    needs: 2
