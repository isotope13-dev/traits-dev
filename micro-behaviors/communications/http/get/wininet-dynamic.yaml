defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1071.001
traits:
  - id: internet-open-str
    desc: InternetOpen API name as string
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: InternetOpenA
  - id: internet-connect-str
    desc: InternetConnect API name as string
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: InternetConnectA
  - id: http-open-request-str
    desc: HttpOpenRequest API name as string
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: HttpOpenRequestA
  - id: http-send-request-str
    desc: HttpSendRequest API name as string
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: HttpSendRequestA
  - id: internet-close-handle-str
    desc: InternetCloseHandle API name
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: InternetCloseHandle
  - id: http-query-info-str
    desc: HttpQueryInfo API name as string
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: HttpQueryInfoA
  - id: http-send-request-ex-str
    desc: HttpSendRequestEx API name
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: HttpSendRequestExA
  - id: http-end-request-str
    desc: HttpEndRequest API name
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: HttpEndRequestA
  - id: internet-set-option-str
    desc: InternetSetOption API name
    crit: component
    conf: 0.88
    if:
      type: string_value
      exact: InternetSetOptionW
  - id: obtain-user-agent-str
    desc: ObtainUserAgentString API name
    crit: component
    conf: 0.85
    if:
      type: string_value
      exact: ObtainUserAgentString
  - id: no-cache-header-string
    desc: Cache-Control no-cache header
    crit: component
    conf: 0.86
    if:
      type: string_value
      exact: 'Cache-Control: no-cache'
composite_rules:
  - id: wininet-dynamic-load
    desc: WinInet APIs resolved dynamically
    crit: suspicious
    conf: 0.9
    attack: T1027
    all:
      - id: internet-open-str
    any:
      - id: http-send-request-str
      - id: http-send-request-ex-str
      - id: http-end-request-str
      - id: http-open-request-str
      - id: internet-connect-str
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: internet-close-handle-str
      - id: http-query-info-str
      - id: internet-set-option-str
      - id: obtain-user-agent-str
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
  - id: dynamic-wininet-post-client
    desc: Dynamic WinInet POST client stack
    crit: notable
    conf: 0.92
    all:
      - id: wininet-dynamic-load
    any:
      - id: http-send-request-ex-str
      - id: http-end-request-str
      - id: internet-set-option-str
      - id: obtain-user-agent-str
      - id: micro-behaviors/communications/http/post::post-string-pe
      - id: no-cache-header-string
    needs: 2
