defaults:
  platforms: [unix, windows]
  for: [go]
  crit: baseline
  conf: 0.86
traits:
  - id: go-byte-slice-make
    desc: Go byte slice allocation
    if:
      type: text
      regex: 'make\s*\(\s*\[\s*\]\s*byte\s*,'
  - id: go-global-byte-slice
    desc: Go global byte slice
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?m)^\s*var\s+[A-Za-z_][A-Za-z0-9_]*\s+\[\s*\]\s*byte\b'
