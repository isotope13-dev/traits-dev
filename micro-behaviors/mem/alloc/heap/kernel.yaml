defaults:
  platforms: [linux]
  for: [elf, c, cpp]
  crit: baseline
  conf: 0.9

traits:
  - id: kernel-heap-alloc-zeroed
    desc: Linux kernel zero-initialized heap allocation
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: kzalloc
  - id: kernel-heap-free
    desc: Linux kernel heap memory deallocation
    crit: baseline
    if:
      type: symbol
      kind: call
      exact: kfree
    # UML drivers are compiled as user-space programs and use the kernel-tree
    # `um_malloc.h` compatibility allocator; their kfree symbol is not the
    # Linux kernel heap primitive.
    unless:
      - type: path
        regex: '(^|[\\/])arch[\\/]um[\\/]'
      - type: text
        substr: 'um_malloc.h'
