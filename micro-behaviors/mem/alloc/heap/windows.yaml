# Memory Allocation (Windows)
# Standard heap and local memory allocation APIs

defaults:
  for: [pe, dll]
  crit: baseline
  conf: 0.9

traits:
  - id: heap-alloc
    desc: Heap memory allocation
    if:
      type: symbol
      exact: "HeapAlloc"

  - id: heap-realloc
    desc: Heap memory reallocation
    if:
      type: symbol
      exact: "HeapReAlloc"

  - id: heap-free
    desc: Heap memory deallocation
    if:
      type: symbol
      exact: "HeapFree"

  - id: get-process-heap
    desc: Get process heap handle
    if:
      type: symbol
      exact: "GetProcessHeap"

  - id: local-alloc
    desc: Local memory allocation
    if:
      type: symbol
      exact: "LocalAlloc"

  - id: local-realloc
    desc: Local memory reallocation
    if:
      type: symbol
      exact: "LocalReAlloc"

  - id: local-free
    desc: Local memory deallocation
    if:
      type: symbol
      exact: "LocalFree"
