# Memory Allocation (Windows)
# Standard heap and local memory allocation APIs
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.9
traits:
  - id: heap-alloc
    desc: Heap memory allocation
    if:
      type: symbol
      exact: "HeapAlloc"
  - id: heap-create
    desc: Create private heap (HeapCreate)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "HeapCreate"
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports-50
        - id: metadata/binary/framework::dotnet-metadata
        - id: metadata/signed/platform::microsoft
  - id: heap-create-enable-execute-flag
    desc: HEAP_CREATE_ENABLE_EXECUTE flag (0x40000)
    crit: component
    conf: 0.94
    arch: [x86-64]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: B9 00 00 04 00
  - id: heap-realloc
    desc: Heap memory reallocation
    if:
      type: symbol
      exact: "HeapReAlloc"
  - id: heap-free
    desc: Heap memory deallocation
    if:
      type: symbol
      exact: "HeapFree"
  - id: get-process-heap
    desc: Get process heap handle
    if:
      type: symbol
      exact: "GetProcessHeap"
  - id: local-alloc
    desc: Local memory allocation
    if:
      type: symbol
      exact: "LocalAlloc"
  - id: local-realloc
    desc: Local memory reallocation
    if:
      type: symbol
      exact: "LocalReAlloc"
  - id: local-free
    desc: Local memory deallocation
    if:
      type: symbol
      exact: "LocalFree"
