defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]

traits:
  - id: go-alloc-symbol-text
    desc: Go allocation symbol text
    crit: component
    conf: 0.76
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: '(?i)(^|[./])alloc([^A-Za-z0-9_]|$)'

  - id: go-alloc-symbol-bytes
    desc: Go allocation symbol bytes
    crit: component
    conf: 0.76
    platforms: [unix]
    for: [elf, macho]
    if:
      type: raw
      regex: '(?i)(^|[./])alloc([^A-Za-z0-9_]|$)'

composite_rules:
  - id: go-alloc-symbol-binary
    desc: Go allocation symbol binary
    crit: component
    conf: 0.76
    any:
      - id: go-alloc-symbol-text
      - id: go-alloc-symbol-bytes
