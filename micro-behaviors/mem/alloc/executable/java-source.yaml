defaults:
  for: [class, java]
  platforms: [windows]
  attack: T1055

traits:
  - id: page-execute-readwrite-java-ref
    desc: PAGE_EXECUTE_READWRITE flag
    crit: component
    conf: 0.9
    if:
      type: text
      word: PAGE_EXECUTE_READWRITE

  - id: mem-commit-java-ref
    desc: MEM_COMMIT allocation flag
    crit: component
    conf: 0.88
    if:
      type: text
      word: MEM_COMMIT
