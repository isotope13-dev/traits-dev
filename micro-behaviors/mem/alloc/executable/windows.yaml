defaults:
  platforms:
    - windows
traits:
  - id: page-execute-readwrite
    desc: PAGE_EXECUTE_READWRITE flag
    crit: component
    conf: 0.9
    attack: T1055
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: text
      substr: PAGE_EXECUTE_READWRITE
  - id: page-protection-enum
    desc: PAGE protection constant enumeration
    crit: component
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: text
      substr: PAGE_WRITECOPY
  - id: kernel-pool-alloc
    desc: Kernel pool memory allocation
    crit: notable
    conf: 0.9
    attack: T1055
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: symbol
      exact: ExAllocatePoolWithTag
    downgrade:
      any:
        - type: text
          exact: ntoskrnl.exe
  - id: nonpaged-pool
    desc: NonPagedPool kernel memory flag
    crit: notable
    conf: 0.9
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: text
      substr: NonPagedPool
  - id: page-execute-readwrite-push
    desc: Push PAGE_EXECUTE_READWRITE constant
    crit: notable
    conf: 0.7
    attack: T1055
    for:
      - pe
      - dll
    count_min: 2
    size_max: 2097152
    if:
      type: hex
      section: text
      pattern: 6A 40
  - id: safebuffers-directive
    desc: Buffer security check suppression
    crit: notable
    conf: 0.85
    attack: T1562
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: text
      substr: safebuffers
