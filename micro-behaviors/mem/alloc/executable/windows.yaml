defaults:
  platforms:
    - windows
traits:
  - id: page-execute-readwrite
    desc: PAGE_EXECUTE_READWRITE flag
    crit: component
    conf: 0.9
    attack: T1055
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: raw
      substr: PAGE_EXECUTE_READWRITE
  - id: page-protection-enum
    desc: PAGE protection constant enumeration
    crit: component
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: text
      substr: PAGE_WRITECOPY
  - id: kernel-pool-alloc
    desc: Kernel pool memory allocation
    crit: notable
    conf: 0.9
    attack: T1055
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: symbol
      exact: ExAllocatePoolWithTag
    downgrade:
      any:
        - type: text
          exact: ntoskrnl.exe
  - id: nonpaged-pool
    desc: NonPagedPool kernel memory flag
    crit: notable
    conf: 0.9
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: raw
      substr: NonPagedPool
  - id: page-execute-readwrite-push
    desc: Push PAGE_EXECUTE_READWRITE constant
    crit: notable
    conf: 0.7
    attack: T1055
    for:
      - pe
      - dll
    count_min: 2
    size_max: 2097152
    if:
      type: hex
      section: text
      pattern: 6A 40
  - id: page-execute-read-push
    desc: Push PAGE_EXECUTE_READ constant (0x20)
    crit: component
    conf: 0.7
    attack: T1055
    for: [pe, dll]
    size_max: 2097152
    if:
      type: hex
      section: .text
      pattern: 6A 20
  - id: page-readwrite-push
    desc: Push PAGE_READWRITE constant (0x04)
    crit: component
    conf: 0.7
    attack: T1055
    for: [pe, dll]
    size_max: 2097152
    if:
      type: hex
      section: .text
      pattern: 6A 04
  - id: page-execute-readwrite-arg-x64
    desc: Load PAGE_EXECUTE_READWRITE (0x40) into r8d/r9d (x64 ABI)
    crit: component
    conf: 0.7
    attack: T1055
    arch: [x86-64]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 41 (B8|B9) 40 00 00 00
  - id: page-execute-read-arg-x64
    desc: Load PAGE_EXECUTE_READ (0x20) into r8d/r9d
    crit: component
    conf: 0.7
    attack: T1055
    arch: [x86-64]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 41 (B8|B9) 20 00 00 00
  - id: page-readwrite-arg-x64
    desc: Load PAGE_READWRITE (0x04) into r8d/r9d
    crit: component
    conf: 0.7
    attack: T1055
    arch: [x86-64]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 41 (B8|B9) 04 00 00 00
  - id: safebuffers-directive
    desc: Buffer security check suppression
    crit: notable
    conf: 0.85
    attack: T1562
    for:
      - c
      - cpp
      - pe
      - dll
    if:
      type: raw
      substr: safebuffers
