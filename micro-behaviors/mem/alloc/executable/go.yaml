# Executable memory mapping — Go binaries.
# A statically-linked Go program does not import libc mmap; it calls the
# syscall via the runtime, so the program-driven mmap appears in the pclntab
# as `syscall.(*mmapper).Mmap` (the runtime's own mmap is `runtime.sysMmap`,
# which is present in EVERY Go binary and is deliberately NOT matched here).
defaults:
  platforms: [linux, macos, windows]
  for: [go]
traits:
  - id: go-syscall-mmap
    desc: Go program-driven syscall.Mmap (anonymous mapping)
    crit: component
    conf: 0.6
    if:
      type: text
      substr: "(*mmapper).Mmap"
