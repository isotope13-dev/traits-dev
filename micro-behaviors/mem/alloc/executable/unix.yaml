defaults:
  platforms:
    - linux
    - macos
traits:
  - id: mmap-symbol
    desc: mmap memory mapping function
    crit: baseline
    conf: 0.5
    for: [elf, macho, so]
    if:
      type: import
      exact: mmap
  - id: mmap-import
    desc: mmap memory mapping import
    crit: baseline
    conf: 0.85
    for: [elf, macho, so]
    if:
      type: import
      regex: '^_?mmap$'
  - id: prot-exec-const
    desc: PROT_EXEC memory protection constant
    crit: baseline
    conf: 0.6
    for:
      - elf
      - macho
    if:
      type: text
      substr: PROT_EXEC
  # Source-level form of the same capability the mmap-exec composite detects in
  # compiled binaries. Mapping executable memory is what every JIT, dynamic
  # loader and interpreter does (CPython, PHP, the kernel), so this is a neutral
  # capability; dropper/injection composites supply the intent.
  - id: mmap-exec-source
    desc: Source maps memory with execute permission
    crit: notable
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: 'mmap[\s\S]{0,160}PROT_EXEC'
    not:
      - substr: perf trampoline
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
composite_rules:
  - id: mmap-exec
    desc: Memory mapping with execute permission
    crit: notable
    conf: 0.75
    attack: T1055
    for:
      - elf
      - macho
    all:
      - id: prot-exec-const
    any:
      - id: mmap-symbol
      - id: mmap-import
