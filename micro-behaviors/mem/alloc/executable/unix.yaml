defaults:
  platforms:
    - linux
    - macos
traits:
  - id: mmap-symbol
    desc: mmap memory mapping function
    crit: baseline
    conf: 0.5
    for: [elf, macho, so]
    if:
      type: symbol
      exact: mmap
      kind: import
  - id: prot-exec-const
    desc: PROT_EXEC memory protection constant
    crit: baseline
    conf: 0.6
    for:
      - elf
      - macho
    if:
      type: text
      substr: PROT_EXEC
composite_rules:
  - id: mmap-exec
    desc: Memory mapping with execute permission
    crit: suspicious
    conf: 0.75
    attack: T1055
    for:
      - elf
      - macho
    all:
      - id: mmap-symbol
      - id: prot-exec-const
