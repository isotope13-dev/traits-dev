defaults:
  platforms: [unix, windows]
  for: [c, cpp, pe, elf, shell]
traits:
  - id: bios-mem-steal-asm
    desc: BIOS Memory Stealing (Assembly)
    crit: suspicious
    if:
      type: text
      regex: 'mov\s+si,413[^\n]{0,120}\n\s*dec\s+word\s+ptr\s+\[si\]'
  - id: bios-mem-size-reduce
    desc: BIOS memory size reduction via 413h
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)ds:\[413h?\]'
