defaults:
  platforms: [linux]
  for: [elf]

traits:
  - id: mips-mmap-syscall
    desc: MIPS direct mmap syscall
    crit: notable
    conf: 0.95
    arch: [mips]
    if:
      type: hex
      section: text
      pattern: "24 02 0F FA 00 00 00 0C"

composite_rules:
  - id: mips-memory-map-and-cache-flush
    desc: MIPS maps memory and flushes instruction cache
    crit: notable
    conf: 0.97
    all:
      - id: mips-mmap-syscall
      - id: micro-behaviors/mem/sync/cache::mips-cacheflush-syscall
