# RWX Memory Allocation and Code Injection Indicators
# Detects patterns associated with code injection
# ATT&CK: T1055 (Process Injection)
defaults:
  for: [pe, dll, c, cpp]
  platforms: [windows]
  attack: "T1055"
  mbc: "E1055"
traits:
  # page-execute-readwrite: use canonical version from mem/allocate/executable
  # This composite references the canonical definition
  # (removed to avoid duplicate pattern)
  - id: page-execute-read
    desc: PAGE_EXECUTE_READ allocation
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "PAGE_EXECUTE_READ"
  # Memory commit patterns
  - id: mem-commit-reserve
    desc: MEM_COMMIT | MEM_RESERVE allocation
    crit: notable
    conf: 0.6
    if:
      type: string
      regex: "MEM_COMMIT.{0,10}MEM_RESERVE"
  # Instruction cache flush (after code injection)
  - id: flush-instruction-cache
    desc: FlushInstructionCache call
    crit: baseline
    conf: 0.75
    if:
      type: string
      substr: "FlushInstructionCache"
  - id: nt-flush-instruction-cache
    desc: NtFlushInstructionCache call
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "NtFlushInstructionCache"
  # Hot patching patterns
  - id: hotpatch-patch-array
    desc: hotpatch_patch byte array
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "hotpatch_patch"
  - id: hotpatch-prefix
    desc: Hot patch prefix reference
    crit: notable
    conf: 0.75
    if:
      type: string
      regex: "(?i)\\bhot.?patch(?:ing)?\\b"
composite_rules:
  - id: exec-read-commit
    desc: Executable read with commit
    all:
      - id: page-execute-read
      - id: mem-commit-reserve
  - id: rwx-allocation
    desc: RWX memory allocation
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/mem/allocate/executable::page-execute-readwrite
      - id: exec-read-commit
  - id: code-injection-flush
    desc: Code injection with cache flush
    crit: suspicious
    conf: 0.9
    any:
      - id: flush-instruction-cache
      - id: nt-flush-instruction-cache
  - id: ntdll-hotpatch
    desc: ntdll hot patching technique
    crit: suspicious
    conf: 0.9
    all:
      - id: hotpatch-patch-array
      - id: code-injection-flush
