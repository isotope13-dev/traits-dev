# Python ctypes memory stagers
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: python-cfunctype-cast
    desc: Cast buffer to C function pointer
    crit: notable
    attack: "T1055"
    if:
      type: raw
      regex: '(?s)ctypes\.cast\s*\(.{0,100}?ctypes\.CFUNCTYPE'
  - id: python-virtualprotect-rwx
    desc: Allocate RWX memory via VirtualProtect
    crit: suspicious
    attack: "T1055"
    if:
      type: raw
      regex: '(?s)VirtualProtect\s*\(.{0,200}?(0x40|64)\s*,'
