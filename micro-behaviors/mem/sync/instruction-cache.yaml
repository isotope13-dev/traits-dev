# Instruction Cache Flush — Windows
# Neutral memory operation used after code modification
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
traits:
  - id: flush-instruction-cache
    desc: FlushInstructionCache call
    conf: 0.75
    if:
      type: string_value
      substr: "FlushInstructionCache"
  - id: nt-flush-instruction-cache
    desc: NtFlushInstructionCache call
    conf: 0.75
    if:
      type: string_value
      substr: "NtFlushInstructionCache"
