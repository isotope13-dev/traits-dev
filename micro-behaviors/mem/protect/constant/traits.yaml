defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho, so, dll, c, cpp, python, shell, javascript]
traits:
  - id: prot-write
    desc: PROT_WRITE memory protection constant
    crit: baseline
    conf: 0.6
    ref: sha256:98cf2b942c5daa7a4e2e32ed3a4cf83d1b8f86ae6868bfae35392621fca6b5a9
    if:
      type: text
      word: PROT_WRITE
    unless:
      - id: well-known/tool/detection/malware-config-parser
      - id: metadata/package/testing/
      - id: metadata/lang/compiler/systems/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/build/autotools::autoconf-generated-script
      - type: path
        regex: 'Cython[\\/]Includes[\\/]posix[\\/]mman\.pxd$'
