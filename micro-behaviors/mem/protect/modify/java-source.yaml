defaults:
  for: [class, java]
  platforms: [windows, unix]

traits:
  - id: jvm-unsafe-class-ref
    desc: JVM Unsafe class reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^(sun/misc|jdk/internal/misc)/Unsafe$'

  - id: virtual-alloc-java-ref
    desc: VirtualAlloc string reference
    crit: baseline
    conf: 0.9
    attack: T1587.001
    if:
      type: text
      word: VirtualAlloc

  - id: virtual-free-java-ref
    desc: VirtualFree string reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: VirtualFree
