defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
  attack: T1055

traits:
  - id: zw-protect-virtual-memory
    desc: Kernel virtual memory protection change
    if:
      type: symbol
      exact: ZwProtectVirtualMemory
  - id: zw-protect-virtual-memory-xoradd-string
    desc: Encoded ZwProtectVirtualMemory string
    conf: 0.94
    if:
      type: text
      substr: 'nBfEWM_XHkWM44#/'
  - id: mm-map-io-space-xoradd-string
    desc: Encoded MmMapIoSpaceEx string
    conf: 0.9
    if:
      type: text
      substr: 'yX{VHpUhL\]Z'
  - id: mm-unmap-io-space-xoradd-string
    desc: Encoded MmUnmapIoSpace string
    conf: 0.9
    if:
      type: text
      substr: 'yXcYUXJrSnN^'

composite_rules:
  - id: kernel-virtual-memory-protect
    desc: Kernel virtual memory protection change
    crit: notable
    conf: 0.95
    any:
      - id: zw-protect-virtual-memory
      - id: zw-protect-virtual-memory-xoradd-string
