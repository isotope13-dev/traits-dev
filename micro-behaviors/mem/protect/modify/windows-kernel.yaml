defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
  attack: T1055

traits:
  - id: zw-protect-virtual-memory
    desc: Kernel virtual memory protection change
    if:
      type: symbol
      exact: ZwProtectVirtualMemory
  - id: zw-protect-virtual-memory-xoradd-string
    desc: Encoded ZwProtectVirtualMemory string
    conf: 0.94
    if:
      type: text
      substr: 'nBfEWM_XHkWM44#/'
  - id: mm-map-io-space-xoradd-string
    desc: Encoded MmMapIoSpaceEx string
    conf: 0.9
    if:
      type: text
      substr: 'yX{VHpUhL\]Z'
  - id: mm-unmap-io-space-xoradd-string
    desc: Encoded MmUnmapIoSpace string
    conf: 0.9
    if:
      type: text
      substr: 'yXcYUXJrSnN^'
  - id: zw-protect-virtual-memory-atbash-string
    desc: Atbash-obfuscated ZwProtectVirtualMemory string
    conf: 0.98
    if:
      type: text
      substr: 'AdKilgvxgErigfzoNvnlib'
  - id: mm-map-io-space-atbash-string
    desc: Atbash-obfuscated MmMapIoSpace string
    conf: 0.98
    if:
      type: text
      substr: 'NnNzkRlHkzxv'
  - id: mm-unmap-io-space-atbash-string
    desc: Atbash-obfuscated MmUnmapIoSpace string
    conf: 0.98
    if:
      type: text
      substr: 'NnFmnzkRlHkzxv'

composite_rules:
  - id: kernel-virtual-memory-protect
    desc: Kernel virtual memory protection change
    crit: notable
    conf: 0.95
    any:
      - id: zw-protect-virtual-memory
      - id: zw-protect-virtual-memory-xoradd-string
      - id: zw-protect-virtual-memory-atbash-string
  - id: kernel-io-space-mapping
    desc: Kernel physical IO-space mapping
    crit: notable
    conf: 0.98
    any:
      - id: mm-map-io-space-atbash-string
      - id: mm-unmap-io-space-atbash-string
