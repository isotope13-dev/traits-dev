defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: virtual-alloc-vb6
    desc: VB6 VirtualAlloc declaration
    crit: notable
    conf: 0.93
    attack: T1055
    if:
      type: text
      substr: VirtualAlloc Lib "kernel32"

  - id: virtual-alloc-ex-vb6
    desc: VB6 VirtualAllocEx allocation
    crit: notable
    conf: 0.94
    attack: T1055
    if:
      type: text
      substr: VirtualAllocEx
  - id: page-execute-readwrite-vb6
    desc: VB6 PAGE_EXECUTE_READWRITE constant
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: PAGE_EXECUTE_READWRITE
