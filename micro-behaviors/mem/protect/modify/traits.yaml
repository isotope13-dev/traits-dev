defaults:
  for:
    - pe
    - dll
    - c
    - cpp
    - csharp
    - rust
  platforms:
    - windows
traits:
  - id: virtual-protect
    desc: Modify memory page protection
    crit: baseline
    conf: 0.95
    attack: T1222.001
    mbc: C0021
    if:
      type: symbol
      exact: VirtualProtect
  - id: virtual-protect-text-pe
    desc: Hidden VirtualProtect string reference
    crit: component
    conf: 0.9
    attack: T1222.001
    for: [pe, dll]
    if:
      type: text
      word: VirtualProtect
    unless:
      - id: virtual-protect
  - id: virtual-protect-string
    desc: VirtualProtect API string reference
    crit: component
    conf: 0.9
    attack: T1222.001
    for: [javascript]
    if:
      type: text
      word: VirtualProtect
  - id: virtual-protect-ex
    desc: Extended memory protection modification
    crit: baseline
    conf: 0.95
    attack: T1222.001
    if:
      type: symbol
      exact: VirtualProtectEx
    downgrade:
      any:
        - type: text
          substr: Valve Corp.
  - id: virtual-alloc
    desc: Allocate virtual memory
    crit: baseline
    conf: 0.9
    attack: T1587.001
    if:
      type: symbol
      exact: VirtualAlloc
  - id: virtual-alloc-string
    desc: VirtualAlloc API string reference
    crit: component
    conf: 0.9
    attack: T1587.001
    for: [pe, javascript]
    if:
      type: text
      word: VirtualAlloc
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
      - id: metadata/binary/symbols/exports/
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
      - id: metadata/binary/layout::svk-packed-section
  - id: virtual-alloc-ex
    desc: Allocate virtual memory in process
    crit: baseline
    conf: 0.9
    attack: T1587.001
    if:
      type: symbol
      exact: VirtualAllocEx
  - id: virtual-free
    desc: Free virtual memory
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: VirtualFree
  - id: virtualprotect-rwx-stack-arg-x86
    desc: VirtualProtect RWX stack argument
    crit: component
    conf: 0.84
    attack: T1620
    arch: [x86]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 'C7 44 24 08 40 00 00 00 [0-16] FF 15 ?? ?? ?? ??'
  - id: virtualprotect-rwx-direct-call-x86
    desc: RWX protection followed by direct call
    crit: suspicious
    conf: 0.9
    attack: T1620
    arch: [x86]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: '8D 05 ?? ?? ?? ?? 89 04 24 C7 44 24 04 ?? ?? ?? ?? C7 44 24 08 40 00 00 00 8D 45 ?? 89 44 24 0C FF 15 ?? ?? ?? ?? 83 EC 10 [0-8] E8 ?? ?? ?? ??'
