defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: virtual-protect
    desc: Modify memory page protection
    crit: baseline
    conf: 0.95
    attack: T1222.001
    mbc: C0021
    if:
      type: symbol
      exact: VirtualProtect
  - id: virtual-protect-ex
    desc: Extended memory protection modification
    crit: baseline
    conf: 0.95
    attack: T1222.001
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: symbol
      exact: VirtualProtectEx
    downgrade:
      any:
        - type: text
          substr: Valve Corp.
  - id: virtual-alloc
    desc: Allocate virtual memory
    crit: baseline
    conf: 0.9
    attack: T1587.001
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: symbol
      exact: VirtualAlloc
  - id: virtual-alloc-ex
    desc: Allocate virtual memory in process
    crit: baseline
    conf: 0.9
    attack: T1587.001
    for:
      - pe
      - dll
      - c
      - cpp
    if:
      type: symbol
      exact: VirtualAllocEx
  - id: virtual-free
    desc: Free virtual memory
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: VirtualFree
