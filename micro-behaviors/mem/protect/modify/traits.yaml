defaults:
  for:
    - pe
    - dll
    - c
    - cpp
    - csharp
    - rust
  platforms:
    - windows
traits:
  - id: page-execute-constant
    desc: PAGE_EXECUTE protection constant
    crit: component
    conf: 0.8
    for: [pe, dll]
    if:
      type: text
      substr: PAGE_EXECUTE
  - id: virtual-protect
    desc: Modify memory page protection
    crit: notable
    conf: 0.95
    mbc: C0021
    if:
      type: import
      exact: VirtualProtect
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
  - id: virtual-protect-text-pe
    desc: Hidden VirtualProtect string reference
    crit: component
    conf: 0.9
    for: [pe, dll]
    if:
      type: text
      word: VirtualProtect
    unless:
      - id: virtual-protect
  - id: virtual-protect-string
    desc: VirtualProtect API string reference
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      word: VirtualProtect
  - id: virtual-protect-ex
    desc: Modify memory protection with VirtualProtectEx
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: VirtualProtectEx
    downgrade:
      any:
        - type: text
          substr: Valve Corp.
  - id: virtual-alloc
    desc: Allocate virtual memory
    crit: baseline
    conf: 0.9
    attack: T1587.001
    if:
      type: import
      exact: VirtualAlloc
    unless:
      - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
  - id: virtual-alloc-string
    desc: VirtualAlloc API string reference
    crit: component
    conf: 0.9
    attack: T1587.001
    for: [pe, javascript]
    if:
      type: text
      word: VirtualAlloc
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
      - id: metadata/binary/symbols/exports/
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
      - id: metadata/binary/layout::svk-packed-section
  - id: virtual-alloc-ex
    desc: Remote-process VirtualAllocEx allocation
    crit: notable
    conf: 0.95
    attack: T1055
    mbc: C0032
    if:
      type: import
      exact: VirtualAllocEx
    unless:
      - id: well-known/game/mod::bedrockboot-preload-injector-pdb
  - id: virtual-alloc-ex-text
    desc: VirtualAllocEx API string reference
    crit: notable
    conf: 0.9
    attack: T1055
    mbc: C0032
    for: [pe, dll]
    if:
      type: text
      word: VirtualAllocEx
    unless:
      - id: virtual-alloc-ex
  - id: virtual-alloc-ex-python-source
    desc: Python VirtualAllocEx remote memory allocation
    crit: notable
    conf: 0.97
    attack: T1055
    mbc: C0032
    for: [python]
    if:
      type: symbol
      kind: call
      exact: VirtualAllocEx
  - id: virtual-free
    desc: Free virtual memory
    crit: baseline
    conf: 0.9
    if:
      type: import
      exact: VirtualFree
  - id: virtual-free-ex
    desc: Release memory allocated in a remote process
    crit: notable
    conf: 0.95
    attack: T1055
    mbc: C0032
    if:
      type: import
      exact: VirtualFreeEx
    unless:
      - id: well-known/game/mod::bedrockboot-preload-injector-pdb
  - id: virtualprotect-rwx-stack-arg-x86
    desc: VirtualProtect RWX stack argument
    crit: notable
    conf: 0.9
    attack: T1620
    arch: [x86]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      # x86 callers commonly materialize the old-protection out parameter
      # between PAGE_EXECUTE_READWRITE and the imported thunk.
      pattern: 'C7 44 24 08 40 00 00 00 [0-32] FF 15 ?? ?? ?? ??'
  - id: virtualprotect-rwx-direct-call-x86
    desc: RWX protection followed by direct call
    crit: suspicious
    conf: 0.9
    attack: T1620
    arch: [x86]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: '8D 05 ?? ?? ?? ?? 89 04 24 C7 44 24 04 ?? ?? ?? ?? C7 44 24 08 40 00 00 00 8D 45 ?? 89 44 24 0C FF 15 ?? ?? ?? ?? 83 EC 10 [0-8] E8 ?? ?? ?? ??'

  - id: virtualprotectex-rwx-call-x86
    desc: VirtualProtectEx sets current-process memory RWX
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: C0021
    arch: [x86]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      # x86 stack arguments: PAGE_EXECUTE_READWRITE, a size/address pair,
      # current-process pseudo-handle, then an indirect imported call.
      pattern: '6A 40 [0-4] 6A FF FF 15 ?? ?? ?? ??'
  - id: virtualprotect-executable-resolved-x64
    desc: Resolved x64 executable memory protection
    crit: notable
    conf: 0.95
    attack: T1620
    arch: [x86-64]
    for: [pe, dll]
    if:
      type: hex
      section: .text
      # PAGE_EXECUTE_READWRITE (0x40), an old-protection pointer, and an
      # indirect call are characteristic of a runtime-resolved VirtualProtect.
      pattern: '4C 8D 8C 24 ?? ?? ?? ?? 41 B8 40 00 00 00 [0-32] FF 94 24 ?? ?? ?? ??'

composite_rules:
  - id: virtual-memory-allocation-protection-api-pair
    desc: Imports virtual-memory allocation and protection APIs
    crit: notable
    conf: 0.9
    for: [pe, dll]
    all:
      - id: virtual-alloc
      - id: virtual-protect
  - id: virtual-alloc-ex-dup
    desc: VirtualAllocEx remote-process allocation reference
    crit: notable
    conf: 0.95
    attack: T1055
    any:
      - id: virtual-alloc-ex
      - id: virtual-alloc-ex-text
