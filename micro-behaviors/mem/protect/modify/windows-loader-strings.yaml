defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: loadlibrarya-virtualprotect-pair
    desc: LoadLibraryA then VirtualProtect strings
    crit: component
    conf: 0.88
    if:
      type: raw
      regex: LoadLibraryA.{0,32}VirtualProtect
      section: .rdata
  - id: virtualalloc-virtualprotect-pair
    desc: VirtualAlloc then VirtualProtect strings
    crit: component
    conf: 0.86
    if:
      type: raw
      regex: VirtualAlloc.{0,32}VirtualProtect
      section: .rdata
  - id: virtualprotect-virtualalloc-pair
    desc: VirtualProtect then VirtualAlloc strings
    crit: component
    conf: 0.86
    if:
      type: raw
      regex: VirtualProtect.{0,32}VirtualAlloc
      section: .rdata
composite_rules:
  - id: getprocaddr-memory-loader-primitives
    desc: Resolves VirtualAlloc and VirtualProtect
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: metadata/package/metrics::import-count-under-80
    any:
      - id: loadlibrarya-virtualprotect-pair
      - id: virtualalloc-virtualprotect-pair
      - id: virtualprotect-virtualalloc-pair
    downgrade:
      any:
        - id: well-known/app/drivers::realtek-rmbchange-tool
