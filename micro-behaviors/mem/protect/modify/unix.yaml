# Memory Protection - Unix
# ATT&CK: T1055 (Process Injection)
defaults:
  platforms: [unix]
  attack: T1055
traits:
  - id: mprotect-symbol
    desc: Change memory protection (mprotect)
    crit: notable
    conf: 1.0
    for: [elf, shell, python]
    if:
      type: symbol
      regex: "^_?mprotect$"
    unless:
      - type: basename
        exact: tabby
  - id: rwx-prot-bytes
    desc: Repeated 0x07 code constant (possible PROT_RWX)
    crit: component
    conf: 0.25
    for: [elf, dylib]
    count_min: 2
    if:
      type: hex
      pattern: "07 00 00 00"
      section: text
