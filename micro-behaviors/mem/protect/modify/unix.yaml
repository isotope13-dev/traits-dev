# Memory Protection - Unix
# ATT&CK: T1055 (Process Injection)
traits:
  - id: mprotect-symbol
    desc: Change memory protection (mprotect)
    crit: notable
    conf: 1.0
    attack: "T1055"
    platforms: [linux, macos, unix]
    for: [all]
    if:
      type: symbol
      regex: "^_?mprotect$"
  - id: rwx-prot-bytes
    desc: Repeated 0x07 code constant (possible PROT_RWX)
    crit: component
    conf: 0.25
    attack: "T1055"
    platforms: [linux, macos, unix]
    for: [elf, so, dylib]
    count_min: 2
    if:
      type: hex
      pattern: "07 00 00 00"
      section: text
