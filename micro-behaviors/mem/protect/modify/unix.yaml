# Memory Protection - Unix
# ATT&CK: T1055 (Process Injection)
defaults:
  platforms: [linux, macos]
  attack: T1055
traits:
  - id: mprotect-symbol
    desc: Change memory protection (mprotect)
    crit: suspicious
    conf: 1.0
    for: [shell, python]
    if:
      type: symbol
      regex: "^_?mprotect$"
    unless:
      - id: well-known/app/tabby::tabby-basename
    downgrade:
      any:
        - id: well-known/tool/development/debugpy
        - id: well-known/tool/development/debugpy::package-path-marker
        - type: basename
          regex: '(?i)(debugpy|pydevd|winappdbg)'
  - id: mprotect-import
    desc: Imports mprotect memory protection
    crit: baseline
    conf: 0.9
    for: [elf]
    if:
      type: import
      regex: "^_?mprotect$"
  - id: rwx-prot-bytes
    desc: "Repeated 0x07 code constant"
    crit: notable
    conf: 0.25
    for: [elf, dylib]
    count_min: 2
    if:
      type: hex
      pattern: "07 00 00 00"
      section: text
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/dylib/library/family::xz-ref
      - id: micro-behaviors/data/compress/library::liblzma
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - type: section
        exact: .modinfo
