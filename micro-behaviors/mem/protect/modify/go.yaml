# Memory protection change — Go binaries.
# `syscall.Mprotect` is program-driven: a plain Go binary does not reference it
# (verified against a hello-world build). Calling mprotect from Go almost always
# means manually flipping a page to executable — the W^X-bypass step of an
# in-memory code loader.
defaults:
  platforms: [linux, macos, windows]
  for: [go]
  attack: T1620
traits:
  - id: go-syscall-mprotect
    desc: 'Go syscall.Mprotect page-protection change'
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: syscall.Mprotect
composite_rules:
  - id: go-rwx-inmemory-exec
    desc: Go maps memory then changes its protection (manual in-memory exec)
    crit: notable
    conf: 0.85
    all:
      - id: go-syscall-mprotect
      - id: micro-behaviors/mem/alloc/executable::go-syscall-mmap
