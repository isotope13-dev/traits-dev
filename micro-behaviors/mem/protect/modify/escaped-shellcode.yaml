# VirtualAlloc call setup seen in its *escaped source* form ("\x6a\x04\x68...").
# The sibling traits.yaml matches VirtualAlloc as a PE import or as an API name
# string; neither surface exists for a shellcode blob pasted into a C/script
# file, which carries no import table and names no APIs — only the raw push
# sequence that sets up the call survives. This file recovers that behavior for
# the escaped form.
#
# Neutral capability on its own: committing read/write memory is what any
# unpacking, decoding, or buffer-staging code does. Objective composites supply
# the intent evidence.
defaults:
  platforms: [windows]
  for: [c, cpp, python, powershell, ruby, php, javascript]
  attack: T1587.001
traits:
  # 6a 04             push 4       -> flProtect = PAGE_READWRITE
  # 68 00 30 00 00    push 0x3000  -> flAllocationType = MEM_COMMIT|MEM_RESERVE
  # The x86 stdcall right-to-left argument pair for
  # VirtualAlloc(lpAddress, dwSize, MEM_COMMIT|MEM_RESERVE, PAGE_READWRITE).
  # Seven fixed bytes, so it does not collide by chance inside a large blob.
  - id: escaped-x86-virtualalloc-rw-commit
    desc: Escaped x86 VirtualAlloc RW commit args
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\\x6a["\n]*\\x04["\n]*\\x68["\n]*\\x00["\n]*\\x30["\n]*\\x00["\n]*\\x00'
