defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1055
traits:
  - id: virtual-protect-prefix-no-import
    desc: Hidden VirtualProtect string fragment
    crit: component
    conf: 0.9
    if:
      type: text
      exact: VirtualProte
    unless:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: virtual-alloc-ex-name
    desc: VirtualAllocEx API name reference
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: VirtualAllocEx
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports
        - id: metadata/binary/metrics::many-exports-100
