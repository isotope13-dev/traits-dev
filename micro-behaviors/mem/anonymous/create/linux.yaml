defaults:
  attack: T1055
  mbc: B0033
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
traits:
  - id: memfd-create
    desc: Create anonymous memory file (memfd_create)
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: symbol
      regex: memfd_create
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: memfd-create-text
    desc: Create anonymous memory file (memfd_create string)
    crit: notable
    conf: 0.78
    platforms:
      - linux
    if:
      type: text
      substr: memfd_create
    not:
      # UPX 5.x prints this banner from its own decompression stub when the
      # host kernel pre-dates memfd_create (3.17). It is part of the packer,
      # not the packed payload.
      - substr: 'UPX-5.0 wants memfd_create()'
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: memfd-create-go
    desc: Go MemfdCreate reference
    crit: suspicious
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      substr: MemfdCreate
