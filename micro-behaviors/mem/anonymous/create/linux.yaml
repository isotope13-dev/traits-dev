defaults:
  attack: T1055
  mbc: B0033
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
traits:
  - id: memfd-create
    desc: Create anonymous memory file (memfd_create)
    crit: notable
    conf: 0.8
    for: [elf, c, cpp, rust, go]
    platforms:
      - linux
    if:
      type: symbol
      regex: memfd_create
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/app/telegram::telegram-desktop-third-party-source
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
  - id: memfd-create-python
    desc: Python calls os.memfd_create
    crit: notable
    conf: 0.95
    platforms: [linux]
    for: [python]
    if:
      type: symbol
      kind: call
      exact: os.memfd_create
    unless:
      - id: metadata/library/python-stdlib::python-stdlib-test-file
      - id: metadata/package/files/dependency::python-type-stub-path
  # Same capability as the memfd-create symbol above (notable) — the Go wrapper is
  # no more suspicious. memfd_create is used legitimately by JIT/runtime code
  # (clangd/LLVM, Go programs); fileless-exec intent comes from composites.
  - id: memfd-create-go
    desc: Go MemfdCreate reference
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      substr: MemfdCreate
