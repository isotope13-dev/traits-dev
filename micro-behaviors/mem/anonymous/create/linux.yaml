defaults:
  attack: T1055
  mbc: B0033
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
traits:
  - id: memfd-create
    desc: Create anonymous memory file (memfd_create)
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: symbol
      regex: memfd_create
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
  # Same capability as the memfd-create symbol above (notable) — the Go wrapper is
  # no more suspicious. memfd_create is used legitimately by JIT/runtime code
  # (clangd/LLVM, Go programs); fileless-exec intent comes from composites.
  - id: memfd-create-go
    desc: Go MemfdCreate reference
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      substr: MemfdCreate
