defaults:
  attack: T1055
  mbc: B0033
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
traits:
  - id: memfd-create
    desc: Create anonymous memory file (memfd_create)
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: symbol
      regex: memfd_create
  - id: memfd-create-go
    desc: Create anonymous memory file (Go
    crit: suspicious
    conf: 0.85
    platforms:
      - linux
    if:
      type: string_value
      substr: MemfdCreate
