defaults:
  attack: T1055
  mbc: B0033
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
traits:
  - id: memfd-create
    desc: Create anonymous memory file (memfd_create)
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: symbol
      regex: memfd_create
    downgrade:
      any:
        - id: metadata/file::system-shell-basename
  - id: memfd-create-text
    desc: Create anonymous memory file (memfd_create string)
    crit: notable
    conf: 0.78
    platforms:
      - linux
    if:
      type: text
      substr: memfd_create
    downgrade:
      any:
        - id: metadata/file::system-shell-basename
  - id: memfd-create-go
    desc: Go MemfdCreate reference
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      substr: MemfdCreate
