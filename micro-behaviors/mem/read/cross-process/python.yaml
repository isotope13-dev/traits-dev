# Cross-process memory reads through Python's pymem library.
defaults:
  for: [python]
  platforms: [windows]
  crit: notable
  conf: 0.92

traits:
  - id: pymem-import
    desc: Imports Python cross-process memory library
    if:
      type: import
      exact: pymem

  - id: pymem-memory-read
    desc: Reads target process memory with pymem
    mbc: C0008
    attack: T1005
    if:
      type: symbol
      kind: call
      regex: '^pymem\.(read|read_[A-Za-z0-9_]+)$'

composite_rules:
  - id: pymem-cross-process-read
    desc: Python cross-process memory read through pymem
    crit: notable
    conf: 0.95
    all:
      - id: pymem-import
      - id: micro-behaviors/process/inject/runtime/call::pymem-process-attach
      - id: pymem-memory-read
