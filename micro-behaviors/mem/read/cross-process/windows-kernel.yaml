defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
  attack: T1055

traits:
  - id: mm-copy-virtual-memory
    desc: Kernel cross-process memory copy
    if:
      type: symbol
      exact: MmCopyVirtualMemory
  - id: mm-copy-virtual-memory-xoradd-string
    desc: Encoded MmCopyVirtualMemory string
    conf: 0.94
    if:
      type: text
      substr: 'yXuXH@lRNIK^,'
  - id: mm-copy-memory-xoradd-string
    desc: Encoded MmCopyMemory string
    conf: 0.9
    if:
      type: text
      substr: 'yXuXH@w^QRLF@'

composite_rules:
  - id: kernel-cross-process-memory-copy
    desc: Kernel cross-process memory copy
    crit: notable
    conf: 0.95
    any:
      - id: mm-copy-virtual-memory
      - id: mm-copy-virtual-memory-xoradd-string
