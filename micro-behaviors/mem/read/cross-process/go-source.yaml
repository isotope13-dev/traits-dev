# Cross-process memory read - Windows API resolution from Go source.
# Go programs that target Windows commonly resolve kernel32!ReadProcessMemory
# via syscall.NewLazyDLL/NewProc and invoke it through proc*.Call. The string
# "ReadProcessMemory" appears as the argument to NewProc, and the proc handle
# typically uses the canonical procReadProcessMemory naming. Both surface
# trivially in extracted strings/symbols.
defaults:
  for: [go]
  platforms: [windows, unix]
  attack: T1005
traits:
  - id: read-process-memory-go-source
    desc: ReadProcessMemory referenced in Go source
    crit: notable
    conf: 0.9
    if:
      type: text
      word: ReadProcessMemory
  - id: read-process-memory-go-proc-call
    desc: procReadProcessMemory.Call invocation in Go
    crit: notable
    conf: 0.94
    if:
      type: symbol
      exact: procReadProcessMemory.Call
