defaults:
  for:
  - pe
  - dll
  - python
  platforms:
  - windows
traits:
- id: comsvcs-dump--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: MiniDump
    case_insensitive: true
  count_max: 1007260
- id: comsvcs-dump--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: rundll32
    case_insensitive: true
  count_max: 1007261
- id: comsvcs-dump--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: comsvcs
    case_insensitive: true
  count_max: 1007262
composite_rules:
- id: comsvcs-dump
  desc: Dump process memory via comsvcs.dll
  crit: suspicious
  conf: 0.95
  attack: T1003.001
  all:
  - id: comsvcs-dump--rx-3
  any:
  - id: comsvcs-dump--rx-1
  - id: comsvcs-dump--rx-2
  unless:
  - id: well-known/app/samba::samba-source-tree
  - id: well-known/lib/wine/
