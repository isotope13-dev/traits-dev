defaults:
  for:
  - pe
  - dll
  - python
  platforms:
  - windows
traits:
- id: comsvcs-dump--rx-2
  desc: rundll32 comsvcs MiniDump command
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)\brundll32(\.exe)?\s+[^,\r\n]{0,120}\bcomsvcs(\.dll)?\s*,\s*(MiniDump|MiniDumpW)\b'
  count_max: 1007261
composite_rules:
- id: comsvcs-dump
  desc: Dump process memory via comsvcs.dll
  crit: suspicious
  conf: 0.95
  attack: T1003.001
  all:
  - id: comsvcs-dump--rx-2
  unless:
  - id: well-known/app/samba::samba-source-tree
  - id: well-known/lib/wine/
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
