defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
    - python
traits:
  - id: dev-mem
    desc: Access raw system memory (/dev/mem)
    crit: notable
    conf: 0.9
    attack: T1003
    platforms:
      - linux
    if:
      type: string_value
      substr: /dev/mem
    downgrade:
      any:
        - id: micro-behaviors/dylib/load/x11-ref
        - id: micro-behaviors/dylib/load/x11-dga-marker
  - id: memdump-cmd
    desc: memdump command reference
    crit: notable
    conf: 0.65
    attack: T1003
    platforms:
      - linux
    if:
      type: string_value
      word: memdump
  - id: dumpmem-cmd
    desc: dumpmem command reference
    crit: notable
    conf: 0.65
    attack: T1003
    platforms:
      - linux
    if:
      type: string_value
      word: dumpmem
composite_rules:
  - id: memdump-ref
    desc: Reference to memory dump tools
    crit: notable
    conf: 0.65
    any:
      - id: memdump-cmd
      - id: dumpmem-cmd
