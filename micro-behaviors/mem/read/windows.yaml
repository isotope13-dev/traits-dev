defaults:
  for:
    - pe
    - dll
    - python
  platforms:
    - windows
traits:
  - id: comsvcs-dump
    desc: Dump process memory via comsvcs.dll
    crit: suspicious
    conf: 0.95
    attack: T1003.001
    if:
      type: text
      regex: (?i)\brundll32(?:\.exe)?\b.{0,160}\bcomsvcs(?:\.dll)?[,\s]+(MiniDump|#24)\b.{0,160}\bfull\b
