defaults:
  for:
    - pe
    - dll
  platforms:
    - windows

traits:
  - id: zw-query-virtual-memory
    desc: ZwQueryVirtualMemory import
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: ZwQueryVirtualMemory
  - id: zw-query-virtual-memory-xoradd-string
    desc: Encoded ZwQueryVirtualMemory string
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: 'nBgB]KCmUOJJ!-'
