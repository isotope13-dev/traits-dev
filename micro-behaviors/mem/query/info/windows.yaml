# Memory Query - Windows
# ATT&CK: T1055 (Process Injection)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055
traits:
  - id: virtualquery
    desc: Query virtual memory info (VirtualQuery)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: "VirtualQuery$"
  - id: virtualquery-ex
    desc: Query virtual memory in other
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: "VirtualQueryEx"
