# Memory Query - Windows
# ATT&CK: T1055 (Process Injection)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055
traits:
  - id: virtualquery
    desc: Query virtual memory info (VirtualQuery)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: "VirtualQuery$"
  - id: virtualquery-ex
    desc: Query virtual memory in another process
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "VirtualQueryEx"
  - id: virtualquery-ex-script
    desc: Query virtual memory in another process
    crit: notable
    conf: 0.92
    for: [powershell, batch, vbs, javascript]
    if:
      type: text
      word: VirtualQueryEx
