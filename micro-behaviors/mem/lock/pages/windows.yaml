defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082

traits:
  - id: virtual-lock-import
    desc: Lock pages in physical memory with VirtualLock
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: VirtualLock

  - id: virtual-unlock-import
    desc: Unlock pages previously locked with VirtualUnlock
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: VirtualUnlock
