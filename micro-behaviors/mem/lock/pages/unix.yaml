defaults:
  platforms:
    - linux
    - macos
  for: [elf, macho, c]
traits:
  - id: mlock
    desc: Lock memory pages (mlock)
    crit: baseline
    conf: 1.0
    if:
      type: symbol
      regex: ^_?mlock2?$
  - id: mlockall
    desc: Lock all memory pages (mlockall)
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: ^_?mlockall$
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
