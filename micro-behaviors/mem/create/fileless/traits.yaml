traits:
  - id: syscall-memfd-create
    desc: Calls memfd_create syscall
    crit: notable
    conf: 0.8
    platforms: [linux]
    for: [elf]
    if:
      type: syscall
      name: ["memfd_create"]
  - id: nscreate-objectfile-memory
    desc: NSCreateObjectFileImageFromMemory symbol
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [macho]
    if:
      type: symbol
      exact: "NSCreateObjectFileImageFromMemory"
  - id: nt-create-section-api-string
    desc: Native NtCreateSection API string
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: NtCreateSection
  - id: nt-map-view-section-api-string
    desc: Native NtMapViewOfSection API string
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: NtMapViewOfSection
composite_rules:
  - id: fileless
    desc: Fileless execution - memfd_create + execve
    conf: 0.95
    crit: suspicious
    platforms: [linux]
    for: [elf]
    all:
      - id: syscall-memfd-create
      - id: micro-behaviors/process/create/shell/fd::syscall-execve-linux
  - id: fileless-macos-hostile
    desc: Fileless execution with hidden tmp file on macOS
    conf: 0.95
    crit: suspicious
    platforms: [macos]
    for: [macho]
    all:
      - id: nscreate-objectfile-memory
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  - id: nt-section-map-exec-primitives
    desc: Native section mapping execution primitives
    conf: 0.94
    crit: suspicious
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: nt-create-section-api-string
      - id: nt-map-view-section-api-string
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/os/module/load::get-module-handle-ansi
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics::many-exports
