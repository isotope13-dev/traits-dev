defaults:
  platforms: [unix]
  for: [php]
traits:
  - id: shm-open
    desc: PHP shared memory open
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: shmop_open
  - id: shm-read
    desc: PHP shared memory read
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: shmop_read
  - id: shm-write
    desc: PHP shared memory write
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: shmop_write
  - id: shm-close
    desc: PHP shared memory close
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: shmop_close
composite_rules:
  - id: shared-memory-ops
    desc: PHP shared memory coordination
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: shm-open
      - id: shm-read
      - id: shm-write
