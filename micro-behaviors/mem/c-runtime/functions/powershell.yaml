defaults:
  platforms: [windows]
  for: [powershell]

traits:
  - id: marshal-copy
    desc: Copies between managed and unmanaged memory
    crit: notable
    conf: 0.9
    if:
      type: text
      word: Marshal.Copy

  - id: marshal-copy-encoded
    desc: Encoded Marshal.Copy memory operation
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      word: Marshal.Copy
