# Executable Memory Allocation - Windows
# ATT&CK: T1055 (Process Injection)

traits:
  # NOTE: VirtualAlloc/VirtualAllocEx moved to mem/protect/modify/traits.yaml
  # This file now focuses on the executable aspect (PAGE_EXECUTE_READWRITE)
  - id: page-execute-readwrite
    desc: PAGE_EXECUTE_READWRITE flag
    crit: component
    conf: 0.9
    attack: "T1055"
    platforms: [windows]
    for: [pe, dll, c, cpp]
    if:
      type: raw
      substr: "PAGE_EXECUTE_READWRITE"

  # Marker: file enumerates many PAGE_* constants (PE viewer/debugger UI)
  - id: page-protection-enum
    desc: PAGE protection constant enumeration
    crit: component
    platforms: [windows]
    for: [pe, dll, c, cpp]
    if:
      type: string
      substr: "PAGE_NOACCESS"

  # Kernel pool allocation for executable code
  - id: kernel-pool-alloc
    desc: Kernel pool memory allocation
    crit: notable
    conf: 0.9
    attack: "T1055"
    platforms: [windows]
    for: [c, cpp, pe, dll]
    if:
      type: raw
      substr: "ExAllocatePoolWithTag"

  # NonPagedPool is used for kernel code that must stay resident
  - id: nonpaged-pool
    desc: NonPagedPool kernel memory flag
    crit: baseline
    conf: 0.9
    platforms: [windows]
    for: [c, cpp, pe, dll]
    if:
      type: raw
      substr: "NonPagedPool"

  # Push PAGE_EXECUTE_READWRITE (0x40) as VirtualAlloc/VirtualProtect argument
  # In compiled PE binaries, this appears as push 0x40 before API call
  # Common pattern: push 0x40; push size; push addr; call VirtualAlloc
  - id: page-execute-readwrite-push
    desc: Push PAGE_EXECUTE_READWRITE constant
    crit: baseline
    conf: 0.7
    attack: "T1055"
    platforms: [windows]
    for: [pe, dll]
    count_min: 2
    size_max: 2097152
    if:
      type: hex
      section: text
      pattern: "6A 40"

  # __declspec(safebuffers) disables buffer overflow security checks
  - id: safebuffers-directive
    desc: Buffer security check suppression
    crit: notable
    conf: 0.85
    attack: "T1562"
    platforms: [windows]
    for: [c, cpp, pe, dll]
    if:
      type: raw
      substr: "safebuffers"
