# Memory Decompression APIs
# Native decompression that may indicate embedded payload extraction
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1140"
traits:
  - id: rtl-decompress-buffer
    desc: RtlDecompressBuffer native decompression
    crit: notable
    conf: 0.80
    if:
      type: string
      substr: "RtlDecompressBuffer"
