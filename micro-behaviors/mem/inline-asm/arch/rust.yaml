# Inline Assembly - Rust
# MBC: B0006 (Inline Assembly)
defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: macro
    desc: Inline assembly macro
    crit: notable
    conf: 1.0
    if:
      type: tree-sitter
      node: macro_invocation
      exact: "asm!"
  - id: global-macro
    desc: Global inline assembly macro
    crit: notable
    conf: 1.0
    if:
      type: tree-sitter
      node: macro_invocation
      exact: "global_asm!"
