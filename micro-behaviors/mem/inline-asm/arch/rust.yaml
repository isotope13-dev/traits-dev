# Inline Assembly - Rust
# MBC: B0006 (Inline Assembly)
defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: macro
    desc: Inline assembly macro
    crit: notable
    conf: 1.0
    # The `asm!( … )` macro invocation. `\b` before `asm` keeps it from matching
    # inside `global_asm!` (handled by `global-macro` below).
    if:
      type: text
      regex: '\basm!\s*[(\[{]'
  - id: global-macro
    desc: Global inline assembly macro
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: "global_asm!"
