# Inline Assembly - Rust
# MBC: B0006 (Inline Assembly)
defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: macro
    desc: Inline assembly macro
    crit: notable
    conf: 1.0
    # The `asm!( … )` macro invocation. `\b` before `asm` keeps it from matching
    # inside `global_asm!` (handled by `global-macro` below).
    if:
      type: text
      regex: '\basm!\s*[(\[{]'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: global-macro
    desc: Global inline assembly macro
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: "global_asm!"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
