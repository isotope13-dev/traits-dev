# x86-64 Shellcode Execution Transfer
# Detects instructions used to transfer execution to shellcode
# Common in stagers and exploits
defaults:
  platforms: [linux, unix, android, windows]
  for: [elf, pe]
  crit: notable
  conf: 0.8
traits:
  # jmp rsi (ff e6) - most common in Metasploit stagers
  - id: jmp-rsi
    desc: jmp rsi instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: "ff e6"
  # jmp rax (ff e0)
  - id: jmp-rax
    desc: jmp rax instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: "ff e0"
  # call rax (ff d0)
  - id: call-rax
    desc: call rax instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: "ff d0"
  # call rsi (ff d6)
  - id: call-rsi
    desc: call rsi instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: "ff d6"
  # jmp rcx (ff e1)
  - id: jmp-rcx
    desc: jmp rcx instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: "ff e1"
  # call rcx (ff d1)
  - id: call-rcx
    desc: call rcx instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: "ff d1"
composite_rules:
  - id: register-transfer
    desc: Jump/call to register (shellcode execution)
    crit: notable
    conf: 0.8
    any:
      - id: jmp-rsi
      - id: jmp-rax
      - id: call-rax
      - id: call-rsi
      - id: jmp-rcx
      - id: call-rcx
