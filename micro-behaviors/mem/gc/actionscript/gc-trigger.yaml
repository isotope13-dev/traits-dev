defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: localconnection-connect-gc
    desc: "Use of LocalConnection().connect() to force garbage collection"
    crit: suspicious
    conf: 0.8
    attack: T1027
    mbc: E1027
    if:
      type: string
      regex: "(LocalConnection\\(\\)\\.connect|LocalConnection\\s+flash\\.net)"
