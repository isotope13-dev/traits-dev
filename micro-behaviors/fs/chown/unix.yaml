defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, shell]
traits:
  - id: chown-fn
    desc: Change file ownership
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: chown
  - id: fchown-fn
    desc: Change file ownership by fd
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: fchown
  - id: fchownat-fn
    desc: Change file ownership by dirfd/path
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: fchownat
  - id: lchown-fn
    desc: Change ownership of symlink
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: lchown
  - id: chown-command
    desc: Shell command changes file ownership
    crit: notable
    conf: 0.82
    for: [shell]
    if:
      type: text
      regex: '(?m)^\s*chown\s+.{1,180}'
  - id: chown-ssh-authorized-keys-path
    desc: Changes ownership on SSH authorized_keys path
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: 'chown.{0,120}\.ssh/(authorized_keys|authorized_keys2)\b|chown.{0,120}authorized_keys\b'
composite_rules:
  - id: chown
    desc: Change file ownership
    crit: notable
    conf: 0.66
    any:
      - id: chown-fn
      - id: fchown-fn
      - id: fchownat-fn
      - id: lchown-fn
      - id: chown-command
