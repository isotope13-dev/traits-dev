defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: win32-file-mapping
    conf: 0.8
    crit: notable
    desc: Uses Windows API for file mapping (often
    if:
      type: raw
      regex: '(CreateFileMapping[AW]|MapViewOfFile|UnmapViewOfFile)'
  - id: ntdll-image-remap-cluster
    desc: NTDLL image remap API cluster
    crit: suspicious
    conf: 0.9
    attack: "T1027"
    mbc: "B0032"
    if:
      type: import_combination
      required:
        - "^CreateFileA$"
        - "^CreateFileMappingW$"
        - "^MapViewOfFile$"
        - "^GetModuleHandleA$"
        - "^K32GetModuleInformation$"
      suspicious:
        - "^VirtualAlloc$"
        - "^VirtualProtect$"
        - "^memcpy$"
      min_suspicious: 1
