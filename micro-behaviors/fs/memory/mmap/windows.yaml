defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: win32-file-mapping
    conf: 0.8
    crit: baseline
    desc: Uses Windows API for file mapping
    if:
      type: raw
      regex: (CreateFileMapping[AW]|MapViewOfFile|UnmapViewOfFile)
  - id: win32-file-mapping-source
    conf: 0.86
    crit: notable
    desc: Uses Win32 file mapping in source
    for:
      - c
    if:
      type: string_literal
      regex: (CreateFileMapping[AW]|MapViewOfFile|UnmapViewOfFile)
  - id: create-file-w-source
    conf: 0.72
    crit: component
    desc: Uses CreateFileW in source
    for:
      - c
    if:
      type: string_literal
      substr: CreateFileW
  - id: create-file-mapping-w
    desc: Create a named file-mapping object (wide)
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: CreateFileMappingW
  - id: create-file-mapping-w-import
    desc: CreateFileMappingW API call
    crit: component
    if:
      type: text
      word: CreateFileMappingW
  - id: map-view-of-file
    desc: Map a file section into memory
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: MapViewOfFile
composite_rules:
  - id: ntdll-image-remap-cluster
    desc: NTDLL image remap API cluster
    crit: suspicious
    conf: 0.9
    attack: T1027
    mbc: B0032
    all:
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: create-file-mapping-w
      - id: map-view-of-file
      - id: micro-behaviors/os/module/load::get-module-handle-ansi
      - id: micro-behaviors/process/enumerate/psapi::k32-get-module-information
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/inject/dll::write-process-memory
      - id: micro-behaviors/process/inject/runtime::read-process-memory
      - id: micro-behaviors/process/inject/dll::create-remote-thread
    unless:
      - id: metadata/binary/metrics::many-imports-100
      - id: metadata/binary/metrics::many-exports-100
  - id: win32-file-mapping-source-cluster
    desc: File mapping infection workflow in source
    crit: notable
    conf: 0.9
    any:
      - id: win32-file-mapping-source
      - id: create-file-w-source
    downgrade:
      any:
        - id: metadata/library/python-runtime::python-runtime
