defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: win32-file-mapping
    conf: 0.8
    crit: baseline
    desc: Uses Windows API for file mapping
    if:
      type: raw
      regex: "(CreateFileMapping[AW]|MapViewOfFile|UnmapViewOfFile)"
  - id: win32-file-mapping-source
    conf: 0.86
    crit: notable
    desc: Uses Win32 file mapping in source
    for: [c]
    if:
      type: string_value
      regex: "(CreateFileMapping[AW]|MapViewOfFile|UnmapViewOfFile)"
  - id: create-file-w-source
    conf: 0.72
    crit: component
    desc: Uses CreateFileW in source
    for: [c]
    if:
      type: string_value
      substr: "CreateFileW"
  - id: ntdll-image-remap-cluster
    desc: NTDLL image remap API cluster
    crit: suspicious
    conf: 0.9
    attack: "T1027"
    mbc: "B0032"
    if:
      type: import_combination
      required:
        - "^CreateFileA$"
        - "^CreateFileMappingW$"
        - "^MapViewOfFile$"
        - "^GetModuleHandleA$"
        - "^K32GetModuleInformation$"
      suspicious:
        - "^VirtualAlloc$"
        - "^VirtualProtect$"
        - "^memcpy$"
        - "^VirtualProtectEx$"
        - "^WriteProcessMemory$"
        - "^ReadProcessMemory$"
        - "^CreateRemoteThread(Ex)?$"
      min_suspicious: 1
    unless:
      - type: metrics
        field: binary.import_count
        min: 120
      - type: metrics
        field: binary.export_count
        min: 500
composite_rules:
  - id: win32-file-mapping-source-cluster
    desc: File mapping infection workflow in source
    crit: notable
    conf: 0.9
    any:
      - id: win32-file-mapping-source
      - id: create-file-w-source
    downgrade:
      any:
        - id: metadata/library/python-runtime::python-runtime
