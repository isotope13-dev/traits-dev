defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: mmap64-fn
    desc: Maps files or devices into memory
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: mmap64
  - id: munmap
    desc: Unmap files from memory
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: munmap
  - id: munmap-import
    desc: Unmap memory import (munmap)
    crit: baseline
    conf: 0.9
    if:
      type: import
      regex: '^_?munmap$'
composite_rules:
  - id: mmap
    desc: Maps files or devices into memory
    crit: baseline
    conf: 0.66
    any:
      - id: micro-behaviors/mem/alloc/executable::mmap-symbol
      - id: mmap64-fn
