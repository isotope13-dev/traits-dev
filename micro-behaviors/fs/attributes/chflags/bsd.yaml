# BSD/macOS file flags (chflags) — the parallel of Linux chattr. Sets flags
# such as immutable (schg/uchg) and append-only (sappnd/uappnd). Neutral
# capability: backup tools, package managers, and hardening scripts set flags;
# tamper/anti-forensics code clears them to modify protected files and re-sets
# them afterward. Intent lives in objectives composites.
# MBC: F0004  ATT&CK: T1222.002
defaults:
  platforms: [unix]
  for: [c, cpp, scripts, binaries]
  attack: T1222.002
  mbc: F0004
traits:
  - id: chflags-call
    desc: chflags file-flags API call
    crit: notable
    conf: 0.8
    for: [c, cpp]
    if:
      type: symbol
      kind: call
      exact: chflags
  - id: chflags-command
    desc: chflags command to modify file flags
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \bchflags\s+[\w,]{1,40}\s
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: chflags-clear-flags
    desc: chflags clears all file flags (0/none)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bchflags\s+(0|no\w+)\b
  - id: go-syscall-chflags-call
    desc: Go calls syscall.Chflags
    crit: notable
    conf: 0.9
    platforms: [freebsd, unix]
    for: [go]
    if:
      type: symbol
      kind: call
      exact: syscall.Chflags
