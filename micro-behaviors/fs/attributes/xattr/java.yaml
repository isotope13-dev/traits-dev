defaults:
  platforms: [macos]
  for: [java, class]
  crit: notable
  conf: 0.9

traits:
  - id: java-quarantine-xattr-command
    desc: Java references quarantine removal xattr command
    for: [java]
    if:
      type: text
      regex: 'xattr.{0,80}-d.{0,80}com\.apple\.quarantine'

  - id: java-strip-quarantine-helper
    desc: Java references quarantine-removal helper name
    if:
      type: text
      substr: stripQuarantine

  - id: java-quarantine-attribute-reference
    desc: Java references macOS quarantine attribute
    if:
      type: text
      substr: com.apple.quarantine

  - id: jvm-quarantine-attribute-constant
    desc: JVM class quarantine attribute constant
    for: [class]
    if:
      type: hex
      pattern: 63 6F 6D 2E 61 70 70 6C 65 2E 71 75 61 72 61 6E 74 69 6E 65

  - id: jvm-strip-quarantine-constant
    desc: Java class contains quarantine-removal constant
    for: [class]
    if:
      type: hex
      pattern: 73 74 72 69 70 51 75 61 72 61 6E 74 69 6E 65
