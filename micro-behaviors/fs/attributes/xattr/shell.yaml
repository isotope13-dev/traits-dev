defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
    - macho
traits:
  - id: xattr-clear
    desc: xattr -c (clear all extended
    crit: suspicious
    conf: 0.7
    mbc: E1222
    attack: T1222
    if:
      type: text
      regex: \bxattr\b\s+-[rsvx]*c[rsvx]*\b
  - id: xattr-delete
    desc: xattr -d (delete specific attribute)
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    if:
      type: text
      regex: xattr\s+-d\b
  - id: xattr-write
    desc: xattr -w (write attribute value)
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    if:
      type: text
      regex: xattr\s+-w\b
  - id: setfattr-command
    desc: setfattr command (set extended attributes)
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    platforms:
      - linux
    if:
      type: text
      regex: setfattr\s+-n\s+
  - id: xattr-quarantine-remove-1
    desc: xattr -d -r -s com.apple.quarantine
    crit: notable
    conf: 1.0
    if:
      type: string_literal
      substr: xattr -d -r -s com.apple.quarantine
  - id: xattr-quarantine-remove-2
    desc: xattr -d -r com.apple.quarantine (legitimate
    crit: notable
    conf: 1.0
    if:
      type: string_literal
      substr: xattr -d -r com.apple.quarantine
composite_rules:
  - id: xattr-patterns
    desc: xattr command patterns (clear, delete,
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    any:
      - id: xattr-clear
      - id: xattr-delete
      - id: xattr-write
  - id: xattr-command
    desc: Modify extended filesystem attributes (excludes
    crit: notable
    conf: 0.66
    mbc: E1222
    attack: T1222
    all:
      - id: xattr-patterns
    unless:
      - id: xattr-quarantine-remove-1
      - id: xattr-quarantine-remove-2
