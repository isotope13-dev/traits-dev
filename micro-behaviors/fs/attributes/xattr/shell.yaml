defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
    - macho
traits:
  - id: xattr-clear
    desc: xattr clears all extended attributes
    # Retain a suspicious default because clearing all attributes can remove
    # provenance/quarantine metadata. A local copy followed by chmod is the
    # recognizable release-installer shape and is de-emphasized below; the
    # Gatekeeper composite still records the combined behavior.
    crit: suspicious
    conf: 0.9
    mbc: E1222
    attack: T1222
    if:
      type: text
      regex: \bxattr\b\s+-[rsvx]*c[rsvx]*\b
    unless:
      # PyInstaller packaging scripts commonly clear inherited macOS metadata
      # from the freshly built release binary before publishing it.
      - id: metadata/build/package::pyinstaller-build-command
    downgrade:
      all:
        - id: micro-behaviors/fs/shell-ops::cp-command
        - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
  - id: xattr-delete
    desc: xattr -d (delete specific attribute)
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    if:
      type: text
      regex: xattr\s+-d\b
  - id: xattr-write
    desc: xattr -w (write attribute value)
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    if:
      type: text
      regex: xattr\s+-w\b
  - id: setfattr-command
    desc: setfattr command (set extended attributes)
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    platforms:
      - linux
    if:
      type: text
      regex: setfattr\s+-n\s+
  - id: xattr-quarantine-remove-1
    desc: xattr -d -r -s com.apple.quarantine
    crit: notable
    conf: 1.0
    if:
      type: string_literal
      substr: xattr -d -r -s com.apple.quarantine
  - id: xattr-quarantine-remove-2
    desc: xattr removes quarantine marker
    crit: notable
    conf: 1.0
    if:
      type: string_literal
      substr: xattr -d -r com.apple.quarantine
  - id: xattr-recursive-quarantine-remove
    desc: Recursively removes macOS quarantine attribute
    crit: notable
    conf: 0.95
    mbc: B0047
    attack: T1553.001
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '\bxattr\s+-r?d\b[\s\S]{0,80}com\.apple\.quarantine\b'
  - id: xattr-clear-local-file
    desc: xattr clears local file metadata
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '\bxattr\s+-c\s+\./[A-Za-z0-9._-]+'
  - id: xattr-clear-tmp-file
    desc: xattr clears /tmp file metadata
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '\bxattr\s+-c\s+/tmp/[A-Za-z0-9._-]+'
composite_rules:
  - id: xattr-patterns
    desc: xattr command modifies attributes
    crit: notable
    conf: 0.7
    mbc: E1222
    attack: T1222
    any:
      - id: xattr-clear
      - id: xattr-delete
      - id: xattr-write
  - id: xattr-command
    desc: Modify extended file attributes
    crit: notable
    conf: 0.66
    mbc: E1222
    attack: T1222
    all:
      - id: xattr-patterns
    unless:
      - id: xattr-quarantine-remove-1
      - id: xattr-quarantine-remove-2
