defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: chattr-command
  desc: chattr command to modify file
  crit: notable
  conf: 0.66
  mbc: F0004
  attack: T1222
  if:
    type: text
    regex: chattr [-\+][\w\- ]{0,32} [\w\.\/]{0,64}
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: chattr-immutable
  desc: Modify immutability of a file
  crit: notable
  conf: 0.66
  mbc: F0004
  attack: T1222
  if:
    type: text
    regex: 'chattr [-\+][ia]*i[ia]* '
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: chattr-immutable-sys
  - type: text
    substr: /var/lib/nordvpn/data/
- id: chattr-immutable-sys
  desc: chattr -i /sys (legitimate system
  crit: baseline
  conf: 1.0
  if:
    type: text
    substr: chattr -i /sys
- id: chattr-recursive-immutable-1
  desc: chattr -R -i (recursive remove
  crit: notable
  conf: 0.7
  mbc: F0004
  attack: T1222
  if:
    type: text
    substr: 'chattr -R -i '
- id: chattr-recursive-immutable-2
  desc: chattr -Ri (recursive remove immutable,
  crit: notable
  conf: 0.7
  mbc: F0004
  attack: T1222
  if:
    type: text
    substr: 'chattr -Ri '
- id: chattr-recursive-immutable-3
  desc: chattr -iR (recursive remove immutable,
  crit: notable
  conf: 0.7
  mbc: F0004
  attack: T1222
  if:
    type: text
    substr: 'chattr -iR '
- id: chattr-recursive-immutable-4
  desc: chattr -i -R (recursive remove
  crit: notable
  conf: 0.7
  mbc: F0004
  attack: T1222
  if:
    type: text
    substr: 'chattr -i -R '
composite_rules:
- id: chattr-immutable-recursive
  desc: Recursively remove immutability of a
  crit: suspicious
  conf: 0.66
  mbc: F0004
  attack: T1222
  any:
  - id: chattr-recursive-immutable-1
  - id: chattr-recursive-immutable-2
  - id: chattr-recursive-immutable-3
  - id: chattr-recursive-immutable-4
