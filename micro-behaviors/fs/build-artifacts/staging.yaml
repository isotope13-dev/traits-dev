# Neutral build-output staging operations.  The operation itself is ordinary
# build activity; supply-chain intent is inferred by objective composites that
# combine it with an untrusted download or another attack-specific signal.
defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: mv-dist-build
    desc: Moves files into dist or build output
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'mv\s.{0,50}(^|[\s"''/=>])(dist|build)/.{0,30}(\.|$)'
  - id: cp-dist-build
    desc: Copies files into dist or build output
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'cp\s.{0,50}(^|[\s"''/=>])(dist|build)/.{0,30}(\.|$)'
  - id: cat-dist-build
    desc: Redirects data into dist or build output
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'cat\s*>.{0,50}(^|[\s"''/=>])(dist|build)/.{0,30}(\.|$)'
  - id: mv-out-target
    desc: Moves files into out or target output
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\bmv\s+[^;&|\n]{1,100}\s+\.?/?(out|target)[/.\s]'
  - id: cp-out-target
    desc: Copies files into out or target output
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\bcp\s+[^;&|\n]{1,100}\s+\.?/?(out|target)[/.\s]'
  - id: cat-out-target
    desc: Redirects data into out or target output
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'cat\s*>.{0,50}(out|target)/.{0,30}(\.|$)'

composite_rules:
  - id: stage-dist-build
    desc: Stages files in dist or build output
    crit: notable
    conf: 0.7
    any:
      - id: mv-dist-build
      - id: cp-dist-build
      - id: cat-dist-build
  - id: stage-out-target
    desc: Stages files in out or target output
    crit: notable
    conf: 0.7
    any:
      - id: mv-out-target
      - id: cp-out-target
      - id: cat-out-target
