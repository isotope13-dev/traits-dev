# Build-artifact / copy-tool context markers.
# These are neutral "does this file look like a build script or copy tool?"
# signals, relocated from objectives/impact/wipe/disk/mass-delete so that
# benign-build-or-copy-context can live in micro-behaviors/ (objectives/ tier
# banned from does-nothing fixtures).
defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
traits:
- id: copy-complete-message
  desc: Copy completion status message
  crit: component
  if:
    type: text
    substr: Copy complete!
- id: copy-create-file-message
  desc: Copy create file status
  crit: component
  if:
    type: text
    regex: '(Copy|Create) (File|Directory)\b'
- id: package-build-message
  desc: Package build status message
  crit: component
  if:
    type: text
    substr: Building package
- id: make-install-clean-command
  desc: Make install clean command
  crit: component
  if:
    type: text
    regex: make (install|clean)
- id: compiled-artifact-cleanup
  desc: Deletes only compiled/cache build artifacts
  crit: component
  if:
    type: text
    regex: (__pycache__|\.pytest_cache|\.tox\b|\*\.py[co])
- id: build-walk-cleanup
  desc: Build artifact cleanup via directory walk
  crit: component
  for: [python]
  if:
    type: text
    regex: os\.walk\s*\(\s*["']\.?/?(build|dist|out|target)["']\s*\)
- id: python-package-cleanup-module
  desc: Python package cleanup module filename
  crit: component
  for: [python]
  if:
    type: path
    basename: true
    regex: '(^|_)(req_install|req_uninstall|uninstall)\.py$'
- id: adjacent-tempfile-helper
  desc: Adjacent temporary file helper
  crit: component
  for: [python]
  if:
    type: text
    substr: def adjacent_tmp_file(
- id: unittest-testcase-context
  desc: unittest TestCase cleanup context
  crit: component
  for: [python]
  if:
    type: text
    regex: \b(unittest\.TestCase|tearDown|addCleanup|ignore_errors=True)\b
- id: build-bootstrap-script-basename
  desc: Build bootstrap or tarball script basename
  crit: component
  for: [shell, makefile, python]
  if:
    type: path
    basename: true
    regex: '(^|[\\/])(autogen\.sh|bootstrap|mksrctar\.sh)$'
- id: generation-cache-cleanup-context
  desc: Code generation cache cleanup context
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'GenerationCache|cache file deletion|deleteFileNonBlocking'
- id: build-output-prune-context
  desc: Build output pruning context
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'Remove unused|removeUnused|distDir'
- id: meson-dist-cleanup-context
  desc: Meson dist cleanup context
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: 'MESON_(PROJECT_)?DIST_ROOT|meson\.add_dist_script'
- id: telemetry-session-cleanup-context
  desc: Telemetry session cleanup context
  crit: component
  for: [javascript, typescript]
  if:
    type: text
    regex: 'SESSION_MAX_AGE_MS|Prune session files|pruneStaleSessionFiles'
- id: session-cleanup-vars
  desc: Session cleanup variables context
  crit: component
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)(sessions?Dir|sessionFile)'
- id: cdk-nodejs-bundling-cleanup-context
  desc: CDK Node.js bundling cleanup context
  crit: component
  for: [javascript, typescript]
  if:
    type: text
    substr: NodejsFunction#tryBundle
- id: package-build-tool-context--pkgmk
  desc: Package build tool context (pkgmk)
  crit: component
  if:
    type: text
    word: pkgmk
- id: package-build-tool-context--pkgproto
  desc: Package build tool context (pkgproto)
  crit: component
  if:
    type: text
    word: pkgproto
- id: package-build-tool-context--destdir
  desc: Package build tool context (DESTDIR)
  crit: component
  if:
    type: text
    word: DESTDIR
- id: android-build-dir-cleanup-context--class-dir
  desc: Android build directory cleanup (class_dir)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: class_dir
- id: android-build-dir-cleanup-context--flat-dir
  desc: Android build directory cleanup (flat_dir)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: flat_dir
- id: android-build-dir-cleanup-context--arch-dir
  desc: Android build directory cleanup (arch_dir)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: arch_dir
- id: android-build-tool-cleanup-context--android-jar
  desc: Android build tool cleanup context (android_jar)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: android_jar
- id: android-build-tool-cleanup-context--aapt2
  desc: Android build tool cleanup context (aapt2)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: aapt2
- id: android-build-tool-cleanup-context--d8
  desc: Android build tool cleanup context (d8)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: d8
- id: android-build-tool-cleanup-context--javac
  desc: Android build tool cleanup context (javac)
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    word: javac
composite_rules:
- id: package-build-tool-context
  desc: Package build tool context
  crit: component
  any:
  - id: package-build-tool-context--pkgmk
  - id: package-build-tool-context--pkgproto
  - id: package-build-tool-context--destdir
- id: android-build-dir-cleanup-context
  desc: Android build directory cleanup context
  crit: component
  conf: 0.9
  for: [python]
  any:
  - id: android-build-dir-cleanup-context--class-dir
  - id: android-build-dir-cleanup-context--flat-dir
  - id: android-build-dir-cleanup-context--arch-dir
- id: android-build-tool-cleanup-context
  desc: Android build tool cleanup context
  crit: component
  conf: 0.9
  for: [python]
  any:
  - id: android-build-tool-cleanup-context--android-jar
  - id: android-build-tool-cleanup-context--aapt2
  - id: android-build-tool-cleanup-context--d8
  - id: android-build-tool-cleanup-context--javac
- id: benign-build-or-copy-context
  desc: Benign build or copy context
  crit: component
  any:
  - id: micro-behaviors/fs/build-artifacts::adjacent-tempfile-helper
  - id: micro-behaviors/fs/build-artifacts::android-build-dir-cleanup-context--arch-dir
  - id: micro-behaviors/fs/build-artifacts::android-build-dir-cleanup-context--class-dir
  - id: micro-behaviors/fs/build-artifacts::android-build-dir-cleanup-context--flat-dir
  - id: micro-behaviors/fs/build-artifacts::android-build-tool-cleanup-context--aapt2
  - id: micro-behaviors/fs/build-artifacts::android-build-tool-cleanup-context--android-jar
  - id: micro-behaviors/fs/build-artifacts::android-build-tool-cleanup-context--d8
  - id: micro-behaviors/fs/build-artifacts::android-build-tool-cleanup-context--javac
  - id: micro-behaviors/fs/build-artifacts::build-bootstrap-script-basename
  - id: micro-behaviors/fs/build-artifacts::build-output-prune-context
  - id: micro-behaviors/fs/build-artifacts::build-walk-cleanup
  - id: micro-behaviors/fs/build-artifacts::cdk-nodejs-bundling-cleanup-context
  - id: micro-behaviors/fs/build-artifacts::compiled-artifact-cleanup
  - id: micro-behaviors/fs/build-artifacts::copy-complete-message
  - id: micro-behaviors/fs/build-artifacts::copy-create-file-message
  - id: micro-behaviors/fs/build-artifacts::generation-cache-cleanup-context
  - id: micro-behaviors/fs/build-artifacts::make-install-clean-command
  - id: micro-behaviors/fs/build-artifacts::meson-dist-cleanup-context
  - id: micro-behaviors/fs/build-artifacts::package-build-message
  - id: micro-behaviors/fs/build-artifacts::package-build-tool-context--destdir
  - id: micro-behaviors/fs/build-artifacts::package-build-tool-context--pkgmk
  - id: micro-behaviors/fs/build-artifacts::package-build-tool-context--pkgproto
  - id: micro-behaviors/fs/build-artifacts::python-package-cleanup-module
  - id: micro-behaviors/fs/build-artifacts::session-cleanup-vars
  - id: micro-behaviors/fs/build-artifacts::telemetry-session-cleanup-context
  - id: micro-behaviors/fs/build-artifacts::unittest-testcase-context
  - id: micro-behaviors/fs/volume/umount::umount-command-reference
  - id: micro-behaviors/fs/log-rotation::log-rotation-cleanup-context
  - id: micro-behaviors/fs/log-rotation::log-rotation-cleanup-context-js
  - id: well-known/app/context::akm-config-backup-pruning
