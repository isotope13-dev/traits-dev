defaults:
  platforms: [linux, macos]
  for: [applescript, shell, javascript, typescript]
  crit: component
traits:
- id: locate-token
  desc: locate file-search command token
  if:
    type: text
    substr: locate
    case_insensitive: true
- id: grep-keyword
  desc: grep command keyword
  conf: 0.7
  if:
    type: text
    word: grep
