defaults:
  platforms: [linux, macos]
  for: [applescript, shell, javascript, typescript]
  crit: component
traits:
- id: locate-token
  desc: locate file-search command token
  for: [shell, applescript]
  if:
    type: text
    word: locate
    case_insensitive: true
- id: grep-keyword
  desc: Contains the grep command keyword
  conf: 0.7
  if:
    type: text
    word: grep
- id: grep-invert
  desc: grep -v inverse match/filter
  conf: 0.6
  if:
    type: text
    regex: grep\s+-v
- id: js-env-file-finder-helper
  desc: JavaScript dotenv finder helper
  for: [javascript, typescript]
  platforms: [unix, windows]
  if:
    type: text
    regex: "find.{0,10}[Ee]nv.{0,10}[Ff]ile"
composite_rules:
- id: js-env-file-search
  desc: JavaScript enumerates dotenv configuration files
  crit: notable
  conf: 0.88
  for: [javascript, typescript]
  platforms: [unix, windows]
  near_bytes: 500
  all:
  - id: js-env-file-finder-helper
  - id: micro-behaviors/fs/path/config/environment::env-file-path
