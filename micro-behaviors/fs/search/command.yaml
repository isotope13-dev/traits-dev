defaults:
  platforms: [linux, macos]
  for: [applescript, shell, javascript, typescript]
  crit: component
traits:
- id: locate-token
  desc: locate file-search command token
  for: [shell, applescript]
  if:
    type: text
    word: locate
    case_insensitive: true
- id: grep-keyword
  desc: grep command keyword
  conf: 0.7
  if:
    type: text
    word: grep
- id: grep-invert
  desc: grep -v inverse match/filter
  conf: 0.6
  if:
    type: text
    regex: grep\s+-v
