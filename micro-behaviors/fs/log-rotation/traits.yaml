# Log retention / rotation cleanup markers.
#
# Deleting or rotating old log files is benign housekeeping found in countless
# legitimate programs (logging libraries, services, build tooling), so these are
# neutral filesystem-maintenance capabilities — NOT disk-wipe / mass-delete
# intent. They live here per the taxonomy's "Matcher Defines Identity" rule
# (each matcher only detects a log-rotation symbol or phrase). The benign-context
# composites in objectives/impact/wipe/disk/mass-delete reference them
# cross-directory to SUPPRESS mass-delete false positives.
defaults:
  platforms: [windows, linux, macos]
  for: [scripts, binaries]
traits:
  - id: cleanup-old-logs
    desc: cleanupOldLogs log retention helper
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: cleanupOldLogs
  - id: app-log-file
    desc: App log file retention helper
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: isAppLogFile
  - id: rotation-phrase
    desc: Log rotation cleanup phrase
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: log rotation
  - id: clean-old-logs
    desc: cleanOldLogs log retention helper
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: cleanOldLogs
  - id: logrotate
    desc: LogRotate log retention marker
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: LogRotate
  - id: rotate-file
    desc: rotateFile log retention helper
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: rotateFile
composite_rules:
  - id: log-rotation-cleanup-context
    desc: Log rotation cleanup context
    crit: component
    conf: 0.85
    any:
    - id: cleanup-old-logs
    - id: app-log-file
    - id: rotation-phrase
  - id: log-rotation-cleanup-context-js
    desc: JavaScript log rotation cleanup context
    crit: component
    conf: 0.85
    any:
    - id: clean-old-logs
    - id: logrotate
    - id: rotate-file
