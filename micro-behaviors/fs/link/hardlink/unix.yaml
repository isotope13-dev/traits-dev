defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: hardlink
    desc: Create hard file links
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: ^_?(link|linkat)$
  - id: create-hardlink-api
    desc: Windows hard-link creation API
    crit: baseline
    conf: 0.82
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      regex: '^CreateHardLink[AW]?$'
