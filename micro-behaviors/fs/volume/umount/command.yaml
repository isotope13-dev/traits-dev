# Text reference to the `umount` command in shell/scripts. Neutral filesystem
# volume management (core to mounters, installers, FUSE drivers). Objective
# composites reference this cross-directory.
defaults:
  platforms: [linux, macos]
  for: [shell, scripts, text]
traits:
  - id: umount-command-reference
    desc: Unmount command reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: umount
