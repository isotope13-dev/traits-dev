defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: umount-fn
    desc: Unmount file system
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: umount
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: umount2-fn
    desc: Unmount file system
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: umount2
