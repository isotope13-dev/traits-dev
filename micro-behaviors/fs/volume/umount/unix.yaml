defaults:
  platforms: [unix]
  for: [elf, macho, c]
traits:
  - id: umount-fn
    desc: Unmount file system
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: umount
  - id: umount2-fn
    desc: Unmount file system
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: umount2
composite_rules:
  - id: umount
    desc: Unmount file system
    crit: notable
    conf: 0.66
    any:
      - id: umount-fn
      - id: umount2-fn
