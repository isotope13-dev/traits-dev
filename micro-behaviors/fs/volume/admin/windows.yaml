defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  # Specialised volume-admin APIs.  Most user programs never touch these —
  # seeing one appear in a supply-chain diff is a strong purpose-change
  # signal, so these are notable rather than baseline.
  - id: set-volume-label-w
    desc: Rename a volume label
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: SetVolumeLabelW
  - id: delete-volume-mount-point-w
    desc: Remove a volume mount point
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: DeleteVolumeMountPointW
