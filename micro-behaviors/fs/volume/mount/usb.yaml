defaults:
  platforms: [unix, ios]
  for: [binaries, scripts]

traits:
  - id: usb-device-sysfs-path
    desc: USB device sysfs path
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: /sys/bus/usb/devices

  - id: ios-media-directory
    desc: iOS media directory path
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /private/var/mobile/Media
