defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
  mbc: E1222
  attack: T1222
traits:
  - id: mount-keyword
    desc: References filesystem mounting
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: mount
  - id: fstab-file
    desc: References the fstab filesystem table
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: fstab
  - id: remount-keyword
    desc: remount keyword (remount filesystem)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: remount
composite_rules:
  - id: mount-context
    desc: References filesystem mounting commands or configuration
    crit: notable
    conf: 0.6
    any:
      - id: fstab-file
      - id: remount-keyword
  - id: mount-command
    desc: Shell combines mount with fstab/remount
    crit: notable
    conf: 0.66
    all:
      - id: mount-keyword
      - id: mount-context
