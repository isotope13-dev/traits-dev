defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
  mbc: E1222
  attack: T1222
traits:
  - id: mount-keyword
    desc: References filesystem mounting
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: mount
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: fstab-file
    desc: References the fstab filesystem table
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: fstab
  - id: remount-keyword
    desc: remount keyword (remount filesystem)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: remount
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pseudo-filesystem-mount-command
    desc: Mounts devpts or tmpfs pseudo-filesystem
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*mount\s+-t\s+(devpts|tmpfs)\s+\S+\s+/dev/(pts|shm)\b'
composite_rules:
  - id: mount-context
    desc: References filesystem mounting commands or configuration
    crit: notable
    conf: 0.6
    any:
      - id: fstab-file
      - id: remount-keyword
  - id: mount-command
    desc: Shell combines mount with fstab/remount
    crit: notable
    conf: 0.66
    all:
      - id: mount-keyword
      - id: mount-context
