defaults:
  platforms: [unix]
  for: [binaries, source]
traits:
  - id: mount-underscore
    desc: Mount file systems
    crit: notable
    conf: 0.66
    for: [scripts, binaries]
    if:
      type: symbol
      exact: _mount
  - id: mount-fn
    desc: Mount file systems
    crit: notable
    conf: 0.66
    for: [scripts, binaries]
    if:
      type: symbol
      exact: mount
composite_rules:
  - id: mount
    desc: Mount file systems
    crit: notable
    conf: 0.66
    any:
      - id: mount-underscore
      - id: mount-fn
