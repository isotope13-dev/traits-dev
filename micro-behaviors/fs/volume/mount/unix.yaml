defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: mount-underscore
    desc: Mount file systems
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: _mount
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: mount-fn
    desc: Mount file systems
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: mount
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: mount
    desc: Mount file systems
    crit: notable
    conf: 0.66
    any:
      - id: mount-underscore
      - id: mount-fn
