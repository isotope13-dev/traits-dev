defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: etc-fstab
    desc: /etc/fstab mount table file
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: /etc/fstab
  - id: etc-mtab
    desc: /etc/mtab mount table file
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: /etc/mtab
  - id: setmntent
    desc: Open mount table for parsing
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: setmntent
  - id: getmntent
    desc: Read mount table entry
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: getmntent
  - id: endmntent
    desc: Parse mount table entries via
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: endmntent
  - id: fstab-mntinfo
    desc: Get information on mounted volumes
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: getmntinfo
composite_rules:
  - id: fstab-files
    desc: Reads mount table files (/etc/fstab,
    crit: baseline
    conf: 0.66
    any:
      - id: etc-fstab
      - id: etc-mtab
  - id: fstab-mntent
    desc: Parse mount table entries via mntent API
    crit: baseline
    conf: 0.66
    any:
      - id: setmntent
      - id: getmntent
      - id: endmntent
