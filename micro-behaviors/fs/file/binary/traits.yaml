defaults:
  platforms:
  - linux
  - macos
  - windows
  attack: T1005
  crit: baseline
traits:
- id: write-binary
  desc: Opens file in binary write
  crit: baseline
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    regex: \\b"wb"\\b|\\bfopen\\s*\\(.{1,220},\\s*"wb"\\)
- id: write-read-binary
  desc: Opens file in binary write+read
  crit: baseline
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    regex: \\b"w\\+b"\\b|\\bfopen\\s*\\(.{1,220},\\s*"w\\+b"\\)
- id: read-write-binary
  desc: Opens file in binary read+write
  crit: baseline
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    regex: \\b"r\\+b"\\b|\\bfopen\\s*\\(.{1,220},\\s*"r\\+b"\\)
- id: read-binary
  desc: Opens file in binary read
  crit: baseline
  conf: 0.5
  for: [scripts, binaries]
  if:
    type: text
    regex: \\b"rb"\\b|\\bfopen\\s*\\(.{1,220},\\s*"rb"\\)
- id: fcopyfile-macos
  desc: Copies files on macOS using
  crit: notable
  conf: 0.7
  platforms:
  - macos
  for:
  - macho
  if:
    type: symbol
    substr: fcopyfile
- id: fseek-func
  desc: Seeks to position in file
  crit: baseline
  conf: 0.4
  for: [elf, macho, pe]
  if:
    type: symbol
    substr: fseek
- id: file-manipulation-cond-0--inline-18739
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [binaries]
  if:
    type: metrics
    field: binary.import_count
    min: 80
  count_max: 1018740
composite_rules:
- id: binary-read-write-ops
  desc: Binary file read/write operations
  crit: notable
  conf: 0.7
  needs: 2
  any:
  - id: write-binary
  - id: write-read-binary
  - id: read-write-binary
  - id: read-binary
  - id: fseek-func
- id: file-manipulation
  desc: File content manipulation (read/write/seek)
  crit: notable
  conf: 0.75
  all:
  - id: fseek-func
  any:
  - id: micro-behaviors/fs/file/read/
  - id: micro-behaviors/fs/file/write::write
  - id: binary-read-write-ops
  downgrade:
    any:
    - id: file-manipulation-cond-0--inline-18739
