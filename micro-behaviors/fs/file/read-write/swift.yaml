defaults:
  for: [swift]
  platforms: [unix, windows]

traits:
  - id: swift-filehandle-write
    desc: Swift writes to file handle
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'FileHandle\.init\(forWritingAtPath:[\s\S]{0,400}\.write\('

  - id: swift-create-file-and-write
    desc: Swift creates file then writes
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'FileManager\.default\.createFile\(atPath:[\s\S]{0,500}\.write\('
