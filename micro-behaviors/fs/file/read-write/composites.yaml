defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]
composite_rules:
  - id: binary-file-ops
    desc: Generic file read/write operations
    crit: baseline
    conf: 0.8
    any:
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/open::open-base
      - id: micro-behaviors/fs/file/read/
      - id: micro-behaviors/fs/file/write/direct::write
  - id: file-overwrite-routine
    desc: In-place file overwrite routine
    crit: baseline
    conf: 0.72
    for: [macho]
    platforms: [macos]
    all:
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/read::fread
      - id: micro-behaviors/fs/file/write/direct::write
      - id: micro-behaviors/fs/file/binary::fseek-func
  - id: legacy-win32-file-rewrite
    desc: Legacy Win32 file rewrite APIs
    crit: notable
    conf: 0.9
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: micro-behaviors/fs/file/open::legacy-lopen
      - id: micro-behaviors/fs/file/read::legacy-lread
      - id: micro-behaviors/fs/file/write/direct::lwrite
      - id: micro-behaviors/fs/file/handle::legacy-llseek
    any:
      - id: micro-behaviors/fs/file/open::legacy-lcreat
      - id: micro-behaviors/fs/sync/fsync::set-file-time
