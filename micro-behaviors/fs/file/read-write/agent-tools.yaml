defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
  conf: 0.88

traits:
  - id: agent-read-file-tool
    desc: Agent read_file tool
    if:
      type: string_literal
      exact: read_file

  - id: agent-write-file-tool
    desc: Agent write_file tool
    if:
      type: string_literal
      exact: write_file

  - id: agent-edit-file-tool
    desc: Agent edit_file tool
    if:
      type: string_literal
      exact: edit_file

  - id: agent-delete-file-tool
    desc: Agent delete_file tool
    if:
      type: string_literal
      exact: delete_file
  # Python function-definition matchers: a `def read_file(`/`def write_file(`
  # pair is a generic file-helper API (RPA, build tooling, file managers all use
  # these names), so these describe the plain capability, not an "agent" tool.
  # The agent-tool interpretation comes from the JS string-literal tool
  # registrations above and the guarded composite below (project-root / approval
  # guards are agent-framework-specific).
  - id: python-agent-read-file-tool
    desc: Python read_file function defined
    for: [python]
    if:
      type: text
      regex: '\bdef\s+read_file\s*\('
  - id: python-agent-write-file-tool
    desc: Python write_file function defined
    for: [python]
    if:
      type: text
      regex: '\bdef\s+write_file\s*\('
  - id: python-agent-edit-file-tool
    desc: Python edit_file function defined
    for: [python]
    if:
      type: text
      regex: '\bdef\s+edit_file\s*\('
  - id: python-agent-search-files-tool
    desc: Python search_files function defined
    for: [python]
    if:
      type: text
      regex: '\bdef\s+search_files\s*\('

  - id: project-root-safe-path
    desc: Project root path guard
    if:
      type: text
      substr: "Path escapes project root"

  - id: user-approval-required
    desc: User approval required flag
    if:
      type: text
      substr: "requires_approval: true"

composite_rules:
  - id: agent-file-tools
    desc: File read/write/edit tool functions defined
    crit: notable
    conf: 0.93
    for: [javascript, typescript, python]
    needs: 2
    any:
      - id: agent-read-file-tool
      - id: agent-write-file-tool
      - id: agent-edit-file-tool
      - id: agent-delete-file-tool
      - id: python-agent-read-file-tool
      - id: python-agent-write-file-tool
      - id: python-agent-edit-file-tool
      - id: python-agent-search-files-tool
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/

  - id: guarded-agent-file-tools
    desc: Guarded agent file tools
    crit: notable
    conf: 0.94
    for: [javascript, typescript, python]
    all:
      - id: agent-file-tools
    any:
      - id: project-root-safe-path
      - id: user-approval-required
