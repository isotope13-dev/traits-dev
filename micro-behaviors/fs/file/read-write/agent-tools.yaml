defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, python]
  crit: component
  conf: 0.88

traits:
  - id: agent-read-file-tool
    desc: Agent read_file tool
    if:
      type: string_literal
      exact: read_file

  - id: agent-write-file-tool
    desc: Agent write_file tool
    if:
      type: string_literal
      exact: write_file

  - id: agent-edit-file-tool
    desc: Agent edit_file tool
    if:
      type: string_literal
      exact: edit_file

  - id: agent-delete-file-tool
    desc: Agent delete_file tool
    if:
      type: string_literal
      exact: delete_file
  - id: agent-list-directory-tool
    desc: Agent list-directory tool
    if:
      type: string_literal
      exact: list_dir
  # Python function-definition matchers: a `def read_file(`/`def write_file(`
  # pair is a generic file-helper API (RPA, build tooling, file managers all use
  # these names), so these describe the plain capability, not an "agent" tool.
  # The agent-tool interpretation comes from the JS string-literal tool
  # registrations above and the guarded composite below (project-root / approval
  # guards are agent-framework-specific).
  - id: python-read-file-function
    desc: Defines a Python read_file function
    for: [python]
    if:
      type: text
      regex: '\bdef\s+read_file\s*\('
  - id: python-write-file-function
    desc: Defines a Python write_file function
    for: [python]
    if:
      type: text
      regex: '\bdef\s+write_file\s*\('
  - id: python-edit-file-function
    desc: Defines a Python edit_file function
    for: [python]
    if:
      type: text
      regex: '\bdef\s+edit_file\s*\('
  - id: python-search-files-function
    desc: Defines a Python search_files function
    for: [python]
    if:
      type: text
      regex: '\bdef\s+search_files\s*\('

  - id: python-grep-function
    desc: Defines a Python grep function
    for: [python]
    if:
      type: text
      regex: '\bdef\s+grep\s*\('

  - id: python-create-folder-function
    desc: Defines a Python create_folder function
    for: [python]
    if:
      type: text
      regex: '\bdef\s+create_folder\s*\('

  - id: python-delete-folder-function
    desc: Defines a Python delete_folder function
    for: [python]
    if:
      type: text
      regex: '\bdef\s+delete_folder\s*\('

  - id: project-root-safe-path
    desc: Project root path guard
    if:
      type: text
      substr: "Path escapes project root"

  - id: user-approval-required
    desc: User approval required flag
    if:
      type: text
      substr: "requires_approval: true"

composite_rules:
  - id: agent-file-tools
    desc: File read/write/edit/list tools defined
    crit: notable
    conf: 0.93
    needs: 2
    all:
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
    any:
      - id: agent-read-file-tool
      - id: agent-write-file-tool
      - id: agent-edit-file-tool
      - id: agent-delete-file-tool
      - id: agent-list-directory-tool
      - id: python-read-file-function
      - id: python-write-file-function
      - id: python-edit-file-function
      - id: python-search-files-function
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/

  - id: agent-directory-tools
    desc: Agent directory create/delete tools defined
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: python-create-folder-function
      - id: python-delete-folder-function

  - id: agent-file-search-tool
    desc: Agent file search tool defined
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
    any:
      - id: python-grep-function
      - id: python-search-files-function

  - id: guarded-agent-file-tools
    desc: Guarded agent file tools
    crit: notable
    conf: 0.94
    all:
      - id: agent-file-tools
    any:
      - id: project-root-safe-path
      - id: user-approval-required
