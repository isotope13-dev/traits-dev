defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-mz-header-array-check-dup
    desc: Checks array for PE magic bytes
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: raw
      regex: '\[0\]\s*!=\s*77\s*\|\|\s*[\w\$\[\]]+\[1\]\s*!=\s*90'
