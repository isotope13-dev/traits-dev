defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: file-create-win
    desc: Windows file creation/open API
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^_?CreateFile[AW](@\d+)?$
  - id: createfile-api
    desc: CreateFile API string reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \bCreateFile
    downgrade:
      # Go's os package statically imports CreateFileW for every Windows build.
      any:
        - id: metadata/lang/compiled::go-runtime-marker
