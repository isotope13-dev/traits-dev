defaults:
  for:
    - pe
    - dll
    - c
    - cpp
  platforms:
    - windows
traits:
  - id: file-create-win
    desc: Windows file creation/open API
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^_?CreateFile[AW](@\d+)?$
  - id: createfile-api
    desc: CreateFile API string reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \bCreateFile
    downgrade:
      # Go's os package statically imports CreateFileW for every Windows build.
      any:
        - id: metadata/lang/compiled/
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: nt-create-file
    desc: Open file through native NtCreateFile
    crit: notable
    conf: 0.93
    if:
      type: symbol
      exact: NtCreateFile
