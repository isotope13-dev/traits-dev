defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: file-create-win
    desc: Windows file creation/open API
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^_?CreateFile[AW](?:@\d+)?$
  - id: createfile-api
    desc: CreateFile API string reference
    crit: notable
    conf: 0.9
    if:
      type: text
      word: CreateFile
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: lopen
    desc: Legacy file open API
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: lopen
  - id: lcreat
    desc: Legacy file create API
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: lcreat
composite_rules:
  - id: legacy-file-open-create
    desc: Legacy Windows file open/create pair
    crit: notable
    conf: 0.9
    all:
      - id: lopen
      - id: lcreat
