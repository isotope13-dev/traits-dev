defaults:
  platforms: [unix]
  for: [binaries, source]
traits:
  - id: fopen
    desc: Open files
    crit: baseline
    conf: 0.66
    for: [scripts, binaries]
    if:
      type: symbol
      exact: fopen
  - id: fopen64
    desc: Open files (64-bit)
    crit: baseline
    conf: 0.66
    for: [scripts, binaries]
    if:
      type: symbol
      exact: fopen64
  - id: open-base
    desc: Open files
    crit: baseline
    conf: 0.66
    for: [scripts, binaries]
    if:
      type: symbol
      exact: open
  - id: open64
    desc: Open files (legacy 64-bit)
    crit: baseline
    conf: 0.66
    for: [scripts, binaries]
    if:
      type: symbol
      exact: open64
  - id: openat
    desc: Open files
    crit: baseline
    conf: 0.66
    for: [scripts, binaries]
    if:
      type: symbol
      exact: openat
composite_rules:
  - id: open
    desc: Open files
    crit: baseline
    conf: 0.66
    any:
      - id: fopen
      - id: fopen64
      - id: open-base
      - id: open64
      - id: openat
