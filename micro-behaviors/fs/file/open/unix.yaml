defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c]
traits:
  - id: fopen
    desc: Open files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: fopen
  - id: fopen-text
    desc: fopen API string
    crit: baseline
    conf: 0.62
    if:
      type: text
      word: fopen
  - id: fopen64
    desc: Open files (64-bit)
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: fopen64
  - id: open-base
    desc: Open files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: open
  - id: open64
    desc: Open files (legacy 64-bit)
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: open64
  - id: openat
    desc: Open files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: openat
composite_rules:
  - id: open
    desc: Open files
    crit: baseline
    conf: 0.66
    any:
      - id: fopen
      - id: fopen64
      - id: open-base
      - id: open64
      - id: openat
