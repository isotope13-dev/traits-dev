defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c]
traits:
  - id: fopen
    desc: Opens file with C fopen
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: fopen
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: fopen-text
    desc: References the CRT fopen file-open routine
    crit: baseline
    conf: 0.62
    if:
      type: text
      word: fopen
  - id: fopen64
    desc: Open files (64-bit)
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: fopen64
  - id: open-base
    desc: Open files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: open
  - id: open64
    desc: Open files (legacy 64-bit)
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: open64
  - id: openat
    desc: Open files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: openat
  - id: open-o-nonblock-source
    desc: Nonblocking open in source
    crit: notable
    conf: 0.85
    platforms: [unix]
    for: [c, cpp, objc]
    if:
      type: text
      regex: '\bopen\s*\([^;]{0,80}O_NONBLOCK'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: open
    desc: Open files
    crit: baseline
    conf: 0.66
    any:
      - id: fopen
      - id: fopen64
      - id: open-base
      - id: open64
      - id: openat
