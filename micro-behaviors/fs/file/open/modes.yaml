defaults:
  platforms: [windows, unix]
  for: [c, cpp, binaries]
traits:
- id: native-open-create-mode-0777-arm
  desc: ARM native open/create with mode 0777
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [arm]
  if:
    type: hex
    section: ".text"
    # O_WRONLY|O_CREAT|O_TRUNC and 0777 in the ARM syscall wrapper's literal
    # pool; this is a world-writable staged-file creation capability.
    pattern: "41 02 00 00 ff 01 00 00"
- id: native-open-create-flags-mips-be
  desc: Big-endian MIPS open/create flags
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [mips]
  if:
    type: hex
    section: ".text"
    pattern: "24 05 03 01"
- id: native-open-mode-0777-mips-be
  desc: Big-endian MIPS open mode 0777
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [mips]
  if:
    type: hex
    section: ".text"
    pattern: "24 06 01 ff"
- id: native-open-create-flags-mips-le
  desc: Little-endian MIPS open/create flags
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [mips]
  if:
    type: hex
    section: ".text"
    pattern: "01 03 05 24"
- id: native-open-mode-0777-mips-le
  desc: Little-endian MIPS open mode 0777
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [mips]
  if:
    type: hex
    section: ".text"
    pattern: "ff 01 06 24"

- id: mode-read-write-binary
  desc: Open file in binary read/write mode
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '"[rw]b\+"'
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
- id: native-open-create-mode-0777-mips-be
  desc: Big-endian MIPS open/create with mode 0777
  crit: suspicious
  conf: 0.98
  for: [elf]
  arch: [mips]
  all:
  - id: native-open-create-flags-mips-be
  - id: native-open-mode-0777-mips-be
  unless:
  - id: well-known/tool/reverse-engineering/frida::frida-server-native
  - id: well-known/tool/reverse-engineering/frida::frida-agent-native
  - id: well-known/tool/reverse-engineering/frida::frida-gadget-native
  - id: well-known/tool/reverse-engineering/frida::frida-inject-native
- id: native-open-create-mode-0777-mips-le
  desc: Little-endian MIPS open/create with mode 0777
  crit: suspicious
  conf: 0.98
  for: [elf]
  arch: [mips]
  all:
  - id: native-open-create-flags-mips-le
  - id: native-open-mode-0777-mips-le
  unless:
  - id: well-known/tool/reverse-engineering/frida::frida-server-native
  - id: well-known/tool/reverse-engineering/frida::frida-agent-native
  - id: well-known/tool/reverse-engineering/frida::frida-gadget-native
  - id: well-known/tool/reverse-engineering/frida::frida-inject-native
