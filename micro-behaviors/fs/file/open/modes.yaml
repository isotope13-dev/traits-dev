defaults:
  platforms: [windows, unix]
  for: [c, cpp, binaries]
traits:
- id: native-open-create-mode-0777-arm
  desc: ARM native open/create with mode 0777
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [arm]
  if:
    type: hex
    section: ".text"
    # O_WRONLY|O_CREAT|O_TRUNC and 0777 in the ARM syscall wrapper's literal
    # pool; this is a world-writable staged-file creation capability.
    pattern: "41 02 00 00 ff 01 00 00"
- id: native-open-create-flags-mips
  desc: MIPS native open/create mode markers
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [mips]
  if:
    type: hex
    section: ".text"
    pattern: "24 05 03 01"
- id: native-open-mode-0777-mips
  desc: MIPS native open mode 0777
  crit: notable
  conf: 0.98
  for: [elf]
  arch: [mips]
  if:
    type: hex
    section: ".text"
    pattern: "24 06 01 ff"

- id: mode-read-write-binary
  desc: Open file in binary read/write mode
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '"[rw]b\+"'

composite_rules:
- id: native-open-create-mode-0777-mips
  desc: MIPS native open/create with mode 0777
  crit: suspicious
  conf: 0.98
  for: [elf]
  arch: [mips]
  all:
  - id: native-open-create-flags-mips
  - id: native-open-mode-0777-mips
