# Neutral grouping: any file-open-for-read in a script host. Reading a file is
# universal behavior; this aggregator only exists so objective composites have a
# single "reads a file" leg to reference.
defaults:
  platforms: [linux, macos, windows]
  for: [scripts]
  conf: 0.9

composite_rules:
  - id: file-read-call
    desc: Opens a file for reading
    crit: component
    any:
      - id: binary-read-mode
      - id: generic-dup
