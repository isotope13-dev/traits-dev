defaults:
  platforms: [windows, unix]
  for: [rust]
  crit: baseline
  conf: 0.86

traits:
  - id: rust-file-open
    desc: Rust file open call
    if:
      type: text
      substr: File::open(

  - id: rust-open-options
    desc: Rust OpenOptions builder
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: OpenOptions::new()
