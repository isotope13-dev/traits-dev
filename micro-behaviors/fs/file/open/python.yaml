defaults:
  platforms: [windows, unix]
  for:
    - python
    - pyc
traits:
  - id: generic-dup
    desc: Calls Python open() on a file
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \bopen\(
  - id: binary-read-mode
    desc: File opened for binary read
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: \bopen\(.{0,120}["']rb["']
  - id: binary-rw
    desc: In-place binary file modification
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: open\([^)]{0,120}['"]r\+b['"]
  - id: binary-write-mode
    desc: Opens a file in binary write mode
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: \bopen\(.{0,120}["']wb["']
  - id: text-write-append-mode
    desc: Opens a file for writing or appending
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bopen\s*\(\s*[^,\n]{1,200},\s*["''][wax][bt+]*["'']'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: key4-db-path
    desc: Firefox key database
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: key4.db
  - id: exodus-wallet-path
    desc: Exodus cryptocurrency wallet
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: exodus.wallet
  - id: wallet-dat-path
    desc: Bitcoin wallet.dat file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: wallet.dat
  - id: cookiejar-exclusion
    desc: Exclude standard cookiejar implementation
    crit: baseline
    if:
      type: text
      substr: cookiejar
