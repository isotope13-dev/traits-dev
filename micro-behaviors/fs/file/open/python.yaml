defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
    - pyc
traits:
  - id: generic-dup
    desc: Opens a file
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \bopen\(
  - id: binary-rw
    desc: In-place binary file modification
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: open\([^)]{0,120}['"]r\+b['"]
  - id: key4-db-path
    desc: Firefox key database
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: key4.db
  - id: exodus-wallet-path
    desc: Exodus cryptocurrency wallet
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: exodus.wallet
  - id: wallet-dat-path
    desc: Bitcoin wallet.dat file
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: wallet.dat
  - id: cookiejar-exclusion
    desc: Exclude standard cookiejar implementation
    crit: baseline
    if:
      type: text
      substr: cookiejar
