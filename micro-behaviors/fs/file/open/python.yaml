# File Open Operations - Python
# MBC: C0046 (Create File)
# ATT&CK: T1005
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, pyc]
traits:
  - id: generic-dup
    desc: "Opens a file"
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      regex: '\bopen\('
      # In-place binary file modification (common in ransomware)
  - id: binary-rw
    desc: "In-place binary file modification"
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: "open\\([^)]{0,120}['\"]r\\+b['\"]"
      # Sensitive file paths (browser/wallet)
  - id: key4-db-path
    desc: Firefox key database
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "key4.db"
  - id: exodus-wallet-path
    desc: Exodus cryptocurrency wallet
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "exodus.wallet"
  - id: wallet-dat-path
    desc: Bitcoin wallet.dat file
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "wallet.dat"
      # === Internal Indicators (baseline) ===
  - id: cookiejar-exclusion
    desc: Exclude standard cookiejar implementation
    crit: baseline
    if:
      type: raw
      regex: "cookiejar"
