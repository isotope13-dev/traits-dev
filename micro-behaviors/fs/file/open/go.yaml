defaults:
  platforms: [unix, windows]
  for: [go]
traits:
  - id: os-open
    desc: Open file via os.Open
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: os.Open
  - id: os-openfile
    desc: Open file with explicit flags via os.OpenFile
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: os.OpenFile
  - id: os-openfile-append
    desc: os.OpenFile with O_APPEND flag
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: 'os\.OpenFile\([^)]{0,200}O_APPEND'
