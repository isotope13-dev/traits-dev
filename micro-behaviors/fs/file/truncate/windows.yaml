defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: set-end-of-file-win
    desc: Truncate file via SetEndOfFile
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "SetEndOfFile"
  - id: llseek
    desc: Legacy file seek API
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: llseek
