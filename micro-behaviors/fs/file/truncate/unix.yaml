defaults:
  platforms: [unix]
  for: [elf, macho, c, cpp, objc]
traits:
  - id: truncate
    desc: Truncate file
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: ^_?(truncate|ftruncate|truncate64|ftruncate64)$
  - id: open-o-trunc-flag
    desc: O_TRUNC open flag
    crit: baseline
    conf: 0.65
    for: [c, cpp, objc]
    if:
      type: text
      word: O_TRUNC
