# Opportunity Locks (Oplocks)
# Detects manipulation of Oplocks, often used for race conditions and EDR synchronization.
# ATT&CK: T1068 (Exploitation for Privilege Escalation)
defaults:
  platforms: [windows]
  for: [pe, c, cpp, csharp, rust, go]
traits:
- id: oplock-ioctl-constants--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
      # FSCTL_SET_OPLOCK (0x00090008)
      # FSCTL_REQUEST_OPLOCK (0x00090000, 0x00090004, 0x00090008, 0x0009000C)
    regex: '0x0009000[048C]'

  count_max: 1019566
- id: oplock-ioctl-constants--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
      # FSCTL_SET_OPLOCK (0x00090008)
      # FSCTL_REQUEST_OPLOCK (0x00090000, 0x00090004, 0x00090008, 0x0009000C)
    regex: 'FSCTL_(SET_OPLOCK|REQUEST_OPLOCK|REQUEST_FILTER_OPLOCK|REQUEST_BATCH_OPLOCK)'

  count_max: 1019567
- id: oplock-break-ioctls--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
      # FSCTL_OPLOCK_BREAK_ACKNOWLEDGE (0x00090010)
      # FSCTL_OPBATCH_ACK_CLOSE_PENDING (0x00090014)
      # FSCTL_OPLOCK_BREAK_NOTIFY (0x00090018)
    regex: '0x0009001[048]'

  count_max: 1019568
- id: oplock-break-ioctls--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
      # FSCTL_OPLOCK_BREAK_ACKNOWLEDGE (0x00090010)
      # FSCTL_OPBATCH_ACK_CLOSE_PENDING (0x00090014)
      # FSCTL_OPLOCK_BREAK_NOTIFY (0x00090018)
    regex: 'FSCTL_(OPLOCK_BREAK_ACKNOWLEDGE|OPBATCH_ACK_CLOSE_PENDING|OPLOCK_BREAK_NOTIFY)'

  count_max: 1019569
- id: oplock-synchronization
  desc: Oplock synchronization logic (waiting for break)
  crit: suspicious
  conf: 0.85
  if:
    type: text
      # Patterns for waiting on an oplock break (e.g. Overlapped I/O, events)
    regex: '(DeviceIoControl|NtDeviceIoControlFile).{0,100}FSCTL_(REQUEST|SET)_OPLOCK'

composite_rules:
- id: oplock-primitive
  desc: Opportunity Lock (Oplock) primitive (potential race condition exploit)
  crit: suspicious
  conf: 0.92
  any:
  - id: oplock-ioctl-constants
  - id: oplock-break-ioctls
  - id: oplock-synchronization
- id: oplock-ioctl-constants
  desc: Oplock-related IOCTL constants
  crit: notable
  conf: 0.9
  any:
  - id: oplock-ioctl-constants--rx-1
  - id: oplock-ioctl-constants--rx-2
- id: oplock-break-ioctls
  desc: Oplock break acknowledgment IOCTLs
  crit: notable
  conf: 0.9
  any:
  - id: oplock-break-ioctls--rx-3
  - id: oplock-break-ioctls--rx-4
