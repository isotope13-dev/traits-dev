defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
  crit: baseline
traits:
  - id: utime-syscall
    desc: utime() modifies file timestamp
    conf: 0.6
    if:
      type: symbol
      exact: utime
  - id: utimes-syscall
    desc: utimes() modifies file timestamp
    conf: 0.6
    if:
      type: symbol
      exact: utimes
  - id: utimensat-syscall
    desc: utimensat() modifies file timestamp
    conf: 0.6
    if:
      type: symbol
      exact: utimensat
  - id: futimens-syscall
    desc: futimens() modifies file descriptor timestamp
    conf: 0.6
    if:
      type: symbol
      exact: futimens
  - id: lutimes-syscall
    desc: lutimes() modifies symlink timestamp
    conf: 0.6
    if:
      type: symbol
      exact: lutimes
composite_rules:
  - id: unix-timestamp-modification
    desc: File timestamp modification syscall (Unix)
    conf: 0.6
    any:
      - id: utime-syscall
      - id: utimes-syscall
      - id: utimensat-syscall
      - id: futimens-syscall
      - id: lutimes-syscall
