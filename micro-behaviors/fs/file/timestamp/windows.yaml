# Windows File Timestamp APIs
# Atomic traits for file time query/modification
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.8
traits:
  - id: get-file-attributes-ex
    desc: Query file attributes and timestamps
    if:
      type: symbol
      regex: "^GetFileAttributesEx[AW]$"
