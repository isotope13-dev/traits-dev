# File Timestamp Modification - Python
# Generic file timestamp operations (not attack-specific)
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: os-utime
    desc: os.utime() timestamp modification
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: 'os.utime'
    unless:
      - type: basename
        exact: _termui_impl.py
      - id: well-known/lib/paver::paver-module-path
  - id: os-getatime
    desc: os.path.getatime() access time query
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: "os.path.getatime("
    unless:
      - type: basename
        exact: _termui_impl.py
      - id: well-known/lib/paver::paver-module-path
  - id: os-getmtime
    desc: os.path.getmtime() modification time query
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: "os.path.getmtime("
    unless:
      - type: basename
        exact: _termui_impl.py
      - id: well-known/lib/paver::paver-module-path
  - id: os-utime-preserve-mtime
    desc: os.utime() preserves current modification time
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'os\.utime\s*\([\s\S]{0,200}os\.path\.getmtime\s*\('
    unless:
      - type: basename
        exact: _termui_impl.py
      - id: well-known/lib/paver::paver-module-path
composite_rules:
  - id: timestamp-preserve
    desc: Saves file timestamps for later restoration
    crit: notable
    conf: 0.7
    all:
      - id: os-getatime
      - id: os-getmtime
