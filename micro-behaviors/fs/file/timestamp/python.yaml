# File Timestamp Modification - Python
# Generic file timestamp operations (not attack-specific)
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: os-utime
    desc: os.utime() timestamp modification
    conf: 0.75
    if:
      type: text
      substr: "os.utime("
    unless:
      - type: basename
        exact: _termui_impl.py
  - id: os-utime-ast
    desc: os.utime() timestamp modification
    conf: 0.85
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'os.utime'
    unless:
      - type: basename
        exact: _termui_impl.py
  - id: os-getatime
    desc: os.path.getatime() access time query
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: "os.path.getatime("
    unless:
      - type: basename
        exact: _termui_impl.py
  - id: os-getmtime
    desc: os.path.getmtime() modification time query
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: "os.path.getmtime("
    unless:
      - type: basename
        exact: _termui_impl.py
composite_rules:
  - id: timestamp-modification
    desc: Python timestamp modification
    crit: notable
    conf: 0.75
    any:
      - id: os-utime
      - id: os-utime-ast
  - id: timestamp-preserve
    desc: Saves file timestamps for later restoration
    crit: notable
    conf: 0.7
    all:
      - id: os-getatime
      - id: os-getmtime
