# Anagrammed Win32 file API names embedded as obfuscated strings.
# Malware samples scramble strings like "CreateFileA" into "aieFAreeCtl"
# to evade naive static keyword scanning while preserving the byte set
# for runtime reassembly via lookup or sort. Each fragment is a component;
# composites group them into the cluster signal.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.92
traits:
  - id: create-file-a-obfuscated
    desc: Obfuscated CreateFileA API string
    if:
      type: text
      exact: aieFAreeCtl
  - id: write-file-obfuscated
    desc: Obfuscated WriteFile API string
    if:
      type: text
      exact: tliirFWee
  - id: delete-file-a-obfuscated
    desc: Obfuscated DeleteFileA API string
    if:
      type: text
      exact: eilFAeeeDtl
  - id: copy-file-a-obfuscated
    desc: Obfuscated CopyFileA API string
    if:
      type: text
      exact: yeploiCFA
  - id: find-first-file-a-obfuscated
    desc: Obfuscated FindFirstFileA API string
    if:
      type: text
      exact: dslnriiiFAFFte
  - id: find-next-file-a-obfuscated
    desc: Obfuscated FindNextFileA API string
    if:
      type: text
      exact: dtenxlieiFNFA
  - id: find-close-obfuscated
    desc: Obfuscated FindClose API string
    if:
      type: text
      exact: dsnoilFCe
composite_rules:
  - id: obfuscated-file-enumeration-and-write
    desc: Obfuscated Win32 file operation APIs
    crit: suspicious
    conf: 0.94
    all:
      - id: find-first-file-a-obfuscated
      - id: find-next-file-a-obfuscated
    any:
      - id: create-file-a-obfuscated
      - id: write-file-obfuscated
      - id: delete-file-a-obfuscated
      - id: copy-file-a-obfuscated
