defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: vb6-ordinal-file-length-helper
    desc: VB6 ordinal file length helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 578'

  - id: vb6-ordinal-free-file-helper
    desc: VB6 ordinal file handle helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 648'

composite_rules:
  - id: vb6-ordinal-file-length-query
    desc: VB6 runtime ordinal file length query
    crit: notable
    conf: 0.94
    all:
      - id: metadata/binary/framework::vb6-application-framework
    any:
      - id: vb6-ordinal-file-length-helper
      - id: micro-behaviors/fs/file/read::vb6-rtcfilelen
      - id: micro-behaviors/fs/file/read::vb6-rtcfilelength

  - id: vb6-ordinal-file-io-helpers
    desc: VB6 runtime ordinal file I/O helpers
    crit: notable
    conf: 0.94
    all:
      - id: metadata/binary/framework::vb6-application-framework
      - id: vb6-ordinal-free-file-helper
    any:
      - id: vb6-ordinal-file-length-helper
      - id: micro-behaviors/fs/file/read::vb6-rtcfilelen
      - id: micro-behaviors/fs/file/read::vb6-rtcfilelength
