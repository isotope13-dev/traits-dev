defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: vb6-rtcfilelen
    desc: VB6 file length helper
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: rtcFileLen
  - id: vb6-rtcfilelength
    desc: VB6 file length helper alias
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: rtcFileLength
  - id: vb6-rtcfreefile
    desc: VB6 free file handle helper
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: rtcFreeFile
composite_rules:
  - id: vb6-file-length-query
    desc: VB6 file size query helpers
    crit: baseline
    conf: 0.9
    any:
      - id: vb6-rtcfilelen
      - id: vb6-rtcfilelength
  - id: vb6-file-io-helpers
    desc: VB6 file I/O helper cluster
    crit: baseline
    conf: 0.9
    all:
      - id: vb6-rtcfreefile
    any:
      - id: vb6-rtcfilelen
      - id: vb6-rtcfilelength
