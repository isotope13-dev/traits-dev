defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c]
traits:
  - id: fread
    desc: Read stream (fread)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^_?fread$
  - id: fread-text
    desc: References the CRT fread file-read routine
    crit: baseline
    conf: 0.62
    if:
      type: text
      word: fread
  - id: read
    desc: Read file descriptor (read/pread)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^_?(read|pread|pread64)$
  - id: fscanf
    desc: Formatted input from file
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^_?(fscanf|vfscanf|__isoc99_fscanf)$
