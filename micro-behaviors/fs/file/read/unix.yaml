# File Read Operations
# MBC: C0051 (Read File)
# ATT&CK: T1005
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, so, dylib, c]
traits:
  - id: read-dup
    desc: Read files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: "^_?(fread|read|pread|pread64)$"
