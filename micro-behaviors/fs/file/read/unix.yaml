defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: fread
    desc: Read stream (fread)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^_?fread$
  - id: read
    desc: Read file descriptor (read/pread)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^_?(read|pread|pread64)$
  - id: fscanf
    desc: Formatted input from file
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^_?(fscanf|vfscanf|__isoc99_fscanf)$
