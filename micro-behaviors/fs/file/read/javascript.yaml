# File Read Operations - JavaScript/Node
# MBC: C0051 (Read File)
# ATT&CK: T1005
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
- id: browser-directory-picker
  desc: Prompts user to select a directory
  crit: notable
  conf: 0.96
  if:
    type: symbol
    kind: call
    exact: window.showDirectoryPicker

- id: browser-file-picker
  desc: Browser prompts the user to select files
  crit: notable
  conf: 0.96
  if:
    type: symbol
    kind: call
    exact: window.showOpenFilePicker

- id: browser-file-read-as-data-url
  desc: Reads selected file as a data URL
  crit: notable
  conf: 0.95
  if:
    type: symbol
    kind: call
    exact: reader.readAsDataURL

- id: read-own-source
  desc: Reads its own source file
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: 'fs\.readFileSync\(\s*(__filename|scriptPath)'

- id: node-dotenv-file-read
  desc: Reads a Node dotenv configuration file
  crit: notable
  conf: 0.9
  if:
    type: symbol
    kind: call
    exact: fs.readFileSync
    arg:
      kind: string
      substr: .env

- id: read-font-file
  desc: Reads a font file (woff2/ttf/otf)
  crit: notable
  conf: 1.0
  if:
    type: text
    regex: readFileSync.{0,100}\.(woff2|ttf|otf)

- id: read-node
  desc: Reads files with Node.js
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: metadata/library/structure/
  if:
    type: symbol
    kind: call
    regex: '(^|\.)fs\.readFile(Sync)?$|^readFile(Sync)?$'

# Member/alias form survives bundler renames (node_fs.readFileSync, fs$1.readFileSync).
- id: readfilesync-call
  desc: Calls readFileSync
  crit: notable
  conf: 0.9
  if:
    type: symbol
    kind: call
    regex: '(^|\.)readFileSync$'
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: node-bracket-read-file-sync
  desc: Node bracket readFileSync
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\s*\[\s*["'']readFileSync["'']\s*\]\s*\('
  unless:
    - id: metadata/package/testing/
- id: read-text-utf8
  desc: Reads file content as utf8
  crit: baseline
  conf: 0.72
  if:
    type: text
    regex: "readFile(Sync)?\\s*\\([^)]{0,120}['\\\"]utf8['\\\"]"

- id: read-package-relative-file
  desc: Reads a package-relative file
  crit: baseline
  conf: 0.88
  if:
    type: text
    regex: 'readFile(Sync)?\s*\(\s*path\.join\s*\(\s*__dirname'

# Babel's alias-wrapped form, such as
# `(0, _fs.readFileSync)((0, _path.join)(__dirname, "asset.js"))`.
- id: read-adjacent-javascript-file
  desc: Reads package-adjacent JavaScript file
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: 'readFileSync\)\s*\([^;\n]{0,140}__dirname[^;\n]{0,120}\.(js|mjs|cjs)'

- id: read-file-utf8-callback
  desc: Node async UTF-8 file read callback
  crit: baseline
  conf: 0.9
  for: [javascript]
  if:
    type: text
    regex: 'readFile\([^)]{0,80}"utf8",\s*\('
  unless:
  - type: text
    substr: 'page.exposeFunction("readfile"'
  - type: text
    substr: 'readFile(q,re?void 0:"utf8",('
  - type: text
    substr: 'readFile(k,ae?void 0:"utf8",('
  - type: text
    regex: 'export\s+function\s+readFile\([^)]*filePath:\s*string\)\s*:\s*Promise<string>'
  - type: text
    substr: MathJax.loader&&MathJax.loader.checkVersion(
  - id: well-known/app/tencent-codebuddy::codebuddy-marker

- id: create-read-stream
  desc: Creates a file read stream
  crit: notable
  conf: 0.7
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - type: text
    substr: fs.createReadStream = createReadStream
  - type: text
    substr: var stream = fs.createReadStream(file, {
  if:
    type: text
    regex: "fs\\.createReadStream"

- id: node-open-sync
  desc: Opens a file synchronously with Node.js
  crit: notable
  conf: 0.7
  unless:
  - id: metadata/library/structure/
  if:
    type: symbol
    kind: call
    exact: openSync

- id: require-local-package-json
  desc: Loads local package.json
  crit: baseline
  conf: 0.82
  if:
    type: text
    regex: "require\\(['\\\"]\\./package\\.json['\\\"]\\)"

- id: require-cwd-package-json--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: process.cwd()
- id: require-cwd-package-json--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: package.json
- id: require-cwd-package-json--rx-4
  desc: "path join artifact for package.json load"
  crit: component
  conf: 0.84
  if:
    type: text
    regex: \b(path\.)?join\s*\(
composite_rules:
- id: node-sensitive-auth-file-read
  desc: Node reads dotenv or registry auth file
  crit: notable
  conf: 0.94
  near_bytes: 256
  all:
  - id: read-node
  any:
  - id: micro-behaviors/fs/path/sensitive/credentials::dotenv-filename-literal
  - id: micro-behaviors/fs/path/sensitive/credentials::npmrc-credentials
  - id: micro-behaviors/fs/path/sensitive/credentials::netrc
- id: file-content-read-operation
  desc: File content read operation
  crit: component
  conf: 0.82
  platforms: [windows, unix, macos]
  for: [scripts, source, binaries]
  any:
  - id: read-node
  - id: create-read-stream
  - id: require-local-package-json
  - id: require-cwd-package-json
  - id: read-node-etc-passwd
  - id: js-read-and-send-ipc
  - id: os-readfile
  - id: ioutil-readfile
  - id: read-go
  - id: ruby-file-read-content
  - id: ruby-file-read-open
  - id: rust-read-to-string
  - id: rust-read-to-end
  - id: fread
  - id: fread-text
  - id: read
  - id: fscanf
  - id: read-file
  - id: vb6-full-binary-file-read-source
  - id: vb6-file-length-query

- id: read-node-etc-passwd
  desc: Node reads /etc/passwd
  crit: notable
  conf: 0.94
  # The read call and the path must be adjacent — i.e. actually
  # `readFileSync("/etc/passwd")`. Without proximity this fired whenever a file
  # both read something and mentioned /etc/passwd elsewhere (e.g. a
  # path-traversal example inside a defensive comment).
  near_bytes: 160
  all:
  - id: read-node
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd-node-read
- id: js-read-and-send-ipc
  desc: Reads file content and sends via Node IPC
  crit: notable
  conf: 0.95
  all:
  - id: read-node
  - id: micro-behaviors/communications/ipc/message::node-process-send
- id: require-cwd-package-json
  desc: Loads package.json from current working directory
  crit: notable
  conf: 0.84
  all:
  - id: require-cwd-package-json--rx-1
  - id: require-cwd-package-json--rx-2
  - id: metadata/lang/scripted::require-symbol
  - id: require-cwd-package-json--rx-4
  near_bytes: 4096
