# File Read Operations - JavaScript/Node
# MBC: C0051 (Read File)
# ATT&CK: T1005
defaults:
  platforms: [unix, windows, macos]
  for: [javascript]
traits:
  - id: read-node
    desc: Read files (Node.js)
    crit: baseline
    conf: 0.66
    if:
      type: string
      regex: "fs\\.readFile(Sync)?"
