# File Read Operations - JavaScript/Node
# MBC: C0051 (Read File)
# ATT&CK: T1005
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
- id: read-node
  desc: Read files (Node.js)
  crit: notable
  conf: 0.66
  if:
    type: text
    regex: "\\b(fs\\.)?readFile(Sync)?\\s*\\("

- id: read-node-ast
  desc: Read files (Node.js AST)
  crit: notable
  conf: 0.86
  if:
    type: symbol
    kind: call
    exact: fs.readFileSync

- id: read-text-utf8
  desc: Reads file content as utf8
  crit: baseline
  conf: 0.72
  if:
    type: text
    regex: "readFile(Sync)?\\s*\\([^)]{0,120}['\\\"]utf8['\\\"]"

- id: create-read-stream
  desc: Creates a file read stream
  crit: notable
  conf: 0.7
  unless:
  - type: basename
    regex: \.map$
  - type: text
    substr: fs.createReadStream = createReadStream
  - type: text
    substr: var stream = fs.createReadStream(file, {
  if:
    type: text
    regex: "fs\\.createReadStream"

- id: require-local-package-json
  desc: Loads local package.json
  crit: baseline
  conf: 0.82
  if:
    type: text
    regex: "require\\(['\\\"]\\./package\\.json['\\\"]\\)"

- id: require-cwd-package-json--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: process.cwd()
- id: require-cwd-package-json--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: package.json
- id: require-cwd-package-json--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: \b(path\.)?join\s*\(
composite_rules:
- id: read-node-etc-passwd
  desc: Node reads /etc/passwd
  crit: notable
  conf: 0.94
  # The read call and the path must be adjacent — i.e. actually
  # `readFileSync("/etc/passwd")`. Without proximity this fired whenever a file
  # both read something and mentioned /etc/passwd elsewhere (e.g. a
  # path-traversal example inside a defensive comment).
  near_bytes: 160
  all:
  - id: read-node-ast
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd
- id: js-read-and-send-ipc
  desc: Reads file content and sends via Node IPC
  crit: notable
  conf: 0.95
  all:
  - id: read-node
  - id: micro-behaviors/communications/ipc/message::node-process-send
- id: require-cwd-package-json
  desc: Loads package.json from current working directory
  crit: notable
  conf: 0.84
  all:
  - id: require-cwd-package-json--rx-1
  - id: require-cwd-package-json--rx-2
  - id: metadata/lang/scripted::require-symbol
  - id: require-cwd-package-json--rx-4
  near_bytes: 4096
