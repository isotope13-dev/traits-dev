# File Read Operations - JavaScript/Node
# MBC: C0051 (Read File)
# ATT&CK: T1005
defaults:
  platforms: [unix, windows, macos]
  for: [javascript, typescript]
traits:
  - id: read-node
    desc: Read files (Node.js)
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: "\\b(fs\\.)?readFile(Sync)?\\s*\\("
  - id: read-text-utf8
    desc: Reads file content as utf8
    crit: baseline
    conf: 0.72
    if:
      type: text
      regex: "readFile(Sync)?\\s*\\([^)]{0,120}['\\\"]utf8['\\\"]"
  - id: require-local-package-json
    desc: Loads local package.json
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: "require\\(['\\\"]\\./package\\.json['\\\"]\\)"
  - id: require-cwd-package-json
    desc: Loads package.json from current working directory
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: "require\\([^\\n)]{0,180}[A-Za-z0-9_$.]*join\\(\\s*process\\.cwd\\(\\)\\s*,\\s*['\\\"]\\.?/package\\.json['\\\"]\\s*\\)\\)"
