# File Read Operations - JavaScript/Node
# MBC: C0051 (Read File)
# ATT&CK: T1005
defaults:
  platforms: [unix, windows, macos]
  for: [javascript, typescript]
traits:
  - id: read-node
    desc: Read files (Node.js)
    crit: baseline
    conf: 0.66
    if:
      type: raw
      regex: "\\b(fs\\.)?readFile(Sync)?\\s*\\("
  - id: read-text-utf8
    desc: Reads file content as utf8
    crit: baseline
    conf: 0.72
    if:
      type: raw
      regex: "readFile(Sync)?\\s*\\([^)]{0,120}['\\\"]utf8['\\\"]"
