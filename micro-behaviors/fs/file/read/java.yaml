defaults:
  platforms: [qnx, unix, windows]
  for: [java, class, java_class, jar]

traits:
  - id: jvm-io-file-class-ref
    desc: JVM File API class reference
    crit: component
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/io/File(/|$)'

  - id: jvm-nio-file-class-ref
    desc: JVM NIO file API reference
    crit: component
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/nio/file(/|$)'

  - id: java-readallbytes
    desc: Java reads whole file bytes
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: readAllBytes

  - id: jvm-readallbytes-bytecode
    desc: JVM bytecode readAllBytes
    crit: notable
    conf: 0.9
    for: [class, jar]
    if:
      type: hex
      pattern: 72 65 61 64 41 6C 6C 42 79 74 65 73
