defaults:
  platforms: [windows]
  for: [vbs]

traits:
  - id: vb6-binary-open-source
    desc: VB6 binary file open
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: For Binary As #

  - id: vb6-lof-buffer-read-source
    desc: VB6 full file buffer read
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Space(LOF(

  - id: vb6-get-binary-source
    desc: VB6 binary file get
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: Get #

composite_rules:
  - id: vb6-full-binary-file-read-source
    desc: VB6 reads full binary file
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/fs/file/read::vb6-binary-open-source
      - id: micro-behaviors/fs/file/read::vb6-lof-buffer-read-source
      - id: micro-behaviors/fs/file/read::vb6-get-binary-source
