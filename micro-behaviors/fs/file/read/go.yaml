defaults:
  platforms:
    - unix
    - windows
  for: [go, binaries]
traits:
  - id: read-go
    desc: Go os.File Read method
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: os\.\(\*File\)\.Read
  - id: os-readfile
    desc: Read file contents via os.ReadFile
    crit: baseline
    conf: 0.9
    for: [go]
    if:
      type: symbol
      exact: os.ReadFile
  - id: ioutil-readfile
    desc: Read file contents via ioutil.ReadFile
    crit: baseline
    conf: 0.9
    for: [go]
    if:
      type: symbol
      exact: ioutil.ReadFile
