defaults:
  platforms: [unix]
  for: [source, shell]

traits:
  - id: head-first-line-file-variable
    desc: head reads target first line
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'head\s+-n\s+1\s+\$file'

  - id: head-first-line-file-variable-bytes
    desc: head reads target first line bytes
    crit: notable
    conf: 0.86
    platforms: [unix, windows]
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'head -n 1 $file'
