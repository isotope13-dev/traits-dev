defaults:
  for: [swift]
  platforms: [ios, macos, linux]

traits:
  - id: swift-direct-file-read-api
    desc: Swift direct file-read API
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Data\(contentsOf:|String\(contentsOf|FileHandle\(forReadingFrom:'

  - id: swift-data-file-read
    desc: Swift reads file data from URL path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Data\(contentsOf:[\s\S]{0,120}URL\(fileURLWithPath:'
