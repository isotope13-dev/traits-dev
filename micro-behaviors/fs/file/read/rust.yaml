defaults:
  platforms: [windows, unix]
  for: [rust]
  crit: baseline
  conf: 0.86

traits:
  - id: rust-read-to-string
    desc: Rust read file to string
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: fs::read_to_string(
    unless:
      - id: metadata/package/testing/presence/harness/

  - id: rust-read-to-end
    desc: Rust read file to buffer
    if:
      type: text
      regex: '\.read_to_end\s*\('
    unless:
      - id: metadata/package/testing/presence/harness/
