defaults:
  for:
    - all
traits:
  - id: image-extension-a-dup
    desc: Image file extension family A
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: \.(png|jpe?g|gif|bmp)$
  - id: image-extension-b-dup
    desc: Image file extension family B
    crit: baseline
    conf: 1.0
    if:
      type: basename
      regex: \.(ico|svg|tiff|webp)$
composite_rules:
  - id: image-extension-comp
    desc: Image file extension
    crit: baseline
    conf: 1.0
    any:
      - id: micro-behaviors/fs/file/extension::image-extension-a-dup
      - id: micro-behaviors/fs/file/extension::image-extension-b-dup
