# A string literal that names a file with an opaque "data" extension
# (.dat/.bin/.key/.gzs). Neutral: benign programs reference data files of these
# kinds all the time. Building block only — meaning comes from what code does
# with the file (e.g. decompress+execute it), expressed in objective composites.
defaults:
  platforms: [linux, macos, windows]
  for: [scripts]
  conf: 0.9

traits:
  - id: data-blob-extension
    desc: Opaque data-blob filename literal
    crit: component
    if:
      type: literal
      regex: '(?i)\.(dat|bin|key|gzs)$'
