defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1486
traits:
  - id: encrypt-file-api
    desc: EFS file encryption API
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '^EncryptFile[AW]?$'
  - id: encrypt-file-api-string
    desc: EFS encryption API string
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '^EncryptFile[AW]?$'
    unless:
      - id: metadata/signed/platform::microsoft
