# Console I/O Operations
# Console input/output and handle manipulation
defaults:
  for: ["pe", "dll", "c", "cpp"]
  platforms: ["windows"]
traits:
  - id: nt-device-io-control-file
    desc: NtDeviceIoControlFile native API name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: NtDeviceIoControlFile
  - id: device-io-control-win
    desc: DeviceIoControl API usage
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: DeviceIoControl
    unless:
      - type: metrics
        field: exports.count
        min: 100
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script/
      - id: metadata/file/extension/identity::uninstaller-exe-basename
  - id: set-file-information-by-handle
    desc: Modify file metadata attributes
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: SetFileInformationByHandle
  # === Standard Handle Management ===
  - id: get-std-handle
    desc: Get standard I/O handle
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "GetStdHandle"
  - id: set-std-handle
    desc: Set standard I/O handle
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "SetStdHandle"
  - id: get-console-mode
    desc: Get console input/output mode
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "GetConsoleMode"
  - id: get-console-output-cp
    desc: Get console output code page
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "GetConsoleOutputCP"
  # === File Handle Control ===
  - id: flush-file-buffers
    desc: Flush file buffer to disk
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "FlushFileBuffers"
  - id: set-file-pointer-ex
    desc: Set file position extended
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "SetFilePointerEx"
  - id: set-file-pointer
    desc: Set file position
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "SetFilePointer"
  - id: legacy-llseek
    desc: Legacy file seek API
    crit: baseline
    conf: 0.88
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    if:
      type: symbol
      exact: _llseek
  - id: get-file-type
    desc: Get file handle type
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "GetFileType"
