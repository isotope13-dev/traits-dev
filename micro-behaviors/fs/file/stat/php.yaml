defaults:
  platforms: [windows, unix]
  for: [php]

traits:
  - id: fileperms-call
    desc: Reads file permission mode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: fileperms
  - id: clearstatcache-call
    desc: Clears cached file metadata
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: clearstatcache
