defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: stat-core
    desc: Read file status and metadata (core)
    crit: notable
    conf: 0.8
    platforms: [unix, android, ios]
    if:
      type: symbol
      regex: ^_?(stat|lstat|fstat|fstatat)$
    downgrade:
      # Go's os package statically imports fstat/lstat/stat for os.Stat et al.;
      # every Go Unix binary imports these regardless of program behavior.
      any:
        - id: metadata/lang/compiled/
        - id: metadata/file/string/identity::system-shell-basename
        - id: metadata/lang/compiler/systems::go-binary
  - id: stat-legacy64
    desc: Read file status and metadata (legacy 64-bit)
    crit: notable
    conf: 0.8
    platforms: [unix, android, ios]
    if:
      type: symbol
      regex: ^_?(stat64|lstat64|fstat64)$
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: stat-exists
    desc: Check if file exists
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: ^_?(access|faccessat)$
composite_rules:
  - id: stat
    desc: Read file status and metadata
    crit: notable
    conf: 0.8
    any:
      - id: stat-core
      - id: stat-legacy64
