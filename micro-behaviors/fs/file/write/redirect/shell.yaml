defaults:
  platforms: [unix]
  for: [shell]

traits:
  - id: shell-output-redirect-to-data
    desc: Shell output redirected into /data
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '>\s*/data/'
    unless:
      - id: well-known/tool/sysadmin/cubesandbox::cubesandbox-source-path
