# Python writes a Windows DLL to a user-writable location.
defaults:
  platforms: [windows]
  for: [python]

traits:
  - id: python-writes-dll-under-appdata
    desc: Python writes DLL under APPDATA
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'os\.getenv\(\s*["'']APPDATA["'']\s*\)[\s\S]{0,120}["'']wb["'']'
