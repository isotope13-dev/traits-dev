# Generic Python `.write()` calls on a file handle / stream. Pure write
# capability with meaning far outside keylogging (logging, file I/O, any
# output) — relocated here from objectives/collection/keylog so the standalone
# component is labelled by what it searches for. The keylog composite still
# references these cross-directory.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: dot-write-1
    desc: .write() call (file handle)
    crit: component
    conf: 0.4
    if:
      type: text
      regex: (file|f|handle)\.write\(
  - id: dot-write-2
    desc: Output stream .write() call
    crit: component
    conf: 0.4
    if:
      type: text
      regex: (log|stream|out)\.write\(
