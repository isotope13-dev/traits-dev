defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1041

traits:
  - id: fs-write
    desc: Rust fs write call
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: fs::write(
  - id: rust-write-all
    desc: Rust write all bytes
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\.write_all\s*\('
