defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1041

traits:
  - id: fs-write
    desc: Writes a file with Rust fs::write
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: fs::write(
    unless:
      - id: metadata/package/testing/presence/harness/
  - id: rust-write-all
    desc: Writes all buffered bytes in Rust
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\.write_all\s*\('
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/package/testing/presence/harness/
