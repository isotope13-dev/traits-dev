defaults:
  platforms: [unix, windows]

traits:
  - id: dd-zero-input-command-script
    desc: dd reads zeros as input
    crit: notable
    conf: 0.82
    for: [scripts]
    if:
      type: text
      substr: 'dd if=/dev/zero'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/tool/detection/

  - id: dd-zero-input-command-source
    desc: dd reads zeros as input
    crit: notable
    conf: 0.82
    for: [go, python, javascript, typescript, rust, java, c, cpp]
    if:
      type: text
      regex: '\bdd\s+if=/dev/zero\b'
    unless:
      - id: well-known/tool/detection/

composite_rules:
  - id: dd-zero-input-command
    desc: dd reads zeros as input
    crit: notable
    conf: 0.82
    any:
      - id: dd-zero-input-command-script
      - id: dd-zero-input-command-source
    unless:
      - id: well-known/tool/detection/
