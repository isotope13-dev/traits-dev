defaults:
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
traits:
  - id: write
    desc: Write files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: ^(fwrite|write|pwrite|pwrite64)$
  - id: fputc
    desc: Write single bytes to file
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: fputc
