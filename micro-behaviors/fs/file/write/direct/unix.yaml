defaults:
  platforms: [unix]
  for: [elf, macho, c, cpp, objc]
traits:
- id: fputc
  desc: Write single bytes to file
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: fputc
- id: write--fwrite
  desc: Write files (fwrite)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: fwrite
- id: write--write
  desc: Write files (write)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: write
- id: write--pwrite
  desc: Write files (pwrite)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: pwrite
- id: write--pwrite64
  desc: Write files (pwrite64)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: pwrite64
composite_rules:
- id: write
  desc: Write files
  crit: baseline
  conf: 0.66
  any:
  - id: write--fwrite
  - id: write--write
  - id: write--pwrite
  - id: write--pwrite64
