defaults:
  platforms: [unix]
  for: [elf, macho, c, cpp, objc]
traits:
- id: fputc
  desc: Write single bytes to file
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: fputc
- id: write--fwrite
  desc: References fwrite file-write API
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: fwrite
- id: write--write
  desc: References POSIX write API
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: write
- id: write--pwrite
  desc: References POSIX pwrite API
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: pwrite
- id: write--pwrite64
  desc: References POSIX pwrite64 API
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: pwrite64
composite_rules:
- id: write
  desc: POSIX file-write capability
  crit: baseline
  conf: 0.66
  any:
  - id: write--fwrite
  - id: write--write
  - id: write--pwrite
  - id: write--pwrite64
