defaults:
  platforms: [windows, unix]
  for: [go]
traits:
  - id: os-write-file
    desc: Write file via os.WriteFile
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: os.WriteFile
  - id: ioutil-write-file
    desc: Write file via ioutil.WriteFile
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: ioutil.WriteFile
  - id: go-append-file-method-call
    desc: Go AppendFile method call
    crit: component
    conf: 0.75
    if:
      type: text
      substr: .AppendFile(
  - id: go-write-file-method-call
    desc: Go WriteFile method call
    crit: component
    conf: 0.6
    if:
      type: text
      substr: .WriteFile(
  - id: go-write-method-call
    desc: Go Write/WriteAt method call
    crit: component
    if:
      type: text
      regex: \.Write(At)?\(
