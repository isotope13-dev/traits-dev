# In-place file writing with dd conv=notrunc — patches bytes at an offset
# without truncating the file. Neutral capability (disk imaging, bootloader
# installs, binary patching) but characteristic of in-place binary tamper and
# tamper-restore (writing original bytes back to hide modification). Intent
# lives in objectives composites that reference this.
defaults:
  platforms: [unix]
  for: [scripts, c, cpp, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: dd-conv-notrunc
    desc: dd in-place write without truncation
    if:
      type: text
      substr: conv=notrunc
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
