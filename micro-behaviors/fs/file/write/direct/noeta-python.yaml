defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.88

traits:
  - id: python-pathlib-write-bytes-call
    desc: Writes bytes via pathlib
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(write_bytes)$'

  - id: exec-env-exclusive-create-call
    desc: ExecEnv exclusive file create
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(create_exclusive)$'

  - id: os-open-exclusive-create
    desc: Python os.open exclusive create
    if:
      type: text
      regex: 'os\.open\([^)]{0,160}os\.O_EXCL'

composite_rules:
  - id: exec-env-file-write-backend
    desc: ExecEnv file write backend
    any:
      - id: python-pathlib-write-bytes-call
      - id: exec-env-exclusive-create-call
      - id: os-open-exclusive-create
