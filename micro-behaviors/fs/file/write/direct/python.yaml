defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: python-os-fdopen-write-mode
    desc: Python opens a file descriptor for writing
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: os.fdopen
      arg:
        kind: string
        regex: '^[wax][bt+]*$'
  - id: python-os-write-fd
    desc: Writes bytes through Python file descriptor
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: os.write
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-os-lseek-fd
    desc: Repositions Python file descriptor
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: os.lseek
  - id: py-write
    desc: Python write method call
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      kind: call
      regex: '\.write(_bytes|_text)?$'
  - id: py-file-write-call
    desc: Python file handle write() call
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\b(file|fh|fp|handle)\.write\('
  - id: py-stream-write-call
    desc: Python stream write() call
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\b(stream|stdout|stderr|out)\.write\('
  - id: py-log-write-call
    desc: Python log write() call
    crit: component
    conf: 0.76
    if:
      type: text
      substr: log.write(
  - id: py-open-write-inline
    desc: Inline open().write() file creation
    crit: notable
    conf: 0.8
    downgrade:
      any:
        - id: well-known/lib/nokogiri::library-reference
        - id: well-known/lib/xml2
    if:
      type: symbol
      kind: call
      exact: open().write
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: py-open-write-mode
    desc: Calls Python open() in write mode
    crit: notable
    conf: 0.82
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/app/archlinux-kernel::versioned-lts-update-helper
    if:
      type: symbol
      kind: call
      exact: open
      arg:
        kind: string
        substr: w
  - id: python-etc-passwd-open-write
    desc: Python opens /etc/passwd for writing
    crit: suspicious
    conf: 0.96
    if:
      type: tree-sitter
      kind: call
      regex: '\bopen\s*\(\s*["'']/etc/passwd["'']\s*,\s*["'']([wax][bt+]?|r[bt]?\+)["'']'
  - id: py-open-binary-path
    desc: Python open targets binary path
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: open
      arg:
        kind: string
        regex: '(?i)\.(exe|dll|so|dylib)$'
  - id: py-open-blob-path
    desc: Python open targets blob path
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: open
      arg:
        kind: string
        regex: '(?i)\.bin$'
  - id: py-open-script-path
    desc: Python open targets script path
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: open
      arg:
        kind: string
        regex: '(?i)\.(sh|py|ps1|js)$'
  - id: py-open-windows-script-path
    desc: Python open targets Windows script
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: open
      arg:
        kind: string
        regex: '(?i)\.(bat|cmd|vbs)$'
  - id: py-pathlib-write-call
    desc: pathlib write_text/write_bytes call
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      regex: '^Path\(\)\.write_(bytes|text)$'
  - id: py-pathlib-open-write-call
    desc: pathlib Path.open write mode
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: Path().open
      arg:
        kind: string
        regex: '^[wabx][bt+]*$'
  - id: py-pathlib-binary-path
    desc: pathlib Path targets binary path
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: Path
      arg:
        kind: string
        regex: '(?i)\.(exe|dll|so|dylib)$'
  - id: py-pathlib-blob-path
    desc: pathlib Path targets blob path
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: Path
      arg:
        kind: string
        regex: '(?i)\.bin$'
  - id: py-pathlib-script-path
    desc: pathlib Path targets script path
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: Path
      arg:
        kind: string
        regex: '(?i)\.(sh|py|ps1|js)$'
  - id: py-pathlib-windows-script-path
    desc: pathlib Path targets Windows script
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: Path
      arg:
        kind: string
        regex: '(?i)\.(bat|cmd|vbs)$'

composite_rules:
  - id: py-write-call
    desc: Python file or stream write() call
    crit: baseline
    conf: 0.78
    any:
      - id: py-file-write-call
      - id: py-stream-write-call
      - id: py-log-write-call
      - id: py-write
  - id: py-open-executable-path
    desc: Python open targets executable path
    crit: component
    conf: 0.82
    any:
      - id: py-open-binary-path
      - id: py-open-blob-path
      - id: py-open-script-path
      - id: py-open-windows-script-path
  - id: py-pathlib-executable-path
    desc: pathlib Path targets executable path
    crit: component
    conf: 0.82
    any:
      - id: py-pathlib-binary-path
      - id: py-pathlib-blob-path
      - id: py-pathlib-script-path
      - id: py-pathlib-windows-script-path
  - id: py-inline-write-executable-path
    desc: Inline write to executable/script path
    crit: notable
    conf: 0.86
    all:
      - id: py-open-write-inline
      - id: py-open-executable-path
  - id: py-pathlib-write-executable-path
    desc: pathlib writes executable/script path
    crit: notable
    conf: 0.86
    all:
      - id: py-pathlib-write-call
      - id: py-pathlib-executable-path
  - id: py-pathlib-open-write-executable-path
    desc: pathlib open writes executable path
    crit: notable
    conf: 0.86
    all:
      - id: py-pathlib-open-write-call
      - id: py-pathlib-executable-path
