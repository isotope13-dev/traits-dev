defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: py-write
    desc: write() call
    crit: baseline
    conf: 0.5
    if:
      type: string_literal
      regex: \.write\(
  - id: py-file-write-call
    desc: Python file handle write() call
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\b(file|fh|fp|handle)\.write\('
  - id: py-stream-write-call
    desc: Python stream write() call
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\b(stream|stdout|stderr|out)\.write\('
  - id: py-log-write-call
    desc: Python log write() call
    crit: component
    conf: 0.76
    if:
      type: text
      substr: log.write(
  - id: py-open-write-inline
    desc: Inline open().write() file creation
    crit: notable
    conf: 0.8
    downgrade:
      any:
        - id: well-known/lib/nokogiri::native-extension-bundle
        - id: well-known/lib/xml2
    if:
      type: symbol
      regex: open\(.{0,100}\)\.write

composite_rules:
  - id: py-write-call
    desc: Python file or stream write() call
    crit: baseline
    conf: 0.78
    any:
      - id: py-file-write-call
      - id: py-stream-write-call
      - id: py-log-write-call
