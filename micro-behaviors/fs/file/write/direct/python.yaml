defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: py-write
    desc: write() call
    crit: baseline
    conf: 0.5
    if:
      type: string_literal
      regex: \.write\(
  - id: py-write-call
    desc: Python write() call
    crit: baseline
    conf: 0.78
    if:
      type: symbol
      kind: call
      regex: '(^|[.])write$'
  - id: py-open-write-inline
    desc: Inline open().write() file creation
    crit: notable
    conf: 0.8
    downgrade:
      any:
        - id: well-known/lib/nokogiri::native-extension-bundle
        - id: well-known/lib/xml2
    if:
      type: symbol
      regex: open\(.{0,100}\)\.write
