# Writability check patterns used by file infectors
# Malware creates temp files to test directory write permissions
# before attempting to infect files in that directory
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95
traits:
  - id: readme-writability-check
    desc: Directory writability check via temp file
    crit: baseline
    conf: 0.97
    if:
      type: text
      exact: readme.1xt
