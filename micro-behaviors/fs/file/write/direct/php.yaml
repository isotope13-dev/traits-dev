defaults:
  platforms: [windows, unix]
  attack: T1546
  for:
    - php
traits:
  - id: php-file-write-func
    desc: Writes data to a file via functions
    crit: baseline
    if:
      type: text
      regex: '[$]?(fwrite|fputs|file_put_contents|fopen)\s*[(]'
      case_insensitive: true
  - id: php-file-write-spl
    desc: Writes data to a file via SplFileObject
    crit: baseline
    if:
      type: string_literal
      word: SplFileObject
      case_insensitive: true
composite_rules:
  - id: php-file-write
    desc: Writes data to a file
    crit: baseline
    any:
      - id: php-file-write-func
      - id: php-file-write-spl
