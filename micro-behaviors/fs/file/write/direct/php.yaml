defaults:
  platforms: [windows, unix]
  attack: T1546
  for:
    - php
traits:
  - id: php-fwrite
    desc: Calls PHP fwrite function
    crit: notable
    if:
      type: symbol
      kind: call
      exact: fwrite
  - id: php-fputs
    desc: Calls PHP fputs function
    crit: notable
    if:
      type: symbol
      kind: call
      exact: fputs
  - id: php-file-put-contents
    desc: Calls PHP file_put_contents function
    crit: notable
    if:
      type: symbol
      kind: call
      exact: file_put_contents
composite_rules:
  - id: php-file-write
    desc: Writes data using PHP file API
    crit: notable
    any:
      - id: php-fwrite
      - id: php-fputs
      - id: php-file-put-contents
