defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: filestream-open-read
    desc: FileStream open for read
    crit: baseline
    conf: 0.86
    if:
      type: text
      regex: 'new FileStream\(\w+,\s*FileMode\.Open,\s*FileAccess\.Read\)'
    not:
      - regex: 'new\s+BinaryReader\s*\(\s*new FileStream\('
  - id: filestream-create-write
    desc: FileStream create for overwrite
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'new FileStream\(\w+,\s*FileMode\.Create,\s*FileAccess\.Write\)'
    not:
      - regex: 'new\s+BinaryWriter\s*\(\s*new FileStream\('
  - id: filestream-create
    desc: FileStream create mode open
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: FileMode.Create
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
composite_rules:
  - id: self-read-then-overwrite
    desc: Reads self then overwrites target
    crit: notable
    conf: 0.93
    all:
      - id: filestream-open-read
      - id: filestream-create-write
