defaults:
  platforms: [windows, unix]
traits:
  - id: file-write
    crit: notable
    desc: Writes to a file
    for:
      - javascript
    if:
      type: string_literal
      substr: SaveToFile
  - id: write-file
    desc: Write data to file handle
    crit: baseline
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      exact: WriteFile
  - id: writefile-api
    desc: WriteFile API string reference
    crit: notable
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    count_min: 2
    if:
      type: text
      word: WriteFile
    unless:
      - id: micro-behaviors/fs/file/write/direct::write-file
      - type: metrics
        field: pe.cert_table_size
        min: 1
      - id: metadata/file/extension/identity::uac-exe-basename
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script/
      - id: metadata/file/extension/identity::uninstaller-exe-basename
  - id: lwrite
    desc: Legacy file write API
    crit: notable
    conf: 0.88
    for: [pe, dll]
    platforms: [windows]
    if:
      type: symbol
      exact: lwrite
