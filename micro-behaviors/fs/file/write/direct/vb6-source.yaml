defaults:
  platforms: [windows]
  for: [vbs]

traits:
  - id: vb6-put-binary-source
    desc: VB6 binary file put
    crit: baseline
    conf: 0.88
    if:
      type: text
      substr: Put #

  - id: vb6-temp-exe-output
    desc: VB6 writes TEMP executable
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: Environ$("TEMP") & "\Crypted.exe"

  - id: vb6-filecopy-output
    desc: VB6 FileCopy output
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: FileCopy Environ$("TEMP") & "\Crypted.exe"

composite_rules:
  - id: vb6-temp-exe-binary-write
    desc: VB6 writes temporary executable
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/fs/file/write/direct::vb6-put-binary-source
      - id: micro-behaviors/fs/file/write/direct::vb6-temp-exe-output
