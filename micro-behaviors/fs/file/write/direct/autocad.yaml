defaults:
  for:
    - vbs
    - oledoc
    - ooxml
  platforms: [windows]
  size_max: 16384
  crit: notable
  conf: 0.9

traits:
  - id: thisdocument-save
    desc: Saves active document after write
    crit: suspicious
    if:
      type: text
      exact: "thisdocument.Save"
      section: .text
