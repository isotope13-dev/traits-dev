defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: js-file-write
    desc: Writes file via Node.js fs
    crit: baseline
    if:
      type: text
      regex: 'fs\.write(File)?Sync\s*\('
  - id: etc-hosts-literal
    desc: References /etc/hosts path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: /etc/hosts
composite_rules:
  - id: js-etc-hosts-write
    desc: Writes to /etc/hosts via Node.js
    crit: suspicious
    conf: 0.9
    attack: T1562.006
    all:
      - id: js-file-write
      - id: etc-hosts-literal
