defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: node-write-file-sync
    desc: Node synchronously writes a file
    crit: notable
    if:
      type: symbol
      kind: member
      regex: '(^|\.)writeFileSync$'

  - id: node-write-file-sync-call
    desc: Node calls imported writeFileSync
    crit: notable
    if:
      type: symbol
      kind: call
      exact: writeFileSync

  - id: node-writes-javascript-path
    desc: Node writes a JavaScript file path
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'writeFileSync\s*\([^)]{0,180}\.m?js["'']'
  - id: node-temp-script-path
    desc: Temporary script.js path
    crit: component
    conf: 0.82
    if:
      type: text
      word: script.js
  - id: node-append-file-sync
    desc: Node synchronously appends to a file
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: appendFileSync

  - id: js-file-write
    desc: Writes file via Node.js fs
    crit: baseline
    if:
      type: text
      regex: 'fs\.write(File)?Sync\s*\('

  - id: js-bracket-file-write
    desc: Node bracket file write
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "fs\\[['\"]writeFile(Sync)?['\"]\\]"
  - id: etc-hosts-literal
    desc: References /etc/hosts path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: /etc/hosts
  - id: js-windows-hosts-path
    desc: Windows hosts file path
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)(system32[\\/].{0,24}drivers[\\/].{0,24}etc[\\/]hosts|drivers[\\/]+etc[\\/]hosts)'
composite_rules:
  - id: js-etc-hosts-write
    desc: Writes to /etc/hosts via Node.js
    crit: suspicious
    conf: 0.9
    attack: T1562.006
    # Keep the write API and hosts path close together. A bundled @types/node
    # declaration can contain both writeFileSync() and documentation
    # mentioning /etc/hosts, but that is not a write operation.
    near_bytes: 128
    all:
      - id: js-file-write
    any:
      - id: etc-hosts-literal
      - id: js-windows-hosts-path
