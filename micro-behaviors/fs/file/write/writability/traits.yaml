# Writability checks used before attempting directory operations.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95

traits:
  - id: readme-writability-check
    desc: Directory writability check via temp file
    crit: baseline
    conf: 0.97
    if:
      type: text
      exact: readme.1xt
