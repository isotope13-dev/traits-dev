defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: write-file
    desc: Write data to file handle
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^_?WriteFile(?:@\d+)?$
  - id: writefile-api
    desc: WriteFile API string reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: WriteFile
