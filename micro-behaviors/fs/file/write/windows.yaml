defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: write-file
    desc: Write data to file handle
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^_?WriteFile(?:@\d+)?$
  - id: writefile-api
    desc: WriteFile API string reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: WriteFile
    unless:
      - type: metrics
        field: pe.has_signature
        min: 1
      - type: basename
        exact: UAC.exe
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: lwrite
    desc: Legacy file write API
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: lwrite
