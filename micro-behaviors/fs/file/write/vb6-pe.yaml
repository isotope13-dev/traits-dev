defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: vb6-file-open
    desc: VB6 runtime file open helper
    crit: baseline
    conf: 0.93
    if:
      type: symbol
      exact: vbaFileOpen

  - id: vb6-put-owner3
    desc: VB6 runtime binary file write
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: vbaPutOwner3

composite_rules:
  - id: vb6-binary-file-write
    desc: VB6 runtime opens and writes file
    crit: notable
    conf: 0.95
    all:
      - id: vb6-file-open
      - id: vb6-put-owner3
