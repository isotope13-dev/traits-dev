# File Write Operations
# MBC: C0052 (Write File)
# ATT&CK: T1105
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [binaries, c]
traits:
  - id: write
    desc: Write files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: ^(fwrite|write|pwrite|pwrite64)$
