defaults:
  for: [binaries, scripts, source, documents, manifests, data, media]
  platforms: [linux, macos, windows, unix, android, ios]
  size_max: 16384
  crit: notable
  conf: 0.9

traits:
  - id: thisdocument-save
    desc: Saves active document after write
    crit: suspicious
    if:
      type: raw
      exact: "thisdocument.Save"
      section: .text
