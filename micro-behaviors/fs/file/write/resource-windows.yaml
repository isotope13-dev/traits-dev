defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: update-resource-a
    desc: "Modify PE resources via UpdateResourceA"
    crit: notable
    if:
      type: symbol
      exact: UpdateResourceA
  - id: begin-update-resource-a
    desc: "Begin modifying PE resources"
    crit: notable
    if:
      type: symbol
      exact: BeginUpdateResourceA
  - id: end-update-resource-a
    desc: "Commit PE resource modifications"
    crit: notable
    if:
      type: symbol
      exact: EndUpdateResourceA
  - id: update-resource-w
    desc: "Modify PE resources via UpdateResourceW"
    crit: notable
    if:
      type: symbol
      exact: UpdateResourceW
