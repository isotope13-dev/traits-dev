defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: filestream-open-read
    desc: FileStream open for read
    crit: baseline
    conf: 0.86
    if:
      type: raw
      regex: 'new FileStream\(\w+,\s*FileMode\.Open,\s*FileAccess\.Read\)'
  - id: filestream-create-write
    desc: FileStream create for overwrite
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: 'new FileStream\(\w+,\s*FileMode\.Create,\s*FileAccess\.Write\)'
composite_rules:
  - id: self-read-then-overwrite
    desc: Reads self then overwrites target
    crit: suspicious
    conf: 0.93
    all:
      - id: filestream-open-read
      - id: filestream-create-write
