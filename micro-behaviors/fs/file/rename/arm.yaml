defaults:
  platforms: [linux]
  for: [elf]
  arch: [arm]
  crit: notable

traits:
  - id: arm-eabi-rename
    desc: ARM EABI direct rename(2) wrapper
    crit: notable
    conf: 0.99
    if:
      type: hex
      section: ".text"
      # mov r7, 38; svc 0 (Linux ARM EABI rename)
      pattern: "26 70 a0 e3 00 00 00 ef"
