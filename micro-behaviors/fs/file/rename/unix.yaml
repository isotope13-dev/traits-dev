defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c, cpp]
traits:
  - id: rename-base
    desc: Rename files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: rename
  - id: renameat
    desc: Rename files by fd/path
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: renameat
  - id: renameat2
    desc: Rename files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: renameat2
  - id: rename-account-file
    desc: Renames Unix privileged account file
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      regex: '^rename(at|at2)?$'
      arg:
        kind: string
        regex: '^/etc/(passwd|shadow|master\.passwd|sudoers)$'
  - id: rename-loader-file
    desc: Renames Unix privileged loader file
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      regex: '^rename(at|at2)?$'
      arg:
        kind: string
        regex: '^/(etc/ld\.so\.preload|root/\.ssh/authorized_keys|etc/ssh/sshd_config)$'
composite_rules:
  - id: rename
    desc: Rename files
    crit: baseline
    conf: 0.66
    any:
      - id: rename-base
      - id: renameat
      - id: renameat2
