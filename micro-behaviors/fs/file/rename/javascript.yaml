defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.85
traits:
- id: fs-rename-sync
  desc: fs.renameSync file movement
  if:
    type: text
    regex: '\bfs\.renameSync\s*\('
- id: fs-rename
  desc: fs.rename file movement
  if:
    type: text
    regex: '\bfs\.rename\s*\(\s*[^)\s]'
- id: fs-promises-rename
  desc: fs.promises.rename file movement
  if:
    type: text
    regex: '\bfs\.promises\.rename\s*\('
- id: rename-target-exe-js--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.(rename(Sync)?|move)\s*\([^)\n]{0,160}["'']?\.(exe|dll)["'']?\s*\)'
  count_max: 1018883
- id: rename-target-exe-js--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.(rename(Sync)?|move)\s*\([^)\n]{0,160}["'']?\.(scr|com)["'']?\s*\)'
  count_max: 1018884
- id: rename-target-exe-js--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.(rename(Sync)?|move)\s*\([^)\n]{0,160}["'']?\.(cpl|pif)["'']?\s*\)'
  count_max: 1018885
composite_rules:
- id: rename-target-exe-js
  desc: Rename target with .exe extension
  crit: notable
  conf: 0.92
  any:
  - id: rename-target-exe-js--rx-1
  - id: rename-target-exe-js--rx-2
  - id: rename-target-exe-js--rx-3
