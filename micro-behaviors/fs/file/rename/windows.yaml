# File rename operations - Windows
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: set-file-short-name-w
    desc: Rewrite a file's 8.3 short name
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: SetFileShortNameW
composite_rules:
  - id: any-rename
    desc: Rename or move file on Windows
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/fs/file/rename::rename-base
      - id: micro-behaviors/fs/file/move::move-file
      - id: micro-behaviors/fs/file/move::move-file-ex
