# File rename operations - Windows
defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: any-rename
    desc: Rename or move file on Windows
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/fs/file/rename::rename-base
      - id: micro-behaviors/fs/file/move::move-file
      - id: micro-behaviors/fs/file/move::move-file-ex
