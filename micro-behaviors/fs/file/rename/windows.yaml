# File rename operations - Windows
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: rename-c-runtime
    desc: Rename file via C runtime
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "rename"
composite_rules:
  - id: any-rename
    desc: Rename or move file on Windows
    crit: notable
    conf: 0.9
    any:
      - id: rename-c-runtime
      - id: micro-behaviors/fs/file/move::move-file
      - id: micro-behaviors/fs/file/move::move-file-ex
