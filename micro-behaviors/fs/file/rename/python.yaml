defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  conf: 0.9
traits:
  - id: os-rename
    desc: os.rename file movement
    if:
      type: import
      exact: os.rename
  - id: os-replace
    desc: os.replace file movement
    if:
      type: import
      exact: os.replace
  - id: shutil-move
    desc: shutil.move file movement
    if:
      type: import
      exact: shutil.move
  # `.exe` rename target is a structural pattern (extension on string arg),
  # not a callable name — keep as text regex.
  - id: rename-target-exe
    desc: Rename target with .exe extension
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(rename|replace|move)\s*\([^)\n]{0,160}["'']?\.exe["'']?\s*\)'
