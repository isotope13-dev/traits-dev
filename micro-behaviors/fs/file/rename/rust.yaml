defaults:
  platforms: [windows, unix]
  for: [rust]

traits:
  - id: rust-fs-rename
    desc: Renames a path with Rust fs::rename
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: fs::rename(

  - id: current-exe-swap-rename
    desc: Renames current executable path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fs::rename\(&((current_exe,\s*&\w+)|(\w+,\s*&current_exe))'
