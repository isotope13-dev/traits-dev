# Ruby File Rename Operations
defaults:
  for: [ruby]
  platforms: [unix, windows]
traits:
  - id: ruby-rename
    desc: References Ruby File.rename
    crit: notable
    conf: 0.95
    if:
      # File.rename -> member chain
      type: symbol
      kind: member
      exact: 'File.rename'
  - id: ruby-fileutils-mv
    desc: References a FileUtils move or rename method
    crit: notable
    conf: 0.95
    if:
      # FileUtils.mv/move -> member chain
      type: symbol
      kind: member
      regex: '^FileUtils\.(mv|move)$'
  - id: ruby-rename-to-exe
    desc: Rename file to .exe (highly suspicious)
    crit: suspicious
    conf: 1.0
    if:
      # `File.rename(_, '...exe')` — match the call site with a `.exe` string arg,
      # which is what distinguishes this from the neutral ruby-rename member match
      # (a bare `kind: member` here was an identical duplicate of ruby-rename).
      type: symbol
      kind: call
      substr: 'File.rename'
      arg:
        kind: string
        substr: '.exe'
  - id: ruby-fileutils-mv-to-exe
    desc: Move/Rename file to .exe (highly suspicious)
    crit: suspicious
    conf: 1.0
    # `FileUtils.mv|move(..., "*.exe")` — the receiver-qualified call with a
    # `.exe` destination as source text (the call fact drops the FileUtils
    # receiver, so a text match preserves the precision).
    if:
      type: text
      regex: 'FileUtils\.(mv|move)\s*\([^)]{0,200}\.exe'
