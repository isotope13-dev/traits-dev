# Ruby File Rename Operations
defaults:
  for: [ruby]
  platforms: [unix, windows]
traits:
  - id: ruby-rename
    desc: Rename files (AST)
    crit: notable
    conf: 0.95
    if:
      # File.rename -> member chain
      type: symbol
      kind: member
      exact: 'File.rename'
  - id: ruby-fileutils-mv
    desc: Move/Rename files (FileUtils)
    crit: notable
    conf: 0.95
    if:
      # FileUtils.mv/move -> member chain
      type: symbol
      kind: member
      regex: '^FileUtils\.(mv|move)$'
  - id: ruby-rename-to-exe
    desc: Rename file to .exe (highly suspicious)
    crit: suspicious
    conf: 1.0
    if:
      # `File.rename(_, '...exe')` — match the call site with a `.exe` string arg,
      # which is what distinguishes this from the neutral ruby-rename member match
      # (a bare `kind: member` here was an identical duplicate of ruby-rename).
      type: symbol
      kind: call
      substr: 'File.rename'
      arg:
        kind: string
        substr: '.exe'
  - id: ruby-fileutils-mv-to-exe
    desc: Move/Rename file to .exe (highly suspicious)
    crit: suspicious
    conf: 1.0
    if:
      type: tree-sitter
      query: |-
        (call
          receiver: (constant) @class
          method: (identifier) @method
          arguments: (argument_list
            (string)
            (string (string_content) @target)
          )
          (#eq? @class "FileUtils")
          (#match? @method "^(mv|move)$")
          (#match? @target "\\.exe$")
        )
