defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.86

traits:
  - id: mv-command
    desc: Shell mv command
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: '(^|[;&|()]\s*)mv\s+'
  - id: mv-log-to-system-bin
    desc: Moves log file into system bin
    conf: 0.92
    attack: T1036.005
    if:
      type: text
      regex: '(^|[;&|()]\s*)mv\s+[^;&|`\n]{1,180}\.log\s+/usr/bin/[A-Za-z0-9._-]{1,80}\b'
  - id: quiet-mv-command
    desc: mv command suppresses stderr
    conf: 0.86
    if:
      type: text
      regex: '(^|[;&|()]\s*)mv\s+[^;&|`\n]{1,220}\s+2>/dev/null'
  - id: mv-before-local-exec
    desc: Renames a file before local execution
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?ms)^\s*mv\s+\S{1,80}\s+\S{1,80}[\s\S]{0,180}^\s*\./\S{1,80}

composite_rules:
  - id: quiet-mv-chmod-executable
    desc: Quiet mv followed by executable chmod
    crit: suspicious
    conf: 0.94
    attack: T1036.005
    all:
      - id: quiet-mv-command
      - id: micro-behaviors/fs/chmod/executable/mode::shell-7xx
    unless:
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - id: metadata/binary/linking/runtime::cosmopolitan-marker
