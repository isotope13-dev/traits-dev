# File moving and renaming - Windows
# General file operation; T1486 (ransomware) mapping belongs in composites
# that combine MoveFile with encryption indicators
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: move-file
    desc: Move or rename file
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "MoveFile[AW]?$"
  - id: move-file-ex
    desc: Move or rename file with options
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "MoveFileEx[AW]?$"
