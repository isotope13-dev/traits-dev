defaults:
  platforms:
    - unix
    - windows
  for: [c, cpp]
traits:
  - id: asm-pe-header-manipulation-dos
    conf: 0.8
    crit: component
    desc: PE header DOS signature reference
    if:
      type: text
      word: IMAGE_DOS_SIGNATURE
  - id: asm-pe-header-manipulation-nt
    conf: 0.8
    crit: component
    desc: PE header NT signature reference
    if:
      type: text
      word: IMAGE_NT_SIGNATURE
  - id: asm-pe-header-manipulation-entrypoint
    conf: 0.8
    crit: component
    desc: PE entry point header field
    if:
      type: text
      word: AddressOfEntryPoint
    downgrade:
      any:
        - type: text
          word: IMAGE_FILE_MACHINE_I386
        - id: pe-viewer-header-labels
  - id: pe-viewer-machine-types
    crit: component
    desc: PE machine type display labels
    if:
      type: text
      word: IMAGE_FILE_MACHINE_I386
  - id: pe-viewer-header-labels
    crit: component
    desc: PE viewer structure header labels
    if:
      type: text
      word: IMAGE_SECTION_HEADER
  - id: pe-loader-tool
    crit: component
    desc: PE loader/analysis tool format strings
    for:
      - pe
    if:
      type: text
      substr: Portable executable for %s (PE)
  - id: asm-pe-header-manipulation-sizeofimage
    conf: 0.8
    crit: component
    desc: PE header SizeOfImage reference
    if:
      type: text
      word: SizeOfImage
  - id: asm-pe-header-manipulation-layout-sections
    conf: 0.8
    crit: component
    desc: PE NumberOfSections reference
    if:
      type: text
      word: NumberOfSections
  - id: asm-pe-header-manipulation-layout-sizeofraw
    conf: 0.8
    crit: component
    desc: PE SizeOfRawData reference
    if:
      type: text
      word: SizeOfRawData
  - id: asm-pe-header-manipulation-layout-virtualaddr
    conf: 0.8
    crit: component
    desc: PE VirtualAddress reference
    if:
      type: text
      word: VirtualAddress
  - id: asm-pe-header-manipulation-layout-characteristics
    conf: 0.8
    crit: component
    desc: PE characteristics reference
    if:
      type: text
      word: characteristics
  - id: asm-pe-header-manipulation-layout-pointerraw
    conf: 0.8
    crit: component
    desc: PE PointerToRawData reference
    if:
      type: text
      word: PointerToRawData
  - id: asm-pe-entrypoint-patch-offset
    conf: 0.92
    crit: suspicious
    desc: PE entry point patched by offset
    if:
      type: text
      regex: mov\s+\[edi\+28h\],\s*eax
  - id: asm-pe-sizeofimage-patch-offset
    conf: 0.92
    crit: suspicious
    desc: PE SizeOfImage patched by offset
    if:
      type: text
      regex: mov\s+\[edi\+50h\],\s*eax
  - id: asm-pe-section-growth-offset
    conf: 0.9
    crit: suspicious
    desc: PE section sizes patched by offset
    if:
      type: text
      regex: mov\s+\[esi\+(08|10)h\],\s*eax
  - id: asm-pe-section-flags-patch
    conf: 0.9
    crit: suspicious
    desc: PE section flags made writable executable
    if:
      type: text
      regex: or\s+dword ptr\s+\[esi\+24h\],\s*0A0000020h
composite_rules:
  - id: asm-pe-header-manipulation
    conf: 0.8
    crit: baseline
    desc: Source references multiple PE header fields
    needs: 2
    any:
      - id: asm-pe-header-manipulation-dos
      - id: asm-pe-header-manipulation-nt
      - id: asm-pe-header-manipulation-entrypoint
      - id: asm-pe-header-manipulation-sizeofimage
  - id: asm-pe-header-manipulation-layout
    conf: 0.8
    crit: baseline
    desc: Source references PE section layout fields
    needs: 2
    any:
      - id: asm-pe-header-manipulation-layout-sections
      - id: asm-pe-header-manipulation-layout-sizeofraw
      - id: asm-pe-header-manipulation-layout-virtualaddr
      - id: asm-pe-header-manipulation-layout-characteristics
      - id: asm-pe-header-manipulation-layout-pointerraw
  - id: asm-pe-header-manipulation-offsets
    conf: 0.93
    crit: suspicious
    desc: PE header fields rewritten by offsets
    needs: 2
    any:
      - id: asm-pe-entrypoint-patch-offset
      - id: asm-pe-sizeofimage-patch-offset
      - id: asm-pe-section-growth-offset
      - id: asm-pe-section-flags-patch
