# WASI filesystem imports — a WASM module's file capability surface.
#
# A WebAssembly module touches the host filesystem only through WASI imports.
# filefacts parses the import section, so these match the declared host
# imports. `path_open` opens an arbitrary host path and `path_unlink_file`
# deletes one (notable capabilities); `fd_read`/`fd_write` are usually
# stdio (baseline) but are the read/write primitives.
defaults:
  platforms: [windows, unix]
  for: [wasm]
  conf: 0.9
traits:
  - id: wasi-path-open
    desc: WASM opens a host path via WASI
    crit: notable
    if:
      type: import
      exact: "path_open"
  - id: wasi-path-unlink
    desc: WASM deletes a host path via WASI
    crit: notable
    if:
      type: import
      exact: "path_unlink_file"
  - id: wasi-fd-read
    desc: WASM reads a file descriptor via WASI
    crit: baseline
    if:
      type: import
      exact: "fd_read"
  - id: wasi-fd-write
    desc: WASM writes a file descriptor via WASI
    crit: baseline
    if:
      type: import
      exact: "fd_write"
