# PE File Inspection APIs
# APIs for parsing and inspecting PE file headers
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.85
traits:
  - id: inline-pe-signature-check
    desc: Inline MZ and PE validation
    conf: 0.9
    size_max: 1048576
    if:
      type: hex
      section: .text
      pattern: 66 81 38 4D 5A [0-32] 81 3? 50 45 00 00
    unless:
      - id: metadata/binary/metrics::many-imports
  - id: image-nt-header
    desc: Parse PE NT headers via dbghelp
    if:
      type: symbol
      exact: "ImageNtHeader"
