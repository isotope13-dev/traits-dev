# PE File Inspection APIs
# APIs for parsing and inspecting PE file headers
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.85
traits:
  - id: inline-pe-signature-check
    desc: Inline MZ and PE validation
    conf: 0.9
    size_max: 1048576
    if:
      type: hex
      section: .text
      pattern: 66 81 38 4D 5A [0-32] 81 3? 50 45 00 00
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/binary/metrics/structural::many-imports
  - id: shellcode-pe-header-probe-x64
    desc: x64 shellcode probes MZ and PE headers
    crit: suspicious
    conf: 0.98
    size_max: 1048576
    if:
      type: hex
      pattern: "4D 5A 00 00 66 39 05 A4 EC FF FF 74 04 33 C9 EB 38"
      offset_range: [4096, null]
  - id: image-nt-header
    desc: Parse PE NT headers via dbghelp
    if:
      type: symbol
      exact: "ImageNtHeader"
  - id: dbghelp-dll-reference
    desc: dbghelp debugging-help library reference
    crit: component
    conf: 0.85
    if:
      type: text
      exact: "dbghelp.dll"
