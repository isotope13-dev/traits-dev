# File Attribute Manipulation - Windows
# Modifying file attributes (hidden, system, read-only)
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: set-file-attributes-a
    desc: Set file attributes (ANSI)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "SetFileAttributesA"
  - id: set-file-attributes-w
    desc: Set file attributes (Unicode)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "SetFileAttributesW"
  - id: set-file-attributes-source
    desc: SetFileAttributes API in source
    crit: baseline
    conf: 0.88
    for: [c, cpp]
    if:
      type: symbol
      exact: "SetFileAttributes"
  - id: hidden-attribute-usage
    desc: FileAttributes.Hidden usage
    crit: baseline
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: FileAttributes.Hidden
  - id: set-file-attributes-go
    desc: Go SetFileAttributes call
    crit: baseline
    conf: 0.86
    for: [go, pe]
    if:
      type: text
      regex: "windows\\.SetFileAttributes"
  - id: go-hidden-file-attribute-constant
    desc: Go FILE_ATTRIBUTE_HIDDEN constant
    crit: component
    conf: 0.86
    for: [go, pe]
    if:
      type: text
      word: "FILE_ATTRIBUTE_HIDDEN"
  - id: go-system-file-attribute-constant
    desc: Go FILE_ATTRIBUTE_SYSTEM constant
    crit: component
    conf: 0.84
    for: [go, pe]
    if:
      type: text
      word: "FILE_ATTRIBUTE_SYSTEM"
