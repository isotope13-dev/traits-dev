# File Attribute Manipulation - Scripts
# Detects use of 'attrib +h' to set the hidden attribute on files via command line
defaults:
  platforms: [windows, unix]
  for: [python, shell, batch, powershell]
  attack: T1564.001
traits:
  # Scripting.FileSystemObject hidden-attribute set: `file.Attributes = file.Attributes | 2`
  # (JScript) or `.Attributes = .Attributes Or 2` (VBScript). Bit 2 is
  # FILE_ATTRIBUTE_HIDDEN. Neutral capability — file-hiding intent lives in the
  # objectives/evasion composites that reference it.
  - id: fso-set-hidden-attribute
    desc: FSO sets hidden file attribute
    crit: notable
    conf: 0.85
    for: [javascript, vbs, html]
    if:
      type: text
      regex: '\.Attributes\s*(=\s*[^=\n]{0,60}(\||\bOr\b)\s*2\b|\|=\s*2\b)'
  - id: attrib-hidden
    desc: Windows attrib +h sets file hidden
    crit: suspicious
    conf: 0.9
    unless:
      - type: text
        substr: PlugIn.ico
      - type: text
        substr: bloat directories in Users Files
      - id: well-known/app/kubeflow-community::notebook-scripts
      - id: well-known/app/virtualbox::unattended-template
    if:
      type: text
      regex: 'attrib.{0,10}\+h'
    downgrade:
      any:
        - id: well-known/tool/development/batch-scripts::undeletable-dir-example-path
  - id: attrib-hidden-system
    desc: Windows attrib sets hidden and system
    crit: suspicious
    conf: 0.93
    unless:
      - type: text
        substr: PlugIn.ico
      - type: text
        substr: bloat directories in Users Files
      - id: well-known/app/virtualbox::unattended-template
    if:
      type: text
      regex: '(?i)attrib.{0,20}\+(h|s).{0,20}\+(h|s)'
    downgrade:
      any:
        - id: well-known/tool/development/batch-scripts::undeletable-dir-example-path
