# File Attribute Manipulation - Scripts
# Detects use of 'attrib +h' to set the hidden attribute on files via command line
defaults:
  platforms: [windows, linux, macos, unix]
  for: [python, shell, batch, powershell]
  attack: T1564.001
traits:
  - id: attrib-hidden
    desc: Windows attrib +h sets file hidden
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'attrib.{0,10}\+h'
  - id: attrib-hidden-system
    desc: Windows attrib sets hidden and system
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '(?i)attrib.{0,20}\+(h|s).{0,20}\+(h|s)'
