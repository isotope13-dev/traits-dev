# File Attribute Manipulation - Scripts
# Detects use of 'attrib +h' to set the hidden attribute on files via command line
defaults:
  platforms: [windows, unix]
  for: [python, shell, batch, powershell]
  attack: T1564.001
traits:
  - id: attrib-hidden
    desc: Windows attrib +h sets file hidden
    crit: suspicious
    conf: 0.9
    unless:
      - type: text
        substr: PlugIn.ico
      - type: text
        substr: bloat directories in Users Files
      - id: well-known/app/kubeflow-community::notebook-scripts
    if:
      type: text
      regex: 'attrib.{0,10}\+h'
    downgrade:
      any:
        - id: well-known/tool/development/batch-scripts::undeletable-dir-example-path
  - id: attrib-hidden-system
    desc: Windows attrib sets hidden and system
    crit: suspicious
    conf: 0.93
    unless:
      - type: text
        substr: PlugIn.ico
      - type: text
        substr: bloat directories in Users Files
    if:
      type: text
      regex: '(?i)attrib.{0,20}\+(h|s).{0,20}\+(h|s)'
    downgrade:
      any:
        - id: well-known/tool/development/batch-scripts::undeletable-dir-example-path
