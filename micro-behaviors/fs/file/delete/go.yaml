defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  mbc: C0047
  attack: T1070.004
traits:
  - id: os-Remove
    desc: Delete file (os.Remove)
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: call
      exact: os.Remove
  - id: os-RemoveAll
    desc: Recursive directory deletion
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: call
      exact: os.RemoveAll
  - id: os-Remove-string
    desc: os.Remove string in binary
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
      - pe
    if:
      type: string_value
      substr: os.Remove
  - id: os-RemoveAll-string
    desc: os.RemoveAll string in binary
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
      - pe
    if:
      type: string_value
      substr: os.RemoveAll
