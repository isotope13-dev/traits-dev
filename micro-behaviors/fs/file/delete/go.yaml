defaults:
  platforms: [windows, linux, macos]
  mbc: C0047
  attack: T1070.004
traits:
  - id: os-Remove
    desc: Delete file (os.Remove)
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: os.Remove
  - id: os-RemoveAll
    desc: Recursive directory deletion
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: os.RemoveAll
  - id: os-Remove-string
    desc: os.Remove string in binary
    # Baseline: every Go binary that imports `os` has this in gopclntab
    # regardless of whether the program actually deletes anything. The AST
    # detector `os-Remove` on Go source gives the real call-site signal.
    crit: baseline
    conf: 0.7
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: os.Remove
  - id: os-RemoveAll-string
    desc: os.RemoveAll string in binary
    # Baseline for the same reason as os-Remove-string.
    crit: baseline
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: os.RemoveAll
