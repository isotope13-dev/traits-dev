# File Delete Operations - Rust
# MBC: C0047 (Delete File)
# ATT&CK: T1070.004
defaults:
  attack: T1070.004
  mbc: C0047
  platforms: [linux, macos, windows, unix, android, ios]
  for: [rust]
traits:
  - id: fs-remove_file
    desc: Delete file
    crit: notable
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "fs::remove_file"
  - id: fs-remove_dir
    desc: Delete directory
    crit: notable
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "fs::remove_dir"
  - id: fs-remove_dir_all
    desc: Recursive directory deletion
    crit: notable
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "fs::remove_dir_all"
