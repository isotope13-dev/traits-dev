# File-deletion capability expressed in an npm package.json script
# (rm -rf / rmdir / unlink). scripts[*] matches any script value, so this is
# generic across all lifecycle and dev scripts, not install-hook specific.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: C0047
  attack: T1070.004
traits:
  - id: npm-script-delete
    desc: Package script deletes files
    if:
      type: value
      path: 'scripts[*]'
      regex: '\brm\s+-rf\b|\brmdir\b|\bunlink\b'
