# File Delete Operations - Shell
# MBC: C0047 (Delete File)
# ATT&CK: T1070.004
defaults:
  attack: T1070.004
  mbc: C0047
  platforms: [unix, windows, macos]
  for: [shell]
traits:
  - id: rm-force-tmp-var-dev
    desc: rm -f targeting tmp or dev
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'rm +\-[a-zA-Z]?f[a-zA-Z]? /(tmp|var/tmp|dev)/[\w/.\-\%]{0,64}'
composite_rules:
  - id: delete-rm-hardcoded
    desc: Deletes files in /tmp, /var/tmp, or /dev
    crit: notable
    conf: 0.66
    all:
      - id: rm-force-tmp-var-dev
    none:
      - id: micro-behaviors/fs/path/package-manager::apt-lists
