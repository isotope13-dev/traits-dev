# File Delete Operations - Shell
# MBC: C0047 (Delete File)
# ATT&CK: T1070.004
defaults:
  attack: T1070.004
  mbc: C0047
  platforms: [unix]
  for: [shell]
traits:
- id: rm-option-terminator
  desc: rm command uses option terminator
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '\brm\s+(-[a-z]{1,8}\s+){0,4}--\s+'
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - type: text
    regex: '(xargs|find)\b.{0,80}\brm\s'
  - type: text
    word: libtoolize
- id: mass-tmp-removal
  desc: Recursively removes the /tmp root
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(?m)^\s*rm\s+-rf\s+/tmp/\s*(#.{0,80})?$'
- id: delete-rm-hardcoded
  desc: Deletes files in /tmp, /var/tmp, or /dev
  crit: notable
  conf: 0.66
  if:
    type: text
    regex: 'rm +\-[a-zA-Z]?f[a-zA-Z]? /(tmp|var/tmp|dev)/'
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: micro-behaviors/fs/path/package-manager::apt-lists
- id: shell-delete-installer-artifact
  desc: Shell deletes installer artifact
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '(?i)\brm\s+(-[rf]+\s+)?\.?[a-z0-9_-]*(install|setup)\.[a-z0-9]+\b'
composite_rules: []
