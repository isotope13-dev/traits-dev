# File Delete Operations - Shell
# MBC: C0047 (Delete File)
# ATT&CK: T1070.004
defaults:
  attack: T1070.004
  mbc: C0047
  platforms: [unix]
  for: [shell]
traits:
- id: mass-tmp-removal
  desc: Mass removal of /tmp files
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: rm\s+-rf\s+/tmp/
- id: delete-rm-hardcoded
  desc: Deletes files in /tmp, /var/tmp, or /dev
  crit: notable
  conf: 0.66
  if:
    type: text
    regex: 'rm +\-[a-zA-Z]?f[a-zA-Z]? /(tmp|var/tmp|dev)/'
  unless:
  - id: micro-behaviors/fs/path/package-manager::apt-lists
composite_rules: []
