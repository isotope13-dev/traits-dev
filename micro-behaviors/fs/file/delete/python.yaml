# File Delete Operations - Python
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  crit: baseline
  conf: 0.8
traits:
  - id: py-remove
    desc: "File deletion (os.remove/os.unlink)"
    if:
      type: raw
      regex: 'os\.(remove|unlink)\('
  - id: py-rmtree
    desc: "Recursive directory deletion (rmtree)"
    crit: notable
    if:
      type: string_value
      regex: '\.rmtree\('
