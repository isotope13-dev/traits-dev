defaults:
  platforms: [windows, unix]
  for:
    - python
  crit: baseline
  conf: 0.8
traits:
  - id: py-remove
    desc: File deletion (os.remove/os.unlink)
    if:
      type: text
      regex: os\.(remove|unlink)\(
  - id: py-remove-monkey-patch
    desc: Python replaces os.remove with a wrapper
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: os\.remove\s*=\s*[A-Za-z_]\w*
  - id: py-rmtree
    desc: Recursive directory deletion (rmtree)
    crit: notable
    if:
      type: string_literal
      regex: \.rmtree\(
