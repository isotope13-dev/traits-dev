defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  crit: baseline
  conf: 0.8
traits:
  - id: py-remove
    desc: File deletion (os.remove/os.unlink)
    if:
      type: text
      regex: os\.(remove|unlink)\(
  - id: py-rmtree
    desc: Recursive directory deletion (rmtree)
    crit: notable
    if:
      type: string_literal
      regex: \.rmtree\(
