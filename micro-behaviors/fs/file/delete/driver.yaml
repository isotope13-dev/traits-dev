defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: irp-file-delete
    desc: Direct IRP file deletion (kernel driver)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Irp(FileDelete|FileCreate|SetFileAttributes)
  - id: force-delete-string
    desc: "\"Force Delete\" (kernel driver funcality)"
    crit: suspicious
    conf: 0.8
    size_max: 10485760
    if:
      type: text
      substr: Force Delete
    unless:
      - id: metadata/binary/metrics/size::massive-executable
