# File Delete Operations
# MBC: C0047 (Delete File)
# ATT&CK: T1070.004
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [elf, shell, python]
traits:
  # NOTE: Go runtime and standard library use unlink/remove for temp file
  # cleanup and normal file operations.
  - id: unlink
    desc: Delete files
    crit: notable
    conf: 0.3
    if:
      type: symbol
      exact: "unlink"
  - id: unlinkat
    desc: Delete files by fd/path
    crit: notable
    conf: 0.3
    if:
      type: symbol
      exact: "unlinkat"
  - id: remove
    desc: Delete files
    crit: notable
    conf: 0.3
    if:
      type: symbol
      exact: "remove"
  - id: js-fs-remove
    desc: Delete files (fs)
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: '(fs|fse|fsExtra)\.remove'
composite_rules:
  - id: delete-comp
    desc: Delete files
    crit: notable
    conf: 0.3
    any:
      - id: unlink
      - id: unlinkat
      - id: remove
