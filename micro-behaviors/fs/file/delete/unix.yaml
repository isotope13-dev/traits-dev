# File Delete Operations
# MBC: C0047 (Delete File)
# ATT&CK: T1070.004
defaults:
  platforms: [linux, macos]
  for: [elf, macho, shell, python]
traits:
  # Go runtime and standard library use unlink/remove for temp file cleanup
  # and normal file operations — downgrade on Go binaries so only deliberate
  # use in non-Go binaries stays at notable.
  - id: unlink
    desc: Delete files
    crit: notable
    conf: 0.3
    if:
      type: symbol
      exact: "unlink"
    unless:
      - id: metadata/file/string/identity::python3-interpreter-basename
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiled::rust-debug-symbol-parser-library
        - id: metadata/file/string/identity::system-shell-basename
        - id: metadata/lang/compiler/systems::go-binary
  - id: unlinkat
    desc: Delete files by fd/path
    crit: notable
    conf: 0.3
    if:
      type: symbol
      exact: "unlinkat"
    unless:
      - id: well-known/app/tabby::tabby-basename
      - id: metadata/file/string/identity::python3-interpreter-basename
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiled::rust-debug-symbol-parser-library
  - id: remove
    desc: Delete files
    crit: notable
    conf: 0.3
    if:
      type: symbol
      exact: "remove"
    unless:
      - id: metadata/file/extension/identity::python-type-stub-extension
  - id: js-fs-remove
    desc: Delete files (fs)
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: '(fs|fse|fsExtra)\.remove'
composite_rules:
  - id: delete-comp
    desc: Delete files
    crit: notable
    conf: 0.3
    any:
      - id: unlink
      - id: unlinkat
      - id: remove
