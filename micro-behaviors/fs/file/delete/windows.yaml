defaults:
  platforms:
    - unix
    - windows
traits:
  - id: deletefile
    desc: Delete files (Windows API)
    crit: notable
    conf: 0.66
    for:
      - pe
      - c
    if:
      type: symbol
      exact: DeleteFile
  - id: deletefile-a
    desc: Delete files (Windows API ANSI)
    crit: notable
    conf: 0.66
    for:
      - pe
      - c
    if:
      type: symbol
      exact: DeleteFileA
  - id: deletefile-a-text
    desc: Delete files (Windows API ANSI)
    crit: notable
    conf: 0.64
    for:
      - pe
      - c
    if:
      type: text
      word: DeleteFileA
  - id: deletefile-w
    desc: Delete files (Windows API)
    crit: notable
    conf: 0.66
    for:
      - pe
      - c
    if:
      type: symbol
      exact: DeleteFileW
  - id: del-command
    desc: File deletion using "del" command.
    crit: notable
    conf: 0.7
    for:
      - batch
    if:
      type: text
      regex: del %?[A-Za-z0-9_]+%?(\.exe)?
    unless:
      - type: basename
        exact: build-pty4j-libpty.bat
  - id: batch-self-delete
    desc: Batch script self-deletion command
    crit: suspicious
    conf: 0.95
    attack: T1070.004
    for:
      - batch
      - shell
    if:
      type: text
      regex: (?i)del\s+(/[a-z]\s+){0,3}"?%~f0"?
  - id: quiet-del-command-template
    desc: Quiet Windows del command template
    crit: notable
    conf: 0.87
    for:
      - pe
      - c
      - cpp
    if:
      type: text
      exact: 'del "%s" /Q'
composite_rules:
  - id: delete-win
    desc: Delete files (Windows API)
    crit: notable
    conf: 0.66
    any:
      - id: deletefile
      - id: deletefile-a
      - id: deletefile-a-text
      - id: deletefile-w
