defaults:
  for: [ruby]
  platforms: [unix, windows]
  crit: notable
  conf: 0.9
  mbc: C0047
  attack: T1070.004

traits:
  - id: ruby-file-delete-call
    desc: Ruby deletes an individual file
    if:
      type: symbol
      kind: call
      regex: '^(File\.(delete|unlink)|FileUtils\.(rm|rm_f))$'
