defaults:
  for: [rust]
  platforms: [windows, unix]

traits:
  - id: rust-fs-copy
    desc: Rust fs copy call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(std::)?fs::copy\('

  - id: current-exe-copy
    desc: Copies current executable path
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '(std::)?fs::copy\(&current_exe,\s*&\w+\)'
