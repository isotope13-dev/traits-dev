# File Copy Operations
# MBC: C0046 (Create File)
# ATT&CK: T1105
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: copyfile
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "copyfile"
  - id: copyfile-win
    desc: Copy files (Windows API)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "CopyFile"
  - id: copyfile-a
    desc: Copy files (Windows API ANSI)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "CopyFileA"
  - id: copyfile-w
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      # fcopyfile: use micro-behaviors/fs/file/binary/traits.yaml::fcopyfile-macos (canonical)
      exact: "CopyFileW"
composite_rules:
  - id: copy
    desc: Copy files
    crit: notable
    conf: 0.66
    any:
      - id: copyfile
      - id: copyfile-win
      - id: copyfile-a
      - id: copyfile-w
