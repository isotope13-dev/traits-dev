defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, c, cpp]
traits:
  - id: copyfile
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: copyfile
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: copyfile-win
    desc: Copy files (Windows API)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFile
  - id: copyfile-a
    desc: Copy files (Windows API ANSI)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFileA
  - id: copyfile-w
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFileW
    unless:
      - id: well-known/lib/electron::electron-enable-logging-env
      - type: metrics
        field: exports.count
        min: 100
      - id: metadata/binary/installer/script/
      - id: metadata/file/extension/identity::uninstaller-exe-basename
  - id: copyfile-ex-w
    desc: Copy files with progress callback
    crit: notable
    conf: 0.72
    platforms: [windows]
    for: [pe, dll]
    if:
      type: symbol
      exact: CopyFileExW
  - id: vb6-rtcfilecopy
    desc: VB6 runtime file copy
    crit: notable
    conf: 0.84
    platforms: [windows]
    for: [pe]
    if:
      type: symbol
      exact: rtcFileCopy
  - id: windows-shell-copy-command
    desc: Windows shell copy command template
    crit: notable
    conf: 0.87
    for:
      - pe
      - c
      - cpp
    platforms: [windows]
    if:
      type: text
      exact: 'copy "%s" "%s"'

  - id: powershell-copy-item-command
    desc: References the PowerShell Copy-Item command
    crit: notable
    conf: 0.9
    for: [batch, vbs, powershell, javascript]
    platforms: [windows]
    if:
      type: text
      substr: Copy-Item
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
composite_rules:
  - id: copy
    desc: Copy files
    crit: notable
    conf: 0.66
    any:
      - id: copyfile
      - id: copyfile-win
      - id: copyfile-a
      - id: copyfile-w
      - id: copyfile-ex-w
      - id: vb6-rtcfilecopy
      - id: windows-shell-copy-command
