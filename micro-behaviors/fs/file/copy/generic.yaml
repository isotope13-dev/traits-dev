defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: copyfile
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: copyfile
  - id: copyfile-win
    desc: Copy files (Windows API)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFile
  - id: copyfile-a
    desc: Copy files (Windows API ANSI)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFileA
  - id: copyfile-w
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFileW
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - type: metrics
        field: binary.export_count
        min: 100
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: vb6-rtcfilecopy
    desc: VB6 runtime file copy
    crit: notable
    conf: 0.84
    platforms: [windows]
    for: [pe]
    if:
      type: symbol
      exact: rtcFileCopy
composite_rules:
  - id: copy
    desc: Copy files
    crit: notable
    conf: 0.66
    any:
      - id: copyfile
      - id: copyfile-win
      - id: copyfile-a
      - id: copyfile-w
      - id: vb6-rtcfilecopy
