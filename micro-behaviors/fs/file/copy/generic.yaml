defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [scripts, binaries]
traits:
  - id: copyfile
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: copyfile
  - id: copyfile-win
    desc: Copy files (Windows API)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFile
  - id: copyfile-a
    desc: Copy files (Windows API ANSI)
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFileA
  - id: copyfile-w
    desc: Copy files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: CopyFileW
    unless:
      - type: string_value
        substr: "ELECTRON_ENABLE_LOGGING"
      - type: exports_count
        min: 100
composite_rules:
  - id: copy
    desc: Copy files
    crit: notable
    conf: 0.66
    any:
      - id: copyfile
      - id: copyfile-win
      - id: copyfile-a
      - id: copyfile-w
