# .cab backup extension used by file infectors
# The .cab extension is used by this malware to back up original executables
# before replacing them with copies of itself
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.95
traits:
  - id: cab-backup-format-string
    desc: CAB backup format string for infected files
    crit: baseline
    conf: 0.97
    if:
      type: text
      regex: '%s(?:%s)?\.cab'

  - id: cab-extension-infection
    desc: .cab extension used as infection backup
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '\.cab\b'
    not:
      - substr: 'Cabinet'
      - substr: 'cabarc'
      - substr: 'msiexec'
