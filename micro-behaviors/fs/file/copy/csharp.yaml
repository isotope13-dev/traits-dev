defaults:
  for: [csharp]
  platforms: [windows, linux, macos, unix, android, ios]
traits:
  - id: file-copy-source
    desc: File.Copy call in C# source
    crit: notable
    conf: 0.88
    if:
      type: ast
      kind: call
      exact: File.Copy
  - id: self-copy-random-exe
    desc: Self-copy to randomized exe name
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'File\.Copy\(\w+,\s*.{0,80}\+\s*\w+\s*\+\s*"\.exe"\)'
