defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: file-copy-source
    desc: File.Copy call in C# source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: File.Copy
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
  - id: self-copy-random-exe
    desc: Self-copy to randomized exe name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'File\.Copy\(\w+,\s*.{0,80}\+\s*\w+\s*\+\s*"\.exe"\)'
