defaults:
  for: [ruby]
  platforms: [unix, windows]
traits:
  - id: ruby-fileutils-copy
    desc: FileUtils copies file
    crit: notable
    conf: 0.9
    if:
      type: ast
      query: |
        (call
          receiver: (constant) @class
          method: (identifier) @method
          (#eq? @class "FileUtils")
          (#match? @method "^(cp|copy)$")
        )
