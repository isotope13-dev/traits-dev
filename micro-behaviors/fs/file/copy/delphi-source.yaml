defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: copyfile-call-source
    desc: Delphi CopyFile API call
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: '(?i)\bcopyfile\s*\('
  - id: system-dir-lorena-copy
    desc: Copies self to Lorena
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: "SysDir + '\\Lorena.exe'"
  - id: mark-vxd-copy
    desc: Drops Mark VXD copy
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      exact: "copyfile(pchar(guorm),'C:\\Mark.vxd',true);"
  - id: mail-attachment-staging-copy
    desc: Stages self as attachment
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      exact: "copyfile(pchar(guorm),pchar(SysDir + '\\'+Att[chals]),true);"
  - id: p2p-shared-folder-copy-loop
    desc: Copies self into P2P shares
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      exact: "copyfile(pchar(guorm),pchar(Progfiles+CarpetasP2P[c]+gname[pr]+'.exe'),true);"
  - id: hta-payload-file-path
    desc: Writes Lorraine HTA payload
    crit: notable
    conf: 0.96
    if:
      type: string_value
      exact: "AssignFile (presentacion,'C:\\lorraine.c.hta');"
composite_rules:
  - id: self-install-copy-source
    desc: Self copy into system paths
    crit: suspicious
    conf: 0.98
    all:
      - id: system-dir-lorena-copy
      - id: mark-vxd-copy
