defaults:
  platforms: [windows, unix]
  for: [java, class]
traits:
  - id: fileinputstream-class
    desc: Java FileInputStream class reference
    crit: component
    conf: 0.85
    if:
      type: text
      substr: java/io/FileInputStream
  - id: fileoutputstream-class
    desc: Java FileOutputStream class reference
    crit: component
    conf: 0.85
    if:
      type: text
      substr: java/io/FileOutputStream
  - id: read-ref
    desc: Java read call reference
    crit: component
    conf: 0.75
    if:
      type: text
      word: read
  - id: write-ref
    desc: Java write call reference
    crit: component
    conf: 0.75
    if:
      type: text
      word: write
  - id: close-ref
    desc: Java close call reference
    crit: component
    conf: 0.75
    if:
      type: text
      word: close
  - id: java-files-copy
    desc: Java copies a stream to a path
    crit: notable
    conf: 0.95
    for: [class, jar, zip]
    if:
      type: import
      exact: java/nio/file/Files.copy
composite_rules:
  - id: java-stream-copy
    desc: Java stream-based file copy
    crit: notable
    conf: 0.9
    all:
      - id: fileinputstream-class
      - id: fileoutputstream-class
      - id: read-ref
      - id: write-ref
      - id: close-ref
