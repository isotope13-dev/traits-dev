defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: notable
  conf: 0.75
traits:
  - id: fs-copyfile
    desc: Copy file (fs.copyFile)
    if:
      type: ast
      kind: call
      exact: "fs.copyFile"
  - id: fs-copyfileSync
    desc: Copy file sync (fs.copyFileSync)
    if:
      type: ast
      kind: call
      exact: "fs.copyFileSync"
composite_rules:
  - id: fs-copy
    desc: Copy file (Node fs)
    crit: notable
    conf: 0.75
    any:
      - id: fs-copyfile
      - id: fs-copyfileSync
