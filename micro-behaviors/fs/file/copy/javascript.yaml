defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: notable
  conf: 0.75
traits:
  - id: fs-copyfile
    desc: Copy file (fs.copyFile)
    if:
      type: symbol
      kind: call
      exact: "fs.copyFile"
  - id: fs-copyfileSync
    desc: Copy file sync (fs.copyFileSync)
    if:
      type: symbol
      kind: call
      exact: "fs.copyFileSync"
  - id: fso-copyfile-method
    desc: FileSystemObject copies files on Windows
    platforms: [windows]
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(?i)(^|\.)CopyFile$'
composite_rules:
  - id: fs-copy
    desc: Copy file (Node fs)
    crit: notable
    conf: 0.75
    any:
      - id: fs-copyfile
      - id: fs-copyfileSync
  - id: fso-copyfile
    desc: Copy file via FileSystemObject
    platforms: [windows]
    crit: notable
    conf: 0.9
    all:
      - id: fso-copyfile-method
      - id: micro-behaviors/os/com/object::filesystemobject-progid
