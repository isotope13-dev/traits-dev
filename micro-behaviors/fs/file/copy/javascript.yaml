defaults:
  platforms: [windows, unix]
  for: [javascript]
  crit: notable
  conf: 0.75
traits:
  - id: fs-copyfile
    desc: Copy file (fs.copyFile)
    if:
      type: symbol
      kind: call
      exact: "fs.copyFile"
  - id: fs-copyfileSync
    desc: Copy file sync (fs.copyFileSync)
    if:
      type: symbol
      kind: call
      exact: "fs.copyFileSync"
  - id: fso-copyfile-method
    desc: FileSystemObject copies files on Windows
    platforms: [windows]
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(?i)(^|\.)CopyFile$'
  # Oversized junk-padded JScript often exhausts the call-fact budget before the
  # clear Startup self-copy runs, so keep a text atom for the same API surface.
  - id: fso-copyfile-text
    desc: FileSystemObject CopyFile call text
    platforms: [windows]
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '(?i)\.CopyFile\s*\('
    unless:
      - id: fso-copyfile-method
composite_rules:
  - id: fs-copy
    desc: Copy file (Node fs)
    crit: notable
    conf: 0.75
    any:
      - id: fs-copyfile
      - id: fs-copyfileSync
  - id: fso-copyfile
    desc: Copy file via FileSystemObject
    platforms: [windows]
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
    any:
      - id: fso-copyfile-method
      - id: fso-copyfile-text
    needs: 1