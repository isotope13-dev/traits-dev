defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: python-copy-destination-list
    desc: Python defines multiple copy destinations
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(COPIES|BACKUPS|REPLICAS)\s*=\s*\['

  - id: shutil-copy
    desc: Copies a file (shutil.copy)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: ^shutil\.(copy|copy2|copyfile)$
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-write-file-helper-call
    desc: Python calls a write_file helper
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: write_file
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-pycopyer-import
    desc: Python imports the pycopyer helper package
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: pycopyer
