defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: shutil-copy
    desc: Copies a file (shutil.copy)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: ^shutil\.(copy|copy2|copyfile)$

  - id: python-write-file-helper-call
    desc: Python calls a write_file helper
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: write_file

  - id: python-pycopyer-import
    desc: Python imports the pycopyer helper package
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: pycopyer
