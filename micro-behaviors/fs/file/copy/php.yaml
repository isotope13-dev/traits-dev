defaults:
  platforms: [unix, windows]
  for: [php]

traits:
  - id: copy-call
    desc: Copies file via copy()
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: copy
  - id: php-upload-temp-file-access
    desc: PHP accesses uploaded temporary file path
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: tmp_name
