defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [binaries, scripts]
traits:
  - id: fcntl
    desc: File descriptor manipulation and control
    crit: baseline
    mbc: E1083
    attack: T1083
    conf: 0.4
    if:
      type: symbol
      regex: ^_?fcntl$
    for: [elf, macho]
    platforms:
      - linux
      - macos
  - id: device-io-control-win
    desc: DeviceIoControl API usage
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: DeviceIoControl
    for: [pe]
    unless:
      - type: metrics
        field: binary.export_count
        min: 100
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: set-file-information-by-handle
    desc: Modify file metadata attributes
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: SetFileInformationByHandle
    for: [pe]
  - id: create-file-a-obfuscated
    desc: Obfuscated CreateFileA API string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: aieFAreeCtl
  - id: write-file-obfuscated
    desc: Obfuscated WriteFile API string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: tliirFWee
  - id: delete-file-a-obfuscated
    desc: Obfuscated DeleteFileA API string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: eilFAeeeDtl
  - id: copy-file-a-obfuscated
    desc: Obfuscated CopyFileA API string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: yeploiCFA
  - id: find-first-file-a-obfuscated
    desc: Obfuscated FindFirstFileA API string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: dslnriiiFAFFte
  - id: find-next-file-a-obfuscated
    desc: Obfuscated FindNextFileA API string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: dtenxlieiFNFA
  - id: find-close-obfuscated
    desc: Obfuscated FindClose API string
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: dsnoilFCe
composite_rules:
  - id: binary-file-ops
    desc: Binary file operations
    crit: baseline
    conf: 0.8
    any:
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/open::open-base
      - id: micro-behaviors/fs/file/read/
      - id: micro-behaviors/fs/file/write::write
  - id: file-overwrite-routine
    desc: In-place file overwrite routine
    crit: baseline
    conf: 0.72
    for: [macho]
    platforms: [macos]
    all:
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/read::fread
      - id: micro-behaviors/fs/file/write::write
      - id: micro-behaviors/fs/file/binary::fseek-func
  - id: obfuscated-file-enumeration-and-write
    desc: Obfuscated Win32 file operation APIs
    crit: suspicious
    conf: 0.94
    all:
      - id: find-first-file-a-obfuscated
      - id: find-next-file-a-obfuscated
    any:
      - id: create-file-a-obfuscated
      - id: write-file-obfuscated
      - id: delete-file-a-obfuscated
      - id: copy-file-a-obfuscated
