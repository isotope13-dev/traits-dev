defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  # NOTE: fread/fwrite moved to fs/file/read/unix.yaml and fs/file/write/unix.yaml
  # NOTE: read/write moved to fs/file/read/unix.yaml and fs/file/write/unix.yaml
  # NOTE: open/fopen moved to fs/file/open/unix.yaml
  # This file now focuses on composite operations
  - id: file-create-win
    desc: Windows file creation/open API
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "^_?CreateFile[AW](?:@\\d+)?$"
  - id: device-io-control-win
    desc: DeviceIoControl API usage
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "DeviceIoControl"
  - id: set-file-information-by-handle
    desc: Modify file metadata attributes
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "SetFileInformationByHandle"
composite_rules:
  - id: binary-file-ops
    desc: Binary file operations
    crit: baseline
    conf: 0.8
    any:
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/open::open-base
      - id: micro-behaviors/fs/file/read::read-dup
      - id: micro-behaviors/fs/file/write::write
