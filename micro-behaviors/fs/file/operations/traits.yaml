defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  # NOTE: fread/fwrite moved to fs/file/read/unix.yaml and fs/file/write/unix.yaml
  # NOTE: read/write moved to fs/file/read/unix.yaml and fs/file/write/unix.yaml
  # NOTE: open/fopen moved to fs/file/open/unix.yaml
  # This file now focuses on composite operations
  - id: file-create-win
    desc: Windows file creation/open API
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "^_?CreateFile[AW](?:@\\d+)?$"
  - id: device-io-control-win
    desc: DeviceIoControl API usage
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "DeviceIoControl"
  - id: set-file-information-by-handle
    desc: Modify file metadata attributes
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "SetFileInformationByHandle"
  - id: create-file-a-obfuscated
    desc: Obfuscated CreateFileA API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "aieFAreeCtl"
  - id: write-file-obfuscated
    desc: Obfuscated WriteFile API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "tliirFWee"
  - id: delete-file-a-obfuscated
    desc: Obfuscated DeleteFileA API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "eilFAeeeDtl"
  - id: copy-file-a-obfuscated
    desc: Obfuscated CopyFileA API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "yeploiCFA"
  - id: find-first-file-a-obfuscated
    desc: Obfuscated FindFirstFileA API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "dslnriiiFAFFte"
  - id: find-next-file-a-obfuscated
    desc: Obfuscated FindNextFileA API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "dtenxlieiFNFA"
  - id: find-close-obfuscated
    desc: Obfuscated FindClose API string
    crit: notable
    conf: 0.92
    if:
      type: string
      exact: "dsnoilFCe"
composite_rules:
  - id: binary-file-ops
    desc: Binary file operations
    crit: baseline
    conf: 0.8
    any:
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/open::open-base
      - id: micro-behaviors/fs/file/read
      - id: micro-behaviors/fs/file/write::write
  - id: obfuscated-file-enumeration-and-write
    desc: Obfuscated Win32 file operation APIs
    crit: suspicious
    conf: 0.94
    all:
      - id: find-first-file-a-obfuscated
      - id: find-next-file-a-obfuscated
    any:
      - id: create-file-a-obfuscated
      - id: write-file-obfuscated
      - id: delete-file-a-obfuscated
      - id: copy-file-a-obfuscated
