defaults:
  platforms: [linux, macos]
  for: [scripts]
traits:
  - id: flock-exclusive-nonblocking
    desc: Non-blocking exclusive file lock
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'flock\s*\(.{0,40},\s*LOCK_EX\s*\|\s*LOCK_NB|flock\s+-.{0,40}[xn]'
  - id: python-fcntl-flock
    desc: Uses fcntl.flock() for advisory file locking
    crit: notable
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: 'fcntl\.flock\s*\('
