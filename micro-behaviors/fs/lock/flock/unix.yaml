defaults:
  platforms: [linux, macos, android]
  for: [elf, macho, c]
traits:
  - id: flock-fn
    desc: Apply or remove advisory lock
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: flock
  - id: lockf-fn
    desc: Apply or remove advisory lock
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: lockf
composite_rules:
  - id: flock
    desc: Apply or remove advisory lock
    crit: baseline
    conf: 0.66
    any:
      - id: flock-fn
      - id: lockf-fn
