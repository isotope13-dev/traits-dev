defaults:
  for: [pe, dll, c, cpp]
  platforms: [windows]
traits:
  - id: lock-file
    desc: Lock a byte range in file
    crit: component
    conf: 0.82
    for: [c, cpp]
    if:
      type: text
      word: LockFile
  - id: lock-file-ex
    desc: Lock file byte range via overlapped API
    crit: component
    conf: 0.84
    for: [c, cpp]
    if:
      type: text
      word: LockFileEx
  - id: exclusive-lock-flag
    desc: Exclusive byte-range lock flag
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      word: LOCKFILE_EXCLUSIVE_LOCK
  # Byte-range locking is specialised (databases, archivers, a few daemons).
  # A new UnlockFileEx import appearing in a supply-chain diff is a real
  # purpose-change signal.
  - id: unlock-file-ex
    desc: Release a byte-range file lock
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: UnlockFileEx
composite_rules:
  - id: exclusive-lockfileex
    desc: Exclusive byte-range file locking
    crit: notable
    conf: 0.92
    all:
      - id: lock-file-ex
      - id: exclusive-lock-flag
