# FIFO (Named Pipe) Creation
# MBC: C0046 (Create File)
# ATT&CK: T1071
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [binaries, c]
traits:
  # mkfifo: use micro-behaviors/fs/pipe/fifo/traits.yaml::mkfifo-cmd (canonical)
  - id: fifo
    desc: Create FIFO named pipe via mkfifoat
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "mkfifoat"
