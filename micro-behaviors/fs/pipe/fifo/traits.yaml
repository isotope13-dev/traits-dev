defaults:
  for:
    - shell
    - elf
    - macho
    - python
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: mkfifo-cmd
    desc: mkfifo command (named pipe creation)
    crit: notable
    conf: 0.5
    mbc: F0003
    platforms:
      - linux
      - macos
      - unix
    if:
      type: string_value
      word: mkfifo
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
