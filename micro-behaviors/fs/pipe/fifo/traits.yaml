defaults:
  for: [scripts, binaries]
  platforms:
    - unix
    - windows
traits:
  - id: mkfifo-cmd
    desc: mkfifo command (named pipe creation)
    crit: notable
    conf: 0.5
    mbc: F0003
    platforms:
      - unix
    if:
      type: text
      word: mkfifo
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
