defaults:
  for: [scripts, binaries]
  platforms:
    - unix
    - windows
traits:
  - id: mkfifo-cmd
    desc: mkfifo command (named pipe creation)
    crit: notable
    conf: 0.5
    mbc: F0003
    platforms:
      - unix
    if:
      type: text
      regex: (^|[^A-Za-z0-9_./-])mkfifo([^A-Za-z0-9_./-]|$)
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
        - id: metadata/vendor/identity/
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format/
      - id: metadata/vendor/identity/
      - id: metadata/package/files/system-package::shell-completion-script
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
