defaults:
  for: [scripts, binaries]
  platforms:
    - unix
    - windows
traits:
  - id: mkfifo-cmd
    desc: mkfifo command (named pipe creation)
    crit: notable
    conf: 0.5
    mbc: F0003
    platforms:
      - unix
    if:
      type: text
      regex: (^|[^A-Za-z0-9_./-])mkfifo([^A-Za-z0-9_./-]|$)
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
        - id: metadata/binary/section/content::freebsd-kernel-image
    unless:
      - id: metadata/file/text::roff-document
      - id: metadata/binary/section/content::freebsd-kernel-image
