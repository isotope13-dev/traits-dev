# `cp -r <src> $VAR` — a recursive copy whose destination comes from a variable.
# Neutral capability: build scripts and installers stage trees this way. Kept as
# the single definition of this matcher; the flag class `-[A-Za-z]*r[A-Za-z]*`
# covers -r/-R/-rf/-av-style clusters, and requiring an explicit `\S+` source
# argument keeps it from spanning unrelated text.
defaults:
  platforms: [unix, android, ios]
  for: [elf, rust, shell]
  crit: notable
  conf: 0.9

traits:
  - id: recursive-copy-variable-destination-portable
    desc: Recursive copy to variable destination
    if:
      type: text
      regex: '\bcp\s+-[A-Za-z]*r[A-Za-z]*\s+\S+\s+\$[A-Za-z_][A-Za-z0-9_]*'
