defaults:
  platforms: [linux]
  for: [elf, rust, shell]
  crit: notable
  conf: 0.9

traits:
  - id: cp-command
    desc: Invokes cp file-copy command
    if:
      type: text
      regex: '(^|[\s;&|`$({])cp([ \t]|$)'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script

  - id: recursive-copy-command-variable-destination
    desc: Recursive copy command uses variable destination
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcp\s+-[A-Za-z]*r[A-Za-z]*\s+\S+\s+\$[A-Za-z_][A-Za-z0-9_]*'
