defaults:
  platforms: [unix]
  for: [elf, rust, shell]
  crit: notable
  conf: 0.9

traits:
  - id: cp-command
    desc: Invokes cp file-copy command
    if:
      type: text
      regex: '(^|[\s;&|`$({])cp[ \t]+[^\r\n;&|]{1,240}($|[\r\n;&|])'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
      - id: metadata/package/files/system-package::shell-completion-script
