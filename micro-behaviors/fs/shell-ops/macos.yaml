defaults:
  platforms: [macos]
  for: [shell]
  crit: notable
  conf: 0.9

traits:
  - id: rm-application-path
    desc: Recursive removal of /Applications app bundle
    if:
      type: text
      regex: '(?i)\brm\s+-r[fFiI]*.{0,80}/Applications/[^[:space:]]+\.app\b'

  - id: sudo-rm-application
    desc: sudo recursive removal of app bundle
    if:
      type: text
      regex: '(?i)\bsudo.{0,40}\brm\s+-r[fFiI]*.{0,80}/Applications/[^[:space:]]+\.app\b'

composite_rules:
  - id: remove-application-from-applications
    desc: Shell removes an application bundle from /Applications
    crit: notable
    conf: 0.92
    any:
      - id: rm-application-path
      - id: sudo-rm-application
    unless:
      - id: well-known/app/macos-benign::zed-official-signed-member
      - id: well-known/app/zed::official-linux-cli
