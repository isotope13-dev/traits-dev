defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: shell-pidl-append
    desc: Append shell item ID
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: ILAppendID
  - id: shell-pidl-clone-first
    desc: Clone first shell item
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: ILCloneFirst
  - id: shell-pidl-combine
    desc: Combine shell item IDs
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: ILCombine
  - id: shell-pidl-free
    desc: Free shell item list
    crit: component
    conf: 0.93
    if:
      type: symbol
      exact: ILFree
  - id: shell-pidl-get-next
    desc: Traverse shell item list
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: ILGetNext
  - id: shell-pidl-remove-last
    desc: Trim shell item list
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: ILRemoveLastID
  - id: shell-pidl-is-equal
    desc: Compare shell item lists
    crit: component
    conf: 0.93
    if:
      type: symbol
      exact: ILIsEqual
  - id: shell-pidl-is-parent
    desc: Test shell item parentage
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: ILIsParent
  - id: shell-change-notify-register
    desc: Register shell change notifications
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: SHChangeNotifyRegister
  - id: shell-change-notification-lock
    desc: Lock shell notification payload
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: SHChangeNotification_Lock
  - id: shell-change-notification-unlock
    desc: Unlock shell notification payload
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: SHChangeNotification_Unlock
  - id: shell-instance-explorer
    desc: Mark process as Explorer
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: SHSetInstanceExplorer
  - id: shell-drag-drop
    desc: Invoke shell drag drop
    crit: component
    conf: 0.93
    if:
      type: symbol
      exact: SHDoDragDrop
  - id: shell-localized-name
    desc: Shell localized name API
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: SHSetLocalizedName
  - id: shell-icon-overlay
    desc: Shell icon overlay API
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: SHGetIconOverlayIndexW
  - id: shell-icon-extract
    desc: Shell icon extract API
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: SHDefExtractIconW
  - id: shell-unique-name
    desc: Shell unique name helper
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: PathYetAnotherMakeUniqueName
  - id: shell-recycle-bin-query
    desc: Shell recycle bin query
    crit: component
    conf: 0.93
    if:
      type: symbol
      exact: SHQueryRecycleBinW
  - id: shell-drag-query-file
    desc: Shell drag query API
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: DragQueryFileW
  - id: shell-get-special-folder-path-a
    desc: Resolve special folder path ANSI
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: SHGetSpecialFolderPathA

composite_rules:
  - id: shell-pidl-namespace-ops
    desc: Shell PIDL namespace manipulation
    crit: notable
    conf: 0.96
    any:
      - id: shell-pidl-append
      - id: shell-pidl-clone-first
      - id: shell-pidl-combine
      - id: shell-pidl-free
      - id: shell-pidl-get-next
      - id: shell-pidl-remove-last
      - id: shell-pidl-is-equal
      - id: shell-pidl-is-parent
    needs: 5
  - id: explorer-change-registration
    desc: Explorer shell change registration
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/ui/window/notify::shell-change-notify
      - id: shell-change-notify-register
    any:
      - id: shell-change-notification-lock
      - id: shell-change-notification-unlock
      - id: shell-instance-explorer
    needs: 2
  - id: explorer-shell-namespace-control
    desc: Explorer shell namespace control
    crit: suspicious
    conf: 0.97
    all:
      - id: shell-pidl-namespace-ops
    any:
      - id: explorer-change-registration
      - id: micro-behaviors/fs/shell-ops/commands::shell-icon-customization
      - id: shell-recycle-bin-query
      - id: shell-drag-drop
      - id: shell-drag-query-file
      - id: micro-behaviors/fs/shell-ops/commands::browse-for-folder
      - id: shell-instance-explorer
    needs: 2
  - id: shell-icon-customization
    desc: Shell object icon customization
    crit: notable
    conf: 0.95
    all:
      - id: shell-localized-name
    any:
      - id: shell-icon-overlay
      - id: shell-icon-extract
      - id: shell-unique-name
    needs: 1
