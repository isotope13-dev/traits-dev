defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: shell-pidl-primitive
    desc: Shell PIDL primitive API
    crit: component
    conf: 0.96
    if:
      type: symbol
      regex: "^IL(CloneFirst|Combine|GetNext)$"
  - id: shell-pidl-mutation
    desc: Shell PIDL mutation API
    crit: component
    conf: 0.96
    if:
      type: symbol
      regex: "^IL(AppendID|RemoveLastID)$"
  - id: shell-pidl-compare
    desc: Shell PIDL comparison API
    crit: component
    conf: 0.96
    if:
      type: symbol
      regex: "^IL(IsEqual|IsParent)$"
  - id: shell-change-register
    desc: Shell change notification registration
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: SHChangeNotifyRegister
  - id: shell-change-lock
    desc: Shell change notification lock
    crit: component
    conf: 0.94
    if:
      type: symbol
      regex: "^SHChangeNotification_(Lock|Unlock)$"
  - id: shell-instance-explorer
    desc: Bind process to Explorer shell
    crit: component
    conf: 0.98
    if:
      type: symbol
      exact: SHSetInstanceExplorer
  - id: shell-dragdrop-dispatch
    desc: Shell drag and drop dispatch
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: SHDoDragDrop
  - id: shell-localized-name
    desc: Shell localized name API
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: SHSetLocalizedName
  - id: shell-icon-overlay
    desc: Shell icon overlay API
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: SHGetIconOverlayIndexW
  - id: shell-icon-extract
    desc: Shell icon extract API
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: SHDefExtractIconW
  - id: shell-unique-name
    desc: Shell unique name helper
    crit: component
    conf: 0.94
    if:
      type: symbol
      exact: PathYetAnotherMakeUniqueName
  - id: shell-get-special-folder-path-a
    desc: Resolve special folder path ANSI
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: SHGetSpecialFolderPathA

composite_rules:
  - id: explorer-shell-namespace-control
    desc: Explorer shell namespace control
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/ui/window/notify::shell-change-notify
    any:
      - id: shell-pidl-primitive
      - id: shell-pidl-mutation
      - id: shell-pidl-compare
      - id: shell-change-register
      - id: shell-change-lock
      - id: shell-instance-explorer
      - id: shell-dragdrop-dispatch
    needs: 4
  - id: shell-icon-customization
    desc: Shell object icon customization
    crit: notable
    conf: 0.95
    any:
      - id: shell-localized-name
      - id: shell-icon-overlay
      - id: shell-icon-extract
      - id: shell-unique-name
    needs: 2
