# Shell-Based File Operations
# Windows shell APIs for file and folder operations
defaults:
  for: ["pe"]
  platforms: ["windows"]
traits:
  # === Shell File Operations ===
  - id: shell-file-operation
    desc: Perform file operation through shell
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: "SHFileOperationW"
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: shell-file-operation-a
    desc: Perform file operation through shell ANSI
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: "SHFileOperationA"
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  # === Folder Browsing ===
  - id: browse-for-folder
    desc: Display folder browse dialog
    crit: notable
    conf: 0.70
    if:
      type: symbol
      exact: "SHBrowseForFolderW"
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  # === Path Extraction ===
  - id: get-path-from-idlist
    desc: Extract file path
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "SHGetPathFromIDListW"
  # === File Information ===
  - id: get-file-info
    desc: Get file information and icon
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "SHGetFileInfoW"
  # === Special Folder Resolution ===
  - id: shell-get-special-folder-location
    desc: Resolve special folder location via Shell32
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "SHGetSpecialFolderLocation"
  - id: shell-get-path-from-idlist-a
    desc: Convert Shell folder ID to path (ANSI)
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "SHGetPathFromIDListA"
  - id: shell-get-folder-path
    desc: Resolve special folder path via Shell32
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "SHGetFolderPathW"
  - id: shell-get-special-folder-path
    desc: Resolve special folder path directly
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: "SHGetSpecialFolderPathW"
  - id: pidl-append-id
    desc: Append item to shell PIDL
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: ILAppendID
  - id: pidl-combine
    desc: Combine shell PIDLs
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ILCombine
  - id: pidl-clone-first
    desc: Clone first shell PIDL element
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: ILCloneFirst
  - id: pidl-get-next
    desc: Walk shell PIDL chain
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: ILGetNext
  - id: pidl-remove-last
    desc: Trim shell PIDL tail
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: ILRemoveLastID
  - id: pidl-is-parent
    desc: Compare shell PIDL parentage
    crit: baseline
    conf: 0.84
    if:
      type: symbol
      exact: ILIsParent
  - id: pidl-is-equal
    desc: Compare shell PIDLs
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: ILIsEqual
  - id: pidl-free
    desc: Free shell PIDL memory
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: ILFree
  - id: shell-instance-explorer
    desc: Register instance with Explorer shell
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: SHSetInstanceExplorer
  - id: shell-desktop-folder
    desc: Access Explorer desktop folder object
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: SHGetDesktopFolder
  - id: shell-drag-drop
    desc: Perform Explorer drag and drop
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: SHDoDragDrop
  - id: drag-query-file
    desc: Query dragged file paths
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: DragQueryFileW
  - id: shell-icon-overlay-index
    desc: Resolve shell icon overlay index
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: SHGetIconOverlayIndexW
  - id: shell-extract-icon
    desc: Extract shell object icon
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: SHDefExtractIconW
  - id: shell-localized-name
    desc: Set shell object localized name
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: SHSetLocalizedName
  - id: shell-settings
    desc: Query Explorer shell settings
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: SHGetSettings
  - id: shell-find-executable
    desc: Resolve executable for shell object
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: FindExecutableW
  - id: shell-query-recycle-bin
    desc: Query recycle bin state
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: SHQueryRecycleBinW
  - id: shell-unique-name
    desc: Generate unique shell object name
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: PathYetAnotherMakeUniqueName
composite_rules:
  - id: pidl-namespace-lifecycle
    desc: Construct and traverse shell PIDLs
    crit: suspicious
    conf: 0.94
    all:
      - id: pidl-append-id
    any:
      - id: pidl-combine
      - id: pidl-clone-first
      - id: pidl-get-next
      - id: pidl-remove-last
      - id: pidl-is-parent
      - id: pidl-is-equal
      - id: pidl-free
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: explorer-shell-namespace-control
    desc: Explorer shell namespace object control
    crit: suspicious
    conf: 0.95
    all:
      - id: shell-desktop-folder
      - id: shell-settings
    any:
      - id: pidl-namespace-lifecycle
      - id: shell-instance-explorer
      - id: shell-unique-name
      - id: browse-for-folder
      - id: shell-find-executable
      - id: shell-query-recycle-bin
      - id: drag-query-file
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: shell-icon-customization
    desc: Explorer shell icon customization
    crit: notable
    conf: 0.9
    any:
      - id: shell-extract-icon
      - id: shell-icon-overlay-index
      - id: shell-localized-name
      - id: micro-behaviors/ui/window/notify::shell-notify-icon
    needs: 2
