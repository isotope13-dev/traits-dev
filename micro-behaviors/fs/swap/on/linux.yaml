# Swap Enable
# MBC: E1082 (System Information Discovery)
# ATT&CK: T1082
defaults:
  platforms: [linux]
traits:
  - id: swapon
    desc: Start swapping to a file/device
    crit: notable
    conf: 0.66
    for: [elf, c]
    if:
      type: symbol
      regex: swapon
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
