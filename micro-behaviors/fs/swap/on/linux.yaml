# Swap Enable
# MBC: E1082 (System Information Discovery)
# ATT&CK: T1082
defaults:
  platforms: [linux, unix, android, macos, windows, ios]
traits:
  - id: swapon
    desc: Start swapping to a file/device
    crit: notable
    conf: 0.66
    for: [elf, c]
    if:
      type: symbol
      regex: swapon
