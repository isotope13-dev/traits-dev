# Swap Disable
# MBC: E1082 (System Information Discovery)
# ATT&CK: T1082
defaults:
  platforms: [linux]
traits:
  - id: swapoff
    desc: Stop swapping to a file/device
    crit: notable
    conf: 0.66
    for: [elf, c]
    if:
      type: symbol
      regex: swapoff
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
