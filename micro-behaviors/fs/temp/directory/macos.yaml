# Temporary Directory Operations - macOS
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [macho, objc, swift, applescript]
traits:
  - id: directory-cocoa
    desc: Look up temp directory via
    crit: baseline
    conf: 0.66
    if:
      type: string
      substr: NSTemporaryDirectory
