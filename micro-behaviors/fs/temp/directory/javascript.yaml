# Temporary Directory Operations - JavaScript/Node.js
# MBC: E1083 (File and Directory Discovery)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: os-tmpdir
    desc: Node.js os.tmpdir() call
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'os\.tmpdir\s*\('
  - id: tmpdir-variable
    desc: "var named tmpDir referencing temp dir"
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: tmpDir
  - id: tempdir-variable
    desc: "var named tempDir referencing temp dir"
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: tempDir
