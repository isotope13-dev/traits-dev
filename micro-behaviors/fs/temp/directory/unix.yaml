defaults:
  platforms: [unix]
  for: [binaries, c]
traits:
  - id: directory-create
    desc: Create temporary directory
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: mkdtemp
composite_rules:
  - id: directory-env
    desc: Read temp directory from TMPDIR
    crit: baseline
    conf: 0.66
    mbc: E1083
    attack: T1083
    all:
      - id: micro-behaviors/os/env/vars::tmpdir-var
      - id: micro-behaviors/os/env/vars::getenv
