defaults:
  platforms: [windows]
  for: [pe, dll, c]
traits:
  - id: get-temp-path-dup
    desc: Look up temp directory via GetTempPath
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      regex: '^_?GetTempPath[AW]?(?:@\\d+)?$'
  - id: get-temp-file-name
    desc: Build temporary file name via GetTempFileName
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: '^_?GetTempFileName[AW]?(?:@\\d+)?$'
composite_rules:
  - id: temp-file-staging-primitives
    desc: Temp directory staging primitives
    crit: notable
    conf: 0.8
    all:
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
    any:
      - id: get-temp-file-name
      - id: micro-behaviors/fs/file/move::move-file-ex
