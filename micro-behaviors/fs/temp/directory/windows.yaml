defaults:
  platforms: [windows]
traits:
  - id: get-temp-path-dup
    desc: Look up temp directory via GetTempPath
    crit: baseline
    conf: 0.66
    for:
      - pe
      - dll
      - c
    if:
      type: symbol
      regex: GetTempPath[AW]?$
  - id: get-temp-file-name
    desc: Build temporary file name via GetTempFileName
    crit: notable
    conf: 0.75
    for:
      - pe
      - dll
      - c
    if:
      type: symbol
      regex: GetTempFileName[AW]?$
composite_rules:
  - id: temp-file-staging-primitives
    desc: Temp directory and temp file name APIs present
    crit: notable
    conf: 0.8
    for:
      - pe
      - dll
      - c
    all:
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: get-temp-file-name
