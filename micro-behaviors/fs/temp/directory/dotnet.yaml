defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: get-temp-file-name-token
    desc: .NET temp file name staging
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: GetTempFileName
  - id: path-combine-token
    desc: Path combination helper token
    crit: component
    conf: 0.72
    if:
      type: text
      exact: Combine
  - id: directory-name-token
    desc: Directory name helper token
    crit: component
    conf: 0.72
    if:
      type: text
      exact: GetDirectoryName
composite_rules:
  - id: temp-file-staging-dotnet
    desc: .NET temp staging helpers
    crit: notable
    conf: 0.84
    all:
      - id: get-temp-file-name-token
    any:
      - id: path-combine-token
      - id: directory-name-token
