defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - python
    - pyc
traits:
  - id: directory-python
    desc: Temp directory string lookup
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: gettempdir
  - id: directory-python-symbol
    desc: Gets temp directory path
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: tempfile.gettempdir
composite_rules:
  - id: temp-directory
    desc: Gets system temp directory
    crit: baseline
    conf: 0.75
    any:
      - id: directory-python
      - id: directory-python-symbol
