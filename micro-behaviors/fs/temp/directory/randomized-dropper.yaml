# File dropping with randomized executable names
# Malware droppers often use format strings to generate random
# executable names in temp directories to evade detection.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: randomized-exe-format-string
    desc: Format string for randomized executable filename
    crit: suspicious
    conf: 0.92
    attack: T1105
    if:
      type: text
      regex: '%sfx%X+%X+%X+%X+%X\.exe'

  - id: temp-dir-randomized-dropper
    desc: Format string for temp directory randomized dropper
    crit: suspicious
    conf: 0.9
    attack: T1105
    if:
      type: text
      regex: '%s.*%X.*%X.*\.exe'
    count_min: 1
    unless:
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/signed/platform::microsoft
