# File dropping with randomized executable names
# Malware droppers often use format strings to generate random
# executable names in temp directories to evade detection.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105

traits:
  - id: randomized-exe-format-string
    desc: "Format for randomized exe filename"
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '%sfx%X+%X+%X+%X+%X\.exe'

  - id: temp-dir-randomized-dropper
    desc: 'Format string for temp dir randomized dropper'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '%s.{0,20}%X.{0,20}%X.{0,20}\.exe'
    count_min: 1
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
