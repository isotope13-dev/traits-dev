defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: E1083
traits:
  - id: sys-get-temp-dir
    desc: PHP sys_get_temp_dir() call
    crit: baseline
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: sys_get_temp_dir
  - id: sys-get-temp-dir-symbol
    desc: sys_get_temp_dir symbol present
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: sys_get_temp_dir
  - id: tempnam-call
    desc: PHP tempnam() call
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: tempnam
  - id: tmp-path-literal
    desc: Literal /tmp/ path string
    crit: baseline
    conf: 0.7
    if:
      type: string_literal
      substr: /tmp/
