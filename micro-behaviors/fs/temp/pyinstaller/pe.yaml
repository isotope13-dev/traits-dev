defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: runtime-tmpdir-option
    desc: PyInstaller runtime tempdir option
    crit: component
    conf: 0.98
    if:
      type: text
      word: pyi-runtime-tmpdir

  - id: contents-directory-option
    desc: PyInstaller contents directory option
    crit: component
    conf: 0.98
    if:
      type: text
      word: pyi-contents-directory

  - id: meipass-runtime-dir
    desc: PyInstaller MEIPASS runtime directory
    crit: component
    conf: 0.96
    if:
      type: text
      word: _MEIPASS

  - id: base-library-zip-path
    desc: PyInstaller base library ZIP path
    crit: component
    conf: 0.98
    if:
      type: text
      exact: '%s\base_library.zip'

  - id: embedded-pkg-archive-error
    desc: PyInstaller embedded PKG archive error
    crit: component
    conf: 0.99
    if:
      type: text
      exact: Could not load PyInstaller's embedded PKG archive from the executable (%s)

  - id: pyz-toc-error
    desc: PyInstaller PYZ TOC lookup error
    crit: component
    conf: 0.99
    if:
      type: text
      exact: PYZ archive entry not found in the TOC!

  - id: archive-pyarmor-runtime
    desc: PyInstaller archive has PyArmor runtime
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: (?i)pyarmor_runtime[_0-9a-f-]{0,16}[\\/]+pyarmor_runtime\.pyd

  - id: archive-psutil-windows-member
    desc: PyInstaller archive has Windows psutil
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)psutil[\\/]_psutil_windows\.pyd|psutil\._pswindows

  - id: archive-embedded-exe-member
    desc: PyInstaller archive has embedded EXE
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: (?i)^[bz][a-z0-9_.\\/-]{1,120}[\\/][a-z0-9_.-]{1,80}\.exe$
    unless:
      - type: text
        regex: (?i)^[bz]bin[\\/]javaw?\.exe$
      - type: text
        regex: (?i)^[bz]jre[\\/]bin[\\/]javaw?\.exe$
      - type: text
        regex: (?i)^[bz]cmd[\\/]git(-remote-https?)?\.exe$
      - type: text
        regex: (?i)^[bz]git(-remote-https?)?\.exe$

  - id: archive-numbered-js-sidecar
    desc: PyInstaller numbered JS sidecar
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)^[bz]?.{0,8}data_p[0-9]{3}.{0,24}[0-9]{3}_[a-z]\.js$

  - id: archive-numbered-txt-sidecar
    desc: PyInstaller archive has numbered text sidecar
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)^[bz]?.{0,8}data_p[0-9]{3}.{0,24}[0-9]{3}[a-z]\.txt$

  - id: archive-numbered-xml-sidecar
    desc: PyInstaller archive has numbered XML sidecar
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)^[bz]?.{0,8}data_p[0-9]{3}.{0,24}[0-9]{3}\.xml$

  - id: archive-pack-js-sidecar
    desc: PyInstaller archive has pack.js sidecar
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)^[bz]?.{0,8}data_p[0-9]{3}.{0,24}pack\.js$

  - id: archive-data-sidecar-exe-name
    desc: PyInstaller data sidecar EXE name
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: (?i)^[bz]?.{0,8}data_p[0-9]{3}.{0,24}[a-z0-9_-]{3,40}\.exe$

composite_rules:
  - id: archive-numbered-sidecar-payload-set
    desc: PyInstaller archive has numbered sidecars
    crit: suspicious
    conf: 0.9
    needs: 4
    any:
      - id: archive-numbered-js-sidecar
      - id: archive-numbered-txt-sidecar
      - id: archive-numbered-xml-sidecar
      - id: archive-pack-js-sidecar
      - id: archive-data-sidecar-exe-name

  - id: onefile-temp-extraction
    desc: PyInstaller onefile temp extraction stage
    crit: notable
    conf: 0.95
    all:
      - id: runtime-tmpdir-option
      - id: meipass-runtime-dir
    any:
      - id: contents-directory-option
      - id: base-library-zip-path
      - id: embedded-pkg-archive-error
      - id: pyz-toc-error
    needs: 2

  - id: onefile-temp-bootstrap
    desc: PyInstaller onefile temp bootstrap
    crit: component
    conf: 0.97
    all:
      - id: onefile-temp-extraction
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup

  - id: pyinstaller-pe-protected-bundle
    desc: PyInstaller PE with PyArmor runtime
    crit: suspicious
    conf: 0.9
    all:
      - id: onefile-temp-extraction
      - id: archive-pyarmor-runtime

  - id: pyinstaller-pe-opaque-sidecar-bundle
    desc: PyInstaller PE with opaque sidecars
    crit: suspicious
    conf: 0.92
    all:
      - id: onefile-temp-extraction
      - id: archive-pyarmor-runtime
      - id: archive-numbered-sidecar-payload-set
