defaults:
  platforms:
    - unix
    - android
    - windows
  for: [python, pyc]
traits:
  - id: pyinstaller-meipass
    desc: References PyInstaller bundle folder
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: sys._MEIPASS
  - id: pyinstaller-meipass-elf
    desc: PyInstaller _MEIPASS environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      word: _MEIPASS
  - id: pyinstaller-mpyimod
    desc: PyInstaller bootloader module
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: mpyimod0[1-4]_
  - id: pyinstaller-spyiboot
    desc: PyInstaller bootstrap entry
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: spyiboot0[0-9]_
  - id: pyinstaller-pydata
    desc: PyInstaller embedded data marker
    crit: baseline
    conf: 0.75
    if:
      type: text
      word: pydata
  - id: pyinstaller-script-fail
    desc: PyInstaller script execution error
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Failed to execute script
    not:
      - regex: (?i)Failed to extract references from
      - regex: (?i)Failed to extract a manifest data from archive
      - regex: (?i)in active tab
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: pyinstaller-socket-module
    desc: PyInstaller bundled socket module
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^socket\(
  - id: pyinstaller-subprocess-module
    desc: PyInstaller bundled subprocess module
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^subprocess\(
  - id: pyinstaller-pty-module
    desc: PyInstaller bundled pty module
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ^pty\(
  - id: pyinstaller-ftplib-module
    desc: PyInstaller bundled ftplib module
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^ftplib\(
  - id: pyinstaller-ssl-module
    desc: PyInstaller bundled ssl module
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^ssl\(
  - id: pyinstaller-pe-psutil-windows
    desc: PyInstaller PE with bundled Windows psutil
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: psutil._pswindows
  - id: pyinstaller-browser-cookie3
    desc: PyInstaller bundled browser_cookie3 module
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: ^browser_cookie3\b
  - id: pyinstaller-requests-module
    desc: PyInstaller bundled requests module
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^requests\.api\)
  - id: pyinstaller-win32crypt-module
    desc: PyInstaller bundled win32crypt module
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?i)win32[\\/]+win32crypt\.pyd
  - id: pyinstaller-cryptography-module
    desc: PyInstaller bundled cryptography module
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: ^cryptography[.)]
  - id: pyinstaller-mss-screenshot-module
    desc: PyInstaller bundled mss screenshot module
    crit: suspicious
    conf: 0.93
    if:
      type: text
      exact: mss.screenshot)
  - id: pyinstaller-vt-client
    desc: PyInstaller bundled VirusTotal client
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: vt.client)
  - id: pyinstaller-appender-module
    desc: PyInstaller bundled appender payload module
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: sappender
  - id: pyinstaller-pe-embedded-exe
    desc: "PyInstaller PE with embedded exe payload"
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)^[bz][a-z0-9_.\\/-]{1,120}[\\/][a-z0-9_.-]{1,80}\.exe$
    unless:
      - type: text
        regex: (?i)^[bz]bin[\\/]javaw?\.exe$
      - type: text
        regex: (?i)^[bz]jre[\\/]bin[\\/]javaw?\.exe$
      - type: text
        exact: cmd\\\\git.exe
      - type: text
        exact: bin\\\\git.exe
      - type: text
        exact: git.exe
      - type: text
        exact: git-remote-http.exe
      - type: text
        exact: git-remote-https.exe
  - id: pyinstaller-discord-module
    desc: PyInstaller bundled discord.py library
    crit: notable
    conf: 0.93
    if:
      type: text
      exact: discord.client)
  - id: pyinstaller-aiohttp-cookiejar
    desc: PyInstaller bundled aiohttp cookie jar
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: aiohttp.cookiejar)
  - id: pyinstaller-cookie-read-fail
    desc: PyInstaller cookie read failure string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: "Failed to read cookie!"
composite_rules:
  - id: pyinstaller-bundle
    desc: PyInstaller packed binary
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: pyinstaller-meipass-elf
      - id: pyinstaller-mpyimod
      - id: pyinstaller-spyiboot
      - id: pyinstaller-pydata
      - id: pyinstaller-script-fail
  - id: pyinstaller-elf-bundle
    desc: PyInstaller bundled ELF binary
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: pyinstaller-meipass-elf
      - id: pyinstaller-mpyimod
      - id: pyinstaller-pydata
      - id: pyinstaller-script-fail
  - id: pyinstaller-elf-network-shell
    desc: PyInstaller ELF with network and shell modules
    crit: suspicious
    conf: 0.85
    needs: 3
    any:
      - id: pyinstaller-meipass-elf
      - id: pyinstaller-mpyimod
      - id: pyinstaller-socket-module
      - id: pyinstaller-subprocess-module
      - id: pyinstaller-pty-module
