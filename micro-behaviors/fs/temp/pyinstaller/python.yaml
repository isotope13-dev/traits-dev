# PyInstaller Bundle Detection
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [linux, unix, android, windows]
  for: [python, pyc, pe, elf]
traits:
  - id: pyinstaller-meipass
    desc: References PyInstaller bundle folder
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: sys._MEIPASS
  # ELF/PE PyInstaller markers
  - id: pyinstaller-meipass-elf
    desc: PyInstaller _MEIPASS environment variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      exact: "_MEIPASS"
  - id: pyinstaller-mpyimod
    desc: PyInstaller bootloader module
    crit: notable
    conf: 0.95
    if:
      type: string_value
      regex: "mpyimod0[1-4]_"
  - id: pyinstaller-spyiboot
    desc: PyInstaller bootstrap entry
    crit: notable
    conf: 0.95
    if:
      type: string_value
      regex: "spyiboot0[0-9]_"
  - id: pyinstaller-pydata
    desc: PyInstaller embedded data marker
    crit: baseline
    conf: 0.75
    if:
      type: string_value
      exact: "pydata"
  - id: pyinstaller-script-fail
    desc: PyInstaller script execution error
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: "Failed to (extract|execute script).{0,50}"
    not:
      - regex: "(?i)Failed to extract references from"
      - regex: "(?i)Failed to extract a manifest data from archive"
      - regex: "(?i)in active tab"
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation::chromium-junk-strings
  # PyInstaller embedded Python module detection (ELF-specific)
  # These patterns match the module list format in frozen PyInstaller binaries
  - id: pyinstaller-socket-module
    desc: PyInstaller bundled socket module
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      regex: '^socket\('
  - id: pyinstaller-subprocess-module
    desc: PyInstaller bundled subprocess module
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      regex: '^subprocess\('
  - id: pyinstaller-pty-module
    desc: PyInstaller bundled pty module
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: '^pty\('
  - id: pyinstaller-ftplib-module
    desc: PyInstaller bundled ftplib module
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      regex: '^ftplib\('
  - id: pyinstaller-ssl-module
    desc: PyInstaller bundled ssl module
    crit: baseline
    conf: 0.9
    if:
      type: string_value
      regex: '^ssl\('
  # PE-specific PyInstaller markers (TOC format differs from ELF)
  - id: pyinstaller-pe-psutil-windows
    desc: PyInstaller PE with bundled Windows psutil
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: "psutil._pswindows"
  - id: pyinstaller-pe-embedded-exe
    desc: PyInstaller PE with embedded executable payload
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: '^[bz][a-z_]+\\[a-z_]+\.exe$'
    unless:
      - type: string_value
        regex: '^bin\\javaw?\.exe$'
      - type: string_value
        regex: '^jre\\bin\\javaw?\.exe$'
      - type: string_value
        exact: "cmd\\git.exe"
      - type: string_value
        exact: "bin\\git.exe"
      - type: string_value
        exact: "git.exe"
      - type: string_value
        exact: "git-remote-http.exe"
      - type: string_value
        exact: "git-remote-https.exe"
composite_rules:
  - id: pyinstaller-bundle
    desc: PyInstaller packed binary
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: pyinstaller-meipass-elf
      - id: pyinstaller-mpyimod
      - id: pyinstaller-spyiboot
      - id: pyinstaller-pydata
      - id: pyinstaller-script-fail
  - id: pyinstaller-elf-bundle
    desc: PyInstaller bundled ELF binary
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: pyinstaller-meipass-elf
      - id: pyinstaller-mpyimod
      - id: pyinstaller-pydata
      - id: pyinstaller-script-fail
  # Suspicious: PyInstaller ELF with network + shell capabilities
  # Requires PyInstaller markers + at least one network/shell module
  - id: pyinstaller-elf-network-shell
    desc: PyInstaller ELF with network and shell modules
    crit: suspicious
    conf: 0.85
    # Require at least 3 matches, ensuring we have PyInstaller markers + networking
    # Since PyInstaller markers provide 4 options and networking provides 4 options,
    # requiring 3+ ensures we have meaningful PyInstaller indicators
    needs: 3
    any:
      # PyInstaller markers
      - id: pyinstaller-meipass-elf
      - id: pyinstaller-mpyimod
      # Dangerous modules
      - id: pyinstaller-socket-module
      - id: pyinstaller-subprocess-module
      - id: pyinstaller-pty-module
