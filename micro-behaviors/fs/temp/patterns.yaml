# Malicious File System Patterns
# Detects patterns of file creation followed by execution
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  # === Temp directory atomic indicators ===
  - id: tempfile-ref
    desc: "Reference to tempfile module"
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      substr: "tempfile"
  - id: environ-tmp
    desc: "Reference to TMP environment variable"
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: 'environ\[[''"]TMP'
composite_rules:
  # Temp directory reference composite
  # NOTE: "tmp" string is too generic - appears in Go runtime and many
  # legitimate programs. Downgraded to baseline.
  - id: temp-dir-reference
    desc: "Reference to a temporary directory"
    crit: baseline
    conf: 0.4
    any:
      - id: micro-behaviors/data/text/keywords::tmp
      - id: tempfile-ref
      - id: environ-tmp
  # execute-temp-file removed — infers C2 intent (refs objectives/command-and-control/).
  # Moved to objectives/command-and-control/dropper/behavior/ if needed.
