defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
  conf: 0.9
traits:
  - id: tempfile-mkstemp
    desc: tempfile.mkstemp call
    if:
      type: symbol
      kind: call
      exact: tempfile.mkstemp
  - id: tempfile-mkdtemp
    desc: tempfile.mkdtemp call
    if:
      type: symbol
      kind: call
      exact: tempfile.mkdtemp
  - id: tempfile-named-temporary-file
    desc: tempfile.NamedTemporaryFile call
    if:
      type: symbol
      kind: call
      exact: tempfile.NamedTemporaryFile
