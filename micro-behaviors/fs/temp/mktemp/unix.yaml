# Temporary File Creation - Unix
# MBC: C0046 (Create File)
# ATT&CK: T1074
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, so, dylib, c]
traits:
  - id: mktemp-fn
    desc: Create temporary files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: "mktemp"
  - id: mkstemp-fn
    desc: Create temporary file securely
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: "mkstemp"
  - id: mkstemp64-fn
    desc: Create secure temporary file (64-bit)
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: "mkstemp64"
  - id: mkstemps-fn
    desc: Create temporary file with suffix
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: "mkstemps"
  - id: tmpfile-fn
    desc: Create temporary files
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      # mkdtemp: use micro-behaviors/fs/temp/directory/unix.yaml::directory-create (canonical)
      exact: "tmpfile"
composite_rules:
  - id: mktemp
    desc: Create temporary files
    crit: baseline
    conf: 0.66
    any:
      - id: mktemp-fn
      - id: mkstemp-fn
      - id: mkstemp64-fn
      - id: mkstemps-fn
      - id: tmpfile-fn
