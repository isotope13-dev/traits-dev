defaults:
  platforms:
    - unix
    - windows
  for: [go, binaries]
traits:
  - id: mktemp-go
    desc: Create temporary files (Go)
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: (ioutil\.TempFile|os\.CreateTemp)
  - id: create-temp-runtime-string
    desc: Go CreateTemp runtime string
    crit: baseline
    conf: 0.82
    for: [elf, macho, pe]
    if:
      type: text
      exact: createtemp
