# Temporary File Creation - Go
# MBC: C0046 (Create File)
# ATT&CK: T1074
defaults:
  platforms: [unix, windows, macos]
  for: [go, binaries]
traits:
  - id: mktemp-go
    desc: Create temporary files (Go)
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      regex: "(ioutil\\.TempFile|os\\.CreateTemp)"
