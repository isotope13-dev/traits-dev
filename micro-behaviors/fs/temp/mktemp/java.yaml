# Temporary File Creation - Java
# MBC: C0046 (Create File)
# ATT&CK: T1074
defaults:
  platforms: [unix, windows, macos]
  for: [java, class]
traits:
  - id: mktemp-java
    desc: Create temporary files (Java)
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: createTempFile
