defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: py2exe-pythondll
    desc: py2exe embedded Python DLL reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: python[0-9]+\.dll
  - id: py2exe-scriptres
    desc: py2exe SCRIPT resource marker
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: PYTHONSCRIPT
  - id: py2exe-zipimport
    desc: py2exe zipimport bootstrap
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: zipimport
composite_rules:
  - id: py2exe-packed-executable
    desc: py2exe packed Windows executable
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: py2exe-pythondll
      - id: py2exe-scriptres
      - id: py2exe-zipimport
      - id: py2exe-verbose-env
      - id: py2exe-activation-ctx-error
