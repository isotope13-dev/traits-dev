defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: py2exe-verbose-env
    desc: py2exe runtime verbosity env variable
    crit: notable
    conf: 0.95
    if:
      type: string_value
      exact: PY2EXE_VERBOSE
  - id: py2exe-activation-ctx-error
    desc: py2exe activation context error string
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: "py2exe failed to activate"
