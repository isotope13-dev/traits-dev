defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: tempfile-ref
    desc: Reference to tempfile module
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: tempfile
  - id: environ-tmp
    desc: Reference to TMP environment variable
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: environ\[['"]TMP
composite_rules:
  - id: temp-dir-reference
    desc: Reference to a temporary directory
    crit: baseline
    conf: 0.4
    any:
      - id: micro-behaviors/data/text/keywords/lexicon::tmp
      - id: micro-behaviors/fs/temp/reference
