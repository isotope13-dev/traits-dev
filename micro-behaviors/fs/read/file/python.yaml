# Python file reading
# ATT&CK: T1005 (Data from Local System)

defaults:
  for: [python]
  attack: "T1005"

traits:
  - id: file-read-content
    desc: Reads file content (Python)
    crit: baseline
    conf: 0.6
    mbc: "E1005"
    if:
      type: raw
      regex: '\.read\('

  - id: file-open-content
    desc: Opens a file (Python)
    crit: baseline
    conf: 0.6
    mbc: "E1005"
    if:
      type: raw
      regex: 'with open\s*\('
