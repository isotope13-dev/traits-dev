# Python file reading
# ATT&CK: T1005 (Data from Local System)
defaults:
  platforms: [windows, unix]
  mbc: E1005
  for: [python]
  attack: "T1005"
traits:
  - id: file-read-content
    desc: Reads file content (Python)
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: '\.read\('
    unless:
      - type: text
        regex: '(?i)(resp|response|req|request)\.read\('
      - type: text
        regex: '(?i)(sock|socket|urllib|url)\.read\('
  - id: python-pathlib-read-text
    desc: Read text via pathlib
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      substr: read_text
  - id: python-pathlib-read-bytes
    desc: Read bytes via pathlib
    crit: baseline
    conf: 0.8
    ref: sha256:6f3972835d9ebdf69f562a91e68091769d80de62467e6c129d53f810de7f539a
    if:
      type: symbol
      substr: read_bytes
  - id: file-open-content
    desc: Python with-open file context
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: 'with open\s*\('
