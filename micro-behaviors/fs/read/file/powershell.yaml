defaults:
  platforms: [windows, unix]
  for: [powershell]
  crit: notable
  conf: 0.86
traits:
  - id: get-content
    desc: PowerShell reads file content
    if:
      type: text
      word: Get-Content
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context

  - id: powershell-history-save-path
    desc: Queries PowerShell history save path
    if:
      type: text
      regex: '(?i)\bGet-PSReadLineOption\b[^\r\n]{0,120}\bHistorySavePath\b'

  - id: read-all-text
    desc: .NET reads text file
    if:
      type: text
      regex: '\[(System\.)?IO\.File\]::ReadAllText\b'
