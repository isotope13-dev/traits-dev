defaults:
  platforms: [windows, unix]
  for: [powershell]
  crit: notable
  conf: 0.86
traits:
  - id: get-content
    desc: PowerShell reads file content
    if:
      type: function
      exact: Get-Content
  - id: read-all-text
    desc: .NET reads text file
    if:
      type: text
      regex: '\[(System\.)?IO\.File\]::ReadAllText\b'
