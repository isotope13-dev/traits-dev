defaults:
  platforms: [windows, unix]
  for:
    - php
traits:
  - id: file-get-contents
    desc: File read via file_get_contents
    crit: baseline
    conf: 0.75
    mbc: C0051
    if:
      type: symbol
      kind: call
      exact: file_get_contents
  - id: fread
    desc: File read via fread
    crit: baseline
    conf: 0.75
    mbc: C0051
    if:
      type: string_literal
      regex: \bfread\s*\(
  - id: fgets
    desc: Line read via fgets
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      regex: \bfgets\s*\(
  - id: readfile
    desc: Output file contents via readfile
    crit: baseline
    conf: 0.75
    mbc: C0051
    if:
      type: string_literal
      substr: readfile
  - id: fopen-dup
    desc: File open operation
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      regex: \bfopen\s*\(
