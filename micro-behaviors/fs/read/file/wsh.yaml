defaults:
  platforms: [windows]
  for: [javascript, vbs]
traits:
- id: open-text-file-read
  desc: Reads text via FileSystemObject
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '(?i)OpenTextFile\s*\([^,)]{1,80},\s*1\b'
- id: readall-text-file
  desc: Reads an entire text file into memory
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(?i)\.ReadAll\b'
