# Shell reads a file whose name identifies credentials.
# ATT&CK: T1005 (Data from Local System)
defaults:
  platforms: [unix, windows]
  mbc: E1005
  attack: T1005
  for: [shell]

traits:
  - id: shell-read-credential-file
    desc: Shell reads a credential-named file with cat
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bcat\s+[^<\n]{0,30}\bcredentials\b'
