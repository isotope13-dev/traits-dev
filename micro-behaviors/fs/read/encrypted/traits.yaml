defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.88
traits:
  - id: open-encrypted-file-raw
    desc: Open EFS-encrypted file via raw backup API
    attack: T1552.001
    if:
      type: symbol
      regex: "OpenEncryptedFileRaw[AW]?"
    unless:
      - id: metadata/binary/metrics::many-exports-100
  - id: read-encrypted-file-raw
    desc: Read EFS-encrypted raw backup stream
    if:
      type: symbol
      exact: "ReadEncryptedFileRaw"
    unless:
      - id: metadata/binary/metrics::many-exports-100
  - id: write-encrypted-file-raw
    desc: Write EFS-encrypted raw backup stream
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: "WriteEncryptedFileRaw"
    unless:
      - id: metadata/binary/metrics::many-exports-100
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
