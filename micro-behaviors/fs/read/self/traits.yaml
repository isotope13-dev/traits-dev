defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: self-file-reference
    desc: Self-reference via __FILE__
    crit: notable
    conf: 0.80
    attack: "T1059"
    for: [ruby, php]
    if:
      type: text
      substr: '__FILE__'
    unless:
      - type: text
        regex: namespace\s+Nette
