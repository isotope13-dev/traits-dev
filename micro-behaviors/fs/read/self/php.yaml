# PHP Self-Reading Traits
# Detects scripts reading their own source code, a common viral technique.
defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  - id: read-script-name
    desc: Accessing script filename via $_SERVER
    crit: notable
    conf: 0.8
    # `$_SERVER['SCRIPT_NAME'|'PHP_SELF']` — PHP subscripts don't fold to
    # member facts, so this stays a (specific, FP-safe) source-text pattern
    # rather than a live tree-sitter query.
    if:
      type: text
      regex: '\$_SERVER\s*\[\s*[''"](SCRIPT_NAME|PHP_SELF)'

  - id: fopen-self-file
    desc: Opens own source via __FILE__ constant
    crit: notable
    conf: 0.9
    attack: T1005
    if:
      type: text
      regex: "fopen\\s*\\(\\s*__FILE__"

  - id: filesize-self
    desc: Measures own file size via __FILE__
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "filesize\\s*\\(\\s*__FILE__"

composite_rules:
  - id: self-read-full
    desc: Reads own source code into memory
    crit: suspicious
    conf: 0.92
    attack: T1005
    near_bytes: 500
    all:
      - id: fopen-self-file
    any:
      - id: filesize-self
      - id: micro-behaviors/fs/read/file::fread
