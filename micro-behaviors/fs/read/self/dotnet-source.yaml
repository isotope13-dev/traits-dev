# .NET self-reading configuration extraction
defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: executable-path-self-reference
    desc: Application executable self path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bApplication\.ExecutablePath\b'
  - id: vb-binary-self-open
    desc: VB FileOpen on own executable
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'FileSystem\.FileOpen\(1,\s*Application\.ExecutablePath,\s*OpenMode\.Binary'
  - id: vb-fileget-buffer-read
    desc: VB FileGet buffer reads
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bFileSystem\.FileGet\s*\('
  - id: open-share-shared
    desc: Shared self-read file access
    crit: baseline
    conf: 0.78
    if:
      type: text
      regex: '\bOpenShare\.Shared\b'
composite_rules:
  - id: self-read-binary-config
    desc: Reads own binary for configuration
    crit: suspicious
    conf: 0.95
    all:
      - id: executable-path-self-reference
      - id: vb-binary-self-open
      - id: vb-fileget-buffer-read
