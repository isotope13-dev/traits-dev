defaults:
  platforms: [unix]
  for: [perl]
traits:
  - id: open-self-source
    desc: Open current script source
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?m)^\s*open\s*\(?\s*[A-Za-z_][A-Za-z0-9_]*\s*,\s*\$0\s*\)?\s*;'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format/
  - id: seek-self-source
    desc: Rewind current script source
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'seek\s*\(\s*[A-Za-z_][A-Za-z0-9_]*\s*,\s*0\s*,\s*0\s*\)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format/
