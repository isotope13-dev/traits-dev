defaults:
  platforms: [unix]
  for: [perl]
traits:
  - id: open-self-source
    desc: Open current script source
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?m)^\s*open\s*\(?\s*[A-Za-z_][A-Za-z0-9_]*\s*,\s*\$0\s*\)?\s*;'
    unless:
      - id: metadata/file/format::roff-document
  - id: seek-self-source
    desc: Rewind current script source
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'seek\s*\(\s*[A-Za-z_][A-Za-z0-9_]*\s*,\s*0\s*,\s*0\s*\)'
    unless:
      - id: metadata/file/format::roff-document
