# VBS self-reading patterns
# Detects VBScript reading its own source code via WScript.ScriptFullName
defaults:
  platforms: [windows]
  crit: notable
  for: [vbs]
  attack: T1059.005
traits:
  - id: scriptfullname-read
    desc: VBS reads own source code
    conf: 0.85
    if:
      type: text
      regex: '(?i)opentextfile\s*\(\s*wscript\.scriptfullname\s*,\s*1'
