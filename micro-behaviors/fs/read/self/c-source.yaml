defaults:
  for: [c, cpp]
  platforms: [unix, linux, macos]
traits:
  - id: argv0-self-read
    desc: Opens own binary via argv[0]
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'fopen\s*\(\s*argv\s*\[\s*0\s*\]'
  - id: executable-permission-check
    desc: Checks S_IXUSR executable permission bit
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'S_IXUSR|S_IXGRP|S_IXOTH|st_mode\s*&'
