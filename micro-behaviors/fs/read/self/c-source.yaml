defaults:
  for: [c, cpp]
  platforms: [windows, unix]
traits:
  - id: argv0-self-read
    desc: Opens own binary via argv[0]
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'fopen\s*\(\s*argv\s*\[\s*0\s*\]'
    unless:
      - type: text
        regex: 'char\s*\*\*\s*argv\s*=\s*[A-Za-z_][A-Za-z0-9_]*\s*\+\s*1'
      - type: text
        regex: '\bargv\s*(\+\+|\+=)'
  - id: get-command-line-source
    desc: Reads command line for self path
    platforms: [windows]
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'GetCommandLine\s*\(\s*\)'
  - id: open-own-path-buffer
    desc: Opens computed self path buffer
    platforms: [windows]
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fopen\s*\(\s*(myName|myFileName)\s*,\s*"rb"\s*\)'
  - id: executable-permission-check
    desc: Checks S_IXUSR executable permission bit
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'S_IXUSR|S_IXGRP|S_IXOTH|st_mode\s*&'
composite_rules:
  - id: commandline-self-read
    desc: Opens own binary via command line
    platforms: [windows]
    crit: suspicious
    conf: 0.92
    all:
      - id: get-command-line-source
      - id: open-own-path-buffer
