defaults:
  for: [c, cpp]
  platforms: [windows, unix]
traits:
  - id: argv0-self-read
    desc: Opens own binary via argv[0]
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'fopen\s*\(\s*argv\s*\[\s*0\s*\]'
    unless:
      - id: well-known/app/samba::samba-source-tree
      - type: text
        regex: 'char\s*\*\*\s*argv\s*=\s*[A-Za-z_][A-Za-z0-9_]*\s*\+\s*1'
      - type: text
        regex: '\bargv\s*(\+\+|\+=)'
  - id: opens-self-via-argv0
    desc: Opens the running program through argv[0]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'open\s*\(\s*argv\s*\[\s*0\s*\]\s*,\s*O_RDONLY'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/samba::samba-source-tree
      - id: well-known/lib/spandsp
  - id: get-command-line-source
    desc: Reads command line for self path
    platforms: [windows]
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'GetCommandLine\s*\(\s*\)'
  - id: open-own-path-buffer
    desc: Opens computed self path buffer
    platforms: [windows]
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fopen\s*\(\s*(myName|myFileName)\s*,\s*"rb"\s*\)'
  - id: executable-permission-check
    desc: Checks S_IXUSR executable permission bit
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: S_IXUSR
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: commandline-self-read
    desc: Opens own binary via command line
    platforms: [windows]
    crit: suspicious
    conf: 0.92
    all:
      - id: get-command-line-source
      - id: open-own-path-buffer
