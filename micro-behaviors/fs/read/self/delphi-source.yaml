# Delphi self-read and buffered copy routines
defaults:
  for: [text]
  platforms: [windows]
traits:
  - id: paramstr-self-path
    desc: Delphi ParamStr self path
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: '(?i)\bparamstr\s*\(\s*0\s*\)'
  - id: blockread-call
    desc: Delphi blockread file access
    crit: baseline
    conf: 0.82
    if:
      type: raw
      regex: '(?i)\bblockread\s*\('
  - id: blockwrite-call
    desc: Delphi blockwrite file access
    crit: baseline
    conf: 0.82
    if:
      type: raw
      regex: '(?i)\bblockwrite\s*\('
  - id: rewrite-call
    desc: Delphi Rewrite file operation
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '(?i)\brewrite\s*\('
  - id: append-call
    desc: Delphi Append text operation
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '(?i)\bappend\s*\('
  - id: filesize-call
    desc: Delphi filesize query
    crit: baseline
    conf: 0.78
    if:
      type: raw
      regex: '(?i)\bfilesize\s*\('
  - id: getmem-call
    desc: Delphi GetMem allocation
    crit: baseline
    conf: 0.75
    if:
      type: raw
      regex: '(?i)\bgetmem\s*\('
  - id: virsize-constant-8000
    desc: Fixed virsize constant 8000
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(?i)\bvirsize\s*=\s*8000\s*;'
composite_rules:
  - id: self-copy-routine
    desc: Self-copy via ParamStr and block I/O
    crit: suspicious
    conf: 0.92
    all:
      - id: paramstr-self-path
      - id: blockread-call
      - id: blockwrite-call
  - id: buffered-overwrite-copy
    desc: Buffered overwrite copy routine
    crit: suspicious
    conf: 0.9
    all:
      - id: rewrite-call
      - id: filesize-call
      - id: blockread-call
      - id: blockwrite-call
