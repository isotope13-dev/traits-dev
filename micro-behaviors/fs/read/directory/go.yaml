defaults:
  platforms: [unix, windows]
  for: [go]
  mbc: E1083
  attack: T1083
traits:
  - id: readdir-call
    desc: os.ReadDir directory listing
    crit: baseline
    conf: 0.6
    if:
      type: ast
      kind: call
      exact: os.ReadDir
  - id: ioutil-readdir
    desc: ioutil.ReadDir directory listing (deprecated)
    crit: baseline
    conf: 0.6
    if:
      type: ast
      kind: call
      exact: ioutil.ReadDir
  - id: file-readdir
    desc: File.Readdir method
    crit: baseline
    conf: 0.6
    if:
      type: ast
      kind: call
      regex: \.Readdir\(|\.ReadDir\(
  - id: chdir-call
    desc: os.Chdir working directory change
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: os.Chdir
  - id: getwd-call
    desc: os.Getwd get working directory
    crit: baseline
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: os.Getwd
  - id: filepath-walk-dup
    desc: filepath.Walk recursive directory traversal
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      regex: filepath\.Walk|filepath\.WalkDir
composite_rules:
  - id: directory-enumeration
    desc: Directory enumeration capability
    crit: notable
    conf: 0.7
    any:
      - id: readdir-call
      - id: ioutil-readdir
      - id: file-readdir
      - id: micro-behaviors/fs/read/directory::filepath-walk-dup
  - id: workdir-manipulation
    desc: Working directory manipulation
    crit: notable
    conf: 0.75
    all:
      - id: chdir-call
      - id: getwd-call
