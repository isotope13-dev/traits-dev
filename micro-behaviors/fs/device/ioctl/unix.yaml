defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries, c]
traits:
  - id: ioctl
    desc: Manipulate device parameters of special
    crit: notable
    conf: 0.66
    if:
      type: symbol
      regex: ioctl
  - id: ioctl-iflags
    desc: ioctl operations for inode flags
    crit: notable
    conf: 0.66
    if:
      type: symbol
      regex: ioctl_iflags
