defaults:
  platforms: [unix]
  for: [python, javascript]
traits:
  - id: ioctl
    desc: Manipulate device parameters of special
    crit: notable
    conf: 0.66
    if:
      type: ast
      kind: call
      exact: ioctl
  - id: ioctl-iflags
    desc: ioctl operations for inode flags
    crit: notable
    conf: 0.66
    if:
      type: symbol
      regex: ioctl_iflags
