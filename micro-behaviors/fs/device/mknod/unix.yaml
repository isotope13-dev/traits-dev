defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: mknod-base
    desc: Create device files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: mknod
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: mknodat
    desc: Create device files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: mknodat
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: mknod-char-device-shell
    desc: Shell mknod creates character device
    crit: notable
    conf: 0.7
    for: [shell]
    platforms: [unix]
    if:
      type: text
      regex: \bmknod\s+[^\n]{1,50}\s+c\s+[0-9]+
