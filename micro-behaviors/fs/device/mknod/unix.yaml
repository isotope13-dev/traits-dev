defaults:
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: mknod-base
    desc: Create device files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: mknod
  - id: mknodat
    desc: Create device files
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: mknodat
  - id: mknod-char-device-shell
    desc: Shell mknod creates character device
    crit: notable
    conf: 0.7
    for: [shell]
    platforms: [unix]
    if:
      type: text
      regex: \bmknod\s+[^\n]{1,50}\s+c\s+[0-9]+
