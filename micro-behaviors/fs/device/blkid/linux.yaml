# Block Device ID Detection (Linux-specific)
# MBC: E1082 (System Information Discovery)
# ATT&CK: T1082
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: blkid
    desc: Works with block device attributes
    crit: baseline
    conf: 0.66
    for: [elf, shell, python]
    if:
      type: symbol
      regex: blkid
