defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  # QueryDosDeviceW resolves NT symbolic links (e.g. "C:" -> "\Device\HarddiskVolume1").
  # Legit tools exist (sysinternals, mount utilities); in an arbitrary binary
  # it's a purpose-change signal — notable for supply-chain diff review.
  - id: query-dos-device-w
    desc: Resolve NT device symbolic link
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: QueryDosDeviceW
