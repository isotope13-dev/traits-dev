defaults:
  for: [vbs]
  platforms: [windows]
  crit: notable
  conf: 0.85
traits:
  - id: vba-open-for-output
    desc: VBA Open For Output file write
    if:
      type: raw
      regex: '(?i)Open\s+.{1,80}\s+For\s+(Output|Append)'
  - id: vba-filecopy
    desc: VBA FileCopy function call
    if:
      type: string_value
      regex: "(?i)\\bFileCopy\\b"
  - id: vba-mkdir
    desc: VBA MkDir directory creation
    crit: baseline
    if:
      type: string_value
      regex: "(?i)\\bMkDir\\b"
  - id: vba-shell-app-namespace
    desc: Shell.Application Namespace method
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: '(?i)Shell\.Application.{0,40}\.Namespace'
