defaults:
  for:
    - vbs
  platforms:
    - windows
  crit: notable
  conf: 0.85
traits:
  - id: vba-open-for-output
    desc: VBA Open For Output file write
    if:
      type: text
      regex: (?i)Open\s+.{1,80}\s+For\s+(Output|Append)
  - id: vba-filecopy
    desc: VBA FileCopy function call
    if:
      type: string_literal
      regex: (?i)\bFileCopy\b
  - id: vba-mkdir
    desc: VBA MkDir directory creation
    crit: notable
    if:
      type: string_literal
      regex: (?i)\bMkDir\b
