defaults:
  platforms: [windows]
  for: [javascript, vbs]
traits:
- id: create-text-file-api
  desc: Creates a text file using FileSystemObject
  crit: notable
  if:
    type: text
    regex: '(?i)(\.CreateTextFile|\.OpenTextFile|CreateTextFile\s+|OpenTextFile\s+)'
- id: write-text-file-method
  desc: Writes to text file
  crit: baseline
  if:
    type: text
    regex: '\.(Write|WriteLine|WriteBlankLines)\s*\('
- id: ext-bat
  desc: Reference to .bat file extension
  crit: notable
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-fixtures
  - id: metadata/package/testing/presence::test-filename-pattern
  if:
    type: text
    regex: '[\"\x27][^\"]{1,200}\.bat[\"\x27]'
- id: ext-cmd
  desc: Reference to .cmd file extension
  crit: notable
  unless:
  - type: basename
    exact: install.js
  if:
    type: text
    regex: '[\"\x27][^\"]{1,200}\.cmd[\"\x27]'
- id: ext-ps1
  desc: Reference to .ps1 file extension
  crit: baseline
  if:
    type: text
    regex: '[\"\x27][^\"]{1,200}\.ps1[\"\x27]'
- id: ext-vbs
  desc: Reference to .vbs file extension
  crit: notable
  if:
    type: text
    regex: '[\"\x27][^\"]{1,200}\.vbs[\"\x27]'
- id: ext-js
  desc: Reference to .js file extension
  crit: notable
  for: [vbs]
  if:
    type: text
    regex: '[\"\x27][^\"]{1,200}\.js[\"\x27]'
composite_rules:
- id: script-extension
  desc: Any executable script file extension
  crit: notable
  any:
  - id: ext-bat
  - id: ext-cmd
  - id: ext-ps1
  - id: ext-vbs
  - id: ext-js
- id: create-script-file
  desc: Creates an executable script file (.bat, .cmd, .ps1, .vbs)
  conf: 0.95
  crit: suspicious
  all:
  - id: create-text-file-api
  - id: script-extension
