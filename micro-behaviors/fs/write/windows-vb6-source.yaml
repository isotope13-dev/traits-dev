defaults:
  for: [vbs]
  platforms: [windows]
traits:
  - id: explorer-self-copy
    desc: Explorer.exe self-copy masquerade
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      substr: Explorer.exe
  - id: patch-lure-copy
    desc: Security patch lure file copy
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: Win_Security_Patch_2602.exe
  - id: self-copy-fanout-vb6
    desc: Self-copy propagation fanout
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      substr: fso.CopyFile
  - id: mirc-script-ini-write
    desc: Writes mIRC script ini
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: mxa + 'script.ini'
