defaults:
  platforms: [windows]
  for: [javascript, vbs, powershell]
traits:
  - id: adodb-save-to-file
    desc: ADODB.Stream SaveToFile method call
    crit: notable
    if:
      type: text
      regex: '\.SaveToFile\s*\('
      case_insensitive: true
  - id: adodb-save-to-file-unicode
    desc: ADODB.Stream SaveToFile unicode escape
    crit: notable
    if:
      type: text
      substr: \u0073a\u0076\u0065T\u006F\u0046il\u0065
  - id: adodb-type-binary
    desc: ADODB.Stream Type assignment (Binary)
    crit: notable
    if:
      type: text
      regex: (?i)(?:\.Type|\[['"]type['"]\])\s*=\s*1
  - id: adodb-type-binary-unicode
    desc: ADODB.Stream type set via unicode escape
    crit: notable
    if:
      type: text
      regex: "\\['\"]\\\\u0074y\\\\u0070e['\"]\\]\\s*=\\s*1"
  - id: adodb-type-binary-unicode-mixed
    desc: ADODB.Stream type set via mixed unicode escape
    crit: notable
    if:
      type: text
      regex: '\[[''"]\\u0074y\\u0070e[''"]\]\s*=\s*1\b'
  - id: adodb-type-binary-unicode-decoded
    desc: ADODB.Stream decoded unicode type set
    crit: notable
    if:
      type: encoded
      encoding: unicode-escape
      regex: \[['"]type['"]\]\s*=\s*1
  - id: adodb-write-response-body
    desc: ADODB.Stream Write method call with ResponseBody
    crit: notable
    if:
      type: text
      regex: '\.Write\s*\([^)]{0,50}ResponseBody'
      case_insensitive: true
  - id: adodb-write-response-body-unicode
    desc: ADODB.Stream writes unicode-escaped ResponseBody
    crit: notable
    if:
      type: text
      regex: '\\u0077\\u0072\\u0069te.{0,80}Respo\\u006E\\u0073\\u0065\\u0042'
  - id: adodb-open
    desc: ADODB.Stream Open method call
    crit: component
    if:
      type: text
      regex: (?i)(?:\.Open|\[['"]open['"]\])\s*\(
  - id: adodb-open-unicode
    desc: ADODB.Stream unicode-escaped open method
    crit: component
    if:
      type: encoded
      encoding: unicode-escape
      regex: \[['"]open['"]\]\s*\(
composite_rules:
  - id: adodb-open-observed
    desc: ADODB.Stream open observed
    crit: component
    any:
      - id: adodb-open
      - id: adodb-open-unicode
  - id: adodb-save-to-file-observed
    desc: ADODB.Stream SaveToFile observed
    crit: notable
    any:
      - id: adodb-save-to-file
      - id: adodb-save-to-file-unicode
  - id: adodb-type-binary-observed
    desc: ADODB.Stream binary type observed
    crit: notable
    any:
      - id: adodb-type-binary
      - id: adodb-type-binary-unicode
      - id: adodb-type-binary-unicode-mixed
      - id: adodb-type-binary-unicode-decoded
  - id: adodb-write-response-body-observed
    desc: ADODB.Stream ResponseBody write observed
    crit: notable
    any:
      - id: adodb-write-response-body
      - id: adodb-write-response-body-unicode
  - id: adodb-binary-write
    desc: Writes binary data to file using ADODB.Stream
    crit: suspicious
    conf: 0.9
    all:
      - id: adodb-open-observed
      - id: adodb-save-to-file-observed
      - id: adodb-type-binary-observed
      - id: adodb-write-response-body-observed
