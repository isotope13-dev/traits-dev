defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: write-file-sync
    desc: Writes to file synchronously
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '\.writeFileSync\s*\('
  - id: write-file-async
    desc: Writes to file asynchronously
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '\.writeFile\s*\('
  - id: create-write-stream
    desc: Creates a write stream
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '\.createWriteStream\s*\('
  - id: adodb-stream-write
    desc: ADODB.Stream write operation
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: 'ADODB\.Stream[\s\S]{0,120}\.write(Text)?\s*\('
composite_rules:
  - id: js-file-write
    desc: JavaScript file write operation
    crit: baseline
    conf: 0.9
    any:
      - id: write-file-sync
      - id: write-file-async
      - id: create-write-stream
      - id: adodb-stream-write
      - id: micro-behaviors/fs/write::adodb-save-to-file
