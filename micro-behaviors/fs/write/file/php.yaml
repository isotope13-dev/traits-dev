# PHP Filesystem Write Traits
# MBC: C0052 (Write File)
# ATT&CK: T1105 (Ingress Tool Transfer)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
  mbc: "C0052"
traits:
  - id: file-put-contents
    desc: File write via file_put_contents
    crit: notable
    conf: 0.8
    attack: "T1105"
    if:
      type: string_value
      substr: file_put_contents
  - id: fwrite
    desc: File write via fwrite
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "\\bfwrite\\s*\\("
  - id: fputs
    desc: File write via fputs
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "\\bfputs\\s*\\("
  - id: move-uploaded-file
    desc: Move uploaded file to destination
    crit: suspicious
    conf: 0.85
    attack: "T1105"
    if:
      type: string_value
      substr: move_uploaded_file
