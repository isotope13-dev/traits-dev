defaults:
  platforms: [windows, unix]
  for:
    - php
  mbc: C0052
traits:
  - id: file-put-contents
    desc: Creates or overwrites a local file
    crit: notable
    conf: 0.8
    attack: T1105
    if:
      type: text
      word: file_put_contents
    unless:
      - type: text
        regex: namespace\s+Nette

  - id: fwrite
    desc: Writes data to an open file
    crit: notable
    conf: 0.8
    if:
      type: text
      word: fwrite

  - id: fputs
    desc: Writes a string to an open file
    crit: notable
    conf: 0.8
    if:
      type: text
      word: fputs

  - id: move-uploaded-file
    desc: Moves uploaded PHP file
    crit: notable
    conf: 0.85
    attack: T1105
    if:
      type: text
      word: move_uploaded_file
