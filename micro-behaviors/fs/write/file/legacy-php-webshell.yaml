defaults:
  platforms: [unix, windows]
  for: [php]
  size_min: 8000
  size_max: 50000

traits:
  - id: legacy-http-post-files-copy
    desc: Legacy HTTP POST file copy
    crit: notable
    conf: 0.96
    attack: T1105
    if:
      type: text
      substr: 'copy($HTTP_POST_FILES["userfile"][tmp_name],'

  - id: tmp-bind-source-open
    desc: Opens temporary bind source
    crit: notable
    conf: 0.93
    attack: T1105
    if:
      type: text
      substr: '$w_file=fopen("/tmp/bd.c","ab+")'

  - id: tmp-bind-source-write
    desc: Writes embedded bind source
    crit: notable
    conf: 0.93
    attack: T1105
    if:
      type: text
      substr: 'fputs($w_file,$port_bind_bd_c);'

composite_rules:
  - id: tmp-bind-source-drop
    desc: Drops embedded bind shell source
    crit: suspicious
    conf: 0.96
    all:
      - id: tmp-bind-source-open
      - id: tmp-bind-source-write
