defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: node-write-file-executable-mode
    desc: Node writes a file with executable permissions
    crit: notable
    conf: 0.92
    attack: T1222.002
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    if:
      type: text
      regex: 'writeFileSync.{0,300}\bmode\s*:.{0,100}\b0o755\b'
