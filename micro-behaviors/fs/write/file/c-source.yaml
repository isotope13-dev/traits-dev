defaults:
  platforms:
    - linux
    - unix
  for:
    - c
    - html
traits:
  - id: hidden-inetd-config-path
    desc: Hidden inetd config path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.ind
  - id: inetd-shell-config-line
    desc: inetd shell config line
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 5002\s+stream\s+tcp\s+nowait\s+root\s+/bin/sh\s+sh
  - id: fopen-hidden-temp-append
    desc: Append-open hidden temp config
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: fopen\(&quot;/tmp/\.ind&quot;,&quot;a\+t&quot;\)
composite_rules:
  - id: inetd-shell-config-source
    desc: Writes inetd shell config
    crit: suspicious
    conf: 0.97
    all:
      - id: hidden-inetd-config-path
      - id: inetd-shell-config-line
    any:
      - id: fopen-hidden-temp-append
