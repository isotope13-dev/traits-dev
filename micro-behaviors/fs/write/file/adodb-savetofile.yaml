defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: adodb-savetofile
    desc: Uses ADODB.Stream SaveToFile method
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      # Detects a pattern indicating usage of SaveToFile method of ADODB.Stream object
      # or highly fragmented versions often used in Nemucod
      regex: 'S\\x61veFile|ToF\\x69le'
  - id: adodb-fragment-adod
    desc: Obfuscated ADODB fragment "ADOD"
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "ADOD"
    not:
      - substr: "ADODB"
  - id: adodb-fragment-stream
    desc: Obfuscated ADODB stream fragment ".Stre"
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: ".Stre"
    not:
      - substr: ".Stream"
  - id: savetofile-fragment-save
    desc: Obfuscated SaveToFile fragment "Save"
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "Save"
    not:
      - substr: "SaveTo"
      - substr: "compileOnSave"
      - substr: "OnSave"
  - id: savetofile-fragment-tofil
    desc: Obfuscated SaveToFile fragment "ToFil"
    crit: notable
    conf: 0.8
    size_max: 20000
    if:
      type: string_value
      substr: "ToFil"
    not:
      - substr: "ToFile"
      - substr: "resolutionToFil"
      - substr: "pathToFil"
composite_rules:
  - id: adodb-savetofile-obfuscated-fragments
    desc: Obfuscated ADODB.Stream SaveToFile fragment cluster
    crit: suspicious
    conf: 0.92
    all:
      - id: adodb-fragment-adod
      - id: adodb-fragment-stream
      - id: savetofile-fragment-save
      - id: savetofile-fragment-tofil
    unless:
      - id: micro-behaviors/fs/write/file::adodb-stream
