defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: js-adodb-stream-write-responsebody
    desc: Obfuscated ResponseBody write fragment cluster
    crit: suspicious
    conf: 0.9
    for:
      - javascript
    size_max: 200000
    count_min: 3
    if:
      type: string_literal
      regex: ^(Resp|onse|onseBo|Body)$
