# File Writing in PowerShell
defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9
traits:
  - id: write-all-text
    desc: Writes text data
    if:
      type: text
      regex: '(?i)\[(System\.)?IO\.File\]::\s*WriteAllText'
  - id: write-all-bytes
    desc: Writes binary data
    if:
      type: text
      regex: '(?i)\[System\.IO\.File\]::\s*WriteAllBytes'
  - id: out-file
    desc: Uses Out-File
    if:
      type: text
      regex: '(?i)\bOut-File\b'
  - id: set-content
    desc: Uses Set-Content
    if:
      type: text
      regex: '(?i)\bSet-Content\b'
