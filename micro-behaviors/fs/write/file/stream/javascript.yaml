defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: node-live-append-stream
    desc: Creates a live append stream
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(createWriteStream|createLiveAppendStream)\s*\('

  - id: node-stream-record-write
    desc: References a stream record writer
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: writeStreamLineLive
