defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - vbs
    - powershell
traits:
  - id: adodb-stream
    desc: ADODB.Stream object
    crit: notable
    if:
      type: text
      regex: (?i)(ActiveXObject|WScript\.CreateObject|CreateObject)\s*\(.{0,80}ADODB\.Stream
  - id: adodb-stream-join-fragments
    desc: Fragmented ADODB.Stream ProgID
    crit: suspicious
    conf: 0.94
    for:
      - powershell
    if:
      type: text
      substr: 'ADODB", ".St", "ream'
