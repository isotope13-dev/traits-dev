defaults:
  platforms: [windows]
  for: [oledoc, ooxml, xlsx]
  crit: notable
  conf: 0.98

traits:
  - id: vba-adodb-stream-object
    desc: VBA creates an ADODB.Stream object
    crit: notable
    if:
      type: raw
      regex: '(?i)ADODB\.Stream'
  - id: vba-adodb-savetofile-call
    desc: VBA calls ADODB.Stream SaveToFile
    crit: notable
    if:
      type: raw
      regex: '(?i)SaveToFile'

composite_rules:
  - id: vba-adodb-stream-file-write
    desc: VBA writes a stream to a file through ADODB.Stream
    crit: notable
    conf: 0.98
    all:
      - id: vba-adodb-stream-object
      - id: vba-adodb-savetofile-call
