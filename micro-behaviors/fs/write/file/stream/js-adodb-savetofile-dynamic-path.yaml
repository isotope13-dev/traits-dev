defaults:
  platforms: [windows, unix]
traits:
  - id: js-adodb-stream-savetofile-dynamic-path
    desc: "Dynamic SaveToFile overwrite & close sequence"
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '\]\s*\(\s*\w+\s*,\s*2\s*\)\s*;\s*\w+\[[^\]]{1,120}\]\s*\('
