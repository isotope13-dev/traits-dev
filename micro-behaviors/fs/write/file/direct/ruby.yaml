defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: ruby-write-mode-binary
    desc: Binary write mode ('wb', 'wb+')
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: ^wb\+?$
  - id: binmode-string
    desc: .binmode string
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      substr: .binmode
  - id: binmode-symbol
    desc: binmode symbol
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      regex: binmode
  - id: tmp-slash-string
    desc: /tmp/ directory path
    crit: baseline
    conf: 0.7
    if:
      id: micro-behaviors/fs/path/temp::temp-tmp
  - id: file-open-tmp-string
    desc: File.open to /tmp/ path
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: File\.open\(/tmp/
  - id: io-copy-stream
    desc: Copies data with Ruby IO.copy_stream
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: IO\.copy_stream
  - id: fileutils-single-quote
    desc: '''fileutils'' require string'
    crit: baseline
    conf: 0.5
    if:
      type: string_literal
      substr: '''fileutils'''
  - id: fileutils-double-quote
    desc: '"fileutils" require string'
    crit: baseline
    conf: 0.5
    if:
      type: string_literal
      substr: '"fileutils"'
composite_rules:
  - id: ruby-file-open-write-binary
    desc: Write binary file
    crit: notable
    conf: 0.92
    any:
      - id: ruby-write-mode-binary
      - id: binmode-string
      - id: binmode-symbol
  - id: ruby-fileutils
    desc: Imports FileUtils library
    crit: notable
    conf: 0.6
    any:
      - id: fileutils-single-quote
      - id: fileutils-double-quote
  - id: ruby-file-write-tmp
    desc: Write file to /tmp directory
    crit: notable
    conf: 0.9
    any:
      - id: tmp-slash-string
      - id: file-open-tmp-string
