defaults:
  platforms: [unix]
  for: [perl]
traits:
  - id: overwrite-target-open
    desc: Open target file for overwrite
    crit: notable
    conf: 0.95
    not:
      - regex: 'open\s*\(\s*STD(IN|OUT|ERR)\s*,\s*">\s*/dev/null"\s*\)'
    if:
      type: text
      regex: 'open\s*\(?\s*[A-Za-z_][A-Za-z0-9_]*\s*,\s*">[^"\n]{1,120}"\s*\)?'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: print-buffer-to-target
    desc: Print buffer into target
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'print\s+[A-Za-z_][A-Za-z0-9_]*\s+\$[A-Za-z_][A-Za-z0-9_]*\s*;'
composite_rules:
  - id: overwrite-file
    desc: Overwrite file with buffered content
    crit: notable
    conf: 0.92
    all:
      - id: overwrite-target-open
      - id: print-buffer-to-target
