defaults:
  for: [powershell]
  platforms: [windows]
traits:
- id: write-all-bytes-ungated
  desc: Writes raw bytes to file
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: '[IO.File]::WriteAllBytes'
- id: copy-file-times
  desc: Copies file timestamps to payload
  crit: suspicious
  conf: 0.92
  attack: T1070.006
  if:
    type: text
    regex: '\[IO\.File\]::Set(Creation|LastAccess|LastWrite)Time'
  unless:
  - id: well-known/app/moonshiner::seed-fixture-tree
- id: old-system32-template
  desc: References System32 path
  crit: component
  conf: 0.88
  attack: T1036
  unless:
  - id: well-known/tool/sysadmin/kubernetes
  if:
    type: text
    substr: '\system32'
- id: temp-exe-name
  desc: Builds temporary executable path
  crit: notable
  conf: 0.84
  if:
    type: symbol
    exact: GetTempFileName
composite_rules:
- id: dropped-executable-with-timestomp
  desc: Drops executable and copies timestamps
  crit: suspicious
  conf: 0.95
  attack: T1070.006
  all:
  - id: write-all-bytes-ungated
  - id: copy-file-times
  any:
  - id: old-system32-template
  - id: temp-exe-name
