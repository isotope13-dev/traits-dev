# File Writing in PowerShell
defaults:
  platforms: [windows]
  for: [powershell, batch]
  crit: notable
  conf: 0.9
traits:
  - id: write-all-text
    desc: Writes text data
    if:
      type: text
      regex: '(?i)\[(System\.)?IO\.File\]::\s*WriteAllText'
  # Typed-variable form: $f='System.IO.File'-as[type]; $f::WriteAllText(...)
  - id: write-all-text-via-type
    desc: WriteAllText via typed File reference
    if:
      type: text
      regex: '(?i)::\s*WriteAllText\s*\('
  - id: write-all-bytes
    desc: Writes binary data
    if:
      type: text
      regex: '(?i)\[System\.IO\.File\]::\s*WriteAllBytes'
  - id: out-file
    desc: Uses Out-File
    if:
      type: text
      regex: '(?i)\bOut-File\b'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: add-content
    desc: Uses Add-Content
    ref: sha256:c0b1dd711360b1389cb8e44f2e984d971ba6d3ab8c59da42eb8b12bdc1b4189a
    if:
      type: text
      regex: '(?i)\bAdd-Content\b'
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: powershell-profile-write
    desc: Writes PowerShell profile content
    if:
      type: text
      regex: '(?is)\b(Set|Add)-Content\b.{0,100}\$PROFILE\b'
