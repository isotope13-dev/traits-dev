defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: write-file-sync
    desc: Writes to file synchronously
    crit: baseline
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    if:
      type: text
      regex: '\.writeFileSync\s*\('
  - id: append-file-sync
    desc: Appends to file synchronously
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    if:
      type: text
      regex: '\.appendFileSync\s*\('
  - id: write-file-async
    desc: Writes to file asynchronously
    crit: baseline
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    if:
      type: text
      regex: '\.writeFile\s*\(\s*[^)\s]'
  - id: append-file-async
    desc: Appends to file asynchronously
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    if:
      type: text
      regex: '\.appendFile\s*\('
  - id: create-write-stream
    desc: Creates a write stream
    crit: notable
    conf: 0.8
    unless:
      - type: basename
        regex: \.map$|^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    not:
      - substr: '"version":3,"file":'
      - substr: "fs.createWriteStream(fullpath, this.options)"
      - substr: builtin-plugins/tabby-
    if:
      type: text
      regex: '\.createWriteStream\s*\('
  - id: adodb-stream-write
    desc: ADODB.Stream write operation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'ADODB\.Stream[\s\S]{0,120}\.write(Text)?\s*\('
composite_rules:
  - id: js-file-write
    desc: JavaScript file write operation
    crit: notable
    conf: 0.9
    any:
      - id: write-file-sync
      - id: append-file-sync
      - id: write-file-async
      - id: append-file-async
      - id: create-write-stream
      - id: adodb-stream-write
      - id: micro-behaviors/fs/write/stream::adodb-save-to-file
