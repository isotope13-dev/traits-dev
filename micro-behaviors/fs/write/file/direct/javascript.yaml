defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: write-node-modules-directory
    desc: Writes a file under node_modules
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: '(writeFile|writeFileSync|appendFile)\s*\(.{0,220}node_modules'
  - id: write-file-sync
    desc: Writes to file synchronously
    crit: baseline
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    if:
      type: text
      regex: '\.writeFileSync\s*\('

  - id: node-writes-serialized-yaml
    desc: Node writes serialized YAML data
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'writeFileSync\s*\([^;\n]{0,220}\byaml\.dump\s*\('
  - id: append-file-sync
    desc: Appends to file synchronously
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    if:
      type: text
      regex: '\.appendFileSync\s*\('
  - id: write-file-async
    desc: Writes to file asynchronously
    crit: baseline
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness/
    if:
      type: text
      regex: '\.writeFile\s*\(\s*[^)\s]'
  - id: append-file-async
    desc: Appends to file asynchronously
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness/
    if:
      type: text
      regex: '\.appendFile\s*\('
  - id: create-write-stream
    desc: Creates a write stream
    crit: notable
    conf: 0.8
    unless:
      - type: basename
        regex: \.map$|^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness/
    not:
      - substr: '"version":3,"file":'
      - substr: "fs.createWriteStream(fullpath, this.options)"
      - substr: builtin-plugins/tabby-
    if:
      type: text
      regex: '\.createWriteStream\s*\('
  - id: create-write-stream-call
    desc: Opens a writable stream with createWriteStream()
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness/
    if:
      type: symbol
      kind: call
      exact: createWriteStream
  - id: adodb-stream-write
    desc: ADODB.Stream write operation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'ADODB\.Stream[\s\S]{0,120}\.write(Text)?\s*\('
  - id: js-authorized-keys-variable-write
    desc: Node writes via authorized_keys path variable
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "(appendFile(Sync)?|writeFile(Sync)?)\\s*\\(\\s*(authKeys|authorizedKeys)"
  - id: document-save-call
    desc: Calls document persistence function
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\.saveDoc\s*\('
composite_rules:
  - id: js-file-write
    desc: JavaScript file write operation
    crit: notable
    conf: 0.9
    any:
      - id: write-file-sync
      - id: append-file-sync
      - id: write-file-async
      - id: append-file-async
      - id: create-write-stream
      - id: create-write-stream-call
      - id: adodb-stream-write
      - id: document-save-call
      - id: micro-behaviors/fs/write/stream::adodb-save-to-file
