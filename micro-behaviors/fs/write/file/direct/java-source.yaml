defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: java-fileoutputstream-source
    desc: Java FileOutputStream usage
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: new FileOutputStream
  - id: java-fos-simple
    desc: FileOutputStream usage (simple)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: FileOutputStream
  - id: jvm-fileoutputstream-bytecode
    desc: JVM bytecode FileOutputStream
    crit: notable
    conf: 0.86
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 46 69 6C 65 4F 75 74 70 75 74 53 74 72 65 61 6D
  - id: java-filewriter-source
    desc: Java FileWriter usage
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: new FileWriter
  - id: java-files-write-source
    desc: Java Files.write usage
    crit: notable
    conf: 0.9
    for: [java]
    if:
      type: text
      substr: Files.write
  - id: java-owner-execute-permission
    desc: Java sets owner execute permission
    crit: notable
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: text
      substr: OWNER_EXECUTE
  - id: kotlin-write-text-source
    desc: Kotlin writes text to a file
    crit: notable
    conf: 0.88
    for: [kotlin]
    if:
      type: text
      regex: '\.writeText\s*\('
  - id: kotlin-append-text-source
    desc: Kotlin appends text to a file
    crit: notable
    conf: 0.88
    for: [kotlin]
    if:
      type: text
      regex: '\.appendText\s*\('
  - id: kotlin-set-executable-source
    desc: Kotlin marks a file executable
    crit: notable
    conf: 0.9
    for: [kotlin]
    if:
      type: text
      regex: '\.setExecutable\s*\(\s*true'
  - id: kotlin-files-write-source
    desc: Kotlin Files.write usage
    crit: notable
    conf: 0.9
    for: [kotlin]
    if:
      type: text
      regex: 'Files\.write(String)?\s*\('
  - id: jvm-files-writestring-bytecode
    desc: JVM bytecode Files.writeString
    crit: notable
    conf: 0.9
    for: [class]
    if:
      type: symbol
      exact: java/nio/file/Files.writeString
  - id: jvm-owner-execute-permission
    desc: JVM bytecode owner execute perm
    crit: notable
    conf: 0.9
    for: [class]
    if:
      type: symbol
      exact: java/nio/file/attribute/PosixFilePermission.OWNER_EXECUTE
composite_rules:
  - id: java-write-executable-file-source
    desc: Java writes executable file
    crit: suspicious
    conf: 0.94
    for: [java]
    all:
      - id: java-files-write-source
      - id: java-owner-execute-permission
  - id: kotlin-write-executable-file-source
    desc: Kotlin writes executable file
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    all:
      - id: kotlin-set-executable-source
    any:
      - id: kotlin-write-text-source
      - id: kotlin-append-text-source
    needs: 1
