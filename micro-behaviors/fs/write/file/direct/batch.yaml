defaults:
  for: [batch]
  platforms: [windows]
traits:
  - id: batch-append-redirect
    desc: Batch appends output to file path
    crit: notable
    conf: 0.75
    mbc: C0016
    unless:
      - type: basename
        regex: ^UpdateGenVersion\.bat$
    if:
      type: text
      # Ignore `>>` occurring in opaque padding and require a command-like
      # line rather than an arbitrary long variable-expansion token.
      regex: '(?m)^(?!rem\b|::|%)[A-Za-z][\w.-]{1,20}([ \t]+[^>\r\n]{0,200})?>>[ \t]*[\w%~\\./-]+'
      case_insensitive: true
