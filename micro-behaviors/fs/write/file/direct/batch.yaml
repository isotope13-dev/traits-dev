defaults:
  for: [batch]
  platforms: [windows]
traits:
  - id: batch-append-redirect
    desc: Batch appends output to file path
    crit: notable
    conf: 0.75
    mbc: C0016
    unless:
      - type: basename
        regex: ^UpdateGenVersion\.bat$
    if:
      type: text
      regex: (?i)>>[a-z0-9_%~\\./]+
