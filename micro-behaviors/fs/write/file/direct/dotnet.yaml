defaults:
  platforms: [windows, unix, openwrt]
  for: [pe, dll]
traits:
  - id: dotnet-writeallbytes-token
    desc: .NET File.WriteAllBytes token
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: WriteAllBytes
    unless:
      - id: metadata/lang/compiler/managed::delphi
  - id: dotnet-appendalltext-token
    desc: .NET File.AppendAllText token
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'AppendAllText|File\.AppendAllText'
    unless:
      - id: metadata/lang/compiler/managed::delphi
  - id: dotnet-writealltext-token
    desc: .NET File.WriteAllText token
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'WriteAllText|File\.WriteAllText'
    unless:
      - id: metadata/lang/compiler/managed::delphi
