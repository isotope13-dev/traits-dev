# Binary masquerade as npm package manager
# Detects code that writes a binary to disk with the name "npm"
# to blend in with the legitimate npm package manager in process listings.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell, python, ruby]
  attack: T1036
  mbc: F0004
traits:
  - id: write-binary-as-npm
    desc: Writes downloaded binary as ./npm (masquerade)
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'createWriteStream\s*\(\s*[\x27"]npm[\x27"]'
  - id: chmod-npm-binary
    desc: chmod +x on file named npm (masquerade)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'chmod\s+\+x\s+[\x27"]?npm[\x27"]?'
  - id: exec-local-npm-binary
    desc: Executes ./npm binary via shell (masquerade)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'setsid\s+nohup\s+\./npm\b'
