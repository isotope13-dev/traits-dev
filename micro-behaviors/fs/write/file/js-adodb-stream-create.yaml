defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: adodb-stream-activexobject
    desc: ADODB.Stream via ActiveXObject
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)ActiveXObject\s*\(\s*["\x27]ADODB\.Stream["\x27]
    unless:
      - type: text
        substr: "namespace TypeScript.WebTsc"
  - id: adodb-stream-wscript-createobject
    desc: ADODB.Stream via WScript.CreateObject
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)WScript\.CreateObject\s*\(\s*["\x27]ADODB\.Stream["\x27]
  - id: adodb-stream-createobject
    desc: ADODB.Stream via CreateObject
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)CreateObject\s*\(\s*["\x27]ADODB\.Stream["\x27]
composite_rules:
  - id: js-adodb-stream-create
    desc: ADODB.Stream object creation in script
    crit: suspicious
    conf: 0.9
    any:
      - id: adodb-stream-activexobject
      - id: adodb-stream-wscript-createobject
      - id: adodb-stream-createobject
