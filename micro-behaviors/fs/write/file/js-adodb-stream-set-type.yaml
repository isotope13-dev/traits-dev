defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-adodb-stream-set-type-assign
    desc: Sets bracket property Type to 1 (JS)
    crit: component
    conf: 0.9
    for:
      - javascript
    if:
      type: raw
      regex: '\[["''](?i:type)["'']\]\s*=\s*1\b'
  - id: js-adodb-stream-reference
    desc: References ADODB.Stream (JS)
    crit: component
    conf: 0.9
    for:
      - javascript
    if:
      type: string
      substr: "ADODB.Stream"
composite_rules:
  - id: js-adodb-stream-set-type
    desc: ADODB.Stream Set Type to Binary (JS)
    crit: suspicious
    conf: 0.9
    all:
      - id: js-adodb-stream-set-type-assign
      - id: js-adodb-stream-reference
