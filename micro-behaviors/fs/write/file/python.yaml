defaults:
  platforms: [windows, unix]
  for:
    - python
  crit: notable
  mbc: C0016
  attack: T1105
traits:
  - id: python-open-append
    desc: Append to text file (open with 'a')
    conf: 0.8
    if:
      type: text
      substr: open(logFile, "a")
  - id: python-open-write-dup
    desc: Write to text file (open with 'w')
    conf: 0.8
    if:
      type: text
      regex: open\([^)]{1,120}['"]w['"]\)
  - id: python-open-write-binary
    desc: Write binary file (open with
    conf: 0.85
    if:
      type: string_literal
      regex: open\(.{1,220}['"]wb['"]\)
    unless:
      - type: text
        substr: "Usage::"
      - type: text
        substr: "Example usage::"
  - id: python-open-append-binary
    desc: Append to binary file (open
    conf: 0.8
    if:
      type: string_literal
      regex: open\(.{1,220}['"]ab['"]\)
  - id: python-pathlib-write-bytes
    desc: Write bytes via pathlib
    conf: 0.85
    if:
      type: string_literal
      regex: \.write_bytes\(
  - id: python-pathlib-write-text
    desc: Write text via pathlib
    conf: 0.85
    if:
      type: symbol
      substr: write_text
  - id: python-file-truncate
    desc: Truncate file (truncate())
    conf: 0.8
    crit: notable
    if:
      type: string_literal
      regex: \.truncate\(
  - id: python-write-response-content
    desc: Write HTTP response content to
    conf: 0.9
    if:
      type: string_literal
      regex: \.write\(.{0,220}\.content\)
  - id: write-exe
    desc: Write to .exe file
    conf: 0.9
    crit: suspicious
    if:
      type: text
      regex: open\(\s*f?['"][^'"\r\n]{0,120}\.exe['"]\s*,\s*['"][wabtx+]{1,4}['"]
  - id: python-shutil-copy
    desc: Copy file object (shutil.copyfileobj)
    conf: 0.75
    crit: baseline
    if:
      type: string_literal
      regex: shutil\.copyfileobj\(
  - id: python-write-tmp
    desc: Write to /tmp directory
    conf: 0.85
    if:
      type: string_literal
      regex: open\(.{0,220}['"]?/tmp/
  - id: python-tempfile-named
    desc: tempfile.NamedTemporaryFile usage
    conf: 0.6
    crit: baseline
    if:
      type: string_literal
      substr: tempfile.NamedTemporaryFile
  - id: python-tempfile-mkstemp
    desc: tempfile.mkstemp usage
    conf: 0.6
    crit: baseline
    if:
      type: string_literal
      substr: tempfile.mkstemp
  - id: python-tempfile-mkdtemp
    desc: tempfile.mkdtemp usage
    conf: 0.6
    crit: baseline
    if:
      type: string_literal
      substr: tempfile.mkdtemp
composite_rules:
  - id: python-tempfile
    desc: Temporary file creation (tempfile module)
    conf: 0.7
    crit: baseline
    any:
      - id: python-tempfile-named
      - id: python-tempfile-mkstemp
      - id: python-tempfile-mkdtemp
  - id: python-http-request
    desc: HTTP request via requests or
    conf: 0.8
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
  - id: python-binary-write-pattern
    desc: Binary file write pattern
    conf: 0.85
    any:
      - id: python-open-write-binary
      - id: python-pathlib-write-bytes
  - id: python-download-write
    desc: Download content and write to
    conf: 0.9
    crit: suspicious
    size_max: 50000
    mbc: B0024
    all:
      - id: python-http-request
      - id: python-binary-write-pattern
  - id: python-write-chmod-exec
    desc: Write file and make executable
    conf: 0.95
    crit: suspicious
    attack: T1222.002
    all:
      - id: python-open-write-binary
      - id: micro-behaviors/fs/chmod/executable/
