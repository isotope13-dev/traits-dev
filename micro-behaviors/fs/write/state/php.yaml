defaults:
  platforms: [unix, windows]
  for: [php]

composite_rules:
  - id: hostname-keyed-temp-state
    desc: Writes hostname-keyed temporary state file
    crit: notable
    conf: 0.95
    mbc: C0052
    all:
      - id: micro-behaviors/os/sysinfo/hostname::php-gethostname-call
      - id: micro-behaviors/crypto/hash/digest::md5-php
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      - id: micro-behaviors/fs/temp/directory::sys-get-temp-dir-symbol
    near_bytes: 4096
