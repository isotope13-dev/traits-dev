defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059

traits:
  - id: python-materializes-bootstrap-script
    desc: Python materializes bootstrap script
    crit: notable
    conf: 0.88
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: text
      regex: '\.read_text\(\)[\s\S]{0,900}cat\s+>\s+\S{1,120}(bootstrap|payload)\.(py|b64)'

  - id: shell-heredoc-bootstrap-write
    desc: Shell heredoc bootstrap write
    crit: notable
    conf: 0.9
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: text
      regex: 'cat\s+>\s+\S{1,120}bootstrap\.py\s+<<'

  - id: root-flash-staging-path
    desc: Root flash staging path
    crit: component
    conf: 0.9
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: text
      substr: /root/flash/
