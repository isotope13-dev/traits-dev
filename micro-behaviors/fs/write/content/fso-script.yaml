defaults:
  platforms: [windows]
  for: [javascript, vbs, xml]
traits:
- id: create-text-file-api
  desc: Creates a text file using FileSystemObject
  crit: notable
  if:
    type: text
    regex: '(?i)(CreateTextFile\b|OpenTextFile\s*\([^,)]{1,80},\s*[28]\b)'
- id: create-text-file-method-name
  desc: FileSystemObject CreateTextFile method name
  crit: notable
  conf: 0.9
  if:
    type: text
    word: CreateTextFile
    case_insensitive: true
- id: create-text-file-literal
  desc: CreateTextFile literal in script
  crit: notable
  conf: 0.92
  if:
    type: string_literal
    exact: CreateTextFile
- id: write-text-file-method
  desc: Writes to text file
  crit: baseline
  if:
      type: text
      regex: '\.(Write|WriteLine|WriteBlankLines)\s*\('
- id: fso-open-text-file-write
  desc: FileSystemObject opens a text file for writing
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '(?i)OpenTextFile\s*\([^,\r\n)]{1,180},\s*2\b'
- id: create-batch-or-command-file
  desc: Creates a Windows batch or command script
  conf: 0.95
  crit: component
  if:
    type: text
    regex: '(?i)(CreateTextFile|OpenTextFile)\s*\(\s*[^,\r\n)]{1,180}\.(bat|cmd)["'']'
  unless:
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: metadata/package/testing/presence/harness::test-directory-path
  - id: metadata/package/testing/presence/fixture::snapshot-file
- id: create-powershell-or-vbs-file
  desc: Creates a PowerShell or VBScript file
  conf: 0.95
  crit: component
  if:
    type: text
    regex: '(?i)(CreateTextFile|OpenTextFile)\s*\(\s*[^,\r\n)]{1,180}\.(ps1|vbs)["'']'
  unless:
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: metadata/package/testing/presence/harness::test-directory-path
  - id: metadata/package/testing/presence/fixture::snapshot-file
- id: ext-js
  desc: Reference to .js file extension
  crit: notable
  for: [vbs]
  if:
    type: text
    regex: '[\"\x27][^\"]{1,200}\.js[\"\x27]'
composite_rules:
- id: create-script-file
  desc: Creates an executable Windows script file
  crit: suspicious
  conf: 0.95
  any:
  - id: create-batch-or-command-file
  - id: create-powershell-or-vbs-file
