defaults:
  for: [vbs]
  platforms: [windows]
traits:
  - id: explorer-self-copy
    desc: Explorer.exe self-copy masquerade
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: Explorer.exe
  - id: patch-lure-copy
    desc: Security patch lure file copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Win_Security_Patch_2602.exe
  - id: self-copy-vbs
    desc: VBScript copies current script
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)\b[a-z_]\w*\.CopyFile\s+(thisScript|WScript\.ScriptFullName)\b'
  - id: mirc-script-ini-write
    desc: Writes mIRC script ini
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: mxa + 'script.ini'
