# GNU coreutils `install` — copies files to a destination while setting their
# mode/owner (and optionally creating the destination directory). It is the
# standard file-staging tool in package build recipes (staging into ${pkgdir})
# and Makefile install targets, so staging a data file is baseline. Installing a
# file with an EXECUTABLE mode is the notable form: it is how build recipes and
# droppers place runnable binaries/scripts, and it is what an analyst wants to
# weigh in a supply-chain diff. Package-manager `install` subcommands (apt/npm/
# pip) don't take coreutils `-D`/`-m` mode flags, so they are not matched here.
defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: coreutils-install-file
    desc: coreutils install stages a file
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: '(^|[\s;&|(])install\s+[^\n;]{0,40}-[Dm]'
  - id: coreutils-install-executable
    desc: coreutils install stages an executable file
    crit: notable
    conf: 0.8
    if:
      # Mode whose owner/group/other digit carries the execute bit (1,3,5,7),
      # e.g. -m755 / -m0755 / -m4755 — matches an executable install, not -m644.
      type: text
      regex: '(^|[\s;&|(])install\s+[^\n;]{0,80}-m\s*[0-7]*[1357][0-7][0-7]\b'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
