defaults:
  platforms: [windows, unix]
  for: [python, shell]
traits:
  - id: search-image-extensions
    desc: Searches for common image file extensions
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '\*\.jpe?g|\*\.png'
      case_insensitive: true
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
