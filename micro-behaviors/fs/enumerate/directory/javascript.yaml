# File System Enumeration - JavaScript
# Capabilities related to traversing directories
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: node-readdir-sync-call
    desc: Calls Node.js synchronous directory enumeration
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'fs\.readdirSync\s*\('
  - id: fs-readdir
    desc: Calls Node.js readdir at least twice
    crit: notable
    conf: 0.6
    unless:
      - type: basename
        exact: post-install.js
    if:
      type: text
      regex: 'fs\.readdir(Sync)?\s*\('
    count_min: 2
    not:
      - substr: self.fs.readdir(abs, readdirCb(this, abs, cb))
      - substr: const pluginNames = yield fs.readdir(pluginDir);
      - substr: var files = fs.readdirSync(dir);
      - substr: files = fs.readdirSync(folder);
      - substr: const versionFolder = fs.readdirSync(CONPTY_DIR)[0];
  - id: node-recursive-file-walk
    desc: Recursive Node file-tree enumeration
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'fs\.readdirSync[\s\S]{0,300}fs\.statSync[\s\S]{0,300}\w+\.push'
  - id: file-search-exclude-common
    desc: References common system/dev directory names
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '["'']node_modules["'']|["'']Program Files["'']|["'']AppData["'']'
