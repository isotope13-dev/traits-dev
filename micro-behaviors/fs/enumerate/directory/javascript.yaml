# File System Enumeration - JavaScript
# Capabilities related to traversing directories
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: fs-readdir
    desc: Recursive directory reading (readdir/stat loop)
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: 'fs\.readdir'
    downgrade:
      any:
        - id: metadata/dev/testing::raw-token-test
  - id: file-search-exclude-common
    desc: References common system/dev directory names
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '["'']node_modules["'']|["'']Program Files["'']|["'']AppData["'']'
