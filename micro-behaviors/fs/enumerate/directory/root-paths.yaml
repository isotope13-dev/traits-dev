defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: root-paths-array
    desc: Array containing root paths (potential directory enumeration)
    crit: notable
    if:
      type: text
      regex: '\[\s*[''"]([A-Z]:\\\\|/)[''"]\s*,\s*[''"]([A-Z]:\\\\|/home)[''"]\s*

'
    unless:
      - id: metadata/library/prototype::copyright
      - id: metadata/library/prototype::header-x
      - id: metadata/package/quality::versioned
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
      - id: metadata/library/ioredis::ioredis-auto-pipeline
