defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: find-next-file
    desc: Directory enumeration
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: FindNextFileW
  - id: find-first-file
    desc: Begin directory enumeration
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: FindFirstFileW
  - id: find-next-file-a
    desc: Directory enumeration (ANSI)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: FindNextFileA
  - id: find-first-file-a
    desc: Begin directory enumeration ANSI
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: FindFirstFileA
  - id: find-first-file-ex
    desc: Extended directory enumeration
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: FindFirstFileExW
  - id: find-close
    desc: Close directory enumeration handle
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: FindClose
  - id: find-first-file-source
    desc: Begin directory enumeration in source
    crit: baseline
    conf: 0.9
    for:
      - c
    if:
      type: string_literal
      substr: FindFirstFileW
  - id: find-next-file-source
    desc: Continue directory enumeration in source
    crit: baseline
    conf: 0.9
    for:
      - c
    if:
      type: string_literal
      substr: FindNextFileW
  - id: find-close-source
    desc: Close directory enumeration in source
    crit: baseline
    conf: 0.9
    for:
      - c
    if:
      type: string_literal
      substr: FindClose
  - id: find-first-file-undecorated-source
    desc: FindFirstFile ANSI call in C source
    crit: baseline
    conf: 0.88
    for: [c, cpp]
    if:
      type: symbol
      exact: FindFirstFile
  - id: find-next-file-undecorated-source
    desc: FindNextFile ANSI call in C source
    crit: baseline
    conf: 0.88
    for: [c, cpp]
    if:
      type: symbol
      exact: FindNextFile
  - id: lnk-glob-pattern-source
    desc: Enumerates *.LNK shortcut files
    crit: notable
    conf: 0.88
    for: [c, cpp]
    if:
      type: string_literal
      regex: \*\.lnk
      case_insensitive: true
  - id: python-json-glob
    desc: Enumerates JSON files via glob
    crit: baseline
    conf: 0.86
    platforms: [unix, windows]
    for: [python]
    if:
      type: text
      regex: '\.glob\s*\(\s*["'']\*\.json["'']\s*\)'
  - id: powershell-fullname-collection
    desc: PowerShell collects enumerated file paths
    crit: notable
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: 'Get-ChildItem[^\r\n]{0,320}SilentlyContinue[^\r\n]{0,320}\.FullName'
      case_insensitive: true
  - id: mfc-cfilefind-init
    desc: Initialize MFC CFileFind walker
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: CFileFind::CFileFind
  - id: mfc-find-file
    desc: Begin MFC file enumeration
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: CFileFind::FindFile
  - id: mfc-find-next-file
    desc: Continue MFC file enumeration
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: CFileFind::FindNextFileA
  - id: mfc-get-file-path
    desc: Read enumerated file path
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: CFileFind::GetFilePath
  - id: mfc-is-dots
    desc: Skip dot directory entries
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: CFileFind::IsDots
composite_rules:
  - id: find-file-walker
    desc: Directory walker using Win32 find APIs
    crit: notable
    conf: 0.92
    all:
      - id: find-first-file-a
      - id: find-next-file-a
    any:
      - id: find-close
  - id: find-file-walker-wide
    desc: Directory walker using Win32 wide APIs
    crit: baseline
    conf: 0.92
    all:
      - id: find-first-file
      - id: find-next-file
    any:
      - id: find-close
  - id: find-file-walker-wide-ex
    desc: Extended directory walker using Win32 wide APIs
    crit: baseline
    conf: 0.92
    all:
      - id: find-first-file-ex
      - id: find-next-file
    any:
      - id: find-close
  - id: find-file-source-walker
    desc: Directory walker using Win32 find APIs
    crit: baseline
    conf: 0.92
    for:
      - c
    all:
      - id: find-first-file-source
      - id: find-next-file-source
    any:
      - id: find-close-source
  - id: mfc-cfilefind-enumeration
    desc: Enumerate directories via MFC CFileFind
    crit: notable
    conf: 0.92
    all:
      - id: mfc-cfilefind-init
      - id: mfc-find-file
    any:
      - id: mfc-find-next-file
      - id: mfc-get-file-path
      - id: mfc-is-dots
    needs: 2
  - id: find-file-undecorated-source-walker
    desc: Directory walker using ANSI undecorated Win32 find
    crit: notable
    conf: 0.9
    for: [c, cpp]
    all:
      - id: find-first-file-undecorated-source
      - id: find-next-file-undecorated-source
