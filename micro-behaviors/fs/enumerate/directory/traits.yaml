# File System Enumeration
# Directory and file listing capabilities

defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]

traits:
  # === File Enumeration ===
  - id: find-next-file
    desc: Directory enumeration
    crit: notable
    conf: 0.90
    if:
      type: symbol
      exact: "FindNextFileW"

  - id: find-first-file
    desc: Begin directory enumeration
    crit: notable
    conf: 0.90
    if:
      type: symbol
      exact: "FindFirstFileW"

  - id: find-first-file-ex
    desc: Extended directory enumeration
    crit: notable
    conf: 0.90
    if:
      type: symbol
      exact: "FindFirstFileExW"

  - id: find-close
    desc: Close directory enumeration handle
    crit: baseline
    conf: 0.90
    if:
      type: symbol
      exact: "FindClose"

  - id: mfc-cfilefind-init
    desc: Initialize MFC CFileFind walker
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: "CFileFind::CFileFind"

  - id: mfc-find-file
    desc: Begin MFC file enumeration
    crit: notable
    conf: 0.9
    if:
      type: symbol
      substr: "CFileFind::FindFile"

  - id: mfc-find-next-file
    desc: Continue MFC file enumeration
    crit: notable
    conf: 0.9
    if:
      type: symbol
      substr: "CFileFind::FindNextFileA"

  - id: mfc-get-file-path
    desc: Read enumerated file path
    crit: notable
    conf: 0.85
    if:
      type: symbol
      substr: "CFileFind::GetFilePath"

  - id: mfc-is-dots
    desc: Skip dot directory entries
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      substr: "CFileFind::IsDots"

composite_rules:
  - id: mfc-cfilefind-enumeration
    desc: Enumerate directories via MFC CFileFind
    crit: notable
    conf: 0.92
    all:
      - id: mfc-cfilefind-init
      - id: mfc-find-file
    any:
      - id: mfc-find-next-file
      - id: mfc-get-file-path
      - id: mfc-is-dots
    needs: 2
