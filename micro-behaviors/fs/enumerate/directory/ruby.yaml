defaults:
  platforms: [unix, windows]
  for: [ruby]
traits:
  - id: ruby-recursive-glob
    desc: Enumerates files with a recursive Ruby glob
    crit: notable
    conf: 0.85
    attack: T1083
    if:
      type: text
      regex: 'Dir\[(.{0,50}\*\*.{0,80}\*\.[^\]]{1,80})\]|Dir\.glob\(.{0,120}\*\*'
    downgrade:
      any:
        - id: well-known/lib/nokogiri::library-reference
