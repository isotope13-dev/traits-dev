defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
traits:
  - id: php-scandir
    desc: References the PHP scandir() function
    if:
      type: text
      word: "scandir"
  - id: php-recursive-directory-iterator
    desc: PHP recursive directory iterator
    if:
      type: text
      substr: RecursiveDirectoryIterator
