defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: get-files
    desc: Directory.GetFiles enumeration
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: Directory.GetFiles
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
  - id: get-files-exe-filter
    desc: Directory.GetFiles with .exe filter
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'GetFiles\(.{1,50}"\*\.exe"'
  - id: get-directories
    desc: Directory.GetDirectories enumeration
    crit: notable
    conf: 0.87
    if:
      type: symbol
      kind: call
      exact: Directory.GetDirectories
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
