defaults:
  for: [csharp]
  platforms: [unix, windows, macos]
traits:
  - id: get-files
    desc: Directory.GetFiles enumeration
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "Directory.GetFiles("
  - id: get-files-exe-filter
    desc: Directory.GetFiles with .exe filter
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: 'GetFiles\(.{1,50}"\*\.exe"'
