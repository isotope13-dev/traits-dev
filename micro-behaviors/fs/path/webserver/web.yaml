defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: public-html-php-path-reference
    desc: References a public_html PHP path
    crit: component
    conf: 0.9
    for: [php]
    if:
      type: text
      regex: '/home/[^"''\s]{1,80}/public_html/[^"''\s]{1,80}\.php'
  - id: hardcoded-path-var-www-html
    desc: Detects a hardcoded /var/www/html path.
    crit: notable
    if:
      type: text
      exact: /var/www/html
  - id: aspnet-client-system-web
    desc: ASP.NET aspnet_client/system_web path
    crit: notable
    conf: 0.92
    platforms: [windows]
    for: [pe, dll, batch, powershell, csharp]
    if:
      type: text
      regex: 'aspnet_client[\\/]+system_web'
      case_insensitive: true
  - id: exchange-owa-auth-dir
    desc: Exchange Server OWA auth directory
    crit: notable
    conf: 0.92
    platforms: [windows]
    for: [pe, dll, batch, powershell, csharp]
    if:
      type: text
      regex: 'Exchange Server[\\/]+V15[\\/]+FrontEnd[\\/]+HttpProxy[\\/]+owa[\\/]+auth'
      case_insensitive: true
  - id: inetpub-wwwroot
    desc: inetpub wwwroot path
    crit: baseline
    conf: 0.85
    platforms: [windows]
    for: [pe, dll, batch, powershell, csharp]
    if:
      type: text
      regex: 'inetpub[\\/]+wwwroot'
      case_insensitive: true
  - id: aspx-error-page-name
    desc: error/errorFE ASP.NET page basename
    crit: component
    conf: 0.85
    platforms: [windows]
    for: [pe, dll, batch, powershell, csharp]
    if:
      type: path
      basename: true
      regex: '^(error|errorFE)\.(aspx|ashx)$'
      case_insensitive: true
  - id: aspx-signout-page-name
    desc: signout/warn ASP.NET page basename
    crit: component
    conf: 0.85
    platforms: [windows]
    for: [pe, dll, batch, powershell, csharp]
    if:
      type: path
      basename: true
      regex: '^(signout|warn)\.(aspx|ashx)$'
      case_insensitive: true
  - id: aspx-data-page-name
    desc: data/page ASP.NET page basename
    crit: component
    conf: 0.85
    platforms: [windows]
    for: [pe, dll, batch, powershell, csharp]
    if:
      type: path
      basename: true
      regex: '^(data|page)\.(aspx|ashx)$'
      case_insensitive: true
