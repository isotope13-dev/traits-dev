defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: path-file-exists
    desc: Check file existence via SHLWAPI
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^PathFileExists[AW]$
  - id: path-file-exists-a
    desc: Check file existence via PathFileExistsA
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: PathFileExistsA
  - id: path-file-exists-w
    desc: Check file existence via PathFileExistsW
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: PathFileExistsW
  - id: path-is-system-folder-w
    desc: Test path for protected system flag
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: PathIsSystemFolderW
  - id: path-is-directory
    desc: Check if path is directory
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: PathIsDirectory
  - id: get-short-path-name
    desc: Canonicalize Windows 8.3 short path
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^GetShortPathName[AW]$
  - id: get-file-attributes
    desc: Query file attributes or existence
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: ^GetFileAttributes[AW]$
  - id: vb6-rtcgetfileattr
    desc: VB6 file attribute query
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: rtcGetFileAttr
  - id: path-remove-file-spec
    desc: Strip filename from path
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: ^PathRemoveFileSpec[AW]$
  - id: get-module-filename
    desc: Query current module path
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: ^GetModuleFileName[AW]$
composite_rules:
  - id: self-directory-switch
    desc: Set working directory to self
    crit: notable
    conf: 0.88
    all:
      - id: get-module-filename
      - id: path-remove-file-spec
      - id: micro-behaviors/fs/traversal/drives::set-current-directory
