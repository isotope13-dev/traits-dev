# Killswitch marker file paths
# Malware checks for a specific file before executing; absence triggers exit
defaults:
  for: [binaries]
  platforms: [linux, macos]
  crit: suspicious
  conf: 0.9
  attack: T1620
traits:
  - id: killswitch-log-file
    desc: Killswitch marker file check in /tmp
    if:
      type: text
      word: /tmp/log_de.log
