defaults:
  platforms: [unix]
  for: [shell]
  size_min: 512
  size_max: 5000000
traits:
  - id: access-call-reference
    desc: access() path-check call referenced
    crit: component
    conf: 0.6
    if:
      type: string_literal
      regex: '(?i)(hook.{0,24}\baccess\b|\baccess\s*\()'
    unless:
      - type: text
        substr: "(assert_"
      - type: text
        substr: "(module"
