defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-os-path-isfile-symbol
    desc: Python os.path.isfile path test
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: os.path.isfile

  - id: python-os-path-isfile-text
    desc: Python os.path.isfile path test text
    crit: component
    conf: 0.7
    if:
      type: text
      substr: .path.isfile(

  - id: python-os-path-isdir-symbol
    desc: Python os.path.isdir path test
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: os.path.isdir

  - id: python-os-path-isdir-text
    desc: Python os.path.isdir path test text
    crit: component
    conf: 0.7
    if:
      type: text
      substr: .path.isdir(

  # The standard Python containment guard: resolve a candidate path, then assert
  # it sits under a root directory (`candidate.resolve().relative_to(root)`, or
  # `Path.is_relative_to(root)`). Resolving first is what defeats `../` escapes.
  # This separates a file server that sandboxes access to one user-chosen folder
  # from one that will read any path it is handed.
  - id: python-resolved-path-containment-check
    desc: Path confined under a root directory
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.resolve\(\)[\s\S]{0,120}\.relative_to\(|\.is_relative_to\('

composite_rules:
  - id: python-os-path-isfile
    desc: Python os.path.isfile path test
    crit: component
    conf: 0.86
    any:
      - id: python-os-path-isfile-symbol
      - id: python-os-path-isfile-text

  - id: python-os-path-isdir
    desc: Python os.path.isdir path test
    crit: component
    conf: 0.86
    any:
      - id: python-os-path-isdir-symbol
      - id: python-os-path-isdir-text
