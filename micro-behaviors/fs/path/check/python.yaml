defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-os-path-isfile-symbol
    desc: Python os.path.isfile path test
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: os.path.isfile

  - id: python-os-path-isfile-text
    desc: Python os.path.isfile path test text
    crit: component
    conf: 0.7
    if:
      type: text
      substr: .path.isfile(

  - id: python-os-path-isdir-symbol
    desc: Python os.path.isdir path test
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: os.path.isdir

  - id: python-os-path-isdir-text
    desc: Python os.path.isdir path test text
    crit: component
    conf: 0.7
    if:
      type: text
      substr: .path.isdir(

composite_rules:
  - id: python-os-path-isfile
    desc: Python os.path.isfile path test
    crit: component
    conf: 0.86
    any:
      - id: python-os-path-isfile-symbol
      - id: python-os-path-isfile-text

  - id: python-os-path-isdir
    desc: Python os.path.isdir path test
    crit: component
    conf: 0.86
    any:
      - id: python-os-path-isdir-symbol
      - id: python-os-path-isdir-text
