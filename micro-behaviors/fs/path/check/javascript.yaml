defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-exists-sync-call
    desc: JavaScript existsSync call
    crit: baseline
    conf: 0.75
    if:
      type: string_literal
      substr: existsSync

  - id: js-access-call
    desc: JavaScript access call
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: access

  - id: check-git-dir
    desc: Checks for .git directory
    crit: notable
    conf: 0.8
    if:
      type: ast
      language: javascript
      query: |-
        (call_expression
          function: (member_expression
            property: (property_identifier) @method)
          arguments: (arguments (string) @arg)
          (#match? @method "^(stat|lstat|access|exists)(Sync)?$")
          (#match? @arg "['\"]\\.git['\"]")
        )
