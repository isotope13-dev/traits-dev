defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-exists-sync-call
    desc: Calls existsSync() to check a filesystem path
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      kind: call
      regex: '(^|\.)existsSync$'

  - id: js-access-call
    desc: JavaScript access call
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: access

  - id: check-git-dir
    desc: Checks for .git directory
    crit: notable
    conf: 0.8
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.(^(stat|lstat|access|exists)(Sync)?$)$'
