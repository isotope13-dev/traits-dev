# Log File Paths
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [elf, shell, python]
traits:
  - id: log-var
    desc: Reference to sensitive Linux log files
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: "/var/log/(auth\\.log|secure|messages)"
