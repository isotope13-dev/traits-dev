defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: log-var
    desc: Reference to sensitive Linux log files
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /var/log/(auth\.log|secure|messages)
  - id: var-log-directory-text
    desc: System log directory text
    crit: notable
    conf: 0.82
    platforms: [unix]
    for: [binaries]
    if:
      type: text
      substr: /var/log
