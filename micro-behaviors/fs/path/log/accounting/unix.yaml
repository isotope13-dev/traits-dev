defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [c, text]
  crit: notable
  conf: 0.8

traits:
  - id: utmp-path
    desc: References utmp login accounting path
    if:
      type: string
      regex: "\"/var/(adm|log|run)/utmp\""

  - id: utmp-macro
    desc: References utmp login accounting macro
    if:
      type: string
      regex: "(_PATH_UTMP|UTMP_FILE)"

  - id: wtmp-path
    desc: References wtmp login history path
    if:
      type: string
      regex: "\"/var/(adm|log)/wtmp\""

  - id: wtmp-macro
    desc: References wtmp login history macro
    if:
      type: string
      regex: "(_PATH_WTMP|WTMP_FILE)"

  - id: lastlog-file
    desc: References lastlog login history file
    if:
      type: string
      regex: "(_PATH_LASTLOG|LASTLOG_FILE|\"/var/(adm|log)/lastlog\")"

  - id: pacct-file
    desc: References process accounting file
    if:
      type: string
      regex: "(ACCT_FILE|\"/var/adm/pacct\")"

  - id: utmpx-file
    desc: References utmpx login accounting file
    if:
      type: string
      regex: "(UTMPX_FILE|\"/var/adm/utmpx\")"

  - id: wtmpx-file
    desc: References wtmpx login history file
    if:
      type: string
      regex: "(WTMPX_FILE|\"/var/adm/wtmpx\")"

  - id: tty-device-prefix
    desc: Builds tty device path
    if:
      type: string
      exact: "strcpy(ttyn, \"/dev/\");"

composite_rules:
  - id: utmp-file
    desc: References utmp login accounting file
    crit: notable
    conf: 0.82
    any:
      - id: utmp-path
      - id: utmp-macro

  - id: wtmp-file
    desc: References wtmp login history file
    crit: notable
    conf: 0.82
    any:
      - id: wtmp-path
      - id: wtmp-macro

  - id: login-accounting-files
    desc: References Unix login accounting logs
    crit: notable
    conf: 0.86
    needs: 3
    any:
      - id: utmp-file
      - id: wtmp-file
      - id: lastlog-file
      - id: utmpx-file
      - id: wtmpx-file

  - id: unix-accounting-logs
    desc: References multiple Unix accounting logs
    crit: suspicious
    conf: 0.9
    needs: 4
    any:
      - id: utmp-file
      - id: wtmp-file
      - id: lastlog-file
      - id: pacct-file
      - id: utmpx-file
      - id: wtmpx-file
