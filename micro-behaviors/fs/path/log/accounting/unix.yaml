defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - c
  crit: notable
  conf: 0.8
traits:
  - id: utmp-path
    desc: References utmp login accounting path
    if:
      type: string_literal
      regex: '("/etc/utmp"|"/var/(adm|log|run)/utmp")'
  - id: utmp-macro
    desc: References utmp login accounting macro
    if:
      type: string_literal
      regex: (_PATH_UTMP|UTMP_FILE)
  - id: wtmp-path
    desc: References wtmp login history path
    if:
      type: string_literal
      regex: '("/usr/adm/wtmp"|"/var/(adm|log)/wtmp")'
  - id: wtmp-macro
    desc: References wtmp login history macro
    if:
      type: string_literal
      regex: (_PATH_WTMP|WTMP_FILE)
  - id: lastlog-file
    desc: References lastlog login history macro
    if:
      type: string_literal
      regex: (_PATH_LASTLOG|LASTLOG_FILE)
  - id: lastlog-path
    desc: References lastlog login history path
    if:
      type: string_literal
      exact: '"/usr/adm/lastlog"'
  - id: lastlog-path-var
    desc: References lastlog login history path
    if:
      type: string_literal
      regex: '"/var/(adm|log)/lastlog"'
  - id: pacct-file
    desc: References process accounting file
    if:
      type: string_literal
      regex: (ACCT_FILE|"/var/adm/pacct")
  - id: utmpx-file
    desc: References utmpx login accounting file
    if:
      type: string_literal
      regex: (UTMPX_FILE|"/var/adm/utmpx")
  - id: wtmpx-file
    desc: References wtmpx login history file
    if:
      type: string_literal
      regex: (WTMPX_FILE|"/var/adm/wtmpx")
  - id: tty-device-prefix
    desc: Builds tty device path
    if:
      type: text
      exact: strcpy(ttyn, "/dev/");
  - id: utmp-path-binary
    desc: References utmp login accounting path
    for: [elf]
    if:
      type: text
      regex: ^(/etc/utmp|/var/(adm|log|run)/utmp)$
  - id: wtmp-path-binary
    desc: References wtmp login history path
    for: [elf]
    if:
      type: text
      regex: ^(/usr/adm/wtmp|/var/(adm|log)/wtmp)$
  - id: btmp-path-binary
    desc: References btmp failed login path
    for: [elf]
    if:
      type: text
      regex: ^/var/(adm|log)/btmp$
  - id: utmp-path-xor
    desc: XOR-obfuscated utmp accounting path
    for: [elf]
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      encoding: xor
      regex: ^(/etc/utmp|/var/(adm|log|run)/utmp)$
  - id: wtmp-path-xor
    desc: XOR-obfuscated wtmp accounting path
    for: [elf]
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      encoding: xor
      regex: ^(/usr/adm/wtmp|/var/(adm|log)/wtmp)$
  - id: btmp-path-xor
    desc: XOR-obfuscated btmp failed login path
    for: [elf]
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      encoding: xor
      regex: ^/var/(adm|log)/btmp$
composite_rules:
  - id: utmp-file
    desc: References utmp login accounting file
    crit: notable
    conf: 0.82
    any:
      - id: utmp-path
      - id: utmp-macro
  - id: wtmp-file
    desc: References wtmp login history file
    crit: notable
    conf: 0.82
    any:
      - id: wtmp-path
      - id: wtmp-macro
  - id: login-accounting-files
    desc: References Unix login accounting logs
    crit: notable
    conf: 0.86
    needs: 3
    any:
      - id: utmp-file
      - id: wtmp-file
      - id: lastlog-file
      - id: lastlog-path
      - id: lastlog-path-var
      - id: utmpx-file
      - id: wtmpx-file
  - id: unix-accounting-logs
    desc: References multiple Unix accounting logs
    crit: suspicious
    conf: 0.9
    needs: 4
    any:
      - id: utmp-file
      - id: wtmp-file
      - id: lastlog-file
      - id: lastlog-path
      - id: lastlog-path-var
      - id: pacct-file
      - id: utmpx-file
      - id: wtmpx-file
  - id: login-accounting-files-binary
    desc: References login accounting file paths
    for: [elf]
    crit: notable
    conf: 0.88
    needs: 2
    any:
      - id: utmp-path-binary
      - id: wtmp-path-binary
      - id: btmp-path-binary
      - id: utmp-path-xor
      - id: wtmp-path-xor
      - id: btmp-path-xor
  - id: login-accounting-files-binary-xor
    desc: XOR-obfuscated login accounting paths
    for: [elf]
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: utmp-path-xor
      - id: wtmp-path-xor
      - id: btmp-path-xor
