# Node.js Path Manipulation Capabilities
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: path-join-dirname
    desc: path.join with __dirname
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: 'path\.join\s*\(\s*__dirname'
  - id: dirname-template-ref
    desc: Template literal references __dirname
    crit: baseline
    conf: 0.7
    size_max: 1000000
    if:
      type: text
      regex: '\$\{?__dirname\}?'
  - id: local-script-path
    desc: Local script path reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: '__dirname.{0,50}\.(js|mjs|cjs)[''"]'
  - id: node-package-manager-shim-name
    desc: Node package-manager filename in path.join
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: path.join
      arg:
        kind: string
        regex: '^(npm|npx|pnpm|yarn|node|git|python|pip)$'
  - id: script-dirname-ref
    desc: References script directory path
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/manifest::test-fixtures
    if:
      type: text
      substr: __dirname
