# Node.js Path Manipulation Capabilities
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: path-join-dirname
    desc: path.join with __dirname
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: 'path\.join\s*\(\s*__dirname'
  - id: local-script-path
    desc: Local script path reference
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: '__dirname.{0,50}\.(js|mjs|cjs)[''"]'
