# Windows path construction primitives
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: path-combine
    desc: Combine filesystem paths via Shlwapi
    crit: baseline
    conf: 0.78
    if:
      type: symbol
      exact: "PathCombineW"
  - id: path-append
    desc: Append child path via Shlwapi
    crit: baseline
    conf: 0.78
    if:
      type: symbol
      exact: "PathAppendW"
  - id: windows-system-path-join-format
    desc: Windows path join format string
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: "%s\\%s"
  - id: sprintf-format-api
    desc: sprintf string formatting API
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: "sprintf"
composite_rules:
  - id: construct-system-path
    desc: Construct system path from components
    crit: notable
    conf: 0.9
    all:
      - id: windows-system-path-join-format
      - id: sprintf-format-api
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
