defaults:
  for: [applescript]
  platforms: [macos]
  crit: component
  conf: 0.75

traits:
  - id: save-path-variable
    desc: Save-path variable name
    if:
      type: symbol
      regex: "(?i)^save_?path$"

  - id: output-path-variable
    desc: Output-path variable name
    conf: 0.7
    if:
      type: symbol
      regex: "(?i)^(output|dest)_?path$"
