defaults:
  platforms: [android, unix]
  for: [shell, javascript, elf]
  crit: notable
  conf: 0.9
traits:
  - id: android-su-root-binary-paths
    desc: Multiple Android su binary paths
    count_min: 3
    if:
      type: text
      regex: /((debug_ramdisk|sbin|su/bin|system/(sbin|bin|xbin))/su|magisk/\.core/bin/su)
