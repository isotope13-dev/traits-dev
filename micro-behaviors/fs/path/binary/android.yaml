defaults:
  platforms: [android, unix]
  for: [shell, javascript, elf]
  crit: notable
  conf: 0.9
traits:
- id: android-su-root-binary-paths--rx-1
  desc: Regex component marker
  crit: component
  count_min: 3
  if:
    type: text
    regex: /((debug_ramdisk|sbin)/su|magisk/\.core/bin/su)
  count_max: 1022193
- id: android-su-root-binary-paths--rx-2
  desc: Regex component marker
  crit: component
  count_min: 3
  if:
    type: text
    regex: /((su/bin|system/(sbin|bin))/su|magisk/\.core/bin/su)
  count_max: 1022194
- id: android-su-root-binary-paths--rx-3
  desc: Regex component marker
  crit: component
  count_min: 3
  if:
    type: text
    regex: /((su/bin|system/(xbin))/su|magisk/\.core/bin/su)
  count_max: 1022195
composite_rules:
- id: android-su-root-binary-paths
  desc: Multiple Android su binary paths
  crit: baseline
  conf: 1.0
  any:
  - id: android-su-root-binary-paths--rx-1
  - id: android-su-root-binary-paths--rx-2
  - id: android-su-root-binary-paths--rx-3
