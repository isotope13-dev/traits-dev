defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
    - python
traits:
  - id: binary-usr-sbin
    desc: Reference to key /usr/sbin daemon binaries
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /usr/sbin/(httpd|dropbear)\b
  - id: binary-usr-local
    desc: Reference to /usr/local binaries
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: /usr/local/(bin|sbin)/[\w\-]+
  - id: binary-bin-su
    desc: Reference to /bin/su
    crit: suspicious
    conf: 0.66
    if:
      type: text
      regex: /bin/su($|\s)
    not:
      - regex: suexec
