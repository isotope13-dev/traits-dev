defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: binary-usr-sbin
    desc: Reference to key /usr/sbin daemon binaries
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /usr/sbin/(httpd|dropbear)\b
  - id: binary-usr-local
    desc: Reference to /usr/local binaries
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: /usr/local/(bin|sbin)/[\w\-]+
  - id: usr-local-bin-dir
    desc: Reference to /usr/local/bin
    crit: baseline
    conf: 0.66
    for: [scripts, binaries, systemd]
    if:
      type: text
      substr: usr/local/bin
  - id: binary-bin-su
    desc: Reference to /bin/su
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /bin/su($|\s)
    not:
      - regex: suexec
