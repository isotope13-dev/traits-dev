defaults:
  platforms:
    - macos
    - ios
  crit: notable
  conf: 0.8
  for:
    - shell
    - python
    - javascript
    - applescript
    - macho
traits:
  - id: stickies-data
    desc: Reference to Apple Stickies data
    if:
      type: text
      regex: (?i)Library/Containers/com\.apple\.Stickies|Library/StickiesDatabase
  - id: keychain-data
    desc: Reference to Apple Keychain data
    if:
      type: text
      regex: (?i)(Library/)?Keychains
  - id: notes-data
    desc: Reference to Apple Notes data
    if:
      type: text
      regex: (?i)Library/Group Containers/group\.com\.apple\.notes
  - id: imessage-chat-db
    desc: Reference to iMessage chat.db
    if:
      type: text
      substr: Library/Messages/chat.db
  - id: apple-notes-store
    desc: Reference to Apple Notes store
    if:
      type: text
      regex: (?i)Library/.*?com\.apple\.notes/.*?NoteStore\.sqlite
  - id: safari-binary-cookies
    desc: Reference to Safari cookies
    if:
      type: text
      substr: Library/Cookies/Cookies.binarycookies
  - id: telegram-tdata-session
    desc: Reference to Telegram sessions
    if:
      type: text
      regex: (?i)Library/Application\s+Support/Telegram\s+Desktop/tdata
  - id: macos-login-keychain
    desc: Reference to login keychain
    if:
      type: text
      substr: Library/Keychains/login.keychain
  - id: alfred-clipboard-db
    desc: Reference to Alfred clipboard
    if:
      type: text
      substr: Library/Application Support/Alfred/Databases/clipboard.alfdb
  - id: ios-sms-db
    desc: Reference to iOS SMS database
    platforms:
      - ios
    for:
      - macho
    if:
      type: text
      substr: /private/var/mobile/Library/SMS/sms.db
  - id: ios-call-history-db
    desc: Reference to iOS call history
    platforms:
      - ios
    for:
      - macho
    if:
      type: text
      substr: /private/var/mobile/Library/CallHistoryDB/CallHistory.storedata
  - id: ios-address-book-db
    desc: Reference to iOS contacts database
    platforms:
      - ios
    for:
      - macho
    if:
      type: text
      substr: /private/var/mobile/Library/AddressBook/AddressBook.sqlitedb
