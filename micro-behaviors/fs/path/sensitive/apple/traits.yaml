defaults:
  platforms:
    - macos
    - ios
  crit: notable
  conf: 0.8
  for:
    - shell
    - python
    - javascript
    - applescript
    - macho
traits:
  - id: stickies-data
    desc: Reference to Apple Stickies data
    if:
      type: text
      regex: (?i)Library/Containers/com\.apple\.Stickies|Library/StickiesDatabase
  - id: keychain-data
    desc: Reference to Apple Keychain data
    if:
      type: text
      regex: (?i)(Library/)?Keychains
  - id: notes-data
    desc: Reference to Apple Notes data
    if:
      type: text
      regex: (?i)Library/Group Containers/group\.com\.apple\.notes
  - id: ios-sms-db
    desc: Reference to iOS SMS database
    platforms:
      - ios
    for:
      - macho
    if:
      type: text
      substr: /private/var/mobile/Library/SMS/sms.db
  - id: ios-call-history-db
    desc: Reference to iOS call history
    platforms:
      - ios
    for:
      - macho
    if:
      type: text
      substr: /private/var/mobile/Library/CallHistoryDB/CallHistory.storedata
  - id: ios-address-book-db
    desc: Reference to iOS contacts database
    platforms:
      - ios
    for:
      - macho
    if:
      type: text
      substr: /private/var/mobile/Library/AddressBook/AddressBook.sqlitedb
