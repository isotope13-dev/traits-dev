# OpenVPN / TLS client config & credential file references. Neutral path
# capabilities — VPN clients (openvpn), NetworkManager (nmcli/nmtui), editors,
# and git-lfs reference these names benignly. Credential-theft intent comes from
# composites that pair them with the ipsec.secrets/chap-secrets cluster.
defaults:
  platforms: [unix]
  for: [go, elf, c, cpp, objc, python]
traits:
  - id: vpn-tls-client-cert-refs
    desc: OpenVPN/TLS client cert config refs
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)openvpn|client\.crt|ca\.crt|\.ovpn'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: tls-client-key-path
    desc: TLS client.key file path
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: client.key
