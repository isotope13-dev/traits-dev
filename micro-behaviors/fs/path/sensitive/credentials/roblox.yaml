# Roblox cookie store file path
# The Roblox client persists the .ROBLOSECURITY session cookie in
# %LOCALAPPDATA%\Roblox\LocalStorage\robloxcookies.dat. Referencing that file
# is a credential-store path access used by Roblox session-cookie stealers.
defaults:
  platforms: [windows, macos]
  for: [scripts, source, binaries]
traits:
  - id: roblox-cookie-file
    desc: References Roblox cookie store file
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)robloxcookies\.dat|Roblox[/\\]+LocalStorage
