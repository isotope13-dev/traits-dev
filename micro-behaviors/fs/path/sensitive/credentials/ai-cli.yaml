defaults:
  platforms: [unix, windows]
  for: [scripts, binaries, javascript, typescript]
  attack: T1552.001
# Credential stores written by AI coding CLIs (provider API keys / OAuth
# tokens). Increasingly targeted by supply-chain malware that steals the
# victim's LLM-provider credentials. Path fact only — capability, not intent.
traits:
  - id: opencode-auth-credential
    desc: OpenCode CLI credential store
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \bopencode/auth\.json\b
  - id: ai-cli-share-auth-json
    desc: AI CLI credential store under share dir
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.local/share/[\w.-]{1,30}/auth\.json\b
