defaults:
  platforms: [unix, windows]
  for: [scripts, binaries, javascript, typescript]
  attack: T1552.001
# Credential stores written by AI coding CLIs (provider API keys / OAuth
# tokens). Increasingly targeted by supply-chain malware that steals the
# victim's LLM-provider credentials. Path fact only — capability, not intent.
traits:
  - id: opencode-auth-credential
    desc: OpenCode CLI credential store
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \bopencode/auth\.json\b
  - id: ai-cli-share-auth-json
    desc: AI CLI credential store under share dir
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.local/share/[\w.-]{1,30}/auth\.json\b

  - id: claude-cli-oauth-credentials-file
    desc: Claude CLI OAuth credential filename literal
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']\.credentials\.json["'']'

  - id: codex-auth-json
    desc: Codex OAuth credential store
    crit: notable
    conf: 0.92
    ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
    if:
      type: text
      regex: '\.codex[\\/]auth\.json|["'']\.codex["'']\s*/\s*["'']auth\.json'

  - id: codex-home-auth-json
    desc: Codex home auth JSON reference
    crit: notable
    conf: 0.9
    ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
    if:
      type: text
      regex: 'CODEX_HOME[\s\S]{0,80}auth\.json'
