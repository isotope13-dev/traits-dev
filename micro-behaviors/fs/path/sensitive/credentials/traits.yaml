defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [python, javascript, typescript, powershell, batch, pe, shell]
  crit: notable
  conf: 0.95
  attack: T1552.001
traits:
  - id: pyarrow-s3fs-module-context
    desc: PyArrow S3 module context
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: pyarrow._s3fs
  - id: syntax-bundle-context
    desc: Embedded syntax bundle/resource context
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: sublime-syntax
  - id: aws-credentials-dup
    desc: AWS credentials file path
    if:
      type: text
      regex: \.aws/credentials
    unless:
      - id: syntax-bundle-context
    downgrade:
      any:
        - id: pyarrow-s3fs-module-context
  - id: aws-config
    desc: AWS config file path
    if:
      type: text
      regex: \.aws/config
    unless:
      - id: syntax-bundle-context
    downgrade:
      any:
        - id: pyarrow-s3fs-module-context
  - id: gcloud-credentials
    desc: Google Cloud credentials path
    if:
      type: text
      regex: \.config/gcloud
  - id: azure-credentials
    desc: Azure credentials path
    if:
      type: text
      regex: \.azure/credentials
  - id: docker-config
    desc: Docker config.json path
    if:
      type: text
      regex: \.docker/config\.json
  - id: kube-config
    desc: Kubernetes config path
    crit: notable
    if:
      type: text
      substr: .kube/config
  - id: ssh-private-key
    desc: SSH private key path
    if:
      type: text
      regex: \.ssh/id_(rsa|dsa|ecdsa|ed25519)
    not:
      - substr: "$HOME/.ssh/"
    downgrade:
      any:
        - id: micro-behaviors/communications/ssh/connect::openssh
        - id: micro-behaviors/communications/ssh/client::libssh
        - id: micro-behaviors/communications/ssh/client::ssh-userauth
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - type: basename
          regex: ^ssh(-.+)?(\.exe)?$
        - type: text
          substr: safe_eval(
        - type: raw
          regex: '>>>\s+.*\.ssh/id_'
  - id: ssh-dir
    desc: .ssh directory path
    if:
      type: text
      regex: \.ssh/
    not:
      - substr: "$HOME/.ssh/"
      - regex: '\.ssh/config\b'
      - substr: ".ssh/known_hosts"
    unless:
      - type: raw
        regex: '\.ssh(?:/authorized_keys)? type=(dir|file)\b'
    downgrade:
      any:
        - id: syntax-bundle-context
        - id: micro-behaviors/communications/ssh/
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - type: basename
          regex: ^ssh(-.+)?(\.exe)?$
        - type: raw
          regex: '>>>\s+.*\.ssh/'
        - type: text
          regex: 'vagrant insecure public key'
  - id: git-credentials
    desc: Git credentials file
    crit: notable
    if:
      type: text
      regex: \.git-credentials
  - id: netrc
    desc: .netrc credentials file
    crit: notable
    if:
      type: text
      regex: ([\/\\\\]|~[\/\\\\])\.netrc\b
  - id: hidden-app-dotenv
    desc: Hidden app dotenv path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: (^|[/~])\.[A-Za-z0-9._-]{2,64}/\.env\b
composite_rules:
  - id: cloud-credentials
    desc: Cloud provider credential file paths
    crit: suspicious
    conf: 0.95
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::aws-credentials-dup
      - id: aws-config
      - id: gcloud-credentials
      - id: azure-credentials
    downgrade:
      any:
        - id: syntax-bundle-context
  - id: container-credentials
    desc: Container/orchestration credential paths
    crit: suspicious
    conf: 0.95
    any:
      - id: docker-config
      - id: kube-config
  - id: ssh-credentials
    desc: SSH credential file paths
    crit: suspicious
    conf: 0.95
    any:
      - id: ssh-private-key
      - id: ssh-dir
    downgrade:
      any:
        - id: syntax-bundle-context
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
