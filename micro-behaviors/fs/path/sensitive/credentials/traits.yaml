defaults:
  platforms:
    - unix
    - windows
  for: [binaries, scripts, python, java, class, kotlin, c, cpp]
  crit: notable
  conf: 0.95
  attack: T1552.001
traits:
  - id: credential-config-path-corpus
    desc: Multiple account database paths
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: '(^|["''])/[^"'']{0,60}/(Config|etc)/(accounts?|passwd)([./"'']|$)'
      case_insensitive: true
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: cargo-credentials-file
    desc: Cargo credentials file path reference
    conf: 0.9
    if:
      type: literal
      substr: .cargo/credentials

  - id: composer-auth-file
    desc: Composer auth file path reference
    conf: 0.9
    if:
      type: literal
      regex: '(\.composer|composer)/auth\.json'

  - id: gem-credentials-file
    desc: RubyGems credentials file path reference
    conf: 0.9
    if:
      type: literal
      substr: .gem/credentials

  - id: secret-token-file-path
    desc: References a secret or token file path
    crit: notable
    conf: 0.75
    if:
      type: literal
      # Require a path separator.  Bare names such as `apt.token` are
      # cookie/storage keys or configuration fields, not file paths.
      regex: '[/\\][\w.-]*\.(secret|token)\b'

  - id: pem-file-extension-reference
    desc: References a PEM certificate or key file
    conf: 0.75
    attack: T1552.004
    if:
      type: string_literal
      regex: '\.pem\b|["'']\.pem["'']'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/crypto/certificate/usage
      - id: well-known/app/crunr::crunr-key-path
      - id: metadata/package/config::secret-file-classifier-function
      - id: micro-behaviors/communications/http/services/aws-ec2::ec2-create-key-pair
      # UI file-type allowlists are not sensitive-file references. Auth0's
      # upload controls use `.pem` as a permitted certificate format.
      - type: text
        regex: '(?i)\b(?:accept|FileUpload)\b[^\n]{0,200}\.pem'

  - id: js-authorized-keys-path-variable
    desc: JavaScript stores an authorized_keys path
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: "(const|let|var)\\s+\\w+\\s*=.{0,100}authorized_keys"
    unless:
      - id: well-known/tool/development/runspec-console/
      - type: path
        regex: '(^|[^A-Za-z0-9_])runspec_console([\\/]|-|$)'
  - id: js-ssh-homedir-path
    desc: JavaScript builds the user SSH directory path
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: path.join(os.homedir(), '.ssh')
  - id: pyarrow-s3fs-module-context
    desc: PyArrow S3 module context
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: pyarrow._s3fs
  - id: syntax-bundle-context
    desc: Embedded syntax bundle/resource context
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: sublime-syntax
  - id: aws-config
    desc: AWS config file path
    if:
      type: text
      regex: \.aws/config
    unless:
      - id: syntax-bundle-context
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
    downgrade:
      any:
        - id: pyarrow-s3fs-module-context
  - id: gcloud-credentials
    desc: Google Cloud credentials path
    if:
      type: text
      regex: \.config/gcloud
    unless:
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
  - id: azure-credentials
    desc: Azure credentials path
    if:
      type: text
      regex: \.azure/credentials
  - id: docker-config
    desc: Docker config.json path
    if:
      type: text
      regex: \.docker/config\.json
    unless:
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  - id: podman-containers-auth
    # Podman/Buildah/Skopeo registry credentials (the Docker config.json
    # equivalent). Lives at ~/.config/containers/auth.json or
    # $XDG_RUNTIME_DIR/containers/auth.json — the path is registry-auth specific.
    desc: Podman containers auth.json path
    if:
      type: text
      regex: containers/auth\.json
  - id: container-run-secrets
    desc: Container runtime secrets path
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      regex: '/run/secrets(/|$)'
    downgrade:
      any:
        - id: micro-behaviors/os/container/runtime::secrets-path
        - id: micro-behaviors/os/container/runtime/
        - id: well-known/tool/sysadmin/container/
  - id: kube-config
    desc: Kubernetes config path
    crit: notable
    if:
      type: text
      substr: .kube/config
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
    downgrade:
      any:
        - id: well-known/tool/sysadmin/container/
  # Directory-listing stealers match bare key filenames (`f === 'id_rsa'`)
  # against a readdir of ~/.ssh, so the slash-joined path matcher below never
  # sees `.ssh/id_rsa`. Two distinct private-key filename constants together is
  # the enumeration fingerprint; ssh client tooling is carved out via downgrade.
  - id: ssh-private-key-filename-ed25519
    desc: id_ed25519 filename constant
    crit: component
    for: [binaries, scripts, java, class, kotlin, c, cpp, objc, rust, zig]
    if:
      type: text
      substr: id_ed25519
    unless:
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  - id: ssh-private-key-filename-ecdsa
    desc: id_ecdsa filename constant
    crit: component
    for: [binaries, scripts, java, class, kotlin, c, cpp, objc, rust, zig]
    if:
      type: text
      substr: id_ecdsa
  - id: ssh-private-key-filename-rsa
    desc: id_rsa filename constant
    crit: component
    for: [javascript, typescript, python, ruby, php, perl, shell, powershell, binaries, java, class, kotlin, c, cpp, rust, zig]
    if:
      type: text
      word: id_rsa
    unless:
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  - id: ssh-private-key
    desc: SSH private key path
    for: [binaries, scripts, java, class, kotlin, c, cpp, objc, rust, zig]
    if:
      type: text
      regex: '\.ssh/id_(rsa|dsa|ecdsa|ed25519)[^.\w-]'
    not:
      - substr: "$HOME/.ssh/"
    downgrade:
      any:
        - id: micro-behaviors/communications/ssh/connect::openssh
        - id: micro-behaviors/communications/ssh/client::libssh
        - id: micro-behaviors/communications/ssh/client::ssh-userauth
        - id: micro-behaviors/process/interpreter/vm/
        - type: basename
          regex: '^ssh(-.+)?(\.exe)?$'
        - type: text
          substr: safe_eval(
        - type: text
          regex: '>>>\s+.*\.ssh/id_'
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context

  - id: shell-ssh-private-key-path-pair
    desc: Shell references two SSH key paths
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '\.ssh/id_rsa[\s\S]{0,260}\.ssh/id_ed25519|\.ssh/id_ed25519[\s\S]{0,260}\.ssh/id_rsa'

  - id: ssh-private-key-existence-check
    desc: Checks whether an SSH key exists
    crit: notable
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '-f\s+[^\n]{0,30}id_(rsa|dsa|ecdsa|ed25519)'
  - id: unix-shadow-root-ssh-paths
    desc: Unix shadow and root SSH paths
    crit: suspicious
    unless:
    - id: well-known/tool/offensive/pentestkit/
    - id: well-known/tool/offensive/sqlmap::source-tree-member
    conf: 0.92
    platforms: [unix]
    for: [source, scripts, binaries]
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,260}/root/\.ssh/id_rsa'
  - id: hidden-temp-password-path
    desc: Hidden temp password path
    crit: notable
    conf: 0.88
    for: [binaries, scripts, c, cpp, objc, rust, zig]
    if:
      type: text
      substr: /tmp/.password
  - id: hidden-temp-token-path
    desc: Hidden temp token path
    crit: notable
    conf: 0.88
    for: [binaries, scripts, c, cpp, objc, rust, zig]
    if:
      type: text
      substr: /tmp/.token
  - id: hidden-temp-secretish-path
    desc: Hidden temp secret-like path
    crit: notable
    conf: 0.88
    for: [binaries, scripts, c, cpp, objc, rust, zig]
    if:
      type: text
      regex: '/tmp/\.(secret|key|credentials|auth)\b'
  # The ssh-copy-id utility installs the user's public key into authorized_keys
  # by design. well-known/tool/sysadmin/ssh-copy-id::ssh-copy-id-utility only matches older
  # vintages (its usage-string substr predates the -s/-x options); gate here on
  # the basename plus the distinctive manpage/purpose comment shared by all
  # versions so a renamed dropper cannot inherit the exclusion.
  - id: ssh-copy-id-comment-marker
    desc: ssh-copy-id manpage/purpose comment
    crit: baseline
    conf: 1.0
    for: [shell]
    platforms: [unix]
    if:
      type: text
      regex: 'ssh-copy-id\(1\) man page|install your public key\(s\) on a remote machine'
  # rrsync names .ssh/authorized_keys only in its descriptive comment about
  # restricting rsync to a subdirectory declared there; gate on basename plus
  # that comment so an arbitrary binary cannot borrow the exclusion.
  - id: rrsync-basename-marker
    desc: rrsync basename
    crit: baseline
    conf: 1.0
    for: [shell, python, pyc, elf]
    platforms: [unix]
    if:
      type: basename
      exact: rrsync
  - id: rrsync-comment-marker
    desc: rrsync authorized_keys restriction comment
    crit: baseline
    conf: 1.0
    for: [shell, python, pyc, elf]
    platforms: [unix]
    if:
      type: text
      substr: 'Restricts rsync to subdirectory declared in .ssh/authorized_keys'
  - id: authorized-keys-file-metadata
    desc: authorized_keys file metadata
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: 'authorized_keys type=file uid='
  - id: ssh-public-key-api-context
    desc: SSH public key API context
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "SshPublicKey("
  # A bare authorized_keys path reference is a credential-path capability (cf.
  # ssh-dir, pypirc-credentials, both notable) — legit SSH/account tools (sshd,
  # userdbctl, systemd-vmspawn, eza) reference it. Theft intent comes from
  # composites; keep it notable, not standalone-suspicious.
  - id: ssh-authorized-keys
    desc: SSH authorized_keys path
    crit: notable
    conf: 0.6
    attack: T1552.004
    for: [binaries, scripts, java, class, kotlin, c, cpp, objc, rust, zig]
    if:
      type: text
      substr: authorized_keys
    unless:
      - id: micro-behaviors/fs/path/sensitive/credentials/
    downgrade:
      any:
        - id: micro-behaviors/communications/ssh/connect::openssh
  - id: ssh-dir
    desc: .ssh directory path
    crit: notable
    if:
      type: text
      regex: \.ssh/
    not:
      - substr: "$HOME/.ssh/"
      - substr: ".ssh/authorized_keys"
      - regex: '\.ssh/config\b'
      - substr: ".ssh/known_hosts"
      - regex: 'vagrant insecure public key'
    unless:
      - type: text
        regex: '\.ssh(/authorized_keys)? type=(dir|file)\b'
    downgrade:
      any:
        - id: syntax-bundle-context
        - id: well-known/tool/sysadmin/kubernetes/iac/
        - id: micro-behaviors/communications/ssh/
        - id: micro-behaviors/process/interpreter/vm/
        - type: basename
          regex: '^ssh(-.+)?(\.exe)?$'
        - type: text
          regex: '>>>\s+.*\.ssh/'
  # Reading known_hosts is a sensitive-path capability, but the path alone
  # does not establish host harvesting or lateral movement intent.
  - id: ssh-known-hosts-read-command
    desc: Shell command reads the SSH known_hosts file
    crit: notable
    conf: 0.9
    for: [shell]
    platforms: [unix]
    if:
      type: text
      regex: '(?i)\b(cat|grep|awk)\s+[^\n]{0,80}/\.ssh/known_hosts\b'
  - id: dropbear-key-path
    desc: Dropbear host-key path reference
    crit: notable
    conf: 0.9
    for: [scripts, binaries, pyc]
    platforms: [unix, openwrt]
    if:
      type: text
      regex: '/etc/dropbear/(dropbear_|id_|ssh_host_)[A-Za-z0-9_-]{0,40}'
    unless:
      - id: well-known/app/dropbear::server-binary
  - id: git-credentials
    desc: Git credentials file
    crit: notable
    if:
      type: text
      regex: \.git-credentials
    downgrade:
      all:
        - id: metadata/signed/developer::johannes-schindelin
        - id: metadata/signed/certificate/identity::pe-signature-verified
  - id: netrc
    desc: .netrc credentials file
    crit: notable
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - id: metadata/package/testing/presence/harness/
        - id: metadata/binary/metrics/text-density::shell-high-import-density
    unless:
      - id: micro-behaviors/process/interpreter/vm/
      - id: well-known/tool/detection/sast/
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
    if:
      type: text
      regex: (^|[\/\\\\]|~[\/\\\\])\.netrc\b
  - id: hidden-app-dotenv
    desc: Hidden app dotenv path
    crit: notable
    conf: 0.86
    downgrade:
      any:
        - id: well-known/app/nitin-ai
    if:
      type: string_literal
      regex: (^|[/~])\.[A-Za-z0-9._-]{2,64}/\.env$
  - id: dotenv-filename-literal
    desc: References a potentially sensitive .env file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])\.env\b
    unless:
      - id: metadata/file/format::sourcemap-sources-content
  - id: dotenv-filename-encoded
    desc: Decoded dotenv filename
    crit: component
    conf: 0.8
    for: [javascript, typescript, python, go, rust, java, csharp, powershell]
    if:
      type: encoded
      exact: .env
  - id: authorized-keys-token
    desc: "SSH authorized_keys file reference"
    crit: baseline
    conf: 0.9
    if:
      id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  - id: authorized-keys-public-key-forward
    desc: authorized_keys before public_key doc
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)authorized_keys.{0,160}public_key'
  - id: authorized-keys-public-key-reverse
    desc: public_key before authorized_keys doc
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)public_key.{0,160}authorized_keys'
  - id: authorized-keys-array-forward
    desc: authorized_keys before array doc
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)authorized_keys.{0,160}must be an array'
  - id: authorized-keys-array-reverse
    desc: array text before authorized_keys doc
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)must be an array.{0,160}authorized_keys'
  - id: ssh-public-keys-container-doc
    desc: SSH public keys container doc
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '(?i)ssh public keys? to put in the container'
  # Editors (Vim/Neovim) list .npmrc in their filetype-detection table mapping
  # it to the "dosini" INI syntax, alongside pip.conf and many other config
  # names. That co-occurring pair is the editor table, not credential access.
  - id: editor-filetype-dosini-marker
    desc: Vim dosini filetype identifier
    crit: baseline
    conf: 1.0
    if:
      type: text
      exact: dosini
  - id: editor-filetype-pipconf-marker
    desc: Vim filetype-table pip.conf entry
    crit: baseline
    conf: 1.0
    if:
      type: text
      exact: pip.conf
  # Consistent with pypirc-credentials (notable): a .npmrc path reference is a
  # credential-file capability, not standalone-suspicious (editors/JS tooling like
  # nvim reference it). Theft intent comes from composites.
  - id: npmrc-credentials
    desc: NPM registry credentials file
    crit: notable
    if:
      type: text
      regex: (^|[/~\\\\])\.npmrc\b
    unless:
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  - id: pypirc-credentials
    desc: PyPI upload credentials file
    crit: notable
    unless:
      - id: micro-behaviors/process/interpreter/vm/
      - id: well-known/tool/detection/sast/
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
    if:
      type: text
      regex: (^|[/~\\\\])\.pypirc\b
  - id: vault-token-file
    desc: HashiCorp Vault token file
    crit: notable
    if:
      type: text
      regex: (^|[/~\\\\])\.vault-token\b
    unless:
      - type: basename
        exact: ksops
  - id: claude-channels-token-file
    desc: Claude channels token file
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)(^|[/~\\\\])\.claude[/\\\\]channels[/\\\\]\.token\b
  - id: terraform-credentials
    desc: Terraform Cloud credentials file
    crit: suspicious
    if:
      type: text
      regex: \.terraform\.d/credentials\.tfrc\.json
  - id: gh-cli-hosts
    desc: GitHub CLI authentication hosts file
    crit: notable
    if:
      type: text
      regex: \.config/gh/hosts\.yml
    unless:
      - id: credential-store-documentation-context
      - id: well-known/tool/detection/
      - id: well-known/app/calvyn-code
  - id: credential-store-documentation-context
    desc: Credential store documentation context
    crit: baseline
    conf: 0.86
    if:
      type: text
      regex: 'plaintext-under-home model|file is never committed|must not be copied across machines'
  - id: api-key-path-fragment
    desc: API key filename or path fragment
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)([/~\\\\])[^\\s''"`]{0,80}(api[_-]?key|apikey)[^\\s''"`]{0,80}($|[/\\\\.])'
    # Do not interpret a slash-separated list of uppercase environment
    # variable names (for example, FOO_API_KEY/BAR_API_KEY in help text) as a
    # filesystem path.  Lowercase and mixed-case path names remain covered.
    not:
      - regex: '/[A-Z][A-Z0-9_]{0,80}API[_-]?KEY'
  - id: private-key-suffix
    desc: Private key file suffix
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: '(^|[/~\\])[^/\\\s]{1,120}\.(key|priv)$'
  - id: private-pem-suffix
    desc: Private PEM file suffix
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: '(^|[/~\\])[^/\\\s]*(private|secret|key)[^/\\\s]*\.pem$'
  - id: keystore-suffix
    desc: Keystore file suffix
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\.(p12|pfx|p8)\b'
  - id: private-keys-dir-segment
    desc: Secret key directory segment
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '/(private|secret|secrets|keys)/'
  - id: hidden-app-key-file
    desc: Hidden app encryption key file
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '[/~\\\\]\.[A-Za-z0-9._-]{2,64}/[A-Za-z0-9._-]{2,64}\.(key|pem)\b'
    not:
      - regex: '[/~\\\\]\.ssh/'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/llm-scanner/
  - id: gitconfig-file
    desc: Git global configuration file
    crit: notable
    if:
      type: text
      regex: (^|[/~\\\\])\.gitconfig\b
  - id: docker-config-path-components
    desc: Docker config path components
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'path\.join\s*\([^)]{0,160}["'']\.docker["''][^)]{0,80}["'']config\.json["'']'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
      - id: well-known/tool/detection/security-scanner/
  - id: kube-config-path-components
    desc: Kubernetes config path components
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'path\.join\s*\([^)]{0,160}["'']\.kube["''][^)]{0,80}["'']config["'']'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/tool/sysadmin/container/
composite_rules:
  - id: package-or-netrc-credential-file
    desc: Package client credential file reference
    crit: notable
    conf: 0.9
    any:
      - id: npmrc-credentials
      - id: pypirc-credentials
      - id: netrc

  # Two distinct SSH private-key filename constants together is the readdir-based
  # key-enumeration fingerprint that the slash-joined ssh-private-key path
  # matcher misses. Any pair drawn from {rsa, ed25519, ecdsa} is the tell —
  # rsa+ed25519 is the most common stealer target list. ssh client tooling is
  # carved out via downgrade.
  - id: ssh-private-key-filename-enum
    desc: Enumerates SSH private key filenames
    crit: notable
    conf: 0.85
    any:
      - id: ssh-private-key-filename-ed25519
      - id: ssh-private-key-filename-ecdsa
      - id: ssh-private-key-filename-rsa
    needs: 2
    unless:
      - id: metadata/package/config::sensitive-file-exclusion-list
      - id: well-known/tool/detection/security-scanner::push-guard-defensive-context
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
    downgrade:
      any:
        - id: micro-behaviors/communications/ssh/connect::openssh
        - id: micro-behaviors/communications/ssh/client::libssh
        - type: basename
          regex: '^ssh(-.+)?(\.exe)?$'
  - id: ssh-copy-id-tool-context
    desc: Legitimate ssh-copy-id utility
    crit: baseline
    conf: 1.0
    for: [shell]
    platforms: [unix]
    all:
      - id: well-known/tool/sysadmin/ssh-copy-id::ssh-copy-id-basename
      - id: ssh-copy-id-comment-marker
  - id: rrsync-restrict-comment-context
    desc: Legitimate rrsync wrapper
    crit: baseline
    conf: 1.0
    for: [scripts, binaries, pyc]
    platforms: [unix]
    all:
      - id: rrsync-basename-marker
      - id: rrsync-comment-marker
  - id: editor-filetype-detect-context
    desc: Editor filetype table context
    crit: baseline
    conf: 1.0
    all:
      - id: editor-filetype-dosini-marker
      - id: editor-filetype-pipconf-marker
  - id: ssh-authorized-keys-benign-context
    desc: authorized_keys benign context
    crit: baseline
    conf: 0.95
    any:
      - id: authorized-keys-file-metadata
      - id: authorized-keys-config-field
      - id: well-known/tool/sysadmin/ssh-copy-id::ssh-copy-id-utility
      - id: ssh-copy-id-tool-context
      - id: rrsync-restrict-comment-context
      # ai-guardrail-context supersedes llm-scanner-context (includes it) and also
      # covers AI-agent security scanners listing authorized_keys as a signature.
      - id: well-known/tool/detection/ai-guardrail::ai-guardrail-context
      - id: ssh-public-key-api-context
      - id: well-known/tool/detection/agent-sentry::nhi-auditor-context
      - id: editor-filetype-detect-context
  - id: authorized-keys-config-doc
    desc: authorized_keys documentation context
    crit: baseline
    conf: 0.9
    any:
      - id: authorized-keys-public-key-doc
      - id: authorized-keys-array-doc
      - id: ssh-public-keys-container-doc
  - id: authorized-keys-public-key-doc
    desc: authorized_keys public_key docs
    crit: baseline
    conf: 0.9
    any:
      - id: authorized-keys-public-key-forward
      - id: authorized-keys-public-key-reverse
  - id: authorized-keys-array-doc
    desc: authorized_keys array docs
    crit: baseline
    conf: 0.9
    any:
      - id: authorized-keys-array-forward
      - id: authorized-keys-array-reverse
  - id: authorized-keys-config-field
    desc: authorized_keys configuration field
    crit: baseline
    conf: 0.9
    all:
      - id: authorized-keys-token
      - id: authorized-keys-config-doc
  - id: cloud-credentials
    desc: Cloud provider credential file paths
    crit: notable
    conf: 0.95
    any:
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials-path-components
      - id: aws-config
      - id: gcloud-credentials
      - id: azure-credentials
    unless:
      - id: well-known/app/moodle-stubs/
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/sysadmin/kubernetes/minikube
      - id: well-known/tool/detection/
      - id: well-known/tool/dual-use/shadowsocks-libev::shadowsocks-libev-source
      - id: well-known/app/aws-vault/
      - id: well-known/tool/sysadmin/cloud/azcopy::azcopy-tool
      - id: well-known/app/gitaly::go-module-path
    downgrade:
      any:
        - id: syntax-bundle-context
  - id: container-credentials
    desc: Container/orchestration credential paths
    crit: suspicious
    conf: 0.95
    unless:
      # Unit tests intentionally enumerate credential paths to verify the
      # deny gate; they do not read or transmit those credentials.
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    any:
      - id: docker-config
      - id: docker-config-path-components
      - id: container-run-secrets
    downgrade:
      any:
        - id: micro-behaviors/os/container/runtime/
        - id: well-known/tool/sysadmin/container/
        - id: well-known/tool/sysadmin/kubernetes/iac/
        - id: well-known/tool/development/dagdotdev/
        - id: well-known/app/kubeflow-community::notebook-scripts
        - id: well-known/tool/dual-use/shadowsocks-libev::shadowsocks-libev-source
  - id: orchestration-credentials
    desc: Orchestration credential paths
    crit: notable
    conf: 0.94
    any:
      - id: kube-config
      - id: kube-config-path-components
    unless:
      - id: well-known/lib/pyaigis/
  # Referencing an SSH credential path is a sensitive-path file-access
  # capability (deploy/provisioning scripts and ssh tooling reference
  # ~/.ssh routinely). Notable as a capability; credential-theft intent is
  # inferred by objectives composites that combine it with reads + exfil.
  - id: ssh-credentials
    desc: SSH credential file paths
    crit: notable
    conf: 0.95
    any:
      - id: ssh-private-key
      - id: ssh-dir
    unless:
      - id: well-known/lib/pyaigis/
  - id: hidden-temp-secret-path
    desc: Hidden temp secret path
    crit: notable
    conf: 0.9
    any:
      - id: hidden-temp-password-path
      - id: hidden-temp-token-path
      - id: hidden-temp-secretish-path
    downgrade:
      any:
        - id: syntax-bundle-context
        - id: micro-behaviors/process/interpreter/vm/
  - id: local-app-credentials
    desc: Local app credential files
    crit: notable
    conf: 0.86
    any:
      - id: hidden-app-config-api-key
      - id: hidden-app-key-file
  - id: hidden-app-config-api-key
    desc: References an API key in hidden config
    crit: notable
    conf: 0.84
    all:
      - id: micro-behaviors/fs/path/application/config::hidden-app-config-file
      - id: micro-behaviors/data/parse/vocabulary::credential-field
    near_bytes: 1000
