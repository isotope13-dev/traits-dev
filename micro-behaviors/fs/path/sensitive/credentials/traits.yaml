defaults:
  crit: suspicious
  conf: 0.95
  attack: T1552.001
traits:
  - id: pyarrow-s3fs-module-context
    desc: PyArrow S3 module context
    crit: component
    conf: 1.0
    for:
      - all
    if:
      type: string
      substr: pyarrow._s3fs
  - id: aws-credentials-dup
    desc: AWS credentials file path
    for:
      - all
    if:
      type: string
      regex: \.aws/credentials
    downgrade:
      any:
        - id: pyarrow-s3fs-module-context
  - id: aws-config
    desc: AWS config file path
    for:
      - all
    if:
      type: string
      regex: \.aws/config
    downgrade:
      any:
        - id: pyarrow-s3fs-module-context
  - id: gcloud-credentials
    desc: Google Cloud credentials path
    for:
      - all
    if:
      type: string
      regex: \.config/gcloud
  - id: azure-credentials
    desc: Azure credentials path
    for:
      - all
    if:
      type: string
      regex: \.azure/credentials
  - id: docker-config
    desc: Docker config.json path
    for:
      - all
    if:
      type: string
      regex: \.docker/config\.json
  - id: kube-config
    desc: Kubernetes config path
    for:
      - all
    if:
      type: string
      regex: \.kube/config
  - id: ssh-private-key
    desc: SSH private key path
    for:
      - all
    if:
      type: string
      regex: \.ssh/id_(rsa|dsa|ecdsa|ed25519)
  - id: ssh-dir
    desc: .ssh directory path
    for:
      - all
    if:
      type: string
      regex: \.ssh/
  - id: git-credentials
    desc: Git credentials file
    crit: notable
    for:
      - all
    if:
      type: string
      regex: \.git-credentials
  - id: netrc
    desc: .netrc credentials file
    for:
      - all
    if:
      type: string
      regex: \.netrc
composite_rules:
  - id: cloud-credentials
    desc: Cloud provider credential file paths
    crit: suspicious
    conf: 0.95
    attack: T1552.001
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::aws-credentials-dup
      - id: aws-config
      - id: gcloud-credentials
      - id: azure-credentials
  - id: container-credentials
    desc: Container/orchestration credential paths
    crit: suspicious
    conf: 0.95
    attack: T1552.001
    any:
      - id: docker-config
      - id: kube-config
  - id: ssh-credentials
    desc: SSH credential file paths
    crit: suspicious
    conf: 0.95
    attack: T1552.001
    any:
      - id: ssh-private-key
      - id: ssh-dir
