defaults:
  platforms: [unix, windows]
  for: [binaries, scripts, source]

traits:
  - id: master-key-file
    desc: Master key credential file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])master\.key\b
  - id: secrets-json-file
    desc: Secrets JSON credential file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])secrets\.json\b
  - id: production-key-file
    desc: Production key credential file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])production\.key\b
  - id: token-text-file
    desc: Token credential text file
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (^|[/~\\\\])token\.txt\b
  - id: api-key-text-file
    desc: API key credential text file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])api_key\.txt\b
  - id: seed-text-file
    desc: Seed credential text file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])seed\.txt\b
  - id: phrase-text-file
    desc: Recovery phrase credential text file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])phrase\.txt\b
  - id: mnemonic-text-file
    desc: Mnemonic credential text file
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (^|[/~\\\\])mnemonic\.txt\b
  - id: credentials-json-file
    desc: References a credentials.json file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])credentials\.json\b
  - id: recovery-text-file
    desc: Recovery credential text file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (^|[/~\\\\])recovery\.txt\b
