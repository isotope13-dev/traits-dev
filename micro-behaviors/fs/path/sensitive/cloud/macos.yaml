defaults:
  platforms: [macos]
  for: [scripts, binaries]
traits:
  - id: aws-credentials
    desc: Reference to AWS credentials
    crit: suspicious
    conf: 0.8
    mbc: T1552.005
    attack: T1552.005
    if:
      type: text
      substr: .aws/credentials
    unless:
      - id: metadata/file/text/catalog::neovim-filetype-registry
      - id: well-known/lib/aws-sdk-ruby
