defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1552.005
  mbc: T1552.005
traits:
  - id: aws-credentials
    desc: Reference to ~/.aws/credentials path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\.aws[/\\]credentials'
    unless:
      - id: metadata/file/text/catalog::neovim-filetype-registry
      - id: well-known/lib/aws-sdk-ruby
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/fs/path/sensitive/credentials::syntax-bundle-context
    downgrade:
      any:
        - id: micro-behaviors/fs/path/sensitive/credentials::pyarrow-s3fs-module-context
