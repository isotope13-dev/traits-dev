defaults:
  platforms: [unix, windows]
  for: [scripts, binaries, java, class, c, cpp]
  attack: T1552.005
  mbc: T1552.005
traits:
  - id: aws-credentials
    for: [scripts, c, cpp, go, rust]
    desc: Reference to ~/.aws/credentials path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\.aws[/\\]credentials'
    unless:
      - id: metadata/file/text/catalog::neovim-filetype-registry
      - id: well-known/lib/aws-sdk-ruby
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/fs/path/sensitive/credentials::syntax-bundle-context
    downgrade:
      any:
        - id: micro-behaviors/fs/path/sensitive/credentials::pyarrow-s3fs-module-context
  - id: aws-credentials-path-components
    desc: AWS credentials path components
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: 'path\.join\s*\([^)]{0,160}["'']\.aws["''][^)]{0,80}["'']credentials["'']'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
