defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: leveldb-ref
    desc: LevelDB storage reference
    crit: notable
    conf: 0.7
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      substr: leveldb
    not:
      - regex: disabled-by-default-memory-infra
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking::chromium-junk-strings
  - id: local-storage-ref
    desc: Local Storage directory reference
    crit: notable
    conf: 0.7
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      regex: (?i)[/\\\\]local storage[/\\\\]
