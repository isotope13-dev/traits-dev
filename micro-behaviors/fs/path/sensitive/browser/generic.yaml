defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: leveldb-ref
    desc: LevelDB storage reference
    crit: notable
    conf: 0.7
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      substr: leveldb
    not:
      - regex: disabled-by-default-memory-infra
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking/
  - id: local-storage-ref
    desc: Local Storage directory reference
    crit: notable
    conf: 0.7
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      regex: (?i)[/\\\\]local storage[/\\\\]
  - id: chromium-leveldb-local-storage
    desc: Chromium Local Storage LevelDB path
    crit: notable
    conf: 0.86
    ref: sha256:6f3972835d9ebdf69f562a91e68091769d80de62467e6c129d53f810de7f539a
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      regex: (?i)([/\\\\]local storage[/\\\\]leveldb\b|local storage.{0,80}leveldb)
