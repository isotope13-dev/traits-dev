# Browser Storage APIs - JavaScript
# Web Storage API and IndexedDB access
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: localstorage-get
    desc: Browser localStorage read access
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: localStorage.getItem(
  - id: localstorage-set
    desc: Browser localStorage write access
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: localStorage.setItem(
  - id: session-storage-access
    desc: Browser sessionStorage access
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: sessionStorage
  - id: browser-storage-getitem
    desc: Browser storage getItem call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \b(localStorage|sessionStorage)\.getItem\b
  - id: browser-storage-setitem
    desc: Browser storage setItem call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \b(localStorage|sessionStorage)\.setItem\b
  - id: browser-local-storage-access
    desc: Browser localStorage access
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: localStorage
  - id: indexeddb
    desc: Browser IndexedDB access
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: indexedDB.open(
  - id: indexeddb-note-store
    desc: Browser IndexedDB note store
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: indexedDB\.open\(.{0,80}(notesDatabase|tnotesDatabase|promptsDatabase)
composite_rules:
  - id: browser-storage-persistence
    desc: Persists data in browser storage
    crit: notable
    conf: 0.8
    all:
      - id: browser-storage-getitem
      - id: browser-storage-setitem
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
