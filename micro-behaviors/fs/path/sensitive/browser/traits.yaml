defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.9
  attack: T1555.003
traits:
  - id: firefox-cookies
    desc: Firefox cookies database
    if:
      type: text
      substr: moz_cookies
  - id: chrome-cookies-path-1
    desc: Chrome cookies database path variant 1
    if:
      type: text
      regex: Chrome/.{0,50}Cookies
  - id: chrome-cookies-path-2
    desc: Chrome cookies database path variant 2
    if:
      type: text
      regex: Google/Chrome/.{0,50}Cookies
  - id: chrome-cookies-path-3
    desc: Chrome cookies database path variant 3
    if:
      type: text
      regex: Chromium/.{0,50}Cookies
  - id: chrome-cookies-path-4
    desc: Chrome cookies database path variant 4
    if:
      type: text
      regex: \.config/chromium/.{0,50}Cookies
  - id: chromium-network-cookies-path
    desc: Chromium Network Cookies database path
    conf: 0.86
    if:
      type: text
      regex: '(?i)[/\\]Network[/\\]Cookies([^A-Za-z0-9_]|$)'
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
  - id: browser-cookies-file-path
    desc: Browser Cookies database file path
    conf: 0.8
    if:
      type: text
      regex: '[/\\]Cookies(\.|\b)|[/\\]cookies\.sqlite\b'
    unless:
      - type: text
        substr: stng::xor::classify
      - id: metadata/library/data::overwolf-vendor-string
  - id: chrome-safe-storage
    desc: Chrome safe storage
    if:
      type: text
      regex: Chrome.{0,50}Safe Storage
  - id: firefox-logins
    desc: Firefox logins database
    if:
      type: text
      substr: moz_logins
  - id: firefox-formhistory
    desc: Firefox form history database
    if:
      type: text
      substr: moz_formhistory
  - id: browser-credit-cards
    desc: Browser credit card database
    if:
      type: text
      substr: credit_cards
  - id: chromium-web-data-file
    desc: Chromium Web Data database filename
    if:
      type: text
      regex: '(?i)\bWeb Data\b'
composite_rules:
  - id: chrome-cookies
    desc: Chrome cookies database
    any:
      - id: chrome-cookies-path-1
      - id: chrome-cookies-path-2
      - id: chrome-cookies-path-3
      - id: chrome-cookies-path-4
      - id: chrome-safe-storage
  - id: browser-sensitive-data
    desc: Browser cookies, logins, or credit cards
    crit: notable
    conf: 0.95
    any:
      - id: firefox-cookies
      - id: chrome-cookies
      - id: firefox-logins
      - id: firefox-formhistory
      - id: browser-credit-cards
