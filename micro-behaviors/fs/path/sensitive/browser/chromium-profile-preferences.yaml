defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  conf: 0.82
traits:
  - id: chromium-secure-preferences-file
    desc: Chromium Secure Preferences file
    crit: notable
    if:
      type: text
      exact: Secure Preferences
  - id: chromium-preferences-file
    desc: Chromium Preferences file
    crit: component
    conf: 0.68
    if:
      type: text
      exact: Preferences
  - id: chromium-extensions-directory
    desc: Chromium Extensions directory
    crit: component
    conf: 0.7
    if:
      type: text
      exact: Extensions
  - id: browser-extension-manifest-json
    desc: Browser extension manifest file
    crit: component
    conf: 0.76
    if:
      type: text
      exact: manifest.json
  - id: chromium-secure-prefs-super-mac
    desc: Chromium Secure Preferences super_mac
    crit: component
    conf: 0.9
    if:
      type: text
      exact: super_mac
  - id: chromium-secure-prefs-encrypted-hash
    desc: Chromium encrypted hash field
    crit: component
    conf: 0.9
    if:
      type: text
      exact: _encrypted_hash
  - id: chromium-tracked-prefs-reset
    desc: Chromium tracked prefs reset
    crit: component
    conf: 0.86
    if:
      type: text
      exact: prefs.tracked_preferences_reset
  - id: chromium-json-mac-helper
    desc: Chromium JSON MAC helper
    crit: component
    conf: 0.86
    if:
      type: text
      regex: (ComputeMacLeaf|ComputeMacMissing|CalculateEncryptedHash)
composite_rules:
  - id: chromium-profile-extension-files
    desc: Chromium extension profile files
    crit: notable
    conf: 0.86
    needs: 3
    any:
      - id: chromium-secure-preferences-file
      - id: chromium-preferences-file
      - id: chromium-extensions-directory
      - id: browser-extension-manifest-json
  - id: chromium-secure-prefs-mac-fields
    desc: Chromium Secure Preferences MAC fields
    crit: suspicious
    conf: 0.9
    all:
      - id: chromium-secure-preferences-file
    any:
      - id: chromium-secure-prefs-super-mac
      - id: chromium-secure-prefs-encrypted-hash
      - id: chromium-tracked-prefs-reset
      - id: chromium-json-mac-helper
    needs: 2
