defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: navigator-language
    desc: Reads browser UI language
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\bnavigator\.language\b'
  - id: window-location-hostname
    desc: Reads browser location hostname
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\b(window\.)?location\.hostname\b'
  - id: location-host
    desc: Reads browser location host
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\b(window\.)?location\.host\b'
  - id: location-host-tld-match
    desc: Matches browser host against country-code TLD set
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'location\.host\.match\s*\(\s*/\\\.\(([a-z]{2,10}\|){1,8}[a-z0-9-]{2,20}\)\$/'
