defaults:
  platforms:
    - unix
    - windows
  # dockerfile: RUN lines configure sudoers drop-ins in dev/build images; the
  # benign-build-sudoers-context guard needs these atoms to fire there too.
  for: [scripts, binaries, dockerfile]
  crit: baseline
  conf: 0.85
  attack: T1548
traits:
  - id: etc-sudoers
    desc: /etc/sudoers sudo configuration
    if:
      type: text
      substr: /etc/sudoers
  - id: etc-sudoers-d
    desc: /etc/sudoers.d/ sudo drop-in directory
    if:
      type: text
      substr: /etc/sudoers.d/
