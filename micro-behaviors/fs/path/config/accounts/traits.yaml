defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, java, class, kotlin, swift, zig, c, cpp]
  crit: baseline
  conf: 0.8
traits:
  - id: etc-passwd
    for: [scripts, c, cpp, objc, go, rust, java, class, kotlin, zig]
    desc: /etc/passwd user database
    crit: notable
    attack: T1033
    if:
      type: text
      substr: /etc/passwd
    not:
      - substr: fs.readFile('/etc/passwd'
      - substr: file:///etc/passwd
    unless:
      - id: metadata/file/text/catalog::neovim-filetype-registry
      - id: metadata/file/text/catalog::nmap-http-fingerprints-catalog
    downgrade:
      # Go's os/user and os/exec packages embed "/etc/passwd" as part of the
      # nss/cgo user-lookup path; every Go Unix binary has this in gopclntab.
      any:
        - id: metadata/lang/compiled::go-runtime-marker
  - id: etc-passwd-bytecode
    for: [class, jar, zip]
    desc: /etc/passwd user database in bytecode
    crit: notable
    attack: T1033
    if:
      type: hex
      pattern: 2F 65 74 63 2F 70 61 73 73 77 64
  - id: etc-passwd-pyc
    for: [pyc]
    desc: /etc/passwd user database in Python bytecode
    crit: notable
    attack: T1033
    if:
      type: text
      substr: /etc/passwd
composite_rules:
  - id: account-files
    desc: Account configuration file access
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: etc-passwd
      - id: etc-passwd-bytecode
      - id: etc-passwd-pyc
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/os/privilege/paths::etc-shadow-bytecode
      - id: micro-behaviors/os/privilege/paths::etc-shadow-pyc
