defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, java, class, kotlin, swift, zig, c, cpp]
  crit: baseline
  conf: 0.8
traits:
  - id: unix-password-file-path-pair
    desc: References Unix passwd and shadow paths
    crit: notable
    conf: 0.9
    for: [python, scripts, source]
    platforms: [unix]
    if:
      type: text
      regex: '/etc/(shadow[\s\S]{0,200}/etc/passwd|passwd[\s\S]{0,200}/etc/shadow)'
  - id: etc-passwd-open
    for: [scripts, elf, c, cpp, objc, go, rust, java, class, kotlin, zig]
    desc: /etc/passwd opened via open call
    crit: notable
    attack: T1033
    if:
      type: text
      regex: '(?i)\bf?open\s*\([^\r\n]{0,80}/etc/passwd\b'
    not:
      - substr: fs.readFile('/etc/passwd'
      - substr: file:///etc/passwd
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/file/catalog/identity/
  - id: etc-passwd-read
    for: [scripts, elf, c, cpp, objc, go, rust, java, class, kotlin, zig]
    desc: /etc/passwd read via read call
    crit: notable
    attack: T1033
    if:
      type: text
      regex: '(?i)\bread\w*\s*\([^\r\n]{0,80}/etc/passwd\b'
    not:
      - substr: fs.readFile('/etc/passwd'
      - substr: file:///etc/passwd
    unless:
      - id: metadata/file/catalog/identity/
  - id: etc-passwd-cat
    for: [scripts, elf, c, cpp, objc, go, rust, java, class, kotlin, zig]
    desc: /etc/passwd read via cat command
    crit: notable
    attack: T1033
    if:
      type: text
      regex: '(?i)(^|[;&\x7c])\s*cat\s+/etc/passwd\b'
    not:
      - substr: fs.readFile('/etc/passwd'
      - substr: file:///etc/passwd
    unless:
      - id: metadata/file/catalog/identity/
  - id: etc-passwd-bytecode
    for: [class, jar, zip]
    desc: /etc/passwd user database in bytecode
    crit: notable
    attack: T1033
    if:
      type: hex
      pattern: 2F 65 74 63 2F 70 61 73 73 77 64
  - id: etc-passwd-pyc
    for: [pyc]
    desc: /etc/passwd user database in Python bytecode
    crit: notable
    attack: T1033
    if:
      type: text
      substr: /etc/passwd
composite_rules:
  - id: etc-passwd
    for: [scripts, elf, c, cpp, objc, go, rust, java, class, kotlin, zig]
    desc: /etc/passwd user database access
    crit: notable
    attack: T1033
    any:
      - id: etc-passwd-open
      - id: etc-passwd-read
      - id: etc-passwd-cat
    downgrade:
      # Go's os/user and os/exec packages embed "/etc/passwd" as part of the
      # nss/cgo user-lookup path; every Go Unix binary has this in gopclntab.
      any:
        - id: metadata/lang/compiled/
        - id: metadata/lang/compiler/systems::go-binary
  - id: account-files
    desc: Account configuration file access
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: etc-passwd
      - id: etc-passwd-bytecode
      - id: etc-passwd-pyc
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/os/privilege/paths::etc-shadow-bytecode
      - id: micro-behaviors/os/privilege/paths::etc-shadow
