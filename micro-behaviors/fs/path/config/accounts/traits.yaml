defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: etc-passwd
    desc: /etc/passwd user database
    attack: T1033
    if:
      type: text
      substr: /etc/passwd
    not:
      - substr: fs.readFile('/etc/passwd'
      - substr: file:///etc/passwd
composite_rules:
  - id: account-files
    desc: Account configuration file access
    crit: notable
    conf: 0.8
    any:
      - id: etc-passwd
      - id: micro-behaviors/os/privilege/paths::etc-shadow
