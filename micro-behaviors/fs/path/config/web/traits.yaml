defaults:
  platforms: [unix, windows]
  for: [php, c, cpp, python, shell]

traits:
  - id: sql-config-path
    desc: SQL database configuration path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(my\.cnf|php-fpm\.conf)'

  - id: web-app-config-path
    desc: Web application configuration path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(www\.conf|wp-config\.php)'

composite_rules:
  - id: database-config-path
    desc: Database or web application config path
    crit: component
    conf: 0.8
    any:
      - id: sql-config-path
      - id: web-app-config-path
