defaults:
  platforms: [windows]
  for: [pe, batch, powershell, vbs]
traits:
  - id: autorun-inf-string
    desc: Mentions Autorun.inf configuration file
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: (?i)[:\\]Autorun\.inf
  - id: autorun-inf-wide
    desc: Mentions Autorun.inf (Wide)
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: hex
      section: data
      pattern: 41 00 75 00 74 00 6F 00 72 00 75 00 6E 00 2E 00 69 00 6E 00 66 00
  - id: autorun-section
    desc: Contains Autorun configuration section header
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: '[Autorun]'
      case_insensitive: true
  - id: autorun-section-wide
    desc: Contains Autorun section header (Wide)
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: hex
      section: data
      pattern: 5B 00 41 00 75 00 74 00 6F 00 72 00 75 00 6E 00 5D 00
  - id: autorun-shellexecute
    desc: Contains Autorun ShellExecute command directive
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?is)\[autorun\].{0,160}\bShellExecute\s*=
  - id: autorun-shellexecute-wide
    desc: Contains Autorun ShellExecute directive (Wide)
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: hex
      section: data
      pattern: 53 00 68 00 65 00 6C 00 6C 00 45 00 78 00 65 00 63 00 75 00 74 00 65 00 3D 00
  - id: autorun-open
    desc: Contains Autorun Open command directive
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: (?is)(\[autorun\].{0,200}\bopen\s*=|autorun\.inf.{0,200}\bopen\s*=)
    not:
      - substr: OpenMP
      - substr: OpenGL
      - substr: OpenSSL
  - id: autorun-open-wide
    desc: Contains Autorun Open directive (Wide)
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: hex
      section: data
      pattern: 4F 00 70 00 65 00 6E 00 3D 00
  - id: autorun-action
    desc: Contains Autorun Action command directive
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: (?i)^Action\s*=
  - id: autorun-useautoplay
    desc: Contains Autorun UseAutoPlay directive
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: (?i)UseAutoPlay\s*=
  - id: found007-drop-path
    desc: References FOUND.007.exe drop path
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: :\FOUND.007.exe
  - id: found006-drop-path
    desc: References FOUND.006.exe drop path
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: :\FOUND.006.exe
  - id: autorun-open-found006
    desc: Autorun Open targets FOUND.006.exe
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: Open=FOUND.006.exe
  - id: autorun-shellexecute-found006
    desc: Autorun ShellExecute targets FOUND.006.exe
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: ShellExecute=FOUND.006.exe
  - id: autorun-shell-auto-found006
    desc: Autorun shell auto command uses FOUND.006.exe
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: Shell\Auto\Command=FOUND.006.exe
  - id: autorun-shell-open-found006
    desc: Autorun shell open command uses FOUND.006.exe
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: Shell\Open\Command=FOUND.006.exe
  - id: autorun-shell-explore-found006
    desc: Autorun shell explore command uses FOUND.006.exe
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: Shell\Explore\Command=FOUND.006.exe
  - id: autorun-open-found007
    desc: Autorun Open targets FOUND.007.exe
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: Open=FOUND.007.exe
  - id: autorun-shellexecute-found007
    desc: Autorun ShellExecute targets FOUND.007.exe
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: ShellExecute=FOUND.007.exe
  - id: autorun-shell-auto-found007
    desc: Autorun shell auto command uses FOUND.007.exe
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: Shell\Auto\Command=FOUND.007.exe
  - id: found-dir-indicator
    desc: References FOUND.000 hidden directory
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: (?i)FOUND\.\d{3}
  - id: found-dir-wide
    desc: References FOUND.000 (Wide)
    crit: notable
    conf: 0.7
    for: [pe]
    if:
      type: hex
      section: data
      pattern: 46 00 4F 00 55 00 4E 00 44 00 2E 00
composite_rules:
  - id: autorun-indicators
    desc: Multiple Autorun-related indicators
    crit: suspicious
    any:
      - id: autorun-inf-string
      - id: autorun-inf-wide
      - id: autorun-section
      - id: autorun-section-wide
      - id: autorun-shellexecute
      - id: autorun-shellexecute-wide
      - id: autorun-open
      - id: autorun-open-wide
      - id: autorun-action
      - id: autorun-useautoplay
    needs: 2
  - id: found007-autorun-markers
    desc: FOUND.007.exe autorun markers
    crit: suspicious
    conf: 0.99
    any:
      - id: autorun-open-found007
      - id: autorun-shellexecute-found007
      - id: autorun-shell-auto-found007
      - id: autorun-useautoplay
      - id: autorun-section
      - id: autorun-inf-string
  - id: found007-autorun-profile
    desc: FOUND.007.exe removable-drive autorun profile
    crit: suspicious
    conf: 0.99
    all:
      - id: found007-drop-path
      - id: found007-autorun-markers
  - id: found006-autorun-markers
    desc: FOUND.006.exe autorun markers
    crit: suspicious
    conf: 0.99
    any:
      - id: autorun-open-found006
      - id: autorun-shellexecute-found006
      - id: autorun-shell-auto-found006
      - id: autorun-shell-open-found006
      - id: autorun-shell-explore-found006
      - id: autorun-useautoplay
      - id: autorun-section
      - id: autorun-inf-string
    needs: 3
  - id: found006-autorun-profile
    desc: FOUND.006.exe removable-drive autorun profile
    crit: suspicious
    conf: 0.99
    all:
      - id: found006-drop-path
      - id: found006-autorun-markers
