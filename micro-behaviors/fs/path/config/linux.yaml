defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
    - python
traits:
  - id: config-etc
    desc: Reference to /etc configuration files
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: /etc/
  - id: config-hosts
    desc: Reference to /etc/hosts
    crit: notable
    conf: 0.66
    if:
      type: string_value
      substr: /etc/hosts
  - id: config-resolv
    desc: Reference to /etc/resolv.conf
    crit: notable
    conf: 0.66
    if:
      type: string_value
      substr: /etc/resolv.conf
  - id: config-resolv-xor
    desc: XOR-obfuscated /etc/resolv.conf path
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 31 20 37 7B 26 31 27 3B 38 22 7A 37 3B 3A 32 54
  - id: config-resolv-xor62
    desc: XOR-obfuscated /etc/resolv.conf path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 07 16 01 4D 10 07 11 0D 0E 14 4C 01 0D 0C 04 62
  - id: config-watchdog-default
    desc: Reference to /etc/default/watchdog
    crit: notable
    conf: 0.84
    if:
      type: string_value
      exact: /etc/default/watchdog
  - id: config-watchdog-default-xor14
    desc: XOR-obfuscated /etc/default/watchdog path
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: .rodata
      pattern: 21 6B 7A 6D 21 6A 6B 68 6F 7B 62 7A 21 79 6F 7A 6D 66 6A 61 69
  - id: config-initd
    desc: Reference to /etc/init.d scripts
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /etc/init\.d/[\w\-]+
  - id: config-ld-so-cache
    desc: Reference to /etc/ld.so.cache
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: /etc/ld.so.cache
  - id: glibc-gconv-path
    desc: Reference to glibc gconv module path
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: /(usr/)?lib/gconv/?
