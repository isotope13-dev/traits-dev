defaults:
  platforms: [windows, unix]
  for: [powershell, shell, batch, php]
traits:
  - id: vm-config-iso-metadata-file
    desc: VM config ISO metadata file
    crit: component
    conf: 0.85
    if:
      type: text
      substr: pc-meta-data.json
  - id: vm-config-iso-apply-configuration-script
    desc: VM config ISO apply-configuration script
    crit: component
    conf: 0.85
    if:
      type: text
      substr: apply-configuration.ps1
composite_rules:
  - id: vm-config-iso-configuration-context
    desc: VM config ISO provisioning context
    crit: component
    conf: 0.9
    all:
      - id: vm-config-iso-metadata-file
      - id: vm-config-iso-apply-configuration-script
