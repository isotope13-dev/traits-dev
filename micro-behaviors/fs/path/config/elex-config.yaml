defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: elex-configure-xml
    desc: "Elex configure.xml path marker"
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'configure[/\\]configure\.xml'
  - id: elex-downloader-tracking-ids
    desc: "Elex downloader tracking IDs"
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: '^(Downloader_id|Site_id|Extra_download_url)$'
composite_rules:
  - id: configure-xml-tracking-composite
    desc: "configure.xml with tracking IDs"
    crit: component
    conf: 0.95
    all:
      - id: elex-configure-xml
      - id: elex-downloader-tracking-ids