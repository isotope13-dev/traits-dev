# References to dotenv-style application configuration files.
defaults:
  platforms: [unix, windows]
  for: [scripts]
  crit: notable
  conf: 0.9

traits:
  - id: env-file-path
    desc: References dotenv configuration file path
    if:
      type: text
      regex: '(^|/)\.env($|\.)'

  - id: node-dotenv-file-path
    desc: Node constructs a dotenv file path
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'path\.join\s*\([^\n]{0,160}["'']\.env["'']\s*\)'
  - id: dotenv-config-path
    desc: Configures dotenv with an explicit path
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: "dotenv\\.config\\(\\{\\s*path:"
