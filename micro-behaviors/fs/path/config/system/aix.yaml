defaults:
  platforms: [aix, unix]
  for: [elf, c, cpp, php, shell]
traits:
  - id: etc-inittab
    desc: "Access to /etc/inittab system init file"
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: /etc/inittab
  - id: etc-rc-local
    desc: Access to /etc/rc.d/rc.local boot script
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: /etc/rc(\.d/rc)?\.local
