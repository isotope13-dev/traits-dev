defaults:
  platforms: [openwrt]
  for: [scripts, binaries, pyc, source]
  crit: notable
  conf: 0.88

traits:
  - id: openwrt-uci-export-command
    desc: OpenWrt UCI export command
    if:
      type: text
      regex: '\buci\s+export\b'
  - id: openwrt-uci-show-command
    desc: OpenWrt UCI show command
    if:
      type: text
      regex: '\buci\s+show\b'
  - id: openwrt-network-config-path
    desc: OpenWrt network UCI config path
    for: [elf, shell]
    if:
      type: string_literal
      regex: '^/etc/config/(wireless|network|dhcp)$'
  - id: openwrt-service-config-path
    desc: OpenWrt service UCI config path
    for: [elf, shell]
    if:
      type: string_literal
      regex: '^/etc/config/(dropbear|luci|firewall)$'
  - id: openwrt-system-config-path
    desc: OpenWrt system UCI config path
    for: [elf, shell]
    if:
      type: string_literal
      regex: '^/etc/config/(system|ssh)$'

composite_rules:
  - id: openwrt-uci-config-access
    desc: OpenWrt UCI configuration access
    crit: notable
    conf: 0.9
    any:
      - id: openwrt-uci-export-command
      - id: openwrt-uci-show-command
      - id: openwrt-network-config-path
      - id: openwrt-service-config-path
      - id: openwrt-system-config-path
