defaults:
  platforms:
    - unix
    - windows
  for: [elf]
traits:
  - id: native-login-profile-target
    desc: Shell login profile path (.profile/.bashrc)
    crit: component
    conf: 0.88
    for: [c, cpp, objc, elf]
    platforms: [unix]
    if:
      type: text
      regex: '\.(profile|bashrc)'
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: config-etc
    desc: Reference to /etc configuration files
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: /etc/
  - id: config-hosts
    desc: References /etc/hosts
    crit: notable
    conf: 0.66
    if:
      type: text
      exact: /etc/hosts
    downgrade:
      any:
        - id: metadata/file/string/identity::system-shell-basename
  - id: config-hosts-bytecode
    desc: Reference to /etc/hosts in JVM bytecode
    crit: notable
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 65 74 63 2F 68 6F 73 74 73
    unless:
      - type: hex
        pattern: CF FA ED FE
  - id: hidden-hosts-backup-bytecode
    desc: Hidden hosts backup path in JVM bytecode
    crit: notable
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 74 6D 70 2F 2E 68 6F 73 74 73 2E 62 61 6B
    unless:
      - type: hex
        pattern: CF FA ED FE
  - id: config-crontab
    desc: Reference to /etc/crontab
    crit: notable
    conf: 0.78
    for: [scripts, binaries, javascript]
    platforms: [unix]
    if:
      type: text
      substr: /etc/crontab
    unless:
      - id: metadata/file/format/
  - id: root-crontab-spool-path
    desc: Reference to root crontab spool path
    crit: notable
    conf: 0.86
    for: [scripts, binaries]
    platforms: [unix]
    if:
      type: text
      substr: /var/spool/cron/crontabs/root
  - id: var-spool-cron-path
    desc: Reference to user crontab spool path
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    platforms: [unix]
    if:
      type: text
      substr: /var/spool/cron
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/detection/
  - id: config-resolv
    desc: References /etc/resolv.conf
    crit: notable
    conf: 0.9
    for: [scripts, binaries, source]
    platforms: [unix, android]
    if:
      type: text
      exact: /etc/resolv.conf
  - id: selinux-policy-path
    desc: Reference to SELinux policy file path
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    platforms: [linux, android]
    if:
      type: text
      substr: /selinux/policy
  - id: config-resolv-xor
    desc: XOR-obfuscated /etc/resolv.conf path
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 31 20 37 7B 26 31 27 3B 38 22 7A 37 3B 3A 32 54
  - id: config-resolv-xor62
    desc: XOR-obfuscated /etc/resolv.conf path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 07 16 01 4D 10 07 11 0D 0E 14 4C 01 0D 0C 04 62
  - id: config-resolv-xor18
    desc: XOR-obfuscated /etc/resolv.conf path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 37 7D 6C 7B 37 6A 7D 6B 77 74 6E 36 7B 77 76 7E
  - id: config-watchdog-default
    desc: Reference to /etc/default/watchdog
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: /etc/default/watchdog
  - id: config-watchdog-default-xor14
    desc: XOR-obfuscated /etc/default/watchdog path
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: .rodata
      pattern: 21 6B 7A 6D 21 6A 6B 68 6F 7B 62 7A 21 79 6F 7A 6D 66 6A 61 69
  - id: config-watchdog-default-text
    desc: Reference to /etc/default/watchdog
    crit: notable
    conf: 0.84
    for: [scripts]
    platforms:
      - unix
      - android
    if:
      type: text
      exact: /etc/default/watchdog
  - id: config-ld-so-cache
    desc: Reference to /etc/ld.so.cache
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: /etc/ld.so.cache
  - id: glibc-gconv-path
    desc: Reference to glibc gconv module path
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: /(usr/)?lib/gconv/?
