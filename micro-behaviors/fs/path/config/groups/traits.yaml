defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  attack: T1069
traits:
  - id: etc-group
    desc: /etc/group group database
    if:
      type: text
      substr: /etc/group
    unless:
      - id: metadata/file/text::neovim-filetype-registry
  - id: etc-gshadow
    desc: /etc/gshadow group passwords
    conf: 0.85
    if:
      type: text
      substr: /etc/gshadow
    unless:
      - id: metadata/file/text::neovim-filetype-registry
composite_rules:
  - id: group-files
    desc: Group configuration file access
    crit: notable
    conf: 0.8
    any:
      - id: etc-group
      - id: etc-gshadow
