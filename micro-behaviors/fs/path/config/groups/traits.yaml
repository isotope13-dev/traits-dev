defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  attack: T1069
traits:
  - id: etc-group
    desc: /etc/group group database
    if:
      type: text
      substr: /etc/group
    unless:
      - id: metadata/file/format/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/file/catalog/identity/
  - id: etc-gshadow
    desc: /etc/gshadow group passwords
    conf: 0.85
    if:
      type: text
      substr: /etc/gshadow
    unless:
      - id: metadata/file/format/
      - id: metadata/file/catalog/identity/
