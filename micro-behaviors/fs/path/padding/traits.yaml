defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: random-paths
    desc: "Randomized File Path Padding"
    crit: suspicious
    count_min: 50
    if:
      type: text
      regex: 'C:\\([a-zA-Z0-9_]){8}\.exe'
  - id: sandbox-paths
    desc: "Sandbox-like Path Padding"
    crit: suspicious
    if:
      type: text
      regex: 'Temp\\([a-fA-F0-9]){64}\.exe'
