defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: random-paths
    desc: "Randomized File Path Padding"
    crit: suspicious
    count_min: 50
    if:
      type: raw
      regex: 'C\x00:\x00\\\x00([a-zA-Z0-9_]\x00){8}\.\x00e\x00x\x00e\x00'
  - id: sandbox-paths
    desc: "Sandbox-like Path Padding"
    crit: suspicious
    if:
      type: raw
      regex: 'T\x00e\x00m\x00p\x00\\\x00([a-fA-F0-9]\x00){64}\.\x00e\x00x\x00e\x00'
