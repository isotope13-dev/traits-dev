# Lock Directory Persistence
# Detects usage of /var/lock for persistence

defaults:
  crit: notable
  conf: 0.8
  for: [all]

traits:
  - id: var-lock-path
    desc: Reference to /var/lock/
    if:
      type: string
      substr: "/var/lock/"

  - id: var-lock-payload-staging
    desc: Payload staging/execution from /var/lock/
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: '/bin/cp\s+.{0,50}\s+/var/lock/.{0,50}\&\&\s+/bin/chmod\s+755\s+/var/lock/.{0,50}'
