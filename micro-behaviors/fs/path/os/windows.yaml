# Windows Path Detection
# Capabilities related to handling Windows file paths
defaults:
  platforms: [windows]
  for: [pe, powershell, batch, vbs]
traits:
- id: hardcoded-windows-root
  desc: Hardcoded Windows root path (C:\, D:\, etc.)
  crit: baseline
  conf: 0.8
  count_min: 2
  if:
    type: raw
    regex: '["''][A-Z]:[\\/][^"''\r\n<>|*?]{0,120}'
  unless:
  - type: basename
    regex: '\.vcxproj\.filters$'
  downgrade:
    any:
    - id: metadata/library/data::botocore-lib
    - id: metadata/import/python::boto3
    - id: micro-behaviors/communications/ssh/connect::paramiko-dup
composite_rules: []
