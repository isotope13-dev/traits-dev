defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: baseline

traits:
  - id: git-directory-literal
    desc: References a .git directory path
    conf: 0.85
    if:
      type: literal
      kind: string
      regex: '^(\./|/)?\.git$'

  - id: node-modules-directory-literal
    desc: References a node_modules directory path
    conf: 0.8
    if:
      type: literal
      kind: string
      regex: '^(\./|/)?node_modules$'

  - id: source-directory-literal
    desc: References a source directory path
    conf: 0.85
    if:
      type: literal
      kind: string
      regex: '^(\./|/)?src$'
