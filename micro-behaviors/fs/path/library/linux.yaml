defaults:
  for: [scripts, binaries]
  platforms:
    - linux
  crit: baseline
  mbc: E1083
  attack: T1083
traits:
  - id: lib-path
    desc: Reference to /lib/ directory
    conf: 0.4
    if:
      type: text
      regex: ^/lib(32|64)?/$
  - id: usr-lib-path
    desc: Reference to /usr/lib directory
    conf: 0.4
    if:
      type: text
      regex: ^/usr/lib(32|64)?/$
  - id: usr-local-lib-path
    desc: Reference to /usr/local/lib
    conf: 0.4
    if:
      type: text
      exact: /usr/local/lib/
