defaults:
  for:
    - c
    - elf
    - shell
    - python
  platforms:
    - linux
  crit: baseline
  mbc: E1083
  attack: T1083
traits:
  - id: lib-path
    desc: Reference to /lib/ directory
    conf: 0.4
    if:
      type: text
      regex: ^/lib(32|64)?/$
  - id: usr-lib-path
    desc: Reference to /usr/lib directory
    conf: 0.4
    if:
      type: text
      regex: ^/usr/lib(32|64)?/$
  - id: usr-local-lib-path
    desc: Reference to /usr/local/lib
    conf: 0.4
    if:
      type: text
      exact: /usr/local/lib/
  - id: libpython-shared-object
    desc: libpython shared object reference
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\blibpython[0-9.]*\.so(\.[0-9.]+)?\b'
