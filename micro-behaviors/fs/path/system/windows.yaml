defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - pe
    - powershell
    - batch
    - vbs
traits:
  - id: default-user-appdata
    desc: Default User Application Data path
    crit: notable
    conf: 0.7
    mbc: E1083
    attack: T1083
    if:
      type: string_value
      regex: Default User.{0,32}Application Data
  - id: localservice-appdata
    desc: LocalService Application Data path
    crit: notable
    conf: 0.7
    mbc: E1083
    attack: T1083
    if:
      type: string_value
      regex: LocalService.{0,32}Application Data
  - id: networkservice-appdata
    desc: NetworkService Application Data path
    crit: notable
    conf: 0.7
    mbc: E1083
    attack: T1083
    if:
      type: string_value
      regex: NetworkService.{0,32}Application Data
  - id: windows-root
    desc: C:\\Windows\\ directory path
    crit: baseline
    conf: 0.66
    mbc: E1083
    attack: T1083
    if:
      type: string_value
      regex: '[Cc]:\\Windows\\[\w\\]+'
  - id: system32-substr
    desc: System32 substring reference
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: System32
  - id: windows-dir
    desc: Windows directory path reference
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: '[A-Za-z]:\\Windows(\\System32)?|\\Windows\\System32|/Windows/System32'
  - id: windows-system32
    desc: C:\\Windows\\System32\\ directory path
    crit: notable
    conf: 0.66
    mbc: E1083
    attack: T1083
    if:
      type: string_value
      regex: '[Cc]:\\Windows\\System32\\'
  - id: system32-bin
    desc: References .bin file in System32
    crit: suspicious
    if:
      type: string_value
      regex: \\SystemRoot\\System32\\[a-zA-Z0-9_]+\.bin
      case_insensitive: true
    downgrade:
      any:
        - id: micro-behaviors/os/kernel/routines::dynamic-resolution
  - id: recycler-path
    desc: RECYCLER directory path (Recycle Bin hiding)
    crit: suspicious
    conf: 0.9
    attack: T1564.001
    for:
      - pe
      - batch
      - powershell
      - vbs
      - shell
    if:
      type: string_value
      regex: (?i)\bRECYCLER\\[a-zA-Z0-9_.]+
    not:
      - substr: RECYCLER.BIN
composite_rules:
  - id: windows-appdata
    desc: Windows Application Data paths (user
    crit: notable
    conf: 0.66
    mbc: E1083
    attack: T1083
    any:
      - id: default-user-appdata
      - id: localservice-appdata
      - id: networkservice-appdata
