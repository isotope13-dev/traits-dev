defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: default-user-appdata
    desc: Default User Application Data path
    crit: notable
    conf: 0.7
    mbc: E1083
    attack: T1083
    if:
      type: text
      regex: Default User.{0,32}Application Data
  - id: localservice-appdata
    desc: LocalService Application Data path
    crit: notable
    conf: 0.7
    mbc: E1083
    attack: T1083
    if:
      type: text
      regex: LocalService.{0,32}Application Data
  - id: networkservice-appdata
    desc: NetworkService Application Data path
    crit: notable
    conf: 0.7
    mbc: E1083
    attack: T1083
    if:
      type: text
      regex: NetworkService.{0,32}Application Data
  - id: windows-root
    desc: C:\\Windows\\ directory path
    crit: baseline
    conf: 0.66
    mbc: E1083
    attack: T1083
    if:
      type: text
      regex: '[Cc]:\\Windows\\[\w\\]+'
  - id: system32-substr
    desc: System32 substring reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: System32
  - id: windows-dir
    desc: Windows directory path reference
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: '[A-Za-z]:\\Windows(\\System32)?|\\Windows\\System32|/Windows/System32'
  - id: windows-system32
    desc: References the C:\\Windows\\System32\\ directory
    crit: notable
    conf: 0.66
    mbc: E1083
    attack: T1083
    if:
      type: text
      regex: '[Cc]:\\Windows\\System32\\'

  - id: windows-system-directory
    desc: References the C:\Windows\System\ directory
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [pe, dll, scripts]
    if:
      type: text
      exact: 'C:\Windows\System\'

  - id: javascript-windows-system32
    desc: JavaScript System32 path
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: 'System32\\\\(\$\{|[A-Za-z_])'
  - id: windows-system-drop-template
    desc: Windows system directory drop template
    crit: component
    conf: 0.88
    platforms: [windows]
    count_min: 2
    if:
      type: text
      regex: '^[Cc]:\\[Ww]indows\\([Ss]ystem32\\|[Ss]ystem\\)?%s$'
  - id: systemroot-system32-env-path
    desc: Expanded %SystemRoot%\System32 path
    crit: baseline
    conf: 0.85
    platforms: [windows]
    if:
      type: text
      exact: '%SystemRoot%\System32\'
  - id: internet-explorer-install-path
    desc: Program Files Internet Explorer install path
    crit: baseline
    conf: 0.85
    platforms: [windows]
    if:
      type: text
      exact: Program Files\Internet Explorer
  - id: system32-bin
    desc: References .bin file in System32
    crit: suspicious
    if:
      type: text
      regex: \\SystemRoot\\System32\\[a-zA-Z0-9_]+\.bin
      case_insensitive: true
    downgrade:
      any:
        - id: micro-behaviors/os/kernel/routines/
  - id: recycler-path
    desc: RECYCLER directory path (Recycle Bin hiding)
    crit: suspicious
    conf: 0.9
    attack: T1564.001
    if:
      type: text
      regex: (?i)\bRECYCLER\\[a-zA-Z0-9_.]+
    not:
      - substr: RECYCLER.BIN
      - substr: RECYCLER\not_a_virus.txt
  - id: recycler-literal
    desc: RECYCLER literal path marker
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: RECYCLER
composite_rules:
  - id: windows-appdata
    desc: Windows Application Data paths (user
    crit: notable
    conf: 0.66
    mbc: E1083
    attack: T1083
    any:
      - id: default-user-appdata
      - id: localservice-appdata
      - id: networkservice-appdata
