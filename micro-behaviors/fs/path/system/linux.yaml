# System Paths (Linux)
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [elf, shell, python]
traits:
  - id: system-boot
    desc: Reference to /boot
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: "/boot/[\\%\\w\\.\\-/]{4,32}"
  - id: system-lib64
    desc: Reference to /lib64
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      regex: "/lib64/[\\w\\.\\-/]+"
  - id: system-lib-python
    desc: Reference to Python library paths
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      regex: "/usr/lib/python[\\d\\.]+/[\\w\\.\\-/]+"
  - id: system-var-containers
    desc: Reference to container paths
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: "/var/(lib/)?(docker|containers)/[\\w\\.\\-/]+"
  # === Generic Unix/Linux system paths ===
  - id: etc-dir
    desc: /etc directory reference
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      exact: /etc
  - id: boot-dir
    desc: /boot directory reference
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      regex: /boot(/|$)
  - id: home-dir
    desc: /home directory reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      exact: /home
  - id: usr-dir
    desc: /usr directory reference
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      exact: /usr
