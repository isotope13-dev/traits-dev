defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
    - python
traits:
  - id: system-boot
    desc: Reference to /boot
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /boot/[\%\w\.\-/]{4,32}
  - id: system-lib64
    desc: Reference to /lib64
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: /lib64/[\w\.\-/]+
  - id: system-lib-python
    desc: Reference to Python library paths
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: /usr/lib/python[\d\.]+/[\w\.\-/]+
  - id: system-var-containers
    desc: Reference to container paths
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /var/(lib/)?(docker|containers)/[\w\.\-/]+
  - id: etc-dir
    desc: /etc directory reference
    crit: baseline
    conf: 0.5
    if:
      type: text
      exact: /etc
  - id: boot-dir
    desc: /boot directory reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: /boot(/|$)
  - id: home-dir
    desc: /home directory reference
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: /home
  - id: usr-dir
    desc: /usr directory reference
    crit: baseline
    conf: 0.5
    if:
      type: text
      exact: /usr
  - id: sbin-watchdog
    desc: Reference to /sbin/watchdog
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: /sbin/watchdog
  - id: sbin-watchdog-xor14
    desc: XOR-obfuscated /sbin/watchdog path
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: .rodata
      pattern: 21 7D 6C 67 60 21 79 6F 7A 6D 66 6A 61 69
