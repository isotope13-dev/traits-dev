defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: legacy-boot-config
    desc: References legacy DOS/Windows boot configuration files
    crit: notable
    conf: 0.8
    mbc: E1083
    attack: T1083
    if:
      type: text
      regex: (?i)\b(config\.sys|autoexec\.bat)\b
