defaults:
  platforms:
    - unix
    - windows
    - macos
  crit: notable
  conf: 0.8
  for: [scripts, binaries]
traits:
  - id: var-lock-path
    desc: Reference to /var/lock/
    if:
      type: text
      substr: /var/lock/
  - id: var-lock-payload-staging
    desc: Payload staging/execution from /var/lock/
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: /bin/cp\s+.{0,50}\s+/var/lock/.{0,50}\&\&\s+/bin/chmod\s+755\s+/var/lock/.{0,50}
