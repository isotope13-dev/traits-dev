# Generic update.py script filename literal. Neutral: update.py is an extremely
# common updater / maintenance script name in legitimate Python projects and
# package tooling. Family composites pair it with implant-specific markers.
defaults:
  platforms: [unix]
  for: [python, shell]
  crit: baseline
traits:
  - id: update-py-filename
    desc: update.py script filename reference
    conf: 0.75
    if:
      type: string_literal
      substr: update.py
      section: .text
