defaults:
  platforms: [unix, appliance, routeros]
  crit: component
traits:
  - id: cpuinfo-string
    desc: JVM source contains the /proc/cpuinfo path
    conf: 0.9
    for: [java, kotlin]
    if:
      type: string_literal
      exact: /proc/cpuinfo

  - id: version-string
    desc: JVM source contains the /proc/version path
    conf: 0.9
    for: [java, kotlin]
    if:
      type: string_literal
      exact: /proc/version

  - id: cpuinfo-bytecode
    desc: JVM bytecode contains the /proc/cpuinfo path
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 70 72 6F 63 2F 63 70 75 69 6E 66 6F

  - id: version-bytecode
    desc: JVM bytecode contains the /proc/version path
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 70 72 6F 63 2F 76 65 72 73 69 6F 6E
