defaults:
  attack: T1083
  mbc: E1083
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - macos
traits:
  - id: application-macos
    desc: /Applications/*.app/Contents/MacOS/ path pattern
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /Applications/[\w\s.\-]+\.app/Contents/MacOS/[\w.\-]+
  - id: firefox-extensions
    desc: Firefox/extensions directory path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Firefox/extensions
  - id: safari-extensions
    desc: Safari/Extensions directory path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Safari/Extensions
  - id: chrome-extensions-dir
    desc: /Extensions directory (browser extensions)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: (Chrome|Google|Brave).{0,50}/Extensions/
  - id: chrome-directory
    desc: Google/Chrome directory path
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: Google/Chrome
composite_rules:
  - id: chrome-extensions
    desc: Chrome browser extensions path
    crit: notable
    conf: 0.7
    all:
      - id: chrome-directory
      - id: chrome-extensions-dir
  - id: application-browser-extensions
    desc: Browser extension paths (Firefox, Safari,
    crit: suspicious
    conf: 0.66
    any:
      - id: firefox-extensions
      - id: safari-extensions
      - id: chrome-extensions
