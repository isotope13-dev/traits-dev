defaults:
  attack: T1546
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mirc-config-file-a
    desc: "mIRC config file paths (group A)"
    crit: component
    if:
      type: text
      regex: (script|mirc|remote|aliases)\.ini
      case_insensitive: true
  - id: mirc-config-file-b
    desc: "mIRC config file paths (group B)"
    crit: component
    if:
      type: text
      regex: (popups|users|control)\.ini
      case_insensitive: true
  - id: mirc-install-path
    desc: Detects default mIRC installation path
    crit: component
    if:
      type: text
      regex: '[cC]:[\\/]mirc[\\/]'
      case_insensitive: true
composite_rules:
  - id: mirc-config-file
    desc: Detects mIRC configuration file paths
    crit: suspicious
    all:
      - id: mirc-install-path
    any:
      - id: mirc-config-file-a
      - id: mirc-config-file-b
