defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, python, go, rust, java, csharp, powershell]
  crit: component
  conf: 0.8

traits:
  - id: id-json-filename-literal
    desc: References generic ID JSON filename
    if:
      type: literal
      kind: string
      exact: id.json

  - id: id-json-filename-text
    desc: References generic ID JSON filename
    platforms: [macos]
    for: [applescript, macho]
    if:
      type: text
      substr: id.json

  - id: hidden-app-config-toml
    desc: References hidden application TOML config
    if:
      type: text
      regex: '[/~\\\\]\.[A-Za-z0-9._-]{2,64}/config\.toml'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/llm-scanner/

  - id: hidden-app-config-json
    desc: References hidden application JSON config
    if:
      type: text
      regex: '[/~\\\\]\.[A-Za-z0-9._-]{2,64}/config\.json'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/llm-scanner/

  - id: kde-autostart-scripts-path
    desc: KDE Plasma autostart scripts directory reference
    crit: notable
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      substr: .config/autostart-scripts

composite_rules:
  - id: hidden-app-config-file
    desc: Hidden application config file reference
    crit: component
    conf: 0.82
    any:
      - id: hidden-app-config-toml
      - id: hidden-app-config-json
