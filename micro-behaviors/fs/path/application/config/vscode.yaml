defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: vscode-user-dir-components
    desc: VS Code user config directory components
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '["'']Code["'']\s*,\s*["'']User["'']'

  - id: vscode-settings-json-filename
    desc: VS Code settings.json filename
    crit: component
    conf: 0.95
    if:
      type: text
      substr: settings.json

  - id: vscode-workspace-dir
    desc: VS Code workspace directory
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '["'']/?(\./)?\.(vscode)["'']'

  - id: jetbrains-idea-dir
    desc: JetBrains IDEA directory
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '["'']/?(\./)?\.(idea)["'']'

  - id: vscode-tasks-json-filename
    desc: VS Code tasks.json filename
    crit: component
    conf: 0.95
    if:
      type: text
      substr: tasks.json

composite_rules:
  - id: vscode-global-settings-path
    desc: VS Code global settings path
    crit: notable
    conf: 0.94
    all:
      - id: vscode-user-dir-components
      - id: vscode-settings-json-filename

  - id: vscode-global-tasks-path
    desc: VS Code global tasks path
    crit: notable
    conf: 0.94
    all:
      - id: vscode-user-dir-components
      - id: vscode-tasks-json-filename
