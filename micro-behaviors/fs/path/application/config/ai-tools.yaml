defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, shell, markdown, text]
  crit: notable
  conf: 0.9

traits:
  - id: cursor-config-directory
    desc: Cursor config directory path
    # The bare `\.cursor[\\/]` form must be a path segment, not a property
    # access followed by division (e.g. minified `o.cursor/100`), so require a
    # non-identifier delimiter before it (char class, not an extra alternation).
    unless:
      - id: metadata/file/format::adblock-filter-list
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    if:
      type: text
      regex: '["'']\.cursor["'']|[\\/]\.cursor([\\/]|$)|[\s"''`(=:,]\.cursor[\\/]'

  - id: claude-config-directory
    desc: Claude Code config directory path
    unless:
      - id: metadata/file/format::adblock-filter-list
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    if:
      type: text
      regex: '["'']\.claude["'']|[\\/]\.claude([\\/]|$)|\.claude[\\/]'
      not:
        - regex: '\.claude[\\/]CLAUDE\.md'

  - id: claude-settings-json
    desc: Claude Code project settings JSON path
    crit: notable
    conf: 0.97
    for: [json]
    if:
      type: path
      regex: '(?i)(^|[\\/])\.claude[\\/]settings\.json$'

  - id: claude-global-settings-path
    desc: Claude Code global settings path
    crit: notable
    conf: 0.96
    for: [python, shell]
    if:
      type: text
      regex: '(?i)(~|[$]HOME)[\\/]\.claude[\\/]settings\.json|Path\.home\(\)\s*/\s*["'']\.claude["'']'

  - id: gemini-config-directory
    desc: Gemini CLI config directory path
    if:
      type: text
      regex: '["'']\.gemini["'']|[\\/]\.gemini([\\/]|$)|\.gemini[\\/]'

  - id: codex-config-directory
    desc: Codex config directory path
    if:
      type: text
      regex: '["'']\.codex["'']|[\\/]\.codex([\\/]|$)|\.codex[\\/]'

  - id: codex-global-hooks-path
    desc: Codex global hooks path
    crit: notable
    conf: 0.96
    for: [python, shell]
    if:
      type: text
      regex: '(?i)(~|[$]HOME)[\\/]\.codex[\\/]hooks\.json|Path\.home\(\)\s*/\s*["'']\.codex["'']'

  - id: codex-absolute-config-directory
    desc: Absolute Codex config directory path
    if:
      type: literal
      kind: string
      regex: '[\\/]\.codex$'

  - id: codex-config-toml
    desc: Codex config TOML path
    ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
    if:
      type: text
      regex: '\.codex[\\/]config\.toml|["'']\.codex["'']\s*/\s*["'']config\.toml'

  - id: codex-skills-directory
    desc: Codex skills directory path
    if:
      type: text
      regex: '\.codex[\\/]skills[\\/]'

  - id: agent-root-skills-path
    desc: Builds an AI agent skills path
    crit: notable
    conf: 0.93
    for: [javascript, typescript, python, shell]
    if:
      type: text
      regex: 'path\.join\((agentsDir|claudeDir|H),.{0,80}[''\"]skills[''\"]'

  - id: openclaw-workspace-skills-directory
    desc: OpenClaw workspace skills directory path
    if:
      type: text
      regex: 'workspace-assistant-\$\{[A-Za-z_$][A-Za-z0-9_$]*\}.{0,80}["'']skills["'']'

  - id: ai-plugin-registry-files
    desc: AI plugin registry filenames
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: 'known_marketplaces\.json[\s\S]{0,120}installed_plugins\.json'

  - id: claude-commands-directory
    desc: Claude commands directory path
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    unless:
      - id: metadata/file/format::adblock-filter-list
    if:
      type: text
      regex: '\.claude[\\/]commands[\\/]'

  - id: opencode-skills-directory
    desc: OpenCode skills directory path
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    if:
      type: text
      regex: '\.opencode[\\/]skills[\\/]'

  - id: gemini-antigravity-skills-directory
    desc: Gemini Antigravity skills directory path
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    if:
      type: text
      regex: '\.gemini[\\/]antigravity[\\/]skills[\\/]'

  - id: windsurf-config-directory
    desc: Windsurf config directory path
    if:
      type: text
      regex: '[\\/]\.windsurf([\\/]|$)|\.codeium[\\/]windsurf'

  - id: windsurf-quoted-config-directory
    desc: Windsurf quoted config directory
    if:
      type: text
      regex: '["'']\.windsurf["'']|\.windsurf[\\/]'

  - id: pearai-config-directory
    desc: PearAI config directory path
    if:
      type: text
      regex: '["'']\.pearai["'']|[\\/]\.pearai([\\/]|$)|\.pearai[\\/]'

  - id: eigent-config-directory
    desc: Eigent config directory path
    if:
      type: text
      regex: '["'']\.eigent["'']|[\\/]\.eigent([\\/]|$)|\.eigent[\\/]'

  - id: mcp-json-filename
    desc: MCP config filename
    crit: component
    if:
      type: text
      word: mcp.json

  - id: mcp-config-json-filename
    desc: Windsurf MCP config filename
    crit: component
    if:
      type: text
      word: mcp_config.json

  - id: agent-instruction-file
    desc: AI agent instruction filename
    if:
      type: basename
      regex: '^(AGENTS|CLAUDE|GEMINI)\.md$'

  - id: claude-desktop-config-path
    desc: Claude Desktop configuration file path
    crit: notable
    conf: 0.96
    if:
      type: text
      # Require path/IO context; a help paragraph that merely names the
      # configuration file is not a file-path operation.
      regex: '(?i)\b(path|open|read|write)\b.{0,120}claude[_-]desktop[_-]config\.json'

  # Claude Code hook *protocol* behaviors (PreToolUse, UserPromptSubmit, updatedInput,
  # hookSpecificOutput, …) live in micro-behaviors/communications/ipc/agent-hook/ —
  # they are agent IPC, not config paths. This file keeps only config-path detections.

  - id: codex-hook-script
    desc: Codex hook script path
    if:
      type: text
      regex: '\.codex[\\/]hooks[\\/].{1,120}\.sh'

composite_rules:
  - id: ai-coding-tool-config-directory-cluster
    desc: Multiple AI coding tool config directories
    crit: notable
    conf: 0.92
    needs: 2
    unless:
      - id: metadata/file/format::adblock-filter-list
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    any:
      - id: cursor-config-directory
      - id: claude-config-directory
      - id: gemini-config-directory
      - id: codex-config-directory
      - id: windsurf-config-directory
      - id: windsurf-quoted-config-directory
      - id: pearai-config-directory
      - id: eigent-config-directory

  - id: mcp-client-config-target
    desc: AI MCP client config target
    crit: notable
    conf: 0.92
    unless:
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    all:
      - id: ai-coding-tool-config-directory-cluster
    any:
      - id: mcp-json-filename
      - id: mcp-config-json-filename

  - id: claude-mcp-json-target
    desc: Claude MCP JSON config target
    crit: notable
    conf: 0.94
    ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
    unless:
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    all:
      - id: claude-config-directory
      - id: mcp-json-filename

  - id: codex-mcp-toml-target
    desc: Codex MCP TOML config target
    crit: notable
    conf: 0.94
    ref: sha256:a709234609a3c0423f68d9ebc1c219f349879cb4f29786d2d5e797e6b098cfd3
    all:
      - id: codex-config-toml
      - id: micro-behaviors/communications/ipc/mcp::mcp-client-config-key--mcp-servers-toml

  - id: ai-agent-skill-install-directory
    desc: AI agent skill install directory
    crit: notable
    conf: 0.93
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    any:
      - id: codex-skills-directory
      - id: claude-commands-directory
      - id: agent-root-skills-path
      - id: opencode-skills-directory
      - id: gemini-antigravity-skills-directory
