defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
traits:
  - id: laravel-base-path
    desc: Laravel application base path
    conf: 0.85
    if:
      type: symbol
      exact: base_path

  - id: laravel-package-web-routes-path
    desc: Laravel package web routes path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \.\./routes/web\.php
