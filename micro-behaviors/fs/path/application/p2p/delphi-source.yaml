# P2P application registry keys and share manipulation
# Kazaa/Morpheus share directory registration from Delphi source
defaults:
  platforms: [windows]
  for: [pe, c, cpp, csharp]
traits:
  - id: kazaa-localcontent-key
    desc: Kazaa LocalContent registry key
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "Kazaa\\LocalContent"
  - id: morpheus-localcontent-key
    desc: Morpheus LocalContent registry key
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "Morpheus\\LocalContent"
  - id: shareaza-transfers-key
    desc: Shareaza Transfers registry key
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "\\software\\Shareaza\\Shareaza\\Transfers"
  - id: limewire-install-key
    desc: LimeWire install registry key
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: "\\software\\LimeWire"
  - id: xolox-share-key
    desc: Xolox share registry key
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: "\\software\\Xolox"
  - id: morpheus-uninstall-key
    desc: Morpheus uninstall registry key
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "Windows\\CurrentVersion\\Uninstall\\Morpheus 2.0"
  - id: edonkey-uninstall-key
    desc: eDonkey uninstall registry key
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "Windows\\CurrentVersion\\Uninstall\\eDonkey2000"
  - id: disable-sharing-toggle
    desc: P2P file sharing forcefully enabled
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "DisableSharing"
  - id: default-downloads-folder
    desc: Hardcoded My Downloads folder
    crit: notable
    conf: 0.93
    if:
      type: text
      exact: "C:\\My Downloads"
composite_rules:
  - id: p2p-share-registration
    desc: P2P application share directory registration
    crit: suspicious
    conf: 0.96
    any:
      - id: kazaa-localcontent-key
      - id: morpheus-localcontent-key
  - id: p2p-client-registry-sweep
    desc: Legacy P2P client registry sweep
    crit: suspicious
    conf: 0.97
    needs: 3
    any:
      - id: kazaa-localcontent-key
      - id: shareaza-transfers-key
      - id: limewire-install-key
      - id: xolox-share-key
      - id: morpheus-uninstall-key
      - id: edonkey-uninstall-key
