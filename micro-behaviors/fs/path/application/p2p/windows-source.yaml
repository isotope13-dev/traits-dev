defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: legacy-p2p-share-folders-a1
    desc: Legacy P2P folders set A1
    crit: notable
    conf: 0.96
    if:
      type: string_value
      regex: '(?i)\\(KaZaA\\My Shared Folder|edonkey2000\\incoming)\\'
  - id: legacy-p2p-share-folders-a2
    desc: Legacy P2P folders set A2
    crit: notable
    conf: 0.96
    if:
      type: string_value
      regex: '(?i)\\(gnucleus\\downloads|icq\\shared files)\\'
  - id: legacy-p2p-share-folders-b1
    desc: Legacy P2P folders set B1
    crit: notable
    conf: 0.96
    if:
      type: string_value
      regex: '(?i)\\(kazaa lite\\my shared folders|limewire\\shared)\\'
  - id: legacy-p2p-share-folders-b2
    desc: Legacy P2P folders set B2
    crit: notable
    conf: 0.96
    if:
      type: string_value
      regex: '(?i)\\(morpheus\\my shared folder|Grokster\\My Grokster)\\'
  - id: deceptive-lure-names-a1
    desc: Crack and serial lure names set A1
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      regex: "(?i)(Antivirus Crack|No CD Crack|Visual Studio Net Serial)"
  - id: deceptive-lure-names-a2
    desc: Crack and serial lure names set A2
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      regex: "(?i)(Office 2003 Serial|Serial Key(gen)?)"
  - id: deceptive-lure-names-a3
    desc: Crack and serial lure names set A3
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)(Keygen|Key Generator)"
  - id: deceptive-lure-names-b
    desc: Social engineering lure names
    crit: suspicious
    conf: 0.97
    count_min: 2
    if:
      type: string_value
      regex: '(?i)(Shakira Sucks\.jpg|Sexy Bikini|Office 2003 Serial)'
composite_rules:
  - id: legacy-p2p-share-folders-a
    desc: Legacy P2P share folders set A
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: legacy-p2p-share-folders-a1
      - id: legacy-p2p-share-folders-a2
  - id: legacy-p2p-share-folders-b
    desc: Legacy P2P share folders set B
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: legacy-p2p-share-folders-b1
      - id: legacy-p2p-share-folders-b2
  - id: common-p2p-share-folders
    desc: Multiple P2P share folders
    crit: notable
    conf: 0.97
    all:
      - id: legacy-p2p-share-folders-a
      - id: legacy-p2p-share-folders-b
  - id: deceptive-lure-names-a
    desc: Crack and serial lure names
    crit: suspicious
    conf: 0.97
    needs: 2
    any:
      - id: deceptive-lure-names-a1
      - id: deceptive-lure-names-a2
      - id: deceptive-lure-names-a3
  - id: deceptive-lure-names
    desc: Multiple deceptive worm lure names
    crit: suspicious
    conf: 0.98
    all:
      - id: deceptive-lure-names-a
      - id: deceptive-lure-names-b
