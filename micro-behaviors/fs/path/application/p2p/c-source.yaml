# P2P application paths in C source code
# Worms read P2P shared folder paths from registry (often ROT13-encoded)
defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: kazaa-registry-path
    desc: KaZaA registry path in source
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: 'Kazaa\Transfer'
  - id: kazaa-registry-path-rot13
    desc: ROT13-encoded KaZaA registry path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: 'Xnmnn\\Genafsre'
  - id: p2p-lure-names-rot13
    desc: ROT13-encoded P2P worm lure names
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "npgvingvba_penpx"
