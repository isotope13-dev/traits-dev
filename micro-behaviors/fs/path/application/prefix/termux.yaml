defaults:
  platforms: [android, unix]
  for: [shell, javascript, elf]
  crit: component
  conf: 0.9
traits:
  - id: termux-usr-prefix
    desc: Termux usr prefix path
    if:
      type: text
      substr: "/data/data/com.termux/files/usr"
  - id: termux-usr-bin
    desc: Termux usr bin path
    if:
      type: text
      substr: "/data/data/com.termux/files/usr/bin"
  - id: termux-usr-library
    desc: Termux usr library path
    if:
      type: text
      substr: "/data/data/com.termux/files/usr/lib"
composite_rules:
  - id: termux-install-paths
    desc: Termux install destination paths
    crit: baseline
    conf: 0.9
    any:
      - id: termux-usr-prefix
      - id: termux-usr-bin
      - id: termux-usr-library
