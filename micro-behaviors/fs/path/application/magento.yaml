# Magento-related path indicators
# Useful for detecting malware targeting Magento e-commerce platforms
defaults:
  platforms: [linux, unix, macos, android, ios]
traits:
  - id: media-path
    desc: Navigation to Magento pub/media directory
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: 'cd\s+pub;\s*cd\s+media'
