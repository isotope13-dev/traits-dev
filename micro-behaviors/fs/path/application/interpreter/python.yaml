defaults:
  platforms: [windows]
  for: [python]

traits:
  - id: python-appdata-interpreter-path
    desc: Python AppData interpreter path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'AppData\\Local\\Programs\\Python'

  - id: python-interpreter-lib-directory
    desc: Python interpreter Lib directory
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'Lib\'

  - id: python-interpreter-version
    desc: Python interpreter version marker
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)Python[0-9]{2,4}'

  - id: python-multiple-windows-user-paths
    desc: Multiple Windows user path markers
    crit: notable
    conf: 0.88
    count_min: 3
    if:
      type: text
      substr: Users

composite_rules:
  - id: python-installed-library-path
    desc: Installed Python library path
    crit: notable
    conf: 0.92
    all:
      - id: python-appdata-interpreter-path
      - id: python-interpreter-version
      - id: python-interpreter-lib-directory
