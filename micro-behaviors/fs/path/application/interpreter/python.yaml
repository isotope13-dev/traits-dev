defaults:
  platforms: [windows]
  for: [python]

traits:
  - id: python-appdata-interpreter-path
    desc: Python AppData interpreter path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'AppData\\Local\\Programs\\Python'

  - id: python-interpreter-lib-directory
    desc: Python interpreter Lib directory
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'Lib\'

  - id: python-interpreter-version
    desc: Python interpreter version marker
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)Python[0-9]{2,4}'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-multiple-windows-user-paths
    desc: References multiple Windows user-profile paths
    crit: notable
    conf: 0.88
    count_min: 3
    if:
      type: text
      # A complete user path is meaningful; the bare word "Users" is common
      # in documentation and examples.
      # The boundary before a drive letter avoids treating escaped text such
      # as `approach:\n\n` as an `H:\n\` path.
      regex: '(?i)(\b[A-Z]:[\\/]|[\\/]Users[\\/])[A-Za-z0-9._-]+[\\/]'

composite_rules:
  - id: python-installed-library-path
    desc: Installed Python library path
    crit: notable
    conf: 0.92
    all:
      - id: python-appdata-interpreter-path
      - id: python-interpreter-version
      - id: python-interpreter-lib-directory
