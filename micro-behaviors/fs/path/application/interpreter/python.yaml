defaults:
  platforms: [windows]
  for: [python]

traits:
  - id: python-appdata-interpreter-path
    desc: Python AppData interpreter path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'AppData\\Local\\Programs\\Python'

  - id: python-interpreter-lib-directory
    desc: Python interpreter Lib directory
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'Lib\'

  - id: python-interpreter-version
    desc: Versioned Python interpreter path
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      regex: '(?i)(^|[\\/])Python[0-9]{2,4}([\\/]|\.exe\b)'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-multiple-windows-user-paths
    desc: References multiple Windows user-profile paths
    crit: notable
    conf: 0.88
    count_min: 3
    if:
      type: text
      # Require the profile-directory component.  Generic drive paths such
      # as `C:\\path\\to` occur routinely in documentation and are not
      # references to a Windows user's files.
      regex: '(?i)(\b[A-Z]:[\\/]Users[\\/]|[\\/]Users[\\/])[A-Za-z0-9._-]+[\\/]'

composite_rules:
  - id: python-installed-library-path
    desc: Installed Python library path
    crit: notable
    conf: 0.92
    all:
      - id: python-appdata-interpreter-path
      - id: python-interpreter-version
      - id: python-interpreter-lib-directory
