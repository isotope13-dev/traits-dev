defaults:
  attack: T1083
  mbc: E1083
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - macos

traits:
  - id: application-macos
    desc: "/Applications/*.app/Contents/MacOS/ path"
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /Applications/[\w\s.\-]+\.app/Contents/MacOS/[\w.\-]+
