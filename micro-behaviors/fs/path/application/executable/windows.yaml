defaults:
  platforms: [windows]
  for: [scripts, source]
  crit: notable
  conf: 0.86

traits:
  - id: appdata-exe-path
    desc: Windows AppData executable path
    attack: T1083
    mbc: E1083
    if:
      type: text
      regex: '(APPDATA|LOCALAPPDATA|%APPDATA%|%LOCALAPPDATA%)[\s\S]{0,220}\.exe'
