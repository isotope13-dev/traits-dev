defaults:
  attack: T1083
  mbc: E1083
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - macos
traits:
  - id: firefox-extensions
    desc: Firefox/extensions directory path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: Firefox/extensions
  - id: safari-extensions
    desc: Safari/Extensions directory path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: Safari/Extensions
  - id: chrome-extensions-dir
    desc: Chrome browser extensions directory path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Chrome/Default/Extensions/
  - id: brave-extensions-dir
    desc: Brave browser extensions directory path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Brave-Browser/Default/Extensions/
  - id: edge-extensions-dir
    desc: "MS Edge browser extensions dir path"
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Microsoft Edge/Default/Extensions/
  - id: opera-extensions-dir
    desc: Opera browser extensions directory path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: com.operasoftware.Opera/Extensions/
  - id: vivaldi-extensions-dir
    desc: Vivaldi browser extensions directory path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Vivaldi/Default/Extensions/
  - id: arc-extensions-dir
    desc: Arc browser extensions directory path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Arc/User Data/Default/Extensions/
  - id: chrome-directory
    desc: Google/Chrome directory path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Google/Chrome
  - id: arc-profile-path
    desc: Arc browser profile path
    crit: notable
    conf: 0.8
    for: [python, applescript]
    if:
      type: text
      substr: Arc/User Data
composite_rules:
  - id: application-browser-extensions
    desc: Browser extension paths
    crit: suspicious
    conf: 0.66
    any:
      - id: firefox-extensions
      - id: safari-extensions
      - id: chrome-extensions-dir
      - id: brave-extensions-dir
      - id: edge-extensions-dir
      - id: opera-extensions-dir
      - id: vivaldi-extensions-dir
      - id: arc-extensions-dir
