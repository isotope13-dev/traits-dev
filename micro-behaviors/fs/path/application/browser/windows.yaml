defaults:
  mbc: E1083
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: tencent-qqbrowser-path
    desc: Tencent QQBrowser directory path
    crit: notable
    conf: 0.8
    attack: T1083
    if:
      type: text
      regex: (?i)Tencent\\\\QQBrowser
  - id: tencent-qqbrowser-extensions
    desc: Tencent QQBrowser extensions path
    crit: suspicious
    conf: 0.9
    attack: T1547.001
    if:
      type: text
      regex: (?i)Tencent\\\\QQBrowser\\\\User Data\\\\Default\\\\Extensions
  - id: chrome-user-data
    desc: Chrome User Data directory path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)Google\\\\Chrome\\\\User Data
  - id: edge-user-data
    desc: Edge User Data directory path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)Microsoft\\\\Edge\\\\User Data
  - id: browser-extension-storage
    desc: Browser extension storage or profile path
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)User Data\\\\.{1,30}\\\\Extensions\\\\
  - id: firefox-profiles-ini-path
    desc: Firefox profiles.ini path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: (?i)Mozilla\\\\Firefox\\\\profiles\.ini
  - id: firefox-proxy-type-pref
    desc: Firefox proxy type preference
    crit: component
    conf: 0.86
    if:
      type: text
      exact: network.proxy.type
  - id: firefox-proxy-http-pref
    desc: Firefox HTTP proxy preference
    crit: component
    conf: 0.86
    if:
      type: text
      exact: network.proxy.http
  - id: firefox-proxy-port-pref
    desc: Firefox proxy port preference
    crit: component
    conf: 0.86
    if:
      type: text
      exact: network.proxy.http_port
  - id: firefox-proxy-autoconfig-pref
    desc: Firefox proxy autoconfig preference
    crit: component
    conf: 0.86
    if:
      type: text
      exact: network.proxy.autoconfig_url
composite_rules:
  - id: firefox-proxy-config-reference
    desc: Firefox proxy configuration reference
    crit: notable
    conf: 0.9
    all:
      - id: firefox-profiles-ini-path
    any:
      - id: firefox-proxy-type-pref
      - id: firefox-proxy-http-pref
      - id: firefox-proxy-port-pref
      - id: firefox-proxy-autoconfig-pref
    needs: 2
