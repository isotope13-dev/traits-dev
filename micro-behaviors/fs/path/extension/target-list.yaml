defaults:
  platforms: [windows, unix]
  for: [binaries]

# Filename extension vocabulary is neutral.  A file type token can occur in a
# MIME table, archive utility, document viewer, or a ransomware target list;
# the objective tier composes the specifically delimited list forms.
traits:
- id: extension-target-list-office-word
  desc: Pipe-delimited Word filename extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(doc|docx)\|
    case_insensitive: true
- id: extension-target-list-office-excel
  desc: Pipe-delimited Excel filename extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(xls|xlsx)\|
    case_insensitive: true
- id: extension-target-list-office-ppt
  desc: Pipe-delimited PowerPoint extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(ppt|pptx)\|
    case_insensitive: true
- id: extension-target-list-data
  desc: Pipe-delimited data filename extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(pdf|sql|db)\|
    case_insensitive: true
- id: extension-target-list-code
  desc: Pipe-delimited code filename extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(java|cpp|py)\|
    case_insensitive: true
- id: ext-vmdk
  desc: VMware disk VMDK filename extension token
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.vmdk([|,; ]|$)
    case_insensitive: true
composite_rules:
- id: extension-target-list
  desc: Pipe-delimited filename extension list
  crit: notable
  conf: 0.85
  needs: 3
  any:
  - id: extension-target-list-office-word
  - id: extension-target-list-office-excel
  - id: extension-target-list-office-ppt
  - id: extension-target-list-data
  - id: extension-target-list-code
