defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: baseline
  conf: 0.5
traits:
  - id: js-executable-extension-check
    desc: JavaScript checks for .exe extension
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: endsWith\(['"]\.(exe)['"]\)
  - id: java-executable-reference
    desc: Java bytecode references an executable path
    crit: notable
    conf: 0.92
    for: [class, jar, zip]
    if:
      type: value
      path: class.strings[*]
      regex: '(?i)\.exe$'
  - id: exe-dup
    desc: References a Windows .exe filename or extension
    crit: baseline
    if:
      type: text
      word: .exe
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: dll-dup
    desc: .dll extension reference
    crit: baseline
    if:
      type: text
      word: .dll
  - id: bat-dup
    desc: .bat extension reference
    crit: component
    platforms: [windows]
    if:
      type: text
      regex: \.bat\b
    not:
      - substr: '*.bat'
      - substr: Batch Script (*.bat)|*.bat
      - substr: VsDevCmd.bat
  - id: cmd-dup
    desc: .cmd extension reference
    crit: baseline
    platforms: [windows]
    if:
      type: text
      regex: '\.cmd(\s|["'';,)]|$)'
    unless:
      - id: well-known/lib/mime-db::javascript-mime-extension-map
  - id: ps1
    desc: .ps1 extension reference
    crit: baseline
    platforms: [windows]
    if:
      type: text
      regex: \.ps1\b
    not:
      - substr: '"version":3,"file":'
      - regex: (^|[\\/]).+\.map$
      - substr: IdentifyConsole.ps1
      - substr: profile.ps1
      - substr: process.env.CMDER_ROOT
      - substr: "vendor', 'profile.ps1"
      - substr: "process.env.CMDER_ROOT, 'vendor', 'profile.ps1'"
      - substr: ConinMode.ps1
      - substr: IdentifyConsoleWindow.ps1
      - substr: endsWith('.ps1')
      - substr: opAsPath.endsWith('.ps1')
      - substr: builtin-plugins/tabby
      - substr: builtin-plugins/tabby-electron
      - substr: builtin-plugins/tabby-ssh
      - substr: process.env.CMDER_ROOT
      - substr: path.join(process.env.CMDER_ROOT
      - substr: to + ".ps1"
      - substr: to + '.ps1'
  - id: vbs
    desc: .vbs extension reference
    crit: baseline
    platforms: [windows]
    if:
      type: text
      regex: \.vbs\b
  - id: msi
    desc: .msi extension reference
    crit: baseline
    platforms: [windows]
    if:
      type: text
      regex: \.msi\b
composite_rules:
  - id: windows-extension
    desc: Windows executable extension marker
    crit: baseline
    any:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/fs/path/extension::dll-dup
      - id: micro-behaviors/fs/path/extension::bat-dup
      - id: micro-behaviors/fs/path/extension::cmd-dup
      - id: ps1
      - id: vbs
      - id: msi
      - id: micro-behaviors/fs/path/extension::scr-extension
