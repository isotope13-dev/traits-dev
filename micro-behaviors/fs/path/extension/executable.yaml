defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.5
traits:
  - id: exe-dup
    desc: .exe extension reference
    crit: baseline
    if:
      type: text
      word: .exe
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: dll-dup
    desc: .dll extension reference
    crit: baseline
    if:
      type: text
      word: .dll
  - id: bat-dup
    desc: .bat extension reference
    crit: component
    platforms: [windows]
    if:
      type: text
      regex: \.bat\b
    not:
      - substr: '*.bat'
      - substr: Batch Script (*.bat)|*.bat
      - substr: VsDevCmd.bat
  - id: cmd-dup
    desc: .cmd extension reference
    crit: baseline
    platforms: [windows]
    if:
      type: text
      regex: \.cmd\b
  - id: ps1
    desc: .ps1 extension reference
    platforms: [windows]
    if:
      type: text
      regex: \.ps1\b
    not:
      - substr: '"version":3,"file":'
      - regex: (^|[\\/]).+\.map$
      - substr: IdentifyConsole.ps1
      - substr: profile.ps1
      - substr: process.env.CMDER_ROOT
      - substr: "vendor', 'profile.ps1"
      - substr: "process.env.CMDER_ROOT, 'vendor', 'profile.ps1'"
      - substr: ConinMode.ps1
      - substr: IdentifyConsoleWindow.ps1
      - substr: endsWith('.ps1')
      - substr: opAsPath.endsWith('.ps1')
      - substr: builtin-plugins/tabby
      - substr: builtin-plugins/tabby-electron
      - substr: builtin-plugins/tabby-ssh
      - substr: process.env.CMDER_ROOT
      - substr: path.join(process.env.CMDER_ROOT
      - substr: to + ".ps1"
      - substr: to + '.ps1'
  - id: vbs
    desc: .vbs extension reference
    platforms: [windows]
    if:
      type: text
      regex: \.vbs\b
  - id: msi
    desc: .msi extension reference
    crit: baseline
    platforms: [windows]
    if:
      type: text
      regex: \.msi\b
  - id: so
    desc: .so extension reference
    crit: baseline
    if:
      type: text
      regex: \.so\b
composite_rules:
  - id: library-extension
    desc: Library file extension reference (.dll or .so)
    any:
      - id: micro-behaviors/fs/path/extension::dll-dup
      - id: so
  - id: windows-extension
    desc: Windows executable extension reference
    any:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/fs/path/extension::dll-dup
      - id: micro-behaviors/fs/path/extension::bat-dup
      - id: micro-behaviors/fs/path/extension::cmd-dup
      - id: ps1
      - id: vbs
      - id: msi
      - id: micro-behaviors/fs/path/extension::scr-extension
