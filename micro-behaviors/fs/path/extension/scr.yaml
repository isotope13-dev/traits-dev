defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: scr-extension
    desc: '.scr (Win Screensaver EXE) extension'
    crit: notable
    if:
      type: text
      regex: (?i)(^|[\\/])[^\\/]{1,64}\.scr$
    unless:
      - id: metadata/file/magic::pe-dos-stub
      - id: metadata/file/magic::elf-header
      - id: metadata/file/magic::macho-64
      - id: metadata/file/magic::zip-archive
      - id: metadata/file/magic::tar-ustar
      - id: metadata/file/magic::gzip
