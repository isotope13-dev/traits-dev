defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: scr-extension
    desc: Detects .scr (Windows Screensaver Executable) extension
    crit: notable
    if:
      type: text
      regex: (?i)(?:^|[\\/])[^\\/]{1,64}\.scr$
    unless:
      - id: metadata/file/magic::pe
      - id: metadata/file/magic::elf
      - id: metadata/file/magic::macho
      - id: metadata/file/magic::zip
      - id: metadata/file/magic::tar
      - id: metadata/file/magic::gzip
