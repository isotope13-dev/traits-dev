defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: case-insensitive-lower-asm
    conf: 0.8
    crit: notable
    desc: 'case insensitive lower asm'
    if:
      type: text
      regex: or e[abcd]x, [0-9a-fA-F]+h?.{0,120}cmp e([abcd]x|[sd]i), ["'][^"']{1,120}["']
composite_rules: []
