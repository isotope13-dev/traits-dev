defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, perl, pe]

traits:
  - id: database-file-extension-reference
    desc: References a .db database filename extension
    crit: component
    conf: 0.55
    if:
      type: text
      regex: '\.db\b|["'']\.db["'']'
    unless:
      - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: sqlite-file-extension-reference
    desc: References a .sqlite database filename extension
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '\.sqlite\b|["'']\.sqlite["'']'
