defaults:
  platforms: [windows, unix]
  for: [scripts, html]
  crit: component
  conf: 0.7

traits:
  - id: js-reference
    desc: JavaScript extension reference
    for: [javascript, typescript, html]
    if:
      type: text
      regex: '["''][^"''\n]{1,120}\.js["'']'
    unless:
      - type: text
        regex: 'https?://[^"''\s]+\.js\b'
