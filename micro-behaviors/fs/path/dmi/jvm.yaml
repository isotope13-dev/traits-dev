defaults:
  platforms: [unix, appliance, routeros]
  crit: component
traits:
  - id: product-name-string
    desc: JVM source contains the DMI product-name path
    conf: 0.9
    for: [java, kotlin]
    if:
      type: string_literal
      exact: /sys/class/dmi/id/product_name

  - id: vendor-path-string
    desc: JVM source contains a DMI vendor path
    conf: 0.9
    for: [java, kotlin]
    if:
      type: text
      regex: '/sys/class/dmi/id/(sys_vendor|bios_vendor|board_vendor)'

  - id: product-name-bytecode
    desc: JVM bytecode contains the DMI product-name path
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 73 79 73 2F 63 6C 61 73 73 2F 64 6D 69 2F 69 64 2F 70 72 6F 64 75 63 74 5F 6E 61 6D 65

  - id: system-vendor-bytecode
    desc: JVM bytecode contains DMI system-vendor path
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 73 79 73 2F 63 6C 61 73 73 2F 64 6D 69 2F 69 64 2F 73 79 73 5F 76 65 6E 64 6F 72
