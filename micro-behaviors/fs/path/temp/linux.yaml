defaults:
  for:
  - elf
  - macho
  - shell
  - python
  - lua
  platforms:
  - linux
  - macos
traits:
- id: tmp-path-content
  desc: /tmp/ path component
  if:
    type: text
    regex: (/tmp/|/var/tmp/)[\w\.\-/]+
  not:
  - /tmp/out.
  - /tmp/out.zip
  - /tmp/analysis
  - /tmp/autosymbiontic
  - /tmp/.X11-unix
  - /var/tmp/.
- id: hidden-tmp-path
  desc: Hidden path prefix in /tmp
  if:
    type: text
    substr: /tmp/.
- id: var-tmp-hidden
  desc: Hidden file in /var/tmp
  crit: suspicious
  conf: 0.7
  # Capture the full hidden filename (not just the /var/tmp/. prefix) so the `not`
  # exclusion can match the whole path — xfs_fsr's benign /var/tmp/.fsrlast_xfs
  # state file was slipping through because the matched span was only the prefix.
  if:
    type: text
    regex: '/var/tmp/\.[A-Za-z0-9_][A-Za-z0-9_.-]*'
  not:
  - substr: /var/tmp/.fsrlast_xfs
- id: dev-shm-hidden--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  platforms:
  - linux
  if:
    type: text
    substr: dev/shm
  count_max: 1026199
- id: dev-shm-hidden--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  platforms:
  - linux
  if:
    type: text
    substr: rootf
  count_max: 1026200
composite_rules:
- id: temp-tmp
  desc: Reference to /tmp
  crit: baseline
  conf: 0.66
  all:
  - id: micro-behaviors/fs/path/temp::unix-temp
  - id: tmp-path-content
- id: temp-var-tmp
  desc: Reference to /var/tmp
  crit: baseline
  conf: 0.66
  all:
  - id: micro-behaviors/fs/path/temp::unix-var-temp
  - id: tmp-path-content
- id: tmp-hidden-file
  desc: Hidden file path in /tmp directory
  crit: notable
  conf: 0.75
  attack: T1564.001
  all:
  - id: micro-behaviors/fs/path/temp::unix-temp
  - id: hidden-tmp-path
- id: dev-shm-hidden
  desc: Hidden file in /dev/shm
  crit: suspicious
  conf: 0.7
  platforms:
  - linux
  any:
  - id: dev-shm-hidden--rx-1
  - id: dev-shm-hidden--rx-2
  unless:
  - id: well-known/tool/reverse-engineering/frida/
