defaults:
  for:
    - elf
    - shell
    - python
  platforms:
    - linux
    - macos
traits:
  - id: tmp-path-content
    desc: /tmp/ path component
    if:
      type: text
      regex: (/tmp/|/var/tmp/)[\w\.\-/]+
    not:
      - /tmp/out.
      - /tmp/out.zip
      - /tmp/analysis
      - /tmp/autosymbiontic
      - /tmp/.X11-unix
      - /var/tmp/.
  - id: hidden-tmp-path
    desc: Hidden path prefix in /tmp
    if:
      type: text
      substr: /tmp/.
  - id: var-tmp-hidden
    desc: Hidden file in /var/tmp
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /var/tmp/.
  - id: dev-shm-hidden
    desc: Hidden file in /dev/shm
    crit: suspicious
    conf: 0.7
    platforms:
      - linux
    if:
      type: text
      regex: /dev/shm/\.(?:[^r]|r[^o]|ro[^o]|roo[^t]|root[^f]|rootf[^s])[\w.-]*
composite_rules:
  - id: temp-tmp
    desc: Reference to /tmp
    crit: baseline
    conf: 0.66
    all:
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: tmp-path-content
  - id: temp-var-tmp
    desc: Reference to /var/tmp
    crit: baseline
    conf: 0.66
    all:
      - id: micro-behaviors/fs/path/temp::unix-var-temp
      - id: tmp-path-content
  - id: tmp-hidden-file
    desc: Hidden file path in /tmp directory
    crit: notable
    conf: 0.75
    attack: T1564.001
    all:
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: hidden-tmp-path
