# Neutral temp-directory path references in Go. os.TempDir(), /tmp/,
# /var/tmp/, /dev/shm/ are ubiquitous in legitimate Go code (build caches,
# scratch files, sockets). Objective composites reference this cross-directory
# and supply the malicious context.
defaults:
  platforms: [linux, macos, windows]
  for: [go]
traits:
  - id: go-temp-path-ref
    desc: Go temp path reference
    crit: component
    conf: 0.8
    if:
      type: text
      regex: os\.TempDir\(\)|/tmp/|/var/tmp/|/dev/shm/
