defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: get-temp-path-call
    desc: Path.GetTempPath call in C#
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: Path.GetTempPath
  - id: get-temp-path-raw
    desc: Path.GetTempPath source call
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: Path.GetTempPath()
  - id: get-random-file-name-call
    desc: Path.GetRandomFileName call in C#
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: Path.GetRandomFileName
  - id: get-random-file-name-raw
    desc: Path.GetRandomFileName source call
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: Path.GetRandomFileName()
  - id: test-filename
    desc: Test file basename in C#
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)(Tests|Factory)\.cs$'
  - id: xunit-fact-attribute
    desc: xUnit fact attribute marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "[Fact]"
  - id: jellyfin-test-data
    desc: Jellyfin test data marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "jellyfin-test-data"
composite_rules:
  - id: temp-randomized-drop-path
    desc: Randomized file path in temp
    crit: notable
    conf: 0.93
    all:
      - id: temp-path-any
      - id: random-file-any
    unless:
      - id: test-filename
      - id: xunit-fact-attribute
      - id: jellyfin-test-data
  - id: temp-path-any
    desc: Temp path helper in C#
    crit: notable
    conf: 0.91
    any:
      - id: get-temp-path-call
      - id: get-temp-path-raw
  - id: random-file-any
    desc: Random file helper in C#
    crit: notable
    conf: 0.91
    any:
      - id: get-random-file-name-call
      - id: get-random-file-name-raw
