defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.7
traits:
  - id: unix-temp
    desc: Unix /tmp/ path reference
    if:
      type: text
      substr: /tmp/
  - id: unix-var-temp
    desc: Unix /var/tmp/ path reference
    if:
      type: text
      substr: /var/tmp/
  - id: unix-var-temp-fragment
    desc: Unix var/tmp path fragment
    if:
      type: text
      substr: var/tmp
  - id: win-temp-env
    desc: Windows %TEMP% or %TMP% environment reference
    if:
      type: text
      regex: (?i)%(TEMP|TMP)%
  - id: win-temp-path
    desc: Windows Temp directory path
    if:
      type: text
      regex: (?i)\\Temp
  - id: word-temp-staging-file
    desc: Word-like temp staging filename
    crit: suspicious
    conf: 0.9
    platforms:
      - windows
    if:
      type: text
      regex: (?i)^~WRD[0-9]{4}\.tmp$
  - id: java-tmpdir-property
    desc: Java tmpdir system property
    crit: baseline
    conf: 0.7
    for: [class, jar, zip, java]
    if:
      type: raw
      exact: java.io.tmpdir
  - id: rust-temp-dir
    desc: Rust std::env::temp_dir reference
    crit: baseline
    conf: 0.8
    for: [rust]
    if:
      type: text
      regex: 'std::env::temp_dir|env::temp_dir'
composite_rules:
  - id: any-temp-path
    desc: Any temporary directory path reference
    any:
      - id: unix-temp
      - id: unix-var-temp
      - id: win-temp-env
      - id: win-temp-path
      - id: java-tmpdir-property
      - id: rust-temp-dir
