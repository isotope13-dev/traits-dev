# Temporary Path Patterns
# Detects common temporary file and directory paths
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: notable
  conf: 0.7
traits:
  - id: unix-temp
    desc: Unix /tmp/ path reference
    if:
      type: string
      substr: "/tmp/"
  - id: unix-var-temp
    desc: Unix /var/tmp/ path reference
    if:
      type: string
      substr: "/var/tmp/"
  - id: win-temp-env
    desc: Windows %TEMP% or %TMP% environment reference
    if:
      type: string
      regex: '(?i)%TMP%'
  - id: win-temp-path
    desc: Windows Temp directory path
    if:
      type: string
      regex: '(?i)\\Temp'
  - id: word-temp-staging-file
    desc: Word-like temp staging filename
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    if:
      type: string
      regex: '(?i)^~WRD[0-9]{4}\.tmp$'
composite_rules:
  - id: any-temp-path
    desc: Any temporary directory path reference
    any:
      - id: unix-temp
      - id: unix-var-temp
      - id: win-temp-env
      - id: win-temp-path
