defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.7
traits:
  - id: unix-temp
    desc: Unix /tmp/ path reference
    if:
      type: text
      substr: /tmp/
  - id: unix-var-temp
    desc: Unix /var/tmp/ path reference
    if:
      type: text
      substr: /var/tmp/
  - id: unix-var-temp-fragment
    desc: Unix var/tmp path fragment
    if:
      type: text
      substr: var/tmp
  - id: win-temp-env
    desc: Windows %TEMP% or %TMP% environment reference
    if:
      type: text
      regex: (?i)%(TEMP|TMP)%
  - id: win-temp-path
    desc: Windows Temp directory path
    if:
      type: text
      regex: (?i)\\Temp
  - id: word-temp-staging-file
    desc: Word-like temp staging filename
    crit: suspicious
    conf: 0.9
    platforms:
      - windows
    if:
      type: text
      regex: (?i)^~WRD[0-9]{4}\.tmp$
  - id: java-tmpdir-property
    desc: Java tmpdir system property
    crit: baseline
    conf: 0.7
    for: [class, jar, zip, java]
    if:
      type: text
      exact: java.io.tmpdir
  - id: rust-temp-dir
    desc: Rust std::env::temp_dir reference
    crit: baseline
    conf: 0.8
    for: [rust]
    if:
      type: text
      regex: 'std::env::temp_dir|env::temp_dir'
  - id: node-os-tmpdir
    desc: Node.js os.tmpdir() call
    crit: baseline
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: symbol
      exact: os.tmpdir
  - id: dotnet-gettempfilename-token
    desc: .NET temp filename helper
    crit: notable
    conf: 0.86
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: GetTempFileName
  - id: android-local-tmp-path
    desc: Android local tmp path
    crit: component
    conf: 0.88
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      substr: /data/local/tmp
  - id: android-hidden-local-tmp-dotfile
    desc: Android hidden local tmp dotfile
    crit: suspicious
    conf: 0.94
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      regex: '/data/local/tmp/\.[A-Za-z0-9][A-Za-z0-9._-]{1,40}\b'
composite_rules:
  - id: any-temp-path
    desc: Any temporary directory path reference
    any:
      - id: unix-temp
      - id: unix-var-temp
      - id: win-temp-env
      - id: win-temp-path
      - id: java-tmpdir-property
      - id: rust-temp-dir
      - id: node-os-tmpdir
      - id: dotnet-gettempfilename-token
      - id: android-local-tmp-path
      - id: android-hidden-local-tmp-dotfile
