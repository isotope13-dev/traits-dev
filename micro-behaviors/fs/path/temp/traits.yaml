defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.7
traits:
  - id: temporary-directory-candidate-loop
    desc: Shell loops over temporary directory candidates
    crit: notable
    conf: 0.9
    for: [shell]
    platforms: [unix]
    if:
      type: text
      regex: '(?m)^\s*for\s+\w+\s+in\s+.{0,160}/(tmp|var/tmp|dev/shm)'
  - id: unix-temp
    desc: Unix /tmp/ path reference
    if:
      type: text
      substr: /tmp/
  - id: unix-var-temp
    desc: Unix /var/tmp/ path reference
    if:
      type: text
      substr: /var/tmp/
  - id: unix-var-temp-fragment
    desc: Unix var/tmp path fragment
    if:
      type: text
      substr: var/tmp
  - id: tmp-zip-path
    desc: Temporary directory ZIP path reference
    crit: notable
    conf: 0.6
    if:
      type: literal
      regex: /tmp/.{0,50}\.zip
  - id: tmp-out-zip
    desc: /tmp/out.zip path reference
    crit: notable
    conf: 0.6
    if:
      type: literal
      substr: /tmp/out.zip
  - id: tmp-tar-path
    desc: Temporary directory path ending in .tar
    crit: notable
    conf: 0.6
    for: [shell, source]
    if:
      type: text
      regex: /tmp/.{0,50}\.tar\b
  - id: tmp-gz-path
    desc: Temporary directory path ending in .gz
    crit: notable
    conf: 0.6
    for: [shell, source]
    if:
      type: text
      regex: /tmp/.{0,50}\.gz\b
  - id: var-tmp-zip
    desc: /var/tmp ZIP path reference
    crit: notable
    conf: 0.6
    if:
      type: literal
      regex: /var/tmp/.{0,50}\.zip
  - id: win-temp-env
    desc: Windows %TEMP% or %TMP% environment reference
    if:
      type: text
      regex: (?i)%(TEMP|TMP)%
  - id: win-temp-path
    desc: Windows Temp directory path
    if:
      type: text
      regex: (?i)\\Temp
  - id: word-temp-staging-file
    desc: Word-like temp staging filename
    crit: suspicious
    conf: 0.9
    platforms:
      - windows
    if:
      type: text
      regex: (?i)^~WRD[0-9]{4}\.tmp$
  - id: java-tmpdir-property
    desc: Java temp directory property reference
    crit: baseline
    conf: 0.95
    for: [java]
    if:
      type: text
      substr: java.io.tmpdir
  - id: java-tmpdir-property-class
    desc: Java class reads the temp directory property
    crit: baseline
    conf: 0.95
    for: [class, jar, zip]
    if:
      type: value
      path: class.strings[*]
      exact: java.io.tmpdir
  - id: rust-temp-dir
    desc: Rust std::env::temp_dir reference
    crit: baseline
    conf: 0.8
    for: [rust]
    if:
      type: text
      regex: 'std::env::temp_dir|env::temp_dir'
  - id: node-os-tmpdir
    desc: Node.js os.tmpdir() call
    crit: baseline
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: symbol
      exact: os.tmpdir
  - id: dotnet-gettempfilename-token
    desc: .NET temp filename helper
    crit: notable
    conf: 0.86
    platforms: [windows]
    for: [pe, dll]
    if:
      type: text
      exact: GetTempFileName
  - id: android-local-tmp-path
    desc: Android local tmp path
    crit: component
    conf: 0.88
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      substr: /data/local/tmp
  - id: android-hidden-local-tmp-dotfile
    desc: Android hidden local tmp dotfile
    crit: suspicious
    conf: 0.94
    platforms: [unix, android]
    for: [elf, shell, c, cpp]
    if:
      type: text
      regex: '/data/local/tmp/\.[A-Za-z0-9][A-Za-z0-9._-]{1,40}\b'
  - id: java-temp-png-output-path
    desc: Java File constructor for temporary PNG output
    crit: notable
    conf: 0.82
    platforms: [windows, unix, android]
    for: [java]
    if:
      type: symbol
      kind: call
      exact: File
      arg:
        kind: string
        regex: '(?i)(/tmp/|/var/tmp/|\\temp\\).{0,40}\.png$'

  - id: macos-package-archive-path
    desc: macOS temp or Downloads .pkg path
    crit: notable
    conf: 0.86
    platforms: [macos]
    for: [shell, scripts, source]
    if:
      type: text
      regex: '(?i)(/tmp/|/Downloads/).{0,120}\.pkg\b'
composite_rules:
  - id: any-temp-path
    desc: Any temporary directory path reference
    any:
      - id: unix-temp
      - id: unix-var-temp
      - id: win-temp-env
      - id: win-temp-path
      - id: java-tmpdir-property
      - id: rust-temp-dir
      - id: node-os-tmpdir
      - id: dotnet-gettempfilename-token
      - id: android-local-tmp-path
      - id: android-hidden-local-tmp-dotfile
      - id: java-temp-png-output-path
