defaults:
  platforms: [linux, macos]
  for: [elf, macho, go, shell, python, javascript, typescript]
traits:
# A hardcoded hidden dotfile under /tmp is a stealth artifact: malware stashes
# run-once/state markers (e.g. `/tmp/.base58_detection_sent`, checked to avoid
# re-exfiltrating) and small payloads there so casual `ls /tmp` misses them.
# Kept notable; the benign desktop-socket/lock family (.X11-unix, .ICE-unix,
# .font-unix, .XIM-unix, X server locks) is carved out so it stays clean.
- id: hidden-tmp-state-file
  desc: Hidden dotfile stashed in /tmp
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: '/tmp/\.[A-Za-z0-9][A-Za-z0-9._-]{1,64}'
  not:
    # Benign desktop/IPC sockets and lockfiles that live as hidden /tmp dotfiles.
    - regex: '/tmp/\.[A-Za-z0-9]+-unix'   # .X11-unix .ICE-unix .font-unix .XIM-unix
    - regex: '/tmp/\.X[0-9]+-lock'        # X server display locks
    - regex: '/tmp/\.s\.PGSQL'            # PostgreSQL unix-domain socket
    - regex: '/tmp/\.(pulse|esd|com\.apple)' # audio / macOS system sockets
