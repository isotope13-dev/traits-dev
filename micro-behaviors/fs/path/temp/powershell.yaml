# Temp Path Access in PowerShell
defaults:
  platforms: [windows]
  for: [powershell, pe]
  crit: notable
  conf: 0.9
traits:
  - id: get-temp-path
    desc: Gets temp path
    if:
      type: text
      regex: '(?i)\[System\.IO\.Path\]::\s*GetTempPath'
  - id: env-temp
    desc: "Accesses temp environment variable"
    if:
      type: text
      regex: '(?i)\$env:(TEMP|TMP)\b'
  - id: temp-msi-staging
    desc: Builds TEMP MSI staging path
    if:
      type: text
      regex: '(?i)Join-Path\s+\$env:(TEMP|TMP)\s+[''"].{1,80}\.msi[''"]'
