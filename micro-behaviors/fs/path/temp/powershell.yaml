# Temp Path Access in PowerShell
defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9
traits:
  - id: get-temp-path
    desc: Gets temp path
    if:
      type: text
      regex: '(?i)\[System\.IO\.Path\]::\s*GetTempPath'
  - id: env-temp
    desc: "Accesses temp environment variable"
    if:
      type: text
      regex: '(?i)\$env:(TEMP|TMP)\b'
