defaults:
  for: [shell, python, javascript, powershell, pe, elf]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: system-paths-underscore
    desc: Obfuscated System Paths with underscores
    crit: suspicious
    conf: 0.90
    platforms: [windows]
    if:
      type: string
      regex: '(?i)p_r_o_g_r_a_m_f_i_l_e_s|s_y_s_t_e_m_v_o_l_u_m_e_i_n_f_o_r_m_a_t_i_o_n'
  - id: system-paths-underscore-alt
    desc: Obfuscated System Paths with underscores (Alt)
    crit: suspicious
    conf: 0.90
    platforms: [windows]
    if:
      type: string
      regex: '(?i)pr_og_ra_m_f_il_es|s_y_s_t_e_m_vo_lu_me_inf_orm_a_ti_on'
