defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.88

traits:
  - id: android-dcim-path
    desc: Android DCIM path reference
    if:
      type: text
      substr: "/storage/emulated/0/DCIM"

  - id: android-screenshots-path
    desc: Android screenshots path reference
    if:
      type: text
      substr: "/storage/emulated/0/Screenshots"

  - id: android-media-store-images
    desc: Android MediaStore image access
    if:
      type: text
      substr: "Landroid/provider/MediaStore$Images$Media;"

  - id: android-media-store-video
    desc: Android MediaStore video access
    if:
      type: text
      substr: "Landroid/provider/MediaStore$Video$Media;"

  - id: android-media-store-audio
    desc: Android MediaStore audio access
    if:
      type: text
      substr: "Landroid/provider/MediaStore$Audio$Media;"
