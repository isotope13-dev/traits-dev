# macOS Bundle Path Indicators
# Common in macOS application bundles
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: ["*"]
traits:
  - id: macos-resources-dir
    desc: References macOS Resources directory
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: 'Resources/'
