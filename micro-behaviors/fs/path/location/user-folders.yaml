defaults:
  platforms: [unix]
  for: [scripts]
traits:
- id: desktop-folder-target
  desc: Desktop folder path reference
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (?i)((^|[^A-Za-z0-9_./-])(~|/Users/[^/\\]{1,64})[/\\]Desktop\b|["']Desktop["'])
- id: documents-folder-target
  desc: Documents folder path reference
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (?i)((^|[^A-Za-z0-9_./-])(~|/Users/[^/\\]{1,64})[/\\]Documents\b|["']Documents["'])
- id: downloads-folder-target
  desc: Downloads folder path reference
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (?i)((^|[^A-Za-z0-9_./-])(~|/Users/[^/\\]{1,64})[/\\]Downloads\b|["']Downloads["'])
composite_rules:
- id: common-user-folders
  desc: Multiple common user folders referenced
  crit: notable
  conf: 0.8
  needs: 3
  any:
  - id: desktop-folder-target
  - id: documents-folder-target
  - id: downloads-folder-target
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
