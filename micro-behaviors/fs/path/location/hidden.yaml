defaults:
  platforms: [windows, unix]
  for: [scripts, text]

traits:
  - id: native-hidden-dotdir-path
    desc: Native source names a hidden dot-directory path
    crit: notable
    conf: 0.9
    for: [c, cpp, objc]
    if:
      type: text
      regex: '["'']\\.[A-Za-z0-9_-]{2,80}/'
    not:
      - regex: '["'']\\.(byte|word|long|quad|ascii|asciz|text|data|bss|section|globl|type|size|file|loc|cfi_[A-Za-z0-9_]+)["'']'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: hidden-dir-literal
    desc: References a hidden-directory path literal
    crit: component
    conf: 0.84
    if:
      type: literal
      kind: string
      regex: '(^|/|~/)\.[A-Za-z_][\w-]{0,30}/'
    not:
      - regex: '(^|/|~/)\.(local|venv|virtualenv|tox|nox|cache|config|github|gitlab|circleci|vscode|idea|husky|yarn|pnpm|devcontainer|bin)(/|$)'

  - id: home-hidden-dotdir-ref
    desc: Hidden directory below home shorthand
    crit: notable
    conf: 0.6
    for: [shell, python]
    if:
      type: text
      regex: '(~|\$HOME)/\.[A-Za-z][\w.-]{1,30}/'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format::sourcemap-sources-content

  - id: tilde-hidden-home-path
    desc: References an uncommon hidden home path
    crit: notable
    conf: 0.9
    for: [scripts, source, manifests, dockerfile]
    if:
      type: text
      regex: '(^|[[:space:];&])~/\.[A-Za-z0-9_][A-Za-z0-9._-]*($|[[:space:];&])'
    not:
      - regex: '~/\.(cache|config|local|ssh|aws|gnupg|claude|openclaw|cloudshell|steam|var)(/|$)'
      # The prose may terminate the path with Markdown punctuation (for
      # example ``~/.cache``).  Keep the standard benign home directories
      # excluded even when no slash follows the directory name.
      - regex: '~/\.(cache|config|local|ssh|aws|gnupg|claude|openclaw|cloudshell|steam|var)($|[/[:space:];&])'
      - regex: '~/\.cdk\.json\b'
      - regex: '~/\.buildroot-ccache'
      - regex: '~/\.buildman\b'
      - regex: '~/\.(m2|cargo|rustup|gradle|npm|nuget|ivy2|sbt|gem|bundle|composer|yarn|go|pub-cache|cpan|nvm|rvm|rbenv|sdkman|fnm|volta|deno|bun|pyenv|asdf|pnpm|poetry|nodenv|goenv)(/|$)'
      - regex: '~/\.(bashrc|bash_profile|profile|zshrc|zprofile|kshrc|cshrc|tcshrc|inputrc|gemrc)($|[\s;&|`"'')])'
      - regex: '~/\.[A-Za-z0-9._-]*rc([._-][A-Za-z0-9._-]+)?($|[\s;&|`"'')])'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: env-home-hidden-path
    desc: Hidden path under HOME variable
    crit: notable
    conf: 0.9
    for: [scripts, source, manifests, dockerfile]
    if:
      type: text
      regex: '\$HOME/\.[A-Za-z0-9_][A-Za-z0-9._-]*($|[\s;&|`"'')])'
    not:
      - regex: '\$HOME/\.(cache|config|local|ssh|aws|gnupg|cloudshell|steam|var)(/|$)'
      - regex: '\$HOME/\.buildroot-ccache'
      - regex: '\$HOME/\.(m2|cargo|rustup|gradle|npm|nuget|ivy2|sbt|gem|bundle|composer|yarn|go|pub-cache|cpan|nvm|rvm|rbenv|sdkman|fnm|volta|deno|bun|pyenv|asdf|pnpm|poetry|nodenv|goenv)(/|$)'
      - regex: '\$HOME/\.(bashrc|bash_profile|profile|zshrc|zprofile|kshrc|cshrc|tcshrc|inputrc|gemrc)($|[\s;&|`"'')])'
      - regex: '\$HOME/\.[A-Za-z0-9._-]*rc([._-][A-Za-z0-9._-]+)?($|[\s;&|`"'')])'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - type: text
        substr: .steam/steam
      - type: text
        substr: com.valvesoftware.Steam

  - id: hidden-shell-script-path
    desc: References a dot-prefixed .sh file
    crit: notable
    conf: 0.9
    for: [elf, macho, pe]
    if:
      type: text
      regex: '(^|[[:space:]~/])\.[A-Za-z0-9_-]{3,40}\.sh($|[[:space:];&"''])'
    unless:
      - id: well-known/tool/sysadmin/netch/

  - id: absolute-home-hidden-path
    desc: References absolute hidden home path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '/home/\w+/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
    not:
      - substr: .contrarian-config
      - substr: /home/foo/.trash/
      - substr: XDG_CONFIG_HOME
      - regex: '/home/\w+/\.[A-Za-z0-9][A-Za-z0-9_-]*/containers/auth\.json'
      - regex: '/home/\w+/\.(local|config|cache|cargo|rustup|npm|nvm|pyenv|rbenv|go|gradle|m2|vscode|docker|ssh|wasmer|pki|mitmproxy|openclaw|claude)/'
      - regex: '/home/\w+/\.coord(-venv)?/'
      - regex: '/home/\w+/\.rvm/'
      - regex: '/home/\w+/\.virtualenvs/'
      - substr: /home/linuxbrew/.linuxbrew/
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pyproject-hidden-tmp-command
    desc: PyProject command references hidden /tmp path
    crit: baseline
    conf: 0.9
    for: [pyproject.toml]
    platforms: [linux, macos, windows]
    if:
      type: value
      path: tool.setuptools.cmdclass.build_py
      regex: '/tmp/\.[A-Za-z0-9_][A-Za-z0-9._-]*'

  - id: composer-hidden-tmp-command
    desc: Composer hook references hidden /tmp path
    crit: baseline
    conf: 0.9
    for: [composer.json]
    platforms: [linux, macos, windows]
    if:
      type: value
      path: scripts.post-install-cmd[*]
      regex: '/tmp/\.[A-Za-z0-9_][A-Za-z0-9._-]*'

  - id: usr-share-hidden-path-reference
    desc: References hidden path below /usr/share
    crit: notable
    conf: 0.85
    for: [scripts]
    platforms: [unix]
    if:
      type: literal
      kind: string
      regex: '/usr/share/[^:/\s]{1,30}/\.[^:/\s]{1,30}(/|$)'

composite_rules:
  - id: hidden-writable-path
    desc: Hidden path in writable location
    crit: notable
    conf: 0.9
    for: [scripts, source, manifests, dockerfile, package-lock.json]
    platforms: [linux, macos, windows]
    any:
      - id: micro-behaviors/fs/path/temp::hidden-tmp-path
      - id: pyproject-hidden-tmp-command
      - id: composer-hidden-tmp-command
      - id: micro-behaviors/fs/path/temp::var-tmp-hidden
      - id: micro-behaviors/fs/path/temp::dev-shm-hidden--rx-1
      - id: tilde-hidden-home-path
      - id: env-home-hidden-path
