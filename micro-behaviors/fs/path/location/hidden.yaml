defaults:
  platforms: [windows, unix]
  for: [scripts, text]

traits:
  - id: hidden-dir-literal
    desc: Hidden-directory path string literal
    crit: component
    conf: 0.84
    if:
      type: literal
      kind: string
      regex: '(^|/|~/)\.[A-Za-z_][\w-]{0,30}(/|$)'

  - id: home-hidden-dotdir-ref
    desc: References hidden home directory
    crit: notable
    conf: 0.6
    for: [shell]
    if:
      type: text
      regex: '(~|\$HOME)/\.[A-Za-z][\w.-]+'

  - id: hidden-shell-script-path
    desc: Hidden shell script path
    crit: suspicious
    conf: 0.9
    for: [elf, macho, pe]
    if:
      type: text
      regex: '(^|/|~|[[:space:]])\.[A-Za-z0-9_-]{3,40}\.sh\b'
    unless:
      - id: well-known/tool/sysadmin/netch/
