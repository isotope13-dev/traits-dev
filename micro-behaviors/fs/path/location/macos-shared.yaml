# Neutral macOS shared-directory path references.
# /Users/Shared is a standard multi-user install location (Xcode, GameMaker,
# vendor runtimes). Presence alone is not masquerade intent.
defaults:
  platforms: [macos]
  for: [python, shell, javascript, typescript, rust, go]
  crit: notable

traits:
  - id: users-shared-path
    desc: References /Users/Shared path
    conf: 0.85
    if:
      type: literal
      kind: string
      regex: '(^|/)Users/Shared(/|$)'
  - id: user-library-path
    desc: References the macOS user Library directory
    conf: 0.86
    for: [macho, swift, objc, applescript]
    if:
      type: text
      substr: ~/Library
