defaults:
  for:
    - python
    - javascript
    - powershell
    - pe
  crit: notable
  conf: 0.8
  platforms:
    - windows
  attack: T1204.002
  mbc: F0013
traits:
  - id: path-suspicious-appdata-exe
    desc: Writes executable to %AppData% env var directly
    if:
      type: text
      regex: (?i)%[A-Z0-9_]+%\.exe
  - id: path-suspicious-root-exe
    desc: Writes executable to drive root
    if:
      type: text
      regex: (?i)[C-Z]:\\[^\\]{1,120}\.exe
  - id: path-suspicious-startup
    desc: Writes to Startup folder
    if:
      type: text
      regex: (?i)Start\s+Menu\\Programs\\Startup\\[^\\]{1,120}\.(exe|vbs|js)
  - id: path-suspicious-startup-scripts
    desc: Writes script to Startup folder
    if:
      type: text
      regex: (?i)Start\s+Menu\\Programs\\Startup\\[^\\]{1,120}\.bat
  - id: path-documents-settings-exe
    desc: Documents and Settings executable name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\bDocuments and Settings\.exe\b
  - id: path-program-files-exe
    desc: Program Files executable name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\bProgram Files\.exe\b
  - id: path-system-folder-exe
    desc: System folder executable name
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (?i)\b(System Volume Information|Recycler)\.exe\b
  - id: path-screenshot-album-dir
    desc: Screenshot album staging directory
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: \Screenshot album
  - id: desktop-pb-payload-path
    desc: Desktop protobuf payload path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\\Desktop\\[^\\]{1,32}\.pb
composite_rules:
  - id: path-suspicious-startup-any
    desc: Writes to Startup folder
    crit: notable
    conf: 0.8
    any:
      - id: path-suspicious-startup
      - id: path-suspicious-startup-scripts
  - id: path-directory-name-exe
    desc: Directory-like Windows name with .exe
    crit: suspicious
    conf: 0.9
    any:
      - id: path-documents-settings-exe
      - id: path-program-files-exe
      - id: path-system-folder-exe
  - id: path-screenshot-album-payload
    desc: Screenshot album directory combined with executable payload reference
    crit: suspicious
    conf: 0.98
    all:
      - id: path-screenshot-album-dir
      - id: micro-behaviors/fs/path/extension::exe-dup
