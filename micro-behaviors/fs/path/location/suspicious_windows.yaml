defaults:
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  platforms:
    - windows
  attack: T1204.002
  mbc: F0013
traits:
  - id: path-suspicious-appdata-exe
    desc: "Writes exe to %AppData% env var directly"
    if:
      type: text
      regex: (?i)%[A-Z0-9_]+%\.exe
  - id: path-suspicious-root-exe
    desc: Writes executable to drive root
    if:
      type: text
      regex: (?i)[C-Z]:\\[^\\\r\n'"]{1,120}\.exe
    not:
      - regex: '(?i)[C-Z]:\\[sSdDwWbBrRnNtTvV]'
  - id: hash-subdir-executable-in-root
    desc: Hash-named executable under root subdirectory
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?i)[C-Z]:\\[a-f0-9]{8}\\[a-f0-9]{8}\.exe
  - id: roaming-appdata-executable-path
    desc: Roaming AppData executable path
    crit: notable
    conf: 0.82
    for: [scripts, binaries, go]
    if:
      type: text
      regex: (?i)\\AppData\\Roaming\\[^\\]{1,48}\\[^\\]{1,80}\.exe
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: localappdata-short-subdir
    desc: LocalAppData short staging directory
    crit: notable
    conf: 0.84
    for: [batch, powershell, pe, javascript, vbs]
    if:
      type: text
      regex: '(?i)%LOCALAPPDATA%\\[A-Za-z0-9_-]{3,8}\b'
  - id: programdata-directory-path
    desc: ProgramData directory path reference
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)\\ProgramData\\[A-Za-z0-9._ -]{3,64}'
  - id: programdata-executable-path
    desc: ProgramData executable file path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)\\ProgramData\\[^\\\r\n''"]{1,80}(\\[^\\\r\n''"]{1,80})?\.exe'
  - id: programdata-env-executable-path
    desc: Environment ProgramData executable path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)%ProgramData%\\[^\\\r\n''"]{1,80}(\\[^\\\r\n''"]{1,80})?\.exe'
  - id: programdata-powershell-executable-path
    desc: PowerShell ProgramData executable path
    crit: notable
    conf: 0.86
    for: [powershell]
    if:
      type: text
      regex: '(?i)\$env:ProgramData\\[^\\\r\n''"]{1,80}(\\[^\\\r\n''"]{1,80})?\.exe'
  - id: path-suspicious-startup
    desc: Writes to Startup folder
    if:
      type: text
      regex: (?i)Start\s+Menu\\Programs\\Startup\\[^\\]{1,120}\.(exe|vbs|js)
  - id: path-suspicious-startup-scripts
    desc: Writes script to Startup folder
    if:
      type: text
      regex: (?i)Start\s+Menu\\Programs\\Startup\\[^\\]{1,120}\.bat
  - id: path-documents-settings-exe
    desc: Documents and Settings executable name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\bDocuments and Settings\.exe\b
  - id: path-program-files-exe
    desc: Program Files executable name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\bProgram Files\.exe\b
  - id: path-system-folder-exe
    desc: System folder executable name
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (?i)\b(System Volume Information|Recycler)\.exe\b
  - id: path-screenshot-album-dir
    desc: Screenshot album staging directory
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: \Screenshot album
composite_rules:
  - id: path-suspicious-startup-any
    desc: Writes to Startup folder
    crit: suspicious
    conf: 0.8
    any:
      - id: path-suspicious-startup
      - id: path-suspicious-startup-scripts
  - id: path-directory-name-exe
    desc: Directory-like Windows name with .exe
    crit: suspicious
    conf: 0.9
    any:
      - id: path-documents-settings-exe
      - id: path-program-files-exe
      - id: path-system-folder-exe
  - id: path-screenshot-album-payload
    desc: Screenshot album directory combined with executable payload reference
    crit: suspicious
    conf: 0.98
    all:
      - id: path-screenshot-album-dir
      - id: micro-behaviors/fs/path/extension::exe-dup
