defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: os-path-expanduser
    desc: Expand user home directory
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: os\.path\.expanduser\s*\(
  # A hardcoded absolute home directory (/Users/<name>/ or /home/<name>/) baked
  # into shipped code is a leaked developer-machine path: a code-quality smell
  # and a weak signal of hastily-packaged code (dev paths left in source, test
  # fixtures, quick malware repackaging). Neutral `notable` — it describes a
  # real property, not intent. Unix mirror of the embedded-PDB user-profile path
  # signal in metadata/binary/debug. Shared/CI accounts are excluded.
  # The trailing segment is required: a leaked path points *into* the developer's
  # home tree ("/Users/jane/Documents/proj/", "/home/dev/venv/lib/"), whereas
  # "/home/<word>/<action>" with nothing below it is the shape of a web route
  # ("/home/setting/sign", "/home/index/list"), where "home" is a controller and
  # the next segment is not a username at all. Depth is what separates the two
  # without guessing which words can be account names.
  - id: hardcoded-home-dir-path
    desc: Hardcoded absolute home directory path
    crit: notable
    conf: 0.8
    for: [scripts, source]
    platforms: [unix]
    if:
      type: text
      regex: '(^|[^:/A-Za-z0-9])/(Users|home)/[a-zA-Z][a-zA-Z0-9._-]{1,30}/[A-Za-z0-9._-]+/'
    not:
      - regex: '/Users/Shared/'
      - regex: '/home/(runner|user|ubuntu|vagrant|node|root|circleci|travis)/'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
