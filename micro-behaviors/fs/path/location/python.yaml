defaults:
  platforms: [windows, unix]
  for: [python, pyc]

traits:
  - id: python-cache-path-home
    desc: Uses home directory for cache
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Path\.home\(\)\s*/\s*["'']\.cache["'']'
  - id: python-cache-path-env
    desc: Reads cache directory environment
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)["''][A-Z0-9_]*(CACHE_DIR|CACHE_HOME)[A-Z0-9_]*["'']'
  - id: python-hidden-device-identifier-path
    desc: Hidden device identifier path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'expanduser.{0,120}~/\.[^"'']{0,80}(device|machine|hwid|host)[_-]?id'

composite_rules:
  - id: python-user-cache-root
    desc: Builds a user cache root
    crit: notable
    conf: 0.92
    any:
      - id: python-cache-path-home
      - id: python-cache-path-env
