# Terminal Device Paths
# TTY and PTY device access - generally legitimate
# MBC: E1083 (File and Directory Discovery)
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  crit: baseline
  conf: 1.0
traits:
  - id: dev-tty
    desc: /dev/tty terminal device
    if:
      type: string_value
      substr: "/dev/tty"
  - id: dev-pts
    desc: /dev/pts pseudo-terminal
    if:
      type: string_value
      substr: "/dev/pts"
  - id: dev-ptmx
    desc: /dev/ptmx PTY master
    if:
      type: string_value
      substr: "/dev/ptmx"
  - id: dev-console
    desc: /dev/console system console
    if:
      type: string_value
      substr: "/dev/console"
