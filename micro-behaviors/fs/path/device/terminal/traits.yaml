defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 1.0
traits:
  - id: dev-tty
    desc: /dev/tty terminal device
    if:
      type: text
      substr: /dev/tty
  - id: dev-pts
    desc: /dev/pts pseudo-terminal
    if:
      type: text
      substr: /dev/pts
  - id: dev-ptmx
    desc: /dev/ptmx PTY master
    if:
      type: text
      substr: /dev/ptmx
  - id: dev-console
    desc: /dev/console system console
    if:
      type: text
      substr: /dev/console
