# Device Paths - General
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
#
# Note:
#   - Storage devices (sda, nvme, etc.) are in storage/traits.yaml
#   - Terminal devices (tty, pts, etc.) are in terminal/traits.yaml
defaults:
  platforms: [unix, windows, macos]
  for: [elf, shell, python]
traits:
  - id: dev-path-pattern
    desc: Sensitive /dev/ device path pattern
    crit: baseline
    conf: 0.7
    mbc: E1083
    attack: T1083
    if:
      type: string_value
      regex: "/dev/(kmem|dri/card[0-9]+|dri/renderD[0-9]+|input/event[0-9]+)"
  - id: dev-null
    desc: /dev/null (legitimate discard device)
    crit: baseline
    conf: 1.0
    if:
      type: string_value
      substr: "/dev/null"
  - id: dev-shm
    desc: /dev/shm/ (shared memory, legitimate)
    crit: baseline
    conf: 1.0
    if:
      type: string_value
      substr: "/dev/shm/"
  - id: dev-zero
    desc: /dev/zero (legitimate zero source)
    crit: baseline
    conf: 1.0
    if:
      type: string_value
      substr: "/dev/zero"
  - id: dev-watchdog
    desc: Hardware watchdog device path
    crit: suspicious
    conf: 0.86
    if:
      type: hex
      section: ".rodata"
      pattern: 7B 30 31 22 7B 23 35 20 37 3C 30 3B 33 54
  - id: dev-misc-watchdog
    desc: Alternate watchdog device path
    crit: suspicious
    conf: 0.86
    if:
      type: hex
      section: ".rodata"
      pattern: 7B 30 31 22 7B 39 3D 27 37 7B 23 35 20 37 3C 30 3B 33 54
  - id: dev-watchdog-xor62
    desc: Hardware watchdog device path
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: ".rodata"
      pattern: 4D 06 07 14 4D 15 03 16 01 0A 06 0D 05 62
  - id: dev-misc-watchdog-xor62
    desc: Alternate watchdog device path
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: ".rodata"
      pattern: 4D 06 07 14 4D 0F 0B 11 01 4D 15 03 16 01 0A 06 0D 05 62
  - id: dev-ftwdt101-watchdog-xor62
    desc: FTWDT101 watchdog device path
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      section: ".rodata"
      pattern: 4D 06 07 14 4D 24 36 35 26 36 53 52 53 3D 15 03 16 01 0A 06 0D 05 62
  - id: dev-watchdog0-xor62
    desc: Numbered watchdog device path
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: ".rodata"
      pattern: 4D 06 07 14 4D 15 03 16 01 0A 06 0D 05 52 62
composite_rules:
  - id: device-dev
    desc: Reference to /dev devices (excludes common legitimate)
    crit: notable
    conf: 0.66
    mbc: E1083
    attack: T1083
    all:
      - id: dev-path-pattern
    none:
      - id: dev-null
      - id: dev-shm
      - id: dev-zero
      - id: micro-behaviors/os/random/operations::dev-random
      - id: micro-behaviors/fs/path/device/terminal
    # Graphics libraries legitimately access /dev/mem, /dev/fb*, /dev/dri/*
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::x11-dga-marker
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::drm-driver-ref
  - id: watchdog-device
    desc: Hardware watchdog device targeting
    crit: suspicious
    conf: 0.9
    any:
      - id: dev-watchdog
      - id: dev-misc-watchdog
      - id: dev-watchdog-xor62
      - id: dev-misc-watchdog-xor62
      - id: dev-ftwdt101-watchdog-xor62
      - id: dev-watchdog0-xor62
