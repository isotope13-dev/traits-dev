defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.6
  mbc: E1561
  attack: T1561
traits:
  - id: dev-sda
    desc: References /dev/sda SATA/SCSI disk path
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - type: text
        substr: DEFAULT_DENIED_KEYWORDS
    if:
      type: text
      substr: /dev/sda
  - id: dev-hda
    desc: /dev/hda IDE disk (legacy)
    if:
      type: text
      substr: /dev/hda
  - id: dev-nvme
    desc: /dev/nvme NVMe storage
    if:
      type: text
      substr: /dev/nvme
  - id: dev-vda
    desc: /dev/vda virtio disk (VM)
    if:
      type: text
      substr: /dev/vda
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: dev-xvda
    desc: /dev/xvda Xen virtual disk
    if:
      type: text
      substr: /dev/xvda
    unless:
      - id: metadata/document/html/
  - id: dev-mmcblk
    desc: /dev/mmcblk eMMC/SD storage
    if:
      type: text
      substr: /dev/mmcblk
  - id: windows-physicaldrive-path
    desc: Windows raw PhysicalDrive device path
    crit: notable
    conf: 0.8
    platforms:
      - windows
    if:
      type: text
      regex: \\\\\.\\physicaldrive\d*
      case_insensitive: true
  - id: windows-device-unc-template
    desc: Windows device UNC path format
    crit: baseline
    conf: 0.6
    platforms:
      - windows
    if:
      type: text
      exact: \\\\.\\%s
