# File Synchronization Capabilities
# File comparison and time-based operations
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === File Time Comparison ===
  - id: compare-file-time
    desc: Compare file modification times
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "CompareFileTime"
  # === File Time Manipulation ===
  # SetFileTime is a common legitimate API (file copy, archive extraction, etc.)
  # T1070.006 (timestomping) mapping belongs in composites with anti-forensic intent
  - id: set-file-time
    desc: Modify file creation/access/write times
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "SetFileTime"
  - id: set-file-time-source
    desc: Modify file times in source
    crit: notable
    conf: 0.85
    for: [c]
    if:
      type: string
      substr: "SetFileTime"
  # === File Comparison ===
  - id: get-file-size
    desc: Get file size
    crit: baseline
    conf: 0.65
    if:
      type: symbol
      exact: "GetFileSize"
