defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
traits:
  - id: compare-file-time
    desc: Compare file modification times
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: CompareFileTime
  - id: set-file-time
    desc: Modify file creation/access/write times
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: SetFileTime
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
  - id: set-file-time-source
    desc: Modify file times in source
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: string_literal
      substr: SetFileTime
  - id: get-file-size
    desc: Get file size
    crit: baseline
    conf: 0.65
    if:
      type: symbol
      exact: GetFileSize
