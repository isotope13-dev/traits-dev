# Inotify Filesystem Monitoring (Linux-specific)
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [linux]
  for: [elf, c]
traits:
  - id: inotify-init
    desc: Monitor filesystem events via inotify
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "inotify_init"
  - id: inotify-init1
    desc: Monitor filesystem events via inotify
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "inotify_init1"
  - id: inotify-add-watch
    desc: Monitor filesystem events via inotify
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "inotify_add_watch"
  - id: inotify-rm-watch
    desc: Remove an inotify filesystem watch
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "inotify_rm_watch"
