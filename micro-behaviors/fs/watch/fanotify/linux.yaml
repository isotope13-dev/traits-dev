# Fanotify Filesystem Monitoring (Linux-specific)
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [linux, unix, android, macos, windows, ios]
  for: [elf, c]
traits:
  - id: fanotify-init
    desc: Filesystem-wide event monitoring via fanotify
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "fanotify_init"
  - id: fanotify-mark
    desc: Filesystem-wide event monitoring via fanotify
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: "fanotify_mark"
composite_rules:
  - id: fanotify
    desc: Filesystem-wide event monitoring via fanotify
    crit: notable
    conf: 0.66
    any:
      - id: fanotify-init
      - id: fanotify-mark
