defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: fswatch
    desc: Filesystem watcher utilities
    crit: notable
    conf: 0.66
    if:
      type: string_literal
      regex: fswatch(er)?
  - id: fseventstream
    desc: macOS FSEventStream filesystem monitoring
    crit: notable
    conf: 0.7
    platforms:
      - macos
    if:
      type: string_literal
      regex: FSEventStream(Create|Start|Schedule)
