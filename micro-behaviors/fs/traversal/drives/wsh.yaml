# Removable-drive traversal via Windows Script Host / Scripting.FileSystemObject.
# `new Enumerator(fso.Drives)` walks the drive collection; `drive.DriveType == 1`
# selects removable media (FSO DriveTypeConst Removable = 1). Neutral enumeration
# capability — worm/propagation intent lives in objectives/ composites.
defaults:
  platforms: [windows]
  for: [javascript, vbs, html]
  attack: T1083
  mbc: E1083
traits:
  - id: fso-drive-enumeration
    desc: Enumerates FSO drive collection
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Enumerator\s*\(\s*[\w.]+\.Drives\b|For\s+Each\s+\w+\s+[Ii]n\s+[\w.]+\.Drives\b'
  - id: drive-type-removable-check
    desc: Tests for removable drive type
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.DriveType\s*==?\s*1\b'
