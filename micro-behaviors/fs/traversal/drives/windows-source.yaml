# Drive enumeration APIs in Windows C/C++ source code
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1083
traits:
  - id: get-drive-type-source
    desc: GetDriveType API in source
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      regex: ^GetDriveType[AW]?$
  - id: drive-type-removable-source
    desc: DRIVE_REMOVABLE constant in source
    crit: notable
    conf: 0.85
    attack: T1091
    if:
      type: raw
      word: DRIVE_REMOVABLE
  - id: drive-type-remote-source
    desc: DRIVE_REMOTE constant in source
    crit: notable
    conf: 0.85
    attack: T1021
    if:
      type: raw
      word: DRIVE_REMOTE
composite_rules:
  - id: source-drive-enum-and-type
    desc: Drive enumeration with type check
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
    any:
      - id: get-drive-type-source
      - id: drive-type-removable-source
      - id: drive-type-remote-source
