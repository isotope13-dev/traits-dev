defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: get-logical-drives
    desc: Enumerate logical drive letters
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    attack: T1083
    mbc: E1083
    if:
      type: symbol
      exact: GetLogicalDrives
  - id: get-logical-drive-strings
    desc: Enumerate logical drive strings
    crit: notable
    conf: 0.9
    attack: T1083
    mbc: E1083
    if:
      type: symbol
      regex: ^GetLogicalDriveStrings[AW]$
  - id: get-drive-type
    desc: Query drive type by symbol
    crit: baseline
    conf: 0.9
    attack: T1083
    if:
      type: symbol
      regex: GetDriveType[AW]?$
  - id: get-current-directory
    desc: Read current working directory
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: ^GetCurrentDirectory[AW]$
  - id: set-current-directory
    desc: Switch current working directory
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: ^SetCurrentDirectory[AW]$
  - id: set-current-directory-source
    desc: Switch current directory in source
    crit: notable
    conf: 0.9
    for:
      - c
    if:
      type: string_value
      regex: SetCurrentDirectory[AW]
  - id: get-current-directory-source
    desc: Read current directory in source
    crit: baseline
    conf: 0.85
    for:
      - c
    if:
      type: string_value
      regex: GetCurrentDirectory[AW]
  - id: directory-get-logical-drives-source
    desc: Enumerate logical drives in C# source
    crit: notable
    conf: 0.91
    attack: T1083
    for:
      - csharp
    if:
      type: raw
      substr: "Directory.GetLogicalDrives()"
  - id: subdirectory-infection-comment
    desc: Infects current directory tree
    crit: suspicious
    conf: 0.95
    for:
      - c
    if:
      type: string_value
      substr: infects files in current directory and all subdirectories
  - id: linked-list-traversal-comment
    desc: Linked-list directory traversal comment
    crit: notable
    conf: 0.93
    for:
      - c
    if:
      type: string_value
      substr: directory traversal is linked-list instead of recursive
  - id: drive-loop-logic
    desc: Drive count-based loop
    crit: component
    if:
      type: raw
      regex: mov\s+cl,26\s+div\s+cl
  - id: drive-type-check-raw
    desc: Checks drive type via raw bytes
    crit: component
    if:
      type: raw
      regex: cmp\s+al,DRIVE_FIXED|cmp\s+al,DRIVE_REMOTE
  - id: get-drive-type-raw
    desc: Call to GetDriveTypeA by raw bytes
    crit: component
    if:
      type: string_value
      regex: GetDriveTypeA
  - id: get-logical-drive-strings-obfuscated
    desc: Obfuscated GetLogicalDriveStrings API string
    crit: notable
    conf: 0.92
    attack: T1083
    if:
      type: string_value
      exact: LcrSntiDeiAeglvrsGoaitg
  - id: get-drive-type-obfuscated
    desc: Obfuscated GetDriveType API string
    crit: notable
    conf: 0.92
    attack: T1083
    if:
      type: string_value
      exact: DeetvpeiyGrTA
composite_rules:
  - id: win32-drive-loop
    desc: Enumerates and scans all drives
    crit: notable
    conf: 0.85
    attack: T1018
    all:
      - id: micro-behaviors/fs/traversal/drives::get-drive-type-raw
      - id: micro-behaviors/fs/traversal/drives::drive-loop-logic
    any:
      - id: micro-behaviors/fs/traversal/drives::drive-type-check-raw
    unless:
      - id: metadata/library/runtime::openmp-runtime
  - id: drive-context-switching
    desc: Drive context switching via cwd APIs
    crit: notable
    conf: 0.86
    attack: T1083
    all:
      - id: get-current-directory
      - id: set-current-directory
    any:
      - id: get-logical-drives
      - id: get-logical-drive-strings
      - id: get-drive-type
  - id: recursive-directory-traversal-source
    desc: Recursive traversal via cwd switching
    crit: notable
    conf: 0.9
    for:
      - c
    all:
      - id: set-current-directory-source
      - id: micro-behaviors/fs/enumerate/directory::find-file-source-walker
    any:
      - id: get-current-directory-source
  - id: infector-directory-traversal-source
    desc: Directory-tree infection traversal in source
    crit: suspicious
    conf: 0.96
    for:
      - c
    all:
      - id: subdirectory-infection-comment
    any:
      - id: linked-list-traversal-comment
      - id: recursive-directory-traversal-source
  - id: obfuscated-drive-enumeration
    desc: Obfuscated drive enumeration APIs
    crit: suspicious
    conf: 0.93
    attack: T1083
    all:
      - id: get-logical-drive-strings-obfuscated
      - id: get-drive-type-obfuscated
