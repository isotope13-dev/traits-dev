# .NET drive enumeration via DriveInfo API (System.IO)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1083

traits:
  - id: get-drives-dotnet
    desc: DriveInfo.GetDrives drive enumeration
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: GetDrives

  - id: get-volume-label-dotnet
    desc: DriveInfo.VolumeLabel property query
    crit: notable
    conf: 0.87
    if:
      type: text
      exact: get_VolumeLabel

  - id: is-ready-check-dotnet
    desc: DriveInfo.IsReady readiness check
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: get_IsReady

  - id: get-drive-type-dotnet
    desc: DriveInfo.DriveType property query
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: get_DriveType

  - id: drive-info-class
    desc: DriveInfo class reference
    crit: component
    conf: 0.75
    if:
      type: text
      exact: DriveInfo

composite_rules:
  - id: dotnet-drive-enumeration
    desc: .NET drive enumeration via DriveInfo API
    crit: notable
    conf: 0.88
    all:
      - id: get-drives-dotnet
    any:
      - id: drive-info-class
      - id: get-drive-type-dotnet
      - id: is-ready-check-dotnet
      - id: get-volume-label-dotnet

  - id: dotnet-drive-selection-by-label
    desc: .NET drive selection by volume label
    crit: notable
    conf: 0.9
    attack: T1091
    all:
      - id: get-drives-dotnet
      - id: get-volume-label-dotnet
    any:
      - id: get-drive-type-dotnet
      - id: is-ready-check-dotnet
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::reflection-emit
