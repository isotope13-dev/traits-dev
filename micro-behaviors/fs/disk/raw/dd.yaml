# Generic dd input-file invocation ("dd if="). Neutral: dd is a standard
# coreutil used for imaging, backup and block copies in legitimate firmware and
# install scripts. Destructive use is captured by the of=/dev/ wiper composites.
defaults:
  platforms: [unix, android, ios]
  for: [elf, macho]
  crit: component
traits:
  - id: dd-input-command
    desc: dd if= input-file invocation
    conf: 0.6
    if:
      type: text
      substr: dd if=
      section: .text
