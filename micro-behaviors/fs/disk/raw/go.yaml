# Raw disk volume access via Go libraries.
# github.com/awgh/rawreader opens raw volume devices (\\.\C:, \\.\PhysicalDrive0)
# to bypass high-level filesystem hooks (EDR, AV). Used for reading clean copies
# of system DLLs from disk for ntdll unhooking.
defaults:
  for: [pe, go]
  platforms: [windows]
traits:
  - id: rawreader-library
    desc: Go raw disk reader library (awgh/rawreader)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "github.com/awgh/rawreader"
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker
