defaults:
  platforms: [unix, windows]
  for: [c, cpp, pe, elf, shell]
traits:
  - id: mbr-mod-asm
    desc: MBR Partition Modification (Assembly)
    crit: suspicious
    if:
      type: text
      regex: 'mov\s+(word|byte)\s+ptr\s+\[([a-z0-9]+)\+(1be|0?1be)(\+[0-9a-f]+)?\],'
  - id: partition-table-copy
    desc: Partition info string reference
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?i)(copy partition table|partitioninfo|partition.info)'
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
  - id: boot-block-read
    desc: Boot block read operation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(read boot block|readbootblock|read.boot.sector)'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
