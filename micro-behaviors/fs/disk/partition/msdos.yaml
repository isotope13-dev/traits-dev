defaults:
  for:
    - c
  platforms:
    - unix
    - windows
traits:
  - id: mbr-backup-sector-11h
    desc: MBR backup to sector 11h
    crit: suspicious
    conf: 0.97
    if:
      type: string_literal
      regex: (?i)(sector 11h|sector 17 \\(11h\\)|copy partition table to sector 11h)
  - id: partition-table-overwrite
    desc: Partition table overwrite logic
    crit: suspicious
    conf: 0.97
    if:
      type: string_literal
      regex: (?i)(overwrite partition table|overwrites the MBR)
  - id: boot-sector-overwrite-a
    desc: Drive A boot overwrite
    crit: suspicious
    conf: 0.97
    if:
      type: string_literal
      substr: 'overwrite boot sector of drive A:'
  - id: boot-sector-overwrite-b
    desc: Drive B boot overwrite
    crit: suspicious
    conf: 0.97
    if:
      type: string_literal
      substr: 'overwrite boot sector of drive B:'
  - id: dual-floppy-boot-overwrite
    desc: Dual floppy boot overwrite
    crit: suspicious
    conf: 0.97
    if:
      type: string_literal
      substr: 'boot sectors of drives A: and B:'
  - id: sector-marker-aa55
    desc: Boot sector AA55 marker
    crit: notable
    conf: 0.93
    if:
      type: string_literal
      regex: (?i)(AA55|55AA|end of sector marker)
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: april-payload-banner
    desc: April prank payload banner
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)(April, April \\.{3}|April Fools)
composite_rules:
  - id: boot-record-overwrite-source
    desc: Boot record overwrite source
    crit: suspicious
    conf: 0.98
    all:
      - id: mbr-backup-sector-11h
      - id: partition-table-overwrite
    any:
      - id: dual-floppy-boot-overwrite
      - id: boot-sector-overwrite-a
      - id: boot-sector-overwrite-b
      - id: sector-marker-aa55
      - id: april-payload-banner
