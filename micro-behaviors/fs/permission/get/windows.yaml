# File Permission Lookup - Windows
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [pe, powershell, batch, vbs]
traits:
  - id: get-icacls
    desc: Look up file permissions via
    crit: baseline
    conf: 0.66
    if:
      type: string
      substr: icacls
