# shutil.rmtree() call — recursive directory deletion capability. Generic
# (cache cleanup, temp dirs, build tooling); relocated from objectives/evasion/
# self-delete so the standalone component is labelled by what it searches for.
# The self-delete composite references it cross-directory.
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: shutil-rmtree-call
    desc: Recursive directory removal call
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "shutil.rmtree("
