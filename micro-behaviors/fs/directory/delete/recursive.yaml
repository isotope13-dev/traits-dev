defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  mbc: C0047
  attack: T1070.004
traits:
  - id: rimraf
    desc: rimraf npm package (recursive delete)
    for:
      - javascript
      - typescript
    unless:
      - type: text
        substr: "rimraf: callback function required"
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]
      - id: metadata/library/structure::js-large-module-bundle
    not:
      - substr: "rimraf: missing path"
      - substr: "rimraf: path should be a string"
      - substr: "rimraf: callback function required"
      - substr: "rimraf: options should be object"
      - substr: "rimraf: invalid options argument"
    if:
      type: string_literal
      substr: rimraf
  - id: rm-rf
    desc: rm -rf shell command
    for: [scripts, binaries]
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
    if:
      type: string_literal
      substr: rm -rf
  - id: shutil-rmtree
    desc: Python shutil.rmtree
    crit: notable
    for:
      - python
    if:
      type: string_literal
      substr: shutil.rmtree
  - id: fs-rm-recursive
    desc: Node.js fs.rm with recursive option
    crit: notable
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: fs\.rm(Sync)?\s*\([^)]{0,50}recursive
  - id: rmdirSync-recursive
    desc: Node.js rmdirSync with recursive option
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: rmdirSync\s*\([^)]{0,50}recursive
