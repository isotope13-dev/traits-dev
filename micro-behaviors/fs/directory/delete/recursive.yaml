defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  conf: 0.8
  mbc: C0047
  attack: T1070.004
traits:
  - id: rimraf
    desc: rimraf npm package (recursive delete)
    for:
      - javascript
      - typescript
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]
    not:
      - substr: "rimraf: missing path"
      - substr: "rimraf: path should be a string"
    if:
      type: string_literal
      substr: rimraf
  - id: rm-rf
    desc: rm -rf shell command
    for:
      - shell
      - javascript
      - typescript
      - python
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
    if:
      type: string_literal
      substr: rm -rf
  - id: shutil-rmtree
    desc: Python shutil.rmtree
    crit: baseline
    for:
      - python
    if:
      type: string_literal
      substr: shutil.rmtree
  - id: fs-rm-recursive
    desc: Node.js fs.rm with recursive option
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: fs\.rm(Sync)?\s*\([^)]{0,50}recursive
  - id: rmdirSync-recursive
    desc: Node.js rmdirSync with recursive option
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: rmdirSync\s*\([^)]{0,50}recursive
