defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  mbc: C0047
  attack: T1070.004
traits:
  - id: rimraf
    desc: References the rimraf recursive-deletion package
    for:
      - javascript
      - typescript
    unless:
      - type: text
        substr: "rimraf: callback function required"
      - id: well-known/app/tabby::tabby-builtin-plugin-path
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/lib/tesseract-js/
    not:
      - substr: "rimraf: missing path"
      - substr: "rimraf: path should be a string"
      - substr: "rimraf: callback function required"
      - substr: "rimraf: options should be object"
      - substr: "rimraf: invalid options argument"
    if:
      type: string_literal
      substr: rimraf
  - id: rm-rf
    desc: References an rm -rf deletion command
    for: [scripts, binaries, -shell]
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: well-known/app/k9x-satan::attack-fixture-context
      - type: text
        regex: '(?m)DEFAULT_DENIED_KEYWORDS\s*=\s*\['
    if:
      type: text
      regex: '\brm\s+-rf\b'
  - id: rm-f
    desc: rm -f shell command (force, non-recursive)
    crit: component
    for: [scripts, binaries]
    if:
      type: text
      substr: rm -f
  - id: shutil-rmtree
    desc: Calls shutil.rmtree() to delete directory trees
    crit: notable
    for:
      - python
    if:
      type: symbol
      kind: call
      exact: shutil.rmtree
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: fs-rm-recursive
    desc: Node.js fs.rm with recursive option
    crit: notable
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: fs\.rm(Sync)?\s*\([^)]{0,50}recursive
  - id: rmdirSync-recursive
    desc: Node.js rmdirSync with recursive option
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: rmdirSync\s*\([^)]{0,50}recursive

composite_rules:
  - id: iterative-file-deletion
    desc: Iteratively deletes files from directory
    crit: notable
    conf: 0.88
    near_lines: 30
    all:
      - id: micro-behaviors/fs/directory/traverse::traverse-readdir-walk-find
    any:
      - id: micro-behaviors/fs/directory/traverse::delete-unlink-node-py
      - id: micro-behaviors/fs/directory/traverse::delete-shell
    unless:
      - id: metadata/library/structure::js-large-minified-bundle
  - id: recursive-delete
    desc: Recursively deletes a directory tree
    crit: notable
    conf: 0.85
    any:
      - id: rimraf
      - id: rm-rf
      - id: shutil-rmtree
