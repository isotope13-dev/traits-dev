defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: python-os-getcwd
    desc: Calls Python os.getcwd
    if:
      type: symbol
      kind: call
      exact: os.getcwd

  - id: python-path-cwd
    desc: Calls Python Path.cwd
    if:
      type: symbol
      kind: call
      exact: Path.cwd
