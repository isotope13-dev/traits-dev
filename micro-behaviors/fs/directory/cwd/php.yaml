# Querying the process's current working directory. This is neutral
# filesystem plumbing — PHP CLI bootstraps (Composer autoload, Symfony
# Console, Laravel Artisan, ddev/Drupal helpers) routinely resolve the
# working directory for config discovery. It is real behavior worth
# inventorying, but it is NOT system reconnaissance on its own; the
# webshell/fingerprint intent lives in the objectives composites that
# reference this atom cross-tier.
defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  - id: php-getcwd
    desc: Gets current working directory
    # In a recognized framework or Composer-namespaced context the call is
    # plumbing rather than recon; the downgrade keeps the evidence visible
    # while letting bare-procedural shell-shape recon stand out. The
    # `\nnamespace [A-Z]` check broadens framework detection to any
    # Composer-organized PHP file (per-file analysis can't see a sibling
    # composer.json).
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: getcwd
    downgrade:
      any:
        - id: metadata/library/web-frameworks/
        - id: metadata/library/web-frameworks/
        - id: metadata/library/web-frameworks/
        - id: metadata/package/testing/harness/unit/
        - type: text
          regex: '^namespace\s+[A-Z]'
