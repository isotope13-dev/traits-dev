defaults:
  platforms: [macos]
  for: [macho]
traits:
  - id: cpp-recursive-directory-iterator
    desc: C++ recursive directory iterator
    crit: notable
    conf: 0.9
    mbc: E1083
    if:
      type: symbol
      regex: recursive_directory_iterator
  - id: cpp-filesystem-copy
    desc: C++ filesystem copy operation
    crit: notable
    conf: 0.85
    mbc: E1083
    if:
      type: symbol
      regex: filesystem::(copy|copy_file)|copy_options
  - id: cpp-temp-directory-path
    desc: C++ temporary directory path
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      regex: temp_directory_path
composite_rules:
  - id: cpp-recursive-copy-scaffold
    desc: C++ recursive copy scaffold
    crit: suspicious
    conf: 0.9
    all:
      - id: cpp-recursive-directory-iterator
      - id: cpp-filesystem-copy
    unless:
      - id: metadata/library/structure::vscode-packaged-native-tool
