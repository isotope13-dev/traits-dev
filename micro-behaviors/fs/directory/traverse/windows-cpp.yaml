defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1083
  mbc: E1083
traits:
  - id: std-filesystem-runtime
    desc: C++ filesystem runtime DLL reference
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: api-ms-win-crt-filesystem-l1-1-0.dll
  - id: std-filesystem-error-rtti
    desc: C++ filesystem error RTTI
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: .?AVfilesystem_error@filesystem@std@@
composite_rules:
  - id: std-filesystem-traversal
    desc: C++ std filesystem traversal scaffold
    crit: suspicious
    conf: 0.93
    all:
      - id: std-filesystem-runtime
      - id: std-filesystem-error-rtti
