defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: node-readdir-dirents
    desc: Node readdir with directory entries
    crit: baseline
    conf: 0.74
    count_min: 2
    if:
      type: text
      substr: withFileTypes
  - id: node-dirent-isdirectory
    desc: Node Dirent directory check
    crit: baseline
    conf: 0.72
    count_min: 2
    if:
      type: text
      regex: "is.{0,40}Directory"
  - id: node-obfuscated-dirent-methods
    desc: Obfuscated Node Dirent method calls
    crit: baseline
    conf: 0.78
    count_min: 4
    if:
      type: text
      regex: "\\+_0x[0-9a-f]+\\([^)]{1,40}\\)\\]\\(\\)"
  - id: node-scan-skips-dotdirs
    desc: Recursive scan skips dot directories
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "startsWi.{0,40}\\('\\.'\\)"
composite_rules:
  - id: node-recursive-dirent-walk
    desc: Recursive Node directory traversal logic
    crit: notable
    conf: 0.82
    all:
      - id: node-readdir-dirents
    any:
      - id: node-dirent-isdirectory
      - id: node-obfuscated-dirent-methods
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
