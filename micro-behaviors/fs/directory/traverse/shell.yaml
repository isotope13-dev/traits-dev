defaults:
  platforms: [unix]
  for: [shell]
  attack: T1083
  mbc: E1083
traits:
  - id: find-type-file
    desc: find enumerates regular files
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bfind\s+["''$/{][^\n]{0,80}-type\s+f\b'

  - id: find-root-type-file-command
    desc: find enumerates root files
    crit: suspicious
    conf: 0.9
    for: [source, shell]
    if:
      type: text
      regex: '\bfind\s+/root\s+-type\s+f\s+-print\b'

  - id: find-root-type-file-bytes
    desc: find enumerates root files bytes
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'find /root -type f -print'
