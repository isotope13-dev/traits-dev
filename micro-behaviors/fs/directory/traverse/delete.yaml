# Directory Traversal with Delete Operations
# Micro-behaviors for iterating directories with deletion operations
defaults:
  platforms: [windows, unix]
  crit: baseline
  conf: 0.85
traits:
  - id: traverse-readdir-walk-find
    desc: Directory traversal operation
    for: [javascript, typescript, python, shell]
    if:
      type: text
      regex: fs\.readdirSync|os\.walk|find\s+\./?\s
  - id: delete-unlink-node-py
    desc: File deletion operation (Node.js/Python)
    for: [javascript, typescript, python]
    if:
      type: text
      regex: unlinkSync|os\.(remove|unlink)
  - id: python-temp-cache-file-cleanup
    desc: Python removes files from temporary cache
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'temporary_cache_dir[\s\S]{0,260}os\.walk[\s\S]{0,260}os\.remove'
  - id: delete-flag-shell
    desc: Delete flag in shell command
    for: [shell]
    if:
      type: text
      substr: -delete
  - id: rm-rf-cmd
    desc: rm -rf command
    for: [shell]
    conf: 0.6
    if:
      type: text
      regex: rm\s+-rf
composite_rules:
  - id: go-recursive-removeall
    desc: Go recursive filesystem traversal and deletion
    crit: notable
    conf: 0.78
    for: [pe, elf, macho]
    platforms: [windows, unix, macos]
    size_max: 52428800
    all:
      - id: micro-behaviors/fs/directory/traverse::filepath-walk
      - id: micro-behaviors/fs/file/delete::os-RemoveAll-string
  - id: delete-shell
    desc: Shell deletion operation
    crit: baseline
    conf: 0.85
    for: [shell]
    any:
      - id: delete-flag-shell
      - id: rm-rf-cmd
