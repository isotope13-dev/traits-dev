defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1083
traits:
  - id: rust-path-is-dir-check
    desc: Directory recursion branch check
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: if\s+path\.is_dir\(\)
  - id: rust-search-self-call
    desc: Recursive search self call
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: search\(&path,\s*file_name\)
composite_rules:
  - id: rust-recursive-search
    desc: Recursive directory search routine
    crit: notable
    conf: 0.86
    all:
      - id: rust-path-is-dir-check
      - id: rust-search-self-call
