defaults:
  platforms:
    - unix
    - windows
  for:
    - python
    - pyc
traits:
  - id: traverse-walk
    desc: Traverse filesystem hierarchy (os.walk)
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: os.walk
  - id: traverse-walk-call
    desc: Calls os.walk for filesystem enumeration
    crit: notable
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: os.walk
