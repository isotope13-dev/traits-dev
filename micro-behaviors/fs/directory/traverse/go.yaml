defaults:
  platforms: [windows, unix]
  for: [go, pe, elf, macho]
  attack: T1083
traits:
  - id: filepath-walk
    desc: Enumerate files via filepath.Walk
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(^|/)filepath\.Walk$'
  - id: go-file-matching-routine
    desc: Go file matching routine
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: FindMatchingFiles
