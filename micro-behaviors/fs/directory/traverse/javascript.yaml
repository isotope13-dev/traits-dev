defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  - id: js-walk-sync-call
    desc: Calls a synchronous directory walker
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: walkSync
  - id: root-dirs-list-mnt-media
    desc: Root directories list includes mnt/media
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "[\"']/(mnt|media)[\"'],\\s*[\"']/(mnt|media)[\"']"
  - id: root-dirs-list-volumes
    desc: Root directories list includes Volumes
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '["'']/Volumes["'']'
  - id: root-drives-push
    desc: Adds root directory to scan list
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: "rootDrives\\.push\\(['\"]/['\"]\\)"
composite_rules:
  - id: root-dirs-list
    desc: List of root directories for scanning
    crit: notable
    conf: 0.8
    any:
      - id: root-dirs-list-mnt-media
      - id: root-dirs-list-volumes
  - id: multi-os-root-scan
    desc: Multi-OS root directory scanning logic
    crit: suspicious
    conf: 0.8
    all:
      - id: root-dirs-list
      - id: root-drives-push
      - id: micro-behaviors/os/sysinfo/platform/runtime::js-platform-win32-check
