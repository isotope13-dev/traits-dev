defaults:
  platforms: [unix]
  for: [perl]
  attack: T1083
  mbc: E1083
traits:
  - id: file-find-module
    desc: Perl File::Find import
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?m)^\s*use\s+File::Find;'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: finddepth-walker
    desc: Perl recursive finddepth walker
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'finddepth\s*\(\s*\\&[A-Za-z_][A-Za-z0-9_]*\s*,'
  - id: walker-target-path
    desc: Hard-coded traversal root path
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: 'finddepth\s*\(.{0,120}[''"]/[^''"\n]{1,80}[''"]'
composite_rules:
  - id: recursive-walk
    desc: Perl recursive directory walk
    crit: notable
    conf: 0.95
    all:
      - id: file-find-module
      - id: finddepth-walker
