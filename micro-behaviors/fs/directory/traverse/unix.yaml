defaults:
  attack: T1083
  mbc: E1083
  platforms: [linux, macos]
  for: [elf, macho, c]
traits:
  - id: fts-open
    desc: Open filesystem hierarchy via fts
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: _?fts_open
  - id: fts-read
    desc: Read directory entries via fts
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: _?fts_read
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: fts-children
    desc: Get child entries from filesystem hierarchy
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: _?fts_children
  - id: fts-set
    desc: Modify filesystem traversal options
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: _?fts_set
  - id: fts-close
    desc: Close filesystem hierarchy traversal
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: _?fts_close
  - id: nftw
    desc: Traverse filesystem hierarchy via nftw/ftw
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: nftw
  - id: ftw
    desc: Traverse filesystem hierarchy via nftw/ftw
    crit: baseline
    conf: 0.66
    if:
      type: symbol
      exact: ftw
composite_rules:
  - id: traverse-fts
    desc: Traverse filesystem hierarchy via fts
    crit: baseline
    conf: 0.66
    needs: 2
    any:
      - id: fts-open
      - id: fts-read
      - id: fts-children
      - id: fts-set
      - id: fts-close
