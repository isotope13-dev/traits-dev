# Directory Listing - Shell
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [shell]
traits:
  - id: readdir-ls
    desc: List directory contents via /bin/ls
    crit: baseline
    conf: 0.66
    if:
      type: string
      substr: /bin/ls
