defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: readdir-ls
    desc: List directory contents via /bin/ls
    crit: baseline
    conf: 0.66
    if:
      type: string_literal
      substr: /bin/ls
  - id: readdir-reference
    desc: readdir libc call referenced by name
    crit: component
    conf: 0.6
    if:
      type: string_literal
      word: readdir
