defaults:
  platforms: [unix]
  for: [perl]
  mbc: E1083
  attack: T1083
traits:
  - id: opendir-call
    desc: Perl opendir directory open
    crit: baseline
    conf: 0.72
    if:
      type: symbol
      exact: opendir
  - id: readdir-call
    desc: Perl readdir directory listing
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: readdir
  - id: stat-call
    desc: Perl stat metadata listing
    crit: baseline
    conf: 0.72
    if:
      type: symbol
      exact: stat
  - id: chdir-call
    desc: Perl chdir working directory change
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: chdir
  - id: cwd-call
    desc: Perl cwd current directory query
    crit: baseline
    conf: 0.68
    if:
      type: text
      word: cwd
composite_rules:
  - id: directory-browser
    desc: Perl directory browser behavior
    crit: notable
    conf: 0.88
    all:
      - id: opendir-call
      - id: readdir-call
    any:
      - id: stat-call
      - id: chdir-call
      - id: cwd-call
  - id: cwd-navigation
    desc: Perl current directory navigation
    crit: notable
    conf: 0.84
    all:
      - id: chdir-call
      - id: cwd-call
