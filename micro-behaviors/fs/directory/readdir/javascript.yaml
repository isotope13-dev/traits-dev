# Directory Listing - JavaScript/Node
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [javascript]
traits:
  - id: readdir-node
    desc: List directory contents (Node.js)
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      regex: "\\.readdir(Sync)?\\("
