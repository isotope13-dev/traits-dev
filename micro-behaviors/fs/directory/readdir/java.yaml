# Directory Listing - Java
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: readdir-java
    desc: List directory contents (Java)
    crit: baseline
    conf: 0.66
    if:
      type: string
      substr: listFiles
