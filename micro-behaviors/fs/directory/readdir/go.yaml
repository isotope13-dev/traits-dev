defaults:
  platforms:
    - unix
    - windows
  for: [go, binaries]
traits:
  - id: readdir-go
    desc: List directory contents (Go)
    crit: baseline
    conf: 0.66
    if:
      type: text
      regex: \.(Open|Read)Dir
  - id: ioutil-read-dir
    desc: Enumerate files via ioutil.ReadDir
    crit: notable
    conf: 0.75
    for: [go]
    attack: T1083
    if:
      type: symbol
      exact: ioutil.ReadDir

  - id: go-readdir-var-log
    desc: Go enumerates the system log directory
    crit: notable
    conf: 0.9
    for: [go]
    platforms: [unix]
    attack: T1083
    if:
      type: symbol
      kind: call
      exact: os.ReadDir
      arg:
        kind: string
        exact: /var/log

  - id: go-readdir-ssh-directory
    desc: Go enumerates a user SSH directory
    crit: notable
    conf: 0.9
    for: [go]
    platforms: [unix]
    attack: T1083
    if:
      type: symbol
      kind: call
      exact: os.ReadDir
      arg:
        kind: identifier
        name: sshDir
