# Directory Listing - Go
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [go, elf, macho, pe]
traits:
  - id: readdir-go
    desc: List directory contents (Go)
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      regex: "\\.(Open|Read)Dir"
