defaults:
  platforms: [unix]
  for: [elf, macho, c, cpp]
traits:
  # Directory enumeration defines what a program does (ls/find/tar-class
  # traversal); it is not universal-baseline like read/mmap/stdio, so the
  # symbol family is notable — a supply-chain diff must make it obvious when
  # a program gains filesystem-walking behavior. Go binaries are excluded:
  # their libc-backed ports (OpenBSD getdents, Darwin fdopendir/closedir)
  # link these symbols unconditionally from the runtime, saying nothing
  # about what the program does. go-binary covers stripped ELF/PE where the
  # rdata runtime-string marker misses; go-runtime-marker covers Mach-O.
  - id: readdir-opendir
    desc: Uses opendir
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: opendir
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-readdir
    desc: Uses readdir
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: readdir
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-readdir64
    desc: Uses readdir64
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: readdir64
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-fdopendir
    desc: Uses fdopendir
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: fdopendir
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-closedir
    desc: Uses closedir
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: closedir
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-rewinddir
    desc: Uses rewinddir
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: rewinddir
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-seekdir
    desc: Uses seekdir
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: seekdir
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-telldir
    desc: Uses telldir
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: telldir
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-getdents
    desc: Uses getdents
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: getdents
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-getdents64
    desc: Uses getdents64
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: getdents64
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
  - id: readdir-dname-strcmp
    desc: d_name strcmp directory filter
    crit: component
    conf: 0.78
    for: [c, cpp]
    if:
      type: text
      regex: 'strcmp\s*\([^;]{0,80}d_name'
  - id: readdir-source-definition
    desc: Defines readdir function
    crit: component
    conf: 0.78
    for: [c, cpp]
    if:
      type: text
      regex: '\breaddir\s*\(\s*DIR\s*\*'
composite_rules:
  - id: readdir
    desc: List directory contents
    crit: baseline
    conf: 0.66
    any:
      - id: readdir-core
      - id: readdir-extended
  - id: readdir-core
    desc: Core directory iteration symbols
    crit: baseline
    conf: 0.66
    any:
      - id: readdir-opendir
      - id: readdir-readdir
      - id: readdir-source-definition
      - id: readdir-readdir64
      - id: readdir-fdopendir
      - id: readdir-closedir
  - id: readdir-extended
    desc: Extended directory iteration symbols
    crit: baseline
    conf: 0.66
    any:
      - id: readdir-rewinddir
      - id: readdir-seekdir
      - id: readdir-telldir
      - id: readdir-getdents
      - id: readdir-getdents64
