defaults:
  platforms: [unix, windows]
  for: [go]
traits:
  - id: os-mkdirall
    desc: Creates a directory tree with Go os.MkdirAll
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: os.MkdirAll
  - id: os-mkdir
    desc: Create directory via os.Mkdir
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: os.Mkdir
