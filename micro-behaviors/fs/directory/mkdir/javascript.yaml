defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: recursive-mkdir-sync
    desc: Creates a directory tree synchronously
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bmkdirSync\s*\(.{0,120}\brecursive\s*:\s*true\b'
    unless:
      - id: metadata/package/testing/
