defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: mkdir-sync-call
    desc: Creates a directory synchronously
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: mkdirSync
  - id: recursive-mkdir-sync
    desc: Creates a directory tree synchronously
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bmkdirSync\s*\(.{0,120}\brecursive\s*:\s*true\b'
    unless:
      - id: metadata/package/testing/
  - id: node-bracket-mkdir-call
    desc: Node bracket mkdir call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\s*\[\s*["'']mkdir["'']\s*\]\s*\('
