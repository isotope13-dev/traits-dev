# Directory Creation - Java
# MBC: C0046 (Create File)
# ATT&CK: T1083
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [java]
traits:
  - id: mkdir-java
    desc: Create directories (Java)
    crit: baseline
    conf: 0.66
    if:
      type: string
      regex: "createDirector(y|ies)"
