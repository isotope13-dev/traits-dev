# Directory Creation - Python
# MBC: C0046 (Create File)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows, macos]
  for: [python, pyc]
traits:
  - id: mkdir-python
    desc: Create directories (Python os.makedirs)
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: os.makedirs
  - id: chdir-symbol
    desc: chdir syscall symbol
    crit: baseline
    conf: 0.3
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: symbol
      exact: "chdir"
