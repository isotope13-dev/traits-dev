# Directory Creation - Windows
# MBC: C0046 (Create File)
# ATT&CK: T1083
defaults:
  platforms: [unix, windows]
  for: [pe, c]
traits:
- id: create-directory
  desc: Create directories (Windows API)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: "CreateDirectory"
- id: create-directory-a
  desc: Create directories (Windows API ANSI)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: "CreateDirectoryA"
- id: create-directory-w
  desc: Create directories (Windows API Unicode)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    exact: "CreateDirectoryW"
- id: create-directory-ex
  desc: Create directories (Windows API)
  crit: baseline
  conf: 0.66
  if:
    type: symbol
    regex: "^CreateDirectoryEx(A|W)?$"
- id: make-sure-directory-path-exists
  desc: Ensure directory path exists
  crit: baseline
  conf: 0.8
  if:
    type: symbol
    exact: "MakeSureDirectoryPathExists"
- id: create-directory-a-text-reference
  desc: CreateDirectoryA API name in PE text
  crit: component
  conf: 0.9
  for: [pe, dll]
  if:
    type: text
    word: CreateDirectoryA
  unless:
    - type: symbol
      exact: CreateDirectoryA
- id: temp-mkdir-command--rx-1
  desc: Local application data path reference
  crit: component
  conf: 0.75
  for: [batch, powershell, text]
  if:
    type: text
    regex: '(?i)(^|[^A-Za-z0-9_])(\$env:LOCALAPPDATA|%LOCALAPPDATA%)($|[^A-Za-z0-9_])'
  count_max: 1019235
- id: temp-mkdir-command--rx-2
  desc: Shell mkdir command reference
  crit: component
  conf: 0.75
  for: [batch, powershell, text]
  if:
    type: text
    regex: '(?i)(^|[^A-Za-z0-9_+/])(mkdir|md)\s+'
  count_max: 1019236
- id: temp-mkdir-command--rx-3
  desc: Temporary directory path reference
  crit: component
  conf: 0.75
  for: [batch, powershell, text]
  if:
    type: text
    regex: '(?i)(^|[^A-Za-z0-9_])\$env:(TEMP|TMP)($|[^A-Za-z0-9_])'
  count_max: 1019237
- id: temp-mkdir-command--rx-4
  desc: Percent temporary path reference
  crit: component
  conf: 0.75
  for: [batch, powershell, text]
  if:
    type: text
    regex: '(?i)(^|[^A-Za-z0-9_])%(TEMP|TMP)%($|[^A-Za-z0-9_])'
  count_max: 1019238
- id: temp-mkdir-command--rx-5
  desc: Temporary directory path reference
  crit: component
  conf: 0.75
  for: [batch, powershell, text]
  if:
    type: text
    regex: '(?i)(^|[^A-Za-z0-9_])[\\/](Temp|Tmp)[\\/]'
  count_max: 1019239
composite_rules:
- id: mkdir-win
  desc: Create directories (Windows API)
  crit: baseline
  conf: 0.66
  any:
  - id: create-directory
  - id: create-directory-a
  - id: create-directory-w
  - id: create-directory-ex
  - id: make-sure-directory-path-exists
  - id: create-directory-a-text-reference
- id: temp-mkdir-command
  desc: Create temp staging directory via shell
  crit: notable
  conf: 0.75
  for: [batch, powershell, text]
  all:
  - id: temp-mkdir-command--rx-2
  any:
  - id: temp-mkdir-command--rx-1
  - id: temp-mkdir-command--rx-3
  - id: temp-mkdir-command--rx-4
  - id: temp-mkdir-command--rx-5
