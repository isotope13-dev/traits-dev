defaults:
  platforms: [unix, windows]
  for: [scripts]

traits:
  - id: mkdir-command
    desc: Shell invokes mkdir command
    crit: notable
    conf: 0.8
    for: [shell, batch]
    if:
      type: text
      regex: '(^|[;&|`])\s*mkdir(\s+-[A-Za-z]*|\s+)[^\r\n;&|]{1,120}'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/package/files/system-package::shell-completion-script
