defaults:
  platforms: [unix, windows]
  for: [scripts]

traits:
  - id: mkdir-command
    desc: Shell invokes mkdir command
    crit: notable
    conf: 0.8
    for: [shell, batch]
    if:
      type: text
      regex: '(^|[\s;&|`$({])mkdir([ \t]|$)'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
