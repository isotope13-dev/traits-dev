defaults:
  platforms: [windows]
  for: [javascript, vbs]
  crit: notable
  conf: 0.8
traits:
  - id: wsh-createfolder
    # Match the method/member itself.  A substring match also treated
    # helpers such as gDriveFindOrCreateFolder as Windows Script Host code.
    desc: Calls a CreateFolder directory method
    if:
      type: symbol
      regex: '(^|\.)CreateFolder$'
