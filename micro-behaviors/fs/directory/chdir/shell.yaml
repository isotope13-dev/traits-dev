defaults:
  platforms: [unix, android]
  for: [elf, shell, c, cpp]
traits:
  - id: tmpdir-change-directory
    desc: Shell changes into temporary directory
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '\bcd\s+\$TMPDIR\b'
  - id: android-local-tmp-cd
    desc: Android local tmp staging
    crit: component
    conf: 0.9
    if:
      type: text
      substr: cd /data/local/tmp/
