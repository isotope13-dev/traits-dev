defaults:
  platforms: [unix, windows]
  for: [groovy]
traits:
  - id: groovy-build-config-file-reference
    desc: Groovy references Gradle or Maven build config
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(settings\.xml|gradle\.properties)'
    unless:
      - type: text
        substr: '"archash"'
