defaults:
  platforms: [unix]

traits:
  - id: target-script-handoff
    desc: Hands off to target script
    crit: component
    conf: 0.95
    for:
      - shell
    if:
      type: text
      substr: 'su "$NEW_USER" -c "$TARGET_SCRIPT"'
  - id: docker-group-membership
    desc: Adds temporary user to docker group
    crit: component
    conf: 0.95
    for:
      - shell
    if:
      type: text
      substr: 'usermod -aG docker "$NEW_USER"'
  - id: docker-groupadd
    desc: Docker image creates docker group
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    if:
      type: text
      substr: groupadd -f docker
  - id: docker-user-switch
    desc: Docker image switches to docker user
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    if:
      type: text
      substr: USER docker
  - id: docker-user-unlock
    desc: Docker image unlocks docker user
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    if:
      type: text
      substr: passwd -u docker
  - id: sudo-nopasswd
    desc: NOPASSWD sudo directive
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      substr: NOPASSWD
    unless:
      - id: benign-build-sudoers-context
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/build/ci::tensorflow-user-wrapper
    downgrade:
      any:
        - type: raw
          regex: '\b(CI_BUILD_[A-Z0-9_]+|GITHUB_ACTIONS|BUILDKITE|TF_BUILD)\b'
        - type: raw
          regex: '\b(JENKINS_HOME|Docker|cloud-init|cloud\.cfg)\b'
        - type: raw
          regex: 'Vagrant User[\s\S]{0,2048}vagrant insecure public key'
    attack: T1548.004

composite_rules:
  - id: benign-build-sudoers-context
    desc: Build helper sudoers.d context
    crit: component
    conf: 0.9
    any:
      - id: ci-user-handoff-sudo-context
      - id: container-ssh-user-sudo-context
      - id: micro-behaviors/fs/path/config/privesc::etc-sudoers-d
  - id: ci-user-handoff-sudo-context
    desc: CI helper sudo handoff context
    crit: component
    conf: 0.95
    for:
      - shell
    all:
      - id: docker-group-membership
      - id: target-script-handoff
  - id: container-ssh-user-sudo-context
    desc: Container image sudo SSH user
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    all:
      - id: docker-groupadd
      - id: docker-user-switch
      - id: docker-user-unlock
