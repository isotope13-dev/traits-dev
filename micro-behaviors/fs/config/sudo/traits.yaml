defaults:
  platforms: [unix]

traits:
  - id: target-script-handoff
    desc: Hands off to target script
    crit: component
    conf: 0.95
    for:
      - shell
    if:
      type: text
      substr: 'su "$NEW_USER" -c "$TARGET_SCRIPT"'
  - id: docker-group-membership
    desc: Adds temporary user to docker group
    crit: component
    conf: 0.95
    for:
      - shell
    if:
      type: text
      substr: 'usermod -aG docker "$NEW_USER"'
  - id: docker-groupadd
    desc: Docker image creates docker group
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    if:
      type: text
      substr: groupadd -f docker
  - id: docker-user-switch
    desc: Docker image switches to docker user
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    if:
      type: text
      substr: USER docker
  - id: docker-user-unlock
    desc: Docker image unlocks docker user
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    if:
      type: text
      substr: passwd -u docker
  - id: builder-system-groupadd
    desc: Build script creates builder system group
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      substr: groupadd -r builder
  - id: builder-system-useradd
    desc: Build script creates builder system user
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: 'useradd[^\n]{0,80}-g\s+builder\s+builder'
  - id: cmake-ninja-build-script
    desc: CMake Ninja build script context
    crit: component
    conf: 0.86
    for: [shell]
    if:
      type: text
      substr: cmake -G Ninja
  - id: nopasswd-all-directive
    desc: 'Bare NOPASSWD: ALL sudoers directive'
    crit: notable
    conf: 0.5
    for: [shell, python, elf]
    if:
      type: text
      regex: '(?i)\bNOPASSWD\s*:\s*ALL\b'
  - id: sudo-nopasswd
    desc: NOPASSWD sudo directive
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      regex: '(?i)\bALL\s*=\s*\(ALL(:ALL)?\)\s+NOPASSWD\s*:'
    unless:
      - type: text
        regex: '(?im)^\s*#.*\bNOPASSWD\b'
      - id: micro-behaviors/fs/config/sudo/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/build/ci::tensorflow-user-wrapper
    downgrade:
      any:
        - type: raw
          regex: '\b(CI_BUILD_[A-Z0-9_]+|GITHUB_ACTIONS|BUILDKITE|TF_BUILD)\b'
        - type: raw
          regex: '\b(JENKINS_HOME|Docker|cloud-init|cloud\.cfg)\b'
        - type: raw
          regex: 'Vagrant User[\s\S]{0,2048}vagrant insecure public key'
    attack: T1548.004
  - id: python-writes-unrestricted-sudoers-rule
    desc: Python writes unrestricted sudoers rule
    crit: suspicious
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: '\bALL\s*=\s*\(ALL(:ALL)?\)\s+NOPASSWD\s*:\s*ALL\b.{0,100}>{1,2}\s*/etc/sudoers\.d/'
      case_insensitive: true
    attack: T1548.004
  - id: visudo-validate
    desc: visudo validates sudoers configuration
    crit: notable
    conf: 0.7
    for:
      - elf
      - shell
    if:
      type: text
      regex: '\bvisudo\s+-(c|q|cf)\b'
    unless:
      - id: well-known/tool/sysadmin/cubesandbox::cubesandbox-source-path

composite_rules:
  - id: benign-build-sudoers-context
    desc: Build helper sudoers.d context
    crit: component
    conf: 0.9
    any:
      - id: ci-user-handoff-sudo-context
      - id: container-ssh-user-sudo-context
      - id: container-builder-user-sudo-context
      - id: micro-behaviors/fs/path/config/privesc::etc-sudoers-d
  - id: ci-user-handoff-sudo-context
    desc: CI helper sudo handoff context
    crit: component
    conf: 0.95
    for:
      - shell
    all:
      - id: docker-group-membership
      - id: target-script-handoff
  - id: container-ssh-user-sudo-context
    desc: Container image sudo SSH user
    crit: component
    conf: 0.95
    for:
      - shell
      - dockerfile
    all:
      - id: docker-groupadd
      - id: docker-user-switch
      - id: docker-user-unlock
  - id: container-builder-user-sudo-context
    desc: Container build creates builder user with sudo
    crit: component
    conf: 0.93
    for: [shell]
    all:
      - id: builder-system-groupadd
      - id: builder-system-useradd
      - id: cmake-ninja-build-script
