defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: database-json-path
    desc: database.json file path reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: database.json

  - id: default-database-identifier
    desc: Default database object identifier
    crit: component
    conf: 0.88
    if:
      type: text
      substr: default_database

  - id: filepath-database-identifier
    desc: Database filepath variable identifier
    crit: component
    conf: 0.86
    if:
      type: text
      substr: filePathDatabase

composite_rules:
  - id: node-local-json-database-state
    desc: Node local JSON database state
    crit: notable
    conf: 0.93
    all:
      - id: database-json-path
      - id: default-database-identifier
      - id: filepath-database-identifier
