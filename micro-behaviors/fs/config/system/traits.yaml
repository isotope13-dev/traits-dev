defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: read-private-profile-ansi
    desc: Read INI string value
    crit: baseline
    conf: 0.68
    if:
      type: symbol
      exact: GetPrivateProfileStringA
  - id: read-private-profile-int
    desc: Read INI integer value
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetPrivateProfileIntW
  - id: read-profile-string-ansi
    desc: Read legacy profile string
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: GetProfileStringA
  - id: read-profile-string-wide
    desc: Read legacy profile string (wide)
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: GetProfileStringW
  - id: read-private-profile-struct-ansi
    desc: Read INI struct value
    crit: baseline
    conf: 0.68
    if:
      type: symbol
      exact: GetPrivateProfileStructA
  - id: write-profile-string-ansi
    desc: Write legacy profile string
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: WriteProfileStringA
  - id: write-private-profile-ansi
    desc: Write INI string value
    crit: baseline
    conf: 0.72
    if:
      type: symbol
      exact: WritePrivateProfileStringA
  - id: wininit-ini-reference
    desc: WININIT.INI file reference
    crit: component
    conf: 0.86
    if:
      type: text
      exact: WININIT.INI
  - id: wininit-rename-entry
    desc: WININIT rename entry format
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Rename\File
  - id: wininit-rename-section
    desc: WININIT rename section marker
    crit: component
    conf: 0.72
    if:
      type: text
      exact: Rename
  - id: write-private-profile
    desc: Write to INI config file
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: WritePrivateProfileStringW
  - id: read-private-profile
    desc: Read from INI config file
    crit: baseline
    conf: 0.65
    if:
      type: symbol
      exact: GetPrivateProfileStringW
  - id: write-profile-section
    desc: Write INI section
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: WritePrivateProfileSectionW
  - id: get-profile-section
    desc: Read INI section
    crit: baseline
    conf: 0.65
    if:
      type: symbol
      exact: GetPrivateProfileSectionW
composite_rules:
  - id: legacy-profile-api
    desc: Legacy Windows profile API usage
    crit: notable
    conf: 0.84
    any:
      - id: read-profile-string-ansi
      - id: write-profile-string-ansi
      - id: read-private-profile-ansi
      - id: read-private-profile-struct-ansi
  - id: ini-read-write-cycle
    desc: Reads and writes to INI configuration files
    crit: notable
    conf: 0.8
    all:
      - id: read-private-profile
      - id: write-private-profile
  - id: ini-read-write-cycle-ansi
    desc: Reads and writes INI via ANSI
    crit: notable
    conf: 0.82
    all:
      - id: read-private-profile-ansi
    any:
      - id: write-profile-string-ansi
      - id: write-private-profile-ansi
  - id: ini-read-int-write-cycle
    desc: Reads INI integers and writes config
    crit: notable
    conf: 0.8
    all:
      - id: read-private-profile-int
      - id: write-private-profile
  - id: wininit-file-replacement-config
    desc: WININIT reboot replacement config
    crit: notable
    conf: 0.92
    for:
      - pe
    all:
      - id: wininit-ini-reference
      - id: wininit-rename-entry
      - id: wininit-rename-section
    any:
      - id: write-private-profile-ansi
      - id: write-private-profile
