defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: cordova-hook-element
    desc: Cordova hook element creation
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: Element\(['"]hook['"]\)
  - id: cordova-config-xml-string
    desc: Cordova config.xml reference
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: config.xml
  - id: cordova-hook-types-list
    desc: Cordova hook type list
    crit: baseline
    conf: 0.7
    count_min: 6
    if:
      type: string_literal
      regex: (after|before)_[a-z_]+|pre_package
composite_rules:
  - id: cordova-hook-insertion
    desc: Cordova config hook insertion
    crit: notable
    conf: 0.8
    all:
      - id: cordova-hook-element
      - id: cordova-hook-types-list
