defaults:
  platforms: [windows, unix]
  for: [rust]
  crit: notable
  conf: 0.86

traits:
  - id: rust-config-toml-source
    desc: Rust TOML config source
    if:
      type: text
      regex: 'config::File::new\s*\(.{0,120}FileFormat::Toml'

  - id: rust-toml-edit-document
    desc: Rust TOML document mutation
    conf: 0.84
    if:
      type: text
      word: DocumentMut
