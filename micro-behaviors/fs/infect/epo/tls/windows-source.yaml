defaults:
  platforms: [windows]
  for: [text]
traits:
  - id: tls-callback-infection-comment
    desc: TLS callback infection comment
    crit: suspicious
    conf: 0.96
    if:
      type: string
      regex: '(?i)(EPO \(TLS infection\)|Entry Point Obscured via TLS callback function)'
  - id: tls-directory-create-source
    desc: Creates or patches TLS directory
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: '^(add_tlsdir:|tlsfuncptr|tlsdata:|shrug_tlscode[12]:)$'
  - id: post-exitprocess-execution
    desc: Executes payload after ExitProcess
    crit: suspicious
    conf: 0.94
    if:
      type: string
      exact: "//- code executes after ExitProcess() is called"
composite_rules:
  - id: pe-tls-callback-infection-source
    desc: PE infection via TLS callback EPO
    crit: suspicious
    conf: 0.98
    all:
      - id: tls-callback-infection-comment
    any:
      - id: tls-directory-create-source
      - id: post-exitprocess-execution
