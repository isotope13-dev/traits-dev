# PE Appending Infection
defaults:
  platforms: [unix, windows, macos]
  for: [binaries, scripts]
traits:
  - id: last-section-append-logic-1
    desc: Find last section in PE header
    crit: component
    if:
      type: raw
      regex: 'SH_NumberOfSections\s*\]\s*dec\s+ecx'
  - id: last-section-append-logic-2
    desc: Access last section RawData
    crit: component
    if:
      type: raw
      regex: 'lea\s+esi,\[esi\+eax\]\s+lea\s+edx,\[esi\.SH_SizeOfRawData\]'
  - id: pe-virus-size-macro
    desc: Virus size macro
    crit: component
    if:
      type: raw
      regex: 'add\s+dword\s+\[edx\],TAILLE_VIRUS'
  - id: pe-infection-marker-guard-offset
    desc: Checks infection marker at PE offset
    crit: component
    if:
      type: raw
      regex: "cmp\\s+dword ptr\\s+\\[esi\\+4Ch\\],\\s+'[^']{4}'"
  - id: pe-infection-marker-write-offset
    desc: Writes infection marker at PE offset
    crit: suspicious
    if:
      type: raw
      regex: "mov\\s+dword ptr\\s+\\[edi\\+4Ch\\],\\s+'[^']{4}'"
  - id: pe-virus-copy-loop-source
    desc: Copies virus body into mapped PE
    crit: suspicious
    if:
      type: raw
      regex: 'mov\s+ecx,\s+VirusSize|rep\s+movsb'
composite_rules:
  - id: pe-last-section-append
    desc: Appends code to the last section of a PE file
    crit: suspicious
    conf: 0.95
    attack: "T1542.001"
    all:
      - id: micro-behaviors/fs/infect/appending::last-section-append-logic-1
      - id: micro-behaviors/fs/infect/appending::last-section-append-logic-2
      - id: micro-behaviors/fs/infect/appending::pe-virus-size-macro
    unless:
      - type: string
        substr: "OpenMP Runtime"
  - id: pe-last-section-append-source
    desc: Appends virus body into mapped PE section
    crit: suspicious
    conf: 0.95
    all:
      - id: pe-infection-marker-write-offset
      - id: pe-virus-copy-loop-source
    any:
      - id: pe-infection-marker-guard-offset
      - id: micro-behaviors/fs/file/section::asm-pe-section-growth-offset
