# /proc Hardware Information (Linux)
# MBC: E1082 (System Information Discovery)
# ATT&CK: T1082
defaults:
  platforms: [unix, windows, macos]
  for: [elf, shell, python]
traits:
  - id: hardware-nvidia
    desc: Access NVIDIA GPU information via
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      regex: "/proc/driver/nvidia"
