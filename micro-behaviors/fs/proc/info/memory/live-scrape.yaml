defaults:
  for:
    - elf
  platforms:
    - unix
traits:
  - id: c-procfs-maps-template
    desc: Procfs maps path template
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: /proc/%d/maps
    unless:
      - type: basename
        exact: chrome_crashpad_handler
  - id: c-procfs-mem-template
    desc: Procfs mem path template
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: /proc/%d/mem
    unless:
      - type: basename
        exact: chrome_crashpad_handler
  - id: proc-self-mem-path
    desc: proc self mem path
    crit: notable
    conf: 0.85
    platforms: [unix, windows]
    for: [elf, pe, shell, python, javascript, go, csharp, swift]
    if:
      type: text
      substr: /proc/self/mem
    downgrade:
      any:
        - id: metadata/binary/metrics/size::massive-executable
  - id: c-procfs-cmdline-template
    desc: Procfs cmdline path template
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: /proc/%s/cmdline
composite_rules:
  - id: procfs-live-memory-paths
    desc: Procfs live-memory scrape paths
    crit: suspicious
    conf: 0.92
    all:
      - id: c-procfs-maps-template
      - id: c-procfs-mem-template
      - id: c-procfs-cmdline-template
