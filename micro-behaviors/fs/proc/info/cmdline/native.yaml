# Native /proc/<pid>/cmdline path construction (process introspection).
# Reading another process's command line via /proc is a neutral capability used
# by process-management and inspection tools (pkcheck, fastfetch, debuggers); it
# only implies targeting when composed with injection/tasking evidence.
defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
traits:
  - id: native-proc-pid-cmdline-path
    desc: Builds /proc/<pid>/cmdline path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /proc/%d/cmdline
