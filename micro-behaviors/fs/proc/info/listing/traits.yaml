# Process Enumeration via /proc Directory Listing
# Iterating /proc entries to find target processes
defaults:
  platforms: [unix]
traits:
  - id: python-proc-enumerate
    desc: Python /proc directory enumeration for PIDs
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: listdir.{0,20}/proc
  - id: shell-proc-environ-null-parse
    desc: Shell null-byte /proc environ parsing
    crit: notable
    conf: 0.82
    for: [shell]
    if:
      type: text
      regex: tr.{0,15}0.{0,15}n.{0,20}ENVIRON
  - id: shell-environ-keyword-filter
    desc: Shell grep filter for env/ssh environ
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: grep.{0,30}env.{0,5}ssh
  - id: java-proc-pid-directory-walk
    desc: Java enumerates numeric /proc entries
    crit: notable
    conf: 0.9
    for: [java]
    if:
      type: text
      regex: 'new File\("/proc"\)[\s\S]{0,260}name\.matches\("\\\\d\+"\)'
  - id: java-proc-pid-status-read
    desc: Java reads /proc pid status data
    crit: notable
    conf: 0.88
    for: [java]
    if:
      type: text
      regex: '/proc/"\s*\+\s*pid\s*\+\s*"/(cmdline|status)'
