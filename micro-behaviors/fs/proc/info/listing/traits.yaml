# Process Enumeration via /proc Directory Listing
# Iterating /proc entries to find target processes
defaults:
  platforms: [unix]
traits:
  - id: javascript-proc-directory-read
    desc: JavaScript reads the /proc directory
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: 'readdirSync\(["'']/proc["'']\)'
  - id: python-proc-enumerate
    desc: Python /proc directory enumeration for PIDs
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: listdir.{0,20}/proc
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: shell-proc-environ-null-parse
    desc: Shell null-byte /proc environ parsing
    crit: notable
    conf: 0.82
    for: [shell]
    if:
      type: text
      regex: tr.{0,15}0.{0,15}n.{0,20}ENVIRON
  - id: shell-environ-keyword-filter
    desc: Shell grep filter for env/ssh environ
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: grep.{0,30}env.{0,5}ssh
  - id: java-proc-pid-directory-walk
    desc: Java enumerates numeric /proc entries
    crit: notable
    conf: 0.9
    for: [java]
    if:
      type: text
      regex: 'new File\("/proc"\)[\s\S]{0,260}name\.matches\("\\\\d\+"\)'
  - id: java-proc-pid-status-read
    desc: Java reads /proc pid status data
    crit: notable
    conf: 0.88
    for: [java]
    if:
      type: text
      regex: '/proc/"\s*\+\s*pid\s*\+\s*"/(cmdline|status)'
  - id: go-proc-dir-literal
    desc: Go /proc directory literal
    crit: notable
    conf: 0.8
    for: [go]
    if:
      type: string_literal
      exact: /proc
  - id: go-proc-process-enumeration
    desc: Go enumerates processes through /proc
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: text
      regex: 'os\.Open\s*\(\s*"/proc"\s*\)|filepath\.Join\s*\(\s*"/proc"[^\n]{0,120}"cmdline"'

  - id: native-proc-process-record-fields
    desc: Native /proc process record fields
    crit: notable
    conf: 0.96
    for: [elf]
    platforms: [linux, android]
    if:
      type: raw
      regex: '/status[\s\S]{0,4}/comm[\s\S]{0,4}/cmdline[\s\S]{0,4}/stat[\s\S]{0,4}/proc/'
      section: .rodata

composite_rules:
  - id: python-proc-enumerate-cmdline
    desc: Python enumerates PIDs and reads command lines
    crit: notable
    conf: 0.82
    for: [python]
    all:
      - id: python-proc-enumerate
      - id: micro-behaviors/fs/proc/info/path::python-proc-path-join
    near_bytes: 400
