defaults:
  platforms: [unix]
  for: [python, javascript]
traits:
  - id: user-namespace-id-map-path
    desc: User namespace ID map path reference
    crit: notable
    conf: 0.78
    for: [binaries, scripts]
    platforms: [linux, android]
    if:
      type: text
      regex: '/proc/self/(uid_map|gid_map|setgroups)'

  - id: procfs-path-reference
    desc: "/proc fs path in native binary"
    crit: baseline
    conf: 0.4
    for: [elf]
    platforms: [unix, android]
    if:
      type: text
      substr: /proc/
      section: .text
  - id: process-arbitrary
    desc: Access /proc for arbitrary PIDs
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: '(/proc/[%{$][/\$\w\}]{0,12}|^/proc/%[^/]{1,12}$|/proc/\[0-9\]\*)'
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - id: metadata/file/string/identity::chrome-sandbox-basename
      - type: basename
        exact: chrome_crashpad_handler
      - id: well-known/app/tabby::tabby-basename
      - type: text
        substr: self/
  - id: process-self-exe-path
    desc: Read own executable path (/proc/self/exe)
    crit: baseline
    conf: 0.66
    for: [scripts, binaries, c, cpp, objc, macho, rust, go]
    if:
      type: text
      substr: /proc/self/exe
    unless:
      - id: well-known/app/tabby::tabby-basename
  - id: process-self-exe-partial
    desc: Read own executable path (self/exe)
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: self/exe
    unless:
      - id: well-known/app/tabby::tabby-basename
  - id: process-self-fd-path
    desc: Access /proc/self/fd file descriptor path
    crit: notable
    conf: 0.7
    for: [elf, c, cpp, rust, go]
    platforms: [linux]
    if:
      type: text
      substr: /proc/self/fd/
    unless:
      - id: well-known/app/drivers/
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: process-pid-fd-format
    desc: Procfs process FD path template
    crit: notable
    conf: 0.8
    for: [elf, c, cpp, rust, go]
    platforms: [linux, android]
    if:
      type: text
      regex: '^/proc/%[sd]/fd/?(%[sd])?$'
  - id: process-self-ex-fragment
    desc: Read own executable path fragment (self/ex)
    crit: baseline
    conf: 0.58
    platforms:
      - linux
    for:
      - elf
    if:
      type: text
      substr: self/ex
    unless:
      - type: text
        substr: self/exe
  - id: process-self-cmdline
    desc: References own command-line procfs path
    crit: notable
    conf: 0.66
    for: [scripts, binaries, c, cpp, rust, go]
    platforms: [unix, android]
    if:
      type: text
      substr: /proc/self/cmdline
  - id: process-self-comm
    desc: Access own process name via /proc/self/comm
    crit: notable
    conf: 0.66
    for: [scripts, binaries, c, cpp, rust, go]
    platforms: [unix, android]
    if:
      type: text
      substr: /proc/self/comm
  - id: process-self-status
    desc: References own process status procfs path
    crit: notable
    conf: 0.74
    for: [scripts, -javascript, -typescript, elf, c, cpp]
    platforms: [unix, android]
    if:
      type: text
      substr: /proc/self/status
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: process-self-environ
    desc: Read own process environment via procfs
    crit: notable
    conf: 0.92
    for: [scripts, -javascript, -typescript, binaries, c, cpp, rust, go]
    platforms: [linux, android]
    if:
      type: text
      substr: /proc/self/environ
  - id: tracerpid-status-field
    desc: TracerPid process status field
    crit: notable
    conf: 0.7
    for: [scripts, binaries, c, cpp, rust, go]
    platforms: [unix, android]
    if:
      type: text
      substr: "TracerPid:"
    unless:
      - id: metadata/library/structure::js-emscripten-embind-val-marker
  - id: process-self-maps
    desc: Read own process memory maps
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/self/maps
    unless:
      - id: well-known/app/tabby::tabby-basename
      - id: metadata/file/string/identity::python3-interpreter-basename
  - id: process-pid-maps
    desc: Read process memory maps via /proc/PID/maps
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/maps
  - id: process-pid-maps-format
    desc: Process maps path format
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: ^/proc/%[^/]{1,12}/maps$
    unless:
      - type: basename
        exact: chrome_crashpad_handler
      - id: well-known/app/tabby::tabby-basename
      - type: text
        substr: self/
  - id: process-pid-mem
    desc: Access process memory via /proc/*/mem
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: /proc/[0-9]{1,10}/mem
    unless:
      # Permission and safety tests use /proc/PID/mem as a denied-path
      # fixture; the test string does not demonstrate memory scraping.
      - id: metadata/package/testing/presence/harness/
  - id: process-pid-mem-format
    desc: Process memory path format
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: ^/proc/%[^/]{1,12}/mem$
    unless:
      - type: basename
        exact: chrome_crashpad_handler
      - id: well-known/app/tabby::tabby-basename
      - id: metadata/package/testing/presence/harness/
      - type: text
        substr: self/
  - id: process-pid-mem-template-rust
    desc: Rust procfs process memory path template
    crit: notable
    conf: 0.88
    for: [rust, elf]
    platforms: [routeros, appliance, unix]
    if:
      type: text
      regex: '/proc/(\{.{0,80}\}|self|[0-9]{1,8})/(task/[^/]{1,32}/)?mem\b'
    unless:
      - id: micro-behaviors/process/debug/tool-markers::gdb-debugger-text-marker
      - id: micro-behaviors/process/debug/tool-markers::org-gnu-gdb-marker
      - id: micro-behaviors/process/debug/tool-markers::lldb-ptrace-text-marker
    downgrade:
      any:
        - id: micro-behaviors/ui/help/
  - id: process-pid-cmdline
    desc: Read process command line via /proc/PID/cmdline
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/cmdline
  - id: process-pid-cmdline-format
    desc: Process cmdline path format
    crit: notable
    conf: 0.72
    for: [scripts, elf, c, cpp]
    platforms: [unix, android]
    if:
      type: text
      regex: ^/proc/%[^/]{1,12}/cmdline$
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
  - id: process-maps-cmdline-fragment-cluster
    desc: Split proc maps/cmdline path cluster
    crit: notable
    conf: 0.78
    for: [elf]
    platforms: [unix, android]
    if:
      type: raw
      regex: '/proc/\x00[\s\S]{0,128}/maps\x00[\s\S]{0,128}/cmdline\x00'
      section: .rodata
  - id: process-pid-cmdline-suffix
    desc: Process cmdline suffix format
    crit: notable
    conf: 0.74
    for: [elf]
    if:
      type: text
      regex: ^%[^/]{1,12}/cmdline$
  - id: process-pid-cmdline-suffix-xor
    desc: XOR-obfuscated process cmdline suffix
    crit: suspicious
    conf: 0.88
    for: [elf]
    if:
      type: encoded
      encoding: xor
      regex: ^%[^/]{1,12}/cmdline$
  - id: lua-process-info-path
    desc: Lua builds /proc process information paths
    crit: notable
    conf: 0.88
    for: [lua]
    if:
      type: text
      regex: '/proc/.{0,24}/(cmdline|comm|status)'
  - id: process-pid-environ
    desc: Read process environment via /proc/*/environ
    crit: suspicious
    unless:
      - id: well-known/tool/offensive/pentestkit/
    conf: 0.66
    if:
      type: text
      regex: '/proc/[0-9]{1,10}/environ'
    not:
      - exact: /proc/1/environ
      - substr: /proc/self/
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family/
  - id: proc-pid-environ-glob
    desc: Glob pattern for /proc/*/environ
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '/proc/\[0-9\]\*/environ'
  - id: proc-pid-cmdline-glob
    desc: Glob pattern for /proc/*/cmdline
    # Same capability as process-pid-cmdline (notable): enumerating cmdline via
    # a glob is ordinary process discovery, not by itself suspicious intent.
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '/(proc/\[0-9\]\*|\$[a-zA-Z_]\w*)/cmdline'
  - id: process-var-cmdline
    desc: Read process cmdline via /proc var path
    crit: notable
    conf: 0.7
    for: [shell, python, lua]
    if:
      type: string_literal
      regex: /proc/[\$\{%f].{0,20}/cmdline
  - id: process-var-environ
    desc: "Read process env via /proc var path"
    crit: notable
    conf: 0.7
    for:
      - shell
      - python
      - lua
    unless:
      - id: micro-behaviors/fs/proc/info/path::kde-dbus-session-environ
      # AI-agent observability tools read /proc env for telemetry.
      - id: well-known/tool/detection/ai-guardrail/
    if:
      type: string_literal
      regex: /proc/[\$\{%f].{0,20}/environ
  - id: lua-process-var-environ
    desc: Lua builds /proc process environment paths
    crit: suspicious
    conf: 0.88
    for: [lua]
    if:
      type: text
      regex: '/proc/.{0,30}/environ'
  - id: kde-dbus-session-environ
    desc: KDE DBus session lookup
    crit: notable
    conf: 0.9
    for:
      - shell
      - python
    if:
      type: text
      regex: DBUS_SESSION_BUS_ADDRESS.{0,120}/proc/[\$\{%f].{0,20}/environ
  - id: process-pid-environ-suffix
    desc: Read process environment suffix via proc
    crit: suspicious
    conf: 0.78
    for: [elf]
    if:
      type: text
      regex: ^%[^/]{1,12}/environ$
  - id: process-pid-environ-suffix-xor
    desc: XOR-obfuscated process environment suffix
    crit: suspicious
    conf: 0.9
    for: [elf]
    if:
      type: encoded
      encoding: xor
      regex: ^%[^/]{1,12}/environ$
  - id: process-pid-fd
    desc: Access process file descriptors via /proc/PID/fd
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/fd
  - id: linux-process-pid-exe
    desc: Process exe path via /proc
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/exe
  - id: process-pid-exe-template
    desc: Process executable path template via /proc
    crit: notable
    conf: 0.7
    for: [elf, c, cpp, objc, rust]
    platforms: [linux, android]
    if:
      type: text
      regex: /proc/%[sd]/exe
  - id: process-pid-cmdline-token
    desc: Procfs process command-line path fragment
    crit: component
    conf: 0.72
    for: [elf, c, cpp, objc, rust]
    platforms: [linux, android]
    if:
      type: text
      exact: cmdline
  - id: process-pid-status
    desc: Read process status via /proc/*/status
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/status
  - id: process-pid-stat
    desc: Read process statistics via /proc/*/stat
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/stat\b
  - id: process-pid-stat-template
    desc: Procfs process stat path template
    crit: notable
    conf: 0.8
    for: [elf, c, cpp, rust, go]
    platforms: [linux, android]
    if:
      type: text
      regex: /proc/%[sd]/stat\b

  - id: python-proc-path-join
    desc: os.path.join for /proc sensitive files
    crit: notable
    conf: 0.85
    if:
      # `os.path.join(proc_dir, "<pseudo-file>")` — the /proc pseudo-files are
      # exact path SEGMENTS. Anchor the arg so a bare substring no longer matches
      # ordinary filenames (e.g. "unicode_ind**exe**r.json", "...mem...", "...maps...").
      type: symbol
      kind: call
      exact: 'os.path.join'
      arg:
        kind: string
        regex: '^(cmdline|maps|mem|environ|exe)$'

  - id: process-oom
    desc: Adjust OOM score via procfs
    crit: suspicious
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/oom_score_adj
  - id: proc-net-tcp
    desc: Read TCP connection table
    crit: notable
    conf: 0.7
    for: [scripts, elf, c]
    if:
      type: text
      substr: /proc/net/tcp
  - id: proc-pid-format
    desc: /proc/<pid> path format string
    crit: component
    conf: 0.3
    for: [elf]
    size_min: 512
    size_max: 200000
    if:
      type: text
      substr: /proc/%d
      section: .rodata
  - id: proc-net-tcp-xor
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 24 26 3B 37 7B 3A 31 20 7B 20 37 24 54
  - id: proc-net-tcp-xor62
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 0C 07 16 4D 16 01 12 62
  - id: proc-net-tcp-xor14
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.92
    if:
      type: hex
      section: .rodata
      pattern: 21 7E 7C 61 6D 21 60 6B 7A 21 7A 6D 7E
  - id: proc-net-udp
    desc: Read UDP connection table
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /proc/net/udp
  - id: proc-net-raw
    desc: Read raw socket table
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: /proc/net/raw
  - id: proc-net-arp
    desc: Read ARP table
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /proc/net/arp
  - id: proc-dir-xor
    desc: XOR-obfuscated /proc directory path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 24 26 3B 37 7B 54
  - id: proc-dir-xor14
    desc: XOR-obfuscated /proc directory path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 21 7E 7C 61 6D 21
  - id: process-exe-xor
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 31 2C 31 54
  - id: process-exe-xor14
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 21 6B 76 6B
  - id: process-cmdline-xor14
    desc: XOR-obfuscated process cmdline path
    crit: notable
    conf: 0.92
    if:
      type: hex
      section: .rodata
      pattern: 21 6D 63 6A 62 67 60 6B
  - id: process-fd-xor
    desc: XOR-obfuscated process fd path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 32 30 54
  - id: process-maps-xor
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 39 35 24 27 54
  - id: process-maps-xor14
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 21 63 6F 7E 7D
  - id: process-status-xor
    desc: XOR-obfuscated process status path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 27 20 35 20 21 27 54
  - id: process-exe-xor62
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 07 1A 07 62
  - id: process-fd-xor62
    desc: XOR-obfuscated process fd path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 04 06 62
  - id: process-maps-xor62
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 0F 03 12 11 62
  - id: process-status-xor62
    desc: XOR-obfuscated process status path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 11 16 03 16 17 11 62
composite_rules:
  - id: process-inspection-path-cluster
    desc: Procfs process enumeration path cluster
    crit: notable
    conf: 0.9
    for: [elf, c, cpp, objc, rust, go]
    platforms: [linux, android]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-pid-exe-template
      - id: micro-behaviors/fs/proc/info/path::process-pid-stat-template
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline-token
    any:
      - id: micro-behaviors/fs/proc/info/path::process-pid-maps-format
      - id: micro-behaviors/fs/proc/info/memory::c-procfs-maps-template
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline-format
      - id: micro-behaviors/fs/proc/info/cmdline::native-proc-pid-cmdline-path
  - id: process-self-exe
    desc: Read own executable path via /proc
    crit: baseline
    conf: 0.66
    any:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-partial
  - id: process-pid-maps-any
    desc: Read process maps via proc
    crit: notable
    conf: 0.7
    any:
      - id: process-pid-maps
      - id: process-pid-maps-format
  - id: process-pid-mem-any
    desc: Access process memory via proc
    crit: suspicious
    conf: 0.8
    any:
      - id: process-pid-mem
      - id: process-pid-mem-format
  - id: process-cmdline-suffix-targeting
    desc: Read process cmdline suffix via proc
    crit: notable
    conf: 0.78
    all:
      - id: process-arbitrary
      - id: process-pid-cmdline-suffix
  - id: process-cmdline-suffix-targeting-xor
    desc: XOR-obfuscated process cmdline targeting
    crit: suspicious
    conf: 0.9
    all:
      - id: process-arbitrary
      - id: process-pid-cmdline-suffix-xor
  - id: process-cmdline-targeting
    desc: Read process cmdline via proc
    crit: notable
    conf: 0.76
    any:
      - id: process-pid-cmdline
      - id: process-pid-cmdline-format
      - id: process-var-cmdline
      - id: process-cmdline-suffix-targeting
      - id: process-cmdline-suffix-targeting-xor
  - id: process-environ-suffix-targeting
    desc: Read process environment suffix via proc
    crit: suspicious
    conf: 0.84
    all:
      - id: process-arbitrary
      - id: process-pid-environ-suffix
  - id: process-environ-suffix-targeting-xor
    desc: XOR-obfuscated process environment targeting
    crit: suspicious
    conf: 0.92
    all:
      - id: process-arbitrary
      - id: process-pid-environ-suffix-xor
  - id: process-environ-targeting
    desc: Read process environment via proc
    crit: notable
    conf: 0.82
    any:
      - id: process-pid-environ
      - id: process-var-environ
      - id: process-environ-suffix-targeting
      - id: process-environ-suffix-targeting-xor
  - id: process-pid-mem-maps-helper
    desc: Helper for process memory access
    all:
      - id: process-pid-maps-any
      - id: process-pid-mem-any
  - id: process-memory-pid-maps
    desc: Arbitrary-process maps and memory access
    all:
      - id: process-arbitrary
      - id: process-pid-mem-maps-helper
  - id: process-memory-python-paths
    desc: Python arbitrary-process memory path access
    all:
      - id: process-arbitrary
      - id: python-proc-path-join
      - id: micro-behaviors/os/privilege/paths::proc-mem
  - id: process-memory-dumper
    desc: Dumps process memory via /proc
    crit: suspicious
    conf: 0.8
    any:
      - id: process-memory-pid-maps
      - id: process-memory-python-paths
  - id: process-inspection-xor
    desc: XOR-obfuscated proc process inspection
    crit: suspicious
    conf: 0.88
    needs: 4
    any:
      - id: proc-dir-xor
      - id: process-exe-xor
      - id: process-fd-xor
      - id: process-maps-xor
      - id: process-status-xor
      - id: proc-net-tcp-xor
      - id: process-exe-xor62
      - id: process-fd-xor62
      - id: process-maps-xor62
      - id: process-status-xor62
      - id: proc-net-tcp-xor62
      - id: process-pid-cmdline-suffix-xor
      - id: process-pid-environ-suffix-xor
