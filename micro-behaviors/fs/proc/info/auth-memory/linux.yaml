# Linux auth-memory search markers
defaults:
  for: [elf]
  platforms: [linux, unix]
  crit: component
traits:
  - id: pammodutil-getpwnam-root
    desc: PAM getpwnam root marker
    conf: 0.82
    if:
      type: string
      substr: "pammodutil_getpwnam_root_1"
  - id: pammodutil-getspnam
    desc: PAM getspnam marker
    conf: 0.82
    if:
      type: string
      substr: "pammodutil_getspnam_"
  - id: gkr-system-authtok
    desc: Gnome keyring auth token marker
    conf: 0.82
    if:
      type: string
      substr: "gkr_system_authtok"
  - id: libgck-keyring-marker
    desc: libgck keyring search marker
    conf: 0.78
    if:
      type: string
      substr: "libgck"
  - id: libgcrypt-keyring-marker
    desc: libgcrypt keyring search marker
    conf: 0.78
    if:
      type: string
      substr: "libgcrypt"
  - id: sudo-memory-marker
    desc: sudo memory search marker
    conf: 0.76
    if:
      type: string
      substr: "^sudo.+"
  - id: vsftpd-memory-marker
    desc: VSFTPD memory search marker
    conf: 0.76
    if:
      type: string
      substr: "^::.+\\:"
