# Process Cmdline Search via /proc
# Reading /proc/PID/cmdline to find specific target processes
defaults:
  platforms: [unix]
  for: [python, shell]
traits:
  - id: python-cmdline-binary-search
    desc: Python binary string search in cmdline
    crit: notable
    conf: 0.82
    for: [python]
    if:
      type: text
      regex: b'[A-Z]\w+\.\w+' in f\.read
  - id: shell-pgrep-runner
    desc: Shell pgrep targeting CI runner processes
    crit: notable
    conf: 0.85
    for: [shell]
    if:
      type: text
      substr: Runner.Worker Runner.Listener
