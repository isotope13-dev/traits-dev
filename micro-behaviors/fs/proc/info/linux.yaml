defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - elf
    - shell
    - python
traits:
  - id: process-arbitrary
    desc: Access /proc for arbitrary PIDs
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[%{$][/\\$\\w\\}]{0,12}
  - id: process-self-exe-path
    desc: Read own executable path (/proc/self/exe)
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: /proc/self/exe
  - id: process-self-exe-partial
    desc: Read own executable path (self/exe)
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: self/exe
  - id: process-self-cmdline
    desc: Read own command line via
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: /proc/self/cmdline
  - id: process-self-status
    desc: Read own process status via
    crit: baseline
    conf: 0.66
    if:
      type: string_value
      substr: /proc/self/status
  - id: process-self-maps
    desc: Read own process memory maps
    crit: notable
    conf: 0.66
    if:
      type: string_value
      substr: /proc/self/maps
  - id: process-pid-maps
    desc: Read process memory maps via
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/maps
  - id: process-pid-maps-format
    desc: Process maps path format
    crit: notable
    conf: 0.72
    if:
      type: string_value
      regex: ^/proc/%[^/]{1,12}/maps$
  - id: process-pid-mem
    desc: Access process memory via /proc/*/mem
    crit: suspicious
    conf: 0.75
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/mem
  - id: process-pid-mem-format
    desc: Process memory path format
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: ^/proc/%[^/]{1,12}/mem$
  - id: process-pid-cmdline
    desc: Read process command line via
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/cmdline
  - id: process-pid-cmdline-format
    desc: Process cmdline path format
    crit: notable
    conf: 0.72
    if:
      type: string_value
      regex: ^/proc/%[^/]{1,12}/cmdline$
  - id: process-pid-environ
    desc: Read process environment via /proc/*/environ
    crit: suspicious
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/environ
    not:
      - substr: /proc/self/
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::debugger-tool-marker
  - id: process-pid-fd
    desc: Access process file descriptors via
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/fd
  - id: linux-process-pid-exe
    desc: Process exe path via /proc
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/exe
  - id: process-pid-status
    desc: Read process status via /proc/*/status
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/status
  - id: process-pid-stat
    desc: Read process statistics via /proc/*/stat
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/stat\b
  - id: python-proc-path-join
    desc: os.path.join for /proc sensitive files
    crit: notable
    conf: 0.85
    if:
      type: ast
      query: "((call\n  function: (attribute\n    object: (attribute\n      object: (identifier) @os\n      attribute: (identifier) @path)\n    attribute: (identifier) @join)\n  arguments: (argument_list\n    (string) @proc\n    (identifier)\n    (string) @file))\n (#eq? @os \"os\")\n (#eq? @path \"path\")\n (#eq? @join \"join\")\n (#match? @proc \"/proc\")\n (#match? @file \"cmdline|maps|mem|environ|exe\"))\n"
  - id: process-oom
    desc: Adjust OOM killer score via
    crit: suspicious
    conf: 0.66
    if:
      type: string_value
      regex: /proc/[0-9]{1,10}/oom_score_adj
  - id: proc-net-tcp
    desc: Read TCP connection table
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /proc/net/tcp
  - id: proc-net-tcp-xor
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 24 26 3B 37 7B 3A 31 20 7B 20 37 24 54
  - id: proc-net-tcp-xor62
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 0C 07 16 4D 16 01 12 62
  - id: proc-net-udp
    desc: Read UDP connection table
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /proc/net/udp
  - id: proc-net-raw
    desc: Read raw socket table
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: /proc/net/raw
  - id: proc-net-arp
    desc: Read ARP table
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /proc/net/arp
  - id: proc-dir-xor
    desc: XOR-obfuscated /proc directory path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 24 26 3B 37 7B 54
  - id: process-exe-xor
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 31 2C 31 54
  - id: process-fd-xor
    desc: XOR-obfuscated process fd path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 32 30 54
  - id: process-maps-xor
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 39 35 24 27 54
  - id: process-status-xor
    desc: XOR-obfuscated process status path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 27 20 35 20 21 27 54
  - id: process-exe-xor62
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 07 1A 07 62
  - id: process-fd-xor62
    desc: XOR-obfuscated process fd path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 04 06 62
  - id: process-maps-xor62
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 0F 03 12 11 62
  - id: process-status-xor62
    desc: XOR-obfuscated process status path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 11 16 03 16 17 11 62
composite_rules:
  - id: process-self-exe
    desc: Read own executable path via /proc
    crit: baseline
    conf: 0.66
    any:
      - id: micro-behaviors/fs/proc/info::process-self-exe-path
      - id: micro-behaviors/fs/proc/info::process-self-exe-partial
  - id: process-pid-maps-any
    desc: Read process maps via proc
    crit: notable
    conf: 0.7
    any:
      - id: process-pid-maps
      - id: process-pid-maps-format
  - id: process-pid-mem-any
    desc: Access process memory via proc
    crit: suspicious
    conf: 0.8
    any:
      - id: process-pid-mem
      - id: process-pid-mem-format
  - id: process-cmdline-targeting
    desc: Read process cmdline via proc
    crit: notable
    conf: 0.7
    any:
      - id: process-pid-cmdline
      - id: process-pid-cmdline-format
  - id: process-pid-mem-maps-helper
    desc: Helper for process memory access
    all:
      - id: process-pid-maps-any
      - id: process-pid-mem-any
  - id: process-memory-dumper
    desc: Dumps process memory via /proc
    crit: suspicious
    conf: 0.8
    any:
      - id: python-proc-path-join
      - id: process-pid-mem-maps-helper
  - id: process-inspection-xor
    desc: XOR-obfuscated proc process inspection
    crit: suspicious
    conf: 0.88
    needs: 4
    any:
      - id: proc-dir-xor
      - id: process-exe-xor
      - id: process-fd-xor
      - id: process-maps-xor
      - id: process-status-xor
      - id: proc-net-tcp-xor
      - id: process-exe-xor62
      - id: process-fd-xor62
      - id: process-maps-xor62
      - id: process-status-xor62
      - id: proc-net-tcp-xor62
