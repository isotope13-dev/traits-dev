defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - elf
    - shell
    - python
traits:
  - id: process-arbitrary
    desc: Access /proc for arbitrary PIDs
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: '(/proc/[%{$][/\$\w\}]{0,12}|^/proc/%[^/]{1,12}$)'
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - type: basename
        exact: chrome-sandbox
      - type: basename
        exact: chrome_crashpad_handler
      - type: basename
        exact: tabby
      - type: text
        substr: self/
  - id: process-self-exe-path
    desc: Read own executable path (/proc/self/exe)
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: /proc/self/exe
    unless:
      - type: basename
        exact: tabby
  - id: process-self-exe-partial
    desc: Read own executable path (self/exe)
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: self/exe
    unless:
      - type: basename
        exact: tabby
  - id: process-self-cmdline
    desc: Read own command line via
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: /proc/self/cmdline
  - id: process-self-status
    desc: Read own process status via
    crit: baseline
    conf: 0.66
    if:
      type: text
      substr: /proc/self/status
  - id: process-self-maps
    desc: Read own process memory maps
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/self/maps
    unless:
      - type: basename
        exact: tabby
      - type: basename
        exact: python3
  - id: process-pid-maps
    desc: Read process memory maps via
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/maps
  - id: process-pid-maps-format
    desc: Process maps path format
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: ^/proc/%[^/]{1,12}/maps$
    unless:
      - type: basename
        exact: chrome_crashpad_handler
      - type: basename
        exact: tabby
      - type: text
        substr: self/
  - id: process-pid-mem
    desc: Access process memory via /proc/*/mem
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: /proc/[0-9]{1,10}/mem
  - id: process-pid-mem-format
    desc: Process memory path format
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: ^/proc/%[^/]{1,12}/mem$
    unless:
      - type: basename
        exact: chrome_crashpad_handler
      - type: basename
        exact: tabby
      - type: text
        substr: self/
  - id: process-pid-cmdline
    desc: Read process command line via
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/cmdline
  - id: process-pid-cmdline-format
    desc: Process cmdline path format
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: ^/proc/%[^/]{1,12}/cmdline$
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
  - id: process-pid-cmdline-suffix
    desc: Process cmdline suffix format
    crit: notable
    conf: 0.74
    for: [elf]
    if:
      type: text
      regex: ^%[^/]{1,12}/cmdline$
  - id: process-pid-cmdline-suffix-xor
    desc: XOR-obfuscated process cmdline suffix
    crit: suspicious
    conf: 0.88
    for: [elf]
    if:
      type: encoded
      encoding: xor
      regex: ^%[^/]{1,12}/cmdline$
  - id: process-pid-environ
    desc: Read process environment via /proc/*/environ
    crit: suspicious
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/environ
    not:
      - exact: /proc/1/environ
      - substr: /proc/self/
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::debugger-tool-marker
  - id: process-var-environ
    desc: Read process environment via /proc variable path
    crit: suspicious
    conf: 0.7
    for:
      - shell
      - python
    if:
      type: string_literal
      regex: /proc/[\$\{%f].{0,20}/environ
  - id: process-pid-environ-suffix
    desc: Read process environment suffix via proc
    crit: suspicious
    conf: 0.78
    for: [elf]
    if:
      type: text
      regex: ^%[^/]{1,12}/environ$
  - id: process-pid-environ-suffix-xor
    desc: XOR-obfuscated process environment suffix
    crit: suspicious
    conf: 0.9
    for: [elf]
    if:
      type: encoded
      encoding: xor
      regex: ^%[^/]{1,12}/environ$
  - id: process-pid-fd
    desc: Access process file descriptors via
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/fd
  - id: linux-process-pid-exe
    desc: Process exe path via /proc
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/exe
  - id: process-pid-status
    desc: Read process status via /proc/*/status
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/status
  - id: process-pid-stat
    desc: Read process statistics via /proc/*/stat
    crit: notable
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/stat\b
  - id: python-proc-path-join
    desc: os.path.join for /proc sensitive files
    crit: notable
    conf: 0.85
    if:
      type: ast
      query: "((call\n  function: (attribute\n    object: (attribute\n      object: (identifier) @os\n      attribute: (identifier) @path)\n    attribute: (identifier) @join)\n  arguments: (argument_list\n    (string) @proc\n    (identifier)\n    (string) @file))\n (#eq? @os \"os\")\n (#eq? @path \"path\")\n (#eq? @join \"join\")\n (#match? @proc \"/proc\")\n (#match? @file \"cmdline|maps|mem|environ|exe\"))\n"
  - id: process-oom
    desc: Adjust OOM killer score via
    crit: suspicious
    conf: 0.66
    if:
      type: text
      regex: /proc/[0-9]{1,10}/oom_score_adj
  - id: proc-net-tcp
    desc: Read TCP connection table
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /proc/net/tcp
  - id: proc-net-tcp-xor
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: .rodata
      pattern: 7B 24 26 3B 37 7B 3A 31 20 7B 20 37 24 54
  - id: proc-net-tcp-xor62
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 0C 07 16 4D 16 01 12 62
  - id: proc-net-tcp-xor14
    desc: XOR-obfuscated TCP connection table path
    crit: notable
    conf: 0.92
    if:
      type: hex
      section: .rodata
      pattern: 21 7E 7C 61 6D 21 60 6B 7A 21 7A 6D 7E
  - id: proc-net-udp
    desc: Read UDP connection table
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /proc/net/udp
  - id: proc-net-raw
    desc: Read raw socket table
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: /proc/net/raw
  - id: proc-net-arp
    desc: Read ARP table
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /proc/net/arp
  - id: proc-dir-xor
    desc: XOR-obfuscated /proc directory path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 24 26 3B 37 7B 54
  - id: proc-dir-xor14
    desc: XOR-obfuscated /proc directory path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 21 7E 7C 61 6D 21
  - id: process-exe-xor
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 31 2C 31 54
  - id: process-exe-xor14
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 21 6B 76 6B
  - id: process-cmdline-xor14
    desc: XOR-obfuscated process cmdline path
    crit: notable
    conf: 0.92
    if:
      type: hex
      section: .rodata
      pattern: 21 6D 63 6A 62 67 60 6B
  - id: process-fd-xor
    desc: XOR-obfuscated process fd path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 32 30 54
  - id: process-maps-xor
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 39 35 24 27 54
  - id: process-maps-xor14
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 21 63 6F 7E 7D
  - id: process-status-xor
    desc: XOR-obfuscated process status path
    crit: notable
    conf: 0.78
    if:
      type: hex
      section: .rodata
      pattern: 7B 27 20 35 20 21 27 54
  - id: process-exe-xor62
    desc: XOR-obfuscated process exe path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 07 1A 07 62
  - id: process-fd-xor62
    desc: XOR-obfuscated process fd path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 04 06 62
  - id: process-maps-xor62
    desc: XOR-obfuscated process maps path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 0F 03 12 11 62
  - id: process-status-xor62
    desc: XOR-obfuscated process status path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: .rodata
      pattern: 4D 12 10 0D 01 4D 47 06 4D 11 16 03 16 17 11 62
composite_rules:
  - id: process-self-exe
    desc: Read own executable path via /proc
    crit: baseline
    conf: 0.66
    any:
      - id: micro-behaviors/fs/proc/info::process-self-exe-path
      - id: micro-behaviors/fs/proc/info::process-self-exe-partial
  - id: process-pid-maps-any
    desc: Read process maps via proc
    crit: notable
    conf: 0.7
    any:
      - id: process-pid-maps
      - id: process-pid-maps-format
  - id: process-pid-mem-any
    desc: Access process memory via proc
    crit: suspicious
    conf: 0.8
    any:
      - id: process-pid-mem
      - id: process-pid-mem-format
  - id: process-cmdline-suffix-targeting
    desc: Read process cmdline suffix via proc
    crit: notable
    conf: 0.78
    all:
      - id: process-arbitrary
      - id: process-pid-cmdline-suffix
  - id: process-cmdline-suffix-targeting-xor
    desc: XOR-obfuscated process cmdline targeting
    crit: suspicious
    conf: 0.9
    all:
      - id: process-arbitrary
      - id: process-pid-cmdline-suffix-xor
  - id: process-cmdline-targeting
    desc: Read process cmdline via proc
    crit: notable
    conf: 0.76
    any:
      - id: process-pid-cmdline
      - id: process-pid-cmdline-format
      - id: process-cmdline-suffix-targeting
      - id: process-cmdline-suffix-targeting-xor
  - id: process-environ-suffix-targeting
    desc: Read process environment suffix via proc
    crit: suspicious
    conf: 0.84
    all:
      - id: process-arbitrary
      - id: process-pid-environ-suffix
  - id: process-environ-suffix-targeting-xor
    desc: XOR-obfuscated process environment targeting
    crit: suspicious
    conf: 0.92
    all:
      - id: process-arbitrary
      - id: process-pid-environ-suffix-xor
  - id: process-environ-targeting
    desc: Read process environment via proc
    crit: suspicious
    conf: 0.82
    any:
      - id: process-pid-environ
      - id: process-var-environ
      - id: process-environ-suffix-targeting
      - id: process-environ-suffix-targeting-xor
  - id: process-pid-mem-maps-helper
    desc: Helper for process memory access
    all:
      - id: process-pid-maps-any
      - id: process-pid-mem-any
  - id: process-memory-dumper
    desc: Dumps process memory via /proc
    crit: suspicious
    conf: 0.8
    any:
      - id: python-proc-path-join
      - id: process-pid-mem-maps-helper
  - id: process-inspection-xor
    desc: XOR-obfuscated proc process inspection
    crit: suspicious
    conf: 0.88
    needs: 4
    any:
      - id: proc-dir-xor
      - id: process-exe-xor
      - id: process-fd-xor
      - id: process-maps-xor
      - id: process-status-xor
      - id: proc-net-tcp-xor
      - id: process-exe-xor62
      - id: process-fd-xor62
      - id: process-maps-xor62
      - id: process-status-xor62
      - id: proc-net-tcp-xor62
      - id: process-pid-cmdline-suffix-xor
      - id: process-pid-environ-suffix-xor
