defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
    - python
traits:
  - id: mounts
    desc: Parse active mounts from /proc/mounts
    crit: notable
    conf: 0.66
    if:
      type: string_value
      substr: /proc/mounts
  - id: mounts-mountinfo
    desc: Read mount info from /proc/self/mountinfo
    crit: notable
    conf: 0.66
    if:
      type: string_value
      substr: /proc/self/mountinfo
