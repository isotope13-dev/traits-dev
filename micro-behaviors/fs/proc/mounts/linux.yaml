defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: proc-mounts-path
    desc: References /proc/mounts path
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/mounts
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
  - id: mounts-mountinfo
    desc: Read mount info from /proc/self/mountinfo
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/self/mountinfo
    downgrade:
      # Go's runtime/cgroup detector embeds "/proc/self/mountinfo" in
      # gopclntab regardless of program behavior.
      any:
        - id: metadata/lang/compiled/
        - id: metadata/lang/compiler/systems::go-binary
