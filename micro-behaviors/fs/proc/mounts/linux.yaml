defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mounts
    desc: Parse active mounts from /proc/mounts
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/mounts
  - id: mounts-mountinfo
    desc: Read mount info from /proc/self/mountinfo
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/self/mountinfo
