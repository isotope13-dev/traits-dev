defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: proc-mounts-path
    desc: References /proc/mounts path
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/mounts
  - id: mounts-mountinfo
    desc: Read mount info from /proc/self/mountinfo
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/self/mountinfo
    downgrade:
      # Go's runtime/cgroup detector embeds "/proc/self/mountinfo" in
      # gopclntab regardless of program behavior.
      any:
        - id: metadata/lang/compiled/
        - id: metadata/lang/compiler/systems::go-binary
