defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries, go]
traits:
- id: container-pid1-cgroup
  desc: Reads /proc/1/cgroup (PID 1 container check)
  crit: notable
  conf: 0.66
  if:
    type: text
    substr: /proc/1/cgroup
- id: container-self-cgroup
    # Neutral capability: reading /proc/self/cgroup. Container/sandbox *detection*
    # is one use, but Go (GOMEMLIMIT) and Rust (available_parallelism) runtimes
    # read it for CPU-quota sizing, as do container-aware apps generally. Describe
    # the read; the anti-analysis intent is concluded by composites that pair it
    # with other VM/container artifact checks.
  desc: Reads own cgroup (/proc/self/cgroup)
  crit: notable
  conf: 0.66
  if:
    type: text
    substr: /proc/self/cgroup
  downgrade:
      # Go's runtime cgroup detector (GOMEMLIMIT / runtime.NumCPU) embeds
      # "/proc/self/cgroup" regardless of program behavior.
    any:
    - id: metadata/lang/compiled/
    - id: metadata/lang/compiler/systems::go-binary

- id: proc-self-status-read
  desc: Reads /proc/self/status
  crit: notable
  conf: 0.8
  if:
    type: string_literal
    exact: /proc/self/status

- id: runtime-crio-keywords
  desc: CRI-O runtime name literal
  crit: component
  conf: 0.82
  if:
    type: string_literal
    regex: '^(cri-o|crio)$'

- id: runtime-engine-keywords--containerd
  desc: Container engine name literal (containerd)
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: containerd
- id: runtime-engine-keywords--docker
  desc: Container engine name literal (docker)
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: docker
- id: runtime-engine-keywords--libpod
  desc: Container engine name literal (libpod)
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: libpod
- id: runtime-engine-keywords--podman
  desc: Container engine name literal (podman)
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: podman
- id: runtime-orchestrator-keywords--kubepods
  desc: Container orchestrator name literal (kubepods)
  crit: component
  conf: 0.82
  if:
    type: string_literal
    exact: kubepods
- id: runtime-orchestrator-keywords--lxc
  desc: Container orchestrator name literal (lxc)
  crit: component
  conf: 0.82
  if:
    type: string_literal
    exact: lxc
composite_rules:
- id: runtime-engine-keywords
  desc: Container engine name literal present
  crit: component
  conf: 0.86
  any:
  - id: runtime-engine-keywords--containerd
  - id: runtime-engine-keywords--docker
  - id: runtime-engine-keywords--libpod
  - id: runtime-engine-keywords--podman
- id: runtime-orchestrator-keywords
  desc: Container orchestrator name literal present
  crit: component
  conf: 0.82
  any:
  - id: runtime-orchestrator-keywords--kubepods
  - id: runtime-orchestrator-keywords--lxc
- id: runtime-keywords
  desc: Container runtime name literal present
  crit: component
  any:
  - id: runtime-engine-keywords
  - id: runtime-orchestrator-keywords
  - id: runtime-crio-keywords

- id: runtime-detection
  desc: Analyzes cgroup structures to detect containers
  # Neutral capability: reading /proc/1/cgroup and matching engine names tells the
  # program whether it runs in a container. Used for login-UX adaptation, resource
  # sizing, and telemetry as much as for sandbox evasion. The anti-analysis verdict
  # is concluded by environment-adaptive-behavior, which pairs this with VM/debugger
  # checks; standalone container detection is notable, not suspicious.
  crit: notable
  conf: 0.9
  all:
  - id: container-pid1-cgroup
  - id: runtime-keywords
  unless:
      # AI-agent observability tools detect the container runtime for telemetry
      # (and security scanners reference it as a signature).
  - id: well-known/tool/detection/ai-guardrail/
  - id: well-known/app/calvyn-code

- id: multi-marker-runtime-detection
  desc: Detects container runtime from multiple markers
  crit: notable
  conf: 0.84
  all:
  - id: container-pid1-cgroup
  any:
  - id: runtime-keywords
  - id: micro-behaviors/os/container/runtime::dockerenv
  - id: micro-behaviors/os/container/runtime::containerenv
  needs: 2
  unless:
  - id: metadata/package/quality/false-positives::benign-app-fp-context
  - id: well-known/app/calvyn-code
