defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, go]
traits:
  - id: container-pid1-cgroup
    desc: Check PID 1 cgroup to
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/1/cgroup
  - id: container-self-cgroup
    desc: Reads own cgroup for detection
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/self/cgroup
    downgrade:
      # Go's runtime cgroup detector (GOMEMLIMIT / runtime.NumCPU) embeds
      # "/proc/self/cgroup" regardless of program behavior.
      any:
        - id: metadata/lang/compiled::go-runtime-marker

  - id: runtime-engine-keywords
    desc: Container engine cgroup keywords
    crit: component
    conf: 0.86
    if:
      type: string_literal
      regex: '^(containerd|docker|libpod|podman)$'

  - id: runtime-orchestrator-keywords
    desc: Container orchestrator cgroup keywords
    crit: component
    conf: 0.82
    if:
      type: string_literal
      regex: '^(kubepods|lxc)$'

  - id: runtime-crio-keywords
    desc: CRI-O cgroup keywords
    crit: component
    conf: 0.82
    if:
      type: string_literal
      regex: '^(cri-o|crio)$'

composite_rules:
  - id: runtime-keywords
    desc: Container runtime cgroup keywords
    crit: component
    any:
      - id: runtime-engine-keywords
      - id: runtime-orchestrator-keywords
      - id: runtime-crio-keywords

  - id: runtime-detection
    desc: Detect container runtime via cgroup
    crit: suspicious
    conf: 0.9
    all:
      - id: container-pid1-cgroup
      - id: runtime-keywords
