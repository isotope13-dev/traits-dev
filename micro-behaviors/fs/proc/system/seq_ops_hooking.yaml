defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: proc-dir-entry-seq-ops
    desc: Access to seq_ops via proc_dir_entry
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: ->seq_ops
  - id: proc-dir-entry-proc-ops
    desc: Access to proc_ops via proc_dir_entry
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: ->proc_ops
