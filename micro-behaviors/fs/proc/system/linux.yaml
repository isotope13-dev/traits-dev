defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: system-cpuinfo
    desc: Get CPU info from /proc/cpuinfo
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/cpuinfo
  - id: system-meminfo
    desc: Get memory info from /proc/meminfo
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/meminfo
  - id: system-stat
    desc: Get system statistics from /proc/stat
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/stat
  - id: system-osrelease
    desc: Get kernel version from /proc/sys/kernel/osrelease
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/sys/kernel/osrelease
