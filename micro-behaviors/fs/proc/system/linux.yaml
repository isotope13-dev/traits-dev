defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: system-cpuinfo
    desc: References /proc/cpuinfo system information path
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/cpuinfo
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/lang/compiler/systems::rust-src-path
      - id: metadata/document/html/
  - id: cpuinfo-hypervisor-marker-check
    desc: Checks /proc/cpuinfo for a hypervisor marker
    crit: suspicious
    conf: 0.92
    platforms: [linux, android]
    for: [scripts, binaries, elf]
    if:
      type: text
      regex: '/proc/cpuinfo[\s\S]{0,260}(hypervisor|virtualbox|qemu)'
    unless:
      - id: metadata/document/html/
  - id: system-meminfo
    desc: Get memory info from /proc/meminfo
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/meminfo
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: system-stat
    desc: References /proc/stat system statistics path
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/stat
  - id: system-stat-xor07
    desc: XOR-0x07 encoded /proc/stat path
    crit: notable
    conf: 0.85
    platforms: [linux, android]
    for: [elf]
    if:
      type: hex
      section: .rodata
      pattern: 28 77 75 68 64 28 74 73 66 73
  - id: system-osrelease
    desc: "Get kernel version /proc/sys/kernel/osrelease"
    crit: notable
    conf: 0.66
    if:
      type: text
      substr: /proc/sys/kernel/osrelease
  - id: pid-max-path-reference
    desc: References Linux kernel PID limit path
    crit: notable
    conf: 0.8
    platforms: [linux]
    if:
      type: text
      substr: /proc/sys/kernel/pid_max
  - id: proc-kallsyms
    desc: /proc/kallsyms kernel symbol file
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: /proc/kallsyms
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/development/profiler
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: proc-ksyms
    desc: /proc/ksyms legacy kernel symbol file
    crit: notable
    conf: 0.75
    platforms: [linux, android]
    if:
      type: text
      substr: /proc/ksyms
