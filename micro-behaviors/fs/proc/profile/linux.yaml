defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: host-profile-path-set
    desc: Procfs host profile path set
    crit: notable
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: '/proc/(cpuinfo|meminfo|net/route|mounts)'
    unless:
      - id: well-known/app/drivers/
