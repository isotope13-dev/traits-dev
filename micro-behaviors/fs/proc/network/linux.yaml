# /proc Network Information (Linux)
# MBC: E1016 (System Network Configuration Discovery)
# ATT&CK: T1016
defaults:
  platforms: [unix, windows, macos]
  for: [elf, shell, python]
traits:
  - id: network-dev
    desc: Read network device statistics from
    crit: notable
    conf: 0.66
    if:
      type: string_value
      substr: /proc/net/dev
  - id: network-route
    desc: Read routing table from /proc/net/route
    crit: notable
    conf: 0.66
    if:
      type: string_value
      substr: /proc/net/route
  - id: network-route-xor
    desc: XOR-obfuscated /proc/net/route path
    crit: notable
    conf: 0.82
    if:
      type: hex
      section: ".rodata"
      pattern: 7B 24 26 3B 37 7B 3A 31 20 7B 26 3B 21 20 31 54
  - id: network-route-xor62
    desc: XOR-obfuscated /proc/net/route path
    crit: notable
    conf: 0.9
    if:
      type: hex
      section: ".rodata"
      pattern: 4D 12 10 0D 01 4D 0C 07 16 4D 10 0D 17 16 07 62
