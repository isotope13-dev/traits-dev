defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - shell
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: chmod-command
    desc: chmod shell command
    conf: 0.6
    if:
      type: string_literal
      regex: chmod\s+[\-\w]*\s*[0-7]{3,4}\s
  - id: chmod-recursive
    desc: chmod -R recursive permission change
    conf: 0.7
    crit: notable
    if:
      type: string_literal
      regex: chmod\s+\-[rR]
