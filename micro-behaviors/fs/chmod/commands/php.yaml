defaults:
  platforms: [unix]
  for: [php]
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: php-shell-chmod-recursive-777
    desc: PHP shell chmod recursive 777
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: chmod\s+-R\s+0?777\b

  - id: php-shell-chown-recursive
    desc: PHP shell chown recursive
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: chown\s+-R\s+[^"'\n]{1,80}

