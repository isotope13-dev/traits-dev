defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: takeown-lower
    desc: takeown command (lowercase)
    crit: notable
    conf: 0.55
    if:
      type: text
      substr: takeown
  - id: takeown-upper
    desc: TAKEOWN command (uppercase)
    crit: notable
    conf: 0.55
    if:
      type: text
      substr: TAKEOWN
  - id: chown-takeown-force
    desc: Forcibly take ownership of files
    crit: suspicious
    conf: 0.66
    if:
      type: text
      regex: (takeown|TAKEOWN).{1,8}/[fFrR].{1,8}/[rRfF] .{0,32}[yY]
composite_rules:
  - id: chown-takeown
    desc: Take ownership of files (Windows
    crit: notable
    conf: 0.66
    any:
      - id: takeown-lower
      - id: takeown-upper
