defaults:
  platforms: [unix]
  for: [elf, macho, c]
traits:
  - id: chown-fn
    desc: Change file ownership
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: chown
  - id: fchown-fn
    desc: Change file ownership by fd
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: fchown
  - id: fchownat-fn
    desc: Change file ownership by dirfd/path
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: fchownat
  - id: lchown-fn
    desc: Change file ownership
    crit: notable
    conf: 0.66
    if:
      type: symbol
      exact: lchown
composite_rules:
  - id: chown
    desc: Change file ownership
    crit: notable
    conf: 0.66
    any:
      - id: chown-fn
      - id: fchown-fn
      - id: fchownat-fn
      - id: lchown-fn
