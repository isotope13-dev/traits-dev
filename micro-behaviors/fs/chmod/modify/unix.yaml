defaults:
  platforms: [linux, macos]
  for: [elf, macho]
traits:
  - id: umask
    desc: Set file creation mask (umask)
    crit: notable
    conf: 0.4
    if:
      type: symbol
      exact: umask
  - id: unix-chmod-unlock-symbol
    desc: Unix chmod unlock symbol
    crit: component
    conf: 0.86
    platforms: [unix]
    for: [c, cpp, objc, elf]
    if:
      type: text
      substr: chmod
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
      - type: trait
        id: metadata/file/extension::linux-kernel-package-artifact-basename
