defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: chmod-setuid-numeric-mode
    desc: chmod sets a SUID numeric mode
    conf: 0.9
    if:
      type: text
      regex: '\bchmod\s+4[0-7]{3}\s+'
  - id: chmod-command
    desc: chmod shell command
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: chmod
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: chmod-recursive
    desc: chmod -R recursive permission change
    conf: 0.7
    crit: notable
    if:
      type: string_literal
      regex: chmod\s+\-[rR]
