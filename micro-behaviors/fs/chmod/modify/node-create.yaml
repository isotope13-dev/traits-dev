defaults:
  platforms: [unix]
  for: [javascript, typescript]

traits:
  - id: node-create-restricted-mode
    desc: Node creates a path with restricted mode
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(mkdir|writeFile)Sync\s*\(.{0,160}\bmode\s*:\s*0o(600|700)\b'
    unless:
      - id: metadata/package/testing/
