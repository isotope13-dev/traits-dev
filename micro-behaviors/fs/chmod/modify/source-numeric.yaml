# Numeric-literal sentinel rules: match chmod-style integer literals
# directly in source code rather than the textual `chmod <mode>` form
# the sibling shell.yaml catches.
#
# Match source-written octal forms. This intentionally avoids decimal
# equivalents such as 511/438, which are often computed constants.
defaults:
  platforms: [unix]
  for: [javascript, typescript]
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: source-chmod-octal-777
    desc: chmodSync directly applies 0o777 mode
    conf: 0.85
    crit: suspicious
    unless:
      - id: well-known/tool/detection/ai-guardrail/
    if:
      type: symbol
      kind: call
      regex: '(^|\.)chmodSync$'
      arg:
        kind: number
        value: 511
        radix: 8
  - id: source-chmod-octal-666
    desc: chmodSync directly applies 0o666 mode
    conf: 0.8
    crit: notable
    if:
      type: symbol
      kind: call
      regex: '(^|\.)chmodSync$'
      arg:
        kind: number
        value: 438
        radix: 8
