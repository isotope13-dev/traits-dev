# Matches chmod calls that receive 0o777 near the call site.
defaults:
  platforms: [unix]
  for: [scripts]
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: chmod-call-with-octal-777
    desc: chmod call with 0o777 arg (call-site specific)
    conf: 0.95
    crit: notable
    if:
      type: text
      regex: 'chmod\s*\([^\r\n)]{0,120}\b0o777\b'
    not:
      - regex: 'chmod\s*\([^\r\n)]{0,120}&\s*0o777\b'
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/harness/unit/
