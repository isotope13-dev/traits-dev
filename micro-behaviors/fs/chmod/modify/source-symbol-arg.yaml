# Matches chmod calls that receive 0o777 near the call site.
defaults:
  platforms: [unix]
  for: [scripts]
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: chmod-call-with-octal-777
    desc: chmod call with 0o777 arg (call-site specific)
    conf: 0.95
    crit: suspicious
    if:
      type: text
      regex: 'chmod\s*\([^\r\n)]{0,120}0o777'
