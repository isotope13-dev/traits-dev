defaults:
  platforms: [windows, linux, macos]
  mbc: E1222
  attack: T1222
traits:
  - id: syscall-chmod
    desc: chmod syscall
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: chmod
    downgrade:
      # Go's os package statically imports chmod for os.Chmod / file.Chmod; all
      # Go Unix binaries link it regardless of whether they actually chmod.
      any:
        - id: metadata/lang/compiler/systems::go-binary-macho
        - id: metadata/lang/compiled::go-runtime-marker
  - id: syscall-fchmod
    desc: fchmod syscall
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: fchmod
    downgrade:
      any:
        - id: metadata/file/text/string::system-shell-basename
  - id: syscall-fchmodat
    desc: fchmodat syscall
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: fchmodat
  - id: syscall-lchmod
    desc: lchmod syscall
    crit: notable
    conf: 0.66
    for:
      - elf
      - macho
    if:
      type: symbol
      exact: lchmod
  - id: python-os-chmod
    desc: Python os.chmod call
    crit: notable
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: os\.chmod\(
    unless:
      - id: micro-behaviors/fs/chmod/executable/mode
  - id: ruby-file-chmod
    desc: Ruby File.chmod call
    crit: notable
    conf: 0.75
    for:
      - ruby
    if:
      type: string_literal
      substr: File.chmod
  - id: ruby-chmod-method
    desc: Ruby .chmod() method call
    crit: notable
    conf: 0.75
    for:
      - ruby
    if:
      type: text
      substr: .chmod(
  - id: ruby-chmod-symbol
    desc: Ruby chmod symbol reference
    crit: baseline
    conf: 0.75
    for:
      - ruby
    if:
      type: text
      substr: :chmod
  - id: node-chmod
    desc: Node.js chmod call
    crit: notable
    conf: 0.7
    for:
      - javascript
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]
      - type: basename
        regex: \.map$
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
    if:
      type: text
      regex: \.chmod(Sync)?\s*\(
    not:
      - substr: options.chmod(p, 0o666
      - substr: fs.fchmod(fd, mode
  - id: go-os-chmod
    desc: Go os.Chmod call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: text
      substr: os.Chmod(
composite_rules:
  - id: syscall
    desc: chmod syscall family
    crit: notable
    conf: 0.66
    any:
      - id: syscall-chmod
      - id: syscall-fchmod
      - id: syscall-fchmodat
      - id: syscall-lchmod
  - id: ruby-comp
    desc: Ruby file permission modification
    crit: notable
    conf: 0.8
    any:
      - id: ruby-file-chmod
      - id: ruby-chmod-method
      - id: ruby-chmod-symbol
