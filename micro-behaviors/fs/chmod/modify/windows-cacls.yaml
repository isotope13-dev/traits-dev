# Windows cacls/icacls grant-permission patterns.
defaults:
  platforms: [windows]
  for: [scripts, binaries]
  size_min: 100
  size_max: 100000000
  attack: T1222.001
traits:
  - id: cacls-grant-everyone-full
    desc: Grant Everyone Full Control via cacls
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\b(cacls|CACLS)\b[^\n]{0,200}/G\s+Everyone:F'
  - id: icacls-grant-everyone-full
    desc: Grant Everyone Full Control via icacls
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bicacls\b[^\n]{0,200}/grant\s+Everyone:F'
      case_insensitive: true
