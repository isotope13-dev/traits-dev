defaults:
  platforms: [windows, unix]
  for:
    - php
  attack: T1222
traits:
  - id: chmod-call
    desc: Changes file permissions via chmod()
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: chmod
    unless:
      - type: text
        regex: namespace\s+Nette
  - id: chown-call
    desc: Changes file owner via chown()
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: chown
  - id: chgrp-call
    desc: Changes file group via chgrp()
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: chgrp
  - id: chmod-user-input
    desc: chmod with user-controlled path
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: chmod\s*\([^)]{0,30}\$_(GET|POST|REQUEST)
  - id: octdec-call
    desc: Converts octal string to decimal (for chmod)
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: octdec
  - id: chmod-octdec-pattern
    desc: chmod with octdec conversion
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: chmod\s*\([^)]{0,50}octdec\s*\(
  - id: fileperms-call
    desc: Gets file permissions
    crit: notable
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: fileperms
  - id: clearstatcache-call
    desc: Clears file stat cache
    crit: notable
    conf: 0.4
    if:
      type: symbol
      kind: call
      exact: clearstatcache
  - id: umask-call
    desc: Gets/sets file creation mask
    crit: notable
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: umask
composite_rules:
  - id: chmod-with-user-input
    desc: Permission modification with user input
    crit: suspicious
    conf: 0.9
    all:
      - id: chmod-call
    any:
      - id: chmod-user-input
      - id: octdec-call
  - id: permission-manipulation
    desc: File permission manipulation pattern
    crit: suspicious
    conf: 0.85
    any:
      - id: chmod-call
      - id: chown-call
