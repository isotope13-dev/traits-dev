defaults:
  platforms: [windows, unix]
  for:
    - php
  attack: T1222
traits:
  - id: chmod-call
    desc: Changes file permissions via chmod()
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: chmod
    unless:
      - type: text
        regex: namespace\s+Nette
  - id: chown-call
    desc: Changes file owner via chown()
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: chown
  - id: chgrp-call
    desc: Changes file group via chgrp()
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: chgrp
  - id: chmod-with-request-path
    desc: Changes permissions on request path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'chmod\s*\(\s*\$_(GET|POST|REQUEST)\b'
  - id: chmod-octdec-pattern
    desc: chmod with octdec conversion
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: chmod\s*\([^)]{0,50}octdec\s*\(
  - id: umask-call
    desc: Gets/sets file creation mask
    crit: notable
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: umask
composite_rules:
  - id: permission-manipulation
    desc: File permission manipulation pattern
    crit: notable
    conf: 0.85
    any:
      - id: chmod-call
      - id: chown-call
