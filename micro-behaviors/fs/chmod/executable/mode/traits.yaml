defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: chmod-make-executable
    desc: chmod marks file executable
    # Neutral capability: `chmod +x` / `chmod 0?7[57][57]`. Building block for
    # the language-agnostic fetch->chmod->exec dropper composites in
    # objectives/command-and-control/dropper/, which reference it cross-dir.
    crit: component
    conf: 0.85
    for: [scripts, source, manifests]
    if:
      type: text
      regex: '\bchmod\s+(\+x|0?7[57][57])\s'
  - id: shell-plus-x
    desc: chmod +x (make executable)
    conf: 0.75
    if:
      type: text
      regex: chmod\s+(\-[a-zA-Z]{1,8}\s+){0,3}\+x\s+["'/\.\$\w\{]
    unless:
      - id: metadata/build/docker::buildkit-dockerfile-frontend
      - id: metadata/file/extension::markdown-file-basename
      - id: metadata/package/tooling::autoconf-generated-script
      - id: metadata/package/testing/harness/runtime::is-test
  - id: shell-plus-x-wildcard
    desc: chmod +x wildcard target
    crit: suspicious
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: 'chmod\s+(\-[a-zA-Z]{1,8}\s+){0,3}\+x\s+\*'
    unless:
      - id: appimage-build-chmod-context
  - id: appimage-build-chmod-context
    desc: AppImage build chmod context
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      substr: '*.AppImage'
  - id: chmod-no-space
    desc: Typo in chmod command without space
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: chmod\s+\+x[a-zA-Z0-9_]{1,64}
  - id: python-executable
    desc: Python os.chmod making file executable
    conf: 0.85
    unless:
      - type: text
        substr: 'preserving the unix file mode bits'
    if:
      type: text
      regex: os\.chmod\([^\n]{0,120}0o7[0-7][0-7]
  - id: python-0755
    desc: Python chmod 755 (owner executable)
    conf: 0.8
    if:
      type: text
      regex: chmod\(.{0,220}0o?755\)
    unless:
      - id: python-executable
  - id: ruby-executable
    desc: Ruby chmod with executable permissions
    for: [ruby]
    conf: 0.8
    if:
      type: text
      regex: chmod\(.{0,220}0[ox]?7[0-7][0-7]\)
  - id: shell-7xx
    desc: Shell chmod 7xx (executable)
    conf: 0.7
    if:
      type: text
      regex: chmod\s+[\-\w]*\s*0?7[0-7][0-7]\s
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/file/extension::markdown-file-basename
      # chmod 700 on .ssh directories is credential-store hardening, not payload executability.
      - type: raw
        regex: 'chmod\s+[\-\w]*\s*0?7[0-7][0-7]\s+[^\n]*\.ssh(\b|/)'
  - id: chmod-setuid-system-binary
    desc: SUID chmod system binary
    crit: suspicious
    conf: 0.9
    platforms: [unix]
    for: [scripts]
    if:
      type: text
      regex: '\bchmod\s+4[0-7]{3}\s+/(bin|usr/bin|sbin|usr/sbin)/'
  - id: chmod-setuid-file
    desc: chmod sets SUID bit
    crit: suspicious
    conf: 0.86
    platforms: [unix]
    for: [scripts]
    if:
      type: text
      regex: '\bchmod\s+\+s\s+'
  - id: python-stat-iexec
    desc: Python os.chmod with stat.S_IEXEC
    conf: 0.9
    if:
      type: text
      regex: os\.chmod\([^)]{0,120}stat\.S_IEXEC
  - id: chmod-exec-local-file
    desc: chmod makes local payload executable
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '\bchmod\s+\+x\s+\./[A-Za-z0-9._-]+'
  - id: chmod-exec-tmp-file
    desc: chmod makes /tmp payload executable
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: '\bchmod\s+\+x\s+/tmp/[A-Za-z0-9._-]+'
