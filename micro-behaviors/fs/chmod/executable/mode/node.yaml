# Node.js "make a file executable" — fs.chmod/chmodSync with an owner-executable
# octal mode. Neutral capability (a legitimate native-module installer also
# chmods its downloaded binary); it becomes a dropper signal only when paired
# with remote download + process execution in the composites under
# objectives/command-and-control/dropper/, which reference these cross-dir.
#
# Two surfaces: the call-fact form keys on the parsed numeric argument so it is
# style-independent and radix-discriminated (a deliberate `0o755` octal mode,
# value 493 written in radix 8 — never an incidental decimal 493); the text form
# is a fallback for variant exec modes and chained `.then(()=>fs.chmod(...))`.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: node-chmod-exec-mode-755
    desc: Node chmod sets 0o755 executable mode
    conf: 0.9
    if:
      type: symbol
      kind: call
      substr: chmod
      arg:
        kind: number
        value: 493
        radix: 8
  - id: node-chmod-exec-mode-777
    desc: Node chmod sets 0o777 executable mode
    conf: 0.9
    if:
      type: symbol
      kind: call
      substr: chmod
      arg:
        kind: number
        value: 511
        radix: 8
  - id: node-chmod-exec-mode-text
    desc: Node chmod with owner-executable octal mode
    conf: 0.82
    if:
      type: text
      regex: 'chmod(Sync)?\s*\([^,)\n]{0,80},\s*0o?[57][0-57][0-57]\b'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
composite_rules:
  - id: node-chmod-make-executable
    desc: Node makes a file executable
    crit: notable
    conf: 0.88
    any:
      - id: node-chmod-exec-mode-755
      - id: node-chmod-exec-mode-777
      - id: node-chmod-exec-mode-text
