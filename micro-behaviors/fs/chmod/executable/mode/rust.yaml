defaults:
  platforms: [linux, macos]
  for: [rust]

traits:
  - id: set-permissions-call
    desc: Rust set permissions call
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: fs::set_permissions(

  - id: permissions-from-mode-755
    desc: Rust sets mode 0755
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Permissions::from_mode\(\s*0o755\s*\)'

composite_rules:
  - id: rust-executable-permissions
    desc: Rust sets executable permissions
    crit: notable
    conf: 0.91
    all:
      - id: set-permissions-call
      - id: permissions-from-mode-755
