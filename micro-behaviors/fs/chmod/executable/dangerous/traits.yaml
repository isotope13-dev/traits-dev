defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  mbc: E1222
  attack: T1222
  crit: notable
traits:
  - id: generic-shell-chmod
    desc: Dangerous chmod values (world-writable)
    for: [shell, batch]
    if:
      type: text
      regex: 'chmod\s+(0?777|0?666|0?775|0?888)\s+[/.$\w-]'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/package/testing/harness/runtime/
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: shell-777
    desc: chmod 777 (world-writable+executable)
    conf: 0.8
    for: [shell, batch]
    if:
      type: text
      regex: 'chmod\s+[\-\w ]{0,4}0?777\s+[/\.\$\w]'
    unless:
      - id: metadata/package/testing/harness/runtime/
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: shell-666
    desc: chmod 666 (world-writable)
    crit: notable
    conf: 0.7
    for: [shell, batch]
    if:
      type: text
      regex: 'chmod\s+[\-\w ]{0,4}0?666\s+[/\.\$\w]'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: python-777
    desc: Python chmod 777
    conf: 0.85
    for: [python]
    if:
      type: string_literal
      regex: chmod\([^)]{0,120}0?o?777\)
  - id: ruby-0777-parens
    desc: Ruby chmod(0777)
    conf: 0.85
    for: [ruby]
    if:
      type: text
      substr: chmod(0777)
  - id: ruby-0777-space
    desc: Ruby chmod 0777
    conf: 0.85
    for: [ruby]
    if:
      type: string_literal
      substr: chmod 0777
  - id: ruby-0o777
    desc: Ruby chmod(0o777)
    conf: 0.85
    for: [ruby]
    if:
      type: text
      substr: chmod(0o777)
  - id: sticky-1777
    desc: chmod 1777 sticky bit (legitimate)
    crit: baseline
    conf: 1.0
    for: [shell, batch]
    if:
      type: text
      regex: chmod\s+0?1777
  - id: var-tmp-777
    desc: chmod 777 /var/tmp (legitimate temp dir)
    crit: baseline
    conf: 1.0
    for: [shell, batch]
    if:
      type: text
      regex: \bchmod 0777 /var/tmp\b
composite_rules:
  - id: chmod-777
    desc: World-writable+executable permissions (777)
    crit: suspicious
    conf: 0.85
    any:
      - id: shell-777
      - id: python-777
      - id: ruby-0777-parens
      - id: ruby-0777-space
      - id: ruby-0o777
    unless:
      - id: sticky-1777
      - id: var-tmp-777
