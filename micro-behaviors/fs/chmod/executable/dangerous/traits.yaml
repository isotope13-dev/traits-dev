defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  mbc: E1222
  attack: T1222
  crit: suspicious
traits:
  - id: generic-shell-chmod
    desc: Dangerous chmod values (world-writable)
    if:
      type: string_value
      regex: chmod\s+(0?777|0?666|0?775|0?888)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/dev/testing::autoconf-testsuite
        - id: metadata/dev/testing::gnu-coreutils-test
  - id: shell-777
    desc: chmod 777 (world-writable+executable)
    conf: 0.8
    if:
      type: string_value
      regex: chmod\s+[\-\w ]{0,4}0?777\s+[/\.\$\w]
    downgrade:
      any:
        - id: metadata/dev/testing::autoconf-testsuite
        - id: metadata/dev/testing::gnu-coreutils-test
  - id: shell-666
    desc: chmod 666 (world-writable)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: chmod\s+[\-\w ]{0,4}0?666\s+[/\.\$\w]
  - id: python-777
    desc: Python chmod 777
    conf: 0.85
    if:
      type: string_value
      regex: chmod\([^)]{0,120}0?o?777\)
  - id: ruby-0777-parens
    desc: Ruby chmod(0777)
    conf: 0.85
    if:
      type: raw
      substr: chmod(0777)
  - id: ruby-0777-space
    desc: Ruby chmod 0777
    conf: 0.85
    if:
      type: string_value
      substr: chmod 0777
  - id: ruby-0o777
    desc: Ruby chmod(0o777)
    conf: 0.85
    if:
      type: raw
      substr: chmod(0o777)
  - id: sticky-1777
    desc: chmod 1777 sticky bit (legitimate)
    crit: baseline
    conf: 1.0
    if:
      type: string_value
      regex: chmod\s+0?1777
  - id: var-tmp-777
    desc: chmod 777 /var/tmp (legitimate temp dir)
    crit: baseline
    conf: 1.0
    if:
      type: string_value
      regex: \bchmod 0777 /var/tmp\b
composite_rules:
  - id: chmod-777
    desc: World-writable+executable permissions (777)
    crit: suspicious
    conf: 0.85
    any:
      - id: shell-777
      - id: python-777
      - id: ruby-0777-parens
      - id: ruby-0777-space
      - id: ruby-0o777
    none:
      - id: sticky-1777
      - id: var-tmp-777
