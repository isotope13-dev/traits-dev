defaults:
  platforms: [android]
  for: [apk]
  crit: notable
  conf: 0.86
  attack: T1485

traits:
  - id: android-random-access-file
    desc: Android RandomAccessFile reference
    if:
      type: text
      substr: "Ljava/io/RandomAccessFile;"

  - id: android-sync-write-mode
    desc: Java synchronous write mode string
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: "rws"

  - id: android-shredder-workflow
    desc: Android shredder workflow strings
    crit: suspicious
    conf: 0.9
    count_min: 4
    if:
      type: text
      regex: "Shredder(File|Document|ImagesVideo)|shredFiles"

  - id: android-shredder-resource-assets
    desc: Android shredder resource assets
    crit: component
    conf: 0.9
    count_min: 4
    if:
      type: text
      regex: "res/.{0,80}/(ic_|bg_).{0,80}shredder"

composite_rules:
  - id: android-secure-overwrite-delete
    desc: Android secure overwrite deletion
    crit: suspicious
    conf: 0.93
    all:
      - id: android-random-access-file
      - id: android-sync-write-mode
      - id: android-shredder-workflow
      - id: micro-behaviors/fs/file/delete::file-delete-api

  - id: android-file-shredder-module
    desc: Android file shredder module
    crit: component
    conf: 0.91
    all:
      - id: android-shredder-resource-assets
      - id: metadata/package/files/mobile-package::apk-multiple-secondary-dex
