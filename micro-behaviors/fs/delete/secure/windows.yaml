defaults:
  platforms: [windows]
  for:
    - pe
    - dll
  attack: T1485
  mbc: F0005
traits:
  - id: sdelete-usage-text
    desc: SDelete secure deletion usage text
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "usage: sdelete [-p passes]"
  - id: sdelete-tempfiles
    desc: SDelete temporary overwrite files
    crit: notable
    conf: 0.96
    count_min: 2
    if:
      type: text
      substr: SDELTEMP
composite_rules:
  - id: sdelete-secure-delete
    desc: SDelete secure deletion capability
    crit: notable
    conf: 0.97
    any:
      - id: sdelete-usage-text
      - id: sdelete-tempfiles
