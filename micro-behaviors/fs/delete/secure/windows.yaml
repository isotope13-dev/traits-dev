defaults:
  platforms: [windows]
  for:
    - pe
    - dll
    - c
    - cpp
  attack: T1485
  mbc: F0005
traits:
  - id: sdelete-usage-text
    desc: SDelete secure deletion usage text
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "usage: sdelete [-p passes]"
  - id: sdelete-tempfiles
    desc: SDelete temporary overwrite files
    crit: notable
    conf: 0.96
    count_min: 2
    if:
      type: text
      substr: SDELTEMP
  - id: fsctl-set-zero-data
    desc: Windows sparse file zeroing control
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: FSCTL_SET_ZERO_DATA
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/lang/compiler/managed::delphi
composite_rules:
  - id: sdelete-secure-delete
    desc: SDelete secure deletion capability
    crit: notable
    conf: 0.97
    any:
      - id: sdelete-usage-text
      - id: sdelete-tempfiles
