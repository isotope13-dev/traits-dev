defaults:
  platforms: [windows, linux, macos]
  mbc: F0005
  attack: T1485
traits:
  - id: shred-import
    desc: lu4p/shred secure deletion library
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: tree-sitter
      kind: import
      regex: lu4p/shred|shred
  - id: shred-string
    desc: shred library in binary
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, pe]
    if:
      type: text
      regex: lu4p/shred|\.Shred\(|shred\.Conf
  - id: shred-path
    desc: Shred file path call
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: tree-sitter
      kind: call
      regex: shred\.Path|Shred\(
  - id: shred-dir
    desc: Shred directory call
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: shred.Dir
  - id: overwrite-pattern
    desc: Multi-pass file overwrite pattern
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      regex: "\boverwrite\b.{0,20}\bpass\b|\bpass\b.{0,20}\boverwrite\b"
  - id: secure-delete-string
    desc: Secure delete function naming
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      word: SecureDelete
composite_rules:
  - id: shred-library
    desc: Shred library usage
    crit: suspicious
    conf: 0.9
    any:
      - id: shred-import
      - id: shred-string
  - id: shred-operations
    desc: Secure deletion operations
    crit: suspicious
    conf: 0.85
    any:
      - id: shred-path
      - id: shred-dir
      - id: overwrite-pattern
  - id: secure-file-deletion
    desc: Secure file deletion capability
    crit: suspicious
    conf: 0.9
    all:
      - id: shred-library
      - id: shred-operations