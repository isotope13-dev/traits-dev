defaults:
  platforms: [unix]
  for: [shell, binaries]
  crit: notable
  conf: 0.8
  mbc: F0005
traits:
  # `shred -<flag> <file>` securely overwrites a regular file before unlinking
  # it. This is a neutral secure-deletion capability used both by privacy tools
  # and by ordinary scripts wiping temporary secrets (e.g. `shred -u creds.env`
  # after sourcing them). Destructive intent (wiping a raw block device) is
  # detected separately under objectives/impact/wipe/disk/device.
  - id: shred-file-overwrite
    desc: Secure file overwrite before deletion (shred)
    if:
      type: text
      substr: shred -
