defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: recursive-root
    desc: Recursive Root Directory Deletion
    crit: suspicious
    conf: 1.0
    unless:
      - id: micro-behaviors/process/create/shell/guard::python-command-safety-filter
    if:
      type: text
      regex: rm\s+-[rRfF]{1,2}\s+/\*
