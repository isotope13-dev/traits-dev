defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: recursive-root
    desc: Recursive Root Directory Deletion
    crit: suspicious
    conf: 1.0
    unless:
      - id: micro-behaviors/process/create/shell/guard::python-command-safety-filter
      - id: well-known/tool/detection/security-scanner::defensive-scanner-tool-context
      - id: objectives/supply-chain/trojanized/app/debug-probe::claude-auth-token-env
    if:
      type: text
      regex: rm\s+-[rRfF]{1,2}\s+/\*
