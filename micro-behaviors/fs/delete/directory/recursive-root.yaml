defaults:
  platforms:
    - unix
    - windows
  # This is a shell-command observation.  Do not scan Python, Go, or other
  # source/binary strings: prompt fixtures and documentation commonly quote
  # the command without executing it.
  for: [shell, batch, powershell]
traits:
  - id: recursive-root
    desc: Recursive Root Directory Deletion
    crit: suspicious
    conf: 1.0
    unless:
      - id: micro-behaviors/process/create/shell/guard/
      - id: well-known/tool/detection/
      - id: objectives/supply-chain/trojanized/app/debug-probe/
    if:
      type: text
      # Match a command line, not a quoted prompt/example containing it.
      regex: '(?m)^[ \t]*rm\s+-[rRfF]{1,2}\s+/\*[ \t]*$'
