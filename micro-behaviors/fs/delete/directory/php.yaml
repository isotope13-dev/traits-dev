defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
traits:
  - id: php-rmdir
    desc: References the PHP rmdir() function
    if:
      type: symbol
      exact: "rmdir"

  - id: laravel-delete-directory
    desc: Laravel recursive directory deletion
    conf: 0.9
    if:
      type: text
      regex: \bFile::deleteDirectory\s*\(

  - id: php-recursive-directory-file-delete
    desc: PHP recursively deletes regular files
    conf: 0.93
    if:
      type: text
      regex: 'RecursiveDirectoryIterator[\s\S]{0,520}@unlink\(\$file->getPathname\(\)\)'
