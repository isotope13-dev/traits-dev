defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
traits:
  - id: php-rmdir
    desc: PHP rmdir function symbol
    if:
      type: symbol
      exact: "rmdir"

  - id: laravel-delete-directory
    desc: Laravel recursive directory deletion
    conf: 0.9
    if:
      type: text
      regex: \bFile::deleteDirectory\s*\(
