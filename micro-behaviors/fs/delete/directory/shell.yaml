defaults:
  platforms: [unix]
  for: [shell]
  crit: notable

traits:
  - id: shell-recursive-delete
    desc: Shell recursively removes a path
    conf: 0.9
    if:
      type: text
      regex: '(?m)(^|[;&|][ \t]*)(sudo[ \t]+)?rm[ \t]+-[rRfF]{1,2}\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/build/kernel::linux-kernel-drm-ci-build-script
