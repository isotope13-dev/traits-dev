defaults:
  platforms: [unix]
  for: [shell, go, python, javascript, typescript, rust, c, cpp]

traits:
  - id: docker-containers-rm-rf
    desc: Docker containers rm rf
    crit: suspicious
    conf: 0.94
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    if:
      type: text
      regex: '(?i)rm["'',\s]+-[rf]{2,}["'',\s]+/var/lib/docker/containers\b'
  - id: docker-containers-removeall
    desc: Docker containers RemoveAll
    crit: suspicious
    conf: 0.9
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    if:
      type: text
      regex: 'RemoveAll\s*\(\s*["'']/var/lib/docker/containers'

composite_rules:
  - id: docker-containers-recursive-delete
    desc: Docker containers directory deletion
    crit: suspicious
    conf: 0.95
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    any:
      - id: docker-containers-rm-rf
      - id: docker-containers-removeall
