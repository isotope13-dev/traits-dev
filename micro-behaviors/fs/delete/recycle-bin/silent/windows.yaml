defaults:
  platforms: [windows]
  for: [c, cpp, binaries, scripts]
composite_rules:
  - id: silent-recycle-bin-empty
    desc: Silent recycle bin emptying
    crit: suspicious
    conf: 0.9
    attack: T1485
    all:
      - id: micro-behaviors/fs/delete/recycle-bin/call::sh-empty-recycle-bin
      - id: micro-behaviors/fs/delete/recycle-bin/flag::sherb-noconfirmation
    downgrade:
      any:
        - id: metadata/binary/framework/
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/lang/source/
