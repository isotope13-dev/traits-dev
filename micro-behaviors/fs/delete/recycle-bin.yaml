defaults:
  platforms:
    - windows
  for: [c, cpp, binaries, scripts]
traits:
  - id: sh-empty-recycle-bin
    desc: SHEmptyRecycleBin API call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: SHEmptyRecycleBinW
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: sherb-noconfirmation
    desc: SHERB_NOCONFIRMATION silent recycle bin flag
    crit: component
    conf: 0.85
    if:
      type: text
      substr: SHERB_NOCONFIRMATION
  - id: recycle-bin-ui-handler
    desc: Benign recycle bin UI handler string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: EmptyRecycleBinAsync
composite_rules:
  - id: silent-recycle-bin-empty
    desc: Silent recycle bin emptying
    crit: suspicious
    conf: 0.9
    attack: T1485
    all:
      - id: sh-empty-recycle-bin
      - id: sherb-noconfirmation
    downgrade:
      any:
        - id: metadata/signed/developer
    unless:
      - id: recycle-bin-ui-handler
