defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
traits:
  - id: php-unlink
    desc: PHP unlink function symbol
    if:
      type: text
      word: "unlink"
  - id: php-variable-name-delete-call
    desc: PHP deletes variable named path
    conf: 0.86
    if:
      type: text
      regex: '(unlink|rmdir)\s*\(\s*\$name\s*\)'
