defaults:
  platforms: [windows]
  for: [javascript, vbs]
traits:
  - id: js-deletefile
    desc: DeleteFile call
    crit: notable
    if:
      type: string_literal
      regex: (?i)deleteFile\s*\(
  - id: js-scriptfullname
    desc: ScriptFullName property
    crit: notable
    if:
      type: string_literal
      substr: ScriptFullName
  - id: js-self-delete-dynamic-decoder
    desc: "Dynamic decoder resolves own path then deletes"
    for: [javascript]
    crit: suspicious
    conf: 0.9
    if:
      type: tree-sitter
      language: javascript
      query: "(function_declaration\n  body: (statement_block\n    (variable_declaration\n      (variable_declarator\n        name: (identifier) @script_path\n        value: (subscript_expression\n          object: (identifier) @wscript\n          index: (call_expression\n            function: (identifier) @decoder_a\n            arguments: (arguments (string))\n          )\n        )\n      )\n    )\n    .\n    (expression_statement\n      (call_expression\n        function: (subscript_expression\n          object: (identifier)\n          index: (call_expression\n            function: (identifier) @decoder_b\n            arguments: (arguments (string))\n          )\n        )\n        arguments: (arguments (identifier) @script_path_ref)\n      )\n    )\n  )\n)\n(#eq? @wscript \"WScript\")\n(#eq? @decoder_a @decoder_b)\n(#eq? @script_path @script_path_ref)\n"
  - id: js-self-delete-obfuscated-markers
    desc: Encoded ScriptFullName and deleteFile markers
    crit: suspicious
    conf: 0.95
    count_min: 1
    if:
      type: string_literal
      exact: 050047006010008046044030013020029000033017
  - id: js-deletefile-obfuscated-marker
    desc: Encoded deleteFile marker
    crit: suspicious
    conf: 0.95
    count_min: 1
    if:
      type: string_literal
      exact: 005041024006012063044002013029
  - id: dotnet-file-delete-api
    desc: .NET file delete API
    crit: component
    conf: 0.72
    for: [pe, dll, csharp, batch]
    if:
      type: text
      word: DeleteFile
composite_rules:
  - id: js-self-delete-literal
    desc: JScript self-deletion via literal ScriptFullName/DeleteFile
    crit: suspicious
    all:
      - id: js-deletefile
      - id: js-scriptfullname
  - id: js-self-delete-obfuscated-marker-pair
    desc: Encoded markers for script path and delete method
    crit: suspicious
    all:
      - id: js-self-delete-obfuscated-markers
      - id: js-deletefile-obfuscated-marker
  - id: js-self-delete-obfuscated
    desc: JScript self-deletion via decoded dynamic member access
    crit: suspicious
    any:
      - id: js-self-delete-dynamic-decoder
      - id: js-self-delete-obfuscated-marker-pair
    all:
      - id: micro-behaviors/process/interpreter/jscript::is-jscript
  - id: js-self-delete
    desc: Detects JScript self-deletion logic
    crit: suspicious
    any:
      - id: js-self-delete-literal
      - id: js-self-delete-obfuscated
