# FileSystemWatcher usage in C# for file monitoring
defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: filesystemwatcher
    desc: FileSystemWatcher file monitoring
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: 'new\s+FileSystemWatcher\s*\('
  - id: waitforchanged
    desc: WaitForChanged file change blocking
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "WaitForChanged("
  - id: watch-delete-rename
    desc: Monitoring for file deletion or rename
    crit: notable
    conf: 0.88
    if:
      type: raw
      substr: "WatcherChangeTypes.Renamed"
