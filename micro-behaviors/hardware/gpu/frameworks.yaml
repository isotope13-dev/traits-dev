# GPU compute-framework references. Neutral hardware capability: CUDA/OpenCL are
# used by ML/inference, scientific computing, graphics, AND crypto miners alike.
# The matcher is just the framework name, so these live as capabilities here and
# are referenced cross-directory by the miner composite (which additionally
# requires a hashrate keyword). Filing them under cryptojacking made every
# legitimate CUDA/OpenCL package surface a misleading "miner" hit.
defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
  crit: baseline
  conf: 0.7
traits:
  - id: cuda-framework
    desc: CUDA GPU computing framework
    if:
      type: text
      word: CUDA
  - id: opencl-framework
    desc: OpenCL GPU computing framework
    if:
      type: text
      word: OpenCL
