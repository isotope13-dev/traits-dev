# CPU Information - macOS
# ATT&CK: T1082 (System Information Discovery)
defaults:
  for: [macho, objc, swift, applescript]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: macos-cpuinfo
    desc: macOS CPU information query
    crit: notable
    conf: 0.7
    attack: "T1082"
    platforms: [macos]
    if:
      type: string_value
      substr: "CpuInfoAndModel"
