# Joystick / gamepad / DirectInput peripheral keywords (neutral input capability).
defaults:
  platforms: [linux]
  for: [elf, c, cpp]
traits:
  - id: gamepad-input-keyword
    desc: Joystick, gamepad, or DirectInput keyword
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: "(?i)(joystick|gamepad|dinput|wine_dinput)"
