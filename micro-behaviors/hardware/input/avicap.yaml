# Windows AVI Capture / Webcam Device Enumeration
# avicap32.dll provides webcam/video capture APIs
# ATT&CK: T1125 (Video Capture)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1125
traits:
  - id: avicap32-dll
    desc: avicap32.dll AVI capture library reference
    crit: notable
    conf: 0.85
    if:
      type: string_value
      exact: avicap32.dll
  - id: capgetdriverdescription-str
    desc: capGetDriverDescription device enumeration
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: ^capGetDriverDescription[AW]?$
composite_rules:
  - id: avicap32-device-enum
    desc: AVI capture device enumeration via avicap32
    crit: notable
    conf: 0.9
    all:
      - id: avicap32-dll
    any:
      - id: capgetdriverdescription-str
