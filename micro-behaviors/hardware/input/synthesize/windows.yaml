defaults:
  platforms: [windows]
  for: [python, c, cpp, csharp, powershell]
  crit: notable
  conf: 0.92

traits:
  - id: windows-sendinput-call
    desc: Synthesizes Windows keyboard or mouse input
    if:
      type: symbol
      kind: call
      regex: '(^|\.)SendInput$'
  - id: javascript-sendinput-ffi
    desc: JavaScript SendInput via native FFI
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(func\s*\([^)]{0,220}\bSendInput\b|SendInput\b[\s\S]{0,220}\.func\s*\()'
