# Reads the current mouse cursor position. Neutral input capability used by GUI
# automation, RPA element pickers, and accessibility tools. A single positional
# read is NOT sandbox detection — that requires polling the position over time
# and comparing samples (sandboxes leave the cursor static). A sandbox-evasion
# composite would reference this capability alongside a poll loop + comparison.
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.9
traits:
  - id: cursor-position-read
    desc: Reads current mouse cursor position
    if:
      type: text
      regex: '(GetCursorPos|pyautogui\.position)'
