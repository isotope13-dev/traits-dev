defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056
traits:
- id: windows-mouse-message-constants--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  count_min: 3
  if:
    type: text
    regex: '^WM_(MOUSEMOVE|LBUTTONDOWN)$'
  count_max: 1008195
- id: windows-mouse-message-constants--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  count_min: 3
  if:
    type: text
    regex: '^WM_(LBUTTONUP|RBUTTONDOWN)$'
  count_max: 1008196
- id: windows-mouse-message-constants--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.82
  count_min: 3
  if:
    type: text
    regex: '^WM_(RBUTTONUP|MOUSEWHEEL)$'
  count_max: 1008197
- id: windows-key-message-constants
  desc: Windows keyboard input message constants
  crit: component
  conf: 0.82
  count_min: 2
  if:
    type: text
    regex: '^WM_(KEYDOWN|KEYUP|CHAR)$'
composite_rules:
- id: postmessage-input-injection
  desc: PostMessage keyboard mouse injection
  crit: suspicious
  conf: 0.91
  all:
  - id: micro-behaviors/os/message/queue::post-message-text
  any:
  - id: windows-mouse-message-constants
  - id: windows-key-message-constants
  downgrade:
    any:
    - id: metadata/binary/framework/
- id: windows-mouse-message-constants
  desc: Windows mouse input message constants
  crit: component
  conf: 0.82
  any:
  - id: windows-mouse-message-constants--rx-1
  - id: windows-mouse-message-constants--rx-2
  - id: windows-mouse-message-constants--rx-3
