defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
  attack: T1056
traits:
  - id: mouse-event
    desc: Synthesize mouse input events
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: mouse_event
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: mouse-event-src
    desc: mouse_event P/Invoke declaration
    crit: notable
    conf: 0.82
    for: [csharp]
    if:
      type: text
      substr: mouse_event
composite_rules:
  - id: synthetic-user-input
    desc: Synthesize keyboard and mouse input
    crit: notable
    conf: 0.88
    all:
      - id: mouse-event
      - id: micro-behaviors/hardware/input/keyboard::keybd-event
  - id: synthetic-user-input-src
    desc: Remote input control in C# source
    crit: suspicious
    conf: 0.88
    for: [csharp]
    all:
      - id: mouse-event-src
      - id: micro-behaviors/hardware/input/keyboard::keybd-event-pinvoke
