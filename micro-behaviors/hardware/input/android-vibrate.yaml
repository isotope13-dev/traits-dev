defaults:
  platforms: [android]
  for: [java, apk, zip]
  crit: baseline
  conf: 0.86

traits:
  - id: vibrate-harassment
    desc: Android vibration API use
    crit: baseline
    conf: 0.95
    count_min: 1
    if:
      type: text
      substr: "vibrate("

  - id: android-vibrator-reference
    desc: Android Vibrator reference
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "Landroid/os/Vibrator;"

  - id: android-vibrate-method
    desc: Android vibrate method
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: "vibrate"

  - id: android-vibrate-permission
    desc: Android vibrate permission
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "android.permission.VIBRATE"

composite_rules:
  - id: android-vibrator-control
    desc: Android vibration control
    crit: notable
    conf: 0.9
    all:
      - id: android-vibrator-reference
      - id: android-vibrate-method
    any:
      - id: android-vibrate-permission
      - id: vibrate-harassment
