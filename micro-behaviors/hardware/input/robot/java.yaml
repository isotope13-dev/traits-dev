defaults:
  platforms:
    - unix
    - windows
  for:
    - java
    - class
    - jar
    - zip
traits:
  - id: java-awt-robot
    desc: Reference to java.awt.Robot
    crit: notable
    if:
      type: text
      substr: java/awt/Robot
  - id: java-awt-robot-import
    desc: Imports java.awt.Robot
    crit: notable
    conf: 0.84
    for: [java]
    if:
      type: symbol
      kind: import
      exact: java.awt.Robot
  - id: jvm-awt-robot-class-ref
    desc: JVM AWT Robot class reference
    crit: notable
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/awt/Robot
