defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1056.001
  mbc: E1056.001
traits:
  - id: set-windows-hook
    desc: Install global Windows input hook
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: ^SetWindowsHookEx(A|W)?$
  - id: unhook-windows-hook
    desc: Remove Windows input hook
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: UnhookWindowsHookEx
  - id: call-next-hook-ex
    desc: Forward events in Windows hook chain
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: CallNextHookEx
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
  - id: get-key-state
    desc: Poll virtual key state
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: GetKeyState
  - id: get-async-key-state
    desc: Poll asynchronous virtual key state (imported symbol)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: GetAsyncKeyState
  - id: get-async-key-state-str
    desc: Poll asynchronous virtual key state (P/Invoke string)
    crit: notable
    conf: 0.85
    for: [scripts, source]
    if:
      type: text
      exact: GetAsyncKeyState
  - id: get-keyboard-state-str
    desc: GetKeyboardState P/Invoke string reference
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: GetKeyboardState
  - id: to-unicode-ex-str
    desc: ToUnicodeEx P/Invoke string reference
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: ToUnicodeEx
  - id: map-virtual-key-str
    desc: MapVirtualKey P/Invoke string reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: MapVirtualKey
  - id: get-keyboard-layout-str
    desc: GetKeyboardLayout P/Invoke string reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: GetKeyboardLayout
  - id: get-key-name-text
    desc: Resolve keyboard scan code labels
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: GetKeyNameTextA
  - id: keybd-event
    desc: Synthesize keyboard input events
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: keybd_event
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: virtual-key-label-fkeys
    desc: Embedded function key labels (keylogger format)
    crit: component
    conf: 0.85
    count_min: 6
    if:
      type: text
      regex: \[F[0-9]{1,2}\]
  - id: virtual-key-label-modifiers
    desc: Embedded modifier key labels (keylogger format)
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \[(NUM-LOCK|SCROLL-LOCK|CAP-LOCK)\]
  - id: hook-run-export
    desc: Exported hook runner entrypoint
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: hook_run
  - id: hook-stop-export
    desc: Exported hook shutdown entrypoint
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: hook_stop
  - id: hook-dispatch-export
    desc: Exported hook dispatch callback setter
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: hook_set_dispatch_proc
  - id: hook-screen-export
    desc: Exported screen metadata helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: hook_create_screen_info
  - id: hook-pointer-export
    desc: Exported pointer tuning helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: hook_get_pointer_sensitivity
composite_rules:
  - id: virtual-key-label-map
    desc: Embedded virtual key label map
    crit: suspicious
    conf: 0.85
    all:
      - id: virtual-key-label-fkeys
      - id: virtual-key-label-modifiers
  - id: windows-hook-lifecycle
    desc: Windows hook install and chain-management APIs
    crit: baseline
    conf: 0.85
    all:
      - id: set-windows-hook
    any:
      - id: call-next-hook-ex
      - id: unhook-windows-hook
  - id: polling-keylogger-api-cluster
    desc: Polling keylogger Win32 API cluster (P/Invoke or native)
    crit: suspicious
    conf: 0.9
    all:
      - id: map-virtual-key-str
    any:
      - id: get-async-key-state
      - id: to-unicode-ex-str
      - id: get-keyboard-state-str
      - id: get-keyboard-layout-str
    needs: 2
  - id: key-name-capture-support
    desc: Keyboard hook or label capture support
    crit: notable
    conf: 0.84
    any:
      - id: get-key-name-text
      - id: windows-hook-lifecycle
  - id: public-input-hook-library-api
    desc: Exported public input hook library API
    crit: component
    conf: 0.95
    all:
      - id: hook-run-export
      - id: hook-stop-export
    any:
      - id: hook-dispatch-export
      - id: hook-screen-export
      - id: hook-pointer-export
