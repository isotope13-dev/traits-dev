# Windows keyboard capture capabilities
# ATT&CK: T1056.001 (Input Capture: Keylogging)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1056.001"
  mbc: "E1056.001"
traits:
  - id: set-windows-hook
    desc: Install global Windows input hook
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      regex: "^SetWindowsHookEx(A|W)?$"
  - id: unhook-windows-hook
    desc: Remove Windows input hook
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "UnhookWindowsHookEx"
  - id: call-next-hook-ex
    desc: Forward events in Windows hook chain
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "CallNextHookEx"
  - id: get-key-state
    desc: Poll virtual key state
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "GetKeyState"
  - id: get-async-key-state
    desc: Poll asynchronous virtual key state
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: "GetAsyncKeyState"
  - id: keybd-event
    desc: Synthesize keyboard input events
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "keybd_event"
  - id: virtual-key-label-fkeys
    desc: Embedded function key labels (keylogger format)
    crit: component
    conf: 0.85
    count_min: 6
    if:
      type: string
      regex: "\\[F[0-9]{1,2}\\]"
  - id: virtual-key-label-modifiers
    desc: Embedded modifier key labels (keylogger format)
    crit: component
    conf: 0.85
    if:
      type: string
      regex: "\\[(NUM-LOCK|SCROLL-LOCK|CAP-LOCK)\\]"
composite_rules:
  - id: virtual-key-label-map
    desc: Embedded virtual key label map
    crit: suspicious
    conf: 0.85
    all:
      - id: virtual-key-label-fkeys
      - id: virtual-key-label-modifiers
  - id: windows-hook-lifecycle
    desc: Windows hook install and chain-management APIs
    crit: baseline
    conf: 0.85
    all:
      - id: set-windows-hook
    any:
      - id: call-next-hook-ex
      - id: unhook-windows-hook
