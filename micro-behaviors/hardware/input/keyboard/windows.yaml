# Windows keyboard capture capabilities
# ATT&CK: T1056.001 (Input Capture: Keylogging)

defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1056.001"
  mbc: "E1056.001"

traits:
  - id: set-windows-hook
    desc: Install global Windows input hook
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "^SetWindowsHookEx(A|W)?$"

  - id: get-key-state
    desc: Poll virtual key state
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "GetKeyState"

  - id: virtual-key-label-fkeys
    desc: Embedded function key labels (keylogger format)
    crit: component
    conf: 0.85
    count_min: 6
    if:
      type: string
      regex: "\\[F[0-9]{1,2}\\]"

  - id: virtual-key-label-modifiers
    desc: Embedded modifier key labels (keylogger format)
    crit: component
    conf: 0.85
    if:
      type: string
      regex: "\\[(NUM-LOCK|SCROLL-LOCK|CAP-LOCK)\\]"

composite_rules:
  - id: virtual-key-label-map
    desc: Embedded virtual key label map
    crit: suspicious
    conf: 0.85
    all:
      - id: virtual-key-label-fkeys
      - id: virtual-key-label-modifiers
