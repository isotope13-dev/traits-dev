defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: node-keyboard-listener
    desc: "Node.js keyboard listener"
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: keyboard\.addListener
  - id: global-keyboard-listener
    desc: "GlobalKeyboardListener keyboard hook lib usage"
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      exact: GlobalKeyboardListener
  - id: uiohook-module-use
    desc: Node uses the uIOhook input library
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(uIOhook|uiohook-napi)\b'
  - id: uiohook-keyboard-listener
    desc: Node registers a global keyboard listener
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.on\s*\(\s*["''](keydown|keyup|keypress)["'']'
  - id: uiohook-mouse-listener
    desc: Node registers a global mouse listener
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.on\s*\(\s*["''](mousemove|mousedown)["'']'

composite_rules:
  - id: uiohook-global-input-listener
    desc: Node registers a global uIOhook input listener
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: uiohook-module-use
    any:
      - id: uiohook-keyboard-listener
      - id: uiohook-mouse-listener
