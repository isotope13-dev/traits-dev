defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: node-keyboard-listener
    desc: "Node.js keyboard listener"
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: keyboard\.addListener
  - id: global-keyboard-listener
    desc: "GlobalKeyboardListener keyboard hook lib usage"
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      exact: GlobalKeyboardListener
  - id: uiohook-module-use
    desc: Node uses the uIOhook input library
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(uIOhook|uiohook-napi)\b'
composite_rules:
  - id: uiohook-global-input-listener
    desc: Node registers a global uIOhook input listener
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: uiohook-module-use
    any:
      - id: micro-behaviors/hardware/input/event::on-keyboard-event-handler
      - id: micro-behaviors/hardware/input/event::on-mouse-event-handler
