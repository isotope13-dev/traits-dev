defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: node-keyboard-listener
    desc: "Node.js keyboard listener"
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: keyboard\.addListener
  - id: global-keyboard-listener
    desc: "GlobalKeyboardListener keyboard hook lib usage"
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      exact: GlobalKeyboardListener
