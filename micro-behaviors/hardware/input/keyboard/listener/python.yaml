# Python Keyboard Input Micro-behaviors
# Detects keyboard input processing capabilities
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: pynput-key-space
    desc: "pynput Key.space reference"
    conf: 0.8
    if:
      type: text
      substr: "Key.space"
  - id: pynput-key-enter
    desc: "pynput Key.enter reference"
    conf: 0.8
    if:
      type: text
      substr: "Key.enter"
  - id: pynput-key-shift
    desc: "pynput Key.shift reference"
    conf: 0.8
    if:
      type: text
      regex: "Key\\.shift"
  - id: pynput-key-esc
    desc: "pynput Key.esc reference"
    conf: 0.8
    if:
      type: text
      substr: "Key.esc"
  - id: pynput-listener-constructor
    desc: pynput keyboard listener constructor
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)Listener$'
