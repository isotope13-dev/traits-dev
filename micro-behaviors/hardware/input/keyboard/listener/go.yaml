# Go source keylogger reference detection.
# Detects Go struct fields or imports that reference a keylogger module,
# indicating the code manages or coordinates keystroke logging.
defaults:
  for: [go]
  platforms: [windows, linux, macos]
  attack: T1056.001
  mbc: E1056.001

traits:
  - id: keylogger-struct-field
    desc: Keylogger module reference in struct field
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\\bKeylogger\\s+\\*keylogger\\.'
  - id: keylogger-package-import
    desc: Keylogger package import in Go source
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: '/keylogger'

composite_rules:
  - id: go-keylogger-reference
    desc: Go source references keylogger module
    crit: notable
    conf: 0.93
    any:
      - id: keylogger-struct-field
      - id: keylogger-package-import
