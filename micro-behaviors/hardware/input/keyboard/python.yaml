# Python Keyboard Input Micro-behaviors
# Detects keyboard input processing capabilities
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  crit: notable
traits:
  - id: pynput-key-space
    desc: "pynput Key.space reference"
    conf: 0.8
    if:
      type: text
      substr: "Key.space"
  - id: pynput-key-enter
    desc: "pynput Key.enter reference"
    conf: 0.8
    if:
      type: text
      substr: "Key.enter"
  - id: pynput-key-shift
    desc: "pynput Key.shift reference"
    conf: 0.8
    if:
      type: text
      regex: "Key\\.shift"
  - id: pynput-key-esc
    desc: "pynput Key.esc reference"
    conf: 0.8
    if:
      type: text
      substr: "Key.esc"
