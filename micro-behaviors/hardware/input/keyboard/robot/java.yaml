defaults:
  platforms:
    - unix
    - windows
  for:
    - java
    - class
traits:
  - id: java-robot-keypress
    desc: Usage of keyPress in Java
    crit: notable
    if:
      type: text
      word: keyPress
  - id: java-robot-keyrelease
    desc: Usage of keyRelease in Java
    crit: notable
    if:
      type: text
      word: keyRelease
composite_rules:
  - id: java-robot-keyboard
    desc: Usage of java.awt.Robot for keyboard interaction
    crit: notable
    any:
      - id: java-robot-keypress
      - id: java-robot-keyrelease
