defaults:
  platforms: [windows]
  for: [pe, c, cpp, rust]
  crit: notable
  conf: 0.8

traits:
  - id: map-virtual-key-str
    desc: MapVirtualKey API string reference
    crit: component
    unless:
      - id: well-known/game/mod/
    if:
      type: text
      substr: MapVirtualKey
    downgrade:
      any:
        - id: well-known/lib/dioxus
