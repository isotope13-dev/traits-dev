defaults:
  platforms: [linux]
  for: [elf, so, c, cpp]

traits:
  - id: x11-query-keymap
    desc: Queries the X11 server keyboard map
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XQueryKeymap

  - id: x11-keysym-to-keycode
    desc: Resolves X11 key symbols to key codes
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XKeysymToKeycode

composite_rules:
  - id: x11-display-keymap-access
    desc: X11 display connection with keyboard-map access
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/hardware/display/connection::x11-open-display
      - id: x11-query-keymap
      - id: x11-keysym-to-keycode
