defaults:
  platforms: [linux]
  for: [elf, so, c, cpp]

traits:
  - id: x11-query-keymap
    desc: Queries the X11 server keyboard map
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XQueryKeymap

  - id: x11-keysym-to-keycode
    desc: Resolves X11 key symbols to key codes
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XKeysymToKeycode
