defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.86

traits:
  - id: android-custom-keyboard-layout
    desc: Android custom keyboard layout
    if:
      type: raw
      substr: "res/layout/keyboard.xml"
      offset_range: [-262144, null]

  - id: android-qwerty-keymap-resources
    desc: Android bundled QWERTY keymaps
    count_min: 3
    if:
      type: raw
      regex: "res/xml/qwerty_[aces]+\\.xml"
      offset_range: [-262144, null]

composite_rules:
  - id: android-custom-keyboard-resources
    desc: Android custom keyboard resources
    crit: component
    conf: 0.88
    all:
      - id: android-custom-keyboard-layout
      - id: android-qwerty-keymap-resources
