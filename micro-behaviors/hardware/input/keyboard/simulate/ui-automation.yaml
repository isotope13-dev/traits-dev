# Programmatic keyboard input injection for UI automation.
# This is active input simulation, not passive keylogging.
defaults:
  platforms: [windows, macos]
  for: [scripts]
  attack: T1056.003

traits:
  - id: sendkeys-keystroke-injection
    desc: Windows SendKeys keystroke injection
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "SendKeys]::SendWait"
    unless:
      - id: metadata/library/structure::vscode-source-map-file
      - id: metadata/library/structure::vscode-extension-generated-asset

  - id: osascript-keystroke-injection
    desc: macOS AppleScript keystroke injection
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'System Events.{0,20}key code|System Events.{0,20}keystroke'

composite_rules:
  - id: cross-platform-keystroke-injection
    desc: Cross-platform keystroke injection capability
    crit: notable
    conf: 0.95
    all:
      - id: sendkeys-keystroke-injection
      - id: osascript-keystroke-injection
    unless:
      - id: well-known/app/vscode-demo-time::extension-context
      - id: metadata/library/structure::vscode-source-map-file
      - id: metadata/library/structure::vscode-extension-generated-asset
