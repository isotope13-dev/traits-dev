defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.82

traits:
  - id: keyboard-type-text
    desc: Synthesizes keyboard text
    if:
      type: text
      regex: '\bkeyboard\.type_text\s*\('

  - id: keyboard-backspace
    desc: Synthesizes keyboard backspace
    conf: 0.78
    if:
      type: text
      regex: '\bkeyboard\.backspace\s*\('

  - id: keyboard-press-enter
    desc: Synthesizes enter keypress
    conf: 0.78
    if:
      type: text
      regex: '\bkeyboard\.press_enter\s*\('

composite_rules:
  - id: python-keyboard-text-injection
    desc: Python keyboard text injection
    crit: notable
    conf: 0.86
    any:
      - id: keyboard-type-text
      - id: keyboard-backspace
      - id: keyboard-press-enter
