defaults:
  platforms: [linux]
  for: [binaries, scripts]
  attack: T1059.004
traits:
  - id: xdotool-key-injection
    desc: xdotool keystroke injection invocation
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\bxdotool\s+(key|type|keydown|keyup)\b'
  - id: xdotool-mouse-injection
    desc: xdotool mouse event injection
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\bxdotool\s+(mousemove|click|mousedown|mouseup)\b'
  - id: ydotool-injection
    desc: ydotool Wayland input injection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bydotool\s+(key|type|click|mousemove)\b'
