# C# polling-based key capture
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1056.001"
  mbc: "E1056.001"
traits:
  - id: get-async-key-state-source
    desc: GetAsyncKeyState polling call
    # Hotkey handlers legitimately poll a small set of modifier/virtual keys;
    # keylogging intent requires the loop and character-buffer context below.
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bGetAsyncKeyState\s*\('
  - id: full-virtual-key-scan
    desc: Full virtual key scan loop
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?s)GetAsyncKeyState\s*\(\s*\(long\)\s*\w+\s*\)\s*;.{0,220}?byte\.MaxValue'
  - id: vb-char-buffer-append
    desc: Visual Basic character append
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?s)TextBox1\.Text\s*\+=\s*Conversions\.ToString\s*\(\s*Strings\.Chr\s*\('
  - id: keybd-event-pinvoke
    desc: keybd_event P/Invoke keyboard simulation
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: keybd_event
  - id: map-virtual-key-pinvoke
    desc: MapVirtualKey P/Invoke declaration
    crit: component
    conf: 0.8
    if:
      type: text
      substr: MapVirtualKey
composite_rules:
  - id: polling-key-capture-loop
    desc: Polling loop appends captured keystrokes
    crit: suspicious
    conf: 0.95
    all:
      - id: get-async-key-state-source
      - id: full-virtual-key-scan
      - id: vb-char-buffer-append
  - id: csharp-keyboard-simulation
    desc: C# keyboard input injection via P/Invoke
    crit: suspicious
    conf: 0.88
    all:
      - id: keybd-event-pinvoke
      - id: map-virtual-key-pinvoke
