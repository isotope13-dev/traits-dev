defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: node-keyboard-listener
    desc: Node.js keyboard listener (keyboard.addListener)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'keyboard\.addListener'
  - id: global-keyboard-listener
    desc: GlobalKeyboardListener library usage
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'GlobalKeyboardListener'
