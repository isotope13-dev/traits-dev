# Browser-extension global keyboard command (hotkey) registration. Generic
# technique: registering a system/app keyboard shortcut handler.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-commands-api
    desc: Chrome commands API usage
    if:
      type: text
      regex: '(chrome|browser)\.commands\.[A-Za-z_]'
  - id: chrome-commands-on-command
    desc: Chrome keyboard command listener
    if:
      type: text
      regex: '(chrome|browser)\.commands\.onCommand'
