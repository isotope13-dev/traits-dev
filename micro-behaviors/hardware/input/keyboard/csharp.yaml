# C# polling-based key capture
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1056.001"
  mbc: "E1056.001"
traits:
  - id: get-async-key-state-source
    desc: GetAsyncKeyState polling call
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: '(?i)\bGetAsyncKeyState\s*\('
  - id: full-virtual-key-scan
    desc: Full virtual key scan loop
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: '(?s)GetAsyncKeyState\s*\(\s*\(long\)\s*\w+\s*\)\s*;.{0,220}?byte\.MaxValue'
  - id: vb-char-buffer-append
    desc: Visual Basic character append
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '(?s)TextBox1\.Text\s*\+=\s*Conversions\.ToString\s*\(\s*Strings\.Chr\s*\('
composite_rules:
  - id: polling-key-capture-loop
    desc: Polling loop appends captured keystrokes
    crit: suspicious
    conf: 0.95
    all:
      - id: get-async-key-state-source
      - id: full-virtual-key-scan
      - id: vb-char-buffer-append
