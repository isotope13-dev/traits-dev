# XInput2 event-selection capabilities used by native X11 input listeners.
defaults:
  platforms: [linux]
  for: [elf, so, c, cpp]
  attack: T1056.001

traits:
  - id: x11-xinput-extension
    desc: Queries the XInput extension
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: XIQueryVersion

  - id: x11-select-input-events
    desc: Selects XInput2 device events
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XISelectEvents

  - id: x11-read-input-events
    desc: Reads XInput2 events from the queue
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XNextEvent

  - id: x11-decode-input-event
    desc: Decodes XInput2 event data
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: XGetEventData
