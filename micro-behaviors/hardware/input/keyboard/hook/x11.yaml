# XInput2 event-selection capabilities used by native X11 input listeners.
defaults:
  platforms: [linux]
  for: [elf, so, c, cpp]
  attack: T1056.001

traits:
  - id: x11-xinput-extension
    desc: Queries the XInput extension
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: XIQueryVersion

  - id: x11-select-input-events
    desc: Selects XInput2 device events
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XISelectEvents

  - id: x11-read-input-events
    desc: Reads XInput2 events from the queue
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: XNextEvent

  - id: x11-decode-input-event
    desc: Decodes XInput2 event data
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: XGetEventData

  - id: x11-raw-key-event-xiraw
    desc: Uses X11 XIRawEvent structure
    crit: notable
    conf: 0.9
    if:
      type: text
      word: XIRawEvent

  - id: x11-raw-key-event-xidevice
    desc: Uses X11 XIDeviceEvent structure
    crit: notable
    conf: 0.9
    if:
      type: text
      word: XIDeviceEvent

  - id: x11-raw-key-event-xkey
    desc: Uses X11 XKeyEvent structure
    crit: notable
    conf: 0.9
    if:
      type: text
      word: XKeyEvent

  - id: x11-key-translation-xlookup
    desc: Calls XLookupString for key translation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: XLookupString

  - id: x11-key-translation-xutf8
    desc: Calls Xutf8LookupString for key translation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: Xutf8LookupString

  - id: x11-key-translation-xkeycode
    desc: Calls XKeycodeToKeysym for key translation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: XKeycodeToKeysym

  - id: x11-key-translation-xquery
    desc: Calls XQueryKeymap for key translation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: XQueryKeymap

composite_rules:
  - id: x11-raw-key-event-struct
    desc: Uses X11 raw key event structures
    crit: notable
    conf: 0.9
    any:
      - id: x11-raw-key-event-xiraw
      - id: x11-raw-key-event-xidevice
      - id: x11-raw-key-event-xkey
  - id: x11-key-translation-call
    desc: Translates X11 key events to symbols
    crit: notable
    conf: 0.9
    any:
      - id: x11-key-translation-xlookup
      - id: x11-key-translation-xutf8
      - id: x11-key-translation-xkeycode
      - id: x11-key-translation-xquery
