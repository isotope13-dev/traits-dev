defaults:
  for:
    - pe
    - dll
    - rust
  platforms:
    - windows
  attack: T1056.001
  mbc: E1056.001
traits:
  - id: set-windows-hook
    desc: Install global Windows input hook
    crit: notable
    conf: 0.9
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::delphi
        - id: metadata/lang/compiler/managed::borland-section-code
    if:
      type: symbol
      regex: ^SetWindowsHookEx(A|W)?$
  - id: unhook-windows-hook
    desc: Remove Windows input hook
    crit: notable
    conf: 0.85
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::delphi
        - id: metadata/lang/compiler/managed::borland-section-code
    if:
      type: symbol
      exact: UnhookWindowsHookEx
  - id: call-next-hook-ex
    desc: Forward events in Windows hook chain
    crit: notable
    conf: 0.8
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::delphi
        - id: metadata/lang/compiler/managed::borland-section-code
    if:
      type: symbol
      exact: CallNextHookEx
  - id: get-key-state
    desc: Poll virtual key state
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: import
      exact: GetKeyState
    downgrade:
      any:
        - id: well-known/lib/dioxus
  - id: get-async-key-state
    desc: Poll asynchronous virtual key state (imported symbol)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: GetAsyncKeyState
    downgrade:
      any:
        - id: metadata/binary/metrics/threshold::many-imports-50
        - id: metadata/binary/framework::dotnet-metadata
        - id: well-known/lib/dioxus
  - id: get-cursor-pos
    desc: Poll mouse cursor position
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: import
      exact: GetCursorPos
    downgrade:
      any:
        - id: metadata/binary/metrics/threshold::many-imports-50
        - id: metadata/binary/framework::dotnet-metadata
        - id: well-known/lib/dioxus
  - id: get-async-key-state-str
    desc: Poll asynchronous virtual key state (P/Invoke string)
    crit: notable
    conf: 0.85
    for: [scripts, source]
    if:
      type: text
      exact: GetAsyncKeyState
  - id: get-keyboard-state-str
    desc: GetKeyboardState P/Invoke string reference
    crit: notable
    conf: 0.85
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::delphi
        - id: metadata/lang/compiler/managed::borland-section-code
        - id: well-known/lib/dioxus
    if:
      type: text
      exact: GetKeyboardState
  - id: to-unicode-ex-str
    desc: ToUnicodeEx P/Invoke string reference
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: ToUnicodeEx
    downgrade:
      any:
        - id: well-known/lib/dioxus
  - id: map-virtual-key-str
    desc: MapVirtualKey P/Invoke string reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: MapVirtualKey
    downgrade:
      any:
        - id: well-known/lib/dioxus
  - id: map-virtual-key
    desc: Map virtual key code
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: ^MapVirtualKey(A|W)?$
    downgrade:
      any:
        - id: well-known/lib/dioxus
  - id: get-keyboard-layout-str
    desc: GetKeyboardLayout P/Invoke string reference
    crit: notable
    conf: 0.8
    for: [scripts, source]
    if:
      type: text
      exact: GetKeyboardLayout
  - id: keybd-event
    desc: Synthesize keyboard input events
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: keybd_event
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
  - id: virtual-key-label-fkeys
    desc: Embedded function key labels (keylogger format)
    crit: component
    conf: 0.85
    count_min: 6
    if:
      type: text
      regex: \[F[0-9]{1,2}\]
  - id: windows-low-level-keyboard-hook-const
    desc: Windows low-level keyboard hook constant
    crit: component
    conf: 0.9
    for: [source]
    if:
      type: text
      exact: WH_KEYBOARD_LL
  - id: virtual-key-label-modifiers
    desc: Embedded modifier key labels (keylogger format)
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \[(NUM-LOCK|SCROLL-LOCK|CAP-LOCK)\]
  - id: virtual-key-label-extended
    desc: Embedded extended key labels (keylogger format)
    crit: component
    conf: 0.88
    count_min: 6
    if:
      type: text
      regex: \[(Backspace|Enter|LeftWin|RightWin)\]
composite_rules:
  - id: virtual-key-label-map
    desc: Embedded virtual key label map
    crit: suspicious
    conf: 0.85
    all:
      - id: virtual-key-label-fkeys
    any:
      - id: virtual-key-label-modifiers
      - id: virtual-key-label-extended
  - id: windows-hook-lifecycle
    desc: Windows hook install and chain-management APIs
    crit: notable
    conf: 0.85
    all:
      - id: set-windows-hook
    any:
      - id: call-next-hook-ex
      - id: unhook-windows-hook
  - id: low-level-windows-keyboard-hook
    desc: Low-level Windows keyboard hook setup
    crit: notable
    conf: 0.9
    all:
      - id: set-windows-hook
      - id: windows-low-level-keyboard-hook-const
  - id: polling-keylogger-api-cluster
    desc: Polling keyboard input API cluster
    crit: notable
    conf: 0.9
    all:
      - id: map-virtual-key-str
      - id: get-async-key-state
    any:
      - id: to-unicode-ex-str
      - id: get-keyboard-state-str
      - id: get-keyboard-layout-str
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
        - id: well-known/lib/slint::slint-library
        - id: well-known/lib/dioxus
