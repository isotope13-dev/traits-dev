defaults:
  for:
    - pe
    - dll
    - c
    - cpp
    - csharp
    - rust
  platforms:
    - windows
  attack: T1056.001
  mbc: E1056.001
traits:
  - id: set-windows-hook
    desc: Install Windows event hook
    crit: notable
    conf: 0.9
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/lang/compiler/managed::borland-section-code
    if:
      type: symbol
      regex: ^SetWindowsHookEx(A|W)?$
  - id: unhook-windows-hook
    desc: Remove Windows event hook
    crit: notable
    conf: 0.85
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/lang/compiler/managed::borland-section-code
    if:
      type: symbol
      exact: UnhookWindowsHookEx
  - id: call-next-hook-ex
    desc: Forward events in Windows hook chain
    crit: notable
    conf: 0.8
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/lang/compiler/managed::borland-section-code
    if:
      type: symbol
      exact: CallNextHookEx
  - id: set-windows-hook-text
    desc: SetWindowsHookEx API string
    crit: component
    conf: 0.84
    for: [pe, dll]
    if:
      type: text
      substr: SetWindowsHookEx
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: unhook-windows-hook-text
    desc: UnhookWindowsHookEx API string
    crit: component
    conf: 0.84
    for: [pe, dll]
    if:
      type: text
      substr: UnhookWindowsHookEx
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: call-next-hook-ex-text
    desc: CallNextHookEx API string
    crit: component
    conf: 0.84
    for: [pe, dll]
    if:
      type: text
      substr: CallNextHookEx
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: hookon-hookoff-exports
    desc: HookOn and HookOff export names
    crit: component
    conf: 0.88
    for: [pe, dll]
    if:
      type: text
      regex: 'HookOn[\s\S]{0,160}HookOff|HookOff[\s\S]{0,160}HookOn'
  - id: hookon-export-text
    desc: HookOn export name
    crit: component
    conf: 0.84
    for: [pe, dll]
    if:
      type: text
      substr: HookOn
  - id: hookoff-export-text
    desc: HookOff export name
    crit: component
    conf: 0.84
    for: [pe, dll]
    if:
      type: text
      substr: HookOff
  - id: get-key-state
    desc: Poll virtual key state
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: GetKeyState
    unless:
      - id: well-known/game/mod/
    downgrade:
      any:
        - id: well-known/lib/dioxus
  - id: get-async-key-state
    desc: 'Poll asynchronous virtual key state'
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: GetAsyncKeyState
    unless:
      - id: well-known/game/mod/
    downgrade:
      any:
        - id: metadata/binary/metrics/threshold::many-imports-50
        - id: metadata/binary/framework::dotnet-metadata
        - id: well-known/lib/dioxus
  - id: get-cursor-pos
    desc: Poll mouse cursor position
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: GetCursorPos
    unless:
      - id: well-known/game/mod/
    downgrade:
      any:
        - id: metadata/binary/metrics/threshold::many-imports-50
        - id: metadata/binary/framework::dotnet-metadata
        - id: well-known/lib/dioxus
  - id: get-async-key-state-str
    desc: GetAsyncKeyState API name reference
    crit: component
    conf: 0.85
    for: [pe, c, cpp, csharp, rust, go]
    if:
      type: text
      word: GetAsyncKeyState
  - id: get-keyboard-state-str
    desc: GetKeyboardState P/Invoke string reference
    crit: component
    conf: 0.85
    unless:
      - id: well-known/game/mod/
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/lang/compiler/managed::borland-section-code
        - id: well-known/lib/dioxus
    if:
      type: text
      word: GetKeyboardState
  - id: to-unicode-ex-str
    desc: ToUnicodeEx P/Invoke string reference
    crit: component
    conf: 0.85
    unless:
      - id: well-known/game/mod/
    if:
      type: text
      word: ToUnicodeEx
    downgrade:
      any:
        - id: well-known/lib/dioxus
  - id: map-virtual-key
    desc: Map virtual key code
    crit: notable
    conf: 0.85
    unless:
      - id: well-known/game/mod/
    if:
      type: symbol
      regex: ^MapVirtualKey(A|W)?$
    downgrade:
      any:
        - id: well-known/lib/dioxus
  - id: get-keyboard-layout-str
    desc: GetKeyboardLayout P/Invoke string reference
    crit: component
    conf: 0.8
    for: [pe, c, cpp, csharp, rust, go]
    if:
      type: text
      word: GetKeyboardLayout
  - id: keybd-event
    desc: keybd_event API name reference
    crit: component
    conf: 0.8
    if:
      type: text
      word: keybd_event
  - id: python-low-level-keyboard-hook
    desc: Python installs a low-level keyboard hook
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)SetWindowsHookExW?$'
  - id: python-async-key-state-poll
    desc: Python polls asynchronous Windows key state
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetAsyncKeyState$'
  - id: python-key-event-type
    desc: Python defines a key event type stream
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: symbol
      exact: KeyEventType
  - id: python-keyboard-dispatcher
    desc: Python exposes a keyboard event dispatcher
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: symbol
      exact: KeyboardDispatcher
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
  - id: virtual-key-label-fkeys
    desc: "Embedded func key labels (keylogger format)"
    crit: component
    conf: 0.85
    count_min: 6
    if:
      type: text
      regex: \[F[0-9]{1,2}\]
  - id: windows-low-level-keyboard-hook-const
    desc: Windows low-level keyboard hook constant
    crit: component
    conf: 0.9
    for: [source, powershell, pe, dll]
    if:
      type: text
      word: WH_KEYBOARD_LL
  - id: virtual-key-label-modifiers
    desc: "Embedded modifier key labels"
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \[(NUM-LOCK|SCROLL-LOCK|CAP-LOCK)\]
  - id: virtual-key-label-extended
    desc: "Embedded extended key labels"
    crit: component
    conf: 0.88
    count_min: 6
    if:
      type: text
      regex: \[(Backspace|Enter|LeftWin|RightWin)\]
  - id: cpp-virtual-key-range-loop
    desc: C/C++ scans virtual-key byte range
    crit: notable
    conf: 0.88
    for: [c, cpp]
    if:
      type: text
      regex: 'for\s*\([^)]{0,90}<\s*255'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: well-known/tool/development/bazel-diff::bazel-diff-bzlmod-test-fixture
      - id: well-known/app/openvpn::openvpn-source-tree
  - id: cpp-key-label-map-uppercase
    desc: C/C++ uppercase key labels
    crit: suspicious
    conf: 0.9
    for: [c, cpp]
    count_min: 4
    if:
      type: text
      regex: '\[(BACKSPACE|RETURN|TAB|ESC|ARROW (LEFT|RIGHT|UP|DOWN))\]'
  - id: cpp-append-keylog-stream
    desc: C/C++ appends to output stream
    crit: notable
    conf: 0.86
    for: [c, cpp]
    if:
      type: text
      regex: 'ofstream[\s\S]{0,120}(ios_base::app|std::ios::app)'
    unless:
      - id: well-known/lib/ggml
      - type: text
        substr: common_download_callback
  - id: cpp-dll-thread-entry
    desc: C/C++ DLL starts worker thread
    crit: notable
    conf: 0.82
    for: [c, cpp]
    if:
      type: text
      regex: 'DLL_PROCESS_ATTACH[\s\S]{0,160}CreateThread'
composite_rules:
  - id: foreground-window-input-state
    desc: Foreground-window input state checks
    crit: notable
    conf: 0.9
    all:
      - id: get-key-state
      - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: virtual-key-label-map
    desc: Embedded virtual key label map
    crit: suspicious
    conf: 0.85
    all:
      - id: virtual-key-label-fkeys
    any:
      - id: virtual-key-label-modifiers
      - id: virtual-key-label-extended
  - id: windows-hook-lifecycle
    desc: Windows hook install and chain-management APIs
    crit: notable
    conf: 0.85
    all:
      - id: windows-hook-install
    any:
      - id: call-next-hook-ex
      - id: unhook-windows-hook
      - id: call-next-hook-ex-text
      - id: unhook-windows-hook-text
      - id: hookon-hookoff-exports
  - id: windows-hook-install
    desc: Windows hook install API
    crit: notable
    conf: 0.86
    any:
      - id: set-windows-hook
      - id: set-windows-hook-text
  - id: windows-hook-chain-management
    desc: Windows hook chain management API
    crit: component
    conf: 0.86
    any:
      - id: call-next-hook-ex
      - id: unhook-windows-hook
      - id: call-next-hook-ex-text
      - id: unhook-windows-hook-text
      - id: hookon-hookoff-exports
  - id: hookon-hookoff-export-pair
    desc: HookOn and HookOff export pair
    crit: component
    conf: 0.88
    all:
      - id: hookon-export-text
      - id: hookoff-export-text
  - id: low-level-windows-keyboard-hook
    desc: Low-level Windows keyboard hook setup
    crit: notable
    conf: 0.9
    all:
      - id: set-windows-hook
      - id: windows-low-level-keyboard-hook-const
  - id: polling-keylogger-api-cluster
    desc: Polling keyboard input API cluster
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/hardware/input/keyboard/layout::map-virtual-key-str
      - id: get-async-key-state
    any:
      - id: to-unicode-ex-str
      - id: get-keyboard-state-str
      - id: get-keyboard-layout-str
    unless:
      - id: well-known/game/mod/
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sandboxie/
        - id: well-known/lib/slint/
        - id: well-known/lib/dioxus
