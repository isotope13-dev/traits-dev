defaults:
  for: [swift]
  platforms: [macos]
  attack: T1056.001
  mbc: E1056.001

traits:
  - id: swift-iokit-hid-import
    desc: Swift imports IOKit HID APIs
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "import IOKit.hid"

  - id: swift-iohid-manager-create
    desc: Swift creates IOHID manager
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: IOHIDManagerCreate

  - id: swift-iohid-keyboard-match
    desc: Swift matches HID keyboard devices
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: kHIDUsage_GD_Keyboard

  - id: swift-iohid-keypad-match
    desc: Swift matches HID keypad devices
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: kHIDUsage_GD_Keypad

  - id: swift-iohid-input-value-callback-register
    desc: Swift registers IOHID input value callback
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: IOHIDManagerRegisterInputValueCallback

  - id: swift-iohid-device-match-callback
    desc: Swift IOHID device match callback
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: IOHIDManagerRegisterDeviceMatchingCallback

  - id: swift-iohid-device-removal-callback
    desc: Swift IOHID removal callback
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: IOHIDManagerRegisterDeviceRemovalCallback

  - id: swift-iohid-runloop-schedule
    desc: Swift schedules IOHID manager on run loop
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: IOHIDManagerScheduleWithRunLoop

  - id: swift-iohid-value-callback
    desc: Swift defines IOHID value callback
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: IOHIDValueCallback

  - id: swift-iohid-keyboard-usage-page-filter
    desc: Swift HID keyboard usage filter
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'IOHIDElementGetUsagePage.{0,80}!=\s*0x07'

  - id: swift-iohid-scancode-range-filter
    desc: Swift filters HID usage scancode range
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'scancode\s*<\s*4\s*\|\|\s*scancode\s*>\s*231'

  - id: swift-iohid-key-press-value
    desc: Swift reads HID key press value
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: IOHIDValueGetIntegerValue

  - id: swift-keymap-scancode-lookup
    desc: Swift maps HID scancodes to key labels
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'keyMap\s*\[\s*scancode\s*\]'

  - id: swift-active-application-observer
    desc: Swift observes active application changes
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: NSWorkspace.didActivateApplicationNotification
