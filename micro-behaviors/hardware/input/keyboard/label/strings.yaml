defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [elf, macho, pe]
traits:
- id: linux-input-device
  desc: Reads raw Linux input event devices
  crit: notable
  conf: 0.75
  platforms:
  - linux
  for: [elf]
  if:
    type: text
    regex: /dev/input/event[0-9]+
- id: keylogger-string
  desc: Self-identifies as keylogger
  crit: suspicious
  conf: 0.8
  mbc: B0015
  attack: T1056.001
  if:
    type: text
    word: keylogger
    case_insensitive: true
  unless:
  - type: path
    substr: Microsoft.Graph.Users.nupkg/bin/Microsoft.Graph.Users.private.dll
- id: init-keylogger-sym
  desc: Keylogger init routine symbol
  crit: suspicious
  conf: 0.8
  if:
    type: symbol
    regex: init_keylogger
- id: keystroke-capture-string-a--capslock
  desc: Key capture strings (CAPSLOCK)
  crit: component
  conf: 0.7
  if:
    type: text
    word: CAPSLOCK
- id: keystroke-capture-string-a--scrollock
  desc: Key capture strings (SCROLLOCK)
  crit: component
  conf: 0.7
  if:
    type: text
    word: SCROLLOCK
- id: keystroke-capture-string-a--numlock
  desc: Key capture strings (NUMLOCK)
  crit: component
  conf: 0.7
  if:
    type: text
    word: NUMLOCK
- id: keystroke-capture-string-b--printscreen
  desc: Key capture strings (PRINTSCREEN)
  crit: component
  conf: 0.7
  if:
    type: text
    word: PRINTSCREEN
- id: keystroke-capture-string-b--backspace
  desc: Key capture strings (BACKSPACE)
  crit: component
  conf: 0.7
  if:
    type: text
    word: BACKSPACE
composite_rules:
- id: keystroke-capture-string-a
  desc: Key capture strings (locks)
  crit: component
  conf: 0.7
  any:
  - id: keystroke-capture-string-a--capslock
  - id: keystroke-capture-string-a--scrollock
  - id: keystroke-capture-string-a--numlock
- id: keystroke-capture-string-b
  desc: Key capture strings (actions)
  crit: component
  conf: 0.7
  any:
  - id: keystroke-capture-string-b--printscreen
  - id: keystroke-capture-string-b--backspace
- id: keystroke-capture-string
  desc: Key capture strings
  crit: notable
  conf: 0.7
  all:
  - id: keystroke-capture-string-a
  - id: keystroke-capture-string-b
