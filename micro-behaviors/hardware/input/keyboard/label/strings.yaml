defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: linux-input-device
    desc: Direct access to Linux input
    crit: notable
    conf: 0.75
    platforms:
      - linux
    for: [elf]
    if:
      type: text
      regex: /dev/input/event[0-9]+
  - id: keylogger-string
    desc: Keylogger string
    crit: suspicious
    conf: 0.8
    mbc: B0015
    attack: T1056.001
    if:
      type: text
      word: keylogger
      case_insensitive: true
  - id: init-keylogger-sym
    desc: init_keylogger symbol
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      regex: init_keylogger
  - id: keystroke-capture-string-a
    desc: Key capture strings (locks)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (CAPSLOCK|SCROLLOCK|NUMLOCK)
  - id: keystroke-capture-string-b
    desc: Key capture strings (actions)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (PRINTSCREEN|BACKSPACE)
composite_rules:
  - id: keystroke-capture-string
    desc: Key capture strings
    crit: notable
    conf: 0.7
    all:
      - id: keystroke-capture-string-a
      - id: keystroke-capture-string-b
