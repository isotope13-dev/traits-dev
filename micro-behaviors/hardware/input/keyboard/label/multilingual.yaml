# Non-English "keylogger" self-identification terms, the multilingual companions
# to keylogger-string in this directory. A binary/source that names the keylog
# capability in its own comments, logs, or UI is the same triage signal as the
# English label. CJK has no word boundaries → substr; Cyrillic → case-insensitive
# substr; Farsi → regex for the optional ZWNJ (U+200C) joiner.
defaults:
  platforms: [unix, windows, android]
  for: [scripts, source, binaries, documents]
  crit: notable
  conf: 0.75
  mbc: B0015
  attack: T1056.001
traits:
  - id: cn-keylogger-term
    desc: Chinese keylogging term (键盘记录)
    if:
      type: text
      substr: 键盘记录
  - id: ru-keylogger-term
    desc: Russian keylogger term (кейлоггер)
    if:
      type: text
      substr: кейлоггер
      case_insensitive: true
  - id: ko-keylogger-term
    desc: Korean keylogger term (키로거)
    if:
      type: text
      substr: 키로거
  - id: fa-keylogger-term
    desc: Farsi keylogger term (کیلاگر)
    if:
      type: text
      regex: 'کی\x{200c}?لاگر'
