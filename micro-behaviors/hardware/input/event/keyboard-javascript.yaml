# Browser keyboard-event handling
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]

traits:
  - id: on-keyboard-event-handler
    desc: Registers keyboard event handler with on()
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\.on\s*\(\s*["''](keydown|keyup|keypress)["'']'

  - id: on-mouse-event-handler
    desc: Registers mouse event handler with on()
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\.on\s*\(\s*["''](mousemove|mousedown)["'']'

  - id: browser-f12-key-comparison
    desc: Compares browser keyboard event to F12
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '[A-Za-z_$][\w$]*\.key\s*===?\s*["'']F12["'']'
    unless:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/config::vscode-webview-extension
      - id: metadata/package/manifest/runtime::vscode-extension
