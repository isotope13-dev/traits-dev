# Browser keyboard-event handling
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]

traits:
  - id: browser-f12-key-comparison
    desc: Compares browser keyboard event to F12
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '[A-Za-z_$][\w$]*\.key\s*===?\s*["'']F12["'']'
    unless:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/config::vscode-webview-extension
      - id: metadata/package/manifest/runtime::vscode-extension
