defaults:
  platforms: [unix]
  for: [binaries, scripts]

traits:
  - id: linux-input-device-path
    desc: Linux input device path
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: /dev/input
  - id: linux-evdev-event-path
    desc: Linux evdev input event path
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [elf, c, cpp]
    if:
      type: text
      regex: '/dev/input/event[0-9*%{}a-zA-Z_.-]*'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/lib/electron::electron-chromium-runtime-strong
  - id: linux-input-devices-registry
    desc: Linux input devices registry path
    crit: notable
    conf: 0.84
    platforms: [linux]
    for: [elf, c, cpp]
    if:
      type: text
      substr: /proc/bus/input/devices
  - id: linux-input-event-key-parse
    desc: Linux input_event key parsing
    crit: notable
    conf: 0.84
    platforms: [linux]
    for: [elf, c, cpp]
    if:
      type: text
      regex: '\bstruct\s+input_event\b|\bEV_KEY\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

composite_rules:
  - id: linux-raw-keyboard-event-capture
    desc: Linux raw keyboard event capture
    crit: notable
    conf: 0.9
    platforms: [linux]
    for: [elf, c, cpp]
    all:
      - id: linux-evdev-event-path
    any:
      - id: linux-input-devices-registry
      - id: linux-input-event-key-parse
