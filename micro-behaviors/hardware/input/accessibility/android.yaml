defaults:
  platforms: [android]
  for: [apk, zip, xml]
  crit: component
  conf: 0.9

traits:
  - id: android-accessibility-service-class
    desc: Android accessibility service class
    conf: 0.9
    if:
      type: text
      substr: "Landroid/accessibilityservice/AccessibilityService;"

  - id: android-accessibility-gesture-api
    desc: Android accessibility gesture API
    conf: 0.9
    if:
      type: text
      substr: "Landroid/accessibilityservice/GestureDescription;"

  - id: android-accessibility-settings-intent
    desc: Android accessibility settings intent
    conf: 0.9
    if:
      type: text
      substr: "android.settings.ACCESSIBILITY_SETTINGS"

  - id: android-accessibility-service-config-resource
    desc: Android accessibility service config
    if:
      type: text
      substr: "res/xml/accessibility_service_config.xml"
      offset_range: [-262144, null]

  - id: android-accessibility-service-config-member
    desc: Android accessibility service config
    if:
      type: value
      path: "archive.members[*].path"
      exact: res/xml/accessibility_service_config.xml

  - id: android-accessibility-config-resource-alt
    desc: Android accessibility service config
    conf: 0.86
    if:
      type: text
      substr: "res/xml/accessdiecrip.xml"
      offset_range: [-262144, null]

  - id: android-accessibility-config-member-alt
    desc: Android accessibility service config
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      exact: res/xml/accessdiecrip.xml

  - id: android-accessibilityservice-config-resource
    desc: Android accessibilityservice config
    conf: 0.88
    if:
      type: text
      substr: "res/xml/accessibilityservice.xml"
      offset_range: [-262144, null]

  - id: android-accessibilityservice-config-member
    desc: Android accessibilityservice config
    conf: 0.88
    if:
      type: value
      path: "archive.members[*].path"
      exact: res/xml/accessibilityservice.xml

  - id: android-accessibility-request-layout
    desc: Android accessibility request screen
    conf: 0.86
    if:
      type: text
      substr: "res/layout/activity_req_access.xml"
      offset_range: [-262144, null]

  - id: android-miui-accessibility-layout
    desc: Android MIUI accessibility prompt
    conf: 0.84
    if:
      type: text
      substr: "res/layout/miui_access_act.xml"
      offset_range: [-262144, null]

composite_rules:
  - id: android-accessibility-service-config
    desc: Android accessibility service config
    crit: notable
    conf: 0.9
    any:
      - id: android-accessibility-service-config-resource
      - id: android-accessibility-service-config-member
      - id: android-accessibility-config-resource-alt
      - id: android-accessibility-config-member-alt
      - id: android-accessibilityservice-config-resource
      - id: android-accessibilityservice-config-member
      - id: android-accessibility-service-class
      - id: android-accessibility-gesture-api
