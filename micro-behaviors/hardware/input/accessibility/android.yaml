defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.9

traits:
  - id: android-accessibility-service-config-resource
    desc: Android accessibility service config
    if:
      type: raw
      substr: "res/xml/accessibility_service_config.xml"
      offset_range: [-262144, null]

  - id: android-accessibility-config-resource-alt
    desc: Android accessibility service config
    conf: 0.86
    if:
      type: raw
      substr: "res/xml/accessdiecrip.xml"
      offset_range: [-262144, null]

  - id: android-accessibility-request-layout
    desc: Android accessibility request screen
    conf: 0.86
    if:
      type: raw
      substr: "res/layout/activity_req_access.xml"
      offset_range: [-262144, null]

  - id: android-miui-accessibility-layout
    desc: Android MIUI accessibility prompt
    conf: 0.84
    if:
      type: raw
      substr: "res/layout/miui_access_act.xml"
      offset_range: [-262144, null]

composite_rules:
  - id: android-accessibility-service-config
    desc: Android accessibility service config
    crit: component
    conf: 0.9
    any:
      - id: android-accessibility-service-config-resource
      - id: android-accessibility-config-resource-alt
