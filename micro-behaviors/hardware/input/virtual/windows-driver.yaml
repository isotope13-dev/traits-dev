defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.92

traits:
  - id: virtual-hid-driver-name
    desc: Virtual HID driver name
    if:
      type: text
      exact: vhid
  - id: virtual-input-driver-token
    desc: Virtual input driver token
    if:
      type: text
      regex: (?i)\b(virtualhid|virtual hid|vhidmini)\b
  - id: virtual-mouse-driver-token
    desc: Virtual mouse driver token
    if:
      type: text
      regex: (?i)\b(virtual mouse|vhidmouse)\b
  - id: virtual-keyboard-driver-token
    desc: Virtual keyboard driver token
    if:
      type: text
      regex: (?i)\b(virtual keyboard|vhidkeyboard)\b
  - id: mouse-class-driver-reference
    desc: Windows mouse class driver reference
    if:
      type: text
      exact: mouclass
  - id: keyboard-class-driver-reference
    desc: Windows keyboard class driver reference
    if:
      type: text
      exact: kbdclass

composite_rules:
  - id: virtual-keyboard-mouse-driver
    desc: Virtual keyboard mouse driver
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: virtual-hid-driver-name
      - id: virtual-input-driver-token
      - id: virtual-mouse-driver-token
      - id: virtual-keyboard-driver-token
      - id: mouse-class-driver-reference
      - id: keyboard-class-driver-reference
