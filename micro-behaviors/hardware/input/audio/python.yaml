defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.82

traits:
  - id: sounddevice-input-stream
    desc: Opens microphone input stream
    if:
      type: text
      regex: '\bsounddevice\b[\s\S]{0,120}\.InputStream\s*\(|\bsd\.InputStream\s*\('

  - id: microphone-device-env
    desc: Reads microphone device setting
    conf: 0.74
    if:
      type: text
      substr: VOICE_MIC

  - id: silero-vad-model
    desc: Uses Silero VAD model
    conf: 0.8
    if:
      type: text
      regex: 'silero[_-]vad|SileroVAD'

  - id: nemo-asr-stt
    desc: Uses NeMo speech recognition
    conf: 0.84
    if:
      type: text
      regex: 'nemo\.collections\.asr|EncDecCTCModelBPE|parakeet-ctc'

  - id: onnx-audio-model
    desc: Uses ONNX audio model
    conf: 0.76
    if:
      type: text
      regex: '\.onnx\b[\s\S]{0,120}(vad|turn)|onnxruntime'

composite_rules:
  - id: python-microphone-capture
    desc: Python microphone capture
    crit: notable
    conf: 0.88
    any:
      - id: sounddevice-input-stream
      - id: microphone-device-env

  - id: python-speech-to-text
    desc: Python speech recognition
    crit: notable
    conf: 0.88
    any:
      - id: nemo-asr-stt
      - id: silero-vad-model
      - id: onnx-audio-model
