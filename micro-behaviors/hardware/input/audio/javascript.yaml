defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
traits:
  - id: browser-audio-element-create
    desc: Creates browser audio element
    conf: 0.88
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    if:
      type: symbol
      kind: call
      exact: document.createElement
      arg:
        kind: string
        exact: audio

  - id: browser-audio-source-attribute
    desc: Assigns browser audio source
    crit: component
    conf: 0.86
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    if:
      type: text
      regex: '\.setAttribute\s*\(\s*["'']src["'']\s*,[^)]{0,160}\)'

  - id: tonejs-runtime
    desc: Tone.js audio runtime bundle
    conf: 0.95
    if:
      type: text
      substr: Tone.js v

  - id: web-audio-worklet-dsp
    desc: Web Audio worklet DSP bundle
    conf: 0.9
    if:
      type: text
      regex: '(AudioWorkletProcessor|registerProcessor)[\s\S]{0,400}(parameterDescriptors|process\s*\()'

  - id: midi-note-frequency-context
    desc: MIDI note frequency conversion
    conf: 0.9
    if:
      type: text
      regex: '(midi|pitchBend|noteNumber)[\s\S]{0,600}(Math\.pow\(2,\s*\(t-69\)|Math\.pow\(2,\s*13\))'

composite_rules:
  - id: browser-audio-element-with-source
    desc: Browser audio element with source
    crit: notable
    conf: 0.9
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    near_bytes: 256
    all:
      - id: browser-audio-element-create
      - id: browser-audio-source-attribute

  - id: web-audio-dsp-context
    desc: Web Audio DSP math context
    crit: notable
    conf: 0.95
    any:
      - id: tonejs-runtime
      - id: web-audio-worklet-dsp
      - id: midi-note-frequency-context
