defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.88
  attack: T1123

traits:
  - id: android-media-recorder-reference
    desc: Android media recorder reference
    if:
      type: text
      substr: "Landroid/media/MediaRecorder;"

  - id: android-record-audio-permission
    desc: Android audio record permission
    if:
      type: text
      substr: "android.permission.RECORD_AUDIO"

  - id: android-voice-recorder-class
    desc: Android voice recorder class
    conf: 0.84
    if:
      type: text
      substr: "VoiceRecorder"

composite_rules:
  - id: android-audio-recording-capability
    desc: Android audio recording capability
    crit: suspicious
    conf: 0.9
    any:
      - id: android-media-recorder-reference
      - id: android-record-audio-permission
      - id: android-voice-recorder-class
