defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1123
traits:
  - id: cpal-default-input-device
    desc: Rust CPAL default input device
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: host.default_input_device
  - id: cpal-input-config
    desc: Rust CPAL input stream config
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: input_device.default_input_config
  - id: cpal-build-input-stream
    desc: Rust CPAL input stream builder
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: input_device.build_input_stream
  - id: audio-stream-start
    desc: Starts captured input stream
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: stream.play
  - id: hound-wav-writer
    desc: Rust Hound WAV file writer
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: WavWriter::create
  - id: wav-sample-write
    desc: Writes PCM samples to WAV
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: writer.write_sample
composite_rules:
  - id: rust-cpal-audio-recording
    desc: Rust CPAL microphone recording
    crit: suspicious
    conf: 0.93
    all:
      - id: cpal-default-input-device
      - id: cpal-build-input-stream
    any:
      - id: cpal-input-config
      - id: audio-stream-start
      - id: hound-wav-writer
      - id: wav-sample-write
