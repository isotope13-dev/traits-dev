defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  attack: T1123
traits:
  - id: mci-waveaudio-open
    desc: MCI wave audio recorder open
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: open new type waveaudio
    unless:
      - id: metadata/package/testing/presence/harness::c-source-test-directory
      - id: metadata/lang/source/
  - id: mci-recsound-record
    desc: MCI recsound recording command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: record recsound
    unless:
      - id: metadata/package/testing/presence/harness::c-source-test-directory
      - id: metadata/lang/source/
  - id: mci-recsound-save
    desc: MCI saves recorded microphone audio
    crit: suspicious
    conf: 0.84
    if:
      type: text
      substr: save recsound
    unless:
      - id: metadata/package/testing/presence/harness::c-source-test-directory
      - id: metadata/lang/source/
  - id: mci-send-string-api
    desc: MCI command execution API
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: mciSendString[AW]?
composite_rules:
  - id: windows-mci-audio-recording
    desc: Windows MCI audio recording capability
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/package/testing/presence/harness::c-source-test-directory
      - id: metadata/lang/source/
    all:
      - id: mci-waveaudio-open
      - id: mci-recsound-record
    any:
      - id: mci-recsound-save
      - id: mci-send-string-api
