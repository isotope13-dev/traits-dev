defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.88

traits:
  - id: android-media-player-reference
    desc: Android MediaPlayer reference
    if:
      type: text
      substr: "Landroid/media/MediaPlayer;"

  - id: android-audio-manager-reference
    desc: Android AudioManager reference
    if:
      type: text
      substr: "Landroid/media/AudioManager;"

  - id: android-modify-audio-settings-permission
    desc: Android audio settings permission
    if:
      type: text
      substr: "android.permission.MODIFY_AUDIO_SETTINGS"

composite_rules:
  - id: android-audio-playback-control
    desc: Android media playback with audio manager access
    crit: notable
    conf: 0.91
    all:
      - id: android-media-player-reference
    any:
      - id: android-audio-manager-reference
      - id: android-modify-audio-settings-permission

  - id: android-raw-media-playback
    desc: Android raw media playback
    crit: suspicious
    conf: 0.91
    all:
      - id: android-media-player-reference
      - id: micro-behaviors/data/embedded/media::apk-short-raw-mp3-resource
