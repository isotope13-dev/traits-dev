defaults:
  for: [macho]
  platforms: [macos]
  attack: T1123

traits:
  - id: coreaudio-input-device-io
    desc: CoreAudio input device I/O callback import
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: AudioDeviceCreateIOProcID
  - id: coreaudio-input-device-start
    desc: CoreAudio input device start import
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: AudioDeviceStart
  - id: coreaudio-input-device-stop
    desc: CoreAudio input device stop import
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: AudioDeviceStop
  - id: coreaudio-unit-render
    desc: AudioUnit input rendering import
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: AudioUnitRender
  - id: avfoundation-audio-engine
    desc: AVFoundation audio engine import
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: AVAudioEngine
