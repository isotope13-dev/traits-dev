# Disk Information - Generic
# ATT&CK: T1082 (System Information Discovery)
defaults:
  for: [shell, python, javascript, powershell, pe, elf]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: freespace
    desc: Disk free space query
    crit: baseline
    conf: 0.5
    attack: "T1082"
    platforms: [unix, windows]
    if:
      type: string_value
      substr: "DiskFreeSpace"
