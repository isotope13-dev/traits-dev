defaults:
  for: [scripts, binaries]
  platforms:
    - unix
    - windows
traits:
  - id: access
    desc: Access IOKit device driver registry
    crit: notable
    conf: 0.6
    platforms:
      - macos
    if:
      type: text
      substr: IORegistry
  - id: object-release
    desc: Releases IOKit object reference
    crit: baseline
    conf: 0.5
    platforms:
      - macos
    if:
      type: symbol
      regex: IOObjectRelease
