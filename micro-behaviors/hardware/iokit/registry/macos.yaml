defaults:
  for: [macho]
  platforms: [macos]
traits:
  - id: access
    desc: Access IOKit device driver registry
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: IORegistry
  - id: object-release
    desc: Releases IOKit object reference
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      regex: IOObjectRelease
