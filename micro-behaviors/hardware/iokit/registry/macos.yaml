defaults:
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: access
    desc: Access IOKit device driver registry
    crit: notable
    conf: 0.6
    platforms:
      - macos
    if:
      type: text
      substr: IORegistry
  - id: object-release
    desc: Releases IOKit object reference
    crit: baseline
    conf: 0.5
    platforms:
      - macos
    if:
      type: symbol
      regex: IOObjectRelease
  - id: registry-property-read
    desc: Reads an IOKit registry property
    crit: notable
    conf: 0.85
    platforms:
      - macos
    if:
      type: symbol
      exact: IORegistryEntryCreateCFProperty
  - id: service-matching
    desc: Matches macOS IOKit services
    crit: notable
    conf: 0.85
    platforms:
      - macos
    if:
      type: symbol
      exact: IOServiceGetMatchingServices
  - id: ioreg-vendor-query
    desc: Queries IORegistry vendor fields
    crit: notable
    conf: 0.82
    for: [macho, c, shell, scripts, applescript]
    platforms: [macos]
    if:
      type: text
      regex: ioreg[^\n]{0,60}(Manufacturer|Vendor Name)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
