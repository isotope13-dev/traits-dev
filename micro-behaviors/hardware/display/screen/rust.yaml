defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1113
  mbc: C0014
traits:
  - id: scrap-capturer-import
    desc: scrap screen capture crate
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: use scrap::{Capturer, Display}
  - id: display-primary
    desc: Primary display handle access
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Display::primary()
  - id: scrap-frame-read
    desc: Screen frame read loop
    crit: notable
    conf: 0.93
    if:
      type: symbol
      exact: capturer.frame
  - id: bgra-to-rgb-conversion
    desc: BGRA frame converted to RGB
    crit: notable
    conf: 0.94
    if:
      type: symbol
      exact: frame.chunks_exact
composite_rules:
  - id: scrap-screen-capture
    desc: Rust scrap screen capture
    crit: suspicious
    conf: 0.96
    all:
      - id: scrap-capturer-import
      - id: scrap-frame-read
    any:
      - id: display-primary
      - id: bgra-to-rgb-conversion
