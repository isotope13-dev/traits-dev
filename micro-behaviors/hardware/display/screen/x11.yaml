defaults:
  platforms: [unix]
  for: [binaries]

traits:
  - id: xgetimage-symbol
    desc: X11 screen image capture API
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: XGetImage

  - id: x11-reset-symbol
    desc: X11 screen capture reset function
    crit: component
    conf: 0.8
    if:
      type: text
      word: x11Reset

composite_rules:
  - id: x11-display-screen-capture
    desc: X11 display connection with screen-image capture
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/hardware/display/connection::x11-open-display
      - id: xgetimage-symbol
