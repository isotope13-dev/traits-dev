# Display Screen Capture - Python
# Detects screen capture library usage
# MBC: B0002 (Screen Capture)
# ATT&CK: T1113 (Screen Capture)
defaults:
  platforms: [windows, unix]
  attack: T1113
  mbc: B0002
  for: [python]
traits:
  # === MSS Library ===
  - id: mss-import
    desc: mss screen capture library
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(^|\s)import\s+mss\b|from\s+mss\b'
      case_insensitive: true
  - id: mss-screenshot
    desc: Uses mss screen capture API
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\.shot\(|mss\.mss\(\)'
  # === PIL/Pillow ImageGrab ===
  # General-purpose imaging/automation libraries: a screenshot call is one
  # feature among many (OCR, RPA, GUI testing, monitoring), so the raw capability
  # is notable, not suspicious. The stealer verdict comes from
  # objectives/collection/screenshot, which composes capture with save-to-disk /
  # network exfil.
  - id: pil-imagegrab
    desc: PIL ImageGrab screen capture
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bImageGrab\.grab\s*\('
  # === Pyautogui ===
  - id: pyautogui-screenshot
    desc: pyautogui.screenshot screen capture
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'pyautogui\.screenshot|pyautogui\.locateOnScreen'
  # === GuardDog: Additional screenshot libraries ===
  - id: pyscreenshot-grab
    desc: pyscreenshot.grab screen capture
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: 'pyscreenshot\.grab'
  - id: d3dshot-screenshot
    desc: d3dshot screenshot (DirectX)
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: 'd3dshot\.'
  - id: mss-grab
    desc: mss screen capture
    crit: notable
    conf: 0.95
    if:
      # Matches `.grab` only on mss-style capture receivers, against the
      # pre-extracted `call` fact. ImageGrab / pyscreenshot are already covered
      # by pil-imagegrab / pyscreenshot-grab above, so this targets the
      # remaining capture receivers (sct, mss, grabber) — keeping the
      # alternation under the 3-pipe limit and avoiding noise like
      # `queue.grab()` / `lock.grab()` that a bare `.grab` query caught.
      type: symbol
      kind: call
      regex: '(sct|mss|grabber)\.grab$'
  # === Generic screenshot method ===
  - id: screenshot-method
    desc: Captures an image via screenshot()
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      regex: '(^|\.)screenshot$|^screenshot_now$'
  - id: cdp-page-capture-screenshot
    desc: CDP Page.captureScreenshot screen capture
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: Page.captureScreenshot
composite_rules:
  # Screen capture library composite. Notable: this is an OR over capture
  # capabilities, i.e. "a screenshot can be taken" — a neutral capability.
  # Intent (save-to-disk staging, network exfil) is inferred by
  # objectives/collection/screenshot.
  - id: screen-capture
    desc: Screen capture library usage
    crit: notable
    conf: 0.95
    any:
      - id: mss-import
      - id: mss-screenshot
      - id: mss-grab
      - id: pil-imagegrab
      - id: pyautogui-screenshot
