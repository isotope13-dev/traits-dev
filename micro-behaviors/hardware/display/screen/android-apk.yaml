defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.88
  attack: T1113

traits:
  - id: android-media-projection-manager
    desc: Android MediaProjection manager
    conf: 0.9
    if:
      type: raw
      substr: "Landroid/media/projection/MediaProjectionManager;"

  - id: android-media-projection-capture-intent
    desc: Android screen capture intent
    conf: 0.9
    if:
      type: raw
      substr: "createScreenCaptureIntent"

  - id: android-virtual-display-capture
    desc: Android virtual display capture
    conf: 0.9
    if:
      type: raw
      substr: "createVirtualDisplay"

  - id: android-screen-capture-layout
    desc: Android screen capture layout
    if:
      type: raw
      substr: "res/layout/activity_screen_capture.xml"
      offset_range: [-262144, null]

  - id: android-accessibility-screenshot-api
    desc: Android accessibility screenshot API
    conf: 0.9
    if:
      type: raw
      substr: "Landroid/accessibilityservice/AccessibilityService$TakeScreenshotCallback;"

  - id: android-screen-ping-thread
    desc: Android screen capture worker
    conf: 0.84
    if:
      type: raw
      substr: "AccessService$ScreenPingThread"

  - id: android-screen-lock-layout
    desc: Android screen lock layout
    conf: 0.82
    if:
      type: raw
      substr: "res/layout/activity_screen_lock_pwd.xml"
      offset_range: [-262144, null]

  - id: android-blocklock-layout
    desc: Android blocklock layout resource
    conf: 0.9
    if:
      type: raw
      substr: "res/layout/blocklock.xml"
      offset_range: [-262144, null]

composite_rules:
  - id: android-screen-capture-capability
    desc: Android app can capture screen content
    crit: suspicious
    conf: 0.91
    any:
      - id: android-screen-capture-layout
      - id: android-accessibility-screenshot-api
      - id: android-screen-ping-thread

  - id: android-media-projection-screen-capture
    desc: Android MediaProjection screen capture
    crit: suspicious
    conf: 0.94
    all:
      - id: android-media-projection-manager
      - id: android-media-projection-capture-intent
    any:
      - id: android-virtual-display-capture
      - id: android-screen-capture-capability
