# Display Output Operations
# Console and display-related capabilities
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Console Output ===
  - id: write-console-w
    desc: Unicode console output
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      exact: "WriteConsoleW"
  - id: write-console-a
    desc: ANSI console output
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      exact: "WriteConsoleA"
  # === Windows GDI Screen Capture Primitives ===
  - id: gdi-bitblt
    desc: GDI BitBlt screen blit API
    crit: baseline
    conf: 0.9
    mbc: "C0014"
    attack: "T1113"
    if:
      type: symbol
      exact: "BitBlt"
  - id: gdi-getdibits
    desc: GDI GetDIBits pixel readback
    crit: baseline
    conf: 0.9
    mbc: "C0014"
    attack: "T1113"
    if:
      type: text
      exact: "GetDIBits"
  - id: gdi-create-compatible-dc
    desc: GDI compatible device context
    crit: baseline
    conf: 0.85
    mbc: "C0014"
    attack: "T1113"
    if:
      type: symbol
      exact: "CreateCompatibleDC"
  - id: gdi-create-compatible-bitmap
    desc: GDI compatible bitmap allocation
    crit: baseline
    conf: 0.85
    mbc: "C0014"
    attack: "T1113"
    if:
      type: symbol
      exact: "CreateCompatibleBitmap"
  - id: get-desktop-window
    desc: Desktop window handle access
    crit: baseline
    conf: 0.8
    mbc: "C0014"
    attack: "T1113"
    if:
      type: symbol
      exact: "GetDesktopWindow"
composite_rules:
  - id: gdi-screen-capture-primitives
    desc: Windows GDI screenshot primitives
    crit: baseline
    conf: 0.93
    mbc: "C0014"
    attack: "T1113"
    all:
      - id: gdi-bitblt
      - id: gdi-getdibits
    any:
      - id: gdi-create-compatible-dc
      - id: gdi-create-compatible-bitmap
      - id: get-desktop-window
  - id: gdi-window-capture-primitives
    desc: Windows GDI active window capture primitives
    crit: baseline
    conf: 0.94
    mbc: "C0014"
    attack: "T1113"
    all:
      - id: gdi-bitblt
      - id: gdi-create-compatible-dc
      - id: gdi-create-compatible-bitmap
    any:
      - id: micro-behaviors/ui/window/manage::get-window-dc
      - id: get-desktop-window
      - id: micro-behaviors/ui/window/manage::get-dc
