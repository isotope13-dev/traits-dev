# Display Output Operations
# Console and display-related capabilities
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  # === Console Output ===
  - id: write-console-w
    desc: Unicode console output
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      exact: WriteConsoleW
  - id: write-console-a
    desc: ANSI console output
    crit: baseline
    conf: 0.95
    if:
      type: symbol
      exact: WriteConsoleA

  # === Windows GDI Screen Capture Primitives ===
  - id: gdi-bitblt
    desc: GDI BitBlt screen blit API
    crit: notable
    conf: 0.9
    mbc: C0014
    attack: T1113
    if:
      type: symbol
      exact: BitBlt
  - id: gdi-getdibits
    desc: GDI GetDIBits pixel readback
    crit: notable
    conf: 0.9
    mbc: C0014
    attack: T1113
    if:
      type: text
      exact: GetDIBits
  - id: gdi-create-compatible-dc
    desc: GDI compatible device context
    crit: baseline
    conf: 0.85
    mbc: C0014
    attack: T1113
    if:
      type: symbol
      exact: CreateCompatibleDC
  - id: gdi-create-compatible-bitmap
    desc: GDI compatible bitmap allocation
    crit: baseline
    conf: 0.85
    mbc: C0014
    attack: T1113
    if:
      type: symbol
      exact: CreateCompatibleBitmap
  - id: get-desktop-window
    desc: Desktop window handle access
    crit: notable
    conf: 0.8
    mbc: C0014
    attack: T1113
    if:
      type: symbol
      exact: GetDesktopWindow
  - id: d3d11-device-swapchain
    desc: Direct3D 11 device and swap chain
    crit: notable
    conf: 0.9
    mbc: C0014
    attack: T1113
    if:
      type: symbol
      exact: D3D11CreateDeviceAndSwapChain

  - id: print-window-api
    desc: Window image capture API
    crit: notable
    conf: 0.9
    mbc: C0014
    attack: T1113
    if:
      type: import
      exact: PrintWindow
    downgrade:
      any:
        - id: metadata/library/automation/
        - id: metadata/binary/vendor/
        - id: well-known/app/internet-explorer/
        - id: well-known/lib/electron/
  - id: print-window-full-content
    desc: Screen capture renders full window content
    crit: suspicious
    conf: 0.86
    mbc: C0014
    attack: T1113
    if:
      type: text
      exact: PW_RENDERFULLCONTENT

  # === Windows Runtime GraphicsCapture ===
  - id: winrt-graphics-capture-session
    desc: WinRT GraphicsCapture opens capture session
    crit: notable
    conf: 0.96
    mbc: C0014
    attack: T1113
    if:
      type: text
      exact: Windows.Graphics.Capture.GraphicsCaptureSession
    downgrade:
      any:
        - id: well-known/lib/electron::v8-isolate-marker
        - id: well-known/app/wireshark/
    unless:
      - id: well-known/app/wireshark/
      - type: path
        substr: Wireshark-
  - id: winrt-direct3d11-framepool
    desc: WinRT Direct3D11 frame pool
    crit: component
    conf: 0.96
    mbc: C0014
    attack: T1113
    if:
      type: text
      exact: Windows.Graphics.Capture.Direct3D11CaptureFramePool
  - id: winrt-graphics-capture-access
    desc: WinRT GraphicsCapture requests screen access
    crit: suspicious
    conf: 0.94
    mbc: C0014
    attack: T1113
    if:
      type: text
      exact: Windows.Graphics.Capture.GraphicsCaptureAccess
  - id: winrt-graphics-capture-pdb
    desc: GraphicsCapture DLL debug path
    crit: component
    conf: 0.94
    mbc: C0014
    attack: T1113
    if:
      type: text
      exact: GraphicsCapture.pdb

composite_rules:
  - id: gdi-screen-capture-primitives
    desc: Windows GDI screenshot primitives
    crit: notable
    conf: 0.93
    mbc: C0014
    attack: T1113
    all:
      - id: gdi-bitblt
      - id: gdi-getdibits
    any:
      - id: gdi-create-compatible-dc
      - id: gdi-create-compatible-bitmap
      - id: get-desktop-window

  - id: gdi-window-capture-primitives
    desc: Windows GDI active window capture primitives
    crit: notable
    conf: 0.94
    mbc: C0014
    attack: T1113
    all:
      - id: gdi-bitblt
      - id: gdi-create-compatible-dc
      - id: gdi-create-compatible-bitmap
    any:
      - id: micro-behaviors/ui/window/manage/control::get-window-dc
      - id: get-desktop-window
      - id: micro-behaviors/ui/window/manage/control::get-dc

  - id: winrt-graphics-capture-primitives
    desc: Windows WinRT screen capture primitives
    crit: suspicious
    conf: 0.96
    mbc: C0014
    attack: T1113
    all:
      - id: winrt-graphics-capture-session
      - id: winrt-direct3d11-framepool
    any:
      - id: winrt-graphics-capture-access
      - id: winrt-graphics-capture-pdb

  - id: printwindow-capture-primitives
    desc: Windows PrintWindow capture primitives
    crit: notable
    conf: 0.93
    mbc: C0014
    attack: T1113
    all:
      - id: print-window-api
    any:
      - id: print-window-full-content
      - id: micro-behaviors/ui/window/manage/control::get-window-rect
      - id: micro-behaviors/ui/window/manage/control::get-window-text
    downgrade:
      any:
        - id: metadata/library/automation/
        - id: metadata/binary/vendor/
        - id: well-known/app/internet-explorer/
        - id: well-known/lib/electron/
