defaults:
  platforms: [windows, linux, macos]
  mbc: E1113
  attack: T1113
traits:
  - id: screenshot-import
    desc: vova616/screenshot library import
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: import
      regex: vova616/screenshot|screenshot
  - id: screenshot-string
    desc: screenshot library in binary
    crit: suspicious
    conf: 0.85
    for: [go, elf, macho, pe]
    if:
      type: text
      regex: vova616/screenshot|screenshot\.Capture
  - id: kbinani-screenshot
    desc: kbinani/screenshot library
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: import
      regex: kbinani/screenshot
  - id: capture-screen
    desc: Screen capture function call
    crit: suspicious
    conf: 0.85
    for:
      - go
    if:
      type: ast
      kind: call
      regex: screenshot\.Capture|CaptureScreen|GetScreenshot
  - id: capture-rect
    desc: Screen region capture
    crit: suspicious
    conf: 0.8
    for:
      - go
    if:
      type: ast
      kind: call
      exact: screenshot.CaptureRect
  - id: display-bounds
    desc: Display bounds enumeration
    crit: notable
    conf: 0.7
    for:
      - go
    if:
      type: ast
      kind: call
      regex: screenshot\.GetDisplayBounds|NumActiveDisplays
  - id: png-encode-screen
    desc: PNG encoding for screen capture
    crit: notable
    conf: 0.6
    for:
      - go
    if:
      type: ast
      kind: call
      exact: png.Encode
  - id: robotgo-capture
    desc: robotgo screen capture
    crit: suspicious
    conf: 0.85
    for:
      - go
    if:
      type: string_literal
      regex: robotgo\.CaptureScreen|robotgo\.SaveCapture
  - id: reset-desktop-capture
    desc: Desktop capture reset function
    crit: component
    conf: 0.96
    for: [go]
    platforms: [windows]
    if:
      type: symbol
      kind: function
      exact: ResetDesktopCapture
  - id: dxgi-reset-state
    desc: DXGI capture state reset
    crit: component
    conf: 0.96
    for: [go]
    platforms: [windows]
    if:
      type: symbol
      kind: import
      exact: dxgiState.reset
  - id: bitmap-reset-state
    desc: BitBlt capture state reset
    crit: component
    conf: 0.96
    for: [go]
    platforms: [windows]
    if:
      type: symbol
      kind: import
      exact: state.reset
  - id: capture-reset-lock
    desc: Capture reset guarded by mutex
    crit: component
    conf: 0.95
    for: [go]
    platforms: [windows]
    if:
      type: symbol
      kind: import
      exact: captureMu.Lock
  - id: bitblt-capture-comment
    desc: BitBlt capture progress comment
    crit: component
    conf: 0.94
    for: [go]
    platforms: [windows]
    if:
      type: text
      substr: BitBlt capture is in progress
composite_rules:
  - id: screenshot-library
    desc: Screenshot library usage
    crit: suspicious
    conf: 0.85
    any:
      - id: screenshot-import
      - id: screenshot-string
      - id: kbinani-screenshot
  - id: capture-operations
    desc: Screen capture operations
    crit: suspicious
    conf: 0.8
    any:
      - id: capture-screen
      - id: capture-rect
      - id: robotgo-capture
  - id: go-screen-capture
    desc: Go screen capture capability
    crit: suspicious
    conf: 0.9
    for:
      - go
    all:
      - id: screenshot-library
      - id: capture-operations
  - id: windows-desktop-capture-reset
    desc: Windows desktop capture reset routine
    crit: notable
    conf: 0.95
    for: [go]
    platforms: [windows]
    all:
      - id: reset-desktop-capture
      - id: dxgi-reset-state
      - id: bitmap-reset-state
      - id: capture-reset-lock
    any:
      - id: bitblt-capture-comment
