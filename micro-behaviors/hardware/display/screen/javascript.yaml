# Display/Screen Capabilities - JavaScript
# Capabilities related to display enumeration and screen capture
defaults:
  platforms: [windows, unix]
  attack: T1113
  mbc: B0002
  for: [javascript]
traits:
  - id: monitor-get-displays
    desc: 'Enumerates display monitors'
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'Monitor\.getAllDisplays'
  - id: screenshot-capture-fn
    desc: Calls captureScreenshots helper
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: captureScreenshots
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - type: text
        regex: 'PW_CAPTURE_SCREENSHOTS|@playwright/test|PlaywrightRunOptions'
  - id: import-node-screenshots
    desc: Imports node-screenshots library
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'require\s*\(\s*["'']node-screenshots["'']\s*\)'
  - id: dynamic-import-node-screenshots
    desc: Dynamically imports node-screenshots library
    crit: suspicious
    conf: 0.92
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      regex: '\bimport\s*\(\s*["'']node-screenshots["'']\s*\)'
  - id: node-screenshots-monitor-all
    desc: node-screenshots monitor enumeration
    crit: component
    conf: 0.9
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      substr: Monitor.all()
  - id: node-screenshots-capture-image
    desc: node-screenshots image capture call
    crit: component
    conf: 0.9
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: symbol
      exact: captureImage
  - id: node-screenshots-jpeg-frame
    desc: node-screenshots JPEG frame encoding
    crit: component
    conf: 0.88
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: symbol
      exact: toJpeg
  - id: screenshot-counter-filename
    desc: Automated numbered screenshot file naming
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'screenshot.{0,20}\+\+.{0,10}\.(jpeg|jpg|png)'

composite_rules:
  - id: node-screenshots-monitor-capture
    desc: node-screenshots monitor capture flow
    crit: suspicious
    conf: 0.93
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    all:
      - id: dynamic-import-node-screenshots
    any:
      - id: node-screenshots-monitor-all
      - id: node-screenshots-capture-image
      - id: node-screenshots-jpeg-frame
