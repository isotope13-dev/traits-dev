# Display/Screen Capabilities - JavaScript
# Capabilities related to display enumeration and screen capture
defaults:
  platforms: [windows, unix]
  attack: T1113
  mbc: B0002
  for: [javascript]
traits:
  - id: monitor-get-displays
    desc: 'Enumerates display monitors'
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'Monitor\.getAllDisplays'
  - id: screenshot-capture-fn
    desc: Function explicitly named to capture screenshots
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: 'captureScreenshots'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - type: text
        regex: 'PW_CAPTURE_SCREENSHOTS|@playwright/test|PlaywrightRunOptions'
  - id: import-node-screenshots
    desc: Imports node-screenshots library
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'require\s*\(\s*["'']node-screenshots["'']\s*\)'
  - id: screenshot-counter-filename
    desc: Automated numbered screenshot file naming
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'screenshot.{0,20}\+\+.{0,10}\.(jpeg|jpg|png)'
