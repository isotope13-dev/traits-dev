# .NET Screen Capture via System.Drawing (CopyFromScreen)
# Detects the .NET managed screenshot API cluster used in RATs/stealers
# ATT&CK: T1113 (Screen Capture)
# MBC: C0014
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1113
  mbc: C0014
traits:
  - id: copyfromscreen-dotnet
    desc: ".NET CopyFromScreen screen capture method"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: CopyFromScreen
    downgrade:
      any:
        - id: metadata/package/quality/
        - id: metadata/signed/leaf::progress-software-corporation
        - id: metadata/package/versioning::pe-companyname-field
  - id: screen-primaryscreen-str
    desc: "Screen.PrimaryScreen access"
    crit: component
    conf: 0.8
    if:
      type: text
      substr: get_PrimaryScreen
  - id: imageformat-jpeg-str
    desc: ImageFormat.Jpeg encoding reference
    crit: component
    conf: 0.75
    if:
      type: text
      substr: get_Jpeg
  - id: bitmap-fromscratch-str
    desc: System.Drawing.Bitmap class reference
    crit: component
    conf: 0.7
    if:
      type: text
      substr: Bitmap
  - id: screenshot-jpg-template
    desc: Screenshot JPEG filename template
    crit: component
    conf: 0.82
    if:
      type: text
      exact: screenshot_{0}.jpg
  - id: dllimport-attribute
    desc: .NET native API import attribute
    crit: baseline
    conf: 0.88
    if:
      type: text
      exact: DllImportAttribute
  - id: pinvoke-user32-library
    desc: User32 library reference
    crit: baseline
    conf: 0.86
    if:
      type: text
      regex: (?i)^user32\.dll$
  - id: pinvoke-gdi32-library
    desc: .NET GDI32 library import
    crit: baseline
    conf: 0.86
    if:
      type: text
      regex: (?i)^gdi32\.dll$
  - id: dotnet-all-screens
    desc: .NET display enumeration call
    crit: baseline
    conf: 0.82
    if:
      type: text
      substr: get_AllScreens
  - id: dotnet-screen-bounds
    desc: .NET display bounds query
    crit: baseline
    conf: 0.82
    if:
      type: text
      substr: get_Bounds
  - id: dotnet-screen-width
    desc: .NET display width query
    crit: baseline
    conf: 0.82
    if:
      type: text
      substr: get_Width
  - id: dotnet-screen-height
    desc: .NET display height query
    crit: baseline
    conf: 0.82
    if:
      type: text
      substr: get_Height
composite_rules:
  - id: dotnet-copyfromscreen-capture
    desc: .NET managed screenshot via CopyFromScreen
    crit: suspicious
    conf: 0.9
    all:
      - id: copyfromscreen-dotnet
    any:
      - id: screen-primaryscreen-str
      - id: imageformat-jpeg-str
      - id: bitmap-fromscratch-str
      - id: screenshot-jpg-template
    downgrade:
      any:
        - id: metadata/package/quality/
        - id: metadata/signed/leaf::progress-software-corporation
  - id: dotnet-gdi-managed-screen-capture
    desc: .NET desktop capture rendered through GDI and JPEG
    crit: suspicious
    conf: 0.96
    all:
      - id: screen-primaryscreen-str
      - id: dotnet-screen-bounds
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-dc
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/data/encode/image/gdiplus::dotnet-from-hbitmap
      - id: imageformat-jpeg-str
    near_bytes: 8192
  - id: dotnet-pinvoke-gdi-capture-primitives
    desc: .NET P/Invoke GDI bitmap capture primitives
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dllimport-attribute
      - id: pinvoke-user32-library
      - id: pinvoke-gdi32-library
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-dc
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-bitmap
    any:
      - id: micro-behaviors/ui/window/manage/control::get-window-dc
      - id: micro-behaviors/hardware/display/screen::get-desktop-window
      - id: dotnet-all-screens
    unless:
      - id: well-known/app/
      - id: well-known/lib/
  - id: dotnet-dpi-aware-display-enumeration
    desc: .NET DPI-aware display bounds enumeration
    crit: notable
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-all-screens
      - id: dotnet-screen-bounds
      - id: dotnet-screen-width
      - id: dotnet-screen-height
      - id: dotnet-set-process-dpi-awareness-context
