# .NET Screen Capture via System.Drawing (CopyFromScreen)
# Detects the .NET managed screenshot API cluster used in RATs/stealers
# ATT&CK: T1113 (Screen Capture)
# MBC: C0014
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1113
  mbc: C0014
traits:
  - id: copyfromscreen-dotnet
    desc: .NET Graphics.CopyFromScreen screen capture method
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: CopyFromScreen
    unless:
      - id: metadata/vendor/microsoft::visual-studio-uitesting-component
  - id: screen-primaryscreen-str
    desc: Screen.PrimaryScreen access (P/Invoke reference)
    crit: component
    conf: 0.8
    if:
      type: text
      exact: get_PrimaryScreen
  - id: imageformat-jpeg-str
    desc: ImageFormat.Jpeg encoding reference
    crit: component
    conf: 0.75
    if:
      type: text
      exact: get_Jpeg
  - id: bitmap-fromscratch-str
    desc: System.Drawing.Bitmap class reference
    crit: component
    conf: 0.7
    if:
      type: text
      exact: Bitmap
  - id: screenshot-jpg-template
    desc: Screenshot JPEG filename template
    crit: component
    conf: 0.82
    if:
      type: text
      exact: screenshot_{0}.jpg
composite_rules:
  - id: dotnet-copyfromscreen-capture
    desc: .NET managed screenshot via CopyFromScreen
    crit: notable
    conf: 0.9
    all:
      - id: copyfromscreen-dotnet
    any:
      - id: screen-primaryscreen-str
      - id: imageformat-jpeg-str
      - id: bitmap-fromscratch-str
      - id: screenshot-jpg-template
    unless:
      - id: metadata/vendor/microsoft::visual-studio-uitesting-component
