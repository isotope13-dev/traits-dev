# CreateDIBSection - BMP screenshot creation
# Completes the GDI screenshot capture chain
# BurrowShell uses GetDC + CreateCompatibleDC + CreateDIBSection + BitBlt
defaults:
  for: [pe]
  platforms: [windows]
  mbc: "C0014"
  attack: "T1113"
traits:
  - id: create-dib-section
    desc: GDI DIB section creation for BMP capture
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: CreateDIBSection
