# NVIDIA NVML library bindings — programmatic access to GPU model,
# driver/firmware version, ECC error counters, vGPU mode, and per-GPU
# performance metrics. NVML symbol names are emitted by nvml-wrapper-sys
# as a contiguous cstring table inside .rdata.
defaults:
  platforms: [windows, unix]
  for: [pe, elf, macho]
  crit: notable
  conf: 0.9
traits:
  - id: nvml-init-symbol
    desc: NVML init entry point
    crit: component
    if:
      type: hex
      pattern: "6E 76 6D 6C 49 6E 69 74 5F 76 32"
      section: rdata

  - id: nvml-driver-version-symbol
    desc: NVML driver version query
    crit: component
    if:
      type: hex
      pattern: "6E 76 6D 6C 53 79 73 74 65 6D 47 65 74 44 72 69 76 65 72 56 65 72 73 69 6F 6E"
      section: rdata

  - id: nvml-vbios-version-symbol
    desc: NVML VBIOS version query
    crit: component
    if:
      type: hex
      pattern: "6E 76 6D 6C 44 65 76 69 63 65 47 65 74 56 62 69 6F 73 56 65 72 73 69 6F 6E"
      section: rdata

  - id: nvml-wrapper-rust-crate
    desc: Rust nvml-wrapper-sys crate path
    crit: component
    if:
      type: text
      substr: nvml-wrapper-sys
      section: rdata

  - id: nvidia-gpu-classifier-token
    desc: NVIDIA GPU classification token cluster
    crit: component
    if:
      type: text
      substr: NvidiaQuadroTeslaNVSGRIDGeForceTitanV
      section: rdata

composite_rules:
  - id: nvml-symbol-cluster
    desc: NVIDIA NVML symbol cluster
    crit: notable
    conf: 0.95
    any:
      - id: nvml-init-symbol
      - id: nvml-driver-version-symbol
      - id: nvml-vbios-version-symbol
      - id: nvml-wrapper-rust-crate
      - id: nvidia-gpu-classifier-token
    needs: 2
