# Video/Camera capture device access
# ATT&CK: T1125 (Video Capture)
defaults:
  attack: T1125
traits:
  - id: android-camera-capture-layout
    desc: Android camera capture layout
    crit: component
    conf: 0.88
    for: [apk, zip]
    platforms: [android]
    if:
      type: text
      substr: "res/layout/activity_camera_capture.xml"
      offset_range: [-262144, null]

  - id: android-camera2-manager-reference
    desc: Android camera manager reference
    crit: component
    conf: 0.88
    for: [apk, zip]
    platforms: [android]
    if:
      type: text
      substr: "Landroid/hardware/camera2/CameraManager;"

  - id: android-camera-handler-class
    desc: Android camera handler class
    crit: component
    conf: 0.84
    for: [apk, zip]
    platforms: [android]
    if:
      type: text
      substr: "CameraHandler"

  - id: video-input-devices
    desc: Video input device enumeration

    for: [pe, dll, c, cpp, csharp]
    crit: notable
    conf: 0.85
    platforms: [windows]
    if:
      type: text
      substr: VideoInputDevices
  - id: directx-capture-import
    desc: DirectX.Capture video framework
    crit: notable
    conf: 0.9
    for: [csharp]
    platforms: [windows]
    if:
      type: text
      substr: DirectX.Capture
  - id: avfoundation-capture
    desc: AVFoundation video capture device
    crit: notable
    conf: 0.85
    for: [swift, objc, c, cpp, macho]
    platforms: [macos, ios]
    if:
      type: text
      substr: AVCaptureDevice
  - id: vfw-capture-window
    desc: Video for Windows capture window
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    platforms: [windows]
    if:
      type: text
      regex: capCreateCaptureWindow[AW]?
    unless:
      - type: text
        regex: '#define\s+capCreateCaptureWindow'
      - type: text
        substr: 'WINELIB_NAME_AW(capCreateCaptureWindow)'
      - type: text
        regex: 'capCreateCaptureWindow[AW]?\s*\('
      - type: text
        substr: 'HWnd __cdecl capCreateCaptureWindowA'
    downgrade:
      any:
        - id: micro-behaviors/hardware/display/camera/
  - id: vfw-frame-grab-message
    desc: Windows VFW captures camera frame
    crit: notable
    conf: 0.86
    for: [pe, dll, c, cpp]
    platforms: [windows]
    if:
      type: text
      regex: WM_CAP_(GRAB_FRAME|FILE_SAVEDIB)
    unless:
      - type: text
        regex: '#define\s+WM_CAP_FILE_SAVEDIB'
      - type: text
        substr: 'WINELIB_NAME_AW(WM_CAP_FILE_SAVEDIB)'

composite_rules:
  - id: benign-vfw-capture-context
    desc: Benign Video for Windows capture API context
    crit: component
    conf: 0.9
    for: [pe, dll, c, cpp]
    platforms: [windows]
    any:
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: well-known/lib/ffmpeg::ffmpeg-product-versioninfo
      - id: well-known/lib/ffmpeg::ffmpeg-description-versioninfo
      - id: well-known/app/ipodme::ipodme-media-converter
      - id: well-known/app/ipodme::ipodme-product-versioninfo
  - id: android-camera-capture-capability
    desc: Android app can capture camera video
    crit: suspicious
    conf: 0.9
    for: [apk, zip]
    platforms: [android]
    any:
      - id: android-camera-capture-layout
      - id: android-camera2-manager-reference
      - id: android-camera-handler-class
  - id: windows-vfw-frame-capture
    desc: Windows webcam frame capture capability
    crit: suspicious
    conf: 0.9
    for: [pe, dll, c, cpp]
    platforms: [windows]
    all:
      - id: vfw-capture-window
      - id: vfw-frame-grab-message
