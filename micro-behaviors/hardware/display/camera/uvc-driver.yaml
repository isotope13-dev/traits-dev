# USB Video Class (UVC) camera driver export vocabulary.
# UVC_ / DFU_ prefixed exports are generic to USB-video and device
# firmware-upgrade drivers across vendors.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.9

traits:
  - id: uvc-dfu-export-cluster
    desc: UVC and DFU camera control exports
    count_min: 10
    if:
      type: symbol
      regex: ^(UVC_|DFU_)
