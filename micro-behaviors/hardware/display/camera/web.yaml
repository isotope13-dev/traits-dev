# Browser/web media capture capability (camera + microphone).
# Neutral mechanic: navigator.mediaDevices.getUserMedia is the canonical web
# API for accessing the webcam/microphone. Legitimate in video chat, audio
# transcription, QR scanning, etc. Lure/exfiltration intent is composed in
# objectives/ by pairing this with meeting-brand lures + media upload loops.
defaults:
  platforms: [windows, unix]
  for: [html, javascript]
traits:
  - id: browser-media-capture-api
    desc: Browser media capture API (getUserMedia)
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'navigator\.mediaDevices\.getUserMedia|getUserMedia\s*\('
