defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: create-color-transform
  desc: "CreateColorTransform ICM transform import"
  crit: notable
  conf: 0.9
  if:
    type: import
    regex: ^CreateColorTransform[AW]$
- id: register-cmm
  desc: 'register cmm'
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: RegisterCMMW
- id: translate-bitmap-bits
  desc: 'translate bitmap bits'
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: TranslateBitmapBits
- id: install-color-profile
  desc: 'install color profile'
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: InstallColorProfileA
- id: enum-color-profiles
  desc: 'enum color profiles'
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: EnumColorProfilesW
