defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: create-color-transform
  desc: CreateColorTransformA/W ICM color transform import
  crit: notable
  conf: 0.9
  if:
    type: import
    regex: ^CreateColorTransform[AW]$
- id: register-cmm
  desc: RegisterCMMW color management module registration import
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: RegisterCMMW
- id: translate-bitmap-bits
  desc: TranslateBitmapBits ICM bitmap color conversion import
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: TranslateBitmapBits
- id: install-color-profile
  desc: InstallColorProfileA color profile installation import
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: InstallColorProfileA
- id: enum-color-profiles
  desc: EnumColorProfilesW color profile enumeration import
  crit: notable
  conf: 0.9
  if:
    type: import
    exact: EnumColorProfilesW
