defaults:
  platforms: [macos]
  for: [macho, shell]

traits:
  - id: macos-screencapture-command
    desc: macOS screencapture command
    crit: notable
    conf: 0.95
    if:
      type: text
      word: screencapture
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform::apple
        - id: well-known/tool/detection/
        - type: text
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
    unless:
      - id: well-known/app/macos-benign/
