# DirectX Graphics Infrastructure Access
# Detects neutral GPU/graphics capabilities for analyst context.
traits:
  - id: directx-device-d3d9
    desc: Direct3D 9 device creation API
    crit: notable
    conf: 0.82
    platforms: [windows]
    for: [pe]
    if:
      type: symbol
      exact: Direct3DCreate9
  - id: directx-factory-api
    desc: DirectX factory creation
    crit: baseline
    conf: 0.7
    platforms: [windows]
    for: [pe]
    if:
      type: symbol
      exact: "CreateDXGIFactory"
  - id: directx-device-factory1
    desc: CreateDXGIFactory1 API
    crit: baseline
    conf: 0.7
    platforms: [windows]
    for: [pe]
    if:
      type: symbol
      exact: "CreateDXGIFactory1"
  - id: directx-device-d3d11
    desc: D3D11CreateDevice API
    crit: baseline
    conf: 0.7
    platforms: [windows]
    for: [pe]
    if:
      type: symbol
      exact: "D3D11CreateDevice"
  - id: directx-device-d3d12
    desc: D3D12CreateDevice API
    crit: baseline
    conf: 0.7
    platforms: [windows]
    for: [pe]
    if:
      type: symbol
      exact: "D3D12CreateDevice"
  - id: cuda-memcpy
    desc: CUDA cudaMemcpy API
    crit: notable
    conf: 0.7
    platforms: [windows, linux, macos]
    for: [pe, elf, macho]
    if:
      type: symbol
      substr: "cudaMemcpy"
  - id: cuda-launch-kernel
    desc: CUDA cudaLaunchKernel API
    crit: notable
    conf: 0.7
    platforms: [windows, linux, macos]
    for: [pe, elf, macho]
    if:
      type: symbol
      substr: "cudaLaunchKernel"
composite_rules:
  - id: directx-device-api
    desc: DirectX device creation
    crit: notable
    conf: 0.7
    platforms: [windows]
    for: [pe]
    any:
      - id: directx-device-d3d9
      - id: directx-device-factory1
      - id: directx-device-d3d11
      - id: directx-device-d3d12
  - id: cuda-runtime-api
    desc: NVIDIA CUDA runtime access
    crit: notable
    conf: 0.7
    platforms: [windows, linux, macos]
    for: [pe, elf, macho]
    any:
      - id: cuda-memcpy
      - id: cuda-launch-kernel
  - id: gpu-graphics-access
    desc: GPU graphics infrastructure
    crit: component
    conf: 0.75
    platforms: [windows]
    for: [pe]
    mbc: "E1030"
    any:
      - id: directx-factory-api
      - id: directx-device-api
  - id: gpu-compute-capable
    desc: GPU compute capability
    crit: suspicious
    conf: 0.8
    platforms: [unix, windows, macos]
    for: [pe, elf, macho]
    mbc: "E1030"
    any:
      - id: gpu-graphics-access
      - id: cuda-runtime-api
    unless:
      - id: well-known/app/turboadb::official-turboadb-gui
