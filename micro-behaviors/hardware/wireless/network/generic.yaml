# Wireless Network - Generic
# ATT&CK: T1016 (System Network Configuration Discovery)
defaults:
  for: [shell, python, javascript, powershell, pe, elf]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: bssid
    desc: Wireless network base station ID
    crit: notable
    conf: 0.6
    attack: "T1016"
    platforms: [unix, windows]
    if:
      type: string_value
      regex: "\\b[Bb][Ss][Ss][Ii][Dd]\\b"
