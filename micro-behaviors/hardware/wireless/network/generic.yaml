defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: bssid
    desc: Wireless network base station ID
    crit: notable
    conf: 0.6
    attack: T1016
    platforms:
      - unix
      - windows
    if:
      type: text
      regex: \b[Bb][Ss][Ss][Ii][Dd]\b
