defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: bssid
    desc: BSSID property or assignment
    crit: notable
    conf: 0.6
    attack: T1016
    platforms:
      - unix
      - windows
    if:
      type: text
      regex: '(?i)(\.\s*bssid\b|\b["'']?bssid["'']?\s*[:=])'
    unless:
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
