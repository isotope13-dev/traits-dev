# Wireless Network - Linux
# ATT&CK: T1016 (System Network Configuration Discovery)
defaults:
  for: [elf, shell, python]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: wpa-supplicant
    desc: WPA supplicant wireless access
    crit: notable
    conf: 0.6
    platforms: [linux]
    if:
      type: string_value
      substr: "wpa_supplicant"
  - id: wps-supplicant
    desc: WPS supplicant wireless access
    crit: notable
    conf: 0.6
    platforms: [linux]
    if:
      type: string_value
      substr: "wps_supplicant"
