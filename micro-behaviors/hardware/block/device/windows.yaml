defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082
  mbc: B0009

traits:
  - id: disk-geometry-ioctl
    desc: Queries physical disk geometry
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: IOCTL_DISK_GET_DRIVE_GEOMETRY_EX
      section: .text

  - id: smart-storage-token
    desc: SMART storage telemetry token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(IOCTL_SMART_|SMART_READ_|GetSmartAttribute|NVMeSmart)\b'
      section: .text

  - id: physical-drive-index-token
    desc: Physical drive index token
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(i?PhysicalDrive|PhysicalDrive[0-9])\b'
      section: .text

composite_rules:
  - id: windows-smart-disk-monitoring
    desc: Windows SMART disk monitoring
    crit: notable
    conf: 0.92
    any:
      - id: smart-storage-token
      - id: disk-geometry-ioctl
      - id: physical-drive-index-token
    needs: 2
