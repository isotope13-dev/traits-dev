defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082
  mbc: B0009

traits:
- id: disk-geometry-ioctl
  desc: Queries physical disk geometry
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: IOCTL_DISK_GET_DRIVE_GEOMETRY_EX
    section: .text

- id: physical-drive-index-token
  desc: Physical drive index token
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\b(i?PhysicalDrive|PhysicalDrive[0-9])\b'
    section: .text

- id: smart-storage-token--ioctl-smart
  desc: SMART storage telemetry token (IOCTL_SMART_)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text

    word: IOCTL_SMART_
- id: smart-storage-token--smart-read
  desc: SMART storage telemetry token (SMART_READ_)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text

    word: SMART_READ_
- id: smart-storage-token--getsmartattribute
  desc: SMART storage telemetry (GetSmartAttribute)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text

    word: GetSmartAttribute
- id: smart-storage-token--nvmesmart
  desc: SMART storage telemetry token (NVMeSmart)
  crit: component
  conf: 0.9
  if:
    type: text
    section: .text

    word: NVMeSmart
composite_rules:
- id: smart-storage-token
  desc: SMART storage telemetry token
  crit: component
  conf: 0.9
  any:
  - id: smart-storage-token--ioctl-smart
  - id: smart-storage-token--smart-read
  - id: smart-storage-token--getsmartattribute
  - id: smart-storage-token--nvmesmart
- id: windows-smart-disk-monitoring
  desc: Windows SMART disk monitoring
  crit: notable
  conf: 0.92
  any:
  - id: smart-storage-token
  - id: disk-geometry-ioctl
  - id: physical-drive-index-token
  needs: 2
