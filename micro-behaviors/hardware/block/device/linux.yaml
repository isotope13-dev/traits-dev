defaults:
  for:
    - elf
    - shell
    - python
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: disk-identity-ioctl
    desc: References the Linux disk identity query ioctl
    crit: notable
    conf: 0.8
    attack: T1082
    platforms: [linux]
    if:
      type: text
      substr: HDIO_GET_IDENTITY
  - id: sys-block-dup
    desc: Access block device info via /sys/dev/block
    crit: notable
    conf: 0.75
    attack: T1082
    platforms:
      - linux
    if:
      type: text
      substr: /sys/dev/block
  - id: dev-sd
    desc: Access raw SCSI/SATA block devices
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      regex: /dev/sd[a-z]
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: dev-dm
    desc: Access LVM device mapper
    crit: notable
    conf: 0.75
    platforms:
      - linux
    if:
      type: text
      regex: /dev/dm-\d
  - id: dev-mapper
    desc: Uses device mapper framework
    crit: notable
    conf: 0.7
    platforms:
      - linux
    if:
      type: text
      substr: /dev/mapper
