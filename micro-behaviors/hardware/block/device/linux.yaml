defaults:
  for:
    - elf
    - shell
    - python
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: sys-block-dup
    desc: Access block device info via
    crit: suspicious
    conf: 0.75
    attack: T1082
    platforms:
      - linux
    if:
      type: string_value
      regex: /sys/dev/block
  - id: dev-sd
    desc: Access raw SCSI/SATA block devices
    crit: notable
    conf: 0.8
    platforms:
      - linux
    if:
      type: string_value
      regex: /dev/sd[a-z]
  - id: dev-dm
    desc: Access LVM device mapper
    crit: suspicious
    conf: 0.75
    platforms:
      - linux
    if:
      type: string_value
      regex: /dev/dm-\d
  - id: dev-mapper
    desc: Uses device mapper framework
    crit: notable
    conf: 0.7
    platforms:
      - linux
    if:
      type: string_value
      regex: /dev/mapper
