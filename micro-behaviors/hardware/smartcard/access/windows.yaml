# Smart Card API (WinSCard.dll)
# Windows Smart Card Resource Manager API for smart card reader access
# MBC: C0005 (Hardware)
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: notable
  conf: 0.9
traits:
  - id: establish-context
    desc: Smart card resource manager connection
    if:
      type: symbol
      exact: "SCardEstablishContext"
  - id: connect
    desc: Smart card reader connection
    if:
      type: symbol
      exact: "SCardConnectW"
  - id: list-readers
    desc: Enumerate smart card readers
    if:
      type: symbol
      exact: "SCardListReadersW"
  - id: get-status-change
    desc: Monitor smart card status changes
    if:
      type: symbol
      exact: "SCardGetStatusChangeW"
  - id: begin-transaction
    desc: Smart card transaction start
    if:
      type: symbol
      exact: "SCardBeginTransaction"
  - id: get-attrib
    desc: Read smart card attributes
    if:
      type: symbol
      exact: "SCardGetAttrib"
  - id: locate-cards
    desc: Locate smart cards by name
    crit: notable
    if:
      type: symbol
      regex: "SCardLocateCards[AW]$"
  - id: locate-cards-atr
    desc: Locate smart cards by ATR
    crit: notable
    if:
      type: symbol
      exact: "SCardLocateCardsByATRW"
  - id: control
    desc: Direct smart card control command
    if:
      type: symbol
      exact: "SCardControl"
composite_rules:
  - id: smartcard-access
    desc: Smart card reader access pattern
    crit: notable
    conf: 0.88
    all:
      - id: establish-context
    any:
      - id: connect
      - id: list-readers
      - id: get-status-change
      - id: begin-transaction
      - id: get-attrib
      - id: locate-cards
      - id: locate-cards-atr
      - id: control
    needs: 3
    downgrade:
      any:
        - id: metadata/signed/platform/
