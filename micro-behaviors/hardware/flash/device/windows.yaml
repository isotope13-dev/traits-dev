defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1048576
  size_max: 67108864

traits:
  - id: sprd-fdl-loader-cust
    desc: Spreadtrum FDL loader marker
    crit: component
    conf: 0.98
    if:
      type: text
      word: FDL_LOADER_CUST

  - id: sprd-header-xml
    desc: Spreadtrum PAC header manifest
    crit: component
    conf: 0.96
    if:
      type: text
      exact: sprd_header.xml

  - id: sprd-fdl-input-filter
    desc: Spreadtrum FDL input filter
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'fdl[12]-sign\(\*\.bin\)\|\*\.bin'

  - id: sprd-bootloader-signature
    desc: Spreadtrum bootloader signature workspace
    crit: notable
    conf: 0.97
    if:
      type: text
      exact: sprd_bootloader_signature

  - id: sprd-secureflag
    desc: Spreadtrum secureflag partition tag
    crit: notable
    conf: 0.98
    if:
      type: text
      exact: SPRD-SECUREFLAG

composite_rules:
  - id: spreadtrum-fdl-flash-tooling
    desc: Spreadtrum FDL flashing workflow
    crit: notable
    conf: 0.98
    all:
      - id: sprd-fdl-loader-cust
    any:
      - id: sprd-header-xml
      - id: sprd-fdl-input-filter
      - id: sprd-bootloader-signature
      - id: sprd-secureflag
    needs: 2
