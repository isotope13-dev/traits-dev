defaults:
  for:
  - elf
  - shell
  - python
  platforms:
  - linux
  - unix
  - windows
  - macos
  - ios
  - android
traits:
- id: firmware-sysupgrade-marker
  desc: Firmware sysupgrade marker
  crit: component
  conf: 0.9
  platforms: [linux]
  if:
    type: text
    substr: sysupgrade
- id: firmware-mtd-helper-marker--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [linux]
  if:
    type: text
    substr: find_mtd_part
  count_max: 1006904
- id: firmware-mtd-helper-marker--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [linux]
  if:
    type: text
    substr: nand_do_upgrade
  count_max: 1006905
- id: firmware-mtd-helper-marker--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [linux]
  if:
    type: text
    substr: CI_UBIPART
  count_max: 1006906
- id: firmware-platform-marker--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [linux]
  if:
    type: text
    substr: ubootenv
  count_max: 1006907
- id: firmware-platform-marker--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [linux]
  if:
    type: text
    substr: OpenWrt
  count_max: 1006908
- id: firmware-platform-marker--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [linux]
  if:
    type: text
    substr: LEDE
  count_max: 1006909
- id: mtd
  desc: Access raw flash memory (MTD)
  crit: suspicious
  conf: 0.8
  platforms:
  - linux
  if:
    type: text
    regex: /dev/(block/)?mtd
  unless:
  - id: firmware-upgrade-context
  - id: objectives/evasion/kernel-hide/module::modinfo-section
  - id: objectives/evasion/kernel-hide/module::vermagic
- id: mmc
  desc: Access raw SD/MMC devices
  crit: notable
  conf: 0.85
  platforms:
  - linux
  if:
    type: text
    regex: /dev/(block/)?mmcblk
- id: ubi
  desc: Access raw unsorted block images
  crit: notable
  conf: 0.8
  platforms:
  - linux
  if:
    type: text
    substr: /dev/ubi
  unless:
  - id: firmware-upgrade-context
composite_rules:
- id: firmware-upgrade-context
  desc: Firmware upgrade or embedded board support context
  crit: component
  conf: 0.9
  any:
  - id: firmware-sysupgrade-marker
  - id: firmware-mtd-helper-marker
  - id: firmware-platform-marker
- id: firmware-mtd-helper-marker
  desc: Firmware MTD helper marker
  crit: component
  conf: 0.9
  platforms: [linux]
  any:
  - id: firmware-mtd-helper-marker--rx-1
  - id: firmware-mtd-helper-marker--rx-2
  - id: firmware-mtd-helper-marker--rx-3
- id: firmware-platform-marker
  desc: Firmware platform marker
  crit: component
  conf: 0.9
  platforms: [linux]
  any:
  - id: firmware-platform-marker--rx-4
  - id: firmware-platform-marker--rx-5
  - id: firmware-platform-marker--rx-6
