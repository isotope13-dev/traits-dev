defaults:
  for:
    - elf
    - shell
    - python
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: firmware-sysupgrade-marker
    desc: Firmware sysupgrade marker
    crit: component
    conf: 0.9
    platforms: [linux]
    if:
      type: text
      substr: sysupgrade
  - id: firmware-mtd-helper-marker
    desc: Firmware MTD helper marker
    crit: component
    conf: 0.9
    platforms: [linux]
    if:
      type: text
      regex: find_mtd_part|nand_do_upgrade|CI_UBIPART
  - id: firmware-platform-marker
    desc: Firmware platform marker
    crit: component
    conf: 0.9
    platforms: [linux]
    if:
      type: text
      regex: ubootenv|OpenWrt|LEDE
  - id: mtd
    desc: Access raw flash memory (MTD)
    crit: suspicious
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      regex: /dev/(block/)?mtd
    downgrade:
      any:
        - id: firmware-upgrade-context
  - id: mmc
    desc: Access raw SD/MMC devices
    crit: notable
    conf: 0.85
    platforms:
      - linux
    if:
      type: text
      regex: /dev/(block/)?mmcblk
  - id: ubi
    desc: Access raw unsorted block images
    crit: suspicious
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      substr: /dev/ubi
    downgrade:
      any:
        - id: firmware-upgrade-context
composite_rules:
  - id: firmware-upgrade-context
    desc: Firmware upgrade or embedded board support context
    crit: component
    conf: 0.9
    any:
      - id: firmware-sysupgrade-marker
      - id: firmware-mtd-helper-marker
      - id: firmware-platform-marker
