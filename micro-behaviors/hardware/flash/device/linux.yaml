defaults:
  for:
    - elf
    - shell
    - python
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: mtd
    desc: Access raw flash memory (MTD)
    crit: suspicious
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      regex: /dev/(block/)?mtd
  - id: mmc
    desc: Access raw SD/MMC devices
    crit: suspicious
    conf: 0.85
    platforms:
      - linux
    if:
      type: text
      regex: /dev/(block/)?mmcblk
  - id: ubi
    desc: Access raw unsorted block images
    crit: suspicious
    conf: 0.8
    platforms:
      - linux
    if:
      type: text
      substr: /dev/ubi
