defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: actionscript-version-check
    desc: Detects ActionScript Capabilities.version check (targeting)
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: "Capabilities\\.version"
