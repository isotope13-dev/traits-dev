defaults:
  platforms: [android]
  for: [apk]
  crit: notable
  conf: 0.86

traits:
  - id: wallpaper-manager
    desc: Android WallpaperManager reference
    if:
      type: text
      exact: WallpaperManager

  - id: set-bitmap-wallpaper
    desc: Sets Android bitmap wallpaper
    if:
      type: text
      exact: setBitmap

composite_rules:
  - id: set-android-wallpaper
    desc: Sets Android device wallpaper
    crit: notable
    conf: 0.9
    all:
      - id: wallpaper-manager
      - id: set-bitmap-wallpaper
