defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.86

traits:
  - id: wallpaper-manager
    desc: Android WallpaperManager reference
    if:
      type: raw
      substr: "Landroid/app/WallpaperManager;"

  - id: set-bitmap-wallpaper
    desc: Sets Android bitmap wallpaper
    if:
      type: raw
      substr: "setBitmap"

  - id: set-resource-wallpaper
    desc: Sets Android resource wallpaper
    if:
      type: raw
      substr: "setResource"

composite_rules:
  - id: set-android-wallpaper
    desc: Sets Android device wallpaper
    crit: notable
    conf: 0.9
    all:
      - id: wallpaper-manager
    any:
      - id: set-bitmap-wallpaper
      - id: set-resource-wallpaper
