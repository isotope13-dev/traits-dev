defaults:
  platforms: [windows]
  for: [batch, powershell]
traits:
  - id: registry-wallpaper-value
    desc: Desktop wallpaper registry value
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)Control Panel\\Desktop[^\r\n]{0,80}/v\s+Wallpaper\b
  - id: refresh-wallpaper-settings
    desc: Refreshes per-user wallpaper settings
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: UpdatePerUserSystemParameters
composite_rules:
  - id: set-desktop-wallpaper-via-registry
    desc: Sets desktop wallpaper via registry
    crit: notable
    conf: 0.96
    all:
      - id: registry-wallpaper-value
      - id: refresh-wallpaper-settings
