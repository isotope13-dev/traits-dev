# COM-based wallpaper setting via IActiveDesktop
# Used by malware for desktop defacement
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: baseline
  conf: 0.9
traits:
  - id: wallpaper-drop-path
    desc: Wallpaper image drop path string
    crit: notable
    conf: 0.97
    if:
      type: text
      exact: WallPapers.jpg
