defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
    - csharp
traits:
  - id: spi-setdeskwallpaper-const
    desc: SPI_SETDESKWALLPAPER constant
    crit: component
    if:
      type: text
      exact: SPI_SETDESKWALLPAPER
composite_rules:
  - id: set-desktop-wallpaper
    desc: Sets desktop wallpaper (SystemParametersInfo)
    crit: notable
    conf: 0.95
    all:
      - id: spi-setdeskwallpaper-const
      - id: micro-behaviors/ui/controls/widget::system-parameters-info
