defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  crit: baseline
  conf: 0.85

traits:
  - id: browser-contextmenu-listener
    desc: Handles DOM context menu event
    if:
      type: text
      substr: document.addEventListener('contextmenu'
    unless:
      - type: text
        substr: mermaid-architecture
  - id: browser-contextmenu-suppress
    desc: Suppresses DOM context menu
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "addEventListener\\(\\s*['\"]contextmenu['\"][\\s\\S]{0,400}\\.preventDefault\\s*\\("
    unless:
      - type: text
        substr: mermaid-architecture
