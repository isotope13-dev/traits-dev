# Browser-extension context-menu integration (chrome.contextMenus). Generic
# technique: registering a context-menu entry.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.9
traits:
  - id: chrome-contextmenus-api
    desc: Chrome contextMenus API usage
    if:
      type: text
      regex: '(chrome|browser)\.contextMenus\.[A-Za-z_]'
  - id: chrome-contextmenus-create
    desc: Chrome context-menu entry creation
    if:
      type: text
      regex: '(chrome|browser)\.contextMenus\.create\b'
  - id: image-context-menu
    desc: Browser extension image context-menu item
    conf: 0.9
    if:
      type: text
      regex: '["'']?contexts["'']?\s*:\s*\[\s*["'']image["'']\s*\]'
