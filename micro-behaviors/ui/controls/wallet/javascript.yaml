defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: wallet-connect-cta
    desc: Wallet connection call-to-action text
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bconnect\s+(your\s+wallet|(your\s+)?(crypto|cryptocurrency)\s+wallet)\b'
      case_insensitive: true
