defaults:
  platforms: [windows]
  for: [html]
  crit: notable
  conf: 0.95

traits:
  - id: html-object-click-call
    desc: HTML invokes object Click method
    if:
      type: text
      regex: '\b[a-zA-Z_][a-zA-Z0-9_]{0,20}\.Click\s*\(\s*\)'

  - id: html-onerror-click-call
    desc: HTML error handler invokes Click
    if:
      type: text
      regex: 'onerror\s*=\s*["''][^"'']{0,80}\.Click\s*\('

  - id: html-getelement-click-call
    desc: HTML element lookup invokes Click
    if:
      type: text
      regex: 'getElementById\s*\([^)]{1,80}\)\.Click\s*\('
