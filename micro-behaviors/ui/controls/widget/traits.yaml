defaults:
  for: [binaries]
  platforms:
    - unix
    - windows
traits:
  - id: winforms-button
    desc: WinForms Button control token
    crit: component
    conf: 0.72
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: Button
    unless:
      - id: metadata/binary/metrics/threshold::many-imports-40
  - id: winforms-label
    desc: WinForms Label control token
    crit: component
    conf: 0.72
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: Label
    unless:
      - id: metadata/binary/metrics/threshold::many-imports-40
  - id: winforms-progressbar
    desc: WinForms ProgressBar control token
    crit: component
    conf: 0.8
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: ProgressBar
  - id: winforms-statusstrip
    desc: WinForms StatusStrip control token
    crit: component
    conf: 0.78
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: StatusStrip
  - id: winforms-timer
    desc: WinForms Timer control token
    crit: component
    conf: 0.72
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: Timer
  - id: init-common-controls
    desc: Initialize common controls library
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: InitCommonControls
    for: [pe]
    platforms: [windows]
  - id: image-list-create
    desc: Create image list
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ImageList_Create
    for: [pe]
    platforms: [windows]
  - id: image-list-add-masked
    desc: Add masked image
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ImageList_AddMasked
    for: [pe]
    platforms: [windows]
  - id: image-list-destroy
    desc: Destroy image list
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ImageList_Destroy
    for: [pe]
    platforms: [windows]
  - id: get-system-metrics
    desc: Query system metrics
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetSystemMetrics
    for: [pe]
    platforms: [windows]
  - id: system-parameters-info-symbol
    desc: Query/set system parameters (symbol)
    crit: component
    if:
      type: symbol
      regex: ^SystemParametersInfo[AW]?$
    for: [pe]
    platforms: [windows]
  - id: system-parameters-info-string
    desc: Query/set system parameters (string)
    crit: component
    if:
      type: text
      substr: SystemParametersInfo
  - id: load-cursor
    desc: Load cursor resource
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: LoadCursorW
    for: [pe]
    platforms: [windows]
  - id: set-cursor
    desc: Set cursor
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetCursor
    for: [pe]
    platforms: [windows]
composite_rules:
  - id: winforms-progress-decoy-controls
    desc: WinForms progress style control cluster
    crit: notable
    conf: 0.88
    for: [pe]
    platforms: [windows]
    needs: 3
    any:
      - id: winforms-button
      - id: winforms-label
      - id: winforms-progressbar
      - id: winforms-statusstrip
      - id: winforms-timer
  - id: system-parameters-info
    desc: Query/set system parameters
    crit: baseline
    conf: 0.75
    any:
      - id: system-parameters-info-symbol
      - id: system-parameters-info-string
