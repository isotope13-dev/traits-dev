defaults:
  for: [binaries]
  platforms:
    - windows
    - linux
    - unix
    - macos
    - ios
    - android
traits:
  - id: init-common-controls
    desc: Initialize common controls library
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: InitCommonControls
  - id: image-list-create
    desc: Create image list
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ImageList_Create
  - id: image-list-add-masked
    desc: Add masked image
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ImageList_AddMasked
  - id: image-list-destroy
    desc: Destroy image list
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ImageList_Destroy
  - id: get-system-metrics
    desc: Query system metrics
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetSystemMetrics
  - id: system-parameters-info-symbol
    desc: Query/set system parameters (symbol)
    crit: component
    if:
      type: symbol
      regex: ^SystemParametersInfo[AW]?$
  - id: system-parameters-info-string
    desc: Query/set system parameters (string)
    crit: component
    if:
      type: string_value
      substr: SystemParametersInfo
  - id: load-cursor
    desc: Load cursor resource
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: LoadCursorW
  - id: set-cursor
    desc: Set cursor
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetCursor
composite_rules:
  - id: system-parameters-info
    desc: Query/set system parameters
    crit: baseline
    conf: 0.75
    any:
      - id: system-parameters-info-symbol
      - id: system-parameters-info-string
