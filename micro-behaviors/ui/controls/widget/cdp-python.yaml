defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: cdp-dom-click-dispatch
    desc: CDP automation clicks DOM elements
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'document\.querySelector\([^\r\n]{0,180}\.click\(\)'

  - id: cdp-dom-text-entry-dispatch
    desc: CDP automation enters DOM field text
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'document\.querySelector\([^\r\n]{0,220}\.value\s*='
