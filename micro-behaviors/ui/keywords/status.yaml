# Generic UI status-message text literals. Neutral capability strings that
# appear in countless benign apps; they only imply intent when a composite
# combines them with other signals (e.g. fake-CAPTCHA verification flows).
defaults:
  platforms: [unix, windows]
  for: [text, scripts, javascript, typescript, html]
traits:
  - id: success-message-literal
    desc: Generic success message text literal
    crit: component
    conf: 0.3
    if:
      type: text
      substr: Success!
  - id: download-status-msg
    desc: Download status message
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)Download\s*failed|Download\s*OK'
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: launch-status-msg
    desc: Launch status message
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)Launch\s*failed|Launch\s*OK'
composite_rules:
  - id: download-and-launch-status
    desc: Download and launch status messages
    crit: component
    conf: 0.9
    all:
      - id: download-status-msg
      - id: launch-status-msg
