# Generic UI status-message text literals. Neutral capability strings that
# appear in countless benign apps; they only imply intent when a composite
# combines them with other signals (e.g. fake-CAPTCHA verification flows).
defaults:
  platforms: [unix, windows]
  for: [text, scripts, javascript, typescript, html]
traits:
  - id: success-message-literal
    desc: Generic success message text literal
    crit: notable
    conf: 0.3
    if:
      type: text
      substr: Success!
