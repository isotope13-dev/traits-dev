defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: usage-help
    desc: Short -h help flag
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: -h[^a-z]
      section: .rdata
  - id: version-text
    desc: Version information string
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: --version|^version [0-9]|^v[0-9]+\.[0-9]
      case_insensitive: true
      section: .rdata

  - id: options-usage-string
    desc: Options usage text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "Usage: %s [OPTIONS]"

  - id: options-accepted-string
    desc: Options accepted help text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "The following OPTIONS are accepted:"

  - id: shell-profile-setup-instruction
    desc: Shell profile setup instruction
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "To complete setup, add this to"
