defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: terminal-help-instruction
    desc: Terminal-opening help text
    crit: component
    conf: 0.95
    for: [html, javascript, markdown, text]
    if:
      type: text
      regex: '(?i)\bopen a terminal (in|at)\b'

  - id: python-cache-windows-note
    desc: Python CLI help notes Windows availability
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: literal
      kind: string
      substr: 'not available on Windows'

  - id: help-long-flag
    desc: --help flag
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: --help
      # rdata, not .text: string constants live in .rodata/.rdata, so this
      # never matched on ELF and `has-help` (the notable documented-CLI
      # identity) could not reach its 2-leg quorum there.
      section: rdata
  - id: usage-lower
    desc: 'usage: label (lowercase)'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'usage:'
      section: rdata
  - id: usage-title
    desc: 'Usage: label (title case)'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'Usage:'
      section: rdata
  - id: options-title
    desc: 'Options: label'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'Options:'
      section: rdata
  - id: usage-upper
    desc: 'USAGE: label (uppercase)'
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: 'USAGE:'
      section: .text
  - id: usage-lower-string
    desc: 'usage: label in binary strings'
    crit: component
    conf: 0.5
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'usage:'
      section: rdata
  - id: usage-title-string
    desc: 'Usage: label in binary strings'
    crit: component
    conf: 0.5
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'Usage:'
      section: rdata
  - id: options-title-string
    desc: 'Options: label in binary strings'
    crit: component
    conf: 0.5
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'Options:'
      section: rdata
  - id: libxslt-configure-js
    desc: libxslt configure.js script
    for: [elf, macho, pe]
    crit: baseline
    conf: 1.0
    if:
      type: raw
      regex: Configure script for libxslt, specific for Windows
      section: .text

composite_rules:
  - id: usage-label
    desc: Command line usage text
    crit: component
    conf: 0.75
    any:
      - id: usage-lower
      - id: usage-title
      - id: usage-upper
      - id: usage-lower-string
      - id: usage-title-string
      - id: options-title
      - id: options-title-string

  - id: has-help
    desc: Contains help or usage information
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: help-long-flag
      - id: usage-lower
      - id: usage-title
      - id: options-title
      - id: usage-upper

  - id: documented-cli-binary
    desc: Documented command line program
    crit: component
    conf: 0.85
    all:
      - id: usage-label
    any:
      - id: metadata/binary/metrics/threshold::high-string-count-1000
      - id: metadata/binary/metrics/threshold::high-function-count-200
      - id: metadata/binary/metrics/threshold::many-imports-50
      - id: metadata/binary/metrics/threshold::rich-sentence-strings-20pct

  # Loose benign-tool evidence for DOWNGRADING dual-use capability findings on
  # legitimate OS/OSS userland tools. Real malware rarely ships a usage/help
  # screen, a --help/--version flag, or a GPL/Apache/MIT/SPDX license notice;
  # legitimate distro tools almost always carry at least one. Intended only as a
  # `downgrade:` marker — never a standalone signal — and the hostile parent
  # composites still fire on real implants regardless of this downgrade.
  - id: benign-cli-tool
    desc: Documented or licensed userland tool
    crit: component
    conf: 0.85
    any:
      - id: documented-cli-binary
      - id: usage-label
      - id: help-long-flag
      - id: version-text
      - id: has-help
      - id: metadata/package/license::gpl-warranty
      - id: metadata/package/license::gpl-word
      - id: metadata/package/license::spdx-identifier
      - id: metadata/package/license::apache-license-text
      - id: metadata/package/license::mit-license-text
