defaults:
  platforms: [unix, windows]
  for: [go]
traits:
  - id: go-x-term-import
    desc: Go x/term terminal library import
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: golang.org/x/term

  - id: go-readpassword-call
    desc: Go terminal hidden input read
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(term|terminal)\.ReadPassword\('

  - id: passphrase-entry-prompt
    desc: Passphrase entry prompt
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(enter|input|prompt).{0,24}passphrase'
      case_insensitive: true

  - id: terminal-screen-capture-method
    desc: Terminal screen capture method
    crit: notable
    conf: 0.78
    if:
      type: symbol
      kind: call
      regex: '(^|\.)Capture(Screen|Pane)$'
