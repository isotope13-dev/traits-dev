# Full-screen terminal UI control sequences as literal bytes in a compiled
# binary. The sibling ansi-escape.yaml matches the escaped spellings (backslash
# x1b, backslash 033) that appear in source and scripts; these match the raw ESC
# (0x1b) byte emitted into a program's rodata, which the string extractor cannot
# surface on its own -- the ESC byte breaks the printable run, so a `cleave
# strings` pass shows only the trailing text after the last escape.
#
# These are neutral rendering mechanics -- every editor, pager, TUI, and terminal
# game uses them. They are notable because they establish program identity (an
# interactive full-screen terminal program) for a security engineer triaging a
# diff, and because the same rendering is what a terminal-hijacking overlay or a
# fake-prompt credential capture uses to take over the screen; intent lives in the
# objective composites that would pair these with input capture or deception.
defaults:
  platforms: [unix]
  for: [elf, macho]
  crit: baseline
  conf: 0.7

traits:
  # ESC [ ? 1049 h/l -- switch to/from the xterm alternate screen buffer. This is
  # the defining move of a full-screen TUI: it saves the user's scrollback, paints
  # on a private buffer, and restores it on exit. Rare outside interactive terminal
  # programs, so notable on its own.
  - id: alternate-screen-buffer
    desc: Switches to terminal alternate screen buffer
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '\x1b\[\?1049[hl]'

  # ESC [ ? 25 l/h -- hide/show the cursor, done while a TUI paints frames.
  - id: cursor-visibility-escape
    desc: Hides or shows cursor via ANSI escape
    if:
      type: raw
      regex: '\x1b\[\?25[lh]'

  # ESC [ <n> J -- erase in display (2J clears the whole screen). A parameter
  # digit is required so the ESC-anchored pattern cannot collapse to the bare
  # 3-byte ESC[J. Literal-byte counterpart of ansi-escape.yaml's ansi-erase-op.
  - id: clear-screen-escape
    desc: Clears terminal screen via ANSI escape
    if:
      type: raw
      regex: '\x1b\[[0-9;]+J'

composite_rules:
  # Alternate-screen entry plus in-frame cursor or screen management is an
  # unambiguous full-screen terminal renderer. Pairing with the raw-mode ioctl
  # traits (input side) is what a keystroke-capturing TUI would additionally show.
  - id: fullscreen-terminal-ui
    desc: Full-screen terminal UI rendering
    crit: notable
    conf: 0.85
    all:
      - id: alternate-screen-buffer
    any:
      - id: cursor-visibility-escape
      - id: clear-screen-escape
