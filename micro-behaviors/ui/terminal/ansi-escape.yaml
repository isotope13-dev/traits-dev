# ANSI/VT terminal control sequences embedded in text. Neutral terminal
# mechanics: an escape prefix plus an erase operation clobbers prior output.
# Concealment intent (hiding command output from a user) is expressed by the
# objective composites that reference ansi-output-erase.
defaults:
  platforms: [unix, windows]
  for: [scripts]
traits:
- id: ansi-csi-escape
  desc: ANSI CSI escape prefix in text
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(\\u001[Bb]|\\x1[Bb]|\x1B)\['
    case_insensitive: true

- id: ansi-erase-op
  desc: ANSI terminal erase operation
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\[(2K|K|2J|J)'
    case_insensitive: true

composite_rules:
- id: ansi-output-erase
  desc: ANSI terminal output erase sequence
  crit: component
  conf: 0.86
  near_bytes: 24
  all:
  - id: ansi-csi-escape
  - id: ansi-erase-op
