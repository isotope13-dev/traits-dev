# ANSI/VT terminal control sequences embedded in text. Neutral terminal
# mechanics: an erase sequence clobbers previously printed output.
# Concealment intent (hiding command output from a user) is expressed by the
# objective composites that reference ansi-erase-op.
defaults:
  platforms: [unix, windows]
  for: [scripts]
traits:
- id: ansi-csi-escape
  desc: ANSI CSI escape prefix in text
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(\\u001[Bb]|\\x1[Bb]|\\033|\x1B)\['
    case_insensitive: true

# The CSI introducer is part of the matcher, not a separate proximity leg: the
# final byte alone ("[K", "[J") is Python/JS subscript syntax (`attr[k]`, `d[j]`)
# and matched every indexing expression in existence. Parameter bytes cover the
# selective forms (ESC[0K erase-to-end, ESC[2K erase-line, ESC[1J, ESC[2J).
- id: ansi-erase-op
  desc: ANSI erase-line/erase-screen sequence
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '(\\u001[Bb]|\\x1[Bb]|\\033|\x1B)\[[0-9;]*[KJ]'
    case_insensitive: true
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
