defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: cli-menu-case-gets
    desc: CLI interactive menu
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: case.{0,50}gets
  - id: cli-menu-when-number
    desc: CLI interactive menu
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: \bwhen\s+[0-9]+\b
  - id: cli-menu-select
    desc: CLI interactive menu
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: menu.{0,50}select
  - id: user-input-loop
    desc: User input processing loop
    crit: notable
    conf: 0.65
    if:
      type: string_literal
      regex: gets\.chomp|input.{0,50}=.{0,50}gets|while.{0,50}gets
  - id: option-selection
    desc: Option selection interface
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \[1\].{0,50}\[2\].{0,50}\[3\]|option.{0,50}1.{0,50}2.{0,50}3|Enter.{0,50}choice
  - id: cli-clear-screen
    desc: CLI clear screen command
    crit: notable
    conf: 0.4
    if:
      type: string_literal
      regex: system.{0,50}clear|system.{0,50}'clear'|system.{0,50}"clear"|system.{0,50}cls
composite_rules:
  - id: interactive-cli-tool
    desc: Interactive command-line tool
    crit: notable
    conf: 0.75
    needs: 2
    any:
      - id: micro-behaviors/ui/terminal
