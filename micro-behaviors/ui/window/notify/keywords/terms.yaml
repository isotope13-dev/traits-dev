---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: notification-alert-word
  desc: Notification/alert UI vocabulary term
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)\\bnotifications?\\b|\\balerts\\b|通知"
- id: notification-config-word
  desc: Notification-related notify or sender keyword
  crit: component
  conf: 0.86
  if:
    type: text
    regex: "(?i)\\b(notify|sender)\\b|推送"
