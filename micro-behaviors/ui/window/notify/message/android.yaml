defaults:
  platforms: [android]
  for: [java, kotlin]
  crit: notable
  conf: 0.88

traits:
  - id: android-notification-builder
    desc: Android notification builder
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      word: NotificationCompat

  - id: android-notification-action
    desc: Android notification action button
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      regex: '(?s)NotificationCompat.{0,500}\baddAction\s*\('

  - id: android-notification-pending-activity
    desc: Android notification pending activity
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      regex: 'PendingIntent[\s\S]{0,160}\bgetActivity\b'

  - id: android-notification-html-render
    desc: Android notification renders HTML
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      regex: '\bHtml\s*\.\s*fromHtml\s*\('

  - id: android-notification-remote-image
    desc: Android notification downloads image
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    if:
      type: text
      regex: 'URL\s*\(.{0,40}\)\s*\.\s*openConnection\s*\([\s\S]{0,480}BigPictureStyle'

composite_rules:
  - id: android-rich-notification-actions
    desc: Android rich notification actions
    crit: notable
    conf: 0.9
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    all:
      - id: android-notification-builder
      - id: android-notification-action
      - id: android-notification-pending-activity

  - id: android-notification-action-routing
    desc: Android rich notification action routes an intent or URI
    crit: notable
    conf: 0.9
    all:
      - id: android-rich-notification-actions
      - id: micro-behaviors/os/message/intent::android-intent-extra-routing
    any:
      - id: micro-behaviors/os/message/intent::android-uri-start-activity
      - id: micro-behaviors/os/clipboard/access::set-primary-clip
