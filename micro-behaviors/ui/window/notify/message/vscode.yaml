defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: show-information-message
    desc: VSCode information notification
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '(vscode\.window\.)?showInformationMessage\s*\('
  - id: show-error-message
    desc: VSCode error notification
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '(vscode\.window\.)?showErrorMessage\s*\('
