defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: shell-change-notify
    desc: Notify shell of file changes
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "SHChangeNotify"
  - id: shell-notify-icon
    desc: System tray icon manipulation
    crit: notable
    conf: 0.82
    attack: T1036
    if:
      type: symbol
      regex: "Shell_NotifyIcon[AW]"
  - id: winforms-notifyicon-balloon
    desc: Windows Forms notification balloon
    crit: notable
    conf: 0.86
    for: [python, powershell, csharp, source, scripts]
    if:
      type: text
      regex: 'System\.Windows\.Forms\.NotifyIcon|ShowBalloonTip\s*\('
