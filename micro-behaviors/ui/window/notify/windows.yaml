defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: shell-change-notify
    desc: Notify shell of file changes
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "SHChangeNotify"
  - id: shell-change-notify-register
    desc: Register for shell change events
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: "SHChangeNotifyRegister"
  - id: shell-change-notification-lock
    desc: Lock shell change notification
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: "SHChangeNotification_Lock"
  - id: shell-change-notification-unlock
    desc: Unlock shell change notification
    crit: baseline
    conf: 0.82
    if:
      type: symbol
      exact: "SHChangeNotification_Unlock"
  - id: shell-notify-icon
    desc: System tray icon manipulation
    crit: baseline
    conf: 0.82
    attack: T1036
    if:
      type: symbol
      regex: "Shell_NotifyIcon[AW]"
composite_rules:
  - id: shell-change-notification-lifecycle
    desc: Shell change notification lock lifecycle
    crit: notable
    conf: 0.88
    all:
      - id: shell-change-notification-lock
      - id: shell-change-notification-unlock
  - id: explorer-shell-change-watch
    desc: Explorer shell change watcher registration
    crit: notable
    conf: 0.9
    all:
      - id: shell-change-notify-register
    any:
      - id: shell-change-notify
      - id: shell-change-notification-lifecycle
