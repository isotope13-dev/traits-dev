defaults:
  platforms: [android, unix, windows]
  for: [java, kotlin, class, jar]
  crit: notable
  conf: 0.92

traits:
  - id: java-awt-headless-property
    desc: Java AWT headless property reference
    for: [java, kotlin]
    if:
      type: text
      substr: java.awt.headless

  - id: java-awt-headless-property-bytecode
    desc: Java bytecode AWT headless property reference
    for: [class, jar]
    if:
      type: hex
      pattern: 6A 61 76 61 2E 61 77 74 2E 68 65 61 64 6C 65 73 73
