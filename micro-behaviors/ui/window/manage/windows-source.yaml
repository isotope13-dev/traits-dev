defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: register-window-message-source
    desc: Register custom window message
    crit: baseline
    conf: 0.9
    if:
      type: raw
      word: RegisterWindowMessage
  - id: create-window-ex-source
    desc: Create Win32 window in source
    crit: baseline
    conf: 0.88
    if:
      type: raw
      word: CreateWindowEx
  - id: send-message-source
    desc: Send Win32 window message
    crit: baseline
    conf: 0.88
    if:
      type: raw
      word: SendMessage
  - id: def-window-proc-source
    desc: Default window procedure dispatch
    crit: baseline
    conf: 0.84
    if:
      type: raw
      word: DefWindowProc
  - id: hwnd-broadcast-source
    desc: Broadcast window message target
    crit: component
    conf: 0.85
    if:
      type: raw
      word: HWND_BROADCAST
  - id: wm-copydata-source
    desc: WM_COPYDATA message handler
    crit: notable
    conf: 0.94
    if:
      type: raw
      word: WM_COPYDATA
  - id: copydata-struct-source
    desc: COPYDATASTRUCT IPC buffer
    crit: notable
    conf: 0.93
    if:
      type: raw
      word: COPYDATASTRUCT
composite_rules:
  - id: window-message-ipc-source
    desc: Win32 window message IPC
    crit: notable
    conf: 0.95
    all:
      - id: send-message-source
      - id: wm-copydata-source
      - id: copydata-struct-source
    any:
      - id: register-window-message-source
      - id: create-window-ex-source
      - id: def-window-proc-source
      - id: hwnd-broadcast-source
