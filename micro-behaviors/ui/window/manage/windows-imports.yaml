defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: enum-desktop-windows-import
    desc: Enumerate desktop windows
    crit: baseline
    conf: 0.86
    if:
      type: string_value
      exact: "EnumDesktopWindows"
  - id: enum-child-windows-import
    desc: Enumerate child windows
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: "EnumChildWindows"
  - id: create-desktop-import
    desc: Create alternate desktop
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: "CreateDesktopA"
  - id: enum-windows
    desc: Enumerate top-level windows
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: "EnumWindows"
  - id: get-window-thread-process-id
    desc: Get window thread and process ID
    crit: notable
    conf: 0.85
    if:
      type: string_value
      exact: "GetWindowThreadProcessId"
  - id: set-cursor-pos-import
    desc: Move cursor position
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      exact: "SetCursorPos"
composite_rules:
  - id: desktop-window-enumeration
    desc: Enumerate desktop window state
    crit: baseline
    conf: 0.9
    all:
      - id: enum-desktop-windows-import
      - id: micro-behaviors/ui/window/manage::get-window-text
    any:
      - id: set-cursor-pos-import
  - id: alternate-desktop-window-control
    desc: Alternate desktop window control
    crit: suspicious
    conf: 0.92
    all:
      - id: create-desktop-import
      - id: desktop-window-enumeration
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/format::many-exports
        - id: metadata/quality/versioning::pe-version-resource
