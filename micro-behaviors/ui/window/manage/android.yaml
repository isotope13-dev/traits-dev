defaults:
  platforms: [android]
  for: [apk]
  crit: notable
  conf: 0.86

traits:
  - id: system-ui-visibility
    desc: Android system UI visibility control
    if:
      type: text
      exact: setSystemUiVisibility

  - id: input-method-manager
    desc: Android input method manager
    if:
      type: text
      exact: "Landroid/view/inputmethod/InputMethodManager;"

  - id: toggle-soft-input
    desc: Toggles Android soft input
    if:
      type: text
      exact: toggleSoftInput

composite_rules:
  - id: android-kiosk-ui-control
    desc: Android kiosk UI control
    crit: suspicious
    conf: 0.9
    all:
      - id: system-ui-visibility
    any:
      - id: input-method-manager
      - id: toggle-soft-input
