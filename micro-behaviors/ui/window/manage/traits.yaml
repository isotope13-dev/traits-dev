defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: register-class
    desc: Register window class
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^RegisterClass(Ex)?[AW]$
  - id: get-class-info
    desc: Get window class information
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetClassInfoW
  - id: create-window-ex
    desc: Create window (extended)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^CreateWindowEx[AW]$
  - id: destroy-window
    desc: Destroy window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: DestroyWindow
  - id: show-window
    desc: Show or hide window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ShowWindow
  - id: set-window-pos
    desc: Change window position/size
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetWindowPos
  - id: set-foreground-window
    desc: Bring window to foreground
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetForegroundWindow
  - id: get-foreground-window
    desc: Query current foreground window
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: GetForegroundWindow
  - id: is-window
    desc: Check if window exists
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: IsWindow
  - id: is-window-visible
    desc: Check if window is visible
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: IsWindowVisible
  - id: get-window-rect
    desc: Get window rectangle
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetWindowRect
  - id: screen-to-client
    desc: Convert screen to client coordinates
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ScreenToClient
  - id: set-window-text
    desc: Set window title/text
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetWindowTextW
  - id: get-window-text
    desc: Read active window title text
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      regex: ^GetWindowText[AW]?$
  - id: get-window-text-length
    desc: Query active window title length
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      regex: ^GetWindowTextLength[AW]?$
  - id: get-window-long
    desc: Get window data
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetWindowLongW
  - id: set-window-long
    desc: Set window data
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetWindowLongW
  - id: set-class-long
    desc: Set window class data
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetClassLongW
  - id: is-window-enabled
    desc: Check if window is enabled
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: IsWindowEnabled
  - id: enable-window
    desc: Enable/disable window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: EnableWindow
  - id: invalidate-rect
    desc: Invalidate window region
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: InvalidateRect
  - id: set-window-rgn
    desc: Apply shaped window region
    crit: baseline
    conf: 0.78
    if:
      type: text
      exact: SetWindowRgn
  - id: create-rect-rgn
    desc: Create rectangular GDI region
    crit: baseline
    conf: 0.74
    if:
      type: text
      exact: CreateRectRgn
  - id: combine-rgn
    desc: Combine GDI regions
    crit: baseline
    conf: 0.74
    if:
      type: text
      exact: CombineRgn
  - id: find-window-ex
    desc: Find window by class/title
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: FindWindowExW
  - id: send-message
    desc: Send message to window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SendMessageW
  - id: send-message-a
    desc: Send message to window (ANSI)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SendMessageA
  - id: send-message-timeout
    desc: Send message with timeout
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SendMessageTimeoutW
  - id: dispatch-message
    desc: Dispatch window message
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: DispatchMessageW
  - id: set-timer
    desc: Create window timer
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetTimer
  - id: kill-timer
    desc: Destroy window timer
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: KillTimer
  - id: get-dc
    desc: Get device context
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetDC
  - id: get-window-dc
    desc: Get window device context
    crit: baseline
    conf: 0.75
    if:
      type: text
      exact: GetWindowDC
  - id: release-dc
    desc: Release device context
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ReleaseDC
  - id: call-window-proc
    desc: Call window procedure
    crit: baseline
    conf: 0.88
    attack: T1106
    if:
      type: text
      exact: CallWindowProcW
  - id: def-window-proc
    desc: Default window procedure
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: DefWindowProcW
  - id: post-quit-message
    desc: Post quit message
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: PostQuitMessage
  - id: get-message-pos
    desc: Get message cursor position
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetMessagePos
  - id: char-next
    desc: Move to next character
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: CharNextW
  - id: char-prev
    desc: Move to previous character
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: CharPrevW
  - id: exit-windows-ex
    desc: Shutdown/restart system
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: ExitWindowsEx
composite_rules:
  - id: window-region-shaping
    desc: Shape window with GDI regions
    crit: notable
    conf: 0.86
    all:
      - id: set-window-rgn
      - id: create-rect-rgn
      - id: combine-rgn
