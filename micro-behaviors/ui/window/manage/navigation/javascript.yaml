defaults:
  platforms: [windows, unix]
  for: [javascript, html]
  crit: notable
  conf: 0.9

traits:
- id: discord-authenticated-route-navigation
  desc: Navigates to Discord authenticated route
  for: [javascript, typescript]
  conf: 0.98
  if:
    type: literal
    substr: 'https://discord.com/channels/@me'
- id: browser-meta-refresh-external-url
  desc: Browser meta refresh to external URL
  # Meta refresh is a neutral browser-navigation mechanism. Phishing and
  # SSRF composites add page or endpoint evidence before inferring intent.
  if:
    type: text
    regex: '(?i)http-equiv=["'']refresh["''].{0,80}\burl=https?://'
  unless:
  - id: metadata/library/microsoft-auth::microsoft-live-auth-runtime-context
  - id: metadata/library/microsoft-auth::microsoft-oauth-error-relay-context
  - id: metadata/package/testing/presence/harness::test-directory-path
