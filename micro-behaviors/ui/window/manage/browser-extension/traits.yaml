defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: chrome-tabs-api
    desc: Chrome tabs API usage
    if:
      type: text
      regex: 'chrome\.tabs\.[A-Za-z_]'

  - id: chrome-runtime-api
    desc: Chrome runtime API usage
    if:
      type: text
      regex: 'chrome\.runtime\.[A-Za-z_]'

  - id: chrome-storage-api
    desc: Chrome storage API usage
    if:
      type: text
      regex: 'chrome\.storage\.[A-Za-z_]'

  - id: chrome-webrequest-api
    desc: Chrome webRequest API usage
    if:
      type: text
      regex: 'chrome\.webRequest\.[A-Za-z_]'

  - id: chrome-scripting-api
    desc: Chrome scripting API usage
    if:
      type: text
      regex: 'chrome\.scripting\.[A-Za-z_]'

  - id: chrome-tabs-create
    desc: Chrome tab creation
    if:
      type: ast
      kind: call
      regex: 'chrome\.tabs\.create|tabs\.create\('

  - id: chrome-tabs-query
    desc: Chrome tabs query
    crit: baseline
    if:
      type: text
      substr: tabs.query(

  - id: chrome-tabs-update
    desc: Chrome tab update
    crit: baseline
    if:
      type: ast
      kind: call
      regex: 'chrome\.tabs\.update|tabs\.update\('

  - id: chrome-runtime-get-url
    desc: Chrome runtime resource URL
    crit: baseline
    if:
      type: ast
      kind: call
      regex: 'chrome\.runtime\.getURL|runtime\.getURL\('

  - id: chrome-runtime-send-message
    desc: Chrome runtime message send
    crit: baseline
    if:
      type: text
      regex: 'chrome\.runtime\.sendMessage|runtime\.sendMessage'

  - id: chrome-runtime-on-message
    desc: Chrome runtime message listener
    crit: baseline
    if:
      type: text
      regex: '(chrome\.)?runtime\.onMessage(\.addListener)?'

  - id: chrome-runtime-on-installed
    desc: Chrome runtime install listener
    crit: baseline
    if:
      type: ast
      kind: call
      regex: 'chrome\.runtime\.onInstalled|onInstalled\.addListener'

  - id: chrome-runtime-on-message-external
    desc: Chrome external message listener
    if:
      type: text
      regex: '(chrome\.)?runtime\.onMessageExternal(\.addListener)?'

  - id: chrome-storage-local
    desc: Chrome local storage access
    crit: baseline
    if:
      type: text
      substr: storage.local.

  - id: chrome-storage-session
    desc: Chrome session storage access
    crit: baseline
    if:
      type: text
      substr: storage.session.

  - id: chrome-storage-sync
    desc: Chrome synced storage access
    crit: baseline
    if:
      type: text
      substr: storage.sync.

  - id: chrome-alarms-create
    desc: Chrome alarm creation
    if:
      type: ast
      kind: call
      regex: '(chrome|browser)\.alarms\.create|alarms\.create\('

  - id: chrome-alarms-on-alarm
    desc: Chrome alarm event listener
    if:
      type: ast
      kind: call
      regex: '(chrome|browser)\.alarms\.onAlarm\.addListener|alarms\.onAlarm\.addListener'

  - id: chrome-action-click-listener
    desc: Chrome action click listener
    crit: baseline
    if:
      type: text
      substr: chrome.action.onClicked.addListener

  - id: static-https-tab-opener
    desc: Opens fixed HTTPS tab
    crit: baseline
    if:
      type: text
      regex: 'chrome\.tabs\.create\([^)]{0,180}https://'

composite_rules:
  - id: extension-page-script-injection
    desc: Extension injects page script
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-create-script-element
      - id: chrome-runtime-get-url
  - id: steam-trade-extension-automation
    desc: Steam trade extension automation
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/services/steam
      - id: chrome-runtime-send-message
    any:
      - id: micro-behaviors/ui/window/manage/dom
