defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.86

traits:
  - id: floating-window-layouts
    desc: Android floating overlay layouts
    crit: component
    conf: 0.86
    count_min: 2
    if:
      type: text
      regex: "res/layout/(block_|tourch_)?floating_window\\.xml"
      offset_range: [-262144, null]

  - id: system-ui-visibility
    desc: Android system UI visibility control
    if:
      type: text
      exact: setSystemUiVisibility

  - id: immersive-system-ui-flags
    desc: Android immersive or nav-hiding UI flags
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "SYSTEM_UI_FLAG_(IMMERSIVE_STICKY|HIDE_NAVIGATION|FULLSCREEN)"

  - id: lock-task-start
    desc: Starts Android lock-task mode
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: startLockTask

  - id: lock-task-package-policy
    desc: Configures Android lock-task packages
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: setLockTaskPackages

  - id: input-method-manager
    desc: Android input method manager
    if:
      type: text
      exact: "Landroid/view/inputmethod/InputMethodManager;"

  - id: toggle-soft-input
    desc: Toggles Android soft input
    if:
      type: text
      exact: toggleSoftInput

  - id: window-manager-reference
    desc: Android WindowManager reference
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "Landroid/view/WindowManager;"

  - id: window-layoutparams-reference
    desc: Android window LayoutParams reference
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "Landroid/view/WindowManager$LayoutParams;"

  - id: manage-overlay-permission-intent
    desc: Requests Android overlay settings
    crit: notable
    conf: 0.9
    attack: T1411
    if:
      type: text
      exact: "android.settings.action.MANAGE_OVERLAY_PERMISSION"

  - id: can-draw-overlays-check
    desc: Checks Android overlay grant
    crit: notable
    conf: 0.9
    attack: T1411
    if:
      type: text
      exact: canDrawOverlays

  - id: window-manager-add-view
    desc: Adds Android managed view
    crit: component
    conf: 0.86
    if:
      type: text
      exact: addView

composite_rules:
  - id: kiosk-ui-control
    desc: Android system UI combined with kiosk lock-task controls
    crit: suspicious
    conf: 0.9
    all:
      - id: system-ui-visibility
    any:
      - id: immersive-system-ui-flags
      - id: lock-task-start
      - id: lock-task-package-policy

  - id: runtime-overlay-window
    desc: Android runtime overlay window
    crit: suspicious
    conf: 0.93
    attack: T1411
    all:
      - id: micro-behaviors/os/privilege/manifest::system-alert-window
      - id: manage-overlay-permission-intent
      - id: can-draw-overlays-check
      - id: window-manager-reference
    any:
      - id: window-layoutparams-reference
      - id: window-manager-add-view
