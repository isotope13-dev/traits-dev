# Programmatic reloading of the current document. Neutral: dashboards, kiosk
# displays and session-refresh flows all reload on a timer. Objective
# composites supply intent — e.g. reloading against a bot-block interstitial
# until the block lifts.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: timed-page-reload
    desc: Reloads the page on a timer
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'setInterval\([\s\S]{0,160}location\.reload\(\)'
