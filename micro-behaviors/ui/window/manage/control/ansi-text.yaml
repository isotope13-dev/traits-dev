defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: user32-module-string
  desc: user32 module name string in code section
  crit: baseline
  conf: 0.9
  if:
    type: text
    exact: user32
    section: ".text"
- id: set-layered-window-attributes
  desc: SetLayeredWindowAttributes layered-window opacity API string
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: SetLayeredWindowAttribu(tes|ces)
    section: ".text"
- id: get-window-long-ansi
  desc: GetWindowLongA ANSI window-style query API string
  crit: notable
  conf: 0.9
  if:
    type: text
    exact: GetWindowLongA
    section: ".text"
- id: set-window-long-ansi
  desc: SetWindowLongA ANSI window-style update API string
  crit: notable
  conf: 0.9
  if:
    type: text
    exact: SetWindowLongA
    section: ".text"
