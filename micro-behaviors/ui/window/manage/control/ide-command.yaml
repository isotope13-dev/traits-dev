defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.95

traits:
  - id: cursor-composer-command
    desc: Cursor Composer command invocation
    if:
      type: literal
      kind: string
      regex: '^composer\.(newAgentChat|closeComposerTab|openComposer)'

  - id: windsurf-chat-command
    desc: Windsurf Cascade chat command
    if:
      type: literal
      kind: string
      substr: "windsurf.prioritized.chat"

  - id: kiro-agent-command
    desc: Kiro Agent command invocation
    if:
      type: literal
      kind: string
      substr: "kiroAgent."

composite_rules:
  - id: cross-ide-ai-command-routing
    desc: Cross-IDE AI command routing
    crit: notable
    conf: 0.92
    scope: leaf
    needs: 2
    any:
      - id: cursor-composer-command
      - id: windsurf-chat-command
      - id: kiro-agent-command
