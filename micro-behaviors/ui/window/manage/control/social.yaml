defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: social-engagement-button-click
    desc: Programmatic like, bookmark, or follow click
    if:
      type: text
      # Retweet controls are also clicked by legitimate quote/repost helpers
      # to open a menu after the user asks for that action.  The direct
      # like/bookmark/follow actions are the stable automation signal.
      regex: 'data-testid=["''](like|bookmark|follow)["''][\s\S]{0,200}\.click\s*\('
