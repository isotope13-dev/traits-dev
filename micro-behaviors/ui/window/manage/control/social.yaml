defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: social-engagement-button-click
    desc: Programmatic like, bookmark, or follow click
    if:
      type: text
      # Retweet controls are also clicked by legitimate quote/repost helpers
      # to open a menu after the user asks for that action.  The direct
      # like/bookmark/follow actions are the stable automation signal.
      regex: 'data-testid=["''](like|bookmark|follow)["''][\s\S]{0,200}\.click\s*\('

  - id: social-invitation-label-english
    desc: Social invitation label in English
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      exact: Invite

  - id: social-invitation-label-french
    desc: Social invitation label in French
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      exact: Inviter

  - id: social-invitation-label-spanish
    desc: Social invitation label in Spanish
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      exact: Invitar

  - id: social-invitation-button-selection
    desc: Selects buttons by visible invitation label
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(innerText|aria-label)[\s\S]{0,220}includes\s*\(\s*(text|label)\b'

  - id: social-scroll-click-loop
    desc: Scrolls elements before programmatic clicks
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'scrollIntoView\s*\([\s\S]{0,900}\.click\s*\('

  - id: social-bulk-invitation-limit
    desc: High invitation action limit
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(limiteMax|invitationLimit|inviteLimit|maxInvites)\s*=\s*9{4,}'
