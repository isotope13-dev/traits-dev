defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: register-class
    desc: Register window class
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      regex: ^RegisterClass(Ex)?[AW]$
  - id: get-class-info
    desc: Get window class information
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetClassInfoW
  - id: create-window-ex
    desc: Create window (extended)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: ^CreateWindowEx[AW]$
    downgrade:
      any:
        - id: metadata/binary/metrics/threshold::many-imports-50
        - id: metadata/binary/framework::dotnet-metadata
  - id: destroy-window
    desc: Destroy window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: DestroyWindow
  - id: show-window
    desc: Show or hide window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ShowWindow
  - id: set-window-pos
    desc: Change window position/size
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetWindowPos
  - id: set-window-pos-source
    desc: Change window position/size in source
    crit: baseline
    conf: 0.72
    for:
      - csharp
    if:
      type: symbol
      kind: call
      exact: SetWindowPos
  - id: set-parent-api
    desc: Reparent window via SetParent
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: SetParent
  - id: set-foreground-window
    desc: Bring window to foreground
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetForegroundWindow
  - id: get-foreground-window
    desc: Query current foreground window
    crit: baseline
    conf: 0.8
    for:
      - pe
      - dll
      - go
    if:
      type: import
      exact: GetForegroundWindow
  - id: get-foreground-window-pinvoke
    desc: .NET foreground window API entrypoint
    crit: baseline
    conf: 0.86
    ref: sha256:102dd32a30d7a0cf86955e6045e0426a26dfef393ce946d49c006d19c4c036e9
    if:
      type: text
      exact: GetForegroundWindow
  - id: get-foreground-window-source
    desc: Source queries the foreground window
    crit: baseline
    conf: 0.84
    for: [javascript, typescript, python, powershell]
    if:
      type: text
      word: GetForegroundWindow
  - id: is-window
    desc: Check if window exists
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: IsWindow
  - id: is-window-visible
    desc: Check if window is visible
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: IsWindowVisible
  - id: get-window-rect
    desc: Get window rectangle
    crit: baseline
    conf: 0.7
    if:
      type: import
      exact: GetWindowRect
  - id: get-window-rect-pinvoke
    desc: .NET window rectangle API entrypoint
    crit: baseline
    conf: 0.84
    ref: sha256:102dd32a30d7a0cf86955e6045e0426a26dfef393ce946d49c006d19c4c036e9
    if:
      type: text
      exact: GetWindowRect
  - id: screen-to-client
    desc: Convert screen to client coordinates
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ScreenToClient
  - id: set-window-text
    desc: Set window title/text
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetWindowTextW
  - id: get-window-text
    desc: Read active window title text
    crit: baseline
    conf: 0.8
    for:
      - pe
      - dll
      - go
    if:
      type: import
      regex: ^GetWindowText[AW]?$
  - id: get-window-text-length
    desc: Query active window title length
    crit: baseline
    conf: 0.75
    for:
      - pe
      - dll
      - go
    if:
      type: symbol
      regex: ^GetWindowTextLength[AW]?$
  - id: get-window-long
    desc: Get window data
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetWindowLongW
  - id: set-window-long
    desc: Set window data
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetWindowLongW
  - id: set-class-long
    desc: Set window class data
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetClassLongW
  - id: is-window-enabled
    desc: Check if window is enabled
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: IsWindowEnabled
  - id: enable-window
    desc: Enable/disable window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: EnableWindow
  - id: invalidate-rect
    desc: Invalidate window region
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: InvalidateRect
  - id: set-window-rgn
    desc: Apply shaped window region
    crit: baseline
    conf: 0.78
    if:
      type: text
      exact: SetWindowRgn
  - id: set-window-display-affinity
    desc: Set display affinity for a window
    crit: baseline
    conf: 0.82
    for: [pe, dll, csharp, javascript, typescript]
    if:
      type: text
      word: SetWindowDisplayAffinity
  - id: wda-exclude-from-capture
    desc: Window display affinity excludes capture
    crit: component
    conf: 0.88
    for: [pe, dll, csharp, javascript, typescript]
    if:
      type: text
      word: WDA_EXCLUDEFROMCAPTURE
  - id: create-rect-rgn
    desc: Create rectangular GDI region
    crit: baseline
    conf: 0.74
    if:
      type: text
      exact: CreateRectRgn
  - id: combine-rgn
    desc: Combine GDI regions
    crit: baseline
    conf: 0.74
    if:
      type: text
      exact: CombineRgn
  - id: find-window-ex
    desc: Find window by class/title
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: FindWindowExW
  - id: find-window-a-import
    desc: Find window by class/title (ANSI)
    crit: baseline
    conf: 0.75
    if:
      type: import
      exact: FindWindowA
  - id: find-window-w-import
    desc: Find window by class/title (Wide)
    crit: baseline
    conf: 0.75
    if:
      type: import
      exact: FindWindowW
  - id: send-message
    desc: Send message to window
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SendMessageW
  - id: send-message-a
    desc: Send message to window (ANSI)
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SendMessageA
  - id: send-message-timeout
    desc: Send message with timeout
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SendMessageTimeoutW
  - id: dispatch-message
    desc: Dispatch window message
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: DispatchMessageW
  - id: set-timer
    desc: Create window timer
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: SetTimer
  - id: kill-timer
    desc: Destroy window timer
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: KillTimer
  - id: get-dc
    desc: Get device context
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetDC
  - id: get-window-dc
    desc: Get window device context
    crit: baseline
    conf: 0.75
    if:
      type: text
      exact: GetWindowDC
  - id: release-dc
    desc: Release device context
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: ReleaseDC
  - id: call-window-proc
    desc: Call window procedure
    crit: baseline
    conf: 0.88
    attack: T1106
    if:
      type: text
      regex: ^CallWindowProc[AW]$
  - id: def-window-proc
    desc: Default window procedure
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: DefWindowProcW
  - id: post-quit-message
    desc: Post quit message
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: PostQuitMessage
  - id: get-message-pos
    desc: Get message cursor position
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetMessagePos
  - id: get-message-time
    desc: Read the current Windows message time
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: GetMessageTime
  - id: char-next
    desc: Move to next character
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: CharNextW
  - id: char-prev
    desc: Move to previous character
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: CharPrevW
  - id: exit-windows-ex
    desc: Shutdown/restart system
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: ExitWindowsEx
  - id: ui-automation-from-handle
    desc: UI automation lookup from window handle
    crit: baseline
    conf: 0.82
    for: [pe, dll, csharp, powershell]
    if:
      type: text
      word: AutomationElement.FromHandle
  - id: python-ui-automation-library
    desc: Python imports Windows UI Automation
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?i)\bimport\s+uiautomation\b|\bfrom\s+uiautomation\b'
  - id: python-ui-automation-text-read
    desc: Python reads text through UI Automation
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: '(?i)\b(GetFocusedControl|GetForegroundControl|GetTextPattern|GetChildren)\s*\('
  - id: python-ui-automation-text-property
    desc: Python reads a UI Automation text property
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?i)\bTextPattern\.Current\.(Text|DocumentRange)\b'
  - id: powershell-ui-automation-from-handle
    desc: PowerShell gets a UI Automation element
    crit: notable
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: 'AutomationElement\]\s*::\s*FromHandle'
  - id: ui-automation-controltype-edit
    desc: Windows UI Automation edit control selector
    crit: baseline
    conf: 0.8
    for: [pe, dll, csharp]
    if:
      type: text
      word: ControlType.Edit
  - id: ui-automation-valuepattern-value
    desc: Windows UI Automation value pattern read
    crit: baseline
    conf: 0.82
    for: [pe, dll, csharp]
    if:
      type: text
      word: ValuePattern.Current.Value
  - id: powershell-ui-automation-text-read
    desc: PowerShell reads a UI Automation text pattern
    crit: notable
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: '(?i)\b(DocumentRange\s*\.\s*GetText|TextPattern\]\s*::\s*Pattern)\b'
composite_rules:
  - id: window-region-shaping
    desc: Shape window with GDI regions
    crit: notable
    conf: 0.86
    all:
      - id: set-window-rgn
      - id: create-rect-rgn
      - id: combine-rgn
  - id: window-anti-capture-affinity
    desc: Window excluded from screen capture through display affinity
    crit: notable
    conf: 0.9
    for: [pe, dll, csharp, javascript, typescript]
    all:
      - id: set-window-display-affinity
      - id: wda-exclude-from-capture
  - id: ui-automation-edit-value-read
    desc: Read UI Automation edit-control values from a foreground window
    crit: notable
    conf: 0.88
    all:
      - id: ui-automation-from-handle
      - id: ui-automation-controltype-edit
      - id: ui-automation-valuepattern-value
  - id: python-ui-automation-text-read-flow
    desc: Python reads another window through UI Automation
    crit: notable
    conf: 0.94
    for: [python]
    all:
      - id: python-ui-automation-library
      - id: python-ui-automation-text-read
      - id: python-ui-automation-text-property
  - id: powershell-ui-automation-text-read-flow
    desc: PowerShell reads another window through UI Automation
    crit: notable
    conf: 0.94
    for: [powershell]
    all:
      - id: powershell-ui-automation-from-handle
      - id: powershell-ui-automation-text-read
