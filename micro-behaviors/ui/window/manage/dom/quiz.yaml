defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: textarea-batch-value-collection
    desc: Collects multiple textarea values from page
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'querySelectorAll\(\s*["'']textarea["'']\s*\)[\s\S]{0,700}\b[a-zA-Z_$][\w$]*\[\d+\]\.value'

  - id: student-learner-dom-selector-collection
    desc: Selects student/learner DOM fields
    crit: notable
    conf: 0.91
    count_min: 3
    if:
      type: text
      regex: 'querySelector(All)?\([^)]{0,120}\b(student|learner)\b'
      case_insensitive: true

  - id: quiz-question-dom-selectors
    desc: Extracts quiz question DOM text
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    if:
      type: text
      regex: 'querySelector(All)?\(.{0,120}(question-prompt|mc-quiz-question)'

  - id: quiz-answer-dom-selectors
    desc: Extracts quiz answer DOM text
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    if:
      type: text
      substr: mc-quiz-answer--answer-body

  - id: quiz-check-answer-hook
    desc: Hooks quiz check-answer button
    crit: suspicious
    conf: 0.94
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    if:
      type: text
      substr: 'data-purpose="check-answer"'

  - id: quiz-correct-answer-state
    desc: Reads quiz correct-answer state
    crit: suspicious
    conf: 0.94
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    if:
      type: text
      substr: correct_choice_summary

composite_rules:
  - id: quiz-question-answer-extraction
    desc: Extracts quiz question and answer choices
    crit: suspicious
    conf: 0.96
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    all:
      - id: quiz-question-dom-selectors
      - id: quiz-answer-dom-selectors

  - id: quiz-answer-assistance-state
    desc: Tracks quiz answers for assistance
    crit: suspicious
    conf: 0.96
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    all:
      - id: quiz-question-answer-extraction
      - id: quiz-correct-answer-state
    any:
      - id: quiz-check-answer-hook
