defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]

traits:
  - id: email-input-field
    desc: Email input form field
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'type\s*=\s*["'']email["'']'

  - id: password-input-field
    desc: HTML password input form field
    crit: notable
    conf: 0.82
    for: [html]
    if:
      type: text
      regex: 'type\s*=\s*["'']password["'']'

  - id: signin-submit-label
    desc: Sign-in submit label
    crit: baseline
    conf: 0.78
    if:
      type: string_literal
      substr: Sign in

  # A paired email/password identifier is a login-form implementation detail,
  # not evidence that the form is fraudulent.  Phishing composites add the
  # branding, lure, or anti-analysis context that supplies that intent.
  - id: js-paired-email-password-identifiers
    desc: Pairs JS email/password input identifiers
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'emailInput.{0,400}passwordInput|passwordInput.{0,400}emailInput'

  - id: session-sign-in-required-message
    desc: Session sign-in required message
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: Please sign in again to continue
