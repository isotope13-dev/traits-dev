defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html, -kotlin]
  crit: notable
  conf: 0.82

traits:
- id: browser-document-write
  desc: Writes HTML into document
  conf: 0.78
  if:
    type: symbol
    exact: document.write
- id: browser-empty-document-write
  desc: Empty document.write call
  conf: 0.82
  if:
    type: text
    regex: document\.write\(\s*['"]{2}\s*\)
- id: browser-document-open-alias
  desc: Aliased document open reference
  crit: suspicious
  conf: 0.88
  ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
  if:
    type: text
    regex: '(?s)=\s*document\s*;.{0,220}\.open\s*;'
- id: browser-document-write-close-alias
  desc: Aliased document write close
  crit: suspicious
  conf: 0.88
  ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
  if:
    type: text
    regex: '(?s)\.write\s*;.{0,140}\.close\s*;'
- id: browser-aliased-call-invocation
  desc: Aliased browser method call
  crit: notable
  conf: 0.84
  ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
  if:
    type: text
    regex: '\.call\s*\([^)]{0,120}\)'
- id: browser-create-element
  desc: Creates DOM element
  conf: 0.82
  if:
    type: symbol
    exact: createElement
- id: browser-create-script-element
  desc: Creates script DOM element
  conf: 0.84
  if:
    type: text
    regex: 'createElement\(\s*[''"]script[''"]\s*\)'
  unless:
  - id: metadata/document/html/
  - id: metadata/library/jquery/
- id: browser-create-iframe-element
    # Relocated from objectives/impact/ui/delivery::create-iframe-element —
    # creating an iframe element is a neutral DOM capability (embeds, sandboxes,
    # widgets); clickjacking intent lives in the iframe-overlay-mask composite.
  desc: Creates iframe DOM element
  conf: 0.84
  if:
    type: text
    regex: 'document\.[A-Za-z_$][\w$]*\([''"]iframe[''"]\)'
- id: browser-create-form-element
  desc: Creates form DOM element
  conf: 0.82
  if:
    type: text
    regex: createElement\(['"]form['"]\)
  unless:
  - id: metadata/library/jquery
  - id: metadata/document/html/
- id: browser-iframe-element
  desc: References iframe DOM element
  conf: 0.78
  if:
    type: text
    substr: iframe
  unless:
  - type: text
    substr: '"sourcesContent":'
  - id: well-known/lib/marked/
  - id: metadata/library/jquery/
  - id: metadata/document/html/
- id: browser-enumerates-page-images
  desc: Enumerates page image elements
  conf: 0.9
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  if:
    type: symbol
    kind: call
    exact: document.querySelectorAll
    arg:
      kind: string
      regex: '^img$'
- id: browser-script-insert-adjacent
  desc: Inserts script adjacent to element
  conf: 0.86
  if:
    type: symbol
    exact: script.insertAdjacentElement
- id: browser-window-open
  desc: Opens browser window or tab
  conf: 0.8
  if:
    type: symbol
    exact: window.open
- id: browser-window-move
  desc: Moves browser window
  conf: 0.82
  if:
    type: symbol
    kind: call
    exact: window.moveTo
- id: browser-window-focus
  desc: Focuses browser window
  conf: 0.82
  if:
    type: symbol
    kind: call
    exact: window.focus
- id: browser-window-stop
  desc: Stops browser page loading
  conf: 0.82
  if:
    type: symbol
    kind: call
    exact: window.stop
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-link-href-assignment
  desc: Assigns browser link href
  conf: 0.9
  if:
    type: text
    regex: \b[a-zA-Z_$][\w$]*\.href\s*=\s*[a-zA-Z_$][\w$]*\.(toString|href)\(
  unless:
  - id: micro-behaviors/ui/window/manage/dom::steam-tradeoffers-redirect
- id: browser-keydown-handler
  desc: Installs browser keydown handler
  conf: 0.78
  if:
    type: text
    regex: '\b(window\.)?onkeydown\b\s*='
- id: browser-contextmenu-handler
  desc: Installs browser context menu handler
  conf: 0.78
  if:
    type: text
    regex: '\b(window\.)?oncontextmenu\b\s*='
- id: browser-location-assign
  desc: Navigates browser location
  conf: 0.82
  if:
    type: text
    regex: '\b(window\.)?location\.assign\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: top-location-replace-string
  desc: String contains top location replace
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: top.location.replace(
    case_insensitive: true
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-location-reload
  desc: Reloads browser location
  conf: 0.84
  if:
    type: symbol
    kind: call
    exact: location.reload
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-query-propagated-redirect
  desc: Browser query parameter redirect
  conf: 0.84
  ref: sha256:afbffa38a490d43ff8e56a13b0a4b4fbde5c87b06d53d90898d9e7e2fcd08f40
  if:
    type: text
    regex: 'window\.location\.search[\s\S]{0,240}(redirectURL|location\s*=)'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-beforeunload-handler
  desc: Installs browser beforeunload handler
  conf: 0.86
  if:
    type: text
    regex: '\b(window\.)?onbeforeunload\b\s*='
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/library/jquery/
- id: browser-location-href-assign
  desc: Navigates via location.href assignment
  conf: 0.82
    # Neutral client-side navigation (SPA redirects, post-action navigation).
    # Phishing composites reference this cross-directory and add attacker-page /
    # credential-capture evidence; on its own it is not a phishing tactic.
  if:
    type: text
    regex: 'window\.(top\.)?location\.href\s*=\s*[a-zA-Z_$][\w$.()\s+-]{0,80}'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-innerhtml-assignment
  desc: Assigns DOM innerHTML
  conf: 0.8
  if:
    type: text
    regex: '\.innerHTML\s*=|\[\s*["'']innerHTML["'']\s*\]\s*='
  unless:
  - type: text
    substr: '"sourcesContent":'
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/document/html/
- id: browser-document-element-blanking
  desc: Clears document element HTML
  conf: 0.86
  if:
    type: text
    regex: document\.documentElement\.innerHTML\s*=\s*['"]{2}
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-append-child
  desc: Appends child DOM node
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\.appendChild\s*\(|\[\s*["'']appendChild["'']\s*\]\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-insert-before
  desc: Inserts DOM node before reference node
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\.insertBefore\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-node-remove
  desc: Removes DOM node from page
  conf: 0.8
  if:
    type: text
    regex: '\.removeChild\s*\(|\b(document|querySelector|getElementById)\b.{0,80}\.remove\(\s*\)'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-mutation-observer
  desc: Observes DOM mutations (watches page changes)
  conf: 0.8
  if:
    type: text
    word: MutationObserver
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-native-sanitizer
  desc: Uses browser Sanitizer API
  conf: 0.82
  if:
    type: text
    regex: '\bwindow\.Sanitizer\b|\.sanitizeToFragment\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: dom-click-call
  desc: DOM element click call
  conf: 0.82
  if:
    type: text
    regex: '\.click\(\)'
- id: dom-text-content-read
  desc: Reads DOM text content
  crit: component
  conf: 0.82
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  if:
    type: text
    regex: '\.(textContent|innerHTML)\b'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: dom-xpath-evaluate-call
  desc: Evaluates DOM XPath selector
  crit: component
  conf: 0.86
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  if:
    type: text
    regex: 'document\.evaluate\s*\([^)]{0,180}XPathResult\.FIRST_ORDERED_NODE_TYPE'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
  # Neutral DOM form-field access (lookup + value read). Universal on web pages,
  # so component-only standalone; credential-capture/form-scraping composites
  # reference these cross-directory alongside their own intent evidence.
- id: dom-element-value-read
  desc: Reads .value property of a DOM element
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.value\b'
- id: steam-confirm-tradeoffer-call
  desc: Steam ConfirmTradeOffer call
  conf: 0.92
  if:
    type: text
    substr: ConfirmTradeOffer
- id: steam-act-on-trade-offer
  desc: Steam ActOnTradeOffer call
  conf: 0.92
  if:
    type: text
    substr: ActOnTradeOffer
- id: steam-trade-confirm-button
  desc: Steam trade confirm button reference
  conf: 0.9
  if:
    type: text
    substr: trade_confirmbtn
- id: steam-trade-accept-button
  desc: Steam trade accept button reference
  conf: 0.9
  if:
    type: text
    substr: trade_offer_accept_btn
- id: steam-tradeoffers-redirect
  desc: Steam tradeoffers redirect
  conf: 0.88
  if:
    type: text
    substr: steamcommunity.com/my/tradeoffers/sent
- id: window-postmessage-opnskin
  desc: OpnSkin window postMessage bridge
  conf: 0.9
  if:
    type: text
    regex: 'window\.postMessage\(\{type:"OPNSKIN_'
- id: dom-element-lookup--getelementbyid
  desc: getElementById/querySelector (getElementById)
  crit: component
  conf: 0.9
  if:
    type: text
    word: getElementById
- id: dom-element-lookup--queryselector
  desc: getElementById/querySelector DOM (querySelector)
  crit: component
  conf: 0.9
  if:
    type: text
    word: querySelector
composite_rules:
- id: browser-aliased-document-rewrite-call
  desc: Aliased document rewrite via call
  crit: suspicious
  conf: 0.93
  ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
  all:
  - id: browser-document-open-alias
  - id: browser-document-write-close-alias
  - id: browser-aliased-call-invocation
  near_bytes: 512
- id: dom-element-lookup
  desc: getElementById/querySelector DOM lookup
  crit: component
  conf: 0.9
  any:
  - id: dom-element-lookup--getelementbyid
  - id: dom-element-lookup--queryselector
