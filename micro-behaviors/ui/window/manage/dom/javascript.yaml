defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html, -kotlin]
  crit: notable
  conf: 0.82

traits:
  - id: browser-document-write
    desc: Writes HTML into document
    conf: 0.78
    if:
      type: symbol
      exact: document.write
  - id: browser-create-element
    desc: Creates DOM element
    conf: 0.82
    if:
      type: symbol
      exact: createElement
  - id: browser-create-script-element
    desc: Creates script DOM element
    conf: 0.84
    if:
      type: text
      regex: 'createElement\(\s*[''"]script[''"]\s*\)'
    unless:
      - id: metadata/document/html::ndoc-generated-page
  - id: browser-create-form-element
    desc: Creates form DOM element
    conf: 0.82
    if:
      type: text
      regex: createElement\(['"]form['"]\)
    unless:
      - id: metadata/library/jquery
      - id: metadata/document/html::ndoc-generated-page
  - id: browser-iframe-element
    desc: References iframe DOM element
    conf: 0.78
    if:
      type: text
      substr: iframe
    unless:
      - type: basename
        regex: '\.map$'
      - type: text
        substr: '"sourcesContent":'
      - id: well-known/lib/marked::marked-js-bundle
      - id: metadata/document/html::ndoc-generated-page
  - id: browser-script-insert-adjacent
    desc: Inserts script adjacent to element
    conf: 0.86
    if:
      type: symbol
      exact: script.insertAdjacentElement
  - id: browser-window-open
    desc: Opens browser window or tab
    conf: 0.8
    if:
      type: symbol
      exact: window.open
  - id: browser-location-assign
    desc: Navigates browser location
    conf: 0.82
    if:
      type: text
      regex: '\b(window\.)?location\.assign\s*\('
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
  - id: browser-innerhtml-assignment
    desc: Assigns DOM innerHTML
    conf: 0.8
    if:
      type: text
      regex: '\.innerHTML\s*='
    unless:
      - type: basename
        regex: '\.map$'
      - type: text
        substr: '"sourcesContent":'
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/document/html::ndoc-generated-page
  - id: browser-node-remove
    desc: Removes DOM node from page
    conf: 0.8
    if:
      type: text
      regex: '\.removeChild\s*\(|\.remove\(\s*\)'
    unless:
      - type: basename
        regex: '\.map$'
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file
  - id: browser-mutation-observer
    desc: Observes DOM mutations (watches page changes)
    conf: 0.8
    if:
      type: text
      word: MutationObserver
    unless:
      - type: basename
        regex: '\.map$'
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file
  - id: browser-native-sanitizer
    desc: Uses browser Sanitizer API
    conf: 0.82
    if:
      type: text
      regex: '\bwindow\.Sanitizer\b|\.sanitizeToFragment\s*\('
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
  - id: dom-click-call
    desc: DOM element click call
    conf: 0.82
    if:
      type: text
      regex: '\.click\(\)'
  - id: steam-confirm-tradeoffer-call
    desc: Steam ConfirmTradeOffer call
    conf: 0.92
    if:
      type: text
      substr: ConfirmTradeOffer
  - id: steam-act-on-trade-offer
    desc: Steam ActOnTradeOffer call
    conf: 0.92
    if:
      type: text
      substr: ActOnTradeOffer
  - id: steam-trade-confirm-button
    desc: Steam trade confirm button reference
    conf: 0.9
    if:
      type: text
      substr: trade_confirmbtn
  - id: steam-trade-accept-button
    desc: Steam trade accept button reference
    conf: 0.9
    if:
      type: text
      substr: trade_offer_accept_btn
  - id: steam-tradeoffers-redirect
    desc: Steam tradeoffers redirect
    conf: 0.88
    if:
      type: text
      substr: steamcommunity.com/my/tradeoffers/sent
  - id: window-postmessage-opnskin
    desc: OpnSkin window postMessage bridge
    conf: 0.9
    if:
      type: text
      regex: 'window\.postMessage\(\{type:"OPNSKIN_'
