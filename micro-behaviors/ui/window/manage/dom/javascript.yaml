defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html, -kotlin]
  crit: notable
  conf: 0.82

traits:
- id: browser-prevent-default-call
  desc: Cancels browser event default action
  crit: baseline
  conf: 0.85
  if:
    type: text
    substr: ".preventDefault("
- id: delayed-checkbox-or-loader-ui
  desc: Delayed checkbox or loader UI transition
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: 'loader-ring[^\n]{0,120}setTimeout|checkbox[^\n]{0,120}setTimeout'

- id: objecturl-open-new-tab
  desc: Opens object URL in new tab
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: 'createObjectURL[\s\S]{0,300}window\.open'
- id: template-queryselector
  desc: Template expression queries DOM element
  crit: notable
  conf: 0.85
  count_min: 6
  if:
    type: text
    regex: \$\{[^}]{0,160}querySelector
- id: template-getattribute
  desc: Template expression reads DOM attributes
  crit: notable
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: \$\{[^}]{0,160}getAttribute
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: template-textcontent
  desc: Template expression reads node text
  crit: notable
  conf: 0.85
  count_min: 4
  if:
    type: text
    regex: \$\{[^}]{0,160}textContent
- id: template-htmlcontent-read
  desc: Template literal reads node HTML
  crit: notable
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: \$\{[^}]{0,160}(innerHTML|outerHTML)

- id: browser-document-write
  desc: Writes HTML into document
  conf: 0.78
  if:
    type: symbol
    exact: document.write
- id: browser-empty-document-write
  desc: Empty document.write call
  conf: 0.82
  if:
    type: text
    regex: document\.write\(\s*['"]{2}\s*\)
- id: extension-active-page-html-read
  desc: Reads active tab document HTML
  conf: 0.94
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  if:
      type: text
      regex: 'chrome\.scripting\.executeScript\s*\([\s\S]{0,520}document\.documentElement\.outerHTML'
- id: browser-document-open-alias
  desc: Aliased document open reference
  crit: suspicious
  conf: 0.88
  ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
  if:
    type: text
    regex: '(?s)=\s*document\s*;.{0,220}\.open\s*;'
- id: browser-document-write-close-alias
  desc: Aliased document write close
  crit: suspicious
  conf: 0.88
  ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
  if:
    type: text
    regex: '(?s)\.write\s*;.{0,140}\.close\s*;'
- id: browser-create-element
  desc: Creates DOM element
  conf: 0.82
  if:
    type: symbol
    exact: createElement
- id: browser-create-script-element
  desc: Creates script DOM element
  conf: 0.84
  if:
    type: text
    regex: 'createElement\(\s*[''"]script[''"]\s*\)'
  unless:
  - id: metadata/document/html/
  - id: metadata/library/jquery/
- id: browser-create-iframe-element
  desc: Creates iframe DOM element
  conf: 0.94
  if:
    type: symbol
    kind: call
    exact: document.createElement
    arg:
      kind: string
      exact: iframe
# `100%` on a position:fixed element covers the viewport exactly as `100vw/100vh`
# does, and is the more common spelling in injected-overlay CSS. Matching only the
# viewport units missed full-page overlays built the percentage way.
- id: fixed-viewport-overlay-style
  desc: Fixed overlay spans viewport dimension
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'position\s*:\s*fixed\s*;[\s\S]{0,180}(width\s*:\s*100(vw|%)|height\s*:\s*100(vh|%))'
- id: high-layer-overlay-style
  desc: Overlay uses seven-digit z-index
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'z-index\s*:\s*\d{7,}'
- id: document-root-append
  desc: Appends element to document root
  crit: component
  conf: 0.9
  if:
    type: symbol
    kind: call
    exact: document.documentElement.appendChild
- id: browser-iframe-src-variable
  desc: Assigns variable URL to iframe source
  conf: 0.88
  if:
    type: text
    regex: '\b(frame|iframe)\.src\s*=\s*[A-Za-z_$][\w$]*'
- id: browser-iframe-srcdoc-assignment
  desc: Assigns inline HTML to iframe srcdoc
  crit: notable
  conf: 0.93
  for: [javascript, typescript, html]
  if:
    type: symbol
    kind: bind
    exact: srcdoc
- id: browser-create-form-element
  desc: Creates form DOM element
  conf: 0.82
  if:
    type: text
    regex: createElement\(['"]form['"]\)
  unless:
  - id: metadata/library/jquery
  - id: metadata/document/html/
- id: browser-iframe-element
  desc: References an iframe HTML element
  crit: component
  conf: 0.78
  if:
    type: text
    substr: iframe
  unless:
  - type: text
    substr: '"sourcesContent":'
  - id: well-known/lib/marked/
  - id: metadata/library/jquery/
  - id: metadata/document/html/
  - id: well-known/app/google-web::official-google-web-asset
- id: browser-enumerates-page-images
  desc: Enumerates page image elements
  conf: 0.9
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  if:
    type: symbol
    kind: call
    exact: document.querySelectorAll
    arg:
      kind: string
      regex: '^img$'
- id: browser-selects-anchor-hrefs
  desc: Selects page anchor elements by href
  conf: 0.9
  if:
    type: symbol
    kind: call
    exact: document.querySelectorAll
    arg:
      kind: string
      exact: a[href]
- id: browser-script-insert-adjacent
  desc: Inserts script adjacent to element
  conf: 0.86
  if:
    type: symbol
    exact: script.insertAdjacentElement
- id: browser-window-open
  desc: Opens browser window or tab
  conf: 0.8
  if:
    type: symbol
    exact: window.open
- id: browser-window-move
  desc: Moves browser window
  conf: 0.82
  if:
    type: symbol
    kind: call
    exact: window.moveTo
- id: browser-window-focus
  desc: Focuses browser window
  conf: 0.82
  if:
    type: symbol
    kind: call
    exact: window.focus
- id: browser-window-stop
  desc: Stops browser page loading
  conf: 0.82
  if:
    type: symbol
    kind: call
    exact: window.stop
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-link-href-assignment
  desc: Assigns browser link href
  conf: 0.9
  if:
    type: text
    regex: \b[a-zA-Z_$][\w$]*\.href\s*=\s*[a-zA-Z_$][\w$]*\.(toString|href)\(
  unless:
  - id: micro-behaviors/ui/window/manage/dom::steam-tradeoffers-redirect
- id: browser-keydown-handler
  desc: Installs browser keydown handler
  conf: 0.78
  if:
    type: text
    regex: '\b(window\.)?onkeydown\b\s*='
- id: browser-contextmenu-handler
  desc: Installs browser context menu handler
  conf: 0.78
  if:
    type: text
    regex: '\b(window\.)?oncontextmenu\b\s*='
- id: browser-location-assign
  desc: Navigates browser location
  conf: 0.82
  if:
    type: text
    regex: '\b(window\.)?location\.assign\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: top-location-replace-string
  desc: String contains top location replace
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: top.location.replace(
    case_insensitive: true
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-location-reload
  desc: Reloads browser location
  conf: 0.84
  if:
    type: symbol
    kind: call
    exact: location.reload
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-query-propagated-redirect
  desc: Browser query parameter redirect
  conf: 0.84
  ref: sha256:afbffa38a490d43ff8e56a13b0a4b4fbde5c87b06d53d90898d9e7e2fcd08f40
  if:
    type: text
    regex: 'window\.location\.search[\s\S]{0,240}(redirectURL|location\s*=)'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-beforeunload-handler
  desc: Installs browser beforeunload handler
  conf: 0.86
  if:
    type: text
    regex: '\b(window\.)?onbeforeunload\b\s*='
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/library/jquery/
- id: browser-location-href-assign
  desc: Navigates via location.href assignment
  conf: 0.82
  if:
    type: text
    regex: '(window\.)?location\.href\s*='
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: browser-location-external-href-replace
  desc: Navigates browser to external URL
  conf: 0.82
  if:
    type: text
    regex: "window\\.location\\.(href|replace)\\s*=\\s*['\\\"]https?://"
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/document/html/
- id: browser-location-external-assign
  desc: Assigns external URL to location
  conf: 0.82
  if:
    type: text
    regex: "window\\.location\\s*=\\s*['\\\"]https?://"
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/document/html/
- id: browser-innerhtml-assignment
  desc: Writes HTML into the DOM with innerHTML
  conf: 0.8
  if:
    type: text
    regex: '\.innerHTML\s*=|\[\s*["'']innerHTML["'']\s*\]\s*='
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - type: text
    substr: '"sourcesContent":'
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/document/html/
- id: browser-form-submit
  desc: Programmatically submits a browser form
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\b[A-Za-z_$][\w$]*\.submit\s*\('
  unless:
    - type: text
      substr: 'form.submit() manually, consider using form.requestSubmit()'
- id: comparison-text-innerhtml-injection-sink
  desc: Potential HTML injection from comparison text
  crit: notable
  conf: 0.92
  count_min: 2
  # This identifies an unsafe rendering sink, not confirmed script execution.
  # Requiring both before/after fields avoids warning on ordinary templates.
  if:
    type: text
    regex: '\.innerHTML\s*=\s*`[\s\S]{0,240}\$\{[^}]{0,80}\.(before|after)\.text\b'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/document/html/
- id: browser-document-element-blanking
  desc: Clears document element HTML
  conf: 0.86
  if:
    type: text
    regex: document\.documentElement\.innerHTML\s*=\s*['"]{2}
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-append-child
  desc: Appends child DOM node
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\.appendChild\s*\(|\[\s*["'']appendChild["'']\s*\]\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-insert-before
  desc: Inserts DOM node before reference node
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\.insertBefore\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-node-remove
  desc: Removes a child node from the DOM
  conf: 0.8
  if:
    type: text
    regex: '\.removeChild\s*\(|\b(document|querySelector|getElementById)\b.{0,80}\.remove\(\s*\)'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-query-sponsored-marker
  desc: Queries sponsored-content marker
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'querySelector\([^)]{0,220}sponsored'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-hide-sponsored-element
  desc: Hides or removes sponsored element
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'sponsored[A-Za-z_$]*\.style\.display\s*=\s*["'']none["'']'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-hides-promoted-content-class
  desc: Hides promoted content with a CSS class
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'classList\.add\([^)]{0,120}\b(hide|hidden)[-_]promoted\b'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-mutation-observer
  desc: Watches DOM changes with MutationObserver
  conf: 0.8
  if:
    type: text
    word: MutationObserver
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-set-rtl-direction
  desc: Sets DOM text direction to RTL
  conf: 0.94
  if:
    type: text
    regex: '\.setAttribute\(\s*[''"]dir[''"]\s*,\s*[''"]rtl[''"]\s*\)'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-intersection-observer
  desc: Observes DOM element visibility
  conf: 0.82
  if:
    type: text
    regex: '\bnew\s+IntersectionObserver\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-native-sanitizer
  desc: Uses browser Sanitizer API
  conf: 0.82
  if:
    type: text
    regex: '\bwindow\.Sanitizer\b|\.sanitizeToFragment\s*\('
  unless:
  - id: metadata/file/format::sourcemap-sources-content
- id: dom-click-call
  desc: Calls click() on a DOM element
  conf: 0.82
  if:
    type: text
    regex: '\.click\(\)'
- id: dom-blob-download-link
  desc: Triggers Blob download link
  conf: 0.88
  if:
    type: text
    regex: '(?s)new\s+Blob\s*\(.{0,260}URL\.createObjectURL\s*\(.{0,260}\.download\s*='
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: dom-text-content-read
  desc: Reads DOM text content
  crit: component
  conf: 0.82
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  if:
    type: text
    regex: '\.(textContent|innerHTML)\b'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
- id: dom-xpath-evaluate-call
  desc: Evaluates DOM XPath selector
  crit: component
  conf: 0.86
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  if:
    type: text
    regex: 'document\.evaluate\s*\([^)]{0,180}XPathResult\.FIRST_ORDERED_NODE_TYPE'
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/scripted::dts-declaration-file
  # Neutral DOM form-field access (lookup + value read). These are complete but
  # ubiquitous behaviors, so they are baseline rather than component evidence;
  # credential-capture composites add their own intent-specific context.
- id: dom-element-value-read
  desc: Reads the value of a DOM element
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: '\.value\b'
- id: steam-confirm-tradeoffer-call
  desc: Steam ConfirmTradeOffer call
  conf: 0.92
  if:
    type: text
    substr: ConfirmTradeOffer
- id: steam-act-on-trade-offer
  desc: Steam ActOnTradeOffer call
  conf: 0.92
  if:
    type: text
    substr: ActOnTradeOffer
- id: steam-trade-confirm-button
  desc: Steam trade confirm button reference
  conf: 0.9
  if:
    type: text
    substr: trade_confirmbtn
- id: steam-trade-accept-button
  desc: Steam trade accept button reference
  conf: 0.9
  if:
    type: text
    substr: trade_offer_accept_btn
- id: steam-tradeoffers-redirect
  desc: Steam tradeoffers redirect
  conf: 0.88
  if:
    type: text
    substr: steamcommunity.com/my/tradeoffers/sent
- id: window-postmessage-opnskin
  desc: OpnSkin window postMessage bridge
  conf: 0.9
  if:
    type: text
    regex: 'window\.postMessage\(\{type:"OPNSKIN_'
- id: dom-element-lookup--getelementbyid
  desc: Looks up a DOM element with getElementById
  crit: baseline
  conf: 0.9
  if:
    type: text
    word: getElementById
- id: dom-element-lookup--queryselector
  desc: Looks up a DOM element with querySelector
  crit: baseline
  conf: 0.9
  if:
    type: text
    word: querySelector
- id: document-root-html-replacement
  desc: Replaces document root HTML
  crit: notable
  conf: 0.9
  if:
    type: symbol
    kind: bind
    exact: document.documentElement.innerHTML
composite_rules:
- id: browser-high-layer-iframe-container
  desc: Embeds iframe in high-layer viewport container
  crit: notable
  conf: 0.92
  all:
  - id: browser-create-iframe-element
  - id: fixed-viewport-overlay-style
  - id: high-layer-overlay-style
  - id: document-root-append
  near_bytes: 1800
- id: template-dom-access-cluster
  desc: Multiple DOM reads inside template expressions
  crit: notable
  conf: 0.9
  needs: 3
  any:
  - id: template-queryselector
  - id: template-getattribute
  - id: template-textcontent
  - id: template-htmlcontent-read
- id: browser-aliased-document-rewrite-call
  desc: Aliased document rewrite via call
  crit: suspicious
  conf: 0.93
  ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
  all:
  - id: browser-document-open-alias
  - id: browser-document-write-close-alias
  - id: micro-behaviors/data/control-flow/analysis::js-function-call-method
  near_bytes: 512
