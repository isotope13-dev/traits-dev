defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  crit: component
traits:
- id: size-prop--height
  desc: DOM or CSS size property (height)
  if:
    type: text
    word: height
- id: size-prop--width
  desc: DOM or CSS size property (width)
  if:
    type: text
    word: width
composite_rules:
- id: size-prop
  desc: DOM or CSS size property
  any:
  - id: size-prop--height
  - id: size-prop--width
