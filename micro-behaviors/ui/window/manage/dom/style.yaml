defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  crit: component
traits:
- id: css-display-none
  desc: CSS display none declaration
  conf: 0.9
  if:
    type: text
    regex: \bdisplay\s*:\s*none\b
- id: css-opacity-zero
  desc: CSS opacity zero declaration
  conf: 0.9
  if:
    type: text
    regex: \bopacity\s*:\s*0\b
- id: css-visibility-hidden
  desc: CSS visibility hidden declaration
  conf: 0.9
  if:
    type: text
    regex: \bvisibility\s*:\s*hidden\b
- id: size-prop--height
  desc: DOM or CSS size property (height)
  if:
    type: text
    word: height
- id: size-prop--width
  desc: DOM or CSS size property (width)
  if:
    type: text
    word: width
composite_rules:
- id: size-prop
  desc: DOM or CSS size property
  any:
  - id: size-prop--height
  - id: size-prop--width
