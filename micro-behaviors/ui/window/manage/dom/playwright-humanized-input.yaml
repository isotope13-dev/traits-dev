defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: playwright-humanized-input-helper
    desc: Human-like Playwright input helper
    if:
      type: function
      regex: '(?i)^_?human([_-]?like|ized)'
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
