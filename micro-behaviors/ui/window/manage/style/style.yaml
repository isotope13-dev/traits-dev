defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  crit: component
traits:
- id: css-display-none
  desc: CSS display none declaration
  conf: 0.9
  if:
    type: text
    regex: \bdisplay\s*:\s*none\b
- id: css-opacity-zero
  desc: CSS opacity zero declaration
  conf: 0.9
  if:
    type: text
    regex: \bopacity\s*:\s*0\b
- id: css-visibility-hidden
  desc: CSS visibility hidden declaration
  conf: 0.9
  if:
    type: text
    regex: \bvisibility\s*:\s*hidden\b
- id: css-offscreen-position
  desc: CSS off-screen positioning hides an element
  for: [php, html, javascript, typescript]
  conf: 0.9
  if:
    type: text
    regex: 'position\s*:\s*absolute\s*;\s*(left|top)\s*:\s*-9{3,}(px|em)'
- id: browser-root-pointer-events-assignment
  desc: Assigns pointer-events on a browser root element
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '\bdocument\.(body|documentElement)\.style\.pointerEvents\s*='
  # A source map does not make executable JavaScript inert: bundled code can
  # still perform this assignment at runtime. Keep the atom visible so an
  # objective composite can correlate it with other page-sabotage behavior.
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: browser-body-overflow-hidden
  desc: Hides body overflow in the browser
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '\bdocument\.body\.style\.overflow\s*=\s*["'']hidden["'']'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: size-prop--height
  desc: DOM or CSS size property (height)
  if:
    type: text
    word: height
- id: size-prop--width
  desc: DOM or CSS size property (width)
  if:
    type: text
    word: width
composite_rules:
- id: size-prop
  desc: DOM or CSS size property
  any:
  - id: size-prop--height
  - id: size-prop--width
