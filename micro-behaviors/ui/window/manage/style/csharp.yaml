defaults:
  platforms: [windows]
  for: [csharp]

traits:
  - id: get-window-long-source
    desc: Source reads window style data
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetWindowLong$'
  - id: set-window-long-source
    desc: Source changes window style data
    crit: notable
    conf: 0.84
    if:
      type: symbol
      kind: call
      regex: '(^|\.)SetWindowLong$'
  - id: set-layered-window-alpha-source
    desc: Source sets layered window alpha
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)SetLayeredWindowAttributes$'
