# Compiled .NET window-management tokens. These are neutral capabilities;
# hiding intent is inferred by the objective composite that combines them.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: hide-all-windows-for-process-token
    desc: .NET process-wide window hiding method
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: HideAllWindowsForProcess

  - id: sw-hide-token
    desc: .NET SW_HIDE window flag reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: SW_HIDE

  - id: enum-windows-token
    desc: .NET top-level window enumeration reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: EnumWindows

  - id: window-process-id-token
    desc: .NET window-to-process ID lookup reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: GetWindowThreadProcessId
