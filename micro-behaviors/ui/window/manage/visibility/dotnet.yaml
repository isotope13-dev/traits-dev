# Compiled Windows window-management references. These are neutral capabilities;
# hiding intent is inferred by the objective composite that combines them.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: hide-all-windows-for-process-token
    desc: Process-wide window hiding method reference
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: HideAllWindowsForProcess

  - id: sw-hide-token
    desc: SW_HIDE window flag reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: SW_HIDE

  - id: enum-windows-token
    desc: Top-level window enumeration API reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: EnumWindows

  - id: window-process-id-token
    desc: Window-to-process ID lookup API reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: GetWindowThreadProcessId
