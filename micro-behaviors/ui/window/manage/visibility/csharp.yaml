# Window management API usage for C# WinForms
defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: zero-opacity-window
    desc: Window opacity set to zero
    crit: baseline
    conf: 0.92
    if:
      type: text
      regex: 'Opacity\s*=\s*0(\.0+)?\s*;'
  - id: no-taskbar-window
    desc: Window removed from taskbar
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: '\bShowInTaskbar\s*=\s*false\b'
  - id: topmost-window
    desc: Window forced to topmost
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: '\bTopmost\s*=\s*true\b'
  - id: borderless-window
    desc: Borderless WinForms or WPF window
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: '\bWindowStyle\s*=\s*WindowStyle\.None\b|\bFormBorderStyle\s*=\s*FormBorderStyle\.None\b'
  - id: no-window-icon
    desc: Window icon disabled
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\bShowIcon\s*=\s*false\b'
