defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component
traits:
- id: document-hidden-check
  desc: Browser document visibility check
  conf: 0.8
  if:
    type: text
    substr: document.hidden
- id: document-visibility-state-override
  desc: Overrides document visibilityState property
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'Object\.defineProperty\s*\(\s*document\s*,\s*[\x27\x22]visibilityState'
- id: document-hidden-state-override
  desc: Overrides document hidden property
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'Object\.defineProperty\s*\(\s*document\s*,\s*[\x27\x22]hidden'
- id: visibilitychange-propagation-suppression
  desc: Suppresses visibilitychange event propagation
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'visibilitychange[\s\S]{0,160}stopImmediatePropagation'
- id: visibilitychange-listener
  desc: Browser visibilitychange listener
  conf: 0.8
  if:
    type: text
    substr: visibilitychange
- id: last-activity-variable
  desc: Browser lastActivity state variable
  conf: 0.78
  if:
    type: text
    word: lastActivity
- id: mousemove-activity-listener
  desc: Browser mousemove activity listener
  conf: 0.78
  if:
    type: text
    substr: addEventListener('mousemove'
- id: keydown-activity-listener
  desc: Browser keydown activity listener
  conf: 0.78
  if:
    type: text
    substr: addEventListener('keydown'
- id: scroll-activity-listener
  desc: Browser scroll activity listener
  conf: 0.78
  if:
    type: text
    substr: addEventListener('scroll'
- id: touchstart-activity-listener
  desc: Browser touchstart activity listener
  conf: 0.78
  if:
    type: text
    substr: addEventListener('touchstart'
composite_rules:
- id: user-activity-event-listener
  desc: Browser user activity event listener
  any:
  - id: mousemove-activity-listener
  - id: keydown-activity-listener
  - id: scroll-activity-listener
  - id: touchstart-activity-listener
