defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: enum-desktop-windows-import
    desc: Enumerate desktop windows
    crit: baseline
    conf: 0.86
    if:
      type: symbol
      kind: import
      exact: EnumDesktopWindows
  - id: enum-child-windows-import
    desc: Enumerate child windows
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      kind: import
      exact: EnumChildWindows
  - id: enum-windows
    desc: Enumerate top-level windows
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      kind: import
      exact: EnumWindows
  - id: get-window-thread-process-id
    desc: Get window thread and process ID
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      kind: import
      exact: GetWindowThreadProcessId
  - id: set-cursor-pos-import
    desc: Move cursor position
    crit: baseline
    conf: 0.82
    if:
      type: text
      exact: SetCursorPos
  - id: block-input-import
    desc: BlockInput API blocks keyboard and mouse input
    crit: suspicious
    conf: 0.9
    attack: T1562
    if:
      type: text
      exact: BlockInput
    unless:
      - type: text
        substr: called unimplemented BlockInput
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
        - id: metadata/lang/compiled::autoit-compiled-script
        - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
        - id: metadata/binary/framework::vb6-runtime-library
  - id: block-input-src
    desc: BlockInput API in source (P/Invoke declaration)
    crit: suspicious
    conf: 0.88
    attack: T1562
    if:
      type: raw
      regex: 'BlockInput\s+Lib\s+"user32"'
composite_rules:
  - id: desktop-window-enumeration
    desc: Enumerate desktop window state
    crit: baseline
    conf: 0.9
    all:
      - id: enum-desktop-windows-import
      - id: micro-behaviors/ui/window/manage/control::get-window-text
    any:
      - id: set-cursor-pos-import
