defaults:
  platforms: [windows]
  for: [csharp]

traits:
  - id: is-window-visible-source
    desc: Source checks window visibility
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: '(^|\.)IsWindowVisible$'
  - id: enum-thread-windows-source
    desc: Source enumerates thread windows
    crit: notable
    conf: 0.84
    if:
      type: symbol
      kind: call
      regex: '(^|\.)EnumThreadWindows$'
  - id: get-window-thread-process-id-source
    desc: Source gets a window process ID
    crit: notable
    conf: 0.84
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetWindowThreadProcessId$'
