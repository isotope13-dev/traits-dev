defaults:
  for: [macho]
  platforms: [macos]

traits:
  - id: cgwindow-list-copy-window-info-import
    desc: Enumerate macOS windows through Core Graphics
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: CGWindowListCopyWindowInfo
  - id: get-frontmost-application
    desc: Query current frontmost application
    crit: notable
    conf: 0.9
    if:
      type: text
      section: __TEXT,__objc_methname
      substr: frontmostApplication
