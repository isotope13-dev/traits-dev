defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
- id: browser-body-innertext-read
  desc: Reads visible browser body text
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\b(document\.)?body\.innerText\b'

- id: page-script-element-enumeration
  desc: Enumerates scripts with querySelectorAll()
  crit: notable
  conf: 0.92
  if:
    type: text
    # A typed JSON-LD lookup is ordinary page metadata extraction.  Restrict
    # this atom to enumeration of every script element, which is the stronger
    # page-source collection signal used by the archive-level objectives.
    regex: 'querySelectorAll\s*\(\s*[''\"]script[''\"]\s*\)'
