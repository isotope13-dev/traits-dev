# Windows GUI active-window / popup APIs. Individually common in GUI apps; the
# cluster is useful context for composites that need an interactive UI surface.
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: get-active-window
    desc: GetActiveWindow API reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: GetActiveWindow
      section: .rdata
  - id: get-last-active-popup
    desc: GetLastActivePopup API reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: GetLastActivePopup
      section: .rdata
  - id: message-box-a
    desc: MessageBoxA dialog API reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: MessageBoxA
      section: .rdata
composite_rules:
  - id: ansi-gui-probe
    desc: ANSI GUI window API cluster
    crit: baseline
    conf: 0.9
    needs: 2
    any:
      - id: get-active-window
      - id: get-last-active-popup
      - id: message-box-a
