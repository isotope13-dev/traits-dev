# Windows GUI active-window / popup probe APIs. Individually common in GUI
# apps; the cluster (active-window + last-active-popup + message-box) is a
# session-interactivity probe used by loaders to confirm an interactive
# desktop before detonating.
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: get-active-window
    desc: GetActiveWindow API reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: GetActiveWindow
      section: .rdata
  - id: get-last-active-popup
    desc: GetLastActivePopup API reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: GetLastActivePopup
      section: .rdata
  - id: message-box-a
    desc: MessageBoxA dialog API reference
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: MessageBoxA
      section: .rdata
composite_rules:
  - id: ansi-gui-probe
    desc: ANSI GUI active-window probe cluster
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: get-active-window
      - id: get-last-active-popup
      - id: message-box-a
