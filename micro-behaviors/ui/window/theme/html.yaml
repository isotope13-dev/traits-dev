defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  crit: notable
  conf: 0.85

traits:
- id: prefers-dark-color-scheme
  desc: Checks the preferred dark color scheme
  if:
    type: text
    substr: "prefers-color-scheme: dark"
- id: dark-theme-class
  desc: Uses a dark theme class marker
  crit: component
  conf: 0.7
  if:
    type: text
    substr: theme-dark
- id: light-theme-class
  desc: Uses a light theme class marker
  crit: component
  conf: 0.7
  if:
    type: text
    substr: theme-light

composite_rules:
- id: theme-adaptation
  desc: Adapts an interface to the system color scheme
  crit: notable
  conf: 0.85
  all:
  - id: prefers-dark-color-scheme
  - id: dark-theme-class
  - id: light-theme-class
