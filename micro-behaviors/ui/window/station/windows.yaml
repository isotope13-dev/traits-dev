defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: get-process-window-station
    desc: Query process window station
    crit: baseline
    conf: 0.8
    if:
      type: import
      exact: GetProcessWindowStation
  - id: get-shell-window
    desc: Query the system shell window
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: GetShellWindow
  - id: is-gui-thread
    desc: Check for GUI thread
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: IsGUIThread
  - id: get-capture-window
    desc: Query the current input capture window
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: GetCapture
  - id: get-user-object-information
    desc: Query window station object info
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: GetUserObjectInformationW
      section: .rdata
  - id: create-desktop-a
    desc: Create a new Windows desktop object
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: CreateDesktopA
  - id: open-desktop-import
    desc: Open alternate desktop
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: OpenDesktopW
  - id: set-thread-desktop-import
    desc: Attach thread to desktop
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: SetThreadDesktop
  - id: hidden-desk-name
    desc: Hidden desktop name
    crit: component
    conf: 0.86
    if:
      type: text
      exact: HiddenDesk
composite_rules:
  - id: window-station-query-chain
    desc: Query active window station state
    crit: baseline
    conf: 0.86
    all:
      - id: get-process-window-station
      - id: get-user-object-information
  - id: alternate-desktop-attachment
    desc: Alternate desktop attachment
    crit: notable
    conf: 0.93
    all:
      - id: open-desktop-import
      - id: set-thread-desktop-import
    any:
      - id: micro-behaviors/ui/window/manage/enumerate::enum-desktop-windows-import
      - id: hidden-desk-name
