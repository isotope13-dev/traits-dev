defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: get-process-window-station
    desc: Query process window station
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: GetProcessWindowStation
      section: .rdata
  - id: get-user-object-information
    desc: Query window station object info
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: GetUserObjectInformationW
      section: .rdata
composite_rules:
  - id: window-station-query-chain
    desc: Query active window station state
    crit: baseline
    conf: 0.86
    all:
      - id: get-process-window-station
      - id: get-user-object-information
