defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
- id: alternate-desktop-control
  desc: Alternate desktop creation and control
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/ui/window/station::create-desktop-a
  - id: micro-behaviors/ui/window/manage::desktop-window-enumeration
  any:
  - id: micro-behaviors/ui/window/manage::enum-child-windows-import
  - id: micro-behaviors/ui/window/manage::get-window-thread-process-id
  unless:
  - id: micro-behaviors/ui/window/station::p-user-unimplemented-desktop
  downgrade:
    any:
    - id: well-known/tool/sysadmin/sandboxie::signed-sandboxie-component
traits:
- id: p-user-unimplemented-desktop
  desc: p_user unimplemented desktop stub
  crit: component
  conf: 0.9
  if:
    type: text
    substr: called unimplemented CreateDesktopA
