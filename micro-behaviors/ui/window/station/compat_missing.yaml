defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: alternate-desktop-control
    desc: Alternate desktop creation and control
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/manage::create-desktop-import
      - id: micro-behaviors/ui/window/manage::desktop-window-enumeration
    any:
      - id: micro-behaviors/ui/window/manage::enum-child-windows-import
      - id: micro-behaviors/ui/window/manage::get-window-thread-process-id
    needs: 1
