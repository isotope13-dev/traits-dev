defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: capture-phase-input-listener
    desc: Registers capture-phase browser input listener
    if:
      type: text
      regex: 'document\.addEventListener\(\s*["'']input["'']\s*,[^,\n]{1,180},\s*true\s*\)'

  - id: browser-value-property-read
    desc: Reads browser value or text property
    if:
      type: symbol
      kind: member
      regex: '\.(value|innerText)$'

  - id: browser-input-capture-message
    desc: Sends captured input to extension background
    conf: 0.92
    if:
      type: text
      regex: 'type\s*:\s*["'']INPUT_CAPTURED["''][\s\S]{0,140}(text|url)\s*:'

  - id: browser-file-upload-message
    desc: Sends browser file metadata to extension
    if:
      type: text
      regex: 'type\s*:\s*["'']FILE_UPLOAD["''][\s\S]{0,140}(summary|url)\s*:'

  - id: browser-anonymize-message
    desc: Requests remote PII anonymization
    conf: 0.92
    if:
      type: text
      regex: 'type\s*:\s*["'']ANONYMIZE_TEXT["''][\s\S]{0,120}text\s*:'
