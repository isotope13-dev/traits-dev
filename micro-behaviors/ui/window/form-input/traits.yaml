defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  crit: notable
  conf: 0.9

traits:
  - id: capture-phase-input-listener
    desc: Registers capture-phase browser input listener
    if:
      type: text
      regex: 'document\.addEventListener\(\s*["'']input["'']\s*,[^,\n]{1,180},\s*true\s*\)'

  - id: browser-value-control-b
    desc: Reads value from form-like object
    if:
      type: symbol
      kind: member
      regex: '(option|form|field)\.(value|innerText)$'
  - id: browser-value-event-member-read
    desc: Reads event/target value or innerText
    if:
      type: symbol
      kind: member
      regex: '(event|evt|target)\.(value|innerText)$'
  - id: browser-value-event-b
    desc: Reads value from current browser target
    if:
      type: symbol
      kind: member
      regex: '(currentTarget|activeElement)\.(value|innerText)$'

  - id: browser-input-capture-message
    desc: Sends captured input to extension background
    conf: 0.92
    if:
      type: text
      regex: 'type\s*:\s*["'']INPUT_CAPTURED["''][\s\S]{0,140}(text|url)\s*:'

  - id: browser-file-upload-message
    desc: Sends browser file metadata to extension
    if:
      type: text
      regex: 'type\s*:\s*["'']FILE_UPLOAD["''][\s\S]{0,140}(summary|url)\s*:'

  - id: browser-anonymize-message
    desc: Requests remote PII anonymization
    conf: 0.92
    if:
      type: text
      regex: 'type\s*:\s*["'']ANONYMIZE_TEXT["''][\s\S]{0,120}text\s*:'

  - id: browser-password-entry
    desc: Enters a password into a browser form
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'page\.type\s*\([^)]{0,120}password'
      case_insensitive: true

  # In script source, a string literal distinguishes an actual form fragment
  # from comments or documentation that merely mention password inputs.
  - id: password-input-field-script
    desc: Script string contains a password input field
    crit: notable
    conf: 0.82
    for: [javascript, typescript, php]
    if:
      type: string_literal
      regex: 'type\s*=\s*["'']password["'']'

  - id: browser-otp-entry
    desc: Enters OTP or verification value in browser
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'page\.type\s*\([^)]{0,120}(otp|idvPin|phoneNumberId)'
      case_insensitive: true

  - id: browser-password-field-automation
    desc: Fills password field through browser script
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)typeText\s*\(\s*document\.querySelector\(.{0,80}password'

  - id: browser-bank-field-automation
    desc: Fills banking field through browser script
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)typeText\s*\(\s*document\.querySelector\(.{0,80}bank'

  - id: browser-pin-field-automation
    desc: Fills PIN field through browser script
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)typeText\s*\(\s*document\.querySelector\(.{0,80}pin'

  - id: browser-account-field-automation
    desc: Fills account field through browser script
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)typeText\s*\(\s*document\.querySelector\(.{0,80}(account|userpass)'

  - id: browser-submit-button-click
    desc: Clicks a browser form submit control
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(submitButton|formSubmit|bankOption)\.click\s*\('

  - id: browser-submit-selector
    desc: Selects a browser form submit control
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)querySelector\(.{0,80}button.{0,40}(submit|type)'

  - id: browser-banking-data-labels
    desc: Browser data record contains banking fields
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)inputData.{0,100}(accountNumber|bankName)'

  # Anchored on the `inputData` record like the banking sibling above: without
  # it the regex was just "the word password (or the substring pin) twice
  # within 80 chars", which fires on any CLI `--password <password>` flag,
  # on prose, and on unrelated words containing "pin" (spinner, typing, ...).
  - id: browser-credential-data-labels
    desc: Browser data record has credential fields
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)inputData.{0,100}\b(password|pin)\b'

composite_rules:
  - id: browser-value-property-read
    desc: Reads value or innerText from DOM-like member
    crit: notable
    conf: 0.9
    any:
      - id: browser-value-control-b
      - id: browser-value-event-member-read
      - id: browser-value-event-b

  - id: browser-password-or-otp-entry
    desc: Automated browser entry of a password or verification value
    crit: notable
    conf: 0.94
    any:
      - id: browser-password-entry
      - id: browser-otp-entry

  - id: browser-sensitive-field-automation
    desc: Fills password and banking fields in browser
    crit: notable
    conf: 0.96
    all:
      - id: browser-password-field-automation
    any:
      - id: browser-bank-field-automation
      - id: browser-pin-field-automation
      - id: browser-account-field-automation

  - id: browser-banking-credential-data-record
    desc: Browser record combines banking and credential fields
    crit: notable
    conf: 0.96
    all:
      - id: browser-banking-data-labels
      - id: browser-credential-data-labels
