defaults:
  platforms: [android, unix, windows]
  for: [kotlin, java, class]
  crit: notable
  conf: 0.86

traits:
  # UI form field identifiers — neutral widget naming, not credential theft.
  # Credential-capture composites in objectives/ reference these atoms.
  - id: password-field-identifier
    desc: UI password field identifier
    if:
      type: text
      substr: "passwordField"
    unless:
      - id: well-known/app/macos-benign::dbeaver-app-bundle
      - id: well-known/app/macos-benign::dbeaver-plugin-jar
      - id: well-known/app/macos-benign::dbeaver-java-package
      - id: metadata/package/files/included::jsii-metadata-basename

  - id: username-field-identifier
    desc: UI username field identifier
    if:
      type: text
      substr: "usernameField"
    unless:
      - id: metadata/package/files/included::jsii-metadata-basename
