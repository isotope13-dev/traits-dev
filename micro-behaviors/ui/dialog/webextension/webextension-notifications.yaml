# Browser-extension desktop notifications (chrome.notifications). Generic
# technique: raising a user-facing notification/dialog.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.9
traits:
  - id: chrome-notifications-api
    desc: Uses the browser extension notifications API
    if:
      type: text
      regex: '(chrome|browser)\.notifications\.[A-Za-z_]'
  - id: chrome-notifications-create
    desc: Creates a desktop notification from an extension
    if:
      type: symbol
      kind: call
      regex: '(^|\.)notifications\.create$'
