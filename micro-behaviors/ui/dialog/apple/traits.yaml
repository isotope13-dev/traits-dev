# AppleScript/JXA dialog capabilities.
# These observations describe the UI surface itself; credential-phishing intent
# requires separate prompt, automation, and credential-validation evidence.
defaults:
  platforms: [unix]
  for: [javascript, applescript]

traits:
  - id: display-dialog-method-call
    desc: displayDialog method call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "\\.\\s*displayDialog\\s*\\("

  - id: dialog-custom-icon-option
    desc: Dialog custom-icon option token
    crit: component
    conf: 0.7
    if:
      type: text
      word: withIcon
