defaults:
  platforms: [windows]
  for: [python]
  crit: notable

traits:
  - id: winsound-import
    desc: Windows winsound audio module imported
    conf: 0.75
    if:
      type: raw
      regex: import\s+winsound
  - id: winsound-beep
    desc: Windows audio alert via winsound.Beep
    conf: 0.85
    if:
      type: symbol
      regex: winsound\.Beep
