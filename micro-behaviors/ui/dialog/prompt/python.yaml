defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-input-literal-prompt
    desc: Python input prompt with literal text
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: input
      arg:
        kind: string
  - id: input-continue-prompt
    desc: "Python input prompt waits user confirmation"
    crit: notable
    conf: 0.78
    if:
      type: text
      case_insensitive: true
      regex: '\binput\s*\(\s*["''][^"''\n]{0,80}(continue|press|enter)["'']'
