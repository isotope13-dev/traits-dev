defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: input-continue-prompt
    desc: Python input prompt waits for user confirmation
    crit: notable
    conf: 0.78
    if:
      type: text
      case_insensitive: true
      regex: '\binput\s*\(\s*["''][^"''\n]{0,80}(continue|press|enter)["'']'

