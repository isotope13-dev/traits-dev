defaults:
  for: [source]
  platforms:
    - windows
traits:
  - id: messagebox-call-source
    desc: Delphi MessageBox prompt call
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: (?i)\bMessageBox\s*\(
  - id: powershell-prompt-for-credential
    desc: PowerShell credential prompt API
    crit: notable
    conf: 0.95
    for: [powershell]
    if:
      type: text
      regex: (?i)\bPromptForCredential\s*\(
