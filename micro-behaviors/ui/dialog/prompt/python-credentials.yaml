defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-password-input-prompt
    desc: Python CLI input prompt requests a password
    crit: notable
    conf: 0.9
    unless:
      - type: text
        substr: "Please enter the password of nacos"
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])input\([^)]{0,40}[Pp]assword'
  - id: python-username-input-prompt
    desc: Python CLI input prompt requests a username
    crit: component
    conf: 0.85
    unless:
      - type: text
        substr: "Please enter the username of nacos"
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])input\(\s*[a-zA-Z]*["''][^){]{0,40}[Uu]sername'

composite_rules:
  - id: python-credential-input-pair
    desc: Python CLI prompts for both username and password
    crit: notable
    conf: 0.9
    all:
      - id: python-password-input-prompt
      - id: python-username-input-prompt
