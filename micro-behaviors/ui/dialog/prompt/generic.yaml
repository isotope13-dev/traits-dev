defaults:
  platforms: [windows, unix]
  for: [applescript, shell, python, ruby, javascript]

traits:
  - id: click-button
    desc: Prompts the user to click a button
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)click the.{0,30}button'

  - id: node-readline-question-call
    desc: Prompts through Node readline.question
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)readline\.question$'

  - id: press-to-continue
    desc: Prompts the user to continue
    crit: notable
    conf: 0.75
    if:
      type: literal
      regex: (?i)press.{0,30}to continue
    not:
      - regex: (?i)press\s+y\s+to\s+continue
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
