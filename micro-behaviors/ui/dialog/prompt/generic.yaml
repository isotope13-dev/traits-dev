defaults:
  platforms: [windows, unix]
  for: [applescript, shell, python, ruby, javascript]

traits:
  - id: press-to-continue
    desc: Prompts the user to continue
    crit: notable
    conf: 0.75
    if:
      type: literal
      regex: (?i)press.{0,30}to continue
    not:
      - regex: (?i)press\s+y\s+to\s+continue
