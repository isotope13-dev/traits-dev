# Icon manipulation for masquerading infected executables
# Detects function/class names used to inject or extract icons from PE files
defaults:
  platforms: [windows]
  for: [pe, csharp]
  crit: suspicious
  conf: 0.85

traits:
  - id: icon-injector-class
    desc: IconInjector class (icon replacement)
    conf: 0.9
    if:
      type: text
      word: IconInjector

  - id: inject-icon-function
    desc: InjectIcon function name (icon injection)
    conf: 0.9
    if:
      type: text
      word: InjectIcon

  - id: extract-icon-function
    desc: ExtractIcon function name (icon extraction)
    crit: notable
    conf: 0.85
    if:
      type: text
      word: ExtractIcon

  - id: change-icon-class
    desc: ChangeIcon class (icon manipulation)
    crit: component
    conf: 0.88
    if:
      type: text
      word: ChangeIcon

