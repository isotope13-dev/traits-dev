# Graphics Operations
# GDI (Graphics Device Interface) operations
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Device Context ===
  - id: get-device-caps
    desc: Query device capabilities
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "GetDeviceCaps"
  - id: set-bk-color
    desc: Set background color
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "SetBkColor"
  - id: set-bk-mode
    desc: Set background mode (opaque/transparent)
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "SetBkMode"
  - id: set-text-color
    desc: Set text color
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "SetTextColor"
  # === Object Selection ===
  - id: select-object
    desc: Select GDI object
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "SelectObject"
  - id: delete-object
    desc: Delete GDI object
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "DeleteObject"
  # === Brush Creation ===
  - id: create-brush-indirect
    desc: Create brush object
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "CreateBrushIndirect"
  # === Font Creation ===
  - id: create-font-indirect
    desc: Create font object
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "CreateFontIndirectW"
  # === Alpha Blending ===
  - id: alpha-blend
    desc: AlphaBlend alpha blending blit import
    crit: notable
    conf: 0.85
    if:
      type: import
      exact: AlphaBlend
  # === Vulkan graphics API ===
  - id: vulkan-api-ref-text
    desc: Vulkan graphics API reference (text section)
    crit: component
    conf: 0.85
    if:
      type: text
      section: .text
      word: Vulkan
  - id: vulkan-api-ref-rdata
    desc: Vulkan graphics API reference (rdata section)
    crit: component
    conf: 0.85
    if:
      type: text
      section: .rdata
      word: Vulkan
