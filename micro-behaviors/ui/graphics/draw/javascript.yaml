defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.78

traits:
  - id: canvas-2d-context
    desc: Uses canvas 2D context
    if:
      type: text
      regex: '\.getContext\(\s*["'']2d["'']\s*\)'
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file

  - id: canvas-image-data-url
    desc: Canvas exported as image data URL
    if:
      type: text
      regex: '\.toDataURL\(\s*["'']image/'
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content

  - id: construct2-html5-game-runtime
    desc: Construct 2 HTML5 game runtime
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: Generated by Construct 2, the HTML5 game and app creator

  - id: construct2-canvas-runtime-launch
    desc: Construct 2 canvas game runtime launch
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'cr_createRuntime\(\s*["'']c2canvas["'']\s*\)'

  - id: html5-game-sprite-sheet-assets
    desc: Bundled HTML5 game sprite-sheet assets
    crit: notable
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: 'images/[A-Za-z0-9_-]+-sheet[0-9]+\.png'

  - id: animation-frame-loop
    desc: Uses animation frame callback
    if:
      type: symbol
      exact: requestAnimationFrame
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file

composite_rules:
  - id: animated-canvas-rendering
    desc: Renders animated canvas graphics
    crit: notable
    conf: 0.84
    all:
      - id: canvas-2d-context
      - id: animation-frame-loop

  - id: construct2-browser-game
    desc: Construct 2 browser game runtime
    crit: notable
    conf: 0.98
    all:
      - id: construct2-html5-game-runtime
    any:
      - id: construct2-canvas-runtime-launch
      - id: html5-game-sprite-sheet-assets
