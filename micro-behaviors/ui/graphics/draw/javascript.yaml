defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.78

traits:
  - id: canvas-2d-context
    desc: Uses canvas 2D context
    if:
      type: text
      regex: '\.getContext\(\s*["'']2d["'']\s*\)'
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file

  - id: animation-frame-loop
    desc: Uses animation frame callback
    if:
      type: symbol
      exact: requestAnimationFrame
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/scripted::dts-declaration-file

composite_rules:
  - id: animated-canvas-rendering
    desc: Renders animated canvas graphics
    crit: notable
    conf: 0.84
    all:
      - id: canvas-2d-context
      - id: animation-frame-loop
