defaults:
  platforms: [unix, windows, android]
  for: [java, class, jar]
  crit: notable
  conf: 0.78

traits:
  - id: java-png-write
    desc: Java ImageIO PNG write call
    if:
      type: symbol
      kind: call
      regex: '(^|\.)write$'
      arg:
        kind: string
        regex: '(?i)^png$'
