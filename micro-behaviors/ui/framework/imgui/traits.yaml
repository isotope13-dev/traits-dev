# Dear ImGui library detection
# Dear ImGui is an immediate-mode GUI library commonly used in game cheats
# for in-game overlay menus (ESP, aimbot configuration, etc.).
# Its presence in a PE binary is a strong indicator of game-cheat tooling.
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: component
  conf: 0.95
traits:
  - id: dear-imgui-version-string
    desc: Dear ImGui version string
    if:
      type: text
      regex: "Dear ImGui [0-9]+\\.[0-9]+\\.[0-9]+"

  - id: imgui-ini-config
    desc: ImGui configuration file reference
    if:
      type: text
      word: "imgui.ini"

  - id: imgui-log-file
    desc: ImGui debug log file reference
    if:
      type: text
      word: "imgui_log.txt"

  - id: imgui-impl-win32
    desc: ImGui Win32 backend implementation
    if:
      type: text
      word: "imgui_impl_win32"

  - id: imgui-impl-dx11
    desc: ImGui DirectX 11 backend implementation
    if:
      type: text
      word: "imgui_impl_dx11"

  - id: imgui-error-marker
    desc: ImGui error message format string
    if:
      type: text
      substr: "[imgui-error]"

  - id: imgui-ocornut-url
    desc: Dear ImGui GitHub FAQ URL reference
    if:
      type: text
      substr: "github.com/ocornut/imgui"

composite_rules:
  - id: dear-imgui-library
    desc: Dear ImGui immediate-mode GUI library
    crit: notable
    conf: 0.95
    all:
      - id: dear-imgui-version-string
    any:
      - id: imgui-ini-config
      - id: imgui-impl-win32
      - id: imgui-impl-dx11
      - id: imgui-error-marker
      - id: imgui-log-file
      - id: imgui-ocornut-url
    needs: 1
