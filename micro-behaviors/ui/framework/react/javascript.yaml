defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: props-internal-key
    desc: React internal props key
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: __reactProps$
    unless:
      - id: metadata/library/react/
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: well-known/app/macos-benign::mattermost-asar-resource
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - type: path
        regex: '##unicode-escape@'
      - type: text
        substr: "* @license React"

  - id: event-handlers-internal-key
    desc: React internal event-handler key
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: __reactEventHandlers$
    unless:
      - id: metadata/library/react/
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: well-known/app/macos-benign::mattermost-asar-resource
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - type: path
        regex: '##unicode-escape@'
      - type: text
        substr: "* @license React"
