# Makefile Build System Traits
# Detects patterns related to Makefiles and build automation
# ATT&CK: T1195 (Supply Chain Compromise)
defaults:
  for: [binaries, scripts, source, manifests, documents, media, data]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: makefile-basename
    desc: Canonical Makefile basename
    crit: component
    conf: 0.99
    if:
      type: basename
      regex: '^(GNUmakefile|[Mm]akefile)$'
  # === Dummy Targets ===
  - id: install-target-assignment
    desc: Makefile install target
    crit: component
    if:
      type: string
      substr: "install:"
  - id: all-target-assignment
    desc: Makefile all target
    crit: component
    if:
      type: string
      substr: "all:"
  - id: clean-target-assignment
    desc: Makefile clean target
    crit: component
    if:
      type: string
      substr: "clean:"
  # === eBPF Build Targets ===
  - id: ebpf-target-assignment
    desc: Makefile eBPF build target variable
    crit: component
    conf: 0.85
    if:
      type: string
      regex: "^EBPF\\s*[:+?]?="
  # === Binary Hardening in Build ===
  - id: strip-binary-command
    desc: Makefile strips built binaries
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "\\tstrip\\s"
  - id: static-link-flag
    desc: Makefile uses static linking
    crit: component
    conf: 0.8
    if:
      type: string
      regex: '(^|\\s)-static(\\s|$)'
  # === Evasion-Named Build Targets ===
  - id: evasion-target-name-a
    desc: Build target named hider or inject
    crit: component
    conf: 0.7
    if:
      type: string
      regex: ":=\\s*(hider|inject|hook)"
      case_insensitive: true
  - id: evasion-target-name-b
    desc: Build target named rootkit or stealth
    crit: component
    conf: 0.7
    if:
      type: string
      regex: ":=\\s*(rootkit|stealth|backdoor)"
      case_insensitive: true
composite_rules:
  - id: dummy-makefile-targets
    desc: Makefile with empty targets (install/all/clean)
    crit: suspicious
    conf: 0.9
    size_max: 200
    all:
      - id: makefile-basename
    needs: 2
    any:
      - id: install-target-assignment
      - id: all-target-assignment
      - id: clean-target-assignment
  - id: makefile-ebpf-target
    desc: Makefile eBPF build target variable
    crit: notable
    conf: 0.85
    all:
      - id: makefile-basename
      - id: ebpf-target-assignment
  - id: makefile-evasion-target
    desc: Build target with evasion naming
    crit: notable
    conf: 0.7
    all:
      - id: makefile-basename
    any:
      - id: evasion-target-name-a
      - id: evasion-target-name-b
  - id: hardened-build
    desc: Makefile strips and statically links
    crit: notable
    conf: 0.8
    all:
      - id: makefile-basename
      - id: strip-binary-command
      - id: static-link-flag
