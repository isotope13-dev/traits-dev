# Makefile Build System Traits
# Detects patterns related to Makefiles and build automation
# ATT&CK: T1195 (Supply Chain Compromise)

defaults:
  for: [all]
  platforms: [all]

traits:
  # === Dummy Targets ===
  - id: makefile-install-target
    desc: Makefile install target
    crit: component
    if:
      type: string
      substr: "install:"

  - id: makefile-all-target
    desc: Makefile all target
    crit: component
    if:
      type: string
      substr: "all:"

  - id: makefile-clean-target
    desc: Makefile clean target
    crit: component
    if:
      type: string
      substr: "clean:"

  # === eBPF Build Targets ===
  - id: makefile-ebpf-target
    desc: Makefile eBPF build target variable
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: "^EBPF\\s*[:+?]?="

  # === Binary Hardening in Build ===
  - id: makefile-strip-binary
    desc: Makefile strips built binaries
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "\\tstrip\\s"

  - id: makefile-static-link
    desc: Makefile uses static linking
    crit: component
    conf: 0.8
    if:
      type: string
      substr: "-static"

  # === Evasion-Named Build Targets ===
  - id: makefile-evasion-target-a
    desc: Build target named hider or inject
    crit: component
    conf: 0.7
    if:
      type: string
      regex: ":=\\s*(hider|inject|hook)"
      case_insensitive: true

  - id: makefile-evasion-target-b
    desc: Build target named rootkit or stealth
    crit: component
    conf: 0.7
    if:
      type: string
      regex: ":=\\s*(rootkit|stealth|backdoor)"
      case_insensitive: true

composite_rules:
  - id: dummy-makefile-targets
    desc: Makefile with empty targets (install/all/clean)
    crit: suspicious
    conf: 0.9
    size_max: 200
    needs: 2
    any:
      - id: makefile-install-target
      - id: makefile-all-target
      - id: makefile-clean-target

  - id: makefile-evasion-target
    desc: Build target with evasion naming
    crit: notable
    conf: 0.7
    any:
      - id: makefile-evasion-target-a
      - id: makefile-evasion-target-b

  - id: hardened-build
    desc: Makefile strips and statically links
    crit: notable
    conf: 0.8
    all:
      - id: makefile-strip-binary
      - id: makefile-static-link
