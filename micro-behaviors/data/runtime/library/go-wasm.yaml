# Go/TinyGo WebAssembly runtime markers (GOOS=js).
#
# A Go program compiled to WASM links the `syscall/js` package — the bridge
# that lets the WASM guest read, call, and construct JavaScript host values.
# Its symbol names survive into the module's name/data sections as readable
# strings. Presence means the WASM payload can reach whatever the JS host
# exposes (DOM, fetch, and — when the host hoists them onto globalThis — Node
# fs/crypto/child_process), so it is the WASM analogue of a native FFI surface.
defaults:
  platforms: [windows, unix]
  for: [wasm]
  crit: component
  conf: 0.9
traits:
  - id: go-wasm-syscall-js-bridge
    desc: Go WASM with JS host bridge
    crit: notable
    if:
      type: text
      substr: "syscall/js"
  - id: go-wasm-host-value-call
    desc: WASM calls a JS host function
    if:
      type: text
      substr: "syscall/js.valueCall"
  - id: go-wasm-host-value-new
    desc: WASM builds a JS host object
    if:
      type: text
      substr: "syscall/js.valueNew"
composite_rules:
  - id: go-wasm-js-host-interop
    desc: Go WASM payload drives the JavaScript host
    crit: notable
    conf: 0.92
    all:
      - id: go-wasm-syscall-js-bridge
    any:
      - id: go-wasm-host-value-call
      - id: go-wasm-host-value-new
