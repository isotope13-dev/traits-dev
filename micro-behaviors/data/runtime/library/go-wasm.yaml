# Go/TinyGo WebAssembly runtime markers (GOOS=js).
#
# A Go program compiled to WASM links the `syscall/js` package — the bridge
# that lets the WASM guest read, call, and construct JavaScript host values.
# filefacts parses the module's import section, so these match the actual
# `gojs` host imports (exact, spoof-resistant) rather than rodata strings.
# Presence means the payload can reach whatever the JS host exposes (DOM,
# fetch, and — when the host hoists them onto globalThis — Node fs/crypto), so
# it is the WASM analogue of a native FFI surface.
defaults:
  platforms: [windows, unix]
  for: [wasm]
  crit: component
  conf: 0.9
traits:
  - id: go-wasm-syscall-js-bridge
    desc: Go WASM with JS host bridge
    crit: notable
    if:
      type: import
      regex: '^syscall/js\.'
  - id: go-wasm-host-value-call
    desc: WASM calls a JS host function
    if:
      type: import
      exact: "syscall/js.valueCall"
  - id: go-wasm-host-value-new
    desc: WASM builds a JS host object
    if:
      type: import
      exact: "syscall/js.valueNew"
composite_rules:
  - id: go-wasm-js-host-interop
    desc: Go WASM payload drives the JavaScript host
    crit: notable
    conf: 0.92
    all:
      - id: go-wasm-syscall-js-bridge
    any:
      - id: go-wasm-host-value-call
      - id: go-wasm-host-value-new
