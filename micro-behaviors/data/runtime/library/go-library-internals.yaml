defaults:
  platforms: [windows, unix]
  for: [binaries]
  crit: component
  size_max: 52428800
traits:
  - id: go-http-internal-http2transport
    desc: Go net/http http2Transport internal type
    conf: 0.7
    if:
      type: text
      exact: http2Transport
  - id: go-http-internal-persistconn
    desc: Go net/http persistConn internal type
    conf: 0.7
    if:
      type: text
      exact: persistConn
  - id: go-http-internal-wantconn
    desc: Go net/http wantConn internal type
    conf: 0.7
    if:
      type: text
      exact: wantConn
  - id: go-http-internal-roundtripper
    desc: Go net/http RoundTripper internal type
    conf: 0.6
    if:
      type: text
      exact: RoundTripper
  - id: go-http-internal-http2framer
    desc: Go net/http http2Framer internal type
    conf: 0.7
    if:
      type: text
      exact: http2Framer
  - id: go-http-internal-http2clientconn
    desc: Go net/http http2ClientConn internal type
    conf: 0.8
    if:
      type: text
      exact: http2ClientConn
  - id: go-tls-internal-serverhello
    desc: Go crypto/tls serverHello internal type
    conf: 0.7
    if:
      type: text
      exact: serverHello
  - id: go-tls-internal-ciphersuites
    desc: Go crypto/tls CipherSuites internal type
    conf: 0.6
    if:
      type: text
      exact: CipherSuites
  - id: go-tls-internal-peercertificates
    desc: Go crypto/tls peerCertificates internal type
    conf: 0.8
    if:
      type: text
      exact: peerCertificates
  - id: go-tls-internal-handshakecontext
    desc: Go crypto/tls HandshakeContext internal type
    conf: 0.8
    if:
      type: text
      exact: HandshakeContext
  - id: go-http2-framer-internals
    desc: Go HTTP/2 framer internals
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: http2Frame[A-Z]
  - id: go-http2-frame-types
    desc: Go HTTP/2 frame types
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: http2(Ping|GoAway|Data|Settings)Frame
  - id: go-http2-frame-headers
    desc: Go HTTP/2 frame headers/control
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: http2(Headers|RST|Window|Continuation)Frame
  - id: go-http2-transport-internals
    desc: Go HTTP/2 transport internals
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: http2(clientStream|noDialClientConnPool)
  - id: go-tls-handshake-internals
    desc: Go TLS handshake internal types
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: (client|server)Handshake(State|Msg)|HelloMsg
  - id: go-tls-cipher-internals
    desc: Go TLS cipher suite internals
    conf: 0.8
    count_min: 2
    if:
      type: text
      regex: cipherSuite(TLS13)?|SignatureScheme
  - id: go-cryptobyte-asn1-core
    desc: Go cryptobyte ASN.1 core
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: ReadASN1(Integer|Boolean|BitString|ObjectIdentifier)
  - id: go-cryptobyte-asn1-types
    desc: Go cryptobyte ASN.1 types
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: ReadASN1(Element|GeneralizedTime|UTCTime)
  - id: go-cryptobyte-methods
    desc: Go cryptobyte buffer methods
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: ReadUint(8|16|24|32)LengthPrefixed
  - id: go-proxy-connect-header
    desc: Go proxy connect header
    conf: 0.85
    if:
      type: text
      substr: ProxyConnectHeader
  - id: go-proxy-connect-response
    desc: Go proxy connect response
    conf: 0.85
    if:
      type: text
      substr: OnProxyConnectResponse
  - id: go-proxy-is-proxy
    desc: Go proxy detection internal
    conf: 0.8
    if:
      type: text
      substr: isProxy
composite_rules:
  - id: go-http-internals-present
    desc: Go HTTP internal types detected
    crit: component
    conf: 0.8
    any:
      - id: go-http-internal-http2transport
      - id: go-http-internal-persistconn
      - id: go-http-internal-http2clientconn
      - id: go-http-internal-wantconn
      - id: go-http-internal-http2framer
      - id: go-http-internal-roundtripper
  - id: go-tls-internals-present
    desc: Go TLS internal types detected
    crit: component
    conf: 0.8
    any:
      - id: go-tls-internal-serverhello
      - id: go-tls-internal-peercertificates
      - id: go-tls-internal-handshakecontext
      - id: go-tls-internal-ciphersuites
  - id: go-http2-internals-present
    desc: Go HTTP/2 internals present
    crit: component
    conf: 0.85
    any:
      - id: go-http2-framer-internals
      - id: go-http2-frame-types
      - id: go-http2-frame-headers
      - id: go-http2-transport-internals
