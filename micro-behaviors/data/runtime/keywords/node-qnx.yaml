defaults:
  platforms: [unix, windows, qnx]
  for: [javascript, typescript]
traits:
  - id: chunk-seq-headers
    desc: X-Seq HTTP header
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: "X-Seq:"
  - id: fingerprint-string
    desc: References the word "fingerprint"
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: fingerprint
  - id: gzip-sync
    desc: Node gzipSync
    crit: baseline
    conf: 0.94
    if:
      type: text
      substr: gzipSync
  - id: qnx-neutrino-ua
    desc: QNX Neutrino user agent
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: QNX/7.1 (Neutrino; RTOS)
