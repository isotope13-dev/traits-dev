# Pipe-to-interpreter token: stdout piped into a shell or scripting runtime.
# Neutral primitive — legitimate installers use it too. Composites gate it with
# a download client and a run/paste cue to detect download-pipe-exec lures.
defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  crit: component
traits:
- id: pipe-to-bash
  desc: Pipe to bash interpreter token
  conf: 0.88
  if:
    type: text
    regex: '(^|[^|])\|\s+bash\b'
    case_insensitive: true
- id: pipe-to-sh
  desc: Pipe to sh interpreter with an argument
  conf: 0.88
  if:
    type: text
    regex: '(^|[^|])\|\s*sh\s+[-A-Za-z0-9_/]'
    case_insensitive: true
- id: pipe-to-zsh
  desc: Pipe to zsh interpreter token
  conf: 0.88
  if:
    type: text
    regex: '(^|[^|])\|\s+zsh\b'
    case_insensitive: true
- id: pipe-to-python
  desc: Pipe to Python interpreter token
  conf: 0.88
  if:
    type: text
    regex: '(^|[^|])\|\s+python\b'
    case_insensitive: true
- id: pipe-to-node
  desc: Pipe to Node.js runtime token
  conf: 0.88
  if:
    type: text
    # Require a command argument so Ruby block parameters such as
    # `| node |` are not treated as shell pipelines.
    regex: '(^|[^|])\|\s+node[[:space:]]+[^|\n]'
    case_insensitive: true
- id: pipe-to-perl
  desc: Pipe to Perl interpreter token
  conf: 0.88
  if:
    type: text
    regex: '(^|[^|])\|\s+perl\b'
    case_insensitive: true
- id: pipe-to-ruby
  desc: Pipe to Ruby interpreter token
  conf: 0.88
  if:
    type: text
    regex: '(^|[^|])\|\s+ruby\b'
    case_insensitive: true
composite_rules:
- id: pipe-to-shell
  desc: Pipe to a shell interpreter
  crit: component
  conf: 0.88
  any:
  - id: pipe-to-bash
  - id: pipe-to-sh
  - id: pipe-to-zsh
- id: pipe-to-script-runtime
  desc: Pipe to a scripting runtime
  crit: component
  conf: 0.88
  any:
  - id: pipe-to-python
  - id: pipe-to-node
  - id: pipe-to-perl
  - id: pipe-to-ruby
- id: pipe-to-interpreter
  desc: Pipe-to-interpreter token
  crit: component
  conf: 0.88
  any:
  - id: pipe-to-shell
  - id: pipe-to-script-runtime
