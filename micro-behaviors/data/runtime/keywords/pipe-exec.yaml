# Pipe-to-interpreter token: stdout piped into a shell or scripting runtime.
# Neutral primitive — legitimate installers use it too. Composites gate it with
# a download client and a run/paste cue to detect download-pipe-exec lures.
defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  crit: component
traits:
- id: pipe-to-shell
  desc: Pipe to shell interpreter token
  conf: 0.88
  if:
    type: text
    regex: '\|\s*(bash|sh|zsh)\b'
    case_insensitive: true
- id: pipe-to-script-runtime
  desc: Pipe to scripting runtime token
  conf: 0.88
  if:
    type: text
    regex: '\|\s*(python|node|perl|ruby)\b'
    case_insensitive: true
composite_rules:
- id: pipe-to-interpreter
  desc: Pipe-to-interpreter token
  crit: component
  conf: 0.88
  any:
  - id: pipe-to-shell
  - id: pipe-to-script-runtime
