defaults:
  for: [unknown, none]
  platforms: [macos, windows, linux]

traits:
- id: shellcommands-data-json--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '(?i)"(?:id|plugin)"\s*:\s*"obsidian-shellcommands"'
- id: shellcommands-data-json--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"shellCommands"\s*:'
- id: shellcommands-data-json--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"platformSpecificCommands"\s*:'
- id: shellcommands-powershell-stager--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(powershell|pwsh)[\s\S]{0,500}(iwr|Invoke-WebRequest)'
- id: shellcommands-powershell-stager--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(Invoke-Expression|iex)[\s\S]{0,500}(iwr|Invoke-WebRequest)'
- id: shellcommands-powershell-stager--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(powershell|pwsh)[\s\S]{0,500}(Start-BitsTransfer|OutFile)'
- id: shellcommands-powershell-stager--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(Invoke-Expression|iex)[\s\S]{0,500}(Start-BitsTransfer|OutFile)'
- id: shellcommands-osascript-stager
  desc: Obsidian osascript download stager
  crit: suspicious
  conf: 0.96
  platforms: [macos]
  if:
    type: text
    regex: '(?i)(curl|osascript)[\s\S]{0,500}\|\s*osascript'

composite_rules:
- id: obsidian-plugin-download-execution
  desc: Obsidian plugin download execution
  crit: suspicious
  conf: 0.98
  all:
  - id: shellcommands-data-json
  any:
  - id: shellcommands-powershell-stager
  - id: shellcommands-osascript-stager
- id: shellcommands-data-json
  desc: Obsidian shellcommands data JSON
  crit: notable
  conf: 0.94
  any:
  - id: shellcommands-data-json--rx-1
  - id: shellcommands-data-json--rx-2
  - id: shellcommands-data-json--rx-3
  needs: 1
- id: shellcommands-powershell-stager
  desc: Obsidian PowerShell download stager
  crit: suspicious
  conf: 0.96
  any:
  - id: shellcommands-powershell-stager--rx-4
  - id: shellcommands-powershell-stager--rx-5
  - id: shellcommands-powershell-stager--rx-6
  - id: shellcommands-powershell-stager--rx-7
  needs: 1
