# Netdata Identification Traits
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
traits:
- id: netdata-path--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 5
  if:
    type: text
    regex: netdata
    case_insensitive: true
- id: netdata-path--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 5
  if:
    type: text
    regex: NETDATA
    case_insensitive: true
composite_rules:
- id: netdata-path
  desc: File is part of netdata
  crit: baseline
  conf: 0.95
  any:
  - id: netdata-path--rx-1
  - id: netdata-path--rx-2
  needs: 1
