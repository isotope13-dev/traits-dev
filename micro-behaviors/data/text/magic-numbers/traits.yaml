# Generic numeric-token markers. Bare integer strings appear as ports, knock
# values, timeouts, years, etc. in countless binaries — no signal standalone.
# Knock/backdoor composites in other directories gate on them co-occurring
# with a real behavior (BPF socket filter, raw socket, handshake protocol).
defaults:
  platforms: [unix, windows]
  for: [binaries]
  crit: component
  conf: 0.3
traits:
  - id: magic-3458
    desc: 'Numeric token: 3458'
    if:
      type: text
      exact: '3458'
      section: rdata
  - id: magic-9999
    desc: 'Numeric token: 9999'
    if:
      type: text
      exact: '9999'
      section: rdata
  - id: magic-8543
    desc: 'Numeric token: 8543'
    if:
      type: text
      exact: '8543'
      section: rdata
