# DNS tool references in JavaScript source
# Detects nslookup/dig/host commands invoked via child_process.exec
# These are shell DNS tools, not Node.js DNS API calls
# ATT&CK: T1071.004 (Application Layer Protocol: DNS)
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
  mbc: "C0011"
  attack: "T1071.004"
traits:
  - id: nslookup-exec
    desc: nslookup invoked via exec in JS
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(exec|execFile|spawn)\s*\([^)]{0,80}["'']nslookup\b'
    unless:
      - type: text
        substr: "nslookup.com"
      - type: text
        substr: "nslookup.io"
      - type: text
        substr: "dns-nslookup"
      - type: text
        substr: "nslookup.js"
  - id: dig-exec
    desc: dig command invoked via exec in JS
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(exec|execFile|spawn)\s*\([^)]{0,80}["'']dig\b'
    unless:
      - type: text
        substr: "dig.ts"
      - type: text
        substr: "dig.js"
