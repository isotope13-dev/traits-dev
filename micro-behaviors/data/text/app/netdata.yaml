# Netdata Identification Traits
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
traits:
- id: netdata-path--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 5
  if:
    type: text
    case_insensitive: true
    substr: netdata
  count_max: 1011966
- id: netdata-path--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 5
  if:
    type: text
    case_insensitive: true
    substr: NETDATA
  count_max: 1011967
