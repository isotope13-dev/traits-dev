defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
traits:
  - id: electron-ml-parity-token
    desc: Electron ML parity token
    conf: 0.95
    if:
      type: text
      substr: ML_PARITY
  - id: electron-ml-parity-host-response-prefix
    desc: Electron ML parity host response marker
    conf: 0.95
    if:
      type: text
      substr: HOST_RESPONSE_PREFIX
  - id: electron-safe-storage-encrypt
    desc: Electron safeStorage encryptString call
    conf: 0.95
    if:
      type: text
      substr: safeStorage.encryptString
  - id: electron-safe-storage-decrypt
    desc: Electron safeStorage decryptString call
    conf: 0.95
    if:
      type: text
      substr: safeStorage.decryptString
  - id: srp-fast-srp-hap-import
    desc: fast-srp-hap import/reference
    conf: 0.95
    if:
      type: text
      substr: fast-srp-hap
  - id: srp-compute-verifier-call
    desc: SRP computeVerifier call
    conf: 0.95
    if:
      type: text
      substr: SRP.computeVerifier
composite_rules:
  - id: electron-ml-parity-runner
    desc: Electron ML parity test runner
    crit: component
    conf: 0.95
    all:
      - id: electron-ml-parity-token
      - id: electron-ml-parity-host-response-prefix
  - id: electron-safe-storage-base64
    desc: Electron safeStorage base64 serialization
    crit: component
    conf: 0.95
    all:
      - id: electron-safe-storage-encrypt
      - id: electron-safe-storage-decrypt
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
  - id: srp-auth-crypto-context
    desc: Secure Remote Password authentication crypto context
    crit: component
    conf: 0.95
    all:
      - id: srp-fast-srp-hap-import
      - id: srp-compute-verifier-call
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
