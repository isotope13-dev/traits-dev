defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  crit: component
  conf: 0.94

traits:
  - id: clawmetry-name
    desc: ClawMetry product name
    if:
      type: text
      word: ClawMetry
      case_insensitive: true

  - id: observability-dashboard-context
    desc: Observability dashboard wording
    if:
      type: text
      regex: '(observability|dashboard|cloud sync)'
      case_insensitive: true

  - id: openclaw-agent-context
    desc: OpenClaw agent context
    if:
      type: text
      regex: '(OpenClaw|AI agents?)'
      case_insensitive: true

composite_rules:
  - id: clawmetry-observability-dashboard
    desc: ClawMetry observability dashboard context
    crit: component
    conf: 0.94
    all:
      - id: clawmetry-name
    any:
      - id: observability-dashboard-context
      - id: openclaw-agent-context
    near_bytes: 4096
