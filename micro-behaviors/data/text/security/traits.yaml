# Security-related text data
# Detects security signatures, logs, and configuration files
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  # === Security signature database atomic indicators ===
  - id: emerging-threats-url
    desc: Emerging Threats documentation URL
    crit: component
    if:
      type: string_value
      substr: "http://doc.emergingthreats.net"
  - id: security-solution-str
    desc: securitySolution string (single)
    crit: component
    if:
      type: string_value
      substr: "securitySolution"
  - id: security-solution-many
    desc: securitySolution string (6+ occurrences)
    crit: component
    count_min: 6
    if:
      type: string_value
      substr: "securitySolution"
  - id: snort-url
    desc: Snort URL
    crit: component
    if:
      type: string_value
      substr: "http://www.snort.org"
  - id: cve-pattern-many
    desc: CVE pattern (6+ occurrences)
    crit: component
    count_min: 6
    if:
      type: string_value
      regex: "CVE-\\d{4}-\\d{4,}"
  - id: exploit-db-domain
    desc: exploit-db.com domain
    crit: component
    if:
      type: string_value
      substr: "exploit-db.com"
  - id: sanitized-url-regex
    desc: Regex for matching sanitized URLs (hXXp://)
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: 'h\.\.p\[s\]\*:\\/\\/'
composite_rules:
  - id: signatures-db
    desc: Security signature database or threat intelligence feed
    crit: notable
    conf: 0.9
    any:
      - id: emerging-threats-url
      - id: security-solution-many
      - id: snort-url
      - id: cve-pattern-many
      - id: exploit-db-domain
