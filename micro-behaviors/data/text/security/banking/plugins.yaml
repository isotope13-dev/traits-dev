defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: scpbrad-string
    desc: "ScpBrad (Scudo Process Protection) -"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(scpbrad(serv|guard)\.exe|scpncmpsg\.dll)
  - id: gbplugin-string-a
    desc: "GbPlugin (G-Buster Browser Defense) -"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(gbpsv|gbieh|gbpdist)
  - id: gbplugin-string-b
    desc: "GbPlugin (G-Buster Browser Defense) -"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(gbpsv\.exe|gbieh\.dll)
  - id: warsaw-string
    desc: "Warsaw (Diebold Nixdorf) - Brazilian"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)\bwarsaw\.exe\b
composite_rules:
  - id: gbplugin-string
    desc: Reference to GbPlugin (G-Buster Browser Defense) -
    crit: notable
    conf: 0.8
    any:
      - id: gbplugin-string-a
      - id: gbplugin-string-b
