defaults:
  platforms: [windows, unix]
  for: [scripts, source]
traits:
  - id: defensive-command-blocklist
    desc: Defensive dangerous command blocklist
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(BLOCKED_COMMANDS|BLOCKED_COMMAND_PATTERNS|destructive command|dangerous command)'
      case_insensitive: true
  - id: defensive-threat-signatures
    desc: Defensive threat signature catalog
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(MINING_SIGNATURES|TROJAN_SIGNATURES|anti-mining)'
      case_insensitive: true
  - id: defensive-threat-labels
    desc: Defensive threat label catalog
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(anti-trojan|reverse_shell|disk_wipe)'
      case_insensitive: true
