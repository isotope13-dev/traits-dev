defaults:
  platforms: [windows, unix]
  for: [scripts, source, documents]
traits:
  # Auto-generated cloud-provider SDK API-model code (e.g. tencentcloud, boto-
  # style). These files densely document API fields with Sphinx `:type X:`
  # param-type docstrings and name fields after the services they wrap — so a
  # security vendor's SDK legitimately contains "Webshell", "Backdoor",
  # "Reverse Shell", "portScan", etc. as field/enum names. Used as an `unless:`
  # context to suppress malware-keyword FPs on such API models.
  - id: cloud-sdk-api-model
    desc: Auto-generated cloud-SDK API-model code
    crit: component
    conf: 0.95
    for: [python]
    count_min: 15
    if:
      type: text
      regex: ':type \w{1,40}:'
  - id: defensive-command-blocklist
    desc: Defensive dangerous command blocklist
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(BLOCKED_COMMANDS|BLOCKED_COMMAND_PATTERNS)'
      case_insensitive: true
  - id: defensive-dangerous-command-doc
    desc: Defensive dangerous command documentation
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(destructive command|dangerous command|known dangerous patterns)'
      case_insensitive: true
  - id: defensive-suspicious-command-doc
    desc: Defensive suspicious command documentation
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(Suspicious hook command|contains suspicious pattern)'
      case_insensitive: true
  - id: dangerous-code-call-denylist
    desc: Defensive dangerous code-call denylist
    crit: component
    conf: 0.92
    if:
      type: text
      regex: "(dangerous_call|eval\\(','exec\\(','compile\\('|os\\.system\\(','subprocess\\.|pty\\.)"
  - id: defensive-threat-signature-vars
    desc: Defensive threat signature variables
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(MINING_SIGNATURES|TROJAN_SIGNATURES|_THREAT_SIGNATURES)'
      case_insensitive: true
  # A denylist of home credential directories a tool must NEVER browse (e.g. an
  # MCP filesystem guard's `SENSITIVE_HOME_DIRS = [".ssh", ".gnupg", ".aws",
  # ".kube", ...]`). The guard semantics ("should never be browsed", the
  # SENSITIVE_*_DIR naming) are a defensive signal — credential-theft code does
  # not document the dirs it harvests as off-limits — so this mutes the bare
  # `.aws`/`.ssh` reference FPs on such guards.
  - id: sensitive-dir-guard-comment
    desc: Sensitive-directory guard comment or SENSITIVE_*_DIR naming
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)should never be (browsed|accessed|used)|sensitive[_ ]?(home[_ ]?)?dir(ector(y|ies))?\b'
  # A hardening sandbox that builds a minimal child-process env to KEEP
  # credentials away from spawned commands: it strips credential-bearing vars
  # and redirects HOME/TMPDIR to a scratch dir so reads of ~/.npmrc/~/.ssh land
  # in an empty directory. The defensive intent (strip / scratch-instead-of-home)
  # is the opposite of credential theft.
  - id: credential-stripping-sandbox-env
    desc: Credential-stripping sandbox environment builder
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(strip\w* credential|scratch dir\w* instead of)'
  - id: credential-dir-denylist-phrase
    desc: Credential-store directory denylist phrasing
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)credential[- ]?(store|dir)s?.{0,60}(deny|block)[- ]?list'
  - id: defensive-threat-pattern-vars
    desc: Defensive threat pattern variables
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(_THREAT_PATTERNS|THREAT_PATTERNS)'
      case_insensitive: true
  - id: defensive-prompt-pattern-vars
    desc: Defensive prompt pattern variables
    crit: component
    conf: 0.95
    if:
      type: text
      substr: PROMPT_INJECTION_PATTERNS
      case_insensitive: true
  - id: defensive-prompt-pattern-table
    desc: Defensive prompt pattern table
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(prompt_injection_ignore|deception_hide|sys_prompt_override|disregard_rules)'
      case_insensitive: true
  - id: defensive-threat-signature-doc
    desc: Defensive threat signature documentation
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Built-in threat signatures|tool call details'
      case_insensitive: true
  - id: defensive-threat-label-anti-mining
    desc: Defensive anti-mining label
    crit: component
    conf: 0.95
    if:
      type: text
      substr: anti-mining
      case_insensitive: true
  - id: defensive-threat-labels
    desc: Defensive threat label catalog
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(anti-trojan|reverse_shell|disk_wipe)'
      case_insensitive: true

  - id: security-risk-validator-package-summary
    desc: Security risk validator package metadata
    for: [pkginfo]
    crit: component
    conf: 0.94
    if:
      type: value
      path: summary
      regex: 'Validates .* for security, .* risks'
      case_insensitive: true

  - id: defensive-security-scanner-detecting-phrase
    desc: Defensive security scanner detecting phrase
    for: [python]
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)scanner (module )?for detecting'

  - id: defensive-security-risk-target-phrase
    desc: Defensive security-risk target phrase
    for: [python]
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)security risks|permission violations|prompt injection'

  - id: risk-definition-constructor-call
    desc: Risk definition constructor call
    for: [python]
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: RiskDefinition

  - id: scanner-module-field
    desc: Scanner module assignment field
    for: [python]
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'scanner_modules=[ScannerModule.'

  - id: evidence-collector-artifacts
    desc: Defensive evidence collector artifacts
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\b(signal_overrides|precondition_checks|collector_meta|collector_errors)\b'

  - id: evidence-collector-captured-fields
    desc: Defensive collector captured fields
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\b(captured|artifacts?|collector_id)\b'

  - id: security-playbook-artifacts
    desc: Security playbook artifact catalog
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(playbook_id|false_positive_checks_required)\b'

  - id: companion-collector-doc
    desc: Companion collector documentation
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Companion collector

  - id: security-posture-scanner-doc
    desc: Security posture scanner documentation
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'security posture signals|All discovery is read-only|Environment scanner'

  - id: wpsecscan-package-summary
    desc: WPSecScan defensive package metadata

    for: [pkginfo]
    crit: component
    conf: 0.98
    if:
      type: value
      path: summary
      regex: 'Defensive WordPress security scanner.*Authorized testing only'

  - id: wpsecscan-check-module
    desc: WPSecScan check module Finding import
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: text
      regex: 'from \.\.?models import .{0,120}Finding'

  - id: wpsecscan-check-signature
    desc: WPSecScan check module function signature
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: text
      regex: 'def\s+check\s*\(\s*client:\s*Client,\s*ctx:\s*dict\s*\)\s*->\s*list\[Finding\]'

  - id: wpsecscan-cli-context
    desc: WPSecScan CLI/module text context
    crit: component
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: 'wpsecscan\s+(--daemon|scan-zip)|python -m wpsecscan'

  - id: wordpress-security-plugin-header
    desc: WordPress security plugin metadata
    crit: component
    conf: 0.94
    for: [php]
    if:
      type: text
      regex: '\*\s*(Plugin Name|Text Domain):.{0,120}(security|firewall|malware|scanner)'
      case_insensitive: true

  - id: wordpress-malware-scanner-class
    desc: WordPress malware scanner class
    crit: component
    conf: 0.94
    for: [php]
    if:
      type: text
      regex: '\bclass[-_ ]?(malware|file|password|user)[-_ ]?scanner\b'
      case_insensitive: true

  - id: wordpress-yara-signature-scanner
    desc: WordPress YARA signature scanner
    crit: component
    conf: 0.94
    for: [php]
    if:
      type: text
      regex: '\b(yara[-_ ]?scanner|signature[-_ ]?sync)\b'
      case_insensitive: true

  - id: wordpress-threat-pattern-catalog
    desc: WordPress threat pattern catalog
    crit: component
    conf: 0.95
    for: [php]
    if:
      type: text
      regex: "(rule_id|category|issue_type).{0,160}(webshell|backdoor|malware|signature)"
      case_insensitive: true

  - id: wordpress-strong-password-validator
    desc: WordPress strong password validator
    crit: component
    conf: 0.95
    for: [php]
    if:
      type: text
      regex: '\b(Strong[_ ]Password[_ ]Validator|weak_passwords|blocked_words)\b'
      case_insensitive: true

  - id: wordpress-password-security-scanner
    desc: WordPress password security scanner
    crit: component
    conf: 0.95
    for: [php]
    if:
      type: text
      regex: '\b(common_weak_passwords|password strength|most common passwords)\b'
      case_insensitive: true

  - id: wordpress-suspicious-file-patterns
    desc: WordPress suspicious file pattern catalog
    crit: component
    conf: 0.94
    for: [php]
    if:
      type: text
      regex: '\b(suspicious_patterns|should_exclude_scanner_target)\b'
      case_insensitive: true

  - id: wordpress-issue-type-catalog
    desc: WordPress malware issue type catalog
    crit: component
    conf: 0.94
    for: [php]
    if:
      type: text
      regex: '\b(TYPE_WEBSHELL|TYPE_BACKDOOR|TYPE_MALWARE|TYPE_TROJAN)\b'

  - id: secret-pattern-description-field
    desc: Secret scanner description field
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'description:\s*".{0,120}"'

  # A secret-LEAK redactor catalogs `{ pattern: /.../, suggest: 'process.env.X' }`
  # entries — it detects hardcoded secrets and tells the author to use an env
  # var instead. The `suggest: 'process.env.<NAME>'` field is the giveaway:
  # credential-theft code reads `process.env.X` as an expression, it never
  # *quotes* the env path as a remediation hint. Requiring several such entries
  # avoids matching a one-off string.
  - id: secret-redactor-suggest-field
    desc: Secret redactor env-var remediation suggestion
    crit: component
    conf: 0.92
    count_min: 3
    if:
      type: text
      regex: "suggest:\\s*['\"]process\\.env\\."

  # Function/array names of a secret leak scanner / redactor module.
  - id: secret-redactor-symbols
    desc: Secret redactor / leak-scanner function names
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(LEAK_SCANNERS|redactString|redactSecrets?|sanitizePayload|scanForLeaks)\b'

  - id: secret-pattern-severity-field
    desc: Secret scanner severity field
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'severity\s*:'

  - id: secret-pattern-private-key-label
    desc: Secret scanner private-key label
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Private Key|Secret Key'

  - id: secret-pattern-token-label
    desc: Secret scanner token label
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Personal Access Token|Service Account Key|Access Key ID'

composite_rules:
  # A denylist of home credential directories a tool must NEVER browse (e.g. an
  # MCP filesystem guard's `SENSITIVE_HOME_DIRS = [".ssh", ".aws", ".kube", …]`).
  # The guard semantics are defensive — credential-theft code does not document
  # the dirs it harvests as off-limits — so this mutes bare `.aws`/`.ssh`
  # reference FPs on such guards.
  - id: defensive-sensitive-dir-denylist
    desc: Defensive sensitive-directory denylist guard
    crit: component
    conf: 0.9
    any:
      - id: sensitive-dir-guard-comment
      - id: credential-dir-denylist-phrase
      - id: credential-stripping-sandbox-env
  - id: secret-pattern-scanner-db
    desc: Secret-detection pattern database
    crit: component
    conf: 0.95
    # A secret-scanning tool describes what each secret looks like:
    # `KEY:{regex:/.../g,description:"... Private Key",severity:x}`.
    # This is a detection ruleset entry, not code accessing a secret.
    all:
      - id: secret-pattern-description-field
      - id: secret-pattern-severity-field
    any:
      - id: secret-pattern-private-key-label
      - id: secret-pattern-token-label

  - id: defensive-security-scanner-module-doc
    desc: Defensive security scanner module documentation
    crit: component
    conf: 0.94
    all:
      - id: defensive-security-scanner-detecting-phrase
      - id: defensive-security-risk-target-phrase

  # Secret-leak redactor context (scanner-context-inversion). A module that
  # redacts hardcoded secrets out of payloads legitimately contains a catalog of
  # credential names (NPM_TOKEN, GITHUB_TOKEN, AWS_ACCESS_KEY_ID, …) as detection
  # strings. Used as an `unless:` to mute credential-access FPs — the env-name
  # atoms match `string_literal process.env.X`, which is a *quoted* remediation
  # hint here, never real access.
  - id: secret-redactor-context
    desc: Secret-leak redactor / sanitizer tool context
    crit: component
    conf: 0.95
    any:
      - id: secret-redactor-suggest-field
      - id: secret-redactor-symbols
      - id: secret-pattern-scanner-db

  # Umbrella over the defensive security-tool contexts (SAST integration, LLM
  # scanner, threat-signature catalogs, sensitive-dir denylists, secret
  # redactors). Collapses several `unless:` entries into one on the credential
  # traits that all of these legitimately trip.
  - id: defensive-scanner-tool-context
    desc: Defensive secret/threat scanner or sandbox context
    for: [binaries, scripts, source, documents, pkginfo]
    crit: component
    conf: 0.95
    any:
      - id: security-risk-validator-package-summary
      - id: well-known/tool/detection/sast::sast-scanner-integration
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: defensive-threat-signatures
      - id: defensive-security-scanner-module-doc
      - id: defensive-risk-definition-catalog
      - id: defensive-sensitive-dir-denylist
      - id: dangerous-code-call-denylist
      - id: secret-redactor-context
      - id: defensive-evidence-collector
      - id: well-known/tool/detection/watchmen::watchmen-cli-context

  - id: defensive-wordpress-scanner
    desc: Defensive WordPress scanner package or module
    crit: component
    conf: 0.98
    any:
      - id: wpsecscan-package-summary
      - id: wpsecscan-check-module-context
      - id: well-known/tool/detection/wpsecscan::defensive-scanner-context
      - id: defensive-wordpress-security-plugin
  - id: defensive-wordpress-security-plugin
    desc: Defensive WordPress security plugin scanner
    crit: component
    conf: 0.96
    all:
      - id: wordpress-security-plugin-header
    any:
      - id: wordpress-malware-scanner-class
      - id: wordpress-yara-signature-scanner
      - id: wordpress-threat-pattern-catalog
      - id: wordpress-strong-password-validator
      - id: wordpress-password-security-scanner
      - id: wordpress-suspicious-file-patterns
      - id: wordpress-issue-type-catalog
  - id: wpsecscan-check-module-context
    desc: WPSecScan defensive check module
    crit: component
    conf: 0.98
    all:
      - id: wpsecscan-check-module
      - id: wpsecscan-check-signature
  - id: defensive-threat-signatures
    desc: Defensive threat signature catalog
    crit: component
    conf: 0.95
    any:
      - id: defensive-threat-signature-vars
      - id: defensive-threat-pattern-vars
      - id: defensive-prompt-pattern-vars
      - id: defensive-threat-signature-doc
      - id: defensive-threat-label-anti-mining
      - id: defensive-threat-labels
      - id: defensive-prompt-pattern-table
      - id: defensive-command-blocklist
      - id: defensive-dangerous-command-doc
      - id: defensive-suspicious-command-doc
      - id: defensive-wordpress-scanner
      - id: wordpress-threat-pattern-catalog
      - id: micro-behaviors/data/text/app::akm-install-audit-changelog
      - id: wordpress-suspicious-file-patterns
      - id: wordpress-issue-type-catalog
      - id: defensive-risk-definition-catalog
  - id: defensive-risk-definition-catalog
    desc: Defensive risk definition catalog
    crit: component
    conf: 0.94
    all:
      - id: risk-definition-constructor-call
      - id: scanner-module-field
  - id: defensive-evidence-collector
    desc: Defensive evidence collector implementation
    crit: notable
    conf: 0.96
    any:
      - id: defensive-wordpress-scanner
      - id: defensive-evidence-collector-artifacts
  - id: defensive-evidence-collector-artifacts
    desc: Defensive evidence collector artifacts and captured fields
    crit: notable
    conf: 0.96
    all:
      - id: evidence-collector-artifacts
    any:
      - id: evidence-collector-captured-fields
      - id: security-playbook-artifacts
      - id: companion-collector-doc
