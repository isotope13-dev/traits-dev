defaults:
  platforms: [windows, unix]
  for: [scripts, source]

# Secret-redaction/scrubbing layer: code that strips credentials out of logs
# or telemetry before they are written or sent. The give-away is a denylist
# alternation of secret/auth-header names (e.g. `secret|token|cookie|x-api-key`)
# paired with a REDACTED replacement marker. Harvesting code grabs tokens; it
# does not build a header-redaction denylist. Used as an `unless:` context to
# mute credential-harvest FPs on apps that scrub their own logs/telemetry.
traits:
  - id: secret-scrub-denylist-fragment
    desc: Secret/auth-header redaction denylist
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)secret\|token\|cookie|bearer\|api[_-]?key'
  - id: redacted-replacement-marker
    desc: REDACTED replacement marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'REDACTED'

composite_rules:
  - id: secret-redaction-layer
    desc: Secret redaction/scrubbing layer
    crit: notable
    conf: 0.92
    all:
      - id: secret-scrub-denylist-fragment
      - id: redacted-replacement-marker
