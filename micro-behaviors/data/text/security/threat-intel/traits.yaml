defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: emerging-threats-url
    desc: Emerging Threats documentation URL
    crit: component
    if:
      type: text
      substr: http://doc.emergingthreats.net
  - id: security-solution-str
    desc: securitySolution string (single)
    crit: component
    if:
      type: text
      substr: securitySolution
  - id: security-solution-many
    desc: securitySolution string (6+ occurrences)
    crit: component
    count_min: 6
    if:
      type: text
      substr: securitySolution
  - id: snort-url
    desc: Snort URL
    crit: component
    if:
      type: text
      substr: http://www.snort.org

  - id: cve-pattern-many
    desc: CVE pattern (6+ occurrences)
    crit: component
    count_min: 6
    if:
      type: text
      regex: CVE-\d{4}-\d{4,}
      case_insensitive: true
  - id: exploit-db-domain
    desc: exploit-db.com domain
    crit: component
    if:
      type: text
      substr: exploit-db.com
  - id: sanitized-url-regex
    desc: Regex for matching sanitized URLs (hXXp://)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: h\.\.p\[s\]\*:\\/\\/
  - id: advisory-source-identifiers
    desc: Security advisory source identifiers
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '\b(GHSA|OSV|NVD|CISA)\b'
      case_insensitive: true
  - id: primary-advisory-sources
    desc: Primary advisory source names
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(Qualys|RHSA|USN|ZDI)\b'
      case_insensitive: true
  - id: advisory-feed-field
    desc: Advisory feed metadata field
    crit: component
    conf: 0.9
    if:
      type: text
      word: published_at
  - id: malware-catalog-id
    desc: Malware catalog identifier
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bMAL-\d{4}-[A-Z0-9-]{4,}'
  - id: zeroday-lessons-catalog
    desc: Zeroday lessons catalog
    crit: component
    conf: 0.9
    if:
      type: text
      word: zeroday-lessons
  - id: threat-intel-text
    desc: Malware incident catalog text
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(threat intelligence|threat-intel|post-mortem)\b'
      case_insensitive: true
composite_rules:
  - id: signatures-db
    desc: Security signature database or threat intelligence feed
    crit: notable
    conf: 0.9
    any:
      - id: emerging-threats-url
      - id: security-solution-many
      - id: snort-url
      - id: cve-pattern-many
      - id: exploit-db-domain
      - id: advisory-source-identifiers
      - id: primary-advisory-sources
      - id: advisory-feed-field
      - id: malware-catalog-id
      - id: zeroday-lessons-catalog
      - id: threat-intel-text
