defaults:
  platforms: [windows, unix]
  for: [scripts, source, pkginfo, pyproject.toml]
traits:
  # CommonHuman-Lab ships `commonhuman-payloads`, a declared, zero-dependency
  # corpus of XSS / SQLi / WAF attack-payload *strings* (PyPI keywords
  # "payloads,pentest,security", AGPL-3.0, source on github.com/commonhuman-lab).
  # Every module carries the SPDX + CommonHuman-Lab copyright header, and the
  # package METADATA names the lab as Author. The payloads are inert data — no
  # eval/exec/subprocess runs them and nothing sends them over the network — so
  # the literal `shell.php`, `COPY ... TO PROGRAM`, `new Function(`, and the
  # "payload" keyword are corpus contents, not behavior. Used as an `unless:`
  # context to mute those single-atom FPs on this specific library. Requires
  # BOTH the lab attribution and the AGPL SPDX in the same file, so the scope is
  # this corpus only — it will not suppress real malware that merely embeds the
  # same payload strings.
  - id: commonhuman-lab-attribution
    desc: CommonHuman-Lab copyright/author attribution
    crit: component
    conf: 0.95
    if:
      type: text
      substr: CommonHuman-Lab
  - id: agpl-spdx-header
    desc: AGPL-3.0 SPDX license identifier
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AGPL-3.0-or-later
  # PKG-INFO / METADATA is parsed into a value tree, so the source-header text
  # atoms above never match it. These mirror the same attribution against the
  # structured metadata fields (author, summary, license).
  - id: commonhuman-lab-author
    desc: CommonHuman-Lab package author/summary
    crit: component
    conf: 0.95
    for: [pkginfo, pyproject.toml]
    if:
      type: value
      path: author
      substr: CommonHuman-Lab
  - id: commonhuman-lab-summary
    desc: CommonHuman-Lab package summary
    crit: component
    conf: 0.9
    for: [pkginfo, pyproject.toml]
    if:
      type: value
      path: summary
      substr: CommonHuman-Lab
  - id: agpl-license-field
    desc: AGPL-3.0 license metadata field
    crit: component
    conf: 0.85
    for: [pkginfo, pyproject.toml]
    if:
      type: value
      path: license
      substr: AGPL-3.0
composite_rules:
  - id: pentest-payload-corpus
    desc: CommonHuman-Lab pentest payload corpus
    crit: component
    conf: 0.95
    all:
      - id: commonhuman-lab-attribution
      - id: agpl-spdx-header
  - id: pentest-payload-corpus-pkg
    desc: CommonHuman-Lab pentest payload corpus metadata
    crit: component
    conf: 0.95
    for: [pkginfo, pyproject.toml]
    all:
      - id: agpl-license-field
    any:
      - id: commonhuman-lab-author
      - id: commonhuman-lab-summary
