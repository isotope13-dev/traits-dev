defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
traits:
  - id: android-manifest-path
    desc: Android manifest path reference
    if:
      type: text
      substr: "AndroidManifest.xml"
  - id: android-build-context
    desc: Android build or manifest context
    crit: component
    if:
      type: text
      regex: 'com\.android\.application|defaultConfig|build\.gradle|AndroidManifest\.xml'
  - id: application-id-field-name
    desc: applicationId field name
    crit: component
    if:
      type: text
      substr: "applicationId"
  - id: android-gradle-version-update
    desc: Android Gradle version update
    if:
      type: text
      substr: "versionCode"
composite_rules:
  - id: android-application-id-update
    desc: Android applicationId update
    crit: notable
    conf: 0.9
    all:
      - id: android-build-context
      - id: application-id-field-name
  - id: android-app-identity-rewrite
    desc: Android app identity rewrite
    crit: notable
    conf: 0.9
    all:
      - id: android-manifest-path
    any:
      - id: android-application-id-update
      - id: android-gradle-version-update
