defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
traits:
  - id: android-deeplink-intent-filter
    desc: Android deep-link intent filter
    if:
      type: text
      substr: "android.intent.action.VIEW"
  - id: android-autoverify-link
    desc: Android autoVerify deep link
    if:
      type: text
      substr: "android:autoVerify"
  - id: ios-url-types-config
    desc: iOS URL types config
    if:
      type: text
      substr: "CFBundleURLTypes"
  - id: apple-associated-domains
    desc: Apple associated domains entitlement
    if:
      type: text
      substr: "com.apple.developer.associated-domains"
  - id: android-deeplink-rewriter
    desc: Android deep-link rewriter
    if:
      type: symbol
      exact: applyAndroidDeepLinks
  - id: ios-deeplink-rewriter
    desc: iOS deep-link rewriter
    if:
      type: symbol
      exact: applyIosDeepLinks
composite_rules:
  - id: mobile-deeplink-config-rewrite
    desc: Mobile deep-link config rewrite
    crit: notable
    conf: 0.92
    needs: 3
    any:
      - id: micro-behaviors/data/text/config/deeplink
