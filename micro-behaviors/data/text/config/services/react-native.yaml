defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
traits:
  - id: android-google-services-config
    desc: Android Google services config
    if:
      type: text
      substr: "google-services.json"
  - id: ios-google-service-info-config
    desc: iOS Google service info config
    if:
      type: text
      substr: "GoogleService-Info.plist"
  - id: android-google-services-copy
    desc: Copies Android Google services config
    if:
      type: symbol
      exact: applyAndroidGoogleServices
  - id: ios-google-service-copy
    desc: Copies iOS Google service config
    if:
      type: symbol
      exact: applyIosGoogleServices
composite_rules:
  - id: mobile-google-services-config-copy
    desc: Copies mobile Google services config
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: android-google-services-config
      - id: ios-google-service-info-config
      - id: android-google-services-copy
      - id: ios-google-service-copy
