defaults:
  platforms: [openwrt]
  for: [java, class]

traits:
  - id: openwrt-updates-domain-bytecode
    desc: OpenWrt updates domain in JVM artifact
    crit: notable
    conf: 0.84
    if:
      type: hex
      pattern: 75 70 64 61 74 65 73 2E 6F 70 65 6E 77 72 74 2E 6F 72 67

  - id: openwrt-download-domain-bytecode
    desc: OpenWrt download domain in JVM artifact
    crit: notable
    conf: 0.84
    if:
      type: hex
      pattern: 64 6F 77 6E 6C 6F 61 64 2E 6F 70 65 6E 77 72 74 2E 6F 72 67

  - id: localhost-redirect-bytecode
    desc: Localhost redirect literal in JVM artifact
    crit: notable
    conf: 0.82
    if:
      type: hex
      pattern: 31 32 37 2E 30 2E 30 2E 31

composite_rules:
  - id: openwrt-update-domain-bytecode
    desc: OpenWrt update or download domain in JVM artifact
    crit: notable
    conf: 0.86
    any:
      - id: openwrt-updates-domain-bytecode
      - id: openwrt-download-domain-bytecode
