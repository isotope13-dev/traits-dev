defaults:
  platforms: [macos]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
traits:
  - id: xcode-scheme-file-marker
    desc: Xcode scheme file marker
    if:
      type: text
      substr: ".xcscheme"
  - id: xcode-scheme-renamer
    desc: Xcode scheme renamer
    if:
      type: symbol
      exact: applyXcodeSchemes
  - id: xcode-scheme-management-update
    desc: Xcode scheme management update
    if:
      type: symbol
      exact: updateSchemeManagementPlist
  - id: xcode-user-state-cleanup
    desc: Xcode user state cleanup
    if:
      type: symbol
      exact: deleteStaleXcuserstate
  - id: plutil-xml-convert-command
    desc: plutil XML conversion command
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: "execSync\\s*\\(\\s*`?['\"]?plutil\\s+-convert\\s+xml1"
composite_rules:
  - id: xcode-scheme-config-rewrite
    desc: Xcode scheme config rewrite
    crit: notable
    conf: 0.92
    needs: 2
    any:
      - id: micro-behaviors/data/text/config/xcode
