defaults:
  platforms: [unix, android]
  for: [elf, shell, c, cpp]
  attack: T1105
traits:
  - id: android-local-tmp-cd
    desc: Android local tmp staging
    crit: component
    conf: 0.9
    if:
      type: text
      substr: cd /data/local/tmp/
  - id: android-local-tmp-path
    desc: Android local tmp path
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /data/local/tmp
  - id: android-tmp-output-download
    desc: Downloads payload to Android tmp
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '-O\s+/data/local/tmp/[A-Za-z0-9._-]+'
  - id: android-tmp-chmod-exec
    desc: Chmods and executes Android tmp payload
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'chmod\s+\+x\s+/data/local/tmp/.{1,40}/data/local/tmp/'
  - id: busybox-wget-http-script
    desc: BusyBox wget script download
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bbusybox wget\s+https?://.{0,50}\.sh\b'
  - id: curl-http-script
    desc: Curl script download command
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\bcurl\s+https?://.{0,50}\.sh\b'
  - id: shell-executes-downloaded-scripts
    desc: Executes downloaded shell scripts
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bsh\s+[A-Za-z0-9._-]+\.sh;.{0,80}\bsh\s+[A-Za-z0-9._-]+\.sh\b'
