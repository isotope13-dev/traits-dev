defaults:
  for: [none]
  platforms: [unix]
traits:
  - id: tmpdir-change-directory
    desc: Changes into TMPDIR
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '\bcd\s+\$TMPDIR\b'
  - id: curl-download-external-ip
    desc: Curl downloads from external IP
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '\bcurl\s+-O\s+https?://([1-9][0-9]{0,2}\.){3}[1-9][0-9]{0,2}/[A-Za-z0-9._-]+'
  - id: curl-download-tmp-file
    desc: Curl downloads directly to /tmp file
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '\bcurl\b.{0,60}\s-o\s+/tmp/[A-Za-z0-9._-]+'
  - id: curl-download-quiet-domain
    desc: Quiet curl domain download
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: '\bcurl\s+-[A-Za-z]*[fkLsS]{2,}[A-Za-z]*\s+https?://'
  - id: xattr-clear-local-file
    desc: Clears local extended attributes
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '\bxattr\s+-c\s+\./[A-Za-z0-9._-]+'
  - id: xattr-clear-tmp-file
    desc: Clears extended attributes from /tmp file
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '\bxattr\s+-c\s+/tmp/[A-Za-z0-9._-]+'
  - id: chmod-exec-local-file
    desc: Makes local file executable
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '\bchmod\s+\+x\s+\./[A-Za-z0-9._-]+'
  - id: chmod-exec-tmp-file
    desc: Makes /tmp file executable
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '\bchmod\s+\+x\s+/tmp/[A-Za-z0-9._-]+'
  - id: executes-local-downloaded-file
    desc: Executes local downloaded file
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '&&\s*\./[A-Za-z0-9._-]+(\s|$)'
  - id: executes-tmp-file
    desc: Executes /tmp file
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '(^|[\s;&|])\/tmp\/[A-Za-z0-9._-]+(\s|$)'
