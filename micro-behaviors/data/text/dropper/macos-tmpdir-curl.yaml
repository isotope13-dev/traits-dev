defaults:
  for: [shell]
  platforms: [unix]
traits:
  - id: tmpdir-change-directory
    desc: Shell changes into temporary directory
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcd\s+\$TMPDIR\b'
  - id: curl-download-external-ip
    desc: Curl downloads payload from external IP
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcurl\s+-O\s+https?://([1-9][0-9]{0,2}\.){3}[1-9][0-9]{0,2}/[A-Za-z0-9._-]+'
  - id: curl-download-tmp-file
    desc: Curl downloads payload into /tmp
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcurl\b.{0,60}\s-o\s+/tmp/[A-Za-z0-9._-]+'
  - id: curl-download-quiet-domain
    desc: Curl quietly downloads remote payload
    crit: notable
    conf: 0.85
    unless:
      - id: well-known/app/opencode-router
    if:
      type: text
      regex: '\bcurl\s+-[A-Za-z]*[fkLsS]{2,}[A-Za-z]*\s+https?://'
  - id: curl-quiet-hash-path
    desc: Quiet curl fetches hash path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bcurl\s+-[A-Za-z]*[fkLsS]{2,}[A-Za-z]*\s+https?://.{1,80}/[a-fA-F0-9]{32,64}\b'
  - id: curl-workflow-update-path
    desc: Curl fetches workflow update path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bcurl\b.{0,80}/(n8n|workflow|agent)/(update|helper)\b'
  - id: xattr-clear-local-file
    desc: xattr clears local file metadata
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bxattr\s+-c\s+\./[A-Za-z0-9._-]+'
  - id: xattr-clear-tmp-file
    desc: xattr clears /tmp file metadata
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bxattr\s+-c\s+/tmp/[A-Za-z0-9._-]+'
  - id: chmod-exec-local-file
    desc: chmod makes local payload executable
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bchmod\s+\+x\s+\./[A-Za-z0-9._-]+'
  - id: chmod-exec-tmp-file
    desc: chmod makes /tmp payload executable
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bchmod\s+\+x\s+/tmp/[A-Za-z0-9._-]+'
  - id: executes-local-downloaded-file
    desc: Shell executes local relative file
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '&&\s*\./[A-Za-z0-9._-]+(\s|$)'
  - id: executes-tmp-file-exec
    desc: Shell execs /tmp path directly
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s;&])exec\s+\/tmp\/[A-Za-z0-9._-]+(\s|$)'
  - id: executes-tmp-file-shell
    desc: Shell runs /tmp path via shell
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s;&])([bz]?sh)\s+\/tmp\/[A-Za-z0-9._-]+(\s|$)'
  - id: executes-tmp-file-source
    desc: Shell sources /tmp path directly
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s;&])(\.|source)\s+\/tmp\/[A-Za-z0-9._-]+(\s|$)'
  - id: tmp-rust-text-file-context
    desc: Temporary Rust or text file context
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '/tmp/[A-Za-z0-9._-]+\.(rs|txt)\b'
  - id: tmp-my-bundles-context
    desc: my-bundles temporary path context
    crit: component
    conf: 0.86
    if:
      type: text
      substr: /tmp/my-bundles
  - id: tmp-rustc-compile-run-context
    desc: rustc temporary compile-run context
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'rustc\s+(-O\s+)?/tmp/.{1,40}\s+-o\s+/tmp/.{1,40}\s*&&\s*/tmp/.{1,40}'
  - id: tmp-rustc-main-optimized-context
    desc: rustc optimized temporary main context
    crit: component
    conf: 0.86
    if:
      type: text
      substr: rustc -O /tmp/main.rs -o /tmp/m
  - id: tmp-rustc-main-context
    desc: rustc temporary main context
    crit: component
    conf: 0.86
    if:
      type: text
      substr: rustc /tmp/main.rs -o /tmp/m
composite_rules:
  - id: executes-tmp-file
    desc: Shell executes /tmp path directly
    crit: notable
    conf: 0.9
    any:
      - id: executes-tmp-file-exec
      - id: executes-tmp-file-shell
      - id: executes-tmp-file-source
    unless:
      - id: tmp-rust-text-file-context
      - id: tmp-my-bundles-context
      - id: tmp-rustc-compile-run-context
      - id: tmp-rustc-main-optimized-context
      - id: tmp-rustc-main-context
