defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: nlp-tokenization-nltk
    desc: Uses NLP library for tokenization
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "nltk"
  - id: nlp-tokenization-word-tokenize
    desc: Uses NLP library for tokenization
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "word_tokenize"
  - id: bigram-generation
    desc: Generates bigrams/word pairs
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: "word_pairs"
composite_rules:
  - id: nlp-tokenization
    desc: Uses NLP library for tokenization
    crit: notable
    conf: 0.8
    any:
      - id: nlp-tokenization-nltk
      - id: nlp-tokenization-word-tokenize
