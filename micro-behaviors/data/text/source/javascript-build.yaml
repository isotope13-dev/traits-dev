defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
  - id: webpack-sourceurl-comment
    desc: webpack sourceURL comment
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "sourceURL=webpack:///"
  - id: icon-registry-bundle
    # A long run of consecutive PascalCaseName:shortRef pairs is the shape of a
    # bundled icon/component registry (lucide, feather, react-icons). The
    # PascalCase keys collide with bare-word threat terms (Worm, Skull, Bomb,
    # Biohazard) and produce false positives in word-based malware-term markers.
    desc: Bundled icon/component name registry
    crit: component
    conf: 1.0
    for: [javascript, typescript]
    if:
      type: text
      regex: '([A-Z][A-Za-z]{2,20}:[A-Za-z$_]{1,4},){8,}'
