defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: python-import-from-statement
    desc: Python import-from statement
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'from\s+[A-Za-z_][A-Za-z0-9_.]{0,80}\s+import\s+[A-Za-z_][A-Za-z0-9_]*'
  - id: python-py-extension-literal
    desc: Python .py extension literal
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\.py["'']'
  - id: python-datetime-threshold
    desc: Python datetime date threshold
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'datetime\([0-9]{4},\s*[0-9]{1,2},\s*[0-9]{1,2}'
  - id: python-timezone-utc
    desc: Python timezone.utc reference
    crit: component
    conf: 0.8
    if:
      type: text
      substr: timezone.utc
