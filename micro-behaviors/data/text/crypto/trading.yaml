defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  conf: 0.5
  for: [scripts, binaries]
traits:
  - id: defi-protocol-dex
    desc: DEX protocol references (Uniswap/Sushiswap/Pancakeswap)
    if:
      type: string_value
      regex: (?i)(uniswap|sushiswap|pancakeswap)
  - id: defi-protocol-aave
    desc: DeFi lending protocol reference (Aave)
    if:
      type: string_value
      word: aave
      case_insensitive: false
  - id: defi-protocol-compound-core
    desc: DeFi lending protocol reference (Compound core)
    if:
      type: string_value
      regex: (?i)\bcompound\s*(finance|protocol|v2|v3)\b
  - id: defi-protocol-compound-ecosystem
    desc: DeFi lending protocol reference (Compound ecosystem)
    if:
      type: string_value
      regex: (?i)\bcompound\s*(comet|governance|market)\b
  - id: defi-protocol-compound-token
    desc: DeFi lending protocol reference (Compound token forms)
    if:
      type: string_value
      regex: (?i)\bcompound\s*(usdc|ctoken)\b
  - id: defi-protocol-curve-finance
    desc: DeFi Curve Finance protocol reference
    if:
      type: string_value
      regex: (?i)curve\s*(finance|pool|swap)
  - id: defi-protocol-curve-defi
    desc: DeFi Curve governance/LP reference
    if:
      type: string_value
      regex: (?i)curve\s*(dao|gauge|lp)
  - id: swap-operations
    desc: Token swap operation patterns
    if:
      type: string_value
      regex: (?i)(swapExact|swap_tokens|swapTokensFor)
  - id: contract-query
    desc: Smart contract query methods (getReserves/getPair)
    if:
      type: string_value
      regex: (getReserves|calculatePrice|getPairContract|getTokenAndContract)
  - id: arbitrage-terms-arbitrage
    desc: Arbitrage trading term (arbitrage)
    if:
      type: string_value
      word: arbitrage
      case_insensitive: true
  - id: arbitrage-terms-arb-for
    desc: Arbitrage trading term (arb_for)
    if:
      type: string_value
      word: arb_for
      case_insensitive: true
  - id: arbitrage-terms-arb-against
    desc: Arbitrage trading term (arb_against)
    if:
      type: string_value
      word: arb_against
      case_insensitive: true
  - id: arbitrage-terms-price-diff
    desc: Arbitrage trading term (price_difference)
    if:
      type: string_value
      word: price_difference
      case_insensitive: true
  - id: arbitrage-terms-flash-loan
    desc: Arbitrage trading term (flash_loan)
    if:
      type: string_value
      word: flash_loan
      case_insensitive: true
composite_rules:
  - id: defi-protocol-lending
    desc: DeFi lending protocol references (Aave/Compound)
    any:
      - id: defi-protocol-aave
      - id: defi-protocol-compound-core
      - id: defi-protocol-compound-ecosystem
      - id: defi-protocol-compound-token
  - id: arbitrage-terms
    desc: Arbitrage trading terms
    any:
      - id: arbitrage-terms-arbitrage
      - id: arbitrage-terms-arb-for
      - id: arbitrage-terms-arb-against
      - id: arbitrage-terms-price-diff
      - id: arbitrage-terms-flash-loan
