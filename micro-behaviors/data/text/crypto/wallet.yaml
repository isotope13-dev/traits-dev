defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: solana-keypair-fromsecretkey
  desc: Solana Keypair generation from secret
  conf: 0.8
  crit: suspicious
  if:
    type: text
    substr: Keypair.fromSecretKey
- id: bip39-validate-mnemonic
  desc: BIP39 Mnemonic validation call
  conf: 0.8
  crit: notable
  if:
    type: text
    substr: validateMnemonic
- id: bs58-decode
  desc: Base58 decode operation
  conf: 0.8
  crit: notable
  if:
    type: text
    substr: bs58.decode
- id: base58-or-cid-conversion--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: FromString
- id: base58-or-cid-conversion--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: b58decode
- id: base58-or-cid-conversion--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: b58encode
- id: base58-or-cid-conversion--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: ToString
- id: base58-or-cid-conversion--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: base58
- id: solana-system-transfer
  desc: Solana SystemProgram fund transfer
  conf: 0.85
  crit: notable
  for: [javascript, typescript]
  if:
    type: text
    substr: SystemProgram.transfer
- id: solana-lamports-per-sol
  desc: Solana LAMPORTS_PER_SOL constant
  conf: 0.8
  crit: baseline
  for: [javascript, typescript]
  if:
    type: text
    substr: LAMPORTS_PER_SOL
composite_rules:
- id: base58-or-cid-conversion
  desc: Base58 or CID conversion
  crit: notable
  conf: 0.8
  for: [python, javascript, typescript]
  any:
  - id: base58-or-cid-conversion--rx-1
  - id: base58-or-cid-conversion--rx-2
  - id: base58-or-cid-conversion--rx-3
  - id: base58-or-cid-conversion--rx-4
  - id: base58-or-cid-conversion--rx-5
  needs: 1
  unless:
  - id: metadata/lang/source::windows-generated-def-path
