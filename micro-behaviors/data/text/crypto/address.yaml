defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: ethereum-regex-40
    desc: Ethereum 40-char hex regex
    conf: 0.8
    crit: baseline
    if:
      type: string_literal
      regex: 0x\[a-fA-F0-9\]\{40\}
  - id: ethereum-regex-boundary
    desc: Ethereum regex with word boundary
    conf: 0.8
    crit: baseline
    if:
      type: string_literal
      regex: \\b0x\[a-fA-F0-9\]
  - id: bitcoin-legacy-regex
    desc: Bitcoin legacy address regex pattern
    conf: 0.9
    crit: baseline
    if:
      type: string_literal
      regex: 1\[a-km-zA-HJ-NP-Z1-9\]\{25,34\}
  - id: bitcoin-segwit-regex
    desc: Bitcoin SegWit address regex pattern
    conf: 0.9
    crit: baseline
    if:
      type: string_literal
      regex: bc1\[qpzry9x8gf2tvdw0s3jn54khce6mua7l\]
    not:
      - exact: "^bc1[qpzry9x8gf2tvdw0s3jn54khce6mua7l]{6,87}$"
  - id: bitcoin-cash-regex
    desc: Bitcoin Cash address regex pattern
    conf: 0.9
    crit: baseline
    if:
      type: string_literal
      regex: bitcoincash:\[qp\]\[a-zA-Z0-9\]
  - id: litecoin-segwit-regex
    desc: Litecoin SegWit address regex (ltc1)
    conf: 0.8
    crit: baseline
    if:
      type: string_literal
      regex: ltc1\[qpzry9x8gf2tvdw0s3jn54khce6mua7l\]
    not:
      - exact: "^ltc1[qpzry9x8gf2tvdw0s3jn54khce6mua7l]{6,87}$"
  - id: litecoin-legacy-regex
    desc: Litecoin legacy address regex (m/M/l/L)
    conf: 0.8
    crit: baseline
    if:
      type: string_literal
      regex: \[mlML\]\[a-km-zA-HJ-NP-Z1-9\]
  - id: tron-regex
    desc: TRON address regex pattern
    conf: 0.9
    crit: baseline
    if:
      type: string_literal
      regex: \[T\]\[1-9A-HJ-NP-Za-km-z\]\{33\}
  - id: solana-regex
    desc: Solana address regex pattern
    conf: 0.85
    crit: baseline
    if:
      type: string_literal
      regex: \[1-9A-HJ-NP-Za-km-z\]\{32,44\}
  - id: ethereum-regex-short
    desc: Ethereum address regex pattern (0x
    conf: 0.7
    crit: baseline
    if:
      type: string_literal
      regex: 0x\[a-fA-F0-9\]
  - id: bitcoin-legacy-regex-short
    desc: Bitcoin legacy address regex pattern
    conf: 0.9
    crit: baseline
    if:
      type: string_literal
      regex: 1\[a-km-zA-HJ-NP-Z1-9\]
  - id: bitcoin-cash-prefix
    desc: Bitcoin Cash address prefix
    conf: 0.85
    crit: baseline
    if:
      type: string_literal
      substr: 'bitcoincash:'
composite_rules:
  - id: ethereum-regex
    desc: Ethereum address regex pattern (0x...40
    conf: 0.9
    crit: baseline
    any:
      - id: ethereum-regex-40
      - id: ethereum-regex-boundary
  - id: litecoin-regex
    desc: Litecoin address regex pattern
    conf: 0.9
    crit: baseline
    any:
      - id: litecoin-segwit-regex
      - id: litecoin-legacy-regex
  - id: multi-crypto-regex
    desc: Multiple cryptocurrency wallet regex patterns
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: ethereum-regex-short
      - id: bitcoin-legacy-regex-short
      - id: bitcoin-segwit-regex
      - id: bitcoin-cash-prefix
      - id: litecoin-regex
      - id: tron-regex
      - id: solana-regex
