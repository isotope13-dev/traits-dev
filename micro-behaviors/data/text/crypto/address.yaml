defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: eth-address-literal
    desc: Hardcoded Ethereum-style address
    crit: notable
    conf: 0.72
    for: [binaries, scripts, source, pe, html, javascript, typescript, php]
    if:
      type: text
      regex: \b0x[a-fA-F0-9]{40}\b
