defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]

traits:
- id: llm-ignore-prior-instructions
  desc: Ignore prior instructions prompt
  crit: suspicious
  conf: 0.88
  unless:
  - type: text
    substr: "INJECTION PATTERNS TO IGNORE"
  - type: text
    substr: "treat as regular text"
  - type: text
    regex: 'security guardrail validator|GuardrailsComponent|GuardrailValidator'
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
  - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
  if:
    type: text
    regex: '\bignore (all )?(previous|prior) (instructions|rules)\b'
    case_insensitive: true

- id: llm-disregard-prior-instructions
  desc: Disregard prior instructions prompt
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '\b(disregard|forget) (previous|prior) instructions\b'
    case_insensitive: true
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
  - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures

- id: llm-do-not-follow-prior-instructions
  desc: Do-not-follow prior instructions prompt
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '\bdo not follow (the )?(previous|prior|earlier) (instructions|directives)\b'
    case_insensitive: true
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
  - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures

- id: llm-system-override-token
  desc: System override token
  crit: suspicious
  conf: 0.9
  if:
    type: raw
    substr: "[SYSTEM OVERRIDE]"
    case_insensitive: true

- id: llm-system-tag-token--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\s*/?\s*system_prompt\s*>'
    case_insensitive: true
  count_max: 1011682

- id: llm-system-tag-token--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\|im_start\|>\s*system\b'
    case_insensitive: true
  count_max: 1011683

- id: llm-system-tag-token--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\|start_header_id\|>\s*system\s*<\|end_header_id\|>'
    case_insensitive: true
  count_max: 1011684

- id: llm-internal-anthropic-token
  desc: Anthropic internal token spoof
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: "ANTHROPIC_MAGIC_STRING"
    case_insensitive: true

- id: llm-internal-ultrathink-token
  desc: Ultrathink token spoof
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: "ULTRATHINK"
    case_insensitive: true

- id: llm-concealment-do-not-reveal
  desc: Prompt concealment instruction
  crit: suspicious
  conf: 0.84
  if:
    type: text
    substr: "do not reveal this"
    case_insensitive: true

- id: llm-always-respond-phrase
  desc: Always respond phrase
  crit: component
  conf: 0.72
  if:
    type: text
    substr: "always respond"
    case_insensitive: true

- id: llm-role-line-context
  desc: LLM role label context
  crit: component
  conf: 0.72
  if:
    type: text
    regex: "(?im)^\\s*(system|developer|assistant)\\s*[:#>-]"

- id: llm-system-role-context
  desc: LLM system role context
  crit: component
  conf: 0.72
  if:
    type: text
    regex: "(?i)\\bsystem (message|prompt|role|instruction)\\b"

- id: llm-developer-role-context
  desc: LLM developer role context
  crit: component
  conf: 0.72
  if:
    type: text
    regex: "(?i)\\bdeveloper (message|prompt|role|instruction)\\b"

- id: llm-assistant-role-context
  desc: LLM assistant role context
  crit: component
  conf: 0.72
  if:
    type: text
    regex: "(?i)\\bassistant (message|prompt|role|instruction)\\b"

- id: llm-role-field-context
  desc: LLM role field context
  crit: component
  conf: 0.72
  if:
    type: text
    regex: "(?i)\\brole\\s*[:=]\\s*['\"]?(system|developer|assistant)\\b"

- id: llm-instruction-context
  desc: LLM instruction context
  crit: component
  conf: 0.72
  if:
    type: text
    regex: "(?i)prompt|instruction|you are"

- id: llm-generic-refusal-output
  desc: LLM generic refusal output
  crit: suspicious
  conf: 0.72
  if:
    type: text
    substr: "generic refusal"
    case_insensitive: true

- id: llm-poem-output
  desc: LLM poem output request
  crit: notable
  conf: 0.68
  downgrade:
    any:
    - id: well-known/lib/xml2
    - id: well-known/lib/xslt
  if:
    type: text
    word: "poem"

- id: llm-jailbreak-payload
  # The two literal payload phrases that have no benign use: "DAN mode" and
  # "developer mode enabled" are the published OpenAI/Anthropic jailbreak
  # opener fragments. When either appears, the file is almost certainly
  # carrying an actual prompt-injection payload, not just discussing one.
  desc: LLM jailbreak payload phrase (DAN / developer-mode)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '\b(DAN mode|developer mode enabled)\b'
    case_insensitive: true
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
  - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures

- id: llm-jailbreak-word
  # Standalone the bare word "jailbreak" appears in security papers, defensive
  # scanners, blog posts, AV signatures, and any documentation about prompt
  # injection. Notable so it remains inventory evidence but doesn't shout
  # "suspicious" on its own. Composites in objectives/evasion/security-bypass/
  # llm/ pair it with at least one other override trait.
  desc: LLM jailbreak word reference
  crit: notable
  conf: 0.7
  if:
    type: text
    word: jailbreak
    case_insensitive: true
  unless:
  - type: text
    regex: 'security guardrail validator|GuardrailsComponent|GuardrailValidator'
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: metadata/library/runtime::acquire-vscode-api
  - id: objectives/supply-chain/trojanized/app/context::zxcvbn-password-strength-library
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

- id: llm-new-system-prompt
  desc: New system prompt instruction
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '\b(new|updated|override) system prompt\s*[:=]'
    case_insensitive: true

- id: llm-unrestricted-persona
  desc: Unrestricted AI persona prompt
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '\byou are now (a )?(different|new|free|unrestricted)\b'
    case_insensitive: true
  unless:
    - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
    - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
- id: llm-safety-bypass--rx-33
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(bypass|override) (your )?(safety|content) (filter|guardrail)\b'
    case_insensitive: true
  count_max: 1011735

- id: llm-safety-bypass--rx-34
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(bypass|override) (your )?(ethical) (filter|guardrail)\b'
    case_insensitive: true
  count_max: 1011736

- id: llm-safety-bypass--rx-35
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(bypass|override) (your )?(safety|content|ethical) (policy)\b'
    case_insensitive: true
  count_max: 1011737

- id: llm-safety-bypass--rx-36
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(disable) (your )?(safety|content|ethical) (filter|guardrail)\b'
    case_insensitive: true
  count_max: 1011738

- id: llm-safety-bypass--rx-37
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(disable) (your )?(safety|content|ethical) (policy)\b'
    case_insensitive: true
  count_max: 1011739

- id: llm-hide-ai-identity--rx-38
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(never reveal|hide) (you are )?(an? )?(AI|bot|assistant)\b'
    case_insensitive: true
  count_max: 1011740

- id: llm-hide-ai-identity--rx-39
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(conceal|mask) (you are )?(an? )?(AI|bot|assistant)\b'
    case_insensitive: true
  count_max: 1011741

- id: llm-human-impersonation--rx-40
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(impersonate|pose as|masquerade as) (a )?(human|person)\b'
    case_insensitive: true
  count_max: 1011742

- id: llm-human-impersonation--rx-41
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(impersonate|pose as|masquerade as) (a )?(admin|support)\b'
    case_insensitive: true
  count_max: 1011743

- id: llm-update-skill-instruction--rx-42
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\b(update|modify|overwrite) (this )?(skill|tool)\b'
    case_insensitive: true
  count_max: 1011744

- id: llm-update-skill-instruction--rx-43
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\b(update|modify|overwrite) (this )?(plugin|instruction)\b'
    case_insensitive: true
  count_max: 1011745

composite_rules:
- id: llm-role-context
  desc: LLM role context
  crit: component
  conf: 0.72
  any:
  - id: llm-role-line-context
  - id: llm-system-role-context
  - id: llm-developer-role-context
  - id: llm-assistant-role-context
  - id: llm-role-field-context

- id: llm-prompt-context
  desc: LLM prompt context
  crit: component
  conf: 0.72
  any:
  - id: llm-role-context
  - id: llm-instruction-context

- id: llm-prior-instruction-override
  desc: LLM prior instruction override prompt
  crit: suspicious
  conf: 0.88
  any:
  - id: llm-ignore-prior-instructions
  - id: llm-disregard-prior-instructions
  - id: llm-do-not-follow-prior-instructions

- id: llm-always-respond
  desc: LLM forced response instruction
  crit: notable
  conf: 0.72
  near_lines: 8
  all:
  - id: llm-always-respond-phrase
  - id: llm-prompt-context

- id: llm-system-tag-token
  desc: System prompt tag token
  crit: suspicious
  conf: 0.86
  any:
  - id: llm-system-tag-token--rx-1
  - id: llm-system-tag-token--rx-2
  - id: llm-system-tag-token--rx-3

- id: llm-safety-bypass
  desc: LLM safety bypass prompt
  crit: suspicious
  conf: 0.9
  any:
  - id: llm-safety-bypass--rx-33
  - id: llm-safety-bypass--rx-34
  - id: llm-safety-bypass--rx-35
  - id: llm-safety-bypass--rx-36
  - id: llm-safety-bypass--rx-37

- id: llm-hide-ai-identity
  desc: AI identity concealment prompt
  crit: suspicious
  conf: 0.9
  any:
  - id: llm-hide-ai-identity--rx-38
  - id: llm-hide-ai-identity--rx-39

- id: llm-human-impersonation
  desc: Human impersonation prompt
  crit: suspicious
  conf: 0.88
  any:
  - id: llm-human-impersonation--rx-40
  - id: llm-human-impersonation--rx-41

- id: llm-update-skill-instruction
  desc: Skill self modification instruction
  crit: suspicious
  conf: 0.86
  any:
  - id: llm-update-skill-instruction--rx-42
  - id: llm-update-skill-instruction--rx-43
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
