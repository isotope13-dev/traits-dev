defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]

traits:
- id: html-comment-carrier
  desc: HTML comment prompt carrier
  crit: component
  conf: 0.72
  if:
    type: raw
    substr: "<!--"

- id: css-display-none-carrier
  desc: CSS display none carrier
  crit: component
  conf: 0.82
  if:
    type: raw
    regex: 'display\s*:\s*none'
    case_insensitive: true

- id: css-visibility-hidden-carrier
  desc: CSS visibility hidden carrier
  crit: baseline
  conf: 0.8
  if:
    type: raw
    regex: 'visibility\s*:\s*hidden'
    case_insensitive: true

- id: css-opacity-zero-carrier
  desc: CSS opacity zero carrier
  crit: baseline
  conf: 0.78
  if:
    type: raw
    regex: 'opacity\s*:\s*0'
    case_insensitive: true

- id: aria-hidden-carrier
  desc: ARIA hidden prompt carrier
  crit: component
  conf: 0.78
  if:
    type: raw
    regex: 'aria-hidden\s*=\s*["'']true["'']'
    case_insensitive: true

- id: llm-meta-ai-action
  desc: AI action meta namespace
  crit: suspicious
  conf: 0.88
  if:
    type: raw
    substr: 'name="ai:action"'
    case_insensitive: true

- id: llm-meta-ai-intent
  desc: AI intent meta namespace
  crit: suspicious
  conf: 0.86
  if:
    type: raw
    substr: 'name="ai:intent"'
    case_insensitive: true

- id: llm-meta-agent-action
  desc: Agent action meta namespace
  crit: suspicious
  conf: 0.86
  if:
    type: raw
    substr: 'name="agent:action"'
    case_insensitive: true

composite_rules:
- id: css-hidden-content-carrier
  desc: CSS hidden content carrier
  crit: component
  conf: 0.8
  any:
  - id: css-display-none-carrier
  - id: css-visibility-hidden-carrier
  - id: css-opacity-zero-carrier

- id: html-hidden-content-carrier
  desc: HTML hidden content carrier
  crit: component
  conf: 0.78
  any:
  - id: html-comment-carrier
  - id: aria-hidden-carrier
