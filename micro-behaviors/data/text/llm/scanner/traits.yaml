# LLM security scanner / firewall behavior.
#
# Code that inspects LLM input/output for malicious prompts, jailbreak
# attempts, credential leaks, and supply-chain attacks. Whether built in-
# house or via published libraries (garak, llm-guard, lakera-guard, NeMo
# Guardrails, rebuff, guardrails-ai, prompt-armor, hiddenlayer), this
# code necessarily contains the very strings it watches for — jailbreak
# phrases, credential regexes, CVE IDs, sensitive paths — as DATA in its
# detector tables.
#
# The `llm-scanner-context` composite below is a positive-ID signal that
# other LLM/credential/supply-chain traits reference via `unless:` to
# suppress findings firing on a scanner's pattern database rather than
# on actual hostile behavior.
defaults:
  platforms: [unix, windows]
  # Includes pkginfo so wheel/sdist METADATA files (which carry the package
  # `Name:` field and project description) can be classified as scanner
  # context. Some package descriptions self-identify the tool's purpose,
  # and lacking that file-type coverage made standalone METADATA still
  # trigger pattern-data traits that should be muted in scanner context.
  for: [python, javascript, typescript, rust, pkginfo, package.json, documents]
  crit: notable
  conf: 0.93

traits:
  # ----- Library imports (high precision) -----
  - id: garak-import
    desc: Imports NVIDIA garak LLM vulnerability scanner
    conf: 0.97
    if:
      type: text
      regex: '\b(from\s+garak(\.\w+)?\s+import|import\s+garak\b)'

  - id: llm-guard-import
    desc: Imports llm-guard (Protect AI)
    conf: 0.97
    if:
      type: text
      regex: '\b(from\s+llm_guard(\.\w+)?\s+import|import\s+llm_guard\b)'

  - id: lakera-guard-import
    desc: Imports Lakera Guard SDK
    conf: 0.96
    if:
      type: text
      regex: '\b(from\s+lakera(_guard)?\s+import|import\s+lakera_guard\b)'

  - id: nemo-guardrails-import
    desc: Imports NVIDIA NeMo Guardrails
    conf: 0.97
    if:
      type: text
      regex: '\b(from\s+nemoguardrails(\.\w+)?\s+import|import\s+nemoguardrails\b)'

  - id: rebuff-import
    desc: Imports rebuff prompt-injection detector
    conf: 0.96
    if:
      type: text
      regex: '\b(from\s+rebuff(\.\w+)?\s+import|import\s+rebuff\b)'

  - id: guardrails-ai-import
    desc: Imports guardrails-ai validators
    conf: 0.9
    if:
      type: text
      regex: '\bfrom\s+guardrails(\.\w+)?\s+import\s+(Guard|Validator|OnFailAction)\b'

  - id: prompt-armor-import
    desc: Imports promptarmor SDK
    conf: 0.95
    if:
      type: text
      regex: '\b(from\s+prompt(_|-)armor(\.\w+)?\s+import|import\s+prompt(_|-)armor\b)'

  - id: hiddenlayer-import
    desc: Imports HiddenLayer ML security SDK
    conf: 0.95
    if:
      type: text
      regex: '\b(from\s+hiddenlayer(\.\w+)?\s+import|import\s+hiddenlayer\b)'

  - id: promptfoo-config
    desc: promptfoo evaluation framework marker
    conf: 0.9
    if:
      type: text
      regex: '\bpromptfoo:\s*\{|"promptfoo":\s*\{'

  # ----- Scanner-shape identifiers (in-house implementations) -----
  # Class / function names that announce the code's role as a scanner. These
  # are the existing inline `unless:` hints in micro-behaviors/data/text/llm/
  # override/traits.yaml lifted into named atoms so other traits can reference
  # them.
  - id: guardrail-validator-class
    desc: GuardrailValidator / GuardrailsComponent class
    conf: 0.93
    if:
      type: text
      regex: '\b(Guardrail(s)?(Component|Validator)|PromptInjectionDetector|JailbreakDetector)\b'

  - id: prompt-injection-detect-fn
    desc: detect_prompt_injection function definition
    conf: 0.93
    if:
      type: text
      regex: '\bdef\s+detect_prompt_injection\b'

  - id: prompt-injection-check-fn
    desc: 'prompt injection check fn'
    conf: 0.9
    if:
      type: text
      regex: '\bdef\s+(is_prompt_injection|check_injection|check_jailbreak)\b'

  - id: jailbreak-scan-fn
    desc: scan_for_jailbreak function definition
    conf: 0.93
    if:
      type: text
      regex: '\bdef\s+scan_for_jailbreak\b'

  - id: scan-input-fn
    desc: scan_input / scan_prompt function definition
    conf: 0.88
    if:
      type: text
      regex: '\bdef\s+scan_(input|prompt|messages)\b'

  - id: scan-output-fn
    desc: scan_output / scan_response function definition
    conf: 0.88
    if:
      type: text
      regex: '\bdef\s+scan_(output|response)\b'

  - id: owasp-llm-top-10-reference
    # "OWASP LLM Top 10" is the canonical reference framework for LLM
    # vulnerabilities — appears in scanner docstrings, pattern catalog
    # comments, and remediation hints. Almost no non-scanner code cites it.
    desc: OWASP LLM Top 10 reference
    conf: 0.93
    if:
      type: text
      regex: '\bOWASP\s+LLM\s+Top\s+10\b'

  - id: detection-pattern-dataclass
    # Scanner pattern-database files define a DetectionPattern / similar
    # dataclass to hold rule rows. Distinctive name pair: a `DetectionPattern`
    # or `SecurityPattern` defined as a `@dataclass`.
    desc: DetectionPattern dataclass declaration
    conf: 0.9
    if:
      type: text
      regex: '\bclass\s+(Detection|Security|Threat|Risk)Pattern\b'

  - id: prompt-injection-defender-doc
    # "detect/screen/block + prompt injection" — meta-commentary an attacker
    # doesn't write but a defender always does. Three verb stems cover the
    # bulk of scanner docstring phrasing without tripping the alt-chain cap.
    desc: Defender-shape prompt-injection phrasing
    conf: 0.9
    if:
      type: text
      regex: '\b(detect|screen|block)\w{0,12}[\s\w-]{0,30}prompt injection'
      case_insensitive: true

  - id: prompt-injection-attack-doc
    # Defender phrase: "prompt injection attack(s)" — the noun phrase from
    # the attacker's perspective being NAMED, not delivered. Scanners cite
    # the attack family; payloads carry the attack itself.
    desc: prompt injection attack noun phrase
    conf: 0.88
    if:
      type: text
      regex: '\bprompt injection attack[s]?\b'
      case_insensitive: true

  - id: prompt-injection-rejection-message
    desc: Prompt injection rejection message
    conf: 0.9
    if:
      type: text
      substr: looks like prompt injection
      case_insensitive: true

  - id: prompt-injection-phrases-doc
    desc: Prompt injection phrases documentation
    conf: 0.88
    if:
      type: text
      regex: '\bprompt[- ]injection phrases\b'
      case_insensitive: true

  - id: ai-skill-scanner-report-doc
    desc: AI skill scanner report document
    conf: 0.94
    if:
      type: text
      regex: 'Cisco AI Defense Skill Scanner|LLM_PROMPT_INJECTION|BEHAVIOR_ENV_VAR_EXFILTRATION'
      case_insensitive: true

composite_rules:
  - id: llm-scanner-context
    desc: File is part of an LLM security scanner / firewall
    crit: notable
    conf: 0.96
    # Directory shortcut covers every atom in this leaf; pyaigis adds the
    # specific package fingerprint for package-data files lacking a generic
    # scanner-shape marker.
    any:
      - id: micro-behaviors/data/text/llm/scanner
      - id: well-known/lib/pyaigis/
