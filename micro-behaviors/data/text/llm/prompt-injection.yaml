defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]

traits:
  - id: llm-conditional-target
    desc: Conditional LLM targeting phrase
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bif you are an? (ai assistant|llm|large language model)\b'
      case_insensitive: true

  - id: llm-agent-target
    desc: AI agent target phrase
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\b(ai agent|ai assistant|large language model|coding assistant)\b'
      case_insensitive: true

  - id: llm-ignore-prior-instructions
    desc: Ignore prior instructions prompt
    crit: suspicious
    conf: 0.88
    unless:
      - type: text
        regex: 'security guardrail validator|GuardrailsComponent|GuardrailValidator'
    if:
      type: text
      regex: '\bignore (all )?(previous|prior) (instructions|rules)\b'
      case_insensitive: true

  - id: llm-disregard-prior-instructions
    desc: Disregard prior instructions prompt
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\b(disregard|forget) (previous|prior) instructions\b'
      case_insensitive: true

  - id: llm-system-override-token
    desc: System override token
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "[SYSTEM OVERRIDE]"
      case_insensitive: true

  - id: llm-system-tag-token
    desc: System prompt tag token
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '<\s*/?\s*system_prompt\s*>|<\|im_start\|>\s*system\b|<\|start_header_id\|>\s*system\s*<\|end_header_id\|>'
      case_insensitive: true

  - id: llm-internal-anthropic-token
    desc: Anthropic internal token spoof
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "ANTHROPIC_MAGIC_STRING"
      case_insensitive: true

  - id: llm-internal-ultrathink-token
    desc: Ultrathink token spoof
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "ULTRATHINK"
      case_insensitive: true

  - id: llm-concealment-do-not-reveal
    desc: Prompt concealment instruction
    crit: suspicious
    conf: 0.84
    if:
      type: text
      substr: "do not reveal this"
      case_insensitive: true

  - id: html-comment-carrier
    desc: HTML comment prompt carrier
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: "<!--"

  - id: css-display-none-carrier
    desc: CSS display none carrier
    crit: component
    conf: 0.82
    if:
      type: raw
      regex: 'display\s*:\s*none'
      case_insensitive: true

  - id: css-visibility-hidden-carrier
    desc: CSS visibility hidden carrier
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: 'visibility\s*:\s*hidden'
      case_insensitive: true

  - id: css-opacity-zero-carrier
    desc: CSS opacity zero carrier
    crit: baseline
    conf: 0.78
    if:
      type: raw
      regex: 'opacity\s*:\s*0'
      case_insensitive: true

  - id: aria-hidden-carrier
    desc: ARIA hidden prompt carrier
    crit: component
    conf: 0.78
    if:
      type: raw
      regex: 'aria-hidden\s*=\s*["'']true["'']'
      case_insensitive: true

  - id: llm-meta-ai-action
    desc: AI action meta namespace
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      substr: 'name="ai:action"'
      case_insensitive: true

  - id: llm-meta-ai-intent
    desc: AI intent meta namespace
    crit: suspicious
    conf: 0.86
    if:
      type: raw
      substr: 'name="ai:intent"'
      case_insensitive: true

  - id: llm-meta-agent-action
    desc: Agent action meta namespace
    crit: suspicious
    conf: 0.86
    if:
      type: raw
      substr: 'name="agent:action"'
      case_insensitive: true

  - id: llm-send-action
    desc: LLM sensitive send request
    crit: suspicious
    conf: 0.84
    unless:
      - id: metadata/package/testing/presence::jest-test-file
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: metadata/package/testing/presence::autoconf-testsuite
      - type: string_literal
        regex: '\bdefault secret patterns are returned\b'
        case_insensitive: true
    not:
      - regex: '(?i)\b(next|previous|continuation|pagination|page|bucket|throttle|rate[- ]?limit|fill|refill|sync|csrf|xsrf|anti-forgery) token\b'
      - regex: '(?i)\btoken bucket\b'
      - regex: '(?i)\b(new|expected|invalid|lookahead|lexical|parsed|input) token\b'
    if:
      type: string_literal
      regex: '\b(send|return|copy|exfiltrate)\b.{0,80}\b(secret|api key|token|credential|session cookie)\b'
      case_insensitive: true

  - id: llm-secret-target
    desc: LLM secret data target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b(secret|api key|token|credential)\b'
      case_insensitive: true

  - id: llm-session-cookie-target
    desc: LLM session cookie target
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: "session cookie"
      case_insensitive: true

  - id: llm-url-navigation-action
    desc: LLM URL navigation request
    crit: suspicious
    conf: 0.8
    not:
      - regex: '(?i)\bopen (an?|the|a new) (issue|ticket|bug|pull request|PR|MR|merge request|incident|case|support (ticket|case|request))\b'
      - regex: '(?i)\bopen a support\b'
    if:
      type: text
      regex: '\b(?:assistant|agent|llm|chatgpt|claude|gemini)\b.{0,120}\b(open|visit|navigate)\b.{0,80}https?://|\b(?:must|should|now|then|please)\b.{0,40}\b(open|navigate)\b.{0,80}https?://'
      case_insensitive: true

  - id: llm-path-navigation-action
    desc: LLM path navigation request
    crit: notable
    conf: 0.76
    if:
      type: text
      regex: '\b(?:assistant|agent|llm|chatgpt|claude|gemini)\b.{0,120}\b(open|visit|navigate)\s+(this|the|following|path|file|directory|url|link)\b.{0,80}/[A-Za-z0-9._/-]{2,80}|\b(?:must|should|now|then|please)\b.{0,40}\b(open|visit|navigate)\s+(this|the|following|path|file|directory|url|link)\b.{0,80}/[A-Za-z0-9._/-]{2,80}'
      case_insensitive: true

  - id: llm-payment-action
    desc: LLM payment action request
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(pay|donate|transfer)\b.{0,80}\$[0-9]'
      case_insensitive: true

  - id: llm-checkout-action
    desc: LLM checkout action request
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(confirm purchase|complete checkout|submit payment|confirm payment)\b'
      case_insensitive: true

  - id: llm-destructive-shell-action
    desc: LLM destructive shell request
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\b(run|execute|paste)\s+(this|the|following|command|shell command|in (a )?terminal|into (a )?shell)\b.{0,80}\brm\s+-rf\b|\b(run|execute|paste)\s+[`"'']rm\s+-rf\b'
      case_insensitive: true

  - id: llm-always-respond
    desc: LLM forced response instruction
    crit: notable
    conf: 0.72
    if:
      type: text
      substr: "always respond"
      case_insensitive: true

  - id: llm-generic-refusal-output
    desc: LLM generic refusal output
    crit: notable
    conf: 0.72
    if:
      type: text
      substr: "generic refusal"
      case_insensitive: true

  - id: llm-poem-output
    desc: LLM poem output request
    crit: notable
    conf: 0.68
    if:
      type: text
      word: "poem"

  - id: llm-jailbreak-mode
    desc: LLM jailbreak mode prompt
    crit: suspicious
    conf: 0.88
    unless:
      - type: text
        regex: 'security guardrail validator|GuardrailsComponent|GuardrailValidator'
    if:
      type: text
      regex: '\b(jailbreak|DAN mode|developer mode enabled)\b'
      case_insensitive: true

  - id: llm-new-system-prompt
    desc: New system prompt instruction
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\b(new|updated|override) system prompt\b'
      case_insensitive: true

  - id: llm-unrestricted-persona
    desc: Unrestricted AI persona prompt
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\byou are now (a )?(different|new|free|unrestricted)\b'
      case_insensitive: true

  - id: llm-safety-bypass
    desc: LLM safety bypass prompt
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(bypass|override|disable) (your )?(safety|content|ethical) (filter|guardrail|policy)\b'
      case_insensitive: true

  - id: llm-hide-ai-identity
    desc: AI identity concealment prompt
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(never reveal|hide|conceal|mask) (you are )?(an? )?(AI|bot|assistant)\b'
      case_insensitive: true

  - id: llm-human-impersonation
    desc: Human impersonation prompt
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\b(impersonate|pose as|masquerade as) (a )?(human|person|admin|support)\b'
      case_insensitive: true

  - id: llm-update-skill-instruction
    desc: Skill self modification instruction
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\b(update|modify|overwrite) (this )?(skill|tool|plugin|instruction)\b'
      case_insensitive: true

composite_rules:
  - id: css-hidden-content-carrier
    desc: CSS hidden content carrier
    crit: component
    conf: 0.8
    any:
      - id: css-display-none-carrier
      - id: css-visibility-hidden-carrier
      - id: css-opacity-zero-carrier

  - id: html-hidden-content-carrier
    desc: HTML hidden content carrier
    crit: component
    conf: 0.78
    any:
      - id: html-comment-carrier
      - id: aria-hidden-carrier
