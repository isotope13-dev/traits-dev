defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]

traits:
- id: llm-conditional-target
  desc: Conditional LLM targeting phrase
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\bif you are an? (ai assistant|llm|large language model)\b'
    case_insensitive: true

- id: llm-agent-target
  desc: AI agent target phrase
  crit: suspicious
  conf: 0.84
  if:
    type: text
    regex: '\b(ai agent|ai assistant|large language model|coding assistant)\b'
    case_insensitive: true

- id: llm-ignore-prior-instructions
  desc: Ignore prior instructions prompt
  crit: suspicious
  conf: 0.88
  unless:
  - type: text
    regex: 'security guardrail validator|GuardrailsComponent|GuardrailValidator'
  if:
    type: text
    regex: '\bignore (all )?(previous|prior) (instructions|rules)\b'
    case_insensitive: true

- id: llm-disregard-prior-instructions
  desc: Disregard prior instructions prompt
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '\b(disregard|forget) (previous|prior) instructions\b'
    case_insensitive: true

- id: llm-system-override-token
  desc: System override token
  crit: suspicious
  conf: 0.9
  if:
    type: raw
    substr: "[SYSTEM OVERRIDE]"
    case_insensitive: true

- id: llm-system-tag-token--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\s*/?\s*system_prompt\s*>'
    case_insensitive: true

- id: llm-system-tag-token--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\|im_start\|>\s*system\b'
    case_insensitive: true

- id: llm-system-tag-token--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\|start_header_id\|>\s*system\s*<\|end_header_id\|>'
    case_insensitive: true

- id: llm-internal-anthropic-token
  desc: Anthropic internal token spoof
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: "ANTHROPIC_MAGIC_STRING"
    case_insensitive: true

- id: llm-internal-ultrathink-token
  desc: Ultrathink token spoof
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: "ULTRATHINK"
    case_insensitive: true

- id: llm-concealment-do-not-reveal
  desc: Prompt concealment instruction
  crit: suspicious
  conf: 0.84
  if:
    type: text
    substr: "do not reveal this"
    case_insensitive: true

- id: html-comment-carrier
  desc: HTML comment prompt carrier
  crit: component
  conf: 0.72
  if:
    type: raw
    substr: "<!--"

- id: css-display-none-carrier
  desc: CSS display none carrier
  crit: component
  conf: 0.82
  if:
    type: raw
    regex: 'display\s*:\s*none'
    case_insensitive: true

- id: css-visibility-hidden-carrier
  desc: CSS visibility hidden carrier
  crit: baseline
  conf: 0.8
  if:
    type: raw
    regex: 'visibility\s*:\s*hidden'
    case_insensitive: true

- id: css-opacity-zero-carrier
  desc: CSS opacity zero carrier
  crit: baseline
  conf: 0.78
  if:
    type: raw
    regex: 'opacity\s*:\s*0'
    case_insensitive: true

- id: aria-hidden-carrier
  desc: ARIA hidden prompt carrier
  crit: component
  conf: 0.78
  if:
    type: raw
    regex: 'aria-hidden\s*=\s*["'']true["'']'
    case_insensitive: true

- id: llm-meta-ai-action
  desc: AI action meta namespace
  crit: suspicious
  conf: 0.88
  if:
    type: raw
    substr: 'name="ai:action"'
    case_insensitive: true

- id: llm-meta-ai-intent
  desc: AI intent meta namespace
  crit: suspicious
  conf: 0.86
  if:
    type: raw
    substr: 'name="ai:intent"'
    case_insensitive: true

- id: llm-meta-agent-action
  desc: Agent action meta namespace
