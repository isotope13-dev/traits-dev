  - type: string_literal
    regex: '\bdefault secret patterns are returned\b'
    case_insensitive: true
  - type: string_literal
    regex: '\b(return|copy|forward)\s+(the|a|an)\s+(secret|credential|token|password|api[- ]?key)s?\s+(for|to|from)\s+(that|this|the|a|an)\s+(repository|repo|host|url|domain|server|service|account|user|configuration|config|index|registry|package|project|environment|context|request|response|client|session|caller|key|file|path|entry|record)\b'
    case_insensitive: true
      # End-user UI guidance (password managers, backup tools) telling the
      # human to copy/save their own credential — not an LLM exfil directive.
  - type: text
    regex: '(?i)\b(remember|please|don.t forget) to copy (the|your|a)\s+(secret|password|token|key)\b'
  - type: text
    regex: '(?i)\b(copy|save|store) (the|your)\s+(secret|password|token|key)\s+(somewhere|in a|to a|to your|to the (clipboard|password manager|keychain|vault))\b'
  not:
  - regex: '(?i)\b(next|previous|continuation|pagination|page|bucket|throttle|rate[- ]?limit|fill|refill|sync|csrf|xsrf|anti-forgery) token\b'
  - regex: '(?i)\btoken bucket\b'
