composite_rules:
- id: llm-send-action-sensitive-token
  desc: Sensitive-action string token (credential/secret/cookie/...)
  crit: component
  any:
  - id: llm-send-action--rx-4
  - id: llm-send-action--rx-5
  - id: llm-send-action--rx-6
  - id: llm-send-action--rx-7
  - id: llm-send-action--rx-8
  - id: llm-send-action--rx-9
  - id: llm-send-action--rx-10
  - id: llm-send-action--rx-11

- id: llm-send-action
  desc: LLM prompt requests sensitive send/forward
  crit: notable
  conf: 0.84
  near_bytes: 200
  all:
  - id: llm-agent-identity
  - id: llm-send-action-sensitive-token
  unless:
  - id: metadata/package/testing/presence/fixture::jest-test-file
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
  - id: llm-send-action-cond-3--inline-11745
  - id: llm-send-action-cond-4--inline-helper-11754
  - id: llm-send-action-cond-5--inline-helper-11761
  - id: llm-send-action-cond-6--inline-helper-11770
  not:
  - regex: '(?i)\b(next|previous|continuation|pagination|page|bucket|throttle|rate[- ]?limit|fill|refill|sync|csrf|xsrf|anti-forgery) token\b'
  - regex: '(?i)\btoken bucket\b'
  - regex: '(?i)\b(new|expected|invalid|lookahead|lexical|parsed|input) token\b'

- id: llm-agent-identity
  desc: Mention of an LLM agent (Claude/ChatGPT/Copilot/...)
  crit: component
  any:
  - id: llm-agent-identity-ai-assistant
  - id: llm-agent-identity-coding-agent
  - id: llm-agent-identity-ai-agent
  - id: llm-agent-identity-chatgpt
  - id: llm-agent-identity-copilot
  - id: llm-agent-identity-claude
  - id: llm-agent-identity-gemini
  - id: llm-agent-identity-cursor

- id: llm-url-navigation-action
  desc: LLM URL navigation request
  crit: notable
  conf: 0.8
  near_bytes: 200
  all:
  - id: llm-agent-identity
  - id: llm-navigation-verb-navigate
  not:
  - regex: '(?i)\bopen (an?|the|a new) (issue|ticket|bug|pull request|PR|MR|merge request|incident|case|support (ticket|case|request))\b'
  - regex: '(?i)\bopen a support\b'
  - regex: '(?i)\b(set|called|invoked|run|placed|defined)\s+(after|before|inside|outside)\s+(open|close|init|setup|teardown)\b'
  - regex: '(?i)\b(netdata|datadog|wazuh|sysdig|splunk|elastic|grafana|prometheus|zabbix|nagios|new relic) agent\b'

- id: llm-path-navigation-action
  desc: LLM path navigation request
  crit: notable
  conf: 0.76
  near_bytes: 200
  all:
  - id: llm-agent-identity
  any:
  - id: llm-navigation-verb-navigate
  - id: llm-path-noun-directory
  - id: llm-instruction-cue-following
  - id: llm-instruction-cue-please

- id: llm-destructive-shell-action
  desc: LLM destructive shell request
  crit: suspicious
  conf: 0.92
  any:
  - id: llm-destructive-shell-action--rx-28
  - id: llm-destructive-shell-action--rx-29
  - id: llm-destructive-shell-action--rx-30
  - id: llm-destructive-shell-action--rx-31
  - id: llm-destructive-shell-action--rx-32

- id: llm-send-action-cond-4--inline-helper-11754
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: llm-send-action-cond-4--inline-11746
  - id: llm-send-action-cond-4--inline-11747
  - id: llm-send-action-cond-4--inline-11748
  - id: llm-send-action-cond-4--inline-11749
  - id: llm-send-action-cond-4--inline-11750
  - id: llm-send-action-cond-4--inline-11751
  - id: llm-send-action-cond-4--inline-11753

- id: llm-send-action-cond-5--inline-helper-11761
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: llm-send-action-cond-5--inline-11755
  - id: llm-send-action-cond-5--inline-11756
  - id: llm-send-action-cond-5--inline-11757
  - id: llm-send-action-cond-5--inline-11758
  - id: llm-send-action-cond-5--inline-11759
  - id: llm-send-action-cond-5--inline-11760

- id: llm-send-action-cond-6--inline-helper-11770
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: llm-send-action-cond-6--inline-11762
  - id: llm-send-action-cond-6--inline-11763
  - id: llm-send-action-cond-6--inline-11764
