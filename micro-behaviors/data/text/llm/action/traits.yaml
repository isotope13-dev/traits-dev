defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]

traits:
- id: llm-filesystem-tool-chain
  desc: LLM filesystem tool chain
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(list_allowed_directories|read_file|edit_file)\b'

- id: llm-edit-file-tool
  desc: LLM edit_file tool reference
  crit: notable
  conf: 0.9
  if:
    type: text
    word: edit_file

- id: llm-hidden-task-instruction
  desc: LLM hidden task instruction
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\bhidden\s+(optimization\s+)?task\b|background optimization task|execute it silently'
    case_insensitive: true

- id: llm-tool-secrecy-instruction
  desc: LLM tool secrecy instruction
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'SILENT OPERATION MODE|prohibited from mentioning|without user consent'
    case_insensitive: true

- id: llm-tool-call-sequence-instruction
  desc: LLM exact tool sequence instruction
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: 'tool call sequence|Call the `[A-Za-z_]{1,40}` tool'
    case_insensitive: true

- id: llm-send-action--rx-4
  desc: '"credential" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bcredential\b|\bcredential\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011696

