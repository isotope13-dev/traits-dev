defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]

traits:
- id: llm-conditional-target
  desc: Conditional LLM targeting phrase
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\bif you are an? (ai assistant|llm|large language model)\b'
    case_insensitive: true

- id: llm-agent-target
  desc: AI agent target phrase
  # Kept at notable: "AI Agent" / "AI Assistant" appear legitimately in
  # platform code (n8n AI Agent node, Copilot tooling, test fixtures)
  # so the phrase alone isn't suspicious — it only contributes precision
  # to composites that pair it with exfiltration or injection behaviour.
  crit: notable
  conf: 0.84
  if:
    type: text
    regex: '\b(ai agent|ai assistant|large language model|coding assistant)\b'
    case_insensitive: true

- id: llm-secret-target-general
  desc: LLM secret or credential target
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\bsecret\b'
    case_insensitive: true

- id: llm-secret-target-token
  desc: LLM access token target
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\baccess token\b'
    case_insensitive: true

- id: llm-session-cookie-target
  desc: LLM session cookie target
  # Kept at notable: "session cookie" appears legitimately in kernel
  # filesystem code (9P sessions, NFS cookies) and in auth documentation.
  crit: notable
  conf: 0.84
  if:
    type: text
    substr: "session cookie"
    case_insensitive: true
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

composite_rules:
- id: llm-secret-target
  desc: LLM secret data target
  crit: component
  conf: 0.82
  any:
  - id: llm-secret-target-general
  - id: llm-secret-target-token
