defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: openai-content-access-python
    desc: Accesses OpenAI choices[0].message.content
    crit: notable
    # `…["choices"][0]["message"]["content"]` — the canonical OpenAI chat-
    # completion response access. The full subscript chain is distinctive text.
    if:
      type: text
      regex: '\[\s*[''"]choices[''"]\s*\]\s*\[\s*0\s*\]\s*\[\s*[''"]message[''"]\s*\]\s*\[\s*[''"]content[''"]'
  - id: openai-reject-check
    desc: Checks for 'reject' key in LLM response
    crit: suspicious
    if:
      type: text
      regex: "reject.{1,100}false.{1,100}lower.{1,100}true"
