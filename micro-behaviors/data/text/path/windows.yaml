defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: windows-path-like-string
    desc: Windows path-like string pattern
    crit: baseline
    if:
      type: raw
      regex: '[A-Za-z]:\\\\[^\s]{1,120}'
      case_insensitive: true
    not:
      - substr: C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe
    unless:
      - id: metadata/package/documentation::unix-manpage
composite_rules:
  - id: exe-extension-string
    desc: Contains Windows executable file path
    crit: baseline
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/documentation::unix-manpage
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: windows-path-like-string
