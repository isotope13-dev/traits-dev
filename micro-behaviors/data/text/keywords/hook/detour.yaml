# Neutral keywords related to detours/hooking
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
traits:
  - id: detour
    desc: "Detour keyword (neutral context)"
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: detour
      case_insensitive: true
    unless:
      - id: metadata/file/text/catalog::frequency-list-catalog
    downgrade:
      any:
        - id: metadata/signed/platform::apple
