# French security and financial keywords
# ATT&CK: T1005 (Data from Local System)
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: french-security-passwords
    desc: French password keywords
    crit: notable
    conf: 0.6
    count_min: 2
    if:
      type: string_value
      regex: '(?i)\b(motdepasse|mot_de_passe|privé)\b'
  - id: french-security-financial
    desc: French financial keywords
    crit: notable
    conf: 0.6
    count_min: 2
    if:
      type: string_value
      regex: '(?i)\b(banque|récupé|sauvegarde)\b'
composite_rules:
  - id: french-security-keywords
    desc: French security and financial keywords
    crit: notable
    conf: 0.6
    any:
      - id: french-security-passwords
      - id: french-security-financial
