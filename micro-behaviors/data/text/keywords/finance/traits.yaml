defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: emergency-buffer
    desc: "Financial decoy keyword 'emergency buffer'"
    crit: notable
    if:
      type: string_value
      substr: "emergency buffer"
      case_insensitive: true
  - id: budget-overruns
    desc: "Financial decoy keyword 'budget overruns'"
    crit: notable
    if:
      type: string_value
      substr: "budget overruns"
      case_insensitive: true
  - id: freelancer-negotiation
    desc: "Financial decoy keyword 'FreelancerNegotiationEngine'"
    crit: notable
    if:
      type: string_value
      substr: "FreelancerNegotiationEngine"
  - id: expense-breakdown
    desc: "Financial decoy keyword 'EXPENSE BREAKDOWN'"
    crit: notable
    if:
      type: string_value
      substr: "EXPENSE BREAKDOWN"
  - id: submit-proposal
    desc: "Financial decoy keyword 'SubmitProposal'"
    crit: notable
    if:
      type: string_value
      substr: "SubmitProposal"
composite_rules:
  - id: finance-decoy-cluster
    desc: Financial decoy theme cluster
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: emergency-buffer
      - id: budget-overruns
      - id: freelancer-negotiation
      - id: expense-breakdown
      - id: submit-proposal
