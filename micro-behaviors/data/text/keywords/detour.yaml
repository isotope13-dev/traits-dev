# Neutral keywords related to detours/hooking
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries, scripts]
traits:
  - id: detour
    desc: "Detour keyword (neutral context)"
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: detour
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::apple
