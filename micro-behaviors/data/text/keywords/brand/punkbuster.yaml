# PunkBuster brand masquerading detection.
# PunkBuster is a legitimate game anti-cheat company (PunkBuster Ltd.).
# Malware spoofs version info to appear as PunkBuster software.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.9
  attack: T1036
  mbc: B0006
traits:
  - id: punkbuster-company-name
    desc: PunkBuster Ltd. company name in version info
    if:
      type: kv
      path: pe.version.company
      substr: "PunkBuster"
  - id: punkbuster-file-description
    desc: PunkBuster Service file description in version info
    if:
      type: kv
      path: pe.version.description
      substr: "PunkBuster"
  - id: punkbuster-internal-name
    desc: PunkBuster internal name in version info
    if:
      type: kv
      path: pe.version.internal_name
      substr: "PunkBuster"
