# Secret-bearing environment-variable name keywords. A string literal that
# looks like a secret env var name (e.g. "SEARCH_BACKEND_SONIC_PASSWORD") is a
# neutral keyword on its own — every app with secret config has them. These are
# building blocks: the credential-access objective is the combination of an
# actual env read (os.getenv / os.environ) with one of these keywords, composed
# in objectives/credential-access/env/secrets/script.
# Relocated here from that objectives directory, where bare keyword atoms at
# suspicious surfaced standalone on benign config references (TAXONOMY §142).
defaults:
  platforms: [windows, unix]
  for:
    - python
  crit: baseline
  conf: 0.7
traits:
  - id: keyword-token
    desc: TOKEN keyword in env variable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}TOKEN[A-Z0-9_]{0,48}'
    not:
      # LLM token-count config (token = quantity of tokens, not an auth token):
      # e.g. LLM_..._TOKEN_THRESHOLD, MAX_TOKENS, NUM_TOKENS.
      - regex: 'TOKEN_(THRESHOLD|COUNT|LIMIT|BUDGET)'
      - regex: '(MAX|MIN|NUM|TOTAL)_TOKENS?\b'
      - substr: TIKTOKEN
      - substr: GITHUB_TOKEN
      - substr: GH_TOKEN
      - substr: GITLAB_TOKEN
      - substr: BITBUCKET_TOKEN
      - substr: NUGET_API_KEY
      - substr: PYPI_TOKEN
      - substr: TWINE_PASSWORD
      - substr: SONAR_TOKEN
      - substr: CODECOV_TOKEN
      - substr: COVERALLS_TOKEN
  - id: keyword-key
    desc: KEY keyword in env variable
    conf: 0.65
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}KEY_STEALER[A-Z0-9_]{0,48}'
  - id: keyword-secret
    desc: SECRET keyword in env variable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}SECRET[A-Z0-9_]{0,48}'
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: keyword-pass
    desc: PASS keyword in env variable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}(PASS|PASSWORD)[A-Z0-9_]{0,48}'
    not:
      - substr: MAVEN_PASSWORD
      - substr: SEL_M2_PASS
  - id: keyword-auth
    desc: AUTH keyword in env variable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}AUTH[A-Z0-9_]{0,48}'
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: keyword-pwd
    desc: PWD keyword in env variable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}PWD[A-Z0-9_]{0,48}'
  - id: keyword-cred
    desc: CRED keyword in env variable
    if:
      type: string_literal
      regex: '[A-Z][A-Z0-9_]{0,48}CRED(ENTIALS?)?[A-Z0-9_]{0,48}'
