defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: base62-alphanumeric-charset
    desc: Base62 alphanumeric charset alphabet (A-Za-z0-9)
    crit: baseline
    conf: 0.6
    if:
      type: text
      exact: ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
  - id: qwerty-order-alphabet
    desc: QWERTY-order keyboard alphabet string
    crit: baseline
    conf: 0.5
    for: [scripts, source, binaries]
    if:
      type: text
      exact: qwertyuiopasdfghjklzxcvbnm
