# VMware vendor keyword. Neutral: "vmware" appears in legitimate VMware tools,
# drivers, and adapter strings as well as in VM-detection logic. Sandbox/VM
# evasion intent comes from composites that pair it with anti-analysis checks.
defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: vmware-keyword
  desc: VMware vendor name reference
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: vmware
