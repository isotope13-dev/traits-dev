# QNAP NAS-appliance vendor name keyword. Neutral: "QNAP" appears in legitimate
# vendor firmware, drivers and compatibility strings as well as in
# device-targeting logic. Targeting intent comes from composites that pair it
# with exploit or destructive behavior.
defaults:
  platforms: [unix, android, ios]
  for: [elf, macho]
  crit: component
traits:
  - id: qnap-word
    desc: QNAP vendor name reference
    conf: 0.7
    if:
      type: text
      word: QNAP
      section: .text
