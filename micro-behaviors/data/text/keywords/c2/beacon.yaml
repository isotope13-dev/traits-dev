# Neutral keywords related to beacons (Search Party, etc.)
# Moved from objectives/command-and-control/beacon/network/ to avoid FP on Apple system binaries
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
traits:
  - id: beacon
    desc: "Beacon keyword (neutral context)"
    crit: component
    conf: 0.6
    if:
      type: text
      word: beacon
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: heartbeat-word
    desc: Heartbeat keyword
    crit: component
    conf: 0.7
    if:
      type: text
      word: heartbeat
    unless:
      - id: micro-behaviors/communications/socket/framing::libp2p-library-reference
      - id: well-known/app/terraform-provider::terraform-provider-binary
      - id: well-known/app/terraform-provider::ibm-cloud-terraform-provider
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/file/extension::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers::nvidia-linux-driver-component
