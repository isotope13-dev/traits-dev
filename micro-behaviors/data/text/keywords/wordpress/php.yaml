defaults:
  platforms: [unix, windows]
  for: [php]
traits:
  - id: wp-user-login-field
    desc: WordPress user_login field reference
    crit: component
    conf: 0.75
    if:
      type: text
      word: user_login
  - id: wp-user-query-exclusion
    desc: WordPress user query exclusion
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'user_login\s*!=|login__not_in'
  - id: woocommerce-order-payment-method
    desc: WooCommerce order payment method access
    crit: component
    conf: 0.82
    if:
      type: text
      word: get_payment_method
  - id: woocommerce-order-billing-country
    desc: WooCommerce order billing country access
    crit: component
    conf: 0.82
    if:
      type: text
      word: get_billing_country
composite_rules:
  - id: wp-user-query-filtering
    desc: WordPress user query filtering
    crit: notable
    conf: 0.84
    all:
      - id: wp-user-login-field
      - id: wp-user-query-exclusion
  - id: woocommerce-order-summary-fields
    desc: WooCommerce order summary fields
    crit: notable
    conf: 0.86
    all:
      - id: woocommerce-order-payment-method
      - id: woocommerce-order-billing-country
