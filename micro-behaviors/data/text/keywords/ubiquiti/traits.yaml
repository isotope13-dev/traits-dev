# Ubiquiti network-device vendor / product name keywords (UBNT, UniFi, EdgeOS,
# Vyatta). Neutral: these names appear in legitimate Ubiquiti firmware,
# controllers, drivers and compatibility strings. Targeting intent comes from
# composites that pair the directory with exploit or destructive behavior.
defaults:
  platforms: [unix, android, ios]
  for: [elf, macho]
  crit: component
traits:
  - id: ubnt-word
    desc: UBNT vendor abbreviation reference
    conf: 0.8
    if:
      type: text
      word: ubnt
      section: .text
  - id: unifi-word
    desc: UniFi product name reference
    conf: 0.8
    if:
      type: text
      word: unifi
      case_insensitive: true
      section: .text
  - id: edgeos-word
    desc: EdgeOS system name reference
    conf: 0.85
    if:
      type: text
      word: edgeos
      case_insensitive: true
      section: .text
  - id: vyatta-word
    desc: Vyatta system name reference
    conf: 0.85
    if:
      type: text
      word: vyatta
      case_insensitive: true
      section: .text
