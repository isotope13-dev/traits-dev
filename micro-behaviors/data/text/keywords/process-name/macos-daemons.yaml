# Apple system daemon names. Ubiquitous on macOS/iOS and in any agent, scanner,
# or system tool that references them — NOT an attribution on their own.
# Component building blocks; injection-target composites gate on several
# co-occurring with a real injection/staging behavior.
defaults:
  platforms: [macos, ios]
  for: [javascript, typescript]
  crit: component
  conf: 0.3
traits:
  - id: springboard-daemon
    desc: SpringBoard daemon name
    if:
      type: string_literal
      exact: SpringBoard
  - id: launchd-daemon
    desc: launchd daemon name
    if:
      type: string_literal
      exact: launchd
  - id: configd-daemon
    desc: configd daemon name
    if:
      type: string_literal
      exact: configd
  - id: wifid-daemon
    desc: wifid daemon name
    if:
      type: string_literal
      exact: wifid
  - id: securityd-daemon
    desc: securityd daemon name
    if:
      type: string_literal
      exact: securityd
  - id: usereventagent-daemon
    desc: UserEventAgent daemon name
    if:
      type: string_literal
      exact: UserEventAgent
