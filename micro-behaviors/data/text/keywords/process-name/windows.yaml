# Well-known Windows executable name references. Neutral: these names appear
# in countless legitimate binaries; injection-target or masquerade intent comes
# from composites that pair them with process-injection or spoofing behavior.
defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: calc-exe-name
  desc: calc.exe process name reference
  crit: baseline
  conf: 0.6
  if:
    type: text
    exact: calc.exe
- id: notepad-exe-name
  desc: notepad.exe process name reference
  crit: baseline
  conf: 0.6
  if:
    type: text
    exact: notepad.exe
- id: iexplore-exe-name
  desc: iexplore.exe process name reference
  crit: baseline
  conf: 0.6
  if:
    type: text
    exact: iexplore.exe
