defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
  crit: component
  conf: 0.2
  for: [binaries, scripts, source]
traits:
  - id: overflow
    desc: overflow keyword
    crit: component
    conf: 0.5
    if:
      type: string_value
      substr: overflow
  - id: offset
    desc: offset keyword
    crit: baseline
    if:
      type: string_value
      substr: offset
  - id: address
    desc: address keyword
    crit: baseline
    if:
      type: string_value
      substr: address
  - id: padding
    desc: padding keyword
    crit: baseline
    if:
      type: string_value
      substr: padding
  - id: buffer
    desc: buffer keyword
    crit: baseline
    if:
      type: string_value
      substr: buffer
  - id: crypto-word
    desc: crypto keyword (word match)
    if:
      type: string_value
      word: crypto
  - id: crypto-substr
    desc: crypto keyword (substr, catches imports)
    if:
      type: string_value
      substr: crypto
  - id: token
    desc: token keyword
    crit: component
    conf: 0.3
    count_min: 2
    if:
      type: string_value
      word: token
      case_insensitive: true
  - id: password
    desc: password keyword
    crit: component
    conf: 0.5
    if:
      type: string_value
      substr: password
      case_insensitive: true
  - id: password-weak
    desc: weak password keyword (password12345678)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: password12345678
  - id: pwd
    desc: pwd keyword
    if:
      type: string_value
      exact: pwd
  - id: credential
    desc: credential keyword
    crit: baseline
    conf: 0.3
    if:
      type: string_value
      substr: credential
      case_insensitive: true
  - id: secret
    desc: secret keyword
    crit: component
    conf: 0.3
    if:
      type: string_value
      substr: secret
      case_insensitive: true
  - id: command-dup
    desc: command keyword
    if:
      type: string_value
      substr: command
  - id: pipe
    desc: pipe keyword
    if:
      type: string_value
      exact: pipe
  - id: output
    desc: output keyword
    if:
      type: string_value
      substr: output
  - id: execute
    desc: execute keyword
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      word: execute
  - id: payload
    desc: payload keyword
    crit: component
    conf: 0.6
    if:
      type: string_value
      word: payload
  - id: isrc
    desc: ISRC (International Standard Recording Code) keyword
    crit: baseline
    if:
      type: string_value
      substr: isrc
  - id: exploit
    desc: exploit keyword
    crit: component
    conf: 0.4
    if:
      type: string_value
      word: exploit
      case_insensitive: true
  - id: bypass
    desc: bypass keyword
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      word: bypass
      case_insensitive: true
  - id: hide
    desc: hide keyword
    crit: component
    conf: 0.5
    if:
      type: string_value
      word: hide
  - id: tmp
    desc: tmp keyword
    if:
      type: string_value
      exact: tmp
  - id: temp
    desc: temp keyword
    crit: baseline
    if:
      type: string_value
      exact: temp
