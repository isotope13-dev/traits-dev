# Generic Text Patterns - Building Blocks for Composites
# These terms have no standalone malicious meaning - they only gain
# significance when combined with contextual indicators in composite rules.
# Marked as component so they're filtered from output unless a composite fires.
defaults:
  platforms: [linux, macos, windows, unix]
  crit: component
  conf: 0.2
  for: [scripts, binaries, source]
traits:
  # === Memory/Buffer Terms ===
  - id: overflow
    desc: overflow keyword
    crit: component
    conf: 0.5
    if:
      type: string_value
      substr: "overflow"
  - id: offset
    desc: offset keyword
    if:
      type: string_value
      substr: "offset"
  - id: address
    desc: address keyword
    if:
      type: string_value
      substr: "address"
  - id: padding
    desc: padding keyword
    if:
      type: string_value
      substr: "padding"
  - id: buffer
    desc: buffer keyword
    if:
      type: string_value
      substr: "buffer"
      # === Cryptocurrency Terms ===
  - id: crypto-word
    desc: crypto keyword (word match)
    if:
      type: string_value
      word: "crypto"
  - id: crypto-substr
    desc: crypto keyword (substr, catches imports)
    if:
      type: string_value
      substr: "crypto"
      # === Credential Terms ===
  - id: token
    desc: token keyword
    crit: component
    conf: 0.3
    count_min: 2
    if:
      type: string_value
      word: "token"
      case_insensitive: true
  - id: password
    desc: password keyword
    crit: component
    conf: 0.5
    if:
      type: string_value
      substr: "password"
      case_insensitive: true
  - id: password-weak
    desc: weak password keyword (password12345678)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "password12345678"
  - id: pwd
    desc: pwd keyword
    if:
      type: string_value
      exact: "pwd"
  - id: credential
    desc: credential keyword
    crit: component
    conf: 0.3
    if:
      type: string_value
      substr: "credential"
      case_insensitive: true
  - id: secret
    desc: secret keyword
    crit: component
    conf: 0.3
    if:
      type: string_value
      substr: "secret"
      case_insensitive: true
      # === Command/Execution Terms ===
  - id: command-dup
    desc: command keyword
    if:
      type: string_value
      substr: "command"
  - id: pipe
    desc: pipe keyword
    if:
      type: string_value
      exact: "pipe"
  - id: output
    desc: output keyword
    if:
      type: string_value
      substr: "output"
      # Note: "execute" appears in legitimate help text and documentation
  - id: execute
    desc: execute keyword
    crit: component
    conf: 0.5
    if:
      type: string_value
      word: "execute"
  - id: payload
    desc: payload keyword
    crit: component
    conf: 0.6
    if:
      type: string_value
      word: "payload"
  - id: isrc
    desc: ISRC (International Standard Recording Code) keyword
    if:
      type: string_value
      substr: "isrc"
  - id: exploit
    desc: exploit keyword
    crit: component
    conf: 0.4
    if:
      type: string_value
      word: "exploit"
      case_insensitive: true
      # === Network Terms ===
      # Removed socket duplicate - use objectives/command-and-control/reverse-shell/pty::python-socket or micro-behaviors/communications/socket/legacy patterns
  - id: bypass
    # === Security/Evasion Terms ===

    desc: bypass keyword
    crit: component
    conf: 0.6
    if:
      type: string_value
      word: "bypass"
      case_insensitive: true
  - id: hide
    desc: hide keyword
    crit: component
    conf: 0.5
    if:
      type: string_value
      word: "hide"
      # === Script Engine Terms ===
      # Removed powershell duplicate - use micro-behaviors/process/create/shell/lang::powershell-keyword
  - id: tmp
    # Removed cmd duplicate - use objectives/command-and-control/reverse-shell/socket/go::cmd-plain or specific patterns

    # === Misc Generic Terms ===
    # Removed runtime duplicate - use metadata/hardening::hardened-runtime or specific patterns
    desc: tmp keyword
    if:
      type: string_value
      exact: "tmp"
  - id: temp
    desc: temp keyword
    if:
      type: string_value
      exact: "temp"
