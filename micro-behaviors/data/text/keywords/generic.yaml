# Generic keyword traits. Every trait here matches a single English word as
# a substring or word-boundary. Component-only by default — standalone they
# trigger on virtually every binary/source and produce no actionable signal.
# Composites in other directories gate on these alongside a real behavior
# indicator. Orphaned keywords (offset, address, padding, buffer, credential,
# execute, isrc, bypass, temp) were deleted — delete more as they age out.
defaults:
  platforms:
    - windows
    - unix
  crit: component
  conf: 0.2
  for: [binaries, scripts, source]
traits:
  - id: overflow
    desc: overflow keyword
    crit: component
    conf: 0.5
    if:
      type: text
      substr: overflow
  - id: crypto-word
    desc: crypto keyword (word match)
    if:
      type: text
      word: crypto
  - id: crypto-substr
    desc: crypto keyword (substr, catches imports)
    if:
      type: text
      substr: crypto
  - id: token
    desc: token keyword
    crit: component
    conf: 0.3
    count_min: 2
    if:
      type: text
      word: token
      case_insensitive: true
  - id: password
    desc: password keyword
    crit: component
    conf: 0.5
    if:
      type: text
      substr: password
      case_insensitive: true
      not:
        - substr: DEFECTIVE_CREDENTIAL
  - id: password-weak
    desc: weak password keyword (password12345678)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: password12345678
  - id: pwd
    desc: pwd keyword
    if:
      type: text
      exact: pwd
  - id: secret
    desc: secret keyword
    crit: component
    conf: 0.3
    if:
      type: text
      substr: secret
      case_insensitive: true
  - id: command-dup
    desc: command keyword
    if:
      type: text
      substr: command
  - id: pipe
    desc: pipe keyword
    if:
      type: text
      exact: pipe
  - id: output
    desc: output keyword
    if:
      type: text
      substr: output
  - id: payload
    desc: payload keyword
    crit: component
    conf: 0.6
    if:
      type: text
      word: payload
  - id: exploit
    desc: exploit keyword
    crit: component
    conf: 0.4
    if:
      type: text
      word: exploit
      case_insensitive: true
  - id: hide
    desc: hide keyword
    crit: component
    conf: 0.5
    if:
      type: text
      word: hide
  - id: tmp
    desc: tmp keyword
    if:
      type: text
      exact: tmp
