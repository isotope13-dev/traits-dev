defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.45
traits:
  - id: secret-upper
    desc: SECRET credential label
    if:
      type: text
      substr: SECRET
  - id: token-upper
    desc: TOKEN credential label
    if:
      type: text
      substr: TOKEN
  - id: cred-upper
    desc: CRED credential label
    if:
      type: text
      substr: CRED
  - id: auth-upper
    desc: AUTH authentication label
    if:
      type: text
      regex: '\bAUTH(_[A-Z0-9_]{1,48})?\s*[:=]'
  - id: credential-field
    desc: password/token/api_key field keyword
    conf: 0.84
    if:
      type: text
      regex: '\b(password|token|api_key)\b'
  - id: aws-credential-management-phrase
    desc: '"AWS credential management" docstring phrase'
    crit: baseline
    if:
      type: text
      substr: AWS credential management
  # Generic hardcoded-credential, auth-bypass and credential-logging markers
  # common to authentication backdoors. Component building blocks: standalone
  # they carry no signal; backdoor composites in other directories gate on
  # several of them co-occurring.
  - id: hardcoded-master-password
    desc: master_password hardcoded credential marker
    for: [scripts, binaries]
    if:
      type: text
      substr: master_password
      section: .text
  - id: hardcoded-backdoor-pass
    desc: backdoor_pass hardcoded credential marker
    for: [scripts, binaries]
    if:
      type: text
      substr: backdoor_pass
      section: .text
  - id: hardcoded-magic-password
    desc: magic_password hardcoded credential marker
    for: [scripts, binaries]
    if:
      type: text
      substr: magic_password
      section: .text
  - id: auth-bypass-marker
    desc: auth_bypass function marker
    for: [scripts, binaries]
    if:
      type: text
      substr: auth_bypass
      section: .text
  - id: skip-auth-marker
    desc: skip_auth function marker
    for: [scripts, binaries]
    if:
      type: text
      substr: skip_auth
      section: .text
  - id: password-log-marker
    desc: password_log credential-logging marker
    for: [scripts, binaries]
    if:
      type: text
      substr: password_log
      section: .text
  - id: cred-log-marker
    desc: cred_log credential-logging marker
    for: [scripts, binaries]
    if:
      type: text
      substr: cred_log
      section: .text
