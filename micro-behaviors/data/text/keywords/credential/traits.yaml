defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.45
traits:
  - id: secret-upper
    desc: SECRET credential label
    if:
      type: text
      substr: SECRET
  - id: token-upper
    desc: TOKEN credential label
    if:
      type: text
      substr: TOKEN
  - id: cred-upper
    desc: CRED credential label
    if:
      type: text
      substr: CRED
  - id: auth-upper
    desc: AUTH authentication label
    if:
      type: text
      substr: AUTH
