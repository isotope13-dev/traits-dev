# Neutral file-extension keyword references. A document/secret extension string
# appearing in code is value-neutral (clinify legitimately writes .docx); intent
# (collecting a MIXED document+secret list) is inferred by composites in
# objectives/collection/stealer/ that reference these atoms.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.9
traits:
  - id: office-document-extension
    desc: Office document file extension keyword
    if:
      type: text
      regex: '\b(docx|xlsx|pptx)\b'
  - id: credential-file-extension
    desc: 'cred/VPN file extension keyword (KeePass/OpenVPN)'
    if:
      type: text
      regex: '\b(kdbx|ovpn)\b'
