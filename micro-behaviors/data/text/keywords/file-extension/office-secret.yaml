# Neutral file-extension keyword references. A document/secret extension string
# appearing in code is value-neutral (clinify legitimately writes .docx); intent
# (collecting a MIXED document+secret list) is inferred by composites in
# objectives/collection/stealer/ that reference these atoms.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.9
traits:
- id: office-document-extension--docx
  desc: Office document file extension keyword (docx)
  if:
    type: text
    word: docx
- id: office-document-extension--xlsx
  desc: Office document file extension keyword (xlsx)
  if:
    type: text
    word: xlsx
- id: office-document-extension--pptx
  desc: Office document file extension keyword (pptx)
  if:
    type: text
    word: pptx
- id: credential-file-extension--kdbx
  desc: cred/VPN file extension keyword (kdbx)
  if:
    type: text
    word: kdbx
- id: credential-file-extension--ovpn
  desc: cred/VPN file extension keyword (ovpn)
  if:
    type: text
    word: ovpn
composite_rules:
- id: office-document-extension
  desc: Office document file extension keyword
  any:
  - id: office-document-extension--docx
  - id: office-document-extension--xlsx
  - id: office-document-extension--pptx
- id: credential-file-extension
  desc: "cred/VPN file extension keyword"
  any:
  - id: credential-file-extension--kdbx
  - id: credential-file-extension--ovpn
