defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: redirectfromjsp-param
    desc: Oracle EBS redirectFromJsp parameter
    crit: notable
    if:
      type: text
      substr: redirectFromJsp
  - id: getuitype-param
    desc: Oracle EBS getUiType parameter
    crit: notable
    if:
      type: text
      substr: getUiType
  - id: uiservlet-xml-initialize
    desc: UiServlet XML initialize
    crit: notable
    if:
      type: text
      substr: <initialize>
  - id: uiservlet-xml-return-url
    desc: UiServlet XML return_url
    crit: notable
    if:
      type: text
      substr: <param name="return_url">
