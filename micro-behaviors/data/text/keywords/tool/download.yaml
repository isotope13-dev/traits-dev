# Command-line download client tokens. Neutral on their own (curl/wget appear
# in countless build scripts and docs). Composites gate these alongside a
# pipe-to-interpreter token and a run/paste cue to detect download-pipe-exec.
defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  crit: component
traits:
- id: download-client
  desc: curl/wget download client token
  conf: 0.86
  if:
    type: text
    regex: '\b(curl|wget)\b'
    case_insensitive: true
