defaults:
  platforms:
    - windows
  for:
    - pe
    - csharp
traits:
  - id: java-platform-string
    desc: Java Platform SE string
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: Java(TM) Platform SE binary
      case_insensitive: true
  - id: oracle-america-string
    desc: Oracle America Inc string
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: Oracle America Inc.
      case_insensitive: true
  - id: jjs-launcher-string
    desc: Java jjs launcher filename
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: jjs.exe
      case_insensitive: true
  - id: nashorn-shell-string
    desc: Nashorn shell class string
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: jdk.nashorn.tools.Shell
