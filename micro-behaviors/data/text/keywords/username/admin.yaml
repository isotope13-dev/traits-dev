defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: admin-keyword
    desc: admin keyword
    crit: baseline
    conf: 0.2
    attack: T1110.001
    mbc: B0028
    if:
      type: text
      word: admin
      case_insensitive: true
    unless:
      - type: text
        regex: (?i)[\\/]admin[\\/]
      - type: text
        regex: (?i)[\\/]administrator[\\/]
      - type: text
        regex: (?i)onecoreuap\\\\admin\\\\
