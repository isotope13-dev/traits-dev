# admin username string
# Standard admin/administrator reference
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: admin-keyword
    desc: admin keyword
    crit: baseline
    conf: 0.2
    attack: "T1110.001"
    mbc: "B0028"
    if:
      type: string_value
      word: "admin"
      case_insensitive: true
    unless:
      # Build/source path context (e.g. onecoreuap\admin\...\*.cpp) is not credential usage
      - type: string_value
        regex: '(?i)[\\/]admin[\\/]'
      - type: string_value
        regex: '(?i)[\\/]administrator[\\/]'
      - type: string_value
        regex: '(?i)onecoreuap\\\\admin\\\\'
