# Neutral keywords related to beacons (Search Party, etc.)
# Moved from objectives/command-and-control/beacon/network/ to avoid FP on Apple system binaries
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries, scripts]
traits:
  - id: beacon
    desc: "Beacon keyword (neutral context)"
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: beacon
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::apple
