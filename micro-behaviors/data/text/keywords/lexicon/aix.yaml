defaults:
  platforms: [macos, linux]
  for: [shell]
traits:
  - id: cron-dup-aix
    desc: cron keyword (AIX)
    crit: baseline
    conf: 0.3
    for: [swift, lua, php, shell]
    if:
      type: text
      substr: cron
  - id: ssh-string
    desc: ssh keyword
    crit: baseline
    conf: 0.3
    for: [c, kotlin, swift, zig]
    if:
      type: text
      word: ssh
  - id: rcp-string
    desc: rcp keyword
    crit: baseline
    conf: 0.3
    for: [java, class, kotlin]
    if:
      type: text
      word: rcp
