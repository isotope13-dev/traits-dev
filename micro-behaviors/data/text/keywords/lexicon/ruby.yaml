defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: web-shell-cmd-param
    desc: Web shell command parameter
    crit: component
    conf: 0.9
    unless:
      - id: well-known/lib/jruby::package-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::jruby-home-path
      - id: metadata/package/files::ruby-vendor-bundle-gem-path
      - type: text
        substr: "Pry.config.exec_string"
    if:
      type: string_literal
      regex: '\b(cmd|command|exec|run)='
  - id: php-shell-function
    desc: PHP exec function in URL
    crit: component
    conf: 0.92
    if:
      type: string_literal
      regex: shell_exec|passthru|popen\(
    unless:
      - id: micro-behaviors/process/create/shell/lang::ruby-shell-exec
      - id: metadata/package/files::ruby-vendor-bundle-gem-path
      - type: text
        substr: "module CodeRay"
  - id: shell-prompt-string
    desc: Shell prompt marker
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: shell\$|sh\$|zsh\$
