# Generic keyword traits. Every trait here matches a single English word as
# a substring or word-boundary. Component-only by default — standalone they
# trigger on virtually every binary/source and produce no actionable signal.
# Composites in other directories gate on these alongside a real behavior
# indicator. Orphaned keywords (offset, address, padding, buffer, credential,
# execute, isrc, bypass, temp) were deleted — delete more as they age out.
defaults:
  platforms:
    - windows
    - unix
  crit: component
  conf: 0.2
  for: [binaries, scripts, source]
traits:
  - id: contract-keyword
    desc: contract keyword
    conf: 0.3
    for: [javascript, typescript]
    unless:
      - id: metadata/file/text/catalog::uproc-tools-catalog
    if:
      type: literal
      kind: string
      regex: (?i)contract
  - id: http-verb-keyword
    desc: HTTP verb keyword (post/fetch/request)
    conf: 0.75
    for: [javascript]
    if:
      type: text
      regex: '\b(post|fetch|request)\b'
  # Remote-admin / RAT control-panel feature words. Generic individually (legit
  # RMM tools, file managers, RDP clients use them); relocated out of
  # well-known/malware/rat/overlord so they carry no family attribution. A
  # composite (e.g. overlord-features) gates on their co-occurrence.
  - id: remote-desktop-word
    desc: '"remote_desktop" feature word'
    if:
      type: text
      substr: remote_desktop
  - id: file-browser-word
    desc: '"file_browser" feature word'
    if:
      type: text
      substr: file_browser
  - id: keylogger-word
    desc: '"keylogger" feature word'
    if:
      type: text
      substr: keylogger
  - id: command-result-word
    desc: cmd/command/result vocabulary word
    crit: component
    conf: 0.4
    if:
      type: text
      regex: (?i)\b(cmd|command|result)\b
  - id: notification-alert-word
    desc: notification or alert vocabulary word
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bnotifications?\b|\balerts\b|通知'
  - id: notification-config-word
    desc: notify/sender vocabulary word
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\b(notify|sender)\b|推送'
  - id: webhook-service-word
    desc: webhook vocabulary word
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\bwebhooks?\b
  - id: overflow
    desc: overflow keyword
    crit: component
    conf: 0.5
    if:
      type: text
      substr: overflow
  - id: crypto-word
    desc: crypto keyword (word match)
    if:
      type: text
      word: crypto
  - id: crypto-substr
    desc: crypto keyword (substr, catches imports)
    if:
      type: text
      substr: crypto
  - id: token
    desc: token keyword
    crit: component
    conf: 0.3
    count_min: 2
    if:
      type: text
      word: token
      case_insensitive: true
  - id: password
    desc: password keyword
    crit: component
    conf: 0.5
    if:
      type: text
      substr: password
      case_insensitive: true
  - id: password-weak
    desc: weak password keyword (password12345678)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: password12345678
  - id: pwd
    desc: pwd keyword
    if:
      type: text
      word: pwd
  - id: secret
    desc: secret keyword
    crit: component
    conf: 0.3
    if:
      type: text
      substr: secret
      case_insensitive: true
  - id: credential
    desc: credential keyword
    crit: component
    conf: 0.3
    if:
      type: text
      word: credential
      case_insensitive: true
  - id: keystore
    desc: keystore keyword
    crit: component
    conf: 0.4
    if:
      type: text
      substr: keystore
      case_insensitive: true
  - id: command-dup
    desc: command keyword
    if:
      type: text
      substr: command
  - id: pipe
    desc: pipe keyword
    if:
      type: text
      word: pipe
  - id: output
    desc: output keyword
    if:
      type: text
      substr: output
  - id: payload
    desc: payload keyword
    crit: component
    conf: 0.6
    if:
      type: text
      word: payload
  - id: exploit
    desc: exploit keyword
    crit: component
    conf: 0.4
    if:
      type: text
      word: exploit
      case_insensitive: true
  - id: hide
    desc: hide keyword
    crit: component
    conf: 0.5
    if:
      type: text
      word: hide
  - id: tmp
    desc: tmp keyword
    if:
      type: text
      word: tmp
  - id: php-fpm
    desc: php-fpm process name keyword
    crit: component
    conf: 0.4
    for: [php]
    if:
      type: text
      substr: php-fpm
      case_insensitive: true
  - id: rust-bin-crypto-vocab
    desc: rust binary crypto module vocabulary
    count_min: 3
    if:
      type: text
      regex: '\b(encrypt|csprng)\b'
  - id: rust-bin-fs-vocab
    desc: rust binary fs module vocabulary
    count_min: 3
    if:
      type: text
      regex: '\b(walker|icons|services)\b'
  - id: encrypted-trailer-vocab
    desc: encrypted-file trailer vocabulary
    # `public` removed from the alternation: it's a class-visibility keyword in
    # PHP/Java/C#/etc. that fired ~180×/project as pure noise. The remaining
    # tokens (trailer / footer / magic) are end-of-file-marker vocabulary that
    # encrypted formats use. Composite consumers gate on these alongside
    # binary-structure evidence.
    if:
      type: text
      regex: '(?i)\b(trailer|footer|magic)\b'
composite_rules:
  - id: credential-keywords
    desc: Credential-related keyword present
    crit: component
    conf: 0.3
    any:
      - id: token
      - id: secret
      - id: password
      - id: credential
      - id: keystore
