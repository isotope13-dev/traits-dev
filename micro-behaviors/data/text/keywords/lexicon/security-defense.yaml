# Generic security-defense vocabulary (PPL, EDR, antivirus). These words
# appear in defensive tooling, documentation, and security software as often
# as in malware that references the defenses it intends to neutralize.
# Component-only — composites in other directories gate on these alongside a
# real tampering/neutralization behavior.
defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source]
  crit: component
  conf: 0.7
traits:
  - id: protected-process-light-keyword
    desc: Protected Process Light / PPL keyword
    if:
      type: text
      regex: '(?i)\b(Protected Process Light|PPL)\b'
  - id: edr-keyword
    desc: EDR / endpoint detection keyword
    if:
      type: text
      regex: '(?i)\b(EDR|endpoint detection)\b'
  - id: antivirus-keyword
    desc: antivirus keyword
    if:
      type: text
      regex: '(?i)\b(antivirus)\b'
