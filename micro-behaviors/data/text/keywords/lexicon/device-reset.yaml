# Generic device reset / reboot vocabulary (reboot, factory). Neutral: these
# English words appear constantly in benign firmware, documentation and admin
# tooling. Destructive intent comes from composites that pair them with raw
# flash-erase or device-write commands.
defaults:
  platforms: [unix, android, ios]
  for: [elf, macho]
  crit: component
traits:
  - id: reboot-word
    desc: reboot command word
    conf: 0.5
    if:
      type: text
      word: reboot
      section: .text
  - id: factory-word
    desc: factory keyword (reset)
    conf: 0.5
    if:
      type: text
      word: factory
      section: .text
