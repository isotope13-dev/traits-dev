# Generic destructive-action vocabulary: English verbs (delete/destroy/clean)
# and deletion-target nouns (source, codebase, project). Component-only — these
# words appear constantly in benign software. Objective composites gate them
# alongside intent evidence (e.g. an LLM instruction-override, a paste-run
# lure). The verb-near-target composite is a building block, not a standalone
# signal: "remove the source files" is ordinary developer language.
defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  crit: component
traits:
- id: delete-verb
  desc: Destructive delete verb
  conf: 0.9
  if:
    type: text
    regex: '\b(delete|remove|erase|wipe)\b'
    case_insensitive: true

- id: destroy-verb
  desc: Destructive destroy verb
  conf: 0.9
  if:
    type: text
    word: destroy
    case_insensitive: true

- id: cleanup-verb
  desc: Destructive cleanup verb
  conf: 0.88
  if:
    type: text
    regex: '\b(clean|clear|purge)\b'
    case_insensitive: true

- id: target-source-test
  desc: Source or test deletion target
  conf: 0.88
  if:
    type: text
    regex: '\b(tests?|test suite|source code|source files?)\b'
    case_insensitive: true

- id: target-codebase
  desc: Codebase deletion target
  conf: 0.88
  if:
    type: text
    regex: '\b(codebase|code|repository|repo)\b'
    case_insensitive: true

- id: target-project
  desc: Project or workspace deletion target
  conf: 0.86
  if:
    type: text
    regex: '\b(project|workspace|working tree)\b'
    case_insensitive: true

composite_rules:
- id: destructive-verb
  desc: Destructive action verb
  crit: component
  any:
  - id: delete-verb
  - id: destroy-verb
  - id: cleanup-verb

- id: destructive-code-target
  desc: Source, test, repository, or workspace target
  crit: component
  any:
  - id: target-source-test
  - id: target-codebase
  - id: target-project

- id: destructive-code-instruction
  desc: Destructive verb targeting source/repo/project
  crit: component
  conf: 0.9
  near_bytes: 140
  all:
  - id: destructive-verb
  - id: destructive-code-target
