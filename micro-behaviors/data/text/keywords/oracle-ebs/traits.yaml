defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: runforms-endpoint
    desc: Oracle EBS /OA_HTML/runforms.jsp endpoint
    crit: notable
    if:
      type: string_value
      substr: /OA_HTML/runforms.jsp
  - id: javascript-servlet-endpoint
    desc: Oracle EBS /OA_HTML/JavaScriptServlet endpoint
    crit: notable
    if:
      type: string_value
      substr: /OA_HTML/JavaScriptServlet
  - id: configurator-uiservlet-endpoint
    desc: Oracle EBS /OA_HTML/configurator/UiServlet endpoint
    crit: suspicious
    mbc: E1192
    if:
      type: string_value
      substr: /OA_HTML/configurator/UiServlet
  - id: ieshostedsurvey-endpoint
    desc: Oracle EBS ieshostedsurvey.jsp
    crit: suspicious
    if:
      type: string_value
      regex: (/OA_HTML/\.\./ieshostedsurvey\.jsp|/OA_HTML/help/\.\./ieshostedsurvey\.jsp)
  - id: csrf-token-headers
    desc: Oracle EBS CSRF headers
    crit: notable
    if:
      type: string_value
      regex: (FETCH-CSRF-TOKEN|CSRF-XHR)
