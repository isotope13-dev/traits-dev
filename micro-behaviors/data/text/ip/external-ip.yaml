# External IP reconnaissance endpoints
# Detects common services used to discover the victim's public IP
# ATT&CK: T1016 (System Network Configuration Discovery)
defaults:
  platforms: [unix, windows]
  for: [scripts, source, binaries]
  crit: notable
  conf: 0.85
  mbc: "C0002"
  attack: "T1016"
traits:
  - id: ifconfig-me
    desc: ifconfig.me external IP lookup
    crit: notable
    conf: 0.9
    if:
      type: text
      word: ifconfig.me
  - id: ipinfo-io
    desc: ipinfo.io external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: ipinfo.io
  - id: ipify-org
    desc: ipify.org external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: ipify.org
  - id: icanhazip-com
    desc: icanhazip.com external IP lookup
    crit: notable
    conf: 0.85
    if:
      type: text
      word: icanhazip.com
