# References to generic Unix command-line text-processing utilities (jq, sed,
# awk). These appear in countless build, CI, and maintenance scripts, so a bare
# reference is a neutral capability — not evidence of any particular tool family
# or objective. Intent-specific composites (e.g. the repo-maintenance
# github-issue-maintenance rule) reference these cross-tier alongside their own
# evidence.
defaults:
  platforms: [unix, windows]
  for: [shell, python, ruby, javascript]
  crit: baseline
traits:
  - id: jq-processing
    desc: Uses jq for JSON processing
    if:
      type: string_literal
      word: "jq"
  - id: sed-processing
    desc: Uses sed for text processing
    if:
      type: string_literal
      word: "sed"
  - id: awk-processing
    desc: Uses awk for text processing
    if:
      type: string_literal
      word: "awk"
