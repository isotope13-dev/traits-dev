# Go runtime string fragments in .text section.
# Go embeds package-qualified type names and function references as
# cstrings in .text (unlike C/C++ where these live in .rdata/.rodata).
# These fragments survive IAT-stripping and section-truncation that
# removes .rdata, making them reliable Go-runtime indicators in
# tampered or truncated PE binaries.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.95

traits:
  - id: go-runtime-pkg-fragment
    desc: Go runtime package name fragment in .text
    if:
      type: text
      substr: "runtime."
      section: .text

  - id: go-reflect-pkg-fragment
    desc: Go reflect package name fragment in .text
    if:
      type: text
      substr: "reflect."
      section: .text

  - id: go-time-date-fragment
    desc: Go time.Date type name fragment in .text
    if:
      type: text
      substr: "time.Date"
      section: .text

  - id: go-time-utc-fragment
    desc: Go time.UTC type name fragment in .text
    if:
      type: text
      substr: "time.UTC"
      section: .text

  - id: go-time-loc-fragment
    desc: Go time.Location type name fragment in .text
    if:
      type: text
      substr: "time.Loc"
      section: .text

  - id: go-memprofile-fragment
    desc: Go memory profiler string fragment in .text
    if:
      type: text
      substr: "memprofi"
      section: .text

composite_rules:
  - id: go-runtime-strings-in-text
    desc: Go runtime string fragments in .text section
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: go-runtime-pkg-fragment
      - id: go-reflect-pkg-fragment
      - id: go-time-date-fragment
      - id: go-time-utc-fragment
      - id: go-time-loc-fragment
      - id: go-memprofile-fragment
