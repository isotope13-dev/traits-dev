defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, ruby, php]
  crit: notable
  conf: 0.88

traits:
  - id: qdrant-set-payload-call
    desc: Qdrant payload mutation call
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(client|qdrant|qdrant_client)\.set_payload$'

  - id: vector-payload-default-backfill
    desc: Multiple vector payload schema key references
    count_min: 2
    if:
      type: text
      regex: '\b(processor_version|pipeline_tier|embedding_identity)\b'

  - id: vector-metadata-sentinel-upsert
    desc: Vector metadata sentinel-upsert call
    if:
      type: symbol
      kind: call
      exact: upsert_sentinel

composite_rules:
  - id: qdrant-default-payload-backfill
    desc: Qdrant default payload backfill
    crit: notable
    conf: 0.94
    all:
      - id: qdrant-set-payload-call
      - id: vector-payload-default-backfill
      - id: vector-metadata-sentinel-upsert
