defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, ruby, php]
  crit: notable
  conf: 0.88

traits:
  - id: qdrant-set-payload-call
    desc: Qdrant payload mutation call
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    if:
      type: symbol
      kind: call
      regex: '(^|\.)set_payload$'

  - id: vector-payload-default-backfill
    desc: Vector payload default backfill
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    count_min: 2
    if:
      type: text
      regex: '\b(processor_version|pipeline_tier|embedding_identity)\b'

  - id: vector-metadata-sentinel-upsert
    desc: Vector metadata sentinel upsert
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    count_min: 2
    if:
      type: text
      regex: '\b(upsert_sentinel|sentinel_upserted|chunking_config|embedding_identity)\b'

composite_rules:
  - id: qdrant-default-payload-backfill
    desc: Qdrant default payload backfill
    crit: notable
    conf: 0.94
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    all:
      - id: qdrant-set-payload-call
      - id: vector-payload-default-backfill
      - id: vector-metadata-sentinel-upsert
