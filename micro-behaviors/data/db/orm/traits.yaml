defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: gorm-io
    desc: gorm.io ORM
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: gorm.io
  - id: sqlalchemy
    desc: SQLAlchemy ORM
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: import
      regex: '^sqlalchemy(\.|$)'
  - id: reydb-orm-import
    desc: Imports the reydb Python database ORM
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: import
      exact: reydb
  - id: hibernate
    desc: Hibernate ORM
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)org\.hibernate|hibernate\.(cfg|hbm|Session)
  - id: django-db
    desc: django.db ORM
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: django.db
  - id: sequelize
    desc: Sequelize ORM
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: sequelize
  - id: prisma
    desc: Prisma ORM
    crit: notable
    conf: 0.85
    for: [source, package.json]
    count_min: 2
    if:
      type: text
      word: prisma
  - id: typeorm
    desc: TypeORM ORM
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: typeorm
composite_rules:
  - id: orm
    desc: ORM framework usage
    crit: notable
    conf: 0.85
    any:
      - id: gorm-io
      - id: sqlalchemy
      - id: hibernate
      - id: django-db
      - id: sequelize
      - id: typeorm
