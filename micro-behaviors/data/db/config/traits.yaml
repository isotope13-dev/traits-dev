defaults:
  platforms: [unix, windows]
  for: [php, c, cpp, python, shell]
  crit: component
  conf: 0.85

traits:
  - id: database-db-key
    desc: DB config key
    if:
      type: string_literal
      # Exclude package/VCS path components such as "dev-db/mariadb:10.3".
      regex: '(?i)(^|[^a-z0-9_/-])db\s*(=|:[^:])'

  - id: database-database-key
    desc: Database config key
    if:
      type: string_literal
      regex: '(?i)(^|[^a-z0-9_/-])database\s*(=|:[^:])'

  - id: database-mysql-key
    desc: MySQL config key
    if:
      type: string_literal
      regex: '(?i)(^|[^a-z0-9_/-])mysql\s*(=|:[^:])'
  # Match paired keys in one literal. A lone `user:` or `key=` is common in
  # diagnostics, documentation, and unrelated configuration; two conninfo
  # keys are the useful connection-string observation.
  - id: connection-user-host-pair
    desc: User and host keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\buser\s*[=:])(?=.*\b(host|postgres|pgsql)\s*[=:]).'

  - id: connection-user-database-pair
    desc: User and database keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\buser\s*[=:])(?=.*\b(database|dbname|db)\s*[=:]).'

  - id: connection-user-password-pair
    desc: User and password keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\buser\s*[=:])(?=.*\b(pass|password|passwd)\s*[=:]).'

  - id: connection-user-secret-pair
    desc: User and secret keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\buser\s*[=:])(?=.*\b(secret|key)\s*[=:]).'

  - id: connection-user-dsn-pair
    desc: User and DSN keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\buser\s*[=:])(?=.*\b(dsn|connstr|connection_string)\s*[=:]).'

  - id: connection-password-host-pair
    desc: Password and host keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\bpassword\s*[=:])(?=.*\b(host|postgres|pgsql)\s*[=:]).'

  - id: connection-password-database-pair
    desc: Password and database keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\bpassword\s*[=:])(?=.*\b(database|dbname|db)\s*[=:]).'

  - id: connection-password-secret-pair
    desc: Password and secret keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\b(pass|password|passwd)\s*[=:])(?=.*\b(secret|key)\s*[=:]).'

  - id: connection-password-dsn-pair
    desc: Password and DSN keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\bpassword\s*[=:])(?=.*\b(dsn|connstr|connection_string)\s*[=:]).'

  - id: connection-secret-host-pair
    desc: Secret and host keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\b(secret|key)\s*[=:])(?=.*\b(host|postgres|pgsql)\s*[=:]).'

  - id: connection-secret-database-pair
    desc: Secret and database keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\b(secret|key)\s*[=:])(?=.*\b(database|dbname|db)\s*[=:]).'

  - id: connection-secret-dsn-pair
    desc: Secret and DSN keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\b(secret|key)\s*[=:])(?=.*\b(dsn|connstr|connection_string)\s*[=:]).'

  - id: connection-host-database-pair
    desc: Host and database keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\bhost\s*[=:])(?=.*\b(database|dbname|db)\s*[=:]).'

  - id: connection-host-dsn-pair
    desc: Host and DSN keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\bhost\s*[=:])(?=.*\b(dsn|connstr|connection_string)\s*[=:]).'

  - id: connection-database-dsn-pair
    desc: Database and DSN keys in connection string
    crit: notable
    if:
      type: string_literal
      regex: '(?i)(?=.*\bdatabase\s*[=:])(?=.*\b(dsn|connstr|connection_string)\s*[=:]).'

  - id: database-dsn-key
    desc: Database DSN config key
    if:
      type: string_literal
      regex: '(?i)dsn\s*[=:]'
  - id: database-connection-string-key
    desc: Database connection string key
    if:
      type: string_literal
      regex: '(?i)(connection_?string|connstr)\s*[=:]'

composite_rules:
  - id: database-user-key
    desc: Database user key in connection string
    crit: notable
    conf: 0.85
    any:
      - id: connection-user-host-pair
      - id: connection-user-database-pair
      - id: connection-user-password-pair
      - id: connection-user-secret-pair
      - id: connection-user-dsn-pair

  - id: database-password-key
    desc: Database password key in connection string
    crit: notable
    conf: 0.85
    any:
      - id: connection-user-password-pair
      - id: connection-password-host-pair
      - id: connection-password-database-pair
      - id: connection-password-secret-pair
      - id: connection-password-dsn-pair

  - id: database-secret-key
    desc: Database secret key in connection string
    crit: notable
    conf: 0.85
    any:
      - id: connection-user-secret-pair
      - id: connection-password-secret-pair
      - id: connection-secret-host-pair
      - id: connection-secret-database-pair
      - id: connection-secret-dsn-pair

  - id: database-host-key
    desc: Database host config key
    crit: component
    conf: 0.85
    any:
      - id: database-db-key
      - id: database-database-key
      - id: database-mysql-key

  - id: database-secret-or-dsn-key
    desc: Database secret or DSN config key
    crit: component
    conf: 0.85
    any:
      - id: database-secret-key
      - id: database-dsn-key
      - id: database-connection-string-key
  - id: multiple-database-credential-keys
    desc: Multiple database credential config keys
    crit: component
    conf: 0.9
    any:
      - id: database-host-key
      - id: database-user-key
      - id: database-password-key
      - id: database-secret-or-dsn-key
    needs: 2
