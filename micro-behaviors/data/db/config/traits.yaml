defaults:
  platforms: [unix, windows]
  for: [php, c, cpp, python, shell]
  crit: component
  conf: 0.85

traits:
  - id: database-host-key
    desc: Database host config key
    if:
      type: string_literal
      # ':[^:]' rejects the '::' scope/namespace operator (Rust/C++ paths,
      # AUR "name::source" VCS prefixes) so "prjoxide-db::git+url" is not a hit.
      regex: '(?i)(db|database|mysql)\s*(=|:[^:])'
  - id: database-user-key
    desc: Database user config key
    if:
      type: string_literal
      regex: '(?i)(postgres|pgsql|host|user)\s*[=:]'
    unless:
      # 'rustc -vV | sed -n "s/host: //p"' is the universal Rust target-triple
      # extraction idiom in cargo PKGBUILDs/build scripts; the 'host:' here is
      # the rustc verbose-version field, not a database credential.
      - type: text
        regex: 'rustc\s+-vV'
  - id: database-password-key
    desc: Database password config key
    if:
      type: string_literal
      regex: '(?i)(pass|password|passwd)\s*[=:]'
  - id: database-secret-key
    desc: Database secret config key
    if:
      type: string_literal
      regex: '(?i)(secret|key)\s*[=:]'
  - id: database-dsn-key
    desc: Database DSN config key
    if:
      type: string_literal
      regex: '(?i)dsn\s*[=:]'
  - id: database-connection-string-key
    desc: Database connection string key
    if:
      type: string_literal
      regex: '(?i)(connection_?string|connstr)\s*[=:]'

composite_rules:
  - id: database-secret-or-dsn-key
    desc: Database secret or DSN config key
    crit: component
    conf: 0.85
    any:
      - id: database-secret-key
      - id: database-dsn-key
      - id: database-connection-string-key
  - id: multiple-database-credential-keys
    desc: Multiple database credential config keys
    crit: component
    conf: 0.9
    any:
      - id: database-host-key
      - id: database-user-key
      - id: database-password-key
      - id: database-secret-or-dsn-key
    needs: 2
