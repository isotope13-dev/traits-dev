defaults:
  platforms: [unix, windows]
  for: [php, c, cpp, python, shell]
  crit: component
  conf: 0.85

traits:
  - id: database-db-key
    desc: DB config key
    if:
      type: string_literal
      # Exclude package/VCS path components such as "dev-db/mariadb:10.3".
      regex: '(?i)(^|[^a-z0-9_/-])db\s*(=|:[^:])'

  - id: database-database-key
    desc: Database config key
    if:
      type: string_literal
      regex: '(?i)(^|[^a-z0-9_/-])database\s*(=|:[^:])'

  - id: database-mysql-key
    desc: MySQL config key
    if:
      type: string_literal
      regex: '(?i)(^|[^a-z0-9_/-])mysql\s*(=|:[^:])'
  # These key names are deliberately generic: the libpq/DSN conninfo strings this
  # family targets ("host=db user=root password=x") spell them bare, and the
  # database context comes from the composites below plus the config-path leg in
  # objectives/collection/database/credentials. Three shapes must still be kept
  # out, because in a code file a key name far more often appears in prose than
  # in a connection string:
  #   - the optional prefix group captures the disqualifying character into the
  #     evidence so `not:` can reject it: reST/JSDoc parameter docs (":param
  #     password:", "@param user:"), doc bullet lists ("- passwd: int | str"),
  #     URL query parameters ("?password=", "&user="), and format/template
  #     placeholders ("{password:>06}").
  #   - '\b' anchors the key to a token start, so a longer field name that merely
  #     ends in one ("reset_receive_user:", "set_user") is not a hit.
  #   - '[ \t]*' (not '\s*') keeps the key and its separator on one line; '\s*'
  #     spanned blank lines and paired a word with a colon paragraphs away.
  - id: database-user-key
    desc: Database user config key
    if:
      type: string_literal
      regex: '(?i)([:@?&{-][ \t]*[a-z]*[ \t]*)?\b(postgres|pgsql|host|user)[ \t]*[=:]'
    not:
      - regex: '^[:@-]'
      - regex: '^[?&]'
      - regex: '^\{'
    unless:
      # 'rustc -vV | sed -n "s/host: //p"' is the universal Rust target-triple
      # extraction idiom in cargo PKGBUILDs/build scripts; the 'host:' here is
      # the rustc verbose-version field, not a database credential.
      - type: text
        regex: 'rustc\s+-vV'
  - id: database-password-key
    desc: Database password config key
    if:
      type: string_literal
      regex: '(?i)([:@?&{-][ \t]*[a-z]*[ \t]*)?\b(pass|password|passwd)[ \t]*[=:]'
    not:
      - regex: '^[:@-]'
      - regex: '^[?&]'
      - regex: '^\{'
  - id: database-secret-key
    desc: Database secret config key
    if:
      type: string_literal
      regex: '(?i)(secret|key)\s*[=:]'
  - id: database-dsn-key
    desc: Database DSN config key
    if:
      type: string_literal
      regex: '(?i)dsn\s*[=:]'
  - id: database-connection-string-key
    desc: Database connection string key
    if:
      type: string_literal
      regex: '(?i)(connection_?string|connstr)\s*[=:]'

composite_rules:
  - id: database-host-key
    desc: Database host config key
    crit: component
    conf: 0.85
    any:
      - id: database-db-key
      - id: database-database-key
      - id: database-mysql-key

  - id: database-secret-or-dsn-key
    desc: Database secret or DSN config key
    crit: component
    conf: 0.85
    any:
      - id: database-secret-key
      - id: database-dsn-key
      - id: database-connection-string-key
  - id: multiple-database-credential-keys
    desc: Multiple database credential config keys
    crit: component
    conf: 0.9
    any:
      - id: database-host-key
      - id: database-user-key
      - id: database-password-key
      - id: database-secret-or-dsn-key
    needs: 2
