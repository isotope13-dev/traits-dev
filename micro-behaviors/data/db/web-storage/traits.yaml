# Client-side key/value & object storage engines — the in-browser data stores.
# Placed alongside the other datastore engines under data/db/ (redis, sqlite,
# mongodb, ...). webextension.* = extension storage; the DOM storage traits are
# generic and fire on any web page, not just extensions.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  # --- WebExtension storage ---
  - id: chrome-storage-api
    desc: Chrome storage API usage
    if:
      type: text
      regex: '(chrome|browser)\.storage\.[A-Za-z_]'
  - id: chrome-storage-local
    desc: Chrome local storage access
    crit: baseline
    if:
      type: text
      substr: storage.local.
  - id: chrome-storage-local-get
    desc: Chrome local storage read
    if:
      type: text
      regex: '(chrome|browser)\.storage\.local\.get\b|storage\.local\.get\('
  - id: chrome-storage-local-set
    desc: Chrome local storage write
    if:
      type: text
      regex: '(chrome|browser)\.storage\.local\.set\b|storage\.local\.set\('
  - id: chrome-storage-session
    desc: Chrome session storage access
    crit: baseline
    if:
      type: text
      substr: storage.session.
  - id: chrome-storage-session-get
    desc: Chrome session storage read
    if:
      type: text
      regex: '(chrome|browser)\.storage\.session\.get\b|storage\.session\.get\('
  - id: chrome-storage-session-set
    desc: Chrome session storage write
    if:
      type: text
      regex: '(chrome|browser)\.storage\.session\.set\b|storage\.session\.set\('
  - id: chrome-storage-session-access-level
    desc: Chrome session storage access-level change
    if:
      type: text
      regex: '(chrome|browser)\.storage\.session\.setAccessLevel\b|storage\.session\.setAccessLevel\('
  - id: chrome-storage-sync
    desc: Chrome synced storage access
    crit: baseline
    if:
      type: text
      substr: storage.sync.
  - id: chrome-storage-sync-set
    desc: Chrome synced storage write
    if:
      type: text
      regex: '(chrome|browser)\.storage\.sync\.set\b|storage\.sync\.set\('
  # --- Generic DOM / web storage (non-extension) ---
  - id: dom-localstorage
    desc: Web Storage localStorage access
    crit: baseline
    if:
      type: text
      regex: '\b(window\.)?localStorage\s*(\.|\[)'
  - id: dom-storage-getitem
    desc: Browser storage getItem call
    if:
      type: text
      regex: '\b(localStorage|sessionStorage)\.getItem\b'
  - id: dom-storage-setitem
    desc: Browser storage setItem call
    if:
      type: text
      regex: '\b(localStorage|sessionStorage)\.setItem\b'
  - id: browser-storage-token-key
    desc: Web storage access to token-named key
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'localStorage\.(get|set)Item\([^)]{0,80}["''`][^"''`)]{0,60}(access|refresh|auth)[_-]?token'
  - id: jwt-key-read
    desc: Reads JWT-named browser storage key
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)localStorage\.getItem$'
      arg:
        kind: string
        exact: jwt
  - id: jwt-key-write
    desc: Writes JWT-named browser storage key
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)localStorage\.setItem$'
      arg:
        kind: string
        exact: jwt
  - id: browser-storage-session-key
    desc: Web storage access to session-named key
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'localStorage\.(get|set)Item\([^)]{0,80}["''`][^"''`)]{0,60}session([_-]?(token|id))?'
  - id: window-localstorage-getitem
    desc: window.localStorage getItem call
    crit: notable
    conf: 0.82
    ref: sha256:6f3972835d9ebdf69f562a91e68091769d80de62467e6c129d53f810de7f539a
    for: [scripts]
    if:
      type: text
      regex: '\bwindow\.localStorage\.getItem\s*\('
  - id: dom-sessionstorage
    desc: Web Storage sessionStorage access
    crit: baseline
    if:
      type: text
      regex: '\b(window\.)?sessionStorage\.(get|set|remove)Item\b|\bsessionStorage\['
  - id: browser-storage-sweep-loop
    desc: Browser Web Storage enumeration loop
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "for\\s*\\([^)]{0,80}(localStorage|sessionStorage)\\.length[\\s\\S]{0,180}\\.(getItem|key)\\("
  - id: indexeddb-open
    desc: IndexedDB database open
    if:
      type: text
      regex: '\bindexedDB\.open\s*\(|\bwindow\.indexedDB\b'
  - id: indexeddb-databases-enumerate
    desc: Enumerates IndexedDB databases
    crit: notable
    if:
      type: text
      regex: '\bindexedDB\.databases\s*\('
  - id: indexeddb-delete-database
    desc: Deletes IndexedDB database
    crit: notable
    if:
      type: text
      regex: '\bindexedDB\.deleteDatabase\s*\('
  - id: indexeddb-note-store
    desc: Browser IndexedDB note store
    conf: 0.82
    if:
      type: text
      regex: 'indexedDB\.open\(.{0,80}(notesDatabase|tnotesDatabase|promptsDatabase)'

composite_rules:
  - id: browser-storage-credential-key
    desc: Web storage access to credential-named key
    crit: notable
    conf: 0.9
    any:
      - id: browser-storage-token-key
      - id: browser-storage-session-key

  - id: browser-storage-persistence
    desc: Persists data in browser storage
    crit: notable
    conf: 0.8
    all:
      - id: dom-storage-getitem
      - id: dom-storage-setitem
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
