# Client-side key/value & object storage engines — the in-browser data stores.
# Placed alongside the other datastore engines under data/db/ (redis, sqlite,
# mongodb, ...). webextension.* = extension storage; the DOM storage traits are
# generic and fire on any web page, not just extensions.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  # --- WebExtension storage ---
  - id: chrome-storage-api
    desc: Chrome storage API usage
    if:
      type: text
      regex: '(chrome|browser)\.storage\.[A-Za-z_]'
  - id: chrome-storage-local
    desc: Chrome local storage access
    crit: baseline
    if:
      type: text
      substr: storage.local.
  - id: chrome-storage-session
    desc: Chrome session storage access
    crit: baseline
    if:
      type: text
      substr: storage.session.
  - id: chrome-storage-sync
    desc: Chrome synced storage access
    crit: baseline
    if:
      type: text
      substr: storage.sync.
  # --- Generic DOM / web storage (non-extension) ---
  - id: dom-localstorage
    desc: Web Storage localStorage access
    crit: baseline
    if:
      type: text
      regex: '\b(window\.)?localStorage\.(get|set|remove)Item\b|\blocalStorage\['
  - id: dom-sessionstorage
    desc: Web Storage sessionStorage access
    crit: baseline
    if:
      type: text
      regex: '\b(window\.)?sessionStorage\.(get|set|remove)Item\b|\bsessionStorage\['
  - id: indexeddb-open
    desc: IndexedDB database open
    if:
      type: text
      regex: '\bindexedDB\.open\s*\(|\bwindow\.indexedDB\b'
