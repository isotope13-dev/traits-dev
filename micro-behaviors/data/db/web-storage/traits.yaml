# Client-side key/value & object storage engines — the in-browser data stores.
# Placed alongside the other datastore engines under data/db/ (redis, sqlite,
# mongodb, ...). webextension.* = extension storage; the DOM storage traits are
# generic and fire on any web page, not just extensions.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  # --- WebExtension storage ---
  - id: chrome-storage-api
    desc: References the WebExtension storage API
    if:
      type: text
      regex: '(chrome|browser)\.storage\.[A-Za-z_]'
  - id: chrome-storage-local
    desc: Uses browser extension local storage
    crit: baseline
    if:
      type: text
      substr: storage.local.
  - id: chrome-storage-local-get
    desc: Reads data from extension local storage
    if:
      type: text
      regex: '(chrome|browser)\.storage\.local\.get\b|storage\.local\.get\('
  - id: chrome-storage-local-set
    desc: Writes data to extension local storage
    if:
      type: text
      regex: '(chrome|browser)\.storage\.local\.set\b|storage\.local\.set\('
  - id: chrome-storage-local-remove
    desc: Removes data from extension local storage
    if:
      type: text
      regex: '(chrome|browser)\.storage\.local\.remove\b|storage\.local\.remove\('
  - id: chrome-storage-session
    desc: Chrome session storage access
    crit: baseline
    if:
      type: text
      substr: storage.session.
  - id: chrome-storage-session-get
    desc: Chrome session storage read
    if:
      type: text
      regex: '(chrome|browser)\.storage\.session\.get\b|storage\.session\.get\('
  - id: chrome-storage-session-set
    desc: Chrome session storage write
    if:
      type: text
      regex: '(chrome|browser)\.storage\.session\.set\b|storage\.session\.set\('
  - id: chrome-storage-session-access-level
    desc: Chrome session storage access-level change
    if:
      type: text
      regex: '(chrome|browser)\.storage\.session\.setAccessLevel\b|storage\.session\.setAccessLevel\('
  - id: chrome-storage-sync
    desc: Chrome synced storage access
    crit: baseline
    if:
      type: text
      substr: storage.sync.
  - id: chrome-storage-sync-set
    desc: Writes to Chrome synced storage
    if:
      type: text
      regex: '(chrome|browser)\.storage\.sync\.set\b|storage\.sync\.set\('
  # --- Generic DOM / web storage (non-extension) ---
  - id: dom-localstorage
    desc: Web Storage localStorage access
    crit: baseline
    if:
      type: text
      regex: '\b(window\.)?localStorage\s*(\.|\[)'
  - id: dom-storage-getitem
    desc: Reads browser storage with getItem
    if:
      type: text
      regex: '\b(localStorage|sessionStorage)\.getItem\b'
  - id: dom-storage-setitem
    desc: Writes browser storage with setItem
    if:
      type: text
      regex: '\b(localStorage|sessionStorage)\.setItem\b'
  - id: browser-storage-token-key-read
    desc: Reads token-named Web Storage key
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]*\.getItem\s*\(\s*[''\"]token[''\"]\s*\)'
  - id: browser-storage-token-key-write
    desc: Writes token-named Web Storage key
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]*\.setItem\s*\(\s*[''\"]token[''\"]\s*,'
  - id: browser-storage-token-key-local
    desc: Local storage access to token-named key
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'localStorage\.(get|set)Item\([^)]{0,120}(access|refresh|auth)[_-]?token'
  - id: browser-storage-token-key-session
    desc: Session storage access to token-named key
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'sessionStorage\.(get|set)Item\([^)]{0,120}(access|refresh|auth)[_-]?token'
  - id: browser-storage-switch-token-read
    desc: Reads switch/login token from web storage
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\b(localStorage|sessionStorage)\.getItem\([^)]{0,100}(switchToken|login)'
  - id: jwt-key-read
    desc: Reads JWT-named browser storage key
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)localStorage\.getItem$'
      arg:
        kind: string
        exact: jwt
  - id: jwt-key-write
    desc: Writes JWT-named browser storage key
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      regex: '(^|\.)localStorage\.setItem$'
      arg:
        kind: string
        exact: jwt
  - id: browser-storage-session-key-local
    desc: Local storage access to session-named key
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'localStorage\.(get|set)Item\([^)]{0,120}session([_-]?(token|id))?'
  - id: browser-storage-session-key-session
    desc: Session storage access to session-named key
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'sessionStorage\.(get|set)Item\([^)]{0,120}session([_-]?(token|id))?'
  - id: window-localstorage-getitem
    desc: Reads window.localStorage with getItem
    crit: notable
    conf: 0.82
    ref: sha256:6f3972835d9ebdf69f562a91e68091769d80de62467e6c129d53f810de7f539a
    for: [scripts]
    if:
      type: text
      regex: '\bwindow\.localStorage\.getItem\s*\('
  - id: dom-sessionstorage
    desc: Web Storage sessionStorage access
    crit: baseline
    if:
      type: text
      regex: '\b(window\.)?sessionStorage\.(get|set|remove)Item\b|\bsessionStorage\['
  - id: browser-storage-sweep-loop
    desc: Browser Web Storage enumeration loop
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "for\\s*\\([^)]{0,80}(localStorage|sessionStorage)\\.length[\\s\\S]{0,180}\\.(getItem|key)\\("
  - id: indexeddb-open
    desc: Opens an IndexedDB database
    if:
      type: text
      regex: '\bindexedDB\.open\s*\(|\bwindow\.indexedDB\b'
  - id: indexeddb-databases-enumerate
    desc: Enumerates IndexedDB databases
    crit: notable
    if:
      type: text
      regex: '\bindexedDB\.databases\s*\('
  - id: indexeddb-delete-database
    desc: Deletes IndexedDB database
    crit: notable
    if:
      type: text
      regex: '\bindexedDB\.deleteDatabase\s*\('
  - id: indexeddb-note-store
    desc: Browser IndexedDB note store
    conf: 0.82
    if:
      type: text
      regex: 'indexedDB\.open\(.{0,80}(notesDatabase|tnotesDatabase|promptsDatabase)'

  # --- Bulk clearing of stored browsing state ---
  # chrome.browsingData.* erases cookies/localStorage/cache/history. Neutral:
  # privacy cleaners, "clear site data" buttons and logout flows all use it.
  # Intent comes from what is erased and why — anti-forensic trace removal, or
  # shedding the rate-limit/bot-tracking state a site keeps on an origin.
  - id: chrome-browsing-data-remove
    desc: Clears browsing data via chrome.browsingData
    crit: notable
    conf: 0.92
    attack: T1070
    if:
      type: text
      regex: '\bbrowsingData\.remove[A-Za-z]{0,16}\s*\('

  - id: browsing-data-origin-scoped-clear
    desc: Clears browsing data for specific origins
    crit: notable
    conf: 0.9
    attack: T1070
    if:
      type: text
      regex: 'browsingData\.remove[\s\S]{0,60}origins\s*:'

composite_rules:
  # Extension service workers are origin-isolated, so this pattern observes
  # an extension resetting its own cache rather than deleting visited-site
  # databases. Cross-origin destruction remains an objective in the separate
  # content-injection composite.
  - id: extension-own-indexeddb-reset
    desc: Extension resets its own IndexedDB databases
    crit: notable
    conf: 0.93
    for: [javascript]
    scope: file
    all:
      - id: indexeddb-databases-enumerate
      - id: indexeddb-delete-database

  - id: browser-storage-token-key
    desc: Web storage access to token-named key
    crit: notable
    conf: 0.9
    any:
      - id: browser-storage-token-key-read
      - id: browser-storage-token-key-write
      - id: browser-storage-token-key-local
      - id: browser-storage-token-key-session

  - id: browser-storage-session-key
    desc: Web storage access to session-named key
    crit: notable
    conf: 0.9
    any:
      - id: browser-storage-session-key-local
      - id: browser-storage-session-key-session

  - id: browser-storage-credential-key
    desc: Web storage access to credential-named key
    crit: notable
    conf: 0.9
    any:
      - id: browser-storage-token-key
      - id: browser-storage-session-key

  - id: browser-storage-persistence
    desc: Persists data in browser storage
    crit: notable
    conf: 0.8
    all:
      - id: dom-storage-getitem
      - id: dom-storage-setitem
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
