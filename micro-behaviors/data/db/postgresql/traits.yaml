defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: libpq
    desc: libpq library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: libpq
  - id: pqconnect
    desc: PQconnect function
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: PQconnect
  - id: postgres-url
    desc: postgres:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: postgres://
  - id: postgresql-url
    desc: postgresql:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: postgresql://
  - id: pq-dot
    desc: pq. Go driver
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: pq.
  - id: psycopg2
    desc: psycopg2 Python driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: psycopg2
  - id: pg8000
    desc: pg8000 Python driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: pg8000
  - id: go-pg-import
    desc: github.com/go-pg import
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: github.com/go-pg
  - id: sqlx-postgres-crate-path
    desc: Rust sqlx-postgres crate path
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: /sqlx-postgres-
  - id: sqlx-core-crate-path
    desc: Rust sqlx-core crate path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /sqlx-core-
  - id: postgres-protocol-errors
    desc: PostgreSQL protocol error strings
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Postgres protocol error
  - id: pg-host-env-var
    desc: PostgreSQL PGHOST environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: PGHOST
  - id: pg-port-env-var
    desc: PostgreSQL PGPORT environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: PGPORT
  - id: pg-database-env-var
    desc: PostgreSQL PGDATABASE environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: PGDATABASE
  - id: pg-user-env-var
    desc: PostgreSQL PGUSER environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: PGUSER
  - id: pg-password-env-var
    desc: PostgreSQL PGPASSWORD environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: PGPASSWORD
composite_rules:
  - id: postgres-env-vars
    desc: PostgreSQL environment variables
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: pg-host-env-var
      - id: pg-port-env-var
      - id: pg-database-env-var
      - id: pg-user-env-var
      - id: pg-password-env-var
  - id: rust-sqlx-postgres-client
    desc: Rust sqlx PostgreSQL client
    crit: notable
    conf: 0.95
    all:
      - id: sqlx-postgres-crate-path
    any:
      - id: sqlx-core-crate-path
      - id: postgres-protocol-errors
      - id: postgres-env-vars
