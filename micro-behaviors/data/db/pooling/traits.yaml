defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: pgxpool
    desc: pgxpool connection pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: pgxpool
  - id: pool-pool
    desc: pool.Pool type
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: pool.Pool
    not:
      - substr: github.com/gobwas/pool.Pool
  - id: max-open-conns
    desc: MaxOpenConns setting
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: MaxOpenConns
  - id: max-idle-conns
    desc: MaxIdleConns setting
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: text
      word: MaxIdleConns
  - id: hikaricp
    desc: HikariCP pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: HikariCP
