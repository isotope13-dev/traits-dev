defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: redis-url
    desc: redis:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: redis://
  - id: rediss-url
    desc: rediss:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: rediss://
  - id: go-redis
    desc: go-redis driver
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: go-redis
  - id: redis-py
    desc: redis-py driver
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: redis-py
  - id: hiredis
    desc: hiredis library
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: hiredis
  - id: ioredis
    desc: ioredis driver
    crit: notable
    conf: 1.0
    if:
      type: string_value
      substr: ioredis
composite_rules:
  - id: redis
    desc: Redis database connectivity
    crit: notable
    conf: 0.9
    any:
      - id: redis-url
      - id: rediss-url
      - id: go-redis
      - id: redis-py
      - id: hiredis
      - id: ioredis
