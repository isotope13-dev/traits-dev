defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: elasticsearch-string
    desc: elasticsearch string
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: elasticsearch
  - id: elastic-co
    desc: elastic.co domain
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: elastic.co
  - id: olivere-elastic
    desc: olivere/elastic Go driver
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: olivere/elastic
  - id: es-search-endpoint
    desc: _search ES endpoint
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: /_search
  - id: es-bulk-endpoint
    desc: _bulk ES endpoint
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: /_bulk
composite_rules:
  - id: elasticsearch
    desc: Elasticsearch connectivity
    crit: notable
    conf: 0.9
    any:
      - id: elasticsearch-string
      - id: elastic-co
      - id: olivere-elastic
      - id: es-search-endpoint
      - id: es-bulk-endpoint
