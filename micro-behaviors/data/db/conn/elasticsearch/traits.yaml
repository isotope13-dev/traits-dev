defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: elasticsearch-string
    desc: elasticsearch string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: elasticsearch
  - id: elastic-co
    desc: elastic.co domain
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: elastic.co
  - id: olivere-elastic
    desc: olivere/elastic Go driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: olivere/elastic
  - id: es-search-endpoint
    desc: _search ES endpoint
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: /_search
  - id: es-bulk-endpoint
    desc: _bulk ES endpoint
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: /_bulk
composite_rules:
  - id: elasticsearch
    desc: Elasticsearch connectivity
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: micro-behaviors/data/db/conn/elasticsearch
