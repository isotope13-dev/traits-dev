# Database Connection - POOLING
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  # === Connection pooling micro-behaviors ===
  - id: pgxpool
    desc: pgxpool connection pool
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "pgxpool"
  - id: pool-pool
    desc: pool.Pool type
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "pool.Pool"
  - id: max-open-conns
    desc: MaxOpenConns setting
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "MaxOpenConns"
  - id: max-idle-conns
    desc: MaxIdleConns setting
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "MaxIdleConns"
  - id: connection-pool-string
    desc: connection_pool string
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "connection_pool"
  - id: hikaricp
    desc: HikariCP pool
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "HikariCP"
composite_rules:
  # Connection pool composite (migrated from YARA)
  - id: connection-pool
    desc: Database connection pooling
    crit: notable
    conf: 0.85
    any:
      - id: pgxpool
      - id: pool-pool
      - id: max-open-conns
      - id: max-idle-conns
      - id: connection-pool-string
      - id: hikaricp
