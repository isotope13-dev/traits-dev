defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mongodb-url
    desc: mongodb:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb://
  - id: mongodb-srv-url
    desc: mongodb+srv:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb+srv://
  - id: go-mongodb
    desc: go.mongodb.org driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: go.mongodb.org
  - id: pymongo
    desc: pymongo Python driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: pymongo
  - id: mongoose
    desc: mongoose ODM
    crit: notable
    conf: 0.9
    count_min: 2
    if:
      type: text
      substr: mongoose
composite_rules:
  - id: mongodb
    desc: MongoDB database connectivity
    crit: notable
    conf: 0.9
    any:
      - id: mongodb-url
      - id: mongodb-srv-url
      - id: go-mongodb
      - id: pymongo
      - id: mongoose
