# GORM ORM client surface (gorm.io/gorm + gorm.io/driver/*).
#
# `gorm.io` import string is detected by the generic orm/traits.yaml at
# notable level. This file adds the GORM-specific operational surface —
# constructor + the call patterns that indicate the application talks to
# a relational database through GORM (as opposed to just declaring a model
# struct).
defaults:
  platforms: [unix, windows]
  for: [go]
  mbc: C0002
traits:
  - id: gorm-open-call
    desc: gorm.Open database constructor
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\bgorm\.Open\s*\('

  - id: gorm-postgres-driver
    desc: Imports gorm.io/driver/postgres
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'gorm.io/driver/postgres'

  - id: gorm-mysql-driver
    desc: Imports gorm.io/driver/mysql
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'gorm.io/driver/mysql'

  - id: gorm-sqlite-driver
    desc: Imports gorm.io/driver/sqlite
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'gorm.io/driver/sqlite'

  - id: gorm-auto-migrate
    desc: GORM AutoMigrate schema-create call
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\.AutoMigrate\s*\('

composite_rules:
  - id: gorm-client
    desc: Go process uses GORM ORM
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/data/db/conn/orm::gorm-io
    any:
      - id: gorm-open-call
      - id: gorm-postgres-driver
      - id: gorm-mysql-driver
      - id: gorm-sqlite-driver
      - id: gorm-auto-migrate
