defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: sql-select
    desc: SELECT SQL keyword in query
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: (?i)\bSELECT\s+(\*|[a-z0-9_]{1,40}(\s*,\s*[a-z0-9_]{1,40}){0,12})\s+FROM\b
  - id: sql-insert
    desc: INSERT INTO SQL keyword
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\bINSERT\s+INTO\b
  - id: sql-update
    desc: UPDATE SQL keyword
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\bUPDATE\s+[a-z0-9_]+\s+SET\b
  - id: sql-delete
    desc: DELETE FROM SQL keyword
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\bDELETE\s+FROM\b
  - id: sql-create-table
    desc: CREATE TABLE SQL keyword
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: (?i)\bCREATE\s+TABLE\b
  - id: database-sql-import
    desc: database/sql Go import
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: database/sql
  - id: sql-open
    desc: sql.Open Go function
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: sql.Open
composite_rules:
  - id: sql-keywords
    desc: SQL statement keywords
    crit: baseline
    conf: 0.5
    needs: 3
    any:
      - id: sql-select
      - id: sql-insert
      - id: sql-update
      - id: sql-delete
      - id: sql-create-table
  - id: sql-generic
    desc: Generic SQL database patterns
    crit: baseline
    conf: 0.8
    any:
      - id: sql-keywords
      - id: database-sql-import
      - id: sql-open
