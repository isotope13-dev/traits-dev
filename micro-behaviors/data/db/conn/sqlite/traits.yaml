defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: sqlite3-string
    desc: sqlite3 string
    crit: notable
    conf: 0.9
    if:
      type: string_value
      word: sqlite3
  - id: sqlite3-open
    desc: sqlite3_open function
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: sqlite3_open
  - id: go-sqlite3
    desc: mattn/go-sqlite3 driver
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: mattn/go-sqlite3
  - id: rusqlite
    desc: rusqlite Rust driver
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: rusqlite
  - id: sqlite-format
    desc: SQLite format header
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: SQLite format
composite_rules:
  - id: sqlite
    desc: SQLite database
    crit: notable
    conf: 0.9
    any:
      - id: sqlite3-string
      - id: sqlite3-open
      - id: go-sqlite3
      - id: rusqlite
      - id: sqlite-format
