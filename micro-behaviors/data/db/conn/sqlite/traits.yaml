defaults:
  platforms:
    - unix
    - windows
    - android
  for: [elf, macho, pe]
traits:
  - id: sqlite3-string
    desc: sqlite3 string
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: sqlite3
    unless:
      - type: text
        substr: application/vnd.sqlite3
  - id: sqlite3-open
    desc: sqlite3_open function
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: sqlite3_open
  - id: sqlite3-cli
    desc: sqlite3 command invocation
    crit: notable
    conf: 0.8
    for: [scripts]
    platforms: [unix, windows, ios]
    if:
      type: text
      regex: \bsqlite3\s+[^'"\n]{1,120}
  - id: go-sqlite3
    desc: mattn/go-sqlite3 driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mattn/go-sqlite3
  - id: rusqlite
    desc: rusqlite Rust driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: rusqlite
  - id: sqlite-format
    desc: SQLite format header
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: SQLite format
