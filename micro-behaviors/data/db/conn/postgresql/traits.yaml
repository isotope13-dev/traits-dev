defaults:
  platforms:
    - unix
    - windows
  for: [elf, macho, pe]
traits:
  - id: libpq
    desc: libpq library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: libpq
  - id: pqconnect
    desc: PQconnect function
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: PQconnect
  - id: postgres-url
    desc: postgres:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: postgres://
  - id: postgresql-url
    desc: postgresql:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: postgresql://
  - id: pq-dot
    desc: pq. Go driver
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: pq.
  - id: psycopg2
    desc: psycopg2 Python driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: psycopg2
  - id: pg8000
    desc: pg8000 Python driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: pg8000
  - id: go-pg-import
    desc: github.com/go-pg import
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: github.com/go-pg
composite_rules:
  - id: postgresql
    desc: PostgreSQL database connectivity
    crit: notable
    conf: 0.9
    any:
      - id: libpq
      - id: pqconnect
      - id: postgres-url
      - id: postgresql-url
      - id: pq-dot
      - id: psycopg2
      - id: pg8000
      - id: go-pg-import
