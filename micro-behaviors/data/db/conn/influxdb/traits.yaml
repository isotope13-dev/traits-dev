defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: influxdb-string
    desc: influxdb string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)influxdb
  - id: influxdata
    desc: influxdata string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: influxdata
    unless:
      - id: metadata/package/quality::embedded-domain-reputation-catalog
