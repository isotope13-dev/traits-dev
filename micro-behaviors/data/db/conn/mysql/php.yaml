# PHP MySQL legacy extension traits
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
traits:
  - id: php-mysql-connect
    desc: PHP mysql_connect database handle
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "mysql_connect"
  - id: php-mysql-select-db
    desc: PHP mysql_select_db database selection
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "mysql_select_db"
  - id: php-mysql-query
    desc: PHP mysql query execution APIs
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "mysql_(db_)?query"
  - id: php-mysql-db-admin-api
    desc: PHP mysql database admin APIs
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "mysql_(create_db|drop_db|list_dbs)"
  - id: php-mysql-table-admin-api
    desc: PHP mysql table admin APIs
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "mysql_(list_tables|list_fields)"
  - id: php-mysql-schema-introspection
    desc: PHP mysql schema inspection APIs
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: "mysql_(fetch_field|dbname|tablename)"
  - id: php-mysql-escape-string
    desc: PHP mysql string escaping
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "mysql_escape_string"
  - id: mysql-show-admin-sql
    desc: SHOW schema administration queries
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)\\bSHOW\\s+(CREATE\\s+TABLE|FIELDS\\s+FROM|TABLES|KEYS\\s+FROM)\\b"
  - id: mysql-alter-table-sql
    desc: ALTER TABLE schema modifications
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)\\bALTER\\s+TABLE\\b"
  - id: mysql-drop-table-if-exists-sql
    desc: DROP TABLE IF EXISTS statement
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)\\bDROP\\s+TABLE\\s+IF\\s+EXISTS\\b"
  - id: mysql-replace-into-sql
    desc: REPLACE INTO row update SQL
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: "(?i)\\bREPLACE\\s+INTO\\b"
  - id: mysql-flush-cache-sql
    desc: MySQL FLUSH cache queries
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)\\bFLUSH\\s+(HOSTS|LOGS|STATUS)\\b"
  - id: mysql-flush-priv-table-sql
    desc: MySQL FLUSH privilege/table queries
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)\\bFLUSH\\s+(PRIVILEGES|TABLES)\\b"
  - id: sql-query-console-form
    desc: Web SQL query console fields
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "name=queryStr|value='Query'"
  - id: sql-dump-http-headers
    desc: SQL dump download HTTP headers
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: "(?i)Content-disposition:\\s*filename=\\$[a-z_]+\\.sql"
  - id: sql-dump-completion-banner
    desc: SQL dump completion banner
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)(TABLE|DATABASE) DUMP COMPLETED"
composite_rules:
  - id: php-mysql-admin-api
    desc: PHP mysql administration APIs
    crit: notable
    conf: 0.88
    any:
      - id: php-mysql-db-admin-api
      - id: php-mysql-table-admin-api
  - id: mysql-flush-admin-sql
    desc: MySQL FLUSH administration queries
    crit: notable
    conf: 0.82
    any:
      - id: mysql-flush-cache-sql
      - id: mysql-flush-priv-table-sql
  - id: php-mysql-query-console
    desc: PHP MySQL web query console
    crit: notable
    conf: 0.9
    all:
      - id: php-mysql-query
      - id: sql-query-console-form
  - id: php-mysql-dump-export
    desc: PHP MySQL SQL dump export
    crit: notable
    conf: 0.92
    all:
      - id: sql-dump-http-headers
      - id: mysql-show-admin-sql
    any:
      - id: sql-dump-completion-banner
      - id: php-mysql-escape-string
      - id: micro-behaviors/data/db/conn/sql::sql-insert
      - id: mysql-drop-table-if-exists-sql
  - id: php-mysql-admin-surface
    desc: PHP MySQL administration surface
    crit: notable
    conf: 0.9
    all:
      - id: php-mysql-connect
      - id: php-mysql-query
    any:
      - id: php-mysql-admin-api
      - id: php-mysql-schema-introspection
      - id: mysql-show-admin-sql
      - id: mysql-alter-table-sql
      - id: mysql-flush-admin-sql
      - id: php-mysql-query-console
      - id: php-mysql-dump-export
