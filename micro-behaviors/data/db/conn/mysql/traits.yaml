defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: libmysql
    desc: libmysql library
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: libmysql
  - id: mysql-url
    desc: mysql:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: mysql://
  - id: mysql-real-connect
    desc: mysql_real_connect function
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: mysql_real_connect
  - id: mysqlclient
    desc: mysqlclient library
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: mysqlclient
  - id: go-sql-mysql
    desc: go-sql-driver/mysql
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: go-sql-driver/mysql
  - id: pymysql
    desc: PyMySQL driver
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: PyMySQL
composite_rules:
  - id: mysql
    desc: MySQL/MariaDB database connectivity
    crit: notable
    conf: 0.9
    any:
      - id: libmysql
      - id: mysql-url
      - id: mysql-real-connect
      - id: mysqlclient
      - id: go-sql-mysql
      - id: pymysql
      - id: micro-behaviors/data/db/conn/mysql::php-mysql-connect
      - id: micro-behaviors/data/db/conn/mysql::php-mysql-admin-surface
