defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: cassandra-string
    desc: cassandra string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)cassandra
  - id: gocql
    desc: gocql Go driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: gocql
  - id: datastax
    desc: datastax driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: datastax
  - id: cql-url
    desc: cql:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: cql://
composite_rules:
  - id: cassandra
    desc: Apache Cassandra connectivity
    crit: notable
    conf: 0.9
    any:
      - id: cassandra-string
      - id: gocql
      - id: datastax
      - id: cql-url
