defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: influxdb-string
    desc: "InfluxDB time-series database reference"
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)influxdb
  - id: influxdata
    desc: influxdata string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: influxdata
    unless:
      - id: metadata/package/quality/context/
  - id: influxdb3-write-v2-path
    desc: InfluxDB v2 write API path
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: /api/v2/write
  - id: influxdb3-write-lp-path
    desc: InfluxDB v3 line protocol path
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: /api/v3/write_lp
  - id: influxdb-line-protocol-serializer
    desc: InfluxDB line protocol serializer
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: toLineProtocol
  - id: influxdb-token-env
    desc: InfluxDB token environment variable
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: INFLUX_TOKEN
  - id: influxdb-token-auth-header
    desc: InfluxDB token authorization header
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Authorization\s*[:=].{0,80}\bToken\b'
  - id: influxdb-flight-sql-ticket
    desc: InfluxDB Arrow Flight SQL ticket
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: sql_query
  - id: influxdb-iox-column-type
    desc: InfluxDB IOx column metadata
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: iox::column::type
