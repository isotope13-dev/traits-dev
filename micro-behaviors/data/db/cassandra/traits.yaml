defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: cassandra-string
    desc: "Apache Cassandra database reference"
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)cassandra
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - id: metadata/file/catalog/identity/
      - id: metadata/library/data::public-suffix-list-content
      - id: metadata/file/format::sourcemap-sources-content
  - id: gocql
    desc: gocql Go driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: gocql
    unless:
      - id: well-known/tool/dual-use/mihomo::mihomo-comment-bundle
  - id: datastax
    desc: datastax driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: datastax
  - id: cql-url
    desc: cql:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: cql://
