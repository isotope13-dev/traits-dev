defaults:
  platforms:
    - unix
    - windows
  for: [python]
traits:
  - id: boto3-dynamodb-client
    desc: boto3 DynamoDB client initialization
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(^|\.)client$'
      arg:
        kind: string
        exact: dynamodb
  - id: boto3-dynamodb-resource
    desc: boto3 DynamoDB resource initialization
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(^|\.)resource$'
      arg:
        kind: string
        exact: dynamodb
