defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.86

traits:
- id: model-truncate-call
  desc: Laravel model table truncate call
  if:
    type: text
    regex: "\\b[A-Za-z_][A-Za-z0-9_]*::truncate\\s*\\("

- id: clear-all-logs-function
  desc: Clear all logs function
  if:
    type: symbol
    exact: clearAllLogs

composite_rules:
- id: clear-all-telemetry-logs
  desc: Clears all telemetry log records
  crit: notable
  conf: 0.9
  all:
  - id: model-truncate-call
  - id: clear-all-logs-function
