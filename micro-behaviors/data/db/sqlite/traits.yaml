defaults:
  platforms:
    - unix
    - windows
    - android
  for: [elf, macho, pe]
traits:
  - id: python-sqlite3-import
    desc: Imports Python SQLite database module
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: import
      exact: sqlite3
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-sqlcipher-driver-import
    desc: Imports Python SQLCipher driver
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: import
      substr: sqlcipher
  - id: python-sqlcipher-connect
    desc: Opens a SQLCipher database
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      exact: sqlcipher.connect
  - id: python-sqlcipher-key-management
    desc: Sets SQLCipher key or rekey pragma
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(?i)PRAGMA\s+(key|rekey)\s*='
  - id: sqlite3-string
    desc: sqlite3 string
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: sqlite3
    unless:
      - type: text
        substr: application/vnd.sqlite3
  - id: sqlite3-open
    desc: References the SQLite sqlite3_open routine
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: sqlite3_open
  - id: sqlite3-cli
    desc: sqlite3 command invocation
    crit: notable
    conf: 0.8
    for: [scripts]
    platforms: [unix, windows, ios]
    if:
      type: text
      regex: (?m)(^|[;&|`$()])\s*sqlite3\s+[^'"\n]{1,120}
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: go-sqlite3
    desc: mattn/go-sqlite3 driver
    crit: notable
    conf: 0.9
    for: [elf, macho, pe, go.mod]
    if:
      type: text
      substr: mattn/go-sqlite3
  - id: go-sqlite3-driver-import
    desc: Go SQLite3 driver import
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: text
      regex: '"github\.com/(mattn|charlievieth)/go-sqlite3"'
  - id: go-sqlite-driver-register
    desc: Go SQLite driver registration
    crit: notable
    conf: 0.88
    for: [go]
    if:
      type: text
      regex: 'sql\.Register\(\s*"sqlite3'
  - id: sqlite3-cgo-open
    desc: SQLite C open API
    crit: notable
    conf: 0.9
    for: [go, c, cpp]
    if:
      type: text
      regex: '\b(C\.)?sqlite3_open(_v2)?\s*\('
  - id: sqlite3-load-extension-api
    desc: SQLite extension loading API
    crit: notable
    conf: 0.9
    for: [go, c, cpp]
    if:
      type: text
      regex: '\b(C\.)?sqlite3_(enable_load_extension|load_extension)\s*\('
  - id: sqlite3-extension-entrypoint
    desc: SQLite extension entrypoint
    crit: notable
    conf: 0.88
    for: [c, cpp]
    if:
      type: symbol
      exact: sqlite3_extension_init
  - id: sqlite3-create-function-api
    desc: SQLite function registration API
    crit: notable
    conf: 0.88
    for: [go, c, cpp]
    if:
      type: text
      regex: '\b(C\.)?(_)?sqlite3_create_function(_v2|16)?\s*\('
  - id: sqlite3-create-module-api
    desc: SQLite virtual table module API
    crit: notable
    conf: 0.88
    for: [go, c, cpp]
    if:
      type: text
      regex: '\b(C\.)?(_)?sqlite3_create_module(_v2)?\s*\('
  - id: go-sqlite-register-func
    desc: Go SQLite function registration
    crit: notable
    conf: 0.88
    for: [go]
    if:
      type: text
      regex: '\.Register(Func|Aggregator)\s*\('
  - id: go-sqlite-register-hook
    desc: Go SQLite connection hook
    crit: notable
    conf: 0.86
    for: [go]
    if:
      type: text
      regex: '\.Register(UpdateHook|CommitHook|RollbackHook)\s*\('
  - id: go-sqlite-register-authorizer
    desc: Go SQLite authorizer registration
    crit: notable
    conf: 0.86
    for: [go]
    if:
      type: text
      substr: .RegisterAuthorizer(
  - id: go-sqlite-register-preupdate-hook
    desc: Go SQLite preupdate hook registration
    crit: notable
    conf: 0.86
    for: [go]
    if:
      type: text
      substr: .RegisterPreUpdateHook(
  - id: sqlite3-serialize-api
    desc: SQLite serialize API
    crit: notable
    conf: 0.86
    for: [c, cpp]
    if:
      type: text
      regex: '\b(C\.)?sqlite3_(serialize|deserialize)\s*\('
  - id: rusqlite
    desc: rusqlite Rust driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: rusqlite
  - id: sqlite-format
    # This text marker identifies an embedded SQLite runtime/parser. Actual
    # database-file identity is provided by metadata/file/magic::sqlite3;
    # this matcher must not claim that an ELF containing the runtime is itself
    # a SQLite database file.
    desc: SQLite runtime format marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: SQLite format
  - id: bun-sqlite-import
    desc: Bun SQLite import
    crit: notable
    conf: 0.93
    for: [javascript, typescript]
    if:
      type: string_literal
      exact: bun:sqlite
  - id: bun-sqlite-database-open
    desc: Bun SQLite database open
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bnew\s+Database\s*\('
  - id: sqlite-wal-pragma
    desc: SQLite WAL journal pragma
    crit: notable
    conf: 0.9
    for: [javascript, typescript, go, c, cpp]
    if:
      type: string_literal
      exact: PRAGMA journal_mode = WAL
composite_rules:
  - id: bun-sqlite-database
    desc: Bun SQLite database usage
    crit: notable
    conf: 0.95
    all:
      - id: bun-sqlite-import
      - id: bun-sqlite-database-open
