defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mongodb-url
    desc: mongodb:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb://
  - id: mongodb-srv-url
    desc: mongodb+srv:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb+srv://
  - id: go-mongodb
    desc: go.mongodb.org driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: go.mongodb.org
  - id: pymongo
    desc: Imports the PyMongo database driver
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: import
      regex: '^pymongo(\.|$)'
  - id: python-mongodb-insert-helper
    desc: Inserts records into MongoDB
    crit: notable
    conf: 0.9
    for: [python, pe, dll]
    if:
      type: text
      regex: '\binsert_to_db\s*\('
  - id: python-mongodb-client-import
    desc: Imports Python MongoDB client
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: symbol
      kind: import
      exact: MongoClient
  - id: python-mongodb-client-create
    desc: Creates a Python MongoDB client
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: symbol
      kind: call
      exact: MongoClient
  - id: python-mongodb-query
    desc: Queries MongoDB collections from Python
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '\bcoll\.(find|aggregate)\s*\('
  - id: python-mongodb-health-check
    desc: Checks MongoDB server availability
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: text
      substr: client.admin.command(
  - id: mongoose
    desc: mongoose ODM
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: mongoose
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - id: well-known/lib/sentry-js/
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: mongodb-client-import
    desc: JavaScript or TypeScript MongoDB driver import
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: import
      exact: mongodb
  - id: mongodb-client-connect
    desc: MongoClient instance connection call
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)MongoClient$'
  - id: mongodb-collection-create
    desc: Creates a MongoDB collection
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)createCollection$'
  - id: mongodb-update-write
    desc: MongoDB update write call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(updateOne|updateMany|findOneAndUpdate)$'
  - id: mongodb-insert-write
    desc: MongoDB insert write call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)insert(One|Many)$'
  - id: mongodb-replace-write
    desc: MongoDB replace write call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)replace(One|Many)$'
  - id: mongodb-admin-seed-function
    desc: Function that seeds a MongoDB administrator
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: function
      regex: '(?i)^seed.*admin'

composite_rules:
  - id: mongodb-index-create
    desc: Creates a MongoDB index
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    near_bytes: 4096
    all:
      - id: mongodb-client-import
      - id: micro-behaviors/data/db/index::database-index-create-call

  - id: python-mongodb-access
    desc: Python MongoDB client and collection access
    crit: notable
    conf: 0.95
    for: [python]
    all:
      - id: python-mongodb-client-import
      - id: python-mongodb-client-create
    any:
      - id: python-mongodb-query
      - id: python-mongodb-health-check
