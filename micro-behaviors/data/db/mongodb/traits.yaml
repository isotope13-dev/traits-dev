defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mongodb-name-reference
    desc: MongoDB name reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: MongoDB
  - id: mongodb-url
    desc: mongodb:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb://
  - id: mongodb-srv-url
    desc: mongodb+srv:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb+srv://
  - id: go-mongodb
    desc: go.mongodb.org driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: go.mongodb.org
  - id: pymongo
    desc: pymongo Python driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: pymongo
  - id: mongoose
    desc: mongoose ODM
    crit: notable
    conf: 0.9
    count_min: 2
    if:
      type: text
      substr: mongoose
    unless:
      - id: well-known/lib/sentry-js/
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
