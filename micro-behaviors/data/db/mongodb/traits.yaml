defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mongodb-name-reference
    desc: MongoDB name reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: MongoDB
    unless:
      - type: basename
        exact: backbone.js
      - type: basename
        exact: backbone.min.js
  - id: mongodb-url
    desc: mongodb:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb://
  - id: mongodb-srv-url
    desc: mongodb+srv:// URL scheme
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: mongodb+srv://
  - id: go-mongodb
    desc: go.mongodb.org driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: go.mongodb.org
  - id: pymongo
    desc: pymongo Python driver
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: pymongo
  - id: mongoose
    desc: mongoose ODM
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: mongoose
    unless:
      - id: well-known/lib/sentry-js/
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: mongodb-client-import
    desc: JavaScript or TypeScript MongoDB driver import
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: import
      exact: mongodb
  - id: mongodb-client-connect
    desc: MongoDB client connection call
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)MongoClient$|(^|\.)client\.connect$'
  - id: mongodb-collection-create
    desc: MongoDB database or index creation call
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)create(Collection|Index)$'
  - id: mongodb-update-write
    desc: MongoDB update write call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(updateOne|updateMany|findOneAndUpdate)$'
  - id: mongodb-insert-write
    desc: MongoDB insert write call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)insert(One|Many)$'
  - id: mongodb-replace-write
    desc: MongoDB replace write call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)replace(One|Many)$'
  - id: mongodb-admin-seed-function
    desc: Function that seeds a MongoDB administrator
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      kind: function
      regex: '(?i)^seed.*admin'
