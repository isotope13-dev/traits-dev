defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.84

traits:
- id: traffic-logs-table
  desc: Traffic logs database table
  if:
    type: text
    regex: "Schema::create\\s*\\(\\s*['\"]traffic_logs['\"]"

- id: http-log-url-column
  desc: HTTP log URL column
  if:
    type: text
    regex: "->text\\s*\\(\\s*['\"]url['\"]\\s*\\)"

- id: http-log-ip-column
  desc: HTTP log IP address column
  if:
    type: text
    regex: "->string\\s*\\(\\s*['\"]ip_address['\"]"

- id: http-log-user-agent-column
  desc: HTTP log User-Agent column
  if:
    type: text
    regex: "->text\\s*\\(\\s*['\"]user_agent['\"]\\s*\\)"

- id: http-log-user-id-column
  desc: HTTP log user ID column
  if:
    type: text
    regex: "->unsignedBigInteger\\s*\\(\\s*['\"]user_id['\"]\\s*\\)"

composite_rules:
- id: traffic-log-schema
  desc: HTTP traffic log database schema
  crit: notable
  conf: 0.9
  all:
  - id: traffic-logs-table
  any:
  - id: http-log-url-column
  - id: http-log-ip-column
  - id: http-log-user-agent-column
  - id: http-log-user-id-column
  needs: 3
