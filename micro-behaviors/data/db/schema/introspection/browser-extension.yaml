defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: information-schema-columns-query
    desc: information_schema columns query
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: information_schema. "columns"
  - id: postgres-constraint-catalog-query
    desc: PostgreSQL constraint catalog query
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: pg_catalog.pg_constraint
  - id: postgres-json-schema-aggregation
    desc: PostgreSQL JSON schema aggregation
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: json_agg(json_build_object
  - id: pgadmin-query-tool-start
    desc: pgAdmin query-tool start API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /sqleditor/query_tool/start/
  - id: pgadmin-query-tool-poll
    desc: pgAdmin query-tool poll API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /sqleditor/poll/
composite_rules:
  - id: postgres-catalog-schema-query
    desc: PostgreSQL catalog schema query
    crit: notable
    conf: 0.9
    all:
      - id: information-schema-columns-query
      - id: postgres-constraint-catalog-query
      - id: postgres-json-schema-aggregation
  - id: pgadmin-query-tool-schema-poll
    desc: pgAdmin query-tool schema polling
    crit: notable
    conf: 0.9
    all:
      - id: pgadmin-query-tool-start
      - id: pgadmin-query-tool-poll
      - id: postgres-catalog-schema-query
