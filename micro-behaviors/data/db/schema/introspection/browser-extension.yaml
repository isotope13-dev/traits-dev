defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: information-schema-columns-query
    desc: Queries information_schema columns
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: information_schema. "columns"
  - id: postgres-constraint-catalog-query
    desc: Queries PostgreSQL constraints
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: pg_catalog.pg_constraint
  - id: postgres-json-schema-aggregation
    desc: Aggregates PostgreSQL schema JSON
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: json_agg(json_build_object
  - id: pgadmin-query-tool-start
    desc: Starts pgAdmin query tool
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /sqleditor/query_tool/start/
  - id: pgadmin-query-tool-poll
    desc: Polls pgAdmin query tool
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /sqleditor/poll/
composite_rules:
  - id: postgres-catalog-schema-query
    desc: Queries PostgreSQL catalog schema
    crit: notable
    conf: 0.9
    all:
      - id: information-schema-columns-query
      - id: postgres-constraint-catalog-query
      - id: postgres-json-schema-aggregation
  - id: pgadmin-query-tool-schema-poll
    desc: Polls pgAdmin schema query
    crit: notable
    conf: 0.9
    all:
      - id: pgadmin-query-tool-start
      - id: pgadmin-query-tool-poll
      - id: postgres-catalog-schema-query
