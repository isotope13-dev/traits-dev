defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: avanty-ace-event-channel
    desc: Avanty Ace editor event channel
    crit: component
    conf: 0.95
    if:
      type: text
      substr: avantyAceCommunication
  - id: metabase-store-access
    desc: Metabase Redux store access
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: window.Metabase.store
  - id: ace-editor-access
    desc: Ace editor page access
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: window.ace.edit
  - id: sql-editor-set-value
    desc: SQL editor value setter
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: editor.setValue
  - id: avanty-codemirror-event-channel
    desc: Avanty CodeMirror event channel
    crit: component
    conf: 0.95
    if:
      type: text
      substr: avantyCodeMirrorCommunication
  - id: pgadmin-sqleditor-container
    desc: pgAdmin SQL editor container
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: sqleditor-container
  - id: codemirror-editor-access
    desc: CodeMirror editor page access
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: .CodeMirror
  - id: pgadmin-csrf-token-read
    desc: pgAdmin CSRF token read
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: window.pgAdmin.csrf_token
  - id: metabase-api-list-databases
    desc: Metabase database list API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database?include=tables
  - id: metabase-api-database-metadata
    desc: Metabase database metadata API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database/${e}/metadata
  - id: metabase-api-database-schemas
    desc: Metabase database schemas API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database/${e}/schemas
  - id: metabase-api-database-fields
    desc: Metabase database fields API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database/${e}/fields
  - id: metabase-api-card-access
    desc: Metabase saved card API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/card/
  - id: metabase-api-native-dataset
    desc: Metabase native dataset API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/dataset/native
  - id: ai-generate-query-endpoint
    desc: AI generate query endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /generate-query
  - id: ai-debug-sql-endpoint
    desc: AI debug SQL endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /debug-sql
  - id: ai-explain-sql-endpoint
    desc: AI explain SQL endpoint
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /explain
  - id: ai-comment-sql-endpoint
    desc: AI comment SQL endpoint
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /add-comments
composite_rules:
  - id: metabase-ace-editor-bridge
    desc: Metabase Ace SQL editor bridge
    crit: notable
    conf: 0.92
    all:
      - id: avanty-ace-event-channel
      - id: metabase-store-access
      - id: ace-editor-access
      - id: sql-editor-set-value
  - id: pgadmin-codemirror-editor-bridge
    desc: pgAdmin CodeMirror SQL editor bridge
    crit: notable
    conf: 0.92
    all:
      - id: avanty-codemirror-event-channel
      - id: pgadmin-sqleditor-container
      - id: codemirror-editor-access
      - id: pgadmin-csrf-token-read
  - id: metabase-api-schema-client
    desc: Metabase database schema API client
    crit: notable
    conf: 0.9
    all:
      - id: metabase-api-list-databases
      - id: metabase-api-database-metadata
      - id: metabase-api-database-schemas
      - id: metabase-api-database-fields
  - id: metabase-card-sql-client
    desc: Metabase saved question SQL client
    crit: notable
    conf: 0.9
    all:
      - id: metabase-api-card-access
      - id: metabase-api-native-dataset
  - id: ai-sql-generation-api-client
    desc: AI SQL generation API client
    crit: notable
    conf: 0.9
    all:
      - id: ai-generate-query-endpoint
      - id: ai-debug-sql-endpoint
    any:
      - id: ai-explain-sql-endpoint
      - id: ai-comment-sql-endpoint
