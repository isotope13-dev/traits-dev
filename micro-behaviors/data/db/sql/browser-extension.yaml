defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: avanty-ace-event-channel
    desc: Avanty Ace editor event channel
    crit: component
    conf: 0.95
    if:
      type: text
      substr: avantyAceCommunication
  - id: metabase-store-access
    desc: Reads Metabase Redux store
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: window.Metabase.store
  - id: ace-editor-access
    desc: Accesses Ace editor object
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: window.ace.edit
  - id: sql-editor-set-value
    # Generic editor.setValue is Monaco/CodeMirror/Ace; require SQL-editor context.
    desc: Sets SQL editor value
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)sql.{0,40}editor\.setValue|editor\.setValue.{0,40}sql'
  - id: avanty-codemirror-event-channel
    desc: Avanty CodeMirror event channel
    crit: component
    conf: 0.95
    if:
      type: text
      substr: avantyCodeMirrorCommunication
  - id: pgadmin-sqleditor-container
    desc: Detects pgAdmin SQL editor
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: sqleditor-container
  - id: pgadmin-csrf-token-read
    desc: Reads pgAdmin CSRF token
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: window.pgAdmin.csrf_token
  - id: metabase-api-list-databases
    desc: Calls Metabase database list
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database?include=tables
  - id: metabase-api-database-metadata
    desc: Calls Metabase metadata API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database/${e}/metadata
  - id: metabase-api-database-schemas
    desc: Calls Metabase schemas API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database/${e}/schemas
  - id: metabase-api-database-fields
    desc: Calls Metabase fields API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/database/${e}/fields
  - id: metabase-api-card-access
    desc: Calls Metabase saved-card API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/card/
  - id: metabase-api-native-dataset
    desc: Calls Metabase native dataset
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/dataset/native
  - id: ai-generate-query-endpoint
    desc: AI query generation endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /generate-query
  - id: ai-debug-sql-endpoint
    desc: AI SQL debug endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /debug-sql
  - id: ai-explain-sql-endpoint
    desc: AI SQL explanation endpoint
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /explain
  - id: ai-comment-sql-endpoint
    desc: AI SQL comment endpoint
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /add-comments
composite_rules:
  - id: metabase-ace-editor-bridge
    desc: Bridges Metabase Ace editor
    crit: notable
    conf: 0.92
    all:
      - id: avanty-ace-event-channel
      - id: metabase-store-access
      - id: ace-editor-access
      - id: sql-editor-set-value
  - id: pgadmin-codemirror-editor-bridge
    desc: Bridges pgAdmin CodeMirror editor
    crit: notable
    conf: 0.92
    all:
      - id: avanty-codemirror-event-channel
      - id: pgadmin-sqleditor-container
      - id: metadata/library/codemirror::editor-object-reference
      - id: pgadmin-csrf-token-read
  - id: metabase-api-schema-client
    desc: Calls Metabase schema APIs
    crit: notable
    conf: 0.9
    all:
      - id: metabase-api-list-databases
      - id: metabase-api-database-metadata
      - id: metabase-api-database-schemas
      - id: metabase-api-database-fields
  - id: metabase-card-sql-client
    desc: Calls Metabase saved-question APIs
    crit: notable
    conf: 0.9
    all:
      - id: metabase-api-card-access
      - id: metabase-api-native-dataset
  - id: ai-sql-generation-api-client
    desc: Calls AI SQL generation APIs
    crit: notable
    conf: 0.9
    all:
      - id: ai-generate-query-endpoint
      - id: ai-debug-sql-endpoint
    any:
      - id: ai-explain-sql-endpoint
      - id: ai-comment-sql-endpoint
