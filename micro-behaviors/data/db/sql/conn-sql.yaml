defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: jvm-sql-class-ref
    desc: JVM SQL package reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/sql(/|$)'

  - id: sql-select
    desc: SELECT SQL keyword in query
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)\bSELECT\s+(\*|[a-z0-9_]{1,40}(\s*,\s*[a-z0-9_]{1,40}){0,12})\s+FROM\b
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - type: text
          substr: "org.junit.jupiter.api.Test"
        - type: text
          substr: "TestGoConverterSingleFile"
        - type: basename
          regex: '(?i)Test\.java##plain'
  - id: sql-insert
    desc: INSERT INTO SQL keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\bINSERT\s+INTO\b
  - id: sql-update
    desc: UPDATE SQL keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\bUPDATE\s+[a-z0-9_]+\s+SET\b
  - id: sql-delete
    desc: DELETE FROM SQL keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\bDELETE\s+FROM\b
  - id: sql-create-table
    desc: CREATE TABLE SQL keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\bCREATE\s+TABLE\b
  - id: sql-password-column
    desc: SQL password column definition
    crit: component
    conf: 0.86
    if:
      type: text
      regex: (?i)\bpassword\b\s+(VARCHAR|TEXT|CHAR|STRING)
  - id: sql-plaintext-password-update
    desc: SQL password value update
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)['"]password['"]\s*=>|\bpassword\b\s*=
  - id: database-sql-import
    desc: database/sql Go import
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: database/sql
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - type: text
          substr: "org.junit.jupiter.api.Test"
        - type: text
          substr: "TestGoConverterSingleFile"
        - type: basename
          regex: '(?i)Test\.java##plain'
  - id: sql-open
    desc: sql.Open Go function
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: sql.Open
  - id: go-sql-open-mysql
    desc: Go opens MySQL database
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: symbol
      kind: call
      exact: sql.Open
      arg:
        kind: string
        exact: mysql
  - id: go-mysql-credential-dsn-format
    desc: MySQL TCP credential DSN format
    crit: notable
    conf: 0.84
    for: [go, binaries]
    if:
      type: text
      substr: '@tcp(%s:3306)'
  - id: sqlparser-rust-crate
    desc: Rust sqlparser crate
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /sqlparser-
  - id: sql-keyword-table
    desc: Embedded SQL keyword table
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: SQL_BIG_RESULT
composite_rules:
  - id: sql-keywords
    desc: SQL statement keywords
    crit: notable
    conf: 0.5
    needs: 3
    any:
      - id: sql-select
      - id: sql-insert
      - id: sql-update
      - id: sql-delete
      - id: sql-create-table
  - id: sql-generic
    desc: Generic SQL database patterns
    crit: notable
    conf: 0.8
    any:
      - id: sql-keywords
      - id: database-sql-import
      - id: sql-open
      - id: sqlparser-rust-crate
      - id: sql-keyword-table
  - id: sql-plaintext-password-storage
    desc: SQL plaintext password storage
    crit: notable
    conf: 0.86
    for: [scripts, source]
    all:
      - id: sql-password-column
      - id: sql-plaintext-password-update
    any:
      - id: sql-create-table
      - id: sql-update
      - id: sql-insert
