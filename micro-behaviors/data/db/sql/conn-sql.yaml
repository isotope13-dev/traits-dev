defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: jvm-sql-class-ref
    desc: JVM SQL package reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/sql(/|$)'

  - id: sql-select
    desc: Contains an SQL SELECT query
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)\bSELECT\s+(\*|[a-z0-9_]{1,40}(\s*,\s*[a-z0-9_]{1,40}){0,12})\s+FROM\b
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - type: text
          substr: "org.junit.jupiter.api.Test"
        - type: text
          substr: "TestGoConverterSingleFile"
        - type: basename
          regex: '(?i)Test\.java##plain'
    unless:
      - id: metadata/lang/source::openapi-generator-source-banner
      - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
  - id: python-sql-f-string
    desc: Builds SQL with Python f-string interpolation
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?i)\bf["'']\s*(SELECT|INSERT|UPDATE|DELETE)\b[^\n]{0,240}\{[A-Za-z_][\w.]*\}'
  - id: sql-messages-table-query
    desc: SQL SELECT query targets messages table
    crit: notable
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '(?is)\bSELECT\b[\s\S]{0,240}\bFROM\s+messages\b'
  - id: sql-prepare-statement
    desc: SQL PREPARE statement declaration
    crit: notable
    conf: 0.9
    for: [scripts, binaries, text]
    if:
      type: text
      regex: '\bPREPARE\s+\w+\s+FROM\b'
      case_insensitive: true
  - id: sql-execute-named-statement
    desc: SQL EXECUTE named statement
    crit: notable
    conf: 0.9
    for: [scripts, binaries, text]
    if:
      type: text
      regex: '(^|[;\n])\s*EXECUTE\s+\w+\s*;'
      case_insensitive: true

  - id: sql-insert
    desc: Contains an SQL INSERT statement
    crit: notable
    conf: 0.8
    if:
      type: literal
      kind: string
      regex: (?i)\bINSERT\s+INTO\s+\w+\s*(\(|VALUES\b|SELECT\b|DEFAULT\b)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/lib/highlight-js::browser-bundle
  - id: sql-update
    desc: SQL UPDATE statement
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\bUPDATE\s+[a-z0-9_]+\s+SET\b
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: sql-delete
    desc: Contains an SQL DELETE statement
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)\bDELETE\s+FROM\s+[a-z_][a-z0-9_]*\b
  - id: sql-create-table
    desc: Contains an SQL CREATE TABLE statement
    crit: notable
    conf: 0.5
    if:
      type: literal
      kind: string
      # Require a table identifier and a statement body.  This avoids
      # treating prose such as "CREATE TABLE, INSERT INTO, SELECT" in a
      # parser/documentation description as an SQL operation.
      regex: (?i)\bCREATE\s+TABLE(\s+IF\s+NOT\s+EXISTS)?\s+[a-z_][a-z0-9_$]*(\s*\(|\s+AS\b)
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/lang/source::openapi-generator-source-banner
      - id: well-known/lib/highlight-js::browser-bundle
  - id: sql-password-column
    desc: SQL password column definition
    crit: component
    conf: 0.86
    if:
      type: text
      regex: (?i)\bpassword\b\s+(VARCHAR|TEXT|CHAR|STRING)
  - id: sql-plaintext-password-update
    desc: SQL password value update
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)['"]password['"]\s*=>|\bpassword\b\s*=
  - id: database-sql-import
    desc: database/sql Go import
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: database/sql
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - type: text
          substr: "org.junit.jupiter.api.Test"
        - type: text
          substr: "TestGoConverterSingleFile"
        - type: basename
          regex: '(?i)Test\.java##plain'
  - id: sql-open
    desc: sql.Open Go function
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: sql.Open
  - id: go-sql-open-mysql
    desc: Go opens MySQL database
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: symbol
      kind: call
      exact: sql.Open
      arg:
        kind: string
        exact: mysql
  - id: go-mysql-credential-dsn-format
    desc: MySQL TCP credential DSN format
    crit: notable
    conf: 0.84
    for: [go, binaries, wasm]
    if:
      type: text
      substr: '@tcp(%s:3306)'
  - id: sqlparser-rust-crate
    desc: Rust sqlparser crate
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /sqlparser-
  - id: sql-keyword-table
    desc: Embedded SQL keyword table
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: SQL_BIG_RESULT
  - id: sqlite-version-func
    desc: SQLite version query fragment
    crit: notable
    for: [python]
    if:
      type: text
      regex: 'sqlite_version\(\)\s+IS\s+NOT\s+NULL'
  - id: mysql-version-comment-var
    desc: MySQL version comment variable
    crit: notable
    for: [python]
    if:
      type: text
      substr: '@@version_comment'
  - id: mssql-servername-var
    desc: MSSQL server name variable
    crit: notable
    for: [python]
    if:
      type: text
      substr: '@@servername'
  - id: postgres-catalog-table
    desc: PostgreSQL catalog table reference
    crit: notable
    for: [python]
    if:
      type: text
      substr: 'pg_catalog.pg_tables'
  - id: information-schema-ref
    desc: SQL information_schema reference
    crit: notable
    for: [python]
    if:
      type: text
      word: information_schema
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: sqlite-master-ref
    desc: SQLite sqlite_master reference
    crit: notable
    for: [python]
    if:
      type: text
      word: sqlite_master
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pragma-table-info-ref
    desc: SQLite table info pragma
    crit: notable
    for: [python]
    if:
      type: text
      substr: 'pragma_table_info'
  - id: sql-drop-object
    desc: DROP SQL object statement
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\bDROP\s+(TABLE|DATABASE|SCHEMA|INDEX)\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: sql-truncate-object
    desc: TRUNCATE SQL object statement
    crit: notable
    conf: 0.8
    if:
      type: literal
      kind: string
      regex: '(?i)\bTRUNCATE\s+(TABLE|DATABASE|SCHEMA)\b'
composite_rules:
  - id: sql-keywords
    desc: Contains several SQL statement types
    crit: notable
    conf: 0.5
    needs: 3
    any:
      - id: sql-select
      - id: sql-insert
      - id: sql-update
      - id: sql-delete
      - id: sql-create-table
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: sql-generic
    desc: Uses SQL database operations
    crit: notable
    conf: 0.8
    any:
      - id: sql-keywords
      - id: database-sql-import
      - id: sql-open
      - id: sqlparser-rust-crate
      - id: sql-keyword-table
    unless:
      - id: well-known/tool/development/fzf::fzf-binary
      - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
  - id: dbms-fingerprint-query-suite
    desc: Multi-DBMS fingerprint query suite
    crit: notable
    conf: 0.93
    needs: 3
    any:
      - id: sqlite-version-func
      - id: mysql-version-comment-var
      - id: mssql-servername-var
  - id: schema-enumeration-query-suite
    desc: SQL schema enumeration query suite
    crit: notable
    conf: 0.94
    needs: 2
    any:
      - id: information-schema-ref
      - id: sqlite-master-ref
      - id: pragma-table-info-ref
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: sql-plaintext-password-storage
    desc: SQL plaintext password storage
    crit: notable
    conf: 0.86
    for: [scripts, source]
    all:
      - id: sql-password-column
      - id: sql-plaintext-password-update
    any:
      - id: sql-create-table
      - id: sql-update
      - id: sql-insert
  - id: sql-prepared-statement-execution
    desc: SQL prepared statement execution
    crit: notable
    conf: 0.92
    for: [scripts, binaries, text]
    all:
      - id: sql-prepare-statement
      - id: sql-execute-named-statement
