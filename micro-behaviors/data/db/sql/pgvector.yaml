# PostgreSQL pgvector schema operations are neutral database capabilities.
defaults:
  platforms: [unix, windows]
  for: [python, source]
  crit: notable
  conf: 0.9

traits:
  - id: pgvector-extension-create
    desc: Creates PostgreSQL pgvector extension
    if:
      type: text
      regex: '(?i)CREATE\s+EXTENSION\s+IF\s+NOT\s+EXISTS\s+vector\b'

  - id: pgvector-column-type
    desc: PostgreSQL pgvector column type
    if:
      type: text
      regex: '(?i)\bvector\s*\(\s*\d+\s*\)'
