# C# SQL/Database Traits
# objective: data, behavior: sql
defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: sqlcommand
    desc: SQL command construction or execution
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: identifier
      exact: "SqlCommand"
  - id: sqlconnection
    desc: SQL database connection
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: identifier
      exact: "SqlConnection"
  - id: sqldatareader
    desc: SQL data reader
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: identifier
      exact: "SqlDataReader"
  - id: extension-method
    desc: Extension method definition (can extend
    crit: notable
    conf: 0.7
    if:
      type: ast
      node: parameter
      exact: "this SqlCommand"
