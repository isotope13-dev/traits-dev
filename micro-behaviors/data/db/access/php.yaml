defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
traits:
  - id: php-update-option
    desc: WordPress update_option function symbol
    if:
      type: symbol
      exact: "update_option"
  - id: php-get-option
    desc: WordPress get_option function symbol
    if:
      type: symbol
      exact: "get_option"
  - id: php-add-option
    desc: WordPress add_option function symbol
    if:
      type: symbol
      exact: "add_option"
