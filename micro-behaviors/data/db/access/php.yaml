defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
traits:
  - id: php-update-option
    desc: Writes a WordPress option (update_option)
    if:
      type: symbol
      exact: "update_option"
  - id: php-get-option
    desc: Reads a WordPress option (get_option)
    if:
      type: symbol
      exact: "get_option"
  - id: php-add-option
    desc: Creates a WordPress option (add_option)
    if:
      type: symbol
      exact: "add_option"
