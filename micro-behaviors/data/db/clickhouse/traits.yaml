# ClickHouse columnar/OLAP database client capability. Neutral and dual-use:
# the backing store for observability, analytics, and SIEM pipelines, and also
# seen as the bulk-event sink in telemetry/exfil tooling. A client reference is
# an analyst-relevant data-access capability worth surfacing in a supply-chain
# diff; intent composites combine it cross-tier with collection/exfil evidence.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: clickhouse-name
    desc: ClickHouse OLAP database reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)clickhouse
    unless:
      - id: metadata/package/quality/
  - id: clickhouse-driver-py
    desc: clickhouse_driver native client (Python)
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: clickhouse[_-]driver
  - id: clickhouse-connect-py
    desc: clickhouse-connect HTTP client (Python)
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: clickhouse[_-]connect
  - id: clickhouse-go-driver
    desc: clickhouse-go database/sql driver (Go)
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: clickhouse-go
  - id: clickhouse-url
    desc: clickhouse:// connection URL scheme
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'clickhouse://'
