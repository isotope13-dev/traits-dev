defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  size_min: 512
  size_max: 500000000

traits:
  - id: redis-cli-tool
    desc: redis-cli command-line tool
    crit: notable
    conf: 0.7
    if:
      type: text
      word: redis-cli
      section: .text

  - id: redis-slaveof-command
    desc: Redis SLAVEOF replication command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: SLAVEOF
      section: .text
