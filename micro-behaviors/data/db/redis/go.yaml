# Go Redis client detection (github.com/redis/go-redis, github.com/go-redis/redis).
#
# Existing redis traits in this directory cover the URL scheme (`redis://`,
# `rediss://`) and Redis-module C-side exports. Go applications using the
# canonical go-redis client go through neither: they import the package and
# call `redis.NewClient(...)` against a typed options struct. This file
# adds the Go-specific client surface so caching behavior is visible in
# pure Go binaries.
defaults:
  platforms: [unix, windows]
  for: [go]
  mbc: C0002
traits:
  - id: go-redis-import
    desc: 'go redis import'
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'github\.com/(redis/go-redis|go-redis/redis)/v\d'

  - id: go-redis-new-client
    desc: redis.NewClient constructor call
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bredis\.NewClient\s*\('

  - id: go-redis-new-cluster-client
    desc: redis.NewClusterClient constructor call
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bredis\.NewClusterClient\s*\('

  - id: go-redis-options-struct
    desc: redis.Options literal initializer
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bredis\.Options\s*\{'

composite_rules:
  - id: go-redis-client
    desc: Go process is a Redis client
    crit: notable
    conf: 0.95
    all:
      - id: go-redis-import
    any:
      - id: go-redis-new-client
      - id: go-redis-new-cluster-client
      - id: go-redis-options-struct
