defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-eval-assignment-keyword
    desc: Variable declaration with 'eval' (var/const/let)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\b(var|const|let)\s+\w+\s*=\s*eval\s*([;,\)\]}]|$)'
    unless:
      - type: text
        substr: var __webpack_modules__={
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - type: text
        substr: "Wine"
      - type: text
        substr: "CodeWeavers"
  - id: js-eval-assignment-return
    desc: Assignment or return of 'eval' function reference
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\b(return|=)\s*eval[^a-zA-Z0-9_(]'
    unless:
      - type: text
        substr: var __webpack_modules__={
      - id: metadata/package/testing/harness/runtime::is-test
  - id: new-function-iife
    desc: Immediate new Function invocation pattern
    crit: notable
    conf: 0.9
    attack: T1027
    mbc: B0032
    if:
      type: ast
      query: |
        (call_expression
          function: [
            (new_expression
              constructor: (identifier) @name
            )
            (parenthesized_expression
              (new_expression
                constructor: (identifier) @name
              )
            )
          ]
          (#eq? @name "Function")
        )
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::test-basename-pattern
        - id: metadata/package/testing/presence/harness::test-directory
        - id: metadata/package/testing/harness/runtime::test-function-def
    unless:
      - type: text
        regex: 'require\("\.\./transformation"\)'
