defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  # A deobfuscator may temporarily replace eval to capture the code it is
  # unpacking, then restore the original reference.  The three named atoms
  # below make that complete, reversible hook distinguishable from code that
  # merely saves eval before using it as an execution sink.
  - id: eval-reference-save
    desc: Saves original eval function reference
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\b(var|let|const)\s+__eval\s*=\s*eval\b'
  - id: eval-function-override
    desc: Replaces eval with local function
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\beval\s*=\s*function\s*\('
  - id: eval-reference-restore
    desc: Restores saved eval function reference
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\beval\s*=\s*__eval\b'

  - id: js-eval-assignment-keyword
    desc: "var declaration with 'eval' (var/const/let)"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(var|const|let)\s+\w+\s*=\s*eval\s*([;,\)\]}]|$)'
    unless:
      - id: temporary-eval-hook-context
      - id: metadata/library/structure/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - type: text
        substr: "loadPrefetchedJSLibrary"
  - id: js-eval-reference-assignment
    desc: "Assignment of the eval function reference"
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: assignment
      regex: '=\s*eval\s*([;,\)\]}]|$)'
    unless:
      - id: temporary-eval-hook-context
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure/
      - id: well-known/lib/nextjs/
      - type: path
        basename: true
        exact: eval-source-map-dev-tool-plugin.js
      # jQuery's globalEval (indirect eval). Minification renames the locals, so
      # match any single-char identifiers rather than the literal a/b/c build.
      - type: text
        regex: 'globalEval:function\(\w\)\{var \w,\w=eval;'
      # Linter test corpora (biome noGlobalEval) ship `var EVAL = eval` style
      # fixtures under tests/specs and .snap snapshots.
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: metadata/package/testing/presence/fixture::snapshot-file
  - id: js-eval-reference-return
    desc: "Return of the eval function reference"
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: return
      regex: '\breturn\s+eval\s*([;,\)\]}]|$)'
    unless:
      - id: temporary-eval-hook-context
      - type: text
        substr: var __webpack_modules__={
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure/
      - id: well-known/lib/nextjs/
      - type: path
        basename: true
        exact: eval-source-map-dev-tool-plugin.js
      - type: text
        regex: 'globalEval:function\(\w\)\{var \w,\w=eval;'
  - id: new-function-return-this
    desc: Function constructor globalThis discovery idiom
    crit: baseline
    conf: 0.82
    # The universal global-object discovery shim emitted by webpack/babel/UMD
    # bundles (`try{return this||new Function("return this")()}`). Neutral on its
    # own; obfuscated-loader composites reference it cross-directory, where it
    # combines with child-process/decoder atoms to indicate a packed loader.
    if:
      type: text
      regex: '(new\s+)?Function\s*\(\s*["'']return this["'']\s*\)'
  - id: shell-embedded-eval-of-atob
    desc: Embedded eval of Base64 text
    crit: notable
    conf: 0.95
    attack: T1059.007
    for: [shell]
    if:
      type: text
      regex: '\beval\s*\(\s*atob\s*\('
  - id: new-function-iife
    desc: Immediate new Function invocation pattern
    crit: notable
    conf: 0.9
    attack: T1027
    mbc: B0032
    if:
      type: tree-sitter
      query: |
        (call_expression
          function: [
            (new_expression
              constructor: (identifier) @name
            )
            (parenthesized_expression
              (new_expression
                constructor: (identifier) @name
              )
            )
          ]
          (#eq? @name "Function")
        )
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - id: metadata/package/testing/presence/harness/
        - id: metadata/package/testing/harness/runtime::test-function-def
    unless:
      - id: micro-behaviors/data/source/dynamic/eval::new-function-return-this
      - type: text
        regex: 'require\("\.\./transformation"\)'
      - id: well-known/lib/jsonpath-plus::jsonpath-plus-library

composite_rules:
  - id: temporary-eval-hook-context
    desc: Reversible eval interception used by unpacker
    crit: exception
    conf: 0.98
    scope: file
    all:
      - id: eval-reference-save
      - id: eval-function-override
      - id: eval-reference-restore

  - id: js-eval-assignment-return
    desc: "Assignment or return of the eval function reference"
    crit: notable
    conf: 0.9
    any:
      - id: js-eval-reference-assignment
      - id: js-eval-reference-return
    unless:
      - id: temporary-eval-hook-context
