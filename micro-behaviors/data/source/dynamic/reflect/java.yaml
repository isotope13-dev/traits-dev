defaults:
  platforms: [unix, windows]
  for: [java, class, jar, zip]
traits:
  - id: jvm-reflect-class-ref
    desc: JVM reflection class reference
    crit: baseline
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/lang/reflect(/|$)'
  - id: jvm-classloader-class-ref
    desc: JVM ClassLoader class reference
    crit: baseline
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/lang/ClassLoader
  - id: java-urlclassloader-bytecode
    desc: JVM URLClassLoader class reference
    crit: notable
    conf: 0.94
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/net/URLClassLoader
  - id: java-defineclass
    desc: Java defineClass reflective load
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: defineClass

  - id: java-class-forname
    desc: Java Class.forName reference
    crit: component
    for: [java, class]
    if:
      type: text
      substr: Class.forName

  - id: java-class-forname-bytecode
    desc: JVM Class.forName invocation
    crit: component
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/Class.forName

  - id: java-classloader
    desc: Java ClassLoader reference
    crit: component
    for: [java, class]
    if:
      type: text
      substr: ClassLoader
    unless:
      - type: basename
        regex: \.sig$

  - id: java-context-classloader-setter
    desc: Java context ClassLoader setter
    crit: component
    conf: 0.92
    if:
      type: text
      substr: setContextClassLoader

  - id: java-set-accessible
    desc: Java reflection accessibility override
    crit: notable
    conf: 0.86
    for: [java, class]
    if:
      type: symbol
      kind: call
      exact: setAccessible

  - id: java-loadclass
    desc: Java loadClass reference
    crit: component
    for: [java, class]
    if:
      type: text
      substr: loadClass

  - id: java-newinstance
    desc: Java newInstance reference
    crit: component
    for: [java, class]
    if:
      type: text
      substr: newInstance

  - id: java-constructor-newinstance-bytecode
    desc: JVM reflective constructor invocation
    crit: component
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/reflect/Constructor.newInstance

  - id: java-method-invoke-bytecode
    desc: JVM reflective method invocation
    crit: component
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/reflect/Method.invoke

  - id: java-class-getmethod-bytecode
    desc: JVM reflective method lookup
    crit: component
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/Class.getMethod

  - id: java-getdeclaredconstructor
    desc: Java reflective constructor lookup
    crit: component
    conf: 0.9
    if:
      type: text
      substr: getDeclaredConstructor

  - id: java-findclass
    desc: Java class loader findClass reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: findClass

  - id: jvm-reflect-method-class-ref
    desc: JVM java.lang.reflect.Method class reference
    crit: baseline
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      exact: java/lang/reflect/Method

  - id: java-class-getconstructor-bytecode
    desc: JVM reflective constructor lookup
    crit: component
    for: [class, jar, zip, apk]
    if:
      type: import
      exact: java/lang/Class.getConstructor

composite_rules:
  - id: java-bytecode-reflective-method-invoke
    desc: JVM resolves and invokes method reflectively
    crit: notable
    conf: 0.94
    for: [class, jar, zip, apk]
    all:
      - id: java-class-forname-bytecode
      - id: java-class-getmethod-bytecode
      - id: java-method-invoke-bytecode
    unless:
      - id: well-known/lib/google-closure-compiler/
      - id: well-known/lib/args4j
      - id: well-known/lib/args4j::args4j-package-path
      - id: well-known/lib/mozilla-rhino
      - id: well-known/lib/google-protobuf-java::generated-message-lite-class

  - id: java-bytecode-reflective-constructor-invoke
    desc: JVM resolves and invokes constructor reflectively
    crit: notable
    conf: 0.94
    for: [class, jar, zip, apk]
    all:
      - id: java-class-forname-bytecode
      - id: java-class-getconstructor-bytecode
      - id: java-constructor-newinstance-bytecode
    unless:
      - id: well-known/lib/google-closure-compiler/
      - id: well-known/lib/args4j
      - id: well-known/lib/args4j::args4j-package-path
      - id: well-known/lib/mozilla-rhino
      - id: well-known/lib/google-protobuf-java::generated-message-lite-class

  - id: java-reflection
    desc: Java dynamically loads classes
    crit: notable
    conf: 0.85
    for: [java, class]
    needs: 2
    any:
      - id: java-class-forname
      - id: java-classloader
      - id: java-defineclass
      - id: java-loadclass
      - id: java-newinstance
    unless:
      - id: metadata/package/testing/presence/platform_suites::java-test-directory
      - id: metadata/package/testing/presence/platform_suites::java-generic-test-directory
      - id: metadata/package/testing/presence/platform_suites::java-test-filename
