defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  # Explicit dunder method invocation. A plain `.__str__()` call is ordinary
  # Python (object string representation) and carries no standalone signal; it is
  # a building block for the chr-construction obfuscation composites in
  # objectives/anti-static/obfuscation/control-flow/logic, which pair it with the
  # oct/hex/copyright builtin-name tricks.
  - id: dunder-str-call
    desc: Explicit .__str__() dunder invocation
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ".__str__()"
