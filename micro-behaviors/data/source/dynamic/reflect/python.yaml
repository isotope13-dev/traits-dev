defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: copyright-builtin-reference
    desc: References Python copyright builtin
    crit: component
    conf: 0.8
    if:
      type: symbol
      substr: copyright
  # Explicit dunder method invocation. A plain `.__str__()` call is ordinary
  # Python (object string representation) and carries no standalone signal; it is
  # a building block for the chr-construction obfuscation composites in
  # objectives/anti-static/obfuscation/control-flow/logic, which pair it with the
  # oct/hex/copyright builtin-name tricks.
  - id: dunder-str-call
    desc: Explicit .__str__() dunder invocation
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ".__str__()"
  - id: traceback-frame-text
    desc: Accesses a Python traceback frame
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      word: tb_frame
  - id: traceback-next-text
    desc: Traverses to the next Python traceback
    crit: notable
    conf: 0.88
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      word: tb_next
  - id: frame-locals-text
    desc: Python frame locals access
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      word: f_locals
  - id: frame-globals-text
    desc: Python frame globals access
    crit: notable
    conf: 0.88
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      word: f_globals
  - id: frame-code-text
    desc: Accesses a Python frame code object
    crit: notable
    conf: 0.86
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      word: f_code
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: caller-frame-depth-access
    desc: Python caller stack frame traversal
    crit: notable
    conf: 0.88
    ref: sha256:fab39b4045be97c3d98a8425a3486b5561cca80ba0f61721a2070935eeba7846
    if:
      type: text
      regex: 'inspect\.currentframe\(\)(\.f_back){2,}|len\s*\(\s*inspect\.stack\(\s*\)\s*\)'
  - id: traceback-extract-tb-text
    desc: Python traceback extraction call
    crit: notable
    conf: 0.88
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      word: extract_tb

composite_rules:
  - id: traceback-frame-locals
    desc: Python traceback frame locals access
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: traceback-frame-text
      - id: frame-locals-text

  - id: frame-globals-locals-snapshot
    desc: Python frame globals locals snapshot
    crit: notable
    conf: 0.88
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: frame-globals-text
      - id: frame-locals-text
      - id: frame-code-text

  - id: traceback-chain-walk
    desc: Walks a Python traceback chain
    crit: notable
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: traceback-next-text
      - id: traceback-frame-text
