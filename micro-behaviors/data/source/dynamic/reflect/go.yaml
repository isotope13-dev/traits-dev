defaults:
  platforms: [windows, unix]
  for: [go]
traits:
  - id: go-unsafe-package-import
    desc: Imports Go unsafe package
    crit: notable
    conf: 0.95
    if:
      type: import
      exact: unsafe
  - id: go-reflect-heavy
    desc: Repeated Go reflection API usage
    crit: notable
    conf: 0.8
    count_min: 3
    if:
      type: text
      regex: '\breflect\.'
composite_rules:
  - id: go-reflect-unsafe-combo
    desc: Go reflection with unsafe pointer conversion
    crit: notable
    conf: 0.85
    all:
      - id: go-unsafe-package-import
      - id: go-reflect-heavy
