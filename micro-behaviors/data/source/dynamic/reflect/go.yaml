defaults:
  platforms: [windows, unix]
  for: [go]
traits:
  - id: go-unsafe-usage
    desc: Go unsafe package or pointer usage
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?m)^\s*(import\s+)?["'']unsafe["'']|\bunsafe\.'
  - id: go-reflect-heavy
    desc: Repeated Go reflection API usage
    crit: notable
    conf: 0.8
    count_min: 3
    if:
      type: text
      regex: '\breflect\.'
composite_rules:
  - id: go-reflect-unsafe-combo
    desc: Go reflection with unsafe pointer conversion
    crit: notable
    conf: 0.85
    all:
      - id: go-unsafe-usage
      - id: go-reflect-heavy
