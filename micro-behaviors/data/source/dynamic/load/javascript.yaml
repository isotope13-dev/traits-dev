defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: node-variable-require-call
    desc: Node require call with computed module name
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: require
      arg:
        kind: identifier
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: node-dynamic-require-call
    desc: Node dynamic require call
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: \brequire\s*\(\s*[A-Za-z_$][\w$]*\s*\(
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
      - id: metadata/package/quality/false-positives::benign-build-tooling-context

  - id: node-computed-require-call
    desc: Loads a computed module with Node.js require
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\brequire\s*\(\s*[A-Za-z_$][\w$]*\s*(\[|\.|\()'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/library/structure::js-large-module-bundle

  - id: node-load-plugins-function
    desc: Node plugin loader function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: loadPluginsFromDirectory

  - id: node-watch-plugins-function
    desc: Node plugin watcher function
    crit: component
    conf: 0.9
    if:
      type: text
      substr: watchDirectory

  - id: node-parent-plugins-directory
    desc: Node parent plugins directory
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "../../plugins"

  - id: node-global-plugin-registry
    desc: Node global plugin registry
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "global['plugins']=[]"

composite_rules:
  - id: node-plugin-directory-watch-loader
    desc: Node plugin directory watch loader
    crit: notable
    conf: 0.94
    all:
      - id: node-load-plugins-function
      - id: node-watch-plugins-function
      - id: node-parent-plugins-directory
      - id: node-global-plugin-registry
