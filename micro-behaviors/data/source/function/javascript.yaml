defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: js-function-return-string
    desc: Function returning a string literal (fragmentation)
    crit: baseline
    count_min: 10
    if:
      type: ast
      language: javascript
      query: |
        (function_declaration
          body: (statement_block
            (return_statement
              (string)
            )
          )
        ) @func_return_string
  - id: js-function-return-string-dense
    desc: High density of functions returning string literals
    crit: notable
    count_min: 30
    if:
      type: ast
      language: javascript
      query: |
        (function_declaration
          body: (statement_block
            (return_statement
              (string)
            )
          )
        ) @func_return_string
