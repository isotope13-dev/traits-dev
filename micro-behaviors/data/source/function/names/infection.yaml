# File-infection function names in .NET / compiled binaries
# Detects function/method names indicative of PE file infectors
defaults:
  platforms: [windows]
  for: [pe, csharp]
  crit: suspicious
  conf: 0.85

traits:
  - id: infect-exe-function
    desc: InfectExe function name (PE infector)
    conf: 0.92
    if:
      type: text
      word: InfectExe

  - id: infect-dir-function
    desc: InfectDir function name (directory PE infector)
    conf: 0.92
    if:
      type: text
      word: InfectDir

  - id: append-exe-function
    desc: AppendExe function name (PE appender infector)
    conf: 0.9
    if:
      type: text
      word: AppendExe

  - id: extract-base-exe-function
    desc: ExtractBaseExe function name (infector payload extraction)
    conf: 0.88
    if:
      type: text
      word: ExtractBaseExe

  - id: extract-file-to-dir-function
    desc: ExtractFileToDir function name (dropper extraction)
    conf: 0.85
    if:
      type: text
      word: ExtractFileToDir


