# Re-infection avoidance: file infectors define an "is this already infected?"
# check to skip re-infecting hosts. Language-agnostic infector capability.
defaults:
  platforms: [windows, unix]
  for: [java, csharp]
  crit: notable
  conf: 0.85
traits:
  - id: is-infected-function
    desc: isInfected re-infection marker check
    if:
      type: symbol
      kind: function
      regex: isInfected
