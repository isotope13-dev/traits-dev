defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]

# Function names are source/binary vocabulary.  A registration name alone is
# not evidence of command and control: metrics, service discovery, and many
# ordinary clients use the same terminology.  RAT composites combine these
# neutral names with tasking, heartbeat, and socket behavior.
traits:
- id: go-heartbeat-function-name
  desc: Go heartbeat or check-in function name
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '\bmain\.(heartbeat|HeartBeat|checkin|checkIn)\b'
- id: register-self-to-server
  desc: Function name RegisterSelfToServer
  crit: notable
  conf: 0.9
  if:
    type: text
    word: RegisterSelfToServer
- id: register-to-server
  desc: Function name RegisterToServer
  crit: notable
  conf: 0.9
  if:
    type: text
    word: RegisterToServer

composite_rules:
- id: register-to-server-functions
  desc: Register-to-server function name
  crit: notable
  conf: 0.9
  any:
  - id: register-self-to-server
  - id: register-to-server
