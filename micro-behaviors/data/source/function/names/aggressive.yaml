defaults:
  platforms: [windows, unix]
  for: [source]
  crit: suspicious
  conf: 0.8
traits:
  - id: aggressive-go-punishment
    desc: Aggressive Go function name (Punishment)
    conf: 0.9
    for:
      - go
    if:
      type: string_literal
      regex: main\.Punishment
  - id: aggressive-go-desperate
    desc: Aggressive Go function name (Desperate)
    conf: 0.9
    for:
      - go
    if:
      type: string_literal
      regex: main\.Desperate
  - id: aggressive-go-killer
    desc: Aggressive Go function name (Killer/Destroyer)
    conf: 0.85
    for:
      - go
    if:
      type: string_literal
      regex: main\.(Killer|Destroyer)
  - id: aggressive-go-payload
    desc: Aggressive Go function name (Payload/Injector)
    conf: 0.8
    for:
      - go
    if:
      type: string_literal
      regex: main\.(Payload|Injector)
  - id: aggressive-go-malicious-intent
    desc: "Aggressive Go func name (Steal/Infect/Bypass)"
    conf: 0.85
    for:
      - go
    if:
      type: string_literal
      regex: main\.(Steal|Infect|Bypass)
  - id: aggressive-go-target
    desc: "Aggressive Go func name (Target/Victim/Locker)"
    conf: 0.8
    for:
      - go
    if:
      type: string_literal
      regex: main\.(Target|Victim|Locker|Crypt)
  - id: aggressive-generic-hostility
    desc: 'Aggressive generic func name'
    if:
      type: text
      regex: (?i)(punishment|desperate)\s*\(
  - id: backdoor-exploit-function-name
    desc: Function name contains backdoor or exploit term
    crit: notable
    if:
      type: text
      regex: (?i)(malicious|backdoor|exploit)\s*\(
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: aggressive-generic-target
    desc: "Aggressive generic func name"
    crit: notable
    if:
      type: text
      regex: (?i)\b(victim|locker)\s*\(
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
