defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries, scripts, source]
  crit: suspicious
  conf: 0.8
traits:
  - id: aggressive-go-punishment
    desc: Aggressive Go function name (Punishment)
    conf: 0.9
    for:
      - go
    if:
      type: string_value
      regex: main\.Punishment
  - id: aggressive-go-desperate
    desc: Aggressive Go function name (Desperate)
    conf: 0.9
    for:
      - go
    if:
      type: string_value
      regex: main\.Desperate
  - id: aggressive-go-killer
    desc: Aggressive Go function name (Killer/Destroyer)
    conf: 0.85
    for:
      - go
    if:
      type: string_value
      regex: main\.(Killer|Destroyer)
  - id: aggressive-go-payload
    desc: Aggressive Go function name (Payload/Injector)
    conf: 0.8
    for:
      - go
    if:
      type: string_value
      regex: main\.(Payload|Injector)
  - id: aggressive-go-malicious-intent
    desc: Aggressive Go function name (Steal/Infect/Bypass)
    conf: 0.85
    for:
      - go
    if:
      type: string_value
      regex: main\.(Steal|Infect|Bypass)
  - id: aggressive-go-target
    desc: Aggressive Go function name (Target/Victim/Locker)
    conf: 0.8
    for:
      - go
    if:
      type: string_value
      regex: main\.(Target|Victim|Locker|Crypt)
  - id: aggressive-generic-hostility
    desc: Aggressive generic function name (punishment/desperate)
    if:
      type: string_value
      regex: (?i)(punishment|desperate)\s*\(
  - id: aggressive-generic-malicious
    desc: Aggressive generic function name (malicious/backdoor/exploit)
    if:
      type: string_value
      regex: (?i)(malicious|backdoor|exploit)\s*\(
  - id: aggressive-generic-payload
    desc: Aggressive generic function name (payload/infect/bypass)
    if:
      type: string_value
      regex: (?i)\b(payload|infect|bypass)\s*\(
  - id: aggressive-generic-target
    desc: Aggressive generic function name (victim/locker/crypt)
    crit: notable
    if:
      type: string_value
      regex: (?i)\b(victim|locker)\s*\(
