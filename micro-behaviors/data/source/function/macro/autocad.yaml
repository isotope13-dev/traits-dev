defaults:
  for:
    - vbs
    - oledoc
    - ooxml
  platforms: [windows]
  size_max: 16384
  crit: notable
  conf: 0.9

traits:
  - id: autocad-vbe-handle
    desc: AutoCAD VBA VBE object access
    if:
      type: text
      exact: "Set VBEModel = VBE"
      section: .text

  - id: documents-count-loop
    desc: Iterates across open AutoCAD documents
    if:
      type: text
      exact: "For i = 1 To Documents.Count"
      section: .text

  - id: codepane-codemodule-access
    desc: Accesses VBE code module pane
    crit: suspicious
    if:
      type: text
      exact: "Set at = VBEModel.codepanes(i).codemodule"
      section: .text

  - id: line2-infection-marker-check
    desc: Uses line two infection marker
    crit: suspicious
    if:
      type: text
      exact: "If at.lines(2, 1) = \"Set VBEModel = VBE\" And terr = 0 Then"
      section: .text

  - id: codemodule-self-copy-read
    desc: Reads entire code module body
    crit: suspicious
    if:
      type: text
      exact: "newroutine = at.lines(1, at.countoflines)"
      section: .text

  - id: codemodule-prepend-insertlines
    desc: Prepends code into target module
    crit: suspicious
    if:
      type: text
      exact: "VBEModel.codepanes(i).codemodule.InsertLines 1, newroutine"
      section: .text
