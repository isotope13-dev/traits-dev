defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-function-return-string
    desc: Function returning a string literal (fragmentation)
    crit: baseline
    # Migrated from a `(function_declaration body: (return_statement (string)))`
    # query (count_min: 10) to the cached `ast.string_return_function_count`
    # metric — counted inline in the single AST walk, O(1) match. 10+ such
    # decoder functions is the substitution-table obfuscation signal.
    if:
      type: metrics
      field: 'ast.string_return_function_count'
      min: 10
  - id: js-function-return-string-dense
    desc: High density of functions returning string literals
    crit: notable
    # Same cached metric as `js-function-return-string`, at the higher
    # 30+ density threshold (was a `count_min: 30` tree-sitter query).
    if:
      type: metrics
      field: 'ast.string_return_function_count'
      min: 30
