defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: variable-wrapped-string-return-cluster
    desc: Functions return local string variables
    crit: notable
    conf: 0.8
    count_min: 5
    unless:
      - id: metadata/library/structure/
      - id: metadata/build/bundler/
    if:
      type: tree-sitter
      query: |
        (function_declaration
          (statement_block
            (variable_declaration
              (variable_declarator
                name: (identifier) @var
                value: (string)
              )
            )
            (return_statement
              (identifier) @ret
            )
          )
          (#eq? @var @ret)
        )

  - id: js-function-return-string
    desc: "func returning a (fragmentation)"
    crit: baseline
    # Migrated from a `(function_declaration body: (return_statement (string)))`
    # query (count_min: 10) to the cached `ast.string_return_function_count`
    # metric — counted inline in the single AST walk, O(1) match. 10+ such
    # decoder functions is the substitution-table obfuscation signal.
    if:
      type: metrics
      field: 'ast.string_return_function_count'
      min: 10
  - id: js-function-return-string-dense
    desc: Many JavaScript functions return string literals
    crit: notable
    # Same cached metric as `js-function-return-string`, at the higher
    # 30+ density threshold (was a `count_min: 30` tree-sitter query).
    if:
      type: metrics
      field: 'ast.string_return_function_count'
      min: 30

  - id: iife-string-literal-return
    desc: IIFE returns a string literal
    crit: baseline
    conf: 0.9
    size_max: 500000
    count_min: 3
    if:
      type: tree-sitter
      query: |
        (call_expression
          function: (function_expression
            body: (statement_block
              (return_statement
                (string) @string_literal
              )
            )
          )
        )
