defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: js-computed-property-call
    desc: Calls a property using bracket notation
    crit: notable
    conf: 0.82
    unless:
      - id: metadata/file/format::sourcemap
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_.$]{0,120}\s*\[[^\]\n]{1,120}\]\s*\('
  - id: js-computed-hidden-flag-call
    desc: Computed call with hidden flag
    crit: notable
    conf: 0.94
    for: [javascript]
    if:
      type: text
      regex: '\b\w+\[\w+\(["''][^"'']{1,40}["'']\)\]\s*\(\w+\s*,\s*0\s*,\s*false\s*\)'
  - id: js-decoded-false-flag-call
    desc: Decoded call with false flag
    crit: notable
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '\b\w+\[\w+\(["''][^"'']{1,40}["'']\)\]\s*\(\s*\w+\([^)]{1,80}\)\s*,\s*\w+\s*,\s*false\s*\)'
  - id: js-global-require-alias
    desc: Assigns require to computed global property
    crit: notable
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: 'global\s*\[.{1,80}\]\s*=\s*require\b'
