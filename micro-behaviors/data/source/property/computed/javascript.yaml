defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: js-new-this-bracket
    desc: Constructs object through this bracket property
    crit: notable
    conf: 0.9
    for: [javascript]
    if:
      type: tree-sitter
      language: javascript
      query: |
        (new_expression
          constructor: (subscript_expression
            object: (this)))
    unless:
      - id: micro-behaviors/data/archive/library::archiver
      - id: micro-behaviors/data/archive/library::zip-stream-entry-writer-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
      - id: well-known/app/dbcode::extension-context
  - id: js-this-bracket-access
    desc: Accesses a property on this via brackets
    crit: notable
    conf: 0.8
    for: [javascript]
    if:
      type: tree-sitter
      language: javascript
      query: |
        (subscript_expression
          object: (this))
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::copyright
  - id: js-computed-property-call
    desc: Calls a property using bracket notation
    crit: notable
    conf: 0.82
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/file/format::sourcemap
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_.$]{0,120}\s*\[[^\]\n]{1,120}\]\s*\('
  - id: js-computed-date-method-call
    desc: Calls a Date method through bracket notation
    crit: notable
    conf: 0.82
    for: [javascript]
    if:
      type: text
      regex: 'Date\s*\[[^\]]{1,80}\]\s*\('
    unless:
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
  - id: js-computed-hidden-flag-call
    desc: Computed call with hidden flag
    crit: notable
    conf: 0.94
    for: [javascript]
    if:
      type: text
      regex: '\b\w+\[\w+\(["''][^"'']{1,40}["'']\)\]\s*\(\w+\s*,\s*0\s*,\s*false\s*\)'
  - id: js-decoded-false-flag-call
    desc: Decoded call with false flag
    crit: notable
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '\b\w+\[\w+\(["''][^"'']{1,40}["'']\)\]\s*\(\s*\w+\([^)]{1,80}\)\s*,\s*\w+\s*,\s*false\s*\)'
  - id: js-global-require-alias
    desc: Assigns require to computed global property
    crit: notable
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: 'global\s*\[.{1,80}\]\s*=\s*require\b'
