defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
- id: host-user-object-fields
  desc: Host or user object field keys
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[,{]\s*)(host|user)\s*:'
- id: repository-object-fields
  desc: Repository identity object field keys
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[,{]\s*)(gname|gmail|repo)\s*:'
- id: machine-id-object-field
  desc: Machine identifier object field key
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[,{]\s*)mid\s*:'
- id: client-uuid-object-field
  desc: Client UUID object field key
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']?clientUuid["'']?\s*[:=]'
