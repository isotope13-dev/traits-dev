defaults:
  platforms:
    - unix
    - windows
  for:
    - java
    - class
traits:
  - id: java-bytecode-magic
    desc: Checks for "CAFEBABE" magic bytes manually
    crit: suspicious
    if:
      type: text
      word: CAFEBABE
  - id: java-class-file-parse
    desc: Manual Java .class file parsing method
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: parseClassFile
  - id: java-method-copy
    desc: Java bytecode method copy/injection
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: copyMethod
