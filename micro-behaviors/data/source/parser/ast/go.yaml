defaults:
  platforms: [windows, unix]
  for: [go]
  crit: notable
  conf: 0.86

traits:
  - id: go-parser-parse-dir
    desc: Parses Go package source directory
    conf: 0.9
    if:
      type: symbol
      exact: parser.ParseDir

  - id: go-parser-parse-file
    desc: Parses Go source file
    conf: 0.86
    if:
      type: symbol
      exact: parser.ParseFile

  - id: go-format-source
    desc: Formats generated Go source
    conf: 0.88
    if:
      type: symbol
      exact: format.Source

composite_rules:
  - id: go-source-parser
    desc: Go source parser
    crit: notable
    conf: 0.9
    any:
      - id: go-parser-parse-dir
      - id: go-parser-parse-file

  - id: go-output-file-writer
    desc: Go output file writer
    crit: notable
    conf: 0.86
    any:
      - id: micro-behaviors/fs/file/write/direct::os-write-file
      - id: micro-behaviors/fs/file/write/direct::ioutil-write-file

  - id: go-source-code-generator
    desc: Go source code generator
    crit: notable
    conf: 0.94
    all:
      - id: go-source-parser
      - id: go-format-source
      - id: go-output-file-writer
