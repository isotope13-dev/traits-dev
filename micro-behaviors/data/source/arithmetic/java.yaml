defaults:
  platforms: [unix, windows]
  for: [java, class, java_class, jar]
  crit: baseline
  conf: 0.84

traits:
  - id: java-math-sin-bytecode
    desc: JVM calls Math.sin
    if:
      type: import
      exact: java/lang/Math.sin

  - id: java-math-cos-bytecode
    desc: JVM calls Math.cos
    if:
      type: import
      exact: java/lang/Math.cos

  - id: java-math-tan-bytecode
    desc: JVM calls Math.tan
    if:
      type: import
      exact: java/lang/Math.tan
