defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
traits:
  - id: js-bitwise-arithmetic-chain
    desc: JavaScript bitwise arithmetic and shift chain
    crit: notable
    conf: 0.8
    size_max: 400000
    if:
      type: text
      regex: '[0-9]{2,}.{0,30}[&|^].{0,30}[0-9]{2,}.{0,30}(<<|>>).{0,30}[&|^]'

  - id: js-dense-math-pow
    desc: Dense repeated Math.pow arithmetic
    count_min: 8
    per_kb_min: 0.2
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/hardware/input/audio/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/lang/compiler/aot::huge-runtime-function-count
    if:
      type: text
      substr: Math.pow

  - id: js-math-pow-power-of-two-constants
    desc: Math.pow power-of-two constants
    count_min: 6
    per_kb_min: 0.2
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/hardware/input/audio/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: well-known/lib/apache-arrow
      - id: well-known/lib/protobuf-ts
    if:
      type: text
      regex: 'Math\.pow\s*\(\s*2\s*,\s*\d{2}\s*\)'

  - id: js-indexed-array-subtraction-loop
    desc: Indexed array subtraction loop
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/file/format::astro-template-basename
    if:
      type: tree-sitter
      language: javascript
      query: |
        (for_statement
          body: (statement_block
            (expression_statement
              (assignment_expression
                left: (subscript_expression)
                right: (binary_expression
                  left: (subscript_expression)
                  operator: "-"
                  right: (number)
                )
              )
            )
          )
        ) @transform_loop
