defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: drm-operation-complete-listener
    desc: Implements or imports DRMOperationCompleteListener
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: DRMOperationCompleteListener
      case_insensitive: true
  - id: drm-manager
    desc: Uses DRMManager
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (DRMManager|drmManager)
      case_insensitive: true
