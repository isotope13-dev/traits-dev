defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: js-path-split-single
    desc: Dot path splitting single quote
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: ".split('.')"
  - id: js-path-split-double
    desc: Dot path splitting double quote
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: '.split(".")'
  - id: js-dynamic-key-create
    desc: Dynamic property object creation
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: "\\[[\"'][A-Za-z_$][A-Za-z0-9_$]{1,16}[\"']\\]\\s*=\\s*\\{\\}"
  - id: js-proto-guard-proto
    desc: Quoted __proto__ key check
    crit: baseline
    conf: 0.9
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
    if:
      type: text
      regex: "[\"']__proto__[\"']"
  - id: js-proto-guard-constructor
    desc: Quoted constructor key check
    crit: baseline
    conf: 0.9
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
    if:
      type: text
      regex: "[\"']constructor[\"']"
  - id: js-proto-guard-prototype
    desc: Quoted prototype key check
    crit: baseline
    conf: 0.9
    unless:
      - id: metadata/file/text/format::sourcemap-sources-content
    if:
      type: text
      regex: "[\"']prototype[\"']"
composite_rules:
  - id: js-path-split
    desc: Dot path property traversal
    crit: baseline
    conf: 0.8
    any:
      - id: js-path-split-single
      - id: js-path-split-double
  - id: js-proto-pollution-guard
    desc: Prototype pollution guard present
    crit: baseline
    conf: 0.9
    any:
      - id: js-proto-guard-proto
      - id: js-proto-guard-constructor
      - id: js-proto-guard-prototype
