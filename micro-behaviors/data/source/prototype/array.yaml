defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: array-prototype-define-property
    desc: Defines a property on Array.prototype
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: 'Object\.defineProperty\s*\(\s*Array\.prototype\s*,'

  - id: array-prototype-freeze
    desc: Freezes Array.prototype
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: 'Object\.freeze\s*\(\s*Array\.prototype\s*\)'

  - id: array-push-property-name
    desc: Defines Array.prototype.push property
    crit: notable
    conf: 0.98
    if:
      type: symbol
      kind: call
      exact: Object.defineProperty
      arg:
        kind: string
        exact: push

  - id: array-push-undefined-value
    desc: Array.prototype push set to undefined
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'Array\.prototype[^;]{0,120}\bpush\b[^;]{0,120}\bundefined\b'

composite_rules:
  - id: array-push-disabled
    desc: Disables Array.prototype.push
    crit: suspicious
    conf: 0.99
    near_bytes: 256
    all:
      - id: array-prototype-define-property
      - id: array-push-property-name
      - id: array-push-undefined-value
