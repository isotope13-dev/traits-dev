defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: return-this-prototype
    desc: Prototype methods returning this
    crit: notable
    conf: 0.7
    count_min: 5
    if:
      type: text
      regex: 'prototype\.[A-Za-z0-9_$]+=function\(\)\{return this'
  - id: return-this-body
    desc: Function body returns this
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'function\s*\(\s*\)\s*\{[^}]{0,80}return\s+this\s*[;}]'

composite_rules:
  - id: return-this
    desc: Prototype function returns this
    crit: notable
    conf: 0.75
    all:
      - id: return-this-prototype
      - id: return-this-body
