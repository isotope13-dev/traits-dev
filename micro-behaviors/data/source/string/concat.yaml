defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
traits:
  - id: computed-property-single-quote-concat
    desc: Single-quoted computed property concatenation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '[\w$]+\s*\[\s*''[^'']{1,200}''\s*\+\s*''[^'']{1,200}''\s*\]'
    unless:
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
  - id: computed-property-double-quote-concat
    desc: Double-quoted computed property concatenation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '[\w$]+\s*\[\s*"[^"]{1,200}"\s*\+\s*"[^"]{1,200}"\s*\]'
  - id: computed-property-template-concat
    desc: Template-quoted computed property concatenation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '[\w$]+\s*\[\s*`[^`]{1,200}`\s*\+\s*`[^`]{1,200}`\s*\]'
  - id: js-bracket-string-concat
    desc: 'js bracket string concat'
    if:
      type: text
      regex: '\[\s*(["''][a-zA-Z]+["'']\s*\+\s*){2,}["''][a-zA-Z]+["'']\s*\]'
    unless:
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
  - id: js-string-fromcharcode-concat
    desc: 'js string fromcharcode concat'
    crit: suspicious
    if:
      type: text
      regex: '["'']f["'']\s*\+\s*["'']r["'']\s*\+\s*["'']o["'']\s*\+\s*["'']m["'']'
  - id: massive-string-concatenation
    desc: Many long string literals concatenated in source
    crit: notable
    conf: 0.9
    count_min: 10
    per_kb_min: 1.0
    if:
      type: text
      regex: "\\+\\s*['\"][^'\"]{20,}['\"]"
    not:
      - substr: "SQL command help data for `\\h`"
      - substr: "set psql variable NAME to VALUE"
      - substr: "pg_catalog.format_type("
  - id: js-string-append-cluster
    desc: JavaScript appends many string literals
    crit: notable
    conf: 0.92
    for: [javascript]
    count_min: 40
    per_kb_min: 1.0
    if:
      type: text
      substr: '+= "'
