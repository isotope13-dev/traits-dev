# Aliased stdlib imports (`import <module> as <name>`). Neutral source-structure
# observations — aliasing an import is normal Python. The evasive-aliasing
# obfuscation inference (multiple sensitive modules aliased together) lives in
# objectives/anti-static/obfuscation/aliasing/ and references this directory.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  conf: 0.6
traits:
  - id: alias-os
    desc: os imported under an alias
    if:
      type: symbol
      kind: import
      exact: 'os'
      alias: {}
  - id: alias-subprocess
    desc: subprocess imported under an alias
    if:
      type: symbol
      kind: import
      exact: 'subprocess'
      alias: {}
  - id: alias-platform
    desc: platform imported under an alias
    if:
      type: symbol
      kind: import
      exact: 'platform'
      alias: {}
  - id: alias-getpass
    desc: getpass imported under an alias
    if:
      type: symbol
      kind: import
      exact: 'getpass'
      alias: {}
  - id: alias-base64
    desc: base64 imported under an alias
    if:
      type: symbol
      kind: import
      exact: 'base64'
      alias: {}
  - id: alias-urllib
    desc: urllib imported under an alias
    if:
      type: symbol
      kind: import
      exact: 'urllib'
      alias: {}
