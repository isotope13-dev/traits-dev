defaults:
  platforms: [windows, unix]
  for: [go]
  crit: notable
  conf: 0.85

traits:
  - id: go-linkname-directive
    desc: Go linkname compiler directive
    if:
      type: text
      substr: "//go:linkname"

  - id: go-noescape-directive
    desc: Go noescape compiler directive
    conf: 0.75
    if:
      type: text
      substr: "//go:noescape"

  - id: go-embed-directive
    desc: Go embed compiler directive
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: "//go:embed"

  - id: go-cgo-directive-comment
    desc: Go cgo compiler directive
    if:
      type: text
      regex: '(?m)^//\s*#cgo\b'

  - id: go-blank-import
    desc: Go blank import declaration
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: '(?m)^\s*_\s+".{1,120}"'
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/presence/harness::go-tools-testdata-directory-path
      - id: metadata/lang/source::go-authors-bsd-header
      - id: well-known/lib/golang-x-tools/
