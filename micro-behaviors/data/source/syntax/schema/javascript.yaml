defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  # Schema field names alone do not prove that a program reads or sends host
  # information.  Keep this as a neutral source-level observation; exfiltration
  # objectives must supply collection and transport evidence separately.
  - id: host-system-metric-schema
    desc: 'Host recon fields: hostname, platform, arch'
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'hostname[\s\S]{0,300}(platform|kernel|uname)[\s\S]{0,300}(arch|network)'
