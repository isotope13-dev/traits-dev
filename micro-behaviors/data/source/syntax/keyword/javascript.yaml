defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: js-keyword-parseint
    desc: parseInt keyword
    if:
      type: string_value
      word: "parseInt"
  - id: js-keyword-fromcharcode
    desc: fromCharCode keyword
    if:
      type: string_value
      word: "fromCharCode"
  - id: js-keyword-xor
    desc: XOR bitwise operator in expression
    if:
      type: raw
      regex: '\w+\s*\^\s*\w+'
  - id: js-obfuscated-string-method
    desc: Obfuscated String method call (String[...])
    if:
      type: raw
      regex: 'String\s*\['
  - id: js-keyword-eval
    desc: eval function keyword
    crit: baseline
    conf: 0.7
    if:
      type: raw
      regex: '\\beval\\b'
  - id: js-keyword-function-constructor
    desc: Function constructor keyword
    crit: baseline
    conf: 0.7
    if:
      type: raw
      regex: '\\bFunction\\b'
  - id: js-keyword-atob
    desc: atob base64 decode function
    crit: baseline
    conf: 0.7
    if:
      type: raw
      word: "atob"
  - id: js-keyword-decodeuricomponent
    desc: decodeURIComponent function
    crit: baseline
    conf: 0.7
    if:
      type: raw
      regex: "decodeURIComponent"
