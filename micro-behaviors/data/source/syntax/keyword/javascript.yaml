defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: js-keyword-parseint
    desc: parseInt keyword
    if:
      type: string_literal
      word: parseInt
  - id: js-keyword-fromcharcode
    desc: fromCharCode keyword
    if:
      type: string_literal
      word: fromCharCode
  - id: js-keyword-xor
    desc: XOR bitwise operator in expression
    if:
      type: text
      regex: \w+\s*\^\s*\w+
  - id: js-obfuscated-string-method
    desc: Obfuscated String method call (String[...])
    if:
      type: text
      regex: String\s*\[
  - id: js-keyword-eval
    desc: eval function keyword
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: \\beval\\b
  - id: js-keyword-function-constructor
    desc: Function constructor keyword
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: Function
  - id: js-keyword-atob
    desc: atob base64 decode function
    crit: baseline
    conf: 0.7
    if:
      type: symbol
      exact: atob
  - id: js-keyword-decodeuricomponent
    desc: decodeURIComponent function
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: decodeURIComponent
