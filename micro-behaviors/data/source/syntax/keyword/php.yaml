defaults:
  platforms: [windows, unix]
  for: [php]

traits:
  - id: php-interface-or-abstract-class
    desc: PHP interface or abstract class declaration
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: '^(interface|abstract\s+class)\s+[A-Z]'

  # `new ClassName(` — instantiating an object via the `new` keyword. A neutral
  # OOP language construct present in almost all object-oriented PHP; it is NOT
  # process/command construction, so it lives here with the other PHP
  # source-syntax observations rather than under process/create.
  - id: php-object-instantiation
    desc: Instantiates a PHP object with `new`
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\bnew\s+[A-Z][A-Za-z0-9_\\]*\s*\('
