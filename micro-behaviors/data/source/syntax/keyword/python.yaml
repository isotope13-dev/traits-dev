defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: token-parameter-declaration
    desc: Python token parameter declaration
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'def\s+\w+\s*\(\s*self\s*,\s*token\b'

  - id: token-tuple-argument
    desc: Python token tuple argument
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'args\s*=\s*\(\s*token\s*,\s*\)'

  # Source-syntax capability: the code uses the bitwise XOR operator. Surfaced
  # as `notable` (a capability observed), not `suspicious` — a lone `^` also
  # appears in benign code (hashing, bit flags, checksums, permission masks), so
  # it signals capability, not intent. Real XOR encode/decode transforms
  # (byte-range genexprs, cyclic-key loops) live in micro-behaviors/data/encode/xor/.
  - id: py-keyword-xor
    desc: Python bitwise XOR operator
    crit: notable
    conf: 0.6
    if:
      # ast.op.xor density metric, counted inline in the single AST walk.
      type: metrics
      field: 'ast.op.xor'
      min: 1
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
