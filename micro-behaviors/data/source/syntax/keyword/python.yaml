defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  # Neutral source-syntax fact: the code uses the bitwise XOR operator.
  # A lone `^` appears throughout benign code (hashing, bit flags, checksums,
  # permission masks, simple ciphers), so this is a baseline capability, not
  # evidence of encoding. Real XOR encode/decode transforms (byte-range
  # genexprs, cyclic-key loops) live in micro-behaviors/data/encode/xor/.
  - id: py-keyword-xor
    desc: Python bitwise XOR operator
    crit: baseline
    conf: 0.6
    if:
      # ast.op.xor density metric, counted inline in the single AST walk.
      type: metrics
      field: 'ast.op.xor'
      min: 1
