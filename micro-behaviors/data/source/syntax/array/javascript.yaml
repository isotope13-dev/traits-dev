defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: temporary-array-element-read
    desc: Reads an array element into a variable
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\\b(var|let|const)\\s+\\w+\\s*=\\s*\\w+\\s*\\[\\s*\\w+\\s*\\]'

  - id: indexed-array-element-copy
    desc: Copies one indexed array element to another
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\\w+\\s*\\[\\s*\\w+\\s*\\]\\s*=\\s*\\w+\\s*\\[\\s*\\w+\\s*\\]'

  - id: array-literal-indexing
    desc: Immediate indexing of array literal
    crit: component
    conf: 0.8
    size_min: 1
    count_min: 2
    if:
      type: text
      regex: '\[\s*[^\]]{0,60},[^\]]{0,60}\]\s*\[\s*\d+\s*\]'

  - id: array-literal-this-indexing
    desc: Array literal indexing references this
    crit: component
    conf: 0.8
    size_min: 1
    if:
      type: text
      regex: '\[[^\]]{0,120}\bthis\b\s*[,\]][^\]]{0,120}\]\s*\[\s*\d+\s*\]'

  - id: js-array-sort-call
    desc: JavaScript array sort call
    crit: component
    conf: 0.72
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.sort\s*\('

  - id: js-array-empty-join-call
    desc: JavaScript array empty join call
    crit: component
    conf: 0.72
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.join\s*\(\s*["''][^"'']{0,2}["'']\s*\)'

  - id: computed-index-hex-array-access
    desc: Computed array access with hexadecimal offset
    crit: notable
    conf: 0.72
    count_min: 3
    if:
      type: text
      regex: '\w+\[\s*\w+\s*\+\s*0x[0-9a-fA-F]+\s*\]'
    unless:
      # Some C/C++ headers are heuristically identified as JavaScript. This
      # syntax is ordinary pointer arithmetic in those files.
      - type: path
        regex: '\.(c|cc|cpp|cxx|h|hh|hpp|hxx|inl|inc)$'
  - id: remote-url-array-literal
    desc: Array begins with remote URL literal
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\s*["'']https?:[\\/]{2}[^\s"'']{4,240}'
  - id: random-array-element-selection
    desc: Random array element selection
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Math\.floor\s*\(\s*Math\.random\(\)\s*\*\s*[A-Za-z_$][\w$]*\.length\s*\)'
  - id: js-indexed-array-element-combination
    desc: Combines values read from indexed array elements
    crit: notable
    conf: 0.75
    size_max: 30000000
    count_min: 10
    per_kb_min: 0.1
    if:
      type: text
      regex: '\b\w{2,}\s*\[\s*\d{1,3}\s*\]\s*\+\s*\w{2,}\s*\[\s*\d{1,3}\s*\]'
  - id: js-indexed-array-arithmetic-access
    desc: Array access with an arithmetic index
    crit: notable
    conf: 0.7
    count_min: 3
    if:
      type: text
      regex: '\b[A-Za-z_]\w{1,8}\s*\[\s*\d{1,2}\s*[-+]\s*\d{1,2}\s*\]'
