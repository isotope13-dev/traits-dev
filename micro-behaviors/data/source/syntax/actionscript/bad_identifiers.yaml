defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: obfuscated-identifier-section
    desc: ActionScript identifier containing section sign (obfuscation)
    crit: suspicious
    conf: 0.8
    mbc: B0032
    attack: T1027
    count_min: 2
    if:
      type: raw
      regex: "§[^\\x00]{1,100}§"
