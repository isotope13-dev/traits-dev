defaults:
  platforms: [windows, unix]
  for: [shell, python, javascript, powershell]
traits:
  - id: obfuscated-identifier-section
    desc: ActionScript identifier containing section sign (obfuscation)
    crit: suspicious
    conf: 0.8
    mbc: B0032
    attack: T1027
    count_min: 2
    if:
      type: text
      regex: "§[^\\x00]{1,100}§"
    unless:
      - type: text
        substr: "BSJB"
      - type: text
        regex: 'AElig.*Aacute.*Ccedil'
