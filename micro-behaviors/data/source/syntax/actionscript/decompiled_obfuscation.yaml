defaults:
  attack: T1027
  mbc: B0032
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: decompiled-push
    desc: Decompiled obfuscation artifact (push)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "§§push"
  - id: decompiled-pop
    desc: Decompiled obfuscation artifact (pop)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "§§pop"
  - id: decompiled-goto
    desc: Decompiled obfuscation artifact (goto)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "§§goto"
