defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
  conf: 0.85

traits:
  # Dunder-prefixed credential-related declarations. Each matcher is a
  # neutral source-code observation; attack intent belongs in composites that
  # combine it with install hooks or stealer-module evidence.
  - id: dunder-credential-decl-discord
    desc: Dunder Discord variable declaration
    if:
      type: text
      regex: '\b(var|let|const)\s+__\w*discord'
      case_insensitive: true
  - id: dunder-credential-decl-refresh-token
    desc: Dunder refresh-token variable declaration
    if:
      type: text
      regex: '\b(var|let|const)\s+__(\w*refresh\w*token|\w*token\w*refresh)'
      case_insensitive: true
  - id: dunder-credential-decl-session
    desc: Dunder session variable declaration
    if:
      type: text
      regex: '\b(var|let|const)\s+__\w*session'
      case_insensitive: true
  - id: dunder-credential-decl-bearer
    desc: Dunder bearer variable declaration
    if:
      type: text
      regex: '\b(var|let|const)\s+__\w*bearer'
      case_insensitive: true
  - id: dunder-credential-decl-github
    desc: Dunder GitHub variable declaration
    if:
      type: text
      regex: '\b(var|let|const)\s+__\w*github'
      case_insensitive: true
  - id: dunder-credential-decl-secret
    desc: Dunder secret variable declaration
    if:
      type: text
      regex: '\b(var|let|const)\s+__\w*secret'
      case_insensitive: true
  - id: dunder-credential-decl-token
    desc: Dunder token variable declaration
    if:
      type: text
      regex: '\b(var|let|const)\s+__\w*token'
      case_insensitive: true

  - id: global-dunder-credential-discord
    desc: Global dunder Discord property
    if:
      type: symbol
      regex: '^global(This)?\.__\w*discord'
  - id: global-dunder-credential-refresh-token
    desc: Global dunder refresh-token property
    if:
      type: symbol
      regex: '^global(This)?\.__(\w*refresh\w*token|\w*token\w*refresh)'
  - id: global-dunder-credential-session
    desc: Global dunder session property
    if:
      type: symbol
      regex: '^global(This)?\.__\w*session'
  - id: global-dunder-credential-bearer
    desc: Global dunder bearer property
    if:
      type: symbol
      regex: '^global(This)?\.__\w*bearer'
  - id: global-dunder-credential-github
    desc: Global dunder GitHub property
    if:
      type: symbol
      regex: '^global(This)?\.__\w*github'
  - id: global-dunder-credential-secret
    desc: Global dunder secret property
    if:
      type: symbol
      regex: '^global(This)?\.__\w*secret'

  - id: dunder-credential-assign-discord
    desc: Dunder Discord variable assignment
    if:
      type: text
      regex: '(^|[^\w.])__\w*discord\w*\s*='
      case_insensitive: true
  - id: dunder-credential-assign-refresh-token
    desc: Dunder refresh-token variable assignment
    if:
      type: text
      regex: '(^|[^\w.])__(\w*refresh\w*token|\w*token\w*refresh)\w*\s*='
      case_insensitive: true
  - id: dunder-credential-assign-session
    desc: Dunder session variable assignment
    if:
      type: text
      regex: '(^|[^\w.])__\w*session\w*\s*='
      case_insensitive: true
    not:
      - substr: __kalravExistingSession
  - id: dunder-credential-assign-bearer
    desc: Dunder bearer variable assignment
    if:
      type: text
      regex: '(^|[^\w.])__\w*bearer\w*\s*='
      case_insensitive: true
  - id: dunder-credential-assign-github
    desc: Dunder GitHub variable assignment
    if:
      type: text
      regex: '(^|[^\w.])__\w*github\w*\s*='
      case_insensitive: true
  - id: dunder-credential-assign-secret
    desc: Dunder secret variable assignment
    if:
      type: text
      regex: '(^|[^\w.])__\w*secret\w*\s*='
      case_insensitive: true
  - id: dunder-credential-assign-token
    desc: Dunder token variable assignment
    if:
      type: text
      regex: '(^|[^\w.])__\w*token\w*\s*='
      case_insensitive: true
    not:
      - regex: '\b__[A-Z0-9_]+__\s*='

composite_rules:
  - id: dunder-credential-variable-declaration
    desc: Declares dunder-prefixed credential variable
    crit: notable
    any:
      - id: dunder-credential-decl-discord
      - id: dunder-credential-decl-refresh-token
      - id: dunder-credential-decl-session
      - id: dunder-credential-decl-bearer
      - id: dunder-credential-decl-github
      - id: dunder-credential-decl-secret
      - id: dunder-credential-decl-token
  - id: global-dunder-credential-property
    desc: Accesses global dunder credential property
    crit: notable
    any:
      - id: global-dunder-credential-discord
      - id: global-dunder-credential-refresh-token
      - id: global-dunder-credential-session
      - id: global-dunder-credential-bearer
      - id: global-dunder-credential-github
      - id: global-dunder-credential-secret
  - id: dunder-credential-variable-assignment
    desc: Assigns dunder-prefixed credential variable
    crit: notable
    any:
      - id: dunder-credential-assign-discord
      - id: dunder-credential-assign-refresh-token
      - id: dunder-credential-assign-session
      - id: dunder-credential-assign-bearer
      - id: dunder-credential-assign-github
      - id: dunder-credential-assign-secret
      - id: dunder-credential-assign-token
