# Neutral references to named LLM assistants and coding agents. These markers
# identify content or integrations; remote-command intent requires additional
# objective-level action and control evidence.
defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, markdown, text, pkginfo, package.json, html]

traits:
  - id: agent-identity-ai-assistant
    desc: AI assistant identity reference
    crit: component
    conf: 0.8
    if:
      type: text
      case_insensitive: true
      substr: ai assistant
  - id: agent-identity-coding-agent
    desc: References the generic term "coding agent"
    crit: component
    conf: 0.8
    if:
      type: text
      case_insensitive: true
      substr: coding agent
  - id: agent-identity-chatgpt
    desc: ChatGPT identity reference
    crit: component
    conf: 0.8
    if:
      type: text
      case_insensitive: true
      substr: chatgpt
  - id: agent-identity-copilot
    desc: Copilot identity reference
    crit: component
    conf: 0.8
    if:
      type: text
      case_insensitive: true
      substr: copilot
  - id: agent-identity-claude
    desc: Claude agent identity reference
    crit: component
    conf: 0.8
    if:
      type: text
      case_insensitive: true
      regex: '\b(anthropic claude|claude (ai|agent|code))\b'
  - id: agent-identity-gemini
    desc: Gemini remote-tool identity reference
    crit: component
    conf: 0.8
    if:
      type: text
      case_insensitive: true
      regex: '\b(gemini\b[\s\S]{0,120}\b(remote|tool)\b|(remote|tool)\b[\s\S]{0,120}\bgemini)\b'
  - id: agent-identity-cursor
    desc: Cursor agent identity reference
    crit: component
    conf: 0.8
    if:
      type: text
      case_insensitive: true
      regex: '\b(cursor ai|cursor ide|cursor agent|cursor\.com)\b'

composite_rules:
  - id: agent-identity
    desc: Named LLM agent reference
    crit: component
    unless:
      - id: well-known/lib/dna-sdk/
      - id: well-known/tool/development/caprock/
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
    any:
      - id: agent-identity-ai-assistant
      - id: agent-identity-coding-agent
      - id: ai-agent-term-reference
      - id: agent-identity-chatgpt
      - id: agent-identity-copilot
      - id: agent-identity-claude
      - id: agent-identity-gemini
      - id: agent-identity-cursor
  - id: agent-identity-set
    desc: Contains multiple AI-agent terms or product names
    crit: notable
    conf: 0.9
    unless:
      - id: well-known/lib/dna-sdk/
      - id: well-known/tool/development/caprock/
      - id: metadata/library/syntaxhighlighter::prismjs-package-reference
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    any:
      - id: agent-identity-coding-agent
      - id: ai-agent-term-reference
      - id: agent-identity-chatgpt
      - id: agent-identity-copilot
      - id: agent-identity-claude
      - id: agent-identity-gemini
      - id: agent-identity-cursor
    needs: 2
