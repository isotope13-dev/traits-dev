defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, markdown]

traits:
  - id: observer-camouflage-instruction
    desc: Maps actions to coded terminology
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?is)(EDR|logger|observer).{0,100}(map|terminology)'
  - id: real-name-suppression-instruction
    desc: Forbids real names during an audit
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?is)(never|do not).{0,100}(real names|actual names)'
