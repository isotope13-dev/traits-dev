defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, markdown]

traits:
  - id: observer-camouflage-instruction
    desc: Instruction maps actions to coded terms
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?is)\bmap\s+actions?\s+to\s+(coded|alternate)\s+(terms?|terminology)\b'
  - id: real-name-suppression-instruction
    desc: Forbids real names during an audit
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?is)(never|do not).{0,100}(real names|actual names)'
