# Neutral LLM protocol and provider markers.  These describe message and
# configuration formats; attack intent requires a separate objective context.
defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, markdown]

traits:
  - id: tool-call-sequence-instruction
    desc: LLM tool-call sequence instruction
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'tool call sequence|Call the `[A-Za-z_]{1,40}` tool'
      case_insensitive: true

  - id: model-provider-field
    desc: LLM model provider field
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bmodel_providers?\b'

  - id: role-line-marker
    desc: LLM role label marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?im)^\\s*(system|developer|assistant)\\s*[:#>]"

  - id: system-role-marker
    desc: LLM system role marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\bsystem (prompt|role|instruction)\\b"

  - id: developer-role-marker
    desc: LLM developer role marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\bdeveloper (message|prompt|role|instruction)\\b"

  - id: assistant-role-marker
    desc: LLM assistant role marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\bassistant (message|prompt|role|instruction)\\b"

  - id: role-field-marker
    desc: LLM role field marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\brole\\s*[:=]\\s*['\"]?(system|developer|assistant)\\b"

  - id: instruction-marker-forward
    desc: System or developer prompt marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '\\b(system|developer)\\b[\\s\\S]{0,20}\\b(prompt|instruction)\\b'
      case_insensitive: true

  - id: instruction-marker-reverse
    desc: Prompt marker with system or developer role
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '\\b(prompt|instruction)\\b[\\s\\S]{0,20}\\b(system|developer)\\b'
      case_insensitive: true

  - id: assistant-identity-marker
    desc: LLM assistant identity marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\byou are (an? )?(ai|assistant|chatbot)\\b"

composite_rules:
  - id: instruction-marker
    desc: LLM prompt or instruction marker
    crit: component
    conf: 0.72
    any:
      - id: instruction-marker-forward
      - id: instruction-marker-reverse

  - id: role-marker
    desc: LLM role marker component
    crit: component
    conf: 0.72
    any:
      - id: role-line-marker
      - id: system-role-marker
      - id: developer-role-marker
      - id: assistant-role-marker
      - id: role-field-marker

  - id: prompt-marker
    desc: LLM prompt format marker
    crit: component
    conf: 0.72
    any:
      - id: role-marker
      - id: instruction-marker
      - id: assistant-identity-marker
