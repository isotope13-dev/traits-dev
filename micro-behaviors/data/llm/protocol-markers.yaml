# Neutral LLM protocol and provider markers.  These describe message and
# configuration formats; attack intent requires a separate objective context.
defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, ruby, markdown]

traits:
  - id: ai-agent-term-reference
    desc: References the phrase "AI agent"
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ai agent
      case_insensitive: true
    unless:
      - id: well-known/lib/dna-sdk/
      - id: well-known/tool/development/caprock/

  - id: jailbreak-term-reference
    desc: References LLM jailbreak terminology
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\b(jailbreak prompt|prompt jailbreak|LLM jailbreak|jailbreak AI)\b'
    unless:
      - type: basename
        regex: '(?i)^(english[_-]?words?|words?|dictionary)\.txt$'
      - id: metadata/file/format::adblock-filter-list
  - id: tool-call-sequence-instruction
    desc: LLM tool-call sequence instruction
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'tool call sequence|Call the `[A-Za-z_]{1,40}` tool'
      case_insensitive: true

  - id: model-provider-field
    desc: LLM model provider field
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bmodel_providers?\b'

  - id: role-line-marker
    desc: Quoted LLM role label
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '(?m)^\s*["'']?(system|developer|assistant)["'']?\s*[:#>]\s*["''`>]'

  - id: system-role-marker
    desc: LLM system-role value
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\bsystem (prompt|role|instruction)\\b"

  - id: developer-role-marker
    desc: LLM developer-role value
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\bdeveloper (message|prompt|role|instruction)\\b"

  - id: assistant-role-marker
    desc: LLM assistant-role value
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\bassistant (message|prompt|role|instruction)\\b"

  - id: role-field-marker
    desc: References an LLM message role field
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\brole\\s*[:=]\\s*['\"]?(system|developer|assistant)\\b"

  - id: instruction-marker-forward
    desc: System or developer prompt marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '\\b(system|developer)\\b[\\s\\S]{0,20}\\b(prompt|instruction)\\b'
      case_insensitive: true

  - id: instruction-marker-reverse
    desc: Prompt marker with system or developer role
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '\\b(prompt|instruction)\\b[\\s\\S]{0,20}\\b(system|developer)\\b'
      case_insensitive: true

  - id: assistant-identity-marker
    desc: LLM assistant identity marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\byou are (an? )?(ai|assistant|chatbot)\\b"

composite_rules:
  - id: instruction-marker
    desc: LLM prompt or instruction marker
    crit: component
    conf: 0.72
    any:
      - id: instruction-marker-forward
      - id: instruction-marker-reverse

  - id: role-marker
    desc: LLM role marker component
    crit: component
    conf: 0.72
    any:
      - id: role-line-marker
      - id: system-role-marker
      - id: developer-role-marker
      - id: assistant-role-marker
      - id: role-field-marker

  - id: prompt-marker
    desc: LLM prompt format marker
    crit: component
    conf: 0.72
    any:
      - id: role-marker
      - id: instruction-marker
      - id: assistant-identity-marker
