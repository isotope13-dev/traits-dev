# Neutral LLM response-format instruction.
# A request for machine-readable JSON is common in ordinary API integrations;
# it becomes suspicious only when combined with an abuse-specific prompt.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, python, markdown]

traits:
  - id: json-only-response-instruction
    desc: LLM response constrained to JSON
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      substr: Return JSON only
