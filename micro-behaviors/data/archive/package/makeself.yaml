defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: makeself-archive-context
    desc: "makeself self-extract archive script context"
    crit: component
    conf: 0.95
    for: [shell]
    if:
      type: text
      regex: '(?i)\bmakeself(\.sh|-header)?\b|self-extract(ing|able)? archive'
