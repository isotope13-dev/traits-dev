defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: archiver
    desc: NodeJS binary using 'archiver' library
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: node_modules.{0,30}archiver/index.js
  - id: zip-stream-entry-writer-bundle
    desc: zip-stream entry writer bundle
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: onWriteEntry
