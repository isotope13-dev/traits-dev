defaults:
  platforms: [windows, unix]
  for: [zip]
traits:
  - id: zipcrypto-encrypted-entry
    desc: ZIP entry uses classic password flag
    crit: notable
    conf: 0.9
    if:
      type: yara
      source: |
        rule zipcrypto_encrypted_entry {
          strings:
            $a = { 50 4B 03 04 ?? ?? 01 00 }
            $b = { 50 4B 03 04 ?? ?? 09 00 }
          condition:
            any of them
        }
  - id: zipcrypto-many-encrypted-entries
    desc: ZIP has many encrypted payload entries
    crit: component
    conf: 0.94
    count_min: 5
    if:
      type: hex
      pattern: "50 4B 03 04 14 00 09 00 08 00"
  - id: zipcrypto-few-encrypted-entries
    desc: ZIP has few encrypted entries
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: archive.security.encrypted_count
      min: 2
      max: 4
  - id: pyzipper-aes
    desc: Create AES encrypted ZIP using pyzipper
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      substr: pyzipper.AESZipFile
  - id: pyzipper-setpassword
    desc: Set password for pyzipper archive
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      substr: .setpassword(
