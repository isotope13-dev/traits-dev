defaults:
  platforms: [windows, unix]
  for: [data]
traits:
  - id: zipcrypto-encrypted-entry
    desc: ZIP entry uses classic password flag
    crit: notable
    conf: 0.9
    if:
      type: yara
      source: |
        rule zipcrypto_encrypted_entry {
          strings:
            $a = { 50 4B 03 04 ?? ?? 01 00 }
            $b = { 50 4B 03 04 ?? ?? 09 00 }
          condition:
            any of them
        }
  - id: zipcrypto-many-encrypted-entries
    desc: ZIP has many encrypted payload entries
    crit: suspicious
    conf: 0.94
    if:
      type: yara
      source: |
        rule zipcrypto_many_encrypted_entries {
          strings:
            $a = { 50 4B 03 04 ?? ?? 09 00 }
          condition:
            #a >= 5
        }
  - id: pyzipper-aes
    desc: Create AES encrypted ZIP using pyzipper
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      substr: pyzipper.AESZipFile
  - id: pyzipper-setpassword
    desc: Set password for pyzipper archive
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: text
      substr: .setpassword(
