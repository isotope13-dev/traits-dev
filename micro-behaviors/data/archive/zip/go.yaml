# Go ZIP library operations
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [go, elf, macho, pe]
traits:
  - id: zip-writer
    desc: "Go zip.NewWriter usage"
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: string
      substr: "archive/zip"
  - id: zip-create
    desc: "Go ZIP entry creation"
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: "z.Create"
