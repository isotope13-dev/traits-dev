defaults:
  platforms: [windows, unix]
  for: [go, binaries]
traits:
  - id: zip-writer
    desc: Go zip.NewWriter usage
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: text
      substr: zip.NewWriter
  - id: zip-reader
    desc: Go zip.OpenReader usage
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      exact: zip.OpenReader
  - id: zip-create
    desc: Go ZIP entry creation
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: z.Create
  - id: archive-zip-import
    desc: Go archive/zip package reference
    crit: component
    conf: 0.82
    if:
      type: text
      substr: archive/zip
