defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: miniz-zip-writer-api
    desc: miniz ZIP archive writer API
    crit: notable
    conf: 0.85
    for: [binaries, c, cpp, rust, go]
    if:
      type: text
      regex: \bmz_zip_writer_(init|add|finalize)
  - id: generic-dup
    desc: Function to handle ZIP creation
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: handleZipCreation
