defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: zip-cli-create
    desc: Shell creates ZIP with zip command
    crit: notable
    conf: 0.9
    for: [shell, python, javascript]
    if:
      type: text
      regex: 'zip\s+-[rX]'
  # Neutral archive-content observation (a text member is in countless benign
  # zips). Relocated here from metadata/package/files (which was at its 80-trait
  # cap); the luajit-zip-lure composites reference it cross-directory as one leg
  # of a much stronger combination (LuaJIT launcher + obfuscated payload + txt).
  - id: archive-text-payload-member
    desc: Archive contains a text payload member
    crit: component
    conf: 0.82
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '[A-Za-z0-9_.-]{1,64}\.(txt|log|lua|dat)$'
  - id: miniz-zip-writer-api
    desc: miniz ZIP archive writer API
    crit: notable
    conf: 0.85
    for: [binaries, c, cpp, rust, go, wasm]
    if:
      type: text
      regex: \bmz_zip_writer_(init|add|finalize)
  - id: generic-dup
    desc: Function to handle ZIP creation
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: handleZipCreation
