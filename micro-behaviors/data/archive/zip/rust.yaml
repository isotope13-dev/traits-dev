defaults:
  platforms: [unix, windows]
  for: [rust]

traits:
  - id: rust-zipbomb-type
    desc: Rust ZIP-bomb type marker
    crit: component
    conf: 0.97
    if:
      type: text
      word: ZipBomb
  - id: rust-recursive-zip-type
    desc: Rust recursive ZIP-bomb type
    crit: component
    conf: 0.97
    if:
      type: text
      word: RecursiveZipBomb
  - id: rust-recursive-zip-function
    desc: Rust recursive ZIP function
    crit: component
    conf: 0.97
    if:
      type: text
      word: generate_recursive_base_zip
  - id: rust-nested-zip-function
    desc: Rust nested ZIP function
    crit: component
    conf: 0.97
    if:
      type: text
      word: write_nested_zip_file

composite_rules:
  - id: rust-zip-bomb-type
    desc: Rust ZIP-bomb type family
    crit: component
    conf: 0.97
    any:
      - id: rust-zipbomb-type
      - id: rust-recursive-zip-type
  - id: rust-recursive-zip-builder
    desc: Rust recursive ZIP builder marker
    crit: component
    conf: 0.97
    any:
      - id: rust-recursive-zip-function
      - id: rust-nested-zip-function
  - id: rust-recursive-zip-bomb-generation
    desc: Generates recursive ZIP-bomb data
    crit: suspicious
    conf: 0.97
    all:
      - id: rust-zip-bomb-type
      - id: rust-recursive-zip-builder
    near_lines: 40
