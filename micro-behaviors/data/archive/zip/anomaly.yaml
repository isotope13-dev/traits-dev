# ZIP Archive Anomalies
defaults:
  platforms: [windows]
  for: [python, javascript, powershell, pe]
traits:
  - id: zip-cd-header
    for: [pe, python, powershell]
    desc: "ZIP Central Directory header"
    crit: baseline
    conf: 1.0
    if:
      type: raw
      exact: "PK\x01\x02"
composite_rules:
  - id: embedded-zip-local-only-pe
    desc: Embedded ZIP local headers without central directory
    crit: suspicious
    conf: 0.9
    size_min: 200000
    all:
      - id: micro-behaviors/data/embedded/payload/archive::zip-magic-multiple-pe
    unless:
      - id: zip-cd-header
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/library/compression/
        - id: micro-behaviors/data/archive/zip::zip-writer
        - id: metadata/binary/installer/family/
        - id: metadata/binary/installer/script/
        - id: metadata/binary/metrics/structural::many-imports
