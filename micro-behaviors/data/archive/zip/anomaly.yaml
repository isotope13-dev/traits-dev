# ZIP Archive Anomalies
defaults:
  for: [all]
traits:
  - id: zip-cd-header
    desc: "ZIP Central Directory header"
    crit: baseline
    conf: 1.0
    if:
      type: raw
      exact: "PK\x01\x02"
composite_rules:
  - id: embedded-zip-local-only-pe
    desc: Embedded ZIP local headers without central directory
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    size_min: 200000
    all:
      - id: micro-behaviors/data/embedded/payload::zip-magic-multiple-pe
    unless:
      - id: zip-cd-header
