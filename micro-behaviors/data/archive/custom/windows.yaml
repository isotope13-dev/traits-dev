defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.9

traits:
- id: bndl-magic
  desc: BNDL custom archive marker
  if:
    type: text
    exact: BNDL
- id: bndl-executable-member
  desc: BNDL archive contains an executable member
  crit: notable
  conf: 0.95
  if:
    type: raw
    regex: '(?is)BNDL.{0,96}\.exe\b'
- id: launcher-exe-member
  desc: Launcher.exe archive member name
  conf: 0.75
  if:
    type: text
    exact: Launcher.exe
- id: madium-launcher-exe-member
  desc: Madium launcher archive member
  conf: 0.97
  if:
    type: text
    exact: Madium-Launcher.exe

composite_rules:
- id: bndl-exe-archive
  desc: BNDL archive with executable member
  crit: notable
  conf: 0.9
  all:
  - id: bndl-magic
  - id: bndl-executable-member
- id: bndl-two-exe-archive
  desc: BNDL archive with executable members
  crit: notable
  conf: 0.95
  all:
  - id: bndl-magic
  - id: launcher-exe-member
  - id: madium-launcher-exe-member
