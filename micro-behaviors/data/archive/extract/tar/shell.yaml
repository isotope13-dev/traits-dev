defaults:
  platforms: [unix, windows]
  for: [shell, batch, powershell]
  attack: T1560.001
traits:
  - id: tar-extract
    desc: tar extraction command usage
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\btar\s+-[a-zA-Z]*x[a-zA-Z]*f[a-zA-Z]*\s+\S+'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/archlinux-kernel::versioned-lts-kernel-repackage-pkgbuild
  - id: tar-gzip-extract
    desc: tar gzip extraction command usage
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\btar\s+-[a-zA-Z]*x[a-zA-Z]*z[a-zA-Z]*f[a-zA-Z]*\s+\S+'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: extract-and-chmod
    desc: Extracts an archive and makes a resulting file executable
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-local-file
    any:
      - id: tar-extract
      - id: tar-gzip-extract
      - id: micro-behaviors/data/archive/extract/zip::unzip-extraction
