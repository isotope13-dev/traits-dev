defaults:
  platforms: [unix, windows]
  for: [shell, batch, powershell]
  attack: T1560.001
traits:
  - id: tar-extract
    desc: tar extraction command usage
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\btar\s+-[a-zA-Z]*x[a-zA-Z]*f[a-zA-Z]*\s+\S+'
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-kernel-repackage-pkgbuild
  - id: tar-gzip-extract
    desc: tar gzip extraction command usage
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\btar\s+-[a-zA-Z]*x[a-zA-Z]*z[a-zA-Z]*f[a-zA-Z]*\s+\S+'
