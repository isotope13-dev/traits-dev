defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1560.001

traits:
  - id: tar-extract-word
    desc: Tar archive extraction reference
    crit: notable
    conf: 0.72
    if:
      type: string_literal
      substr: tar extract
    not:
      - substr: tar extract failed
      - substr: tar extract over SSH failed
    unless:
      - type: text
        substr: SSH remote execution environment
      - id: metadata/package/testing/presence/harness::python-test-file
