defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1560.001

traits:
  - id: python-tarfile-open
    desc: Python opens tar archive
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: tarfile.open

  - id: tar-temp-archive-command
    desc: Python tar extracts temporary archive
    crit: notable
    conf: 0.86
    if:
      type: literal
      regex: 'tar\s+x.{0,80}(temp|tmp).{0,15}\.(tar|zip|gz)'

composite_rules:
  - id: python-tarfile-extractall
    desc: Python extracts tar archive
    crit: notable
    conf: 0.95
    all:
      - id: python-tarfile-open
      - id: micro-behaviors/data/archive/extract/capability::python-extractall-call
