defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1560.001

traits:
  - id: python-tarfile-open
    desc: Python opens tar archive
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: tarfile.open

  - id: tar-extract-word
    desc: Tar archive extraction reference
    crit: notable
    conf: 0.72
    if:
      type: string_literal
      substr: tar extract
    not:
      - substr: tar extract failed
      - substr: tar extract over SSH failed
    unless:
      - type: text
        substr: SSH remote execution environment
      - id: metadata/package/testing/presence/harness::python-test-file

composite_rules:
  - id: python-tarfile-extractall
    desc: Python extracts tar archive
    crit: notable
    conf: 0.95
    all:
      - id: python-tarfile-open
      - id: micro-behaviors/data/archive/extract/capability::python-extractall-call
