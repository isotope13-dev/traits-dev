defaults:
  platforms: [unix, windows]
  for: [scripts]

traits:
  - id: appimage-self-extract-command
    desc: AppImage self-extraction command
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '[A-Za-z0-9_${}./-]+\.AppImage\b[^\n]{0,60}--appimage-extract\b'

  - id: python-extractall-call
    desc: Python archive extractall call
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: symbol
      regex: '(^|\.)extractall$'

composite_rules:
  - id: archive-extraction-context
    desc: References archive extraction mechanics
    crit: component
    conf: 0.75
    any:
      - id: micro-behaviors/data/archive/extension::zip-extension
      - id: micro-behaviors/data/archive/extension::tar-extension
      - id: micro-behaviors/data/archive/format::application-zip-mime
      - id: micro-behaviors/data/archive/extract/zip::adm-zip-extract-all-to
      - id: micro-behaviors/data/archive/extract/zip::unzip-tool-reference
  - id: archive-extraction-capability
    desc: Uses multiple archive extraction mechanisms
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: micro-behaviors/data/archive/extract/tar::tar-extract-word
      - id: micro-behaviors/data/archive/extract/tar::tar-extract
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class
      - id: micro-behaviors/data/archive/extract/zip::python-unzip-temp-archive-command
