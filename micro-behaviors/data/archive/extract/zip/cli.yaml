defaults:
  platforms: [unix]
  for: [shell, javascript, typescript]
traits:
- id: unzip-quiet-dir
  desc: unzip quietly into directory
  crit: notable
  conf: 0.85
  for: [shell]
  if:
    type: text
    regex: unzip\s+-q.{0,40}-d

- id: node-unzip-cli-call
  desc: Node invokes unzip into a directory
  crit: notable
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    regex: 'execFile[A-Za-z0-9_$]*\s*\(\s*["'']unzip["'']\s*,\s*\['
