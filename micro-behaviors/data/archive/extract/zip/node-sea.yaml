# Node SEA archive extraction primitives
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1140

traits:
  - id: node-sea-zip-reader
    desc: Opens ZIP and writes entries
    crit: notable
    conf: 0.97
    if:
      type: raw
      regex: 'new [A-Za-z_$][A-Za-z0-9_$]*\.ZipReader\([\s\S]{0,800}writeFile\('

  - id: node-sea-passworded-zip
    desc: Passworded ZIP reader
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: 'ZipReader\([^)]{0,180}password\s*:'
