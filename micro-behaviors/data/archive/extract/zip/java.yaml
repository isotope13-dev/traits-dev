defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]

traits:
  - id: jvm-zip-entry-iteration-bytecode
    desc: JVM iterates ZIP archive entries
    crit: notable
    conf: 0.92
    if:
      type: import
      exact: java/util/zip/ZipInputStream.getNextEntry

  - id: jvm-zip-entry-read-bytecode
    desc: JVM reads ZIP archive entry data
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: java/util/zip/ZipInputStream.read

composite_rules:
  - id: jvm-zip-entry-extraction-to-file
    desc: JVM extracts ZIP entries to files
    crit: notable
    conf: 0.96
    all:
      - id: jvm-zip-entry-iteration-bytecode
      - id: jvm-zip-entry-read-bytecode
      - id: micro-behaviors/fs/write/file/direct::jvm-fileoutputstream-bytecode
