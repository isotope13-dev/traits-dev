defaults:
  platforms: [unix, windows]
  for: [shell, macho]
  attack: T1105
  mbc: E1105
traits:
- id: unzip-command
  desc: unzip extraction command
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: '\bunzip\b\s+-[A-Za-z]*o\b'
- id: powershell-expand-archive
  desc: References PowerShell Expand-Archive cmdlet
  crit: notable
  conf: 0.85
  platforms: [windows]
  for: [powershell, javascript, python, pe]
  if:
    type: text
    word: Expand-Archive
- id: unzip-archive-to-directory--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\bunzip\b[^\n]{0,180}\s-d\s*["'']?[^"''\n]{0,180}'
  count_max: 1013628
- id: unzip-archive-to-directory--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\bunzip\b[^\n]{0,160}\.zip\b[^\n]{0,180}\s-d\s*["'']?[^"''\n]{1,180}'
  count_max: 1013629
composite_rules:
- id: unzip-extraction
  desc: unzip archive extraction
  crit: notable
  conf: 0.86
  any:
  - id: unzip-command
  - id: unzip-archive-to-directory
- id: unzip-archive-to-directory
  desc: unzip extracts archive to directory
  crit: notable
  conf: 0.86
  any:
  - id: unzip-archive-to-directory--rx-1
  - id: unzip-archive-to-directory--rx-2
