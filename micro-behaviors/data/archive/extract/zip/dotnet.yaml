defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: zipfile-class
    desc: .NET ZipFile class reference
    crit: component
    conf: 0.8
    if:
      type: text
      exact: System.IO.Compression.ZipFile
  - id: extract-to-directory
    desc: ZIP extraction to directory
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: ExtractToDirectory
  - id: ziparchive-entry
    desc: .NET ZIP archive entry reference
    crit: component
    conf: 0.82
    if:
      type: text
      exact: ZipArchiveEntry
  - id: extract-to-file
    desc: .NET ZIP entry extraction to file
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: ExtractToFile
composite_rules:
  - id: dotnet-zip-extract
    desc: .NET ZIP extraction routine
    crit: notable
    conf: 0.9
    all:
      - id: zipfile-class
      - id: extract-to-directory
  - id: dotnet-zip-entry-extract
    desc: .NET extracts ZIP entries to files
    crit: notable
    conf: 0.9
    all:
      - id: ziparchive-entry
      - id: extract-to-file
