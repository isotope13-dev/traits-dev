defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: zipfile-class
    desc: .NET ZipFile class reference
    crit: component
    conf: 0.8
    if:
      type: text
      exact: System.IO.Compression.ZipFile
  - id: extract-to-directory
    desc: ZIP extraction to directory
    crit: component
    conf: 0.88
    if:
      type: text
      exact: ExtractToDirectory
composite_rules:
  - id: dotnet-zip-extract
    desc: .NET ZIP extraction routine
    crit: notable
    conf: 0.9
    all:
      - id: zipfile-class
      - id: extract-to-directory
