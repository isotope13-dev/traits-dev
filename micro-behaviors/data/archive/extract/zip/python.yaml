defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1105
traits:
  - id: python-zipfile-class
    desc: Python ZipFile class reference
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: zipfile.ZipFile
  - id: python-zip-extractall-call
    desc: Python ZIP extractall call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      substr: ".extractall"
composite_rules:
  - id: python-zipfile-extractall
    desc: Python ZIP archive extraction
    crit: notable
    conf: 0.92
    all:
      - id: python-zipfile-class
    any:
      - id: python-zip-extractall-call
