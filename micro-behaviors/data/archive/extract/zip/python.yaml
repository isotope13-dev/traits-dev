defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1105
traits:
  - id: python-zipfile-class
    desc: Python ZipFile class reference
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: zipfile.ZipFile
  - id: python-native-extension-archive-extraction
    desc: Python extracts native extension from ZIP
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'zipfile\.ZipFile[\s\S]{0,520}base\.startswith\(\s*["'']_native\.'
  - id: python-unzip-temp-archive-command
    desc: Python embeds temporary unzip command
    crit: notable
    conf: 0.9
    if:
      type: literal
      regex: '\bunzip\s+.{0,80}(temp|tmp)\.zip\b'
composite_rules:
  - id: python-zipfile-extractall
    desc: Python ZIP archive extraction
    crit: notable
    conf: 0.92
    all:
      - id: python-zipfile-class
    any:
      - id: micro-behaviors/data/archive/extract/capability::python-extractall-call
