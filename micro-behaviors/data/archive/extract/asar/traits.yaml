defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]

traits:
  - id: asar-extract
    desc: Extracts an Electron ASAR archive
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)\basar(\.(cmd|exe))?["''\s:=-]{0,20}(extract|unpack)\b'

  - id: asar-computed-property-access
    desc: ASAR object uses computed property access
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\basar\s*\['

composite_rules:
  - id: computed-asar-method-call
    desc: Computed ASAR API call
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: asar-computed-property-access
      - id: micro-behaviors/data/source/property/computed::js-computed-property-call
    near_bytes: 128
