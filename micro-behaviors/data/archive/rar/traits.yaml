defaults:
  platforms: [windows]
  for: [data, rar]

traits:
  - id: ads-parent-traversal
    desc: RAR member ADS parent traversal
    crit: component
    conf: 0.95
    count_min: 1
    if:
      type: hex
      pattern: "3A 2E 2E 5C 2E 2E 5C"

  - id: repeated-ads-parent-traversal
    desc: RAR member repeats parent traversal
    crit: component
    conf: 0.95
    count_min: 4
    if:
      type: hex
      pattern: "2E 2E 5C"

  - id: startup-member-path
    desc: RAR member targets Startup folder
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Start Menu\\Programs\\(\.\.\\Programs\\){0,4}Startup'

  - id: lnk-member-extension
    desc: RAR member contains shortcut extension
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: ".lnk"

  - id: wsh-script-member-extension
    desc: RAR member contains WSH script
    crit: component
    conf: 0.9
    unless:
      - id: metadata/signed/platform::web-extension-manifest
    if:
      type: text
      regex: '\.(vbs|js|jse)([^A-Za-z0-9]|$)'

  - id: shell-script-member-extension
    desc: RAR member contains shell script
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.(bat|cmd|ps1)'

  - id: scan-pdf-member-name
    desc: RAR member uses scan PDF lure
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)Scan_[0-9_.-]{6,40}\.pdf'

  - id: search-connector-member-extension
    desc: RAR member contains Search Connector
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?i)\.searchConnector-ms\b'

  - id: document-lure-search-connector-member
    desc: RAR Search Connector document lure
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?i)(important|document)[^/\\]{0,64}\.searchConnector-ms\b'

  - id: programdata-member-paths
    desc: RAR members target ProgramData
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      substr: "ProgramData"

  - id: gta5-mod-menu-root
    desc: RAR member GTA5 mod root
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "GTA5_Mod_Menu/"

  - id: gta5-mod-menu-setup-exe
    desc: RAR member GTA5 setup executable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "GTA5_Mod_Menu/setup.exe"

  - id: gta5-mod-menu-code-tunnel
    desc: RAR member VS Code tunnel executable
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "GTA5_Mod_Menu/bin/code-tunnel.exe"

  - id: gta5-mod-menu-code-cmd
    desc: RAR member VS Code command launcher
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "GTA5_Mod_Menu/bin/code.cmd"

  - id: gta5-mod-menu-steam-resources
    desc: RAR member Steam overlay resources
    crit: component
    conf: 0.86
    count_min: 3
    if:
      type: text
      substr: "GTA5_Mod_Menu/resource/steam"
