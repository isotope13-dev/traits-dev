# Neutral observations: code/text references an archive file extension.
# An archive filename or extension on its own carries no intent — installers,
# build recipes, and updaters all reference .tar.gz/.zip names. These atoms are
# building blocks; intent comes from the composites that combine them with a
# remote URL + execution (dropper) or multi-arch discovery context.
traits:
  - id: tar-gz
    desc: References a .tar.gz archive filename
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    platforms: [linux, macos, windows]
    if:
      type: string_literal
      substr: .tar.gz
  - id: tar-gz-or-zip-text
    desc: References a .tar.gz or .zip archive
    crit: component
    conf: 0.9
    for: [shell]
    platforms: [unix, android, ios]
    if:
      type: text
      regex: '\b(tar\.gz|\.zip)\b'
  - id: zip-extension
    desc: References a .zip archive extension
    crit: component
    conf: 0.4
    for: [javascript, typescript, scripts, binaries]
    platforms: [linux, macos, windows]
    if:
      type: string_literal
      exact: .zip
  - id: tar-extension
    desc: References a .tar archive extension
    crit: component
    conf: 0.4
    for: [javascript, typescript, scripts, binaries]
    platforms: [linux, macos, windows]
    if:
      type: string_literal
      exact: .tar
  - id: sevenzip-extension
    desc: References a .7z archive extension
    crit: component
    conf: 0.4
    for: [javascript, typescript, scripts, binaries]
    platforms: [linux, macos, windows]
    if:
      type: string_literal
      exact: .7z
  - id: rar-extension
    desc: References a .rar archive extension
    crit: component
    conf: 0.4
    for: [javascript, typescript, scripts, binaries]
    platforms: [linux, macos, windows]
    if:
      type: string_literal
      exact: .rar

composite_rules:
  - id: archive-extension-reference
    desc: References a compressed archive extension
    crit: component
    conf: 0.8
    for: [scripts, binaries]
    platforms: [linux, macos, windows, unix, android, ios]
    any:
      - id: tar-gz
      - id: tar-gz-or-zip-text
      - id: zip-extension
      - id: tar-extension
      - id: sevenzip-extension
      - id: rar-extension
