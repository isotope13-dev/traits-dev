# Neutral observations: code/text references an archive file extension.
# An archive filename or extension on its own carries no intent — installers,
# build recipes, and updaters all reference .tar.gz/.zip names. These atoms are
# building blocks; intent comes from the composites that combine them with a
# remote URL + execution (dropper) or multi-arch discovery context.
traits:
  - id: tar-gz
    desc: Tar.gz archive filename reference
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    platforms: [linux, macos, windows]
    if:
      type: string_literal
      substr: .tar.gz
  - id: tar-gz-or-zip-text
    desc: Tar.gz or zip archive extension in text
    crit: component
    conf: 0.9
    for: [shell]
    platforms: [unix, android, ios]
    if:
      type: text
      regex: '\b(tar\.gz|\.zip)\b'
  - id: sevenzip
    desc: 7z archive file extension reference
    crit: component
    conf: 0.4
    for: [javascript, typescript]
    platforms: [windows, unix]
    if:
      type: string_literal
      exact: .7z
    unless:
      - id: objectives/command-and-control/dropper/staging/archive::file-explorer-binary-extension-list
      - id: well-known/lib/mime-db::javascript-mime-extension-map
  - id: rar
    desc: RAR archive file extension reference
    crit: component
    conf: 0.4
    for: [javascript, typescript]
    platforms: [windows, unix]
    if:
      type: string_literal
      exact: .rar
    unless:
      - id: objectives/command-and-control/dropper/staging/archive::file-explorer-binary-extension-list
