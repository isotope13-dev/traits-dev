defaults:
  platforms: [unix, windows]
  for: [shell, python, javascript, elf]
  crit: notable
  conf: 0.6
  attack: T1560

traits:
  - id: selinux-archive-header
    desc: GNU tar SELinux extended-header keyword
    crit: notable
    conf: 0.9
    for: [scripts, binaries, elf]
    if:
      type: text
      substr: RHT.security.selinux
  - id: tar-create
    desc: Creates a tar archive
    if:
      type: text
      regex: '(^|[\n;&|({\[=:])\s*tar\s+-[A-Za-z]*c'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: tar-create-bundled-options
    desc: Creates tar archive with bundled options
    conf: 0.85
    if:
      type: literal
      kind: string
      regex: '^tar\s+c[A-Za-z]*f\s'
  - id: tar-from-file-list
    desc: Creates tar archive from file-list input
    conf: 0.85
    if:
      type: text
      regex: '(^|[\n;&|({\[=:"''`])\s*tar[ \t]+-[A-Za-z]*T([ \t]|$)'
