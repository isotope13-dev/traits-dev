defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: json-dumps
    desc: Python json.dumps() serialization
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: json.dumps
  - id: json-dump
    desc: Python json.dump() stream serialization
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: json.dump
  - id: marshal-dumps
    desc: Python marshal.dumps serialization
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: marshal.dumps
