defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: json-dumps
    desc: Python json.dumps() serialization
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: json.dumps
  - id: json-dump
    desc: Serializes to a stream with json.dump()
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: json.dump
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: marshal-dumps
    desc: Python marshal.dumps serialization
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: marshal.dumps
