# Neutral .NET object-serialization capability markers. A bare namespace
# reference is a capability, not a vulnerability — System.Runtime.Serialization
# hosts safe serializers (DataContractSerializer, ISerializable infrastructure)
# as well as the unsafe BinaryFormatter. The genuinely-dangerous deserialization
# sinks (BinaryFormatter.Deserialize, etc.) live in
# micro-behaviors/data/serialize/unsafe/, which composites reference for the
# risky verdict; this file only records that managed serialization is present.
defaults:
  platforms:
    - unix
    - windows
  for:
    - pe
    - csharp
traits:
  - id: runtime-serialization-namespace
    desc: "System.Runtime.serialization namespace ref"
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: System.Runtime.Serialization
