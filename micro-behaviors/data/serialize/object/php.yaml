defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - php
traits:
  - id: json-encode
    desc: JSON encoding for data output
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: json_encode
  - id: json-decode
    desc: JSON decoding for data input
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: json_decode
  - id: serialize
    desc: PHP object serialization
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: \bserialize\s*\(
  - id: unserialize
    desc: PHP object deserialization call
    crit: notable
    conf: 0.65
    mbc: E1059
    attack: T1059
    if:
      type: text
      regex: \bunserialize\s*\(
  - id: error-suppressed-unserialize
    desc: Error-suppressed unserialize call
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '@\s*unserialize\s*\('
  - id: unserialize-get
    desc: unserialize from $_GET
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: unserialize\s*\(.{0,50}\$_GET
  - id: unserialize-post
    desc: unserialize from $_POST
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: unserialize\s*\(.{0,50}\$_POST
  - id: unserialize-request
    desc: unserialize from $_REQUEST
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: unserialize\s*\(.{0,50}\$_REQUEST
  - id: unserialize-cookie
    desc: unserialize from $_COOKIE
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: unserialize\s*\(.{0,50}\$_COOKIE
composite_rules:
  - id: unserialize-user-input
    desc: Deserialization of user input
    crit: suspicious
    conf: 0.95
    mbc: E1059
    attack: T1059
    any:
      - id: unserialize-get
      - id: unserialize-post
      - id: unserialize-request
      - id: unserialize-cookie
  - id: remote-unserialize
    desc: Deserialization of remote HTTP data
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/client::file-get-contents-url
    any:
      - id: unserialize
      - id: error-suppressed-unserialize
