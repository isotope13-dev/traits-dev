defaults:
  platforms: [windows, unix]
  for:
    - php
traits:
  - id: json-encode
    desc: JSON encoding for data output
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: json_encode
  - id: json-decode
    desc: JSON decoding for data input
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: json_decode
  - id: serialize-symbol
    desc: References PHP serialize() or a serialize method
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: serialize
  - id: unserialize
    desc: PHP object deserialization call
    crit: notable
    conf: 0.65
    mbc: E1059
    attack: T1059
    if:
      type: symbol
      kind: call
      exact: unserialize
  - id: error-suppressed-unserialize
    desc: Error-suppressed unserialize call
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '@\s*unserialize\s*\('
    # WP core probes "is this value serialized?" via @unserialize($v) —
    # a standard defensive idiom there, not payload staging.
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: well-known/tool/development/wp-cli::wp-cli-phar
  - id: unserialize-get
    desc: unserialize from $_GET
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: unserialize\s*\(.{0,50}\$_GET
  - id: unserialize-post
    desc: unserialize from $_POST
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: unserialize\s*\(.{0,50}\$_POST
  - id: unserialize-request
    desc: unserialize from $_REQUEST
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: unserialize\s*\(.{0,50}\$_REQUEST
  - id: unserialize-cookie
    desc: unserialize from $_COOKIE
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: unserialize\s*\(.{0,50}\$_COOKIE
    unless:
      - id: unserialize-allowed-classes-disabled
  - id: unserialize-allowed-classes-disabled
    desc: unserialize disables object instantiation
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "unserialize\\s*\\([^)]{0,160}['\"]allowed_classes['\"]\\s*=>\\s*false"
composite_rules:
  - id: unserialize-user-input
    desc: Deserialization of user input
    crit: suspicious
    conf: 0.95
    mbc: E1059
    attack: T1059
    any:
      - id: unserialize-get
      - id: unserialize-post
      - id: unserialize-request
      - id: unserialize-cookie
  - id: remote-unserialize
    desc: Deserialization of remote HTTP data
    crit: suspicious
    conf: 0.96
    # Co-occurrence in the same large PHP file is not dataflow: remote template
    # downloads and local option unserialization are often unrelated.
    near_lines: 80
    all:
      - id: micro-behaviors/communications/http/client/file-read::file-get-contents-url
    any:
      - id: unserialize
      - id: error-suppressed-unserialize
    unless:
      - id: well-known/tool/development/wp-cli::wp-cli-phar
      - id: well-known/app/wordpress-plugins/
      - id: unserialize-allowed-classes-disabled
