# PHP Data Serialization Traits
# MBC: C0026 (Encode Data)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
traits:
  - id: json-encode
    desc: JSON encoding for data output
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: json_encode
  - id: json-decode
    desc: JSON decoding for data input
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: json_decode
  - id: serialize
    desc: PHP object serialization
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "\\bserialize\\s*\\("
  - id: unserialize
    desc: PHP object deserialization (potential RCE
    crit: suspicious
    conf: 0.9
    mbc: "E1059"
    attack: "T1059"
    if:
      type: string_value
      regex: "\\bunserialize\\s*\\("
  # === unserialize user input atomic indicators ===
  - id: unserialize-get
    desc: unserialize from $_GET
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "unserialize\\s*\\(.{0,50}\\$_GET"
  - id: unserialize-post
    desc: unserialize from $_POST
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "unserialize\\s*\\(.{0,50}\\$_POST"
  - id: unserialize-request
    desc: unserialize from $_REQUEST
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "unserialize\\s*\\(.{0,50}\\$_REQUEST"
  - id: unserialize-cookie
    desc: unserialize from $_COOKIE
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      regex: "unserialize\\s*\\(.{0,50}\\$_COOKIE"
composite_rules:
  - id: unserialize-user-input
    desc: Deserialization of user input
    crit: suspicious
    conf: 0.95
    mbc: "E1059"
    attack: "T1059"
    any:
      - id: unserialize-get
      - id: unserialize-post
      - id: unserialize-request
      - id: unserialize-cookie
