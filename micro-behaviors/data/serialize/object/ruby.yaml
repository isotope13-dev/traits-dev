# Ruby Data Serialization Traits
# Neutral capability-level serialization signals
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: json-generate
    desc: Ruby JSON serialization call
    crit: baseline
    conf: 0.75
    for: [ruby]
    if:
      type: text
      regex: 'JSON\.generate|\.to_json'
