defaults:
  platforms: [unix, windows]
  for: [java, class]
  crit: notable
  conf: 0.88

traits:
  - id: java-objectinputstream-import
    desc: Java ObjectInputStream import
    if:
      type: symbol
      kind: import
      exact: java.io.ObjectInputStream
  - id: java-objectinputstream-ctor
    desc: Java ObjectInputStream construction
    if:
      type: symbol
      kind: call
      regex: '(^|\.)ObjectInputStream$'
  - id: java-readobject-call
    desc: Java readObject deserialization call
    if:
      type: symbol
      kind: call
      exact: readObject
