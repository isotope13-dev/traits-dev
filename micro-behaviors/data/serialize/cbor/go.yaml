# CBOR (Concise Binary Object Representation, RFC 8949) serialization in Go.
# CBOR is a compact binary format used legitimately by IoT/embedded systems and
# also by C2 malware (emp3r0r, Merlin) to minimize wire footprint and obscure
# field names relative to JSON. The `keyasint` form replaces string field names
# with integer keys, making captured traffic non-human-readable.
defaults:
  platforms: [linux, macos, windows]
  for: [go]

traits:
  - id: keyasint-tag
    desc: CBOR keyasint integer field keys
    crit: notable
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: 'cbor:"\d+,keyasint"'
