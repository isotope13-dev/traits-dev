defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: javascript-yaml-load
    desc: JavaScript parses YAML with yaml.load
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\byaml\.load\s*\('

  - id: javascript-yaml-dump
    desc: JavaScript serializes data with yaml.dump
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\byaml\.dump\s*\('
