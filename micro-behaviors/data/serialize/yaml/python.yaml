defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: yaml-load-call
    desc: "Python yaml.load call"
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: '\byaml\.load\s*\('
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/detection/security-scanner::code-pattern-catalog
  - id: yaml-loader-unsafe
    desc: 'yaml loader unsafe'
    crit: notable
    if:
      type: text
      regex: 'Loader\s*=\s*yaml\.Loader'
  - id: yaml-unsafe-load
    desc: "Explicit unsafe YAML deserialization"
    crit: notable
    if:
      type: text
      regex: 'yaml\.unsafe_load\s*\('
