defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: yaml-load-call
    desc: "Python yaml.load call"
    crit: component
    if:
      type: symbol
      kind: call
      exact: "yaml.load"
  - id: yaml-safe-loader-member
    desc: "PyYAML SafeLoader reference"
    crit: component
    if:
      type: tree-sitter
      query: |
        [
          (
            class_definition
              superclasses: (argument_list
                (attribute
                  object: (identifier) @loader_module
                  attribute: (identifier) @loader_name))
            (#eq? @loader_module "yaml")
            (#match? @loader_name "^C?SafeLoader$")
          )
          (
            keyword_argument
              name: (identifier) @kw
              value: (attribute
                object: (identifier) @loader_module
                attribute: (identifier) @loader_name)
            (#eq? @kw "Loader")
            (#eq? @loader_module "yaml")
            (#match? @loader_name "^C?SafeLoader$")
          )
        ]
  - id: yaml-loader-unsafe
    desc: "Unsafe yaml.Loader enabling arbitrary code execution"
    crit: notable
    if:
      type: text
      regex: 'Loader\s*=\s*yaml\.Loader'
  - id: yaml-unsafe-load
    desc: "Explicit unsafe YAML deserialization"
    crit: notable
    if:
      type: text
      regex: 'yaml\.unsafe_load\s*\('

composite_rules:
  - id: yaml-load-unsafe
    desc: "Unsafe YAML deserialization using yaml.load"
    crit: notable
    all:
      - id: yaml-load-call
    unless:
      - id: yaml-safe-loader-member
