defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: yaml-load-call
    desc: "Python yaml.load call"
    crit: component
    if:
      type: symbol
      kind: call
      exact: "yaml.load"
  - id: yaml-safe-loader-member
    desc: "PyYAML SafeLoader reference"
    crit: component
    if:
      # Migrated from a tree-sitter query to a lenient `type: text`
      # match (no per-member cursor walk). Approximates the query's
      # structural intent via its distinctive token(s).
      type: text
      regex: 'C?SafeLoader'
  - id: yaml-loader-unsafe
    desc: 'yaml loader unsafe'
    crit: notable
    if:
      type: text
      regex: 'Loader\s*=\s*yaml\.Loader'
  - id: yaml-unsafe-load
    desc: "Explicit unsafe YAML deserialization"
    crit: notable
    if:
      type: text
      regex: 'yaml\.unsafe_load\s*\('

composite_rules:
  - id: yaml-load-unsafe
    desc: "Unsafe YAML deserialization using yaml.load"
    crit: notable
    all:
      - id: yaml-load-call
    unless:
      - id: yaml-safe-loader-member
