defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: yaml-load-call
    desc: "Python yaml.load call"
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: "yaml.load"
  - id: yaml-loader-unsafe
    desc: 'yaml loader unsafe'
    crit: notable
    if:
      type: text
      regex: 'Loader\s*=\s*yaml\.Loader'
  - id: yaml-unsafe-load
    desc: "Explicit unsafe YAML deserialization"
    crit: notable
    if:
      type: text
      regex: 'yaml\.unsafe_load\s*\('
