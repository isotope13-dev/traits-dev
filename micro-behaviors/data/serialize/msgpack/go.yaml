defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.88
  mbc: C0032

traits:
  - id: go-msgpack-import
    desc: Go msgpack package import
    conf: 0.86
    if:
      type: text
      substr: "github.com/vmihailenco/msgpack"
  - id: go-msgpack-new-decoder
    desc: Go msgpack decoder creation
    conf: 0.9
    if:
      type: text
      regex: '\bmsgpack\.NewDecoder\s*\('
  - id: go-msgpack-new-encoder
    desc: Go msgpack encoder creation
    conf: 0.9
    if:
      type: text
      regex: '\bmsgpack\.NewEncoder\s*\('
  - id: go-msgpack-marshal
    desc: Go msgpack marshal call
    conf: 0.88
    if:
      type: text
      regex: '\bmsgpack\.(Marshal|Unmarshal)\s*\('

composite_rules:
  - id: go-msgpack-serialization
    desc: Go msgpack serialization
    conf: 0.92
    all:
      - id: go-msgpack-import
    any:
      - id: go-msgpack-new-decoder
      - id: go-msgpack-new-encoder
      - id: go-msgpack-marshal
