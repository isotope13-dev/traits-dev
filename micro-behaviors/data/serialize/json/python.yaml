# Python JSON Deserialization
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: json-loads-call
    desc: Python json.loads call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "json.loads"
  - id: json-loads-pyc-name
    desc: loads name in Python bytecode
    crit: component
    conf: 0.82
    for: [pyc]
    if:
      type: text
      substr: loads
  - id: json-load-call
    desc: Python json.load call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "json.load"
  - id: json-dumps-call
    desc: Python json.dumps call
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "json.dumps"
  - id: json-dumps-pyc-name
    desc: json.dumps name in Python bytecode
    crit: baseline
    conf: 0.82
    for: [pyc]
    if:
      type: text
      substr: dumps
  - id: response-json-gating-not
    desc: Negative JSON response gate
    crit: component
    conf: 0.8
    if:
      type: text
      regex: if\s+not\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
  - id: response-json-gating-positive
    desc: Positive JSON response gate
    crit: component
    conf: 0.75
    if:
      type: text
      regex: if\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
