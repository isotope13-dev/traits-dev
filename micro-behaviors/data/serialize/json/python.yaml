# Python JSON Deserialization
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: json-loads-call
    desc: Python json.loads call
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: "json.loads"
  - id: json-load-call
    desc: Python json.load call
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: "json.load"
  - id: response-json-gating-not
    desc: Negative JSON response gate
    crit: component
    conf: 0.8
    if:
      type: text
      regex: if\s+not\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
  - id: response-json-gating-positive
    desc: Positive JSON response gate
    crit: component
    conf: 0.75
    if:
      type: text
      regex: if\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
