# Python JSON Deserialization
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: json-loads-call
    desc: Python json.loads call
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: "json.loads"
  - id: json-load-call
    desc: Python json.load call
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      substr: "json.load"
