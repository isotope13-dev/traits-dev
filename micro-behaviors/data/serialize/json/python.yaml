# Python JSON Deserialization
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: json-loads-call
    desc: Parses JSON data with Python
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "json.loads"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: json-loads-pyc-name
    desc: loads name in Python bytecode
    crit: component
    conf: 0.82
    for: [pyc]
    if:
      type: text
      substr: loads
  - id: json-load-call
    desc: Python json.load call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "json.load"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: json-dumps-call
    desc: Serializes data with Python json.dumps()
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "json.dumps"
  - id: mapping-get-action-key
    desc: Python mapping reads the literal "action" key
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '^\w+\.get$'
      arg:
        kind: string
        exact: action
  - id: mapping-get-code-key
    desc: Python mapping reads the literal "code" key
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '^\w+\.get$'
      arg:
        kind: string
        exact: code
  - id: python-environ-json
    desc: Python serializes entire environment to JSON
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'json\.(dumps|dump)\s*\(\s*(dict\s*\(\s*)?os\.environ(\s*\))?\s*[,)]'
  - id: python-env-json-value
    desc: Python serializes environment value to JSON
    crit: notable
    conf: 0.92
    if:
      type: tree-sitter
      kind: call
      regex: '(?s)^json\.dumps?\(.{0,512}os\.(getenv|environ\.get)\s*\('
  - id: json-dumps-pyc-name
    desc: json.dumps name in Python bytecode
    crit: baseline
    conf: 0.82
    for: [pyc]
    if:
      type: text
      substr: dumps
  - id: response-json-gating-not
    desc: Negative JSON response gate
    crit: component
    conf: 0.8
    if:
      type: text
      regex: if\s+not\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
  - id: response-json-gating-positive
    desc: Positive JSON response gate
    crit: component
    conf: 0.75
    if:
      type: text
      regex: if\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
