defaults:
  platforms: [macos, ios]
  for: [macho, swift, objc]
  crit: baseline

traits:
  - id: nsjsonserialization-class
    desc: NSJSONSerialization class reference
    conf: 0.75
    if:
      type: symbol
      exact: 'OBJC_CLASS_$_NSJSONSerialization'
  - id: swift-dictionary-objc-bridge
    desc: Swift Dictionary bridged to NSDictionary
    conf: 0.65
    if:
      type: symbol
      substr: 'FoundationE19_bridgeToObjectiveCSo12NSDictionary'

composite_rules:
  - id: swift-json-object-serialization
    desc: Swift JSON object serialization
    crit: notable
    conf: 0.82
    all:
      - id: nsjsonserialization-class
      - id: swift-dictionary-objc-bridge
