defaults:
  platforms: [macos, ios]
  for: [macho, swift, objc]
  crit: baseline

traits:
  - id: nsjsonserialization-class
    desc: NSJSONSerialization class reference
    conf: 0.75
    if:
      type: symbol
      exact: 'OBJC_CLASS_$_NSJSONSerialization'
  - id: swift-dictionary-objc-bridge
    desc: Swift Dictionary bridged to NSDictionary
    conf: 0.65
    if:
      type: symbol
      substr: 'FoundationE19_bridgeToObjectiveCSo12NSDictionary'
  - id: nsjsonserialization-text
    desc: ObjC JSON serialization API reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: NSJSONSerialization
  - id: swift-jsonserialization-data
    desc: Swift serializes JSON data
    crit: notable
    conf: 0.9
    for: [swift]
    if:
      type: symbol
      kind: call
      exact: JSONSerialization.data

composite_rules:
  - id: swift-json-object-serialization
    desc: Swift JSON object serialization
    crit: notable
    conf: 0.82
    all:
      - id: nsjsonserialization-class
      - id: swift-dictionary-objc-bridge
