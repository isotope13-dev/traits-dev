defaults:
  platforms:
    - unix
    - windows
  for:
    - pe
    - dll
    - csharp
  crit: baseline
  conf: 0.85

traits:
  - id: json-newtonsoft
    desc: "Newtonsoft.Json serialization library ref"
    if:
      type: text
      substr: Newtonsoft.Json

  - id: json-system
    desc: System.Text.Json library reference
    if:
      type: text
      substr: System.Text.Json

  - id: json-polymorphic-attribute
    desc: .NET JsonPolymorphic attribute reference
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: JsonPolymorphicAttribute

  - id: json-polymorphic-resolver
    desc: .NET polymorphic resolver reference
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: PolymorphicTypeResolver

composite_rules:
  - id: json-polymorphism-runtime
    desc: .NET JSON polymorphism support
    crit: notable
    conf: 0.86
    any:
      - id: json-polymorphic-attribute
      - id: json-polymorphic-resolver
