defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
  conf: 0.9

traits:
  - id: ruby-json-parse-call
    desc: Ruby parses JSON data
    if:
      type: text
      regex: '\bJSON\.parse\s*\('
  - id: ruby-json-pretty-generate
    desc: Ruby serializes formatted JSON
    if:
      type: text
      regex: '\bJSON\.pretty_generate\s*\('
