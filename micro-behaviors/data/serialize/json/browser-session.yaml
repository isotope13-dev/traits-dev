defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: notable
  conf: 0.96

traits:
  - id: browser-session-state-json-fields
    desc: Browser session state JSON fields
    if:
      type: text
      regex: '"(cookies|local_storage|session_storage|tls_profile|auth_status)"'
    count_min: 4
    unless:
      - type: text
        substr: 'BrowserSession'
      - type: text
        substr: '_cdp_get_cookies'
