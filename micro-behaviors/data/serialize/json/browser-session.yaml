defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: notable
  conf: 0.96

traits:
  - id: browser-session-cookies-field
    desc: Browser session cookies field
    crit: component
    if:
      type: text
      exact: '"cookies"'
  - id: browser-session-local-storage-field
    desc: Browser session local-storage field
    crit: component
    if:
      type: text
      exact: '"local_storage"'
  - id: browser-session-session-storage-field
    desc: Browser session storage field
    crit: component
    if:
      type: text
      exact: '"session_storage"'
  - id: browser-session-tls-profile-field
    desc: Browser session TLS-profile field
    crit: component
    if:
      type: text
      exact: '"tls_profile"'
  - id: browser-session-auth-status-field
    desc: Browser session auth-status field
    crit: component
    if:
      type: text
      exact: '"auth_status"'
  - id: cdp-cookie-helper-context
    desc: CDP cookie helper context
    crit: component
    if:
      type: text
      substr: _cdp_get_cookies

composite_rules:
  - id: browser-session-state-json-fields
    desc: Multiple browser session state fields
    crit: notable
    conf: 0.96
    needs: 4
    any:
      - id: browser-session-cookies-field
      - id: browser-session-local-storage-field
      - id: browser-session-session-storage-field
      - id: browser-session-tls-profile-field
      - id: browser-session-auth-status-field
    unless:
      - id: metadata/library/automation::python-browser-session-reference
      - id: cdp-cookie-helper-context
