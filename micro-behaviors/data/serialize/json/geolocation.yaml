defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: component
  conf: 0.5

traits:
  - id: country-code-camel
    desc: countryCode data field
    if:
      type: text
      word: countryCode
    unless:
      - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: country-code-snake
    desc: country_code data field
    if:
      type: text
      word: country_code
    unless:
      - id: well-known/app/google-web::official-google-web-asset
      - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: country-name
    desc: country_name data field
    if:
      type: text
      word: country_name
