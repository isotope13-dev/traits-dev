defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  crit: baseline
traits:
  - id: process-env-json-stringify
    desc: JSON.stringify serializes process.env
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @obj
            property: (property_identifier) @prop)
          arguments: (arguments
            (member_expression
              object: (identifier) @src
              property: (property_identifier) @field))
        (#eq? @obj "JSON")
        (#eq? @prop "stringify")
        (#eq? @src "process")
        (#eq? @field "env"))
  - id: json-stringify-local-storage
    desc: JSON-serializes localStorage state
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: JSON.stringify
      arg:
        kind: identifier
        name: localStorage
  - id: json-stringify-session-storage
    desc: JSON-serializes sessionStorage state
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: JSON.stringify
      arg:
        kind: identifier
        name: sessionStorage
  - id: json-stringify-call
    desc: Calls JSON.stringify()
    conf: 0.5
    if:
      type: symbol
      exact: JSON.stringify
  - id: json-parse-call
    desc: Calls JSON.parse()
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: JSON.parse
  - id: object-keys-call
    desc: Object.keys call
    conf: 0.5
    count_min: 3
    if:
      type: string_literal
      substr: Object.keys
  - id: object-entries-call
    desc: Object.entries call
    conf: 0.5
    if:
      type: string_literal
      substr: Object.entries
  - id: refresh-token-field-stringify
    desc: JSON serialization includes refresh-token field
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)JSON\.stringify\([\s\S]{0,120}refreshToken'
  - id: screenshot-data-stringify
    desc: Serializes screenshot data as JSON
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'JSON\.stringify\(\{\s*screenshots\s*:'
