defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  crit: baseline
traits:
  - id: json-stringify-call
    desc: JSON.stringify call
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: JSON.stringify
  - id: json-parse-call
    desc: JSON.parse call
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: JSON.parse
  - id: object-keys-call
    desc: Object.keys call
    conf: 0.5
    count_min: 3
    if:
      type: string_value
      substr: Object.keys
  - id: object-entries-call
    desc: Object.entries call
    conf: 0.5
    if:
      type: string_value
      substr: Object.entries
