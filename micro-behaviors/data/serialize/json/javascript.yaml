defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  crit: baseline
traits:
  - id: payload-user-field
    desc: Payload contains a user field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bpayload\s*=\s*\{[\s\S]{0,700}\buser\s*:'

  - id: payload-quiz-content-field
    desc: Payload contains quiz content field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bpayload\s*=\s*\{[\s\S]{0,700}\b(quiz|question|pageContent)\s*:'

  - id: payload-timestamp-field
    desc: Payload contains a timestamp field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bpayload\s*=\s*\{[\s\S]{0,700}\btimestamp\s*:'

  - id: json-stringify-payload-call
    desc: Serializes a payload object as JSON
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: JSON.stringify
      arg:
        kind: identifier
        name: payload

  - id: js-payload-object-assignment
    desc: Assigns an object to a payload variable
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\bpayload\s*=\s*\{'
  - id: process-env-json-stringify
    desc: JSON.stringify serializes process.env
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @obj
            property: (property_identifier) @prop)
          arguments: (arguments
            (member_expression
              object: (identifier) @src
              property: (property_identifier) @field))
        (#eq? @obj "JSON")
        (#eq? @prop "stringify")
        (#eq? @src "process")
        (#eq? @field "env"))
  - id: json-stringify-local-storage
    desc: JSON-serializes localStorage state
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: JSON.stringify
      arg:
        kind: identifier
        name: localStorage
  - id: json-stringify-session-storage
    desc: JSON-serializes sessionStorage state
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: JSON.stringify
      arg:
        kind: identifier
        name: sessionStorage
  - id: json-stringify-call
    desc: Calls JSON.stringify()
    conf: 0.5
    if:
      type: symbol
      exact: JSON.stringify
  - id: json-parse-call
    desc: Calls JSON.parse()
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: JSON.parse
  - id: object-keys-call
    desc: Object.keys call
    conf: 0.5
    count_min: 3
    if:
      type: string_literal
      substr: Object.keys
  - id: object-entries-call
    desc: Object.entries call
    conf: 0.5
    if:
      type: string_literal
      substr: Object.entries
  - id: refresh-token-field-stringify
    desc: JSON serialization includes refresh-token field
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)JSON\.stringify\([\s\S]{0,120}refreshToken'
  - id: screenshot-data-stringify
    desc: Serializes screenshot data as JSON
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'JSON\.stringify\(\{\s*screenshots\s*:'

composite_rules:
  - id: json-user-content-timestamp-payload
    desc: Serializes user content with timestamp payload
    crit: notable
    conf: 0.94
    near_bytes: 1800
    all:
      - id: payload-user-field
      - id: payload-quiz-content-field
      - id: payload-timestamp-field
      - id: json-stringify-payload-call
