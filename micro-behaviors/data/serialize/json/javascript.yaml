defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  crit: baseline
traits:
  - id: json-stringify-call
    desc: JSON.stringify call
    conf: 0.5
    if:
      type: symbol
      exact: JSON.stringify
  - id: json-parse-call
    desc: JSON.parse call
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: JSON.parse
  - id: object-keys-call
    desc: Object.keys call
    conf: 0.5
    count_min: 3
    if:
      type: string_literal
      substr: Object.keys
  - id: object-entries-call
    desc: Object.entries call
    conf: 0.5
    if:
      type: string_literal
      substr: Object.entries
  - id: refresh-token-field-stringify
    desc: JSON serialization includes refresh-token field
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)JSON\.stringify\([\s\S]{0,120}refreshToken'
