# JSON Operations — JavaScript
# Neutral JSON serialization/deserialization APIs
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  crit: baseline
traits:
  - id: json-stringify-call
    desc: JSON.stringify call
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: "JSON.stringify"
  - id: json-parse-call
    desc: JSON.parse call
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: "JSON.parse"
