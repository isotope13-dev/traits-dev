defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  crit: baseline
  conf: 0.85
  mbc: C0032
traits:
  - id: go-json-marshal
    desc: Go JSON marshal call
    if:
      type: symbol
      exact: json.Marshal
  - id: go-json-unmarshal
    desc: Go JSON unmarshal call
    crit: notable
    if:
      type: symbol
      exact: json.Unmarshal
  - id: encoding-json-import
    desc: encoding/json package import
    crit: component
    conf: 0.5
    if:
      type: text
      substr: encoding/json
