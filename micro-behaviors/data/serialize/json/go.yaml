defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  crit: baseline
  conf: 0.85
  mbc: C0032
traits:
  - id: go-json-marshal
    desc: Go JSON marshal call
    if:
      type: symbol
      exact: json.Marshal
  - id: go-json-unmarshal
    desc: Go JSON unmarshal call
    if:
      type: symbol
      exact: json.Unmarshal
