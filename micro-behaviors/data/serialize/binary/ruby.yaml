defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
  conf: 0.9
  mbc: C0032

traits:
  - id: dense-pack-unpack-calls
    desc: Dense Ruby binary packing calls
    conf: 0.9
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: \.(pack|unpack)\s*\(\s*['"][A-Za-z0-9\*]{1,4}['"]
    unless:
      - type: text
        regex: '(?i)cbor'
