# Python Serialization
# Detects usage of Python serialization modules (marshal, pickle, etc.)
# MBC: C0038 (Serialize Data)
# ATT&CK: T1505 (Server Software Component)
defaults:
  platforms: [windows, unix]
  crit: notable
  for: [python]
  mbc: "C0038"
traits:
  # === Marshal Module ===
  - id: import-marshal
    desc: Imports marshal module
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: "marshal"
  - id: marshal-loads-symbol
    desc: marshal.loads symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "marshal.loads"
  - id: marshal-loads-dynamic
    desc: marshal.loads dynamic import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "import__('marshal').loads"
  - id: marshal-load
    desc: Calls marshal.load
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "marshal.load"
  # === Pickle Module ===
  - id: import-pickle
    desc: Imports Python's pickle serialization module
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: "pickle"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: pickle-loads
    desc: Calls pickle.loads
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: "pickle.loads"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/detection/security-scanner::code-pattern-catalog
  - id: pickle-load
    desc: Loads an object with pickle.load()
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: "pickle.load"
    unless:
      - id: well-known/tool/detection/security-scanner::code-pattern-catalog
  - id: pandas-read-pickle
    desc: Loads a pandas pickle file
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "pnd.read_pickle"
  - id: torch-load
    desc: Loads a PyTorch checkpoint
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "torch.load"
composite_rules:
  - id: marshal-loads
    desc: Calls marshal.loads
    crit: notable
    conf: 0.9
    any:
      - id: marshal-loads-symbol
      - id: marshal-loads-dynamic
  - id: marshal-deserialization
    desc: Marshal deserialization
    crit: notable
    conf: 0.95
    any:
      - id: marshal-loads
      - id: marshal-load
  - id: pickle-deserialization
    desc: Deserializes data using Python pickle
    crit: suspicious
    conf: 0.95
    any:
      - id: pickle-loads
      - id: pickle-load
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
    downgrade:
      any:
        - id: metadata/import/python::mercurial
