defaults:
  platforms:
    - unix
    - windows
  for:
    - pe
    - csharp
traits:
  - id: xml-serializer
    desc: .NET XML serialization capability
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: XmlSerializer|System\.Xml\.Serialization
    unless:
      - id: metadata/lang/compiler/generated/
  - id: protobuf-net
    desc: protobuf-net serialization library
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ProtoBuf|protobuf-net
  # Bare `System.Runtime.Serialization` namespace reference relocated to
  # micro-behaviors/data/serialize/object/dotnet.yaml — it is a neutral
  # capability (the safe DataContractSerializer lives in the same namespace),
  # not an unsafe-deserialization signal. The unsafe sink is `binary-formatter`.
  - id: binary-formatter
    desc: .NET BinaryFormatter serialization capability
    crit: notable
    conf: 0.9
    mbc: C0026
    for: [pe, csharp, xml, javascript]
    if:
      type: text
      regex: Binary\.BinaryFormatter|BinaryFormatter(Serialize|Deserialize)?
  - id: binary-formatter-deserialize-call
    desc: Calls BinaryFormatter deserialization
    crit: suspicious
    conf: 0.96
    mbc: C0026
    for: [pe, csharp, html, javascript]
    if:
      type: text
      regex: '(?i)\bBinaryFormatter\s*\.\s*Deserialize(_[0-9]+)?\s*\('
  - id: dotnet-load-from-bytes-symbol
    desc: .NET LoadFromBytes method symbol
    crit: component
    conf: 0.78
    for:
      - pe
      - dll
    if:
      type: text
      exact: LoadFromBytes
  - id: dotnet-load-from-file-symbol
    desc: .NET LoadFromFile method symbol
    crit: component
    conf: 0.72
    for:
      - pe
      - dll
    if:
      type: text
      exact: LoadFromFile
  - id: dotnet-custom-binary-serializer-symbol
    desc: .NET custom binary serializer symbol
    crit: component
    conf: 0.84
    for:
      - pe
      - dll
    if:
      type: text
      exact: ICustomBinarySerializer
composite_rules:
  - id: dotnet-custom-binary-loader
    desc: .NET custom binary loader helpers
    crit: notable
    conf: 0.82
    for:
      - pe
      - dll
    any:
      - id: dotnet-load-from-bytes-symbol
      - id: dotnet-load-from-file-symbol
    all:
      - id: dotnet-custom-binary-serializer-symbol
