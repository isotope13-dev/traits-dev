defaults:
  platforms:
    - unix
    - windows
  for:
    - pe
    - csharp
traits:
  - id: xml-serializer
    desc: .NET XML serialization capability
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: XmlSerializer|System\.Xml\.Serialization
    unless:
      - id: metadata/lang/compiler/generated::dotnet-generated-xmlserializer
  - id: protobuf-net
    desc: protobuf-net serialization library
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: ProtoBuf|protobuf-net
  - id: protobuf-content-type
    desc: Protocol Buffers HTTP content type
    crit: notable
    conf: 0.92
    if:
      type: text
      word: application/x-protobuf
  - id: runtime-serialization
    desc: .NET runtime serialization namespace
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: System.Runtime.Serialization
  - id: binary-formatter
    desc: Binary serialization (security risk)
    crit: notable
    conf: 0.9
    mbc: C0026
    if:
      type: text
      regex: Binary\.BinaryFormatter|BinaryFormatter(Serialize|Deserialize)
  - id: dotnet-load-from-bytes-symbol
    desc: .NET LoadFromBytes method symbol
    crit: component
    conf: 0.78
    for:
      - pe
      - dll
    if:
      type: text
      exact: LoadFromBytes
  - id: dotnet-load-from-file-symbol
    desc: .NET LoadFromFile method symbol
    crit: component
    conf: 0.72
    for:
      - pe
      - dll
    if:
      type: text
      exact: LoadFromFile
  - id: dotnet-custom-binary-serializer-symbol
    desc: .NET custom binary serializer symbol
    crit: component
    conf: 0.84
    for:
      - pe
      - dll
    if:
      type: text
      exact: ICustomBinarySerializer
composite_rules:
  - id: dotnet-custom-binary-loader
    desc: .NET custom binary loader helpers
    crit: notable
    conf: 0.82
    for:
      - pe
      - dll
    any:
      - id: dotnet-load-from-bytes-symbol
      - id: dotnet-load-from-file-symbol
    all:
      - id: dotnet-custom-binary-serializer-symbol
