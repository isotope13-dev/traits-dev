defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - pe
    - dll
    - csharp
traits:
  - id: json-newtonsoft
    desc: Newtonsoft.Json serialization library
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      substr: Newtonsoft.Json
  - id: json-system
    desc: System.Text.Json library reference
    crit: baseline
    conf: 0.85
    if:
      type: string_value
      substr: System.Text.Json
  - id: xml-serializer
    desc: XML serialization capability
    crit: baseline
    conf: 0.75
    if:
      type: string_value
      regex: XmlSerializer|System\.Xml\.Serialization
  - id: protobuf-net
    desc: protobuf-net serialization library
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: ProtoBuf|protobuf-net
  - id: protobuf-content-type
    desc: Protocol Buffers HTTP content type
    crit: notable
    conf: 0.92
    if:
      type: string_value
      exact: application/x-protobuf
  - id: runtime-serialization
    desc: .NET runtime serialization namespace
    crit: baseline
    conf: 0.82
    if:
      type: string_value
      substr: System.Runtime.Serialization
  - id: binary-formatter
    desc: Binary serialization (security risk)
    crit: baseline
    conf: 0.9
    mbc: C0026
    if:
      type: string_value
      regex: Binary\.BinaryFormatter|BinaryFormatter(Serialize|Deserialize)
