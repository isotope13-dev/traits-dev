# C# Deserialization Traits (dangerous/exploitable)
# MBC: E1059 - Command and Scripting Interpreter
defaults:
  platforms: [windows, unix]
traits:
  - id: binary-formatter-dup
    desc: Binary deserialization (insecure, commonly exploited)
    crit: suspicious
    mbc: "E1059"
    attack: "T1059"
    conf: 0.95
    for: [csharp]
    if:
      type: tree-sitter
      node: object_creation_expression
      exact: "BinaryFormatter"
