# Python TOML deserialization
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: toml-load-call
    desc: Python toml.load file parser
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: toml.load
  - id: toml-loads-call
    desc: Python toml.loads parses a TOML string
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: toml.loads
