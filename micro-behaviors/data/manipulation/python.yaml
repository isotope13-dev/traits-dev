defaults:
  platforms: [unix, windows]
  for: [python, shell]

traits:
  - id: python-replacement-assignment
    desc: Assigns result of Python string replacement
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b[A-Za-z_]\w*\s*=\s*[A-Za-z_]\w*\.replace\s*\('
  - id: python-open-write-call
    desc: Python writes through open handle
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bopen\s*\([^)]{0,120}\)\.write\s*\('

composite_rules:
  # Neutral file-editing mechanic. Supply-chain intent comes from the
  # consuming composite (for example, pairing this with npm publish).
  - id: python-replace-before-file-write
    desc: Python replaces text before file write
    crit: notable
    conf: 0.9
    all:
      - id: python-replacement-assignment
      - id: python-open-write-call
    near_lines: 12
