defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: alpha-sanitization-replace
    desc: Generic non-alpha character removal
    conf: 1.0
    crit: component
    if:
      type: text
      regex: replace\(\/\[\^a-zA-Z\]\/
  - id: filename-sanitization-replace
    desc: Filename unsafe character replacement
    conf: 0.95
    crit: component
    if:
      type: text
      regex: 'replace\(/\\\[\\\\/:\\*\?"<>\|\]\+/g,\s*[''"]-[''"]\)'
  - id: filename-sanitization-function
    desc: Filename sanitization helper
    conf: 0.95
    crit: component
    if:
      type: text
      regex: 'function\s+sanitizeFilename[\s\S]{0,500}\.replace\s*\('
  - id: sensitive-value-redaction
    desc: Sensitive-value redaction logic
    crit: notable
    conf: 0.8
    for: [python, javascript, typescript, ruby, go, shell, powershell]
    if:
      type: text
      regex: '(?i)\b(redact|redacted|scrub)\w*\b'
  - id: queryselectorall-call
    desc: querySelectorAll call
    conf: 0.8
    crit: component
    for: [javascript, typescript]
    if:
      type: value
      path: source.imports
      regex: '(^|\.)querySelectorAll$'
  - id: remove-call
    desc: DOM remove call
    conf: 0.8
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      substr: ".remove("
  - id: ad-selector-token
    desc: Ad-related CSS selector token
    conf: 0.8
    crit: component
    for: [javascript, typescript]
    if:
      type: literal
      regex: '(?i)[#.]ads?([-_][a-z0-9_-]+)?([ .#:[\],>+~]|$)|advertisement|adsbygoogle'
  - id: tracking-selector-token
    desc: Tracking selector token
    conf: 0.8
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      substr: tracking
  - id: analytics-selector-token
    desc: Analytics selector token
    conf: 0.8
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      substr: analytics
composite_rules:
  - id: ad-tracker-removal-selectors
    desc: Ad and tracker removal selector list
    crit: component
    conf: 0.9
    all:
      - id: queryselectorall-call
      - id: remove-call
    any:
      - id: ad-selector-token
      - id: tracking-selector-token
      - id: analytics-selector-token
