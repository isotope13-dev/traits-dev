defaults:
  platforms: [unix, windows]
  for: [c, cpp]
  crit: notable
  conf: 0.9

traits:
  - id: list-add-call
    desc: Adds an entry to a linked list
    if:
      type: symbol
      kind: call
      exact: list_add
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

  - id: list-del-call
    desc: Removes an entry from a linked list
    if:
      type: symbol
      kind: call
      exact: list_del
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
