defaults:
  platforms: [unix, windows]
  for: [binaries, scripts, source]
  conf: 0.7
traits:
  - id: base64-token
    desc: Literal 'base64' token in text
    crit: baseline
    if:
      type: text
      word: base64
      case_insensitive: true
    not:
      - substr: ".cargo\\registry\\src\\"
      - substr: "\\base64-"
      - substr: "\\base64.rs"
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - type: text
        regex: '(?i)[\\/]+base64-[0-9]+\.[0-9]+\.[0-9]+[\\/]'
