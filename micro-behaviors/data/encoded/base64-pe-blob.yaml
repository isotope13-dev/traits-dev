defaults:
  platforms: [windows]
  # A base64-encoded PE hides inside scripts (batch/powershell/vbs droppers),
  # not just plain-text files — `text` alone excluded batch-typed .cmd loaders.
  for: [text, scripts]
  attack: T1027.009
  mbc: F0001.006
traits:
  # `TVqQAAMAAAAEAAAA` is the base64 of the canonical PE start (MZ + the fixed
  # DOS-header fields). Anchoring on that prefix instead of a 200-char contiguous
  # run makes the match WRAP-TOLERANT: base64-encoded PEs are nearly always
  # line-wrapped (certutil / MIME / PowerShell emit 64- or 76-char lines), so one
  # line holds only ~60 base64 chars and the old `{200,}` silently missed them.
  # The 30-char tail keeps it specific (near-zero FP).
  - id: raw-base64-pe-header
    desc: Raw Base64 PE header blob
    crit: suspicious
    conf: 0.95
    size_min: 4096
    if:
      type: text
      regex: 'TVqQAA[A-Za-z0-9+/]{30,}'
    unless:
      - id: well-known/app/posh-ovirt/
  - id: raw-base64-pe-dos-stub
    desc: Base64 PE DOS stub text
    crit: suspicious
    conf: 0.94
    size_min: 4096
    if:
      type: text
      substr: VGhpcyBwcm9ncmFtIGNhbm5vdCBiZSBydW4gaW4gRE9TIG1vZGU
    unless:
      - id: well-known/app/posh-ovirt/
  - id: raw-base64-pe-clr-entry
    desc: Base64 .NET CLR entry marker
    crit: suspicious
    conf: 0.9
    size_min: 4096
    if:
      type: text
      substr: X0NvckV4ZU1haW4

  - id: raw-file-base64-pe-header
    desc: Raw file Base64 PE header
    crit: suspicious
    conf: 0.96
    for: [data, ooxml]
    size_min: 4096
    if:
      type: raw
      regex: 'TVqQAA[A-Za-z0-9+/]{30,}'

  - id: raw-file-base64-pe-dos-stub
    desc: Raw file Base64 PE DOS stub
    crit: suspicious
    conf: 0.95
    for: [data, ooxml]
    size_min: 4096
    if:
      type: raw
      regex: 'VGhpcy[A-Za-z0-9+/]wcm9ncmFtIGNhbm5vdCBiZSBydW4gaW4gRE9TIG1vZGU'

  - id: raw-file-base64-pe-clr-entry
    desc: Raw file Base64 CLR entry
    crit: suspicious
    conf: 0.92
    for: [data, ooxml]
    size_min: 4096
    if:
      type: raw
      regex: 'X0NvckV4ZU1haW[A-Za-z0-9+/]'
