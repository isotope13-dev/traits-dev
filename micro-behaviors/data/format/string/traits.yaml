defaults:
  platforms:
    - unix
  for: [c, cpp]
traits:
  - id: sprintf-format
    desc: String formatting with format specifiers
    crit: baseline
    conf: 0.75
    if:
      type: text
      word: sprintf
  - id: snprintf-format
    desc: snprintf formatting function
    crit: baseline
    conf: 0.75
    if:
      type: text
      word: snprintf
  - id: wsprintfa-format
    desc: wsprintfA user32 string formatting import
    crit: baseline
    conf: 0.75
    platforms: [windows]
    for: [pe, dll]
    if:
      type: symbol
      exact: wsprintfA
