# String Formatting Functions
# Atomic indicators for C-style format string functions.
# These are neutral building blocks - sprintf/snprintf are ubiquitous in C code.
defaults:
  platforms: [unix, linux, macos]
  for: [binaries, c]
traits:
  - id: sprintf-format
    desc: String formatting with format specifiers
    crit: baseline
    conf: 0.75
    if:
      type: string_value
      exact: "sprintf"
  - id: snprintf-format
    desc: snprintf formatting function
    crit: baseline
    conf: 0.75
    if:
      type: string_value
      exact: "snprintf"
composite_rules:
  - id: unsafe-string-format
    desc: String formatting with format specifiers
    crit: baseline
    conf: 0.75
    any:
      - id: sprintf-format
      - id: snprintf-format
