defaults:
  platforms:
    - unix
  for: [c, cpp]
traits:
  - id: sprintf-format
    desc: String formatting with format specifiers
    crit: baseline
    conf: 0.75
    if:
      type: text
      word: sprintf
  - id: snprintf-format
    desc: snprintf formatting function
    crit: baseline
    conf: 0.75
    if:
      type: text
      word: snprintf
  - id: wsprintfa-format
    desc: wsprintfA user32 string formatting import
    crit: baseline
    conf: 0.75
    platforms: [windows]
    for: [pe, dll]
    if:
      type: symbol
      exact: wsprintfA
  - id: native-email-record-label
    desc: Native email record label
    crit: notable
    conf: 0.88
    platforms: [openwrt]
    for: [c, cpp, objc, rust, elf]
    if:
      type: text
      regex: 'email:%s|email_count'
  - id: native-account-record-label
    desc: Native account record label
    crit: notable
    conf: 0.88
    platforms: [openwrt]
    for: [c, cpp, objc, rust, elf]
    if:
      type: text
      regex: 'account:%s|account_count'
  - id: php-array-non-ascii-display-value
    desc: PHP array maps to non-ASCII display text
    crit: baseline
    conf: 0.9
    for: [php]
    if:
      type: text
      regex: "=>\\s*['\"].{0,80}[^\\x00-\\x7F]"
