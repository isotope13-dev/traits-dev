defaults:
  platforms:
    - unix
  for: [c, cpp]
traits:
  - id: sprintf-format
    desc: String formatting with format specifiers
    crit: baseline
    conf: 0.75
    if:
      type: text
      exact: sprintf
  - id: snprintf-format
    desc: snprintf formatting function
    crit: baseline
    conf: 0.75
    if:
      type: text
      exact: snprintf
composite_rules:
  - id: unsafe-string-format
    desc: String formatting with format specifiers
    crit: baseline
    conf: 0.75
    any:
      - id: sprintf-format
      - id: snprintf-format
