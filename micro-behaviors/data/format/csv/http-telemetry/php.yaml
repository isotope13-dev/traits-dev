defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.85

traits:
- id: telemetry-csv-header
  desc: CSV header row logging HTTP request telemetry
  # Distinctive column schema of a traffic logger's export: URL, Method, IP,
  # Status, ..., User Agent. This ordered set of request fields identifies a
  # captured-traffic CSV, distinguishing it from an ordinary CSV download.
  if:
    type: text
    regex: "URL['\"],\\s*['\"]Method['\"],\\s*['\"]IP['\"],\\s*['\"]Status['\"].{0,120}User Agent"

composite_rules:
- id: http-telemetry-csv-export
  desc: Exports captured HTTP request telemetry as CSV
  # A text/csv response whose columns are HTTP request telemetry (URL/method/IP/
  # status/UA) -- a traffic-logging package exporting captured requests. Anchored
  # on the telemetry column schema so ordinary CSV file downloads do not match.
  crit: notable
  conf: 0.9
  all:
  - id: micro-behaviors/data/format/csv/export::csv-content-type
  - id: telemetry-csv-header
