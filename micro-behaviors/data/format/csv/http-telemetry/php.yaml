defaults:
  platforms: [unix, windows]
  for: [php]
  crit: component
  conf: 0.84

traits:
- id: csv-content-type
  desc: CSV HTTP response content type
  if:
    type: text
    substr: "text/csv"

- id: csv-attachment-filename
  desc: CSV attachment filename response
  if:
    type: text
    regex: "Content-Disposition[\\s\\S]{0,120}filename"

- id: telemetry-csv-header
  desc: Traffic telemetry CSV header
  if:
    type: text
    regex: "URL['\"],\\s*['\"]Method['\"],\\s*['\"]IP['\"],\\s*['\"]Status['\"].{0,120}User Agent"

composite_rules:
- id: http-telemetry-csv-export
  desc: Exports HTTP telemetry as CSV
  crit: notable
  conf: 0.9
  all:
  - id: csv-content-type
  any:
  - id: csv-attachment-filename
  - id: telemetry-csv-header
