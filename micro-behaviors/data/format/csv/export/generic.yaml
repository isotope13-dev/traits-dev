defaults:
  platforms: [unix, windows]
  for: [php, javascript, typescript]
  crit: component
  conf: 0.9

traits:
  # Canonical text/csv content-type marker, shared by CSV-export composites
  # across ecosystems (browser downloads, PHP responses, telemetry exports).
  - id: csv-content-type
    desc: Declares text/csv content type
    if:
      type: text
      substr: text/csv
