defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  # csv-content-type is defined once in generic.yaml (shared php/js/ts) and
  # referenced same-directory by the composites below.
  - id: review-record-csv-schema
    desc: Review record CSV field schema
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'Review ID.{0,100}Review Content.{0,100}Star Rating'

composite_rules:
  - id: browser-csv-download
    desc: Exports browser data as CSV
    crit: notable
    conf: 0.92
    all:
      - id: csv-content-type
      - id: micro-behaviors/ui/window/manage/dom::dom-blob-download-link
    scope: outer

  - id: review-record-csv-export
    desc: Exports review records as CSV
    crit: notable
    conf: 0.95
    all:
      - id: review-record-csv-schema
      - id: browser-csv-download
    scope: outer
