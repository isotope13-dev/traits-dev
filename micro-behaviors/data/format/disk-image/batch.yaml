defaults:
  platforms: [windows, unix]
  for: [batch]

traits:
  - id: dd-bootloader-to-floppy
    desc: dd writes bootloader to floppy image
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)dd\s+if=bootloader\.bin\s+of=disk\.flp'

  - id: qemu-floppy-boot-test
    desc: QEMU boots floppy image
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)qemu-system-i386\s+-fda\s+disk\.flp'

composite_rules:
  - id: batch-bootable-floppy-image-build
    desc: Batch builds bootable floppy image
    crit: notable
    conf: 0.92
    all:
      - id: dd-bootloader-to-floppy
      - id: qemu-floppy-boot-test
