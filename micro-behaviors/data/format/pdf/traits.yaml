defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe, python]
traits:
  - id: read-fitz
    desc: Imports Fitz/PyMuPDF for PDF processing
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: fitz
  - id: read-pypdf2
    desc: Imports PyPDF2 for PDF processing
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: PyPDF2
  - id: read-pypdf
    desc: Imports pypdf for PDF processing
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: pypdf
  - id: read-pdfminer
    desc: Imports pdfminer for PDF processing
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: pdfminer

  - id: jspdf-generate-pdf
    desc: Generates PDF with jsPDF
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    platforms: [windows, unix]
    if:
      type: text
      regex: 'new\s+jsPDF\s*\('

  - id: jspdf-save-pdf
    desc: Saves PDF with jsPDF
    crit: notable
    conf: 0.86
    for: [javascript, typescript]
    platforms: [windows, unix]
    if:
      type: text
      regex: '\.save\s*\(\s*["''`][^"''`]{0,120}\.pdf'
