# HLS (HTTP Live Streaming) manifest vocabulary
# Generic tokens found in any HLS playlist parser or media downloader.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: baseline
  conf: 0.7

traits:
  - id: hls-manifest-tokens
    desc: HLS/M3U8 manifest tokens in string literal
    if:
      type: literal
      kind: string
      regex: 'M3U8|EXT-X-KEY|playbackItem'
