defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: javascript-gif-encoder-create
    desc: Creates a JavaScript GIF encoder
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: createGifEncoder

  - id: js-sharp-image-processing
    desc: Uses sharp image processing
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: import
      exact: sharp
