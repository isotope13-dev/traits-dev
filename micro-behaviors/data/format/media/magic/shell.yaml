defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: png-magic-hex-string
    desc: PNG magic hex string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "89 50 4e 47"
  - id: head-od-magic-check
    desc: Shell file magic validation
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'head\s+-c\s+4[^\n]{0,80}od\s+-A\s+n\s+-t\s+x1'
composite_rules:
  - id: shell-png-magic-validation
    desc: Shell validates PNG magic bytes
    crit: notable
    conf: 0.9
    all:
      - id: png-magic-hex-string
      - id: head-od-magic-check
    near_lines: 4
