# Neutral Python WAV parsing operations. Steganography objectives combine
# these capabilities with decoding or execution evidence.
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable

traits:
  - id: wave-open
    desc: Python wave module opens audio file
    conf: 0.85
    if:
      type: symbol
      exact: wave.open
  - id: wave-readframes
    desc: Reads raw frames from WAV audio
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(^|\.)readframes$'
