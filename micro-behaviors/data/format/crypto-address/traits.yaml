defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.85
traits:
  - id: btc-address-regex
    desc: Bitcoin address regex pattern
    if:
      type: text
      regex: \^(bc1|\[13\])
      is: bitcoin_addr
  - id: btc-bech32-regex
    desc: Bitcoin bech32 address regex
    if:
      type: text
      regex: bc1[a-zA-HJ-NP-Z0-9]\{25
      is: bitcoin_addr
  - id: btc-chaos-regex
    desc: Base58 Bitcoin-like regex pattern
    conf: 0.9
    if:
      type: text
      substr: '[a-km-zA-HJ-NP-Z1-9]{26,33}'
  - id: eth-address-regex
    desc: Ethereum address regex pattern
    if:
      type: text
      regex: 0x[a-fA-F0-9]\{40\}
  - id: xmr-address-regex
    desc: Monero address regex pattern
    if:
      type: text
      regex: \[48\]\[0-9AB\]
  - id: ltc-address-regex
    desc: Litecoin address regex pattern
    if:
      type: text
      regex: \^[LM3][a-km-zA-HJ-NP-Z1-9]\{2
  - id: doge-address-regex
    desc: Dogecoin address regex pattern
    conf: 0.85
    if:
      type: text
      regex: \^D[5-9A-HJ-NP-U].{0,50}\{2
    unless:
      - type: text
        substr: 'DBD::\w+::db set_err warning:'
      - type: text
        substr: "re:^DR1 "
  - id: sol-address-regex
    desc: Solana address regex pattern
    if:
      type: text
      regex: '[1-9A-HJ-NP-Za-km-z]\{32,44\}'
  - id: hardcoded-btc-addr
    desc: Hardcoded Bitcoin address
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \b(bc1[ac-hj-np-z02-9]{38,58}|[13][a-km-zA-HJ-NP-Z1-9]{25,34})\b
      is: bitcoin_addr
    not:
      - regex: ^[0-9a-fA-F]+$
      - regex: ^[13][A-Z0-9]+$
      - regex: ^[13][a-z0-9]+$
      - regex: ^[13]([A-Z][a-z0-9]+){2,}$
      - regex: (.)\1\1\1
      - substr: "sharedSecret"
      - substr: "trustedPeer"
      - substr: "characteristic"
      - substr: "Bitcoin raw private key (P2SH(P2WPKH))"
      - substr: "Bitcoin raw private key (P2SH(P2WPKH)), compressed"
      - substr: "Bitcoin raw private key (P2WPKH, Bech32)"
      - substr: "Bitcoin raw private key (P2WPKH, Bech32), compressed"
      - substr: "Bitcoin raw private key (P2PKH)"
      - substr: "Bitcoin raw private key (P2PKH), compressed"
      - substr: "Bitcoin WIF private key"
    unless:
      - id: metadata/package/documentation::python-doctest-prompt
      - id: well-known/tool/dual-use/hashcat/
      - id: well-known/app/sidesail/
      - id: metadata/package/testing/
      - id: well-known/tool/reverse-engineering/
      - id: metadata/file/catalog/identity/
      - id: micro-behaviors/crypto/library/blockchain/
  # Sibling of hardcoded-btc-addr for the other two chains a clipper swaps.
  # Key-anchored to a `eth`/`sol` field assignment: a bare `0x`+40-hex is both
  # FP-prone and already carried by transfer-hijack's address-table atom (which
  # needs 2+ addresses), and a bare 32-44 base58 run matches almost any hash.
  # Anchoring on the chain key catches a single hardcoded destination wallet
  # (the clipper's substitution table) with no false positives. Neutral marker;
  # intent comes from a referencing swap composite.
  - id: hardcoded-eth-addr
    desc: Hardcoded Ethereum address
    crit: notable
    conf: 0.8
    for: [scripts]
    if:
      type: text
      regex: (eth|ethereum)["']?\s*[:=]\s*["']0x[a-fA-F0-9]{40}["']
    unless:
      - id: metadata/package/testing/
  - id: hardcoded-sol-addr
    desc: Hardcoded Solana address
    crit: notable
    conf: 0.8
    for: [scripts]
    if:
      type: text
      regex: (sol|solana)["']?\s*[:=]\s*["'][1-9A-HJ-NP-Za-km-z]{32,44}["']
    unless:
      - id: metadata/package/testing/

  # Address tables are common in exchange adapters, allowlists, tests, and
  # wallet software.  They are data observations, not transfer hijacking.
  - id: hardcoded-eth-address-table
    desc: Multiple hardcoded Ethereum addresses
    crit: notable
    conf: 0.9
    for: [scripts]
    count_min: 3
    if:
      type: text
      regex: '\b0x[a-fA-F0-9]{40}\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: hardcoded-bitcoin-address-table
    desc: Multiple hardcoded Bitcoin addresses
    crit: notable
    conf: 0.88
    for: [scripts]
    count_min: 2
    if:
      type: text
      regex: '\b(bc1[ac-hj-np-z02-9]{20,87}|[13][a-km-zA-HJ-NP-Z1-9]{25,34})\b'
      is: bitcoin_addr

  - id: hardcoded-tron-address-table
    desc: Multiple hardcoded Tron addresses
    crit: notable
    conf: 0.88
    for: [scripts]
    count_min: 2
    if:
      # Bare Base58 runs also occur inside generated class names and symbol
      # tables. Require a nearby address/wallet context for this table atom.
      type: text
      regex: '(?i)\b(address|wallet|tron|trx)\b.{0,80}\bT[1-9A-HJ-NP-Za-km-z]{33}\b'

  - id: hardcoded-bch-address-table
    desc: Hardcoded Bitcoin Cash address table
    crit: notable
    conf: 0.86
    for: [scripts]
    count_min: 1
    if:
      type: text
      regex: '\bbitcoincash:[qp][a-zA-Z0-9]{30,60}\b'

  - id: hardcoded-litecoin-address-table
    desc: Hardcoded Litecoin address table
    crit: notable
    conf: 0.86
    for: [scripts]
    count_min: 1
    if:
      type: text
      regex: '\bltc1[ac-hj-np-z02-9]{20,87}\b'

composite_rules:
  - id: multi-chain-address-table
    desc: Multiple hardcoded cryptocurrency address formats
    crit: notable
    conf: 0.94
    needs: 3
    any:
      - id: hardcoded-eth-address-table
      - id: hardcoded-bitcoin-address-table
      - id: hardcoded-tron-address-table
      - id: hardcoded-bch-address-table
      - id: hardcoded-litecoin-address-table
      - id: hardcoded-sol-addr
