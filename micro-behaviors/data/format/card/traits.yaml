defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, php, html]

# Card-brand routing is a payment/UI capability. It is not credential access
# unless it is combined with card-field capture or transmission.
traits:
- id: visa-detection
  desc: Visa brand near a card type
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}visa\b
  unless:
  - id: metadata/file/catalog/identity/
  - id: metadata/lang/scripted::dts-declaration-file
  - id: well-known/tool/detection/llm-scanner/
- id: mastercard-detection
  desc: Mastercard brand near a card type
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type)[^\r\n]{0,20}master(card)?\b
  unless:
  - id: metadata/file/catalog/identity/
  - id: metadata/lang/scripted::dts-declaration-file
- id: amex-detection
  desc: Amex brand near a card type
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}(amex|american.?express)\b
  unless:
  - id: well-known/tool/detection/llm-scanner/
- id: discover-detection
  desc: Discover brand near a card type
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}discover\b

composite_rules:
- id: card-type-detection
  desc: Payment card brand detection
  crit: notable
  conf: 0.9
  needs: 2
  any:
  - id: visa-detection
  - id: mastercard-detection
  - id: amex-detection
  - id: discover-detection
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
  unless:
  - id: metadata/file/catalog/identity/
