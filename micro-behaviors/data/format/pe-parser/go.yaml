# PE parsing library detection.
# github.com/Binject/debug/pe is a Go PE parser used to read and parse PE
# structures from raw bytes. Commonly paired with raw disk readers to parse
# clean copies of system DLLs for EDR unhooking.
defaults:
  for: [pe, go]
  platforms: [windows]
traits:
  - id: binject-pe-parser
    desc: Go PE parser library (Binject/debug/pe)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "github.com/Binject/debug/pe"
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor/
