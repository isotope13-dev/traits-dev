defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-pe-mz-check
    desc: Checks for PE MZ header magic bytes
    criticality: suspicious
    confidence: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '==\s*0x4D\s*&&\s*.{0,50}==\s*0x5[Aa]'
