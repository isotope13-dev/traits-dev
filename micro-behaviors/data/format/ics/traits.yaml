# Neutral names of industrial telemetry fields.  A field name alone identifies
# a data model; ICS targeting requires additional environment or control-surface
# evidence in objectives/discovery/system/ics-environment.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript, json]
  crit: notable
  conf: 0.85

traits:
  - id: grid-frequency-field
    desc: Grid frequency measurement field
    if:
      type: text
      regex: '(?i)\bgrid[_-]frequency\b'

  - id: frequency-setpoint-field
    desc: Power-system frequency setpoint field
    if:
      type: text
      regex: '(?i)\bhz[_-]?setpoint\b'
