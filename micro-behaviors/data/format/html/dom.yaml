defaults:
  platforms: [windows, unix]
  for: [html, javascript]
traits:
- id: iframe-create
  desc: Creates iframe element
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'createElement\s*\(\s*["'']iframe["'']\s*\)'
- id: display-none-style
  desc: Hides element with display none
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'style\.display\s*=\s*["'']none["'']'
composite_rules:
- id: hidden-iframe
  desc: Creates hidden iframe element
  crit: notable
  conf: 0.88
  all:
  - id: iframe-create
  - id: display-none-style
  near_bytes: 600
  downgrade:
    any:
    - type: basename
      regex: '(?i)(^|[-_.])(test|spec)\.[jt]sx?$'
    - type: text
      substr: sockjs-client
    - id: metadata/package/quality/false-positives::benign-build-tooling-context
    - id: metadata/library/structure::google-tag-manager-bundle
    - id: metadata/library/react/
    - id: metadata/package/testing/presence/manifest::test-fixtures
    - id: metadata/library/structure::js-large-module-bundle
