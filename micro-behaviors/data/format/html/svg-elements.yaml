defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html, svg]

traits:
  - id: html-svg-script-element
    desc: HTML, SVG, or script element string
    crit: baseline
    conf: 0.85
    if:
      type: literal
      kind: string
      regex: '(?is)<(svg|script)\b'

  - id: inline-svg-script-body
    desc: Inline script body in an SVG document
    crit: notable
    conf: 0.8
    for: [svg]
    if:
      type: text
      regex: '<script\b[^>]{0,200}>\s{0,20}[^\s<]'
    unless:
      - type: text
        regex: '^\s*<!DOCTYPE html>\s*<html\b'
