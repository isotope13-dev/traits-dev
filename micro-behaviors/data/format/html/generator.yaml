defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: html-generator-doctype
    desc: Generates HTML content (DOCTYPE)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: <!DOCTYPE html>
    downgrade:
      all:
        - type: symbol
          exact: CreateMdmEnterpriseDiagnosticHTMLReport
        - type: text
          substr: function ToggleTableContent(
  - id: html-generator-tags
    desc: Generates HTML tags
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: <html|<head>|<body|<div
    not:
      - substr: <div class="footnotes">
    unless:
      - type: basename
        regex: (_spec|_test)\.rb$
    downgrade:
      all:
        - type: symbol
          exact: CreateMdmEnterpriseDiagnosticHTMLReport
        - type: text
          substr: function ToggleTableContent(
  - id: html-generator-ext
    desc: Constructs HTML file path
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '["'']\.html["'']'
