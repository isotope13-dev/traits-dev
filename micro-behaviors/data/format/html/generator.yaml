defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: html-generator-doctype
    desc: Generates HTML content (DOCTYPE)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: <!DOCTYPE html>
    downgrade:
      all:
        - type: symbol
          exact: CreateMdmEnterpriseDiagnosticHTMLReport
        - type: string_value
          substr: function ToggleTableContent(
  - id: html-generator-tags
    desc: Generates HTML tags
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: <html|<head>|<body|<div
    downgrade:
      all:
        - type: symbol
          exact: CreateMdmEnterpriseDiagnosticHTMLReport
        - type: string_value
          substr: function ToggleTableContent(
  - id: html-generator-ext
    desc: Constructs HTML file path
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: '["'']\.html["'']'
