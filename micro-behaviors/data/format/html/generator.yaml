defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: html-generator-doctype
    desc: Generates HTML content (DOCTYPE)
    # Baseline: `<!DOCTYPE html>` appears in docgen tools, static site
    # generators, test fixture builders, sample package makers, and any code
    # that templates or validates HTML — not a behavior signal on its own.
    crit: baseline
    conf: 0.8
    if:
      type: literal
      kind: string
      substr: <!DOCTYPE html>
    unless:
      - type: text
        substr: Vungle Third-Party MRAID Template
      - type: text
        substr: Petite Capitals
    downgrade:
      all:
        - type: symbol
          exact: CreateMdmEnterpriseDiagnosticHTMLReport
        - type: text
          substr: function ToggleTableContent(
  - id: html-generator-tags
    desc: Generates HTML tags
    crit: notable
    conf: 0.6
    if:
      type: literal
      kind: string
      regex: <html|<head>|<body
    not:
      - substr: <div class="footnotes">
    unless:
      - type: text
        substr: Vungle Third-Party MRAID Template
      - type: text
        substr: "<title>Simple IPv6 test</title>"
      - type: text
        substr: "pkginfo.js: Top-level include for the pkginfo module"
      - id: metadata/package/testing/presence/harness::ruby-test-file
    downgrade:
      all:
        - type: symbol
          exact: CreateMdmEnterpriseDiagnosticHTMLReport
        - type: text
          substr: function ToggleTableContent(
  - id: html-generator-ext
    desc: Constructs HTML file path
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '["'']\.html["'']'
