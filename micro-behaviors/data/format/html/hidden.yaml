defaults:
  platforms: [unix, windows]
  for: [html, markdown, text, xml, rtf, ooxml]

traits:
- id: comment
  desc: HTML comment marker
  crit: component
  conf: 0.72
  if:
    type: raw
    substr: "<!--"

- id: aria-hidden
  desc: ARIA hidden attribute
  crit: component
  conf: 0.78
  if:
    type: text
    regex: 'aria-hidden\s*=\s*["'']true["'']'
    case_insensitive: true

composite_rules:
- id: hidden-content
  desc: HTML hidden content marker
  crit: component
  conf: 0.78
  any:
  - id: comment
  - id: aria-hidden
