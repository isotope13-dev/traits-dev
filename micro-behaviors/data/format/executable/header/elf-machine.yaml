# Generic references to ELF e_machine architecture constants. Code that
# enumerates these is doing multi-arch ELF parsing/loading (legitimate in
# toolchains/loaders, also in multi-arch malware droppers). Component-only;
# the malicious intent comes from the composite that gates on it.
defaults:
  platforms: [unix]
  for: [c, cpp]
  crit: component
traits:
  - id: elf-multiarch-machine
    desc: References multiple ELF e_machine constants
    conf: 0.5
    if:
      type: string_literal
      regex: EM_(ARM|AARCH64|MIPS|X86_64)
