defaults:
  platforms: [macos]
  for: [c, cpp]
traits:
  - id: macho-lc-segment64
    desc: Mach-O LC_SEGMENT_64 load-command constant
    crit: component
    conf: 0.7
    if:
      type: text
      substr: LC_SEGMENT_64
  - id: macho-lc-symtab
    desc: Mach-O LC_SYMTAB load-command constant
    crit: component
    conf: 0.7
    if:
      type: text
      substr: LC_SYMTAB
  - id: macho-mh-magic64
    desc: Mach-O MH_MAGIC_64 file-format constant
    crit: component
    conf: 0.7
    if:
      type: text
      substr: MH_MAGIC_64
