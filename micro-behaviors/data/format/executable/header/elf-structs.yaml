# C-level ELF64 header-structure usage — the parsing/patching capability
# surface (dynamic loaders, binutils, patchelf, infectors all share it).
# Intent lives in composites: objectives/evasion/kernel-hide/lkm/rootkit
# (elf-patching) references these cross-tier.
defaults:
  platforms: [unix]
  for: [c]
  crit: component
  conf: 0.85
traits:
  - id: elf64-ehdr-decl
    desc: Elf64_Ehdr structure usage
    if:
      type: text
      substr: Elf64_Ehdr
  - id: elf64-shdr-decl
    desc: Elf64_Shdr structure usage
    if:
      type: text
      substr: Elf64_Shdr
  - id: elf64-phdr-decl
    desc: Elf64_Phdr structure usage
    if:
      type: text
      substr: Elf64_Phdr
  - id: elf-entry-field
    desc: e_entry ELF entry point field access
    conf: 0.9
    if:
      type: symbol
      kind: member
      exact: e_entry
  - id: elf-entry-text
    desc: e_entry ELF entry point field reference
    conf: 0.85
    if:
      type: text
      word: e_entry
  - id: elf-pt-load-ref
    desc: PT_LOAD program-header type reference
    if:
      type: text
      word: PT_LOAD
  - id: elf-phdr-offset-field
    desc: ELF program-header file-offset field access
    if:
      type: text
      word: p_offset
  - id: elf-phdr-vaddr-field
    desc: ELF program-header virtual-address field access
    if:
      type: text
      word: p_vaddr
composite_rules:
  - id: elf64-headers
    desc: Parses ELF64 file headers
    crit: notable
    conf: 0.85
    all:
      - id: elf64-ehdr-decl
      - id: elf64-shdr-decl
      - id: elf64-phdr-decl
  # Maps an ELF entry-point virtual address to its on-disk file offset by
  # walking PT_LOAD segments (p_vaddr -> p_offset). This is the locate step
  # shared by binary infectors, patchers, and entry-point-overwrite exploits.
  - id: elf-entry-file-offset-resolution
    desc: Resolves ELF entry point to file offset
    crit: notable
    conf: 0.85
    all:
      - id: elf-pt-load-ref
      - id: elf-phdr-offset-field
      - id: elf-phdr-vaddr-field
    any:
      - id: elf-entry-field
      - id: elf-entry-text
