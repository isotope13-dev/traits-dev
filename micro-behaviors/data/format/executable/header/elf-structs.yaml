# C-level ELF64 header-structure usage — the parsing/patching capability
# surface (dynamic loaders, binutils, patchelf, infectors all share it).
# Intent lives in composites: objectives/evasion/kernel-hide/lkm/rootkit
# (elf-patching) references these cross-tier.
defaults:
  platforms: [unix]
  for: [c]
  crit: component
  conf: 0.85
traits:
  - id: elf64-ehdr-decl
    desc: Elf64_Ehdr structure usage
    if:
      type: text
      substr: Elf64_Ehdr
  - id: elf64-shdr-decl
    desc: Elf64_Shdr structure usage
    if:
      type: text
      substr: Elf64_Shdr
  - id: elf64-phdr-decl
    desc: Elf64_Phdr structure usage
    if:
      type: text
      substr: Elf64_Phdr
  - id: elf-entry-field
    desc: e_entry ELF entry point field access
    conf: 0.9
    if:
      type: symbol
      kind: member
      exact: e_entry
  - id: elf-entry-text
    desc: e_entry ELF entry point field reference
    conf: 0.85
    if:
      type: text
      word: e_entry
  - id: elf-pt-load-ref
    desc: PT_LOAD program-header type reference
    if:
      type: text
      word: PT_LOAD
  - id: elf-phdr-offset-field
    desc: ELF program-header file-offset field access
    if:
      type: text
      word: p_offset
  - id: elf-phdr-vaddr-field
    desc: "ELF PHDR vaddr field access"
    if:
      type: text
      word: p_vaddr
  # Status line a tool prints after mapping a target ELF's entry-point virtual
  # address to its on-disk file offset — the "locate" half of an entry-point
  # overwrite / binary-infection chain. Descriptive only (a sample may word it
  # differently); the verdict rests on the behavioral composites, not this
  # literal. Survives compilation, so it reads the same on source and binary.
  - id: elf-entry-offset-report
    desc: ELF entry vaddr-to-file-offset report
    crit: component
    conf: 0.6
    for: [c, cpp, elf, binaries]
    if:
      type: text
      regex: entry\s+vaddr\s*=.{0,40}file\s+offset
composite_rules:
  - id: elf64-headers
    desc: Parses ELF64 file headers
    crit: notable
    conf: 0.85
    all:
      - id: elf64-ehdr-decl
      - id: elf64-shdr-decl
      - id: elf64-phdr-decl
  # Source-level locate step: walk PT_LOAD segments to map an entry-point
  # virtual address (p_vaddr) to its on-disk file offset (p_offset).
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: elf-entry-offset-source-walk
    desc: PT_LOAD entry-point offset resolution
    crit: component
    conf: 0.85
    all:
      - id: elf-pt-load-ref
      - id: elf-phdr-offset-field
      - id: elf-phdr-vaddr-field
    any:
      - id: elf-entry-field
      - id: elf-entry-text
  # Maps an ELF entry-point virtual address to its on-disk file offset — the
  # locate step shared by binary infectors, patchers, and entry-point-overwrite
  # exploits. Fires from the source PT_LOAD walk or from the runtime status the
  # tool reports, so source and built binary both surface the locate step.
  - id: elf-entry-file-offset-resolution
    desc: Resolves ELF entry point to file offset
    crit: notable
    conf: 0.85
    for: [c, cpp, elf, binaries]
    any:
      - id: elf-entry-offset-source-walk
      - id: elf-entry-offset-report
