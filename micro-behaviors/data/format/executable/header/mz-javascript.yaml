defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-mz-header-check-dec
    desc: Detects MZ header (decimal)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\[\s*0\s*\]\s*(!=|==)\s*77\s*(&&|\|\|)\s*\[\s*1\s*\]\s*(!=|==)\s*90'
  - id: js-mz-header-check-hex
    desc: Detects MZ header (hex)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\[\s*0\s*\]\s*==\s*0x4D\s*&&\s*\[\s*1\s*\]\s*==\s*0x5A'
  - id: js-mz-header-check-reversed-hex
    desc: Detects reversed MZ header (hex)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'a5x0\s*==\s*\]1\[\w+\s*&&\s*D4x0\s*==\s*\].{0,20}\[\w+'
