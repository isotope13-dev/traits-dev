# PE/MZ magic byte literal references in scripts.
#
# Scripts that hard-code the MZ magic value may validate a Windows executable
# before staging it, but ordinary file-type and archive libraries do this too.
# Keep this as a notable capability; dropper composites add the intent signal
# by combining it with subprocess execution and payload handling.
defaults:
  platforms: [windows, unix]
  attack: T1027.009
traits:
  # JavaScript / TypeScript: data[0] == 0x4D && data[1] == 0x5A
  - id: js-pe-mz-check
    desc: PE MZ header magic check
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '==\s*0x4D\s*&&\s*.{0,50}==\s*0x5[Aa]'
    unless:
      - id: well-known/app/pinokio::app-bundle

  # Python: integer literal 0x5A4D / 0x4D5A (most common in struct.pack/unpack)
  - id: py-pe-mz-check-int
    desc: PE MZ magic word integer literal
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: '\b0x(5[Aa]4[Dd]|4[Dd]5[Aa])\b'

  # Python: byte-literal MZ check (data[:2] == b'MZ' / data.startswith(b"MZ"))
  - id: py-pe-mz-check-bytes
    desc: PE MZ byte-literal check
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: "(==|!=|startswith\\s*\\(\\s*)b['\"]MZ['\"]"

  # Python: struct.pack("<H", 0x5A4D) — packed MZ word used as comparison sigil
  - id: py-pe-mz-check-struct
    desc: PE MZ magic packed via struct
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'struct\.pack\s*\(\s*["'']<H["'']\s*,\s*0x5[Aa]4[Dd]\s*\)'
