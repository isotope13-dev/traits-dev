defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: js-mz-header-array-check
    desc: JavaScript MZ header check (4D 5A)
    crit: suspicious
    if:
      type: string_literal
      regex: \[[0-9* ]*0\]\s*==\s*0x4[Dd]\s*&&\s*[\w$]{1,20}\[1\]\s*==\s*0x5[Aa]
