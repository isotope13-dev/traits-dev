# Executable-format magic byte literal references in scripts.
#
# Same intent as the MZ checks in pe_check.yaml — a script that hard-codes
# any executable-format magic value is almost certainly validating that
# fetched/loaded bytes are an executable before staging or loading them.
# Composites in objectives/command-and-control/dropper/staging/ combine
# these atoms with subprocess execution to flag droppers regardless of
# the target platform.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript]
  attack: T1027.009
traits:
  # ELF: \x7fELF, 0x464c457f (LE), or the 4-char magic
  - id: py-elf-magic-bytes
    desc: ELF magic byte-literal check
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: "(b['\"]\\\\x7fELF['\"]|b['\"]\\\\x7F\\\\x45\\\\x4c\\\\x46['\"])"
  - id: py-elf-magic-int
    desc: ELF magic integer literal
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\b0x464[Cc]457[Ff]\b|\b0x7[Ff]454[Cc]46\b'

  # Mach-O: 0xfeedface (32-bit), 0xfeedfacf (64-bit), 0xcafebabe (fat / Java class)
  - id: py-macho-magic-int
    desc: Mach-O magic integer literal
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\b0x[Ff]eedfac[Ee][Ff]?\b'
  - id: py-fat-binary-magic-int
    desc: Fat-binary or Java class magic integer literal
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\b0x[Cc]afe[Bb]abe\b|\b0x[Bb]ebafeca\b'

  # DEX (Android): "dex\n035\0", "dex\n036\0", "dex\n037\0", "dex\n038\0"
  - id: py-dex-magic-bytes
    desc: DEX magic byte-literal check
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: "b['\"]dex\\\\n0(35|36|37|38)['\"]"

  # WebAssembly: \0asm + version word
  - id: py-wasm-magic-bytes
    desc: WebAssembly magic byte-literal check
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: "b['\"]\\\\x00asm['\"]|b['\"]\\\\0asm['\"]"

  # Java class: 0xCAFEBABE (overlap with fat binary above; covered)

  # Python compiled (.pyc) magic — varies per version, common ones:
  # 3.8: 0x550d0d0a, 3.9: 0x610d0d0a, 3.10: 0x6f0d0d0a, 3.11: 0xa70d0d0a
  - id: py-pyc-magic-int
    desc: Python bytecode (.pyc) magic integer literal
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\b0x[0-9a-fA-F]{2}0[Dd]0[Dd]0[Aa]\b'

  # Shell/script shebang validation: b'#!/' or b'#!'
  - id: py-shebang-magic-bytes
    desc: Shebang byte-literal validation
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: "(==|!=|startswith\\s*\\(\\s*)b['\"]#!"

  # ZIP local file header (also OOXML, JAR, APK, ODT): 0x504B0304 or "PK\x03\x04"
  - id: py-zip-magic-bytes
    desc: ZIP/JAR/OOXML magic byte-literal check
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "(==|!=|startswith\\s*\\(\\s*)b['\"]PK\\\\x03\\\\x04['\"]"
  - id: py-zip-magic-int
    desc: ZIP/JAR/OOXML magic integer literal
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\b0x504[Bb]0304\b'

composite_rules:
  # Any executable-format magic check fires this aggregator. Composite
  # consumers in objectives/command-and-control/dropper/staging/ should
  # reference this rather than each individual atom. Picks up everything
  # in micro-behaviors/data/format (this directory) so the existing PE/MZ
  # atoms in pe_check.yaml are included automatically.
  - id: exec-format-magic-validation
    desc: Script validates executable-format magic bytes
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/data/format/executable/magic
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
