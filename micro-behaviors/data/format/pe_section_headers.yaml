defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: razy-section-umshmn
    desc: Custom umshMn section header
    crit: component
    conf: 0.88
    if:
      type: text
      exact: ".umshMn"
  - id: razy-section-bqpz
    desc: Custom BQPZ section header
    crit: component
    conf: 0.88
    if:
      type: text
      exact: ".BQPZ"
  - id: bqpz-huge-virtual-tiny-raw
    desc: BQPZ huge virtual raw mismatch
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      section: ".text"
      offset_range: [656, 676]
      pattern: "2E 42 51 50 5A 00 00 00 AE 5C 03 00 00 80 02 00 00 02 00 00"
composite_rules:
  - id: razy-custom-section-name-cluster
    desc: Custom PE section header cluster
    crit: notable
    conf: 0.9
    all:
      - id: razy-section-umshmn
      - id: razy-section-bqpz
