defaults:
  platforms: [unix, windows]
  # HTML/JavaScript have canonical UI-style atoms elsewhere; keep these
  # text-format observations for stylesheet-like documents and raw text.
  for: [markdown, text, xml, rtf, ooxml]

traits:
- id: display-none
  desc: CSS rule hides elements with display:none
  crit: baseline
  conf: 0.82
  if:
    type: text
    regex: '\bdisplay\s*:\s*none\b'
    case_insensitive: true

- id: visibility-hidden
  desc: Hides elements with CSS visibility:hidden
  crit: baseline
  conf: 0.8
  if:
    type: text
    regex: '\bvisibility\s*:\s*hidden\b'
    case_insensitive: true

- id: opacity-zero
  desc: CSS rule makes elements fully transparent
  crit: baseline
  conf: 0.78
  if:
    type: text
    regex: '\bopacity\s*:\s*0\b'
    case_insensitive: true
