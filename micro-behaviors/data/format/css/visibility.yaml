defaults:
  platforms: [unix, windows]
  for: [html, markdown, text, xml, rtf, ooxml]

traits:
- id: display-none
  desc: CSS display none rule
  crit: component
  conf: 0.82
  if:
    type: raw
    regex: 'display\s*:\s*none'
    case_insensitive: true

- id: visibility-hidden
  desc: CSS visibility hidden rule
  crit: baseline
  conf: 0.8
  if:
    type: raw
    regex: 'visibility\s*:\s*hidden'
    case_insensitive: true

- id: opacity-zero
  desc: CSS opacity zero rule
  crit: baseline
  conf: 0.78
  if:
    type: raw
    regex: 'opacity\s*:\s*0'
    case_insensitive: true
