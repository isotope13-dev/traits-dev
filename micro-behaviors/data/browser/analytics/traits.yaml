# Browser Analytics - Tracking IDs
defaults:
  for: [scripts, binaries]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  - id: google-analytics-id
    desc: Hardcoded Google Analytics tracking ID
    crit: notable
    conf: 0.8
    platforms: [unix, windows]
    if:
      type: string_value
      regex: "UA-\\d{5,9}-\\d{1,3}"
