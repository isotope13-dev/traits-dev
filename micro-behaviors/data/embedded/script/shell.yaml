# A shell-script shebang embedded inside a non-shell source file (build configs,
# JVM/Kotlin DSL build steps, code generators). On its own this is a neutral
# mechanic — CI tooling embeds shell build steps legitimately — so it is a
# component-level observation. Command-execution objectives (e.g. the Kotlin/JVM
# reflection-command-exec composites) combine it with a reflective or
# ProcessBuilder spawn to assert intent.
defaults:
  platforms: [unix]
  for: [source, class, jar]
  crit: component
traits:
  - id: embedded-shell-shebang
    desc: POSIX shell shebang embedded in a file
    crit: notable
    conf: 0.8
    platforms: [unix, windows]
    for: [elf, macho, pe]
    if:
      type: text
      substr: "#!/bin/sh"
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/harness/unit/
  - id: embedded-bash-shebang
    desc: Embedded bash script shebang
    conf: 0.9
    if:
      type: text
      substr: "#!/bin/bash"
  # A generated shell statement is neutral; the login-banner objective
  # combines it with a redirect into a live shell rc.
  - id: embedded-shell-print-command
    desc: Shell print command embedded as string
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: '(echo|printf)\s+["''](\s*(echo|printf|wall)\b)'
