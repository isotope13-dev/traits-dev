# A shell-script shebang embedded inside a non-shell source file (build configs,
# JVM/Kotlin DSL build steps, code generators). On its own this is a neutral
# mechanic — CI tooling embeds shell build steps legitimately — so it is a
# component-level observation. Command-execution objectives (e.g. the Kotlin/JVM
# reflection-command-exec composites) combine it with a reflective or
# ProcessBuilder spawn to assert intent.
defaults:
  platforms: [unix]
  for: [source]
  crit: component
traits:
  - id: embedded-bash-shebang
    desc: Embedded bash script shebang
    conf: 0.9
    if:
      type: text
      substr: "#!/bin/bash"
