defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: photoshop-cc-2018-metadata
    desc: Embedded Photoshop CC 2018 image metadata
    crit: baseline
    conf: 0.9
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    if:
      type: text
      substr: Adobe Photoshop CC 2018 (Windows)
      section: ".text"

  - id: photoshop-xmp-creator-tool
    desc: Embedded XMP CreatorTool names Photoshop CC 2018
    crit: baseline
    conf: 0.9
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    if:
      type: text
      substr: xmp:CreatorTool="Adobe Photoshop CC 2018 (Windows)"
      section: ".text"

  - id: photoshop-xmp-history-agent
    desc: Embedded XMP history names Photoshop CC 2018
    crit: baseline
    conf: 0.9
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    if:
      type: text
      substr: stEvt:softwareAgent="Adobe Photoshop CC 2018 (Windows)"
      section: ".text"

  - id: xmp-png-jpeg-derivation
    desc: Embedded XMP records PNG to JPEG conversion
    crit: baseline
    conf: 0.9
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    if:
      type: text
      substr: converted from image/png to image/jpeg
      section: ".text"
