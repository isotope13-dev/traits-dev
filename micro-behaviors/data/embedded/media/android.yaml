defaults:
  for: [archives]
  platforms: [android]
  crit: component
  conf: 0.86

traits:
  - id: apk-scream-raw-mp3-resource
    desc: APK scream MP3 resource
    if:
      type: text
      substr: "res/raw/scream.mp3"

  - id: apk-short-raw-mp3-resource
    desc: APK short raw MP3 resource
    if:
      type: text
      regex: "res/raw/[a-z0-9_]{1,4}\\.mp3"

  - id: apk-short-raw-mp3-pair
    desc: APK short raw MP3 pair
    count_min: 2
    if:
      type: text
      regex: "res/raw/[a-z0-9_]{1,8}\\.mp3"

  - id: apk-raw-resource-burst
    desc: APK repeated raw resources
    count_min: 5
    if:
      type: text
      substr: "res/raw/"

  - id: apk-short-drawable-image-resource
    desc: APK short drawable image resource
    if:
      type: text
      regex: "res/drawable.{0,32}/[a-z0-9_]{1,4}\\.png"

  - id: apk-fff-raw-mp3-resource
    desc: APK fff raw MP3 resource
    if:
      type: text
      substr: "res/raw/fff.mp3"

  - id: apk-aaa-drawable-resource
    desc: APK aaa drawable resource
    if:
      type: text
      substr: "res/drawable-xhdpi-v4/aaa.png"

  - id: apk-lll-drawable-resource
    desc: APK lll drawable resource
    if:
      type: text
      substr: "res/drawable-xhdpi-v4/lll.png"

  - id: apk-eyes-drawable-sequence
    desc: APK eyes drawable sequence
    count_min: 3
    if:
      type: text
      regex: "res/drawable[^/]{0,32}/eyes[0-9]?\\.png"

composite_rules:
  - id: apk-short-raw-mp3-burst
    desc: APK repeated short MP3 resources
    crit: component
    conf: 0.9
    all:
      - id: apk-short-raw-mp3-resource
      - id: apk-raw-resource-burst

  - id: apk-scare-audio-image-set
    desc: APK scare audio image set
    crit: notable
    conf: 0.92
    all:
      - id: apk-scream-raw-mp3-resource
      - id: apk-short-raw-mp3-pair
      - id: apk-eyes-drawable-sequence

  - id: apk-fff-aaa-lll-media-set
    desc: APK fff aaa lll media set
    crit: component
    conf: 0.94
    all:
      - id: apk-fff-raw-mp3-resource
      - id: apk-aaa-drawable-resource
      - id: apk-lll-drawable-resource
