defaults:
  for: [archives]
  platforms: [android]
  crit: component
  conf: 0.86

traits:
  - id: apk-short-raw-mp3-resource
    desc: APK short raw MP3 resource
    if:
      type: raw
      regex: "res/raw/[a-z0-9_]{1,4}\\.mp3"

  - id: apk-raw-resource-burst
    desc: APK repeated raw resources
    count_min: 5
    if:
      type: raw
      substr: "res/raw/"

  - id: apk-short-drawable-image-resource
    desc: APK short drawable image resource
    if:
      type: raw
      regex: "res/drawable.{0,32}/[a-z0-9_]{1,4}\\.png"

composite_rules:
  - id: apk-short-raw-mp3-burst
    desc: APK repeated short MP3 resources
    crit: component
    conf: 0.9
    all:
      - id: apk-short-raw-mp3-resource
      - id: apk-raw-resource-burst
