# Embedded JPEG image detection in PE binaries
# Used by malware to embed defacement images, icons, or steganographic payloads
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
traits:
- id: jpeg-marker-in-section
  desc: JPEG image marker found in binary section
  crit: notable
  conf: 0.9
  if:
    type: hex
    pattern: "FF D8 FF E0"
    section: rsrc

- id: jpeg-exif-marker
  desc: JPEG EXIF header marker
  crit: component
  conf: 0.95
  if:
    type: text
    exact: Exif

- id: jpeg-sony-camera
  desc: Sony camera EXIF data in binary
  crit: component
  conf: 0.98
  if:
    type: text
    regex: 'SONY\s+DSC'

- id: jpeg-adobe-xmp
  desc: Adobe XMP metadata in embedded JPEG
  crit: component
  conf: 0.95
  if:
    type: text
    exact: XMP

composite_rules:
- id: embedded-jpeg-image
  desc: Embedded JPEG image in binary
  crit: notable
  conf: 0.92
  all:
  - id: jpeg-marker-in-section
  any:
  - id: jpeg-exif-marker
  - id: jpeg-sony-camera
  - id: jpeg-adobe-xmp
