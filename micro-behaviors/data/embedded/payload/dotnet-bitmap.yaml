defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1027.003
  mbc: F0001.006

traits:
  - id: dotnet-bitmap-type-token
    desc: .NET Bitmap type reference
    crit: component
    conf: 0.82
    if:
      type: text
      exact: System.Drawing.Bitmap

  - id: dotnet-resource-manager-token
    desc: .NET resource manager reference
    crit: component
    conf: 0.78
    if:
      type: text
      substr: ResourceManager

  - id: dotnet-resource-getter-token
    desc: .NET generated resource getter
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '^get_[A-Za-z0-9_]{2,32}$'

composite_rules:
  - id: dotnet-resource-backed-bitmap
    desc: .NET resource-backed bitmap object
    crit: notable
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bitmap-type-token
      - id: dotnet-resource-manager-token
    any:
      - id: dotnet-resource-getter-token
      - id: micro-behaviors/data/embedded/payload::resourcemanager-getobject-call

  - id: dotnet-resource-bitmap-pixel-readback
    desc: .NET resource bitmap pixel readback
    crit: notable
    conf: 0.92
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bitmap-type-token
      - id: dotnet-resource-manager-token
      - id: micro-behaviors/data/encode/image::pixel-access-getpixel
    any:
      - id: dotnet-resource-getter-token
      - id: micro-behaviors/data/embedded/payload::resourcemanager-getobject-call
