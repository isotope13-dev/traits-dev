defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  for: [pe, elf, macho]
traits:
  - id: nuitka-onefile-strings
    desc: Nuitka one-file packer strings
    crit: notable
    conf: 0.9
    mbc: "B0032"
    attack: "T1027.009"
    count_min: 2
    if:
      type: string
      substr: "NUITKA_ONEFILE_"
  - id: nuitka-loader-strings
    desc: Nuitka module loader metadata
    crit: baseline
    if:
      type: string
      substr: "Nuitka_"
composite_rules:
  - id: nuitka-packer
    desc: Nuitka compiled Python executable (packer)
    crit: suspicious
    conf: 0.8
    mbc: "B0032"
    attack: "T1027.002"
    all:
      - id: nuitka-onefile-strings
      - id: micro-behaviors/data/embedded/payload::zstd-magic
