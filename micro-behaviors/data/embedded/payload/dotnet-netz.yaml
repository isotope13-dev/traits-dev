defaults:
  for: [pe, csharp]
  platforms: [windows]

traits:
  - id: assemblyresolve-hook
    desc: AssemblyResolve event registration
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: AppDomain\.CurrentDomain\.AssemblyResolve \+=|add_AssemblyResolve
  - id: app-resource-manager
    desc: ResourceManager for app payload
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ResourceManager("app", Assembly.GetExecutingAssembly())
  - id: file-based-resource-manager-netz
    desc: File based -netz resources
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: CreateFileBasedResourceManager
  - id: netz-resource-suffix
    desc: -netz resource suffix marker
    crit: component
    conf: 0.98
    if:
      type: string_literal
      exact: -netz.resources
  - id: zip-dll-resource
    desc: Embedded zip helper resource
    crit: component
    conf: 0.96
    if:
      type: string_literal
      exact: zip.dll
  - id: resource-name-mangling
    desc: Resource key mangling markers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '!1.{0,80}!2.{0,80}!3.{0,80}!4'
    unless:
      # Embedded CodeMirror/Lezer parser tables also use !1..!N state markers.
      - type: text
        regex: '\b(?:lezer|codemirror|tree-sitter)\b'
        case_insensitive: true
      # The Netz packer is a .NET tool — only fire on managed PE binaries.
      - type: metrics
        field: pe.is_dotnet
        max: 0
  - id: zdll-probe-suffix
    desc: z.dll sidecar probe suffix
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: assName + NetzStarter.NetzSuffix
  - id: resource-fallback-dll-probe
    desc: Resource fallback DLL probe
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: data = NetzStarter.ResolveDLL(assName)
  - id: openread-byte-loader
    desc: File.OpenRead byte loader
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: File.OpenRead(file)

composite_rules:
  - id: netz-resource-loader-primitives
    desc: Netz resource-backed loader primitives
    crit: suspicious
    conf: 0.96
    all:
      - id: assemblyresolve-hook
      - id: app-resource-manager
      - id: file-based-resource-manager-netz
    any:
      - id: netz-resource-suffix
      - id: zip-dll-resource
  - id: netz-dll-probe-fallback
    desc: Netz DLL sidecar fallback loading
    crit: suspicious
    conf: 0.95
    all:
      - id: zdll-probe-suffix
      - id: resource-fallback-dll-probe
    any:
      - id: openread-byte-loader
      - id: zip-dll-resource
