---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: zip-magic
  desc: Embedded ZIP archive
  crit: baseline
  conf: 0.4
  if:
    type: hex
    section: ".text"
    pattern: 50 4B 03 04
- id: zip-magic-multiple-pe
  desc: Multiple embedded ZIP local headers in PE
  crit: notable
  conf: 0.75
  attack: T1027.009
  for:
  - pe
  size_min: 200000
  count_min: 3
  if:
    type: hex
    pattern: 50 4B 03 04
    section: ".rsrc"
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: well-known/game/mod::wynncraft-overhaul-installer
  downgrade:
    any:
    - id: metadata/library/compression::archive-lib
    - id: metadata/library/compression::compression-lib
- id: zip-locals-in-data-pe
  desc: Multiple ZIP locals in PE data
  crit: notable
  conf: 0.86
  attack: T1027.009
  for:
  - pe
  platforms:
  - windows
  size_min: 200000
  count_min: 2
  if:
    type: hex
    pattern: 50 4B 03 04
    section: ".data"
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/installer/family::known-benign-installer
  - id: well-known/game/mod::wynncraft-overhaul-installer
  downgrade:
    any:
    - id: metadata/library/compression::archive-lib
    - id: metadata/library/compression::compression-lib
- id: rar-magic
  desc: Embedded RAR archive
  crit: notable
  conf: 0.6
  if:
    type: hex
    section: ".text"
    pattern: 52 61 72 21 1A 07
- id: 7z-magic
  desc: Embedded 7-Zip archive
  crit: notable
  conf: 0.6
  size_min: 262144
  if:
    type: hex
    section: ".text"
    pattern: 37 7A BC AF 27 1C
  unless:
  - type: text
    substr: costura.costura.dll.compressed
