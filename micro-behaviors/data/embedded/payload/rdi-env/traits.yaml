# Reflective DLL Injection (RDI) environment variable patterns.
# These env var names are used by RDI frameworks to pass parameters
# to injected payloads via the child process environment block.
# Highly specific to reflective injection tooling — not used by legitimate software.
defaults:
  platforms: [windows]
  for: [go, c, cpp, pe, dll, python, powershell, wasm]
  crit: suspicious
  conf: 0.95
  attack: T1055.001
  mbc: C0032
traits:
  - id: rdi-dll-section
    desc: RDI DLL section name environment variable
    if:
      type: text
      word: RDI_DLL_SECTION
  - id: rdi-search-path
    desc: RDI search path environment variable
    if:
      type: text
      word: RDI_SEARCH_PATH
  - id: rdi-replace-path
    desc: RDI replace path environment variable
    if:
      type: text
      word: RDI_REPLACE_PATH
  - id: rdi-dll-size
    desc: RDI DLL size environment variable
    if:
      type: text
      word: RDI_DLL_SIZE
composite_rules:
  - id: rdi-env-var-cluster
    desc: Reflective DLL injection environment variable cluster
    crit: suspicious
    conf: 0.97
    all:
      - id: rdi-dll-section
    any:
      - id: rdi-search-path
      - id: rdi-replace-path
      - id: rdi-dll-size
    needs: 2
