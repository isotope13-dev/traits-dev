defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: wpf-get-resource-stream
    desc: WPF resource stream lookup
    crit: component
    conf: 0.82
    if:
      type: string_value
      exact: GetResourceStream
  - id: wpf-find-resource-stream
    desc: WPF application resource lookup
    crit: component
    conf: 0.84
    if:
      type: string_value
      exact: FindApplicationResourceStream
  - id: wpf-resource-info
    desc: WPF stream resource info
    crit: component
    conf: 0.78
    if:
      type: string_value
      exact: StreamResourceInfo
  - id: wpf-generated-resources
    desc: WPF generated resource bundle
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: '\.g\.resources$'
composite_rules:
  - id: wpf-resource-stream-access
    desc: WPF embedded resource stream access
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: wpf-get-resource-stream
      - id: wpf-find-resource-stream
      - id: wpf-resource-info
      - id: wpf-generated-resources
