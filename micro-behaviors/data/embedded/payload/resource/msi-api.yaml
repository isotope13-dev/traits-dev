  crit: component
  conf: 0.9
  for:
  - oledoc
  - ole
  platforms:
  - windows
  if:
    type: raw
    substr: FindResourceA
- id: msi-embedded-load-resource
  desc: MSI embedded LoadResource reference
  crit: component
  conf: 0.9
  for:
  - oledoc
  - ole
  platforms:
  - windows
  if:
    type: raw
    substr: LoadResource
- id: msi-embedded-sizeof-resource
  desc: MSI embedded SizeofResource reference
  crit: component
  conf: 0.9
  for:
  - oledoc
  - ole
  platforms:
  - windows
  if:
    type: raw
    substr: SizeofResource
composite_rules:
- id: msi-embedded-resource-loader-apis
  desc: MSI embedded PE resource loader APIs
  crit: component
  conf: 0.95
  for:
