defaults:
  platforms: [windows]
traits:
  - id: resx-byte-array-resource
    desc: RESX byte array resource entry
    crit: component
    conf: 0.86
    for: [html, plist]
    platforms: [macos, ios]
    if:
      type: text
      substr: type="System.Byte[], mscorlib"
  - id: resx-embedded-pe-base64
    desc: RESX embedded PE payload blob
    crit: suspicious
    conf: 0.96
    attack: T1027.009
    mbc: F0001.006
    for: [html, plist]
    platforms: [macos, ios]
    if:
      type: text
      substr: TVqQAAMAAAAEAAAA//8AALgAAAAAAAAAQAAAAAAAAA
  - id: resourcemanager-getobject-call
    desc: ResourceManager.GetObject call
    crit: notable
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: .GetObject(
  - id: resourcemanager-getresourceset-call
    desc: ResourceManager resource set enumeration
    crit: notable
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: .GetResourceSet(
composite_rules:
  - id: resx-embedded-pe-resource
    desc: RESX resource carries PE payload
    crit: suspicious
    conf: 0.97
    for: [html, plist]
    platforms: [macos, ios]
    all:
      - id: resx-byte-array-resource
      - id: resx-embedded-pe-base64
