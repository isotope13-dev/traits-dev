---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: lock-resource
  desc: Access PE resource data pointer
  crit: baseline
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  if:
    type: symbol
    exact: LockResource
- id: find-resource-w
  desc: Locate PE resource entry
  crit: baseline
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  if:
    type: symbol
    exact: FindResourceW
- id: find-resource-a
  desc: Locate PE resource entry (ANSI)
  crit: baseline
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  if:
    type: symbol
    exact: FindResourceA
- id: find-resource-ex-w
  desc: Locate PE resource entry with language
  crit: baseline
  conf: 0.85
  attack: T1027.009
  for:
  - pe
  if:
    type: symbol
    exact: FindResourceExW
- id: find-resource-ex-a
  desc: Locate PE resource entry with language (ANSI)
  crit: baseline
  conf: 0.85
  attack: T1027.009
  for:
  - pe
  if:
    type: symbol
    exact: FindResourceExA
- id: load-resource
  desc: Load PE resource payload
  crit: baseline
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  if:
    type: symbol
    exact: LoadResource
- id: sizeof-resource
  desc: Size PE resource payload
  crit: baseline
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  if:
    type: symbol
    exact: SizeofResource
- id: end-update-resource-w
  desc: Commit PE resource modifications
  crit: notable
  conf: 0.8
  for:
  - pe
  if:
    type: symbol
    exact: EndUpdateResourceW
composite_rules:
- id: find-resource-any
  desc: Locates a PE resource entry
  crit: notable
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  any:
  - id: find-resource-w
  - id: find-resource-a
  - id: find-resource-ex-w
  - id: find-resource-ex-a
- id: load-library-ex-any
  desc: Extended DLL loading (ANSI/Unicode)
  crit: component
  conf: 0.8
  for:
  - pe
  any:
  - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
  - id: micro-behaviors/dylib/load/runtime::load-library-ex-a
- id: pe-resource-loader-api-chain
  desc: PE resource extraction API chain
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  all:
  - id: find-resource-any
  - id: load-resource
  - id: sizeof-resource
  any:
  - id: load-library-ex-any
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/signed/platform/
    - id: metadata/binary/symbols/exports/
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/lang/compiler/managed/
- id: pe-resource-full-extraction
  desc: Complete PE resource extraction with data access
  crit: notable
  conf: 0.95
  attack: T1027.009
  for:
  - pe
  all:
  - id: find-resource-any
  - id: load-resource
  - id: sizeof-resource
  - id: lock-resource
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/signed/platform/
    - id: metadata/binary/symbols/exports/
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/lang/compiler/managed/
- id: pe-resource-load-lock-chain
  desc: PE resource load and data pointer chain
  crit: baseline
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  all:
  - id: find-resource-any
  - id: load-resource
  - id: lock-resource
