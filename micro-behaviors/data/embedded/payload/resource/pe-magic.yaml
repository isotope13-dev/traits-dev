---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: pe-magic-in-rsrc
  desc: PE/MZ binary embedded in resource section
  crit: component
  for:
  - pe
  if:
    type: hex
    pattern: 4D 5A 90 00
    section: ".rsrc"
    offset_range:
    - 4096
    - 
- id: pe-magic-in-rsrc-multiple
  desc: Multiple PE/MZ binaries in resources
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  size_min: 200000
  count_min: 3
  if:
    type: hex
    pattern: 4D 5A 90 00
    section: ".rsrc"
    offset_range:
    - 4096
    - 
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/installer/family::known-benign-installer
    - id: well-known/tool/sysadmin/netch::netch-component
    - type: basename
      regex: "(?i)^.{0,80}netch.{0,80}\\.(7z|zip)$"
- id: pe-magic-in-rdata
  desc: PE/MZ header pattern inside .rdata
  crit: component
  for:
  - pe
  if:
    type: hex
    pattern: 4D 5A 90 00
    section: ".rdata"
    offset_range:
    - 4096
    - 
