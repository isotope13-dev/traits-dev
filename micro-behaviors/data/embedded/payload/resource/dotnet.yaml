defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009

traits:
  - id: dotnet-getresourceset-token
    desc: .NET resource set retrieval token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetResourceSet

  - id: dotnet-resourceset-token
    desc: .NET ResourceSet token
    crit: component
    conf: 0.74
    if:
      type: text
      exact: ResourceSet

  - id: dotnet-numbered-image-resource-path
    desc: Numbered image-named managed resource
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'resources/[0-9]{6,}\.(jpg|jpeg|png|gif|bmp)$'

composite_rules:
  - id: dotnet-image-resource-set-access
    desc: .NET image-named resource set access
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-numbered-image-resource-path
      - id: dotnet-getresourceset-token
    any:
      - id: micro-behaviors/data/embedded/payload::dotnet-resource-reader
      - id: dotnet-resourceset-token
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcemanager
    unless:
      - id: micro-behaviors/data/embedded/payload::costura-bundle-marker
