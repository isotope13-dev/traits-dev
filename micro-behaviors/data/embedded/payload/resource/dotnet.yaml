defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009

traits:
- id: dotnet-getresourceset-token
  desc: .NET resource set retrieval token
  crit: component
  conf: 0.82
  if:
    type: text
    exact: GetResourceSet

- id: dotnet-resourceset-token
  desc: .NET ResourceSet token
  crit: component
  conf: 0.74
  if:
    type: text
    exact: ResourceSet

- id: dotnet-numbered-image-resource-path--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'resources/[0-9]{6,}\.(jpg|jpeg)$'

  count_max: 1009401
- id: dotnet-numbered-image-resource-path--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'resources/[0-9]{6,}\.(png|gif)$'

  count_max: 1009402
- id: dotnet-numbered-image-resource-path--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'resources/[0-9]{6,}\.(bmp)$'

  count_max: 1009403
composite_rules:
- id: dotnet-image-resource-set-access
  desc: .NET image-named resource set access
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/binary/framework::dotnet-assembly
  - id: dotnet-numbered-image-resource-path
  - id: dotnet-getresourceset-token
  any:
  - id: micro-behaviors/data/embedded/payload/resource::dotnet-resource-reader
  - id: dotnet-resourceset-token
  - id: micro-behaviors/data/embedded/payload/resource::dotnet-resourcemanager
  unless:
  - id: micro-behaviors/data/embedded/payload/resource::costura-bundle-marker
- id: dotnet-numbered-image-resource-path
  desc: Numbered image-named managed resource
  crit: component
  conf: 0.9
  any:
  - id: dotnet-numbered-image-resource-path--rx-1
  - id: dotnet-numbered-image-resource-path--rx-2
  - id: dotnet-numbered-image-resource-path--rx-3
