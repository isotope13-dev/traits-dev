defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.009
traits:
  - id: native-ldr-resource-api-name
    desc: Native Ldr resource API name
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bLdr(FindResource_U|AccessResource)\b'
  - id: ldr-access-resource-fragment-stack
    desc: Fragmented LdrAccessResource strings
    crit: component
    conf: 0.82
    if:
      type: hex
      section: .rdata
      pattern: '73 52 65 73 6F 75 72 63 65 00 [0-16] 41 63 63 65 73 00 [0-16] 4C 64 72 00 [0-16] 75 72 63 65 5F 55'
composite_rules:
  - id: native-resource-api-resolution
    desc: Native PE resource API resolution
    crit: notable
    conf: 0.9
    all:
      - id: native-ldr-resource-api-name
      - id: micro-behaviors/os/syscall/invoke::ntdll-import
      - id: micro-behaviors/os/module/load::get-proc-address-import
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::is-microsoft-named
  - id: fragmented-native-resource-resolution
    desc: Fragmented native resource API resolution
    crit: suspicious
    conf: 0.92
    all:
      - id: native-resource-api-resolution
      - id: ldr-access-resource-fragment-stack
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::is-microsoft-named
