---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: dotnet-getmanifestresourcestream
  desc: ".NET manifest resource stream access"
  crit: baseline
  conf: 0.85
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    exact: GetManifestResourceStream
- id: dotnet-resource-reader
  desc: ".NET ResourceReader payload access"
  crit: component
  conf: 0.86
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    substr: System.Resources.ResourceReader
- id: dotnet-getobject-token
  desc: ".NET resource GetObject token"
  crit: component
  conf: 0.72
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    exact: GetObject
- id: dotnet-resourcemanager
  desc: ".NET resource manager access"
  crit: component
  conf: 0.55
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    word: ResourceManager
  not:
  - substr: TResourceManager
  - substr: Resources.Core.ResourceManager
  - substr: get_ResourceManager
  - substr: CreateResourceManager
  - substr: ourResourceManager
  - substr: ErrorJetResourceManager
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
- id: dotnet-filterresources-iterator
  desc: ".NET resource filter iterator"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    regex: "^<FilterResources>d__\\d+`1$"
- id: costura-bundle-marker
  desc: Costura embedded assembly bundle marker
  crit: component
  conf: 0.8
  for:
  - pe
  - dll
  if:
    type: text
    substr: costura.costura.dll.compressed
- id: dotnet-getmanifestresourcenames
  desc: ".NET embedded resource enumeration"
  crit: notable
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    substr: GetManifestResourceNames
  unless:
  - id: costura-bundle-marker
  - id: metadata/binary/framework::dotnet-singlefilehost-runtime
- id: hex-named-resource-entries
  desc: Hex-named resource entries (chunked payload)
  crit: notable
  conf: 0.8
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    regex: "(?s)RES_[0-9A-Fa-f]{6}.{0,64}RES_[0-9A-Fa-f]{6}"
composite_rules:
- id: dotnet-managed-resource-access
  desc: ".NET embedded resource access"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  all:
  - id: dotnet-getmanifestresourcestream
  any:
  - id: dotnet-resourcemanager
  - id: dotnet-getmanifestresourcenames
  unless:
  - id: costura-bundle-marker
- id: dotnet-resource-reader-access
  desc: ".NET ResourceReader embedded resource access"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  all:
  - id: dotnet-resource-reader
  - id: dotnet-resourcemanager
  any:
  - id: dotnet-getobject-token
  - id: dotnet-getmanifestresourcenames
  unless:
  - id: costura-bundle-marker
