---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: dotnet-getmanifestresourcestream
  desc: ".NET manifest resource stream access"
  crit: baseline
  conf: 0.85
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    exact: GetManifestResourceStream
- id: dotnet-resource-reader
  desc: ".NET ResourceReader payload access"
  crit: component
  conf: 0.86
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    substr: System.Resources.ResourceReader
- id: dotnet-get-resource-data
  desc: ".NET GetResourceData payload access"
  crit: component
  conf: 0.86
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    exact: GetResourceData
- id: dotnet-getobject-token
  desc: ".NET resource GetObject token"
  crit: component
  conf: 0.72
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    exact: GetObject
- id: dotnet-resourcemanager
  desc: ".NET resource manager access"
  crit: component
  conf: 0.55
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    word: ResourceManager
  not:
  - substr: TResourceManager
  - substr: Resources.Core.ResourceManager
  - substr: get_ResourceManager
  - substr: CreateResourceManager
  - substr: ourResourceManager
  - substr: ErrorJetResourceManager
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
- id: dotnet-filterresources-iterator
  desc: ".NET resource filter iterator"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    regex: "^<FilterResources>d__\\d+`1$"
- id: costura-bundle-marker
  desc: Costura embedded assembly bundle marker
  crit: component
  conf: 0.8
  for:
  - pe
  - dll
  if:
    type: text
    substr: costura.costura.dll.compressed
- id: dotnet-getmanifestresourcenames
  desc: ".NET embedded resource enumeration"
  crit: notable
  conf: 0.8
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    substr: GetManifestResourceNames
  unless:
  - id: costura-bundle-marker
  - id: metadata/binary/framework/
- id: hex-named-resource-entries
  desc: Hex-named resource entries (chunked payload)
  crit: notable
  conf: 0.8
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  if:
    type: text
    regex: "(?s)RES_[0-9A-Fa-f]{6}.{0,64}RES_[0-9A-Fa-f]{6}"
- id: dotnet-source-resource-reader-call
  desc: ".NET ResourceReader source call"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - csharp
  if:
    type: symbol
    kind: call
    regex: '(^|\.)ResourceReader$'
- id: dotnet-source-get-resource-data-call
  desc: ".NET GetResourceData source call"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - csharp
  if:
    type: symbol
    kind: call
    regex: '(^|\.)GetResourceData$'
- id: dotnet-source-manifest-resource-stream-call
  desc: ".NET manifest resource stream source call"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - csharp
  if:
    type: symbol
    kind: call
    regex: '(^|\.)GetManifestResourceStream$'
- id: dotnet-source-manifest-resource-names-call
  desc: ".NET manifest resource enumeration source call"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - csharp
  if:
    type: symbol
    kind: call
    regex: '(^|\.)GetManifestResourceNames$'
- id: dotnet-source-resource-blockcopy-trim
  desc: ".NET resource header trim copy"
  crit: notable
  conf: 0.88
  attack: T1027.009
  for:
  - csharp
  if:
    type: symbol
    kind: call
    exact: Buffer.BlockCopy
composite_rules:
- id: dotnet-embedded-resource-read-any
  desc: .NET embedded resource read (any API)
  crit: component
  conf: 0.86
  attack: T1027.009
  for:
  - pe
  any:
  - id: dotnet-getmanifestresourcestream
  - id: dotnet-resourcemanager
  - id: dotnet-get-resource-data
  - id: dotnet-getobject-token
  - id: dotnet-getmanifestresourcenames
  - id: dotnet-resource-reader
- id: dotnet-stream-resource-access-path
  desc: ".NET manifest resource stream access path"
  crit: component
  conf: 0.86
  attack: T1027.009
  for:
  - pe
  all:
  - id: dotnet-getmanifestresourcestream
  any:
  - id: dotnet-resourcemanager
  - id: dotnet-getmanifestresourcenames
  unless:
  - id: costura-bundle-marker
- id: dotnet-source-resource-data-extraction
  desc: ".NET source resource data extraction"
  crit: suspicious
  conf: 0.94
  attack: T1027.009
  for:
  - csharp
  all:
  - id: dotnet-source-resource-reader-call
  - id: dotnet-source-get-resource-data-call
  - id: dotnet-source-manifest-resource-stream-call
  any:
  - id: dotnet-source-manifest-resource-names-call
  - id: dotnet-source-resource-blockcopy-trim
- id: dotnet-managed-resource-access
  desc: ".NET embedded resource access path"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  any:
  - id: dotnet-stream-resource-access-path
  - id: dotnet-resource-reader-access
  unless:
  - id: costura-bundle-marker
- id: dotnet-resource-reader-access
  desc: ".NET ResourceReader embedded resource access"
  crit: notable
  conf: 0.9
  attack: T1027.009
  for:
  - pe
  all:
  - id: dotnet-resource-reader
  - id: dotnet-resourcemanager
  any:
  - id: dotnet-getobject-token
  - id: dotnet-getmanifestresourcenames
  unless:
  - id: costura-bundle-marker
- id: dotnet-resource-data-access
  desc: ".NET ResourceReader GetResourceData access"
  crit: notable
  conf: 0.92
  attack: T1027.009
  for:
  - pe
  all:
  - id: dotnet-getmanifestresourcestream
  - id: dotnet-resource-reader
  - id: dotnet-get-resource-data
  unless:
  - id: costura-bundle-marker
