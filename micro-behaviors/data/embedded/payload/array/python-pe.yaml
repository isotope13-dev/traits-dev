# Python source carrying or referring to an embedded Windows PE payload.
defaults:
  platforms: [windows]
  for: [python]
  crit: notable
  conf: 0.95

traits:
  - id: embedded-pe-byte-array
    desc: Embedded PE byte array
    if:
      type: text
      regex: '(?is)\b[A-Za-z_]\w*\s*=\s*\[\s*0x4d\s*,\s*0x5a\s*,\s*0x'

  - id: python-references-embedded-pe-module
    desc: Python references embedded PE module bytes
    if:
      type: text
      regex: '\bembed\.kmp\b'
