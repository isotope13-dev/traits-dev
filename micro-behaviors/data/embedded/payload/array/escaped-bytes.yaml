# Binary blobs embedded into source/script text as C-style "\xNN" byte escapes.
# This is the emit format of every mainstream shellcode generator (msfvenom
# -f c/python/perl/ruby/php, donut, sRDI) and of xxd-style dumpers: a payload is
# written out as quoted rows of fixed-width byte escapes, one row per line,
# concatenated by the language's adjacent-string-literal rule.
#
# Neutral on its own — a C file legitimately embeds test vectors, key material,
# or a compressed resource this way, and this fires on any such blob regardless
# of content. It records only "this file carries a binary blob as escaped
# bytes". Objective composites (shellcode staging, extension masquerade,
# API-hash loaders) reference it and supply the intent evidence.
#
# `for:` is the set of languages whose string syntax actually uses \xNN escapes
# — i.e. the languages shellcode generators emit this shape into.
# Sibling array/c.yaml covers the `0x4d, 0x5a, ...` comma-separated form.
defaults:
  platforms: [windows, unix]
  for: [c, cpp, python, powershell, perl, ruby, php, javascript]
traits:
  - id: quoted-byte-escape-rows
    desc: Quoted \x byte-escape rows (payload blob)
    crit: notable
    conf: 0.9
    # 16+ rows: a couple of short escaped strings are ordinary source; a wall of
    # fixed-width escape rows is a dumped payload.
    count_min: 16
    if:
      type: text
      regex: '(?m)^[ \t]*"(\\x[0-9a-fA-F]{2}){8,32}",?;?$'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
