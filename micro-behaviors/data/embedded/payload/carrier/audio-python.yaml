# Python Audio-Embedded Payload Extraction
# Detects use of the wave module to read audio frames as raw data,
# a technique used to extract hidden payloads from WAV files.
# MBC: F0001.006 (Embedded Payload)
# ATT&CK: T1027.003 (Steganography)
defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: "F0001.006"
  attack: "T1027.003"
traits:
  - id: wave-open
    desc: Python wave module opens audio file
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "wave.open"
  - id: wave-readframes
    desc: Read raw audio frames from WAV file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.readframes\s*\('
