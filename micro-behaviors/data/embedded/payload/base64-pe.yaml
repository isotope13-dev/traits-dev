# Base64-Encoded PE Executable Detection
# Detects base64-encoded PE/MZ executables embedded in scripts
# MBC: F0001.006 (Embedded Payload)
# ATT&CK: T1027.009 (Embedded Payloads)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts]
  mbc: "F0001.006"
  attack: "T1027.009"
traits:
  # TVqQ is the base64 encoding of the MZ header (4D 5A 90 00)
  # Followed by extensive base64 = embedded PE executable
  - id: base64-pe-header
    desc: Base64-encoded PE executable (MZ header)
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: "TVqQ[A-Za-z0-9+/]{200,}"
