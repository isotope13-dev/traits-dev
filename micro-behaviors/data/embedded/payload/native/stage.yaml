---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: shell-echo-stage-marker
  desc: Embedded shell echo stage marker
  crit: component
  conf: 0.7
  for:
  - elf
  - macho
  if:
    type: text
    substr: echo '
composite_rules:
- id: embedded-shell-stage
  desc: Embedded shell stage in native binary
  crit: notable
  conf: 0.8
  for:
  - elf
  - macho
  all:
  - id: shell-echo-stage-marker
  - id: micro-behaviors/process/create/shell/encoded::bin-sh-binary-text
  - id: micro-behaviors/fs/file/write/direct::write
  any:
  - id: micro-behaviors/process/create/execv::c-exec-variants
  - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  unless:
  - id: well-known/tool/sysadmin/fish-bash-zsh::interactive-shell-binary-marker
