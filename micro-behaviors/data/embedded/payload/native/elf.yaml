defaults:
  platforms: [unix]
  for: [elf]
  size_max: 52428800

traits:
  - id: rodata-embedded-elf
    desc: Embedded ELF binary in rodata
    crit: notable
    conf: 0.84
    mbc: F0001.006
    attack: T1027.009
    if:
      type: hex
      section: .rodata
      pattern: 7F 45 4C 46 (01|02) (01|02) 01
      offset_range:
        - 4096
        - null
