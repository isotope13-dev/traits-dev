defaults:
  platforms: [unix]
  for: [elf]
  size_max: 52428800
  mbc: F0001.006
  attack: T1027.009

traits:
  - id: rodata-embedded-elf
    desc: Embedded ELF64 little-endian binary in rodata
    crit: notable
    conf: 0.84
    if:
      type: hex
      section: .rodata
      pattern: 7F 45 4C 46 02 01 01
      offset_range:
        - 4096
        - null

  - id: rodata-embedded-elf32-le
    desc: Embedded ELF32 little-endian binary in rodata
    crit: notable
    conf: 0.84
    if:
      type: hex
      section: .rodata
      pattern: 7F 45 4C 46 01 01 01
      offset_range:
        - 4096
        - null
