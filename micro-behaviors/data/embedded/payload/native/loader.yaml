defaults:
  platforms: [linux, android]
  for: [elf]

traits:
  - id: bot-payload-suffix
    desc: Bot payload filename suffix
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: .bot

composite_rules:
  - id: memory-temp-loader-api
    desc: Memory or temporary-file loader API
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/mem/anonymous/create::memfd-create
      - id: micro-behaviors/fs/temp/mktemp::o-tmpfile-flag

  - id: loader-path-marker
    desc: Memory or self-path loader marker
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/fs/path/device/special::dev-shm-bare
      - id: micro-behaviors/fs/proc/info/path::process-self-ex-fragment

  - id: linux-loader-breadcrumbs
    desc: Memory/temp loader breadcrumb cluster
    crit: notable
    conf: 0.9
    all:
      - id: memory-temp-loader-api
      - id: loader-path-marker
