defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.97
  size_min: 100000
  size_max: 50000000

traits:
  - id: netsupport-client32-config
    desc: Embedded NetSupport client32 config
    if:
      type: text
      substr: client32.ini

  - id: netsupport-nsm-config
    desc: Embedded NetSupport Manager config
    if:
      type: text
      substr: NSM.ini

  - id: netsupport-pcicl32-dll
    desc: Embedded NetSupport PCICL32 DLL
    if:
      type: text
      substr: PCICL32.DLL

  - id: netsupport-remcmdstub-exe
    desc: Embedded NetSupport command stub
    if:
      type: text
      substr: remcmdstub.exe
