defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  crit: notable
  conf: 0.9

# An embedded base64 data carrier used with AES and a KDF is a real capability,
# but these observations do not establish that the data is executable or
# malicious. Objective dropper rules add the required decode-and-execute context.
composite_rules:
  - id: embedded-base64-aes-data
    desc: Embedded base64 data with AES key derivation
    all:
      - id: micro-behaviors/data/encode/base64::embedded-base64-blob
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-cipher-module-ref
      - id: micro-behaviors/crypto/kdf/algorithm::pycryptodome-kdf-module-ref
