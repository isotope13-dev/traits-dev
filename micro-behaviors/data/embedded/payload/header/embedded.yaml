---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: elf-magic-embedded
  desc: Embedded ELF64 little-endian binary
  crit: notable
  conf: 0.8
  mbc: F0001.006
  attack: T1027.009
  if:
    type: hex
    section: ".text"
    pattern: 7F 45 4C 46 02 01 01
    offset_range:
    - 4096
    -
- id: elf32-le-magic-embedded
  desc: Embedded ELF32 little-endian binary
  crit: notable
  conf: 0.8
  mbc: F0001.006
  attack: T1027.009
  if:
    type: hex
    section: ".text"
    pattern: 7F 45 4C 46 01 01 01
    offset_range:
    - 4096
    -
- id: pe-magic-embedded
  desc: Embedded PE/MZ binary
  crit: notable
  conf: 0.8
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  if:
    type: hex
    section: ".text"
    pattern: 4D 5A 90 00
    offset_range:
    - 4096
    -
  unless:
  - id: metadata/binary/resource/
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/signed/platform/
- id: pe-magic-embedded-multiple
  desc: Multiple embedded PE/MZ headers
  crit: suspicious
  conf: 0.9
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  size_min: 200000
  count_min: 3
  if:
    type: hex
    section: ".text"
    pattern: 4D 5A 90 00
    offset_range:
    - 4096
    -
  unless:
  - id: metadata/package/versioning::pe-version-resource
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/signed/platform/
- id: pe-header-compare-immediate-multiple
  desc: In-code MZ/PE compare immediate
  crit: component
  conf: 0.8
  for:
  - pe
  if:
    type: raw
    regex: MZ\x00\x00.{0,48}PE\x00\x00
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: inline-mz-magic-check
  desc: Inline MZ header validation constant
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: hex
    section: .text
    pattern: B8 4D 5A 00 00
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: inline-pe-signature-check
  desc: Inline PE signature validation constant
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: hex
    section: .text
    pattern: 81 ?? ?? 50 45 00 00
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: inline-pe-header-walk
  desc: Inline PE header walk sequence
  crit: component
  conf: 0.8
  for:
  - pe
  if:
    type: hex
    section: .text
    pattern: 8B 4? 3C
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: pe-magic-corrupt-multiple
  desc: Multiple malformed embedded PE stubs
  crit: suspicious
  conf: 0.9
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  size_min: 200000
  count_min: 2
  if:
    type: hex
    section: ".text"
    pattern: 4D 5A 00 00
    offset_range:
    - 4096
    -
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: micro-behaviors/data/embedded/payload/header/
  - id: well-known/app/drivers/
  - id: well-known/app/protected-benign-pe/
  # Large statically-linked OpenSSL builds contain incidental MZ-like byte runs.
  - id: well-known/lib/openssl/
  downgrade:
    any:
    - id: micro-behaviors/data/embedded/payload/header/
    - id: well-known/app/drivers/
- id: photoshop-metadata-embedded
  desc: Photoshop image metadata in binary
  crit: notable
  conf: 0.75
  for:
  - pe
  - elf
  count_min: 2
  if:
    type: text
    exact: 8BIM
composite_rules:
- id: pe-magic-corrupt-benign-context
  desc: Benign context for malformed embedded PE header bytes
  crit: component
  conf: 0.85
  any:
  - id: pe-header-compare-immediate-multiple
  - id: inline-pe-header-validation-sequence
  - id: known-pe-header-validation-fp
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/signed/platform::microsoft
  - id: metadata/library/automation::selenium-ie-driver-benign-binary
  - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
  - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: well-known/app/mcafee-epolicy::mcafee-epolicy-migration
  - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
  - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
  - id: metadata/library/qt/
- id: known-pe-header-validation-fp
  desc: Known PE header validation false positive
  crit: component
  conf: 0.99
  any:
  - id: well-known/game/mod::wynncraft-overhaul-installer
  - id: well-known/app/swifttunnel_vpn::swifttunnel
  - id: well-known/app/cvte-crashrpt::cvte-crashrpt-strong-pin
- id: inline-pe-header-validation-sequence
  desc: Inline PE header validation sequence
  crit: component
  conf: 0.9
  for:
  - pe
  all:
  - id: inline-mz-magic-check
  - id: inline-pe-signature-check
  any:
  - id: inline-pe-header-walk
  - id: pe-header-compare-immediate-multiple
