---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
traits:
- id: elf-magic-embedded
  desc: Embedded ELF binary
  crit: notable
  conf: 0.8
  mbc: F0001.006
  attack: T1027.009
  if:
    type: hex
    section: ".text"
    pattern: 7F 45 4C 46 (01|02) (01|02) 01
    offset_range:
    - 4096
    - 
- id: pe-magic-embedded
  desc: Embedded PE/MZ binary
  crit: notable
  conf: 0.8
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  if:
    type: hex
    section: ".text"
    pattern: 4D 5A 90 00
    offset_range:
    - 4096
    - 
  unless:
  - id: metadata/binary/resource::microsoft-managed-resource-stub
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/signed/platform::microsoft
- id: pe-magic-embedded-multiple
  desc: Multiple embedded PE/MZ headers
  crit: suspicious
  conf: 0.9
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  size_min: 200000
  count_min: 3
  if:
    type: hex
    section: ".text"
    pattern: 4D 5A 90 00
    offset_range:
    - 4096
    - 
  unless:
  - id: metadata/package/versioning::pe-version-resource
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/signed/platform::microsoft
- id: pe-header-compare-immediate-multiple
  desc: In-code MZ/PE compare immediate
  crit: component
  conf: 0.8
  for:
  - pe
  if:
    type: raw
    regex: MZ\x00\x00.{0,48}PE\x00\x00
- id: pe-magic-corrupt-multiple
  desc: Multiple malformed embedded PE stubs
  crit: suspicious
  conf: 0.9
  mbc: F0001.006
  attack: T1027.009
  for:
  - pe
  size_min: 200000
  count_min: 2
  if:
    type: hex
    section: ".text"
    pattern: 4D 5A 00 00
    offset_range:
    - 4096
    -
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: pe-header-compare-immediate-multiple
  - id: well-known/lib/dioxus
  - id: well-known/app/swifttunnel_vpn::swifttunnel
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/signed/platform::microsoft
- id: photoshop-metadata-embedded
  desc: Photoshop image metadata in binary
  crit: notable
  conf: 0.75
  for:
  - pe
  - elf
  count_min: 2
  if:
    type: text
    exact: 8BIM
