defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [jpeg]
traits:
  - id: embedded-php-open-tag
    desc: PHP open tag inside JPEG
    crit: suspicious
    conf: 0.98
    attack: T1027
    if:
      type: raw
      substr: "<?php"
  - id: embedded-html-doctype
    desc: HTML doctype inside JPEG
    crit: notable
    conf: 0.9
    attack: T1027
    if:
      type: raw
      substr: "<!DOCTYPE html>"
  - id: oversized-base64-literal
    desc: Oversized base64-like payload literal
    crit: suspicious
    conf: 0.97
    attack: T1027
    if:
      type: raw
      regex: "\\$encryptedContent\\s*=\\s*'[A-Za-z0-9+/]{20000,}={0,2}'"
composite_rules:
  - id: html-php-polyglot
    desc: JPEG with HTML and PHP polyglot
    crit: suspicious
    conf: 0.98
    all:
      - id: embedded-html-doctype
      - id: embedded-php-open-tag
