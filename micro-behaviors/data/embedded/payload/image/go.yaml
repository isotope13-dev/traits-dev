# Image decode in a Go binary (image.Decode, image/png.Decode, image/jpeg…).
# Decoding an image is benign on its own (component crit); it only matters as
# the steganographic *source* leg of a pixel-stego loader composite.
defaults:
  platforms: [linux, macos, windows]
  for: [go]
traits:
  - id: go-image-decode
    desc: Go image decode (image.Decode / image/<fmt>.Decode)
    crit: component
    conf: 0.5
    if:
      type: text
      regex: '\bimage(/[a-z0-9]+)?\.Decode\b'
