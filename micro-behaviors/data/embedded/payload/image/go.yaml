# Image decoding in Go source. These are neutral capabilities; collection or
# steganography intent must be inferred by an objective composite.
defaults:
  platforms: [linux, macos, windows]
  for: [go]
traits:
  - id: go-image-decode
    desc: Go image decode call
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bimage(/[a-z0-9]+)?\.Decode\b'

  - id: go-jpeg-decoder-import
    desc: Go imports JPEG image decoder
    crit: notable
    conf: 0.92
    if:
      type: import
      exact: image/jpeg
