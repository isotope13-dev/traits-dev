defaults:
  platforms: [windows, unix]
  for: [jpeg]
traits:
  - id: embedded-php-open-tag
    desc: PHP open tag inside image
    crit: suspicious
    conf: 0.98
    attack: T1027
    for: [jpeg, png]
    if:
      type: text
      substr: "<?php"
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: embedded-html-doctype
    desc: HTML doctype inside JPEG
    crit: notable
    conf: 0.9
    attack: T1027
    if:
      type: text
      substr: "<!DOCTYPE html>"
  - id: oversized-base64-literal
    desc: Encrypted content assignment inside image
    crit: suspicious
    conf: 0.97
    attack: T1027
    if:
      type: text
      regex: "\\$encryptedContent\\s*="
composite_rules:
  - id: html-php-polyglot
    desc: JPEG with HTML and PHP polyglot
    crit: suspicious
    conf: 0.98
    all:
      - id: embedded-html-doctype
      - id: embedded-php-open-tag
