---
defaults:
  platforms:
  - unix
  - windows
  for:
  - elf
  - macho
  - pe
  size_max: 52428800
  mbc: F0001.006
  attack: T1027.009
traits:
- id: elf-magic-in-image-body
  desc: ELF magic inside image payload
  crit: suspicious
  conf: 0.9
  for:
  - png
  size_min: 4096
  if:
    type: hex
    section: ".text"
    pattern: 7F 45 4C 46
    offset_range:
    - 1024
    - 
- id: pe-magic-in-image-body
  desc: PE signature inside image payload
  crit: suspicious
  conf: 0.9
  for:
  - png
  size_min: 4096
  if:
    type: hex
    section: ".text"
    pattern: 4D 5A ?? ?? 50 45 00 00
    offset_range:
    - 1024
    - 
