defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1027.003
  mbc: F0001.006

traits:
  - id: dotnet-bitmap-type-token
    desc: .NET Bitmap type reference
    crit: component
    conf: 0.82
    if:
      type: text
      word: System.Drawing.Bitmap

  - id: dotnet-resource-manager-token
    desc: .NET resource manager reference
    crit: component
    conf: 0.78
    if:
      type: text
      substr: ResourceManager

composite_rules:
  - id: dotnet-resource-backed-bitmap
    desc: .NET resource-backed bitmap object
    crit: notable
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bitmap-type-token
      - id: dotnet-resource-manager-token

  - id: dotnet-resource-bitmap-pixel-readback
    desc: .NET resource bitmap pixel readback
    crit: notable
    conf: 0.92
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bitmap-type-token
      - id: dotnet-resource-manager-token
    any:
      # GetPixel/ToArgb and LockBits are both used by stego loaders to pull
      # payload bytes from an embedded resource bitmap (Olock/Fareit-style).
      - id: micro-behaviors/data/encode/image/pixel::pixel-access-getpixel
      - id: micro-behaviors/data/encode/image/pixel::pixel-access-lockbits

