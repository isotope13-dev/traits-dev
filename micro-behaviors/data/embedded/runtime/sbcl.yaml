defaults:
  platforms:
    - unix
  for:
    - elf
traits:
  - id: embedded-core-search
    desc: Searches for embedded SBCL core
    crit: notable
    conf: 0.98
    if:
      type: symbol
      exact: search_for_embedded_core
  - id: elf-core-search
    desc: Searches for ELF SBCL core
    crit: notable
    conf: 0.98
    if:
      type: symbol
      exact: search_for_elf_core
  - id: core-loader
    desc: Loads SBCL core file
    crit: notable
    conf: 0.96
    if:
      type: symbol
      exact: load_core_file
  - id: core-flag
    desc: References SBCL core argument
    crit: baseline
    conf: 0.75
    if:
      type: text
      exact: --core
  - id: core-path
    desc: References default sbcl.core path
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: /sbcl.core
  - id: trailer-lcbs-eof
    desc: SBCL trailer magic near EOF
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: LCBS
      offset_range:
        - -64
        - null
  - id: zstd-core-support
    desc: ZSTD core decompression support
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: ZSTD_(createDStream|initDStream|decompressStream)
composite_rules:
  - id: embedded-core-loader
    desc: SBCL runtime loads embedded core
    crit: notable
    conf: 0.98
    all:
      - id: metadata/lang/scripted::is-sbcl
      - id: trailer-lcbs-eof
    any:
      - id: embedded-core-search
      - id: elf-core-search
      - id: core-loader
  - id: zstd-compressed-core
    desc: SBCL runtime loads ZSTD core
    crit: suspicious
    conf: 0.96
    attack: T1027.009
    mbc: B0032
    all:
      - id: embedded-core-loader
      - id: zstd-core-support
