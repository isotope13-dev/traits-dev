defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: certum-ev-code-signing-chain
    desc: Certum EV code-signing chain
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: Certum Extended Validation Code Signing 2021 CA
  - id: certum-crl-url
    desc: Certum CRL distribution URL
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: crl.certum.pl
  - id: certum-ocsp-url
    desc: Certum OCSP responder URL
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      substr: ocsp-certum.com
