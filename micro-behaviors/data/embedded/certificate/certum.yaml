defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: certum-ev-code-signing-chain
    desc: Certum EV code-signing chain
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: Certum Extended Validation Code Signing 2021 CA
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: certum-crl-url
    desc: Certum CRL distribution URL
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: crl.certum.pl
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: certum-ocsp-url
    desc: Certum OCSP responder URL
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: ocsp-certum.com
    unless:
      - id: metadata/binary/framework::dotnet-assembly
