defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: microsoft-code-signing-pca
    desc: Microsoft code-signing certificate chain
    crit: baseline
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: Microsoft (Code Signing|Windows Production) PCA (2011|2010)
      case_insensitive: true
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/developer::open-source-developer
      - id: metadata/signed/developer::hendrik-leppkes
      - id: metadata/signed/developer::certum-code-signing-2021-ca
      - id: micro-behaviors/data/embedded/certificate::certum-ev-code-signing-chain
  - id: microsoft-timestamp-chain
    desc: Microsoft timestamp certificate chain
    crit: component
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: Microsoft Time-Stamp (PCA 2010|Service)
      case_insensitive: true
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/developer::open-source-developer
      - id: metadata/signed/developer::hendrik-leppkes
      - id: metadata/signed/developer::certum-code-signing-2021-ca
      - id: micro-behaviors/data/embedded/certificate::certum-ev-code-signing-chain
