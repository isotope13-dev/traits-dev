defaults:
  platforms:
    - windows
  for:
    - pe
    - pe
traits:
  - id: microsoft-code-signing-pca
    desc: Microsoft code-signing certificate chain
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: Microsoft (Code Signing|Windows Production) PCA (2011|2010)
      case_insensitive: true
  - id: microsoft-timestamp-chain
    desc: Microsoft timestamp certificate chain
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: Microsoft Time-Stamp (PCA 2010|Service)
      case_insensitive: true
