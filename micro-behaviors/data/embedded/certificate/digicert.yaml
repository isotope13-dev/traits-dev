defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: digicert-ev-code-signing-chain
    desc: DigiCert EV code-signing chain
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      regex: DigiCert EV Code Signing CA \(SHA2\)
  - id: digicert-timestamp-chain
    desc: DigiCert timestamp certificate chain
    crit: baseline
    conf: 0.95
    if:
      type: string_value
      regex: DigiCert (SHA2 Assured ID Timestamping CA|Timestamp 2021)
