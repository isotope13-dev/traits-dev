defaults:
  platforms: [windows, linux, unix, android, macos, ios]
traits:
  - id: pkcs7-signeddata-oid
    desc: PKCS7 SignedData OID pattern
    crit: baseline
    conf: 0.8
    for: [pe, elf, macho]
    size_max: 52428800
    if:
      type: hex
      section: "rdata"
      pattern: "06 09 2A 86 48 86 F7 0D 01 07 02"
