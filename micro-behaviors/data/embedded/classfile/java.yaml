# Embedded Java Classfile in Byte Array
# Detects Java classfile magic (CAFEBABE) encoded as signed byte array
# This is used by memory shells to load classes without .class files on disk
# MBC: C0026 (Encoding)
defaults:
  platforms: [windows, unix]
  for: [python, java, class]

traits:
  - id: cafebabe-signed-bytes
    desc: Java classfile magic as signed byte array
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: -54, -2, -70, -66

  - id: cafebabe-hex-bytes
    desc: Java classfile magic as hex byte array
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: 0xCA, 0xFE, 0xBA, 0xBE

  - id: byte-array-classloader
    desc: Java byte array initializer
    crit: component
    conf: 0.9
    if:
      type: text
      regex: byte\[\].{0,80}=\s*new\s+byte\[\]

composite_rules:
  - id: embedded-java-classfile
    desc: Embedded Java classfile in source code
    crit: suspicious
    conf: 0.95
    any:
      - id: cafebabe-signed-bytes
      - id: cafebabe-hex-bytes
    all:
      - id: byte-array-classloader
