# Embedded Network Structures in Image Files
# Detects binary network configuration data (sockaddr_in) hidden in image files
# Used by malware to conceal C2 addresses as raw binary structures
defaults:
  platforms: [windows, unix]
  for: [png]
  crit: component
  conf: 0.85
  attack: "T1027.003"
  mbc: "B0032"
traits:
  # AF_INET sockaddr_in with null padding (big-endian)
  # sockaddr_in: sin_family=AF_INET (0x0002), sin_port (2 bytes), sin_addr (4 bytes)
  # Null padding before the structure is characteristic of configuration arrays
  - id: sockaddr-in-nullpad-be
    desc: Null-padded AF_INET structure in binary data
    size_min: 4096
    size_max: 500000
    if:
      type: hex
      pattern: "00 00 00 00 00 02"
      offset_range: [512, null]
  # AF_INET sockaddr_in with null padding (little-endian)
  - id: sockaddr-in-nullpad-le
    desc: Null-padded AF_INET structure in binary data (LE)
    size_min: 4096
    size_max: 500000
    if:
      type: hex
      pattern: "00 00 00 00 02 00"
      offset_range: [512, null]
composite_rules:
  - id: sockaddr-in-nullpad
    desc: Embedded sockaddr_in with null padding
    crit: suspicious
    conf: 0.9
    any:
      - id: sockaddr-in-nullpad-be
      - id: sockaddr-in-nullpad-le
