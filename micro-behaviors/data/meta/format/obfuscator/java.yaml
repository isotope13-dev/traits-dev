# Java Obfuscator Detection
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: caesium
    desc: "Obfuscated by Caesium"
    crit: notable
    conf: 1.0
    if:
      type: raw
      substr: "Obfuscated-By: Caesium"
  - id: caesium-component
    desc: "Caesium obfuscation component naming pattern"
    crit: suspicious
    conf: 0.9
    if:
      type: basename
      regex: 'caesium_\d+\.class'
  - id: caesium-debug
    desc: "Caesium obfuscator DEBUG build marker in manifest"
    crit: suspicious
    conf: 1.0
    if:
      type: raw
      substr: "Obfuscated-By: Caesium DEBUG"
  - id: stringer
    desc: "Obfuscated by Stringer"
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "Stringer"
  - id: stringer-licelus
    desc: "Obfuscated by Stringer (Licel US)"
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "Licel US"
