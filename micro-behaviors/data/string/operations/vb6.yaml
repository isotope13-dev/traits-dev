defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032
traits:
  - id: vb6-string-construction-bstr
    desc: VB6 rtcVarBstrFromAnsi string builder
    crit: component
    conf: 0.92
    if:
      type: symbol
      substr: rtcVarBstrFromAnsi
  - id: vb6-string-construction-cat
    desc: VB6 __vbaVarCat string concatenation
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: __vbaVarCat
  - id: vb6-string-construction-create
    desc: VB6 rtcCreateObject2 COM constructor
    crit: component
    conf: 0.9
    if:
      type: symbol
      substr: rtcCreateObject2
composite_rules:
  - id: vb6-string-construction-pattern
    desc: VB6 character-by-character string obfuscation
    crit: suspicious
    conf: 0.95
    all:
      - id: vb6-string-construction-bstr
      - id: vb6-string-construction-cat
      - id: vb6-string-construction-create
      - id: metadata/binary/framework::vb6-application-framework
