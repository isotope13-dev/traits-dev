defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032
traits:
  - id: vb6-substring-helper
    desc: VB6 substring extraction helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: rtcMidCharBstr
  - id: vb6-left-string-helper
    desc: VB6 left string helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: rtcLeftCharVar
  - id: vb6-split-helper
    desc: VB6 string split helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: rtcSplit
  - id: vb6-string-conversion-helper
    desc: VB6 string conversion helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: rtcStrConvVar2
  - id: vb6-string-construction-bstr
    desc: VB6 rtcVarBstrFromAnsi string builder
    crit: component
    conf: 0.92
    if:
      type: symbol
      substr: rtcVarBstrFromAnsi
  - id: vb6-string-construction-cat
    desc: VB6 __vbaVarCat string concatenation
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: __vbaVarCat
  - id: vb6-string-construction-create
    desc: VB6 rtcCreateObject2 COM constructor
    crit: component
    conf: 0.9
    if:
      type: symbol
      substr: rtcCreateObject2
composite_rules:
  - id: vb6-string-construction-pattern
    desc: VB6 character-by-character string obfuscation
    crit: suspicious
    conf: 0.95
    all:
      - id: vb6-string-construction-bstr
      - id: vb6-string-construction-cat
      - id: vb6-string-construction-create
      - id: metadata/binary/framework::vb6-application-framework
    unless:
      - id: metadata/binary/framework::vb6-runtime-library
  - id: vb6-runtime-string-decoding
    desc: VB6 runtime string decoding helpers
    crit: notable
    conf: 0.9
    all:
      - id: vb6-substring-helper
      - id: vb6-string-conversion-helper
    any:
      - id: vb6-left-string-helper
      - id: vb6-split-helper
      - id: vb6-string-construction-bstr
