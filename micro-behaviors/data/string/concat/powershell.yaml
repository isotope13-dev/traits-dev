defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9

traits:
  - id: powershell-string-join
    desc: PowerShell String.Join constructs text
    for: [powershell, html]
    if:
      type: text
      regex: '(?i)\[string\]::Join\s*\('

  - id: powershell-string-append
    desc: PowerShell string append operation
    count_min: 20
    if:
      type: text
      regex: '\$\w+\s*\+=\s*[''"]'
