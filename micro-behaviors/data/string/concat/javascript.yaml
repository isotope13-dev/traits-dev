defaults:
  platforms: [windows, unix]
  for: [javascript]

traits:
  - id: massive-concatenation-chain
    desc: JavaScript massive string concatenation chain
    crit: notable
    conf: 0.7
    size_max: 500000
    if:
      type: text
      regex: '=\s*([\w"''\.]+\s*\+\s*){5,}'
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/lib/greensock::greensock-tweenmax-suite-banner

  - id: fragmented-url-construction
    desc: URL scheme built from string fragments
    crit: notable
    conf: 0.95
    size_max: 100000
    if:
      type: text
      regex: '[''"]https?[''"]\s*\+\s*[''"]'

  - id: dense-string-fragment-concatenation
    desc: Dense concatenated string fragments
    crit: notable
    conf: 0.9
    size_max: 100000
    count_min: 10
    per_kb_min: 0.5
    if:
      type: text
      regex: '[\"''].{1,40}[\"''](\s*\+\s*(\w+|[\"''].{1,40}[\"''])){3}'
    not:
      - regex: '[\"'']<[/A-Za-z][^>]{0,40}>[\"'']'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: text
        regex: 'twitter\.com/intent|facebook\.com/sharer|t\.me/share'
      - id: well-known/app/nodpy::nodpy-package-context
      - id: well-known/lib/regula-facesdk::official-face-components-context

  - id: join-empty-separator-call
    desc: Joins values without a separator
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      regex: '\.join$'
      arg:
        kind: string
        exact: ""

  - id: array-join-empty-separator-text
    desc: Array expression joined without separator
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\]\.join\(["'']["'']\)'

  - id: dot-joined-array-values
    desc: Array values joined with dots
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '\]\s*\.join\(\s*["'']\.["'']\s*\)'

composite_rules:
  - id: array-join-empty-separator
    desc: Joins array values without separator
    crit: notable
    conf: 0.8
    any:
      - id: join-empty-separator-call
      - id: array-join-empty-separator-text
