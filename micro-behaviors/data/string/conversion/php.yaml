# PHP String Conversion Capabilities
defaults:
  platforms: [windows, unix]
  mbc: C0000
  for: [php]
traits:
  - id: chr-call
    desc: Character code manipulation
    crit: notable
    conf: 0.65
    if:
      type: symbol
      kind: call
      exact: "chr"
  - id: ord-call
    desc: Character code manipulation
    crit: notable
    conf: 0.65
    if:
      type: symbol
      kind: call
      exact: "ord"
composite_rules:
  - id: chr-ord
    desc: Character code manipulation
    crit: notable
    conf: 0.65
    any:
      - id: chr-call
      - id: ord-call
