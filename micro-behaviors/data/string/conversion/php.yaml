# PHP String Conversion Capabilities
defaults:
  mbc: C0000
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
traits:
  - id: chr-call
    desc: Character code manipulation
    crit: notable
    conf: 0.65
    if:
      type: ast
      kind: call
      exact: "chr"
  - id: ord-call
    desc: Character code manipulation
    crit: notable
    conf: 0.65
    if:
      type: ast
      kind: call
      exact: "ord"
composite_rules:
  - id: chr-ord
    desc: Character code manipulation
    crit: notable
    conf: 0.65
    any:
      - id: chr-call
      - id: ord-call
