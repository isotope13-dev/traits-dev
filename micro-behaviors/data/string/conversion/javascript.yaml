# JavaScript string/number conversion calls
defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  - id: js-parseint
    desc: parseInt call
    crit: baseline
    if:
      type: string_literal
      regex: parseInt\s*\(
  - id: js-fromcharcode
    desc: String.fromCharCode call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: String.fromCharCode
  - id: js-fromcharcode-alias
    desc: Aliases String.fromCharCode conversion function
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\s*=\s*String\.fromCharCode\b'
