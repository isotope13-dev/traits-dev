# JavaScript string/number conversion calls
defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  - id: js-parseint
    desc: parseInt call
    crit: baseline
    if:
      type: string_literal
      regex: parseInt\s*\(
  - id: js-fromcharcode
    desc: String.fromCharCode call
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: String\.fromCharCode\s*\(
