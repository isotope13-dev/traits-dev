defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  conf: 0.86

traits:
  - id: python-chr-call
    desc: Python chr() character conversion
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: chr
  - id: python-chr-loop-string-builder
    desc: Python builds string from char codes
    if:
      type: text
      regex: 'for\s+\w+\s+in\s+\w+[\w\s,()''"]{0,40}:[\s\S]{0,240}\.append\(\s*chr\('
