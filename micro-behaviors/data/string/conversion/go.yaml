defaults:
  platforms: [unix, windows]
  for: [go]
traits:
  - id: go-strconv-atoi-call
    desc: Go strconv.Atoi call
    crit: component
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: strconv.Atoi

  - id: go-size-suffix-g-case
    desc: Go gigabyte size suffix
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'case\s+["'']g["'']\s*:'

  - id: go-size-suffix-m-case
    desc: Go megabyte size suffix
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'case\s+["'']m["'']\s*:'

  - id: go-size-suffix-k-case
    desc: Go kilobyte size suffix
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'case\s+["'']k["'']\s*:'

composite_rules:
  - id: go-human-size-parser
    desc: Go human size parser
    crit: component
    conf: 0.82
    near_lines: 28
    all:
      - id: go-strconv-atoi-call
      - id: go-size-suffix-g-case
      - id: go-size-suffix-m-case
      - id: go-size-suffix-k-case
