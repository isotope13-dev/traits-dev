defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]

traits:
  - id: go-size2bytes-symbol-text
    desc: Go Size2Bytes symbol text
    crit: component
    conf: 0.8
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: '(?i)(^|[./])size2bytes([^A-Za-z0-9_]|$)'

  - id: go-size-to-bytes-snake-symbol-text
    desc: Go size_to_bytes symbol text
    crit: component
    conf: 0.8
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: '(?i)(^|[./])size_to_bytes([^A-Za-z0-9_]|$)'

  - id: go-size-to-bytes-camel-symbol-text
    desc: Go sizeToBytes symbol text
    crit: component
    conf: 0.8
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: '(?i)(^|[./])sizeToBytes([^A-Za-z0-9_]|$)'

  - id: go-size2bytes-symbol-bytes
    desc: Go Size2Bytes symbol bytes
    crit: component
    conf: 0.8
    platforms: [unix]
    for: [elf, macho]
    if:
      type: raw
      regex: '(?i)(^|[./])size2bytes([^A-Za-z0-9_]|$)'

  - id: go-size-to-bytes-snake-symbol-bytes
    desc: Go size_to_bytes symbol bytes
    crit: component
    conf: 0.8
    platforms: [unix]
    for: [elf, macho]
    if:
      type: raw
      regex: '(?i)(^|[./])size_to_bytes([^A-Za-z0-9_]|$)'

  - id: go-size-to-bytes-camel-symbol-bytes
    desc: Go sizeToBytes symbol bytes
    crit: component
    conf: 0.8
    platforms: [unix]
    for: [elf, macho]
    if:
      type: raw
      regex: '(?i)(^|[./])sizeToBytes([^A-Za-z0-9_]|$)'

composite_rules:
  - id: go-size-to-bytes-symbol-binary
    desc: Go size-to-bytes symbol binary
    crit: component
    conf: 0.8
    any:
      - id: go-size2bytes-symbol-text
      - id: go-size-to-bytes-snake-symbol-text
      - id: go-size-to-bytes-camel-symbol-text
      - id: go-size2bytes-symbol-bytes
      - id: go-size-to-bytes-snake-symbol-bytes
      - id: go-size-to-bytes-camel-symbol-bytes
