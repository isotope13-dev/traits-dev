defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: regex-global-string-removal
    desc: JavaScript removes matches with global RegExp
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.replace\(RegExp\(\w+,\s*[''\"]g[''\"]\),\s*[''\"][''\"]\)'
