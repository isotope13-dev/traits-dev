defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: notable
  conf: 0.9

traits:
  - id: shell-echo-tr-transform
    desc: Shell echo piped to tr transformation
    if:
      type: text
      regex: echo\s+['"].*?['"]\s*\|\s*tr\s+['"].*?['"]\s+['"].*?['"]
    not:
      # Variable/list normalization is common shell plumbing, not decoding.
      - regex: echo\s+["'][^"']*\$[{(]?
      - regex: echo\s+["'][^"']*["']\s*\|\s*tr\s+["'][,\s\\n]+["']\s+["'][,\s\\n]+["']
      - substr: echo "$@" | tr " " "\n"
      - substr: echo "$@" | tr 'abcdefghijklmnopqrstuvwxyz'
      - substr: echo "$@" | tr 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'
      - substr: echo "$gltype" | tr '
      - substr: echo "$test" | tr '\n' ' '
      - substr: echo "$VERSION" | tr '.' ','
      - substr: echo "$EXPECTED_PATHVER" | tr '.' '_'
      - substr: echo "$difference" | tr ' ' '\n'
      - substr: echo "$todo" | tr ' ' '\12'
      - substr: echo "$UNAME_SYSTEM"
      - substr: echo "$(ZSTD_NOMT_FILES)" | tr ' ' '\n' | $(GREP) -q zstdmt
      - substr: echo "${sym}"; done |grep -v "^${n}\$" |tr '\n' ' '
      - substr: echo "alias ci=\"$(readlink -f "$0")\"; complete -W
      - substr: echo "alias ci=\"$(readlink -f "$0")\"; _complete_mpy_ci_zsh()
      - substr: echo "alias ci=\"$(readlink -f "$0")\"; complete -c ci -p
      - substr: alias ci=\"$(readlink -f "$0")\"; complete -W
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/quickemu
