defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-fragmented-url-construction
    desc: URL construction from many small fragments (likely
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027
    size_max: 100000
    for:
      - javascript
    if:
      type: ast
      language: javascript
      query: |
        (binary_expression
          operator: "+"
          (string) @s1 (#match? @s1 "^['\"]https?['\"]$")
        )
  - id: js-fragmented-url-regex
    desc: URL construction from many concatenated fragments (Regex)
    crit: suspicious
    conf: 0.9
    size_max: 100000
    for:
      - javascript
    count_min: 10
    per_kb_min: 0.5
    if:
      type: raw
      regex: (\([\w\s]*\)|\w+)(\s*\+\s*(\([\w\s]*\)|\w+)){3}
composite_rules: []
