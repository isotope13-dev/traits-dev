defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: co-uk-tld
    desc: Nemucod C2 TLD '.co.uk'
    crit: component
    conf: 0.9
    size_max: 5000
    if:
      type: string
      substr: '.co.uk'
  - id: co-uk-tld-nodot
    desc: Nemucod C2 TLD 'co.uk' fragment (obfuscated assembly)
    crit: component
    conf: 0.85
    size_max: 5000
    if:
      type: string
      substr: 'co.uk'
