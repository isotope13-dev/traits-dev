defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: js-charat-lookup
    desc: JavaScript string character lookup
    crit: baseline
    conf: 0.82
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\.charAt\s*\('
  - id: js-repeated-charat-calls
    desc: Repeated JavaScript charAt calls
    crit: notable
    conf: 0.9
    size_max: 200000
    count_min: 10
    per_kb_min: 0.5
    if:
      type: text
      regex: '\.charAt\([^)]{0,120}\)[^}]{0,120}\.charAt\([^)]{0,120}\)'
    unless:
      - id: well-known/lib/google-diff-match-patch/
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: metadata/package/testing/presence/fixture::snapshot-file
