defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: vb6-ordinal-mid-string-helper
    desc: VB6 ordinal substring helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 631'

  - id: vb6-ordinal-split-string-helper
    desc: VB6 ordinal string split helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 711'

  - id: vb6-ordinal-replace-string-helper
    desc: VB6 ordinal string replacement helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 712'

  - id: vb6-ordinal-string-conversion-helper
    desc: VB6 ordinal string conversion helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 717'

  - id: vb6-ordinal-ansi-string-builder
    desc: VB6 ordinal ANSI string builder
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: 'ORDINAL 608'

composite_rules:
  - id: vb6-ordinal-string-transformation
    desc: VB6 ordinal string transformation cluster
    crit: notable
    conf: 0.94
    all:
      - id: metadata/binary/framework::vb6-application-framework
    any:
      - id: vb6-ordinal-mid-string-helper
      - id: vb6-ordinal-split-string-helper
      - id: vb6-ordinal-replace-string-helper
      - id: vb6-ordinal-string-conversion-helper
      - id: vb6-ordinal-ansi-string-builder
    needs: 2
