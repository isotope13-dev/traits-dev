defaults:
  platforms: [windows, unix]
  for: [csharp, pe, dll]

traits:
  - id: dotnet-stringbuilder-type
    desc: .NET StringBuilder type reference
    crit: baseline
    conf: 0.86
    if:
      type: text
      exact: StringBuilder
  - id: dotnet-append-method-token
    desc: Append method-name token
    crit: component
    conf: 0.72
    if:
      type: text
      exact: Append
  - id: dotnet-combine-method-token
    desc: Combine method-name token
    crit: component
    conf: 0.72
    if:
      type: text
      exact: Combine
  - id: dotnet-get-directory-name-token
    desc: GetDirectoryName method-name token
    crit: component
    conf: 0.72
    if:
      type: text
      exact: GetDirectoryName
composite_rules:
  - id: dotnet-stringbuilder-append
    desc: .NET StringBuilder Append use
    crit: baseline
    conf: 0.86
    all:
      - id: dotnet-stringbuilder-type
      - id: dotnet-append-method-token
