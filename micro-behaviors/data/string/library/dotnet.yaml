defaults:
  platforms: [windows, unix]
  for: [csharp, pe, dll]

traits:
  - id: dotnet-stringbuilder-type
    desc: .NET StringBuilder type reference
    crit: baseline
    conf: 0.86
    if:
      type: text
      exact: StringBuilder
  - id: dotnet-append-method-token
    desc: .NET Append method token
    crit: component
    conf: 0.72
    if:
      type: text
      exact: Append
composite_rules:
  - id: dotnet-stringbuilder-append
    desc: .NET StringBuilder Append use
    crit: baseline
    conf: 0.86
    all:
      - id: dotnet-stringbuilder-type
      - id: dotnet-append-method-token
