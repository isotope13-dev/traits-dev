# JavaScript string reversal by split/reverse/join.
# This is a neutral data operation: token protocols and UI code use it as well
# as obfuscators. Intent comes from an objective composite that adds execution
# or another attack-specific behavior.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
  mbc: C0019

traits:
  - id: split-reverse-join-string
    desc: Reverses string with split reverse join
    if:
      type: text
      regex: '\.split\s*\([^)]{0,80}\)\s*\.reverse\s*\(\s*\)\s*\.join\s*\('
