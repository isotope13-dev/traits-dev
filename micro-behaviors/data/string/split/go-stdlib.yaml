# Generic Go standard-library symbols for line-oriented input handling. Each
# appears in countless benign Go programs; no signal standalone. Command-loop
# composites in other directories gate on the cluster co-occurring with
# family-specific markers.
defaults:
  platforms: [windows, unix]
  for: [go]
  crit: component
traits:
  - id: go-bufio-scanner-scan
    desc: bufio.Scanner.Scan line reader
    conf: 0.4
    if:
      type: symbol
      regex: 'bufio\.\(\*Scanner\)\.Scan'
  - id: go-strings-fields
    desc: strings.Fields tokenizer
    conf: 0.4
    if:
      type: symbol
      regex: 'strings\.Fields'
  - id: go-context-with-timeout
    desc: context.WithTimeout call
    conf: 0.4
    if:
      type: symbol
      regex: 'context\.WithTimeout'
composite_rules:
  - id: go-line-command-loop
    desc: Go line-oriented command loop primitives
    crit: component
    conf: 0.5
    all:
      - id: go-bufio-scanner-scan
      - id: go-strings-fields
      - id: go-context-with-timeout
