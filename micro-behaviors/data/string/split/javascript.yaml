defaults:
  platforms: [windows, unix]
traits:
  - id: js-split-string-array
    desc: String split to array assignment
    crit: baseline
    conf: 0.9
    for: [javascript]
    if:
      type: tree-sitter
      query: |
        (variable_declarator
          value: (call_expression
            function: (member_expression
              object: (string)
              property: (property_identifier) @split
            )
            arguments: (arguments (string))
          )
        )
        (#eq? @split "split")
    unless:
      - id: metadata/library/react::library
