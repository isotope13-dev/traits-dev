defaults:
  platforms: [windows, unix]
traits:
  - id: js-split-string-array
    desc: String split to array assignment
    crit: baseline
    conf: 0.9
    for: [javascript]
    # `"literal".split("literal")` — splitting a string literal by a string
    # literal. The quote→`.split(`→quote run is distinctive enough as text.
    if:
      type: text
      regex: '[''"]\s*\.split\s*\(\s*[''"]'
    unless:
      - id: metadata/library/react::library
