defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-split-string-array
    desc: String split to array assignment
    crit: baseline
    conf: 0.9
    # `"literal".split("literal")` — splitting a string literal by a string
    # literal. The quote→`.split(`→quote run is distinctive enough as text.
    if:
      type: text
      regex: '[''"]\s*\.split\s*\(\s*[''"]'
    unless:
      - id: metadata/library/react::library
  - id: js-split-call
    desc: JavaScript split() method call
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: call
      regex: '\.split$'
    unless:
      - id: micro-behaviors/data/db/redis/
      - id: metadata/library/nodeunit/
      - id: metadata/package/testing/
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - type: text
        substr: 'value.trim().split("/")'
  - id: js-var-split-marker
    desc: JavaScript split with variable delimiter
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\.split\(\s*[a-zA-Z_$]\w{0,12}\s*\)'
    not:
      - substr: "pairSeparator"
      - substr: "slashSplit"
      - substr: "pathSep"
    unless:
      - id: metadata/library/structure::js-any-bundle-output
