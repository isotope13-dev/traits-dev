# Split API name obfuscation in PE binaries.
# Malware families (notably Elex/WannaCry) truncate API names at string
# boundaries so static scanners miss the full API reference. The fragments
# are concatenated at runtime to reconstruct the real API name.
defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.95

traits:
  # WriteProcessMemory fragments
  - id: split-writeprocessmemory-ess
    desc: Truncated WriteProcessMemory API fragment
    if:
      type: text
      exact: essMemory

  - id: split-writeprocessmemory-rite
    desc: Truncated WriteProcessMemory API fragment (rite)
    if:
      type: text
      exact: riteProcessMemory

  # ReadProcessMemory fragments
  - id: split-readprocessmemory-rocess
    desc: Truncated ReadProcessMemory API fragment
    if:
      type: text
      exact: rocessMemory

  # CreateToolhelp32Snapshot fragment
  - id: split-createtoolhelp32-create
    desc: Truncated CreateToolhelp32Snapshot fragment
    if:
      type: text
      exact: CreateTo

  # VirtualQuery fragment
  - id: split-virtualquery-virt
    desc: Truncated VirtualQuery API fragment
    if:
      type: text
      exact: VirtualQ

  # GetModuleFileName fragment
  - id: split-getmodulefilename-module
    desc: Truncated GetModuleFileName fragment
    if:
      type: text
      exact: ModuleFil

  # ReadConsole fragment
  - id: split-readconsole-readc
    desc: Truncated ReadConsole API fragment
    if:
      type: text
      exact: readCon

  # CreateRemoteThread fragment
  - id: split-createremotethread-creat
    desc: Truncated CreateRemoteThread fragment
    if:
      type: text
      exact: Crea
      section: data

composite_rules:
  # Multiple split API fragments = deliberate obfuscation
  - id: split-api-fragment-cluster
    desc: Multiple split API name fragments indicate obfuscation
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027
    needs: 3
    any:
      - id: split-writeprocessmemory-ess
      - id: split-writeprocessmemory-rite
      - id: split-readprocessmemory-rocess
      - id: split-createtoolhelp32-create
      - id: split-virtualquery-virt
      - id: split-getmodulefilename-module
      - id: split-readconsole-readc
      - id: split-createremotethread-creat
