# Human-language classification capabilities
defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: defines-detect-language-function
    desc: Defines human-language detection function
    crit: notable
    conf: 0.9
    if:
      type: function
      exact: detect_language

  - id: defines-language-filter-function
    desc: Defines human-language filtering function
    crit: notable
    conf: 0.9
    if:
      type: function
      exact: filter_by_language

composite_rules:
  - id: multiscript-character-classifier
    desc: Multi-script character classification functions
    crit: notable
    conf: 0.95
    all:
      - id: defines-detect-language-function
      - id: defines-language-filter-function
    any:
      - id: metadata/file/profile/language::lang-arabic-urdu
      - id: metadata/file/profile/language::lang-bengali
      - id: metadata/file/profile/language::lang-hindi-marathi
      - id: metadata/file/profile/language::lang-japanese
      - id: metadata/file/profile/language::lang-tamil
      - id: metadata/file/profile/language::lang-telugu
    needs: 3
