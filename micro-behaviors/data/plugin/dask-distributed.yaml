defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: dask-worker-plugin-import
    desc: Dask WorkerPlugin import
    crit: notable
    conf: 0.9
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: import
      exact: WorkerPlugin

  - id: dask-worker-plugin-class
    desc: Dask WorkerPlugin class declaration
    crit: notable
    conf: 0.9
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      regex: 'class\s+\w+\(WorkerPlugin\)'

  - id: dask-scheduler-plugin-import
    desc: Dask SchedulerPlugin import
    crit: notable
    conf: 0.9
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: import
      exact: SchedulerPlugin

  - id: dask-scheduler-plugin-class
    desc: Dask SchedulerPlugin class declaration
    crit: notable
    conf: 0.9
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      regex: 'class\s+\w+\(SchedulerPlugin\)'

  - id: dask-worker-state-task-access
    desc: Dask worker task state access
    crit: notable
    conf: 0.9
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      regex: 'worker\.state\.(tasks|executing)|worker\.data\.get'

  - id: dask-remove-worker-function
    desc: Dask remove_worker hook function
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: function
      exact: remove_worker

  - id: dask-scheduler-processing-owner
    desc: Dask scheduler processing owner lookup
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: call
      exact: self._scheduler.tasks.get

  - id: dask-scheduler-suspect-keys
    desc: Dask scheduler suspect keys field
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      word: suspect_keys

  - id: dask-source-location-import
    desc: Dask source location import
    crit: notable
    conf: 0.88
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: import
      exact: SourceLocation

  - id: dask-extract-task-graph-call
    desc: Dask task graph extraction call
    crit: notable
    conf: 0.9
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: symbol
      kind: call
      exact: extract_task_graph

  - id: source-code-snippet-field
    desc: Source code snippet field
    crit: notable
    conf: 0.86
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    if:
      type: text
      word: code_snippet

composite_rules:
  - id: dask-worker-plugin-subclass
    desc: Dask WorkerPlugin subclass
    crit: notable
    conf: 0.94
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    all:
      - id: dask-worker-plugin-import
      - id: dask-worker-plugin-class

  - id: dask-scheduler-plugin-subclass
    desc: Dask SchedulerPlugin subclass
    crit: notable
    conf: 0.94
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    all:
      - id: dask-scheduler-plugin-import
      - id: dask-scheduler-plugin-class

  - id: dask-scheduler-worker-removal-hook
    desc: Dask scheduler worker removal hook
    crit: notable
    conf: 0.92
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    all:
      - id: dask-remove-worker-function
      - id: dask-scheduler-suspect-keys
    any:
      - id: dask-scheduler-processing-owner
      - id: dask-scheduler-plugin-subclass

  - id: dask-graph-source-upload-fields
    desc: Dask graph source upload fields
    crit: notable
    conf: 0.93
    ref: sha256:f641c73a90cccdd02a5c5c29a1f550adb4cdfd260d05403d99db4b379db070ff
    all:
      - id: dask-source-location-import
      - id: dask-extract-task-graph-call
      - id: source-code-snippet-field
