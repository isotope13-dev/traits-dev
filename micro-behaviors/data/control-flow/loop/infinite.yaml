defaults:
  platforms:
    - unix
    - windows
  for: [c, cpp, java, javascript, go]
traits:
  - id: infinite-loop-header
    desc: "Infinite loop structure (e.g. (;;) / while(1))"
    crit: baseline
    if:
      type: text
      regex: for\s*\(\s*;\s*;\s*\)|while\s*\(\s*(1|true)\s*\)
  - id: javascript-infinite-loop-metric
    desc: JavaScript infinite loop structure
    crit: baseline
    for: [javascript, typescript]
    if:
      type: metrics
      field: 'ast.infinite_loop_count'
      min: 1
  - id: python-while-true
    desc: Python infinite while True loop
    crit: baseline
    for: [python]
    if:
      type: text
      substr: 'while True:'
  - id: python-while-one
    desc: Python infinite while 1 loop
    crit: baseline
    for: [python]
    if:
      type: text
      exact: 'while 1:'
  - id: batch-label-loop
    desc: Batch loop label
    crit: notable
    conf: 0.8
    for: [batch]
    platforms: [windows]
    if:
      type: text
      regex: (?im)^:loop\b
  - id: batch-goto-loop-command
    desc: Batch GOTO loop command
    crit: notable
    conf: 0.8
    for: [batch]
    platforms: [windows]
    if:
      type: text
      regex: (?im)^\s*goto\s+loop\b
  - id: batch-label-start
