composite_rules:
  - id: batch-goto-loop
    desc: Batch GOTO loop label
    crit: notable
    conf: 0.8
    all:
      - id: batch-label-loop
      - id: batch-goto-loop-command
    near_lines: 80
    not:
      - regex: (?i)\bshift\b
  - id: batch-goto-start-loop
    desc: Batch GOTO start label
    crit: notable
    conf: 0.8
