defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries, source]
traits:
  - id: infinite-loop-header
    desc: Infinite loop structure (e.g. for(;;) or while(1))
    crit: baseline
    if:
      type: raw
      regex: for\s*\(\s*;\s*;\s*\)|while\s*\(\s*(1|true)\s*\)
  - id: python-while-true
    desc: Python infinite while True loop
    crit: baseline
    for: [python, shell]
    if:
      type: text
      substr: 'while True:'
  - id: batch-goto-loop
    desc: Batch GOTO infinite loop pattern
    crit: notable
    conf: 0.8
    for: [batch]
    platforms: [windows]
    if:
      type: text
      regex: (?i)goto\s+\w+
