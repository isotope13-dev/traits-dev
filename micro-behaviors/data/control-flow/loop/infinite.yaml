defaults:
  platforms:
    - unix
    - windows
  for: [c, cpp, java, javascript, go]
traits:
  - id: infinite-loop-header
    desc: Infinite loop structure (e.g. for(;;) or while(1))
    crit: baseline
    if:
      type: text
      regex: for\s*\(\s*;\s*;\s*\)|while\s*\(\s*(1|true)\s*\)
  - id: python-while-true
    desc: Python infinite while True loop
    crit: baseline
    for: [python]
    if:
      type: text
      substr: 'while True:'
  - id: batch-goto-loop
    desc: Batch GOTO loop label
    crit: notable
    conf: 0.8
    for: [batch]
    platforms: [windows]
    if:
      type: text
      regex: (?ims)^:loop\b[\s\S]{0,1200}^\s*goto\s+loop\b
    not:
      - regex: (?i)\bshift\b
  - id: batch-goto-start-loop
    desc: Batch GOTO start label
