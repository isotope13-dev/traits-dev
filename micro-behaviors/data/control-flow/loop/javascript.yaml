# Generic JavaScript loop header (while/for)
defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  - id: js-loop
    desc: Loop structure
    crit: baseline
    if:
      type: string_literal
      regex: \b(while|for)\s*\(
  - id: js-bounded-while-loop
    desc: JavaScript bounded while loop
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'while\s*\([^)]{0,40}<\s*0?x?[0-9a-fA-F]+\)'
