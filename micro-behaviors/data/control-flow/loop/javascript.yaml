# Generic JavaScript loop header (while/for)
defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  - id: js-loop
    desc: Loop structure
    crit: baseline
    if:
      type: string_literal
      regex: \b(while|for)\s*\(
  - id: js-bounded-while-loop
    desc: JavaScript bounded while loop
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'while\s*\([^)]{0,40}<\s*0?x?[0-9a-fA-F]+\)'
  - id: js-large-step-loop
    desc: JavaScript loop uses large constant step
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[1-9]\d+\)'
  - id: js-small-multistep-loop
    desc: JavaScript loop uses constant step 3-9
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[3-9]\)'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/app/aui-agent-builder::generated-web-ui-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: js-two-step-loop
    desc: JavaScript loop uses constant step two
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*2\)'
  - id: js-variable-step-loop
    desc: JavaScript loop uses variable step
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[a-zA-Z_$][\w$]*\)'
    unless:
      - id: well-known/app/aui-agent-builder::generated-web-ui-bundle
  - id: js-length-loop-compound-add
    desc: Length-bounded loop uses compound addition
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bfor\s*\([^)]{0,120}\.length[\s\S]{0,500}\+='
  - id: js-large-bound-loop-cluster
    desc: JavaScript loops with large numeric bounds
    crit: notable
    conf: 0.9
    size_min: 20000
    count_min: 3
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120}([<>]\s*[0-9]{6,}|[0-9]{6,}\s*[<>])[^;]{0,60};'
