defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: rust-loop-statement
    desc: Rust infinite loop statement (loop {})
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'loop\s*\{'
  - id: rust-while-loop
    desc: Rust while loop
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: 'while\s+'
