# JavaScript Module-Level Execution
# Detects async IIFE patterns that execute on module import. Common in
# both legitimate startup code (extensions, CLIs) and hidden-side-effect
# trojans, so this is a neutral capability — composites in objectives/
# combine it with empty-export or obfuscation signals to infer intent.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: async-iife-invoke
    desc: Async IIFE auto-executes on import
    crit: notable
    conf: 0.7
    count_min: 2
    if:
      type: text
      regex: '\(async\s*\(\)\s*=>'
    not:
      - substr: this.writeOperation = (async () =>
      - substr: builtin-plugins/tabby-
    unless:
      - type: text
        substr: '"version":3,"file":'
      - type: basename
        regex: ^(\.map|rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
