# JavaScript Module-Level Execution
# Detects async IIFE patterns that execute on module import. Common in
# both legitimate startup code (extensions, CLIs) and hidden-side-effect
# trojans, so this is a neutral capability — composites in objectives/
# combine it with empty-export or obfuscation signals to infer intent.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-empty-export-default
    desc: JavaScript module has an empty default export
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "export default {}"
  - id: js-empty-module-exports
    desc: CommonJS module exports an empty object
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'module\\.exports\\s*=\\s*\\{\\s*\\}'
  - id: commonjs-module-reexport
    desc: CommonJS module re-exports required package
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'module\.exports\s*=\s*require\s*\(\s*["''][@\w./-]{1,100}["'']\s*\)'
  - id: js-hoc-ensure-env-arrow
    desc: HOC ensure-env wrapper (arrow form)
    crit: notable
    conf: 0.92
    if:
      type: tree-sitter
      query: |
        (function_declaration
          name: (identifier) @outer
          parameters: (formal_parameters
            (identifier) @param)
          body: (statement_block
            (return_statement
              (arrow_function)))
          (#match? @outer "^(ensure|guard|require|init|bootstrap|setup)_?(Env|env|Runtime|runtime|Setup|setup|Deps|deps)$")
          (#eq? @param "fn"))

  - id: js-hoc-ensure-env-classic
    desc: HOC ensure-env wrapper (classic form)
    crit: notable
    conf: 0.92
    unless:
      - type: path
        regex: '\.d\.ts$'
    if:
      type: tree-sitter
      query: |
        (function_declaration
          name: (identifier) @outer
          parameters: (formal_parameters
            (identifier) @param)
          body: (statement_block
            (return_statement
              (function_expression)))
          (#match? @outer "^(ensure|guard|require|init|bootstrap|setup)_?(Env|env|Runtime|runtime|Setup|setup|Deps|deps)$")
          (#eq? @param "fn"))

  - id: async-iife-invoke
    desc: Immediately invokes multiple async functions
    crit: notable
    conf: 0.7
    count_min: 2
    if:
      type: text
      regex: '\(async\s*\(\)\s*=>'
    not:
      - substr: this.writeOperation = (async () =>
      - substr: builtin-plugins/tabby-
    unless:
      - type: text
        substr: '"version":3,"file":'
      - type: basename
        regex: ^(\.map|rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: async-iife-invoke-single
    desc: Immediately invokes an async function
    crit: notable
    conf: 0.76
    if:
      type: text
      regex: '\(\s*async\s*\(\s*\)\s*=>'
    not:
      - substr: this.writeOperation = (async () =>
      - substr: builtin-plugins/tabby-
    unless:
      - type: text
        substr: '"version":3,"file":'
      - type: basename
        regex: ^(\.map|rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: assigned-async-function-iife
    desc: Assigned async function auto-executes
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '=\s*async\s+function.{0,80}\)\s*\{[\s\S]{0,900}\}\s*\(\s*\)'
  - id: module-scope-string-function
    desc: Top-level non-require string call
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^(const|let|var)\s+\w+\s*=\s*(?!require)\w+\(\s*["''][A-Za-z][\w-]{1,32}["'']'
  - id: module-scope-zero-arg-call
    desc: Module scope assigns zero-argument call
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?m)^(const|let|var)\s+\w+\s*=\s*\w+\s*\(\s*\)'
  - id: direct-zero-arg-call
    desc: Invokes zero-argument function at module scope
    crit: notable
    conf: 0.86
    # Require 3+ char names: minified bundles emit `u();` / `a();` after `{`
    # on their own line, which is not module-scope side-effect execution.
    unless:
      - id: metadata/package/testing/
      - type: path
        regex: '(?i)(^|[\\/])min[\\/]|\\.min\\.js$'
    if:
      type: text
      regex: '(?m)^[A-Za-z_$][A-Za-z0-9_$]{2,}\s*\(\s*\)\s*;'
  - id: js-trailing-iife-closure
    desc: JavaScript file ends with an IIFE
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\}\)\(\)\s*;?\s*$'
composite_rules:
  - id: module-empty-export
    desc: JavaScript module exports an empty object
    crit: notable
    conf: 0.8
    any:
      - id: js-empty-export-default
      - id: js-empty-module-exports
  - id: module-side-effect-empty-export
    desc: Module auto-executes with an empty export
    crit: notable
    conf: 0.88
    all:
      - id: async-iife-invoke
    any:
      - id: js-empty-export-default
      - id: js-empty-module-exports
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/lib/pdfjs/
  - id: module-scope-string-registry-call
    desc: Module scope invokes string-selected function
    crit: notable
    conf: 0.92
    all:
      - id: module-scope-string-function
      - id: module-scope-zero-arg-call
    near_lines: 3
  - id: js-import-time-hook-installation
    desc: JS import-time or first-touch hook
    crit: notable
    conf: 0.92
    any:
      - id: js-hoc-ensure-env-arrow
      - id: js-hoc-ensure-env-classic
      - id: micro-behaviors/process/exit/terminate::js-process-on-exit-hook
      - id: micro-behaviors/os/module/load::js-side-effect-require
      - id: micro-behaviors/os/module/load::js-require-extensions-mutate
      - id: micro-behaviors/os/module/load::js-module-resolvefilename-override
