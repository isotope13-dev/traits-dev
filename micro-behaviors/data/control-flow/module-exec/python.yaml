# Python Module-Level Execution
# Detects bare function calls at module scope in Python files.
# Legitimate SDK/library modules define classes and functions but rarely
# execute bare function calls on import. Useful for differential analysis
# when comparing package versions for supply-chain compromise.
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: module-level-bare-call
    desc: Multiple bare function calls at module scope
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?m)^[A-Za-z_]\w+\(\)\s*(#[^\n]{0,160})?$'
    not:
      - substr: "if __name__"
      - regex: '\n(print|logging\.)\w*\('
    count_min: 2
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: try-wrapped-module-call
    desc: Import-time call silenced by try/except
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?m)^try:\s*\n\s{4}[A-Za-z_]\w+\(\)\s*\n^except'
