# Neutral Python membership / set-construction idioms.
#
# `x = set()`, `if x in y:`, and `if x not in y:` are universal Python
# control-flow building blocks present in nearly every module. They carry
# no standalone signal and are organized here by what the matcher detects
# (a membership test / set construction), not by any composite they serve.
# Obfuscation string-recovery composites in
# objectives/anti-static/obfuscation/string/recovery/ reference them
# cross-directory to express a dedup-and-dump pattern.
defaults:
  platforms:
  - windows
  - unix
  for:
  - python
traits:
- id: set-construction
  desc: Python set() construction
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \w+\s*=\s*set\(\)
- id: in-membership-check
  desc: Python in-membership check
  crit: component
  conf: 0.3
  if:
    type: text
    regex: 'if\s+\w+\s+in\s+\w+\s*:'
- id: not-in-membership-check
  desc: Python not-in membership check
  crit: component
  conf: 0.3
  if:
    type: text
    regex: 'if\s+\w+\s+not\s+in\s+\w+\s*:'
