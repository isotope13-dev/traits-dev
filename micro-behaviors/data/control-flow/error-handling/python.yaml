# Error Handling Control Flow - Python
# Detects Python exception handling and error suppression patterns
# ATT&CK: T1027 (Obfuscated Files or Information)
# MBC: C0027 (Error Handling)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1027"
  mbc: "C0027"
traits:
  - id: except-keyword-dup
    desc: except keyword
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: 'except\s+(ImportError|InvalidToken|Exception)'
  - id: importerror-keyword
    desc: ImportError exception
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: "ImportError"
  - id: silent-exception-pass
    desc: "exception suppression via try/except pass"
    crit: component
    conf: 0.85
    if:
      type: text
      # Treat only broad except:pass as notable suppression, not specific exception handlers.
      regex: '(?m)^\s*except\s*(Exception|BaseException|):\s*\n\s*pass\b'
    unless:
      - type: basename
        regex: '(^|[!/])DebugServer\.py$'
  - id: silent-socket-error-pass
    desc: Silent socket error suppression
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*except\s+socket\.error\s*:\s*\n\s*pass\b'

  - id: ruby-rescue-exception-broad
    desc: Ruby catches broad Exception
    crit: notable
    conf: 0.78
    for: [ruby]
    if:
      type: string_literal
      substr: rescue Exception

  - id: ruby-begin-yield-rescue-wrapper
    desc: Ruby yield wrapped by rescue
    crit: notable
    conf: 0.76
    for: [ruby]
    if:
      type: string_literal
      regex: begin.{0,80}yield.{0,80}rescue
