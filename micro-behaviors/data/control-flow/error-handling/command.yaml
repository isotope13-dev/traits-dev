# Command status messages are neutral control-flow observations.
defaults:
  platforms: [windows, unix]
  for: [binaries]
  mbc: "C0027"
traits:
  - id: command-execution-success-message
    desc: Command execution success status message
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: Command executed successfully

  - id: command-execution-failure-message
    desc: Command execution failure message
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: 'Failed to execute command:'
