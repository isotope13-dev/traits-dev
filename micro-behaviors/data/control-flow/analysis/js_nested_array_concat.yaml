defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-nested-array-concat
    desc: Nested array concatenation
    crit: suspicious
    conf: 0.8
    size_max: 50000
    if:
      type: tree-sitter
      query: '(call_expression function: (member_expression property: (property_identifier) @prop (#eq? @prop "concat")) arguments: (arguments (subscript_expression object: (identifier) index: (subscript_expression))))'
  - id: js-nested-array-concat-regex
    desc: Nested array concat (Regex)
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: text
      regex: '\.concat\s*\(\s*\w+\s*\[\s*\w+\s*\[\s*\w+\s*\]\s*\]\s*\)'
