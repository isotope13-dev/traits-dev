defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  # Detects genuinely NESTED array concatenation — `.concat(a[b[c]])` — a
  # structural pattern, not any `.concat()` call. (A prior migration to a bare
  # `kind: call` `\.concat$` symbol match matched every array concatenation and
  # surfaced suspicious on benign minified bundles; restored to the structural
  # regex that matches the trait name.)
  - id: js-nested-array-concat
    desc: Nested array concatenation
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: text
      regex: '\.concat\s*\(\s*\w+\s*\[\s*\w+\s*\[\s*\w+\s*\]\s*\]\s*\)'
