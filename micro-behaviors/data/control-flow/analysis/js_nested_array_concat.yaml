defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-nested-array-concat
    desc: Nested array concatenation
    crit: suspicious
    conf: 0.8
    size_max: 50000
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.concat$'
  - id: js-nested-array-concat-regex
    desc: Nested array concat (Regex)
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: text
      regex: '\.concat\s*\(\s*\w+\s*\[\s*\w+\s*\[\s*\w+\s*\]\s*\]\s*\)'
