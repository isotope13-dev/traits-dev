defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: transformer-transform-call
    desc: Calls transformer transform method
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: transformer.transform

  # Nested lambdas are a legitimate Python expression pattern (for example,
  # curried operator tables).  Keep the structural observation available to
  # higher-level rules, but do not classify it as obfuscation by itself.
  - id: nested-lambda-chain
    desc: Python nested lambda expression chain
    crit: notable
    conf: 0.85
    count_min: 8
    per_kb_min: 2.0
    if:
      type: text
      regex: lambda\s+[a-zA-Z_][a-zA-Z0-9_]*\s*:.{0,50}lambda\s+[a-zA-Z_][a-zA-Z0-9_]*
