# Ruby Control Flow Patterns
# Detects loops and other control structures in Ruby
defaults:
  platforms: [unix, windows]
  for: [ruby]
traits:
  # === Infinite While Loop ===
  - id: ruby-while-true
    desc: Infinite while true loop
    crit: notable
    conf: 0.75
    attack: "T1059"
    # `ast.infinite_loop_count` is the cached fact for literally-true loops
    # (`while true`, `while (1)`, `for (;;)`), computed on the loop node — so it
    # never fires on a bare `while true` in prose or a comment the way a text
    # match would.
    if:
      type: metrics
      field: 'ast.infinite_loop_count'
      min: 1
