defaults:
  platforms: [windows, unix]
  for: [python, javascript]
traits:
  - id: string-literal-equality-check
    desc: String literal equality or membership check
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(==|!=|\bin\b)\s*[\[(]?\s*[''\"][A-Za-z0-9.-]{3,63}[''\"]'
  # `for-loop-ast` (tree-sitter `kind: loop, substr: for`) removed: redundant
  # with `for-loop-content` below, whose text regex matches the same `for (…)` /
  # `for … in` shapes across the same python/javascript scope.
  - id: for-loop-content
    desc: for loop (content)
    crit: baseline
    conf: 0.3
    if:
      type: text
      regex: (^|[;{}\s])for(\s+\w+\s+in\s+|\s*\(|(\s+\w{1,20}\s*:[^=/]))
  - id: for-loop-symbol
    desc: for_loop symbol
    crit: baseline
    conf: 0.3
    for: [c, cpp, rust, go]
    if:
      type: symbol
      exact: for_loop
  - id: iter-symbol
    desc: Function or symbol named iter
    crit: baseline
    conf: 0.3
    for: [c, cpp, rust, go]
    if:
      type: symbol
      exact: iter
  - id: while-loop
    desc: While-loop control flow
    crit: baseline
    conf: 0.3
    for: [python]
    if:
      type: text
      regex: '(?m)^\s*while\s+.{1,100}:'
  - id: glob-pattern
    desc: glob module pattern
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: glob\.
composite_rules:
  - id: iteration-loop-pattern
    desc: Iteration or loop pattern
    crit: baseline
    conf: 0.5
    any:
      - id: for-loop-content
      - id: for-loop-symbol
      - id: iter-symbol
      - id: while-loop
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: glob-pattern
