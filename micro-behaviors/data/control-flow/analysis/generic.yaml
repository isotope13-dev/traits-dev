defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: for-loop-ast
    desc: for loop (AST)
    crit: baseline
    conf: 0.3
    if:
      type: ast
      node: for
      regex: .{0,1000}
  - id: for-loop-content
    desc: for loop (content)
    crit: baseline
    conf: 0.3
    if:
      type: raw
      regex: (?m)(^|[;{}\s])for(\s+\w+\s+in\s+|\s*\(|(\s+\w{1,20}\s*:[^=/]))
  - id: for-loop-symbol
    desc: for_loop symbol
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      exact: for_loop
  - id: iter-symbol
    desc: iter symbol
    crit: baseline
    conf: 0.3
    if:
      type: symbol
      exact: iter
  - id: while-loop
    desc: while loop pattern
    crit: baseline
    conf: 0.3
    if:
      type: raw
      regex: '(?m)^\s*while\s+.{1,100}:'
  - id: glob-pattern
    desc: glob module pattern
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: glob\.
composite_rules:
  - id: iteration-loop-pattern
    desc: Iteration or loop pattern
    crit: baseline
    conf: 0.5
    any:
      - id: for-loop-ast
      - id: for-loop-content
      - id: for-loop-symbol
      - id: iter-symbol
      - id: while-loop
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: glob-pattern
