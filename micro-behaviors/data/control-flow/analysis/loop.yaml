defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: while-augmented-assignment
    desc: Augmented assignment inside while loop
    crit: notable
    if:
      type: tree-sitter
      language: javascript
      query: |
        (while_statement
          body: (statement_block
            (expression_statement
              (augmented_assignment_expression
                operator: ["+=" "-="]
                right: (identifier) @step
              )
            )
          )
        )
        (#not-match? @step "^(approx|delta|epsilon|error|precision|diff|sum|total|chunk|byte|char|line|data|common|buffer|res)$")
    unless:
      - type: basename
        regex: '(^jsbn(-combined|2)?\.js$|\.js\.map$)'
      - id: well-known/lib/qrcode-js::qrcode-for-javascript
      - id: well-known/app/tabby::tabby-builtin-plugin-dist-path
      - type: basename
        regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/library/runtime::js-module-exports
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: loop-string-access-dynamic-method
    desc: String character access inside a loop using
    crit: notable
    if:
      type: tree-sitter
      language: javascript
      query: |
        (while_statement
          body: (statement_block
            (expression_statement
              (assignment_expression
                right: (binary_expression
                  right: (call_expression
                    function: (subscript_expression
                      object: (identifier) @str
                      index: (identifier) @method
                    )
                    arguments: (arguments (identifier) @idx)
                  )
                )
              )
            )
          )
        )
