defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  - id: js-parenthesized-function-heavy
    desc: Dense parenthesized function expressions
    crit: notable
    conf: 0.85
    size_min: 2048
    count_min: 15
    per_kb_min: 5.0
    if:
      type: text
      regex: \(\s*(async\s+)?function\s*\([^)]{0,50}\)\s*\{|\(\s*(async\s+)?\([^)]{0,50}\)\s*=>
    unless:
      - id: metadata/library/structure/
      - id: metadata/package/testing/
  - id: js-function-call-method
    desc: Invokes function with .call()
    crit: baseline
    conf: 0.84
    if:
      type: text
      regex: '\.call\s*\([^)]{0,120}\)'
  - id: js-async-try-await-call
    desc: Async function awaits call in try
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    count_min: 2
    if:
      type: text
      regex: 'async\s+function\s+\w+\(\)\s*\{\s*try\s*\{\s*await\s+\w+\('
  - id: js-undefined-string-compare
    desc: Compares value against the undefined string
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: "==\\s*['\"]undefined['\"]"
  - id: js-try-catch-error-method-call
    desc: Calls nested caught-error object method
    crit: notable
    conf: 0.8
    if:
      type: tree-sitter
      language: javascript
      # Matches: catch(e) { ... e[prop][method](); } or e.prop.method()
      query: |
        (catch_clause
          parameter: (identifier) @err_param
          body: (statement_block
            (expression_statement
              (assignment_expression
                right: (call_expression
                  function: (member_expression
                    object: (member_expression
                      object: (identifier) @err_use
                    )
                  )
                )
              )
            )
          )
        )
        (#eq? @err_param @err_use)
  - id: js-dynamic-method-call
    desc: Calls a method via computed bracket access
    crit: baseline
    conf: 0.7
    count_min: 8
    unless:
      - type: basename
        exact: CHANGES
      - id: metadata/library/runtime/
    if:
      type: tree-sitter
      language: javascript
      query: |-
        (call_expression
          function: (subscript_expression
            index: (identifier)
          ) @computed
        )
