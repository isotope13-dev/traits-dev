defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

# Neutral JavaScript data/control-flow patterns. They become anti-static
# evidence only when the objective composite combines the complete sequence
# and the file is not ordinary generated bundle output.
traits:
  - id: js-map-typeof-string-branch
    desc: Branches between value and indexed lookup
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.map\(\s*\(?\w+\)?\s*=>.{0,120}typeof.{0,60}\?.{0,25}:\s*\w+\[\w+\]'

  - id: js-map-conditional-index-lookup
    desc: Conditional indexed map lookup
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\.map\(\s*\(?\w+\)?\s*=>.{0,180}\?.{0,30}:\s*\w+\[\w+\]'

  - id: js-map-result-empty-join
    desc: Joins mapped indexed values without separator
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\.map\(\s*\(?\w+\)?\s*=>.{0,120}\?.{0,30}:\s*\w+\[\w+\].{0,40}\)\.join\s*\(["'']{2}\s*\)'
