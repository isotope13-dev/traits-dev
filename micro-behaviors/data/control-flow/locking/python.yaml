defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  crit: baseline
traits:
  - id: python-thread-lock
    desc: Python threading lock usage
    conf: 0.7
    if:
      type: text
      regex: '\.Lock\(\)'
  - id: python-with-lock
    desc: Python lock guarded block
    conf: 0.75
    if:
      type: text
      regex: 'with\s+[A-Za-z_][A-Za-z0-9_]*:\s*\n\s+with\s+open\('
composite_rules:
  - id: python-synchronized-file-access
    desc: Python synchronized file access
    crit: notable
    conf: 0.82
    all:
      - id: python-thread-lock
      - id: python-with-lock
