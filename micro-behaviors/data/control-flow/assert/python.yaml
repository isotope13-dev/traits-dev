# Python assertion statements are neutral control-flow checks. They occur in
# production invariants as well as tests; testing intent comes from the pytest
# composite that references this trait alongside framework-specific evidence.
defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-assert-statement
    desc: Checks condition using Python assert
    crit: baseline
    conf: 0.95
    if:
      type: tree-sitter
      query: '(assert_statement) @assert'
