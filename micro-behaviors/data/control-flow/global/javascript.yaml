# JavaScript global namespace references are common in runtimes, bundlers, and
# extension integrations.  The namespace shape is useful context, but is not
# supply-chain intent by itself.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: global-namespace-dunder-reference
    desc: JavaScript global namespace dunder reference
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: '^global(This)?\\.__[a-z_]+'
