defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: js-provider-computed-forwarding
    desc: Accesses a provider through a computed property
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]*Provider\s*\[[A-Za-z_$][\w$]*\]'

  - id: js-commonjs-provider-export
    desc: CommonJS module exports a provider symbol
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'exports\.[A-Za-z_$][\w$]*Provider\s*='

  - id: js-esm-provider-export
    desc: ESM module exports a provider symbol
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'export\s*\{[^}]{0,240}\b[A-Za-z_$][\w$]*Provider\b'
