defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: indirect-call-r13-x64
    desc: Calls a function indirectly through x64 r13
    crit: baseline
    conf: 0.7
    if:
      type: hex
      section: .text
      pattern: '41 FF D5'

  - id: indexed-function-table-indirect-call-x64
    desc: x64 indexed indirect call through function table
    crit: notable
    conf: 0.9
    arch: [x86-64]
    count_min: 2
    if:
      type: hex
      section: .text
      pattern: '41 FF 14 C0'
