defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: indirect-call-r13-x64
    desc: Calls a function indirectly through x64 r13
    crit: baseline
    conf: 0.7
    if:
      type: hex
      section: .text
      pattern: '41 FF D5'

  - id: indexed-function-table-indirect-call-x64
    desc: x64 indexed indirect call through function table
    crit: notable
    conf: 0.9
    arch: [x86-64]
    count_min: 2
    if:
      type: hex
      section: .text
      pattern: '41 FF 14 C0'

  - id: x86-global-pointer-indirect-call
    desc: x86 indirect call through global pointer
    crit: notable
    conf: 0.9
    attack: T1620
    arch: [x86]
    if:
      type: hex
      section: .text
      # A global pointer is loaded into ESI and called after runtime setup.
      pattern: '8B 35 ?? ?? ?? ?? [0-32] FF D6'
