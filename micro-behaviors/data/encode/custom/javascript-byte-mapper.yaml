defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: js-custom-byte-mapper
    desc: Custom byte mapping via charCodeAt
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: \["charCodeAt"\]\(\w+\);\s*if\s*\(\w+\s*<\s*128\)
