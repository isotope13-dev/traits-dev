defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: base64-alphabet-numeric-mixed
    desc: Custom Base64 Encoding Alphabet (Mixed Numeric)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      exact: a56ghijklmnuvwxyz07opqrsbcdef1234t89
  - id: shifted-base64-symbol-alphabet
    desc: Shifted Base64-style symbol alphabet
    crit: notable
    conf: 0.95
    for: [pe, dll]
    if:
      type: text
      exact: '0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_'
