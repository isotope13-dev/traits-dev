defaults:
  platforms: [windows, unix]
traits:
  - id: massive-array-index-assignment
    desc: "Massive array index assignment"
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      # Matches numeric array index assignments mapping indices to numeric values (e.g. arr[123]=456)
      # Excludes boolean assignments like _[71]=!0 common in minified parsers
      regex: '([a-zA-Z0-9_$?]{1,20}\[.?\d{2,}.?\]?.?=.?\d{2,}.?[;,].?){10,}'
    unless:
      - type: text
        substr: lamalefisolatedarabic
      - id: metadata/library/structure::google-tag-manager-bundle
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      - id: well-known/app/google-web::google-payments-integrator-bundle
