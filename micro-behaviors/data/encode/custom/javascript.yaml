defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: massive-array-index-assignment
    desc: Massive array index assignment (custom mapping)
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: raw
      # Matches numeric array index assignments mapping indices to numeric values (e.g. arr[123]=456)
      # Excludes boolean assignments like _[71]=!0 common in minified parsers
      regex: '([a-zA-Z0-9_$?]{1,20}\[.?\d{2,}.?\]?.?=.?\d{2,}.?[;,].?){10,}'
