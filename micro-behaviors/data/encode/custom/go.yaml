defaults:
  platforms: [windows, unix]
  for:
    - go
traits:
  - id: user-agent-fixed-width-padding
    desc: Pads User-Agent to fixed width
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: for len(userAgent) < model.UserAgentPaddingLen
  - id: ipv4-octet-split
    desc: Splits IPv4 octets for encoding
    crit: component
    conf: 0.8
    if:
      type: text
      substr: strings.Split(ip, ".")
  - id: decimal-zero-pad-1
    desc: One digit zero-padding format
    crit: component
    conf: 0.7
    if:
      type: string_literal
      exact: 0%d
  - id: decimal-zero-pad-2
    desc: Two digit zero-padding format
    crit: component
    conf: 0.75
    if:
      type: string_literal
      exact: 00%d
  - id: decimal-zero-pad-3
    desc: Three digit zero-padding format
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: 000%d
  - id: decimal-zero-pad-4
    desc: Four digit zero-padding format
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: 0000%s
  - id: decimal-zero-pad-5
    desc: Three digit string padding
    crit: component
    conf: 0.75
    if:
      type: string_literal
      exact: 000%s
  - id: decimal-zero-pad-6
    desc: Two digit string padding
    crit: component
    conf: 0.75
    if:
      type: string_literal
      exact: 00%s
  - id: decimal-zero-pad-7
    desc: One digit string padding
    crit: component
    conf: 0.7
    if:
      type: string_literal
      exact: 0%s
  - id: file-flag-delimiter
    desc: Flag and filepath delimiter format
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: '%d%s#'
composite_rules:
  - id: fixed-width-page-index-encoding
    desc: Fixed-width page index encoding
    crit: suspicious
    conf: 0.9
    all:
      - id: user-agent-fixed-width-padding
    needs: 3
    any:
      - id: decimal-zero-pad-1
      - id: decimal-zero-pad-2
      - id: decimal-zero-pad-3
  - id: fixed-width-ip-port-encoding
    desc: Fixed-width IP and port encoding
    crit: suspicious
    conf: 0.94
    all:
      - id: user-agent-fixed-width-padding
      - id: ipv4-octet-split
    needs: 4
    any:
      - id: decimal-zero-pad-4
      - id: decimal-zero-pad-5
      - id: decimal-zero-pad-6
      - id: decimal-zero-pad-7
  - id: fixed-width-file-watch-encoding
    desc: Fixed-width file watch encoding
    crit: suspicious
    conf: 0.93
    all:
      - id: user-agent-fixed-width-padding
      - id: file-flag-delimiter
