# Native lookup-table decoders.  The atom describes the transformation only;
# executable-memory and control-flow traits provide the intent gate.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: x86-lookup-table-byte-decoder
    desc: x86 lookup-table loop decoding bytes
    crit: component
    conf: 0.78
    attack: T1027
    arch: [x86]
    size_max: 5242880
    if:
      type: hex
      section: .text
      # Compare each input word against a 256-entry table, emit one byte,
      # and advance through the complete byte range.
      pattern: '31 C9 85 C0 74 ?? 8B 1C 8D ?? ?? ?? ?? 31 D2 39 1C 95 ?? ?? ?? ?? 75 ?? 88 14 08 EB ?? 42 81 FA 00 01 00 00 75 ?? 41 81 F9 ?? ?? ?? ?? 75 ?? 89 04 24 E8 ?? ?? ?? ??'
