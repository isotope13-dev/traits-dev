# PDF stream encoding obfuscation patterns
#
# Detects stream-level obfuscation in PDF documents. Multi-filter chaining
# and hex-encoded name tokens are used to evade static AV signature scanning.
# These indicators appear in uncompressed object dictionaries and are always
# visible to raw byte matching, even when stream content is compressed.
#
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  crit: suspicious
  conf: 0.88
  for: [pdf]
traits:
  # Multi-filter array — two or more chained decode filters on one stream.
  # Pattern: /Filter [ /ASCII85Decode /FlateDecode ]
  # Legitimate PDFs almost never chain filters; exploit kits do.
  - id: pdf-multi-filter
    desc: PDF stream chained filter array (evasion)
    if:
      type: raw
      regex: "/Filter\\s*\\["
  # Hex-encoded PDF name starting with 0x2F ('/').
  # In PDF name syntax, <2F4A53> is the hex string '/JS'. Attackers encode
  # action keywords this way to defeat /JS substring scanner signatures.
  # Pattern matches /S <2FXX...> which is the encoded action type specifier.
  - id: pdf-hex-name
    desc: Hex-encoded PDF name token — keyword obfuscation
    if:
      type: raw
      regex: "/S\\s+<2[Ff][0-9a-fA-F]+"
  # ASCIIHexDecode filter — stream bytes encoded as ASCII hex pairs.
  # Rarely used legitimately; present almost exclusively for evasion.
  - id: pdf-ascii-hex-filter
    desc: PDF ASCIIHexDecode filter — hex-encoded stream content
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: "/ASCIIHexDecode\\b"
  # ASCII85Decode filter — base-85 encoded stream.
  # A second ASCII85 layer over FlateDecode is a strong obfuscation indicator.
  - id: pdf-ascii85-filter
    desc: PDF ASCII85Decode filter — base-85 encoded stream
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: "/ASCII85Decode\\b"
