# Python RC4 characteristics
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: python-rc4-loop
    desc: RC4 characteristics in Python
    crit: notable
    for: [python]
    mbc: "C0027"
    if:
      type: text
      regex: '(?s)for \w+ in range\s*\(\s*256\s*\):.{0,500}%\s*256'
