# RC4 stream cipher implementation in JavaScript / TypeScript source.
# The binary RC4 family in micro-behaviors/crypto/symmetric/stream/rc4.yaml
# is hex-pattern based and only fires on compiled binaries; this file
# captures the same algorithm when present as readable script.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: C0027
  attack: T1573
traits:
  # `for(i; i<256; ...){a[i]=i;}` is the RC4 KSA init step but also a
  # generic 256-element array fill (palette tables, sieves). Component-only
  # — the composite below requires PRGA output to confirm RC4.
  - id: js-rc4-ksa-init
    desc: RC4 KSA identity-fill loop (composite-only)
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'for\s*\(\s*\w[^;]{0,40};\s*\w+\s*<\s*256\s*;.{0,30}\)\s*\{\s*\w+\[\w+\]\s*=\s*\w+\s*;'
  - id: js-rc4-ksa-key-mix
    desc: RC4 KSA key-mix swap step
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'charCodeAt\s*\(\s*\w+\s*%\s*\w+\.length\s*\)\s*\)\s*&\s*0xff'
  - id: js-rc4-prga-output
    desc: RC4 PRGA keystream output index
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\w+\[\s*\(\s*\w+\[\w+\]\s*\+\s*\w+\[\w+\]\s*\)\s*&\s*0xff\s*\]'
composite_rules:
  - id: js-rc4-implementation
    desc: RC4 cipher implementation in JavaScript
    crit: suspicious
    conf: 0.95
    all:
      - id: js-rc4-prga-output
    any:
      - id: js-rc4-ksa-init
      - id: js-rc4-ksa-key-mix
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
