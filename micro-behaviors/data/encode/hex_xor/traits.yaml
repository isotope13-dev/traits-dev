defaults:
  platforms:
    - unix
    - windows
  for: [javascript]
traits:
  - id: fragmented-hex-xor-decoder
    desc: Repeated hexadecimal-left XOR expressions
    crit: notable
    conf: 0.85
    for: [javascript, typescript]
    count_min: 4
    if:
      # Match executable expressions, not explanatory comments such as the
      # finite-field arithmetic examples bundled with node-forge.
      type: tree-sitter
      kind: binary_op
      regex: '0x[0-9a-fA-F]{2}\s*\^'
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
  - id: js-obfuscated-fragment-xor-decode
    desc: Obfuscated fragment XOR decode in JS
    crit: notable
    conf: 0.8
    count_min: 8
    # `... ^ 0xNN` — XOR against a hex-literal operand (key byte on the right).
    # Complements `fragmented-hex-xor-decoder` (which matches executable
    # `0xNN ^ ...` left-operand expressions). 8+ occurrences is the signal.
    if:
      type: text
      regex: '\^\s*0x[0-9a-fA-F]{1,8}\b'
    unless:
      - id: metadata/library/structure/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::dart-flutter-js-bundle
      - id: metadata/library/structure::vscode-extension-generated-asset
      - type: basename
        regex: \.shp$
      - type: basename
        regex: ^flowchart-elk-definition-.*\.js$
      - type: basename
        regex: ^yarn-[0-9][0-9.]*\.cjs$
