defaults:
  platforms:
    - unix
    - windows
  for: [javascript]
traits:
  - id: fragmented-hex-xor-decoder
    desc: Fragmented hex XOR decoder pattern
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    count_min: 4
    if:
      type: text
      regex: 0x[0-9a-fA-F]{2}\s*\^
  - id: js-obfuscated-fragment-xor-decode
    desc: Obfuscated fragment XOR decode in JS
    crit: notable
    conf: 0.8
    count_min: 8
    # `... ^ 0xNN` — XOR against a hex-literal operand (key byte on the right).
    # Complements `fragmented-hex-xor-decoder` (which matches the `0xNN ^ ...`
    # left-operand form). 8+ occurrences is the fragmented-decoder signal.
    if:
      type: text
      regex: '\^\s*0x[0-9a-fA-F]{1,8}\b'
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::dart-flutter-js-bundle
      - type: basename
        regex: \.shp$
      - type: basename
        regex: ^flowchart-elk-definition-.*\.js$
      - type: basename
        regex: ^yarn-[0-9][0-9.]*\.cjs$
