defaults:
  platforms:
    - unix
    - windows
  for: [javascript]
traits:
  - id: fragmented-hex-xor-decoder
    desc: Fragmented hex XOR decoder pattern
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 0x[0-9a-fA-F]{2}\s*\^
  - id: js-obfuscated-fragment-xor-decode
    desc: Obfuscated fragment XOR decode in JS
    crit: suspicious
    conf: 0.8
    count_min: 8
    if:
      type: ast
      language: javascript
      query: "(binary_expression\n  operator: \"^\"\n  right: (number) @hex\n)\n(#match? @hex \"^0x\")\n"
    unless:
      - type: basename
        regex: ^flowchart-elk-definition-.*\.js$
      - type: basename
        regex: ^yarn-[0-9][0-9.]*\.cjs$
