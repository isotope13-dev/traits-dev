# XOR index-modulo decode loop (byte ^ key[i % key.len]) in compiled-language
# source — the runtime string decoder used by obfuscated Rust/Java/Groovy droppers.
defaults:
  platforms: [unix, windows]
  for: [rust, java, groovy]
traits:
  - id: xor-byte-decoder-loop
    desc: Native bytewise XOR decoder loop
    crit: notable
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    if:
      type: hex
      section: .text
      pattern: '8A 06 ?? 32 ?? ?? 88 07 42 46'
  - id: x86-xor-add-buffer-decoder-loop
    desc: x86 XOR-add buffer decoding loop
    crit: notable
    conf: 0.94
    mbc: B0032
    attack: T1027
    for: [pe, dll]
    platforms: [windows]
    arch: [x86]
    if:
      type: hex
      section: .text
      # A byte buffer is XORed with a derived key and incremented in place.
      # The loop shape is independent of this sample's API names or addresses.
      pattern: '0F B6 ?? 33 55 ?? 03 55 ?? A1 ?? ?? ?? ?? 03 45 ?? 88 10 EB ??'
  - id: xor-index-modulo-generic
    desc: XOR index-modulo decode loop
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\^\s*\w+\[\s*\w+\s*%\s*\w'
