# XOR index-modulo decode loop (byte ^ key[i % key.len]) in compiled-language
# source — the runtime string decoder used by obfuscated Rust/Java/Groovy droppers.
defaults:
  platforms: [unix, windows]
  for: [rust, java, groovy]
traits:
  - id: xor-byte-decoder-loop
    desc: Native bytewise XOR decoder loop
    crit: notable
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    if:
      type: hex
      section: .text
      pattern: '8A 06 ?? 32 ?? ?? 88 07 42 46'
  - id: xor-index-modulo-generic
    desc: XOR index-modulo decode loop
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\^\s*\w+\[\s*\w+\s*%\s*\w'
