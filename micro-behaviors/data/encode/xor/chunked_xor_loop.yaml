defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: js-xor-op
    desc: XOR operator
    crit: baseline
    if:
      type: string_literal
      substr: ' ^ '
  - id: js-substring
    desc: Substring call
    crit: baseline
    if:
      type: string_literal
      regex: \b(substring|substr|slice)\s*\(
  - id: js-charat
    desc: charAt call
    crit: baseline
    if:
      type: string_literal
      regex: \bcharAt\s*\(
composite_rules:
  - id: js-chunked-xor-loop
    desc: Detects JScript decoding logic using chunked parsing (usually 3 digits) and XOR.
    crit: suspicious
    size_max: 100000
    all:
      - id: micro-behaviors/data/string/conversion::js-parseint
      - id: micro-behaviors/data/string/conversion::js-fromcharcode
      - id: js-xor-op
      - id: micro-behaviors/data/control-flow/loop::js-loop
    any:
      - id: js-substring
      - id: js-charat
