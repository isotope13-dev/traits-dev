# Perl XOR string decode (chr(ord(a) ^ ord(key[i % n]))) — obfuscated Perl dropper.
defaults:
  platforms: [unix, windows]
  for: [perl]
traits:
  - id: perl-xor-decode
    desc: Perl XOR-with-modulo decode loop
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\^\s*ord\([\s\S]{0,20}%'
