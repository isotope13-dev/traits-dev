defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: xor-key-name
    desc: XOR key variable reference
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: xor_key
    unless:
      - id: well-known/tool/detection/malware-config-parser
  - id: xor-encrypt-name
    desc: XOR encrypt function reference
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: xor_encrypt
