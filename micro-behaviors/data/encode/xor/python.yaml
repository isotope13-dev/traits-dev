defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: xor-bitwise-op
    desc: "Bitwise XOR operation"
    crit: baseline
    conf: 0.6
    if:
      # Migrated from a tree-sitter `(binary_operator operator: "^")` query to
      # the `ast.op.xor` density metric (counted inline in the single AST walk;
      # O(1) match, no per-node cursor walk).
      type: metrics
      field: 'ast.op.xor'
      min: 1
  - id: xor-decoding-loop
    desc: "XOR decoding loop with modulo"
    crit: notable
    conf: 0.8
    if:
      type: tree-sitter
      language: python
      # Matches: data[i] ^ key[... % len(key)]
      query: |
        (binary_operator
          left: (subscript)
          operator: "^"
          right: (subscript
            subscript: (binary_operator
              operator: "%"
              right: (call
                function: (identifier) @len
                (#eq? @len "len")
              )
            )
          )
        )
  - id: xor-byte-invert-listcomp
    desc: "Single-byte XOR list comprehension"
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\[\w+\s*\^\s*0xFF\s+for\s+\w+\s+in\s+\w+\]'
  - id: xor-byte-invert-bytes-listcomp
    desc: "bytes XOR inversion transform"
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'bytes\(\[\w+\s*\^\s*0xFF\s+for\s+\w+\s+in\s+\w+\]\)'
  - id: xor-bytes-genexpr-key
    desc: "bytes XOR decode generator over variable key"
    crit: notable
    conf: 0.93
    attack: T1027
    mbc: B0032
    # Generator-expression form: bytes(b ^ key for b in iter)
    # The key may be a name (`k`), a call (`_k()`), or a subscript (`key[i % n]`).
    if:
      type: text
      regex: 'bytes\(\s*\w+\s*\^\s*[\w.\[\]()% ]{1,40}\s+for\s+\w+\s+in\s+'
  - id: xor-bytes-genexpr-literal
    desc: "bytes XOR decode generator with literal key"
    crit: notable
    conf: 0.94
    attack: T1027
    mbc: B0032
    # Same shape as above but key is a hex/int literal (0x73, 42, 0xff窶ｦ),
    # which is the trivial single-byte stream cipher. Literal keys are
    # MORE diagnostic of obfuscation, not less, so this is its own atom.
    if:
      type: text
      regex: 'bytes\(\s*\w+\s*\^\s*(0x[0-9a-fA-F]{1,3}|[0-9]{1,3})\s+for\s+\w+\s+in\s+'
  - id: xor-bytearray-mutating-loop
    desc: "bytearray in-place XOR mutation loop"
    crit: notable
    conf: 0.92
    attack: T1027
    mbc: B0032
    # for i in range(len(buf)): buf[i] ^= key[i % len(key)]
    if:
      type: text
      regex: '\w+\[\w+\]\s*\^=\s*\w+\[?\w*[%]?\w*\]?'
  - id: xor-itertools-starmap-cycle
    desc: itertools.starmap(operator.xor, zip(...))
    crit: notable
    conf: 0.95
    attack: T1027
    mbc: B0032
    if:
      type: text
      regex: 'starmap\s*\(\s*(operator\.)?xor\s*,\s*zip\s*\('
