defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: xor-bitwise-op
    desc: "Bitwise XOR operation"
    crit: baseline
    conf: 0.6
    if:
      type: ast
      language: python
      query: |
        (binary_operator
          operator: "^"
        )
  - id: xor-decoding-loop
    desc: "XOR decoding loop with modulo"
    crit: notable
    conf: 0.8
    if:
      type: ast
      language: python
      # Matches: data[i] ^ key[... % len(key)]
      query: |
        (binary_operator
          left: (subscript)
          operator: "^"
          right: (subscript
            subscript: (binary_operator
              operator: "%"
              right: (call
                function: (identifier) @len
                (#eq? @len "len")
              )
            )
          )
        )
  - id: xor-byte-invert-listcomp
    desc: "Single-byte XOR list comprehension"
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\[\w+\s*\^\s*0xFF\s+for\s+\w+\s+in\s+\w+\]'
  - id: xor-byte-invert-bytes-listcomp
    desc: "bytes XOR inversion transform"
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'bytes\(\[\w+\s*\^\s*0xFF\s+for\s+\w+\s+in\s+\w+\]\)'
