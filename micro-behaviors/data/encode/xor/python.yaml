defaults:
  platforms: [windows, unix]
  for: [python]
# NOTE: the bare "a ^ b" bitwise-XOR-operator capability lives in
# micro-behaviors/data/source/syntax/keyword/python.yaml (a neutral operator
# fact), NOT here. A lone `^` is not XOR *encoding*; keeping it in this
# directory made every `micro-behaviors/data/encode/xor` dir-reference match
# any file containing a single `^`. This file holds only real XOR
# encode/decode transforms (byte-range genexprs, loops, cyclic-key decoders).
traits:
  - id: b64decode-then-xor-bytes
    desc: XORs bytes produced by Base64 decoding
    crit: notable
    conf: 0.9
    attack: T1027
    mbc: B0032
    size_max: 15000
    if:
      type: text
      regex: 'b64decode[\s\S]{0,120}\^\s*\w{1,20}\[\w{1,3}\s*%'
  - id: xor-byte-invert-listcomp
    desc: "Single-byte XOR list comprehension"
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\[\w+\s*\^\s*0xFF\s+for\s+\w+\s+in\s+\w+\]'
  - id: xor-byte-invert-bytes-listcomp
    desc: "bytes XOR inversion transform"
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'bytes\(\[\w+\s*\^\s*0xFF\s+for\s+\w+\s+in\s+\w+\]\)'
  - id: xor-bytes-genexpr-key
    desc: "bytes XOR decode generator over variable key"
    crit: notable
    conf: 0.93
    attack: T1027
    mbc: B0032
    # Generator-expression form: bytes(b ^ key for b in iter)
    # The key may be a name (`k`), a call (`_k()`), or a subscript (`key[i % n]`).
    # Literal integer keys are handled by xor-bytes-genexpr-literal below so a
    # single-byte protocol decode does not count as two obfuscation primitives.
    if:
      type: text
      regex: 'bytes\(\s*\w+\s*\^\s*[A-Za-z_][\w.\[\]()%]{0,23}\s+for\s+\w+\s+in\s+'
  - id: xor-bytes-genexpr-literal
    desc: "bytes XOR decode generator with literal key"
    crit: notable
    conf: 0.94
    attack: T1027
    mbc: B0032
    # Same shape as above but key is a hex/int literal (0x73, 42, 0xff…),
    # which is the trivial single-byte stream cipher. Literal keys are
    # MORE diagnostic of obfuscation, not less, so this is its own atom.
    if:
      type: text
      regex: 'bytes\(\s*\w+\s*\^\s*(0x[0-9a-fA-F]{1,3}|[0-9]{1,3})\s+for\s+\w+\s+in\s+'
  - id: xor-bytearray-mutating-loop
    desc: "bytearray in-place XOR mutation loop"
    crit: notable
    conf: 0.92
    attack: T1027
    mbc: B0032
    # for i in range(len(buf)): buf[i] ^= key[i % len(key)]
    if:
      type: text
      regex: '\w+\[\w+\]\s*\^=\s*\w+\[?\w*[%]?\w*\]?'
  - id: xor-itertools-starmap-cycle
    desc: itertools.starmap(operator.xor, zip(...))
    crit: notable
    conf: 0.95
    attack: T1027
    mbc: B0032
    if:
      type: text
      regex: 'starmap\s*\(\s*(operator\.)?xor\s*,\s*zip\s*\('
