# XOR encoding/decoding patterns in C/C++ source
defaults:
  platforms: [windows, unix]
  for: [c, cpp]
traits:
  # XOR-assignment in a loop with modulo key indexing: d[i] ^= k[i % ...]
  # This is the canonical C pattern for XOR encode/decode.
  - id: xor-assign-modulo-loop
    desc: XOR decode loop with modulo key index
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\^=\s*\w+\[\s*\w+\s*%'
  # system() or popen() called with a buffer that was XOR decoded
  # Combines XOR decode + process execution in one line or nearby
  - id: xor-to-system
    desc: XOR decoded buffer passed to system()
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\^=.{0,80}system\('
  - id: xor-byte-with-cyclic-key
    desc: XOR byte using advancing key index
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'byte\s*=\s*byte\s*\^\s*\(int\)key\[key_count\]'
  - id: xor-key-reset-at-strlen
    desc: XOR key index resets at key length
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'key_count\s*==\s*strlen\(key\)'
composite_rules:
  - id: cyclic-xor-string-decrypt
    desc: Cyclic XOR string decryption routine
    crit: suspicious
    conf: 0.9
    all:
      - id: xor-byte-with-cyclic-key
      - id: xor-key-reset-at-strlen
