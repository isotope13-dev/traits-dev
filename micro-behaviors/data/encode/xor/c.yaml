# XOR encoding/decoding patterns in C/C++ source
defaults:
  platforms: [linux, macos, windows, unix]
  for: [c, cpp]
traits:
  # XOR-assignment in a loop with modulo key indexing: d[i] ^= k[i % ...]
  # This is the canonical C pattern for XOR encode/decode.
  - id: xor-assign-modulo-loop
    desc: XOR decode loop with modulo key index
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: '\^=\s*\w+\[\s*\w+\s*%'
  # system() or popen() called with a buffer that was XOR decoded
  # Combines XOR decode + process execution in one line or nearby
  - id: xor-to-system
    desc: XOR decoded buffer passed to system()
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '\^=.{0,80}system\('
  # __attribute__((constructor)) — runs before main, common in C malware
  - id: constructor-attr
    desc: GCC constructor attribute (runs before main)
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: "__attribute__((constructor))"
