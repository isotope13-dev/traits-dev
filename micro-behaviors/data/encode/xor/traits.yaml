defaults:
  attack: T1027
  platforms:
    - unix
    - windows
traits:
  - id: xor-infection-marker
    desc: XOR infection marker
    crit: notable
    conf: 0.9
    for:
      - elf
      - shell
    if:
      type: text
      substr: '@GOLJ]LM'
  - id: xor-marker-extended
    desc: Extended XOR marker
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      substr: EFE)@GOLJ]LM)HNH@G
  - id: tab-terminated-strings
    desc: Tab-terminated strings
    crit: notable
    conf: 0.7
    for:
      - elf
      - shell
    if:
      type: text
      regex: '[a-zA-Z0-9]{4,}\t$'
  - id: unusual-character-combinations
    desc: Unusual character combinations
    crit: component
    conf: 0.5
    for:
      - elf
    size_max: 2097152
    if:
      type: text
      regex: '[^a-zA-Z0-9\s\.,\-_/\\:@]{8,}'
    not:
      - regex: ^[#;"'*?\[\]&|<>(){}$`^~!+]+$
      - regex: ^!+$
      - regex: ^=+$
      - regex: ^[\xA0-\xFF]{8,}$
      - substr: 0123456789
      - substr: abcdefghijklmnopqrstuvwxyz
  - id: dense-unusual-chars
    desc: Dense unusual character patterns (obfuscation)
    crit: suspicious
    conf: 0.85
    for:
      - elf
    size_max: 500000
    count_min: 5
    per_kb_min: 1.0
    if:
      type: text
      regex: '[^a-zA-Z0-9\s\.,\-_/\\:@]{8,}'
    not:
      - regex: ^[#;"'*?\[\]&|<>(){}$`^~!+]+$
      - regex: ^!+$
      - regex: ^=+$
      - regex: ^[\xA0-\xFF]{8,}$
    unless:
      - id: micro-behaviors/dylib/library/family::system-lib-marker
      - id: micro-behaviors/data/compress/zstd
      - id: micro-behaviors/data/compress/lzma
      - id: metadata/lang/go
  - id: xor-key-null-pattern
    desc: Null XOR key pattern
    crit: notable
    conf: 0.7
    for:
      - elf
      - shell
    if:
      type: text
      substr: \x00\x00
  - id: js-xor-decoder-loop
    desc: JavaScript XOR decryption loop
    crit: suspicious
    conf: 0.9
    mbc: B0032
    for:
      - javascript
    if:
      type: string_literal
      regex: String\.fromCharCode\s*\([^)]{0,80}\^[^)]{0,80}\)
  - id: js-xor-decoder-ast
    desc: JavaScript XOR decryption (AST)
    crit: notable
    conf: 0.95
    mbc: B0032
    for:
      - javascript
    if:
      type: ast
      query: "((call_expression\n  function: (member_expression property: (property_identifier) @p)\n  (#eq? @p \"fromCharCode\")\n  arguments: (arguments\n    (binary_expression operator: \"^\")\n  )\n))\n"
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/file/magic::macho-32
      - id: metadata/file/magic::macho-64
      - type: text
        substr: "fpdf.org/en/script/script37.php"
      - type: basename
        exact: carrotsearch.foamtree.js
composite_rules:
  - id: xor-encoded-strings
    desc: XOR-encoded strings
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    any:
      - id: xor-infection-marker
      - id: xor-marker-extended
  - id: xor-obfuscation-evidence
    desc: XOR obfuscation evidence
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    mbc: B0041
    needs: 2
    any:
      - id: xor-encoded-strings
      - id: dense-unusual-chars
      - id: unusual-character-combinations
    unless:
      - id: metadata/package/help::usage-help
      - id: micro-behaviors/data/db/conn/postgresql::libpq
    downgrade:
      any:
        - id: micro-behaviors/data/compress/
