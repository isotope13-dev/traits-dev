# Ruby XOR string decoding (byte ^ key[i % key.length]) — the runtime string
# decoder used by obfuscated Ruby droppers/stealers.
defaults:
  platforms: [unix, windows]
  for: [ruby]
traits:
  - id: rb-xor-decode
    desc: Ruby XOR-with-modulo decode loop
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\^\s*[\w.]+\[\s*\w+\s*%'
