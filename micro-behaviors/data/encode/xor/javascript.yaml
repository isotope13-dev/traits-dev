# JavaScript XOR Obfuscation
# Detects specific XOR patterns used in JScript malware (e.g., Nemucod)
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-xor-dynamic-char-at
    desc: JS dynamic charCodeAt access
    crit: notable
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.(^(charCodeAt|charAt)$)$'
