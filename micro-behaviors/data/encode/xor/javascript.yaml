# JavaScript XOR Obfuscation
# Detects specific XOR patterns used in JScript malware (e.g., Nemucod)
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-xor-cyclic-pattern
    desc: JavaScript cyclic XOR decoder loop
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: 'ast.xor_mod_loop_count'
      min: 1
    unless:
      - id: well-known/app/lux/
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      - id: well-known/lib/ggml
      - id: well-known/app/openssl/
      - type: path
        basename: true
        regex: '^bun\.lockb$'
  - id: js-xor-dynamic-char-at
    desc: JS dynamic charCodeAt access
    crit: notable
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.(^(charCodeAt|charAt)$)$'
