# JavaScript XOR Obfuscation
# Detects specific XOR patterns used in JScript malware (e.g., Nemucod)
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-xor-cyclic-pattern
    desc: JavaScript cyclic XOR pattern (e.g. key[i %
    crit: suspicious
    conf: 0.85
    if:
      type: tree-sitter
      language: javascript
      query: |
        (binary_expression
          operator: "^"
          right: (call_expression
            function: (identifier) @fn
            arguments: (arguments
              (string)
              (binary_expression
                operator: "%"
              )
            )
          )
        )
  - id: js-xor-dynamic-char-at
    desc: JavaScript dynamic charCodeAt access (often for XOR
    crit: notable
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.(^(charCodeAt|charAt)$)$'
