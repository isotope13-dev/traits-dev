defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript]
  attack: T1132
  mbc: C0053
traits:
  - id: base58-encode-function-marker
    desc: Base58 encode function marker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: b58encode
  - id: base58-keyword-marker
    desc: Base58 keyword marker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: base58
  - id: base58-hex-conversion
    desc: Base58 and hexadecimal conversion helper
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(base58ToHex|hexToBase58)\s*\('
composite_rules:
  - id: base58-or-cid-conversion
    desc: Base58 or CID conversion
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/data/decode/base58::base58-decode-function-marker
      - id: base58-encode-function-marker
      - id: base58-keyword-marker
    unless:
      - id: metadata/lang/source::windows-generated-def-path
