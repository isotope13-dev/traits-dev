defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-nested-hex-base64-decode
    desc: Nested hex and base64 decode
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    mbc: "B0032"
    attack: "T1027"
    count_min: 2
    if:
      type: text
      regex: 'Buffer\.from\([^,]{1,50},\s*["''](hex|base64)["'']\)'
    not:
      - substr: Buffer.from(result.data, 'base64')
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
