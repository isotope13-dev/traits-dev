# Caesar / Character-Shift Cipher — JavaScript/TypeScript
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1140
traits:
  - id: charcodeat-shift
    desc: charCodeAt arithmetic on first character
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'fromCharCode\([^)]{0,80}charCodeAt\(0\)\s*[+-]\s*(\d+|\w+)'
    unless:
      - type: text
        substr: "String.fromCharCode(ch.charCodeAt(0) + 32)"
      - type: text
        regex: '1\s*<<\s*\([^)]{0,40}\.charCodeAt\(0\)\s*-\s*97\)'
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/

  - id: charcodeat-shift-deferred
    desc: "charCodeAt assigned then shifted fromCharCode"
    crit: notable
    conf: 0.8
    if:
      type: text
      # `const c = char.charCodeAt(0); ... fromCharCode((c + 15) % 256)` — common
      # ROT-N decoder shape that splits the charCodeAt and the arithmetic across
      # statements, missed by the immediate-arithmetic regex above.
      regex: '\.charCodeAt\([^)]{0,5}\)[\s\S]{1,200}fromCharCode\s*\(\s*\(?\s*\w{1,20}\s*[+-]\s*\d'
    unless:
      # Drive-letter / ASCII case folding in path normalizers (e + 32), not ciphers
      - type: text
        regex: 'fromCharCode\([^)]{0,40}\+\s*32\)'
      - type: text
        regex: 'charCodeAt\([^)]{0,8}\)[\s\S]{0,80}(?:>=\s*65\s*&&|<=\s*90)'
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
