# Caesar / Character-Shift Cipher — JavaScript/TypeScript
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1140
traits:
  - id: charcodeat-shift
    desc: charCodeAt shift (JS shift cipher)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'charCodeAt\(0\)\s*[+-]\s*\w'
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::is-test

  - id: charcodeat-shift-deferred
    desc: charCodeAt assigned then shifted in fromCharCode
    crit: notable
    conf: 0.8
    if:
      type: text
      # `const c = char.charCodeAt(0); ... fromCharCode((c + 15) % 256)` — common
      # ROT-N decoder shape that splits the charCodeAt and the arithmetic across
      # statements, missed by the immediate-arithmetic regex above.
      regex: '\.charCodeAt\([^)]{0,5}\)[\s\S]{1,200}fromCharCode\s*\(\s*\(?\s*\w{1,20}\s*[+-]\s*\d'
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::is-test

  - id: fromcharcode-map-decode
    desc: String.fromCharCode in map (decode loop)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'map\(function\([^)]{1,20}\)\s*\{\s*return String\.fromCharCode'
