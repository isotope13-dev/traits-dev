defaults:
  platforms: [windows, unix]
  for:
    - php
traits:
  - id: caesar-cipher-loop
    desc: Caesar cipher loop (ord + key ->
    crit: suspicious
    conf: 0.8
    # A `for` loop whose body calls `ord(` then `chr(` — the byte-shift cipher
    # shape. The for-body + ord→chr proximity is distinctive as source text.
    if:
      type: text
      regex: 'for\s*\([^)]{0,80}\)\s*\{[\s\S]{0,200}\bord\s*\([\s\S]{0,200}\bchr\s*\('
  - id: simple-shift-cipher
    desc: Simple character shift logic (ord +/- key)
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: ord\(\$[^)]{1,120}\)\s*[+-]\s*\$[^;]{1,120};\s*.{0,220}chr\(
