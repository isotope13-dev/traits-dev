defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: decimal-string-blob
    desc: Long string of decimal digits
    crit: notable
    for: [javascript]
    if:
      type: string_value
      regex: "^[0-9]{50,}$"
    unless:
      - id: metadata/dev/testing::is-test
      - id: metadata/quality/testing::test-directory
      - id: metadata/dev/testing::node-common-require
      - id: metadata/library/nodeunit::nodeunit
