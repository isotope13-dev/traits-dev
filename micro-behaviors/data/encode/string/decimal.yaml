defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [javascript]
traits:
  - id: decimal-string-blob
    desc: Long string of decimal digits
    crit: notable
    size_max: 500000
    if:
      type: string_literal
      regex: ^[0-9]{50,}$
    not:
      - exact: "1111111010000000000000000000000000000000000000000000000000000000"
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/harness::node-common-require
      - id: metadata/library/nodeunit::nodeunit
  - id: js-decimal-triplet-xor-decode
    desc: XOR assignment in decimal triplet decoder
    crit: notable
    conf: 0.88
    attack: T1027
    mbc: B0032
    if:
      type: text
      regex: var\s+\w+\s*=\s*\w+\s*\^\s*\w+\s*;
    count_min: 1
