defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: windows-1251-charset
    desc: Uses windows-1251 charset (often ADODB.Stream)
    unless:
      - id: metadata/library/runtime::next-edge-runtime-bundle
    if:
      type: text
      exact: windows-1251
