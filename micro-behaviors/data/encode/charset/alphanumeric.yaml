# Complete alphanumeric character set
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: full-alphanumeric-mixed
    desc: Complete mixed-case alphanumeric character set
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: string_value
      exact: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
  - id: lowercase-digits-alphabet
    desc: Lowercase alphanumeric character set (digits first)
    crit: component
    conf: 0.5
    for: [pe]
    if:
      type: string_value
      exact: "0123456789abcdefghijklmnopqrstuvwxyz"
