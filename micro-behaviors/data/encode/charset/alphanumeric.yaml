defaults:
  platforms: [windows, unix]
  for: [pe]
traits:
  - id: lowercase-digits-alphabet
    desc: 'Lowercase alphanumeric character set'
    crit: component
    conf: 0.5
    if:
      type: text
      exact: 0123456789abcdefghijklmnopqrstuvwxyz
  - id: printable-ascii-substitution-table
    desc: ASCII case-folding substitution table
    crit: notable
    conf: 0.75
    if:
      type: text
      exact: '!"#$%&''()*+,-./0123456789:;<=>?@abcdefghijklmnopqrstuvwxyz[\]^_`abcdefghijklmnopqrstuvwxyz{|}~'
    unless:
      - id: well-known/lib/jline::jline-native-dll-basename
      - id: well-known/lib/jline::jline-native-jni-exports
