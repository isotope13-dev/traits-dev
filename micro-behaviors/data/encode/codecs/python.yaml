defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: codecs-decode-call
    desc: "Calls codecs.decode for data transformation"
    conf: 0.8
    # `codecs.decode` is a fixed symbol — match it exactly (the encoding-
    # specific `codecs.decode(..., "uu"|"base64")` variants live in the
    # uu/ and base64/ decode trait files with arg-value filters).
    if:
      type: symbol
      exact: 'codecs.decode'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
