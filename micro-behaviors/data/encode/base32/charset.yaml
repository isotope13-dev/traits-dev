# RFC4648 Base32 standard alphabet (uppercase). A bare encoding-table marker;
# component-only since the alphabet appears in any legitimate Base32 codec.
defaults:
  platforms: [windows, unix]
  for: [macho, pe, elf]
  crit: baseline
  conf: 0.5
traits:
  - id: rfc4648-uppercase-alphabet
    desc: RFC4648 Base32 alphabet string (uppercase)
    if:
      type: text
      substr: ABCDEFGHIJKLMNOPQRSTUVWXYZ234567
