defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: imagebuffer-from-raw-rgba
    desc: Rust RGBA image buffer creation
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ImageBuffer::<Rgba<u8>, _>::from_raw
  - id: image-save-path
    desc: Rust image save to path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: .save(&img_path)
composite_rules:
  - id: rust-png-image-save
    desc: Rust image buffer saved to disk
    crit: notable
    conf: 0.93
    all:
      - id: imagebuffer-from-raw-rgba
      - id: image-save-path
