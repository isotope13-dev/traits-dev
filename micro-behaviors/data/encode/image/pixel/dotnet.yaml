# .NET `System.Drawing.Bitmap` API (GetPixel/SetPixel/LockBits/BitmapData/
# Scan0/Stride/ImageLockMode/PixelFormat). These are not generic image-access
# indicators — they only meaningfully identify .NET Bitmap use. Each atom
# suppresses on native-PE runtimes (Go/Rust) since those share word collisions
# (e.g. Go's `image.*.Stride` field, Rust compiler's own Stride symbol).
defaults:
  platforms:
    - unix
    - windows
  for: [csharp, pe]
traits:
  - id: pixel-access-getpixel
    desc: .NET Bitmap.GetPixel per-pixel read
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: GetPixel
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-toargb
    desc: .NET Color.ToArgb pixel-value conversion
    crit: baseline
    conf: 0.78
    if:
      type: text
      word: ToArgb
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-setpixel
    desc: .NET Bitmap.SetPixel per-pixel write
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: SetPixel
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-lockbits
    desc: .NET Bitmap.LockBits raw pixel-buffer lock
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: LockBits
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-bitmapdata
    desc: .NET BitmapData locked-bitmap descriptor
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: BitmapData
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-scan0
    desc: .NET BitmapData.Scan0 pixel-buffer pointer
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: Scan0
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-stride
    desc: .NET BitmapData.Stride row-length field
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: Stride
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-imagelockmode
    desc: .NET ImageLockMode LockBits access flag
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: ImageLockMode
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
  - id: pixel-access-pixelformat
    desc: .NET PixelFormat pixel-layout enum
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: PixelFormat
    unless:
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems/
composite_rules:
  - id: pixel-access-a
    desc: .NET Bitmap per-pixel access API
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-getpixel
      - id: pixel-access-toargb
      - id: pixel-access-setpixel
      - id: pixel-access-lockbits
      - id: pixel-access-bitmapdata
  - id: pixel-access-b
    desc: .NET Bitmap buffer-layout API
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-scan0
      - id: pixel-access-stride
      - id: pixel-access-imagelockmode
      - id: pixel-access-pixelformat
  - id: pixel-access
    desc: Accesses .NET Bitmap image pixels
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-a
      - id: pixel-access-b
