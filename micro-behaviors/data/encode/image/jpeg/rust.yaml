defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: jpeg-encoder-quality
    desc: JPEG encoder quality setting
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: JpegEncoder::new_with_quality
  - id: rgb8-jpeg-encode
    desc: RGB buffer JPEG encoding
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: image::ExtendedColorType::Rgb8
composite_rules:
  - id: rust-jpeg-frame-encoding
    desc: Rust in-memory JPEG frame encoding
    crit: notable
    conf: 0.95
    all:
      - id: jpeg-encoder-quality
      - id: rgb8-jpeg-encode
