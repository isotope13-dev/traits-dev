defaults:
  platforms: [windows, linux, macos]
  for: [python]

traits:
  - id: helper-jpeg-encode-call
    desc: JPEG encode helper call
    crit: notable
    conf: 0.86
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    if:
      type: symbol
      exact: encode_image_to_jpeg_bytes

  - id: cv2-jpeg-imencode
    desc: OpenCV JPEG imencode call
    crit: notable
    conf: 0.84
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    if:
      type: text
      regex: 'cv2\.imencode\s*\(\s*["'']\.jpe?g'

  - id: pillow-jpeg-save
    desc: Pillow JPEG save call
    crit: notable
    conf: 0.8
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    if:
      type: text
      regex: 'format\s*=\s*["'']JPEG["'']'

composite_rules:
  - id: in-memory-jpeg-encode
    desc: In-memory JPEG encoding
    crit: notable
    conf: 0.84
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    any:
      - id: helper-jpeg-encode-call
      - id: cv2-jpeg-imencode
      - id: pillow-jpeg-save
