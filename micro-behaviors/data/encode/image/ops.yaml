defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: pixel-access-getpixel
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: GetPixel
  - id: pixel-access-setpixel
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: SetPixel
  - id: pixel-access-lockbits
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: LockBits
  - id: pixel-access-bitmapdata
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: BitmapData
  - id: pixel-access-scan0
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: Scan0
  - id: pixel-access-stride
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: Stride
  - id: pixel-access-imagelockmode
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: ImageLockMode
  - id: pixel-access-pixelformat
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: string_value
      exact: PixelFormat
composite_rules:
  - id: pixel-access-a
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-getpixel
      - id: pixel-access-setpixel
      - id: pixel-access-lockbits
      - id: pixel-access-bitmapdata
  - id: pixel-access-b
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-scan0
      - id: pixel-access-stride
      - id: pixel-access-imagelockmode
      - id: pixel-access-pixelformat
  - id: pixel-access
    desc: Accesses image pixels
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-a
      - id: pixel-access-b
