# .NET `System.Drawing.Bitmap` API (GetPixel/SetPixel/LockBits/BitmapData/
# Scan0/Stride/ImageLockMode/PixelFormat). These are not generic image-access
# indicators — they only meaningfully identify .NET Bitmap use. Each atom
# suppresses on native-PE runtimes (Go/Rust) since those share word collisions
# (e.g. Go's `image.*.Stride` field, Rust compiler's own Stride symbol).
defaults:
  platforms:
    - unix
    - windows
  for: [csharp, pe]
traits:
  - id: pixel-access-getpixel
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: GetPixel
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: pixel-access-setpixel
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: SetPixel
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: pixel-access-lockbits
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: LockBits
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: pixel-access-bitmapdata
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: BitmapData
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: pixel-access-scan0
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: Scan0
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: pixel-access-stride
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: Stride
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: pixel-access-imagelockmode
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: ImageLockMode
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
  - id: pixel-access-pixelformat
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: PixelFormat
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary
composite_rules:
  - id: pixel-access-a
    desc: Pixel operation symbols family A
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-getpixel
      - id: pixel-access-setpixel
      - id: pixel-access-lockbits
      - id: pixel-access-bitmapdata
  - id: pixel-access-b
    desc: Pixel operation symbols family B
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-scan0
      - id: pixel-access-stride
      - id: pixel-access-imagelockmode
      - id: pixel-access-pixelformat
  - id: pixel-access
    desc: Accesses image pixels
    crit: baseline
    conf: 0.8
    any:
      - id: pixel-access-a
      - id: pixel-access-b
