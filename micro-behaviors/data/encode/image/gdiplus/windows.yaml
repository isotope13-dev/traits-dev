defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1113
traits:
  - id: create-bitmap-from-stream
    desc: GDI+ bitmap created from stream
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GdipCreateBitmapFromStream
  - id: get-image-width
    desc: GDI+ query decoded image width
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdipGetImageWidth
  - id: get-image-height
    desc: GDI+ query decoded image height
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdipGetImageHeight
  - id: bitmap-get-pixel
    desc: GDI+ per-pixel bitmap readback
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: GdipBitmapGetPixel
  - id: save-image-to-stream
    desc: GDI+ save image to memory stream
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GdipSaveImageToStream
  - id: save-image-to-file
    desc: GDI+ save image to disk file
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GdipSaveImageToFile
  - id: create-bitmap-from-hbitmap
    desc: GDI+ bitmap from GDI handle
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GdipCreateBitmapFromHBITMAP
  - id: get-image-encoders
    desc: GDI+ query available image encoders
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdipGetImageEncoders
  - id: startup
    desc: GDI+ library initialization
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdiplusStartup
  - id: png-encoder-clsid
    desc: PNG image format MIME type
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: image/png
  - id: dotnet-from-hbitmap
    desc: .NET bitmap from GDI handle
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: FromHbitmap
  - id: dotnet-imaging-namespace
    desc: .NET imaging namespace reference
    crit: baseline
    conf: 0.82
    if:
      type: text
      exact: System.Drawing.Imaging
  - id: dotnet-imageformat-png
    desc: .NET PNG image format reference
    crit: baseline
    conf: 0.84
    ref: sha256:102dd32a30d7a0cf86955e6045e0426a26dfef393ce946d49c006d19c4c036e9
    if:
      type: text
      exact: get_Png
  - id: dotnet-image-save-method
    desc: .NET image save method
    crit: baseline
    conf: 0.78
    ref: sha256:102dd32a30d7a0cf86955e6045e0426a26dfef393ce946d49c006d19c4c036e9
    if:
      type: text
      exact: Save
composite_rules:
  - id: bitmap-stream-pixel-readback
    desc: GDI+ stream decode with pixel extraction
    crit: notable
    conf: 0.93
    all:
      - id: create-bitmap-from-stream
      - id: get-image-width
      - id: get-image-height
      - id: bitmap-get-pixel
  - id: gdiplus-image-encode
    desc: GDI+ in-memory image encoding pipeline
    crit: notable
    conf: 0.9
    all:
      - id: startup
    any:
      - id: save-image-to-stream
      - id: save-image-to-file
      - id: create-bitmap-from-hbitmap
  - id: dotnet-hbitmap-png-save
    desc: .NET GDI bitmap PNG save
    crit: notable
    conf: 0.92
    ref: sha256:102dd32a30d7a0cf86955e6045e0426a26dfef393ce946d49c006d19c4c036e9
    all:
      - id: dotnet-from-hbitmap
      - id: dotnet-imaging-namespace
      - id: dotnet-imageformat-png
      - id: dotnet-image-save-method
