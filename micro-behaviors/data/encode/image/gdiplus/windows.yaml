defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1113
traits:
  - id: create-bitmap-from-stream
    desc: GDI+ bitmap created from stream
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GdipCreateBitmapFromStream
  - id: get-image-width
    desc: GDI+ query decoded image width
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdipGetImageWidth
  - id: get-image-height
    desc: GDI+ query decoded image height
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdipGetImageHeight
  - id: bitmap-get-pixel
    desc: GDI+ per-pixel bitmap readback
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: GdipBitmapGetPixel
  - id: save-image-to-stream
    desc: GDI+ save image to memory stream
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GdipSaveImageToStream
  - id: create-bitmap-from-hbitmap
    desc: GDI+ bitmap from GDI handle
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: GdipCreateBitmapFromHBITMAP
  - id: get-image-encoders
    desc: GDI+ query available image encoders
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdipGetImageEncoders
  - id: startup
    desc: GDI+ library initialization
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      exact: GdiplusStartup
  - id: png-encoder-clsid
    desc: PNG image format MIME type
    crit: baseline
    conf: 0.85
    if:
      type: text
      exact: image/png
composite_rules:
  - id: bitmap-stream-pixel-readback
    desc: GDI+ stream decode with pixel extraction
    crit: notable
    conf: 0.93
    all:
      - id: create-bitmap-from-stream
      - id: get-image-width
      - id: get-image-height
      - id: bitmap-get-pixel
  - id: gdiplus-image-encode
    desc: GDI+ in-memory image encoding pipeline
    crit: notable
    conf: 0.9
    all:
      - id: startup
    any:
      - id: save-image-to-stream
      - id: create-bitmap-from-hbitmap
