defaults:
  platforms:
    - unix
    - windows
  for: [python, javascript]
traits:
  - id: buffer-hex
    desc: Converts buffer to hex string
    crit: notable
    # `Buffer.from(...).toString("hex")` — the chained Buffer→toString("hex")
    # call is distinctive enough as source text (no live query needed).
    if:
      type: text
      regex: 'Buffer\.from\s*\([^)]{0,200}\)\s*\.toString\s*\(\s*[''"]hex[''"]'
