defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: buffer-hex
    desc: Converts buffer to hex string
    crit: notable
    if:
      type: ast
      language: javascript
      query: "(call_expression\n  function: (member_expression\n    object: (call_expression\n      function: (member_expression\n        object: (identifier) @buf\n        property: (property_identifier) @from\n      )\n      arguments: (arguments)\n    )\n    property: (property_identifier) @tostring\n  )\n  arguments: (arguments\n    (string (string_fragment) @enc)\n  )\n  (#eq? @buf \"Buffer\")\n  (#eq? @from \"from\")\n  (#eq? @tostring \"toString\")\n  (#eq? @enc \"hex\")\n)\n"
