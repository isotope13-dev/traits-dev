defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: repeated-upper-hex-blocks
    desc: Repeated 64-char uppercase hex blocks
    crit: notable
    conf: 0.86
    for: [pe]
    platforms: [windows]
    count_min: 4
    if:
      type: text
      regex: '^[A-F0-9]{64}$'
      section: .text
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/framework::dotnet-assembly
