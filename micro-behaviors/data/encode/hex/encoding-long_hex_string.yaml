defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - shell
    - python
    - javascript
    - powershell
traits:
  - id: long-hex-string
    desc: Long continuous hexadecimal string (>64 chars)
    crit: notable
    if:
      type: string_value
      regex: ^[0-9A-Fa-f]*[A-Fa-f][0-9A-Fa-f]{64,}$
  - id: repeated-upper-hex-blocks
    desc: Repeated 64-char uppercase hex blocks
    crit: notable
    conf: 0.86
    for: [pe, dll]
    platforms: [windows]
    count_min: 4
    if:
      type: string_value
      regex: '^[A-F0-9]{64}$'
      section: .text
