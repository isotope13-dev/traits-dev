defaults:
  platforms: [windows, unix]
traits:
  - id: loop-step-2
    desc: Loop with step 2
    crit: baseline
    for: [js, vbs]
    if:
      type: text
      regex: 'for\s*\([^;]{0,50};\s*[^;]{0,50};\s*[^)]{0,50}\+=\s*2\)'
  - id: parseint-16
    desc: parseInt with radix 16
    crit: baseline
    for: [js, vbs]
    if:
      type: text
      regex: 'parseInt\s*\([^,]{0,50},\s*16\)'
  - id: fromcharcode
    desc: String.fromCharCode
    crit: baseline
    for: [js, vbs]
    if:
      type: text
      regex: 'String\.fromCharCode'
  - id: substr-2
    desc: substr with length 2
    crit: baseline
    for: [js, vbs]
    if:
      type: text
      regex: 'substr\s*\([^,]{0,50},\s*2\)'
composite_rules:
  - id: jscript-hex-decoder-loop
    desc: JScript loop structure consistent with hex decoding
    conf: 0.9
    crit: suspicious
    size_max: 50000
    all:
      - id: micro-behaviors/data/control-flow/analysis::iteration-loop-pattern
      - id: parseint-16
      - id: fromcharcode
      - id: substr-2
