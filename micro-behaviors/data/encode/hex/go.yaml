defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  crit: baseline
  conf: 0.85
  mbc: C0026
traits:
  - id: go-hex-encode-string
    desc: Go hex string encoding
    crit: notable
    if:
      type: symbol
      exact: hex.EncodeToString
  - id: go-hex-encode
    desc: Go hex buffer encoding
    if:
      type: symbol
      exact: hex.Encode
