defaults:
  platforms: [unix, windows]
  for: [svg]

traits:
  - id: svg-long-hex-string-literal
    desc: Long hexadecimal string literal in SVG markup
    crit: notable
    conf: 0.86
    count_min: 2
    if:
      type: text
      regex: '[''\"][0-9a-fA-F]{80,}[''\"]'
      not:
        - regex: '[''\"](0{80,}|1{80,}|2{80,}|3{80,}|4{80,}|5{80,}|6{80,}|7{80,}|8{80,}|9{80,}|[aA]{80,}|[bB]{80,}|[cC]{80,}|[dD]{80,}|[eE]{80,}|[fF]{80,})[''\"]'
