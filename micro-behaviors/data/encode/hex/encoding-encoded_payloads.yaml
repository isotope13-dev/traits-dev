defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: hex-encoded-powershell
    desc: Hex-encoded 'powershell' string
    conf: 0.9
    crit: suspicious
    if:
      type: text
      substr: 706f7765727368656c6c
  - id: hex-encoded-http
    desc: Hex-encoded 'http://' string
    conf: 0.8
    crit: notable
    if:
      type: text
      substr: 687474703a2f2f
  - id: hex-encoded-https
    desc: Hex-encoded 'https://' string
    conf: 0.8
    crit: notable
    if:
      type: text
      substr: 68747470733a2f2f
  - id: hex-encoded-cmd-exe
    desc: Hex-encoded 'cmd.exe' string
    conf: 0.8
    crit: suspicious
    if:
      type: text
      substr: 636d642e657865
  - id: hex-encoded-wscript-shell
    desc: Hex-encoded 'WScript.Shell' string
    conf: 0.8
    crit: suspicious
    if:
      type: text
      substr: 575363726970742e5368656c6c
  - id: hex-encoded-wget-pipe-shell
    desc: Hex-encoded wget download piped directly to sh
    conf: 0.98
    crit: suspicious
    attack: "T1105,T1059.004"
    if:
      type: text
      regex: '77676574[0-9A-Fa-f]{1,400}7c7368'
