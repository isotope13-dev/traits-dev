defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
traits:
  - id: shell-hex-byte-sequence
    desc: Shell printf emits hex bytes
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'printf\s+[''"]\\x[0-9a-fA-F]{2}(\\x[0-9a-fA-F]{2}){3,}'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: hex-encode-xxd
    desc: Hex encoding via xxd
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: xxd\s+-p
  - id: hex-dump-od
    desc: Hex dump via od
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: od\s+-t\s+x1
