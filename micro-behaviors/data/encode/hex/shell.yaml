defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
  for:
    - shell
traits:
  - id: hex-encode-xxd
    desc: Hex encoding via xxd
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: xxd\s+-p
  - id: hex-dump-od
    desc: Hex dump via od
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: od\s+-t\s+x1
