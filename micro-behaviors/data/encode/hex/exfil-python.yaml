defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: string-encode-hex
    desc: String bytes converted to hex
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: "\\.encode\\s*\\(.{0,40}\\)\\.hex\\s*\\("
  - id: fstring-subdomain-template
    desc: F-string subdomain template
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: "f[\"']\\{\\w+\\}\\.[a-z0-9-]+\\.[a-z]{2,24}[\"']"
    not:
      - regex: "\\.(h|c|py)[\"']"
      - regex: "\\.(go|rs|rb)[\"']"
      - regex: "\\.(js|ts|cs)[\"']"
      - regex: "\\.(cpp|lua|sh)[\"']"
      - regex: "\\.(yml|xml|txt)[\"']"
composite_rules:
  - id: variable-hex-subdomain
    desc: Hex string prefixed into subdomain
    crit: suspicious
    conf: 0.95
    all:
      - id: string-encode-hex
      - id: fstring-subdomain-template
