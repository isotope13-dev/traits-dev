defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: string-encode-hex
    desc: String bytes converted to hex
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: "\\.encode\\s*\\(.{0,40}\\)\\.hex\\s*\\("
  - id: variable-hex-subdomain
    desc: Hex string prefixed into subdomain
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: "f[\"']\\{[A-Za-z_][A-Za-z0-9_]{0,40}\\}\\.[A-Za-z_][A-Za-z0-9_]{0,40}[\"']"
