defaults:
  platforms: [unix, windows]
  for: [perl]
  mbc: C0026

traits:
  - id: perl-byte-hex-loop
    desc: Perl byte hex encoding loop
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'sprintf\("%02x"[\s\S]{0,40}ord\(\$byte\)'

  - id: perl-unpack-hex
    desc: Perl unpack hex encoding
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "unpack('H*'"
