defaults:
  platforms: [windows]
  for: [vbs]

traits:
  - id: vb6-hex-to-string-loop
    desc: VB6 hex decode loop
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Chr$(Val("&H" & Mid$(strData, i, 2)))

  - id: vb6-string-to-hex-loop
    desc: VB6 string hex encode loop
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Hex$(Asc(Mid$(strData, i, 1)))

composite_rules:
  - id: vb6-bidirectional-hex-codec
    desc: VB6 bidirectional hex codec
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/data/encode/hex::vb6-hex-to-string-loop
      - id: micro-behaviors/data/encode/hex::vb6-string-to-hex-loop
