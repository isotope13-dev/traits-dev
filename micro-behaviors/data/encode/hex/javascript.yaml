defaults:
  for: [javascript, typescript]

traits:
  - id: buffer-from-hex
    desc: Hex decoding/usage via Buffer.from
    crit: baseline
    conf: 0.8
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @buf
            property: (property_identifier) @from
          )
          arguments: (arguments
            (_)
            (string) @enc
          )
          (#eq? @buf "Buffer")
          (#eq? @from "from")
          (#match? @enc "hex")
        )

  - id: buffer-from-hex-to-utf8
    desc: Buffer hex decode to UTF-8
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: "from\\(.{0,40}['\"]hex['\"].{0,20}\\)\\.toString\\("

  - id: buffer-from-base64-to-utf8
    desc: Buffer base64 decode to UTF-8
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: "from\\(.{0,40}['\"]base64['\"].{0,20}\\)\\.toString\\("

  - id: buffer-to-hex
    desc: Hex encoding via Buffer.toString('hex')
    crit: notable
    conf: 0.8
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (_) @buf
            property: (property_identifier) @tostring
          )
          arguments: (arguments
            (string) @enc
          )
          (#eq? @tostring "toString")
          (#match? @enc "hex")
        )

  - id: js-hex-char-array
    desc: Array of hex-encoded characters
    crit: notable
    conf: 0.8
    if:
      type: ast
      language: javascript
      query: |
        (
          (array
            (string (string_fragment) @hex)
          )
          (#match? @hex "^0x[0-9a-fA-F]{1,2}$")
        )
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
      - id: metadata/dev/testing::node-common-require
      - id: metadata/library::ioredis-auto-pipeline
      - id: metadata/library::commander
      - id: metadata/library/nodeunit::nodeunit
      - id: metadata/library::commander-require

  - id: js-tohex-helper
    desc: Helper function 'toHex' for data encoding
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "toHex"
