# Hex encoding via xxd in JavaScript source
# Detects xxd command used inside child_process.exec/template literals
# ATT&CK: T1048 (Exfiltration Over Alternative Protocol)
defaults:
  platforms: [linux, macos]
  for: [javascript, typescript]
  crit: notable
  conf: 0.85
  mbc: "C0026"
  attack: "T1048"
traits:
  - id: xxd-hex-encode
    desc: xxd hex encoding in JS source
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "xxd\\s+-p"
  - id: xxd-tr-pipeline
    desc: xxd hex encode with newline strip pipeline
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: "xxd\\s+-p.{0,60}\\|\\s*tr\\s+-d"
  - id: js-dense-hex-escapes
    desc: Dense hex escape sequences
    crit: baseline
    conf: 0.88
    mbc: B0032
    attack: T1027
    for: [javascript, typescript, python]
    count_min: 4
    per_kb_min: 0.8
    if:
      type: string_literal
      regex: (\\x[0-9a-fA-F]{2}){4,}
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: hex-literal-function-argument
    desc: Function call receives long hexadecimal literal
    crit: component
    conf: 0.78
    count_min: 2
    if:
      type: text
      regex: '\w+\s*\(\s*["''][0-9a-fA-F]{6,}["'']\s*\)'
