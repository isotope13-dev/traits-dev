defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: hex-escaped-control-char
    desc: "with escaped hex control character"
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: \\x0[67]
  - id: hex-encoding
    desc: Hex-encoded string pattern
    crit: component
    conf: 0.85
    for: [python]
    attack: T1027
    count_min: 5
    if:
      type: string_literal
      regex: \\x[0-9a-fA-F]{2}
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::test-directory
        - id: metadata/package/testing/scripted::pytest
