defaults:
  platforms: [unix, windows]
  for: [shell]
  crit: notable
  conf: 0.75

traits:
  - id: base64-encode-command
    desc: Shell Base64 encoding command
    mbc: C0025
    if:
      type: text
      regex: '(?m)^\s*(?!#).{0,240}\|\s*base64\b'
    unless:
      - id: metadata/file/format::sourcemap-sources-content
  - id: password-base64-pipeline
    desc: Shell pipes password text to Base64
    conf: 0.9
    if:
      type: text
      regex: '(?m)^(?!\s*#).{0,240}(echo|printf).{0,80}(password|passwd|passphrase).{0,80}\|\s*base64\b'
