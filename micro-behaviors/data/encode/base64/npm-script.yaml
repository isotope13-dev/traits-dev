# Base64 encode/decode capability expressed in an npm package.json script
# (base64 / atob / btoa). scripts[*] matches any script value.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: C0026
  attack: T1027
traits:
  - id: npm-script-base64
    desc: npm script uses base64 encoding
    if:
      type: value
      path: 'scripts[*]'
      regex: '\b(base64|atob|btoa)\b'
