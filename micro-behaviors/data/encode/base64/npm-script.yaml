# Base64 encode/decode capability expressed in an npm package.json script
# (base64 / atob / btoa). scripts[*] matches any script value.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: notable
  conf: 0.85
  mbc: C0026
  attack: T1027
traits:
- id: npm-script-base64--base64
  desc: npm script uses base64 encoding (base64)
  if:
    type: value
    path: 'scripts[*]'
    regex: \bbase64\b
- id: npm-script-base64--atob
  desc: npm script uses base64 encoding (atob)
  if:
    type: value
    path: 'scripts[*]'
    regex: \batob\b
- id: npm-script-base64--btoa
  desc: npm script uses base64 encoding (btoa)
  if:
    type: value
    path: 'scripts[*]'
    regex: \bbtoa\b
composite_rules:
- id: npm-script-base64
  desc: npm script uses base64 encoding
  any:
  - id: npm-script-base64--base64
  - id: npm-script-base64--atob
  - id: npm-script-base64--btoa
