defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
traits:
  - id: java-base64-encode
    desc: Java Base64 encoding
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(java\.util\.)?Base64\.getEncoder\(\)[\s\S]{0,160}encodeToString'
  - id: jvm-base64-encode-bytecode
    desc: JVM Base64 encodeToString bytecode
    crit: component
    conf: 0.91
    for: [class, jar]
    if:
      type: raw
      regex: 'getEncoder[\s\S]{0,240}encodeToString'
