# Base64 Decoding in PowerShell
defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9
traits:
  - id: from-base64-string
    desc: "Decodes base64 in PowerShell"
    if:
      type: text
      regex: '(?i)\[(System\.)?Convert\]::\s*FromBase64String'
  - id: from-base64-string-concat
    desc: Obfuscated FromBase64String call
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "\\[Convert\\]::\\(\\s*'Fr'\\s*\\+\\s*'omB'"
  - id: to-base64-string
    desc: "Encodes base64 in PowerShell"
    if:
      type: text
      regex: '(?i)\[System\.Convert\]::\s*ToBase64String'
