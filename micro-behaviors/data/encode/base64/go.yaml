defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  crit: baseline
traits:
  - id: encoding-base64-import
    desc: encoding/base64 package import
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: encoding/base64
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiled/
  - id: go-base64-encode
    desc: Go base64 encoding
    conf: 0.7
    if:
      type: text
      regex: \.Encode(ToString|dLen)|AppendEncode
  - id: go-base64-decode
    desc: Go base64 decoding
    conf: 0.7
    if:
      type: text
      regex: \.Decode(String|dLen)|AppendDecode
