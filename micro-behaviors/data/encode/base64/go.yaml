defaults:
  platforms: [windows, unix]
  for: [go, elf, macho, pe]
  crit: baseline
traits:
  - id: go-base64-encode
    desc: Go base64 encoding
    conf: 0.7
    if:
      type: text
      regex: \.Encode(ToString|dLen)?|AppendEncode
  - id: go-base64-decode
    desc: Go base64 decoding
    conf: 0.7
    if:
      type: text
      regex: \.Decode(ToString|dLen)?|AppendDecode
