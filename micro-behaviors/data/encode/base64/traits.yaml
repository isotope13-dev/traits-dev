defaults:
  platforms: [unix, windows]
  for: [python, javascript]
# Base64 Encoding
# Detects Base64 encode operations across multiple languages
# MBC: C0025 (Encode Data)
# ATT&CK: T1132 (Data Encoding)
traits:
  - id: embedded-base64-blob
    # A large base64 string is an embedded data carrier. It is neutral by
    # itself; payload intent requires separate execution or staging evidence.
    desc: Large embedded base64 data string
    crit: notable
    conf: 0.8
    for: [python, pyc]
    if:
      type: text
      regex: '[A-Za-z0-9+/]{2048,}={0,2}'
    unless:
      # Use the parser-backed literal atom when available; retain this text
      # matcher for pyc and other files without string-literal facts.
      - id: micro-behaviors/data/encode/payload::large-encoded-blob-literal
  # === Python ===
  # TAXONOMY.md treats encoding/decoding methods, including a Python base64
  # import, as notable differential-analysis signal.
  - id: import-base64
    desc: Imports Python's base64 module
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: symbol
      kind: import
      exact: "base64"
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: b64encode-call
    desc: Encodes data with Python base64.b64encode()
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)b64encode$'
    for: [python]
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: encodebytes-call
    desc: Calls base64.encodebytes (Python)
    crit: notable
    conf: 0.9
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: symbol
      exact: "base64.encodebytes"
    for: [python]
  - id: urlsafe-b64encode-call
    desc: Calls base64.urlsafe_b64encode (Python)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "base64.urlsafe_b64encode"
    for: [python]
  - id: encodestring-call
    desc: Calls base64.encodestring (Python legacy)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "base64.encodestring"
    for: [python]
  - id: binascii-b2a-base64
    desc: Calls binascii.b2a_base64 (Python)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "binascii.b2a_base64"
    for: [python]
  # === Go ===
  - id: std-encoding-encode-string
    desc: base64.StdEncoding.EncodeToString (Go)
    for: [go]
    if:
      type: symbol
      regex: 'base64\.StdEncoding\.EncodeToString'
  # === PHP ===
  - id: php-base64-encode
    desc: Calls PHP base64_encode()
    crit: notable
    conf: 0.9
    for: [php]
    if:
      type: symbol
      exact: base64_encode
  # === Ruby ===
  - id: ruby-base64-encode-call
    desc: Encodes Base64 data in Ruby
    crit: notable
    conf: 0.9
    for: [ruby]
    if:
      type: text
      regex: '\bBase64\.(strict_)?encode64\s*\('
  # === JavaScript/TypeScript ===
  - id: tostring-base64
    desc: Base64 encoding via toString (JS)
    crit: notable
    conf: 0.8
    if:
      # The base64 is the ARGUMENT: `Buffer.from(x).toString("base64")`. A bare
      # `kind: call` on `\.toString$` matched every `.toString()` (e.g.
      # `url.toString()`, `(5).toString()`) — the encoding constraint is the
      # quoted "base64"/"base64url" arg, which a symbol match can't see, so this
      # must be a text regex.
      type: text
      regex: '\.toString\(\s*[''"]base64(url)?[''"]'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: base64-encoding
    desc: Base64 encoding capability
    crit: notable
    conf: 0.95
    any:
      - id: b64encode-call
      - id: encodebytes-call
      - id: urlsafe-b64encode-call
      - id: encodestring-call
      - id: binascii-b2a-base64
      - id: std-encoding-encode-string
      - id: tostring-base64
      - id: php-base64-encode
      - id: ruby-base64-encode-call
