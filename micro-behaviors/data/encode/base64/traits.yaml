defaults:
  platforms: [unix, windows, macos]
  for: [python, javascript, powershell, shell, pe, elf]
# Base64 Encoding
# Detects Base64 encode operations across multiple languages
# MBC: C0025 (Encode Data)
# ATT&CK: T1132 (Data Encoding)
traits:
  # === Python ===
  - id: import-base64
    desc: Imports Python base64 module
    conf: 0.9
    for: [python]
    if:
      type: ast
      kind: import
      exact: "base64"
  - id: b64encode-call
    desc: Calls base64.b64encode (Python)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "base64.b64encode"
  - id: encodestring-call
    desc: Calls base64.encodestring (Python legacy)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "base64.encodestring"
  - id: binascii-b2a-base64
    desc: Calls binascii.b2a_base64 (Python)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "binascii.b2a_base64"
  # === Go ===
  - id: std-encoding-encode-string
    desc: base64.StdEncoding.EncodeToString (Go)
    if:
      type: symbol
      regex: 'base64\.StdEncoding\.EncodeToString'
  # === JavaScript/TypeScript ===
  - id: tostring-base64
    desc: Base64 encoding via toString (JS)
    crit: baseline
    conf: 0.8
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            property: (property_identifier) @tostr
          )
          arguments: (arguments
            (string) @enc
          )
          (#eq? @tostr "toString")
          (#match? @enc "base64")
        )
composite_rules:
  - id: base64-encoding
    desc: Base64 encoding capability
    crit: notable
    conf: 0.95
    any:
      - id: b64encode-call
      - id: encodestring-call
      - id: binascii-b2a-base64
      - id: std-encoding-encode-string
      - id: tostring-base64
