defaults:
  platforms: [unix, windows]
  for: [python, javascript]
# Base64 Encoding
# Detects Base64 encode operations across multiple languages
# MBC: C0025 (Encode Data)
# ATT&CK: T1132 (Data Encoding)
traits:
  # === Python ===
  # Importing base64 is the encode/decode capability surface — notable per
  # TAXONOMY's "encoding/decoding methods" differential-analysis bar.
  - id: import-base64
    desc: Imports Python base64 module
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: symbol
      kind: import
      exact: "base64"
  - id: b64encode-call
    desc: Calls base64.b64encode (Python)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "base64.b64encode"
    for: [python]
  - id: urlsafe-b64encode-call
    desc: Calls base64.urlsafe_b64encode (Python)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "base64.urlsafe_b64encode"
    for: [python]
  - id: encodestring-call
    desc: Calls base64.encodestring (Python legacy)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "base64.encodestring"
    for: [python]
  - id: binascii-b2a-base64
    desc: Calls binascii.b2a_base64 (Python)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "binascii.b2a_base64"
    for: [python]
  # === Go ===
  - id: std-encoding-encode-string
    desc: base64.StdEncoding.EncodeToString (Go)
    for: [go]
    if:
      type: symbol
      regex: 'base64\.StdEncoding\.EncodeToString'
  # === PHP ===
  - id: php-base64-encode
    desc: Calls PHP base64_encode()
    crit: baseline
    conf: 0.9
    for: [php]
    if:
      type: symbol
      exact: base64_encode
  # === Ruby ===
  - id: ruby-base64-encode-call
    desc: Calls Ruby Base64 encoder
    crit: baseline
    conf: 0.9
    for: [ruby]
    if:
      type: text
      regex: '\bBase64\.(strict_)?encode64\s*\('
  # === JavaScript/TypeScript ===
  - id: tostring-base64
    desc: Base64 encoding via toString (JS)
    crit: baseline
    conf: 0.8
    if:
      # The base64 is the ARGUMENT: `Buffer.from(x).toString("base64")`. A bare
      # `kind: call` on `\.toString$` matched every `.toString()` (e.g.
      # `url.toString()`, `(5).toString()`) — the encoding constraint is the
      # quoted "base64"/"base64url" arg, which a symbol match can't see, so this
      # must be a text regex.
      type: text
      regex: '\.toString\(\s*[''"]base64(url)?[''"]'
composite_rules:
  - id: base64-encoding
    desc: Base64 encoding capability
    crit: notable
    conf: 0.95
    any:
      - id: b64encode-call
      - id: urlsafe-b64encode-call
      - id: encodestring-call
      - id: binascii-b2a-base64
      - id: std-encoding-encode-string
      - id: tostring-base64
      - id: php-base64-encode
      - id: ruby-base64-encode-call
