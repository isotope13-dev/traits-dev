defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: C0026
  crit: notable
  conf: 0.85

traits:
  - id: json-stringify-base64
    desc: JSON stringified to base64
    if:
      type: text
      regex: 'JSON\.stringify.{0,120}toString\("base64"'
    not:
      - substr: 'JSON.stringify({["crossref-index-file"]:"index.json"'
      - substr: 'JSON.stringify(val)).toString("base64"'
      - substr: "JSON.stringify(this.sourcemap"
      - substr: 'JSON.stringify(":base64:"+e.toString("base64"'
      - substr: 'JSON.stringify(":base64:"+t.toString("base64"'
      - substr: 'JSON.stringify(Ke),"utf8").toString("base64"'
      - substr: 'K.alg==='
      - substr: 'K.kid'
    unless:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: metadata/library/runtime::acquire-vscode-api
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
