defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: C0026
  crit: notable
  conf: 0.85

traits:
  - id: node-buffer-tostring-call
    desc: Buffer.from().toString call
    crit: component
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: Buffer.from().toString
  - id: base64-literal
    desc: base64 string literal
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: base64
  - id: json-stringify-base64
    desc: JSON stringified to base64
    if:
      type: text
      regex: 'JSON\.stringify.{0,120}toString\(["'']base64["'']'
    not:
      - substr: 'JSON.stringify({["crossref-index-file"]:"index.json"'
      - substr: 'JSON.stringify(val)).toString("base64"'
      - substr: "JSON.stringify(this.sourcemap"
      - substr: 'JSON.stringify(":base64:"+e.toString("base64"'
      - substr: 'JSON.stringify(":base64:"+t.toString("base64"'
      - substr: 'JSON.stringify(Ke),"utf8").toString("base64"'
      - substr: 'K.alg==='
      - substr: 'K.kid'
    unless:
      - id: micro-behaviors/process/create/shell/host/
      - id: metadata/library/runtime::acquire-vscode-api
      - id: well-known/app/tencent-codebuddy::codebuddy-marker

  - id: large-string-assignment
    desc: Large Base64 string assignment
    conf: 0.92
    size_min: 4096
    if:
      type: text
      regex: '\bvar\s+[A-Za-z_$][A-Za-z0-9_$]{3,}\s*=\s*["''][A-Za-z0-9+/=]{3000,}["'']'
    unless:
      - id: metadata/library/jspdf::html2pdf-bundle
      - id: metadata/library/jspdf::jspdf-standard-font-data
composite_rules:
  - id: node-buffer-base64-encode
    desc: Buffer output encoded as base64
    crit: notable
    conf: 0.86
    all:
      - id: node-buffer-tostring-call
      - id: base64-literal
