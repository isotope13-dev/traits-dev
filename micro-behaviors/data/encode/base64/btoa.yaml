defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: btoa-symbol
    desc: Calls the browser btoa() Base64 encoder
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: btoa
  - id: btoa-utf8-safe-encode
    desc: UTF-8-safe Base64 encoding via btoa()
    crit: notable
    conf: 0.88
    # The standard idiom for base64-encoding a Unicode string in the browser.
    # Neutral; exfil/skimmer composites reference it cross-directory alongside an
    # actual exfil sink.
    if:
      type: text
      substr: btoa(unescape(encodeURIComponent(
  - id: btoa-basic-auth-header
    desc: Base64 Basic-auth credential encoding
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: "btoa\\s*\\([^)]{0,100}\\+\\s*[\"']:[\"']"
