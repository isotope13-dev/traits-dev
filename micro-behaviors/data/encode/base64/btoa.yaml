defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: btoa-symbol
    desc: Base64 encode symbol
    crit: component
    conf: 0.78
    if:
      type: symbol
      exact: btoa
  - id: btoa-utf8-safe-encode
    desc: UTF-8-safe base64 encode (btoa over unescape(encodeURIComponent))
    crit: component
    conf: 0.88
    # The standard idiom for base64-encoding a Unicode string in the browser.
    # Neutral; exfil/skimmer composites reference it cross-directory alongside an
    # actual exfil sink.
    if:
      type: text
      substr: btoa(unescape(encodeURIComponent(