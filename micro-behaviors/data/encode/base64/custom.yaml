defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  attack: T1027.010
  mbc: B0032.001
  crit: baseline
traits:
  - id: alphabet-standard
    desc: Hardcoded standard base64 alphabet
    crit: baseline
    conf: 0.5
    for:
      - elf
      - macho
      - pe
      - so
      - dylib
      - dll
    if:
      type: string_value
      substr: ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/
  - id: alphabet-script
    desc: Hardcoded base64 alphabet in script
    crit: notable
    conf: 0.7
    for:
      - python
      - javascript
      - shell
      - ruby
      - php
    if:
      type: string_value
      substr: ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/
  - id: alphabet-permuted-native
    desc: Permuted native Base64 alphabet
    crit: suspicious
    conf: 0.98
    for:
      - pe
      - dll
    if:
      type: string_value
      exact: Lr4xR0ou=eVDC3PFjAmqSHEdfYa+ZlXsTI1cBk/wb8pU6JW95gzOnNQy7Gh2KMitv
      section: .rdata
  - id: padding-char
    desc: Base64 padding character reference
    crit: baseline
    conf: 0.5
    if:
      type: string_value
      regex: \bpadding\s*=\s*['"]=['"]|\bpad_char\b
  - id: decode-table
    desc: Custom base64 decode lookup table
    crit: baseline
    conf: 0.5
    for:
      - elf
      - macho
      - pe
      - so
      - dylib
      - dll
    if:
      type: string_value
      regex: '[|\$}][A-Za-z0-9+/]{0,20}[0-9+/][A-Za-z0-9+/]{8,20}[\{\$]'
    not:
      - regex: '@'
      - regex: (?i)\$initializer\$|<CrtImplementationDetails>|<CppImplementationDetails>
composite_rules:
  - id: custom-implementation
    desc: Custom base64 implementation
    crit: baseline
    conf: 0.7
    any:
      - id: decode-table
      - id: alphabet-standard
  - id: permuted-native-implementation
    desc: Native custom Base64 implementation
    crit: suspicious
    conf: 0.95
    all:
      - id: alphabet-permuted-native
      - id: decode-table
