defaults:
  platforms:
    - unix
    - windows
  for: [binaries, scripts]
  attack: T1027.010
  mbc: B0032.001
  crit: baseline
traits:
  - id: alphabet-standard
    desc: Hardcoded standard base64 alphabet
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/
  - id: alphabet-permuted-native
    desc: Permuted native Base64 alphabet
    crit: suspicious
    conf: 0.98
    for:
      - pe
    if:
      type: text
      exact: Lr4xR0ou=eVDC3PFjAmqSHEdfYa+ZlXsTI1cBk/wb8pU6JW95gzOnNQy7Gh2KMitv
      section: .rdata
  - id: padding-char
    desc: Base64 padding character reference
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: \bpadding\s*=\s*['"]=['"]|\bpad_char\b
  - id: decode-table
    desc: Custom base64 decode lookup table
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: '[|\$}][A-Za-z0-9+/=]{63,65}[\{\$]'
    not:
      - regex: '@'
      - regex: (?i)\$initializer\$|<CrtImplementationDetails>|<CppImplementationDetails>
composite_rules:
  - id: custom-implementation
    desc: Custom base64 implementation
    crit: baseline
    conf: 0.7
    # A *custom* base64 is characterised by a non-standard/permuted alphabet or a
    # hand-rolled decode table — NOT by the standard alphabet, which every base64
    # library (e.g. the Rust `base64` crate) embeds. Matching `alphabet-standard`
    # here fired on every base64-using binary and drove obfuscated-exfiltration
    # to flag benign apps; the standard alphabet is a neutral base64-presence
    # signal, not evidence of a custom implementation.
    any:
      - id: decode-table
      - id: alphabet-permuted-native
  - id: permuted-native-implementation
    desc: Native custom Base64 implementation
    crit: suspicious
    conf: 0.95
    all:
      - id: alphabet-permuted-native
      - id: decode-table
