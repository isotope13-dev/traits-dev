defaults:
  platforms: [unix, windows]
traits:
  - id: double-base64-encode
    desc: Double base64 encoding pattern
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: text
      regex: \|\s*base64\b.{0,50}\|\s*base64\b
    unless:
      - id: well-known/tool/detection/clawker::adversarial-payload-fixture
      - id: metadata/package/testing/presence/harness::test-directory
