defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: large-base64-payload
    desc: Large base64 encoded payload
    crit: notable
    conf: 0.8
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: ^[A-Za-z0-9+/]{200,}(?:[+/]|[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)$
    not:
      - substr: PADDINGXXPADDING
    attack: T1140
    mbc: C0043
  - id: large-hex-payload
    desc: Large hexadecimal encoded payload
    crit: notable
    conf: 0.8
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: ^[0-9A-Fa-f]{512,}$
    attack: T1140
    mbc: C0043
  - id: hex-byte-format
    desc: Hex byte format string
    crit: baseline
    conf: 0.6
    platforms:
      - unix
      - windows
    if:
      type: string_value
      substr: 0x%02x
  - id: c-array-format
    desc: C array declaration format string
    crit: notable
    conf: 0.6
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: char\s+%s\[\]
  - id: payload-blob-metrics
    desc: High entropy encrypted data
    crit: notable
    conf: 0.75
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    entropy_min: 7.0
    if:
      type: section
      regex: ^\.rdata
  - id: high-entropy-section
    desc: High entropy executable section
    crit: notable
    conf: 0.8
    platforms:
      - windows
    for:
      - pe
    if:
      type: section
      executable: true
      entropy_min: 7.0
composite_rules:
  - id: embedded-obfuscated-payload
    desc: Embedded obfuscated payload
    crit: suspicious
    conf: 0.85
    attack: T1140
    mbc: C0043
    platforms:
      - unix
      - windows
    size_max: 1000000
    any:
      - id: large-base64-payload
      - id: large-hex-payload
      - id: payload-blob-metrics
    none:
      - id: metadata/signed/platform::apple
  - id: binary-to-c-array
    desc: Binary to C array converter
    crit: notable
    conf: 0.8
    attack: T1027.009
    platforms:
      - unix
      - windows
    all:
      - id: hex-byte-format
      - id: c-array-format
