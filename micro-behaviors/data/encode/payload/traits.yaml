defaults:
  for: [scripts, binaries]
  platforms:
  - unix
  - windows
  - ios
  - android
traits:
- id: large-encoded-blob-literal
  desc: Large base64-like data blob literal
  crit: notable
  conf: 0.8
  for: [javascript, typescript, python]
  platforms: [unix, windows]
  if:
    type: literal
    kind: string
    regex: '[A-Za-z0-9+/]{1024,}={0,2}'
  not:
  - substr: data:image/
  # AVIF data URLs commonly begin with the base64 encoding of `ftypavif`.
  - substr: AAAAIGZ0eXBhdmlm
  # Base64 JSON is commonly used for inline UI/config attributes, not code.
  - substr: eyJ
  - regex: '(iVBORw0KGgo|/9j/4|R0lGOD[dl]h|UklGR|JVBERi0|PHN2Zy|PD94bWwg)'
- id: large-base64-payload
  desc: Large base64 encoded payload
  crit: notable
  conf: 0.8
  platforms:
  - unix
  - windows
  if:
    type: text
    regex: ^[A-Za-z0-9+/]{200,}([+/]|[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)$
  not:
  - substr: PADDINGXXPADDING
  - substr: "MIIF"
  - substr: "MIIE"
  unless:
  - id: metadata/signed/platform/
  attack: T1140
  mbc: C0043
- id: large-unpadded-base64-line
  desc: Long unpadded Base64-like data line
  crit: notable
  conf: 0.95
  for: [powershell, batch]
  platforms: [windows]
  attack: T1140
  mbc: C0043
  if:
    type: text
    regex: '^[A-Za-z0-9+/]{200,999}$'

- id: large-base64-string-literals
  desc: Very long base64 strings present
  crit: notable
  conf: 0.6
  platforms: [unix, windows]
  count_min: 2
  if:
    type: literal
    kind: string
    regex: '[A-Za-z0-9+/]{300,}={0,2}'
  not:
  - substr: data:image/
  - regex: PHN2Zy
  - regex: PD94bWwg
  - regex: AAAAB3NzaC1yc2E[A-Za-z0-9+/]{0,500}={0,2}
  - regex: AAAAC3NzaC1lZDI1NTE5[A-Za-z0-9+/]{0,500}={0,2}
  unless:
  - id: metadata/file/format/
  - id: metadata/library/structure/
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/structure::js-large-minified-bundle
  - id: metadata/package/testing/presence/harness/
  attack: T1140
  mbc: C0043
- id: shell-base64-payload-literal
  desc: Shell script base64 payload literal
  crit: notable
  conf: 0.85
  for: [shell]
  platforms: [unix, android, ios]
  size_max: 1048576
  if:
    type: text
    regex: "(^|[\\x22\\x27\\s])[A-Za-z0-9+/]{120,}={0,2}([\\x22\\x27\\s]|$)"
  unless:
  - type: basename
    regex: "\\.(exe|dll|zip)$"
  - type: text
    regex: "(^|[\\x22\\x27\\s])[A-Fa-f0-9]{96,}([\\x22\\x27\\s]|$)"
  # OpenSSH public keys carry an opaque base64 blob but are not executable
  # payloads.  Cover the current SSH key type prefixes without keying on a
  # particular host or algorithm instance.
  - type: text
    regex: '(ssh-|ecdsa-sha2-|sk-ssh-)[A-Za-z0-9@._-]+\s+AAAA[A-Za-z0-9+/]{40,}'
  - type: text
    regex: '/kubepods/(besteffort|burstable|guaranteed)/pod[0-9a-f-]{16,}'
  attack: T1140
  mbc: C0043
- id: batch-comment-base64-carrier
  desc: Batch comment carries a long Base64-like blob
  crit: notable
  conf: 0.96
  for: [batch]
  platforms: [windows]
  attack: T1140
  mbc: C0043
  if:
    type: text
    regex: '(?m)^::[ \t]+[A-Za-z0-9+/=]{200,999}[ \t]*\r?$'
- id: batch-marker-base64-carrier
  desc: Batch marker carries a Base64-like blob
  crit: notable
  conf: 0.96
  for: [batch]
  platforms: [windows]
  attack: T1140
  mbc: C0043
  if:
    type: text
    regex: '(?m)^@[ \t]+[A-Za-z0-9+/=]{200,999}[ \t]*\r?$'

- id: batch-oversized-data-line
  desc: Batch contains oversized data line
  crit: notable
  conf: 0.97
  for: [batch]
  platforms: [windows]
  size_min: 100000
  attack: T1140
  mbc: C0043
  if:
    type: metrics
    field: text.max_line_length
    min: 100000

- id: powershell-base64-like-carrier-line
  desc: PowerShell assignment carries Base64-like data
  crit: notable
  conf: 0.98
  for: [powershell]
  platforms: [windows]
  size_min: 100000
  attack: T1140
  mbc: C0043
  if:
    type: text
    regex: '(?is)\$[A-Za-z_][A-Za-z0-9_]*\s*=\s*[''\"]\s*[A-Za-z0-9+/]{200,999}={0,2}'

- id: powershell-bare-base64-like-carrier-line
  desc: PowerShell line carries bare Base64-like data
  crit: notable
  conf: 0.98
  for: [powershell]
  platforms: [windows]
  size_min: 100000
  attack: T1140
  mbc: C0043
  if:
    type: text
    regex: '^[A-Za-z0-9+/]+={0,2}$'
    length_min: 100000

- id: powershell-hex-here-string-carrier
  desc: PowerShell repeated hex payload lines
  crit: notable
  conf: 0.97
  for: [powershell]
  platforms: [windows]
  attack: T1140
  mbc: C0043
  if:
    type: text
    regex: '(?is)\$[A-Za-z_][A-Za-z0-9_]*\s*=\s*@[''\"]\s*\r?\n([0-9A-F]{64}\r?\n){8,}'

- id: large-hex-payload
  desc: Large hexadecimal encoded blob
  crit: notable
  conf: 0.8
  platforms:
  - unix
  - windows
  if:
    type: text
    regex: ^[0-9A-Fa-f]{512,}$
  not:
  - regex: ^F{16}C90FDAA22168C234C4C6628B80DC1CD1
  unless:
  - id: metadata/file/string/charset::sequential-decimal-lookup-table
  attack: T1140
  mbc: C0043
- id: large-hex-string-literal
  desc: Large hexadecimal string literal
  crit: notable
  conf: 0.86
  platforms: [unix]
  for: [lua]
  if:
    type: literal
    kind: string
    regex: '[0-9A-Fa-f]{1024,}'
  attack: T1140
  mbc: C0043
- id: large-alpha-payload
  desc: Large alphabetic encoded payload blob
  crit: notable
  conf: 0.86
  platforms:
  - windows
  for:
  - pe
  - dll
  count_min: 2
  if:
    type: text
    regex: ^[A-Za-z]{1000,}$
  unless:
  - id: metadata/signed/platform/
  - id: metadata/package/versioning::pe-version-resource
  attack: T1140
  mbc: C0043
- id: hex-byte-format
  desc: Hex byte format string
  crit: baseline
  conf: 0.6
  platforms:
  - unix
  - windows
  if:
    type: text
    substr: 0x%02x
- id: printf-hex-byte-format
  desc: Printf hex byte format
  crit: baseline
  conf: 0.6
  platforms:
  - unix
  - windows
  if:
    type: text
    substr: "%02x"
- id: c-array-format
  desc: C array declaration format string
  crit: notable
  conf: 0.6
  platforms:
  - unix
  - windows
  if:
    type: text
    regex: char\s+%s\[\]
composite_rules:
- id: embedded-obfuscated-payload
  desc: Embedded obfuscated data blob
  crit: suspicious
  conf: 0.85
  attack: T1140
  mbc: C0043
  platforms:
  - unix
  - windows
  size_max: 1000000
  any:
  - id: large-base64-payload
  - id: large-hex-payload
  - id: large-alpha-payload
  unless:
  - id: metadata/signed/platform::apple
- id: binary-to-c-array
  desc: Binary to C array converter
  crit: notable
  conf: 0.8
  attack: T1027.009
  platforms:
  - unix
  - windows
  all:
  - id: hex-byte-format
  - id: c-array-format
