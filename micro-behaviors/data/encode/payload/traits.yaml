defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: large-base64-payload
    desc: Large base64 encoded payload
    crit: notable
    conf: 0.8
    platforms:
      - unix
      - windows
    if:
      type: text
      regex: ^[A-Za-z0-9+/]{200,}([+/]|[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)$
    not:
      - substr: PADDINGXXPADDING
      - substr: "MIIF"
      - substr: "MIIE"
    unless:
      - id: metadata/signed/platform::microsoft
    attack: T1140
    mbc: C0043
  - id: large-base64-string-literals
    desc: Very long base64 strings present
    crit: notable
    conf: 0.6
    platforms: [unix, windows]
    count_min: 2
    if:
      type: literal
      kind: string
      regex: '[A-Za-z0-9+/]{300,}={0,2}'
    not:
      - substr: data:image/
      - regex: '(PHN2Zy|PD94bWwg)'
      - regex: AAAAB3NzaC1yc2E[A-Za-z0-9+/]{0,500}={0,2}
      - regex: AAAAC3NzaC1lZDI1NTE5[A-Za-z0-9+/]{0,500}={0,2}
    unless:
      - id: metadata/file/text/format::sourcemap-context
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/package/testing/presence/harness::test-directory
    attack: T1140
    mbc: C0043
  - id: shell-base64-payload-literal
    desc: Shell script base64 payload literal
    crit: notable
    conf: 0.85
    for: [shell]
    platforms: [unix, android, ios]
    size_max: 1048576
    if:
      type: text
      regex: "(^|[\\x22\\x27\\s])[A-Za-z0-9+/]{120,}={0,2}([\\x22\\x27\\s]|$)"
    unless:
      - type: basename
        regex: "\\.(exe|dll|zip)$"
      - type: text
        regex: "(^|[\\x22\\x27\\s])[A-Fa-f0-9]{96,}([\\x22\\x27\\s]|$)"
      - type: text
        regex: 'ssh-(rsa|ed25519|ecdsa)\s+AAAA[A-Za-z0-9+/]{40,}'
      - type: text
        regex: '/kubepods/(besteffort|burstable|guaranteed)/pod[0-9a-f-]{16,}'
    attack: T1140
    mbc: C0043
  - id: large-hex-payload
    desc: Large hexadecimal encoded blob
    crit: notable
    conf: 0.8
    platforms:
      - unix
      - windows
    if:
      type: text
      regex: ^[0-9A-Fa-f]{512,}$
    not:
      - regex: ^F{16}C90FDAA22168C234C4C6628B80DC1CD1
    attack: T1140
    mbc: C0043
  - id: large-hex-string-literal
    desc: Large hexadecimal string literal
    crit: notable
    conf: 0.86
    platforms: [unix]
    for: [lua]
    if:
      type: literal
      kind: string
      regex: '[0-9A-Fa-f]{1024,}'
    attack: T1140
    mbc: C0043
  - id: large-alpha-payload
    desc: Large alphabetic encoded payload blob
    crit: notable
    conf: 0.86
    platforms:
      - windows
    for:
      - pe
      - dll
    count_min: 2
    if:
      type: text
      regex: ^[A-Za-z]{1000,}$
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::pe-version-resource
    attack: T1140
    mbc: C0043
  - id: hex-byte-format
    desc: Hex byte format string
    crit: baseline
    conf: 0.6
    platforms:
      - unix
      - windows
    if:
      type: text
      substr: 0x%02x
  - id: printf-hex-byte-format
    desc: Printf hex byte format
    crit: baseline
    conf: 0.6
    platforms:
      - unix
      - windows
    if:
      type: text
      substr: "%02x"
  - id: c-array-format
    desc: C array declaration format string
    crit: notable
    conf: 0.6
    platforms:
      - unix
      - windows
    if:
      type: text
      regex: char\s+%s\[\]
  - id: payload-blob-metrics
    desc: High entropy encrypted data
    crit: notable
    conf: 0.75
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: section
      regex: ^\.rdata
      entropy_min: 7.0
    unless:
      - id: metadata/binary/metrics/structural::many-functions
  - id: high-entropy-section
    desc: High entropy executable section
    crit: notable
    conf: 0.8
    platforms:
      - windows
    for:
      - pe
    if:
      type: section
      regex: '^(?!\.(rsrc|reloc)).+'
      executable: true
      entropy_min: 7.0
composite_rules:
  - id: embedded-obfuscated-payload
    desc: Embedded obfuscated data blob
    crit: suspicious
    conf: 0.85
    attack: T1140
    mbc: C0043
    platforms:
      - unix
      - windows
    size_max: 1000000
    any:
      - id: large-base64-payload
      - id: large-hex-payload
      - id: large-alpha-payload
      - id: payload-blob-metrics
    unless:
      - id: metadata/signed/platform::apple
  - id: binary-to-c-array
    desc: Binary to C array converter
    crit: notable
    conf: 0.8
    attack: T1027.009
    platforms:
      - unix
      - windows
    all:
      - id: hex-byte-format
      - id: c-array-format
