defaults:
  platforms: [windows, unix]
traits:
  - id: js-concat-chain
    desc: JavaScript massive string concatenation chain
    crit: notable
    conf: 0.7
    for: [javascript, typescript]
    size_max: 500000
    if:
      type: text
      regex: =\s*([\w"'\.]+\s*\+\s*){5,}
  - id: js-loop-string-concat
    desc: String concatenation in loop body using array
    crit: baseline
    conf: 0.6
    for: [javascript, typescript]
    size_max: 500000
    unless:
      - type: basename
        regex: \.js\.map$
      - id: metadata/library/structure::js-large-module-bundle
    if:
      type: text
      regex: '[\w$]+\s*=\s*[\w$]+\s*\+\s*[\w$]+\s*\[[^\]]{1,120}\]'
  - id: js-loop-string-plus-equals
    desc: += string concatenation from array access
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    size_max: 500000
    count_min: 2
    if:
      type: text
      regex: '[\w$]+\s*\+=\s*[\w$]+\s*\[[^\]]{1,120}\]'
    unless:
      - type: basename
        regex: \.js\.map$
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$|run-script-os[\\/]index\.js$
      - type: basename
        regex: (^|[\\/])node_modules[\\/]ipv6[\\/]
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]ipv6[\\/]
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]dist[\\/]
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: js-loop-string-charat
    desc: += string concatenation via charAt
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    size_max: 500000
    if:
      type: text
      regex: '[\w$]+\s*\+=\s*[\w$]+\.charAt\('
  - id: js-skip-step-loop
    desc: JavaScript loop with non-standard increment (skip-step)
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[3-9]\)'
  - id: js-skip-step-loop-large
    desc: JavaScript loop with large numeric increment
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[1-9]\d+\)'
  - id: js-skip-step-loop-variable
    desc: JavaScript loop with variable increment
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[a-zA-Z_$][\w$]*\)'
composite_rules:
  - id: js-loop-string-concat-any
    desc: String concatenation in loop body using array
    crit: notable
    conf: 0.6
    any:
      - id: js-loop-string-concat
      - id: js-loop-string-plus-equals
      - id: js-loop-string-charat
  - id: js-skip-step-loop-any
    desc: JavaScript loop with non-standard increment (skip-step)
    crit: notable
    conf: 0.8
    any:
      - id: js-skip-step-loop
      - id: js-skip-step-loop-large
      - id: js-skip-step-loop-variable
