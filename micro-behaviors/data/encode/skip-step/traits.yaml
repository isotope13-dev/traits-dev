defaults:
  platforms: [windows, unix]
traits:
  - id: js-concat-chain
    desc: JavaScript massive string concatenation chain
    crit: notable
    conf: 0.7
    for: [javascript, typescript]
    size_max: 500000
    if:
      type: text
      regex: =\s*([\w"'\.]+\s*\+\s*){5,}
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/lib/greensock::greensock-tweenmax-suite-banner
  - id: js-loop-string-concat
    desc: String concatenation in loop body using array
    crit: baseline
    conf: 0.6
    for: [javascript, typescript]
    size_max: 500000
    unless:
      - type: basename
        regex: \.js\.map$
      - id: metadata/library/structure::js-large-module-bundle
    if:
      type: text
      regex: '[\w$]+\s*=\s*[\w$]+\s*\+\s*[\w$]+\s*\[[^\]]{1,120}\]'
  - id: js-loop-string-plus-equals
    desc: += string concatenation from array access
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    size_max: 500000
    count_min: 2
    # Density floor, not just a raw count: a real char-by-char string decoder
    # is dense, whereas normal libraries (e.g. moment.js: 2 hits in ~25 KB =
    # 0.08/KB) have a couple of incidental `x += y[i]` lines. Requiring both a
    # count floor and density keeps the obfuscation signal without flagging
    # sparse benign usage.
    per_kb_min: 0.2
    if:
      type: text
      regex: '[\w$]+\s*\+=\s*[\w$]+\s*\[[^\]]{1,120}\]'
    unless:
      - type: text
        regex: '[\w$]+\s*\+=\s*arguments\s*\['
      - id: metadata/file/format::sourcemap-sources-content
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$|run-script-os[\\/]index\.js$
      - type: basename
        regex: node_modules[\\/]ipv6[\\/]
      - id: well-known/app/tabby::tabby-builtin-plugin-dist-path
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/lib/popper::popper-js-v1-banner
      - type: text
        regex: "\\bdot\\s*\\+=\\s*a\\[i\\]\\s*\\*\\s*b\\[i\\]"
  - id: js-loop-string-charat
    desc: += string concatenation via charAt
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    size_max: 500000
    if:
      type: text
      regex: '[\w$]+\s*\+=\s*[\w$]+\.charAt\('
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/lib/jquery-ui::jquery-ui-version-banner
      - type: text
        regex: 'charAt\(Math\.floor\([^)]{0,40}Math\.random\(\)'
  - id: js-skip-step-loop
    desc: "JS loop with non-standard increment"
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/app/aui-agent-builder::generated-web-ui-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[3-9]\)'
  - id: js-skip-step-loop-variable
    desc: JavaScript variable-step loop pattern
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    unless:
      - id: well-known/app/aui-agent-builder::generated-web-ui-bundle
    if:
      type: text
      regex: 'for\s*\([^;]{1,120};[^;]{1,120};\s*[\w$]+\s*\+=\s*[a-zA-Z_$][\w$]*\)'
composite_rules:
  - id: js-loop-string-concat-any
    desc: String concatenation in loop body using array
    crit: notable
    conf: 0.6
    any:
      - id: js-loop-string-concat
      - id: js-loop-string-plus-equals
      - id: js-loop-string-charat
  - id: js-skip-step-loop-any
    desc: 'JS loop with non-standard increment (skip-step)'
    crit: notable
    conf: 0.8
    any:
      - id: js-skip-step-loop
      - id: micro-behaviors/data/control-flow/loop::js-large-step-loop
      - id: js-skip-step-loop-variable
