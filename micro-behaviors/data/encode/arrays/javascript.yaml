defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: js-large-int-array
    desc: Array of large integers
    crit: notable
    conf: 0.8
    size_max: 200000
    if:
      type: raw
      regex: '\[[0-9,\s]{40,}\]'
  - id: js-hex-number-array
    desc: Array of hex char codes
    crit: notable
    conf: 0.8
    size_max: 200000
    if:
      type: raw
      regex: '[(](0x[0-9a-fA-F]{2,3},\s*){10,}'
