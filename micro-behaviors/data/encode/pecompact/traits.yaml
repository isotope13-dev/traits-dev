defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: pecompact-signature
    desc: PECompact signature string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: PECompac
  - id: pecompact-seh-trick
    desc: PECompact SEH exception trick
    crit: notable
    conf: 0.95
    if:
      type: hex
      section: .text
      pattern: 50 64 FF 35 00 00 00 00 64 89 25 00 00 00 00 33 C0 89 08
  - id: pec2no-section-token
    desc: PECompact 2 PEC2NO section name token
    crit: notable
    conf: 0.95
    if:
      type: hex
      pattern: 50 45 43 32 4E 4F
      offset_range: [0, 4096]
composite_rules:
  - id: pecompact-marker
    desc: PECompact packer marker
    crit: notable
    conf: 0.9
    any:
      - id: pecompact-signature
      - id: pecompact-seh-trick
      - id: pec2no-section-token
