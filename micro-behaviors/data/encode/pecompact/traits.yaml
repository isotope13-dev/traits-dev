defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: pecompact-signature
    desc: PECompact signature string
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: PECompac
  - id: pecompact-seh-trick
    desc: PECompact SEH exception trick
    crit: notable
    conf: 0.95
    if:
      type: hex
      section: .text
      pattern: 50 64 FF 35 00 00 00 00 64 89 25 00 00 00 00 33 C0 89 08
composite_rules:
  - id: pecompact-indicator
    desc: PECompact packer marker
    crit: component
    conf: 0.9
    any:
      - id: pecompact-signature
      - id: pecompact-seh-trick
