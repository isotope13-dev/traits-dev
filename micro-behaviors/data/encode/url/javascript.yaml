# URL Encoding - JavaScript
# encodeURI/encodeURIComponent for URL-safe data encoding
defaults:
  for: [javascript]
  platforms: [unix, windows]
traits:
  - id: encodeuri-call
    desc: URL-encodes data via encodeURI
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: encodeURI
  - id: encode-uri-component-call
    desc: URL-encodes data via encodeURIComponent
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: encodeURIComponent
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: querystring-stringify-call
    desc: querystring.stringify() URL form encoding
    crit: baseline
    conf: 0.72
    if:
      type: text
      regex: "\\bquerystring\\.stringify\\s*\\("
  - id: urlsearchparams-constructor
    desc: URLSearchParams constructor call
    crit: baseline
    conf: 0.72
    if:
      type: text
      regex: "\\bnew\\s+URLSearchParams\\s*\\("
