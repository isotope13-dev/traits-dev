# URL Encoding - JavaScript
# encodeURI/encodeURIComponent for URL-safe data encoding
defaults:
  for: [javascript]
  platforms: [unix, windows, macos]
traits:
  - id: encodeuri-call
    desc: URL-encodes data via encodeURI
    crit: baseline
    conf: 0.7
    if:
      type: raw
      regex: 'encodeURI\('
      not:
        - substr: encodeURIComponent
  - id: encode-uri-component-call
    desc: URL-encodes data via encodeURIComponent
    crit: baseline
    conf: 0.7
    if:
      type: raw
      substr: 'encodeURIComponent('
