defaults:
  platforms: [windows, unix]
  for:
    - python
  crit: notable
traits:
  - id: codecs-rot13-decode
    desc: Calls Python codecs ROT13 decoder
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: codecs.decode
      arg:
        kind: string
        regex: '(?i)^rot[_-]?13$'
  - id: rot13-alpha-source
    desc: ROT13 source alphabet string
    conf: 0.95
    if:
      type: string_literal
      exact: abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
  - id: rot13-alpha-target
    desc: ROT13 target alphabet string
    conf: 0.95
    if:
      type: string_literal
      exact: nopqrstuvwxyzabcdefghijklmNOPQRSTUVWXYZABCDEFGHIJKLM
  - id: translate-with-rot13-helper
    desc: 'Python str.maketrans translate call'
    # Generic str.maketrans translation — not ROT13 on its own. Common in benign
    # transliteration (e.g. Persian↔ASCII digit maps). Only meaningful combined
    # with the ROT13 source/target alphabets in python-rot13-decoder.
    crit: component
    conf: 0.85
    if:
      type: text
      regex: translate\s*\(\s*str\.maketrans\s*\(
  - id: rot13-whoami
    desc: ROT13 encoded whoami string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: jubnzv
composite_rules:
  - id: python-rot13-decoder
    desc: Python ROT13 string decoding helper
    crit: suspicious
    conf: 0.92
    all:
      - id: rot13-alpha-source
      - id: rot13-alpha-target
    any:
      - id: translate-with-rot13-helper
