defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  crit: notable
traits:
  - id: rot13-alpha-source
    desc: ROT13 source alphabet string
    conf: 0.95
    if:
      type: string_literal
      exact: abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
  - id: rot13-alpha-target
    desc: ROT13 target alphabet string
    conf: 0.95
    if:
      type: string_literal
      exact: nopqrstuvwxyzabcdefghijklmNOPQRSTUVWXYZABCDEFGHIJKLM
  - id: translate-with-rot13-helper
    desc: Python translate helper with ROT13
    conf: 0.85
    if:
      type: text
      regex: translate\s*\(\s*str\.maketrans\s*\(
  - id: rot13-whoami
    desc: ROT13 encoded whoami string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: jubnzv
composite_rules:
  - id: python-rot13-decoder
    desc: Python ROT13 string decoding helper
    crit: suspicious
    conf: 0.92
    all:
      - id: rot13-alpha-source
      - id: rot13-alpha-target
    any:
      - id: translate-with-rot13-helper
