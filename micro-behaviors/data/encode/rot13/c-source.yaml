# ROT13 encoding implementation in C/C++ source code
# Used by many worms (Mydoom, Bagle, etc.) to obfuscate strings
defaults:
  for: [c, cpp]
  platforms: [windows, unix]
traits:
  - id: rot13-function-impl
    desc: ROT13 function implementation in C
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\+ 13\) % 26'
  - id: rot13-function-name
    desc: ROT13 function name in source
    crit: component
    conf: 0.8
    if:
      type: text
      word: "rot13"
  - id: rot13-encoded-registry-path
    desc: ROT13-encoded Windows registry path
    crit: suspicious
    conf: 0.96
    platforms: [windows]
    if:
      type: text
      substr: 'Fbsgjner\\Zvpebfbsg'
  - id: rot13-encoded-smtp-ehlo
    desc: ROT13-encoded SMTP EHLO command
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "RUYB %"
  - id: rot13-encoded-currentversion
    desc: ROT13-encoded CurrentVersion path
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    if:
      type: text
      substr: "PheeragIrefvba"
composite_rules:
  - id: rot13-string-obfuscation
    desc: ROT13 string obfuscation in C source
    crit: suspicious
    conf: 0.95
    all:
      - id: rot13-function-name
    any:
      - id: rot13-function-impl
      - id: rot13-encoded-registry-path
      - id: rot13-encoded-currentversion
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
