defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: codepoint-at
    desc: codePointAt() method call
    crit: component
    conf: 0.7
    if:
      type: text
      substr: ".codePointAt("
  - id: charcode-at
    desc: charCodeAt() method call
    crit: component
    conf: 0.7
    if:
      type: text
      substr: ".charCodeAt("

  # Arithmetic on a character code is a neutral string transformation.  It
  # is not necessarily a Caesar cipher: normal key/index algorithms use the
  # same increment/decrement operation.  Objective rules add the surrounding
  # decoder or execution evidence when that context is meaningful.
  - id: charcodeat-arithmetic
    desc: Arithmetic applied to first character code
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'fromCharCode\([^)]{0,80}charCodeAt\(0\)\s*[+-]\s*(\d+|\w+)'
    unless:
      - type: text
        substr: "String.fromCharCode(ch.charCodeAt(0) + 32)"
      - type: text
        regex: '1\s*<<\s*\([^)]{0,40}\.charCodeAt\(0\)\s*-\s*97\)'
      - id: metadata/package/testing/harness/runtime/

  - id: charcodeat-arithmetic-deferred
    desc: Deferred arithmetic on a character code
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.charCodeAt\([^)]{0,5}\)[\s\S]{1,200}fromCharCode\s*\(\s*\(?\s*\w{1,20}\s*[+-]\s*\d'
    unless:
      - type: text
        regex: 'fromCharCode\([^)]{0,40}\+\s*32\)'
      - type: text
        regex: 'charCodeAt\([^)]{0,8}\)[\s\S]{0,80}(?:>=\s*65\s*&&|<=\s*90)'
      - id: metadata/package/testing/harness/runtime/
