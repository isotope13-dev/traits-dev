# Obfuscated string reconstruction used by a Node SEA payload
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027

traits:
  - id: node-sea-xor-string-rebuilder
    desc: XOR fromCharCode string rebuild
    crit: notable
    conf: 0.97
    if:
      type: raw
      regex: 'String\.fromCharCode\([^)]{0,120}\^[A-Za-z_$][A-Za-z0-9_$]*\)'
