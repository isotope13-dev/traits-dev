defaults:
  for:
    - vbs
  platforms:
    - windows
  conf: 0.88
traits:
  - id: chr-function-call
    desc: VBA Chr character code function
    crit: component
    if:
      type: string_literal
      regex: (?i)\bChr[W$]?\(
  - id: dense-chr-construction
    desc: Dense Chr-based string construction
    crit: notable
    conf: 0.9
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: (?i)Chr[W$]?\(
  - id: arithmetic-chr-reconstruction
    desc: Arithmetic Chr payload reconstruction
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bChr[W$]?\(\s*[0-9]{3,}\s*[-+]\s*[A-Za-z_]\w*'
  - id: strreverse-call
    desc: VBA StrReverse obfuscation primitive
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)\bStrReverse\b
  - id: callbyname-call
    desc: VBA CallByName indirect invocation
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      regex: (?i)\bCallByName\b
  - id: replace-function-call
    desc: VBA Replace string manipulation
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: (?i)\bReplace\(
composite_rules:
  - id: chr-replace-deobfuscation
    desc: Chr plus Replace deobfuscation chain
    crit: suspicious
    conf: 0.93
    all:
      - id: chr-function-call
      - id: dense-chr-construction
      - id: replace-function-call
