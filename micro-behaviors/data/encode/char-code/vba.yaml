defaults:
  platforms:
    - windows
  for: [oledoc, ooxml, vbs]
  conf: 0.88
traits:
  - id: chr-function-call
    desc: VBA Chr character code function
    crit: component
    if:
      type: text
      regex: (?i)\bChr[W$]?\(
  - id: dense-chr-construction
    desc: Dense Chr-based string construction
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: (?i)Chr[W$]?\(
  - id: strreverse-call
    desc: VBA StrReverse obfuscation primitive
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)\bStrReverse\b
  - id: callbyname-call
    desc: VBA CallByName indirect invocation
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?i)\bCallByName\b
  - id: callbyname-call-raw
    desc: VBA CallByName in raw bytes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: CallByName
  - id: replace-function-call
    desc: VBA Replace string manipulation
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)\bReplace\(
composite_rules:
  - id: chr-replace-deobfuscation
    desc: Chr plus Replace deobfuscation chain
    crit: suspicious
    conf: 0.93
    all:
      - id: chr-function-call
      - id: dense-chr-construction
      - id: replace-function-call
