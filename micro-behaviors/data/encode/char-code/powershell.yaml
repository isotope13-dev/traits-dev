defaults:
  platforms: [windows]
  for: [powershell, batch, vbs, html, lnk]
  attack: T1027

traits:
  - id: powershell-numeric-char-reconstruction
    desc: PowerShell builds characters from numeric codes
    crit: notable
    conf: 0.9
    if:
      type: encoded
      regex: '(?i)(\[char\]\s*\[?int\]?|\[char\]\s*\(?\s*\d{1,4})'

  - id: powershell-numeric-char-reconstruction-loop
    desc: PowerShell loops over numeric character codes
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      regex: '(?is)-join\s*\([^)]{24,}\|\s*ForEach-Object\s*\{\s*\[char\]'
