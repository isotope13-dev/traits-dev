defaults:
  for: [javascript]
  platforms: [windows, linux, macos, unix, android, ios]
traits:
  - id: numeric-array-literal
    desc: Numeric array literal payload
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\s*[0-9]{1,3}(\s*,\s*[0-9]{1,3}){15,}\s*\]'
  - id: fromcharcode-xor-rebuild
    desc: XOR rebuilt via fromCharCode
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            property: (property_identifier) @prop)
          arguments: (arguments
            (binary_expression
              operator: "^") @xorarg))
        (#eq? @prop "fromCharCode")
composite_rules:
  - id: js-xor-array-payload-reconstruction
    desc: JavaScript array payload rebuilt with XOR key
    crit: suspicious
    conf: 0.97
    all:
      - id: numeric-array-literal
      - id: fromcharcode-xor-rebuild
