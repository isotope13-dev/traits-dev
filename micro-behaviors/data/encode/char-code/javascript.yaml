defaults:
  for: [javascript]
  platforms: [unix, windows]
traits:
  - id: numeric-array-literal
    desc: Numeric array literal payload
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\s*[0-9]{1,3}(\s*,\s*[0-9]{1,3}){15,}\s*\]'
  - id: fromcharcode-call
    desc: String.fromCharCode call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      substr: fromCharCode
  - id: fromcharcode-xor-rebuild
    desc: fromCharCode rebuilds XOR expression result
    crit: notable
    conf: 0.95
    if:
      # Join the call and XOR at one AST node so unrelated operators and
      # comments elsewhere in a crypto library cannot satisfy the rule.
      type: tree-sitter
      kind: call
      regex: 'fromCharCode\s*\(.{0,240}\^'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
composite_rules:
  - id: js-xor-array-payload-reconstruction
    desc: JavaScript array payload rebuilt with XOR key
    crit: suspicious
    conf: 0.97
    # Require the byte array and XOR/fromCharCode decoder to be colocated.
    # Large bundled workers can contain both patterns in unrelated code paths.
    near_bytes: 2048
    all:
      - id: numeric-array-literal
      - id: fromcharcode-xor-rebuild
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/jspdf
      - id: well-known/lib/pdfjs/
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
