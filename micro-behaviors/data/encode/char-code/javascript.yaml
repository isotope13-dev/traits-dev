defaults:
  for: [javascript]
  platforms: [unix, windows]
traits:
  - id: long-numeric-array-literal
    desc: Long numeric array literal
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\s*[0-9]{1,3}(\s*,\s*[0-9]{1,3}){15,}\s*\]'
  - id: fromcharcode-call
    desc: Builds characters with String.fromCharCode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      substr: fromCharCode
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: fromcharcode-call-text
    desc: Dot or bracket String.fromCharCode use
    crit: notable
    conf: 0.9
    # Large JavaScript files may be intentionally left unparsed by the source
    # extractor. Preserve the same capability detection from source text,
    # including bracket notation used to evade dot-notation scans.
    if:
      type: text
      regex: 'String(\.fromCharCode|\[\s*["'']fromCharCode["'']\s*\])\s*\([^;\n]{1,240}\)'
    unless:
      - id: fromcharcode-call

  - id: fromcharcode-source-token
    desc: JavaScript source contains String.fromCharCode
    crit: notable
    conf: 0.8
    # Keep a token fallback for oversized source where the call expression is
    # not available to the AST-backed matcher.
    if:
      type: text
      substr: String.fromCharCode
  - id: fromcharcode-xor-rebuild
    desc: fromCharCode rebuilds XOR expression result
    crit: notable
    conf: 0.95
    if:
      # Join the call and XOR at one AST node so unrelated operators and
      # comments elsewhere in a crypto library cannot satisfy the rule.
      type: tree-sitter
      kind: call
      regex: 'fromCharCode\s*\(.{0,240}\^'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
