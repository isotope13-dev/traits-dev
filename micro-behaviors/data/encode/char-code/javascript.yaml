defaults:
  for: [javascript]
  platforms: [unix, windows]
traits:
  - id: numeric-array-literal
    desc: Numeric array literal payload
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\s*[0-9]{1,3}(\s*,\s*[0-9]{1,3}){15,}\s*\]'
  # Converted from a tree-sitter query to symbol+raw co-location for performance
  # (no per-file reparse). The old query's `(#eq? @prop "fromCharCode")` predicate
  # was not being enforced, so it matched ANY `obj.method(... ^ ...)` call — e.g.
  # a mulberry32 PRNG's `Math.imul(a ^ (a >>> 15), …)`. The discriminator is the
  # `fromCharCode` call itself (the symbol arg shape is opaque, so the `^` cannot
  # be read from the arg); require a bitwise XOR within a few bytes of the call to
  # approximate "the XOR is the fromCharCode argument".
  - id: fromcharcode-call
    desc: String.fromCharCode call
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      substr: fromCharCode
  - id: xor-operator
    desc: Bitwise XOR operator
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '\^'
composite_rules:
  - id: fromcharcode-xor-rebuild
    desc: XOR rebuilt via fromCharCode
    crit: notable
    conf: 0.95
    near_bytes: 80
    all:
      - id: fromcharcode-call
      - id: xor-operator
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
  - id: js-xor-array-payload-reconstruction
    desc: JavaScript array payload rebuilt with XOR key
    crit: suspicious
    conf: 0.97
    # Require the byte array and XOR/fromCharCode decoder to be colocated.
    # Large bundled workers can contain both patterns in unrelated code paths.
    near_bytes: 2048
    all:
      - id: numeric-array-literal
      - id: fromcharcode-xor-rebuild
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/jspdf
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
