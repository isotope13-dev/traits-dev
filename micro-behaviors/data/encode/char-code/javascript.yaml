defaults:
  for: [javascript]
  platforms: [unix, windows]
traits:
  - id: long-numeric-array-literal
    desc: Long numeric array literal
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\s*[0-9]{1,3}(\s*,\s*[0-9]{1,3}){15,}\s*\]'
  - id: fromcharcode-call
    desc: Builds characters with String.fromCharCode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      substr: fromCharCode
  - id: fromcharcode-call-text
    desc: References String.fromCharCode in unparsed code
    crit: notable
    conf: 0.9
    # Large JavaScript files may be intentionally left unparsed by the source
    # extractor.  Preserve the same capability detection from source text.
    if:
      type: text
      regex: 'String\.fromCharCode\s*\([^;\n]{1,240}\)'
    unless:
      - id: fromcharcode-call
  - id: fromcharcode-xor-rebuild
    desc: fromCharCode rebuilds XOR expression result
    crit: notable
    conf: 0.95
    if:
      # Join the call and XOR at one AST node so unrelated operators and
      # comments elsewhere in a crypto library cannot satisfy the rule.
      type: tree-sitter
      kind: call
      regex: 'fromCharCode\s*\(.{0,240}\^'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
composite_rules:
  - id: js-xor-numeric-array-string-reconstruction
    desc: JavaScript string rebuilt from numeric array with XOR
    crit: suspicious
    conf: 0.97
    # Require the byte array and XOR/fromCharCode decoder to be colocated.
    # Large bundled workers can contain both patterns in unrelated code paths.
    near_bytes: 2048
    all:
      - id: long-numeric-array-literal
      - id: fromcharcode-xor-rebuild
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: well-known/lib/jspdf/
      - id: well-known/lib/pdfjs/
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-binary
