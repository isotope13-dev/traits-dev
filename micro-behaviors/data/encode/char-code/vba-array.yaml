defaults:
  for: [vbs]
  platforms: [windows]
  crit: notable
  conf: 0.9
traits:
  - id: array-payload-reconstruction
    desc: Array-based payload byte reconstruction
    crit: suspicious
    if:
      type: text
      regex: '(?i)Array\(\s*[0-9]{1,3}(\s*,\s*[0-9]{1,3}){15,}'
  - id: xor-array-chr-rebuild
    desc: XOR array rebuilt via Chr
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)Chr\s*\(\s*\w+\([^)]{1,40}\)\s+Xor\s+\w+\([^)]{1,40}\)\s*\)'
  - id: cyclic-key-index-reset
    desc: Cyclic decoder key index reset
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)If\s+\w+\s*>\s*UBound\(\w+\)\s+Then\s+\w+\s*=\s*0'
  - id: modulo-key-cycling
    desc: Decoder key cycling via Mod
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?i)Chr\s*\(\s*\w+\(\w+\)\s+Xor\s+\w+\(\w+\s+Mod\s+.{0,24}\)\s*\)'
composite_rules:
  - id: xor-array-payload-reconstruction
    desc: Array payload rebuilt with XOR key
    crit: suspicious
    conf: 0.97
    all:
      - id: array-payload-reconstruction
      - id: xor-array-chr-rebuild
    any:
      - id: cyclic-key-index-reset
      - id: modulo-key-cycling
