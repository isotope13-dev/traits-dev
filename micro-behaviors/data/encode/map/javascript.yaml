defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-string-dict-map
    desc: JavaScript short-string character map
    crit: notable
    conf: 0.8
    size_max: 200000
    for: [javascript, typescript]
    count_min: 31
    unless:
      - id: metadata/package/testing/scripted/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: metadata/library/structure/
      - type: basename
        regex: '\.baseline\.jsonc$'
    if:
      type: text
      regex: '"\w{2,5}"\s*:\s*"(\\x[0-9a-fA-F]{2}|.)"'
  - id: js-nested-array-table-mapping
    desc: Nested array structure used for table mapping
    crit: suspicious
    conf: 0.8
    size_max: 512000
    count_min: 3
    if:
      type: tree-sitter
      language: javascript
      query: |
        (array
          (array)
          (array)
        )
  - id: js-nested-object-table-mapping
    desc: Object mapping string keys to nested arrays
    crit: suspicious
    conf: 0.8
    count_min: 5
    if:
      type: text
      regex: '"\w{1,5}":\s*\[\s*\d+\s*,\s*\[\s*\d+\s*,\s*"\\x[0-9a-fA-F]{2}"\s*\]\s*\]'
