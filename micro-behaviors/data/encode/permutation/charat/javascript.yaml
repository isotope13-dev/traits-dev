defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-permutation-charat-pair
    desc: Multiple charAt calls in close proximity
    crit: suspicious
    conf: 0.9
    size_max: 200000
    count_min: 10
    per_kb_min: 0.5
    if:
      type: text
      regex: \.charAt\([^)]{0,120}\)[^}]{0,120}\.charAt\([^)]{0,120}\)
    unless:
      - id: well-known/lib/google-diff-match-patch/
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      # Linter test corpora (biome useStringStartsEndsWith) ship dense
      # .charAt() fixtures under tests/specs and .snap snapshots.
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: metadata/package/testing/presence/fixture::snapshot-file
