defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-nested-index-array-write
    # `a[b[c]] = d[e]` with identifier indices — an array element written through
    # a computed (indirect) index. A neutral mechanic on its own (permutation /
    # sort / lookup-table fills), so it lives here in micro-behaviors; the
    # objectives `js-scrambled-shard-reassembly` composite pairs it with a base64
    # shard array for the deshuffle obfuscation intent. Identifier-only inner
    # indices skip benign literal access (express `ret.params[pms[0]] = pms[1]`).
    desc: Computed-index array element write
    crit: component
    conf: 0.85
    for: [javascript, typescript, svg, html]
    if:
      type: text
      regex: '[\w$]+\[\s*[\w$]+\[\s*[A-Za-z_$][\w$]*\s*\]\s*\]\s*=\s*[\w$]+\[\s*[A-Za-z_$][\w$]*\s*\]'
composite_rules:
  - id: js-permutation-loop-any
    desc: Nested loops with multiple charAt calls
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/encode/permutation/loop::js-permutation-loop
      - id: micro-behaviors/data/encode/permutation/charat::js-permutation-charat-pair
    unless:
      - id: well-known/lib/google-diff-match-patch/
