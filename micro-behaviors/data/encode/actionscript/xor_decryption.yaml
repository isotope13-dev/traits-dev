defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries]
traits:
  - id: actionscript-writebyte
    desc: ActionScript writeByte call
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: writeByte
    not:
      - substr: '%COMP%'
  - id: actionscript-bytearray
    desc: ActionScript ByteArray usage
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: ByteArray
    not:
      - substr: '%COMP%'
