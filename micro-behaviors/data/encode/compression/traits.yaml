defaults:
  for: [elf, macho, pe]
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: lzma-signature
    desc: Embedded LZMA compressed data
    crit: notable
    conf: 0.95
    attack: T1140
    mbc: C0032
    for: [binaries, scripts]
    if:
      type: text
      substr: $lzma
  - id: lzma-magic-dup
    desc: LZMA magic bytes
    crit: component
    conf: 0.95
    attack: T1140
    if:
      type: hex
      section: .text
      pattern: 5D 00 00 (00|80) 00 FF FF FF FF FF FF FF FF
  - id: brotli-signature
    desc: Brotli compression library
    crit: baseline
    conf: 0.8
    for: [binaries, scripts]
    if:
      type: text
      regex: (?i)(^|[^a-z])brotli([^a-z]|$)
