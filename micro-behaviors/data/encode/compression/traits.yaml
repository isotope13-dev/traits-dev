# Data Compression/Encoding
# Compression and encoding operations
defaults:
  for: [shell, python, javascript, powershell, pe, elf]
  platforms: [windows, linux, macos, ios, android, unix]
traits:
  # === LZMA Compression ===
  - id: lzma-signature
    desc: Embedded LZMA compressed data
    crit: notable
    conf: 0.95
    attack: "T1140"
    mbc: "C0032"
    # Bootloaders use LZMA for firmware/kernel compression; not inherently suspicious
    if:
      type: raw
      substr: "$lzma"
  - id: lzma-magic-dup
    desc: LZMA magic bytes
    crit: component
    conf: 0.95
    attack: "T1140"
    # Bootloaders legitimately use LZMA compression for firmware/kernel payloads
    if:
      type: hex
      section: ".text"
      pattern: "5D 00 00 (00|80) 00 FF FF FF FF FF FF FF FF"
      # === Compression Libraries ===
  - id: zlib-signature
    desc: zlib compression library
    crit: notable
    conf: 0.80
    if:
      type: string_value
      exact: "zlib"
  - id: dunder-import-zlib
    desc: __import__('zlib') dynamic import evasion
    crit: suspicious
    conf: 0.90
    attack: T1027
    mbc: B0032
    for: [python]
    if:
      type: raw
      regex: "__import__\\(['\"]zlib['\"]\\)"
  - id: brotli-signature
    desc: Brotli compression library
    crit: notable
    conf: 0.80
    if:
      type: string_value
      substr: "brotli"
