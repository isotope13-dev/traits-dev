defaults:
  for: [scripts, binaries]
  platforms:
    - windows
    - linux
    - macos
    - ios
    - android
    - unix
traits:
  - id: lzma-signature
    desc: Embedded LZMA compressed data
    crit: notable
    conf: 0.95
    attack: T1140
    mbc: C0032
    if:
      type: text
      substr: $lzma
  - id: lzma-magic-dup
    desc: LZMA magic bytes
    crit: component
    conf: 0.95
    attack: T1140
    if:
      type: hex
      section: .text
      pattern: 5D 00 00 (00|80) 00 FF FF FF FF FF FF FF FF
  - id: zlib-signature
    desc: zlib compression library
    crit: baseline
    conf: 0.8
    if:
      type: text
      exact: zlib
  - id: dunder-import-zlib
    desc: __import__('zlib') dynamic import evasion
    crit: suspicious
    conf: 0.9
    attack: T1027
    mbc: B0032
    for:
      - python
    if:
      type: text
      regex: __import__\(['"]zlib['"]\)
  - id: brotli-signature
    desc: Brotli compression library
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: (?i)(^|[^a-z])brotli([^a-z]|$)
