defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  crit: baseline
  conf: 0.7
traits:
  - id: large-hex-string
    desc: Large hex-encoded string (128+ chars)
    if:
      type: string_value
      regex: '[''"][0-9a-fA-F]{128,}[''"]'
  - id: large-base64-string
    desc: Large base64-encoded string (128+ chars)
    if:
      type: string_value
      regex: '[''"](?:[A-Za-z0-9+/]{42,}[+/]){2,}[A-Za-z0-9+/]{42,}={0,2}[''"]'
  - id: pe-base64-blob
    desc: Embedded PE base64 blob
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: TVqQ[A-Za-z0-9+/=]{256,}
  - id: gzip-base64-blob
    desc: Embedded gzip-base64 payload blob
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: H4sIA[A-Za-z0-9+/=]{192,}
    not:
      - substr: "decompressBytecode("
  - id: repeated-gzip-base64-assignment
    desc: Repeated gzip-base64 assignment wrapper
    crit: suspicious
    conf: 0.93
    count_min: 10
    if:
      type: raw
      regex: var\s+H4sIA[A-Za-z0-9+/=]{200,}=H4sIA[A-Za-z0-9+/=]{200,}
composite_rules:
  - id: large-encoded-blob
    desc: Large encoded data blob in JavaScript
    crit: notable
    conf: 0.75
    any:
      - id: large-hex-string
      - id: large-base64-string
      - id: pe-base64-blob
      - id: gzip-base64-blob
