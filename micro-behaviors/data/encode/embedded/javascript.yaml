# JavaScript Large Encoded Data Blobs
# Detects large hex or base64 encoded strings embedded in JS
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.7
traits:
  - id: large-hex-string
    desc: Large hex-encoded string (128+ chars)
    if:
      type: string
      regex: '[''"][0-9a-fA-F]{128,}[''"]'
  - id: large-base64-string
    desc: Large base64-encoded string (128+ chars)
    if:
      type: string
      regex: '[''"](?:[A-Za-z0-9+/]{42,}[+/]){2,}[A-Za-z0-9+/]{42,}={0,2}[''"]'
composite_rules:
  - id: large-encoded-blob
    desc: Large encoded data blob in JavaScript
    crit: notable
    conf: 0.75
    any:
      - id: large-hex-string
      - id: large-base64-string
