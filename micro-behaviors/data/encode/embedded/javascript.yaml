defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  crit: baseline
  conf: 0.7
traits:
  - id: large-hex-string
    desc: Large hex-encoded string (128+ chars)
    if:
      type: string_literal
      regex: '[''"][0-9a-fA-F]{128,}[''"]'
  - id: large-base64-string
    desc: Large base64-encoded string (128+ chars)
    if:
      type: string_literal
      regex: '[''"]([A-Za-z0-9+/]{42,}[+/]){2,}[A-Za-z0-9+/]{42,}={0,2}[''"]'
  - id: pe-base64-blob
    desc: Embedded PE base64 blob
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: TVqQ[A-Za-z0-9+/=]{256,}
    unless:
      - type: text
        substr: "__wbindgen_placeholder__"
      - id: metadata/file/format::sourcemap-inline-base64
      - id: metadata/library/structure::js-image-data-url
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
  - id: reversed-pe-base64-header
    desc: Reversed PE base64 header
    crit: suspicious
    conf: 0.96
    for: [javascript, powershell]
    size_min: 4096
    if:
      type: text
      regex: MAAQqVT$
  - id: base64-like-comment-content
    desc: JavaScript comment contains Base64-like content
    crit: notable
    conf: 0.94
    for: [javascript]
    if:
      type: tree-sitter
      kind: comment
      regex: '[A-Za-z0-9+/]{40,}={0,2}'
  - id: gzip-base64-blob
    desc: Embedded gzip+base64 blob in script
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: H4sIA[A-Za-z0-9+/=]{192,}
    unless:
      - type: text
        substr: "decompressBytecode("
      - type: text
        substr: "__wbindgen_placeholder__"
  - id: repeated-gzip-base64-assignment
    desc: Repeated gzip-base64 assignment wrapper
    crit: suspicious
    conf: 0.93
    count_min: 10
    if:
      type: text
      regex: var\s+H4sIA[A-Za-z0-9+/=]{200,}=H4sIA[A-Za-z0-9+/=]{200,}
composite_rules:
  - id: large-encoded-blob
    desc: Large encoded data blob in JavaScript
    crit: notable
    conf: 0.75
    unless:
      - id: metadata/file/format::sourcemap-inline-base64
      - id: metadata/library/structure::js-image-data-url
    any:
      - id: large-hex-string
      - id: large-base64-string
      - id: pe-base64-blob
      - id: reversed-pe-base64-header
      - id: gzip-base64-blob
