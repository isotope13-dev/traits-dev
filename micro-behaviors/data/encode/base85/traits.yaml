defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: b85decode-symbol
    desc: Python Base85 decode call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: base64.b85decode
  - id: b85decode-dynamic
    desc: Dynamic Python Base85 decode import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: import__('base64').b85decode
  - id: b85decode-script
    desc: Python Base85 decode call in script
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: symbol
      exact: base64.b85decode
