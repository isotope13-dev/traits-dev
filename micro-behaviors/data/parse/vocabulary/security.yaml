defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.45
traits:
  - id: secret
    desc: Secret vocabulary word
    if:
      type: text
      word: secret
      case_insensitive: true
  - id: credential-field
    desc: Credential field keyword
    conf: 0.84
    if:
      type: text
      regex: '(?i)\b(credential|api[-_]?key)\b'
