defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.45
traits:
  - id: secret
    desc: Secret vocabulary word
    if:
      type: text
      word: secret
      case_insensitive: true
  - id: token-word
    desc: Contains the standalone word token
    if:
      type: text
      word: token
      case_insensitive: true
  - id: credential-field
    desc: Credential field keyword
    conf: 0.84
    if:
      type: text
      regex: '(?i)\b(credential|api[-_]?key)\b'
  # These are neutral source-level observations.  Credential spraying intent
  # is inferred only by the IoT brute-force composite that combines them with
  # a credential map, iteration, and an authentication call.
  - id: go-credential-list-initializer
    desc: Go credential slice initializer
    crit: notable
    conf: 0.94
    for: [go]
    if:
      type: text
      substr: 'credentials = ['
    count_min: 1
  - id: go-login-field-initializer
    desc: Repeated Go login field assignments
    crit: notable
    conf: 0.94
    for: [go]
    if:
      type: text
      substr: 'login = "'
    count_min: 3
  - id: go-password-field-initializer
    desc: Repeated Go password field assignments
    crit: notable
    conf: 0.94
    for: [go]
    if:
      type: text
      substr: 'password = "'
    count_min: 3
  - id: go-setauth-credential-call
    desc: Go SetAuth call with credentials
    crit: notable
    conf: 0.96
    for: [go]
    if:
      type: text
      regex: 'SetAuth\(\s*\w+\.Login\s*,\s*\w+\.Password'
  - id: secret-key-data-name
    desc: Secret key/data field name
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      regex: \bsecret_?(key|data|payload|cmd)\w*\b
      case_insensitive: true
    not:
      - regex: (?i)SecretKey(Selector|Ref|Volume|Source|Spec)
      - regex: (?i)SecretData(Source|Provider|Wrapper)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
