defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.45
traits:
  - id: secret
    desc: Secret vocabulary word
    if:
      type: text
      word: secret
      case_insensitive: true
  - id: credential-field
    desc: Credential field keyword
    conf: 0.84
    if:
      type: text
      regex: '(?i)\b(credential|api[-_]?key)\b'
  - id: secret-key-data-name
    desc: Secret key/data field name
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      regex: \bsecret_?(key|data|payload|cmd)\w*\b
      case_insensitive: true
    not:
      - regex: (?i)SecretKey(Selector|Ref|Volume|Source|Spec)
      - regex: (?i)SecretData(Source|Provider|Wrapper)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
