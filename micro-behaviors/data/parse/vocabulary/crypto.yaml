defaults:
  platforms: [unix, windows]
  for: [scripts, source, binaries]
  crit: component
  conf: 0.8
traits:
  - id: ciphertext-key-vocabulary
    desc: Uses ciphertext, shared-secret, or trailer terms
    if:
      type: text
      regex: '(?i)\b(ciphertext|shared[_-]?secret|encrypted[_-]?trailer)\b'
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
