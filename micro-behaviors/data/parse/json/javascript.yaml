defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: notable
  conf: 0.6

traits:
  - id: parsed-json-main-property
    desc: Parsed JSON .main property access
    if:
      type: text
      regex: JSON\.parse\(.{0,100}\)\.main\b

  - id: json-response-path-content-fields
    desc: Parsed JSON response path/content fields
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'JSON\.parse[\s\S]{0,260}path[\s\S]{0,120}content\s*:'
