# Optical character recognition: turning image pixels into text. Neutral on its
# own (receipt scanners, accessibility tooling, screenshot utilities), but it is
# the step that makes captured screen imagery searchable, so surveillance and
# screen-scraping composites reference these atoms alongside a capture source.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: pytesseract-import
    desc: Imports the pytesseract OCR binding
    if:
      type: import
      regex: '^pytesseract'

  - id: image-to-string-call
    desc: Extracts text from an image with OCR
    if:
      type: symbol
      kind: call
      substr: image_to_string

  - id: image-to-data-call
    desc: Extracts OCR text with per-word confidence
    if:
      type: symbol
      kind: call
      substr: image_to_data

  - id: tesseract-cmd-path
    desc: Sets the Tesseract OCR executable path
    conf: 0.94
    if:
      type: text
      regex: '\btesseract_cmd\s*='

  - id: easyocr-import
    desc: Imports the EasyOCR recognition library
    if:
      type: import
      regex: '^easyocr'

  - id: easyocr-reader-construct
    desc: Constructs an EasyOCR reader
    if:
      type: symbol
      kind: call
      substr: easyocr.Reader
