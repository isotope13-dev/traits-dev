defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.86

traits:
  - id: recursive-descent-expression-parser
    desc: Recursive descent expression parser
    conf: 0.84
    count_min: 4
    if:
      type: text
      regex: 'private function parse(Pipe|Or|And|Comparison|Add|Mul|Unary|Primary)\s*\('

  - id: evaluator-allowlist-constructor
    desc: PHP evaluator allowlist parameter
    crit: component
    conf: 0.84
    if:
      type: text
      substr: 'private array $allowlist = []'

  - id: record-evaluator-allow-checks
    desc: PHP evaluator allowlist check helpers
    crit: component
    conf: 0.84
    count_min: 2
    if:
      type: text
      regex: 'function (isAllowed|assertAllowed)\s*\('

  - id: silverstripe-orm-record-evaluator
    desc: SilverStripe ORM record/list evaluator
    crit: component
    conf: 0.84
    count_min: 2
    if:
      type: text
      regex: 'SilverStripe\\ORM\\Data(List|Object)'

composite_rules:
  - id: allowlisted-record-expression-evaluator
    desc: Allowlisted record expression evaluator
    crit: notable
    conf: 0.9
    all:
      - id: evaluator-allowlist-constructor
      - id: record-evaluator-allow-checks
      - id: silverstripe-orm-record-evaluator
