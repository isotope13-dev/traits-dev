defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]

traits:
- id: tiktok-hydration-state-marker
  desc: TikTok embedded hydration JSON marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: __UNIVERSAL_DATA_FOR_REHYDRATION__

- id: tiktok-sigi-state-marker
  desc: TikTok SIGI state JSON marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: SIGI_STATE

- id: dom-body-text-substring
  desc: Reads rendered DOM text
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'document\.body\.innerText\.substring\s*\('

- id: browser-document-html-snapshot-read
  desc: Reads complete page HTML snapshot
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: 'document\.documentElement\.outerHTML\b'

composite_rules:
- id: tiktok-hydration-json-parse
  desc: Parses TikTok embedded hydration state
  crit: notable
  conf: 0.95
  near_bytes: 1200
  any:
  - id: tiktok-hydration-state-marker
  - id: tiktok-sigi-state-marker
  all:
  - id: micro-behaviors/data/serialize/json::json-parse-call
