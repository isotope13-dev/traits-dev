defaults:
  platforms:
    - unix
    - windows
  for: [scripts, python, pyc, binaries]
traits:
  - id: parse-pattern
    desc: Parses Roblox cookie string (COOK::<...>)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: COOK::<
  - id: split-logic
    desc: Splits string by Roblox cookie delimiter
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: \.split\(['"]COOK::<['"]\)
