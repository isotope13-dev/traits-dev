# Payment-field handling is neutral application behavior. Theft intent requires
# an exfiltration composite in objectives/credential-access/.
defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll, macho, elf]
  crit: notable

traits:
  - id: managed-card-number-field
    desc: Payment-card number field reference
    conf: 0.75
    if:
      type: text
      regex: '(?i)\bcard[-_. ]?number\b'
    unless:
      - id: metadata/library/generated-fhir::generated-fhir-schema-data
      - id: metadata/library/qt::pyqt-binding-path
  - id: managed-cvv-field
    desc: Payment-card CVV or CVC field
    conf: 0.75
    if:
      type: text
      regex: '(?i)(^|[^A-Za-z0-9_])["'']?cv[vc]2?["'']?[[:space:]]*[:=]'
    unless:
      - id: metadata/library/generated-fhir::generated-fhir-schema-data
      - id: metadata/library/qt::pyqt-binding-path
  - id: managed-card-type-field
    desc: Payment-card type field reference
    conf: 0.7
    if:
      type: text
      regex: '(?i)\bcard[-_. ]?type\b'
    unless:
      - id: metadata/library/generated-fhir::generated-fhir-schema-data
      - id: metadata/library/qt::pyqt-binding-path
  - id: managed-card-expiry-field
    desc: Payment-card expiration field reference
    conf: 0.75
    if:
      type: text
      regex: '(?i)\bcard[-_. ]?(expir(ation|y)[-_. ]?date|expiry)\b'
    unless:
      - id: metadata/library/generated-fhir::generated-fhir-schema-data
      - id: metadata/library/qt::pyqt-binding-path

composite_rules:
  - id: managed-card-data-fields
    desc: Card number and expiry handled together
    crit: notable
    conf: 0.85
    all:
      - id: managed-card-number-field
      - id: managed-card-expiry-field
    near_bytes: 2048
