defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: payment-card-network-major
    desc: Payment-card network name in source
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)\b(UnionPay|Visa|Mastercard)\b'
  - id: payment-card-network-amex
    desc: American Express card name in source
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)\b(American[ _-]?Express|Amex)\b'
  - id: credit-card-candidate-pattern
    desc: Credit-card terminology or candidate pattern
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)(_CC_CANDIDATE_RE|credit[ _-]?card|card[ _-]?number)'
  - id: redaction-logic-marker
    desc: Sensitive-value redaction logic marker
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b(redact|redacted|scrub)\w*\b'
composite_rules:
  - id: payment-card-network-marker
    desc: Payment-card network name in source
    crit: notable
    conf: 0.82
    any:
      - id: payment-card-network-major
      - id: payment-card-network-amex
  - id: payment-card-redaction-logic
    desc: Payment-card redaction and validation logic
    crit: notable
    conf: 0.93
    all:
      - id: payment-card-network-marker
      - id: credit-card-candidate-pattern
      - id: redaction-logic-marker
    near_lines: 120
