---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: botnet-term-reference
  desc: Botnet terminology reference
  crit: component
  conf: 0.6
  for: [elf, pe, shell, python, javascript, typescript, c, go]
  if:
    type: text
    regex: '\bbot[_.\s-]?net\b'
    case_insensitive: true
- id: scanner-word
  desc: lexer/scanner parser-tool term
  crit: component
  for:
  - elf
  - pe
  - shell
  - python
  if:
    type: text
    word: scanner
    case_insensitive: true
  unless:
  - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers::linux-driver-core-library-basename
  - id: well-known/app/drivers::linux-driver-gl-library-basename
