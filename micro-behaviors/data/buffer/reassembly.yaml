defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: buffer-identifier
    desc: Node Buffer identifier reference
    crit: component
    conf: 0.3
    if:
      type: string_literal
      substr: Buffer
  - id: offset-write
    desc: Writing data to buffer at calculated offset
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: '\[[a-zA-Z0-9_]+\s*\+\s*[a-zA-Z0-9_]+\]\s*=\s*[^"''\s]'
  - id: buffer-alloc-large
    desc: Allocating a large buffer (64KB+)
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: 'Buffer\.alloc\(0xffff\)|Buffer\.alloc\(65535\)'
  - id: node-buffer-uint32le-writes
    desc: Multiple Node Buffer UInt32LE writes
    crit: baseline
    conf: 0.78
    count_min: 4
    if:
      type: text
      regex: '\.writeUInt32LE\s*\('
  - id: module-exports-buffer-storage
    desc: 'module exports buffer storage'
    crit: suspicious
    conf: 0.8
    # `module.exports.<prop> = ... Buffer.alloc|from(...)` — persisting a buffer
    # on the module exports (covers both the direct and `x + Buffer.alloc()`
    # binary-expression forms). The `module.exports.` prefix anchors it.
    if:
      type: text
      regex: 'module\.exports\.\w+\s*=[^;\n]{0,120}Buffer\.(alloc|from)\b'
