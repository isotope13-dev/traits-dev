# Go bytes.Buffer Operations
# Neutral Go standard library buffer I/O
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [go, elf, macho, pe]
  crit: baseline
traits:
  - id: go-bytes-buffer-io
    desc: Go bytes.Buffer I/O
    conf: 0.7
    count_min: 2
    if:
      type: string_value
      regex: '\.(ReadFrom|WriteTo)'
  - id: go-bytes-buffer-methods
    desc: Go bytes.Buffer methods
    conf: 0.7
    count_min: 3
    if:
      type: string_value
      regex: '\.(ReadByte|WriteByte|WriteString)\b'
