defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: buffer-from-call
    desc: Calls Buffer.from at least three times
    crit: notable
    conf: 0.4
    count_min: 3
    if:
      type: string_literal
      substr: Buffer.from

  - id: uint8array-from
    desc: Constructs byte array from iterable
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: Uint8Array.from
