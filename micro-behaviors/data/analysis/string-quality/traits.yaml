# String Analysis Heuristics
# Detects string quality filtering logic
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: alphanumeric-ratio-check
    desc: "Checks alphanumeric character ratio in string"
    crit: notable
    conf: 0.7
    for: [python]
    if:
      type: raw
      regex: 'sum\([^)]{0,120}isalnum'
