defaults:
  platforms: [unix, windows]
  for: [go]

traits:
  - id: go-procedure-struct
    desc: Go procedure struct
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: "type Procedure struct {"

  - id: yaml-mode-field
    desc: YAML mode field
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: '`yaml:"mode" json:"mode"`'

  - id: yaml-data-field
    desc: YAML data field
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: '`yaml:"data" json:"data"`'

  - id: command-instruction-set-struct
    desc: Command instruction set struct
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: "type CommandInstructionSet struct {"

  - id: yaml-procedures-field
    desc: YAML procedures field
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: '`yaml:"procedures" json:"procedures"`'

  - id: yaml-run-field
    desc: YAML run field
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: '`yaml:"run,omitempty" json:"run,omitempty"`'

  - id: restart-run-mode-constant
    desc: Restart run mode constant
    crit: component
    conf: 0.88
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: 'RunModeRestart    RunMode = "restart"'

  - id: persistent-run-mode-constant
    desc: Persistent run mode constant
    crit: component
    conf: 0.88
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: 'RunModePersistent RunMode = "persistent"'

  - id: env-expanded-yaml-config
    desc: Environment expanded YAML config
    crit: notable
    conf: 0.86
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      regex: 'os\.ExpandEnv\(string\(file\)\)[\s\S]{0,180}yaml\.Unmarshal'

composite_rules:
  - id: yaml-command-procedure-schema
    desc: YAML command procedure schema
    crit: notable
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    near_lines: 12
    all:
      - id: go-procedure-struct
      - id: yaml-mode-field
      - id: yaml-data-field

  - id: yaml-command-run-mode-schema
    desc: YAML command run mode schema
    crit: notable
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    near_lines: 12
    all:
      - id: command-instruction-set-struct
      - id: yaml-procedures-field
      - id: yaml-run-field

  - id: persistent-restart-run-modes
    desc: Persistent restart run modes
    crit: notable
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    near_lines: 8
    all:
      - id: restart-run-mode-constant
      - id: persistent-run-mode-constant
