defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: javascript-development-secret-config
    desc: JavaScript development secret config fields
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?s)\bDEV_API_KEY\s*:[\s\S]{0,100}\bDEV_SECRET_KEY\s*:[\s\S]{0,100}\bDEV_SECRET_VALUE\s*:'
