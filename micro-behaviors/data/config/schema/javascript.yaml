defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  # VS Code configuration reads are neutral mechanics.  Telegram control
  # intent is inferred only when these settings are combined with a Telegram
  # transport and command-handling context.
  - id: javascript-telegram-bot-setting-read
    desc: JavaScript reads Telegram bot settings
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: config.get
      arg:
        kind: string
        regex: '^telegram(BotToken|ChatId)$'

  - id: javascript-telegram-opt-in-setting-read
    desc: JavaScript reads Telegram opt-in setting
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: config.get
      arg:
        kind: string
        exact: telegramEnabled

  - id: javascript-development-secret-config
    desc: JavaScript development secret config fields
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?s)\bDEV_API_KEY\s*:[\s\S]{0,100}\bDEV_SECRET_KEY\s*:[\s\S]{0,100}\bDEV_SECRET_VALUE\s*:'

  # These are weak configuration fragments.  Keep them neutral and only use
  # them as supporting evidence for the stronger Node remote-agent composite.
  - id: javascript-relay-control-config-key
    desc: JavaScript relay or control config key
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      regex: '\b(relay|c2|control)[_-][a-z][a-z0-9_-]*\b'
      case_insensitive: true
    not:
      - regex: '(?i)^access-control-'

  - id: javascript-admin-secret-config-key
    desc: JavaScript admin or secret config key
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      regex: '\b(admin|secret|private)[_-][a-z][a-z0-9_-]*\b'
      case_insensitive: true
    not:
      - regex: '(?i)^access-control-'

  - id: javascript-privilege-state-config-key
    desc: JavaScript privilege-state config key
    crit: component
    conf: 0.8
    if:
      type: literal
      kind: string
      regex: '\b(privilege|elevat[a-z]*)[_-][a-z][a-z0-9_-]*\b'
      case_insensitive: true
