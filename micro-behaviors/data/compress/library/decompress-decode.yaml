# Neutral runtime-decompression capabilities for script/source languages.
# Decompressing data and decoding it to text is ordinary program behavior (cache
# loaders, config readers, asset pipelines all do it); these atoms carry no
# intent on their own and exist as building blocks for objective composites.
defaults:
  platforms: [linux, macos, windows]
  for: [scripts]
  conf: 0.9

traits:
  # A decompression call whose result is immediately decoded to text
  # (`<lib>.decompress(...).decode()`). Covers python zlib/gzip/bz2/lzma in one
  # short pattern. Neutral: legitimate code decodes decompressed bytes constantly.
  - id: decompress-decoded-to-text
    desc: Decompressed bytes decoded to text
    crit: notable
    if:
      type: text
      regex: 'decompress\s*\(.{0,160}\)\s*\.decode\b'

composite_rules:
  # Any runtime decompression call in a script/source host. Groups the
  # language-specific decompression symbols (which are themselves gated to
  # compiled-language hosts via the `zlib-decompress` aggregator) so script-host
  # composites have a single neutral decompression leg to reference.
  - id: script-decompress-call
    desc: Runtime decompression call
    crit: component
    any:
      - id: zlib-decompress-symbol
      - id: gzip-decompress-call
      - id: ruby-zlib-inflate
