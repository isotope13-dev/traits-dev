# Go Compression Operations
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [windows, unix]
  for: [go]
traits:
  - id: go-gzip-reader
    desc: Go gzip.NewReader decompression
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: gzip.NewReader
  - id: go-gzip-writer
    desc: Go gzip.NewWriter compression
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: gzip.NewWriter
