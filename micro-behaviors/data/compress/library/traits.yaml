defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [c, cpp, rust, go, pe, elf, macho, wasm]
traits:
  - id: liblzma
    desc: liblzma library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: liblzma
    unless:
      - type: basename
        regex: '^liblzma\.so\.5\.4\.5$'
  - id: lzma-prefix
    desc: lzma_ function prefix
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \blzma_
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - type: basename
        regex: '^liblzma\.so\.5\.4\.5$'
  - id: lzmaenc
    desc: LzmaEnc SDK function
    crit: component
    conf: 0.9
    if:
      type: text
      word: LzmaEnc
  - id: lzmadec
    desc: References the LZMA SDK LzmaDec routine
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: LzmaDec
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: lzma-ok
    desc: LZMA_OK status
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: LZMA_OK
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: deflate
    desc: References the zlib deflate routine
    crit: notable
    conf: 0.8
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      exact: deflate
  - id: inflate
    desc: References the zlib inflate routine
    crit: notable
    conf: 0.8
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      exact: inflate
  - id: zlib-adler32-binary
    desc: Zlib adler32 fast-division constant (x64)
    crit: notable
    conf: 0.7
    arch: [x86-64]
    for: [pe, dll, elf, so]
    if:
      type: hex
      section: .text
      pattern: B8 85 10 42 08 41 F7 E2
  - id: z-stream
    desc: z_stream type
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: z_stream
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: zlib-decompress-symbol
    desc: zlib.decompress symbol
    crit: notable
    conf: 0.9
    for: [python, pyc]
    if:
      type: symbol
      exact: zlib.decompress
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: zlib-compress-symbol
    desc: Compresses data with Python zlib.compress()
    crit: notable
    conf: 0.9
    for: [python, pyc]
    if:
      type: symbol
      exact: zlib.compress
  - id: zlib-decompress-dynamic
    desc: zlib.decompress dynamic import
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      exact: import__('zlib').decompress
  - id: ruby-zlib-inflate
    desc: Decompresses data with Ruby Zlib.inflate
    crit: notable
    conf: 0.92
    for: [ruby]
    if:
      type: text
      substr: Zlib::Inflate.inflate
  - id: bz2-compress
    desc: BZ2_bzCompress function
    crit: notable
    conf: 0.9
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      regex: BZ2_bzCompress
  - id: bz2-decompress
    desc: BZ2_bzDecompress function
    crit: notable
    conf: 0.9
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      regex: BZ2_bzDecompress
  - id: libbz2
    desc: libbz2 library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: libbz2
  - id: bzip2-string
    desc: bzip2 string
    crit: component
    conf: 0.8
    for: [scripts, binaries, -php]
    count_min: 2
    if:
      type: text
      regex: (?i)\bbzip2\b
    not:
      - regex: application/x-bzip2?
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/script/
      - id: metadata/file/extension/identity::uninstaller-exe-basename
  - id: zstd-compress
    desc: ZSTD_compress function
    crit: notable
    conf: 0.9
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      regex: ZSTD_compress
  - id: zstd-decompress
    desc: ZSTD_decompress function
    crit: notable
    conf: 0.9
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      regex: ZSTD_decompress
  - id: go-zstd-decoder-pclntab
    desc: Go binary includes Zstandard decoder methods
    crit: notable
    conf: 0.9
    for: [pe, elf, macho]
    if:
      type: text
      substr: 'compress/zstd.(*Decoder)'
  - id: zstd-cctx
    desc: ZSTD_CCtx type
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ZSTD_CCtx
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: libzstd
    desc: libzstd library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: libzstd
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: lz4-compress
    desc: LZ4_compress function
    crit: notable
    conf: 0.9
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      regex: LZ4_compress
  - id: lz4-decompress
    desc: LZ4_decompress function
    crit: notable
    conf: 0.9
    for: [pe, elf, macho, dll]
    if:
      type: symbol
      regex: LZ4_decompress
  - id: liblz4
    desc: liblz4 library
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: liblz4
  - id: zlib-signature
    desc: zlib compression library reference
    crit: baseline
    conf: 0.8
    for: [binaries, scripts]
    if:
      type: text
      exact: zlib
  - id: zlib-dynamic-import
    desc: Python zlib dynamic import
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?m)^[ \t]*[^#\n].{0,160}__import__\(\s*["'']zlib["'']\s*\)'
  - id: lzstring-utf16-decompress
    desc: Decompresses UTF-16 data with LZString
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    platforms: [unix, windows]
    if:
      type: text
      regex: '\bLZString\s*\.\s*decompressFromUTF16\s*\('
composite_rules:
  - id: lzma
    desc: LZMA/XZ compression library
    crit: notable
    conf: 0.9
    any:
      - id: liblzma
      - id: lzma-prefix
      - id: lzmaenc
      - id: lzmadec
      - id: lzma-ok
  - id: zlib
    desc: Zlib compression library
    crit: notable
    conf: 0.9
    any:
      - id: zlib-deflate-inflate
      - id: z-stream
      - id: zlib-adler32-binary
      - id: zlib-signature
  - id: zlib-deflate-inflate
    desc: Zlib deflate and inflate
    crit: notable
    conf: 0.9
    all:
      - id: deflate
      - id: inflate
  - id: zlib-decompress
    desc: zlib.decompress call
    crit: notable
    conf: 0.9
    any:
      - id: zlib-decompress-symbol
      - id: zlib-decompress-dynamic
      - id: ruby-zlib-inflate
  - id: bzip2-comp
    desc: Bzip2 compression library
    crit: notable
    conf: 0.9
    any:
      - id: bz2-compress
      - id: bz2-decompress
      - id: libbz2
      - id: bzip2-string
  - id: zstd-comp
    desc: Zstandard compression library
    crit: notable
    conf: 0.9
    any:
      - id: zstd-compress
      - id: zstd-decompress
      - id: zstd-cctx
      - id: libzstd
  - id: lz4
    desc: LZ4 compression library
    crit: notable
    conf: 0.9
    any:
      - id: lz4-compress
      - id: lz4-decompress
      - id: liblz4
