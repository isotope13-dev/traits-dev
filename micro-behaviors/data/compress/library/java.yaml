# Java Compression Operations
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: gzip-inputstream
    desc: Java GZIPInputStream class
    crit: component
    if:
      type: string_value
      substr: "java/util/zip/GZIPInputStream"
  - id: bytearrayinputstream
    desc: Java ByteArrayInputStream class
    crit: component
    if:
      type: string_value
      substr: "java/io/ByteArrayInputStream"
composite_rules:
  - id: gzip-decompress
    desc: Java GZIP in-memory decompression
    crit: notable
    conf: 0.85
    all:
      - id: gzip-inputstream
      - id: bytearrayinputstream
