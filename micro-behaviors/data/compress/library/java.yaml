defaults:
  platforms:
    - unix
    - windows
  for:
    - java
    - class
    - jar
    - zip
traits:
  - id: jvm-util-zip-class-ref
    desc: JVM ZIP package reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/util/zip(/|$)'
  - id: gzip-inputstream
    desc: Java GZIPInputStream class
    crit: component
    if:
      type: text
      substr: java/util/zip/GZIPInputStream
  - id: bytearrayinputstream
    desc: Java ByteArrayInputStream class
    crit: component
    if:
      type: text
      substr: java/io/ByteArrayInputStream
composite_rules:
  - id: gzip-decompress
    desc: Java GZIP in-memory decompression
    crit: notable
    conf: 0.85
    all:
      - id: gzip-inputstream
      - id: bytearrayinputstream
