defaults:
  platforms: [windows]
  for: [data]
  crit: notable
  conf: 0.88

traits:
  - id: powershell-data-deflatestream
    desc: DeflateStream reference in data
    if:
      type: text
      substr: DeflateStream
      case_insensitive: true
  - id: powershell-data-compressionmode-decompress
    desc: CompressionMode decompress in data
    if:
      type: text
      regex: '(?i)CompressionMode\]::\s*Decompress|CompressionMode\.Decompress'
  - id: powershell-data-streamreader-readtoend
    desc: StreamReader ReadToEnd in data
    if:
      type: text
      regex: '(?i)StreamReader.{0,160}ReadToEnd|ReadToEnd.{0,160}StreamReader'

composite_rules:
  - id: powershell-data-deflate-decompress
    desc: PowerShell data Deflate decompression
    crit: notable
    conf: 0.92
    all:
      - id: powershell-data-deflatestream
      - id: powershell-data-compressionmode-decompress
