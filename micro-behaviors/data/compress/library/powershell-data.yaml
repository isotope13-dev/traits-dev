defaults:
  platforms: [windows]
  for: [data, powershell]
  crit: notable
  conf: 0.88

traits:
  - id: powershell-gzipstream
    desc: PowerShell GzipStream reference
    if:
      type: text
      regex: '(?i)\bGZipStream\b'
  - id: powershell-data-deflatestream
    desc: PowerShell DeflateStream reference
    if:
      type: text
      substr: DeflateStream
      case_insensitive: true
  - id: powershell-data-compressionmode-decompress
    desc: PowerShell decompression mode
    if:
      type: text
      regex: '(?i)CompressionMode\]::\s*Decompress|CompressionMode\.Decompress'
  - id: powershell-data-streamreader-readtoend
    desc: PowerShell StreamReader ReadToEnd
    if:
      type: text
      regex: '(?i)StreamReader.{0,160}ReadToEnd|ReadToEnd.{0,160}StreamReader'

composite_rules:
  - id: powershell-data-deflate-decompress
    desc: PowerShell Deflate decompression
    crit: notable
    conf: 0.92
    all:
      - id: powershell-data-deflatestream
      - id: powershell-data-compressionmode-decompress
  - id: gzip-decompress-to-text
    desc: PowerShell gzip decompresses text
    crit: notable
    conf: 0.92
    all:
      - id: powershell-gzipstream
      - id: powershell-data-compressionmode-decompress
