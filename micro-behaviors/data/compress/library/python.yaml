# Python Compression Operations
# MBC: C0024 (Data Transformation)
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: gzip-open-call
    desc: Python gzip.open call
    crit: component
    conf: 0.9
    if:
      type: symbol
      substr: "gzip.open"
  - id: gzip-decompress-call
    desc: Python gzip.decompress call
    crit: component
    conf: 0.9
    if:
      type: symbol
      substr: "gzip.decompress"
  - id: gzip-compress-call
    desc: Python gzip.compress call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "gzip.compress"
  - id: tarfile-open-call
    desc: Python tarfile.open call
    # Opening a tar archive is mundane I/O (mirrors gzip-open-call) — a building
    # block, not a standalone signal. Intent comes from composites that pair it
    # with transport/exfil context (e.g. ssh/transfer::scp-tar-sync).
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'tarfile\.open'
composite_rules:
  - id: gzip-read-operation
    desc: Reads gzip compressed data
    crit: notable
    conf: 0.85
    any:
      - id: gzip-open-call
      - id: gzip-decompress-call
