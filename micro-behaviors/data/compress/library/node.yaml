defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: node-zlib-import
    desc: Imports the Node.js zlib module
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: "require\\(.{0,48}zlib"
  - id: node-gzip-function
    desc: Node gzip compression call
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/library/runtime/
      - id: metadata/library/structure/
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(gzip|gzipSync)$'
  - id: node-gunzip-function
    desc: Node gunzip decompression call
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: member
      regex: '(^|\.)gunzip(Sync)?$'
  - id: node-gzip-stream-obfuscated
    desc: Obfuscated Node gzip stream creation
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "zlib_\\d+\\[.{1,40}\\]\\[.{1,40}\\+'ip'\\]"
  - id: node-gzip-temp-output
    desc: Gzip output written to temp file
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: "Date\\[.{1,40}\\]\\(\\).{0,80}createWriteStrea"
composite_rules:
  - id: node-compression-library
    desc: Node.js compression library usage
    crit: notable
    conf: 0.82
    any:
      - id: node-zlib-import
      - id: node-gzip-functions
  - id: node-gzip-functions
    desc: Node gzip or gunzip calls
    crit: notable
    conf: 0.8
    any:
      - id: node-gzip-function
      - id: node-gunzip-function
  - id: node-gzip-stream-archive
    desc: Node gzip stream archive creation
    crit: notable
    conf: 0.88
    any:
      - id: node-gzip-stream-obfuscated
      - id: node-gzip-temp-output
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
