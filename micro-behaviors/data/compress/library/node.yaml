defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: node-zlib-import
    desc: Node zlib module import
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: "require\\(.{0,48}zlib"
  - id: node-gzip-function
    desc: Node gzip compression function
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/library/runtime::next-edge-runtime-bundle
    if:
      type: string_literal
      exact: gzip
  - id: node-gunzip-function
    desc: Node gunzip decompression function
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: gunzip
  - id: node-gzip-stream-obfuscated
    desc: Obfuscated Node gzip stream creation
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "zlib_\\d+\\[.{1,40}\\]\\[.{1,40}\\+'ip'\\]"
  - id: node-gzip-temp-output
    desc: Gzip output written to temp file
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: "Date\\[.{1,40}\\]\\(\\).{0,80}createWriteStrea"
composite_rules:
  - id: node-gzip-functions
    desc: Node gzip or gunzip function
    crit: notable
    conf: 0.8
    any:
      - id: node-gzip-function
      - id: node-gunzip-function
  - id: node-gzip-stream-archive
    desc: Node gzip stream archive creation
    crit: notable
    conf: 0.88
    any:
      - id: node-gzip-stream-obfuscated
      - id: node-gzip-temp-output
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
