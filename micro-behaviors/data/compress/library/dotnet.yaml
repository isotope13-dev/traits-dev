# .NET Compression Library (System.IO.Compression)
# GZipStream used for data packing in RATs and droppers
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: gzipstream-dotnet
    desc: .NET GZipStream compression class reference
    crit: component
    conf: 0.8
    count_min: 2
    if:
      type: text
      exact: GZipStream
  - id: system-io-compression
    desc: System.IO.Compression namespace reference
    crit: component
    conf: 0.75
    if:
      type: text
      exact: System.IO.Compression
composite_rules:
  - id: dotnet-gzip-compression
    desc: .NET GZip compression via System.IO.Compression
    crit: notable
    conf: 0.85
    all:
      - id: gzipstream-dotnet
      - id: system-io-compression
