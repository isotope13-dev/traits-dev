defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  conf: 0.9

traits:
  - id: gzuncompress-call
    desc: PHP zlib uncompress call
    if:
      type: symbol
      exact: gzuncompress

  - id: gzinflate-call
    desc: PHP zlib inflate call
    if:
      type: symbol
      exact: gzinflate

  - id: gzdecode-call
    desc: PHP gzip decode call
    if:
      type: symbol
      exact: gzdecode
