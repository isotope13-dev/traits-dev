defaults:
  for: [csharp]
  platforms: [windows, unix, macos]
traits:
  - id: deflatestream
    desc: DeflateStream decompression API
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: DeflateStream
  - id: compressionmode-decompress
    desc: CompressionMode.Decompress selection
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: CompressionMode.Decompress
  - id: sharpziplib-inflaterinputstream
    desc: SharpZipLib inflater stream
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: InflaterInputStream
composite_rules:
  - id: dotnet-deflate-decompress
    desc: .NET Deflate decompression
    crit: notable
    conf: 0.9
    all:
      - id: deflatestream
      - id: compressionmode-decompress
