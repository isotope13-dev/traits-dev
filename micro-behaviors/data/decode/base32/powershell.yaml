defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1140
  mbc: C0053

traits:
  - id: ps-custom-base32-alphabet
    desc: PowerShell custom base32 alphabet
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ABCDEFGHIJKLMNOPQRSTUVWXYZ234789
  - id: ps-custom-base32-carrier
    desc: Large custom-base32 PowerShell carrier
    crit: notable
    conf: 0.98
    size_min: 100000
    if:
      type: text
      regex: '(?m)^\s*\$[A-Za-z_][A-Za-z0-9_]*\s*=\s*["''][A-Z234789=]+["'']\s*$'
  - id: ps-base32-bit-accumulator
    desc: PowerShell base32 bit accumulator
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\$buffer\s*=\s*\(\$buffer\s*-shl\s*5\)[\s\S]{0,100}\$bitsLeft\s*\+=\s*5'
  - id: ps-base32-byte-unpack
    desc: PowerShell base32 byte unpacking
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\$bitsLeft\s*-ge\s*8[\s\S]{0,220}-shr\s*\$bitsLeft[\s\S]{0,120}-band\s*0xFF'

composite_rules:
  - id: ps-custom-base32-decoder
    desc: PowerShell custom base32 decoder
    crit: notable
    conf: 0.97
    all:
      - id: ps-custom-base32-alphabet
      - id: ps-base32-bit-accumulator
      - id: ps-base32-byte-unpack
