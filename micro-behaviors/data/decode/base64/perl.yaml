# Base64 Decoding — Perl
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix]
  for: [perl]
traits:
  - id: decode-base64-call
    desc: MIME::Base64 decode_base64 (Perl)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: decode_base64
  - id: mime-base64-import
    desc: use MIME::Base64 (Perl)
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: "use\\s+MIME::Base64"
  - id: perl-base64-bit-decoder
    desc: Perl bitwise Base64 decoder
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "sprintf\\('%06b'"
