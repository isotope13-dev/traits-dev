# Generic PHP base64_decode capability. base64_decode() is recovered as a
# structured call fact regardless of argument shape, so a symbol/call match is
# both precise and broad — unlike the class-constant regexes in
# php-runtime.yaml, which only catch the webshell-specific `self::CONST` form.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: C0053
traits:
  - id: php-base64-decode-call
    desc: Calls PHP base64_decode()
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: base64_decode
