# Base64 Decoding — Shell
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows, macos]
  for: [shell]
traits:
  - id: base64-d-cmd
    desc: base64 -d decode command
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: "base64 -d"
  - id: base64-decode-cmd
    desc: base64 --decode command
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: "base64 --decode"
composite_rules:
  - id: base64-decode-shell
    desc: Shell base64 decode command
    crit: notable
    conf: 0.6
    any:
      - id: base64-d-cmd
      - id: base64-decode-cmd
