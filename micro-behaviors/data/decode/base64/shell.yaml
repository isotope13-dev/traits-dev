defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: base64-d-cmd
    desc: base64 -d/-D decode command
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: 'base64\s+-(d|D)'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script

  - id: base64-decode-cmd
    desc: base64 --decode command
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: 'base64 --decode'
    unless:
      - id: metadata/package/files/system-package::shell-completion-script

  - id: base64-tool
    desc: base64 tool reference
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      exact: base64

  - id: base64-pipe-perl-decrypt
    desc: Base64 decode piped to Perl decryption
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: base64\s+--?de?c?o?d?e?\s*\|\s*perl\s+-e

composite_rules:
  - id: base64-decode-shell
    desc: Shell base64 decode command
    crit: notable
    conf: 0.6
    any:
      - id: base64-d-cmd
      - id: base64-decode-cmd
