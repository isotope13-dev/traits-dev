defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: base64-d-cmd
    desc: base64 -d decode command
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: base64 -d
  - id: base64-decode-cmd
    desc: base64 --decode command
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: base64 --decode
  - id: base64-tool
    desc: base64 tool reference
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      word: base64
  - id: base64-pipe-perl-decrypt
    desc: Base64 decode piped to Perl decryption
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: base64\s+--?de?c?o?d?e?\s*\|\s*perl\s+-e
composite_rules:
  - id: base64-decode-shell
    desc: Shell base64 decode command
    crit: notable
    conf: 0.6
    any:
      - id: base64-d-cmd
      - id: base64-decode-cmd
