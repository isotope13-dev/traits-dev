defaults:
  platforms: [unix, windows]

traits:
  - id: double-base64-decode
    desc: Shell decodes data through two Base64 stages
    crit: suspicious
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: '\|\s*base64\s+(-d|--decode)\b.{0,50}\|\s*base64\s+(-d|--decode)\b'
    unless:
      - id: well-known/tool/detection/clawker::adversarial-payload-fixture
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/quality/source::konk-certificate-repair-script-context
