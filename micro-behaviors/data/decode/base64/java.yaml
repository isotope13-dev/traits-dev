defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]

traits:
  - id: java-base64-decoder-class
    desc: JVM Base64 decoder class reference
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: java/util/Base64$Decoder
  - id: java-base64-decoder-bytecode-call
    desc: Java Base64 decoder accessor call
    crit: notable
    conf: 0.94
    if:
      type: import
      exact: java/util/Base64.getDecoder
  - id: java-base64-url-decoder-bytecode-call
    desc: Java URL-safe Base64 decoder accessor call
    crit: notable
    conf: 0.94
    if:
      type: import
      exact: java/util/Base64.getUrlDecoder
  - id: java-base64-decode-bytecode-call
    desc: Java Base64 decode call
    crit: notable
    conf: 0.96
    if:
      type: import
      exact: java/util/Base64$Decoder.decode

composite_rules:
  - id: java-base64-decoding-bytecode
    desc: Java bytecode Base64 decoding
    crit: notable
    conf: 0.94
    scope: leaf
    all:
      - id: java-base64-decode-bytecode-call
    any:
      - id: java-base64-decoder-bytecode-call
      - id: java-base64-url-decoder-bytecode-call
    needs: 1
