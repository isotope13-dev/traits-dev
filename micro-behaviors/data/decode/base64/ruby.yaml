# Base64 Decoding — Ruby
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
traits:
  - id: ruby-require-base64
    desc: Ruby imports the Base64 library
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: require
      arg:
        kind: string
        exact: base64
  - id: base64-decode
    desc: Ruby Base64 decode
    conf: 0.90
    if:
      type: text
      regex: "Base64\\.(decode64|urlsafe_decode64|strict_decode64)"
  - id: base64-urlsafe-decode
    desc: Ruby urlsafe Base64 decode
    conf: 0.90
    if:
      type: text
      regex: "Base64\\.urlsafe_decode64"
  - id: decode64-symbol
    desc: decode64 symbol call (Ruby)
    conf: 0.88
    if:
      type: symbol
      exact: "decode64"
