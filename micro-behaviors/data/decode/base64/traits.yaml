# Base64 Decoding — Cross-platform traits and composites
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
traits:
  - id: multiple-base64-string-embeddings
    desc: Multiple Base64 string embeddings
    crit: notable
    conf: 0.75
    for: [elf, shell]
    if:
      type: metrics
      field: strings.base64_candidates
      min: 3
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: dotnet-frombase64string-text
    desc: .NET FromBase64String method reference
    crit: notable
    conf: 0.9
    for: [powershell, batch, vbs, html, csharp, pe, dll]
    if:
      type: text
      substr: FromBase64String
  - id: dotnet-frombase64string-data
    desc: .NET FromBase64String in data
    crit: notable
    conf: 0.9
    for: [data]
    if:
      type: text
      substr: FromBase64String
      case_insensitive: true
  - id: dotnet-frombase64string-obfuscated-data
    desc: Obfuscated FromBase64String in data
    crit: suspicious
    conf: 0.94
    for: [data]
    if:
      type: text
      regex: '(?i)f`?r`?o`?m`?b`?a`?s`?e`?6`?4`?s`?t`?r`?i`?n`?g'
  - id: encoded-dotnet-frombase64string-text
    desc: Encoded .NET FromBase64String reference
    crit: notable
    conf: 0.9
    for: [powershell, batch, vbs, html, csharp, pe, dll]
    if:
      type: encoded
      encoding: base64
      substr: FromBase64String
  - id: nim-base64-decoder-symbol
    desc: Nim stdlib base64 decode symbol
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "(decode|decodeSize)__pureZbase64_u\\d+"
  # === Windows/MSXML ===
  - id: msxml-createelement-base64data
    desc: MSXML createElement Base64Data node
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe, oledoc, ooxml]
    if:
      type: text
      regex: "(?i)createElement\\s*\\(\\s*['\"]Base64Data['\"]\\s*\\)"
  - id: msxml-datatype-bin-base64
    desc: MSXML dataType set to bin.base64
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe, oledoc, ooxml]
    if:
      type: text
      regex: "(?i)dataType\\s*=\\s*['\"]bin\\.base64['\"]"
  - id: msxml-domdocument-progid
    desc: MSXML DOMDocument ProgID
    crit: notable
    conf: 0.86
    platforms: [windows]
    for: [javascript, vbs, powershell, pe, oledoc, ooxml]
    if:
      type: text
      substr: "MSXML2.DOMDocument"
      case_insensitive: true
  - id: msxml-bin-base64-token
    desc: Uses the MSXML bin.base64 data type
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [javascript, vbs, powershell, pe, oledoc, ooxml]
    if:
      type: text
      substr: "bin.base64"
      case_insensitive: true
  - id: msxml-node-typed-value
    desc: MSXML nodeTypedValue byte access
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [javascript, vbs, powershell, pe, oledoc, ooxml]
    if:
      type: text
      substr: "nodeTypedValue"
      case_insensitive: true
  # VBA can construct the MSXML ProgID and base64 datatype from separate
  # string fragments, so the exact ProgID/token rules above do not apply.
  - id: vba-msxml-com-fragment
    desc: VBA MSXML fragment
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [oledoc, ooxml]
    if:
      type: raw
      regex: '(?i)MSXML'
  - id: vba-msxml-domdocument-token
    desc: VBA references the MSXML DOMDocument class
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [oledoc, ooxml]
    if:
      type: raw
      regex: '(?i)DOMDocument'
  - id: vba-msxml-node-typed-value
    desc: VBA MSXML nodeTypedValue byte access
    crit: notable
    conf: 0.94
    platforms: [windows]
    for: [oledoc, ooxml]
    if:
      type: raw
      regex: '(?i)NodeTypedValue'
composite_rules:
  - id: base64-decoding
    desc: Base64 decoding behavior
    crit: notable
    conf: 0.95
    any:
      - id: micro-behaviors/data/decode/base64::atob-decode
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: micro-behaviors/data/decode/base64::b64decode-wrapper-func
      - id: micro-behaviors/data/decode/base64::base64-d-cmd
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/data/decode/base64::base64-decode-cmd
      - id: micro-behaviors/data/decode/base64::base64-pipe-perl-decrypt
      - id: micro-behaviors/data/decode/base64::base64-tool
      - id: micro-behaviors/data/decode/base64::base64-urlsafe-decode
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: micro-behaviors/data/decode/base64::buffer-from-base64-to-utf8
      - id: micro-behaviors/data/decode/base64::codecs-decode-base64
      - id: micro-behaviors/data/decode/base64::const-decoder-classname
      - id: micro-behaviors/data/decode/base64::const-decoder-self
      - id: micro-behaviors/data/decode/base64::const-decoder-static
      - id: micro-behaviors/data/decode/base64::custom-base64-decode-logic
      - id: micro-behaviors/data/decode/base64::data-url-index-base64-decode
      - id: micro-behaviors/data/decode/base64::decode-base64-call
      - id: micro-behaviors/data/decode/base64::decodestring-call
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-data
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-obfuscated-data
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/data/decode/base64::dunder-import-base64
      - id: micro-behaviors/data/decode/base64::encoded-dotnet-frombase64string-text
      - id: micro-behaviors/data/decode/base64::importlib-base64
      - id: micro-behaviors/data/decode/base64::mime-base64-import
      - id: micro-behaviors/data/decode/base64::msxml-bin-base64-token
      - id: micro-behaviors/data/decode/base64::msxml-createelement-base64data
      - id: micro-behaviors/data/decode/base64::msxml-datatype-bin-base64
      - id: micro-behaviors/data/decode/base64::msxml-domdocument-progid
      - id: micro-behaviors/data/decode/base64::msxml-node-typed-value
      - id: micro-behaviors/data/decode/base64::new-decoder
      - id: micro-behaviors/data/decode/base64::nim-base64-decoder-symbol
      - id: micro-behaviors/data/decode/base64::node-base64-tostring-token
      - id: micro-behaviors/data/decode/base64::node-json-parse-buffer
      - id: micro-behaviors/data/decode/base64::perl-base64-bit-decoder
      - id: micro-behaviors/data/decode/base64::php-base64-decode-call
      - id: micro-behaviors/data/decode/base64::raw-std-encoding-decode-string
      - id: micro-behaviors/data/decode/base64::raw-url-encoding-decode-string
      - id: micro-behaviors/data/decode/base64::std-encoding-decode
      - id: micro-behaviors/data/decode/base64::std-encoding-decode-string
      - id: micro-behaviors/data/decode/base64::url-encoding-decode-string
  - id: msxml-bin-base64-decode
    desc: MSXML decodes bin.base64 payload (WSH)
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    for: [python, javascript, powershell, pe, oledoc, ooxml]
    all:
      - id: msxml-createelement-base64data
      - id: msxml-datatype-bin-base64
  - id: msxml-domdocument-bin-base64-decode
    desc: MSXML DOMDocument decodes bin.base64 content
    crit: notable
    conf: 0.86
    platforms: [windows]
    for: [javascript, vbs, powershell, pe, oledoc, ooxml]
    all:
      - id: msxml-domdocument-progid
      - id: msxml-bin-base64-token
      - id: msxml-node-typed-value
  - id: vba-msxml-fragmented-byte-decode
    desc: VBA constructs MSXML to convert concealed text into bytes
    crit: notable
    conf: 0.96
    platforms: [windows]
    for: [oledoc, ooxml]
    all:
      - id: vba-msxml-com-fragment
      - id: vba-msxml-domdocument-token
      - id: vba-msxml-node-typed-value
