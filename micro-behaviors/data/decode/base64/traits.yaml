# Base64 Decoding — Cross-platform traits and composites
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows]
  for: [binaries, scripts]
traits:
  - id: dotnet-frombase64string-text
    desc: .NET FromBase64String reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: FromBase64String
  - id: dotnet-frombase64string-data
    desc: .NET FromBase64String in data
    crit: notable
    conf: 0.9
    for: [data]
    if:
      type: text
      substr: FromBase64String
      case_insensitive: true
  - id: dotnet-frombase64string-obfuscated-data
    desc: Obfuscated FromBase64String in data
    crit: suspicious
    conf: 0.94
    for: [data]
    if:
      type: text
      regex: '(?i)f`?r`?o`?m`?b`?a`?s`?e`?6`?4`?s`?t`?r`?i`?n`?g'
  - id: encoded-dotnet-frombase64string-text
    desc: Encoded .NET FromBase64String reference
    crit: notable
    conf: 0.9
    for: [scripts, binaries, vbs, html, batch, lnk, powershell]
    if:
      type: encoded
      encoding: base64
      substr: FromBase64String
  - id: nim-base64-decoder-symbol
    desc: Nim stdlib base64 decode symbol
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "(decode|decodeSize)__pureZbase64_u\\d+"
  # === Windows/MSXML ===
  - id: msxml-createelement-base64data
    desc: MSXML createElement Base64Data node
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: text
      regex: "(?i)createElement\\s*\\(\\s*['\"]Base64Data['\"]\\s*\\)"
  - id: msxml-datatype-bin-base64
    desc: MSXML dataType set to bin.base64
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: text
      regex: "(?i)dataType\\s*=\\s*['\"]bin\\.base64['\"]"
composite_rules:
  - id: base64-decoding
    desc: Base64 decoding behavior
    crit: notable
    conf: 0.95
    any:
      - id: micro-behaviors/data/decode/base64
  - id: msxml-bin-base64-decode
    desc: MSXML decodes bin.base64 payload (WSH)
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    all:
      - id: msxml-createelement-base64data
      - id: msxml-datatype-bin-base64
