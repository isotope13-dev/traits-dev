# `base64_decode(self::CONST)` and `base64_decode(static::CONST)` are
# the canonical "C2 URL wrapped behind a class constant" pattern in PHP
# webshells and dropper stagers. Legitimate PHP almost never hides a
# constant behind base64 — the operator wraps the string to defeat
# grep-based review.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: B0032
  attack: T1027
traits:
  - id: const-decoder-self
    desc: base64_decode of self class constant
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'base64_decode\s*\(\s*self\s*::\s*[A-Z_]'
  - id: const-decoder-static
    desc: base64_decode of static class constant
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'base64_decode\s*\(\s*static\s*::\s*[A-Z_]'
  - id: const-decoder-classname
    desc: base64_decode of named class constant
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'base64_decode\s*\(\s*[A-Z][A-Za-z0-9_]{1,40}\s*::\s*[A-Z_]'
