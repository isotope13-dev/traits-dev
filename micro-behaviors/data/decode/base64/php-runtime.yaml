# `base64_decode(self::CONST)` and `base64_decode(static::CONST)` are a
# structured PHP decode pattern. It can support obfuscated-payload composites
# when paired with execution or C2 context, but class constants also hold
# legitimate encoded keys and binary fixtures.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: B0032
  attack: T1027
traits:
  - id: const-decoder-self
    desc: base64_decode of self class constant
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'base64_decode\s*\(\s*self\s*::\s*[A-Z_]'
  - id: const-decoder-static
    desc: base64_decode of static class constant
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'base64_decode\s*\(\s*static\s*::\s*[A-Z_]'
  - id: const-decoder-classname
    desc: base64_decode of named class constant
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'base64_decode\s*\(\s*[A-Z][A-Za-z0-9_]{1,40}\s*::\s*[A-Z_]'
