# Base64 URL decoding used by a Node SEA payload
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1140

traits:
  - id: node-sea-base64-url-decoder
    desc: Base64 text to UTF-8
    crit: notable
    conf: 0.97
    if:
      type: raw
      regex: 'Buffer\.from\([A-Za-z_$][A-Za-z0-9_$]*,"base64"\)\.toString\("utf-8"\)'
