# Base64 Decoding — JavaScript/TypeScript
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: buffer-from-base64
    desc: Base64 decoding via Buffer.from (JS)
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: Buffer\.from\([^)]{0,40},\s*['"]base64['"]\)
  - id: buffer-from-base64-to-utf8
    desc: Buffer base64 decode to UTF-8
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "from\\(.{0,40}['\"]base64['\"].{0,20}\\)\\.toString\\("
  - id: atob-decode
    desc: JavaScript base64 decode via atob()
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: atob
