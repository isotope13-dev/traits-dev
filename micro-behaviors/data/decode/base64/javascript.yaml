# Base64 Decoding — JavaScript/TypeScript
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows, macos]
  for: [javascript, typescript]
traits:
  - id: buffer-from-base64
    desc: Base64 decoding via Buffer.from (JS)
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: Buffer\.from\(.{0,60}['"]base64['"]\)
  - id: atob-decode
    desc: atob() base64 decode (JS browser)
    crit: baseline
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: atob
