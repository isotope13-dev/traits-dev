# Base64 Decoding — JavaScript/TypeScript
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: decoded-text-carrier
    desc: Base64 decodes to readable text
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/file/format::sourcemap
    if:
      type: encoded
      encoding: base64
      regex: '[A-Za-z0-9 _.,:;!?/@#-]{12,200}'
  - id: multiple-node-hex-base64-decodes
    desc: Multiple Node.js hex or base64 decodes
    crit: notable
    conf: 0.8
    count_min: 2
    if:
      type: text
      regex: 'Buffer\.from\([^,]{1,50},\s*["''](hex|base64)["'']\)'
    not:
      - substr: Buffer.from(result.data, 'base64')
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: buffer-from-base64
    desc: Base64 decoding via Buffer.from (JS)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: Buffer\.from\([^)]{0,40},\s*['"]base64['"]\)
  - id: buffer-from-base64-to-utf8
    desc: Buffer base64 decode to UTF-8
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "from\\(.{0,40}['\"]base64['\"].{0,20}\\)\\.toString\\(\\s*(['\"]utf-?8['\"])?\\s*\\)"
  - id: node-json-parse-buffer
    desc: Node JSON.parse Buffer.from
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'JSON\.parse\s*\(\s*Buffer\.from'
  - id: node-base64-tostring-token
    desc: Node base64 toString token
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '["'']base64["''].{0,80}\.toString\s*\('
  - id: atob-decode
    desc: Decodes Base64 data with JavaScript atob()
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: atob
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: large-base64-atob-decode
    desc: Large Base64 string decoded via atob()
    crit: notable
    conf: 0.9
    for: [javascript, html]
    if:
      type: text
      regex: 'atob\(["''][A-Za-z0-9+/=]{400,}'
    not:
      - substr: "AGFzbQEAAAAB"
      - substr: "T1RUTwALAIAAAwAwQ0ZG"
  - id: data-url-index-base64-decode
    desc: Data URL payload decoded from second segment
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\batob\(.{0,40}\[\s*1\s*\]\)'
    unless:
      - id: metadata/file/format::sourcemap-sources-content
  - id: custom-base64-decode-logic
    desc: Custom Base64 decoding logic (bit-shifting)
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/library/structure/
      - id: metadata/library/structure::js-large-minified-bundle
    if:
      type: text
      regex: '<<\s*18\s*\|\s*\w+\s*<<\s*12\s*\|\s*\w+\s*<<\s*6'
composite_rules:
  - id: node-base64-json-file-materializer
    desc: Node decodes base64 JSON to file
    crit: notable
    conf: 0.9
    near_bytes: 2048
    all:
      - id: node-json-parse-buffer
      - id: node-base64-tostring-token
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
