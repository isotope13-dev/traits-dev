defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - python
traits:
  - id: b64decode-call
    desc: Calls base64.b64decode (Python)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: base64.b64decode
  - id: b64decode-string
    desc: Base64 decode string reference
    crit: notable
    conf: 0.66
    for:
      - python
      - javascript
      - powershell
      - shell
      - pe
      - elf
    if:
      type: string_value
      substr: b64decode
  - id: decodestring-call
    desc: Calls base64.decodestring (Python legacy)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: base64.decodestring
  - id: codecs-decode-base64
    desc: codecs.decode with base64 encoding (Python)
    crit: notable
    conf: 0.9
    if:
      type: ast
      query: "(call\n  function: (attribute\n    object: (identifier) @mod\n    attribute: (identifier) @method)\n  arguments: (argument_list\n    _\n    (string) @encoding)\n  (#eq? @mod \"codecs\")\n  (#eq? @method \"decode\")\n  (#match? @encoding \"^['\\\"](base64|base_64|base-64|BASE64|BASE_64|BASE-64)['\\\"]$\"))\n"
  - id: importlib-base64
    desc: importlib.import_module('base64') (Python)
    crit: notable
    conf: 0.85
    if:
      type: ast
      query: "(call\n  function: (attribute\n    object: (identifier) @mod\n    attribute: (identifier) @method)\n  arguments: (argument_list\n    (string) @modname)\n  (#eq? @mod \"importlib\")\n  (#eq? @method \"import_module\")\n  (#match? @modname \"^['\\\"]base64['\\\"]$\"))\n"
  - id: b64decode-wrapper-func
    desc: Short function wrapping base64.b64decode
    crit: suspicious
    conf: 0.9
    attack: T1027
    mbc: B0032
    if:
      type: ast
      kind: function
      regex: 'def\s+\w{1,4}\(\w\)\s*:[\s\S]{1,60}b64decode'
  - id: dunder-import-base64
    desc: __import__('base64') dynamic import evasion
    crit: suspicious
    conf: 0.9
    attack: T1027
    mbc: B0032
    if:
      type: raw
      regex: __import__\(['"]base64['"]\)
