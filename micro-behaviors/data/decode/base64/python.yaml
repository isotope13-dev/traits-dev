defaults:
  platforms:
    - unix
    - windows
  for:
    - python
traits:
  - id: b64decode-call
    desc: Decodes Base64 data with Python
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)b64decode$'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: b64decode-string
    # base64 is an encoding/decoding method, which TAXONOMY places at notable
    # (it defines program purpose). This is the text/bytecode fallback for the
    # `b64decode-call` symbol atom on files where symbols aren't extracted (.pyc).
    desc: base64.b64decode reference (text/bytecode)
    crit: notable
    conf: 0.66
    for: [python, pyc]
    if:
      type: text
      substr: b64decode
    unless:
      # The structured call atom is canonical when parser facts are available;
      # this text atom is only the fallback for source/bytecode without it.
      - type: symbol
        kind: call
        regex: '(^|\.)b64decode$'
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: well-known/tool/detection/llm-scanner::skill-vetting-pattern-scanner
  - id: decodestring-call
    desc: Calls base64.decodestring (Python legacy)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: base64.decodestring
  - id: codecs-decode-base64
    desc: codecs.decode with base64 encoding (Python)
    crit: notable
    conf: 0.9
    # `codecs.decode(x, "base64"|"base_64"|"base-64")` — matched on the cached
    # call fact plus an arg-value filter on the encoding-name string.
    if:
      type: symbol
      kind: call
      exact: 'codecs.decode'
      arg:
        kind: string
        regex: '(?i)^base[_-]?64$'
  - id: importlib-base64
    desc: importlib.import_module('base64') (Python)
    crit: notable
    conf: 0.85
    if:
      # Restored arg discriminator dropped in the call migration.
      type: symbol
      kind: call
      exact: 'importlib.import_module'
      arg:
        kind: string
        regex: '^base64$'
  - id: b64decode-wrapper-func
    desc: Short function wrapping base64 decode
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'def\s+\w{1,4}\(\w\)\s*:[\s\S]{1,60}b64decode'
  - id: dunder-import-base64
    desc: Dynamically imports base64 module
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: __import__\(['"]base64['"]\)
