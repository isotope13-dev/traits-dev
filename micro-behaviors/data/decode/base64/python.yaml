# Base64 Decoding — Python
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows, macos]
  for: [python]
traits:
  - id: b64decode-call
    desc: Calls base64.b64decode (Python)
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "base64.b64decode"
  - id: b64decode-string
    desc: Base64 decode string reference
    crit: notable
    conf: 0.66
    for: [python, javascript, powershell, shell, pe, elf]
    if:
      type: string
      substr: b64decode
  - id: decodestring-call
    desc: Calls base64.decodestring (Python legacy)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "base64.decodestring"
  - id: codecs-decode-base64
    desc: codecs.decode with base64 encoding (Python)
    crit: notable
    conf: 0.90
    if:
      type: ast
      query: |
        (call
          function: (attribute
            object: (identifier) @mod
            attribute: (identifier) @method)
          arguments: (argument_list
            _
            (string) @encoding)
          (#eq? @mod "codecs")
          (#eq? @method "decode")
          (#match? @encoding "^['\"](base64|base_64|base-64|BASE64|BASE_64|BASE-64)['\"]$"))
  - id: importlib-base64
    desc: importlib.import_module('base64') (Python)
    crit: notable
    conf: 0.85
    if:
      type: ast
      query: |
        (call
          function: (attribute
            object: (identifier) @mod
            attribute: (identifier) @method)
          arguments: (argument_list
            (string) @modname)
          (#eq? @mod "importlib")
          (#eq? @method "import_module")
          (#match? @modname "^['\"]base64['\"]$"))
  - id: dunder-import-base64
    desc: __import__('base64') dynamic import evasion
    crit: suspicious
    conf: 0.90
    attack: T1027
    mbc: B0032
    if:
      type: raw
      regex: "__import__\\(['\"]base64['\"]\\)"
