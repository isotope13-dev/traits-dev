defaults:
  platforms: [macos]
  for: [applescript]
  attack: T1140

traits:
  - id: nsdata-base64-decode
    desc: NSData Base64 string decoding
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: initWithBase64EncodedString_options_
  - id: nsdata-base64-write
    desc: Writes decoded NSData to a file
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: writeToFile_atomically_

composite_rules:
  - id: applescript-base64-decode-to-file
    desc: AppleScript decodes Base64 data and writes it to a file
    crit: notable
    conf: 0.98
    all:
      - id: nsdata-base64-decode
      - id: nsdata-base64-write
