defaults:
  platforms: [unix, windows]
  for: [xml, html, javascript]
  attack: T1027

traits:
  - id: percent-encoded-xml-processing-instruction
    desc: Percent-encoded XML processing instruction
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)%3c%3fxml'

  - id: percent-encoded-xsl-namespace
    desc: Percent-encoded XSL namespace tag
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)%3cxsl(%3a|:)'

  - id: percent-encoded-stylesheet-tag
    desc: Percent-encoded stylesheet tag
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)%3cstylesheet'

  - id: percent-encoded-msxsl-namespace
    desc: Percent-encoded MSXSL namespace tag
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)%3cmsxsl(%3a|:)'

composite_rules:
  - id: percent-encoded-xml-markup
    desc: Percent-encoded XML markup tags
    crit: notable
    conf: 0.94
    any:
      - id: percent-encoded-xml-processing-instruction
      - id: percent-encoded-xsl-namespace
      - id: percent-encoded-stylesheet-tag
      - id: percent-encoded-msxsl-namespace
