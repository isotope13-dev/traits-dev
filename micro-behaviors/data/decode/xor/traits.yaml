defaults:
  platforms: [windows, unix]
  for: [scripts]
traits:
  - id: python-xor-string-decoder-bytecode
    desc: Python bytecode XOR decoder loop
    crit: suspicious
    conf: 0.99
    attack: T1027
    mbc: B0032
    for: [pyc]
    count_min: 3
    if:
      type: hex
      pattern: '22 00 1F 00 80 00 54 00 46 17 00 00 70 01 5C 01 [8] 56 01 5E ?? 2C 0C'

  - id: xor-decoded-alpha-text
    desc: XOR decoding yields alphabetic plaintext
    crit: notable
    conf: 0.8
    for: [data]
    if:
      type: encoded
      encoding: xor
      regex: '[A-Za-z]{10,}'
  - id: xor-decode-wording
    desc: XOR decode wording
    crit: notable
    if:
      type: text
      regex: (?i)\bxor\b.{0,24}\bdecode\b
      case_insensitive: true
  - id: xor-decrypt-wording
    desc: XOR decrypt wording
    crit: notable
    if:
      type: text
      regex: (?i)\bxor\b.{0,24}\bdecrypt\b
      case_insensitive: true
  - id: xor-payload-wording
    desc: XOR payload wording
    crit: notable
    if:
      type: text
      regex: (?i)\bxor\b.{0,24}\bpayload\b
      case_insensitive: true
    unless:
      - id: well-known/tool/detection/malware-config-parser
      - id: micro-behaviors/communications/websocket/library::websocket-rfc6455-masking-context
composite_rules:
  - id: xor-transform-wording
    desc: XOR transform wording
    crit: notable
    any:
      - id: xor-decode-wording
      - id: xor-decrypt-wording
      - id: xor-payload-wording
