defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, html]
  attack: T1140
traits:
  - id: charcode-modulo-key-index
    desc: charCodeAt indexed by a repeating key length
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'charCodeAt\s*\([^)]{0,40}%\s*[A-Za-z_$][\w$]*\.length\s*\)'
    unless:
      - id: well-known/tool/development/guangnao-agent::cli-banner
      - id: well-known/tool/development/guangnao-agent::package-name

composite_rules:
  # A repeating-key XOR helper is a data-decoding capability.  It is also
  # used by legitimate bundled applications, so obfuscation intent belongs in
  # the objective composites that add payload and execution context.
  - id: js-repeating-key-charcode-xor-decoder
    desc: JavaScript repeating-key XOR decoder
    crit: notable
    conf: 0.9
    for: [javascript, html]
    all:
      - id: micro-behaviors/data/encode/xor::js-fromcharcode-charcode-xor
      - id: charcode-modulo-key-index
    near_bytes: 160
