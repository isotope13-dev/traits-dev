defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: tr-translate
    desc: tr command for character translation
    if:
      type: text
      regex: \btr\s+['"].*?['"]\s+['"].*?['"]\b
  - id: tr-delete
    desc: tr command for character deletion
    if:
      type: text
      regex: \btr\s+-d\s+['"].*?['"]\b
