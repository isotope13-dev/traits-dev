defaults:
  platforms: [windows]
  for: [go, batch, powershell, pe]
  attack: T1140
  mbc: C0026

traits:
  - id: certutil-decode-command
    desc: certutil file decoding command
    crit: notable
    conf: 0.96
    if:
      type: string_literal
      regex: '(?i)\bcertutil(\.exe)?\s+-decode\b'
  - id: certutil-decodes-powershell-script
    desc: certutil decodes a PowerShell script
    crit: notable
    conf: 0.97
    if:
      type: string_literal
      regex: '(?i)\bcertutil(\.exe)?\s+-decode\b[^\r\n]{1,160}\.ps1\b'
