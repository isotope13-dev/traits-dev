defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1140
  mbc: C0053
traits:
  - id: ps-convertfrom-base28-function
    desc: PowerShell custom base28 decoder
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ConvertFrom-Base28
  - id: ps-base28-custom-alphabet
    desc: Custom 28-symbol alphabet
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ABCDEFGHIJKLMNOPQRSTUVWXYZab
  - id: ps-base28-radix-loop
    desc: Base28 radix decode loop
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '$v = $v * 28 + $lut'
  - id: ps-base28-byte-unpack
    desc: Base28 byte unpack shifts
    crit: component
    conf: 0.84
    if:
      type: text
      substr: '-shr 16'
composite_rules:
  - id: ps-custom-base28-decoder
    desc: PowerShell custom base28 decoder
    crit: notable
    conf: 0.94
    all:
      - id: ps-convertfrom-base28-function
      - id: ps-base28-custom-alphabet
      - id: ps-base28-radix-loop
    any:
      - id: ps-base28-byte-unpack
