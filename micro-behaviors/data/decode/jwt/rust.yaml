defaults:
  platforms: [windows, unix]
  for: [rust]
  crit: component
  conf: 0.85

traits:
  - id: rust-jwt-dot-split
    desc: Rust JWT segment split
    if:
      type: text
      regex: '\.split\(\s*[''"]\.[''"]\s*\)\.nth\(\s*1\s*\)'

  - id: rust-jwt-base64url-decode
    desc: Rust JWT base64url decode
    if:
      type: text
      regex: 'BASE64_URL_SAFE[A-Z_]{0,40}\s*\.decode\('

  - id: rust-jwt-claims-json
    desc: Rust JWT claims JSON parse
    if:
      type: text
      regex: 'serde_json::from_str::<.{0,80}Value'

composite_rules:
  - id: rust-jwt-claims-decode
    desc: Rust JWT claims decoding
    crit: notable
    conf: 0.9
    all:
      - id: rust-jwt-dot-split
      - id: rust-jwt-base64url-decode
      - id: rust-jwt-claims-json
