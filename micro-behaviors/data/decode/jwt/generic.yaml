# Generic JWT token presence. Every JSON Web Token begins with the base64url
# of '{"' → the literal "eyJ" prefix, so this matches any JWT (auth tokens,
# many web apps). No standalone signal; composites elsewhere gate on it.
defaults:
  platforms: [windows, unix]
  for: [binaries]
  size_min: 64
  size_max: 50000000
traits:
  - id: jwt-token-prefix
    desc: JWT base64url token shape (header.payload)
    crit: component
    conf: 0.4
    if:
      type: text
      regex: 'eyJ[A-Za-z0-9_=-]{8,}\.eyJ[A-Za-z0-9_=-]{8,}'
