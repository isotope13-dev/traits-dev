defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - javascript
    - typescript
  crit: baseline
  conf: 0.7
traits:
  - id: buffer-from-hex-dup
    desc: Buffer.from with 'hex' encoding
    if:
      type: string_value
      regex: Buffer\.from\(.{0,60}['"]hex['"]\)
  - id: buffer-from-base64
    desc: Buffer.from with 'base64' encoding
    if:
      type: string_value
      regex: Buffer\.from\(.{0,60}['"]base64['"]\)
  - id: buffer-from-utf8
    desc: Buffer.from with 'utf8' encoding
    if:
      type: string_value
      regex: Buffer\.from\(.{0,60}['"]utf8['"]\)
composite_rules:
  - id: buffer-decoding
    desc: Node.js Buffer decoding operations
    any:
      - id: micro-behaviors/data/decode/buffer::buffer-from-hex-dup
      - id: buffer-from-base64
      - id: buffer-from-utf8
