# Node.js Buffer Decoding Operations
# Detects Buffer.from() with various encodings

defaults:
  for: [javascript, typescript]
  crit: baseline
  conf: 0.7

traits:
  - id: buffer-from-hex
    desc: Buffer.from with 'hex' encoding
    if:
      type: string
      regex: "Buffer\\.from\\(.{0,60}['\"]hex['\"]\\)"

  - id: buffer-from-base64
    desc: Buffer.from with 'base64' encoding
    if:
      type: string
      regex: "Buffer\\.from\\(.{0,60}['\"]base64['\"]\\)"

  - id: buffer-from-utf8
    desc: Buffer.from with 'utf8' encoding
    if:
      type: string
      regex: "Buffer\\.from\\(.{0,60}['\"]utf8['\"]\\)"

composite_rules:
  - id: buffer-decoding
    desc: Node.js Buffer decoding operations
    any:
      - id: buffer-from-hex
      - id: buffer-from-base64
      - id: buffer-from-utf8
