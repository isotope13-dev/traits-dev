defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  crit: baseline
  conf: 0.7
traits:
  - id: buffer-from-utf8
    desc: Buffer.from with 'utf8' encoding
    if:
      type: string_literal
      regex: Buffer\.from\(.{0,60}['"]utf8['"]\)
composite_rules:
  - id: mixed-buffer-encodings
    desc: Node.js code decodes both hexadecimal and Base64 buffers
    crit: notable
    conf: 0.6
    all:
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
  - id: buffer-decoding
    desc: Node.js Buffer decoding operations
    any:
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: buffer-from-utf8
