defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1140
  mbc: C0053
traits:
  - id: b58decode-symbol
    desc: base58 decode symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: '^(base58|base58check)\.b58decode(_check)?$'
  - id: b58decode-call
    desc: base58 decode call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\b(base58|base58check)\.b58decode(_check)?\s*\('
  - id: bitcoinlib-base58-decode
    desc: bitcoinlib base58 decode
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\b(change_base|addr_base58_to_pubkeyhash|pubkeyhash_to_addr_base58)\s*\('
composite_rules:
  - id: base58-decoding
    desc: Base58 decoding behavior
    crit: notable
    conf: 0.9
    any:
      - id: b58decode-symbol
      - id: b58decode-call
      - id: bitcoinlib-base58-decode
