defaults:
  platforms: [linux, macos, windows]
  for: [elf, so, macho, pe, dll]

traits:
  - id: decode-table-symbol
    desc: Exported table-driven decoder
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: '(^|_)decode_table$'

  - id: table-decode-symbol
    desc: Exported table-decode routine
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: '(^|_)table_decode$'

  - id: lookup-decode-symbol
    desc: Exported lookup decoder routine
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: '(^|_)lookup_decode$'

composite_rules:
  - id: table-based-decode
    desc: Table-driven decoding capability
    crit: notable
    conf: 0.8
    any:
      - id: decode-table-symbol
      - id: table-decode-symbol
      - id: lookup-decode-symbol
