defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: biginteger-byte-processor
    desc: Uses custom BigIntegerByteProcessor class
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: BigIntegerByteProcessor
  - id: regex-byte-processor
    desc: Uses custom RegexByteProcessor class
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RegexByteProcessor
  - id: network-address-provider-class
    desc: Uses custom NetworkAddressProvider class
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: NetworkAddressProvider
  - id: hashtable-accumulator
    desc: Uses custom HashtableAccumulator class
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: HashtableAccumulator
  - id: sortedlist-accumulator
    desc: Uses custom SortedListAccumulator class
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: SortedListAccumulator
  - id: bitconversion-processor
    desc: Uses custom BitConversionProcessor class
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: BitConversionProcessor
