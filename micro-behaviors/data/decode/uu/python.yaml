defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1140
  mbc: C0053
traits:
  - id: uu-decode-symbol
    desc: uu.decode symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: uu.decode
  - id: binascii-a2b-uu-symbol
    desc: binascii a2b_uu symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: binascii.a2b_uu
  - id: uu-codecs-decode
    desc: codecs.decode uu encoding
    crit: notable
    conf: 0.85
    # `codecs.decode(x, "uu"|"uu_codec")` — matched on the cached call fact plus
    # an arg-value filter on the encoding-name string (case-insensitive).
    if:
      type: symbol
      kind: call
      exact: 'codecs.decode'
      arg:
        kind: string
        regex: '(?i)^uu(_codec|-codec)?$'
