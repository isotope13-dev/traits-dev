defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1140
  mbc: C0053
traits:
  - id: uu-decode-symbol
    desc: uu.decode symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: uu.decode
  - id: binascii-a2b-uu-symbol
    desc: binascii a2b_uu symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: binascii.a2b_uu
  - id: uu-codecs-decode
    desc: codecs.decode uu encoding
    crit: notable
    conf: 0.85
    if:
      type: ast
      query: "(call\n  function: (attribute\n    object: (identifier) @mod\n    attribute: (identifier) @method)\n  arguments: (argument_list\n    _\n    (string) @encoding)\n  (#eq? @mod \"codecs\")\n  (#eq? @method \"decode\")\n  (#match? @encoding \"^['\\\"](?:uu|uu_codec|uu-codec|UU|UU_CODEC|UU-CODEC)['\\\"]$\"))\n"
composite_rules:
  - id: uu-decoding
    desc: uuencoding decode behavior
    crit: notable
    conf: 0.9
    any:
      - id: uu-decode-symbol
      - id: binascii-a2b-uu-symbol
      - id: uu-codecs-decode
