defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1140
traits:
  - id: decrypt-payload-function-name
    desc: JavaScript function named decryptPayload
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: decryptPayload

  - id: fromcharcode-map-array
    desc: Converts character-code arrays to strings
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'map\(function\([^)]{1,20}\)\s*\{\s*return String\.fromCharCode'

  - id: fromcharcode-indexed-array
    desc: Converts indexed character codes to strings
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'String\.fromCharCode\(\w+\[\w+\]\)'

  - id: fromcharcode-large-offset-expression
    desc: Rebuilds characters with large-offset arithmetic
    crit: notable
    conf: 0.96
    # A large decimal literal subtracted by a variable is outside the normal
    # String.fromCharCode range and is a compact runtime string decoder. Keep
    # the atom capability-focused; execution of its result is objective
    # evidence supplied by composites.
    if:
      type: text
      regex: 'String\.fromCharCode\s*\(\s*\d{6,}\s*-\s*[A-Za-z_$][A-Za-z0-9_$]*'

  - id: js-indexof-charat-lookup
    desc: Indexes characters in a custom alphabet
    crit: notable
    conf: 0.9
    # Keep this atom focused on the lookup itself; the stepping-loop companion
    # is composed with it where decoder intent is required.
    # Exclude trim helpers: whitespace tables use charAt(0), and argparse-style
    # strip loops use while (chars.indexOf(str.charAt(i))).
    if:
      type: text
      regex: '[\w$]+\.indexOf\s*\(\s*[\w$]+\.charAt\s*\(\s*[\w$]+\s*\)\)'
    not:
      - regex: '\.charAt\s*\(\s*0\s*\)'
    unless:
      - type: text
        regex: 'while\s*\([^)]{0,100}\.indexOf\s*\(\s*[\w$]+\.charAt'

  - id: js-alphabet-indexof-lookup
    desc: Inline alphabet-table index lookup
    crit: notable
    conf: 0.95
    if:
      type: text
      # The table must be an inline alphabet-like literal; ordinary calls
      # such as `process.argv.indexOf(...)` are not decoder evidence.
      regex: '["''][A-Za-z0-9+/=_-]{16,}["'']\.indexOf\s*\('

  - id: js-charcode-shift-operation
    desc: Character code shift operation
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '\.charCodeAt\s*\([^)]{1,80}\)\s*%'

  - id: js-fixed-step-three-loop
    desc: JavaScript loop increments by three
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: 'for\s*\([^)]{1,240}\+=\s*3\s*\)\s*\{'

  - id: js-octal-parseint
    desc: parseInt parses an octal string
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'parseInt\s*\(.{0,180},\s*8\s*\)'

  - id: js-charcode-byte-mask
    desc: Masks a decoded value to one byte
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '&\s*255'
  - id: js-unescape-call
    desc: Calls JavaScript unescape
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: unescape
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: js-hex-xor-character-decode
    desc: Decodes JavaScript hex pairs with XOR
    crit: notable
    conf: 0.95
    # This is a decoding operation only.  Execution, persistence, and the
    # HTA container are separate signals supplied by objective composites.
    if:
      type: text
      regex: 'parseInt\s*\([^;]{0,100},\s*16\s*\)\s*\^'

  - id: js-offset-array-fromcharcode-decode
    desc: Rebuilds characters from offset array values
    crit: notable
    conf: 0.95
    # Indexed character-code helpers occur in both benign bundles and
    # script decoders; keep the operation neutral and let surrounding
    # execution context determine intent.
    if:
      type: text
      regex: 'String\.fromCharCode\([^)]{0,50}\[[A-Za-z_$][\w$]*\]\s*[+-]\s*\d{1,3}\s*[),]'

composite_rules:
  - id: js-indexof-charcode-shift-decoder
    desc: Alphabet index decoder with char shifts
    crit: notable
    conf: 0.95
    near_bytes: 2048
    all:
      - id: js-alphabet-indexof-lookup
      - id: js-charcode-shift-operation
      - id: micro-behaviors/data/string/access::js-charat-lookup

  - id: js-octal-charcode-loop
    desc: Octal loop rebuilds chars with fromCharCode
    crit: notable
    conf: 0.96
    near_bytes: 512
    all:
      - id: js-fixed-step-three-loop
      - id: js-octal-parseint
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call-text

  - id: js-alphabet-coded-decoder
    desc: JavaScript alphabet-index character decoder
    crit: notable
    conf: 0.9
    # The three operations must belong to one decoder, rather than merely
    # appearing somewhere in a large third-party bundle.
    near_bytes: 2048
    all:
      - id: js-indexof-charat-lookup
      - id: micro-behaviors/data/control-flow/loop::js-two-step-loop
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
  - id: js-alphabet-coded-decoder-source
    desc: JavaScript source contains an alphabet lookup decoder
    crit: notable
    conf: 0.95
    near_bytes: 2048
    # Text fallbacks keep the decoder identity available when a large source
    # file exceeds the JavaScript AST guard.
    all:
      - id: js-indexof-charat-lookup
      - id: micro-behaviors/data/control-flow/loop::js-fixed-step-two-source
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call-text
  - id: js-charcode-mask-unescape-decoder
    desc: CharCode byte mask feeds unescape
    crit: notable
    conf: 0.96
    near_lines: 12
    all:
      - id: js-charcode-byte-mask
      - id: js-unescape-call
