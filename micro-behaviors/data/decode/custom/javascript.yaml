defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1140
traits:
  - id: fromcharcode-map-array
    desc: Converts character-code array to string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'map\(function\([^)]{1,20}\)\s*\{\s*return String\.fromCharCode'

  - id: fromcharcode-indexed-array
    desc: Converts indexed character code to string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'String\.fromCharCode\(\w+\[\w+\]\)'

  - id: js-indexof-charat-incrementing-lookup
    desc: Char-table lookup with incrementing index
    crit: notable
    conf: 0.9
    # A decoder alphabet is indexed by each successive character of an input
    # string. Requiring an incrementing index excludes ordinary validation
    # checks such as allowed.indexOf(name.charAt(0)).
    if:
      type: text
      regex: '[\w$]+\.indexOf\s*\(\s*[\w$]+\.charAt\s*\(\s*[\w$]+\+\+\s*\)\)'
