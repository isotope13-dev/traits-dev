defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1140
traits:
  - id: fromcharcode-map-array
    desc: Converts character-code array to string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'map\(function\([^)]{1,20}\)\s*\{\s*return String\.fromCharCode'

  - id: fromcharcode-indexed-array
    desc: Converts indexed character code to string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'String\.fromCharCode\(\w+\[\w+\]\)'

  - id: js-indexof-charat-alphabet-loop
    desc: Character table indexOf/charAt decoder
    crit: notable
    conf: 0.9
    # A decoder alphabet is indexed by each character of an embedded string.
    # This is deliberately the paired table.indexOf(value.charAt(...)) shape,
    # not either generic method in isolation.
    if:
      type: text
      regex: '\w+\.indexOf\s*\(\s*\w+\.charAt\s*\('
