defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1140
traits:
  - id: decrypt-payload-function-name
    desc: JavaScript function named decryptPayload
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: decryptPayload

  - id: fromcharcode-map-array
    desc: Converts character-code array to string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'map\(function\([^)]{1,20}\)\s*\{\s*return String\.fromCharCode'

  - id: fromcharcode-indexed-array
    desc: Converts indexed character code to string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'String\.fromCharCode\(\w+\[\w+\]\)'

  - id: fromcharcode-large-offset-expression
    desc: Rebuilds characters with large-offset arithmetic
    crit: notable
    conf: 0.96
    # A large decimal literal subtracted by a variable is outside the normal
    # String.fromCharCode range and is a compact runtime string decoder. Keep
    # the atom capability-focused; execution of its result is objective
    # evidence supplied by composites.
    if:
      type: text
      regex: 'String\.fromCharCode\s*\(\s*\d{6,}\s*-\s*[A-Za-z_$][A-Za-z0-9_$]*'

  - id: js-indexof-charat-lookup
    desc: Char-table lookup with charAt index
    crit: notable
    conf: 0.9
    # Keep this atom focused on the lookup itself; the stepping-loop companion
    # is composed with it where decoder intent is required.
    if:
      type: text
      regex: '[\w$]+\.indexOf\s*\(\s*[\w$]+\.charAt\s*\(\s*[\w$]+\s*\)\)'

composite_rules:
  - id: js-alphabet-coded-decoder
    desc: JavaScript alphabet-index character decoder
    crit: notable
    conf: 0.9
    # The three operations must belong to one decoder, rather than merely
    # appearing somewhere in a large third-party bundle.
    near_bytes: 2048
    all:
      - id: js-indexof-charat-lookup
      - id: micro-behaviors/data/control-flow/loop::js-two-step-loop
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
  - id: js-alphabet-coded-decoder-source
    desc: JavaScript source contains an alphabet lookup decoder
    crit: notable
    conf: 0.95
    near_bytes: 2048
    # Text fallbacks keep the decoder identity available when a large source
    # file exceeds the JavaScript AST guard.
    all:
      - id: js-indexof-charat-lookup
      - id: micro-behaviors/data/control-flow/loop::js-fixed-step-two-source
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call-text
