defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: buffer-from-hex-dup
    desc: Hex decoding/usage via Buffer.from
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      regex: Buffer\.from\(.{0,60}['"]hex['"]\)
  - id: buffer-from-hex-to-utf8
    desc: Buffer hex decode to UTF-8
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "from\\(.{0,40}['\"]hex['\"].{0,20}\\)\\.toString\\("
  - id: js-hex-charcode-decoder
    desc: JavaScript hex escape decoder
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'String\.fromCharCode\s*\(\s*parseInt\s*\([^)]{0,120},\s*16\s*\)'
