defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  - id: chr-hexdec-call
    desc: Converts hex values with PHP chr(hexdec())
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: chr\s*\(\s*hexdec\s*\(
    unless:
      - id: metadata/library/runtime::htmlpurifier-library
      - id: metadata/library/runtime::pel-exif-library
