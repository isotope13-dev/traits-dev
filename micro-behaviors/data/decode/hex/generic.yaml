defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: buffer-from-hex-string
    desc: Node.js Buffer.from decodes a hexadecimal string
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Buffer\.from\(.{1,80},\s*['"]hex['"]\)
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/lib/v8::isolate-symbol
