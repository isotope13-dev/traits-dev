defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: buffer-from-hex-raw
    desc: Buffer.from hex decoding
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: Buffer\.from\(.{1,80},\s*['"]hex['"]\)
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
      - id: well-known/lib/electron::v8-isolate-marker
