defaults:
  platforms: [windows, unix]
traits:
  - id: python-fromhex
    desc: Python fromhex decode reference
    crit: component
    conf: 0.5
    for: [python, pyc]
    if:
      type: text
      substr: fromhex
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::test-fixture-directory
  - id: hex-decode-int-16
    desc: "Hex decoding via int(x, 16)"
    crit: baseline
    conf: 0.7
    for: [python]
    if:
      type: tree-sitter
      language: python
      query: |
        (call
          function: (identifier) @func
          arguments: (argument_list
            (_)
            (integer) @base
          )
          (#eq? @func "int")
          (#eq? @base "16")
        )
