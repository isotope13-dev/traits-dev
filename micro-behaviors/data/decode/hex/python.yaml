defaults:
  platforms: [windows, unix]
traits:
  - id: python-unhexlify
    desc: Python binascii.unhexlify hex decode
    crit: notable
    conf: 0.7
    for: [python, pyc]
    if:
      type: symbol
      regex: '(^|\.)unhexlify$'
  - id: python-fromhex
    desc: Python fromhex decode reference
    crit: component
    conf: 0.5
    for: [python, pyc]
    if:
      type: text
      substr: fromhex
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::test-fixture-directory
  - id: hex-decode-int-16
    desc: "Hex decoding via int(x, 16)"
    crit: baseline
    conf: 0.7
    for: [python]
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'int'
