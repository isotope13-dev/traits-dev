defaults:
  platforms: [windows, unix]
traits:
  - id: python-unhexlify
    desc: Python binascii.unhexlify hex decode
    crit: notable
    conf: 0.7
    for: [python, pyc]
    if:
      type: symbol
      regex: '(^|\.)unhexlify$'
  - id: python-fromhex
    desc: Python fromhex decode reference
    crit: component
    conf: 0.5
    for: [python, pyc]
    if:
      type: text
      substr: fromhex
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/harness/
  - id: hex-decode-int-16
    desc: "Hex decoding via int(x, 16)"
    crit: baseline
    conf: 0.7
    for: [python]
    if:
      type: text
      regex: '\bint\s*\([^,\n]{1,200},\s*16\s*\)'
