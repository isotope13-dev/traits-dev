# Python wall-clock reads (time.time / datetime.now). Pure time capability used
# everywhere (logging, benchmarks, scheduling); relocated from objectives/
# anti-analysis/timing so the standalone components are labelled by what they
# search for. The time-bomb gate composites reference them cross-directory.
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: py-time-call
    desc: Python time.time call
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: time.time
  - id: py-datetime-now-call
    desc: Python datetime now call
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: datetime.now
