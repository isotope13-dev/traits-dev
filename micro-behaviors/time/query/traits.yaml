defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: time
    desc: Get current calendar time (seconds)
    crit: baseline
    mbc: T1124
    attack: T1124
    conf: 0.3
    for: [pe, elf, macho]
    if:
      type: symbol
      exact: time
  - id: gettimeofday
    desc: Get current time with microsecond precision
    crit: baseline
    mbc: T1124
    attack: T1124
    conf: 0.3
    for: [elf, macho]
    if:
      type: symbol
      exact: gettimeofday
    platforms:
      - unix
  - id: clock_gettime
    desc: Get time from specified clock
    crit: baseline
    mbc: T1124
    attack: T1124
    conf: 0.3
    for: [elf, macho]
    if:
      type: symbol
      exact: clock_gettime
    platforms:
      - unix
  - id: localtime-symbol
    desc: localtime function (symbol)
    crit: baseline
    conf: 0.2
    for: [pe, elf, macho]
    if:
      type: symbol
      regex: localtime
  - id: localtime-string
    desc: localtime function (string)
    crit: baseline
    conf: 0.2
    if:
      type: text
      substr: ocaltime
  - id: gmtime
    desc: Convert time to UTC time
    crit: baseline
    conf: 0.2
    for: [pe, elf, macho]
    if:
      type: symbol
      regex: gmtime
  - id: strftime
    desc: Format time as string
    crit: baseline
    conf: 0.2
    for: [pe, elf, macho]
    if:
      type: symbol
      regex: strftime
  - id: strptime
    desc: Parse time string into time
    crit: baseline
    conf: 0.2
    for: [elf, macho]
    if:
      type: symbol
      regex: strptime
    platforms:
      - unix
  - id: settimeofday
    desc: Set system time (requires privileges)
    crit: notable
    mbc: F0005
    attack: T1070.006
    conf: 0.9
    for: [elf, macho]
    if:
      type: symbol
      regex: settimeofday
    platforms:
      - unix
  - id: clock_settime
    desc: Set time for specified clock
    crit: notable
    mbc: F0005
    attack: T1070.006
    conf: 0.9
    for: [elf, macho]
    if:
      type: symbol
      regex: clock_settime
    platforms:
      - unix
  - id: sleep-func
    desc: Sleep for specified duration
    crit: baseline
    conf: 0.3
    for: [pe, elf, macho]
    if:
      type: symbol
      exact: sleep
  - id: usleep-func
    desc: Sleep for microsecond duration
    crit: baseline
    conf: 0.3
    for: [elf, macho]
    if:
      type: symbol
      exact: usleep
    platforms:
      - unix
  - id: nanosleep-func
    desc: Sleep for nanosecond duration
    crit: baseline
    conf: 0.3
    for: [elf, macho]
    if:
      type: symbol
      exact: nanosleep
    platforms:
      - unix
composite_rules:
  - id: localtime
    desc: Convert time to local time
    crit: baseline
    conf: 0.2
    any:
      - id: micro-behaviors/time/query::localtime-symbol
      - id: micro-behaviors/time/query::localtime-string
  - id: utimes
    desc: Change file access and modification times
    crit: notable
    mbc: F0005
    attack: T1070.006
    conf: 0.7
    platforms:
      - unix
    any:
      - id: micro-behaviors/fs/file/timestamp::utimes-syscall
      - id: micro-behaviors/fs/file/timestamp::utimensat-syscall
      - id: micro-behaviors/fs/file/timestamp::futimens-syscall
  - id: sleep
    desc: Suspend execution for interval
    crit: baseline
    conf: 0.4
    platforms:
      - unix
    any:
      - id: micro-behaviors/time/query::sleep-func
      - id: micro-behaviors/time/query::usleep-func
      - id: micro-behaviors/time/query::nanosleep-func
