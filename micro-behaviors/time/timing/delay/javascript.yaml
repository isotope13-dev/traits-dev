defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: js-date-now-timeout
    desc: Date.now with setTimeout
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: Date\.now\(\).{0,50}setTimeout
    unless:
      - id: metadata/lang/javascript-features::sourcemap-sources-content
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/react::react-license-banner
      - id: metadata/build/bundler::has-sourcemap
  - id: js-performance-now-timeout
    desc: performance.now with setTimeout
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: performance\.now\(\).{0,50}setTimeout
    unless:
      - id: metadata/lang/javascript-features::sourcemap-sources-content
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/build/bundler::has-sourcemap
