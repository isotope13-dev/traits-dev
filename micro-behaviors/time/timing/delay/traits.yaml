# Timing Operations
# System timing and delay functions
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Sleep/Delay ===
  - id: sleep-dup
    desc: Delay execution
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "Sleep"
      # === Timing Queries ===
      # NOTE: GetTickCount/GetTickCount64/GetSystemTime/GetLocalTime moved to micro-behaviors/time/query/
  - id: nt-delay-execution
    desc: Native NT delay API
    crit: notable
    conf: 0.9
    attack: "T1497.003"
    if:
      type: symbol
      exact: "NtDelayExecution"
