# Timing Operations
# System timing and delay functions
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Sleep/Delay ===
  - id: sleep-dup
    desc: Delay execution
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "Sleep"
      # === Timing Queries ===
      # NOTE: GetTickCount/GetTickCount64/GetSystemTime/GetLocalTime moved to micro-behaviors/time/query/
  - id: query-performance-counter
    desc: Query high-resolution performance counter
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: "QueryPerformanceCounter"
