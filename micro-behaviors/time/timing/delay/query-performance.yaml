# QueryPerformanceCounter detection (timing delay)
defaults:
  crit: baseline
  conf: 0.7
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: query-performance-counter
    desc: QueryPerformanceCounter timing API
    if:
      type: symbol
      exact: "QueryPerformanceCounter"
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/lang/compiler::vcruntime
      - id: metadata/package/versioning::pe-version-resource
