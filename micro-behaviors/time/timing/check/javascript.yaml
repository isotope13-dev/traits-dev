defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: js-session-state-reference
    desc: JavaScript session-state reference
    crit: component
    conf: 0.8
    if:
      type: text
      word: sessionState

  - id: js-multi-hour-ms-duration
    desc: Multi-hour JavaScript millisecond duration
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '[0-9]{1,4}\s*\*\s*60\s*\*\s*60\s*\*\s*1000'

  - id: js-date-now-relative-threshold
    desc: Date.now relative threshold comparison
    crit: baseline
    conf: 0.85
    if:
      type: text
      regex: 'Date\.now\(\)\s*>=?\s*[\w.$]+\s*\+\s*[\w.$]+'
    not:
      - substr: '_dragStartTime+this._getDragStartDelay'
      - substr: 'dragStartThreshold'
      - regex: 'Date\.now\(\)\s*>\s*\w+\.start_time\s*\+\s*\w+\.duration'

  - id: datenow-gated-fetch
    desc: Date.now gated fetch request
    crit: notable
    conf: 0.82
    size_max: 131072
    if:
      type: text
      regex: 'Date\.now\(\)\s*([-+]\s*[\w.$]+)?\s*([<>]=?|={2,3}|!={1,2})[^\n]{0,120}\bfetch\b'
    not:
      - regex: 'Date\.now\(\)\s*-\s*\d+e\d+\s*&&'
      - regex: '\.exp\s*-\s*Date\.now\(\)\s*<\s*\d+e\d+'
      - regex: 'Date\.now\(\)\s*<\s*\d+e\d+\s*\}\s*catch\s*\('
      - regex: 'Date\.now\(\)\s*-\s*[\w.$]+\s*<\s*\d+e?\d*\s*\)\s*return'
      - regex: '\w+\s*=\s*Date\.now\(\)[\s\S]{0,160}\w+\s*-\s*[\w.$]+\s*<\s*\d+e?\d*\s*\)\s*return[\s\S]{0,240}\bfetch\b'
      - regex: 'Date\.now\(\)\s*-\s*\d+(e\d+)?\s*,\s*\w+\s*=\s*\w+\.filter\s*\(\s*function'
      - regex: '\.append\(["'']timestamp["''],Date\.now\(\)\).{0,180}\bfetch\b'
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: metadata/library/structure::js-hashed-asset-bundle
      - id: metadata/library/structure/
      - id: well-known/lib/nextjs::next-server-build-path

  - id: newdate-gated-fetch
    desc: Date object gated fetch
    crit: notable
    conf: 0.82
    size_max: 131072
    if:
      type: text
      regex: 'new Date[^\n]{0,80}[<>!=]=?[^\n]{0,120}fetch\s*\('
    not:
      - regex: 'new Date\s*\(\s*\)[^\n]{0,80}\.getHours\s*\(\s*\)[^\n]{0,80}if\s*\(\s*\w+\s*={2,3}\s*\d{1,2}\s*\)\s*\{\s*fetch\s*\('
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: metadata/library/structure::js-hashed-asset-bundle
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: well-known/app/localguard::extension-runtime
