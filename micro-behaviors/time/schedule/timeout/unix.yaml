defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [c, elf, macho, so, dylib]

traits:
  - id: alarm
    desc: Schedule alarm timer
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: alarm

  - id: sigalrm-handler
    desc: SIGALRM timeout handler
    crit: baseline
    conf: 0.9
    for: [c]
    if:
      type: raw
      regex: "signal\\s*\\(\\s*SIGALRM\\s*,"

composite_rules:
  - id: alarm-timeout-handler
    desc: Alarm-based execution timeout
    crit: baseline
    conf: 0.92
    for: [c]
    all:
      - id: alarm
      - id: sigalrm-handler
