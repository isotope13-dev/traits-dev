defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: day-of-month-trigger-source
    desc: Day of month payload trigger
    crit: notable
    conf: 0.95
    if:
      type: raw
      exact: "if Tiempo.wDay = 4 then"
  - id: october-trigger-source
    desc: October payload trigger
    crit: notable
    conf: 0.94
    if:
      type: raw
      exact: "iF Tiempo.wMonth = 10  Then"
composite_rules:
  - id: calendar-triggered-payload
    desc: Calendar gated payload logic
    crit: suspicious
    conf: 0.96
    any:
      - id: day-of-month-trigger-source
      - id: october-trigger-source
