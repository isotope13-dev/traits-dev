# Timer queue create/delete lifecycle.
defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: timer-queue-lifecycle
    desc: Timer queue create + delete lifecycle
    crit: baseline
    conf: 0.9
    all:
      - id: micro-behaviors/time/schedule/callback/create::create-timer-queue-timer-sym
      - id: micro-behaviors/time/schedule/callback/delete::delete-timer-queue-timer-sym
