# Timer Queue Callback APIs (Windows)
# Thread pool timer APIs that execute callbacks - used legitimately
# but also abused for indirect code execution
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: create-timer-queue-timer-sym
    desc: CreateTimerQueueTimer symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CreateTimerQueueTimer"
  - id: delete-timer-queue-timer-sym
    desc: DeleteTimerQueueTimer symbol
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      exact: "DeleteTimerQueueTimer"
composite_rules:
  - id: timer-queue-lifecycle
    desc: Timer queue create + delete lifecycle
    crit: notable
    conf: 0.9
    all:
      - id: create-timer-queue-timer-sym
      - id: delete-timer-queue-timer-sym
