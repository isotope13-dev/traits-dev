# Browser-extension scheduled execution via chrome.alarms (periodic/one-shot
# wakeups that persist a service worker). Generic technique: scheduled task.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: chrome-alarms-create
    desc: Chrome alarm creation
    if:
      type: symbol
      kind: call
      regex: '(^|\.)alarms\.create$'
  - id: chrome-alarms-on-alarm
    desc: Chrome alarm event listener
    if:
      type: symbol
      kind: call
      regex: '(chrome|browser)\.alarms\.onAlarm\.addListener|alarms\.onAlarm\.addListener'
composite_rules:
  - id: chrome-alarm-notification-reminder
    desc: Chrome extension alarm notification reminder
    crit: notable
    conf: 0.92
    all:
      - id: chrome-alarms-on-alarm
      - id: micro-behaviors/ui/dialog/webextension::chrome-notifications-create
