defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: setInterval-http-call
    desc: setInterval with http
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: setInterval.{0,50}http
  - id: setInterval-axios
    desc: setInterval with axios
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: setInterval.{0,50}axios
  - id: setInterval-fetch
    desc: setInterval with fetch
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: setInterval.{0,50}fetch
  - id: setInterval-function
    desc: setInterval with function callback
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: setInterval\s*\(\s*function
  - id: setTimeout-recursive
    desc: setTimeout in recursive pattern
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/library/runtime::next-edge-runtime-bundle
    if:
      type: string_literal
      regex: setTimeout.{0,50}setTimeout
composite_rules:
  - id: setInterval-http
    desc: setInterval with HTTP calls
    crit: notable
    conf: 0.85
    any:
      - id: setInterval-http-call
      - id: setInterval-axios
      - id: setInterval-fetch
