defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: setInterval
    desc: setInterval timer usage
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: setInterval
  - id: setTimeout
    desc: Schedules a JavaScript callback with setTimeout
    crit: baseline
    conf: 0.5
    if:
      type: symbol
      kind: call
      exact: setTimeout
  - id: repeated-settimeout
    desc: Repeated setTimeout timer usage
    crit: notable
    conf: 0.9
    count_min: 6
    if:
      id: micro-behaviors/time/schedule/interval::setTimeout
