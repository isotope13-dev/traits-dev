# Neutral retry/backoff timing-config field names. "Jitter" (exponential
# backoff with jitter) and "PollInterval" are standard resilience-config
# fields in Go cloud/gRPC/k8s clients; on their own they carry no intent.
# C2 beacon-timing composites reference these cross-directory and supply the
# intent via co-occurring frame-padding evidence.
defaults:
  platforms: [windows, linux, macos]
  for: [go]
traits:
  - id: jitter-config-field
    desc: Jitter timing/backoff config field
    crit: component
    conf: 0.85
    if:
      type: text
      word: Jitter
  - id: poll-interval-config-field
    desc: Polling interval config field
    crit: component
    conf: 0.82
    if:
      type: text
      word: PollInterval
