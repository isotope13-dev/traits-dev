defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.86

traits:
  - id: android-timer-task-reference
    desc: Android TimerTask reference
    if:
      type: text
      substr: "Ljava/util/TimerTask;"

  - id: android-fixed-rate-scheduler
    desc: Android fixed-rate scheduler
    if:
      type: text
      substr: "scheduleAtFixedRate"

  - id: android-alarm-manager-reference
    desc: Android AlarmManager reference
    if:
      type: text
      substr: "Landroid/app/AlarmManager;"

  - id: android-pending-intent-reference
    desc: Android PendingIntent reference
    if:
      type: text
      substr: "Landroid/app/PendingIntent;"

composite_rules:
  - id: android-repeating-timer-task
    desc: Android repeating timer task
    crit: notable
    conf: 0.9
    all:
      - id: android-timer-task-reference
      - id: android-fixed-rate-scheduler

  - id: android-scheduled-pending-intent
    desc: Android scheduled pending intent
    crit: notable
    conf: 0.9
    all:
      - id: android-alarm-manager-reference
      - id: android-pending-intent-reference
