defaults:
  platforms: [windows, unix]
  for: [php]
  crit: notable
  conf: 0.9

traits:
  - id: wp-cron-schedules-filter
    desc: WordPress cron schedules filter
    if:
      type: text
      regex: "add_filter\\s*\\(\\s*['\"]cron_schedules['\"]"
  - id: wp-schedule-event
    desc: WordPress schedules cron event
    if:
      type: symbol
      exact: wp_schedule_event
  - id: wp-next-scheduled
    desc: WordPress scheduled event query
    crit: baseline
    if:
      type: symbol
      exact: wp_next_scheduled
  - id: wp-clear-scheduled-hook
    desc: WordPress clears scheduled hook
    crit: notable
    if:
      type: symbol
      exact: wp_clear_scheduled_hook
