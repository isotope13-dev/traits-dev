defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  # Go's runtime uses CreateWaitableTimerExW + SetWaitableTimer to implement
  # time.Sleep / time.After on Windows; every Go Windows binary imports these.
  # Downgrade on Go binaries so only deliberate timer primitives in non-Go
  # binaries stay at notable.
  - id: create-waitable-timer-ex
    desc: Create extended waitable timer
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: CreateWaitableTimerExW
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: open-waitable-timer
    desc: Open waitable timer handle
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: OpenWaitableTimerA
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: set-waitable-timer
    desc: Configure waitable timer
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: SetWaitableTimer
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-pe-symtab
composite_rules:
  - id: create-and-set-waitable-timer
    desc: Create and arm waitable timer
    crit: notable
    conf: 0.9
    all:
      - id: create-waitable-timer-ex
      - id: set-waitable-timer
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: timer-persistence-primitives
    desc: Timer persistence primitives
    crit: suspicious
    conf: 0.88
    all:
      - id: open-waitable-timer
      - id: micro-behaviors/ui/window/manage/control::set-timer
