defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: create-waitable-timer-ex
    desc: Create extended waitable timer
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: CreateWaitableTimerExW
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: open-waitable-timer
    desc: Open waitable timer handle
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: OpenWaitableTimerA
  - id: set-waitable-timer
    desc: Configure waitable timer
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: SetWaitableTimer
    unless:
      - id: metadata/signed/platform::microsoft-windows
composite_rules:
  - id: create-and-set-waitable-timer
    desc: Create and arm waitable timer
    crit: notable
    conf: 0.9
    all:
      - id: create-waitable-timer-ex
      - id: set-waitable-timer
  - id: timer-persistence-primitives
    desc: Timer persistence primitives
    crit: notable
    conf: 0.88
    all:
      - id: open-waitable-timer
      - id: micro-behaviors/ui/window/manage::set-timer
