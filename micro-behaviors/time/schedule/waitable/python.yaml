# Waitable scheduling operations (Python)
# Neutral capability: a timed Event wait may implement coordination, polling,
# or a deferred task. Intent comes from the surrounding behavior.
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable

traits:
  - id: event-wait-call
    desc: Python Event wait call
    conf: 0.86
    if:
      type: symbol
      kind: call
      regex: '(^|\.)event\.wait$'

