# JavaScript Timing Jitter
# Detects use of Math.random() in a setTimeout delay argument.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
  conf: 0.8

traits:
  - id: long-settimeout-delay
    desc: JavaScript setTimeout with long delay
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'setTimeout\s*\(\s*[^,()]{1,80},\s*[0-9]{7,}\s*\)'
  - id: settimeout-random-delay
    desc: setTimeout delay uses Math.random jitter
    conf: 0.88
    if:
      type: text
      regex: 'setTimeout\s*\(\s*[^,\n]{1,120},\s*[^)\n]{0,80}Math\.random\s*\('
