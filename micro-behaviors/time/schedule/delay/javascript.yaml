# JavaScript Timing Jitter
# Detects use of Math.random() in setTimeout/setInterval delay arguments
# to randomize execution timing — commonly used for sandbox evasion
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: component
  conf: 0.8

traits:
  - id: settimeout-random-delay
    desc: setTimeout delay uses Math.random jitter
    conf: 0.88
    if:
      type: text
      regex: "setTimeout\\s*\\([^)]{0,80}Math\\.random"
