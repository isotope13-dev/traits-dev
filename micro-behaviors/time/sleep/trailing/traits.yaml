defaults:
  platforms: [unix, windows]
traits:
  - id: trailing-sleep
    desc: Ends the script with a sleep command
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: 'sleep\s+\d+[smhdw]?(\s+|$)'
      offset_range: [-32, null] # Look only at the end of the file
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - type: text
        regex: '\bXvfb\b[\s\S]{0,900}\bsleep\s+\d+'
