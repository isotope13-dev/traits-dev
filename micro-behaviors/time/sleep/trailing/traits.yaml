defaults:
  platforms: [unix, linux, macos, windows]
traits:
  - id: trailing-sleep
    desc: Trailing sleep command
    crit: notable
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: 'sleep\s+\d+[smhdw]?(\s+|$)'
      offset_range: [-32, null] # Look only at the end of the file
