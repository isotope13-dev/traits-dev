defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: rust-thread-sleep
    desc: Rust std::thread::sleep delay call
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: 'std::thread::sleep'
  - id: rust-tokio-interval
    desc: Rust Tokio interval timer
    crit: baseline
    conf: 0.85
    if:
      type: text
      substr: 'tokio::time::interval'
  - id: rust-duration-from
    desc: Rust Duration::from_secs/millis constructor
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'Duration::from_(secs|millis)'
