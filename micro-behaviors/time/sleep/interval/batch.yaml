defaults:
  platforms: [windows]
  for: [batch]
  crit: baseline
  attack: "T1497.003"
traits:
  - id: batch-timeout-delay
    desc: Batch timeout delay command
    conf: 0.7
    if:
      type: text
      regex: '(?i)\btimeout\s+/t\s+\d{1,5}\b'
  - id: batch-silent-timeout-delay
    desc: Batch silent timeout delay
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)\btimeout\s+/t\s+\d{1,5}\s+/nobreak\s*>nul\b'
