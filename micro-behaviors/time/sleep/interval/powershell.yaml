defaults:
  platforms: [windows]
  for: [powershell]
  crit: baseline
traits:
  - id: ps-start-sleep
    desc: PowerShell Start-Sleep call
    conf: 0.7
    if:
      type: text
      substr: Start-Sleep
  - id: ps-tight-ms-sleep
    desc: Start-Sleep under 500 ms
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Start-Sleep\s+-Milliseconds\s+([1-9]\d{0,2}|[1-4]\d{2}|500)\b
      case_insensitive: true
