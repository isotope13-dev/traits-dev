defaults:
  platforms: [windows, unix]
  for: [python]
  crit: baseline
traits:
  - id: python-sleep-call
    desc: Python sleep call
    conf: 0.65
    if:
      type: text
      regex: '\.sleep\('
    unless:
      - id: metadata/lang/embedded::python
      - type: basename
        regex: '\.(java|kt)$'
  - id: python-sleep-10s
    desc: Python ten-second sleep
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.sleep\(\s*10\s*\)'
    unless:
      - id: metadata/lang/embedded::python
      - type: basename
        regex: '\.(java|kt)$'
  - id: python-sleep-1s-plus
    desc: Python one-second-plus sleep
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\.sleep\(\s*(?:[1-9]\d*(?:\.\d+)?|[A-Z][A-Z0-9_]*_SECONDS)\s*\)'
    unless:
      - id: metadata/lang/embedded::python
      - type: basename
        regex: '\.(java|kt)$'
composite_rules:
  - id: python-periodic-loop
    desc: Python periodic timed loop
    crit: notable
    conf: 0.82
    all:
      - id: micro-behaviors/data/control-flow/analysis::while-loop
    any:
      - id: python-sleep-1s-plus
      - id: python-sleep-10s
    downgrade:
      any:
        - id: metadata/package/testing/presence::test-directory
        - id: metadata/package/testing/scripted::pytest
