defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, javascript, powershell, batch, pe, shell]
traits:
  - id: encrypt-fn
    desc: encrypt function
    crit: notable
    conf: 0.4
    if:
      type: string
      substr: "encrypt"
  - id: cipher-keyword
    desc: cipher keyword
    crit: notable
    conf: 0.4
    if:
      type: string
      substr: "cipher"
  - id: create-cipheriv
    desc: createCipheriv function
    crit: notable
    conf: 0.5
    if:
      type: raw
      substr: "createCipheriv"
  - id: aes-keyword
    desc: AES keyword
    crit: notable
    conf: 0.4
    if:
      type: string
      exact: "AES"
  - id: blowfish-keyword
    desc: Blowfish keyword
    crit: notable
    conf: 0.4
    if:
      type: string
      substr: "Blowfish"
  - id: fixed-iv-deezer
    desc: Hardcoded IV (Deezer/predictable)
    crit: suspicious
    conf: 0.7
    if:
      type: raw
      regex: '(IV|iv).{0,32}0001020304050607'
  - id: fixed-iv-common-a
    desc: Hardcoded IV (0001020304050607 pattern)
    crit: suspicious
    conf: 0.7
    if:
      type: string
      exact: '0001020304050607'
  - id: fixed-iv-common-hex
    desc: Hardcoded IV (0123456789abcdef pattern)
    crit: suspicious
    conf: 0.7
    if:
      type: raw
      regex: '(?i)(iv|nonce).{0,40}0123456789abcdef'
  - id: openssl-evp-encrypt
    desc: OpenSSL EVP encryption functions
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: EVP_(Encrypt|Cipher)Init_ex|AES_set_encrypt_key|AES_cbc_encrypt
composite_rules:
  - id: encryption-functions
    desc: Encryption functions
    crit: notable
    conf: 0.5
    any:
      - id: encrypt-fn
      - id: cipher-keyword
      - id: create-cipheriv
      - id: aes-keyword
      - id: blowfish-keyword
  - id: fixed-iv-common
    desc: Hardcoded IV (common test pattern)
    crit: suspicious
    conf: 0.7
    any:
      - id: fixed-iv-common-a
      - id: fixed-iv-common-hex
