traits:
  - id: alea-constant-1
    desc: Alea PRNG constant (2^-32)
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: '2\.3283064365386963e-10'
  - id: alea-constant-2
    desc: Alea PRNG constant (0xefc8249d)
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: 'efc8249d'
  - id: alea-constant-3
    desc: Alea PRNG constant (2^-53)
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: '1\.1102230246251565e-16'
  - id: uheprng-name
    desc: uheprng function name
    crit: notable
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: uheprng
  - id: mash-name
    desc: Mash PRNG helper function
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: Mash
composite_rules:
  - id: alea-prng-constants
    desc: Uses Alea PRNG magic constants
    crit: suspicious
    conf: 0.95
    all:
      - id: alea-constant-1
      - id: alea-constant-2
      - id: alea-constant-3
  - id: uheprng-function
    desc: Implementation of uheprng (Alea PRNG variant)
    crit: suspicious
    conf: 0.95
    any:
      - id: uheprng-name
      - id: mash-name
