# Cryptographic Capabilities - Secure Random
defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  # === Secure random atomic indicators ===
  # dev-urandom: use micro-behaviors/hardware/random/device::urandom (canonical)
  - id: dev-random
    desc: /dev/random access
    conf: 0.7
    if:
      type: string_value
      substr: /dev/random
  - id: rand-bytes
    desc: RAND_bytes function
    conf: 0.8
    if:
      type: string_value
      substr: RAND_bytes
  - id: getrandom
    desc: getrandom syscall
    conf: 0.8
    if:
      type: string_value
      substr: getrandom
  - id: arc4random
    desc: arc4random function
    conf: 0.8
    if:
      type: string_value
      substr: arc4random
  - id: getentropy
    desc: getentropy function
    conf: 0.8
    if:
      type: string_value
      substr: getentropy
  - id: secrandomcopybytes
    desc: SecRandomCopyBytes (macOS)
    conf: 0.8
    if:
      type: string_value
      substr: SecRandomCopyBytes
  - id: cryptdll-cdlocaterng
    desc: Windows cryptdll.dll CDLocateRng reference
    crit: notable
    conf: 0.8
    for: [pe, dll]
    platforms: [windows]
    if:
      type: string_value
      substr: CDLocateRng
composite_rules:
  # Secure random
  - id: secure-random
    desc: Secure random number generation
    conf: 0.8
    any:
      - id: micro-behaviors/hardware/random/device::urandom
      - id: dev-random
      - id: rand-bytes
      - id: getrandom
      - id: arc4random
      - id: getentropy
      - id: secrandomcopybytes
