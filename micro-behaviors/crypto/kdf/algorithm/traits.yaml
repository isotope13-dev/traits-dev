defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, go]
traits:
  - id: pbkdf2
    desc: PBKDF2 key derivation
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: PBKDF2
      case_insensitive: true
    not:
      - substr: BCRYPT_PBKDF2_ALG_HANDLE
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/file/text/catalog::vscode-php-global-functions-catalog
  - id: scrypt
    desc: scrypt key derivation
    conf: 0.75
    if:
      type: text
      word: scrypt
      case_insensitive: true
  - id: argon2
    desc: argon2 key derivation
    conf: 0.75
    if:
      type: text
      substr: argon2
      case_insensitive: true
  - id: bcrypt
    desc: bcrypt password hashing
    conf: 0.75
    if:
      type: text
      word: bcrypt
      case_insensitive: true
  - id: hkdf
    desc: HKDF key derivation
    conf: 0.75
    if:
      type: text
      exact: HKDF
  - id: evp-pkey-derive
    desc: EVP_PKEY_derive function
    conf: 0.75
    if:
      type: text
      substr: EVP_PKEY_derive
  - id: pkcs5-pbkdf2
    desc: PKCS5_PBKDF2_HMAC function
    conf: 0.75
    if:
      type: text
      substr: PKCS5_PBKDF2_HMAC
  - id: yescrypt-export
    desc: yescrypt KDF export
    crit: component
    conf: 0.95
    for: [pe, elf, macho]
    if:
      type: export
      exact: yescrypt_kdf
  - id: pbkdf2-sha256-export
    desc: PBKDF2-SHA256 export
    crit: component
    conf: 0.95
    for: [pe, elf, macho]
    if:
      type: export
      exact: PBKDF2_SHA256
  - id: libcperciva-sha256-export
    desc: libcperciva SHA256 export
    crit: component
    conf: 0.95
    for: [pe, elf, macho]
    if:
      type: export
      regex: '^libcperciva_(HMAC_)?SHA256_(Init|Update|Final|Buf)$'
composite_rules:
  - id: key-derivation
    desc: Key derivation function usage
    conf: 0.75
    any:
      - id: pbkdf2
      - id: scrypt
      - id: argon2
      - id: bcrypt
      - id: hkdf
      - id: evp-pkey-derive
      - id: pkcs5-pbkdf2
      - id: yescrypt-export
      - id: pbkdf2-sha256-export
  - id: password-kdf-library-exports
    desc: Password KDF library exports
    crit: component
    conf: 0.95
    all:
      - id: yescrypt-export
      - id: pbkdf2-sha256-export
      - id: libcperciva-sha256-export
