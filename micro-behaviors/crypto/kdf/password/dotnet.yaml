defaults:
  platforms:
    - unix
    - windows
  for:
    - csharp
traits:
  - id: passwordderivebytes
    desc: PasswordDeriveBytes key derivation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: PasswordDeriveBytes
  - id: rfc2898derivebytes
    desc: RFC2898Rfc2898DeriveBytes key derivation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Rfc2898DeriveBytes
    unless:
      - type: basename
        regex: ^System\.Security\.Cryptography\.Algorithms\.dll$
      - type: basename
        exact: netstandard.dll
  - id: rfc2898derivebytes-data
    desc: Rfc2898DeriveBytes in data
    crit: notable
    conf: 0.9
    for: [data]
    if:
      type: text
      regex: '(?i)Rfc2898DeriveBytes|Rfc28.{0,160}Der.{0,32}ive.{0,32}Byte.{0,32}98'
  - id: sha1-kdf
    desc: SHA1 KDF parameter
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: SHA1
composite_rules:
  - id: dotnet-password-kdf
    desc: .NET password based KDF
    crit: notable
    conf: 0.92
    all:
      - id: passwordderivebytes
      - id: sha1-kdf
