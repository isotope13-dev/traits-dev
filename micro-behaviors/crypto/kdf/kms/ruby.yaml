# KMS Key Management - Ruby
# AWS KMS and similar key management service integration
defaults:
  platforms: [windows, unix]
  for: [ruby]
  crit: notable
traits:
  - id: kms-client
    desc: KMS client initialization
    conf: 0.85
    if:
      type: string_literal
      regex: KMS::Client|Aws::KMS
  - id: kms-generate-data-key
    desc: KMS generate data key
    conf: 0.9
    if:
      type: string_literal
      substr: generate_data_key
  - id: kms-encrypt-decrypt
    desc: KMS encrypt or decrypt operation
    conf: 0.85
    if:
      type: text
      regex: kms\.(encrypt|decrypt)\b
