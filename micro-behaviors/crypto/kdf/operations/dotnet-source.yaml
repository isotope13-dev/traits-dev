defaults:
  platforms:
    - windows
    - linux
    - macos
    - unix
    - android
    - ios
  for:
    - csharp
traits:
  - id: passwordderivebytes
    desc: PasswordDeriveBytes key derivation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: PasswordDeriveBytes
  - id: rfc2898derivebytes
    desc: RFC2898Rfc2898DeriveBytes key derivation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Rfc2898DeriveBytes
  - id: sha1-kdf
    desc: SHA1 KDF parameter
    crit: baseline
    conf: 0.8
    if:
      type: string_literal
      exact: SHA1
composite_rules:
  - id: dotnet-password-kdf
    desc: .NET password based KDF
    crit: notable
    conf: 0.92
    all:
      - id: passwordderivebytes
      - id: sha1-kdf
