defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: pbkdf2
    desc: PBKDF2 key derivation
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: PBKDF2
      case_insensitive: true
    not:
      - substr: BCRYPT_PBKDF2_ALG_HANDLE
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: scrypt
    desc: scrypt key derivation
    conf: 0.75
    if:
      type: text
      word: scrypt
      case_insensitive: true
  - id: argon2
    desc: argon2 key derivation
    conf: 0.75
    if:
      type: text
      substr: argon2
      case_insensitive: true
  - id: bcrypt
    desc: bcrypt password hashing
    conf: 0.75
    if:
      type: text
      word: bcrypt
      case_insensitive: true
  - id: hkdf
    desc: HKDF key derivation
    conf: 0.75
    if:
      type: text
      exact: HKDF
  - id: evp-pkey-derive
    desc: EVP_PKEY_derive function
    conf: 0.75
    if:
      type: text
      substr: EVP_PKEY_derive
  - id: pkcs5-pbkdf2
    desc: PKCS5_PBKDF2_HMAC function
    conf: 0.75
    if:
      type: text
      substr: PKCS5_PBKDF2_HMAC
composite_rules:
  - id: key-derivation
    desc: Key derivation function usage
    conf: 0.75
    any:
      - id: pbkdf2
      - id: scrypt
      - id: argon2
      - id: bcrypt
      - id: hkdf
      - id: evp-pkey-derive
      - id: pkcs5-pbkdf2
