# Go standard-library crypto package import markers.
#
# These are neutral capability signals — the binary references a crypto package
# — and are frequently present transitively (e.g. crypto/rsa is pulled in by
# net/http TLS), so they do not indicate program purpose: baseline capabilities,
# not intent. They live here, not under objectives/impact/ransom, per the
# taxonomy's "Matcher Defines Identity" rule (the matcher only detects an import
# string). The ransomware composite in
# objectives/impact/ransom/encrypt/threat-text references them cross-directory as
# one leg of a crypto + file-write + ransom-text combination.
defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe, wasm]
traits:
  - id: go-crypto-rsa-import
    desc: Go crypto/rsa package import
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: crypto/rsa
  - id: go-crypto-aes-import
    desc: Go crypto/aes package import
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: crypto/aes
  - id: go-crypto-cipher-import
    desc: Go crypto/cipher package import
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: crypto/cipher
