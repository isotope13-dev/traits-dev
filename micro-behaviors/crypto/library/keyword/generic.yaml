defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
- id: encrypt-keyword
  desc: Literal 'encrypt' crypto-operation term
  crit: component
  conf: 0.4
  if:
    type: text
    word: encrypt
    case_insensitive: true
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/documentation::unix-manpage
  - id: well-known/lib/monaco-editor/
- id: cipher-keyword
  desc: "Generic 'cipher' crypto term"
  crit: baseline
  conf: 0.4
  if:
    type: text
    word: cipher
    case_insensitive: true
- id: aes-keyword
  desc: AES keyword
  crit: notable
  conf: 0.4
  if:
    type: text
    exact: AES
- id: blowfish-keyword
  desc: "Blowfish block cipher reference"
  crit: baseline
  conf: 0.4
  if:
    type: text
    word: Blowfish
- id: blake3-keyword
  desc: BLAKE3 hash keyword
  crit: notable
  conf: 0.4
  if:
    type: text
    word: blake3
  unless:
  - id: metadata/package/files/system-package::shell-completion-script
- id: fixed-iv-deezer
  desc: Hardcoded IV (Deezer/predictable)
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: \b(IV|iv)\b.{0,32}\b0001020304050607\b
- id: fixed-iv-common-a
  desc: Common 16-byte crypto test vector
  crit: notable
  conf: 0.7
  if:
    type: text
    exact: '0001020304050607'
- id: fixed-iv-common-hex
  desc: Hardcoded IV (0123456789abcdef pattern)
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: (?i)\b(iv|nonce)\b[^A-Za-z0-9]{0,8}0123456789abcdef\b
  unless:
  - id: well-known/tool/sysadmin/nmap::nmap-source-tree
- id: openssl-evp-encrypt
  desc: OpenSSL EVP encryption functions
  crit: notable
  conf: 0.9
  for: [scripts, binaries, c, cpp]
  if:
    type: text
    regex: EVP_(Encrypt|Cipher)Init_ex|AES_set_encrypt_key|AES_cbc_encrypt
- id: aead-mode-keyword--mode-gcm
  desc: AEAD cipher-mode keyword (MODE_GCM)
  crit: notable
  conf: 0.4
  if:
    type: text
    word: MODE_GCM
- id: aead-mode-keyword--mode-ctr
  desc: AEAD cipher-mode keyword (MODE_CTR)
  crit: notable
  conf: 0.4
  if:
    type: text
    word: MODE_CTR
composite_rules:
- id: aead-mode-keyword
  desc: AEAD cipher-mode keyword (GCM/CTR)
  crit: notable
  conf: 0.4
  any:
  - id: aead-mode-keyword--mode-gcm
  - id: aead-mode-keyword--mode-ctr
- id: encryption-functions
  desc: Encryption API usage markers
  crit: notable
  conf: 0.5
  any:
  - id: cipher-keyword
  - id: aes-keyword
  - id: blowfish-keyword
- id: fixed-iv-common
  desc: Hardcoded IV (common test pattern)
  crit: suspicious
  conf: 0.7
  all:
  - id: encryption-functions
  any:
  - id: fixed-iv-common-a
  - id: fixed-iv-common-hex
