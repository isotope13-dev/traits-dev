# Defines a crypto-named function (encrypt/decrypt/hash) in JS/TS. These are
# ordinary names in any crypto library — defining one is NOT function shadowing
# (JS has no such builtin to shadow). Neutral crypto-presence building blocks;
# impersonation/exfil composites reference these cross-directory and add the
# real intent (e.g. function def co-located with HTTP exfil).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  size_max: 262144
traits:
  - id: js-encrypt-func-def
    desc: encrypt function definition
    crit: component
    conf: 0.6
    if:
      type: text
      regex: \bencrypt\b\s*[=:]\s*function\s*\(
    not:
      - substr: '"version":3,"file":'
    unless:
      - id: metadata/library/runtime::crypto-js-bundled-library
      - id: metadata/library/runtime::browserify-crypto-bundle
  - id: js-decrypt-func-def
    desc: decrypt function definition
    crit: component
    conf: 0.6
    if:
      type: text
      regex: \bdecrypt\b\s*[=:]\s*function\s*\(
    not:
      - substr: '"version":3,"file":'
    unless:
      - id: metadata/library/runtime::crypto-js-bundled-library
      - id: metadata/library/runtime::browserify-crypto-bundle
  - id: js-hash-func-def
    desc: hash function definition
    crit: component
    conf: 0.6
    if:
      type: text
      regex: \bhash\b\s*[=:]\s*function\s*\(
    not:
      - substr: '"version":3,"file":'
    unless:
      - id: metadata/library/runtime::crypto-js-bundled-library
      - id: metadata/library/runtime::browserify-crypto-bundle
