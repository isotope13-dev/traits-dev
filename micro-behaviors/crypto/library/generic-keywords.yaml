defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: encrypt-fn
    desc: encrypt function
    crit: notable
    conf: 0.4
    if:
      type: text
      word: encrypt
      case_insensitive: true
  - id: cipher-keyword
    desc: cipher keyword
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: cipher
      case_insensitive: true
  - id: create-cipheriv
    desc: createCipheriv function
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: createCipheriv
    unless:
      - id: metadata/package/testing/harness::electron-node-spec-harness
  - id: aes-keyword
    desc: AES keyword
    crit: notable
    conf: 0.4
    if:
      type: text
      exact: AES
  - id: blowfish-keyword
    desc: Blowfish keyword
    crit: baseline
    conf: 0.4
    if:
      type: text
      word: Blowfish
  - id: fixed-iv-deezer
    desc: Hardcoded IV (Deezer/predictable)
    crit: suspicious
    conf: 0.7
    if:
      type: raw
      regex: \b(IV|iv)\b.{0,32}\b0001020304050607\b
  - id: fixed-iv-common-a
    desc: Hardcoded IV (0001020304050607 pattern)
    crit: suspicious
    conf: 0.7
    if:
      type: text
      exact: '0001020304050607'
  - id: fixed-iv-common-hex
    desc: Hardcoded IV (0123456789abcdef pattern)
    crit: suspicious
    conf: 0.7
    if:
      type: raw
      regex: (?i)\b(iv|nonce)\b[^A-Za-z0-9]{0,8}0123456789abcdef\b
  - id: openssl-evp-encrypt
    desc: OpenSSL EVP encryption functions
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: EVP_(Encrypt|Cipher)Init_ex|AES_set_encrypt_key|AES_cbc_encrypt
composite_rules:
  - id: encryption-functions
    desc: Encryption API usage markers
    crit: notable
    conf: 0.5
    any:
      - id: encrypt-fn
      - id: cipher-keyword
      - id: create-cipheriv
      - id: aes-keyword
      - id: blowfish-keyword
  - id: fixed-iv-common
    desc: Hardcoded IV (common test pattern)
    crit: suspicious
    conf: 0.7
    any:
      - id: fixed-iv-common-a
      - id: fixed-iv-common-hex
