defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  mbc: C0027

composite_rules:
  - id: openssl-rsa-aes-hybrid-encryption
    desc: OpenSSL RSA and AES hybrid encryption
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/symmetric/aes/openssl::openssl-enc-aes
    any:
      - id: micro-behaviors/crypto/asymmetric/rsa::openssl-pkeyutl-encrypt
      - id: micro-behaviors/crypto/asymmetric/rsa::embedded-pem-pubkey
