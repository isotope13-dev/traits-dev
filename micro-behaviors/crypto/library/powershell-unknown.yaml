defaults:
  for: [powershell]
  platforms: [windows]
traits:
  - id: rsa-csp-blob
    desc: RSA CspBlob import operations
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ImportCspBlob
  - id: rijndael-managed
    desc: RijndaelManaged AES operations
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: RijndaelManaged
  - id: rsa-sign-and-verify
    desc: RSA sign and verify workflow
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(SignData|VerifyData)\('
  - id: fake-file-signatures
    desc: Adds fake file magic prefixes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: knownFS.Add("png"
composite_rules:
  - id: hybrid-crypto-payload-wrapper
    desc: Hybrid crypto payload wrapping
    crit: suspicious
    conf: 0.95
    all:
      - id: rsa-csp-blob
      - id: rijndael-managed
    any:
      - id: rsa-sign-and-verify
      - id: fake-file-signatures
    needs: 1
