defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8

traits:
- id: ap2-mandate-signing
  desc: AP2 payment or intent mandate signing
  if:
    type: symbol
    kind: call
    regex: '^sign(Intent|Payment)Mandate$'

- id: x402-payment-signing
  desc: x402 payment authorization signing
  if:
    type: symbol
    kind: call
    exact: signX402Payment

- id: xrpl-payment-signing
  desc: XRPL payment signing
  if:
    type: symbol
    kind: call
    exact: signXrplPayment

- id: xrpl-seed-wallet-derivation
  desc: XRPL wallet derived from seed
  if:
    type: symbol
    kind: call
    exact: XrplWallet.fromSeed

- id: generated-private-key-fallback
  desc: Ephemeral private-key generation
  if:
    type: symbol
    kind: call
    exact: generatePrivateKey

- id: x402-stablecoin-balance-query
  desc: x402 stablecoin balance query
  if:
    type: symbol
    kind: call
    exact: usdcBalance

- id: wallet-transaction-sign-call
  desc: Wallet or ledger transaction signing call
  if:
    type: text
    regex: '\b(ledger|wallet|keyStore\w*|this\.state\.ledger)\.sign(Transaction)?\s*\('
  unless:
  - id: metadata/package/testing/harness/runtime/

- id: x402-wrap-fetch-with-payment
  desc: x402 wrapFetchWithPayment call
  if:
    type: symbol
    exact: wrapFetchWithPayment

- id: x402-wrap-fetch-with-privacy
  desc: x402 privacy fetch wrapper call
  if:
    type: symbol
    exact: wrapFetchWithPrivacy

- id: x402-client-constructor
  desc: x402 client constructor
  if:
    type: text
    word: x402Client

- id: x402-payment-header
  desc: x402 payment header
  if:
    type: text
    word: X-PAYMENT

- id: x402-payment-protocol-header
  desc: x402 payment protocol header
  if:
    type: text
    word: X-Payment-Protocol

- id: viem-wallet-client
  desc: Viem wallet client creation
  if:
    type: symbol
    exact: createWalletClient

- id: viem-private-key-account
  desc: Viem private-key account creation
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: privateKeyToAccount

- id: eip3009-transfer-authorization
  desc: EIP-3009 transfer authorization
  if:
    type: text
    regex: '\bTransferWithAuthorization\b|validAfter.{0,120}validBefore.{0,120}nonce'

- id: wallet-sign-typed-data
  desc: Wallet typed-data signing
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: signTypedData

composite_rules:
- id: x402-fetch-payment-wrapper
  desc: x402 payment fetch wrapper
  crit: notable
  conf: 0.86
  any:
  - id: x402-wrap-fetch-with-payment
  - id: x402-wrap-fetch-with-privacy
  - id: x402-client-constructor
  - id: x402-payment-header
  - id: x402-payment-protocol-header
