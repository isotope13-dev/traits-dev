defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8

traits:
- id: x402-wrap-fetch-with-payment
  desc: x402 wrapFetchWithPayment call
  if:
    type: symbol
    exact: wrapFetchWithPayment

- id: x402-wrap-fetch-with-privacy
  desc: x402 privacy fetch wrapper call
  if:
    type: symbol
    exact: wrapFetchWithPrivacy

- id: x402-client-constructor
  desc: x402 client constructor
  if:
    type: text
    word: x402Client

- id: x402-payment-header
  desc: x402 payment header
  if:
    type: text
    word: X-PAYMENT

- id: x402-payment-protocol-header
  desc: x402 payment protocol header
  if:
    type: text
    word: X-Payment-Protocol

- id: viem-wallet-client
  desc: Viem wallet client creation
  if:
    type: symbol
    exact: createWalletClient

- id: viem-private-key-account
  desc: Viem private-key account creation
  crit: suspicious
  conf: 0.9
  if:
    type: symbol
    exact: privateKeyToAccount

- id: eip3009-transfer-authorization
  desc: EIP-3009 transfer authorization
  if:
    type: text
    regex: '\bTransferWithAuthorization\b|validAfter.{0,120}validBefore.{0,120}nonce'

- id: wallet-sign-typed-data
  desc: Wallet typed-data signing
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: signTypedData

composite_rules:
- id: x402-fetch-payment-wrapper
  desc: x402 payment fetch wrapper
  crit: notable
  conf: 0.86
  any:
  - id: x402-wrap-fetch-with-payment
  - id: x402-wrap-fetch-with-privacy
  - id: x402-client-constructor
  - id: x402-payment-header
  - id: x402-payment-protocol-header
