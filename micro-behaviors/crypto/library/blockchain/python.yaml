defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
- id: web3-import
  desc: Python Web3 library import
  conf: 0.9
  if:
    type: symbol
    exact: Web3
- id: eth-account-from-key
  desc: EVM account derived from private key
  conf: 0.92
  if:
    type: symbol
    exact: Account.from_key
- id: eth-account-create
  desc: EVM account/private key generation
  conf: 0.92
  if:
    type: symbol
    exact: Account.create
- id: eip712-sign-typed-data
  desc: EIP-712 typed data signing
  conf: 0.94
  if:
    type: symbol
    exact: account.sign_typed_data
- id: x402-resource-server
  desc: x402 EVM payment resource server
  conf: 0.94
  if:
    type: symbol
    exact: x402ResourceServer
- id: x402-payment-payload-validate
  desc: x402 payment payload validation
  conf: 0.94
  if:
    type: symbol
    exact: PaymentPayload.model_validate
- id: erc20-transfer-call
  desc: ERC-20 token transfer call construction
  conf: 0.92
  if:
    type: symbol
    regex: '\.functions\.transfer$'
- id: web3-build-transaction
  desc: Web3 build_transaction call
  conf: 0.9
  if:
    type: symbol
    exact: build_transaction
- id: web3-sign-transaction
  desc: Web3 sign_transaction call
  conf: 0.92
  if:
    type: symbol
    exact: sign_transaction
- id: web3-account-sign
  desc: Web3 account signing call
  conf: 0.92
  if:
    type: symbol
    regex: '(^|\.)(sign_transaction|sign_message|sign_typed_data)$'
- id: web3-send-raw-transaction
  desc: Web3 send_raw_transaction call
  conf: 0.92
  if:
    type: symbol
    regex: '(^|\.)send_raw_transaction$'
- id: cosmos-broadcast-tx
  desc: Cosmos broadcast_tx call
  conf: 0.9
  if:
    type: text
    regex: \bbroadcast_tx(_sync|_commit|_async)?\b|broadcast_tx
- id: staking-sign-flow--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (secp256k1|bech32).{0,80}(broadcast|tx)
  count_max: 1006395
- id: staking-sign-flow--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (sign_doc|sign_bytes).{0,80}(broadcast|tx)
  count_max: 1006396
- id: staking-sign-flow--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: ledger.{0,40}sign
  count_max: 1006397
- id: sha3-keccak-hash
  desc: SHA3 or keccak hash call
  conf: 0.85
  if:
    type: text
    regex: \b(sha3|keccak|Web3\.keccak)\s*\(
- id: walletd-daemon-ref
  desc: Wallet daemon reference
  crit: component
  conf: 0.88
  if:
    type: text
    substr: walletd
- id: walletd-passphrase-env
  desc: Wallet daemon passphrase environment variable
  crit: component
  conf: 0.9
  if:
    type: text
    substr: WALLETD_KEYSTORE_PASSPHRASE
- id: walletd-node-indexer-config
  desc: Wallet daemon node or indexer configuration
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'EXFER_(NODE|INDEXER)_RPC|--(node|indexer)-rpc'
- id: walletd-loopback-bind
  desc: Wallet daemon loopback bind configuration
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 127.0.0.1:7448
- id: walletd-github-release-download
  desc: Wallet daemon GitHub release download
  crit: component
  conf: 0.9
  if:
    type: text
    substr: releases/download
- id: walletd-init-seeded
  desc: Wallet daemon seeded keystore init
  crit: component
  conf: 0.9
  if:
    type: text
    substr: init-seeded
- id: walletd-seed-enc-path
  desc: Wallet daemon encrypted seed path
  crit: component
  conf: 0.9
  if:
    type: text
    substr: wallets/seed.enc
- id: walletd-recovery-phrase-warning
  desc: Wallet daemon recovery phrase warning
  crit: component
  conf: 0.9
  if:
    type: text
    substr: BACK UP THIS RECOVERY PHRASE
composite_rules:
- id: staking-sign-flow
  desc: Blockchain sign-doc or ledger signing
  crit: baseline
  conf: 0.88
  any:
  - id: staking-sign-flow--rx-1
  - id: staking-sign-flow--rx-2
  - id: staking-sign-flow--rx-3
- id: managed-hot-wallet-client-context
  desc: Managed hot-wallet client context
  crit: baseline
  conf: 0.94
  all:
  - id: walletd-daemon-ref
  - id: walletd-passphrase-env
  - id: walletd-node-indexer-config
  - id: walletd-loopback-bind
- id: verified-walletd-release-fetcher-context
  desc: Checksum-verified wallet daemon release fetcher
  crit: baseline
  conf: 0.94
  all:
  - id: walletd-daemon-ref
  - id: walletd-github-release-download
  - id: micro-behaviors/os/service/legitimate::sha256sums-verification-reference
- id: seeded-wallet-keystore-context
  desc: Wallet daemon seeded keystore initializer
  crit: baseline
  conf: 0.94
  all:
  - id: walletd-daemon-ref
  - id: walletd-init-seeded
  - id: walletd-seed-enc-path
  any:
  - id: walletd-recovery-phrase-warning
  - id: walletd-passphrase-env
