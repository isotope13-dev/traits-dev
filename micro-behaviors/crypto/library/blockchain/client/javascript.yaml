defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9

traits:
- id: ethereum-explorer-transaction-url
  desc: Ethereum-compatible explorer transaction URL
  if:
    type: text
    regex: '(?i)(basescan\.org|optimistic\.etherscan\.io|polygonscan\.com|arbiscan\.io)/tx/'

- id: ethereum-jsonrpc-transaction-method
  desc: Ethereum JSON-RPC transaction lookup method
  if:
    type: text
    regex: 'eth_(getLogs|getTransactionByHash|getTransactionReceipt)'

composite_rules:
- id: ethereum-explorer-rpc-transaction-lookup
  desc: Looks up an Ethereum transaction through an explorer and JSON-RPC
  crit: notable
  conf: 0.9
  all:
  - id: ethereum-explorer-transaction-url
  - id: ethereum-jsonrpc-transaction-method
