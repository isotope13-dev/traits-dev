defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
- id: web3-import
  desc: Python Web3 library import
  conf: 0.9
  if:
    type: symbol
    exact: Web3
- id: eth-account-from-key
  desc: EVM account derived from private key
  conf: 0.92
  if:
    type: symbol
    exact: Account.from_key
- id: eth-account-create
  desc: EVM account/private key generation
  conf: 0.92
  if:
    type: symbol
    exact: Account.create
- id: eip712-sign-typed-data
  desc: EIP-712 typed data signing
  conf: 0.94
  if:
    type: symbol
    exact: account.sign_typed_data
- id: x402-resource-server
  desc: x402 EVM payment resource server
  conf: 0.94
  if:
    type: symbol
    exact: x402ResourceServer
- id: x402-payment-payload-validate
  desc: x402 payment payload validation
  conf: 0.94
  if:
    type: symbol
    exact: PaymentPayload.model_validate
- id: etherscan-api-url
  desc: Etherscan API client URL
  conf: 0.9
  if:
    type: text
    substr: https://api.etherscan.io/api
- id: bscscan-api-url
  desc: BscScan API client URL
  conf: 0.9
  if:
    type: text
    substr: https://api.bscscan.com/api
- id: polygonscan-api-url
  desc: PolygonScan API client URL
  conf: 0.9
  if:
    type: text
    substr: https://api.polygonscan.com/api
- id: arbiscan-api-url
  desc: Arbiscan API client URL
  conf: 0.9
  if:
    type: text
    substr: https://api.arbiscan.io/api
- id: coingecko-simple-price-api
  desc: CoinGecko simple price API
  conf: 0.9
  if:
    type: text
    substr: https://api.coingecko.com/api/v3/simple/price
- id: cloudflare-eth-rpc-url
  desc: Cloudflare Ethereum RPC URL
  conf: 0.9
  if:
    type: text
    substr: https://cloudflare-eth.com
- id: publicnode-sepolia-rpc-url
  desc: PublicNode Sepolia RPC URL
  conf: 0.9
  if:
    type: text
    substr: https://ethereum-sepolia-rpc.publicnode.com
- id: binance-bsc-rpc-url
  desc: Binance BSC RPC URL
  conf: 0.9
  if:
    type: text
    substr: https://bsc-dataseed.binance.org
- id: polygon-rpc-url
  desc: Polygon public RPC URL
  conf: 0.9
  if:
    type: text
    substr: https://polygon-rpc.com
- id: erc20-transfer-call
  desc: ERC-20 token transfer call construction
  conf: 0.92
  if:
    type: symbol
    regex: '\.functions\.transfer$'
- id: web3-build-transaction
  desc: Web3 build_transaction call
  conf: 0.9
  if:
    type: symbol
    exact: build_transaction
- id: web3-sign-transaction
  desc: Blockchain sign_transaction call
  conf: 0.92
  if:
    type: symbol
    exact: sign_transaction
- id: web3-account-sign
  desc: Blockchain account or message signing call
  conf: 0.92
  if:
    type: symbol
    regex: '(^|\.)(sign_transaction|sign_message|sign_typed_data)$'
- id: web3-send-raw-transaction
  desc: Web3 send_raw_transaction call
  conf: 0.92
  if:
    type: symbol
    regex: '(^|\.)send_raw_transaction$'
- id: cosmos-broadcast-tx
  desc: Cosmos broadcast_tx call
  conf: 0.9
  if:
    type: text
    regex: \bbroadcast_tx(_sync|_commit|_async)?\b|broadcast_tx
- id: cosmos-delegate-message-type
  desc: Cosmos delegate message type
  conf: 0.92
  if:
    type: text
    regex: '\bMsgDelegate\b|\bcosmos-sdk/MsgDelegate\b'
- id: cosmos-withdraw-reward-message-type
  desc: Cosmos staking reward message type
  conf: 0.92
  if:
    type: text
    regex: '\bMsgWithdrawDelegatorReward\b|\bcosmos-sdk/MsgWithdrawDelegationReward\b'
- id: staking-sign-flow--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (secp256k1|bech32).{0,80}(broadcast|tx)
  count_max: 1006395
- id: staking-sign-flow--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (sign_doc|sign_bytes).{0,80}(broadcast|tx)
  count_max: 1006396
- id: staking-sign-flow--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: ledger.{0,40}sign
  count_max: 1006397
- id: sha3-keccak-hash
  desc: SHA3 or keccak hash call
  conf: 0.85
  if:
    type: text
    regex: \b(sha3|keccak|Web3\.keccak)\s*\(
- id: walletd-daemon-ref
  desc: Wallet daemon reference
  crit: component
  conf: 0.88
  if:
    type: text
    substr: walletd
- id: walletd-passphrase-env
  desc: Wallet daemon passphrase environment variable
  crit: component
  conf: 0.9
  if:
    type: text
    substr: WALLETD_KEYSTORE_PASSPHRASE
- id: walletd-node-indexer-config
  desc: Wallet daemon node or indexer configuration
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'EXFER_(NODE|INDEXER)_RPC|--(node|indexer)-rpc'
- id: walletd-loopback-bind
  desc: Wallet daemon loopback bind configuration
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 127.0.0.1:7448
- id: walletd-github-release-download
  desc: Wallet daemon GitHub release download
  crit: component
  conf: 0.9
  if:
    type: text
    substr: releases/download
- id: walletd-init-seeded
  desc: Wallet daemon seeded keystore init
  crit: component
  conf: 0.9
  if:
    type: text
    substr: init-seeded
- id: walletd-seed-enc-path
  desc: Wallet daemon encrypted seed path
  crit: component
  conf: 0.9
  if:
    type: text
    substr: wallets/seed.enc
- id: walletd-recovery-phrase-warning
  desc: Wallet daemon recovery phrase warning
  crit: component
  conf: 0.9
  if:
    type: text
    substr: BACK UP THIS RECOVERY PHRASE
- id: crypto-exchange-fetch-method-context
  desc: "ccxt exchange fetch method"
  crit: component
  conf: 0.9
  if:
    type: text
    # Canonical ccxt unified-API methods; avoids generic def fetch_data/_user.
    regex: 'def\s+fetch_(ohlcv|order_book|ticker|balance)s?\b'
- id: crypto-exchange-watch-method-context
  desc: Crypto exchange watch method
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(async\s+)?def\s+watch_[a-z_]{3,32}\b'
- id: crypto-exchange-ccxt-import
  desc: CCXT exchange client import
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(^|\n)\s*(import|from)\s+ccxt\b'
- id: crypto-exchange-ccxt-generated
  desc: CCXT generated source marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: 'github.com/ccxt/ccxt'
- id: crypto-exchange-base-module-path
  desc: Crypto exchange base module path
  crit: component
  conf: 0.95
  if:
    type: path
    regex: 'ccxt[\\/].{0,20}base[\\/]'
- id: crypto-exchange-constructor-args
  desc: Exchange constructor args type
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'class ConstructorArgs'
- id: crypto-exchange-wallet-address-field
  desc: Exchange wallet address field
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'walletAddress'
- id: crypto-exchange-rate-limit-field
  desc: Exchange rate limit field
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'enableRateLimit'
- id: crypto-exchange-implicit-api-class
  desc: Crypto exchange implicit API class
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'class ImplicitAPI'
- id: crypto-exchange-entry-call
  desc: Crypto exchange entry call
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: Entry
- id: crypto-exchange-doc-context
  desc: Crypto exchange documentation
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)crypto(currency)? (trading API|exchange)'
- id: mnemonic-library-class
  desc: Mnemonic library class
  crit: component
  conf: 0.94
  if:
    type: text
    substr: 'class Mnemonic'
- id: mnemonic-library-wordlist
  desc: Mnemonic wordlist member
  crit: component
  conf: 0.94
  if:
    type: text
    substr: self.wordlist
- id: mnemonic-library-pbkdf2-rounds
  desc: Mnemonic PBKDF2 rounds constant
  crit: component
  conf: 0.94
  if:
    type: text
    substr: PBKDF2_ROUNDS
- id: crypto-keccak-word
  desc: Keccak implementation marker
  crit: component
  conf: 0.9
  if:
    type: text
    word: Keccak
- id: crypto-permutation-word
  desc: Crypto permutation marker
  crit: component
  conf: 0.9
  if:
    type: text
    word: permutation
- id: crypto-number-theory-phrase
  desc: Number theory marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: number theory
- id: crypto-polynomial-word
  desc: Polynomial math marker
  crit: component
  conf: 0.9
  if:
    type: text
    word: polynomial
composite_rules:
- id: cosmos-staking-reward-claim-flow
  desc: Cosmos staking reward claim flow
  crit: notable
  conf: 0.9
  all:
  - id: cosmos-withdraw-reward-message-type
  - id: cosmos-broadcast-tx
  any:
  - id: metadata/library/web3::defi-reward-claim-text
  - id: staking-sign-flow
- id: crypto-exchange-api-client-context
  desc: Crypto exchange API client
  crit: baseline
  conf: 0.9
  any:
  - id: crypto-exchange-fetch-method-context
  - id: crypto-exchange-websocket-client-context
  - id: crypto-exchange-types-context
  - id: crypto-exchange-implicit-api-context
  - id: crypto-exchange-ccxt-generated
  - id: crypto-exchange-base-module-path
  - id: crypto-exchange-doc-context
- id: crypto-exchange-websocket-client-context
  desc: Crypto exchange websocket client
  crit: baseline
  conf: 0.92
  all:
  - id: crypto-exchange-ccxt-import
  - id: crypto-exchange-watch-method-context
- id: crypto-exchange-types-context
  desc: Crypto exchange typed client args
  crit: baseline
  conf: 0.9
  all:
  - id: crypto-exchange-constructor-args
  - id: crypto-exchange-wallet-address-field
  - id: crypto-exchange-rate-limit-field
- id: crypto-exchange-implicit-api-context
  desc: Crypto exchange implicit API
  crit: component
  conf: 0.9
  all:
  - id: crypto-exchange-implicit-api-class
  - id: crypto-exchange-entry-call
- id: mnemonic-library-implementation-context
  desc: Mnemonic library implementation
  crit: baseline
  conf: 0.94
  all:
  - id: mnemonic-library-class
  - id: mnemonic-library-wordlist
  - id: mnemonic-library-pbkdf2-rounds
- id: crypto-math-library-context
  desc: Cryptographic math library context
  crit: baseline
  conf: 0.9
  any:
  - id: crypto-keccak-permutation-context
  - id: crypto-number-theory-library-context
- id: crypto-exchange-sdk-benign-context
  desc: Crypto exchange SDK benign context
  crit: baseline
  conf: 0.92
  any:
  - id: crypto-exchange-api-client-context
  - id: metadata/library/data::vendored-python-library-source
- id: crypto-keccak-permutation-context
  desc: Keccak permutation implementation
  crit: component
  conf: 0.9
  all:
  - id: crypto-keccak-word
  - id: crypto-permutation-word
- id: crypto-number-theory-library-context
  desc: Number theory library context
  crit: component
  conf: 0.9
  all:
  - id: crypto-number-theory-phrase
  - id: crypto-polynomial-word
- id: staking-sign-flow
  desc: Blockchain sign-doc or ledger signing
  crit: baseline
  conf: 0.88
  any:
  - id: staking-sign-flow--rx-1
  - id: staking-sign-flow--rx-2
  - id: staking-sign-flow--rx-3
- id: managed-hot-wallet-client-context
  desc: Managed hot-wallet client context
  crit: baseline
  conf: 0.94
  all:
  - id: walletd-daemon-ref
  - id: walletd-passphrase-env
  - id: walletd-node-indexer-config
  - id: walletd-loopback-bind
- id: public-blockchain-readonly-client-context
  desc: Public blockchain read-only API client
  crit: baseline
  conf: 0.9
  any:
  - id: etherscan-api-url
  - id: bscscan-api-url
  - id: polygonscan-api-url
  - id: arbiscan-api-url
  - id: coingecko-simple-price-api
  - id: cloudflare-eth-rpc-url
  - id: publicnode-sepolia-rpc-url
  - id: binance-bsc-rpc-url
  - id: polygon-rpc-url
- id: verified-walletd-release-fetcher-context
  desc: Checksum-verified wallet daemon release fetcher
  crit: baseline
  conf: 0.94
  all:
  - id: walletd-daemon-ref
  - id: walletd-github-release-download
  - id: micro-behaviors/os/service/legitimate::sha256sums-verification-reference
- id: seeded-wallet-keystore-context
  desc: Wallet daemon seeded keystore initializer
  crit: baseline
  conf: 0.94
  all:
  - id: walletd-daemon-ref
  - id: walletd-init-seeded
  - id: walletd-seed-enc-path
  any:
  - id: walletd-recovery-phrase-warning
  - id: walletd-passphrase-env
