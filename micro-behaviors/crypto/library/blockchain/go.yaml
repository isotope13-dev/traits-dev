defaults:
  platforms: [unix, windows]
  for: [go]
  crit: notable
  conf: 0.9

traits:
  - id: go-evm-private-key-from-hex
    desc: Go EVM private key parse
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    if:
      type: symbol
      exact: crypto.HexToECDSA

  - id: go-evm-message-sign
    desc: Go EVM message signing
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    if:
      type: symbol
      exact: crypto.Sign

  - id: go-secp256k1-private-key-address
    desc: Go secp256k1 private key address
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    if:
      type: text
      regex: 'secp256k1\.PrivKey[\s\S]{0,180}PubKey\(\)'

composite_rules:
  - id: go-evm-private-key-signing-flow
    desc: Go EVM private-key signing flow
    crit: notable
    conf: 0.93
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    all:
      - id: go-evm-private-key-from-hex
      - id: go-evm-message-sign
