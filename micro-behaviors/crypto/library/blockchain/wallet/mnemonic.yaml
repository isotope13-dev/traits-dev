defaults:
  platforms: [windows, linux, macos]
  for: [python, javascript, csharp, go, pe, elf]

traits:
  - id: bip39-wordlist-reference
    desc: BIP-39 mnemonic wordlist reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'bip-?39|english\.txt.{0,30}mnemonic'
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/app/fuel-sway::release-path
      - id: well-known/tool/detection/redaction::sensitive-data-scanner
      - type: basename
        regex: 'FuelLabs-sway|[\\/]forc-binaries[\\/]'
    downgrade:
      any:
        - id: well-known/app/fuel-sway::release-path

  - id: derivation-path-bip
    desc: BIP wallet derivation path reference
    crit: notable
    conf: 0.9
    if:
      type: text
      # Match literal and formatted account components, e.g. m/44'/148'/%d'.
      regex: "m/(4[49]|8[46])'/[0-9]{1,6}'(/(%d|[0-9]{1,6})')?"
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - type: text
        substr: Wallet.fromMnemonic(

  - id: mnemonic-word-count-check
    desc: Mnemonic word-count validation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bmnemonic\b.{0,20}\b(split|len|count)\b'
    unless:
      - id: well-known/lib/json-ts/

  - id: seed-phrase-word-count-check
    desc: Seed phrase word-count validation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bseed\s*(phrase|words?)\b.{0,40}\b(split|len|count)\b'
    unless:
      - id: well-known/lib/json-ts/

  - id: secret-words-count-check
    desc: Secret-word list count validation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\b(secret|seed)_?words\b.{0,40}\b(split|len|count)\b'

  - id: mnemonic-validate-check
    desc: Mnemonic validation check
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'validate.{0,20}mnemonic|mnemonic.{0,20}valid'
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
    not:
      - substr: "mnemonics-invalid"

  - id: recovery-phrase-verify-check
    desc: Recovery phrase verification check
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'verify.{0,20}recovery.{0,20}(phrase|seed|mnemonic|wallet)'

composite_rules:
  - id: mnemonic-word-count-validation
    desc: Mnemonic or seed phrase word-count validation
    crit: notable
    conf: 0.85
    any:
      - id: mnemonic-word-count-check
      - id: seed-phrase-word-count-check
      - id: secret-words-count-check

  - id: mnemonic-validation-check
    desc: Mnemonic phrase validation check
    crit: notable
    conf: 0.85
    any:
      - id: mnemonic-validate-check
      - id: recovery-phrase-verify-check
