defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.95

traits:
- id: solana-keypair-from-secret-key
  desc: Solana keypair from secret key
  if:
    type: text
    substr: Keypair.fromSecretKey

- id: bip39-mnemonic-validation
  desc: BIP39 mnemonic validation call
  if:
    type: text
    substr: validateMnemonic

- id: wallet-key-derivation-entrypoint
  desc: Wallet key derivation entrypoint
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bfrom(Mnemonic|PrivateKey|Hex)\s*\('
  unless:
    - id: metadata/lang/scripted::dts-declaration-file
