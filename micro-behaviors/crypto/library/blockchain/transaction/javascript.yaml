defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8

traits:
- id: ap2-mandate-signing
  desc: AP2 payment or intent mandate signing
  if:
    type: symbol
    kind: call
    regex: '^sign(Intent|Payment)Mandate$'

- id: x402-payment-signing
  desc: x402 payment authorization signing
  if:
    type: symbol
    kind: call
    exact: signX402Payment

- id: xrpl-payment-signing
  desc: XRPL payment signing
  if:
    type: symbol
    kind: call
    exact: signXrplPayment

- id: xrpl-seed-wallet-derivation
  desc: XRPL wallet derived from seed
  if:
    type: symbol
    kind: call
    exact: XrplWallet.fromSeed

- id: generated-private-key-fallback
  desc: Ephemeral private-key generation
  if:
    type: symbol
    kind: call
    exact: generatePrivateKey

- id: x402-stablecoin-balance-query
  desc: x402 stablecoin balance query
  if:
    type: symbol
    kind: call
    exact: usdcBalance

- id: wallet-transaction-sign-call
  desc: Wallet or ledger transaction signing call
  if:
    type: text
    regex: '\b(ledger|wallet|keyStore\w*|this\.state\.ledger)\.sign(Transaction)?\s*\('
  unless:
  - id: metadata/package/testing/harness/runtime/

- id: web3-library-reference
  desc: Web3 blockchain library reference
  if:
    type: string_literal
    regex: '(^|[/@._-])web3([/._-]|$)'

- id: ethers-library-reference
  desc: Ethers blockchain library reference
  if:
    type: string_literal
    regex: '(^|[/@._-])ethers([/._-]|$)'

- id: solana-library-reference
  desc: Solana blockchain library reference
  if:
    type: string_literal
    regex: '(^|[/@._-])solana([/._-]|$)'

- id: web3-balance-read
  desc: Web3 account balance query
  if:
    type: text
    regex: '\b(this\.)?web3(_\d+)?\.eth\.getBalance\s*\('

- id: web3-account-sign-call
  desc: Web3 account transaction signing
  if:
    type: text
    regex: '\b(this\.)?web3(_\d+)?\.eth\.accounts\.signTransaction\s*\('

- id: web3-send-signed-tx
  desc: Web3 signed transaction broadcast
  if:
    type: text
    regex: '\b(this\.)?web3(_\d+)?\.eth\.sendSignedTransaction\s*\('

- id: web3-gas-estimate-call
  desc: Web3 transaction gas estimate
  if:
    type: text
    regex: '\b(this\.)?web3(_\d+)?\.eth\.estimateGas\s*\('

- id: x402-wrap-fetch-with-payment
  desc: x402 wrapFetchWithPayment call
  if:
    type: symbol
    exact: wrapFetchWithPayment

- id: x402-wrap-fetch-with-privacy
  desc: x402 privacy fetch wrapper call
  if:
    type: symbol
    exact: wrapFetchWithPrivacy

- id: x402-client-constructor
  desc: x402 client constructor
  if:
    type: text
    word: x402Client

- id: x402-payment-header
  desc: x402 payment header
  if:
    type: text
    word: X-PAYMENT

- id: x402-payment-protocol-header
  desc: x402 payment protocol header
  if:
    type: text
    word: X-Payment-Protocol

- id: viem-wallet-client
  desc: Viem wallet client creation
  if:
    type: symbol
    exact: createWalletClient

- id: viem-private-key-account
  desc: Viem private-key account creation
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: privateKeyToAccount

- id: viem-send-transaction
  desc: Viem wallet sends a blockchain transaction
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: '\.sendTransaction\s*\('

- id: viem-balance-query
  desc: Viem wallet queries an account balance
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\.getBalance\s*\('

- id: viem-native-amount-conversion
  desc: Viem converts a native currency amount
  crit: notable
  conf: 0.86
  if:
    type: symbol
    kind: call
    exact: parseEther

- id: eip3009-transfer-authorization
  desc: EIP-3009 transfer authorization
  if:
    type: text
    regex: '\bTransferWithAuthorization\b|validAfter.{0,120}validBefore.{0,120}nonce'

- id: wallet-sign-typed-data
  desc: Wallet typed-data signing
  crit: notable
  conf: 0.88
  if:
    type: symbol
    exact: signTypedData

composite_rules:
- id: web3-balance-sign-broadcast
  desc: Web3 balance sign broadcast flow
  crit: notable
  conf: 0.95
  all:
  - id: web3-balance-read
  - id: web3-account-sign-call
  - id: web3-send-signed-tx

- id: x402-fetch-payment-wrapper
  desc: x402 payment fetch wrapper
  crit: notable
  conf: 0.86
  any:
  - id: x402-wrap-fetch-with-payment
  - id: x402-wrap-fetch-with-privacy
  - id: x402-client-constructor
  - id: x402-payment-header
  - id: x402-payment-protocol-header
