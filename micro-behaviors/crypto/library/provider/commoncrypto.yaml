defaults:
  platforms: [macos]
  for: [macho]
traits:
  - id: commoncrypto-cccrypt
    desc: CommonCrypto CCCrypt import
    crit: notable
    conf: 0.9
    mbc: C0059
    if:
      type: import
      exact: CCCrypt
  - id: commoncrypto-pbkdf
    desc: CommonCrypto PBKDF import
    crit: notable
    conf: 0.9
    mbc: C0028
    if:
      type: import
      exact: CCKeyDerivationPBKDF
composite_rules:
  - id: commoncrypto-encryption-kdf
    desc: CommonCrypto encryption and KDF
    crit: notable
    conf: 0.9
    all:
      - id: commoncrypto-cccrypt
      - id: commoncrypto-pbkdf
