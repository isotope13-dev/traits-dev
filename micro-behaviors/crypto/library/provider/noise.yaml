# Noise Protocol cryptographic handshake framework markers.
# Reference: noiseprotocol.org; common Rust impl: snow crate.
defaults:
  platforms: [linux, windows, macos]
  for: [binaries]
  size_min: 1024
  size_max: 500000000
traits:
  - id: rust-snow-source-path
    desc: Rust snow Noise crate source path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'snow-[0-9.]+/src/'
  - id: noise-handshake-turn-error
    desc: Noise Protocol turn-state error
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'NotTurnTo(Read|Write)'
  - id: noise-handshake-not-finished
    desc: Noise Protocol handshake-not-finished error
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: HandshakeNotFinished
  - id: noise-handshake-already-finished
    desc: Noise Protocol handshake-already-finished error
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: HandshakeAlreadyFinished
  - id: noise-config-field
    desc: NoiseConfig field marker
    crit: component
    conf: 0.85
    if:
      type: text
      exact: NoiseConfig
  - id: noise-local-private-key
    desc: Noise local_private_key field
    crit: component
    conf: 0.85
    if:
      type: text
      word: local_private_key
  - id: noise-remote-public-key
    desc: Noise remote_public_key field
    crit: component
    conf: 0.85
    if:
      type: text
      word: remote_public_key
  - id: noise-cipher-chacha
    desc: Noise ChaChaPoly cipher suite
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: NoiseChaChaPoly
  - id: noise-cipher-aesgcm
    desc: Noise AESGCM cipher suite
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: NoiseAESGCM
composite_rules:
  - id: noise-pattern-config
    desc: Noise Protocol pattern configuration fields
    crit: component
    any:
      - id: noise-config-field
      - id: noise-local-private-key
      - id: noise-remote-public-key
  - id: noise-cipher-suite
    desc: Noise cipher suite identifier
    crit: component
    any:
      - id: noise-cipher-chacha
      - id: noise-cipher-aesgcm
  - id: noise-pattern-with-cipher
    desc: Noise pattern config with cipher suite
    crit: notable
    conf: 0.95
    all:
      - id: noise-pattern-config
      - id: noise-cipher-suite
  - id: noise-handshake-state-error
    desc: Noise handshake state error message
    crit: notable
    conf: 0.92
    any:
      - id: noise-handshake-not-finished
      - id: noise-handshake-already-finished
  - id: noise-protocol
    desc: Noise Protocol cryptographic handshake framework
    crit: notable
    conf: 0.97
    any:
      - id: rust-snow-source-path
      - id: noise-handshake-turn-error
      - id: noise-handshake-state-error
      - id: noise-pattern-with-cipher
