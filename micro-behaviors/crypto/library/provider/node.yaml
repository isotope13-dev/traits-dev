# Node.js Crypto Module Import
# Detects import/require of the crypto module
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.6
traits:
  - id: require-crypto
    desc: require('crypto') call
    if:
      type: text
      regex: "require\\s*\\(['\"](node:)?crypto['\"]\\)"
  - id: from-crypto-import
    desc: from 'crypto' import
    if:
      type: text
      regex: "from\\s+['\"]crypto['\"]"
  - id: import-crypto
    desc: Imports the Node.js crypto module
    if:
      type: text
      regex: "import\\s+.{0,50}['\"](node:)?crypto['\"]"
  - id: create-hmac
    desc: Node crypto HMAC creation
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)createHmac$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: create-sign
    desc: Node crypto signing
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: (^|\.)createSign$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: create-verify
    desc: Node crypto signature verification
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)createVerify$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: node-crypto-verify
    desc: Node crypto.verify signature check
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bcrypto\.verify\s*\('
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: asymmetric-public-encrypt
    desc: Node public key encryption
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      regex: (^|\.)publicEncrypt$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: asymmetric-private-decrypt
    desc: Node private key decryption
    crit: notable
    conf: 0.75
    if:
      type: symbol
      kind: call
      regex: (^|\.)privateDecrypt$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: asymmetric-legacy-pair
    desc: Node legacy asymmetric pair
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)(privateEncrypt|publicDecrypt)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: key-object-create
    desc: Node crypto key object creation
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)(createSecretKey|createPublicKey|createPrivateKey)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: generate-keypair-call
    desc: JavaScript keypair generation API call
    crit: notable
    conf: 0.72
    if:
      type: symbol
      kind: call
      regex: (^|\.)(generateKeyPair|generateKeyPairSync)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: ecdh-create
    desc: Node ECDH key exchange
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)createECDH$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: pbkdf2-call
    desc: JavaScript PBKDF2 API call
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)(pbkdf2|pbkdf2Sync)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: node-memory-hard-kdf
    desc: Node memory hard KDF
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)(scrypt|scryptSync)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: node-hkdf
    desc: Node HKDF operation
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)(hkdf|hkdfSync)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: webcrypto-subtle
    desc: WebCrypto subtle crypto use
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)(webcrypto\.subtle|crypto\.subtle)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: subtle-encrypt-decrypt
    desc: WebCrypto subtle encrypt/decrypt
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)subtle\.(encrypt|decrypt)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: subtle-sign-verify
    desc: WebCrypto subtle sign/verify
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)subtle\.(sign|verify)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: subtle-key-ops
    desc: WebCrypto subtle key operations
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)subtle\.(importKey|deriveKey|deriveBits)$
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: subtle-digest
    desc: WebCrypto subtle digest
    crit: notable
    conf: 0.65
    if:
      type: symbol
      regex: (^|\.)subtle\.digest$
    unless:
      - id: metadata/package/testing/harness/runtime/
composite_rules:
  - id: crypto-module-import
    desc: Node.js crypto module import
    crit: baseline
    any:
      - id: require-crypto
      - id: from-crypto-import
      - id: import-crypto
  - id: node-crypto-operation
    desc: Node.js crypto operation
    crit: notable
    conf: 0.72
    any:
      - id: micro-behaviors/crypto/hash/digest::node-createhash-call
      - id: create-hmac
      - id: create-sign
      - id: create-verify
      - id: asymmetric-public-encrypt
      - id: asymmetric-private-decrypt
      - id: asymmetric-legacy-pair
      - id: key-object-create
      - id: generate-keypair-call
      - id: ecdh-create
      - id: micro-behaviors/os/random/crypto::node-random-generation
      - id: pbkdf2-call
      - id: node-memory-hard-kdf
      - id: node-hkdf
      - id: webcrypto-subtle
      - id: subtle-encrypt-decrypt
      - id: subtle-sign-verify
      - id: subtle-key-ops
      - id: subtle-digest
