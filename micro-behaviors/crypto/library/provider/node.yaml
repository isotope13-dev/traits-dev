# Node.js Crypto Module Import
# Detects import/require of the crypto module
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: baseline
  conf: 0.6
traits:
  - id: require-crypto
    desc: require('crypto') call
    if:
      type: text
      regex: "require\\s*\\(['\"](node:)?crypto['\"]\\)"
  - id: from-crypto-import
    desc: from 'crypto' import
    if:
      type: text
      regex: "from\\s+['\"]crypto['\"]"
  - id: import-crypto
    desc: import crypto
    if:
      type: text
      regex: "import\\s+.{0,50}['\"](node:)?crypto['\"]"
  - id: create-hash
    desc: Node crypto hash creation
    crit: notable
    conf: 0.65
    if:
      type: symbol
      regex: (^|\.)createHash$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: create-hmac
    desc: Node crypto HMAC creation
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)createHmac$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: create-sign
    desc: Node crypto signing
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: (^|\.)createSign$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: create-verify
    desc: Node crypto signature verification
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)createVerify$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: node-crypto-verify
    desc: Node crypto.verify signature check
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bcrypto\.verify\s*\('
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: asymmetric-public-encrypt
    desc: Node public key encryption
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: (^|\.)publicEncrypt$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: asymmetric-private-decrypt
    desc: Node private key decryption
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: (^|\.)privateDecrypt$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: asymmetric-legacy-pair
    desc: Node legacy asymmetric pair
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)(privateEncrypt|publicDecrypt)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: key-object-create
    desc: Node crypto key object creation
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)(createSecretKey|createPublicKey|createPrivateKey)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: keypair-generate
    desc: Node crypto keypair generation
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)(generateKeyPair|generateKeyPairSync)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: ecdh-create
    desc: Node ECDH key exchange
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)createECDH$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: random-bytes
    desc: Node cryptographic random bytes
    crit: notable
    conf: 0.65
    if:
      type: symbol
      regex: (^|\.)randomBytes$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: random-32-byte-key
    desc: Node 32-byte random key
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'randomBytes\s*\(\s*(32|0x20)\s*\)'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: random-fill
    desc: Node cryptographic random fill
    crit: notable
    conf: 0.65
    if:
      type: symbol
      regex: (^|\.)(randomFill|randomFillSync)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: random-id
    desc: Node cryptographic random identifier
    crit: notable
    conf: 0.62
    if:
      type: symbol
      regex: (^|\.)(randomInt|randomUUID)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-large-minified-bundle
  - id: node-kdf
    desc: Node key derivation operation
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)(pbkdf2|pbkdf2Sync)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: node-memory-hard-kdf
    desc: Node memory hard KDF
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)(scrypt|scryptSync)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: node-hkdf
    desc: Node HKDF operation
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)(hkdf|hkdfSync)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: webcrypto-subtle
    desc: WebCrypto subtle crypto use
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)(webcrypto\.subtle|crypto\.subtle)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: subtle-encrypt-decrypt
    desc: WebCrypto subtle encrypt/decrypt
    crit: notable
    conf: 0.72
    if:
      type: symbol
      regex: (^|\.)subtle\.(encrypt|decrypt)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: subtle-sign-verify
    desc: WebCrypto subtle sign/verify
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)subtle\.(sign|verify)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: subtle-key-ops
    desc: WebCrypto subtle key operations
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: (^|\.)subtle\.(importKey|deriveKey|deriveBits)$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: subtle-digest
    desc: WebCrypto subtle digest
    crit: notable
    conf: 0.65
    if:
      type: symbol
      regex: (^|\.)subtle\.digest$
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
composite_rules:
  - id: crypto-module-import
    desc: Node.js crypto module import
    crit: baseline
    any:
      - id: require-crypto
      - id: from-crypto-import
      - id: import-crypto
      - id: micro-behaviors/crypto/symmetric/aes/library::crypto-require-call
  - id: node-crypto-operation
    desc: Node.js crypto operation
    crit: notable
    conf: 0.72
    any:
      - id: create-hash
      - id: create-hmac
      - id: create-sign
      - id: create-verify
      - id: asymmetric-public-encrypt
      - id: asymmetric-private-decrypt
      - id: asymmetric-legacy-pair
      - id: key-object-create
      - id: keypair-generate
      - id: ecdh-create
      - id: random-bytes
      - id: random-fill
      - id: random-id
      - id: node-kdf
      - id: node-memory-hard-kdf
      - id: node-hkdf
      - id: webcrypto-subtle
      - id: subtle-encrypt-decrypt
      - id: subtle-sign-verify
      - id: subtle-key-ops
      - id: subtle-digest
