defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: baseline
  conf: 0.8
traits:
  - id: cryptogams-marker
    desc: CRYPTOGAMS OpenSSL support marker
    if:
      type: text
      substr: CRYPTOGAMS
  - id: openssl-x25519-primitives
    desc: OpenSSL X25519 primitives
    if:
      type: text
      substr: X25519 primitives
  - id: boringssl-mike-hamburg-aes
    desc: BoringSSL Mike Hamburg AES implementation
    if:
      type: text
      substr: E3, Mike Hamburg
  - id: aes-ni-gcm-module
    desc: AES-NI GCM cryptographic module
    if:
      type: text
      substr: AES-NI GCM module
  - id: openssl-static-keys
    desc: OpenSSL/BoringSSL static key markers
    if:
      type: text
      substr: KEY_SENTVAL
  - id: libcrypto-context-types
    desc: OpenSSL libcrypto context types
    crit: notable
    conf: 0.8
    for: [c, cpp]
    if:
      type: string_literal
      regex: EVP_CIPHER_CTX|EVP_MD_CTX|struct evp_pkey_st
  - id: openssl-evp-pkey-api-reference
    desc: OpenSSL EVP_PKEY key-management API reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: EVP_PKEY
