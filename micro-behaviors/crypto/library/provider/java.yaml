defaults:
  platforms:
    - unix
    - windows
  for:
    - java
    - class
traits:
  - id: secretkeyspec
    desc: Java SecretKeySpec symmetric key construction
    crit: notable
    conf: 0.9
    mbc: C0015
    attack: T1573.001
    if:
      type: text
      substr: javax/crypto/spec/SecretKeySpec
  - id: cipher-class
    desc: Java Cipher class reference
    crit: component
    if:
      type: text
      substr: javax/crypto/Cipher
  - id: jvm-crypto-class-ref
    desc: JVM crypto package reference
    crit: baseline
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^javax/crypto(/|$)'
  - id: jvm-security-class-ref
    desc: JVM security package reference
    crit: baseline
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: value
      path: class.class_refs[*]
      regex: '^java/security(/|$)'
  - id: dofinal-method
    desc: Java doFinal method reference
    crit: component
    if:
      type: text
      substr: doFinal
composite_rules:
  - id: cipher-init
    desc: Java Cipher initialization and encryption
    crit: notable
    conf: 0.9
    mbc: C0015
    attack: T1573.001
    all:
      - id: cipher-class
      - id: dofinal-method
  - id: java-payload-decryption
    desc: Java symmetric crypto usage
    crit: notable
    conf: 0.9
    mbc: C0015
    attack: T1573.001
    all:
      - id: secretkeyspec
      - id: cipher-init
