# Cryptographic context management - Windows CryptoAPI
# Neutral provider, hashing, key, and buffer-cryptography capabilities.
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: crypt-acquire-context
    desc: Acquire cryptographic service provider context
    crit: notable
    conf: 0.9
    mbc: "C0027"
    if:
      type: symbol
      regex: "CryptAcquireContext[AW]?$"
  - id: crypt-release-context
    desc: Release cryptographic context
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CryptReleaseContext"
  - id: crypt-create-hash
    desc: Create cryptographic hash object
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CryptCreateHash"
  - id: crypt-hash-data
    desc: Hash data using crypto provider
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CryptHashData"
  - id: crypt-derive-key
    desc: Derive symmetric key from hash
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CryptDeriveKey"
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-100
  - id: crypt-import-key
    desc: Import encrypted key material
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: "CryptImportKey"
  - id: crypt-verify-signature
    desc: Verify signature with CryptoAPI
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CryptVerifySignatureW"
  - id: crypt-encrypt
    desc: Encrypt buffer with CryptoAPI
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CryptEncrypt"
  - id: crypt-decrypt
    desc: Decrypt buffer with CryptoAPI
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "CryptDecrypt"
  - id: ncrypt-open-storage-provider
    desc: Opens a Windows CNG storage provider
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: NCryptOpenStorageProvider
    unless:
      - id: well-known/app/telegram::telegram-desktop-signed-client-context
  - id: ncrypt-open-key
    desc: Opens a Windows CNG key
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: NCryptOpenKey
composite_rules:
  - id: capi-key-material-setup
    desc: CryptoAPI key setup from derived or imported material
    crit: notable
    conf: 0.88
    all:
      - id: crypt-acquire-context
    any:
      - id: crypt-derive-key
      - id: crypt-import-key
    unless:
      - id: crypt-verify-signature
  - id: capi-buffer-crypto-operations
    desc: CryptoAPI buffer encrypt decrypt operations
    crit: notable
    conf: 0.9
    any:
      - id: crypt-encrypt
      - id: crypt-decrypt
  - id: capi-keyed-buffer-crypto-chain
    desc: CryptoAPI key setup with buffer encryption operations
    crit: notable
    conf: 0.9
    all:
      - id: capi-key-material-setup
      - id: capi-buffer-crypto-operations
    downgrade:
      any:
        - id: metadata/signed/platform/
