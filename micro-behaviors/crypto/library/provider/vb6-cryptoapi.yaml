defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: crypt-acquire-context-vb6
    desc: VB6 CryptAcquireContext declare
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: CryptAcquireContext Lib "advapi32.dll"
  - id: crypt-create-hash-vb6
    desc: VB6 CryptCreateHash declare
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: CryptCreateHash Lib "advapi32.dll"
  - id: crypt-hash-data-vb6
    desc: VB6 CryptHashData declare
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: CryptHashData Lib "advapi32.dll"
  - id: crypt-derive-key-vb6
    desc: VB6 CryptDeriveKey declare
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: CryptDeriveKey Lib "advapi32.dll"
  - id: crypt-encrypt-vb6
    desc: VB6 CryptEncrypt declare
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: CryptEncrypt Lib "advapi32.dll"
  - id: crypt-decrypt-vb6
    desc: VB6 CryptDecrypt declare
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: CryptDecrypt Lib "advapi32.dll"
  - id: rc4-constant-vb6
    desc: VB6 CALG_RC4 constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: CALG_RC4
  - id: md5-constant-vb6
    desc: VB6 CALG_MD5 constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: CALG_MD5
composite_rules:
  - id: capi-key-derivation-vb6
    desc: VB6 CryptoAPI key derivation chain
    crit: notable
    conf: 0.94
    all:
      - id: crypt-acquire-context-vb6
      - id: crypt-create-hash-vb6
      - id: crypt-hash-data-vb6
      - id: crypt-derive-key-vb6
  - id: rc4-buffer-crypto-vb6
    desc: VB6 RC4 buffer crypto chain
    crit: suspicious
    conf: 0.95
    all:
      - id: rc4-constant-vb6
      - id: md5-constant-vb6
      - id: capi-key-derivation-vb6
    any:
      - id: crypt-encrypt-vb6
      - id: crypt-decrypt-vb6
