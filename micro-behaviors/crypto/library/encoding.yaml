# CryptoAPI Base64/Hex Encoding - Windows
# CryptStringToBinary / CryptBinaryToString for encoding conversion
defaults:
  platforms: [windows]
  for: [pe, dll]
  conf: 0.9
traits:
  - id: crypt-string-to-binary
    desc: Decode base64/hex string via CryptoAPI
    crit: notable
    if:
      type: symbol
      exact: "CryptStringToBinaryA"
  - id: crypt-string-to-binary-w
    desc: Decode base64/hex string via CryptoAPI (Unicode)
    crit: notable
    if:
      type: symbol
      exact: "CryptStringToBinaryW"
    unless:
      - type: basename
        regex: '(?i)\.pyd$'
  - id: crypt-binary-to-string
    desc: Encode binary to base64/hex via CryptoAPI
    crit: notable
    if:
      type: symbol
      exact: "CryptBinaryToStringA"
  - id: crypt-binary-to-string-w
    desc: Encode binary to base64/hex via CryptoAPI (Unicode)
    crit: notable
    if:
      type: symbol
      exact: "CryptBinaryToStringW"
    unless:
      - type: basename
        regex: '(?i)\.pyd$'

  - id: crypt-import-public-key-info-string
    desc: CryptImportPublicKeyInfo API name as string (dynamic load)
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: CryptImportPublicKeyInfo
    unless:
      - type: basename
        regex: '(?i)\.pyd$'
      - id: metadata/signed/platform::microsoft-windows

  - id: crypt-decode-object-ex-string
    desc: CryptDecodeObjectEx API name as string (dynamic load)
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: CryptDecodeObjectEx
    unless:
      - type: basename
        regex: '(?i)\.pyd$'
      - id: metadata/signed/platform::microsoft-windows
