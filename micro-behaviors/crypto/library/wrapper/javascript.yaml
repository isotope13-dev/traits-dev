# CommonJS crypto-wrapper shapes are neutral module capabilities.  Intent is
# inferred only by objective composites that add sensitive input, persistence,
# or exfiltration evidence.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: component

traits:
  - id: exports-encrypt-interface
    desc: CommonJS exports encrypt-like API
    conf: 0.82
    if:
      type: text
      regex: 'module\.exports\s*=\s*\{[^}]{0,120}\b(encrypt|decrypt|hash)\b'
  - id: exports-cipher-interface
    desc: CommonJS exports cipher-like API
    conf: 0.82
    if:
      type: text
      regex: 'module\.exports\s*=\s*\{[^}]{0,120}\b(createCipher|createSign|createVerify)\b'
  - id: exports-keygen-interface
    desc: CommonJS exports key-generation API
    conf: 0.82
    if:
      type: text
      regex: 'module\.exports\s*=\s*\{[^}]{0,120}\b(scrypt|randomBytes|createDecipher)\b'
  - id: named-basic-crypto-exports
    desc: Exports multiple basic crypto functions
    conf: 0.78
    count_min: 2
    if:
      type: text
      regex: 'exports\.(encrypt|decrypt|hash)[A-Za-z_$]*\s*='
  - id: named-key-crypto-exports
    desc: Exports multiple crypto key functions
    conf: 0.78
    count_min: 2
    if:
      type: text
      regex: 'exports\.(scrypt|randomBytes)[A-Za-z_$]*\s*='
  - id: named-cipher-crypto-exports
    desc: Exports multiple crypto cipher functions
    conf: 0.78
    count_min: 2
    if:
      type: text
      regex: 'exports\.create(Cipher|Sign|Verify|Decipher)[A-Za-z_$]*\s*='

composite_rules:
  - id: exports-crypto-interface
    desc: Exports crypto-like interface
    crit: notable
    conf: 0.82
    any:
      - id: exports-encrypt-interface
      - id: exports-cipher-interface
      - id: exports-keygen-interface
      - id: named-basic-crypto-exports
      - id: named-key-crypto-exports
      - id: named-cipher-crypto-exports
  - id: node-crypto-wrapper
    desc: CommonJS wrapper around Node crypto
    crit: notable
    conf: 0.85
    all:
      - id: exports-crypto-interface
      - id: micro-behaviors/crypto/library/provider::require-crypto
  - id: exported-node-crypto-wrapper
    desc: Exported Node crypto wrapper
    crit: notable
    conf: 0.86
    all:
      - id: exports-crypto-interface
      - id: micro-behaviors/crypto/library/provider::require-crypto
      - id: micro-behaviors/crypto/library/provider::node-crypto-operation
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
    unless:
      - id: micro-behaviors/communications/http/oauth/
      - id: well-known/lib/node-edge/
