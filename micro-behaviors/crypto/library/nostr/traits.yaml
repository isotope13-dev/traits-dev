defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.9
traits:
  - id: nip04-import
    desc: Nostr NIP-04 crypto import
    if:
      type: text
      substr: nostr-tools/nip04
  - id: nip04-encrypt
    desc: Nostr NIP-04 encrypt call
    if:
      type: text
      regex: '\bencrypt\s*\(\s*sk\s*,'
  - id: nip04-decrypt
    desc: Nostr NIP-04 decrypt call
    if:
      type: text
      regex: '\bdecrypt\s*\(\s*sk\s*,'
  - id: finalize-event
    desc: Nostr event signing helper
    if:
      type: symbol
      exact: finalizeEvent
  - id: verify-event
    desc: Nostr event verification helper
    if:
      type: symbol
      exact: verifyEvent
  - id: get-public-key
    desc: Nostr public key derivation
    if:
      type: symbol
      exact: getPublicKey
composite_rules:
  - id: nip04-encrypted-dm
    desc: Nostr NIP-04 encrypted messages
    crit: notable
    conf: 0.95
    all:
      - id: nip04-import
    any:
      - id: nip04-encrypt
      - id: nip04-decrypt
  - id: signed-event-flow
    desc: Nostr signed event flow
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: finalize-event
      - id: verify-event
      - id: get-public-key
