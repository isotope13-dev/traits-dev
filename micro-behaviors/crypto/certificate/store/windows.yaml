# Windows Certificate Store APIs
defaults:
  platforms: ["windows"]
traits:
  - id: cert-open-system-store
    desc: Open Windows system certificate store
    crit: notable
    conf: 0.9
    for: [pe, dll]
    if:
      type: symbol
      exact: "CertOpenSystemStoreA"
  - id: cert-open-store
    desc: Open certificate store
    crit: notable
    conf: 0.9
    for: ["pe", "dll"]
    if:
      type: symbol
      exact: "CertOpenStore"
  - id: cert-enum-certificates
    desc: Enumerate certificates in store
    crit: notable
    conf: 0.9
    for: ["pe", "dll"]
    if:
      type: symbol
      exact: "CertEnumCertificatesInStore"
  - id: cert-close-store
    desc: Close certificate store handle
    crit: notable
    conf: 0.9
    for: ["pe", "dll"]
    if:
      type: symbol
      exact: "CertCloseStore"
  - id: go-cert-open-store-proc
    desc: Go resolves cert store open
    crit: baseline
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: CertOpenStore
  - id: go-cert-close-store-proc
    desc: Go resolves cert store close
    crit: baseline
    conf: 0.9
    for: [go]
    if:
      type: literal
      exact: CertCloseStore
