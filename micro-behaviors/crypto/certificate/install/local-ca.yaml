defaults:
  platforms: [unix, windows]
  for: [python, shell]
  conf: 0.9

traits:
  - id: mkcert-install-command
    desc: mkcert local CA install
    crit: notable
    ref: sha256:85b3ca874237ae61400c4fd379f7c6717529c1ca737b2377c678ecda532998c8
    if:
      type: text
      regex: '["'']mkcert["''][\s\S]{0,120}["'']-install["'']'

  - id: python-openssl-self-signed-server-cert
    desc: Python openssl self-signed cert
    crit: notable
    ref: sha256:85b3ca874237ae61400c4fd379f7c6717529c1ca737b2377c678ecda532998c8
    if:
      type: text
      regex: '["'']openssl["''][\s\S]{0,160}["'']req["''][\s\S]{0,200}["'']-x509["'']'

composite_rules:
  - id: local-ca-or-self-signed-cert
    desc: Local CA or self-signed cert setup
    crit: suspicious
    conf: 0.92
    ref: sha256:85b3ca874237ae61400c4fd379f7c6717529c1ca737b2377c678ecda532998c8
    any:
      - id: mkcert-install-command
      - id: python-openssl-self-signed-server-cert
