# Windows Certificate Installation APIs
# Neutral operations - enterprise cert deployment, SSL setup, etc.
# MBC micro-behavior: C0024 (Certificate Operations)
defaults:
  platforms: [windows]
  crit: notable
  conf: 0.85
traits:
  - id: cert-add-to-store
    desc: Add certificate to store via API
    for: [pe, dll]
    if:
      type: symbol
      exact: "CertAddCertificateContextToStore"
  - id: cert-add-encoded
    desc: Add encoded certificate to store
    for: [pe, dll]
    if:
      type: symbol
      exact: "CertAddEncodedCertificateToStore"
  - id: pfx-import
    desc: Import PFX/PKCS12 certificate bundle
    crit: notable
    for: [pe, dll]
    if:
      type: symbol
      exact: "PFXImportCertStore"
  - id: certutil-addstore
    desc: certutil -addstore command
    for: [batch, powershell, pe]
    if:
      type: string_value
      regex: '(?i)certutil(\.exe)?\s+[^\n]{0,60}-addstore'
  - id: certutil-importpfx
    desc: certutil -importPFX command
    for: [batch, powershell, pe]
    if:
      type: string_value
      regex: '(?i)certutil(\.exe)?\s+[^\n]{0,60}-importPFX'
  - id: powershell-import-certificate
    desc: PowerShell Import-Certificate cmdlet
    for: [powershell]
    if:
      type: string_value
      regex: '(?i)Import-Certificate|Import-PfxCertificate'
composite_rules:
  - id: cert-install-api
    desc: Windows certificate installation via API
    conf: 0.9
    any:
      - id: cert-add-to-store
      - id: cert-add-encoded
      - id: pfx-import
  - id: cert-install-cmd
    desc: Windows certificate installation via CLI
    conf: 0.85
    any:
      - id: certutil-addstore
      - id: certutil-importpfx
      - id: powershell-import-certificate
