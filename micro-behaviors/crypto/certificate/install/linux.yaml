defaults:
  platforms:
    - unix
  crit: notable
  conf: 0.85
  for: [shell, python, javascript, ruby, php]
traits:
  - id: update-ca-certificates
    desc: update-ca-certificates command
    if:
      type: text
      regex: update-ca-certificates|update-ca-trust
  - id: ca-certificates-path
    desc: System CA certificate store path
    crit: notable
    if:
      type: text
      regex: /usr/local/share/ca-certificates/|/etc/pki/ca-trust/source/anchors/
  - id: go-linux-ca-trust-paths
    desc: Go references Linux CA paths
    crit: notable
    conf: 0.92
    for: [go, elf]
    if:
      type: text
      regex: '/usr/local/share/ca-certificates/[\s\S]{0,220}/etc/pki/ca-trust/source/anchors/'
  - id: go-ca-update-commands
    desc: Go references CA trust-store refresh commands
    crit: notable
    conf: 0.9
    for: [go, elf]
    if:
      type: text
      regex: 'update-ca-certificates[\s\S]{0,160}update-ca-trust extract'
  - id: openssl-rehash-command
    desc: Calls c_rehash command
    crit: notable
    if:
      type: symbol
      kind: call
      exact: c_rehash
  - id: openssl-rehash-call
    desc: Calls openssl rehash command
    crit: notable
    if:
      type: symbol
      kind: call
      exact: openssl
      arg:
        kind: string
        substr: rehash

composite_rules:
  - id: openssl-rehash
    desc: OpenSSL certificate rehash
    crit: notable
    any:
      - id: openssl-rehash-command
      - id: openssl-rehash-call
