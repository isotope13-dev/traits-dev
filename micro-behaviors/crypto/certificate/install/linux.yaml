# Linux Certificate Installation
# Neutral operations - enterprise cert deployment, package managers, etc.
defaults:
  platforms: [linux, unix]
  crit: notable
  conf: 0.85
traits:
  - id: update-ca-certificates
    desc: update-ca-certificates command
    for: [shell, python, ruby, elf]
    if:
      type: string_value
      regex: 'update-ca-certificates|update-ca-trust'
  - id: ca-certificates-path
    desc: System CA certificate store path
    crit: baseline
    for: [shell, python, ruby, elf]
    if:
      type: string_value
      regex: '/usr/local/share/ca-certificates/|/etc/pki/ca-trust/source/anchors/'
  - id: openssl-rehash
    desc: OpenSSL certificate rehash
    crit: baseline
    for: [shell, python, ruby, elf]
    if:
      type: string_value
      regex: 'c_rehash|openssl\s+rehash'
