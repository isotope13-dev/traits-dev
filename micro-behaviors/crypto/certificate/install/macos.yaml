defaults:
  platforms:
    - macos
  crit: notable
  conf: 0.85
traits:
  - id: security-add-trusted-cert
    desc: security add-trusted-cert command
    for:
      - shell
      - python
      - ruby
    if:
      type: string_literal
      regex: security\s+add-trusted-cert
  - id: security-add-certificates
    desc: security add-certificates command
    for:
      - shell
      - python
      - ruby
    if:
      type: string_literal
      regex: security\s+add-certificates
  - id: sec-trust-settings-api
    desc: SecTrustSettingsSetTrustSettings API
    for:
      - macho
      - c
    if:
      type: symbol
      exact: SecTrustSettingsSetTrustSettings
  - id: sec-item-add-api
    desc: SecItemAdd for keychain certificate import
    for:
      - macho
      - c
    if:
      type: symbol
      exact: SecItemAdd
