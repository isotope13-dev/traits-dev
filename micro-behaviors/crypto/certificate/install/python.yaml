defaults:
  platforms: [windows, linux, macos]
  for: [python]
  crit: notable
  conf: 0.9

traits:
  - id: python-certutil-addstore
    desc: Python uses certutil to add a certificate
    if:
      type: text
      regex: '(?i)\bcertutil(\.exe)?\b[\s\S]{0,160}\b-addstore\b'
  - id: python-powershell-import-certificate
    desc: Python imports a certificate with PowerShell
    if:
      type: text
      regex: '(?i)\b(powershell|pwsh)\b[\s\S]{0,240}\bImport-(Certificate|PfxCertificate)\b'
  - id: python-macos-trust-store-import
    desc: Python adds a certificate to macOS trust
    platforms: [macos]
    if:
      type: text
      regex: '(?i)\bsecurity\b[\s\S]{0,160}\badd-trusted-cert\b'
