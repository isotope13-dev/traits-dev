defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: crypt-hash-certificate
    desc: Hash X.509 certificate data
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: CryptHashCertificate
  - id: crypt-sign-certificate
    desc: Sign X.509 certificate data
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: CryptSignCertificate
  - id: crypt-hash-public-key-info
    desc: Hash certificate public key info
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: CryptHashPublicKeyInfo
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: cert-rdn-value-to-string
    desc: Format certificate distinguished name
    crit: baseline
    conf: 0.82
    if:
      type: text
      exact: CertRDNValueToStrA
composite_rules:
  - id: certificate-crypto-api-cluster
    desc: Certificate crypto API cluster
    crit: notable
    conf: 0.92
    all:
      - id: crypt-hash-certificate
      - id: crypt-sign-certificate
      - id: crypt-hash-public-key-info
