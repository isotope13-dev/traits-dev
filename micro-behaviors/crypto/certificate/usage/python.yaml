defaults:
  platforms: [linux, macos, windows]
  for: [python]

traits:
  - id: python-pkcs12-key-certificate-load
    desc: Python loads PKCS#12 key and certificate bundle
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: pkcs12.load_key_and_certificates
  - id: python-x509-certificate-builder
    desc: Python builds an X.509 certificate
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: x509.CertificateBuilder
  - id: python-ed25519-private-key
    desc: Python creates an Ed25519 private key
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ed25519.Ed25519PrivateKey
composite_rules:
  - id: python-ed25519-identity-certificate
    desc: Python creates an Ed25519 identity certificate
    crit: notable
    conf: 0.94
    all:
      - id: python-x509-certificate-builder
      - id: python-ed25519-private-key
