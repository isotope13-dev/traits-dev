defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: x509-prefix
    desc: X509_ function prefix
    conf: 0.7
    if:
      type: text
      substr: X509_
    unless:
      - id: well-known/lib/mime-db::javascript-mime-extension-map
  - id: x509-string
    desc: References X.509 certificate terminology
    conf: 0.6
    if:
      type: text
      word: x509
      case_insensitive: true
    unless:
      - id: well-known/lib/mime-db::javascript-mime-extension-map
  - id: certificate-ref
    desc: References certificate terminology
    conf: 0.5
    if:
      type: text
      word: certificate
      case_insensitive: true
    unless:
      - id: well-known/lib/mime-db::javascript-mime-extension-map
  - id: pem-begin
    desc: PEM certificate begin delimiter
    conf: 0.7
    if:
      type: text
      substr: '-----BEGIN'
  - id: pem-end
    desc: PEM certificate end delimiter
    conf: 0.7
    if:
      type: text
      substr: '-----END'
  - id: ssl-certs-path
    desc: References the system TLS certificate directory
    conf: 0.8
    if:
      type: text
      substr: /etc/ssl/certs
  - id: ca-certificates
    desc: References a CA certificate bundle
    conf: 0.8
    if:
      type: text
      substr: ca-certificates
  - id: certutil-ascii-export-flag
    desc: certutil ASCII export flag
    crit: notable
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '\bcertutil\b[^\n]{0,160}(\s-L\b[^\n]{0,120}\s-a\b|\s-a\b[^\n]{0,120}\s-L\b)'
  - id: ca-bundle-output
    desc: CA bundle output file
    crit: notable
    conf: 0.85
    for: [shell]
    if:
      type: text
      substr: ca-bundle.crt
composite_rules:
  - id: certificate-handling
    desc: X.509 certificate handling (legitimate)
    conf: 0.8
    needs: 2
    any:
      - id: ssl-certs-path
      - id: ca-certificates
      - id: x509-prefix
      - id: x509-string
      - id: certificate-ref
      - id: pem-begin
      - id: pem-end
  - id: certutil-ca-bundle-export
    desc: certutil CA bundle export
    crit: notable
    conf: 0.92
    all:
      - id: certutil-ascii-export-flag
      - id: ca-bundle-output
