defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, c, cpp]
  attack: T1587.003

traits:
  - id: openssl-self-signed-cert
    desc: Generates self-signed TLS certificate
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (\$OPENSSL|openssl)\s+req.{0,60}-x509
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  # Leaf/server certs (not signing CAs). Local HTTPS registry and CI TLS setups
  # mint these and may drop them into ca-certificates so clients trust localhost
  # — that is not root-CA trust subversion.
  - id: openssl-ca-false-leaf
    desc: OpenSSL cert basicConstraints CA:FALSE
    crit: notable
    conf: 0.9
    for: [shell, python, ruby, c, cpp, go, rust]
    if:
      type: text
      regex: 'basicConstraints\s*=\s*CA\s*:\s*FALSE'
  - id: php-openssl-self-signed-cert
    desc: PHP self-signed certificate generation
    crit: notable
    conf: 0.9
    for: [php]
    if:
      type: text
      regex: 'openssl_csr_(sign|get_sign)\s*\('
  - id: openssl-pkcs12-export
    desc: OpenSSL exports a PKCS#12 certificate bundle
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '\bopenssl\s+pkcs12\b[^\n;]{0,180}\s-export\b'

composite_rules:
  - id: self-signed-cert-generation
    desc: Self-signed certificate generation
    crit: notable
    conf: 0.9
    any:
      - id: openssl-self-signed-cert
      - id: php-openssl-self-signed-cert
