defaults:
  platforms: [windows, linux, macos]
  for: [go]
  crit: notable
  conf: 0.85
traits:
  - id: go-x509-parse-certificate
    desc: Go parses X.509 certificate
    if:
      type: symbol
      exact: x509.ParseCertificate
  - id: go-pem-decode
    desc: Go decodes PEM block
    if:
      type: symbol
      exact: pem.Decode
  - id: go-create-certificate
    desc: Go creates X.509 certificate
    if:
      type: symbol
      exact: x509.CreateCertificate
  - id: go-cert-dnsnames-read
    desc: Go reads certificate DNS names
    if:
      type: symbol
      exact: cert.DNSNames
  - id: go-cert-publickey-read
    desc: Go reads certificate public key
    if:
      type: symbol
      exact: cert.PublicKey
composite_rules:
  - id: go-certificate-material-parse
    desc: Go parses certificate material
    crit: notable
    conf: 0.9
    all:
      - id: go-x509-parse-certificate
      - id: go-pem-decode
