defaults:
  platforms: [windows]
  for: [powershell]

traits:
  - id: powershell-self-signed-cert
    desc: Creates self-signed certificate
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: New-SelfSignedCertificate
  - id: powershell-openssl-pkcs12-export
    desc: PowerShell exports PKCS#12 certificate bundle
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bopenssl\s+pkcs12\b[^\n;]{0,180}\s-export\b'
