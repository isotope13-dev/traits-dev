defaults:
  platforms: [unix, windows]
  for: [scripts, source]
traits:
  - id: certs-pem-config-path
    desc: PEM certificate config path
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "['\"]/certs/.{1,80}\\.pem['\"]"
composite_rules:
  - id: has-pem-certificate
    desc: File contains a PEM-encoded certificate.
    for: [scripts, binaries]
    crit: baseline
    conf: 1.0
    all:
      - id: pem-begin
      - id: pem-end
