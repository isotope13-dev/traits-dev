defaults:
  for: [csharp]
  platforms: [windows, unix, macos]
traits:
  - id: des-provider
    desc: DES crypto service provider
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: DESCryptoServiceProvider
  - id: des-create-decryptor
    desc: DES decryptor creation
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: CreateDecryptor()
  - id: crypto-transform-final-block
    desc: Final block crypto transform
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: TransformFinalBlock
composite_rules:
  - id: des-decrypt-csharp
    desc: DES decryption in C#
    crit: notable
    conf: 0.92
    all:
      - id: des-provider
      - id: des-create-decryptor
    any:
      - id: crypto-transform-final-block
