defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: cryptojs-block-cipher-decrypt-call
    desc: CryptoJS block-cipher decrypt call
    crit: notable
    conf: 0.92
    mbc: C0027
    if:
      type: symbol
      kind: call
      regex: '^CryptoJS\.(AES|DES|TripleDES|RC4)\.decrypt$'
  # UMD bundles may alias the imported CryptoJS object and expose only text
  # facts after bundling. Intent remains in composites that add staged
  # execution or another objective.
  - id: cryptojs-block-cipher-decrypt-text
    desc: CryptoJS decrypt expression
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bcryptojs\.(AES|DES|TripleDES|RC4)\.decrypt\s*\('
      case_insensitive: true
