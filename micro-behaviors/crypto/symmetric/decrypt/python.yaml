defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: C0027
  attack: T1027

traits:
  - id: python-decrypt-method-call
    desc: Python decrypt method call
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \.decrypt\s*\(

  # Package loaders commonly wrap the primitive in a named helper such as
  # decrypt_script().  Keep this atomic notable: the execution composites
  # still require a remote source and dynamic code execution.
  - id: python-decrypt-helper-call
    desc: Python custom decrypt helper call
    crit: notable
    conf: 0.82
    if:
      type: symbol
      kind: call
      regex: '^decrypt_[A-Za-z_][A-Za-z0-9_]*$'
