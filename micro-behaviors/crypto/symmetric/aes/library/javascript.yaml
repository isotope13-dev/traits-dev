defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: cryptojs-aes-encrypt
    desc: Encrypts data with CryptoJS AES
    crit: notable
    conf: 0.85
    mbc: C0027
    if:
      type: text
      regex: CryptoJS\.AES\.encrypt|\.AES\.encrypt\s*\(
  - id: cryptojs-cbc-mode
    desc: Uses CryptoJS CBC block mode
    crit: component
    conf: 0.8
    if:
      type: text
      regex: CryptoJS\.mode\.CBC|\.mode\.CBC
  - id: cryptojs-pkcs7-padding
    desc: Uses CryptoJS PKCS7 padding
    crit: component
    conf: 0.75
    if:
      type: text
      regex: CryptoJS\.pad\.Pkcs7|\.pad\.Pkcs7
  - id: tiktok-webapp-aes-key
    desc: Embeds TikTok webapp AES key marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: webapp1.0+20210628
  - id: webcrypto-aes-gcm-importkey
    desc: Web Crypto AES-GCM importKey with decrypt/encrypt
    crit: component
    conf: 0.85
    if:
      type: text
      regex: importKey\s*\([\s\S]{0,160}AES-GCM[\s\S]{0,160}(decrypt|encrypt)
composite_rules:
  - id: cryptojs-aes-cbc-encrypt
    desc: CryptoJS AES-CBC encryption flow
    crit: notable
    conf: 0.9
    all:
      - id: cryptojs-aes-encrypt
      - id: cryptojs-cbc-mode
    any:
      - id: cryptojs-pkcs7-padding
      - id: tiktok-webapp-aes-key
