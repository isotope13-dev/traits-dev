defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: cryptojs-aes-encrypt
    desc: Encrypts data with CryptoJS AES
    crit: notable
    conf: 0.85
    mbc: C0027
    if:
      type: text
      regex: CryptoJS\.AES\.encrypt|\.AES\.encrypt\s*\(
  - id: cryptojs-cbc-mode
    desc: Uses CryptoJS CBC block mode
    crit: component
    conf: 0.8
    if:
      type: text
      regex: CryptoJS\.mode\.CBC|\.mode\.CBC
  - id: cryptojs-pkcs7-padding
    desc: Uses CryptoJS PKCS7 padding
    crit: component
    conf: 0.75
    if:
      type: text
      regex: CryptoJS\.pad\.Pkcs7|\.pad\.Pkcs7
  - id: tiktok-webapp-aes-key
    desc: Embeds TikTok webapp AES key marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: webapp1.0+20210628
  - id: webcrypto-aes-gcm-importkey
    desc: "WebCrypto AES-GCM importKey w/ encrypt/decrypt"
    crit: component
    conf: 0.85
    if:
      type: text
      regex: importKey\s*\([\s\S]{0,160}AES-GCM[\s\S]{0,160}(decrypt|encrypt)
  - id: js-secret-key-assignment-name
    desc: JavaScript secret key assignment name
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]*(SECRET_KEY|ENCRYPTION_KEY|AES_KEY)\s*='
  - id: js-static-key-string-assignment
    desc: JavaScript static key string assignment
    crit: component
    conf: 0.82
    # A key-named identifier assigned an inline string literal — a hardcoded
    # key value. Requiring the *_KEY target (not any 16-char string) keeps the
    # name honest; bare quoted strings collide with ordinary UI/text literals.
    if:
      type: text
      regex: '(?i)\b\w*(secret|encryption|aes)_?key\s*=\s*["''][^"'']{8,}["'']'
  - id: cryptojs-utf8-secret-key-parse
    desc: CryptoJS parses secret key material
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Utf8\.parse\s*\(\s*[A-Za-z_$][\w$]*(SECRET_KEY|AES_KEY)'
  - id: node-crypto-create-cipher
    desc: Node.js crypto.createCipheriv usage
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'crypto\.createCipheriv\s*\('
  - id: node-crypto-create-cipher-legacy
    desc: Node.js legacy crypto.createCipher call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)createCipher$'
composite_rules:
  - id: cryptojs-aes-cbc-encrypt
    desc: CryptoJS AES-CBC encryption flow
    crit: notable
    conf: 0.9
    all:
      - id: cryptojs-aes-encrypt
      - id: cryptojs-cbc-mode
    any:
      - id: cryptojs-pkcs7-padding
      - id: tiktok-webapp-aes-key
  - id: cryptojs-aes-static-key
    desc: CryptoJS AES encryption with static key material
    crit: notable
    conf: 0.9
    all:
      - id: cryptojs-aes-encrypt
      - id: cryptojs-utf8-secret-key-parse
      - id: js-secret-key-assignment-name
      - id: js-static-key-string-assignment
