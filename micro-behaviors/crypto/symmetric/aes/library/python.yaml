# AES Encryption - Python
# MBC: C0021.001 (AES)
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: "C0021"
  attack: "T1027"
traits:
  # === pyaes library (third-party AES) ===
  - id: pyaes-import
    desc: pyaes library import
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "pyaes"
  - id: pyaes-gcm
    desc: pyaes AES-GCM mode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "AESModeOfOperationGCM"
  - id: pyaes-ctr
    desc: pyaes AES-CTR mode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "AESModeOfOperationCTR"
  - id: pyaes-cbc
    desc: pyaes AES-CBC mode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "AESModeOfOperationCBC"
  - id: pyaes-ofb
    desc: pyaes AES-OFB mode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: "AESModeOfOperationOFB"
  # === PyCryptodome / PyCrypto ===
  - id: pycrypto-aes-import
    desc: PyCryptodome AES import
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "from\\s+Crypto\\.Cipher\\s+import\\s+AES"
  - id: pycrypto-aes-new
    desc: PyCryptodome AES.new constructor call
    crit: notable
    conf: 0.85
    if:
      type: symbol
      regex: "AES\\.new"
  # Bytecode-visible module references. In a compiled .pyc the `from Crypto.X
  # import Y` source syntax is gone, but the dotted module name survives as a
  # code-object constant — so these text-substr atoms recover the AES/padding
  # signal on PyInstaller-extracted bytecode where the source-syntax atoms die.
  - id: pycrypto-cipher-module-ref
    desc: Crypto.Cipher module reference (text/bytecode)
    crit: notable
    conf: 0.7
    for: [python, pyc]
    if:
      type: text
      substr: Crypto.Cipher
  - id: pycrypto-padding-module-ref
    desc: Crypto.Util.Padding module reference (CBC)
    crit: component
    conf: 0.7
    for: [python, pyc]
    if:
      type: text
      substr: Crypto.Util.Padding
  - id: pycrypto-aes-cbc-mode
    desc: AES CBC mode usage
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "AES\\.MODE_CBC"
  - id: pycrypto-aes-ecb-mode
    desc: AES ECB mode usage
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "AES\\.MODE_ECB"
  - id: pycrypto-pad-call
    desc: Padding helper usage
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: "pad"
  - id: pycrypto-unpad-call
    desc: Unpadding helper usage
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: "unpad"
  - id: pycrypto-encrypt-func-name
    desc: Python encrypt function name
    crit: component
    conf: 0.75
    if:
      type: symbol
      regex: '^encrypt(_|[A-Z])(aes|data)\w+$'
  - id: pycrypto-decrypt-func-name
    desc: Python decrypt function name
    crit: component
    conf: 0.75
    if:
      type: symbol
      regex: '^decrypt(_|[A-Z])(aes|data)\w+$'
  - id: imported-key-iv-from-config
    desc: Key and IV imported from config-like module
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: "from\\s+.{0,24}\\s+import\\s+.{0,20}(AES_KEY|KEY).{0,20}(IV|NONCE)"
  # === cryptography library ===
  - id: cryptography-aes
    desc: cryptography library AES
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "from\\s+cryptography\\.hazmat.{0,50}\\s+import.{0,50}AES|algorithms\\.AES"
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: cryptography-aes-symbol
    desc: cryptography algorithms.AES symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "algorithms.AES"
  - id: cryptography-aesgcm-api
    desc: Python cryptography AESGCM API
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "AESGCM"
  - id: cryptography-gcm-mode
    desc: cryptography AES GCM mode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "modes.GCM"
  - id: cryptography-ecb-mode
    desc: cryptography AES ECB mode
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "modes.ECB"
  # === Hardcoded key material in byte strings ===
  - id: hardcoded-aes-key-bytes
    desc: Hardcoded AES key in Python byte string
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)[_a-z]*(key|secret)[_a-z]*\s*=\s*b"(\\x[0-9a-fA-F]{2}){16,}"'
    unless:
    - id: metadata/package/testing/presence/harness::test-directory
  - id: hardcoded-iv-bytes
    desc: Hardcoded IV in Python byte string
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)(^|[^a-z])iv([_a-z]*)\s*=\s*b"(\\x[0-9a-fA-F]{2}){16,}"'
  - id: multiple-hardcoded-keys
    desc: Multiple hardcoded crypto key byte strings
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '(?i)(key|iv|secret|nonce)\s*=\s*b"(\\x[0-9a-fA-F]{2}){16,}"'
composite_rules:
  # pyaes library usage
  - id: pyaes-usage
    desc: pyaes AES library usage
    crit: notable
    conf: 0.9
    any:
      - id: pyaes-gcm
      - id: pyaes-ctr
      - id: pyaes-cbc
      - id: pyaes-ofb
      - id: pyaes-import
  # PyCryptodome usage
  - id: pycrypto-usage
    desc: PyCryptodome AES usage
    crit: notable
    conf: 0.9
    any:
      - id: pycrypto-aes-import
      - id: pycrypto-aes-new
      - id: pycrypto-cipher-module-ref
      - id: pycrypto-padding-module-ref
  - id: python-aes-gcm-usage
    desc: Python AES GCM usage
    crit: notable
    conf: 0.9
    all:
      - id: cryptography-aes-symbol
      - id: cryptography-gcm-mode
  # Hardcoded key material composite
  - id: hardcoded-key-material
    desc: Hardcoded AES key or IV byte string
    crit: suspicious
    conf: 0.9
    any:
      - id: hardcoded-aes-key-bytes
      - id: hardcoded-iv-bytes
      - id: multiple-hardcoded-keys
  - id: pycrypto-pad-unpad-flow
    desc: AES padding and unpadding flow
    all:
      - id: pycrypto-pad-call
      - id: pycrypto-unpad-call
  - id: pycrypto-encrypt-decrypt-flow
    desc: AES encrypt and decrypt function pair
    all:
      - id: pycrypto-encrypt-func-name
      - id: pycrypto-decrypt-func-name
  - id: pycrypto-cbc-utility-module
    desc: PyCryptodome AES-CBC utility module with encrypt/decrypt flow
    crit: suspicious
    conf: 0.9
    all:
      - id: pycrypto-usage
      - id: pycrypto-aes-cbc-mode
      - id: pycrypto-pad-unpad-flow
      - id: pycrypto-encrypt-decrypt-flow
  - id: pycrypto-aes-decrypt-flow
    desc: PyCryptodome AES decrypt flow
    crit: notable
    conf: 0.9
    all:
      - id: pycrypto-usage
      - id: micro-behaviors/crypto/symmetric/decrypt::python-decrypt-method-call
      - id: pycrypto-unpad-call
