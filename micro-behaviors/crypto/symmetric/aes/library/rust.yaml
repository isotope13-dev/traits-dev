defaults:
  platforms: [linux, macos, windows]
  for: [rust, elf, macho, pe]

traits:
  - id: rust-aes-crate-path
    desc: Rust aes crate path or version marker
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\baes-[0-9]+\.[0-9]+\.[0-9]+\b|(^|[/\\])aes[/\\]src[/\\]'

  - id: rust-aes-gcm-crate-path
    desc: Rust aes-gcm crate path or version marker
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'aes-gcm-[0-9]+\.[0-9]+\.[0-9]+'
