defaults:
  platforms:
  - unix
  - windows
  crit: notable
  conf: 0.9
traits:
- id: dotnet-rijndael
  desc: Uses RijndaelManaged/AES in .NET
  for:
  - pe
  if:
    type: text
    substr: RijndaelManaged
  unless:
  - type: basename
    regex: ^System\.Security\.Cryptography\.(Algorithms|Csp)\.dll$
  - id: metadata/file/extension/identity::netstandard-dll-basename
  - type: text
    substr: costura.costura.dll.compressed
- id: dotnet-rijndael-token
  desc: .NET Rijndael/AES algorithm token
  crit: component
  conf: 0.84
  for:
  - pe
  if:
    type: text
    exact: Rijndael
  unless:
  - type: basename
    regex: ^System\.Security\.Cryptography\.(Algorithms|Csp)\.dll$
  - id: metadata/file/extension/identity::netstandard-dll-basename
- id: dotnet-aes-managed
  desc: Uses AesManaged in .NET
  for:
  - pe
  - csharp
  if:
    type: text
    substr: AesManaged
  unless:
  - type: basename
    regex: ^System\.Security\.Cryptography\.(Algorithms|Csp)\.dll$
  - id: metadata/file/extension/identity::netstandard-dll-basename
- id: dotnet-aes-csp
  desc: Uses AesCryptoServiceProvider in .NET
  for:
  - pe
  - csharp
  if:
    type: text
    substr: AesCryptoServiceProvider
  unless:
  - type: basename
    regex: ^System\.Security\.Cryptography\.(Algorithms|Csp)\.dll$
  - id: metadata/file/extension/identity::netstandard-dll-basename
- id: dotnet-crypto-namespace
  desc: Uses .NET crypto AES/Rijndael namespace
  for:
  - pe
  - csharp
  if:
    type: text
    regex: System\.Security\.Cryptography\.(Aes|Rijndael)
- id: dotnet-create-decryptor
  desc: .NET symmetric decryptor creation
  crit: component
  for:
  - pe
  - csharp
  if:
    type: text
    substr: CreateDecryptor
- id: dotnet-create-encryptor-raw
  desc: .NET CreateEncryptor method
  crit: component
  for:
  - pe
  if:
    type: text
    substr: CreateEncryptor
- id: identitymodel-tokens-dll
  desc: IdentityModel tokens library basename
  crit: baseline
  for:
  - pe
  if:
    type: path
    basename: true
    exact: Microsoft.IdentityModel.Tokens.dll
- id: rijndael-managed
  desc: RijndaelManaged AES implementation
  crit: notable
  conf: 0.95
  for:
  - csharp
  if:
    type: text
    substr: RijndaelManaged
- id: cbc-mode
  desc: CBC cipher mode selection
  crit: notable
  conf: 0.85
  for:
  - csharp
  if:
    type: text
    substr: CipherMode.CBC
- id: crypto-stream-read
  desc: CryptoStream read decryption
  crit: notable
  conf: 0.85
  for:
  - csharp
  if:
    type: text
    substr: CryptoStreamMode.Read
- id: benign-dotnet-keywrap-library
  desc: Known benign .NET key-wrap library
  crit: component
  conf: 1.0
  for:
  - pe
  if:
    type: path
    basename: true
    regex: ^(Microsoft\.IdentityModel\.Tokens|AWSSDK\.S3)\.dll$
- id: jwt-jwe-context--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    substr: Unsupported JWE algorithm requested
  count_max: 1007741
- id: jwt-jwe-context--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    substr: System.Security.Cryptography.Pkcs
  count_max: 1007742
- id: jwt-jwe-context--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    substr: X509EncryptingCredentials
  count_max: 1007743
- id: jwt-jwe-context--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    substr: CmsRecipient
  count_max: 1007744
- id: jwt-jwe-context--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    substr: JsonWebKey
  count_max: 1007745
- id: jwt-jwe-context--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    substr: jose-jwt
  count_max: 1007746
composite_rules:
- id: aes-decrypt-csharp
  desc: AES decryption in C#
  crit: notable
  conf: 0.95
  for:
  - csharp
  all:
  - id: rijndael-managed
  - id: dotnet-create-decryptor
  any:
  - id: cbc-mode
  - id: crypto-stream-read
- id: dotnet-rijndael-any
  desc: Uses RijndaelManaged/AES in .NET
  conf: 0.9
  for:
  - pe
  - csharp
  any:
  - id: dotnet-rijndael
  - id: dotnet-aes-managed
  - id: dotnet-aes-csp
  - id: dotnet-crypto-namespace
  - id: rijndael-managed
  - id: dotnet-rijndael-token
- id: dotnet-rijndael-decryptor
  desc: .NET Rijndael/AES decryptor path
  crit: notable
  conf: 0.9
  for:
  - pe
  - csharp
  all:
  - id: dotnet-rijndael-any
  - id: dotnet-create-decryptor
- id: dotnet-aes-rsa-hybrid-keywrap-pattern
  desc: Dotnet AES and RSA key-wrap APIs
  crit: suspicious
  conf: 0.9
  for:
  - pe
  all:
  - id: dotnet-create-encryptor-raw
  any:
  - id: micro-behaviors/crypto/asymmetric/rsa::dotnet-rsa-padding-raw
  - id: micro-behaviors/crypto/asymmetric/rsa::dotnet-rsa-x509-public-import-raw
  unless:
  - id: benign-dotnet-keywrap-library
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: jwt-jwe-context
- id: jwt-jwe-context
  desc: JWT or JWE crypto context
  crit: component
  conf: 0.95
  for:
  - pe
  any:
  - id: jwt-jwe-context--rx-1
  - id: jwt-jwe-context--rx-2
  - id: jwt-jwe-context--rx-3
  - id: jwt-jwe-context--rx-4
  - id: jwt-jwe-context--rx-5
  - id: jwt-jwe-context--rx-6
