defaults:
  platforms: [windows, linux, macos]
  mbc: C0021.001
traits:
- id: go-cfb-encrypter
  desc: Creates a new AES-CFB encrypter
  crit: notable
  conf: 0.9
  for:
  - go
  if:
    type: symbol
    kind: call
    exact: cipher.NewCFBEncrypter
- id: go-xor-keystream
  desc: Applies cipher stream XOR
  crit: notable
  conf: 0.85
  for:
  - go
  if:
    type: symbol
    regex: '\.XORKeyStream$'
- id: go-hardcoded-random-aes-key--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  for:
  - go
  if:
    type: text
    substr: hex.EncodeToString
- id: go-hardcoded-random-aes-key--rx-3
  desc: Go hardcoded byte-string key material
  crit: component
  conf: 0.92
  for:
  - go
  if:
    type: text
    regex: '\[\]byte\(\s*"[^"]{16,32}"\s*\)'
- id: go-hardcoded-key-literal
  desc: Hardcoded AES key byte-string literal
  crit: component
  conf: 0.85
  for:
  - go
  if:
    type: text
    regex: '\b(key|aesKey|secretKey)\s*:?=\s*\[\]byte\(\s*"[^"]{16,64}"\s*\)'
    case_insensitive: true
- id: go-hardcoded-iv-literal
  desc: Hardcoded AES IV byte-string literal
  crit: component
  conf: 0.85
  for:
  - go
  if:
    type: text
    regex: '\biv\s*:?=\s*\[\]byte\(\s*"[^"]{8,32}"\s*\)'
    case_insensitive: true
- id: go-ctr-stream
  desc: Creates a new AES-CTR stream
  crit: notable
  conf: 0.9
  for:
  - go
  if:
    type: symbol
    exact: cipher.NewCTR
- id: go-new-cipher-string
  desc: aes.NewCipher string in binary
  crit: notable
  conf: 0.7
  for: [go, elf, macho, pe, wasm]
  if:
    type: text
    substr: aes.NewCipher
- id: go-cfb-encrypter-string
  desc: cipher.NewCFBEncrypter string in binary
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    substr: cipher.NewCFBEncrypter
- id: go-cfb-decrypter-string
  desc: cipher.NewCFBDecrypter string in binary
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    regex: (crypto/)?cipher\.(NewCFBDecrypter|newCFB)
- id: go-cbc-encrypter-string
  desc: Go AES-CBC encrypter runtime string
  crit: notable
  conf: 0.72
  for: [scripts, binaries]
  if:
    type: text
    substr: cipher.NewCBCEncrypter
- id: go-cbc-decrypter-string
  desc: Go AES-CBC decrypter runtime string
  crit: notable
  conf: 0.72
  for: [scripts, binaries]
  if:
    type: text
    substr: cipher.NewCBCDecrypter
- id: go-new-cipher-symbol
  desc: AES cipher constructor symbol
  crit: notable
  conf: 0.9
  for: [scripts, binaries]
  if:
    type: text
    exact: crypto/aes.NewCipher
- id: go-newgcm-error-string
  desc: Go AES-GCM runtime string
  crit: notable
  conf: 0.86
  for: [elf, macho, pe]
  if:
    type: text
    exact: "cipher: NewGCM requires 128-bit block cipher"
- id: go-cfb-stream-itab
  desc: Go CFB stream interface
  crit: notable
  conf: 0.78
  for: [scripts, binaries]
  if:
    type: text
    substr: crypto/cipher.cfb,crypto/cipher.Stream
- id: go-aes-ecb-decryptor
  desc: Go AES ECB shellcode decryptor
  crit: suspicious
  conf: 0.98
  for:
  - pe
  platforms:
  - windows
  if:
    type: text
    exact: main.AesDecryptByECB
- id: go-aes-invalid-key-size
  desc: Go AES key size validation string
  crit: notable
  conf: 0.82
  for:
  - pe
  if:
    type: text
    substr: "crypto/aes: invalid key size"
- id: hardcoded-aes-test-key
  desc: Hardcoded 16-byte AES key string
  crit: suspicious
  conf: 0.99
  for:
  - pe
  platforms:
  - windows
  if:
    type: text
    substr: dsfsddsdfh456231
composite_rules:
- id: go-hardcoded-random-aes-key
  desc: AES key from hardcoded and random parts
  crit: suspicious
  conf: 0.92
  for:
  - go
  all:
  - id: go-hardcoded-random-aes-key--rx-1
  - id: go-new-cipher-string
  - id: go-hardcoded-random-aes-key--rx-3
  near_bytes: 64
- id: go-cbc-mode-string
  desc: Go AES-CBC mode runtime strings
  crit: notable
  conf: 0.78
  any:
  - id: go-cbc-encrypter-string
  - id: go-cbc-decrypter-string
# A hardcoded AES key AND IV declared together is the static-key decryptor
# pattern: malware ships an embedded key to decrypt a bundled payload or C2
# config; benign code uses it to read a known-key config blob. Dual-use, so
# notable — a hostile composite escalates when paired with remote fetch + exec.
- id: go-static-aes-key-iv
  desc: Static hardcoded AES key and IV pair
  crit: notable
  conf: 0.9
  for:
  - go
  attack: T1573.001
  all:
  - id: go-hardcoded-key-literal
  - id: go-hardcoded-iv-literal
  near_bytes: 256
