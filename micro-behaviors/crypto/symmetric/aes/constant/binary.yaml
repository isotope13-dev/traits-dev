defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: aes-sbox-bytes
    desc: AES S-box start bytes
    crit: notable
    conf: 0.7
    mbc: C0021.001
    if:
      type: hex
      section: .text
      pattern: 63 7C 77 7B F2 6B 6F C5
  - id: aes-sbox-bytes-pe-rdata
    desc: AES S-box table in PE rdata
    crit: notable
    conf: 0.78
    platforms: [windows]
    for: [pe, dll]
    mbc: C0021.001
    if:
      type: hex
      section: .rdata
      pattern: 63 7C 77 7B F2 6B 6F C5
  - id: aes-encrypt-symbol
    desc: AES encryption function symbol
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: aes_encrypt
