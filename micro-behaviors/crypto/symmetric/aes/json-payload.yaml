defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: component
  conf: 0.85
  mbc: C0021.001
traits:
  - id: json-ciphertext-field
    desc: JSON ciphertext field
    if:
      type: text
      substr: 'json:"ciphertext"'
  - id: json-iv-field
    desc: JSON IV field
    if:
      type: text
      substr: 'json:"iv"'
composite_rules:
  - id: json-ciphertext-iv-fields
    desc: JSON ciphertext and IV fields
    crit: notable
    conf: 0.88
    all:
      - id: json-ciphertext-field
      - id: json-iv-field
