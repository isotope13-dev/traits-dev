defaults:
  platforms: [windows]
  for: [vbs]

traits:
  - id: rijndael-class-vb6
    desc: VB6 Rijndael class implementation
    crit: notable
    conf: 0.96
    if:
      type: text
      exact: Attribute VB_Name = "CRijndael"

  - id: rijndael-encryptdata-vb6
    desc: VB6 Rijndael EncryptData method
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Public Function EncryptData(bytMessage() As Byte

  - id: rijndael-decryptdata-vb6
    desc: VB6 Rijndael DecryptData method
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Public Function DecryptData(bytIn() As Byte

  - id: rijndael-wrapper-vb6
    desc: VB6 Rijndael wrapper usage
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: Set oTest = New CRijndael

composite_rules:
  - id: rijndael-buffer-crypto-vb6
    desc: VB6 Rijndael buffer encryption
    crit: notable
    conf: 0.96
    all:
      - id: micro-behaviors/crypto/symmetric/aes/vb6::rijndael-class-vb6
      - id: micro-behaviors/crypto/symmetric/aes/vb6::rijndael-encryptdata-vb6
      - id: micro-behaviors/crypto/symmetric/aes/vb6::rijndael-decryptdata-vb6
