# OpenSSL symmetric encryption commands in shell scripts
defaults:
  for: [shell]
  platforms: [linux, unix, macos]
  mbc: C0027
traits:
  - id: openssl-enc-aes
    desc: OpenSSL AES symmetric encryption command
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: openssl enc -aes-\d+-
  - id: openssl-rand-key
    desc: OpenSSL random key generation command
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: openssl rand \d+
