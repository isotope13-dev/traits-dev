defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  mbc: C0021.001
traits:
  - id: go-new-cipher
    desc: Creates a new AES cipher
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: call
      exact: aes.NewCipher
  - id: go-cfb-encrypter
    desc: Creates a new AES-CFB encrypter
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: call
      exact: cipher.NewCFBEncrypter
  - id: go-new-cipher-string
    desc: aes.NewCipher string in binary
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
      - pe
    if:
      type: string_value
      substr: aes.NewCipher
  - id: go-cfb-encrypter-string
    desc: cipher.NewCFBEncrypter string in binary
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
      - pe
    if:
      type: string_value
      substr: cipher.NewCFBEncrypter
