defaults:
  platforms:
    - unix
    - windows
    - macos
  crit: notable
  conf: 0.9
traits:
  - id: dotnet-rijndael
    desc: Uses RijndaelManaged/AES in .NET
    for:
      - pe
      - dll
    if:
      type: text
      substr: RijndaelManaged
    unless:
      - type: basename
        regex: ^System\.Security\.Cryptography\.(Algorithms|Csp)\.dll$
      - type: basename
        exact: netstandard.dll
  - id: dotnet-aes-managed
    desc: Uses AesManaged in .NET
    for:
      - pe
      - dll
      - csharp
    if:
      type: text
      substr: AesManaged
    unless:
      - type: basename
        regex: ^System\.Security\.Cryptography\.(Algorithms|Csp)\.dll$
      - type: basename
        exact: netstandard.dll
  - id: dotnet-aes-csp
    desc: Uses AesCryptoServiceProvider in .NET
    for:
      - pe
      - dll
      - csharp
    if:
      type: text
      substr: AesCryptoServiceProvider
  - id: dotnet-crypto-namespace
    desc: Uses .NET crypto AES/Rijndael namespace
    for:
      - pe
      - dll
      - csharp
    if:
      type: text
      regex: System\.Security\.Cryptography\.(Aes|Rijndael)
  - id: dotnet-create-decryptor
    desc: Uses CreateDecryptor in .NET
    for:
      - pe
      - dll
    if:
      type: text
      substr: CreateDecryptor
  - id: dotnet-create-encryptor-raw
    desc: Uses CreateEncryptor in .NET
    for:
      - pe
      - dll
    if:
      type: text
      substr: CreateEncryptor
  - id: dotnet-icryptotransform
    desc: Uses ICryptoTransform in .NET
    crit: baseline
    for:
      - pe
      - dll
      - csharp
    if:
      type: text
      substr: ICryptoTransform
  - id: rijndael-managed
    desc: RijndaelManaged AES implementation
    crit: notable
    conf: 0.95
    for:
      - csharp
    platforms:
      - windows
      - linux
      - macos
      - unix
      - android
      - ios
    if:
      type: text
      substr: RijndaelManaged
  - id: create-decryptor
    desc: AES decryptor creation
    crit: notable
    conf: 0.9
    for:
      - csharp
    platforms:
      - windows
      - linux
      - macos
      - unix
      - android
      - ios
    if:
      type: text
      substr: CreateDecryptor
  - id: cbc-mode
    desc: CBC cipher mode selection
    crit: baseline
    conf: 0.85
    for:
      - csharp
    platforms:
      - windows
      - linux
      - macos
      - unix
      - android
      - ios
    if:
      type: text
      substr: CipherMode.CBC
  - id: crypto-stream-read
    desc: CryptoStream read decryption
    crit: notable
    conf: 0.85
    for:
      - csharp
    platforms:
      - windows
      - linux
      - macos
      - unix
      - android
      - ios
    if:
      type: text
      substr: CryptoStreamMode.Read
composite_rules:
  - id: aes-decrypt-csharp
    desc: AES decryption in C#
    crit: notable
    conf: 0.95
    for:
      - csharp
    platforms:
      - windows
      - linux
      - macos
      - unix
      - android
      - ios
    all:
      - id: rijndael-managed
      - id: create-decryptor
    any:
      - id: cbc-mode
      - id: crypto-stream-read
  - id: dotnet-rijndael-any
    desc: Uses RijndaelManaged/AES in .NET
    conf: 0.9
    for:
      - pe
      - dll
      - csharp
    any:
      - id: dotnet-rijndael
      - id: dotnet-aes-managed
      - id: dotnet-aes-csp
      - id: dotnet-crypto-namespace
      - id: dotnet-create-decryptor
      - id: dotnet-create-encryptor-raw
      - id: dotnet-icryptotransform
      - id: rijndael-managed
      - id: create-decryptor
  - id: dotnet-aes-rsa-hybrid-keywrap-pattern
    desc: Dotnet AES and RSA key-wrap APIs
    crit: suspicious
    conf: 0.9
    for:
      - pe
      - dll
    all:
      - id: dotnet-create-encryptor-raw
    any:
      - id: micro-behaviors/crypto/asymmetric/rsa::dotnet-rsa-padding-raw
      - id: micro-behaviors/crypto/asymmetric/rsa::dotnet-rsa-x509-public-import-raw
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - type: text
          substr: CmsRecipient
        - type: text
          substr: System.Security.Cryptography.Pkcs
