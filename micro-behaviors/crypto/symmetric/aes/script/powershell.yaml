defaults:
  platforms: [windows]
  for: [powershell]
  crit: notable
  conf: 0.9

traits:
  - id: powershell-crypto-stream-write
    desc: PowerShell writes through a .NET CryptoStream
    if:
      type: text
      regex: '(?i)CryptoStreamMode\s*\]::\s*Write'
  - id: powershell-aes-gcm-decrypt
    desc: PowerShell uses .NET AES-GCM decryption
    crit: notable
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: '(?is)\bAesGcm\b.{0,240}\b(Decrypt|New-Object)\b|\b(Decrypt|New-Object)\b.{0,240}\bAesGcm\b'
