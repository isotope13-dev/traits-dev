defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: C0068

traits:
  - id: js-aes-inverse-sbox-table
    desc: JavaScript AES inverse S-box table
    crit: notable
    conf: 0.94
    if:
      type: text
      word: SBOX_INV
  - id: js-aes-inverse-mix-columns
    desc: JavaScript AES inverse mix-columns routine
    crit: notable
    conf: 0.94
    if:
      type: text
      word: invMixColumns
  - id: js-aes-inverse-gf-multiplier
    desc: JavaScript AES inverse multiplier table
    crit: notable
    conf: 0.94
    if:
      type: text
      word: MUL0E

composite_rules:
  - id: js-handwritten-aes-decrypt
    desc: JavaScript handwritten AES inverse transform
    crit: notable
    conf: 0.97
    all:
      - id: js-aes-inverse-sbox-table
      - id: js-aes-inverse-mix-columns
      - id: js-aes-inverse-gf-multiplier
