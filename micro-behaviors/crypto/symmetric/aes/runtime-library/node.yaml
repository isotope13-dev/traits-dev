defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: crypto-require-call
    desc: require('crypto') import
    crit: component
    conf: 0.8
    if:
      type: text
      regex: require\(['"]crypto['"]\)
  - id: crypto-from-import
    desc: from 'crypto' import (ESM)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: from ['"]crypto['"]
  - id: createDecipheriv
    desc: Create decipher with IV (symmetric)
    crit: notable
    conf: 0.85
    mbc: C0027
    if:
      type: symbol
      regex: (^|\.)createDecipheriv$
  - id: createdecipheriv-raw
    desc: createDecipheriv string reference
    crit: notable
    conf: 0.8
    for: [data, javascript, typescript]
    mbc: C0027
    if:
      type: text
      substr: createDecipheriv
  - id: createdecipher-legacy
    desc: Legacy crypto.createDecipher call (no IV)
    crit: notable
    conf: 0.7
    mbc: C0027
    if:
      type: symbol
      regex: (^|\.)createDecipher$
  - id: aes-128-ctr-dash
    desc: AES-128-CTR with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-128-ctr
  - id: aes128ctr-nodash
    desc: AES-128-CTR without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes128ctr
  - id: aes-256-cbc-dash
    desc: AES-256-CBC with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-256-cbc
  - id: aes-256-cbc-hex-raw
    desc: Hex encoded AES-256-CBC
    crit: notable
    conf: 0.78
    for: [data, javascript, typescript]
    mbc: C0027
    if:
      type: text
      substr: "6165732d3235362d636263"
  - id: aes256cbc-nodash
    desc: AES-256-CBC without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes256cbc
  - id: aes-256-gcm-dash
    desc: AES-256-GCM with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-256-gcm
  - id: aes256gcm-nodash
    desc: AES-256-GCM without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes256gcm
  - id: aes-algorithm
    desc: AES algorithm string prefix
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: \baes-
      case_insensitive: true
  - id: hardcoded-key-pattern
    desc: Hardcoded encryption key in string
    crit: suspicious
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: (key|secret|password|pass)\s*[=:]\s*Buffer\.from\(['"][0-9a-fA-F]{32,}['"]
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: metadata/package/testing/harness/runtime::test-basename-pattern
  - id: hardcoded-iv-pattern
    desc: Hardcoded IV in string literal
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: \biv\b\s*[=:]\s*Buffer\.from\(['"][0-9a-fA-F]{16,}['"]
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  - id: buffer-hex-key-material
    desc: Buffer.from with hex-encoded key material
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\(['"][0-9a-fA-F]{32,}['"],\s*['"]hex['"]
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  - id: buffer-from-hex
    desc: Buffer.from with long hex string
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\s*\(\s*['"][0-9a-fA-F]{32,}['"]
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  - id: buffer-from-ascii-key
    desc: Buffer.from with 32-char key string
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\(['"][A-Za-z0-9]{32}['"]\)
composite_rules:
  - id: crypto-require
    desc: Node.js crypto module import
    crit: notable
    conf: 0.9
    any:
      - id: crypto-require-call
      - id: crypto-from-import
  - id: aes-128-ctr
    desc: AES-128-CTR encryption (stream cipher mode)
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-128-ctr-dash
      - id: aes128ctr-nodash
  - id: aes-256-cbc
    desc: AES-256-CBC encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-256-cbc-dash
      - id: aes-256-cbc-hex-raw
      - id: aes256cbc-nodash
  - id: aes-256-gcm
    desc: AES-256-GCM authenticated encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-256-gcm-dash
      - id: aes256gcm-nodash
  - id: cipher-create
    desc: Cipher or decipher creation
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: micro-behaviors/crypto/library/keyword::create-cipheriv
      - id: createDecipheriv
      - id: createdecipheriv-raw
      - id: createdecipher-legacy
  - id: http-client-comp
    desc: HTTP/HTTPS client request capability
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/communications/http/request/
  - id: compression-lib-comp
    desc: Compression/decompression library usage
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/data/encode/compression::zlib-signature
      - id: micro-behaviors/data/compress/library::node-gzip-functions
      - id: micro-behaviors/data/compress/library::inflate
      - id: micro-behaviors/data/compress/library::deflate
  - id: hardcoded-key
    desc: Hardcoded encryption key pattern
    crit: suspicious
    conf: 0.8
    mbc: C0027
    any:
      - id: hardcoded-key-pattern
      - id: hardcoded-iv-pattern
      - id: buffer-from-hex
      - id: buffer-hex-key-material
      - id: buffer-from-ascii-key
  - id: aes-with-http-client
    desc: AES crypto near HTTP client code
    crit: notable
    conf: 0.9
    mbc: C0027
    attack: T1573
    near_lines: 160
    all:
      - id: cipher-create
      - id: aes-algorithm
      - id: http-client-comp
    unless:
      - id: metadata/library/runtime::browserify-crypto-bundle
      - id: well-known/lib/node-edge::edge-network-runtime-library
  - id: gzip-with-crypto
    desc: Gzip compression alongside encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    all:
      - id: compression-lib-comp
      - id: cipher-create
