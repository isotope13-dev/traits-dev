defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: createCipheriv
    desc: Creates cipher with initialization vector
    crit: notable
    conf: 0.85
    mbc: C0027
    if:
      type: symbol
      kind: call
      regex: (^|\.)createCipheriv$
  - id: createcipheriv-raw
    desc: createCipheriv string reference
    crit: notable
    conf: 0.8
    for: [data, javascript, typescript]
    mbc: C0027
    if:
      type: text
      substr: createCipheriv
  - id: createDecipheriv
    desc: Creates decipher with initialization vector
    crit: notable
    conf: 0.85
    mbc: C0027
    if:
      type: symbol
      regex: (^|\.)createDecipheriv$
  - id: createdecipheriv-raw
    desc: createDecipheriv string reference
    crit: notable
    conf: 0.8
    for: [data, javascript, typescript]
    mbc: C0027
    if:
      type: text
      substr: createDecipheriv
  - id: create-decipher-call
    desc: JavaScript createDecipher API call
    crit: notable
    conf: 0.7
    mbc: C0027
    if:
      type: symbol
      regex: (^|\.)createDecipher$
  - id: aes-128-ctr-dash
    desc: AES-128-CTR with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-128-ctr
  - id: aes128ctr-nodash
    desc: AES-128-CTR without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes128ctr
  - id: aes-256-cbc-dash
    desc: AES-256-CBC with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-256-cbc
  - id: aes-256-cbc-hex-raw
    desc: Hex encoded AES-256-CBC
    crit: notable
    conf: 0.78
    for: [data, javascript, typescript]
    mbc: C0027
    if:
      type: text
      substr: "6165732d3235362d636263"
  - id: aes256cbc-nodash
    desc: AES-256-CBC without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes256cbc
  - id: aes-256-gcm-dash
    desc: AES-256-GCM with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-256-gcm
  - id: aes256gcm-nodash
    desc: AES-256-GCM without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes256gcm
  - id: aes-algorithm
    desc: AES algorithm string prefix
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: \baes-
      case_insensitive: true
  - id: hardcoded-key-pattern
    desc: Hardcoded encryption key in string
    crit: suspicious
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: (key|secret|password|pass)\s*[=:]\s*Buffer\.from\(['"][0-9a-fA-F]{32,}['"]
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime::node-common-require
  - id: hardcoded-iv-pattern
    desc: Hardcoded IV in string literal
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: \biv\b\s*[=:]\s*Buffer\.from\(['"][0-9a-fA-F]{16,}['"]
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: buffer-hex-key-material
    desc: Buffer.from with long hex literal
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\(['"][0-9a-fA-F]{32,}['"],\s*['"]hex['"]
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: buffer-from-hex
    desc: Buffer.from with long hex string
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\s*\(\s*['"][0-9a-fA-F]{32,}['"]
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: buffer-from-ascii-key
    desc: Buffer.from with 32-char key string
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\(['"][A-Za-z0-9]{32}['"]\)
composite_rules:
  - id: aes-128-ctr
    desc: AES-128-CTR encryption (stream cipher mode)
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-128-ctr-dash
      - id: aes128ctr-nodash
  - id: aes-256-cbc
    desc: AES-256-CBC encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-256-cbc-dash
      - id: aes-256-cbc-hex-raw
      - id: aes256cbc-nodash
  - id: aes-256-gcm
    desc: AES-256-GCM authenticated encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-256-gcm-dash
      - id: aes256gcm-nodash
  - id: cipher-create
    desc: Cipher or decipher creation
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: createCipheriv
      - id: createcipheriv-raw
      - id: createDecipheriv
      - id: createdecipheriv-raw
      - id: create-decipher-call
  - id: hardcoded-key
    desc: Hardcoded encryption key pattern
    crit: suspicious
    conf: 0.8
    mbc: C0027
    any:
      - id: hardcoded-key-pattern
      - id: hardcoded-iv-pattern
      - id: buffer-from-ascii-key
  - id: aes-with-http-client
    desc: AES crypto near HTTP client code
    crit: notable
    conf: 0.9
    mbc: C0027
    attack: T1573
    near_lines: 160
    all:
      - id: cipher-create
      - id: aes-algorithm
      - id: micro-behaviors/communications/http/request/client::http-client
    unless:
      - id: metadata/library/runtime::browserify-crypto-bundle
      - id: well-known/lib/node-edge/
  - id: gzip-with-crypto
    desc: Gzip compression alongside encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    all:
      - id: micro-behaviors/data/compress/library::node-gzip-functions
      - id: cipher-create
