defaults:
  platforms: [windows]
  for: [binaries]
  crit: notable
  conf: 0.9
  mbc: C0021

traits:
  - id: bcrypt-chaining-mode-cbc
    desc: Windows BCrypt AES-CBC mode property string
    if:
      type: text
      exact: ChainingModeCBC

  - id: bcrypt-chaining-mode-gcm
    desc: Windows BCrypt AES-GCM mode property string
    if:
      type: text
      exact: ChainingModeGCM

  - id: bcrypt-chaining-mode-cfb
    desc: Windows BCrypt AES-CFB mode property string
    if:
      type: text
      exact: ChainingModeCFB

  - id: bcrypt-chaining-mode-prop
    desc: Windows BCrypt ChainingMode property key
    crit: component
    if:
      type: text
      exact: ChainingMode

composite_rules:
  - id: bcrypt-aes-cbc
    desc: AES-CBC encryption via Windows BCrypt/CNG API
    crit: notable
    conf: 0.92
    attack: T1027
    mbc: C0021.001
    all:
      - id: bcrypt-chaining-mode-prop
    any:
      - id: bcrypt-chaining-mode-cbc
      - id: bcrypt-chaining-mode-gcm
      - id: bcrypt-chaining-mode-cfb
