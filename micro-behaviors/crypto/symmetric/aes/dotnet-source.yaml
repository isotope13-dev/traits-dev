defaults:
  platforms: [windows, linux, macos, unix, android, ios]
  for: [csharp]
traits:
  - id: rijndael-managed
    desc: RijndaelManaged AES implementation
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: RijndaelManaged
  - id: create-decryptor
    desc: AES decryptor creation
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: CreateDecryptor
  - id: cbc-mode
    desc: CBC cipher mode selection
    crit: baseline
    conf: 0.85
    if:
      type: raw
      substr: CipherMode.CBC
  - id: crypto-stream-read
    desc: CryptoStream read decryption
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: CryptoStreamMode.Read
composite_rules:
  - id: aes-decrypt-csharp
    desc: AES decryption in C#
    crit: notable
    conf: 0.95
    all:
      - id: rijndael-managed
      - id: create-decryptor
    any:
      - id: cbc-mode
      - id: crypto-stream-read
