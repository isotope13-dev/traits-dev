defaults:
  platforms: [linux, macos, windows]
  for: [rust, elf, macho, pe]
  mbc: C0021.001

traits:
- id: aes-256-ctr-term
  desc: AES-256-CTR cipher marker
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: '(?i)\bAES[-_ ]?256[-_ ]?CTR\b'

- id: ctr-mode-term--rx-1
  desc: CTR or counter mode near encryption terminology
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)\b(ctr|counter)\b.{0,40}\b(encrypt|stream)\b'

  count_max: 1008083
- id: ctr-mode-term--rx-2
  desc: CTR or counter mode near cipher terminology
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)\b(ctr|counter)\b.{0,40}\b(cipher|keystream)\b'

  count_max: 1008084
- id: ctr-mode-term--rx-3
  desc: Encryption terminology near CTR or counter mode
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\b(encrypt|stream)\b.{0,40}\b(ctr|counter)\b'

  count_max: 1008085
- id: ctr-mode-term--rx-4
  desc: Cipher terminology near CTR or counter mode
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\b(cipher|keystream)\b.{0,40}\b(ctr|counter)\b'

  count_max: 1008086
composite_rules:
- id: aes-ctr-usage
  desc: Includes AES-CTR stream-cipher support
  crit: notable
  conf: 0.9
  any:
  - id: aes-256-ctr-term
  - id: ctr-mode-term
- id: ctr-mode-term
  desc: References CTR or counter-mode encryption
  crit: component
  conf: 0.8
  any:
  - id: ctr-mode-term--rx-1
  - id: ctr-mode-term--rx-2
  - id: ctr-mode-term--rx-3
  - id: ctr-mode-term--rx-4
