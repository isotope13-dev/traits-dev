defaults:
  platforms: [linux, macos, windows]
  for: [binaries, source]
  mbc: C0021.001

traits:
- id: rust-aes-crate-path
  desc: Rust AES library marker
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '\baes-[0-9]+\.[0-9]+\.[0-9]+\b|(^|[/\\])aes[/\\]src[/\\]'

- id: aes-256-ctr-term
  desc: AES-256-CTR cipher marker
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: '(?i)\bAES[-_ ]?256[-_ ]?CTR\b'

- id: ctr-mode-term--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)\b(ctr|counter)\b.{0,40}\b(encrypt|stream)\b'

- id: ctr-mode-term--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)\b(ctr|counter)\b.{0,40}\b(cipher|keystream)\b'

- id: ctr-mode-term--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\b(encrypt|stream)\b.{0,40}\b(ctr|counter)\b'

- id: ctr-mode-term--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\b(cipher|keystream)\b.{0,40}\b(ctr|counter)\b'

composite_rules:
- id: aes-ctr-usage
  desc: AES-CTR stream cipher usage
  crit: notable
  conf: 0.9
  any:
  - id: aes-256-ctr-term
  - id: ctr-mode-term
- id: ctr-mode-term
  desc: CTR stream mode marker
  crit: component
  conf: 0.8
  any:
  - id: ctr-mode-term--rx-1
  - id: ctr-mode-term--rx-2
  - id: ctr-mode-term--rx-3
  - id: ctr-mode-term--rx-4
  needs: 1
