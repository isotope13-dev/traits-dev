# AES Encryption - Ruby
# MBC: C0021.001 (AES)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
  mbc: "C0021"
  crit: notable
traits:
  - id: openssl-cipher-aes
    desc: OpenSSL AES cipher
    conf: 0.9
    if:
      type: string_literal
      regex: OpenSSL::Cipher::AES|Cipher\.new\(.{0,20}AES
  - id: aes-cbc-mode
    desc: AES-CBC cipher mode
    conf: 0.9
    if:
      type: string_literal
      regex: AES-\d+-CBC|aes-\d+-cbc
  - id: aes-gcm-mode
    desc: AES-GCM cipher mode
    conf: 0.9
    if:
      type: string_literal
      regex: AES-\d+-GCM|aes-\d+-gcm
  - id: aes-ecb-mode
    desc: AES-ECB cipher mode
    conf: 0.9
    if:
      type: string_literal
      regex: AES-\d+-ECB|aes-\d+-ecb
  - id: cipher-encrypt-decrypt
    desc: OpenSSL cipher encrypt/decrypt
    conf: 0.85
    if:
      type: text
      regex: \.(encrypt|decrypt)\b
    not:
      - substr: encrypted_
      - substr: decrypted_
