defaults:
  platforms: [windows]
  for: [binaries]
  crit: component
  conf: 0.9
  mbc: C0021

traits:
  - id: bcrypt-dll-name
    desc: Windows BCrypt DLL name
    if:
      type: text
      exact: bcrypt.dll

  - id: bcrypt-open-algorithm-provider
    desc: Windows BCrypt algorithm provider API
    if:
      type: text
      exact: BCryptOpenAlgorithmProvider

  - id: bcrypt-generate-symmetric-key
    desc: Windows BCrypt symmetric key API
    if:
      type: text
      exact: BCryptGenerateSymmetricKey

  - id: bcrypt-set-property
    desc: Windows BCrypt property setter API
    if:
      type: text
      exact: BCryptSetProperty

  - id: bcrypt-decrypt-api
    desc: Windows BCrypt decrypt API
    if:
      type: text
      exact: BCryptDecrypt

  - id: bcrypt-encrypt-api
    desc: Windows BCrypt encrypt API
    if:
      type: text
      exact: BCryptEncrypt

  - id: bcrypt-authenticated-mode-info
    desc: Windows BCrypt authenticated mode struct
    if:
      type: text
      exact: BCRYPT_AUTHENTICATED_CIPHER_MODE_INFO

composite_rules:
  - id: bcrypt-symmetric-crypto
    desc: Symmetric crypto via Windows BCrypt/CNG
    crit: notable
    conf: 0.94
    all:
      - id: bcrypt-open-algorithm-provider
      - id: bcrypt-generate-symmetric-key
    any:
      - id: bcrypt-encrypt-api
      - id: bcrypt-decrypt-api
      - id: bcrypt-set-property
      - id: bcrypt-authenticated-mode-info
    needs: 3

  - id: bcrypt-aes-gcm-decrypt
    desc: AES-GCM decryption via Windows BCrypt/CNG
    crit: notable
    conf: 0.95
    attack: T1027
    mbc: C0021.001
    all:
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-chaining-mode-gcm
      - id: bcrypt-open-algorithm-provider
      - id: bcrypt-generate-symmetric-key
      - id: bcrypt-decrypt-api
    any:
      - id: bcrypt-dll-name
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-chaining-mode-prop
