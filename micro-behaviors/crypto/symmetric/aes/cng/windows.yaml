defaults:
  platforms: [windows]
  for: [binaries]
  crit: component
  conf: 0.9
  mbc: C0021

traits:
  - id: bcrypt-dll-name
    desc: Windows BCrypt DLL name
    if:
      type: text
      exact: bcrypt.dll

  - id: bcrypt-open-algorithm-provider
    desc: Windows BCrypt algorithm provider API
    if:
      type: text
      exact: BCryptOpenAlgorithmProvider

  - id: bcrypt-generate-symmetric-key
    desc: Windows BCrypt symmetric key API
    if:
      type: text
      exact: BCryptGenerateSymmetricKey

  - id: bcrypt-decrypt-api
    desc: Windows BCrypt decrypt API
    if:
      type: text
      exact: BCryptDecrypt

composite_rules:
  - id: bcrypt-aes-gcm-decrypt
    desc: AES-GCM decryption via Windows BCrypt/CNG
    crit: notable
    conf: 0.95
    attack: T1027
    mbc: C0021.001
    all:
      - id: micro-behaviors/crypto/symmetric/aes::bcrypt-chaining-mode-gcm
      - id: bcrypt-open-algorithm-provider
      - id: bcrypt-generate-symmetric-key
      - id: bcrypt-decrypt-api
    any:
      - id: bcrypt-dll-name
      - id: micro-behaviors/crypto/symmetric/aes::bcrypt-chaining-mode-prop
