defaults:
  platforms: [windows]
  for: [data]
  crit: notable
  conf: 0.88

traits:
  - id: create-decryptor
    desc: .NET CreateDecryptor in data
    crit: component
    if:
      type: text
      regex: '(?i)creat.{0,16}de.{0,8}cr.{0,8}ypt.{0,8}or'
  - id: rijndael-managed
    desc: RijndaelManaged AES in data
    conf: 0.9
    if:
      type: text
      regex: '(?i)rijndaelmanaged|R.{0,32}ijndae.{0,32}lManaged'
  - id: cbc-mode
    desc: CBC cipher mode in data
    conf: 0.85
    if:
      type: text
      regex: '(?i)CipherMode.{0,24}c.{0,4}BC|CipherMode\.CBC'
