defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: crypto-require-call
    desc: require('crypto') import
    crit: component
    conf: 0.8
    if:
      type: text
      regex: require\(['"]crypto['"]\)
  - id: crypto-from-import
    desc: from 'crypto' import (ESM)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: from ['"]crypto['"]
  - id: createDecipheriv
    desc: Create decipher with IV (symmetric)
    crit: notable
    conf: 0.85
    mbc: C0027
    if:
      type: symbol
      exact: createDecipheriv
  - id: aes-128-ctr-dash
    desc: AES-128-CTR with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-128-ctr
  - id: aes128ctr-nodash
    desc: AES-128-CTR without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes128ctr
  - id: aes-256-cbc-dash
    desc: AES-256-CBC with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-256-cbc
  - id: aes256cbc-nodash
    desc: AES-256-CBC without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes256cbc
  - id: aes-256-gcm-dash
    desc: AES-256-GCM with dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes-256-gcm
  - id: aes256gcm-nodash
    desc: AES-256-GCM without dashes
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: string_literal
      substr: aes256gcm
  - id: aes-algorithm
    desc: AES algorithm string prefix
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: \baes-
      case_insensitive: true
  - id: hardcoded-key-pattern
    desc: Hardcoded encryption key in string
    crit: suspicious
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: (key|secret|password|pass)\s*[=:]\s*Buffer\.from\(['"][0-9a-fA-F]{32,}['"]
    downgrade:
      any:
        - id: metadata/package/testing/harness::node-common-require
        - id: metadata/package/testing/harness::test-basename-pattern
  - id: hardcoded-iv-pattern
    desc: Hardcoded IV in string literal
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: \biv\b\s*[=:]\s*Buffer\.from\(['"][0-9a-fA-F]{16,}['"]
  - id: buffer-hex-key-material
    desc: Buffer.from with hex-encoded key material
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\(['"][0-9a-fA-F]{32,}['"],\s*['"]hex['"]
  - id: buffer-from-hex
    desc: Buffer.from with long hex string
    crit: notable
    conf: 0.75
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\s*\(\s*['"][0-9a-fA-F]{32,}['"]
  - id: buffer-from-ascii-key
    desc: Buffer.from with 32-char key string
    crit: notable
    conf: 0.8
    mbc: C0027
    if:
      type: text
      regex: Buffer\.from\(['"][A-Za-z0-9]{32}['"]\)
  - id: gzip-function
    desc: gzip compression function
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: gzip
  - id: gunzip-function
    desc: gunzip decompression function
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: gunzip
composite_rules:
  - id: crypto-require
    desc: Node.js crypto module import
    crit: notable
    conf: 0.9
    any:
      - id: crypto-require-call
      - id: crypto-from-import
  - id: aes-128-ctr
    desc: AES-128-CTR encryption (stream cipher mode)
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-128-ctr-dash
      - id: aes128ctr-nodash
  - id: aes-256-cbc
    desc: AES-256-CBC encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-256-cbc-dash
      - id: aes256cbc-nodash
  - id: aes-256-gcm
    desc: AES-256-GCM authenticated encryption
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: aes-256-gcm-dash
      - id: aes256gcm-nodash
  - id: cipher-create
    desc: Cipher or decipher creation
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: micro-behaviors/crypto/library::create-cipheriv
      - id: createDecipheriv
  - id: http-client-comp
    desc: HTTP/HTTPS client request capability
    crit: baseline
    conf: 0.8
    all:
      - id: micro-behaviors/communications/http/request/
  - id: compression-lib-comp
    desc: Compression/decompression library usage
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/data/encode/compression::zlib-signature
      - id: gzip-function
      - id: gunzip-function
      - id: micro-behaviors/data/compress/library::inflate
      - id: micro-behaviors/data/compress/library::deflate
  - id: hardcoded-key
    desc: Hardcoded encryption key pattern
    crit: suspicious
    conf: 0.8
    mbc: C0027
    any:
      - id: hardcoded-key-pattern
      - id: hardcoded-iv-pattern
      - id: buffer-from-hex
      - id: buffer-hex-key-material
      - id: buffer-from-ascii-key
  - id: encrypted-c2
    desc: AES encryption combined with network
    crit: suspicious
    conf: 0.9
    mbc: C0027
    attack: T1573
    all:
      - id: cipher-create
      - id: aes-algorithm
      - id: http-client
  - id: gzip-with-crypto
    desc: Gzip compression with encryption (obfuscated
    crit: suspicious
    conf: 0.85
    mbc: C0027
    attack: T1027
    all:
      - id: compression-lib
      - id: cipher-create
