defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: component
  conf: 0.85
  mbc: C0021.001
traits:
  - id: json-ciphertext-field
    desc: JSON ciphertext field
    if:
      type: text
      substr: 'json:"ciphertext"'
  - id: json-iv-field
    desc: JSON IV field
    if:
      type: text
      substr: 'json:"iv"'
  - id: quoted-ciphertext-field
    desc: Quoted JSON ciphertext field
    if:
      type: text
      substr: '"ciphertext"'
  - id: quoted-iv-field
    desc: Quoted JSON IV field
    if:
      type: text
      substr: '"iv"'
  - id: encoded-ciphertext-field
    desc: Encoded JSON ciphertext field
    if:
      type: encoded
      substr: '"ciphertext"'
  - id: encoded-iv-field
    desc: Encoded JSON IV field
    if:
      type: encoded
      substr: '"iv"'
composite_rules:
  - id: json-ciphertext-field-any
    desc: JSON ciphertext field marker
    crit: component
    conf: 0.85
    any:
      - id: json-ciphertext-field
      - id: quoted-ciphertext-field
      - id: encoded-ciphertext-field
  - id: json-iv-field-any
    desc: JSON IV field marker
    crit: component
    conf: 0.85
    any:
      - id: json-iv-field
      - id: quoted-iv-field
      - id: encoded-iv-field
  - id: json-ciphertext-iv-fields
    desc: JSON ciphertext and IV fields
    crit: notable
    conf: 0.88
    all:
      - id: json-ciphertext-field-any
      - id: json-iv-field-any
