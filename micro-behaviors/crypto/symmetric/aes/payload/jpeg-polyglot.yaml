defaults:
  platforms: [windows, unix]
  for: [jpeg]
traits:
  - id: openssl-decrypt-call
    desc: OpenSSL decrypt call in JPEG
    crit: notable
    conf: 0.96
    attack: T1140
    mbc: B0032
    if:
      type: text
      substr: "openssl_decrypt("
  - id: aes-128-ecb-mode
    desc: AES-128-ECB mode string
    crit: suspicious
    conf: 0.98
    attack: T1140
    mbc: B0032
    if:
      type: text
      substr: AES-128-ECB
composite_rules:
  - id: php-aes-loader
    desc: Embedded AES payload decryptor
    crit: suspicious
    conf: 0.98
    all:
      - id: openssl-decrypt-call
      - id: aes-128-ecb-mode
