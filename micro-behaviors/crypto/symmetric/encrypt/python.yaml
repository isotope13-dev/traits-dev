defaults:
  platforms: [unix, windows]
  for: [python]
  mbc: C0027
  attack: T1027
  crit: notable

traits:
  - id: python-encrypt-method-call
    desc: Python calls an object's encrypt method
    conf: 0.5
    if:
      type: text
      regex: \.encrypt\s*\(

  - id: python-encrypt-file-call
    desc: Python calls an encrypt_file helper
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: encrypt_file

  - id: python-pyencryptor-import
    desc: Python imports the pyencryptor helper package
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: pyencryptor
