defaults:
  for: [pe, csharp]
  platforms: [windows]
traits:
  - id: triple-des-api
    desc: TripleDES symmetric cryptography API reference
    crit: notable
    conf: 0.9
    if:
      type: text
      word: TripleDES
  - id: triple-des-provider
    desc: TripleDES crypto service provider
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: TripleDESCryptoServiceProvider
  - id: create-decryptor
    desc: CreateDecryptor method token
    crit: notable
    conf: 0.8
    if:
      type: text
      word: CreateDecryptor
  - id: icryptotransform
    desc: ICryptoTransform interface token
    crit: component
    conf: 0.8
    if:
      type: text
      word: ICryptoTransform
  - id: crypto-stream
    desc: CryptoStream class token
    crit: component
    conf: 0.8
    if:
      type: text
      word: CryptoStream
  - id: des-create
    desc: DES key generation via Create
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: DES.Create(
  - id: transform-final-block
    desc: Final-block symmetric transform operation
    crit: notable
    conf: 0.85
    if:
      type: text
      word: TransformFinalBlock
composite_rules:
  - id: triple-des-decrypt-chain
    desc: TripleDES decryption scaffolding
    crit: notable
    conf: 0.95
    all:
      - id: triple-des-api
    any:
      - id: create-decryptor
      - id: transform-final-block
      - id: icryptotransform
      - id: crypto-stream
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
    needs: 2
