defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  attack: T1027
  mbc: C0027
traits:
  - id: import-fernet-direct
    desc: Direct fernet import
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: \bimport\s+fernet\b
  - id: from-cryptography-fernet
    desc: From cryptography.fernet import
    crit: baseline
    conf: 0.8
    if:
      type: raw
      regex: \bfrom\s+cryptography\.fernet\s+import
  - id: class-usage
    desc: Fernet encryption class instantiation
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: Fernet\s*\(
  - id: decrypt-call
    desc: Decrypt method call
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: \.decrypt\s*\(
  - id: keygen
    desc: Fernet key generation
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: Fernet\.generate_key\s*\(
  - id: encrypt-call
    desc: Encrypt method call
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: \.encrypt\s*\(
  - id: pip-install-fernet-lower
    desc: pip install fernet (lowercase)
    crit: component
    conf: 0.75
    if:
      type: string_value
      substr: pip install fernet
  - id: pip-install-fernet-title
    desc: pip install fernet (titlecase)
    crit: component
    conf: 0.75
    if:
      type: string_value
      substr: pip install Fernet
  - id: pip-install-cryptography-lower
    desc: pip install cryptography (lowercase)
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: pip install cryptography
  - id: pip-install-cryptography-title
    desc: pip install cryptography (titlecase)
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: pip install Cryptography
  - id: fernet-base64-key
    desc: Fernet base64 key pattern (44
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: b['"][A-Za-z0-9+/]{43}=['"]
  - id: fernet-keyword
    desc: Fernet keyword
    crit: component
    conf: 0.6
    if:
      type: raw
      word: Fernet
composite_rules:
  - id: pip-install-fernet-variants
    desc: pip install fernet (case variants)
    any:
      - id: pip-install-fernet-lower
      - id: pip-install-fernet-title
      - id: pip-install-cryptography-lower
      - id: pip-install-cryptography-title
  - id: error-handling-keywords
    desc: Error handling keywords
    any:
      - id: micro-behaviors/data/control-flow/error-handling::except-keyword-dup
      - id: micro-behaviors/data/control-flow/error-handling::importerror-keyword
      - id: import-fernet-direct
  - id: import
    desc: Fernet symmetric encryption library import
    crit: notable
    conf: 0.9
    any:
      - id: import-fernet-direct
      - id: from-cryptography-fernet
  - id: fernet-context
    desc: Fernet usage context
    any:
      - id: import
      - id: class-usage
      - id: fernet-keyword
  - id: decrypt
    desc: Fernet decryption operation
    crit: notable
    conf: 0.9
    all:
      - id: decrypt-call
      - id: fernet-context
  - id: encrypt
    desc: Fernet encryption operation
    crit: notable
    conf: 0.9
    all:
      - id: encrypt-call
      - id: fernet-context
  - id: runtime-install
    desc: Runtime installation of fernet encryption
    crit: suspicious
    conf: 0.95
    all:
      - id: pip-install-fernet-variants
      - id: error-handling-keywords
  - id: hardcoded-key-comp
    desc: Fernet encryption with hardcoded key
    crit: suspicious
    conf: 0.9
    all:
      - id: fernet-keyword
      - id: fernet-base64-key
