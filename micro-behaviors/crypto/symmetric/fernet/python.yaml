defaults:
  platforms: [windows, unix]
  for:
    - python
  attack: T1027
  mbc: C0027
traits:
  - id: import-fernet-direct
    desc: Direct fernet import
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bimport\s+fernet\b
  - id: from-cryptography-fernet
    desc: From cryptography.fernet import
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bfrom\s+cryptography\.fernet\s+import
  - id: class-usage
    desc: Fernet cipher class reference
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: Fernet
  - id: keygen
    desc: Fernet key generation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Fernet\.generate_key\s*\(
  - id: pip-install-fernet-lower
    desc: pip install fernet (lowercase)
    crit: component
    conf: 0.75
    if:
      type: string_literal
      substr: pip install fernet
  - id: pip-install-fernet-title
    desc: pip install fernet (titlecase)
    crit: component
    conf: 0.75
    if:
      type: string_literal
      substr: pip install Fernet
  - id: pip-install-cryptography-lower
    desc: pip install cryptography (lowercase)
    crit: component
    conf: 0.7
    if:
      type: string_literal
      substr: pip install cryptography
  - id: pip-install-cryptography-title
    desc: pip install cryptography (titlecase)
    crit: component
    conf: 0.7
    if:
      type: string_literal
      substr: pip install Cryptography
  - id: fernet-base64-key
    desc: Fernet base64 key pattern (44
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: b['"][A-Za-z0-9+/]{43}=['"]
  - id: fernet-keyword
    desc: Fernet keyword
    crit: component
    conf: 0.6
    if:
      type: text
      word: Fernet
composite_rules:
  - id: pip-install-fernet-variants
    desc: pip install fernet (case variants)
    any:
      - id: pip-install-fernet-lower
      - id: pip-install-fernet-title
      - id: pip-install-cryptography-lower
      - id: pip-install-cryptography-title
  - id: error-handling-keywords
    desc: Error handling keywords
    any:
      - id: micro-behaviors/data/control-flow/error-handling::except-keyword-dup
      - id: micro-behaviors/data/control-flow/error-handling::importerror-keyword
      - id: import-fernet-direct
  - id: import
    desc: Fernet symmetric encryption library import
    crit: notable
    conf: 0.9
    any:
      - id: import-fernet-direct
      - id: from-cryptography-fernet
  - id: fernet-context
    desc: Fernet usage context
    any:
      - id: import
      - id: class-usage
      - id: fernet-keyword
  - id: decrypt
    desc: Fernet decryption operation
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/symmetric/decrypt::python-decrypt-method-call
      - id: fernet-context
  - id: encrypt
    desc: Fernet encryption operation
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/symmetric/encrypt::python-encrypt-method-call
      - id: fernet-context
  - id: runtime-install
    desc: Runtime installation of fernet encryption
    crit: notable
    conf: 0.95
    all:
      - id: pip-install-fernet-variants
      - id: error-handling-keywords
      # `pip install cryptography` (an umbrella package providing RSA/AES/X.509/
      # Fernet) inside a try/except ImportError is a ubiquitous optional-dependency
      # pattern. Require actual Fernet usage so this doesn't fire on code that
      # installs `cryptography` for RSA/X.509 and never touches Fernet.
      - id: fernet-context
  - id: hardcoded-key-comp
    desc: Fernet encryption with hardcoded key
    crit: suspicious
    conf: 0.9
    all:
      - id: fernet-keyword
      - id: fernet-base64-key
