# RC4 Stream Cipher Detection
# ATT&CK: T1573 (Encrypted Channel)
defaults:
  for: [all]
  mbc: "C0027"
  attack: "T1573"
traits:
  # NOTE: RC4 byte patterns can appear in:
  # - Debuggers analyzing encrypted code or disassembling crypto implementations
  # - Compiler/build tools with crypto libraries
  # - Large binaries with unrelated byte sequences matching by chance
  # Downgrade for known development tools

  # RC4 key scheduling/swap pattern (mov reg, []; mov reg, []; add; mov []; mov [])
  - id: rc4-swap-pattern
    desc: RC4 key scheduling swap byte pattern
    crit: component
    for: [elf, macho, pe, so, dylib, dll]
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "8A ?? ?? 8A ?? ?? 02 ?? 88 ?? ?? 88 ?? ??"
  # RC4 XOR decrypt loop pattern (xor []; inc/dec; cmp 0xFF; jne)
  - id: rc4-xor-loop
    desc: RC4 XOR decrypt loop pattern
    crit: component
    for: [elf, macho, pe, so, dylib, dll]
    if:
      type: hex
      # 30 ?? = xor mem,reg; 4x = inc/dec reg; 83 ?? FF = cmp ??,0xFF; 75 = jne
      pattern: "30 ?? [1] 83 ?? FF 75"
  - id: rc4-ksa-swap-loop-i386
    desc: RC4 KSA byte swap loop (i386)
    crit: component
    for: [elf, pe]
    if:
      type: hex
      pattern: "0F B6 4C 3B FF 0F B6 C1 [0-24] 8D 14 07 [0-24] 0F B6 02 88 44 3B FF [0-24] 88 0A 75"
  - id: rc4-prga-xor-buffer-loop-i386
    desc: RC4 PRGA XOR buffer loop (i386)
    crit: component
    for: [elf, pe]
    if:
      type: hex
      pattern: "0F B6 02 88 03 89 F0 88 02 8B 55 ?? 02 0B 0F B6 C9 0F B6 04 0A 8B 55 ?? 30 04 ?? 83 C7 01 3B 7D ?? 75"
  - id: rc4-decode-function
    desc: RC4 decode function reference
    crit: notable
    conf: 0.75
    if:
      type: raw
      word: "rc4_decode"
  - id: rc4-strings
    desc: "RC4 encryption strings"
    crit: baseline
    conf: 0.5
    if:
      type: string
      regex: "(?i)rc4.{0,20}crypt"
  - id: rc4-init-symbol
    desc: RC4 key scheduler symbol
    crit: notable
    conf: 0.9
    for: [elf, macho, pe, so, dylib, dll]
    if:
      type: raw
      regex: "(?i)(rc4init__|arc4_setkey|rc4_set_key)"
  - id: rc4-crypt-symbol
    desc: RC4 stream transform symbol
    crit: notable
    conf: 0.9
    for: [elf, macho, pe, so, dylib, dll]
    if:
      type: raw
      regex: "(?i)(rc4crypt__|arc4_crypt)"
composite_rules:
  - id: rc4-bytecode
    desc: "RC4 encryption byte patterns"
    crit: suspicious
    conf: 0.8
    for: [elf, macho, pe, so, dylib, dll]
    needs: 2
    any:
      - id: rc4-swap-pattern
      - id: rc4-xor-loop
      - id: rc4-ksa-swap-loop-i386
      - id: rc4-prga-xor-buffer-loop-i386
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::debugger-tool-marker
        - id: micro-behaviors/dylib/library::compiler-tool-marker
  - id: rc4-symbol-chain
    desc: RC4 init and crypt symbol chain
    crit: suspicious
    conf: 0.88
    for: [elf, macho, pe, so, dylib, dll]
    all:
      - id: rc4-init-symbol
      - id: rc4-crypt-symbol
