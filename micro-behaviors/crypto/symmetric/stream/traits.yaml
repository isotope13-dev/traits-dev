defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: go-chacha8rand
    desc: Go 1.22+ internal chacha8rand
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: internal/chacha8rand
  - id: chacha-salsa-constant
    desc: ChaCha20/Salsa20 cipher constant
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: expand 32-byte k
    downgrade:
      any:
        - id: go-chacha8rand
  - id: chacha20-block-constant-native
    desc: Native ChaCha20 block constant
    crit: notable
    conf: 0.99
    for: [pe, dll, elf, macho]
    if:
      type: hex
      section: .text
      pattern: c7 45 ?? 65 78 70 61 c7 45 ?? 6e 64 20 33 c7 45 ?? 32 2d 62 79 c7 45 ?? 74 65 20 6b
  - id: chacha20-keyword
    desc: ChaCha20 cipher algorithm reference
    crit: notable
    conf: 0.7
    if:
      type: text
      word: ChaCha20
  - id: openssl-chacha-poly
    desc: OpenSSL ChaCha20-Poly1305
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ChaCha20-Poly1305
    downgrade:
      any:
        - id: well-known/lib/openssl::openssl-version-symbol
    unless:
      - id: metadata/vendor/identity/
      - id: well-known/tool/detection/security-remediation::compiled-remediation-catalog
  - id: chacha20-poly1305-symbol
    desc: ChaCha20 Poly1305 symbol
    crit: notable
    conf: 0.9
    if:
      type: text
      word: "ChaCha20Poly1305"
  - id: rust-cipher-partial-block
    desc: Rust stream cipher partial block
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: self.partial_block.is_none()
  - id: rust-cipher-cached-blocks
    desc: Rust stream cipher cached blocks
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: self\.num_cached_blocks\s*<\s*\d+
  - id: stream-cipher-error
    desc: Stream cipher error type
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: StreamCipherError
  - id: stream-decrypt-symbol
    desc: Stream-cipher decryption routine
    crit: notable
    conf: 0.86
    for: [elf, macho, pe]
    if:
      type: symbol
      exact: stream_decrypt
  - id: go-obfuscated-xor-stream
    desc: Obfuscated Go XOR stream cipher
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '^[A-Za-z][A-Za-z0-9_]{5,14}\.\(\*[A-Za-z][A-Za-z0-9_]{6,14}\)\.XORKeyStream$'
    unless:
      - type: text
        exact: 'crypto/cipher.(*aesCtrWrapper).XORKeyStream'
      - type: text
        exact: 'crypto/cipher.(*ctr).XORKeyStream'
      - type: text
        exact: 'crypto/rc4.(*Cipher).XORKeyStream'
      - type: text
        exact: 'vendor/golang.org/x/crypto/chacha20.(*Cipher).XORKeyStream'
      - type: text
        regex: '^crypto/internal/fips140/aes\.\(\*CTR\)\.XORKeyStream$'
composite_rules:
  - id: rust-stream-cipher
    desc: Rust stream cipher implementation
    crit: notable
    conf: 0.9
    all:
      - id: chacha-salsa-constant
    any:
      - id: rust-cipher-partial-block
      - id: rust-cipher-cached-blocks
      - id: stream-cipher-error
