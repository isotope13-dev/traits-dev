defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1027
traits:
  - id: vb6-rc4-function-signature
    desc: VB6 RC4 function signature
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'Function\s+RC4\s*\(\s*ByVal\s+Data\s+As\s+String'
  - id: vb6-rc4-state-array
    desc: VB6 RC4 state array
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Dim\s+F\s*\(\s*0\s+To\s+255\s*\)'
  - id: vb6-rc4-password-bytes
    desc: VB6 RC4 password bytes
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "StrConv(Password, vbFromUnicode)"
  - id: vb6-rc4-xor-keystream
    desc: VB6 RC4 XOR keystream
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Xor\s+F\s*\(\s*Temp\s*\+\s*F\s*\('
  - id: vb6-modrc4-module-name
    desc: VB6 modRc4 module name
    crit: component
    conf: 0.92
    if:
      type: text
      exact: 'Attribute VB_Name = "modRc4"'
composite_rules:
  - id: vb6-rc4-implementation
    desc: VB6 RC4 stream cipher implementation
    crit: notable
    conf: 0.96
    all:
      - id: vb6-rc4-function-signature
      - id: vb6-rc4-state-array
      - id: vb6-rc4-password-bytes
      - id: vb6-rc4-xor-keystream
  - id: standalone-vb6-rc4-module
    desc: Standalone VB6 RC4 module
    crit: suspicious
    conf: 0.9
    all:
      - id: vb6-modrc4-module-name
      - id: vb6-rc4-implementation
