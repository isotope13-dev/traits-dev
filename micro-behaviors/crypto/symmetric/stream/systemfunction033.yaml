# SystemFunction033 - Undocumented NTAPI RC4 decryption
# Used by malware to perform RC4 without importing BCrypt/CNG
# SloppyLemming BurrowShell loader uses this for payload decryption
defaults:
  for: [pe, dll]
  platforms: [windows]
  mbc: C0027
  attack: T1140
traits:
  - id: systemfunction033-symbol
    desc: Undocumented NTAPI RC4 decryption function
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: SystemFunction033
    unless:
      - id: metadata/binary/metrics::many-exports-100
