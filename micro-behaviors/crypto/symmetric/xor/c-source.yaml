# XOR Cipher Implementation Detection - C/C++ Source
# Detects XOR-based encryption implementations in source code
# MBC: C0027.001 (Encrypt Data - XOR)
defaults:
  for: [c, cpp]
  platforms: [linux, unix, macos, windows]
traits:
  - id: xor-cipher-source
    desc: XOR cipher implementation in source
    crit: notable
    conf: 0.85
    mbc: "C0027.001"
    if:
      type: string_value
      regex: "xor.?crypt|xor.?key|xor.?cipher"
      case_insensitive: true
