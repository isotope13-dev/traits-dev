defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: asm-lodsb
    desc: Assembly LODSB
    crit: component
    if:
      type: text
      substr: lodsb
  - id: asm-stosb
    desc: Assembly STOSB
    crit: component
    if:
      type: text
      substr: stosb
  - id: asm-loop-dup
    desc: Assembly LOOP
    crit: component
    if:
      type: text
      regex: (?im)^\s*loop\s+[A-Za-z_.$@?][A-Za-z0-9_.$@?]*
  - id: asm-xor-decryptor-pattern-1
    desc: Assembly XOR decryption loop pattern 1
    crit: suspicious
    if:
      type: text
      regex: lodsb\s+(db\s+34h|xor\s+al,)\s+(.|\n)+?stosb\s+loop
  - id: asm-xor-decryptor-pattern-2
    desc: Assembly XOR decryption loop pattern 2
    crit: suspicious
    if:
      type: text
      regex: octet_suivant_a_decrypter:\s+lodsb\s+db\s+34h\s+clef\s+db\s+0\s+stosb\s+loop
composite_rules:
  - id: asm-string-instructions-loop
    desc: Assembly loop using LODSB and STOSB
    crit: component
    all:
      - id: micro-behaviors/crypto/symmetric/xor/lodsb::asm-lodsb
      - id: micro-behaviors/crypto/symmetric/xor/lodsb::asm-stosb
      - id: micro-behaviors/crypto/symmetric/xor/lodsb::asm-loop-dup
  - id: asm-xor-decryptor-loop
    desc: Assembly XOR decryption loop
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    any:
      - id: micro-behaviors/crypto/symmetric/xor/lodsb::asm-xor-decryptor-pattern-1
      - id: micro-behaviors/crypto/symmetric/xor/lodsb::asm-xor-decryptor-pattern-2
      - id: micro-behaviors/crypto/symmetric/xor/lodsb::asm-string-instructions-loop
    unless:
      - id: metadata/library/runtime::openmp-runtime
