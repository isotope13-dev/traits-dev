defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
  size_max: 52428800
traits:
  - id: asm-loop-op
    conf: 0.7
    crit: suspicious
    desc: Detects arithmetic op used in encryption loops
    if:
      type: raw
      regex: (xor|sub|add)\s+(byte|dword)\s+ptr\s+\[.+?\],
      section: .text
  - id: asm-loop-reg
    conf: 0.7
    crit: component
    desc: Detects register operands common in encryption loops
    arch: [x86, x86-64]
    count_min: 2
    if:
      type: raw
      regex: \],\s+(al|e[abcd]x)\b
      section: .text
  - id: asm-loop-control-transfer
    conf: 0.7
    crit: baseline
    desc: Detects loop/jump control transfer in assembly
    if:
      type: raw
      regex: (loop|jb|jmp)\s+\w+
  - id: backward-byte-xor-loop-i386
    conf: 0.88
    crit: suspicious
    desc: Reverse indexed byte XOR decrypt loop
    if:
      type: hex
      section: .text
      pattern: 8A 44 ?? FF 30 04 ?? 49 83 F9 02 7D ??
  - id: x64-xor-indexed-byte-loop
    desc: x64 XOR indexed byte decrypt loop
    crit: component
    conf: 0.85
    for:
      - pe
    if:
      type: hex
      section: .text
      pattern: 32 ?4 ?? 48 FF C0 48 39

  - id: x64-xor-imm8-widen-loop
    desc: XOR byte then zero-extend
    crit: baseline
    conf: 0.85
    arch: [x86-64]
    for: [pe]
    if:
      type: hex
      section: .text
      pattern: 80 f? ?? 0F B6

  - id: simd-xor-punpcklbw
    desc: SIMD XOR with byte-to-word widening
    crit: baseline
    conf: 0.88
    arch: [x86-64]
    for: [pe]
    if:
      type: hex
      section: .text
      pattern: 0F 57 ?? 66 0F 60 ??

composite_rules:
  - id: asm-loop-any
    desc: Detects simple XOR/SUB/ADD encryption loop in assembly
    crit: suspicious
    conf: 0.7
    all:
      - id: asm-loop
      - id: asm-loop-control-transfer
  - id: asm-loop
    conf: 0.7
    crit: suspicious
    desc: Detects simple XOR/SUB/ADD encryption loop in assembly
    all:
      - id: asm-loop-op
      - id: asm-loop-reg
