defaults:
  platforms: [unix, windows, macos]
  for:
    - elf
    - pe
    - macho
    - dll
    - so
    - dylib
traits:
  - id: asm-loop-op
    conf: 0.7
    crit: suspicious
    desc: Detects arithmetic op used in encryption loops
    if:
      type: raw
      regex: (xor|sub|add)\s+(byte|dword)\s+ptr\s+\[.+?\],
  - id: asm-loop-reg
    conf: 0.7
    crit: suspicious
    desc: Detects register operands common in encryption loops
    if:
      type: raw
      regex: \],\s+(al|e[abcd]x)\b
  - id: asm-loop-control-transfer
    conf: 0.7
    crit: baseline
    desc: Detects loop/jump control transfer in assembly
    if:
      type: raw
      regex: (loop|jb|jmp)\s+\w+
  - id: backward-byte-xor-loop-i386
    conf: 0.88
    crit: suspicious
    desc: Reverse indexed byte XOR decrypt loop
    if:
      type: hex
      section: ".text"
      # mov al,[base+idx-1]; xor [base+idx],al; dec idx; cmp idx,2; jge back
      pattern: "8A 44 ?? FF 30 04 ?? 49 83 F9 02 7D ??"
composite_rules:
  - id: asm-loop-any
    desc: Detects simple XOR/SUB/ADD encryption loop in assembly
    crit: suspicious
    conf: 0.7
    all:
      - id: asm-loop
      - id: asm-loop-control-transfer
  - id: asm-loop
    conf: 0.7
    crit: suspicious
    desc: Detects simple XOR/SUB/ADD encryption loop in assembly
    all:
      - id: asm-loop-op
      - id: asm-loop-reg
