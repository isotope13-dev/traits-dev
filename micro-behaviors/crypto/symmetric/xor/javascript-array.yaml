defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-xor-array-assignment
    desc: JavaScript array XOR assignment
    crit: suspicious
    conf: 0.8
    if:
      type: ast
      query: |
        (assignment_expression
          left: (subscript_expression)
          operator: "^="
          right: (subscript_expression
            index: (binary_expression operator: "%")
          )
        )
