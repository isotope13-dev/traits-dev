defaults:
  platforms: [macos]
  for: [macho]
  arch: [aarch64]
traits:
  - id: repeating-key-buffer-decode
    desc: ARM64 repeating-key XOR decoder
    crit: suspicious
    conf: 0.95
    if:
      type: hex
      pattern: "E8 07 40 F9 1F 01 02 EB 6A 01 00 54 E8 07 40 F9 09 0D C3 9A 29 A1 03 9B 29 68 69 38 0A 68 68 38 29 01 0A 4A 09 68 28 38 08 05 00 91 E8 07 00 F9 F4 FF FF 17"
      section: .text
  - id: indexed-dword-table-decode
    desc: ARM64 indexed XOR table decoder
    crit: suspicious
    conf: 0.93
    if:
      type: hex
      pattern: "E8 0F 80 B9 49 78 A8 B8 29 F5 7E D3 6A 68 69 B8 4A 01 04 4A 6A 68 29 B8 08 05 00 11 E8 0F 00 B9 1F 01 01 6B EB FE FF 54"
      section: .text
