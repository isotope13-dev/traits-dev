defaults:
  platforms:
    - unix
    - windows
  # These mnemonics identify native instruction text/disassembly.  Restrict
  # the capability to native formats so documentation or bundled JavaScript
  # that mentions SIMD instructions is not treated as executable XOR logic.
  for: [elf, macho, pe, dll, so, dylib]
traits:
  - id: simd-xor-classic
    conf: 0.8
    crit: notable
    desc: Native classic SIMD XOR instruction
    if:
      type: text
      regex: (pxor|xorps|xorpd)\s+xmm
  - id: simd-xor-vex
    conf: 0.8
    crit: notable
    desc: Native VEX SIMD XOR instruction
    if:
      type: text
      regex: (vxorps|vxorpd)\s+xmm
