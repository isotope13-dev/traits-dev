defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: simd-xor-classic
    conf: 0.8
    crit: suspicious
    desc: Classic SIMD XOR operations
    if:
      type: text
      regex: (pxor|xorps|xorpd)\s+xmm
  - id: simd-xor-vex
    conf: 0.8
    crit: suspicious
    desc: VEX SIMD XOR operations
    if:
      type: text
      regex: (vxorps|vxorpd)\s+xmm
