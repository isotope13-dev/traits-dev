defaults:
  platforms: [windows]
  for: [powershell]
  mbc: B0032.002

traits:
  - id: indexed-bxor-loop
    desc: PowerShell indexed XOR loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\$\w+\s*\[\s*\$_\s*\]\s*-bxor\s*\$\w+\s*\[\s*\$_\s*%\s*\$\w+\.Length\s*\]'

  - id: indexed-bxor-key-loop
    desc: PowerShell byte array XOR decoder
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\$\w+\[\s*\$\w+\s*\]\s*=\s*\$\w+\[\s*\$\w+\s*\]\s*-bxor\s+\d+'

  - id: repeating-key-indexed-bxor-loop
    desc: PowerShell repeating-key XOR loop
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\$\w+\s*\[\s*\$\w+\s*\]\s*-bxor\s+\$\w+\s*\[\s*\$\w+\s*%\s*\$\w+\.Length\s*\]'

  - id: repeating-key-byte-selection
    desc: PowerShell XOR loop key-byte selection
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\$\w+\s*=\s*\$\w+\[\s*\$\w+\s*%\s*\$\w+\.Length\s*\]'

  - id: indexed-bxor-key-variable
    desc: PowerShell XOR assignment with key variable
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\$\w+\s*\[\s*\$\w+\s*\]\s*=\s*\$\w+\s*\[\s*\$\w+\s*\]\s*-bxor\s+\$\w+'

composite_rules:
  - id: repeating-key-xor-via-key-variable
    desc: PowerShell repeating-key XOR via key variable
    crit: suspicious
    conf: 0.95
    near_lines: 8
    all:
      - id: repeating-key-byte-selection
      - id: indexed-bxor-key-variable

  - id: repeating-key-indexed-bxor-loader
    desc: PowerShell repeating-key XOR decoder
    crit: suspicious
    conf: 0.95
    any:
      - id: repeating-key-indexed-bxor-loop
      - id: repeating-key-xor-via-key-variable
