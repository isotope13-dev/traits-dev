# XOR decryption loop detection in compiled binaries
# Detects single-byte XOR key loops used for payload decryption
defaults:
  for: [elf, macho, pe]
  platforms: [linux, macos, windows]
  crit: baseline
  conf: 0.6
  attack: T1140
traits:
  - id: xor-key-0x99
    desc: XOR immediate 0x99 instruction
    if:
      type: hex
      section: text
      pattern: 81 f1 99 00 00 00
