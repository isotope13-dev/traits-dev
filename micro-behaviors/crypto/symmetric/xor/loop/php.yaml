defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  - id: xor-decode-loop
    desc: PHP chr/ord XOR byte transform loop
    crit: notable
    conf: 0.93
    mbc: C0027.001
    if:
      type: text
      regex: "chr\\(ord\\(.{1,20}\\^ ord\\(.{1,20}%"

  - id: xor-variable-key-loop
    desc: PHP XOR loop uses variable-length key
    crit: suspicious
    conf: 0.93
    mbc: C0027.001
    attack: T1140
    if:
      type: text
      regex: "chr\\(ord\\(.{1,20}\\^ ord\\(.{1,20}%.{0,30}strlen\\("

  - id: md5-hash-class-name
    desc: PHP class named with MD5 hash (obfuscation)
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: "class _[0-9a-f]{32}"
