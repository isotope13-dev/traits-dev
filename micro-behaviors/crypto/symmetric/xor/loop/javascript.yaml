defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: B0032
  attack: T1027
traits:
  - id: xor-modulo-key-loop
    desc: XOR loop uses repeating-key modulo indexing
    for: [python, javascript]
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: 'ast.xor_mod_loop_count'
      min: 1
    # Image bytes occasionally mis-typed as JS still emit this AST metric.
    unless:
      - type: path
        basename: true
        # Type detection can parse binary font programs as Python/JavaScript;
        # their encoded outline data is not a source-level XOR loop.
        regex: '(?i)\.(gif|png|jpe?g|webp|ico|bmp|svg|pfb)$'
      - type: text
        regex: '^GIF8[79]a'
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness

  - id: js-xor-loop
    desc: Custom XOR decoding loop in JavaScript
    crit: suspicious
    conf: 0.9
    if:
      type: text
      # Require reconstruction through fromCharCode: a charCodeAt XOR loop
      # alone also describes ordinary non-cryptographic hashes such as FNV-1a.
      regex: 'for\s*\(.{0,80}\)\s*\{.{0,160}\^=.{0,160}fromCharCode\s*\('
    unless:
      - id: metadata/library/runtime/
      - id: metadata/library/structure/
      - id: well-known/app/bruno::app-bundle
    not:
      - substr: fnv1aHash
      - substr: 'hash ^= str.charCodeAt'
      - substr: '2166136261'
      - substr: '16777619'
      - substr: '0x811c9dc5'
      - substr: '0x01000193'
      - substr: 'h2 ^= str.charCodeAt'
      - substr: "I=Math.imul(I,R)"
      - substr: 'svgNS="http://www.w3.org/2000/svg"'
      - substr: 'for(i in t)try{r.push(m(t[i],'
      - substr: 'for(i in t)try{r.push(a(t[i],'
      - substr: 'for(n in e)try{r.push(g(e[n],t-1))'
  - id: js-xor-charcode-assignment
    desc: XOR charCode assignment in loop
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/library/structure/
      - id: well-known/app/docpro::mdland-api-xor-helper
    if:
      type: text
      regex: 'for\s*\(.{0,80}\)\s*\{.{0,140}charCodeAt\([^)]{0,12}\)\^[A-Za-z_$]'
