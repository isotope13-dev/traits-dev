defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: B0032
  attack: T1027
traits:
  - id: js-xor-loop
    desc: Custom XOR decoding loop in JavaScript
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'for\s*\(.{0,80}\)\s*\{.{0,120}\^=.{0,120}(charCodeAt|fromCharCode)\s*\('
    unless:
      - id: metadata/library/runtime::seedrandom-prng-bundle
      - id: metadata/library/structure::js-any-bundle-output
    not:
      - substr: fnv1aHash
      - substr: 'hash ^= str.charCodeAt'
      - substr: '2166136261'
      - substr: '16777619'
      - substr: "I=Math.imul(I,R)"
      - substr: 'svgNS="http://www.w3.org/2000/svg"'
      - substr: 'for(i in t)try{r.push(m(t[i],'
      - substr: 'for(i in t)try{r.push(a(t[i],'
      - substr: 'for(n in e)try{r.push(g(e[n],t-1))'
  - id: js-xor-charcode-assignment
    desc: XOR charCode assignment in loop
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/library/structure::js-any-bundle-output
    if:
      type: text
      regex: 'for\s*\(.{0,80}\)\s*\{.{0,140}charCodeAt\([^)]{0,12}\)\^[A-Za-z_$]'
