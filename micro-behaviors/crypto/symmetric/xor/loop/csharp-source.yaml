# XOR decryption patterns in C# source code
defaults:
  for: [csharp]
  platforms: [windows]
  crit: notable
  conf: 0.85
  mbc: C0027.001
traits:
  - id: convert-tobyte-xor
    desc: Convert.ToByte with XOR operator
    conf: 0.9
    if:
      type: text
      regex: 'Convert\.ToByte.{0,40}\^'
  - id: array-reverse-call
    desc: Array.Reverse call for byte manipulation
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: "Array.Reverse("
