defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.85
  mbc: C0027.001
  attack: T1573

traits:
  - id: xor-message-method
    desc: XOR message encryption .NET method
    if:
      type: text
      substr: xorMsg
      section: .text

  - id: dotnet-xor-ca-context
    desc: .NET XOR marker near CA key value
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(xor[^\r\n]{0,80}0xCA|0xCA[^\r\n]{0,80}xor)'
      case_insensitive: true

  - id: dotnet-xor-202-context
    desc: .NET XOR marker near decimal key value
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(xor[^\r\n]{0,80}\b202\b|\b202\b[^\r\n]{0,80}xor)'
      case_insensitive: true

composite_rules:
  - id: dotnet-xor-key-context
    desc: .NET XOR key context
    crit: notable
    conf: 0.82
    any:
      - id: dotnet-xor-ca-context
      - id: dotnet-xor-202-context
