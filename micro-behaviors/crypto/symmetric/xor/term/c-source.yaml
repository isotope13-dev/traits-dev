defaults:
  for:
    - c
    - cpp
  platforms:
    - unix
    - windows
traits:
  - id: xor-cipher-source
    desc: XOR cipher implementation in source
    crit: notable
    conf: 0.85
    mbc: C0027.001
    if:
      type: string_literal
      regex: xor.?crypt|xor.?key|xor.?cipher
      case_insensitive: true
