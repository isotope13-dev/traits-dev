# PowerShell Rotational XOR Detection
# Detects custom rotational XOR logic often used in multi-stage loaders
# MBC: B0032.002 (XOR)
defaults:
  for: [powershell]
  platforms: [windows]
  mbc: "B0032.002"
traits:
  - id: rotational-xor-logic
    desc: PowerShell rotational XOR transformation logic
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\$\w+\s*-bxor\s*\$\w+.{0,120}%\s*\$\w+\.Length'
  - id: rotation-counter-modulo-update
    desc: PowerShell XOR key modulo counter update
    crit: suspicious
    conf: 0.85
    if:
      type: text
      # Require the modulo-by-length operation that makes this a rotating
      # index. Plain PowerShell assignments such as tag-list concatenation are
      # ordinary collection logic and are not XOR evidence.
      regex: '(?i)\$\w+\s*=\s*\(\$\w+\s*\+\s*\$\w+\s*\)\s*%\s*\$\w+\.Length.{0,120}-bxor'
  - id: rotation-indexed-key-modulo
    desc: PowerShell indexed XOR key modulo update
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)\$\w+\[\$\w+\].{0,120}-bxor.{0,120}\)\s*%\s*\d+'

composite_rules:
  - id: rotation-counter-update
    desc: Rotation counter update based on key/data
    crit: suspicious
    conf: 0.9
    all:
      - id: rotation-counter-modulo-update
      - id: rotation-indexed-key-modulo
    near_bytes: 512
