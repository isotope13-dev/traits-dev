# PowerShell Rotational XOR Detection
# Detects custom rotational XOR logic often used in multi-stage loaders
# MBC: B0032.002 (XOR)
defaults:
  for: [powershell]
  platforms: [windows]
  mbc: "B0032.002"
traits:
  - id: rotational-xor-logic
    desc: Rotational XOR decryption logic
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\(\$.{1,20} \+ \$.{1,20}\) % \$.{1,20}\.Length'
  - id: rotation-counter-modulo-update
    desc: PowerShell modulo counter update
    crit: suspicious
    conf: 0.85
    if:
      type: text
      # Obfuscated PowerShell commonly uses generated identifiers much longer
      # than ordinary source names. Keep the shape generic rather than naming
      # the sample's generated variables.
      regex: '(?i)\$\w+\s*=\s*\(\$\w+\s*\+\s*\$\w+'
  - id: rotation-indexed-key-modulo
    desc: PowerShell indexed key modulo update
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)\$\w+\[\$\w+\].{0,80}\)\s*%\s*\d+'

composite_rules:
  - id: rotation-counter-update
    desc: Rotation counter update based on key/data
    crit: suspicious
    conf: 0.9
    all:
      - id: rotation-counter-modulo-update
      - id: rotation-indexed-key-modulo
    near_bytes: 512
