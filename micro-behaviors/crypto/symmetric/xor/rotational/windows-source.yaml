defaults:
  platforms: [windows]
  for: [c]

traits:
  - id: xor-ror-sub-step-source
    desc: XOR ROR SUB encrypt steps in source
    crit: notable
    conf: 0.96
    size_min: 500
    if:
      type: raw
      substr: xor           dword ptr[edi], eax
  - id: ror-16-step-source
    desc: ROR by 16 step in source
    crit: component
    conf: 0.9
    size_min: 500
    if:
      type: raw
      substr: ror           dword ptr[edi], 16
  - id: sub-key-step-source
    desc: Subtract key step in source
    crit: component
    conf: 0.9
    size_min: 500
    if:
      type: raw
      substr: sub           dword ptr[edi], eax
  - id: add-rol-xor-step-source
    desc: ADD ROL XOR decrypt steps in source
    crit: notable
    conf: 0.97
    size_min: 1000
    if:
      type: raw
      substr: add           [regbase], regkey
  - id: rol-16-step-source
    desc: ROL by 16 step in source
    crit: component
    conf: 0.9
    size_min: 1000
    if:
      type: raw
      substr: rol           [regbase], 16
  - id: xor-regkey-step-source
    desc: XOR register key step in source
    crit: component
    conf: 0.9
    size_min: 1000
    if:
      type: raw
      substr: xor           [regbase], regkey
composite_rules:
  - id: xor-ror-sub-encryptor-source
    desc: XOR ROR SUB payload encryption source
    crit: suspicious
    conf: 0.98
    all:
      - id: xor-ror-sub-step-source
      - id: ror-16-step-source
      - id: sub-key-step-source
  - id: add-rol-xor-decryptor-source
    desc: ADD ROL XOR payload decryptor source
    crit: suspicious
    conf: 0.99
    all:
      - id: add-rol-xor-step-source
      - id: rol-16-step-source
      - id: xor-regkey-step-source
