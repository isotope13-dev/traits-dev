defaults:
  platforms: [linux, macos, windows]
  for: [binaries, c, cpp, rust, go, wasm]
  mbc: C0027
  attack: T1573

traits:
- id: kyber-crate-path
  desc: ML-KEM/Kyber library marker
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(?i)\b(pqc[_-]kyber|crystals[_-]?kyber|kyber[0-9]{3,4}|ml[-_]?kem[0-9]{3,4})\b'

- id: kyber-encapsulation-terms--rx-2
  desc: Kyber decapsulation term
  crit: component
  conf: 0.92
  if:
    type: text
    substr: decapsulat
    case_insensitive: true
  count_max: 1005876
- id: kyber-encapsulation-terms--rx-3
  desc: Kyber encapsulation term
  crit: component
  conf: 0.92
  if:
    type: text
    substr: encapsulat
    case_insensitive: true
  count_max: 1005877
- id: kyber-encapsulation-terms--rx-6
  desc: Kyber algorithm name term
  crit: component
  conf: 0.92
  if:
    type: text
    substr: kyber
    case_insensitive: true
  count_max: 1005880
- id: kyber-public-key-validation
  desc: Kyber public key validation marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)invalid public key size|public[_ -]?key.{0,40}(kyber|ml[-_]?kem)'

- id: kyber1024-material-size--0x620
  desc: Kyber1024 ciphertext size (0x620)
  crit: component
  conf: 0.9
  if:
    type: text
    word: '0x620'
- id: kyber1024-material-size--1568
  desc: Kyber1024 ciphertext size (1568)
  crit: component
  conf: 0.9
  if:
    type: text
    word: '1568'
composite_rules:
- id: kyber1024-material-size
  desc: Kyber1024 ciphertext size
  crit: component
  conf: 0.9
  unless:
  - id: metadata/lang/compiler/systems::go-buildinfo

  any:
  - id: kyber1024-material-size--0x620
  - id: kyber1024-material-size--1568
- id: kyber-kem-usage
  desc: Kyber KEM usage
  crit: notable
  conf: 0.95
  all:
  - id: kyber-crate-path
  any:
  - id: kyber1024-material-size
  - id: kyber-encapsulation-terms
  - id: kyber-public-key-validation
- id: kyber-encapsulation-terms
  desc: Kyber encapsulation terms
  crit: component
  conf: 0.92
  any:
  - id: ciphertext-term
  - id: kyber-encapsulation-terms--rx-2
  - id: kyber-encapsulation-terms--rx-3
  - id: micro-behaviors/data/parse/vocabulary::secret
  - id: shared-term
  - id: kyber-encapsulation-terms--rx-6
