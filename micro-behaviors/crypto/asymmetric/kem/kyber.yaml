defaults:
  platforms: [linux, macos, windows]
  for: [binaries, source]
  mbc: C0027
  attack: T1573

traits:
- id: kyber-crate-path
  desc: Kyber KEM library marker
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(?i)\b(pqc[_-]kyber|crystals[_-]?kyber|kyber[0-9]{3,4}|ml[-_]?kem[0-9]{3,4})\b'

- id: kyber1024-material-size
  desc: Kyber1024 ciphertext size
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(0x620|1568)\b'

- id: kyber-encapsulation-terms--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: ciphertext
    case_insensitive: true
- id: kyber-encapsulation-terms--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: decapsulat
    case_insensitive: true
- id: kyber-encapsulation-terms--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: encapsulat
    case_insensitive: true
- id: kyber-encapsulation-terms--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: secret
    case_insensitive: true
- id: kyber-encapsulation-terms--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: shared
    case_insensitive: true
- id: kyber-encapsulation-terms--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: kyber
    case_insensitive: true
- id: kyber-public-key-validation
  desc: Kyber public key validation marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)invalid public key size|public[_ -]?key.{0,40}(kyber|ml[-_]?kem)'

composite_rules:
- id: kyber-kem-usage
  desc: Kyber KEM usage
  crit: notable
  conf: 0.95
  all:
  - id: kyber-crate-path
  any:
  - id: kyber1024-material-size
  - id: kyber-encapsulation-terms
  - id: kyber-public-key-validation
- id: kyber-encapsulation-terms
  desc: Kyber encapsulation terms
  crit: component
  conf: 0.92
  any:
  - id: kyber-encapsulation-terms--rx-1
  - id: kyber-encapsulation-terms--rx-2
  - id: kyber-encapsulation-terms--rx-3
  - id: kyber-encapsulation-terms--rx-4
  - id: kyber-encapsulation-terms--rx-5
  - id: kyber-encapsulation-terms--rx-6
  needs: 1
