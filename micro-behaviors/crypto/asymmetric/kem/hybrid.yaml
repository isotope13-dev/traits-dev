defaults:
  platforms: [linux, macos, windows]
  for: [binaries, source]
  mbc: C0027
  attack: T1573

traits:
- id: hybrid-key-material-labels
  for: [binaries, c, cpp, rust, go, python]
  desc: Hybrid key material labels
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '(?i)\b(encryption-key|encryption-iv|file-key|file-iv)\b'

composite_rules:
- id: pqc-hybrid-crypto-stack
  desc: PQC hybrid crypto primitives
  crit: notable
  conf: 0.85
  all:
  - id: micro-behaviors/crypto/asymmetric/kem::kyber-kem-usage
  - id: micro-behaviors/crypto/asymmetric/curve25519::x25519-key-exchange-term
  - id: micro-behaviors/crypto/symmetric/aes/ctr::aes-ctr-usage
  any:
  - id: micro-behaviors/crypto/kdf/algorithm::hkdf
  - id: hybrid-key-material-labels
  - id: encrypted-trailer-terms
- id: encrypted-trailer-terms
  desc: Encrypted trailer metadata terms
  crit: component
  conf: 0.8
  any:
  - id: ciphertext-term
  - id: shared-term
  - id: micro-behaviors/data/text/keywords/lexicon::encrypted-trailer-vocab
  - id: micro-behaviors/data/text/keywords/lexicon::secret
