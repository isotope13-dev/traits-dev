defaults:
  platforms: [linux, macos, windows]
  for: [binaries, source]
  mbc: C0027
  attack: T1573

traits:
- id: hybrid-key-material-labels
  desc: Hybrid key material labels
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '(?i)\b(encryption-key|encryption-iv|file-key|file-iv)\b'

- id: encrypted-trailer-terms--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: trailer
    case_insensitive: true
  count_max: 1005867
- id: encrypted-trailer-terms--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: footer
    case_insensitive: true
  count_max: 1005868
- id: encrypted-trailer-terms--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: public
    case_insensitive: true
  count_max: 1005869
- id: encrypted-trailer-terms--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: magic
    case_insensitive: true
  count_max: 1005872
composite_rules:
- id: pqc-hybrid-crypto-stack
  desc: PQC hybrid crypto primitives
  crit: notable
  conf: 0.85
  all:
  - id: micro-behaviors/crypto/asymmetric/kem::kyber-kem-usage
  - id: micro-behaviors/crypto/asymmetric/curve25519::x25519-key-exchange-term
  - id: micro-behaviors/crypto/symmetric/aes/ctr::aes-ctr-usage
  any:
  - id: micro-behaviors/crypto/kdf/algorithm::hkdf
  - id: hybrid-key-material-labels
  - id: encrypted-trailer-terms
- id: encrypted-trailer-terms
  desc: Encrypted trailer metadata terms
  crit: component
  conf: 0.8
  any:
  - id: ciphertext-term
  - id: encrypted-trailer-terms--rx-2
  - id: encrypted-trailer-terms--rx-3
  - id: encrypted-trailer-terms--rx-4
  - id: micro-behaviors/data/text/keywords/lexicon::secret
  - id: shared-term
  - id: encrypted-trailer-terms--rx-7
