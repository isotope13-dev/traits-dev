defaults:
  platforms: [linux, macos, windows]
  for: [binaries, source]
  mbc: C0027
  attack: T1573

traits:
- id: ciphertext-term
  desc: KEM ciphertext term
  crit: component
  conf: 0.86
  if:
    type: text
    substr: ciphertext
    case_insensitive: true
- id: shared-term
  desc: KEM shared secret term
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\bshared[-_ ]?(secret|key)\b'
