defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: notable
  conf: 0.9
  mbc: C0027

traits:
  - id: ed25519-library-import
    desc: Ruby Ed25519 library import
    if:
      type: import
      exact: ed25519

  - id: signing-key-generate-call
    desc: Ed25519 signing key generation
    if:
      type: text
      substr: Ed25519::SigningKey.generate

  - id: signing-key-new-call
    desc: Ed25519 signing key construction
    if:
      type: text
      substr: Ed25519::SigningKey.new

  - id: signing-key-sign-call
    desc: Ed25519 signing operation
    if:
      type: text
      regex: '\b(private_key|signing_key|key)\.sign\s*\('

composite_rules:
  - id: ed25519-signing-capability
    desc: Ruby Ed25519 signing capability
    any:
      - id: signing-key-generate-call
      - id: signing-key-new-call
      - id: signing-key-sign-call

