# Pure-Python Ed25519 implementations expose the curve parameters directly
# instead of importing a provider library.  These are neutral cryptographic
# capability facts; signing or verification is not an attack objective.
defaults:
  platforms: [unix, windows]
  for: [python]
  mbc: C0027

traits:
  - id: ed25519-field-prime
    desc: Ed25519 field-prime constant
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '_P\s*=\s*\(\s*1\s*<<\s*255\s*\)\s*-\s*19'

  - id: ed25519-group-order
    desc: Ed25519 group-order constant
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '_L\s*=\s*\(\s*1\s*<<\s*252\s*\)\s*\+'

composite_rules:
  - id: pure-python-ed25519
    desc: Pure-Python Ed25519 implementation
    crit: notable
    conf: 0.98
    all:
      - id: ed25519-field-prime
      - id: ed25519-group-order
