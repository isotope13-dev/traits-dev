defaults:
  platforms:
    - windows
    - linux
    - macos
  for:
    - python
    - javascript
    - typescript
    - csharp
    - go
  crit: notable
  conf: 0.85

traits:
  - id: pem-private-key-header
    desc: PEM private-key header
    crit: component
    conf: 0.99
    if:
      type: text
      substr: '-----BEGIN PRIVATE KEY-----'
  - id: pem-private-key-footer
    desc: PEM private-key footer
    crit: component
    conf: 0.99
    if:
      type: text
      substr: '-----END PRIVATE KEY-----'
  - id: crypto-private-key-reference
    desc: Cryptographic private-key material reference
    if:
      type: text
      regex: '(?i)\b(wallet|eth|btc|crypto)\b.{0,80}\bprivate_?key\b'
  - id: private-key-export-wording
    desc: Private-key export wording
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(\bprivate_?key\b.{0,80}\bexport\b|\bexport\w*.{0,40}\bprivate_?key\b)'
  - id: git-secret-reveal-command
    desc: Git-secret decrypts repository files
    crit: notable
    conf: 0.96
    for: [shell, ruby, python, javascript, typescript]
    if:
      type: text
      regex: '\bgit\s+secret\s+reveal\b'
  - id: git-secret-reveal-argument-array
    desc: Git-secret decrypts repository files
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']git["'']\s*,\s*\[\s*["'']secret["'']\s*,\s*["'']reveal["'']'

composite_rules:
  - id: embedded-pem-private-key
    desc: Embedded PEM private-key material
    crit: notable
    conf: 0.97
    near_lines: 20
    all:
      - id: pem-private-key-header
      - id: pem-private-key-footer
  - id: private-key-export
    desc: Exports cryptographic private-key material
    crit: notable
    conf: 0.92
    near_lines: 80
    all:
      - id: crypto-private-key-reference
      - id: private-key-export-wording
