defaults:
  platforms:
    - windows
    - linux
    - macos
  for:
    - python
    - javascript
    - typescript
    - csharp
    - go
  crit: notable
  conf: 0.85

traits:
  - id: wallet-private-key-reference
    desc: Wallet private-key material reference
    if:
      type: text
      regex: '(?i)\b(wallet|eth|btc|crypto)\b.{0,80}\bprivate_?key\b'
