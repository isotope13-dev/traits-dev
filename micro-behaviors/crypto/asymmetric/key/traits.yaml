defaults:
  platforms:
    - windows
    - linux
    - macos
  for:
    - python
    - javascript
    - typescript
    - csharp
    - go
  crit: notable
  conf: 0.85

traits:
  - id: crypto-private-key-reference
    desc: Cryptographic private-key material reference
    if:
      type: text
      regex: '(?i)\b(wallet|eth|btc|crypto)\b.{0,80}\bprivate_?key\b'
  - id: git-secret-reveal-command
    desc: Git-secret decrypts repository files
    crit: notable
    conf: 0.96
    for: [shell, ruby, python, javascript, typescript]
    if:
      type: text
      regex: '\bgit\s+secret\s+reveal\b'
  - id: git-secret-reveal-argument-array
    desc: Git-secret decrypts repository files
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']git["'']\s*,\s*\[\s*["'']secret["'']\s*,\s*["'']reveal["'']'
