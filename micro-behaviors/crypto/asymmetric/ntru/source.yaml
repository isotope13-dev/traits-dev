defaults:
  platforms:
    - windows
    - linux
    - unix
  for: [c, cpp, source]
traits:
  - id: ntru-encrypt-class
    desc: NTRUEncrypt class or function reference
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: \bNTRU(Encrypt|Decrypt)\b
  - id: ntru-crypto-header
    desc: NTRU crypto library header include
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ntru_crypto
