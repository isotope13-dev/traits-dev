defaults:
  platforms: [unix, windows]
  for: [elf, pe, so, dll]
traits:
  - id: ecdh-compute-key
    desc: ECDH_compute_key reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: ECDH_compute_key
    downgrade:
      any:
        - id: well-known/lib/openssl::openssl-version-symbol
  - id: ec-key-generate-key
    desc: EC_KEY_generate_key reference
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: EC_KEY_generate_key
    downgrade:
      any:
        - id: well-known/lib/openssl::openssl-version-symbol
composite_rules:
  - id: ecdh-key-exchange
    desc: ECDH key exchange functions
    crit: suspicious
    conf: 0.9
    any:
      - id: ecdh-compute-key
      - id: ec-key-generate-key
