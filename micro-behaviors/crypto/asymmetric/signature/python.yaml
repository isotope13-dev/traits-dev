# Generic public-key signature/encryption operations.  These calls are not
# algorithm-specific: callers may use Ed25519, ECDSA, RSA, or another key
# implementation.  Algorithm-specific composites add their own context.
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
  conf: 0.88

traits:
  - id: public-key-encrypt-call
    desc: Python public-key encryption call
    if:
      type: symbol
      exact: public_key.encrypt

  - id: public-key-verify-call
    desc: Python public-key signature verification call
    if:
      type: symbol
      regex: '(^|\.)public_key\.verify$'
