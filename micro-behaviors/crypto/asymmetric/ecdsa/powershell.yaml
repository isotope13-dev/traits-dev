defaults:
  platforms: [windows, unix]
  for: [powershell]
  crit: notable
  conf: 0.88
  mbc: C0059
traits:
  - id: dotnet-ecdsa-create
    desc: PowerShell .NET ECDSA object creation
    if:
      type: text
      regex: '\[System\.Security\.Cryptography\.ECDsa\]::Create\s*\('
  - id: dotnet-ecdsa-private-key-import
    desc: PowerShell .NET ECDSA private key import
    if:
      type: text
      regex: '\$ecdsa\.Import(EncryptedPkcs8PrivateKey|Pkcs8PrivateKey|ECPrivateKey)\s*\('
  - id: dotnet-ecdsa-sign-hash
    desc: PowerShell .NET ECDSA SignHash call
    if:
      type: text
      regex: '\$ecdsa\.SignHash\s*\('
composite_rules:
  - id: powershell-ecdsa-signature
    desc: PowerShell .NET ECDSA signature generation
    all:
      - id: dotnet-ecdsa-create
      - id: dotnet-ecdsa-sign-hash
