defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: node-crypto-public-encrypt
    desc: Node.js crypto.publicEncrypt RSA call
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bcrypto\.publicEncrypt\s*\(|\bpublicEncrypt\s*\('
    unless:
      # Type-declaration stubs (@types/node) declare `function publicEncrypt(`
      # rather than call it — not a real encryption operation.
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/runtime::browserify-crypto-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/crypto/certificate/usage::pem-begin
