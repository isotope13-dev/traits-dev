defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: C0059

traits:
  - id: load-pem-public-key
    desc: Python loads PEM public key
    crit: notable
    conf: 0.86
    if:
      type: symbol
      regex: '(^|\.)load_pem_public_key$'

  - id: rsa-oaep-padding
    desc: Python RSA OAEP padding
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "padding.OAEP"

  - id: rsa-public-encrypt-call
    desc: Python RSA public encrypt
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: "public_key.encrypt"
  - id: rsa-public-verify-call
    desc: Python RSA public signature verify
    crit: notable
    conf: 0.86
    if:
      type: symbol
      regex: '(^|\.)public_key\.verify$'
  - id: rsa-sha256-hash
    desc: Python RSA SHA256 hash selection
    crit: component
    conf: 0.84
    if:
      type: symbol
      exact: "hashes.SHA256"

composite_rules:
  - id: rsa-oaep-public-encrypt
    desc: Python RSA OAEP public encryption
    crit: notable
    conf: 0.93
    all:
      - id: load-pem-public-key
      - id: rsa-oaep-padding
      - id: rsa-public-encrypt-call
  - id: rsa-sha256-public-verify
    desc: Python RSA SHA256 public signature verification
    crit: notable
    conf: 0.9
    all:
      - id: load-pem-public-key
      - id: rsa-public-verify-call
      - id: rsa-sha256-hash
