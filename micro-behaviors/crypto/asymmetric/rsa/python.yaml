defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: C0059

traits:
  - id: load-pem-public-key
    desc: Python loads PEM public key
    crit: notable
    conf: 0.86
    if:
      type: symbol
      regex: '(^|\.)load_pem_public_key$'

  - id: rsa-oaep-padding
    desc: Python RSA OAEP padding
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: "padding.OAEP"

  - id: rsa-module-import
    desc: Python RSA module import
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bfrom\s+cryptography\.hazmat\.primitives\.asymmetric\s+import\s+rsa\b'
  - id: rsa-module-path-import
    desc: Python RSA module path reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: cryptography.hazmat.primitives.asymmetric.rsa
  - id: rsa-sha256-hash
    desc: Python RSA SHA256 hash selection
    crit: component
    conf: 0.84
    if:
      type: symbol
      exact: "hashes.SHA256"

composite_rules:
  - id: rsa-oaep-public-encrypt
    desc: Python RSA OAEP public encryption
    crit: notable
    conf: 0.93
    all:
      - id: load-pem-public-key
      - id: rsa-oaep-padding
      - id: rsa-implementation-import
      - id: micro-behaviors/crypto/asymmetric/signature::public-key-encrypt-call
  - id: rsa-sha256-public-verify
    desc: Python RSA SHA256 public signature verification
    crit: notable
    conf: 0.9
    all:
      - id: load-pem-public-key
      - id: rsa-implementation-import
      - id: micro-behaviors/crypto/asymmetric/signature::public-key-verify-call
      - id: rsa-sha256-hash

  - id: rsa-implementation-import
    desc: Python RSA implementation import context
    crit: notable
    conf: 0.9
    any:
      - id: rsa-module-import
      - id: rsa-module-path-import
