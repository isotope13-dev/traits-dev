# RSA operations via openssl CLI and embedded keys
defaults:
  for: [shell]
  platforms: [linux, unix, macos]
  mbc: C0027
traits:
  - id: openssl-pkeyutl-encrypt
    desc: OpenSSL RSA public key encryption command
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: openssl pkeyutl -encrypt
  - id: embedded-pem-pubkey
    desc: Embedded PEM public key in shell script
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "BEGIN PUBLIC KEY"
