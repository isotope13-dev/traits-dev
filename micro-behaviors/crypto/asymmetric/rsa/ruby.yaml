# RSA Cryptography - Ruby
# MBC: C0028 (Cryptographic Key)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
  mbc: "C0028"
  crit: notable
traits:
  - id: openssl-pkey-rsa
    desc: OpenSSL RSA key operations
    conf: 0.9
    if:
      type: string_value
      regex: OpenSSL::PKey::RSA|PKey::RSA
  - id: rsa-generate
    desc: RSA key generation
    conf: 0.9
    if:
      type: string_value
      regex: RSA\.(new|generate)
  - id: rsa-encrypt-decrypt
    desc: RSA encrypt or decrypt
    conf: 0.85
    if:
      type: raw
      regex: \.(public_encrypt|private_decrypt|private_encrypt|public_decrypt)\b
