defaults:
  platforms: [windows, unix]
  for: [powershell]
  crit: notable
  conf: 0.88
  mbc: C0059
traits:
  - id: dotnet-rsa-create
    desc: PowerShell .NET RSA object creation
    if:
      type: text
      regex: '\[System\.Security\.Cryptography\.RSA\]::Create\s*\('
  - id: dotnet-rsa-private-key-import
    desc: PowerShell .NET RSA private key import
    if:
      type: text
      regex: '\.Import(RSA)?PrivateKey\s*\('
  - id: dotnet-rsa-sign-hash
    desc: PowerShell .NET RSA SignHash call
    if:
      type: text
      regex: '\$rsa\.SignHash\s*\('
  - id: dotnet-rsa-signature-padding
    desc: PowerShell .NET RSA signature padding selection
    if:
      type: text
      regex: '\[System\.Security\.Cryptography\.RSASignaturePadding\]::(Pss|Pkcs1)'
composite_rules:
  - id: powershell-rsa-signature
    desc: PowerShell .NET RSA signature generation
    all:
      - id: dotnet-rsa-create
      - id: dotnet-rsa-sign-hash
