defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
  - id: ed25519-constant-bytes
    desc: Ed25519 algorithm constant bytes
    crit: baseline
    conf: 0.85
    if:
      type: hex
      section: .text
      pattern: 79 07 4D C9 D3 14 79 51
  - id: rsa-public-decrypt
    desc: RSA_public_decrypt reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: RSA_public_decrypt
  - id: rsa-public-encrypt
    desc: RSA_public_encrypt reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: RSA_public_encrypt
  - id: dotnet-rsa-x509-public-import-raw
    desc: Dotnet X509 RSA public key import
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: CreateRsaFromX509PublicKey
  - id: dotnet-rsa-padding-raw
    desc: Dotnet RSA encryption padding API
    crit: notable
    conf: 0.8
    for:
      - pe
    if:
      type: text
      substr: RSAEncryptionPadding
    unless:
      - type: basename
        regex: ^System\.Security\.Cryptography\.Algorithms\.dll$
      - type: basename
        exact: netstandard.dll
  - id: evp-pkey-ref
    desc: EVP_PKEY reference
    crit: baseline
    conf: 0.4
    if:
      type: text
      substr: EVP_PKEY

  - id: pem-public-key-embedded
    desc: Embedded PEM RSA public key block
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "-----BEGIN PUBLIC KEY-----"

  - id: pem-private-key-embedded
    desc: Embedded PEM RSA private key block
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "-----BEGIN RSA PRIVATE KEY-----"
composite_rules:
  - id: rsa-operations
    desc: RSA cryptographic operations
    crit: notable
    conf: 0.6
    any:
      - id: rsa-public-decrypt
      - id: rsa-public-encrypt
      - id: evp-pkey-ref
  - id: dotnet-rsa-key-wrap
    desc: Dotnet RSA key wrapping operations
    crit: suspicious
    conf: 0.9
    for:
      - pe
    all:
      - id: dotnet-rsa-x509-public-import-raw
      - id: dotnet-rsa-padding-raw
