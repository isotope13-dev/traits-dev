defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: ed25519-constant-bytes
    desc: Ed25519 algorithm constant bytes
    crit: notable
    conf: 0.85
    if:
      type: hex
      section: .text
      pattern: 79 07 4D C9 D3 14 79 51
  - id: rsa-public-decrypt
    desc: RSA_public_decrypt reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: RSA_public_decrypt
  - id: rsa-public-encrypt
    desc: RSA_public_encrypt reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: RSA_public_encrypt
  - id: dotnet-rsa-x509-public-import-raw
    desc: Dotnet X509 RSA public key import
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: CreateRsaFromX509PublicKey
  - id: dotnet-rsa-padding-raw
    desc: Dotnet RSA encryption padding API
    crit: notable
    conf: 0.8
    for:
      - pe
    if:
      type: text
      substr: RSAEncryptionPadding
    unless:
      - type: basename
        regex: ^System\.Security\.Cryptography\.Algorithms\.dll$
      - id: metadata/file/extension/identity::netstandard-dll-basename
  - id: pem-public-key-embedded
    desc: Embedded PEM RSA public key block
    crit: notable
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: "-----BEGIN PUBLIC KEY-----"

  - id: pem-private-key-embedded
    desc: Embedded PEM RSA private key block
    crit: notable
    conf: 0.95
    for: [scripts, binaries]
    if:
      type: text
      regex: "-----BEGIN RSA PRIVATE KEY-----\\s+[A-Za-z0-9+/=\\r\\n]{80,}-----END RSA PRIVATE KEY-----"
  - id: rust-rsa-crate-path
    desc: Rust rsa crate path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'rsa-[0-9]+\.[0-9]+\.[0-9]+\\src\\algorithms\\'
  - id: pem-rsa-key-header
    desc: Embedded RSA private-key PEM header
    crit: notable
    conf: 0.9
    for: [scripts, binaries, javascript, typescript]
    if:
      type: string_literal
      substr: '-----BEGIN RSA'
composite_rules:
  - id: rsa-operation-cluster
    desc: JavaScript RSA key generation or public/private-key operation cluster
    crit: notable
    conf: 0.85
    for: [javascript, typescript]
    needs: 2
    any:
      - id: micro-behaviors/crypto/library/provider::generate-keypair-call
      - id: micro-behaviors/crypto/library/provider::asymmetric-public-encrypt
      - id: micro-behaviors/crypto/library/provider::asymmetric-private-decrypt
      - id: pem-rsa-key-header
  - id: rsa-operations
    desc: RSA cryptographic operations
    crit: notable
    conf: 0.6
    any:
      - id: rsa-public-decrypt
      - id: rsa-public-encrypt
  - id: dotnet-rsa-key-wrap
    desc: Dotnet RSA key wrapping operations
    crit: suspicious
    conf: 0.9
    for:
      - pe
    all:
      - id: dotnet-rsa-x509-public-import-raw
      - id: dotnet-rsa-padding-raw
