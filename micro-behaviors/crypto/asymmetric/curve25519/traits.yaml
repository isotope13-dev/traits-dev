defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
  mbc: C0027
  attack: T1573

traits:
  - id: curve25519-clamp
    desc: Curve25519 scalar clamping byte sequence
    crit: component
    conf: 0.85
    arch: [x86-64, x86]
    if:
      type: hex
      section: text
      pattern: "C0 ?? F8 ?? ?? ?? ?? 40"
  - id: curve25519-dalek-path
    desc: Curve25519 Dalek library marker
    crit: notable
    conf: 0.92
    for: [rust, elf, macho, pe]
    if:
      type: text
      regex: 'curve25519-dalek-[0-9][A-Za-z0-9_.-]*/src/(scalar|montgomery|field)\.rs'
  - id: x25519-key-exchange-term
    desc: X25519 or Curve25519 algorithm reference
    crit: notable
    conf: 0.88
    for: [binaries, rust, c, cpp, go, csharp, python, wasm]
    if:
      type: text
      regex: '(?i)\bx25519\b|\bcurve25519\b.{0,40}\b(key agreement|key exchange|shared secret)\b'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
