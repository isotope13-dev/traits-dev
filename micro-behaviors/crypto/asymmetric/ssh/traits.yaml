defaults:
  for: [scripts, binaries, markdown]
  platforms: [unix]

traits:
  - id: rsa-public-key-literal
    desc: SSH RSA public key literal
    crit: component
    conf: 0.9
    if:
      type: text
      regex: ssh-rsa\s+AAAA[A-Za-z0-9+/]{40,}
  - id: ed25519-public-key-literal
    desc: SSH Ed25519 public key literal
    crit: component
    conf: 0.9
    if:
      type: text
      regex: ssh-ed25519\s+AAAA[A-Za-z0-9+/]{40,}
  - id: ecdsa-public-key-literal
    desc: SSH ECDSA public key literal
    crit: component
    conf: 0.9
    if:
      type: text
      regex: ecdsa-sha2-nistp(256|384|521)\s+AAAA[A-Za-z0-9+/]{40,}

composite_rules:
  - id: hardcoded-public-key
    desc: Hardcoded SSH public key
    crit: suspicious
    conf: 0.9
    any:
      - id: rsa-public-key-literal
      - id: ed25519-public-key-literal
      - id: ecdsa-public-key-literal
    not:
      - regex: MockPublicKeyForDevModeonlyrunspec-console
    downgrade:
      any:
        - id: metadata/package/testing/
        - type: basename
          regex: '^(authorized_keys|known_hosts|[^/]+\.pub)$'
