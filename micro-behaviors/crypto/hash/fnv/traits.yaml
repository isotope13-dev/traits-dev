defaults:
  platforms: [windows, unix]
  for: [pe, dll]

traits:
  - id: fnv1a-offset-basis
    desc: FNV1a hash offset basis constant
    crit: component
    conf: 0.8
    if:
      type: hex
      section: .text
      pattern: C5 9D 1C 81
    unless:
      - id: metadata/binary/framework/
  - id: fnv1a-x86-prime-imul
    desc: FNV1a prime multiply loop
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: 69 ?? 93 01 00 01
  - id: fnv1a-prime-32bit-literal
    desc: FNV-1a 32-bit prime constant (0x01000193)
    crit: component
    conf: 0.7
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 93 01 00 01
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: fnv1a-prime-64bit-literal
    desc: FNV-1a 64-bit prime constant (0x100000001B3)
    crit: notable
    conf: 0.85
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: B3 01 00 00 00 01 00 00
    unless:
      - id: metadata/lang/compiler/systems/
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/
      - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
  - id: fnv1a-prime-64bit-movabs
    desc: FNV-1a 64-bit prime loaded via movabs (x64)
    crit: notable
    conf: 0.92
    arch: [x86-64]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: (48|49) (B8|B9|BA|BB|BC|BD|BE|BF) B3 01 00 00 00 01 00 00
    unless:
      - id: metadata/lang/compiler/systems/
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/
      - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
  - id: custom-fnv-seed-53ff68-x86
    desc: Custom FNV seed 53ff68
    crit: component
    conf: 0.94
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: BE 68 FF 53 00
