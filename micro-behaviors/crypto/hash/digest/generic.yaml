defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: md5
    desc: MD5 hashing functions
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: (?i)md5
  - id: sha1
    desc: SHA1 hashing functions
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: (?i)^sha1([_-]?(init|update|final))?$
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
  - id: sha256
    desc: SHA256 hashing functions
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: (?i)^sha256([_-]?(init|update|final))?$
  - id: sha512
    desc: SHA512 hashing functions
    crit: notable
    conf: 0.95
    if:
      type: symbol
      regex: (?i)sha512
  - id: sha3-256-python
    desc: Python SHA3-256 digest
    crit: notable
    conf: 0.92
    for: [python]
    platforms: [windows, unix]
    if:
      type: symbol
      exact: sha3_256
  - id: python-sha256-hexdigest
    desc: Computes a SHA-256 hex digest in Python
    crit: notable
    conf: 0.9
    for: [python]
    platforms: [windows, unix]
    if:
      type: text
      regex: 'hashlib\.sha256\s*\([\s\S]{0,160}\)\.hexdigest\s*\('
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: python-md5-digest
    desc: Computes an MD5 digest in Python
    crit: notable
    conf: 0.9
    for: [python]
    platforms: [windows, unix]
    if:
      type: symbol
      exact: hashlib.md5
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ruby-sha256-hexdigest
    desc: Computes a SHA-256 hex digest in Ruby
    crit: notable
    conf: 0.9
    for: [ruby]
    platforms: [unix, windows]
    if:
      type: text
      regex: 'Digest::SHA256\.hexdigest\s*\('
composite_rules:
  - id: message-digest
    desc: Message digest/hashing functions
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/crypto/hash/digest::md5
      - id: micro-behaviors/crypto/hash/digest::sha1
      - id: micro-behaviors/crypto/hash/digest::sha256
      - id: micro-behaviors/crypto/hash/digest::sha512
      - id: micro-behaviors/crypto/hash/digest::python-md5-digest
      - id: micro-behaviors/crypto/hash/digest::ruby-sha256-hexdigest
