defaults:
  platforms: [windows]
  for: [pe, csharp]

traits:
  - id: dotnet-sha256-reference
    desc: .NET SHA-256 hashing API reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)(System\.Security\.Cryptography\.SHA256|SHA256(Managed|Cng|CryptoServiceProvider))'

  - id: dotnet-compute-hash
    desc: .NET ComputeHash method reference
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: ComputeHash

  - id: dotnet-rng-crypto-provider
    desc: .NET cryptographic random provider reference
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: RNGCryptoServiceProvider
