defaults:
  platforms: [unix, windows]
  for: [go]

traits:
  - id: go-md5-new
    desc: Go constructs an MD5 digest
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: md5.New

  - id: go-md5-helper-call
    desc: Calls a Go MD5 helper
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)[Mm][Dd]5$'
