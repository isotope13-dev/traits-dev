defaults:
  platforms: [windows, unix]
  for: [powershell]
  crit: notable
  conf: 0.86
traits:
  - id: dotnet-hashalgorithmname-sha256
    desc: PowerShell .NET SHA256 hash algorithm selection
    if:
      type: text
      regex: '\[System\.Security\.Cryptography\.HashAlgorithmName\]::SHA256'
  - id: dotnet-hashalgorithmname-sha512
    desc: PowerShell .NET SHA512 hash algorithm selection
    if:
      type: text
      regex: '\[System\.Security\.Cryptography\.HashAlgorithmName\]::SHA512'
  - id: dotnet-computehash
    desc: PowerShell .NET ComputeHash call
    if:
      type: text
      regex: '\.ComputeHash\s*\('
